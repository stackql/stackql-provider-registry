        status:
          $ref: '#/components/schemas/RoleRoleStatus'
          description: >-
            Current status of the role, including its identity type,
            authentication method, and role attributes.
        update_time:
          type: string
          format: date-time
      description: Role represents a Postgres role within a Branch.
    RoleAttributes:
      type: object
      properties:
        bypassrls:
          type: boolean
        createdb:
          type: boolean
        createrole:
          type: boolean
      description: >-
        Attributes that can be granted to a Postgres role. We are only
        implementing a subset for now,
            see xref: https://www.postgresql.org/docs/16/sql-createrole.html The values follow Postgres
            keyword naming e.g. CREATEDB, BYPASSRLS, etc. which is why they don't include typical
            underscores between words.
    RoleOperationMetadata:
      type: object
      properties: {}
    RoleRoleSpec:
      type: object
      properties:
        attributes:
          $ref: '#/components/schemas/RoleAttributes'
        auth_method:
          $ref: '#/components/schemas/RoleAuthMethod'
          description: >-
            If auth_method is left unspecified, a meaningful authentication
            method is derived from the identity_type: * For the managed
            identities, OAUTH is used. * For the regular postgres roles,
            authentication based on postgres passwords is used. NOTE: this is
            ignored for the Databricks identity type GROUP, and NO_LOGIN is
            implicitly assumed instead for the GROUP identity type.
        identity_type:
          $ref: '#/components/schemas/RoleIdentityType'
          description: >-
            The type of role. When specifying a managed-identity, the chosen
            role_id must be a valid: * application ID for SERVICE_PRINCIPAL *
            user email for USER * group name for GROUP
        membership_roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleMembershipRole'
          description: An enum value for a standard role that this role is a member of.
        postgres_role:
          type: string
          description: >-
            The name of the Postgres role. This expects a valid Postgres
            identifier as specified in the link below.
            https://www.postgresql.org/docs/current/sql-syntax-lexical.html#SQL-SYNTAX-IDENTIFIERS
            Required when creating the Role. If you wish to create a Postgres
            Role backed by a managed Databricks identity, then postgres_role
            must be one of the following: 1. user email for IdentityType.USER 2.
            app ID for IdentityType.SERVICE_PRINCIPAL 2. group name for
            IdentityType.GROUP
    RoleRoleStatus:
      type: object
      properties:
        attributes:
          $ref: '#/components/schemas/RoleAttributes'
        auth_method:
          $ref: '#/components/schemas/RoleAuthMethod'
        identity_type:
          $ref: '#/components/schemas/RoleIdentityType'
          description: The type of the role.
        membership_roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleMembershipRole'
          description: An enum value for a standard role that this role is a member of.
        postgres_role:
          type: string
          description: The name of the Postgres role.
    BranchStatusState:
      type: string
      x-enum:
        - ARCHIVED
        - IMPORTING
        - INIT
        - READY
        - RESETTING
