components:
  schemas:
    Branch:
      type: object
      properties:
        create_time:
          type: string
          format: date-time
        name:
          type: string
          description: >-
            Output only. The full resource path of the branch. Format:
            projects/{project_id}/branches/{branch_id}
        parent:
          type: string
          description: >-
            The project containing this branch (API resource hierarchy). Format:
            projects/{project_id} Note: This field indicates where the branch
            exists in the resource hierarchy. For point-in-time branching from
            another branch, see `status.source_branch`.
        spec:
          $ref: '#/components/schemas/BranchSpec'
          description: The spec contains the branch configuration.
        status:
          $ref: '#/components/schemas/BranchStatus'
          description: The current status of a Branch.
        uid:
          type: string
          description: System-generated unique ID for the branch.
        update_time:
          type: string
          format: date-time
          description: A timestamp indicating when the branch was last updated.
    BranchOperationMetadata:
      type: object
      properties: {}
    BranchSpec:
      type: object
      properties:
        expire_time:
          type: string
          format: date-time
        is_protected:
          type: boolean
          description: >-
            When set to true, protects the branch from deletion and reset.
            Associated compute endpoints and the project cannot be deleted while
            the branch is protected.
        no_expiry:
          type: boolean
          description: >-
            Explicitly disable expiration. When set to true, the branch will not
            expire. If set to false, the request is invalid; provide either ttl
            or expire_time instead.
        source_branch:
          type: string
          description: >-
            The name of the source branch from which this branch was created
            (data lineage for point-in-time recovery). If not specified,
            defaults to the project's default branch. Format:
            projects/{project_id}/branches/{branch_id}
        source_branch_lsn:
          type: string
          description: >-
            The Log Sequence Number (LSN) on the source branch from which this
            branch was created.
        source_branch_time:
          type: string
          format: date-time
          description: >-
            The point in time on the source branch from which this branch was
            created.
        ttl:
          type: string
          description: >-
            Relative time-to-live duration. When set, the branch will expire at
            creation_time + ttl.
    BranchStatus:
      type: object
      properties:
        current_state:
          $ref: '#/components/schemas/BranchStatusState'
        default:
          type: boolean
          description: Whether the branch is the project's default branch.
        expire_time:
          type: string
          format: date-time
          description: >-
            Absolute expiration time for the branch. Empty if expiration is
            disabled.
        is_protected:
          type: boolean
          description: Whether the branch is protected.
        logical_size_bytes:
          type: integer
          description: The logical size of the branch.
        pending_state:
          $ref: '#/components/schemas/BranchStatusState'
          description: >-
            The pending state of the branch, if a state transition is in
            progress.
        source_branch:
          type: string
          description: >-
            The name of the source branch from which this branch was created.
            Format: projects/{project_id}/branches/{branch_id}
        source_branch_lsn:
          type: string
          description: >-
            The Log Sequence Number (LSN) on the source branch from which this
            branch was created.
        source_branch_time:
          type: string
          format: date-time
          description: >-
            The point in time on the source branch from which this branch was
            created.
        state_change_time:
          type: string
          format: date-time
          description: A timestamp indicating when the `current_state` began.
    Database:
      type: object
      properties:
        create_time:
          type: string
          format: date-time
          description: A timestamp indicating when the database was created.
        name:
          type: string
          description: >-
            The resource name of the database. Format:
            projects/{project_id}/branches/{branch_id}/databases/{database_id}
        parent:
          type: string
          description: >-
            The branch containing this database. Format:
            projects/{project_id}/branches/{branch_id}
        spec:
          $ref: '#/components/schemas/DatabaseDatabaseSpec'
          description: The desired state of the Database.
        status:
          $ref: '#/components/schemas/DatabaseDatabaseStatus'
          description: The observed state of the Database.
        update_time:
          type: string
          format: date-time
          description: A timestamp indicating when the database was last updated.
      description: Database represents a Postgres database within a Branch.
    DatabaseCredential:
      type: object
      properties:
        expire_time:
          type: string
          format: date-time
        token:
          type: string
          description: >-
            The OAuth token that can be used as a password when connecting to a
            database.
    DatabaseDatabaseSpec:
      type: object
      properties:
        postgres_database:
          type: string
        role:
          type: string
          description: >-
            The name of the role that owns the database. Format:
            projects/{project_id}/branches/{branch_id}/roles/{role_id} To change
            the owner, pass valid existing Role name when updating the Database
            A database always has an owner.
    DatabaseDatabaseStatus:
      type: object
      properties:
        postgres_database:
          type: string
        role:
          type: string
          description: >-
            The name of the role that owns the database. Format:
            projects/{project_id}/branches/{branch_id}/roles/{role_id}
    DatabaseOperationMetadata:
      type: object
      properties: {}
    DatabricksServiceExceptionWithDetailsProto:
      type: object
      properties:
        details:
          type: array
          items:
            type: object
        error_code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
        stack_trace:
          type: string
      description: Databricks Error that is returned by all Databricks APIs.
    Endpoint:
      type: object
      properties:
        create_time:
          type: string
          format: date-time
        name:
          type: string
          description: >-
            Output only. The full resource path of the endpoint. Format:
            projects/{project_id}/branches/{branch_id}/endpoints/{endpoint_id}
        parent:
          type: string
          description: >-
            The branch containing this endpoint (API resource hierarchy).
