                            - PG_PASSWORD_SCRAM_SHA_256
                          description: >-
                            How the role is authenticated when connecting to
                            Postgres.
                        identity_type:
                          type: string
                          x-enum:
                            - GROUP
                            - SERVICE_PRINCIPAL
                            - USER
                          description: The type of the role.
                        membership_roles:
                          type: array
                          items:
                            type: string
                            x-enum:
                              - DATABRICKS_SUPERUSER
                            description: >-
                              Roles that the DatabaseInstanceRole can be a
                              member of.
                          description: >-
                            An enum value for a standard role that this role is
                            a member of.
                        postgres_role:
                          type: string
                          description: The name of the Postgres role.
                      description: >-
                        Current status of the role, including its identity type,
                        authentication method, and role attributes.
                    update_time:
                      type: string
                      format: date-time
                  description: >-
                    The Postgres Role to update. The role's `name` field is used
                    to identify the role to update. Format:
                    projects/{project_id}/branches/{branch_id}/roles/{role_id}
              required:
                - role
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
