    vw_projects:
      name: vw_projects
      id: databricks_workspace.postgres.vw_projects
      config:
        docs:
          fields:
          - name: name
            type: string
            description: The project identifier (last component of the resource path).
          - name: create_time
            type: string
            description: Timestamp when the project was created.
          - name: initial_endpoint_spec
            type: object
            description: Initial endpoint configuration for the project.
          - name: spec
            type: object
            description: Project specification including display_name, pg_version, and default endpoint settings.
          - name: compute_last_active_time
            type: string
            description: Timestamp of the last compute activity on the project.
          - name: min_cu
            type: number
            description: Minimum autoscaling Compute Units for the default endpoint.
          - name: max_cu
            type: number
            description: Maximum autoscaling Compute Units for the default endpoint.
          - name: suspend_timeout_duration
            type: string
            description: Duration of inactivity after which the default endpoint is automatically suspended.
          - name: display_name
            type: string
            description: Human-readable project name.
          - name: enable_pg_native_login
            type: boolean
            description: Whether PG native password login is enabled on all endpoints in this project.
          - name: history_retention_duration
            type: string
            description: Duration for retaining point-in-time recovery history across all branches.
          - name: owner
            type: string
            description: Email of the project owner.
          - name: pg_version
            type: integer
            description: Major Postgres version number in use.
          - name: uid
            type: string
            description: System-generated unique ID for the project.
          - name: update_time
            type: string
            description: Timestamp when the project was last updated.
          requiredParams:
          - name: deployment_name
            type: string
            description: The Databricks workspace deployment name.
        views:
          select:
            predicate: sqlDialect == "sqlite3"
            ddl: |-
              SELECT
                SPLIT_PART(name, '/', -1) AS name,
                create_time,
                initial_endpoint_spec,
                spec,
                JSON_EXTRACT(status, '$.compute_last_active_time') AS compute_last_active_time,
                JSON_EXTRACT(status, '$.default_endpoint_settings.autoscaling_limit_min_cu') AS min_cu,
                JSON_EXTRACT(status, '$.default_endpoint_settings.autoscaling_limit_max_cu') AS max_cu,
                JSON_EXTRACT(status, '$.default_endpoint_settings.suspend_timeout_duration') AS suspend_timeout_duration,
                JSON_EXTRACT(status, '$.display_name') AS display_name,
                JSON_EXTRACT(status, '$.enable_pg_native_login') AS enable_pg_native_login,
                JSON_EXTRACT(status, '$.history_retention_duration') AS history_retention_duration,
                JSON_EXTRACT(status, '$.owner') AS owner,
                JSON_EXTRACT(status, '$.pg_version') AS pg_version,
                uid,
                update_time
              FROM databricks_workspace.postgres.projects
              WHERE deployment_name = '{{ deployment_name }}'
            fallback:
              predicate: sqlDialect == "postgres"
              ddl: |-
