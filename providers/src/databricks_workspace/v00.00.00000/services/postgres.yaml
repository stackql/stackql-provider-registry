        budget_policy_id:
          type: string
          description: The budget policy that is applied to the project.
        custom_tags:
          type: array
          items:
            $ref: '#/components/schemas/ProjectCustomTag'
          description: The effective custom tags associated with the project.
        default_endpoint_settings:
          $ref: '#/components/schemas/ProjectDefaultEndpointSettings'
          description: The effective default endpoint settings.
        display_name:
          type: string
          description: The effective human-readable project name.
        enable_pg_native_login:
          type: boolean
          description: >-
            Whether to enable PG native password login on all endpoints in this
            project.
        history_retention_duration:
          type: string
          description: >-
            The effective number of seconds to retain the shared history for
            point in time recovery.
        owner:
