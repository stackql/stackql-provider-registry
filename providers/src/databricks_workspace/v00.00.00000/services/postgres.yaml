        status:
          $ref: '#/components/schemas/EndpointStatus'
          description: Current operational status of the compute endpoint.
        uid:
          type: string
          description: System-generated unique ID for the endpoint.
        update_time:
          type: string
          format: date-time
          description: A timestamp indicating when the compute endpoint was last updated.
    EndpointGroupSpec:
      type: object
      properties:
        min:
          type: integer
        max:
          type: integer
          description: >-
            The maximum number of computes in the endpoint group. Currently,
            this must be equal to min. Set to 1 for single compute endpoints, to
            disable HA. To manually suspend all computes in an endpoint group,
            set disabled to true on the EndpointSpec.
        enable_readable_secondaries:
          type: boolean
          description: >-
            Whether to allow read-only connections to read-write endpoints. Only
            relevant for read-write endpoints where size.max > 1.
      required:
        - min
        - max
    EndpointGroupStatus:
      type: object
      properties:
        min:
          type: integer
        max:
          type: integer
          description: >-
            The maximum number of computes in the endpoint group. Currently,
            this must be equal to min. Set to 1 for single compute endpoints, to
            disable HA. To manually suspend all computes in an endpoint group,
            set disabled to true on the EndpointSpec.
        enable_readable_secondaries:
          type: boolean
          description: >-
            Whether read-only connections to read-write endpoints are allowed.
            Only relevant if read replicas are configured by specifying size.max
            > 1.
      required:
        - min
        - max
    EndpointHosts:
      type: object
      properties:
        host:
          type: string
          description: >-
            The hostname to connect to this endpoint. For read-write endpoints,
            this is a read-write hostname which connects to the primary compute.
            For read-only endpoints, this is a read-only hostname which allows
            read-only operations.
        read_only_host:
          type: string
          description: >-
            An optionally defined read-only host for the endpoint, without
            pooling. For read-only endpoints, this attribute is always defined
            and is equivalent to host. For read-write endpoints, this attribute
            is defined if the enclosing endpoint is a group with greater than 1
            computes configured, and has readable secondaries enabled.
      description: >-
        Encapsulates various hostnames (r/w or r/o, pooled or not) for an
        endpoint.
    EndpointOperationMetadata:
      type: object
      properties: {}
    EndpointSettings:
      type: object
      properties:
        pg_settings:
          type: object
          description: A raw representation of Postgres settings.
      description: A collection of settings for a compute endpoint.
    EndpointSpec:
      type: object
      properties:
        endpoint_type:
          $ref: '#/components/schemas/EndpointType'
        autoscaling_limit_max_cu:
          type: number
          description: The maximum number of Compute Units. Minimum value is 0.5.
        autoscaling_limit_min_cu:
          type: number
          description: The minimum number of Compute Units. Minimum value is 0.5.
        disabled:
          type: boolean
          description: >-
