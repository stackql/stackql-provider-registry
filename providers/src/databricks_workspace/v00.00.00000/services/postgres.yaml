  /api/2.0/postgres/projects/{project_id}/branches/{branch_id}/roles:
    post:
      operationId: postgres_create_role
      summary: Creates a new Postgres role in the branch.
      tags:
        - postgres
      description: |-
        Creates a new Postgres role in the branch.

        :param project_id: str
          The unique identifier of the Postgres project. Format: projects/{project_id}
        :param branch_id: str
          The unique identifier of the branch where this Role is created. Format: projects/{project_id}/branches/{branch_id}
        :param role: :class:`Role`
          The desired specification of a Role.
        :param role_id: str (optional)
          The ID to use for the Role, which will become the final component of the role's resource name. This
          ID becomes the role in Postgres.

          This value should be 4-63 characters, and valid characters are lowercase letters, numbers, and
          hyphens, as defined by RFC 1123.

          If role_id is not specified in the request, it is generated automatically.

        :returns: :class:`Operation`
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The unique identifier of the Postgres project. Format:
            projects/{project_id}
        - name: branch_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The unique identifier of the branch where this Role is created.
            Format: projects/{project_id}/branches/{branch_id}
        - name: role_id
          in: query
          required: false
          schema:
            type: string
          description: >-
            The ID to use for the Role, which will become the final component of
            the role's resource name. This ID becomes the role in Postgres. This
            value should be 4-63 characters, and valid characters are lowercase
            letters, numbers, and hyphens, as defined by RFC 1123. If role_id is
            not specified in the request, it is generated automatically.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: object
                  properties:
                    create_time:
                      type: string
                      format: date-time
                    name:
                      type: string
                      description: >-
                        Output only. The full resource path of the role. Format:
                        projects/{project_id}/branches/{branch_id}/roles/{role_id}
                    parent:
                      type: string
                      description: >-
                        The Branch where this Role exists. Format:
                        projects/{project_id}/branches/{branch_id}
                    spec:
                      type: object
                      properties:
                        attributes:
                          type: object
                          properties:
                            bypassrls:
                              type: boolean
                            createdb:
                              type: boolean
                            createrole:
                              type: boolean
                          description: >-
                            Attributes that can be granted to a Postgres role.
                            We are only implementing a subset for now,
                                see xref: https://www.postgresql.org/docs/16/sql-createrole.html The values follow Postgres
                                keyword naming e.g. CREATEDB, BYPASSRLS, etc. which is why they don't include typical
                                underscores between words.
                        auth_method:
                          type: string
                          x-enum:
                            - LAKEBASE_OAUTH_V1
                            - NO_LOGIN
                            - PG_PASSWORD_SCRAM_SHA_256
                          description: >-
                            If auth_method is left unspecified, a meaningful
                            authentication method is derived from the
                            identity_type: * For the managed identities, OAUTH
                            is used. * For the regular postgres roles,
                            authentication based on postgres passwords is used.
                            NOTE: this is ignored for the Databricks identity
                            type GROUP, and NO_LOGIN is implicitly assumed
                            instead for the GROUP identity type.
                        identity_type:
                          type: string
                          x-enum:
                            - GROUP
                            - SERVICE_PRINCIPAL
                            - USER
                          description: >-
                            The type of role. When specifying a
                            managed-identity, the chosen role_id must be a
                            valid: * application ID for SERVICE_PRINCIPAL * user
                            email for USER * group name for GROUP
                        membership_roles:
                          type: array
                          items:
                            type: string
                            x-enum:
                              - DATABRICKS_SUPERUSER
                            description: >-
                              Roles that the DatabaseInstanceRole can be a
                              member of.
                          description: >-
                            An enum value for a standard role that this role is
                            a member of.
                        postgres_role:
                          type: string
                          description: >-
                            The name of the Postgres role. This expects a valid
                            Postgres identifier as specified in the link below.
                            https://www.postgresql.org/docs/current/sql-syntax-lexical.html#SQL-SYNTAX-IDENTIFIERS
                            Required when creating the Role. If you wish to
                            create a Postgres Role backed by a managed
                            Databricks identity, then postgres_role must be one
                            of the following: 1. user email for
                            IdentityType.USER 2. app ID for
                            IdentityType.SERVICE_PRINCIPAL 2. group name for
                            IdentityType.GROUP
                      description: >-
                        The spec contains the role configuration, including
                        identity type, authentication method, and role
                        attributes.
                    status:
                      type: object
                      properties:
                        attributes:
                          type: object
                          properties:
                            bypassrls:
                              type: boolean
                            createdb:
                              type: boolean
                            createrole:
                              type: boolean
                          description: >-
                            Attributes that can be granted to a Postgres role.
                            We are only implementing a subset for now,
                                see xref: https://www.postgresql.org/docs/16/sql-createrole.html The values follow Postgres
                                keyword naming e.g. CREATEDB, BYPASSRLS, etc. which is why they don't include typical
                                underscores between words.
                        auth_method:
                          type: string
                          x-enum:
                            - LAKEBASE_OAUTH_V1
                            - NO_LOGIN
                            - PG_PASSWORD_SCRAM_SHA_256
                          description: >-
                            How the role is authenticated when connecting to
                            Postgres.
                        identity_type:
                          type: string
                          x-enum:
                            - GROUP
                            - SERVICE_PRINCIPAL
                            - USER
                          description: The type of the role.
                        membership_roles:
                          type: array
                          items:
                            type: string
                            x-enum:
                              - DATABRICKS_SUPERUSER
                            description: >-
                              Roles that the DatabaseInstanceRole can be a
                              member of.
                          description: >-
                            An enum value for a standard role that this role is
                            a member of.
                        postgres_role:
                          type: string
                          description: The name of the Postgres role.
                      description: >-
                        Current status of the role, including its identity type,
                        authentication method, and role attributes.
                    update_time:
                      type: string
                      format: date-time
                  description: The desired specification of a Role.
              required:
                - role
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
