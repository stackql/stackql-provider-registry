openapi: 3.0.0
info:
  title: Databricks Postgres API (workspace)
  description: >-
    OpenAPI specification for the Databricks postgres service (workspace-level
    APIs), generated from the Databricks Python SDK.
  version: 0.1.0
  x-stackql-sdk-version: 0.86.0
  x-stackql-date-generated: '2026-03-20'
  x-stackql-sdk-namespace: databricks.sdk.service.postgres
servers:
  - url: https://{deployment_name}.cloud.databricks.com
    variables:
      deployment_name:
        description: The Databricks Workspace Deployment Name
        default: dbc-abcd0123-a1bc
paths:
  /api/2.0/postgres/projects/{project_id}/branches:
    post:
      operationId: postgres_create_branch
      summary: Creates a new database branch in the project.
      tags:
        - postgres
      description: |-
        Creates a new database branch in the project.

        :param project_id: str
          The Project where this Branch will be created. Format: projects/{project_id}
        :param branch: :class:`Branch`
          The Branch to create.
        :param branch_id: str
          The ID to use for the Branch. This becomes the final component of the branch's resource name. The ID
          is required and must be 1-63 characters long, start with a lowercase letter, and contain only
          lowercase letters, numbers, and hyphens. For example, `development` becomes
          `projects/my-app/branches/development`.

        :returns: :class:`Operation`
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The Project where this Branch will be created. Format:
            projects/{project_id}
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
          description: >-
            The ID to use for the Branch. This becomes the final component of
            the branch's resource name. The ID is required and must be 1-63
            characters long, start with a lowercase letter, and contain only
            lowercase letters, numbers, and hyphens. For example, `development`
            becomes `projects/my-app/branches/development`.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                branch:
                  type: object
                  properties:
                    create_time:
                      type: string
                      format: date-time
                    name:
                      type: string
                      description: >-
                        Output only. The full resource path of the branch.
                        Format: projects/{project_id}/branches/{branch_id}
                    parent:
                      type: string
                      description: >-
                        The project containing this branch (API resource
                        hierarchy). Format: projects/{project_id} Note: This
                        field indicates where the branch exists in the resource
                        hierarchy. For point-in-time branching from another
                        branch, see `status.source_branch`.
                    spec:
                      type: object
                      properties:
                        expire_time:
                          type: string
                          format: date-time
                        is_protected:
                          type: boolean
                          description: >-
                            When set to true, protects the branch from deletion
                            and reset. Associated compute endpoints and the
                            project cannot be deleted while the branch is
                            protected.
                        no_expiry:
                          type: boolean
                          description: >-
                            Explicitly disable expiration. When set to true, the
                            branch will not expire. If set to false, the request
                            is invalid; provide either ttl or expire_time
                            instead.
                        source_branch:
                          type: string
                          description: >-
                            The name of the source branch from which this branch
                            was created (data lineage for point-in-time
                            recovery). If not specified, defaults to the
                            project's default branch. Format:
                            projects/{project_id}/branches/{branch_id}
                        source_branch_lsn:
                          type: string
                          description: >-
                            The Log Sequence Number (LSN) on the source branch
                            from which this branch was created.
                        source_branch_time:
                          type: string
                          format: date-time
                          description: >-
                            The point in time on the source branch from which
                            this branch was created.
                        ttl:
                          type: string
                          description: >-
                            Relative time-to-live duration. When set, the branch
                            will expire at creation_time + ttl.
                      description: The spec contains the branch configuration.
                    status:
                      type: object
                      properties:
                        current_state:
                          type: string
                          x-enum:
                            - ARCHIVED
                            - IMPORTING
                            - INIT
                            - READY
                            - RESETTING
                          description: The state of the branch.
                        default:
                          type: boolean
                          description: Whether the branch is the project's default branch.
                        expire_time:
                          type: string
                          format: date-time
                          description: >-
                            Absolute expiration time for the branch. Empty if
                            expiration is disabled.
                        is_protected:
                          type: boolean
                          description: Whether the branch is protected.
                        logical_size_bytes:
                          type: integer
                          description: The logical size of the branch.
                        pending_state:
                          type: string
                          x-enum:
                            - ARCHIVED
                            - IMPORTING
                            - INIT
                            - READY
                            - RESETTING
                          description: >-
                            The pending state of the branch, if a state
                            transition is in progress.
                        source_branch:
                          type: string
                          description: >-
                            The name of the source branch from which this branch
                            was created. Format:
                            projects/{project_id}/branches/{branch_id}
                        source_branch_lsn:
                          type: string
                          description: >-
                            The Log Sequence Number (LSN) on the source branch
                            from which this branch was created.
                        source_branch_time:
                          type: string
                          format: date-time
                          description: >-
                            The point in time on the source branch from which
                            this branch was created.
                        state_change_time:
                          type: string
                          format: date-time
                          description: >-
                            A timestamp indicating when the `current_state`
                            began.
                      description: The current status of a Branch.
                    uid:
                      type: string
                      description: System-generated unique ID for the branch.
                    update_time:
                      type: string
                      format: date-time
                      description: A timestamp indicating when the branch was last updated.
                  description: The Branch to create.
              required:
                - branch
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
      x-stackql-sdk-source: PostgresAPI
    get:
      operationId: postgres_list_branches
      summary: Returns a paginated list of database branches in the project.
      tags:
        - postgres
      description: |-
        Returns a paginated list of database branches in the project.

        :param parent: str
          The Project that owns this collection of branches. Format: projects/{project_id}
        :param page_size: int (optional)
          Upper bound for items returned. Cannot be negative.
        :param page_token: str (optional)
          Page token from a previous response. If not provided, returns the first page.

        :returns: Iterator over :class:`Branch`
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The Project that owns this collection of branches. Format:
            projects/{project_id}
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
          description: Upper bound for items returned. Cannot be negative.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
          description: >-
            Page token from a previous response. If not provided, returns the
            first page.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBranchesResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
      x-stackql-sdk-source: PostgresAPI
  /api/2.0/postgres/projects/{project_id}/branches/{branch_id}/databases:
    post:
      operationId: postgres_create_database
      summary: Create a Database.
      tags:
        - postgres
      description: >-
        Create a Database.


        Creates a database in the specified branch. A branch can have multiple
        databases.


        :param project_id: str
          The unique identifier of the Postgres project. Format: projects/{project_id}
        :param branch_id: str
          The unique identifier of the branch where this Database will be created. Format: projects/{project_id}/branches/{branch_id}
        :param database: :class:`Database`
          The desired specification of a Database.
        :param database_id: str (optional)
          The ID to use for the Database, which will become the final component of the database's resource
          name. This ID becomes the database name in postgres.

          This value should be 4-63 characters, and only use characters available in DNS names, as defined by
          RFC-1123

          If database_id is not specified in the request, it is generated automatically.

        :returns: :class:`Operation`
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The unique identifier of the Postgres project. Format:
            projects/{project_id}
        - name: branch_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The unique identifier of the branch where this Database will be
            created. Format: projects/{project_id}/branches/{branch_id}
        - name: database_id
          in: query
          required: false
          schema:
            type: string
          description: >-
            The ID to use for the Database, which will become the final
            component of the database's resource name. This ID becomes the
            database name in postgres. This value should be 4-63 characters, and
            only use characters available in DNS names, as defined by RFC-1123
            If database_id is not specified in the request, it is generated
            automatically.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                database:
                  type: object
                  properties:
                    create_time:
                      type: string
                      format: date-time
                      description: A timestamp indicating when the database was created.
                    name:
                      type: string
                      description: >-
                        The resource name of the database. Format:
                        projects/{project_id}/branches/{branch_id}/databases/{database_id}
                    parent:
                      type: string
                      description: >-
                        The branch containing this database. Format:
                        projects/{project_id}/branches/{branch_id}
                    spec:
                      type: object
                      properties:
                        postgres_database:
                          type: string
                        role:
                          type: string
                          description: >-
                            The name of the role that owns the database. Format:
                            projects/{project_id}/branches/{branch_id}/roles/{role_id}
                            To change the owner, pass valid existing Role name
                            when updating the Database A database always has an
                            owner.
                      description: The desired state of the Database.
                    status:
                      type: object
                      properties:
                        postgres_database:
                          type: string
                        role:
                          type: string
                          description: >-
                            The name of the role that owns the database. Format:
                            projects/{project_id}/branches/{branch_id}/roles/{role_id}
                      description: The observed state of the Database.
                    update_time:
                      type: string
                      format: date-time
                      description: >-
                        A timestamp indicating when the database was last
                        updated.
                  description: The desired specification of a Database.
              required:
                - database
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
      x-stackql-sdk-source: PostgresAPI
    get:
      operationId: postgres_list_databases
      summary: List Databases.
      tags:
        - postgres
      description: |-
        List Databases.

        :param project_id: str
          The unique identifier of the Postgres project. Format: projects/{project_id}
        :param branch_id: str
          The unique identifier of the branch that owns this collection of databases. Format: projects/{project_id}/branches/{branch_id}
        :param page_size: int (optional)
          Upper bound for items returned.
        :param page_token: str (optional)
          Pagination token to go to the next page of Databases. Requests first page if absent.

        :returns: Iterator over :class:`Database`
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The unique identifier of the Postgres project. Format:
            projects/{project_id}
        - name: branch_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The unique identifier of the branch that owns this collection of
            databases. Format: projects/{project_id}/branches/{branch_id}
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
          description: Upper bound for items returned.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
          description: >-
            Pagination token to go to the next page of Databases. Requests first
            page if absent.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDatabasesResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
      x-stackql-sdk-source: PostgresAPI
  /api/2.0/postgres/projects/{project_id}/branches/{branch_id}/endpoints:
    post:
      operationId: postgres_create_endpoint
      summary: Creates a new compute endpoint in the branch.
      tags:
        - postgres
      description: |-
        Creates a new compute endpoint in the branch.

        :param project_id: str
          The unique identifier of the Postgres project. Format: projects/{project_id}
        :param branch_id: str
          The unique identifier of the branch where this Endpoint will be created. Format: projects/{project_id}/branches/{branch_id}
        :param endpoint: :class:`Endpoint`
          The Endpoint to create.
        :param endpoint_id: str
          The ID to use for the Endpoint. This becomes the final component of the endpoint's resource name.
          The ID is required and must be 1-63 characters long, start with a lowercase letter, and contain only
          lowercase letters, numbers, and hyphens. For example, `primary` becomes
          `projects/my-app/branches/development/endpoints/primary`.

        :returns: :class:`Operation`
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The unique identifier of the Postgres project. Format:
            projects/{project_id}
        - name: branch_id
          in: path
          required: true
          schema:
            type: string
          description: >-
            The unique identifier of the branch where this Endpoint will be
            created. Format: projects/{project_id}/branches/{branch_id}
        - name: endpoint_id
          in: query
          required: true
          schema:
            type: string
          description: >-
            The ID to use for the Endpoint. This becomes the final component of
            the endpoint's resource name. The ID is required and must be 1-63
            characters long, start with a lowercase letter, and contain only
            lowercase letters, numbers, and hyphens. For example, `primary`
            becomes `projects/my-app/branches/development/endpoints/primary`.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  type: object
                  properties:
                    create_time:
                      type: string
                      format: date-time
                    name:
                      type: string
                      description: >-
                        Output only. The full resource path of the endpoint.
                        Format:
                        projects/{project_id}/branches/{branch_id}/endpoints/{endpoint_id}
                    parent:
                      type: string
                      description: >-
                        The branch containing this endpoint (API resource
                        hierarchy). Format:
                        projects/{project_id}/branches/{branch_id}
                    spec:
                      type: object
                      properties:
                        endpoint_type:
                          type: string
                          x-enum:
                            - ENDPOINT_TYPE_READ_ONLY
                            - ENDPOINT_TYPE_READ_WRITE
                          description: >-
                            The compute endpoint type. Either `read_write` or
                            `read_only`.
                        autoscaling_limit_max_cu:
                          type: number
                          description: >-
                            The maximum number of Compute Units. Minimum value
                            is 0.5.
                        autoscaling_limit_min_cu:
                          type: number
                          description: >-
                            The minimum number of Compute Units. Minimum value
                            is 0.5.
                        disabled:
                          type: boolean
                          description: >-
                            Whether to restrict connections to the compute
                            endpoint. Enabling this option schedules a suspend
                            compute operation. A disabled compute endpoint
                            cannot be enabled by a connection or console action.
                        group:
                          type: object
                          properties:
                            min:
                              type: integer
                            max:
                              type: integer
                              description: >-
                                The maximum number of computes in the endpoint
                                group. Currently, this must be equal to min. Set
                                to 1 for single compute endpoints, to disable
                                HA. To manually suspend all computes in an
                                endpoint group, set disabled to true on the
                                EndpointSpec.
                            enable_readable_secondaries:
                              type: boolean
                              description: >-
                                Whether to allow read-only connections to
                                read-write endpoints. Only relevant for
                                read-write endpoints where size.max > 1.
                          required:
                            - min
                            - max
                          description: >-
                            Settings for optional HA configuration of the
                            endpoint. If unspecified, the endpoint defaults to
                            non HA settings, with a single compute backing the
                            endpoint (and no readable secondaries for Read/Write
                            endpoints).
                        no_suspension:
                          type: boolean
                          description: >-
                            When set to true, explicitly disables automatic
                            suspension (never suspend). Should be set to true
                            when provided.
                        settings:
                          type: object
                          properties:
                            pg_settings:
                              type: object
                              description: A raw representation of Postgres settings.
                          description: A collection of settings for a compute endpoint.
                        suspend_timeout_duration:
                          type: string
                          description: >-
                            Duration of inactivity after which the compute
                            endpoint is automatically suspended. If specified
                            should be between 60s and 604800s (1 minute to 1
                            week).
                      required:
                        - endpoint_type
                      description: >-
                        The spec contains the compute endpoint configuration,
                        including autoscaling limits, suspend timeout, and
                        disabled state.
                    status:
                      type: object
                      properties:
                        autoscaling_limit_max_cu:
                          type: number
                        autoscaling_limit_min_cu:
                          type: number
                          description: The minimum number of Compute Units.
                        current_state:
                          type: string
                          x-enum:
                            - ACTIVE
                            - DEGRADED
                            - IDLE
                            - INIT
                          description: The state of the compute endpoint.
                        disabled:
                          type: boolean
                          description: >-
                            Whether to restrict connections to the compute
                            endpoint. Enabling this option schedules a suspend
                            compute operation. A disabled compute endpoint
                            cannot be enabled by a connection or console action.
                        endpoint_type:
                          type: string
                          x-enum:
                            - ENDPOINT_TYPE_READ_ONLY
                            - ENDPOINT_TYPE_READ_WRITE
                          description: >-
                            The endpoint type. A branch can only have one
                            READ_WRITE endpoint.
                        group:
                          type: object
                          properties:
                            min:
                              type: integer
                            max:
                              type: integer
                              description: >-
                                The maximum number of computes in the endpoint
                                group. Currently, this must be equal to min. Set
                                to 1 for single compute endpoints, to disable
                                HA. To manually suspend all computes in an
                                endpoint group, set disabled to true on the
                                EndpointSpec.
                            enable_readable_secondaries:
                              type: boolean
                              description: >-
                                Whether read-only connections to read-write
                                endpoints are allowed. Only relevant if read
                                replicas are configured by specifying size.max >
                                1.
                          required:
                            - min
                            - max
                          description: Details on the HA configuration of the endpoint.
                        hosts:
                          type: object
                          properties:
                            host:
                              type: string
                              description: >-
                                The hostname to connect to this endpoint. For
                                read-write endpoints, this is a read-write
                                hostname which connects to the primary compute.
                                For read-only endpoints, this is a read-only
                                hostname which allows read-only operations.
                            read_only_host:
                              type: string
                              description: >-
                                An optionally defined read-only host for the
                                endpoint, without pooling. For read-only
                                endpoints, this attribute is always defined and
                                is equivalent to host. For read-write endpoints,
                                this attribute is defined if the enclosing
                                endpoint is a group with greater than 1 computes
                                configured, and has readable secondaries
                                enabled.
                          description: >-
                            Contains host information for connecting to the
                            endpoint.
                        pending_state:
                          type: string
                          x-enum:
                            - ACTIVE
                            - DEGRADED
                            - IDLE
                            - INIT
                          description: The state of the compute endpoint.
                        settings:
                          type: object
                          properties:
                            pg_settings:
                              type: object
                              description: A raw representation of Postgres settings.
                          description: A collection of settings for a compute endpoint.
                        suspend_timeout_duration:
                          type: string
                          description: >-
                            Duration of inactivity after which the compute
                            endpoint is automatically suspended.
                      description: Current operational status of the compute endpoint.
                    uid:
                      type: string
                      description: System-generated unique ID for the endpoint.
                    update_time:
                      type: string
                      format: date-time
                      description: >-
                        A timestamp indicating when the compute endpoint was
                        last updated.
                  description: The Endpoint to create.
              required:
                - endpoint
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
      x-stackql-sdk-source: PostgresAPI
    get:
      operationId: postgres_list_endpoints
      summary: Returns a paginated list of compute endpoints in the branch.
      tags:
        - postgres
      description: |-
        Returns a paginated list of compute endpoints in the branch.

        :param project_id: str
