openapi: 3.1.0
info:
  title: roles API
  description: openai_admin API
  version: 2.3.0
paths:
  /organization/roles:
    get:
      security:
        - AdminApiKeyAuth: []
      summary: Lists the roles configured for the organization.
      operationId: list-roles
      tags:
        - Roles
      parameters:
        - name: limit
          in: query
          description: A limit on the number of roles to return. Defaults to 1000.
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 1000
            default: 1000
        - name: after
          in: query
          description: Cursor for pagination. Provide the value from the previous response's `next` field to continue listing roles.
          required: false
          schema:
            type: string
        - name: order
          in: query
          description: Sort order for the returned roles.
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: Roles listed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicRoleListResource'
      x-oaiMeta:
        name: List organization roles
        group: administration
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/organization/roles?limit=20 \
                -H "Authorization: Bearer $OPENAI_ADMIN_KEY" \
                -H "Content-Type: application/json"
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                adminAPIKey: process.env['OPENAI_ADMIN_KEY'], // This is the default and can be omitted
              });

              // Automatically fetches more pages as needed.
              for await (const role of client.admin.organization.roles.list()) {
                console.log(role.id);
              }
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  admin_api_key=os.environ.get("OPENAI_ADMIN_KEY"),  # This is the default and can be omitted
              )
              page = client.admin.organization.roles.list()
              page = page.data[0]
              print(page.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAdminAPIKey(\"My Admin API Key\"),\n\t)\n\tpage, err := client.Admin.Organization.Roles.List(context.TODO(), openai.AdminOrganizationRoleListParams{})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", page)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.admin.organization.roles.RoleListPage;
              import com.openai.models.admin.organization.roles.RoleListParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      RoleListPage page = client.admin().organization().roles().list();
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(admin_api_key: "My Admin API Key")

              page = openai.admin.organization.roles.list

              puts(page)
          response: |
            {
                "object": "list",
                "data": [
                    {
                        "object": "role",
                        "id": "role_01J1F8ROLE01",
                        "name": "API Group Manager",
                        "description": "Allows managing organization groups",
                        "permissions": [
                            "api.groups.read",
                            "api.groups.write"
                        ],
                        "resource_type": "api.organization",
                        "predefined_role": false
                    }
                ],
                "has_more": false,
                "next": null
            }
    post:
      security:
        - AdminApiKeyAuth: []
      summary: Creates a custom role for the organization.
      operationId: create-role
      tags:
        - Roles
      requestBody:
        description: Parameters for the role you want to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicCreateOrganizationRoleBody'
      responses:
        '200':
          description: Role created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
      x-oaiMeta:
        name: Create organization role
        group: administration
        examples:
          request:
            curl: |
              curl -X POST https://api.openai.com/v1/organization/roles \
                -H "Authorization: Bearer $OPENAI_ADMIN_KEY" \
                -H "Content-Type: application/json" \
                -d '{
                    "role_name": "API Group Manager",
                    "permissions": [
                        "api.groups.read",
                        "api.groups.write"
                    ],
                    "description": "Allows managing organization groups"
                }'
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                adminAPIKey: process.env['OPENAI_ADMIN_KEY'], // This is the default and can be omitted
              });

              const role = await client.admin.organization.roles.create({
                permissions: ['string'],
                role_name: 'role_name',
              });

              console.log(role.id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  admin_api_key=os.environ.get("OPENAI_ADMIN_KEY"),  # This is the default and can be omitted
              )
              role = client.admin.organization.roles.create(
                  permissions=["string"],
                  role_name="role_name",
              )
              print(role.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAdminAPIKey(\"My Admin API Key\"),\n\t)\n\trole, err := client.Admin.Organization.Roles.New(context.TODO(), openai.AdminOrganizationRoleNewParams{\n\t\tPermissions: []string{\"string\"},\n\t\tRoleName:    \"role_name\",\n\t})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", role.ID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.admin.organization.roles.Role;
              import com.openai.models.admin.organization.roles.RoleCreateParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      RoleCreateParams params = RoleCreateParams.builder()
                          .addPermission("string")
                          .roleName("role_name")
                          .build();
                      Role role = client.admin().organization().roles().create(params);
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(admin_api_key: "My Admin API Key")

              role = openai.admin.organization.roles.create(permissions: ["string"], role_name: "role_name")

              puts(role)
          response: |
            {
                "object": "role",
                "id": "role_01J1F8ROLE01",
                "name": "API Group Manager",
                "description": "Allows managing organization groups",
                "permissions": [
                    "api.groups.read",
                    "api.groups.write"
                ],
                "resource_type": "api.organization",
                "predefined_role": false
            }
