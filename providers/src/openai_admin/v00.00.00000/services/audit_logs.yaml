components:
  schemas:
    AuditLogEventType:
      type: string
      description: The event type.
      enum:
        - api_key.created
        - api_key.updated
        - api_key.deleted
        - certificate.created
        - certificate.updated
        - certificate.deleted
        - certificates.activated
        - certificates.deactivated
        - checkpoint.permission.created
        - checkpoint.permission.deleted
        - external_key.registered
        - external_key.removed
        - group.created
        - group.updated
        - group.deleted
        - invite.sent
        - invite.accepted
        - invite.deleted
        - ip_allowlist.created
        - ip_allowlist.updated
        - ip_allowlist.deleted
        - ip_allowlist.config.activated
        - ip_allowlist.config.deactivated
        - login.succeeded
        - login.failed
        - logout.succeeded
        - logout.failed
        - organization.updated
        - project.created
        - project.updated
        - project.archived
        - project.deleted
        - rate_limit.updated
        - rate_limit.deleted
        - resource.deleted
        - tunnel.created
        - tunnel.updated
        - tunnel.deleted
        - role.created
        - role.updated
        - role.deleted
        - role.assignment.created
        - role.assignment.deleted
        - scim.enabled
        - scim.disabled
        - service_account.created
        - service_account.updated
        - service_account.deleted
        - user.added
        - user.updated
        - user.deleted
    ListAuditLogsResponse:
      type: object
      properties:
        object:
          type: string
          enum:
            - list
          x-stainless-const: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        first_id:
          example: audit_log-defb456h8dks
          type: string
        last_id:
          example: audit_log-hnbkd8s93s
          type: string
        has_more:
          type: boolean
      required:
        - object
        - data
        - has_more
    AuditLog:
      type: object
      description: A log of a user action or configuration change within this organization.
      properties:
        id:
          type: string
          description: The ID of this log.
        type:
          $ref: '#/components/schemas/AuditLogEventType'
        effective_at:
          type: integer
          format: unixtime
          description: The Unix timestamp (in seconds) of the event.
        project:
          type: object
          description: The project that the action was scoped to. Absent for actions not scoped to projects. Note that any admin actions taken via Admin API keys are associated with the default project.
          properties:
            id:
              type: string
              description: The project ID.
            name:
              type: string
              description: The project title.
        actor:
          type: object
          description: The actor who performed the audit logged action.
          properties:
            type:
              type: string
              description: The type of actor. Is either `session` or `api_key`.
              enum:
                - session
                - api_key
            session:
              $ref: '#/components/schemas/AuditLogActorSession'
            api_key:
              $ref: '#/components/schemas/AuditLogActorApiKey'
        api_key.created:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The tracking ID of the API key.
            data:
              type: object
              description: The payload used to create the API key.
              properties:
                scopes:
                  type: array
                  items:
                    type: string
                  description: A list of scopes allowed for the API key, e.g. `["api.model.request"]`
        api_key.updated:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The tracking ID of the API key.
            changes_requested:
              type: object
              description: The payload used to update the API key.
              properties:
                scopes:
                  type: array
                  items:
                    type: string
                  description: A list of scopes allowed for the API key, e.g. `["api.model.request"]`
        api_key.deleted:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The tracking ID of the API key.
        checkpoint.permission.created:
          type: object
          description: The project and fine-tuned model checkpoint that the checkpoint permission was created for.
          properties:
            id:
              type: string
              description: The ID of the checkpoint permission.
            data:
              type: object
              description: The payload used to create the checkpoint permission.
              properties:
                project_id:
                  type: string
                  description: The ID of the project that the checkpoint permission was created for.
                fine_tuned_model_checkpoint:
                  type: string
                  description: The ID of the fine-tuned model checkpoint.
        checkpoint.permission.deleted:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the checkpoint permission.
        external_key.registered:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the external key configuration.
            data:
              type: string
              description: The configuration for the external key. (opaque JSON object)
        external_key.removed:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the external key configuration.
        group.created:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the group.
            data:
              type: object
              description: Information about the created group.
              properties:
                group_name:
                  type: string
                  description: The group name.
        group.updated:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the group.
            changes_requested:
              type: object
              description: The payload used to update the group.
              properties:
                group_name:
                  type: string
                  description: The updated group name.
        group.deleted:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the group.
        scim.enabled:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the SCIM was enabled for.
        scim.disabled:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the SCIM was disabled for.
        invite.sent:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the invite.
            data:
              type: object
              description: The payload used to create the invite.
              properties:
                email:
                  type: string
                  description: The email invited to the organization.
                role:
                  type: string
                  description: The role the email was invited to be. Is either `owner` or `member`.
        invite.accepted:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the invite.
        invite.deleted:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the invite.
        ip_allowlist.created:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the IP allowlist configuration.
            name:
              type: string
              description: The name of the IP allowlist configuration.
            allowed_ips:
              type: array
              description: The IP addresses or CIDR ranges included in the configuration.
              items:
                type: string
        ip_allowlist.updated:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the IP allowlist configuration.
            allowed_ips:
              type: array
              description: The updated set of IP addresses or CIDR ranges in the configuration.
              items:
                type: string
        ip_allowlist.deleted:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The ID of the IP allowlist configuration.
            name:
              type: string
              description: The name of the IP allowlist configuration.
            allowed_ips:
              type: array
              description: The IP addresses or CIDR ranges that were in the configuration.
              items:
                type: string
        ip_allowlist.config.activated:
          type: object
          description: The details for events with this `type`.
          properties:
            configs:
              type: array
              description: The configurations that were activated.
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: The ID of the IP allowlist configuration.
                  name:
                    type: string
                    description: The name of the IP allowlist configuration.
        ip_allowlist.config.deactivated:
          type: object
          description: The details for events with this `type`.
          properties:
            configs:
              type: array
              description: The configurations that were deactivated.
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: The ID of the IP allowlist configuration.
                  name:
                    type: string
                    description: The name of the IP allowlist configuration.
        login.succeeded:
          type: string
          description: This event has no additional fields beyond the standard audit log attributes. (opaque JSON object)
        login.failed:
          type: object
          description: The details for events with this `type`.
          properties:
            error_code:
              type: string
              description: The error code of the failure.
            error_message:
              type: string
              description: The error message of the failure.
        logout.succeeded:
          type: string
          description: This event has no additional fields beyond the standard audit log attributes. (opaque JSON object)
        logout.failed:
          type: object
          description: The details for events with this `type`.
          properties:
            error_code:
              type: string
              description: The error code of the failure.
            error_message:
              type: string
              description: The error message of the failure.
        organization.updated:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The organization ID.
            changes_requested:
              type: object
              description: The payload used to update the organization settings.
              properties:
                title:
                  type: string
                  description: The organization title.
                description:
                  type: string
                  description: The organization description.
                name:
                  type: string
                  description: The organization name.
                threads_ui_visibility:
                  type: string
                  description: Visibility of the threads page which shows messages created with the Assistants API and Playground. One of `ANY_ROLE`, `OWNERS`, or `NONE`.
                usage_dashboard_visibility:
                  type: string
                  description: Visibility of the usage dashboard which shows activity and costs for your organization. One of `ANY_ROLE` or `OWNERS`.
                api_call_logging:
                  type: string
                  description: How your organization logs data from supported API calls. One of `disabled`, `enabled_per_call`, `enabled_for_all_projects`, or `enabled_for_selected_projects`
                api_call_logging_project_ids:
                  type: string
                  description: The list of project ids if api_call_logging is set to `enabled_for_selected_projects`
        project.created:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The project ID.
            data:
              type: object
              description: The payload used to create the project.
              properties:
                name:
                  type: string
                  description: The project name.
                title:
                  type: string
                  description: The title of the project as seen on the dashboard.
        project.updated:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The project ID.
            changes_requested:
              type: object
              description: The payload used to update the project.
              properties:
                title:
                  type: string
                  description: The title of the project as seen on the dashboard.
        project.archived:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
              description: The project ID.
        project.deleted:
          type: object
          description: The details for events with this `type`.
          properties:
            id:
              type: string
