openapi: 3.1.0
info:
  title: groups API
  description: openai_admin API
  version: 2.3.0
paths:
  /organization/groups:
    get:
      security:
        - AdminApiKeyAuth: []
      summary: Lists all groups in the organization.
      operationId: list-groups
      tags:
        - Groups
      parameters:
        - name: limit
          in: query
          description: |
            A limit on the number of groups to be returned. Limit can range between 0 and 1000, and the default is 100.
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 1000
            default: 100
        - name: after
          in: query
          description: |
            A cursor for use in pagination. `after` is a group ID that defines your place in the list. For instance, if you make a list request and receive 100 objects, ending with group_abc, your subsequent call can include `after=group_abc` in order to fetch the next page of the list.
          required: false
          schema:
            type: string
        - name: order
          in: query
          description: Specifies the sort order of the returned groups.
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: Groups listed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResource'
      x-oaiMeta:
        name: List groups
        group: administration
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/organization/groups?limit=20&order=asc \
                -H "Authorization: Bearer $OPENAI_ADMIN_KEY" \
                -H "Content-Type: application/json"
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                adminAPIKey: process.env['OPENAI_ADMIN_KEY'], // This is the default and can be omitted
              });

              // Automatically fetches more pages as needed.
              for await (const group of client.admin.organization.groups.list()) {
                console.log(group.id);
              }
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  admin_api_key=os.environ.get("OPENAI_ADMIN_KEY"),  # This is the default and can be omitted
              )
              page = client.admin.organization.groups.list()
              page = page.data[0]
              print(page.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAdminAPIKey(\"My Admin API Key\"),\n\t)\n\tpage, err := client.Admin.Organization.Groups.List(context.TODO(), openai.AdminOrganizationGroupListParams{})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", page)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.admin.organization.groups.GroupListPage;
              import com.openai.models.admin.organization.groups.GroupListParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      GroupListPage page = client.admin().organization().groups().list();
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(admin_api_key: "My Admin API Key")

              page = openai.admin.organization.groups.list

              puts(page)
          response: |
            {
                "object": "list",
                "data": [
                    {
                        "object": "group",
                        "id": "group_01J1F8ABCDXYZ",
                        "name": "Support Team",
                        "created_at": 1711471533,
                        "is_scim_managed": false
                    }
