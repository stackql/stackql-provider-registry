components:
  schemas:
    ListCertificatesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationCertificate'
        first_id:
          example: cert_abc
          type: string
        last_id:
          example: cert_abc
          type: string
        has_more:
          type: boolean
        object:
          type: string
          enum:
            - list
          x-stainless-const: true
      required:
        - object
        - data
        - has_more
        - first_id
        - last_id
    UploadCertificateRequest:
      type: object
      properties:
        name:
          type: string
          description: An optional name for the certificate
        certificate:
          type: string
          description: The certificate content in PEM format
      required:
        - certificate
    Certificate:
      type: object
      description: Represents an individual `certificate` uploaded to the organization.
      properties:
        object:
          type: string
          enum:
            - certificate
            - organization.certificate
            - organization.project.certificate
          description: |
            The object type.

            - If creating, updating, or getting a specific certificate, the object type is `certificate`.
            - If listing, activating, or deactivating certificates for the organization, the object type is `organization.certificate`.
            - If listing, activating, or deactivating certificates for a project, the object type is `organization.project.certificate`.
          x-stainless-const: true
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints
        name:
          description: The name of the certificate.
          type: string
        created_at:
          type: integer
          format: unixtime
          description: The Unix timestamp (in seconds) of when the certificate was uploaded.
        certificate_details:
          type: object
          properties:
            valid_at:
              type: integer
              format: unixtime
              description: The Unix timestamp (in seconds) of when the certificate becomes valid.
            expires_at:
              type: integer
              format: unixtime
              description: The Unix timestamp (in seconds) of when the certificate expires.
            content:
              type: string
              description: The content of the certificate in PEM format.
        active:
          type: boolean
          description: Whether the certificate is currently active at the specified scope. Not returned when getting details for a specific certificate.
      required:
        - object
        - id
        - name
        - created_at
        - certificate_details
      x-oaiMeta:
        name: The certificate object
        example: |
          {
            "object": "certificate",
            "id": "cert_abc",
            "name": "My Certificate",
            "created_at": 1234567,
            "certificate_details": {
              "valid_at": 1234567,
              "expires_at": 12345678,
              "content": "-----BEGIN CERTIFICATE----- MIIGAjCCA...6znFlOW+ -----END CERTIFICATE-----"
            }
          }
    ToggleCertificatesRequest:
      type: object
      properties:
        certificate_ids:
          type: array
          items:
            type: string
            example: cert_abc
          minItems: 1
          maxItems: 10
      required:
        - certificate_ids
    OrganizationCertificateActivationResponse:
      type: object
      properties:
        object:
          type: string
          enum:
            - organization.certificate.activation
          description: The organization certificate activation result type.
          x-stainless-const: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationCertificate'
      required:
        - object
        - data
    OrganizationCertificateDeactivationResponse:
      type: object
      properties:
        object:
          type: string
          enum:
            - organization.certificate.deactivation
          description: The organization certificate deactivation result type.
          x-stainless-const: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationCertificate'
      required:
        - object
        - data
    ModifyCertificateRequest:
      type: object
      properties:
        name:
          type: string
          description: The updated name for the certificate
    DeleteCertificateResponse:
      type: object
      properties:
        object:
          type: string
          description: The object type, must be `certificate.deleted`.
          enum:
            - certificate.deleted
          x-stainless-const: true
        id:
          type: string
          description: The ID of the certificate that was deleted.
      required:
        - object
        - id
    ListProjectCertificatesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationProjectCertificate'
        first_id:
          example: cert_abc
          type: string
        last_id:
          example: cert_abc
          type: string
        has_more:
          type: boolean
        object:
          type: string
          enum:
            - list
          x-stainless-const: true
      required:
        - object
        - data
        - has_more
        - first_id
        - last_id
    OrganizationProjectCertificateActivationResponse:
      type: object
      properties:
        object:
          type: string
          enum:
            - organization.project.certificate.activation
          description: The project certificate activation result type.
          x-stainless-const: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationProjectCertificate'
      required:
        - object
        - data
    OrganizationProjectCertificateDeactivationResponse:
      type: object
      properties:
        object:
          type: string
          enum:
            - organization.project.certificate.deactivation
          description: The project certificate deactivation result type.
          x-stainless-const: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationProjectCertificate'
      required:
        - object
        - data
    OrganizationCertificate:
      type: object
      description: Represents an individual certificate configured at the organization level.
      properties:
        object:
          type: string
          enum:
            - organization.certificate
          description: The object type, which is always `organization.certificate`.
          x-stainless-const: true
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints
        name:
          description: The name of the certificate.
          type: string
        created_at:
          type: integer
          format: unixtime
          description: The Unix timestamp (in seconds) of when the certificate was uploaded.
        certificate_details:
          type: object
          properties:
            valid_at:
              type: integer
              format: unixtime
              description: The Unix timestamp (in seconds) of when the certificate becomes valid.
            expires_at:
              type: integer
              format: unixtime
              description: The Unix timestamp (in seconds) of when the certificate expires.
        active:
          type: boolean
          description: Whether the certificate is currently active at the organization level.
      required:
        - object
        - id
        - name
        - created_at
        - certificate_details
        - active
    OrganizationProjectCertificate:
      type: object
      description: Represents an individual certificate configured at the project level.
      properties:
        object:
          type: string
          enum:
            - organization.project.certificate
          description: The object type, which is always `organization.project.certificate`.
          x-stainless-const: true
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints
        name:
          description: The name of the certificate.
          type: string
        created_at:
          type: integer
          format: unixtime
          description: The Unix timestamp (in seconds) of when the certificate was uploaded.
        certificate_details:
          type: object
          properties:
            valid_at:
              type: integer
              format: unixtime
              description: The Unix timestamp (in seconds) of when the certificate becomes valid.
            expires_at:
              type: integer
              format: unixtime
              description: The Unix timestamp (in seconds) of when the certificate expires.
        active:
          type: boolean
          description: Whether the certificate is currently active at the project level.
      required:
        - object
        - id
        - name
        - created_at
        - certificate_details
        - active
