            }
  /organization/certificates/{certificate_id}:
    get:
      security:
        - AdminApiKeyAuth: []
      summary: |
        Get a certificate that has been uploaded to the organization.

        You can get a certificate regardless of whether it is active or not.
      operationId: getCertificate
      tags:
        - Certificates
      parameters:
        - name: certificate_id
          in: path
          description: Unique ID of the certificate to retrieve.
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: A list of additional fields to include in the response. Currently the only supported value is `content` to fetch the PEM content of the certificate.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - content
      responses:
        '200':
          description: Certificate retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
      x-oaiMeta:
        name: Get certificate
        group: administration
        examples:
          request:
            curl: |
              curl "https://api.openai.com/v1/organization/certificates/cert_abc?include[]=content" \
              -H "Authorization: Bearer $OPENAI_ADMIN_KEY"
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                adminAPIKey: process.env['OPENAI_ADMIN_KEY'], // This is the default and can be omitted
              });

              const certificate = await client.admin.organization.certificates.retrieve('certificate_id');

              console.log(certificate.id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  admin_api_key=os.environ.get("OPENAI_ADMIN_KEY"),  # This is the default and can be omitted
              )
              certificate = client.admin.organization.certificates.retrieve(
                  certificate_id="certificate_id",
              )
              print(certificate.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAdminAPIKey(\"My Admin API Key\"),\n\t)\n\tcertificate, err := client.Admin.Organization.Certificates.Get(\n\t\tcontext.TODO(),\n\t\t\"certificate_id\",\n\t\topenai.AdminOrganizationCertificateGetParams{},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", certificate.ID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.admin.organization.certificates.Certificate;
              import com.openai.models.admin.organization.certificates.CertificateRetrieveParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      Certificate certificate = client.admin().organization().certificates().retrieve("certificate_id");
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(admin_api_key: "My Admin API Key")

              certificate = openai.admin.organization.certificates.retrieve("certificate_id")

              puts(certificate)
          response: |
            {
              "object": "certificate",
              "id": "cert_abc",
              "name": "My Example Certificate",
              "created_at": 1234567,
              "certificate_details": {
                "valid_at": 1234567,
                "expires_at": 12345678,
                "content": "-----BEGIN CERTIFICATE-----MIIDeT...-----END CERTIFICATE-----"
              }
            }
    post:
      security:
        - AdminApiKeyAuth: []
      summary: |
        Modify a certificate. Note that only the name can be modified.
      operationId: modifyCertificate
      tags:
        - Certificates
      parameters:
        - name: certificate_id
          in: path
          description: Unique ID of the certificate to modify.
          required: true
          schema:
            type: string
      requestBody:
        description: The certificate modification payload.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyCertificateRequest'
      responses:
        '200':
          description: Certificate modified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
      x-oaiMeta:
        name: Modify certificate
        group: administration
        examples:
          request:
            curl: |
              curl -X POST https://api.openai.com/v1/organization/certificates/cert_abc \
              -H "Authorization: Bearer $OPENAI_ADMIN_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "name": "Renamed Certificate"
              }'
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                adminAPIKey: process.env['OPENAI_ADMIN_KEY'], // This is the default and can be omitted
              });

              const certificate = await client.admin.organization.certificates.update('certificate_id');

              console.log(certificate.id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  admin_api_key=os.environ.get("OPENAI_ADMIN_KEY"),  # This is the default and can be omitted
              )
              certificate = client.admin.organization.certificates.update(
                  certificate_id="certificate_id",
              )
              print(certificate.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAdminAPIKey(\"My Admin API Key\"),\n\t)\n\tcertificate, err := client.Admin.Organization.Certificates.Update(\n\t\tcontext.TODO(),\n\t\t\"certificate_id\",\n\t\topenai.AdminOrganizationCertificateUpdateParams{},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", certificate.ID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.admin.organization.certificates.Certificate;
              import com.openai.models.admin.organization.certificates.CertificateUpdateParams;

              public final class Main {
