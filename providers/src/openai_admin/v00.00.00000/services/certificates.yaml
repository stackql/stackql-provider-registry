openapi: 3.1.0
info:
  title: certificates API
  description: openai_admin API
  version: 2.3.0
paths:
  /organization/certificates:
    get:
      security:
        - AdminApiKeyAuth: []
      summary: List uploaded certificates for this organization.
      operationId: listOrganizationCertificates
      tags:
        - Certificates
      parameters:
        - name: limit
          in: query
          description: |
            A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 20.
          required: false
          schema:
            type: integer
            default: 20
        - name: after
          in: query
          description: |
            A cursor for use in pagination. `after` is an object ID that defines your place in the list. For instance, if you make a list request and receive 100 objects, ending with obj_foo, your subsequent call can include after=obj_foo in order to fetch the next page of the list.
          required: false
          schema:
            type: string
        - name: order
          in: query
          description: |
            Sort order by the `created_at` timestamp of the objects. `asc` for ascending order and `desc` for descending order.
          schema:
            type: string
            default: desc
            enum:
              - asc
              - desc
      responses:
        '200':
          description: Certificates listed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCertificatesResponse'
      x-oaiMeta:
        name: List organization certificates
        group: administration
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/organization/certificates \
              -H "Authorization: Bearer $OPENAI_ADMIN_KEY"
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                adminAPIKey: process.env['OPENAI_ADMIN_KEY'], // This is the default and can be omitted
              });

              // Automatically fetches more pages as needed.
              for await (const certificateListResponse of client.admin.organization.certificates.list()) {
                console.log(certificateListResponse.id);
              }
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  admin_api_key=os.environ.get("OPENAI_ADMIN_KEY"),  # This is the default and can be omitted
              )
              page = client.admin.organization.certificates.list()
              page = page.data[0]
              print(page.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAdminAPIKey(\"My Admin API Key\"),\n\t)\n\tpage, err := client.Admin.Organization.Certificates.List(context.TODO(), openai.AdminOrganizationCertificateListParams{})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", page)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.admin.organization.certificates.CertificateListPage;
              import com.openai.models.admin.organization.certificates.CertificateListParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      CertificateListPage page = client.admin().organization().certificates().list();
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(admin_api_key: "My Admin API Key")

              page = openai.admin.organization.certificates.list

              puts(page)
          response: |
            {
              "object": "list",
              "data": [
                {
                  "object": "organization.certificate",
                  "id": "cert_abc",
                  "name": "My Example Certificate",
                  "active": true,
                  "created_at": 1234567,
                  "certificate_details": {
                    "valid_at": 12345667,
                    "expires_at": 12345678
                  }
                },
              ],
              "first_id": "cert_abc",
              "last_id": "cert_abc",
              "has_more": false
            }
    post:
      security:
        - AdminApiKeyAuth: []
      summary: |
        Upload a certificate to the organization. This does **not** automatically activate the certificate.

        Organizations can upload up to 50 certificates.
      operationId: uploadCertificate
      tags:
        - Certificates
      requestBody:
        description: The certificate upload payload.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadCertificateRequest'
      responses:
        '200':
          description: Certificate uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
      x-oaiMeta:
        name: Upload certificate
        group: administration
        examples:
          request:
            curl: |
              curl -X POST https://api.openai.com/v1/organization/certificates \
              -H "Authorization: Bearer $OPENAI_ADMIN_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "name": "My Example Certificate",
                "certificate": "-----BEGIN CERTIFICATE-----\\nMIIDeT...\\n-----END CERTIFICATE-----"
              }'
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                adminAPIKey: process.env['OPENAI_ADMIN_KEY'], // This is the default and can be omitted
              });

              const certificate = await client.admin.organization.certificates.create({
                certificate: 'certificate',
              });

              console.log(certificate.id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  admin_api_key=os.environ.get("OPENAI_ADMIN_KEY"),  # This is the default and can be omitted
              )
              certificate = client.admin.organization.certificates.create(
                  certificate="certificate",
              )
              print(certificate.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAdminAPIKey(\"My Admin API Key\"),\n\t)\n\tcertificate, err := client.Admin.Organization.Certificates.New(context.TODO(), openai.AdminOrganizationCertificateNewParams{\n\t\tCertificate: \"certificate\",\n\t})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", certificate.ID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.admin.organization.certificates.Certificate;
              import com.openai.models.admin.organization.certificates.CertificateCreateParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      CertificateCreateParams params = CertificateCreateParams.builder()
                          .certificate("certificate")
                          .build();
                      Certificate certificate = client.admin().organization().certificates().create(params);
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(admin_api_key: "My Admin API Key")

              certificate = openai.admin.organization.certificates.create(certificate: "certificate")

              puts(certificate)
          response: |
            {
              "object": "certificate",
              "id": "cert_abc",
              "name": "My Example Certificate",
              "created_at": 1234567,
              "certificate_details": {
                "valid_at": 12345667,
                "expires_at": 12345678
              }
            }
  /organization/certificates/activate:
    post:
      security:
        - AdminApiKeyAuth: []
      summary: |
        Activate certificates at the organization level.

        You can atomically and idempotently activate up to 10 certificates at a time.
      operationId: activateOrganizationCertificates
      tags:
        - Certificates
      requestBody:
        description: The certificate activation payload.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleCertificatesRequest'
      responses:
        '200':
          description: Certificates activated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationCertificateActivationResponse'
      x-oaiMeta:
        name: Activate certificates for organization
        group: administration
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/organization/certificates/activate \
              -H "Authorization: Bearer $OPENAI_ADMIN_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "certificate_ids": ["cert_abc", "cert_def"]
              }'
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                adminAPIKey: process.env['OPENAI_ADMIN_KEY'], // This is the default and can be omitted
              });

              // Automatically fetches more pages as needed.
              for await (const certificateActivateResponse of client.admin.organization.certificates.activate({
                certificate_ids: ['cert_abc'],
              })) {
                console.log(certificateActivateResponse.id);
              }
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  admin_api_key=os.environ.get("OPENAI_ADMIN_KEY"),  # This is the default and can be omitted
              )
              page = client.admin.organization.certificates.activate(
                  certificate_ids=["cert_abc"],
              )
              page = page.data[0]
              print(page.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAdminAPIKey(\"My Admin API Key\"),\n\t)\n\tpage, err := client.Admin.Organization.Certificates.Activate(context.TODO(), openai.AdminOrganizationCertificateActivateParams{\n\t\tCertificateIDs: []string{\"cert_abc\"},\n\t})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", page)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.admin.organization.certificates.CertificateActivatePage;
              import com.openai.models.admin.organization.certificates.CertificateActivateParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      CertificateActivateParams params = CertificateActivateParams.builder()
                          .addCertificateId("cert_abc")
                          .build();
                      CertificateActivatePage page = client.admin().organization().certificates().activate(params);
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(admin_api_key: "My Admin API Key")

              page = openai.admin.organization.certificates.activate(certificate_ids: ["cert_abc"])

              puts(page)
          response: |
            {
              "object": "organization.certificate.activation",
              "data": [
                {
                  "object": "organization.certificate",
                  "id": "cert_abc",
                  "name": "My Example Certificate",
                  "active": true,
                  "created_at": 1234567,
                  "certificate_details": {
                    "valid_at": 12345667,
                    "expires_at": 12345678
                  }
                },
                {
                  "object": "organization.certificate",
                  "id": "cert_def",
                  "name": "My Example Certificate 2",
                  "active": true,
                  "created_at": 1234567,
                  "certificate_details": {
                    "valid_at": 12345667,
                    "expires_at": 12345678
                  }
                },
              ],
            }
