                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      Certificate certificate = client.admin().organization().certificates().update("certificate_id");
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(admin_api_key: "My Admin API Key")

              certificate = openai.admin.organization.certificates.update("certificate_id")

              puts(certificate)
          response: |
            {
              "object": "certificate",
              "id": "cert_abc",
              "name": "Renamed Certificate",
              "created_at": 1234567,
              "certificate_details": {
                "valid_at": 12345667,
                "expires_at": 12345678
              }
            }
    delete:
      security:
        - AdminApiKeyAuth: []
      summary: |
        Delete a certificate from the organization.

        The certificate must be inactive for the organization and all projects.
      operationId: deleteCertificate
      tags:
        - Certificates
      parameters:
        - name: certificate_id
          in: path
          description: Unique ID of the certificate to delete.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Certificate deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCertificateResponse'
      x-oaiMeta:
        name: Delete certificate
        group: administration
        examples:
          request:
            curl: |
              curl -X DELETE https://api.openai.com/v1/organization/certificates/cert_abc \
              -H "Authorization: Bearer $OPENAI_ADMIN_KEY"
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                adminAPIKey: process.env['OPENAI_ADMIN_KEY'], // This is the default and can be omitted
              });

              const certificate = await client.admin.organization.certificates.delete('certificate_id');

              console.log(certificate.id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  admin_api_key=os.environ.get("OPENAI_ADMIN_KEY"),  # This is the default and can be omitted
              )
              certificate = client.admin.organization.certificates.delete(
                  "certificate_id",
              )
              print(certificate.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAdminAPIKey(\"My Admin API Key\"),\n\t)\n\tcertificate, err := client.Admin.Organization.Certificates.Delete(context.TODO(), \"certificate_id\")\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", certificate.ID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
