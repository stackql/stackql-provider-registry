      summary: Delete a file and remove it from all vector stores.
      parameters:
        - in: path
          name: file_id
          required: true
          schema:
            type: string
          description: The ID of the file to use for this request.
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteFileResponse'
      x-oaiMeta:
