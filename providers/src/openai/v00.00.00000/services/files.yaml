openapi: 3.1.0
info:
  title: files API
  description: openai API
  version: 2.3.0
paths:
  /files:
    get:
      operationId: listFiles
      tags:
        - Files
      summary: Returns a list of files.
      parameters:
        - in: query
          name: purpose
          required: false
          schema:
            type: string
          description: Only return files with the given purpose.
        - name: limit
          in: query
          description: >-
            A limit on the number of objects to be returned. Limit can range
            between 1 and 10,000, and the default is 10,000.


            Automatically applied from a SQL `LIMIT` clause - `SELECT ... LIMIT
            10` sends `limit=10` on the wire. Setting it explicitly in a `WHERE`
            clause is not required.
          required: false
          schema:
            type: integer
            default: 10000
        - name: order
          in: query
          description: >
            Sort order by the `created_at` timestamp of the objects. `asc` for
            ascending order and `desc` for descending order.
          schema:
            type: string
            default: desc
            enum:
              - asc
              - desc
        - name: after
          in: query
          description: >
            A cursor for use in pagination. `after` is an object ID that defines
            your place in the list. For instance, if you make a list request and
            receive 100 objects, ending with obj_foo, your subsequent call can
            include after=obj_foo in order to fetch the next page of the list.
          schema:
            type: string
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
      x-oaiMeta:
        name: List files
        group: files
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/files \
                -H "Authorization: Bearer $OPENAI_API_KEY"
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              page = client.files.list()
              page = page.data[0]
              print(page)
            javascript: |-
              import OpenAI from "openai";

              const openai = new OpenAI();

              async function main() {
                const list = await openai.files.list();

                for await (const file of list) {
                  console.log(file);
                }
              }

              main();
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });

              // Automatically fetches more pages as needed.
              for await (const fileObject of client.files.list()) {
                console.log(fileObject);
              }
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tpage, err := client.Files.List(context.TODO(), openai.FileListParams{})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", page)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.files.FileListPage;
              import com.openai.models.files.FileListParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      FileListPage page = client.files().list();
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(api_key: "My API Key")

              page = openai.files.list

              puts(page)
          response: |
            {
              "object": "list",
              "data": [
                {
                  "id": "file-abc123",
                  "object": "file",
                  "bytes": 175,
                  "created_at": 1613677385,
                  "expires_at": 1677614202,
                  "filename": "salesOverview.pdf",
                  "purpose": "assistants",
                },
                {
                  "id": "file-abc456",
                  "object": "file",
                  "bytes": 140,
                  "created_at": 1613779121,
                  "expires_at": 1677614202,
                  "filename": "puppy.jsonl",
                  "purpose": "fine-tune",
                }
              ],
              "first_id": "file-abc123",
              "last_id": "file-abc456",
              "has_more": false
            }
    post:
      operationId: createFile
      tags:
        - Files
      summary: >
        Upload a file that can be used across various endpoints. Individual
        files

        can be up to 512 MB, and each project can store up to 2.5 TB of files in

        total. There is no organization-wide storage limit. Uploads to this

        endpoint are rate-limited to 1,000 requests per minute per authenticated

        user.


        - The Assistants API supports files up to 2 million tokens and of
        specific
          file types. See the [Assistants Tools guide](/docs/assistants/tools) for
          details.
        - The Fine-tuning API only supports `.jsonl` files. The input also has
          certain required formats for fine-tuning
          [chat](/docs/api-reference/fine-tuning/chat-input) or
          [completions](/docs/api-reference/fine-tuning/completions-input) models.
        - The Batch API only supports `.jsonl` files up to 200 MB in size. The
        input
          also has a specific required
          [format](/docs/api-reference/batch/request-input).
        - For Retrieval or `file_search` ingestion, upload files here first. If
          you need to attach multiple uploaded files to the same vector store, use
          [`/vector_stores/{vector_store_id}/file_batches`](/docs/api-reference/vector-stores-file-batches/createBatch)
          instead of attaching them one by one. Vector store attachment has separate
          limits from file upload, including 2,000 attached files per minute per
          organization.

        Please [contact us](https://help.openai.com/) if you need to increase
        these

        storage limits.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIFile'
      x-oaiMeta:
        name: Upload file
        group: files
        description: >
          Uploads a file for later use across OpenAI APIs. Uploads to this
          endpoint are rate-limited to 1,000 requests per minute per
          authenticated user. For Retrieval or `file_search` ingestion, upload
          files here first. If you need to attach multiple uploaded files to the
          same vector store, use vector store file batches instead of attaching
          them one by one.
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/files \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -F purpose="fine-tune" \
                -F file="@mydata.jsonl"
                -F expires_after[anchor]="created_at"
                -F expires_after[seconds]=2592000
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              file_object = client.files.create(
                  file=b"Example data",
                  purpose="assistants",
              )
              print(file_object.id)
            javascript: |-
              import fs from "fs";
              import OpenAI from "openai";

              const openai = new OpenAI();

              async function main() {
                const file = await openai.files.create({
                  file: fs.createReadStream("mydata.jsonl"),
                  purpose: "fine-tune",
                  expires_after: {
                    anchor: "created_at",
                    seconds: 2592000
                  }
                });

                console.log(file);
              }

              main();
            node.js: |-
              import fs from 'fs';
              import OpenAI from 'openai';

              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });

              const fileObject = await client.files.create({
                file: fs.createReadStream('fine-tune.jsonl'),
                purpose: 'assistants',
              });

              console.log(fileObject.id);
            go: "package main\n\nimport (\n\t\"bytes\"\n\t\"context\"\n\t\"fmt\"\n\t\"io\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tfileObject, err := client.Files.New(context.TODO(), openai.FileNewParams{\n\t\tFile:    io.Reader(bytes.NewBuffer([]byte(\"Example data\"))),\n\t\tPurpose: openai.FilePurposeAssistants,\n\t})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", fileObject.ID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.files.FileCreateParams;
              import com.openai.models.files.FileObject;
              import com.openai.models.files.FilePurpose;
              import java.io.ByteArrayInputStream;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      FileCreateParams params = FileCreateParams.builder()
                          .file(new ByteArrayInputStream("Example data".getBytes()))
                          .purpose(FilePurpose.ASSISTANTS)
                          .build();
                      FileObject fileObject = client.files().create(params);
                  }
              }
            ruby: >-
              require "openai"


              openai = OpenAI::Client.new(api_key: "My API Key")


              file_object = openai.files.create(file: StringIO.new("Example
              data"), purpose: :assistants)


              puts(file_object)
          response: |
            {
              "id": "file-abc123",
              "object": "file",
              "bytes": 120000,
              "created_at": 1677610602,
              "expires_at": 1677614202,
              "filename": "mydata.jsonl",
              "purpose": "fine-tune",
            }
      parameters:
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
  /files/{file_id}:
