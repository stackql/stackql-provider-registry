            is 256,000 characters.
          type: string
          maxLength: 256000
        reasoning_effort:
          $ref: '#/components/schemas/ReasoningEffort'
        tools:
          description: >
            A list of tool enabled on the assistant. There can be a maximum of
            128 tools per assistant. Tools can be of types `code_interpreter`,
            `file_search`, or `function`.
          default: []
          type: array
          maxItems: 128
          items:
            oneOf:
              - $ref: '#/components/schemas/AssistantToolsCode'
              - $ref: '#/components/schemas/AssistantToolsFileSearch'
              - $ref: '#/components/schemas/AssistantToolsFunction'
        tool_resources:
          type: object
          description: >
            A set of resources that are used by the assistant's tools. The
            resources are specific to the type of tool. For example, the
            `code_interpreter` tool requires a list of file IDs, while the
            `file_search` tool requires a list of vector store IDs.
          properties:
            code_interpreter:
              type: object
              properties:
                file_ids:
                  type: array
                  description: >
                    A list of [file](/docs/api-reference/files) IDs made
                    available to the `code_interpreter` tool. There can be a
                    maximum of 20 files associated with the tool.
                  default: []
                  maxItems: 20
                  items:
                    type: string
            file_search:
              type: object
              properties:
                vector_store_ids:
                  type: array
                  description: >
                    The [vector store](/docs/api-reference/vector-stores/object)
                    attached to this assistant. There can be a maximum of 1
                    vector store attached to the assistant.
                  maxItems: 1
                  items:
                    type: string
                vector_stores:
                  type: array
                  description: >
                    A helper to create a [vector
                    store](/docs/api-reference/vector-stores/object) with
                    file_ids and attach it to this assistant. There can be a
                    maximum of 1 vector store attached to the assistant.
                  maxItems: 1
                  items:
                    type: object
                    properties:
                      file_ids:
                        type: array
                        description: >
                          A list of [file](/docs/api-reference/files) IDs to add
                          to the vector store. For vector stores created before
                          Nov 2025, there can be a maximum of 10,000 files in a
                          vector store. For vector stores created starting in
                          Nov 2025, the limit is 100,000,000 files.
                        maxItems: 100000000
                        items:
                          type: string
                      chunking_strategy:
                        type: object
                        description: >-
                          The chunking strategy used to chunk the file(s). If
                          not set, will use the `auto` strategy.
                        oneOf:
                          - type: object
                            title: Auto Chunking Strategy
                            description: >-
                              The default strategy. This strategy currently uses
                              a `max_chunk_size_tokens` of `800` and
                              `chunk_overlap_tokens` of `400`.
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                                description: Always `auto`.
                                enum:
                                  - auto
                                x-stainless-const: true
                            required:
                              - type
                          - type: object
                            title: Static Chunking Strategy
                            additionalProperties: false
                            properties:
                              type:
                                type: string
                                description: Always `static`.
                                enum:
                                  - static
                                x-stainless-const: true
                              static:
                                type: object
                                additionalProperties: false
                                properties:
                                  max_chunk_size_tokens:
                                    type: integer
                                    minimum: 100
                                    maximum: 4096
                                    description: >-
                                      The maximum number of tokens in each
                                      chunk. The default value is `800`. The
                                      minimum value is `100` and the maximum
                                      value is `4096`.
                                  chunk_overlap_tokens:
                                    type: integer
                                    description: >
                                      The number of tokens that overlap between
                                      chunks. The default value is `400`.


                                      Note that the overlap must not exceed half
                                      of `max_chunk_size_tokens`.
                                required:
                                  - max_chunk_size_tokens
                                  - chunk_overlap_tokens
                            required:
                              - type
                              - static
                      metadata:
                        $ref: '#/components/schemas/Metadata'
              oneOf:
                - required:
                    - vector_store_ids
                - required:
                    - vector_stores
        metadata:
          $ref: '#/components/schemas/Metadata'
        temperature:
          description: >
            What sampling temperature to use, between 0 and 2. Higher values
            like 0.8 will make the output more random, while lower values like
            0.2 will make it more focused and deterministic.
          type: number
          minimum: 0
          maximum: 2
          default: 1
          example: 1
        top_p:
          type: number
          minimum: 0
          maximum: 1
          default: 1
          example: 1
          description: >
            An alternative to sampling with temperature, called nucleus
            sampling, where the model considers the results of the tokens with
            top_p probability mass. So 0.1 means only the tokens comprising the
            top 10% probability mass are considered.


            We generally recommend altering this or temperature but not both.
        response_format:
          description: >
            Specifies the format that the model must output. Compatible with
            [GPT-4o](/docs/models#gpt-4o), [GPT-4
            Turbo](/docs/models#gpt-4-turbo-and-gpt-4), and all GPT-3.5 Turbo
            models since `gpt-3.5-turbo-1106`.


            Setting to `{ "type": "json_schema", "json_schema": {...} }` enables
            Structured Outputs which ensures the model will match your supplied
            JSON schema. Learn more in the [Structured Outputs
            guide](/docs/guides/structured-outputs).


            Setting to `{ "type": "json_object" }` enables JSON mode, which
            ensures the message the model generates is valid JSON.


            **Important:** when using JSON mode, you **must** also instruct the
            model to produce JSON yourself via a system or user message. Without
            this, the model may generate an unending stream of whitespace until
            the generation reaches the token limit, resulting in a long-running
            and seemingly "stuck" request. Also note that the message content
            may be partially cut off if `finish_reason="length"`, which
            indicates the generation exceeded `max_tokens` or the conversation
            exceeded the max context length.
          type: string
          enum:
            - auto
          x-stainless-const: true
          title: Text
          properties:
            type:
              type: string
              description: The type of response format being defined. Always `text`.
              enum:
                - text
              x-stainless-const: true
            json_schema:
              type: object
              title: JSON schema
              description: >
                Structured Outputs configuration options, including a JSON
                Schema.
              properties:
                description:
                  type: string
                  description: >
                    A description of what the response format is for, used by
                    the model to

                    determine how to respond in the format.
                name:
                  type: string
                  description: >
                    The name of the response format. Must be a-z, A-Z, 0-9, or
                    contain

                    underscores and dashes, with a maximum length of 64.
                schema:
                  $ref: '#/components/schemas/ResponseFormatJsonSchemaSchema'
                strict:
                  anyOf:
                    - type: boolean
                      default: false
                      description: >
                        Whether to enable strict schema adherence when
                        generating the output.

                        If set to true, the model will always follow the exact
                        schema defined

                        in the `schema` field. Only a subset of JSON Schema is
                        supported when

                        `strict` is `true`. To learn more, read the [Structured
                        Outputs

                        guide](/docs/guides/structured-outputs).
                    - type: 'null'
              required:
                - name
          required:
            - type
            - json_schema
