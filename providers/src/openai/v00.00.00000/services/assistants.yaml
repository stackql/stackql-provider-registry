            $ref: '#/components/schemas/CreateMessageRequest'
          nullable: true
        tools:
          description: >-
            Override the tools the assistant can use for this run. This is
            useful for modifying the behavior on a per-run basis.
          nullable: true
          type: array
          maxItems: 20
          items:
            oneOf:
              - $ref: '#/components/schemas/AssistantToolsCode'
              - $ref: '#/components/schemas/AssistantToolsFileSearch'
              - $ref: '#/components/schemas/AssistantToolsFunction'
        metadata:
          $ref: '#/components/schemas/Metadata'
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
          example: 1
          nullable: true
          description: >
            What sampling temperature to use, between 0 and 2. Higher values
            like 0.8 will make the output more random, while lower values like
            0.2 will make it more focused and deterministic.
        top_p:
          type: number
          minimum: 0
          maximum: 1
          default: 1
          example: 1
          nullable: true
          description: >
            An alternative to sampling with temperature, called nucleus
            sampling, where the model considers the results of the tokens with
            top_p probability mass. So 0.1 means only the tokens comprising the
            top 10% probability mass are considered.


            We generally recommend altering this or temperature but not both.
        stream:
          type: boolean
          nullable: true
          description: >
            If `true`, returns a stream of events that happen during the Run as
            server-sent events, terminating when the Run enters a terminal state
            with a `data: [DONE]` message.
        max_prompt_tokens:
          type: integer
          nullable: true
          description: >
            The maximum number of prompt tokens that may be used over the course
            of the run. The run will make a best effort to use only the number
            of prompt tokens specified, across multiple turns of the run. If the
            run exceeds the number of prompt tokens specified, the run will end
            with status `incomplete`. See `incomplete_details` for more info.
          minimum: 256
        max_completion_tokens:
          type: integer
          nullable: true
          description: >
            The maximum number of completion tokens that may be used over the
            course of the run. The run will make a best effort to use only the
            number of completion tokens specified, across multiple turns of the
            run. If the run exceeds the number of completion tokens specified,
            the run will end with status `incomplete`. See `incomplete_details`
            for more info.
          minimum: 256
        truncation_strategy:
          type: object
          title: Thread Truncation Controls
          description: >-
            Controls for how a thread will be truncated prior to the run. Use
            this to control the initial context window of the run.
          properties:
            type:
              type: string
              description: >-
                The truncation strategy to use for the thread. The default is
                `auto`. If set to `last_messages`, the thread will be truncated
                to the n most recent messages in the thread. When set to `auto`,
                messages in the middle of the thread will be dropped to fit the
                context length of the model, `max_prompt_tokens`.
              enum:
                - auto
                - last_messages
            last_messages:
              type: integer
              description: >-
                The number of most recent messages from the thread when
                constructing the context for the run.
              minimum: 1
          required:
            - type
          nullable: true
        tool_choice:
          description: >
            Controls which (if any) tool is called by the model.

            `none` means the model will not call any tools and instead generates
            a message.

            `auto` is the default value and means the model can pick between
            generating a message or calling one or more tools.

            `required` means the model must call one or more tools before
            responding to the user.

            Specifying a particular tool like `{"type": "file_search"}` or
            `{"type": "function", "function": {"name": "my_function"}}` forces
            the model to call that tool.
          type: string
          enum:
            - none
            - auto
            - required
          properties:
            type:
              type: string
              enum:
                - function
                - code_interpreter
                - file_search
              description: >-
                The type of the tool. If type is `function`, the function name
                must be set
            function:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the function to call.
              required:
                - name
          required:
            - type
          nullable: true
        parallel_tool_calls:
          $ref: '#/components/schemas/ParallelToolCalls'
        response_format:
          $ref: '#/components/schemas/AssistantsApiResponseFormatOption'
          nullable: true
