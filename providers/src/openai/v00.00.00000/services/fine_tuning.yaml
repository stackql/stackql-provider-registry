    ReasoningEffort:
      type: string
      enum:
        - none
        - minimal
        - low
        - medium
        - high
        - xhigh
      default: medium
      description: >
        Constrains effort on reasoning for

        [reasoning models](https://platform.openai.com/docs/guides/reasoning).

        Currently supported values are `none`, `minimal`, `low`, `medium`,
        `high`, and `xhigh`. Reducing

        reasoning effort can result in faster responses and fewer tokens used

        on reasoning in a response.


        - `gpt-5.1` defaults to `none`, which does not perform reasoning. The
        supported reasoning values for `gpt-5.1` are `none`, `low`, `medium`,
        and `high`. Tool calls are supported for all reasoning values in
        gpt-5.1.

        - All models before `gpt-5.1` default to `medium` reasoning effort, and
        do not support `none`.

        - The `gpt-5-pro` model defaults to (and only supports) `high` reasoning
        effort.

        - `xhigh` is supported for all models after `gpt-5.1-codex-max`.
    EvalItem:
      type: object
      title: Eval message object
      description: >
        A message input to the model with a role indicating instruction
        following

        hierarchy. Instructions given with the `developer` or `system` role take

        precedence over instructions given with the `user` role. Messages with
        the

        `assistant` role are presumed to have been generated by the model in
        previous

        interactions.
      properties:
        role:
          type: string
          description: >
            The role of the message input. One of `user`, `assistant`, `system`,
            or

            `developer`.
          enum:
            - user
            - assistant
            - system
            - developer
        content:
          $ref: '#/components/schemas/EvalItemContent'
        type:
          type: string
          description: |
            The type of the message input. Always `message`.
          enum:
            - message
          x-stainless-const: true
      required:
        - role
        - content
    GraderLabelModel:
      type: object
      title: LabelModelGrader
      description: >
        A LabelModelGrader object which uses a model to assign labels to each
        item

        in the evaluation.
      properties:
        type:
          description: The object type, which is always `label_model`.
          type: string
          enum:
            - label_model
          x-stainless-const: true
        name:
          type: string
          description: The name of the grader.
        model:
          type: string
          description: >-
            The model to use for the evaluation. Must support structured
            outputs.
        input:
          type: array
          items:
            $ref: '#/components/schemas/EvalItem'
        labels:
          type: array
          items:
            type: string
          description: The labels to assign to each item in the evaluation.
        passing_labels:
          type: array
          items:
            type: string
          description: >-
            The labels that indicate a passing result. Must be a subset of
            labels.
      required:
        - type
        - model
        - input
        - passing_labels
        - labels
        - name
      x-oaiMeta:
        name: Label Model Grader
        group: graders
        example: |
          {
            "name": "First label grader",
            "type": "label_model",
            "model": "gpt-4o-2024-08-06",
            "input": [
              {
                "type": "message",
                "role": "system",
                "content": {
                  "type": "input_text",
                  "text": "Classify the sentiment of the following statement as one of positive, neutral, or negative"
                }
              },
              {
                "type": "message",
                "role": "user",
                "content": {
                  "type": "input_text",
                  "text": "Statement: {{item.response}}"
                }
              }
            ],
            "passing_labels": [
              "positive"
            ],
            "labels": [
              "positive",
              "neutral",
              "negative"
            ]
          }
    EvalItemContent:
      title: Eval content
      description: >
        Inputs to the model - can contain template strings. Supports text,
        output text, input images, and input audio, either as a single item or
        an array of items.
      type: string
      properties:
        type:
          type: string
          enum:
            - input_text
          description: The type of the input item. Always `input_text`.
          default: input_text
          x-stainless-const: true
        text:
          type: string
          description: The text input to the model.
        image_url:
          type: string
          format: uri
          description: |
            The URL of the image input.
        detail:
          type: string
          description: >
            The detail level of the image to be sent to the model. One of
            `high`, `low`, or `auto`. Defaults to `auto`.
        input_audio:
          type: object
          properties:
            data:
              type: string
              description: |
                Base64-encoded audio data.
            format:
              type: string
              description: >
                The format of the audio data. Currently supported formats are
                `mp3` and

                `wav`.
              enum:
                - mp3
                - wav
          required:
            - data
            - format
      required:
        - type
        - text
        - image_url
        - input_audio
      items:
        $ref: '#/components/schemas/EvalItemContentItem'
    EvalItemContentItem:
      title: Eval content item
      description: >
        A single content item: input text, output text, input image, or input
        audio.
      type: string
      properties:
        type:
          type: string
          enum:
            - input_text
          description: The type of the input item. Always `input_text`.
          default: input_text
          x-stainless-const: true
        text:
          type: string
          description: The text input to the model.
        image_url:
          type: string
          format: uri
          description: |
            The URL of the image input.
        detail:
          type: string
          description: >
            The detail level of the image to be sent to the model. One of
            `high`, `low`, or `auto`. Defaults to `auto`.
        input_audio:
          type: object
          properties:
            data:
              type: string
              description: |
                Base64-encoded audio data.
            format:
              type: string
              description: >
                The format of the audio data. Currently supported formats are
                `mp3` and

                `wav`.
              enum:
                - mp3
                - wav
          required:
            - data
            - format
      required:
        - type
        - text
        - image_url
        - input_audio
    EvalItemContentArray:
      type: array
      title: An array of Input text, Output text, Input image, and Input audio
      description: >
        A list of inputs, each of which may be either an input text, output
        text, input

        image, or input audio object.
      items:
        $ref: '#/components/schemas/EvalItemContentItem'
    EvalItemContentText:
      type: string
      title: Text input
      description: |
        A text input to the model.
    InputTextContent:
      properties:
        type:
          type: string
          enum:
            - input_text
          description: The type of the input item. Always `input_text`.
          default: input_text
          x-stainless-const: true
        text:
          type: string
          description: The text input to the model.
      type: object
      required:
        - type
        - text
      title: Input text
      description: A text input to the model.
    EvalItemContentOutputText:
      type: object
      title: Output text
      description: |
        A text output from the model.
      properties:
        type:
          type: string
          description: |
            The type of the output text. Always `output_text`.
          enum:
            - output_text
          x-stainless-const: true
        text:
          type: string
          description: |
            The text output from the model.
      required:
        - type
        - text
    EvalItemInputImage:
      title: Input image
      description: An image input block used within EvalItem content arrays.
      type: object
      properties:
        type:
          type: string
          description: |
            The type of the image input. Always `input_image`.
          enum:
            - input_image
          x-stainless-const: true
        image_url:
          type: string
          format: uri
          description: |
            The URL of the image input.
        detail:
          type: string
          description: >
            The detail level of the image to be sent to the model. One of
            `high`, `low`, or `auto`. Defaults to `auto`.
      required:
        - type
        - image_url
    InputAudio:
      type: object
      title: Input audio
      description: |
        An audio input to the model.
      properties:
        type:
          type: string
          description: |
            The type of the input item. Always `input_audio`.
          enum:
            - input_audio
          x-stainless-const: true
        input_audio:
          type: object
          properties:
            data:
              type: string
              description: |
                Base64-encoded audio data.
            format:
              type: string
              description: >
                The format of the audio data. Currently supported formats are
                `mp3` and

                `wav`.
              enum:
                - mp3
                - wav
          required:
            - data
            - format
      required:
        - type
        - input_audio
