openapi: 3.1.0
info:
  title: fine_tuning API
  description: openai API
  version: 2.3.0
paths:
  /fine_tuning/checkpoints/{fine_tuned_model_checkpoint}/permissions:
    get:
      operationId: listFineTuningCheckpointPermissions
      tags:
        - Fine-tuning
      summary: >
        **NOTE:** This endpoint requires an [admin API key](../admin-api-keys).


        Organization owners can use this endpoint to view all permissions for a
        fine-tuned model checkpoint.
      parameters:
        - in: path
          name: fine_tuned_model_checkpoint
          required: true
          schema:
            type: string
            example: ft-AF1WoRqd3aJAHsqc9NY7iL8F
          description: |
            The ID of the fine-tuned model checkpoint to get permissions for.
        - name: project_id
          in: query
          description: The ID of the project to get permissions for.
          required: false
          schema:
            type: string
        - name: after
          in: query
          description: >-
            Identifier for the last permission ID from the previous pagination
            request.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: >-
            Number of permissions to retrieve.


            Automatically applied from a SQL `LIMIT` clause - `SELECT ... LIMIT
            10` sends `limit=10` on the wire. Setting it explicitly in a `WHERE`
            clause is not required.
          required: false
          schema:
            type: integer
            default: 10
        - name: order
          in: query
          description: The order in which to retrieve permissions.
          required: false
          schema:
            type: string
            enum:
              - ascending
              - descending
            default: descending
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/ListFineTuningCheckpointPermissionResponse
      x-oaiMeta:
        name: List checkpoint permissions
        group: fine-tuning
        examples:
          request:
            curl: >
              curl
              https://api.openai.com/v1/fine_tuning/checkpoints/ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd/permissions
              \
                -H "Authorization: Bearer $OPENAI_API_KEY"
            node.js: >-
              import OpenAI from 'openai';


              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });


              const permission = await
              client.fineTuning.checkpoints.permissions.retrieve(
                'ft-AF1WoRqd3aJAHsqc9NY7iL8F',
              );


              console.log(permission.first_id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              permission = client.fine_tuning.checkpoints.permissions.retrieve(
                  fine_tuned_model_checkpoint="ft-AF1WoRqd3aJAHsqc9NY7iL8F",
              )
              print(permission.first_id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tpermission, err := client.FineTuning.Checkpoints.Permissions.Get(\n\t\tcontext.TODO(),\n\t\t\"ft-AF1WoRqd3aJAHsqc9NY7iL8F\",\n\t\topenai.FineTuningCheckpointPermissionGetParams{},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", permission.FirstID)\n}\n"
            java: >-
              package com.openai.example;


              import com.openai.client.OpenAIClient;

              import com.openai.client.okhttp.OpenAIOkHttpClient;

              import
              com.openai.models.finetuning.checkpoints.permissions.PermissionRetrieveParams;

              import
              com.openai.models.finetuning.checkpoints.permissions.PermissionRetrieveResponse;


              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      PermissionRetrieveResponse permission = client.fineTuning().checkpoints().permissions().retrieve("ft-AF1WoRqd3aJAHsqc9NY7iL8F");
                  }
              }
            ruby: >-
              require "openai"


              openai = OpenAI::Client.new(api_key: "My API Key")


              permission =
              openai.fine_tuning.checkpoints.permissions.retrieve("ft-AF1WoRqd3aJAHsqc9NY7iL8F")


              puts(permission)
          response: |
            {
              "object": "list",
              "data": [
                {
                  "object": "checkpoint.permission",
                  "id": "cp_zc4Q7MP6XxulcVzj4MZdwsAB",
                  "created_at": 1721764867,
                  "project_id": "proj_abGMw1llN8IrBb6SvvY5A1iH"
                },
                {
                  "object": "checkpoint.permission",
                  "id": "cp_enQCFmOTGj3syEpYVhBRLTSy",
                  "created_at": 1721764800,
                  "project_id": "proj_iqGMw1llN8IrBb6SvvY5A1oF"
                },
              ],
              "first_id": "cp_zc4Q7MP6XxulcVzj4MZdwsAB",
              "last_id": "cp_enQCFmOTGj3syEpYVhBRLTSy",
              "has_more": false
            }
    post:
      operationId: createFineTuningCheckpointPermission
      tags:
        - Fine-tuning
      summary: >
        **NOTE:** Calling this endpoint requires an [admin API
        key](../admin-api-keys).


        This enables organization owners to share fine-tuned models with other
        projects in their organization.
      parameters:
        - in: path
          name: fine_tuned_model_checkpoint
          required: true
          schema:
            type: string
            example: ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd
          description: >
            The ID of the fine-tuned model checkpoint to create a permission
            for.
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFineTuningCheckpointPermissionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/ListFineTuningCheckpointPermissionResponse
      x-oaiMeta:
        name: Create checkpoint permissions
        group: fine-tuning
        examples:
          request:
            curl: >
              curl
              https://api.openai.com/v1/fine_tuning/checkpoints/ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd/permissions
              \
                -H "Authorization: Bearer $OPENAI_API_KEY"
                -d '{"project_ids": ["proj_abGMw1llN8IrBb6SvvY5A1iH"]}'
            node.js: >-
              import OpenAI from 'openai';


              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });


              // Automatically fetches more pages as needed.

              for await (const permissionCreateResponse of
              client.fineTuning.checkpoints.permissions.create(
                'ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd',
                { project_ids: ['string'] },
              )) {
                console.log(permissionCreateResponse.id);
              }
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              page = client.fine_tuning.checkpoints.permissions.create(
                  fine_tuned_model_checkpoint="ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd",
                  project_ids=["string"],
              )
              page = page.data[0]
              print(page.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tpage, err := client.FineTuning.Checkpoints.Permissions.New(\n\t\tcontext.TODO(),\n\t\t\"ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd\",\n\t\topenai.FineTuningCheckpointPermissionNewParams{\n\t\t\tProjectIDs: []string{\"string\"},\n\t\t},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", page)\n}\n"
            java: >-
              package com.openai.example;


              import com.openai.client.OpenAIClient;

              import com.openai.client.okhttp.OpenAIOkHttpClient;

              import
              com.openai.models.finetuning.checkpoints.permissions.PermissionCreatePage;

              import
              com.openai.models.finetuning.checkpoints.permissions.PermissionCreateParams;


              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      PermissionCreateParams params = PermissionCreateParams.builder()
                          .fineTunedModelCheckpoint("ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd")
                          .addProjectId("string")
                          .build();
                      PermissionCreatePage page = client.fineTuning().checkpoints().permissions().create(params);
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(api_key: "My API Key")

              page = openai.fine_tuning.checkpoints.permissions.create(
                "ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd",
                project_ids: ["string"]
              )

              puts(page)
          response: |
            {
              "object": "list",
              "data": [
                {
                  "object": "checkpoint.permission",
                  "id": "cp_zc4Q7MP6XxulcVzj4MZdwsAB",
                  "created_at": 1721764867,
                  "project_id": "proj_abGMw1llN8IrBb6SvvY5A1iH"
                }
              ],
              "first_id": "cp_zc4Q7MP6XxulcVzj4MZdwsAB",
              "last_id": "cp_zc4Q7MP6XxulcVzj4MZdwsAB",
              "has_more": false
            }
  /fine_tuning/checkpoints/{fine_tuned_model_checkpoint}/permissions/{permission_id}:
    delete:
      operationId: deleteFineTuningCheckpointPermission
      tags:
        - Fine-tuning
      summary: >
        **NOTE:** This endpoint requires an [admin API key](../admin-api-keys).


        Organization owners can use this endpoint to delete a permission for a
        fine-tuned model checkpoint.
      parameters:
        - in: path
          name: fine_tuned_model_checkpoint
          required: true
          schema:
            type: string
            example: ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd
          description: >
            The ID of the fine-tuned model checkpoint to delete a permission
            for.
        - in: path
          name: permission_id
          required: true
          schema:
            type: string
            example: cp_zc4Q7MP6XxulcVzj4MZdwsAB
          description: |
            The ID of the fine-tuned model checkpoint permission to delete.
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/DeleteFineTuningCheckpointPermissionResponse
      x-oaiMeta:
        name: Delete checkpoint permission
        group: fine-tuning
        examples:
          request:
            curl: >
              curl
              https://api.openai.com/v1/fine_tuning/checkpoints/ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd/permissions/cp_zc4Q7MP6XxulcVzj4MZdwsAB
              \
                -H "Authorization: Bearer $OPENAI_API_KEY"
            node.js: >-
              import OpenAI from 'openai';


              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });


              const permission = await
              client.fineTuning.checkpoints.permissions.delete(
                'cp_zc4Q7MP6XxulcVzj4MZdwsAB',
                { fine_tuned_model_checkpoint: 'ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd' },
              );


              console.log(permission.id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              permission = client.fine_tuning.checkpoints.permissions.delete(
                  permission_id="cp_zc4Q7MP6XxulcVzj4MZdwsAB",
                  fine_tuned_model_checkpoint="ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd",
              )
              print(permission.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tpermission, err := client.FineTuning.Checkpoints.Permissions.Delete(\n\t\tcontext.TODO(),\n\t\t\"ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd\",\n\t\t\"cp_zc4Q7MP6XxulcVzj4MZdwsAB\",\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", permission.ID)\n}\n"
            java: >-
              package com.openai.example;


              import com.openai.client.OpenAIClient;

              import com.openai.client.okhttp.OpenAIOkHttpClient;

              import
              com.openai.models.finetuning.checkpoints.permissions.PermissionDeleteParams;

              import
              com.openai.models.finetuning.checkpoints.permissions.PermissionDeleteResponse;


              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      PermissionDeleteParams params = PermissionDeleteParams.builder()
                          .fineTunedModelCheckpoint("ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd")
                          .permissionId("cp_zc4Q7MP6XxulcVzj4MZdwsAB")
                          .build();
                      PermissionDeleteResponse permission = client.fineTuning().checkpoints().permissions().delete(params);
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(api_key: "My API Key")

              permission = openai.fine_tuning.checkpoints.permissions.delete(
                "cp_zc4Q7MP6XxulcVzj4MZdwsAB",
                fine_tuned_model_checkpoint: "ft:gpt-4o-mini-2024-07-18:org:weather:B7R9VjQd"
              )

              puts(permission)
          response: |
            {
              "object": "checkpoint.permission",
              "id": "cp_zc4Q7MP6XxulcVzj4MZdwsAB",
              "deleted": true
            }
  /fine_tuning/jobs:
    post:
      operationId: createFineTuningJob
      tags:
        - Fine-tuning
      summary: >
        Creates a fine-tuning job which begins the process of creating a new
        model from a given dataset.


        Response includes details of the enqueued job including job status and
        the name of the fine-tuned models once complete.


        [Learn more about fine-tuning](/docs/guides/model-optimization)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFineTuningJobRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FineTuningJob'
      x-oaiMeta:
        name: Create fine-tuning job
        group: fine-tuning
        examples:
          - title: Default
            request:
              curl: |
                curl https://api.openai.com/v1/fine_tuning/jobs \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -d '{
                    "training_file": "file-BK7bzQj3FfZFXr7DbL6xJwfo",
                    "model": "gpt-4o-mini"
                  }'
              python: |-
                import os
                from openai import OpenAI

                client = OpenAI(
                    api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
                )
                fine_tuning_job = client.fine_tuning.jobs.create(
                    model="gpt-4o-mini",
                    training_file="file-abc123",
                )
                print(fine_tuning_job.id)
              javascript: |
                import OpenAI from "openai";

                const openai = new OpenAI();

                async function main() {
                  const fineTune = await openai.fineTuning.jobs.create({
                    training_file: "file-abc123"
                  });

                  console.log(fineTune);
                }

                main();
              node.js: |-
                import OpenAI from 'openai';

                const client = new OpenAI({
                  apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
                });

                const fineTuningJob = await client.fineTuning.jobs.create({
                  model: 'gpt-4o-mini',
                  training_file: 'file-abc123',
                });

                console.log(fineTuningJob.id);
              go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tfineTuningJob, err := client.FineTuning.Jobs.New(context.TODO(), openai.FineTuningJobNewParams{\n\t\tModel:        openai.FineTuningJobNewParamsModelGPT4oMini,\n\t\tTrainingFile: \"file-abc123\",\n\t})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", fineTuningJob.ID)\n}\n"
              java: |-
                package com.openai.example;

                import com.openai.client.OpenAIClient;
                import com.openai.client.okhttp.OpenAIOkHttpClient;
                import com.openai.models.finetuning.jobs.FineTuningJob;
                import com.openai.models.finetuning.jobs.JobCreateParams;

                public final class Main {
                    private Main() {}

                    public static void main(String[] args) {
                        OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                        JobCreateParams params = JobCreateParams.builder()
                            .model(JobCreateParams.Model.GPT_4O_MINI)
                            .trainingFile("file-abc123")
                            .build();
                        FineTuningJob fineTuningJob = client.fineTuning().jobs().create(params);
                    }
                }
              ruby: >-
                require "openai"


                openai = OpenAI::Client.new(api_key: "My API Key")


                fine_tuning_job = openai.fine_tuning.jobs.create(model:
                :"gpt-4o-mini", training_file: "file-abc123")


                puts(fine_tuning_job)
            response: |
              {
                "object": "fine_tuning.job",
