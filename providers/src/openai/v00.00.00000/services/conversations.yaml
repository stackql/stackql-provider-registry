openapi: 3.1.0
info:
  title: conversations API
  description: openai API
  version: 2.3.0
paths:
  /conversations/{conversation_id}/items:
    post:
      operationId: createConversationItems
      tags:
        - Conversations
      summary: Create items in a conversation with the given ID.
      parameters:
        - in: path
          name: conversation_id
          required: true
          schema:
            type: string
            example: conv_123
          description: The ID of the conversation to add the item to.
        - name: include
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/IncludeEnum'
          description: >
            Additional fields to include in the response. See the `include`

            parameter for [listing Conversation items
            above](/docs/api-reference/conversations/list-items#conversations_list_items-include)
            for more information.
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                items:
                  type: array
                  description: >
                    The items to add to the conversation. You may add up to 20
                    items at a time.
                  items:
                    $ref: '#/components/schemas/InputItem'
                  maxItems: 20
              required:
                - items
              type: object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationItemList'
      x-oaiMeta:
        name: Create items
        group: conversations
        path: create-item
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/conversations/conv_123/items \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -d '{
                  "items": [
                    {
                      "type": "message",
                      "role": "user",
                      "content": [
                        {"type": "input_text", "text": "Hello!"}
                      ]
                    },
                    {
                      "type": "message",
                      "role": "user",
                      "content": [
                        {"type": "input_text", "text": "How are you?"}
                      ]
                    }
                  ]
                }'
            javascript: |
              import OpenAI from "openai";
              const client = new OpenAI();

              const items = await client.conversations.items.create(
                "conv_123",
                {
                  items: [
                    {
                      type: "message",
                      role: "user",
                      content: [{ type: "input_text", text: "Hello!" }],
                    },
                    {
                      type: "message",
                      role: "user",
                      content: [{ type: "input_text", text: "How are you?" }],
                    },
                  ],
                }
              );
              console.log(items.data);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              conversation_item_list = client.conversations.items.create(
                  conversation_id="conv_123",
                  items=[{
                      "content": "string",
                      "role": "user",
                      "type": "message",
                  }],
              )
              print(conversation_item_list.first_id)
            csharp: |
              using System;
              using System.Collections.Generic;
              using OpenAI.Conversations;

              OpenAIConversationClient client = new(
                  apiKey: Environment.GetEnvironmentVariable("OPENAI_API_KEY")
              );

              ConversationItemList created = client.ConversationItems.Create(
                  conversationId: "conv_123",
                  new CreateConversationItemsOptions
                  {
                      Items = new List<ConversationItem>
                      {
                          new ConversationMessage
                          {
                              Role = "user",
                              Content =
                              {
                                  new ConversationInputText { Text = "Hello!" }
                              }
                          },
                          new ConversationMessage
                          {
                              Role = "user",
                              Content =
                              {
                                  new ConversationInputText { Text = "How are you?" }
                              }
                          }
                      }
                  }
              );
              Console.WriteLine(created.Data.Count);
            node.js: >-
              import OpenAI from 'openai';


              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });


              const conversationItemList = await
              client.conversations.items.create('conv_123', {
                items: [
                  {
                    content: 'string',
                    role: 'user',
                    type: 'message',
                  },
                ],
              });


              console.log(conversationItemList.first_id);
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/conversations\"\n\t\"github.com/openai/openai-go/option\"\n\t\"github.com/openai/openai-go/responses\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tconversationItemList, err := client.Conversations.Items.New(\n\t\tcontext.TODO(),\n\t\t\"conv_123\",\n\t\tconversations.ItemNewParams{\n\t\t\tItems: []responses.ResponseInputItemUnionParam{{\n\t\t\t\tOfMessage: &responses.EasyInputMessageParam{\n\t\t\t\t\tContent: responses.EasyInputMessageContentUnionParam{\n\t\t\t\t\t\tOfString: openai.String(\"string\"),\n\t\t\t\t\t},\n\t\t\t\t\tRole: responses.EasyInputMessageRoleUser,\n\t\t\t\t\tType: responses.EasyInputMessageTypeMessage,\n\t\t\t\t},\n\t\t\t}},\n\t\t},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", conversationItemList.FirstID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.conversations.items.ConversationItemList;
              import com.openai.models.conversations.items.ItemCreateParams;
              import com.openai.models.responses.EasyInputMessage;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      ItemCreateParams params = ItemCreateParams.builder()
                          .conversationId("conv_123")
                          .addItem(EasyInputMessage.builder()
                              .content("string")
                              .role(EasyInputMessage.Role.USER)
                              .type(EasyInputMessage.Type.MESSAGE)
                              .build())
                          .build();
                      ConversationItemList conversationItemList = client.conversations().items().create(params);
                  }
              }
            ruby: >-
              require "openai"


              openai = OpenAI::Client.new(api_key: "My API Key")


              conversation_item_list =
              openai.conversations.items.create("conv_123", items: [{content:
              "string", role: :user, type: :message}])


              puts(conversation_item_list)
          response: |
            {
              "object": "list",
              "data": [
                {
                  "type": "message",
                  "id": "msg_abc",
                  "status": "completed",
                  "role": "user",
                  "content": [
