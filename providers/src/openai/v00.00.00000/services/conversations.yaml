                  ]
                }
              ],
              "first_id": "msg_abc",
              "last_id": "msg_def",
              "has_more": false
            }
    get:
      operationId: listConversationItems
      tags:
        - Conversations
      summary: List all items for a conversation with the given ID.
      parameters:
        - in: path
          name: conversation_id
          required: true
          schema:
            type: string
            example: conv_123
          description: The ID of the conversation to list items for.
        - name: limit
          in: query
          description: >-
            A limit on the number of objects to be returned. Limit can range
            between

            1 and 100, and the default is 20.


            Automatically applied from a SQL `LIMIT` clause - `SELECT ... LIMIT
            10` sends `limit=10` on the wire. Setting it explicitly in a `WHERE`
            clause is not required.
          required: false
          schema:
            type: integer
            default: 20
        - in: query
          name: order
          schema:
            type: string
            enum:
              - asc
              - desc
          description: |
            The order to return the input items in. Default is `desc`.
            - `asc`: Return the input items in ascending order.
            - `desc`: Return the input items in descending order.
        - in: query
          name: after
          schema:
            type: string
          description: |
            An item ID to list items after, used in pagination.
        - name: include
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/IncludeEnum'
          description: >-
            Specify additional output data to include in the model response.
            Currently supported values are:

            - `web_search_call.action.sources`: Include the sources of the web
            search tool call.

            - `code_interpreter_call.outputs`: Includes the outputs of python
            code execution in code interpreter tool call items.

            - `computer_call_output.output.image_url`: Include image urls from
            the computer call output.

            - `file_search_call.results`: Include the search results of the file
            search tool call.

            - `message.input_image.image_url`: Include image urls from the input
            message.

            - `message.output_text.logprobs`: Include logprobs with assistant
            messages.

            - `reasoning.encrypted_content`: Includes an encrypted version of
            reasoning tokens in reasoning item outputs. This enables reasoning
            items to be used in multi-turn conversations when using the
            Responses API statelessly (like when the `store` parameter is set to
            `false`, or when an organization is enrolled in the zero data
            retention program).
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationItemList'
      x-oaiMeta:
        name: List items
        group: conversations
        path: list-items
        examples:
          request:
            curl: >
              curl
              "https://api.openai.com/v1/conversations/conv_123/items?limit=10"
              \
                -H "Authorization: Bearer $OPENAI_API_KEY"
            javascript: >
              import OpenAI from "openai";

              const client = new OpenAI();


              const items = await client.conversations.items.list("conv_123", {
              limit: 10 });

              console.log(items.data);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              page = client.conversations.items.list(
                  conversation_id="conv_123",
              )
              page = page.data[0]
              print(page)
            csharp: |
              using System;
              using OpenAI.Conversations;

              OpenAIConversationClient client = new(
                  apiKey: Environment.GetEnvironmentVariable("OPENAI_API_KEY")
              );

              ConversationItemList items = client.ConversationItems.List(
                  conversationId: "conv_123",
                  new ListConversationItemsOptions { Limit = 10 }
              );
              Console.WriteLine(items.Data.Count);
            node.js: >-
              import OpenAI from 'openai';


              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });


              // Automatically fetches more pages as needed.

              for await (const conversationItem of
              client.conversations.items.list('conv_123')) {
                console.log(conversationItem);
              }
