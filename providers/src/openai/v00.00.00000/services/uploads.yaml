openapi: 3.1.0
info:
  title: uploads API
  description: openai API
  version: 2.3.0
paths:
  /uploads:
    post:
      operationId: createUpload
      tags:
        - Uploads
      summary: >
        Creates an intermediate [Upload](/docs/api-reference/uploads/object)
        object

        that you can add [Parts](/docs/api-reference/uploads/part-object) to.

        Currently, an Upload can accept at most 8 GB in total and expires after
        an

        hour after you create it.


        Once you complete the Upload, we will create a

        [File](/docs/api-reference/files/object) object that contains all the
        parts

        you uploaded. This File is usable in the rest of our platform as a
        regular

        File object.


        For certain `purpose` values, the correct `mime_type` must be
        specified. 

        Please refer to documentation for the 

        [supported MIME types for your use
        case](/docs/assistants/tools/file-search#supported-files).


        For guidance on the proper filename extensions for each purpose, please

        follow the documentation on [creating a

        File](/docs/api-reference/files/create).


        Returns the Upload object with status `pending`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Upload'
      x-oaiMeta:
        name: Create upload
        group: uploads
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/uploads \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -d '{
                  "purpose": "fine-tune",
                  "filename": "training_examples.jsonl",
                  "bytes": 2147483648,
                  "mime_type": "text/jsonl",
                  "expires_after": {
                    "anchor": "created_at",
                    "seconds": 3600
                  }
                }'
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });

              const upload = await client.uploads.create({
                bytes: 0,
                filename: 'filename',
                mime_type: 'mime_type',
                purpose: 'assistants',
              });

              console.log(upload.id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              upload = client.uploads.create(
                  bytes=0,
                  filename="filename",
                  mime_type="mime_type",
                  purpose="assistants",
              )
              print(upload.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tupload, err := client.Uploads.New(context.TODO(), openai.UploadNewParams{\n\t\tBytes:    0,\n\t\tFilename: \"filename\",\n\t\tMimeType: \"mime_type\",\n\t\tPurpose:  openai.FilePurposeAssistants,\n\t})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", upload.ID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.files.FilePurpose;
              import com.openai.models.uploads.Upload;
              import com.openai.models.uploads.UploadCreateParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      UploadCreateParams params = UploadCreateParams.builder()
                          .bytes(0L)
                          .filename("filename")
                          .mimeType("mime_type")
                          .purpose(FilePurpose.ASSISTANTS)
                          .build();
                      Upload upload = client.uploads().create(params);
                  }
              }
            ruby: >-
              require "openai"


              openai = OpenAI::Client.new(api_key: "My API Key")


              upload = openai.uploads.create(bytes: 0, filename: "filename",
              mime_type: "mime_type", purpose: :assistants)


              puts(upload)
          response: |
            {
              "id": "upload_abc123",
              "object": "upload",
              "bytes": 2147483648,
              "created_at": 1719184911,
              "filename": "training_examples.jsonl",
              "purpose": "fine-tune",
              "status": "pending",
              "expires_at": 1719127296
            }
      parameters:
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
  /uploads/{upload_id}/cancel:
    post:
      operationId: cancelUpload
      tags:
        - Uploads
      summary: |
        Cancels the Upload. No Parts may be added after an Upload is cancelled.

        Returns the Upload object with status `cancelled`.
      parameters:
        - in: path
          name: upload_id
          required: true
          schema:
            type: string
            example: upload_abc123
          description: |
            The ID of the Upload.
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Upload'
      x-oaiMeta:
        name: Cancel upload
        group: uploads
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/uploads/upload_abc123/cancel
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });

              const upload = await client.uploads.cancel('upload_abc123');

              console.log(upload.id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              upload = client.uploads.cancel(
                  "upload_abc123",
              )
              print(upload.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tupload, err := client.Uploads.Cancel(context.TODO(), \"upload_abc123\")\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", upload.ID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.uploads.Upload;
              import com.openai.models.uploads.UploadCancelParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      Upload upload = client.uploads().cancel("upload_abc123");
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(api_key: "My API Key")

              upload = openai.uploads.cancel("upload_abc123")

              puts(upload)
          response: |
            {
              "id": "upload_abc123",
              "object": "upload",
              "bytes": 2147483648,
              "created_at": 1719184911,
              "filename": "training_examples.jsonl",
              "purpose": "fine-tune",
              "status": "cancelled",
              "expires_at": 1719127296
            }
  /uploads/{upload_id}/complete:
    post:
      operationId: completeUpload
      tags:
        - Uploads
      summary: >
        Completes the [Upload](/docs/api-reference/uploads/object). 


        Within the returned Upload object, there is a nested
        [File](/docs/api-reference/files/object) object that is ready to use in
        the rest of the platform.


        You can specify the order of the Parts by passing in an ordered list of
        the Part IDs.


        The number of bytes uploaded upon completion must match the number of
        bytes initially specified when creating the Upload object. No Parts may
        be added after an Upload is completed.

        Returns the Upload object with status `completed`, including an
        additional `file` property containing the created usable File object.
      parameters:
        - in: path
          name: upload_id
          required: true
          schema:
            type: string
            example: upload_abc123
          description: |
            The ID of the Upload.
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteUploadRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Upload'
      x-oaiMeta:
        name: Complete upload
        group: uploads
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/uploads/upload_abc123/complete
                -d '{
                  "part_ids": ["part_def456", "part_ghi789"]
                }'
            node.js: >-
              import OpenAI from 'openai';


              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });


              const upload = await client.uploads.complete('upload_abc123', {
              part_ids: ['string'] });


              console.log(upload.id);
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              upload = client.uploads.complete(
                  upload_id="upload_abc123",
                  part_ids=["string"],
              )
              print(upload.id)
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\n\t\"github.com/openai/openai-go/option\"\n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tupload, err := client.Uploads.Complete(\n\t\tcontext.TODO(),\n\t\t\"upload_abc123\",\n\t\topenai.UploadCompleteParams{\n\t\t\tPartIDs: []string{\"string\"},\n\t\t},\n\t)\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", upload.ID)\n}\n"
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.uploads.Upload;
              import com.openai.models.uploads.UploadCompleteParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      UploadCompleteParams params = UploadCompleteParams.builder()
                          .uploadId("upload_abc123")
                          .addPartId("string")
                          .build();
                      Upload upload = client.uploads().complete(params);
                  }
              }
            ruby: >-
              require "openai"


              openai = OpenAI::Client.new(api_key: "My API Key")


              upload = openai.uploads.complete("upload_abc123", part_ids:
              ["string"])


              puts(upload)
          response: |
            {
              "id": "upload_abc123",
              "object": "upload",
              "bytes": 2147483648,
              "created_at": 1719184911,
              "filename": "training_examples.jsonl",
              "purpose": "fine-tune",
              "status": "completed",
              "expires_at": 1719127296,
              "file": {
                "id": "file-xyz321",
                "object": "file",
                "bytes": 2147483648,
                "created_at": 1719186911,
                "expires_at": 1719127296,
                "filename": "training_examples.jsonl",
                "purpose": "fine-tune",
              }
            }
components:
  schemas:
    CreateUploadRequest:
      type: object
      additionalProperties: false
      properties:
        filename:
          description: |
            The name of the file to upload.
          type: string
        purpose:
          description: |
            The intended purpose of the uploaded file.

            See the [documentation on File
            purposes](/docs/api-reference/files/create#files-create-purpose).
          type: string
          enum:
            - assistants
            - batch
            - fine-tune
            - vision
        bytes:
          description: |
            The number of bytes in the file you are uploading.
          type: integer
        mime_type:
          description: >
            The MIME type of the file.



            This must fall within the supported MIME types for your file
            purpose. See

            the supported MIME types for assistants and vision.
          type: string
        expires_after:
          $ref: '#/components/schemas/FileExpirationAfter'
      required:
        - filename
        - purpose
        - bytes
        - mime_type
    Upload:
      type: object
      title: Upload
      description: |
        The Upload object can accept byte chunks in the form of Parts.
      properties:
        id:
          type: string
          description: >-
            The Upload unique identifier, which can be referenced in API
            endpoints.
        created_at:
          type: integer
          format: unixtime
          description: The Unix timestamp (in seconds) for when the Upload was created.
        filename:
          type: string
          description: The name of the file to be uploaded.
        bytes:
          type: integer
          description: The intended number of bytes to be uploaded.
        purpose:
          type: string
          description: >-
            The intended purpose of the file. [Please refer
            here](/docs/api-reference/files/object#files/object-purpose) for
            acceptable values.
        status:
          type: string
          description: The status of the Upload.
          enum:
            - pending
            - completed
            - cancelled
            - expired
        expires_at:
          type: integer
          format: unixtime
          description: The Unix timestamp (in seconds) for when the Upload will expire.
        object:
          type: string
          description: The object type, which is always "upload".
          enum:
            - upload
          x-stainless-const: true
        file:
          title: OpenAIFile
          description: >-
            The `File` object represents a document that has been uploaded to
            OpenAI.
          properties:
            id:
              type: string
              description: >-
                The file identifier, which can be referenced in the API
                endpoints.
            bytes:
              type: integer
              description: The size of the file, in bytes.
            created_at:
              type: integer
              format: unixtime
              description: The Unix timestamp (in seconds) for when the file was created.
            expires_at:
              type: integer
              format: unixtime
              description: The Unix timestamp (in seconds) for when the file will expire.
            filename:
              type: string
              description: The name of the file.
            object:
              type: string
              description: The object type, which is always `file`.
              enum:
                - file
              x-stainless-const: true
            purpose:
              type: string
              description: >-
                The intended purpose of the file. Supported values are
                `assistants`, `assistants_output`, `batch`, `batch_output`,
                `fine-tune`, `fine-tune-results`, `vision`, and `user_data`.
              enum:
                - assistants
                - assistants_output
                - batch
                - batch_output
                - fine-tune
                - fine-tune-results
                - vision
                - user_data
            status:
              type: string
              deprecated: true
              description: >-
                Deprecated. The current status of the file, which can be either
                `uploaded`, `processed`, or `error`.
              enum:
                - uploaded
                - processed
                - error
            status_details:
              type: string
              deprecated: true
              description: >-
                Deprecated. For details on why a fine-tuning training file
                failed validation, see the `error` field on `fine_tuning.job`.
          required:
            - id
            - object
            - bytes
            - created_at
            - filename
            - purpose
            - status
          x-oaiMeta:
            name: The file object
            example: |
              {
                "id": "file-abc123",
                "object": "file",
                "bytes": 120000,
                "created_at": 1677610602,
                "expires_at": 1680202602,
                "filename": "salesOverview.pdf",
                "purpose": "assistants",
              }
          type: object
          nullable: true
      required:
        - bytes
        - created_at
        - expires_at
        - filename
        - id
        - purpose
        - status
      x-oaiMeta:
        name: The upload object
        example: |
          {
            "id": "upload_abc123",
            "object": "upload",
            "bytes": 2147483648,
            "created_at": 1719184911,
            "filename": "training_examples.jsonl",
            "purpose": "fine-tune",
            "status": "completed",
            "expires_at": 1719127296,
            "file": {
              "id": "file-xyz321",
              "object": "file",
              "bytes": 2147483648,
              "created_at": 1719186911,
              "filename": "training_examples.jsonl",
              "purpose": "fine-tune",
            }
          }
    CompleteUploadRequest:
      type: object
      additionalProperties: false
      properties:
        part_ids:
          type: array
          description: |
            The ordered list of Part IDs.
          items:
            type: string
        md5:
          description: >
            The optional md5 checksum for the file contents to verify if the
            bytes uploaded matches what you expect.
          type: string
      required:
        - part_ids
    FileExpirationAfter:
      type: object
      title: File expiration policy
      description: >-
        The expiration policy for a file. By default, files with `purpose=batch`
        expire after 30 days and all other files are persisted until they are
        manually deleted.
      properties:
        anchor:
          description: >-
            Anchor timestamp after which the expiration policy applies.
            Supported anchors: `created_at`.
          type: string
          enum:
            - created_at
          x-stainless-const: true
        seconds:
          description: >-
            The number of seconds after the anchor time that the file will
            expire. Must be between 3600 (1 hour) and 2592000 (30 days).
          type: integer
          format: int64
          minimum: 3600
          maximum: 2592000
      required:
        - anchor
        - seconds
    OpenAIFile:
      title: OpenAIFile
      description: >-
        The `File` object represents a document that has been uploaded to
        OpenAI.
      properties:
        id:
          type: string
          description: The file identifier, which can be referenced in the API endpoints.
        bytes:
          type: integer
          description: The size of the file, in bytes.
        created_at:
          type: integer
          format: unixtime
          description: The Unix timestamp (in seconds) for when the file was created.
        expires_at:
          type: integer
          format: unixtime
          description: The Unix timestamp (in seconds) for when the file will expire.
        filename:
          type: string
          description: The name of the file.
        object:
          type: string
          description: The object type, which is always `file`.
          enum:
            - file
          x-stainless-const: true
        purpose:
          type: string
          description: >-
            The intended purpose of the file. Supported values are `assistants`,
            `assistants_output`, `batch`, `batch_output`, `fine-tune`,
            `fine-tune-results`, `vision`, and `user_data`.
          enum:
            - assistants
            - assistants_output
            - batch
            - batch_output
            - fine-tune
            - fine-tune-results
            - vision
            - user_data
        status:
          type: string
          deprecated: true
          description: >-
            Deprecated. The current status of the file, which can be either
            `uploaded`, `processed`, or `error`.
          enum:
            - uploaded
            - processed
            - error
        status_details:
          type: string
          deprecated: true
          description: >-
            Deprecated. For details on why a fine-tuning training file failed
            validation, see the `error` field on `fine_tuning.job`.
      required:
        - id
        - object
        - bytes
        - created_at
        - filename
        - purpose
        - status
      x-oaiMeta:
        name: The file object
        example: |
          {
            "id": "file-abc123",
            "object": "file",
            "bytes": 120000,
            "created_at": 1677610602,
            "expires_at": 1680202602,
            "filename": "salesOverview.pdf",
            "purpose": "assistants",
          }
      type: object
