components:
  schemas:
    ContainerListResource:
      type: object
      properties:
        object:
          type: string
          enum:
            - list
          description: The type of object returned, must be 'list'.
        data:
          type: array
          description: A list of containers.
          items:
            $ref: '#/components/schemas/ContainerResource'
        first_id:
          type: string
          description: The ID of the first container in the list.
        last_id:
          type: string
          description: The ID of the last container in the list.
        has_more:
          type: boolean
          description: Whether there are more containers available.
      required:
        - object
        - data
        - first_id
        - last_id
        - has_more
    CreateContainerBody:
      type: object
      properties:
        name:
          type: string
          description: Name of the container to create.
        file_ids:
          type: array
          description: IDs of files to copy to the container.
          items:
            type: string
        expires_after:
          type: object
          description: Container expiration time in seconds relative to the 'anchor' time.
          properties:
            anchor:
              type: string
              enum:
                - last_active_at
              description: >-
                Time anchor for the expiration time. Currently only
                'last_active_at' is supported.
            minutes:
              type: integer
          required:
            - anchor
            - minutes
        skills:
          type: array
          description: An optional list of skills referenced by id or inline data.
          items:
            oneOf:
              - $ref: '#/components/schemas/SkillReferenceParam'
              - $ref: '#/components/schemas/InlineSkillParam'
            discriminator:
              propertyName: type
        memory_limit:
          type: string
          enum:
            - 1g
            - 4g
            - 16g
            - 64g
          description: Optional memory limit for the container. Defaults to "1g".
        network_policy:
          description: Network access policy for the container.
          discriminator:
            propertyName: type
          properties:
            type:
              type: string
              enum:
                - disabled
              description: Disable outbound network access. Always `disabled`.
              default: disabled
              x-stainless-const: true
            allowed_domains:
              items:
                type: string
              type: array
              minItems: 1
              description: A list of allowed domains when type is `allowlist`.
            domain_secrets:
              items:
                $ref: '#/components/schemas/ContainerNetworkPolicyDomainSecretParam'
              type: array
              minItems: 1
              description: Optional domain-scoped secrets for allowlisted domains.
          type: object
          required:
            - type
            - allowed_domains
      required:
        - name
    ContainerResource:
      type: object
      title: The container object
      properties:
        id:
          type: string
          description: Unique identifier for the container.
        object:
          type: string
          description: The type of this object.
        name:
          type: string
          description: Name of the container.
        created_at:
          type: integer
          format: unixtime
          description: Unix timestamp (in seconds) when the container was created.
        status:
          type: string
          description: Status of the container (e.g., active, deleted).
        last_active_at:
          type: integer
          format: unixtime
          description: Unix timestamp (in seconds) when the container was last active.
        expires_after:
          type: object
          description: >
            The container will expire after this time period.

            The anchor is the reference point for the expiration.

            The minutes is the number of minutes after the anchor before the
            container expires.
          properties:
            anchor:
              type: string
              description: The reference point for the expiration.
              enum:
                - last_active_at
            minutes:
              type: integer
              description: >-
                The number of minutes after the anchor before the container
                expires.
        memory_limit:
          type: string
          description: The memory limit configured for the container.
          enum:
            - 1g
            - 4g
            - 16g
            - 64g
        network_policy:
          description: Network access policy for the container.
          type: object
          properties:
            type:
              type: string
              description: The network policy mode.
              enum:
                - allowlist
                - disabled
            allowed_domains:
              type: array
              description: Allowed outbound domains when `type` is `allowlist`.
              items:
                type: string
          required:
            - type
      required:
        - id
        - object
        - name
        - created_at
        - status
        - id
        - name
        - created_at
        - status
      x-oaiMeta:
        name: The container object
        example: |
          {
             "id": "cntr_682dfebaacac8198bbfe9c2474fb6f4a085685cbe3cb5863",
             "object": "container",
             "created_at": 1747844794,
             "status": "running",
             "expires_after": {
               "anchor": "last_active_at",
               "minutes": 20
             },
             "last_active_at": 1747844794,
             "memory_limit": "1g",
             "name": "My Container"
          }
