    get:
      operationId: listBatches
      tags:
        - Batch
      summary: List your organization's batches.
      parameters:
        - in: query
          name: after
          required: false
          schema:
            type: string
          description: >
            A cursor for use in pagination. `after` is an object ID that defines
            your place in the list. For instance, if you make a list request and
            receive 100 objects, ending with obj_foo, your subsequent call can
            include after=obj_foo in order to fetch the next page of the list.
        - name: limit
          in: query
          description: >-
            A limit on the number of objects to be returned. Limit can range
            between 1 and 100, and the default is 20.


            Automatically applied from a SQL `LIMIT` clause - `SELECT ... LIMIT
            10` sends `limit=10` on the wire. Setting it explicitly in a `WHERE`
            clause is not required.
          required: false
          schema:
            type: integer
            default: 20
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      responses:
        '200':
          description: Batch listed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBatchesResponse'
      x-oaiMeta:
        name: List batches
        group: batch
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/batches?limit=2 \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -H "Content-Type: application/json"
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
