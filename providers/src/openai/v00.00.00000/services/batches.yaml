              page = client.batches.list()
              page = page.data[0]
              print(page.id)
            javascript: |
              import OpenAI from "openai";

              const openai = new OpenAI();

              async function main() {
                const list = await openai.batches.list();

                for await (const batch of list) {
                  console.log(batch);
