                {{item.name}}.
              items:
                oneOf:
                  - type: object
                    title: ChatMessage
                    properties:
                      role:
                        type: string
                        description: >-
                          The role of the message (e.g. "system", "assistant",
                          "user").
                      content:
                        type: string
                        description: The content of the message.
                    required:
