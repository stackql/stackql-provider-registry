                - [Structured Outputs](/docs/guides/structured-outputs)
              properties:
                format:
                  $ref: '#/components/schemas/TextResponseFormatConfiguration'
        model:
          type: string
          description: >-
            The name of the model to use for generating completions (e.g.
            "o3-mini").
        source:
          description: >-
            Determines what populates the `item` namespace in this run's data
            source.
          type: object
          title: EvalJsonlFileContentSource
          properties:
