                "per_testing_criteria_results": [
                  {
                    "testing_criteria": "String check grader",
                    "passed": 91,
                    "failed": 80
                  }
                ],
                "run_data_source": {
                  "type": "completions",
                  "template_messages": [
                    {
                      "type": "message",
