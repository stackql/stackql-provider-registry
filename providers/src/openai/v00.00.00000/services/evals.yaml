    CreateEvalCompletionsRunDataSource:
      type: object
      title: CompletionsRunDataSource
      description: >
        A CompletionsRunDataSource object describing a model sampling
        configuration.
      properties:
        type:
          type: string
          enum:
            - completions
          default: completions
          description: The type of run data source. Always `completions`.
        input_messages:
          description: >-
            Used when sampling from a model. Dictates the structure of the
            messages passed into the model. Can either be a reference to a
            prebuilt trajectory (ie, `item.input_trajectory`), or a template
            with variable references to the `item` namespace.
          type: object
          title: TemplateInputMessages
          properties:
            type:
              type: string
              enum:
                - template
              description: The type of input messages. Always `template`.
            template:
              type: array
              description: >-
                A list of chat messages forming the prompt or context. May
                include variable references to the `item` namespace, ie
                {{item.name}}.
              items:
                oneOf:
                  - $ref: '#/components/schemas/EasyInputMessage'
                  - $ref: '#/components/schemas/EvalItem'
            item_reference:
              type: string
              description: >-
                A reference to a variable in the `item` namespace. Ie,
                "item.input_trajectory"
          required:
            - type
            - template
            - item_reference
        sampling_params:
          type: object
          properties:
            reasoning_effort:
              $ref: '#/components/schemas/ReasoningEffort'
            temperature:
              type: number
              description: A higher temperature increases randomness in the outputs.
              default: 1
            max_completion_tokens:
              type: integer
              description: The maximum number of tokens in the generated output.
            top_p:
              type: number
              description: >-
                An alternative to temperature for nucleus sampling; 1.0 includes
                all tokens.
              default: 1
            seed:
              type: integer
              description: A seed value to initialize the randomness, during sampling.
              default: 42
            response_format:
              description: >
                An object specifying the format that the model must output.


                Setting to `{ "type": "json_schema", "json_schema": {...} }`
                enables

                Structured Outputs which ensures the model will match your
                supplied JSON

                schema. Learn more in the [Structured Outputs

                guide](/docs/guides/structured-outputs).


                Setting to `{ "type": "json_object" }` enables the older JSON
                mode, which

                ensures the message the model generates is valid JSON. Using
                `json_schema`

                is preferred for models that support it.
              oneOf:
                - $ref: '#/components/schemas/ResponseFormatText'
                - $ref: '#/components/schemas/ResponseFormatJsonSchema'
                - $ref: '#/components/schemas/ResponseFormatJsonObject'
            tools:
              type: array
              description: >
                A list of tools the model may call. Currently, only functions
                are supported as a tool. Use this to provide a list of functions
                the model may generate JSON inputs for. A max of 128 functions
                are supported.
              items:
                $ref: '#/components/schemas/ChatCompletionTool'
        model:
          type: string
          description: >-
            The name of the model to use for generating completions (e.g.
            "o3-mini").
        source:
          description: >-
            Determines what populates the `item` namespace in this run's data
            source.
          type: object
          title: EvalJsonlFileContentSource
          properties:
            type:
              type: string
              enum:
                - file_content
              default: file_content
              description: The type of jsonl source. Always `file_content`.
              x-stainless-const: true
            content:
              type: array
              items:
                type: object
                properties:
                  item:
                    type: object
                    additionalProperties: true
                  sample:
                    type: object
                    additionalProperties: true
                required:
                  - item
              description: The content of the jsonl file.
            id:
              type: string
              description: The identifier of the file.
            metadata:
              $ref: '#/components/schemas/Metadata'
            model:
              type: string
              description: An optional model to filter by (e.g., 'gpt-4o').
            created_after:
              type: integer
              description: >-
                An optional Unix timestamp to filter items created after this
                time.
            created_before:
              type: integer
              description: >-
                An optional Unix timestamp to filter items created before this
                time.
            limit:
              type: integer
              description: An optional maximum number of items to return.
          required:
            - type
            - content
            - id
          x-oaiMeta:
            name: >-
              The stored completions data source object used to configure an
              individual run
            group: eval runs
            example: |
              {
                "type": "stored_completions",
                "model": "gpt-4o",
                "created_after": 1668124800,
                "created_before": 1668124900,
                "limit": 100,
                "metadata": {}
              }
      required:
        - type
        - source
      x-oaiMeta:
        name: The completions data source object used to configure an individual run
        group: eval runs
        example: |
          {
            "name": "gpt-4o-mini-2024-07-18",
            "data_source": {
              "type": "completions",
              "input_messages": {
                "type": "item_reference",
                "item_reference": "item.input"
              },
              "model": "gpt-4o-mini-2024-07-18",
              "source": {
                "type": "stored_completions",
                "model": "gpt-4o-mini-2024-07-18"
              }
            }
          }
    CreateEvalResponsesRunDataSource:
