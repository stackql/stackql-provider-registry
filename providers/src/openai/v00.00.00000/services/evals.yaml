                {
                  "name": "Example label grader",
                  "type": "label_model",
                  "model": "o3-mini",
                  "input": [
                    {
                      "type": "message",
                      "role": "developer",
                      "content": {
                        "type": "input_text",
                        "text": "Classify the sentiment of the following statement as one of positive, neutral, or negative"
                      }
                    },
                    {
                      "type": "message",
                      "role": "user",
                      "content": {
                        "type": "input_text",
                        "text": "Statement: {{item.input}}"
                      }
                    }
                  ],
                  "passing_labels": [
                    "positive"
                  ],
                  "labels": [
                    "positive",
                    "neutral",
                    "negative"
                  ]
                }
              ],
              "name": "Sentiment",
              "created_at": 1740110490,
              "metadata": {
                "description": "An eval for sentiment analysis"
              }
            }
      parameters:
