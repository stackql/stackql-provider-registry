    post:
      operationId: createEval
      tags:
        - Evals
      summary: >
        Create the structure of an evaluation that can be used to test a model's
        performance.

        An evaluation is a set of testing criteria and the config for a data
        source, which dictates the schema of the data used in the evaluation.
        After creating an evaluation, you can run it on different models and
        model parameters. We support several types of graders and datasources.

        For more information, see the [Evals guide](/docs/guides/evals).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvalRequest'
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Eval'
      x-oaiMeta:
        name: Create eval
        group: evals
        path: post
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/evals \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{
                      "name": "Sentiment",
                      "data_source_config": {
                        "type": "stored_completions",
                        "metadata": {
                            "usecase": "chatbot"
                        }
                      },
                      "testing_criteria": [
                        {
                          "type": "label_model",
                          "model": "o3-mini",
                          "input": [
                            {
                              "role": "developer",
                              "content": "Classify the sentiment of the following statement as one of 'positive', 'neutral', or 'negative'"
                            },
                            {
                              "role": "user",
                              "content": "Statement: {{item.input}}"
                            }
                          ],
                          "passing_labels": [
                            "positive"
                          ],
                          "labels": [
                            "positive",
                            "neutral",
                            "negative"
                          ],
                          "name": "Example label grader"
                        }
                      ]
                    }'
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              eval = client.evals.create(
                  data_source_config={
                      "item_schema": {
                          "foo": "bar"
                      },
                      "type": "custom",
                  },
                  testing_criteria=[{
                      "input": [{
                          "content": "content",
                          "role": "role",
                      }],
                      "labels": ["string"],
                      "model": "model",
                      "name": "name",
                      "passing_labels": ["string"],
                      "type": "label_model",
                  }],
              )
              print(eval.id)
            javascript: |
              import OpenAI from "openai";

              const openai = new OpenAI();

              const evalObj = await openai.evals.create({
                name: "Sentiment",
                data_source_config: {
                  type: "stored_completions",
                  metadata: { usecase: "chatbot" }
                },
                testing_criteria: [
                  {
                    type: "label_model",
                    model: "o3-mini",
                    input: [
                      { role: "developer", content: "Classify the sentiment of the following statement as one of 'positive', 'neutral', or 'negative'" },
                      { role: "user", content: "Statement: {{item.input}}" }
                    ],
                    passing_labels: ["positive"],
                    labels: ["positive", "neutral", "negative"],
                    name: "Example label grader"
                  }
                ]
              });
              console.log(evalObj);
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });

              const _eval = await client.evals.create({
                data_source_config: {
                  item_schema: { foo: 'bar' },
                  type: 'custom',
                },
                testing_criteria: [
                  {
                    input: [{ content: 'content', role: 'role' }],
                    labels: ['string'],
                    model: 'model',
                    name: 'name',
                    passing_labels: ['string'],
                    type: 'label_model',
                  },
                ],
              });

              console.log(_eval.id);
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.core.JsonValue;
              import com.openai.models.evals.EvalCreateParams;
              import com.openai.models.evals.EvalCreateResponse;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      EvalCreateParams params = EvalCreateParams.builder()
                          .customDataSourceConfig(EvalCreateParams.DataSourceConfig.Custom.ItemSchema.builder()
                              .putAdditionalProperty("foo", JsonValue.from("bar"))
                              .build())
                          .addTestingCriterion(EvalCreateParams.TestingCriterion.LabelModel.builder()
                              .addInput(EvalCreateParams.TestingCriterion.LabelModel.Input.SimpleInputMessage.builder()
                                  .content("content")
                                  .role("role")
                                  .build())
                              .addLabel("string")
                              .model("model")
                              .name("name")
                              .addPassingLabel("string")
                              .build())
                          .build();
                      EvalCreateResponse eval = client.evals().create(params);
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(api_key: "My API Key")

              eval_ = openai.evals.create(
                data_source_config: {item_schema: {foo: "bar"}, type: :custom},
                testing_criteria: [
                  {
                    input: [{content: "content", role: "role"}],
                    labels: ["string"],
                    model: "model",
                    name: "name",
                    passing_labels: ["string"],
                    type: :label_model
                  }
                ]
              )

              puts(eval_)
          response: |
            {
              "object": "eval",
              "id": "eval_67b7fa9a81a88190ab4aa417e397ea21",
              "data_source_config": {
                "type": "stored_completions",
