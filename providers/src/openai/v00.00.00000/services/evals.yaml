components:
  schemas:
    EvalList:
      type: object
      title: EvalList
      description: |
        An object representing a list of evals.
      properties:
        object:
          type: string
          enum:
            - list
          default: list
          description: |
            The type of this object. It is always set to "list".
          x-stainless-const: true
        data:
          type: array
          description: |
            An array of eval objects.
          items:
            $ref: '#/components/schemas/Eval'
        first_id:
          type: string
          description: The identifier of the first eval in the data array.
        last_id:
          type: string
          description: The identifier of the last eval in the data array.
        has_more:
          type: boolean
          description: Indicates whether there are more evals available.
      required:
        - object
        - data
        - first_id
        - last_id
        - has_more
      x-oaiMeta:
        name: The eval list object
        group: evals
        example: |
          {
            "object": "list",
            "data": [
              {
                "object": "eval",
                "id": "eval_67abd54d9b0081909a86353f6fb9317a",
                "data_source_config": {
                  "type": "custom",
                  "schema": {
                    "type": "object",
                    "properties": {
                      "item": {
                        "type": "object",
                        "properties": {
                          "input": {
                            "type": "string"
                          },
                          "ground_truth": {
                            "type": "string"
                          }
                        },
                        "required": [
                          "input",
                          "ground_truth"
                        ]
                      }
                    },
                    "required": [
                      "item"
                    ]
                  }
                },
                "testing_criteria": [
                  {
                    "name": "String check",
                    "id": "String check-2eaf2d8d-d649-4335-8148-9535a7ca73c2",
                    "type": "string_check",
                    "input": "{{item.input}}",
                    "reference": "{{item.ground_truth}}",
                    "operation": "eq"
                  }
                ],
                "name": "External Data Eval",
                "created_at": 1739314509,
                "metadata": {},
              }
            ],
            "first_id": "eval_67abd54d9b0081909a86353f6fb9317a",
            "last_id": "eval_67abd54d9b0081909a86353f6fb9317a",
            "has_more": true
          }
    CreateEvalRequest:
      type: object
      title: CreateEvalRequest
      properties:
        name:
          type: string
          description: The name of the evaluation.
        metadata:
          $ref: '#/components/schemas/Metadata'
        data_source_config:
          type: object
          description: >-
            The configuration for the data source used for the evaluation runs.
            Dictates the schema of the data used in the evaluation.
          title: CustomDataSourceConfig
          properties:
            type:
              type: string
              enum:
                - custom
              default: custom
              description: The type of data source. Always `custom`.
              x-stainless-const: true
            item_schema:
              type: object
              description: The json schema for each row in the data source.
              additionalProperties: true
              example: |
                {
                  "type": "object",
                  "properties": {
                    "name": {"type": "string"},
                    "age": {"type": "integer"}
                  },
                  "required": ["name", "age"]
                }
            include_sample_schema:
              type: boolean
              default: false
              description: >-
                Whether the eval should expect you to populate the sample
                namespace (ie, by generating responses off of your data source)
            metadata:
              type: object
              description: Metadata filters for the logs data source.
              additionalProperties: true
              example: |
                {
                  "use_case": "customer_support_agent"
                }
          required:
            - item_schema
            - type
          x-oaiMeta:
            name: The eval file data source config object
            group: evals
            example: |
              {
                "type": "custom",
                "item_schema": {
                  "type": "object",
                  "properties": {
                    "name": {"type": "string"},
                    "age": {"type": "integer"}
                  },
                  "required": ["name", "age"]
                },
                "include_sample_schema": true
              }
          deprecated: true
        testing_criteria:
          type: array
          description: >-
            A list of graders for all eval runs in this group. Graders can
            reference variables in the data source using double curly braces
            notation, like `{{item.variable_name}}`. To reference the model's
            output, use the `sample` namespace (ie, `{{sample.output_text}}`).
          items:
            oneOf:
              - $ref: '#/components/schemas/CreateEvalLabelModelGrader'
              - $ref: '#/components/schemas/EvalGraderStringCheck'
              - $ref: '#/components/schemas/EvalGraderTextSimilarity'
              - $ref: '#/components/schemas/EvalGraderPython'
              - $ref: '#/components/schemas/EvalGraderScoreModel'
      required:
        - data_source_config
        - testing_criteria
    Eval:
      type: object
      title: Eval
      description: |
        An Eval object with a data source config and testing criteria.
        An Eval represents a task to be done for your LLM integration.
        Like:
         - Improve the quality of my chatbot
         - See how well my chatbot handles customer support
         - Check if o4-mini is better at my usecase than gpt-4o
      properties:
        object:
          type: string
          enum:
            - eval
          default: eval
          description: The object type.
          x-stainless-const: true
        id:
          type: string
          description: Unique identifier for the evaluation.
        name:
          type: string
          description: The name of the evaluation.
          example: Chatbot effectiveness Evaluation
        data_source_config:
          type: object
          description: Configuration of data sources used in runs of the evaluation.
          title: CustomDataSourceConfig
          properties:
            type:
              type: string
              enum:
                - custom
              default: custom
              description: The type of data source. Always `custom`.
              x-stainless-const: true
            schema:
              type: object
              description: >
                The json schema for the run data source items.

                Learn how to build JSON schemas
                [here](https://json-schema.org/).
              additionalProperties: true
              example: |
                {
                  "type": "object",
                  "properties": {
                    "item": {
                      "type": "object",
                      "properties": {
                        "label": {"type": "string"},
                      },
                      "required": ["label"]
                    }
                  },
                  "required": ["item"]
                }
            metadata:
              $ref: '#/components/schemas/Metadata'
          required:
            - type
            - schema
          x-oaiMeta:
            name: The eval custom data source config object
            group: evals
            example: |
              {
                "type": "custom",
                "schema": {
                  "type": "object",
                  "properties": {
                    "item": {
                      "type": "object",
                      "properties": {
                        "label": {"type": "string"},
                      },
                      "required": ["label"]
                    }
                  },
                  "required": ["item"]
                }
              }
          deprecated: true
        testing_criteria:
          default: eval
          description: A list of testing criteria.
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/EvalGraderLabelModel'
              - $ref: '#/components/schemas/EvalGraderStringCheck'
              - $ref: '#/components/schemas/EvalGraderTextSimilarity'
              - $ref: '#/components/schemas/EvalGraderPython'
              - $ref: '#/components/schemas/EvalGraderScoreModel'
        created_at:
          type: integer
          format: unixtime
          description: The Unix timestamp (in seconds) for when the eval was created.
        metadata:
          $ref: '#/components/schemas/Metadata'
      required:
        - id
        - data_source_config
        - object
        - testing_criteria
        - name
        - created_at
        - metadata
      x-oaiMeta:
        name: The eval object
        group: evals
        example: |
          {
            "object": "eval",
            "id": "eval_67abd54d9b0081909a86353f6fb9317a",
            "data_source_config": {
              "type": "custom",
              "item_schema": {
                "type": "object",
                "properties": {
                  "label": {"type": "string"},
                },
                "required": ["label"]
              },
              "include_sample_schema": true
            },
            "testing_criteria": [
              {
                "name": "My string check grader",
                "type": "string_check",
                "input": "{{sample.output_text}}",
                "reference": "{{item.label}}",
                "operation": "eq",
              }
            ],
            "name": "External Data Eval",
            "created_at": 1739314509,
            "metadata": {
              "test": "synthetics",
            }
          }
    Metadata:
      type: object
      description: >
        Set of 16 key-value pairs that can be attached to an object. This can be

        useful for storing additional information about the object in a
        structured

        format, and querying for objects via API or the dashboard.


        Keys are strings with a maximum length of 64 characters. Values are
        strings

        with a maximum length of 512 characters.
      additionalProperties:
        type: string
      x-oaiTypeLabel: map
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        param:
          type: string
        type:
          type: string
      required:
        - type
        - message
        - param
        - code
    EvalRunList:
      type: object
      title: EvalRunList
      description: |
        An object representing a list of runs for an evaluation.
      properties:
        object:
          type: string
          enum:
            - list
          default: list
          description: |
            The type of this object. It is always set to "list".
          x-stainless-const: true
        data:
          type: array
          description: |
            An array of eval run objects.
          items:
            $ref: '#/components/schemas/EvalRun'
        first_id:
          type: string
          description: The identifier of the first eval run in the data array.
        last_id:
          type: string
          description: The identifier of the last eval run in the data array.
        has_more:
          type: boolean
          description: Indicates whether there are more evals available.
      required:
        - object
        - data
        - first_id
        - last_id
        - has_more
      x-oaiMeta:
        name: The eval run list object
        group: evals
        example: |
          {
            "object": "list",
            "data": [
              {
                "object": "eval.run",
                "id": "evalrun_67b7fbdad46c819092f6fe7a14189620",
                "eval_id": "eval_67b7fa9a81a88190ab4aa417e397ea21",
                "report_url": "https://platform.openai.com/evaluations/eval_67b7fa9a81a88190ab4aa417e397ea21?run_id=evalrun_67b7fbdad46c819092f6fe7a14189620",
                "status": "completed",
                "model": "o3-mini",
                "name": "Academic Assistant",
                "created_at": 1740110812,
                "result_counts": {
                  "total": 171,
                  "errored": 0,
                  "failed": 80,
