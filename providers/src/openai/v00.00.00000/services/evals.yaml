openapi: 3.1.0
info:
  title: evals API
  description: openai API
  version: 2.3.0
paths:
  /evals:
    get:
      operationId: listEvals
      tags:
        - Evals
      summary: |
        List evaluations for a project.
      parameters:
        - name: after
          in: query
          description: Identifier for the last eval from the previous pagination request.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: >-
            Number of evals to retrieve.


            Automatically applied from a SQL `LIMIT` clause - `SELECT ... LIMIT
            10` sends `limit=10` on the wire. Setting it explicitly in a `WHERE`
            clause is not required.
          required: false
          schema:
            type: integer
            default: 20
        - name: order
          in: query
          description: >-
            Sort order for evals by timestamp. Use `asc` for ascending order or
            `desc` for descending order.
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - name: order_by
          in: query
          description: >
            Evals can be ordered by creation time or last updated time. Use

            `created_at` for creation time or `updated_at` for last updated
            time.
          required: false
          schema:
            type: string
            enum:
              - created_at
              - updated_at
            default: created_at
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      responses:
        '200':
          description: A list of evals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalList'
      x-oaiMeta:
        name: List evals
        group: evals
        path: list
        examples:
          request:
            curl: |
              curl https://api.openai.com/v1/evals?limit=1 \
                -H "Authorization: Bearer $OPENAI_API_KEY" \
                -H "Content-Type: application/json"
            python: |-
              import os
              from openai import OpenAI

              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )
              page = client.evals.list()
              page = page.data[0]
              print(page.id)
            javascript: |
              import OpenAI from "openai";

              const openai = new OpenAI();

              const evals = await openai.evals.list({ limit: 1 });
              console.log(evals);
            node.js: |-
              import OpenAI from 'openai';

              const client = new OpenAI({
                apiKey: process.env['OPENAI_API_KEY'], // This is the default and can be omitted
              });

              // Automatically fetches more pages as needed.
              for await (const evalListResponse of client.evals.list()) {
                console.log(evalListResponse.id);
              }
            java: |-
              package com.openai.example;

              import com.openai.client.OpenAIClient;
              import com.openai.client.okhttp.OpenAIOkHttpClient;
              import com.openai.models.evals.EvalListPage;
              import com.openai.models.evals.EvalListParams;

              public final class Main {
                  private Main() {}

                  public static void main(String[] args) {
                      OpenAIClient client = OpenAIOkHttpClient.fromEnv();

                      EvalListPage page = client.evals().list();
                  }
              }
            ruby: |-
              require "openai"

              openai = OpenAI::Client.new(api_key: "My API Key")

              page = openai.evals.list

              puts(page)
          response: |
            {
              "object": "list",
              "data": [
                {
                  "id": "eval_67abd54d9b0081909a86353f6fb9317a",
                  "object": "eval",
                  "data_source_config": {
                    "type": "stored_completions",
                    "metadata": {
