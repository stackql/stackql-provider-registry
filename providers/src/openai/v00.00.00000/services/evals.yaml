              }
            ],
            "first_id": "evalrun_67abd54d60ec8190832b46859da808f7",
            "last_id": "evalrun_67abd54d60ec8190832b46859da808f7",
            "has_more": false
          }
    CreateEvalRunRequest:
      type: object
      title: CreateEvalRunRequest
      properties:
        name:
          type: string
          description: The name of the run.
        metadata:
          $ref: '#/components/schemas/Metadata'
        data_source:
          type: object
          description: Details about the run's data source.
          title: JsonlRunDataSource
          properties:
            type:
              type: string
              enum:
                - jsonl
              default: jsonl
              description: The type of data source. Always `jsonl`.
              x-stainless-const: true
            source:
              description: >-
                Determines what populates the `item` namespace in the data
                source.
              type: object
              title: EvalJsonlFileContentSource
              properties:
                type:
                  type: string
                  enum:
                    - file_content
                  default: file_content
                  description: The type of jsonl source. Always `file_content`.
                  x-stainless-const: true
                content:
                  type: array
                  items:
                    type: object
                    properties:
                      item:
                        type: object
                        additionalProperties: true
                      sample:
                        type: object
                        additionalProperties: true
                    required:
                      - item
                  description: The content of the jsonl file.
                id:
                  type: string
                  description: The identifier of the file.
              required:
                - type
                - content
                - id
            input_messages:
              description: >-
                Used when sampling from a model. Dictates the structure of the
                messages passed into the model. Can either be a reference to a
                prebuilt trajectory (ie, `item.input_trajectory`), or a template
                with variable references to the `item` namespace.
              type: object
              title: TemplateInputMessages
              properties:
                type:
                  type: string
                  enum:
                    - template
                  description: The type of input messages. Always `template`.
                template:
                  type: array
                  description: >-
                    A list of chat messages forming the prompt or context. May
                    include variable references to the `item` namespace, ie
                    {{item.name}}.
                  items:
                    oneOf:
                      - $ref: '#/components/schemas/EasyInputMessage'
                      - $ref: '#/components/schemas/EvalItem'
                item_reference:
                  type: string
                  description: >-
                    A reference to a variable in the `item` namespace. Ie,
                    "item.input_trajectory"
              required:
                - type
                - template
                - item_reference
            sampling_params:
              type: object
              properties:
                reasoning_effort:
                  $ref: '#/components/schemas/ReasoningEffort'
                temperature:
                  type: number
                  description: A higher temperature increases randomness in the outputs.
                  default: 1
                max_completion_tokens:
                  type: integer
                  description: The maximum number of tokens in the generated output.
                top_p:
                  type: number
                  description: >-
                    An alternative to temperature for nucleus sampling; 1.0
                    includes all tokens.
                  default: 1
                seed:
                  type: integer
                  description: A seed value to initialize the randomness, during sampling.
                  default: 42
                response_format:
                  description: >
                    An object specifying the format that the model must output.


                    Setting to `{ "type": "json_schema", "json_schema": {...} }`
                    enables

                    Structured Outputs which ensures the model will match your
                    supplied JSON

                    schema. Learn more in the [Structured Outputs

                    guide](/docs/guides/structured-outputs).


                    Setting to `{ "type": "json_object" }` enables the older
                    JSON mode, which

                    ensures the message the model generates is valid JSON. Using
                    `json_schema`

                    is preferred for models that support it.
                  oneOf:
                    - $ref: '#/components/schemas/ResponseFormatText'
                    - $ref: '#/components/schemas/ResponseFormatJsonSchema'
                    - $ref: '#/components/schemas/ResponseFormatJsonObject'
                tools:
                  type: array
                  description: >
                    A list of tools the model may call. Currently, only
                    functions are supported as a tool. Use this to provide a
                    list of functions the model may generate JSON inputs for. A
                    max of 128 functions are supported.
                  items:
                    $ref: '#/components/schemas/ChatCompletionTool'
            model:
              type: string
              description: >-
                The name of the model to use for generating completions (e.g.
                "o3-mini").
          required:
            - type
            - source
          x-oaiMeta:
            name: The file data source object for the eval run configuration
            group: evals
            example: |
              {
               "type": "jsonl",
               "source": {
                 "type": "file_id",
                 "id": "file-9GYS6xbkWgWhmE7VoLUWFg"
               }
              }
      required:
        - data_source
    EvalRun:
      type: object
      title: EvalRun
      description: |
        A schema representing an evaluation run.
      properties:
        object:
          type: string
          enum:
            - eval.run
          default: eval.run
          description: The type of the object. Always "eval.run".
          x-stainless-const: true
        id:
          type: string
          description: Unique identifier for the evaluation run.
        eval_id:
          type: string
          description: The identifier of the associated evaluation.
        status:
          type: string
          description: The status of the evaluation run.
        model:
          type: string
          description: The model that is evaluated, if applicable.
        name:
          type: string
          description: The name of the evaluation run.
        created_at:
          type: integer
          format: unixtime
          description: Unix timestamp (in seconds) when the evaluation run was created.
        report_url:
          type: string
          format: uri
          description: The URL to the rendered evaluation run report on the UI dashboard.
        result_counts:
          type: object
          description: Counters summarizing the outcomes of the evaluation run.
          properties:
            total:
              type: integer
              description: Total number of executed output items.
            errored:
              type: integer
              description: Number of output items that resulted in an error.
            failed:
              type: integer
              description: Number of output items that failed to pass the evaluation.
            passed:
              type: integer
              description: Number of output items that passed the evaluation.
          required:
            - total
            - errored
            - failed
            - passed
        per_model_usage:
          type: array
          description: Usage statistics for each model during the evaluation run.
          items:
            type: object
            properties:
              model_name:
                type: string
                description: The name of the model.
              invocation_count:
                type: integer
                description: The number of invocations.
              prompt_tokens:
                type: integer
                description: The number of prompt tokens used.
              completion_tokens:
                type: integer
                description: The number of completion tokens generated.
              total_tokens:
                type: integer
                description: The total number of tokens used.
              cached_tokens:
                type: integer
                description: The number of tokens retrieved from cache.
            required:
              - model_name
              - invocation_count
              - prompt_tokens
              - completion_tokens
              - total_tokens
              - cached_tokens
        per_testing_criteria_results:
          type: array
          description: Results per testing criteria applied during the evaluation run.
          items:
            type: object
            properties:
              testing_criteria:
                type: string
                description: A description of the testing criteria.
              passed:
                type: integer
                description: Number of tests passed for this criteria.
              failed:
                type: integer
                description: Number of tests failed for this criteria.
            required:
              - testing_criteria
              - passed
              - failed
        data_source:
          type: object
          description: Information about the run's data source.
          title: JsonlRunDataSource
          properties:
            type:
              type: string
              enum:
