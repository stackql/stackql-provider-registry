  /vector_stores/{vector_store_id}/file_batches:
    post:
      operationId: createVectorStoreFileBatch
      tags:
        - Vector stores
      summary: Create a vector store file batch.
      description: >
        The maximum number of files in a single batch request is 2000.

        Vector store file attach requests are rate limited per vector store (300
        requests per minute across both this endpoint and
        `/vector_stores/{vector_store_id}/files`).

        For ingesting multiple files into the same vector store, this batch
        endpoint is recommended.
      parameters:
        - in: path
          name: vector_store_id
          required: true
          schema:
            type: string
            example: vs_abc123
          description: |
            The ID of the vector store for which to create a File Batch.
        - name: openai-organization
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific organization (overrides
            the default associated with the API key). Addressable in SQL as
            `openai_organization`.
          schema:
            type: string
        - name: openai-project
          in: header
          required: false
          description: >-
            Optionally scope the request to a specific project (overrides the
            default associated with the API key). Addressable in SQL as
            `openai_project`.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVectorStoreFileBatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorStoreFileBatchObject'
      x-oaiMeta:
        name: Create vector store file batch
        group: vector_stores
        description: >
          Attaches multiple files to a vector store in one request. This is the
          recommended approach for multi-file ingestion, especially because
          per-vector-store file attach writes are rate-limited (300
          requests/minute shared with `/vector_stores/{vector_store_id}/files`).
        examples:
          request:
            curl: >
              curl
              https://api.openai.com/v1/vector_stores/vs_abc123/file_batches \
                  -H "Authorization: Bearer $OPENAI_API_KEY" \
                  -H "Content-Type: application/json \
                  -H "OpenAI-Beta: assistants=v2" \
                  -d '{
                    "files": [
                      {
                        "file_id": "file-abc123",
                        "attributes": {"category": "finance"}
                      },
                      {
                        "file_id": "file-abc456",
                        "chunking_strategy": {
                          "type": "static",
                          "max_chunk_size_tokens": 1200,
                          "chunk_overlap_tokens": 200
                        }
                      }
                    ]
                  }'
            python: >-
              import os

              from openai import OpenAI


              client = OpenAI(
                  api_key=os.environ.get("OPENAI_API_KEY"),  # This is the default and can be omitted
              )

              vector_store_file_batch =
              client.vector_stores.file_batches.create(
                  vector_store_id="vs_abc123",
              )

              print(vector_store_file_batch.id)
            javascript: |
              import OpenAI from "openai";
              const openai = new OpenAI();

              async function main() {
                const myVectorStoreFileBatch = await openai.vectorStores.fileBatches.create(
                  "vs_abc123",
                  {
                    files: [
                      {
                        file_id: "file-abc123",
                        attributes: { category: "finance" },
                      },
                      {
                        file_id: "file-abc456",
                        chunking_strategy: {
                          type: "static",
                          max_chunk_size_tokens: 1200,
                          chunk_overlap_tokens: 200,
                        },
                      },
                    ]
                  }
                );
                console.log(myVectorStoreFileBatch);
              }

              main();
            node.js: >-
