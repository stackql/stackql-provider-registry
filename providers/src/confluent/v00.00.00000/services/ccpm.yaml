        plugins.


        If no `cloud` filter is specified, returns custom connect plugins from
        all clouds.
      parameters:
        - name: spec.cloud
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: AWS
          description: Filter the results by exact match for spec.cloud.
        - name: environment
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: env-00000
          description: Filter the results by exact match for environment.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            x-max-page-items: 500
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - Custom Connect Plugins (ccpm/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
