          description: Custom Connect Plugin.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  CustomConnectPlugins objects represent Custom Connect
                  artifacts containing connector, and SMT jars on Confluent
                   Cloud.
                  The API allows you to list, create, read, update, and delete
                  your Custom Connect Plugins.

                  Related guide:

                  [Custom Connect Plugin
                  API](https://docs.confluent.io/cloud/current/connectors/connect-api-section.html).



