            $ref: '#/paths/~1cmk~1v2~1clusters/post'
          response:
            mediaType: application/json
            openAPIDocKey: '202'
        get_cmk_v2_cluster:
          operation:
            $ref: '#/paths/~1cmk~1v2~1clusters~1{id}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        update_cmk_v2_cluster:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1cmk~1v2~1clusters~1{id}/patch'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        delete_cmk_v2_cluster:
          operation:
            $ref: '#/paths/~1cmk~1v2~1clusters~1{id}/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '204'
      sqlVerbs:
        select:
          - $ref: >-
              #/components/x-stackQL-resources/clusters/methods/get_cmk_v2_cluster
          - $ref: >-
              #/components/x-stackQL-resources/clusters/methods/list_cmk_v2_clusters
        insert:
          - $ref: >-
              #/components/x-stackQL-resources/clusters/methods/create_cmk_v2_cluster
        update:
          - $ref: >-
              #/components/x-stackQL-resources/clusters/methods/update_cmk_v2_cluster
        delete:
          - $ref: >-
              #/components/x-stackQL-resources/clusters/methods/delete_cmk_v2_cluster
        replace: []
    vw_clusters:
      name: vw_clusters
      id: confluent.managed_kafka_clusters.vw_clusters
      config:
        docs:
          fields:
            - name: environment
              type: string
              description: >-
                Environment ID used to scope the cluster list (required `WHERE`
                parameter; echoed back as a column).
            - name: id
              type: string
              description: Cluster ID (e.g. lkc-50r5wn).
            - name: kind
              type: string
              description: Object kind (always `Cluster`).
            - name: api_version
              type: string
              description: Confluent API version (e.g. `cmk/v2`).
            - name: display_name
              type: string
              description: Human-readable cluster name.
            - name: availability
              type: string
              description: Cluster availability tier (e.g. LOW, HIGH).
            - name: cloud
              type: string
              description: Cloud provider (AWS, GCP, AZURE).
            - name: region
              type: string
              description: Cloud region the cluster runs in.
            - name: config_kind
              type: string
              description: >-
                Cluster sizing kind (Basic, Standard, Enterprise, Dedicated,
                Freight).
            - name: max_ecku
              type: integer
              description: Maximum eCKU count for elastic clusters.
            - name: api_endpoint
              type: string
              description: Cluster REST API endpoint URL.
            - name: http_endpoint
              type: string
              description: Cluster HTTP endpoint URL.
            - name: kafka_bootstrap_endpoint
              type: string
              description: Kafka bootstrap endpoint URL (SASL_SSL://...).
            - name: environment_id
              type: string
              description: ID of the environment that owns this cluster.
            - name: environment_resource_name
              type: string
              description: Confluent Resource Name (CRN) of the owning environment.
            - name: phase
              type: string
              description: Cluster lifecycle phase (e.g. PROVISIONED).
            - name: created_at
              type: string
              description: Timestamp when the cluster was created (ISO 8601).
            - name: updated_at
              type: string
              description: Timestamp when the cluster was last updated (ISO 8601).
            - name: resource_name
              type: string
              description: Confluent Resource Name (CRN) for this cluster.
            - name: self
              type: string
              description: Self-link URL for this cluster.
          requiredParams:
            - name: environment
              type: string
              description: Environment ID used to scope the cluster list.
        views:
          select:
            predicate: sqlDialect == "sqlite3"
            ddl: |-
              SELECT
                id,
                kind,
                api_version,
                environment,
                JSON_EXTRACT(spec, '$.display_name') AS display_name,
                JSON_EXTRACT(spec, '$.availability') AS availability,
                JSON_EXTRACT(spec, '$.cloud') AS cloud,
                JSON_EXTRACT(spec, '$.region') AS region,
                JSON_EXTRACT(spec, '$.config.kind') AS config_kind,
                JSON_EXTRACT(spec, '$.config.max_ecku') AS max_ecku,
                JSON_EXTRACT(spec, '$.api_endpoint') AS api_endpoint,
                JSON_EXTRACT(spec, '$.http_endpoint') AS http_endpoint,
                JSON_EXTRACT(spec, '$.kafka_bootstrap_endpoint') AS kafka_bootstrap_endpoint,
                JSON_EXTRACT(spec, '$.environment.id') AS environment_id,
                JSON_EXTRACT(spec, '$.environment.resource_name') AS environment_resource_name,
                JSON_EXTRACT(status, '$.phase') AS phase,
                JSON_EXTRACT(metadata, '$.created_at') AS created_at,
                JSON_EXTRACT(metadata, '$.updated_at') AS updated_at,
                JSON_EXTRACT(metadata, '$.resource_name') AS resource_name,
                JSON_EXTRACT(metadata, '$.self') AS self
              FROM confluent.managed_kafka_clusters.clusters
              WHERE environment = '{{ environment }}'
            fallback:
              predicate: sqlDialect == "postgres"
              ddl: |-
                SELECT
                  id,
                  kind,
                  api_version,
                  environment,
                  spec->>'display_name' AS display_name,
                  spec->>'availability' AS availability,
                  spec->>'cloud' AS cloud,
                  spec->>'region' AS region,
                  spec->'config'->>'kind' AS config_kind,
                  (spec->'config'->>'max_ecku')::integer AS max_ecku,
                  spec->>'api_endpoint' AS api_endpoint,
                  spec->>'http_endpoint' AS http_endpoint,
                  spec->>'kafka_bootstrap_endpoint' AS kafka_bootstrap_endpoint,
                  spec->'environment'->>'id' AS environment_id,
                  spec->'environment'->>'resource_name' AS environment_resource_name,
                  status->>'phase' AS phase,
                  metadata->>'created_at' AS created_at,
                  metadata->>'updated_at' AS updated_at,
                  metadata->>'resource_name' AS resource_name,
                  metadata->>'self' AS self
                FROM confluent.managed_kafka_clusters.clusters
                WHERE environment = '{{ environment }}'
