                        | Quota | Description |

                        | --- | --- |

                        | `apikeys_per_org` | API Keys in one Confluent Cloud
                        organization |
                      properties:
                        api_version:
                          type: string
                          enum:
                            - iam/v2
                          description: >-
                            APIVersion defines the schema version of this
                            representation of a resource.
                          readOnly: true
                        kind:
                          type: string
                          description: >-
                            Kind defines the object this REST resource
                            represents.
                          readOnly: true
                          enum:
                            - ApiKey
                        id:
                          description: >-
                            ID is the "natural identifier" for an object within
                            its scope/namespace; it is normally unique across
                            time but not space. That is, you can assume that the
                            ID will not be reclaimed and reused after an object
                            is deleted ("time"); however, it may collide with
                            IDs for other object `kinds` or objects of the same
                            `kind` within a different scope/namespace ("space").
                          type: string
                          maxLength: 255
                          readOnly: true
                          example: dlz-f3a90de
                        metadata:
                          description: >-
                            ObjectMeta is metadata that all persisted resources
                            must have, which includes all objects users must
                            create.
                          required:
                            - self
                          properties:
                            self:
                              description: >-
                                Self is a Uniform Resource Locator (URL) at
                                which an object can be addressed. This URL
                                encodes the service location, API version, and
                                other particulars necessary to locate the
                                resource at a point in time
                              type: string
                              format: uri
                              readOnly: true
                              example: >-
                                https://api.confluent.cloud/v2/kafka-clusters/lkc-f3a90de
                            resource_name:
                              description: >-
                                Resource Name is a Uniform Resource Identifier
                                (URI) that is globally unique across space and
                                time. It is represented as a Confluent Resource
                                Name
                              type: string
                              format: uri
                              readOnly: true
                              example: crn://confluent.cloud/kafka=lkc-f3a90de
                            created_at:
                              type: string
                              format: date-time
                              example: '2006-01-02T15:04:05-07:00'
                              readOnly: true
                              description: >-
                                The date and time at which this object was
                                created. It is represented in RFC3339 format and
                                is in UTC.
                            updated_at:
                              type: string
                              format: date-time
                              example: '2006-01-02T15:04:05-07:00'
                              readOnly: true
                              description: >-
                                The date and time at which this object was last
                                updated. It is represented in RFC3339 format and
                                is in UTC.
                            deleted_at:
                              type: string
                              format: date-time
                              example: '2006-01-02T15:04:05-07:00'
                              readOnly: true
                              description: >-
                                The date and time at which this object was (or
                                will be) deleted. It is represented in RFC3339
                                format and is in UTC.
                          readOnly: true
                          type: object
                        spec:
                          $ref: '#/components/schemas/iam.v2.ApiKeySpec'
                      required:
                        - id
                        - metadata
                        - spec
                    uniqueItems: true
          headers:
            X-Request-Id:
              schema:
                type: string
              description: The unique identifier for the API request.
            X-RateLimit-Limit:
              schema:
                type: integer
              description: >-
                The maximum number of requests you're permitted to make per time
                period.
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: >-
                The number of requests remaining in the current rate limit
                window.
            X-RateLimit-Reset:
              schema:
                type: integer
              description: >-
                The relative time in seconds until the current rate-limit window
                resets.  
                  
                **Important:** This differs from Github and Twitter's same-named
                header which uses UTC epoch seconds. We use relative time to
                avoid client/server time synchronization issues.
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/DefaultSystemError'
