openapi: 3.0.0
info:
  title: iam API
  description: confluent iam API
  version: 1.0.0
paths:
  /iam/v2/api-keys:
    get:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: listIamV2ApiKeys
      summary: List of API Keys
      description: >
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a sorted, filtered, paginated list of all API keys.


        This can show all keys for a single owner (across resources - Kafka
        clusters), or all keys for a single

        resource (across owners). If no `owner` or `resource` filters are
        specified, returns all API Keys in the

        organization. You will only see the keys that are accessible to the
        account making the API request.
      parameters:
        - name: spec.owner
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          description: Filter the results by exact match for spec.owner.
        - name: spec.resource
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          description: Filter the results by exact match for spec.resource.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            x-max-page-items: 500
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - API Keys (iam/v2)
      security:
        - cloud-api-key: []
      responses:
        '200':
          description: API Key.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  `ApiKey` objects represent access to different parts of
                  Confluent Cloud. Some types

                  of API keys represent access to a single cluster/resource such
                  as a Kafka cluster,

                  Schema Registry cluster or a ksqlDB cluster. Cloud API Keys
                  represent access to resources within an organization

                  that are not tied to a specific cluster, such as the Org API,
                  IAM API, Metrics API or Connect API.

                  Tableflow API keys are not tied to a specific cluster.


                  The API allows you to list, create, update and delete your API
                  Keys.



                  Related guide: [API Keys in Confluent
                  Cloud](https://docs.confluent.io/cloud/current/client-apps/api-keys.html).


                  ## The API Keys Model

                  <SchemaDefinition
                  schemaRef="#/components/schemas/iam.v2.ApiKey" />


                  ## Quotas and Limits

                  This resource is subject to the [following
                  quotas](https://docs.confluent.io/cloud/current/quotas/overview.html):


                  | Quota | Description |

                  | --- | --- |

                  | `apikeys_per_org` | API Keys in one Confluent Cloud
                  organization |
                required:
                  - api_version
                  - kind
                  - metadata
                  - data
                properties:
                  api_version:
                    type: string
                    enum:
                      - iam/v2
                    description: >-
                      APIVersion defines the schema version of this
                      representation of a resource.
                    readOnly: true
                  kind:
                    type: string
                    description: Kind defines the object this REST resource represents.
                    readOnly: true
                    enum:
                      - ApiKeyList
                  metadata:
                    type: object
                    description: >-
                      ListMeta describes metadata that resource collections may
                      have
                    properties:
                      first:
                        description: >-
                          A link to the first page of results. If a response
                          does not contain a first link, then direct navigation
                          to the first page is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: https://api.confluent.cloud/v2/resourcekinds
                      last:
                        description: >-
                          A link to the last page of results. If a response does
                          not contain a last link, then direct navigation to the
                          last page is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=bcAOehAY8F16YD84Z1wT
                      prev:
                        description: >-
                          A link to the previous page of results. If a response
                          does not contain a prev link, then either there is no
                          previous data or backwards traversal through the
                          result set is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=YIXRY97wWYmwzrax4dld
                      next:
                        description: >-
                          A link to the next page of results. If a response does
                          not contain a next link, then there is no more data
                          available.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=UvmDWOB1iwfAIBPj6EYb
                      total_size:
                        description: >-
                          Number of records in the full result set. This
                          response may be paginated and have a smaller number of
                          records.
                        type: integer
                        format: int32
                        minimum: 0
                        example: 123
                  data:
                    type: array
                    description: >-
                      A data property that contains an array of resource items.
                      Each entry in the array is a separate resource.
                    items:
                      type: object
                      description: >-
                        `ApiKey` objects represent access to different parts of
                        Confluent Cloud. Some types

                        of API keys represent access to a single
                        cluster/resource such as a Kafka cluster,

                        Schema Registry cluster or a ksqlDB cluster. Cloud API
                        Keys represent access to resources within an
                        organization

                        that are not tied to a specific cluster, such as the Org
                        API, IAM API, Metrics API or Connect API.

                        Tableflow API keys are not tied to a specific cluster.


                        The API allows you to list, create, update and delete
                        your API Keys.



                        Related guide: [API Keys in Confluent
                        Cloud](https://docs.confluent.io/cloud/current/client-apps/api-keys.html).


                        ## The API Keys Model

                        <SchemaDefinition
                        schemaRef="#/components/schemas/iam.v2.ApiKey" />


