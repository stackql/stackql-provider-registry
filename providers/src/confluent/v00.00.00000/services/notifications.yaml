info:
  title: notifications API
  description: confluent notifications API
  version: 1.0.0
paths:
  /notifications/v1/subscriptions:
    get:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: listNotificationsV1Subscriptions
      summary: List of Subscriptions
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a sorted, filtered, paginated list of all subscriptions.
      parameters:
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 250
            x-max-page-items: 500
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - Subscriptions (notifications/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
        '200':
          description: Subscription.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  `Subscription` objects represent the intent of the customers
                  to get notifications of particular types.

                  A subscription is created for a particular `NotificationType`
                  and the user will get notifications on the

                  `Integrations` that are provided while creating the
                  subscription.


                  This API allows you to create, retrieve, and update
                  subscriptions,

                  as well as to view the list of all your subscriptions. You can
                  also delete subscriptions

                  with RECOMMENDED or OPTIONAL notification types. Subscriptions
                  with REQUIRED notification types cannot be deleted.



