components:
  schemas:
    notifications.v1.SubscriptionList:
      type: object
      description: >-
        `Subscription` objects represent the intent of the customers to get
        notifications of particular types.

        A subscription is created for a particular `NotificationType` and the
        user will get notifications on the

        `Integrations` that are provided while creating the subscription.


        This API allows you to create, retrieve, and update subscriptions,

        as well as to view the list of all your subscriptions. You can also
        delete subscriptions

        with RECOMMENDED or OPTIONAL notification types. Subscriptions with
        REQUIRED notification types cannot be deleted.



        Related guide: [Cloud
        Notifications](https://docs.confluent.io/cloud/current/monitoring/configure-notifications.html#notifications-for-ccloud).


        ## The Subscriptions Model

        <SchemaDefinition
        schemaRef="#/components/schemas/notifications.v1.Subscription" />
      required:
        - api_version
        - kind
        - metadata
        - data
      properties:
        api_version:
          type: string
          enum:
            - notifications/v1
          description: >-
            APIVersion defines the schema version of this representation of a
            resource.
          readOnly: true
