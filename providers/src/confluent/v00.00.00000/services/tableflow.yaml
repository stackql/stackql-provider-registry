openapi: 3.0.0
info:
  title: tableflow API
  description: confluent tableflow API
  version: 1.0.0
paths:
  /tableflow/v1/regions:
    get:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: listTableflowV1Regions
      summary: List of Regions
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a sorted, filtered, paginated list of all regions.
      parameters:
        - name: cloud
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: AWS
          description: Filter the results by exact match for cloud.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            x-max-page-items: 500
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - Regions (tableflow/v1)
      security:
        - resource-api-key: []
      responses:
        '200':
          description: Region.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  `Region` objects represent cloud provider regions where
                  Tableflow can be enabled.

                  This API allows you to list all supported Tableflow regions.



