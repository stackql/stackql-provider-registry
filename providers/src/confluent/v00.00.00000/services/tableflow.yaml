      type: object
      description: |
        Configuration for the `SUSPEND` error handling mode.
      properties:
        mode:
          type: string
          enum:
            - SUSPEND
          description: >
            The error handling mode for the Tableflow enabled topic.


            In this mode, the materialization of the topic is suspended in case
            of record failures.
      required:
        - mode
    tableflow.v1.ErrorHandlingSkip:
      type: object
      description: |
        Configuration for the `SKIP` error handling mode.
      properties:
        mode:
          type: string
          enum:
            - SKIP
          description: >
            The error handling mode for the Tableflow enabled topic.


            In this mode, the bad records are skipped and the materialization
            continues with the next record.
      required:
        - mode
    tableflow.v1.ErrorHandlingLog:
      type: object
      description: |
        Configuration for the `LOG` error handling mode.
      properties:
        mode:
          type: string
          enum:
            - LOG
          description: >
            The error handling mode for the Tableflow enabled topic.


            In this mode, the bad records are logged to a dead-letter queue
            (DLQ) topic and the


            materialization continues with the next record.
        target:
          type: string
          description: >
            The topic to which the bad records will be logged in case of `LOG`
            error handling mode.


            Creates the topic if it doesn't already exist; otherwise, the
            operation is idempotent and no action is taken.


            Default topic is `error_log`.
          default: error_log
      required:
        - mode
