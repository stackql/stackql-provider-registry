            type: string
          description: The unique identifier for the environment.
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier for the statement.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: >-
            It contains the field offset in the CollectSinkFunction protocol. On
            the first request, it should be unset. The offset is assumed to
            start at 0.
      tags:
        - Statement Results (sql/v1)
      security:
        - resource-api-key: []
        - external-access-token: []
      responses:
        '200':
          description: Statement Result.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  `Statement Result` represents a resource used to model results
                  of SQL statements.

                  The API allows you to read your SQL statement result.
                required:
                  - api_version
                  - kind
                  - metadata
                  - data
                  - results
                properties:
                  api_version:
                    type: string
