            change that a row can describe in a changelog:


            `0`: represents `INSERT` (`+I`), i.e. insertion operation;


            `1`: represents `UPDATE_BEFORE` (`-U`), i.e. update operation with
            the previous content of the updated row.

            This kind should occur together with `UPDATE_AFTER` for modelling an
            update that needs to retract

            the previous row first. It is useful in cases of a non-idempotent
            update, i.e., an update of a row that is not

            uniquely identifiable by a key;


            `2`: represents `UPDATE_AFTER` (`+U`), i.e. update operation with
            new content of the updated row;

            This kind CAN occur together with `UPDATE_BEFORE` for modelling an
            update that

            needs to retract the previous row first or it describes an
            idempotent update, i.e., an

