            - EXCEEDING_SOFT_LIMIT
            - APPROACHING_HARD_LIMIT
            - EXCEEDING_HARD_LIMIT
        last_updated:
          description: The last time the state limit status was updated.
          example: '1996-03-19T05:07:03.000Z'
          format: date-time
          readOnly: true
          type: string
        detail:
          description: Details about why state limit status is in its current state.
          example: The statement is within state limits.
          type: string
          readOnly: true
      readOnly: true
      type: object
    sql.v1.StatementWarning:
      type: object
      description: Represents a non-fatal issue encountered during statement processing.
      required:
        - severity
        - created_at
        - reason
        - message
      properties:
        severity:
          $ref: '#/components/schemas/sql.v1.WarningSeverity'
        created_at:
          type: string
          format: date-time
          description: >-
            The timestamp when the warning was created. It is represented in
            RFC3339 format and is in UTC.
          example: '2025-11-10T16:20:00Z'
          readOnly: true
        reason:
          type: string
          description: >-
            A machine-readable short, upper case summary delimited by
            underscore.
          example: MISSING_WINDOW_START_END
        message:
          type: string
          description: A human-readable string containing the description of the warning.
          example: >-
            The statement is missing window start and end bounds which may lead
            to unbounded state growth.
    sql.v1.StatementTraits:
      type: object
      description: >-
        StatementTraits contains detailed information about the properties of a
        Statement
      properties:
        sql_kind:
          type: string
          description: >-
            Categorizes the SQL statement. The result is Confluent-specific but
            inspired by SQL. It uses underscores for separating concepts e.g.
            "CREATE_TABLE".
          example: SELECT
        is_bounded:
          type: boolean
          description: Indicates the special case where results of a statement are bounded.
        is_append_only:
          type: boolean
          description: >-
            Indicates the special case where results of a statement are
            insert/append only.
        upsert_columns:
          type: array
          description: Defines the column indices clients can use as upsert keys.
          items:
            type: integer
        schema:
          $ref: '#/components/schemas/sql.v1.ResultSchema'
        connection_refs:
          type: array
          description: >-
            The names of connections that the SQL statement references (e.g., in
            FROM clauses).
          items:
            type: string
          example:
            - my-postgres-connection
            - my-kafka-connection
      readOnly: true
    sql.v1.ColumnDetails:
      type: object
      description: Details of a column in the Materialized Table.
      discriminator:
        propertyName: kind
        mapping:
          Physical: '#/components/schemas/sql.v1.PhysicalColumn'
          Metadata: '#/components/schemas/sql.v1.MetadataColumn'
          Computed: '#/components/schemas/sql.v1.ComputedColumn'
      required:
        - name
        - type
        - kind
        - metadata_key
        - expression
      properties:
        name:
          type: string
          description: The name of the column.
        type:
          $ref: '#/components/schemas/DataType'
        comment:
          type: string
          description: A comment or description for the column.
        kind:
          type: string
          description: The kind of column.
          enum:
            - Physical
          example: Physical
        metadata_key:
          type: string
          description: The system metadata key to reference.
          example: offset
        virtual:
          type: boolean
          description: Indicates if the metadata column is virtual.
          default: false
          example: true
        expression:
          type: string
          description: The SQL expression used to compute the column value.
          example: quantity * price
    sql.v1.Watermark:
      type: object
      description: Watermark strategy for the Materialized Table resource.
      properties:
        column:
          type: string
          example: event_timestamp
        expression:
          type: string
          example: event_timestamp - INTERVAL '5' SECOND
    sql.v1.Constraint:
      type: object
      description: A constraint on the materialized table.
      properties:
        name:
          type: string
          example: pk_orders
        type:
          type: string
          x-extensible-enum:
            - PRIMARY_KEY
          description: The type of constraint.
          example: PRIMARY_KEY
        columns:
          type: array
          items:
            type: string
          example:
            - user_id
            - product_id
        enforced:
          type: boolean
          description: Whether the constraint is enforced.
          default: false
    sql.v1.Distribution:
      type: object
      description: Distribution (bucket by) strategy.
      properties:
        kind:
          type: string
          x-extensible-enum:
            - HASH
          description: The kind of distribution.
          example: HASH
        keys:
          type: array
          items:
            type: string
          example:
            - user_id
        bucket_count:
          type: integer
          format: int32
          minimum: 1
          default: 6
          description: The number of buckets.
          example: 12
    sql.v1.MaterializedTableWarning:
      type: object
      description: >-
        Represents a non-fatal issue encountered during materialized table
        processing.
      required:
        - severity
        - created_at
        - reason
        - message
      properties:
        severity:
          $ref: '#/components/schemas/sql.v1.WarningSeverity'
        created_at:
          type: string
          format: date-time
          description: >-
            The timestamp when the warning was created. It is represented in
            RFC3339 format and is in UTC.
          example: '2025-11-10T16:20:00Z'
          readOnly: true
        reason:
          type: string
          description: >-
            A machine-readable short, upper case summary delimited by
            underscore.
          example: MISSING_WINDOW_START_END
        message:
          type: string
          description: A human-readable string containing the description of the warning.
          example: >-
            The statement is missing window start and end bounds which may lead
            to unbounded state growth.
    sql.v1.ResourceChange:
      type: object
      description: Details of a change to a specific resource.
      required:
        - kind
        - environment_locator
        - database_locator
        - name
        - details
      properties:
        kind:
          type: string
          x-extensible-enum:
            - MATERIALIZED_TABLE
            - TABLE
            - VIEW
            - FUNCTION
          description: The type of resource that was changed.
          example: MATERIALIZED_TABLE
        environment_locator:
          type: string
          description: >-
            The environment containing the resource. Can be either the
            environment name or ID, depending on how it is referenced in the SQL
            statement text.
          example: env-abc
        database_locator:
          type: string
          description: >-
            The database containing the resource. Can be either the database
            name or ID, depending on how it is referenced in the SQL statement
            text.
          example: lkc-123
        name:
          type: string
          description: >-
            The name of the resource, unique within its scope (environment and
            database).
          example: orders
        details:
          type: array
          description: Human-readable descriptions of the changes made to this resource.
          items:
            type: string
          example:
            - 'Column ''product_name: VARCHAR'' added'
            - 'Column ''product_id: BIGINT'' added'
      readOnly: true
    sql.v1.WarningSeverity:
      type: string
      x-extensible-enum:
        - LOW
        - MODERATE
        - CRITICAL
      description: >
        Indicates the severity of the warning.


        LOW: Indicates a low severity warning and for informing the user.


        MODERATE: Indicates a moderate severity warning and may require user
        action. Could cause degraded statements if certain conditions apply.


        CRITICAL: Indicates a critical severity warning and requires user
        action. It will cause degraded statements eventually.
      example: MODERATE
    sql.v1.ResultSchema:
      type: object
      description: The table columns of the results schema.
      properties:
        columns:
          type: array
          description: The properties of each SQL column in the schema.
          items:
            $ref: '#/components/schemas/ColumnDetails'
    sql.v1.PhysicalColumn:
      description: >-
