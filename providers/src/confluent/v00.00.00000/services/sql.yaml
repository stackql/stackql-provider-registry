openapi: 3.0.0
info:
  title: sql API
  description: confluent sql API
  version: 1.0.0
paths:
  /sql/v1/organizations/{organization_id}/environments/{environment_id}/connections:
    get:
      x-lifecycle-stage: Preview
      x-self-access: true
      x-request-access-name: SQL API v1
      operationId: listSqlv1Connections
      summary: List of Connections
      description: >-
        [![Preview](https://img.shields.io/badge/Lifecycle%20Stage-Preview-%2300afba)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a sorted, filtered and paginated list of all Connections.
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier for the organization.
        - in: path
          name: environment_id
          required: true
          schema:
            type: string
          description: The unique identifier for the environment.
        - name: spec.connection_type
          in: query
          required: false
          schema:
            type: string
            x-extensible-enum:
              - AZUREML
              - AZUREOPENAI
              - A2A
              - ANTHROPIC
              - BEDROCK
              - CONFLUENT_JDBC
              - COSMOSDB
              - COUCHBASE
              - ELASTIC
              - FIREWORKSAI
              - GOOGLEAI
              - MCP_SERVER
              - MONGODB
              - OPENAI
              - PINECONE
              - REST
              - S3VECTORS
              - SAGEMAKER
              - VERTEXAI
          description: Filter the results by exact match for spec.connection_type
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            x-max-page-items: 500
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - Connections (sql/v1)
      security:
        - resource-api-key: []
      responses:
        '200':
          description: Connections.
