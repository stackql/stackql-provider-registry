        schema:
          type: string
          description: Schema definition string
        metadata:
          $ref: '#/components/schemas/Metadata'
        ruleSet:
          $ref: '#/components/schemas/RuleSet'
        schemaTagsToAdd:
          type: array
          items:
            $ref: '#/components/schemas/SchemaTags'
        schemaTagsToRemove:
          type: array
          items:
            $ref: '#/components/schemas/SchemaTags'
        propagateSchemaTags:
          type: boolean
      description: Schema register request
    CompatibilityCheckResponse:
      type: object
      properties:
        is_compatible:
          type: boolean
          description: Whether the compared schemas are compatible
        messages:
          type: array
          description: Error messages
          example: []
          items:
            type: string
            description: Error messages
            example: '[]'
      description: Compatibility check response
    ErrorMessage:
      type: object
      properties:
        error_code:
          type: integer
          description: The error code
          format: int32
        message:
          type: string
          description: The error message
      description: Error message of this operation
    Config:
      type: object
      properties:
        alias:
          type: string
          description: |-
            If alias is specified, then this subject is an alias for the subject
            named by the alias. That means that any reference to this subject
            will be replaced by the alias.
        normalize:
          type: boolean
          description: >-
            If true, then schemas are automatically normalized when registered
            or

            when passed during lookups. This means that clients do not have to

            pass the "normalize" query parameter to have normalization occur.
        compatibilityLevel:
          type: string
          description: Compatibility Level
          example: FULL_TRANSITIVE
          x-extensible-enum:
            - BACKWARD
            - BACKWARD_TRANSITIVE
            - FORWARD
            - FORWARD_TRANSITIVE
            - FULL
            - FULL_TRANSITIVE
            - NONE
        compatibilityGroup:
          type: string
          description: |-
            Only schemas that belong to the same compatibility group will be
            checked for compatibility.
        defaultMetadata:
          type: object
          description: >-
            Default value for the metadata to be used during schema
            registration.
          properties:
            properties:
              type: string
              description: >-
                The metadata properties and their new values (opaque JSON
                object)
        overrideMetadata:
          type: object
          description: >-
            Override value for the metadata to be used during schema
            registration.
          properties:
            properties:
