            "serialized" (The parameter does not apply to JSON schemas.)
          schema:
            type: string
            default: ''
        - name: deleted
          in: query
          description: Whether to lookup deleted schemas
          schema:
            type: boolean
      responses:
        '200':
          description: The schema.
          content:
            application/vnd.schemaregistry.v1+json:
              schema:
                $ref: '#/components/schemas/Schema'
            application/vnd.schemaregistry+json; qs=0.9:
              schema:
                $ref: '#/components/schemas/Schema'
            application/json; qs=0.5:
              schema:
                $ref: '#/components/schemas/Schema'
        '404':
          description: |-
            Error code 40401 -- Subject not found
            Error code 40403 -- Schema not found
        '500':
          description: Internal Server Error.
      security:
        - resource-api-key: []
        - external-access-token: []
    servers:
      - url: https://psrc-00000.region.provider.confluent.cloud
        description: Confluent Cloud Schema Registry Endpoint.
components:
