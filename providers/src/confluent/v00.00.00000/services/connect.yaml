openapi: 3.0.0
info:
  title: connect API
  description: confluent connect API
  version: 1.0.0
paths:
  /connect/v1/environments/{environment_id}/clusters/{kafka_cluster_id}/connectors:
    get:
      x-lifecycle-stage: General Availability
      operationId: listConnectv1Connectors
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a list of "names" of the active connectors. You can then make a
        [read request](#operation/readConnectv1Connector) for a specific
        connector by name.
      summary: List of Connectors
      tags:
        - Connectors (connect/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      parameters: []
      responses:
        '200':
          description: Connector.
          content:
            application/json:
              schema:
                type: array
                description: List of connector names
                items:
                  type: string
                  description: Connector name
              example:
                - MyGcsLogsBucketConnector
                - MyS3BucketConnector
                - MyDatagenConnector
        '401':
          $ref: '#/components/responses/connect.v1.UnauthenticatedError'
        '404':
          $ref: '#/components/responses/connect.v1.AccountNotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/connect.v1.DefaultSystemError'
    post:
      x-lifecycle-stage: General Availability
      operationId: createConnectv1Connector
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Create a new connector. Returns the new connector information if
        successful.
      summary: Create a Connector
      tags:
        - Connectors (connect/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.v1.ConnectorWithOffsets'
              example:
                name: MyGcsLogsBucketConnector
                config:
                  cloud.environment: prod
                  cloud.provider: aws
                  connector.class: GcsSink
                  data.format: BYTES
                  flush.size: '1000'
                  gcs.bucket.name: APILogsBucket
                  gcs.credentials.config: '****************'
                  kafka.api.key: '****************'
                  kafka.api.secret: '****************'
                  kafka.endpoint: SASL_SSL://pkc-xxxxx.us-west-2.aws.confluent.cloud:9092
                  kafka.region: us-west-2
                  name: MyGcsLogsBucketConnector
                  tasks.max: '1'
                  time.interval: DAILY
                  topics: APILogsTopic
                tasks:
                  - connector: MyGcsLogsBucketConnector
                    task: 0
                type: sink
                offsets:
                  - partition:
                      kafka_partition: 0
                      kafka_topic: APILogsTopic
                    offset:
                      kafka_offset: 1000
          headers: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
              example:
                error:
                  code: 400
                  message: Unauthorized
        '401':
          $ref: '#/components/responses/connect.v1.UnauthenticatedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: integer
                  message:
                    type: string
              example:
                error_code: 500
                message: >-
                  Failed to find any class that implements Connector and which
                  name matches io.confluent.connect.<connector-class>...
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the connector to create.
                config:
                  type: object
                  description: >-
                    Configuration parameters for the connector. All values
                    should be strings.
                  x-redact: true
                  required:
                    - connector.class
                    - name
                    - kafka.api.key
                    - kafka.api.secret
                  properties:
                    connector.class:
                      type: string
                      description: >-
                        \[Required for Managed Connector, Ignored for Custom
                        Connector\] The connector class name, e.g.,
                        BigQuerySink, GcsSink, etc.
                    name:
                      type: string
                      description: >-
                        Name or alias of the class (plugin) for this connector.
                        For custom connector, it must be the same as the name of
                        the connector to create.
                    kafka.api.key:
                      type: string
                      description: The kafka cluster api key.
                    kafka.api.secret:
                      type: string
                      description: The kafka cluster api secret key.
                      x-redact: true
                    confluent.connector.type:
                      type: string
                      description: |
                        \[Required for Custom Connector\] The connector type.
                      example: CUSTOM
                      default: MANAGED
                      x-extensible-enum:
                        - CUSTOM
                        - MANAGED
                    confluent.custom.plugin.id:
                      type: string
                      example: ccp-lq5m06
                      description: >
                        \[Required for Custom Connector\] The custom plugin id
                        of custom connector, e.g., `ccp-lq5m06`
                    confluent.custom.connection.endpoints:
                      type: string
                      description: >
                        \[Optional for Custom Connector\] Egress endpoint(s) for
                        the connector to use when attaching to the sink or
                        source data system.
                    confluent.custom.schema.registry.auto:
                      type: string
                      description: >
                        \[Optional for Custom Connector\] Automatically add the
                        required schema registry properties in a custom
                        connector config if schema registry is enabled.
                      example: 'FALSE'
                      default: 'FALSE'
                      x-extensible-enum:
                        - 'TRUE'
                        - 'FALSE'
                    confluent.custom.connect.plugin.runtime:
                      type: string
                      description: >
                        \[Optional for Custom Connector\] The runtime of the
                        custom connector plugin.
                      example: 3.9.0
                    confluent.custom.connect.java.version:
                      type: string
                      description: >
                        \[Optional for Custom Connector\] The Java version of
                        the custom connector plugin.
                      example: '17'
                  additionalProperties:
                    type: string
                    description: >-
                      Other configuration parameters for the connector. All
                      values should be strings. See the connector's docs for
                      details.
                offsets:
                  $ref: '#/components/schemas/connect.v1.Offsets'
            examples:
              sink:
                value:
                  name: MyGcsLogsBucketConnector
                  config:
                    connector.class: GcsSink
                    data.format: BYTES
                    flush.size: '1000'
                    gcs.bucket.name: APILogsBucket
                    gcs.credentials.config: '****************'
                    kafka.api.key: '****************'
                    kafka.api.secret: '****************'
                    name: MyGcsLogsBucketConnector
                    tasks.max: '2'
                    time.interval: DAILY
                    topics: APILogsTopic
                  offsets:
                    - partition:
                        kafka_partition: 0
                        kafka_topic: APILogsTopic
                      offset:
                        kafka_offset: 1000
              source:
                value:
                  name: MySqlCdcSourceV2Connector_0
                  config:
                    connector.class: MySqlCdcSourceV2
                    output.data.format: JSON
                    flush.size: '1000'
                    database.hostname: 12.34.567.98
                    database.password: '****************'
                    database.port: '1234'
                    database.user: '****'
                    kafka.api.key: '****************'
                    kafka.api.secret: '****************'
                    name: MySqlCdcSourceV2Connector_0
                    tasks.max: '1'
                    time.interval: DAILY
                    topic.prefix: test
                  offsets:
                    - partition:
                        server: test
                      offset:
                        file: mysql-bin.000123
                        pos: 154
                        ts_sec: 1712907333
        description: ''
    x-lifecycle-stage: General Availability
    parameters:
      - name: environment_id
        in: path
        schema:
          type: string
        required: true
        description: The unique identifier of the environment this resource belongs to.
      - name: kafka_cluster_id
        in: path
        schema:
          type: string
        required: true
        description: The unique identifier for the Kafka cluster.
  /connect/v1/environments/{environment_id}/clusters/{kafka_cluster_id}/connectors?expand=info,status,id:
    get:
      x-lifecycle-stage: General Availability
      operationId: listConnectv1ConnectorsWithExpansions
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve an object with the queried expansions of all connectors.
        Without `expand` query parameter, this list connector’s endpoint will
        return a [list of only the connector
        names](#operation/listConnectv1Connectors).
      summary: List of Connectors with Expansions
      tags:
        - Connectors (connect/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
        '200':
          description: Connector.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.v1.ConnectorExpansionMap'
              example:
                MyGcsLogsBucketConnector:
                  id:
                    id: lcc-xxxxx
                    id_type: ID
                  info:
                    name: MyGcsLogsBucketConnector
                    config:
                      cloud.environment: prod
                      cloud.provider: aws
                      connector.class: GcsSink
                      data.format: BYTES
                      flush.size: '1000'
                      gcs.bucket.name: APILogsBucket
                      gcs.credentials.config: '****************'
                      kafka.api.key: '****************'
                      kafka.api.secret: '****************'
                      kafka.endpoint: SASL_SSL://pkc-xxxxx.us-west-2.aws.confluent.cloud:9092
                      kafka.region: us-west-2
                      name: MyGcsLogsBucketConnector
                      tasks.max: '1'
                      time.interval: DAILY
                      topics: APILogsTopic
                      type: sink
                  status:
                    name: MyGcsLogsBucketConnector
                    connector:
                      state: PROVISIONING
                      worker_id: MyGcsLogsBucketConnector
                      trace: ''
                    tasks: []
                    type: sink
                MyS3BucketConnector:
                  id:
                    id: lcc-xxxxx
                    id_type: ID
                  info:
                    name: MyS3BucketConnector
                    config:
                      cloud.environment: prod
                      cloud.provider: aws
                      connector.class: S3Sink
                      data.format: BYTES
                      flush.size: '1000'
                      s3.bucket: APILogsBucket
                      aws.access.key.id: '************'
                      aws.secret.access.key: '**********'
                      kafka.api.key: '****************'
                      kafka.api.secret: '****************'
                      kafka.endpoint: SASL_SSL://pkc-xxxxx.us-west-2.aws.confluent.cloud:9092
                      kafka.region: us-west-2
                      name: MyS3BucketConnector
                      tasks.max: '1'
                      time.interval: DAILY
                      topics: APILogsTopic
                      type: source
                  status:
                    name: MyS3BucketConnector
                    connector:
                      state: FAILED
                      worker_id: MyS3BucketConnector
                      trace: |
                        There were some errors with your configuration:
                        topics: Provided Kafka ApiKey is invalid
                        kafka.api.secret: Provided Kafka ApiKey is invalid
                    tasks: []
                    type: sink
                MyDatagenConnector:
                  id:
                    id: lcc-xxxxx
                    id_type: ID
                  info:
                    name: MyDatagenConnector
                    config:
                      cloud.environment: prod
                      cloud.provider: aws
                      connector.class: DatagenSource
                      data.format: BYTES
                      flush.size: '1000'
                      quickstart: ORDERS
                      kafka.api.key: '****************'
                      kafka.api.secret: '****************'
                      kafka.endpoint: SASL_SSL://pkc-xxxxx.us-west-2.aws.confluent.cloud:9092
                      kafka.region: us-west-2
                      name: MyDatagenConnector
                      tasks.max: '1'
                      time.interval: DAILY
                      topics: APILogsTopic
                      type: source
                  status:
                    name: MyDatagenConnector
                    connector:
                      state: RUNNING
                      worker_id: MyDatagenConnector
                      trace: ''
                    tasks:
                      - id: 0
                        msg: ''
                        state: RUNNING
                        worker_id: MyDatagenConnector
                    type: source
        '401':
          $ref: '#/components/responses/connect.v1.UnauthenticatedError'
        '404':
          $ref: '#/components/responses/connect.v1.AccountNotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/connect.v1.DefaultSystemError'
      parameters:
        - name: environment_id
          in: path
          schema:
            type: string
          required: true
          description: The unique identifier of the environment this resource belongs to.
        - name: kafka_cluster_id
          in: path
          schema:
            type: string
          required: true
          description: The unique identifier for the Kafka cluster.
        - name: expand
          in: query
          description: >-
            - id : Returns metadata of each connector such as id and id type.

            - info : Returns metadata of each connector such as the
            configuration, task

            information, and type of connector.

            - status : Returns additional state information of each connector
            including their status and tasks.
          schema:
            type: string
            enum:
              - id
              - info
              - status
    x-lifecycle-stage: General Availability
  /connect/v1/environments/{environment_id}/clusters/{kafka_cluster_id}/connectors/{connector_name}/config:
    get:
      x-lifecycle-stage: General Availability
      operationId: getConnectv1ConnectorConfig
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Get the configuration for the connector.
      summary: Read a Connector Configuration
      tags:
        - Connectors (connect/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
        '200':
          description: Connector.
          content:
            application/json:
              schema:
                type: object
                description: Configuration parameters for the connector.
                required:
                  - cloud.environment
                  - cloud.provider
                  - connector.class
                  - name
                  - kafka.endpoint
                  - kafka.region
                  - kafka.api.key
                  - kafka.api.secret
                properties:
                  cloud.environment:
                    type: string
                    description: The cloud environment type.
                  cloud.provider:
                    type: string
                    description: The cloud service provider, e.g. aws, azure, etc.
                    x-extensible-enum:
                      - aws
                      - azure
                      - gcp
                  connector.class:
                    type: string
                    description: The connector class name. E.g. BigQuerySink, GcsSink, etc.
                  name:
                    type: string
                    description: >-
                      Name or alias of the class (plugin) for this connector.
                      For Custom Connector, it must be the same as
                      connector_name.
                  kafka.endpoint:
                    type: string
                    description: The kafka cluster endpoint.
                  kafka.region:
                    type: string
                    description: The kafka cluster region.
                  kafka.api.key:
                    type: string
                    description: The kafka cluster api key.
                  kafka.api.secret:
                    type: string
                    description: The kafka cluster api secret key.
                    x-redact: true
                additionalProperties:
                  type: string
                  description: >-
                    Other configuration parameters for the connector. See the
                    connector's docs for the list of options.
              example:
                cloud.environment: prod
                cloud.provider: aws
                connector.class: GcsSink
                data.format: BYTES
                flush.size: '1000'
                gcs.bucket.name: APILogsBucket
                gcs.credentials.config: '****************'
                kafka.api.key: '****************'
                kafka.api.secret: '****************'
                kafka.endpoint: SASL_SSL://pkc-xxxxx.us-west-2.aws.confluent.cloud:9092
                kafka.region: us-west-2
                name: MyGcsLogsBucketConnector
                tasks.max: '2'
                time.interval: DAILY
                topics: APILogsTopic
        '401':
          $ref: '#/components/responses/connect.v1.UnauthenticatedError'
        '404':
          $ref: '#/components/responses/connect.v1.AccountNotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/connect.v1.DefaultSystemError'
    put:
      x-lifecycle-stage: General Availability
      operationId: createOrUpdateConnectv1ConnectorConfig
      description: >-
        Create a new connector using the given configuration, or update the
        configuration for an existing connector. Returns information about the
        connector after the change has been made.
      summary: Create or Update a Connector Configuration
      tags:
        - Connectors (connect/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Configuration parameters for the connector.
              required:
                - connector.class
                - name
                - kafka.api.key
                - kafka.api.secret
              properties:
                connector.class:
                  type: string
                  description: >-
                    \[Required for Managed Connector, Ignored for Custom
                    Connector\] The connector class name. E.g. BigQuerySink,
                    GcsSink, etc.
                name:
                  type: string
                  description: Name or alias of the class (plugin) for this connector.
                kafka.api.key:
                  type: string
                  description: The kafka cluster api key.
                kafka.api.secret:
                  type: string
                  description: The kafka cluster api secret key.
                  x-redact: true
                confluent.connector.type:
                  type: string
                  description: |
                    \[Required for Custom Connector\] The connector type.
                  example: CUSTOM
                  default: MANAGED
                  x-extensible-enum:
                    - CUSTOM
                    - MANAGED
                confluent.custom.plugin.id:
                  type: string
                  example: ccp-lq5m06
                  description: >
                    \[Required for Custom Connector\] The custom plugin id of
                    custom connector, e.g., `ccp-lq5m06`
                confluent.custom.connection.endpoints:
                  type: string
                  description: >
                    \[Optional for Custom Connector\] Egress endpoint(s) for the
                    connector to use when attaching to the sink or source data
                    system.
                confluent.custom.schema.registry.auto:
                  type: string
                  description: >
                    \[Optional for Custom Connector\] Automatically add the
                    required schema registry properties in a custom connector
                    config if schema registry is enabled.
                  example: 'FALSE'
                  default: 'FALSE'
                  x-extensible-enum:
                    - 'TRUE'
                    - 'FALSE'
                confluent.custom.connect.plugin.runtime:
                  type: string
                  description: >
                    \[Optional for Custom Connector\] The runtime of the custom
                    connector plugin. By default this is the latest version
                    available. If not provided this config is updated internally
                    to reflect the version used.
                  example: 3.9.0
                confluent.custom.connect.java.version:
                  type: string
                  description: >
                    \[Optional for Custom Connector\] The Java version of the
                    custom connector plugin. By default this is the latest
                    version supported by the latest runtime. If not provided
                    this config is updated internally to reflect the version
                    used.
                  example: '17'
              additionalProperties:
                type: string
                description: >-
                  Other configuration parameters for the connector. All values
                  should be strings. See the connector's docs for details.
            example:
              connector.class: GcsSink
              data.format: BYTES
              flush.size: '1000'
              gcs.bucket.name: APILogsBucket
              gcs.credentials.config: '****************'
              kafka.api.key: '****************'
              kafka.api.secret: '****************'
              name: MyGcsLogsBucketConnector
              tasks.max: '2'
              time.interval: DAILY
              topics: APILogsTopic
        description: >-
          Configuration parameters for the connector. All values should be
          strings.
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.v1.Connector'
              example:
                name: MyGcsLogsBucketConnector
                config:
                  cloud.environment: prod
                  cloud.provider: aws
                  connector.class: GcsSink
                  data.format: BYTES
                  flush.size: '1000'
                  gcs.bucket.name: APILogsBucket
                  gcs.credentials.config: '****************'
                  kafka.api.key: '****************'
                  kafka.api.secret: '****************'
                  kafka.endpoint: SASL_SSL://pkc-xxxxx.us-west-2.aws.confluent.cloud:9092
                  kafka.region: us-west-2
                  name: MyGcsLogsBucketConnector
                  tasks.max: '2'
                  time.interval: DAILY
                  topics: APILogsTopic
                tasks:
                  - connector: MyGcsLogsBucketConnector
                    task: 0
                  - connector: MyGcsLogsBucketConnector
                    task: 1
                type: sink
        '400':
          $ref: '#/components/responses/connect.v1.BadRequestError'
        '401':
          $ref: '#/components/responses/connect.v1.UnauthenticatedError'
        '404':
          $ref: '#/components/responses/connect.v1.AccountNotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: integer
                  message:
                    type: string
              example:
                error_code: 500
                message: >-
                  Failed to find any class that implements Connector and which
                  name matches io.confluent.connect.<connector-class>...
    x-lifecycle-stage: General Availability
    parameters:
      - name: connector_name
        in: path
        schema:
          type: string
        required: true
        description: The unique name of the connector.
      - name: environment_id
        in: path
        schema:
          type: string
        required: true
        description: The unique identifier of the environment this resource belongs to.
      - name: kafka_cluster_id
        in: path
        schema:
          type: string
        required: true
        description: The unique identifier for the Kafka cluster.
  /connect/v1/environments/{environment_id}/clusters/{kafka_cluster_id}/connectors/{connector_name}:
    get:
      x-lifecycle-stage: General Availability
      operationId: readConnectv1Connector
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Get information about the connector.
      summary: Read a Connector
      tags:
        - Connectors (connect/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
        '200':
          description: Connector.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.v1.Connector'
              example:
                name: MyGcsLogsBucketConnector
                config:
                  cloud.environment: prod
                  cloud.provider: aws
                  connector.class: GcsSink
                  data.format: BYTES
                  flush.size: '1000'
                  gcs.bucket.name: APILogsBucket
                  gcs.credentials.config: '****************'
                  kafka.api.key: '****************'
                  kafka.api.secret: '****************'
                  kafka.endpoint: SASL_SSL://pkc-xxxxx.us-west-2.aws.confluent.cloud:9092
                  kafka.region: us-west-2
                  name: MyGcsLogsBucketConnector
                  tasks.max: '1'
                  time.interval: DAILY
                  topics: APILogsTopic
                tasks:
                  - connector: MyGcsLogsBucketConnector
                    task: 0
                type: sink
        '401':
          $ref: '#/components/responses/connect.v1.UnauthenticatedError'
        '404':
          $ref: '#/components/responses/connect.v1.AccountNotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/connect.v1.DefaultSystemError'
    delete:
      x-lifecycle-stage: General Availability
      operationId: deleteConnectv1Connector
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Delete a connector. Halts all tasks and deletes the connector
        configuration.
      summary: Delete a Connector
      tags:
        - Connectors (connect/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
        '200':
          $ref: '#/components/responses/connect.v1.OK'
        '401':
          $ref: '#/components/responses/connect.v1.UnauthenticatedError'
        '404':
          $ref: '#/components/responses/connect.v1.ResourceNotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/connect.v1.DefaultSystemError'
    x-lifecycle-stage: General Availability
    parameters:
      - name: connector_name
        in: path
        schema:
          type: string
        required: true
        description: The unique name of the connector.
      - name: environment_id
        in: path
        schema:
          type: string
        required: true
        description: The unique identifier of the environment this resource belongs to.
      - name: kafka_cluster_id
        in: path
        schema:
          type: string
        required: true
        description: The unique identifier for the Kafka cluster.
