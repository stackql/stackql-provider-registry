      type: object
      description: The desired state of the Network
      properties:
        display_name:
          type: string
          description: The name of the network
          example: prod-aws-us-east1
        cloud:
          type: string
          description: The cloud service provider in which the network exists.
          x-extensible-enum:
            - AWS
            - GCP
            - AZURE
          example: AWS
          x-immutable: true
        region:
          type: string
          description: The cloud service provider region in which the network exists.
          example: us-east-1
          x-immutable: true
        connection_types:
          type: array
          description: The connection types requested for use with the network.
          items:
            $ref: '#/components/schemas/networking.v1.ConnectionType'
          uniqueItems: true
          minItems: 1
          x-immutable: true
        cidr:
          type: string
          pattern: ^\d+\.\d+\.\d+\.\d+/\d+$
          description: >
            The IPv4 [CIDR
            block](https://en.wikipedia.org/wiki/Classless_Inter-Domain_Routing)
            to used for this network.

            Must be `/16`. Required for VPC peering and AWS TransitGateway.
          example: 10.200.0.0/16
          x-immutable: true
        zones:
          type: array
          items:
            type: string
          uniqueItems: true
          minItems: 3
          maxItems: 3
          description: >
            The 3 availability zones for this network. They can optionally be
            specified for AWS networks

            used with PrivateLink, for GCP networks used with Private Service
            Connect, and for AWS and GCP

            networks used with Peering.

            Otherwise, they are automatically chosen by Confluent Cloud.


            On AWS, zones are AWS [AZ
            IDs](https://docs.aws.amazon.com/ram/latest/userguide/working-with-az-ids.html)
             (e.g. use1-az3)

            On GCP, zones are GCP
            [zones](https://cloud.google.com/compute/docs/regions-zones)
             (e.g. us-central1-c).

            On Azure, zones are Confluent-chosen names (e.g. 1, 2, 3) since
            Azure does not
             have universal zone identifiers.
          example:
            - use1-az1
            - use1-az2
            - use1-az3
          x-immutable: true
        zones_info:
          type: array
          minItems: 3
          maxItems: 3
          uniqueItems: true
          items:
            $ref: '#/components/schemas/networking.v1.ZoneInfo'
          description: >
            Each item represents information related to a single zone.


            Note - The attribute is in a [Limited Availability lifecycle
            stage](https://docs.confluent.io/cloud/current/api.html#section/Versioning/API-Lifecycle-Policy)
          x-immutable: true
        dns_config:
          description: >
            DNS config only applies to PrivateLink network connection type.


            When resolution is CHASED_PRIVATE, clusters in this network require
            both public and private DNS
             to resolve cluster endpoints.

            When resolution is PRIVATE, clusters in this network only require
            private DNS
             to resolve cluster endpoints.
          x-immutable: true
          type: object
          required:
            - resolution
          properties:
            resolution:
              type: string
              description: Network DNS resolution type.
              x-extensible-enum:
                - CHASED_PRIVATE
                - PRIVATE
        reserved_cidr:
          type: string
          description: >
            The reserved CIDR config is used only by AWS networks with
            connection_types = Vpc_Peering or Transit_Gateway


            An IPv4
            [CIDR](https://en.wikipedia.org/wiki/Classless_Inter-Domain_Routing)
              reserved for Confluent Cloud Network. Must be \24.
              If not specified, Confluent Cloud Network uses 172.20.255.0/24

            Note - The attribute is in a [Limited Availability lifecycle
            stage](https://docs.confluent.io/cloud/current/api.html#section/Versioning/API-Lifecycle-Policy)
          example: 172.20.255.0/24
          x-immutable: true
        environment:
          description: The environment to which this belongs.
          type: object
