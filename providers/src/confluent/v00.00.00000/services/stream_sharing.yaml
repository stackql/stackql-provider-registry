openapi: 3.0.0
info:
  title: stream_sharing API
  description: confluent stream_sharing API
  version: 1.0.0
paths:
  /cdx/v1/provider-shared-resources:
    get:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: listCdxV1ProviderSharedResources
      summary: List of Provider Shared Resources
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a sorted, filtered, paginated list of all provider shared
        resources.
      parameters:
        - name: stream_share
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: ss-1234
          description: Filter the results by exact match for stream_share.
        - name: crn
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: >-
            crn://confluent.cloud/cloud-cluster=lkc-111aaa/kafka=lkc-111aaa/topic=my.topic
          description: Filter the results by exact match for crn.
        - name: include_deleted
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/BooleanFilter'
          description: Include deactivated shared resources
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            x-max-page-items: 500
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - Provider Shared Resources (cdx/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
        '200':
          description: Provider Shared Resource.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  `ProviderSharedResource` object contains details of the data
                  stream

                  (topic, schema registry subjects, sharing metadata) that you
                  have shared through Stream Sharing.



                  ## The Provider Shared Resources Model

                  <SchemaDefinition
                  schemaRef="#/components/schemas/cdx.v1.ProviderSharedResource"
                  />
                required:
                  - api_version
                  - kind
                  - metadata
                  - data
                properties:
                  api_version:
                    type: string
                    enum:
                      - cdx/v1
                    description: >-
                      APIVersion defines the schema version of this
                      representation of a resource.
                    readOnly: true
                  kind:
                    type: string
                    description: Kind defines the object this REST resource represents.
                    readOnly: true
                    enum:
                      - ProviderSharedResourceList
                  metadata:
                    type: object
                    description: >-
                      ListMeta describes metadata that resource collections may
                      have
                    properties:
                      first:
                        description: >-
                          A link to the first page of results. If a response
                          does not contain a first link, then direct navigation
                          to the first page is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: https://api.confluent.cloud/v2/resourcekinds
                      last:
                        description: >-
                          A link to the last page of results. If a response does
                          not contain a last link, then direct navigation to the
                          last page is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=bcAOehAY8F16YD84Z1wT
                      prev:
                        description: >-
                          A link to the previous page of results. If a response
                          does not contain a prev link, then either there is no
                          previous data or backwards traversal through the
                          result set is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=YIXRY97wWYmwzrax4dld
                      next:
                        description: >-
                          A link to the next page of results. If a response does
                          not contain a next link, then there is no more data
                          available.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=UvmDWOB1iwfAIBPj6EYb
                      total_size:
                        description: >-
                          Number of records in the full result set. This
                          response may be paginated and have a smaller number of
                          records.
                        type: integer
                        format: int32
                        minimum: 0
                        example: 123
                  data:
                    type: array
                    description: >-
                      A data property that contains an array of resource items.
                      Each entry in the array is a separate resource.
                    items:
                      type: object
                      description: >-
                        `ProviderSharedResource` object contains details of the
                        data stream

                        (topic, schema registry subjects, sharing metadata) that
                        you have shared through Stream Sharing.



                        ## The Provider Shared Resources Model

                        <SchemaDefinition
                        schemaRef="#/components/schemas/cdx.v1.ProviderSharedResource"
                        />
                      properties:
                        api_version:
                          type: string
                          enum:
                            - cdx/v1
                          description: >-
                            APIVersion defines the schema version of this
                            representation of a resource.
                          readOnly: true
                        kind:
                          type: string
                          description: >-
                            Kind defines the object this REST resource
                            represents.
                          readOnly: true
                          enum:
                            - ProviderSharedResource
                        id:
