                        resources:
                          type: array
                          minItems: 1
                          description: List of resource crns that are shared together
                          items:
                            type: string
                            description: crn that specifies the shared resource
                            format: uri
                            pattern: ^crn://.+$
                            example: >-
                              crn://confluent.cloud/environment=env-123/cloud-cluster=lkc-111aaa/kafka=lkc-111aaa/topic=my.topic
                        display_name:
                          type: string
                          description: Shared resource display name
                          example: Stock Trades
                        description:
                          type: string
                          description: Description of shared resource
                          example: >-
                            This topic provides realtime data for the orders
                            placed through the website
                          x-immutable: true
                          readOnly: true
                        tags:
                          type: array
                          items:
                            type: string
                          description: list of tags
                          example:
                            - recent
                            - pending
                          x-immutable: true
                          readOnly: true
                        schemas:
                          type: array
                          items:
                            type: object
                            properties:
                              subject:
                                type: string
                                description: Name of the subject
                                example: User
                              version:
                                type: integer
                                description: Version number
                                format: int32
                                example: 1
                              id:
                                type: integer
                                description: Globally unique identifier of the schema
                                format: int32
                                example: 100001
                              schema_type:
                                type: string
                                description: Schema type
                                example: AVRO
                              schema:
                                type: string
                                description: Schema definition string
                                example: '{"schema": "{"type": "string"}"}'
                            description: Schema
                          description: >-
                            List of schemas in JSON format. This field is work
                            in progress and subject to changes.
                          x-immutable: true
                          readOnly: true
                        organization_description:
                          type: string
                          description: Shared resource's organization description
                          example: ABC Corp is the biggest online retailer
                        organization_contact:
                          type: string
                          format: email
                          example: jane.doe@example.com
                          description: Email of contact person from the organization
                        logo_url:
                          type: string
                          format: uri
                          description: Resource logo url
                          example: >-
                            https://confluent.cloud/api/cdx/v1/provider-shared-resources/sr-123/images/logo
                          readOnly: true
                        organization_name:
                          description: >-
                            Organization to which the shared resource belongs.
                            Deprecated
                          example: ABC Corp
                          x-immutable: true
                          readOnly: true
                        environment_name:
                          type: string
                          description: >-
                            The environment name of the shared resource.
                            Deprecated
                          example: Public Env
                          x-immutable: true
                          readOnly: true
                        cluster_name:
                          type: string
                          description: >-
                            The cluster display name of the shared resource.
                            Deprecated
                          example: Published Trades
                          x-immutable: true
                          readOnly: true
                        cloud_cluster:
                          description: The cloud cluster to which this belongs.
                          x-immutable: true
                          type: object
                          required:
                            - id
                            - related
                            - resource_name
                          properties:
                            id:
                              type: string
                              description: ID of the referred resource
                              minLength: 1
                              maxLength: 255
                            environment:
                              type: string
                              description: >-
                                Environment of the referred resource, if
                                env-scoped
                              minLength: 1
                              maxLength: 255
                            related:
                              type: string
                              format: uri
                              description: >-
                                API URL for accessing or modifying the referred
                                object
                              minLength: 1
                              readOnly: true
                            resource_name:
                              type: string
                              format: uri
                              description: CRN reference to the referred resource
                              minLength: 1
                              readOnly: true
                      required:
                        - id
                        - metadata
                        - display_name
                        - organization_name
                        - environment_name
                        - cluster_name
                        - cloud_cluster
                    uniqueItems: true
          headers:
            X-Request-Id:
              schema:
                type: string
              description: The unique identifier for the API request.
            X-RateLimit-Limit:
              schema:
