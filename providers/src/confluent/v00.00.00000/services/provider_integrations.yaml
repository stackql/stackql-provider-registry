                          readOnly: true
                        environment:
                          description: The environment to which this belongs.
                          x-immutable: true'
                          type: object
                          required:
                            - id
                            - related
                            - resource_name
                          properties:
                            id:
                              type: string
                              description: ID of the referred resource
                              minLength: 1
                              maxLength: 255
                            related:
                              type: string
                              format: uri
                              description: >-
