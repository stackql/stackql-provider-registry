                          A link to the previous page of results. If a response
                          does not contain a prev link, then either there is no
                          previous data or backwards traversal through the
                          result set is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=YIXRY97wWYmwzrax4dld
                      next:
                        description: >-
                          A link to the next page of results. If a response does
                          not contain a next link, then there is no more data
                          available.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=UvmDWOB1iwfAIBPj6EYb
                      total_size:
                        description: >-
                          Number of records in the full result set. This
                          response may be paginated and have a smaller number of
                          records.
                        type: integer
                        format: int32
