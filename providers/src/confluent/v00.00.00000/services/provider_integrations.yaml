openapi: 3.0.0
info:
  title: provider_integrations API
  description: confluent provider_integrations API
  version: 1.0.0
paths:
  /pim/v1/integrations:
    get:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: listPimV1Integrations
      summary: List of Integrations
      description: >
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a sorted, filtered, paginated list of all integrations.


        If no `provider` filter is specified, returns provider integrations from
        all clouds.
      parameters:
        - name: provider
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: AWS
          description: Filter the results by exact match for provider.
        - name: environment
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: env-00000
          description: Filter the results by exact match for environment.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            x-max-page-items: 500
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - Integrations (pim/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
        '200':
          description: Integration.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  `Provider Integration` objects represent access to public
                  cloud service provider (CSP) resources

                  that may be accessed by Confluent resources (for example,
                  connectors).


                  The API allows you to create, retrieve, and delete individual
                  integrations, and also obtain a

                  list of all your provider integrations.



                  Related guide: [Provider Integration in Confluent
                  Cloud](https://docs.confluent.io/home/overview.html).


