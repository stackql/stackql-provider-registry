          headers:
            X-Request-Id:
              schema:
                type: string
              description: The unique identifier for the API request.
            X-RateLimit-Limit:
              schema:
                type: integer
              description: >-
                The maximum number of requests you're permitted to make per time
                period.
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: >-
                The number of requests remaining in the current rate limit
                window.
            X-RateLimit-Reset:
              schema:
                type: integer
              description: >-
                The relative time in seconds until the current rate-limit window
                resets.  
                  
                **Important:** This differs from Github and Twitter's same-named
                header which uses UTC epoch seconds. We use relative time to
                avoid client/server time synchronization issues.
