                            resource is located.
                          example: us-west-2
                          readOnly: true
                        service:
                          type: string
                          description: The Confluent Cloud service.
                          x-extensible-enum:
                            - KAFKA
                            - SCHEMA_REGISTRY
                            - FLINK
                          example: KAFKA
                          readOnly: true
                        is_private:
                          type: boolean
                          description: >-
                            Whether the endpoint is private (true) or public
                            (false).
                          example: true
                          readOnly: true
                        connection_type:
                          type: string
                          description: The network connection type.
                          x-extensible-enum:
                            - PUBLIC
                            - PRIVATE_LINK
                            - PEERING
                            - TRANSIT_GATEWAY
                            - PRIVATE_NETWORK_INTERFACE
                          example: PRIVATE_LINK
                          readOnly: true
                        endpoint:
                          type: string
                          description: The endpoint URL or address.
                          example: >-
                            https://lkc-abc123-ap12345.us-west-2.aws.accesspoint.glb.confluent.cloud:443
                          readOnly: true
                        endpoint_type:
                          type: string
                          description: >
                            The endpoint type enum values:

                            * `REST` - REST API endpoint for HTTP/HTTPS access,
