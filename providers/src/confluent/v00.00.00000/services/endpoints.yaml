openapi: 3.0.0
info:
  title: endpoints API
  description: confluent endpoints API
  version: 1.0.0
paths:
  /endpoint/v1/endpoints:
    get:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: listEndpointV1Endpoints
      summary: List of Endpoints
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a sorted, filtered, paginated list of all endpoints.
      parameters:
        - name: cloud
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: AWS
          description: Filter the results by exact match for cloud.
        - name: region
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: us-west-2
          description: Filter the results by exact match for region.
        - name: service
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: KAFKA
          description: Filter the results by exact match for service.
        - name: is_private
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/BooleanFilter'
          example: true
          description: >
            Filter the results by whether the endpoint is private (true) or
            public (false).

            If not specified, returns both private and public endpoints.
        - name: environment
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: env-00000
          description: Filter the results by exact match for environment.
        - name: resource
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: lkc-abc123
          description: Filter the results by exact match for resource.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
            x-max-page-items: 5000
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - Endpoints (endpoint/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
        '200':
          description: Endpoint.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  An Endpoint object represents a Fully Qualified Domain Name
                  (FQDN) for a Confluent service resource

                  via a specific networking solution for a given Confluent Cloud
                  environment.

                  This API provides a list of Confluent Cloud endpoints filtered
                  by service, cloud provider, region, etc.



                  Related guides:

                  * [Resource Overview in Confluent
                  Cloud](https://docs.confluent.io/cloud/current/networking/resource-overview.html).

                  * [Manage Networking on Confluent
                  Cloud](https://docs.confluent.io/cloud/current/networking/overview.html).



                  ## The Endpoints Model

                  <SchemaDefinition
                  schemaRef="#/components/schemas/endpoint.v1.Endpoint" />
                required:
                  - api_version
                  - kind
                  - metadata
                  - data
                properties:
                  api_version:
                    type: string
                    enum:
                      - endpoint/v1
                    description: >-
                      APIVersion defines the schema version of this
                      representation of a resource.
                    readOnly: true
                  kind:
                    type: string
                    description: Kind defines the object this REST resource represents.
                    readOnly: true
                    enum:
                      - EndpointList
                  metadata:
                    type: object
                    description: >-
                      ListMeta describes metadata that resource collections may
                      have
                    properties:
                      first:
                        description: >-
                          A link to the first page of results. If a response
                          does not contain a first link, then direct navigation
                          to the first page is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: https://api.confluent.cloud/v2/resourcekinds
                      last:
                        description: >-
                          A link to the last page of results. If a response does
                          not contain a last link, then direct navigation to the
                          last page is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=bcAOehAY8F16YD84Z1wT
                      prev:
                        description: >-
                          A link to the previous page of results. If a response
                          does not contain a prev link, then either there is no
                          previous data or backwards traversal through the
                          result set is not supported.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=YIXRY97wWYmwzrax4dld
                      next:
                        description: >-
                          A link to the next page of results. If a response does
                          not contain a next link, then there is no more data
                          available.
                        type: string
                        format: uri
                        nullable: true
                        example: >-
                          https://api.confluent.cloud/v2/resourcekinds?page_token=UvmDWOB1iwfAIBPj6EYb
                      total_size:
                        description: >-
                          Number of records in the full result set. This
                          response may be paginated and have a smaller number of
                          records.
                        type: integer
                        format: int32
                        minimum: 0
                        example: 123
                  data:
                    type: array
                    description: >-
                      A data property that contains an array of resource items.
                      Each entry in the array is a separate resource.
                    items:
                      type: object
                      description: >-
                        An Endpoint object represents a Fully Qualified Domain
                        Name (FQDN) for a Confluent service resource

                        via a specific networking solution for a given Confluent
                        Cloud environment.

                        This API provides a list of Confluent Cloud endpoints
                        filtered by service, cloud provider, region, etc.



                        Related guides:

                        * [Resource Overview in Confluent
                        Cloud](https://docs.confluent.io/cloud/current/networking/resource-overview.html).

                        * [Manage Networking on Confluent
                        Cloud](https://docs.confluent.io/cloud/current/networking/overview.html).



                        ## The Endpoints Model

                        <SchemaDefinition
                        schemaRef="#/components/schemas/endpoint.v1.Endpoint" />
