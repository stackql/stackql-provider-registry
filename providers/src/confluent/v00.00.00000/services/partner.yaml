                      description: API group and version of the referred resource
                      minLength: 1
                      readOnly: true
                    kind:
                      type: string
                      description: Kind of the referred resource
                      minLength: 1
                      readOnly: true
              additionalProperties: false
              required:
                - external_id
                - name
                - plan_id
                - product_id
