  /catalog/v1/search/attribute:
    get:
      summary: Search by Attribute
      description: >-
        [![Generally
        Available](https://img.shields.io/badge/Lifecycle%20Stage-Generally%20Available-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve data for the specified attribute search query.
      operationId: searchUsingAttribute
      parameters:
        - name: type
          in: query
          description: Limit the result to only entities of specified types
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: attr
          in: query
          description: One of more additional attributes to return in the response
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: attrName
          in: query
          description: The attribute to search
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: attrValuePrefix
          in: query
          description: The prefix for the attribute value to search
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: tag
          in: query
          description: Limit the result to only entities tagged with the given tag
          schema:
            type: string
        - name: sortBy
          in: query
          description: An attribute to sort by
          schema:
            type: string
        - name: sortOrder
          in: query
          description: Sort order, either ASCENDING (default) or DESCENDING
          schema:
            type: string
            enum:
              - ASCENDING
              - DESCENDING
        - name: deleted
          in: query
          description: Whether to include deleted entities
          schema:
            type: boolean
        - name: limit
          in: query
          description: Limit the result set to only include the specified number of entries
          schema:
            type: integer
            format: int32
        - name: offset
          in: query
          description: Start offset of the result set (useful for pagination)
          schema:
            type: integer
            format: int32
      tags:
        - Search (v1)
      responses:
        '200':
          description: >-
            On successful search query with some results, might return an empty
            list if execution succeeded without any results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '400':
          description: Invalid wildcard or query parameters
        '429':
          description: Rate Limit Error
        '500':
          description: Internal Server Error
    servers:
