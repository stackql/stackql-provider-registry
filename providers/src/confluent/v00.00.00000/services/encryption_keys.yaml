  /byok/v1/keys:
    get:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: listByokV1Keys
      summary: List of Keys
      description: >-
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a sorted, filtered, paginated list of all keys.
      parameters:
        - name: display_name
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: Key for billing cluster
          description: Filter the results by a partial search of display_name.
        - name: provider
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: AWS
          description: Filter the results by exact match for provider.
        - name: state
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: IN_USE
          description: Filter the results by exact match for state.
        - name: validation_phase
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          description: Filter the results by exact match for validation_phase.
        - name: validation_region
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: us-west-2
          description: |
            Filter keys by the cloud region where they are deployed.
        - name: key
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: vault-name
          description: >
            Filters results by a partial match on the key identifier: key_arn
            for AWS, key_id for Azure and GCP.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
