          description: Applied Quota.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  A `quota` object represents a quota configuration for a
                  specific Confluent Cloud resource.

                  Use this API to retrieve an individual quota or list of quotas
                  for a given scope.



                  Related guide: [Service Quotas for Confluent
                  Cloud](https://docs.confluent.io/cloud/current/quotas/index.html).


