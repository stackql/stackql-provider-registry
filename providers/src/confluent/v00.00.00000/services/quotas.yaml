openapi: 3.0.0
info:
  title: quotas API
  description: confluent quotas API
  version: 1.0.0
paths:
  /service-quota/v1/applied-quotas:
    get:
      x-lifecycle-stage: General Availability
      x-self-access: true
      operationId: listServiceQuotaV1AppliedQuotas
      summary: List of Applied Quotas
      description: >
        [![General
        Availability](https://img.shields.io/badge/Lifecycle%20Stage-General%20Availability-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy)


        Retrieve a sorted, filtered, paginated list of all applied quotas.


        Shows all quotas for a given scope.
      parameters:
        - name: scope
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: ORGANIZATION
          description: |
            The applied scope the quota belongs to.
        - name: environment
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: env-00000
          description: |
            The environment ID the quota is associated with.
        - name: network
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: n-12034
          description: |
            The network ID the quota is associated with.
        - name: kafka_cluster
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: lkc-00000
          description: |
            The kafka cluster ID the quota is associated with.
        - name: id
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SearchFilter'
          example: iam.max_environments.per_org
          description: |
            The id (quota code) that this quota belongs to.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 200
            x-max-page-items: 500
          description: A pagination size for collection requests.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: An opaque pagination token for collection requests.
      tags:
        - Applied Quotas (service-quota/v1)
      security:
        - cloud-api-key: []
        - confluent-sts-access-token: []
      responses:
