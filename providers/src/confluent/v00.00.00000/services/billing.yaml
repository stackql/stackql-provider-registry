      required:
        - errors
      properties:
        errors:
          description: List of errors which caused this operation to fail
          type: array
          items:
            $ref: '#/components/schemas/Error'
          uniqueItems: true
    billing.v1.Resource:
      type: object
      description: >
        The resource associated with this object. The resource can be one of
        Kafka Cluster ID (example: lkc-12345),

        Connector ID (example:
            lcc-12345), Schema Registry Cluster ID (example: lsrc-12345), or ksqlDB Cluster ID
        (example: lksqlc-12345).

        May be null or omitted if not associated with a resource.
      properties:
        id:
          type: string
          description: ID of the resource.
          example: lkc-12345
        display_name:
          type: string
          description: Display name of the resource.
          example: prod-kafka-cluster
        environment:
          description: The environment associated with this resource
          nullable: true
          type: object
          properties:
            id:
