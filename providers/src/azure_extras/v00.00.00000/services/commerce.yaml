openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Commerce (Usage and RateCard)
  description: Legacy usage aggregates and RateCard pricing APIs.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2015-06-01-preview-stackql-generated
  x-serviceAlias: commerce
  x-sdkPackage: azure-mgmt-commerce
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    OfferTermInfo:
      type: object
      description: "Describes the offer term. You probably want to use the sub-classes and not this class directly. Known sub-classes are: MonetaryCommitment, MonetaryCredit, RecurringCharge All required parameters must be populated in order to send to server."
      properties:
        Name:
          type: string
          description: 'Name of the offer term. Required. Known values are: "Recurring Charge", "Monetary Commitment", and "Monetary Credit".'
        EffectiveDate:
          type: string
          format: date-time
          description: Indicates the date from which the offer term is effective.
      required:
        - Name
    MeterInfo:
      type: object
      description: Detailed information about the meter.
      properties:
        MeterId:
          type: string
          description: The unique identifier of the resource.
        MeterName:
          type: string
          description: The name of the meter, within the given meter category.
        MeterCategory:
          type: string
          description: The category of the meter, e.g., 'Cloud services', 'Networking', etc..
        MeterSubCategory:
          type: string
          description: The subcategory of the meter, e.g., 'A6 Cloud services', 'ExpressRoute (IXP)', etc..
        Unit:
          type: string
          description: The unit in which the meter consumption is charged, e.g., 'Hours', 'GB', etc.
        MeterTags:
          type: array
          items:
            type: string
          description: Provides additional meter data. 'Third Party' indicates a meter with no discount. Blanks indicate First Party.
        MeterRegion:
          type: string
          description: The region in which the Azure service is available.
        MeterRates:
          type: object
          properties: {}
          description: The list of key/value pairs for the meter rates, in the format 'key':'value' where key = the meter quantity, and value = the corresponding price.
        EffectiveDate:
          type: string
          format: date-time
          description: Indicates the date from which the meter rate is effective.
        IncludedQuantity:
          type: number
          description: The resource quantity that is included in the offer at no cost. Consumption beyond this quantity will be charged.
    ResourceRateCardInfo:
      type: object
      description: Price and Metadata information for resources.
      properties:
        Currency:
          type: string
          description: The currency in which the rates are provided.
        Locale:
          type: string
          description: The culture in which the resource information is localized.
        IsTaxIncluded:
          type: boolean
          description: All rates are pretax, so this will always be returned as 'false'.
        OfferTerms:
          type: array
          items:
            $ref: "#/components/schemas/OfferTermInfo"
          description: A list of offer terms.
        Meters:
          type: array
          items:
            $ref: "#/components/schemas/MeterInfo"
          description: A list of meters.
    UsageAggregationFlattened:
      type: object
      description: Flattened view of UsageAggregation ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Unique Id for the usage aggregate.
        name:
          type: string
          description: Name of the usage aggregate.
        type:
          type: string
          description: Type of the resource being returned.
        subscriptionId:
          type: string
          description: The subscription identifier for the Azure user.
        meterId:
          type: string
          description: Unique ID for the resource that was consumed (aka ResourceID).
        usageStartTime:
          type: string
          format: date-time
          description: UTC start time for the usage bucket to which this usage aggregate belongs.
        usageEndTime:
          type: string
          format: date-time
          description: UTC end time for the usage bucket to which this usage aggregate belongs.
        quantity:
          type: number
          description: The amount of the resource consumption that occurred in this time frame.
        unit:
          type: string
          description: The unit in which the usage for this resource is being counted, e.g. Hours, GB.
        meterName:
          type: string
          description: Friendly name of the resource being consumed.
        meterCategory:
          type: string
          description: Category of the consumed resource.
        meterSubCategory:
          type: string
          description: Sub-category of the consumed resource.
        meterRegion:
          type: string
          description: Region of the meterId used for billing purposes.
        infoFields:
          type: object
          properties: {}
          description: Key-value pairs of instance details (legacy format).
        instanceData:
          type: string
          description: Key-value pairs of instance details represented as a string.
    PagedUsageAggregationFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/UsageAggregationFlattened"
        nextLink:
          type: string
  x-stackQL-resources:
    rate_card:
      id: azure_extras.commerce.rate_card
      name: rate_card
      title: rate_card
      methods:
        get:
          operation:
            $ref: "#/paths/~1subscriptions~1{subscription_id}~1providers~1Microsoft.Commerce~1RateCard?api-version=2015-06-01-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/rate_card/methods/get"
        insert: []
        update: []
        delete: []
    usage_aggregates:
      id: azure_extras.commerce.usage_aggregates
      name: usage_aggregates
      title: usage_aggregates
      methods:
        list:
          operation:
            $ref: "#/paths/~1subscriptions~1{subscription_id}~1providers~1Microsoft.Commerce~1UsageAggregates?api-version=2015-06-01-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.value
            overrideMediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: |-
                {"value": [
                {{- range $i, $row := index . "value" }}{{ if $i }},{{ end }}
                  { {{ $p := index $row "properties" }}{{ if eq (kindOf $p) "map" }}{{ range $k, $v := $p }}{{ printf "%q" $k }}: {{ toJson $v }}, {{ end }}{{ end }}{{ range $k, $v := $row }}{{ printf "%q" $k }}: {{ toJson $v }}, {{ end }}"_flattened": true }
                {{- end }}
                ], "nextLink": {{ toJson (index . "nextLink") }}}
          request:
            nativeCasing: camel
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/usage_aggregates/methods/list"
        insert: []
        update: []
        delete: []
paths:
  /subscriptions/{subscription_id}/providers/Microsoft.Commerce/RateCard?api-version=2015-06-01-preview:
    get:
      operationId: RateCard_get
      description: "Enables you to query for the resource/meter metadata and related prices used in a given subscription by Offer ID, Currency, Locale and Region. The metadata associated with the billing meters, including but not limited to service names, types, resources, units of measure, and regions, is subject to change at any time and without notice. If you intend to use this billing data in an automated fashion, please use the billing meter GUID to uniquely identify each billable item. If the billing meter GUID is scheduled to change due to a new billing model, you will be notified in advance of the change. .. seealso:: - https://docs.microsoft.com/rest/api/commerce/ratecard"
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: $filter
          in: query
          required: true
          schema:
            type: string
          description: The filter to apply on the operation. It ONLY supports the 'eq' and 'and' logical operators at this time. All the 4 query parameters 'OfferDurableId', 'Currency', 'Locale', 'Region' are required to be a part of the $filter. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceRateCardInfo"
  /subscriptions/{subscription_id}/providers/Microsoft.Commerce/UsageAggregates?api-version=2015-06-01-preview:
    get:
      operationId: UsageAggregates_list
      description: "Query aggregated Azure subscription consumption data for a date range. .. seealso:: - https://docs.microsoft.com/rest/api/commerce/usageaggregates"
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: reportedStartTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: The start of the time range to retrieve data for. Required.
        - name: reportedEndTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: The end of the time range to retrieve data for. Required.
        - name: showDetails
          in: query
          required: false
          schema:
            type: boolean
          description: "`True` returns usage data in instance-level detail, `false` causes server-side aggregation with fewer details. For example, if you have 3 website instances, by default you will get 3 line items for website consumption. If you specify showDetails = false, the data will be aggregated as a single line item for website consumption within the time period (for the given subscriptionId, meterId, usageStartTime and usageEndTime). Default value is None."
        - name: aggregationGranularity
          in: query
          required: false
          schema:
            type: string
          description: '`Daily` (default) returns the data in daily granularity, `Hourly` returns the data in hourly granularity. Known values are: "Daily" and "Hourly". Default value is "Daily".'
        - name: continuationToken
          in: query
          required: false
          schema:
            type: string
          description: Used when a continuation token string is provided in the response body of the previous call, enabling paging through a large result set. If not present, the data is retrieved from the beginning of the day/hour (based on the granularity) passed in. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedUsageAggregationFlattened"
