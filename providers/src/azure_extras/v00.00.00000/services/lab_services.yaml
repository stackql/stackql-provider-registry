openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Lab Services
  description: Classroom and training labs with VM pools, schedules and users (retirement announced for 2027).
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2022-08-01-stackql-generated
  x-serviceAlias: lab_services
  x-sdkPackage: azure-mgmt-labservices
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
