    AutoShutdownProfile:
      type: object
      description: Profile for how to handle shutting down virtual machines.
      properties:
        shutdownOnDisconnect:
          type: string
          description: 'Whether shutdown on disconnect is enabled. Known values are: "Enabled" and "Disabled".'
        shutdownWhenNotConnected:
          type: string
          description: "Whether a VM will get shutdown when it hasn't been connected to after a period of time. Known values are: \"Enabled\" and \"Disabled\"."
        shutdownOnIdle:
          type: string
