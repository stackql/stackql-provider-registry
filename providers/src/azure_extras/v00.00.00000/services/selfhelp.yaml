paths:
  /{scope}/providers/Microsoft.Help/checkNameAvailability?api-version=2024-03-01-preview:
    post:
      operationId: CheckNameAvailability_check_availability
      description: This API is used to check the uniqueness of a resource name used for a diagnostic, troubleshooter or solutions.
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: "scope = resourceUri of affected resource. For example: /subscriptions/0d0fcd2e-c4fd-4349-8497-200edb3923c6/resourcegroups/myresourceGroup/providers/Microsoft.KeyVault/vaults/test-keyvault-non-read. Required."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the resource for which availability needs to be checked.
                type:
                  type: string
                  description: The resource type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckNameAvailabilityResponse"
  /{scope}/providers/Microsoft.Help/diagnostics/{diagnostics_resource_name}?api-version=2024-03-01-preview:
    get:
      operationId: Diagnostics_get
      description: Get the diagnostics using the 'diagnosticsResourceName' you chose while creating the diagnostic.
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: "scope = resourceUri of affected resource. For example: /subscriptions/0d0fcd2e-c4fd-4349-8497-200edb3923c6/resourcegroups/myresourceGroup/providers/Microsoft.KeyVault/vaults/test-keyvault-non-read. Required."
        - name: diagnostics_resource_name
          in: path
          required: true
          schema:
            type: string
          description: Unique resource name for insight resources. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticResourceFlattened"
    put:
      operationId: Diagnostics_begin_create
      description: Creates a diagnostic for the specific resource using solutionId from discovery solutions. Diagnostics are powerful solutions that access product resources or other relevant data and provide the root cause of the issue and the steps to address the issue..
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: "scope = resourceUri of affected resource. For example: /subscriptions/0d0fcd2e-c4fd-4349-8497-200edb3923c6/resourcegroups/myresourceGroup/providers/Microsoft.KeyVault/vaults/test-keyvault-non-read. Required."
        - name: diagnostics_resource_name
          in: path
          required: true
          schema:
            type: string
          description: Unique resource name for insight resources. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: object
                  properties:
                    globalParameters:
                      type: object
                      properties: {}
                      description: Global parameters is an optional map which can be used to add key and value to request body to improve the diagnostics results.
                    insights:
                      type: array
                      items:
                        $ref: "#/components/schemas/DiagnosticInvocation"
                      description: SolutionIds that are needed to be invoked.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticResource"
  /providers/Microsoft.Help/discoverSolutions?api-version=2024-03-01-preview:
    post:
      operationId: DiscoverySolutionNLP_discover_solutions
      description: Search for relevant Azure Diagnostics, Solutions and Troubleshooters using a natural language issue summary.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issueSummary:
                  type: string
                  description: Natural language description of the issue. Required.
                resourceId:
                  type: string
                  description: ARM resource Id of the resource that is having the issue. Only applicable for Discovery Solution NLP Subscription Scope.
                serviceId:
                  type: string
                  description: ARM service Id of the service that is having the issue. For more information on service Id see https://learn.microsoft.com/rest/api/support/services/list?tabs=HTTP.
                additionalContext:
                  type: string
                  description: Additional information in the form of a string.
              required:
                - issueSummary
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryNlpResponse"
  /subscriptions/{subscription_id}/providers/Microsoft.Help/discoverSolutions?api-version=2024-03-01-preview:
    post:
      operationId: DiscoverySolutionNLP_discover_solutions_by_subscription
      description: Search for relevant Azure Diagnostics, Solutions and Troubleshooters using a natural language issue summary and subscription.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
