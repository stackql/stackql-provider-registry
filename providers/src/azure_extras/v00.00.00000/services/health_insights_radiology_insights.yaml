openapi: 3.0.0
servers:
  - url: https://{endpoint}/health-insights
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure AI Health Insights - Radiology Insights (Data Plane)
  description: Derive quality checks and follow-up inferences from radiology reports.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2024-10-01-stackql-generated
  x-serviceAlias: health_insights_radiology_insights
  x-sdkPackage: azure-healthinsights-radiologyinsights
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    RadiologyInsightsData:
      type: object
      description: Contains the list of patients, and configuration data.
      properties:
        patients:
          type: array
          items:
            $ref: "#/components/schemas/PatientRecord"
          description: The list of patients, including their clinical information and data. Required.
        configuration:
          $ref: "#/components/schemas/RadiologyInsightsModelConfiguration"
          description: Configuration affecting the Radiology Insights model's inference.
      required:
        - patients
    PatientRecord:
      type: object
      description: A patient record, including their clinical information and data.
      properties:
        id:
          type: string
          description: A given identifier for the patient. Has to be unique across all patients in a single request. Required.
        details:
          $ref: "#/components/schemas/PatientDetails"
          description: Patient structured information, including demographics and known structured clinical information.
        encounters:
          type: array
          items:
            $ref: "#/components/schemas/PatientEncounter"
          description: Patient encounters/visits.
        patientDocuments:
          type: array
          items:
            $ref: "#/components/schemas/PatientDocument"
          description: Patient unstructured clinical data, given as documents.
      required:
        - id
    PatientDetails:
      type: object
      description: Patient structured information, including demographics and known structured clinical information.
      properties:
        sex:
          $ref: "#/components/schemas/PatientSex"
          description: "The patient's sex. Known values are: \"female\", \"male\", and \"unspecified\"."
        birthDate:
          type: string
          format: date
          description: The patient's date of birth.
        clinicalInfo:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
          description: Known clinical information for the patient, structured.
    PatientSex:
      type: string
      enum:
        - female
        - male
        - unspecified
    Resource:
      type: object
      description: Resource is the ancestor of DomainResource from which most resources are derived. Bundle, Parameters, and Binary extend Resource directly. Based on [FHIR Resource](`https://www.hl7.org/fhir/r4/resource.html `_.
      properties:
        resourceType:
          type: string
          description: The type of resource. Required.
        id:
          type: string
          description: Resource Id.
        meta:
          $ref: "#/components/schemas/Meta"
          description: Metadata about the resource.
        implicitRules:
          type: string
          description: A set of rules under which this content was created.
        language:
          type: string
          description: Language of the resource content.
      required:
        - resourceType
    Meta:
      type: object
      description: Metadata about a resource Based on `FHIR Meta `_.
      properties:
        versionId:
          type: string
          description: The version specific identifier, as it appears in the version portion of the URL. This value changes when the resource is created, updated, or deleted.
        lastUpdated:
          type: string
          description: When the resource last changed - e.g. when the version changed.
        source:
          type: string
          description: A uri that identifies the source system of the resource. This provides a minimal amount of Provenance information that can be used to track or differentiate the source of information in the resource. The source may identify another FHIR server, document, message, database, etc.
        profile:
          type: array
          items:
            type: string
          description: A list of profiles (references to `StructureDefinition `_ resources) that this resource claims to conform to. The URL is a reference to `StructureDefinition.url `_.
        security:
          type: array
          items:
            $ref: "#/components/schemas/Coding"
          description: Security labels applied to this resource. These tags connect specific resources to the overall security policy and infrastructure.
        tag:
          type: array
          items:
            $ref: "#/components/schemas/Coding"
          description: Tags applied to this resource. Tags are intended to be used to identify and relate resources to process and workflow, and applications are not required to consider the tags when interpreting the meaning of a resource.
    Coding:
      type: object
      description: A Coding is a representation of a defined concept using a symbol from a defined "code system". Based on `FHIR Coding `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        system:
          type: string
          description: Identity of the terminology system.
        version:
          type: string
          description: Version of the system - if relevant.
        code:
          type: string
          description: Symbol in syntax defined by the system.
        display:
          type: string
          description: Representation defined by the system.
    Extension:
      type: object
      description: Base for all elements Based on `FHIR Element `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        url:
          type: string
          description: Source of the definition for the extension code - a logical name or a URL. Required.
        valueQuantity:
          $ref: "#/components/schemas/Quantity"
          description: Value as Quantity.
        valueCodeableConcept:
          $ref: "#/components/schemas/CodeableConcept"
          description: Value as CodeableConcept.
        valueString:
          type: string
          description: Value as string.
        valueBoolean:
          type: boolean
          description: Value as boolean.
        valueInteger:
          type: integer
          description: Value as integer.
        valueRange:
          $ref: "#/components/schemas/Range"
          description: Value as Range.
        valueRatio:
          $ref: "#/components/schemas/Ratio"
          description: Value as Ratio.
        valueSampledData:
          $ref: "#/components/schemas/SampledData"
          description: Value as SampledData.
        valueTime:
          type: string
          description: Value as time (hh:mm:ss).
        valueDateTime:
          type: string
          description: Value as dateTime.
        valuePeriod:
          $ref: "#/components/schemas/Period"
          description: Value as Period.
        valueReference:
          $ref: "#/components/schemas/Reference"
          description: Value as reference.
      required:
        - url
    Quantity:
      type: object
      description: A measured or measurable amount Based on `FHIR Quantity `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        value:
          type: number
          description: Numerical value (with implicit precision).
        comparator:
          type: string
          description: < | <= | >= | > - how to understand the value.
        unit:
          type: string
          description: Unit representation.
        system:
          type: string
          description: System that defines coded unit form.
        code:
          type: string
          description: Coded form of the unit.
    CodeableConcept:
      type: object
      description: Concept - reference to a terminology or just text Based on `FHIR CodeableConcept `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        coding:
          type: array
          items:
            $ref: "#/components/schemas/Coding"
          description: Code defined by a terminology system.
        text:
          type: string
          description: Plain text representation of the concept.
    Range:
      type: object
      description: A set of ordered Quantities defined by a low and high limit Based on `FHIR Range `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        low:
          $ref: "#/components/schemas/Quantity"
          description: Low limit.
        high:
          $ref: "#/components/schemas/Quantity"
          description: High limit.
    Ratio:
      type: object
      description: A ratio of two Quantity values - a numerator and a denominator Based on `FHIR Ratio `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        numerator:
          $ref: "#/components/schemas/Quantity"
          description: Numerator value.
        denominator:
          $ref: "#/components/schemas/Quantity"
          description: Denominator value.
    SampledData:
      type: object
      description: A series of measurements taken by a device Based on `FHIR SampledData `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        origin:
          $ref: "#/components/schemas/Quantity"
          description: Zero value and units. Required.
        period:
          type: number
          description: Number of milliseconds between samples. Required.
        factor:
          type: number
          description: Multiply data by this before adding to origin.
        lowerLimit:
          type: number
          description: Lower limit of detection.
        upperLimit:
          type: number
          description: Upper limit of detection.
        dimensions:
          type: integer
          description: Number of sample points at each time point. Required.
        data:
          type: string
          description: Decimal values with spaces, or "E" | "U" | "L".
      required:
        - origin
        - period
        - dimensions
    Period:
      type: object
      description: A time period defined by a start and end date and optionally time Based on `FHIR Period `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        start:
          type: string
          description: Starting time with inclusive boundary.
        end:
          type: string
          description: End time with inclusive boundary, if not ongoing.
    Reference:
      type: object
      description: A reference from one resource to another Based on `FHIR Reference `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        reference:
          type: string
          description: Literal reference, Relative, internal or absolute URL.
        type:
          type: string
          description: Type the reference refers to (e.g. "Patient").
        identifier:
          $ref: "#/components/schemas/Identifier"
          description: Logical reference, when literal reference is not known.
        display:
          type: string
          description: Text alternative for the resource.
    Identifier:
      type: object
      description: An identifier intended for computation Based on `FHIR Identifier `_.
      properties:
        id:
          type: string
          description: Unique id for inter-element referencing.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
        use:
          type: string
          description: usual | official | temp | secondary | old (If known).
        type:
          $ref: "#/components/schemas/CodeableConcept"
          description: Description of identifier.
        system:
          type: string
          description: The namespace for the identifier value.
        value:
          type: string
          description: The value that is unique.
        period:
          $ref: "#/components/schemas/Period"
          description: Time period when id is/was valid for use.
        assigner:
          $ref: "#/components/schemas/Reference"
          description: Organization that issued id (may be just text).
    PatientEncounter:
      type: object
      description: visit/encounter information.
      properties:
        id:
          type: string
          description: The id of the visit. Required.
        period:
          $ref: "#/components/schemas/TimePeriod"
          description: Time period of the visit. In case of admission, use timePeriod.start to indicate the admission time and timePeriod.end to indicate the discharge time.
        class:
          $ref: "#/components/schemas/EncounterClass"
          description: 'The class of the encounter. Known values are: "inpatient", "ambulatory", "observation", "emergency", "virtual", and "healthHome".'
      required:
        - id
    TimePeriod:
      type: object
      description: A duration of time during which an event is happening.
      properties:
        start:
          type: string
          format: date-time
          description: Starting time with inclusive boundary.
        end:
          type: string
          format: date-time
          description: End time with inclusive boundary, if not ongoing.
    EncounterClass:
      type: string
      enum:
        - inpatient
        - ambulatory
        - observation
        - emergency
        - virtual
        - healthHome
    PatientDocument:
      type: object
      description: A clinical document related to a patient. Document here is in the wide sense - not just a text document (note).
      properties:
        type:
          $ref: "#/components/schemas/DocumentType"
          description: "The type of the patient document, such as 'note' (text document) or 'fhirBundle' (FHIR JSON document). Required. Known values are: \"note\", \"fhirBundle\", \"dicom\", and \"genomicSequencing\"."
        clinicalType:
          $ref: "#/components/schemas/ClinicalDocumentType"
          description: 'The type of the clinical document. Known values are: "consultation", "dischargeSummary", "historyAndPhysical", "radiologyReport", "procedure", "progress", "laboratory", and "pathologyReport".'
        id:
          type: string
          description: A given identifier for the document. Has to be unique across all documents for a single patient. Required.
        language:
          type: string
          description: A 2 letter ISO 639-1 representation of the language of the document.
        createdAt:
          type: string
          format: date-time
          description: The date and time when the document was created.
        authors:
          type: array
          items:
            $ref: "#/components/schemas/DocumentAuthor"
          description: Document author(s).
        specialtyType:
          $ref: "#/components/schemas/SpecialtyType"
          description: 'specialty type the document. Known values are: "pathology" and "radiology".'
        administrativeMetadata:
          $ref: "#/components/schemas/DocumentAdministrativeMetadata"
          description: Administrative metadata for the document.
        content:
          $ref: "#/components/schemas/DocumentContent"
          description: The content of the patient document. Required.
      required:
        - type
        - id
        - content
    DocumentType:
      type: string
      enum:
        - note
        - fhirBundle
        - dicom
        - genomicSequencing
    ClinicalDocumentType:
      type: string
      enum:
        - consultation
        - dischargeSummary
        - historyAndPhysical
        - radiologyReport
        - procedure
        - progress
        - laboratory
        - pathologyReport
    DocumentAuthor:
      type: object
      description: Document author.
      properties:
        id:
          type: string
          description: author id.
        fullName:
          type: string
          description: Text representation of the full name.
    SpecialtyType:
      type: string
      enum:
        - pathology
        - radiology
    DocumentAdministrativeMetadata:
      type: object
      description: Document administrative metadata.
      properties:
        orderedProcedures:
          type: array
          items:
            $ref: "#/components/schemas/OrderedProcedure"
          description: List of procedure information associated with the document.
        encounterId:
          type: string
          description: Reference to the encounter associated with the document.
    OrderedProcedure:
      type: object
      description: Procedure information.
      properties:
        code:
          $ref: "#/components/schemas/CodeableConcept"
          description: Procedure code.
        description:
          type: string
          description: Procedure description.
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
    DocumentContent:
      type: object
      description: The content of the patient document.
      properties:
        sourceType:
          $ref: "#/components/schemas/DocumentContentSourceType"
          description: "The type of the content's source. In case the source type is 'inline', the content is given as a string (for instance, text). In case the source type is 'reference', the content is given as a URI. Required. Known values are: \"inline\" and \"reference\"."
        value:
          type: string
          description: The content of the document, given either inline (as a string) or as a reference (URI). Required.
      required:
        - sourceType
        - value
    DocumentContentSourceType:
      type: string
      enum:
        - inline
        - reference
    RadiologyInsightsModelConfiguration:
      type: object
      description: Configuration affecting the Radiology Insights model's inference.
      properties:
        verbose:
          type: boolean
          description: An indication whether the model should produce verbose output.
        includeEvidence:
          type: boolean
          description: An indication whether the model's output should include evidence for the inferences.
        inferenceTypes:
          type: array
          items:
            $ref: "#/components/schemas/RadiologyInsightsInferenceType"
          description: This is a list of inference types to be inferred for the current request. It could be used if only part of the Radiology Insights inferences are required. If this list is omitted or empty, the model will return all the inference types.
        inferenceOptions:
          $ref: "#/components/schemas/RadiologyInsightsInferenceOptions"
          description: Options regarding follow up recommendation inferences and finding inferences.
        locale:
          type: string
          description: Local for the model to use. If not specified, the model will use the default locale.
    RadiologyInsightsInferenceType:
      type: string
      enum:
        - ageMismatch
        - lateralityDiscrepancy
        - sexMismatch
        - completeOrderDiscrepancy
        - limitedOrderDiscrepancy
        - finding
        - criticalResult
        - followupRecommendation
        - followupCommunication
        - radiologyProcedure
        - scoringAndAssessment
        - guidance
        - qualityMeasure
    RadiologyInsightsInferenceOptions:
      type: object
      description: Options regarding follow up recommendation inferences and finding inferences.
      properties:
        followupRecommendationOptions:
          $ref: "#/components/schemas/FollowupRecommendationOptions"
          description: Follow-up recommendation options.
        findingOptions:
          $ref: "#/components/schemas/FindingOptions"
          description: Finding options.
        guidanceOptions:
          $ref: "#/components/schemas/GuidanceOptions"
          description: Guidance options.
        qualityMeasureOptions:
          $ref: "#/components/schemas/QualityMeasureOptions"
          description: QualityMeasureOptions.
    FollowupRecommendationOptions:
      type: object
      description: Follow-up recommendation options.
      properties:
        includeRecommendationsWithNoSpecifiedModality:
          type: boolean
          description: Include/Exclude follow-up recommendations without a specific radiology procedure. Default is false.
        includeRecommendationsInReferences:
          type: boolean
          description: Include/Exclude follow-up recommendations in references to a guideline or article. Default is false.
        provideFocusedSentenceEvidence:
          type: boolean
          description: If this is true, provide one or more sentences as evidence for the recommendation, next to the token evidence. The start and end positions of these sentences will be put in an extension with url 'modality_sentences'. Default is false.
    FindingOptions:
      type: object
      description: Finding options.
      properties:
        provideFocusedSentenceEvidence:
          type: boolean
          description: If this is true, provide the sentence that contains the first token of the finding's clinical indicator (i.e. the medical problem), if there is one. This sentence is provided as an extension with url 'ci_sentence', next to the token evidence. Default is false.
    GuidanceOptions:
      type: object
      description: Guidance options.
      properties:
        showGuidanceInHistory:
          type: boolean
          description: If this is true, also show guidances from a clinical history section i.e. if the first token of the associated finding's clinical indicator is in this section. Default is false. Required.
      required:
        - showGuidanceInHistory
    QualityMeasureOptions:
      type: object
      description: Quality Measure Options.
      properties:
        measureTypes:
          type: array
          items:
            $ref: "#/components/schemas/QualityMeasureType"
          description: Id(s) of the MIPS measures that need to be evaluated in the document. Required.
      required:
        - measureTypes
    QualityMeasureType:
      type: string
      enum:
        - mips76
        - mips147
        - mips195
        - mips360
        - mips364
        - mips405
        - mips406
        - mips436
        - mips145
        - acrad36
        - acrad37
        - acrad38
        - acrad39
        - acrad40
        - acrad41
        - acrad42
        - mednax55
        - msn13
        - msn15
        - qmm26
        - qmm17
        - qmm18
        - qmm19
    RadiologyInsightsJob:
      type: object
      description: Response for the Radiology Insights request.
      properties:
        jobData:
          $ref: "#/components/schemas/RadiologyInsightsData"
          description: The request data for the operation.
        result:
          $ref: "#/components/schemas/RadiologyInsightsInferenceResult"
          description: The result of the operation.
        id:
          type: string
          description: The unique ID of the job. Required.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: 'The status of the job. Required. Known values are: "notStarted", "running", "succeeded", "failed", and "canceled".'
        createdAt:
          type: string
          format: date-time
          description: The date and time when the processing job was created.
        expiresAt:
          type: string
          format: date-time
          description: The date and time when the processing job is set to expire.
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the processing job was last updated.
        error:
          type: object
          properties: {}
          description: Error object that describes the error when status is "Failed".
    RadiologyInsightsInferenceResult:
      type: object
      description: The inference results for the Radiology Insights request. If field 'status' has value 'succeeded', then field 'result' will contain an instance of RadiologyInsightsInferenceResult.
      properties:
        patientResults:
          type: array
          items:
            $ref: "#/components/schemas/RadiologyInsightsPatientResult"
          description: Results for the patients given in the request. Required.
        modelVersion:
          type: string
          description: The version of the model used for inference, expressed as the model date. Required.
      required:
        - patientResults
        - modelVersion
    RadiologyInsightsPatientResult:
      type: object
      description: Results of the model's work for a single patient.
      properties:
        patientId:
          type: string
          description: Identifier given for the patient in the request. Required.
        inferences:
          type: array
          items:
            $ref: "#/components/schemas/RadiologyInsightsInference"
          description: The model's inferences for the given patient. Required.
      required:
        - patientId
        - inferences
    RadiologyInsightsInference:
      type: object
      description: "An inference made by the Radiology Insights model regarding a patient. * AgeMismatch * SexMismatch * LateralityDiscrepancy * CompleteOrderDiscrepancy * LimitedOrderDiscrepancy * Finding * CriticalResult * FollowupRecommendation * RadiologyProcedure * FollowupCommunication. You probably want to use the sub-classes and not this class directly. Known sub-classes are: AgeMismatchInference, CompleteOrderDiscrepancyInference, CriticalResultInference, FindingInference, FollowupCommunicationInference, FollowupRecommendationInference, GuidanceInference, LateralityDiscrepancyInference, LimitedOrderDiscrepancyInference, QualityMeasureInference, RadiologyProcedureInference, ScoringAndAssessmentInference, SexMismatchInference"
      properties:
        kind:
          type: string
          description: 'Discriminator property for RadiologyInsightsInference. Required. Known values are: "ageMismatch", "lateralityDiscrepancy", "sexMismatch", "completeOrderDiscrepancy", "limitedOrderDiscrepancy", "finding", "criticalResult", "followupRecommendation", "followupCommunication", "radiologyProcedure", "scoringAndAssessment", "guidance", and "qualityMeasure".'
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Additional Content defined by implementations.
      required:
        - kind
    JobStatus:
      type: string
      enum:
        - notStarted
        - running
        - succeeded
        - failed
        - canceled
  x-stackQL-resources:
    infer_radiology_insights:
      id: azure_extras.health_insights_radiology_insights.infer_radiology_insights
      name: infer_radiology_insights
      title: infer_radiology_insights
      methods:
        infer_radiology_insights:
          operation:
            $ref: "#/paths/~1radiology-insights~1jobs~1{id}?api-version=2024-10-01/put"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select: []
        insert: []
        update: []
        delete: []
paths:
  /radiology-insights/jobs/{id}?api-version=2024-10-01:
    put:
      operationId: RadiologyInsightsClient_begin_infer_radiology_insights
      description: Create Radiology Insights job. Creates a Radiology Insights job with the given request body.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the job. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobData:
                  $ref: "#/components/schemas/RadiologyInsightsData"
                  description: The request data for the operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadiologyInsightsJob"
