    PagedOrderResourceFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/OrderResourceFlattened"
        nextLink:
          type: string
    OrderItemDetails:
      type: object
      description: Order item details. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        productDetails:
          $ref: "#/components/schemas/ProductDetails"
          description: Unique identifier for configuration. Required.
        orderItemType:
          type: string
          description: 'Order item type. Required. Known values are: "Purchase" and "Rental".'
        currentStage:
          $ref: "#/components/schemas/StageDetails"
          description: Current Order item Status.
        orderItemStageHistory:
          type: array
          items:
            $ref: "#/components/schemas/StageDetails"
          description: Order item status history.
        preferences:
          $ref: "#/components/schemas/Preferences"
          description: Customer notification Preferences.
        forwardShippingDetails:
          $ref: "#/components/schemas/ForwardShippingDetails"
          description: Forward Package Shipping details.
        reverseShippingDetails:
          $ref: "#/components/schemas/ReverseShippingDetails"
          description: Reverse Package Shipping details.
        notificationEmailList:
          type: array
          items:
            type: string
          description: Additional notification email list.
        cancellationReason:
          type: string
          description: Cancellation reason.
        cancellationStatus:
          type: string
          description: 'Describes whether the order item is cancellable or not. Known values are: "Cancellable", "CancellableWithFee", and "NotCancellable".'
        deletionStatus:
          type: string
          description: 'Describes whether the order item is deletable or not. Known values are: "Allowed" and "NotAllowed".'
        returnReason:
          type: string
          description: Return reason.
        returnStatus:
          type: string
          description: 'Describes whether the order item is returnable or not. Known values are: "Returnable", "ReturnableWithFee", and "NotReturnable".'
        managementRpDetails:
          $ref: "#/components/schemas/ResourceProviderDetails"
          description: Parent RP details - this returns only the first or default parent RP from the entire list.
        managementRpDetailsList:
          type: array
          items:
            $ref: "#/components/schemas/ResourceProviderDetails"
          description: List of parent RP details supported for configuration.
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: Top level error for the job.
      required:
        - productDetails
        - orderItemType
    ProductDetails:
      type: object
      description: Represents product details. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        displayInfo:
          $ref: "#/components/schemas/DisplayInfo"
          description: Display details of the product.
        hierarchyInformation:
          $ref: "#/components/schemas/HierarchyInformation"
          description: Hierarchy of the product which uniquely identifies the product. Required.
        count:
          type: integer
          description: Quantity of the product.
        productDoubleEncryptionStatus:
          type: string
          description: 'Double encryption status of the configuration. Read-only field. Known values are: "Disabled" and "Enabled".'
        deviceDetails:
          type: array
          items:
            $ref: "#/components/schemas/DeviceDetails"
          description: list of device details.
      required:
        - hierarchyInformation
    DisplayInfo:
