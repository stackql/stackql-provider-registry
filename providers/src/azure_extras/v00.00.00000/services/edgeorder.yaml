openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Edge Order Management Client
  description: The EdgeOrder Client.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2021-12-01-stackql-generated
  x-serviceAlias: edgeorder
  x-sdkPackage: azure-mgmt-edgeorder
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    OperationDisplay:
      type: object
      description: Localized display information for this particular operation. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        provider:
          type: string
          description: The localized friendly form of the resource provider name, e.g. "Microsoft Monitoring Insights" or "Microsoft Compute".
        resource:
          type: string
          description: The localized friendly name of the resource type related to this operation. E.g. "Virtual Machines" or "Job Schedule Collections".
        operation:
          type: string
          description: The concise, localized friendly name for the operation; suitable for dropdowns. E.g. "Create or Update Virtual Machine", "Restart Virtual Machine".
        description:
          type: string
          description: The short, localized friendly description of the operation; suitable for tool tips and detailed views.
    Operation:
      type: object
      description: Details of a REST API operation, returned from the Resource Provider Operations API. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        name:
          type: string
          description: 'The name of the operation, as per Resource-Based Access Control (RBAC). Examples: "Microsoft.Compute/virtualMachines/write", "Microsoft.Compute/virtualMachines/capture/action".'
        isDataAction:
          type: boolean
          description: Whether the operation applies to data-plane. This is "true" for data-plane operations and "false" for ARM/control-plane operations.
        display:
          $ref: "#/components/schemas/OperationDisplay"
          description: Localized display information for this particular operation.
        origin:
          type: string
          description: 'The intended executor of the operation; as in Resource Based Access Control (RBAC) and audit logs UX. Default value is "user,system". Known values are: "user", "system", and "user,system".'
        actionType:
          type: string
          description: Enum. Indicates the action type. "Internal" refers to actions that are for internal only APIs. "Internal"
    PagedOperation:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
        nextLink:
          type: string
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          type: string
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          type: string
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    ShippingAddress:
      type: object
      description: Shipping address where customer wishes to receive the device. All required parameters must be populated in order to send to server.
      properties:
        streetAddress1:
          type: string
          description: Street Address line 1. Required.
        streetAddress2:
          type: string
          description: Street Address line 2.
        streetAddress3:
          type: string
          description: Street Address line 3.
        city:
          type: string
          description: Name of the City.
        stateOrProvince:
          type: string
          description: Name of the State or Province.
        country:
          type: string
          description: Name of the Country. Required.
        postalCode:
          type: string
          description: Postal code.
        zipExtendedCode:
          type: string
          description: Extended Zip Code.
        companyName:
          type: string
          description: Name of the company.
        addressType:
          type: string
          description: 'Type of address. Known values are: "None", "Residential", and "Commercial".'
      required:
        - streetAddress1
        - country
    ContactDetails:
      type: object
      description: Contact Details. All required parameters must be populated in order to send to server.
      properties:
        contactName:
          type: string
          description: Contact name of the person. Required.
        phone:
          type: string
          description: Phone number of the contact person. Required.
        phoneExtension:
          type: string
          description: Phone extension number of the contact person.
        mobile:
          type: string
          description: Mobile number of the contact person.
        emailList:
          type: array
          items:
            type: string
          description: List of Email-ids to be notified about job progress. Required.
      required:
        - contactName
        - phone
        - emailList
    AddressResourceFlattened:
      type: object
      description: Flattened view of AddressResource ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: "Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}. # pylint: disable=line-too-long"
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        tags:
          type: object
          properties: {}
          description: Resource tags.
        location:
          type: string
          description: The geo-location where the resource lives. Required.
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Represents resource creation and update time.
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
          description: Shipping details for the address.
        contactDetails:
          $ref: "#/components/schemas/ContactDetails"
          description: Contact details for the address. Required.
        addressValidationStatus:
          type: string
          description: 'Status of address validation. Known values are: "Valid", "Invalid", and "Ambiguous".'
    PagedAddressResourceFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AddressResourceFlattened"
        nextLink:
          type: string
    CustomerSubscriptionDetails:
      type: object
      description: Holds Customer subscription details. Clients can display available products to unregistered customers by explicitly passing subscription details. All required parameters must be populated in order to send to server.
      properties:
        registeredFeatures:
          type: array
          items:
            $ref: "#/components/schemas/CustomerSubscriptionRegisteredFeatures"
          description: List of registered feature flags for subscription.
        locationPlacementId:
          type: string
          description: Location placement Id of a subscription.
        quotaId:
          type: string
          description: Quota ID of a subscription. Required.
      required:
        - quotaId
    CustomerSubscriptionRegisteredFeatures:
      type: object
      description: Represents subscription registered features.
      properties:
        name:
          type: string
          description: Name of subscription registered feature.
        state:
          type: string
          description: State of subscription registered feature.
    ProductFamily:
      type: object
      description: Product Family. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        properties:
          type: object
          properties:
            displayName:
              type: string
              description: Display Name for the product system.
            description:
              $ref: "#/components/schemas/Description"
              description: Description related to the product system.
            imageInformation:
              type: array
              items:
                $ref: "#/components/schemas/ImageInformation"
              description: Image information for the product system.
            costInformation:
              $ref: "#/components/schemas/CostInformation"
              description: Cost information for the product system.
            availabilityInformation:
              $ref: "#/components/schemas/AvailabilityInformation"
              description: Availability information of the product system.
            hierarchyInformation:
              $ref: "#/components/schemas/HierarchyInformation"
              description: Hierarchy information of a product.
            filterableProperties:
              type: array
              items:
                $ref: "#/components/schemas/FilterableProperty"
              description: list of filters supported for a product.
            productLines:
              type: array
              items:
                $ref: "#/components/schemas/ProductLine"
              description: List of product lines supported in the product family.
            resourceProviderDetails:
              type: array
              items:
                $ref: "#/components/schemas/ResourceProviderDetails"
              description: Contains details related to resource provider.
    Description:
      type: object
      description: Description related properties of a product system. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        descriptionType:
          type: string
          description: Type of description. "Base"
        shortDescription:
          type: string
          description: Short description of the product system.
        longDescription:
          type: string
          description: Long description of the product system.
        keywords:
          type: array
          items:
            type: string
          description: Keywords for the product system.
        attributes:
          type: array
          items:
            type: string
          description: Attributes for the product system.
        links:
          type: array
          items:
            $ref: "#/components/schemas/Link"
          description: Links for the product system.
    Link:
      type: object
      description: Returns link related to the product. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        linkType:
          type: string
          description: 'Type of link. Known values are: "Generic", "TermsAndConditions", "Specification", "Documentation", "KnowMore", and "SignUp".'
        linkUrl:
          type: string
          description: Url of the link.
    ImageInformation:
      type: object
      description: Image for the product. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        imageType:
          type: string
          description: 'Type of the image. Known values are: "MainImage", "BulletImage", and "GenericImage".'
        imageUrl:
          type: string
          description: Url of the image.
    CostInformation:
      type: object
      description: Cost information for the product system. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        billingMeterDetails:
          type: array
          items:
            $ref: "#/components/schemas/BillingMeterDetails"
          description: Details on the various billing aspects for the product system.
        billingInfoUrl:
          type: string
          description: Default url to display billing information.
    BillingMeterDetails:
      type: object
      description: Holds billing meter details for each type of billing. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        name:
          type: string
          description: Represents Billing type name.
        meterDetails:
          $ref: "#/components/schemas/MeterDetails"
          description: Represents MeterDetails.
        meteringType:
          type: string
          description: 'Represents Metering type (eg one-time or recurrent). Known values are: "OneTime", "Recurring", and "Adhoc".'
        frequency:
          type: string
          description: Frequency of recurrence.
    MeterDetails:
      type: object
      description: "Holds details about billing type and its meter guids. You probably want to use the sub-classes and not this class directly. Known sub-classes are: Pav2MeterDetails, PurchaseMeterDetails Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server."
      properties:
        billingType:
          type: string
          description: 'Represents billing type. Required. Known values are: "Pav2" and "Purchase".'
        multiplier:
          type: number
          description: Billing unit applicable for Pav2 billing.
        chargingType:
          type: string
          description: 'Charging type. Known values are: "PerOrder" and "PerDevice".'
      required:
        - billingType
    AvailabilityInformation:
      type: object
      description: Availability information of a product system. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        availabilityStage:
          type: string
          description: 'Current availability stage of the product. Availability stage. Known values are: "Available", "ComingSoon", "Preview", "Deprecated", "Signup", and "Unavailable".'
        disabledReason:
          type: string
          description: 'Reason why the product is disabled. Known values are: "None", "Country", "Region", "Feature", "OfferType", "NoSubscriptionInfo", "NotAvailable", and "OutOfStock".'
        disabledReasonMessage:
          type: string
          description: Message for why the product is disabled.
    HierarchyInformation:
      type: object
      description: Holds details about product hierarchy information.
      properties:
        productFamilyName:
          type: string
          description: Represents product family name that uniquely identifies product family.
        productLineName:
          type: string
          description: Represents product line name that uniquely identifies product line.
        productName:
          type: string
          description: Represents product name that uniquely identifies product.
        configurationName:
          type: string
          description: Represents configuration name that uniquely identifies configuration.
    FilterableProperty:
      type: object
      description: Different types of filters supported and its values. All required parameters must be populated in order to send to server.
      properties:
        type:
          type: string
          description: 'Type of product filter. Required. Known values are: "ShipToCountries" and "DoubleEncryptionStatus".'
        supportedValues:
          type: array
          items:
            type: string
          description: Values to be filtered. Required.
      required:
        - type
        - supportedValues
    ProductLine:
      type: object
      description: Product line. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        properties:
          type: object
          properties:
            displayName:
              type: string
              description: Display Name for the product system.
            description:
              $ref: "#/components/schemas/Description"
              description: Description related to the product system.
            imageInformation:
              type: array
              items:
                $ref: "#/components/schemas/ImageInformation"
              description: Image information for the product system.
            costInformation:
              $ref: "#/components/schemas/CostInformation"
              description: Cost information for the product system.
            availabilityInformation:
              $ref: "#/components/schemas/AvailabilityInformation"
              description: Availability information of the product system.
            hierarchyInformation:
              $ref: "#/components/schemas/HierarchyInformation"
              description: Hierarchy information of a product.
            filterableProperties:
              type: array
              items:
                $ref: "#/components/schemas/FilterableProperty"
              description: list of filters supported for a product.
            products:
              type: array
              items:
                $ref: "#/components/schemas/Product"
              description: List of products in the product line.
    Product:
      type: object
      description: List of Products. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        properties:
          type: object
          properties:
            displayName:
              type: string
              description: Display Name for the product system.
            description:
              $ref: "#/components/schemas/Description"
              description: Description related to the product system.
            imageInformation:
              type: array
              items:
                $ref: "#/components/schemas/ImageInformation"
              description: Image information for the product system.
            costInformation:
              $ref: "#/components/schemas/CostInformation"
              description: Cost information for the product system.
            availabilityInformation:
              $ref: "#/components/schemas/AvailabilityInformation"
              description: Availability information of the product system.
            hierarchyInformation:
              $ref: "#/components/schemas/HierarchyInformation"
              description: Hierarchy information of a product.
            filterableProperties:
              type: array
              items:
                $ref: "#/components/schemas/FilterableProperty"
              description: list of filters supported for a product.
            configurations:
              type: array
              items:
                $ref: "#/components/schemas/Configuration"
              description: List of configurations for the product.
    Configuration:
      type: object
      description: Configuration object. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        properties:
          type: object
          properties:
            displayName:
              type: string
              description: Display Name for the product system.
            description:
              $ref: "#/components/schemas/Description"
              description: Description related to the product system.
            imageInformation:
              type: array
              items:
                $ref: "#/components/schemas/ImageInformation"
              description: Image information for the product system.
            costInformation:
              $ref: "#/components/schemas/CostInformation"
              description: Cost information for the product system.
            availabilityInformation:
              $ref: "#/components/schemas/AvailabilityInformation"
              description: Availability information of the product system.
            hierarchyInformation:
              $ref: "#/components/schemas/HierarchyInformation"
              description: Hierarchy information of a product.
            filterableProperties:
              type: array
              items:
                $ref: "#/components/schemas/FilterableProperty"
              description: list of filters supported for a product.
            specifications:
              type: array
              items:
                $ref: "#/components/schemas/Specification"
              description: Specifications of the configuration.
            dimensions:
              $ref: "#/components/schemas/Dimensions"
              description: Dimensions of the configuration.
    Specification:
      type: object
      description: Specifications of the configurations. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        name:
          type: string
          description: Name of the specification.
        value:
          type: string
          description: Value of the specification.
    Dimensions:
      type: object
      description: Dimensions of a configuration. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        length:
          type: number
          description: Length of the device.
        height:
          type: number
          description: Height of the device.
        width:
          type: number
          description: Width of the device.
        lengthHeightUnit:
          type: string
          description: 'Unit for the dimensions of length, height and width. Known values are: "IN", "CM", and "IN".'
        weight:
          type: number
          description: Weight of the device.
        depth:
          type: number
          description: Depth of the device.
        weightUnit:
          type: string
          description: 'Unit for the dimensions of weight. Known values are: "LBS" and "KGS".'
    ResourceProviderDetails:
      type: object
      description: Management RP details. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        resourceProviderNamespace:
          type: string
