    StageDetails:
      type: object
      description: Resource stage details. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        stageStatus:
          type: string
          description: 'Stage status. Known values are: "None", "InProgress", "Succeeded", "Failed", "Cancelled", and "Cancelling".'
        stageName:
          type: string
          description: 'Stage name. Known values are: "Placed", "InReview", "Confirmed", "ReadyToShip", "Shipped", "Delivered", "InUse", "ReturnInitiated", "ReturnPickedUp", "ReturnedToMicrosoft", "ReturnCompleted", and "Cancelled".'
        displayName:
          type: string
          description: Display name of the resource stage.
        startTime:
          type: string
          format: date-time
          description: Stage start time.
    OrderResourceFlattened:
      type: object
