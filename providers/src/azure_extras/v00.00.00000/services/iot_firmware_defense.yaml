    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-08-02-stackql-generated
  x-serviceAlias: iot_firmware_defense
  x-sdkPackage: azure-mgmt-iotfirmwaredefense
  x-plane: mgmt
security:
