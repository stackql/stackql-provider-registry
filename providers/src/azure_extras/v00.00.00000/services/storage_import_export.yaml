      type: object
      description: Contains information about the delivery package being shipped by the customer to the Microsoft data center. All required parameters must be populated in order to send to Azure.
      properties:
        carrierName:
          type: string
          description: The name of the carrier that is used to ship the import or export drives. Required.
        trackingNumber:
          type: string
          description: The tracking number of the package. Required.
        driveCount:
          type: integer
          description: The number of drives included in the package.
        shipDate:
          type: string
          description: The date when the package is shipped.
      required:
        - carrierName
        - trackingNumber
    PackageInformation:
      type: object
      description: Contains information about the package being shipped by the customer to the Microsoft data center. All required parameters must be populated in order to send to Azure.
      properties:
        carrierName:
          type: string
          description: The name of the carrier that is used to ship the import or export drives. Required.
        trackingNumber:
          type: string
          description: The tracking number of the package. Required.
        driveCount:
          type: integer
          description: The number of drives included in the package. Required.
        shipDate:
          type: string
          description: The date when the package is shipped. Required.
      required:
        - carrierName
        - trackingNumber
        - driveCount
        - shipDate
    DriveStatus:
      type: object
      description: Provides information about the drive's status.
      properties:
        driveId:
          type: string
          description: The drive's hardware serial number, without spaces.
        bitLockerKey:
          type: string
          description: The BitLocker key used to encrypt the drive.
        manifestFile:
          type: string
          description: The relative path of the manifest file on the drive.
        manifestHash:
          type: string
          description: The Base16-encoded MD5 hash of the manifest file on the drive.
        driveHeaderHash:
          type: string
          description: The drive header hash value.
        state:
          type: string
          description: "The drive's current state. Known values are: \"Specified\", \"Received\", \"NeverReceived\", \"Transferring\", \"Completed\", \"CompletedMoreInfo\", and \"ShippedBack\"."
        copyStatus:
          type: string
          description: Detailed status about the data transfer process. This field is not returned in the response until the drive is in the Transferring state.
        percentComplete:
          type: integer
          description: Percentage completed for the drive.
        verboseLogUri:
          type: string
          description: A URI that points to the blob containing the verbose log for the data transfer operation.
        errorLogUri:
          type: string
          description: A URI that points to the blob containing the error log for the data transfer operation.
        manifestUri:
          type: string
          description: A URI that points to the blob containing the drive manifest file.
        bytesSucceeded:
          type: integer
          description: Bytes successfully transferred for the drive.
