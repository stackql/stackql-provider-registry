          type: string
          description: Specifies the provisioning state of the job.
        encryptionKey:
          $ref: "#/components/schemas/EncryptionKeyDetails"
          description: Contains information about the encryption key.
    ReturnAddress:
      type: object
      description: Specifies the return address information for the job. All required parameters must be populated in order to send to Azure.
      properties:
        recipientName:
          type: string
          description: The name of the recipient who will receive the hard drives when they are returned. Required.
        streetAddress1:
          type: string
          description: The first line of the street address to use when returning the drives. Required.
        streetAddress2:
          type: string
          description: The second line of the street address to use when returning the drives.
        city:
          type: string
          description: The city name to use when returning the drives. Required.
        stateOrProvince:
          type: string
          description: The state or province to use when returning the drives.
        postalCode:
          type: string
          description: The postal code to use when returning the drives. Required.
        countryOrRegion:
          type: string
          description: The country or region to use when returning the drives. Required.
        phone:
          type: string
          description: Phone number of the recipient of the returned drives. Required.
        email:
          type: string
          description: Email address of the recipient of the returned drives. Required.
      required:
        - recipientName
        - streetAddress1
        - city
        - postalCode
        - countryOrRegion
        - phone
        - email
