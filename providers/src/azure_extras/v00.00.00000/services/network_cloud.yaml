          description: The name used to identify this IP address pool for association with a BGP advertisement. Required.
        onlyUseHostIps:
          $ref: "#/components/schemas/BfdEnabled"
          description: 'The indicator to prevent the use of IP addresses ending with .0 and .255 for this pool. Enabling this option will only use IP addresses between .1 and .254 inclusive. Known values are: "True" and "False".'
