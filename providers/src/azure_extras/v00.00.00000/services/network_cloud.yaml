          type: string
          description: The resource ID of the associated network attached to the virtual machine. It can be one of cloudServicesNetwork, l3Network, l2Network or trunkedNetwork resources. Required.
        defaultGateway:
          $ref: "#/components/schemas/DefaultGateway"
          description: 'The indicator of whether this is the default gateway. Only one of the attached networks (including the CloudServicesNetwork attachment) for a single machine may be specified as True. Known values are: "True" and "False".'
        ipAllocationMethod:
          $ref: "#/components/schemas/VirtualMachineIPAllocationMethod"
          description: 'The IP allocation mechanism for the virtual machine. Dynamic and Static are only valid for l3Network which may also specify Disabled. Otherwise, Disabled is the only permitted value. Required. Known values are: "Dynamic", "Static", and "Disabled".'
