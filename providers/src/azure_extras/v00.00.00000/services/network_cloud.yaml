    IpAddressPool:
      type: object
      description: IpAddressPool represents a pool of IP addresses that can be allocated to a service.
      properties:
        addresses:
          type: array
          items:
            type: string
          description: The list of IP address ranges. Each range can be a either a subnet in CIDR format or an explicit start-end range of IP addresses. For a BGP service load balancer configuration, only CIDR format is supported and excludes /32 (IPv4) and /128 (IPv6) prefixes. Required.
        autoAssign:
          $ref: "#/components/schemas/BfdEnabled"
          description: 'The indicator to determine if automatic allocation from the pool should occur. Known values are: "True" and "False".'
        name:
