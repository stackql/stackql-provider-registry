          type: integer
          description: The number of virtual machines that use this configuration. Required.
        vmSkuName:
          type: string
          description: The name of the VM SKU supplied during creation. Required.
      required:
        - count
        - vmSkuName
    InitialAgentPoolConfiguration:
      type: object
      description: InitialAgentPoolConfiguration specifies the configuration of a pool of virtual machines that are initially defined with a Kubernetes cluster.
      properties:
        administratorConfiguration:
          $ref: "#/components/schemas/AdministratorConfiguration"
          description: The administrator credentials to be used for the nodes in this agent pool.
        agentOptions:
          $ref: "#/components/schemas/AgentOptions"
          description: The configurations that will be applied to each agent in this agent pool.
        attachedNetworkConfiguration:
          $ref: "#/components/schemas/AttachedNetworkConfiguration"
          description: The configuration of networks being attached to the agent pool for use by the workloads that run on this Kubernetes cluster.
        availabilityZones:
          type: array
          items:
            type: string
          description: The list of availability zones of the Network Cloud cluster used for the provisioning of nodes in this agent pool. If not specified, all availability zones will be used.
        count:
          type: integer
          description: The number of virtual machines that use this configuration. Required.
        labels:
          type: array
          items:
            $ref: "#/components/schemas/KubernetesLabel"
          description: The labels applied to the nodes in this agent pool.
        mode:
          $ref: "#/components/schemas/AgentPoolMode"
          description: 'The selection of how this agent pool is utilized, either as a system pool or a user pool. System pools run the features and critical services for the Kubernetes Cluster, while user pools are dedicated to user workloads. Every Kubernetes cluster must contain at least one system node pool with at least one node. Required. Known values are: "System", "User", and "NotApplicable".'
        taints:
          type: array
          items:
            $ref: "#/components/schemas/KubernetesLabel"
          description: The taints applied to the nodes in this agent pool.
        upgradeSettings:
          $ref: "#/components/schemas/AgentPoolUpgradeSettings"
          description: The configuration of the agent pool.
        vmSkuName:
          type: string
          description: The name of the VM SKU that determines the size of resources allocated for node VMs. Required.
        name:
          type: string
          description: The name that will be used for the agent pool resource representing this agent pool. Required.
      required:
