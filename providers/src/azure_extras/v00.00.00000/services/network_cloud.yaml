    ControlPlaneNodeConfiguration:
      type: object
      description: ControlPlaneNodeConfiguration represents the selection of virtual machines and size of the control plane for a Kubernetes cluster.
      properties:
        administratorConfiguration:
          $ref: "#/components/schemas/AdministratorConfiguration"
          description: The administrator credentials to be used for the nodes in the control plane.
        availabilityZones:
          type: array
