        provisioningState:
          $ref: "#/components/schemas/ClusterManagerProvisioningState"
          description: 'The provisioning state of the cluster manager. Known values are: "Succeeded", "Failed", "Canceled", "Provisioning", "Accepted", and "Updating".'
        relayConfiguration:
          $ref: "#/components/schemas/ClusterManagerRelayConfiguration"
