    RelayPrivateEndpointConnectionState:
      type: string
      enum:
        - Approved
        - Rejected
    ClusterProperties:
      type: object
      description: ClusterProperties represents the properties of a cluster.
      properties:
        aggregatorOrSingleRackDefinition:
          $ref: "#/components/schemas/RackDefinition"
          description: The rack definition that is intended to reflect only a single rack in a single rack cluster, or an aggregator rack in a multi-rack cluster. Required.
        analyticsOutputSettings:
          $ref: "#/components/schemas/AnalyticsOutputSettings"
          description: The settings for the log analytics workspace used for output of logs from this cluster.
        analyticsWorkspaceId:
          type: string
          description: Field Deprecated. The resource ID of the Log Analytics Workspace that will be used for storing relevant logs.
        clusterLocation:
          type: string
          description: The customer-provided location information to identify where the cluster resides.
        clusterServicePrincipal:
          $ref: "#/components/schemas/ServicePrincipalInformation"
          description: "Field Deprecated: Use managed identity to provide cluster privileges. The service principal to be used by the cluster during Arc Appliance installation."
        clusterType:
          $ref: "#/components/schemas/ClusterType"
          description: 'The type of rack configuration for the cluster. Required. Known values are: "SingleRack" and "MultiRack".'
        clusterVersion:
          type: string
          description: The current runtime version of the cluster. Required.
        commandOutputSettings:
          $ref: "#/components/schemas/CommandOutputSettings"
          description: The settings for commands run in this cluster, such as bare metal machine run read only commands and data extracts.
        computeDeploymentThreshold:
          $ref: "#/components/schemas/ValidationThreshold"
          description: The validation threshold indicating the allowable failures of compute machines during environment validation and deployment.
        computeRackDefinitions:
          type: array
          items:
            $ref: "#/components/schemas/RackDefinition"
          description: The list of rack definitions for the compute racks in a multi-rack cluster, or an empty list in a single-rack cluster.
        managedResourceGroupConfiguration:
          $ref: "#/components/schemas/ManagedResourceGroupConfiguration"
          description: The configuration of the managed resource group associated with the resource.
        networkFabricId:
          type: string
          description: The resource ID of the Network Fabric associated with the cluster. Required.
        runtimeProtectionConfiguration:
          $ref: "#/components/schemas/RuntimeProtectionConfiguration"
          description: The settings for cluster runtime protection.
        secretArchive:
          $ref: "#/components/schemas/ClusterSecretArchive"
          description: The configuration for use of a key vault to store secrets for later retrieval by the operator.
        secretArchiveSettings:
          $ref: "#/components/schemas/SecretArchiveSettings"
          description: The settings for the secret archive used to hold credentials for the cluster.
        updateStrategy:
          $ref: "#/components/schemas/ClusterUpdateStrategy"
          description: The strategy for updating the cluster.
        vulnerabilityScanningSettings:
          $ref: "#/components/schemas/VulnerabilityScanningSettings"
          description: The settings for how security vulnerability scanning is applied to the cluster.
        actionStates:
          type: array
          items:
            $ref: "#/components/schemas/ActionState"
          description: The current state of any in progress or completed actions. The most recent known instance of each action type is shown.
        availableUpgradeVersions:
          type: array
          items:
            $ref: "#/components/schemas/ClusterAvailableUpgradeVersion"
          description: The list of cluster runtime version upgrades available for this cluster.
        clusterCapacity:
          $ref: "#/components/schemas/ClusterCapacity"
          description: The capacity supported by this cluster.
        clusterConnectionStatus:
          $ref: "#/components/schemas/ClusterConnectionStatus"
          description: 'The latest heartbeat status between the cluster manager and the cluster. Known values are: "Connected", "Disconnected", "Timeout", and "Undefined".'
        clusterExtendedLocation:
          $ref: "#/components/schemas/ExtendedLocation"
          description: The extended location (custom location) that represents the cluster's control plane location. This extended location is used to route the requests of child objects of the cluster that are handled by the platform operator.
        clusterManagerConnectionStatus:
          $ref: "#/components/schemas/ClusterManagerConnectionStatus"
          description: 'The latest connectivity status between cluster manager and the cluster. Known values are: "Connected" and "Unreachable".'
        clusterManagerId:
          type: string
          description: The resource ID of the cluster manager that manages this cluster. This is set by the Cluster Manager when the cluster is created.
        detailedStatus:
          $ref: "#/components/schemas/ClusterDetailedStatus"
          description: 'The current detailed status of the cluster. Known values are: "PendingDeployment", "Deploying", "Running", "Updating", "UpdatePaused", "Degraded", "Deleting", "Disconnected", and "Failed".'
        detailedStatusMessage:
          type: string
          description: The descriptive message about the detailed status.
        hybridAksExtendedLocation:
          $ref: "#/components/schemas/ExtendedLocation"
          description: Field Deprecated. This field will not be populated in an upcoming version. The extended location (custom location) that represents the Hybrid AKS control plane location. This extended location is used when creating provisioned clusters (Hybrid AKS clusters).
        lastSuccessfulVersionUpdateTime:
          type: string
          format: date-time
          description: The date and time of the end of the last successful version update for the cluster.
        managedCredentials:
          type: array
          items:
            type: string
          description: The list of credentials that are managed for the cluster and can be rotated on-demand.
        manualActionCount:
          type: integer
          description: The count of Manual Action Taken (MAT) events that have not been validated.
        supportExpiryDate:
          type: string
          description: The support end date of the runtime version of the cluster.
        workloadResourceIds:
          type: array
          items:
            type: string
          description: The list of workload resource IDs that are hosted within this cluster.
        provisioningState:
          $ref: "#/components/schemas/ClusterProvisioningState"
          description: 'The provisioning state of the cluster. Known values are: "Succeeded", "Failed", "Canceled", "Accepted", "Validating", and "Updating".'
      required:
        - aggregatorOrSingleRackDefinition
        - clusterType
        - clusterVersion
        - networkFabricId
    RackDefinition:
      type: object
      description: RackDefinition represents details regarding the rack.
      properties:
        availabilityZone:
          type: string
          description: The zone name used for this rack when created. Availability zones are used for workload placement.
        bareMetalMachineConfigurationData:
          type: array
          items:
            $ref: "#/components/schemas/BareMetalMachineConfigurationData"
          description: The unordered list of bare metal machine configuration.
        networkRackId:
          type: string
          description: The resource ID of the network rack that matches this rack definition. Required.
        rackLocation:
          type: string
          description: The free-form description of the rack's location.
        rackSerialNumber:
          type: string
          description: The unique identifier for the rack within Network Cloud cluster. An alternate unique alphanumeric value other than a serial number may be provided if desired. Required.
        rackSkuId:
          type: string
          description: The resource ID of the sku for the rack being added. Required.
        storageApplianceConfigurationData:
          type: array
          items:
            $ref: "#/components/schemas/StorageApplianceConfigurationData"
          description: The list of storage appliance configuration data for this rack.
      required:
        - networkRackId
        - rackSerialNumber
        - rackSkuId
    BareMetalMachineConfigurationData:
      type: object
      description: BareMetalMachineConfigurationData represents configuration for the bare metal machine.
      properties:
        bmcConnectionString:
          type: string
          description: The connection string for the baseboard management controller including IP address and protocol.
        bmcCredentials:
          $ref: "#/components/schemas/AdministrativeCredentials"
          description: The credentials of the baseboard management controller on this bare metal machine. The password field is expected to be an Azure Key Vault key URL. Until the cluster is converted to utilize managed identity by setting the secret archive settings, the actual password value should be provided instead. Required.
        bmcMacAddress:
          type: string
          description: The MAC address of the BMC for this machine. Required.
        bootMacAddress:
          type: string
          description: The MAC address associated with the PXE NIC card. Required.
        machineDetails:
          type: string
          description: The free-form additional information about the machine, e.g. an asset tag.
        machineName:
          type: string
          description: The user-provided name for the bare metal machine created from this specification. If not provided, the machine name will be generated programmatically.
        rackSlot:
          type: integer
          description: The slot the physical machine is in the rack based on the BOM configuration. Required.
        serialNumber:
          type: string
          description: The serial number of the machine. Hardware suppliers may use an alternate value. For example, service tag. Required.
      required:
        - bmcCredentials
        - bmcMacAddress
        - bootMacAddress
        - rackSlot
        - serialNumber
    StorageApplianceConfigurationData:
      type: object
      description: StorageApplianceConfigurationData represents configuration for the storage application.
      properties:
        adminCredentials:
          $ref: "#/components/schemas/AdministrativeCredentials"
          description: The credentials of the administrative interface on this storage appliance. The password field is expected to be an Azure Key Vault key URL. Until the cluster is converted to utilize managed identity by setting the secret archive settings, the actual password value should be provided instead. Required.
        rackSlot:
          type: integer
          description: The slot that storage appliance is in the rack based on the BOM configuration. Required.
        serialNumber:
          type: string
          description: The serial number of the appliance. Required.
        storageApplianceName:
          type: string
          description: The user-provided name for the storage appliance that will be created from this specification.
      required:
        - adminCredentials
        - rackSlot
        - serialNumber
    AnalyticsOutputSettings:
      type: object
      description: AnalyticsOutputSettings represents the settings for the log analytics workspace used for output of logs from this cluster.
      properties:
        analyticsWorkspaceId:
          type: string
          description: The resource ID of the analytics workspace that is to be used by the specified identity.
        associatedIdentity:
          $ref: "#/components/schemas/IdentitySelector"
          description: The selection of the managed identity to use with this analytics workspace. The identity type must be either system assigned or user assigned.
    IdentitySelector:
      type: object
      description: IdentitySelector represents the selection of a managed identity for use.
      properties:
        identityType:
          $ref: "#/components/schemas/ManagedServiceIdentitySelectorType"
          description: 'The type of managed identity that is being selected. Known values are: "SystemAssignedIdentity" and "UserAssignedIdentity".'
        userAssignedIdentityResourceId:
          type: string
          description: The user assigned managed identity resource ID to use. Mutually exclusive with a system assigned identity type.
    ManagedServiceIdentitySelectorType:
      type: string
      enum:
        - SystemAssignedIdentity
        - UserAssignedIdentity
    ServicePrincipalInformation:
      type: object
      description: ServicePrincipalInformation represents the details of the service principal to be used by the cluster during Arc Appliance installation.
      properties:
        applicationId:
          type: string
          description: The application ID, also known as client ID, of the service principal. Required.
        password:
          type: string
          description: The password of the service principal. Required.
        principalId:
          type: string
          description: The principal ID, also known as the object ID, of the service principal. Required.
        tenantId:
          type: string
          description: The tenant ID, also known as the directory ID, of the tenant in which the service principal is created. Required.
      required:
        - applicationId
        - password
        - principalId
        - tenantId
    ClusterType:
      type: string
      enum:
        - SingleRack
        - MultiRack
    CommandOutputSettings:
      type: object
      description: CommandOutputSettings represents the settings for commands run within the cluster such as bare metal machine run read-only commands.
      properties:
        associatedIdentity:
          $ref: "#/components/schemas/IdentitySelector"
          description: The selection of the managed identity to use with this storage account container. The identity type must be either system assigned or user assigned.
        containerUrl:
          type: string
          description: The URL of the storage account container that is to be used by the specified identities.
        overrides:
          type: array
          items:
            $ref: "#/components/schemas/CommandOutputOverride"
          description: The list of optional overrides allowing for association of storage containers and identities to specific types of command output. If a type is not overridden, the default identity and storage container will be utilized.
    CommandOutputOverride:
      type: object
      description: CommandOutputOverride represents an overridden value for the command output settings.
      properties:
        associatedIdentity:
          $ref: "#/components/schemas/IdentitySelector"
          description: The selection of the managed identity to use with this storage account container. The identity type must be either system assigned or user assigned.
        commandOutputType:
          $ref: "#/components/schemas/CommandOutputType"
          description: 'The type of command output for the override. Known values are: "BareMetalMachineRunCommand", "BareMetalMachineRunDataExtracts", "BareMetalMachineRunReadCommands", "ClusterSupportAdministrativeActions", "StorageRunReadCommands", and "BareMetalMachineRunDataExtractsRestricted".'
        containerUrl:
          type: string
          description: The URL of the storage account container that is to be used by the specified identities.
    CommandOutputType:
      type: string
      enum:
        - BareMetalMachineRunCommand
        - BareMetalMachineRunDataExtracts
        - BareMetalMachineRunReadCommands
        - ClusterSupportAdministrativeActions
        - StorageRunReadCommands
        - BareMetalMachineRunDataExtractsRestricted
    ValidationThreshold:
      type: object
      description: ValidationThreshold indicates allowed machine and node hardware and deployment failures.
      properties:
        grouping:
          $ref: "#/components/schemas/ValidationThresholdGrouping"
          description: 'Selection of how the type evaluation is applied to the cluster calculation. Required. Known values are: "PerCluster" and "PerRack".'
        type:
          $ref: "#/components/schemas/ValidationThresholdType"
          description: 'Selection of how the threshold should be evaluated. Required. Known values are: "CountSuccess" and "PercentSuccess".'
        value:
          type: integer
          description: The numeric threshold value. Required.
      required:
        - grouping
        - type
        - value
    ValidationThresholdGrouping:
      type: string
      enum:
        - PerCluster
        - PerRack
    ValidationThresholdType:
      type: string
      enum:
        - CountSuccess
        - PercentSuccess
    RuntimeProtectionConfiguration:
      type: object
      description: RuntimeProtectionConfiguration represents the runtime protection configuration for the cluster.
      properties:
        definitionUpdateMode:
          $ref: "#/components/schemas/RuntimeProtectionDefinitionUpdateMode"
          description: 'The definition update mode for runtime protection. Known values are: "Automatic" and "None".'
        enforcementLevel:
          $ref: "#/components/schemas/RuntimeProtectionEnforcementLevel"
          description: 'The mode of operation for runtime protection. Known values are: "Audit", "Disabled", "OnDemand", "Passive", and "RealTime".'
    ClusterSecretArchive:
      type: object
      description: ClusterSecretArchive configures the key vault to archive the secrets of the cluster for later retrieval.
      properties:
        keyVaultId:
          type: string
          description: The resource ID of the key vault to archive the secrets of the cluster. Required.
        useKeyVault:
          $ref: "#/components/schemas/ClusterSecretArchiveEnabled"
          description: 'The indicator if the specified key vault should be used to archive the secrets of the cluster. Known values are: "True" and "False".'
      required:
        - keyVaultId
    ClusterSecretArchiveEnabled:
      type: string
      enum:
        - "True"
        - "False"
    SecretArchiveSettings:
      type: object
      description: SecretArchiveSettings represents the settings for the secret archive used to hold credentials for the cluster.
      properties:
        associatedIdentity:
