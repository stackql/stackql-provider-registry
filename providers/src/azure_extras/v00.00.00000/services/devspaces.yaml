    put:
      operationId: Controllers_begin_create
      description: Creates an Azure Dev Spaces Controller. Creates an Azure Dev Spaces Controller with the specified create parameters.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: Resource group to which the resource belongs. Required.
        - name: name
          in: path
          required: true
          schema:
            type: string
