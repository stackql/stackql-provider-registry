components:
  schemas:
    AnthropicBeta:
      type: string
      enum:
        - message-batches-2024-09-24
        - prompt-caching-2024-07-31
        - computer-use-2024-10-22
        - computer-use-2025-01-24
        - pdfs-2024-09-25
        - token-counting-2024-11-01
        - token-efficient-tools-2025-02-19
        - output-128k-2025-02-19
        - files-api-2025-04-14
        - mcp-client-2025-04-04
        - mcp-client-2025-11-20
        - dev-full-thinking-2025-05-14
        - interleaved-thinking-2025-05-14
        - code-execution-2025-05-22
        - extended-cache-ttl-2025-04-11
        - context-1m-2025-08-07
        - context-management-2025-06-27
        - model-context-window-exceeded-2025-08-26
        - skills-2025-10-02
        - fast-mode-2026-02-01
        - output-300k-2026-03-24
        - user-profiles-2026-03-24
        - advisor-tool-2026-03-01
        - managed-agents-2026-04-01
        - cache-diagnosis-2026-04-07
        - thinking-token-count-2026-05-13
        - server-side-fallback-2026-06-01
        - fallback-credit-2026-06-01
        - agent-memory-2026-07-22
      x-stainless-nominal: false
    BetaFileMetadataSchema:
      properties:
        created_at:
          type: string
          format: date-time
          title: Created At
          description: RFC 3339 datetime string representing when the file was created.
          examples:
            - "2025-04-15T18:37:24.100435Z"
        downloadable:
          type: boolean
          title: Downloadable
          description: Whether the file can be downloaded.
          default: false
          examples:
            - false
        filename:
          type: string
          maxLength: 500
          minLength: 1
          title: Filename
          description: Original filename of the uploaded file.
          examples:
            - document.pdf
        id:
          type: string
          title: Id
          description: |-
            Unique object identifier.

            The format and length of IDs may change over time.
          examples:
            - file_011CNha8iCJcU1wXNR6q4V8w
        mime_type:
          type: string
          maxLength: 255
          minLength: 1
          title: Mime Type
          description: MIME type of the file.
          examples:
            - application/pdf
        scope:
          description: The scope of this file, indicating the context in which it was created (e.g., a session).
          nullable: true
          properties:
            id:
              type: string
              title: Id
              description: The ID of the scoping resource (e.g., the session ID).
            type:
              type: string
              title: Type
              description: The type of scope (e.g., `"session"`).
              enum:
                - session
          type: object
          required:
            - id
            - type
          title: FileScope
        size_bytes:
          type: integer
          minimum: 0
          title: Size Bytes
          description: Size of the file in bytes.
          examples:
            - 102400
        type:
          type: string
          title: Type
          description: |-
            Object type.

            For files, this is always `"file"`.
          enum:
            - file
      type: object
      required:
        - created_at
        - filename
        - id
        - mime_type
        - size_bytes
        - type
      title: FileMetadataSchema
    BetaErrorResponse:
      properties:
        error:
          discriminator:
            mapping:
              api_error: "#/components/schemas/BetaAPIError"
              authentication_error: "#/components/schemas/BetaAuthenticationError"
              billing_error: "#/components/schemas/BetaBillingError"
              invalid_request_error: "#/components/schemas/BetaInvalidRequestError"
              not_found_error: "#/components/schemas/BetaNotFoundError"
              overloaded_error: "#/components/schemas/BetaOverloadedError"
              permission_error: "#/components/schemas/BetaPermissionError"
              rate_limit_error: "#/components/schemas/BetaRateLimitError"
              timeout_error: "#/components/schemas/BetaGatewayTimeoutError"
            propertyName: type
          title: Error
          properties:
            message:
              default: Invalid request
              title: Message
              type: string
            type:
              default: invalid_request_error
              title: Type
              type: string
              enum:
                - invalid_request_error
          required:
            - message
            - type
          type: object
        request_id:
          default: null
          title: Request Id
          nullable: true
          type: string
        type:
          default: error
          title: Type
          type: string
          enum:
            - error
      required:
        - error
        - request_id
        - type
      title: ErrorResponse
      type: object
    BetaFileListResponse:
      properties:
        data:
          items:
            $ref: "#/components/schemas/BetaFileMetadataSchema"
          type: array
          title: Data
          description: List of file metadata objects.
        first_id:
          title: First Id
          description: ID of the first file in this page of results.
          examples:
            - file_011CNha8iCJcU1wXNR6q4V8w
          nullable: true
          type: string
        has_more:
          type: boolean
          title: Has More
          description: Whether there are more results available.
          default: false
        last_id:
          title: Last Id
          description: ID of the last file in this page of results.
          examples:
            - file_013Zva2CMHLNnXjNJJKqJ2EF
          nullable: true
          type: string
      type: object
      required:
        - data
      title: FileListResponse
    BetaFileDeleteResponse:
      properties:
        id:
          type: string
          title: Id
          description: ID of the deleted file.
          examples:
            - file_011CNha8iCJcU1wXNR6q4V8w
        type:
          type: string
          title: Type
          description: |-
            Deleted object type.

            For file deletion, this is always `"file_deleted"`.
          default: file_deleted
          enum:
            - file_deleted
      type: object
      required:
        - id
      title: FileDeleteResponse
    BetaFileScope:
      properties:
        id:
          type: string
          title: Id
          description: The ID of the scoping resource (e.g., the session ID).
        type:
          type: string
          title: Type
          description: The type of scope (e.g., `"session"`).
          enum:
            - session
      type: object
      required:
        - id
        - type
      title: FileScope
    BetaInvalidRequestError:
      properties:
        message:
          default: Invalid request
          title: Message
          type: string
        type:
          default: invalid_request_error
          title: Type
          type: string
          enum:
            - invalid_request_error
      required:
        - message
        - type
      title: InvalidRequestError
      type: object
    BetaAuthenticationError:
      properties:
        message:
          default: Authentication error
          title: Message
          type: string
        type:
          default: authentication_error
          title: Type
          type: string
          enum:
            - authentication_error
      required:
        - message
        - type
      title: AuthenticationError
      type: object
    BetaBillingError:
      properties:
        message:
          default: Billing error
          title: Message
          type: string
        type:
          default: billing_error
          title: Type
          type: string
          enum:
            - billing_error
      required:
        - message
        - type
      title: BillingError
      type: object
    BetaPermissionError:
