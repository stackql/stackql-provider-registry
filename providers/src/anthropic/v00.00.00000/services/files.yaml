  version: 1.0.0
paths:
  /v1/files?beta=true:
    post:
      summary: Upload File
      operationId: beta_upload_file_v1_files_post
      parameters:
        - name: anthropic-beta
          in: header
          required: false
          schema:
            type: string
            description: |-
              Optional header to specify the beta version(s) you want to use.

              To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
            title: Anthropic-Beta
            x-stainless-override-schema:
              x-stainless-param: betas
              x-stainless-extend-default: true
              type: array
              description: Optional header to specify the beta version(s) you want to use.
              items:
                $ref: "#/components/schemas/AnthropicBeta"
            default: files-api-2025-04-14
          description: |-
            Optional header to specify the beta version(s) you want to use.

            To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetaFileMetadataSchema"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetaErrorResponse"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
              required:
                - file
        required: true
    get:
      summary: List Files
      operationId: beta_list_files_v1_files_get
      parameters:
        - name: before_id
          in: query
          required: false
          schema:
            type: string
            description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately before this object.
            title: Before Id
          description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately before this object.
        - name: after_id
          in: query
          required: false
          schema:
            type: string
            description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately after this object.
            title: After Id
          description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately after this object.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 1000
            minimum: 1
            description: |-
              Number of items to return per page.

              Defaults to `20`. Ranges from `1` to `1000`.
            default: 20
            title: Limit
          description: |-
            Number of items to return per page.

            Defaults to `20`. Ranges from `1` to `1000`.
        - name: scope_id
          in: query
          required: false
          schema:
            type: string
            description: Filter by scope ID. Only returns files associated with the specified scope (e.g., a session ID).
            title: Scope Id
          description: Filter by scope ID. Only returns files associated with the specified scope (e.g., a session ID).
        - name: anthropic-beta
          in: header
          required: false
          schema:
            type: string
            description: |-
              Optional header to specify the beta version(s) you want to use.

              To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
            title: Anthropic-Beta
            x-stainless-override-schema:
              x-stainless-param: betas
              x-stainless-extend-default: true
              type: array
              description: Optional header to specify the beta version(s) you want to use.
              items:
                $ref: "#/components/schemas/AnthropicBeta"
            default: files-api-2025-04-14
          description: |-
            Optional header to specify the beta version(s) you want to use.

            To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: x-api-key
          in: header
          required: false
          schema:
            type: string
            description: |-
              Your unique API key for authentication.

              This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
            title: X-Api-Key
          description: |-
            Your unique API key for authentication.

            This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetaFileListResponse"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetaErrorResponse"
