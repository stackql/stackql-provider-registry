components:
  schemas:
    BetaManagedAgentsCreateSessionParams:
      description: Request parameters for creating a `session`.
      type: object
      required:
        - agent
        - environment_id
      properties:
        agent:
          type: string
          description: Agent identifier. Accepts the `agent` ID string, which pins the latest version for the session, or an `agent` object with both id and version specified.
        environment_id:
          description: ID of the `environment` defining the container configuration for this session.
          type: string
          minLength: 1
          maxLength: 128
          examples:
            - env_011CZkZ9X2dpNyB7HsEFoRfW
        title:
          description: Human-readable session title.
          type: string
          maxLength: 500
          nullable: true
          examples:
            - "Order #1234 inquiry"
        metadata:
          description: Arbitrary key-value metadata attached to the session. Maximum 16 pairs, keys up to 64 chars, values up to 512 chars.
          type: object
        resources:
          description: Resources (e.g. repositories, files) to mount into the session's container.
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsSessionResourceParams"
        vault_ids:
          description: Vault IDs for stored credentials the agent can use during the session.
          type: array
          items:
            type: string
      example:
        agent: agent_011CZkYpogX7uDKUyvBTophP
        environment_id: env_011CZkZ9X2dpNyB7HsEFoRfW
        title: "Order #1234 inquiry"
    BetaManagedAgentsSession:
      description: A Managed Agents `session`.
      type: object
      required:
        - type
        - id
        - status
        - created_at
        - updated_at
        - environment_id
        - title
        - metadata
        - agent
        - resources
        - vault_ids
        - outcome_evaluations
        - usage
        - stats
        - archived_at
      properties:
        type:
          type: string
          enum:
            - session
          examples:
            - session
        id:
          type: string
          examples:
            - sesn_011CZkZAtmR3yMPDzynEDxu7
        status:
          $ref: "#/components/schemas/BetaManagedAgentsSessionStatus"
          examples:
            - idle
        created_at:
          $ref: "#/components/schemas/BetaTimestamp"
          examples:
            - "2026-03-15T10:00:00Z"
        updated_at:
          $ref: "#/components/schemas/BetaTimestamp"
          examples:
            - "2026-03-15T10:00:00Z"
        environment_id:
          type: string
          examples:
            - env_011CZkZ9X2dpNyB7HsEFoRfW
        title:
          type: string
          nullable: true
          examples:
            - "Order #1234 inquiry"
        metadata:
          type: object
          examples:
            - key: value
        agent:
          $ref: "#/components/schemas/BetaManagedAgentsSessionAgent"
          examples:
            - type: agent
              id: agent_011CZkYpogX7uDKUyvBTophP
              version: 1
              name: My First Agent
              description: A general-purpose starter agent.
              model:
                id: claude-sonnet-4-6
                speed: standard
              system: You are a general-purpose agent that can research, write code, run commands, and use connected tools to complete the user's task end to end.
              tools:
                - type: agent_toolset_20260401
                  default_config:
                    enabled: true
                    permission_policy:
                      type: always_ask
                  configs: []
              mcp_servers:
                - type: url
                  name: example-mcp
                  url: https://example-server.modelcontextprotocol.io/sse
              skills:
                - type: anthropic
                  skill_id: xlsx
                  version: "1"
                - type: custom
                  skill_id: skill_011CZkZFNu9hAbo3jZPRgTlx
                  version: "2"
              multiagent: null
        resources:
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsSessionResource"
          examples:
            - - type: file
                id: sesrsc_011CZkZBJq5dWxk9fVLNcPht
                file_id: file_011CNha8iCJcU1wXNR6q4V8w
                mount_path: /uploads/receipt.pdf
                created_at: "2026-03-15T10:00:00Z"
                updated_at: "2026-03-15T10:00:00Z"
              - type: github_repository
                id: sesrsc_011CZkZCKr6eXyl0gWMOdQiu
                url: https://github.com/example-org/example-repo
                mount_path: /workspace/example-repo
                checkout:
                  type: branch
                  name: main
                created_at: "2026-03-15T10:00:00Z"
                updated_at: "2026-03-15T10:00:00Z"
        vault_ids:
          description: Vault IDs attached to the session at creation. Empty when no vaults were supplied.
          type: array
          items:
            type: string
          examples:
            - - vlt_011CZkZDLs7fYzm1hXNPeRjv
        outcome_evaluations:
          description: Per-outcome evaluation state. One entry per define_outcome event sent to the session.
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsOutcomeEvaluationResource"
          examples:
            - - type: outcome_evaluation
                outcome_id: outc_011CZkZRSw2kEfs6ncTVljxP
                description: Produce a 2-page summary as summary.md
                result: satisfied
                iteration: 0
                completed_at: "2026-03-15T10:02:31Z"
                explanation: All five sections present with inline citations.
        usage:
          description: Cumulative token usage for the session.
