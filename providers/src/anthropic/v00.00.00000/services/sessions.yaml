          format: double
        startup_seconds:
          description: Time in seconds for the thread to begin running. Zero for child threads, which start immediately.
          type: number
          format: double
        active_seconds:
          description: Cumulative time in seconds the thread spent actively running. Excludes idle time.
          type: number
          format: double
