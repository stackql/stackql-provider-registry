    BetaManagedAgentsMemoryStoreResource:
      description: A memory store attached to an agent session.
      type: object
      required:
        - type
        - memory_store_id
      properties:
        type:
          type: string
          enum:
            - memory_store
        memory_store_id:
          description: The memory store ID (memstore_...). Must belong to the caller's organization and workspace.
          type: string
        access:
          description: Access mode for the mounted store. Defaults to read_write. read_only mounts the store as a read-only filesystem.
          nullable: true
          type: string
          enum:
            - read_write
            - read_only
        name:
          description: Display name of the memory store, snapshotted at attach time. Later edits to the store's name do not propagate to this resource.
          type: string
          nullable: true
        description:
          description: Description of the memory store, snapshotted at attach time. Rendered into the agent's system prompt. Empty string when the store has no description.
          type: string
        instructions:
          description: Per-attachment guidance for the agent on how to use this store. Rendered into the memory section of the system prompt. Max 4096 chars.
          type: string
          maxLength: 4096
          nullable: true
        mount_path:
          description: Filesystem path where the store is mounted in the session container, e.g. /mnt/memory/user-preferences. Derived from the store's name. Output-only.
          type: string
          nullable: true
    BetaManagedAgentsAgentParams:
      description: Specification for an Agent. Provide a specific `version` or use the short-form `agent="agent_id"` for the most recent version
      type: object
      required:
        - type
        - id
      properties:
        type:
          type: string
          enum:
            - agent
        id:
          description: The `agent` ID.
          type: string
          minLength: 1
          maxLength: 128
        version:
          description: The specific `agent` version to use. Omit to use the latest version. Must be at least 1 if specified.
          type: integer
          format: int32
    BetaManagedAgentsAgentWithOverridesParams:
      description: Reference to an `agent` plus optional configuration overrides. Each provided field replaces the agent's value for the caller's use; the agent resource is unchanged.
      type: object
      required:
        - type
        - id
      properties:
        type:
          type: string
          enum:
            - agent_with_overrides
        id:
          description: The `agent` ID.
          type: string
          minLength: 1
          maxLength: 128
        version:
          description: The specific `agent` version to use. Omit to use the latest version.
          type: integer
          format: int32
        model:
          description: Replacement model. Accepts the model string, e.g. `claude-opus-4-6`, or a `model_config` object. Omit to use the agent's model.
          title: BetaManagedAgentsModel
          x-stainless-skip:
            - go
            - cli
          type: string
          x-stainless-nominal: false
          enum:
            - claude-sonnet-5
          required:
            - id
          properties:
            id:
              $ref: "#/components/schemas/BetaManagedAgentsModel"
            speed:
              description: Inference speed mode. Defaults to `standard`.
              nullable: true
              type: string
              enum:
                - standard
                - fast
          example:
            id: claude-opus-4-6
        system:
          description: Replacement system prompt. Up to 100,000 characters. Set to null to clear the agent's system prompt; omit to preserve it.
          type: string
          maxLength: 100000
          nullable: true
        tools:
          description: "Replacement tool list. Full replacement: the provided array becomes the tool configuration. Send an empty array to clear; omit to preserve the agent's tools."
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsAgentToolParams"
        mcp_servers:
          description: "Replacement MCP server list. Full replacement: the provided array becomes the MCP servers. Send an empty array to clear; omit to preserve the agent's servers."
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsMCPServerParams"
        skills:
          description: "Replacement skill list. Full replacement: the provided array becomes the skills. Send an empty array to clear; omit to preserve the agent's skills."
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsSkillParams"
