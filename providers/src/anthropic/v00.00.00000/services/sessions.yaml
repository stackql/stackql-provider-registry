    BetaManagedAgentsSessionAgentUpdate:
      description: "Mid-session agent configuration update. Only `tools` and `mcp_servers` are updatable. Full replacement: the provided array becomes the new value. To preserve existing entries, GET the session, modify the array, and POST it back."
      type: object
      properties:
        tools:
          description: "Replacement tool list. Full replacement: the provided array becomes the new value. Send an empty array to clear; omit to preserve."
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsAgentToolParams"
        mcp_servers:
          description: "Replacement MCP server list. Full replacement: the provided array becomes the new value. Send an empty array to clear; omit to preserve."
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsMCPServerParams"
    BetaManagedAgentsSessionEvent:
      description: Union type for all event types in a session.
      type: object
      discriminator:
        propertyName: type
        mapping:
          user.message: "#/components/schemas/BetaManagedAgentsUserMessageEvent"
          user.interrupt: "#/components/schemas/BetaManagedAgentsUserInterruptEvent"
          user.tool_confirmation: "#/components/schemas/BetaManagedAgentsUserToolConfirmationEvent"
          user.custom_tool_result: "#/components/schemas/BetaManagedAgentsUserCustomToolResultEvent"
          agent.custom_tool_use: "#/components/schemas/BetaManagedAgentsAgentCustomToolUseEvent"
          agent.message: "#/components/schemas/BetaManagedAgentsAgentMessageEvent"
          agent.thinking: "#/components/schemas/BetaManagedAgentsAgentThinkingEvent"
          agent.mcp_tool_use: "#/components/schemas/BetaManagedAgentsAgentMcpToolUseEvent"
          agent.mcp_tool_result: "#/components/schemas/BetaManagedAgentsAgentMcpToolResultEvent"
          agent.tool_use: "#/components/schemas/BetaManagedAgentsAgentToolUseEvent"
          agent.tool_result: "#/components/schemas/BetaManagedAgentsAgentToolResultEvent"
          agent.thread_message_received: "#/components/schemas/BetaManagedAgentsAgentThreadMessageReceivedEvent"
          agent.thread_message_sent: "#/components/schemas/BetaManagedAgentsAgentThreadMessageSentEvent"
          agent.thread_context_compacted: "#/components/schemas/BetaManagedAgentsAgentThreadContextCompactedEvent"
          session.error: "#/components/schemas/BetaManagedAgentsSessionErrorEvent"
          session.status_rescheduled: "#/components/schemas/BetaManagedAgentsSessionStatusRescheduledEvent"
          session.status_running: "#/components/schemas/BetaManagedAgentsSessionStatusRunningEvent"
          session.status_idle: "#/components/schemas/BetaManagedAgentsSessionStatusIdleEvent"
          session.status_terminated: "#/components/schemas/BetaManagedAgentsSessionStatusTerminatedEvent"
          session.thread_created: "#/components/schemas/BetaManagedAgentsSessionThreadCreatedEvent"
          span.outcome_evaluation_start: "#/components/schemas/BetaManagedAgentsSpanOutcomeEvaluationStartEvent"
          span.outcome_evaluation_end: "#/components/schemas/BetaManagedAgentsSpanOutcomeEvaluationEndEvent"
          span.model_request_start: "#/components/schemas/BetaManagedAgentsSpanModelRequestStartEvent"
          span.model_request_end: "#/components/schemas/BetaManagedAgentsSpanModelRequestEndEvent"
          span.outcome_evaluation_ongoing: "#/components/schemas/BetaManagedAgentsSpanOutcomeEvaluationOngoingEvent"
          user.define_outcome: "#/components/schemas/BetaManagedAgentsUserDefineOutcomeEvent"
          session.deleted: "#/components/schemas/BetaManagedAgentsSessionDeletedEvent"
          session.thread_status_running: "#/components/schemas/BetaManagedAgentsSessionThreadStatusRunningEvent"
          session.thread_status_idle: "#/components/schemas/BetaManagedAgentsSessionThreadStatusIdleEvent"
          session.thread_status_terminated: "#/components/schemas/BetaManagedAgentsSessionThreadStatusTerminatedEvent"
          user.tool_result: "#/components/schemas/BetaManagedAgentsUserToolResultEvent"
          session.thread_status_rescheduled: "#/components/schemas/BetaManagedAgentsSessionThreadStatusRescheduledEvent"
          session.updated: "#/components/schemas/BetaManagedAgentsSessionUpdatedEvent"
          system.message: "#/components/schemas/BetaManagedAgentsSystemMessageEvent"
      required:
        - type
        - id
        - content
        - tool_use_id
        - result
        - custom_tool_use_id
        - name
        - input
        - processed_at
        - mcp_server_name
        - mcp_tool_use_id
        - from_session_thread_id
        - to_session_thread_id
        - error
        - stop_reason
        - agent_name
        - session_thread_id
        - iteration
        - outcome_id
        - outcome_evaluation_start_id
        - explanation
        - usage
        - is_error
        - model_usage
        - model_request_start_id
        - description
        - max_iterations
        - rubric
      properties:
        type:
          type: string
          enum:
            - user.message
          examples:
            - user.message
        id:
          description: Unique identifier for this event.
          type: string
          examples:
            - sevt_011CZkZGOp0iBcp4kaQSihUmy
        content:
          description: Array of content blocks comprising the user message.
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsUserContentBlock"
          examples:
            - - type: text
                text: "Where is my order #1234?"
        processed_at:
          description: Timestamp when the agent finished processing this message.
          nullable: true
          examples:
            - "2026-03-15T10:00:00Z"
          type: string
          format: date-time
        session_thread_id:
          description: If absent, interrupts every non-archived thread in a multiagent session (or the primary alone in a single-agent session). If present, interrupts only the named thread.
          type: string
          nullable: true
        tool_use_id:
          description: The id of the `agent.tool_use` or `agent.mcp_tool_use` event this result corresponds to, which can be found in the last `session.status_idle` [event's](https://platform.claude.com/docs/en/api/beta/sessions/events/list#beta_managed_agents_session_requires_action.event_ids) `stop_reason.event_ids` field.
          type: string
        result:
          description: "The confirmation result: 'allow' or 'deny'."
          type: string
          enum:
            - allow
            - deny
        deny_message:
          description: Optional message providing context for a 'deny' decision. Only allowed when result is 'deny'.
          type: string
          maxLength: 10000
          nullable: true
        custom_tool_use_id:
          description: The id of the `agent.custom_tool_use` event this result corresponds to, which can be found in the last `session.status_idle` [event's](https://platform.claude.com/docs/en/api/beta/sessions/events/list#beta_managed_agents_session_requires_action.event_ids) `stop_reason.event_ids` field.
          type: string
        is_error:
          description: Whether the tool execution resulted in an error.
          type: boolean
          nullable: true
        name:
          description: Name of the custom tool being called.
          type: string
        input:
          description: Input parameters for the tool call.
          type: object
        mcp_server_name:
          description: Name of the MCP server providing the tool.
          type: string
        evaluated_permission:
          description: The evaluated permission policy for this tool invocation.
          type: string
          enum:
            - allow
            - ask
            - deny
        mcp_tool_use_id:
          description: The id of the `agent.mcp_tool_use` event this result corresponds to.
          type: string
        from_agent_name:
          description: Name of the callable agent this message came from. Absent when received from the primary agent.
          type: string
          nullable: true
        from_session_thread_id:
          description: Public `sthr_` ID of the thread that sent the message.
          type: string
        to_agent_name:
          description: Name of the callable agent this message was sent to. Absent when sent to the primary agent.
          type: string
          nullable: true
        to_session_thread_id:
          description: Public `sthr_` ID of the thread the message was sent to.
          type: string
        error:
          type: object
          discriminator:
            propertyName: type
            mapping:
              unknown_error: "#/components/schemas/BetaManagedAgentsUnknownError"
              model_overloaded_error: "#/components/schemas/BetaManagedAgentsModelOverloadedError"
              model_rate_limited_error: "#/components/schemas/BetaManagedAgentsModelRateLimitedError"
              model_request_failed_error: "#/components/schemas/BetaManagedAgentsModelRequestFailedError"
              mcp_connection_failed_error: "#/components/schemas/BetaManagedAgentsMcpConnectionFailedError"
              mcp_authentication_failed_error: "#/components/schemas/BetaManagedAgentsMcpAuthenticationFailedError"
              billing_error: "#/components/schemas/BetaManagedAgentsBillingError"
              credential_host_unreachable_error: "#/components/schemas/BetaManagedAgentsCredentialHostUnreachableError"
          description: An unknown or unexpected error occurred during session execution. A fallback variant; clients that don't recognize a new error code can match on `retry_status` and `message` alone.
          required:
            - type
            - message
            - retry_status
            - mcp_server_name
            - vault_id
            - credential_id
          properties:
            type:
              type: string
              enum:
                - unknown_error
            message:
              description: Human-readable error description.
              type: string
            retry_status:
              description: What the client should do next.
              type: object
              discriminator:
                propertyName: type
                mapping:
                  retrying: "#/components/schemas/BetaManagedAgentsRetryStatusRetrying"
                  exhausted: "#/components/schemas/BetaManagedAgentsRetryStatusExhausted"
                  terminal: "#/components/schemas/BetaManagedAgentsRetryStatusTerminal"
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - retrying
            mcp_server_name:
              description: Name of the MCP server that failed to connect.
              type: string
            vault_id:
              description: ID of the vault containing the affected credential.
              type: string
            credential_id:
              description: ID of the affected credential.
              type: string
        stop_reason:
          type: object
          discriminator:
            propertyName: type
            mapping:
              end_turn: "#/components/schemas/BetaManagedAgentsSessionEndTurn"
              requires_action: "#/components/schemas/BetaManagedAgentsSessionRequiresAction"
              retries_exhausted: "#/components/schemas/BetaManagedAgentsSessionRetriesExhausted"
          description: The agent completed its turn naturally and is ready for the next user message.
          required:
            - type
            - event_ids
          properties:
            type:
              type: string
              enum:
                - end_turn
            event_ids:
              description: The ids of events the agent is blocked on. Resolving fewer than all re-emits `session.status_idle` with the remainder.
              type: array
              items:
                type: string
        agent_name:
          description: Name of the callable agent the thread runs.
          type: string
          examples:
            - Researcher
        iteration:
          description: 0-indexed revision cycle. 0 is the first evaluation; 1 is the re-evaluation after the first revision; etc.
          type: integer
          format: int32
          examples:
            - 0
        outcome_id:
          description: The `outc_` ID of the outcome being evaluated.
          type: string
          examples:
            - outc_011CZkZRSw2kEfs6ncTVljxP
        outcome_evaluation_start_id:
          description: The id of the corresponding `span.outcome_evaluation_start` event.
          type: string
          examples:
            - sevt_011CZkZTUy4mGhu8peVXnlzr
        explanation:
          description: Human-readable explanation of the verdict. For `needs_revision`, describes which criteria failed and why.
          type: string
          examples:
            - All five sections present with inline citations.
        usage:
          description: Aggregate token usage for this evaluation cycle. Sums across all grader model requests within the cycle.
          examples:
            - input_tokens: 1842
              output_tokens: 213
              cache_creation_input_tokens: 0
              cache_read_input_tokens: 1536
          type: object
          required:
            - input_tokens
            - output_tokens
            - cache_creation_input_tokens
            - cache_read_input_tokens
          properties:
            input_tokens:
              description: Input tokens consumed by this request.
              type: integer
              format: int32
            output_tokens:
              description: Output tokens generated by this request.
              type: integer
              format: int32
            cache_creation_input_tokens:
              description: Tokens used to create prompt cache in this request.
              type: integer
              format: int32
            cache_read_input_tokens:
              description: Tokens read from prompt cache in this request.
              type: integer
              format: int32
            speed:
              description: Inference speed tier this request actually ran at. Mirrors `usage.speed` on /v1/messages. Only present when the fast-mode beta is active.
              nullable: true
              type: string
              enum:
                - standard
                - fast
        model_usage:
          description: Token usage for this model request.
          type: object
          required:
            - input_tokens
            - output_tokens
            - cache_creation_input_tokens
            - cache_read_input_tokens
          properties:
            input_tokens:
              description: Input tokens consumed by this request.
              type: integer
              format: int32
            output_tokens:
              description: Output tokens generated by this request.
              type: integer
              format: int32
            cache_creation_input_tokens:
              description: Tokens used to create prompt cache in this request.
              type: integer
              format: int32
            cache_read_input_tokens:
              description: Tokens read from prompt cache in this request.
              type: integer
              format: int32
            speed:
              description: Inference speed tier this request actually ran at. Mirrors `usage.speed` on /v1/messages. Only present when the fast-mode beta is active.
              nullable: true
              type: string
              enum:
                - standard
                - fast
        model_request_start_id:
          description: The id of the corresponding `span.model_request_start` event.
          type: string
        description:
          description: What the agent should produce. Copied from the input event.
          type: string
          examples:
            - Produce a 2-page summary as summary.md
        max_iterations:
          description: Evaluate-then-revise cycles before giving up. Default 3, max 20.
          type: integer
          format: int32
          nullable: true
          examples:
            - 3
        rubric:
          description: How to grade the outcome. File rubrics are currently resolved to their text content; clients should handle both variants.
          examples:
            - type: text
              content: Must cover all five sections; cite sources inline.
          discriminator:
            propertyName: type
            mapping:
              file: "#/components/schemas/BetaManagedAgentsFileRubric"
              text: "#/components/schemas/BetaManagedAgentsTextRubric"
          type: object
          required:
            - type
            - file_id
            - content
          properties:
            type:
              type: string
              enum:
                - file
            file_id:
              description: ID of the rubric file.
              type: string
            content:
              description: Rubric content. Plain text or markdown — the grader treats it as freeform text.
              type: string
        title:
          description: The session's new title. Present only when the update changed it.
          type: string
          nullable: true
        metadata:
          description: The session's full metadata bag after the update. Present when the update set non-empty metadata; absent when metadata was unchanged or cleared to empty.
          type: object
        agent:
          description: The session's effective agent configuration after the update. Present only when the update changed `agent` (tools or mcp_servers); when present it is the full materialised snapshot, not a diff.
          nullable: true
          type: object
          required:
            - type
            - id
            - version
            - name
            - description
            - model
            - system
            - tools
            - mcp_servers
            - skills
            - multiagent
          properties:
            type:
              type: string
              enum:
                - agent
              examples:
                - agent
            id:
              type: string
              examples:
                - agent_011CZkYpogX7uDKUyvBTophP
            version:
              type: integer
              format: int32
              examples:
                - 1
            name:
              type: string
              examples:
                - My First Agent
            description:
              type: string
              nullable: true
              examples:
                - A general-purpose starter agent.
            model:
              $ref: "#/components/schemas/BetaManagedAgentsModelConfig"
              examples:
                - id: claude-sonnet-4-6
                  speed: standard
            system:
              type: string
              nullable: true
              examples:
                - You are a general-purpose agent that can research, write code, run commands, and use connected tools to complete the user's task end to end.
            tools:
              type: array
              items:
                $ref: "#/components/schemas/BetaManagedAgentsAgentTool"
              examples:
                - - type: agent_toolset_20260401
                    default_config:
                      enabled: true
                      permission_policy:
                        type: always_ask
                    configs: []
            mcp_servers:
              type: array
              items:
                $ref: "#/components/schemas/BetaManagedAgentsMCPServer"
              examples:
                - - type: url
                    name: example-mcp
                    url: https://example-server.modelcontextprotocol.io/sse
            skills:
              type: array
              items:
                $ref: "#/components/schemas/BetaManagedAgentsSkill"
              examples:
                - - type: anthropic
                    skill_id: xlsx
                    version: "1"
                  - type: custom
                    skill_id: skill_011CZkZFNu9hAbo3jZPRgTlx
                    version: "2"
            multiagent:
              description: Resolved multiagent orchestration configuration. Null when the agent is single-threaded.
              nullable: true
              examples:
                - null
              discriminator:
                propertyName: type
                mapping:
                  coordinator: "#/components/schemas/BetaManagedAgentsSessionMultiagentCoordinator"
              type: object
              required:
                - type
                - agents
              properties:
                type:
                  type: string
                  enum:
                    - coordinator
                agents:
                  description: Full `agent` definitions the coordinator may spawn as session threads.
                  type: array
                  items:
                    $ref: "#/components/schemas/BetaManagedAgentsSessionThreadAgent"
          example:
            type: agent
            id: agent_011CZkYpogX7uDKUyvBTophP
            version: 1
            name: My First Agent
            description: A general-purpose starter agent.
            model:
              id: claude-sonnet-4-6
              speed: standard
            system: You are a general-purpose agent that can research, write code, run commands, and use connected tools to complete the user's task end to end.
            tools:
              - type: agent_toolset_20260401
                default_config:
                  enabled: true
                  permission_policy:
                    type: always_ask
                configs: []
            mcp_servers:
              - type: url
                name: example-mcp
                url: https://example-server.modelcontextprotocol.io/sse
            skills:
              - type: anthropic
                skill_id: xlsx
                version: "1"
              - type: custom
                skill_id: skill_011CZkZFNu9hAbo3jZPRgTlx
                version: "2"
            multiagent: null
      example:
        type: user.message
        id: sevt_011CZkZGOp0iBcp4kaQSihUmy
        content:
          - type: text
            text: "Where is my order #1234?"
        processed_at: "2026-03-15T10:00:00Z"
        session_thread_id: sthr_011CZkZVWa6oIjw0rgXZpnBt
        agent_name: Researcher
        iteration: 0
        outcome_id: outc_011CZkZRSw2kEfs6ncTVljxP
        outcome_evaluation_start_id: sevt_011CZkZTUy4mGhu8peVXnlzr
        result: satisfied
        explanation: All five sections present with inline citations.
        usage:
          input_tokens: 1842
          output_tokens: 213
          cache_creation_input_tokens: 0
          cache_read_input_tokens: 1536
        description: Produce a 2-page summary as summary.md
        max_iterations: 3
        rubric:
          type: text
          content: Must cover all five sections; cite sources inline.
        stop_reason:
          type: end_turn
