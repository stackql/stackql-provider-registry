          type: string
        processed_at:
          description: Timestamp of status change.
          type: string
          format: date-time
    BetaManagedAgentsSessionStatusRunningEvent:
      description: Indicates the session is actively running and the agent is working.
      type: object
      required:
        - type
        - id
        - processed_at
      properties:
        type:
          type: string
          enum:
            - session.status_running
        id:
          description: Unique identifier for this event.
          type: string
        processed_at:
          description: Timestamp of status change.
          type: string
          format: date-time
    BetaManagedAgentsSessionStatusIdleEvent:
      description: Indicates the agent has paused and is awaiting user input.
      type: object
      required:
        - type
        - id
        - processed_at
        - stop_reason
      properties:
        type:
          type: string
          enum:
            - session.status_idle
        id:
          description: Unique identifier for this event.
          type: string
        processed_at:
          description: Timestamp of status change.
          type: string
          format: date-time
        stop_reason:
          type: object
          discriminator:
            propertyName: type
            mapping:
              end_turn: "#/components/schemas/BetaManagedAgentsSessionEndTurn"
              requires_action: "#/components/schemas/BetaManagedAgentsSessionRequiresAction"
              retries_exhausted: "#/components/schemas/BetaManagedAgentsSessionRetriesExhausted"
          description: The agent completed its turn naturally and is ready for the next user message.
          required:
            - type
            - event_ids
          properties:
            type:
              type: string
              enum:
                - end_turn
            event_ids:
              description: The ids of events the agent is blocked on. Resolving fewer than all re-emits `session.status_idle` with the remainder.
              type: array
              items:
                type: string
    BetaManagedAgentsSessionStatusTerminatedEvent:
