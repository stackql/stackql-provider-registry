    BetaManagedAgentsSpanOutcomeEvaluationStartEvent:
      description: Emitted when an outcome evaluation cycle begins.
      type: object
      required:
        - type
        - id
        - processed_at
        - iteration
        - outcome_id
      properties:
        type:
          type: string
          enum:
            - span.outcome_evaluation_start
          examples:
            - span.outcome_evaluation_start
        id:
          description: Unique identifier for this event.
          type: string
          examples:
            - sevt_011CZkZTUy4mGhu8peVXnlzr
        processed_at:
          description: Timestamp when outcome evaluation started.
          examples:
            - "2026-03-15T10:02:14Z"
          type: string
          format: date-time
        iteration:
          description: 0-indexed revision cycle. 0 is the first evaluation; 1 is the re-evaluation after the first revision; etc.
          type: integer
          format: int32
          examples:
            - 0
        outcome_id:
          description: The `outc_` ID of the outcome being evaluated.
          type: string
          examples:
            - outc_011CZkZRSw2kEfs6ncTVljxP
      example:
        type: span.outcome_evaluation_start
        id: sevt_011CZkZTUy4mGhu8peVXnlzr
        processed_at: "2026-03-15T10:02:14Z"
        iteration: 0
        outcome_id: outc_011CZkZRSw2kEfs6ncTVljxP
    BetaManagedAgentsSpanOutcomeEvaluationEndEvent:
      description: Emitted when an outcome evaluation cycle completes. Carries the verdict and aggregate token usage. A verdict of `needs_revision` means another evaluation cycle follows; `satisfied`, `max_iterations_reached`, `failed`, or `interrupted` are terminal — no further evaluation cycles follow.
      type: object
      required:
        - type
        - id
        - processed_at
        - outcome_evaluation_start_id
        - iteration
        - result
        - explanation
        - usage
        - outcome_id
      properties:
        type:
          type: string
          enum:
            - span.outcome_evaluation_end
          examples:
            - span.outcome_evaluation_end
        id:
          description: Unique identifier for this event.
          type: string
          examples:
            - sevt_011CZkZUVz5nHiv9qfWYomas
        processed_at:
          description: Timestamp when outcome evaluation ended.
          examples:
            - "2026-03-15T10:02:31Z"
          type: string
          format: date-time
        outcome_evaluation_start_id:
          description: The id of the corresponding `span.outcome_evaluation_start` event.
          type: string
          examples:
            - sevt_011CZkZTUy4mGhu8peVXnlzr
        iteration:
          description: 0-indexed revision cycle, matching the corresponding `span.outcome_evaluation_start`.
          type: integer
          format: int32
          examples:
            - 0
        result:
          description: "Evaluation verdict. 'satisfied': criteria met, session goes idle. 'needs_revision': criteria not met, another revision cycle follows. 'max_iterations_reached': evaluation budget exhausted with criteria still unmet — one final acknowledgment turn follows before the session goes idle, but no further evaluation runs. 'failed': grader determined the rubric does not apply to the deliverables. 'interrupted': user sent an interrupt while evaluation was in progress."
          type: string
          examples:
            - satisfied
        explanation:
          description: Human-readable explanation of the verdict. For `needs_revision`, describes which criteria failed and why.
          type: string
          examples:
            - All five sections present with inline citations.
        usage:
          description: Aggregate token usage for this evaluation cycle. Sums across all grader model requests within the cycle.
          examples:
            - input_tokens: 1842
              output_tokens: 213
              cache_creation_input_tokens: 0
              cache_read_input_tokens: 1536
          type: object
          required:
            - input_tokens
            - output_tokens
            - cache_creation_input_tokens
            - cache_read_input_tokens
          properties:
            input_tokens:
              description: Input tokens consumed by this request.
              type: integer
              format: int32
            output_tokens:
              description: Output tokens generated by this request.
              type: integer
              format: int32
            cache_creation_input_tokens:
              description: Tokens used to create prompt cache in this request.
              type: integer
              format: int32
            cache_read_input_tokens:
              description: Tokens read from prompt cache in this request.
              type: integer
              format: int32
            speed:
              description: Inference speed tier this request actually ran at. Mirrors `usage.speed` on /v1/messages. Only present when the fast-mode beta is active.
              nullable: true
              type: string
              enum:
                - standard
                - fast
        outcome_id:
          description: The `outc_` ID of the outcome being evaluated.
          type: string
          examples:
            - outc_011CZkZRSw2kEfs6ncTVljxP
      example:
        type: span.outcome_evaluation_end
        id: sevt_011CZkZUVz5nHiv9qfWYomas
        processed_at: "2026-03-15T10:02:31Z"
        outcome_evaluation_start_id: sevt_011CZkZTUy4mGhu8peVXnlzr
        iteration: 0
        result: satisfied
        explanation: All five sections present with inline citations.
        usage:
          input_tokens: 1842
          output_tokens: 213
          cache_creation_input_tokens: 0
          cache_read_input_tokens: 1536
        outcome_id: outc_011CZkZRSw2kEfs6ncTVljxP
    BetaManagedAgentsSpanModelRequestStartEvent:
      description: Emitted when a model request is initiated by the agent.
      type: object
      required:
        - type
        - id
        - processed_at
      properties:
        type:
          type: string
          enum:
            - span.model_request_start
        id:
          description: Unique identifier for this event.
          type: string
        processed_at:
          description: Timestamp when the model request started.
          type: string
          format: date-time
    BetaManagedAgentsSpanModelRequestEndEvent:
      description: Emitted when a model request completes.
      type: object
      required:
        - type
        - id
        - processed_at
        - is_error
        - model_usage
        - model_request_start_id
      properties:
        type:
          type: string
          enum:
            - span.model_request_end
        id:
          description: Unique identifier for this event.
          type: string
        processed_at:
          description: Timestamp when the model request completed.
          type: string
          format: date-time
        is_error:
          description: Whether the model request resulted in an error.
          type: boolean
          nullable: true
        model_usage:
          description: Token usage for this model request.
          type: object
          required:
            - input_tokens
            - output_tokens
            - cache_creation_input_tokens
            - cache_read_input_tokens
          properties:
            input_tokens:
              description: Input tokens consumed by this request.
              type: integer
              format: int32
            output_tokens:
              description: Output tokens generated by this request.
              type: integer
              format: int32
            cache_creation_input_tokens:
              description: Tokens used to create prompt cache in this request.
              type: integer
              format: int32
            cache_read_input_tokens:
              description: Tokens read from prompt cache in this request.
              type: integer
              format: int32
            speed:
              description: Inference speed tier this request actually ran at. Mirrors `usage.speed` on /v1/messages. Only present when the fast-mode beta is active.
              nullable: true
              type: string
              enum:
                - standard
                - fast
        model_request_start_id:
          description: The id of the corresponding `span.model_request_start` event.
          type: string
    BetaManagedAgentsSpanOutcomeEvaluationOngoingEvent:
      description: Periodic heartbeat emitted while an outcome evaluation cycle is in progress. Distinguishes 'evaluation is actively running' from 'evaluation is stuck' between the corresponding `span.outcome_evaluation_start` and `span.outcome_evaluation_end` events.
      type: object
      required:
        - type
        - id
        - processed_at
        - iteration
        - outcome_id
      properties:
        type:
          type: string
          enum:
            - span.outcome_evaluation_ongoing
          examples:
            - span.outcome_evaluation_ongoing
        id:
          description: Unique identifier for this event.
          type: string
          examples:
            - sevt_011CZkZbCG2uOpc6xmDfvTzh
        processed_at:
          description: Timestamp when this heartbeat was emitted.
          examples:
            - "2026-03-15T10:02:14Z"
          type: string
          format: date-time
        iteration:
          description: 0-indexed revision cycle, matching the corresponding `span.outcome_evaluation_start`.
          type: integer
          format: int32
          examples:
            - 0
        outcome_id:
          description: The `outc_` ID of the outcome being evaluated.
          type: string
          examples:
            - outc_011CZkZRSw2kEfs6ncTVljxP
      example:
        type: span.outcome_evaluation_ongoing
        id: sevt_011CZkZbCG2uOpc6xmDfvTzh
        processed_at: "2026-03-15T10:02:14Z"
        iteration: 0
        outcome_id: outc_011CZkZRSw2kEfs6ncTVljxP
    BetaManagedAgentsUserDefineOutcomeEvent:
      description: Echo of a `user.define_outcome` input event. Carries the server-generated `outcome_id` that subsequent `span.outcome_evaluation_*` events reference.
      type: object
      required:
        - type
        - id
        - processed_at
        - outcome_id
        - description
        - max_iterations
        - rubric
      properties:
        type:
          type: string
          enum:
            - user.define_outcome
          examples:
            - user.define_outcome
        id:
          description: Unique identifier for this event.
          type: string
          examples:
            - sevt_011CZkZSTx3lFgt7odUWmkyq
        processed_at:
          description: Timestamp when the outcome was accepted.
          examples:
            - "2026-03-15T10:02:14Z"
          type: string
          format: date-time
        outcome_id:
          description: Server-generated `outc_` ID for this outcome. Referenced by `span.outcome_evaluation_*` events and the session's `outcome_evaluations` list.
          type: string
          examples:
            - outc_011CZkZRSw2kEfs6ncTVljxP
        description:
          description: What the agent should produce. Copied from the input event.
          type: string
          examples:
            - Produce a 2-page summary as summary.md
        max_iterations:
          description: Evaluate-then-revise cycles before giving up. Default 3, max 20.
          type: integer
          format: int32
          nullable: true
          examples:
            - 3
        rubric:
          description: How to grade the outcome. File rubrics are currently resolved to their text content; clients should handle both variants.
          examples:
            - type: text
              content: Must cover all five sections; cite sources inline.
          discriminator:
            propertyName: type
            mapping:
              file: "#/components/schemas/BetaManagedAgentsFileRubric"
              text: "#/components/schemas/BetaManagedAgentsTextRubric"
          type: object
          required:
            - type
            - file_id
            - content
          properties:
            type:
              type: string
              enum:
                - file
            file_id:
              description: ID of the rubric file.
              type: string
            content:
              description: Rubric content. Plain text or markdown — the grader treats it as freeform text.
              type: string
      example:
        type: user.define_outcome
        id: sevt_011CZkZSTx3lFgt7odUWmkyq
        processed_at: "2026-03-15T10:02:14Z"
        outcome_id: outc_011CZkZRSw2kEfs6ncTVljxP
        description: Produce a 2-page summary as summary.md
        max_iterations: 3
        rubric:
          type: text
          content: Must cover all five sections; cite sources inline.
    BetaManagedAgentsSessionDeletedEvent:
      description: Emitted when a session has been deleted. Terminates any active event stream — no further events will be emitted for this session.
      type: object
      required:
        - type
        - id
        - processed_at
      properties:
        type:
          type: string
          enum:
            - session.deleted
        id:
          description: Unique identifier for this event.
          type: string
        processed_at:
          description: Timestamp when the session was deleted.
          type: string
          format: date-time
    BetaManagedAgentsSessionThreadStatusRunningEvent:
      description: A session thread has begun executing. Emitted on the thread's own stream and cross-posted to the primary stream for child threads.
      type: object
      required:
        - type
        - id
        - session_thread_id
        - processed_at
        - agent_name
      properties:
        type:
          type: string
          enum:
            - session.thread_status_running
        id:
          description: Unique identifier for this event.
          type: string
        session_thread_id:
          description: Public sthr_ ID of the thread that started running.
          type: string
        processed_at:
          description: Timestamp of the status transition.
          type: string
          format: date-time
        agent_name:
          description: Name of the agent the thread runs.
          type: string
    BetaManagedAgentsSessionThreadStatusIdleEvent:
      description: A session thread has yielded and is awaiting input. Emitted on the thread's own stream and cross-posted to the primary stream for child threads.
      type: object
      required:
        - type
        - id
        - session_thread_id
        - processed_at
        - agent_name
        - stop_reason
      properties:
        type:
          type: string
          enum:
            - session.thread_status_idle
          examples:
            - session.thread_status_idle
        id:
          description: Unique identifier for this event.
          type: string
          examples:
            - sevt_011CZkZXYc8qKly2tiZbrpDv
        session_thread_id:
          description: Public sthr_ ID of the thread that went idle.
          type: string
          examples:
            - sthr_011CZkZVWa6oIjw0rgXZpnBt
        processed_at:
          description: Timestamp of the status transition.
          examples:
            - "2026-03-15T10:00:00Z"
          type: string
          format: date-time
        agent_name:
          description: Name of the agent the thread runs.
          type: string
          examples:
            - Researcher
        stop_reason:
          type: object
          discriminator:
            propertyName: type
            mapping:
              end_turn: "#/components/schemas/BetaManagedAgentsSessionEndTurn"
              requires_action: "#/components/schemas/BetaManagedAgentsSessionRequiresAction"
              retries_exhausted: "#/components/schemas/BetaManagedAgentsSessionRetriesExhausted"
          examples:
            - type: end_turn
          description: The agent completed its turn naturally and is ready for the next user message.
          required:
            - type
            - event_ids
          properties:
            type:
              type: string
              enum:
                - end_turn
            event_ids:
              description: The ids of events the agent is blocked on. Resolving fewer than all re-emits `session.status_idle` with the remainder.
              type: array
              items:
                type: string
      example:
        type: session.thread_status_idle
        id: sevt_011CZkZXYc8qKly2tiZbrpDv
        session_thread_id: sthr_011CZkZVWa6oIjw0rgXZpnBt
        processed_at: "2026-03-15T10:00:00Z"
        agent_name: Researcher
        stop_reason:
          type: end_turn
    BetaManagedAgentsSessionThreadStatusTerminatedEvent:
      description: A session thread has terminated and will accept no further input. Emitted on the thread's own stream and cross-posted to the primary stream for child threads.
      type: object
      required:
        - type
        - id
        - session_thread_id
        - processed_at
        - agent_name
      properties:
        type:
          type: string
          enum:
            - session.thread_status_terminated
        id:
          description: Unique identifier for this event.
          type: string
        session_thread_id:
          description: Public sthr_ ID of the thread that terminated.
          type: string
        processed_at:
          description: Timestamp of the status transition.
          type: string
          format: date-time
        agent_name:
          description: Name of the agent the thread runs.
          type: string
    BetaManagedAgentsUserToolResultEvent:
      description: Event sent by the client providing the result of an agent-toolset tool execution. Only valid on `self_hosted` environments, where sandbox-routed tools are executed by the client rather than the server.
      type: object
      required:
        - type
        - id
        - tool_use_id
      properties:
        type:
          type: string
          enum:
            - user.tool_result
        id:
          description: Unique identifier for this event.
          type: string
        tool_use_id:
          description: The id of the `agent.tool_use` event this result corresponds to, which can be found in the last `session.status_idle` [event's](https://platform.claude.com/docs/en/api/beta/sessions/events/list#beta_managed_agents_session_requires_action.event_ids) `stop_reason.event_ids` field.
          type: string
        content:
          description: The result content returned by the tool.
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsToolResultContentBlock"
        is_error:
          description: Whether the tool execution resulted in an error.
          type: boolean
          nullable: true
        processed_at:
          description: Timestamp when this result was processed.
          nullable: true
          type: string
          format: date-time
        session_thread_id:
          description: Routes this result to a subagent thread. Copy from the `agent.tool_use` event's `session_thread_id`.
          type: string
          nullable: true
    BetaManagedAgentsSessionThreadStatusRescheduledEvent:
      description: A session thread hit a transient error and is retrying automatically. Emitted on the thread's own stream and cross-posted to the primary stream for child threads.
      type: object
      required:
        - type
        - id
        - session_thread_id
        - processed_at
        - agent_name
      properties:
        type:
          type: string
          enum:
            - session.thread_status_rescheduled
        id:
          description: Unique identifier for this event.
          type: string
        session_thread_id:
          description: Public sthr_ ID of the thread that is retrying.
          type: string
        processed_at:
          description: Timestamp of the status transition.
          type: string
          format: date-time
        agent_name:
          description: Name of the agent the thread runs.
          type: string
    BetaManagedAgentsSessionUpdatedEvent:
      description: Emitted when an UpdateSession request changed at least one field. Carries only the fields that changed; absent fields were not part of the update. The new configuration applies from the next turn.
      type: object
      required:
        - type
        - id
        - processed_at
      properties:
        type:
          type: string
          enum:
            - session.updated
        id:
          description: Unique identifier for this event.
          type: string
        processed_at:
          description: Timestamp when the update was applied.
          type: string
          format: date-time
        title:
          description: The session's new title. Present only when the update changed it.
          type: string
          nullable: true
        metadata:
          description: The session's full metadata bag after the update. Present when the update set non-empty metadata; absent when metadata was unchanged or cleared to empty.
          type: object
        agent:
          description: The session's effective agent configuration after the update. Present only when the update changed `agent` (tools or mcp_servers); when present it is the full materialised snapshot, not a diff.
          nullable: true
          type: object
          required:
            - type
            - id
            - version
            - name
            - description
            - model
            - system
            - tools
            - mcp_servers
            - skills
            - multiagent
          properties:
            type:
              type: string
              enum:
                - agent
              examples:
                - agent
            id:
              type: string
              examples:
                - agent_011CZkYpogX7uDKUyvBTophP
            version:
              type: integer
              format: int32
              examples:
                - 1
            name:
              type: string
              examples:
                - My First Agent
            description:
              type: string
              nullable: true
              examples:
                - A general-purpose starter agent.
            model:
              $ref: "#/components/schemas/BetaManagedAgentsModelConfig"
              examples:
                - id: claude-sonnet-4-6
                  speed: standard
            system:
              type: string
              nullable: true
              examples:
                - You are a general-purpose agent that can research, write code, run commands, and use connected tools to complete the user's task end to end.
            tools:
              type: array
              items:
                $ref: "#/components/schemas/BetaManagedAgentsAgentTool"
              examples:
                - - type: agent_toolset_20260401
                    default_config:
                      enabled: true
                      permission_policy:
                        type: always_ask
                    configs: []
            mcp_servers:
              type: array
              items:
                $ref: "#/components/schemas/BetaManagedAgentsMCPServer"
              examples:
                - - type: url
                    name: example-mcp
                    url: https://example-server.modelcontextprotocol.io/sse
            skills:
              type: array
              items:
                $ref: "#/components/schemas/BetaManagedAgentsSkill"
              examples:
                - - type: anthropic
                    skill_id: xlsx
                    version: "1"
                  - type: custom
                    skill_id: skill_011CZkZFNu9hAbo3jZPRgTlx
                    version: "2"
            multiagent:
              description: Resolved multiagent orchestration configuration. Null when the agent is single-threaded.
              nullable: true
              examples:
                - null
              discriminator:
                propertyName: type
                mapping:
                  coordinator: "#/components/schemas/BetaManagedAgentsSessionMultiagentCoordinator"
              type: object
              required:
                - type
                - agents
              properties:
                type:
                  type: string
                  enum:
                    - coordinator
                agents:
                  description: Full `agent` definitions the coordinator may spawn as session threads.
                  type: array
                  items:
                    $ref: "#/components/schemas/BetaManagedAgentsSessionThreadAgent"
          example:
            type: agent
            id: agent_011CZkYpogX7uDKUyvBTophP
            version: 1
            name: My First Agent
            description: A general-purpose starter agent.
            model:
              id: claude-sonnet-4-6
              speed: standard
            system: You are a general-purpose agent that can research, write code, run commands, and use connected tools to complete the user's task end to end.
            tools:
              - type: agent_toolset_20260401
                default_config:
                  enabled: true
                  permission_policy:
                    type: always_ask
                configs: []
            mcp_servers:
              - type: url
                name: example-mcp
                url: https://example-server.modelcontextprotocol.io/sse
            skills:
              - type: anthropic
                skill_id: xlsx
                version: "1"
              - type: custom
                skill_id: skill_011CZkZFNu9hAbo3jZPRgTlx
                version: "2"
            multiagent: null
