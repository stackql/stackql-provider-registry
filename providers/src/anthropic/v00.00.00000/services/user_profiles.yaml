components:
  schemas:
    BetaCreateUserProfileRequest:
      type: object
      properties:
        external_id:
          description: Platform's own identifier for this user. Not enforced unique. Maximum 255 characters.
          type: string
          minLength: 1
          maxLength: 255
          nullable: true
          examples:
            - user_12345
        name:
          description: Display name of the entity this profile represents. Required when relationship is `resold` (the resold-to company's name); optional otherwise. Maximum 255 characters.
          type: string
          minLength: 1
          maxLength: 255
          nullable: true
        relationship:
          description: "How the entity relates to the platform. `external` (default): an individual end-user. `resold`: a company the platform resells Claude access to. `internal`: the platform's own usage."
          type: string
          enum:
            - external
            - resold
            - internal
        metadata:
          description: Free-form key-value data to attach to this user profile. Maximum 16 keys, with keys up to 64 characters and values up to 512 characters. Values must be non-empty strings.
          type: object
          examples:
            - {}
      example:
        external_id: user_12345
        metadata: {}
    BetaUserProfile:
      type: object
      required:
        - id
        - type
        - relationship
        - trust_grants
        - created_at
        - metadata
        - updated_at
      properties:
        id:
          description: Unique identifier for this user profile, prefixed `uprof_`.
          type: string
          examples:
            - uprof_011CZkZCu8hGbp5mYRQgUmz9
        type:
          description: Object type. Always `user_profile`.
          type: string
          enum:
            - user_profile
          examples:
            - user_profile
        external_id:
          description: Platform's own identifier for this user. Not enforced unique.
          type: string
          nullable: true
          examples:
            - user_12345
        name:
          description: Display name of the entity this profile represents. For `resold` this is the resold-to company's name.
          type: string
          nullable: true
          examples:
            - Example User
        relationship:
          description: How the entity relates to the platform. `external` (default), `resold`, or `internal`.
          examples:
            - external
          type: string
          enum:
            - external
            - resold
            - internal
        trust_grants:
          description: Trust grants for this profile, keyed by grant name. Key omitted when no grant is active or in flight.
          type: object
          examples:
            - cyber:
                status: active
        created_at:
          description: When this user profile was created, in RFC 3339 format.
          examples:
            - "2026-03-15T10:00:00Z"
          type: string
          format: date-time
        metadata:
          description: Arbitrary key-value metadata. Maximum 16 pairs, keys up to 64 chars, values up to 512 chars.
          type: object
          examples:
            - {}
        updated_at:
          description: When this user profile was last modified, in RFC 3339 format. Trust-grant status changes also bump this timestamp.
          examples:
            - "2026-03-15T10:00:00Z"
          type: string
          format: date-time
      example:
        id: uprof_011CZkZCu8hGbp5mYRQgUmz9
        type: user_profile
        external_id: user_12345
        name: Example User
        relationship: external
        trust_grants:
          cyber:
            status: active
        metadata: {}
        created_at: "2026-03-15T10:00:00Z"
        updated_at: "2026-03-15T10:00:00Z"
    BetaErrorResponse:
      properties:
        error:
          discriminator:
            mapping:
              api_error: "#/components/schemas/BetaAPIError"
              authentication_error: "#/components/schemas/BetaAuthenticationError"
              billing_error: "#/components/schemas/BetaBillingError"
              invalid_request_error: "#/components/schemas/BetaInvalidRequestError"
              not_found_error: "#/components/schemas/BetaNotFoundError"
              overloaded_error: "#/components/schemas/BetaOverloadedError"
              permission_error: "#/components/schemas/BetaPermissionError"
              rate_limit_error: "#/components/schemas/BetaRateLimitError"
              timeout_error: "#/components/schemas/BetaGatewayTimeoutError"
            propertyName: type
          title: Error
          properties:
            message:
              default: Invalid request
              title: Message
              type: string
            type:
              default: invalid_request_error
              title: Type
              type: string
              enum:
                - invalid_request_error
          required:
            - message
            - type
          type: object
        request_id:
          default: null
          title: Request Id
          nullable: true
          type: string
        type:
          default: error
          title: Type
          type: string
          enum:
            - error
      required:
        - error
        - request_id
        - type
      title: ErrorResponse
      type: object
    AnthropicBeta:
      type: string
      enum:
        - message-batches-2024-09-24
        - prompt-caching-2024-07-31
        - computer-use-2024-10-22
        - computer-use-2025-01-24
        - pdfs-2024-09-25
        - token-counting-2024-11-01
        - token-efficient-tools-2025-02-19
        - output-128k-2025-02-19
        - files-api-2025-04-14
        - mcp-client-2025-04-04
        - mcp-client-2025-11-20
        - dev-full-thinking-2025-05-14
        - interleaved-thinking-2025-05-14
        - code-execution-2025-05-22
        - extended-cache-ttl-2025-04-11
        - context-1m-2025-08-07
        - context-management-2025-06-27
        - model-context-window-exceeded-2025-08-26
        - skills-2025-10-02
        - fast-mode-2026-02-01
        - output-300k-2026-03-24
        - user-profiles-2026-03-24
        - advisor-tool-2026-03-01
        - managed-agents-2026-04-01
        - cache-diagnosis-2026-04-07
        - thinking-token-count-2026-05-13
        - server-side-fallback-2026-06-01
        - fallback-credit-2026-06-01
        - agent-memory-2026-07-22
      x-stainless-nominal: false
    BetaUserProfileListOrder:
      type: string
      description: ListOrder enum
      enum:
        - asc
        - desc
