        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BetaPublicEnvironmentCreateRequest"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetaEnvironment"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetaErrorResponse"
