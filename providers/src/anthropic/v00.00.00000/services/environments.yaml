        - computer-use-2025-01-24
        - pdfs-2024-09-25
        - token-counting-2024-11-01
        - token-efficient-tools-2025-02-19
        - output-128k-2025-02-19
        - files-api-2025-04-14
        - mcp-client-2025-04-04
        - mcp-client-2025-11-20
        - dev-full-thinking-2025-05-14
        - interleaved-thinking-2025-05-14
        - code-execution-2025-05-22
        - extended-cache-ttl-2025-04-11
        - context-1m-2025-08-07
        - context-management-2025-06-27
        - model-context-window-exceeded-2025-08-26
        - skills-2025-10-02
        - fast-mode-2026-02-01
        - output-300k-2026-03-24
        - user-profiles-2026-03-24
        - advisor-tool-2026-03-01
        - managed-agents-2026-04-01
        - cache-diagnosis-2026-04-07
        - thinking-token-count-2026-05-13
        - server-side-fallback-2026-06-01
        - fallback-credit-2026-06-01
        - agent-memory-2026-07-22
      x-stainless-nominal: false
    BetaPublicEnvironmentCreateRequest:
      properties:
        config:
          type: string
          description: Environment configuration
          nullable: true
        description:
          title: Description
          description: Optional description of the environment
          examples:
            - Python environment with data-analysis packages.
          nullable: true
          type: string
          maxLength: 1024
        metadata:
          type: object
          title: Metadata
          description: User-provided metadata key-value pairs
        name:
          type: string
          maxLength: 256
          minLength: 1
          title: Name
          description: Human-readable name for the environment
          examples:
            - python-data-analysis
        scope:
          title: Scope
          description: The visibility scope for this environment. 'organization' makes the environment visible to all accounts. 'account' restricts visibility to the owning account only. Only applicable for self-hosted environments. If not specified, defaults based on organization type.
          nullable: true
          type: string
          enum:
            - organization
            - account
      type: object
      required:
        - name
      title: PublicEnvironmentCreateRequest
      description: Public API request to create a new environment (without org/account fields).
      example:
        name: python-data-analysis
        description: Python environment with data-analysis packages.
        config:
          type: cloud
          networking:
            type: limited
            allowed_hosts:
              - api.example.com
            allow_package_managers: true
          packages:
            pip:
              - pandas
              - numpy
    BetaEnvironment:
      properties:
        archived_at:
          title: Archived At
          description: RFC 3339 timestamp when environment was archived, or null if not archived
          examples:
            - null
          nullable: true
          type: string
        config:
          title: Config
          description: Environment configuration (either Anthropic Cloud or self-hosted)
          discriminator:
            propertyName: type
            mapping:
              cloud: "#/components/schemas/BetaCloudConfig"
              self_hosted: "#/components/schemas/BetaSelfHostedConfig"
          examples:
            - type: cloud
              networking:
                type: limited
                allowed_hosts:
                  - api.example.com
                allow_package_managers: true
                allow_mcp_servers: false
              packages:
                type: packages
                pip:
                  - pandas
                  - numpy
                npm: []
                apt: []
                cargo: []
                gem: []
                go: []
          properties:
            networking:
              title: Networking
              description: Network configuration policy.
              discriminator:
                propertyName: type
                mapping:
                  limited: "#/components/schemas/BetaLimitedNetwork"
                  unrestricted: "#/components/schemas/BetaUnrestrictedNetwork"
              examples:
                - type: limited
                  allowed_hosts:
                    - api.example.com
                  allow_package_managers: true
                  allow_mcp_servers: false
              properties:
                type:
                  type: string
                  title: Type
                  description: Network policy type
                  enum:
                    - unrestricted
                allow_mcp_servers:
                  type: boolean
                  title: Allow Mcp Servers
                  description: Permits outbound access to MCP server endpoints configured on the agent, beyond those listed in the `allowed_hosts` array.
                allow_package_managers:
                  type: boolean
                  title: Allow Package Managers
                  description: Permits outbound access to public package registries (PyPI, npm, etc.) beyond those listed in the `allowed_hosts` array.
                allowed_hosts:
                  items:
                    type: string
                  type: array
                  title: Allowed Hosts
                  description: Specifies domains the container can reach.
              type: object
              required:
                - type
                - allow_mcp_servers
                - allow_package_managers
                - allowed_hosts
            packages:
              $ref: "#/components/schemas/BetaPackages"
              description: Package manager configuration.
              examples:
                - type: packages
                  pip:
                    - pandas
                    - numpy
                  npm: []
                  apt: []
                  cargo: []
                  gem: []
                  go: []
            type:
              type: string
              title: Type
              description: Environment type
              examples:
                - cloud
              enum:
                - cloud
          type: object
          required:
            - networking
            - packages
            - type
          example:
            type: cloud
            networking:
              type: limited
              allowed_hosts:
                - api.example.com
              allow_package_managers: true
              allow_mcp_servers: false
            packages:
              type: packages
              pip:
                - pandas
                - numpy
              npm: []
              apt: []
              cargo: []
              gem: []
              go: []
        created_at:
          type: string
          title: Created At
          description: RFC 3339 timestamp when environment was created
          examples:
            - "2026-03-15T10:00:00Z"
        description:
          type: string
          title: Description
          description: User-provided description for the environment
          examples:
            - Python environment with data-analysis packages.
        id:
          type: string
          title: Id
          description: Environment identifier (e.g., 'env_...')
          examples:
            - env_011CZkZ9X2dpNyB7HsEFoRfW
        metadata:
          type: object
          title: Metadata
          description: User-provided metadata key-value pairs
          examples:
            - key: value
        name:
          type: string
          title: Name
          description: Human-readable name for the environment
          examples:
            - python-data-analysis
        scope:
          type: string
          enum:
            - organization
            - account
          title: Scope
          description: The visibility scope for this environment. 'organization' means visible to all accounts. 'account' means visible only to the owning account.
        type:
          type: string
          title: Type
          description: The type of object (always 'environment')
          default: environment
          examples:
            - environment
          enum:
            - environment
        updated_at:
          type: string
          title: Updated At
          description: RFC 3339 timestamp when environment was last updated
          examples:
            - "2026-03-15T10:00:00Z"
      type: object
      required:
        - archived_at
        - config
        - created_at
        - description
        - id
        - metadata
        - name
        - type
        - updated_at
      title: Environment
      description: Unified Environment resource for both cloud and self-hosted environments.
      example:
        type: environment
        id: env_011CZkZ9X2dpNyB7HsEFoRfW
        name: python-data-analysis
        description: Python environment with data-analysis packages.
        config:
          type: cloud
          networking:
            type: limited
            allowed_hosts:
              - api.example.com
            allow_package_managers: true
            allow_mcp_servers: false
          packages:
            type: packages
            pip:
              - pandas
              - numpy
            npm: []
            apt: []
            cargo: []
            gem: []
            go: []
        metadata: {}
        archived_at: null
        created_at: "2026-03-15T10:00:00Z"
        updated_at: "2026-03-15T10:00:00Z"
