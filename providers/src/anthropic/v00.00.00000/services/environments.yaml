      summary: List Environments
      description: List environments with pagination support.
      operationId: beta_list_environments_v1_environments_get
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 1000
            minimum: 1
            description: Maximum number of environments to return
            default: 20
            title: Limit
          description: Maximum number of environments to return
        - name: page
          in: query
          required: false
          schema:
            type: string
            description: Opaque cursor from previous response for pagination. Pass the `next_page` value from the previous response.
            nullable: true
          description: Opaque cursor from previous response for pagination. Pass the `next_page` value from the previous response.
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
            description: Include archived environments in the response
            default: false
            title: Include Archived
          description: Include archived environments in the response
        - name: anthropic-beta
          in: header
          required: false
          schema:
            type: string
            description: |-
              Optional header to specify the beta version(s) you want to use.

