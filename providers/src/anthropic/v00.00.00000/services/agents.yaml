components:
  schemas:
    BetaManagedAgentsCreateAgentParams:
      description: Request parameters for creating an `agent`.
      type: object
      required:
        - name
        - model
      properties:
        name:
          description: Human-readable name for the agent.
          type: string
          minLength: 1
          maxLength: 256
          examples:
            - My First Agent
        model:
          description: Model identifier. Accepts the [model string](https://platform.claude.com/docs/en/about-claude/models/overview#latest-models-comparison), e.g. `claude-opus-4-6`, or a `model_config` object for additional configuration control
          examples:
            - claude-sonnet-4-6
          title: BetaManagedAgentsModel
          x-stainless-skip:
            - go
            - cli
          type: string
          x-stainless-nominal: false
          enum:
            - claude-sonnet-5
          required:
            - id
          properties:
            id:
              $ref: "#/components/schemas/BetaManagedAgentsModel"
            speed:
              description: Inference speed mode. Defaults to `standard`.
              nullable: true
              type: string
              enum:
                - standard
                - fast
          example:
            id: claude-opus-4-6
        description:
          description: Description of what the agent does.
          type: string
          maxLength: 2048
          nullable: true
          examples:
            - A general-purpose starter agent.
        system:
          description: System prompt for the agent.
          type: string
          maxLength: 100000
