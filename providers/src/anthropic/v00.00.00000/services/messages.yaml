          nullable: true
          type: string
        type:
          type: string
          title: Type
          description: |-
            Object type.

            For Message Batches, this is always `"message_batch"`.
          default: message_batch
          enum:
            - message_batch
      type: object
      required:
        - archived_at
        - cancel_initiated_at
        - created_at
        - ended_at
        - expires_at
        - id
        - processing_status
        - request_counts
        - results_url
        - type
