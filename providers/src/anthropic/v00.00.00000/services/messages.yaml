openapi: 3.0.3
info:
  title: messages API
  description: anthropic messages API
  version: 1.0.0
paths:
  /v1/messages:
    post:
      summary: Create a Message
      description: |-
        Send a structured list of input messages with text and/or image content, and the model will generate the next message in the conversation.

        The Messages API can be used for either single queries or stateless multi-turn conversations.

        Learn more about the Messages API in our [user guide](https://platform.claude.com/docs/en/get-started)
      operationId: messages_post
      parameters:
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: anthropic-user-profile-id
          in: header
          required: false
          schema:
            type: string
            description: The user profile ID to attribute this request to. Use when acting on behalf of a party other than your organization. Requires the `user-profiles` beta header.
            title: Anthropic-User-Profile-Id
            x-stainless-param: user_profile_id
          description: The user profile ID to attribute this request to. Use when acting on behalf of a party other than your organization. Requires the `user-profiles` beta header.
      responses:
        "200":
          description: Message object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageParams"
        required: true
  /v1/messages/batches:
    post:
      summary: Create a Message Batch
      description: |-
        Send a batch of Message creation requests.

        The Message Batches API can be used to process multiple Messages API requests at once. Once a Message Batch is created, it begins processing immediately. Batches can take up to 24 hours to complete.

        Learn more about the Message Batches API in our [user guide](https://platform.claude.com/docs/en/build-with-claude/batch-processing)
      operationId: message_batches_post
      parameters:
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: anthropic-user-profile-id
          in: header
          required: false
          schema:
            type: string
            description: The user profile ID to attribute the requests in this batch to. Use when acting on behalf of a party other than your organization. Requires the `user-profiles` beta header. Applies to every request in the batch; an individual request whose `user_profile_id` body field conflicts with this header is errored.
            title: Anthropic-User-Profile-Id
            x-stainless-param: user_profile_id
          description: The user profile ID to attribute the requests in this batch to. Use when acting on behalf of a party other than your organization. Requires the `user-profiles` beta header. Applies to every request in the batch; an individual request whose `user_profile_id` body field conflicts with this header is errored.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageBatch"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageBatchParams"
        required: true
    get:
      summary: List Message Batches
      description: |-
        List all Message Batches within a Workspace. Most recently created batches are returned first.

        Learn more about the Message Batches API in our [user guide](https://platform.claude.com/docs/en/build-with-claude/batch-processing)
      operationId: message_batches_list
      parameters:
        - name: before_id
          in: query
          required: false
          schema:
            type: string
            description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately before this object.
            title: Before Id
          description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately before this object.
        - name: after_id
          in: query
          required: false
          schema:
            type: string
            description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately after this object.
            title: After Id
          description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately after this object.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 1000
            minimum: 1
            description: |-
              Number of items to return per page.

              Defaults to `20`. Ranges from `1` to `1000`.
            default: 20
            title: Limit
          description: |-
            Number of items to return per page.

            Defaults to `20`. Ranges from `1` to `1000`.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: x-api-key
          in: header
          required: false
          schema:
            type: string
            description: |-
              Your unique API key for authentication.

              This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
            title: X-Api-Key
          description: |-
            Your unique API key for authentication.

            This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse_MessageBatch_"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/messages/batches/{message_batch_id}:
    get:
      summary: Retrieve a Message Batch
      description: |-
        This endpoint is idempotent and can be used to poll for Message Batch completion. To access the results of a Message Batch, make a request to the `results_url` field in the response.

        Learn more about the Message Batches API in our [user guide](https://platform.claude.com/docs/en/build-with-claude/batch-processing)
      operationId: message_batches_retrieve
      parameters:
        - name: message_batch_id
          in: path
          required: true
          schema:
            type: string
            description: ID of the Message Batch.
            title: Message Batch Id
          description: ID of the Message Batch.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: x-api-key
          in: header
          required: false
          schema:
            type: string
            description: |-
              Your unique API key for authentication.

              This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
            title: X-Api-Key
          description: |-
            Your unique API key for authentication.

            This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageBatch"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a Message Batch
      description: |-
        Delete a Message Batch.

        Message Batches can only be deleted once they've finished processing. If you'd like to delete an in-progress batch, you must first cancel it.

        Learn more about the Message Batches API in our [user guide](https://platform.claude.com/docs/en/build-with-claude/batch-processing)
      operationId: message_batches_delete
      parameters:
        - name: message_batch_id
          in: path
          required: true
          schema:
            type: string
            description: ID of the Message Batch.
            title: Message Batch Id
          description: ID of the Message Batch.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: x-api-key
          in: header
          required: false
          schema:
            type: string
            description: |-
              Your unique API key for authentication.

              This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
            title: X-Api-Key
          description: |-
            Your unique API key for authentication.

            This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMessageBatchResponse"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/messages/batches/{message_batch_id}/cancel:
    post:
      summary: Cancel a Message Batch
      description: |-
        Batches may be canceled any time before processing ends. Once cancellation is initiated, the batch enters a `canceling` state, at which time the system may complete any in-progress, non-interruptible requests before finalizing cancellation.

        The number of canceled requests is specified in `request_counts`. To determine which requests were canceled, check the individual results within the batch. Note that cancellation may not result in any canceled requests if they were non-interruptible.

        Learn more about the Message Batches API in our [user guide](https://platform.claude.com/docs/en/build-with-claude/batch-processing)
      operationId: message_batches_cancel
      parameters:
        - name: message_batch_id
          in: path
          required: true
          schema:
            type: string
            description: ID of the Message Batch.
            title: Message Batch Id
          description: ID of the Message Batch.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageBatch"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/messages/batches/{message_batch_id}/results:
    get:
      summary: Retrieve Message Batch results
      description: |-
        Streams the results of a Message Batch as a `.jsonl` file.

        Each line in the file is a JSON object containing the result of a single request in the Message Batch. Results are not guaranteed to be in the same order as requests. Use the `custom_id` field to match results to requests.

        Learn more about the Message Batches API in our [user guide](https://platform.claude.com/docs/en/build-with-claude/batch-processing)
      operationId: message_batches_results
      parameters:
        - name: message_batch_id
          in: path
          required: true
          schema:
            type: string
            description: ID of the Message Batch.
            title: Message Batch Id
          description: ID of the Message Batch.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: x-api-key
          in: header
          required: false
          schema:
            type: string
            description: |-
              Your unique API key for authentication.

              This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
            title: X-Api-Key
          description: |-
            Your unique API key for authentication.

            This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
      responses:
        "200":
          description: Successful Response
          content:
            application/x-jsonl:
              schema:
                $ref: "#/components/schemas/MessageBatchIndividualResponse"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/messages/count_tokens:
    post:
      summary: Count tokens in a Message
      description: |-
        Count the number of tokens in a Message.

        The Token Count API can be used to count the number of tokens in a Message, including tools, images, and documents, without creating it.

        Learn more about token counting in our [user guide](https://platform.claude.com/docs/en/build-with-claude/token-counting)
      operationId: messages_count_tokens_post
      parameters:
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: anthropic-user-profile-id
          in: header
          required: false
          schema:
            type: string
            description: The user profile ID to attribute this request to. Use when acting on behalf of a party other than your organization. Requires the `user-profiles` beta header.
            title: Anthropic-User-Profile-Id
            x-stainless-param: user_profile_id
          description: The user profile ID to attribute this request to. Use when acting on behalf of a party other than your organization. Requires the `user-profiles` beta header.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountMessageTokensResponse"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountMessageTokensParams"
        required: true
components:
  schemas:
    Message:
      examples:
        - content:
            - citations: null
              text: Hi! My name is Claude.
              type: text
          id: msg_013Zva2CMHLNnXjNJJKqJ2EF
          model: claude-opus-4-6
          role: assistant
          stop_details: null
          stop_reason: end_turn
          stop_sequence: null
          type: message
          usage:
            input_tokens: 2095
            output_tokens: 503
      properties:
        id:
          description: |-
            Unique object identifier.

            The format and length of IDs may change over time.
          examples:
            - msg_013Zva2CMHLNnXjNJJKqJ2EF
          title: Id
          type: string
        type:
          default: message
          description: |-
            Object type.

            For Messages, this is always `"message"`.
          title: Type
          type: string
          enum:
            - message
        role:
          default: assistant
          description: |-
            Conversational role of the generated message.

            This will always be `"assistant"`.
          title: Role
          type: string
          enum:
            - assistant
        content:
          description: |-
            Content generated by the model.

            This is an array of content blocks, each of which has a `type` that determines its shape.

            Example:

            ```json
            [{"type": "text", "text": "Hi, I'm Claude."}]
            ```

            If the request input `messages` ended with an `assistant` turn, then the response `content` will continue directly from that last turn. You can use this to constrain the model's output.

            For example, if the input `messages` were:
            ```json
            [
              {"role": "user", "content": "What's the Greek name for Sun? (A) Sol (B) Helios (C) Sun"},
              {"role": "assistant", "content": "The best answer is ("}
            ]
            ```

            Then the response `content` might be:

            ```json
            [{"type": "text", "text": "B)"}]
            ```
          examples:
            - - citations: null
                text: Hi! My name is Claude.
                type: text
          items:
            $ref: "#/components/schemas/ContentBlock"
          title: Content
          type: array
        model:
          $ref: "#/components/schemas/Model"
        stop_reason:
          description: |-
            The reason that we stopped.

            This may be one the following values:
            * `"end_turn"`: the model reached a natural stopping point
            * `"max_tokens"`: we exceeded the requested `max_tokens` or the model's maximum
            * `"stop_sequence"`: one of your provided custom `stop_sequences` was generated
            * `"tool_use"`: the model invoked one or more tools
            * `"pause_turn"`: we paused a long-running turn. You may provide the response back as-is in a subsequent request to let the model continue.
            * `"refusal"`: when streaming classifiers intervene to handle potential policy violations

            In non-streaming mode this value is always non-null. In streaming mode, it is null in the `message_start` event and non-null otherwise.
          title: Stop Reason
          nullable: true
          enum:
            - end_turn
            - max_tokens
            - stop_sequence
            - tool_use
            - pause_turn
            - refusal
          type: string
        stop_sequence:
          default: null
          description: |-
            Which custom stop sequence was generated, if any.

            This value will be a non-null string if one of your custom stop sequences was generated.
          title: Stop Sequence
          nullable: true
          type: string
        stop_details:
          default: null
          description: |-
            Structured information about why model output stopped.

            This is `null` when the `stop_reason` has no additional detail to report.
          nullable: true
          properties:
            category:
              default: null
              description: |-
                The policy category that triggered the refusal.

                `null` when the refusal doesn't map to a named category.
              nullable: true
              enum:
                - cyber
                - bio
                - frontier_llm
                - reasoning_extraction
              title: RefusalCategory
              type: string
            explanation:
              default: null
              description: |-
                Human-readable explanation of the refusal.

                This text is not guaranteed to be stable. `null` when no explanation is available for the category.
              title: Explanation
              nullable: true
              type: string
            type:
              default: refusal
              title: Type
              type: string
              enum:
                - refusal
          required:
            - category
            - explanation
            - type
          title: RefusalStopDetails
          type: object
        usage:
          $ref: "#/components/schemas/Usage"
          description: |-
            Billing and rate-limit usage.

            Anthropic's API bills and rate-limits by token counts, as tokens represent the underlying cost to our systems.

            Under the hood, the API transforms requests into a format suitable for the model. The model's output then goes through a parsing stage before becoming an API response. As a result, the token counts in `usage` will not match one-to-one with the exact visible content of an API request or response.

            For example, `output_tokens` will be non-zero, even for an empty string response from Claude.

            Total input tokens in a request is the summation of `input_tokens`, `cache_creation_input_tokens`, and `cache_read_input_tokens`.
          examples:
            - input_tokens: 2095
              output_tokens: 503
        container:
          default: null
          description: |-
            Information about the container used in this request.

            This will be non-null if a container tool (e.g. code execution) was used.
          nullable: true
          properties:
            expires_at:
              description: The time at which the container will expire.
              format: date-time
              title: Expires At
              type: string
            id:
              description: Identifier for the container used in this request
              title: Id
              type: string
          required:
            - expires_at
            - id
          title: Container
          type: object
      required:
        - id
        - type
        - role
        - content
        - model
        - stop_reason
        - stop_sequence
        - stop_details
        - usage
        - container
      title: Message
      type: object
      x-stainless-python-custom-imports:
        - from .content_block import ContentBlock as ContentBlock
    ErrorResponse:
      properties:
        error:
          discriminator:
            mapping:
              api_error: "#/components/schemas/APIError"
              authentication_error: "#/components/schemas/AuthenticationError"
              billing_error: "#/components/schemas/BillingError"
              invalid_request_error: "#/components/schemas/InvalidRequestError"
              not_found_error: "#/components/schemas/NotFoundError"
              overloaded_error: "#/components/schemas/OverloadedError"
              permission_error: "#/components/schemas/PermissionError"
              rate_limit_error: "#/components/schemas/RateLimitError"
              timeout_error: "#/components/schemas/GatewayTimeoutError"
            propertyName: type
          title: Error
          properties:
            message:
              default: Invalid request
              title: Message
              type: string
            type:
              default: invalid_request_error
              title: Type
              type: string
              enum:
                - invalid_request_error
          required:
            - message
            - type
          type: object
        request_id:
          default: null
          title: Request Id
          nullable: true
          type: string
        type:
          default: error
          title: Type
          type: string
          enum:
            - error
      required:
        - error
        - request_id
        - type
      title: ErrorResponse
      type: object
    CreateMessageParams:
      example:
        max_tokens: 1024
        messages:
          - content: Hello, world
            role: user
        model: claude-opus-4-6
      properties:
        model:
          $ref: "#/components/schemas/Model"
        messages:
          description: |-
            Input messages.

            Our models are trained to operate on alternating `user` and `assistant` conversational turns. When creating a new `Message`, you specify the prior conversational turns with the `messages` parameter, and the model then generates the next `Message` in the conversation. Consecutive `user` or `assistant` turns in your request will be combined into a single turn.

            Each input message must be an object with a `role` and `content`. You can specify a single `user`-role message, or you can include multiple `user` and `assistant` messages.

            If the final message uses the `assistant` role, the response content will continue immediately from the content in that message. This can be used to constrain part of the model's response.

            Example with a single `user` message:

            ```json
            [{"role": "user", "content": "Hello, Claude"}]
            ```

            Example with multiple conversational turns:

            ```json
            [
              {"role": "user", "content": "Hello there."},
              {"role": "assistant", "content": "Hi, I'm Claude. How can I help you?"},
              {"role": "user", "content": "Can you explain LLMs in plain English?"},
            ]
            ```

            Example with a partially-filled response from Claude:

            ```json
            [
              {"role": "user", "content": "What's the Greek name for Sun? (A) Sol (B) Helios (C) Sun"},
              {"role": "assistant", "content": "The best answer is ("},
            ]
            ```

            Each input message `content` may be either a single `string` or an array of content blocks, where each block has a specific `type`. Using a `string` for `content` is shorthand for an array of one content block of type `"text"`. The following input messages are equivalent:

            ```json
            {"role": "user", "content": "Hello, Claude"}
            ```

            ```json
            {"role": "user", "content": [{"type": "text", "text": "Hello, Claude"}]}
            ```

            See [input examples](https://platform.claude.com/docs/en/build-with-claude/working-with-messages).

            Note that if you want to include a [system prompt](https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices#give-claude-a-role), you can use the top-level `system` parameter — there is no `"system"` role for input messages in the Messages API.

            There is a limit of 100,000 messages in a single request.
          items:
            $ref: "#/components/schemas/InputMessage"
          title: Messages
          type: array
        cache_control:
          type: string
          description: Top-level cache control automatically applies a cache_control marker to the last cacheable block in the request.
          nullable: true
        container:
          description: Container identifier for reuse across requests.
          title: Container
          nullable: true
          type: string
        inference_geo:
          description: Specifies the geographic region for inference processing. If not specified, the workspace's `default_inference_geo` is used.
          title: Inference Geo
          nullable: true
          type: string
        max_tokens:
          description: |-
            The maximum number of tokens to generate before stopping.

            Note that our models may stop _before_ reaching this maximum. This parameter only specifies the absolute maximum number of tokens to generate.

            Set to `0` to populate the [prompt cache](https://platform.claude.com/docs/en/build-with-claude/prompt-caching#pre-warming-the-cache) without generating a response.

            Different models have different maximum values for this parameter.  See [models](https://platform.claude.com/docs/en/about-claude/models/overview) for details.
          examples:
            - 1024
          minimum: 0
          title: Max Tokens
          type: integer
        metadata:
          $ref: "#/components/schemas/Metadata"
          description: An object describing metadata about the request.
        output_config:
          $ref: "#/components/schemas/OutputConfig"
          description: Configuration options for the model's output, such as the output format.
        service_tier:
          description: |-
            Determines whether to use priority capacity (if available) or standard capacity for this request.

            Anthropic offers different levels of service for your API requests. See [service-tiers](https://platform.claude.com/docs/en/api/service-tiers) for details.
          enum:
            - auto
            - standard_only
          title: Service Tier
          type: string
        stop_sequences:
          description: |-
            Custom text sequences that will cause the model to stop generating.

            Our models will normally stop when they have naturally completed their turn, which will result in a response `stop_reason` of `"end_turn"`.

            If you want the model to stop generating when it encounters custom strings of text, you can use the `stop_sequences` parameter. If the model encounters one of the custom sequences, the response `stop_reason` value will be `"stop_sequence"` and the response `stop_sequence` value will contain the matched stop sequence.
          items:
            type: string
          title: Stop Sequences
          type: array
        stream:
          description: |-
            Whether to incrementally stream the response using server-sent events.

            See [streaming](https://platform.claude.com/docs/en/build-with-claude/streaming) for details.
          title: Stream
          type: boolean
          example: false
        system:
          description: |-
            System prompt.

            A system prompt is a way of providing context and instructions to Claude, such as specifying a particular goal or role. See our [guide to system prompts](https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices#give-claude-a-role).
          examples:
            - - text: Today's date is 2024-06-01.
                type: text
            - Today's date is 2023-01-01.
          title: System
          type: string
          x-stainless-skip:
            - go
          items:
            $ref: "#/components/schemas/RequestTextBlock"
        temperature:
          deprecated: true
          description: |-
            Amount of randomness injected into the response.

            Defaults to `1.0`. Ranges from `0.0` to `1.0`. Use `temperature` closer to `0.0` for analytical / multiple choice, and closer to `1.0` for creative and generative tasks.

            Note that even with `temperature` of `0.0`, the results will not be fully deterministic.
          examples:
            - 1
          maximum: 1
          minimum: 0
          title: Temperature
          type: number
          x-stainless-deprecation-message: Deprecated. Models released after Claude Opus 4.6 do not support setting temperature. A value of 1.0 of will be accepted for backwards compatibility, all other values will be rejected with a 400 error.
        thinking:
          $ref: "#/components/schemas/ThinkingConfigParam"
        tool_choice:
          $ref: "#/components/schemas/ToolChoice"
        tools:
          description: |-
            Definitions of tools that the model may use.

            If you include `tools` in your API request, the model may return `tool_use` content blocks that represent the model's use of those tools. You can then run those tools using the tool input generated by the model and then optionally return results back to the model using `tool_result` content blocks.

            There are two types of tools: **client tools** and **server tools**. The behavior described below applies to client tools. For [server tools](https://platform.claude.com/docs/en/agents-and-tools/tool-use/server-tools), see their individual documentation as each has its own behavior (e.g., the [web search tool](https://platform.claude.com/docs/en/agents-and-tools/tool-use/web-search-tool)).

            Each tool definition includes:

            * `name`: Name of the tool.
            * `description`: Optional, but strongly-recommended description of the tool.
            * `input_schema`: [JSON schema](https://json-schema.org/draft/2020-12) for the tool `input` shape that the model will produce in `tool_use` output content blocks.

            For example, if you defined `tools` as:

            ```json
            [
              {
                "name": "get_stock_price",
                "description": "Get the current stock price for a given ticker symbol.",
                "input_schema": {
                  "type": "object",
                  "properties": {
                    "ticker": {
                      "type": "string",
                      "description": "The stock ticker symbol, e.g. AAPL for Apple Inc."
                    }
                  },
                  "required": ["ticker"]
                }
              }
            ]
            ```

            And then asked the model "What's the S&P 500 at today?", the model might produce `tool_use` content blocks in the response like this:

            ```json
            [
              {
                "type": "tool_use",
                "id": "toolu_01D7FLrfh4GYq7yT1ULFeyMV",
                "name": "get_stock_price",
                "input": { "ticker": "^GSPC" }
              }
            ]
            ```

            You might then run your `get_stock_price` tool with `{"ticker": "^GSPC"}` as an input, and return the following back to the model in a subsequent `user` message:

            ```json
            [
              {
                "type": "tool_result",
                "tool_use_id": "toolu_01D7FLrfh4GYq7yT1ULFeyMV",
                "content": "259.75 USD"
              }
            ]
            ```

            Tools can be used for workflows that include running client-side tools and functions, or more generally whenever you want the model to produce a particular JSON structure of output.

            See our [guide](https://platform.claude.com/docs/en/agents-and-tools/tool-use/overview) for more details.
          examples:
            - description: Get the current weather in a given location
              input_schema:
                properties:
                  location:
                    description: The city and state, e.g. San Francisco, CA
                    type: string
                  unit:
                    description: Unit for the output - one of (celsius, fahrenheit)
                    type: string
                required:
                  - location
                type: object
              name: get_weather
          items:
            type: string
          title: Tools
          type: array
        top_k:
          deprecated: true
          description: |-
            Only sample from the top K options for each subsequent token.

            Used to remove "long tail" low probability responses. [Learn more technical details here](https://towardsdatascience.com/how-to-sample-from-language-models-682bceb97277).

            Recommended for advanced use cases only.
          examples:
            - 5
          minimum: 0
          title: Top K
          type: integer
          x-stainless-deprecation-message: Deprecated. Models released after Claude Opus 4.6 do not accept top_k; any value will be rejected with a 400 error.
        top_p:
          deprecated: true
          description: |-
            Use nucleus sampling.

            In nucleus sampling, we compute the cumulative distribution over all the options for each subsequent token in decreasing probability order and cut it off once it reaches a particular probability specified by `top_p`.

            Recommended for advanced use cases only.
          examples:
            - 0.7
          maximum: 1
          minimum: 0
          title: Top P
          type: number
          x-stainless-deprecation-message: Deprecated. Models released after Claude Opus 4.6 do not support setting top_p. A value >= 0.99 will be accepted for backwards compatibility, all other values will be rejected with a 400 error.
      required:
        - model
        - messages
        - max_tokens
      title: CreateMessageParams
      type: object
    MessageBatch:
      properties:
