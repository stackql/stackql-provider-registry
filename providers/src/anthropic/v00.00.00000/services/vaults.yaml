            refresh_token:
              description: OAuth refresh token.
              type: string
              minLength: 1
              maxLength: 4096
            token_endpoint:
              description: Token endpoint URL used to refresh the access token.
              type: string
              minLength: 1
              maxLength: 2047
            client_id:
              description: OAuth client ID.
              type: string
              minLength: 1
              maxLength: 1024
            scope:
              description: OAuth scope for the refresh request.
