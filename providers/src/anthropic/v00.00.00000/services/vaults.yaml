                  client_secret_basic: "#/components/schemas/BetaManagedAgentsTokenEndpointAuthBasicParam"
                  client_secret_post: "#/components/schemas/BetaManagedAgentsTokenEndpointAuthPostParam"
              description: Token endpoint requires no client authentication.
