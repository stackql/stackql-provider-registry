    BetaManagedAgentsCreateCredentialRequestBody:
      type: object
      required:
        - auth
      properties:
        auth:
          description: Authentication configuration for the credential.
          examples:
            - type: static_bearer
              token: bearer_exampletoken
              mcp_server_url: https://example-server.modelcontextprotocol.io/sse
          type: object
          discriminator:
            propertyName: type
            mapping:
              mcp_oauth: "#/components/schemas/BetaManagedAgentsMcpOauthCreateParams"
              static_bearer: "#/components/schemas/BetaManagedAgentsStaticBearerCreateParams"
              environment_variable: "#/components/schemas/BetaManagedAgentsEnvironmentVariableCreateParams"
          example:
            type: static_bearer
            token: bearer_exampletoken
            mcp_server_url: https://example-server.modelcontextprotocol.io/sse
          required:
            - type
            - mcp_server_url
            - access_token
            - token
            - secret_name
            - secret_value
            - networking
          properties:
            type:
              type: string
              enum:
                - mcp_oauth
            mcp_server_url:
              description: URL of the MCP server this credential authenticates against.
              type: string
              minLength: 1
              maxLength: 2047
            access_token:
              description: OAuth access token.
              type: string
              minLength: 1
              maxLength: 8192
            expires_at:
              $ref: "#/components/schemas/BetaTimestamp"
              nullable: true
            refresh:
              description: Refresh token configuration, if the credential supports token refresh.
              nullable: true
              type: object
              required:
                - refresh_token
                - token_endpoint
                - client_id
                - token_endpoint_auth
              properties:
                refresh_token:
                  description: OAuth refresh token.
                  type: string
                  minLength: 1
                  maxLength: 4096
                token_endpoint:
                  description: Token endpoint URL used to refresh the access token.
                  type: string
                  minLength: 1
                  maxLength: 2047
                client_id:
                  description: OAuth client ID.
                  type: string
                  minLength: 1
                  maxLength: 1024
                scope:
                  description: OAuth scope for the refresh request.
                  type: string
                  minLength: 1
                  maxLength: 8192
                  nullable: true
                resource:
                  description: OAuth resource indicator.
                  type: string
                  minLength: 1
                  maxLength: 2047
                  nullable: true
                token_endpoint_auth:
                  type: object
                  discriminator:
                    propertyName: type
                    mapping:
                      none: "#/components/schemas/BetaManagedAgentsTokenEndpointAuthNoneParam"
                      client_secret_basic: "#/components/schemas/BetaManagedAgentsTokenEndpointAuthBasicParam"
                      client_secret_post: "#/components/schemas/BetaManagedAgentsTokenEndpointAuthPostParam"
                  description: Token endpoint requires no client authentication.
                  required:
                    - type
                    - client_secret
                  properties:
                    type:
                      type: string
                      enum:
                        - none
                    client_secret:
                      description: OAuth client secret.
                      type: string
                      minLength: 1
                      maxLength: 512
            token:
              description: Static bearer token value.
              type: string
              minLength: 1
              maxLength: 8192
              examples:
                - bearer_exampletoken
            secret_name:
              description: Name of the environment variable. Immutable after create.
              type: string
              minLength: 1
              maxLength: 255
            secret_value:
              description: Secret value. Write-only; never returned in responses.
              type: string
              minLength: 1
              maxLength: 4096
            networking:
              description: Outbound hosts the secret value is substituted on.
              type: object
              discriminator:
                propertyName: type
                mapping:
                  unrestricted: "#/components/schemas/BetaManagedAgentsUnrestrictedCredentialNetworkingParams"
                  limited: "#/components/schemas/BetaManagedAgentsLimitedCredentialNetworkingParams"
              required:
                - type
                - allowed_hosts
              properties:
                type:
                  type: string
                  enum:
                    - unrestricted
                allowed_hosts:
                  description: Hostnames on which the secret will be substituted. Each entry is a bare hostname (`api.example.com`), an IPv4 address (`192.0.2.1`), or a `*.`-prefixed wildcard (`*.example.com`). URLs, ports, paths, and IPv6 addresses are not accepted. At most 16 entries.
                  type: array
                  items:
                    type: string
            injection_location:
              description: Where in the outbound request the secret value may be substituted.
              type: object
              properties:
                header:
                  description: Substitute when the placeholder appears in a request header value.
                  type: boolean
                body:
                  description: Substitute when the placeholder appears in the request body.
                  type: boolean
        display_name:
          description: Human-readable name for the credential. Up to 255 characters.
          type: string
          maxLength: 255
          nullable: true
          examples:
            - Example credential
        metadata:
          description: Arbitrary key-value metadata to attach to the credential. Maximum 16 pairs, keys up to 64 chars, values up to 512 chars.
          type: object
          examples:
            - environment: production
      example:
        auth:
          type: static_bearer
          token: bearer_exampletoken
          mcp_server_url: https://example-server.modelcontextprotocol.io/sse
        display_name: Example credential
        metadata:
          environment: production
