          enum:
            - github_repository
        url:
          description: Github URL of the repository
          type: string
        mount_path:
          description: Mount path in the container. Defaults to `/workspace/<repo-name>`.
          type: string
          nullable: true
        checkout:
          description: Branch or commit to check out. Defaults to the repository's default branch.
          nullable: true
          type: object
          discriminator:
            propertyName: type
            mapping:
              branch: "#/components/schemas/BetaManagedAgentsBranchCheckout"
              commit: "#/components/schemas/BetaManagedAgentsCommitCheckout"
          required:
