    BetaManagedAgentsUpdateDeploymentParams:
      description: Request parameters for updating a `deployment`. Omit a field to preserve its current value.
      type: object
      properties:
        name:
          description: Human-readable name. Must be non-empty. Omit to preserve. Cannot be cleared.
          type: string
          maxLength: 256
        description:
          description: Description. Omit to preserve; send empty string or null to clear.
          type: string
          maxLength: 2048
          nullable: true
        agent:
          type: string
          description: Agent to deploy. Accepts the `agent` ID string, which re-pins to the latest version, or an `agent` object with both id and version specified. Omit to preserve. Cannot be cleared.
        environment_id:
          description: ID of the `environment` where sessions run. Omit to preserve. Cannot be cleared.
          type: string
          maxLength: 128
        vault_ids:
          description: Vault IDs. Full replacement. Omit to preserve; send empty array or null to clear. Maximum 50.
          type: array
          items:
            type: string
          nullable: true
        initial_events:
          description: Initial events. Full replacement. Omit to preserve. Cannot be cleared. At least 1, maximum 50.
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsDeploymentInitialEventParams"
        resources:
          description: Session resources. Full replacement. Omit to preserve; send empty array or null to clear. Maximum 500.
          type: array
          items:
            $ref: "#/components/schemas/BetaManagedAgentsSessionResourceParams"
          nullable: true
        metadata:
          description: Metadata patch. Set a key to a string to upsert it, or to null to delete it. Omit the field to preserve. The stored bag is limited to 16 keys (up to 64 chars each) with values up to 512 chars.
          type: object
          nullable: true
        schedule:
          description: Cron schedule. Full replacement. Omit to preserve; send null to clear (revert to manual-only).
          nullable: true
          type: object
          discriminator:
            propertyName: type
            mapping:
              cron: "#/components/schemas/BetaManagedAgentsCronScheduleParams"
          required:
            - type
            - expression
            - timezone
          properties:
            type:
              type: string
              enum:
                - cron
              examples:
                - cron
            expression:
              description: '5-field POSIX cron expression: minute hour day-of-month month day-of-week (e.g., "0 9 * * 1-5" for weekdays at 9am). Day-of-week is 0-7 where 0 and 7 both mean Sunday. Extended cron syntax - seconds or year fields, and the special characters L, W, #, and ? - is not supported, nor are predefined shortcuts (@daily).'
              type: string
              minLength: 1
              maxLength: 256
              examples:
                - 0 9 * * 1-5
            timezone:
              description: Required. IANA timezone identifier (e.g., "America/Los_Angeles", "UTC"). Validated against the IANA timezone database.
              type: string
              minLength: 1
              examples:
                - America/Los_Angeles
          example:
            type: cron
            expression: 0 9 * * 1-5
            timezone: America/Los_Angeles
    BetaManagedAgentsDeploymentRun:
      description: A persistent, append-only record of a single deployment execution. Records session creation success or failure — no session lifecycle tracking.
      type: object
      required:
        - type
        - id
        - deployment_id
        - trigger_context
        - session_id
        - error
        - agent
        - created_at
      properties:
        type:
          type: string
          enum:
            - deployment_run
        id:
          description: Unique identifier for this run (`drun_...`).
          type: string
        deployment_id:
          description: ID of the deployment that produced this run.
          type: string
        trigger_context:
          description: What triggered this run and trigger-specific metadata.
          type: object
          discriminator:
            propertyName: type
            mapping:
              schedule: "#/components/schemas/BetaManagedAgentsScheduleTriggerContext"
              manual: "#/components/schemas/BetaManagedAgentsManualTriggerContext"
          required:
            - type
            - scheduled_at
          properties:
            type:
              type: string
              enum:
                - schedule
            scheduled_at:
              description: The UTC instant at which the cron expression matched in the configured timezone, before jitter is applied. At most one run is recorded per (deployment_id, scheduled_at) pair.
              type: string
              format: date-time
        session_id:
          description: Populated on success. Null on creation failure. Exactly one of session_id or error is non-null.
          type: string
          nullable: true
        error:
          description: Populated on creation failure. Null on success. Exactly one of session_id or error is non-null.
          nullable: true
          type: object
          discriminator:
            propertyName: type
            mapping:
              environment_archived_error: "#/components/schemas/BetaManagedAgentsEnvironmentArchivedRunError"
              agent_archived_error: "#/components/schemas/BetaManagedAgentsAgentArchivedRunError"
              environment_not_found_error: "#/components/schemas/BetaManagedAgentsEnvironmentNotFoundRunError"
