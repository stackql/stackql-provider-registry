openapi: 3.0.3
info:
  title: skills API
  description: anthropic skills API
  version: 1.0.0
paths:
  /v1/skills?beta=true:
    post:
      summary: Create Skill
      operationId: beta_create_skill_v1_skills_post
      parameters:
        - name: anthropic-beta
          in: header
          required: false
          schema:
            type: string
            description: |-
              Optional header to specify the beta version(s) you want to use.

              To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
            title: Anthropic-Beta
            x-stainless-override-schema:
              x-stainless-param: betas
              x-stainless-extend-default: true
              type: array
              description: Optional header to specify the beta version(s) you want to use.
              items:
                $ref: "#/components/schemas/AnthropicBeta"
            default: skills-2025-10-02
          description: |-
            Optional header to specify the beta version(s) you want to use.

            To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/BetaBody_create_skill_v1_skills_post"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetaCreateSkillResponse"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetaErrorResponse"
    get:
      summary: List Skills
      operationId: beta_list_skills_v1_skills_get
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: string
            description: |-
              Pagination token for fetching a specific page of results.

              Pass the value from a previous response's `next_page` field to get the next page of results.
            nullable: true
          description: |-
            Pagination token for fetching a specific page of results.

            Pass the value from a previous response's `next_page` field to get the next page of results.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            description: |-
              Number of results to return per page.

              Maximum value is 100. Defaults to 20.
            default: 20
            title: Limit
          description: |-
            Number of results to return per page.

            Maximum value is 100. Defaults to 20.
        - name: source
          in: query
          required: false
          schema:
            type: string
            description: |-
              Filter skills by source.

              If provided, only skills from the specified source will be returned:
              * `"custom"`: only return user-created skills
              * `"anthropic"`: only return Anthropic-created skills
            nullable: true
          description: |-
            Filter skills by source.

            If provided, only skills from the specified source will be returned:
            * `"custom"`: only return user-created skills
            * `"anthropic"`: only return Anthropic-created skills
        - name: anthropic-beta
          in: header
          required: false
          schema:
            type: string
            description: |-
              Optional header to specify the beta version(s) you want to use.

              To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
            title: Anthropic-Beta
            x-stainless-override-schema:
              x-stainless-param: betas
              x-stainless-extend-default: true
              type: array
              description: Optional header to specify the beta version(s) you want to use.
              items:
                $ref: "#/components/schemas/AnthropicBeta"
            default: skills-2025-10-02
          description: |-
            Optional header to specify the beta version(s) you want to use.

            To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: x-api-key
          in: header
          required: false
          schema:
            type: string
            description: |-
              Your unique API key for authentication.

              This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
            title: X-Api-Key
          description: |-
            Your unique API key for authentication.

            This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
      responses:
