openapi: 3.0.3
info:
  title: models API
  description: anthropic models API
  version: 1.0.0
paths:
  /v1/models:
    get:
      summary: List Models
      description: |-
        List available models.

        The Models API response can be used to determine which models are available for use in the API. More recently released models are listed first.
      operationId: models_list
      parameters:
        - name: before_id
          in: query
          required: false
          schema:
            type: string
            description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately before this object.
            title: Before Id
          description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately before this object.
        - name: after_id
          in: query
          required: false
          schema:
            type: string
            description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately after this object.
            title: After Id
          description: ID of the object to use as a cursor for pagination. When provided, returns the page of results immediately after this object.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 1000
            minimum: 1
            description: |-
              Number of items to return per page.

              Defaults to `20`. Ranges from `1` to `1000`.
            default: 20
            title: Limit
          description: |-
            Number of items to return per page.

            Defaults to `20`. Ranges from `1` to `1000`.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: anthropic-beta
          in: header
          required: false
          schema:
            type: string
            items:
              type: string
            description: |-
              Optional header to specify the beta version(s) you want to use.

              To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
            title: Anthropic-Beta
            x-stainless-override-schema:
              x-stainless-param: betas
              x-stainless-extend-default: true
              type: array
              description: Optional header to specify the beta version(s) you want to use.
              items:
                $ref: "#/components/schemas/AnthropicBeta"
          description: |-
            Optional header to specify the beta version(s) you want to use.

            To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
        - name: x-api-key
          in: header
          required: false
          schema:
            type: string
            description: |-
              Your unique API key for authentication.

              This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
            title: X-Api-Key
          description: |-
            Your unique API key for authentication.

            This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse_ModelInfo_"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/models/{model_id}:
    get:
      summary: Get a Model
      description: |-
        Get a specific model.

        The Models API response can be used to determine information about a specific model or resolve a model alias to a model ID.
      operationId: models_get
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
            description: Model identifier or alias.
            title: Model Id
          description: Model identifier or alias.
        - name: anthropic-version
          in: header
          required: false
          schema:
            type: string
            description: |-
              The version of the Claude API you want to use.

              Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
            title: Anthropic-Version
            default: "2023-06-01"
          description: |-
            The version of the Claude API you want to use.

            Read more about versioning and our version history [here](https://platform.claude.com/docs/en/api/versioning).
        - name: anthropic-beta
          in: header
          required: false
          schema:
            type: string
            items:
              type: string
            description: |-
              Optional header to specify the beta version(s) you want to use.

              To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
            title: Anthropic-Beta
            x-stainless-override-schema:
              x-stainless-param: betas
              x-stainless-extend-default: true
              type: array
              description: Optional header to specify the beta version(s) you want to use.
              items:
                $ref: "#/components/schemas/AnthropicBeta"
          description: |-
            Optional header to specify the beta version(s) you want to use.

            To use multiple betas, use a comma separated list like `beta1,beta2` or specify the header multiple times for each beta.
        - name: x-api-key
          in: header
          required: false
          schema:
            type: string
            description: |-
              Your unique API key for authentication.

              This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
            title: X-Api-Key
          description: |-
            Your unique API key for authentication.

            This key is required in the header of all API requests, to authenticate your account and access Anthropic's services. Get your API key through the [Console](https://console.anthropic.com/settings/keys). Each key is scoped to a Workspace.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelInfo"
        4XX:
          description: |-
            Error response.

            See our [errors documentation](https://platform.claude.com/docs/en/api/errors) for more details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    AnthropicBeta:
      type: string
      enum:
        - message-batches-2024-09-24
        - prompt-caching-2024-07-31
        - computer-use-2024-10-22
        - computer-use-2025-01-24
        - pdfs-2024-09-25
        - token-counting-2024-11-01
        - token-efficient-tools-2025-02-19
        - output-128k-2025-02-19
        - files-api-2025-04-14
        - mcp-client-2025-04-04
        - mcp-client-2025-11-20
        - dev-full-thinking-2025-05-14
        - interleaved-thinking-2025-05-14
        - code-execution-2025-05-22
        - extended-cache-ttl-2025-04-11
        - context-1m-2025-08-07
        - context-management-2025-06-27
        - model-context-window-exceeded-2025-08-26
        - skills-2025-10-02
        - fast-mode-2026-02-01
        - output-300k-2026-03-24
        - user-profiles-2026-03-24
        - advisor-tool-2026-03-01
        - managed-agents-2026-04-01
        - cache-diagnosis-2026-04-07
        - thinking-token-count-2026-05-13
        - server-side-fallback-2026-06-01
        - fallback-credit-2026-06-01
        - agent-memory-2026-07-22
      x-stainless-nominal: false
    ListResponse_ModelInfo_:
      properties:
        data:
          items:
            $ref: "#/components/schemas/ModelInfo"
          type: array
          title: Data
        first_id:
          title: First Id
          description: First ID in the `data` list. Can be used as the `before_id` for the previous page.
          nullable: true
          type: string
        has_more:
          type: boolean
          title: Has More
          description: Indicates if there are more results in the requested page direction.
        last_id:
          title: Last Id
          description: Last ID in the `data` list. Can be used as the `after_id` for the next page.
          nullable: true
          type: string
      type: object
      required:
        - data
        - first_id
        - has_more
        - last_id
      title: ListResponse[ModelInfo]
    ErrorResponse:
      properties:
        error:
          discriminator:
            mapping:
              api_error: "#/components/schemas/APIError"
              authentication_error: "#/components/schemas/AuthenticationError"
              billing_error: "#/components/schemas/BillingError"
              invalid_request_error: "#/components/schemas/InvalidRequestError"
              not_found_error: "#/components/schemas/NotFoundError"
              overloaded_error: "#/components/schemas/OverloadedError"
              permission_error: "#/components/schemas/PermissionError"
              rate_limit_error: "#/components/schemas/RateLimitError"
              timeout_error: "#/components/schemas/GatewayTimeoutError"
            propertyName: type
          title: Error
          properties:
            message:
              default: Invalid request
              title: Message
              type: string
            type:
              default: invalid_request_error
              title: Type
              type: string
              enum:
                - invalid_request_error
          required:
            - message
            - type
          type: object
        request_id:
          default: null
          title: Request Id
          nullable: true
          type: string
        type:
          default: error
          title: Type
          type: string
          enum:
            - error
      required:
        - error
        - request_id
        - type
      title: ErrorResponse
      type: object
    ModelInfo:
      properties:
        capabilities:
          description: Object mapping capability names to their support details. Keys are always present for all known capabilities.
          nullable: true
          properties:
            batch:
              $ref: "#/components/schemas/CapabilitySupport"
              description: Whether the model supports the Batch API.
            citations:
              $ref: "#/components/schemas/CapabilitySupport"
              description: Whether the model supports citation generation.
            code_execution:
              $ref: "#/components/schemas/CapabilitySupport"
              description: Whether the model supports code execution tools.
            context_management:
              $ref: "#/components/schemas/ContextManagementCapability"
              description: Context management support and available strategies.
            effort:
              $ref: "#/components/schemas/EffortCapability"
              description: Effort (reasoning_effort) support and available levels.
            image_input:
              $ref: "#/components/schemas/CapabilitySupport"
              description: Whether the model accepts image content blocks.
            pdf_input:
              $ref: "#/components/schemas/CapabilitySupport"
              description: Whether the model accepts PDF content blocks.
            structured_outputs:
              $ref: "#/components/schemas/CapabilitySupport"
              description: Whether the model supports structured output / JSON mode / strict tool schemas.
            thinking:
              $ref: "#/components/schemas/ThinkingCapability"
              description: Thinking capability and supported type configurations.
          type: object
          required:
            - batch
            - citations
            - code_execution
            - context_management
            - effort
            - image_input
            - pdf_input
            - structured_outputs
            - thinking
          title: ModelCapabilities
        created_at:
          type: string
          format: date-time
          title: Created At
          description: RFC 3339 datetime string representing the time at which the model was released. May be set to an epoch value if the release date is unknown.
          examples:
            - "2026-02-04T00:00:00Z"
        display_name:
          type: string
          title: Display Name
          description: A human-readable name for the model.
          examples:
            - Claude Opus 4.6
        id:
          type: string
          title: Id
          description: Unique model identifier.
          examples:
            - claude-opus-4-6
        max_input_tokens:
          title: Max Input Tokens
          description: Maximum input context window size in tokens for this model.
          nullable: true
          type: integer
        max_tokens:
          title: Max Tokens
          description: Maximum value for the `max_tokens` parameter when using this model.
          nullable: true
          type: integer
        type:
          type: string
          title: Type
          description: |-
            Object type.

            For Models, this is always `"model"`.
          default: model
          enum:
            - model
      type: object
      required:
        - capabilities
        - created_at
        - display_name
        - id
        - max_input_tokens
        - max_tokens
        - type
      title: ModelInfo
    InvalidRequestError:
      properties:
        message:
          default: Invalid request
          title: Message
          type: string
        type:
          default: invalid_request_error
          title: Type
          type: string
          enum:
            - invalid_request_error
      required:
        - message
        - type
      title: InvalidRequestError
      type: object
    AuthenticationError:
      properties:
        message:
          default: Authentication error
          title: Message
          type: string
        type:
          default: authentication_error
          title: Type
          type: string
          enum:
            - authentication_error
      required:
        - message
        - type
      title: AuthenticationError
      type: object
    BillingError:
      properties:
        message:
          default: Billing error
          title: Message
          type: string
        type:
          default: billing_error
          title: Type
          type: string
          enum:
            - billing_error
      required:
        - message
        - type
      title: BillingError
      type: object
    PermissionError:
      properties:
        message:
          default: Permission denied
          title: Message
          type: string
        type:
          default: permission_error
          title: Type
          type: string
          enum:
            - permission_error
      required:
        - message
        - type
      title: PermissionError
      type: object
    NotFoundError:
      properties:
        message:
          default: Not found
          title: Message
          type: string
        type:
          default: not_found_error
          title: Type
          type: string
          enum:
            - not_found_error
      required:
        - message
        - type
      title: NotFoundError
      type: object
    RateLimitError:
      properties:
        message:
          default: Rate limited
          title: Message
          type: string
        type:
          default: rate_limit_error
          title: Type
          type: string
          enum:
            - rate_limit_error
      required:
        - message
        - type
      title: RateLimitError
      type: object
    GatewayTimeoutError:
      properties:
        message:
          default: Request timeout
          title: Message
          type: string
        type:
          default: timeout_error
          title: Type
          type: string
          enum:
            - timeout_error
      required:
        - message
        - type
      title: GatewayTimeoutError
      type: object
    APIError:
      properties:
        message:
          default: Internal server error
          title: Message
          type: string
        type:
          default: api_error
          title: Type
          type: string
          enum:
            - api_error
      required:
        - message
        - type
      title: APIError
      type: object
    OverloadedError:
      properties:
        message:
          default: Overloaded
          title: Message
          type: string
        type:
          default: overloaded_error
          title: Type
          type: string
          enum:
            - overloaded_error
      required:
        - message
        - type
      title: OverloadedError
      type: object
    ModelCapabilities:
      properties:
        batch:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports the Batch API.
        citations:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports citation generation.
        code_execution:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports code execution tools.
        context_management:
          $ref: "#/components/schemas/ContextManagementCapability"
          description: Context management support and available strategies.
        effort:
          $ref: "#/components/schemas/EffortCapability"
          description: Effort (reasoning_effort) support and available levels.
        image_input:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model accepts image content blocks.
        pdf_input:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model accepts PDF content blocks.
        structured_outputs:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports structured output / JSON mode / strict tool schemas.
        thinking:
          $ref: "#/components/schemas/ThinkingCapability"
          description: Thinking capability and supported type configurations.
      type: object
      required:
        - batch
        - citations
        - code_execution
        - context_management
        - effort
        - image_input
        - pdf_input
        - structured_outputs
        - thinking
      title: ModelCapabilities
      description: Model capability information.
    CapabilitySupport:
      properties:
        supported:
          type: boolean
          title: Supported
          description: Whether this capability is supported by the model.
      type: object
      required:
        - supported
      title: CapabilitySupport
      description: Indicates whether a capability is supported.
    ContextManagementCapability:
      properties:
        clear_thinking_20251015:
          description: Whether the clear_thinking_20251015 strategy is supported.
          nullable: true
          properties:
            supported:
              type: boolean
              title: Supported
              description: Whether this capability is supported by the model.
          type: object
          required:
            - supported
          title: CapabilitySupport
        clear_tool_uses_20250919:
          description: Whether the clear_tool_uses_20250919 strategy is supported.
          nullable: true
          properties:
            supported:
              type: boolean
              title: Supported
              description: Whether this capability is supported by the model.
          type: object
          required:
            - supported
          title: CapabilitySupport
        compact_20260112:
          description: Whether the compact_20260112 strategy is supported.
          nullable: true
          properties:
            supported:
              type: boolean
              title: Supported
              description: Whether this capability is supported by the model.
          type: object
          required:
            - supported
          title: CapabilitySupport
        supported:
          type: boolean
          title: Supported
          description: Whether this capability is supported by the model.
      type: object
      required:
        - clear_thinking_20251015
        - clear_tool_uses_20250919
        - compact_20260112
        - supported
      title: ContextManagementCapability
      description: Context management capability details.
    EffortCapability:
      properties:
        high:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports high effort level.
        low:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports low effort level.
        max:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports max effort level.
        medium:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports medium effort level.
        supported:
          type: boolean
          title: Supported
          description: Whether this capability is supported by the model.
        xhigh:
          description: Whether the model supports xhigh effort level.
          nullable: true
          properties:
            supported:
              type: boolean
              title: Supported
              description: Whether this capability is supported by the model.
          type: object
          required:
            - supported
          title: CapabilitySupport
      type: object
      required:
        - high
        - low
        - max
        - medium
        - supported
        - xhigh
      title: EffortCapability
      description: Effort (reasoning_effort) capability details.
    ThinkingCapability:
      properties:
        supported:
          type: boolean
          title: Supported
          description: Whether this capability is supported by the model.
        types:
          $ref: "#/components/schemas/ThinkingTypes"
      type: object
      required:
        - supported
        - types
      title: ThinkingCapability
      description: Thinking capability details.
    ThinkingTypes:
      properties:
        adaptive:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports thinking with type 'adaptive' (auto).
        enabled:
          $ref: "#/components/schemas/CapabilitySupport"
          description: Whether the model supports thinking with type 'enabled'.
      type: object
      required:
        - adaptive
        - enabled
      title: ThinkingTypes
      description: Supported thinking type configurations.
  x-stackQL-resources:
    models:
      id: anthropic.models.models
      name: models
      title: Models
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1models/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            queryParamPushdown:
              top:
                paramName: limit
                maxValue: 1000
        get:
          operation:
            $ref: "#/paths/~1v1~1models~1{model_id}/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/models/methods/get"
          - $ref: "#/components/x-stackQL-resources/models/methods/list"
        insert: []
        update: []
        delete: []
        replace: []
    vw_model_capabilities:
      name: vw_model_capabilities
      id: anthropic.models.vw_model_capabilities
      config:
        docs:
          fields:
            - name: id
              type: string
              description: Unique model identifier, e.g. `claude-sonnet-5`.
            - name: display_name
              type: string
              description: Human-readable name of the model.
            - name: batch
              type: boolean
              description: Whether the model supports the Message Batches API.
            - name: citations
              type: boolean
              description: Whether the model supports citations.
            - name: code_execution
              type: boolean
              description: Whether the model supports the code execution tool.
            - name: context_management
              type: boolean
              description: Whether the model supports context management.
            - name: effort
              type: boolean
              description: Whether the model supports the effort parameter.
            - name: xhigh
              type: boolean
              description: Whether the `xhigh` effort tier is supported.
            - name: high
              type: boolean
              description: Whether the `high` effort tier is supported.
            - name: max
              type: boolean
              description: Whether the `max` effort tier is supported.
            - name: medium
              type: boolean
              description: Whether the `medium` effort tier is supported.
            - name: low
              type: boolean
              description: Whether the `low` effort tier is supported.
            - name: image_input
              type: boolean
              description: Whether the model accepts image input.
            - name: pdf_input
              type: boolean
              description: Whether the model accepts PDF input.
            - name: structured_outputs
              type: boolean
              description: Whether the model supports structured outputs.
            - name: thinking
              type: boolean
              description: Whether the model supports extended thinking.
            - name: adaptive
              type: boolean
              description: Whether adaptive thinking is supported.
            - name: enabled
              type: boolean
              description: Whether manually-enabled thinking is supported.
            - name: created_at
              type: string
              description: RFC 3339 timestamp when the model was released.
            - name: max_input_tokens
              type: integer
              description: Maximum number of input tokens accepted by the model.
            - name: max_tokens
              type: integer
              description: Maximum number of output tokens the model can generate.
            - name: type
              type: string
              description: Object type; always `model`.
        views:
          select:
            predicate: sqlDialect == "sqlite3"
            ddl: |-
              SELECT
                id,
                display_name,
                JSON_EXTRACT(capabilities, '$.batch.supported') AS batch,
                JSON_EXTRACT(capabilities, '$.citations.supported') AS citations,
                JSON_EXTRACT(capabilities, '$.code_execution.supported') AS code_execution,
                JSON_EXTRACT(capabilities, '$.context_management.supported') AS context_management,
                JSON_EXTRACT(capabilities, '$.effort.supported') AS effort,
                JSON_EXTRACT(capabilities, '$.effort.xhigh.supported') AS xhigh,
                JSON_EXTRACT(capabilities, '$.effort.high.supported') AS high,
                JSON_EXTRACT(capabilities, '$.effort.max.supported') AS max,
                JSON_EXTRACT(capabilities, '$.effort.medium.supported') AS medium,
                JSON_EXTRACT(capabilities, '$.effort.low.supported') AS low,
                JSON_EXTRACT(capabilities, '$.image_input.supported') AS image_input,
                JSON_EXTRACT(capabilities, '$.pdf_input.supported') AS pdf_input,
                JSON_EXTRACT(capabilities, '$.structured_outputs.supported') AS structured_outputs,
                JSON_EXTRACT(capabilities, '$.thinking.supported') AS thinking,
                JSON_EXTRACT(capabilities, '$.thinking.types.adaptive.supported') AS adaptive,
                JSON_EXTRACT(capabilities, '$.thinking.types.enabled.supported') AS enabled,
                created_at,
                max_input_tokens,
                max_tokens,
                type
              FROM anthropic.models.models
            fallback:
              predicate: sqlDialect == "postgres"
              ddl: |-
                SELECT
                  id,
                  display_name,
                  json_extract_path_text(capabilities::json, 'batch', 'supported') AS batch,
                  json_extract_path_text(capabilities::json, 'citations', 'supported') AS citations,
                  json_extract_path_text(capabilities::json, 'code_execution', 'supported') AS code_execution,
                  json_extract_path_text(capabilities::json, 'context_management', 'supported') AS context_management,
                  json_extract_path_text(capabilities::json, 'effort', 'supported') AS effort,
                  json_extract_path_text(capabilities::json, 'effort', 'xhigh', 'supported') AS xhigh,
                  json_extract_path_text(capabilities::json, 'effort', 'high', 'supported') AS high,
                  json_extract_path_text(capabilities::json, 'effort', 'max', 'supported') AS max,
