components:
  schemas:
    magicVisibilityMnmMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    magicVisibilityMnmMnmConfig:
      properties:
        default_sampling:
          $ref: '#/components/schemas/magicVisibilityMnmMnmConfigDefaultSampling'
        name:
          $ref: '#/components/schemas/magicVisibilityMnmMnmConfigName'
        router_ips:
          $ref: '#/components/schemas/magicVisibilityMnmMnmConfigRouterIps'
        warp_devices:
          $ref: '#/components/schemas/magicVisibilityMnmMnmConfigWarpDevices'
      required:
        - name
        - default_sampling
        - router_ips
        - warp_devices
      type: object
    magicVisibilityMnmMnmConfigDefaultSampling:
      default: 1
      description: >-
        Fallback sampling rate of flow messages being sent in packets per
        second. This should match the packet sampling rate configured on the
        router.
      minimum: 1
      type: number
      x-auditable: true
    magicVisibilityMnmMnmConfigName:
      description: The account name.
      example: cloudflare user's account
      type: string
      x-auditable: true
    magicVisibilityMnmMnmConfigRouterIp:
      description: >-
        IPv4 CIDR of the router sourcing flow data. Only /32 addresses are
        currently supported.
      example: 203.0.113.1
      type: string
      x-auditable: true
    magicVisibilityMnmMnmConfigRouterIps:
      items:
        $ref: '#/components/schemas/magicVisibilityMnmMnmConfigRouterIp'
      type: array
    magicVisibilityMnmMnmConfigSingleResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/magicVisibilityMnmMessages'
        messages:
          $ref: '#/components/schemas/magicVisibilityMnmMessages'
        result:
          $ref: '#/components/schemas/magicVisibilityMnmMnmConfig'
        success:
          description: Whether the API call was successful
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
    magicVisibilityMnmMnmConfigWarpDevice:
      description: Object representing a warp device with an ID and name.
      properties:
        id:
          description: Unique identifier for the warp device.
          example: 5360368d-b351-4791-abe1-93550dabd351
          type: string
          x-auditable: true
        name:
          description: Name of the warp device.
          example: My warp device
          type: string
          x-auditable: true
        router_ip:
          description: >-
            IPv4 CIDR of the router sourcing flow data associated with this warp
            device. Only /32 addresses are currently supported.
          example: 203.0.113.1
          type: string
          x-auditable: true
      required:
        - id
        - name
        - router_ip
      type: object
    magicVisibilityMnmMnmConfigWarpDevices:
      items:
        $ref: '#/components/schemas/magicVisibilityMnmMnmConfigWarpDevice'
      type: array
    magicVisibilityMnmMnmRule:
      nullable: true
      properties:
        automatic_advertisement:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleAutomaticAdvertisement'
        bandwidth_threshold:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleBandwidthThreshold'
        duration:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleDuration'
        id:
          $ref: '#/components/schemas/magicVisibilityMnmRuleIdentifier'
        name:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleName'
        packet_threshold:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRulePacketThreshold'
        prefix_match:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRulePrefixMatch'
        prefixes:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleIpPrefixes'
        type:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleType'
        zscore_sensitivity:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleZscoreSensitivity'
        zscore_target:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleZscoreTarget'
      required:
        - id
        - name
        - prefixes
        - automatic_advertisement
        - type
      type: object
    magicVisibilityMnmMnmRuleAdvertisableResponse:
      nullable: true
      properties:
        automatic_advertisement:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleAutomaticAdvertisement'
      required:
        - automatic_advertisement
      type: object
    magicVisibilityMnmMnmRuleAdvertisementSingleResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/magicVisibilityMnmMessages'
        messages:
          $ref: '#/components/schemas/magicVisibilityMnmMessages'
        result:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleAdvertisableResponse'
        success:
          description: Whether the API call was successful
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
    magicVisibilityMnmMnmRuleAutomaticAdvertisement:
      description: >-
        Toggle on if you would like Cloudflare to automatically advertise the IP
        Prefixes within the rule via Magic Transit when the rule is triggered.
        Only available for users of Magic Transit.
      nullable: true
      type: boolean
      x-auditable: true
    magicVisibilityMnmMnmRuleBandwidthThreshold:
      description: >-
        The number of bits per second for the rule. When this value is exceeded
        for the set duration, an alert notification is sent. Minimum of 1 and no
        maximum.
      example: 1000
      minimum: 1
      type: number
      x-auditable: true
    magicVisibilityMnmMnmRuleCreate:
      nullable: true
      properties:
        automatic_advertisement:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleAutomaticAdvertisement'
        bandwidth_threshold:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleBandwidthThreshold'
        duration:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleDuration'
        name:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleName'
        packet_threshold:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRulePacketThreshold'
        prefix_match:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRulePrefixMatch'
        prefixes:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleIpPrefixes'
        type:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleType'
        zscore_sensitivity:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleZscoreSensitivity'
        zscore_target:
          $ref: '#/components/schemas/magicVisibilityMnmMnmRuleZscoreTarget'
      required:
        - name
        - prefixes
        - automatic_advertisement
        - type
      type: object
    magicVisibilityMnmMnmRuleDuration:
      default: 1m
      description: >-
        The amount of time that the rule threshold must be exceeded to send an
        alert notification. The final value must be equivalent to one of the
        following 8 values ["1m","5m","10m","15m","20m","30m","45m","60m"].
      enum:
        - 1m
        - 5m
        - 10m
        - 15m
        - 20m
        - 30m
        - 45m
        - 60m
      type: string
      x-auditable: true
    magicVisibilityMnmMnmRuleIpPrefix:
      description: >-
        The IP prefixes that are monitored for this rule. Must be a CIDR range
        like 203.0.113.0/24. Max 5000 different CIDR ranges.
      example: 203.0.113.1/32
      type: string
      x-auditable: true
    magicVisibilityMnmMnmRuleIpPrefixes:
      items:
        $ref: '#/components/schemas/magicVisibilityMnmMnmRuleIpPrefix'
      type: array
    magicVisibilityMnmMnmRuleName:
      description: >-
        The name of the rule. Must be unique. Supports characters A-Z, a-z, 0-9,
        underscore (_), dash (-), period (.), and tilde (~). You can’t have a
        space in the rule name. Max 256 characters.
      example: my_rule_1
      type: string
      x-auditable: true
    magicVisibilityMnmMnmRulePacketThreshold:
      description: >-
        The number of packets per second for the rule. When this value is
        exceeded for the set duration, an alert notification is sent. Minimum of
        1 and no maximum.
      example: 10000
      minimum: 1
      type: number
      x-auditable: true
    magicVisibilityMnmMnmRulePrefixMatch:
      description: >-
        Prefix match type to be applied for a prefix auto advertisement when
        using an advanced_ddos rule.
      enum:
        - exact
        - subnet
        - supernet
      example: exact
      nullable: true
      type: string
      x-auditable: true
    magicVisibilityMnmMnmRuleType:
      description: MNM rule type.
      enum:
        - threshold
        - zscore
        - advanced_ddos
      example: zscore
      type: string
      x-auditable: true
    magicVisibilityMnmMnmRuleZscoreSensitivity:
      description: Level of sensitivity set for zscore rules.
      enum:
        - low
        - medium
        - high
      example: high
      nullable: true
      type: string
      x-auditable: true
    magicVisibilityMnmMnmRuleZscoreTarget:
      description: Target of the zscore rule analysis.
      enum:
        - bits
        - packets
      example: bits
      nullable: true
      type: string
      x-auditable: true
