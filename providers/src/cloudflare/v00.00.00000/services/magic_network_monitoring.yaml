                    $ref: '#/components/schemas/magicVisibilityMnmMessages'
                  messages:
                    $ref: '#/components/schemas/magicVisibilityMnmMessages'
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRef621ca3f6ea9a96427c902b0d14279ff8
                  success:
                    description: Whether the API call was successful
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Delete account configuration response failure
