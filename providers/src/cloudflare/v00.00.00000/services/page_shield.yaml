  /zones/{zone_id}/page_shield/scripts:
    get:
      description: Lists all scripts detected by Page Shield.
      operationId: page-shield-list-scripts
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: exclude_urls
          schema:
            description: >-
              Excludes scripts whose URL contains one of the URL-encoded URLs
              separated by commas.
            type: string
        - in: query
          name: urls
          schema:
            description: >-
              Includes scripts whose URL contain one or more URL-encoded URLs
              separated by commas.
            type: string
        - in: query
          name: hosts
          schema:
            description: >-
              Includes scripts that match one or more URL-encoded hostnames
              separated by commas. Wildcards are supported at the start and end
              of each hostname to support starts with, ends with and contains.
              If no wildcards are used, results will be filtered by exact match
            type: string
        - in: query
          name: page
          schema:
            description: >-
              The current page number of the paginated results. We additionally
              support a special value "all". When "all" is used, the API will
              return all the scripts with the applied filters in a single page.
              This feature is best-effort and it may only work for zones with a
              low number of scripts
            type: string
        - in: query
          name: per_page
          schema:
            description: The number of results per page.
            maximum: 100
            minimum: 1
            type: number
        - in: query
          name: order_by
          schema:
            description: The field used to sort returned scripts.
            enum:
              - first_seen_at
              - last_seen_at
            type: string
        - in: query
          name: direction
          schema:
            description: The direction used to sort returned scripts.
            enum:
              - asc
              - desc
            type: string
        - in: query
          name: prioritize_malicious
          schema:
            description: When true, malicious scripts appear first in the returned scripts.
            type: boolean
        - in: query
          name: exclude_cdn_cgi
          schema:
            default: true
            description: >-
              When true, excludes scripts seen in a `/cdn-cgi` path from the
              returned scripts. The default value is true.
            type: boolean
        - in: query
          name: exclude_duplicates
          schema:
            default: true
            description: >-
              When true, excludes duplicate scripts. We consider a script
              duplicate of another if their javascript content matches and they
              share the same url host and zone hostname. In such case, we return
              the most recent script for the URL host and zone hostname
              combination.
            type: boolean
        - in: query
          name: status
          schema:
            description: >-
              Filters the returned scripts using a comma-separated list of
              scripts statuses. Accepted values: `active`, `infrequent`, and
              `inactive`. The default value is `active`.
            type: string
        - in: query
          name: page_url
          schema:
            description: >-
              Includes scripts that match one or more page URLs (separated by
              commas) where they were last seen Wildcards are supported at the
              start and end of each page URL to support starts with, ends with
              and contains. If no wildcards are used, results will be filtered
              by exact match
            type: string
        - in: query
          name: export
          schema:
            description: Export the list of scripts as a file, limited to 50000 entries.
            enum:
              - csv
            type: string
