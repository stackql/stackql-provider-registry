openapi: 3.0.3
info:
  title: page_shield API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/page_shield:
    get:
      description: Fetches the Page Shield settings.
      operationId: page-shield-get-settings
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/pageShieldMessages'
                  messages:
                    $ref: '#/components/schemas/pageShieldMessages'
                  success:
                    description: Whether the API call was successful
                    enum:
                      - true
                    type: boolean
                  result:
                    nullable: true
                    type: object
                    $ref: '#/components/schemas/pageShieldGetZoneSettingsResponse'
                required:
                  - success
          description: Get Page Shield settings response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pageShieldApiResponseCommonFailure'
          description: Get Page Shield settings response failure
      security:
        - api_email: []
          api_key: []
      summary: Get Page Shield settings
      tags:
        - Page Shield
      x-api-token-group:
        - Page Shield
        - Domain Page Shield Read
        - Domain Page Shield
        - Page Shield Read
        - Zone Settings Write
        - Zone Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: page_shield
        resource_chain: []
        method: get
    put:
      description: Updates Page Shield settings.
      operationId: page-shield-update-settings
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                enabled:
                  $ref: '#/components/schemas/pageShieldEnabled'
                use_cloudflare_reporting_endpoint:
                  $ref: >-
                    #/components/schemas/pageShieldUseCloudflareReportingEndpoint
                use_connection_url_path:
                  $ref: '#/components/schemas/pageShieldUseConnectionUrlPath'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/pageShieldMessages'
                  messages:
                    $ref: '#/components/schemas/pageShieldMessages'
                  success:
                    description: Whether the API call was successful
                    enum:
                      - true
                    type: boolean
                  result:
                    type: object
                    $ref: '#/components/schemas/pageShieldUpdateZoneSettingsResponse'
                required:
                  - success
          description: Update Page Shield settings response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pageShieldApiResponseCommonFailure'
          description: Update Page Shield settings response failure
      security:
        - api_email: []
          api_key: []
      summary: Update Page Shield settings
      tags:
        - Page Shield
      x-api-token-group:
        - Page Shield
        - Domain Page Shield
        - Zone Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: page_shield
        resource_chain: []
        method: update
  /zones/{zone_id}/page_shield/connections:
    get:
      description: Lists all connections detected by Page Shield.
      operationId: page-shield-list-connections
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: exclude_urls
          schema:
            description: >-
              Excludes connections whose URL contains one of the URL-encoded
              URLs separated by commas.
            type: string
        - in: query
          name: urls
          schema:
            description: >-
              Includes connections whose URL contain one or more URL-encoded
              URLs separated by commas.
            type: string
        - in: query
          name: hosts
          schema:
            description: >-
              Includes connections that match one or more URL-encoded hostnames
              separated by commas. Wildcards are supported at the start and end
              of each hostname to support starts with, ends with and contains.
              If no wildcards are used, results will be filtered by exact match
            type: string
        - in: query
          name: page
          schema:
            description: >-
              The current page number of the paginated results. We additionally
              support a special value "all". When "all" is used, the API will
              return all the connections with the applied filters in a single
              page. This feature is best-effort and it may only work for zones
              with a low number of connections
            type: string
        - in: query
          name: per_page
          schema:
            description: The number of results per page.
            maximum: 100
            minimum: 1
            type: number
        - in: query
          name: order_by
          schema:
            description: The field used to sort returned connections.
            enum:
              - first_seen_at
              - last_seen_at
            type: string
        - in: query
          name: direction
          schema:
            description: The direction used to sort returned connections.
            enum:
              - asc
              - desc
            type: string
        - in: query
          name: prioritize_malicious
          schema:
            description: >-
              When true, malicious connections appear first in the returned
              connections.
            type: boolean
        - in: query
          name: exclude_cdn_cgi
          schema:
            description: >-
              When true, excludes connections seen in a `/cdn-cgi` path from the
              returned connections. The default value is true.
            type: boolean
        - in: query
          name: status
          schema:
            description: >-
              Filters the returned connections using a comma-separated list of
              connection statuses. Accepted values: `active`, `infrequent`, and
              `inactive`. The default value is `active`.
            type: string
        - in: query
          name: page_url
          schema:
            description: >-
              Includes connections that match one or more page URLs (separated
              by commas) where they were last seen Wildcards are supported at
              the start and end of each page URL to support starts with, ends
              with and contains. If no wildcards are used, results will be
              filtered by exact match
            type: string
        - in: query
          name: export
          schema:
            description: >-
              Export the list of connections as a file, limited to 50000
              entries.
            enum:
              - csv
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pageShieldListZoneConnectionsResponse'
          description: List Page Shield connections response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pageShieldApiResponseCommonFailure'
          description: List Page Shield connections response failure
      security:
        - api_email: []
          api_key: []
      summary: List Page Shield connections
      tags:
        - Page Shield
      x-api-token-group:
        - Page Shield
        - Domain Page Shield Read
        - Domain Page Shield
        - Page Shield Read
        - Zone Settings Write
        - Zone Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: page_shield
        resource_chain:
          - connections
        method: list
  /zones/{zone_id}/page_shield/connections/{connection_id}:
    get:
      description: Fetches a connection detected by Page Shield by connection ID.
