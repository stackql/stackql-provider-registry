openapi: 3.0.3
info:
  title: accounts API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts:
    get:
      description: List all accounts you have ownership or verified access to.
      operationId: accounts-list-accounts
      parameters:
      - in: query
        name: name
        schema:
          description: Name of the account.
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Maximum number of results per page.
          maximum: 50
          minimum: 5
          type: number
      - in: query
        name: direction
        schema:
          description: Direction to order results.
          enum:
          - asc
          - desc
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamResponseCollectionAccounts'
          description: List Accounts response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: List Accounts response failure
      security:
      - api_email: []
        api_key: []
      summary: List Accounts
      tags:
      - Accounts
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: accounts
        resource_chain: []
        method: list
    post:
      description: Create an account (only available for tenant admins at this time)
      operationId: account-creation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/iamCreateAccount'
        description: Parameters for account creation
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamResponseSingleAccount'
          description: Account Creation Success Response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: Account Creation Failure Response
      security:
      - api_email: []
        api_key: []
      summary: Create an account
      tags:
      - Accounts
      x-cfPlanAvailability:
        business: false
        enterprise: false
        free: false
        pro: false
      x-stackql-sdk:
        service: accounts
        resource_chain: []
        method: create
  /accounts/move:
    post:
      description: "Batch move a collection of accounts to a specific organization. \u26A0\uFE0F Not implemented."
      operationId: Accounts_batchMoveAccounts
      requestBody:
        content:
          application/json:
            schema:
              properties:
                account_ids:
                  description: Move these accounts to the destination organization.
                  items:
                    type: string
                  type: array
                destination_organization_id:
                  description: Move accounts to this organization ID.
                  type: string
              required:
              - account_ids
              - destination_organization_id
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    $ref: '#/components/schemas/organizationsApiBatchAccountMoveResponse'
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
      - api_email: []
        api_key: []
      summary: Batch move accounts
      tags:
      - Accounts
  /accounts/{account_id}:
    delete:
      description: Delete a specific account (only available for tenant admins at this time). This is a permanent operation that will delete any zones or other resources under the account
      operationId: account-deletion
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseSingleId'
          description: Account Deletion Success Response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: Account Deletion Failure Response
      security:
      - api_email: []
        api_key: []
      summary: Delete a specific account
      tags:
      - Accounts
      x-api-token-group:
      - Account Settings Write
      x-cfPermissionsRequired:
        enum:
        - '#organization:edit'
      x-cfPlanAvailability:
        business: false
        enterprise: false
        free: false
        pro: false
      x-stackql-sdk:
        service: accounts
        resource_chain: []
        method: delete
    get:
      description: Get information about a specific account that you are a member of.
      operationId: accounts-account-details
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamResponseSingleAccount'
          description: Account Details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: Account Details response failure
      security:
      - api_email: []
        api_key: []
      summary: Account Details
      tags:
      - Accounts
      x-api-token-group:
      - Trust and Safety Write
      - Trust and Safety Read
      - DNS View Write
      - DNS View Read
      - SCIM Provisioning
      - Load Balancers Account Write
      - Load Balancers Account Read
      - 'Zero Trust: PII Read'
      - DDoS Botnet Feed Write
      - DDoS Botnet Feed Read
      - Workers R2 Storage Write
      - Workers R2 Storage Read
      - DDoS Protection Write
      - DDoS Protection Read
      - Workers Tail Read
      - Workers KV Storage Write
      - Workers KV Storage Read
      - Workers Scripts Write
      - Workers Scripts Read
      - 'Load Balancing: Monitors and Pools Write'
      - 'Load Balancing: Monitors and Pools Read'
      - Account Firewall Access Rules Write
      - Account Firewall Access Rules Read
      - DNS Firewall Write
      - DNS Firewall Read
      - Billing Write
      - Billing Read
      - Account Settings Write
      - Account Settings Read
      x-cfPermissionsRequired:
        enum:
        - '#organization:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: accounts
        resource_chain: []
        method: get
    put:
      description: Update an existing account.
      operationId: accounts-update-account
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/iamComponentsSchemasAccount'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamResponseSingleAccount'
          description: Update Account response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: Update Account response failure
      security:
      - api_email: []
        api_key: []
      summary: Update Account
      tags:
      - Accounts
      x-api-token-group:
      - Account Settings Write
      x-cfPermissionsRequired:
        enum:
        - '#organization:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: accounts
        resource_chain: []
        method: update
  /accounts/{account_id}/email/sending/feedback:
    get:
      operationId: get_publicFeedbackStatus
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: start_at
        schema:
          format: date-time
          type: string
      - in: query
        name: end_at
        schema:
          format: date-time
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      count:
                        type: number
                      end_at:
                        format: date-time
                        type: string
                      start_at:
                        format: date-time
                        type: string
                    required:
                    - count
                    - start_at
                    - end_at
                    type: object
                required:
                - result
                type: object
          description: Returns feedback statistics.
      security:
      - bearerAuth: []
      summary: Get feedback emails statistics
      tags:
      - Public
  /accounts/{account_id}/email/sending/limits:
    get:
      description: Returns the current daily sending quota for the account. Null when the quota is not yet available.
      operationId: email-sending-get-sending-limits
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSendingLimitsResponseSingle'
          description: Get sending limits response
      security:
      - api_email: []
        api_key: []
      summary: Get sending limits
      tags:
      - Email Sending
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /accounts/{account_id}/logs/audit:
    get:
      description: Gets a list of audit logs for an account.
      operationId: audit-logs-v2-get-account-audit-logs
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: account_name
        schema:
          description: Filters by the account name.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: action_result
        schema:
          description: Filters by whether the action was successful or not.
          items:
            enum:
            - success
            - failure
            type: string
          type: array
        explode: true
      - in: query
        name: action_type
        schema:
          description: Filters by the action type.
          items:
            enum:
            - create
            - delete
            - view
            - update
            type: string
          type: array
        explode: true
      - in: query
        name: actor_context
        schema:
          description: Filters by the actor context.
          items:
            enum:
            - api_key
            - api_token
            - dash
            - oauth
            - origin_ca_key
            type: string
          type: array
        explode: true
      - in: query
        name: actor_email
        schema:
          description: Filters by the actor's email address.
          items:
            format: email
            type: string
          type: array
        explode: true
      - in: query
        name: actor_id
        schema:
          description: Filters by the actor ID. This can be either the Account ID or User ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: actor_ip_address
        schema:
          description: The IP address where the action was initiated.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: actor_token_id
        schema:
          description: Filters by the API token ID when the actor context is an api_token or oauth.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: actor_token_name
        schema:
          description: Filters by the API token name when the actor context is an api_token or oauth.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: actor_type
        schema:
          description: Filters by the actor type.
          items:
            enum:
            - account
            - cloudflare_admin
            - system
            - user
            type: string
          type: array
        explode: true
      - in: query
        name: audit_log_id
        schema:
          deprecated: true
          description: Finds a specific log by its ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: id
        schema:
          description: Finds a specific log by its ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: raw_cf_ray_id
        schema:
          description: Filters by the response CF Ray ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: raw_method
        schema:
          description: The HTTP method for the API call.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: raw_status_code
        schema:
          description: The response status code that was returned.
          items:
            type: integer
          type: array
        explode: true
      - in: query
        name: raw_uri
        schema:
          description: Filters by the request URI.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: resource_id
        schema:
          description: Filters by the resource ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: resource_product
        schema:
          description: Filters audit logs by the Cloudflare product associated with the changed resource.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: resource_type
        schema:
          description: Filters audit logs based on the unique type of resource changed by the action.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: resource_scope
        schema:
          description: Filters by the resource scope, specifying whether the resource is associated with an user, an account, a zone, or a membership.
          items:
            enum:
            - accounts
            - user
            - zones
            - memberships
            type: string
          type: array
        explode: true
      - in: query
        name: zone_id
        schema:
          description: Filters by the zone ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: zone_name
        schema:
          description: Filters by the zone name associated with the change.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: account_name.not
        schema:
          description: Filters out audit logs by the account name.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: action_result.not
        schema:
          description: Filters out audit logs by whether the action was successful or not.
          items:
            enum:
            - success
            - failure
            type: string
          type: array
        explode: true
      - in: query
        name: action_type.not
        schema:
          description: Filters out audit logs by the action type.
          items:
            enum:
            - create
            - delete
            - view
            - update
            type: string
          type: array
        explode: true
      - in: query
        name: actor_context.not
        schema:
          description: Filters out audit logs by the actor context.
          items:
            enum:
            - api_key
            - api_token
            - dash
            - oauth
            - origin_ca_key
            type: string
          type: array
        explode: true
      - in: query
        name: actor_email.not
        schema:
          description: Filters out audit logs by the actor's email address.
          items:
            format: email
            type: string
          type: array
        explode: true
      - in: query
        name: actor_id.not
        schema:
          description: Filters out audit logs by the actor ID. This can be either the Account ID or User ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: actor_ip_address.not
        schema:
          description: Filters out audit logs IP address where the action was initiated.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: actor_token_id.not
        schema:
          description: Filters out audit logs by the API token ID when the actor context is an api_token or oauth.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: actor_token_name.not
        schema:
          description: Filters out audit logs by the API token name when the actor context is an api_token or oauth.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: actor_type.not
        schema:
          description: Filters out audit logs by the actor type.
          items:
            enum:
            - account
            - cloudflare_admin
            - system
            - user
            type: string
          type: array
        explode: true
      - in: query
        name: audit_log_id.not
        schema:
          deprecated: true
          description: Filters out audit logs by their IDs.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: id.not
        schema:
          description: Filters out audit logs by their IDs.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: raw_cf_ray_id.not
        schema:
          description: Filters out audit logs by the response CF Ray ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: raw_method.not
        schema:
          description: Filters out audit logs by the HTTP method for the API call.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: raw_status_code.not
        schema:
          description: Filters out audit logs by the response status code that was returned.
          items:
            type: integer
          type: array
        explode: true
      - in: query
        name: raw_uri.not
        schema:
          description: Filters out audit logs by the request URI.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: resource_id.not
        schema:
          description: Filters out audit logs by the resource ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: resource_product.not
        schema:
          description: Filters out audit logs by the Cloudflare product associated with the changed resource.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: resource_type.not
        schema:
          description: Filters out audit logs based on the unique type of resource changed by the action.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: resource_scope.not
        schema:
          description: Filters out audit logs by the resource scope, specifying whether the resource is associated with an user, an account, a zone, or a membership.
          items:
            enum:
            - accounts
            - user
            - zones
            - memberships
            type: string
          type: array
        explode: true
      - in: query
        name: zone_id.not
        schema:
          description: Filters out audit logs by the zone ID.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: zone_name.not
        schema:
          description: Filters out audit logs by the zone name associated with the change.
          items:
            type: string
          type: array
        explode: true
      - description: Limits the returned results to logs newer than the specified date. This can be a date string 2019-04-30 (interpreted in UTC) or an absolute timestamp that conforms to RFC3339.
        in: query
        name: since
        schema:
          format: date
          type: string
      - description: Limits the returned results to logs older than the specified date. This can be a date string 2019-04-30 (interpreted in UTC) or an absolute timestamp that conforms to RFC3339.
        in: query
        name: before
        schema:
          format: date
          type: string
      - in: query
        name: direction
        schema:
          default: desc
          description: Sets sorting order.
          enum:
          - desc
          - asc
          type: string
      - in: query
        name: limit
        schema:
          default: 100
          description: The number limits the objects to return. The cursor attribute may be used to iterate over the next batch of objects if there are more than the limit.
          maximum: 1000
          minimum: 1
          type: number
      - in: query
        name: cursor
        schema:
          description: The cursor is an opaque token used to paginate through large sets of records. It indicates the position from which to continue when requesting the next set of records. A valid cursor value can be obtained from the cursor object in the result_info structure of a previous response.
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aaaAuditLogsV2ResponseCollection'
          description: Get account audit logs successful response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aaaSchemasApiResponseCommonFailure'
          description: Get account audit logs failed response
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get account audit logs (Version 2)
      tags:
      - Audit Logs
      x-api-token-group:
      - Account Settings Write
      - Account Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: accounts
        resource_chain:
        - logs
        - audit
        method: list
  /accounts/{account_id}/members:
    get:
      description: List all members of an account.
      operationId: account-members-list-members
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: order
        schema:
          description: Field to order results by.
          enum:
          - user.first_name
          - user.last_name
          - user.email
          - status
          type: string
      - in: query
        name: status
        schema:
          description: A member's status in the account.
          enum:
          - accepted
          - pending
          - rejected
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Maximum number of results per page.
          maximum: 50
          minimum: 5
          type: number
      - in: query
        name: direction
        schema:
          description: Direction to order results.
          enum:
          - asc
          - desc
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamCollectionMemberResponseWithPolicies'
          description: List Members response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: List Members response failure
      security:
      - api_email: []
        api_key: []
      summary: List Members
      tags:
      - Account Members
      x-api-token-group:
      - SCIM Provisioning
      - Account Settings Write
      - Account Settings Read
      x-cfPermissionsRequired:
        enum:
        - '#organization:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: accounts
        resource_chain:
        - members
        method: list
    post:
      description: Add a user to the list of members for this account.
      operationId: account-members-add-member
      parameters:
      - name: account_id
