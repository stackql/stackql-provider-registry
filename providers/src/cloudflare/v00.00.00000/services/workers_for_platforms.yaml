openapi: 3.0.3
info:
  title: workers_for_platforms API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/workers/dispatch/namespaces:
    get:
      description: Fetch a list of Workers for Platforms namespaces.
      operationId: namespace-worker-list
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersNamespaceListResponse'
          description: Fetch a list of Workers for Platforms namespaces.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Failure to get list of Workers for Platforms namespaces.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List dispatch namespaces
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Tail Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        method: list
    post:
      description: Create a new Workers for Platforms namespace.
      operationId: namespace-worker-create
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: The name of the dispatch namespace.
                  type: string
                  x-auditable: true
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersNamespaceSingleResponse'
          description: Fetch a list of Workers for Platforms namespaces.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Failure to get list of Workers for Platforms namespaces.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create dispatch namespace
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Scripts Write
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        method: create
  /accounts/{account_id}/workers/dispatch/namespaces/{dispatch_namespace}:
    delete:
      description: Delete a Workers for Platforms namespace.
      operationId: namespace-worker-delete-namespace
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseNullResult'
          description: Delete a Workers for Platforms namespace.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Failure to delete Workers for Platforms namespace.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete dispatch namespace
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Scripts Write
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        method: delete
    get:
      description: Get a Workers for Platforms namespace.
      operationId: namespace-worker-get-namespace
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersNamespaceSingleResponse'
          description: Get a Workers for Platforms namespace.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Failure to get Workers for Platforms namespace.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get dispatch namespace
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Tail Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        method: get
    patch:
      description: Patch a Workers for Platforms namespace. Omitted fields are left unchanged.
      operationId: namespace-worker-patch-namespace
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: The name of the dispatch namespace.
                  type: string
                  x-auditable: true
                trusted_workers:
                  $ref: '#/components/schemas/workersTrustedWorkers'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersNamespaceSingleResponse'
          description: Patch a Workers for Platforms namespace.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Failure to patch Workers for Platforms namespace.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Patch dispatch namespace
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Scripts Write
    put:
      description: Update a Workers for Platforms namespace.
      operationId: namespace-worker-put-namespace
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: The name of the dispatch namespace.
                  type: string
                  x-auditable: true
                trusted_workers:
                  $ref: '#/components/schemas/workersTrustedWorkers'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersNamespaceSingleResponse'
          description: Update a Workers for Platforms namespace.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Failure to update Workers for Platforms namespace.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update dispatch namespace
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Scripts Write
  /accounts/{account_id}/workers/dispatch/namespaces/{dispatch_namespace}/scripts/{script_name}:
    delete:
      description: Delete a worker from a Workers for Platforms namespace. This call has no response body on a successful delete.
      operationId: namespace-worker-script-delete-worker
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      - name: script_name
        in: path
        required: true
        description: The Worker script name.
        schema:
          type: string
      - description: If set to true, delete will not be stopped by associated service binding, durable object, or other binding. Any of these associated bindings/durable objects will be deleted along with the script.
        in: query
        name: force
        schema:
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseNullResult'
          description: Delete Worker response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Delete Worker response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete Worker
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Scripts Write
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        - scripts
        method: delete
    get:
      description: Fetch information about a script uploaded to a Workers for Platforms namespace.
      operationId: namespace-worker-script-worker-details
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      - name: script_name
        in: path
        required: true
        description: The Worker script name.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersNamespaceScriptResponseSingle'
          description: Worker Details Response (Workers for Platforms).
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Worker Details Failure (Workers for Platforms).
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Worker Details
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Tail Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        - scripts
        method: get
    put:
      description: 'Upload a worker module to a Workers for Platforms namespace. You can find more about the multipart metadata on our docs: https://developers.cloudflare.com/workers/configuration/multipart-upload-metadata/.'
      operationId: namespace-worker-script-upload-worker-module
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      - name: script_name
        in: path
        required: true
        description: The Worker script name.
        schema:
          type: string
      - description: When set to "strict", the upload will fail if any `inherit` type bindings cannot be resolved against the previous version of the script. Without this, unresolvable inherit bindings are silently dropped.
        in: query
        name: bindings_inherit
        schema:
          enum:
          - strict
          type: string
      requestBody:
        content:
          application/javascript:
            schema:
              description: Raw javascript content comprising a Worker. Must be in service worker syntax.
              type: string
          multipart/form-data:
            encoding:
              files:
                contentType: application/javascript+module, text/javascript+module, application/javascript, text/javascript, text/x-python, text/x-python-requirement, application/wasm, text/plain, application/octet-stream, application/source-map
              metadata:
                contentType: application/json
            schema:
              $ref: '#/components/schemas/workersMultipartScript'
          text/javascript:
            schema:
              description: Raw javascript content comprising a Worker. Must be in service worker syntax.
              type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersScriptResponseUploadSingle'
                type: object
          description: Upload Worker Module response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Upload Worker Module response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Upload Worker Module
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Scripts Write
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        - scripts
        method: update
  /accounts/{account_id}/workers/dispatch/namespaces/{dispatch_namespace}/scripts/{script_name}/assets-upload-session:
    post:
      description: Start uploading a collection of assets for use in a Worker version. To learn more about the direct uploads of assets, see https://developers.cloudflare.com/workers/static-assets/direct-upload/.
      operationId: namespace-worker-script-update-create-assets-upload-session
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      - name: script_name
        in: path
        required: true
        description: The Worker script name.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workersCreateAssetsUploadSessionObject'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersCreateAssetsUploadSessionResponse'
          description: Create Assets Upload Session response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Create Assets Upload Session response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create Assets Upload Session
      tags:
      - Workers for Platforms
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        - scripts
        - asset_upload
        method: create
  /accounts/{account_id}/workers/dispatch/namespaces/{dispatch_namespace}/scripts/{script_name}/bindings:
    get:
      description: Fetch script bindings from a script uploaded to a Workers for Platforms namespace.
      operationId: namespace-worker-get-script-bindings
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      - name: script_name
        in: path
        required: true
        description: The Worker script name.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersMessages'
                  messages:
                    $ref: '#/components/schemas/workersMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/workersBindings'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Fetch script bindings (Workers for Platforms).
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Fetch script bindings failure (Workers for Platforms).
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get Script Bindings
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Tail Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        - scripts
        - bindings
        method: get
  /accounts/{account_id}/workers/dispatch/namespaces/{dispatch_namespace}/scripts/{script_name}/content:
    get:
      description: Fetch script content from a script uploaded to a Workers for Platforms namespace.
      operationId: namespace-worker-get-script-content
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      - name: script_name
        in: path
        required: true
        description: The Worker script name.
        schema:
          type: string
      responses:
        '200':
          content:
            string:
              schema:
                type: object
                properties:
                  contents:
                    type: string
          description: Get script content.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Get script content failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get Script Content
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Tail Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        - scripts
        - content
        method: get
    put:
      description: Put script content for a script uploaded to a Workers for Platforms namespace.
      operationId: namespace-worker-put-script-content
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      - name: script_name
        in: path
        required: true
        description: The Worker script name.
        schema:
          type: string
      - description: The multipart name of a script upload part containing script content in service worker format. Alternative to including in a metadata part.
        in: header
        name: CF-WORKER-BODY-PART
        schema:
          type: string
      - description: The multipart name of a script upload part containing script content in es module format. Alternative to including in a metadata part.
        in: header
        name: CF-WORKER-MAIN-MODULE-PART
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              files:
                contentType: application/javascript+module, text/javascript+module, application/javascript, text/javascript, text/x-python, text/x-python-requirement, application/wasm, text/plain, application/octet-stream, application/source-map
              metadata:
                contentType: application/json
            schema:
              properties:
                files:
                  description: 'An array of modules (often JavaScript files) comprising a Worker script. At least one module must be present and referenced in the metadata as `main_module` or `body_part` by filename.<br/>Possible Content-Type(s) are: `application/javascript+module`, `text/javascript+module`, `application/javascript`, `text/javascript`, `text/x-python`, `text/x-python-requirement`, `application/wasm`, `text/plain`, `application/octet-stream`, `application/source-map`.'
                  items:
                    format: binary
                    type: string
                  type: array
                  x-stainless-collection-type: set
                metadata:
                  $ref: '#/components/schemas/unnamedSchemaRefEe1e79edcb234d14c4dd266880f2fd24'
              required:
              - metadata
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersScriptResponseSingle'
          description: Put script content (Workers for Platforms).
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Put script content failure (Workers for Platforms).
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Put Script Content
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Scripts Write
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        - scripts
        - content
        method: update
  /accounts/{account_id}/workers/dispatch/namespaces/{dispatch_namespace}/scripts/{script_name}/secrets:
    get:
      description: List secrets bound to a script uploaded to a Workers for Platforms namespace.
      operationId: namespace-worker-list-script-secrets
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      - name: script_name
        in: path
        required: true
        description: The Worker script name.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersMessages'
                  messages:
                    $ref: '#/components/schemas/workersMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/workersSecret'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: List script secrets.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: List script secrets failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Script Secrets
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Tail Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-stackql-sdk:
        service: workers_for_platforms
        resource_chain:
        - dispatch
        - namespaces
        - scripts
        - secrets
        method: list
    put:
      description: Add a secret to a script uploaded to a Workers for Platforms namespace.
      operationId: namespace-worker-put-script-secrets
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: dispatch_namespace
        in: path
        required: true
        description: The Workers-for-Platforms dispatch namespace.
        schema:
          type: string
      - name: script_name
        in: path
        required: true
        description: The Worker script name.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workersSecret'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersMessages'
                  messages:
                    $ref: '#/components/schemas/workersMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/workersSecret'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Fetch script bindings (Workers for Platforms).
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Too many requests are currently modifying the script.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersApiResponseCommonFailure'
          description: Fetch script bindings failure (Workers for Platforms).
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Add script secret
      tags:
      - Workers for Platforms
      x-api-token-group:
      - Workers Scripts Write
      x-stackql-sdk:
        service: workers_for_platforms
