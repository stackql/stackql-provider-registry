        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: filters
        resource_chain: []
        method: get
    put:
      deprecated: true
      description: Updates an existing filter.
      operationId: filters-update-a-filter
      parameters:
        - in: path
          name: filter_id
          schema:
            $ref: '#/components/schemas/firewallFiltersComponentsSchemasId'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
