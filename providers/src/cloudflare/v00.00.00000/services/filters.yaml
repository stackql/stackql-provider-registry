components:
  schemas:
    firewallExpression:
      description: >-
        The filter expression. For more information, refer to
        [Expressions](https://developers.cloudflare.com/ruleset-engine/rules-language/expressions/).
      example: >-
        (http.request.uri.path ~ ".*wp-login.php" or http.request.uri.path ~
        ".*xmlrpc.php") and ip.addr ne 172.16.22.155
      type: string
    firewallFilter:
      properties:
        description:
          $ref: '#/components/schemas/firewallFiltersComponentsSchemasDescription'
        expression:
          $ref: '#/components/schemas/firewallExpression'
        id:
          $ref: '#/components/schemas/firewallFiltersComponentsSchemasId'
        paused:
          $ref: '#/components/schemas/firewallFiltersComponentsSchemasPaused'
        ref:
          $ref: '#/components/schemas/firewallSchemasRef'
      type: object
    firewallFilterDeleteResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/firewallMessages'
        messages:
          $ref: '#/components/schemas/firewallMessages'
        result:
          items:
            $ref: >-
              #/components/schemas/firewallFilterDeleteResponseCollection_result_item
          nullable: true
          type: array
        success:
          description: Defines whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          $ref: '#/components/schemas/firewallResultInfo'
      required:
        - success
        - errors
        - messages
        - result
    firewallFilterDeleteResponseCollection_result_item:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/firewallFiltersComponentsSchemasId'
    firewallFilterDeleteResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/firewallMessages'
        messages:
          $ref: '#/components/schemas/firewallMessages'
        result:
          properties:
            id:
              $ref: '#/components/schemas/firewallFiltersComponentsSchemasId'
          required:
            - id
          type: object
        success:
          description: Defines whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
        - result
    firewallFilterResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/firewallMessages'
        messages:
          $ref: '#/components/schemas/firewallMessages'
        result:
          items:
            type: object
            $ref: '#/components/schemas/firewallFilter'
          nullable: true
          type: array
        success:
          description: Defines whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          $ref: '#/components/schemas/firewallResultInfo'
      required:
        - success
        - errors
        - messages
        - result
    firewallFilterResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/firewallMessages'
        messages:
          $ref: '#/components/schemas/firewallMessages'
        result:
          $ref: '#/components/schemas/firewallFilter'
        success:
          description: Defines whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
        - result
    firewallFilterRuleUpdateRequest:
      properties:
        description:
          $ref: '#/components/schemas/firewallFiltersComponentsSchemasDescription'
        expression:
          $ref: '#/components/schemas/firewallExpression'
        id:
          $ref: '#/components/schemas/firewallFiltersComponentsSchemasId'
        paused:
          $ref: '#/components/schemas/firewallFiltersComponentsSchemasPaused'
        ref:
          $ref: '#/components/schemas/firewallSchemasRef'
      type: object
    firewallFiltersComponentsSchemasDescription:
      description: An informative summary of the filter.
      example: Restrict access from these browsers on this address range.
      maxLength: 500
      type: string
    firewallFiltersComponentsSchemasId:
      description: The unique identifier of the filter.
      example: 372e67954025e0ba6aaa6d586b9e0b61
      maxLength: 32
      minLength: 32
      readOnly: true
      type: string
    firewallFiltersComponentsSchemasPaused:
      description: When true, indicates that the filter is currently paused.
      example: false
      type: boolean
    firewallMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    firewallResultInfo:
      properties:
        count:
          description: Defines the total number of results for the requested service.
          example: 1
          type: number
        page:
          description: Defines the current page within paginated list of results.
          example: 1
          type: number
        per_page:
          description: Defines the number of results per page of results.
          example: 20
          type: number
        total_count:
          description: Defines the total results available without any search parameters.
          example: 2000
          type: number
      type: object
    firewallSchemasRef:
      description: A short reference tag. Allows you to select related filters.
      example: FIL-100
      maxLength: 50
      type: string
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
        - code
        - message
      type: object
      uniqueItems: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    filters:
      id: cloudflare.filters.filters
      name: filters
      title: Filters
      methods:
        bulk_delete:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1filters/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1filters/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        filters_create_filters:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1filters/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        filters_update_filters:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1filters/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        delete:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1filters~1{filter_id}/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1filters~1{filter_id}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1filters~1{filter_id}/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/filters/methods/get'
          - $ref: '#/components/x-stackQL-resources/filters/methods/list'
        insert:
          - $ref: >-
              #/components/x-stackQL-resources/filters/methods/filters_create_filters
        update: []
        delete:
          - $ref: '#/components/x-stackQL-resources/filters/methods/delete'
          - $ref: '#/components/x-stackQL-resources/filters/methods/bulk_delete'
        replace:
          - $ref: '#/components/x-stackQL-resources/filters/methods/update'
          - $ref: >-
              #/components/x-stackQL-resources/filters/methods/filters_update_filters
