      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/firewallFilter'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallFilterResponseSingle'
          description: Update a filter response
        4XX:
          content:
            application/json:
              schema:
