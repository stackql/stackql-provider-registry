openapi: 3.0.3
info:
  title: filters API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/filters:
    delete:
      deprecated: true
      description: Deletes one or more existing filters.
      operationId: filters-delete-filters
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: id
          schema:
            items:
              $ref: '#/components/schemas/firewallFiltersComponentsSchemasId'
            type: array
          explode: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallFilterDeleteResponseCollection'
          description: Delete filters response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    items:
                      type: object
                      properties:
                        id:
                          $ref: >-
                            #/components/schemas/firewallFiltersComponentsSchemasId
                    nullable: true
                    type: array
                    enum:
                      - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/firewallResultInfo'
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Delete filters response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete filters
      tags:
        - Filters
      x-api-token-group:
        - Firewall Services Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: filters
        resource_chain: []
        method: bulk_delete
    get:
      deprecated: true
      description: >-
        Fetches filters in a zone. You can filter the results using several
        optional parameters.
      operationId: filters-list-filters
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: paused
          schema:
            $ref: '#/components/schemas/firewallFiltersComponentsSchemasPaused'
        - in: query
          name: expression
          schema:
            description: A case-insensitive string to find in the expression.
            type: string
        - in: query
          name: description
          schema:
            description: A case-insensitive string to find in the description.
            type: string
        - in: query
          name: ref
          schema:
            description: >-
              The filter ref (a short reference tag) to search for. Must be an
              exact match.
            type: string
        - in: query
          name: page
          schema:
            default: 1
            description: Page number of paginated results.
            minimum: 1
            type: number
        - in: query
          name: per_page
          schema:
            default: 25
            description: Number of filters per page.
            maximum: 100
            minimum: 5
            type: number
        - in: query
          name: id
          schema:
            description: The unique identifier of the filter.
            maxLength: 32
            minLength: 32
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallFilterResponseCollection'
          description: List filters response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    items:
                      type: object
                      $ref: '#/components/schemas/firewallFilter'
                    nullable: true
                    type: array
                    enum:
                      - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/firewallResultInfo'
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: List filters response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List filters
      tags:
        - Filters
      x-api-token-group:
        - Firewall Services Write
        - Firewall Services Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: filters
        resource_chain: []
        method: create
    post:
      deprecated: true
      description: Creates one or more filters.
      operationId: filters-create-filters
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/firewallFilter'
              type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallFilterResponseCollection'
          description: Create filters response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    items:
                      type: object
                      $ref: '#/components/schemas/firewallFilter'
                    nullable: true
                    type: array
                    enum:
                      - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/firewallResultInfo'
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Create filters response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create filters
      tags:
        - Filters
      x-api-token-group:
        - Firewall Services Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
    put:
      deprecated: true
      description: Updates one or more existing filters.
      operationId: filters-update-filters
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/firewallFilterRuleUpdateRequest'
              type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallFilterResponseCollection'
          description: Update filters response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    items:
                      type: object
                      $ref: '#/components/schemas/firewallFilter'
                    nullable: true
                    type: array
                    enum:
                      - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/firewallResultInfo'
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Update filters response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update filters
      tags:
        - Filters
      x-api-token-group:
        - Firewall Services Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/filters/{filter_id}:
    delete:
      deprecated: true
      description: Deletes an existing filter.
      operationId: filters-delete-a-filter
      parameters:
        - in: path
          name: filter_id
          schema:
            $ref: '#/components/schemas/firewallFiltersComponentsSchemasId'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallFilterDeleteResponseSingle'
          description: Delete a filter response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    properties:
                      id:
                        $ref: >-
                          #/components/schemas/firewallFiltersComponentsSchemasId
                    required:
                      - id
                    type: object
                    enum:
                      - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Delete a filter response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete a filter
      tags:
        - Filters
      x-api-token-group:
        - Firewall Services Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: filters
        resource_chain: []
        method: delete
    get:
      deprecated: true
      description: Fetches the details of a filter.
      operationId: filters-get-a-filter
      parameters:
        - in: path
          name: filter_id
          schema:
            $ref: '#/components/schemas/firewallFiltersComponentsSchemasId'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallFilterResponseSingle'
          description: Get a filter response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    properties:
                      description:
                        $ref: >-
                          #/components/schemas/firewallFiltersComponentsSchemasDescription
                      expression:
                        $ref: '#/components/schemas/firewallExpression'
                      id:
                        $ref: >-
                          #/components/schemas/firewallFiltersComponentsSchemasId
                      paused:
                        $ref: >-
                          #/components/schemas/firewallFiltersComponentsSchemasPaused
                      ref:
                        $ref: '#/components/schemas/firewallSchemasRef'
                    type: object
                    enum:
                      - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Get a filter response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get a filter
      tags:
        - Filters
      x-api-token-group:
