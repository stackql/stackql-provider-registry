    put:
      description: Updates the URL Normalization settings.
      operationId: updateUrlNormalization
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rulesetsUrlNormalization'
