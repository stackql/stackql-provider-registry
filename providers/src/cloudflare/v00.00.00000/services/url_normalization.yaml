openapi: 3.0.3
info:
  title: url_normalization API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/url_normalization:
    delete:
      description: Deletes the URL Normalization settings.
      operationId: deleteUrlNormalization
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '204':
          description: An empty response.
        4XX:
          content:
            application/json:
              schema:
                description: A response object.
                properties:
                  errors:
                    $ref: '#/components/schemas/rulesetsErrors'
                  messages:
                    $ref: '#/components/schemas/rulesetsMessages'
                  result:
                    description: A result.
                    title: Result
                    enum:
                      - null
                    type: string
                  success:
                    description: Whether the API call was successful.
                    title: Success
                    type: boolean
                    enum:
                      - false
                required:
                  - result
                  - success
                  - errors
                  - messages
                title: Response
                type: object
          description: A failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete URL Normalization settings
      tags:
        - URL Normalization
      x-api-token-group:
        - Response Compression Write
        - Config Settings Write
        - Dynamic URL Redirects Write
        - Cache Settings Write
        - Custom Errors Write
        - Origin Write
        - Managed headers Write
        - Zone Transform Rules Write
        - Mass URL Redirects Write
        - Magic Firewall Write
        - L4 DDoS Managed Ruleset Write
        - HTTP DDoS Managed Ruleset Write
        - Sanitize Write
        - Transform Rules Write
        - Select Configuration Write
        - Bot Management Write
        - Zone WAF Write
        - Account WAF Write
        - Account Rulesets Write
        - Logs Write
        - Logs Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: url_normalization
        resource_chain: []
        method: delete
    get:
      description: Fetches the current URL Normalization settings.
      operationId: getUrlNormalization
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                description: A response object.
                properties:
                  errors:
                    description: A list of error messages.
                    items:
                      $ref: '#/components/schemas/rulesetsMessage'
                    title: Errors
                    type: array
                    uniqueItems: true
                    enum:
                      - []
                  messages:
                    $ref: '#/components/schemas/rulesetsMessages'
                  result:
                    description: A result.
                    title: Result
                    $ref: '#/components/schemas/rulesetsUrlNormalization'
                  success:
                    description: Whether the API call was successful.
                    title: Success
                    type: boolean
                    enum:
                      - true
                required:
                  - result
                  - success
                  - errors
                  - messages
                title: Response
                type: object
          description: A URL Normalization response.
        4XX:
          content:
            application/json:
              schema:
                description: A response object.
                properties:
                  errors:
                    $ref: '#/components/schemas/rulesetsErrors'
                  messages:
                    $ref: '#/components/schemas/rulesetsMessages'
                  result:
                    description: A result.
                    title: Result
                    enum:
                      - null
                    type: string
                  success:
                    description: Whether the API call was successful.
                    title: Success
                    type: boolean
                    enum:
                      - false
                required:
                  - result
                  - success
                  - errors
                  - messages
                title: Response
                type: object
