components:
  schemas:
    rulesetsErrors:
      description: A list of error messages.
      items:
        $ref: '#/components/schemas/rulesetsMessage'
      title: Errors
      type: array
      uniqueItems: true
    rulesetsMessage:
      description: A message.
      properties:
        code:
          description: A unique code for this message.
          example: 10000
          title: Code
          type: integer
        message:
          description: A text description of this message.
          example: something bad happened
          minLength: 1
          title: Description
          type: string
        source:
          description: The source of this message.
          properties:
            pointer:
              description: A JSON pointer to the field that is the source of the message.
              example: /rules/0/action
              minLength: 1
              title: Pointer
              type: string
          required:
            - pointer
          title: Source
          type: object
      required:
        - message
      title: Message
      type: object
    rulesetsMessages:
      description: A list of warning messages.
      items:
        $ref: '#/components/schemas/rulesetsMessage'
      title: Messages
      type: array
      uniqueItems: true
    rulesetsUrlNormalization:
      description: A URL Normalization object.
      properties:
        scope:
          description: The scope of the URL normalization.
          enum:
            - incoming
            - both
            - none
          example: incoming
          title: Scope
          type: string
        type:
          description: The type of URL normalization performed by Cloudflare.
          enum:
            - cloudflare
            - rfc3986
          example: cloudflare
          title: Type
          type: string
      required:
        - type
        - scope
      title: URL Normalization
      type: object
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    url_normalization:
      id: cloudflare.url_normalization.url_normalization
      name: url_normalization
      title: Url Normalization
      methods:
        delete:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1url_normalization/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '204'
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1url_normalization/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1url_normalization/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/url_normalization/methods/list'
        insert: []
        update: []
        delete:
          - $ref: '#/components/x-stackQL-resources/url_normalization/methods/delete'
        replace:
          - $ref: '#/components/x-stackQL-resources/url_normalization/methods/update'
