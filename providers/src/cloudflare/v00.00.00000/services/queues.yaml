openapi: 3.0.3
info:
  title: queues API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/event_subscriptions/subscriptions:
    get:
      description: Get a paginated list of event subscriptions with optional sorting and filtering
      operationId: subscriptions-list
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Page number for pagination
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: Number of items per page
        in: query
        name: per_page
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
      - description: Field to sort by
        in: query
        name: order
        schema:
          default: name
          enum:
          - created_at
          - name
          - enabled
          - source
          type: string
      - description: Sort direction
        in: query
        name: direction
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/mqApiV4Error'
                  messages:
                    $ref: '#/components/schemas/mqApiV4Message'
                  success:
                    description: Indicates if the API call was successful or not.
                    enum:
                    - true
                    type: boolean
                    x-auditable: true
                  result:
                    items:
                      $ref: '#/components/schemas/mqEventSubscription'
                    type: array
                  result_info:
                    properties:
                      count:
                        description: Number of items in current page
                        type: integer
                      page:
                        description: Current page number
                        type: integer
                      per_page:
                        description: Items per page
                        type: integer
                      total_count:
                        description: Total number of items
                        type: integer
                      total_pages:
                        description: Total number of pages
                        type: integer
                    required:
                    - count
                    - total_count
                    - page
                    - per_page
                    - total_pages
                    type: object
          description: List of event subscriptions
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mqApiV4Failure'
          description: Failure response
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Event Subscriptions
      tags:
      - Queue
      x-api-token-group:
      - Queues Write
      - Queues Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-stackql-sdk:
        service: queues
        resource_chain:
        - subscriptions
        method: list
    post:
      description: Create a new event subscription for a queue
      operationId: subscriptions-create
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                destination:
                  $ref: '#/components/schemas/mqEventDestination'
                enabled:
                  description: Whether the subscription is active
                  type: boolean
                  x-auditable: true
                events:
                  description: List of event types this subscription handles
                  items:
                    type: string
                  minItems: 1
                  type: array
                  x-auditable: true
                name:
                  description: Name of the subscription
                  type: string
                  x-auditable: true
                source:
                  $ref: '#/components/schemas/mqEventSource'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/mqApiV4Error'
                  messages:
                    $ref: '#/components/schemas/mqApiV4Message'
                  success:
                    description: Indicates if the API call was successful or not.
                    enum:
                    - true
                    type: boolean
                    x-auditable: true
                  result:
                    $ref: '#/components/schemas/mqEventSubscription'
          description: Successfully created event subscription
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mqApiV4Failure'
          description: Invalid request body or validation errors
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mqApiV4Failure'
          description: Queue does not exist or resource not found on source
        '405':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mqApiV4Failure'
          description: Multiple subscriptions on same resource not supported
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create Event Subscription
      tags:
      - Queue
      x-api-token-group:
      - Queues Write
      - Workers Scripts Write
      x-stackql-sdk:
        service: queues
        resource_chain:
        - subscriptions
        method: create
