      example: example-queue
      type: string
      x-auditable: true
    mqQueuePullBatch:
      items:
        properties:
          attempts:
            example: 1
            readOnly: true
            type: number
            x-auditable: true
          body:
            example: hello world
            readOnly: true
            type: string
          id:
            example: b01b5594f784d0165c2985833f5660dd
            readOnly: true
            type: string
            x-auditable: true
          lease_id:
            $ref: '#/components/schemas/mqLeaseId'
          metadata:
            example:
