      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete Event Subscription
      tags:
      - Queue
      x-api-token-group:
      - Queues Write
      - Workers Scripts Write
      x-stackql-sdk:
        service: queues
        resource_chain:
        - subscriptions
        method: delete
