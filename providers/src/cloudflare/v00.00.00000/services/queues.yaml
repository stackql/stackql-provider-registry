        description: The subscription ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                destination:
                  $ref: '#/components/schemas/mqEventDestination'
                enabled:
                  description: Whether the subscription is active
                  type: boolean
                  x-auditable: true
                events:
                  description: List of event types this subscription handles
                  items:
                    type: string
                  minItems: 1
                  type: array
                  x-auditable: true
                name:
                  description: Name of the subscription
                  type: string
                  x-auditable: true
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/mqApiV4Error'
                  messages:
                    $ref: '#/components/schemas/mqApiV4Message'
                  success:
                    description: Indicates if the API call was successful or not.
                    enum:
                    - true
                    type: boolean
                    x-auditable: true
                  result:
                    $ref: '#/components/schemas/mqEventSubscription'
          description: Successfully created event subscription
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mqApiV4Failure'
          description: Invalid request body or validation errors
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mqApiV4Failure'
          description: Queue does not exist or resource not found on source
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update Event Subscription
      tags:
      - Queue
      x-api-token-group:
      - Queues Write
      - Workers Scripts Write
      x-stackql-sdk:
        service: queues
        resource_chain:
        - subscriptions
        method: update
  /accounts/{account_id}/queues:
