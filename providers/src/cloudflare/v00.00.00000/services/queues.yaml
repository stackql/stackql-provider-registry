                properties:
                  errors:
                    $ref: '#/components/schemas/mqApiV4Error'
                  messages:
                    $ref: '#/components/schemas/mqApiV4Message'
                  success:
                    description: Indicates if the API call was successful or not.
                    enum:
                    - true
                    type: boolean
                    x-auditable: true
                  result:
                    $ref: '#/components/schemas/mqEventSubscription'
          description: Details about an event subscription
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mqApiV4Failure'
          description: Event subscription does not exist
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get Event Subscription
      tags:
      - Queue
      x-api-token-group:
      - Queues Write
      - Workers Scripts Write
      x-stackql-sdk:
        service: queues
        resource_chain:
        - subscriptions
        method: get
    patch:
      description: Update an existing event subscription
      operationId: subscriptions-patch
      parameters:
      - name: account_id
