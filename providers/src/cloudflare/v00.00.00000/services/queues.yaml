components:
  schemas:
    mqApiV4Error:
      example:
      - code: 7003
        message: No route for the URI
      items:
        $ref: '#/components/schemas/responseInfo'
      minLength: 1
      type: array
    mqApiV4Failure:
      properties:
        errors:
          $ref: '#/components/schemas/mqApiV4Error'
        messages:
          $ref: '#/components/schemas/mqApiV4Message'
        success:
          description: Indicates if the API call was successful or not.
          enum:
          - false
          example: false
          type: boolean
          x-auditable: true
      type: object
    mqApiV4Message:
      example: []
      items:
        type: string
        x-auditable: true
      type: array
    mqApiV4Success:
      properties:
        errors:
          $ref: '#/components/schemas/mqApiV4Error'
        messages:
          $ref: '#/components/schemas/mqApiV4Message'
        success:
          description: Indicates if the API call was successful or not.
          enum:
          - true
          type: boolean
          x-auditable: true
      type: object
    mqBatchSize:
      description: The maximum number of messages to include in a batch.
      example: 50
      type: number
      x-auditable: true
    mqConsumerRequest:
      description: Request body for creating or updating a consumer
      type: object
      properties:
        dead_letter_queue:
          $ref: '#/components/schemas/mqQueueName'
        script_name:
          $ref: '#/components/schemas/mqScriptName'
        settings:
          properties:
            batch_size:
              $ref: '#/components/schemas/mqBatchSize'
            max_concurrency:
              $ref: '#/components/schemas/mqMaxConcurrency'
            max_retries:
              $ref: '#/components/schemas/mqMaxRetries'
            max_wait_time_ms:
              $ref: '#/components/schemas/mqMaxWaitTime'
            retry_delay:
              $ref: '#/components/schemas/mqRetryDelay'
          type: object
        type:
          enum:
          - worker
          type: string
          x-auditable: true
      required:
      - type
    mqConsumerResponse:
      description: Response body representing a consumer
      type: object
      properties:
        consumer_id:
          $ref: '#/components/schemas/mqIdentifier'
        created_on:
          format: date-time
          type: string
          x-auditable: true
          readOnly: true
        dead_letter_queue:
          description: Name of the dead letter queue, or empty string if not configured
          type: string
          x-auditable: true
        queue_name:
          $ref: '#/components/schemas/mqQueueName'
        script_name:
          $ref: '#/components/schemas/mqScriptName'
        settings:
          properties:
            batch_size:
              $ref: '#/components/schemas/mqBatchSize'
            max_concurrency:
              $ref: '#/components/schemas/mqMaxConcurrency'
            max_retries:
              $ref: '#/components/schemas/mqMaxRetries'
            max_wait_time_ms:
              $ref: '#/components/schemas/mqMaxWaitTime'
            retry_delay:
              $ref: '#/components/schemas/mqRetryDelay'
          type: object
        type:
          enum:
          - worker
          type: string
          x-auditable: true
    mqEventDestination:
      description: Destination configuration for the subscription
      type: object
      $ref: '#/components/schemas/mqEventDestinationQueue'
    mqEventDestinationQueue:
      properties:
        queue_id:
          description: ID of the target queue
          type: string
          x-auditable: true
        type:
          description: Type of destination
          enum:
          - queues.queue
          type: string
          x-auditable: true
      required:
      - type
      - queue_id
      type: object
    mqEventSource:
      description: Source configuration for the subscription
      type: object
      properties:
        type:
          description: Type of source
          enum:
          - images
          type: string
          x-auditable: true
        model_name:
          description: Name of the Workers AI model
          type: string
          x-auditable: true
          x-stainless-naming:
            python:
              property_name: ai_model_name
        worker_name:
          description: Name of the worker
          type: string
          x-auditable: true
        workflow_name:
          description: Name of the workflow
          type: string
          x-auditable: true
    mqEventSubscription:
      properties:
        created_at:
          description: When the subscription was created
          format: date-time
          type: string
          x-auditable: true
          readOnly: true
        destination:
          $ref: '#/components/schemas/mqEventDestination'
        enabled:
          description: Whether the subscription is active
          type: boolean
          x-auditable: true
        events:
          description: List of event types this subscription handles
          items:
            type: string
          minItems: 1
          type: array
          x-auditable: true
        id:
          description: Unique identifier for the subscription
          type: string
          x-auditable: true
        modified_at:
          description: When the subscription was last modified
          format: date-time
          type: string
          x-auditable: true
          readOnly: true
        name:
          description: Name of the subscription
          type: string
          x-auditable: true
        source:
          $ref: '#/components/schemas/mqEventSource'
      required:
      - id
