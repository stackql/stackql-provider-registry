openapi: 3.0.3
info:
  title: aisearch API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/ai-search/instances:
    get:
      description: List instances.
      operationId: ai-search-list-instances
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Page number (1-indexed).
        in: query
        name: page
        schema:
          default: 1
          description: Page number (1-indexed).
          minimum: 1
          type: integer
      - description: Number of results per page.
        in: query
        name: per_page
        schema:
          default: 20
          description: Number of results per page.
          maximum: 100
          minimum: 1
          type: integer
      - description: Filter instances whose id contains this string (case-insensitive).
        in: query
        name: search
        schema:
          description: Filter instances whose id contains this string (case-insensitive).
          type: string
      - description: Filter by namespace.
        in: query
        name: namespace
        schema:
          description: Filter by namespace.
          type: string
      - description: Field to order results by.
        in: query
        name: order_by
        schema:
          default: created_at
          description: Field to order results by.
          enum:
          - created_at
          type: string
      - description: Order direction.
        in: query
        name: order_by_direction
        schema:
          default: desc
          description: Order direction.
          enum:
          - asc
          - desc
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    items:
                      properties:
                        ai_gateway_id:
                          nullable: true
                          type: string
                          x-auditable: true
                        ai_search_model:
                          enum:
                          - '@cf/meta/llama-3.3-70b-instruct-fp8-fast'
                          - '@cf/zai-org/glm-4.7-flash'
                          - '@cf/meta/llama-3.1-8b-instruct-fast'
                          - '@cf/meta/llama-3.1-8b-instruct-fp8'
                          - '@cf/meta/llama-4-scout-17b-16e-instruct'
                          - '@cf/qwen/qwen3-30b-a3b-fp8'
                          - '@cf/deepseek-ai/deepseek-r1-distill-qwen-32b'
                          - '@cf/moonshotai/kimi-k2-instruct'
                          - '@cf/google/gemma-3-12b-it'
                          - '@cf/google/gemma-4-26b-a4b-it'
                          - '@cf/moonshotai/kimi-k2.5'
                          - anthropic/claude-3-7-sonnet
                          - anthropic/claude-sonnet-4
                          - anthropic/claude-opus-4
                          - anthropic/claude-3-5-haiku
                          - cerebras/qwen-3-235b-a22b-instruct
                          - cerebras/qwen-3-235b-a22b-thinking
                          - cerebras/llama-3.3-70b
                          - cerebras/llama-4-maverick-17b-128e-instruct
                          - cerebras/llama-4-scout-17b-16e-instruct
                          - cerebras/gpt-oss-120b
                          - google-ai-studio/gemini-2.5-flash
                          - google-ai-studio/gemini-2.5-pro
                          - grok/grok-4
                          - groq/llama-3.3-70b-versatile
                          - groq/llama-3.1-8b-instant
                          - openai/gpt-5
                          - openai/gpt-5-mini
                          - openai/gpt-5-nano
                          - ''
                          - null
                          nullable: true
                          type: string
                          x-auditable: true
                        cache:
                          default: true
                          type: boolean
                          x-auditable: true
                        cache_threshold:
                          default: close_enough
                          enum:
                          - super_strict_match
                          - close_enough
                          - flexible_friend
                          - anything_goes
                          type: string
                          x-auditable: true
                        chunk_overlap:
                          default: 10
                          maximum: 30
                          minimum: 0
                          type: integer
                          x-auditable: true
                        chunk_size:
                          minimum: 64
                          type: integer
                          x-auditable: true
                        created_at:
                          format: date-time
                          readOnly: true
                          type: string
                        created_by:
                          nullable: true
                          readOnly: true
                          type: string
                        custom_metadata:
                          items:
                            properties:
                              data_type:
                                enum:
                                - text
                                - number
                                - boolean
                                - datetime
                                type: string
                              field_name:
                                maxLength: 64
                                minLength: 1
                                type: string
                            required:
                            - field_name
                            - data_type
                            type: object
                          maxItems: 5
                          type: array
                          x-auditable: true
                        embedding_model:
                          enum:
                          - '@cf/qwen/qwen3-embedding-0.6b'
                          - '@cf/baai/bge-m3'
                          - '@cf/baai/bge-large-en-v1.5'
                          - '@cf/google/embeddinggemma-300m'
                          - google-ai-studio/gemini-embedding-001
                          - google-ai-studio/gemini-embedding-2-preview
                          - openai/text-embedding-3-small
                          - openai/text-embedding-3-large
                          - ''
                          - null
                          nullable: true
                          type: string
                          x-auditable: true
                        enable:
                          default: true
                          type: boolean
                          x-auditable: true
                        engine_version:
                          default: 3
                          readOnly: true
                          type: number
                        fusion_method:
                          default: rrf
                          enum:
                          - max
                          - rrf
                          type: string
                          x-auditable: true
                        hybrid_search_enabled:
                          default: false
                          deprecated: true
                          description: "Deprecated \u2014 use index_method instead."
                          type: boolean
                          x-auditable: true
                        id:
                          description: AI Search instance ID. Lowercase alphanumeric, hyphens, and underscores.
                          maxLength: 64
                          minLength: 1
                          type: string
                          x-auditable: true
                        index_method:
                          default:
                            keyword: false
                            vector: true
                          description: Controls which storage backends are used during indexing. Defaults to vector-only.
                          properties:
                            keyword:
                              description: Enable keyword (BM25) storage backend.
                              type: boolean
                            vector:
                              description: Enable vector (embedding) storage backend.
                              type: boolean
                          required:
                          - vector
                          - keyword
                          type: object
                          x-auditable: true
                        indexing_options:
                          nullable: true
                          properties:
                            keyword_tokenizer:
                              default: porter
                              description: Tokenizer used for keyword search indexing. porter provides word-level tokenization with Porter stemming (good for natural language queries). trigram enables character-level substring matching (good for partial matches, code, identifiers). Changing this triggers a full re-index. Defaults to porter.
                              enum:
                              - porter
                              - trigram
                              type: string
                          type: object
                          x-auditable: true
                        last_activity:
                          format: date-time
                          nullable: true
                          readOnly: true
                          type: string
                        max_num_results:
                          default: 10
                          maximum: 50
                          minimum: 1
                          type: integer
                          x-auditable: true
                        metadata:
                          properties:
                            created_from_aisearch_wizard:
                              type: boolean
                            search_for_agents:
                              properties:
                                hostname:
                                  type: string
                                zone_id:
                                  type: string
                                zone_name:
                                  type: string
                              required:
                              - zone_id
                              - zone_name
                              - hostname
                              type: object
                            worker_domain:
                              type: string
                          type: object
                          x-auditable: true
                        modified_at:
                          format: date-time
                          readOnly: true
                          type: string
                        modified_by:
                          nullable: true
                          readOnly: true
                          type: string
                        namespace:
                          nullable: true
                          readOnly: true
                          type: string
                        paused:
                          default: false
                          type: boolean
                          x-auditable: true
                        public_endpoint_id:
                          nullable: true
                          readOnly: true
                          type: string
                        public_endpoint_params:
                          properties:
                            authorized_hosts:
                              items:
                                type: string
                              type: array
                            chat_completions_endpoint:
                              properties:
                                disabled:
                                  default: false
                                  description: Disable chat completions endpoint for this public endpoint
                                  type: boolean
                              type: object
                            enabled:
                              default: false
                              type: boolean
                            mcp:
                              properties:
                                description:
                                  default: Finds exactly what you're looking for
                                  type: string
                                disabled:
                                  default: false
                                  description: Disable MCP endpoint for this public endpoint
                                  type: boolean
                              type: object
                            rate_limit:
                              properties:
                                period_ms:
                                  maximum: 3600000
                                  minimum: 60000
                                  type: integer
                                requests:
                                  minimum: 1
                                  type: integer
                                technique:
                                  enum:
                                  - fixed
                                  - sliding
                                  type: string
                              type: object
                            search_endpoint:
                              properties:
                                disabled:
                                  default: false
                                  description: Disable search endpoint for this public endpoint
                                  type: boolean
                              type: object
                          type: object
                          x-auditable: true
                        reranking:
                          default: false
                          type: boolean
                          x-auditable: true
                        reranking_model:
                          enum:
                          - '@cf/baai/bge-reranker-base'
                          - ''
                          - null
                          nullable: true
                          type: string
                          x-auditable: true
                        retrieval_options:
                          nullable: true
                          properties:
                            boost_by:
                              description: Metadata fields to boost search results by. Each entry specifies a metadata field and an optional direction. Direction defaults to 'asc' for numeric fields and 'exists' for text/boolean fields. Fields must match 'timestamp' or a defined custom_metadata field.
                              items:
                                properties:
                                  direction:
                                    description: "Boost direction. 'desc' = higher values rank higher (e.g. newer timestamps). 'asc' = lower values rank higher. 'exists' = boost chunks that have the field. 'not_exists' = boost chunks that lack the field. Optional \uFFFD\uFFFD\uFFFD defaults to 'asc' for numeric/datetime fields, 'exists' for text/boolean fields."
                                    enum:
                                    - asc
                                    - desc
                                    - exists
                                    - not_exists
                                    type: string
                                  field:
                                    description: Metadata field name to boost by. Use 'timestamp' for document freshness, or any custom_metadata field. Numeric and datetime fields support asc/desc directions; text/boolean fields support exists/not_exists.
                                    maxLength: 64
                                    minLength: 1
                                    type: string
                                required:
                                - field
                                type: object
                              maxItems: 3
                              type: array
                            keyword_match_mode:
                              default: and
                              description: Controls which documents are candidates for BM25 scoring. 'and' restricts candidates to documents containing all query terms; 'or' includes any document containing at least one term, ranked by BM25 relevance. Defaults to 'and'.
                              enum:
                              - and
                              - or
                              type: string
                          type: object
                          x-auditable: true
                        rewrite_model:
                          enum:
                          - '@cf/meta/llama-3.3-70b-instruct-fp8-fast'
                          - '@cf/zai-org/glm-4.7-flash'
                          - '@cf/meta/llama-3.1-8b-instruct-fast'
                          - '@cf/meta/llama-3.1-8b-instruct-fp8'
                          - '@cf/meta/llama-4-scout-17b-16e-instruct'
                          - '@cf/qwen/qwen3-30b-a3b-fp8'
                          - '@cf/deepseek-ai/deepseek-r1-distill-qwen-32b'
                          - '@cf/moonshotai/kimi-k2-instruct'
                          - '@cf/google/gemma-3-12b-it'
                          - '@cf/google/gemma-4-26b-a4b-it'
                          - '@cf/moonshotai/kimi-k2.5'
                          - anthropic/claude-3-7-sonnet
                          - anthropic/claude-sonnet-4
                          - anthropic/claude-opus-4
                          - anthropic/claude-3-5-haiku
                          - cerebras/qwen-3-235b-a22b-instruct
                          - cerebras/qwen-3-235b-a22b-thinking
                          - cerebras/llama-3.3-70b
                          - cerebras/llama-4-maverick-17b-128e-instruct
                          - cerebras/llama-4-scout-17b-16e-instruct
                          - cerebras/gpt-oss-120b
                          - google-ai-studio/gemini-2.5-flash
                          - google-ai-studio/gemini-2.5-pro
                          - grok/grok-4
                          - groq/llama-3.3-70b-versatile
                          - groq/llama-3.1-8b-instant
                          - openai/gpt-5
                          - openai/gpt-5-mini
                          - openai/gpt-5-nano
                          - ''
                          - null
                          nullable: true
                          type: string
                          x-auditable: true
                        rewrite_query:
                          default: false
                          type: boolean
                          x-auditable: true
                        score_threshold:
                          default: 0.4
                          maximum: 1
                          minimum: 0
                          type: number
                          x-auditable: true
                        source:
                          nullable: true
                          type: string
                          x-auditable: true
                        source_params:
                          nullable: true
                          properties:
                            exclude_items:
                              description: 'List of path patterns to exclude. Uses micromatch glob syntax: * matches within a path segment, ** matches across path segments (e.g., /admin/** matches /admin/users and /admin/settings/advanced)'
                              items:
                                type: string
                              maxItems: 10
                              type: array
                            include_items:
                              description: 'List of path patterns to include. Uses micromatch glob syntax: * matches within a path segment, ** matches across path segments (e.g., /blog/** matches /blog/post and /blog/2024/post)'
                              items:
                                type: string
                              maxItems: 10
                              type: array
                            prefix:
                              type: string
                            r2_jurisdiction:
                              default: default
                              type: string
                            web_crawler:
                              default:
                                parse_type: sitemap
                              properties:
                                crawl_options:
                                  properties:
                                    depth:
                                      maximum: 100000
                                      minimum: 1
                                      type: number
                                    include_external_links:
                                      default: false
                                      type: boolean
                                    include_subdomains:
                                      default: false
                                      type: boolean
                                    max_age:
                                      maximum: 604800
                                      minimum: 0
                                      type: number
                                    source:
                                      default: all
                                      enum:
                                      - all
                                      - sitemaps
                                      - links
                                      type: string
                                  type: object
                                parse_options:
                                  properties:
                                    content_selector:
                                      description: List of path-to-selector mappings for extracting specific content from crawled pages. Each entry pairs a URL glob pattern with a CSS selector. The first matching path wins. Only the matched HTML fragment is stored and indexed.
                                      items:
                                        properties:
                                          path:
                                            description: 'Glob pattern to match against the page URL path. Uses standard glob syntax: * matches within a segment, ** crosses directories.'
                                            maxLength: 200
                                            type: string
                                          selector:
                                            description: CSS selector to extract content from pages matching the path pattern. Supports standard CSS selectors including class, ID, element, and attribute selectors.
                                            maxLength: 200
                                            type: string
                                        required:
                                        - path
                                        - selector
                                        type: object
                                      maxItems: 10
                                      type: array
                                    include_headers:
                                      type: object
                                    include_images:
                                      default: false
                                      type: boolean
                                    specific_sitemaps:
                                      description: List of specific sitemap URLs to use for crawling. Only valid when parse_type is 'sitemap'.
                                      items:
                                        format: uri
                                        type: string
                                      maxItems: 10
                                      type: array
                                    use_browser_rendering:
                                      default: false
                                      type: boolean
                                  type: object
                                parse_type:
                                  default: sitemap
                                  enum:
                                  - sitemap
                                  - feed-rss
                                  - crawl
                                  type: string
                                store_options:
                                  properties:
                                    r2_jurisdiction:
                                      default: default
                                      type: string
                                    storage_id:
                                      type: string
                                    storage_type:
                                      $ref: '#/components/schemas/r2SippyProvider'
                                  required:
                                  - storage_id
                                  type: object
                              type: object
                          type: object
                          x-auditable: true
                        status:
                          default: waiting
                          readOnly: true
                          type: string
                        sync_interval:
                          default: 21600
                          description: 'Interval between automatic syncs, in seconds. Allowed values: 900 (15min), 1800 (30min), 3600 (1h), 7200 (2h), 14400 (4h), 21600 (6h), 43200 (12h), 86400 (24h).'
                          x-auditable: true
                          type: number
                          enum:
                          - 900
                        token_id:
                          format: uuid
                          type: string
                          x-auditable: true
                        type:
                          enum:
                          - r2
                          - web-crawler
                          - null
                          nullable: true
                          type: string
                          x-auditable: true
                      required:
                      - id
                      - created_at
                      - modified_at
                      type: object
                    type: array
                  result_info:
                    properties:
                      count:
                        type: number
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                    required:
                    - page
                    - per_page
                    - count
                    - total_count
                    type: object
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - result
                - result_info
                type: object
          description: List of instances.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        path:
                          items:
                            type: string
                          type: array
                      required:
                      - code
                      - message
                      - path
                      type: object
                    type: array
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - errors
                type: object
          description: Input Validation Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List instances.
      tags:
      - AI Search Instances
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.ai-search
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: aisearch
        resource_chain:
        - instances
        method: list
    post:
      description: Create a new instance.
      operationId: ai-search-create-instance
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                ai_gateway_id:
                  nullable: true
                  type: string
                  x-auditable: true
                ai_search_model:
                  enum:
                  - '@cf/meta/llama-3.3-70b-instruct-fp8-fast'
                  - '@cf/zai-org/glm-4.7-flash'
                  - '@cf/meta/llama-3.1-8b-instruct-fast'
                  - '@cf/meta/llama-3.1-8b-instruct-fp8'
                  - '@cf/meta/llama-4-scout-17b-16e-instruct'
                  - '@cf/qwen/qwen3-30b-a3b-fp8'
                  - '@cf/deepseek-ai/deepseek-r1-distill-qwen-32b'
                  - '@cf/moonshotai/kimi-k2-instruct'
                  - '@cf/google/gemma-3-12b-it'
                  - '@cf/google/gemma-4-26b-a4b-it'
                  - '@cf/moonshotai/kimi-k2.5'
                  - anthropic/claude-3-7-sonnet
                  - anthropic/claude-sonnet-4
                  - anthropic/claude-opus-4
                  - anthropic/claude-3-5-haiku
                  - cerebras/qwen-3-235b-a22b-instruct
                  - cerebras/qwen-3-235b-a22b-thinking
                  - cerebras/llama-3.3-70b
                  - cerebras/llama-4-maverick-17b-128e-instruct
                  - cerebras/llama-4-scout-17b-16e-instruct
                  - cerebras/gpt-oss-120b
                  - google-ai-studio/gemini-2.5-flash
                  - google-ai-studio/gemini-2.5-pro
                  - grok/grok-4
                  - groq/llama-3.3-70b-versatile
                  - groq/llama-3.1-8b-instant
                  - openai/gpt-5
                  - openai/gpt-5-mini
                  - openai/gpt-5-nano
                  - ''
                  - null
                  nullable: true
                  type: string
                  x-auditable: true
                cache:
                  default: true
                  type: boolean
                  x-auditable: true
                cache_threshold:
                  default: close_enough
                  enum:
                  - super_strict_match
                  - close_enough
                  - flexible_friend
                  - anything_goes
                  type: string
                  x-auditable: true
                chunk:
                  default: true
                  type: boolean
                  x-auditable: true
                chunk_overlap:
                  default: 10
                  maximum: 30
                  minimum: 0
                  type: integer
                  x-auditable: true
                chunk_size:
                  minimum: 64
                  type: integer
                  x-auditable: true
                custom_metadata:
                  items:
                    properties:
                      data_type:
                        enum:
                        - text
                        - number
                        - boolean
                        - datetime
                        type: string
                      field_name:
                        maxLength: 64
                        minLength: 1
                        type: string
                    required:
                    - field_name
                    - data_type
                    type: object
                  maxItems: 5
                  type: array
                  x-auditable: true
                embedding_model:
                  enum:
                  - '@cf/qwen/qwen3-embedding-0.6b'
                  - '@cf/baai/bge-m3'
                  - '@cf/baai/bge-large-en-v1.5'
                  - '@cf/google/embeddinggemma-300m'
                  - google-ai-studio/gemini-embedding-001
                  - google-ai-studio/gemini-embedding-2-preview
                  - openai/text-embedding-3-small
                  - openai/text-embedding-3-large
                  - ''
                  - null
                  nullable: true
                  type: string
                  x-auditable: true
                fusion_method:
                  default: rrf
                  enum:
                  - max
                  - rrf
                  type: string
                  x-auditable: true
                hybrid_search_enabled:
                  default: false
                  deprecated: true
                  description: "Deprecated \u2014 use index_method instead."
                  type: boolean
                  x-auditable: true
                id:
                  description: AI Search instance ID. Lowercase alphanumeric, hyphens, and underscores.
                  maxLength: 64
                  minLength: 1
                  type: string
                  x-auditable: true
                index_method:
                  default:
                    keyword: false
                    vector: true
                  description: Controls which storage backends are used during indexing. Defaults to vector-only.
                  properties:
                    keyword:
                      description: Enable keyword (BM25) storage backend.
