                          enum:
                          - and
                          - or
                          type: string
                        match_threshold:
                          default: 0.4
                          maximum: 1
                          minimum: 0
                          type: number
                        max_num_results:
                          default: 10
                          maximum: 50
                          minimum: 1
                          type: integer
                        retrieval_type:
                          enum:
                          - vector
                          - keyword
                          - hybrid
