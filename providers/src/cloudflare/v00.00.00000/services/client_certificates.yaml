openapi: 3.0.3
info:
  title: client_certificates API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/client_certificates:
    get:
      description: >-
        List all of your Zone's API Shield mTLS Client Certificates by Status
        and/or using Pagination
      operationId: client-certificate-for-a-zone-list-client-certificates
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: status
          schema:
            description: Client Certitifcate Status to filter results by.
            enum:
              - all
              - active
              - pending_reactivation
              - pending_revocation
              - revoked
            type: string
        - in: query
          name: page
          schema:
            default: 1
            description: Page number of paginated results.
            minimum: 1
            type: number
        - in: query
          name: per_page
          schema:
            default: 20
            description: Number of records per page.
            maximum: 50
            minimum: 5
            type: number
        - in: query
          name: limit
          schema:
            description: Limit to the number of records returned.
            type: integer
        - in: query
          name: offset
          schema:
            description: Offset the results
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesClientCertificateResponseCollection
          description: List Client Certificates Response
        4XX:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesApiResponseCommonFailure
          description: List Client Certificates Response Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Client Certificates
      tags:
        - API Shield Client Certificates for a Zone
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: client_certificates
        resource_chain: []
        method: list
    post:
      description: Create a new API Shield mTLS Client Certificate
      operationId: client-certificate-for-a-zone-create-client-certificate
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                csr:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasCsr'
                validity_days:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesSchemasValidityDays
              required:
                - csr
                - validity_days
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesClientCertificateResponseSingle
          description: Create Client Certificate Response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      certificate:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesClientCertificatesComponentsSchemasCertificate
                      certificate_authority:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesClientCertificatesComponentsSchemasCertificateAuthority
                      common_name:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCommonName
                      country:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCountry
                      csr:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCsr
                      expires_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesExpiredOn
                      fingerprint_sha256:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesFingerprintSha256
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      issued_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIssuedOn
                      location:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesLocation
                      organization:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesOrganization
                      organizational_unit:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesOrganizationalUnit
                      serial_number:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasSerialNumber
                      signature:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasSignature
                      ski:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesSki'
                      state:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesState'
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesClientCertificatesComponentsSchemasStatus
                      validity_days:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasValidityDays
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Create Client Certificate Response Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create Client Certificate
      tags:
        - API Shield Client Certificates for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: client_certificates
        resource_chain: []
        method: create
  /zones/{zone_id}/client_certificates/{client_certificate_id}:
    delete:
      description: >-
        Set a API Shield mTLS Client Certificate to pending_revocation status
        for processing to revoked status.
      operationId: client-certificate-for-a-zone-delete-client-certificate
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: client_certificate_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesClientCertificateResponseSingle
          description: Revoke Client Certificate Response
        4XX:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesApiResponseCommonFailure
          description: Revoke Client Certificate Response Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Revoke Client Certificate
      tags:
        - API Shield Client Certificates for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: client_certificates
        resource_chain: []
        method: delete
    get:
      description: Get Details for a single mTLS API Shield Client Certificate
      operationId: client-certificate-for-a-zone-client-certificate-details
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: client_certificate_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesClientCertificateResponseSingle
          description: Client Certificate Details Response
        4XX:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesApiResponseCommonFailure
          description: Client Certificate Details Response Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Client Certificate Details
      tags:
        - API Shield Client Certificates for a Zone
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: client_certificates
        resource_chain: []
        method: get
    patch:
      description: >-
        If a API Shield mTLS Client Certificate is in a pending_revocation
        state, you may reactivate it with this endpoint.
      operationId: client-certificate-for-a-zone-edit-client-certificate
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: client_certificate_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
      requestBody:
        content:
          application/json:
            schema:
              properties:
                reactivate:
                  type: boolean
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesClientCertificateResponseSingle
          description: Reactivate Client Certificate Response
        4XX:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesApiResponseCommonFailure
          description: Reactivate Client Certificate Response Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Reactivate Client Certificate
      tags:
        - API Shield Client Certificates for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: client_certificates
        resource_chain: []
        method: edit
components:
  schemas:
    tlsCertificatesAndHostnamesApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          example: []
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    tlsCertificatesAndHostnamesClientCertificate:
      properties:
        certificate:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesClientCertificatesComponentsSchemasCertificate
        certificate_authority:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesClientCertificatesComponentsSchemasCertificateAuthority
        common_name:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCommonName'
        country:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCountry'
        csr:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasCsr'
        expires_on:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesExpiredOn'
        fingerprint_sha256:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesFingerprintSha256'
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        issued_on:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIssuedOn'
        location:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesLocation'
        organization:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesOrganization'
        organizational_unit:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesOrganizationalUnit'
        serial_number:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasSerialNumber
        signature:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasSignature
        ski:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSki'
        state:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesState'
        status:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesClientCertificatesComponentsSchemasStatus
        validity_days:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasValidityDays'
      type: object
    tlsCertificatesAndHostnamesClientCertificateResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesClientCertificate'
          type: array
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesClientCertificateResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesClientCertificate'
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesClientCertificatesComponentsSchemasCertificate:
      description: The Client Certificate PEM
      example: |-
        -----BEGIN CERTIFICATE-----
        MIIDmDCCAoC...dhDDE
        -----END CERTIFICATE-----
      readOnly: true
      type: string
    tlsCertificatesAndHostnamesClientCertificatesComponentsSchemasCertificateAuthority:
      description: Certificate Authority used to issue the Client Certificate
      properties:
        id:
          example: 568b6b74-7b0c-4755-8840-4e3b8c24adeb
          type: string
          x-auditable: true
        name:
          example: Cloudflare Managed CA for account
          type: string
          x-auditable: true
      type: object
    tlsCertificatesAndHostnamesClientCertificatesComponentsSchemasStatus:
      description: >-
        Client Certificates may be active or revoked, and the
        pending_reactivation or pending_revocation represent in-progress
        asynchronous transitions
      enum:
        - active
        - pending_reactivation
        - pending_revocation
        - revoked
      example: active
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesCommonName:
      description: Common Name of the Client Certificate
      example: Cloudflare
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesComponentsSchemasSerialNumber:
      description: The serial number on the created Client Certificate.
      example: 3bb94ff144ac567b9f75ad664b6c55f8d5e48182
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesComponentsSchemasSignature:
      description: The type of hash used for the Client Certificate..
      example: SHA256WithRSA
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesCountry:
      description: Country, provided by the CSR
      example: US
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesExpiredOn:
      description: Date that the Client Certificate expires
      example: '2033-02-20T23:18:00Z'
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesFingerprintSha256:
      description: Unique identifier of the Client Certificate
      example: 256c24690243359fb8cf139a125bd05ebf1d968b71e4caf330718e9f5c8a89ea
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesIssuedOn:
      description: Date that the Client Certificate was issued by the Certificate Authority
      example: '2023-02-23T23:18:00Z'
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesLocation:
      description: Location, provided by the CSR
      example: Somewhere
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    tlsCertificatesAndHostnamesOrganization:
      description: Organization, provided by the CSR
      example: Organization
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesOrganizationalUnit:
      description: Organizational Unit, provided by the CSR
      example: Organizational Unit
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesSchemasCsr:
      description: The Certificate Signing Request (CSR). Must be newline-encoded.
      example: |-
        -----BEGIN CERTIFICATE REQUEST-----
        MIICY....
        -----END CERTIFICATE REQUEST-----
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesSchemasValidityDays:
      description: >-
        The number of days the Client Certificate will be valid after the
        issued_on date
      example: 3650
      type: integer
      x-auditable: true
    tlsCertificatesAndHostnamesSki:
      description: Subject Key Identifier
      example: 8e375af1389a069a0f921f8cc8e1eb12d784b949
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesState:
      description: State, provided by the CSR
      example: CA
      readOnly: true
      type: string
      x-auditable: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    client_certificates:
      id: cloudflare.client_certificates.client_certificates
      name: client_certificates
      title: Client Certificates
      methods:
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1client_certificates/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1client_certificates/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        delete:
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1client_certificates~1{client_certificate_id}/delete
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1client_certificates~1{client_certificate_id}/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        edit:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1client_certificates~1{client_certificate_id}/patch
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/client_certificates/methods/get'
          - $ref: '#/components/x-stackQL-resources/client_certificates/methods/list'
        insert:
          - $ref: >-
              #/components/x-stackQL-resources/client_certificates/methods/create
        update:
          - $ref: '#/components/x-stackQL-resources/client_certificates/methods/edit'
        delete:
          - $ref: >-
              #/components/x-stackQL-resources/client_certificates/methods/delete
        replace: []
