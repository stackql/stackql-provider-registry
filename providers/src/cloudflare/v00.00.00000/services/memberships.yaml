openapi: 3.0.3
info:
  title: memberships API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /memberships:
    get:
      description: List memberships of accounts the user can access.
      operationId: user'-s-account-memberships-list-memberships
      parameters:
      - in: query
        name: account.name
        schema:
          $ref: '#/components/schemas/iamPropertiesName'
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Number of memberships per page.
          maximum: 50
          minimum: 5
          type: number
      - in: query
        name: order
        schema:
          description: Field to order memberships by.
          enum:
          - id
          - account.name
          - status
          type: string
      - in: query
        name: direction
        schema:
          description: Direction to order memberships.
          enum:
          - asc
          - desc
          type: string
      - in: query
        name: name
        schema:
          $ref: '#/components/schemas/iamPropertiesName'
      - in: query
        name: status
        schema:
          description: Status of this membership.
          enum:
          - accepted
          - pending
          - rejected
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                title: memberships_with_roles
                properties:
                  errors:
                    $ref: '#/components/schemas/iamSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/iamSchemasMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/iamResultInfo'
                  result:
                    items:
                      $ref: '#/components/schemas/iamMembership'
                    type: array
                required:
                - errors
                - messages
                - success
          description: List Memberships response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: List Memberships response failure
      security:
      - api_email: []
        api_key: []
      summary: List Memberships
      tags:
      - User's Account Memberships
      x-api-token-group:
      - Memberships Write
      - Memberships Read
      x-stackql-sdk:
        service: memberships
        resource_chain: []
        method: list
  /memberships/{membership_id}:
    delete:
      description: Remove the associated member from an account.
      operationId: user'-s-account-memberships-delete-membership
      parameters:
      - name: membership_id
        in: path
        required: true
        description: The membership ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/iamSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/iamSchemasMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    properties:
                      id:
                        $ref: '#/components/schemas/iamMembershipComponentsSchemasIdentifier'
                    type: object
                required:
                - success
                - errors
                - messages
          description: Delete Membership response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: Delete Membership response failure
      security:
      - api_email: []
        api_key: []
      summary: Delete Membership
      tags:
      - User's Account Memberships
      x-api-token-group:
      - Memberships Write
      x-stackql-sdk:
        service: memberships
        resource_chain: []
        method: delete
    get:
      description: Get a specific membership.
      operationId: user'-s-account-memberships-membership-details
      parameters:
      - name: membership_id
        in: path
        required: true
        description: The membership ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamSingleMembershipResponseWithPolicies'
          description: Membership Details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: Membership Details response failure
      security:
      - api_email: []
        api_key: []
      summary: Membership Details
      tags:
      - User's Account Memberships
      x-api-token-group:
      - Memberships Write
      - Memberships Read
      x-stackql-sdk:
        service: memberships
        resource_chain: []
        method: get
    put:
      description: Accept or reject this account invitation.
      operationId: user'-s-account-memberships-update-membership
      parameters:
      - name: membership_id
        in: path
        required: true
        description: The membership ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                status:
                  description: Whether to accept or reject this account invitation.
                  enum:
                  - accepted
                  - rejected
                  type: string
              required:
              - status
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamSingleMembershipResponseWithPolicies'
          description: Update Membership response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: Update Membership response failure
      security:
      - api_email: []
        api_key: []
      summary: Update Membership
      tags:
      - User's Account Memberships
      x-api-token-group:
      - Memberships Write
      x-stackql-sdk:
        service: memberships
        resource_chain: []
        method: update
  /organizations/{organization_id}/members:
    get:
      description: List memberships for an Organization. (Currently in Closed Beta - see https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Members_list
      parameters:
      - name: organization_id
        in: path
        required: true
        description: The organization ID.
        schema:
          type: string
      - description: Filter the list of memberships by membership status.
        in: query
        name: status
        schema:
          items:
            enum:
            - active
            - canceled
            type: string
          type: array
        explode: true
      - description: Filter the list of memberships for a specific email.
        explode: false
        in: query
        name: user.email
        schema:
          type: string
      - description: Filter the list of memberships for a specific email that contains a substring.
        explode: false
        in: query
        name: user.email.contains
        schema:
          type: string
      - description: Filter the list of memberships for a specific email that starts with a substring.
        explode: false
        in: query
        name: user.email.startsWith
        schema:
          type: string
      - description: Filter the list of memberships for a specific email that ends with a substring.
        explode: false
        in: query
        name: user.email.endsWith
        schema:
          type: string
      - description: An opaque token returned from the last list response that when provided will retrieve the next page. Parameters used to filter the retrieved list must remain in subsequent requests with a page token.
        explode: false
        in: query
        name: page_token
        schema:
          type: string
      - description: The amount of items to return. Defaults to 10.
        explode: false
        in: query
        name: page_size
        schema:
          maximum: 1000
          minimum: 0
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    items:
                      $ref: '#/components/schemas/organizationsApiMember'
                    type: array
                  result_info:
                    $ref: '#/components/schemas/organizationsApiPageTokenResultInfo'
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - result_info
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
      - api_email: []
        api_key: []
      summary: List organization members
      tags:
      - OrganizationMembers
    post:
      description: Create a membership that grants access to a specific Organization. (Currently in Closed Beta - see https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Members_create
      parameters:
      - name: organization_id
        in: path
        required: true
        description: The organization ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/organizationsApiCreateMemberRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    $ref: '#/components/schemas/organizationsApiMember'
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
      - api_email: []
        api_key: []
      summary: Create organization member
      tags:
      - OrganizationMembers
  /organizations/{organization_id}/members/{member_id}:
    delete:
      description: Delete a membership to a particular Organization. (Currently in Closed Beta - see https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Members_delete
      parameters:
      - name: organization_id
        in: path
        required: true
        description: The organization ID.
        schema:
          type: string
      - name: member_id
        in: path
        required: true
        description: The account member ID.
        schema:
          type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
      - api_email: []
        api_key: []
      summary: Delete organization member
      tags:
      - OrganizationMembers
    get:
      description: Retrieve a single membership from an Organization. (Currently in Closed Beta - see https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Members_retrieve
      parameters:
      - name: organization_id
        in: path
        required: true
        description: The organization ID.
        schema:
          type: string
      - name: member_id
        in: path
        required: true
        description: The account member ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    $ref: '#/components/schemas/organizationsApiMember'
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
      - api_email: []
        api_key: []
      summary: Get organization member
      tags:
      - OrganizationMembers
components:
  schemas:
    iamAccess:
      description: Allow or deny operations against the resources.
      enum:
      - allow
      - deny
      example: allow
      type: string
      x-auditable: true
    iamAccount:
      properties:
        created_on:
          description: Timestamp for the creation of the account
          example: '2014-03-01T12:21:02.0000Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        id:
          $ref: '#/components/schemas/iamCommonComponentsSchemasIdentifier'
        managed_by:
          description: Parent container details
          properties:
            parent_org_id:
              description: ID of the parent Organization, if one exists
              example: 4536bcfad5faccb111b47003c79917fa
              maxLength: 32
              readOnly: true
              type: string
              x-auditable: true
            parent_org_name:
              description: Name of the parent Organization, if one exists
              example: Demo Parent Organization
              readOnly: true
              type: string
              x-auditable: true
          type: object
        name:
          description: Account name
          example: Demo Account
          maxLength: 100
          type: string
          x-auditable: true
        settings:
          description: Account settings
          properties:
            abuse_contact_email:
              description: Sets an abuse contact email to notify for abuse reports.
              type: string
              x-auditable: true
            enforce_twofactor:
              default: false
              description: Indicates whether membership in this account requires that Two-Factor Authentication is enabled
              type: boolean
              x-auditable: true
              x-stainless-terraform-configurability: computed_optional
          type: object
        type:
          $ref: '#/components/schemas/iamAccountType'
      required:
      - id
      - name
      - type
      type: object
    iamAccountType:
      enum:
      - standard
      - enterprise
      type: string
    iamApiAccessEnabled:
      description: Enterprise only. Indicates whether or not API access is enabled specifically for this user on a given account.
      example: true
      nullable: true
      type: boolean
      x-auditable: true
    iamApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/iamSchemasMessages'
        messages:
          example: []
          $ref: '#/components/schemas/iamSchemasMessages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    iamCommonComponentsSchemasIdentifier:
      description: Identifier
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      minLength: 32
      type: string
      x-auditable: true
    iamGrants:
      example:
        read: true
        write: false
      properties:
        read:
          example: true
          type: boolean
          x-auditable: true
        write:
          example: true
          type: boolean
          x-auditable: true
      type: object
    iamListMemberPolicy:
      properties:
        access:
          $ref: '#/components/schemas/iamAccess'
        id:
          $ref: '#/components/schemas/iamPolicyIdentifier'
        permission_groups:
          $ref: '#/components/schemas/iamPermissionGroups'
        resource_groups:
          $ref: '#/components/schemas/iamResourceGroups'
      title: list_member_policy
      type: object
    iamMembership:
      properties:
        account:
          $ref: '#/components/schemas/iamSchemasAccount'
        api_access_enabled:
          $ref: '#/components/schemas/iamApiAccessEnabled'
        id:
          $ref: '#/components/schemas/iamMembershipComponentsSchemasIdentifier'
        permissions:
          description: All access permissions for the user at the account.
          readOnly: true
          $ref: '#/components/schemas/iamPermissions'
        roles:
          $ref: '#/components/schemas/iamRoleNames'
        status:
          $ref: '#/components/schemas/iamSchemasStatus'
      type: object
    iamMembershipComponentsSchemasIdentifier:
      description: Membership identifier tag.
      example: 4536bcfad5faccb111b47003c79917fa
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    iamMembershipWithPolicies:
      properties:
        account:
          $ref: '#/components/schemas/iamSchemasAccount'
        api_access_enabled:
          $ref: '#/components/schemas/iamApiAccessEnabled'
        id:
          $ref: '#/components/schemas/iamMembershipComponentsSchemasIdentifier'
        permissions:
          description: All access permissions for the user at the account.
          readOnly: true
          $ref: '#/components/schemas/iamPermissions'
        policies:
          description: Access policy for the membership
          items:
            $ref: '#/components/schemas/iamListMemberPolicy'
          type: array
        roles:
          $ref: '#/components/schemas/iamRoleNames'
        status:
          $ref: '#/components/schemas/iamSchemasStatus'
      type: object
    iamPermissionGroup:
      description: A named group of permissions that map to a group of operations against resources.
      properties:
        id:
          description: Identifier of the permission group.
          example: 6d7f2f5f5b1d4a0e9081fdc98d432fd1
          type: string
          x-auditable: true
        meta:
          description: Attributes associated to the permission group.
          example:
            label: load_balancer_admin
            scopes: com.cloudflare.api.account
          properties:
            key:
              type: string
              x-auditable: true
            value:
              type: string
              x-auditable: true
          type: object
        name:
          description: Name of the permission group.
          example: Load Balancer
          readOnly: true
          type: string
          x-auditable: true
      required:
      - id
      type: object
    iamPermissionGroups:
      description: A set of permission groups that are specified to the policy.
      example:
      - id: c8fed203ed3043cba015a93ad1616f1f
        meta:
          label: load_balancer_admin
          scopes: com.cloudflare.api.account
        name: Zone Read
      - id: 82e64a83756745bbbb1c9c2701bf816b
        meta:
          label: fbm_user
          scopes: com.cloudflare.api.account
        name: Magic Network Monitoring
      items:
        $ref: '#/components/schemas/iamPermissionGroup'
      type: array
    iamPermissions:
      example:
        analytics:
          read: true
          write: false
        zones:
          read: true
          write: true
      properties:
        analytics:
          $ref: '#/components/schemas/iamGrants'
        billing:
          $ref: '#/components/schemas/iamGrants'
        cache_purge:
          $ref: '#/components/schemas/iamGrants'
        dns:
          $ref: '#/components/schemas/iamGrants'
        dns_records:
          $ref: '#/components/schemas/iamGrants'
        lb:
          $ref: '#/components/schemas/iamGrants'
        logs:
          $ref: '#/components/schemas/iamGrants'
        organization:
          $ref: '#/components/schemas/iamGrants'
        ssl:
          $ref: '#/components/schemas/iamGrants'
        waf:
          $ref: '#/components/schemas/iamGrants'
        zone_settings:
          $ref: '#/components/schemas/iamGrants'
        zones:
          $ref: '#/components/schemas/iamGrants'
      type: object
    iamPolicyIdentifier:
      description: Policy identifier.
      example: f267e341f3dd4697bd3b9f71dd96247f
      readOnly: true
      type: string
      x-auditable: true
      x-stainless-terraform-always-send: true
    iamPropertiesName:
      description: Account name
      example: Demo Account
      maxLength: 100
      type: string
      x-auditable: true
    iamResourceGroup:
      description: A group of scoped resources.
      properties:
        id:
          description: Identifier of the resource group.
          example: 6d7f2f5f5b1d4a0e9081fdc98d432fd1
          readOnly: true
          type: string
          x-auditable: true
        meta:
          description: Attributes associated to the resource group.
          example:
            editable: 'false'
          properties:
            key:
              type: string
            value:
              type: string
          type: object
        name:
          description: Name of the resource group.
          example: com.cloudflare.api.account.eb78d65290b24279ba6f44721b3ea3c4
          readOnly: true
          type: string
          x-auditable: true
        scope:
          description: The scope associated to the resource group
          items:
            $ref: '#/components/schemas/iamScope'
          type: array
      required:
      - id
      - scope
      type: object
    iamResourceGroups:
      description: A list of resource groups that the policy applies to.
      items:
        $ref: '#/components/schemas/iamResourceGroup'
      type: array
    iamResultInfo:
      properties:
        count:
          description: Total number of results for the requested service
          example: 1
          type: number
        page:
          description: Current page within paginated list of results
          example: 1
          type: number
        per_page:
          description: Number of results per page of results
          example: 20
          type: number
        total_count:
          description: Total results available without any search parameters
          example: 2000
          type: number
      type: object
    iamRoleNames:
      description: List of role names the membership has for this account.
      items:
        example: Account Administrator
        maxLength: 120
        type: string
        x-auditable: true
      readOnly: true
      type: array
    iamSchemasAccount:
      readOnly: true
      $ref: '#/components/schemas/iamAccount'
    iamSchemasMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
        - code
        - message
        type: object
        uniqueItems: true
      type: array
    iamSchemasStatus:
      description: Status of this membership.
      enum:
      - accepted
      - pending
      - rejected
      example: accepted
      type: string
      x-auditable: true
    iamScope:
      description: A scope is a combination of scope objects which provides additional context.
      properties:
        key:
          $ref: '#/components/schemas/iamScopeKey'
        objects:
          description: A list of scope objects for additional context.
          items:
            $ref: '#/components/schemas/iamScopeObject'
          type: array
      required:
      - key
      - objects
      type: object
    iamScopeKey:
      description: This is a combination of pre-defined resource name and identifier (like Account ID etc.)
      example: com.cloudflare.api.account.eb78d65290b24279ba6f44721b3ea3c4
      readOnly: true
      x-auditable: true
      type: string
    iamScopeObject:
      description: A scope object represents any resource that can have actions applied against invite.
      properties:
        key:
          $ref: '#/components/schemas/iamScopeObjectKey'
      required:
      - key
      type: object
    iamScopeObjectKey:
      description: This is a combination of pre-defined resource name and identifier (like Zone ID etc.)
      example: com.cloudflare.api.account.zone.23f8d65290b24279ba6f44721b3eaad5
      readOnly: true
      x-auditable: true
      type: string
    iamSingleMembershipResponseWithPolicies:
      title: response_with_policies
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/iamSchemasMessages'
        messages:
          $ref: '#/components/schemas/iamSchemasMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/iamMembershipWithPolicies'
      required:
      - success
      - errors
      - messages
    organizationsApiCreateMemberRequest:
      properties:
        member:
          $ref: '#/components/schemas/organizationsApiCreateSingleMember'
      required:
      - member
      type: object
    organizationsApiCreateSingleMember:
