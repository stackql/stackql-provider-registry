          description: The caller lacks permission or entitlement to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The requested resource does not exist.
      security:
        - api_token: []
      summary: List available account or zone datasets
      tags: []
      x-api-token-group:
        - Logs Write
        - Logs Read
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      operationId: get_zones_zone_id_logs_explorer_datasets_available
  /accounts/{account_id}/logs/explorer/datasets/{dataset_id}:
    get:
      description: Retrieve a single Log Explorer dataset by ID for the account or zone.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexDatasetDetailResponse'
          description: Dataset details, including the fields active for ingestion.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: >-
            Invalid request, unsupported dataset, or invalid field
            configuration.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The caller lacks permission or entitlement to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The requested resource does not exist.
      security:
        - api_token: []
      summary: Get an account or zone dataset
      tags: []
      x-api-token-group:
        - Logs Write
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: dataset_id
          in: path
          required: true
          description: The dataset ID.
          schema:
            type: string
      operationId: get_accounts_account_id_logs_explorer_datasets_dataset_id
    put:
      description: >-
        Updates the enabled state and/or field configuration of an account or
        zone dataset.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/lexUpdateDatasetRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexDatasetDetailResponse'
          description: The dataset after the update.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: >-
            Invalid request, unsupported dataset, or invalid field
            configuration.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The caller lacks permission or entitlement to access this resource.
        '404':
          content:
            application/json:
              schema:
