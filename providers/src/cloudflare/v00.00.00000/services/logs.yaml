        schema:
          description: JSON Schema that describes the fields this dataset exposes.
          properties:
            properties:
              type: object
            required:
              items:
                type: string
              type: array
            type:
              enum:
                - object
              type: string
          type: object
        timestamp_field:
          description: The primary timestamp field name for this dataset.
          type: string
