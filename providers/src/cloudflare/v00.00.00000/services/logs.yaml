openapi: 3.0.3
info:
  title: logs API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/logs/control/cmb/config:
    delete:
      description: Deletes CMB config.
      operationId: delete-accounts-account_id-logs-control-cmb-config
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/logcontrolMessages'
                  messages:
                    $ref: '#/components/schemas/logcontrolMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    enum:
                      - null
                    nullable: true
                    type: object
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: Delete CMB config response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logcontrolApiResponseCommonFailure'
          description: Delete CMB config response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete CMB config
      tags:
        - Logcontrol CMB config for an account
      x-api-token-group:
        - Logs Write
      x-cfPermissionsRequired:
        enum:
          - '#logs:edit'
      x-stackql-sdk:
        service: logs
        resource_chain:
          - control
          - cmb
          - config
        method: delete
    get:
      description: Gets CMB config.
      operationId: get-accounts-account_id-logs-control-cmb-config
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logcontrolCmbConfigResponseSingle'
          description: Get CMB config response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logcontrolApiResponseCommonFailure'
          description: Get CMB config response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get CMB config
      tags:
        - Logcontrol CMB config for an account
      x-api-token-group:
        - Logs Write
        - Logs Read
      x-cfPermissionsRequired:
        enum:
          - '#logs:read'
          - '#analytics:read'
      x-stackql-sdk:
        service: logs
        resource_chain:
          - control
          - cmb
          - config
        method: get
    post:
      description: Updates CMB config.
      operationId: post-accounts-account_id-logs-control-cmb-config
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/logcontrolCmbConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logcontrolCmbConfigResponseSingle'
          description: Update CMB config response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logcontrolApiResponseCommonFailure'
          description: Update CMB config response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update CMB config
      tags:
        - Logcontrol CMB config for an account
      x-api-token-group:
        - Logs Write
      x-cfPermissionsRequired:
        enum:
          - '#logs:edit'
      x-stackql-sdk:
        service: logs
        resource_chain:
          - control
          - cmb
          - config
        method: create
  /zones/{zone_id}/logs/control/retention/flag:
    get:
      description: Gets log retention flag for Logpull API.
      operationId: get-zones-zone_id-logs-control-retention-flag
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logcontrolRetentionFlagResponseSingle'
          description: Get log retention flag response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logcontrolApiResponseCommonFailure'
          description: Get log retention flag response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get log retention flag
      tags:
        - Logs Received
      x-api-token-group:
        - Logs Write
        - Logs Read
      x-cfPermissionsRequired:
        enum:
          - '#logs:read'
          - '#analytics:read'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: logs
        resource_chain:
          - control
          - retention
        method: get
    post:
      description: Updates log retention flag for Logpull API.
      operationId: post-zones-zone_id-logs-control-retention-flag
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/logcontrolRetentionFlag'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logcontrolRetentionFlagResponseSingle'
          description: Update log retention flag response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logcontrolApiResponseCommonFailure'
          description: Update log retention flag response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update log retention flag
      tags:
        - Logs Received
      x-api-token-group:
        - Logs Write
      x-cfPermissionsRequired:
        enum:
          - '#logs:edit'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: logs
        resource_chain:
          - control
          - retention
        method: create
  /zones/{zone_id}/logs/rayids/{ray_id}:
    get:
      description: >-
        The `/rayids` api route allows lookups by specific rayid. The rayids
        route will return zero, one, or more records (ray ids are not unique).
      operationId: get-zones-zone_id-logs-rayids-ray_id
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: ray_id
          schema:
            $ref: '#/components/schemas/logshareRayIdentifier'
          required: true
        - in: query
          name: fields
          schema:
            $ref: '#/components/schemas/logshareFields'
        - in: query
          name: timestamps
          schema:
            $ref: '#/components/schemas/logshareTimestamps'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logshareLogsResponseJsonLines'
          description: Get logs RayIDs response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logshareApiResponseCommonFailure'
          description: Get logs RayIDs response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get logs RayIDs
      tags:
        - Logs Received
      x-api-token-group:
        - Logs Write
        - Logs Read
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
  /zones/{zone_id}/logs/received:
    get:
      description: >-
        The `/received` api route allows customers to retrieve their edge HTTP
        logs. The basic access pattern is "give me all the logs for zone Z for
        minute M", where the minute M refers to the time records were received
        at Cloudflare's central data center. `start` is inclusive, and `end` is
        exclusive. Because of that, to get all data, at minutely cadence,
        starting at 10AM, the proper values are:
        `start=2018-05-20T10:00:00Z&end=2018-05-20T10:01:00Z`, then
        `start=2018-05-20T10:01:00Z&end=2018-05-20T10:02:00Z` and so on; the
        overlap will be handled properly.
      operationId: get-zones-zone_id-logs-received
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: start
          schema:
            $ref: '#/components/schemas/logshareStart'
        - in: query
          name: end
          schema:
            $ref: '#/components/schemas/logshareEnd'
        - in: query
          name: fields
          schema:
            $ref: '#/components/schemas/logshareFields'
        - in: query
          name: sample
          schema:
            $ref: '#/components/schemas/logshareSample'
        - in: query
          name: count
          schema:
            $ref: '#/components/schemas/logshareCount'
        - in: query
          name: timestamps
          schema:
            $ref: '#/components/schemas/logshareTimestamps'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logshareLogsResponseJsonLines'
          description: Get logs received response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logshareApiResponseCommonFailure'
          description: Get logs received response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get logs received
      tags:
        - Logs Received
      x-api-token-group:
        - Logs Write
        - Logs Read
      x-cfPermissionsRequired:
        enum:
          - '#logs:read'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: logs
        resource_chain:
          - received
        method: get
  /zones/{zone_id}/logs/received/fields:
    get:
      description: >-
        Lists all fields available. The response is json object with key-value
        pairs, where keys are field names, and values are descriptions.
      operationId: get-zones-zone_id-logs-received-fields
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logshareFieldsResponse'
          description: List fields response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logshareApiResponseCommonFailure'
          description: List fields response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List fields
      tags:
        - Logs Received
      x-api-token-group:
        - Logs Write
        - Logs Read
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: logs
        resource_chain:
          - received
          - fields
        method: get
  /accounts/{account_id}/logs/explorer/datasets:
    get:
      description: >-
        Returns all Log Explorer datasets configured for the account or zone.
        Pass `include_zones=true` to also include zone-level datasets that
        belong to this account or zone. List responses omit the `fields`
        property; use the single-dataset endpoint to retrieve field
        configuration.
      parameters:
        - description: >-
            Set to true to include zone-scoped datasets belonging to this
            account.
          in: query
          name: include_zones
          schema:
            type: boolean
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexDatasetSummaryListResponse'
          description: The datasets the account or zone has configured.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: >-
            Invalid request, unsupported dataset, or invalid field
            configuration.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The caller lacks permission or entitlement to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The requested resource does not exist.
      security:
        - api_token: []
      summary: List account or zone datasets
      tags: []
      x-api-token-group:
        - Logs Write
        - Logs Read
      operationId: get_accounts_account_id_logs_explorer_datasets
    post:
      description: >-
        Create a new Log Explorer dataset for the account or zone. Use the
        `/account or zones/{account or
        zone_id}/logs/explorer/datasets/available` endpoint to list dataset
        types you can create along with their available fields. The `fields`
        property is optional. If not specified, all available fields will be
        enabled.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/lexCreateDatasetRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexDatasetDetailResponse'
          description: Dataset created successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: >-
            Invalid request, unsupported dataset, or invalid field
            configuration.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The caller lacks permission or entitlement to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The requested resource does not exist.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: A dataset of this type already exists for this account or zone.
      security:
        - api_token: []
      summary: Create an account or zone dataset
      tags: []
      x-api-token-group:
        - Logs Write
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      operationId: post_accounts_account_id_logs_explorer_datasets
  /zones/{zone_id}/logs/explorer/datasets:
    get:
      description: >-
        Returns all Log Explorer datasets configured for the account or zone.
        Pass `include_zones=true` to also include zone-level datasets that
        belong to this account or zone. List responses omit the `fields`
        property; use the single-dataset endpoint to retrieve field
        configuration.
      parameters:
        - description: >-
            Set to true to include zone-scoped datasets belonging to this
            account.
          in: query
          name: include_zones
          schema:
            type: boolean
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexDatasetSummaryListResponse'
          description: The datasets the account or zone has configured.
        '400':
          content:
            application/json:
              schema:
