        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The caller lacks permission or entitlement to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The requested resource does not exist.
      security:
        - api_token: []
      summary: List account or zone datasets
      tags: []
      x-api-token-group:
        - Logs Write
        - Logs Read
      operationId: get_zones_zone_id_logs_explorer_datasets
    post:
      description: >-
        Create a new Log Explorer dataset for the account or zone. Use the
        `/account or zones/{account or
        zone_id}/logs/explorer/datasets/available` endpoint to list dataset
        types you can create along with their available fields. The `fields`
        property is optional. If not specified, all available fields will be
        enabled.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/lexCreateDatasetRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexDatasetDetailResponse'
          description: Dataset created successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: >-
            Invalid request, unsupported dataset, or invalid field
            configuration.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The caller lacks permission or entitlement to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The requested resource does not exist.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: A dataset of this type already exists for this account or zone.
      security:
        - api_token: []
      summary: Create an account or zone dataset
      tags: []
      x-api-token-group:
        - Logs Write
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      operationId: post_zones_zone_id_logs_explorer_datasets
  /accounts/{account_id}/logs/explorer/datasets/available:
    get:
      description: >-
        Returns all dataset types that this account or zone can create. Each
        entry includes the dataset schema and timestamp field. The schema shows
        all possible fields for a dataset. However, not all fields may be
        available for your account or zone. When creating or updating a dataset,
        only fields available to your account or zone can be enabled. If you
        request a field that is not available, you will receive an error.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexAvailableDestinationListResponse'
          description: List of dataset types available to create.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: >-
            Invalid request, unsupported dataset, or invalid field
            configuration.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The caller lacks permission or entitlement to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: The requested resource does not exist.
      security:
        - api_token: []
      summary: List available account or zone datasets
      tags: []
      x-api-token-group:
        - Logs Write
        - Logs Read
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      operationId: get_accounts_account_id_logs_explorer_datasets_available
  /zones/{zone_id}/logs/explorer/datasets/available:
    get:
      description: >-
        Returns all dataset types that this account or zone can create. Each
        entry includes the dataset schema and timestamp field. The schema shows
        all possible fields for a dataset. However, not all fields may be
        available for your account or zone. When creating or updating a dataset,
        only fields available to your account or zone can be enabled. If you
        request a field that is not available, you will receive an error.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexAvailableDestinationListResponse'
          description: List of dataset types available to create.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lexSchemasErrorResponse'
          description: >-
