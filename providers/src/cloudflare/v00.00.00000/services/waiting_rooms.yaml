        If enabled, users in the prequeue will be shuffled randomly at the
        `event_start_time`. Requires that `prequeue_start_time` is not null.
        This is useful for situations when many users will join the event
        prequeue at the same time and you want to shuffle them to ensure
        fairness. Naturally, it makes the most sense to enable this feature when
        the `queueing_method` during the event respects ordering such as
        **fifo**, or else the shuffling may be unnecessary.
      type: boolean
      x-auditable: true
    waitingroomEventStartTime:
      description: >-
        An ISO 8601 timestamp that marks the start of the event. At this time,
        queued users will be processed with the event's configuration. The start
        time must be at least one minute before `event_end_time`.
      example: '2021-09-28T15:30:00.000Z'
      type: string
      x-auditable: true
    waitingroomEventSuspended:
      default: false
      description: >-
        Suspends or allows an event. If set to `true`, the event is ignored and
        traffic will be handled based on the waiting room configuration.
      type: boolean
      x-auditable: true
    waitingroomEventTotalActiveUsers:
      description: >-
        If set, the event will override the waiting room's `total_active_users`
        property while it is active. If null, the event will inherit it. This
        can only be set if the event's `new_users_per_minute` property is also
        set.
      maximum: 2147483647
      minimum: 200
      nullable: true
      type: integer
      x-auditable: true
    waitingroomEventTurnstileAction:
      description: >-
        If set, the event will override the waiting room's `turnstile_action`
        property while it is active. If null, the event will inherit it.
      enum:
        - log
        - infinite_queue
      nullable: true
      type: string
      x-auditable: true
    waitingroomEventTurnstileMode:
      description: >-
        If set, the event will override the waiting room's `turnstile_mode`
        property while it is active. If null, the event will inherit it.
      enum:
        - 'off'
        - invisible
        - visible_non_interactive
        - visible_managed
      nullable: true
      type: string
      x-auditable: true
    waitingroomHost:
      description: >-
        The host name to which the waiting room will be applied (no wildcards).
        Please do not include the scheme (http:// or https://). The host and
        path combination must be unique.
      example: shop.example.com
      type: string
      x-auditable: true
    waitingroomJsonResponseEnabled:
      default: false
      description: >-
        Only available for the Waiting Room Advanced subscription. If `true`,
        requests to the waiting room with the header `Accept: application/json`
        will receive a JSON response object with information on the user's
        status in the waiting room as opposed to the configured static HTML
        page. This JSON response object has one property `cfWaitingRoom` which
        is an object containing the following fields: 1. `inWaitingRoom`:
        Boolean indicating if the user is in the waiting room (always **true**).
        2. `waitTimeKnown`: Boolean indicating if the current estimated wait
        times are accurate. If **false**, they are not available. 3. `waitTime`:
        Valid only when `waitTimeKnown` is **true**. Integer indicating the
        current estimated time in minutes the user will wait in the waiting
        room. When `queueingMethod` is **random**, this is set to
        `waitTime50Percentile`. 4. `waitTime25Percentile`: Valid only when
        `queueingMethod` is **random** and `waitTimeKnown` is **true**. Integer
        indicating the current estimated maximum wait time for the 25% of users
        that gain entry the fastest (25th percentile). 5.
        `waitTime50Percentile`: Valid only when `queueingMethod` is **random**
        and `waitTimeKnown` is **true**. Integer indicating the current
        estimated maximum wait time for the 50% of users that gain entry the
        fastest (50th percentile). In other words, half of the queued users are
        expected to let into the origin website before `waitTime50Percentile`
        and half are expected to be let in after it. 6. `waitTime75Percentile`:
        Valid only when `queueingMethod` is **random** and `waitTimeKnown` is
        **true**. Integer indicating the current estimated maximum wait time for
        the 75% of users that gain entry the fastest (75th percentile). 7.
        `waitTimeFormatted`: String displaying the `waitTime` formatted in
        English for users. If `waitTimeKnown` is **false**, `waitTimeFormatted`
        will display **unavailable**. 8. `queueIsFull`: Boolean indicating if
        the waiting room's queue is currently full and not accepting new users
        at the moment. 9. `queueAll`: Boolean indicating if all users will be
        queued in the waiting room and no one will be let into the origin
        website. 10. `lastUpdated`: String displaying the timestamp as an ISO
        8601 string of the user's last attempt to leave the waiting room and be
        let into the origin website. The user is able to make another attempt
        after `refreshIntervalSeconds` past this time. If the user makes a
        request too soon, it will be ignored and `lastUpdated` will not change.
        11. `refreshIntervalSeconds`: Integer indicating the number of seconds
        after `lastUpdated` until the user is able to make another attempt to
        leave the waiting room and be let into the origin website. When the
        `queueingMethod` is `reject`, there is no specified refresh time —\_it
        will always be **zero**. 12. `queueingMethod`: The queueing method
        currently used by the waiting room. It is either **fifo**, **random**,
        **passthrough**, or **reject**. 13. `isFIFOQueue`: Boolean indicating if
        the waiting room uses a FIFO (First-In-First-Out) queue. 14.
        `isRandomQueue`: Boolean indicating if the waiting room uses a Random
        queue where users gain access randomly. 15. `isPassthroughQueue`:
        Boolean indicating if the waiting room uses a passthrough queue. Keep in
        mind that when passthrough is enabled, this JSON response will only
        exist when `queueAll` is **true** or `isEventPrequeueing` is **true**
        because in all other cases requests will go directly to the origin. 16.
        `isRejectQueue`: Boolean indicating if the waiting room uses a reject
        queue. 17. `isEventActive`: Boolean indicating if an event is currently
        occurring. Events are able to change a waiting room's behavior during a
        specified period of time. For additional information, look at the event
        properties `prequeue_start_time`, `event_start_time`, and
        `event_end_time` in the documentation for creating waiting room events.
        Events are considered active between these start and end times, as well
        as during the prequeueing period if it exists. 18. `isEventPrequeueing`:
        Valid only when `isEventActive` is **true**. Boolean indicating if an
        event is currently prequeueing users before it starts. 19.
        `timeUntilEventStart`: Valid only when `isEventPrequeueing` is **true**.
        Integer indicating the number of minutes until the event starts. 20.
        `timeUntilEventStartFormatted`: String displaying the
        `timeUntilEventStart` formatted in English for users. If
        `isEventPrequeueing` is **false**, `timeUntilEventStartFormatted` will
        display **unavailable**. 21. `timeUntilEventEnd`: Valid only when
        `isEventActive` is **true**. Integer indicating the number of minutes
        until the event ends. 22. `timeUntilEventEndFormatted`: String
        displaying the `timeUntilEventEnd` formatted in English for users. If
        `isEventActive` is **false**, `timeUntilEventEndFormatted` will display
        **unavailable**. 23. `shuffleAtEventStart`: Valid only when
        `isEventActive` is **true**. Boolean indicating if the users in the
        prequeue are shuffled randomly when the event starts. 24. `turnstile`:
        Empty when turnstile isn't enabled. String displaying an html tag to
        display the Turnstile widget. Please add the `{{{turnstile}}}` tag to
        the `custom_html` template to ensure the Turnstile widget appears. 25.
        `infiniteQueue`: Boolean indicating whether the response is for a user
        in the infinite queue. An example cURL to a waiting room could be: curl
        -X GET "https://example.com/waitingroom" \ -H "Accept: application/json"
        If `json_response_enabled` is **true** and the request hits the waiting
        room, an example JSON response when `queueingMethod` is **fifo** and no
        event is active could be: { "cfWaitingRoom": { "inWaitingRoom": true,
        "waitTimeKnown": true, "waitTime": 10, "waitTime25Percentile": 0,
        "waitTime50Percentile": 0, "waitTime75Percentile": 0,
        "waitTimeFormatted": "10 minutes", "queueIsFull": false, "queueAll":
        false, "lastUpdated": "2020-08-03T23:46:00.000Z",
        "refreshIntervalSeconds": 20, "queueingMethod": "fifo", "isFIFOQueue":
        true, "isRandomQueue": false, "isPassthroughQueue": false,
        "isRejectQueue": false, "isEventActive": false, "isEventPrequeueing":
        false, "timeUntilEventStart": 0, "timeUntilEventStartFormatted":
        "unavailable", "timeUntilEventEnd": 0, "timeUntilEventEndFormatted":
        "unavailable", "shuffleAtEventStart": false } } If
        `json_response_enabled` is **true** and the request hits the waiting
        room, an example JSON response when `queueingMethod` is **random** and
        an event is active could be: { "cfWaitingRoom": { "inWaitingRoom": true,
        "waitTimeKnown": true, "waitTime": 10, "waitTime25Percentile": 5,
        "waitTime50Percentile": 10, "waitTime75Percentile": 15,
        "waitTimeFormatted": "5 minutes to 15 minutes", "queueIsFull": false,
        "queueAll": false, "lastUpdated": "2020-08-03T23:46:00.000Z",
        "refreshIntervalSeconds": 20, "queueingMethod": "random", "isFIFOQueue":
        false, "isRandomQueue": true, "isPassthroughQueue": false,
        "isRejectQueue": false, "isEventActive": true, "isEventPrequeueing":
        false, "timeUntilEventStart": 0, "timeUntilEventStartFormatted":
        "unavailable", "timeUntilEventEnd": 15, "timeUntilEventEndFormatted":
        "15 minutes", "shuffleAtEventStart": true } }
      example: false
      type: boolean
      x-auditable: true
    waitingroomMaxEstimatedTimeMinutes:
      type: integer
      x-auditable: true
    waitingroomMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
