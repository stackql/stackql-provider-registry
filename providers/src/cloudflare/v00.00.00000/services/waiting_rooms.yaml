      description: >-
        Only available for the Waiting Room Advanced subscription. Additional
        hostname and path combinations to which this waiting room will be
        applied. There is an implied wildcard at the end of the path. The
        hostname and path combination must be unique to this and all other
        waiting rooms.
      items:
        properties:
          host:
            description: >-
              The hostname to which this waiting room will be applied (no
              wildcards). The hostname must be the primary domain, subdomain, or
              custom hostname (if using SSL for SaaS) of this zone. Please do
              not include the scheme (http:// or https://).
            example: shop2.example.com
            type: string
            x-auditable: true
          path:
            default: /
            description: >-
              Sets the path within the host to enable the waiting room on. The
              waiting room will be enabled for all subpaths as well. If there
              are two waiting rooms on the same subpath, the waiting room for
              the most specific path will be chosen. Wildcards and query
              parameters are not supported.
            example: /shop2/checkout
            type: string
            x-auditable: true
        type: object
      type: array
    waitingroomCookieAttributes:
      description: >-
        Configures cookie attributes for the waiting room cookie. This encrypted
        cookie stores a user's status in the waiting room, such as queue
        position.
      properties:
        samesite:
          default: auto
          description: >-
            Configures the SameSite attribute on the waiting room cookie. Value
            `auto` will be translated to `lax` or `none` depending if **Always
            Use HTTPS** is enabled. Note that when using value `none`, the
            secure attribute cannot be set to `never`.
          enum:
            - auto
            - lax
            - none
            - strict
          example: auto
          type: string
          x-auditable: true
        secure:
          default: auto
          description: >-
            Configures the Secure attribute on the waiting room cookie. Value
            `always` indicates that the Secure attribute will be set in the
            Set-Cookie header, `never` indicates that the Secure attribute will
            not be set, and `auto` will set the Secure attribute depending if
            **Always Use HTTPS** is enabled.
          enum:
