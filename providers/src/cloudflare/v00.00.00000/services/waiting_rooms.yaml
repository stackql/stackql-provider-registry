  /zones/{zone_id}/waiting_rooms/preview:
    post:
      description: >-
        Creates a waiting room page preview. Upload a custom waiting room page
        for preview. You will receive a preview URL in the form
        `http://waitingrooms.dev/preview/<uuid>`. You can use the following
        query parameters to change the state of the preview: 1. `force_queue`:
        Boolean indicating if all users will be queued in the waiting room and
        no one will be let into the origin website (also known as queueAll). 2.
        `queue_is_full`: Boolean indicating if the waiting room's queue is
        currently full and not accepting new users at the moment. 3.
        `queueing_method`: The queueing method currently used by the waiting
        room. - **fifo** indicates a FIFO queue. - **random** indicates a Random
        queue. - **passthrough** indicates a Passthrough queue. Keep in mind
        that the waiting room page will only be displayed if `force_queue=true`
        or `event=prequeueing` — for other cases the request will pass through
        to the origin. For our preview, this will be a fake origin website
        returning \"Welcome\". - **reject** indicates a Reject queue. 4.
        `event`: Used to preview a waiting room event. - **none** indicates no
        event is occurring. - **prequeueing** indicates that an event is
        prequeueing (between `prequeue_start_time` and `event_start_time`). -
        **started** indicates that an event has started (between
        `event_start_time` and `event_end_time`). 5. `shuffle_at_event_start`:
        Boolean indicating if the event will shuffle users in the prequeue when
        it starts. This can only be set to **true** if an event is active
        (`event` is not **none**). For example, you can make a request to
        `http://waitingrooms.dev/preview/<uuid>?force_queue=false&queue_is_full=false&queueing_method=random&event=started&shuffle_at_event_start=true`
        6. `waitTime`: Non-zero, positive integer indicating the estimated wait
        time in minutes. The default value is 10 minutes. For example, you can
        make a request to `http://waitingrooms.dev/preview/<uuid>?waitTime=50`
        to configure the estimated wait time as 50 minutes.
      operationId: waiting-room-create-a-custom-waiting-room-page-preview
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/waitingroomQueryPreview'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/waitingroomPreviewResponse'
          description: Create a custom waiting room page preview response
        4XX:
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
                properties:
                  result:
                    type: object
                    properties:
                      preview_url:
                        $ref: '#/components/schemas/waitingroomPreviewUrl'
                    enum:
                      - null
                  errors:
                    minLength: 1
                    $ref: '#/components/schemas/waitingroomMessages'
                  messages:
                    $ref: '#/components/schemas/waitingroomMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - false
                    type: boolean
          description: Create a custom waiting room page preview response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create a custom waiting room page preview
      tags:
        - Waiting Room
      x-api-token-group:
        - Waiting Rooms Write
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: waiting_rooms
        resource_chain:
          - page
        method: preview
