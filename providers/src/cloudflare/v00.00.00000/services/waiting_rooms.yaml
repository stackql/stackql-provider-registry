        - description: Page number of paginated results.
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: number
        - description: Maximum number of results per page. Must be a multiple of 5.
          in: query
          name: per_page
          schema:
            default: 25
            maximum: 1000
            minimum: 5
            type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/waitingroomResponseCollection'
          description: List waiting rooms for account or zone response
        4XX:
