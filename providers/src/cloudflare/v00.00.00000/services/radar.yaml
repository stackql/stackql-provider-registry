openapi: 3.0.3
info:
  title: radar API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /radar/agent_readiness/summary/{dimension}:
    get:
      description: Returns a summary of AI agent readiness scores across scanned domains, grouped by the specified dimension. Data is sourced from weekly bulk scans. All values are raw domain counts.
      operationId: radar-get-agent-readiness-summary
      parameters:
      - description: Specifies the agent readiness data dimension by which to group the results.
        in: path
        name: dimension
        schema:
          description: Specifies the agent readiness data dimension by which to group the results.
          enum:
          - CHECK
          type: string
        required: true
      - description: Filters results by the specified date.
        in: query
        name: date
        schema:
          description: Filters results by the specified date.
          format: date
          type: string
      - description: Filters results by domain category.
        in: query
        name: domainCategory
        schema:
          description: Filters results by domain category.
          items:
            maxLength: 100
            type: string
          type: array
        explode: true
      - description: Array of names used to label the series in the response.
        in: query
        name: name
        schema:
          description: Array of names used to label the series in the response.
          items:
            type: string
          type: array
        explode: true
      - description: Format in which results will be returned.
        in: query
        name: format
        schema:
          description: Format in which results will be returned.
          enum:
          - JSON
          - CSV
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      meta:
                        properties:
                          date:
                            description: Date of the returned scan (YYYY-MM-DD). May differ from the requested date if no scan exists for that exact date.
                            type: string
                          domainCategories:
                            description: Available domain sub-categories with their scan counts. Use as filter options for the domainCategory parameter.
                            items:
                              properties:
                                name:
                                  description: Sub-category name.
                                  type: string
                                value:
                                  description: Number of successfully scanned domains in this sub-category.
                                  type: integer
                              required:
                              - name
                              - value
                              type: object
                            type: array
                          lastUpdated:
                            description: Timestamp of the last dataset update.
                            format: date-time
                            type: string
                          normalization:
                            description: Normalization method applied to the results. Refer to [Normalization methods](https://developers.cloudflare.com/radar/concepts/normalization/).
                            enum:
                            - PERCENTAGE
                            - MIN0_MAX
                            - MIN_MAX
                            - RAW_VALUES
                            - PERCENTAGE_CHANGE
                            - ROLLING_AVERAGE
                            - OVERLAPPED_PERCENTAGE
                            - RATIO
                            type: string
                          successfulDomains:
                            description: Domains successfully scanned (excludes errors).
                            type: integer
                          totalDomains:
                            description: Total domains attempted in the scan.
                            type: integer
                          units:
                            description: Measurement units for the results.
                            items:
                              properties:
                                name:
                                  type: string
                                value:
                                  type: string
                              required:
                              - name
                              - value
                              type: object
                            type: array
                        required:
                        - date
                        - totalDomains
                        - successfulDomains
                        - normalization
                        - lastUpdated
                        - units
                        - domainCategories
                        type: object
                      summary_0:
                        type: object
                    required:
                    - summary_0
                    - meta
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                type: object
          description: Successful response.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad request.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get agent readiness summary
      tags:
      - Radar Agent Readiness
      x-api-token-group:
      - User Details Write
      - User Details Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: radar
        resource_chain:
        - agent_readiness
        method: summary
  /radar/ai/bots/summary/user_agent:
    get:
      deprecated: true
      description: Retrieves the distribution of traffic by AI user agent.
      operationId: radar-get-ai-bots-summary-by-user-agent
      parameters:
      - description: Array of names used to label the series in the response.
        in: query
        name: name
        schema:
          description: Array of names used to label the series in the response.
          items:
            type: string
          type: array
        explode: true
      - description: Filters results by date range. For example, use `7d` and `7dcontrol` to compare this week with the previous week. Use this parameter or set specific start and end dates (`dateStart` and `dateEnd` parameters).
        in: query
        name: dateRange
        schema:
          description: Filters results by date range. For example, use `7d` and `7dcontrol` to compare this week with the previous week. Use this parameter or set specific start and end dates (`dateStart` and `dateEnd` parameters).
          items:
            type: string
          type: array
        explode: true
      - description: Start of the date range.
        in: query
        name: dateStart
        schema:
          description: Start of the date range.
          items:
            format: date-time
            type: string
          type: array
        explode: true
      - description: End of the date range (inclusive).
        in: query
        name: dateEnd
        schema:
          description: End of the date range (inclusive).
          items:
            format: date-time
            type: string
          type: array
        explode: true
      - description: Filters results by Autonomous System. Specify one or more Autonomous System Numbers (ASNs) as a comma-separated list. Prefix with `-` to exclude ASNs from results. For example, `-174, 3356` excludes results from AS174, but includes results from AS3356.
        in: query
        name: asn
        schema:
          description: Filters results by Autonomous System. Specify one or more Autonomous System Numbers (ASNs) as a comma-separated list. Prefix with `-` to exclude ASNs from results. For example, `-174, 3356` excludes results from AS174, but includes results from AS3356.
          items:
            type: string
          type: array
        explode: true
      - description: Filters results by location. Specify a comma-separated list of alpha-2 codes. Prefix with `-` to exclude locations from results. For example, `-US,PT` excludes results from the US, but includes results from PT.
        in: query
        name: location
        schema:
          description: Filters results by location. Specify a comma-separated list of alpha-2 codes. Prefix with `-` to exclude locations from results. For example, `-US,PT` excludes results from the US, but includes results from PT.
          items:
            type: string
          type: array
        explode: true
      - description: Filters results by continent. Specify a comma-separated list of alpha-2 codes. Prefix with `-` to exclude continents from results. For example, `-EU,NA` excludes results from EU, but includes results from NA.
        in: query
        name: continent
        schema:
          description: Filters results by continent. Specify a comma-separated list of alpha-2 codes. Prefix with `-` to exclude continents from results. For example, `-EU,NA` excludes results from EU, but includes results from NA.
          items:
            type: string
          type: array
        explode: true
      - description: Limits the number of objects per group to the top items within the specified time range. When item count exceeds the limit, extra items appear grouped under an "other" category.
        in: query
        name: limitPerGroup
        schema:
          description: Limits the number of objects per group to the top items within the specified time range. When item count exceeds the limit, extra items appear grouped under an "other" category.
          type: integer
      - description: Format in which results will be returned.
        in: query
        name: format
        schema:
          description: Format in which results will be returned.
          enum:
          - JSON
          - CSV
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      meta:
                        description: Metadata for the results.
                        properties:
                          confidenceInfo:
                            properties:
                              annotations:
                                items:
                                  $ref: '#/components/schemas/unnamedSchemaRefB5f3bd1840490bc487ffef84567807b1'
                                type: array
                              level:
                                description: Provides an indication of how much confidence Cloudflare has in the data.
                                type: integer
                            required:
                            - level
                            - annotations
                            type: object
                          dateRange:
                            items:
                              $ref: '#/components/schemas/unnamedSchemaRefBaac9d7da12de53e99142f8ecd3982e5'
                            type: array
                          lastUpdated:
                            description: Timestamp of the last dataset update.
                            format: date-time
                            type: string
                          normalization:
                            description: Normalization method applied to the results. Refer to [Normalization methods](https://developers.cloudflare.com/radar/concepts/normalization/).
                            enum:
                            - PERCENTAGE
                            - MIN0_MAX
                            - MIN_MAX
                            - RAW_VALUES
                            - PERCENTAGE_CHANGE
                            - ROLLING_AVERAGE
                            - OVERLAPPED_PERCENTAGE
                            - RATIO
                            type: string
                          units:
                            description: Measurement units for the results.
                            items:
                              properties:
                                name:
                                  type: string
                                value:
                                  type: string
                              required:
                              - name
                              - value
                              type: object
                            type: array
                        required:
                        - dateRange
                        - confidenceInfo
                        - normalization
                        - lastUpdated
                        - units
                        type: object
                      summary_0:
                        type: object
                    required:
                    - summary_0
                    - meta
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                type: object
          description: Successful response.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad request.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get AI user agents summary
      tags:
      - Radar AI Bots
      x-api-token-group:
      - User Details Write
      - User Details Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stainless-deprecation-message: Use [Radar AI Bots Summary By Dimension](https://developers.cloudflare.com/api/resources/radar/subresources/ai/subresources/bots/methods/summary_v2/) instead.
      x-stackql-sdk:
        service: radar
        resource_chain:
        - ai
        - bots
        - summary
        method: user_agent
