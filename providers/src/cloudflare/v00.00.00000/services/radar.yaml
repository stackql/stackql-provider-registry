      description: Retrieves the sum of Internet traffic anomalies, grouped by location. These anomalies are signals that might indicate an outage, automatically detected by Radar and manually verified by our team.
      operationId: radar-get-traffic-anomalies-top
      parameters:
      - description: Limits the number of objects returned in the response.
        in: query
        name: limit
        schema:
          description: Limits the number of objects returned in the response.
          exclusiveMinimum: true
          minimum: 0
          type: integer
      - description: Filters results by date range.
        in: query
        name: dateRange
        schema:
          description: Filters results by date range.
          type: string
      - description: Start of the date range (inclusive).
        in: query
        name: dateStart
        schema:
          description: Start of the date range (inclusive).
          format: date-time
          type: string
      - description: End of the date range (inclusive).
        in: query
        name: dateEnd
        schema:
          description: End of the date range (inclusive).
          format: date-time
          type: string
      - in: query
        name: status
        schema:
          enum:
          - VERIFIED
          - UNVERIFIED
          type: string
      - description: Format in which results will be returned.
        in: query
        name: format
        schema:
          description: Format in which results will be returned.
          enum:
          - JSON
          - CSV
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      trafficAnomalies:
                        items:
                          $ref: '#/components/schemas/unnamedSchemaRef83a14d589e799bc901b9ccc870251d09'
                        type: array
                    required:
                    - trafficAnomalies
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                type: object
          description: List of locations with number of traffic anomalies.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad request.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get top locations by total traffic anomalies
      tags:
      - Radar Traffic Anomalies
      x-api-token-group:
      - User Details Write
      - User Details Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: radar
        resource_chain:
        - traffic_anomalies
        - locations
        method: get
