openapi: 3.0.3
info:
  title: tenants API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /tenants/{tenant_id}:
    get:
      description: Retrieves a Tenant by Tenant ID.
      operationId: Tenants_retrieveTenant
      parameters:
        - in: path
          name: tenant_id
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    $ref: '#/components/schemas/organizationsApiTenant'
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: Get tenant
      tags:
        - Tenants
  /tenants/{tenant_id}/account_types:
    get:
      description: List of account types available for the Tenant to provision accounts.
      operationId: Tenants_validAccountTypes
      parameters:
        - in: path
          name: tenant_id
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    items:
                      type: string
                    type: array
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: Get tenant account types
      tags:
        - Tenants
  /tenants/{tenant_id}/accounts:
    get:
      description: List of accounts for the Tenant.
      operationId: Tenants_listAccounts
      parameters:
        - in: path
          name: tenant_id
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    items:
                      $ref: '#/components/schemas/organizationsApiAccount'
                    type: array
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: List tenant accounts
      tags:
        - Tenants
  /tenants/{tenant_id}/entitlements:
    get:
      description: List of innate entitlements available for the Tenant.
      operationId: Tenants_listEntitlements
      parameters:
        - in: path
          name: tenant_id
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    $ref: '#/components/schemas/organizationsApiInnateEntitlements'
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: List tenant entitlements
      tags:
        - Tenants
  /tenants/{tenant_id}/memberships:
    get:
      description: List of active members (Cloudflare users) for the Tenant.
      operationId: Tenants_listMemberships
      parameters:
        - in: path
          name: tenant_id
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    items:
                      $ref: '#/components/schemas/organizationsApiTenantMembership'
                    type: array
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: List tenant memberships
      tags:
        - Tenants
components:
  schemas:
    organizationsApiAccount:
      properties:
        created_on:
          format: date-time
          type: string
          readOnly: true
        id:
          type: string
        name:
          nullable: true
          type: string
        settings:
          properties:
            abuse_contact_email:
              nullable: true
              type: string
            access_approval_expiry:
              format: date-time
              nullable: true
              type: string
            api_access_enabled:
              nullable: true
              type: boolean
            default_nameservers:
              deprecated: true
              description: >-
                Use [DNS
                Settings](https://developers.cloudflare.com/api/operations/dns-settings-for-an-account-list-dns-settings)
                instead. Deprecated.
              nullable: true
              type: string
            enforce_twofactor:
              nullable: true
              type: boolean
            use_account_custom_ns_by_default:
              deprecated: true
              description: >-
                Use [DNS
                Settings](https://developers.cloudflare.com/api/operations/dns-settings-for-an-account-list-dns-settings)
                instead. Deprecated.
              nullable: true
              type: boolean
          required:
            - enforce_twofactor
            - api_access_enabled
            - access_approval_expiry
            - abuse_contact_email
            - use_account_custom_ns_by_default
            - default_nameservers
          type: object
        type:
          enum:
            - standard
            - enterprise
          type: string
      required:
        - id
        - name
        - type
        - settings
        - created_on
      type: object
    organizationsApiBoolAllocation:
      properties:
        type:
          enum:
            - bool
          type: string
        value:
          type: boolean
      required:
        - type
        - value
      type: object
    organizationsApiEntitlement:
      properties:
        allocation:
          type: object
          properties:
            type:
              enum:
                - max_count
              type: string
            value:
              type: integer
          required:
            - type
        feature:
          $ref: '#/components/schemas/organizationsApiFeature'
      required:
        - feature
        - allocation
      type: object
    organizationsApiFeature:
      properties:
        key:
          type: string
      required:
        - key
      type: object
    organizationsApiInnateEntitlements:
      properties:
        allow_add_subdomain:
          $ref: '#/components/schemas/organizationsApiBoolAllocation'
        allow_auto_accept_invites:
          $ref: '#/components/schemas/organizationsApiBoolAllocation'
        cname_setup_allowed:
          $ref: '#/components/schemas/organizationsApiBoolAllocation'
        custom_entitlements:
          items:
            $ref: '#/components/schemas/organizationsApiEntitlement'
          nullable: true
          type: array
        mhs_certificate_count:
          $ref: '#/components/schemas/organizationsApiMaxCountAllocation'
        partial_setup_allowed:
          $ref: '#/components/schemas/organizationsApiBoolAllocation'
      required:
        - allow_add_subdomain
        - cname_setup_allowed
        - partial_setup_allowed
        - allow_auto_accept_invites
        - mhs_certificate_count
        - custom_entitlements
      type: object
    organizationsApiMaxCountAllocation:
      properties:
        type:
          enum:
            - max_count
          type: string
        value:
          type: integer
      required:
        - type
        - value
      type: object
    organizationsApiTenant:
      properties:
        cdate:
          format: date-time
          type: string
        customer_id:
          type: string
        edate:
          format: date-time
          type: string
        tenant_contacts:
          properties:
            email:
              type: string
            website:
              type: string
          type: object
        tenant_labels:
          items:
            type: string
          type: array
        tenant_metadata:
          properties:
            dns:
              properties:
                ns_pool:
                  properties:
                    primary:
                      type: string
                    secondary:
                      type: string
                  type: object
              required:
                - ns_pool
              type: object
          type: object
        tenant_name:
          type: string
        tenant_network:
          type: object
        tenant_status:
          type: string
        tenant_tag:
          type: string
        tenant_type:
          type: string
        tenant_units:
          items:
            $ref: '#/components/schemas/organizationsApiTenantUnit'
          type: array
      required:
        - tenant_tag
        - tenant_name
        - tenant_labels
        - tenant_type
        - tenant_status
        - tenant_metadata
        - tenant_contacts
        - cdate
        - edate
        - tenant_network
        - tenant_units
      type: object
    organizationsApiTenantMembership:
      properties:
        user_email:
          type: string
        user_name:
          type: string
        user_tag:
          type: string
      required:
        - user_tag
        - user_email
        - user_name
      type: object
    organizationsApiTenantUnit:
      properties:
        unit_memberships:
          items:
            type: object
          type: array
        unit_metadata:
          type: object
        unit_name:
          type: string
        unit_status:
          type: string
        unit_tag:
          type: string
      required:
        - unit_tag
        - unit_name
        - unit_status
        - unit_metadata
        - unit_memberships
      type: object
    organizationsApiV4ErrorResponse:
      properties:
        errors:
          items:
            $ref: '#/components/schemas/organizationsApiV4Message'
          type: array
        messages:
          items:
            $ref: '#/components/schemas/organizationsApiV4Message'
          type: array
        result:
          type: object
        success:
          enum:
            - false
          type: boolean
      required:
        - success
        - errors
        - messages
      type: object
    organizationsApiV4Message:
      $ref: '#/components/schemas/responseInfo'
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
        - code
        - message
      type: object
      uniqueItems: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    tenants:
      id: cloudflare.tenants.tenants
      name: tenants
      title: Tenants
      methods:
        get:
          operation:
            $ref: '#/paths/~1tenants~1{tenant_id}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/tenants/methods/get'
        insert: []
        update: []
        delete: []
        replace: []
    account_types:
      id: cloudflare.tenants.account_types
      name: account_types
      title: Account Types
      methods:
        list:
          operation:
            $ref: '#/paths/~1tenants~1{tenant_id}~1account_types/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/account_types/methods/list'
        insert: []
        update: []
        delete: []
        replace: []
    accounts:
      id: cloudflare.tenants.accounts
      name: accounts
      title: Accounts
      methods:
        list:
          operation:
            $ref: '#/paths/~1tenants~1{tenant_id}~1accounts/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/accounts/methods/list'
        insert: []
        update: []
        delete: []
        replace: []
    entitlements:
      id: cloudflare.tenants.entitlements
      name: entitlements
      title: Entitlements
      methods:
        list:
          operation:
            $ref: '#/paths/~1tenants~1{tenant_id}~1entitlements/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/entitlements/methods/list'
        insert: []
        update: []
        delete: []
        replace: []
    memberships:
      id: cloudflare.tenants.memberships
      name: memberships
      title: Memberships
      methods:
        list:
          operation:
            $ref: '#/paths/~1tenants~1{tenant_id}~1memberships/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/memberships/methods/list'
        insert: []
        update: []
        delete: []
        replace: []
