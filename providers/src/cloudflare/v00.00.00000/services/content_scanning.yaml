openapi: 3.0.3
info:
  title: content_scanning API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/content-upload-scan/disable:
    post:
      description: Disable Content Scanning.
      operationId: waf-content-scanning-disable
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/wafProductApiBundleSchemasApiResponseCommon
          description: Disable Content Scanning response.
        4XX:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/wafProductApiBundleSchemasApiResponseCommonFailure
          description: Disable Content Scanning failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Disable Content Scanning
      tags:
        - Content Scanning
      x-api-token-group:
        - Zone WAF Write
        - Account WAF Write
      x-stackql-sdk:
        service: content_scanning
        resource_chain: []
        method: disable
  /zones/{zone_id}/content-upload-scan/enable:
    post:
      description: Enable Content Scanning.
      operationId: waf-content-scanning-enable
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/wafProductApiBundleSchemasApiResponseCommon
          description: Enable Content Scanning response.
        4XX:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/wafProductApiBundleSchemasApiResponseCommonFailure
          description: Enable Content Scanning failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Enable Content Scanning
      tags:
        - Content Scanning
      x-api-token-group:
        - Zone WAF Write
        - Account WAF Write
      x-stackql-sdk:
        service: content_scanning
        resource_chain: []
        method: enable
  /zones/{zone_id}/content-upload-scan/payloads:
    get:
      description: Get a list of existing custom scan expressions for Content Scanning.
      operationId: waf-content-scanning-list-custom-scan-expressions
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/wafProductApiBundleResponseCustomScanCollection
          description: List existing Content Scan custom scan expressions response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/wafProductApiBundleMessages'
                  messages:
                    $ref: '#/components/schemas/wafProductApiBundleMessages'
                  result:
                    items:
                      type: object
                      $ref: '#/components/schemas/wafProductApiBundleCustomScan'
                    nullable: true
                    type: array
                    enum:
                      - null
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: List existing Content Scan custom scan expressions failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Existing Custom Scan Expressions
      tags:
        - Content Scanning
      x-api-token-group:
        - Zone WAF Write
        - Zone WAF Read
        - Account WAF Write
        - Account WAF Read
      x-stackql-sdk:
        service: content_scanning
        resource_chain:
          - payloads
        method: create
    post:
      description: Add custom scan expressions for Content Scanning.
      operationId: waf-content-scanning-add-custom-scan-expressions
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              items:
                properties:
                  payload:
                    $ref: '#/components/schemas/wafProductApiBundleCustomScanPayload'
                required:
                  - payload
                type: object
              type: array
        description: Array of custom scan expressions to add.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/wafProductApiBundleResponseCustomScanCollection
          description: Add custom scan expressions for Content Scanning.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/wafProductApiBundleMessages'
                  messages:
                    $ref: '#/components/schemas/wafProductApiBundleMessages'
                  result:
                    items:
                      type: object
                      $ref: '#/components/schemas/wafProductApiBundleCustomScan'
                    nullable: true
                    type: array
                    enum:
                      - null
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: List existing Content Scan custom scan expressions failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Add Custom Scan Expressions
      tags:
        - Content Scanning
      x-api-token-group:
        - Zone WAF Write
        - Account WAF Write
  /zones/{zone_id}/content-upload-scan/payloads/{expression_id}:
    delete:
      description: Delete a Content Scan Custom Expression.
      operationId: waf-content-scanning-delete-custom-scan-expressions
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: expression_id
          schema:
            $ref: '#/components/schemas/wafProductApiBundleCustomScanId'
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/wafProductApiBundleResponseCustomScanCollection
          description: Delete Content Scan custom scan expressions response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/wafProductApiBundleMessages'
                  messages:
                    $ref: '#/components/schemas/wafProductApiBundleMessages'
                  result:
                    items:
                      type: object
                      $ref: '#/components/schemas/wafProductApiBundleCustomScan'
                    nullable: true
                    type: array
                    enum:
                      - null
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Delete Content Scan custom scan expressions failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete a Custom Scan Expression
      tags:
        - Content Scanning
      x-api-token-group:
        - Zone WAF Write
        - Account WAF Write
  /zones/{zone_id}/content-upload-scan/settings:
    get:
      description: Retrieve the current status of Content Scanning.
      operationId: waf-content-scanning-get-status
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/wafProductApiBundleSchemasResponseStatus'
          description: Get Content Scanning status response.
        4XX:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/wafProductApiBundleSchemasApiResponseCommonFailure
          description: Get Content Scanning status failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Content Scanning Status
      tags:
        - Content Scanning
      x-api-token-group:
        - Zone WAF Write
        - Zone WAF Read
        - Account WAF Write
        - Account WAF Read
      x-stackql-sdk:
        service: content_scanning
        resource_chain: []
        method: get
    put:
      description: Update the Content Scanning status.
      operationId: waf-content-scanning-update-settings
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                value:
                  description: The status value for Content Scanning.
                  enum:
                    - enabled
                    - disabled
                  type: string
              required:
                - value
              type: object
        description: Content Scanning settings to update.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/wafProductApiBundleSchemasResponseStatus'
          description: Update Content Scanning settings response.
        4XX:
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/wafProductApiBundleSchemasApiResponseCommonFailure
          description: Update Content Scanning settings failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Content Scanning Status
      tags:
        - Content Scanning
      x-api-token-group:
        - Zone WAF Write
        - Account WAF Write
      x-stackql-sdk:
        service: content_scanning
        resource_chain: []
        method: create
components:
  schemas:
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
        - code
        - message
      type: object
      uniqueItems: true
    wafProductApiBundleCustomScan:
      description: Defines a custom scan expression to match Content Scanning on.
      properties:
        id:
          $ref: '#/components/schemas/wafProductApiBundleCustomScanId'
        payload:
          $ref: '#/components/schemas/wafProductApiBundleCustomScanPayload'
      type: object
    wafProductApiBundleCustomScanId:
      description: defines the unique ID for this custom scan expression.
      example: a350a054caa840c9becd89c3b4f0195b
      $ref: '#/components/schemas/wafProductApiBundleIdentifier'
    wafProductApiBundleCustomScanPayload:
      description: Defines the ruleset expression to use in matching content objects.
      example: lookup_json_string(http.request.body.raw, "file")
      type: string
      x-auditable: true
    wafProductApiBundleIdentifier:
      description: Defines an identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    wafProductApiBundleMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    wafProductApiBundleResponseCustomScanCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/wafProductApiBundleMessages'
        messages:
          $ref: '#/components/schemas/wafProductApiBundleMessages'
        result:
          items:
            type: object
            $ref: '#/components/schemas/wafProductApiBundleCustomScan'
          nullable: true
          type: array
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
    wafProductApiBundleSchemasApiResponseCommon:
      properties:
        errors:
          $ref: '#/components/schemas/wafProductApiBundleMessages'
        messages:
          $ref: '#/components/schemas/wafProductApiBundleMessages'
        result: {}
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    wafProductApiBundleSchemasApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 10000
              message: Authentication error
          minLength: 1
          $ref: '#/components/schemas/wafProductApiBundleMessages'
        messages:
          example: []
          $ref: '#/components/schemas/wafProductApiBundleMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    wafProductApiBundleSchemasResponseStatus:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/wafProductApiBundleMessages'
        messages:
          $ref: '#/components/schemas/wafProductApiBundleMessages'
        result:
          $ref: '#/components/schemas/wafProductApiBundleSchemasStatus'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
    wafProductApiBundleSchemasStatus:
      description: Defines the status for Content Scanning.
      properties:
        modified:
          description: >-
            Defines the last modification date (ISO 8601) of the Content
            Scanning status.
          example: '2024-12-02T09:57:23.150259Z'
          type: string
          x-auditable: true
        value:
          description: Defines the status of Content Scanning.
          example: enabled
          type: string
          x-auditable: true
      type: object
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    settings:
      id: cloudflare.content_scanning.settings
      name: settings
      title: Settings
      methods:
        disable:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1content-upload-scan~1disable/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        enable:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1content-upload-scan~1enable/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1content-upload-scan~1settings/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1content-upload-scan~1settings/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/settings/methods/list'
        insert: []
        update: []
        delete: []
        replace:
          - $ref: '#/components/x-stackQL-resources/settings/methods/create'
    payloads:
      id: cloudflare.content_scanning.payloads
      name: payloads
      title: Payloads
      methods:
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1content-upload-scan~1payloads/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        waf_content_scanning_add_custom_scan_expressions:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1content-upload-scan~1payloads/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        waf_content_scanning_delete_custom_scan_expressions:
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1content-upload-scan~1payloads~1{expression_id}/delete
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/payloads/methods/list'
        insert:
          - $ref: >-
              #/components/x-stackQL-resources/payloads/methods/waf_content_scanning_add_custom_scan_expressions
        update: []
        delete:
          - $ref: >-
              #/components/x-stackQL-resources/payloads/methods/waf_content_scanning_delete_custom_scan_expressions
        replace: []
