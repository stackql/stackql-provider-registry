openapi: 3.0.3
info:
  title: organizations API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/organizations:
    get:
      description: >-
        Retrieve a list of the organizations that "contain" this account or are
        managing it. The returned list will be in order from "root" to "leaf",
        where the "leaf" will be the organization that _immediately_ contains
        the specified account.
      operationId: Accounts_listAccountOrganizations
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    items:
                      $ref: '#/components/schemas/organizationsApiOrganization'
                    type: array
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: List account organizations
      tags:
        - Accounts
      x-api-token-group:
        - Trust and Safety Write
        - Trust and Safety Read
        - DNS View Write
        - DNS View Read
        - SCIM Provisioning
        - Load Balancers Account Write
        - Load Balancers Account Read
        - 'Zero Trust: PII Read'
        - DDoS Botnet Feed Write
        - DDoS Botnet Feed Read
        - Workers R2 Storage Write
        - Workers R2 Storage Read
        - DDoS Protection Write
        - DDoS Protection Read
        - Workers Tail Read
        - Workers KV Storage Write
        - Workers KV Storage Read
        - Workers Scripts Write
        - Workers Scripts Read
        - 'Load Balancing: Monitors and Pools Write'
        - 'Load Balancing: Monitors and Pools Read'
        - Account Firewall Access Rules Write
        - Account Firewall Access Rules Read
        - DNS Firewall Write
        - DNS Firewall Read
        - Billing Write
        - Billing Read
        - Account Settings Write
        - Account Settings Read
  /organizations:
    get:
      description: >-
        Retrieve a list of organizations a particular user has access to.
        (Currently in Closed Beta - see
        https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Organization_listOrganizations
      parameters:
        - description: >-
            Only return organizations with the specified IDs (ex.
            id=foo&id=bar). Send multiple elements by repeating the query value.
          explode: false
          in: query
          name: id
          schema:
            items:
              $ref: '#/components/schemas/organizationsApiOrganizationID'
            type: array
        - description: >-
            (case-sensitive) Filter the list of organizations to where the name
            is equal to a particular string.
          explode: false
          in: query
          name: name
          schema:
            type: string
        - description: >-
            (case-insensitive) Filter the list of organizations to where the
            name starts with a particular string.
          explode: false
          in: query
          name: name.startsWith
          schema:
            type: string
        - description: >-
            (case-insensitive) Filter the list of organizations to where the
            name ends with a particular string.
          explode: false
          in: query
          name: name.endsWith
          schema:
            type: string
        - description: >-
            (case-insensitive) Filter the list of organizations to where the
            name contains a particular string.
          explode: false
          in: query
          name: name.contains
          schema:
            type: string
        - description: >-
            Filter the list of organizations to the ones that contain this
            particular account.
          explode: false
          in: query
          name: containing.account
          schema:
            type: string
        - description: >-
            Filter the list of organizations to the ones that contain this
            particular user. IMPORTANT: Just because an organization "contains"
            a user is not a representation of any authorization or privilege to
            manage any resources therein. An organization "containing" a user
            simply means the user is managed by that organization.
          explode: false
          in: query
          name: containing.user
          schema:
            type: string
        - description: >-
            Filter the list of organizations to the ones that contain this
            particular organization.
          explode: false
          in: query
          name: containing.organization
          schema:
            type: string
        - description: >-
            Filter the list of organizations to the ones that are a
            sub-organization of the specified organization. "null" is a valid
            value to provide for this parameter. It means "where an organization
            has no parent (i.e. it is a 'root' organization)."
          explode: false
          in: query
          name: parent.id
          schema:
            type: string
            title: Organization ID
            enum:
              - 'null'
        - description: >-
            An opaque token returned from the last list response that when
            provided will retrieve the next page. Parameters used to filter the
            retrieved list must remain in subsequent requests with a page token.
          explode: false
          in: query
          name: page_token
          schema:
            type: string
        - description: The amount of items to return. Defaults to 10.
          explode: false
          in: query
          name: page_size
          schema:
            maximum: 1000
            minimum: 0
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    items:
                      $ref: '#/components/schemas/organizationsApiOrganization'
                    type: array
                  result_info:
                    $ref: '#/components/schemas/organizationsApiPageTokenResultInfo'
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - result_info
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: List organizations the user has access to
      tags:
        - Organizations
      x-api-token-group:
        - User Details Write
        - User Details Read
      x-stackql-sdk:
        service: organizations
        resource_chain: []
        method: list
    post:
      description: >-
        Create a new organization for a user. (Currently in Closed Beta - see
        https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Organizations_createUserOrganization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/organizationsApiOrganization'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    $ref: '#/components/schemas/organizationsApiOrganization'
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: Create organization
      tags:
        - Organizations
      x-api-token-group:
        - User Details Write
      x-stackql-sdk:
        service: organizations
        resource_chain: []
        method: create
  /organizations/{organization_id}:
    delete:
      description: >-
        Delete an organization. The organization MUST be empty before deleting.
        It must not contain any sub-organizations, accounts, members or users.
        (Currently in Closed Beta - see
        https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Organizations_delete
      parameters:
        - name: organization_id
          in: path
          required: true
          description: The organization ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    $ref: >-
                      #/components/schemas/organizationsApiDeleteOrganizationResponse
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: Delete organization.
      tags:
        - Organizations
      x-stackql-sdk:
        service: organizations
        resource_chain: []
        method: delete
    get:
      description: >-
        Retrieve the details of a certain organization. (Currently in Closed
        Beta - see
        https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Organizations_retrieve
      parameters:
        - name: organization_id
          in: path
          required: true
          description: The organization ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    $ref: '#/components/schemas/organizationsApiOrganization'
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: Get organization
      tags:
        - Organizations
      x-stackql-sdk:
        service: organizations
        resource_chain: []
        method: get
    put:
      description: >-
        Modify organization. (Currently in Closed Beta - see
        https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Organizations_modify
      parameters:
        - name: organization_id
          in: path
          required: true
          description: The organization ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/organizationsApiOrganization'
        description: >-
          The new details of the organization. Only accepts updates to "name"
          currently.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    $ref: '#/components/schemas/organizationsApiOrganization'
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: Modify organization.
      tags:
        - Organizations
      x-stackql-sdk:
        service: organizations
        resource_chain: []
        method: update
  /organizations/{organization_id}/accounts:
    get:
      description: >-
        Retrieve a list of accounts that belong to a specific organization.
        (Currently in Closed Beta - see
        https://developers.cloudflare.com/fundamentals/organizations/)
      operationId: Organizations_getAccounts
      parameters:
        - name: organization_id
          in: path
          required: true
          description: The organization ID.
          schema:
            type: string
        - deprecated: true
          description: >-
            (case-insensitive) Filter the list of accounts to where the
            account_pubname is equal to a particular string.
          explode: false
          in: query
          name: account_pubname
          schema:
            type: string
        - deprecated: true
          description: >-
            (case-insensitive) Filter the list of accounts to where the
            account_pubname starts with a particular string.
          explode: false
          in: query
          name: account_pubname.startsWith
          schema:
            type: string
        - deprecated: true
          description: >-
            (case-insensitive) Filter the list of accounts to where the
            account_pubname ends with a particular string.
          explode: false
          in: query
          name: account_pubname.endsWith
          schema:
            type: string
        - deprecated: true
          description: >-
            (case-insensitive) Filter the list of accounts to where the
            account_pubname contains a particular string.
          explode: false
          in: query
          name: account_pubname.contains
          schema:
            type: string
        - description: >-
            (case-insensitive) Filter the list of accounts to where the name is
            equal to a particular string.
          explode: false
          in: query
          name: name
          schema:
            type: string
        - description: >-
            (case-insensitive) Filter the list of accounts to where the name
            starts with a particular string.
          explode: false
          in: query
          name: name.startsWith
          schema:
            type: string
        - description: >-
            (case-insensitive) Filter the list of accounts to where the name
            ends with a particular string.
          explode: false
          in: query
          name: name.endsWith
          schema:
            type: string
        - description: >-
            (case-insensitive) Filter the list of accounts to where the name
            contains a particular string.
          explode: false
          in: query
          name: name.contains
          schema:
            type: string
        - description: >-
            Field to order results by. Currently supported values:
            `account_name`. When not specified, results are ordered by internal
            account ID.
          explode: false
          in: query
          name: order_by
          schema:
            enum:
              - account_name
            type: string
        - description: >-
            Sort direction for the order_by field. Valid values: `asc`, `desc`.
            Defaults to `asc` when order_by is specified.
          explode: false
          in: query
          name: direction
          schema:
            enum:
              - asc
              - desc
            type: string
        - description: >-
            An opaque token returned from the last list response that when
            provided will retrieve the next page. Parameters used to filter the
            retrieved list must remain in subsequent requests with a page token.
          explode: false
          in: query
          name: page_token
          schema:
            type: string
        - description: The amount of items to return. Defaults to 10.
          explode: false
          in: query
          name: page_size
          schema:
            maximum: 1000
            minimum: 0
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    maxItems: 0
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/organizationsApiV4Message'
                    type: array
                  result:
                    items:
                      $ref: '#/components/schemas/organizationsApiAccount'
                    type: array
                  result_info:
                    $ref: '#/components/schemas/organizationsApiPageTokenResultInfo'
                  success:
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - result_info
                type: object
          description: The request has succeeded.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationsApiV4ErrorResponse'
          description: An unexpected error response.
      security:
        - api_email: []
          api_key: []
      summary: Get organization accounts
      tags:
        - Organizations
  /organizations/{organization_id}/logs/audit:
    get:
      description: Gets a list of audit logs for an organization.
      operationId: audit-logs-v2-get-organization-audit-logs
      parameters:
        - name: organization_id
          in: path
          required: true
          description: The organization ID.
          schema:
            type: string
        - in: query
          name: action_result
          schema:
            description: Filters by whether the action was successful or not.
            items:
              enum:
                - success
                - failure
              type: string
            type: array
          explode: true
        - in: query
          name: action_type
          schema:
            description: Filters by the action type.
            items:
              enum:
                - create
                - delete
                - view
                - update
              type: string
            type: array
          explode: true
        - in: query
          name: actor_context
          schema:
            description: Filters by the actor context.
            items:
              enum:
                - api_key
                - api_token
                - dash
                - oauth
                - origin_ca_key
              type: string
            type: array
          explode: true
        - in: query
          name: actor_email
          schema:
            description: Filters by the actor's email address.
            items:
              format: email
              type: string
            type: array
          explode: true
        - in: query
          name: actor_id
          schema:
            description: Filters by the actor's user ID.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: actor_ip_address
          schema:
            description: The IP address where the action was initiated.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: actor_token_id
          schema:
            description: >-
              Filters by the API token ID when the actor context is an api_token
              or oauth.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: actor_token_name
          schema:
            description: >-
              Filters by the API token name when the actor context is an
              api_token or oauth.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: actor_type
          schema:
            description: Filters by the actor type.
            items:
              enum:
                - cloudflare_admin
                - system
                - user
              type: string
            type: array
          explode: true
        - in: query
          name: id
          schema:
            description: Finds a specific log by its ID.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: raw_cf_ray_id
          schema:
            description: Filters by the response CF Ray ID.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: raw_method
          schema:
            description: The HTTP method for the API call.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: raw_status_code
          schema:
            description: The response status code that was returned.
            items:
              type: integer
            type: array
          explode: true
        - in: query
          name: raw_uri
          schema:
            description: Filters by the request URI.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: resource_id
          schema:
            description: Filters by the resource ID.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: resource_product
          schema:
            description: >-
              Filters audit logs by the Cloudflare product associated with the
              changed resource.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: resource_type
          schema:
            description: >-
              Filters audit logs based on the unique type of resource changed by
              the action.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: resource_scope
          schema:
            description: >-
              Filters by the resource scope, specifying whether the resource is
              associated with an organization.
            items:
              enum:
                - organizations
              type: string
            type: array
          explode: true
        - in: query
          name: action_result.not
          schema:
            description: >-
              Filters out audit logs by whether the action was successful or
              not.
            items:
              enum:
                - success
                - failure
              type: string
            type: array
          explode: true
        - in: query
          name: action_type.not
          schema:
            description: Filters out audit logs by the action type.
            items:
              enum:
                - create
                - delete
                - view
                - update
              type: string
            type: array
          explode: true
        - in: query
          name: actor_context.not
          schema:
            description: Filters out audit logs by the actor context.
            items:
              enum:
                - api_key
                - api_token
                - dash
                - oauth
                - origin_ca_key
              type: string
            type: array
          explode: true
        - in: query
          name: actor_email.not
          schema:
            description: Filters out audit logs by the actor's email address.
            items:
              format: email
              type: string
            type: array
          explode: true
        - in: query
          name: actor_id.not
          schema:
            description: Filters out audit logs by the actor's user ID.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: actor_ip_address.not
          schema:
            description: Filters out audit logs IP address where the action was initiated.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: actor_token_id.not
          schema:
            description: >-
              Filters out audit logs by the API token ID when the actor context
              is an api_token or oauth.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: actor_token_name.not
          schema:
            description: >-
              Filters out audit logs by the API token name when the actor
              context is an api_token or oauth.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: actor_type.not
          schema:
            description: Filters out audit logs by the actor type.
            items:
              enum:
                - cloudflare_admin
                - system
                - user
              type: string
            type: array
          explode: true
        - in: query
          name: id.not
          schema:
            description: Filters out audit logs by their IDs.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: raw_cf_ray_id.not
          schema:
            description: Filters out audit logs by the response CF Ray ID.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: raw_method.not
          schema:
            description: Filters out audit logs by the HTTP method for the API call.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: raw_status_code.not
          schema:
            description: >-
              Filters out audit logs by the response status code that was
              returned.
            items:
              type: integer
            type: array
          explode: true
        - in: query
          name: raw_uri.not
          schema:
            description: Filters out audit logs by the request URI.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: resource_id.not
          schema:
            description: Filters out audit logs by the resource ID.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: resource_product.not
          schema:
            description: >-
              Filters out audit logs by the Cloudflare product associated with
              the changed resource.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: resource_type.not
          schema:
            description: >-
              Filters out audit logs based on the unique type of resource
              changed by the action.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: resource_scope.not
          schema:
            description: >-
              Filters out audit logs by the resource scope, specifying whether
              the resource is associated with an organization.
            items:
              enum:
                - organizations
              type: string
            type: array
          explode: true
        - description: >-
            Limits the returned results to logs newer than the specified date.
            This can be a date string 2019-04-30 (interpreted in UTC) or an
            absolute timestamp that conforms to RFC3339.
          in: query
          name: since
          schema:
            format: date
            type: string
        - description: >-
            Limits the returned results to logs older than the specified date.
            This can be a date string 2019-04-30 (interpreted in UTC) or an
            absolute timestamp that conforms to RFC3339.
          in: query
          name: before
          schema:
            format: date
            type: string
        - in: query
          name: direction
          schema:
            default: desc
            description: Sets sorting order.
            enum:
              - desc
              - asc
            type: string
        - in: query
          name: limit
          schema:
            default: 100
            description: >-
              The number limits the objects to return. The cursor attribute may
              be used to iterate over the next batch of objects if there are
              more than the limit.
            maximum: 1000
            minimum: 1
            type: number
        - in: query
          name: cursor
          schema:
            description: >-
              The cursor is an opaque token used to paginate through large sets
              of records. It indicates the position from which to continue when
              requesting the next set of records. A valid cursor value can be
              obtained from the cursor object in the result_info structure of a
              previous response.
