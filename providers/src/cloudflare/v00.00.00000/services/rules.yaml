                    required:
                      - created_on
                      - id
                      - modified_on
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                type: object
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Get a list item response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get a list item
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Edit
        - Account Filter Lists Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
          - items
        method: get
components:
  schemas:
    listsBulkOperationResponseSingle:
      properties:
        result:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/listsOperationId'
            status:
              description: The current status of the asynchronous operation.
              enum:
                - pending
                - running
              example: pending
              readOnly: true
              type: string
              x-auditable: true
            completed:
              $ref: '#/components/schemas/listsCompleted'
            error:
              description: A message describing the error when the status is `failed`.
              example: This list is at the maximum number of items
              readOnly: true
              type: string
              x-auditable: true
          required:
            - id
