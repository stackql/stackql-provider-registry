openapi: 3.0.3
info:
  title: rules API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/rules/lists:
    get:
      description: Fetches all lists in the account.
      operationId: lists-get-lists
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsListsResponseCollection'
          description: Get lists response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    items:
                      $ref: '#/components/schemas/listsList'
                    type: array
                    enum:
                      - null
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Get lists response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get lists
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Read
        - Account Filter Lists Edit
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
        method: list
    post:
      description: Creates a new list of the specified kind.
      operationId: lists-create-a-list
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                description:
                  $ref: '#/components/schemas/listsDescription'
                kind:
                  $ref: '#/components/schemas/listsKind'
                name:
                  $ref: '#/components/schemas/listsName'
              required:
                - name
                - kind
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsListResponseCollection'
          description: Create a list response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefE706d5e8367564544e2991af82ebb07a
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Create a list response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create a list
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Edit
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
        method: create
  /accounts/{account_id}/rules/lists/bulk_operations/{operation_id}:
    get:
      description: >-
        Gets the current status of an asynchronous operation on a list. The
        `status` property can have one of the following values: `pending`,
        `running`, `completed`, or `failed`. If the status is `failed`, the
        `error` property will contain a message describing the error.
      operationId: lists-get-bulk-operation-status
      parameters:
        - in: path
          name: operation_id
          schema:
            $ref: '#/components/schemas/listsOperationId'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsBulkOperationResponseSingle'
          description: Get bulk operation status response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  result:
                    enum:
                      - null
                    type: object
                    properties:
                      id:
                        $ref: '#/components/schemas/listsOperationId'
                      status:
                        description: The current status of the asynchronous operation.
                        enum:
                          - pending
                          - running
                        readOnly: true
                        type: string
                        x-auditable: true
                      completed:
                        $ref: '#/components/schemas/listsCompleted'
                      error:
                        description: >-
                          A message describing the error when the status is
                          `failed`.
                        readOnly: true
                        type: string
                        x-auditable: true
                    required:
                      - id
                      - status
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                type: object
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Get bulk operation status response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get bulk operation status
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Edit
        - Account Filter Lists Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
          - bulk_operations
        method: get
  /accounts/{account_id}/rules/lists/{list_id}:
    delete:
      description: Deletes a specific list and all its items.
      operationId: lists-delete-a-list
      parameters:
        - in: path
          name: list_id
          schema:
            $ref: '#/components/schemas/listsListId'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsListDeleteResponseCollection'
          description: Delete a list response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    properties:
                      id:
                        $ref: '#/components/schemas/listsListId'
                    required:
                      - id
                    type: object
                    enum:
                      - null
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Delete a list response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete a list
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Edit
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
        method: delete
    get:
      description: Fetches the details of a list.
      operationId: lists-get-a-list
      parameters:
        - in: path
          name: list_id
          schema:
            $ref: '#/components/schemas/listsListId'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsListResponseCollection'
          description: Get a list response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefE706d5e8367564544e2991af82ebb07a
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Get a list response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get a list
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
        method: get
    put:
      description: Updates the description of a list.
      operationId: lists-update-a-list
      parameters:
        - in: path
          name: list_id
          schema:
            $ref: '#/components/schemas/listsListId'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                description:
                  $ref: '#/components/schemas/listsDescription'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsListResponseCollection'
          description: Update a list response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefE706d5e8367564544e2991af82ebb07a
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Update a list response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update a list
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Edit
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
        method: update
  /accounts/{account_id}/rules/lists/{list_id}/items:
    delete:
      description: >-
        Removes one or more items from a list. This operation is asynchronous.
        To get current the operation status, invoke the `Get bulk operation
        status` endpoint with the returned `operation_id`. There is a limit of 1
        pending bulk operation per account. If an outstanding bulk operation is
        in progress, the request will be rejected.
      operationId: lists-delete-list-items
      parameters:
        - in: path
          name: list_id
          schema:
            $ref: '#/components/schemas/listsListId'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                items:
                  items:
                    properties:
                      id:
                        description: Defines the unique ID of the item in the List.
                        maxLength: 32
                        minLength: 32
                        type: string
                        x-auditable: true
                    required:
                      - id
                    type: object
                  minItems: 1
                  type: array
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsListsAsyncResponse'
          description: Delete list items response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRef46621d4d5b6644caae5c9167b8e28865
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                type: object
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Delete list items response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete list items
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Edit
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
          - items
        method: delete
    get:
      description: Fetches all the items in the list.
      operationId: lists-get-list-items
      parameters:
        - in: path
          name: list_id
          schema:
            $ref: '#/components/schemas/listsListId'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            description: >-
              The pagination cursor. An opaque string token indicating the
              position from which to continue when requesting the next/previous
              set of records. Cursor values are provided under
              `result_info.cursors` in the response. You should make no
              assumptions about a cursor's content or length.
            type: string
        - in: query
          name: per_page
          schema:
            description: >-
              Amount of results to include in each paginated response. A
              non-negative 32 bit integer.
            maximum: 500
            minimum: 1
            type: integer
        - in: query
          name: search
          schema:
            description: >-
              A search query to filter returned items. Its meaning depends on
              the list type: IP addresses must start with the provided string,
              hostnames and bulk redirects must contain the string, and ASNs
              must match the string exactly.
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsItemsListResponseCollection'
          description: Get list items response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  result:
                    items:
                      $ref: '#/components/schemas/listsItem'
                    type: array
                    enum:
                      - null
                  result_info:
                    properties:
                      cursors:
                        $ref: >-
                          #/components/schemas/unnamedSchemaRef34bb6e31800bc0207c083affa12d2775
                    type: object
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                type: object
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Get list items response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get list items
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Edit
        - Account Filter Lists Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
          - items
        method: list
    post:
      description: >-
        Appends new items to the list. This operation is asynchronous. To get
        current the operation status, invoke the `Get bulk operation status`
        endpoint with the returned `operation_id`. There is a limit of 1 pending
        bulk operation per account. If an outstanding bulk operation is in
        progress, the request will be rejected.
      operationId: lists-create-list-items
      parameters:
        - in: path
          name: list_id
          schema:
            $ref: '#/components/schemas/listsListId'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/listsItemsUpdateRequestCollection'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsListsAsyncResponse'
          description: Create list items response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRef46621d4d5b6644caae5c9167b8e28865
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                type: object
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Create list items response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create list items
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Edit
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
          - items
        method: create
    put:
      description: >-
        Removes all existing items from the list and adds the provided items to
        the list. This operation is asynchronous. To get current the operation
        status, invoke the `Get bulk operation status` endpoint with the
        returned `operation_id`. There is a limit of 1 pending bulk operation
        per account. If an outstanding bulk operation is in progress, the
        request will be rejected.
      operationId: lists-update-all-list-items
      parameters:
        - in: path
          name: list_id
          schema:
            $ref: '#/components/schemas/listsListId'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/listsItemsUpdateRequestCollection'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsListsAsyncResponse'
          description: Update all list items response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRef46621d4d5b6644caae5c9167b8e28865
                  errors:
                    $ref: '#/components/schemas/listsMessages'
                  messages:
                    $ref: '#/components/schemas/listsMessages'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                type: object
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
          description: Update all list items response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update all list items
      tags:
        - Lists
      x-api-token-group:
        - Account Filter Lists Edit
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rules
        resource_chain:
          - lists
          - items
        method: update
  /accounts/{account_id}/rules/lists/{list_id}/items/{item_id}:
    get:
      description: Fetches a list item in the list.
      operationId: lists-get-a-list-item
      parameters:
        - in: path
          name: item_id
          schema:
            $ref: '#/components/schemas/listsItemId'
          required: true
        - in: path
          name: list_id
          schema:
            $ref: '#/components/schemas/listsListId'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listsItemResponseSingle'
          description: Get a list item response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  result:
                    enum:
                      - null
                    type: object
                    properties:
                      ip:
                        $ref: '#/components/schemas/listsItemIp'
                      comment:
                        $ref: '#/components/schemas/listsItemComment'
                      created_on:
                        $ref: '#/components/schemas/listsCreatedOn'
                        readOnly: true
                      id:
                        $ref: '#/components/schemas/listsItemId'
                      modified_on:
                        $ref: '#/components/schemas/listsModifiedOn'
                        readOnly: true
                      hostname:
                        $ref: '#/components/schemas/listsItemHostname'
                      redirect:
                        $ref: '#/components/schemas/listsItemRedirect'
