openapi: 3.0.3
info:
  title: images API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/images/v1:
    get:
      deprecated: true
      description: List up to 100 images with one request. Use the optional parameters below to get a specific range of images.
      operationId: cloudflare-images-list-images
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 1000
          description: Number of items per page.
          maximum: 10000
          minimum: 10
          type: number
      - in: query
        name: creator
        schema:
          description: Internal user ID set within the creator field. Setting to empty string "" will return images where creator field is not set
          nullable: true
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagesImagesListResponse'
          description: List images response
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/imagesMessages'
                  messages:
                    $ref: '#/components/schemas/imagesMessages'
                  result:
                    properties:
                      images:
                        items:
                          $ref: '#/components/schemas/imagesImage'
                        type: array
                    type: object
                    enum:
                    - null
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                    x-auditable: true
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
                type: object
          description: List images response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List images
      tags:
      - Cloudflare Images
      x-api-token-group:
      - Images Read
      - Images Write
      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        method: list
    post:
      description: Upload an image with up to 10 Megabytes using a single HTTP POST (multipart/form-data) request. An image can be uploaded by sending an image file or passing an accessible to an API url.
      operationId: cloudflare-images-upload-an-image-via-url
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/imagesImageBasicUpload'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagesImageResponseSingle'
          description: Upload an image response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/imagesMessages'
                  messages:
                    $ref: '#/components/schemas/imagesMessages'
                  result:
                    $ref: '#/components/schemas/unnamedSchemaRefE8461c343d70f42d35d6d68f1a58d05a'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                    x-auditable: true
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Upload an image response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Upload an image
      tags:
      - Cloudflare Images
      x-api-token-group:
      - Images Write
      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        method: create
  /accounts/{account_id}/images/v1/keys:
    get:
      description: Lists your signing keys. These can be found on your Cloudflare Images dashboard.
      operationId: cloudflare-images-keys-list-signing-keys
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagesImageKeyResponseCollection'
          description: List Signing Keys response
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/imagesMessages'
                  messages:
                    $ref: '#/components/schemas/imagesMessages'
                  result:
                    $ref: '#/components/schemas/unnamedSchemaRef918e794287a67b5e85126e00cf2d9a95'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                    x-auditable: true
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
                type: object
          description: List Signing Keys response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Signing Keys
      tags:
      - Cloudflare Images Keys
      x-api-token-group:
      - Images Read
      - Images Write
      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        - keys
        method: list
  /accounts/{account_id}/images/v1/keys/{signing_key_name}:
    delete:
      description: Delete signing key with specified name. Returns all keys available. When last key is removed, a new default signing key will be generated.
      operationId: cloudflare-images-keys-delete-signing-key
      parameters:
      - in: path
        name: signing_key_name
        schema:
          $ref: '#/components/schemas/imagesSigningKeyIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagesImageKeyResponseCollection'
          description: Delete Signing Key response
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/imagesMessages'
                  messages:
                    $ref: '#/components/schemas/imagesMessages'
                  result:
                    $ref: '#/components/schemas/unnamedSchemaRef918e794287a67b5e85126e00cf2d9a95'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                    x-auditable: true
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
                type: object
          description: Delete Signing Key response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete Signing Key
      tags:
      - Cloudflare Images Keys
      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        - keys
        method: delete
    put:
      description: Create a new signing key with specified name. Returns all keys available.
      operationId: cloudflare-images-keys-add-signing-key
      parameters:
      - in: path
        name: signing_key_name
        schema:
          $ref: '#/components/schemas/imagesSigningKeyIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagesImageKeyResponseCollection'
          description: Add Signing Key response
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/imagesMessages'
                  messages:
                    $ref: '#/components/schemas/imagesMessages'
                  result:
                    $ref: '#/components/schemas/unnamedSchemaRef918e794287a67b5e85126e00cf2d9a95'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                    x-auditable: true
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
                type: object
          description: Add Signing Key response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a new Signing Key
      tags:
      - Cloudflare Images Keys
      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        - keys
        method: update
  /accounts/{account_id}/images/v1/stats:
    get:
      description: Fetch image statistics details for Cloudflare Images. The returned statistics detail storage usage, including the current image count vs this account's allowance.
      operationId: cloudflare-images-images-usage-statistics
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagesImagesStatsResponse'
          description: Images usage statistics response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/imagesMessages'
                  messages:
                    $ref: '#/components/schemas/imagesMessages'
                  result:
                    properties:
                      count:
                        $ref: '#/components/schemas/imagesImagesStatsCount'
                    type: object
                    enum:
                    - null
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                    x-auditable: true
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Images usage statistics response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Images usage statistics
      tags:
      - Cloudflare Images
      x-api-token-group:
      - Images Read
      - Images Write
      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        - stats
        method: get
