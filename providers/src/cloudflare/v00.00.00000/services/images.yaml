    get:
      description: List up to 10000 images with up to 1000 results per page. Use the optional parameters below to get a specific range of images. Pagination is supported via continuation_token. **Metadata Filtering (Optional):** You can optionally filter images by custom metadata fields using the `meta.<field>[<operator>]=<value>` syntax. **Supported Operators:** - `eq` / `eq:string` / `eq:number` / `eq:boolean` - Exact match - `in` / `in:string` / `in:number` - Match any value in list (pipe-separated) **Metadata Filter Constraints:** - Maximum 5 metadata filters per request - Maximum 5 levels of nesting (e.g., `meta.first.second.third.fourth.fifth`) - Maximum 10 elements for list operators (`in`) - Supports string, number, and boolean value types **Examples:** ``` **List all images:** /images/v2 **Filter by metadata [eq]:** /images/v2?meta.status[eq:string]=active **Filter by metadata [in]:** /images/v2?meta.status[in]=pending|deleted|flagged **Filter by metadata [in:number]:** /images/v2?meta.ratings[in:number]=4|5
        **Filter by nested metadata:** /images/v2?meta.region.name[eq]=eu-west **Combine metadata filters with creator:** /images/v2?meta.status[eq]=active&creator=user123 **Multiple metadata filters (AND logic):** /images/v2?meta.status[eq]=active&meta.priority[eq:number]=5 ```
