      - Images Write
      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        - variants
        method: list
    post:
      description: Specify variants that allow you to resize images for different use cases.
      operationId: cloudflare-images-variants-create-a-variant
      parameters:
      - name: account_id
        in: path
        required: true
