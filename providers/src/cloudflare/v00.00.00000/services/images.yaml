      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        - variants
        method: get
    patch:
      description: Updating a variant purges the cache for all images associated with the variant.
      operationId: cloudflare-images-variants-update-a-variant
      parameters:
      - in: path
        name: variant_id
        schema:
          $ref: '#/components/schemas/imagesImageVariantIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/imagesImageVariantPatchRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagesImageVariantSimpleResponse'
          description: Update a variant response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/imagesMessages'
                  messages:
                    $ref: '#/components/schemas/imagesMessages'
                  result:
                    $ref: '#/components/schemas/unnamedSchemaRefD02195de7dadf27801875f36cddfa3a3'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                    x-auditable: true
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Update a variant response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update a variant
      tags:
      - Cloudflare Images Variants
      x-api-token-group:
