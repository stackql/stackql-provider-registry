                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Delete image response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete image
      tags:
      - Cloudflare Images
      x-api-token-group:
      - Images Write
      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        method: delete
    get:
      description: Fetch details for a single image.
      operationId: cloudflare-images-image-details
      parameters:
      - in: path
        name: image_id
        schema:
          $ref: '#/components/schemas/imagesImageIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagesImageResponseSingle'
          description: Image details response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/imagesMessages'
                  messages:
                    $ref: '#/components/schemas/imagesMessages'
                  result:
                    $ref: '#/components/schemas/unnamedSchemaRefE8461c343d70f42d35d6d68f1a58d05a'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                    x-auditable: true
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Image details response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Image details
      tags:
      - Cloudflare Images
      x-api-token-group:
      - Images Read
      - Images Write
      x-stackql-sdk:
        service: images
        resource_chain:
        - v1
        method: get
    patch:
      description: Update image access control. On access control change, all copies of the image are purged from cache.
      operationId: cloudflare-images-update-image
      parameters:
      - in: path
        name: image_id
        schema:
          $ref: '#/components/schemas/imagesImageIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
