openapi: 3.0.3
info:
  title: r2_data_catalog API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/r2-catalog:
    get:
      description: >-
        Returns a list of R2 buckets that have been enabled as Apache Iceberg
        catalogs for the specified account. Each catalog represents an R2 bucket
        configured to store Iceberg metadata and data files.
      operationId: list-catalogs
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseErrors'
                  messages:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseMessages'
                  success:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseSuccess'
                  result:
                    $ref: '#/components/schemas/r2DataCatalogCatalogList'
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: List of R2 catalogs.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Bad request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Authentication failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Forbidden.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Internal server error.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List R2 catalogs
      tags:
        - R2 Catalog Management
      x-api-token-group:
        - Workers R2 Data Catalog Write
        - Workers R2 Data Catalog Read
      x-stackql-sdk:
        service: r2_data_catalog
        resource_chain: []
        method: list
  /accounts/{account_id}/r2-catalog/{bucket_name}:
    get:
      description: >-
        Retrieve detailed information about a specific R2 catalog by bucket
        name. Returns catalog status, maintenance configuration, and credential
        status.
      operationId: get-catalog-details
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: bucket_name
          in: path
          required: true
          description: The R2 bucket name.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseErrors'
                  messages:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseMessages'
                  success:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseSuccess'
                  result:
                    $ref: '#/components/schemas/r2DataCatalogCatalog'
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: R2 catalog details.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Bad request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Authentication failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Catalog not found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Internal server error.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get R2 catalog details
      tags:
        - R2 Catalog Management
      x-api-token-group:
        - Workers R2 Data Catalog Write
        - Workers R2 Data Catalog Read
      x-stackql-sdk:
        service: r2_data_catalog
        resource_chain: []
        method: get
  /accounts/{account_id}/r2-catalog/{bucket_name}/credential:
    post:
      description: >-
        Store authentication credentials for a catalog. These credentials are
        used to authenticate with R2 storage when performing catalog operations.
      operationId: store-credentials
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: bucket_name
          in: path
          required: true
          description: The R2 bucket name.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/r2DataCatalogCatalogCredentialRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseErrors'
                  messages:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseMessages'
                  success:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseSuccess'
                  result:
                    nullable: true
                    type: object
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: Credentials stored successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Bad request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Authentication failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Catalog not found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Internal server error.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Store catalog credentials
      tags:
        - Credential Management
      x-api-token-group:
        - Workers R2 Data Catalog Write
      x-stackql-sdk:
        service: r2_data_catalog
        resource_chain:
          - credentials
        method: create
  /accounts/{account_id}/r2-catalog/{bucket_name}/disable:
    post:
      description: >-
        Disable an R2 bucket as a catalog. This operation deactivates the
        catalog but preserves existing metadata and data files. The catalog can
        be re-enabled later.
      operationId: disable-catalog
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: bucket_name
          in: path
          required: true
          description: The R2 bucket name.
          schema:
            type: string
      responses:
        '204':
          description: Catalog disabled successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Bad request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Authentication failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Catalog not found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Internal server error.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Disable R2 catalog
      tags:
        - R2 Catalog Management
      x-api-token-group:
        - Workers R2 Data Catalog Write
      x-stackql-sdk:
        service: r2_data_catalog
        resource_chain: []
        method: disable
  /accounts/{account_id}/r2-catalog/{bucket_name}/enable:
    post:
      description: >-
        Enable an R2 bucket as an Apache Iceberg catalog. This operation creates
        the necessary catalog infrastructure and activates the bucket for
        storing Iceberg metadata and data files.
      operationId: enable-catalog
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: bucket_name
          in: path
          required: true
          description: The R2 bucket name.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseErrors'
                  messages:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseMessages'
                  success:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseSuccess'
                  result:
                    $ref: >-
                      #/components/schemas/r2DataCatalogCatalogActivationResponse
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: Catalog enabled successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Bad request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Authentication failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Forbidden.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Catalog already enabled.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Internal server error.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Enable R2 bucket as a catalog
      tags:
        - R2 Catalog Management
      x-api-token-group:
        - Workers R2 Data Catalog Write
      x-stackql-sdk:
        service: r2_data_catalog
        resource_chain: []
        method: enable
  /accounts/{account_id}/r2-catalog/{bucket_name}/maintenance-configs:
    get:
      description: >-
        Retrieve the maintenance configuration for a specific catalog, including
        compaction settings and credential status.
      operationId: get-maintenance-config
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: bucket_name
          in: path
          required: true
          description: The R2 bucket name.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseErrors'
                  messages:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseMessages'
                  success:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseSuccess'
                  result:
                    $ref: >-
                      #/components/schemas/r2DataCatalogCatalogMaintenanceConfigResponse
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: Maintenance configuration retrieved successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Bad request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Authentication failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Catalog not found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Internal server error.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get catalog maintenance configuration
      tags:
        - Maintenance Configuration
      x-api-token-group:
        - Workers R2 Data Catalog Write
        - Workers R2 Data Catalog Read
      x-stackql-sdk:
        service: r2_data_catalog
        resource_chain:
          - maintenance_configs
        method: get
    post:
      description: >-
        Update the maintenance configuration for a catalog. This allows you to
        enable or disable compaction and adjust target file sizes for
        optimization.
      operationId: update-maintenance-config
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: bucket_name
          in: path
          required: true
          description: The R2 bucket name.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: >-
                #/components/schemas/r2DataCatalogCatalogMaintenanceUpdateRequest
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseErrors'
                  messages:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseMessages'
                  success:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseSuccess'
                  result:
                    $ref: '#/components/schemas/r2DataCatalogCatalogMaintenanceConfig'
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: Maintenance configuration updated successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Bad request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Authentication failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Catalog not found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Internal server error.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update catalog maintenance configuration
      tags:
        - Maintenance Configuration
      x-api-token-group:
        - Workers R2 Data Catalog Write
      x-stackql-sdk:
        service: r2_data_catalog
        resource_chain:
          - maintenance_configs
        method: update
  /accounts/{account_id}/r2-catalog/{bucket_name}/namespaces:
    get:
      description: >-
        Returns a list of namespaces in the specified R2 catalog. Supports
        hierarchical filtering and pagination for efficient traversal of large
        namespace hierarchies.
      operationId: list-namespaces
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: bucket_name
          in: path
          required: true
          description: The R2 bucket name.
          schema:
            type: string
        - description: >-
            Opaque pagination token from a previous response. Use this to fetch
            the next page of results.
          in: query
          name: page_token
          schema:
            type: string
        - description: >-
            Maximum number of namespaces to return per page. Defaults to 100,
            maximum 1000.
          in: query
          name: page_size
          schema:
            default: 100
            maximum: 1000
            minimum: 1
            type: integer
        - description: >-
            Parent namespace to filter by. Only returns direct children of this
            namespace. For nested namespaces, use %1F as separator (e.g.,
            "bronze%1Fanalytics"). Omit this parameter to list top-level
            namespaces.
          in: query
          name: parent
          schema:
            type: string
        - description: >-
            Whether to include namespace UUIDs in the response. Set to true to
            receive the namespace_uuids array.
          in: query
          name: return_uuids
          schema:
            default: false
            type: boolean
        - description: >-
            Whether to include additional metadata (timestamps). When true,
            response includes created_at and updated_at arrays.
          in: query
          name: return_details
          schema:
            default: false
            type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseErrors'
                  messages:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseMessages'
                  success:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseSuccess'
                  result:
                    $ref: '#/components/schemas/r2DataCatalogNamespaceListResponse'
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: List of namespaces retrieved successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Bad request (e.g., invalid page_size, malformed parent namespace).
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Authentication failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Catalog not found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Internal server error.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List namespaces in catalog
      tags:
        - Namespace Management
      x-api-token-group:
        - Workers R2 Data Catalog Write
        - Workers R2 Data Catalog Read
      x-stackql-sdk:
        service: r2_data_catalog
        resource_chain:
          - namespaces
        method: list
  /accounts/{account_id}/r2-catalog/{bucket_name}/namespaces/{namespace}/tables:
    get:
      description: >-
        Returns a list of tables in the specified namespace within an R2
        catalog. Supports pagination for efficient traversal of large table
        collections.
      operationId: list-tables
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: bucket_name
          in: path
          required: true
          description: The R2 bucket name.
          schema:
            type: string
        - description: >-
            The namespace identifier. For nested namespaces, use %1F as
            separator (e.g., "bronze%1Fanalytics").
          in: path
          name: namespace
          schema:
            type: string
          required: true
        - description: >-
            Opaque pagination token from a previous response. Use this to fetch
            the next page of results.
          in: query
          name: page_token
          schema:
            type: string
        - description: >-
            Maximum number of tables to return per page. Defaults to 100,
            maximum 1000.
          in: query
          name: page_size
          schema:
            default: 100
            maximum: 1000
            minimum: 1
            type: integer
        - description: >-
            Whether to include table UUIDs in the response. Set to true to
            receive the table_uuids array.
          in: query
          name: return_uuids
          schema:
            default: false
            type: boolean
        - description: >-
            Whether to include additional metadata (timestamps, locations). When
            true, response includes created_at, updated_at, metadata_locations,
            and locations arrays.
          in: query
          name: return_details
          schema:
            default: false
            type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseErrors'
                  messages:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseMessages'
                  success:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseSuccess'
                  result:
                    $ref: '#/components/schemas/r2DataCatalogTableListResponse'
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: List of tables retrieved successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Bad request (e.g., invalid page_size, malformed namespace).
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Authentication failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Catalog or namespace not found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2DataCatalogApiResponseCommonFailure'
          description: Internal server error.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List tables in namespace
      tags:
        - Table Management
      x-api-token-group:
        - Workers R2 Data Catalog Write
        - Workers R2 Data Catalog Read
      x-stackql-sdk:
        service: r2_data_catalog
        resource_chain:
          - namespaces
          - tables
        method: list
  /accounts/{account_id}/r2-catalog/{bucket_name}/namespaces/{namespace}/tables/{table_name}/maintenance-configs:
    get:
      description: >-
        Retrieve the maintenance configuration for a specific table, including
        compaction settings.
      operationId: get-table-maintenance-config
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: bucket_name
          in: path
          required: true
          description: The R2 bucket name.
          schema:
            type: string
        - description: >-
            The namespace identifier (use %1F as separator for nested
            namespaces).
          in: path
          name: namespace
          schema:
            type: string
          required: true
        - description: The table name.
          in: path
          name: table_name
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseErrors'
                  messages:
                    $ref: '#/components/schemas/r2DataCatalogApiResponseMessages'
