        - Custom Hostname for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain:
          - certificate_pack
          - certificates
        method: delete
    put:
      description: >-
        Replace a single custom certificate within a certificate pack that
        contains two bundled certificates. The replacement must adhere to the
        following constraints. You can only replace an RSA certificate with
        another RSA certificate or an ECDSA certificate with another ECDSA
        certificate.
      operationId: custom-hostname-for-a-zone-edit-custom-certificate-custom-hostname
      parameters:
        - in: path
          name: custom_hostname_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - in: path
          name: certificate_pack_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: certificate_id
          in: path
          required: true
          description: The certificate ID.
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomCertAndKey'
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCustomHostnameResponseSingle
          description: Edit Custom Certificate In a Custom Hostname response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefD2a16d7ee1ad3a888dd5821c918d51fd
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Edit Custom Certificate In a Custom Hostname response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Replace Custom Certificate and Custom Key In Custom Hostname
      tags:
        - Custom Hostname for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain:
          - certificate_pack
          - certificates
        method: update
components:
  schemas:
    tlsCertificatesAndHostnamesCertificateAuthority:
      description: The Certificate Authority that will issue the certificate
      enum:
        - digicert
        - google
        - lets_encrypt
        - ssl_com
      example: google
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesComponentsSchemasStatus:
      description: Status of the hostname's activation.
      enum:
        - active
        - pending
        - active_redeploying
        - moved
        - pending_deletion
        - deleted
        - pending_blocked
        - pending_migration
        - pending_provisioned
        - test_pending
        - test_active
        - test_active_apex
        - test_blocked
        - test_failed
        - provisioned
        - blocked
      example: pending
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesCreatedAt:
      description: This is the time the hostname was created.
      example: '2020-02-06T18:11:23.531995Z'
      format: date-time
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesCustomCertAndKey:
      properties:
        custom_certificate:
          description: If a custom uploaded certificate is used.
          example: |
            -----BEGIN CERTIFICATE-----
            MIIDdjCCAl6gAwIBAgIJAPnMg0Fs+/B0MA0GCSqGSIb3DQEBCwUAMFsx...
            -----END CERTIFICATE-----
          type: string
        custom_key:
          description: The key for a custom uploaded certificate.
          example: |
            -----BEGIN PRIVATE KEY-----
            MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC/SCB5...
            -----END PRIVATE KEY-----
          type: string
          x-sensitive: true
      required:
        - custom_certificate
        - custom_key
      type: object
    tlsCertificatesAndHostnamesCustomCertBundle:
      description: Array of custom certificate and key pairs (1 or 2 pairs allowed)
      items:
        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomCertAndKey'
      maxItems: 2
      minItems: 1
      type: array
    tlsCertificatesAndHostnamesCustomHostname:
      properties:
        hostname:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesHostname'
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        ssl:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSsl'
        created_at:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCreatedAt'
          readOnly: true
        custom_metadata:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomMetadata'
        custom_origin_server:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomOriginServer'
        custom_origin_sni:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomOriginSni'
        ownership_verification:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesOwnershipVerification
        ownership_verification_http:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesOwnershipVerificationHttp
        status:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasStatus
        verification_errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesVerificationErrors'
      required:
        - id
        - hostname
      type: object
    tlsCertificatesAndHostnamesCustomHostnameFallbackOriginComponentsSchemasStatus:
      description: Status of the fallback origin's activation.
      enum:
        - initializing
        - pending_deployment
        - pending_deletion
        - active
        - deployment_timed_out
        - deletion_timed_out
      example: pending_deployment
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesCustomHostnameResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomHostname'
          type: array
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesCustomHostnameResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          type: object
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomHostname'
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesCustomMetadata:
      description: >-
        Unique key/value metadata for this hostname. These are per-hostname
        (customer) settings.
      type: object
    tlsCertificatesAndHostnamesCustomOriginServer:
      description: >-
        a valid hostname that’s been added to your DNS zone as an A, AAAA, or
        CNAME record.
      example: origin2.example.com
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesCustomOriginSni:
      description: >-
        A hostname that will be sent to your custom origin server as SNI for TLS
        handshake. This can be a valid subdomain of the zone or custom origin
        server name or the string ':request_host_header:' which will cause the
        host header in the request to be used as SNI. Not configurable with
        default/fallback origin server.
      example: sni.example.com
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesErrors:
      description: >-
        These are errors that were encountered while trying to activate a
        fallback origin.
      example:
        - >-
          DNS records are not setup correctly. Origin should be a proxied
          A/AAAA/CNAME dns record
      items:
        type: string
        x-auditable: true
      type: array
    tlsCertificatesAndHostnamesFallbackOriginResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesFallbackorigin'
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesFallbackorigin:
      properties:
        created_at:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasCreatedAt'
          readOnly: true
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesErrors'
        origin:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesOrigin'
        status:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesCustomHostnameFallbackOriginComponentsSchemasStatus
        updated_at:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesUpdatedAt'
          readOnly: true
      type: object
    tlsCertificatesAndHostnamesHostname:
      description: The custom hostname that will point to your hostname via CNAME.
      example: app.example.com
      maxLength: 255
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesHostnamePost:
      description: The custom hostname that will point to your hostname via CNAME.
      example: app.example.com
      maxLength: 255
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    tlsCertificatesAndHostnamesOrigin:
      description: >-
        Your origin hostname that requests to your custom hostnames will be sent
        to.
      example: fallback.example.com
      maxLength: 255
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesOwnershipVerification:
      description: This is a record which can be placed to activate a hostname.
      type: object
      properties:
        name:
          description: DNS Name for record.
          example: _cf-custom-hostname.app.example.com
          type: string
          x-auditable: true
        type:
          description: DNS Record type.
          enum:
            - txt
          example: txt
          type: string
          x-auditable: true
        value:
          description: Content for the record.
          example: 5cc07c04-ea62-4a5a-95f0-419334a875a4
          type: string
    tlsCertificatesAndHostnamesOwnershipVerificationHttp:
      description: >-
        This presents the token to be served by the given http url to activate a
        hostname.
      type: object
      properties:
        http_body:
          description: Token to be served.
          example: 5cc07c04-ea62-4a5a-95f0-419334a875a4
          type: string
        http_url:
          description: >-
            The HTTP URL that will be checked during custom hostname
            verification and where the customer should host the token.
          example: >-
            http://custom.test.com/.well-known/cf-custom-hostname-challenge/0d89c70d-ad9f-4843-b99f-6cc0252067e9
          type: string
