        '202':
          content:
            application/json:
              schema:
                properties:
                  id:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                type: object
          description: Delete Single Certificate and Key In a Custom Hostname response
        4XX:
          content:
            application/json:
              schema:
                properties:
                  id:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                  errors:
                    minLength: 1
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  result:
                    enum:
                      - null
                    nullable: true
