openapi: 3.0.3
info:
  title: custom_hostnames API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/custom_hostnames:
    get:
      description: List, search, sort, and filter all of your custom hostnames.
      operationId: custom-hostname-for-a-zone-list-custom-hostnames
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: hostname
          schema:
            description: >-
              Fully qualified domain name to match against. This parameter
              cannot be used with the 'id' parameter.
            maxLength: 255
            type: string
        - in: query
          name: hostname.contain
          schema:
            description: >-
              Filters hostnames by a substring match on the hostname value. This
              parameter cannot be used with the 'id' parameter.
            maxLength: 255
            type: string
        - in: query
          name: id
          schema:
            description: >-
              Hostname ID to match against. This ID was generated and returned
              during the initial custom_hostname creation. This parameter cannot
              be used with the 'hostname' parameter.
            maxLength: 36
            minLength: 36
            type: string
        - in: query
          name: page
          schema:
            default: 1
            description: Page number of paginated results.
            minimum: 1
            type: number
        - in: query
          name: per_page
          schema:
            default: 20
            description: Number of hostnames per page.
            maximum: 1000
            minimum: 5
            type: number
        - in: query
          name: order
          schema:
            default: ssl
            description: Field to order hostnames by.
            enum:
              - ssl
              - ssl_status
            type: string
        - in: query
          name: direction
          schema:
            description: Direction to order hostnames.
            enum:
              - asc
              - desc
            type: string
        - in: query
          name: ssl_status
          schema:
            description: Filter by SSL certificate status.
            enum:
              - initializing
              - pending_validation
              - deleted
              - pending_issuance
              - pending_deployment
              - pending_deletion
              - pending_expiration
              - expired
              - active
              - initializing_timed_out
              - validation_timed_out
              - issuance_timed_out
              - deployment_timed_out
              - deletion_timed_out
              - pending_cleanup
              - staging_deployment
              - staging_active
              - deactivating
              - inactive
              - backup_issued
              - holding_deployment
            type: string
        - in: query
          name: hostname_status
          schema:
            description: Filter by the hostname's activation status.
            enum:
              - active
              - pending
              - active_redeploying
              - moved
              - pending_deletion
              - deleted
              - pending_blocked
              - pending_migration
              - pending_provisioned
              - test_pending
              - test_active
              - test_active_apex
              - test_blocked
              - test_failed
              - provisioned
              - blocked
            type: string
        - in: query
          name: certificate_authority
          schema:
            description: >-
              Filter by the certificate authority that issued the SSL
              certificate.
            enum:
              - google
              - lets_encrypt
              - ssl_com
            type: string
        - in: query
          name: wildcard
          schema:
            description: Filter by whether the custom hostname is a wildcard hostname.
            type: boolean
        - in: query
          name: custom_origin_server
          schema:
            description: Filter by custom origin server name.
            type: string
        - in: query
          name: ssl
          schema:
            description: Whether to filter hostnames based on if they have SSL enabled.
            enum:
              - 0
              - 1
            type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCustomHostnameResponseCollection
          description: List Custom Hostnames response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesCustomHostname
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List Custom Hostnames response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Custom Hostnames
      tags:
        - Custom Hostname for a Zone
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain: []
        method: list
    post:
      description: >-
        Add a new custom hostname and request that an SSL certificate be issued
        for it. One of three validation methods—http, txt, email—should be used,
        with 'http' recommended if the CNAME is already in place (or will be
        soon). Specifying 'email' will send an email to the WHOIS contacts on
        file for the base domain plus hostmaster, postmaster, webmaster, admin,
        administrator. If http is used and the domain is not already pointing to
        the Managed CNAME host, the PATCH method must be used once it is (to
        complete validation). Enable bundling of certificates using the
        custom_cert_bundle field. The bundling process requires the following
        condition One certificate in the bundle must use an RSA, and the other
        must use an ECDSA.
      operationId: custom-hostname-for-a-zone-create-custom-hostname
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                custom_metadata:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesCustomMetadata
                hostname:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesHostnamePost'
                ssl:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesSslpost'
              required:
                - hostname
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCustomHostnameResponseSingle
          description: Create Custom Hostname response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefD2a16d7ee1ad3a888dd5821c918d51fd
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Create Custom Hostname response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create Custom Hostname
      tags:
        - Custom Hostname for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain: []
        method: create
  /zones/{zone_id}/custom_hostnames/fallback_origin:
    delete:
      description: >-
        Removes the fallback origin configuration for custom hostnames on a
        zone. Custom hostnames without specific origins will no longer have a
        fallback.
      operationId: >-
        custom-hostname-fallback-origin-for-a-zone-delete-fallback-origin-for-custom-hostnames
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesFallbackOriginResponse
          description: Delete Fallback Origin for Custom Hostnames response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      created_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCreatedAt
                        readOnly: true
                      errors:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesErrors'
                      origin:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesOrigin'
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCustomHostnameFallbackOriginComponentsSchemasStatus
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesUpdatedAt
                        readOnly: true
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Delete Fallback Origin for Custom Hostnames response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Fallback Origin for Custom Hostnames
      tags:
        - Custom Hostname Fallback Origin for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain:
          - fallback_origin
        method: delete
    get:
      description: >-
        Retrieves the current fallback origin configuration for custom hostnames
        on a zone. The fallback origin handles traffic when specific custom
        hostname origins are unavailable.
      operationId: >-
        custom-hostname-fallback-origin-for-a-zone-get-fallback-origin-for-custom-hostnames
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesFallbackOriginResponse
          description: Get Fallback Origin for Custom Hostnames response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      created_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCreatedAt
                        readOnly: true
                      errors:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesErrors'
                      origin:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesOrigin'
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCustomHostnameFallbackOriginComponentsSchemasStatus
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesUpdatedAt
                        readOnly: true
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Get Fallback Origin for Custom Hostnames response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Fallback Origin for Custom Hostnames
      tags:
        - Custom Hostname Fallback Origin for a Zone
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain:
          - fallback_origin
        method: get
    put:
      description: >-
        Updates the fallback origin configuration for custom hostnames on a
        zone. Sets the default origin server for custom hostname traffic.
      operationId: >-
        custom-hostname-fallback-origin-for-a-zone-update-fallback-origin-for-custom-hostnames
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                origin:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesOrigin'
              required:
                - origin
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesFallbackOriginResponse
          description: Update Fallback Origin for Custom Hostnames response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      created_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCreatedAt
                        readOnly: true
                      errors:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesErrors'
                      origin:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesOrigin'
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCustomHostnameFallbackOriginComponentsSchemasStatus
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesUpdatedAt
                        readOnly: true
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Update Fallback Origin for Custom Hostnames response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Fallback Origin for Custom Hostnames
      tags:
        - Custom Hostname Fallback Origin for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain:
          - fallback_origin
        method: update
  /zones/{zone_id}/custom_hostnames/{custom_hostname_id}:
    delete:
      description: >-
        Permanently deletes a custom hostname and revokes any SSL certificates
        that were issued for it. This action cannot be undone.
      operationId: >-
        custom-hostname-for-a-zone-delete-custom-hostname-(-and-any-issued-ssl-certificates)
      parameters:
        - in: path
          name: custom_hostname_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  id:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                type: object
          description: Delete Custom Hostname (and any issued SSL certificates) response
        4XX:
          content:
            application/json:
              schema:
                properties:
                  id:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                  errors:
                    minLength: 1
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  result:
                    enum:
                      - null
                    nullable: true
                    type: object
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - false
                    type: boolean
                type: object
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: >-
            Delete Custom Hostname (and any issued SSL certificates) response
            failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Custom Hostname (and any issued SSL certificates)
      tags:
        - Custom Hostname for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain: []
        method: delete
    get:
      description: >-
        Retrieves detailed information about a specific custom hostname,
        including SSL certificate status, ownership verification, and origin
        configuration.
      operationId: custom-hostname-for-a-zone-custom-hostname-details
      parameters:
        - in: path
          name: custom_hostname_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCustomHostnameResponseSingle
          description: Custom Hostname Details response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefD2a16d7ee1ad3a888dd5821c918d51fd
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Custom Hostname Details response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Custom Hostname Details
      tags:
        - Custom Hostname for a Zone
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain: []
        method: get
    patch:
      description: >-
        Modify SSL configuration for a custom hostname. When sent with SSL
        config that matches existing config, used to indicate that hostname
        should pass domain control validation (DCV). Can also be used to change
        validation type, e.g., from 'http' to 'email'. Bundle an existing
        certificate with another certificate by using the "custom_cert_bundle"
        field. The bundling process supports combining certificates as long as
        the following condition is met. One certificate must use the RSA
        algorithm, and the other must use the ECDSA algorithm.
      operationId: custom-hostname-for-a-zone-edit-custom-hostname
      parameters:
        - in: path
          name: custom_hostname_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                custom_metadata:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesCustomMetadata
                custom_origin_server:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesCustomOriginServer
                custom_origin_sni:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesCustomOriginSni
                ssl:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesSslpost'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCustomHostnameResponseSingle
          description: Edit Custom Hostname response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefD2a16d7ee1ad3a888dd5821c918d51fd
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Edit Custom Hostname response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Edit Custom Hostname
      tags:
        - Custom Hostname for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: custom_hostnames
        resource_chain: []
        method: edit
  /zones/{zone_id}/custom_hostnames/{custom_hostname_id}/certificate_pack/{certificate_pack_id}/certificates/{certificate_id}:
    delete:
      description: >-
        Delete a single custom certificate from a certificate pack that contains
        two bundled certificates. Deletion is subject to the following
        constraints. You cannot delete a certificate if it is the only remaining
        certificate in the pack. At least one certificate must remain in the
        pack.
      operationId: >-
        custom-hostname-for-a-zone-delete_single_certificate_and_key_in_a_custom_hostname
      parameters:
        - in: path
          name: custom_hostname_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - in: path
          name: certificate_pack_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: certificate_id
          in: path
          required: true
          description: The certificate ID.
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
