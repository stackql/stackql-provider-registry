          example: false
          type: boolean
          x-auditable: true
    tlsCertificatesAndHostnamesSslsettings:
      description: SSL specific settings.
      properties:
        ciphers:
          description: >-
            An allowlist of ciphers for TLS termination. These ciphers must be
            in the BoringSSL format.
          example:
            - ECDHE-RSA-AES128-GCM-SHA256
            - AES128-SHA
          items:
            type: string
            x-auditable: true
          type: array
          uniqueItems: true
        early_hints:
          description: Whether or not Early Hints is enabled.
          enum:
            - 'on'
            - 'off'
          example: 'on'
          type: string
          x-auditable: true
        http2:
          description: Whether or not HTTP2 is enabled.
          enum:
            - 'on'
            - 'off'
          example: 'on'
          type: string
          x-auditable: true
        min_tls_version:
          description: The minimum TLS version supported.
          enum:
            - '1.0'
            - '1.1'
            - '1.2'
            - '1.3'
          example: '1.2'
          type: string
          x-auditable: true
        tls_1_3:
          description: Whether or not TLS 1.3 is enabled.
          enum:
            - 'on'
            - 'off'
          example: 'on'
          type: string
          x-auditable: true
      type: object
    tlsCertificatesAndHostnamesUpdatedAt:
      description: This is the time the fallback origin was updated.
      example: '2020-03-16T18:11:23.531995Z'
      format: date-time
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesValidationRecord:
      description: Certificate's required validation record.
      properties:
        cname:
          description: The CNAME record hostname for DCV delegation.
          example: _acme-challenge.example.com
          readOnly: true
          type: string
          x-auditable: true
        cname_target:
          description: The CNAME record target value for DCV delegation.
          example: dcv.cloudflare.com
          readOnly: true
          type: string
          x-auditable: true
        emails:
          description: >-
            The set of email addresses that the certificate authority (CA) will
            use to complete domain validation.
          example:
            - administrator@example.com
            - webmaster@example.com
          items:
            type: string
            x-auditable: true
          type: array
        http_body:
          description: >-
            The content that the certificate authority (CA) will expect to find
            at the http_url during the domain validation.
          example: ca3-574923932a82475cb8592200f1a2a23d
          type: string
        http_url:
          description: The url that will be checked during domain validation.
          example: >-
            http://app.example.com/.well-known/pki-validation/ca3-da12a1c25e7b48cf80408c6c1763b8a2.txt
          type: string
        status:
          description: Status of the validation record.
          example: pending
          readOnly: true
          type: string
        txt_name:
          description: >-
            The hostname that the certificate authority (CA) will check for a
            TXT record during domain validation .
          example: _acme-challenge.app.example.com
          type: string
          x-auditable: true
        txt_value:
          description: >-
            The TXT record that the certificate authority (CA) will check during
            domain validation.
          example: 810b7d5f01154524b961ba0cd578acc2
          type: string
      type: object
    tlsCertificatesAndHostnamesVerificationErrors:
      description: >-
        These are errors that were encountered while trying to activate a
        hostname.
      example:
        - >-
          None of the A or AAAA records are owned by this account and the
          pre-generated ownership verification token was not found.
      items:
        type: string
        x-auditable: true
      type: array
    unnamedSchemaRef16aca57bde2963201c7e6e895436c1c1:
      default: ubiquitous
      description: >-
        A ubiquitous bundle has the highest probability of being verified
        everywhere, even by clients using outdated or unusual trust stores. An
        optimal bundle uses the shortest chain and newest intermediates. And the
        force bundle verifies the chain, but does not otherwise modify it.
      enum:
        - ubiquitous
        - optimal
        - force
      example: ubiquitous
      type: string
      x-auditable: true
    unnamedSchemaRef78adb375f06c6d462dd92b99e2ecf510:
      description: Domain control validation (DCV) method used for this hostname.
      enum:
        - http
        - txt
        - email
      example: http
      type: string
      x-auditable: true
    unnamedSchemaRef9a9935a9a770967bb604ae41a81e42e1:
      description: >-
        Level of validation to be used for this hostname. Domain validation (dv)
        must be used.
      enum:
        - dv
      example: dv
      type: string
      x-auditable: true
    unnamedSchemaRefD2a16d7ee1ad3a888dd5821c918d51fd:
      type: object
      properties:
        hostname:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesHostname'
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        ssl:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSsl'
        created_at:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCreatedAt'
          readOnly: true
        custom_metadata:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomMetadata'
        custom_origin_server:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomOriginServer'
        custom_origin_sni:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomOriginSni'
        ownership_verification:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesOwnershipVerification
        ownership_verification_http:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesOwnershipVerificationHttp
        status:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasStatus
        verification_errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesVerificationErrors'
      required:
        - id
        - hostname
      enum:
        - null
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
