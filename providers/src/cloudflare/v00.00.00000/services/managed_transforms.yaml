openapi: 3.0.3
info:
  title: managed_transforms API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones/{zone_id}/managed_headers:
    delete:
      description: Disables all Managed Transforms.
      operationId: deleteManagedTransforms
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '204':
          description: An empty response.
        4XX:
          content:
            application/json:
              schema:
                description: A response object.
                properties:
                  errors:
                    $ref: '#/components/schemas/rulesetsErrors'
                  messages:
                    $ref: '#/components/schemas/rulesetsMessages'
                  result:
                    description: A result.
                    title: Result
                    enum:
                    - null
                    type: string
                  success:
                    description: Whether the API call was successful.
                    title: Success
                    type: boolean
                    enum:
                    - false
                required:
                - result
                - success
                - errors
                - messages
                title: Response
                type: object
          description: A failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete Managed Transforms
      tags:
      - Managed Transforms
      x-api-token-group:
      - Response Compression Write
      - Config Settings Write
      - Dynamic URL Redirects Write
      - Cache Settings Write
      - Custom Errors Write
      - Origin Write
      - Managed headers Write
      - Zone Transform Rules Write
      - Mass URL Redirects Write
      - Magic Firewall Write
      - L4 DDoS Managed Ruleset Write
      - HTTP DDoS Managed Ruleset Write
      - Sanitize Write
      - Transform Rules Write
      - Select Configuration Write
      - Bot Management Write
      - Zone WAF Write
      - Account WAF Write
      - Account Rulesets Write
      - Logs Write
      - Logs Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: managed_transforms
        resource_chain: []
        method: delete
    get:
      description: Fetches a list of all Managed Transforms.
      operationId: listManagedTransforms
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                description: A response object.
                properties:
                  errors:
                    description: A list of error messages.
                    items:
                      $ref: '#/components/schemas/rulesetsMessage'
                    title: Errors
                    type: array
                    uniqueItems: true
                    enum:
                    - []
                  messages:
                    $ref: '#/components/schemas/rulesetsMessages'
                  result:
                    description: A result.
                    title: Result
                    $ref: '#/components/schemas/rulesetsManagedTransforms'
                  success:
                    description: Whether the API call was successful.
                    title: Success
                    type: boolean
                    enum:
                    - true
                required:
                - result
                - success
                - errors
                - messages
                title: Response
                type: object
          description: A Managed Transforms response.
        4XX:
          content:
            application/json:
              schema:
                description: A response object.
                properties:
                  errors:
                    $ref: '#/components/schemas/rulesetsErrors'
                  messages:
                    $ref: '#/components/schemas/rulesetsMessages'
                  result:
                    description: A result.
                    title: Result
                    enum:
                    - null
                    type: string
                  success:
                    description: Whether the API call was successful.
                    title: Success
                    type: boolean
                    enum:
                    - false
                required:
                - result
                - success
                - errors
                - messages
                title: Response
                type: object
          description: A failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Managed Transforms
      tags:
      - Managed Transforms
      x-api-token-group:
      - Response Compression Write
      - Response Compression Read
      - Config Settings Write
      - Config Settings Read
      - Dynamic URL Redirects Write
      - Dynamic URL Redirects Read
      - Cache Settings Write
      - Cache Settings Read
      - Custom Errors Write
      - Custom Errors Read
      - Origin Write
      - Origin Read
      - Managed headers Write
      - Managed headers Read
      - Zone Transform Rules Write
      - Zone Transform Rules Read
      - Mass URL Redirects Write
      - Mass URL Redirects Read
      - Magic Firewall Write
      - Magic Firewall Read
      - L4 DDoS Managed Ruleset Write
      - L4 DDoS Managed Ruleset Read
      - HTTP DDoS Managed Ruleset Write
      - HTTP DDoS Managed Ruleset Read
      - Sanitize Write
      - Sanitize Read
      - Transform Rules Write
      - Transform Rules Read
      - Select Configuration Write
      - Select Configuration Read
      - Bot Management Write
      - Bot Management Read
      - Zone WAF Write
      - Zone WAF Read
      - Account WAF Write
      - Account WAF Read
      - Account Rulesets Read
      - Account Rulesets Write
      - Logs Write
      - Logs Read
      - Logs Write
      - Logs Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: managed_transforms
        resource_chain: []
        method: list
    patch:
      description: Updates the status of one or more Managed Transforms.
      operationId: updateManagedTransforms
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              description: A Managed Transforms object.
              properties:
                managed_request_headers:
                  description: The list of Managed Request Transforms.
                  items:
                    description: A Managed Transform object.
                    properties:
                      conflicts_with:
                        description: The Managed Transforms that this Managed Transform conflicts with.
                        items:
                          type: string
                          title: Transform ID
                          description: The human-readable identifier of the Managed Transform.
                        minItems: 1
                        readOnly: true
                        title: Conflicts With
                        type: array
                        uniqueItems: true
                        x-stainless-skip:
                        - terraform
                      enabled:
                        description: Whether the Managed Transform is enabled.
                        title: Enabled
                        type: boolean
                      has_conflict:
                        description: Whether the Managed Transform conflicts with the currently-enabled Managed Transforms.
                        readOnly: true
                        title: Has Conflict
                        type: boolean
                        x-stainless-skip:
                        - terraform
                      id:
                        $ref: '#/components/schemas/rulesetsManagedTransformId'
                    required:
                    - id
                    - enabled
                    title: Managed Transform
                    type: object
                  title: Managed Request Transforms
                  type: array
                  uniqueItems: true
                managed_response_headers:
                  description: The list of Managed Response Transforms.
                  items:
                    description: A Managed Transform object.
                    properties:
                      conflicts_with:
                        description: The Managed Transforms that this Managed Transform conflicts with.
                        items:
                          type: string
                          title: Transform ID
                          description: The human-readable identifier of the Managed Transform.
                        minItems: 1
                        readOnly: true
                        title: Conflicts With
                        type: array
                        uniqueItems: true
                        x-stainless-skip:
                        - terraform
                      enabled:
                        description: Whether the Managed Transform is enabled.
                        title: Enabled
                        type: boolean
                      has_conflict:
                        description: Whether the Managed Transform conflicts with the currently-enabled Managed Transforms.
                        readOnly: true
                        title: Has Conflict
                        type: boolean
                        x-stainless-skip:
                        - terraform
                      id:
                        $ref: '#/components/schemas/rulesetsManagedTransformId'
                    required:
                    - id
                    - enabled
                    title: Managed Transform
                    type: object
                  title: Managed Response Transforms
                  type: array
                  uniqueItems: true
              required:
              - managed_request_headers
              - managed_response_headers
              title: Managed Transforms
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                description: A response object.
                properties:
                  errors:
                    description: A list of error messages.
                    items:
                      $ref: '#/components/schemas/rulesetsMessage'
                    title: Errors
                    type: array
                    uniqueItems: true
                    enum:
                    - []
                  messages:
                    $ref: '#/components/schemas/rulesetsMessages'
                  result:
                    description: A result.
                    title: Result
                    $ref: '#/components/schemas/rulesetsManagedTransforms'
                  success:
                    description: Whether the API call was successful.
                    title: Success
                    type: boolean
                    enum:
                    - true
                required:
                - result
                - success
                - errors
                - messages
                title: Response
                type: object
          description: A Managed Transforms response.
        4XX:
          content:
            application/json:
              schema:
                description: A response object.
                properties:
                  errors:
                    $ref: '#/components/schemas/rulesetsErrors'
                  messages:
                    $ref: '#/components/schemas/rulesetsMessages'
                  result:
                    description: A result.
                    title: Result
                    enum:
                    - null
                    type: string
                  success:
                    description: Whether the API call was successful.
                    title: Success
                    type: boolean
                    enum:
                    - false
                required:
                - result
                - success
                - errors
                - messages
                title: Response
                type: object
          description: A failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update Managed Transforms
      tags:
      - Managed Transforms
      x-api-token-group:
      - Response Compression Write
      - Config Settings Write
      - Dynamic URL Redirects Write
      - Cache Settings Write
      - Custom Errors Write
      - Origin Write
      - Managed headers Write
      - Zone Transform Rules Write
      - Mass URL Redirects Write
      - Magic Firewall Write
      - L4 DDoS Managed Ruleset Write
      - HTTP DDoS Managed Ruleset Write
      - Sanitize Write
      - Transform Rules Write
      - Select Configuration Write
      - Bot Management Write
      - Zone WAF Write
      - Account WAF Write
      - Account Rulesets Write
      - Logs Write
      - Logs Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: managed_transforms
        resource_chain: []
        method: edit
components:
  schemas:
    rulesetsErrors:
      description: A list of error messages.
      items:
        $ref: '#/components/schemas/rulesetsMessage'
      title: Errors
      type: array
      uniqueItems: true
    rulesetsManagedTransformId:
      description: The human-readable identifier of the Managed Transform.
      minLength: 1
      title: Transform ID
      type: string
    rulesetsManagedTransforms:
      description: A Managed Transforms object.
      properties:
        managed_request_headers:
          description: The list of Managed Request Transforms.
          items:
            description: A Managed Transform object.
            properties:
              conflicts_with:
                description: The Managed Transforms that this Managed Transform conflicts with.
                items:
                  type: string
                  title: Transform ID
                  description: The human-readable identifier of the Managed Transform.
                  example: add_true_client_ip_headers
                minItems: 1
                readOnly: true
                title: Conflicts With
                type: array
                uniqueItems: true
                x-stainless-skip:
                - terraform
              enabled:
                description: Whether the Managed Transform is enabled.
                example: true
                title: Enabled
                type: boolean
              has_conflict:
                description: Whether the Managed Transform conflicts with the currently-enabled Managed Transforms.
                example: false
                readOnly: true
                title: Has Conflict
                type: boolean
                x-stainless-skip:
                - terraform
              id:
                $ref: '#/components/schemas/rulesetsManagedTransformId'
                example: add_bot_protection_headers
            required:
            - id
            - enabled
            - has_conflict
            title: Managed Transform
            type: object
          title: Managed Request Transforms
          type: array
          uniqueItems: true
        managed_response_headers:
          description: The list of Managed Response Transforms.
          items:
            description: A Managed Transform object.
            properties:
              conflicts_with:
                description: The Managed Transforms that this Managed Transform conflicts with.
                items:
                  type: string
                  title: Transform ID
                  description: The human-readable identifier of the Managed Transform.
                  example: add_true_client_ip_headers
                minItems: 1
                readOnly: true
                title: Conflicts With
                type: array
                uniqueItems: true
                x-stainless-skip:
                - terraform
              enabled:
                description: Whether the Managed Transform is enabled.
                example: true
                title: Enabled
                type: boolean
              has_conflict:
                description: Whether the Managed Transform conflicts with the currently-enabled Managed Transforms.
                example: false
                readOnly: true
                title: Has Conflict
                type: boolean
                x-stainless-skip:
                - terraform
              id:
                $ref: '#/components/schemas/rulesetsManagedTransformId'
                example: add_security_headers
            required:
            - id
            - enabled
            - has_conflict
            title: Managed Transform
            type: object
          title: Managed Response Transforms
          type: array
          uniqueItems: true
      required:
      - managed_request_headers
      - managed_response_headers
      title: Managed Transforms
      type: object
    rulesetsMessage:
      description: A message.
      properties:
        code:
          description: A unique code for this message.
          example: 10000
          title: Code
          type: integer
        message:
          description: A text description of this message.
          example: something bad happened
          minLength: 1
          title: Description
          type: string
        source:
          description: The source of this message.
          properties:
            pointer:
              description: A JSON pointer to the field that is the source of the message.
              example: /rules/0/action
              minLength: 1
              title: Pointer
              type: string
          required:
          - pointer
          title: Source
          type: object
      required:
      - message
      title: Message
      type: object
    rulesetsMessages:
      description: A list of warning messages.
      items:
        $ref: '#/components/schemas/rulesetsMessage'
      title: Messages
      type: array
      uniqueItems: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: The preferred authorization scheme for interacting with the Cloudflare API. [Create a token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: Used when interacting with the Origin CA certificates API. [View/change your key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    managed_headers:
      id: cloudflare.managed_transforms.managed_headers
      name: managed_headers
      title: Managed Headers
      methods:
        delete:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1managed_headers/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '204'
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1managed_headers/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        edit:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1managed_headers/patch'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .managed_request_headers }}{{ $sep }}"managed_request_headers": {{ if eq (kindOf .managed_request_headers) "string" }}{{ .managed_request_headers }}{{ else }}{{ toJson .managed_request_headers }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .managed_response_headers }}{{ $sep }}"managed_response_headers": {{ if eq (kindOf .managed_response_headers) "string" }}{{ .managed_response_headers }}{{ else }}{{ toJson .managed_response_headers }}{{ end }}{{- $sep = "," -}}{{ end }}

                }

                '
      sqlVerbs:
        select:
        - $ref: '#/components/x-stackQL-resources/managed_headers/methods/list'
        insert: []
        update:
        - $ref: '#/components/x-stackQL-resources/managed_headers/methods/edit'
        delete:
        - $ref: '#/components/x-stackQL-resources/managed_headers/methods/delete'
        replace: []
