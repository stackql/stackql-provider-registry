openapi: 3.0.3
info:
  title: kv API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/storage/kv/namespaces:
    get:
      description: Returns the namespaces owned by an account.
      operationId: workers-kv-namespace-list-namespaces
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Maximum number of results per page.
          maximum: 1000
          minimum: 1
          type: number
      - in: query
        name: order
        schema:
          description: Field to order results by.
          enum:
          - id
          - title
          type: string
      - in: query
        name: direction
        schema:
          description: Direction to order namespaces.
          enum:
          - asc
          - desc
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/workersKvResultInfo'
                  result:
                    items:
                      $ref: '#/components/schemas/workersKvNamespace'
                    type: array
                required:
                - success
                - errors
                - messages
          description: List Namespaces response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: List Namespaces response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Namespaces
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      - Workers KV Storage Read
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        method: list
    post:
      description: Creates a namespace under the given title. A `400` is returned if the account already owns a namespace with this title. A namespace must be explicitly deleted to be replaced.
      operationId: workers-kv-namespace-create-a-namespace
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workersKvCreateRenameNamespaceBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/workersKvNamespace'
                required:
                - success
                - errors
                - messages
                type: object
          description: Create a Namespace response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: Create a Namespace response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a Namespace
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        method: create
  /accounts/{account_id}/storage/kv/namespaces/{namespace_id}:
    delete:
      description: Deletes the namespace corresponding to the given ID.
      operationId: workers-kv-namespace-remove-a-namespace
      parameters:
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonNoResult'
          description: Remove a Namespace response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: Remove a Namespace response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Remove a Namespace
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        method: delete
    get:
      description: Get the namespace corresponding to the given ID.
      operationId: workers-kv-namespace-get-a-namespace
      parameters:
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/workersKvNamespace'
                required:
                - success
                - errors
                - messages
                type: object
          description: Get a Namespace response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: Get a Namespace response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get a Namespace
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      - Workers KV Storage Read
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        method: get
    put:
      description: Modifies a namespace's title.
      operationId: workers-kv-namespace-rename-a-namespace
      parameters:
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workersKvCreateRenameNamespaceBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/workersKvNamespace'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Rename a Namespace response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: Rename a Namespace response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Rename a Namespace
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        method: update
  /accounts/{account_id}/storage/kv/namespaces/{namespace_id}/bulk:
    delete:
      deprecated: true
      description: Remove multiple KV pairs from the namespace. Body should be an array of up to 10,000 keys to be removed.
      operationId: workers-kv-namespace-delete-multiple-key-value-pairs-deprecated
      parameters:
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    nullable: true
                    type: object
                    x-stainless-empty-object: true
                    $ref: '#/components/schemas/workersKvBulkResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Delete multiple key-value pairs response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    nullable: true
                    type: object
                    x-stainless-empty-object: true
                    $ref: '#/components/schemas/workersKvBulkResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Delete multiple key-value pairs response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete multiple key-value pairs
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
    put:
      description: Write multiple keys and values at once. Body should be an array of up to 10,000 key-value pairs to be stored, along with optional expiration information. Existing values and expirations will be overwritten. If neither `expiration` nor `expiration_ttl` is specified, the key-value pair will never expire. If both are set, `expiration_ttl` is used and `expiration` is ignored. The entire request size must be 100 megabytes or less.
      operationId: workers-kv-namespace-write-multiple-key-value-pairs
      parameters:
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workersKvBulkWrite'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    nullable: true
                    type: object
                    x-stainless-empty-object: true
                    $ref: '#/components/schemas/workersKvBulkResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Write multiple key-value pairs response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    nullable: true
                    type: object
                    x-stainless-empty-object: true
                    $ref: '#/components/schemas/workersKvBulkResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Write multiple key-value pairs response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Write multiple key-value pairs
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        - keys
        method: bulk_update
  /accounts/{account_id}/storage/kv/namespaces/{namespace_id}/bulk/delete:
    post:
      description: Remove multiple KV pairs from the namespace. Body should be an array of up to 10,000 keys to be removed.
      operationId: workers-kv-namespace-delete-multiple-key-value-pairs
      parameters:
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workersKvBulkDelete'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    nullable: true
                    type: object
                    x-stainless-empty-object: true
                    $ref: '#/components/schemas/workersKvBulkResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Delete multiple key-value pairs response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    nullable: true
                    type: object
                    x-stainless-empty-object: true
                    $ref: '#/components/schemas/workersKvBulkResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Delete multiple key-value pairs response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete multiple key-value pairs
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        - keys
        method: bulk_delete
  /accounts/{account_id}/storage/kv/namespaces/{namespace_id}/bulk/get:
    post:
      description: Retrieve up to 100 KV pairs from the namespace. Keys must contain text-based values. JSON values can optionally be parsed instead of being returned as a string value. Metadata can be included if `withMetadata` is true.
      operationId: workers-kv-namespace-get-multiple-key-value-pairs
      parameters:
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                keys:
                  description: Array of keys to retrieve (maximum of 100).
                  items:
                    $ref: '#/components/schemas/workersKvKeyNameBulk'
                  maxItems: 100
                  type: array
                type:
                  default: text
                  description: Whether to parse JSON values in the response.
                  enum:
                  - text
                  - json
                  type: string
                withMetadata:
                  default: false
                  description: Whether to include metadata in the response.
                  type: boolean
              required:
              - keys
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    nullable: true
                    type: object
                    x-stainless-empty-object: true
                    properties:
                      values:
                        description: Requested keys are paired with their values in an object.
                        type: object
                required:
                - success
                - errors
                - messages
                type: object
          description: Get multiple key-value pairs response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: Get multiple key-value pairs response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get multiple key-value pairs
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      - Workers KV Storage Read
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        - keys
        method: bulk_get
  /accounts/{account_id}/storage/kv/namespaces/{namespace_id}/keys:
    get:
      description: Lists a namespace's keys.
      operationId: workers-kv-namespace-list-a-namespace'-s-keys
      parameters:
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: limit
        schema:
          default: 1000
          description: Limits the number of keys returned in the response. The cursor attribute may be used to iterate over the next batch of keys if there are more than the limit.
          maximum: 1000
          minimum: 10
          type: number
      - in: query
        name: prefix
        schema:
          description: Filters returned keys by a name prefix. Exact matches and any key names that begin with the prefix will be returned.
          type: string
      - in: query
        name: cursor
        schema:
          description: Opaque token indicating the position from which to continue when requesting the next set of records if the amount of list results was limited by the limit parameter. A valid value for the cursor can be obtained from the `cursors` object in the `result_info` structure.
          type: string
          x-stainless-pagination-property:
            purpose: next_cursor_param
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/workersKvKey'
                    type: array
                    x-stainless-pagination-property:
                      purpose: items
                  result_info:
                    $ref: '#/components/schemas/workersKvCursorResultInfo'
                required:
                - success
                - errors
                - messages
                type: object
          description: List a Namespace's Keys response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: List a Namespace's Keys response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List a Namespace's Keys
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      - Workers KV Storage Read
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        - keys
        method: list
  /accounts/{account_id}/storage/kv/namespaces/{namespace_id}/metadata/{key_name}:
    get:
      description: Returns the metadata associated with the given key in the given namespace. Use URL-encoding to use special characters (for example, `:`, `!`, `%`) in the key name.
      operationId: workers-kv-namespace-read-the-metadata-for-a-key
      parameters:
      - in: path
        name: key_name
        schema:
          $ref: '#/components/schemas/workersKvKeyName'
        required: true
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/workersKvMessages'
                  messages:
                    $ref: '#/components/schemas/workersKvMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/workersKvListMetadata'
                required:
                - success
                - errors
                - messages
                type: object
          description: Read the metadata for a key response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: Read the metadata for a key response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Read the metadata for a key
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      - Workers KV Storage Read
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        - metadata
        method: get
  /accounts/{account_id}/storage/kv/namespaces/{namespace_id}/values/{key_name}:
    delete:
      description: Remove a KV pair from the namespace. Use URL-encoding to use special characters (for example, `:`, `!`, `%`) in the key name.
      operationId: workers-kv-namespace-delete-key-value-pair
      parameters:
      - in: path
        name: key_name
        schema:
          $ref: '#/components/schemas/workersKvKeyName'
        required: true
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonNoResult'
          description: Delete key-value pair response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: Delete key-value pair response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete key-value pair
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        - values
        method: delete
    get:
      description: Returns the value associated with the given key in the given namespace. Use URL-encoding to use special characters (for example, `:`, `!`, `%`) in the key name. If the KV-pair is set to expire at some point, the expiration time as measured in seconds since the UNIX epoch will be returned in the `expiration` response header.
      operationId: workers-kv-namespace-read-key-value-pair
      parameters:
      - in: path
        name: key_name
        schema:
          $ref: '#/components/schemas/workersKvKeyName'
        required: true
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/octet-stream:
              schema:
                type: object
                properties:
                  contents:
                    type: string
          description: Read key-value pair response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: Read key-value pair response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Read key-value pair
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      - Workers KV Storage Read
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        - values
        method: get
    put:
      description: Write a value identified by a key. Use URL-encoding to use special characters (for example, `:`, `!`, `%`) in the key name. Body should be the value to be stored. If JSON metadata to be associated with the key/value pair is needed, use `multipart/form-data` content type for your PUT request (see dropdown below in `REQUEST BODY SCHEMA`). Existing values, expirations, and metadata will be overwritten. If neither `expiration` nor `expiration_ttl` is specified, the key-value pair will never expire. If both are set, `expiration_ttl` is used and `expiration` is ignored.
      operationId: workers-kv-namespace-write-key-value-pair-with-metadata
      parameters:
      - in: path
        name: key_name
        schema:
          $ref: '#/components/schemas/workersKvKeyName'
        required: true
      - name: namespace_id
        in: path
        required: true
        description: The Workers KV namespace ID.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: expiration
        schema:
          $ref: '#/components/schemas/workersKvExpiration'
      - in: query
        name: expiration_ttl
        schema:
          $ref: '#/components/schemas/workersKvExpirationTtl'
      requestBody:
        content:
          application/octet-stream:
            schema:
              $ref: '#/components/schemas/workersKvValue'
            x-stainless-only:
            - http
          multipart/form-data:
            encoding:
              metadata:
                contentType: application/json
            schema:
              properties:
                metadata:
                  $ref: '#/components/schemas/workersKvMetadata'
                value:
                  $ref: '#/components/schemas/workersKvValue'
              required:
              - value
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonNoResult'
          description: Write key-value pair with metadata response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workersKvApiResponseCommonFailure'
          description: Write key-value pair with metadata response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Write key-value pair with optional metadata
      tags:
      - Workers KV Namespace
      x-api-token-group:
      - Workers KV Storage Write
      x-stackql-sdk:
        service: kv
        resource_chain:
        - namespaces
        - values
        method: update
components:
  schemas:
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
      - code
      - message
      type: object
      uniqueItems: true
    workersKvAny:
      type: unknown
    workersKvApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/workersKvMessages'
        messages:
          example: []
          $ref: '#/components/schemas/workersKvMessages'
        result:
          nullable: true
          type: object
          x-stainless-empty-object: true
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    workersKvApiResponseCommonNoResult:
      properties:
        errors:
          $ref: '#/components/schemas/workersKvMessages'
        messages:
          $ref: '#/components/schemas/workersKvMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          nullable: true
          type: object
          x-stainless-empty-object: true
      required:
      - success
      - errors
      - messages
      type: object
    workersKvBulkDelete:
      items:
        $ref: '#/components/schemas/workersKvKeyNameBulk'
      type: array
    workersKvBulkResult:
      properties:
        successful_key_count:
          description: Number of keys successfully updated.
          example: 100
          type: number
        unsuccessful_keys:
          description: Name of the keys that failed to be fully updated. They should be retried.
          items:
            type: string
          type: array
      type: object
    workersKvBulkWrite:
      items:
        properties:
          base64:
            default: false
            description: Indicates whether or not the server should base64 decode the value before storing it. Useful for writing values that wouldn't otherwise be valid JSON strings, such as images.
            type: boolean
          expiration:
            $ref: '#/components/schemas/workersKvExpiration'
          expiration_ttl:
            $ref: '#/components/schemas/workersKvExpirationTtl'
          key:
            $ref: '#/components/schemas/workersKvKeyNameBulk'
          metadata:
            $ref: '#/components/schemas/workersKvListMetadata'
          value:
            description: A UTF-8 encoded string to be stored, up to 25 MiB in length.
            example: Some string
            maxLength: 26214400
            type: string
        required:
        - key
        - value
        type: object
      type: array
    workersKvCreateRenameNamespaceBody:
      properties:
        title:
          $ref: '#/components/schemas/workersKvNamespaceTitle'
      required:
      - title
      type: object
    workersKvCursor:
      description: Opaque token indicating the position from which to continue when requesting the next set of records if the amount of list results was limited by the limit parameter. A valid value for the cursor can be obtained from the cursors object in the result_info structure.
      example: 6Ck1la0VxJ0djhidm1MdX2FyDGxLKVeeHZZmORS_8XeSuhz9SjIJRaSa2lnsF01tQOHrfTGAP3R5X1Kv5iVUuMbNKhWNAXHOl6ePB0TUL8nw
      type: string
      x-stainless-pagination-property:
        purpose: next_cursor_field
    workersKvCursorResultInfo:
      properties:
        count:
          description: Total results returned based on your list parameters.
          example: 1
          type: number
        cursor:
          $ref: '#/components/schemas/workersKvCursor'
      type: object
    workersKvExpiration:
      description: Expires the key at a certain time, measured in number of seconds since the UNIX epoch.
      example: 1578435000
      type: number
    workersKvExpirationTtl:
      description: Expires the key after a number of seconds. Must be at least 60.
      example: 300
      minimum: 60
      type: number
    workersKvKey:
      description: A name for a value. A value stored under a given key may be retrieved via the same key.
      properties:
        expiration:
          description: The time, measured in number of seconds since the UNIX epoch, at which the key will expire. This property is omitted for keys that will not expire.
          example: 1577836800
          type: number
        metadata:
          $ref: '#/components/schemas/workersKvListMetadata'
        name:
          $ref: '#/components/schemas/workersKvKeyName'
      required:
      - name
      type: object
    workersKvKeyName:
      description: A key's name. The name may be at most 512 bytes. All printable, non-whitespace characters are valid. Use percent-encoding to define key names as part of a URL.
      example: My-Key
      maxLength: 512
      type: string
    workersKvKeyNameBulk:
      description: A key's name. The name may be at most 512 bytes. All printable, non-whitespace characters are valid.
      example: My-Key
      maxLength: 512
      type: string
    workersKvListMetadata:
      $ref: '#/components/schemas/workersKvAny'
      description: Arbitrary JSON that is associated with a key.
    workersKvMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
      uniqueItems: true
    workersKvMetadata:
      $ref: '#/components/schemas/workersKvAny'
      description: Associates arbitrary JSON data with a key/value pair.
    workersKvNamespace:
      properties:
        id:
          $ref: '#/components/schemas/workersKvNamespaceIdentifier'
        supports_url_encoding:
          description: True if keys written on the URL will be URL-decoded before storing. For example, if set to "true", a key written on the URL as "%3F" will be stored as "?".
          example: true
          readOnly: true
          type: boolean
          x-auditable: true
        title:
          $ref: '#/components/schemas/workersKvNamespaceTitle'
      required:
      - id
      - title
      type: object
    workersKvNamespaceIdentifier:
      description: Namespace identifier tag.
      example: 0f2ac74b498b48028cb68387c421e279
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    workersKvNamespaceTitle:
      description: A human-readable string name for a Namespace.
      example: My Own Namespace
      maxLength: 512
      type: string
      x-auditable: true
    workersKvResultInfo:
      properties:
        count:
          description: Total number of results for the requested service.
          example: 1
          type: number
        page:
          description: Current page within paginated list of results.
          example: 1
          type: number
        per_page:
          description: Number of results per page of results.
          example: 20
          type: number
        total_count:
          description: Total results available without any search parameters.
          example: 2000
          type: number
      type: object
    workersKvValue:
      description: A byte sequence to be stored, up to 25 MiB in length.
      example: Some Value
      type: string
      format: binary
    stackqlWorkersKvValueBody:
      type: object
      required:
      - value
      properties:
        value:
          $ref: '#/components/schemas/workersKvValue'
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
