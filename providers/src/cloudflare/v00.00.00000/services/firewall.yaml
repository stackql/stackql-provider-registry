  /graphql/firewall_events_adaptive_groups:
    post:
      operationId: graphql-firewall_events_adaptive_groups-list
      summary: Firewall event analytics for a zone, with adaptive sampling, grouped by action / source / rule / country / status
      description: Firewall event analytics for a zone, with adaptive sampling, grouped by action / source / rule / country / status. Each row aggregates the count of firewall events for one dimension tuple over the requested time window. Useful for surfacing top blocking rules, top blocked countries, top targeted paths.
      x-stackQL-graphQL:
        url: https://api.cloudflare.com/client/v4/graphql
        httpVerb: POST
        responseSelection:
          jsonPath: $.result[*]
        cursor:
          strategy: keyset
          jsonPath: $.data.viewer.zones[0].firewallEventsAdaptiveGroups[-1:].dimensions.datetime
          format: ', AND datetime_gt: "{{ .value }}"'
        query: "query {\n  viewer {\n    zones(filter: { zoneTag: \"{{ .zone_tag }}\" }, limit: 1) {\n      firewallEventsAdaptiveGroups(\n        filter: { datetime_geq: \"{{ .since }}\", datetime_lt: \"{{ .until }}\"{{ .cursor }} }\n        limit: {{ if .limit }}{{ .limit }}{{ else }}100{{ end }}\n        orderBy: [datetimeMinute_ASC]\n      ) {\n        dimensions {\n          datetime: datetimeMinute\n          action\n          source\n          ruleId\n          rulesetId\n          clientCountryName\n          clientIP\n          clientASNDescription\n          edgeResponseStatus\n          clientRequestPath\n          clientRequestHTTPHost\n        }\n        count\n      }\n    }\n  }\n}\n"
      x-stackql-protocol: graphql
      parameters:
      - name: zone_tag
        in: path
        required: true
        schema:
          type: string
        description: Cloudflare zone ID (the 32-char hex tag).
      - name: since
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Lower bound (inclusive) of the time range. RFC3339 (e.g. 2026-05-29T00:00:00Z).
      - name: until
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Upper bound (exclusive) of the time range. RFC3339.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
        description: Maximum number of dimension-tuple rows to return per call.
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        datetime:
                          type: string
                          format: date-time
                          description: Minute-bucketed timestamp (RFC3339).
                        action:
                          type: string
                          description: First-class action taken by the firewall (block, challenge, jschallenge, log, allow, etc.).
                        source:
                          type: string
                          description: Cloudflare security product that triggered the event (waf, firewallrules, ratelimit, etc.).
                        rule_id:
                          type: string
                          description: Product-specific rule ID triggered by this event.
                        ruleset_id:
                          type: string
                          description: Product-specific ruleset ID triggered by this event.
                        client_country_name:
                          type: string
                          description: ISO-3166 alpha-2 country code derived from client IP.
                        client_ip:
                          type: string
                          description: Visitor IP address (IPv4 or IPv6).
                        client_asn_description:
                          type: string
                          description: Visitor ASN as a string (e.g. AS15169 Google LLC).
                        edge_response_status:
                          type: integer
                          description: HTTP status returned to the client.
                        client_request_path:
                          type: string
                          description: Path component of the client request.
                        client_request_http_host:
                          type: string
                          description: Hostname component of the client request.
                        events:
                          type: integer
                          description: Number of firewall events contributing to this dimension tuple.
