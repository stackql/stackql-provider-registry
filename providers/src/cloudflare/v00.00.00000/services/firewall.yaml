openapi: 3.0.3
info:
  title: firewall API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /user/firewall/access_rules/rules:
    get:
      description: Fetches IP Access rules of the user. You can filter the results using several optional parameters.
      operationId: ip-access-rules-for-a-user-list-ip-access-rules
      parameters:
      - in: query
        name: mode
        schema:
          $ref: '#/components/schemas/firewallSchemasMode'
      - in: query
        name: configuration.target
        schema:
          description: Defines the target to search in existing rules.
          enum:
          - ip
          - ip_range
          - asn
          - country
          type: string
      - in: query
        name: configuration.value
        schema:
          description: 'Defines the target value to search for in existing rules: an IP address, an IP address range, or a country code, depending on the provided `configuration.target`. Notes: You can search for a single IPv4 address, an IP address range with a subnet of ''/16'' or ''/24'', or a two-letter ISO-3166-1 alpha-2 country code.'
          type: string
      - in: query
        name: notes
        schema:
          description: 'Defines the string to search for in the notes of existing IP Access rules. Notes: For example, the string ''attack'' would match IP Access rules with notes ''Attack 26/02'' and ''Attack 27/02''. The search is case insensitive.'
          type: string
      - in: query
        name: match
        schema:
          default: all
          description: Defines the search requirements. When set to `all`, all the search requirements must match. When set to `any`, only one of the search requirements has to match.
          enum:
          - any
          - all
          type: string
      - in: query
        name: page
        schema:
          description: Defines the requested page within paginated list of results.
          type: number
      - in: query
        name: per_page
        schema:
          description: Defines the maximum number of results requested.
          type: number
      - in: query
        name: order
        schema:
          description: Defines the field used to sort returned rules.
          enum:
          - configuration.target
          - configuration.value
          - mode
          type: string
      - in: query
        name: direction
        schema:
          description: Defines the direction used to sort returned rules.
          enum:
          - asc
          - desc
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallRuleCollectionResponse'
          description: List IP Access rules response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    items:
                      type: object
                      $ref: '#/components/schemas/firewallRule'
                    nullable: true
                    type: array
                    enum:
                    - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/firewallResultInfo'
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: List IP Access rules response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List IP Access rules
      tags:
      - IP Access rules for a user
      x-api-token-group:
      - Account Firewall Access Rules Write
      - Account Firewall Access Rules Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
    post:
      description: 'Creates a new IP Access rule for all zones owned by the current user. Note: To create an IP Access rule that applies to a specific zone, refer to the [IP Access rules for a zone](#ip-access-rules-for-a-zone) endpoints.'
      operationId: ip-access-rules-for-a-user-create-an-ip-access-rule
      requestBody:
        content:
          application/json:
            schema:
              properties:
                configuration:
                  $ref: '#/components/schemas/firewallConfiguration'
                mode:
                  $ref: '#/components/schemas/firewallSchemasMode'
                notes:
                  $ref: '#/components/schemas/firewallNotes'
                  default: ''
              required:
              - mode
              - configuration
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallRuleSingleResponse'
          description: Create an IP Access rule response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    properties:
                      allowed_modes:
                        description: The available actions that a rule can apply to a matched request.
                        items:
                          $ref: '#/components/schemas/firewallSchemasMode'
                        readOnly: true
                        type: array
                      configuration:
                        $ref: '#/components/schemas/firewallConfiguration'
                      created_on:
                        description: The timestamp of when the rule was created.
                        format: date-time
                        readOnly: true
                        type: string
                      id:
                        $ref: '#/components/schemas/firewallSchemasIdentifier'
                      mode:
                        $ref: '#/components/schemas/firewallSchemasMode'
                      modified_on:
                        description: The timestamp of when the rule was last modified.
                        format: date-time
                        readOnly: true
                        type: string
                      notes:
                        $ref: '#/components/schemas/firewallNotes'
                    required:
                    - id
                    - mode
                    - allowed_modes
                    - configuration
                    type: object
                    enum:
                    - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Create an IP Access rule response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create an IP Access rule
      tags:
      - IP Access rules for a user
      x-api-token-group:
      - Account Firewall Access Rules Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /user/firewall/access_rules/rules/{rule_id}:
    delete:
      description: 'Deletes an IP Access rule at the user level. Note: Deleting a user-level rule will affect all zones owned by the user.'
      operationId: ip-access-rules-for-a-user-delete-an-ip-access-rule
      parameters:
      - name: rule_id
        in: path
        required: true
        description: The rule ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallRuleSingleIdResponse'
          description: Delete an IP Access rule response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    properties:
                      id:
                        $ref: '#/components/schemas/firewallSchemasIdentifier'
                    type: object
                    enum:
                    - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Delete an IP Access rule response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete an IP Access rule
      tags:
      - IP Access rules for a user
      x-api-token-group:
      - Account Firewall Access Rules Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
    patch:
      description: Updates an IP Access rule defined at the user level. You can only update the rule action (`mode` parameter) and notes.
      operationId: ip-access-rules-for-a-user-update-an-ip-access-rule
      parameters:
      - name: rule_id
        in: path
        required: true
        description: The rule ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                mode:
                  $ref: '#/components/schemas/firewallSchemasMode'
                notes:
                  $ref: '#/components/schemas/firewallNotes'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallRuleSingleResponse'
          description: Update an IP Access rule response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    properties:
                      allowed_modes:
                        description: The available actions that a rule can apply to a matched request.
                        items:
                          $ref: '#/components/schemas/firewallSchemasMode'
                        readOnly: true
                        type: array
                      configuration:
                        $ref: '#/components/schemas/firewallConfiguration'
                      created_on:
                        description: The timestamp of when the rule was created.
                        format: date-time
                        readOnly: true
                        type: string
                      id:
                        $ref: '#/components/schemas/firewallSchemasIdentifier'
                      mode:
                        $ref: '#/components/schemas/firewallSchemasMode'
                      modified_on:
                        description: The timestamp of when the rule was last modified.
                        format: date-time
                        readOnly: true
                        type: string
                      notes:
                        $ref: '#/components/schemas/firewallNotes'
                    required:
                    - id
                    - mode
                    - allowed_modes
                    - configuration
                    type: object
                    enum:
                    - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Update an IP Access rule response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update an IP Access rule
      tags:
      - IP Access rules for a user
      x-api-token-group:
      - Account Firewall Access Rules Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
