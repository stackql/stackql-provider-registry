        messages:
          $ref: '#/components/schemas/firewallMessages'
        result:
          nullable: true
          properties:
            id:
              $ref: '#/components/schemas/firewallIdentifier'
          required:
          - id
          type: object
        success:
          description: Defines whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
    firewallBody:
      description: The response body to return. The value must conform to the configured content type.
      example: <error>This request has been rate-limited.</error>
