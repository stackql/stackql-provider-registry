openapi: 3.0.3
info:
  title: r2 API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/event_notifications/r2/{bucket_name}/configuration:
    get:
      description: List all event notification rules for a bucket.
      operationId: r2-get-event-notification-configs
      parameters:
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2Errors'
                  messages:
                    $ref: '#/components/schemas/r2Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/r2BucketConfig'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Read Configuration response.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: No Configuration Found response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Read Configuration failure.
      security:
      - api_token: []
      summary: List Event Notification Rules
      tags:
      - R2 Bucket
      x-api-token-group:
      - Workers R2 Storage Write
      - Workers R2 Storage Read
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        - event_notifications
        method: list
  /accounts/{account_id}/event_notifications/r2/{bucket_name}/configuration/queues/{queue_id}:
    delete:
      description: Delete an event notification rule. **If no body is provided, all rules for specified queue will be deleted**.
      operationId: r2-event-notification-delete-config
      parameters:
      - name: queue_id
        in: path
        required: true
        description: The Cloudflare Queue ID.
        schema:
          type: string
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4Response'
                type: object
          description: Delete Configuration response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Delete Configuration failure.
      security:
      - api_token: []
      summary: Delete Event Notification Rules
      tags:
      - R2 Bucket
      x-api-token-group:
      - Workers R2 Storage Write
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        - event_notifications
        method: delete
    get:
      description: Get a single event notification rule.
      operationId: r2-get-event-notification-config
      parameters:
      - name: queue_id
        in: path
        required: true
        description: The Cloudflare Queue ID.
        schema:
          type: string
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          default: default
          description: The bucket jurisdiction.
          enum:
          - default
          - eu
          - fedramp
          type: string
          x-stainless-param: jurisdiction
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2Errors'
                  messages:
                    $ref: '#/components/schemas/r2Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/r2QueuesConfig'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Read Configuration response.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: No Configuration Found response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Read Configuration failure.
      security:
      - api_token: []
      summary: Get Event Notification Rule
      tags:
      - R2 Bucket
      x-api-token-group:
      - Workers R2 Storage Write
      - Workers R2 Storage Read
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        - event_notifications
        method: get
    put:
      description: Create event notification rule.
      operationId: r2-put-event-notification-config
      parameters:
      - name: queue_id
        in: path
        required: true
        description: The Cloudflare Queue ID.
        schema:
          type: string
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      requestBody:
        content:
          application/json:
            schema:
              properties:
                rules:
                  description: Array of rules to drive notifications.
                  items:
                    $ref: '#/components/schemas/r2Rule'
                  minItems: 1
                  type: array
              required:
              - rules
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4Response'
                type: object
          description: Create Configuration response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Create Configuration failure.
      security:
      - api_token: []
      summary: Create Event Notification Rule
      tags:
      - R2 Bucket
      x-api-token-group:
      - Workers R2 Storage Write
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        - event_notifications
        method: update
  /accounts/{account_id}/r2/buckets:
    get:
      description: Lists all R2 buckets on your account.
      operationId: r2-list-buckets
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: name_contains
        schema:
          description: Bucket names to filter by. Only buckets with this phrase in their name will be returned.
          type: string
      - in: query
        name: start_after
        schema:
          description: Bucket name to start searching after. Buckets are ordered lexicographically.
          type: string
      - in: query
        name: per_page
        schema:
          default: 20
          description: Maximum number of buckets to return in a single call.
          maximum: 1000
          minimum: 1
          type: number
      - in: query
        name: order
        schema:
          description: Field to order buckets by.
          enum:
          - name
          type: string
      - in: query
        name: direction
        schema:
          description: Direction to order buckets.
          enum:
          - asc
          - desc
          type: string
      - in: query
        name: cursor
        schema:
          description: Pagination cursor received during the last List Buckets call. R2 buckets are paginated using cursors instead of page numbers.
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2Errors'
                  messages:
                    $ref: '#/components/schemas/r2Messages'
                  result:
                    type: object
                    properties:
                      buckets:
                        items:
                          $ref: '#/components/schemas/r2Bucket'
                        type: array
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/r2ResultInfo'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: List Buckets response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: List Buckets response failure.
      security:
      - api_token: []
      summary: List Buckets
      tags:
      - R2 Bucket
      x-api-token-group:
      - Workers R2 Storage Write
      - Workers R2 Storage Read
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        method: list
    post:
      description: Creates a new R2 bucket.
      operationId: r2-create-bucket
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      requestBody:
        content:
          application/json:
            schema:
              properties:
                locationHint:
                  $ref: '#/components/schemas/r2BucketLocation'
                  x-stainless-naming:
                    terraform:
                      property_name: location
                name:
                  $ref: '#/components/schemas/r2BucketName'
                storageClass:
                  $ref: '#/components/schemas/r2StorageClass'
              required:
              - name
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2Errors'
                  messages:
                    $ref: '#/components/schemas/r2Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/r2Bucket'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Create Bucket response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Create Bucket response failure.
      security:
      - api_token: []
      summary: Create Bucket
      tags:
      - R2 Bucket
      x-api-token-group:
      - Workers R2 Storage Write
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        method: create
  /accounts/{account_id}/r2/buckets/{bucket_name}:
    delete:
      description: Deletes an existing R2 bucket.
      operationId: r2-delete-bucket
      parameters:
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4Response'
          description: Delete Bucket response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Delete Bucket response failure.
      security:
      - api_token: []
      summary: Delete Bucket
      tags:
      - R2 Bucket
      x-api-token-group:
      - Workers R2 Storage Write
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        method: delete
    get:
      description: Gets properties of an existing R2 bucket.
      operationId: r2-get-bucket
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2Errors'
                  messages:
                    $ref: '#/components/schemas/r2Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/r2Bucket'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Get Bucket response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Get Bucket response failure.
      security:
      - api_token: []
      summary: Get Bucket
      tags:
      - R2 Bucket
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.edge.r2.bucket.read
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        method: get
    patch:
      description: Updates properties of an existing R2 bucket.
      operationId: r2-patch-bucket
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      - in: header
        name: cf-r2-storage-class
        schema:
          x-stainless-param: storage_class
          $ref: '#/components/schemas/r2StorageClass'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2Errors'
                  messages:
                    $ref: '#/components/schemas/r2Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/r2Bucket'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Patch Bucket response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Get Bucket response failure.
      security:
      - api_token: []
      summary: Patch Bucket
      tags:
      - R2 Bucket
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.edge.r2.bucket.write
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        method: edit
  /accounts/{account_id}/r2/buckets/{bucket_name}/cors:
    delete:
      description: Delete the CORS policy for a bucket.
      operationId: r2-delete-bucket-cors-policy
      parameters:
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4Response'
                type: object
          description: Success Response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Error Response.
      security:
      - api_token: []
      summary: Delete Bucket CORS Policy
      tags:
      - R2 Bucket
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        - cors
        method: delete
    get:
      description: Get the CORS policy for a bucket.
      operationId: r2-get-bucket-cors-policy
      parameters:
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2Errors'
                  messages:
                    $ref: '#/components/schemas/r2Messages'
                  result:
                    type: object
                    properties:
                      rules:
                        items:
                          $ref: '#/components/schemas/r2CorsRule'
                        type: array
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Success Response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Error Response.
      security:
      - api_token: []
      summary: Get Bucket CORS Policy
      tags:
      - R2 Bucket
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        - cors
        method: get
    put:
      description: Set the CORS policy for a bucket.
      operationId: r2-put-bucket-cors-policy
      parameters:
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      requestBody:
        content:
          application/json:
            schema:
              properties:
                rules:
                  items:
                    $ref: '#/components/schemas/r2CorsRule'
                  type: array
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4Response'
                type: object
          description: Success Response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Error Response.
      security:
      - api_token: []
      summary: Put Bucket CORS Policy
      tags:
      - R2 Bucket
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        - cors
        method: update
  /accounts/{account_id}/r2/buckets/{bucket_name}/domains/custom:
    get:
      description: Gets a list of all custom domains registered with an existing R2 bucket.
      operationId: r2-list-custom-domains
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2Errors'
                  messages:
                    $ref: '#/components/schemas/r2Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/r2ListCustomDomainsResponse'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: List Custom Domains response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: List Custom Domains response failure.
      security:
      - api_token: []
      summary: List Custom Domains of Bucket
      tags:
      - R2 Bucket
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.edge.r2.bucket.read
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        - domains
        - custom
        method: list
    post:
      description: Register a new custom domain for an existing R2 bucket.
      operationId: r2-add-custom-domain
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: bucket_name
        in: path
        required: true
        description: The R2 bucket name.
        schema:
          type: string
      - in: header
        name: cf-r2-jurisdiction
        schema:
          $ref: '#/components/schemas/r2Jurisdiction'
          x-stainless-param: jurisdiction
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/r2AddCustomDomainRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/r2Errors'
                  messages:
                    $ref: '#/components/schemas/r2Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/r2AddCustomDomainResponse'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Add Custom Domain response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/r2V4ResponseFailure'
          description: Add Custom Domain response failure.
      security:
      - api_token: []
      summary: Attach Custom Domain To Bucket
      tags:
      - R2 Bucket
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.edge.r2.bucket.write
      x-stackql-sdk:
        service: r2
        resource_chain:
        - buckets
        - domains
        - custom
        method: create
  /accounts/{account_id}/r2/buckets/{bucket_name}/domains/custom/{domain}:
