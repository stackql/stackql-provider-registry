  /graphql/operations_adaptive_groups:
    post:
      operationId: graphql-operations_adaptive_groups-list
      summary: Cloudflare R2 storage operation analytics for an account, grouped by bucket, operation type, region, and HTTP status
      description: Cloudflare R2 storage operation analytics for an account, grouped by bucket, operation type, region, and HTTP status. Per-tuple totals for request count, response bytes, and object size.
      x-stackQL-graphQL:
        url: https://api.cloudflare.com/client/v4/graphql
        httpVerb: POST
        responseSelection:
          jsonPath: $.result[*]
        cursor:
          jsonPath: $.result[*].__no_cursor
        query: "query {\n  viewer {\n    accounts(filter: { accountTag: \"{{ .account_tag }}\" }, limit: 1) {\n      r2OperationsAdaptiveGroups(\n        filter: { datetime_geq: \"{{ .since }}\", datetime_lt: \"{{ .until }}\" }\n        limit: {{ if .limit }}{{ .limit }}{{ else }}100{{ end }}\n        orderBy: [datetimeMinute_ASC]\n      ) {\n        dimensions {\n          datetime: datetimeMinute\n          bucketName\n          actionType\n          actionStatus\n          responseStatusCode\n          eyeballRegion\n          storageClass\n        }\n        sum {\n          requests\n          responseBytes\n          responseObjectSize\n        }\n      }\n    }\n  }\n}\n"
      x-stackql-protocol: graphql
      parameters:
      - name: account_tag
        in: path
        required: true
        schema:
          type: string
        description: Cloudflare account ID (the 32-char hex tag).
      - name: since
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Lower bound (inclusive). RFC3339.
      - name: until
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Upper bound (exclusive). RFC3339.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
        description: Maximum dimension-tuple rows per call.
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        datetime:
                          type: string
                          format: date-time
                        bucket_name:
                          type: string
                          description: R2 bucket name.
                        action_type:
                          type: string
                          description: R2 operation (GetObject / PutObject / ListObjects / etc.).
                        action_status:
                          type: string
                          description: Operation result (success / failure / etc.).
                        response_status_code:
                          type: integer
                          description: HTTP status returned.
                        eyeball_region:
                          type: string
                          description: Region of the requesting eyeball (WNAM / ENAM / WEU / etc.).
                        storage_class:
                          type: string
                          description: Storage class (Standard / InfrequentAccess).
                        requests:
                          type: integer
                          description: Request count for the tuple.
                        response_bytes:
                          type: integer
                          description: Total retrieved bytes.
                        response_object_size:
                          type: integer
                          description: Total response object sizes.
components:
  schemas:
    r2AccountLevelMetrics:
      description: Metrics based on the class they belong to.
      properties:
        infrequentAccess:
          $ref: '#/components/schemas/r2ClassBasedMetrics'
        standard:
          $ref: '#/components/schemas/r2ClassBasedMetrics'
      type: object
    r2AddCustomDomainRequest:
      example:
        domain: prefix.example-domain.com
        enabled: true
        zoneId: 36ca64a6d92827b8a6b90be344bb1bfd
      properties:
        ciphers:
          description: An allowlist of ciphers for TLS termination. These ciphers must be in the BoringSSL format.
          items:
            type: string
          type: array
          x-auditable: true
        domain:
          description: Name of the custom domain to be added.
          type: string
          x-auditable: true
        enabled:
          description: Whether to enable public bucket access at the custom domain. If undefined, the domain will be enabled.
          type: boolean
          x-auditable: true
        minTLS:
          description: Minimum TLS Version the custom domain will accept for incoming connections. If not set, defaults to 1.0.
          enum:
          - '1.0'
          - '1.1'
          - '1.2'
          - '1.3'
          type: string
          x-auditable: true
        zoneId:
          description: Zone ID of the custom domain.
          type: string
          x-auditable: true
      required:
      - domain
      - zoneId
      - enabled
      type: object
    r2AddCustomDomainResponse:
      example:
        domain: example-domain.com
        enabled: true
        zoneId: 36ca64a6d92827b8a6b90be344bb1bfd
      properties:
        ciphers:
          description: An allowlist of ciphers for TLS termination. These ciphers must be in the BoringSSL format.
          items:
            type: string
          type: array
          x-auditable: true
        domain:
          description: Domain name of the affected custom domain.
          type: string
          x-auditable: true
        enabled:
          description: Whether this bucket is publicly accessible at the specified custom domain.
          type: boolean
        minTLS:
          description: Minimum TLS Version the custom domain will accept for incoming connections. If not set, defaults to 1.0.
          enum:
          - '1.0'
          - '1.1'
          - '1.2'
          - '1.3'
          type: string
          x-auditable: true
        zoneId:
          description: Zone ID of the custom domain.
          type: string
          x-auditable: true
      required:
      - domain
      - enabled
      - zoneId
      type: object
    r2Bucket:
      description: A single R2 bucket.
      properties:
        creation_date:
          description: Creation timestamp.
          type: string
        jurisdiction:
