openapi: 3.0.3
info:
  title: email_routing API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/email/routing/addresses:
    get:
      description: Lists existing destination addresses.
      operationId: email-routing-destination-addresses-list-destination-addresses
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Maximum number of results per page.
          maximum: 50
          minimum: 5
          type: number
      - in: query
        name: direction
        schema:
          default: asc
          description: Sorts results in an ascending or descending order.
          enum:
          - asc
          - desc
          type: string
      - in: query
        name: verified
        schema:
          default: true
          description: Filter by verified destination addresses.
          enum:
          - true
          - false
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailDestinationAddressesResponseCollection'
          description: List destination addresses response
      security:
      - api_email: []
        api_key: []
      summary: List destination addresses
      tags:
      - Email Routing destination addresses
      x-api-token-group:
      - Email Routing Addresses Write
      - Email Routing Addresses Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.routing.address.list
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - addresses
        method: list
    post:
      description: Create a destination address to forward your emails to. Destination addresses need to be verified before they can be used.
      operationId: email-routing-destination-addresses-create-a-destination-address
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailCreateDestinationAddressProperties'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailDestinationAddressResponseSingle'
          description: Create a destination address response
      security:
      - api_email: []
        api_key: []
      summary: Create a destination address
      tags:
      - Email Routing destination addresses
      x-api-token-group:
      - Email Routing Addresses Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.routing.address.create
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - addresses
        method: create
  /accounts/{account_id}/email/routing/addresses/{destination_address_identifier}:
    delete:
      description: Deletes a specific destination address.
      operationId: email-routing-destination-addresses-delete-destination-address
      parameters:
      - in: path
        name: destination_address_identifier
        schema:
          $ref: '#/components/schemas/emailDestinationAddressIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailDestinationAddressResponseSingle'
          description: Delete destination address response
      security:
      - api_email: []
        api_key: []
      summary: Delete destination address
      tags:
      - Email Routing destination addresses
      x-api-token-group:
      - Email Routing Addresses Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.routing.address.delete
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - addresses
        method: delete
    get:
      description: Gets information for a specific destination email already created.
      operationId: email-routing-destination-addresses-get-a-destination-address
      parameters:
      - in: path
        name: destination_address_identifier
        schema:
          $ref: '#/components/schemas/emailDestinationAddressIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailDestinationAddressResponseSingle'
          description: Get a destination address response
      security:
      - api_email: []
        api_key: []
      summary: Get a destination address
      tags:
      - Email Routing destination addresses
      x-api-token-group:
      - Email Routing Addresses Write
      - Email Routing Addresses Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.routing.address.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - addresses
        method: get
  /zones/{zone_id}/email/routing:
    get:
      description: Get information about the settings for your Email Routing zone.
      operationId: email-routing-settings-get-email-routing-settings
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailEmailSettingsResponseSingle'
          description: Get Email Routing settings response
      security:
      - api_email: []
        api_key: []
      summary: Get Email Routing settings
      tags:
      - Email Routing settings
      x-api-token-group:
      - Zone Settings Write
      - Zone Settings Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.config.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain: []
        method: get
  /zones/{zone_id}/email/routing/disable:
    post:
      deprecated: true
      description: Disable your Email Routing zone. Also removes additional MX records previously required for Email Routing to work.
      operationId: email-routing-settings-disable-email-routing
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailEmailSettingsResponseSingle'
          description: Disable Email Routing response
      security:
      - api_email: []
        api_key: []
      summary: Disable Email Routing
      tags:
      - Email Routing settings
      x-api-token-group:
      - Zone Settings Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.config.update
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain: []
        method: disable
  /zones/{zone_id}/email/routing/dns:
    delete:
      description: Disable your Email Routing zone. Also removes additional MX records previously required for Email Routing to work.
      operationId: email-routing-settings-disable-email-routing-dns
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/emailMessages'
                  messages:
                    $ref: '#/components/schemas/emailMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/emailDnsRecord'
                    type: array
                required:
                - errors
                - messages
                - success
          description: Disable Email Routing response
      security:
      - api_email: []
        api_key: []
      summary: Disable Email Routing
      tags:
      - Email Routing settings
      x-api-token-group:
      - Zone Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
    get:
      description: Show the DNS records needed to configure your Email Routing zone.
      operationId: email-routing-settings-email-routing-dns-settings
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - in: query
        name: subdomain
        schema:
          $ref: '#/components/schemas/emailEmailSettingName'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/emailMessages'
                  messages:
                    $ref: '#/components/schemas/emailMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    properties:
                      errors:
                        $ref: '#/components/schemas/emailEmailRoutingGetResponseDnsErrors'
                      record:
                        items:
                          $ref: '#/components/schemas/emailDnsRecord'
                        type: array
                    type: object
                required:
                - errors
                - messages
                - success
          description: Email Routing - DNS settings response
      security:
      - api_email: []
        api_key: []
      summary: Email Routing - DNS settings
      tags:
      - Email Routing settings
      x-api-token-group:
      - Zone Settings Write
      - Zone Settings Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.config.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - dns
        method: delete
    patch:
      description: Unlock MX Records previously locked by Email Routing.
      operationId: email-routing-settings-unlock-email-routing-dns
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailEmailSettingDnsRequestBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailEmailSettingsResponseSingle'
          description: Unlock Email Routing MX records
      security:
      - api_email: []
        api_key: []
      summary: Unlock Email Routing
      tags:
      - Email Routing settings
      x-api-token-group:
      - Zone Settings Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.config.update
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - dns
        method: edit
    post:
      description: Enable you Email Routing zone. Add and lock the necessary MX and SPF records.
      operationId: email-routing-settings-enable-email-routing-dns
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailEmailSettingDnsRequestBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailEmailSettingsResponseSingle'
          description: Enable Email Routing response
      security:
      - api_email: []
        api_key: []
      summary: Enable Email Routing
      tags:
      - Email Routing settings
      x-api-token-group:
      - Zone Settings Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.config.update
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - dns
        method: create
  /zones/{zone_id}/email/routing/enable:
    post:
      deprecated: true
      description: Enable you Email Routing zone. Add and lock the necessary MX and SPF records.
      operationId: email-routing-settings-enable-email-routing
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailEmailSettingsResponseSingle'
          description: Enable Email Routing response
      security:
      - api_email: []
        api_key: []
      summary: Enable Email Routing
      tags:
      - Email Routing settings
      x-api-token-group:
      - Zone Settings Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.config.update
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain: []
        method: enable
  /zones/{zone_id}/email/routing/rules:
    get:
      description: Lists existing routing rules.
      operationId: email-routing-routing-rules-list-routing-rules
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Maximum number of results per page.
          maximum: 50
          minimum: 5
          type: number
      - in: query
        name: enabled
        schema:
          description: Filter by enabled routing rules.
          enum:
          - true
          - false
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailRulesResponseCollection'
          description: List routing rules response
      security:
      - api_email: []
        api_key: []
      summary: List routing rules
      tags:
      - Email Routing routing rules
      x-api-token-group:
      - Email Routing Rules Write
      - Email Routing Rules Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.rule.list
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - rules
        method: list
    post:
      description: Rules consist of a set of criteria for matching emails (such as an email being sent to a specific custom email address) plus a set of actions to take on the email (like forwarding it to a specific destination address). Forward actions require all destination addresses to be verified.
      operationId: email-routing-routing-rules-create-routing-rule
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailCreateRuleProperties'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailRuleResponseSingle'
          description: Create routing rule response
        '400':
          description: 'Error 2054: Destination address is not verified. All forward action destination addresses must be verified before they can be used in rules.'
      security:
      - api_email: []
        api_key: []
      summary: Create routing rule
      tags:
      - Email Routing routing rules
      x-api-token-group:
      - Email Routing Rules Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.rule.create
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - rules
        method: create
  /zones/{zone_id}/email/routing/rules/catch_all:
    get:
      description: Get information on the default catch-all routing rule.
      operationId: email-routing-routing-rules-get-catch-all-rule
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailCatchAllRuleResponseSingle'
          description: Get catch-all rule response
      security:
      - api_email: []
        api_key: []
      summary: Get catch-all rule
      tags:
      - Email Routing routing rules
      x-api-token-group:
      - Email Routing Rules Write
      - Email Routing Rules Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.rule.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - rules
        - catch_alls
        method: get
    put:
      description: Enable or disable catch-all routing rule, or change action to forward to specific destination address. Forward actions require all destination addresses to be verified.
      operationId: email-routing-routing-rules-update-catch-all-rule
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailUpdateCatchAllRuleProperties'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailCatchAllRuleResponseSingle'
          description: Update catch-all rule response
        '400':
          description: 'Error 2054: Destination address is not verified. All forward action destination addresses must be verified before they can be used in rules.'
      security:
      - api_email: []
        api_key: []
      summary: Update catch-all rule
      tags:
      - Email Routing routing rules
      x-api-token-group:
      - Email Routing Rules Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.rule.update
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - rules
        - catch_alls
        method: update
  /zones/{zone_id}/email/routing/rules/{rule_identifier}:
    delete:
      description: Delete a specific routing rule.
      operationId: email-routing-routing-rules-delete-routing-rule
      parameters:
      - in: path
        name: rule_identifier
        schema:
          $ref: '#/components/schemas/emailRuleIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailRuleResponseSingle'
          description: Delete routing rule response
      security:
      - api_email: []
        api_key: []
      summary: Delete routing rule
      tags:
      - Email Routing routing rules
      x-api-token-group:
      - Email Routing Rules Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.rule.delete
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - rules
        method: delete
    get:
      description: Get information for a specific routing rule already created.
      operationId: email-routing-routing-rules-get-routing-rule
      parameters:
      - in: path
        name: rule_identifier
        schema:
          $ref: '#/components/schemas/emailRuleIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailRuleResponseSingle'
          description: Get routing rule response
      security:
      - api_email: []
        api_key: []
      summary: Get routing rule
      tags:
      - Email Routing routing rules
      x-api-token-group:
      - Email Routing Rules Write
      - Email Routing Rules Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.rule.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_routing
        resource_chain:
        - rules
        method: get
    put:
      description: Update actions and matches, or enable/disable specific routing rules. Forward actions require all destination addresses to be verified.
      operationId: email-routing-routing-rules-update-routing-rule
      parameters:
      - in: path
        name: rule_identifier
        schema:
          $ref: '#/components/schemas/emailRuleIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailUpdateRuleProperties'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailRuleResponseSingle'
          description: Update routing rule response
        '400':
          description: 'Error 2054: Destination address is not verified. All forward action destination addresses must be verified before they can be used in rules.'
      security:
      - api_email: []
        api_key: []
      summary: Update routing rule
      tags:
      - Email Routing routing rules
      x-api-token-group:
      - Email Routing Rules Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.zone.email.routing.rule.update
      x-cfPlanAvailability:
        business: true
        enterprise: true
