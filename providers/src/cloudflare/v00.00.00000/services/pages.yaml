  /accounts/{account_id}/pages/projects/{project_name}/deployments:
    get:
      description: Fetch a list of project deployments.
      operationId: pages-deployment-get-deployments
      parameters:
      - name: project_name
        in: path
        required: true
        description: The Pages project name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: env
        schema:
          description: What type of deployments to fetch.
          enum:
          - production
          - preview
          type: string
      - in: query
        name: page
        schema:
          description: Which page of deployments to fetch.
          type: integer
      - in: query
        name: per_page
        schema:
          description: How many deployments to return per page.
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/pagesMessages'
                  messages:
                    $ref: '#/components/schemas/pagesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/pagesDeployment'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
          description: Get deployments response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagesApiResponseCommonFailure'
          description: Get deployments response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get deployments
      tags:
      - Pages Deployment
      x-api-token-group:
      - Pages Read
      - Pages Write
      x-stackql-sdk:
        service: pages
        resource_chain:
        - projects
        - deployments
        method: list
    post:
      description: Start a new deployment from production. The repository and account must have already been authorized on the Cloudflare Pages dashboard.
      operationId: pages-deployment-create-deployment
      parameters:
      - name: project_name
        in: path
        required: true
        description: The Pages project name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              _headers:
                contentType: text/plain
              _redirects:
                contentType: text/plain
              _routes.json:
                contentType: application/json
              _worker.bundle:
                contentType: multipart/form-data
              _worker.js:
                contentType: application/javascript+module, text/javascript+module, application/javascript, text/javascript
              functions-filepath-routing-config.json:
                contentType: application/json
              manifest:
                contentType: application/json
            schema:
              properties:
                _headers:
                  description: Headers configuration file for the deployment.
                  format: binary
                  type: string
                _redirects:
                  description: Redirects configuration file for the deployment.
                  format: binary
                  type: string
                _routes.json:
                  description: Routes configuration file defining routing rules.
                  format: binary
                  type: string
                _worker.bundle:
                  description: 'Worker bundle file in multipart/form-data format. Mutually exclusive with `_worker.js`. Cannot specify both `_worker.js` and `_worker.bundle` in the same request. Maximum size: 25 MiB.'
                  format: binary
                  type: string
                _worker.js:
                  description: Worker JavaScript file. Mutually exclusive with `_worker.bundle`. Cannot specify both `_worker.js` and `_worker.bundle` in the same request.
                  format: binary
                  type: string
                branch:
                  description: The branch to build the new deployment from. The `HEAD` of the branch will be used. If omitted, the production branch will be used by default.
                  type: string
                  x-auditable: true
                commit_dirty:
                  description: Boolean string indicating if the working directory has uncommitted changes.
                  enum:
                  - 'true'
                  - 'false'
                  type: string
                commit_hash:
                  description: Git commit SHA associated with this deployment.
                  type: string
                commit_message:
                  description: Git commit message associated with this deployment.
                  type: string
                functions-filepath-routing-config.json:
                  description: Functions routing configuration file.
                  format: binary
                  type: string
                manifest:
                  description: JSON string containing a manifest of files to deploy. Maps file paths to their content hashes. Required for direct upload deployments. Maximum 20,000 entries.
                  type: string
                pages_build_output_dir:
                  description: The build output directory path.
                  type: string
                wrangler_config_hash:
                  description: Hash of the Wrangler configuration file used for this deployment.
                  type: string
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/pagesMessages'
                  messages:
                    $ref: '#/components/schemas/pagesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/pagesDeployment'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Create deployment response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagesApiResponseCommonFailure'
          description: Create deployment response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create deployment
      tags:
      - Pages Deployment
      x-api-token-group:
      - Pages Write
      x-stackql-sdk:
        service: pages
        resource_chain:
        - projects
        - deployments
        method: create
  /accounts/{account_id}/pages/projects/{project_name}/deployments/{deployment_id}:
    delete:
      description: Delete a deployment.
      operationId: pages-deployment-delete-deployment
      parameters:
      - in: path
        name: deployment_id
        schema:
          $ref: '#/components/schemas/pagesIdentifier'
        required: true
      - name: project_name
        in: path
        required: true
        description: The Pages project name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: force
        schema:
          description: Allow deletion of aliased non-production deployments when a normal delete would be rejected.
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/pagesMessages'
                  messages:
                    $ref: '#/components/schemas/pagesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    nullable: true
                    type: object
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Delete deployment response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagesApiResponseCommonFailure'
          description: Delete deployment response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete deployment
      tags:
      - Pages Deployment
      x-api-token-group:
      - Pages Write
      x-stackql-sdk:
        service: pages
        resource_chain:
        - projects
        - deployments
        method: delete
    get:
      description: Fetch information about a deployment.
      operationId: pages-deployment-get-deployment-info
      parameters:
      - in: path
        name: deployment_id
        schema:
          $ref: '#/components/schemas/pagesIdentifier'
        required: true
