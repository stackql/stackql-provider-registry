openapi: 3.0.3
info:
  title: pages API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/pages/projects:
    get:
      description: Fetch a list of all user projects.
      operationId: pages-project-get-projects
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          description: Which page of projects to fetch.
          type: integer
      - in: query
        name: per_page
        schema:
          description: How many projects to return per page.
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/pagesMessages'
                  messages:
                    $ref: '#/components/schemas/pagesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/pagesProject'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
          description: Get projects response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagesApiResponseCommonFailure'
          description: Get projects response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get projects
      tags:
      - Pages Project
      x-api-token-group:
      - Pages Read
      - Pages Write
      x-stackql-sdk:
        service: pages
        resource_chain:
        - projects
        method: list
    post:
      description: Create a new project.
      operationId: pages-project-create-project
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                build_config:
                  description: Configs for the project build process.
                  properties:
                    build_caching:
                      description: Enable build caching for the project.
                      type: boolean
                      x-auditable: true
                    build_command:
                      description: Command used to build project.
                      type: string
                      x-auditable: true
                    destination_dir:
                      description: Output directory of the build.
                      type: string
                      x-auditable: true
                    root_dir:
                      description: Directory to run the command.
                      type: string
                      x-auditable: true
                    web_analytics_tag:
                      description: The classifying tag for analytics.
                      nullable: true
                      type: string
                      x-auditable: true
                    web_analytics_token:
                      description: The auth token for analytics.
                      nullable: true
                      type: string
                      x-sensitive: true
                  type: object
                deployment_configs:
                  description: Configs for deployments in a project.
                  properties:
                    preview:
                      description: Configs for preview deploys.
                      $ref: '#/components/schemas/pagesDeploymentConfigValuesRequest'
                    production:
                      description: Configs for production deploys.
                      $ref: '#/components/schemas/pagesDeploymentConfigValuesRequest'
                  type: object
                name:
                  description: Name of the project.
                  type: string
                  x-auditable: true
                production_branch:
                  description: Production branch of the project. Used to identify production deployments.
                  type: string
                  x-auditable: true
                source:
                  description: Configs for the project source control.
                  properties:
                    config:
                      properties:
                        deployments_enabled:
                          deprecated: true
                          description: Whether to enable automatic deployments when pushing to the source repository. When disabled, no deployments (production or preview) will be triggered automatically.
                          type: boolean
                          x-auditable: true
                          x-stainless-deprecation-message: Use `production_deployments_enabled` and `preview_deployment_setting` for more granular control.
                        owner:
                          description: The owner of the repository.
                          type: string
                          x-auditable: true
                        owner_id:
                          description: The owner ID of the repository.
                          type: string
                          x-auditable: true
                        path_excludes:
                          description: A list of paths that should be excluded from triggering a preview deployment. Wildcard syntax (`*`) is supported.
                          items:
                            type: string
                            x-auditable: true
                          type: array
                        path_includes:
                          description: A list of paths that should be watched to trigger a preview deployment. Wildcard syntax (`*`) is supported.
                          items:
                            type: string
                            x-auditable: true
                          type: array
                        pr_comments_enabled:
                          description: Whether to enable PR comments.
                          type: boolean
                          x-auditable: true
                        preview_branch_excludes:
                          description: A list of branches that should not trigger a preview deployment. Wildcard syntax (`*`) is supported. Must be used with `preview_deployment_setting` set to `custom`.
                          items:
                            type: string
                            x-auditable: true
                          type: array
                        preview_branch_includes:
                          description: A list of branches that should trigger a preview deployment. Wildcard syntax (`*`) is supported. Must be used with `preview_deployment_setting` set to `custom`.
                          items:
                            type: string
                            x-auditable: true
                          type: array
                        preview_deployment_setting:
                          description: Controls whether commits to preview branches trigger a preview deployment.
                          enum:
                          - all
                          - none
                          - custom
                          type: string
                          x-auditable: true
                        production_branch:
                          description: The production branch of the repository.
                          type: string
                          x-auditable: true
                        production_deployments_enabled:
                          description: Whether to trigger a production deployment on commits to the production branch.
                          type: boolean
                          x-auditable: true
                        repo_id:
                          description: The ID of the repository.
                          type: string
                          x-auditable: true
                        repo_name:
                          description: The name of the repository.
                          type: string
                          x-auditable: true
                      type: object
                    type:
                      description: The source control management provider.
                      enum:
                      - github
                      - gitlab
                      type: string
                      x-auditable: true
                  required:
                  - type
                  - config
                  type: object
              required:
              - name
              - production_branch
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/pagesMessages'
                  messages:
                    $ref: '#/components/schemas/pagesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/pagesProject'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Create project response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagesApiResponseCommonFailure'
          description: Create project response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create project
      tags:
      - Pages Project
      x-api-token-group:
      - Pages Write
      x-stackql-sdk:
        service: pages
        resource_chain:
        - projects
        method: create
  /accounts/{account_id}/pages/projects/{project_name}:
    delete:
      description: Delete a project by name.
      operationId: pages-project-delete-project
      parameters:
      - name: project_name
        in: path
        required: true
        description: The Pages project name.
        schema:
          type: string
      - name: account_id
