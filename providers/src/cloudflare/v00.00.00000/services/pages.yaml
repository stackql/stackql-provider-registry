            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/pagesMessages'
                  messages:
                    $ref: '#/components/schemas/pagesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    nullable: true
