      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete project
      tags:
      - Pages Project
      x-api-token-group:
      - Pages Write
      x-stackql-sdk:
        service: pages
        resource_chain:
        - projects
        method: delete
    get:
      description: Fetch a project by name.
      operationId: pages-project-get-project
      parameters:
      - name: project_name
        in: path
        required: true
        description: The Pages project name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/pagesMessages'
                  messages:
                    $ref: '#/components/schemas/pagesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/pagesProject'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Get project response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagesApiResponseCommonFailure'
          description: Get project response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get project
      tags:
      - Pages Project
      x-api-token-group:
      - Pages Read
      - Pages Write
      x-stackql-sdk:
        service: pages
        resource_chain:
        - projects
        method: get
    patch:
      description: Set new attributes for an existing project. Modify environment variables. To delete an environment variable, set the key to null.
      operationId: pages-project-update-project
      parameters:
      - name: project_name
        in: path
        required: true
        description: The Pages project name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                build_config:
                  description: Configs for the project build process.
                  properties:
                    build_caching:
                      description: Enable build caching for the project.
                      type: boolean
                      x-auditable: true
                    build_command:
                      description: Command used to build project.
                      type: string
                      x-auditable: true
                    destination_dir:
                      description: Output directory of the build.
                      type: string
                      x-auditable: true
                    root_dir:
                      description: Directory to run the command.
                      type: string
                      x-auditable: true
                    web_analytics_tag:
                      description: The classifying tag for analytics.
                      nullable: true
                      type: string
                      x-auditable: true
                    web_analytics_token:
                      description: The auth token for analytics.
                      nullable: true
                      type: string
                      x-sensitive: true
                  type: object
                deployment_configs:
                  description: Configs for deployments in a project.
                  properties:
                    preview:
                      description: Configs for preview deploys.
                      $ref: '#/components/schemas/pagesDeploymentConfigValuesRequest'
                    production:
                      description: Configs for production deploys.
                      $ref: '#/components/schemas/pagesDeploymentConfigValuesRequest'
                  type: object
                name:
                  description: Name of the project.
                  type: string
                  x-auditable: true
                production_branch:
                  description: Production branch of the project. Used to identify production deployments.
                  type: string
                  x-auditable: true
                source:
                  description: Configs for the project source control.
                  properties:
                    config:
                      properties:
                        deployments_enabled:
                          deprecated: true
                          description: Whether to enable automatic deployments when pushing to the source repository. When disabled, no deployments (production or preview) will be triggered automatically.
                          type: boolean
                          x-auditable: true
                          x-stainless-deprecation-message: Use `production_deployments_enabled` and `preview_deployment_setting` for more granular control.
                        owner:
                          description: The owner of the repository.
                          type: string
                          x-auditable: true
                        owner_id:
                          description: The owner ID of the repository.
                          type: string
                          x-auditable: true
                        path_excludes:
                          description: A list of paths that should be excluded from triggering a preview deployment. Wildcard syntax (`*`) is supported.
                          items:
                            type: string
                            x-auditable: true
                          type: array
                        path_includes:
                          description: A list of paths that should be watched to trigger a preview deployment. Wildcard syntax (`*`) is supported.
                          items:
                            type: string
                            x-auditable: true
                          type: array
                        pr_comments_enabled:
                          description: Whether to enable PR comments.
                          type: boolean
                          x-auditable: true
                        preview_branch_excludes:
                          description: A list of branches that should not trigger a preview deployment. Wildcard syntax (`*`) is supported. Must be used with `preview_deployment_setting` set to `custom`.
                          items:
                            type: string
                            x-auditable: true
                          type: array
                        preview_branch_includes:
                          description: A list of branches that should trigger a preview deployment. Wildcard syntax (`*`) is supported. Must be used with `preview_deployment_setting` set to `custom`.
                          items:
