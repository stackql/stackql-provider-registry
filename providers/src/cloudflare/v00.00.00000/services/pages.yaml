          example:
            MTLS:
              certificate_id: d7cdd17c-916f-4cb7-aabe-585eb382ec4e
          type: object
        placement:
          description: Placement setting used for Pages Functions.
          example:
            mode: smart
          properties:
            mode:
              description: Placement mode.
              example: smart
