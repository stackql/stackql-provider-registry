components:
  schemas:
    pagesApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/pagesMessages'
        messages:
          example: []
          $ref: '#/components/schemas/pagesMessages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    pagesBuildConfig:
      description: Configs for the project build process.
      properties:
        build_caching:
          description: Enable build caching for the project.
          example: true
          nullable: true
          type: boolean
          x-auditable: true
        build_command:
          description: Command used to build project.
          example: npm run build
          nullable: true
          type: string
          x-auditable: true
        destination_dir:
          description: Assets output directory of the build.
          example: build
          nullable: true
          type: string
          x-auditable: true
        root_dir:
          description: Directory to run the command.
          example: /
          nullable: true
          type: string
          x-auditable: true
        web_analytics_tag:
          description: The classifying tag for analytics.
          example: cee1c73f6e4743d0b5e6bb1a0bcaabcc
          nullable: true
          type: string
          x-auditable: true
        web_analytics_token:
          description: The auth token for analytics.
          example: 021e1057c18547eca7b79f2516f06o7x
          nullable: true
          type: string
          x-sensitive: true
      required:
      - web_analytics_tag
      - web_analytics_token
      type: object
    pagesDeployment:
      properties:
        aliases:
          description: A list of alias URLs pointing to this deployment.
          example:
          - https://branchname.projectname.pages.dev
          items:
            type: string
            x-auditable: true
          nullable: true
          readOnly: true
          type: array
        build_config:
          $ref: '#/components/schemas/pagesBuildConfig'
        created_on:
          description: When the deployment was created.
          example: '2021-03-09T00:55:03.923456Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        deployment_trigger:
          description: Info about what caused the deployment.
          properties:
            metadata:
              description: Additional info about the trigger.
              properties:
                branch:
                  description: Where the trigger happened.
                  example: main
                  type: string
                  x-auditable: true
                commit_dirty:
                  description: Whether the deployment trigger commit was dirty.
                  example: false
                  type: boolean
                  x-auditable: true
                commit_hash:
                  description: Hash of the deployment trigger commit.
                  example: ad9ccd918a81025731e10e40267e11273a263421
                  type: string
                  x-auditable: true
                commit_message:
                  description: Message of the deployment trigger commit.
                  example: Update index.html
                  type: string
                  x-auditable: true
              required:
              - branch
              - commit_hash
              - commit_message
              - commit_dirty
              type: object
            type:
              description: What caused the deployment.
              enum:
              - github:push
              - ad_hoc
              - deploy_hook
              example: ad_hoc
              type: string
              x-auditable: true
          readOnly: true
          required:
          - type
          - metadata
          type: object
        env_vars:
          $ref: '#/components/schemas/pagesEnvVars'
        environment:
          description: Type of deploy.
          enum:
          - preview
          - production
          example: preview
          readOnly: true
          type: string
          x-auditable: true
        id:
          description: Id of the deployment.
          example: f64788e9-fccd-4d4a-a28a-cb84f88f6
          readOnly: true
          type: string
          x-auditable: true
        is_skipped:
          description: If the deployment has been skipped.
          example: true
          readOnly: true
          type: boolean
          x-auditable: true
        latest_stage:
          $ref: '#/components/schemas/pagesStage'
        modified_on:
          description: When the deployment was last modified.
          example: '2021-03-09T00:58:59.045655Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        project_id:
          description: Id of the project.
          example: 7b162ea7-7367-4d67-bcde-1160995d5
          readOnly: true
          type: string
          x-auditable: true
        project_name:
          $ref: '#/components/schemas/pagesProjectName'
        short_id:
          description: Short Id (8 character) of the deployment.
          example: f64788e9
          readOnly: true
          type: string
          x-auditable: true
        source:
          $ref: '#/components/schemas/pagesSource'
        stages:
          description: List of past stages.
          example:
          - ended_on: '2021-06-03T15:39:03.134378Z'
            name: queued
            started_on: '2021-06-03T15:38:15.608194Z'
            status: active
          - ended_on: null
            name: initialize
            started_on: null
            status: idle
          - ended_on: null
            name: clone_repo
            started_on: null
            status: idle
          - ended_on: null
            name: build
            started_on: null
            status: idle
          - ended_on: null
            name: deploy
            started_on: null
            status: idle
          items:
            $ref: '#/components/schemas/pagesStage'
          readOnly: true
          type: array
        url:
          description: The live URL to view this deployment.
          example: https://f64788e9.ninjakittens.pages.dev
          readOnly: true
          type: string
          x-auditable: true
        uses_functions:
          description: Whether the deployment uses functions.
          nullable: true
          readOnly: true
          type: boolean
          x-auditable: true
      required:
      - aliases
      - build_config
      - created_on
      - deployment_trigger
      - environment
      - env_vars
      - id
      - is_skipped
      - latest_stage
      - modified_on
      - project_id
      - project_name
      - short_id
      - source
      - stages
      - url
      type: object
    pagesDeploymentConfigValues:
      properties:
        ai_bindings:
          description: Constellation bindings used for Pages Functions.
          example:
            AI_BINDING:
              project_id: some-project-id
