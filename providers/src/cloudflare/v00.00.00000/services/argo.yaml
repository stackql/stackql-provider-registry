openapi: 3.0.3
info:
  title: argo API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/argo/smart_routing:
    get:
      description: Retrieves the value of Argo Smart Routing enablement setting.
      operationId: argo-smart-routing-get-argo-smart-routing-setting
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/argoConfigApiResponseSingle'
          description: Get Argo Smart Routing enablement setting response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/argoConfigApiResponseCommonFailure'
          description: Get Argo Smart Routing enablement setting failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Argo Smart Routing setting
      tags:
        - Argo Smart Routing
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-cfPermissionsRequired:
        enum:
          - '#zone_settings:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: argo
        resource_chain:
          - smart_routing
        method: get
    patch:
      description: Configures the value of the Argo Smart Routing enablement setting.
      operationId: argo-smart-routing-patch-argo-smart-routing-setting
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/argoConfigPatch'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/argoConfigApiResponseSingle'
          description: Patch Argo Smart Routing enablement setting response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/argoConfigApiResponseCommonFailure'
          description: Patch Argo Smart Routing enablement setting failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Patch Argo Smart Routing setting
      tags:
        - Argo Smart Routing
      x-api-token-group:
        - Zone Settings Write
      x-cfPermissionsRequired:
        enum:
          - '#zone_settings:read'
          - '#zone_settings:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: argo
        resource_chain:
          - smart_routing
        method: edit
  /zones/{zone_id}/argo/tiered_caching:
    get:
      description: >-
        Tiered Cache works by dividing Cloudflare's data centers into a
        hierarchy of lower-tiers and upper-tiers. If content is not cached in
        lower-tier data centers (generally the ones closest to a visitor), the
        lower-tier must ask an upper-tier to see if it has the content. If the
        upper-tier does not have the content, only the upper-tier can ask the
        origin for content. This practice improves bandwidth efficiency by
        limiting the number of data centers that can ask the origin for content,
        which reduces origin load and makes websites more cost-effective to
        operate. Additionally, Tiered Cache concentrates connections to origin
        servers so they come from a small number of data centers rather than the
        full set of network locations. This results in fewer open connections
        using server resources.
      operationId: tiered-caching-get-tiered-caching-setting
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    properties:
                      editable:
                        $ref: '#/components/schemas/cacheRulesEditable'
                      id:
                        description: The identifier of the caching setting.
                        type: string
                        x-auditable: true
                        enum:
                          - tiered_caching
                      modified_on:
                        $ref: '#/components/schemas/cacheRulesModifiedOn'
                        description: Last time this setting was modified.
                        format: date-time
                        nullable: true
                        readOnly: true
                        type: string
                        x-auditable: true
                      value:
                        description: Value of the Tiered Cache zone setting.
                        type: string
                        x-auditable: true
                        default: 'off'
                        enum:
                          - 'on'
                          - 'off'
                    required:
                      - id
                      - value
                      - editable
                      - id
                      - value
                    type: object
                    title: Tiered Cache
                required:
                  - success
                  - errors
                  - messages
          description: Get Tiered Caching setting response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Get Tiered Caching setting response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Tiered Caching setting
      tags:
        - Tiered Caching
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: argo
        resource_chain:
          - tiered_caching
        method: get
    patch:
      description: >-
        Tiered Cache works by dividing Cloudflare's data centers into a
        hierarchy of lower-tiers and upper-tiers. If content is not cached in
        lower-tier data centers (generally the ones closest to a visitor), the
        lower-tier must ask an upper-tier to see if it has the content. If the
        upper-tier does not have the content, only the upper-tier can ask the
        origin for content. This practice improves bandwidth efficiency by
        limiting the number of data centers that can ask the origin for content,
        which reduces origin load and makes websites more cost-effective to
        operate. Additionally, Tiered Cache concentrates connections to origin
        servers so they come from a small number of data centers rather than the
        full set of network locations. This results in fewer open connections
        using server resources.
      operationId: tiered-caching-patch-tiered-caching-setting
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cacheRulesPatch'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    properties:
                      editable:
                        $ref: '#/components/schemas/cacheRulesEditable'
                      id:
                        description: The identifier of the caching setting.
                        type: string
                        x-auditable: true
                        enum:
                          - tiered_caching
                      modified_on:
                        $ref: '#/components/schemas/cacheRulesModifiedOn'
                        description: Last time this setting was modified.
                        format: date-time
                        nullable: true
                        readOnly: true
                        type: string
                        x-auditable: true
                      value:
                        description: Value of the Tiered Cache zone setting.
                        type: string
                        x-auditable: true
                        default: 'off'
                        enum:
                          - 'on'
                          - 'off'
                    required:
                      - id
                      - value
                      - editable
                      - id
                      - value
                    type: object
                    title: Tiered Cache
                required:
                  - success
                  - errors
                  - messages
          description: Patch Tiered Caching setting response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Patch Tiered Caching setting response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Patch Tiered Caching setting
      tags:
        - Tiered Caching
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: argo
        resource_chain:
          - tiered_caching
        method: edit
components:
  schemas:
    argoConfigApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/argoConfigMessages'
        messages:
          example: []
          $ref: '#/components/schemas/argoConfigMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Describes a failed API response.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    argoConfigApiResponseSingle:
      properties:
        errors:
          $ref: '#/components/schemas/argoConfigMessages'
        messages:
          $ref: '#/components/schemas/argoConfigMessages'
        result:
          $ref: '#/components/schemas/argoConfigResultObject'
        success:
          description: Describes a successful API response.
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    argoConfigEditable:
      description: Specifies if the setting is editable.
      type: boolean
      x-auditable: true
    argoConfigMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    argoConfigModifiedOn:
      description: Specifies the time when the setting was last modified.
      format: date-time
      type: string
      x-auditable: true
    argoConfigPatch:
      description: Configures the enablement of Argo Smart Routing.
      properties:
        value:
          $ref: '#/components/schemas/argoConfigSettingValue'
      required:
        - value
      type: object
    argoConfigResultObject:
      properties:
        editable:
          $ref: '#/components/schemas/argoConfigEditable'
        id:
          $ref: '#/components/schemas/argoConfigSettingId'
        modified_on:
          $ref: '#/components/schemas/argoConfigModifiedOn'
          readOnly: true
        value:
          $ref: '#/components/schemas/argoConfigSettingValue'
      required:
        - id
        - value
        - editable
      type: object
    argoConfigSettingId:
      description: Specifies the identifier of the Argo Smart Routing setting.
      type: string
      x-auditable: true
    argoConfigSettingValue:
      description: Specifies the enablement value of Argo Smart Routing.
      enum:
        - 'on'
        - 'off'
      example: 'on'
      type: string
      x-auditable: true
    cacheRulesApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          items:
            type: object
          minLength: 1
          type: array
          $ref: '#/components/schemas/cacheRulesMessages'
        messages:
          example: []
          items:
            type: object
          type: array
          $ref: '#/components/schemas/cacheRulesMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    cacheRulesEditable:
      description: Whether the setting is editable.
      type: boolean
      x-auditable: true
    cacheRulesMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    cacheRulesModifiedOn:
      description: The time when the setting was last modified.
      format: date-time
      type: string
      x-auditable: true
    cacheRulesPatch:
      description: Update enablement of Tiered Caching.
      properties:
        value:
          $ref: '#/components/schemas/cacheRulesValue'
      required:
        - value
      type: object
    cacheRulesValue:
      description: Enables Tiered Caching.
      enum:
        - 'on'
        - 'off'
      example: 'on'
      type: string
      x-auditable: true
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
        - code
        - message
      type: object
      uniqueItems: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    smart_routing:
      id: cloudflare.argo.smart_routing
      name: smart_routing
      title: Smart Routing
      methods:
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1argo~1smart_routing/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        edit:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1argo~1smart_routing/patch'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/smart_routing/methods/list'
        insert: []
        update:
          - $ref: '#/components/x-stackQL-resources/smart_routing/methods/edit'
        delete: []
        replace: []
    tiered_caching:
      id: cloudflare.argo.tiered_caching
      name: tiered_caching
      title: Tiered Caching
      methods:
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1argo~1tiered_caching/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        edit:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1argo~1tiered_caching/patch'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/tiered_caching/methods/list'
        insert: []
        update:
          - $ref: '#/components/x-stackQL-resources/tiered_caching/methods/edit'
        delete: []
        replace: []
