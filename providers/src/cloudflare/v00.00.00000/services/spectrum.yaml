openapi: 3.0.3
info:
  title: spectrum API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/spectrum/analytics/aggregate/current:
    get:
      description: >-
        Retrieves analytics aggregated from the last minute of usage on Spectrum
        applications underneath a given zone.
      operationId: spectrum-aggregate-analytics-get-current-aggregated-analytics
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: appID
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsAppIdParam'
        - in: query
          name: colo_name
          schema:
            description: Co-location identifier.
            maxLength: 3
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumAnalyticsQueryResponseAggregate'
          description: Get current aggregated analytics response
        4xx:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumAnalyticsApiResponseCommonFailure'
          description: Get current aggregated analytics response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get current aggregated analytics
      tags:
        - Spectrum Analytics
      x-api-token-group:
        - Analytics Read
      x-stackql-sdk:
        service: spectrum
        resource_chain:
          - analytics
          - aggregates
          - currents
        method: get
  /zones/{zone_id}/spectrum/analytics/events/bytime:
    get:
      description: Retrieves a list of aggregate metrics grouped by time interval.
      operationId: spectrum-analytics-(-by-time)-get-analytics-by-time
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: dimensions
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsDimensions'
        - in: query
          name: sort
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsSort'
        - in: query
          name: until
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsUntil'
        - in: query
          name: metrics
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsMetrics'
        - in: query
          name: filters
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsFilters'
        - in: query
          name: since
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsSince'
        - in: query
          name: time_delta
          schema:
            description: Used to select time series resolution.
            enum:
              - year
              - quarter
              - month
              - week
              - day
              - hour
              - dekaminute
              - minute
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumAnalyticsQueryResponseSingle'
          description: Get analytics by time response
        4xx:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumAnalyticsApiResponseCommonFailure'
          description: Get analytics by time response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get analytics by time
      tags:
        - Spectrum Analytics
      x-api-token-group:
        - Analytics Read
      x-stackql-sdk:
        service: spectrum
        resource_chain:
          - analytics
          - events
          - bytimes
        method: get
  /zones/{zone_id}/spectrum/analytics/events/summary:
    get:
      description: >-
        Retrieves a list of summarised aggregate metrics over a given time
        period.
      operationId: spectrum-analytics-(-summary)-get-analytics-summary
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: dimensions
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsDimensions'
        - in: query
          name: sort
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsSort'
        - in: query
          name: until
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsUntil'
        - in: query
          name: metrics
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsMetrics'
        - in: query
          name: filters
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsFilters'
        - in: query
          name: since
          schema:
            $ref: '#/components/schemas/spectrumAnalyticsSince'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumAnalyticsQueryResponseSingle'
          description: Get analytics summary response
        4xx:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumAnalyticsApiResponseCommonFailure'
          description: Get analytics summary response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get analytics summary
      tags:
        - Spectrum Analytics
      x-api-token-group:
        - Analytics Read
      x-stackql-sdk:
        service: spectrum
        resource_chain:
          - analytics
          - events
          - summaries
        method: get
  /zones/{zone_id}/spectrum/apps:
    get:
      description: >-
        Retrieves a list of currently existing Spectrum applications inside a
        zone.
      operationId: spectrum-applications-list-spectrum-applications
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: page
          schema:
            description: >-
              Page number of paginated results. This parameter is required in
              order to use other pagination parameters. If included in the
              query, `result_info` will be present in the response.
            minimum: 1
            type: number
        - in: query
          name: per_page
          schema:
            default: 20
            description: Sets the maximum number of results per page.
            maximum: 100
            minimum: 1
            type: number
        - in: query
          name: direction
          schema:
            default: asc
            description: Sets the direction by which results are ordered.
            enum:
              - asc
              - desc
            type: string
        - in: query
          name: order
          schema:
            default: dns
            description: Application field by which results are ordered.
            enum:
              - protocol
              - app_id
              - created_on
              - modified_on
              - dns
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigAppConfigCollection'
          description: List Spectrum applications response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigApiResponseCommonFailure'
          description: List Spectrum applications response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Spectrum applications
      tags:
        - Spectrum Applications
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-stackql-sdk:
        service: spectrum
        resource_chain:
          - apps
        method: list
    post:
      description: >-
        Creates a new Spectrum application from a configuration using a name for
        the origin.
      operationId: >-
        spectrum-applications-create-spectrum-application-using-a-name-for-the-origin
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/spectrumConfigUpdateAppConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigAppConfigSingle'
          description: Create Spectrum application using a name for the origin response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigApiResponseCommonFailure'
          description: >-
            Create Spectrum application using a name for the origin response
            failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create Spectrum application using a name for the origin
      tags:
        - Spectrum Applications
      x-api-token-group:
        - Zone Settings Write
      x-stackql-sdk:
        service: spectrum
        resource_chain:
          - apps
        method: create
  /zones/{zone_id}/spectrum/apps/{app_id}:
    delete:
      description: Deletes a previously existing application.
      operationId: spectrum-applications-delete-spectrum-application
      parameters:
        - name: app_id
          in: path
          required: true
          description: The Access application ID.
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigApiResponseSingleId'
          description: Delete Spectrum application response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigApiResponseCommonFailure'
          description: Delete Spectrum application response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Spectrum application
      tags:
        - Spectrum Applications
      x-api-token-group:
        - Zone Settings Write
      x-stackql-sdk:
        service: spectrum
        resource_chain:
          - apps
        method: delete
    get:
      description: >-
        Gets the application configuration of a specific application inside a
        zone.
      operationId: spectrum-applications-get-spectrum-application-configuration
      parameters:
        - name: app_id
          in: path
          required: true
          description: The Access application ID.
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigAppConfigSingle'
          description: Get Spectrum application configuration response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigApiResponseCommonFailure'
          description: Get Spectrum application configuration response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Spectrum application configuration
      tags:
        - Spectrum Applications
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-stackql-sdk:
        service: spectrum
        resource_chain:
          - apps
        method: get
    put:
      description: >-
        Updates a previously existing application's configuration that uses a
        name for the origin.
      operationId: >-
        spectrum-applications-update-spectrum-application-configuration-using-a-name-for-the-origin
      parameters:
        - name: app_id
          in: path
          required: true
          description: The Access application ID.
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/spectrumConfigUpdateAppConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigAppConfigSingle'
          description: >-
            Update Spectrum application configuration using a name for the
            origin response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spectrumConfigApiResponseCommonFailure'
          description: >-
            Update Spectrum application configuration using a name for the
            origin response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Spectrum application configuration using a name for the origin
      tags:
        - Spectrum Applications
      x-api-token-group:
        - Zone Settings Write
      x-stackql-sdk:
        service: spectrum
        resource_chain:
          - apps
        method: update
components:
  schemas:
    spectrumAnalyticsApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/spectrumAnalyticsMessages'
        messages:
          example: []
          $ref: '#/components/schemas/spectrumAnalyticsMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    spectrumAnalyticsAppIdParam:
      description: >-
        Comma-delimited list of Spectrum Application Id(s). If provided, the
        response will be limited to Spectrum Application Id(s) that match.
      example: ea95132c15732412d22c1476fa83f27a,d122c5f4bb71e25cc9e86ab43b142e2f
      type: string
    spectrumAnalyticsColumn:
      properties:
        dimensions:
          items:
            type: string
          type: array
        metrics:
          type: array
          items:
            type: number
      type: object
    spectrumAnalyticsDimensions:
      description: >-
        Can be used to break down the data by given attributes. Options are:
        Dimension | Name | Example
        --------------------------|---------------------------------|--------------------------
        event | Connection Event | connect, progress, disconnect, originError,
        clientFiltered appID | Application ID | 40d67c87c6cd4b889a4fd57805225e85
        coloName | Colo Name | SFO ipVersion | IP version used by the client |
        4, 6.
      example:
        - event
        - appID
      items:
        enum:
          - event
          - appID
          - coloName
          - ipVersion
        type: string
      type: array
    spectrumAnalyticsFilters:
      description: >-
        Used to filter rows by one or more dimensions. Filters can be combined
        using OR and AND boolean logic. AND takes precedence over OR in all the
        expressions. The OR operator is defined using a comma (,) or OR keyword
        surrounded by whitespace. The AND operator is defined using a semicolon
        (;) or AND keyword surrounded by whitespace. Note that the semicolon is
        a reserved character in URLs (rfc1738) and needs to be percent-encoded
        as %3B. Comparison options are: Operator | Name | URL Encoded
        --------------------------|---------------------------------|--------------------------
        == | Equals | %3D%3D != | Does not equals | !%3D \> | Greater Than | %3E
        \< | Less Than | %3C \>= | Greater than or equal to | %3E%3D \<= | Less
        than or equal to | %3C%3D
      example: event==disconnect%20AND%20coloName!=SFO
      type: string
    spectrumAnalyticsIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    spectrumAnalyticsMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    spectrumAnalyticsMetrics:
      description: >-
        One or more metrics to compute. Options are: Metric | Name | Example |
        Unit
        --------------------------|-------------------------------------|--------------------------|--------------------------
        count | Count of total events | 1000 | Count bytesIngress | Sum of
        ingress bytes | 1000 | Sum bytesEgress | Sum of egress bytes | 1000 |
        Sum durationAvg | Average connection duration | 1.0 | Time in
        milliseconds durationMedian | Median connection duration | 1.0 | Time in
        milliseconds duration90th | 90th percentile connection duration | 1.0 |
        Time in milliseconds duration99th | 99th percentile connection duration
        | 1.0 | Time in milliseconds.
      example:
        - count
        - bytesIngress
      items:
        enum:
          - count
          - bytesIngress
          - bytesEgress
          - durationAvg
          - durationMedian
          - duration90th
          - duration99th
        type: string
      type: array
    spectrumAnalyticsQuery:
      properties:
        dimensions:
          $ref: '#/components/schemas/spectrumAnalyticsDimensions'
        filters:
          $ref: '#/components/schemas/spectrumAnalyticsFilters'
        limit:
          description: Limit number of returned metrics.
          type: number
        metrics:
          $ref: '#/components/schemas/spectrumAnalyticsMetrics'
        since:
          $ref: '#/components/schemas/spectrumAnalyticsSince'
        sort:
          $ref: '#/components/schemas/spectrumAnalyticsSort'
        until:
          $ref: '#/components/schemas/spectrumAnalyticsUntil'
      type: object
    spectrumAnalyticsQueryResponseAggregate:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/spectrumAnalyticsMessages'
        messages:
          $ref: '#/components/schemas/spectrumAnalyticsMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          items:
            $ref: >-
              #/components/schemas/spectrumAnalyticsQueryResponseAggregate_result_item
          type: array
      required:
        - success
        - errors
        - messages
    spectrumAnalyticsQueryResponseAggregate_result_item:
      properties:
        appID:
          description: Application identifier.
          $ref: '#/components/schemas/spectrumAnalyticsIdentifier'
        bytesEgress:
          description: Number of bytes sent
          type: number
        bytesIngress:
          description: Number of bytes received
          type: number
        connections:
          description: Number of connections
          type: number
        durationAvg:
          description: Average duration of connections
          type: number
      required:
        - appID
        - bytesIngress
        - bytesEgress
        - connections
        - durationAvg
      type: object
    spectrumAnalyticsQueryResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/spectrumAnalyticsMessages'
        messages:
          $ref: '#/components/schemas/spectrumAnalyticsMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          properties:
            data:
              description: List of columns returned by the analytics query.
              items:
                $ref: '#/components/schemas/spectrumAnalyticsColumn'
              type: array
            data_lag:
              description: >-
                Number of seconds between current time and last processed event,
                i.e. how many seconds of data could be missing.
              example: 3
              minimum: 0
              type: number
            max:
              description: Maximum result for each selected metrics across all data.
              $ref: '#/components/schemas/spectrumAnalyticsStat'
            min:
              description: Minimum result for each selected metrics across all data.
              $ref: '#/components/schemas/spectrumAnalyticsStat'
            query:
              $ref: '#/components/schemas/spectrumAnalyticsQuery'
            rows:
              description: Total number of rows in the result.
              example: 5
              minimum: 0
              type: number
            time_intervals:
              description: 'List of time interval buckets: [start, end]'
              items:
                items:
                  $ref: '#/components/schemas/spectrumAnalyticsTimestamp'
                type: array
              type: array
            totals:
              description: Total result for each selected metrics across all data.
              $ref: '#/components/schemas/spectrumAnalyticsStat'
          required:
            - rows
            - data
            - data_lag
            - min
            - max
            - totals
            - query
          type: object
      required:
        - success
        - errors
        - messages
    spectrumAnalyticsSince:
      description: >-
        Start of time interval to query, defaults to `until` - 6 hours.
        Timestamp must be in RFC3339 format and uses UTC unless otherwise
        specified.
      $ref: '#/components/schemas/spectrumAnalyticsTimestamp'
    spectrumAnalyticsSort:
      description: >-
        The sort order for the result set; sort fields must be included in
        `metrics` or `dimensions`.
      example:
        - +count
        - '-bytesIngress'
      items:
        type: string
      type: array
    spectrumAnalyticsStat:
      example:
        bytesEgress: 100
        bytesIngress: 50
      type: object
    spectrumAnalyticsTimestamp:
      example: '2014-01-01T05:20:00.12345Z'
      format: date-time
      type: string
      x-auditable: true
    spectrumAnalyticsUntil:
      description: >-
        End of time interval to query, defaults to current time. Timestamp must
        be in RFC3339 format and uses UTC unless otherwise specified.
      $ref: '#/components/schemas/spectrumAnalyticsTimestamp'
    spectrumConfigApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/spectrumConfigMessages'
        messages:
          example: []
          $ref: '#/components/schemas/spectrumConfigMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    spectrumConfigApiResponseSingleId:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/spectrumConfigMessages'
        messages:
          $ref: '#/components/schemas/spectrumConfigMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          nullable: true
          properties:
            id:
              $ref: '#/components/schemas/spectrumConfigIdentifier'
          required:
            - id
          type: object
      required:
        - success
        - errors
        - messages
    spectrumConfigAppConfig:
      properties:
        created_on:
          $ref: '#/components/schemas/spectrumConfigCreated'
          readOnly: true
        id:
          $ref: '#/components/schemas/spectrumConfigAppIdentifier'
        modified_on:
          $ref: '#/components/schemas/spectrumConfigModified'
          readOnly: true
        argo_smart_routing:
          $ref: '#/components/schemas/spectrumConfigArgoSmartRouting'
        dns:
          $ref: '#/components/schemas/spectrumConfigDns'
        edge_ips:
          $ref: '#/components/schemas/spectrumConfigEdgeIps'
        ip_firewall:
          $ref: '#/components/schemas/spectrumConfigIpFirewall'
        origin_direct:
          $ref: '#/components/schemas/spectrumConfigOriginDirect'
        origin_dns:
          $ref: '#/components/schemas/spectrumConfigOriginDns'
        origin_port:
          $ref: '#/components/schemas/spectrumConfigOriginPort'
        protocol:
          $ref: '#/components/schemas/spectrumConfigProtocol'
        proxy_protocol:
          $ref: '#/components/schemas/spectrumConfigProxyProtocol'
        tls:
          $ref: '#/components/schemas/spectrumConfigTls'
        traffic_type:
          $ref: '#/components/schemas/spectrumConfigTrafficType'
      required:
        - id
        - created_on
        - modified_on
        - protocol
        - dns
        - traffic_type
      type: object
    spectrumConfigAppConfigCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/spectrumConfigMessages'
        messages:
          $ref: '#/components/schemas/spectrumConfigMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
          type: object
        result:
          type: array
          items:
            $ref: '#/components/schemas/spectrumConfigAppConfig'
      required:
        - success
        - errors
        - messages
    spectrumConfigAppConfigSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/spectrumConfigMessages'
        messages:
          $ref: '#/components/schemas/spectrumConfigMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          type: object
          properties:
            created_on:
              $ref: '#/components/schemas/spectrumConfigCreated'
              readOnly: true
            id:
              $ref: '#/components/schemas/spectrumConfigAppIdentifier'
            modified_on:
              $ref: '#/components/schemas/spectrumConfigModified'
              readOnly: true
            argo_smart_routing:
              $ref: '#/components/schemas/spectrumConfigArgoSmartRouting'
            dns:
              $ref: '#/components/schemas/spectrumConfigDns'
            edge_ips:
              $ref: '#/components/schemas/spectrumConfigEdgeIps'
            ip_firewall:
              $ref: '#/components/schemas/spectrumConfigIpFirewall'
            origin_direct:
              $ref: '#/components/schemas/spectrumConfigOriginDirect'
            origin_dns:
              $ref: '#/components/schemas/spectrumConfigOriginDns'
            origin_port:
              $ref: '#/components/schemas/spectrumConfigOriginPort'
            protocol:
              $ref: '#/components/schemas/spectrumConfigProtocol'
            proxy_protocol:
              $ref: '#/components/schemas/spectrumConfigProxyProtocol'
            tls:
              $ref: '#/components/schemas/spectrumConfigTls'
            traffic_type:
              $ref: '#/components/schemas/spectrumConfigTrafficType'
          required:
            - created_on
            - dns
            - id
            - modified_on
            - protocol
      required:
        - success
        - errors
        - messages
    spectrumConfigAppIdentifier:
      description: App identifier.
      readOnly: true
      $ref: '#/components/schemas/spectrumConfigIdentifier'
    spectrumConfigArgoSmartRouting:
      default: false
      description: >-
        Enables Argo Smart Routing for this application. Notes: Only available
        for TCP applications with traffic_type set to "direct".
      example: true
      type: boolean
    spectrumConfigCreated:
      description: When the Application was created.
      readOnly: true
      $ref: '#/components/schemas/spectrumConfigTimestamp'
    spectrumConfigDns:
      description: The name and type of DNS record for the Spectrum application.
      properties:
        name:
          $ref: '#/components/schemas/spectrumConfigDnsName'
        type:
          $ref: '#/components/schemas/spectrumConfigDnsType'
      type: object
    spectrumConfigDnsName:
      description: The name of the DNS record associated with the application.
      example: ssh.example.com
      format: hostname
      type: string
    spectrumConfigDnsTtl:
      description: The TTL of our resolution of your DNS record in seconds.
      minimum: 600
      type: integer
    spectrumConfigDnsType:
      description: The type of DNS record associated with the application.
      enum:
        - CNAME
        - ADDRESS
      example: CNAME
      type: string
    spectrumConfigEdgeIps:
      default:
        connectivity: all
        type: dynamic
      description: The anycast edge IP configuration for the hostname of this application.
      type: object
      properties:
        connectivity:
          description: >-
            The IP versions supported for inbound connections on Spectrum
            anycast IPs.
          enum:
            - all
            - ipv4
            - ipv6
          example: all
          type: string
        type:
          description: >-
            The type of edge IP configuration specified. Dynamically allocated
            edge IPs use Spectrum anycast IPs in accordance with the
            connectivity you specify. Only valid with CNAME DNS names.
          enum:
            - dynamic
          example: dynamic
          type: string
        ips:
          description: >-
            The array of customer owned IPs we broadcast via anycast for this
            hostname and application.
          example:
            - 192.0.2.1
          items:
            description: Edge anycast IPs.
            example: 192.0.2.1
            type: string
          type: array
    spectrumConfigIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    spectrumConfigIpFirewall:
      default: false
      description: >-
        Enables IP Access Rules for this application. Notes: Only available for
        TCP applications.
      example: false
      type: boolean
    spectrumConfigMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    spectrumConfigModified:
      description: When the Application was last modified.
      readOnly: true
      $ref: '#/components/schemas/spectrumConfigTimestamp'
    spectrumConfigOriginDirect:
      description: >-
        List of origin IP addresses. Array may contain multiple IP addresses for
        load balancing.
      items:
        example: tcp://127.0.0.1:8080
        format: URI
        type: string
      type: array
    spectrumConfigOriginDns:
      description: The name and type of DNS record for the Spectrum application.
      properties:
        name:
          $ref: '#/components/schemas/spectrumConfigOriginDnsName'
        ttl:
          $ref: '#/components/schemas/spectrumConfigDnsTtl'
        type:
          $ref: '#/components/schemas/spectrumConfigOriginDnsType'
      type: object
    spectrumConfigOriginDnsName:
      description: The name of the DNS record associated with the origin.
      example: origin.example.com
      format: hostname
      type: string
    spectrumConfigOriginDnsType:
      description: >-
        The type of DNS record associated with the origin. "" is used to specify
        a combination of A/AAAA records.
      enum:
        - ''
        - A
        - AAAA
        - SRV
      example: ''
      type: string
    spectrumConfigOriginPort:
      description: >-
        The destination port at the origin. Only specified in conjunction with
        origin_dns. May use an integer to specify a single origin port, for
        example `1000`, or a string to specify a range of origin ports, for
        example `"1000-2000"`. Notes: If specifying a port range, the number of
        ports in the range must match the number of ports specified in the
        "protocol" field.
      example: 22
      maximum: 65535
      minimum: 1
      type: integer
    spectrumConfigProtocol:
      description: >-
        The port configuration at Cloudflare's edge. May specify a single port,
        for example `"tcp/1000"`, or a range of ports, for example
        `"tcp/1000-2000"`.
      example: tcp/22
      type: string
    spectrumConfigProxyProtocol:
      default: 'off'
      description: >-
        Enables Proxy Protocol to the origin. Refer to [Enable Proxy
        protocol](https://developers.cloudflare.com/spectrum/getting-started/proxy-protocol/)
        for implementation details on PROXY Protocol V1, PROXY Protocol V2, and
        Simple Proxy Protocol.
      enum:
        - 'off'
        - v1
        - v2
        - simple
      example: 'off'
      type: string
    spectrumConfigTimestamp:
      example: '2014-01-01T05:20:00.12345Z'
      format: date-time
      type: string
      x-auditable: true
    spectrumConfigTls:
      default: 'off'
      description: The type of TLS termination associated with the application.
      enum:
        - 'off'
        - flexible
        - full
        - strict
      example: 'off'
      type: string
    spectrumConfigTrafficType:
      default: direct
      description: >-
        Determines how data travels from the edge to your origin. When set to
        "direct", Spectrum will send traffic directly to your origin, and the
        application's type is derived from the `protocol`. When set to "http" or
        "https", Spectrum will apply Cloudflare's HTTP/HTTPS features as it
        sends traffic to your origin, and the application type matches this
        property exactly.
      enum:
        - direct
        - http
        - https
      example: direct
      type: string
    spectrumConfigUpdateAppConfig:
      type: object
      properties:
        created_on:
          $ref: '#/components/schemas/spectrumConfigCreated'
          readOnly: true
        id:
          $ref: '#/components/schemas/spectrumConfigAppIdentifier'
        modified_on:
          $ref: '#/components/schemas/spectrumConfigModified'
          readOnly: true
        argo_smart_routing:
          $ref: '#/components/schemas/spectrumConfigArgoSmartRouting'
        dns:
          $ref: '#/components/schemas/spectrumConfigDns'
        edge_ips:
          $ref: '#/components/schemas/spectrumConfigEdgeIps'
        ip_firewall:
          $ref: '#/components/schemas/spectrumConfigIpFirewall'
        origin_direct:
          $ref: '#/components/schemas/spectrumConfigOriginDirect'
        origin_dns:
          $ref: '#/components/schemas/spectrumConfigOriginDns'
        origin_port:
          $ref: '#/components/schemas/spectrumConfigOriginPort'
        protocol:
          $ref: '#/components/schemas/spectrumConfigProtocol'
        proxy_protocol:
          $ref: '#/components/schemas/spectrumConfigProxyProtocol'
        tls:
          $ref: '#/components/schemas/spectrumConfigTls'
        traffic_type:
          $ref: '#/components/schemas/spectrumConfigTrafficType'
      required:
        - created_on
        - dns
        - id
        - modified_on
        - protocol
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
