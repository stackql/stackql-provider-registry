  /graphql/http_requests_adaptive_groups:
    post:
      operationId: graphql-http_requests_adaptive_groups-list
      summary: HTTP request analytics for a zone with adaptive sampling, grouped by minute, client country, edge response status, and HTTP method
      description: HTTP request analytics for a zone with adaptive sampling, grouped by minute, client country, edge response status, and HTTP method. Replaces the sunset REST endpoint /zones/{zone_id}/analytics/dashboard. Each row aggregates request count, byte volume, cache hits, and threat counts for one dimension tuple over the requested time window.
      x-stackQL-graphQL:
        url: https://api.cloudflare.com/client/v4/graphql
        httpVerb: POST
        responseSelection:
          jsonPath: $.result[*]
        cursor:
          jsonPath: $.result[*].__no_cursor
        query: "query {\n  viewer {\n    zones(filter: { zoneTag: \"{{ .zone_tag }}\" }, limit: 1) {\n      httpRequestsAdaptiveGroups(\n        filter: { datetime_geq: \"{{ .since }}\", datetime_lt: \"{{ .until }}\" }\n        limit: {{ if .limit }}{{ .limit }}{{ else }}100{{ end }}\n        orderBy: [datetimeMinute_ASC]\n      ) {\n        dimensions {\n          datetime: datetimeMinute\n          clientCountryName\n          edgeResponseStatus\n          clientRequestHTTPMethodName\n        }\n        sum {\n          edgeResponseBytes\n          visits\n        }\n        count\n      }\n    }\n  }\n}\n"
      x-stackql-protocol: graphql
      parameters:
      - name: zone_tag
        in: path
        required: true
        schema:
          type: string
        description: Cloudflare zone ID (the 32-char hex tag).
      - name: since
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Lower bound (inclusive) of the time range. RFC3339 (e.g. 2026-05-28T00:00:00Z).
      - name: until
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Upper bound (exclusive) of the time range. RFC3339.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
        description: Maximum number of dimension-tuple rows to return per call.
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        datetime:
                          type: string
                          format: date-time
                          description: Minute-bucketed timestamp (RFC3339).
                        client_country_name:
                          type: string
                          description: ISO-3166 alpha-2 country code derived from client IP.
                        edge_response_status:
                          type: integer
                          description: HTTP status returned to the client.
                        client_request_http_method_name:
                          type: string
                          description: HTTP method (GET, POST, etc.).
                        requests:
                          type: integer
                          description: Total request count for this dimension tuple.
                        bytes:
                          type: integer
                          description: Total bytes served to the client from the edge.
                        visits:
                          type: integer
                          description: Requests by end-users that were initiated from a different website (i.e. the HTTP Referer header does not match the host in the HTTP Host header). A coarse "human visitor" heuristic.
  /graphql/http_requests_1h_groups:
    post:
      operationId: graphql-http_requests_1h_groups-list
      summary: Hourly-bucketed HTTP request totals for a zone
      description: Hourly-bucketed HTTP request totals for a zone. One row per hour with totals for requests, bytes, threats, page views, cache hits/bytes, encrypted requests/bytes, and edge request bytes. Use for last-N-hours traffic dashboards and trend visualisations.
      x-stackQL-graphQL:
        url: https://api.cloudflare.com/client/v4/graphql
        httpVerb: POST
        responseSelection:
          jsonPath: $.result[*]
        cursor:
          jsonPath: $.result[*].__no_cursor
        query: "query {\n  viewer {\n    zones(filter: { zoneTag: \"{{ .zone_tag }}\" }, limit: 1) {\n      httpRequests1hGroups(\n        filter: { datetime_geq: \"{{ .since }}\", datetime_lt: \"{{ .until }}\" }\n        limit: {{ if .limit }}{{ .limit }}{{ else }}168{{ end }}\n        orderBy: [datetime_ASC]\n      ) {\n        dimensions {\n          datetime\n          date\n        }\n        sum {\n          requests\n          bytes\n          threats\n          pageViews\n          cachedRequests\n          cachedBytes\n          encryptedRequests\n          encryptedBytes\n          edgeRequestBytes\n        }\n      }\n    }\n  }\n}\n"
      x-stackql-protocol: graphql
      parameters:
      - name: zone_tag
        in: path
        required: true
        schema:
          type: string
        description: Cloudflare zone ID (the 32-char hex tag).
      - name: since
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Lower bound (inclusive) of the time range. RFC3339 (e.g. 2026-05-29T00:00:00Z).
      - name: until
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Upper bound (exclusive) of the time range. RFC3339.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 168
        description: Maximum hourly rows to return per call. Default 168 (one week of hourly buckets).
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        datetime:
                          type: string
                          format: date-time
                          description: Hour-bucketed timestamp (RFC3339).
                        date:
                          type: string
                          format: date
                          description: Date component of the hour bucket (YYYY-MM-DD).
                        requests:
                          type: integer
                          description: Total request count for the hour.
                        bytes:
                          type: integer
                          description: Total bytes served from the edge for the hour.
                        threats:
                          type: integer
                          description: Requests classified as threats for the hour.
                        page_views:
                          type: integer
                          description: Successful HTML content requests for the hour.
                        cached_requests:
                          type: integer
                          description: Requests served from cache for the hour.
                        cached_bytes:
                          type: integer
                          description: Bytes served from cache for the hour.
                        encrypted_requests:
                          type: integer
                          description: Requests served over TLS for the hour.
                        encrypted_bytes:
                          type: integer
                          description: Bytes served over TLS for the hour.
                        edge_request_bytes:
                          type: integer
                          description: Bytes received from the client over the hour.
