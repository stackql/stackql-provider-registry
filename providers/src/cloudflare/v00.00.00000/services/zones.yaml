        free: true
        pro: true
      x-stackql-sdk:
        service: zones
        resource_chain:
        - plans
        method: list
  /zones/{zone_id}/available_plans/{plan_identifier}:
    get:
      description: Details of the available plan that the zone can subscribe to.
      operationId: zone-rate-plan-available-plan-details
      parameters:
      - in: path
        name: plan_identifier
        schema:
          $ref: '#/components/schemas/billSubsApiIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/billSubsApiMessages'
                  messages:
                    $ref: '#/components/schemas/billSubsApiMessages'
                  result:
                    $ref: '#/components/schemas/billSubsApiAvailableRatePlan'
                  success:
                    description: Whether the API call was successful
                    enum:
