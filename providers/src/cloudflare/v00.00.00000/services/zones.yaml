openapi: 3.0.3
info:
  title: zones API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones:
    get:
      description: Lists, searches, sorts, and filters your zones. Listing zones across more than 500 accounts is currently not allowed.
      operationId: zones-get
      parameters:
      - in: query
        name: name
        schema:
          description: 'A domain name. Optional filter operators can be provided to extend refine the search: * `equal` (default) * `not_equal` * `starts_with` * `ends_with` * `contains` * `starts_with_case_sensitive` * `ends_with_case_sensitive` * `contains_case_sensitive`'
          maxLength: 253
          type: string
      - in: query
        name: status
        schema:
          description: Specify a zone status to filter by.
          enum:
          - initializing
          - pending
          - active
          - moved
          type: string
      - in: query
        name: account.id
        schema:
          description: Filter by an account ID.
          type: string
      - in: query
        name: account.name
        schema:
          description: 'An account Name. Optional filter operators can be provided to extend refine the search: * `equal` (default) * `not_equal` * `starts_with` * `ends_with` * `contains` * `starts_with_case_sensitive` * `ends_with_case_sensitive` * `contains_case_sensitive`'
          maxLength: 253
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Number of zones per page.
          maximum: 50
          minimum: 5
          type: number
      - in: query
        name: order
        schema:
          description: Field to order zones by.
          enum:
          - name
          - status
          - account.id
          - account.name
          - plan.id
          type: string
      - in: query
        name: direction
        schema:
          description: Direction to order zones.
          enum:
          - asc
          - desc
          type: string
      - in: query
        name: match
        schema:
          default: all
          description: Whether to match all search requirements or at least one (any).
          enum:
          - any
          - all
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesMessages'
                  messages:
                    $ref: '#/components/schemas/zonesMessages'
                  success:
                    description: Whether the API call was successful.
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/zonesResultInfo'
                  result:
                    items:
                      $ref: '#/components/schemas/zonesZone'
                    type: array
                required:
                - success
                - errors
                - messages
                type: object
          description: List Zones response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesApiResponseCommonFailure'
          description: List Zones response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Zones
      tags:
      - Zone
      x-api-token-group:
      - Zone Zone Read
      x-stackql-sdk:
        service: zones
        resource_chain: []
        method: list
    post:
      operationId: zones-post
      requestBody:
        content:
          application/json:
            schema:
              properties:
                account:
                  properties:
                    id:
                      $ref: '#/components/schemas/zonesIdentifier'
                  type: object
                name:
                  $ref: '#/components/schemas/zonesName'
                type:
                  $ref: '#/components/schemas/zonesType'
              required:
              - name
              - account
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesMessages'
                  messages:
                    $ref: '#/components/schemas/zonesMessages'
                  success:
                    description: Whether the API call was successful.
                    type: boolean
                  result:
                    $ref: '#/components/schemas/zonesZone'
                required:
                - success
                - errors
                - messages
                type: object
          description: Create Zone response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesApiResponseCommonFailure'
          description: Create Zone response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create Zone
      tags:
      - Zone
      x-api-token-group:
      - Zone Zone Edit
      - Zone DNS Edit
      x-stackql-sdk:
        service: zones
        resource_chain: []
        method: create
  /zones/{zone_id}:
    delete:
      description: Deletes an existing zone.
      operationId: zones-0-delete
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesApiResponseSingleId'
          description: Delete Zone response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesApiResponseCommonFailure'
          description: Delete Zone response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete Zone
      tags:
      - Zone
      x-api-token-group:
      - Zone Write
      x-cfPermissionsRequired:
        enum:
        - '#zone:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: zones
        resource_chain: []
        method: delete
    get:
      operationId: zones-0-get
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesMessages'
                  messages:
                    $ref: '#/components/schemas/zonesMessages'
                  success:
                    description: Whether the API call was successful.
                    type: boolean
                  result:
                    $ref: '#/components/schemas/zonesZone'
                required:
                - success
                - errors
                - messages
                type: object
          description: Zone Details response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesApiResponseCommonFailure'
          description: Zone Details response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Zone Details
      tags:
      - Zone
      x-api-token-group:
      - Trust and Safety Write
      - Trust and Safety Read
      - 'Zero Trust: PII Read'
      - Zaraz Edit
      - Zaraz Read
      - Zaraz Admin
      - 'Access: Apps and Policies Revoke'
      - 'Access: Apps and Policies Write'
      - 'Access: Apps and Policies Read'
      - 'Access: Apps and Policies Revoke'
      - 'Access: Mutual TLS Certificates Write'
      - 'Access: Organizations, Identity Providers, and Groups Write'
      - Zone Settings Write
      - Zone Settings Read
      - Zone Read
      - DNS Read
      - Workers Scripts Write
      - Workers Scripts Read
      - Zone Write
      - Workers Routes Write
      - Workers Routes Read
      - Stream Write
      - Stream Read
      - SSL and Certificates Write
      - SSL and Certificates Read
      - Logs Write
      - Logs Read
      - Cache Purge
      - Page Rules Write
      - Page Rules Read
      - Load Balancers Write
      - Load Balancers Read
      - Firewall Services Write
      - Firewall Services Read
      - DNS Write
      - Apps Write
      - Analytics Read
      - 'Access: Apps and Policies Write'
      - 'Access: Apps and Policies Read'
      x-cfPermissionsRequired:
        enum:
        - '#zone:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: zones
        resource_chain: []
        method: get
    patch:
      description: Edits a zone. Only one zone property can be changed at a time.
      operationId: zones-0-patch
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                paused:
                  $ref: '#/components/schemas/zonesPaused'
                type:
                  description: A full zone implies that DNS is hosted with Cloudflare. A partial zone is typically a partner-hosted zone or a CNAME setup. This parameter is only available to Enterprise customers or if it has been explicitly enabled on a zone.
                  enum:
                  - full
                  - partial
                  - secondary
                  - internal
                  type: string
                vanity_name_servers:
                  $ref: '#/components/schemas/zonesVanityNameServers'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesMessages'
                  messages:
                    $ref: '#/components/schemas/zonesMessages'
                  success:
                    description: Whether the API call was successful.
                    type: boolean
                  result:
                    $ref: '#/components/schemas/zonesZone'
                required:
                - success
                - errors
                - messages
                type: object
          description: Edit Zone response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesApiResponseCommonFailure'
          description: Edit Zone response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Edit Zone
      tags:
      - Zone
      x-api-token-group:
      - Zone Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: zones
        resource_chain: []
        method: edit
  /zones/{zone_id}/activation_check:
    put:
      description: Triggeres a new activation check for a PENDING Zone. This can be triggered every 5 min for paygo/ent customers, every hour for FREE Zones.
      operationId: put-zones-zone_id-activation_check
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/zoneActivationMessages'
                  messages:
                    $ref: '#/components/schemas/zoneActivationMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    properties:
                      id:
                        $ref: '#/components/schemas/zoneActivationIdentifier'
                    type: object
                required:
                - success
                - errors
                - messages
          description: Successful Response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zoneActivationApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Rerun the Activation Check
      tags:
      - Zone
      x-api-token-group:
      - Zone Write
      x-stackql-sdk:
        service: zones
        resource_chain:
        - activation_check
        method: trigger
  /zones/{zone_id}/analytics/latency:
    get:
      description: Retrieves aggregate Argo Smart Routing analytics for a zone, including latency improvements, bandwidth savings, and routing statistics.
      operationId: argo-analytics-for-zone-argo-analytics-for-a-zone
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - in: query
        name: bins
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/argoAnalyticsResponseSingle'
          description: Argo Analytics for a zone response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/argoAnalyticsMessages'
                  messages:
                    $ref: '#/components/schemas/argoAnalyticsMessages'
                  result:
                    type: object
                    enum:
                    - null
                    nullable: true
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Argo Analytics for a zone response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Argo Analytics for a zone
      tags:
      - Argo Analytics for Zone
      x-api-token-group:
      - Analytics Read
      x-cfPermissionsRequired:
        enum:
        - '#analytics:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/analytics/latency/colos:
    get:
      description: Retrieves Argo Smart Routing analytics broken down by geographic points of presence (PoPs). Shows latency improvements and routing efficiency per location.
      operationId: argo-analytics-for-geolocation-argo-analytics-for-a-zone-at-different-po-ps
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/argoAnalyticsResponseSingle'
          description: Argo Analytics for a zone at different PoPs response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/argoAnalyticsMessages'
                  messages:
                    $ref: '#/components/schemas/argoAnalyticsMessages'
                  result:
                    type: object
                    enum:
                    - null
                    nullable: true
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Argo Analytics for a zone at different PoPs response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Argo Analytics for a zone at different PoPs
      tags:
      - Argo Analytics for Geolocation
      x-api-token-group:
      - Analytics Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/available_plans:
