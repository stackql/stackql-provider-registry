  /zones/{zone_id}/custom_ns:
    get:
      deprecated: true
      description: Get metadata for account-level custom nameservers on a zone. Deprecated in favor of [Show DNS Settings](https://developers.cloudflare.com/api/operations/dns-settings-for-a-zone-list-dns-settings).
      operationId: account-level-custom-nameservers-usage-for-a-zone-get-account-custom-nameserver-related-zone-metadata
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dnsCustomNameserversGetResponse'
          description: Get Account Custom Nameserver Related Zone Metadata response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/dnsCustomNameserversMessages'
                  messages:
                    $ref: '#/components/schemas/dnsCustomNameserversMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                    type: object
                  enabled:
                    description: Whether zone uses account-level custom nameservers.
                    type: boolean
                    x-auditable: true
                  ns_set:
                    default: 1
                    description: The number of the name server set to assign to the zone.
                    maximum: 5
                    minimum: 1
                    type: number
                    x-auditable: true
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                required:
                - success
                - errors
                - messages
                - success
                - errors
