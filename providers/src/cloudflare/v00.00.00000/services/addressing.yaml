          $ref: '#/components/schemas/addressingSchemasAdvertised'
        advertised_modified_at:
          $ref: '#/components/schemas/addressingModifiedAtNullable'
          readOnly: true
        on_demand_enabled:
          $ref: '#/components/schemas/addressingSchemasOnDemandEnabled'
        on_demand_locked:
          $ref: '#/components/schemas/addressingSchemasOnDemandLocked'
      type: object
    addressingBgpPrefixCreate:
      properties:
        cidr:
          $ref: '#/components/schemas/addressingCidr'
      required:
      - cidr
      type: object
    addressingBgpPrefixIdentifier:
      description: Identifier of BGP Prefix.
      example: 7009ba364c7a5760798ceb430e603b74
      maxLength: 32
      type: string
      x-auditable: true
    addressingBgpPrefixUpdateAdvertisement:
      properties:
        asn_prepend_count:
