    address_maps:
      id: cloudflare.addressing.address_maps
      name: address_maps
      title: Address Maps
      methods:
        list:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1addressing~1address_maps/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1addressing~1address_maps/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .description }}{{ $sep }}"description": {{ toJson .description }}{{- $sep = "," -}}{{ end }}

                {{- if .enabled }}{{ $sep }}"enabled": {{ toJson .enabled }}{{- $sep = "," -}}{{ end }}

                {{- if .ips }}{{ $sep }}"ips": {{ if eq (kindOf .ips) "string" }}{{ .ips }}{{ else }}{{ toJson .ips }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .memberships }}{{ $sep }}"memberships": {{ if eq (kindOf .memberships) "string" }}{{ .memberships }}{{ else }}{{ toJson .memberships }}{{ end }}{{- $sep = "," -}}{{ end }}

                }

                '
        delete:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1addressing~1address_maps~1{address_map_id}/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1addressing~1address_maps~1{address_map_id}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        edit:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1addressing~1address_maps~1{address_map_id}/patch'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        remove_account:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1addressing~1address_maps~1{address_map_id}~1accounts~1{account_id}/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        add_account:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1addressing~1address_maps~1{address_map_id}~1accounts~1{account_id}/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        remove_ip:
