components:
  schemas:
    addressingAccountIdentifier:
      description: Identifier of a Cloudflare account.
      example: 258def64c72dae45f3e4c8516e2111f2
      maxLength: 32
      type: string
      x-auditable: true
    addressingAddressMapIdentifier:
      description: Identifier of an Address Map.
      example: 055817b111884e0227e1be16a0be6ee0
      maxLength: 32
      type: string
      x-auditable: true
    addressingAddressMaps:
      properties:
        can_delete:
          $ref: '#/components/schemas/addressingCanDelete'
        can_modify_ips:
          $ref: '#/components/schemas/addressingCanModifyIps'
        created_at:
          $ref: '#/components/schemas/addressingTimestamp'
          readOnly: true
        default_sni:
          $ref: '#/components/schemas/addressingDefaultSni'
        description:
          $ref: '#/components/schemas/addressingSchemasDescription'
        enabled:
          $ref: '#/components/schemas/addressingEnabled'
        id:
          $ref: '#/components/schemas/addressingAddressMapIdentifier'
        modified_at:
          $ref: '#/components/schemas/addressingTimestamp'
          readOnly: true
      type: object
    addressingAddressMapsIp:
      properties:
        created_at:
          $ref: '#/components/schemas/addressingTimestamp'
          readOnly: true
        ip:
          $ref: '#/components/schemas/addressingIp'
      type: object
    addressingAddressMapsMembership:
      properties:
        can_delete:
          $ref: '#/components/schemas/addressingSchemasCanDelete'
        created_at:
          $ref: '#/components/schemas/addressingTimestamp'
          readOnly: true
        identifier:
          $ref: '#/components/schemas/addressingIdentifier'
        kind:
          $ref: '#/components/schemas/addressingKind'
      type: object
    addressingAddressMapsMembershipRequest:
      properties:
        identifier:
          $ref: '#/components/schemas/addressingIdentifier'
        kind:
          $ref: '#/components/schemas/addressingKind'
      type: object
    addressingAdvertised:
      deprecated: true
      description: Prefix advertisement status to the Internet. This field is only not 'null' if on demand is enabled.
      example: true
      nullable: true
      type: boolean
      x-auditable: true
      x-stainless-deprecation-message: Prefer the [BGP Prefixes API](https://developers.cloudflare.com/api/resources/addressing/subresources/prefixes/subresources/bgp_prefixes/) instead, which allows for advertising multiple BGP routes within a single IP Prefix.
    addressingAdvertisedModifiedAtNullable:
      deprecated: true
      description: Last time the advertisement status was changed. This field is only not 'null' if on demand is enabled.
      example: '2014-01-01T05:20:00.12345Z'
      format: date-time
      nullable: true
      type: string
      x-auditable: true
      x-stainless-deprecation-message: Prefer the [BGP Prefixes API](https://developers.cloudflare.com/api/resources/addressing/subresources/prefixes/subresources/bgp_prefixes/) instead, which allows for advertising multiple BGP routes within a single IP Prefix.
    addressingAdvertisedResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/addressingMessages'
        messages:
          $ref: '#/components/schemas/addressingMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          properties:
            advertised:
              $ref: '#/components/schemas/addressingComponentsSchemasAdvertised'
            advertised_modified_at:
              $ref: '#/components/schemas/addressingModifiedAtNullable'
              readOnly: true
          type: object
      required:
      - success
      - errors
      - messages
    addressingApiResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/addressingMessages'
        messages:
          $ref: '#/components/schemas/addressingMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
      required:
      - success
      - errors
      - messages
    addressingApiResponseCommon:
      properties:
        errors:
          $ref: '#/components/schemas/addressingMessages'
        messages:
          $ref: '#/components/schemas/addressingMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
      required:
      - success
      - errors
      - messages
      type: object
