      description: Create a new address map under the account.
      operationId: ip-address-management-address-maps-create-address-map
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                description:
                  $ref: '#/components/schemas/addressingSchemasDescription'
                enabled:
                  $ref: '#/components/schemas/addressingEnabled'
                ips:
                  items:
                    $ref: '#/components/schemas/addressingIpAddress'
                  type: array
                memberships:
                  $ref: '#/components/schemas/addressingMembershipRequests'
              type: object
