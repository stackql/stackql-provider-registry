      description: List all address maps owned by the account.
      operationId: ip-address-management-address-maps-list-address-maps
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/addressingComponentsSchemasResponseCollection'
          description: List Address Maps response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/addressingMessages'
                  messages:
                    $ref: '#/components/schemas/addressingMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/addressingAddressMaps'
                    type: array
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: List Address Maps response failure
      security:
      - api_email: []
        api_key: []
      summary: List Address Maps
      tags:
      - IP Address Management Address Maps
      x-api-token-group:
      - Address Maps Write
      - Address Maps Read
      x-stackql-sdk:
        service: addressing
        resource_chain:
        - address_maps
        method: list
