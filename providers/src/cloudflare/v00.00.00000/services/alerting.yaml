            application/json:
              schema:
                $ref: >-
                  #/components/schemas/aaaComponentsSchemasApiResponseCommonFailure
          description: Get delivery mechanism eligibility response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get delivery mechanism eligibility
      tags:
