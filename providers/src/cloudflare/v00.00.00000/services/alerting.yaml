  /accounts/{account_id}/alerting/v3/history:
    get:
      description: >-
        Gets a list of history records for notifications sent to an account. The
        records are displayed for last `x` number of days based on the zone plan
        (free = 30, pro = 30, biz = 30, ent = 90).
      operationId: notification-history-list-history
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: per_page
          schema:
            $ref: '#/components/schemas/aaaPerPage'
        - in: query
          name: before
          schema:
            $ref: '#/components/schemas/aaaBefore'
        - in: query
          name: page
          schema:
            default: 1
            description: Page number of paginated results.
            minimum: 1
            type: number
        - in: query
          name: since
          schema:
            description: >-
              Limit the returned results to history records newer than the
              specified date. This must be a timestamp that conforms to RFC3339.
            format: date-time
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/aaaHistoryComponentsSchemasResponseCollection
          description: List History response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/aaaComponentsSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/aaaComponentsSchemasMessages'
                  success:
                    description: Whether the API call was successful
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/aaaSchemasResultInfo'
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/aaaHistory'
                    type: array
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
          description: List History response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List History
      tags:
