components:
  schemas:
    aaaAccountId:
      description: The account id
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    aaaAlertBody:
      description: Message body included in the notification sent.
      example: SSL certificate has expired
      type: string
    aaaAlertInterval:
      description: >-
        Optional specification of how often to re-alert from the same incident,
        not support on all alert types.
      example: 30m
      type: string
      x-auditable: true
    aaaAlertType:
      description: >-
        Refers to which event will trigger a Notification dispatch. You can use
        the endpoint to get available alert types which then will give you a
        list of possible values.
      enum:
        - abuse_report_alert
        - access_custom_certificate_expiration_type
        - advanced_ddos_attack_l4_alert
        - advanced_ddos_attack_l7_alert
        - advanced_http_alert_error
        - bgp_hijack_notification
        - billing_usage_alert
        - block_notification_block_removed
        - block_notification_new_block
        - block_notification_review_rejected
        - bot_traffic_basic_alert
        - brand_protection_alert
        - brand_protection_digest
        - clickhouse_alert_fw_anomaly
        - clickhouse_alert_fw_ent_anomaly
        - cloudforce_one_request_notification
        - cni_maintenance_notification
        - custom_analytics
        - custom_bot_detection_alert
        - custom_ssl_certificate_event_type
        - dedicated_ssl_certificate_event_type
        - device_connectivity_anomaly_alert
        - dos_attack_l4
        - dos_attack_l7
        - expiring_service_token_alert
        - failing_logpush_job_disabled_alert
        - fbm_auto_advertisement
        - fbm_dosd_attack
        - fbm_volumetric_attack
        - health_check_status_notification
        - hostname_aop_custom_certificate_expiration_type
        - http_alert_edge_error
        - http_alert_origin_error
        - image_notification
        - image_resizing_notification
        - incident_alert
        - load_balancing_health_alert
        - load_balancing_pool_enablement_alert
        - logo_match_alert
        - magic_tunnel_health_check_event
        - magic_wan_tunnel_health
        - maintenance_event_notification
        - mtls_certificate_store_certificate_expiration_type
        - pages_event_alert
        - radar_notification
        - real_origin_monitoring
        - scriptmonitor_alert_new_code_change_detections
        - scriptmonitor_alert_new_hosts
        - scriptmonitor_alert_new_malicious_hosts
        - scriptmonitor_alert_new_malicious_scripts
        - scriptmonitor_alert_new_malicious_url
        - scriptmonitor_alert_new_max_length_resource_url
        - scriptmonitor_alert_new_resources
        - secondary_dns_all_primaries_failing
        - secondary_dns_primaries_failing
        - secondary_dns_warning
        - secondary_dns_zone_successfully_updated
        - secondary_dns_zone_validation_warning
        - security_insights_alert
        - sentinel_alert
        - stream_live_notifications
        - synthetic_test_latency_alert
        - synthetic_test_low_availability_alert
        - traffic_anomalies_alert
        - tunnel_health_event
        - tunnel_update_event
        - universal_ssl_event_type
        - web_analytics_metrics_update
        - zone_aop_custom_certificate_expiration_type
      example: universal_ssl_event_type
      type: string
      x-auditable: true
    aaaAlertsResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/aaaComponentsSchemasMessages'
        messages:
          $ref: '#/components/schemas/aaaComponentsSchemasMessages'
        success:
          description: Whether the API call was successful
          enum:
            - true
          example: true
          type: boolean
        result:
          example:
            Origin Monitoring:
              - description: High levels of 5xx HTTP errors at your origin.
                display_name: Origin Error Rate Alert
                filter_options:
                  - AvailableValues: null
                    ComparisonOperator: '=='
                    Key: zones
                    Range: 1-n
                  - AvailableValues:
                      - Description: Service-Level Objective of 99.7
                        ID: '99.7'
                      - Description: Service-Level Objective of 99.8
                        ID: '99.8'
                    ComparisonOperator: '>='
                    Key: slo
                    Range: 0-1
                type: http_alert_origin_error
          type: object
      required:
        - success
        - errors
        - messages
      type: object
    aaaApiResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/aaaComponentsSchemasMessages'
        messages:
          $ref: '#/components/schemas/aaaComponentsSchemasMessages'
        success:
          description: Whether the API call was successful
          enum:
            - true
          example: true
          type: boolean
        result_info:
          $ref: '#/components/schemas/aaaSchemasResultInfo'
      required:
        - success
        - errors
        - messages
    aaaBefore:
      description: >-
        Limit the returned results to history records older than the specified
        date. This must be a timestamp that conforms to RFC3339.
      example: '2022-05-20T20:29:58.679897Z'
      format: date-time
      type: string
    aaaComponentsSchemasApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/aaaComponentsSchemasMessages'
        messages:
          example: []
          $ref: '#/components/schemas/aaaComponentsSchemasMessages'
        success:
          description: Whether the API call was successful
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
      type: object
    aaaComponentsSchemasDescription:
      description: Description of the notification policy (if present).
      example: >-
        Universal Certificate validation status, issuance, renewal, and
        expiration notices
      type: string
    aaaComponentsSchemasMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          message:
            type: string
        required:
          - message
        type: object
        uniqueItems: true
      type: array
    aaaComponentsSchemasName:
      description: >-
        The name of the webhook destination. This will be included in the
        request body when you receive a webhook notification.
      example: Slack Webhook
      type: string
      x-auditable: true
    aaaComponentsSchemasResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/aaaComponentsSchemasMessages'
        messages:
          $ref: '#/components/schemas/aaaComponentsSchemasMessages'
        success:
          description: Whether the API call was successful
          enum:
            - true
          example: true
          type: boolean
        result:
          items:
            $ref: '#/components/schemas/aaaPagerduty'
          type: array
      required:
        - success
        - errors
        - messages
      type: object
    aaaComponentsSchemasType:
      description: Type of webhook endpoint.
      enum:
        - datadog
        - discord
        - feishu
        - gchat
        - generic
        - opsgenie
        - slack
        - splunk
      example: slack
      type: string
      x-auditable: true
    aaaCreatedAt:
      description: Timestamp of when the webhook destination was created.
      example: '2020-10-26T18:25:04.532316Z'
