                    type: boolean
                  result:
                    properties:
                      id:
                        $ref: '#/components/schemas/aaaUuid'
                    type: object
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
          description: Create a Notification policy response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Connect PagerDuty
      tags:
        - Notification destinations with PagerDuty
      x-api-token-group:
        - Notifications Write
        - Account Settings Write
      x-stackql-sdk:
