          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aaaIdResponse'
          description: Create a Notification policy response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/aaaComponentsSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/aaaComponentsSchemasMessages'
                  success:
                    description: Whether the API call was successful
                    enum:
                      - true
