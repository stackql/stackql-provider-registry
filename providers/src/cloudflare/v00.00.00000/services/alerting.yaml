            application/json:
              schema:
                $ref: >-
                  #/components/schemas/aaaComponentsSchemasApiResponseCommonFailure
          description: List PagerDuty services response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List PagerDuty services
      tags:
        - Notification destinations with PagerDuty
      x-api-token-group:
        - 'Zero Trust: PII Read'
        - Notifications Write
        - Notifications Read
        - Account Settings Write
        - Account Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: alerting
        resource_chain:
          - destinations
          - pagerduty
        method: get
  /accounts/{account_id}/alerting/v3/destinations/pagerduty/connect:
    post:
      description: Creates a new token for integrating with PagerDuty.
      operationId: notification-destinations-with-pager-duty-connect-pager-duty
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aaaSensitiveIdResponse'
          description: Token for PagerDuty integration
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/aaaComponentsSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/aaaComponentsSchemasMessages'
                  success:
                    description: Whether the API call was successful
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      id:
                        $ref: '#/components/schemas/aaaUuid'
                    type: object
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
          description: Create a token for PagerDuty integration failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create PagerDuty integration token
      tags:
        - Notification destinations with PagerDuty
      x-api-token-group:
