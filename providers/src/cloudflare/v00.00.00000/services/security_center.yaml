openapi: 3.0.3
info:
  title: security_center API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/security-center/insights/{issue_id}/context:
    get:
      description: >-
        Returns the full context payload for an insight. This endpoint is used
        for insights with large payloads that are not included inline in the
        list response.
      operationId: get-security-center-insight-context
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: path
          name: issue_id
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/securityCenterMessages'
                  messages:
                    $ref: '#/components/schemas/securityCenterMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    type: object
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: The request was successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseCommonFailure'
          description: A client error occurred.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieves Security Center Insight Context
      tags:
        - Security Center Insights
      x-stackql-sdk:
        service: security_center
        resource_chain:
          - insights
          - context
        method: get
  /accounts/{account_id}/security-center/insights:
    get:
      description: >-
        Lists all Security Center insights for the account or zone, showing
        security findings and recommendations.
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: dismissed
          schema:
            $ref: '#/components/schemas/securityCenterDismissed'
        - in: query
          name: issue_class
          schema:
            $ref: '#/components/schemas/securityCenterIssueClasses'
        - in: query
          name: issue_type
          schema:
            $ref: '#/components/schemas/securityCenterIssueTypes'
        - in: query
          name: product
          schema:
            $ref: '#/components/schemas/securityCenterProducts'
        - in: query
          name: severity
          schema:
            $ref: '#/components/schemas/securityCenterSeverityQueryParam'
        - in: query
          name: subject
          schema:
            $ref: '#/components/schemas/securityCenterSubjects'
        - in: query
          name: issue_class~neq
          schema:
            $ref: '#/components/schemas/securityCenterIssueClasses'
        - in: query
          name: issue_type~neq
          schema:
            $ref: '#/components/schemas/securityCenterIssueTypes'
        - in: query
          name: product~neq
          schema:
            $ref: '#/components/schemas/securityCenterProducts'
        - in: query
          name: severity~neq
          schema:
            $ref: '#/components/schemas/securityCenterSeverityQueryParam'
        - in: query
          name: subject~neq
          schema:
            $ref: '#/components/schemas/securityCenterSubjects'
        - in: query
          name: page
          schema:
            default: 1
            $ref: '#/components/schemas/securityCenterPage'
        - in: query
          name: per_page
          schema:
            default: 25
            $ref: '#/components/schemas/securityCenterPerPage'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/securityCenterMessages'
                  messages:
                    $ref: '#/components/schemas/securityCenterMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    properties:
                      count:
                        $ref: '#/components/schemas/securityCenterCount'
                      issues:
                        items:
                          $ref: '#/components/schemas/securityCenterIssue'
                        type: array
                      page:
                        $ref: '#/components/schemas/securityCenterPage'
                      per_page:
                        $ref: '#/components/schemas/securityCenterPerPage'
                    type: object
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: The request was successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseCommonFailure'
          description: A client error occurred.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieves Security Center Insights
      tags: []
      x-stackql-sdk:
        service: security_center
        resource_chain:
          - insights
        method: list
      operationId: get_accounts_account_id_security_center_insights
