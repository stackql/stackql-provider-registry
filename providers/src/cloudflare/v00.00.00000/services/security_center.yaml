  /accounts/{account_id}/security-center/insights/scans:
    get:
      description: >-
        Returns the most recent on-demand scans for the account or zone, up to a
        maximum of 5. Each scan includes its ID, start time, and current status.
        This includes both account or zone-wide and zone-scoped scans.
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/securityCenterMessages'
                  messages:
                    $ref: '#/components/schemas/securityCenterMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/securityCenterScanStatusResponse'
                    type: array
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: The request was successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseCommonFailure'
          description: A client error occurred.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Recent account or zone Scans
      tags: []
      operationId: get_accounts_account_id_security_center_insights_scans
    post:
      description: >-
        Initiates an on-demand security scan for the entire account or zone,
        scanning all zones associated with the account or zone. Rate limited to
        5 scans per account or zone per 24-hour window.
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
