  /accounts/{account_id}/security-center/insights/audit-log:
    get:
      description: >-
        Lists audit log entries for all Security Center insights in the account
        or zone, showing changes to insight status and classification.
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Number of results per page.
          in: query
          name: per_page
          schema:
            default: 25
            maximum: 1000
            minimum: 1
            type: integer
        - description: >-
            Opaque cursor for pagination. Use the cursor value from result_info
            of the previous response.
          in: query
          name: cursor
          schema:
            type: string
        - description: Filter by the field that was changed.
          in: query
          name: field_changed
          schema:
            enum:
              - status
              - user_classification
            type: string
        - description: Filter by the actor that made the change.
          in: query
          name: changed_by
          schema:
            type: string
        - description: Filter entries changed at or after this timestamp (RFC 3339).
          in: query
          name: since
          schema:
            format: date-time
            type: string
        - description: Filter entries changed before this timestamp (RFC 3339).
          in: query
          name: before
          schema:
            format: date-time
            type: string
        - description: >-
            Sort order for results. Use 'asc' for oldest first or 'desc' for
            newest first.
          in: query
          name: order
          schema:
            default: desc
            enum:
              - asc
              - desc
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterAuditLogResponse'
          description: The request was successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseCommonFailure'
          description: A client error occurred.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieves account or zone Audit Log
      tags: []
      x-stackql-sdk:
        service: security_center
        resource_chain:
          - insights
          - audit_logs
        method: list
      operationId: get_accounts_account_id_security_center_insights_audit_log
