components:
  schemas:
    securityCenterApiResponseCommon:
      properties:
        errors:
          $ref: '#/components/schemas/securityCenterMessages'
        messages:
          $ref: '#/components/schemas/securityCenterMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
      type: object
    securityCenterApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/securityCenterMessages'
        messages:
          example: []
          $ref: '#/components/schemas/securityCenterMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    securityCenterApiResponseSingle:
      type: object
      $ref: '#/components/schemas/securityCenterApiResponseCommon'
    securityCenterAuditLog:
      properties:
        changed_at:
          description: The timestamp when the change occurred.
          format: date-time
          type: string
          x-auditable: true
        changed_by:
          description: >-
            The actor that made the change. 'system' for automated changes, or a
            user identifier.
          example: system
          type: string
          x-auditable: true
        current_value:
          description: >-
            The value of the field after the change. Null if the field was
            cleared.
          nullable: true
          type: string
          x-auditable: true
        field_changed:
          description: The field that was changed.
          enum:
            - status
            - user_classification
          type: string
          x-auditable: true
        id:
          description: UUIDv7 identifier for the audit log entry, time-ordered.
          format: uuid
          type: string
          x-auditable: true
        issue_id:
          description: The ID of the insight this audit log entry relates to.
          type: string
          x-auditable: true
        previous_value:
          description: >-
            The value of the field before the change. Null if the field was not
            previously set.
          nullable: true
          type: string
          x-auditable: true
        rationale:
          description: Optional rationale provided for the change.
          nullable: true
          type: string
          x-auditable: true
        zone_id:
          description: >-
            The zone ID associated with the insight. Only present for zone-level
            insights.
          format: int64
          type: integer
          x-auditable: true
      type: object
    securityCenterAuditLogResponse:
      properties:
        errors:
          $ref: '#/components/schemas/securityCenterMessages'
        messages:
          $ref: '#/components/schemas/securityCenterMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          items:
            $ref: '#/components/schemas/securityCenterAuditLog'
          type: array
        result_info:
          properties:
            count:
              description: The number of items in the current result set.
              example: 25
              type: integer
            cursor:
              description: >-
                Opaque cursor for the next page of results. Absent when there
                are no more results.
              type: string
            per_page:
              description: The requested number of items per page.
              example: 25
              type: integer
          type: object
      required:
        - success
        - errors
        - messages
      type: object
    securityCenterCount:
      description: Indicates the total number of results.
      example: 1
      type: integer
      x-auditable: true
    securityCenterDismissed:
      example: false
      type: boolean
      x-auditable: true
    securityCenterIssue:
      properties:
        dismissed:
          example: false
          type: boolean
          x-auditable: true
        has_extended_context:
          description: >-
            Indicates whether the insight has a large payload that requires
            fetching via the context endpoint.
          example: false
          type: boolean
          x-auditable: true
        id:
          type: string
          x-auditable: true
        issue_class:
          $ref: '#/components/schemas/securityCenterIssueClass'
        issue_type:
          $ref: '#/components/schemas/securityCenterIssueType'
        payload:
          properties:
            detection_method:
              description: Describes the method used to detect insight.
              example: >-
                We detected security rules referencing multiple IP addresses
                directly in the rules.
              type: string
              x-auditable: true
            zone_tag:
              type: string
              x-auditable: true
          type: object
        resolve_link:
          type: string
          x-auditable: true
        resolve_text:
          type: string
          x-auditable: true
        severity:
          enum:
            - Low
            - Moderate
            - Critical
          type: string
          x-auditable: true
        since:
          format: date-time
          type: string
          x-auditable: true
        status:
          description: The current status of the insight.
          enum:
            - active
            - resolved
          example: active
          type: string
          x-auditable: true
        subject:
          $ref: '#/components/schemas/securityCenterSubject'
        timestamp:
          format: date-time
          type: string
          x-auditable: true
        user_classification:
          $ref: '#/components/schemas/securityCenterUserClassification'
      type: object
    securityCenterIssueClass:
      example: always_use_https_not_enabled
      type: string
      x-auditable: true
    securityCenterIssueClasses:
      example:
        - a_record_dangling
        - always_use_https_not_enabled
      items:
        $ref: '#/components/schemas/securityCenterIssueClass'
      type: array
    securityCenterIssueType:
      enum:
        - compliance_violation
        - email_security
        - exposed_infrastructure
        - insecure_configuration
        - weak_authentication
        - configuration_suggestion
      type: string
      x-auditable: true
    securityCenterIssueTypes:
      example:
        - compliance_violation
        - email_security
      items:
        $ref: '#/components/schemas/securityCenterIssueType'
      type: array
    securityCenterMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    securityCenterNewScanRequest:
      description: >-
        Request body for starting an on-demand scan. Specify issue_type or
        issue_class to scope the scan, or provide an empty object to scan all
        issue types.
      type: object
      properties:
        issue_type:
          $ref: '#/components/schemas/securityCenterIssueType'
        issue_class:
          $ref: '#/components/schemas/securityCenterIssueClass'
      required: []
    securityCenterNewScanResponse:
      properties:
        scan_id:
          description: An opaque identifier for the initiated scan.
          example: d5e94e48-504f-4a7f-a8c4-e0dc2e05e5f2
          type: string
          x-auditable: true
      type: object
    securityCenterPage:
      description: Specifies the current page within paginated list of results.
      example: 1
      type: integer
