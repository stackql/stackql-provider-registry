openapi: 3.0.3
info:
  title: secrets_store API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/secrets_store/quota:
    get:
      description: Lists the number of secrets used in the account.
      operationId: secrets-store-quota
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreQuotaResponse'
          description: Usage and quota
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: List store secrets response failure
      security:
        - api_email: []
          api_key: []
      summary: View secret usage
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
        - Secrets Store Read
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - quota
        method: get
  /accounts/{account_id}/secrets_store/stores:
    get:
      description: Lists all the stores in an account
      operationId: secrets-store-list
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Direction to sort objects
          in: query
          name: direction
          schema:
            default: desc
            enum:
              - asc
              - desc
            type: string
        - description: Page number
          in: query
          name: page
          schema:
            minimum: 0
            multipleOf: 1
            type: integer
        - description: Number of objects to return per page
          in: query
          name: per_page
          schema:
            maximum: 100
            minimum: 0
            multipleOf: 1
            type: integer
        - description: Order secrets by values in the given field
          in: query
          name: order
          schema:
            default: created
            enum:
              - name
              - comment
              - created
              - modified
              - status
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreStoresResponseCollection'
          description: List account stores response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: List account stores response failure
      security:
        - api_email: []
          api_key: []
      summary: List account stores
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
        - Secrets Store Read
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.list'
          - '#com.cloudflare.api.account.secrets-store.secret.read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - stores
        method: list
    post:
      description: Creates a store in the account
      operationId: secrets-store-create
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/secretsStoreCreateStoreObject'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreStoreResponse'
          description: store details
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: Create store response failure
      security:
        - api_email: []
          api_key: []
      summary: Create a store
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.read'
          - '#com.cloudflare.api.account.secrets-store.secret.create'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - stores
        method: create
  /accounts/{account_id}/secrets_store/stores/{store_id}:
    delete:
      description: Deletes a single store
      operationId: secrets-store-delete-by-id
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreDeleteResponse'
          description: Store deleted
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: Delete store failure
      security:
        - api_email: []
          api_key: []
      summary: Delete a store
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - stores
        method: delete
    get:
      description: Returns details of a single store
      operationId: secrets-store-get-store-by-id
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreStoreResponse'
          description: store details
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: failure
      security:
        - api_email: []
          api_key: []
      summary: Get a store by ID
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
        - Secrets Store Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /accounts/{account_id}/secrets_store/stores/{store_id}/secrets:
    delete:
      description: Deletes one or more secrets
      operationId: secrets-store-delete-bulk
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreDeleteResponse'
          description: Secrets deletion accepted
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: Delete secrets response failure
      security:
        - api_email: []
          api_key: []
      summary: Delete secrets
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.read'
          - '#com.cloudflare.api.account.secrets-store.secret.delete'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - stores
          - secrets
        method: bulk_delete
    get:
      description: Lists all store secrets
      operationId: secrets-store-secrets-list
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
        - description: Direction to sort objects
          in: query
          name: direction
          schema:
            default: desc
            enum:
              - asc
              - desc
            type: string
        - description: Page number
          in: query
          name: page
          schema:
            minimum: 0
            multipleOf: 1
            type: integer
        - description: Number of objects to return per page
          in: query
          name: per_page
          schema:
            maximum: 100
            minimum: 0
            multipleOf: 1
            type: integer
        - description: >-
            Search secrets using a filter string, filtering across name and
            comment
          in: query
          name: search
          schema:
            type: string
        - description: Order secrets by values in the given field
          in: query
          name: order
          schema:
            default: created
            enum:
              - name
              - comment
              - created
              - modified
              - status
            type: string
        - description: Only secrets with the given scopes will be returned
          explode: false
          in: query
          name: scopes
          schema:
            items:
              $ref: '#/components/schemas/secretsStoreScopes'
            type: array
          style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreSecretsResponseCollection'
          description: List store secrets response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: List store secrets response failure
      security:
        - api_email: []
          api_key: []
      summary: List store secrets
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
        - Secrets Store Read
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.list'
          - '#com.cloudflare.api.account.secrets-store.secret.read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - stores
          - secrets
        method: create
    post:
      description: Creates a secret in the account
      operationId: secrets-store-secret-create
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/secretsStoreCreateSecretObject'
              type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreSecretsResponseCollection'
          description: secret detail
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: List store secrets response failure
      security:
        - api_email: []
          api_key: []
      summary: Create a secret
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.read'
          - '#com.cloudflare.api.account.secrets-store.secret.create'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /accounts/{account_id}/secrets_store/stores/{store_id}/secrets/{secret_id}:
    delete:
      description: Deletes a single secret
      operationId: secrets-store-secret-delete-by-id
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
        - name: secret_id
          in: path
          required: true
          description: The secret ID.
          schema:
            type: string
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreDeleteResponse'
          description: Secret deletion accepted
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: Delete secret failure
      security:
        - api_email: []
          api_key: []
      summary: Delete a secret
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - stores
          - secrets
        method: delete
    get:
      description: Returns details of a single secret
      operationId: secrets-store-get-by-id
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
        - name: secret_id
          in: path
          required: true
          description: The secret ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreSecretResponse'
          description: secret detail
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: failure
      security:
        - api_email: []
          api_key: []
      summary: Get a secret by ID
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
        - Secrets Store Read
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - stores
          - secrets
        method: get
    patch:
      description: Updates a single secret
      operationId: secrets-store-patch-by-id
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
        - name: secret_id
          in: path
          required: true
          description: The secret ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/secretsStorePatchSecretObject'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreSecretResponse'
          description: secret detail
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: failure
      security:
        - api_email: []
          api_key: []
      summary: Patch a secret
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - stores
          - secrets
        method: edit
  /accounts/{account_id}/secrets_store/stores/{store_id}/secrets/{secret_id}/duplicate:
    post:
      description: Duplicates the secret, keeping the value
      operationId: secrets-store-duplicate-by-id
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
        - name: secret_id
          in: path
          required: true
          description: The secret ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/secretsStoreDuplicateSecretObject'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreSecretResponse'
          description: secret detail
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: failure
      security:
        - api_email: []
          api_key: []
      summary: Duplicate Secret
      tags:
        - Secrets Store
      x-api-token-group:
        - Secrets Store Write
      x-cfPermissionsRequired:
        enum:
          - '#com.cloudflare.api.account.secrets-store.secret.read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: secrets_store
        resource_chain:
          - stores
          - secrets
        method: duplicate
  /system/accounts/{account_tag}/stores:
    get:
      description: >-
        Lists all stores in an account that are managed by the calling service.
        Only returns stores where managed_by matches the authenticated service.
      operationId: secrets-store-system-list
      parameters:
        - description: >-
            Account tag identifier (e.g., '12a6ed19f349896cfbd6694ba3de8d31').
            This is the account's external tag identifier, not the numeric
            account ID.
          in: path
          name: account_tag
          schema:
            $ref: '#/components/schemas/secretsStoreAccountTag'
          required: true
        - description: Direction to sort objects
          in: query
          name: direction
          schema:
            default: desc
            enum:
              - asc
              - desc
            type: string
        - description: Page number
          in: query
          name: page
          schema:
            minimum: 0
            multipleOf: 1
            type: integer
        - description: Number of objects to return per page
          in: query
          name: per_page
          schema:
            maximum: 100
            minimum: 0
            multipleOf: 1
            type: integer
        - description: Order secrets by values in the given field
          in: query
          name: order
          schema:
            default: created
            enum:
              - name
              - comment
              - created
              - modified
              - status
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreStoresResponseCollection'
          description: List account stores response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: List account stores response failure
      security:
        - api_email: []
          api_key: []
      summary: List account stores (System)
      tags:
        - Secrets Store
      x-stability: internal
    post:
      description: >-
        Creates a store in the account on behalf of the calling service. The
        store will be marked as managed by the authenticated service. Requires
        account_id in the request body.
      operationId: secrets-store-system-create
      parameters:
        - description: >-
            Account tag identifier (e.g., '12a6ed19f349896cfbd6694ba3de8d31').
            This is the account's external tag identifier, not the numeric
            account ID.
          in: path
          name: account_tag
          schema:
            $ref: '#/components/schemas/secretsStoreAccountTag'
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/secretsStoreCreateStoreObjectSystem'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreStoreResponse'
          description: Store details
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: Create store failure
      security:
        - api_email: []
          api_key: []
      summary: Create a store (System)
      tags:
        - Secrets Store
      x-stability: internal
  /system/accounts/{account_tag}/stores/{store_id}:
    delete:
      description: >-
        Deletes a store managed by the calling service. Returns 404 if the store
        doesn't exist or is not managed by the authenticated service.
      operationId: secrets-store-system-delete-by-id
      parameters:
        - description: >-
            Account tag identifier (e.g., '12a6ed19f349896cfbd6694ba3de8d31').
            This is the account's external tag identifier, not the numeric
            account ID.
          in: path
          name: account_tag
          schema:
            $ref: '#/components/schemas/secretsStoreAccountTag'
          required: true
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreDeleteResponse'
          description: Store deleted
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: Delete store failure
      security:
        - api_email: []
          api_key: []
      summary: Delete a store (System)
      tags:
        - Secrets Store
      x-stability: internal
    get:
      description: >-
        Returns details of a single store managed by the calling service.
        Returns 404 if the store doesn't exist or is not managed by the
        authenticated service.
      operationId: secrets-store-system-get-store-by-id
      parameters:
        - description: >-
            Account tag identifier (e.g., '12a6ed19f349896cfbd6694ba3de8d31').
            This is the account's external tag identifier, not the numeric
            account ID.
          in: path
          name: account_tag
          schema:
            $ref: '#/components/schemas/secretsStoreAccountTag'
          required: true
        - name: store_id
          in: path
          required: true
          description: The secrets store ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreStoreResponse'
          description: Store details
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secretsStoreApiResponseCommonFailure'
          description: Get store failure
      security:
        - api_email: []
          api_key: []
      summary: Get a store by ID (System)
      tags:
        - Secrets Store
      x-stability: internal
  /system/accounts/{account_tag}/stores/{store_id}/secrets:
    delete:
      description: >-
        Deletes one or more secrets from a store managed by the calling service.
        Returns 404 if the store doesn't exist or is not managed by the
        authenticated service.
