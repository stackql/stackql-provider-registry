                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
