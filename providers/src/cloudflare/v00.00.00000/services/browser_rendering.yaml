openapi: 3.0.3
info:
  title: browser_rendering API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/browser-rendering/content:
    post:
      description: Fetches rendered HTML content from provided URL or HTML. Check available options like `gotoOptions` and `waitFor*` to control page load behaviour.
      operationId: brapi-post_Content
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Cache TTL default is 5s. Set to 0 to disable.
        in: query
        name: cacheTTL
        schema:
          default: 5
          description: Cache TTL default is 5s. Set to 0 to disable.
          maximum: 86400
          minimum: 0
          type: number
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                actionTimeout:
                  description: The maximum duration allowed for the browser action to complete after the page has loaded (such as taking screenshots, extracting content, or generating PDFs). If this time limit is exceeded, the action stops and returns a timeout error.
                  maximum: 120000
                  type: number
                addScriptTag:
                  description: Adds a `<script>` tag into the page with the desired URL or content.
                  items:
                    properties:
                      content:
                        type: string
                      id:
                        type: string
                      type:
                        type: string
                      url:
                        type: string
                    type: object
                  type: array
                addStyleTag:
                  description: Adds a `<link rel="stylesheet">` tag into the page with the desired URL or a `<style type="text/css">` tag with the content.
                  items:
                    properties:
                      content:
                        type: string
                      url:
                        type: string
                    type: object
                  type: array
                allowRequestPattern:
                  description: Only allow requests that match the provided regex patterns, eg. '/^.*\.(css)'.
                  items:
                    type: string
                  type: array
                allowResourceTypes:
                  description: Only allow requests that match the provided resource types, eg. 'image' or 'script'.
                  items:
                    type: string
                    enum:
                    - document
                  type: array
                authenticate:
                  description: Provide credentials for HTTP authentication.
                  properties:
                    password:
                      minLength: 1
                      type: string
                      x-sensitive: true
                    username:
                      minLength: 1
                      type: string
                  required:
                  - username
                  - password
                  type: object
                bestAttempt:
                  description: Attempt to proceed when 'awaited' events fail or timeout.
                  type: boolean
                cookies:
                  description: Check [options](https://pptr.dev/api/puppeteer.page.setcookie).
                  items:
                    properties:
                      domain:
                        type: string
                      expires:
                        type: number
                      httpOnly:
                        type: boolean
                      name:
                        description: Cookie name.
                        type: string
                      partitionKey:
                        type: string
                      path:
                        type: string
                      priority:
                        type: string
                        enum:
                        - Low
                      sameParty:
                        type: boolean
                      sameSite:
                        type: string
                        enum:
                        - Strict
                      secure:
                        type: boolean
                      sourcePort:
                        type: number
                      sourceScheme:
                        type: string
                        enum:
                        - Unset
                      url:
                        type: string
                      value:
                        type: string
                    required:
                    - name
                    - value
                    type: object
                  type: array
                emulateMediaType:
                  type: string
                gotoOptions:
                  default: {}
                  description: Check [options](https://pptr.dev/api/puppeteer.gotooptions).
                  properties:
                    referer:
                      type: string
                    referrerPolicy:
                      type: string
                    timeout:
                      default: 30000
                      maximum: 60000
                      type: number
                    waitUntil:
                      default: domcontentloaded
                      type: string
                      enum:
                      - load
                      items:
                        type: string
                        enum:
                        - load
                  type: object
                rejectRequestPattern:
                  description: Block undesired requests that match the provided regex patterns, eg. '/^.*\.(css)'.
                  items:
                    type: string
                  type: array
                rejectResourceTypes:
                  description: Block undesired requests that match the provided resource types, eg. 'image' or 'script'.
                  items:
                    type: string
                    enum:
                    - document
                  type: array
                setExtraHTTPHeaders:
                  type: object
                setJavaScriptEnabled:
                  type: boolean
                url:
                  description: URL to navigate to, eg. `https://example.com`.
                  format: uri
                  type: string
                userAgent:
                  default: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36
                  type: string
                viewport:
                  default:
                    height: 1080
                    width: 1920
                  description: Check [options](https://pptr.dev/api/puppeteer.page.setviewport).
                  properties:
                    deviceScaleFactor:
                      type: number
                    hasTouch:
                      type: boolean
                    height:
                      type: number
                    isLandscape:
                      type: boolean
                    isMobile:
                      type: boolean
                    width:
                      type: number
                  required:
                  - width
                  - height
                  type: object
                waitForSelector:
                  description: Wait for the selector to appear in page. Check [options](https://pptr.dev/api/puppeteer.page.waitforselector).
                  properties:
                    hidden:
                      enum:
                      - true
                      type: boolean
                    selector:
                      type: string
                    timeout:
                      maximum: 120000
                      type: number
                    visible:
                      enum:
                      - true
                      type: boolean
                  required:
                  - selector
                  type: object
                waitForTimeout:
                  description: Waits for a specified timeout before continuing.
                  maximum: 120000
                  type: number
                html:
                  description: 'Set the content of the page, eg: `<h1>Hello World!!</h1>`. Either `html` or `url` must be set.'
                  minLength: 1
                  type: string
              required: []
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  meta:
                    properties:
                      status:
                        type: number
                      title:
                        type: string
                    type: object
                  result:
                    description: HTML content.
                    type: string
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                - meta
                type: object
          description: Returns the page's content.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                type: object
          description: The request contains errors or didn't properly encode content.
        '422':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                type: object
          description: Request failed due to site-related issues such as timeouts, SSL errors, or inaccessible content.
        '429':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                type: object
          description: Request failed due to rate limiting. The Retry-After header indicates when the client should retry the request.
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying the request.
              schema:
                description: Number of seconds to wait before retrying the request.
                type: number
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                type: object
          description: Internal server error.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get HTML content.
      tags:
      - brapi
      x-api-token-group:
      - Browser Rendering Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.brapi.read
        type: string
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: browser_rendering
        resource_chain:
        - content
        method: create
  /accounts/{account_id}/browser-rendering/crawl:
    post:
      description: Starts a crawl job for the provided URL and its children. Check available options like `gotoOptions` and `waitFor*` to control page load behaviour.
      operationId: brapi-post_Crawl
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Cache TTL default is 5s. Set to 0 to disable.
        in: query
        name: cacheTTL
        schema:
          default: 5
          description: Cache TTL default is 5s. Set to 0 to disable.
          maximum: 86400
          minimum: 0
          type: number
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                actionTimeout:
                  description: The maximum duration allowed for the browser action to complete after the page has loaded (such as taking screenshots, extracting content, or generating PDFs). If this time limit is exceeded, the action stops and returns a timeout error.
                  maximum: 120000
                  type: number
                addScriptTag:
                  description: Adds a `<script>` tag into the page with the desired URL or content.
                  items:
                    properties:
                      content:
                        type: string
                      id:
                        type: string
                      type:
                        type: string
                      url:
                        type: string
                    type: object
                  type: array
                addStyleTag:
                  description: Adds a `<link rel="stylesheet">` tag into the page with the desired URL or a `<style type="text/css">` tag with the content.
                  items:
                    properties:
                      content:
                        type: string
                      url:
                        type: string
                    type: object
                  type: array
                allowRequestPattern:
                  description: Only allow requests that match the provided regex patterns, eg. '/^.*\.(css)'.
                  items:
                    type: string
                  type: array
                allowResourceTypes:
                  description: Only allow requests that match the provided resource types, eg. 'image' or 'script'.
                  items:
                    type: string
                    enum:
                    - document
                  type: array
                authenticate:
                  description: Provide credentials for HTTP authentication.
                  properties:
                    password:
                      minLength: 1
                      type: string
                      x-sensitive: true
                    username:
                      minLength: 1
                      type: string
                  required:
                  - username
                  - password
                  type: object
                bestAttempt:
                  description: Attempt to proceed when 'awaited' events fail or timeout.
                  type: boolean
                cookies:
                  description: Check [options](https://pptr.dev/api/puppeteer.page.setcookie).
                  items:
                    properties:
                      domain:
                        type: string
                      expires:
                        type: number
                      httpOnly:
                        type: boolean
                      name:
                        description: Cookie name.
                        type: string
                      partitionKey:
                        type: string
                      path:
                        type: string
                      priority:
                        type: string
                        enum:
                        - Low
                      sameParty:
                        type: boolean
                      sameSite:
                        type: string
                        enum:
                        - Strict
                      secure:
                        type: boolean
                      sourcePort:
                        type: number
                      sourceScheme:
                        type: string
                        enum:
                        - Unset
                      url:
                        type: string
                      value:
                        type: string
                    required:
                    - name
                    - value
                    type: object
                  type: array
                crawlPurposes:
                  default:
                  - search
                  - ai-input
                  - ai-train
                  description: 'List of crawl purposes to respect Content-Signal directives in robots.txt. Allowed values: ''search'', ''ai-input'', ''ai-train''. Learn more: https://contentsignals.org/. Default: [''search'', ''ai-input'', ''ai-train''].'
                  items:
                    type: string
                    enum:
                    - search
                  maxItems: 3
                  minItems: 1
                  type: array
                depth:
                  default: 100000
                  description: Maximum number of levels deep the crawler will traverse from the starting URL.
                  maximum: 100000
                  minimum: 1
                  type: number
                emulateMediaType:
                  type: string
                formats:
                  default:
                  - html
                  description: Formats to return. Default is `html`.
                  items:
                    type: string
                    enum:
                    - html
                  type: array
                gotoOptions:
                  default: {}
                  description: Check [options](https://pptr.dev/api/puppeteer.gotooptions).
                  properties:
                    referer:
                      type: string
                    referrerPolicy:
                      type: string
                    timeout:
                      default: 30000
                      maximum: 60000
                      type: number
                    waitUntil:
                      default: domcontentloaded
                      type: string
                      enum:
                      - load
                      items:
                        type: string
                        enum:
                        - load
                  type: object
                jsonOptions:
                  description: Options for JSON extraction.
                  properties:
                    custom_ai:
                      description: Optional list of custom AI models to use for the request. The models will be tried in the order provided, and in case a model returns an error, the next one will be used as fallback.
                      items:
                        properties:
                          authorization:
                            description: 'Authorization token for the AI model: `Bearer <token>`. Not needed for workers-ai models.'
                            type: string
                          model:
                            description: AI model to use for the request. Must be formed as `<provider>/<model_name>`, e.g. `workers-ai/@cf/meta/llama-3.3-70b-instruct-fp8-fast`.
                            type: string
                        required:
                        - model
                        type: object
                      type: array
                    prompt:
                      type: string
                    response_format:
                      properties:
                        json_schema:
                          description: 'Schema for the response format. More information here: https://developers.cloudflare.com/workers-ai/json-mode/'
                          nullable: true
                          type: object
                        type:
                          type: string
                      required:
                      - type
                      type: object
                  type: object
                limit:
                  default: 10
                  description: Maximum number of URLs to crawl.
                  maximum: 100000
                  minimum: 1
                  type: number
                maxAge:
                  default: 86400
                  description: Maximum age of a resource that can be returned from cache in seconds. Default is 1 day.
                  maximum: 604800
                  minimum: 0
                  type: number
                modifiedSince:
                  description: 'Unix timestamp (seconds since epoch) indicating to only crawl pages that were modified since this time. For sitemap URLs with a lastmod field, this is compared directly. For other URLs, the crawler will use If-Modified-Since header when fetching. URLs without modification information (no lastmod in sitemap and no Last-Modified header support) will be crawled. Note: This works in conjunction with maxAge - both filters must pass for a cached resource to be used. Must be within the last year and not in the future.'
                  exclusiveMinimum: true
                  minimum: 0
                  type: integer
                options:
                  default:
                    includeExternalLinks: false
                    includeSubdomains: false
                  description: Additional options for the crawler.
                  properties:
                    excludePatterns:
                      description: 'Exclude links matching the provided wildcard patterns in the crawl job. Example: ''https://example.com/privacy/**''.'
                      items:
                        maxLength: 500
                        minLength: 1
                        type: string
                      maxItems: 100
                      type: array
                    includeExternalLinks:
                      default: false
                      description: Include external links in the crawl job. If set to true, includeSubdomains is ignored.
                      type: boolean
                    includePatterns:
                      description: 'Include only links matching the provided wildcard patterns in the crawl job. Include patterns are evaluated before exclude patterns. URLs that match any of the specified include patterns will be included in the crawl job. Example: ''https://example.com/blog/**''.'
                      items:
                        maxLength: 500
                        minLength: 1
                        type: string
                      maxItems: 100
                      type: array
                    includeSubdomains:
                      default: false
                      description: Include links to subdomains in the crawl job. This option is ignored if includeExternalLinks is true.
                      type: boolean
                  type: object
                rejectRequestPattern:
                  description: Block undesired requests that match the provided regex patterns, eg. '/^.*\.(css)'.
                  items:
                    type: string
                  type: array
                rejectResourceTypes:
                  description: Block undesired requests that match the provided resource types, eg. 'image' or 'script'.
                  items:
                    type: string
                    enum:
                    - document
                  type: array
                render:
                  default: true
                  description: Whether to render the page or fetch static content. True by default.
                  enum:
                  - true
                  type: boolean
                setExtraHTTPHeaders:
                  type: object
                setJavaScriptEnabled:
                  type: boolean
                source:
                  default: all
                  description: Source of links to crawl. 'sitemaps' - only crawl URLs from sitemaps, 'links' - only crawl URLs scraped from pages, 'all' - crawl both sitemap and scraped links (default).
                  type: string
                  enum:
                  - sitemaps
                url:
                  description: URL to navigate to, eg. `https://example.com`.
                  format: uri
                  type: string
                viewport:
                  default:
                    height: 1080
                    width: 1920
                  description: Check [options](https://pptr.dev/api/puppeteer.page.setviewport).
                  properties:
                    deviceScaleFactor:
                      type: number
                    hasTouch:
                      type: boolean
                    height:
                      type: number
                    isLandscape:
                      type: boolean
                    isMobile:
                      type: boolean
                    width:
                      type: number
                  required:
                  - width
                  - height
                  type: object
                waitForSelector:
                  description: Wait for the selector to appear in page. Check [options](https://pptr.dev/api/puppeteer.page.waitforselector).
                  properties:
                    hidden:
                      enum:
                      - true
                      type: boolean
                    selector:
                      type: string
                    timeout:
                      maximum: 120000
                      type: number
                    visible:
                      enum:
                      - true
                      type: boolean
                  required:
                  - selector
                  type: object
                waitForTimeout:
                  description: Waits for a specified timeout before continuing.
                  maximum: 120000
                  type: number
              required:
              - url
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  result:
                    description: Crawl job ID.
                    type: string
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                - result
                type: object
          description: Returns the ID for the started crawl job.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                type: object
          description: The request contains errors or didn't properly encode content.
        '429':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                type: object
          description: Request failed due to rate limiting. The Retry-After header indicates when the client should retry the request.
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying the request.
              schema:
                description: Number of seconds to wait before retrying the request.
                type: number
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                type: object
          description: Internal server error.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Crawl websites.
      tags:
      - brapi
      x-api-token-group:
      - Browser Rendering Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.brapi.read
        type: string
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: browser_rendering
        resource_chain:
        - crawl
        method: create
  /accounts/{account_id}/browser-rendering/crawl/{job_id}:
    delete:
      description: Cancels an ongoing crawl job by setting its status to cancelled and stopping all queued URLs.
      operationId: brapi-delete_CancelCrawl
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: job_id
        in: path
        required: true
        description: The job ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  result:
                    properties:
                      job_id:
                        description: The ID of the cancelled job.
                        type: string
                      message:
                        description: Cancellation confirmation message.
                        type: string
                    required:
                    - message
                    - job_id
                    type: object
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                - result
                type: object
          description: Crawl job cancelled successfully.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                type: object
          description: Job is already in final status and cannot be cancelled.
        '404':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
                - success
                type: object
          description: Crawl job not found.
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          description: Error code.
                          type: number
                        message:
                          description: Error message.
                          type: string
                      required:
                      - message
                      - code
                      type: object
                    type: array
                  success:
                    description: Response status.
                    type: boolean
                required:
