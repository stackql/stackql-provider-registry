openapi: 3.0.3
info:
  title: resource_tagging API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/tags:
    delete:
      description: Removes all tags from a specific account-level resource.
      operationId: tags-delete
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: >-
            ETag value for optimistic concurrency control. When provided, the
            server will verify the current resource ETag matches before applying
            the write. Returns 412 Precondition Failed if the resource has been
            modified since the ETag was obtained. Omit this header for
            unconditional writes.
          in: header
          name: If-Match
          schema:
            type: string
      responses:
        '204':
          description: Tags successfully deleted (no content).
        '412':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: >-
            Precondition failed. The resource has been modified since the
            provided ETag was obtained.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Delete tags response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Delete tags response failure.
      security:
        - api_email: []
          api_key: []
      summary: Delete tags from an account-level resource
      tags:
        - Resource Tagging
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_tagging
        resource_chain:
          - account_tags
        method: delete
    get:
      description: Retrieves tags for a specific account-level resource.
      operationId: tags-get
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: The ID of the resource to retrieve tags for.
          in: query
          name: resource_id
          schema:
            $ref: '#/components/schemas/resourceTaggingResourceId'
        - description: The type of the resource.
          in: query
          name: resource_type
          schema:
            $ref: '#/components/schemas/resourceTaggingAccountResourceType'
        - description: Worker identifier. Required for worker_version resources.
          in: query
          name: worker_id
          schema:
            $ref: '#/components/schemas/resourceTaggingWorkerId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/resourceTaggingTaggedResourceResponseSingle
          description: Get tags for single resource response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Get tags for single resource response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Get tags for single resource response failure.
      security:
        - api_email: []
          api_key: []
      summary: Get tags for an account-level resource
      tags:
        - Resource Tagging
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_tagging
        resource_chain:
          - account_tags
        method: get
    put:
      description: Creates or updates tags for a specific account-level resource.
      operationId: tags-set
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: >-
            ETag value for optimistic concurrency control. When provided, the
            server will verify the current resource ETag matches before applying
            the write. Returns 412 Precondition Failed if the resource has been
            modified since the ETag was obtained. Omit this header for
            unconditional writes.
          in: header
          name: If-Match
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/resourceTaggingSetTagsRequestAccountLevel'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/resourceTaggingTaggedResourceResponseSingle
          description: Set tags response.
        '412':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: >-
            Precondition failed. The resource has been modified since the
            provided ETag was obtained.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Set tags response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Set tags response failure.
      security:
        - api_email: []
          api_key: []
      summary: Set tags for an account-level resource
      tags:
        - Resource Tagging
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_tagging
        resource_chain:
          - account_tags
        method: update
  /accounts/{account_id}/tags/keys:
    get:
      description: Lists all distinct tag keys used across resources in an account.
      operationId: tags-list-keys
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Cursor for pagination.
          in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingTagKeysResponseCollection'
          description: List tag keys response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: List tag keys response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: List tag keys response failure.
      security:
        - api_email: []
          api_key: []
      summary: List tag keys
      tags:
        - Resource Tagging
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_tagging
        resource_chain:
          - keys
        method: list
  /accounts/{account_id}/tags/resources:
    get:
      description: Lists all tagged resources for an account.
      operationId: tags-list
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: >-
            Filter by resource type. Can be repeated to filter by multiple types
            (OR logic). Example: ?type=zone&type=worker
          explode: true
          in: query
          name: type
          schema:
            items:
              $ref: '#/components/schemas/resourceTaggingResourceType'
            type: array
          style: form
        - description: >-
            Filter resources by tag criteria. This parameter can be repeated
            multiple times, with AND logic between parameters. Supported syntax:
            - **Key-only**: `tag=<key>` - Resource must have the tag key (e.g.,
            `tag=production`) - **Key-value**: `tag=<key>=<value>` - Resource
            must have the tag with specific value (e.g., `tag=env=prod`) -
            **Multiple values (OR)**: `tag=<key>=<v1>,<v2>` - Resource must have
            tag with any of the values (e.g., `tag=env=prod,staging`) - **Negate
            key-only**: `tag=!<key>` - Resource must not have the tag key (e.g.,
            `tag=!archived`) - **Negate key-value**: `tag=<key>!=<value>` -
            Resource must not have the tag with specific value (e.g.,
            `tag=region!=us-west-1`) Multiple tag parameters are combined with
            AND logic.
          explode: true
          in: query
          name: tag
          schema:
            items:
              type: string
            type: array
        - description: Cursor for pagination.
          in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/resourceTaggingTaggedResourceResponseCollection
          description: List tagged resources response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: List tagged resources response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: List tagged resources response failure.
      security:
        - api_email: []
          api_key: []
      summary: List tagged resources
      tags:
        - Resource Tagging
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_tagging
        resource_chain: []
        method: list
  /accounts/{account_id}/tags/values/{tag_key}:
    get:
      description: >-
        Lists all distinct values for a given tag key, optionally filtered by
        resource type.
      operationId: tags-list-values
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: The tag key to retrieve values for.
          in: path
          name: tag_key
          schema:
            type: string
          required: true
        - description: Filter by resource type.
          in: query
          name: type
          schema:
            $ref: '#/components/schemas/resourceTaggingResourceType'
        - description: Cursor for pagination.
          in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/resourceTaggingTagValuesResponseCollection
          description: List tag values response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: List tag values response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: List tag values response failure.
      security:
        - api_email: []
          api_key: []
      summary: List tag values
      tags:
        - Resource Tagging
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_tagging
        resource_chain:
          - values
        method: list
  /zones/{zone_id}/tags:
    delete:
      description: Removes all tags from a specific zone-level resource.
      operationId: tags-zone-delete
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: >-
            ETag value for optimistic concurrency control. When provided, the
            server will verify the current resource ETag matches before applying
            the write. Returns 412 Precondition Failed if the resource has been
            modified since the ETag was obtained. Omit this header for
            unconditional writes.
          in: header
          name: If-Match
          schema:
            type: string
      responses:
        '204':
          description: Tags successfully deleted (no content).
        '412':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: >-
            Precondition failed. The resource has been modified since the
            provided ETag was obtained.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Delete tags response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Delete tags response failure.
      security:
        - api_email: []
          api_key: []
      summary: Delete tags from a zone-level resource
      tags:
        - Resource Tagging
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_tagging
        resource_chain:
          - zone_tags
        method: delete
    get:
      description: Retrieves tags for a specific zone-level resource.
      operationId: tags-zone-get
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: The ID of the resource to retrieve tags for.
          in: query
          name: resource_id
          schema:
            $ref: '#/components/schemas/resourceTaggingResourceId'
        - description: The type of the resource.
          in: query
          name: resource_type
          schema:
            $ref: '#/components/schemas/resourceTaggingZoneResourceType'
        - description: >-
            Access application ID identifier. Required for
            access_application_policy resources.
          in: query
          name: access_application_id
          schema:
            $ref: '#/components/schemas/resourceTaggingAccessApplicationId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/resourceTaggingTaggedResourceResponseSingle
          description: Get tags for single resource response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Get tags for single resource response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Get tags for single resource response failure.
      security:
        - api_email: []
          api_key: []
      summary: Get tags for a zone-level resource
      tags:
        - Resource Tagging
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_tagging
        resource_chain:
          - zone_tags
        method: get
    put:
      description: >-
        Creates or updates tags for a specific zone-level resource. Replaces all
        existing tags for the resource.
      operationId: tags-zone-set
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: >-
            ETag value for optimistic concurrency control. When provided, the
            server will verify the current resource ETag matches before applying
            the write. Returns 412 Precondition Failed if the resource has been
            modified since the ETag was obtained. Omit this header for
            unconditional writes.
          in: header
          name: If-Match
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/resourceTaggingSetTagsRequestZoneLevel'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/resourceTaggingTaggedResourceResponseSingle
          description: Set tags response.
        '412':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: >-
            Precondition failed. The resource has been modified since the
            provided ETag was obtained.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Set tags response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceTaggingApiResponseCommonFailure'
          description: Set tags response failure.
      security:
        - api_email: []
          api_key: []
      summary: Set tags for a zone-level resource
      tags:
        - Resource Tagging
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_tagging
        resource_chain:
          - zone_tags
        method: update
components:
  schemas:
    resourceTaggingAccessApplicationId:
      description: >-
        Access application ID is required only for access_application_policy
        resources
      example: f174e90a-fafe-4643-bbbc-4a0ed4fc8415
      format: uuid
      type: string
    resourceTaggingAccountResourceType:
      description: Identifies the type of account-level resource.
      enum:
        - access_application
        - access_group
        - account
        - ai_gateway
        - alerting_policy
        - alerting_webhook
        - cloudflared_tunnel
        - d1_database
        - durable_object_namespace
        - gateway_list
        - gateway_rule
        - image
        - kv_namespace
        - queue
        - r2_bucket
        - resource_share
        - stream_live_input
        - stream_video
        - worker
        - worker_version
      example: worker
      type: string
      x-auditable: true
    resourceTaggingApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/resourceTaggingMessages'
        messages:
          example: []
          $ref: '#/components/schemas/resourceTaggingMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    resourceTaggingCursorResultInfo:
      properties:
        count:
          description: Indicates the number of results returned in the current page.
          example: 20
          type: integer
        cursor:
          description: >-
            Provides a cursor for the next page of results. Include this value
            in the next request to continue pagination.
          example: eyJhY2NvdW50X2lkIjoxMjM0NTY3ODkwfQ
          nullable: true
          type: string
      type: object
    resourceTaggingEtag:
      description: >-
        ETag identifier for optimistic concurrency control. Formatted as
        "v1:<hash>" where the hash is the base64url-encoded SHA-256 (truncated
        to 128 bits) of the tags map canonicalized using RFC 8785 (JSON
        Canonicalization Scheme). Clients should treat ETags as opaque strings
        and pass them back via the If-Match header on write operations.
      example: v1:RBNvo1WzZ4oRRq0W9-hkng
      readOnly: true
      type: string
    resourceTaggingIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    resourceTaggingMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    resourceTaggingResourceId:
      description: Identifies the unique resource.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      type: string
      x-auditable: true
    resourceTaggingResourceName:
      description: Human-readable name of the resource.
      example: my-worker-script
      type: string
    resourceTaggingResourceType:
      description: Identifies the type of resource.
      enum:
        - access_application
        - access_application_policy
        - access_group
        - account
        - ai_gateway
        - alerting_policy
        - alerting_webhook
        - api_gateway_operation
        - cloudflared_tunnel
        - custom_certificate
        - custom_hostname
        - d1_database
        - dns_record
        - durable_object_namespace
        - gateway_list
        - gateway_rule
        - image
        - kv_namespace
        - managed_client_certificate
        - queue
        - r2_bucket
        - resource_share
        - stream_live_input
        - stream_video
        - worker
        - worker_version
        - zone
      example: zone
      type: string
      x-auditable: true
    resourceTaggingSetTagsRequestAccountLevel:
      description: Request body schema for setting tags on account-level resources.
      type: object
      properties:
        resource_id:
          $ref: '#/components/schemas/resourceTaggingResourceId'
        resource_type:
          description: >-
            Enum for base account-level resource types (those with no extra
            required fields).
          enum:
            - access_application
            - access_group
            - account
            - ai_gateway
            - alerting_policy
            - alerting_webhook
            - cloudflared_tunnel
            - d1_database
            - durable_object_namespace
            - gateway_list
            - gateway_rule
            - image
            - kv_namespace
            - queue
            - r2_bucket
            - resource_share
            - stream_live_input
            - stream_video
            - worker
            - worker_version
          example: worker
          type: string
          x-auditable: true
        worker_id:
          $ref: '#/components/schemas/resourceTaggingWorkerId'
        tags:
          $ref: '#/components/schemas/resourceTaggingTags'
      required:
        - resource_id
        - resource_type
    resourceTaggingSetTagsRequestZoneLevel:
      description: Request body schema for setting tags on zone-level resources.
      type: object
      properties:
        resource_id:
          $ref: '#/components/schemas/resourceTaggingResourceId'
        resource_type:
          $ref: '#/components/schemas/resourceTaggingZoneResourceTypeBaseEnum'
        tags:
          $ref: '#/components/schemas/resourceTaggingTags'
        access_application_id:
          $ref: '#/components/schemas/resourceTaggingAccessApplicationId'
      required:
        - resource_id
        - resource_type
    resourceTaggingTagKeysResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/resourceTaggingMessages'
        messages:
          $ref: '#/components/schemas/resourceTaggingMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          description: Contains an array of distinct tag keys.
          example:
            - environment
            - team
            - region
          items:
            type: string
          type: array
        result_info:
          $ref: '#/components/schemas/resourceTaggingCursorResultInfo'
      required:
        - success
        - errors
        - messages
      type: object
    resourceTaggingTagValuesResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/resourceTaggingMessages'
        messages:
          $ref: '#/components/schemas/resourceTaggingMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          example:
            - production
            - staging
          items:
            type: string
          type: array
        result_info:
          $ref: '#/components/schemas/resourceTaggingCursorResultInfo'
      required:
        - success
        - errors
        - messages
      type: object
    resourceTaggingTaggedResourceObject:
      type: object
      description: Response for access_application resources
      properties:
        type:
          enum:
            - access_application
          type: string
        etag:
          $ref: '#/components/schemas/resourceTaggingEtag'
        id:
          $ref: '#/components/schemas/resourceTaggingResourceId'
        name:
          $ref: '#/components/schemas/resourceTaggingResourceName'
        tags:
          $ref: '#/components/schemas/resourceTaggingTags'
        access_application_id:
          $ref: '#/components/schemas/resourceTaggingAccessApplicationId'
        zone_id:
          $ref: '#/components/schemas/resourceTaggingZoneId'
        worker_id:
          $ref: '#/components/schemas/resourceTaggingWorkerId'
      required:
        - etag
        - id
        - name
        - tags
        - type
    resourceTaggingTaggedResourceResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/resourceTaggingMessages'
