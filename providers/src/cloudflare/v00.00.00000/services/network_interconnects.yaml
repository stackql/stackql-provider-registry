openapi: 3.0.3
info:
  title: network_interconnects API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/cni/cnis:
    get:
      operationId: list_cnis
      parameters:
        - description: If specified, only show CNIs associated with the specified slot
          in: query
          name: slot
          schema:
            nullable: true
            type: string
        - description: If specified, only show cnis associated with the specified tunnel id
          in: query
          name: tunnel_id
          schema:
            nullable: true
            type: string
        - in: query
          name: cursor
          schema:
            format: int32
            nullable: true
            type: integer
        - in: query
          name: limit
          schema:
            minimum: 0
            nullable: true
            type: integer
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscCniList'
          description: List of matching CNI objects
        '400':
          description: Bad request
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List existing CNI objects
      tags:
        - CNIs
      x-api-token-group:
        - Magic WAN Write
        - Magic WAN Read
        - Magic Transit Read
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - cnis
        method: list
    post:
      operationId: create_cni
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/nscCniCreate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscCni'
          description: CNI was successfully created
        '400':
          description: Bad request
        '409':
          description: Name Conflict
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create a new CNI object
      tags:
        - CNIs
      x-api-token-group:
        - Magic WAN Write
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - cnis
        method: create
  /accounts/{account_id}/cni/cnis/{cni}:
    delete:
      operationId: delete_cni
      parameters:
        - description: CNI ID to retrieve information about
          in: path
          name: cni
          schema:
            format: uuid
            type: string
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          description: CNI has been successfully deleted
        '400':
          description: Bad request
        '404':
          description: CNI not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete a specified CNI object
      tags:
        - CNIs
      x-api-token-group:
        - Magic WAN Write
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - cnis
        method: delete
    get:
      operationId: get_cni
      parameters:
        - description: CNI ID to retrieve information about
          in: path
          name: cni
          schema:
            format: uuid
            type: string
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscCni'
          description: CNI's associated data
        '400':
          description: Bad request
        '404':
          description: CNI not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get information about a CNI object
      tags:
        - CNIs
      x-api-token-group:
        - Magic WAN Write
        - Magic WAN Read
        - Magic Transit Read
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - cnis
        method: get
    put:
      operationId: update_cni
      parameters:
        - description: CNI ID to retrieve information about
          in: path
          name: cni
          schema:
            format: uuid
            type: string
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/nscCni'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscCni'
          description: CNI has been successfully modified
        '400':
          description: Bad request
        '404':
          description: CNI not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Modify stored information about a CNI object
      tags:
        - CNIs
      x-api-token-group:
        - Magic WAN Write
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - cnis
        method: update
  /accounts/{account_id}/cni/interconnects:
    get:
      operationId: list_interconnects
      parameters:
        - description: If specified, only show interconnects located at the given site
          in: query
          name: site
          schema:
            nullable: true
            type: string
        - description: If specified, only show interconnects of the given type
          in: query
          name: type
          schema:
            nullable: true
            type: string
        - in: query
          name: cursor
          schema:
            format: int32
            nullable: true
            type: integer
        - in: query
          name: limit
          schema:
            minimum: 0
            nullable: true
            type: integer
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscInterconnectList'
          description: List of matching interconnect objects
        '400':
          description: Bad request
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List existing interconnects
      tags:
        - Interconnects
      x-api-token-group:
        - Magic WAN Write
        - Magic WAN Read
        - Magic Transit Read
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - interconnects
        method: list
    post:
      operationId: create_interconnect
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/nscInterconnectCreate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscInterconnect'
          description: Information about the new interconnect
        '400':
          description: Bad request
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create a new interconnect
      tags:
        - Interconnects
      x-api-token-group:
        - Magic WAN Write
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - interconnects
        method: create
  /accounts/{account_id}/cni/interconnects/{icon}:
    delete:
      operationId: delete_interconnect
      parameters:
        - description: Interconnect name to retrieve information about
          in: path
          name: icon
          schema:
            type: string
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          description: Successfully deleted interconnect
        '400':
          description: Bad request
        '404':
          description: Interconnect not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete an interconnect object
      tags:
        - Interconnects
      x-api-token-group:
        - Magic WAN Write
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - interconnects
        method: delete
    get:
      operationId: get_interconnect
      parameters:
        - description: Interconnect name to retrieve information about
          in: path
          name: icon
          schema:
            type: string
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscInterconnect'
          description: Information about the specified interconnect
        '400':
          description: Bad request
        '404':
          description: Interconnect not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get information about an interconnect object
      tags:
        - Interconnects
      x-api-token-group:
        - Magic WAN Write
        - Magic WAN Read
        - Magic Transit Read
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - interconnects
        method: get
  /accounts/{account_id}/cni/interconnects/{icon}/loa:
    get:
      operationId: get_interconnect_loa
      parameters:
        - description: Interconnect name to retrieve information about
          in: path
          name: icon
          schema:
            type: string
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          description: Generated LOA in PDF format
        '400':
          description: Bad request
        '404':
          description: Interconnect not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Generate the Letter of Authorization (LOA) for a given interconnect
      tags:
        - Interconnects
      x-api-token-group:
        - Magic WAN Write
        - Magic WAN Read
        - Magic Transit Read
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - interconnects
        method: loa
  /accounts/{account_id}/cni/interconnects/{icon}/status:
    get:
      operationId: get_interconnect_status
      parameters:
        - description: Interconnect name to retrieve information about
          in: path
          name: icon
          schema:
            type: string
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscStatusInfo'
          description: Current interconnect status
        '400':
          description: Bad request
        '404':
          description: Interconnect not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get the current status of an interconnect object
      tags:
        - Interconnects
      x-api-token-group:
        - Magic WAN Write
        - Magic WAN Read
        - Magic Transit Read
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - interconnects
        method: status
  /accounts/{account_id}/cni/settings:
    get:
      operationId: get_settings
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscSettings'
          description: The active account settings values
        '400':
          description: Bad request
        '404':
          description: Account not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get the current settings for the active account
      tags:
        - Settings
      x-api-token-group:
        - Magic WAN Write
        - Magic WAN Read
        - Magic Transit Read
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - settings
        method: get
    put:
      operationId: update_settings
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/nscSettingsRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscSettings'
          description: The active account settings values
        '400':
          description: Bad request
        '404':
          description: Account not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update the current settings for the active account
      tags:
        - Settings
      x-api-token-group:
        - Magic WAN Write
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - settings
        method: update
  /accounts/{account_id}/cni/slots:
    get:
      operationId: list_slots
      parameters:
        - description: >-
            If specified, only show slots with the given text in their address
            field
          in: query
          name: address_contains
          schema:
            nullable: true
            type: string
        - description: If specified, only show slots located at the given site
          in: query
          name: site
          schema:
            nullable: true
            type: string
        - description: If specified, only show slots that support the given speed
          in: query
          name: speed
          schema:
            nullable: true
            type: string
        - description: >-
            If specified, only show slots with a specific occupied/unoccupied
            state
          in: query
          name: occupied
          schema:
            nullable: true
            type: boolean
        - in: query
          name: cursor
          schema:
            format: int32
            nullable: true
            type: integer
        - in: query
          name: limit
          schema:
            minimum: 0
            nullable: true
            type: integer
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscSlotList'
          description: List of matching slots
        '400':
          description: Bad request
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieve a list of all slots matching the specified parameters
      tags:
        - Slots
      x-api-token-group:
        - Magic WAN Write
        - Magic WAN Read
        - Magic Transit Read
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - slots
        method: list
  /accounts/{account_id}/cni/slots/{slot}:
    get:
      operationId: get_slot
      parameters:
        - in: path
          name: slot
          schema:
            format: uuid
            type: string
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nscSlotInfo'
          description: Information about the specified slot
        '400':
          description: Bad request
        '404':
          description: Slot not found
        '500':
          description: Internal server error
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get information about the specified slot
      tags:
        - Slots
      x-api-token-group:
        - Magic WAN Write
        - Magic WAN Read
        - Magic Transit Read
        - Magic Transit Write
      x-stackql-sdk:
        service: network_interconnects
        resource_chain:
          - slots
        method: get
components:
  schemas:
    nscAccountTag:
      description: Customer account tag
      type: string
    nscApiBandwidth:
      description: Bandwidth structure as visible through the customer-facing API.
      enum:
        - 50M
        - 100M
        - 200M
        - 300M
        - 400M
        - 500M
        - 1G
        - 2G
        - 5G
        - 10G
        - 20G
        - 50G
      type: string
    nscBgpControl:
      properties:
        customer_asn:
          description: ASN used on the customer end of the BGP session
          format: int32
          minimum: 0
          type: integer
        extra_prefixes:
          description: >-
            Extra set of static prefixes to advertise to the customer's end of
            the session
          items:
            format: A.B.C.D/N
            type: string
          type: array
        md5_key:
          description: >-
            MD5 key to use for session authentication. Note that *this is not a
            security measure*. MD5 is not a valid security mechanism, and the
            key is not treated as a secret value. This is *only* supported for
            preventing misconfiguration, not for defending against malicious
            attacks. The MD5 key, if set, must be of non-zero length and consist
            only of the following types of character: * ASCII alphanumerics:
            `[a-zA-Z0-9]` * Special characters in the set
            `'!@#$%^&*()+[]{}<>/.,;:_-~`= \|` In other words, MD5 keys may
            contain any printable ASCII character aside from newline (0x0A),
            quotation mark (`"`), vertical tab (0x0B), carriage return (0x0D),
            tab (0x09), form feed (0x0C), and the question mark (`?`). Requests
            specifying an MD5 key with one or more of these disallowed
            characters will be rejected.
          nullable: true
          type: string
      required:
        - customer_asn
        - extra_prefixes
      type: object
    nscCloudflareSite:
      description: A Cloudflare site name.
      type: string
    nscCni:
      properties:
        account:
          $ref: '#/components/schemas/nscAccountTag'
        bgp:
          $ref: '#/components/schemas/nscBgpControl'
        cust_ip:
          description: >-
            Customer end of the point-to-point link This should always be inside
            the same prefix as `p2p_ip`.
          example: 192.168.3.4/31
          format: A.B.C.D/N
          type: string
        id:
          format: uuid
          type: string
        interconnect:
          description: Interconnect identifier hosting this CNI
          type: string
        magic:
          $ref: '#/components/schemas/nscMagicSettings'
        p2p_ip:
          description: Cloudflare end of the point-to-point link
          example: 192.168.3.4/31
          format: A.B.C.D/N
          type: string
      required:
        - id
        - interconnect
        - account
        - p2p_ip
        - cust_ip
        - magic
      type: object
    nscCniCreate:
      properties:
        account:
          $ref: '#/components/schemas/nscAccountTag'
        bgp:
          $ref: '#/components/schemas/nscBgpControl'
        interconnect:
          type: string
        magic:
          $ref: '#/components/schemas/nscMagicSettings'
      required:
        - interconnect
        - account
        - magic
      type: object
    nscCniList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/nscCni'
          type: array
        next:
          format: int32
          nullable: true
          type: integer
      required:
        - items
      type: object
    nscFacilityInfo:
      properties:
        address:
          items:
            type: string
          type: array
        name:
          type: string
      required:
        - name
        - address
      type: object
    nscInterconnect:
      type: object
      title: Physical
      properties:
        account:
          type: string
        name:
          type: string
        owner:
          type: string
        type:
          type: string
        facility:
          $ref: '#/components/schemas/nscFacilityInfo'
        site:
          $ref: '#/components/schemas/nscCloudflareSite'
        slot_id:
          format: uuid
          type: string
        speed:
          type: string
        region:
          type: string
      required:
        - account
        - name
        - type
    nscInterconnectCreate:
      type: object
      title: Physical
      properties:
        account:
          type: string
        type:
          type: string
        slot_id:
          format: uuid
          type: string
        speed:
          nullable: true
          type: string
        bandwidth:
          $ref: '#/components/schemas/nscApiBandwidth'
        pairing_key:
          description: Pairing key provided by GCP
          type: string
      required:
        - account
        - type
    nscInterconnectList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/nscInterconnect'
          type: array
        next:
          format: int32
          nullable: true
          type: integer
      required:
        - items
      type: object
    nscMagicSettings:
      properties:
        conduit_name:
          type: string
        description:
          type: string
        mtu:
          format: int32
          minimum: 0
          type: integer
      required:
        - conduit_name
        - description
        - mtu
      type: object
    nscSettings:
      properties:
        default_asn:
          format: int32
          minimum: 0
          type: integer
      required:
        - default_asn
      type: object
    nscSettingsRequest:
      properties:
        default_asn:
          format: int32
          minimum: 0
          nullable: true
          type: integer
      type: object
    nscSlotInfo:
      properties:
        account:
          $ref: '#/components/schemas/nscAccountTag'
        facility:
          $ref: '#/components/schemas/nscFacilityInfo'
        id:
          description: Slot ID
          format: uuid
          type: string
        occupied:
          description: Whether the slot is occupied or not
          type: boolean
        site:
          type: string
        speed:
          type: string
      required:
        - id
        - occupied
        - site
        - speed
        - facility
      type: object
    nscSlotList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/nscSlotInfo'
          type: array
        next:
          format: int32
          nullable: true
          type: integer
      required:
