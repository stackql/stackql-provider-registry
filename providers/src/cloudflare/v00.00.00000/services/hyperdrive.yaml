openapi: 3.0.3
info:
  title: hyperdrive API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/hyperdrive/configs:
    get:
      description: Returns a list of Hyperdrives.
      operationId: list-hyperdrive
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  messages:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/hyperdriveHyperdriveConfigResponse'
                  success:
                    description: Return the status of the API call success.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/hyperdriveResultInfo'
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: List Hyperdrives Response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/hyperdriveApiResponseCommonFailure'
          description: List Hyperdrives Failure Response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Hyperdrives
      tags:
        - Hyperdrive
      x-api-token-group:
        - Hyperdrive Write
        - Hyperdrive Read
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.edge.hyperdrive.database.list
      x-stackql-sdk:
        service: hyperdrive
        resource_chain:
          - configs
        method: list
    post:
      description: Creates and returns a new Hyperdrive configuration.
      operationId: create-hyperdrive
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/hyperdriveHyperdriveConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  messages:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  result:
                    type: object
                    $ref: '#/components/schemas/hyperdriveHyperdriveConfigResponse'
                  success:
                    description: Return the status of the API call success.
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Create Hyperdrive Response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/hyperdriveApiResponseCommonFailure'
          description: Create Hyperdrive Failure Response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create Hyperdrive
      tags:
        - Hyperdrive
      x-api-token-group:
        - Hyperdrive Write
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.edge.hyperdrive.database.create
      x-stackql-sdk:
        service: hyperdrive
        resource_chain:
          - configs
        method: create
  /accounts/{account_id}/hyperdrive/configs/{hyperdrive_id}:
    delete:
      description: Deletes the specified Hyperdrive.
      operationId: delete-hyperdrive
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: The unique identifier of the Hyperdrive configuration.
          in: path
          name: hyperdrive_id
          schema:
            $ref: '#/components/schemas/hyperdriveIdentifier'
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  messages:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  result:
                    type: object
                    nullable: true
                  success:
                    description: Return the status of the API call success.
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Delete Hyperdrive Response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/hyperdriveApiResponseCommonFailure'
          description: Delete Hyperdrive Failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Hyperdrive
      tags:
        - Hyperdrive
      x-api-token-group:
        - Hyperdrive Write
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.edge.hyperdrive.database.delete
      x-stackql-sdk:
        service: hyperdrive
        resource_chain:
          - configs
        method: delete
    get:
      description: Returns the specified Hyperdrive configuration.
      operationId: get-hyperdrive
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: The unique identifier of the Hyperdrive configuration.
          in: path
          name: hyperdrive_id
          schema:
            $ref: '#/components/schemas/hyperdriveIdentifier'
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  messages:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  result:
                    type: object
                    $ref: '#/components/schemas/hyperdriveHyperdriveConfigResponse'
                  success:
                    description: Return the status of the API call success.
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Get Hyperdrive Response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/hyperdriveApiResponseCommonFailure'
          description: Get Hyperdrive Failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Hyperdrive
      tags:
        - Hyperdrive
      x-api-token-group:
        - Hyperdrive Write
        - Hyperdrive Read
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.edge.hyperdrive.database.read
      x-stackql-sdk:
        service: hyperdrive
        resource_chain:
          - configs
        method: get
    patch:
      description: >-
        Patches and returns the specified Hyperdrive configuration. Custom
        caching settings are not kept if caching is disabled.
      operationId: patch-hyperdrive
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: The unique identifier of the Hyperdrive configuration.
          in: path
          name: hyperdrive_id
          schema:
            $ref: '#/components/schemas/hyperdriveIdentifier'
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/hyperdriveHyperdriveConfigPatch'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  messages:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  result:
                    type: object
                    $ref: '#/components/schemas/hyperdriveHyperdriveConfigResponse'
                  success:
                    description: Return the status of the API call success.
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: Patch Hyperdrive Response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/hyperdriveApiResponseCommonFailure'
          description: Patch Hyperdrive Failure Response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Patch Hyperdrive
      tags:
        - Hyperdrive
      x-api-token-group:
        - Hyperdrive Write
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.edge.hyperdrive.database.update
      x-stackql-sdk:
        service: hyperdrive
        resource_chain:
          - configs
        method: edit
    put:
      description: Updates and returns the specified Hyperdrive configuration.
      operationId: update-hyperdrive
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: The unique identifier of the Hyperdrive configuration.
          in: path
          name: hyperdrive_id
          schema:
            $ref: '#/components/schemas/hyperdriveIdentifier'
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/hyperdriveHyperdriveConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  messages:
                    $ref: '#/components/schemas/hyperdriveMessages'
                  result:
                    type: object
                    $ref: '#/components/schemas/hyperdriveHyperdriveConfigResponse'
                  success:
                    description: Return the status of the API call success.
                    enum:
                      - true
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Update Hyperdrive Response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/hyperdriveApiResponseCommonFailure'
          description: Update Hyperdrive Failure Response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Hyperdrive
      tags:
        - Hyperdrive
      x-api-token-group:
        - Hyperdrive Write
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.edge.hyperdrive.database.update
      x-stackql-sdk:
        service: hyperdrive
        resource_chain:
          - configs
        method: update
components:
  schemas:
    hyperdriveApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/hyperdriveMessages'
        messages:
          example: []
          $ref: '#/components/schemas/hyperdriveMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Return the status of the API call success.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    hyperdriveHyperdriveCaching:
      type: object
      properties:
        disabled:
          description: Set to true to disable caching of SQL responses. Default is false.
          type: boolean
          x-auditable: true
        max_age:
          description: >-
            Specify the maximum duration (in seconds) items should persist in
            the cache. Defaults to 60 seconds if not specified.
          example: 60
          type: integer
          x-auditable: true
        stale_while_revalidate:
          description: >-
            Specify the number of seconds the cache may serve a stale response.
            Defaults to 15 seconds if not specified.
          example: 15
          type: integer
          x-auditable: true
    hyperdriveHyperdriveConfig:
      properties:
        caching:
          $ref: '#/components/schemas/hyperdriveHyperdriveCaching'
        created_on:
          description: Defines the creation time of the Hyperdrive configuration.
          example: '2017-01-01T00:00:00Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        id:
          $ref: '#/components/schemas/hyperdriveIdentifier'
        modified_on:
          description: Defines the last modified time of the Hyperdrive configuration.
          example: '2017-01-01T00:00:00Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        mtls:
          $ref: '#/components/schemas/hyperdriveHyperdriveMtls'
        name:
          $ref: '#/components/schemas/hyperdriveHyperdriveName'
        origin:
          type: object
          title: Public Database
          properties:
            database:
              description: Set the name of your origin database.
              example: postgres
              type: string
              x-auditable: true
            password:
              description: >-
                Set the password needed to access your origin database. The API
                never returns this write-only value.
              type: string
              writeOnly: true
              x-sensitive: true
            scheme:
              $ref: '#/components/schemas/hyperdriveHyperdriveScheme'
            user:
              description: Set the user of your origin database.
              example: postgres
              type: string
              x-auditable: true
            host:
              description: Defines the host (hostname or IP) of your origin database.
              example: database.example.com
              type: string
              x-auditable: true
            port:
              description: >-
                Defines the port of your origin database. Defaults to 5432 for
                PostgreSQL or 3306 for MySQL if not specified.
              example: 5432
              type: integer
              x-auditable: true
            access_client_id:
              description: >-
                Defines the Client ID of the Access token to use when connecting
                to the origin database.
              example: 0123456789abcdef0123456789abcdef.access
              type: string
              x-auditable: true
            access_client_secret:
              description: >-
                Defines the Client Secret of the Access Token to use when
                connecting to the origin database. The API never returns this
                write-only value.
              example: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
              type: string
              writeOnly: true
              x-sensitive: true
            service_id:
              description: >-
                The identifier of the Workers VPC Service to connect through.
                Hyperdrive will egress through the specified VPC Service to
                reach the origin database.
              example: 0123456789abcdef0123456789abcdef
              type: string
              x-auditable: true
          required:
            - database
            - password
            - scheme
            - user
        origin_connection_limit:
          $ref: '#/components/schemas/hyperdriveHyperdriveOriginConnectionLimit'
      required:
        - id
        - name
        - origin
      type: object
    hyperdriveHyperdriveConfigPatch:
      properties:
        caching:
          $ref: '#/components/schemas/hyperdriveHyperdriveCaching'
        mtls:
          $ref: '#/components/schemas/hyperdriveHyperdriveMtls'
        name:
          $ref: '#/components/schemas/hyperdriveHyperdriveName'
        origin:
          type: object
          title: Connection Options
          properties:
            database:
              description: Set the name of your origin database.
              example: postgres
              type: string
              x-auditable: true
            password:
              description: >-
                Set the password needed to access your origin database. The API
                never returns this write-only value.
              type: string
              writeOnly: true
              x-sensitive: true
            scheme:
              $ref: '#/components/schemas/hyperdriveHyperdriveScheme'
            user:
              description: Set the user of your origin database.
              example: postgres
              type: string
              x-auditable: true
            host:
              description: Defines the host (hostname or IP) of your origin database.
              example: database.example.com
              type: string
              x-auditable: true
            port:
              description: >-
                Defines the port of your origin database. Defaults to 5432 for
                PostgreSQL or 3306 for MySQL if not specified.
              example: 5432
              type: integer
              x-auditable: true
            access_client_id:
              description: >-
                Defines the Client ID of the Access token to use when connecting
                to the origin database.
              example: 0123456789abcdef0123456789abcdef.access
              type: string
              x-auditable: true
            access_client_secret:
              description: >-
                Defines the Client Secret of the Access Token to use when
                connecting to the origin database. The API never returns this
                write-only value.
              example: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
              type: string
              writeOnly: true
              x-sensitive: true
            service_id:
              description: >-
                The identifier of the Workers VPC Service to connect through.
                Hyperdrive will egress through the specified VPC Service to
                reach the origin database.
              example: 0123456789abcdef0123456789abcdef
              type: string
              x-auditable: true
          description: >-
            Connect to a database through a Workers VPC Service. TLS settings
            (mTLS, sslmode) cannot be configured on the Hyperdrive when using a
            VPC Service origin; TLS must be managed on the VPC Service itself.
          required: []
        origin_connection_limit:
          $ref: '#/components/schemas/hyperdriveHyperdriveOriginConnectionLimit'
      type: object
    hyperdriveHyperdriveConfigResponse:
      type: object
      $ref: '#/components/schemas/hyperdriveHyperdriveConfig'
    hyperdriveHyperdriveMtls:
      description: >-
        mTLS configuration for the origin connection. Cannot be used with VPC
        Service origins; TLS must be managed on the VPC Service.
      properties:
        ca_certificate_id:
          description: Define CA certificate ID obtained after uploading CA cert.
          example: 00000000-0000-0000-0000-0000000000
          type: string
        mtls_certificate_id:
          description: Define mTLS certificate ID obtained after uploading client cert.
          example: 00000000-0000-0000-0000-0000000000
          type: string
        sslmode:
          description: >-
            Set SSL mode to 'require', 'verify-ca', or 'verify-full' to verify
            the CA.
          example: verify-full
          type: string
      title: mTLS
      type: object
    hyperdriveHyperdriveName:
      description: >-
        The name of the Hyperdrive configuration. Used to identify the
        configuration in the Cloudflare dashboard and API.
      example: example-hyperdrive
      type: string
      x-auditable: true
    hyperdriveHyperdriveOriginConnectionLimit:
      description: >-
        The (soft) maximum number of connections the Hyperdrive is allowed to
        make to the origin database. Maximum allowed: 20 for free tier accounts,
        100 for paid tier accounts. If not specified, defaults to 20 for free
        tier and 60 for paid tier. Contact Cloudflare if you need a higher
        limit.
      example: 60
      maximum: 100
      minimum: 5
      type: integer
      x-auditable: true
    hyperdriveHyperdriveScheme:
      description: Specifies the URL scheme used to connect to your origin database.
      enum:
        - postgres
        - postgresql
        - mysql
      type: string
      x-auditable: true
    hyperdriveIdentifier:
      description: Define configurations using a unique string identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    hyperdriveMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    hyperdriveResultInfo:
      properties:
        count:
          description: Defines the total number of results for the requested service.
          example: 1
          type: number
        page:
          description: Defines the current page within paginated list of results.
          example: 1
          type: number
        per_page:
          description: Defines the number of results per page of results.
          example: 20
          type: number
        total_count:
          description: Defines the total results available without any search parameters.
          example: 2000
          type: number
      type: object
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
        - code
        - message
      type: object
      uniqueItems: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    configs:
      id: cloudflare.hyperdrive.configs
      name: configs
      title: Configs
      methods:
        list:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1hyperdrive~1configs/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1hyperdrive~1configs/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        delete:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1hyperdrive~1configs~1{hyperdrive_id}/delete
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1hyperdrive~1configs~1{hyperdrive_id}/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        edit:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1hyperdrive~1configs~1{hyperdrive_id}/patch
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1hyperdrive~1configs~1{hyperdrive_id}/put
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/configs/methods/get'
          - $ref: '#/components/x-stackQL-resources/configs/methods/list'
        insert:
          - $ref: '#/components/x-stackQL-resources/configs/methods/create'
        update:
          - $ref: '#/components/x-stackQL-resources/configs/methods/edit'
        delete:
          - $ref: '#/components/x-stackQL-resources/configs/methods/delete'
        replace:
          - $ref: '#/components/x-stackQL-resources/configs/methods/update'
