      description: Status of the zone's custom SSL.
      enum:
      - active
      - expired
      - deleted
      - pending
      - initializing
      example: active
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesType:
      default: legacy_custom
