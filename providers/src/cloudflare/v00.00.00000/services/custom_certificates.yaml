openapi: 3.0.3
info:
  title: custom_certificates API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones/{zone_id}/custom_certificates:
    get:
      description: List, search, and filter all of your custom SSL certificates. The higher priority will break ties across overlapping 'legacy_custom' certificates, but 'legacy_custom' certificates will always supercede 'sni_custom' certificates.
      operationId: custom-ssl-for-a-zone-list-ssl-configurations
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Number of zones per page.
          maximum: 50
          minimum: 5
          type: number
      - in: query
        name: match
        schema:
          default: all
          description: Whether to match all search requirements or at least one (any).
          enum:
          - any
          - all
          type: string
      - in: query
        name: status
        schema:
          description: Status of the zone's custom SSL.
          enum:
          - active
          - expired
          - deleted
          - pending
          - initializing
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificateResponseCollection'
          description: List SSL Configurations response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomCertificate'
                    type: array
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: List SSL Configurations response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List SSL Configurations
      tags:
      - Custom SSL for a Zone
      x-api-token-group:
      - 'Access: Mutual TLS Certificates Write'
      - 'Access: Mutual TLS Certificates Read'
      - SSL and Certificates Write
      - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
        - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: custom_certificates
        resource_chain: []
        method: list
    post:
      description: Upload a new SSL certificate for a zone.
      operationId: custom-ssl-for-a-zone-create-ssl-configuration
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                bundle_method:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesBundleMethod'
                certificate:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificate'
                custom_csr_id:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomCsrId'
                deploy:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesDeploy'
                geo_restrictions:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesGeoRestrictions'
                policy:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesPolicy'
                private_key:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesPrivateKey'
                type:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesType'
              required:
              - certificate
              - private_key
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificateResponseSingle'
          description: Create SSL Configuration response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    properties:
                      bundle_method:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesBundleMethod'
                      custom_csr_id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomCsrId'
                      expires_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesExpiresOn'
                      geo_restrictions:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesGeoRestrictions'
                      hosts:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesHosts'
                      id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                      issuer:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIssuer'
                      keyless_server:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesKeylessCertificate'
                      modified_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesModifiedOn'
                        readOnly: true
                      policy_restrictions:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesPolicyRestrictions'
                      priority:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesPriority'
                      signature:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesSignature'
                      status:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesStatus'
                      uploaded_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesUploadedOn'
                      zone_id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                    required:
                    - id
                    - zone_id
                    type: object
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Create SSL Configuration response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create SSL Configuration
      tags:
      - Custom SSL for a Zone
      x-api-token-group:
      - 'Access: Mutual TLS Certificates Write'
      - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
        - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: custom_certificates
        resource_chain: []
        method: create
  /zones/{zone_id}/custom_certificates/prioritize:
    put:
      description: If a zone has multiple SSL certificates, you can set the order in which they should be used during a request. The higher priority will break ties across overlapping 'legacy_custom' certificates.
      operationId: custom-ssl-for-a-zone-re-prioritize-ssl-certificates
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                certificates:
                  description: Array of ordered certificates.
                  items:
                    properties:
                      id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                      priority:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesPriority'
                    type: object
                  type: array
              required:
              - certificates
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificateResponseCollection'
          description: Re-prioritize SSL Certificates response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomCertificate'
                    type: array
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Re-prioritize SSL Certificates response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Re-prioritize SSL Certificates
      tags:
      - Custom SSL for a Zone
      x-api-token-group:
      - 'Access: Mutual TLS Certificates Write'
      - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
        - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
  /zones/{zone_id}/custom_certificates/{custom_certificate_id}:
    delete:
      description: Remove a SSL certificate from a zone.
      operationId: custom-ssl-for-a-zone-delete-ssl-configuration
      parameters:
      - in: path
        name: custom_certificate_id
        schema:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificateResponseIdOnly'
          description: Delete SSL Configuration response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    $ref: '#/components/schemas/identifier'
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Delete SSL Configuration response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete SSL Configuration
      tags:
      - Custom SSL for a Zone
      x-api-token-group:
      - 'Access: Mutual TLS Certificates Write'
      - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
        - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: custom_certificates
        resource_chain: []
        method: delete
    get:
      description: Retrieves details for a specific custom SSL certificate, including certificate metadata, bundle method, geographic restrictions, and associated keyless server configuration.
      operationId: custom-ssl-for-a-zone-ssl-configuration-details
      parameters:
      - in: path
        name: custom_certificate_id
        schema:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificateResponseSingle'
          description: SSL Configuration Details response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    properties:
                      bundle_method:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesBundleMethod'
                      custom_csr_id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomCsrId'
                      expires_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesExpiresOn'
                      geo_restrictions:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesGeoRestrictions'
                      hosts:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesHosts'
                      id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                      issuer:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIssuer'
                      keyless_server:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesKeylessCertificate'
                      modified_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesModifiedOn'
                        readOnly: true
                      policy_restrictions:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesPolicyRestrictions'
                      priority:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesPriority'
                      signature:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesSignature'
                      status:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesStatus'
                      uploaded_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesUploadedOn'
                      zone_id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                    required:
                    - id
                    - zone_id
                    type: object
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: SSL Configuration Details response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: SSL Configuration Details
      tags:
      - Custom SSL for a Zone
      x-api-token-group:
      - 'Access: Mutual TLS Certificates Write'
      - 'Access: Mutual TLS Certificates Read'
      - SSL and Certificates Write
      - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
        - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: custom_certificates
        resource_chain: []
        method: get
    patch:
      description: 'Upload a new private key and/or PEM/CRT for the SSL certificate. Note: PATCHing a configuration for sni_custom certificates will result in a new resource id being returned, and the previous one being deleted.'
      operationId: custom-ssl-for-a-zone-edit-ssl-configuration
      parameters:
      - in: path
        name: custom_certificate_id
        schema:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
