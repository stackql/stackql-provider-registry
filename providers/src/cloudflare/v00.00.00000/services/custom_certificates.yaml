      enum:
      - legacy_custom
      - sni_custom
      example: sni_custom
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesUploadedOn:
      description: When the certificate was uploaded to Cloudflare.
      example: '2014-01-01T05:20:00Z'
      format: date-time
      readOnly: true
      type: string
      x-auditable: true
    unnamedSchemaRef16aca57bde2963201c7e6e895436c1c1:
      default: ubiquitous
      description: A ubiquitous bundle has the highest probability of being verified everywhere, even by clients using outdated or unusual trust stores. An optimal bundle uses the shortest chain and newest intermediates. And the force bundle verifies the chain, but does not otherwise modify it.
      enum:
      - ubiquitous
      - optimal
      - force
      example: ubiquitous
      type: string
      x-auditable: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: The preferred authorization scheme for interacting with the Cloudflare API. [Create a token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: Used when interacting with the Origin CA certificates API. [View/change your key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    custom_certificates:
      id: cloudflare.custom_certificates.custom_certificates
      name: custom_certificates
      title: Custom Certificates
      methods:
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1custom_certificates/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1custom_certificates/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .bundle_method }}{{ $sep }}"bundle_method": {{ toJson .bundle_method }}{{- $sep = "," -}}{{ end }}

                {{- if .certificate }}{{ $sep }}"certificate": {{ toJson .certificate }}{{- $sep = "," -}}{{ end }}

                {{- if .custom_csr_id }}{{ $sep }}"custom_csr_id": {{ toJson .custom_csr_id }}{{- $sep = "," -}}{{ end }}

                {{- if .deploy }}{{ $sep }}"deploy": {{ toJson .deploy }}{{- $sep = "," -}}{{ end }}

                {{- if .geo_restrictions }}{{ $sep }}"geo_restrictions": {{ if eq (kindOf .geo_restrictions) "string" }}{{ .geo_restrictions }}{{ else }}{{ toJson .geo_restrictions }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .policy }}{{ $sep }}"policy": {{ toJson .policy }}{{- $sep = "," -}}{{ end }}

                {{- if .private_key }}{{ $sep }}"private_key": {{ toJson .private_key }}{{- $sep = "," -}}{{ end }}

                {{- if .type }}{{ $sep }}"type": {{ toJson .type }}{{- $sep = "," -}}{{ end }}

                }

                '
        update_prioritize:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1custom_certificates~1prioritize/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .certificates }}{{ $sep }}"certificates": {{ if eq (kindOf .certificates) "string" }}{{ .certificates }}{{ else }}{{ toJson .certificates }}{{ end }}{{- $sep = "," -}}{{ end }}

                }

                '
        delete:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1custom_certificates~1{custom_certificate_id}/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1custom_certificates~1{custom_certificate_id}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        edit:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1custom_certificates~1{custom_certificate_id}/patch'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .bundle_method }}{{ $sep }}"bundle_method": {{ toJson .bundle_method }}{{- $sep = "," -}}{{ end }}

                {{- if .certificate }}{{ $sep }}"certificate": {{ toJson .certificate }}{{- $sep = "," -}}{{ end }}

                {{- if .custom_csr_id }}{{ $sep }}"custom_csr_id": {{ toJson .custom_csr_id }}{{- $sep = "," -}}{{ end }}

                {{- if .deploy }}{{ $sep }}"deploy": {{ toJson .deploy }}{{- $sep = "," -}}{{ end }}

                {{- if .geo_restrictions }}{{ $sep }}"geo_restrictions": {{ if eq (kindOf .geo_restrictions) "string" }}{{ .geo_restrictions }}{{ else }}{{ toJson .geo_restrictions }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .policy }}{{ $sep }}"policy": {{ toJson .policy }}{{- $sep = "," -}}{{ end }}

                {{- if .private_key }}{{ $sep }}"private_key": {{ toJson .private_key }}{{- $sep = "," -}}{{ end }}

                }

                '
      sqlVerbs:
        select:
        - $ref: '#/components/x-stackQL-resources/custom_certificates/methods/get'
        - $ref: '#/components/x-stackQL-resources/custom_certificates/methods/list'
        insert:
        - $ref: '#/components/x-stackQL-resources/custom_certificates/methods/create'
        update:
        - $ref: '#/components/x-stackQL-resources/custom_certificates/methods/edit'
        delete:
        - $ref: '#/components/x-stackQL-resources/custom_certificates/methods/delete'
        replace: []
