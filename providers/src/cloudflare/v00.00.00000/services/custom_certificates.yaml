          description: Edit SSL Configuration response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    properties:
                      bundle_method:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesBundleMethod'
                      custom_csr_id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomCsrId'
                      expires_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesExpiresOn'
                      geo_restrictions:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesGeoRestrictions'
                      hosts:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesHosts'
                      id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                      issuer:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIssuer'
                      keyless_server:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesKeylessCertificate'
                      modified_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesModifiedOn'
                        readOnly: true
                      policy_restrictions:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesPolicyRestrictions'
                      priority:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesPriority'
                      signature:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesSignature'
                      status:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesStatus'
                      uploaded_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesUploadedOn'
                      zone_id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                    required:
                    - id
                    - zone_id
                    type: object
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Edit SSL Configuration response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Edit SSL Configuration
      tags:
      - Custom SSL for a Zone
      x-api-token-group:
      - 'Access: Mutual TLS Certificates Write'
      - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
        - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: custom_certificates
        resource_chain: []
        method: edit
components:
  schemas:
    identifier:
      properties:
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
      type: object
      enum:
      - null
    tlsCertificatesAndHostnamesBase:
      properties:
        created_on:
          description: When the Keyless SSL was created.
          example: '2014-01-01T05:20:00Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        enabled:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesEnabled'
        host:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesHost'
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasIdentifier'
        modified_on:
          description: When the Keyless SSL was last modified.
          example: '2014-01-01T05:20:00Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        name:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesName'
        permissions:
          description: Available permissions for the Keyless SSL for the current user requesting the item.
          example:
          - '#ssl:read'
          - '#ssl:edit'
          items:
            type: string
            x-auditable: true
          readOnly: true
          type: array
        port:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesPort'
        status:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasStatus'
        tunnel:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesKeylessTunnel'
      required:
      - id
      - name
      - host
      - port
      - status
      - enabled
      - permissions
      - created_on
      - modified_on
      type: object
    tlsCertificatesAndHostnamesBundleMethod:
      $ref: '#/components/schemas/unnamedSchemaRef16aca57bde2963201c7e6e895436c1c1'
    tlsCertificatesAndHostnamesCertificate:
      description: The zone's SSL certificate or certificate and the intermediate(s).
