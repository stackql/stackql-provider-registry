    tlsCertificatesAndHostnamesSchemasIdentifier:
      description: Keyless certificate identifier tag.
      example: 4d2844d2ce78891c34d0b6c0535a291e
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesSchemasStatus:
      description: Status of the Keyless SSL.
      enum:
      - active
      - deleted
      example: active
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesSignature:
      description: The type of hash used for the certificate.
      example: SHA256WithRSA
      readOnly: true
      type: string
      x-auditable: true
