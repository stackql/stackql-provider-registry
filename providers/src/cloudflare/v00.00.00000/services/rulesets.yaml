components:
  schemas:
    rulesetsCursor:
      description: The cursor to use for the next page.
      example: dGhpc2lzYW5leGFtcGxlCg
      minLength: 1
      title: Cursor
      type: string
    rulesetsErrors:
      description: A list of error messages.
      items:
        $ref: '#/components/schemas/rulesetsMessage'
      title: Errors
      type: array
      uniqueItems: true
    rulesetsMessage:
      description: A message.
      properties:
        code:
          description: A unique code for this message.
          example: 10000
          title: Code
          type: integer
        message:
          description: A text description of this message.
          example: something bad happened
          minLength: 1
          title: Description
          type: string
        source:
          description: The source of this message.
          properties:
            pointer:
              description: A JSON pointer to the field that is the source of the message.
              example: /rules/0/action
              minLength: 1
              title: Pointer
              type: string
          required:
            - pointer
          title: Source
          type: object
      required:
        - message
      title: Message
      type: object
    rulesetsMessages:
      description: A list of warning messages.
      items:
        $ref: '#/components/schemas/rulesetsMessage'
      title: Messages
      type: array
      uniqueItems: true
    rulesetsPerPage:
      description: The number of rulesets to return per page.
      example: 3
      maximum: 50
      minimum: 1
      title: Per Page
      type: integer
    rulesetsRequestRule:
      type: object
      title: Block Rule
      properties:
        action:
          description: The action to perform when the rule matches.
          title: Action
          type: string
          enum:
            - block
        action_parameters:
          default: {}
          description: The parameters configuring the rule's action.
          title: Action Parameters
          type: object
          properties:
            response:
              description: The response to show when the block is applied.
              properties:
                content:
                  description: The content to return.
                  example: |-
                    {
                      "success": false,
                      "error": "you have been blocked"
                    }
                  minLength: 1
                  title: Content
                  type: string
                content_type:
                  description: The type of the content to return.
                  example: application/json
                  minLength: 1
                  title: Content Type
                  type: string
                status_code:
                  description: The status code to return.
                  maximum: 499
                  minimum: 400
                  title: Status Code
                  type: integer
              required:
                - status_code
                - content
                - content_type
              title: Response
              type: object
        categories:
          $ref: '#/components/schemas/rulesetsRuleCategories'
        description:
          default: ''
          description: An informative description of the rule.
          title: Description
          type: string
          example: Block the request.
        enabled:
          $ref: '#/components/schemas/rulesetsRuleEnabled'
          default: true
        exposed_credential_check:
          $ref: '#/components/schemas/rulesetsRuleExposedCredentialCheck'
        expression:
          description: The expression defining which traffic will match the rule.
          example: ip.src eq 1.1.1.1
          minLength: 1
          title: Expression
          type: string
        id:
          $ref: '#/components/schemas/rulesetsRuleId'
        last_updated:
          description: The timestamp of when the rule was last modified.
          example: '2000-01-01T00:00:00.000000Z'
          format: date-time
          readOnly: true
          title: Last Updated
          type: string
          x-stainless-skip:
            - terraform
        logging:
          $ref: >-
            #/components/schemas/unnamedSchemaRef70f2c6ccd8a405358ac7ef8fc3d6751c
        ratelimit:
          $ref: '#/components/schemas/rulesetsRuleRatelimit'
        ref:
          description: The reference of the rule (the rule's ID by default).
          example: my_ref
          minLength: 1
          title: Ref
          type: string
        version:
          description: The version of the rule.
          example: '1'
          readOnly: true
          title: Version
          type: string
          x-stainless-skip:
            - terraform
      required:
        - last_updated
        - version
    rulesetsRequestRules:
      default: []
      description: The list of rules in the ruleset.
      items:
        $ref: '#/components/schemas/rulesetsRequestRule'
      title: Rules
      type: array
    rulesetsResponseRule:
      $ref: '#/components/schemas/rulesetsRequestRule'
    rulesetsResponseRules:
      description: The list of rules in the ruleset.
      items:
        $ref: '#/components/schemas/rulesetsResponseRule'
      title: Rules
      type: array
    rulesetsResultInfo:
      description: Information to navigate the results.
      properties:
