              title: After Cursor
          required:
            - after
          title: Cursors
          type: object
      title: Result Info
      type: object
    rulesetsRuleCategories:
      description: The categories of the rule.
      items:
        $ref: '#/components/schemas/rulesetsRuleCategory'
      minItems: 1
      readOnly: true
      title: Categories
      type: array
      uniqueItems: true
    rulesetsRuleCategory:
      description: The category of a rule.
      example: directory-traversal
      minLength: 1
      title: Category
      type: string
    rulesetsRuleEnabled:
      description: Whether the rule should be executed.
      example: true
      title: Enabled
      type: boolean
    rulesetsRuleExposedCredentialCheck:
      description: Configuration for exposed credential checking.
      properties:
        password_expression:
          description: >-
            An expression that selects the password used in the credentials
            check.
          example: url_decode(http.request.body.form[\"password\"][0])
          minLength: 1
          title: Password Expression
          type: string
        username_expression:
          description: >-
            An expression that selects the user ID used in the credentials
            check.
          example: url_decode(http.request.body.form[\"username\"][0])
          minLength: 1
          title: Username Expression
          type: string
      required:
        - username_expression
        - password_expression
      title: Exposed Credential Check
      type: object
    rulesetsRuleId:
      description: The unique ID of the rule.
      example: 3a03d665bac047339bb530ecb439a90d
      title: Rule ID
      type: string
    rulesetsRuleLogging:
      description: An object configuring the rule's logging behavior.
      properties:
        enabled:
          description: Whether to generate a log when the rule matches.
          example: true
          title: Enabled
          type: boolean
      required:
        - enabled
      title: Logging
      type: object
    rulesetsRuleRatelimit:
      description: An object configuring the rule's rate limit behavior.
      properties:
        characteristics:
          description: >-
            Characteristics of the request on which the rate limit counter will
            be incremented.
          items:
            description: The characteristic of the request.
            example: cf.colo.id
            minLength: 1
            title: Characteristic
            type: string
          minItems: 1
          title: Characteristics
          type: array
          uniqueItems: true
        counting_expression:
          description: >-
            An expression that defines when the rate limit counter should be
            incremented. It defaults to the same as the rule's expression.
          example: http.request.body.raw eq "abcd"
          minLength: 1
          title: Counting Expression
          type: string
        mitigation_timeout:
          description: >-
            Period of time in seconds after which the action will be disabled
            following its first execution.
          example: 600
          title: Mitigation Timeout
          type: integer
        period:
          description: Period in seconds over which the counter is being incremented.
          example: 60
          minimum: 0
          title: Period
          type: integer
        requests_per_period:
          description: >-
            The threshold of requests per period after which the action will be
            executed for the first time.
          example: 1000
          minimum: 1
          title: Requests per Period
          type: integer
        requests_to_origin:
          default: false
          description: Whether counting is only performed when an origin is reached.
          example: true
          title: Requests to Origin
          type: boolean
        score_per_period:
          description: >-
            The score threshold per period for which the action will be executed
            the first time.
          example: 400
          title: Score per Period
          type: integer
        score_response_header_name:
          description: >-
            A response header name provided by the origin, which contains the
            score to increment rate limit counter with.
          example: my-score
          minLength: 1
          title: Score Response Header Name
          type: string
      required:
        - characteristics
        - period
      title: Rate Limit
      type: object
    rulesetsRulesetId:
      description: The unique ID of the ruleset.
      example: 2f2feab2026849078ba485f918791bdc
      title: Ruleset ID
      type: string
    rulesetsRulesetKind:
      description: The kind of the ruleset.
