                        phase:
                          $ref: '#/components/schemas/rulesetsRulesetPhase'
                      required:
                        - id
                        - version
                        - last_updated
                        - name
                        - kind
                        - phase
                      title: Ruleset
                      type: object
                    type: array
                  success:
                    description: Whether the API call was successful.
                    title: Success
                    type: boolean
                    enum:
                      - true
                  result_info:
                    $ref: '#/components/schemas/rulesetsResultInfo'
                required:
                  - result
