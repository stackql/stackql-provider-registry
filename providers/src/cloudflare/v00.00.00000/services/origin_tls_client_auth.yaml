openapi: 3.0.3
info:
  title: origin_tls_client_auth API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/origin_tls_client_auth:
    get:
      description: >-
        Lists all client certificates configured for zone-level authenticated
        origin pulls.
      operationId: zone-level-authenticated-origin-pulls-list-certificates
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificateResponseCollection
          description: List Certificates response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesZoneAuthenticatedOriginPull
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List Certificates response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Certificates
      tags:
        - Zone-Level Authenticated Origin Pulls
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_tls_client_auth
        resource_chain: []
        method: list
    post:
      description: >-
        Upload your own certificate you want Cloudflare to use for
        edge-to-origin communication to override the shared certificate. Please
        note that it is important to keep only one certificate active. Also,
        make sure to enable zone-level authenticated origin pulls by making a
        PUT call to settings endpoint to see the uploaded certificate in use.
      operationId: zone-level-authenticated-origin-pulls-upload-certificate
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                certificate:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesZoneAuthenticatedOriginPullComponentsSchemasCertificate
                private_key:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesPrivateKey'
              required:
                - certificate
                - private_key
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificateResponseSingle
          description: Upload Certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      certificate:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesZoneAuthenticatedOriginPullComponentsSchemasCertificate
                      enabled:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesZoneAuthenticatedOriginPullComponentsSchemasEnabled
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      private_key:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesPrivateKey
                      expires_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesZoneAuthenticatedOriginPullComponentsSchemasExpiresOn
                      issuer:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIssuer'
                      signature:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSignature
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesZoneAuthenticatedOriginPullComponentsSchemasStatus
                      uploaded_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasUploadedOn
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Upload Certificate response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Upload Certificate
      tags:
        - Zone-Level Authenticated Origin Pulls
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_tls_client_auth
        resource_chain: []
        method: create
  /zones/{zone_id}/origin_tls_client_auth/hostnames:
    get:
      description: >-
        List certificate ID - hostname associations for the given zone. Shows
        which hostnames are associated to which certificates for authenticated
        origin pulls.
      operationId: per-hostname-authenticated-origin-pull-list-hostname-associations
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: page
          schema:
            default: 1
            description: Page number of paginated results.
            minimum: 1
            type: number
        - in: query
          name: per_page
          schema:
            default: 50
            description: Number of associations per page.
            maximum: 1000
            minimum: 1
            type: number
        - in: query
          name: status
          schema:
            description: >-
              Filter associations by status. Use comma-separated values to
              filter by multiple statuses, or "all" to include every status.
              Defaults to "active" if not provided.
            enum:
              - active
              - pending_deployment
              - pending_deletion
              - deleted
              - deployment_timed_out
              - deletion_timed_out
              - all
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesHostnameAssocResponseCollection
          description: List Hostname Associations response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: >-
                          Total results returned based on your search
                          parameters.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: Total pages available of results.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesHostnameAssocObject
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List Hostname Associations response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Hostname Associations
      tags:
        - Per-hostname Authenticated Origin Pull
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_tls_client_auth
        resource_chain:
          - hostnames
        method: update
    put:
      description: >-
        Associate a hostname to a certificate and enable, disable or invalidate
        the association. If disabled, client certificate will not be sent to the
        hostname even if activated at the zone level. 100 maximum associations
        on a single certificate are allowed. Note: Use a null value for
        parameter *enabled* to invalidate the association.
      operationId: >-
        per-hostname-authenticated-origin-pull-enable-or-disable-a-hostname-for-client-authentication
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                config:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesConfig'
              required:
                - config
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesHostnameAopResponseCollection
          description: Enable or Disable a Hostname for Client Authentication response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPull
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: >-
            Enable or Disable a Hostname for Client Authentication response
            failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Enable or Disable a Hostname for Client Authentication
      tags:
        - Per-hostname Authenticated Origin Pull
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/origin_tls_client_auth/hostnames/certificates:
    get:
      description: >-
        Lists all client certificates configured for per-hostname authenticated
        origin pulls on the zone.
      operationId: per-hostname-authenticated-origin-pull-list-certificates
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasCertificateResponseCollection
          description: List Certificates response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificateObject
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List Certificates response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Certificates
      tags:
        - Per-hostname Authenticated Origin Pull
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_tls_client_auth
        resource_chain:
          - hostname_certificates
        method: list
    post:
      description: >-
        Upload a certificate to be used for client authentication on a hostname.
        10 hostname certificates per zone are allowed.
      operationId: >-
        per-hostname-authenticated-origin-pull-upload-a-hostname-client-certificate
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                certificate:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasCertificate
                private_key:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesSchemasPrivateKey
              required:
                - certificate
                - private_key
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasCertificateResponseSingle
          description: Upload a Hostname Client Certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefD182888b36f93a765d9ce5aefa3009e9
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Upload a Hostname Client Certificate response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Upload a Hostname Client Certificate
      tags:
        - Per-hostname Authenticated Origin Pull
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_tls_client_auth
        resource_chain:
          - hostname_certificates
        method: create
  /zones/{zone_id}/origin_tls_client_auth/hostnames/certificates/{certificate_id}:
    delete:
      description: >-
        Removes a client certificate used for authenticated origin pulls on a
        specific hostname. Note: Before deleting the certificate, you must first
        invalidate the hostname for client authentication by sending a PUT
        request with `enabled` set to null. After invalidating the association,
        the certificate can be safely deleted.
      operationId: >-
        per-hostname-authenticated-origin-pull-delete-hostname-client-certificate
      parameters:
        - name: certificate_id
          in: path
          required: true
          description: The certificate ID.
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasCertificateResponseSingle
          description: Delete Hostname Client Certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefD182888b36f93a765d9ce5aefa3009e9
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Delete Hostname Client Certificate response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Hostname Client Certificate
      tags:
        - Per-hostname Authenticated Origin Pull
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_tls_client_auth
        resource_chain:
          - hostname_certificates
        method: delete
    get:
      description: >-
        Get the certificate by ID to be used for client authentication on a
        hostname.
      operationId: >-
        per-hostname-authenticated-origin-pull-get-the-hostname-client-certificate
      parameters:
        - name: certificate_id
          in: path
          required: true
          description: The certificate ID.
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasCertificateResponseSingle
          description: Get the Hostname Client Certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefD182888b36f93a765d9ce5aefa3009e9
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Get the Hostname Client Certificate response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get the Hostname Client Certificate
      tags:
        - Per-hostname Authenticated Origin Pull
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_tls_client_auth
        resource_chain:
          - hostname_certificates
        method: get
  /zones/{zone_id}/origin_tls_client_auth/hostnames/{hostname}:
    get:
      description: >-
        Retrieves the client certificate authentication status for a specific
        hostname, showing whether authenticated origin pulls are enabled.
      operationId: >-
        per-hostname-authenticated-origin-pull-get-the-hostname-status-for-client-authentication
      parameters:
        - in: path
          name: hostname
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasHostname'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesHostnameAopSingleResponse
          description: Get the Hostname Status for Client Authentication response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      cert_id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      cert_status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasStatus
                      cert_updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasUpdatedAt
                      cert_uploaded_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasUploadedOn
                      certificate:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasCertificate
                      created_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCreatedAt
                        readOnly: true
                      enabled:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasEnabled
                      expires_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasExpiresOn
                      hostname:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasHostname
                      issuer:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIssuer'
                      serial_number:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSerialNumber
                      signature:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSignature
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameAuthenticatedOriginPullComponentsSchemasStatus
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasUpdatedAt
                        readOnly: true
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Get the Hostname Status for Client Authentication response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get the Hostname Status for Client Authentication
      tags:
        - Per-hostname Authenticated Origin Pull
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_tls_client_auth
        resource_chain:
