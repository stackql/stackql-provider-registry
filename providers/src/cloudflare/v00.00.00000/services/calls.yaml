openapi: 3.0.3
info:
  title: calls API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/calls/apps:
    get:
      description: Lists all apps in the Cloudflare account
      operationId: calls-apps-list
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsAppResponseCollection'
          description: List apps response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsApiResponseCommonFailure'
          description: List apps response failure
      security:
        - api_token: []
      summary: List apps
      tags:
        - Calls Apps
      x-api-token-group:
        - Calls Write
        - Calls Read
      x-stackql-sdk:
        service: calls
        resource_chain:
          - sfu
        method: list
    post:
      description: >-
        Creates a new Cloudflare calls app. An app is an unique enviroment where
        each Session can access all Tracks within the app.
      operationId: calls-apps-create-a-new-app
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/callsAppEditableFields'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsAppResponseSingleWithSecret'
          description: Created a new app
      security:
        - api_token: []
      summary: Create a new app
      tags:
        - Calls Apps
      x-api-token-group:
        - Calls Write
      x-stackql-sdk:
        service: calls
        resource_chain:
          - sfu
        method: create
  /accounts/{account_id}/calls/apps/{app_id}:
    delete:
      description: Deletes an app from Cloudflare Calls
      operationId: calls-apps-delete-app
      parameters:
        - name: app_id
          in: path
          required: true
          description: The Access application ID.
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsAppResponseSingle'
          description: Delete app response
        4XX:
          content:
            application/json: {}
          description: Delete app response failure
      security:
        - api_token: []
      summary: Delete app
      tags:
        - Calls Apps
      x-api-token-group:
        - Calls Write
      x-stackql-sdk:
        service: calls
        resource_chain:
          - sfu
        method: delete
    get:
      description: Fetches details for a single Calls app.
      operationId: calls-apps-retrieve-app-details
      parameters:
        - name: app_id
          in: path
          required: true
          description: The Access application ID.
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsAppResponseSingle'
          description: Retrieve app details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsApiResponseCommonFailure'
          description: Retrieve app details response failure
      security:
        - api_token: []
      summary: Retrieve app details
      tags:
        - Calls Apps
      x-api-token-group:
        - Calls Write
        - Calls Read
      x-stackql-sdk:
        service: calls
        resource_chain:
          - sfu
        method: get
    put:
      description: Edit details for a single app.
      operationId: calls-apps-update-app-details
      parameters:
        - name: app_id
          in: path
          required: true
          description: The Access application ID.
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/callsAppEditableFields'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsAppResponseSingle'
          description: Edit app details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsApiResponseCommonFailure'
          description: Edit app details response failure
      security:
        - api_token: []
      summary: Edit app details
      tags:
        - Calls Apps
      x-api-token-group:
        - Calls Write
      x-stackql-sdk:
        service: calls
        resource_chain:
          - sfu
        method: update
  /accounts/{account_id}/calls/turn_keys:
    get:
      description: Lists all TURN keys in the Cloudflare account
      operationId: calls-turn-key-list
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsTurnKeyCollection'
          description: List TURN key response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsApiResponseCommonFailure'
          description: List TURN key response failure
      security:
        - api_token: []
      summary: List TURN Keys
      tags:
        - Calls TURN Keys
      x-api-token-group:
        - Calls Write
        - Calls Read
      x-stackql-sdk:
        service: calls
        resource_chain:
          - turn
        method: list
    post:
      description: Creates a new Cloudflare Calls TURN key.
      operationId: calls-turn-key-create
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/callsTurnKeyEditableFields'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsTurnKeySingleWithSecret'
          description: Created a new TURN key
      security:
        - api_token: []
      summary: Create a new TURN key
      tags:
        - Calls TURN Keys
      x-api-token-group:
        - Calls Write
      x-stackql-sdk:
        service: calls
        resource_chain:
          - turn
        method: create
  /accounts/{account_id}/calls/turn_keys/{key_id}:
    delete:
      description: Deletes a TURN key from Cloudflare Calls
      operationId: calls-delete-turn-key
      parameters:
        - in: path
          name: key_id
          schema:
            $ref: '#/components/schemas/callsIdentifier'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsTurnKeyResponseSingle'
          description: Delete TURN key response
        4XX:
          content:
            application/json: {}
          description: Delete TURN key response failure
      security:
        - api_token: []
      summary: Delete TURN key
      tags:
        - Calls TURN Keys
      x-api-token-group:
        - Calls Write
      x-stackql-sdk:
        service: calls
        resource_chain:
          - turn
        method: delete
    get:
      description: Fetches details for a single TURN key.
      operationId: calls-retrieve-turn-key-details
      parameters:
        - in: path
          name: key_id
          schema:
            $ref: '#/components/schemas/callsIdentifier'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsTurnKeyResponseSingle'
          description: Retrieve TURN key details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsApiResponseCommonFailure'
          description: Retrieve TURN key details failure
      security:
        - api_token: []
      summary: Retrieve TURN key details
      tags:
        - Calls TURN Keys
      x-api-token-group:
        - Calls Write
        - Calls Read
      x-stackql-sdk:
        service: calls
        resource_chain:
          - turn
        method: get
    put:
      description: Edit details for a single TURN key.
      operationId: calls-update-turn-key
      parameters:
        - in: path
          name: key_id
          schema:
            $ref: '#/components/schemas/callsIdentifier'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/callsTurnKeyEditableFields'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsTurnKeyResponseSingle'
          description: Edit TURN key details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/callsApiResponseCommonFailure'
          description: Edit TURN key details response failure
      security:
        - api_token: []
      summary: Edit TURN key details
      tags:
        - Calls TURN Keys
      x-api-token-group:
        - Calls Write
      x-stackql-sdk:
        service: calls
        resource_chain:
          - turn
        method: update
components:
  schemas:
    callsApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/callsMessages'
        messages:
          example: []
          $ref: '#/components/schemas/callsMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    callsApp:
      properties:
        created:
          $ref: '#/components/schemas/callsCreated'
        modified:
          $ref: '#/components/schemas/callsModified'
        name:
          $ref: '#/components/schemas/callsName'
        uid:
          $ref: '#/components/schemas/callsIdentifier'
      type: object
    callsAppEditableFields:
      properties:
        name:
          $ref: '#/components/schemas/callsName'
      type: object
    callsAppResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/callsMessages'
        messages:
          $ref: '#/components/schemas/callsMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          items:
            $ref: '#/components/schemas/callsApp'
          type: array
      required:
        - success
        - errors
        - messages
      type: object
    callsAppResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/callsMessages'
        messages:
          $ref: '#/components/schemas/callsMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/callsApp'
      required:
        - success
        - errors
        - messages
    callsAppResponseSingleWithSecret:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/callsMessages'
        messages:
          $ref: '#/components/schemas/callsMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/callsAppWithSecret'
      required:
        - success
        - errors
        - messages
    callsAppWithSecret:
      properties:
        created:
          $ref: '#/components/schemas/callsCreated'
        modified:
          $ref: '#/components/schemas/callsModified'
        name:
          $ref: '#/components/schemas/callsName'
        secret:
          $ref: '#/components/schemas/callsSecret'
        uid:
          $ref: '#/components/schemas/callsIdentifier'
      type: object
    callsCreated:
      description: The date and time the item was created.
      example: '2014-01-02T02:20:00Z'
      format: date-time
      type: string
    callsIdentifier:
      description: A Cloudflare-generated unique identifier for a item.
      example: 2a95132c15732412d22c1476fa83f27a
      maxLength: 32
      minLength: 32
      type: string
      x-auditable: true
    callsMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    callsModified:
      description: The date and time the item was last modified.
      example: '2014-01-02T02:20:00Z'
      format: date-time
      type: string
    callsName:
      default: ''
      description: A short description of Calls app, not shown to end users.
      example: production-realtime-app
      type: string
      x-auditable: true
    callsSecret:
      description: Bearer token
      example: 66bcf64aa8907b9f9d90ac17746a77ce394c393b92b3916633dc02846e608ad4
      maxLength: 64
      minLength: 64
      type: string
      x-sensitive: true
    callsTurnKey:
      description: Bearer token
      example: 66bcf64aa8907b9f9d90ac17746a77ce394c393b92b3916633dc02846e608ad4
      maxLength: 64
      minLength: 64
      type: string
      x-sensitive: true
    callsTurnKeyCollection:
      properties:
        errors:
          $ref: '#/components/schemas/callsMessages'
        messages:
          $ref: '#/components/schemas/callsMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          items:
            $ref: '#/components/schemas/callsTurnKeyObject'
          type: array
      required:
        - success
        - errors
        - messages
      type: object
    callsTurnKeyEditableFields:
      properties:
        name:
          $ref: '#/components/schemas/callsTurnKeyName'
      type: object
    callsTurnKeyName:
      default: ''
      description: A short description of a TURN key, not shown to end users.
      example: my-turn-key
      type: string
      x-auditable: true
    callsTurnKeyObject:
      properties:
        created:
          $ref: '#/components/schemas/callsCreated'
        modified:
          $ref: '#/components/schemas/callsModified'
        name:
          $ref: '#/components/schemas/callsName'
        uid:
          $ref: '#/components/schemas/callsIdentifier'
      type: object
    callsTurnKeyResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/callsMessages'
        messages:
          $ref: '#/components/schemas/callsMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/callsTurnKeyObject'
      required:
        - success
        - errors
        - messages
    callsTurnKeySingleWithSecret:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/callsMessages'
        messages:
          $ref: '#/components/schemas/callsMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/callsTurnKeyWithKey'
      required:
        - success
        - errors
        - messages
    callsTurnKeyWithKey:
      properties:
        created:
          $ref: '#/components/schemas/callsCreated'
        key:
          $ref: '#/components/schemas/callsTurnKey'
        modified:
          $ref: '#/components/schemas/callsModified'
        name:
          $ref: '#/components/schemas/callsTurnKeyName'
        uid:
          $ref: '#/components/schemas/callsIdentifier'
      type: object
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    sfu:
      id: cloudflare.calls.sfu
      name: sfu
      title: Sfu
      methods:
        list:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1calls~1apps/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1calls~1apps/post'
          response:
            mediaType: application/json
            openAPIDocKey: '201'
        delete:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1calls~1apps~1{app_id}/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1calls~1apps~1{app_id}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1calls~1apps~1{app_id}/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/sfu/methods/get'
          - $ref: '#/components/x-stackQL-resources/sfu/methods/list'
        insert:
          - $ref: '#/components/x-stackQL-resources/sfu/methods/create'
        update: []
        delete:
          - $ref: '#/components/x-stackQL-resources/sfu/methods/delete'
        replace:
          - $ref: '#/components/x-stackQL-resources/sfu/methods/update'
    turn:
      id: cloudflare.calls.turn
      name: turn
      title: Turn
      methods:
        list:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1calls~1turn_keys/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1calls~1turn_keys/post'
          response:
            mediaType: application/json
            openAPIDocKey: '201'
        delete:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1calls~1turn_keys~1{key_id}/delete
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1calls~1turn_keys~1{key_id}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1calls~1turn_keys~1{key_id}/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/turn/methods/get'
          - $ref: '#/components/x-stackQL-resources/turn/methods/list'
        insert:
          - $ref: '#/components/x-stackQL-resources/turn/methods/create'
        update: []
        delete:
          - $ref: '#/components/x-stackQL-resources/turn/methods/delete'
        replace:
          - $ref: '#/components/x-stackQL-resources/turn/methods/update'
