openapi: 3.0.3
info:
  title: email_security API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/email-security/investigate:
    get:
      description: Returns information for each email that matches the search parameter(s).
      operationId: email_security_investigate
      parameters:
      - description: The beginning of the search date range. Defaults to `now - 30 days`.
        in: query
        name: start
        schema:
          format: date-time
          type: string
      - description: The end of the search date range. Defaults to `now`.
        in: query
        name: end
        schema:
          format: date-time
          type: string
      - description: Space-delimited search term. Case-insensitive.
        in: query
        name: query
        schema:
          type: string
      - description: Whether to include only detections in search results.
        in: query
        name: detections_only
        schema:
          default: true
          type: boolean
      - description: Whether to include the message action log in the response.
        in: query
        name: action_log
        schema:
          default: true
          type: boolean
      - description: Dispositions to filter by.
        in: query
        name: final_disposition
        schema:
          enum:
          - MALICIOUS
          - SUSPICIOUS
          - SPOOF
          - SPAM
          - BULK
          - NONE
          type: string
      - in: query
        name: metric
        schema:
          type: string
      - description: Message actions to filter by.
        in: query
        name: message_action
        schema:
          enum:
          - PREVIEW
          - QUARANTINE_RELEASED
          - MOVED
          type: string
      - in: query
        name: recipient
        schema:
          type: string
      - in: query
        name: sender
        schema:
          type: string
      - in: query
        name: alert_id
        schema:
          type: string
      - description: Sender domains to filter by.
        in: query
        name: domain
        schema:
          type: string
      - in: query
        name: message_id
        schema:
          type: string
      - in: query
        name: subject
        schema:
          type: string
      - in: query
        name: cursor
        schema:
          type: string
      - description: The number of results per page. Maximum value is 1000.
        in: query
        name: per_page
        schema:
          default: 20
          maximum: 1000
          minimum: 1
          type: integer
      - deprecated: true
        description: 'Deprecated: Use cursor pagination instead. End of life: November 1, 2026.'
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          nullable: true
          type: integer
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/emailSecurityMessageDetails'
                    type: array
                  result_info:
                    $ref: '#/components/schemas/emailSecurityCursorResultInfo'
                required:
                - success
                - errors
                - messages
                - result
                - result_info
                type: object
          description: Search results for the provided query.
        '202':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    description: Always empty on 202; follow the Location header to retrieve results.
                    items: {}
                    maxItems: 0
                    type: array
                  result_info:
                    $ref: '#/components/schemas/emailSecurityCursorResultInfo'
                required:
                - success
                - errors
                - messages
                - result
                - result_info
                type: object
          description: The search is taking longer than expected. Use the Location header to poll for results.
          headers:
            Location:
              description: URL to poll for search results
              schema:
                type: string
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Search email messages
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      - 'Cloud Email Security: Read'
      x-stackql-sdk:
        service: email_security
        resource_chain:
        - investigate
        method: list
  /accounts/{account_id}/email-security/investigate/move:
    post:
      description: Moves multiple messages to a specified mailbox folder (Inbox, JunkEmail, DeletedItems, RecoverableItemsDeletions, or RecoverableItemsPurges). Requires active integration.
      operationId: email_security_post_bulk_move
      requestBody:
        content:
          application/json:
            schema:
              properties:
                destination:
                  $ref: '#/components/schemas/emailSecurityMailboxDestination'
                ids:
                  description: List of message IDs to move
                  items:
                    $ref: '#/components/schemas/emailSecurityInvestigateId'
                  type: array
                  x-auditable: true
                postfix_ids:
                  deprecated: true
                  description: 'Deprecated, use `ids` instead. End of life: November 1, 2026. List of message IDs to move.'
                  items:
                    $ref: '#/components/schemas/emailSecurityPostfixId'
                  type: array
                  x-auditable: true
              required:
              - destination
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/emailSecurityMoveResponseItem'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Bulk move operation results
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Move multiple messages
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
  /accounts/{account_id}/email-security/investigate/preview:
    post:
      description: Generates a preview image for a message that was not flagged as a detection. Useful for investigating benign messages. Returns a base64-encoded PNG screenshot of the email body.
      operationId: email_security_post_preview
      requestBody:
        content:
          application/json:
            schema:
              properties:
                postfix_id:
                  $ref: '#/components/schemas/emailSecurityPostfixId'
              required:
              - postfix_id
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/emailSecurityMessagePreview'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Email preview.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Preview for non-detection messages
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      x-stackql-sdk:
        service: email_security
        resource_chain:
        - investigate
        - preview
        method: create
  /accounts/{account_id}/email-security/investigate/release:
    post:
      description: Releases one or more quarantined messages, delivering them to the intended recipients. Use when a message was incorrectly quarantined. Returns delivery status for each recipient.
      operationId: email_security_post_release
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/emailSecurityInvestigateId'
              type: array
        description: A list of investigate IDs identifying the messages to release.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/emailSecurityReleaseResponse'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Release operation results.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Release messages from quarantine
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
  /accounts/{account_id}/email-security/investigate/{investigate_id}:
    get:
      description: Retrieves comprehensive details for a specific email message including headers, recipients, sender information, and current quarantine status. Use the investigate_id from search results to fetch detailed information.
      operationId: email_security_get_message
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/emailSecurityMessageDetails'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Email message details.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get message details
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      - 'Cloud Email Security: Read'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: investigate_id
        schema:
          $ref: '#/components/schemas/emailSecurityInvestigateId'
        required: true
      - description: When true, search the submissions datastore only. When false or omitted, search the regular datastore only.
        in: query
        name: submission
        schema:
          type: boolean
      x-stackql-sdk:
        service: email_security
        resource_chain:
        - investigate
        method: get
  /accounts/{account_id}/email-security/investigate/{investigate_id}/action_log:
    get:
      description: Returns the list of post-delivery actions (moves, quarantine releases, previews, etc.) that have been applied to a specific email message.
      operationId: email_security_get_message_action_log
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/emailSecurityActionEntry'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Action log for the email
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get action log for a message
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      - 'Cloud Email Security: Read'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: investigate_id
        schema:
          $ref: '#/components/schemas/emailSecurityInvestigateId'
        required: true
  /accounts/{account_id}/email-security/investigate/{investigate_id}/detections:
    get:
      description: Returns detection details such as threat categories and sender information for non-benign messages.
      operationId: email_security_get_message_detections
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/emailSecurityMessageDetectionDetails'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Email message detection details.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get message detection details
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      - 'Cloud Email Security: Read'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: investigate_id
        schema:
          $ref: '#/components/schemas/emailSecurityInvestigateId'
        required: true
      x-stackql-sdk:
        service: email_security
        resource_chain:
        - investigate
        - detections
        method: get
  /accounts/{account_id}/email-security/investigate/{investigate_id}/move:
    post:
      description: Moves a single message to a specified mailbox folder (Inbox, JunkEmail, DeletedItems, RecoverableItemsDeletions, or RecoverableItemsPurges). Requires active integration.
      operationId: email_security_post_message_move
      requestBody:
        content:
          application/json:
            schema:
              properties:
                destination:
                  $ref: '#/components/schemas/emailSecurityMailboxDestination'
              required:
              - destination
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/emailSecurityMoveResponseItem'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Move operation results
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Move a message
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: investigate_id
        schema:
          $ref: '#/components/schemas/emailSecurityInvestigateId'
        required: true
  /accounts/{account_id}/email-security/investigate/{investigate_id}/preview:
    get:
      description: Returns a preview of the message body as a base64 encoded PNG image for non-benign messages.
      operationId: email_security_get_message_preview
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/emailSecurityMessagePreview'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Email preview
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get email preview
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      - 'Cloud Email Security: Read'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: investigate_id
        schema:
          $ref: '#/components/schemas/emailSecurityInvestigateId'
        required: true
      x-stackql-sdk:
        service: email_security
        resource_chain:
        - investigate
        - preview
        method: get
  /accounts/{account_id}/email-security/investigate/{investigate_id}/raw:
    get:
      description: Returns the raw eml of any non-benign message.
      operationId: email_security_get_message_raw
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/emailSecurityMessageRaw'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Raw email content.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get raw email content
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      - 'Cloud Email Security: Read'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: investigate_id
        schema:
          $ref: '#/components/schemas/emailSecurityInvestigateId'
        required: true
      x-stackql-sdk:
        service: email_security
        resource_chain:
        - investigate
        - raw
        method: get
  /accounts/{account_id}/email-security/investigate/{investigate_id}/reclassify:
    post:
      description: Submits a request to reclassify an email's disposition. Use for reporting false positives or false negatives. Optionally provide the raw EML content for reanalysis. The reclassification is processed asynchronously.
      operationId: email_security_post_reclassify
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailSecurityReclassifyRequest'
      responses:
        '202':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    type: object
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Reclassification request accepted.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Change email classification
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: investigate_id
        schema:
          $ref: '#/components/schemas/emailSecurityInvestigateId'
        required: true
      x-stackql-sdk:
        service: email_security
        resource_chain:
        - investigate
        - reclassify
        method: create
  /accounts/{account_id}/email-security/investigate/{investigate_id}/trace:
    get:
      description: Retrieves delivery and processing trace information for an email message. Shows the delivery path, retraction history, and move operations performed on the message. Useful for debugging delivery issues.
      operationId: email_security_get_message_trace
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  messages:
                    $ref: '#/components/schemas/emailSecurityMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/emailSecurityMessageTrace'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Email trace.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSecurityApiResponseCommonFailure'
          description: Client Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get email trace
      tags:
      - Email Security
      x-api-token-group:
      - 'Cloud Email Security: Write'
      - 'Cloud Email Security: Read'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: investigate_id
        schema:
          $ref: '#/components/schemas/emailSecurityInvestigateId'
        required: true
      x-stackql-sdk:
        service: email_security
        resource_chain:
        - investigate
        - trace
        method: get
  /accounts/{account_id}/email-security/phishguard/reports:
    get:
      description: Retrieves PhishGuard security alert reports for a specified date range. Reports include detected threats, dispositions, and contextual information. Use for security monitoring and threat analysis.
      operationId: email_security_get_phishguard_reports
      parameters:
      - description: Start of the time range (RFC3339). Takes precedence over from_date.
        in: query
        name: start
        schema:
          format: date-time
          type: string
      - description: End of the time range (RFC3339). Takes precedence over to_date.
        in: query
        name: end
        schema:
          format: date-time
          type: string
      - deprecated: true
        description: Deprecated, use `start` instead. Start date in YYYY-MM-DD format.
        in: query
        name: from_date
        schema:
          format: date
          type: string
