openapi: 3.0.3
info:
  title: turnstile API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/challenges/widgets:
    get:
      description: Lists all turnstile widgets of an account.
      operationId: accounts-turnstile-widgets-list
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/turnstileMessages'
                  messages:
                    $ref: '#/components/schemas/turnstileMessages'
                  success:
                    description: Whether the API call was successful
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/turnstileResultInfo'
                  result:
                    items:
                      $ref: '#/components/schemas/turnstileWidgetList'
                    type: array
                required:
                - success
                - errors
                - messages
          description: List Turnstile Widgets
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/turnstileApiResponseCommonFailure'
          description: List Turnstile Widgets Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Turnstile Widgets
      tags:
      - Turnstile
      x-api-token-group:
      - Turnstile Sites Write
      - Turnstile Sites Read
      - Account Settings Write
      - Account Settings Read
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 25
          description: Number of items per page.
          maximum: 1000
          minimum: 5
          type: number
      - in: query
        name: order
        schema:
          description: Field to order widgets by.
          enum:
          - id
          - sitekey
          - name
          - created_on
          - modified_on
          type: string
      - in: query
        name: direction
        schema:
          description: Direction to order widgets.
          enum:
          - asc
          - desc
          type: string
      - description: 'Filter widgets by field using case-insensitive substring matching. Format: `field:value` Supported fields: - `name` - Filter by widget name (e.g., `filter=name:login-form`) - `sitekey` - Filter by sitekey (e.g., `filter=sitekey:0x4AAA`) Returns 400 Bad Request if the field is unsupported or format is invalid. An empty filter value returns all results.'
        in: query
        name: filter
        schema:
          type: string
      x-stackql-sdk:
        service: turnstile
        resource_chain:
        - widgets
        method: list
    post:
      description: Lists challenge widgets.
      operationId: accounts-turnstile-widget-create
      requestBody:
        content:
          application/json:
            schema:
              properties:
                bot_fight_mode:
                  $ref: '#/components/schemas/turnstileBotFightMode'
                clearance_level:
                  $ref: '#/components/schemas/turnstileClearanceLevel'
                domains:
                  $ref: '#/components/schemas/turnstileDomains'
                ephemeral_id:
                  $ref: '#/components/schemas/turnstileEphemeralId'
                mode:
                  $ref: '#/components/schemas/turnstileWidgetMode'
                name:
                  $ref: '#/components/schemas/turnstileName'
                offlabel:
                  $ref: '#/components/schemas/turnstileOfflabel'
                region:
                  $ref: '#/components/schemas/turnstileRegion'
              required:
              - name
              - mode
              - domains
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/turnstileMessages'
                  messages:
                    $ref: '#/components/schemas/turnstileMessages'
                  success:
                    description: Whether the API call was successful
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/turnstileResultInfo'
                  result:
                    $ref: '#/components/schemas/turnstileWidgetDetail'
                required:
                - success
                - errors
                - messages
          description: Create Turnstile Widget Response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/turnstileApiResponseCommonFailure'
          description: Create Turnstile Widget Response Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a Turnstile Widget
      tags:
      - Turnstile
      x-api-token-group:
      - Turnstile Sites Write
      - Account Settings Write
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 25
          description: Number of items per page.
          maximum: 1000
          minimum: 5
          type: number
      - in: query
        name: order
        schema:
          description: Field to order widgets by.
          enum:
          - id
          - sitekey
          - name
          - created_on
          - modified_on
          type: string
      - in: query
        name: direction
        schema:
          description: Direction to order widgets.
          enum:
          - asc
          - desc
          type: string
      - description: 'Filter widgets by field using case-insensitive substring matching. Format: `field:value` Supported fields: - `name` - Filter by widget name (e.g., `filter=name:login-form`) - `sitekey` - Filter by sitekey (e.g., `filter=sitekey:0x4AAA`) Returns 400 Bad Request if the field is unsupported or format is invalid. An empty filter value returns all results.'
        in: query
        name: filter
        schema:
          type: string
      x-stackql-sdk:
        service: turnstile
        resource_chain:
        - widgets
        method: create
  /accounts/{account_id}/challenges/widgets/{sitekey}:
    delete:
      description: Destroy a Turnstile Widget.
      operationId: accounts-turnstile-widget-delete
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/turnstileMessages'
                  messages:
                    $ref: '#/components/schemas/turnstileMessages'
                  success:
                    description: Whether the API call was successful
                    type: boolean
                  result:
                    $ref: '#/components/schemas/turnstileWidgetDetail'
                required:
                - success
                - errors
                - messages
          description: Delete Turnstile Widget Response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/turnstileApiResponseCommonFailure'
          description: Delete Turnstile Widget Response Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete a Turnstile Widget
      tags:
      - Turnstile
      x-api-token-group:
      - Turnstile Sites Write
      - Account Settings Write
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: sitekey
        schema:
          $ref: '#/components/schemas/turnstileSitekey'
        required: true
      x-stackql-sdk:
        service: turnstile
        resource_chain:
        - widgets
        method: delete
    get:
      description: Show a single challenge widget configuration.
      operationId: accounts-turnstile-widget-get
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/turnstileMessages'
                  messages:
                    $ref: '#/components/schemas/turnstileMessages'
                  success:
                    description: Whether the API call was successful
                    type: boolean
                  result:
                    $ref: '#/components/schemas/turnstileWidgetDetail'
                required:
                - success
                - errors
                - messages
          description: Turnstile Widget Details Response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/turnstileApiResponseCommonFailure'
          description: Turnstile Widget Details Response Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Turnstile Widget Details
      tags:
      - Turnstile
      x-api-token-group:
      - Turnstile Sites Write
      - Turnstile Sites Read
      - Account Settings Write
      - Account Settings Read
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: sitekey
        schema:
          $ref: '#/components/schemas/turnstileSitekey'
        required: true
      x-stackql-sdk:
        service: turnstile
        resource_chain:
        - widgets
        method: get
    put:
      description: Update the configuration of a widget.
      operationId: accounts-turnstile-widget-update
      requestBody:
        content:
          application/json:
            schema:
              properties:
                bot_fight_mode:
                  $ref: '#/components/schemas/turnstileBotFightMode'
                clearance_level:
                  $ref: '#/components/schemas/turnstileClearanceLevel'
                domains:
                  $ref: '#/components/schemas/turnstileDomains'
                ephemeral_id:
                  $ref: '#/components/schemas/turnstileEphemeralId'
                mode:
                  $ref: '#/components/schemas/turnstileWidgetMode'
                name:
                  $ref: '#/components/schemas/turnstileName'
                offlabel:
                  $ref: '#/components/schemas/turnstileOfflabel'
                region:
                  $ref: '#/components/schemas/turnstileRegion'
              required:
              - name
              - mode
              - domains
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/turnstileMessages'
                  messages:
                    $ref: '#/components/schemas/turnstileMessages'
                  success:
                    description: Whether the API call was successful
                    type: boolean
                  result:
                    $ref: '#/components/schemas/turnstileWidgetDetail'
                required:
                - success
                - errors
                - messages
          description: Update Turnstile Widget Response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/turnstileApiResponseCommonFailure'
          description: Update Turnstile Widget Response Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update a Turnstile Widget
      tags:
      - Turnstile
      x-api-token-group:
      - Turnstile Sites Write
      - Account Settings Write
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: sitekey
        schema:
          $ref: '#/components/schemas/turnstileSitekey'
        required: true
      x-stackql-sdk:
        service: turnstile
        resource_chain:
        - widgets
        method: update
  /accounts/{account_id}/challenges/widgets/{sitekey}/rotate_secret:
    post:
      description: Generate a new secret key for this widget. If `invalidate_immediately` is set to `false`, the previous secret remains valid for 2 hours. Note that secrets cannot be rotated again during the grace period.
      operationId: accounts-turnstile-widget-rotate-secret
      requestBody:
        content:
          application/json:
            schema:
              properties:
                invalidate_immediately:
                  $ref: '#/components/schemas/turnstileInvalidateImmediately'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/turnstileMessages'
                  messages:
                    $ref: '#/components/schemas/turnstileMessages'
                  success:
                    description: Whether the API call was successful
                    type: boolean
                  result:
                    $ref: '#/components/schemas/turnstileWidgetDetail'
                required:
                - success
                - errors
                - messages
          description: Rotate Secret Response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/turnstileApiResponseCommonFailure'
          description: Rotate Secret Response Error
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Rotate Secret for a Turnstile Widget
      tags:
      - Turnstile
      x-api-token-group:
      - Turnstile Sites Write
      - Account Settings Write
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: sitekey
        schema:
          $ref: '#/components/schemas/turnstileSitekey'
        required: true
      x-stackql-sdk:
        service: turnstile
        resource_chain:
        - widgets
        method: rotate_secret
components:
  schemas:
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
      - code
      - message
      type: object
      uniqueItems: true
    turnstileApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/turnstileMessages'
        messages:
          example: []
          $ref: '#/components/schemas/turnstileMessages'
        result:
          nullable: true
          type: object
        success:
          description: Whether the API call was successful
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    turnstileBotFightMode:
      description: If bot_fight_mode is set to `true`, Cloudflare issues computationally expensive challenges in response to malicious bots (ENT only).
      example: false
      type: boolean
      x-auditable: true
    turnstileClearanceLevel:
      description: If Turnstile is embedded on a Cloudflare site and the widget should grant challenge clearance, this setting can determine the clearance level to be set
      enum:
      - no_clearance
      - jschallenge
      - managed
      - interactive
      example: interactive
      type: string
      x-auditable: true
    turnstileCreatedOn:
      description: When the widget was created.
      example: '2014-01-01T05:20:00.123123Z'
      format: date-time
      readOnly: true
      type: string
    turnstileDomains:
      example:
      - 203.0.113.1
      - cloudflare.com
      - blog.example.com
      items:
        description: Hosts as a hostname or IPv4/IPv6 address represented by strings. The widget will only work on these domains, and their subdomains.
        example: 203.0.113.1
        type: string
        x-auditable: true
      maxLength: 10
      type: array
    turnstileEphemeralId:
      description: Return the Ephemeral ID in /siteverify (ENT only).
      example: false
      type: boolean
      x-auditable: true
    turnstileInvalidateImmediately:
      default: false
      description: If `invalidate_immediately` is set to `false`, the previous secret will remain valid for two hours. Otherwise, the secret is immediately invalidated, and requests using it will be rejected.
      type: boolean
      x-auditable: true
    turnstileMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    turnstileModifiedOn:
      description: When the widget was modified.
      example: '2014-01-01T05:20:00.123123Z'
      format: date-time
      readOnly: true
      type: string
    turnstileName:
      description: Human readable widget name. Not unique. Cloudflare suggests that you set this to a meaningful string to make it easier to identify your widget, and where it is used.
      example: blog.cloudflare.com login form
      maxLength: 254
      minLength: 1
      type: string
      x-auditable: true
    turnstileOfflabel:
      description: Do not show any Cloudflare branding on the widget (ENT only).
      example: false
      type: boolean
      x-auditable: true
    turnstileRegion:
      default: world
      description: Region where this widget can be used. This cannot be changed after creation.
      enum:
      - world
      - china
      type: string
      x-auditable: true
    turnstileResultInfo:
      properties:
        count:
          description: Total number of results for the requested service
          example: 1
          type: number
        page:
          description: Current page within paginated list of results
          example: 1
          type: number
        per_page:
          description: Number of results per page of results
          example: 20
          type: number
        total_count:
          description: Total results available without any search parameters
          example: 2000
          type: number
      required:
      - page
      - per_page
      - count
      - total_count
      type: object
    turnstileSecret:
      description: Secret key for this widget.
      example: 0x4AAF00AAAABn0R22HWm098HVBjhdsYUc
      type: string
      x-sensitive: true
    turnstileSitekey:
      description: Widget item identifier tag.
      example: 0x4AAF00AAAABn0R22HWm-YUc
      maxLength: 32
      type: string
      x-auditable: true
    turnstileWidgetDetail:
      description: A Turnstile widget's detailed configuration
      properties:
        bot_fight_mode:
          $ref: '#/components/schemas/turnstileBotFightMode'
        clearance_level:
          $ref: '#/components/schemas/turnstileClearanceLevel'
        created_on:
          $ref: '#/components/schemas/turnstileCreatedOn'
          readOnly: true
        domains:
          $ref: '#/components/schemas/turnstileDomains'
        ephemeral_id:
          $ref: '#/components/schemas/turnstileEphemeralId'
        mode:
          $ref: '#/components/schemas/turnstileWidgetMode'
        modified_on:
          $ref: '#/components/schemas/turnstileModifiedOn'
          readOnly: true
        name:
          $ref: '#/components/schemas/turnstileName'
        offlabel:
          $ref: '#/components/schemas/turnstileOfflabel'
        region:
          $ref: '#/components/schemas/turnstileRegion'
        secret:
          $ref: '#/components/schemas/turnstileSecret'
        sitekey:
          $ref: '#/components/schemas/turnstileSitekey'
      required:
      - sitekey
      - secret
      - created_on
      - modified_on
      - name
      - domains
      - mode
      - region
      - bot_fight_mode
      - offlabel
      - clearance_level
      - ephemeral_id
      type: object
    turnstileWidgetList:
      description: A Turnstile Widgets configuration as it appears in listings
      properties:
        bot_fight_mode:
          $ref: '#/components/schemas/turnstileBotFightMode'
        clearance_level:
          $ref: '#/components/schemas/turnstileClearanceLevel'
        created_on:
          $ref: '#/components/schemas/turnstileCreatedOn'
          readOnly: true
        domains:
          $ref: '#/components/schemas/turnstileDomains'
        ephemeral_id:
          $ref: '#/components/schemas/turnstileEphemeralId'
        mode:
          $ref: '#/components/schemas/turnstileWidgetMode'
        modified_on:
          $ref: '#/components/schemas/turnstileModifiedOn'
          readOnly: true
        name:
          $ref: '#/components/schemas/turnstileName'
        offlabel:
          $ref: '#/components/schemas/turnstileOfflabel'
        region:
          $ref: '#/components/schemas/turnstileRegion'
        sitekey:
          $ref: '#/components/schemas/turnstileSitekey'
      required:
      - sitekey
      - created_on
      - modified_on
      - name
      - domains
      - mode
      - region
      - bot_fight_mode
      - offlabel
      - clearance_level
      - ephemeral_id
      type: object
    turnstileWidgetMode:
      description: Widget Mode
      enum:
      - non-interactive
      - invisible
      - managed
      example: invisible
      type: string
      x-auditable: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: The preferred authorization scheme for interacting with the Cloudflare API. [Create a token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: Used when interacting with the Origin CA certificates API. [View/change your key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    widgets:
      id: cloudflare.turnstile.widgets
      name: widgets
      title: Widgets
      methods:
        list:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1challenges~1widgets/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1challenges~1widgets/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .bot_fight_mode }}{{ $sep }}"bot_fight_mode": {{ toJson .bot_fight_mode }}{{- $sep = "," -}}{{ end }}

                {{- if .clearance_level }}{{ $sep }}"clearance_level": {{ toJson .clearance_level }}{{- $sep = "," -}}{{ end }}

                {{- if .domains }}{{ $sep }}"domains": {{ if eq (kindOf .domains) "string" }}{{ .domains }}{{ else }}{{ toJson .domains }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .ephemeral_id }}{{ $sep }}"ephemeral_id": {{ toJson .ephemeral_id }}{{- $sep = "," -}}{{ end }}

                {{- if .mode }}{{ $sep }}"mode": {{ toJson .mode }}{{- $sep = "," -}}{{ end }}

                {{- if .name }}{{ $sep }}"name": {{ toJson .name }}{{- $sep = "," -}}{{ end }}

                {{- if .offlabel }}{{ $sep }}"offlabel": {{ toJson .offlabel }}{{- $sep = "," -}}{{ end }}

                {{- if .region }}{{ $sep }}"region": {{ toJson .region }}{{- $sep = "," -}}{{ end }}

                }

                '
        delete:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1challenges~1widgets~1{sitekey}/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1challenges~1widgets~1{sitekey}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1challenges~1widgets~1{sitekey}/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .bot_fight_mode }}{{ $sep }}"bot_fight_mode": {{ toJson .bot_fight_mode }}{{- $sep = "," -}}{{ end }}

