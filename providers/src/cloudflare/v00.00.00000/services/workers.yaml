                items:
                  type: string
                type: array
              rootSpanName:
                description: Name of the root span that initiated the trace.
                type: string
              rootTransactionName:
                description: Logical transaction name for the root span.
                type: string
              service:
                description: List of Worker services involved in the trace.
                items:
                  type: string
                type: array
              spans:
                description: Total number of spans in the trace.
                type: number
              traceDurationMs:
                description: Total duration of the trace in milliseconds.
                type: number
              traceEndMs:
                description: Trace end time as a Unix epoch in milliseconds.
                type: number
              traceId:
                description: Unique identifier for the distributed trace.
                type: string
              traceStartMs:
                description: Trace start time as a Unix epoch in milliseconds.
                type: number
            required:
            - traceId
            - spans
            - service
            - traceStartMs
            - traceEndMs
            - traceDurationMs
            - rootSpanName
            - rootTransactionName
            type: object
          type: array
      required:
      - run
      - statistics
      type: object
    workersObservabilityQueryRun:
      description: The query run metadata including the query definition, execution status, and timeframe.
      properties:
        accountId:
          description: Cloudflare account ID that owns this query run.
          type: string
        created:
          description: ISO-8601 timestamp when the query run was created.
          type: string
        dry:
          description: Whether this was a dry run (results not persisted).
          type: boolean
        granularity:
          description: Number of time-series buckets used for the query. Higher values produce more detailed series data.
          type: number
        id:
          description: Unique identifier for this query run.
          type: string
        query:
          description: A saved query definition with its parameters, metadata, and ownership information.
          properties:
            adhoc:
              description: If the query wasn't explcitly saved
              type: boolean
            created:
              type: string
            createdBy:
              type: string
            description:
              example: Query description
              maxLength: 1000
              nullable: true
              type: string
            id:
              type: string
            name:
              description: Query name
              maxLength: 250
              minLength: 1
              type: string
            parameters:
              properties:
                calculations:
                  description: Create Calculations to compute as part of the query.
                  items:
                    properties:
                      alias:
                        type: string
                      key:
                        type: string
                      keyType:
                        enum:
                        - string
                        - number
                        - boolean
                        type: string
                      operator:
                        enum:
                        - uniq
                        - count
                        - max
                        - min
                        - sum
                        - avg
                        - median
                        - p001
                        - p01
                        - p05
                        - p10
                        - p25
                        - p75
                        - p90
                        - p95
                        - p99
                        - p999
                        - stddev
                        - variance
                        - COUNT_DISTINCT
                        - COUNT
                        - MAX
                        - MIN
                        - SUM
                        - AVG
                        - MEDIAN
                        - P001
                        - P01
                        - P05
                        - P10
                        - P25
                        - P75
                        - P90
                        - P95
                        - P99
                        - P999
                        - STDDEV
                        - VARIANCE
                        type: string
                    required:
                    - operator
                    type: object
                  type: array
                datasets:
                  description: Set the Datasets to query. Leave it empty to query all the datasets.
                  example: []
                  items:
                    type: string
                  type: array
                filterCombination:
                  description: Set a Flag to describe how to combine the filters on the query.
                  enum:
                  - and
                  - or
                  - AND
                  - OR
                  type: string
                filters:
                  description: 'Configure the Filters to apply to the query. Supports nested groups via kind: ''group''.'
                  items:
                    $ref: '#/components/schemas/workersObservabilityFilterNode'
                  type: array
                groupBys:
                  description: Define how to group the results of the query.
                  items:
                    properties:
                      type:
                        enum:
                        - string
                        - number
                        - boolean
                        type: string
                      value:
                        type: string
                    required:
                    - type
                    - value
                    type: object
                  type: array
                havings:
                  description: Configure the Having clauses that filter on calculations in the query result.
                  items:
                    properties:
                      key:
                        type: string
                      operation:
                        enum:
                        - eq
                        - neq
                        - gt
                        - gte
                        - lt
                        - lte
                        type: string
                      value:
                        type: number
                    required:
                    - key
                    - operation
                    - value
                    type: object
                  type: array
                limit:
                  description: Set a limit on the number of results / records returned by the query
                  maximum: 100
                  minimum: 0
                  type: integer
                needle:
                  description: Define an expression to search using full-text search.
                  properties:
                    isRegex:
                      type: boolean
                    matchCase:
                      type: boolean
                    value:
                      type: string
                  required:
                  - value
                  type: object
                orderBy:
                  description: Configure the order of the results returned by the query.
                  properties:
                    order:
                      description: Set the order of the results
                      enum:
                      - asc
                      - desc
                      type: string
                    value:
                      description: Configure which Calculation to order the results by.
                      type: string
                  required:
                  - value
                  type: object
              type: object
            updated:
              type: string
            updatedBy:
              type: string
          required:
          - id
          - name
          - description
          - adhoc
          - parameters
          - created
          - createdBy
          - updated
          - updatedBy
          type: object
        statistics:
          description: Query performance statistics from the database (does not include network latency).
          properties:
            abr_level:
              description: The level of Adaptive Bit Rate (ABR) sampling used for the query. If empty the ABR level is 1
              type: number
            bytes_read:
              description: Number of uncompressed bytes read from the table.
              type: number
            elapsed:
              description: Time in seconds for the query to run.
              type: number
            rows_read:
              description: Number of rows scanned from the table.
              type: number
          required:
          - elapsed
          - rows_read
          - bytes_read
          type: object
        status:
          description: Current execution status of the query run.
          enum:
          - STARTED
          - COMPLETED
          type: string
        timeframe:
          description: Time range for the query execution
          properties:
            from:
              description: Start timestamp for the query timeframe (Unix timestamp in milliseconds)
              type: number
            to:
              description: End timestamp for the query timeframe (Unix timestamp in milliseconds)
              type: number
          required:
          - to
          - from
          type: object
        updated:
          description: ISO-8601 timestamp when the query run was last updated.
          type: string
        userId:
          description: ID of the user who initiated the query run.
          type: string
      required:
      - id
      - query
      - accountId
      - timeframe
      - userId
      - status
      - granularity
      - dry
      type: object
    workersObservabilityTelemetryEvent:
      description: A single telemetry event representing a log line, span, or metric data point emitted by a Worker.
      properties:
        $containers:
          description: Cloudflare Containers event information that enriches your logs for identifying and debugging issues.
          type: object
        $metadata:
          description: Structured metadata extracted from the event. These fields are indexed and available for filtering and aggregation.
          properties:
            account:
              description: Cloudflare account identifier.
              type: string
            cloudService:
              description: Cloudflare product that generated this event (e.g. workers, pages).
              type: string
            coldStart:
              description: Whether this was a cold start (1) or warm invocation (0).
              exclusiveMinimum: true
              minimum: 0
              type: integer
            cost:
              description: Estimated cost units for this invocation.
              exclusiveMinimum: true
              minimum: 0
              type: integer
            duration:
              description: Span duration in milliseconds.
              exclusiveMinimum: true
              minimum: 0
              type: integer
            endTime:
              description: Span end time as a Unix epoch in milliseconds.
              minimum: 0
              type: integer
            error:
              description: Error message, present when the log represents an error.
              type: string
            errorTemplate:
              description: Templatized version of the error message used for grouping similar errors.
              type: string
            fingerprint:
              description: Content-based fingerprint used to group similar events.
              type: string
            id:
              description: Unique event ID. Use as the cursor value for offset-based pagination.
              type: string
            level:
              description: Log level (e.g. log, debug, info, warn, error).
              type: string
            message:
              description: Log message text.
              type: string
            messageTemplate:
              description: Templatized version of the log message used for grouping similar messages.
              type: string
            metricName:
              description: Metric name when the event represents a metric data point.
              type: string
            origin:
              description: Origin of the event (e.g. fetch, scheduled, queue).
              type: string
            parentSpanId:
              description: Span ID of the parent span in the trace hierarchy.
              type: string
            provider:
              description: Infrastructure provider identifier.
              type: string
            region:
              description: Cloudflare data center / region that handled the request.
              type: string
            requestId:
              description: Cloudflare request ID that ties all logs from a single invocation together.
              type: string
            service:
              description: Worker script name that produced this event.
              type: string
            spanId:
              description: Span ID for this individual unit of work within a trace.
              type: string
            spanName:
              description: Human-readable name for this span.
              type: string
            stackId:
              description: Stack / deployment identifier.
              type: string
            startTime:
              description: Span start time as a Unix epoch in milliseconds.
              minimum: 0
              type: integer
            statusCode:
              description: HTTP response status code returned by the Worker.
              exclusiveMinimum: true
              minimum: 0
              type: integer
            traceDuration:
              description: Total duration of the entire trace in milliseconds.
              exclusiveMinimum: true
              minimum: 0
              type: integer
            traceId:
              description: Distributed trace ID linking spans across services.
              type: string
            transactionName:
              description: Logical transaction name for this request.
              type: string
            trigger:
              description: What triggered the invocation (e.g. GET /users, POST /orders, queue message).
              type: string
            type:
              description: Event type classifier (e.g. cf-worker-event, cf-worker-log).
              type: string
            url:
              description: Request URL that triggered the Worker invocation.
              type: string
          required:
          - id
          type: object
        $workers:
          description: Cloudflare Workers event information that enriches your logs for identifying and debugging issues.
          type: object
          properties:
            durableObjectId:
              type: string
            entrypoint:
              type: string
            event:
              type: object
            eventType:
              enum:
              - fetch
              - scheduled
              - alarm
              - cron
              - queue
              - email
              - tail
              - rpc
              - websocket
              - workflow
              - unknown
              type: string
            executionModel:
              enum:
              - durableObject
              - stateless
              type: string
            outcome:
              type: string
            requestId:
              type: string
            scriptName:
              type: string
            scriptVersion:
              properties:
                id:
                  type: string
                message:
                  type: string
                tag:
                  type: string
              type: object
            spanId:
              type: string
            traceId:
              type: string
            truncated:
              type: boolean
            cpuTimeMs:
              type: number
            diagnosticsChannelEvents:
              items:
                properties:
                  channel:
                    type: string
                  message:
                    type: string
                  timestamp:
                    type: number
                required:
                - timestamp
                - channel
                - message
                type: object
              type: array
            dispatchNamespace:
              type: string
            wallTimeMs:
              type: number
          required:
          - eventType
          - requestId
          - scriptName
        dataset:
          description: The dataset this event belongs to (e.g. cloudflare-workers).
          type: string
        source:
          description: Raw log payload. May be a string or a structured object depending on how the log was emitted.
          type: string
        timestamp:
          description: Event timestamp as a Unix epoch in milliseconds.
          minimum: 0
          type: integer
      required:
      - dataset
      - timestamp
      - source
      - $metadata
      type: object
