    workersObservabilityFilterNode:
      description: 'Supports nested groups via kind: ''group''.'
      type: object
      properties:
        filterCombination:
          enum:
          - and
          - or
          - AND
          - OR
          type: string
        filters:
          items:
            $ref: '#/components/schemas/workersObservabilityFilterNode'
          minItems: 1
          type: array
        kind:
          enum:
          - group
          type: string
        key:
          description: Filter field name. Use verified keys from previous query results or the keys endpoint. Common keys include $metadata.service, $metadata.origin, $metadata.trigger, $metadata.message, and $metadata.error.
          type: string
        operation:
          description: 'Comparison operator. String operators: includes, not_includes, starts_with, regex. Existence: exists, is_null. Set membership: in, not_in (comma-separated values). Numeric: eq, neq, gt, gte, lt, lte.'
          enum:
          - includes
          - not_includes
          - starts_with
          - regex
          - exists
          - is_null
          - in
          - not_in
          - eq
          - neq
          - gt
          - gte
          - lt
          - lte
          - '='
          - '!='
          - '>'
          - '>='
          - <
          - <=
          - INCLUDES
          - DOES_NOT_INCLUDE
          - MATCH_REGEX
          - EXISTS
          - DOES_NOT_EXIST
          - IN
          - NOT_IN
          - STARTS_WITH
          type: string
        type:
          description: Data type of the filter field. Must match the actual type of the key being filtered.
          enum:
          - string
          - number
          - boolean
          type: string
        value:
          description: "Comparison value. Must match actual values in your data \u2014 verify with the values endpoint. Ensure the value type (string/number/boolean) matches the field type. String comparisons are case-sensitive. Regex uses RE2 syntax (no lookaheads/lookbehinds)."
          type: string
      required: []
    workersObservabilityPerformanceInformation:
