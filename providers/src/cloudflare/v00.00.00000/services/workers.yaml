                          groups:
                            items:
                              properties:
                                key:
                                  type: string
                                value:
                                  type: string
                              required:
                              - key
                              - value
                              type: object
                            type: array
                          interval:
                            type: number
                          lastSeen:
                            type: string
                          sampleInterval:
                            type: number
                          value:
                            type: number
                        required:
                        - value
                        - count
                        - interval
                        - sampleInterval
                        type: object
                      type: array
                    time:
                      type: string
                  required:
                  - time
                  - data
                  type: object
                type: array
            required:
            - calculation
            - aggregates
            - series
            type: object
          type: array
        compare:
          description: Comparison calculation results from the previous time period. Present when the compare option is enabled. Same structure as calculations.
          items:
            properties:
              aggregates:
                items:
                  properties:
                    count:
                      type: number
                    groups:
                      items:
                        properties:
                          key:
                            type: string
                          value:
                            type: string
                        required:
                        - key
                        - value
                        type: object
                      type: array
                    interval:
                      type: number
                    sampleInterval:
                      type: number
                    value:
                      type: number
                  required:
                  - value
                  - count
                  - interval
                  - sampleInterval
                  type: object
                type: array
              alias:
                type: string
              calculation:
                type: string
              series:
                items:
                  properties:
                    data:
                      items:
                        properties:
                          count:
                            type: number
                          firstSeen:
                            type: string
                          groups:
                            items:
                              properties:
                                key:
                                  type: string
                                value:
                                  type: string
                              required:
                              - key
                              - value
                              type: object
                            type: array
                          interval:
                            type: number
                          lastSeen:
                            type: string
                          sampleInterval:
                            type: number
                          value:
                            type: number
                        required:
                        - value
                        - count
                        - interval
                        - sampleInterval
                        type: object
                      type: array
                    time:
                      type: string
                  required:
                  - time
                  - data
                  type: object
                type: array
            required:
            - calculation
            - aggregates
            - series
            type: object
          type: array
        events:
          description: Individual event results. Present when the query view is 'events'. Contains the matching log lines and their metadata.
          properties:
            count:
              description: Total number of events matching the query (may exceed the number returned due to limits).
              type: number
