  /graphql/workers_invocations:
    post:
      operationId: graphql-workers_invocations-list
      summary: Cloudflare Workers invocation analytics for an account, grouped by script, status, and serving colo
      description: Cloudflare Workers invocation analytics for an account, grouped by script, status, and serving colo. Per-tuple totals for requests, errors, CPU time, duration (GB-s), subrequests, and response bytes.
      x-stackQL-graphQL:
        url: https://api.cloudflare.com/client/v4/graphql
        httpVerb: POST
        responseSelection:
          jsonPath: $.result[*]
        cursor:
          jsonPath: $.result[*].__no_cursor
        query: "query {\n  viewer {\n    accounts(filter: { accountTag: \"{{ .account_tag }}\" }, limit: 1) {\n      workersInvocationsAdaptive(\n        filter: { datetime_geq: \"{{ .since }}\", datetime_lt: \"{{ .until }}\" }\n        limit: {{ if .limit }}{{ .limit }}{{ else }}100{{ end }}\n        orderBy: [datetimeMinute_ASC]\n      ) {\n        dimensions {\n          datetime: datetimeMinute\n          scriptName\n          status\n          coloCode\n          usageModel\n        }\n        sum {\n          requests\n          errors\n          subrequests\n          cpuTimeUs\n          duration\n          wallTime\n          responseBodySize\n        }\n      }\n    }\n  }\n}\n"
      x-stackql-protocol: graphql
      parameters:
      - name: account_tag
        in: path
        required: true
        schema:
          type: string
        description: Cloudflare account ID (the 32-char hex tag).
      - name: since
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Lower bound (inclusive). RFC3339.
      - name: until
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Upper bound (exclusive). RFC3339.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
        description: Maximum dimension-tuple rows per call.
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        datetime:
                          type: string
                          format: date-time
                        script_name:
                          type: string
                          description: Worker script name.
                        status:
                          type: string
                          description: Invocation status (success / clientDisconnected / scriptError / etc.).
                        colo_code:
                          type: string
                          description: IATA airport code of the serving colo.
                        usage_model:
                          type: string
                          description: Usage model (bundled / unbound / etc.).
                        requests:
                          type: integer
                          description: Invocation count.
                        errors:
                          type: integer
                          description: Errored invocations.
                        subrequests:
                          type: integer
                          description: Subrequest count.
                        cpu_time_us:
                          type: integer
                          description: Total CPU time in microseconds.
                        duration_gb_s:
                          type: integer
                          description: Billable duration (GB*s units).
                        wall_time_us:
                          type: integer
                          description: Total wall time in microseconds.
                        response_body_size:
                          type: integer
                          description: Total response body bytes.
components:
  schemas:
    buildsAPIResponse:
      properties:
        errors:
          items:
            properties:
              code:
                example: 12000
                type: integer
              message:
                example: Not found
                type: string
            type: object
          type: array
        messages:
          items:
            type: string
          type: array
        result:
          nullable: true
          type: object
        result_info:
          $ref: '#/components/schemas/buildsPaginationInfo'
        success:
          example: true
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    buildsBranch:
      description: Git branch name.
      example: main
      type: string
    buildsBranchExcludes:
      example: []
      items:
        type: string
      type: array
    buildsBranchIncludes:
      example:
      - main
      items:
        type: string
      type: array
    buildsBuildCachingEnabled:
      default: false
      example: false
      type: boolean
    buildsBuildCommand:
      example: npm run build
      type: string
    buildsBuildLogsResponse:
      properties:
        cursor:
          $ref: '#/components/schemas/buildsCursor'
        lines:
          items:
            items:
              type: number
              description: Unix epoch timestamp
              example: 1636472400
            maxItems: 2
            minItems: 2
            type: array
          type: array
        truncated:
          example: false
          type: boolean
      type: object
    buildsBuildOutcome:
      enum:
      - success
      - fail
      - skipped
      - cancelled
      - terminated
      example: success
      type: string
    buildsBuildResponse:
      properties:
        build_outcome:
          $ref: '#/components/schemas/buildsBuildOutcome'
        build_trigger_metadata:
          $ref: '#/components/schemas/buildsBuildTriggerMetadataResponse'
        build_uuid:
          $ref: '#/components/schemas/buildsBuildUuid'
        created_on:
          $ref: '#/components/schemas/buildsCreatedOn'
          readOnly: true
        initializing_on:
          format: date-time
          nullable: true
          type: string
        modified_on:
          $ref: '#/components/schemas/buildsModifiedOn'
          readOnly: true
        pull_request:
          nullable: true
          properties:
            created_on:
              $ref: '#/components/schemas/buildsCreatedOn'
              readOnly: true
            pull_request_url:
              example: https://github.com/cloudflare/workers-sdk/pull/123
              format: uri
              type: string
          type: object
        running_on:
          format: date-time
          nullable: true
          type: string
        status:
          $ref: '#/components/schemas/buildsBuildStatus'
        stopped_on:
          $ref: '#/components/schemas/buildsStoppedOn'
        trigger:
          description: Trigger information without build_token_uuid
          properties:
            branch_excludes:
              $ref: '#/components/schemas/buildsBranchExcludes'
            branch_includes:
              $ref: '#/components/schemas/buildsBranchIncludes'
            build_caching_enabled:
              $ref: '#/components/schemas/buildsBuildCachingEnabled'
            build_command:
              $ref: '#/components/schemas/buildsBuildCommand'
            created_on:
              $ref: '#/components/schemas/buildsCreatedOn'
              readOnly: true
            deleted_on:
              $ref: '#/components/schemas/buildsDeletedOn'
            deploy_command:
              $ref: '#/components/schemas/buildsDeployCommand'
            external_script_id:
              $ref: '#/components/schemas/buildsExternalScriptId'
            modified_on:
              $ref: '#/components/schemas/buildsModifiedOn'
              readOnly: true
            path_excludes:
              $ref: '#/components/schemas/buildsPathExcludes'
            path_includes:
              $ref: '#/components/schemas/buildsPathIncludes'
            repo_connection:
              $ref: '#/components/schemas/buildsUpsertRepoConnectionResponse'
            root_directory:
              $ref: '#/components/schemas/buildsRootDirectory'
            trigger_name:
              $ref: '#/components/schemas/buildsTriggerName'
            trigger_uuid:
              $ref: '#/components/schemas/buildsTriggerUuid'
          type: object
      type: object
    buildsBuildSeedRepoInput:
      properties:
        branch:
          $ref: '#/components/schemas/buildsBranch'
        files:
          items:
            $ref: '#/components/schemas/buildsBuildSeedRepoInputFile'
          maxItems: 2
          type: array
        owner:
          example: cloudflare
          type: string
        path:
          example: /
          type: string
        provider:
          $ref: '#/components/schemas/buildsSCMProviderType'
        repository:
          example: workers-sdk
          type: string
      required:
      - provider
      - owner
      - repository
      - branch
      - path
      type: object
    buildsBuildSeedRepoInputFile:
      properties:
        content:
          example: 'name = "my-worker"

            main = "src/index.js"

            '
          type: string
        filename:
          example: wrangler.toml
          type: string
        isBase64:
          default: false
          type: boolean
        replace:
          description: Text to replace in the file
          type: string
      required:
      - filename
      - content
      type: object
    buildsBuildStatus:
      enum:
      - queued
      - initializing
      - running
      - stopped
      example: running
      type: string
    buildsBuildTokenName:
      example: My Build Token
      type: string
    buildsBuildTokenUuid:
      description: Build token UUID.
