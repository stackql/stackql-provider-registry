          type: string
        description:
          example: Query description
          maxLength: 1000
          nullable: true
          type: string
        id:
          type: string
        name:
          description: Query name
          maxLength: 250
          minLength: 1
          type: string
        parameters:
          properties:
            calculations:
              description: Create Calculations to compute as part of the query.
              items:
                properties:
                  alias:
                    type: string
                  key:
                    type: string
                  keyType:
                    enum:
                    - string
                    - number
                    - boolean
                    type: string
                  operator:
                    enum:
                    - uniq
                    - count
                    - max
                    - min
                    - sum
                    - avg
                    - median
                    - p001
                    - p01
                    - p05
                    - p10
                    - p25
                    - p75
                    - p90
                    - p95
                    - p99
                    - p999
                    - stddev
                    - variance
                    - COUNT_DISTINCT
                    - COUNT
                    - MAX
                    - MIN
                    - SUM
                    - AVG
                    - MEDIAN
                    - P001
                    - P01
                    - P05
                    - P10
                    - P25
                    - P75
                    - P90
                    - P95
                    - P99
                    - P999
                    - STDDEV
                    - VARIANCE
                    type: string
                required:
                - operator
                type: object
              type: array
            datasets:
              description: Set the Datasets to query. Leave it empty to query all the datasets.
              example: []
              items:
                type: string
              type: array
            filterCombination:
              description: Set a Flag to describe how to combine the filters on the query.
              enum:
              - and
              - or
              - AND
              - OR
              type: string
            filters:
              description: 'Configure the Filters to apply to the query. Supports nested groups via kind: ''group''.'
              items:
                $ref: '#/components/schemas/workersObservabilityFilterNode'
              type: array
            groupBys:
              description: Define how to group the results of the query.
              items:
                properties:
                  type:
                    enum:
                    - string
                    - number
                    - boolean
                    type: string
                  value:
                    type: string
                required:
                - type
                - value
                type: object
              type: array
            havings:
              description: Configure the Having clauses that filter on calculations in the query result.
              items:
                properties:
                  key:
                    type: string
                  operation:
                    enum:
                    - eq
                    - neq
                    - gt
                    - gte
                    - lt
                    - lte
                    type: string
                  value:
                    type: number
                required:
                - key
                - operation
                - value
                type: object
              type: array
            limit:
              description: Set a limit on the number of results / records returned by the query
              maximum: 100
              minimum: 0
              type: integer
            needle:
              description: Define an expression to search using full-text search.
              properties:
                isRegex:
                  type: boolean
                matchCase:
                  type: boolean
                value:
                  maxLength: 1000
                  type: string
              required:
              - value
              type: object
            orderBy:
              description: Configure the order of the results returned by the query.
              properties:
                order:
                  description: Set the order of the results
                  enum:
                  - asc
                  - desc
                  type: string
                value:
                  description: Configure which Calculation to order the results by.
                  type: string
              required:
              - value
              type: object
          type: object
        updated:
          type: string
        updatedBy:
          type: string
      required:
      - id
      - name
      - description
      - adhoc
      - parameters
      - created
      - createdBy
      - updated
      - updatedBy
      type: object
    workersObservabilityQueryResults:
      description: Complete results of a query run. The populated fields depend on the requested view type (events, calculations, invocations, traces, or agents).
