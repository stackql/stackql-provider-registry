openapi: 3.0.3
info:
  title: durable_objects API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/workers/durable_objects/namespaces:
    get:
      description: Returns the Durable Object namespaces owned by an account.
      operationId: durable-objects-namespace-list-namespaces
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Current page.
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - description: Items per-page.
          in: query
          name: per_page
          schema:
            default: 20
            maximum: 1000
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/workersMessages'
                  messages:
                    $ref: '#/components/schemas/workersMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/workersNamespace'
                    type: array
                required:
                  - success
                  - errors
                  - messages
          description: List Namespaces response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/workersMessages'
                  messages:
                    $ref: '#/components/schemas/workersMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/workersNamespace'
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List Namespaces response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Namespaces
      tags:
        - Durable Objects Namespace
      x-api-token-group:
        - Workers Scripts Write
        - Workers Scripts Read
      x-stackql-sdk:
        service: durable_objects
        resource_chain:
          - namespaces
        method: list
  /accounts/{account_id}/workers/durable_objects/namespaces/{id}/objects:
    get:
      description: Returns the Durable Objects in a given namespace.
      operationId: durable-objects-namespace-list-objects
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Resource ID.
          schema:
            type: string
        - in: query
          name: limit
          schema:
            default: 1000
            description: >-
              The number of objects to return. The cursor attribute may be used
              to iterate over the next batch of objects if there are more than
              the limit.
            maximum: 10000
            minimum: 10
            type: number
        - in: query
          name: cursor
          schema:
            description: >-
              Opaque token indicating the position from which to continue when
              requesting the next set of records. A valid value for the cursor
              can be obtained from the cursors object in the result_info
              structure.
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/workersMessages'
                  messages:
                    $ref: '#/components/schemas/workersMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total results returned based on your list parameters.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                      cursor:
                        $ref: '#/components/schemas/workersCursor'
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/workersObject'
                    type: array
                required:
                  - success
                  - errors
                  - messages
          description: List Objects response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/workersMessages'
                  messages:
                    $ref: '#/components/schemas/workersMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total results returned based on your list parameters.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                      cursor:
                        $ref: '#/components/schemas/workersCursor'
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/workersObject'
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List Objects response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Objects
      tags:
        - Durable Objects Namespace
      x-api-token-group:
        - Workers Scripts Write
        - Workers Scripts Read
      x-stackql-sdk:
        service: durable_objects
        resource_chain:
          - namespaces
          - objects
        method: list
components:
  schemas:
    workersCursor:
      description: >-
        Opaque token indicating the position from which to continue when
        requesting the next set of records. A valid value for the cursor can be
        obtained from the cursors object in the result_info structure.
      example: >-
        AAAAANuhDN7SjacTnSVsDu3WW1Lvst6dxJGTjRY5BhxPXdf6L6uTcpd_NVtjhn11OUYRsVEykxoUwF-JQU4dn6QylZSKTOJuG0indrdn_MlHpMRtsxgXjs-RPdHYIVm3odE_uvEQ_dTQGFm8oikZMohns34DLBgrQpc
      type: string
    workersMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    workersNamespace:
      properties:
        class:
          type: string
        id:
          readOnly: true
          type: string
        name:
          type: string
        script:
          type: string
        use_sqlite:
          type: boolean
      type: object
    workersObject:
      properties:
        hasStoredData:
          description: Whether the Durable Object has stored data.
          example: true
          readOnly: true
          type: boolean
        id:
          description: ID of the Durable Object.
          example: fe7803fc55b964e09d94666545aab688d360c6bda69ba349ced1e5f28d2fc2c8
          readOnly: true
          type: string
      type: object
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    namespaces:
      id: cloudflare.durable_objects.namespaces
      name: namespaces
      title: Namespaces
      methods:
        list:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1workers~1durable_objects~1namespaces/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/namespaces/methods/list'
        insert: []
        update: []
        delete: []
        replace: []
    objects:
      id: cloudflare.durable_objects.objects
      name: objects
      title: Objects
      methods:
        list:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1workers~1durable_objects~1namespaces~1{id}~1objects/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/objects/methods/list'
        insert: []
        update: []
        delete: []
        replace: []
