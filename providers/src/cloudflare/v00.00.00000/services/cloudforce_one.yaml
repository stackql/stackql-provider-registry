        in: query
        name: datasetIds
        schema:
          description: Dataset IDs to query indicators from (array of UUIDs), or special value 'all' or '*' to query all datasets. If not provided, uses the default dataset.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: page
        schema:
          type: number
      - in: query
        name: pageSize
        schema:
          type: number
      - description: 'Structured search as a JSON array of {field, op, value} objects. Searchable fields: value, indicatorType. Supports operators: equals, not, contains, startsWith, endsWith, gt, lt, gte, lte, like, in, find. Use the ''in'' operator with an array value to bulk-check up to 100 indicators in a single request, e.g. search=[{"field":"value","op":"in","value":["evil.com","bad.org"]}]. Multiple conditions are AND''d together. Max 10 conditions per request.'
        in: query
        name: search
        schema:
          description: 'Structured search as a JSON array of {field, op, value} objects. Searchable fields: value, indicatorType. Supports operators: equals, not, contains, startsWith, endsWith, gt, lt, gte, lte, like, in, find. Use the ''in'' operator with an array value to bulk-check up to 100 indicators in a single request, e.g. search=[{"field":"value","op":"in","value":["evil.com","bad.org"]}]. Multiple conditions are AND''d together. Max 10 conditions per request.'
          items:
            properties:
              field:
                description: 'The indicator field to search on. Allowed: value, indicatorType.'
                enum:
                - value
                - indicatorType
                type: string
              op:
                description: Search operator. Use 'in' for bulk lookup of up to 100 values at once, e.g. {field:'value', op:'in', value:['evil.com','bad.org']}.
                enum:
                - equals
                - not
                - gt
                - gte
                - lt
                - lte
                - like
                - contains
                - startsWith
                - endsWith
                - in
                - find
                type: string
              value:
                description: Search value. String for most operators. Array of strings for 'in' operator (max 100 items).
                type: string
                items:
                  type: string
