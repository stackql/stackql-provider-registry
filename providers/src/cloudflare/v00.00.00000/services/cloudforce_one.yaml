openapi: 3.0.3
info:
  title: cloudforce_one API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/cloudforce-one/binary:
    post:
      operationId: post_BinDBPost
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  description: The binary file content to upload.
                  format: binary
                  type: string
              required:
              - file
              type: object
        description: Binary file to be uploaded to the database.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  content_type:
                    type: string
                  md5:
                    type: string
                  sha1:
                    type: string
                  sha256:
                    type: string
                required:
                - md5
                - sha1
                - sha256
                - content_type
                type: object
          description: Returns file information
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Posts a file to Binary Storage
      tags:
      - BinDB
      x-api-token-group:
      - Cloudforce One Write
      - Cloudforce One Read
      x-stackql-sdk:
        service: cloudforce_one
        resource_chain:
        - binary_storage
        method: create
  /accounts/{account_id}/cloudforce-one/binary/{hash}:
    get:
      operationId: get_BinDBGetBinary
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: hash of the binary
        in: path
        name: hash
        schema:
          description: hash of the binary
          type: string
        required: true
      responses:
        '200':
          description: Returns file information
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Retrieves a file from Binary Storage
      tags:
      - BinDB
      x-api-token-group:
      - Cloudforce One Write
      - Cloudforce One Read
      x-stackql-sdk:
        service: cloudforce_one
        resource_chain:
        - binary_storage
        method: get
  /accounts/{account_id}/cloudforce-one/events:
    get:
      description: Use `datasetId=all` or `datasetId=*` to query all event datasets for the account (limited to 10). When `datasetId` is unspecified, events are listed from the default Cloudforce One Threat Events dataset. To list existing datasets, use the [`List Datasets`](https://developers.cloudflare.com/api/resources/cloudforce_one/subresources/threat_events/subresources/datasets/methods/list/) endpoint.
      operationId: get_EventListGet
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: cursor
        schema:
          description: Cursor for pagination. When provided, filters are embedded in the cursor so you only need to pass cursor and pageSize. Returned in the previous response's result_info.cursor field. Use cursor-based pagination for deep pagination (beyond 100,000 records) or for optimal performance.
          type: string
      - in: query
        name: search
        schema:
          default: []
          items:
            properties:
              field:
                description: 'Event field to search on. Allowed: attacker, attackerCountry, category, createdAt, date, event, indicator, indicatorType, killChain, mitreAttack, tags, targetCountry, targetIndustry, tlp, uuid.'
                type: string
              op:
                description: Search operator. Use 'in' for bulk lookup of up to 100 values at once, e.g. {field:'tags', op:'in', value:['malware','apt']}.
                enum:
                - equals
                - not
                - gt
                - gte
                - lt
                - lte
                - like
                - contains
                - startsWith
                - endsWith
                - in
                - find
                type: string
              value:
                description: Search value. String or number for most operators. Array for 'in' operator (max 100 items).
                type: string
                items:
                  type: string
            type: object
          type: array
        explode: true
      - in: query
        name: page
        schema:
          description: Page number (1-indexed) for offset-based pagination. Limited to offset of 100,000 records. For deep pagination, use cursor-based pagination instead.
          type: number
      - in: query
        name: pageSize
        schema:
          description: Number of results per page. Maximum 25,000.
          type: number
      - in: query
        name: orderBy
        schema:
          type: string
      - in: query
        name: order
        schema:
          enum:
          - asc
          - desc
          type: string
      - in: query
        name: datasetId
        schema:
          description: Dataset IDs to query events from (array of UUIDs), or special value 'all' or '*' to query all event datasets for the account. If not provided, uses the default dataset.
          items:
            type: string
          type: array
        explode: true
      - in: query
        name: forceRefresh
        schema:
          type: boolean
      - in: query
        name: format
        schema:
          enum:
          - json
          - stix2
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  properties:
                    attacker:
                      type: string
                    attackerCountry:
                      type: string
                    category:
                      type: string
                    datasetId:
                      type: string
                    date:
                      type: string
                    event:
                      type: string
                    hasChildren:
                      type: boolean
                    indicator:
                      type: string
                    indicatorType:
                      type: string
                    indicatorTypeId:
                      type: number
                    insight:
                      type: string
                    killChain:
                      type: number
                    mitreAttack:
                      items:
                        type: string
                      type: array
                    mitreCapec:
                      items:
                        type: string
                      type: array
                    numReferenced:
                      type: number
                    numReferences:
                      type: number
                    rawId:
                      type: string
                    referenced:
                      items:
                        type: string
                      type: array
                    referencedIds:
                      items:
                        type: number
                      type: array
                    references:
                      items:
                        type: string
                      type: array
                    referencesIds:
                      items:
                        type: number
                      type: array
                    releasabilityId:
                      type: string
                    tags:
                      items:
                        type: string
                      type: array
                    targetCountry:
                      type: string
                    targetIndustry:
                      type: string
                    tlp:
                      type: string
                    uuid:
                      type: string
                  required:
                  - uuid
                  - date
                  - targetCountry
                  - attacker
                  - attackerCountry
                  - targetIndustry
                  - rawId
                  - indicatorTypeId
                  - indicator
                  - event
                  - numReferenced
                  - numReferences
                  - tlp
                  - category
                  - indicatorType
                  - referenced
                  - references
                  - tags
                  - killChain
                  - mitreAttack
                  - mitreCapec
                  - referencedIds
                  - referencesIds
                  - hasChildren
                  - datasetId
                  type: object
                type: array
          description: Returns a list of events.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Filter and list events
      tags:
      - Event
      x-api-token-group:
      - Cloudforce One Write
      - Cloudforce One Read
      x-stackql-sdk:
        service: cloudforce_one
        resource_chain:
        - threat_events
        method: list
  /accounts/{account_id}/cloudforce-one/events/aggregate:
    get:
      description: Aggregate threat events by one or more columns (e.g., attacker, targetIndustry) with optional date filtering and daily grouping. Supports multi-dimensional aggregation for cross-analysis.
      operationId: get_EventAggregate
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Column(s) to aggregate by - single column or comma-separated list (e.g., 'attacker', 'targetIndustry', 'attacker,targetIndustry')
        in: query
        name: aggregateBy
        schema:
          description: Column(s) to aggregate by - single column or comma-separated list (e.g., 'attacker', 'targetIndustry', 'attacker,targetIndustry')
          type: string
      - description: Dataset ID(s) to filter by. Can be a single dataset ID, comma-separated list, or array. If not provided, uses default dataset
        in: query
        name: datasetId
        schema:
          description: Dataset ID(s) to filter by. Can be a single dataset ID, comma-separated list, or array. If not provided, uses default dataset
          items:
            type: string
          type: array
        explode: true
      - description: Start date for filtering (ISO 8601 format, e.g., '2024-01-01')
        in: query
        name: startDate
        schema:
          description: Start date for filtering (ISO 8601 format, e.g., '2024-01-01')
          type: string
      - description: End date for filtering (ISO 8601 format, e.g., '2024-12-31')
        in: query
        name: endDate
        schema:
          description: End date for filtering (ISO 8601 format, e.g., '2024-12-31')
          type: string
      - description: Whether to group results by date (daily aggregation)
        in: query
        name: groupByDate
        schema:
          description: Whether to group results by date (daily aggregation)
          type: boolean
      - description: Maximum number of results to return
        in: query
        name: limit
        schema:
          default: 100
          description: Maximum number of results to return
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  aggregateBy:
                    description: Column(s) that were aggregated by
                    type: string
                  aggregations:
                    description: Array of aggregation results with dynamic fields based on aggregateBy columns
                    items:
                      type: object
                      properties:
                        count:
                          description: Number of events for this aggregation
                          type: number
                        date:
                          description: Date (if groupByDate is true)
                          type: string
                      required:
                      - count
                    type: array
                  dateRange:
                    description: Date range used for filtering
                    properties:
                      endDate:
                        type: string
                      startDate:
                        type: string
                    type: object
                  total:
                    description: Total number of events in the aggregation
                    type: number
                required:
                - aggregations
                - total
                - aggregateBy
                type: object
          description: Returns aggregated event data.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Aggregate events by single or multiple columns with optional date filtering
      tags:
      - Event
      x-api-token-group:
      - Cloudforce One Write
      - Cloudforce One Read
  /accounts/{account_id}/cloudforce-one/events/attackers:
    get:
      operationId: get_AttackerList
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Array of dataset IDs to query attackers from. If not provided, uses the default dataset.
        in: query
        name: datasetIds
        schema:
          description: Array of dataset IDs to query attackers from. If not provided, uses the default dataset.
          items:
            type: string
          type: array
        explode: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  items:
                    properties:
                      type:
                        type: string
                    required:
                    - type
                    type: object
                  type:
                    type: string
                required:
                - type
                - items
                type: object
          description: Returns a list of attackers.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Lists attackers across multiple datasets
      tags:
      - Attacker
      x-api-token-group:
      - Cloudforce One Write
      - Cloudforce One Read
      x-stackql-sdk:
        service: cloudforce_one
        resource_chain:
        - threat_events
        - attackers
        method: list
  /accounts/{account_id}/cloudforce-one/events/categories:
    get:
      operationId: get_CategoryList
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Array of dataset IDs to query categories from. If not provided, uses the default dataset.
        in: query
        name: datasetIds
        schema:
          description: Array of dataset IDs to query categories from. If not provided, uses the default dataset.
          items:
            type: string
          type: array
        explode: true
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  properties:
                    killChain:
                      type: number
                    mitreAttack:
                      items:
                        type: string
                      type: array
                    mitreCapec:
                      items:
                        type: string
                      type: array
                    name:
                      type: string
                    shortname:
                      type: string
                    uuid:
                      type: string
                  required:
                  - uuid
                  - name
                  - killChain
                  type: object
                type: array
          description: Returns a list of categories.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Lists categories across multiple datasets
      tags:
      - Category
      x-api-token-group:
      - Cloudforce One Write
      - Cloudforce One Read
      x-stackql-sdk:
        service: cloudforce_one
        resource_chain:
        - threat_events
        - categories
        method: list
  /accounts/{account_id}/cloudforce-one/events/categories/catalog:
    get:
      operationId: get_CategoryListComplete
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  properties:
                    killChain:
                      type: number
                    mitreAttack:
                      items:
                        type: string
                      type: array
                    mitreCapec:
                      items:
                        type: string
                      type: array
                    name:
                      type: string
                    shortname:
                      type: string
                    uuid:
                      type: string
                  required:
                  - uuid
                  - name
                  - killChain
                  type: object
                type: array
          description: Returns a list of categories.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Lists categories
      tags:
      - Category
      x-api-token-group:
      - Cloudforce One Write
      - Cloudforce One Read
  /accounts/{account_id}/cloudforce-one/events/categories/create:
    post:
      operationId: post_CategoryCreate
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                killChain:
                  type: number
                mitreAttack:
                  items:
                    type: string
                  type: array
                mitreCapec:
                  items:
                    type: string
                  type: array
                name:
                  type: string
                shortname:
                  type: string
              required:
              - name
              - killChain
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  killChain:
                    type: number
                  mitreAttack:
                    items:
                      type: string
                    type: array
                  mitreCapec:
                    items:
                      type: string
                    type: array
                  name:
                    type: string
                  shortname:
                    type: string
                  uuid:
                    type: string
                required:
                - uuid
                - name
                - killChain
                type: object
          description: Returns the created category.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Creates a new category
      tags:
      - Category
      x-api-token-group:
      - Cloudforce One Write
      - Cloudforce One Read
      x-stackql-sdk:
        service: cloudforce_one
        resource_chain:
        - threat_events
        - categories
        method: create
  /accounts/{account_id}/cloudforce-one/events/categories/{category_id}:
    delete:
      operationId: delete_CategoryDelete
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Category UUID.
        in: path
        name: category_id
        schema:
          description: Category UUID.
          format: uuid
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  uuid:
                    type: string
                required:
                - uuid
                type: object
          description: Returns the uuid of the deleted category.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Deletes a category
      tags:
      - Category
      x-api-token-group:
      - Cloudforce One Write
      x-stackql-sdk:
        service: cloudforce_one
        resource_chain:
        - threat_events
        - categories
        method: delete
    get:
      operationId: get_CategoryRead
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Category UUID.
        in: path
        name: category_id
        schema:
          description: Category UUID.
          format: uuid
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  killChain:
                    type: number
                  mitreAttack:
                    items:
                      type: string
                    type: array
                  mitreCapec:
                    items:
                      type: string
                    type: array
                  name:
                    type: string
                  shortname:
                    type: string
                  uuid:
                    type: string
                required:
                - uuid
                - name
                - killChain
                type: object
          description: Returns a category.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Reads a category
      tags:
      - Category
      x-api-token-group:
      - Cloudforce One Write
      - Cloudforce One Read
      x-stackql-sdk:
        service: cloudforce_one
        resource_chain:
        - threat_events
        - categories
        method: get
    patch:
      operationId: patch_CategoryUpdate
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Category UUID.
        in: path
        name: category_id
        schema:
          description: Category UUID.
          format: uuid
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              properties:
                killChain:
                  type: number
                mitreAttack:
                  items:
                    type: string
                  type: array
                mitreCapec:
                  items:
                    type: string
                  type: array
                name:
                  type: string
                shortname:
                  type: string
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  killChain:
                    type: number
                  mitreAttack:
                    items:
                      type: string
                    type: array
                  mitreCapec:
                    items:
                      type: string
                    type: array
                  name:
                    type: string
                  shortname:
                    type: string
                  uuid:
                    type: string
                required:
                - uuid
                - name
                - killChain
                type: object
          description: Returns the updated category.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
      security:
      - api_token: []
      summary: Updates a category
      tags:
      - Category
      x-api-token-group:
      - Cloudforce One Write
      x-stackql-sdk:
        service: cloudforce_one
        resource_chain:
        - threat_events
        - categories
        method: edit
    post:
      operationId: post_CategoryUpdate
      parameters:
      - name: account_id
