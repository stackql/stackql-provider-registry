                eventIds:
                  description: List of event UUIDs to update (1-100)
                  items:
                    type: string
                  maxItems: 100
                  minItems: 1
                  type: array
                updates:
                  description: Fields to update on all specified events. All fields including 'insight' are supported, except 'date' which requires shard migration.
                  properties:
                    attacker:
                      nullable: true
                      type: string
                    attackerCountry:
                      type: string
                    category:
                      type: string
                    createdAt:
                      format: date-time
                      type: string
                    event:
                      type: string
                    indicator:
                      type: string
                    indicatorType:
                      type: string
                    insight:
                      type: string
                    raw:
                      properties:
                        data:
                          nullable: true
                          type: object
                        source:
                          type: string
                        tlp:
                          type: string
                      type: object
                    targetCountry:
                      type: string
                    targetIndustry:
                      type: string
                    tlp:
                      type: string
                  type: object
              required:
              - eventIds
              - datasetId
              - updates
              type: object
