  /accounts/{account_id}/cloudforce-one/v2/brand-protection/logo/search:
    post:
      description: Submit an image and find the n closest matches from the scanned images index without creating any match records. Returns similarity scores and metadata for each match.
      operationId: post_SearchLogoSimilarity
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: 'Include scanned images without domain metadata (historic data). Default: false (only show images with domain)'
        in: query
        name: showHistoric
        schema:
          default: 'false'
          description: 'Include scanned images without domain metadata (historic data). Default: false (only show images with domain)'
          type: string
      - description: If true, include base64-encoded image data in the response
        in: query
        name: download
        schema:
          description: If true, include base64-encoded image data in the response
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                image_data:
                  description: Base64 encoded image data. Can include data URI prefix (e.g., 'data:image/png;base64,...') or just the base64 string.
                  minLength: 1
                  type: string
                score_threshold:
                  default: 0
                  description: 'Minimum similarity score threshold for matches (0-1, default: 0)'
                  maximum: 1
                  minimum: 0
                  type: number
                top_k:
                  default: 10
                  description: 'Number of closest matches to return (1-100, default: 10)'
                  maximum: 100
                  minimum: 1
                  type: integer
              required:
              - image_data
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  matches:
                    items:
                      properties:
                        account_id:
                          type: string
                        content_type:
                          description: MIME type of the image (only present when download=true)
                          type: string
                        domain:
                          type: string
                        image_data:
                          description: Base64-encoded image data (only present when download=true)
                          type: string
                        query_id:
                          type: integer
                        r2_path:
                          type: string
                        similarity_score:
                          type: number
                        similarity_threshold:
                          type: number
                        tag:
                          type: string
                        timestamp:
                          type: number
                        url_scan_id:
                          type: string
                        vector_id:
                          type: string
                      required:
                      - similarity_score
                      type: object
                    type: array
                required:
                - matches
                type: object
          description: Scanned images search completed successfully
      security:
      - api_token: []
      summary: Search scanned images
      tags:
      - Brand Protection
      x-api-token-group:
      - Cloudforce One Write
