                    items:
                      properties:
                        error:
                          type: string
                        eventId:
                          type: string
                      required:
                      - eventId
                      - error
                      type: object
                    type: array
                  updatedCount:
                    type: number
                required:
                - updatedCount
                - failedCount
                type: object
          description: Returns the count of updated events and any failures.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request.
