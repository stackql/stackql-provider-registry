openapi: 3.0.3
info:
  title: rum API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/rum/site_info:
    post:
      description: Creates a new Web Analytics site.
      operationId: web-analytics-create-site
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rumCreateSiteRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumSiteResponseSingle'
          description: Created Web Analytics site.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a Web Analytics site
      tags:
      - Web Analytics
      x-api-token-group:
      - Account Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - site_info
        method: create
  /accounts/{account_id}/rum/site_info/list:
    get:
      description: Lists all Web Analytics sites of an account.
      operationId: web-analytics-list-sites
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: per_page
        schema:
          $ref: '#/components/schemas/rumPerPage'
      - in: query
        name: page
        schema:
          $ref: '#/components/schemas/rumPage'
      - in: query
        name: order_by
        schema:
          $ref: '#/components/schemas/rumOrderBy'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumSitesResponseCollection'
          description: List of Web Analytics sites.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Web Analytics sites
      tags:
      - Web Analytics
      x-api-token-group:
      - Account Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - site_info
        method: list
  /accounts/{account_id}/rum/site_info/{site_id}:
    delete:
      description: Deletes an existing Web Analytics site.
      operationId: web-analytics-delete-site
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: site_id
        in: path
        required: true
        description: The site ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumSiteTagResponseSingle'
          description: Deleted Web Analytics site identifier.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete a Web Analytics site
      tags:
      - Web Analytics
      x-api-token-group:
      - Account Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - site_info
        method: delete
    get:
      description: Retrieves a Web Analytics site.
      operationId: web-analytics-get-site
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: site_id
        in: path
        required: true
        description: The site ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumSiteResponseSingle'
          description: Web Analytics site.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get a Web Analytics site
      tags:
      - Web Analytics
      x-api-token-group:
      - Account Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - site_info
        method: get
    put:
      description: Updates an existing Web Analytics site.
      operationId: web-analytics-update-site
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: site_id
        in: path
        required: true
        description: The site ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rumUpdateSiteRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumSiteResponseSingle'
          description: Updated Web Analytics site.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update a Web Analytics site
      tags:
      - Web Analytics
      x-api-token-group:
      - Account Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - site_info
        method: update
  /accounts/{account_id}/rum/v2/{ruleset_id}/rule:
    post:
      description: Creates a new rule in a Web Analytics ruleset.
      operationId: web-analytics-create-rule
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: ruleset_id
        in: path
        required: true
        description: The ruleset ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rumCreateRuleRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumRuleResponseSingle'
          description: Created Web Analytics rule.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a Web Analytics rule
      tags:
      - Web Analytics
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - rules
        method: create
  /accounts/{account_id}/rum/v2/{ruleset_id}/rule/{rule_id}:
    delete:
      description: Deletes an existing rule from a Web Analytics ruleset.
      operationId: web-analytics-delete-rule
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: ruleset_id
        in: path
        required: true
        description: The ruleset ID.
        schema:
          type: string
      - name: rule_id
        in: path
        required: true
        description: The rule ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumRuleIdResponseSingle'
          description: Deleted Web Analytics rule identifier.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete a Web Analytics rule
      tags:
      - Web Analytics
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - rules
        method: delete
    put:
      description: Updates a rule in a Web Analytics ruleset.
      operationId: web-analytics-update-rule
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: ruleset_id
        in: path
        required: true
        description: The ruleset ID.
        schema:
          type: string
      - name: rule_id
        in: path
        required: true
        description: The rule ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rumCreateRuleRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumRuleResponseSingle'
          description: Updated Web Analytics rule.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update a Web Analytics rule
      tags:
      - Web Analytics
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - rules
        method: update
  /accounts/{account_id}/rum/v2/{ruleset_id}/rules:
    get:
      description: Lists all the rules in a Web Analytics ruleset.
      operationId: web-analytics-list-rules
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: ruleset_id
        in: path
        required: true
        description: The ruleset ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumRulesResponseCollection'
          description: List of Web Analytics rules in the ruleset.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List rules in Web Analytics ruleset
      tags:
      - Web Analytics
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - rules
        method: list
    post:
      description: Modifies one or more rules in a Web Analytics ruleset with a single request.
      operationId: web-analytics-modify-rules
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: ruleset_id
        in: path
        required: true
        description: The ruleset ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rumModifyRulesRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumRulesResponseCollection'
          description: List of modified Web Analytics rules.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rumApiResponseCommonFailure'
          description: Failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update Web Analytics rules
      tags:
      - Web Analytics
      x-api-token-group:
      - Account Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: rum
        resource_chain:
        - rules
        method: bulk_create
components:
  schemas:
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
      - code
      - message
      type: object
      uniqueItems: true
    rumApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/rumSchemasMessages'
        messages:
          example: []
          $ref: '#/components/schemas/rumSchemasMessages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    rumAutoInstall:
      description: If enabled, the JavaScript snippet is automatically injected for orange-clouded sites.
      example: true
      type: boolean
      x-auditable: true
    rumCreateRuleRequest:
      properties:
        host:
          example: example.com
          type: string
        inclusive:
          description: Whether the rule includes or excludes traffic from being measured.
          example: true
          type: boolean
        is_paused:
          description: Whether the rule is paused or not.
          example: false
          type: boolean
        paths:
          example:
          - '*'
          items:
            type: string
          type: array
      type: object
    rumCreateSiteRequest:
      properties:
        auto_install:
          $ref: '#/components/schemas/rumAutoInstall'
        host:
          $ref: '#/components/schemas/rumHost'
        zone_tag:
          $ref: '#/components/schemas/rumZoneTag'
      type: object
    rumEnabled:
      description: Enables or disables RUM. This option can be used only when auto_install is set to true.
      example: true
      type: boolean
      x-auditable: true
    rumHost:
      description: The hostname to use for gray-clouded sites.
      example: example.com
      type: string
      x-auditable: true
    rumLite:
      description: If enabled, the JavaScript snippet will not be injected for visitors from the EU.
      type: boolean
      x-auditable: true
    rumMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    rumModifyRulesRequest:
      properties:
        delete_rules:
          description: A list of rule identifiers to delete.
          items:
            $ref: '#/components/schemas/rumRuleIdentifier'
          type: array
        rules:
          description: A list of rules to create or update.
          items:
            properties:
              host:
                example: example.com
                type: string
              id:
                $ref: '#/components/schemas/rumRuleIdentifier'
              inclusive:
                example: true
                type: boolean
              is_paused:
                example: false
                type: boolean
              paths:
                example:
                - '*'
                items:
                  type: string
                type: array
            type: object
          type: array
      type: object
    rumOrderBy:
      description: The property used to sort the list of results.
      enum:
      - host
      - created
      example: host
      type: string
    rumPage:
      description: Current page within the paginated list of results.
      example: 1
      type: number
    rumPerPage:
      description: Number of items to return per page of results.
      example: 10
      type: number
    rumResultInfo:
      properties:
        count:
          description: The total number of items on the current page.
          example: 10
          type: integer
        page:
          description: Current page within the paginated list of results.
          example: 1
          type: integer
        per_page:
          description: The maximum number of items to return per page of results.
          example: 10
          type: integer
        total_count:
          description: The total number of items.
          example: 25
          type: integer
        total_pages:
          description: The total number of pages.
          example: 3
          nullable: true
          type: integer
      type: object
    rumRule:
      properties:
        created:
          $ref: '#/components/schemas/rumTimestamp'
        host:
          description: The hostname the rule will be applied to.
          example: example.com
          type: string
          x-auditable: true
        id:
          $ref: '#/components/schemas/rumRuleIdentifier'
        inclusive:
          description: Whether the rule includes or excludes traffic from being measured.
          example: true
          type: boolean
          x-auditable: true
        is_paused:
          description: Whether the rule is paused or not.
          example: false
          type: boolean
          x-auditable: true
        paths:
          description: The paths the rule will be applied to.
          example:
          - '*'
          items:
            type: string
            x-auditable: true
          type: array
        priority:
          example: 1000
          type: number
          x-auditable: true
      type: object
    rumRuleIdResponseSingle:
      properties:
        errors:
          $ref: '#/components/schemas/rumMessages'
        messages:
          $ref: '#/components/schemas/rumMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
        result:
          properties:
            id:
              $ref: '#/components/schemas/rumRuleIdentifier'
          type: object
      required:
      - success
      - errors
      - messages
      type: object
    rumRuleIdentifier:
      description: The Web Analytics rule identifier.
      example: f174e90a-fafe-4643-bbbc-4a0ed4fc8415
      type: string
      x-auditable: true
    rumRuleResponseSingle:
      properties:
        errors:
          $ref: '#/components/schemas/rumMessages'
        messages:
          $ref: '#/components/schemas/rumMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/rumRule'
      required:
      - success
      - errors
      - messages
      type: object
    rumRules:
      description: A list of rules.
      items:
        $ref: '#/components/schemas/rumRule'
      type: array
    rumRulesResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/rumMessages'
        messages:
          $ref: '#/components/schemas/rumMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
        result:
          properties:
            rules:
              $ref: '#/components/schemas/rumRules'
            ruleset:
              $ref: '#/components/schemas/rumRuleset'
          type: object
      required:
      - success
      - errors
      - messages
      type: object
    rumRuleset:
      properties:
        enabled:
          description: Whether the ruleset is enabled.
          example: true
          type: boolean
        id:
          $ref: '#/components/schemas/rumRulesetIdentifier'
        zone_name:
          example: example.com
          type: string
        zone_tag:
          $ref: '#/components/schemas/rumZoneTag'
      type: object
    rumRulesetIdentifier:
      description: The Web Analytics ruleset identifier.
      example: f174e90a-fafe-4643-bbbc-4a0ed4fc8415
      type: string
      x-auditable: true
    rumSchemasMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
        - code
        - message
        type: object
        uniqueItems: true
      type: array
    rumSite:
      properties:
        auto_install:
          $ref: '#/components/schemas/rumAutoInstall'
        created:
          $ref: '#/components/schemas/rumTimestamp'
        rules:
          $ref: '#/components/schemas/rumRules'
        ruleset:
          $ref: '#/components/schemas/rumRuleset'
        site_tag:
          $ref: '#/components/schemas/rumSiteTag'
        site_token:
          $ref: '#/components/schemas/rumSiteToken'
        snippet:
          $ref: '#/components/schemas/rumSnippet'
      type: object
    rumSiteResponseSingle:
      properties:
        errors:
          $ref: '#/components/schemas/rumMessages'
        messages:
          $ref: '#/components/schemas/rumMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/rumSite'
      required:
      - success
      - errors
      - messages
      type: object
    rumSiteTag:
      description: The Web Analytics site identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      type: string
      x-auditable: true
    rumSiteTagResponseSingle:
      properties:
        errors:
          $ref: '#/components/schemas/rumMessages'
        messages:
          $ref: '#/components/schemas/rumMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
        result:
          properties:
            site_tag:
              $ref: '#/components/schemas/rumSiteTag'
          type: object
      required:
      - success
      - errors
      - messages
      type: object
    rumSiteToken:
      description: The Web Analytics site token.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      type: string
      x-auditable: true
    rumSitesResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/rumMessages'
        messages:
          $ref: '#/components/schemas/rumMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
        result:
          items:
            $ref: '#/components/schemas/rumSite'
          type: array
        result_info:
          $ref: '#/components/schemas/rumResultInfo'
      required:
      - success
      - errors
      - messages
      type: object
    rumSnippet:
      description: Encoded JavaScript snippet.
      example: '<!-- Cloudflare Web Analytics --><script defer src=''https://static.cloudflareinsights.com/beacon.min.js'' data-cf-beacon=''{"token": "bc40a2d1b5834453aba85c1b9a3054da"}''></script><!-- End Cloudflare Web Analytics -->'
      type: string
      x-auditable: true
    rumTimestamp:
      example: '2014-01-01T05:20:00.12345Z'
      format: date-time
      readOnly: true
      type: string
      x-auditable: true
    rumUpdateSiteRequest:
      properties:
        auto_install:
          $ref: '#/components/schemas/rumAutoInstall'
        enabled:
          $ref: '#/components/schemas/rumEnabled'
        host:
          $ref: '#/components/schemas/rumHost'
        lite:
          $ref: '#/components/schemas/rumLite'
        zone_tag:
          $ref: '#/components/schemas/rumZoneTag'
      type: object
    rumZoneTag:
      description: The zone identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      type: string
      x-auditable: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
