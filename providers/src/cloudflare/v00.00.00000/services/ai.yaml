  /accounts/{account_id}/ai/run/{model_name}:
    post:
      description: This endpoint provides users with the capability to run specific AI models on-demand. By submitting the required input data, users can receive real-time predictions or results generated by the chosen AI model. The endpoint supports various AI model types, ensuring flexibility and adaptability for diverse use cases. Model specific inputs available in [Cloudflare Docs](https://developers.cloudflare.com/workers-ai/models/).
      operationId: workers-ai-post-run-model
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: model_name
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              title: Text Classification
              properties:
                text:
                  description: The text that you want to classify
                  minLength: 1
                  type: string
                guidance:
                  default: 7.5
                  description: Controls how closely the generated image should adhere to the prompt; higher values make the image more aligned with the prompt
                  type: number
                height:
                  description: The height of the generated image in pixels
                  maximum: 2048
                  minimum: 256
                  type: integer
                image:
                  description: For use with img2img tasks. An array of integers that represent the image data constrained to 8-bit unsigned integer values
                  items:
                    description: A value between 0 and 255
                    type: number
                  type: array
                image_b64:
                  description: For use with img2img tasks. A base64-encoded string of the input image
                  type: string
                mask:
                  description: An array representing An array of integers that represent mask image data for inpainting constrained to 8-bit unsigned integer values
                  items:
                    description: A value between 0 and 255
                    type: number
                  type: array
                negative_prompt:
                  description: Text describing elements to avoid in the generated image
                  type: string
                num_steps:
                  default: 20
                  description: The number of diffusion steps; higher values can improve quality but take longer
                  maximum: 20
                  type: integer
                prompt:
                  description: A text description of the image you want to generate
                  minLength: 1
                  type: string
                seed:
                  description: Random seed for reproducibility of the image generation
                  type: integer
                strength:
                  default: 1
                  description: A value between 0 and 1 indicating how strongly to apply the transformation during img2img tasks; lower values make the output closer to the input image
                  type: number
                width:
                  description: The width of the generated image in pixels
                  maximum: 2048
                  minimum: 256
                  type: integer
                lang:
                  default: en
                  description: The speech language (e.g., 'en' for English, 'fr' for French). Defaults to 'en' if not specified
                  type: string
                audio:
                  description: An array of integers that represent the audio data constrained to 8-bit unsigned integer values
                  items:
                    description: A value between 0 and 255
                    type: number
                  type: array
                source_lang:
                  description: The language of the recorded audio
                  type: string
                target_lang:
                  description: The language to translate the transcription into. Currently only English is supported.
                  type: string
                frequency_penalty:
                  description: Decreases the likelihood of the model repeating the same lines verbatim.
                  maximum: 2
                  minimum: -2
                  type: number
                lora:
                  description: Name of the LoRA (Low-Rank Adaptation) model to fine-tune the base model.
                  type: string
                max_tokens:
                  default: 256
                  description: The maximum number of tokens to generate in the response.
                  type: integer
                presence_penalty:
                  description: Increases the likelihood of the model introducing new topics.
                  maximum: 2
                  minimum: -2
                  type: number
                raw:
                  default: false
                  description: If true, a chat template is not applied and you must adhere to the specific model's expected formatting.
                  type: boolean
                repetition_penalty:
                  description: Penalty for repeated tokens; higher values discourage repetition.
                  maximum: 2
                  minimum: 0
                  type: number
                response_format:
                  properties:
                    json_schema: {}
                    type:
                      enum:
                      - json_object
                      - json_schema
                      type: string
                  title: JSON Mode
                  type: object
                stream:
                  default: false
                  description: If true, the response will be streamed back incrementally using SSE, Server Sent Events.
                  type: boolean
                temperature:
                  default: 0.6
                  description: Controls the randomness of the output; higher values produce more random results.
                  maximum: 5
                  minimum: 0
                  type: number
                top_k:
                  description: Limits the AI to choose from the top 'k' most probable words. Lower values make responses more focused; higher values introduce more variety and potential surprises.
                  maximum: 50
                  minimum: 1
                  type: integer
                top_p:
                  description: Adjusts the creativity of the AI's responses by controlling how many possible words it considers. Lower values make outputs more predictable; higher values allow for more varied and creative responses.
                  maximum: 1
                  minimum: 0.001
                  type: number
                functions:
                  items:
                    properties:
                      code:
                        type: string
                      name:
                        type: string
                    required:
                    - name
                    - code
                    type: object
                  type: array
                messages:
                  description: An array of message objects representing the conversation history.
                  items:
                    properties:
                      content:
                        type: string
                        description: The content of the message as a string.
                        items:
                          properties:
                            text:
                              description: Text content
                              type: string
                            type:
                              description: Type of the content (text)
                              type: string
                          type: object
                      role:
                        description: The role of the message sender (e.g., 'user', 'assistant', 'system', 'tool').
                        type: string
                    required:
                    - role
                    - content
                    type: object
                  type: array
                tools:
                  description: A list of tools available for the assistant to use.
                  items:
                    type: object
                    properties:
                      description:
                        description: A brief description of what the tool does.
                        type: string
                      name:
                        description: The name of the tool. More descriptive the better.
                        type: string
                      parameters:
                        description: Schema defining the parameters accepted by the tool.
                        properties:
                          properties:
                            description: Definitions of each parameter.
                            type: object
                          required:
                            description: List of required parameter names.
                            items:
                              type: string
                            type: array
                          type:
                            description: The type of the parameters object (usually 'object').
                            type: string
                        required:
                        - type
                        - properties
                        type: object
                      function:
                        description: Details of the function tool.
                        properties:
                          description:
                            description: A brief description of what the function does.
                            type: string
                          name:
                            description: The name of the function.
                            type: string
                          parameters:
                            description: Schema defining the parameters accepted by the function.
                            properties:
                              properties:
                                description: Definitions of each parameter.
                                type: object
                              required:
                                description: List of required parameter names.
                                items:
                                  type: string
                                type: array
                              type:
                                description: The type of the parameters object (usually 'object').
                                type: string
                            required:
                            - type
                            - properties
                            type: object
                        required:
                        - name
                        - description
                        - parameters
                        type: object
                      type:
                        description: Specifies the type of tool (e.g., 'function').
                        type: string
                  type: array
                input_text:
                  description: The text that you want the model to summarize
                  minLength: 1
                  type: string
                max_length:
                  default: 1024
                  description: The maximum length of the generated summary in tokens
                  type: integer
                ignore_eos:
                  description: Whether to ignore the EOS token and continue generating tokens after the EOS token is generated.
                  type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stackqlAiRunResponseEnvelope'
          description: Model response
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Execute AI model
      tags:
      - Workers AI
      x-api-token-group:
      - Workers AI Write
      - Workers AI Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ai
        resource_chain: []
        method: run
