                              items:
                                type: string
                              type: array
                            type:
                              description: The type of the parameters object (usually 'object').
                              type: string
                          required:
                          - type
                          - properties
                          type: object
                      required:
                      - name
                      - description
                      - parameters
                      type: object
                    type:
                      description: Specifies the type of tool (e.g., 'function').
                      type: string
                type: array
          type: array
        guided_json:
