  /accounts/{account_id}/ai/run/@cf/deepseek-ai/deepseek-math-7b-instruct:
    post:
      description: Runs inference on the @cf/deepseek-ai/deepseek-math-7b-instruct model.
      operationId: workers-ai-post-run-cf-deepseek-ai-deepseek-math-7b-instruct
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: queueRequest
          schema:
            type: string
            x-auditable: true
        - in: query
          name: tags
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              title: Prompt
              properties:
                frequency_penalty:
                  description: >-
                    Decreases the likelihood of the model repeating the same
                    lines verbatim.
                  maximum: 2
                  minimum: -2
                  type: number
                lora:
                  description: >-
                    Name of the LoRA (Low-Rank Adaptation) model to fine-tune
                    the base model.
                  type: string
                max_tokens:
                  default: 256
                  description: The maximum number of tokens to generate in the response.
                  type: integer
                presence_penalty:
                  description: >-
                    Increases the likelihood of the model introducing new
                    topics.
                  maximum: 2
                  minimum: -2
                  type: number
                prompt:
                  description: The input text prompt for the model to generate a response.
                  minLength: 1
                  type: string
                raw:
                  default: false
                  description: >-
                    If true, a chat template is not applied and you must adhere
                    to the specific model's expected formatting.
                  type: boolean
                repetition_penalty:
                  description: >-
                    Penalty for repeated tokens; higher values discourage
                    repetition.
                  maximum: 2
                  minimum: 0
                  type: number
                response_format:
                  properties:
                    json_schema: {}
                    type:
                      enum:
                        - json_object
                        - json_schema
                      type: string
                  title: JSON Mode
                  type: object
                seed:
                  description: Random seed for reproducibility of the generation.
                  maximum: 9999999999
                  minimum: 1
                  type: integer
                stream:
                  default: false
                  description: >-
                    If true, the response will be streamed back incrementally
                    using SSE, Server Sent Events.
                  type: boolean
                temperature:
                  default: 0.6
                  description: >-
                    Controls the randomness of the output; higher values produce
                    more random results.
                  maximum: 5
                  minimum: 0
                  type: number
                top_k:
                  description: >-
                    Limits the AI to choose from the top 'k' most probable
                    words. Lower values make responses more focused; higher
                    values introduce more variety and potential surprises.
                  maximum: 50
                  minimum: 1
                  type: integer
                top_p:
                  description: >-
                    Adjusts the creativity of the AI's responses by controlling
                    how many possible words it considers. Lower values make
                    outputs more predictable; higher values allow for more
                    varied and creative responses.
                  maximum: 1
                  minimum: 0.001
                  type: number
                functions:
                  items:
                    properties:
                      code:
                        type: string
                      name:
                        type: string
                    required:
                      - name
                      - code
                    type: object
                  type: array
                messages:
                  description: >-
                    An array of message objects representing the conversation
                    history.
                  items:
                    properties:
                      content:
                        type: string
                        description: The content of the message as a string.
                        items:
                          properties:
                            text:
                              description: Text content
                              type: string
                            type:
                              description: Type of the content (text)
                              type: string
                          type: object
                      role:
                        description: >-
                          The role of the message sender (e.g., 'user',
                          'assistant', 'system', 'tool').
                        type: string
                    required:
                      - role
                      - content
                    type: object
                  type: array
                tools:
                  description: A list of tools available for the assistant to use.
                  items:
                    type: object
                    properties:
                      description:
                        description: A brief description of what the tool does.
                        type: string
                      name:
                        description: The name of the tool. More descriptive the better.
                        type: string
                      parameters:
                        description: Schema defining the parameters accepted by the tool.
                        properties:
                          properties:
                            description: Definitions of each parameter.
                            type: object
                          required:
                            description: List of required parameter names.
                            items:
                              type: string
                            type: array
                          type:
                            description: >-
                              The type of the parameters object (usually
                              'object').
                            type: string
                        required:
                          - type
                          - properties
                        type: object
                      function:
                        description: Details of the function tool.
                        properties:
                          description:
                            description: A brief description of what the function does.
                            type: string
                          name:
                            description: The name of the function.
                            type: string
                          parameters:
                            description: >-
                              Schema defining the parameters accepted by the
                              function.
                            properties:
                              properties:
