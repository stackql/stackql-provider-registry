        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: queueRequest
        schema:
          type: string
          x-auditable: true
      - in: query
        name: tags
        schema:
          type: string
      requestBody:
        content:
          application/octet-stream:
            schema:
              format: binary
              type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Object with user data.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: string
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - errors
                - success
                - result
                type: object
          description: Bad request
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Execute @cf/facebook/nonomni-detr-resnet-50 model.
      tags:
      - Workers AI Object Detection
      x-api-token-group:
      - Workers AI Write
      - Workers AI Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
