openapi: 3.0.3
info:
  title: ai API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/ai/authors/search:
    get:
      description: Searches Workers AI models by author or organization name.
      operationId: workers-ai-search-author
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    items:
                      type: object
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                  - result
                  - errors
                  - messages
                type: object
          description: Returns a list of authors
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                        - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                  - result
                  - success
                  - errors
                type: object
          description: Bad Request
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Author Search
      tags:
        - Workers AI
      x-api-token-group:
        - Workers AI Write
        - Workers AI Read
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ai
        resource_chain:
          - authors
        method: list
  /accounts/{account_id}/ai/finetunes:
    get:
      description: >-
        Lists all fine-tuning jobs created by the account, including status and
        metrics.
      operationId: workers-ai-list-finetunes
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      created_at:
                        format: date-time
                        type: string
                        readOnly: true
                      description:
                        type: string
                      id:
                        format: uuid
                        type: string
                        x-auditable: true
                      model:
                        type: string
                        x-auditable: true
                      modified_at:
                        format: date-time
                        type: string
                        readOnly: true
                      name:
                        type: string
                        x-auditable: true
                    required:
                      - id
                      - model
                      - name
                      - created_at
                      - modified_at
                    type: object
                  success:
                    type: boolean
                required:
                  - success
                  - result
                type: object
          description: Returns all finetunes
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                        - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                  - result
                  - success
                  - errors
                type: object
          description: Bad Request
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Finetunes
      tags:
        - Workers AI Finetune
      x-api-token-group:
        - Workers AI Write
        - Workers AI Read
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ai
        resource_chain:
          - finetunes
        method: list
    post:
      description: >-
        Creates a new fine-tuning job for a Workers AI model using custom
        training data.
      operationId: workers-ai-create-finetune
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                description:
                  type: string
                model:
                  type: string
                  x-auditable: true
                name:
                  type: string
                  x-auditable: true
                public:
                  default: false
                  type: boolean
                  x-auditable: true
              required:
                - model
                - name
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      created_at:
                        format: date-time
                        type: string
                        readOnly: true
                      description:
                        type: string
                      id:
                        format: uuid
                        type: string
                        x-auditable: true
                      model:
                        type: string
                        x-auditable: true
                      modified_at:
                        format: date-time
                        type: string
                        readOnly: true
                      name:
                        type: string
                        x-auditable: true
                      public:
                        type: boolean
                        x-auditable: true
                    required:
                      - id
                      - created_at
                      - modified_at
                      - public
                      - name
                      - model
                    type: object
                  success:
                    type: boolean
                required:
                  - success
                  - result
                type: object
          description: Returns the created finetune
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    type: array
                  success:
                    type: boolean
                required:
                  - errors
                  - success
                type: object
          description: Finetune creation failed
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create a new Finetune
      tags:
        - Workers AI Finetune
      x-api-token-group:
        - Workers AI Write
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ai
        resource_chain:
          - finetunes
        method: create
  /accounts/{account_id}/ai/finetunes/public:
    get:
      description: >-
        Lists publicly available fine-tuned models that can be used with Workers
        AI.
      operationId: workers-ai-list-public-finetunes
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Pagination Limit
          in: query
          name: limit
          schema:
            default: 20
            description: Pagination Limit
            type: number
        - description: Pagination Offset
          in: query
          name: offset
          schema:
            default: 0
            description: Pagination Offset
            type: number
        - description: Order By Column Name
          in: query
          name: orderBy
          schema:
            description: Order By Column Name
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    items:
                      properties:
                        created_at:
                          format: date-time
                          type: string
                          readOnly: true
                        description:
                          type: string
                        id:
                          format: uuid
                          type: string
                          x-auditable: true
                        model:
                          type: string
                          x-auditable: true
                        modified_at:
                          format: date-time
                          type: string
                          readOnly: true
                        name:
                          type: string
                          x-auditable: true
                        public:
                          type: boolean
                          x-auditable: true
                      required:
                        - id
                        - model
                        - name
                        - public
                        - created_at
                        - modified_at
                      type: object
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                  - result
                type: object
          description: Returns all public finetunes
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                        - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                  - result
                  - success
                  - errors
                type: object
          description: Bad Request
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Public Finetunes
      tags:
        - Workers AI Finetune
      x-api-token-group:
        - Workers AI Write
        - Workers AI Read
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ai
        resource_chain:
          - finetunes
          - public
        method: list
  /accounts/{account_id}/ai/finetunes/{finetune_id}/finetune-assets:
    post:
      description: Uploads training data assets for a Workers AI fine-tuning job.
      operationId: workers-ai-upload-finetune-asset
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: path
          name: finetune_id
          schema:
            type: string
          required: true
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  description: File to upload
                  format: binary
                  type: string
                file_name:
                  description: >-
                    Name of the file (adapter_config.json or
                    adapter_model.safetensors)
                  type: string
              required:
                - file_name
                - file
              type: object
        description: Finetune asset file upload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                required:
                  - success
                type: object
          description: Returns successfully if finetunes were uploaded
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                  - errors
                type: object
          description: Finetune creation failed
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Upload a Finetune Asset
      tags:
        - Workers AI Finetune
      x-api-token-group:
        - Workers AI Write
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ai
        resource_chain:
          - finetunes
          - assets
        method: create
  /accounts/{account_id}/ai/models/schema:
    get:
      description: >-
        Retrieves the input and output JSON schema definition for a Workers AI
        model.
      operationId: workers-ai-get-model-schema
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Model Name
          in: query
          name: model
          schema:
            description: Model Name
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      input:
                        properties:
                          additionalProperties:
                            type: boolean
                          description:
                            type: string
                          type:
                            type: string
                        required:
                          - type
                          - description
                          - additionalProperties
                        type: object
                      output:
                        properties:
                          additionalProperties:
                            type: boolean
                          description:
                            type: string
                          type:
                            type: string
                        required:
                          - type
                          - description
                          - additionalProperties
                        type: object
                    required:
                      - input
                      - output
                    type: object
                  success:
                    type: boolean
                required:
                  - success
                  - result
                type: object
          description: Model Schema
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                        - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                  - result
                  - success
                  - errors
                type: object
          description: Bad Request
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Model Schema
      tags:
        - Workers AI
      x-api-token-group:
        - Workers AI Write
        - Workers AI Read
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ai
        resource_chain:
          - models
          - schema
        method: get
  /accounts/{account_id}/ai/models/search:
    get:
      description: Searches Workers AI models by name or description.
      operationId: workers-ai-search-model
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: per_page
          schema:
            default: 100
            type: integer
        - in: query
          name: page
          schema:
            default: 1
            type: integer
        - description: Filter by Task Name
          in: query
          name: task
          schema:
            default: ''
            description: Filter by Task Name
            type: string
        - description: Filter by Author
          in: query
          name: author
          schema:
            default: ''
            description: Filter by Author
            type: string
        - description: Filter by Source Id
          in: query
          name: source
          schema:
            description: Filter by Source Id
            type: number
        - description: Filter to hide experimental models
          in: query
          name: hide_experimental
          schema:
            default: false
            description: Filter to hide experimental models
            type: boolean
        - description: Search
          in: query
          name: search
          schema:
            default: ''
            description: Search
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    items:
                      type: object
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                  - result
                  - errors
                  - messages
                type: object
          description: Returns a list of models
        '404':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      type: object
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                  - errors
                type: object
          description: Object not found
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Model Search
      tags:
        - Workers AI
      x-api-token-group:
        - Workers AI Write
        - Workers AI Read
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ai
        resource_chain:
          - models
        method: list
  /accounts/{account_id}/ai/run/@cf/ai4bharat/indictrans2-en-indic-1B:
    post:
      description: Runs inference on the @cf/ai4bharat/indictrans2-en-indic-1B model.
      operationId: workers-ai-post-run-cf-ai4bharat-indictrans2-en-indic-1B
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: queueRequest
          schema:
            type: string
            x-auditable: true
        - in: query
          name: tags
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                target_language:
                  default: hin_Deva
                  description: Target langauge to translate to
                  enum:
                    - asm_Beng
                    - awa_Deva
                    - ben_Beng
                    - bho_Deva
                    - brx_Deva
                    - doi_Deva
                    - eng_Latn
                    - gom_Deva
                    - gon_Deva
                    - guj_Gujr
                    - hin_Deva
                    - hne_Deva
                    - kan_Knda
                    - kas_Arab
                    - kas_Deva
                    - kha_Latn
                    - lus_Latn
                    - mag_Deva
                    - mai_Deva
                    - mal_Mlym
                    - mar_Deva
                    - mni_Beng
                    - mni_Mtei
                    - npi_Deva
                    - ory_Orya
                    - pan_Guru
                    - san_Deva
                    - sat_Olck
                    - snd_Arab
                    - snd_Deva
                    - tam_Taml
                    - tel_Telu
                    - urd_Arab
                    - unr_Deva
                  type: string
                text:
                  description: >-
                    Input text to translate. Can be a single string or a list of
                    strings.
                  type: string
                  items:
                    type: string
              required:
                - text
                - target_language
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Object with user data.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: string
                        message:
                          type: string
                      required:
                        - code
                        - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                  - errors
                  - success
                  - result
                type: object
          description: Bad request
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Execute @cf/ai4bharat/indictrans2-en-indic-1B model.
      tags:
        - Workers AI Translation
      x-api-token-group:
        - Workers AI Write
        - Workers AI Read
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /accounts/{account_id}/ai/run/@cf/ai4bharat/nonomni-indictrans2-en-indic-1b:
    post:
      description: >-
        Runs inference on the @cf/ai4bharat/nonomni-indictrans2-en-indic-1b
        model.
      operationId: workers-ai-post-run-cf-ai4bharat-nonomni-indictrans2-en-indic-1b
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: queueRequest
          schema:
            type: string
            x-auditable: true
        - in: query
          name: tags
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                target_language:
                  default: hin_Deva
                  description: Target langauge to translate to
                  enum:
                    - asm_Beng
                    - awa_Deva
                    - ben_Beng
                    - bho_Deva
                    - brx_Deva
                    - doi_Deva
                    - eng_Latn
                    - gom_Deva
                    - gon_Deva
                    - guj_Gujr
                    - hin_Deva
                    - hne_Deva
                    - kan_Knda
                    - kas_Arab
                    - kas_Deva
                    - kha_Latn
                    - lus_Latn
                    - mag_Deva
                    - mai_Deva
                    - mal_Mlym
                    - mar_Deva
                    - mni_Beng
                    - mni_Mtei
                    - npi_Deva
                    - ory_Orya
                    - pan_Guru
                    - san_Deva
                    - sat_Olck
                    - snd_Arab
                    - snd_Deva
                    - tam_Taml
                    - tel_Telu
                    - urd_Arab
                    - unr_Deva
                  type: string
                text:
                  description: >-
                    Input text to translate. Can be a single string or a list of
                    strings.
                  type: string
                  items:
                    type: string
              required:
                - text
                - target_language
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Object with user data.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: string
                        message:
                          type: string
                      required:
                        - code
                        - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                  - errors
                  - success
                  - result
                type: object
          description: Bad request
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Execute @cf/ai4bharat/nonomni-indictrans2-en-indic-1b model.
      tags:
        - Workers AI Translation
      x-api-token-group:
        - Workers AI Write
        - Workers AI Read
      x-cfPermissionsRequired:
        enum:
          - com.cloudflare.api.account.ai
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /accounts/{account_id}/ai/run/@cf/aisingapore/gemma-sea-lion-v4-27b-it:
    post:
      description: Runs inference on the @cf/aisingapore/gemma-sea-lion-v4-27b-it model.
      operationId: workers-ai-post-run-cf-aisingapore-gemma-sea-lion-v4-27b-it
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: queueRequest
          schema:
            type: string
            x-auditable: true
        - in: query
          name: tags
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              title: Prompt
              properties:
                frequency_penalty:
                  description: >-
                    Decreases the likelihood of the model repeating the same
                    lines verbatim.
                  maximum: 2
                  minimum: -2
                  type: number
                lora:
                  description: >-
                    Name of the LoRA (Low-Rank Adaptation) model to fine-tune
                    the base model.
                  type: string
                max_tokens:
                  default: 2000
                  description: The maximum number of tokens to generate in the response.
                  type: integer
                presence_penalty:
                  description: >-
                    Increases the likelihood of the model introducing new
                    topics.
                  maximum: 2
                  minimum: -2
                  type: number
                prompt:
                  description: The input text prompt for the model to generate a response.
