openapi: 3.0.3
info:
  title: user API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /user:
    get:
      operationId: user-user-details
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamSingleUserResponse'
          description: User Details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: User Details response failure
      security:
      - api_email: []
        api_key: []
      summary: User Details
      tags:
      - User
      x-api-token-group:
      - User Details Write
      - User Details Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.user.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: user
        resource_chain: []
        method: get
    patch:
      description: Edit part of your user details.
      operationId: user-edit-user
      requestBody:
        content:
          application/json:
            schema:
              properties:
                country:
                  $ref: '#/components/schemas/iamCountry'
                first_name:
                  $ref: '#/components/schemas/iamFirstName'
                last_name:
                  $ref: '#/components/schemas/iamLastName'
                telephone:
                  $ref: '#/components/schemas/iamTelephone'
                zipcode:
                  $ref: '#/components/schemas/iamZipcode'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamSingleUserResponse'
          description: Edit User response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/iamApiResponseCommonFailure'
          description: Edit User response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Edit User
      tags:
      - User
      x-api-token-group:
      - User Details Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.user.update
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: user
        resource_chain: []
        method: edit
  /user/audit_logs:
    get:
      description: Gets a list of audit logs for a user account. Can be filtered by who made the change, on which zone, and the timeframe of the change.
      operationId: audit-logs-get-user-audit-logs
      parameters:
      - in: query
        name: id
        schema:
          description: Finds a specific log by its ID.
          type: string
      - in: query
        name: export
        schema:
          description: Indicates that this request is an export of logs in CSV format.
          type: boolean
      - in: query
        name: action.type
        schema:
          description: Filters by the action type.
          type: string
      - in: query
        name: actor.ip
        schema:
          description: Filters by the IP address of the request that made the change by specific IP address or valid CIDR Range.
          type: string
      - in: query
        name: actor.email
        schema:
          description: Filters by the email address of the actor that made the change.
          format: email
          type: string
      - in: query
        name: since
        schema:
          type: string
          format: date
          description: Limits the returned results to logs newer than the specified date. A `full-date` that conforms to RFC3339.
      - in: query
        name: before
        schema:
          type: string
          format: date
          description: Limits the returned results to logs older than the specified date. A `full-date` that conforms to RFC3339.
      - in: query
        name: zone.name
        schema:
          description: Filters by the name of the zone associated to the change.
          type: string
      - in: query
        name: direction
        schema:
          default: desc
          description: Changes the direction of the chronological sorting.
          enum:
          - desc
          - asc
          type: string
      - in: query
        name: per_page
        schema:
          default: 100
          description: Sets the number of results to return per page.
          maximum: 1000
          minimum: 1
          type: number
      - in: query
        name: page
        schema:
          default: 1
          description: Defines which page of results to return.
          minimum: 1
          type: number
      - in: query
        name: hide_user_logs
        schema:
          default: false
          description: Indicates whether or not to hide user level audit logs.
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aaaAuditLogsResponseCollection_2'
          description: Get user audit logs response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/result'
          description: Get user audit logs response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get user audit logs
      tags:
      - Audit Logs
      x-api-token-group:
      - Account Settings Write
      - Account Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: user
        resource_chain:
        - audit_logs
        method: list
  /user/billing/history:
    get:
      deprecated: true
      description: Accesses your billing history object.
      operationId: user-billing-history-(-deprecated)-billing-history-details
      parameters:
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Number of items per page.
          maximum: 50
          minimum: 5
          type: number
      - in: query
        name: order
        schema:
          description: Field to order billing history by.
          enum:
          - type
          - occurred_at
          - action
          type: string
      - in: query
        name: occurred_at
        schema:
          $ref: '#/components/schemas/billSubsApiOccurredAt'
      - in: query
        name: type
        schema:
          description: The billing item type.
          maxLength: 30
          type: string
      - in: query
        name: action
        schema:
          description: The billing item action.
          maxLength: 30
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/billSubsApiBillingHistoryCollection'
          description: Billing History Details response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/billSubsApiMessages'
                  messages:
                    $ref: '#/components/schemas/billSubsApiMessages'
                  result:
                    items:
                      $ref: '#/components/schemas/billSubsApiBillingHistory'
                    nullable: true
                    type: array
                    enum:
                    - null
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/billSubsApiResultInfo'
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Billing History Details response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Billing History Details
      tags:
      - User Billing History
      x-api-token-group:
      - Billing Write
      - Billing Read
      x-cfPermissionsRequired:
        enum:
        - '#billing:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: user
        resource_chain:
        - billing
        - history
        method: list
