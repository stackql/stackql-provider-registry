      description: End date and time of requesting data period in the ISO8601 format.
      example: '2016-11-11T13:00:00Z'
      format: date-time
      type: string
      x-auditable: true
    organizationsApiOrganization:
      description: References an Organization in the Cloudflare data model.
      properties:
        create_time:
          format: date-time
          readOnly: true
          type: string
        id:
          readOnly: true
          $ref: '#/components/schemas/organizationsApiOrganizationID'
        meta:
          properties:
            flags:
              $ref: '#/components/schemas/organizationsApiOrganizationFlags'
            managed_by:
              type: string
          readOnly: true
          type: object
        name:
          type: string
        parent:
          properties:
            id:
              $ref: '#/components/schemas/organizationsApiOrganizationID'
            name:
              readOnly: true
              type: string
          required:
          - id
          - name
          type: object
        profile:
          $ref: '#/components/schemas/organizationsApiProfile'
      required:
      - id
      - name
      - create_time
      - meta
      type: object
    organizationsApiOrganizationFlags:
      description: Enable features for Organizations.
      properties:
        account_creation:
          type: string
        account_deletion:
          type: string
        account_migration:
          type: string
        account_mobility:
          type: string
        sub_org_creation:
          type: string
      required:
