      - invited_member_id
      - organization_id
      type: object
    iamValue:
      description: The token value.
      example: 8M7wS6hCpXVc-DoRnPPY_UCWPgy8aea4Wy6kCe5T
      maxLength: 80
      minLength: 40
      readOnly: true
      type: string
      x-sensitive: true
    iamZipcode:
      description: The zipcode or postal code where the user lives.
      example: '12345'
      maxLength: 20
      nullable: true
      type: string
    loadBalancingAddress:
      description: The IP address (IPv4 or IPv6) of the origin, or its publicly addressable hostname. Hostnames entered here should resolve directly to the origin, and not be a hostname proxied by Cloudflare. To set an internal/reserved address, virtual_network_id must also be set.
      example: 0.0.0.0
      type: string
      x-auditable: true
    loadBalancingAnalytics:
      properties:
        id:
          default: 1
          type: integer
        origins:
          example:
          - address: 198.51.100.4
            changed: true
            enabled: true
            failure_reason: No failures
            healthy: true
            ip: 198.51.100.4
            name: some-origin
          items:
            $ref: '#/components/schemas/loadBalancingOriginAnalytics'
          type: array
        pool:
          example:
            changed: true
            healthy: true
            id: 74bc6a8b9b0dda3d651707a2928bad0c
            minimum_origins: 1
            name: some-pool
          type: object
        timestamp:
          example: '2014-01-01T05:20:00.12345Z'
          format: date-time
          type: string
      type: object
    loadBalancingComponentsSchemasResponseCollection:
      required:
      - success
      - errors
      - messages
      - result
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/loadBalancingMessages'
        messages:
          $ref: '#/components/schemas/loadBalancingMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result_info:
          $ref: '#/components/schemas/loadBalancingResultInfo'
        result:
          items:
            $ref: '#/components/schemas/loadBalancingAnalytics'
          type: array
    loadBalancingMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    loadBalancingOriginAnalytics:
      properties:
        address:
          $ref: '#/components/schemas/loadBalancingAddress'
