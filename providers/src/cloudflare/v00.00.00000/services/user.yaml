                    - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/loadBalancingResultInfo'
                  result:
                    items:
                      $ref: '#/components/schemas/loadBalancingAnalytics'
                    type: array
                    enum:
                    - null
          description: List Healthcheck Events response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Healthcheck Events
      tags:
      - Load Balancer Healthcheck Events
      x-api-token-group:
      - 'Load Balancing: Monitors and Pools Write'
      - 'Load Balancing: Monitors and Pools Read'
