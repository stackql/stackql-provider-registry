      operationId: load-balancer-healthcheck-events-list-healthcheck-events
      parameters:
      - in: query
        name: until
        schema:
          $ref: '#/components/schemas/loadBalancingUntil'
      - in: query
        name: pool_name
        schema:
          $ref: '#/components/schemas/loadBalancingPoolName'
      - in: query
        name: origin_healthy
        schema:
          $ref: '#/components/schemas/loadBalancingOriginHealthy_2'
      - in: query
        name: pool_id
        schema:
          $ref: '#/components/schemas/loadBalancingSchemasIdentifier'
      - in: query
        name: since
        schema:
          description: Start date and time of requesting data period in the ISO8601 format.
          format: date-time
          type: string
      - in: query
        name: origin_name
        schema:
          description: The name for the origin to filter.
          type: string
      - in: query
        name: pool_healthy
        schema:
          default: true
          description: If true, filter events where the pool status is healthy. If false, filter events where the pool status is unhealthy.
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/loadBalancingComponentsSchemasResponseCollection'
          description: List Healthcheck Events response.
        4XX:
          content:
            application/json:
              schema:
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/loadBalancingMessages'
                  messages:
