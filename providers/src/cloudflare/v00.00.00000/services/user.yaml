          $ref: '#/components/schemas/loadBalancingOriginChanged'
        enabled:
          $ref: '#/components/schemas/loadBalancingSchemasEnabled'
        failure_reason:
          $ref: '#/components/schemas/loadBalancingOriginFailureReason'
        healthy:
          $ref: '#/components/schemas/loadBalancingOriginHealthy'
        ip:
          $ref: '#/components/schemas/loadBalancingOriginIp'
        name:
          $ref: '#/components/schemas/loadBalancingSchemasName'
      type: object
    loadBalancingOriginChanged:
      description: Whether the origin has changed health status.
      example: true
      type: boolean
      x-auditable: true
    loadBalancingOriginFailureReason:
      description: Failure reason for un-healthy origin health check.
      example: No failures
      type: string
      x-auditable: true
    loadBalancingOriginHealthy:
      description: Whether the origin is reported as healthy.
      example: true
      type: boolean
      x-auditable: true
    loadBalancingOriginHealthy_2:
      default: true
      description: If true, filter events where the origin status is healthy. If false, filter events where the origin status is unhealthy.
      example: true
      type: boolean
      x-auditable: true
    loadBalancingOriginIp:
      description: The IP address (IPv4 or IPv6) of the origin.
      example: 198.51.100.4
      type: string
      x-auditable: true
    loadBalancingPoolName:
      description: The name for the pool to filter.
      example: primary-dc
      type: string
      x-auditable: true
    loadBalancingResultInfo:
      properties:
        count:
          description: Total number of results on the current page.
          example: 20
          type: number
        page:
          description: Current page within paginated list of results.
          example: 1
          type: number
        per_page:
          description: Number of results per page.
          example: 20
          type: number
        total_count:
          description: Total results available without any search parameters.
          example: 2000
          type: number
        total_pages:
          description: Total number of pages available.
          example: 100
          type: number
      type: object
    loadBalancingSchemasEnabled:
      default: true
      description: Whether to enable (the default) this origin within the pool. Disabled origins will not receive traffic and are excluded from health checks. The origin will only be disabled for the current pool.
      example: true
      type: boolean
      x-auditable: true
    loadBalancingSchemasIdentifier:
      example: 17b5962d775c646f3f9725cbc7a53df4
      type: string
      x-auditable: true
    loadBalancingSchemasName:
      description: A human-identifiable name for the origin.
      example: app-server-1
      type: string
      x-auditable: true
