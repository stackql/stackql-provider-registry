                  messages:
                    $ref: '#/components/schemas/healthchecksMessages'
                  result:
                    $ref: '#/components/schemas/unnamedSchemaRefAaa560acadcbf1ae1dc619ba1ea5948e'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Health Check Preview Details response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Health Check Preview Details
