components:
  schemas:
    healthchecksAddress:
      description: The hostname or IP address of the origin server to run health checks on.
      example: www.example.com
      type: string
      x-auditable: true
    healthchecksCheckRegions:
      description: A list of regions from which to run health checks. Null means Cloudflare will pick a default region.
      example:
      - WEU
      - ENAM
      items:
        description: 'WNAM: Western North America, ENAM: Eastern North America, WEU: Western Europe, EEU: Eastern Europe, NSAM: Northern South America, SSAM: Southern South America, OC: Oceania, ME: Middle East, NAF: North Africa, SAF: South Africa, IN: India, SEAS: South East Asia, NEAS: North East Asia, ALL_REGIONS: all regions (BUSINESS and ENTERPRISE customers only).'
        enum:
        - WNAM
        - ENAM
        - WEU
        - EEU
        - NSAM
        - SSAM
        - OC
        - ME
        - NAF
        - SAF
        - IN
        - SEAS
        - NEAS
        - ALL_REGIONS
        type: string
      nullable: true
      type: array
      x-auditable: true
    healthchecksConsecutiveFails:
      default: 1
      description: The number of consecutive fails required from a health check before changing the health to unhealthy.
      type: integer
      x-auditable: true
    healthchecksConsecutiveSuccesses:
      default: 1
      description: The number of consecutive successes required from a health check before changing the health to healthy.
      type: integer
      x-auditable: true
    healthchecksDescription:
      description: A human-readable description of the health check.
      example: Health check for www.example.com
      type: string
      x-auditable: true
    healthchecksFailureReason:
      description: The current failure reason if status is unhealthy.
      example: ''
      readOnly: true
      type: string
      x-auditable: true
    healthchecksHealthchecks:
      properties:
        address:
          $ref: '#/components/schemas/healthchecksAddress'
        check_regions:
          $ref: '#/components/schemas/healthchecksCheckRegions'
        consecutive_fails:
          $ref: '#/components/schemas/healthchecksConsecutiveFails'
        consecutive_successes:
          $ref: '#/components/schemas/healthchecksConsecutiveSuccesses'
        created_on:
          $ref: '#/components/schemas/healthchecksTimestamp'
          readOnly: true
        description:
          $ref: '#/components/schemas/healthchecksDescription'
        failure_reason:
          $ref: '#/components/schemas/healthchecksFailureReason'
        http_config:
          $ref: '#/components/schemas/healthchecksHttpConfig'
        id:
          $ref: '#/components/schemas/healthchecksIdentifier'
        interval:
          $ref: '#/components/schemas/healthchecksInterval'
        modified_on:
          $ref: '#/components/schemas/healthchecksTimestamp'
          readOnly: true
        name:
          $ref: '#/components/schemas/healthchecksName'
        retries:
          $ref: '#/components/schemas/healthchecksRetries'
        status:
          $ref: '#/components/schemas/healthchecksStatus'
        suspended:
          $ref: '#/components/schemas/healthchecksSuspended'
        tcp_config:
          $ref: '#/components/schemas/healthchecksTcpConfig'
        timeout:
          $ref: '#/components/schemas/healthchecksTimeout'
        type:
          $ref: '#/components/schemas/healthchecksType'
      type: object
    healthchecksHttpConfig:
      description: Parameters specific to an HTTP or HTTPS health check.
      nullable: true
      properties:
        allow_insecure:
          default: false
          description: Do not validate the certificate when the health check uses HTTPS.
          type: boolean
          x-auditable: true
        expected_body:
          default: ''
          description: A case-insensitive sub-string to look for in the response body. If this string is not found, the origin will be marked as unhealthy.
          example: success
          type: string
          x-auditable: true
        expected_codes:
          description: The expected HTTP response codes (e.g. "200") or code ranges (e.g. "2xx" for all codes starting with 2) of the health check.
          example:
          - 2xx
          - '302'
          items:
            type: string
          nullable: true
          type: array
          x-auditable: true
        follow_redirects:
          default: false
          description: Follow redirects if the origin returns a 3xx status code.
          type: boolean
          x-auditable: true
        header:
          description: The HTTP request headers to send in the health check. It is recommended you set a Host header by default. The User-Agent header cannot be overridden.
          example:
            Host:
            - example.com
            X-App-ID:
            - abc123
          nullable: true
          type: object
        method:
          default: GET
          description: The HTTP method to use for the health check.
          enum:
          - GET
          - HEAD
          type: string
          x-auditable: true
        path:
          default: /
          description: The endpoint path to health check against.
          example: /health
          type: string
          x-auditable: true
        port:
          default: 80
          description: Port number to connect to for the health check. Defaults to 80 if type is HTTP or 443 if type is HTTPS.
          type: integer
          x-auditable: true
      type: object
    healthchecksIdResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/healthchecksMessages'
        messages:
          $ref: '#/components/schemas/healthchecksMessages'
        result:
          properties:
            id:
              $ref: '#/components/schemas/healthchecksIdentifier'
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
    healthchecksIdentifier:
      description: Identifier
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    healthchecksInterval:
      default: 60
      description: The interval between each health check. Shorter intervals may give quicker notifications if the origin status changes, but will increase load on the origin as we check from multiple locations.
      type: integer
      x-auditable: true
    healthchecksMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    healthchecksName:
      description: A short name to identify the health check. Only alphanumeric characters, hyphens and underscores are allowed.
      example: server-1
      type: string
      x-auditable: true
    healthchecksQueryHealthcheck:
      properties:
        address:
          $ref: '#/components/schemas/healthchecksAddress'
        check_regions:
          $ref: '#/components/schemas/healthchecksCheckRegions'
        consecutive_fails:
          $ref: '#/components/schemas/healthchecksConsecutiveFails'
        consecutive_successes:
          $ref: '#/components/schemas/healthchecksConsecutiveSuccesses'
        description:
          $ref: '#/components/schemas/healthchecksDescription'
        http_config:
          $ref: '#/components/schemas/healthchecksHttpConfig'
        interval:
          $ref: '#/components/schemas/healthchecksInterval'
        name:
          $ref: '#/components/schemas/healthchecksName'
        retries:
          $ref: '#/components/schemas/healthchecksRetries'
        suspended:
          $ref: '#/components/schemas/healthchecksSuspended'
        tcp_config:
          $ref: '#/components/schemas/healthchecksTcpConfig'
        timeout:
          $ref: '#/components/schemas/healthchecksTimeout'
          x-stainless-naming:
            python:
              method_argument: healthcheck_timeout
        type:
          $ref: '#/components/schemas/healthchecksType'
      required:
      - name
      - address
      type: object
    healthchecksResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/healthchecksMessages'
        messages:
          $ref: '#/components/schemas/healthchecksMessages'
        result:
          items:
            $ref: '#/components/schemas/healthchecksHealthchecks'
          nullable: true
          type: array
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result_info:
          $ref: '#/components/schemas/healthchecksResultInfo'
      required:
      - success
      - errors
      - messages
      - result
    healthchecksResultInfo:
      properties:
        count:
          description: Total number of results for the requested service
          example: 1
          type: number
        page:
          description: Current page within paginated list of results
          example: 1
          type: number
        per_page:
          description: Number of results per page of results
