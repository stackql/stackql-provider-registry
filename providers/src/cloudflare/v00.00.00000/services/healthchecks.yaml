openapi: 3.0.3
info:
  title: healthchecks API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones/{zone_id}/healthchecks:
    get:
      description: List configured health checks.
      operationId: health-checks-list-health-checks
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - description: Page number of paginated results.
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: number
      - description: Maximum number of results per page. Must be a multiple of 5.
        in: query
        name: per_page
        schema:
          default: 25
          maximum: 1000
          minimum: 5
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/healthchecksResponseCollection'
          description: List Health Checks response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/healthchecksMessages'
                  messages:
                    $ref: '#/components/schemas/healthchecksMessages'
                  result:
                    items:
                      $ref: '#/components/schemas/healthchecksHealthchecks'
                    nullable: true
                    type: array
                    enum:
                    - null
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/healthchecksResultInfo'
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: List Health Checks response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Health Checks
      tags:
      - Health Checks
      x-api-token-group:
      - Health Checks Write
      - Health Checks Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: healthchecks
        resource_chain: []
        method: list
    post:
      description: Create a new health check.
      operationId: health-checks-create-health-check
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/healthchecksQueryHealthcheck'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/healthchecksSingleResponse'
          description: Create Health Check response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/healthchecksMessages'
                  messages:
                    $ref: '#/components/schemas/healthchecksMessages'
                  result:
                    $ref: '#/components/schemas/unnamedSchemaRefAaa560acadcbf1ae1dc619ba1ea5948e'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Create Health Check response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create Health Check
      tags:
      - Health Checks
      x-api-token-group:
      - Health Checks Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: healthchecks
        resource_chain: []
        method: create
