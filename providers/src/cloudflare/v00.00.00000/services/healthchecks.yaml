                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Delete Preview Health Check response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete Preview Health Check
