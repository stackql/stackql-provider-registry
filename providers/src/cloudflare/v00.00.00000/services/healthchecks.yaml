                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Create Preview Health Check response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create Preview Health Check
      tags:
      - Health Checks
      x-api-token-group:
      - Health Checks Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: healthchecks
        resource_chain:
        - previews
        method: create
