openapi: 3.0.3
info:
  title: keyless_certificates API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/keyless_certificates:
    get:
      description: List all Keyless SSL configurations for a given zone.
      operationId: keyless-ssl-for-a-zone-list-keyless-ssl-configurations
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesKeylessResponseCollection
          description: List Keyless SSL Configurations response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesKeylessCertificate
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List Keyless SSL Configurations response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Keyless SSL Configurations
      tags:
        - Keyless SSL for a Zone
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: keyless_certificates
        resource_chain: []
        method: list
    post:
      description: >-
        Creates a Keyless SSL configuration that allows SSL/TLS termination
        without exposing private keys to Cloudflare. Keys remain on your
        infrastructure.
      operationId: keyless-ssl-for-a-zone-create-keyless-ssl-configuration
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                bundle_method:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesBundleMethod'
                certificate:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificate
                host:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesHost'
                name:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesNameWrite'
                port:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesPort'
                tunnel:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesKeylessTunnel
              required:
                - host
                - port
                - certificate
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesKeylessResponseSingle
          description: Create Keyless SSL Configuration response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefA91f0bd72ee433f010eecfdc94ccf298
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Create Keyless SSL Configuration response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create Keyless SSL Configuration
      tags:
        - Keyless SSL for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: keyless_certificates
        resource_chain: []
        method: create
  /zones/{zone_id}/keyless_certificates/{keyless_certificate_id}:
    delete:
      description: >-
        Removes a Keyless SSL configuration. SSL connections will no longer use
        the keyless server for cryptographic operations.
      operationId: keyless-ssl-for-a-zone-delete-keyless-ssl-configuration
      parameters:
        - in: path
          name: keyless_certificate_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesKeylessResponseSingleId
          description: Delete Keyless SSL Configuration response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: '#/components/schemas/identifier'
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Delete Keyless SSL Configuration response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Keyless SSL Configuration
      tags:
        - Keyless SSL for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: keyless_certificates
        resource_chain: []
        method: delete
    get:
      description: Get details for one Keyless SSL configuration.
      operationId: keyless-ssl-for-a-zone-get-keyless-ssl-configuration
      parameters:
        - in: path
          name: keyless_certificate_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesKeylessResponseSingle
          description: Get Keyless SSL Configuration response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefA91f0bd72ee433f010eecfdc94ccf298
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Get Keyless SSL Configuration response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Keyless SSL Configuration
      tags:
        - Keyless SSL for a Zone
      x-api-token-group:
        - Trust and Safety Write
        - Trust and Safety Read
        - 'Zero Trust: PII Read'
        - Zaraz Edit
        - Zaraz Read
        - Zaraz Admin
        - 'Access: Apps and Policies Revoke'
        - 'Access: Apps and Policies Write'
        - 'Access: Apps and Policies Read'
        - 'Access: Apps and Policies Revoke'
        - 'Access: Mutual TLS Certificates Write'
        - 'Access: Organizations, Identity Providers, and Groups Write'
        - Zone Settings Write
        - Zone Settings Read
        - Zone Read
        - DNS Read
        - Workers Scripts Write
        - Workers Scripts Read
        - Zone Write
        - Workers Routes Write
        - Workers Routes Read
        - Stream Write
        - Stream Read
        - SSL and Certificates Write
        - SSL and Certificates Read
        - Logs Write
        - Logs Read
        - Cache Purge
        - Page Rules Write
        - Page Rules Read
        - Load Balancers Write
        - Load Balancers Read
        - Firewall Services Write
        - Firewall Services Read
        - DNS Write
        - Apps Write
        - Analytics Read
        - 'Access: Apps and Policies Write'
        - 'Access: Apps and Policies Read'
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: keyless_certificates
        resource_chain: []
        method: get
    patch:
      description: >-
        This will update attributes of a Keyless SSL. Consists of one or more of
        the following: host,name,port.
      operationId: keyless-ssl-for-a-zone-edit-keyless-ssl-configuration
      parameters:
        - in: path
          name: keyless_certificate_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                enabled:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesEnabledWrite'
                host:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesHost'
                name:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesNameWrite'
                port:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesPort'
                tunnel:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesKeylessTunnel
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesKeylessResponseSingle
          description: Edit Keyless SSL Configuration response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRefA91f0bd72ee433f010eecfdc94ccf298
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Edit Keyless SSL Configuration response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Edit Keyless SSL Configuration
      tags:
        - Keyless SSL for a Zone
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: keyless_certificates
        resource_chain: []
        method: edit
components:
  schemas:
    identifier:
      properties:
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
      type: object
      enum:
        - null
    tlsCertificatesAndHostnamesBase:
      properties:
        created_on:
          description: When the Keyless SSL was created.
          example: '2014-01-01T05:20:00Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        enabled:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesEnabled'
        host:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesHost'
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasIdentifier'
        modified_on:
          description: When the Keyless SSL was last modified.
          example: '2014-01-01T05:20:00Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        name:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesName'
        permissions:
          description: >-
            Available permissions for the Keyless SSL for the current user
            requesting the item.
          example:
            - '#ssl:read'
            - '#ssl:edit'
          items:
            type: string
            x-auditable: true
          readOnly: true
          type: array
        port:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesPort'
        status:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasStatus'
        tunnel:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesKeylessTunnel'
      required:
        - id
        - name
        - host
        - port
        - status
        - enabled
        - permissions
        - created_on
        - modified_on
      type: object
    tlsCertificatesAndHostnamesBundleMethod:
      $ref: '#/components/schemas/unnamedSchemaRef16aca57bde2963201c7e6e895436c1c1'
    tlsCertificatesAndHostnamesEnabled:
      description: Whether or not the Keyless SSL is on or off.
      example: false
      readOnly: true
      type: boolean
      x-auditable: true
    tlsCertificatesAndHostnamesEnabledWrite:
      deprecated: true
      description: Whether or not the Keyless SSL is on or off.
      example: false
      type: boolean
      x-auditable: true
    tlsCertificatesAndHostnamesHost:
      description: The keyless SSL name.
      example: example.com
      format: hostname
      maxLength: 253
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesKeylessCertificate:
      type: object
      $ref: '#/components/schemas/tlsCertificatesAndHostnamesBase'
    tlsCertificatesAndHostnamesKeylessPrivateIp:
      description: Private IP of the Key Server Host
      example: 10.0.0.1
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesKeylessResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesKeylessCertificate'
          type: array
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesKeylessResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          type: object
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesBase'
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesKeylessResponseSingleId:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          properties:
            id:
              $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          type: object
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesKeylessTunnel:
      description: Configuration for using Keyless SSL through a Cloudflare Tunnel
      properties:
        private_ip:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesKeylessPrivateIp'
        vnet_id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesKeylessVnetId'
      required:
        - private_ip
        - vnet_id
      type: object
    tlsCertificatesAndHostnamesKeylessVnetId:
      description: Cloudflare Tunnel Virtual Network ID
      example: 7365377a-85a4-4390-9480-531ef7dc7a3c
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    tlsCertificatesAndHostnamesName:
      description: The keyless SSL name.
      example: example.com Keyless SSL
      maxLength: 180
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesNameWrite:
      description: The keyless SSL name.
      example: example.com Keyless SSL
      maxLength: 180
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesPort:
      default: 24008
      description: >-
        The keyless SSL port used to communicate between Cloudflare and the
        client's Keyless SSL server.
      example: 24008
      maxLength: 65535
      type: number
      x-auditable: true
    tlsCertificatesAndHostnamesSchemasCertificate:
      description: The zone's SSL certificate or SSL certificate and intermediate(s).
      example: |-
        -----BEGIN CERTIFICATE-----
        MIIDtTCCAp2gAwIBAgIJAM15n7fdxhRtMA0GCSqGSIb3DQEBBQUAMEUxCzAJBgNV
        BAYTAlVTMRMwEQYDVQQIEwpTb21lLVN0YXRlMSEwHwYDVQQKExhJbnRlcm5ldCBX
        aWRnaXRzIFB0eSBMdGQwHhcNMTQwMzExMTkyMTU5WhcNMTQwNDEwMTkyMTU5WjBF
        MQswCQYDVQQGEwJVUzETMBEGA1UECBMKU29tZS1TdGF0ZTEhMB8GA1UEChMYSW50
        ZXJuZXQgV2lkZ2l0cyBQdHkgTHRkMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIB
        CgKCAQEAvq3sKsHpeduJHimOK+fvQdKsI8z8A05MZyyLp2/R/GE8FjNv+hkVY1WQ
        LIyTNNQH7CJecE1nbTfo8Y56S7x/rhxC6/DJ8MIulapFPnorq46KU6yRxiM0MQ3N
        nTJHlHA2ozZta6YBBfVfhHWl1F0IfNbXCLKvGwWWMbCx43OfW6KTkbRnE6gFWKuO
        fSO5h2u5TaWVuSIzBvYs7Vza6m+gtYAvKAJV2nSZ+eSEFPDo29corOy8+huEOUL8
        5FAw4BFPsr1TlrlGPFitduQUHGrSL7skk1ESGza0to3bOtrodKei2s9bk5MXm7lZ
        qI+WZJX4Zu9+mzZhc9pCVi8r/qlXuQIDAQABo4GnMIGkMB0GA1UdDgQWBBRvavf+
        sWM4IwKiH9X9w1vl6nUVRDB1BgNVHSMEbjBsgBRvavf+sWM4IwKiH9X9w1vl6nUV
        RKFJpEcwRTELMAkGA1UEBhMCVVMxEzARBgNVBAgTClNvbWUtU3RhdGUxITAfBgNV
        BAoTGEludGVybmV0IFdpZGdpdHMgUHR5IEx0ZIIJAM15n7fdxhRtMAwGA1UdEwQF
        MAMBAf8wDQYJKoZIhvcNAQEFBQADggEBABY2ZzBaW0dMsAAT7tPJzrVWVzQx6KU4
        UEBLudIlWPlkAwTnINCWR/8eNjCCmGA4heUdHmazdpPa8RzwOmc0NT1NQqzSyktt
        vTqb4iHD7+8f9MqJ9/FssCfTtqr/Qst/hGH4Wmdf1EJ/6FqYAAb5iRlPgshFZxU8
        uXtA8hWn6fK6eISD9HBdcAFToUvKNZ1BIDPvh9f95Ine8ar6yGd56TUNrHR8eHBs
        ESxz5ddVR/oWRysNJ+aGAyYqHS8S/ttmC7r4XCAHqXptkHPCGRqkAhsterYhd4I8
        /cBzejUobNCjjHFbtkAL/SjxZOLW+pNkZwfeYdM8iPkD54Uua1v2tdw=
        -----END CERTIFICATE-----
      type: string
    tlsCertificatesAndHostnamesSchemasIdentifier:
      description: Keyless certificate identifier tag.
      example: 4d2844d2ce78891c34d0b6c0535a291e
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesSchemasStatus:
      description: Status of the Keyless SSL.
      enum:
        - active
        - deleted
      example: active
      readOnly: true
      type: string
      x-auditable: true
    unnamedSchemaRef16aca57bde2963201c7e6e895436c1c1:
      default: ubiquitous
      description: >-
        A ubiquitous bundle has the highest probability of being verified
        everywhere, even by clients using outdated or unusual trust stores. An
        optimal bundle uses the shortest chain and newest intermediates. And the
        force bundle verifies the chain, but does not otherwise modify it.
      enum:
        - ubiquitous
        - optimal
        - force
      example: ubiquitous
      type: string
      x-auditable: true
    unnamedSchemaRefA91f0bd72ee433f010eecfdc94ccf298:
      type: object
      properties:
        created_on:
          description: When the Keyless SSL was created.
          example: '2014-01-01T05:20:00Z'
          format: date-time
          readOnly: true
          type: string
          x-auditable: true
        enabled:
