openapi: 3.0.3
info:
  title: cache API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones/{zone_id}/cache/cache_reserve:
    get:
      description: 'Increase cache lifetimes by automatically storing all cacheable files into Cloudflare''s persistent object storage buckets. Requires Cache Reserve subscription. Note: using Tiered Cache with Cache Reserve is highly recommended to reduce Reserve operations costs. See the [developer docs](https://developers.cloudflare.com/cache/about/cache-reserve) for more information.'
      operationId: zone-cache-settings-get-cache-reserve-setting
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    properties:
                      editable:
                        $ref: '#/components/schemas/cacheRulesEditable'
                      id:
                        $ref: '#/components/schemas/cacheReserve'
                        x-stainless-naming:
                          terraform:
                            property_name: zone_setting_id
                      modified_on:
                        $ref: '#/components/schemas/cacheRulesModifiedOn'
                        description: Last time this setting was modified.
                        format: date-time
                        nullable: true
                        readOnly: true
                        type: string
                        x-auditable: true
                      value:
                        description: Value of the Cache Reserve zone setting.
                        type: string
                        x-auditable: true
                        default: 'off'
                        enum:
                        - 'on'
                        - 'off'
                    required:
                    - id
                    - value
                    - editable
                    - id
                    - value
                    type: object
                    title: Cache Reserve
                required:
                - success
                - errors
                - messages
          description: Get Cache Reserve setting response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Get Cache Reserve setting response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get Cache Reserve setting
      tags:
      - Zone Cache Settings
      x-api-token-group:
      - Zone Settings Write
      - Zone Settings Read
      - Zone Read
      - Zone Write
      x-cfPermissionsRequired:
        enum:
        - '#zone_settings:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: cache
        resource_chain:
        - cache_reserve
        method: get
    patch:
      description: 'Increase cache lifetimes by automatically storing all cacheable files into Cloudflare''s persistent object storage buckets. Requires Cache Reserve subscription. Note: using Tiered Cache with Cache Reserve is highly recommended to reduce Reserve operations costs. See the [developer docs](https://developers.cloudflare.com/cache/about/cache-reserve) for more information.'
      operationId: zone-cache-settings-change-cache-reserve-setting
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                value:
                  $ref: '#/components/schemas/cacheRulesCacheReserveValue'
              required:
              - value
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    properties:
                      editable:
                        $ref: '#/components/schemas/cacheRulesEditable'
                      id:
                        $ref: '#/components/schemas/cacheReserve'
                      modified_on:
                        $ref: '#/components/schemas/cacheRulesModifiedOn'
                        description: Last time this setting was modified.
                        format: date-time
                        nullable: true
                        readOnly: true
                        type: string
                        x-auditable: true
                      value:
                        description: Value of the Cache Reserve zone setting.
                        type: string
                        x-auditable: true
                        default: 'off'
                        enum:
                        - 'on'
                        - 'off'
                    required:
                    - id
                    - value
                    - editable
                    - id
                    - value
                    type: object
                    title: Cache Reserve
                required:
                - success
                - errors
                - messages
          description: Change Cache Reserve setting response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Change Cache Reserve setting response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Change Cache Reserve setting
      tags:
      - Zone Cache Settings
      x-api-token-group:
      - Zone Settings Write
      - Zone Write
      x-cfPermissionsRequired:
        enum:
        - '#zone_settings:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: cache
        resource_chain:
        - cache_reserve
        method: edit
  /zones/{zone_id}/cache/cache_reserve_clear:
    get:
      description: You can use Cache Reserve Clear to clear your Cache Reserve, but you must first disable Cache Reserve. In most cases, this will be accomplished within 24 hours. You cannot re-enable Cache Reserve while this process is ongoing. Keep in mind that you cannot undo or cancel this operation.
      operationId: zone-cache-settings-get-cache-reserve-clear
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    type: object
                    description: You can use Cache Reserve Clear to clear your Cache Reserve, but you must first disable Cache Reserve. In most cases, this will be accomplished within 24 hours. You cannot re-enable Cache Reserve while this process is ongoing. Keep in mind that you cannot undo or cancel this operation.
                    title: Cache Reserve Clear
                    properties:
                      id:
                        $ref: '#/components/schemas/unnamedSchemaRef2b5e755404a4bfd7892291ce97c4968d'
                      modified_on:
                        description: Last time this setting was modified.
                        format: date-time
                        nullable: true
                        readOnly: true
                        type: string
                        x-auditable: true
                      end_ts:
                        $ref: '#/components/schemas/cacheRulesCacheReserveClearEndTs'
                      start_ts:
                        $ref: '#/components/schemas/cacheRulesCacheReserveClearStartTs'
                      state:
                        $ref: '#/components/schemas/cacheRulesCacheReserveClearState'
                    required:
                    - id
                    - state
                    - start_ts
                required:
                - success
                - errors
                - messages
          description: Get Cache Reserve Clear response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Get Cache Reserve Clear failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get Cache Reserve Clear
      tags:
      - Zone Cache Settings
      x-api-token-group:
      - Zone Settings Write
      - Zone Settings Read
      - Zone Read
      - Zone Write
      x-cfPermissionsRequired:
        enum:
        - '#zone_settings:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: cache
        resource_chain:
        - cache_reserve
        method: status
    post:
      description: You can use Cache Reserve Clear to clear your Cache Reserve, but you must first disable Cache Reserve. In most cases, this will be accomplished within 24 hours. You cannot re-enable Cache Reserve while this process is ongoing. Keep in mind that you cannot undo or cancel this operation.
      operationId: zone-cache-settings-start-cache-reserve-clear
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json: {}
        description: The request body is currently not used.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    type: object
                    description: You can use Cache Reserve Clear to clear your Cache Reserve, but you must first disable Cache Reserve. In most cases, this will be accomplished within 24 hours. You cannot re-enable Cache Reserve while this process is ongoing. Keep in mind that you cannot undo or cancel this operation.
                    title: Cache Reserve Clear
                    properties:
                      id:
                        $ref: '#/components/schemas/unnamedSchemaRef2b5e755404a4bfd7892291ce97c4968d'
                      modified_on:
                        description: Last time this setting was modified.
                        format: date-time
                        nullable: true
                        readOnly: true
                        type: string
                        x-auditable: true
                      end_ts:
                        $ref: '#/components/schemas/cacheRulesCacheReserveClearEndTs'
                      start_ts:
                        $ref: '#/components/schemas/cacheRulesCacheReserveClearStartTs'
                      state:
                        $ref: '#/components/schemas/cacheRulesCacheReserveClearState'
                    required:
                    - id
                    - state
                    - start_ts
                required:
                - success
                - errors
                - messages
          description: Start Cache Reserve Clear response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Start Cache Reserve Clear failure response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Start Cache Reserve Clear
      tags:
      - Zone Cache Settings
      x-api-token-group:
      - Zone Settings Write
      - Zone Write
      x-cfPermissionsRequired:
        enum:
        - '#zone_settings:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: cache
        resource_chain:
        - cache_reserve
        method: clear
  /zones/{zone_id}/cache/origin_cloud_regions:
    get:
      description: Returns all IP-to-cloud-region mappings configured for the zone. Each mapping tells Cloudflare which cloud vendor and region hosts the origin at that IP, enabling the edge to route via the nearest Tiered Cache upper-tier co-located with that cloud provider. Returns an empty array when no mappings exist.
      operationId: origin-cloud-regions-list
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/cacheRulesOriginCloudRegionsListResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: List origin cloud region mappings response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: List origin cloud region mappings failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List origin cloud region mappings
      tags:
      - Origin Cloud Regions
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
    patch:
      description: "Adds or updates a single IP-to-cloud-region mapping for the zone. Unlike POST, this operation is idempotent \u2014 if a mapping for the IP already exists it is overwritten. Returns the complete updated list of all mappings for the zone. Returns 403 (code 1164) when the zone has reached the limit of 3,500 IP mappings."
      operationId: origin-cloud-regions-upsert
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cacheRulesOriginCloudRegionRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/cacheRulesOriginCloudRegionsListResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Create or update origin cloud region mapping response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Create or update origin cloud region mapping failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create or update an origin cloud region mapping
      tags:
      - Origin Cloud Regions
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
    post:
      description: "Adds a single IP-to-cloud-region mapping for the zone. The IP must be a valid IPv4 or IPv6 address and is normalized to canonical form before storage (RFC 5952 for IPv6). Returns 400 (code 1145) if a mapping for that IP already exists \u2014 use PATCH to update an existing entry. The vendor and region are validated against the list from `GET /zones/{zone_id}/cache/origin_cloud_regions/supported_regions`."
      operationId: origin-cloud-regions-create
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cacheRulesOriginCloudRegionRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/cacheRulesOriginCloudRegionSingleResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Create origin cloud region mapping response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Create origin cloud region mapping failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create an origin cloud region mapping
      tags:
      - Origin Cloud Regions
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/cache/origin_cloud_regions/batch:
    delete:
      description: "Removes up to 100 IP-to-cloud-region mappings in a single request. Each IP is validated independently \u2014 successfully deleted items are returned in the `succeeded` array and IPs that could not be found or are invalid are returned in the `failed` array."
      operationId: origin-cloud-regions-batch-delete
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/cacheRulesOriginCloudRegionBatchResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Batch delete origin cloud region mappings successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Batch delete origin cloud region mappings failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Batch delete origin cloud region mappings internal error.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Batch delete origin cloud region mappings
      tags:
      - Origin Cloud Regions
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
    patch:
      description: "Adds or updates up to 100 IP-to-cloud-region mappings in a single request. Each item is validated independently \u2014 valid items are applied and invalid items are returned in the `failed` array. The vendor and region for every item are validated against the list from `GET /zones/{zone_id}/cache/origin_cloud_regions/supported_regions`."
      operationId: origin-cloud-regions-batch-upsert
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/cacheRulesOriginCloudRegionRequest'
              maxItems: 100
              type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/cacheRulesOriginCloudRegionBatchResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Batch create or update origin cloud region mappings successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Batch create or update origin cloud region mappings failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Batch create or update origin cloud region mappings internal error.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Batch create or update origin cloud region mappings
      tags:
      - Origin Cloud Regions
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/cache/origin_cloud_regions/supported_regions:
    get:
      description: Returns the cloud vendors and regions that are valid values for origin cloud region mappings. Each region includes the Tiered Cache upper-tier colocation codes that will be used for cache routing when a mapping targeting that region is active. Requires the zone to have Tiered Cache enabled.
      operationId: origin-cloud-regions-supported-regions
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/cacheRulesSupportedCloudRegionsResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: List supported cloud vendors and regions response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: List supported cloud vendors and regions failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List supported cloud vendors and regions
      tags:
      - Origin Cloud Regions
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/cache/origin_cloud_regions/{origin_ip}:
    delete:
      description: Removes the cloud region mapping for a single origin IP address. The IP path parameter is normalized before lookup. Returns the deleted entry on success. Returns 404 (code 1163) if no mapping exists for the specified IP. When the last mapping for the zone is removed the underlying rule record is also deleted.
      operationId: origin-cloud-regions-delete
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - description: Origin IP address whose mapping should be deleted.
        in: path
        name: origin_ip
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/cacheRulesOriginCloudRegionSingleResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Delete origin cloud region mapping response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Delete origin cloud region mapping failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete an origin cloud region mapping
      tags:
      - Origin Cloud Regions
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
    get:
      description: Returns the cloud region mapping for a single origin IP address. The IP path parameter is normalized before lookup (RFC 5952 for IPv6). Returns 404 (code 1142) if the zone has no mappings or if the specified IP has no mapping.
      operationId: origin-cloud-regions-get
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - description: Origin IP address to look up. IPv4 and IPv6 are supported.
        in: path
        name: origin_ip
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  messages:
                    $ref: '#/components/schemas/cacheRulesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/cacheRulesOriginCloudRegionSingleResult'
                required:
                - success
                - errors
                - messages
                type: object
          description: Get origin cloud region mapping response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheRulesApiResponseCommonFailure'
          description: Get origin cloud region mapping failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get an origin cloud region mapping
      tags:
      - Origin Cloud Regions
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/cache/regional_tiered_cache:
    get:
      description: Instructs Cloudflare to check a regional hub data center on the way to your upper tier. This can help improve performance for smart and custom tiered cache topologies.
      operationId: zone-cache-settings-get-regional-tiered-cache-setting
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
