  /graphql/cdn_network_analytics_adaptive_groups:
    post:
      operationId: graphql-cdn_network_analytics_adaptive_groups-list
      summary: Cloudflare CDN edge network-layer analytics for an account, grouped by colo, source/destination country, packet direction, and IP protocol
      description: Cloudflare CDN edge network-layer analytics for an account, grouped by colo, source/destination country, packet direction, and IP protocol. Per-tuple totals for bits and packets received at the edge.
      x-stackQL-graphQL:
        url: https://api.cloudflare.com/client/v4/graphql
        httpVerb: POST
        responseSelection:
          jsonPath: $.result[*]
        cursor:
          jsonPath: $.result[*].__no_cursor
        query: "query {\n  viewer {\n    accounts(filter: { accountTag: \"{{ .account_tag }}\" }, limit: 1) {\n      cdnNetworkAnalyticsAdaptiveGroups(\n        filter: { datetime_geq: \"{{ .since }}\", datetime_lt: \"{{ .until }}\" }\n        limit: {{ if .limit }}{{ .limit }}{{ else }}100{{ end }}\n        orderBy: [datetimeMinute_ASC]\n      ) {\n        dimensions {\n          datetime: datetimeMinute\n          coloCode\n          coloCountry\n          direction\n          ipProtocolName\n          sourceCountry\n          destinationCountry\n        }\n        sum {\n          bits\n          packets\n        }\n      }\n    }\n  }\n}\n"
      x-stackql-protocol: graphql
      parameters:
      - name: account_tag
        in: path
        required: true
        schema:
          type: string
        description: Cloudflare account ID (the 32-char hex tag).
      - name: since
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Lower bound (inclusive). RFC3339.
      - name: until
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Upper bound (exclusive). RFC3339.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
        description: Maximum dimension-tuple rows per call.
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        datetime:
                          type: string
                          format: date-time
                        colo_code:
                          type: string
                          description: IATA code of the receiving Cloudflare datacenter.
                        colo_country:
                          type: string
                          description: Country of the receiving datacenter.
                        direction:
                          type: string
                          description: Packet direction relative to the customer network.
                        ip_protocol_name:
                          type: string
                          description: Name of the L4 protocol (TCP / UDP / ICMP / GRE / etc.).
                        source_country:
                          type: string
                          description: Country of the source IP.
                        destination_country:
                          type: string
                          description: Country of the destination IP.
                        bits:
                          type: integer
                          description: Sum of bits received.
                        packets:
                          type: integer
                          description: Sum of packets received.
