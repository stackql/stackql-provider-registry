components:
  schemas:
    billSubsApiBillingResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/billSubsApiMessages'
        messages:
          $ref: '#/components/schemas/billSubsApiMessages'
        result:
          properties:
            account_type:
              example: type
              type: string
            address:
              example: 123 Main Street
              type: string
            address2:
              example: Apt 1
              type: string
            balance:
              example: '0'
              type: string
            card_expiry_month:
              example: 12
              type: integer
            card_expiry_year:
              example: 2099
              type: integer
            card_number:
              example: '4242424242424242'
              type: string
            city:
              example: Anytown
              type: string
            company:
              example: Company
              type: string
            country:
              example: Anycountry
              type: string
            created_on:
              example: '2014-03-01T12:21:59.3456Z'
              format: date-time
              type: string
              readOnly: true
            device_data:
              example: sample_data
              type: string
            edited_on:
              example: '2014-03-01T12:21:59.3456Z'
              format: date-time
              type: string
            enterprise_billing_email:
              example: johndoe@gmail.com
              type: string
              x-auditable: true
            enterprise_primary_email:
              example: johndoe@gmail.com
              type: string
              x-auditable: true
            first_name:
              example: John
              type: string
            id:
              $ref: '#/components/schemas/billSubsApiComponentsSchemasIdentifier'
            is_partner:
              example: false
              type: boolean
            last_name:
              example: Doe
              type: string
            next_bill_date:
              example: '2014-03-01T12:21:59.3456Z'
              format: date-time
              type: string
            payment_address:
              example: 123 Main Street
              type: string
            payment_address2:
              example: Apt 1
              type: string
            payment_city:
              example: Anytown
              type: string
            payment_country:
              example: Anycountry
              type: string
            payment_email:
              example: johndoe@gmail.com
              type: string
            payment_first_name:
              example: John
              type: string
            payment_gateway:
              example: gateway
              type: string
            payment_last_name:
              example: Doe
              type: string
            payment_nonce:
              example: abc123
              type: string
            payment_state:
              example: state
              type: string
            payment_zipcode:
              example: '12345'
              type: string
            primary_email:
              example: johndoe@gmail.com
              type: string
              x-auditable: true
            state:
              example: AnyState
              type: string
            tax_id_type:
              example: type
              type: string
            telephone:
              example: '1234567899'
              type: string
            use_legacy:
              example: false
              type: boolean
            validation_code:
              example: '1111'
              type: string
            vat:
              example: GB123456789
              type: string
            zipcode:
              example: '12345'
              type: string
          type: object
        success:
          description: Whether the API call was successful
          enum:
          - true
          example: true
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
    billSubsApiComponentsSchemasIdentifier:
      description: Billing item identifier tag.
      example: b69a9f3492637782896352daae219e7d
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    billSubsApiMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    billableUsageApiApiResponseCommonFailure:
      description: Represents a failed API response.
      properties:
        errors:
          description: Contains error details describing why the request failed.
          example:
          - code: 1183
            message: 'Invalid request parameters: Please ensure all required parameters are included and correctly formatted.'
          items:
            $ref: '#/components/schemas/billableUsageApiMessage'
          minItems: 1
          type: array
        messages:
          description: Contains informational notices about the response.
          items:
            $ref: '#/components/schemas/billableUsageApiMessage'
          nullable: true
          type: array
        result:
          description: Contains the response payload (always null on failure).
          nullable: true
          type: object
        success:
          description: Indicates whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    billableUsageApiMessage:
      description: Represents an API notice or error detail.
      properties:
        code:
          description: Identifies the error or notice type.
          type: integer
        message:
          description: Describes the error or notice.
          type: string
      required:
      - message
      type: object
    billableUsageApiUsageRecord:
      description: Represents a single billable usage record.
      properties:
        BillingCurrency:
          description: Specifies the billing currency code (ISO 4217).
          example: USD
          type: string
        BillingPeriodStart:
          description: Indicates the start of the billing period.
          example: '2025-02-01T00:00:00Z'
          format: date-time
          type: string
        ChargePeriodEnd:
          description: Indicates the end of the charge period.
          example: '2025-02-02T00:00:00Z'
          format: date-time
          type: string
        ChargePeriodStart:
          description: Indicates the start of the charge period.
          example: '2025-02-01T00:00:00Z'
          format: date-time
          type: string
        ConsumedQuantity:
          description: Specifies the quantity consumed during this charge period.
          example: 150000
          type: number
        ConsumedUnit:
          description: Specifies the unit of measurement for consumed quantity.
          example: Requests
          type: string
        ContractedCost:
          description: Specifies the cost for this charge period in the billing currency.
          example: 0.75
