openapi: 3.0.3
info:
  title: billing API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/billing/profile:
    get:
      deprecated: true
      description: Gets the current billing profile for the account.
      operationId: account-billing-profile-(-deprecated)-billing-profile-details
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/billSubsApiBillingResponseSingle'
          description: Billing Profile Details response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/billSubsApiMessages'
                  messages:
                    $ref: '#/components/schemas/billSubsApiMessages'
                  result:
                    properties:
                      account_type:
                        type: string
                      address:
                        type: string
                      address2:
                        type: string
                      balance:
                        type: string
                      card_expiry_month:
                        type: integer
                      card_expiry_year:
                        type: integer
                      card_number:
                        type: string
                      city:
                        type: string
                      company:
                        type: string
                      country:
                        type: string
                      created_on:
                        format: date-time
                        type: string
                        readOnly: true
                      device_data:
                        type: string
                      edited_on:
                        format: date-time
                        type: string
                      enterprise_billing_email:
                        type: string
                        x-auditable: true
                      enterprise_primary_email:
                        type: string
                        x-auditable: true
                      first_name:
                        type: string
                      id:
                        $ref: '#/components/schemas/billSubsApiComponentsSchemasIdentifier'
                      is_partner:
                        type: boolean
                      last_name:
                        type: string
                      next_bill_date:
                        format: date-time
                        type: string
                      payment_address:
                        type: string
                      payment_address2:
                        type: string
                      payment_city:
                        type: string
                      payment_country:
                        type: string
                      payment_email:
                        type: string
                      payment_first_name:
                        type: string
                      payment_gateway:
                        type: string
                      payment_last_name:
                        type: string
                      payment_nonce:
                        type: string
                      payment_state:
                        type: string
                      payment_zipcode:
                        type: string
                      primary_email:
                        type: string
                        x-auditable: true
                      state:
                        type: string
                      tax_id_type:
                        type: string
                      telephone:
                        type: string
                      use_legacy:
                        type: boolean
                      validation_code:
                        type: string
                      vat:
                        type: string
                      zipcode:
                        type: string
                    type: object
                    enum:
                    - null
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Billing Profile Details response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Billing Profile Details
      tags:
      - Account Billing Profile
      x-api-token-group:
      - Billing Write
      - Billing Read
      x-cfPermissionsRequired:
        enum:
        - '#billing:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: billing
        resource_chain:
        - profiles
        method: get
  /accounts/{account_id}/billing/usage/paygo:
    get:
      description: Returns billable usage data for PayGo (self-serve) accounts. When no query parameters are provided, returns usage for the current billing period. This endpoint is currently in alpha and access is restricted to select accounts. While in alpha, the endpoint may get breaking changes.
      operationId: billable-usage-get-paygo-account-usage
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Defines the start date for the usage query (e.g., 2025-02-01).
        in: query
        name: from
        schema:
          format: date
          type: string
      - description: Defines the end date for the usage query (e.g., 2025-03-01).
        in: query
        name: to
        schema:
          format: date
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/billableUsageApiUsageResponse'
          description: Indicates PayGo account usage data was successfully retrieved.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/billableUsageApiApiResponseCommonFailure'
          description: Indicates the request failed.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get PayGo Account Billable Usage (Alpha)
      tags:
      - Billable Usage
      x-api-token-group:
      - Billing Write
      - Billing Read
      x-cfPlanAvailability:
        business: true
        enterprise: false
        free: true
        pro: true
      x-stackql-sdk:
        service: billing
        resource_chain:
        - usage
        method: paygo
