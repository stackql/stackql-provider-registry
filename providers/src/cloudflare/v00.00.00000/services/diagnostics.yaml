openapi: 3.0.3
info:
  title: diagnostics API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/diagnostics/endpoint-healthchecks:
    get:
      description: List Endpoint Health Checks.
      operationId: diagnostics-endpoint-healthcheck-list
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/magicTransitEndpointHealthCheckResponseSingle
          description: Endpoint Health Checks for account.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/magicTransitApiResponseCommonFailure'
          description: Endpoint Health Check response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Endpoint Health Checks
      tags:
        - Endpoint Health Checks
      x-api-token-group:
        - Magic Transit Write
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: diagnostics
        resource_chain:
          - endpoint_healthchecks
        method: list
    post:
      description: Create Endpoint Health Check.
      operationId: diagnostics-endpoint-healthcheck-create
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/magicTransitEndpointHealthCheck'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/magicTransitEndpointHealthCheckResponseSingle
          description: Endpoint Health Check response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/magicTransitApiResponseCommonFailure'
          description: Endpoint Health Check response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Endpoint Health Check
      tags:
        - Endpoint Health Checks
      x-api-token-group:
        - Magic Transit Write
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: diagnostics
        resource_chain:
          - endpoint_healthchecks
        method: create
  /accounts/{account_id}/diagnostics/endpoint-healthchecks/{id}:
    delete:
      description: Delete Endpoint Health Check.
      operationId: diagnostics-endpoint-healthcheck-delete
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Resource ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/magicTransitApiResponseCommon'
          description: Endpoint Health Checks response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/magicTransitApiResponseCommonFailure'
          description: Endpoint Health Check failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Endpoint Health Check
      tags:
        - Endpoint Health Checks
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: diagnostics
        resource_chain:
          - endpoint_healthchecks
        method: delete
    get:
      description: Get a single Endpoint Health Check.
      operationId: diagnostics-endpoint-healthcheck-get
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Resource ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/magicTransitEndpointHealthCheckResponseSingle
          description: Endpoint Health Checks response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/magicTransitMessages'
                  messages:
                    $ref: '#/components/schemas/magicTransitMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/magicTransitTargetResult'
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: Endpoint Health Check failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Endpoint Health Check
      tags:
        - Endpoint Health Checks
      x-api-token-group:
        - Magic Transit Write
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: diagnostics
        resource_chain:
          - endpoint_healthchecks
        method: get
    put:
      description: Update a Endpoint Health Check.
      operationId: diagnostics-endpoint-healthcheck-update
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Resource ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/magicTransitEndpointHealthCheck'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/magicTransitEndpointHealthCheckResponseSingle
          description: Endpoint Health Checks response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/magicTransitApiResponseCommonFailure'
          description: Endpoint Health Check failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Endpoint Health Check
      tags:
        - Endpoint Health Checks
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: diagnostics
        resource_chain:
          - endpoint_healthchecks
        method: update
  /accounts/{account_id}/diagnostics/traceroute:
    post:
      description: Run traceroutes from Cloudflare colos.
      operationId: diagnostics-traceroute
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                colos:
                  $ref: '#/components/schemas/magicTransitColos'
                options:
                  $ref: '#/components/schemas/magicTransitOptions'
                targets:
                  $ref: '#/components/schemas/magicTransitTargets'
              required:
                - targets
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/magicTransitTracerouteResponseCollection'
          description: Traceroute response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/magicTransitMessages'
                  messages:
                    $ref: '#/components/schemas/magicTransitMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/magicTransitTargetResult'
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: Traceroute response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Traceroute
      tags:
        - Diagnostics
      x-api-token-group:
        - Magic Transit Write
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
components:
  schemas:
    magicTransitApiResponseCommon:
      properties:
        errors:
          $ref: '#/components/schemas/magicTransitMessages'
        messages:
          $ref: '#/components/schemas/magicTransitMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
      type: object
    magicTransitApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/magicTransitMessages'
        messages:
          example: []
          $ref: '#/components/schemas/magicTransitMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    magicTransitAsn:
      description: AS number associated with the node object.
      type: string
    magicTransitCheckType:
      default: icmp
      description: type of check to perform
      enum:
        - icmp
      example: icmp
      type: string
    magicTransitColo:
      properties:
        city:
          $ref: '#/components/schemas/magicTransitColoCity'
        name:
          $ref: '#/components/schemas/magicTransitColoName'
      type: object
    magicTransitColoCity:
      description: Source colo city.
      example: Denver, CO, US
      type: string
    magicTransitColoName:
      description: Source colo name.
      example: den01
      type: string
    magicTransitColoResult:
      properties:
        colo:
          $ref: '#/components/schemas/magicTransitColo'
        error:
          $ref: '#/components/schemas/magicTransitError'
        hops:
          items:
            $ref: '#/components/schemas/magicTransitHopResult'
          type: array
        target_summary:
          $ref: '#/components/schemas/magicTransitTargetSummary'
        traceroute_time_ms:
          $ref: '#/components/schemas/magicTransitTracerouteTimeMs'
      type: object
    magicTransitColos:
      description: >-
        If no source colo names specified, all colos will be used. China colos
        are unavailable for traceroutes.
      example:
        - den
        - sin
      items:
        description: Source colo name.
        type: string
      type: array
    magicTransitEndpointHealthCheck:
      properties:
        check_type:
          $ref: '#/components/schemas/magicTransitCheckType'
        endpoint:
          description: the IP address of the host to perform checks against
          example: 203.0.113.1
          type: string
        name:
          description: Optional name associated with this check
          example: My Endpoint
          type: string
      required:
        - check_type
        - endpoint
      type: object
    magicTransitEndpointHealthCheckResponse:
      required:
        - check_type
        - endpoint
      type: object
      properties:
        check_type:
          $ref: '#/components/schemas/magicTransitCheckType'
        endpoint:
          description: the IP address of the host to perform checks against
          example: 203.0.113.1
          type: string
        name:
          description: Optional name associated with this check
          example: My Endpoint
          type: string
        id:
          $ref: '#/components/schemas/magicTransitUuid'
    magicTransitEndpointHealthCheckResponseSingle:
      properties:
        errors:
          $ref: '#/components/schemas/magicTransitMessages'
        messages:
          $ref: '#/components/schemas/magicTransitMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/magicTransitEndpointHealthCheckResponse'
      required:
        - success
        - errors
        - messages
      type: object
    magicTransitError:
      description: Errors resulting from collecting traceroute from colo to target.
      enum:
        - ''
        - 'Could not gather traceroute data: Code 1'
        - 'Could not gather traceroute data: Code 2'
        - 'Could not gather traceroute data: Code 3'
        - 'Could not gather traceroute data: Code 4'
      example: ''
      type: string
    magicTransitHopResult:
      properties:
        nodes:
          description: An array of node objects.
          items:
            $ref: '#/components/schemas/magicTransitNodeResult'
          type: array
        packets_lost:
          $ref: '#/components/schemas/magicTransitPacketsLost'
        packets_sent:
          $ref: '#/components/schemas/magicTransitPacketsSent'
        packets_ttl:
          $ref: '#/components/schemas/magicTransitPacketsTtl'
      type: object
    magicTransitIp:
      description: IP address of the node.
      type: string
    magicTransitLabels:
      description: >-
        Field appears if there is an additional annotation printed when the
        probe returns. Field also appears when running a GRE+ICMP traceroute to
        denote which traceroute a node comes from.
      items:
        type: string
      type: array
    magicTransitMaxRttMs:
      description: Maximum RTT in ms.
      type: number
    magicTransitMaxTtl:
      default: 15
      description: Max TTL.
      maximum: 64
      minimum: 0
      type: integer
    magicTransitMeanRttMs:
      description: Mean RTT in ms.
      type: number
    magicTransitMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    magicTransitMinRttMs:
      description: Minimum RTT in ms.
      type: number
    magicTransitName:
      description: Host name of the address, this may be the same as the IP address.
      type: string
    magicTransitNodeResult:
      example:
        asn: AS13335
        ip: 1.1.1.1
        max_latency_ms: 0.034
        mean_latency_ms: 0.021
        min_latency_ms: 0.014
        name: one.one.one.one
        packet_count: 3
        std_dev_latency_ms: 0.011269427669584647
      properties:
        asn:
          $ref: '#/components/schemas/magicTransitAsn'
        ip:
          $ref: '#/components/schemas/magicTransitIp'
        labels:
          $ref: '#/components/schemas/magicTransitLabels'
        max_rtt_ms:
          $ref: '#/components/schemas/magicTransitMaxRttMs'
        mean_rtt_ms:
          $ref: '#/components/schemas/magicTransitMeanRttMs'
        min_rtt_ms:
          $ref: '#/components/schemas/magicTransitMinRttMs'
        name:
          $ref: '#/components/schemas/magicTransitName'
        packet_count:
          $ref: '#/components/schemas/magicTransitPacketCount'
        std_dev_rtt_ms:
          $ref: '#/components/schemas/magicTransitStdDevRttMs'
      type: object
    magicTransitOptions:
      example:
        max_ttl: 15
        packet_type: icmp
      properties:
        max_ttl:
          $ref: '#/components/schemas/magicTransitMaxTtl'
        packet_type:
          $ref: '#/components/schemas/magicTransitPacketType'
        packets_per_ttl:
          $ref: '#/components/schemas/magicTransitPacketsPerTtl'
        port:
          $ref: '#/components/schemas/magicTransitPort'
        wait_time:
          $ref: '#/components/schemas/magicTransitWaitTime'
      type: object
    magicTransitPacketCount:
      description: Number of packets with a response from this node.
      type: integer
    magicTransitPacketType:
      default: icmp
      description: Type of packet sent.
      enum:
        - icmp
        - tcp
        - udp
        - gre
        - gre+icmp
      example: icmp
      type: string
    magicTransitPacketsLost:
      description: Number of packets where no response was received.
      type: integer
    magicTransitPacketsPerTtl:
      default: 3
      description: Number of packets sent at each TTL.
      maximum: 10
      minimum: 0
      type: integer
    magicTransitPacketsSent:
      description: Number of packets sent with specified TTL.
      type: integer
    magicTransitPacketsTtl:
      description: The time to live (TTL).
      type: integer
    magicTransitPort:
      default: 0
      description: >-
        For UDP and TCP, specifies the destination port. For ICMP, specifies the
        initial ICMP sequence value. Default value 0 will choose the best value
        to use for each protocol.
      maximum: 65535
      minimum: 0
      type: integer
    magicTransitStdDevRttMs:
      description: Standard deviation of the RTTs in ms.
      type: number
    magicTransitTarget:
      description: The target hostname, IPv6, or IPv6 address.
      example: 1.1.1.1
      type: string
    magicTransitTargetResult:
      properties:
        colos:
          items:
            $ref: '#/components/schemas/magicTransitColoResult'
          type: array
        target:
          $ref: '#/components/schemas/magicTransitTarget'
      type: object
    magicTransitTargetSummary:
      description: Aggregated statistics from all hops about the target.
      example:
        asn: ''
        ip: 1.1.1.1
        max_latency_ms: 0.034
        mean_latency_ms: 0.021
        min_latency_ms: 0.014
        name: 1.1.1.1
        packet_count: 3
        std_dev_latency_ms: 0.011269427669584647
      type: object
    magicTransitTargets:
      example:
        - 203.0.113.1
        - cloudflare.com
      items:
        description: Hosts as a hostname or IPv4/IPv6 address represented by strings.
        example: 203.0.113.1
        type: string
      maxLength: 10
      type: array
    magicTransitTracerouteResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/magicTransitMessages'
        messages:
          $ref: '#/components/schemas/magicTransitMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          items:
            $ref: '#/components/schemas/magicTransitTargetResult'
          type: array
      required:
        - success
        - errors
        - messages
      type: object
    magicTransitTracerouteTimeMs:
      description: Total time of traceroute in ms.
      type: integer
    magicTransitUuid:
      description: UUID.
      example: f174e90a-fafe-4643-bbbc-4a0ed4fc8415
      maxLength: 36
      type: string
    magicTransitWaitTime:
      default: 1
      description: Set the time (in seconds) to wait for a response to a probe.
      maximum: 5
      minimum: 1
      type: integer
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    endpoint_healthchecks:
      id: cloudflare.diagnostics.endpoint_healthchecks
      name: endpoint_healthchecks
      title: Endpoint Healthchecks
      methods:
        list:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1diagnostics~1endpoint-healthchecks/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1diagnostics~1endpoint-healthchecks/post
          response:
            mediaType: application/json
            openAPIDocKey: '201'
        delete:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1diagnostics~1endpoint-healthchecks~1{id}/delete
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1diagnostics~1endpoint-healthchecks~1{id}/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1diagnostics~1endpoint-healthchecks~1{id}/put
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/endpoint_healthchecks/methods/get'
          - $ref: >-
              #/components/x-stackQL-resources/endpoint_healthchecks/methods/list
        insert:
          - $ref: >-
              #/components/x-stackQL-resources/endpoint_healthchecks/methods/create
        update: []
        delete:
          - $ref: >-
              #/components/x-stackQL-resources/endpoint_healthchecks/methods/delete
        replace:
          - $ref: >-
              #/components/x-stackQL-resources/endpoint_healthchecks/methods/update
    diagnostics:
      id: cloudflare.diagnostics.diagnostics
      name: diagnostics
      title: Diagnostics
      methods:
        create_traceroute:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1diagnostics~1traceroute/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select: []
        insert: []
        update: []
        delete: []
        replace: []
