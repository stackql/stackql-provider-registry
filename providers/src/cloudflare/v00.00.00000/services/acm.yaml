openapi: 3.0.3
info:
  title: acm API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/acm/custom_trust_store:
    get:
      description: Get Custom Origin Trust Store for a Zone.
      operationId: custom-origin-trust-store-list-details
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: page
          schema:
            default: 1
            description: Page number of paginated results.
            minimum: 1
            type: number
        - in: query
          name: per_page
          schema:
            default: 20
            description: Number of records per page.
            maximum: 50
            minimum: 5
            type: number
        - in: query
          name: limit
          schema:
            description: Limit to the number of records returned.
            type: integer
        - in: query
          name: offset
          schema:
            description: Offset the results
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCustomTrustStoreResponseCollection
          description: Custom Origin Trust Store Details response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesCustomTrustStore
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Custom Origin Trust Store response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Custom Origin Trust Store Details
      tags:
        - Custom Origin Trust Store
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: acm
        resource_chain:
          - custom_trust_store
        method: list
    post:
      description: Add Custom Origin Trust Store for a Zone.
      operationId: custom-origin-trust-store-create
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                certificate:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificate
              required:
                - certificate
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCustomTrustStoreResponseSingle
          description: Upload Custom Origin Trust Store response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      certificate:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificate
                      expires_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasExpiresOn
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      issuer:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIssuer'
                      signature:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSignature
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCustomTrustStoreComponentsSchemasStatus
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasUpdatedAt
                        readOnly: true
                      uploaded_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesUploadedOn
                    required:
                      - id
                      - status
                      - issuer
                      - signature
                      - certificate
                      - expires_on
                      - uploaded_on
                      - updated_at
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Upload Custom Origin Trust Store response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Upload Custom Origin Trust Store
      tags:
        - Custom Origin Trust Store
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: acm
        resource_chain:
          - custom_trust_store
        method: create
  /zones/{zone_id}/acm/custom_trust_store/{custom_origin_trust_store_id}:
    delete:
      description: >-
        Removes a CA certificate from the custom origin trust store. Origins
        using certificates signed by this CA will no longer be trusted.
      operationId: custom-origin-trust-store-delete
      parameters:
        - in: path
          name: custom_origin_trust_store_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCustomTrustStoreResponseIdOnly
          description: Delete Custom Origin Trust Store response
        4XX:
          content:
            application/json:
              schema:
                description: Identifier.
                maxLength: 32
                type: object
                x-auditable: true
                properties:
                  errors:
                    minLength: 1
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  result:
                    enum:
                      - null
                    nullable: true
                    type: object
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Delete Custom Origin Trust Store response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Custom Origin Trust Store
      tags:
        - Custom Origin Trust Store
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: acm
        resource_chain:
          - custom_trust_store
        method: delete
    get:
      description: >-
        Retrieves details about a specific certificate in the custom origin
        trust store, including expiration and subject information.
      operationId: custom-origin-trust-store-details
      parameters:
        - in: path
          name: custom_origin_trust_store_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCustomTrustStoreResponseSingle
          description: Custom Origin Trust Store Details response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      certificate:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificate
                      expires_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasExpiresOn
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      issuer:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIssuer'
                      signature:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSignature
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCustomTrustStoreComponentsSchemasStatus
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasUpdatedAt
                        readOnly: true
                      uploaded_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesUploadedOn
                    required:
                      - id
                      - status
                      - issuer
                      - signature
                      - certificate
                      - expires_on
                      - uploaded_on
                      - updated_at
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Custom Origin Trust Store Details response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Custom Origin Trust Store Details
      tags:
        - Custom Origin Trust Store
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: acm
        resource_chain:
          - custom_trust_store
        method: get
  /zones/{zone_id}/acm/total_tls:
    get:
      description: Get Total TLS Settings for a Zone.
      operationId: total-tls-total-tls-settings-details
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesTotalTlsSettingsResponse
          description: Total TLS Settings Details response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      certificate_authority:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificateAuthority
                      enabled:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasEnabled
                      validity_period:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesValidityPeriod
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Total TLS Settings Details response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Total TLS Settings Details
      tags:
        - Total TLS
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: acm
        resource_chain:
          - total_tls
        method: get
    post:
      description: Set Total TLS Settings or disable the feature for a Zone.
      operationId: total-tls-enable-or-disable-total-tls
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                certificate_authority:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificateAuthority
                enabled:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasEnabled
              required:
                - enabled
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesTotalTlsSettingsResponse
          description: Enable or Disable Total TLS response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      certificate_authority:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificateAuthority
                      enabled:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasEnabled
                      validity_period:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesValidityPeriod
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Enable or Disable Total TLS response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Enable or Disable Total TLS
      tags:
        - Total TLS
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: acm
        resource_chain:
          - total_tls
        method: update
components:
  schemas:
    tlsCertificatesAndHostnamesComponentsSchemasCertificate:
      description: The zone's SSL certificate or certificate and the intermediate(s).
      example: |
        -----BEGIN CERTIFICATE-----
        MIIDdjCCAl6gAwIBAgIJAPnMg0Fs+/B0MA0GCSqGSIb3DQEBCwUAMFsx...
        -----END CERTIFICATE-----
      type: string
    tlsCertificatesAndHostnamesComponentsSchemasCertificateAuthority:
      description: >-
        The Certificate Authority that Total TLS certificates will be issued
        through.
      enum:
        - google
        - lets_encrypt
        - ssl_com
      example: google
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesComponentsSchemasEnabled:
      description: >-
        If enabled, Total TLS will order a hostname specific TLS certificate for
        any proxied A, AAAA, or CNAME record in your zone.
      example: true
      type: boolean
      x-auditable: true
    tlsCertificatesAndHostnamesCustomTrustStore:
      properties:
        certificate:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificate
        expires_on:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasExpiresOn'
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        issuer:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIssuer'
        signature:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSignature'
        status:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesCustomTrustStoreComponentsSchemasStatus
        updated_at:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasUpdatedAt'
          readOnly: true
        uploaded_on:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesUploadedOn'
      required:
        - id
        - status
        - issuer
        - signature
        - certificate
        - expires_on
        - uploaded_on
        - updated_at
      type: object
    tlsCertificatesAndHostnamesCustomTrustStoreComponentsSchemasStatus:
      description: Status of the zone's custom SSL.
      enum:
        - initializing
        - pending_deployment
        - active
        - pending_deletion
        - deleted
        - expired
      example: active
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesCustomTrustStoreResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomTrustStore'
          type: array
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesCustomTrustStoreResponseIdOnly:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          properties:
            id:
              $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          type: object
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesCustomTrustStoreResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCustomTrustStore'
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesIssuer:
      description: The certificate authority that issued the certificate.
      example: GlobalSign
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    tlsCertificatesAndHostnamesSchemasExpiresOn:
      description: When the certificate expires.
      example: '2122-10-29T16:59:47Z'
      format: date-time
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesSchemasUpdatedAt:
      description: When the certificate was last modified.
      example: '2014-01-01T05:20:00Z'
      format: date-time
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesSignature:
      description: The type of hash used for the certificate.
      example: SHA256WithRSA
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesTotalTlsSettingsResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          properties:
            certificate_authority:
              $ref: >-
                #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificateAuthority
            enabled:
              $ref: >-
                #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasEnabled
            validity_period:
              $ref: '#/components/schemas/tlsCertificatesAndHostnamesValidityPeriod'
          type: object
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesUploadedOn:
      description: When the certificate was uploaded to Cloudflare.
      example: '2014-01-01T05:20:00Z'
      format: date-time
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesValidityPeriod:
      description: The validity period in days for the certificates ordered via Total TLS.
      enum:
        - 90
      type: integer
      x-auditable: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    custom_trust_store:
      id: cloudflare.acm.custom_trust_store
      name: custom_trust_store
      title: Custom Trust Store
      methods:
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1acm~1custom_trust_store/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
