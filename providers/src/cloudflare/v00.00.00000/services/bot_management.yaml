openapi: 3.0.3
info:
  title: bot_management API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/bot_management:
    get:
      description: Retrieve a zone's Bot Management Config
      operationId: bot-management-for-a-zone-get-config
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/botManagementBotManagementResponseBody'
          description: Bot Management config response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/botManagementMessages'
                  messages:
                    $ref: '#/components/schemas/botManagementMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    enum:
                      - null
                    type: object
                    title: Bot Fight Mode
                    properties:
                      ai_bots_protection:
                        $ref: '#/components/schemas/botManagementAiBotsProtection'
                      cf_robots_variant:
                        $ref: '#/components/schemas/botManagementCfRobotsVariant'
                      content_bots_protection:
                        $ref: >-
                          #/components/schemas/botManagementContentBotsProtection
                      crawler_protection:
                        $ref: '#/components/schemas/botManagementCrawlerProtection'
                      enable_js:
                        $ref: '#/components/schemas/botManagementEnableJs'
                      is_robots_txt_managed:
                        $ref: '#/components/schemas/botManagementIsRobotsTxtManaged'
                      using_latest_model:
                        $ref: '#/components/schemas/botManagementUsingLatestModel'
                      fight_mode:
                        $ref: '#/components/schemas/botManagementFightMode'
                      stale_zone_configuration:
                        description: >-
                          A read-only field that shows which unauthorized
                          settings are currently active on the zone. These
                          settings typically result from upgrades or downgrades.
                        properties:
                          optimize_wordpress:
                            $ref: >-
                              #/components/schemas/botManagementOptimizeWordpressTurnedOn
                          sbfm_definitely_automated:
                            $ref: >-
                              #/components/schemas/botManagementSbfmDefinitelyAutomatedTurnedOn
                          sbfm_likely_automated:
                            $ref: >-
                              #/components/schemas/botManagementSbfmLikelyAutomatedTurnedOn
                          sbfm_static_resource_protection:
                            $ref: >-
                              #/components/schemas/botManagementSbfmStaticResourceProtectionTurnedOn
                          sbfm_verified_bots:
                            $ref: >-
                              #/components/schemas/botManagementSbfmVerifiedBotsTurnedOn
                          suppress_session_score:
                            $ref: >-
                              #/components/schemas/botManagementSuppressSessionScoreTurnedOff
                        readOnly: true
                        title: stale_zone_configuration
                        type: object
                      optimize_wordpress:
                        $ref: '#/components/schemas/botManagementOptimizeWordpress'
                      sbfm_definitely_automated:
                        $ref: >-
                          #/components/schemas/botManagementSbfmDefinitelyAutomated
                      sbfm_static_resource_protection:
                        $ref: >-
                          #/components/schemas/botManagementSbfmStaticResourceProtection
                      sbfm_verified_bots:
                        $ref: '#/components/schemas/botManagementSbfmVerifiedBots'
                      sbfm_likely_automated:
                        $ref: '#/components/schemas/botManagementSbfmLikelyAutomated'
                      auto_update_model:
                        $ref: '#/components/schemas/botManagementAutoUpdateModel'
                      bm_cookie_enabled:
                        $ref: '#/components/schemas/botManagementBmCookieEnabled'
                      suppress_session_score:
                        $ref: '#/components/schemas/botManagementSuppressSessionScore'
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Bot Management config response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Zone Bot Management Config
      tags:
        - Bot Settings
      x-api-token-group:
        - Bot Management Write
        - Bot Management Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: bot_management
        resource_chain: []
        method: get
    put:
      description: >-
        Updates the Bot Management configuration for a zone. This API is used to
        update: - **Bot Fight Mode** - **Super Bot Fight Mode** - **Bot
        Management for Enterprise** See [Bot
        Plans](https://developers.cloudflare.com/bots/plans/) for more
        information on the different plans \ If you recently upgraded or
        downgraded your plan, refer to the following examples to clean up old
        configurations. Copy and paste the example body to remove old zone
        configurations based on your current plan. **Clean up configuration for
        Bot Fight Mode plan:** ```json { "sbfm_likely_automated": "allow",
        "sbfm_definitely_automated": "allow", "sbfm_verified_bots": "allow",
        "sbfm_static_resource_protection": false, "optimize_wordpress": false,
        "suppress_session_score": false } ``` **Clean up configuration for SBFM
        Pro plan:** ```json { "sbfm_likely_automated": "allow", "fight_mode":
        false } ``` **Clean up configuration for SBFM Biz plan:** ```json {
        "fight_mode": false } ``` **Clean up configuration for BM Enterprise
        Subscription plan:** It is strongly recommended that you ensure you have
        [custom rules](https://developers.cloudflare.com/waf/custom-rules/) in
        place to protect your zone before disabling the SBFM rules. Without
        these protections, your zone is vulnerable to attacks. ```json {
        "sbfm_likely_automated": "allow", "sbfm_definitely_automated": "allow",
        "sbfm_verified_bots": "allow", "sbfm_static_resource_protection": false,
        "optimize_wordpress": false, "fight_mode": false } ```
      operationId: bot-management-for-a-zone-update-config
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/botManagementConfigSingle'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/botManagementBotManagementResponseBody'
          description: Update Bot Management response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/botManagementMessages'
                  messages:
                    $ref: '#/components/schemas/botManagementMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    enum:
                      - null
                    type: object
                    title: Bot Fight Mode
                    properties:
                      ai_bots_protection:
                        $ref: '#/components/schemas/botManagementAiBotsProtection'
                      cf_robots_variant:
                        $ref: '#/components/schemas/botManagementCfRobotsVariant'
                      content_bots_protection:
                        $ref: >-
                          #/components/schemas/botManagementContentBotsProtection
                      crawler_protection:
                        $ref: '#/components/schemas/botManagementCrawlerProtection'
                      enable_js:
                        $ref: '#/components/schemas/botManagementEnableJs'
                      is_robots_txt_managed:
                        $ref: '#/components/schemas/botManagementIsRobotsTxtManaged'
                      using_latest_model:
                        $ref: '#/components/schemas/botManagementUsingLatestModel'
                      fight_mode:
                        $ref: '#/components/schemas/botManagementFightMode'
                      stale_zone_configuration:
                        description: >-
                          A read-only field that shows which unauthorized
                          settings are currently active on the zone. These
                          settings typically result from upgrades or downgrades.
                        properties:
                          optimize_wordpress:
                            $ref: >-
                              #/components/schemas/botManagementOptimizeWordpressTurnedOn
                          sbfm_definitely_automated:
                            $ref: >-
                              #/components/schemas/botManagementSbfmDefinitelyAutomatedTurnedOn
                          sbfm_likely_automated:
                            $ref: >-
                              #/components/schemas/botManagementSbfmLikelyAutomatedTurnedOn
                          sbfm_static_resource_protection:
                            $ref: >-
                              #/components/schemas/botManagementSbfmStaticResourceProtectionTurnedOn
                          sbfm_verified_bots:
                            $ref: >-
                              #/components/schemas/botManagementSbfmVerifiedBotsTurnedOn
                          suppress_session_score:
                            $ref: >-
                              #/components/schemas/botManagementSuppressSessionScoreTurnedOff
                        readOnly: true
                        title: stale_zone_configuration
                        type: object
                      optimize_wordpress:
                        $ref: '#/components/schemas/botManagementOptimizeWordpress'
                      sbfm_definitely_automated:
                        $ref: >-
                          #/components/schemas/botManagementSbfmDefinitelyAutomated
                      sbfm_static_resource_protection:
                        $ref: >-
                          #/components/schemas/botManagementSbfmStaticResourceProtection
                      sbfm_verified_bots:
                        $ref: '#/components/schemas/botManagementSbfmVerifiedBots'
                      sbfm_likely_automated:
                        $ref: '#/components/schemas/botManagementSbfmLikelyAutomated'
                      auto_update_model:
                        $ref: '#/components/schemas/botManagementAutoUpdateModel'
                      bm_cookie_enabled:
                        $ref: '#/components/schemas/botManagementBmCookieEnabled'
                      suppress_session_score:
                        $ref: '#/components/schemas/botManagementSuppressSessionScore'
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Update Bot Management response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Zone Bot Management Config
      tags:
        - Bot Settings
      x-api-token-group:
        - Bot Management Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: bot_management
        resource_chain: []
        method: update
  /zones/{zone_id}/bot_management/feedback:
    get:
      description: >-
        Returns all feedback reports previously submitted for the specified
        zone. Feedback reports help improve detection by sharing samples of
        traffic that were misclassified as bots or humans.
      operationId: bot-management-zone-feedback-list
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/botManagementFeedbackReport'
                type: array
          description: List of feedback reports
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/botManagementApiResponseCommonFailure'
          description: Feedback list failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List zone feedback reports
      tags:
        - Feedback
      x-api-token-group:
        - Bot Management Feedback Report Write
        - Bot Management Feedback Report Read
        - Bot Management Write
        - Bot Management Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
    post:
      description: >-
        Submit a feedback report for the specified zone. Use `type` to indicate
        whether the report is a false positive (good traffic flagged as bot) or
        a false negative (bot traffic missed). Furthermore, you can also use
        `expression` as a wirefilter to identify the affected traffic sample.
        See more accepted API fields and expression types at
        https://developers.cloudflare.com/bots/concepts/feedback-loop/#api-fields
        and
        https://developers.cloudflare.com/bots/concepts/feedback-loop/#expression-fields,
        respectively.
      operationId: bot-management-zone-feedback-create
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/botManagementFeedbackReport'
      responses:
        '201':
          description: Feedback report created
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/botManagementApiResponseCommonFailure'
          description: Feedback creation failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Submit a feedback report
      tags:
        - Feedback
      x-api-token-group:
        - Bot Management Feedback Report Write
        - Bot Management Feedback Report Read
        - Bot Management Write
        - Bot Management Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
components:
  schemas:
    botManagementAiBotsProtection:
      description: >-
        Enable rule to block AI Scrapers and Crawlers. Please note the value
        `only_on_ad_pages` is currently not available for Enterprise customers.
      enum:
        - block
        - disabled
        - only_on_ad_pages
      example: block
      type: string
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/botManagementMessages'
        messages:
          example: []
          $ref: '#/components/schemas/botManagementMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    botManagementAutoUpdateModel:
      description: >-
        Automatically update to the newest bot detection models created by
        Cloudflare as they are released. [Learn
        more.](https://developers.cloudflare.com/bots/reference/machine-learning-models#model-versions-and-release-notes)
      example: true
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementBmCookieEnabled:
      description: >-
        Indicates that the bot management cookie can be placed on end user
        devices accessing the site. Defaults to true
      example: true
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementBotManagementResponseBody:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/botManagementMessages'
        messages:
          $ref: '#/components/schemas/botManagementMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          type: object
          title: Bot Fight Mode
          properties:
            ai_bots_protection:
              $ref: '#/components/schemas/botManagementAiBotsProtection'
            cf_robots_variant:
              $ref: '#/components/schemas/botManagementCfRobotsVariant'
            content_bots_protection:
              $ref: '#/components/schemas/botManagementContentBotsProtection'
            crawler_protection:
              $ref: '#/components/schemas/botManagementCrawlerProtection'
            enable_js:
              $ref: '#/components/schemas/botManagementEnableJs'
            is_robots_txt_managed:
              $ref: '#/components/schemas/botManagementIsRobotsTxtManaged'
            using_latest_model:
              $ref: '#/components/schemas/botManagementUsingLatestModel'
            fight_mode:
              $ref: '#/components/schemas/botManagementFightMode'
            stale_zone_configuration:
              description: >-
                A read-only field that shows which unauthorized settings are
                currently active on the zone. These settings typically result
                from upgrades or downgrades.
              properties:
                optimize_wordpress:
                  $ref: '#/components/schemas/botManagementOptimizeWordpressTurnedOn'
                sbfm_definitely_automated:
                  $ref: >-
                    #/components/schemas/botManagementSbfmDefinitelyAutomatedTurnedOn
                sbfm_likely_automated:
                  $ref: >-
                    #/components/schemas/botManagementSbfmLikelyAutomatedTurnedOn
                sbfm_static_resource_protection:
                  $ref: >-
                    #/components/schemas/botManagementSbfmStaticResourceProtectionTurnedOn
                sbfm_verified_bots:
                  $ref: '#/components/schemas/botManagementSbfmVerifiedBotsTurnedOn'
                suppress_session_score:
                  $ref: >-
                    #/components/schemas/botManagementSuppressSessionScoreTurnedOff
              readOnly: true
              title: stale_zone_configuration
              type: object
            optimize_wordpress:
              $ref: '#/components/schemas/botManagementOptimizeWordpress'
            sbfm_definitely_automated:
              $ref: '#/components/schemas/botManagementSbfmDefinitelyAutomated'
            sbfm_static_resource_protection:
              $ref: '#/components/schemas/botManagementSbfmStaticResourceProtection'
            sbfm_verified_bots:
              $ref: '#/components/schemas/botManagementSbfmVerifiedBots'
            sbfm_likely_automated:
              $ref: '#/components/schemas/botManagementSbfmLikelyAutomated'
            auto_update_model:
              $ref: '#/components/schemas/botManagementAutoUpdateModel'
            bm_cookie_enabled:
              $ref: '#/components/schemas/botManagementBmCookieEnabled'
            suppress_session_score:
              $ref: '#/components/schemas/botManagementSuppressSessionScore'
      required:
        - success
        - errors
        - messages
    botManagementCfRobotsVariant:
      description: Specifies the Robots Access Control License variant to use.
      enum:
        - 'off'
        - policy_only
      example: policy_only
      type: string
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementConfigSingle:
      type: object
      title: Bot Fight Mode
      properties:
        ai_bots_protection:
          $ref: '#/components/schemas/botManagementAiBotsProtection'
        cf_robots_variant:
          $ref: '#/components/schemas/botManagementCfRobotsVariant'
        content_bots_protection:
          $ref: '#/components/schemas/botManagementContentBotsProtection'
        crawler_protection:
          $ref: '#/components/schemas/botManagementCrawlerProtection'
        enable_js:
          $ref: '#/components/schemas/botManagementEnableJs'
        is_robots_txt_managed:
          $ref: '#/components/schemas/botManagementIsRobotsTxtManaged'
        using_latest_model:
          $ref: '#/components/schemas/botManagementUsingLatestModel'
        fight_mode:
          $ref: '#/components/schemas/botManagementFightMode'
        stale_zone_configuration:
          description: >-
            A read-only field that shows which unauthorized settings are
            currently active on the zone. These settings typically result from
            upgrades or downgrades.
          properties:
            optimize_wordpress:
              $ref: '#/components/schemas/botManagementOptimizeWordpressTurnedOn'
            sbfm_definitely_automated:
              $ref: >-
                #/components/schemas/botManagementSbfmDefinitelyAutomatedTurnedOn
            sbfm_likely_automated:
              $ref: '#/components/schemas/botManagementSbfmLikelyAutomatedTurnedOn'
            sbfm_static_resource_protection:
              $ref: >-
                #/components/schemas/botManagementSbfmStaticResourceProtectionTurnedOn
            sbfm_verified_bots:
              $ref: '#/components/schemas/botManagementSbfmVerifiedBotsTurnedOn'
            suppress_session_score:
              $ref: '#/components/schemas/botManagementSuppressSessionScoreTurnedOff'
          readOnly: true
          title: stale_zone_configuration
          type: object
        optimize_wordpress:
          $ref: '#/components/schemas/botManagementOptimizeWordpress'
        sbfm_definitely_automated:
          $ref: '#/components/schemas/botManagementSbfmDefinitelyAutomated'
        sbfm_static_resource_protection:
          $ref: '#/components/schemas/botManagementSbfmStaticResourceProtection'
        sbfm_verified_bots:
          $ref: '#/components/schemas/botManagementSbfmVerifiedBots'
        sbfm_likely_automated:
          $ref: '#/components/schemas/botManagementSbfmLikelyAutomated'
        auto_update_model:
          $ref: '#/components/schemas/botManagementAutoUpdateModel'
        bm_cookie_enabled:
          $ref: '#/components/schemas/botManagementBmCookieEnabled'
        suppress_session_score:
          $ref: '#/components/schemas/botManagementSuppressSessionScore'
    botManagementContentBotsProtection:
      description: >-
        Enable rule to block content bots. When enabled, blocks automated
        traffic with low bot scores, excluding safe verified bot categories.
        Exceptions should be managed via skip rules.
      enum:
        - block
        - disabled
      example: disabled
      type: string
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementCrawlerProtection:
      description: Enable rule to punish AI Scrapers and Crawlers via a link maze.
      enum:
        - enabled
        - disabled
      example: enabled
      type: string
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementEnableJs:
      description: >-
        Use lightweight, invisible JavaScript detections to improve Bot
        Management. [Learn more about JavaScript
        Detections](https://developers.cloudflare.com/bots/reference/javascript-detections/).
      example: true
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementFeedbackReport:
      properties:
        created_at:
          format: date-time
          readOnly: true
          type: string
        description:
          type: string
        expression:
          description: Wirefilter expression describing the traffic being reported.
          type: string
        first_request_seen_at:
          format: date-time
          type: string
        last_request_seen_at:
          format: date-time
          type: string
        requests:
          format: int64
          type: integer
        requests_by_attribute:
          $ref: '#/components/schemas/botManagementRequestsByAttribute'
        requests_by_score:
          $ref: '#/components/schemas/botManagementRequestsByScore'
        requests_by_score_src:
          $ref: '#/components/schemas/botManagementRequestsByScoreSrc'
        subtype:
          type: string
        type:
          $ref: '#/components/schemas/botManagementFeedbackType'
      required:
        - type
        - description
        - expression
        - first_request_seen_at
        - last_request_seen_at
        - requests
        - requests_by_score
        - requests_by_score_src
        - requests_by_attribute
      type: object
    botManagementFeedbackType:
      description: Type of feedback report.
      enum:
        - false_positive
        - false_negative
      example: false_positive
      type: string
    botManagementFightMode:
      description: Whether to enable Bot Fight Mode.
      example: true
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementIsRobotsTxtManaged:
      default: false
      description: >-
        Enable cloudflare managed robots.txt. If an existing robots.txt is
        detected, then managed robots.txt will be prepended to the existing
        robots.txt.
      example: false
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    botManagementOptimizeWordpress:
      description: Whether to optimize Super Bot Fight Mode protections for Wordpress.
      example: true
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementOptimizeWordpressTurnedOn:
      description: Indicates that the zone's wordpress optimization for SBFM is turned on.
      title: optimize_wordpress
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementRequestsByAttribute:
      description: >-
        Top attributes contributing to the feedback sample. Keys include
        topASNs, topCountries, topHosts, topIPs, topJA3Hashes, topJA4s,
        topPaths, topUserAgents.
      type: object
    botManagementRequestsByScore:
      description: Map of bot scores (1-99) to request counts. Sum must equal `requests`.
      type: object
    botManagementRequestsByScoreSrc:
      description: Map of score source to request counts. Sum must equal `requests`.
      type: object
    botManagementSbfmDefinitelyAutomated:
      description: >-
        Super Bot Fight Mode (SBFM) action to take on definitely automated
        requests.
      enum:
        - allow
        - block
        - managed_challenge
      example: allow
      type: string
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementSbfmDefinitelyAutomatedTurnedOn:
      description: >-
        Indicates that the zone's definitely automated requests are being
        blocked or challenged.
      title: sbfm_definitely_automated
      type: string
      x-auditable: true
    botManagementSbfmLikelyAutomated:
      description: Super Bot Fight Mode (SBFM) action to take on likely automated requests.
      enum:
        - allow
        - block
        - managed_challenge
      example: allow
      type: string
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementSbfmLikelyAutomatedTurnedOn:
      description: >-
        Indicates that the zone's likely automated requests are being blocked or
        challenged.
      title: sbfm_likely_automated
      type: string
      x-auditable: true
    botManagementSbfmStaticResourceProtection:
      description: >-
        Super Bot Fight Mode (SBFM) to enable static resource protection. Enable
        if static resources on your application need bot protection. Note:
        Static resource protection can also result in legitimate traffic being
        blocked.
      example: true
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementSbfmStaticResourceProtectionTurnedOn:
      description: Indicates that the zone's static resource protection is turned on.
      title: sbfm_static_resource_protection
      type: string
      x-auditable: true
    botManagementSbfmVerifiedBots:
      description: Super Bot Fight Mode (SBFM) action to take on verified bots requests.
      enum:
        - allow
        - block
      example: allow
      type: string
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementSbfmVerifiedBotsTurnedOn:
      description: Indicates that the zone's verified bot requests are being blocked.
      title: sbfm_verified_bots
      type: string
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementSuppressSessionScore:
      description: >-
        Whether to disable tracking the highest bot score for a session in the
        Bot Management cookie.
      example: false
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementSuppressSessionScoreTurnedOff:
      description: Indicates that the zone's session score tracking is disabled.
      title: suppress_session_score
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
    botManagementUsingLatestModel:
      description: >-
        A read-only field that indicates whether the zone currently is running
        the latest ML model.
      example: true
      readOnly: true
      type: boolean
      x-auditable: true
      x-stainless-terraform-configurability: computed_optional
