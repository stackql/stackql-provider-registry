openapi: 3.0.3
info:
  title: email_sending API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/email/sending/send:
    post:
      operationId: email-sending-account-send-builder
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailSendingEmailBuilder'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  result:
                    $ref: '#/components/schemas/emailSendingEmailSendResponse'
                  result_info:
                    properties:
                      count:
                        type: number
                      cursor:
                        type: string
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                    required:
                    - per_page
                    - count
                    - total_count
                    type: object
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - result
                - messages
                type: object
          description: Email sending results.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum:
                          - '10001'
                          - '10200'
                          - '10201'
                          - '10202'
                          type: string
                        message:
                          enum:
                          - email.sending.error.invalid_request_schema
                          - email.sending.error.email.invalid
                          - email.sending.error.email.no_content_length
                          - email.sending.error.email.too_big
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Invalid request, generally because of the format/content of the email send request. No email will be sent when this happens.
        '403':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum:
                          - 10203
                          type: number
                        message:
                          enum:
                          - email.sending.error.email.sending_disabled
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Email sending is disabled for this zone/account.
        '429':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum:
                          - 10004
                          type: number
                        message:
                          enum:
                          - email.sending.error.throttled
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Account/zone has surpassed the rate at which it can send email, please try again later. No email will be sent when this happens.
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum:
                          - 10002
                          type: number
                        message:
                          enum:
                          - email.sending.error.internal_server
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: An unexpected error while processing the email send request. No email will be sent when this happens.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Send an email
      tags:
      - Email Sending
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.create
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: email_sending
        resource_chain: []
        method: send
  /accounts/{account_id}/email/sending/send_raw:
    post:
      operationId: email-sending-account-send-raw-message
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailSendingSendRawRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  result:
                    $ref: '#/components/schemas/emailSendingEmailSendResponse'
                  result_info:
                    properties:
                      count:
                        type: number
                      cursor:
                        type: string
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                    required:
                    - per_page
                    - count
                    - total_count
                    type: object
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - result
                - messages
                type: object
          description: Email sending results.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum:
                          - '10001'
                          - '10200'
                          - '10201'
                          - '10202'
                          type: string
                        message:
                          enum:
                          - email.sending.error.invalid_request_schema
                          - email.sending.error.email.invalid
                          - email.sending.error.email.no_content_length
                          - email.sending.error.email.too_big
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Invalid request, generally because of the format/content of the email send request. No email will be sent when this happens.
        '403':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum:
                          - 10203
                          type: number
                        message:
                          enum:
                          - email.sending.error.email.sending_disabled
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Email sending is disabled for this zone/account.
        '429':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum:
                          - 10004
                          type: number
                        message:
                          enum:
                          - email.sending.error.throttled
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Account/zone has surpassed the rate at which it can send email, please try again later. No email will be sent when this happens.
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum:
                          - 10002
                          type: number
                        message:
                          enum:
                          - email.sending.error.internal_server
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: An unexpected error while processing the email send request. No email will be sent when this happens.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Send a raw MIME email
      tags:
      - Email Sending
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.create
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: email_sending
        resource_chain: []
        method: send_raw
  /zones/{zone_id}/email/sending/subdomains:
    get:
      description: Lists all sending-enabled subdomains for the zone.
      operationId: email-sending-subdomains-list-sending-subdomains
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSendingSubdomainsResponseCollection'
          description: List sending subdomains response
      security:
      - api_email: []
        api_key: []
      summary: List sending subdomains
      tags:
      - Email Sending subdomains
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_sending
        resource_chain:
        - subdomains
        method: list
    post:
      description: Creates a new sending subdomain or re-enables sending on an existing subdomain that had it disabled. If zone-level Email Sending has not been enabled yet, the zone flag is automatically set when the entitlement is present.
      operationId: email-sending-subdomains-create-sending-subdomain
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailCreateSendingSubdomainProperties'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSendingSubdomainResponseSingle'
          description: Create a sending subdomain response
      security:
      - api_email: []
        api_key: []
      summary: Create a sending subdomain
      tags:
      - Email Sending subdomains
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.create
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_sending
        resource_chain:
        - subdomains
        method: create
  /zones/{zone_id}/email/sending/subdomains/preview:
    post:
      description: "Returns the DNS records that would be created for a sending subdomain, flags which records are missing, and reports any conflicts with existing DNS records. This is a read-only dry-run \u2014 no records are created or modified. Use before or after creating a subdomain to check DNS status."
      operationId: email-sending-subdomains-preview-sending-subdomain
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/emailCreateSendingSubdomainProperties'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSendingSubdomainPreviewResponse'
          description: Preview sending subdomain DNS response
      security:
      - api_email: []
        api_key: []
      summary: Preview sending subdomain DNS
      tags:
      - Email Sending subdomains
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/email/sending/subdomains/{subdomain_id}:
    delete:
      description: Disables sending on a subdomain and removes its DNS records. If routing is still active on the subdomain, only sending is disabled.
      operationId: email-sending-subdomains-delete-sending-subdomain
      parameters:
      - in: path
        name: subdomain_id
        schema:
          $ref: '#/components/schemas/emailSendingSubdomainIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailApiResponseSingle'
          description: Delete a sending subdomain response
      security:
      - api_email: []
        api_key: []
      summary: Delete a sending subdomain
      tags:
      - Email Sending subdomains
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.delete
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_sending
        resource_chain:
        - subdomains
        method: delete
    get:
      description: Gets information for a specific sending subdomain.
      operationId: email-sending-subdomains-get-sending-subdomain
      parameters:
      - in: path
        name: subdomain_id
        schema:
          $ref: '#/components/schemas/emailSendingSubdomainIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSendingSubdomainResponseSingle'
          description: Get a sending subdomain response
      security:
      - api_email: []
        api_key: []
      summary: Get a sending subdomain
      tags:
      - Email Sending subdomains
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_sending
        resource_chain:
        - subdomains
        method: get
  /zones/{zone_id}/email/sending/subdomains/{subdomain_id}/dns:
    get:
      description: Returns the expected DNS records for a sending subdomain.
      operationId: email-sending-subdomains-get-sending-subdomain-dns
      parameters:
      - in: path
        name: subdomain_id
        schema:
          $ref: '#/components/schemas/emailSendingSubdomainIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailDnsSettingsResponseCollection'
          description: Get sending subdomain DNS records response
      security:
      - api_email: []
        api_key: []
      summary: Get sending subdomain DNS records
      tags:
      - Email Sending subdomains
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: email_sending
        resource_chain:
        - subdomains
        - dns
        method: get
    post:
      description: "Idempotently re-applies the sending DNS records (creates missing records, re-applies the email_routing lock on records whose lock has been cleared). Refuses with a 409 if foreign MX, multiple SPF, multiple DMARC, or multiple DKIM records exist at the relevant DNS names \u2014 those require manual cleanup."
      operationId: email-sending-subdomains-fix-sending-subdomain-dns
      parameters:
      - in: path
        name: subdomain_id
        schema:
          $ref: '#/components/schemas/emailSendingSubdomainIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSendingSubdomainDnsStatusResponse'
          description: Fix sending subdomain DNS records response
        '400':
          description: 'Error 2028: subdomain_id is not a valid UUID.'
        '403':
          description: 'Error 2043: zone is admin-locked and cannot be mutated.'
        '404':
          description: 'Error 2033: sending subdomain not found.'
        '409':
          description: "Conflict \u2014 manual DNS cleanup required. Errors 2008 (foreign MX), 2026 (multiple SPF), 2027 (multiple DMARC), or a multi-DKIM error."
      security:
      - api_email: []
        api_key: []
      summary: Fix sending subdomain DNS records
      tags:
      - Email Sending subdomains
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.create
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
  /zones/{zone_id}/email/sending/subdomains/{subdomain_id}/dns/status:
    get:
      description: Returns the desired DNS records for a sending subdomain along with a live diff against actual DNS state. Use this to detect missing, unlocked, foreign, or multi-record conflicts before deciding whether to call the fix endpoint.
      operationId: email-sending-subdomains-get-sending-subdomain-dns-status
      parameters:
      - in: path
        name: subdomain_id
        schema:
          $ref: '#/components/schemas/emailSendingSubdomainIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/emailSendingSubdomainDnsStatusResponse'
          description: Get sending subdomain DNS status response
        '400':
          description: 'Error 2028: subdomain_id is not a valid UUID.'
        '404':
          description: 'Error 2033: sending subdomain not found.'
      security:
      - api_email: []
        api_key: []
      summary: Get sending subdomain DNS status
      tags:
      - Email Sending subdomains
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.account.email.sending.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
components:
  schemas:
    emailApiResponseCommon:
      properties:
        errors:
          $ref: '#/components/schemas/emailMessages'
        messages:
          $ref: '#/components/schemas/emailMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
      required:
      - success
      - errors
      - messages
      type: object
    emailApiResponseSingle:
      type: object
      $ref: '#/components/schemas/emailApiResponseCommon'
    emailCreateSendingSubdomainProperties:
      properties:
        name:
          description: The subdomain name. Must be within the zone.
          example: sub.example.com
          type: string
      required:
      - name
      type: object
    emailCreated:
      description: The date and time the destination address has been created.
      example: '2014-01-02T02:20:00Z'
      format: date-time
      readOnly: true
      type: string
    emailDnsRecord:
      description: List of records needed to enable an Email Routing zone.
      properties:
        content:
          description: DNS record content.
          example: route1.mx.cloudflare.net
          type: string
        name:
          description: DNS record name (or @ for the zone apex).
          example: example.com
          maxLength: 255
          type: string
          x-auditable: true
        priority:
          description: Required for MX, SRV and URI records. Unused by other record types. Records with lower priorities are preferred.
          example: 12
          maximum: 65535
          minimum: 0
          type: number
          x-auditable: true
        ttl:
          description: Time to live, in seconds, of the DNS record. Must be between 60 and 86400, or 1 for 'automatic'.
          example: 1
          type: number
          x-auditable: true
          enum:
          - 1
        type:
          description: DNS record type.
          enum:
          - A
          - AAAA
          - CNAME
          - HTTPS
          - TXT
          - SRV
          - LOC
          - MX
          - NS
          - CERT
          - DNSKEY
          - DS
          - NAPTR
          - SMIMEA
          - SSHFP
          - SVCB
          - TLSA
          - URI
          example: NS
          readOnly: true
          type: string
          x-auditable: true
      type: object
    emailDnsSettingsResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/emailMessages'
        messages:
          $ref: '#/components/schemas/emailMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/emailDnsRecord'
          type: array
      required:
      - success
      - errors
      - messages
    emailMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
        - code
        - message
        type: object
        uniqueItems: true
      type: array
    emailModified:
      description: The date and time the destination address was last modified.
      example: '2014-01-02T02:20:00Z'
      format: date-time
      readOnly: true
      type: string
    emailSendingEmailBuilder:
      example:
        attachments:
        - content: JVBERi0xLjQK...
          disposition: attachment
          filename: report.pdf
          type: application/pdf
        from: sender@example.com
        html: <h1>Hello</h1><p>Please find your report attached.</p>
        subject: Monthly Report
        text: 'Hello


          Please find your report attached.'
        to:
        - recipient@example.com
      properties:
        attachments:
          description: File attachments and inline images.
          items:
            type: object
            example:
              content: iVBORw0KGgoAAAANSUhEUgAA...
              content_id: logo
              disposition: inline
              filename: logo.png
              type: image/png
            properties:
              content:
                description: Base64-encoded content of the attachment.
                example: iVBORw0KGgoAAAANSUhEUgAA...
                type: string
              content_id:
                description: 'Content ID used to reference this attachment in HTML via cid: URI (e.g., <img src="cid:logo">).'
                example: logo
                type: string
              disposition:
                description: Must be 'inline'. Indicates the attachment is embedded in the email body.
                enum:
                - inline
                type: string
              filename:
                description: Filename for the attachment.
                example: logo.png
                type: string
              type:
                description: MIME type of the attachment (e.g., 'image/png', 'text/plain').
                example: image/png
                type: string
            required:
            - content
            - disposition
            - filename
            - type
          type: array
        bcc:
          description: BCC recipient(s). A single email string or an array of email strings.
          type: string
          example: user@example.com
          items:
            type: string
        cc:
          description: CC recipient(s). A single email string or an array of email strings.
          type: string
          example: user@example.com
          items:
            type: string
        from:
          description: Sender email address. Either a plain string or an object with address and name.
          type: string
          example: user@example.com
          properties:
            address:
              description: Email address (e.g., 'user@example.com').
              example: user@example.com
              type: string
            name:
              description: Display name for the email address (e.g., 'John Doe').
              example: John Doe
              type: string
          required:
          - address
          - name
        headers:
          description: Custom email headers as key-value pairs.
          example:
            X-Custom-Header: value
          type: object
        html:
          description: HTML body of the email. At least one of text or html must be provided.
          example: <h1>Hello</h1><p>Please find your report attached.</p>
          type: string
        reply_to:
          description: Reply-to address. Either a plain string or an object with address and name.
          type: string
          example: user@example.com
          properties:
            address:
              description: Email address (e.g., 'user@example.com').
              example: user@example.com
              type: string
            name:
              description: Display name for the email address (e.g., 'John Doe').
              example: John Doe
              type: string
          required:
          - address
          - name
        subject:
          description: Email subject line.
          example: Monthly Report
          type: string
        text:
          description: Plain text body of the email. At least one of text or html must be provided.
          example: 'Hello


            Please find your report attached.'
          type: string
        to:
          description: Recipient(s). A single email string or an array of email strings.
          type: string
          example: user@example.com
          items:
            type: string
      required:
      - from
      - to
      - subject
      type: object
    emailSendingEmailSendResponse:
      example:
        delivered:
        - recipient@example.com
        permanent_bounces: []
        queued: []
      properties:
        delivered:
          description: Email addresses to which the message was delivered immediately.
          example:
          - recipient@example.com
          items:
            type: string
          type: array
        permanent_bounces:
          description: Email addresses that permanently bounced.
          example: []
          items:
            type: string
          type: array
        queued:
          description: Email addresses for which delivery was queued for later.
          example: []
          items:
            type: string
          type: array
      required:
      - delivered
      - queued
      - permanent_bounces
      type: object
    emailSendingSendRawRequest:
      example:
        from: sender@example.com
        mime_message: "From: sender@example.com\r\nTo: recipient@example.com\r\nSubject: Hello\r\nContent-Type: text/plain\r\n\r\nHello, World!"
        recipients:
        - recipient@example.com
      properties:
        from:
          description: Sender email address.
          example: sender@example.com
          type: string
        mime_message:
          description: The full MIME-encoded email message. Should include standard RFC 5322 headers such as From, To, Subject, and Content-Type. The from and recipients fields in the request body control SMTP envelope routing; the From and To headers in the MIME message control what the recipient's email client displays.
          example: "From: sender@example.com\r\nTo: recipient@example.com\r\nSubject: Hello\r\nContent-Type: text/plain\r\n\r\nHello, World!"
          type: string
        recipients:
          description: List of recipient email addresses.
          example:
          - recipient@example.com
          items:
            type: string
          type: array
      required:
      - from
      - recipients
      - mime_message
      type: object
    emailSendingSubdomain:
      $ref: '#/components/schemas/emailSendingSubdomainProperties'
    emailSendingSubdomainConfigError:
      description: A DNS record status detected during preview, status, or fix.
      properties:
        code:
          description: "Error code identifying the type of issue. `dkim.conflict` is reported whenever 2+ TXT records exist at the DKIM selector, even if one matches the canonical Cloudflare content \u2014 multi-record DKIM can permerror at recipient verification regardless of which entry is correct."
          enum:
          - mx.missing
          - mx.foreign
          - spf.missing
          - spf.foreign
          - spf.multiple
          - dkim.missing
          - dkim.conflict
          - dmarc.missing
          - dmarc.multiple
          example: dkim.conflict
          type: string
        existing:
          $ref: '#/components/schemas/emailDnsRecord'
        missing:
          $ref: '#/components/schemas/emailDnsRecord'
        multiple:
          items:
            $ref: '#/components/schemas/emailDnsRecord'
          type: array
      required:
      - code
      type: object
    emailSendingSubdomainDnsStatusResponse:
      type: object
