                {{- if .bcc }}{{ $sep }}"bcc": {{ toJson .bcc }}{{- $sep = "," -}}{{ end }}

                {{- if .cc }}{{ $sep }}"cc": {{ toJson .cc }}{{- $sep = "," -}}{{ end }}

                {{- if .from }}{{ $sep }}"from": {{ toJson .from }}{{- $sep = "," -}}{{ end }}

                {{- if .headers }}{{ $sep }}"headers": {{ if eq (kindOf .headers) "string" }}{{ .headers }}{{ else }}{{ toJson .headers }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .html }}{{ $sep }}"html": {{ toJson .html }}{{- $sep = "," -}}{{ end }}

                {{- if .reply_to }}{{ $sep }}"reply_to": {{ toJson .reply_to }}{{- $sep = "," -}}{{ end }}

                {{- if .subject }}{{ $sep }}"subject": {{ toJson .subject }}{{- $sep = "," -}}{{ end }}

                {{- if .text }}{{ $sep }}"text": {{ toJson .text }}{{- $sep = "," -}}{{ end }}

                {{- if .to }}{{ $sep }}"to": {{ toJson .to }}{{- $sep = "," -}}{{ end }}

                }

                '
        send_raw:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1email~1sending~1send_raw/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
