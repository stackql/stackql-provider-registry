          example: cf-bounce.sub.example.com
          readOnly: true
          type: string
        tag:
          $ref: '#/components/schemas/emailSendingSubdomainIdentifier'
      required:
      - tag
      - name
      - enabled
      type: object
    emailSendingSubdomainResponseSingle:
