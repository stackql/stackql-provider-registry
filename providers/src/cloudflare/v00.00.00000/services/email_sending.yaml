                {{- if .mime_message }}{{ $sep }}"mime_message": {{ toJson .mime_message }}{{- $sep = "," -}}{{ end }}

                {{- if .recipients }}{{ $sep }}"recipients": {{ if eq (kindOf .recipients) "string" }}{{ .recipients }}{{ else }}{{ toJson .recipients }}{{ end }}{{- $sep = "," -}}{{ end }}

