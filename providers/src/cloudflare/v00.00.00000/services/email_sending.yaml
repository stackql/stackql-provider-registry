        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          properties:
            errors:
              description: DNS issues detected against the current zone state.
              items:
                $ref: '#/components/schemas/emailSendingSubdomainConfigError'
              type: array
            records:
              description: Desired DNS records for the subdomain.
              items:
                $ref: '#/components/schemas/emailDnsRecord'
              type: array
            status:
              description: Aggregated DNS state for the subdomain. `unlocked` means desired records exist with correct content but at least one has had its email_routing/read_only lock cleared.
              enum:
              - ready
              - unconfigured
              - unlocked
              - misconfigured
              type: string
          type: object
      required:
      - success
      - errors
      - messages
    emailSendingSubdomainIdentifier:
      description: Sending subdomain identifier.
      example: aabbccdd11223344aabbccdd11223344
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    emailSendingSubdomainPreviewResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/emailMessages'
