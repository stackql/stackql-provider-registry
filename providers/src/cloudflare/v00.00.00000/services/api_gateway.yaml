                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Enable validation for a schema response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Enable validation for a schema
      tags:
        - API Shield Schema Validation 2.0
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      x-stainless-deprecation-message: >-
        Use [Schema Validation
        API](https://developers.cloudflare.com/api/resources/schema_validation/)
        instead.
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: Identifier for the schema-ID
          in: path
          name: schema_id
          schema:
            format: uuid
            maxLength: 36
            readOnly: true
            type: string
          required: true
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - user_schemas
        method: edit
  /zones/{zone_id}/api_gateway/user_schemas/{schema_id}/operations:
    get:
      deprecated: true
      description: >-
        Retrieves all operations from the schema. Operations that already exist
        in API Shield Endpoint Management will be returned as full operations.
      operationId: api-shield-schema-validation-extract-operations-from-schema
      parameters:
        - description: >-
            Add feature(s) to the results. The feature name that is given here
            corresponds to the resulting feature object. Have a look at the
            top-level object description for more details on the specific
            meaning.
          in: query
          name: feature
          schema:
            items:
              enum:
                - thresholds
                - parameter_schemas
                - schema_info
              type: string
            type: array
            uniqueItems: true
          explode: true
        - in: query
          name: host
          schema:
            description: Filter results to only include the specified hosts.
            items:
              type: string
            type: array
            uniqueItems: true
          explode: true
        - in: query
          name: method
          schema:
            description: Filter results to only include the specified HTTP methods.
            items:
              type: string
            type: array
            uniqueItems: true
          explode: true
        - in: query
          name: endpoint
          schema:
            description: Filter results to only include endpoints containing this pattern.
            type: string
        - description: Page number of paginated results.
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - description: Maximum number of results per page.
          in: query
          name: per_page
          schema:
            default: 20
            maximum: 50
            minimum: 5
            type: integer
        - description: >-
            Filter results by whether operations exist in API Shield Endpoint
            Management or not. `new` will just return operations from the schema
            that do not exist in API Shield Endpoint Management. `existing` will
            just return operations from the schema that already exist in API
            Shield Endpoint Management.
          in: query
          name: operation_status
          schema:
            enum:
              - new
              - existing
            type: string
        - description: Identifier for the schema-ID
          in: path
          name: schema_id
          schema:
            format: uuid
            maxLength: 36
            readOnly: true
            type: string
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      type: object
                      properties:
                        endpoint:
                          $ref: '#/components/schemas/apiShieldEndpoint'
                        host:
                          $ref: '#/components/schemas/apiShieldHost'
                        method:
                          $ref: '#/components/schemas/apiShieldMethod'
                        last_updated:
                          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
                        operation_id:
                          $ref: '#/components/schemas/apiShieldSchemasUuid'
                        features:
                          $ref: '#/components/schemas/apiShieldOperationFeatures'
                      required:
                        - endpoint
                        - host
                        - method
                    type: array
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Retrieve all operations from a schema response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Retrieve all operations from a schema response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieve all operations from a schema.
      tags:
        - API Shield Schema Validation 2.0
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
      x-stainless-deprecation-message: >-
        Use [Schema Validation
        API](https://developers.cloudflare.com/api/resources/schema_validation/)
        instead.
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - user_schemas
          - operations
        method: list
components:
  schemas:
    apiShieldApiDiscoveryOrigin:
      description: >-
        * `ML` - Discovered operation was sourced using ML API Discovery *
        `SessionIdentifier` - Discovered operation was sourced using Session
        Identifier API Discovery * `LabelDiscovery` - Discovered operation was
        identified to have a specific label
      enum:
        - ML
        - SessionIdentifier
        - LabelDiscovery
      type: string
      x-auditable: true
    apiShieldApiDiscoveryPatchMultipleRequest:
      example:
        3818d821-5901-4147-a474-f5f5aec1d54e:
          state: ignored
        b17c8043-99a0-4202-b7d9-8f7cdbee02cd:
          state: review
      type: object
    apiShieldApiDiscoveryState:
      description: >-
        State of operation in API Discovery * `review` - Operation is not saved
        into API Shield Endpoint Management * `saved` - Operation is saved into
        API Shield Endpoint Management * `ignored` - Operation is marked as
        ignored
      enum:
        - review
        - saved
        - ignored
      type: string
      x-auditable: true
    apiShieldApiDiscoveryStatePatch:
      description: >-
        Mark state of operation in API Discovery * `review` - Mark operation as
        for review * `ignored` - Mark operation as ignored
      enum:
        - review
        - ignored
      type: string
      x-auditable: true
    apiShieldApiResponseCommon:
      properties:
        errors:
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          $ref: '#/components/schemas/apiShieldMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
      required:
        - success
        - errors
        - messages
      type: object
    apiShieldApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          example: []
          $ref: '#/components/schemas/apiShieldMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    apiShieldApiResponseSingle:
      type: object
      $ref: '#/components/schemas/apiShieldApiResponseCommon'
    apiShieldAuthIdCharacteristics:
      items:
        type: object
        description: Auth ID Characteristic
        properties:
          name:
            description: >-
              The name of the characteristic field, i.e., the header or cookie
              name.
            example: authorization
            maxLength: 128
            type: string
            x-auditable: true
          type:
            description: The type of characteristic.
            enum:
              - header
              - cookie
            example: header
            type: string
            x-auditable: true
        required:
          - name
          - type
      maxItems: 10
      type: array
      uniqueItems: true
    apiShieldAuthIdTokens:
      description: The total number of auth-ids seen across this calculation.
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldBasicOperation:
      properties:
        endpoint:
          $ref: '#/components/schemas/apiShieldEndpoint'
        host:
          $ref: '#/components/schemas/apiShieldHost'
        method:
          $ref: '#/components/schemas/apiShieldMethod'
      required:
        - method
        - host
        - endpoint
      type: object
    apiShieldBulkPostLabelsOnOperationRequest:
      properties:
        managed:
          properties:
            labels:
              description: List of managed label names.
              items:
                $ref: '#/components/schemas/apiShieldLabelName'
              minItems: 1
              type: array
          type: object
        selector:
          $ref: '#/components/schemas/apiShieldOperationIdSelector'
        user:
          properties:
            labels:
              description: List of user label names.
              items:
                $ref: '#/components/schemas/apiShieldLabelName'
              minItems: 1
              type: array
          type: object
      required:
        - selector
      type: object
    apiShieldBulkPutLabelsOnOperationRequest:
      properties:
        managed:
          description: Managed labels to replace for all affected operations
          properties:
            labels:
              description: >-
                List of managed label names. Providing an empty array will
                result in all managed labels being removed from all affected
                operations
              items:
                $ref: '#/components/schemas/apiShieldLabelName'
              type: array
          required:
            - labels
          type: object
        selector:
          $ref: '#/components/schemas/apiShieldOperationIdSelector'
        user:
          description: User labels to replace for all affected operations
          properties:
            labels:
              description: >-
                List of user label names. Providing an empty array will result
                in all user labels being removed from all affected operations
              items:
                $ref: '#/components/schemas/apiShieldLabelName'
              type: array
          required:
            - labels
          type: object
      required:
        - selector
        - user
        - managed
      type: object
    apiShieldConfidenceIntervalsBounds:
      description: Upper and lower bound for percentile estimate
      properties:
        lower:
          description: Lower bound for percentile estimate
          example: 20.5
          type: number
          x-auditable: true
        upper:
          description: Upper bound for percentile estimate
          example: 30.4
          type: number
          x-auditable: true
      readOnly: true
      type: object
    apiShieldConfiguration:
      properties:
        auth_id_characteristics:
          $ref: '#/components/schemas/apiShieldAuthIdCharacteristics'
      required:
        - auth_id_characteristics
      type: object
    apiShieldConfigurationSingleResponse:
      properties:
        errors:
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          $ref: '#/components/schemas/apiShieldMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/apiShieldConfiguration'
      required:
        - success
        - errors
        - messages
        - result
      type: object
    apiShieldDataPoints:
      description: The number of data points used for the threshold suggestion calculation.
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldDiscoveryOperation:
      properties:
        features:
          $ref: '#/components/schemas/apiShieldTrafficStats'
        id:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
        last_updated:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
        origin:
          description: API discovery engine(s) that discovered this operation
          items:
            $ref: '#/components/schemas/apiShieldApiDiscoveryOrigin'
          type: array
        state:
          $ref: '#/components/schemas/apiShieldApiDiscoveryState'
        endpoint:
          $ref: '#/components/schemas/apiShieldEndpoint'
        host:
          $ref: '#/components/schemas/apiShieldHost'
        method:
          $ref: '#/components/schemas/apiShieldMethod'
      required:
        - id
        - last_updated
        - state
        - origin
        - method
        - host
        - endpoint
      type: object
    apiShieldEndpoint:
      description: >-
        The endpoint which can contain path parameter templates in curly braces,
        each will be replaced from left to right with {varN}, starting with
        {var1}, during insertion. This will further be Cloudflare-normalized
        upon insertion. See:
        https://developers.cloudflare.com/rules/normalization/how-it-works/.
      example: /api/v1/users/{var1}
      format: uri-template
      maxLength: 4096
      type: string
      x-auditable: true
    apiShieldFullLabel:
      type: object
      properties:
        created_at:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
          readOnly: true
        description:
          $ref: '#/components/schemas/apiShieldLabelDescription'
        last_updated:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
        metadata:
          $ref: '#/components/schemas/apiShieldLabelMetadata'
        name:
          $ref: '#/components/schemas/apiShieldLabelName'
        source:
          $ref: '#/components/schemas/apiShieldLabelSource'
        mapped_resources:
          $ref: '#/components/schemas/apiShieldLabelMappedResources'
      required:
        - name
        - description
        - metadata
        - source
        - last_updated
        - created_at
    apiShieldFullManagedLabel:
      type: object
      properties:
        created_at:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
          readOnly: true
        description:
          $ref: '#/components/schemas/apiShieldLabelDescription'
        last_updated:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
        metadata:
          $ref: '#/components/schemas/apiShieldLabelMetadata'
        name:
          $ref: '#/components/schemas/apiShieldLabelName'
        source:
          $ref: '#/components/schemas/apiShieldLabelSource'
          example: managed
        mapped_resources:
          $ref: '#/components/schemas/apiShieldLabelMappedResources'
      required:
        - name
        - description
        - metadata
        - source
        - last_updated
        - created_at
    apiShieldHost:
      description: RFC3986-compliant host.
      example: www.example.com
      format: hostname
      maxLength: 255
      type: string
      x-auditable: true
    apiShieldLabel:
      type: object
      properties:
        created_at:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
          readOnly: true
        description:
          $ref: '#/components/schemas/apiShieldLabelDescription'
        last_updated:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
        metadata:
          $ref: '#/components/schemas/apiShieldLabelMetadata'
        name:
          $ref: '#/components/schemas/apiShieldLabelName'
        source:
          $ref: '#/components/schemas/apiShieldLabelSource'
      required:
        - name
        - description
        - metadata
        - source
        - last_updated
        - created_at
    apiShieldLabelDescription:
      description: The description of the label
      example: All endpoints that deal with logins
      type: string
      x-auditable: true
    apiShieldLabelMappedResources:
      description: Provides counts of what resources are linked to this label
      example:
        operations: 29
      type: object
    apiShieldLabelMetadata:
      description: Metadata for the label
      example:
        foo: bar
      type: object
    apiShieldLabelName:
      description: The name of the label
      example: login
      type: string
      x-auditable: true
    apiShieldLabelRequest:
      properties:
        description:
          $ref: '#/components/schemas/apiShieldLabelDescription'
        metadata:
          $ref: '#/components/schemas/apiShieldLabelMetadata'
        name:
          $ref: '#/components/schemas/apiShieldLabelName'
      required:
        - name
      type: object
    apiShieldLabelSource:
      description: >-
        * `user` - label is owned by the user * `managed` - label is owned by
        cloudflare
      enum:
        - user
        - managed
      type: string
      x-auditable: true
    apiShieldMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    apiShieldMethod:
      description: The HTTP method used to access the endpoint.
      enum:
        - GET
        - POST
        - HEAD
        - OPTIONS
        - PUT
        - DELETE
        - CONNECT
        - PATCH
        - TRACE
      example: GET
      type: string
      x-auditable: true
    apiShieldMultipleOperationResponse:
      properties:
        errors:
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          $ref: '#/components/schemas/apiShieldMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          items:
            $ref: '#/components/schemas/apiShieldOperation'
          type: array
      required:
        - success
        - errors
        - messages
        - result
      type: object
    apiShieldMultipleOperationResponsePaginated:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          $ref: '#/components/schemas/apiShieldMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/apiShieldOperation'
          type: array
      required:
        - success
        - errors
        - messages
        - result
    apiShieldOldKind:
      description: Kind of schema
      enum:
        - openapi_v3
      example: openapi_v3
      type: string
      x-auditable: true
    apiShieldOldOperationMitigationAction:
      description: >-
        When set, this applies a mitigation action to this operation - `log` log
        request when request does not conform to schema for this operation -
        `block` deny access to the site when request does not conform to schema
        for this operation - `none` will skip mitigation for this operation -
        `null` indicates that no operation level mitigation is in place, see
        Zone Level Schema Validation Settings for mitigation action that will be
        applied
      enum:
        - log
        - block
        - none
        - null
      example: block
      nullable: true
      type: string
      x-auditable: true
    apiShieldOldOperationSchemaValidationSettings:
      properties:
        mitigation_action:
          $ref: '#/components/schemas/apiShieldOldOperationMitigationAction'
        operation_id:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
      type: object
    apiShieldOldOperationSchemaValidationSettingsModifyRequest:
      properties:
        mitigation_action:
          $ref: '#/components/schemas/apiShieldOldOperationMitigationAction'
      type: object
    apiShieldOldOperationSchemaValidationSettingsMultipleRequest:
      example:
        3818d821-5901-4147-a474-f5f5aec1d54e:
          mitigation_action: log
        b17c8043-99a0-4202-b7d9-8f7cdbee02cd:
          mitigation_action: block
      type: object
    apiShieldOldPublicSchema:
      properties:
        created_at:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
          readOnly: true
        kind:
          $ref: '#/components/schemas/apiShieldOldKind'
        name:
          description: Name of the schema
          example: petstore schema
          type: string
          x-auditable: true
        schema_id:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
        source:
          description: Source of the schema
          example: <schema file bytes>
          type: string
          x-auditable: true
        validation_enabled:
          $ref: '#/components/schemas/apiShieldOldValidationEnabled'
      required:
        - schema_id
        - name
        - kind
        - created_at
      type: object
    apiShieldOldResponseUserSchemasHosts:
      properties:
        created_at:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
          readOnly: true
        hosts:
          description: Hosts serving the schema, e.g zone.host.com
          items:
            type: string
          type: array
        name:
          description: Name of the schema
          example: petstore schema
          type: string
          x-auditable: true
        schema_id:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
      required:
        - schema_id
        - name
        - hosts
        - created_at
      type: object
    apiShieldOldSchemaUploadDetailsErrorsCritical:
      properties:
        critical:
          description: Diagnostic critical error events that occurred during processing.
          items:
            $ref: '#/components/schemas/apiShieldOldSchemaUploadLogEvent'
          type: array
        errors:
          description: Diagnostic error events that occurred during processing.
          items:
            $ref: '#/components/schemas/apiShieldOldSchemaUploadLogEvent'
          type: array
      type: object
    apiShieldOldSchemaUploadDetailsWarningsOnly:
      properties:
        warnings:
          description: >-
            Diagnostic warning events that occurred during processing. These
            events are non-critical errors found within the schema.
          items:
            $ref: '#/components/schemas/apiShieldOldSchemaUploadLogEvent'
          type: array
      type: object
    apiShieldOldSchemaUploadFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          example: []
          $ref: '#/components/schemas/apiShieldMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
        upload_details:
          $ref: '#/components/schemas/apiShieldOldSchemaUploadDetailsErrorsCritical'
      required:
        - success
        - errors
        - messages
        - result
      type: object
    apiShieldOldSchemaUploadLogEvent:
      properties:
        code:
          description: Code that identifies the event that occurred.
          example: 28
          type: integer
          x-auditable: true
        locations:
          description: >-
            JSONPath location(s) in the schema where these events were
            encountered. See
            [https://goessner.net/articles/JsonPath/](https://goessner.net/articles/JsonPath/)
            for JSONPath specification.
          items:
            description: >-
              JSONPath location in the schema where these events were
              encountered. See
              [https://goessner.net/articles/JsonPath/](https://goessner.net/articles/JsonPath/)
              for JSONPath specification.
            example: .paths["/user/{username}"].put
            type: string
            x-auditable: true
          type: array
        message:
          description: Diagnostic message that describes the event.
          example: 'unsupported media type: application/octet-stream'
          type: string
          x-auditable: true
      required:
        - code
      type: object
    apiShieldOldSchemaUploadResponse:
      properties:
        schema:
          $ref: '#/components/schemas/apiShieldOldPublicSchema'
        upload_details:
          $ref: '#/components/schemas/apiShieldOldSchemaUploadDetailsWarningsOnly'
      required:
        - schema
      type: object
    apiShieldOldValidationDefaultMitigationAction:
      description: >-
        The default mitigation action used when there is no mitigation action
        defined on the operation Mitigation actions are as follows: * `log` -
        log request when request does not conform to schema * `block` - deny
        access to the site when request does not conform to schema A special
        value of of `none` will skip running schema validation entirely for the
        request when there is no mitigation action defined on the operation
      enum:
        - none
        - log
        - block
      example: block
      type: string
      x-auditable: true
    apiShieldOldValidationDefaultMitigationActionPatch:
      description: >-
        The default mitigation action used when there is no mitigation action
        defined on the operation Mitigation actions are as follows: * `log` -
        log request when request does not conform to schema * `block` - deny
        access to the site when request does not conform to schema A special
        value of of `none` will skip running schema validation entirely for the
        request when there is no mitigation action defined on the operation
        `null` will have no effect.
      enum:
        - none
        - log
        - block
        - null
      example: block
      nullable: true
      type: string
      x-auditable: true
    apiShieldOldValidationEnabled:
      description: Flag whether schema is enabled for validation.
      type: boolean
      x-auditable: true
    apiShieldOldValidationOverrideMitigationAction:
      description: >-
        When set, this overrides both zone level and operation level mitigation
        actions. - `none` will skip running schema validation entirely for the
        request - `null` indicates that no override is in place
      enum:
        - none
        - null
      nullable: true
      type: string
      x-auditable: true
    apiShieldOldValidationOverrideMitigationActionPatch:
      description: >-
        When set, this overrides both zone level and operation level mitigation
        actions. - `none` will skip running schema validation entirely for the
        request To clear any override, use the special value `disable_override`
        `null` will have no effect.
      enum:
        - none
        - disable_override
        - null
      example: none
      nullable: true
      type: string
      x-auditable: true
    apiShieldOldValidationOverrideMitigationActionWrite:
      description: >-
        When set, this overrides both zone level and operation level mitigation
        actions. - `none` will skip running schema validation entirely for the
        request - `null` indicates that no override is in place To clear any
        override, use the special value `disable_override` or `null`
      enum:
        - none
        - disable_override
        - null
      example: none
      nullable: true
      type: string
      x-auditable: true
    apiShieldOldZoneSchemaValidationSettings:
