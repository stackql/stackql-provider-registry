      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
    post:
      operationId: api-shield-labels-create-user-labels
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/apiShieldLabelRequest'
              type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/apiShieldLabel'
                    type: array
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Create user labels response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Create user labels response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create user labels
      tags:
        - API Shield Labels
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
  /zones/{zone_id}/api_gateway/labels/user/{name}:
    delete:
      description: Delete user label
      operationId: api-shield-delete-user-label
      responses:
        '200':
          content:
            application/json:
              schema:
