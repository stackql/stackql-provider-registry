openapi: 3.0.3
info:
  title: api_gateway API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/api_gateway/configuration:
    get:
      description: >-
        Gets the current API Shield configuration settings for a zone, including
        validation behavior and enforcement mode.
      operationId: >-
        api-shield-settings-retrieve-information-about-specific-configuration-properties
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldConfigurationSingleResponse'
          description: >-
            Retrieve information about specific configuration properties
            response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: >-
            Retrieve information about specific configuration properties
            response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieve information about specific configuration properties
      tags:
        - API Shield Settings
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: >-
            Ensures that the configuration is written or retrieved in normalized
            fashion
          in: query
          name: normalize
          schema:
            type: boolean
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - configurations
        method: get
    put:
      description: >-
        Updates API Shield configuration settings for a zone. Can modify
        validation strictness, enforcement mode, and other global settings.
      operationId: api-shield-settings-set-configuration-properties
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/apiShieldConfiguration'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldConfigurationSingleResponse'
          description: Set configuration properties response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: >-
            Retrieve information about specific configuration properties
            response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update configuration properties
      tags:
        - API Shield Settings
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: >-
            Ensures that the configuration is written or retrieved in normalized
            fashion
          in: query
          name: normalize
          schema:
            type: boolean
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - configurations
        method: update
  /zones/{zone_id}/api_gateway/discovery:
    get:
      description: >-
        Retrieve the most up to date view of discovered operations, rendered as
        OpenAPI schemas
      operationId: >-
        api-shield-api-discovery-retrieve-discovered-operations-on-a-zone-as-openapi
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldSchemaResponseDiscovery'
          description: >-
            Retrieve discovered operations on a zone, rendered as OpenAPI
            schemas response
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      schemas:
                        items:
                          $ref: '#/components/schemas/apiShieldOpenapi'
                        type: array
                      timestamp:
                        $ref: '#/components/schemas/apiShieldSchemasTimestamp'
                    required:
                      - timestamp
                      - schemas
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: >-
            Retrieve discovered operations on a zone, rendered as OpenAPI
            schemas response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieve discovered operations on a zone rendered as OpenAPI schemas
      tags:
        - API Shield API Discovery
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - discovery
        method: get
  /zones/{zone_id}/api_gateway/discovery/operations:
    get:
      description: Retrieve the most up to date view of discovered operations
      operationId: api-shield-api-discovery-retrieve-discovered-operations-on-a-zone
      parameters:
        - description: Page number of paginated results.
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - description: Maximum number of results per page.
          in: query
          name: per_page
          schema:
            default: 20
            maximum: 50
            minimum: 5
            type: integer
        - in: query
          name: host
          schema:
            description: Filter results to only include the specified hosts.
            items:
              type: string
            type: array
            uniqueItems: true
          explode: true
        - in: query
          name: method
          schema:
            description: Filter results to only include the specified HTTP methods.
            items:
              type: string
            type: array
            uniqueItems: true
          explode: true
        - in: query
          name: endpoint
          schema:
            description: Filter results to only include endpoints containing this pattern.
            type: string
        - in: query
          name: direction
          schema:
            description: Direction to order results.
            enum:
              - asc
              - desc
            type: string
        - in: query
          name: order
          schema:
            description: Field to order by
            enum:
              - host
              - method
              - endpoint
              - traffic_stats.requests
              - traffic_stats.last_updated
            type: string
        - in: query
          name: diff
          schema:
            description: >-
              When `true`, only return API Discovery results that are not saved
              into API Shield Endpoint Management
            type: boolean
        - description: >-
            Filter results to only include discovery results sourced from a
            particular discovery engine * `ML` - Discovered operations that were
            sourced using ML API Discovery * `SessionIdentifier` - Discovered
            operations that were sourced using Session Identifier API Discovery
          in: query
          name: origin
          schema:
            $ref: '#/components/schemas/apiShieldApiDiscoveryOrigin'
        - description: >-
            Filter results to only include discovery results in a particular
            state. States are as follows * `review` - Discovered operations that
            are not saved into API Shield Endpoint Management * `saved` -
            Discovered operations that are already saved into API Shield
            Endpoint Management * `ignored` - Discovered operations that have
            been marked as ignored
          in: query
          name: state
          schema:
            $ref: '#/components/schemas/apiShieldApiDiscoveryState'
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/apiShieldDiscoveryOperation'
                    type: array
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Retrieve discovered operations on a zone response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Retrieve discovered operations on a zone response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieve discovered operations on a zone
      tags:
        - API Shield API Discovery
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - discovery
          - operations
        method: list
    patch:
      description: Update the `state` on one or more discovered operations
      operationId: api-shield-api-patch-discovered-operations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/apiShieldApiDiscoveryPatchMultipleRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldPatchDiscoveriesResponse'
          description: Patch discovered operations response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Patch discovered operations response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Patch discovered operations
      tags:
        - API Shield API Discovery
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - discovery
          - operations
        method: bulk_edit
  /zones/{zone_id}/api_gateway/discovery/operations/{operation_id}:
    patch:
      description: Update the `state` on a discovered operation
      operationId: api-shield-api-patch-discovered-operation
      requestBody:
        content:
          application/json:
            schema:
              properties:
                state:
                  $ref: '#/components/schemas/apiShieldApiDiscoveryStatePatch'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldPatchDiscoveryResponse'
          description: Patch discovered operation response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Patch discovered operation response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Patch discovered operation
      tags:
        - API Shield API Discovery
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: Identifier for the discovered operation
          in: path
          name: operation_id
          schema:
            $ref: '#/components/schemas/apiShieldSchemasUuid'
          required: true
  /zones/{zone_id}/api_gateway/expression-template/fallthrough:
    post:
      description: >-
        Creates an expression template fallthrough rule for API Shield. Used for
        configuring default behavior when no other expression templates match.
      operationId: api-shield-expression-templates-fallthrough
      requestBody:
        content:
          application/json:
            schema:
              $ref: >-
                #/components/schemas/apiShieldRequestExpressionTemplatesFallthrough
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/apiShieldResponseExpressionTemplatesFallthrough
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: Generate fallthrough WAF expression template response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Generate fallthrough WAF expression template failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Generate fallthrough WAF expression template from a set of API hosts
      tags:
        - API Shield WAF Expression Templates
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - expression_template
          - fallthrough
        method: create
  /zones/{zone_id}/api_gateway/labels:
    get:
      description: Retrieve all labels
      operationId: api-shield-labels-get-labels
      parameters:
        - description: Page number of paginated results.
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - description: Maximum number of results per page.
          in: query
          name: per_page
          schema:
            default: 20
            maximum: 50
            minimum: 5
            type: integer
        - in: query
          name: order
          schema:
            description: Field to order by
            enum:
              - name
              - description
              - created_at
              - last_updated
              - mapped_resources.operations
            type: string
        - in: query
          name: direction
          schema:
            description: Direction to order results.
            enum:
              - asc
              - desc
            type: string
        - description: Filter for labels with source
          in: query
          name: source
          schema:
            $ref: '#/components/schemas/apiShieldLabelSource'
        - description: >-
            Filter for labels where the name or description matches using
            substring match
          in: query
          name: filter
          schema:
            type: string
        - description: Include `mapped_resources` for each label
          in: query
          name: with_mapped_resource_counts
          schema:
            default: false
            type: boolean
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/apiShieldFullLabel'
                    type: array
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Retrieve all labels response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Retrieve all labels response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieve all labels
      tags:
        - API Shield Labels
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - labels
        method: list
  /zones/{zone_id}/api_gateway/labels/managed/{name}:
    get:
      description: Retrieve managed label
      operationId: api-shield-labels-get-managed-label
      parameters:
        - description: Include `mapped_resources` for each label
          in: query
          name: with_mapped_resource_counts
          schema:
            default: false
            type: boolean
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - name: name
          in: path
          required: true
          description: Resource name.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/apiShieldFullManagedLabel'
                required:
