            route:
              description: Target route.
              example: https://api.example.com/api/service
              type: string
              x-auditable: true
          type: object
        confidence_intervals:
          properties:
            last_updated:
              $ref: '#/components/schemas/apiShieldTimestamp'
            suggested_threshold:
              properties:
                confidence_intervals:
                  properties:
                    p90:
                      $ref: '#/components/schemas/apiShieldConfidenceIntervalsBounds'
                    p95:
                      $ref: '#/components/schemas/apiShieldConfidenceIntervalsBounds'
                    p99:
                      $ref: '#/components/schemas/apiShieldConfidenceIntervalsBounds'
                  type: object
                mean:
                  description: Suggested threshold.
                  example: 25.5
                  type: number
                  x-auditable: true
              type: object
          type: object
        schema_info:
          properties:
            active_schema:
              description: Schema active on endpoint.
              properties:
                created_at:
                  $ref: '#/components/schemas/apiShieldTimestamp'
                  readOnly: true
                id:
                  $ref: '#/components/schemas/apiShieldSchemasUuid'
                is_learned:
                  description: True if schema is Cloudflare-provided.
                  example: true
                  type: boolean
                  x-auditable: true
                name:
                  description: Schema file name.
                  example: >-
                    api-endpoints-8694824bf5c04d019edcbf399c03c103-api-discovery.example.com-thresholds.json
                  type: string
                  x-auditable: true
              type: object
            learned_available:
              description: >-
                True if a Cloudflare-provided learned schema is available for
                this endpoint.
              example: true
              type: boolean
              x-auditable: true
            mitigation_action:
              description: Action taken on requests failing validation.
              enum:
                - none
                - log
                - block
              example: block
              nullable: true
              type: string
              x-auditable: true
          type: object
      required:
        - last_updated
      example:
        api_routing:
          last_updated: '2014-01-01T05:20:00.12345Z'
          route: https://api.example.com/api/service
