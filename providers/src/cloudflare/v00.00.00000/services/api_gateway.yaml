          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - name: name
          in: path
          required: true
          description: Resource name.
          schema:
            type: string
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - labels
          - managed
          - resources
          - operation
        method: update
  /zones/{zone_id}/api_gateway/labels/user:
