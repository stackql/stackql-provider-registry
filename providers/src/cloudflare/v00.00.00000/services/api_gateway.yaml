      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
      x-stackql-sdk:
        service: api_gateway
        resource_chain:
          - labels
          - managed
        method: get
  /zones/{zone_id}/api_gateway/labels/managed/{name}/resources/operation:
    put:
      description: Replace all operations(s) attached to a managed label
      operationId: api-shield-labels-replace-operations-attached-to-managed-label
      requestBody:
        content:
          application/json:
            schema:
              $ref: >-
                #/components/schemas/apiShieldReplaceOperationsAttachedToLabelRequest
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
