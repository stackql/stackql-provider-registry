openapi: 3.0.3
info:
  title: brand_protection API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/brand-protection/logo-matches:
    get:
      description: Return matches for logo queries based on ID
      parameters:
        - explode: true
          in: query
          name: logo_id
          schema:
            items:
              type: string
            type: array
          style: form
        - in: query
          name: offset
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiLogoMatch'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Unprocessable Content
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Read matches for logo queries by ID
      tags:
        - logo_match
      x-api-token-group:
        - Intel Write
        - Intel Read
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - logo_matches
        method: get
      operationId: get_accounts_account_id_brand_protection_logo_matches
  /accounts/{account_id}/brand-protection/logo-matches/download:
    get:
      description: Return matches as CSV for logo queries based on ID
      parameters:
        - explode: true
          in: query
          name: logo_id
          schema:
            items:
              type: string
            type: array
          style: form
        - in: query
          name: offset
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiLogoMatch'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Unprocessable Content
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Download matches for logo queries by ID
      tags:
        - logo_match
      x-api-token-group:
        - Intel Write
        - Intel Read
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - logo_matches
        method: download
      operationId: get_accounts_account_id_brand_protection_logo_matches_download
  /accounts/{account_id}/brand-protection/logos:
    post:
      description: Return new saved logo queries created from image files
      parameters:
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: match_type
          schema:
            type: string
        - in: query
          name: threshold
          schema:
            type: number
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/brandProtectionApiImageFile'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiLogo'
          description: Created
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Unprocessable Content
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Create new saved logo queries from image files
      tags:
        - logo_match
      x-api-token-group:
        - Intel Write
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - logos
        method: create
      operationId: post_accounts_account_id_brand_protection_logos
  /accounts/{account_id}/brand-protection/logos/{logo_id}:
    delete:
      description: Return a success message after deleting saved logo queries by ID
      responses:
        '204':
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Delete saved logo queries by ID
      tags:
        - logo_match
      x-api-token-group:
        - Intel Write
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: path
          name: logo_id
          schema:
            minLength: 1
            type: string
          required: true
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - logos
        method: delete
      operationId: delete_accounts_account_id_brand_protection_logos_logo_id
  /accounts/{account_id}/brand-protection/matches:
    get:
      description: Return matches for string queries based on ID
      parameters:
        - in: query
          name: id
          schema:
            type: string
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: include_domain_id
          schema:
            type: boolean
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiQueryMatch'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Unprocessable Content
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Read matches for string queries by ID
      tags:
        - domain_search
      x-api-token-group:
        - Intel Write
        - Intel Read
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - matches
        method: get
      operationId: get_accounts_account_id_brand_protection_matches
  /accounts/{account_id}/brand-protection/matches/download:
    get:
      description: Return matches as CSV for string queries based on ID
      parameters:
        - in: query
          name: id
          schema:
            type: string
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: include_domain_id
          schema:
            type: boolean
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiQueryMatch'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Unprocessable Content
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Download matches for string queries by ID
      tags:
        - domain_search
      x-api-token-group:
        - Intel Write
        - Intel Read
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - matches
        method: download
      operationId: get_accounts_account_id_brand_protection_matches_download
  /accounts/{account_id}/brand-protection/queries:
    delete:
      description: Return a success message after deleting saved string queries by ID
      parameters:
        - in: query
          name: id
          schema:
            type: string
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: scan
          schema:
            type: boolean
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Unprocessable Content
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Delete saved string queries by ID
      tags:
        - domain_search
      x-api-token-group:
        - Intel Write
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - queries
        method: delete
      operationId: delete_accounts_account_id_brand_protection_queries
    post:
      description: Return a success message after creating new saved string queries
      parameters:
        - in: query
          name: id
          schema:
            type: string
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: scan
          schema:
            type: boolean
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/brandProtectionApiQuery'
      responses:
        '204':
          description: No Content
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Unprocessable Content
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Create new saved string queries
      tags:
        - domain_search
      x-api-token-group:
        - Intel Write
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - queries
        method: create
      operationId: post_accounts_account_id_brand_protection_queries
  /accounts/{account_id}/brand-protection/queries/bulk:
    post:
      description: Return a success message after creating new saved string queries in bulk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/brandProtectionApiQueryBulk'
      responses:
        '204':
          description: No Content
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Unprocessable Content
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Create new saved string queries in bulk
      tags:
        - domain_search
      x-api-token-group:
        - Intel Write
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - queries
        method: bulk
      operationId: post_accounts_account_id_brand_protection_queries_bulk
  /accounts/{account_id}/brand-protection/submit:
    post:
      description: Return new URL submissions
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiURLSubmit'
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Create new URL submissions
      tags:
        - brand_protection
      x-api-token-group:
        - Intel Write
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      x-stackql-sdk:
        service: brand_protection
        resource_chain: []
        method: submit
      operationId: post_accounts_account_id_brand_protection_submit
  /accounts/{account_id}/brand-protection/url-info:
    get:
      description: Return submitted URLs based on ID
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiURLInfo'
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brandProtectionApiError'
          description: Default error response
      security:
        - api_token: []
      summary: Read submitted URLs by ID
      tags:
        - brand_protection
      x-api-token-group:
        - Intel Write
        - Intel Read
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      x-stackql-sdk:
        service: brand_protection
        resource_chain: []
        method: url_info
      operationId: get_accounts_account_id_brand_protection_url_info
  /accounts/{account_id}/cloudforce-one/v2/brand-protection/domain/matches:
    get:
      description: >-
        Get paginated list of domain matches for one or more brand protection
        queries. When multiple query_ids are provided (comma-separated), matches
        are deduplicated across queries and each match includes a match_details
        array with per-match query metadata and individual dismissed state.
      operationId: get_DomainMatchList
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: offset
          schema:
            default: '0'
            type: string
        - in: query
          name: limit
          schema:
            default: '50'
            type: string
        - in: query
          name: query_id
          schema:
            description: >-
              Query ID or comma-separated list of Query IDs. When multiple IDs
              are provided, matches are deduplicated across queries and each
              match includes a match_details array with per-match query metadata
              and dismissed state.
            items:
              type: string
            type: array
          explode: true
        - in: query
          name: include_domain_id
          schema:
            default: 'false'
            type: string
        - in: query
          name: include_dismissed
          schema:
            type: string
        - in: query
          name: domain_search
          schema:
            description: Filter matches by domain name (substring match)
            type: string
        - in: query
          name: orderBy
          schema:
            description: 'Column to sort by. Options: ''domain'', ''first_seen'', or ''registrar'''
            enum:
              - domain
              - first_seen
              - registrar
            type: string
        - in: query
          name: order
          schema:
            description: 'Sort order. Options: ''asc'' (ascending) or ''desc'' (descending)'
            enum:
              - asc
              - desc
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  matches:
                    items:
                      properties:
                        dismissed:
                          description: >-
                            Whether the match is dismissed. Only present for
                            single-query requests. For multi-query requests, use
                            the dismissed field in each match_details entry.
                          type: boolean
                        domain:
                          type: string
                        first_seen:
                          type: string
                        match_details:
                          description: >-
                            Per-match detail objects with query metadata and
                            individual dismissed state. Only present when
                            multiple query_ids are requested.
                          items:
                            properties:
                              dismissed:
                                description: >-
                                  Individual dismissed state for this specific
                                  match.
                                type: boolean
                              match_id:
                                type: integer
                              query_id:
                                type: integer
                              query_tag:
                                description: Tag associated with the query, if one exists.
                                nullable: true
                                type: string
                            required:
                              - query_id
                              - query_tag
                              - match_id
                              - dismissed
                            type: object
                          type: array
                        public_scans:
                          nullable: true
                          properties:
                            submission_id:
                              type: string
                          required:
                            - submission_id
                          type: object
                        registrar:
                          nullable: true
                          type: string
                        scan_status:
                          type: string
                        scan_submission_id:
                          nullable: true
                          type: integer
                        source:
                          nullable: true
                          type: string
                      required:
                        - domain
                        - first_seen
                        - public_scans
                        - scan_status
                        - scan_submission_id
                        - source
                        - registrar
                      type: object
                    type: array
                  total:
                    minimum: 0
                    type: integer
                required:
                  - matches
                  - total
                type: object
          description: Successfully retrieved query matches
      security:
        - api_token: []
      summary: List saved query matches
      tags:
        - Brand Protection
      x-api-token-group:
        - Cloudforce One Write
        - Cloudforce One Read
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - v2
          - matches
        method: get
  /accounts/{account_id}/cloudforce-one/v2/brand-protection/domain/queries:
    get:
      description: Get all saved brand protection queries for an account
      operationId: get_GetDomainQueries
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: id
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  properties:
                    created:
                      type: string
                    parameters:
                      nullable: true
                      properties:
                        max_time:
                          type: string
                        min_time:
                          type: string
                        string_matches:
                          items:
                            properties:
                              max_edit_distance:
                                maximum: 1
                                minimum: 0
                                type: number
                              pattern:
                                minLength: 1
                                type: string
                            required:
                              - pattern
                              - max_edit_distance
                            type: object
                          type: array
                      required:
                        - string_matches
                      type: object
                    query_id:
                      type: integer
                    query_tag:
                      type: string
                    scan:
                      type: boolean
                    updated:
                      type: string
                  required:
                    - query_id
                    - query_tag
                    - scan
                    - parameters
                    - created
                    - updated
                  type: object
                type: array
          description: Successfully retrieved queries
      security:
        - api_token: []
      summary: Get queries
      tags:
        - Brand Protection
      x-api-token-group:
        - Cloudforce One Write
        - Cloudforce One Read
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - v2
          - queries
        method: get
  /accounts/{account_id}/cloudforce-one/v2/brand-protection/logo/matches:
    get:
      description: >-
        Get paginated list of logo matches for a specific brand protection logo
        query
      operationId: get_LogoMatchList
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: query
          name: offset
          schema:
            default: '0'
            type: string
        - in: query
          name: limit
          schema:
            default: '50'
            type: string
        - in: query
          name: query_id
          schema:
            minLength: 1
            type: string
        - in: query
          name: download
          schema:
            type: string
        - in: query
          name: orderBy
          schema:
            description: >-
              Column to sort by. Options: 'matchedAt', 'domain',
              'similarityScore', or 'registrar'
            enum:
              - matchedAt
              - domain
              - similarityScore
              - registrar
            type: string
        - in: query
          name: order
          schema:
            description: 'Sort order. Options: ''asc'' (ascending) or ''desc'' (descending)'
            enum:
              - asc
              - desc
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  matches:
                    items:
                      properties:
                        content_type:
                          type: string
                        domain:
                          nullable: true
                          type: string
                        id:
                          type: integer
                        image_data:
                          type: string
                        matched_at:
                          nullable: true
                          type: string
                        query_id:
                          type: integer
                        registrar:
                          nullable: true
                          type: string
                        similarity_score:
                          type: number
                        url_scan_id:
                          nullable: true
                          type: string
                      required:
                        - id
                        - query_id
                        - url_scan_id
                        - similarity_score
                        - matched_at
                        - domain
                        - registrar
                      type: object
                    type: array
                  total:
                    minimum: 0
                    type: integer
                required:
                  - matches
                  - total
                type: object
          description: Successfully retrieved logo matches
      security:
        - api_token: []
      summary: List logo matches
      tags:
        - Brand Protection
      x-api-token-group:
        - Cloudforce One Write
        - Cloudforce One Read
      x-stackql-sdk:
        service: brand_protection
        resource_chain:
          - v2
          - logo_matches
        method: get
  /accounts/{account_id}/cloudforce-one/v2/brand-protection/logo/queries:
    get:
      description: >-
        Get all saved brand protection logo queries for an account. Optionally
        specify id to get a single query. Set download=true to include
        base64-encoded image data.
      operationId: get_GetLogoQueries
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Optional query ID to retrieve a specific logo query
          in: query
          name: id
          schema:
            description: Optional query ID to retrieve a specific logo query
            type: string
        - description: If true, include base64-encoded image data in the response
          in: query
          name: download
          schema:
            description: If true, include base64-encoded image data in the response
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  properties:
                    content_type:
                      description: MIME type of the image (only present when download=true)
                      type: string
                    id:
                      type: integer
                    image_data:
                      description: >-
                        Base64-encoded image data (only present when
                        download=true)
                      type: string
                    r2_path:
                      type: string
                    similarity_threshold:
                      type: number
                    tag:
                      type: string
                    uploaded_at:
                      nullable: true
                      type: string
                  required:
                    - id
                    - tag
                    - r2_path
                    - similarity_threshold
                    - uploaded_at
                  type: object
                type: array
          description: Successfully retrieved logo queries
      security:
        - api_token: []
      summary: Get logo queries
      tags:
