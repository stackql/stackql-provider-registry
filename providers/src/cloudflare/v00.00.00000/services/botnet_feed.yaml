openapi: 3.0.3
info:
  title: botnet_feed API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/botnet_feed/asn/{asn_id}/day_report:
    get:
      description: >-
        Gets all the data the botnet tracking database has for a given ASN
        registered to user account for given date. If no date is given, it will
        return results for the previous day.
      operationId: botnet-threat-feed-get-day-report
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: path
          name: asn_id
          schema:
            $ref: '#/components/schemas/dosAsn'
          required: true
        - in: query
          name: date
          schema:
            $ref: '#/components/schemas/dosTimestamp'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/dosMessages'
                  messages:
                    $ref: '#/components/schemas/dosMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    properties:
                      cidr:
                        type: string
                      date:
                        format: date-time
                        type: string
                      offense_count:
                        type: integer
                    type: object
                required:
                  - success
                  - errors
                  - messages
          description: Get botnet feed report for day
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommonFailure'
          description: Get botnet feed report for day response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get daily report
      tags:
        - Botnet Threat Feed
      x-api-token-group:
        - DDoS Botnet Feed Write
        - DDoS Botnet Feed Read
      x-stackql-sdk:
        service: botnet_feed
        resource_chain:
          - asn
        method: day_report
  /accounts/{account_id}/botnet_feed/asn/{asn_id}/full_report:
    get:
      description: >-
        Gets all the data the botnet threat feed tracking database has for a
        given ASN registered to user account.
      operationId: botnet-threat-feed-get-full-report
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: path
          name: asn_id
          schema:
            $ref: '#/components/schemas/dosAsn'
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/dosMessages'
                  messages:
                    $ref: '#/components/schemas/dosMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    properties:
                      cidr:
                        type: string
                      date:
                        format: date-time
                        type: string
                      offense_count:
                        type: integer
                    type: object
                required:
                  - success
                  - errors
                  - messages
          description: Get full botnet feed report
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommonFailure'
          description: Get full botnet feed report response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get full report
      tags:
        - Botnet Threat Feed
      x-api-token-group:
        - DDoS Botnet Feed Write
        - DDoS Botnet Feed Read
      x-stackql-sdk:
        service: botnet_feed
        resource_chain:
          - asn
        method: full_report
  /accounts/{account_id}/botnet_feed/configs/asn:
    get:
      description: >-
        Gets a list of all ASNs registered for a user for the DDoS Botnet Feed
        API.
      operationId: botnet-threat-feed-list-asn
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/dosMessages'
                  messages:
                    $ref: '#/components/schemas/dosMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    properties:
                      asn:
                        type: integer
                    type: object
                required:
                  - success
                  - errors
                  - messages
          description: Get list of ASNs response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommonFailure'
          description: Get list of ASNs response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get list of ASNs
      tags:
        - Botnet Threat Feed
      x-api-token-group:
        - DDoS Botnet Feed Write
        - DDoS Botnet Feed Read
      x-stackql-sdk:
        service: botnet_feed
        resource_chain:
          - configs
          - asn
        method: get
  /accounts/{account_id}/botnet_feed/configs/asn/{asn_id}:
    delete:
      description: Delete an ASN from botnet threat feed for a given user.
      operationId: botnet-threat-feed-delete-asn
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - in: path
          name: asn_id
          schema:
            $ref: '#/components/schemas/dosAsn'
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/dosMessages'
                  messages:
                    $ref: '#/components/schemas/dosMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    properties:
                      asn:
                        type: integer
                    type: object
                required:
                  - success
                  - errors
                  - messages
          description: Delete ASN response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommonFailure'
          description: Delete ASN response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete an ASN
      tags:
        - Botnet Threat Feed
      x-api-token-group:
        - DDoS Botnet Feed Write
      x-stackql-sdk:
        service: botnet_feed
        resource_chain:
          - configs
          - asn
        method: delete
components:
  schemas:
    dosApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/dosMessages'
        messages:
          example: []
          $ref: '#/components/schemas/dosMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    dosAsn:
      type: integer
    dosMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    dosTimestamp:
      example: '2014-01-01T05:20:00.12345Z'
      format: date-time
      type: string
      x-auditable: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    asn_day_report:
      id: cloudflare.botnet_feed.asn_day_report
      name: asn_day_report
      title: Asn Day Report
      methods:
        list:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1botnet_feed~1asn~1{asn_id}~1day_report/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/asn_day_report/methods/list'
        insert: []
        update: []
        delete: []
        replace: []
    asn_full_report:
      id: cloudflare.botnet_feed.asn_full_report
      name: asn_full_report
      title: Asn Full Report
      methods:
        list:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1botnet_feed~1asn~1{asn_id}~1full_report/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/asn_full_report/methods/list'
        insert: []
        update: []
        delete: []
        replace: []
    asn:
      id: cloudflare.botnet_feed.asn
      name: asn
      title: Asn
      methods:
        list:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1botnet_feed~1configs~1asn/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        delete:
          operation:
            $ref: >-
              #/paths/~1accounts~1{account_id}~1botnet_feed~1configs~1asn~1{asn_id}/delete
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/asn/methods/list'
        insert: []
        update: []
        delete:
          - $ref: '#/components/x-stackQL-resources/asn/methods/delete'
        replace: []
