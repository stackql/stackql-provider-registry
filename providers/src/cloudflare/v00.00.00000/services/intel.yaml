  /accounts/{account_id}/intel/dns:
    get:
      description: Gets a list of all the domains that have resolved to a specific IP address.
      operationId: passive-dns-by-ip-get-passive-dns-by-ip
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: start_end_params
        schema:
          $ref: '#/components/schemas/intelStartEndParams'
      - in: query
        name: ipv4
        schema:
          type: string
      - in: query
        name: page
        schema:
          description: Requested page within paginated list of results.
          type: number
      - in: query
        name: per_page
        schema:
          description: Maximum number of results requested.
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/intelComponentsSchemasSingleResponse'
          description: Get Passive DNS by IP response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                        documentation_url:
                          type: string
                        message:
                          type: string
                        source:
                          properties:
                            pointer:
                              type: string
                          type: object
                      required:
                      - code
                      - message
                      - code
                      - message
                      type: object
                      uniqueItems: true
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                        documentation_url:
                          type: string
                        message:
                          type: string
                        source:
                          properties:
                            pointer:
                              type: string
                          type: object
                      required:
                      - code
                      - message
                      - code
                      - message
                      type: object
                      uniqueItems: true
                    type: array
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/intelSchemasResultInfo'
                  result:
                    properties:
                      count:
                        description: Total results returned based on your search parameters.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      reverse_records:
                        description: Reverse DNS look-ups observed during the time period.
                        items:
                          properties:
                            first_seen:
                              description: First seen date of the DNS record during the time period.
                              format: date
                              type: string
                              x-auditable: true
                            hostname:
                              description: Hostname that the IP was observed resolving to.
                              type: string
                              x-auditable: true
                            last_seen:
                              description: Last seen date of the DNS record during the time period.
                              format: date
                              type: string
                              x-auditable: true
                          type: object
                        type: array
                    type: object
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Get Passive DNS by IP response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get Passive DNS by IP
      tags:
      - Passive DNS by IP
      x-api-token-group:
      - Intel Write
      - Intel Read
      x-stackql-sdk:
        service: intel
        resource_chain:
        - dns
        method: list
  /accounts/{account_id}/intel/domain:
    get:
      description: Gets security details and statistics about a domain.
      operationId: domain-intelligence-get-domain-details
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: domain
        schema:
          type: string
      - description: Skip DNS resolution lookups for faster response.
        in: query
        name: skip_dns
        schema:
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/intelSingleResponse'
          description: Get Domain Details response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                        documentation_url:
                          type: string
                        message:
                          type: string
                        source:
