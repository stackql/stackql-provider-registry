openapi: 3.0.3
info:
  title: intel API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/intel/asn/{asn}:
    get:
      description: Gets an overview of the Autonomous System Number (ASN) and a list of subnets for it.
      operationId: asn-intelligence-get-asn-overview
      parameters:
      - in: path
        name: asn
        schema:
          $ref: '#/components/schemas/intelAsn'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/intelAsnComponentsSchemasResponse'
          description: Get ASN Overview response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                        documentation_url:
                          type: string
                        message:
                          type: string
                        source:
                          properties:
                            pointer:
                              type: string
                          type: object
                      required:
                      - code
                      - message
                      - code
                      - message
                      type: object
                      uniqueItems: true
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                        documentation_url:
                          type: string
                        message:
                          type: string
                        source:
                          properties:
                            pointer:
                              type: string
                          type: object
                      required:
                      - code
                      - message
                      - code
                      - message
                      type: object
                      uniqueItems: true
                    type: array
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    type: integer
                    x-auditable: true
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Get ASN Overview response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get ASN Overview.
      tags:
      - ASN Intelligence
      x-api-token-group:
      - Intel Write
      - Intel Read
      x-stackql-sdk:
        service: intel
        resource_chain:
        - asn
        method: get
  /accounts/{account_id}/intel/asn/{asn}/subnets:
    get:
      description: Get ASN Subnets.
      operationId: asn-intelligence-get-asn-subnets
      parameters:
      - in: path
        name: asn
        schema:
          $ref: '#/components/schemas/intelAsn'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  asn:
                    $ref: '#/components/schemas/intelAsn'
                  count:
                    $ref: '#/components/schemas/intelCount'
                  ip_count_total:
                    type: integer
                  page:
                    $ref: '#/components/schemas/intelPage'
                  per_page:
                    $ref: '#/components/schemas/intelPerPage'
                  subnets:
                    items:
                      type: string
                    type: array
                type: object
          description: Get ASN Subnets response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  asn:
                    $ref: '#/components/schemas/intelAsn'
                  count:
                    $ref: '#/components/schemas/intelCount'
                  ip_count_total:
                    type: integer
                  page:
                    $ref: '#/components/schemas/intelPage'
                  per_page:
                    $ref: '#/components/schemas/intelPerPage'
                  subnets:
                    items:
                      type: string
                    type: array
                  errors:
                    minLength: 1
                    $ref: '#/components/schemas/intelMessages'
                  messages:
                    $ref: '#/components/schemas/intelMessages'
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    description: Whether the API call was successful.
                    type: boolean
                type: object
                required:
                - success
                - errors
                - messages
                - result
          description: Get ASN Subnets response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get ASN Subnets
      tags:
      - ASN Intelligence
      x-api-token-group:
      - Intel Write
      - Intel Read
      x-stackql-sdk:
        service: intel
        resource_chain:
        - asn
        - subnets
        method: get
  /accounts/{account_id}/intel/attack-surface-report/issue-types:
    get:
      description: Lists all available issue types in Security Center, describing categories of security issues.
      operationId: get-security-center-issue-types
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/securityCenterMessages'
                  messages:
                    $ref: '#/components/schemas/securityCenterMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    items:
                      type: string
                    type: array
                required:
                - success
                - errors
                - messages
                type: object
          description: The request was successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseCommonFailure'
          description: A client error occurred.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Retrieves Security Center Issues Types
      tags:
      - Security Center Insights
      x-api-token-group:
      - Intel Write
