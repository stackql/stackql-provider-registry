                      inherited_content_categories:
                        $ref: '#/components/schemas/intelCategoriesWithSuperCategoryIdsExampleEmpty'
                      inherited_from:
                        $ref: '#/components/schemas/intelInheritedFrom'
                      inherited_risk_types:
                        $ref: '#/components/schemas/intelCategoriesWithSuperCategoryIdsExampleEmpty'
                      popularity_rank:
                        $ref: '#/components/schemas/intelPopularityRank'
                      resolves_to_refs:
