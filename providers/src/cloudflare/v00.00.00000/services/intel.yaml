        method: get
  /accounts/{account_id}/intel/attack-surface-report/issues:
    get:
      deprecated: true
      description: Lists all Security Center issues for the account, showing active security problems requiring attention.
      operationId: get-security-center-issues
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: dismissed
        schema:
          $ref: '#/components/schemas/securityCenterDismissed'
      - in: query
        name: issue_class
        schema:
          $ref: '#/components/schemas/securityCenterIssueClasses'
      - in: query
        name: issue_type
        schema:
          $ref: '#/components/schemas/securityCenterIssueTypes'
      - in: query
        name: product
        schema:
          $ref: '#/components/schemas/securityCenterProducts'
      - in: query
        name: severity
        schema:
          $ref: '#/components/schemas/securityCenterSeverityQueryParam'
      - in: query
        name: subject
        schema:
          $ref: '#/components/schemas/securityCenterSubjects'
      - in: query
        name: issue_class~neq
        schema:
          $ref: '#/components/schemas/securityCenterIssueClasses'
      - in: query
        name: issue_type~neq
        schema:
          $ref: '#/components/schemas/securityCenterIssueTypes'
      - in: query
        name: product~neq
        schema:
          $ref: '#/components/schemas/securityCenterProducts'
      - in: query
        name: severity~neq
        schema:
          $ref: '#/components/schemas/securityCenterSeverityQueryParam'
      - in: query
        name: subject~neq
        schema:
          $ref: '#/components/schemas/securityCenterSubjects'
      - in: query
        name: page
        schema:
          default: 1
          $ref: '#/components/schemas/securityCenterPage'
      - in: query
        name: per_page
        schema:
          default: 25
          $ref: '#/components/schemas/securityCenterPerPage'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/securityCenterMessages'
                  messages:
                    $ref: '#/components/schemas/securityCenterMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    properties:
                      count:
                        $ref: '#/components/schemas/securityCenterCount'
                      issues:
                        items:
                          $ref: '#/components/schemas/securityCenterIssue'
                        type: array
                      page:
                        $ref: '#/components/schemas/securityCenterPage'
                      per_page:
                        $ref: '#/components/schemas/securityCenterPerPage'
                    type: object
                required:
                - success
                - errors
                - messages
                type: object
          description: The request was successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseCommonFailure'
          description: A client error occurred.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Retrieves Security Center Issues
      tags:
      - Security Center Insights
      x-api-token-group:
      - Intel Write
      - Intel Read
      x-stackql-sdk:
        service: intel
        resource_chain:
        - attack_surface_report
        - issues
        method: list
