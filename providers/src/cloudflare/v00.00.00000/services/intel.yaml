                          type: object
                      required:
                      - code
                      - message
                      - code
                      - message
                      type: object
                      uniqueItems: true
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                        documentation_url:
                          type: string
                        message:
                          type: string
                        source:
                          properties:
                            pointer:
                              type: string
                          type: object
                      required:
                      - code
                      - message
                      - code
                      - message
                      type: object
                      uniqueItems: true
                    type: array
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    properties:
                      additional_information:
                        $ref: '#/components/schemas/intelAdditionalInformation'
                      application:
                        $ref: '#/components/schemas/intelApplication'
                      content_categories:
                        $ref: '#/components/schemas/intelContentCategories'
                      domain:
