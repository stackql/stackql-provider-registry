openapi: 3.0.3
info:
  title: hostnames API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/hostnames/settings/{setting_id}:
    get:
      description: List the requested TLS setting for the hostnames under this zone.
      operationId: per-hostname-tls-settings-list
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: setting_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesSettingId'
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesPerHostnameSettingsResponseCollection
          description: List per-hostname TLS settings response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: Total pages available of results
                        type: number
                    type: object
                  result:
                    items:
                      properties:
                        created_at:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasCreatedAt
                          readOnly: true
                        hostname:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
                        status:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasStatus
                        updated_at:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasUpdatedAt
                          readOnly: true
                        value:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesValue
                      type: object
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List per-hostname TLS settings response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List TLS setting for hostnames
      tags:
        - Per-Hostname TLS Settings
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: hostnames
        resource_chain:
          - settings
          - tls
        method: get
  /zones/{zone_id}/hostnames/settings/{setting_id}/{hostname}:
    delete:
      description: Delete the tls setting value for the hostname.
      operationId: per-hostname-tls-settings-delete
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: setting_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesSettingId'
          required: true
        - in: path
          name: hostname
          schema:
            $ref: >-
              #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesPerHostnameSettingsResponseDelete
          description: Delete TLS setting for hostname response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    type: object
                    properties:
                      created_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasCreatedAt
                        readOnly: true
                      hostname:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasStatus
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasUpdatedAt
                        readOnly: true
                      value:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesValue'
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Delete TLS setting for hostname response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete TLS setting for hostname
      tags:
        - Per-Hostname TLS Settings
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: hostnames
        resource_chain:
          - settings
          - tls
        method: delete
    get:
      description: Get the requested TLS setting for the hostname.
      operationId: per-hostname-tls-settings-get
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: setting_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesSettingId'
          required: true
        - in: path
          name: hostname
          schema:
            $ref: >-
              #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesPerHostnameSettingsResponse
          description: Get TLS setting for hostname response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    type: object
                    properties:
                      created_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasCreatedAt
                        readOnly: true
                      hostname:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasStatus
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasUpdatedAt
                        readOnly: true
                      value:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesValue'
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Get TLS setting for hostname response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get TLS setting for hostname
      tags:
        - Per-Hostname TLS Settings
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
    put:
      description: Update the tls setting value for the hostname.
      operationId: per-hostname-tls-settings-put
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: setting_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesSettingId'
          required: true
        - in: path
          name: hostname
          schema:
            $ref: >-
              #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
          required: true
      requestBody:
        content:
          application/json:
            schema:
              properties:
                value:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesValue'
              required:
                - value
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesPerHostnameSettingsResponse
          description: Edit TLS setting for hostname response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    type: object
                    properties:
                      created_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasCreatedAt
                        readOnly: true
                      hostname:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasStatus
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasUpdatedAt
                        readOnly: true
                      value:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesValue'
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Edit TLS setting for hostname response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Edit TLS setting for hostname
      tags:
        - Per-Hostname TLS Settings
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: hostnames
        resource_chain:
          - settings
          - tls
        method: update
components:
  schemas:
    tlsCertificatesAndHostnamesComponentsSchemasHostname:
      description: The hostname for which the tls settings are set.
      example: app.example.com
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasCreatedAt:
      description: >-
        This is the time the tls setting was originally created for this
        hostname.
      example: '2023-07-10T20:01:50.219171Z'
      format: date-time
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasStatus:
      description: Deployment status for the given tls setting.
      example: pending_deployment
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasUpdatedAt:
      description: This is the time the tls setting was updated.
      example: '2023-07-10T20:01:50.219171Z'
      format: date-time
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    tlsCertificatesAndHostnamesPerHostnameSettingsResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          type: object
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSettingObject'
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesPerHostnameSettingsResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 50
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 1
              type: number
            total_pages:
              description: Total pages available of results
              example: 1
              type: number
          type: object
        result:
          items:
            $ref: >-
              #/components/schemas/tlsCertificatesAndHostnamesPerHostnameSettingsResponseCollection_result_item
          type: array
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesPerHostnameSettingsResponseCollection_result_item:
      properties:
        created_at:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasCreatedAt
          readOnly: true
        hostname:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
        status:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasStatus
        updated_at:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasUpdatedAt
          readOnly: true
        value:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesValue'
      type: object
    tlsCertificatesAndHostnamesPerHostnameSettingsResponseDelete:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          type: object
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSettingObjectDelete'
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesSettingId:
      description: >-
        The TLS Setting name. The value type depends on the setting: -
        `ciphers`: value is an array of cipher suite strings (e.g.,
        `["ECDHE-RSA-AES128-GCM-SHA256", "AES128-GCM-SHA256"]`) -
        `min_tls_version`: value is a TLS version string (`"1.0"`, `"1.1"`,
        `"1.2"`, or `"1.3"`) - `http2`: value is `"on"` or `"off"`
      enum:
        - ciphers
        - min_tls_version
        - http2
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesSettingObject:
      properties:
        created_at:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasCreatedAt
          readOnly: true
        hostname:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
        status:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasStatus
        updated_at:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasUpdatedAt
          readOnly: true
        value:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesValue'
      type: object
    tlsCertificatesAndHostnamesSettingObjectDelete:
      properties:
        created_at:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasCreatedAt
          readOnly: true
        hostname:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasHostname
        status:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasStatus
        updated_at:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesHostnameTlsSettingsComponentsSchemasUpdatedAt
          readOnly: true
        value:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesValue'
      type: object
    tlsCertificatesAndHostnamesValue:
      description: >-
        The TLS setting value. The type depends on the `setting_id` used in the
        request path: - `ciphers`: an array of allowed cipher suite strings in
        BoringSSL format (e.g., `["ECDHE-RSA-AES128-GCM-SHA256",
        "AES128-GCM-SHA256"]`) - `min_tls_version`: a string indicating the
        minimum TLS version — one of `"1.0"`, `"1.1"`, `"1.2"`, or `"1.3"`
        (e.g., `"1.2"`) - `http2`: a string indicating whether HTTP/2 is enabled
        — `"on"` or `"off"` (e.g., `"on"`)
      type: array
      example:
        - ECDHE-RSA-AES128-GCM-SHA256
        - AES128-GCM-SHA256
      items:
        type: string
      enum:
        - '1.0'
        - '1.1'
        - '1.2'
        - '1.3'
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    tls:
      id: cloudflare.hostnames.tls
      name: tls
      title: Tls
      methods:
        get:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1hostnames~1settings~1{setting_id}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        delete:
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1hostnames~1settings~1{setting_id}~1{hostname}/delete
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1hostnames~1settings~1{setting_id}~1{hostname}/put
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/tls/methods/get'
        insert: []
        update: []
        delete:
          - $ref: '#/components/x-stackQL-resources/tls/methods/delete'
        replace:
          - $ref: '#/components/x-stackQL-resources/tls/methods/update'
    settings:
      id: cloudflare.hostnames.settings
      name: settings
      title: Settings
      methods:
        get:
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1hostnames~1settings~1{setting_id}~1{hostname}/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/settings/methods/get'
        insert: []
        update: []
        delete: []
        replace: []
