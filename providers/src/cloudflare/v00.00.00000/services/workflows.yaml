openapi: 3.0.3
info:
  title: workflows API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/workflows:
    get:
      description: Lists all workflows configured for the account.
      operationId: wor-list-workflows
      parameters:
      - in: query
        name: per_page
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: number
      - in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: number
      - description: Allows filtering workflows` name.
        in: query
        name: search
        schema:
          description: Allows filtering workflows` name.
          maxLength: 64
          minLength: 1
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  result:
                    items:
                      properties:
                        class_name:
                          type: string
                        created_on:
                          format: date-time
                          type: string
                          readOnly: true
                        id:
                          format: uuid
                          type: string
                        instances:
                          properties:
                            complete:
                              type: number
                            errored:
                              type: number
                            paused:
                              type: number
                            queued:
                              type: number
                            running:
                              type: number
                            terminated:
                              type: number
                            waiting:
                              type: number
                            waitingForPause:
                              type: number
                          type: object
                        modified_on:
                          format: date-time
                          type: string
                          readOnly: true
                        name:
                          maxLength: 64
                          minLength: 1
                          type: string
                        script_name:
                          type: string
                        triggered_on:
                          format: date-time
                          nullable: true
                          type: string
                      required:
                      - name
                      - id
                      - created_on
                      - modified_on
                      - script_name
                      - class_name
                      - triggered_on
                      - instances
                      type: object
                    type: array
                  result_info:
                    properties:
                      count:
                        type: number
                      cursor:
                        type: string
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                      total_pages:
                        type: number
                    required:
                    - per_page
                    - count
                    - total_count
                    type: object
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - result
                - messages
                type: object
          description: List of all Workflows belonging to a account.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Input Validation Error.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List all Workflows
      tags:
      - Workflows
      x-api-token-group:
      - Workers Tail Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.workers.write
        - com.cloudflare.api.workers.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: workflows
        resource_chain: []
        method: list
  /accounts/{account_id}/workflows/{workflow_name}:
    delete:
      description: Deletes a Workflow. This only deletes the Workflow and does not delete or modify any Worker associated to this Workflow or bounded to it.
      operationId: wor-delete-workflow
      parameters:
      - name: workflow_name
        in: path
        required: true
        description: The Workflow name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  result:
                    properties:
                      status:
                        enum:
                        - ok
                        type: string
                      success:
                        nullable: true
                        type: boolean
                    required:
                    - success
                    - status
                    type: object
                  result_info:
                    properties:
                      count:
                        type: number
                      cursor:
                        type: string
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                      total_pages:
                        type: number
                    required:
                    - per_page
                    - count
                    - total_count
                    type: object
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - result
                - messages
                type: object
          description: Deletes a Workflow.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Workflow has no deployed versions.
        '404':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Workflow not found.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Deletes a Workflow
      tags:
      - Workflows
      x-api-token-group:
      - Workers Scripts Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.workers.write
        - com.cloudflare.api.workers.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: workflows
        resource_chain: []
        method: delete
    get:
      description: Retrieves configuration and metadata for a specific workflow.
      operationId: wor-get-workflow-details
      parameters:
      - name: workflow_name
        in: path
        required: true
        description: The Workflow name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  result:
                    properties:
                      class_name:
                        type: string
                      created_on:
                        format: date-time
                        type: string
                        readOnly: true
                      id:
                        format: uuid
                        type: string
                      instances:
                        properties:
                          complete:
                            type: number
                          errored:
                            type: number
                          paused:
                            type: number
                          queued:
                            type: number
                          running:
                            type: number
                          terminated:
                            type: number
                          waiting:
                            type: number
                          waitingForPause:
                            type: number
                        type: object
                      modified_on:
                        format: date-time
                        type: string
                        readOnly: true
                      name:
                        maxLength: 64
                        minLength: 1
                        type: string
                      script_name:
                        type: string
                      triggered_on:
                        format: date-time
                        nullable: true
                        type: string
                    required:
                    - name
                    - id
                    - created_on
                    - modified_on
                    - script_name
                    - class_name
                    - triggered_on
                    - instances
                    type: object
                  result_info:
                    properties:
                      count:
                        type: number
                      cursor:
                        type: string
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                      total_pages:
                        type: number
                    required:
                    - per_page
                    - count
                    - total_count
                    type: object
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - result
                - messages
                type: object
          description: Get Workflow details.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Workflow has no deployed versions.
        '404':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Workflow not found.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get Workflow details
      tags:
      - Workflows
      x-api-token-group:
      - Workers Tail Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.workers.write
        - com.cloudflare.api.workers.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: workflows
        resource_chain: []
        method: get
    put:
      description: Creates a new workflow or updates an existing workflow definition.
      operationId: wor-create-or-modify-workflow
      parameters:
      - name: workflow_name
        in: path
        required: true
        description: The Workflow name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                class_name:
                  maxLength: 255
                  minLength: 1
                  type: string
                limits:
                  properties:
                    steps:
                      minimum: 1
                      type: integer
                  type: object
                script_name:
                  maxLength: 255
                  minLength: 1
                  type: string
              required:
              - script_name
              - class_name
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  result:
                    properties:
                      class_name:
                        type: string
                      created_on:
                        format: date-time
                        type: string
                        readOnly: true
                      id:
                        format: uuid
                        type: string
                      is_deleted:
                        type: number
                      modified_on:
                        format: date-time
                        type: string
                        readOnly: true
                      name:
                        maxLength: 64
                        minLength: 1
                        type: string
                      script_name:
                        type: string
                      terminator_running:
                        type: number
                      triggered_on:
                        format: date-time
                        nullable: true
                        type: string
                      version_id:
                        format: uuid
                        type: string
                    required:
                    - version_id
                    - name
                    - id
                    - created_on
                    - modified_on
                    - script_name
                    - class_name
                    - triggered_on
                    - is_deleted
                    - terminator_running
                    type: object
                  result_info:
                    properties:
                      count:
                        type: number
                      cursor:
                        type: string
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                      total_pages:
                        type: number
                    required:
                    - per_page
                    - count
                    - total_count
                    type: object
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - result
                - messages
                type: object
          description: Create/modify a Workflow based on a deployed script with an existing `WorkflowEntrypoint` class. Must be done after deploying the corresponding script.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Bad Request.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create/modify Workflow
      tags:
      - Workflows
      x-api-token-group:
      - Workers Scripts Write
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.workers.write
        - com.cloudflare.api.workers.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: workflows
        resource_chain: []
        method: update
  /accounts/{account_id}/workflows/{workflow_name}/instances:
    get:
      description: Lists all instances of a workflow with their execution status.
      operationId: wor-list-workflow-instances
      parameters:
      - name: workflow_name
        in: path
        required: true
        description: The Workflow name.
        schema:
          type: string
      - in: query
        name: page
        schema:
          deprecated: true
          description: 'Deprecated: use `cursor` for pagination instead.'
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 50
          maximum: 100
          minimum: 1
          type: number
      - description: Opaque token for cursor-based pagination. Mutually exclusive with `page`.
        in: query
        name: cursor
        schema:
          description: Opaque token for cursor-based pagination. Mutually exclusive with `page`.
          type: string
      - description: Defines the direction for cursor-based pagination.
        in: query
        name: direction
        schema:
          description: Defines the direction for cursor-based pagination.
          enum:
          - asc
          - desc
          type: string
      - in: query
        name: status
        schema:
          enum:
          - queued
          - running
          - paused
          - errored
          - terminated
          - complete
          - waitingForPause
          - waiting
          type: string
      - description: Accepts ISO 8601 with no timezone offsets and in UTC.
        in: query
        name: date_start
        schema:
          description: Accepts ISO 8601 with no timezone offsets and in UTC.
          format: date-time
          type: string
      - description: Accepts ISO 8601 with no timezone offsets and in UTC.
        in: query
        name: date_end
        schema:
          description: Accepts ISO 8601 with no timezone offsets and in UTC.
          format: date-time
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  result:
                    items:
                      properties:
                        created_on:
                          format: date-time
                          type: string
                          readOnly: true
                        ended_on:
                          format: date-time
                          nullable: true
                          type: string
                        id:
                          maxLength: 100
                          minLength: 1
                          type: string
                        modified_on:
                          format: date-time
                          type: string
                          readOnly: true
                        started_on:
                          format: date-time
                          nullable: true
                          type: string
                        status:
                          enum:
                          - queued
                          - running
                          - paused
                          - errored
                          - terminated
                          - complete
                          - waitingForPause
                          - waiting
                          type: string
                        version_id:
                          format: uuid
                          type: string
                        workflow_id:
                          format: uuid
                          type: string
                      required:
                      - id
                      - created_on
                      - modified_on
                      - started_on
                      - ended_on
                      - workflow_id
                      - version_id
                      - status
                      type: object
                    type: array
                  result_info:
                    properties:
                      count:
                        type: number
                      cursor:
                        type: string
                      page:
                        deprecated: true
                        description: 'Deprecated: use cursor-based pagination instead.'
                        type: number
                      per_page:
                        type: number
                      total_count:
                        deprecated: true
                        description: 'Deprecated: total count is not reliable with cursor-based pagination.'
                        type: number
                      total_pages:
                        type: number
                    required:
                    - per_page
                    - count
                    - total_count
                    type: object
                  success:
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - result
                - messages
                type: object
          description: List of workflow instances.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Input Validation Error.
        '404':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      type: string
                    type: array
                  result:
                    enum:
                    - null
                    nullable: true
                    type: object
                  success:
                    enum:
                    - false
                    type: boolean
                required:
                - success
                - messages
                - errors
                - result
                type: object
          description: Workflow Name not found.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List of workflow instances
      tags:
      - Workflows
      x-api-token-group:
      - Workers Tail Read
      - Workers Scripts Write
      - Workers Scripts Read
      x-cfPermissionsRequired:
        enum:
        - com.cloudflare.api.workers.write
        - com.cloudflare.api.workers.read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: workflows
        resource_chain:
        - instances
        method: list
    post:
      description: Creates a new instance of a workflow, starting its execution.
      operationId: wor-create-new-workflow-instance
      parameters:
      - name: workflow_name
        in: path
        required: true
        description: The Workflow name.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                instance_id:
                  maximum: 100
                  minimum: 1
                  type: string
                instance_retention:
                  properties:
                    error_retention:
                      description: Specifies the duration in milliseconds or as a string like '5 minutes'.
                      type: integer
                    success_retention:
                      description: Specifies the duration in milliseconds or as a string like '5 minutes'.
                      type: integer
                  type: object
                params:
                  type: object
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
