      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          type: object
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesCertificateObjectPost
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesComponentsSchemasCertificateObject:
      properties:
        ca:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCa'
        certificates:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasCertificates'
        expires_on:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasExpiresOn'
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        issuer:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasIssuer'
        name:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasName'
        serial_number:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasSerialNumber'
        signature:
