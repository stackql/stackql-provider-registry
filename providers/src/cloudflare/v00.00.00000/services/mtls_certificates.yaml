openapi: 3.0.3
info:
  title: mtls_certificates API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/mtls_certificates:
    get:
      description: >-
        Lists all mTLS certificates uploaded to your account, such as Bring Your
        Own CA (BYO-CA) for mTLS. To list certificates issued by the Cloudflare
        managed CA, use the [List Client Certificates
        endpoint](/api/resources/client_certificates/methods/list/).
      operationId: m-tls-certificate-management-list-m-tls-certificates
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: >-
            Filters results by certificate type. Multiple types can be
            comma-separated.
          explode: false
          in: query
          name: type
          schema:
            items:
              enum:
                - custom
                - gateway_managed
                - access_managed
              type: string
            type: array
          style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesMtlsManagementComponentsSchemasCertificateResponseCollection
          description: List mTLS certificates response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: Total pages available of results
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasCertificateObject
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List mTLS certificates response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List mTLS certificates
      tags:
        - mTLS Certificate Management
      x-api-token-group:
        - 'Account: SSL and Certificates Read'
        - 'Account: SSL and Certificates Write'
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: mtls_certificates
        resource_chain: []
        method: list
    post:
      description: >-
        Upload a certificate that you want to use with mTLS-enabled Cloudflare
        services, such as Bring Your Own CA (BYO-CA) for mTLS. To create
        certificates issued by the Cloudflare managed CA, use the [Create Client
        Certificate
        endpoint](/api/resources/client_certificates/methods/create/).
      operationId: m-tls-certificate-management-upload-m-tls-certificate
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                ca:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesCa'
                certificates:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificates
                name:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasName'
                private_key:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasPrivateKey
              required:
                - certificates
                - ca
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCertificateResponseSinglePost
          description: Upload mTLS certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    type: object
                    properties:
                      ca:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCa'
                      certificates:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificates
                      expires_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasExpiresOn
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      issuer:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasIssuer
                      name:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasName
                      serial_number:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasSerialNumber
                      signature:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSignature
                      type:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasType
                      updated_at:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesMtlsManagementComponentsSchemasUpdatedAt
                        readOnly: true
                      uploaded_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesMtlsManagementComponentsSchemasUploadedOn
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Upload mTLS certificate response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Upload mTLS certificate
      tags:
        - mTLS Certificate Management
      x-api-token-group:
        - 'Account: SSL and Certificates Write'
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: mtls_certificates
        resource_chain: []
        method: create
  /accounts/{account_id}/mtls_certificates/{mtls_certificate_id}:
    delete:
      description: >-
        Deletes the mTLS certificate unless the certificate is in use by one or
        more Cloudflare services.
      operationId: m-tls-certificate-management-delete-m-tls-certificate
      parameters:
        - in: path
          name: mtls_certificate_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesMtlsManagementComponentsSchemasCertificateResponseSingle
          description: Delete mTLS certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    type: object
                    properties:
                      ca:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCa'
                      certificates:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificates
                      expires_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasExpiresOn
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      issuer:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasIssuer
                      name:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasName
                      serial_number:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasSerialNumber
                      signature:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSignature
                      type:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasType
                      uploaded_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesMtlsManagementComponentsSchemasUploadedOn
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Delete mTLS certificate response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete mTLS certificate
      tags:
        - mTLS Certificate Management
      x-api-token-group:
        - 'Account: SSL and Certificates Write'
      x-cfPermissionsRequired:
        enum:
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: mtls_certificates
        resource_chain: []
        method: delete
    get:
      description: >-
        Fetches a single mTLS certificate uploaded to your account. To get a
        certificate issued by the Cloudflare managed CA, use the [Client
        Certificate Details
        endpoint](/api/resources/client_certificates/methods/get/).
      operationId: m-tls-certificate-management-get-m-tls-certificate
      parameters:
        - in: path
          name: mtls_certificate_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesMtlsManagementComponentsSchemasCertificateResponseSingle
          description: Get mTLS certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    type: object
                    properties:
                      ca:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCa'
                      certificates:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificates
                      expires_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasExpiresOn
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      issuer:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasIssuer
                      name:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasName
                      serial_number:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasSerialNumber
                      signature:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSignature
                      type:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasType
                      uploaded_on:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesMtlsManagementComponentsSchemasUploadedOn
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Get mTLS certificate response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get mTLS certificate
      tags:
        - mTLS Certificate Management
      x-api-token-group:
        - 'Account: SSL and Certificates Read'
        - 'Account: SSL and Certificates Write'
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: mtls_certificates
        resource_chain: []
        method: get
  /accounts/{account_id}/mtls_certificates/{mtls_certificate_id}/associations:
    get:
      description: >-
        Lists all active associations between the certificate and Cloudflare
        services.
      operationId: m-tls-certificate-management-list-m-tls-certificate-associations
      parameters:
        - in: path
          name: mtls_certificate_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesAssociationResponseCollection
          description: List mTLS certificate associations response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesAssociationObject
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List mTLS certificate associations response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List mTLS certificate associations
      tags:
        - mTLS Certificate Management
      x-api-token-group:
        - 'Account: SSL and Certificates Read'
        - 'Account: SSL and Certificates Write'
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: mtls_certificates
        resource_chain:
          - associations
        method: get
components:
  schemas:
    tlsCertificatesAndHostnamesAssociationObject:
      properties:
        service:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesService'
        status:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesMtlsManagementComponentsSchemasStatus
      type: object
    tlsCertificatesAndHostnamesAssociationResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesAssociationObject'
          type: array
      required:
        - success
        - errors
        - messages
    tlsCertificatesAndHostnamesCa:
      description: Indicates whether the certificate is a CA or leaf certificate.
      example: true
      type: boolean
      x-auditable: true
    tlsCertificatesAndHostnamesCertificateObjectPost:
      properties:
        ca:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCa'
        certificates:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasCertificates'
        expires_on:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasExpiresOn'
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        issuer:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasIssuer'
        name:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasName'
        serial_number:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasSerialNumber'
        signature:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesSignature'
        type:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasType
        updated_at:
          $ref: >-
            #/components/schemas/tlsCertificatesAndHostnamesMtlsManagementComponentsSchemasUpdatedAt
          readOnly: true
        uploaded_on:
