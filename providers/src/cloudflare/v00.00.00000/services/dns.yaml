  /graphql/dns_analytics_adaptive_groups:
    post:
      operationId: graphql-dns_analytics_adaptive_groups-list
      summary: DNS query analytics for a zone, grouped by query name, type, response code, cache status, and serving colo
      description: DNS query analytics for a zone, grouped by query name, type, response code, cache status, and serving colo. Replaces the deprecated REST endpoints /zones/{zone_id}/dns_analytics/* (hard EOL 2026-12-01).
      x-stackQL-graphQL:
        url: https://api.cloudflare.com/client/v4/graphql
        httpVerb: POST
        responseSelection:
          jsonPath: $.result[*]
        cursor:
          strategy: keyset
          jsonPath: $.data.viewer.zones[0].dnsAnalyticsAdaptiveGroups[-1:].dimensions.datetime
          format: ', AND datetime_gt: "{{ .value }}"'
        query: "query {\n  viewer {\n    zones(filter: { zoneTag: \"{{ .zone_tag }}\" }, limit: 1) {\n      dnsAnalyticsAdaptiveGroups(\n        filter: { datetime_geq: \"{{ .since }}\", datetime_lt: \"{{ .until }}\"{{ .cursor }} }\n        limit: {{ if .limit }}{{ .limit }}{{ else }}100{{ end }}\n        orderBy: [datetimeMinute_ASC]\n      ) {\n        dimensions {\n          datetime: datetimeMinute\n          queryName\n          queryType\n          responseCode\n          responseCached\n          coloName\n          ipVersion\n          protocol\n        }\n        sum {\n          countNotCachedAndNotStale\n          countStale\n        }\n        count\n      }\n    }\n  }\n}\n"
      x-stackql-protocol: graphql
      parameters:
      - name: zone_tag
        in: path
        required: true
        schema:
          type: string
        description: Cloudflare zone ID (the 32-char hex tag).
      - name: since
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Lower bound (inclusive). RFC3339.
      - name: until
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Upper bound (exclusive). RFC3339.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
        description: Maximum dimension-tuple rows per call.
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        datetime:
                          type: string
                          format: date-time
                        query_name:
                          type: string
                          description: DNS query name (no trailing dot).
                        query_type:
                          type: string
                          description: DNS query type (A
                          AAAA: null
                          MX: null
                          etc.).: null
                        response_code:
                          type: string
                          description: DNS response code (NOERROR
                          NXDOMAIN: null
                          etc.).: null
                        response_cached:
                          type: string
                          description: Whether the response was served from cache.
                        colo_name:
                          type: string
                          description: IATA code of the Cloudflare colo.
                        ip_version:
                          type: string
                          description: IPv4 / IPv6.
                        protocol:
                          type: string
                          description: Transport protocol (UDP / TCP / DoH / DoT).
                        queries:
                          type: integer
                          description: Total DNS queries for this dimension tuple.
                        queries_not_cached_not_stale:
                          type: integer
                          description: Queries served fresh (not cache
                          not stale).: null
                        queries_stale:
                          type: integer
                          description: Queries served from stale cache.
components:
  schemas:
    dnsAnalyticsDimensions:
      description: A comma-separated list of dimensions to group results by.
      example: queryType
      type: string
    dnsAnalyticsFilters:
      description: Segmentation filter in 'attribute operator value' format.
      example: responseCode==NOERROR,queryType==A
      type: string
    dnsAnalyticsLimit:
      default: 100000
      description: Limit number of returned metrics.
      example: 100
      type: integer
    dnsAnalyticsMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
        - code
        - message
        type: object
        uniqueItems: true
      type: array
    dnsAnalyticsMetrics:
      description: A comma-separated list of metrics to query.
      example: queryCount,uncachedCount
      type: string
    dnsAnalyticsQuery:
      properties:
        dimensions:
          description: Array of dimension names.
          example:
          - responseCode
          - queryName
          items:
            description: Dimension name.
            example: responseCode
            type: string
          type: array
        filters:
          $ref: '#/components/schemas/dnsAnalyticsFilters'
        limit:
          $ref: '#/components/schemas/dnsAnalyticsLimit'
        metrics:
          description: Array of metric names.
          example:
          - queryCount
          - responseTimeAvg
          items:
            description: Metric name.
            example: queries
            type: string
          type: array
        since:
          $ref: '#/components/schemas/dnsAnalyticsSince'
        sort:
          description: Array of dimensions to sort by, where each dimension may be prefixed by - (descending) or + (ascending).
          example:
          - +responseCode
          - -queryName
          items:
            description: Dimension name (may be prefixed by - (descending) or + (ascending).
            example: +responseCode
            type: string
          type: array
        until:
          $ref: '#/components/schemas/dnsAnalyticsUntil'
      required:
      - dimensions
      - metrics
      - since
      - until
      - limit
      type: object
    dnsAnalyticsReport:
      type: object
      properties:
        data:
          description: Array with one row per combination of dimension values.
          items:
            $ref: '#/components/schemas/dnsAnalyticsReport_data_item'
          type: array
        data_lag:
          description: Number of seconds between current time and last processed event, in another words how many seconds of data could be missing.
          example: 60
          minimum: 0
          type: number
        max:
          description: Maximum results for each metric (object mapping metric names to values). Currently always an empty object.
          type: object
        min:
          description: Minimum results for each metric (object mapping metric names to values). Currently always an empty object.
          type: object
        query:
          $ref: '#/components/schemas/dnsAnalyticsQuery'
        rows:
          description: Total number of rows in the result.
          example: 100
          minimum: 0
          type: number
        totals:
          description: Total results for metrics across all data (object mapping metric names to values).
          type: object
      required:
      - rows
      - totals
      - min
      - max
      - data_lag
      - query
      - data
      - data
    dnsAnalyticsReportBytime:
      type: object
      properties:
        data:
          description: Array with one row per combination of dimension values.
          items:
            $ref: '#/components/schemas/dnsAnalyticsReportBytime_data_item'
          type: array
        data_lag:
          description: Number of seconds between current time and last processed event, in another words how many seconds of data could be missing.
          example: 60
          minimum: 0
          type: number
