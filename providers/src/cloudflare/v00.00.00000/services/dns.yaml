              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/dnsSettingsMessages'
                  messages:
                    $ref: '#/components/schemas/dnsSettingsMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/dnsSettingsDnsViewResponse'
                    type: array
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: List Internal DNS Views response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Internal DNS Views
      tags:
      - DNS Internal Views for an Account
      x-api-token-group:
      - DNS View Write
      - DNS View Read
      x-cfPermissionsRequired:
        enum:
        - '#dns.view:list'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: dns
        resource_chain:
        - settings
        - account
        - views
        method: list
    post:
      description: Create Internal DNS View for an account
      operationId: dns-views-for-an-account-create-internal-dns-views
      parameters:
      - name: account_id
        in: path
        required: true
