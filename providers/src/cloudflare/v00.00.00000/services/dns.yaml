              example:
              - +responseCode
              - -queryName
              items:
                description: Dimension name (may be prefixed by - (descending) or + (ascending).
                example: +responseCode
                type: string
              type: array
            until:
              $ref: '#/components/schemas/dnsAnalyticsUntil'
            time_delta:
