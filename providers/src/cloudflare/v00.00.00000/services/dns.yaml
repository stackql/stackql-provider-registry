                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    required:
                    - id
                    - name
                    - zones
                    - created_time
                    - modified_time
                    - id
                    type: object
                    properties:
                      created_time:
                        $ref: '#/components/schemas/dnsSettingsCreatedTime'
                      modified_time:
                        $ref: '#/components/schemas/dnsSettingsModifiedTime'
                      name:
                        $ref: '#/components/schemas/dnsSettingsName'
                      zones:
                        $ref: '#/components/schemas/dnsSettingsZones'
                      id:
                        $ref: '#/components/schemas/dnsSettingsIdentifier'
