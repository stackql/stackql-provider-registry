openapi: 3.0.3
info:
  title: dns API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/dns_settings:
    get:
      description: Show DNS settings for an account
      operationId: dns-settings-for-an-account-list-dns-settings
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dnsSettingsDnsResponseSingle'
          description: Show DNS Settings response
        4XX:
          content:
            application/json:
              schema:
                type: object
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
                properties:
                  errors:
                    $ref: '#/components/schemas/dnsSettingsMessages'
                  messages:
                    $ref: '#/components/schemas/dnsSettingsMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    properties:
                      enforce_dns_only:
                        $ref: '#/components/schemas/dnsSettingsEnforceDnsOnly'
                      zone_defaults:
                        $ref: '#/components/schemas/dnsSettingsDnsSettingsAccountResponse'
                    required:
                    - zone_defaults
                    type: object
                    enum:
                    - null
          description: Show DNS Settings response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Show DNS Settings
      tags:
      - DNS Settings for an Account
      x-api-token-group:
      - Account DNS Settings Write
      - Account DNS Settings Read
      x-cfPermissionsRequired:
        enum:
        - '#dns_records:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: dns
        resource_chain:
        - settings
        - account
        method: get
    patch:
      description: Update DNS settings for an account
      operationId: dns-settings-for-an-account-update-dns-settings
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dnsSettingsAccountSettingsPatch'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dnsSettingsDnsResponseSingle'
          description: Show DNS Settings response
        4XX:
          content:
            application/json:
              schema:
                type: object
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
                properties:
                  errors:
                    $ref: '#/components/schemas/dnsSettingsMessages'
                  messages:
                    $ref: '#/components/schemas/dnsSettingsMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    properties:
                      enforce_dns_only:
                        $ref: '#/components/schemas/dnsSettingsEnforceDnsOnly'
                      zone_defaults:
                        $ref: '#/components/schemas/dnsSettingsDnsSettingsAccountResponse'
                    required:
                    - zone_defaults
                    type: object
                    enum:
                    - null
          description: Show DNS Settings response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update DNS Settings
      tags:
      - DNS Settings for an Account
      x-api-token-group:
      - Account DNS Settings Write
      x-cfPermissionsRequired:
        enum:
        - '#dns_records:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: dns
        resource_chain:
        - settings
        - account
        method: edit
  /accounts/{account_id}/dns_settings/views:
    get:
      description: List DNS Internal Views for an Account
      operationId: dns-views-for-an-account-list-internal-dns-views
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: name
        schema:
          description: Exact value of the DNS view name. This is a convenience alias for `name.exact`.
          type: string
      - in: query
        name: name.exact
        schema:
          description: Exact value of the DNS view name.
          type: string
      - in: query
        name: name.contains
        schema:
          description: Substring of the DNS view name.
          type: string
      - in: query
        name: name.startswith
        schema:
          description: Prefix of the DNS view name.
          type: string
      - in: query
        name: name.endswith
        schema:
          description: Suffix of the DNS view name.
          type: string
      - in: query
        name: zone_id
        schema:
          description: A zone ID that exists in the zones list for the view.
          type: string
      - in: query
        name: zone_name
        schema:
          description: A zone name that exists in the zones list for the view.
          type: string
      - in: query
        name: match
        schema:
          $ref: '#/components/schemas/dnsSettingsMatch'
      - in: query
        name: page
        schema:
          $ref: '#/components/schemas/dnsSettingsPage'
      - in: query
