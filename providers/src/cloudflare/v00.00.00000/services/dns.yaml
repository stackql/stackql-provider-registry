                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Create Internal DNS View response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create Internal DNS View
      tags:
      - DNS Internal Views for an Account
      x-api-token-group:
      - DNS View Write
      x-cfPermissionsRequired:
        enum:
        - '#dns.view:create'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: dns
        resource_chain:
        - settings
        - account
        - views
        method: create
