openapi: 3.0.3
info:
  title: token_validation API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones/{zone_id}/token_validation/config:
    get:
      description: Lists all token validation configurations for this zone
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-config-list
      parameters:
      - description: Page number of paginated results.
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: Maximum number of results per page.
        in: query
        name: per_page
        schema:
          default: 20
          maximum: 50
          minimum: 5
          type: integer
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/apiShieldTokenConfiguration'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List token validation configurations
      tags:
      - Token Validation Token Configuration
      x-api-token-group:
      - Account API Gateway
      - Account API Gateway Read
      - Domain API Gateway
      - Domain API Gateway Read
      x-stackql-sdk:
        service: token_validation
        resource_chain:
        - configuration
        method: list
    post:
      description: Create a new Token Validation configuration
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-config-create
      requestBody:
        content:
          application/json:
            schema:
              properties:
                credentials:
                  $ref: '#/components/schemas/apiShieldCredentials'
                description:
                  $ref: '#/components/schemas/apiShieldDescription'
                title:
                  $ref: '#/components/schemas/apiShieldTitle'
                token_sources:
                  $ref: '#/components/schemas/apiShieldTokenSources'
                token_type:
                  $ref: '#/components/schemas/apiShieldTokenType'
              required:
              - title
              - description
              - token_sources
              - token_type
              - credentials
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/apiShieldTokenConfiguration'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a new Token Validation configuration
      tags:
      - Token Validation Token Configuration
      x-api-token-group:
      - Account API Gateway
      - Domain API Gateway
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      x-stackql-sdk:
        service: token_validation
        resource_chain:
        - configuration
        method: create
  /zones/{zone_id}/token_validation/config/{config_id}:
    delete:
      description: Delete Token Configuration
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-config-delete
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    properties:
                      id:
                        $ref: '#/components/schemas/apiShieldSchemasUuid'
                    type: object
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
