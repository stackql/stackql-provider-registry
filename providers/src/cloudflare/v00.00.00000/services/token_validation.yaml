      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete Token Configuration
      tags:
      - Token Validation Token Configuration
      x-api-token-group:
      - Account API Gateway
      - Domain API Gateway
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - description: Token Configuration ID
        in: path
        name: config_id
        schema:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
        required: true
      x-stackql-sdk:
        service: token_validation
        resource_chain:
        - configuration
        method: delete
    get:
      description: Get a single Token Configuration
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-config-get
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/apiShieldTokenConfiguration'
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get a single Token Configuration
      tags:
      - Token Validation Token Configuration
      x-api-token-group:
      - Account API Gateway
      - Account API Gateway Read
      - Domain API Gateway
      - Domain API Gateway Read
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - description: Token Configuration ID
        in: path
        name: config_id
        schema:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
        required: true
      x-stackql-sdk:
        service: token_validation
        resource_chain:
        - configuration
        method: get
    patch:
      description: Edit fields of an existing Token Configuration
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-config-edit
      requestBody:
        content:
          application/json:
            schema:
              properties:
                description:
                  $ref: '#/components/schemas/apiShieldDescription'
                title:
                  $ref: '#/components/schemas/apiShieldTitle'
                token_sources:
                  $ref: '#/components/schemas/apiShieldTokenSources'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    properties:
                      description:
                        $ref: '#/components/schemas/apiShieldDescription'
                      id:
                        $ref: '#/components/schemas/apiShieldSchemasUuid'
                      title:
                        $ref: '#/components/schemas/apiShieldTitle'
                      token_sources:
                        $ref: '#/components/schemas/apiShieldTokenSources'
                    type: object
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Edit an existing Token Configuration
      tags:
      - Token Validation Token Configuration
      x-api-token-group:
      - Account API Gateway
      - Domain API Gateway
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - description: Token Configuration ID
        in: path
        name: config_id
        schema:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
        required: true
      x-stackql-sdk:
        service: token_validation
        resource_chain:
        - configuration
        method: edit
  /zones/{zone_id}/token_validation/config/{config_id}/credentials:
    put:
      description: Update Token Configuration credentials
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-config-credentials-update
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/apiShieldCredentials'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  keys:
                    items:
                      $ref: '#/components/schemas/apiShieldCredentialsJWTKey'
                    maxItems: 4
                    minItems: 1
                    type: array
                required:
                - success
                - errors
                - messages
                - keys
                type: object
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update Token Configuration credentials
      tags:
      - Token Validation Token Configuration
      x-api-token-group:
      - Account API Gateway
      - Domain API Gateway
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - description: Token Configuration ID
        in: path
        name: config_id
        schema:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
        required: true
      x-stackql-sdk:
        service: token_validation
        resource_chain:
        - configuration
        - credentials
        method: update
  /zones/{zone_id}/token_validation/rules:
    get:
      description: List token validation rules
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-rules-list
      parameters:
      - description: Maximum number of results per page.
        in: query
        name: per_page
        schema:
          default: 20
          maximum: 50
          minimum: 5
          type: integer
      - description: Page number of paginated results.
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: Select rules using any of these token configurations.
        in: query
        name: token_configuration
        schema:
          items:
            $ref: '#/components/schemas/apiShieldSchemasUuid'
          type: array
        explode: true
      - in: query
        name: action
        schema:
          $ref: '#/components/schemas/apiShieldAction'
      - in: query
        name: enabled
        schema:
          $ref: '#/components/schemas/apiShieldEnabled'
      - description: Select rules with these IDs.
        in: query
        name: id
        schema:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
      - description: Select rules with these IDs.
        in: query
        name: rule_id
        schema:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
      - description: Select rules with this host in `include`.
        in: query
        name: host
        schema:
          $ref: '#/components/schemas/apiShieldHost'
      - description: Select rules with this host in `include`.
        in: query
        name: hostname
        schema:
          $ref: '#/components/schemas/apiShieldHost'
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/apiShieldRule'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List token validation rules
      tags:
      - Token Validation Token Rules
      x-api-token-group:
      - Account API Gateway
      - Account API Gateway Read
      - Domain API Gateway
      - Domain API Gateway Read
      x-stackql-sdk:
        service: token_validation
        resource_chain:
        - rules
        method: list
    post:
      description: Create a token validation rule.
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-rules-create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/apiShieldCreateSingleRuleRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/apiShieldRule'
                required:
                - success
                - errors
                - messages
                - result
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a token validation rule
      tags:
      - Token Validation Token Rules
      x-api-token-group:
      - Account API Gateway
      - Domain API Gateway
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      x-stackql-sdk:
        service: token_validation
        resource_chain:
        - rules
        method: create
  /zones/{zone_id}/token_validation/rules/bulk:
    patch:
      description: Edit token validation rules. A request can update multiple Token Validation Rules. Rules can be re-ordered using the `position` field. Returns all updated rules.
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-rules-bulk-edit
      requestBody:
        content:
          application/json:
            schema:
              items:
                properties:
                  id:
                    description: Rule ID this patch applies to
                    format: uuid
                    maxLength: 36
                    type: string
                    x-auditable: true
                  action:
                    $ref: '#/components/schemas/apiShieldAction'
                  description:
                    $ref: '#/components/schemas/apiShieldSchemasDescription'
                  enabled:
                    $ref: '#/components/schemas/apiShieldEnabled'
                  expression:
                    $ref: '#/components/schemas/apiShieldExpression'
                  selector:
                    $ref: '#/components/schemas/apiShieldSelector'
                  title:
                    $ref: '#/components/schemas/apiShieldSchemasTitle'
                  position:
                    $ref: '#/components/schemas/apiShieldPosition'
                required:
                - id
                type: object
              type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/apiShieldRule'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Bulk edit token validation rules
      tags:
      - Token Validation Token Rules
      x-api-token-group:
      - Account API Gateway
      - Domain API Gateway
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
    post:
      description: Create zone token validation rules. A request can create multiple Token Validation Rules.
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-rules-bulk-create
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/apiShieldCreateSingleRuleRequest'
              type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/apiShieldRule'
                    type: array
                required:
                - success
                - errors
                - messages
                - result
          description: OK
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Bulk create token validation rules
      tags:
      - Token Validation Token Rules
      x-api-token-group:
      - Account API Gateway
      - Domain API Gateway
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
  /zones/{zone_id}/token_validation/rules/preview:
    post:
      description: Preview operations covered by a Token Validation rule. The API will return all operations on a zone annotated with an additional `state` field. Operations with an `included` `state` will be covered by a Token Validation Rule.
      externalDocs:
        description: Learn more about JSON Web Tokens Validation.
        url: https://developers.cloudflare.com/api-shield/security/jwt-validation/
      operationId: token-validation-rules-preview
      parameters:
      - description: Maximum number of results per page.
        in: query
        name: per_page
        schema:
          default: 20
          maximum: 50
          minimum: 5
          type: integer
      - description: Page number of paginated results.
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - in: query
        name: state
        schema:
          items:
            $ref: '#/components/schemas/apiShieldSelectorOperationState'
          type: array
        explode: true
      - description: Filter operations by host.
        in: query
        name: host
        schema:
          items:
            $ref: '#/components/schemas/apiShieldHost'
          type: array
        explode: true
      - description: Filter operations by host.
        in: query
        name: hostname
        schema:
          items:
            $ref: '#/components/schemas/apiShieldHost'
          type: array
        explode: true
      - description: Filter operations by method.
        in: query
        name: method
        schema:
          items:
            $ref: '#/components/schemas/apiShieldMethod'
          type: array
        explode: true
      - description: Filter operations by endpoint. Allows substring matching.
        in: query
        name: endpoint
        schema:
          items:
            $ref: '#/components/schemas/apiShieldEndpoint'
          type: array
        explode: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/apiShieldSelector'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
