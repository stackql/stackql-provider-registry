components:
  schemas:
    apiShieldAction:
      description: Action to take on requests that match operations included in `selector` and fail `expression`.
      enum:
      - log
      - block
      example: log
      type: string
      x-auditable: true
    apiShieldApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          example: []
          $ref: '#/components/schemas/apiShieldMessages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    apiShieldApiResponseSingleObj:
      properties:
        errors:
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          $ref: '#/components/schemas/apiShieldMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          type: object
      required:
      - success
      - errors
      - messages
      type: object
    apiShieldCreateSingleRuleRequest:
      description: A Token Validation rule that can enforce security policies using JWT Tokens.
      type: object
      $ref: '#/components/schemas/apiShieldRuleProperties'
    apiShieldCredentials:
      properties:
        keys:
          items:
            $ref: '#/components/schemas/apiShieldCredentialsJWTKey'
          maxItems: 4
          minItems: 1
          type: array
      required:
      - keys
      type: object
    apiShieldCredentialsJWTKey:
      description: JSON representation of a JWKS key.
      example:
        alg: ES256
        crv: P-256
        kid: 38013f13-c266-4eec-a72a-92ec92779f21
        kty: EC
        x: KN53JRwN3wCjm2o39bvZUX2VdrsHzS8pxOAGjm8m7EQ
        'y': lnkkzIxaveggz-HFhcMWW15nxvOj0Z_uQsXbpK0GFcY
      type: object
      properties:
        kid:
          description: Key ID
          type: string
          x-auditable: true
        alg:
          description: Algorithm
          enum:
          - RS256
          - RS384
          - RS512
          - PS256
          - PS384
          - PS512
          type: string
          x-auditable: true
        e:
          description: RSA exponent
          type: string
          x-auditable: false
        kty:
          description: Key Type
          enum:
          - RSA
          type: string
          x-auditable: true
        'n':
          description: RSA modulus
          type: string
          x-auditable: false
        x:
          description: X EC coordinate
          type: string
          x-auditable: false
        'y':
          description: Y EC coordinate
          type: string
          x-auditable: false
        crv:
          description: Curve
          enum:
          - P-256
          type: string
          x-auditable: true
      required:
      - alg
      - kid
      - kty
    apiShieldDescription:
      example: Long description for Token Validation Configuration
      maxLength: 500
      type: string
      x-auditable: true
    apiShieldEditSingleRuleRequest:
      properties:
        action:
          $ref: '#/components/schemas/apiShieldAction'
        description:
          $ref: '#/components/schemas/apiShieldSchemasDescription'
        enabled:
          $ref: '#/components/schemas/apiShieldEnabled'
        expression:
          $ref: '#/components/schemas/apiShieldExpression'
        selector:
          $ref: '#/components/schemas/apiShieldSelector'
        title:
          $ref: '#/components/schemas/apiShieldSchemasTitle'
        position:
          $ref: '#/components/schemas/apiShieldPosition'
      type: object
    apiShieldEnabled:
      description: Toggle rule on or off.
      example: true
      type: boolean
      x-auditable: true
    apiShieldEndpoint:
      description: 'The endpoint which can contain path parameter templates in curly braces, each will be replaced from left to right with {varN}, starting with {var1}, during insertion. This will further be Cloudflare-normalized upon insertion. See: https://developers.cloudflare.com/rules/normalization/how-it-works/.'
      example: /api/v1/users/{var1}
      format: uri-template
      maxLength: 4096
      type: string
      x-auditable: true
    apiShieldExpression:
      description: Rule expression. Requests that fail to match this expression will be subject to `action`. For details on expressions, see the [Cloudflare Docs](https://developers.cloudflare.com/api-shield/security/jwt-validation/).
      example: is_jwt_valid("52973293-cb04-4a97-8f55-e7d2ad1107dd") or is_jwt_valid("46eab8d1-6376-45e3-968f-2c649d77d423")
      type: string
      x-auditable: true
    apiShieldHost:
