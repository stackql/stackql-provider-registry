openapi: 3.0.3
info:
  title: security_txt API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones/{zone_id}/security-center/securitytxt:
    delete:
      description: Removes the security.txt file configuration for a zone. The /.well-known/security.txt endpoint will no longer be served.
      operationId: delete-security-txt
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseSingle'
          description: The request was successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseCommonFailure'
          description: A client error occurred.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Deletes security.txt
      tags:
      - security.txt
      x-api-token-group:
      - Zone Settings Write
      x-stackql-sdk:
        service: security_txt
        resource_chain: []
        method: delete
    get:
      description: Retrieves the current security.txt file configuration for a zone, used for security vulnerability reporting.
      operationId: get-security-txt
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/securityCenterMessages'
                  messages:
                    $ref: '#/components/schemas/securityCenterMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/securityCenterSecurityTxt'
                required:
                - success
                - errors
                - messages
                type: object
          description: The request was successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseCommonFailure'
          description: A client error occurred.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Retrieves security.txt
      tags:
      - security.txt
      x-api-token-group:
      - Zone Settings Write
      - Zone Settings Read
      x-stackql-sdk:
        service: security_txt
        resource_chain: []
        method: get
    put:
      description: Updates the security.txt file configuration for a zone, which provides security researchers with vulnerability reporting information.
      operationId: update-security-txt
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/securityCenterSecurityTxt'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseSingle'
          description: The request was successful.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/securityCenterApiResponseCommonFailure'
          description: A client error occurred.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Updates security.txt
      tags:
      - security.txt
      x-api-token-group:
      - Zone Settings Write
      x-stackql-sdk:
        service: security_txt
        resource_chain: []
        method: update
components:
  schemas:
    securityCenterApiResponseCommon:
      properties:
        errors:
          $ref: '#/components/schemas/securityCenterMessages'
        messages:
          $ref: '#/components/schemas/securityCenterMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
      required:
      - success
      - errors
      - messages
      type: object
    securityCenterApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/securityCenterMessages'
        messages:
          example: []
          $ref: '#/components/schemas/securityCenterMessages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    securityCenterApiResponseSingle:
      type: object
      $ref: '#/components/schemas/securityCenterApiResponseCommon'
    securityCenterMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
        - code
        - message
        type: object
        uniqueItems: true
      type: array
    securityCenterSecurityTxt:
      properties:
        acknowledgments:
          example:
          - https://example.com/hall-of-fame.html
          items:
            format: uri
            type: string
            x-auditable: true
          type: array
        canonical:
          example:
          - https://www.example.com/.well-known/security.txt
          items:
            format: uri
            type: string
            x-auditable: true
          type: array
        contact:
          example:
          - mailto:security@example.com
          - tel:+1-201-555-0123
          - https://example.com/security-contact.html
          items:
            format: uri
            type: string
            x-auditable: true
          type: array
        enabled:
          example: true
          type: boolean
          x-auditable: true
        encryption:
          example:
          - https://example.com/pgp-key.txt
          - dns:5d2d37ab76d47d36._openpgpkey.example.com?type=OPENPGPKEY
          - openpgp4fpr:5f2de5521c63a801ab59ccb603d49de44b29100f
          items:
            format: uri
            type: string
          type: array
        expires:
          format: date-time
          type: string
          x-auditable: true
        hiring:
          example:
          - https://example.com/jobs.html
          items:
            format: uri
            type: string
            x-auditable: true
          type: array
        policy:
          example:
          - https://example.com/disclosure-policy.html
          items:
            format: uri
            type: string
            x-auditable: true
          type: array
        preferred_languages:
          example: en, es, fr
          type: string
          x-auditable: true
      type: object
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: The preferred authorization scheme for interacting with the Cloudflare API. [Create a token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: Used when interacting with the Origin CA certificates API. [View/change your key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    securitytxt:
      id: cloudflare.security_txt.securitytxt
      name: securitytxt
      title: Securitytxt
      methods:
        delete:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1security-center~1securitytxt/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1security-center~1securitytxt/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1security-center~1securitytxt/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .acknowledgments }}{{ $sep }}"acknowledgments": {{ if eq (kindOf .acknowledgments) "string" }}{{ .acknowledgments }}{{ else }}{{ toJson .acknowledgments }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .canonical }}{{ $sep }}"canonical": {{ if eq (kindOf .canonical) "string" }}{{ .canonical }}{{ else }}{{ toJson .canonical }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .contact }}{{ $sep }}"contact": {{ if eq (kindOf .contact) "string" }}{{ .contact }}{{ else }}{{ toJson .contact }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .enabled }}{{ $sep }}"enabled": {{ toJson .enabled }}{{- $sep = "," -}}{{ end }}

                {{- if .encryption }}{{ $sep }}"encryption": {{ if eq (kindOf .encryption) "string" }}{{ .encryption }}{{ else }}{{ toJson .encryption }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .expires }}{{ $sep }}"expires": {{ toJson .expires }}{{- $sep = "," -}}{{ end }}

                {{- if .hiring }}{{ $sep }}"hiring": {{ if eq (kindOf .hiring) "string" }}{{ .hiring }}{{ else }}{{ toJson .hiring }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .policy }}{{ $sep }}"policy": {{ if eq (kindOf .policy) "string" }}{{ .policy }}{{ else }}{{ toJson .policy }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .preferred_languages }}{{ $sep }}"preferred_languages": {{ toJson .preferred_languages }}{{- $sep = "," -}}{{ end }}

                }

                '
      sqlVerbs:
        select:
        - $ref: '#/components/x-stackQL-resources/securitytxt/methods/list'
        insert: []
        update: []
        delete:
        - $ref: '#/components/x-stackQL-resources/securitytxt/methods/delete'
        replace:
        - $ref: '#/components/x-stackQL-resources/securitytxt/methods/update'
