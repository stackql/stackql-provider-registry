openapi: 3.0.3
info:
  title: abuse_reports API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/abuse-reports:
    get:
      description: List the abuse reports for a given account
      operationId: ListAbuseReports
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Where in pagination to start listing abuse reports
          in: query
          name: page
          schema:
            type: integer
        - description: How many abuse reports per page to list
          in: query
          name: per_page
          schema:
            type: integer
        - description: >-
            A property to sort by, followed by the order (id, cdate, domain,
            type, status)
          in: query
          name: sort
          schema:
            type: string
        - description: Filter by domain name related to the abuse report
          in: query
          name: domain
          schema:
            type: string
        - description: Returns reports created before the specified date
          in: query
          name: created_before
          schema:
            description: >-
              Time in RFC 3339 format
              (https://www.rfc-editor.org/rfc/rfc3339.html)
            type: string
        - description: Returns reports created after the specified date
          in: query
          name: created_after
          schema:
            description: >-
              Time in RFC 3339 format
              (https://www.rfc-editor.org/rfc/rfc3339.html)
            type: string
        - description: Filter by the status of the report.
          in: query
          name: status
          schema:
            $ref: '#/components/schemas/abuseReportsReportStatus'
        - description: Filter by the type of the report.
          in: query
          name: type
          schema:
            $ref: '#/components/schemas/abuseReportsReportType'
        - description: Filter reports that have any mitigations in the given status.
          in: query
          name: mitigation_status
          schema:
            $ref: '#/components/schemas/abuseReportsMitigationStatus'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  result:
                    properties:
                      reports:
                        items:
                          $ref: '#/components/schemas/abuseReportsAbuseReport'
                        type: array
                    required:
                      - reports
                    type: object
                  result_info:
                    properties:
                      count:
                        type: number
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                      total_pages:
                        type: number
                    required:
                      - page
                      - per_page
                      - count
                      - total_count
                      - total_pages
                    type: object
                  success:
                    type: boolean
                required:
                  - success
                type: object
          description: Abuse report list successful
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                type: object
          description: Failed to retrieve abuse reports
      security:
        - api_token: []
      summary: List abuse reports
      tags:
        - tseng-abuse-complaint-processor_other
      x-api-token-group:
        - Trust and Safety Write
        - Trust and Safety Read
      x-stackql-sdk:
        service: abuse_reports
        resource_chain: []
        method: list
  /accounts/{account_id}/abuse-reports/{report_id}/emails:
    get:
      description: >-
        List emails sent to the customer for an abuse report. Returns all
        successful customer emails sent for the specified abuse report. Does not
        include emails sent to hosts or submitters.
      operationId: ListEmails
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Abuse Report ID
          in: path
          name: report_id
          schema:
            type: string
          required: true
        - description: Page number to retrieve (default 1)
          in: query
          name: page
          schema:
            type: integer
        - description: Number of emails per page (default 20, max 100)
          in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  result:
                    properties:
                      emails:
                        items:
                          $ref: '#/components/schemas/abuseReportsEmailListItem'
                        type: array
                    required:
                      - emails
                    type: object
                  result_info:
                    properties:
                      count:
                        type: number
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                      total_pages:
                        type: number
                    required:
                      - page
                      - per_page
                      - count
                      - total_count
                      - total_pages
                    type: object
                  success:
                    type: boolean
                required:
                  - success
                type: object
          description: List abuse report emails successful
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                type: object
          description: Bad request - invalid parameters or report not found
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                type: object
          description: Failed to list abuse report emails
      security:
        - api_token: []
      summary: List abuse report emails
      tags:
        - tseng-abuse-complaint-processor_other
      x-api-token-group:
        - Trust and Safety Write
        - Trust and Safety Read
  /accounts/{account_id}/abuse-reports/{report_id}/mitigations:
    get:
      description: List mitigations done to remediate the abuse report.
      operationId: ListMitigations
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Abuse Report ID
          in: path
          name: report_id
          schema:
            type: string
          required: true
        - description: Where in pagination to start listing abuse reports
          in: query
          name: page
          schema:
            type: integer
        - description: How many abuse reports per page to list
          in: query
          name: per_page
          schema:
            type: integer
        - description: A property to sort by, followed by the order
          in: query
          name: sort
          schema:
            enum:
              - type,asc
              - type,desc
              - effective_date,asc
              - effective_date,desc
              - status,asc
              - status,desc
              - entity_type,asc
              - entity_type,desc
            type: string
        - description: >-
            Filter by the type of mitigation. This filter parameter can be
            specified multiple times to include multiple types of mitigations in
            the result set, e.g. ?type=rate_limit_cache&type=legal_block.
          in: query
          name: type
          schema:
            $ref: '#/components/schemas/abuseReportsMitigationType'
        - description: Returns mitigations that were dispatched before the given date
          in: query
          name: effective_before
          schema:
            description: >-
              Time in RFC 3339 format
              (https://www.rfc-editor.org/rfc/rfc3339.html)
            type: string
        - description: Returns mitigation that were dispatched after the given date
          in: query
          name: effective_after
          schema:
            description: >-
              Time in RFC 3339 format
              (https://www.rfc-editor.org/rfc/rfc3339.html)
            type: string
        - description: Filter by the status of the mitigation.
          in: query
          name: status
          schema:
            $ref: '#/components/schemas/abuseReportsMitigationStatus'
        - description: Filter by the type of entity the mitigation impacts.
          in: query
          name: entity_type
          schema:
            $ref: '#/components/schemas/abuseReportsMitigatedEntityType'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  result:
                    properties:
                      mitigations:
                        items:
                          $ref: '#/components/schemas/abuseReportsMitigationListItem'
                        type: array
                    required:
                      - mitigations
                    type: object
                  result_info:
                    properties:
                      count:
                        type: number
                      page:
                        type: number
                      per_page:
                        type: number
                      total_count:
                        type: number
                      total_pages:
                        type: number
                    required:
                      - page
                      - per_page
                      - count
                      - total_count
                      - total_pages
                    type: object
                  success:
                    type: boolean
                required:
                  - success
                type: object
          description: List abuse report mitigations successful
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                type: object
          description: Failed to list abuse report mitigations
      security:
        - api_token: []
      summary: List abuse report mitigations
      tags:
        - tseng-abuse-complaint-processor_other
      x-api-token-group:
        - Trust and Safety Write
        - Trust and Safety Read
      x-stackql-sdk:
        service: abuse_reports
        resource_chain:
          - mitigations
        method: list
  /accounts/{account_id}/abuse-reports/{report_id}/mitigations/appeal:
    post:
      description: Request a review for mitigations on an account.
      operationId: RequestReview
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Abuse Report ID
          in: path
          name: report_id
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/abuseReportsMitigationAppealRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/abuseReportsMitigationAppealResult'
          description: Mitigation appeals received
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  success:
                    type: boolean
                required:
                  - success
                type: object
          description: Failed to request review on delayed action.
      security:
        - api_token: []
      summary: Request review on mitigations
      tags:
        - tseng-abuse-complaint-processor_other
      x-api-token-group:
        - Trust and Safety Write
  /accounts/{account_id}/abuse-reports/{report_param}:
    get:
      description: Retrieve the details of an abuse report.
      operationId: GetAbuseReport
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: Identifier of the abuse report
          in: path
          name: report_param
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsErrorMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  result:
                    $ref: '#/components/schemas/abuseReportsAbuseReport'
                  success:
                    type: boolean
                required:
                  - success
                  - result
                type: object
          description: Report submitted successfully
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsErrorMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  result:
                    $ref: '#/components/schemas/abuseReportsAbuseReport'
                  success:
                    type: boolean
                required:
                  - success
                  - errors
                type: object
          description: Report submitted with an error
        '500':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      $ref: '#/components/schemas/abuseReportsErrorMessage'
                    type: array
                  messages:
                    items:
                      $ref: '#/components/schemas/abuseReportsMessage'
                    type: array
                  result:
                    $ref: '#/components/schemas/abuseReportsAbuseReport'
                  success:
                    type: boolean
                required:
                  - success
                  - errors
                type: object
          description: Report submitted with an error
      security:
        - api_token: []
      summary: Abuse Report Details
      tags:
        - tseng-abuse-complaint-processor_other
      x-api-token-group:
        - Trust and Safety Write
        - Trust and Safety Read
      x-stackql-sdk:
        service: abuse_reports
        resource_chain: []
        method: get
    post:
      description: Submit the Abuse Report of a particular type
      operationId: SubmitAbuseReport
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
        - description: 'The report type to be submitted. Example: abuse_general'
          in: path
          name: report_param
          schema:
            $ref: '#/components/schemas/abuseReportsSubmissionReportType'
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/abuseReportsSubmitReportRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/abuseReportsSubmitReportResponse'
          description: Report submitted successfully
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/abuseReportsSubmitErrorResponse'
          description: Report submitted with an error
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/abuseReportsSubmitErrorResponse'
          description: Report submitted with an error
      security:
        - api_token: []
      summary: Submit an abuse report
      tags:
        - tseng-abuse-complaint-processor_other
      x-stackql-sdk:
        service: abuse_reports
        resource_chain: []
        method: create
components:
  schemas:
    abuseReportsAbuseReport:
      properties:
        cdate:
          description: >-
            Creation date of report. Time in RFC 3339 format
            (https://www.rfc-editor.org/rfc/rfc3339.html)
          example: '2009-11-10T23:00:00Z'
          type: string
        domain:
          description: Domain that relates to the report.
          type: string
        id:
          description: Public facing ID of abuse report, aka abuse_rand.
          type: string
        justification:
          description: Justification for the report.
          type: string
        mitigation_summary:
          $ref: '#/components/schemas/abuseReportsMitigationSummary'
        original_work:
          description: Original work / Targeted brand in the alleged abuse.
          type: string
        status:
          $ref: '#/components/schemas/abuseReportsReportStatus'
        submitter:
          $ref: '#/components/schemas/abuseReportsSubmitterDetails'
        type:
          $ref: '#/components/schemas/abuseReportsReportType'
        urls:
          items:
            type: string
          type: array
      required:
        - id
        - cdate
        - domain
        - type
        - status
        - mitigation_summary
      type: object
    abuseReportsAppealReason:
      description: Reason why the customer is appealing.
      enum:
        - removed
        - misclassified
      example: misclassified
      type: string
    abuseReportsEmailListItem:
      description: An email sent to the customer for an abuse report.
      properties:
        body:
          description: Body content of the email.
          type: string
        id:
          description: Unique identifier of the email.
          type: string
        recipient:
          description: Email address of the recipient.
          type: string
        sent_at:
          description: >-
            When the email was sent. Time in RFC 3339 format
            (https://www.rfc-editor.org/rfc/rfc3339.html)
          example: '2009-11-10T23:00:00Z'
          type: string
        subject:
          description: Subject line of the email.
          type: string
      required:
        - id
        - subject
        - body
        - recipient
        - sent_at
      type: object
    abuseReportsErrorCode:
      type: string
      description: Report has invalid type
    abuseReportsErrorMessage:
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - message
      type: object
    abuseReportsMessage:
      properties:
        message:
          type: string
      required:
        - message
      type: object
    abuseReportsMitigatedEntityType:
      enum:
        - url_pattern
        - account
        - zone
      type: string
    abuseReportsMitigationAppeal:
      properties:
        id:
          description: ID of the mitigation to appeal.
          type: string
        reason:
          $ref: '#/components/schemas/abuseReportsAppealReason'
      required:
        - id
        - reason
      type: object
    abuseReportsMitigationAppealRequest:
      properties:
        appeals:
          description: List of mitigations to appeal.
          items:
            $ref: '#/components/schemas/abuseReportsMitigationAppeal'
          type: array
      required:
        - appeals
      type: object
    abuseReportsMitigationAppealResult:
      properties:
        errors:
          items:
            $ref: '#/components/schemas/abuseReportsMessage'
          type: array
        messages:
          items:
            $ref: '#/components/schemas/abuseReportsMessage'
          type: array
        result:
          items:
            $ref: '#/components/schemas/abuseReportsMitigationListItem'
          type: array
        result_info:
          properties:
            count:
              type: number
            page:
              type: number
            per_page:
              type: number
            total_count:
              type: number
            total_pages:
              type: number
          required:
            - page
            - per_page
            - count
            - total_count
            - total_pages
          type: object
        success:
          type: boolean
      required:
        - success
        - result_info
      type: object
    abuseReportsMitigationListItem:
      properties:
        effective_date:
          description: >-
            Date when the mitigation will become active. Time in RFC 3339 format
            (https://www.rfc-editor.org/rfc/rfc3339.html)
          example: '2009-11-10T23:00:00Z'
          type: string
        entity_id:
          type: string
        entity_type:
          $ref: '#/components/schemas/abuseReportsMitigatedEntityType'
        id:
          description: ID of remediation.
          type: string
        status:
          $ref: '#/components/schemas/abuseReportsMitigationStatus'
        type:
          $ref: '#/components/schemas/abuseReportsMitigationType'
      required:
        - id
        - type
        - effective_date
        - status
        - entity_type
        - entity_id
      type: object
    abuseReportsMitigationStatus:
      description: The status of a mitigation
      enum:
        - pending
        - active
        - in_review
        - cancelled
        - removed
      type: string
    abuseReportsMitigationSummary:
      description: A summary of the mitigations related to this report.
      properties:
        accepted_url_count:
          description: How many of the reported URLs were confirmed as abusive.
          type: integer
        active_count:
          description: How many mitigations are active.
          type: integer
        external_host_notified:
          description: >-
            Whether the report has been forwarded to an external hosting
            provider.
          type: boolean
        in_review_count:
          description: How many mitigations are under review.
          type: integer
        pending_count:
          description: How many mitigations are pending their effective date.
          type: integer
      required:
        - accepted_url_count
        - pending_count
        - active_count
        - in_review_count
        - external_host_notified
      type: object
    abuseReportsMitigationType:
      description: The type of mitigation
      enum:
        - legal_block
        - misleading_interstitial
        - phishing_interstitial
        - network_block
        - rate_limit_cache
        - account_suspend
        - redirect_video_stream
      type: string
    abuseReportsRegistrarWhoIsFields:
      description: RDP-mandated fields for registrar WHOIS data disclosure requests.
      properties:
        reg_who_authorization_statement:
          description: >-
            Optional authorization statement or power of attorney per RDP
            10.2.1.3.
          maxLength: 5000
          type: string
        reg_who_good_faith_affirmation:
          description: >-
            Affirmation that the request is made in good faith per RDP 10.2.4.
            Must be true.
          type: boolean
        reg_who_lawful_processing_agreement:
          description: Agreement to process data lawfully per RDP 10.2.5. Must be true.
          type: boolean
        reg_who_legal_basis:
          description: >-
            Legal rights and rationale for the request per RDP 10.2.3. Required
            for all WHOIS requests.
          maxLength: 5000
          type: string
        reg_who_request_type:
          description: The type of WHOIS data request per RDP procedure.
          enum:
            - disclosure
            - invalid_whois
          type: string
        reg_who_requested_data_elements:
          description: >-
            The specific WHOIS data elements being requested per RDP 10.2.2.
            Required for all WHOIS requests.
          items:
            enum:
              - registrant_name
              - registrant_organization
              - registrant_email
              - registrant_phone
              - registrant_address
              - registrant_address_country
              - registrant_address_postal_code
              - admin_name
              - admin_organization
              - admin_email
              - admin_phone
              - admin_address
              - tech_name
              - tech_organization
              - tech_email
              - tech_phone
              - tech_address
            type: string
          maxItems: 17
          minItems: 1
          type: array
        reg_who_requestor_type:
          description: The nature of the requestor per RDP 10.2.1.2.
          enum:
            - government
            - corporation
            - individual
          type: string
      required:
        - reg_who_request_type
        - reg_who_requested_data_elements
        - reg_who_legal_basis
        - reg_who_good_faith_affirmation
        - reg_who_lawful_processing_agreement
      type: object
    abuseReportsReportStatus:
      description: An enum value that represents the status of an abuse record
      enum:
        - accepted
        - in_review
      type: string
    abuseReportsReportType:
      description: The abuse report type
      enum:
        - PHISH
        - GEN
        - THREAT
        - DMCA
        - EMER
        - TM
        - REG_WHO
        - NCSEI
        - NETWORK
      type: string
    abuseReportsSubmissionReportType:
      description: The report type for submitted reports.
      type: string
    abuseReportsSubmitErrorResponse:
      properties:
        error_code:
          $ref: '#/components/schemas/abuseReportsErrorCode'
        msg:
          description: The error message for the error
          type: string
        request:
          properties:
            act:
              $ref: '#/components/schemas/abuseReportsSubmissionReportType'
          required:
            - act
          type: object
        result:
          description: The result should be 'error' for successful response
          type: string
      required:
        - request
        - result
        - msg
        - error_code
      type: object
    abuseReportsSubmitReportRequest:
      type: object
      title: DMCA Report
      properties:
        act:
          description: The report type for submitted reports.
          type: string
          enum:
            - abuse_dmca
        comments:
          description: >-
            Any additional comments about the infringement not exceeding 2000
            characters
          maxLength: 2000
          minLength: 1
          type: string
        company:
          description: >-
            Text not exceeding 100 characters. This field may be released by
            Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          maxLength: 100
          minLength: 1
          type: string
        email:
          description: >-
            A valid email of the abuse reporter. This field may be released by
            Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          type: string
        email2:
          description: Should match the value provided in `email`
          type: string
        name:
          description: >-
            Text not exceeding 255 characters. This field may be released by
            Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          maxLength: 255
          minLength: 1
          type: string
        reported_country:
          description: Text containing 2 characters
          maxLength: 2
          minLength: 2
          type: string
        reported_user_agent:
          description: Text not exceeding 255 characters
          maxLength: 255
          minLength: 1
          type: string
        tele:
          description: >-
            Text not exceeding 20 characters. This field may be released by
            Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          maxLength: 20
          minLength: 1
          type: string
        title:
          description: Text not exceeding 255 characters
          maxLength: 255
          minLength: 1
          type: string
        urls:
          description: >-
            A list of valid URLs separated by ‘\n’ (new line character). The
            list of the URLs should not exceed 250 URLs. All URLs should have
            the same hostname. Each URL should be unique. This field may be
            released by Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          type: string
        address1:
          description: >-
            Text not exceeding 100 characters. This field may be released by
            Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          maxLength: 100
          minLength: 1
          type: string
        agent_name:
          description: >-
            The name of the copyright holder. Text not exceeding 60 characters.
            This field may be released by Cloudflare to third parties such as
            the Lumen Database (https://lumendatabase.org/).
          maxLength: 60
          minLength: 1
          type: string
        agree:
          description: >-
            Can be `0` for false or `1` for true. Must be value: 1 for DMCA
            reports
          enum:
            - 1
          type: integer
        city:
          description: >-
            Text not exceeding 255 characters. This field may be released by
            Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          maxLength: 255
          minLength: 1
          type: string
        country:
          description: >-
            Text not exceeding 255 characters. This field may be released by
            Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          maxLength: 255
          minLength: 1
          type: string
        host_notification:
          description: >-
            Notification type based on the abuse type. NOTE: Copyright (DMCA)
            and Trademark reports cannot be anonymous.
          enum:
            - send
          type: string
        original_work:
          description: >-
            Text not exceeding 255 characters. This field may be released by
            Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          maxLength: 255
          minLength: 1
          type: string
        owner_notification:
          description: >-
            Notification type based on the abuse type. NOTE: Copyright (DMCA)
            and Trademark reports cannot be anonymous.
          enum:
            - send
          type: string
        signature:
          description: >-
            Required for DMCA reports, should be same as Name. An affirmation
            that all information in the report is true and accurate while
            agreeing to the policies of Cloudflare's abuse reports
          type: string
        state:
          description: >-
            Text not exceeding 255 characters. This field may be released by
            Cloudflare to third parties such as the Lumen Database
            (https://lumendatabase.org/).
          maxLength: 255
          minLength: 1
          type: string
        justification:
          description: >-
            A detailed description of the infringement, including any necessary
            access details and the exact steps needed to view the content, not
            exceeding 5000 characters.
          maxLength: 5000
          minLength: 1
          type: string
        trademark_number:
          description: Text not exceeding 1000 characters
          maxLength: 1000
          minLength: 1
          type: string
        trademark_office:
          description: Text not exceeding 1000 characters
          maxLength: 1000
          minLength: 1
          type: string
        trademark_symbol:
          description: Text not exceeding 1000 characters
          maxLength: 1000
          minLength: 1
          type: string
        destination_ips:
          description: >-
            A list of IP addresses separated by ‘\n’ (new line character). The
            list of destination IPs should not exceed 30 IP addresses. Each one
            of the IP addresses ought to be unique.
          type: string
        ports_protocols:
          description: >-
            A comma separated list of ports and protocols e.g. 80/TCP, 22/UDP.
            The total size of the field should not exceed 2000 characters. Each
            individual port/protocol should not exceed 100 characters. The list
            should not have more than 30 unique ports and protocols.
          type: string
        source_ips:
          description: >-
            A list of IP addresses separated by ‘\n’ (new line character). The
            list of source IPs should not exceed 30 IP addresses. Each one of
            the IP addresses ought to be unique.
          type: string
        ncmec_notification:
          description: >-
            Notification type based on the abuse type. NOTE: Copyright (DMCA)
            and Trademark reports cannot be anonymous.
          enum:
            - send
            - send-anon
          type: string
        reg_who_request:
          $ref: '#/components/schemas/abuseReportsRegistrarWhoIsFields'
        ncsei_subject_representation:
          description: >-
            If the submitter is the target of NCSEI in the URLs of the abuse
            report.
          type: boolean
      required:
        - act
        - email
        - email2
        - name
        - owner_notification
        - urls
    abuseReportsSubmitReportResponse:
      properties:
        abuse_rand:
          description: The identifier for the submitted abuse report.
          type: string
        request:
          properties:
            act:
              $ref: '#/components/schemas/abuseReportsSubmissionReportType'
          required:
            - act
          type: object
        result:
          description: The result should be 'success' for successful response
          type: string
      required:
        - request
        - result
        - abuse_rand
      type: object
    abuseReportsSubmitterDetails:
      description: Information about the submitter of the report.
      properties:
        company:
          type: string
        email:
          type: string
        name:
          type: string
        telephone:
          type: string
      type: object
