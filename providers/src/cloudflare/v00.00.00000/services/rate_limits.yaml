        resource_chain: []
        method: edit
components:
  schemas:
    firewallAction:
      description: The action to perform when the threshold of matched traffic within the configured period is exceeded.
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/firewallMode'
        response:
          $ref: '#/components/schemas/firewallCustomResponse'
        timeout:
          $ref: '#/components/schemas/firewallTimeout'
    firewallBody:
      description: The response body to return. The value must conform to the configured content type.
      example: <error>This request has been rate-limited.</error>
      maxLength: 10240
      type: string
    firewallBypass:
      description: Criteria specifying when the current rate limit should be bypassed. You can specify that the rate limit should not apply to one or more URLs.
      items:
        properties:
          name:
            enum:
            - url
            example: url
            type: string
          value:
            description: The URL to bypass.
            example: api.example.com/*
            type: string
        type: object
      type: array
    firewallContentType:
      description: 'The content type of the body. Must be one of the following: `text/plain`, `text/xml`, or `application/json`.'
      example: text/xml
      maxLength: 50
      type: string
      x-auditable: true
    firewallCustomResponse:
      description: 'A custom content type and reponse to return when the threshold is exceeded. The custom response configured in this object will override the custom error for the zone. This object is optional. Notes: If you omit this object, Cloudflare will use the default HTML error page. If "mode" is "challenge", "managed_challenge", or "js_challenge", Cloudflare will use the zone challenge pages and you should not provide the "response" object.'
      type: object
      properties:
        body:
          $ref: '#/components/schemas/firewallBody'
        content_type:
          $ref: '#/components/schemas/firewallContentType'
    firewallDescription:
      description: An informative summary of the rule. This value is sanitized and any tags will be removed.
      example: Prevent multiple login failures to mitigate brute force attacks
      maxLength: 1024
      type: string
      x-auditable: true
    firewallDisabled:
      description: When true, indicates that the rate limit is currently disabled.
      example: false
      type: boolean
      x-auditable: true
    firewallHeaderName:
      description: The name of the response header to match.
      example: Cf-Cache-Status
      type: string
      x-auditable: true
    firewallHeaderOp:
      description: 'The operator used when matching: `eq` means "equal" and `ne` means "not equal".'
      enum:
      - eq
      - ne
      example: ne
      type: string
      x-auditable: true
    firewallHeaderValue:
      description: The value of the response header, which must match exactly.
      example: HIT
      type: string
      x-auditable: true
    firewallId:
      description: The unique identifier of the rate limit.
      example: 372e67954025e0ba6aaa6d586b9e0b59
      maxLength: 32
      readOnly: true
      type: string
      x-auditable: true
    firewallMatch:
      description: Determines which traffic the rate limit counts towards the threshold.
      type: object
      properties:
        headers:
          items:
            properties:
              name:
                $ref: '#/components/schemas/firewallHeaderName'
              op:
                $ref: '#/components/schemas/firewallHeaderOp'
              value:
                $ref: '#/components/schemas/firewallHeaderValue'
            type: object
          type: array
        request:
          properties:
            methods:
              $ref: '#/components/schemas/firewallMethods'
            schemes:
              $ref: '#/components/schemas/firewallSchemes'
            url:
              $ref: '#/components/schemas/firewallUrl'
          type: object
        response:
          properties:
            origin_traffic:
              $ref: '#/components/schemas/firewallOriginTraffic'
          type: object
    firewallMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    firewallMethods:
      description: The HTTP methods to match. You can specify a subset (for example, `['POST','PUT']`) or all methods (`['_ALL_']`). This field is optional when creating a rate limit.
      example:
      - GET
      - POST
      items:
        description: An HTTP method or `_ALL_` to indicate all methods.
        enum:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - HEAD
        - _ALL_
        example: GET
        type: string
        x-auditable: true
      type: array
    firewallMode:
      description: The action to perform.
      enum:
      - simulate
      - ban
      - challenge
      - js_challenge
      - managed_challenge
      example: challenge
      type: string
      x-auditable: true
    firewallOriginTraffic:
      description: 'When true, only the uncached traffic served from your origin servers will count towards rate limiting. In this case, any cached traffic served by Cloudflare will not count towards rate limiting. This field is optional. Notes: This field is deprecated. Instead, use response headers and set "origin_traffic" to "false" to avoid legacy behaviour interacting with the "response_headers" property.'
      type: boolean
      x-auditable: true
    firewallPeriod:
      description: The time in seconds (an integer value) to count matching traffic. If the count exceeds the configured threshold within this period, Cloudflare will perform the configured action.
      example: 900
      maximum: 86400
      minimum: 10
      type: number
      x-auditable: true
    firewallRateLimitId:
      description: Defines the unique identifier of the rate limit.
      example: 372e67954025e0ba6aaa6d586b9e0b59
      maxLength: 32
      readOnly: true
      type: string
    firewallRateLimits:
      type: object
      $ref: '#/components/schemas/firewallRatelimit'
    firewallRatelimit:
      properties:
        action:
          $ref: '#/components/schemas/firewallAction'
        bypass:
          $ref: '#/components/schemas/firewallBypass'
        description:
          $ref: '#/components/schemas/firewallDescription'
        disabled:
          $ref: '#/components/schemas/firewallDisabled'
        id:
          $ref: '#/components/schemas/firewallId'
        match:
          $ref: '#/components/schemas/firewallMatch'
        period:
          $ref: '#/components/schemas/firewallPeriod'
        threshold:
          $ref: '#/components/schemas/firewallThreshold'
      type: object
    firewallRatelimitResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/firewallMessages'
        messages:
          $ref: '#/components/schemas/firewallMessages'
        result:
          items:
            type: object
            $ref: '#/components/schemas/firewallRateLimits'
          nullable: true
          type: array
        success:
          description: Defines whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result_info:
          $ref: '#/components/schemas/firewallResultInfo'
      required:
      - success
      - errors
      - messages
      - result
    firewallRatelimitResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/firewallMessages'
        messages:
          $ref: '#/components/schemas/firewallMessages'
        result:
          $ref: '#/components/schemas/firewallRateLimits'
        success:
          description: Defines whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
    firewallResultInfo:
      properties:
        count:
          description: Defines the total number of results for the requested service.
          example: 1
          type: number
        page:
          description: Defines the current page within paginated list of results.
          example: 1
          type: number
        per_page:
          description: Defines the number of results per page of results.
          example: 20
          type: number
        total_count:
          description: Defines the total results available without any search parameters.
          example: 2000
          type: number
      type: object
    firewallSchemes:
      description: The HTTP schemes to match. You can specify one scheme (`['HTTPS']`), both schemes (`['HTTP','HTTPS']`), or all schemes (`['_ALL_']`). This field is optional.
      example:
      - HTTP
      - HTTPS
      items:
        description: An HTTP scheme or `_ALL_` to indicate all schemes.
        example: HTTPS
        type: string
      type: array
      x-auditable: true
    firewallThreshold:
      description: The threshold that will trigger the configured mitigation action. Configure this value along with the `period` property to establish a threshold per period.
      example: 60
      minimum: 1
      type: number
      x-auditable: true
    firewallTimeout:
      description: 'The time in seconds during which Cloudflare will perform the mitigation action. Must be an integer value greater than or equal to the period. Notes: If "mode" is "challenge", "managed_challenge", or "js_challenge", Cloudflare will use the zone''s Challenge Passage time and you should not provide this value.'
      example: 86400
      maximum: 86400
      minimum: 1
      type: number
      x-auditable: true
    firewallUrl:
      description: The URL pattern to match, composed of a host and a path such as `example.org/path*`. Normalization is applied before the pattern is matched. `*` wildcards are expanded to match applicable traffic. Query strings are not matched. Set the value to `*` to match all traffic to your zone.
      example: '*.example.org/path*'
      maxLength: 1024
      type: string
      x-auditable: true
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
      - code
      - message
      type: object
      uniqueItems: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: The preferred authorization scheme for interacting with the Cloudflare API. [Create a token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: Used when interacting with the Origin CA certificates API. [View/change your key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    rate_limits:
      id: cloudflare.rate_limits.rate_limits
      name: rate_limits
      title: Rate Limits
      methods:
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1rate_limits/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1rate_limits/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
