                        $ref: '#/components/schemas/firewallDescription'
                      disabled:
                        $ref: '#/components/schemas/firewallDisabled'
                      id:
                        $ref: '#/components/schemas/firewallId'
                      match:
                        $ref: '#/components/schemas/firewallMatch'
                      period:
                        $ref: '#/components/schemas/firewallPeriod'
                      threshold:
                        $ref: '#/components/schemas/firewallThreshold'
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
          description: Delete a rate limit response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    type: object
                    properties:
                      action:
                        $ref: '#/components/schemas/firewallAction'
                      bypass:
                        $ref: '#/components/schemas/firewallBypass'
                      description:
                        $ref: '#/components/schemas/firewallDescription'
                      disabled:
                        $ref: '#/components/schemas/firewallDisabled'
                      id:
                        $ref: '#/components/schemas/firewallId'
                      match:
                        $ref: '#/components/schemas/firewallMatch'
                      period:
                        $ref: '#/components/schemas/firewallPeriod'
                      threshold:
                        $ref: '#/components/schemas/firewallThreshold'
                    enum:
                    - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Delete a rate limit response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete a rate limit
      tags:
      - Rate limits for a zone
      x-api-token-group:
      - Firewall Services Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rate_limits
        resource_chain: []
        method: delete
    get:
      deprecated: true
      description: Fetches the details of a rate limit.
      operationId: rate-limits-for-a-zone-get-a-rate-limit
      parameters:
      - in: path
        name: rate_limit_id
        schema:
          $ref: '#/components/schemas/firewallRateLimitId'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallRatelimitResponseSingle'
          description: Get a rate limit response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    type: object
                    properties:
                      action:
                        $ref: '#/components/schemas/firewallAction'
                      bypass:
                        $ref: '#/components/schemas/firewallBypass'
                      description:
                        $ref: '#/components/schemas/firewallDescription'
                      disabled:
                        $ref: '#/components/schemas/firewallDisabled'
                      id:
                        $ref: '#/components/schemas/firewallId'
                      match:
                        $ref: '#/components/schemas/firewallMatch'
                      period:
                        $ref: '#/components/schemas/firewallPeriod'
                      threshold:
                        $ref: '#/components/schemas/firewallThreshold'
                    enum:
                    - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Get a rate limit response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get a rate limit
      tags:
      - Rate limits for a zone
      x-api-token-group:
      - Firewall Services Write
      - Firewall Services Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rate_limits
        resource_chain: []
        method: get
    put:
      deprecated: true
      description: Updates an existing rate limit.
      operationId: rate-limits-for-a-zone-update-a-rate-limit
      parameters:
      - in: path
        name: rate_limit_id
        schema:
          $ref: '#/components/schemas/firewallRateLimitId'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                action:
                  $ref: '#/components/schemas/firewallAction'
                match:
                  $ref: '#/components/schemas/firewallMatch'
                period:
                  $ref: '#/components/schemas/firewallPeriod'
                threshold:
                  $ref: '#/components/schemas/firewallThreshold'
              required:
              - match
              - threshold
              - period
              - action
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallRatelimitResponseSingle'
          description: Update a rate limit response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    type: object
