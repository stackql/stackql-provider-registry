openapi: 3.0.3
info:
  title: rate_limits API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones/{zone_id}/rate_limits:
    get:
      deprecated: true
      description: Fetches the rate limits for a zone.
      operationId: rate-limits-for-a-zone-list-rate-limits
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Defines the page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Defines the maximum number of results per page. You can only set the value to `1` or to a multiple of 5 such as `5`, `10`, `15`, or `20`.
          maximum: 1000
          minimum: 1
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallRatelimitResponseCollection'
          description: List rate limits response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    items:
                      type: object
                      $ref: '#/components/schemas/firewallRateLimits'
                    nullable: true
                    type: array
                    enum:
                    - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    $ref: '#/components/schemas/firewallResultInfo'
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: List rate limits response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List rate limits
      tags:
      - Rate limits for a zone
      x-api-token-group:
      - Firewall Services Write
      - Firewall Services Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rate_limits
        resource_chain: []
        method: list
    post:
      deprecated: true
      description: Creates a new rate limit for a zone. Refer to the object definition for a list of required attributes.
      operationId: rate-limits-for-a-zone-create-a-rate-limit
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                action:
                  $ref: '#/components/schemas/firewallAction'
                match:
                  $ref: '#/components/schemas/firewallMatch'
                period:
                  $ref: '#/components/schemas/firewallPeriod'
                threshold:
                  $ref: '#/components/schemas/firewallThreshold'
              required:
              - match
              - threshold
              - period
              - action
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/firewallRatelimitResponseSingle'
          description: Create a rate limit response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/firewallMessages'
                  messages:
                    $ref: '#/components/schemas/firewallMessages'
                  result:
                    type: object
                    properties:
                      action:
                        $ref: '#/components/schemas/firewallAction'
                      bypass:
                        $ref: '#/components/schemas/firewallBypass'
                      description:
                        $ref: '#/components/schemas/firewallDescription'
                      disabled:
                        $ref: '#/components/schemas/firewallDisabled'
                      id:
                        $ref: '#/components/schemas/firewallId'
                      match:
                        $ref: '#/components/schemas/firewallMatch'
                      period:
                        $ref: '#/components/schemas/firewallPeriod'
                      threshold:
                        $ref: '#/components/schemas/firewallThreshold'
                    enum:
                    - null
                  success:
                    description: Defines whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Create a rate limit response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a rate limit
      tags:
      - Rate limits for a zone
      x-api-token-group:
      - Firewall Services Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: rate_limits
        resource_chain: []
        method: create
  /zones/{zone_id}/rate_limits/{rate_limit_id}:
    delete:
      deprecated: true
      description: Deletes an existing rate limit.
      operationId: rate-limits-for-a-zone-delete-a-rate-limit
