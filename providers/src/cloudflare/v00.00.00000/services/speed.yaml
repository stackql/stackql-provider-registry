openapi: 3.0.3
info:
  title: speed API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/speed_api/availabilities:
    get:
      description: Retrieves quota for all plans, as well as the current zone quota.
      operationId: speed-get-availabilities
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryAvailabilitiesResponse'
          description: Page test availability.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get quota and availability
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - availabilities
        method: list
  /zones/{zone_id}/speed_api/pages:
    get:
      description: Lists all webpages which have been tested.
      operationId: speed-list-pages
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryPagesResponseCollection'
          description: List of pages.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List tested webpages
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - pages
        method: list
  /zones/{zone_id}/speed_api/pages/{url}/tests:
    delete:
      description: >-
        Deletes all tests for a specific webpage from a specific region. Deleted
        tests are still counted as part of the quota.
      operationId: speed-delete-tests
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: url
          schema:
            $ref: '#/components/schemas/observatoryUrl'
          required: true
        - in: query
          name: region
          schema:
            $ref: '#/components/schemas/observatoryRegion'
            default: us-central1
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryCountResponse'
          description: Number of deleted tests.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete all page tests
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - pages
          - tests
        method: delete
    get:
      description: Test history (list of tests) for a specific webpage.
      operationId: speed-list-test-history
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: url
          schema:
            $ref: '#/components/schemas/observatoryUrl'
          required: true
        - in: query
          name: page
          schema:
            default: 1
            type: integer
        - in: query
          name: per_page
          schema:
            default: 20
            maximum: 50
            minimum: 5
            type: integer
        - in: query
          name: region
          schema:
            $ref: '#/components/schemas/observatoryRegion'
            default: us-central1
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryPageTestResponseCollection'
          description: List of test history for a page.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List page test history
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - pages
          - tests
        method: list
    post:
      description: Starts a test for a specific webpage, in a specific region.
      operationId: speed-create-test
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: url
          schema:
            $ref: '#/components/schemas/observatoryUrl'
          required: true
      requestBody:
        content:
          application/json:
            schema:
              properties:
                region:
                  $ref: '#/components/schemas/observatoryRegion'
                  default: us-central1
                  type: string
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryPageTestResponseSingle'
          description: Page test details.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Start page test
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - pages
          - tests
        method: create
  /zones/{zone_id}/speed_api/pages/{url}/tests/{test_id}:
    get:
      description: Retrieves the result of a specific test.
      operationId: speed-get-test
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: url
          schema:
            $ref: '#/components/schemas/observatoryUrl'
          required: true
        - in: path
          name: test_id
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryPageTestResponseSingle'
          description: Page test result.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get a page test result
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - pages
          - tests
        method: get
  /zones/{zone_id}/speed_api/pages/{url}/trend:
    get:
      description: Lists the core web vital metrics trend over time for a specific page.
      operationId: speed-list-page-trend
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: url
          schema:
            $ref: '#/components/schemas/observatoryUrl'
          required: true
        - in: query
          name: region
          schema:
            $ref: '#/components/schemas/observatoryRegion'
        - in: query
          name: deviceType
          schema:
            $ref: '#/components/schemas/observatoryDeviceType'
        - in: query
          name: start
          schema:
            $ref: '#/components/schemas/observatoryTimestamp'
        - in: query
          name: end
          schema:
            $ref: '#/components/schemas/observatoryTimestamp'
        - description: The timezone of the start and end timestamps.
          in: query
          name: tz
          schema:
            type: string
        - description: A comma-separated list of metrics to include in the results.
          in: query
          name: metrics
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryTrendResponse'
          description: Page trend.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List core web vital metrics trend
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - pages
        method: trend
  /zones/{zone_id}/speed_api/schedule/{url}:
    delete:
      description: Deletes a scheduled test for a page.
      operationId: speed-delete-test-schedule
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: url
          schema:
            $ref: '#/components/schemas/observatoryUrl'
          required: true
        - in: query
          name: region
          schema:
            $ref: '#/components/schemas/observatoryRegion'
            default: us-central1
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryCountResponse'
          description: Number of deleted tests.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete scheduled page test
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - schedule
        method: delete
    get:
      description: Retrieves the test schedule for a page in a specific region.
      operationId: speed-get-scheduled-test
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: url
          schema:
            $ref: '#/components/schemas/observatoryUrl'
          required: true
        - in: query
          name: region
          schema:
            $ref: '#/components/schemas/observatoryRegion'
            default: us-central1
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryScheduleResponseSingle'
          description: Page test schedule.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get a page test schedule
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - schedule
        method: get
    post:
      description: Creates a scheduled test for a page.
      operationId: speed-create-scheduled-test
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: path
          name: url
          schema:
            $ref: '#/components/schemas/observatoryUrl'
          required: true
        - in: query
          name: region
          schema:
            $ref: '#/components/schemas/observatoryRegion'
            default: us-central1
            type: string
          x-stainless-terraform-configurability: computed_optional
        - description: >-
            The frequency of the scheduled test. Defaults to WEEKLY for free
            plans, DAILY for paid plans.
          in: query
          name: frequency
          schema:
            $ref: '#/components/schemas/observatoryScheduleFrequency'
          x-stainless-terraform-configurability: computed_optional
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryCreateScheduleResponse'
          description: Page test schedule.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/observatoryApiResponseCommonFailure'
          description: Failure response.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Create scheduled page test
      tags:
        - Observatory
      x-api-token-group:
        - Zone Settings Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: speed
        resource_chain:
          - schedule
        method: create
components:
  schemas:
    observatoryApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/observatorySchemasMessages'
        messages:
          example: []
          $ref: '#/components/schemas/observatorySchemasMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    observatoryAvailabilities:
      properties:
        quota:
          properties:
            plan:
              description: Cloudflare plan.
              example: free
              type: string
              x-auditable: true
            quotasPerPlan:
              description: The number of tests available per plan.
              properties:
                value:
                  $ref: '#/components/schemas/observatoryPlanPropertiesInfo'
              type: object
            remainingSchedules:
              description: The number of remaining schedules available.
              example: 1
              type: number
              x-auditable: true
            remainingTests:
              description: The number of remaining tests available.
              example: 30
              type: number
              x-auditable: true
            scheduleQuotasPerPlan:
              description: The number of schedules available per plan.
              properties:
                value:
                  $ref: '#/components/schemas/observatoryPlanPropertiesInfo'
              type: object
          type: object
        regions:
          items:
            $ref: '#/components/schemas/observatoryLabeledRegion'
          type: array
        regionsPerPlan:
          description: Available regions.
          properties:
            business:
              items:
                $ref: '#/components/schemas/observatoryLabeledRegion'
              type: array
            enterprise:
              items:
                $ref: '#/components/schemas/observatoryLabeledRegion'
              type: array
            free:
              items:
                $ref: '#/components/schemas/observatoryLabeledRegion'
              type: array
            pro:
              items:
                $ref: '#/components/schemas/observatoryLabeledRegion'
              type: array
          type: object
      type: object
    observatoryAvailabilitiesResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/observatoryMessages'
        messages:
          $ref: '#/components/schemas/observatoryMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
          x-auditable: true
        result:
          $ref: '#/components/schemas/observatoryAvailabilities'
      required:
        - success
        - errors
        - messages
    observatoryCountResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/observatoryMessages'
        messages:
          $ref: '#/components/schemas/observatoryMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
          x-auditable: true
        result:
          properties:
            count:
              description: Number of items affected.
              example: 1
              type: number
              x-auditable: true
              x-stainless-naming:
                terraform:
                  property_name: item_count
          type: object
      required:
        - success
        - errors
        - messages
    observatoryCreateScheduleResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/observatoryMessages'
        messages:
          $ref: '#/components/schemas/observatoryMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
          x-auditable: true
        result:
          properties:
            schedule:
              $ref: '#/components/schemas/observatorySchedule'
            test:
              $ref: '#/components/schemas/observatoryPageTest'
          type: object
      required:
        - success
        - errors
        - messages
    observatoryDeviceType:
      description: The type of device.
      enum:
        - DESKTOP
        - MOBILE
      example: DESKTOP
      type: string
      x-auditable: true
    observatoryLabeledRegion:
      description: A test region with a label.
      properties:
        label:
          example: Iowa, USA
          type: string
          x-auditable: true
        value:
          $ref: '#/components/schemas/observatoryRegion'
      type: object
    observatoryLighthouseErrorCode:
      description: The error code of the Lighthouse result.
      enum:
        - NOT_REACHABLE
        - DNS_FAILURE
        - NOT_HTML
        - LIGHTHOUSE_TIMEOUT
        - UNKNOWN
      example: NOT_REACHABLE
      type: string
      x-auditable: true
    observatoryLighthouseReport:
      description: The Lighthouse report.
      properties:
        cls:
          description: Cumulative Layout Shift.
          example: 100
          type: number
          x-auditable: true
        deviceType:
          $ref: '#/components/schemas/observatoryDeviceType'
        error:
          properties:
            code:
              $ref: '#/components/schemas/observatoryLighthouseErrorCode'
            detail:
              description: Detailed error message.
              example: 'Details: net::ERR_CONNECTION_CLOSED'
              type: string
              x-auditable: true
            finalDisplayedUrl:
              description: The final URL displayed to the user.
              example: example.com
              type: string
              x-auditable: true
          type: object
        fcp:
          description: First Contentful Paint.
          example: 100
          type: number
          x-auditable: true
        jsonReportUrl:
          description: The URL to the full Lighthouse JSON report.
          type: string
          x-auditable: true
        lcp:
          description: Largest Contentful Paint.
          example: 100
          type: number
          x-auditable: true
        performanceScore:
          description: The Lighthouse performance score.
          example: 90
          type: number
          x-auditable: true
        si:
          description: Speed Index.
          example: 100
          type: number
          x-auditable: true
        state:
          $ref: '#/components/schemas/observatoryLighthouseState'
        tbt:
          description: Total Blocking Time.
          example: 100
          type: number
          x-auditable: true
        ttfb:
          description: Time To First Byte.
          example: 100
          type: number
          x-auditable: true
        tti:
          description: Time To Interactive.
          example: 100
          type: number
          x-auditable: true
      type: object
    observatoryLighthouseState:
      description: The state of the Lighthouse report.
      enum:
        - RUNNING
        - COMPLETE
        - FAILED
      example: COMPLETE
      type: string
      x-auditable: true
    observatoryMessages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    observatoryPageTest:
      properties:
        date:
          $ref: '#/components/schemas/observatoryTimestamp'
        desktopReport:
          $ref: '#/components/schemas/observatoryLighthouseReport'
        id:
          $ref: '#/components/schemas/observatoryUuid'
        mobileReport:
          $ref: '#/components/schemas/observatoryLighthouseReport'
        region:
          $ref: '#/components/schemas/observatoryLabeledRegion'
        scheduleFrequency:
          $ref: '#/components/schemas/observatoryScheduleFrequency'
        url:
          $ref: '#/components/schemas/observatoryUrl'
      type: object
    observatoryPageTestResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/observatoryMessages'
        messages:
          $ref: '#/components/schemas/observatoryMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
          x-auditable: true
        result:
          items:
            $ref: '#/components/schemas/observatoryPageTest'
          type: array
        result_info:
          $ref: '#/components/schemas/observatoryResultInfo'
      required:
        - success
        - errors
        - messages
    observatoryPageTestResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/observatoryMessages'
        messages:
          $ref: '#/components/schemas/observatoryMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
          x-auditable: true
        result:
          $ref: '#/components/schemas/observatoryPageTest'
      required:
        - success
        - errors
        - messages
    observatoryPagesResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/observatoryMessages'
        messages:
          $ref: '#/components/schemas/observatoryMessages'
        success:
          description: Whether the API call was successful.
          example: true
          type: boolean
          x-auditable: true
        result:
          items:
            $ref: >-
              #/components/schemas/observatoryPagesResponseCollection_result_item
          type: array
      required:
        - success
        - errors
        - messages
    observatoryPagesResponseCollection_result_item:
      properties:
        region:
          $ref: '#/components/schemas/observatoryLabeledRegion'
        scheduleFrequency:
          $ref: '#/components/schemas/observatoryScheduleFrequency'
        tests:
          items:
            $ref: '#/components/schemas/observatoryPageTest'
          type: array
        url:
          $ref: '#/components/schemas/observatoryUrl'
      type: object
    observatoryPlanPropertiesInfo:
      description: Counts per account plan.
      properties:
        business:
          example: 1
          type: integer
          x-auditable: true
        enterprise:
          example: 1
          type: integer
          x-auditable: true
        free:
          example: 1
          type: integer
          x-auditable: true
        pro:
          example: 1
          type: integer
          x-auditable: true
      type: object
    observatoryRegion:
      description: A test region.
      enum:
        - asia-east1
