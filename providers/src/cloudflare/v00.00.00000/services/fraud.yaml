openapi: 3.0.3
info:
  title: fraud API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/fraud_detection/settings:
    get:
      description: Retrieve Fraud Detection settings for a zone.
      operationId: fraud-detection-zone-get-settings
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/fraudFraudSettingsResponseBody'
          description: Fraud Detection settings response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/fraudMessages'
                  messages:
                    $ref: '#/components/schemas/fraudMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      user_profiles:
                        $ref: '#/components/schemas/fraudUserProfilesStatus'
                      username_expressions:
                        $ref: '#/components/schemas/fraudUsernameExpressions'
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Fraud Detection settings response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Fraud Detection Settings
      tags:
        - Fraud Detection
      x-api-token-group:
        - Fraud Detection Read
        - Fraud Detection Write
      x-stackql-sdk:
        service: fraud
        resource_chain: []
        method: get
    put:
      description: >-
        Update Fraud Detection settings for a zone. Notes on
        `username_expressions` behavior: - If omitted or set to null,
        expressions are not modified. - If provided as an empty array `[]`, all
        expressions will be cleared.
      operationId: fraud-detection-zone-update-settings
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fraudFraudSettings'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/fraudFraudSettingsResponseBody'
          description: Updated Fraud Detection settings response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/fraudMessages'
                  messages:
                    $ref: '#/components/schemas/fraudMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      user_profiles:
                        $ref: '#/components/schemas/fraudUserProfilesStatus'
                      username_expressions:
                        $ref: '#/components/schemas/fraudUsernameExpressions'
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Update Fraud Detection settings failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Fraud Detection Settings
      tags:
        - Fraud Detection
      x-api-token-group:
        - Fraud Detection Write
      x-stackql-sdk:
        service: fraud
        resource_chain: []
        method: update
components:
  schemas:
    fraudFraudSettings:
      properties:
        user_profiles:
          $ref: '#/components/schemas/fraudUserProfilesStatus'
        username_expressions:
          $ref: '#/components/schemas/fraudUsernameExpressions'
      type: object
    fraudFraudSettingsResponseBody:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/fraudMessages'
        messages:
          $ref: '#/components/schemas/fraudMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/fraudFraudSettings'
      required:
        - success
        - errors
        - messages
    fraudMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    fraudUserProfilesStatus:
      description: Whether Fraud User Profiles is enabled for the zone.
      enum:
        - enabled
        - disabled
      example: disabled
      type: string
      x-auditable: true
    fraudUsernameExpressions:
      description: >-
        List of expressions to detect usernames in write HTTP requests. -
        Maximum of 10 expressions. - Omit or set to null to leave unchanged on
        update. - Provide an empty array `[]` to clear all expressions on
        update. - Invalid expressions will result in a 10400 Bad Request with
        details in the `messages` array.
      example:
        - http.request.body.form["username"][0]
        - lookup_json_string(http.request.body.raw, "username")
      items:
        type: string
        x-auditable: true
      maxItems: 10
      type: array
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    settings:
      id: cloudflare.fraud.settings
      name: settings
      title: Settings
      methods:
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1fraud_detection~1settings/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1fraud_detection~1settings/put'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/settings/methods/list'
        insert: []
        update: []
        delete: []
        replace:
          - $ref: '#/components/x-stackQL-resources/settings/methods/update'
