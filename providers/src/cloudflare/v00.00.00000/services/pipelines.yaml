openapi: 3.0.3
info:
  title: pipelines API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/pipelines:
    get:
      deprecated: true
      description: '[DEPRECATED] List, filter, and paginate pipelines in an account. Use the new /pipelines/v1/pipelines endpoint instead.'
      operationId: getV4AccountsByAccount_idPipelines_deprecated
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: search
        schema:
          description: Specifies the prefix of pipeline name to search.
          type: string
      - in: query
        name: page
        schema:
          default: '1'
          description: Specifies which page to retrieve.
          type: string
      - in: query
        name: per_page
        schema:
          default: '25'
          description: Specifies the number of pipelines per page.
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result_info:
                    properties:
                      count:
                        description: Indicates the number of items on current page.
                        type: number
                      page:
                        description: Indicates the current page number.
                        type: number
                      per_page:
                        description: Indicates the number of items per page.
                        type: number
                      total_count:
                        description: Indicates the total number of items.
                        type: number
                    required:
                    - count
                    - page
                    - per_page
                    - total_count
                    type: object
                  results:
                    items:
                      $ref: '#/components/schemas/cloudflarePipelinesWorkersPipelinesPipeline'
                    type: array
                  success:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkerPipelinesCommonSuccess'
                required:
                - success
                - results
                - result_info
                type: object
          description: '[DEPRECATED] Lists the pipelines. Use /pipelines/v1/pipelines instead.'
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  results:
                    nullable: true
                    type: object
                    x-stainless-empty-object: true
                  success:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkerPipelinesCommonSuccess'
                required:
                - success
                - results
                - errors
                type: object
          description: Indicates the error trying to list pipelines.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: '[DEPRECATED] List Pipelines'
      tags:
      - workers_pipelines_other
      x-api-token-group:
      - Pipelines Write
      - Pipelines Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: pipelines
        resource_chain: []
        method: list
    post:
      deprecated: true
      description: '[DEPRECATED] Create a new pipeline. Use the new /pipelines/v1/pipelines endpoint instead.'
      operationId: postV4AccountsByAccount_idPipelines_deprecated
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                destination:
                  properties:
                    batch:
                      properties:
                        max_bytes:
                          default: 100000000
                          description: Specifies rough maximum size of files.
                          maximum: 100000000
                          minimum: 1000
                          type: integer
                        max_duration_s:
                          default: 300
                          description: Specifies duration to wait to aggregate batches files.
                          maximum: 300
                          minimum: 0.25
                          type: number
                        max_rows:
                          default: 10000000
                          description: Specifies rough maximum number of rows per file.
                          maximum: 10000000
                          minimum: 100
                          type: integer
                      type: object
                    compression:
                      properties:
                        type:
                          default: gzip
                          description: Specifies the desired compression algorithm and format.
                          enum:
                          - none
                          - gzip
                          - deflate
                          type: string
                      type: object
                    credentials:
                      properties:
                        access_key_id:
                          description: Specifies the R2 Bucket Access Key Id.
                          type: string
                        endpoint:
                          description: Specifies the R2 Endpoint.
                          type: string
                        secret_access_key:
                          description: Specifies the R2 Bucket Secret Access Key.
                          type: string
                      required:
                      - endpoint
                      - access_key_id
                      - secret_access_key
                      type: object
                    format:
                      description: Specifies the format of data to deliver.
                      enum:
                      - json
                      type: string
                    path:
                      properties:
                        bucket:
                          description: Specifies the R2 Bucket to store files.
                          type: string
                        filename:
                          description: Specifies the name pattern to for individual data files.
                          type: string
                        filepath:
                          description: Specifies the name pattern for directory.
                          type: string
                        prefix:
                          description: Specifies the base directory within the bucket.
                          type: string
                      required:
                      - bucket
                      type: object
                    type:
                      description: Specifies the type of destination.
                      enum:
                      - r2
                      type: string
                  required:
                  - type
                  - format
                  - batch
                  - compression
                  - path
                  - credentials
                  type: object
                name:
                  description: Defines the name of the pipeline.
                  maxLength: 128
                  minLength: 1
                  type: string
                source:
                  items:
                    type: object
                    description: '[DEPRECATED] HTTP source configuration. Use the new streams API instead.'
                    properties:
                      authentication:
                        description: Specifies whether authentication is required to send to this pipeline via HTTP.
                        type: boolean
                      cors:
                        properties:
                          origins:
                            description: Specifies allowed origins to allow Cross Origin HTTP Requests.
                            items:
                              type: string
                            maxItems: 5
                            type: array
                        type: object
                      format:
                        description: Specifies the format of source data.
                        enum:
                        - json
                        type: string
                      type:
                        type: string
                    required:
                    - format
                    - type
                  minItems: 1
                  type: array
              required:
              - name
              - source
              - destination
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkersPipelinesPipeline'
                  success:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkerPipelinesCommonSuccess'
                required:
                - success
                - result
                type: object
          description: '[DEPRECATED] Indicates a successfully created pipeline. Use /pipelines/v1/pipelines instead.'
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                      required:
                      - code
                      - message
                      type: object
                    type: array
                  results:
                    nullable: true
                    type: object
                    x-stainless-empty-object: true
                  success:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkerPipelinesCommonSuccess'
                required:
                - success
                - results
                - errors
                type: object
          description: Indicates an error in creating a pipeline.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: '[DEPRECATED] Create Pipeline'
      tags:
      - workers_pipelines_other
      x-api-token-group:
      - Pipelines Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: pipelines
        resource_chain: []
        method: create
  /accounts/{account_id}/pipelines/v1/pipelines:
    get:
      description: List/Filter Pipelines in Account.
      operationId: getV4AccountsByAccount_idPipelinesV1Pipelines
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          type: number
      - in: query
        name: per_page
        schema:
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    items:
                      properties:
                        created_at:
                          type: string
                          readOnly: true
                        id:
                          description: Indicates a unique identifier for this pipeline.
                          type: string
                        modified_at:
                          type: string
                          readOnly: true
                        name:
                          description: Indicates the name of the Pipeline.
                          maxLength: 128
                          minLength: 1
                          type: string
                        sql:
                          description: Specifies SQL for the Pipeline processing flow.
                          type: string
                        status:
                          description: Indicates the current status of the Pipeline.
                          type: string
                      required:
                      - id
                      - name
                      - created_at
                      - modified_at
                      - sql
                      - status
                      type: object
                    type: array
                  result_info:
                    properties:
                      count:
                        description: Indicates the number of items on current page.
                        type: number
                      page:
                        description: Indicates the current page number.
                        type: number
                      per_page:
                        description: Indicates the number of items per page.
                        type: number
                      total_count:
                        description: Indicates the total number of items.
                        type: number
                    required:
                    - count
                    - page
                    - per_page
                    - total_count
                    type: object
                  success:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkerPipelinesCommonSuccess'
                required:
                - success
                - result
                - result_info
                type: object
          description: Indicates a successfully listed Pipelines.
        4XX:
          description: Indicates an error in listing Pipelines.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Pipelines
      tags:
      - workers_pipelines_other
      x-api-token-group:
      - Pipelines Write
      - Pipelines Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: pipelines
        resource_chain: []
        method: list_v1
    post:
      description: Create a new Pipeline.
      operationId: postV4AccountsByAccount_idPipelinesV1Pipelines
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: Specifies the name of the Pipeline.
                  maxLength: 128
                  minLength: 1
                  type: string
                sql:
                  description: Specifies SQL for the Pipeline processing flow.
                  type: string
              required:
              - name
              - sql
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      created_at:
                        type: string
                        readOnly: true
                      id:
                        description: Indicates a unique identifier for this pipeline.
                        type: string
                      modified_at:
                        type: string
                        readOnly: true
                      name:
                        description: Indicates the name of the Pipeline.
                        maxLength: 128
                        minLength: 1
                        type: string
                      sql:
                        description: Specifies SQL for the Pipeline processing flow.
                        type: string
                      status:
                        description: Indicates the current status of the Pipeline.
                        type: string
                    required:
                    - id
                    - name
                    - created_at
                    - modified_at
                    - sql
                    - status
                    type: object
                  success:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkerPipelinesCommonSuccess'
                required:
                - success
                - result
                type: object
          description: Indicates a successfully created Pipeline.
        4XX:
          description: Indicates an error in creating a Pipeline.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create Pipeline
      tags:
      - workers_pipelines_other
      x-api-token-group:
      - Pipelines Write
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: pipelines
        resource_chain: []
        method: create_v1
  /accounts/{account_id}/pipelines/v1/pipelines/{pipeline_id}:
    delete:
      description: Delete Pipeline in Account.
      operationId: deleteV4AccountsByAccount_idPipelinesV1PipelinesByPipeline_id
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: pipeline_id
        schema:
          $ref: '#/components/schemas/cloudflarePipelinesWorkersPipelinesPipelineId'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    type: object
                  success:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkerPipelinesCommonSuccess'
                required:
                - success
                - result
                type: object
          description: Indicates a successfully deleted Pipeline.
        4XX:
          description: Indicates an error in listing Pipelines.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete Pipelines
      tags:
      - workers_pipelines_other
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: pipelines
        resource_chain: []
        method: delete_v1
    get:
      description: Get Pipelines Details.
      operationId: getV4AccountsByAccount_idPipelinesV1PipelinesByPipeline_id
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: pipeline_id
        schema:
          $ref: '#/components/schemas/cloudflarePipelinesWorkersPipelinesPipelineId'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      created_at:
                        type: string
                        readOnly: true
                      failure_reason:
                        description: Indicates the reason for the failure of the Pipeline.
                        type: string
                      id:
                        description: Indicates a unique identifier for this pipeline.
                        type: string
                      modified_at:
                        type: string
                        readOnly: true
                      name:
                        description: Indicates the name of the Pipeline.
                        maxLength: 128
                        minLength: 1
                        type: string
                      sql:
                        description: Specifies SQL for the Pipeline processing flow.
                        type: string
                      status:
                        description: Indicates the current status of the Pipeline.
                        type: string
                      tables:
                        description: List of streams and sinks used by this pipeline.
                        items:
                          properties:
                            id:
                              description: Unique identifier for the connection (stream or sink).
                              type: string
                            latest:
                              description: Latest available version of the connection.
                              type: integer
                            name:
                              description: Name of the connection.
                              maxLength: 128
                              minLength: 1
                              type: string
                            type:
                              description: Type of the connection.
                              enum:
                              - stream
                              - sink
                              type: string
                            version:
                              description: Current version of the connection used by this pipeline.
                              type: integer
                          required:
                          - id
                          - version
                          - latest
                          - type
                          - name
                          type: object
                        type: array
                    required:
                    - id
                    - name
                    - created_at
                    - modified_at
                    - sql
                    - status
                    - tables
                    type: object
                  success:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkerPipelinesCommonSuccess'
                required:
                - success
                - result
                type: object
          description: Indicates a successfully retrieved Pipeline.
        4XX:
          description: Indicates an error in retrieving Pipelines.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get Pipeline Details
      tags:
      - workers_pipelines_other
      x-api-token-group:
      - Pipelines Write
      - Pipelines Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: pipelines
        resource_chain: []
        method: get_v1
  /accounts/{account_id}/pipelines/v1/sinks:
    get:
      description: List/Filter Sinks in Account.
      operationId: getV4AccountsByAccount_idPipelinesV1Sinks
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: pipeline_id
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          type: number
      - in: query
        name: per_page
        schema:
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    items:
                      properties:
                        config:
                          description: Defines the configuration of the R2 Sink.
                          type: object
                          title: R2 Sink Public
                          properties:
                            account_id:
                              description: Cloudflare Account ID for the bucket
                              title: Account ID
                              type: string
                            bucket:
                              description: R2 Bucket to write to
                              title: Bucket
                              type: string
                            file_naming:
                              description: Controls filename prefix/suffix and strategy.
                              properties:
                                prefix:
                                  description: The prefix to use in file name. i.e prefix-<uuid>.parquet
                                  title: Filename Prefix
                                  type: string
                                strategy:
                                  description: Filename generation strategy.
                                  enum:
                                  - serial
                                  - uuid
                                  - uuid_v7
                                  - ulid
                                  title: Filename Strategy
                                  type: string
                                suffix:
                                  description: This will overwrite the default file suffix. i.e .parquet, use with caution
                                  title: Filename Suffix
                                  type: string
                              title: File Naming
                              type: object
                            jurisdiction:
                              description: Jurisdiction this bucket is hosted in
                              title: Jurisdiction
                              type: string
                            partitioning:
                              description: Data-layout partitioning for sinks.
                              properties:
                                time_pattern:
                                  description: The pattern of the date string
                                  title: Time Partition Pattern
                                  type: string
                              title: Partitioning Configuration
                              type: object
                            path:
                              description: Subpath within the bucket to write to
                              title: Path
                              type: string
                            rolling_policy:
                              description: Rolling policy for file sinks (when & why to close a file and open a new one).
                              properties:
                                file_size_bytes:
                                  description: Files will be rolled after reaching this number of bytes
                                  format: uint64
                                  minimum: 0
                                  title: File Size
                                  type: integer
                                inactivity_seconds:
                                  description: Number of seconds of inactivity to wait before rolling over to a new file
                                  format: uint64
                                  minimum: 1
                                  title: Inactivity Seconds
                                  type: integer
                                interval_seconds:
                                  description: Number of seconds to wait before rolling over to a new file
                                  format: uint64
                                  minimum: 1
                                  title: Interval Seconds
                                  type: integer
                              title: File Rolling Policy
                              type: object
                            namespace:
                              description: Table namespace
                              title: Namespace
                              type: string
                            table_name:
                              description: Table name
                              title: Table Name
                              type: string
                          required:
                          - account_id
                          - bucket
                        created_at:
                          format: date-time
                          type: string
                          readOnly: true
                        format:
                          $ref: '#/components/schemas/cloudflarePipelinesFormat'
                        id:
                          description: Indicates a unique identifier for this sink.
                          type: string
                        modified_at:
                          format: date-time
                          type: string
                          readOnly: true
                        name:
                          description: Defines the name of the Sink.
                          maxLength: 128
                          minLength: 1
                          type: string
                        schema:
                          $ref: '#/components/schemas/cloudflarePipelinesConnectionSchema'
                        type:
                          description: Specifies the type of sink.
                          enum:
                          - r2
                          - r2_data_catalog
                          type: string
                      required:
                      - id
                      - name
                      - created_at
                      - modified_at
                      - type
                      type: object
                    type: array
                  result_info:
                    properties:
                      count:
                        description: Indicates the number of items on current page.
                        type: number
                      page:
                        description: Indicates the current page number.
                        type: number
                      per_page:
                        description: Indicates the number of items per page.
                        type: number
                      total_count:
                        description: Indicates the total number of items.
                        type: number
                    required:
                    - count
                    - page
                    - per_page
                    - total_count
                    type: object
                  success:
                    $ref: '#/components/schemas/cloudflarePipelinesWorkerPipelinesCommonSuccess'
                required:
                - success
                - result
                - result_info
                type: object
          description: Indicates successfully listed Sinks.
        4XX:
          description: Indicates an error in listing Sinks.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Sinks
      tags:
      - workers_pipelines_other
      x-api-token-group:
      - Pipelines Write
      - Pipelines Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: true
      x-stackql-sdk:
        service: pipelines
        resource_chain:
        - sinks
        method: list
    post:
      description: Create a new Sink.
      operationId: postV4AccountsByAccount_idPipelinesV1Sinks
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                config:
                  description: Defines the configuration of the R2 Sink.
                  type: object
                  title: R2 Sink
                  properties:
                    account_id:
                      description: Cloudflare Account ID for the bucket
                      title: Account ID
                      type: string
                    bucket:
                      description: R2 Bucket to write to
                      title: Bucket
                      type: string
                    credentials:
                      properties:
                        access_key_id:
                          description: Cloudflare Account ID for the bucket
                          format: var-str
                          title: Access Key ID
                          type: string
                        secret_access_key:
                          description: Cloudflare Account ID for the bucket
                          format: var-str
                          title: Access Key ID
                          type: string
                          x-sensitive: true
                      required:
                      - access_key_id
                      - secret_access_key
                      title: R2 Credentials
                      type: object
                    file_naming:
                      description: Controls filename prefix/suffix and strategy.
                      properties:
                        prefix:
                          description: The prefix to use in file name. i.e prefix-<uuid>.parquet
                          title: Filename Prefix
                          type: string
                        strategy:
                          description: Filename generation strategy.
                          enum:
                          - serial
                          - uuid
                          - uuid_v7
                          - ulid
                          title: Filename Strategy
                          type: string
                        suffix:
                          description: This will overwrite the default file suffix. i.e .parquet, use with caution
                          title: Filename Suffix
                          type: string
                      title: File Naming
                      type: object
                    jurisdiction:
                      description: Jurisdiction this bucket is hosted in
                      title: Jurisdiction
                      type: string
                    partitioning:
                      description: Data-layout partitioning for sinks.
                      properties:
                        time_pattern:
                          description: The pattern of the date string
