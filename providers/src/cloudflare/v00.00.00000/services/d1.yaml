openapi: 3.0.3
info:
  title: d1 API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/d1/database:
    get:
      description: Returns a list of D1 databases.
      operationId: d1-list-databases
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: name
        schema:
          description: a database name to search for.
          type: string
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 1000
          description: Number of items per page.
          maximum: 10000
          minimum: 10
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/d1DatabaseResponse'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service
                        type: number
                      page:
                        description: Current page within paginated list of results
                        type: number
                      per_page:
                        description: Number of results per page of results
                        type: number
                      total_count:
                        description: Total results available without any search parameters
                        type: number
                    type: object
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: List D1 databases response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: List D1 databases response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List D1 Databases
      tags:
      - D1
      x-api-token-group:
      - D1 Read
      - D1 Write
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        method: list
    post:
      description: Returns the created D1 database.
      operationId: d1-create-database
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                jurisdiction:
                  $ref: '#/components/schemas/d1Jurisdiction'
                name:
                  $ref: '#/components/schemas/d1DatabaseName'
                primary_location_hint:
                  $ref: '#/components/schemas/d1PrimaryLocationHint'
              required:
              - name
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/d1DatabaseDetailsResponse'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Returns the created D1 database's metadata
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Database details response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create D1 Database
      tags:
      - D1
      x-api-token-group:
      - D1 Write
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        method: create
  /accounts/{account_id}/d1/database/{database_id}:
    delete:
      description: Deletes the specified D1 database.
      operationId: d1-delete-database
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    enum:
                    - null
                    nullable: true
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Delete D1 database response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Delete D1 database response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete D1 Database
      tags:
      - D1
      x-api-token-group:
      - D1 Write
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        method: delete
    get:
      description: Returns the specified D1 database.
      operationId: d1-get-database
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/d1DatabaseDetailsResponse'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Database details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Database details response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get D1 Database
      tags:
      - D1
      x-api-token-group:
      - D1 Read
      - D1 Write
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        method: get
    patch:
      description: Updates partially the specified D1 database.
      operationId: d1-update-partial-database
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/d1DatabaseUpdatePartialRequestBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/d1DatabaseDetailsResponse'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Database details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Update D1 database response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update D1 Database partially
      tags:
      - D1
      x-api-token-group:
      - D1 Write
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        method: edit
    put:
      description: Updates the specified D1 database.
      operationId: d1-update-database
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/d1DatabaseUpdateRequestBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/d1DatabaseDetailsResponse'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Database details response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Update D1 database response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update D1 Database
      tags:
      - D1
      x-api-token-group:
      - D1 Write
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        method: update
  /accounts/{account_id}/d1/database/{database_id}/export:
    post:
      description: 'Returns a URL where the SQL contents of your D1 can be downloaded. Note: this process may take some time for larger DBs, during which your D1 will be unavailable to serve queries. To avoid blocking your DB unnecessarily, an in-progress export must be continually polled or will automatically cancel.'
      operationId: d1-export-database
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                current_bookmark:
                  description: To poll an in-progress export, provide the current bookmark (returned by your first polling response)
                  type: string
                  x-auditable: true
                dump_options:
                  properties:
                    no_data:
                      description: Export only the table definitions, not their contents
                      type: boolean
                      x-auditable: true
                    no_schema:
                      description: Export only each table's contents, not its definition
                      type: boolean
                      x-auditable: true
                    tables:
                      description: 'Filter the export to just one or more tables. Passing an empty array is the same as not passing anything and means: export all tables.'
                      items:
                        type: string
                        x-auditable: true
                      type: array
                  type: object
                output_format:
                  description: Specifies that you will poll this endpoint until the export completes
                  enum:
                  - polling
                  type: string
                  x-auditable: true
              required:
              - output_format
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    properties:
                      at_bookmark:
                        description: The current time-travel bookmark for your D1, used to poll for updates. Will not change for the duration of the export task.
                        type: string
                        x-auditable: true
                      error:
                        description: Only present when status = 'error'. Contains the error message.
                        type: string
                        x-auditable: true
                      messages:
                        description: Logs since the last time you polled
                        items:
                          type: string
                          x-auditable: true
                        type: array
                      result:
                        description: Only present when status = 'complete'
                        properties:
                          filename:
                            description: The generated SQL filename.
                            type: string
                            x-auditable: true
                          signed_url:
                            description: The URL to download the exported SQL. Available for one hour.
                            type: string
                        type: object
                      status:
                        enum:
                        - complete
                        - error
                        type: string
                        x-auditable: true
                      success:
                        type: boolean
                        x-auditable: true
                      type:
                        enum:
                        - export
                        type: string
                        x-auditable: true
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Polled successfully, task no longer running (errored or complete)
        '202':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    properties:
                      at_bookmark:
                        description: The current time-travel bookmark for your D1, used to poll for updates. Will not change for the duration of the export task.
                        type: string
                        x-auditable: true
                      messages:
                        description: Logs since the last time you polled
                        items:
                          type: string
                          x-auditable: true
                        type: array
                      status:
                        enum:
                        - active
                        type: string
                        x-auditable: true
                      success:
                        type: boolean
                        x-auditable: true
                      type:
                        enum:
                        - export
                        type: string
                        x-auditable: true
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Polled successfully, task is currently running
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Poll failed (API error)
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Export D1 Database as SQL
      tags:
      - D1
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        method: export
  /accounts/{account_id}/d1/database/{database_id}/import:
    post:
      description: Generates a temporary URL for uploading an SQL file to, then instructing the D1 to import it and polling it for status updates. Imports block the D1 for their duration.
      operationId: d1-import-database
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              title: init
              properties:
                action:
                  description: Indicates you have a new SQL file to upload.
                  enum:
                  - init
                  type: string
                  x-auditable: true
                etag:
                  description: Required when action is 'init' or 'ingest'. An md5 hash of the file you're uploading. Used to check if it already exists, and validate its contents before ingesting.
                  type: string
                  x-auditable: true
                filename:
                  description: The filename you have successfully uploaded.
                  type: string
                  x-auditable: true
                current_bookmark:
                  description: This identifies the currently-running import, checking its status.
                  type: string
                  x-auditable: true
              required:
              - action
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    properties:
                      at_bookmark:
                        description: The current time-travel bookmark for your D1, used to poll for updates. Will not change for the duration of the import. Only returned if an import process is currently running or recently finished.
                        type: string
                        x-auditable: true
                      error:
                        description: Only present when status = 'error'. Contains the error message that prevented the import from succeeding.
                        type: string
                        x-auditable: true
                      filename:
                        description: Derived from the database ID and etag, to use in avoiding repeated uploads. Only returned when for the 'init' action.
                        type: string
                        x-auditable: true
                      messages:
                        description: Logs since the last time you polled
                        items:
                          type: string
                          x-auditable: true
                        type: array
                      result:
                        description: Only present when status = 'complete'
                        properties:
                          final_bookmark:
                            description: The time-travel bookmark if you need restore your D1 to directly after the import succeeded.
                            type: string
                            x-auditable: true
                          meta:
                            $ref: '#/components/schemas/d1QueryMeta'
                          num_queries:
                            description: The total number of queries that were executed during the import.
                            type: number
                            x-auditable: true
                        type: object
                      status:
                        enum:
                        - complete
                        - error
                        type: string
                        x-auditable: true
                      success:
                        type: boolean
                        x-auditable: true
                      type:
                        enum:
                        - import
                        type: string
                        x-auditable: true
                      upload_url:
                        description: The R2 presigned URL to use for uploading. Only returned when for the 'init' action.
                        type: string
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Successful action. Import is either ready to start, under way, or finished (succeeded or failed).
        '202':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    properties:
                      at_bookmark:
                        description: The current bookmark for your D1, used to poll for updates. Will not change for the duration of the import.
                        type: string
                        x-auditable: true
                      messages:
                        description: Logs since the last time you polled
                        items:
                          type: string
                          x-auditable: true
                        type: array
                      status:
                        enum:
                        - active
                        type: string
                        x-auditable: true
                      success:
                        type: boolean
                        x-auditable: true
                      type:
                        enum:
                        - import
                        type: string
                        x-auditable: true
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Polled successfully, task is currently running
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Poll failed (API error)
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Import SQL into your D1 Database
      tags:
      - D1
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        method: import_
  /accounts/{account_id}/d1/database/{database_id}/query:
    post:
      description: Returns the query result as an object.
      operationId: d1-query-database
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/d1BatchQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/d1QueryResultResponse'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Query response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Query response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Query D1 Database
      tags:
      - D1
      x-api-token-group:
      - D1 Read
      - D1 Write
  /accounts/{account_id}/d1/database/{database_id}/raw:
    post:
      description: Returns the query result rows as arrays rather than objects. This is a performance-optimized version of the /query endpoint.
      operationId: d1-raw-database-query
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/d1BatchQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/d1RawResultResponse'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Raw query response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Query response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Raw D1 Database query
      tags:
      - D1
      x-api-token-group:
      - D1 Read
      - D1 Write
  /accounts/{account_id}/d1/database/{database_id}/time_travel/bookmark:
    get:
      description: Retrieves the current bookmark, or the nearest bookmark at or before a provided timestamp. Bookmarks can be used with the restore endpoint to revert the database to a previous point in time.
      operationId: d1-time-travel-get-bookmark
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      - description: An optional ISO 8601 timestamp. If provided, returns the nearest available bookmark at or before this timestamp. If omitted, returns the current bookmark.
        in: query
        name: timestamp
        schema:
          $ref: '#/components/schemas/d1TimeTravelTimestamp'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    properties:
                      bookmark:
                        $ref: '#/components/schemas/d1TimeTravelBookmark'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Bookmark retrieved successfully
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Failed to retrieve bookmark
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get D1 database bookmark
      tags:
      - D1
      x-api-token-group:
      - D1 Read
      - D1 Write
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        - time_travel
        method: get_bookmark
  /accounts/{account_id}/d1/database/{database_id}/time_travel/restore:
    post:
      description: Restores a D1 database to a previous point in time either via a bookmark or a timestamp.
      operationId: d1-time-travel-restore
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: database_id
        in: path
        required: true
        description: The D1 database ID.
        schema:
          type: string
      - description: A bookmark to restore the database to. Required if `timestamp` is not provided.
        in: query
        name: bookmark
        schema:
          $ref: '#/components/schemas/d1TimeTravelBookmark'
      - description: An ISO 8601 timestamp to restore the database to. Required if `bookmark` is not provided.
        in: query
        name: timestamp
        schema:
          $ref: '#/components/schemas/d1TimeTravelTimestamp'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/d1Messages'
                  messages:
                    $ref: '#/components/schemas/d1Messages'
                  result:
                    type: object
                    $ref: '#/components/schemas/d1TimeTravelRestoreResponse'
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                type: object
          description: Database restored successfully
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/d1ApiResponseCommonFailure'
          description: Restore operation failed
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Restore D1 Database to a bookmark or point in time
      tags:
      - D1
      x-stackql-sdk:
        service: d1
        resource_chain:
        - database
        - time_travel
        method: restore
  /graphql/d1_analytics_adaptive_groups:
    post:
      operationId: graphql-d1_analytics_adaptive_groups-list
      summary: Cloudflare D1 database analytics for an account, grouped by database, serving instance, and region
      description: Cloudflare D1 database analytics for an account, grouped by database, serving instance, and region. Per-tuple totals for request count, read/write query counts, rows read/written, and response bytes.
      x-stackQL-graphQL:
        url: https://api.cloudflare.com/client/v4/graphql
        httpVerb: POST
        responseSelection:
          jsonPath: $.result[*]
        cursor:
          jsonPath: $.result[*].__no_cursor
        query: "query {\n  viewer {\n    accounts(filter: { accountTag: \"{{ .account_tag }}\" }, limit: 1) {\n      d1AnalyticsAdaptiveGroups(\n        filter: { datetime_geq: \"{{ .since }}\", datetime_lt: \"{{ .until }}\" }\n        limit: {{ if .limit }}{{ .limit }}{{ else }}100{{ end }}\n        orderBy: [datetimeMinute_ASC]\n      ) {\n        dimensions {\n          datetime: datetimeMinute\n          databaseId\n          databaseRole\n          servedByRegion\n        }\n        sum {\n          readQueries\n          writeQueries\n          rowsRead\n          rowsWritten\n          queryBatchResponseBytes\n        }\n        count\n      }\n    }\n  }\n}\n"
      x-stackql-protocol: graphql
      parameters:
      - name: account_tag
        in: path
        required: true
        schema:
          type: string
        description: Cloudflare account ID (the 32-char hex tag).
      - name: since
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Lower bound (inclusive). RFC3339.
      - name: until
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Upper bound (exclusive). RFC3339.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
        description: Maximum dimension-tuple rows per call.
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        datetime:
                          type: string
                          format: date-time
                        database_id:
                          type: string
                          description: D1 database UUID.
                        database_role:
                          type: string
                          description: Primary / replica role of the instance serving the request.
                        served_by_region:
                          type: string
                          description: Region of the D1 instance that served the request.
                        requests:
                          type: integer
                          description: Total D1 request count for the tuple.
                        read_queries:
                          type: integer
                          description: Read query count.
                        write_queries:
                          type: integer
                          description: Write query count.
                        rows_read:
                          type: integer
                          description: Rows read by queries.
                        rows_written:
                          type: integer
                          description: Rows written by queries.
                        query_batch_response_bytes:
                          type: integer
                          description: Total response bytes across batches.
components:
  schemas:
    d1ApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/d1Messages'
        messages:
          example: []
          $ref: '#/components/schemas/d1Messages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    d1BatchQuery:
      description: A single query object or a batch query object
      type: object
      title: single query
      properties:
        params:
          $ref: '#/components/schemas/d1Params'
        sql:
          $ref: '#/components/schemas/d1Sql'
