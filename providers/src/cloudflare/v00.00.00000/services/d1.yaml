          $ref: '#/components/schemas/d1JurisdictionNullable'
        name:
          $ref: '#/components/schemas/d1DatabaseName'
        num_tables:
          $ref: '#/components/schemas/d1TableCount'
        read_replication:
          $ref: '#/components/schemas/d1ReadReplicationDetails'
        uuid:
          $ref: '#/components/schemas/d1DatabaseIdentifier'
        version:
          $ref: '#/components/schemas/d1DatabaseVersion'
      type: object
    d1DatabaseIdentifier:
      description: D1 database identifier (UUID).
      example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
      readOnly: true
      type: string
      x-auditable: true
    d1DatabaseName:
      description: D1 database name.
      example: my-database
      type: string
      x-auditable: true
    d1DatabaseResponse:
      properties:
        created_at:
          $ref: '#/components/schemas/d1CreatedAt'
