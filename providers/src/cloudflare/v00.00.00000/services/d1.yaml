          $ref: '#/components/schemas/d1JurisdictionNullable'
        name:
          $ref: '#/components/schemas/d1DatabaseName'
        uuid:
          $ref: '#/components/schemas/d1DatabaseIdentifier'
        version:
          $ref: '#/components/schemas/d1DatabaseVersion'
      type: object
    d1DatabaseUpdatePartialRequestBody:
      properties:
        read_replication:
          description: Configuration for D1 read replication.
          properties:
            mode:
              $ref: '#/components/schemas/d1ReadReplicationMode'
          required:
          - mode
          type: object
      type: object
    d1DatabaseUpdateRequestBody:
      properties:
        read_replication:
          description: Configuration for D1 read replication.
          properties:
            mode:
              $ref: '#/components/schemas/d1ReadReplicationMode'
          required:
          - mode
          type: object
      required:
      - read_replication
      type: object
    d1DatabaseVersion:
      example: production
      type: string
      x-auditable: true
    d1FileSize:
      description: The D1 database's size, in bytes.
      example: 12
      type: number
      x-auditable: true
    d1Jurisdiction:
      description: Specify the location to restrict the D1 database to run and store data. If this option is present, the location hint is ignored.
      enum:
      - eu
      - fedramp
      example: eu
      type: string
      x-auditable: true
    d1JurisdictionNullable:
      description: Specify the location to restrict the D1 database to run and store data. If this option is present, the location hint is ignored.
      enum:
      - eu
      - fedramp
      example: eu
      nullable: true
      type: string
      x-auditable: true
    d1Messages:
      example: []
      items:
        $ref: '#/components/schemas/responseInfo'
      type: array
    d1Params:
      example:
      - firstParam
      - secondParam
      items:
        type: string
      type: array
    d1PrimaryLocationHint:
      description: Specify the region to create the D1 primary, if available. If this option is omitted, the D1 will be created as close as possible to the current user.
      enum:
      - wnam
      - enam
      - weur
      - eeur
      - apac
      - oc
      example: wnam
      type: string
      x-auditable: true
    d1QueryMeta:
      properties:
        changed_db:
          description: Denotes if the database has been altered in some way, like deleting rows.
          type: boolean
          x-auditable: true
        changes:
          description: Rough indication of how many rows were modified by the query, as provided by SQLite's `sqlite3_total_changes()`.
          type: number
          x-auditable: true
        duration:
          description: The duration of the SQL query execution inside the database. Does not include any network communication.
          type: number
          x-auditable: true
        last_row_id:
          description: The row ID of the last inserted row in a table with an `INTEGER PRIMARY KEY` as provided by SQLite. Tables created with `WITHOUT ROWID` do not populate this.
          type: number
          x-auditable: true
        rows_read:
          description: Number of rows read during the SQL query execution, including indices (not all rows are necessarily returned).
          type: number
          x-auditable: true
        rows_written:
          description: Number of rows written during the SQL query execution, including indices.
          type: number
          x-auditable: true
        served_by_colo:
          $ref: '#/components/schemas/d1ServedByColo'
        served_by_primary:
          description: Denotes if the query has been handled by the database primary instance.
          type: boolean
          x-auditable: true
        served_by_region:
          $ref: '#/components/schemas/d1ServedByRegion'
        size_after:
          description: Size of the database after the query committed, in bytes.
          type: number
          x-auditable: true
        timings:
          description: Various durations for the query.
          properties:
            sql_duration_ms:
              description: The duration of the SQL query execution inside the database. Does not include any network communication.
              type: number
              x-auditable: true
          type: object
      type: object
    d1QueryResultResponse:
      properties:
        meta:
          $ref: '#/components/schemas/d1QueryMeta'
        results:
          items:
            type: object
          type: array
        success:
          type: boolean
      type: object
    d1RawResultResponse:
      properties:
        meta:
          $ref: '#/components/schemas/d1QueryMeta'
        results:
          properties:
            columns:
              items:
                type: string
              type: array
            rows:
              items:
                items:
                  type: number
                type: array
              type: array
          type: object
        success:
          type: boolean
      type: object
    d1ReadReplicationDetails:
      description: Configuration for D1 read replication.
      properties:
        mode:
          $ref: '#/components/schemas/d1ReadReplicationMode'
      required:
      - mode
      type: object
    d1ReadReplicationMode:
      description: The read replication mode for the database. Use 'auto' to create replicas and allow D1 automatically place them around the world, or 'disabled' to not use any database replicas (it can take a few hours for all replicas to be deleted).
      enum:
      - auto
      - disabled
      example: auto
      type: string
      x-auditable: true
    d1ServedByColo:
      description: The three letters airport code of the colo that handled the query.
      example: LHR
      type: string
      x-auditable: true
    d1ServedByRegion:
      description: Region location hint of the database instance that handled the query.
