        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    items:
                      type: object
                      $ref: '#/components/schemas/realtimekitMeeting'
                    type: array
                  paging:
                    properties:
                      end_offset:
                        type: number
                      start_offset:
                        type: number
                      total_count:
                        minimum: 0
                        type: number
                    required:
                    - total_count
