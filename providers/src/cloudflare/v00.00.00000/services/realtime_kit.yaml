openapi: 3.0.3
info:
  title: realtime_kit API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/moq/relays:
    get:
      description: Lists all MoQ relays for the account. Returns only metadata. Config, status, and tokens are omitted.
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  success:
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/moqRelayListItem'
                    type: array
                  result_info:
                    $ref: '#/components/schemas/moqResultInfo'
                required:
                - success
                - errors
                - messages
                type: object
          description: Relay list retrieved successfully.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21006: Unexpected server error.'
      security:
      - api_token: []
      summary: List relays
      tags:
      - MoQ Relays
      operationId: get_accounts_account_id_moq_relays
    post:
      description: Provisions a new MoQ relay instance. Auto-creates a publish+subscribe token and a subscribe-only token. Token values are included in the response (shown once). Config is set to defaults (lingering subscribe enabled, 30s ceiling, origin fallback off). Use PUT to modify.
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: Human-readable name for the relay.
                  type: string
              required:
              - name
              type: object
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  success:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/moqRelayCreateResponse'
                required:
                - success
                - errors
                - messages
                type: object
          description: Relay created successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Bad request. Possible errors: - 21002: Request body too small (empty or missing name) - 21004: Failed to decode body (invalid JSON)'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21008: Relay limit exceeded for this account.'
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21001: Request body too large.'
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21006: Unexpected server error.'
      security:
      - api_token: []
      summary: Create a relay
      tags:
      - MoQ Relays
      operationId: post_accounts_account_id_moq_relays
  /accounts/{account_id}/moq/relays/{relay_id}:
    delete:
      description: Soft-deletes a MoQ relay.
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Relay unique identifier (32 hex characters).
        in: path
        name: relay_id
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  success:
                    type: boolean
                  result:
                    nullable: true
                    type: object
                required:
                - success
                - errors
                - messages
                type: object
          description: Relay deleted successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21003: Relay ID should be 32 hex characters.'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21007: Relay not found.'
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21006: Unexpected server error.'
      security:
      - api_token: []
      summary: Delete a relay
      tags:
      - MoQ Relays
      operationId: delete_accounts_account_id_moq_relays_relay_id
    get:
      description: Retrieves a single MoQ relay including config and status. Tokens are NOT included.
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Relay unique identifier (32 hex characters).
        in: path
        name: relay_id
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  success:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/moqRelay'
                required:
                - success
                - errors
                - messages
                type: object
          description: Relay retrieved successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21003: Relay ID should be 32 hex characters.'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21007: Relay not found.'
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21006: Unexpected server error.'
      security:
      - api_token: []
      summary: Get a relay
      tags:
      - MoQ Relays
      operationId: get_accounts_account_id_moq_relays_relay_id
    put:
      description: 'Updates a relay''s name and/or configuration. Partial updates: omitted fields are preserved. Config sub-objects replace as whole objects when present. origin_fallback and lingering_subscribe are mutually exclusive.'
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Relay unique identifier (32 hex characters).
        in: path
        name: relay_id
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              properties:
                config:
                  $ref: '#/components/schemas/moqRelayConfig'
                name:
                  type: string
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  success:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/moqRelay'
                required:
                - success
                - errors
                - messages
                type: object
          description: Relay updated successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Bad request. Possible errors: 21003 (relay ID should be 32 hex characters), 21004 (failed to decode body, invalid JSON), 21009 (origin_fallback and lingering_subscribe are mutually exclusive), 21011 (name must not be empty).'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21007: Relay not found.'
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21006: Unexpected server error.'
      security:
      - api_token: []
      summary: Update a relay
      tags:
      - MoQ Relays
      operationId: put_accounts_account_id_moq_relays_relay_id
  /accounts/{account_id}/moq/relays/{relay_id}/tokens/rotate:
    post:
      description: Generates a new token for the specified type. The old token is immediately invalidated. Token value is shown once in the response.
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Relay unique identifier (32 hex characters).
        in: path
        name: relay_id
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              properties:
                type:
                  description: Which token type to rotate.
                  enum:
                  - publish_subscribe
                  - subscribe
                  type: string
              required:
              - type
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          type: integer
                        message:
                          type: string
                      type: object
                    type: array
                  success:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/moqRotateTokenResponse'
                required:
                - success
                - errors
                - messages
                type: object
          description: Token rotated successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Bad request. Possible errors: 21003 (relay ID should be 32 hex characters), 21004 (failed to decode body, invalid JSON), 21010 (invalid token type).'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21007: Relay not found.'
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/moqApiResponseError'
          description: 'Error 21006: Unexpected server error.'
      security:
      - api_token: []
      summary: Rotate a token
      tags:
      - MoQ Relays
      operationId: post_accounts_account_id_moq_relays_relay_id_tokens_rotate
  /accounts/{account_id}/realtime/kit/apps:
    get:
      description: Fetch all apps for your account
      operationId: get_apps
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    items:
                      properties:
                        created_at:
                          type: string
                          readOnly: true
                        id:
                          type: string
                        name:
                          type: string
                      type: object
                    type: array
                  success:
                    type: boolean
                type: object
          description: OK
      security:
      - api_token: []
      summary: Fetch all apps
      tags:
      - Apps
      x-api-token-group:
      - Realtime Admin
      - Realtime
      x-stackql-sdk:
        service: realtime_kit
        resource_chain:
        - apps
        method: get
    post:
      description: Create new app for your account
      operationId: create_app
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
              required:
              - name
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      app:
                        properties:
                          created_at:
                            type: string
                            readOnly: true
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                    type: object
                  success:
                    type: boolean
                type: object
          description: OK
      security:
      - api_token: []
      summary: Create App
      tags:
      - Apps
      x-api-token-group:
      - Realtime Admin
      - Realtime
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      x-stackql-sdk:
        service: realtime_kit
        resource_chain:
        - apps
        method: post
  /accounts/{account_id}/realtime/kit/{app_id}/analytics/daywise:
    get:
      description: Returns day-wise session and recording analytics data of an App for the specified time range start_date to end_date. If start_date and end_date are not provided, the default time range is set from 30 days ago to the current date.
      operationId: get-org-analytics
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: app_id
        in: path
        required: true
        description: The Access application ID.
        schema:
          type: string
      - description: start date in YYYY-MM-DD format
        in: query
        name: start_date
        schema:
          type: string
      - description: end date in YYYY-MM-DD format
        in: query
        name: end_date
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      recording_stats:
                        description: Recording statistics of an App during the range specified
                        properties:
                          day_stats:
                            description: Day wise recording stats
                            items:
                              properties:
                                day:
                                  type: string
                                total_recording_minutes:
                                  description: Total recording minutes for a specific day
                                  type: integer
                                total_recordings:
                                  description: Total number of recordings for a specific day
                                  type: integer
                              type: object
                            type: array
                          recording_count:
                            description: Total number of recordings during the range specified
                            type: integer
                          recording_minutes_consumed:
                            description: Total recording minutes during the range specified
                            type: number
                        type: object
                      session_stats:
                        description: Session statistics of an App during the range specified
                        properties:
                          day_stats:
                            description: Day wise session stats
                            items:
                              properties:
                                day:
                                  type: string
                                total_session_minutes:
                                  description: Total session minutes for a specific day
                                  type: number
                                total_sessions:
                                  description: Total number of sessions for a specific day
                                  type: integer
                              type: object
                            type: array
                          sessions_count:
                            description: Total number of sessions during the range specified
                            type: integer
                          sessions_minutes_consumed:
                            description: Total session minutes during the range specified
                            type: number
                        type: object
                    type: object
                  success:
                    type: boolean
                type: object
          description: OK
      security:
      - api_token: []
      summary: Fetch day-wise session and recording analytics data for an App
      tags:
      - Analytics
      - Organizations
      x-api-token-group:
      - Realtime Admin
      - Realtime
      x-stackql-sdk:
        service: realtime_kit
        resource_chain:
        - analytics
        method: get_org_analytics
  /accounts/{account_id}/realtime/kit/{app_id}/analytics/livestreams/overall:
    get:
      description: Returns livestream analytics for the specified time range.
      operationId: get-livestream-analytics-complete
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: app_id
        in: path
        required: true
        description: The Access application ID.
        schema:
          type: string
      - description: Specify the start time range in ISO format to access the livestream analytics.
        in: query
        name: start_time
        schema:
          format: date-time
          type: string
      - description: Specify the end time range in ISO format to access the livestream analytics.
        in: query
        name: end_time
        schema:
          format: date-time
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      count:
                        description: Count of total livestreams.
                        type: integer
                      total_ingest_seconds:
                        description: Total time duration for which the input was given or the meeting was streamed.
                        type: integer
                      total_viewer_seconds:
                        description: Total view time for which the viewers watched the stream.
                        type: integer
                    type: object
                  success:
                    type: boolean
                type: object
          description: OK
      security:
      - api_token: []
      summary: Fetch complete analytics data for your livestreams
      tags:
      - Live streams
      - LivestreamAnalytics
      x-api-token-group:
      - Realtime Admin
      - Realtime
      x-stackql-sdk:
        service: realtime_kit
        resource_chain:
        - livestreams
        method: get_livestream_analytics_complete
  /accounts/{account_id}/realtime/kit/{app_id}/livestreams:
    get:
      description: Returns details of livestreams associated with the given App ID. It includes livestreams created by your App and RealtimeKit meetings that are livestreamed by your App. If you only want details of livestreams created by your App and not RealtimeKit meetings, you can use the `exclude_meetings` query parameter.
      operationId: fetch_all_livestreams
      parameters:
      - description: Exclude the RealtimeKit meetings that are livestreamed.
        in: query
        name: exclude_meetings
        schema:
          default: false
          type: boolean
      - description: Number of results per page.
        in: query
        name: per_page
        schema:
          type: integer
      - description: The page number from which you want your page search results to be displayed.
        in: query
        name: page_no
        schema:
          type: integer
      - description: Specifies the status of the operation.
        in: query
        name: status
        schema:
          enum:
          - LIVE
          - IDLE
          - ERRORED
          - INVOKED
          type: string
      - description: Specify the start time range in ISO format to access the live stream.
        in: query
        name: start_time
        schema:
          format: date-time
          type: string
      - description: Specify the end time range in ISO format to access the live stream.
        in: query
        name: end_time
        schema:
          format: date-time
          type: string
      - description: Specifies the sorting order for the results.
        in: query
        name: sort_order
        schema:
          enum:
          - ASC
          - DSC
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: app_id
        in: path
        required: true
        description: The Access application ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      created_at:
                        description: Timestamp the object was created at. The time is returned in ISO format.
                        format: date-time
                        type: string
                        readOnly: true
                      disabled:
                        description: Specifies if the livestream was disabled.
                        type: string
                      id:
                        description: The ID of the livestream.
                        format: uuid
                        type: string
                      ingest_server:
                        description: The server URL to which the RTMP encoder sends the video and audio data.
                        type: string
                      meeting_id:
                        description: ID of the meeting.
                        type: string
                      name:
                        description: Name of the livestream.
                        type: string
                      paging:
                        properties:
                          end_offset:
                            type: integer
                          start_offset:
                            type: integer
                          total_count:
                            type: integer
                        type: object
                      playback_url:
                        description: The web address that viewers can use to watch the livestream.
                        type: string
                      status:
                        enum:
                        - LIVE
                        - IDLE
                        - ERRORED
                        - INVOKED
                        type: string
                      stream_key:
                        description: Unique key for accessing each livestream.
                        type: string
                      updated_at:
                        description: Timestamp the object was updated at. The time is returned in ISO format.
                        format: date-time
                        type: string
                        readOnly: true
                    type: object
                  success:
                    type: boolean
                type: object
          description: OK
      security:
      - api_token: []
      summary: Fetch all livestreams
      tags:
      - Live streams
      x-api-token-group:
      - Realtime Admin
      - Realtime
      x-stackql-sdk:
        service: realtime_kit
        resource_chain:
        - livestreams
        method: get_all_livestreams
    post:
      description: Creates a livestream for the given App ID and returns ingest server, stream key, and playback URL. You can pass custom input to the ingest server and stream key, and freely distribute the content using the playback URL on any player that supports HLS/LHLS.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: Name of the livestream
                  nullable: true
                  type: string
              type: object
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      disabled:
                        description: Specifies if the livestream was disabled.
                        type: boolean
                      id:
                        description: The livestream ID.
                        type: string
                      ingest_server:
                        description: The server URL to which the RTMP encoder should send the video and audio data.
                        type: string
                      meeting_id:
                        nullable: true
                        type: string
                      name:
                        type: string
                      playback_url:
                        description: The web address that viewers can use to watch the livestream.
                        type: string
                      status:
                        enum:
                        - LIVE
                        - IDLE
                        - ERRORED
                        - INVOKED
                        type: string
                      stream_key:
                        description: Unique key for accessing each livestream.
                        type: string
                    type: object
                  success:
                    type: boolean
                type: object
          description: Successful response
      security:
      - api_token: []
      summary: Create an independent livestream
      tags:
      - Live streams
      x-api-token-group:
      - Realtime Admin
      - Realtime
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: app_id
        in: path
        required: true
        description: The Access application ID.
        schema:
          type: string
      x-stackql-sdk:
        service: realtime_kit
        resource_chain:
        - livestreams
        method: create_independent_livestream
      operationId: post_accounts_account_id_realtime_kit_app_id_livestreams
  /accounts/{account_id}/realtime/kit/{app_id}/livestreams/sessions/{livestream_session_id}:
    get:
