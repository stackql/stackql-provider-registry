    realtimekitWebhook:
      properties:
        created_at:
          description: Timestamp when this webhook was created
          example: '2022-05-28T07:01:53.075Z'
          format: date-time
          type: string
          readOnly: true
        enabled:
          description: Set to true if the webhook is active
          type: boolean
        events:
          description: Events this webhook will send updates for
          example:
          - meeting.started
          - meeting.ended
          - meeting.participantJoined
          - meeting.participantLeft
          - meeting.chatSynced
          - recording.statusUpdate
          - livestreaming.statusUpdate
          - meeting.transcript
          - meeting.summary
          items:
            enum:
            - meeting.started
            - meeting.ended
            - meeting.participantJoined
            - meeting.participantLeft
            - meeting.chatSynced
            - recording.statusUpdate
            - livestreaming.statusUpdate
            - meeting.transcript
            - meeting.summary
            type: string
          type: array
        id:
          description: ID of the webhook
          example: 0d1f069d-43bb-489a-ad8c-7eb95592ba8e
          format: uuid
          readOnly: true
          type: string
        name:
          description: Name of the webhook
          example: All events webhook
          type: string
        updated_at:
          description: Timestamp when this webhook was updated
          example: '2022-05-28T07:01:53.075Z'
          format: date-time
          type: string
          readOnly: true
        url:
          description: URL the webhook will send events to
          example: https://webhook.site/b23a5bbd-c7b0-4ced-a9e2-78ae7889897e
          format: uri
          type: string
      required:
      - id
      - name
      - url
      - events
      - created_at
      - updated_at
      - enabled
      type: object
    realtimekitWebhookRequest:
      properties:
        enabled:
          default: true
          description: Set whether or not the webhook should be active when created
          type: boolean
        events:
          description: Events that this webhook will get triggered by
          example:
          - meeting.started
          - meeting.ended
          - meeting.participantJoined
          - meeting.participantLeft
          - meeting.chatSynced
          - recording.statusUpdate
          - livestreaming.statusUpdate
          - meeting.transcript
          - meeting.summary
          items:
            enum:
            - meeting.started
            - meeting.ended
            - meeting.participantJoined
            - meeting.participantLeft
            - meeting.chatSynced
            - recording.statusUpdate
            - livestreaming.statusUpdate
            - meeting.transcript
            - meeting.summary
            type: string
          type: array
        name:
          description: Name of the webhook
          example: All events webhook
          type: string
        url:
          description: URL this webhook will send events to
          example: https://webhook.site/b23a5bbd-c7b0-4ced-a9e2-78ae7889897e
          format: uri
          type: string
      required:
      - name
      - url
      - events
      type: object
    realtimekitWebhookSuccessResponse:
      properties:
        data:
          $ref: '#/components/schemas/realtimekitWebhook'
        success:
          example: true
          type: boolean
      required:
      - success
      - data
      type: object
