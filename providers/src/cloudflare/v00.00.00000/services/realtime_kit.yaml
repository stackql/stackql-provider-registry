    post:
      description: Create a meeting for the given App ID.
      operationId: create_meeting
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: app_id
        in: path
        required: true
        description: The Access application ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                ai_config:
                  $ref: '#/components/schemas/realtimekitAIConfig'
                live_stream_on_start:
                  default: false
                  description: Specifies if the meeting should start getting livestreamed on start.
                  nullable: true
                  type: boolean
                persist_chat:
                  default: false
                  description: If a meeting is set to persist_chat, meeting chat would remain for a week within the meeting space.
                  type: boolean
                record_on_start:
                  default: false
                  description: Specifies if the meeting should start getting recorded as soon as someone joins the meeting.
                  nullable: true
                  type: boolean
