components:
  schemas:
    moqApiResponseError:
      properties:
        errors:
          example:
          - code: 21007
            message: A MoQ relay with this ID was not found.
          items:
            properties:
              code:
                description: "Error codes: - 21001: Request body too large (HTTP 413) - 21002: Request body too small / missing name (HTTP 400) - 21003: Relay ID should be 32 hex characters (HTTP 400) - 21004: Failed to decode body \u2014 invalid JSON (HTTP 400) - 21005: Failed to read body (HTTP 400) - 21006: Unexpected server error (HTTP 500) - 21007: Relay not found (HTTP 404) - 21008: Relay limit exceeded for this account (HTTP 409) - 21009: origin_fallback and lingering_subscribe are mutually exclusive (HTTP 400) - 21010: Invalid token type \u2014 must be \"publish_subscribe\" or \"subscribe\" (HTTP 400) - 21011: Invalid relay name \u2014 name must not be empty (HTTP 400)"
                type: integer
              message:
                type: string
            required:
            - code
            - message
            type: object
          type: array
        messages:
          items:
            type: object
          type: array
        result:
          nullable: true
          type: object
        success:
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      type: object
    moqLingeringSubscribeConfig:
      properties:
        enabled:
          default: true
          type: boolean
        max_timeout_ms:
          default: 30000
          description: Relay-level ceiling on lingering subscribe timeout (ms). Default 30000.
          maximum: 300000
          minimum: 0
          type: integer
      type: object
    moqOriginFallbackConfig:
      properties:
        enabled:
          default: false
          type: boolean
        urls:
          default: []
          description: Ordered list of upstream origin relay URLs.
          items:
            type: string
          type: array
      type: object
    moqRelay:
      description: Full relay details (no tokens).
      properties:
        config:
          $ref: '#/components/schemas/moqRelayConfig'
        created:
          format: date-time
          type: string
        modified:
          format: date-time
          type: string
        name:
          example: Production Live Stream
          type: string
        status:
          description: '"connected" when active, omitted otherwise.'
          enum:
          - connected
          type: string
        uid:
          example: a1b2c3d4e5f67890a1b2c3d4e5f67890
          type: string
      required:
      - uid
      - created
      - modified
      - name
      - config
      type: object
    moqRelayConfig:
      description: origin_fallback and lingering_subscribe are mutually exclusive.
      properties:
        lingering_subscribe:
          $ref: '#/components/schemas/moqLingeringSubscribeConfig'
        origin_fallback:
          $ref: '#/components/schemas/moqOriginFallbackConfig'
      type: object
    moqRelayCreateResponse:
      description: Relay with auto-generated tokens (shown once).
      properties:
        config:
          $ref: '#/components/schemas/moqRelayConfig'
        created:
          format: date-time
          type: string
        modified:
          format: date-time
          type: string
        name:
          example: Production Live Stream
          type: string
        token_publish_subscribe:
          description: Full access token (publish + subscribe). Treat as sensitive.
          example: eyJhbGciOiJFZDI1NTE5...
          type: string
        token_subscribe:
          description: Subscribe-only token. Treat as sensitive.
          example: eyJhbGciOiJFZDI1NTE5...
          type: string
        uid:
          description: Server-generated unique identifier (32 hex chars).
          example: a1b2c3d4e5f67890a1b2c3d4e5f67890
          type: string
      required:
      - uid
      - created
      - modified
      - name
      - token_publish_subscribe
      - token_subscribe
      - config
      type: object
    moqRelayListItem:
      description: Abbreviated relay for list responses.
      properties:
        created:
          format: date-time
          type: string
        modified:
          format: date-time
          type: string
        name:
          type: string
        uid:
          example: a1b2c3d4e5f67890a1b2c3d4e5f67890
          type: string
      required:
      - uid
      - created
      - modified
      - name
      type: object
    moqResultInfo:
      properties:
        count:
          type: integer
        total:
          type: integer
      type: object
    moqRotateTokenResponse:
      properties:
        token:
          description: New token value (shown once). Treat as sensitive.
          example: eyJhbGciOiJFZDI1NTE5...
          type: string
        type:
          enum:
          - publish_subscribe
          - subscribe
          type: string
      required:
      - type
      - token
      type: object
    realtimekitAIConfig:
      description: The AI Config allows you to customize the behavior of meeting transcriptions and summaries
      properties:
        summarization:
          $ref: '#/components/schemas/realtimekitSummarizationConfig'
        transcription:
          $ref: '#/components/schemas/realtimekitTranscriptionConfig'
      title: AIConfig
      type: object
    realtimekitActiveSession:
      properties:
        associated_id:
          description: ID of the meeting this session is associated with. In the case of V2 meetings, it is always a UUID. In V1 meetings, it is a room name of the form `abcdef-ghijkl`
          type: string
        breakout_rooms:
          items:
            $ref: '#/components/schemas/realtimekitActiveSession'
          readOnly: true
          type: array
        created_at:
          description: timestamp when session created
          type: string
          readOnly: true
        ended_at:
          description: timestamp when session ended
          type: string
        id:
          description: ID of the session
          readOnly: true
          type: string
        live_participants:
          description: number of participants currently in the session
          type: number
        max_concurrent_participants:
          description: number of maximum participants that were in the session
          type: number
        meeting_display_name:
          description: Title of the meeting this session belongs to
          type: string
        meta:
          description: Any meta data about session.
          type: object
        minutes_consumed:
          description: number of minutes consumed since the session started
          type: number
        organization_id:
          description: App id that hosted this session
          type: string
        started_at:
          description: timestamp when session started
          type: string
        status:
          description: current status of session
          enum:
          - LIVE
          - ENDED
          type: string
        type:
          description: type of session
          enum:
          - meeting
          - livestream
          - participant
          type: string
        updated_at:
          description: timestamp when session was last updated
          type: string
          readOnly: true
      required:
      - id
      - associated_id
      - meeting_display_name
      - type
      - status
      - live_participants
      - max_concurrent_participants
      - minutes_consumed
      - organization_id
      - started_at
      - created_at
      - updated_at
      type: object
    realtimekitAudioConfig:
      description: Object containing configuration regarding the audio that is being recorded.
      properties:
        channel:
          default: stereo
          description: Audio signal pathway within an audio file that carries a specific sound source.
          enum:
          - mono
          - stereo
          type: string
        codec:
          default: AAC
          description: Codec using which the recording will be encoded. If VP8/VP9 is selected for videoConfig, changing audioConfig is not allowed. In this case, the codec in the audioConfig is automatically set to vorbis.
          enum:
          - MP3
          - AAC
          type: string
        export_file:
          default: true
          description: Controls whether to export audio file seperately
          type: boolean
      title: AudioConfig
      type: object
    realtimekitChatMessage:
      properties:
        chat_download_url:
          description: URL where the chat logs can be downloaded
          type: string
        chat_download_url_expiry:
          description: Time when the download URL will expire
          type: string
      required:
      - chat_download_url
      - chat_download_url_expiry
      type: object
    realtimekitErrorResponse:
      properties:
        error:
          description: Object containing details of the error that occurred
          properties:
            code:
              description: Error code
              example: 404
              type: number
            message:
              description: Error message
              example: 'Error: resource not found'
              type: string
          required:
          - code
          - message
          type: object
        success:
          description: Whether the operation succeeded or not
          example: false
          type: boolean
      required:
      - success
      - error
      type: object
    realtimekitGenericErrorResponse:
      properties:
        error:
          properties:
            code:
              description: HTTP status code of the error.
              type: number
            message:
              description: Error message describing what went wrong.
              type: string
          required:
          - code
          - message
          type: object
        success:
          default: false
          description: Success status of the request.
          type: boolean
      required:
      - success
      - error
      type: object
    realtimekitInteractiveConfig:
      description: Allows you to add timed metadata to your recordings, which are digital markers inserted into a video file to provide contextual information at specific points in the content range. The ID3 tags containing this information are available to clients on the playback timeline in HLS format. The output files are generated in a compressed .tar format.
      properties:
        type:
          description: The metadata is presented in the form of ID3 tags.
          enum:
          - ID3
          type: string
      title: InteractiveConfig
      type: object
    realtimekitLivestreamingConfig:
      properties:
        rtmp_url:
          description: RTMP URL to stream to
          example: rtmp://a.rtmp.youtube.com/live2
          format: uri
          type: string
      title: LivestreamingConfig
      type: object
    realtimekitMeeting:
      properties:
        created_at:
          description: Timestamp the object was created at. The time is returned in ISO format.
          format: date-time
          readOnly: true
          type: string
        id:
          description: ID of the meeting.
          format: uuid
          readOnly: true
          type: string
        live_stream_on_start:
          description: Specifies if the meeting should start getting livestreamed on start.
          type: boolean
        persist_chat:
          description: Specifies if Chat within a meeting should persist for a week.
          type: boolean
        record_on_start:
          description: Specifies if the meeting should start getting recorded as soon as someone joins the meeting.
          type: boolean
        session_keep_alive_time_in_secs:
          default: 60
          description: Time in seconds, for which a session remains active, after the last participant has left the meeting.
          maximum: 600
          minimum: 60
          type: number
        status:
          description: Whether the meeting is `ACTIVE` or `INACTIVE`. Users will not be able to join an `INACTIVE` meeting.
          enum:
          - ACTIVE
          - INACTIVE
          type: string
        summarize_on_end:
          description: Automatically generate summary of meetings using transcripts. Requires Transcriptions to be enabled, and can be retrieved via Webhooks or summary API.
          type: boolean
        title:
          description: Title of the meeting.
          type: string
        updated_at:
          description: Timestamp the object was updated at. The time is returned in ISO format.
          format: date-time
          readOnly: true
          type: string
      required:
      - id
      - created_at
      - updated_at
      type: object
    realtimekitParticipant:
      description: Represents a participant.
      properties:
        created_at:
          description: When this object was created. The time is returned in ISO format.
          format: date-time
          type: string
          readOnly: true
        custom_participant_id:
          description: A unique participant ID generated by the client.
          type: string
        id:
          description: ID of the participant.
          format: uuid
          type: string
        name:
          description: Name of the participant.
          nullable: true
          type: string
        picture:
          description: URL to a picture of the participant.
          format: uri
          nullable: true
          type: string
        preset_name:
          description: Preset applied to the participant.
          type: string
        updated_at:
          description: When this object was updated. The time is returned in ISO format.
          format: date-time
          type: string
          readOnly: true
      required:
      - id
      - custom_participant_id
      - preset_name
      - created_at
      - updated_at
      title: Participant
      type: object
    realtimekitParticipantsList:
      properties:
        created_at:
          description: timestamp when this participant was created.
          type: string
          readOnly: true
        custom_participant_id:
          description: ID passed by client to create this participant.
          type: string
        display_name:
          description: Display name of participant when joining the session.
          type: string
        duration:
          description: number of minutes for which the participant was in the session.
          type: number
        id:
          description: Participant ID. This maps to the corresponding peerId.
          type: string
        joined_at:
          description: timestamp at which participant joined the session.
          type: string
        left_at:
          description: timestamp at which participant left the session.
          type: string
        preset_name:
          description: Name of the preset associated with the participant.
          type: string
        updated_at:
          description: timestamp when this participant's data was last updated.
          type: string
          readOnly: true
        user_id:
          description: User id for this participant.
          type: string
      type: object
    realtimekitPatchWebhookRequest:
      properties:
        enabled:
          default: true
          type: boolean
        events:
          description: Events that the webhook will get triggered by
          items:
            enum:
            - meeting.started
            - meeting.ended
            - meeting.participantJoined
            - meeting.participantLeft
            - recording.statusUpdate
            - livestreaming.statusUpdate
            - meeting.chatSynced
            - meeting.transcript
            - meeting.summary
            type: string
          type: array
        name:
          description: Name of the webhook
          type: string
        url:
          description: URL the webhook will send events to
          example: https://webhook.site/b23a5bbd-c7b0-4ced-a9e2-78ae7889897e
          format: uri
          type: string
      type: object
    realtimekitPoll:
      properties:
        anonymous:
          type: boolean
        created_by:
          type: string
        hide_votes:
          type: boolean
        id:
          description: ID of the poll
          readOnly: true
          type: string
        options:
          description: Answer options
          items:
            properties:
              count:
                type: number
              text:
                description: Text of the answer option
                type: string
              votes:
                items:
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                  required:
                  - id
                  - name
                  type: object
                type: array
            required:
            - text
            - count
            - votes
            type: object
          type: array
        question:
          description: Question asked by the poll
          type: string
        voted:
          items:
            type: string
          type: array
      required:
      - id
      - question
      - options
      type: object
    realtimekitPreset:
      properties:
        config:
          properties:
            max_screenshare_count:
              description: Maximum number of screen shares that can be active at a given time
              type: integer
            max_video_streams:
              description: Maximum number of streams that are visible on a device
              properties:
                desktop:
                  description: Maximum number of video streams visible on desktop devices
                  type: integer
                mobile:
                  description: Maximum number of streams visible on mobile devices
                  type: integer
              required:
              - mobile
              - desktop
              type: object
            media:
              description: 'Media configuration options. eg: Video quality'
              properties:
                audio:
                  description: Control options for Audio quality.
                  properties:
                    enable_high_bitrate:
                      default: false
                      description: Enable High Quality Audio for your meetings
                      type: boolean
                    enable_stereo:
                      default: false
                      description: Enable Stereo for your meetings
                      type: boolean
                  type: object
                screenshare:
                  description: Configuration options for participant screen shares
                  properties:
                    frame_rate:
                      description: Frame rate of screen share
                      type: integer
                    quality:
                      description: Quality of screen share
                      enum:
                      - hd
                      - vga
                      - qvga
                      type: string
                  required:
                  - quality
                  - frame_rate
                  type: object
                video:
                  description: Configuration options for participant videos
                  properties:
                    frame_rate:
                      description: Frame rate of participants' video
                      maximum: 30
                      type: integer
                    quality:
                      description: Video quality of participants
                      enum:
                      - hd
                      - vga
                      - qvga
                      type: string
                  required:
                  - quality
                  - frame_rate
                  type: object
              required:
              - video
              - screenshare
              type: object
            view_type:
              description: Type of the meeting
              enum:
              - GROUP_CALL
              - WEBINAR
              - AUDIO_ROOM
              type: string
          required:
          - view_type
          - max_video_streams
          - max_screenshare_count
          - media
          type: object
        name:
          description: Name of the preset
          type: string
        permissions:
          properties:
            accept_waiting_requests:
              description: Whether this participant can accept waiting requests
              type: boolean
            can_accept_production_requests:
              type: boolean
            can_change_participant_permissions:
              type: boolean
            can_edit_display_name:
              type: boolean
            can_livestream:
              type: boolean
            can_record:
              type: boolean
            can_spotlight:
              type: boolean
            chat:
              description: Chat permissions
              properties:
                private:
                  properties:
                    can_receive:
                      type: boolean
                    can_send:
                      type: boolean
                    files:
                      type: boolean
                    text:
                      type: boolean
                  required:
                  - can_send
                  - can_receive
                  - text
                  - files
                  type: object
                public:
                  properties:
                    can_send:
                      description: Can send messages in general
                      type: boolean
                    files:
                      description: Can send file messages
                      type: boolean
                    text:
                      description: Can send text messages
                      type: boolean
                  required:
                  - can_send
                  - text
                  - files
                  type: object
              required:
              - public
              - private
              type: object
            connected_meetings:
              properties:
                can_alter_connected_meetings:
                  type: boolean
                can_switch_connected_meetings:
                  type: boolean
                can_switch_to_parent_meeting:
                  type: boolean
              required:
              - can_alter_connected_meetings
              - can_switch_connected_meetings
              - can_switch_to_parent_meeting
              type: object
            disable_participant_audio:
              type: boolean
            disable_participant_screensharing:
              type: boolean
            disable_participant_video:
              type: boolean
            hidden_participant:
              description: Whether this participant is visible to others or not
              type: boolean
            is_recorder:
              default: false
              type: boolean
            kick_participant:
              type: boolean
            media:
              description: Media permissions
              properties:
                audio:
                  description: Audio permissions
                  properties:
                    can_produce:
                      description: Can produce audio
                      enum:
                      - ALLOWED
                      - NOT_ALLOWED
                      - CAN_REQUEST
                      type: string
                  required:
                  - can_produce
                  type: object
                screenshare:
                  description: Screenshare permissions
                  properties:
                    can_produce:
                      description: Can produce screen share video
                      enum:
                      - ALLOWED
                      - NOT_ALLOWED
                      - CAN_REQUEST
                      type: string
                  required:
                  - can_produce
                  type: object
                video:
                  description: Video permissions
                  properties:
                    can_produce:
                      description: Can produce video
                      enum:
                      - ALLOWED
                      - NOT_ALLOWED
                      - CAN_REQUEST
                      type: string
                  required:
                  - can_produce
                  type: object
              required:
              - video
              - audio
              - screenshare
              type: object
            pin_participant:
              type: boolean
            plugins:
              description: Plugin permissions
              properties:
                can_close:
                  description: Can close plugins that are already open
                  type: boolean
                can_edit_config:
                  description: Can edit plugin config
                  type: boolean
                can_start:
                  description: Can start plugins
                  type: boolean
                config:
                  type: string
                  format: uuid
                  properties:
                    access_control:
                      enum:
                      - FULL_ACCESS
                      - VIEW_ONLY
                      type: string
                    handles_view_only:
                      type: boolean
                  required:
                  - handles_view_only
                  - access_control
              required:
              - can_close
              - can_start
              - can_edit_config
              - config
              type: object
            polls:
              description: Poll permissions
              properties:
                can_create:
                  description: Can create polls
                  type: boolean
                can_view:
                  description: Can view polls
                  type: boolean
                can_vote:
                  description: Can vote on polls
                  type: boolean
              required:
              - can_create
              - can_vote
              - can_view
              type: object
            recorder_type:
              default: NONE
              description: Type of the recording peer
              enum:
              - RECORDER
              - LIVESTREAMER
              - NONE
              type: string
            show_participant_list:
              type: boolean
            waiting_room_type:
              description: Waiting room type
              enum:
              - SKIP
              - ON_PRIVILEGED_USER_ENTRY
              - SKIP_ON_ACCEPT
              type: string
          required:
          - accept_waiting_requests
          - can_accept_production_requests
          - can_edit_display_name
          - can_spotlight
          - recorder_type
          - disable_participant_audio
          - disable_participant_screensharing
          - disable_participant_video
          - kick_participant
          - pin_participant
          - can_record
          - can_livestream
          - waiting_room_type
          - plugins
          - connected_meetings
          - polls
          - media
          - chat
          - hidden_participant
          - show_participant_list
          - can_change_participant_permissions
          type: object
        ui:
          properties:
            config_diff:
              type: object
            design_tokens:
              properties:
                border_radius:
                  enum:
                  - rounded
                  type: string
                border_width:
                  enum:
                  - thin
                  type: string
                colors:
                  properties:
                    background:
                      properties:
                        '600':
                          default: '#222222'
                          type: string
                        '700':
                          default: '#1f1f1f'
                          type: string
                        '800':
                          default: '#1b1b1b'
                          type: string
                        '900':
                          default: '#181818'
                          type: string
                        '1000':
                          default: '#141414'
                          type: string
                      required:
                      - '600'
                      - '700'
                      - '800'
                      - '900'
                      - '1000'
                      type: object
                    brand:
                      properties:
                        '300':
                          default: '#844d1c'
                          type: string
                        '400':
                          default: '#9d5b22'
                          type: string
                        '500':
                          default: '#b56927'
                          type: string
                        '600':
                          default: '#d37c30'
                          type: string
                        '700':
                          default: '#d9904f'
                          type: string
                      required:
                      - '300'
                      - '400'
                      - '500'
                      - '600'
                      - '700'
                      type: object
                    danger:
                      default: '#FF2D2D'
                      type: string
                    success:
                      default: '#62A504'
                      type: string
                    text:
                      default: '#EEEEEE'
                      type: string
                    text_on_brand:
                      default: '#EEEEEE'
                      type: string
                    video_bg:
                      default: '#191919'
                      type: string
                    warning:
                      default: '#FFCD07'
                      type: string
                  required:
                  - brand
                  - background
                  - danger
                  - text
                  - text_on_brand
                  - success
                  - video_bg
                  - warning
                  type: object
                logo:
                  type: string
                spacing_base:
                  default: 4
                  type: number
                theme:
                  enum:
                  - dark
                  type: string
              required:
              - border_radius
              - border_width
              - spacing_base
              - theme
              - colors
              - logo
              type: object
          required:
          - design_tokens
          type: object
      required:
      - name
      - config
      - ui
      title: Preset
      type: object
    realtimekitPresetListItem:
      description: Returned by Get All Presets route
      properties:
        created_at:
          description: Timestamp this preset was created at
          format: date-time
          type: string
          readOnly: true
        id:
          description: ID of the preset
          format: uuid
          type: string
        name:
          description: Name of the preset
          type: string
        updated_at:
          description: Timestamp this preset was last updated
          format: date-time
          type: string
          readOnly: true
      title: PresetListItem
      type: object
    realtimekitRealtimekitBucketConfig:
      properties:
        enabled:
          description: Controls whether recordings are uploaded to RealtimeKit's bucket. If set to false, `download_url`, `audio_download_url`, `download_url_expiry` won't be generated for a recording.
          type: boolean
      required:
      - enabled
      title: realtimekitBucketConfig
      type: object
    realtimekitRecording:
      properties:
        audio_download_url:
          description: If the audio_config is passed, the URL for downloading the audio recording is returned.
          format: uri
          nullable: true
          readOnly: true
          type: string
        download_url:
          description: URL where the recording can be downloaded.
          format: uri
          nullable: true
          readOnly: true
          type: string
        download_url_expiry:
          description: Timestamp when the download URL expires.
          format: date-time
          nullable: true
          readOnly: true
          type: string
        file_size:
          description: File size of the recording, in bytes.
          nullable: true
          readOnly: true
          type: number
        id:
          description: ID of the recording
          format: uuid
          readOnly: true
          type: string
        invoked_time:
          description: Timestamp when this recording was invoked.
          format: date-time
          type: string
        output_file_name:
          description: File name of the recording.
          type: string
        recording_duration:
          description: Total recording time in seconds.
          type: integer
        session_id:
          description: ID of the meeting session this recording is for.
          format: uuid
          nullable: true
          readOnly: true
          type: string
        started_time:
          description: Timestamp when this recording actually started after being invoked. Usually a few seconds after `invoked_time`.
          format: date-time
          nullable: true
          type: string
        status:
          description: Current status of the recording.
          enum:
          - INVOKED
          - RECORDING
          - UPLOADING
          - UPLOADED
          - ERRORED
          - PAUSED
          type: string
        stopped_time:
          description: Timestamp when this recording was stopped. Optional; is present only when the recording has actually been stopped.
          format: date-time
          nullable: true
          type: string
      required:
      - id
      - download_url
      - download_url_expiry
      - audio_download_url
      - file_size
      - session_id
      - output_file_name
      - status
      - invoked_time
      - started_time
      - stopped_time
      title: Recording
      type: object
    realtimekitRecordingConfig:
      description: Recording Configurations to be used for this meeting. This level of configs takes higher preference over App level configs on the RealtimeKit developer portal.
      properties:
        audio_config:
          $ref: '#/components/schemas/realtimekitAudioConfig'
        file_name_prefix:
          description: Adds a prefix to the beginning of the file name of the recording.
          type: string
        live_streaming_config:
          $ref: '#/components/schemas/realtimekitLivestreamingConfig'
        max_seconds:
          description: Specifies the maximum duration for recording in seconds, ranging from a minimum of 60 seconds to a maximum of 24 hours.
          maximum: 86400
          minimum: 60
          type: number
        realtimekit_bucket_config:
          $ref: '#/components/schemas/realtimekitRealtimekitBucketConfig'
        storage_config:
          $ref: '#/components/schemas/realtimekitStorageConfig'
        video_config:
          $ref: '#/components/schemas/realtimekitVideoConfig'
      title: RecordingConfig
      type: object
    realtimekitSessionParticipant:
      properties:
        created_at:
          type: string
          readOnly: true
        email:
          description: Email of the session participant.
          type: string
        id:
          description: ID of the session participant
          type: string
        name:
          description: Name of the session participant.
          type: string
        picture:
          description: A URL pointing to a picture of the participant.
          type: string
        updated_at:
          type: string
          readOnly: true
      required:
      - id
      - created_at
      - updated_at
      title: SessionParticipant
      type: object
    realtimekitStartReason:
      properties:
        caller:
          properties:
            name:
              description: Name of the user who started the recording.
              example: RealtimeKit_test
              type: string
            type:
              description: The type can be an App or a user. If the type is `user`, then only the `user_Id` and `name` are returned.
              enum:
              - ORGANIZATION
              - USER
              type: string
            user_Id:
              description: The user ID of the person who started the recording.
              example: d61f6956-e68f-4375-bf10-c38a704d1bec
              format: uuid
              type: string
          type: object
        reason:
          description: Specifies if the recording was started using the "Start a Recording"API or using the parameter RECORD_ON_START in the "Create a meeting" API. If the recording is initiated using the "RECORD_ON_START" parameter, the user details will not be populated.
          enum:
          - API_CALL
          - RECORD_ON_START
          type: string
      title: startReason
      type: object
    realtimekitStopReason:
      properties:
        caller:
          properties:
            name:
              description: Name of the user who stopped the recording.
              example: RealtimeKit_test
              type: string
            type:
              description: The type can be an App or a user. If the type is `user`, then only the `user_Id` and `name` are returned.
              enum:
              - ORGANIZATION
              - USER
              type: string
            user_Id:
              description: The user ID of the person who stopped the recording.
              example: d61f6956-e68f-4375-bf10-c38a704d1bec
              format: uuid
              type: string
          type: object
        reason:
          description: Specifies the reason why the recording stopped.
          enum:
          - API_CALL
          - INTERNAL_ERROR
          - ALL_PEERS_LEFT
          type: string
      title: stopReason
      type: object
    realtimekitStorageConfig:
      nullable: true
      properties:
        access_key:
          description: Access key of the storage medium. Access key is not required for the `gcs` storage media type. Note that this field is not readable by clients, only writeable.
          type: string
          writeOnly: true
        auth_method:
          description: Authentication method used for "sftp" type storage medium
          enum:
          - KEY
          - PASSWORD
          type: string
        bucket:
          description: Name of the storage medium's bucket.
          type: string
        host:
          description: SSH destination server host for SFTP type storage medium
          type: string
        password:
          description: SSH destination server password for SFTP type storage medium when auth_method is "PASSWORD". If auth_method is "KEY", this specifies the password for the ssh private key.
          type: string
        path:
          description: Path relative to the bucket root at which the recording will be placed.
          type: string
        port:
          description: SSH destination server port for SFTP type storage medium
          type: number
        private_key:
          description: Private key used to login to destination SSH server for SFTP type storage medium, when auth_method used is "KEY"
          type: string
        region:
          description: Region of the storage medium.
          example: us-east-1
          type: string
        secret:
          description: Secret key of the storage medium. Similar to `access_key`, it is only writeable by clients, not readable.
          type: string
        type:
          description: Type of storage media.
          enum:
          - aws
          - azure
          - digitalocean
          - gcs
          - sftp
          type: string
        username:
          description: SSH destination server username for SFTP type storage medium
          type: string
      required:
      - type
      title: StorageConfig
      type: object
    realtimekitSummarizationConfig:
      description: Summary Config
      properties:
        summary_type:
          default: general
          description: Defines the style of the summary, such as general, team meeting, or sales call.
          enum:
          - general
          - team_meeting
          - sales_call
          - client_check_in
          - interview
          - daily_standup
          - one_on_one_meeting
          - lecture
          - code_review
          type: string
        text_format:
          default: markdown
          description: Determines the text format of the summary, such as plain text or markdown.
          enum:
          - plain_text
          - markdown
          type: string
        word_limit:
          default: 500
          description: Sets the maximum number of words in the meeting summary.
          maximum: 1000
          minimum: 150
          type: integer
      title: SummarizationConfig
      type: object
    realtimekitTranscript:
      properties:
        sessionId:
          type: string
        transcript_download_url:
          description: URL where the transcript can be downloaded
          type: string
        transcript_download_url_expiry:
          description: Time when the download URL will expire
          type: string
      required:
      - sessionId
      - transcript_download_url
      - transcript_download_url_expiry
      type: object
    realtimekitTranscriptSummary:
      properties:
        sessionId:
          type: string
        summaryDownloadUrl:
          description: URL where the summary of transcripts can be downloaded
          type: string
        summaryDownloadUrlExpiry:
          description: Time of Expiry before when you need to download the csv file.
