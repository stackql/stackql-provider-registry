openapi: 3.0.3
info:
  title: custom_nameservers API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /accounts/{account_id}/custom_ns:
    get:
      description: List an account's custom nameservers.
      operationId: account-level-custom-nameservers-list-account-custom-nameservers
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/dnsCustomNameserversAcnsResponseCollection
          description: List Account Custom Nameservers response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/dnsCustomNameserversMessages'
                  messages:
                    $ref: '#/components/schemas/dnsCustomNameserversMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/dnsCustomNameserversCustomNS'
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List Account Custom Nameservers response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Account Custom Nameservers
      tags:
        - Account-Level Custom Nameservers
      x-api-token-group:
        - Account Settings Write
        - Account Settings Read
      x-cfPermissionsRequired:
        enum:
          - '#organization:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: custom_nameservers
        resource_chain: []
        method: get
    post:
      operationId: account-level-custom-nameservers-add-account-custom-nameserver
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dnsCustomNameserversCustomNSInput'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dnsCustomNameserversAcnsResponseSingle'
          description: Add Account Custom Nameserver response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/dnsCustomNameserversMessages'
                  messages:
                    $ref: '#/components/schemas/dnsCustomNameserversMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    description: A single account custom nameserver.
                    properties:
                      dns_records:
                        description: A and AAAA records associated with the nameserver.
                        items:
                          properties:
                            type:
                              description: DNS record type.
                              enum:
                                - A
                                - AAAA
                              type: string
                              x-auditable: true
                            value:
                              description: DNS record contents (an IPv4 or IPv6 address).
                              type: string
                              x-auditable: true
                          type: object
                        type: array
                        x-stainless-collection-type: set
                      ns_name:
                        $ref: '#/components/schemas/dnsCustomNameserversNsName'
                      ns_set:
                        $ref: '#/components/schemas/dnsCustomNameserversNsSet'
                      status:
                        deprecated: true
                        description: Verification status of the nameserver.
                        enum:
                          - moved
                          - pending
                          - verified
                        type: string
                        x-auditable: true
                      zone_tag:
                        $ref: >-
                          #/components/schemas/dnsCustomNameserversSchemasIdentifier
                    required:
                      - dns_records
                      - ns_name
                      - status
                      - zone_tag
                    title: Custom NS
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Add Account Custom Nameserver response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Add Account Custom Nameserver
      tags:
        - Account-Level Custom Nameservers
      x-api-token-group:
        - Account Settings Write
      x-cfPermissionsRequired:
        enum:
          - '#organization:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: custom_nameservers
        resource_chain: []
        method: create
  /accounts/{account_id}/custom_ns/{custom_ns_id}:
    delete:
      operationId: account-level-custom-nameservers-delete-account-custom-nameserver
      parameters:
        - in: path
          name: custom_ns_id
          schema:
            $ref: '#/components/schemas/dnsCustomNameserversNsName'
          required: true
        - name: account_id
          in: path
          required: true
          description: The Cloudflare account ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dnsCustomNameserversEmptyResponse'
          description: Delete Account Custom Nameserver response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/dnsCustomNameserversMessages'
                  messages:
                    $ref: '#/components/schemas/dnsCustomNameserversMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                    type: object
                  result:
                    $ref: >-
                      #/components/schemas/unnamedSchemaRef619309774d07ec6904f1e354560d6028
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Delete Account Custom Nameserver response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Account Custom Nameserver
      tags:
        - Account-Level Custom Nameservers
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: false
        pro: false
components:
  schemas:
    dnsCustomNameserversAcnsResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/dnsCustomNameserversMessages'
        messages:
          $ref: '#/components/schemas/dnsCustomNameserversMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/dnsCustomNameserversCustomNS'
          type: array
      required:
        - success
        - errors
        - messages
    dnsCustomNameserversAcnsResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/dnsCustomNameserversMessages'
        messages:
          $ref: '#/components/schemas/dnsCustomNameserversMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/dnsCustomNameserversCustomNS'
      required:
        - success
        - errors
        - messages
    dnsCustomNameserversCustomNS:
      description: A single account custom nameserver.
      properties:
        dns_records:
          description: A and AAAA records associated with the nameserver.
          items:
            properties:
              type:
                description: DNS record type.
                enum:
                  - A
                  - AAAA
                example: A
                type: string
                x-auditable: true
              value:
                description: DNS record contents (an IPv4 or IPv6 address).
                example: 1.1.1.1
                type: string
                x-auditable: true
            type: object
          type: array
          x-stainless-collection-type: set
        ns_name:
          $ref: '#/components/schemas/dnsCustomNameserversNsName'
        ns_set:
          $ref: '#/components/schemas/dnsCustomNameserversNsSet'
        status:
          deprecated: true
          description: Verification status of the nameserver.
          enum:
            - moved
            - pending
            - verified
          example: verified
          type: string
          x-auditable: true
        zone_tag:
          $ref: '#/components/schemas/dnsCustomNameserversSchemasIdentifier'
      required:
        - dns_records
        - ns_name
        - status
        - zone_tag
      title: Custom NS
      type: object
    dnsCustomNameserversCustomNSInput:
      properties:
        ns_name:
          $ref: '#/components/schemas/dnsCustomNameserversNsName'
        ns_set:
          $ref: '#/components/schemas/dnsCustomNameserversNsSet'
      required:
        - ns_name
      title: Custom NS Input
      type: object
    dnsCustomNameserversEmptyResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/dnsCustomNameserversMessages'
        messages:
          $ref: '#/components/schemas/dnsCustomNameserversMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
          type: object
        result:
          items:
            description: Unused
            type: string
            x-auditable: true
          maxItems: 0
          type: array
      required:
        - success
        - errors
        - messages
    dnsCustomNameserversMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    dnsCustomNameserversNsName:
      description: The FQDN of the name server.
      example: ns1.example.com
      format: hostname
      type: string
      x-auditable: true
    dnsCustomNameserversNsSet:
      default: 1
      description: The number of the set that this name server belongs to.
      example: 1
      maximum: 5
      minimum: 1
      type: number
      x-auditable: true
    dnsCustomNameserversSchemasIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    unnamedSchemaRef619309774d07ec6904f1e354560d6028:
      items:
        description: Unused
        type: string
        x-auditable: true
      maxItems: 0
      type: array
      enum:
        - null
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    custom_ns:
      id: cloudflare.custom_nameservers.custom_ns
      name: custom_ns
      title: Custom Ns
      methods:
        list:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1custom_ns/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1custom_ns/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        account_level_custom_nameservers_delete_account_custom_nameserver:
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1custom_ns~1{custom_ns_id}/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/custom_ns/methods/list'
        insert:
          - $ref: '#/components/x-stackQL-resources/custom_ns/methods/create'
        update: []
        delete:
          - $ref: >-
              #/components/x-stackQL-resources/custom_ns/methods/account_level_custom_nameservers_delete_account_custom_nameserver
        replace: []
