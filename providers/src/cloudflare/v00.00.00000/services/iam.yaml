components:
  schemas:
    iamAccess:
      description: Allow or deny operations against the resources.
      enum:
      - allow
      - deny
      example: allow
      type: string
      x-auditable: true
    iamApiResponseCommon:
      properties:
        errors:
          $ref: '#/components/schemas/iamSchemasMessages'
        messages:
          $ref: '#/components/schemas/iamSchemasMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
      required:
      - success
      - errors
      - messages
      type: object
    iamApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/iamSchemasMessages'
        messages:
          example: []
          $ref: '#/components/schemas/iamSchemasMessages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    iamApiResponseSingle:
      type: object
      $ref: '#/components/schemas/iamApiResponseCommon'
    iamApiResponseSingleId:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/iamSchemasMessages'
        messages:
          $ref: '#/components/schemas/iamSchemasMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          nullable: true
          properties:
            id:
              $ref: '#/components/schemas/iamCommonComponentsSchemasIdentifier'
          required:
          - id
          type: object
      required:
      - success
      - errors
      - messages
    iamCollectionPermissionGroupsResponse:
      title: List of Resource groups
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/iamSchemasMessages'
        messages:
          $ref: '#/components/schemas/iamSchemasMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result_info:
          $ref: '#/components/schemas/iamResultInfo'
        result:
          $ref: '#/components/schemas/iamPermissionGroups'
      required:
      - success
      - errors
      - messages
    iamCommonComponentsSchemasIdentifier:
      description: Identifier
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      minLength: 32
      type: string
      x-auditable: true
    iamCreateResourceGroupScopeScopeKey:
      description: This is a combination of pre-defined resource name and identifier (like Account ID etc.)
      example: com.cloudflare.api.account.eb78d65290b24279ba6f44721b3ea3c4
      type: string
    iamCreateResourceGroupScopeScopeObject:
      description: A scope object represents any resource that can have actions applied against invite.
      properties:
        key:
          $ref: '#/components/schemas/iamCreateResourceGroupScopeScopeObjectKey'
      required:
      - key
      type: object
    iamCreateResourceGroupScopeScopeObjectKey:
      description: This is a combination of pre-defined resource name and identifier (like Zone ID etc.)
      example: com.cloudflare.api.account.zone.23f8d65290b24279ba6f44721b3eaad5
      type: string
    iamCreateScope:
      description: A scope is a combination of scope objects which provides additional context.
      properties:
        key:
          $ref: '#/components/schemas/iamCreateResourceGroupScopeScopeKey'
        objects:
          description: A list of scope objects for additional context. The number of Scope objects should not be zero.
          items:
            $ref: '#/components/schemas/iamCreateResourceGroupScopeScopeObject'
          type: array
      required:
      - key
      - objects
      type: object
    iamCreateUserGroupBody:
      properties:
        name:
          description: Name of the User group.
          example: My New User Group
          type: string
          x-auditable: true
        policies:
          description: Policies attached to the User group
          items:
            $ref: '#/components/schemas/iamUserGroupPolicyWriteBody'
          title: User Group Policies
          type: array
      required:
      - name
      title: Create User group with a set of policies
      type: object
    iamDnsVerificationCode:
      description: DNS verification code. Add this entire string to the DNS TXT record of the email domain to validate ownership.
      example: cloudflare_dashboard_sso=023e105f4ecef8ad9ca31a8372d0c353
      type: string
    iamEmail:
      description: The contact email address of the user.
      example: user@example.com
      maxLength: 90
      type: string
      x-auditable: true
    iamPermissionGroup:
      description: A named group of permissions that map to a group of operations against resources.
      properties:
        id:
          description: Identifier of the permission group.
          example: 6d7f2f5f5b1d4a0e9081fdc98d432fd1
          type: string
          x-auditable: true
        meta:
          description: Attributes associated to the permission group.
          example:
            label: load_balancer_admin
            scopes: com.cloudflare.api.account
          properties:
            key:
              type: string
              x-auditable: true
            value:
              type: string
              x-auditable: true
          type: object
        name:
          description: Name of the permission group.
          example: Load Balancer
          readOnly: true
          type: string
          x-auditable: true
      required:
      - id
      type: object
    iamPermissionGroupIdentifier:
      description: Permission Group identifier tag.
      title: Permission Group Identifier
      $ref: '#/components/schemas/iamCommonComponentsSchemasIdentifier'
    iamPermissionGroupIds:
      description: A set of permission groups that are specified to the policy.
      example:
      - id: c8fed203ed3043cba015a93ad1616f1f
      - id: 82e64a83756745bbbb1c9c2701bf816b
      items:
        description: A named group of permissions that map to a group of operations against resources.
        properties:
          id:
            $ref: '#/components/schemas/iamPermissionGroupIdentifier'
        required:
        - id
        type: object
      title: Permission Group IDs
      type: array
    iamPermissionGroups:
      description: A set of permission groups that are specified to the policy.
      example:
      - id: c8fed203ed3043cba015a93ad1616f1f
        meta:
          label: load_balancer_admin
          scopes: com.cloudflare.api.account
        name: Zone Read
      - id: 82e64a83756745bbbb1c9c2701bf816b
        meta:
          label: fbm_user
          scopes: com.cloudflare.api.account
        name: Magic Network Monitoring
      items:
        $ref: '#/components/schemas/iamPermissionGroup'
      type: array
    iamPolicyIdentifier:
