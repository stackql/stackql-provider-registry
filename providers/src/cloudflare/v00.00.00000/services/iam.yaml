      type: object
    iamResourceGroupIdentifier:
      description: Resource Group identifier tag.
      title: Resource Group Identifier
      $ref: '#/components/schemas/iamCommonComponentsSchemasIdentifier'
    iamResourceGroupIds:
      description: A set of resource groups that are specified to the policy.
      example:
      - id: 6d7f2f5f5b1d4a0e9081fdc98d432fd1
      items:
        description: A group of scoped resources.
        properties:
          id:
            $ref: '#/components/schemas/iamResourceGroupIdentifier'
        required:
        - id
