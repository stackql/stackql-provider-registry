openapi: 3.0.3
info:
  title: page_rules API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones/{zone_id}/pagerules:
    get:
      description: Fetches Page Rules in a zone.
      operationId: page-rules-list-page-rules
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      - in: query
        name: order
        schema:
          default: priority
          description: The field used to sort returned Page Rules.
          enum:
          - status
          - priority
          type: string
      - in: query
        name: direction
        schema:
          default: desc
          description: The direction used to sort returned Page Rules.
          enum:
          - asc
          - desc
          type: string
      - in: query
        name: match
        schema:
          default: all
          description: When set to `all`, all the search requirements must match. When set to `any`, only one of the search requirements has to match.
          enum:
          - any
          - all
          type: string
      - in: query
        name: status
        schema:
          default: disabled
          description: The status of the Page Rule.
          enum:
          - active
          - disabled
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/zonesPageRule'
                    type: array
                required:
                - success
                - errors
                - messages
                type: object
          description: List Page Rules response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesSchemasApiResponseCommonFailure'
          description: List Page Rules response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Page Rules
      tags:
      - Page Rules
      x-api-token-group:
      - Zone Read
      - Zone Write
      - Page Rules Write
      - Page Rules Read
      x-stackql-sdk:
        service: page_rules
        resource_chain: []
        method: list
    post:
      description: Creates a new Page Rule.
      operationId: page-rules-create-a-page-rule
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                actions:
                  $ref: '#/components/schemas/zonesActions'
                priority:
                  $ref: '#/components/schemas/zonesPriority'
                status:
                  $ref: '#/components/schemas/zonesStatus'
                targets:
                  $ref: '#/components/schemas/zonesTargets'
              required:
              - targets
              - actions
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/zonesPageRule'
                required:
                - success
                - errors
                - messages
          description: Create a Page Rule response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesSchemasApiResponseCommonFailure'
          description: Create a Page Rule response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a Page Rule
      tags:
      - Page Rules
      x-api-token-group:
      - Zone Write
      - Page Rules Write
      x-stackql-sdk:
        service: page_rules
        resource_chain: []
        method: create
  /zones/{zone_id}/pagerules/settings:
    get:
      deprecated: true
      description: Returns a list of settings (and their details) that Page Rules can apply to matching requests.
      operationId: available-page-rules-settings-list-available-page-rules-settings
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/zonesSettings'
                required:
                - success
                - errors
                - messages
                type: object
          description: List available Page Rules settings response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesSchemasApiResponseCommonFailure'
          description: List available Page Rules settings response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List available Page Rules settings
      tags:
      - Available Page Rules settings
      x-api-token-group:
      - Zone Read
      - Zone Write
      - Page Rules Write
      - Page Rules Read
  /zones/{zone_id}/pagerules/{pagerule_id}:
    delete:
      description: Deletes an existing Page Rule.
      operationId: page-rules-delete-a-page-rule
      parameters:
      - in: path
        name: pagerule_id
        schema:
          $ref: '#/components/schemas/zonesSchemasIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesSchemasApiResponseSingleId'
          description: Delete a Page Rule response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesSchemasApiResponseCommonFailure'
          description: Delete a Page Rule response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete a Page Rule
      tags:
      - Page Rules
      x-api-token-group:
      - Zone Write
      - Page Rules Write
      x-stackql-sdk:
        service: page_rules
        resource_chain: []
        method: delete
    get:
      description: Fetches the details of a Page Rule.
      operationId: page-rules-get-a-page-rule
      parameters:
      - in: path
        name: pagerule_id
        schema:
          $ref: '#/components/schemas/zonesSchemasIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/zonesPageRule'
                required:
                - success
                - errors
                - messages
          description: Get a Page Rule response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesSchemasApiResponseCommonFailure'
          description: Get a Page Rule response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get a Page Rule
      tags:
      - Page Rules
      x-api-token-group:
      - Trust and Safety Write
      - Trust and Safety Read
      - 'Zero Trust: PII Read'
      - Zaraz Edit
      - Zaraz Read
      - Zaraz Admin
      - 'Access: Apps and Policies Revoke'
      - 'Access: Apps and Policies Write'
      - 'Access: Apps and Policies Read'
      - 'Access: Apps and Policies Revoke'
      - 'Access: Mutual TLS Certificates Write'
      - 'Access: Organizations, Identity Providers, and Groups Write'
      - Zone Settings Write
      - Zone Settings Read
      - Zone Read
      - DNS Read
      - Workers Scripts Write
      - Workers Scripts Read
      - Zone Write
      - Workers Routes Write
      - Workers Routes Read
      - Stream Write
      - Stream Read
      - SSL and Certificates Write
      - SSL and Certificates Read
      - Logs Write
      - Logs Read
      - Cache Purge
      - Page Rules Write
      - Page Rules Read
      - Load Balancers Write
      - Load Balancers Read
      - Firewall Services Write
      - Firewall Services Read
      - DNS Write
      - Apps Write
      - Analytics Read
      - 'Access: Apps and Policies Write'
      - 'Access: Apps and Policies Read'
      x-stackql-sdk:
        service: page_rules
        resource_chain: []
        method: get
    patch:
      description: Updates one or more fields of an existing Page Rule.
      operationId: page-rules-edit-a-page-rule
      parameters:
      - in: path
        name: pagerule_id
        schema:
          $ref: '#/components/schemas/zonesSchemasIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                actions:
                  $ref: '#/components/schemas/zonesActions'
                priority:
                  $ref: '#/components/schemas/zonesPriority'
                status:
                  $ref: '#/components/schemas/zonesStatus'
                targets:
                  $ref: '#/components/schemas/zonesTargets'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/zonesPageRule'
                required:
                - success
                - errors
                - messages
          description: Edit a Page Rule response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesSchemasApiResponseCommonFailure'
          description: Edit a Page Rule response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Edit a Page Rule
      tags:
      - Page Rules
      x-api-token-group:
      - Zone Write
      - Page Rules Write
      x-stackql-sdk:
        service: page_rules
        resource_chain: []
        method: edit
    put:
      description: Replaces the configuration of an existing Page Rule. The configuration of the updated Page Rule will exactly match the data passed in the API request.
      operationId: page-rules-update-a-page-rule
      parameters:
      - in: path
        name: pagerule_id
        schema:
          $ref: '#/components/schemas/zonesSchemasIdentifier'
        required: true
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                actions:
                  $ref: '#/components/schemas/zonesActions'
                priority:
                  $ref: '#/components/schemas/zonesPriority'
                status:
                  $ref: '#/components/schemas/zonesStatus'
                targets:
                  $ref: '#/components/schemas/zonesTargets'
              required:
              - targets
              - actions
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  messages:
                    $ref: '#/components/schemas/zonesSchemasMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/zonesPageRule'
                required:
                - success
                - errors
                - messages
          description: Update a Page Rule response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zonesSchemasApiResponseCommonFailure'
          description: Update a Page Rule response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update a Page Rule
      tags:
      - Page Rules
      x-api-token-group:
      - Zone Write
      - Page Rules Write
      x-stackql-sdk:
        service: page_rules
        resource_chain: []
        method: update
components:
  schemas:
    zonesActions:
      description: The set of actions to perform if the targets of this rule match the request. Actions can redirect to another URL or override settings, but not both.
      example:
      - id: browser_check
        value: 'on'
      items:
        type: object
        title: Always Use HTTPS
        properties:
          id:
            description: If enabled, any `http://`` URL is converted to `https://` through a 301 redirect.
            enum:
            - always_use_https
            type: string
            x-auditable: true
          value:
            description: The status of Automatic HTTPS Rewrites.
            enum:
            - 'on'
            - 'off'
            example: 'on'
            type: string
            x-auditable: true
      type: array
      x-stainless-skip:
      - terraform
    zonesCreatedOn:
      description: The timestamp of when the Page Rule was created.
      example: '2014-01-01T05:20:00.12345Z'
      format: date-time
      readOnly: true
      type: string
      x-auditable: true
    zonesModifiedOn:
      description: The timestamp of when the Page Rule was last modified.
      example: '2014-01-01T05:20:00.12345Z'
      format: date-time
      readOnly: true
      type: string
      x-auditable: true
    zonesPageRule:
      properties:
        actions:
          $ref: '#/components/schemas/zonesActions'
        created_on:
          $ref: '#/components/schemas/zonesCreatedOn'
          readOnly: true
        id:
          $ref: '#/components/schemas/zonesSchemasIdentifier'
        modified_on:
          $ref: '#/components/schemas/zonesModifiedOn'
          readOnly: true
        priority:
          $ref: '#/components/schemas/zonesPriority'
        status:
          $ref: '#/components/schemas/zonesStatus'
        targets:
          $ref: '#/components/schemas/zonesTargets'
      required:
      - id
      - targets
      - actions
      - priority
      - status
      - modified_on
      - created_on
      type: object
    zonesPriority:
      default: 1
      description: 'The priority of the rule, used to define which Page Rule is processed over another. A higher number indicates a higher priority. For example, if you have a catch-all Page Rule (rule A: `/images/*`) but want a more specific Page Rule to take precedence (rule B: `/images/special/*`), specify a higher priority for rule B so it overrides rule A.'
      type: integer
      x-auditable: true
    zonesSchemasApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/zonesSchemasMessages'
        messages:
          example: []
          $ref: '#/components/schemas/zonesSchemasMessages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    zonesSchemasApiResponseSingleId:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/zonesSchemasMessages'
        messages:
          $ref: '#/components/schemas/zonesSchemasMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          nullable: true
          properties:
            id:
              $ref: '#/components/schemas/zonesSchemasIdentifier'
          required:
          - id
          type: object
      required:
      - success
      - errors
      - messages
    zonesSchemasIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    zonesSchemasMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
        - code
        - message
        type: object
        uniqueItems: true
      type: array
    zonesSettings:
      description: Settings available for the zone.
      example:
      - id: browser_check
        properties:
        - name: value
          type: toggle
      - id: browser_cache_ttl
        properties:
        - max: 31536000
          min: 1800
          name: value
          suggested_values:
          - 1800
          - 3600
          - 7200
          - 10800
          - 14400
          - 18000
          - 28800
          - 43200
          - 57600
          - 72000
          - 86400
          - 172800
          - 259200
          - 345600
          - 432000
          - 691200
          - 1382400
          - 2073600
          - 2678400
          - 5356800
          - 16070400
          - 31536000
          type: range
      - id: browser_check
        properties:
        - name: value
          type: toggle
      - id: cache_key_fields
        properties:
        - name: value
          properties:
          - allowEmpty: true
            choices:
            - include
            - exclude
            multiple: false
            name: query_string
            type: select
          - allowEmpty: true
            choices:
            - include
            - exclude
            - check_presence
            multiple: true
            name: header
            type: select
          - allowEmpty: false
            choices:
            - resolved
            multiple: true
            name: host
            type: select
          - allowEmpty: true
            choices:
            - include
            - check_presence
            multiple: true
            name: cookie
            type: select
          - allowEmpty: false
            choices:
            - device_type
            - geo
            - lang
            multiple: true
            name: user
            type: select
          type: object
      - id: cache_deception_armor
        properties:
        - name: value
          type: toggle
      - id: cache_level
        properties:
        - choices:
          - bypass
          - basic
          - simplified
          - aggressive
          - cache_everything
          multiple: false
          name: value
          type: select
      - id: cache_ttl_by_status
        properties:
        - allowEmpty: false
          name: value
          type: object
      - id: disable_apps
        properties: []
      - id: disable_performance
        properties: []
      - id: disable_security
        properties: []
      - id: edge_cache_ttl
        properties:
        - max: 2419200
          min: 7200
          name: value
          suggested_values:
          - 7200
          - 10800
          - 14400
          - 18000
          - 28800
          - 43200
          - 57600
          - 72000
          - 86400
          - 172800
          - 259200
          - 345600
          - 432000
          - 518400
          - 604800
          - 1209600
          - 2419200
          type: range
      - id: email_obfuscation
        properties:
        - name: value
          type: toggle
      - id: forwarding_url
        properties:
        - choices:
          - 301
          - 302
          multiple: false
          name: status_code
          type: choice
        - name: url
          type: forwardingUrl
      - id: ip_geolocation
        properties:
        - name: value
          type: toggle
      - id: explicit_cache_control
        properties:
        - name: value
          type: toggle
      - id: rocket_loader
        properties:
        - name: value
          type: toggle
      - id: security_level
        properties:
        - choices:
          - essentially_off
          - low
          - medium
          - high
          - under_attack
          multiple: false
          name: value
          type: select
      - id: server_side_exclude
        properties:
        - name: value
          type: toggle
      - id: ssl
        properties:
        - choices:
          - 'off'
          - flexible
          - full
          - strict
          multiple: false
          name: value
          type: choice
      items:
        type: object
      type: array
    zonesStatus:
      default: disabled
      description: The status of the Page Rule.
      enum:
      - active
      - disabled
      example: active
      type: string
      x-auditable: true
    zonesTarget:
      description: A request condition target.
      $ref: '#/components/schemas/zonesUrlTarget'
    zonesTargets:
      description: The rule targets to evaluate on each request.
      example:
      - constraint:
          operator: matches
          value: '*example.com/images/*'
        target: url
      items:
        $ref: '#/components/schemas/zonesTarget'
      type: array
      x-stainless-skip:
      - terraform
    zonesUrlTarget:
      description: URL target.
      properties:
        constraint:
          description: String constraint.
          type: object
          properties:
            operator:
              default: contains
              description: The matches operator can use asterisks and pipes as wildcard and 'or' operators.
              enum:
              - matches
              - contains
              - equals
              - not_equal
              - not_contain
              x-auditable: true
              type: string
            value:
              description: The URL pattern to match against the current request. The pattern may contain up to four asterisks ('*') as placeholders.
              type: string
              x-auditable: true
              example: '*example.com/images/*'
          required:
          - operator
          - value
        target:
          description: A target based on the URL of the request.
          enum:
          - url
          example: url
          x-auditable: true
          type: string
      type: object
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: The preferred authorization scheme for interacting with the Cloudflare API. [Create a token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: Used when interacting with the Origin CA certificates API. [View/change your key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    pagerules:
      id: cloudflare.page_rules.pagerules
      name: pagerules
      title: Pagerules
      methods:
        list:
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1pagerules/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1pagerules/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
