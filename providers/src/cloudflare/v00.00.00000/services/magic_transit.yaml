  /accounts/{account_id}/magic/cf_interconnects:
    get:
      description: Lists interconnects associated with an account.
      operationId: magic-interconnects-list-interconnects
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: If true, the health check target in the response body will be presented using the new object format. Defaults to false.
        in: header
        name: x-magic-new-hc-target
        schema:
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/magicComponentsSchemasTunnelsCollectionResponse'
          description: List interconnects response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/magicMessages'
                  messages:
                    $ref: '#/components/schemas/magicMessages'
                  result:
                    properties:
                      interconnects:
                        items:
                          $ref: '#/components/schemas/magicInterconnect'
                        type: array
                    type: object
                    enum:
                    - null
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: List interconnects response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List interconnects
      tags:
      - Magic Interconnects
      x-api-token-group:
      - Magic WAN Write
      - Magic WAN Read
      - Magic Transit Read
      - Magic Transit Write
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: magic_transit
        resource_chain:
        - cf_interconnects
        method: list
    put:
      description: Updates multiple interconnects associated with an account. Use `?validate_only=true` as an optional query parameter to only run validation without persisting changes.
      operationId: magic-interconnects-update-multiple-interconnects
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: If true, the health check target in the request and response bodies will be presented using the new object format. Defaults to false.
        in: header
        name: x-magic-new-hc-target
        schema:
          type: boolean
      requestBody:
        content:
          application/json:
            schema: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/magicComponentsSchemasModifiedTunnelsCollectionResponse'
          description: Update multiple interconnects response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/magicMessages'
                  messages:
                    $ref: '#/components/schemas/magicMessages'
                  result:
                    properties:
                      modified:
                        type: boolean
                      modified_interconnects:
                        items:
                          $ref: '#/components/schemas/magicInterconnect'
                        type: array
                    type: object
                    enum:
                    - null
                  success:
                    description: Whether the API call was successful
                    enum:
                    - true
                    - false
                    type: boolean
                required:
                - success
                - errors
                - messages
                - result
                - success
                - errors
                - messages
                - result
          description: Update multiple interconnects response failure
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update multiple interconnects
      tags:
      - Magic Interconnects
      x-api-token-group:
      - Magic WAN Write
      - Magic Transit Write
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: magic_transit
        resource_chain:
        - cf_interconnects
        method: bulk_update
