openapi: 3.0.3
info:
  title: magic_transit API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/magic/advanced_dns_protection/configs/dns_protection/rules:
    delete:
      description: Delete all DNS Protection rules for an account.
      operationId: deleteDnsProtectionRulesForAccount
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommon'
          description: Delete all DNS Protection rules response.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete all DNS Protection rules.
      tags:
      - dos-flowtrackd-api_other
      x-api-token-group:
      - DDoS Protection Write
    get:
      description: List all DNS Protection rules for an account.
      operationId: listDnsProtectionRulesForAccount
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: The page number for pagination. Defaults to 1.
        explode: false
        in: query
        name: page
        schema:
          format: int64
          type: integer
          x-auditable: true
      - description: The number of items per page. Must be between 10 and 1000. Defaults to 25.
        explode: false
        in: query
        name: per_page
        schema:
          format: int64
          type: integer
          x-auditable: true
      - description: The field to order by. Defaults to 'prefix'.
        explode: false
        in: query
        name: order
        schema:
          type: string
          x-auditable: true
      - description: The direction of ordering (ASC or DESC). Defaults to 'ASC'.
        explode: false
        in: query
        name: direction
        schema:
          type: string
          x-auditable: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosDnsProtectionRuleListResponse'
          description: List all DNS Protection rules response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommonFailure'
          description: List all DNS Protection rules failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List all DNS Protection rules.
      tags:
      - dos-flowtrackd-api_other
      x-api-token-group:
      - DDoS Protection Write
      - DDoS Protection Read
    post:
      description: Create a DNS Protection rule for an account.
      operationId: createDnsProtectionRule
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dosNewDnsProtectionRule'
        description: The new DNS Protection rule to add.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosDnsProtectionRuleResponse'
          description: Create DNS Protection rule response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommonFailure'
          description: Create DNS Protection rule failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create DNS Protection rule.
      tags:
      - dos-flowtrackd-api_other
      x-api-token-group:
      - DDoS Protection Write
  /accounts/{account_id}/magic/advanced_dns_protection/configs/dns_protection/rules/{rule_id}:
    delete:
      description: Delete a DNS Protection rule specified by the given UUID.
      operationId: deleteDnsProtectionRule
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: rule_id
        in: path
        required: true
        description: The rule ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommon'
          description: Delete DNS Protection rule response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommonFailure'
          description: Delete DNS Protection rule failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete DNS Protection rule.
      tags:
      - dos-flowtrackd-api_other
      x-api-token-group:
      - DDoS Protection Write
    get:
      description: Get a DNS Protection rule specified by the given UUID.
      operationId: getDnsProtectionRule
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: rule_id
        in: path
        required: true
        description: The rule ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosDnsProtectionRuleResponse'
          description: Get DNS Protection rule response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommonFailure'
          description: Get DNS Protection rule failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Get DNS Protection rule.
      tags:
      - dos-flowtrackd-api_other
      x-api-token-group:
      - DDoS Protection Write
      - DDoS Protection Read
    patch:
      description: Update a DNS Protection rule specified by the given UUID.
      operationId: updateDnsProtectionRule
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - name: rule_id
        in: path
        required: true
        description: The rule ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dosDnsProtectionRuleUpdate'
        description: The updates to apply to the DNS Protection rule.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosDnsProtectionRuleResponse'
          description: Update DNS Protection rule response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dosApiResponseCommonFailure'
          description: Update DNS Protection rule failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update DNS Protection rule.
      tags:
      - dos-flowtrackd-api_other
      x-api-token-group:
      - DDoS Protection Write
  /accounts/{account_id}/magic/apps:
