                  result:
                    properties:
                      modified:
                        type: boolean
                      modified_interconnect:
                        $ref: '#/components/schemas/magicInterconnect'
                    type: object
                    enum:
                    - null
                  success:
                    description: Whether the API call was successful
                    enum:
