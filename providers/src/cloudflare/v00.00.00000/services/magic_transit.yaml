          description: The creation timestamp of the DNS Protection rule.
          format: date-time
          type: string
          x-auditable: true
          readOnly: true
        id:
          description: The unique ID of the DNS Protection rule.
          type: string
          x-auditable: true
        mode:
          description: The mode for DNS Protection. Must be one of 'enabled', 'disabled', 'monitoring'.
