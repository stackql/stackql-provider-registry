openapi: 3.0.3
info:
  title: logpush API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /zones/{zone_id}/logpush/edge/jobs:
    get:
      description: Lists Instant Logs jobs for a zone.
      operationId: get-zones-zone_id-logpush-edge-jobs
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logpushInstantLogsJobResponseCollection'
          description: List Instant Logs jobs response.
        4XX:
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/logpushMessages'
                  messages:
                    $ref: '#/components/schemas/logpushMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    items:
                      $ref: '#/components/schemas/logpushInstantLogsJob'
                    type: array
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
                type: object
          description: List Instant Logs jobs response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List Instant Logs jobs
      tags:
      - Instant Logs jobs for a zone
      x-api-token-group:
      - Logs Read
      x-cfPermissionsRequired:
        enum:
        - '#logs:read'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: logpush
        resource_chain:
        - edge
        method: get
    post:
      description: Creates a new Instant Logs job for a zone.
      operationId: post-zones-zone_id-logpush-edge-jobs
      parameters:
      - name: zone_id
        in: path
        required: true
        description: The Cloudflare zone ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                fields:
                  $ref: '#/components/schemas/logpushFields'
                filter:
                  $ref: '#/components/schemas/logpushSchemasFilter'
                sample:
                  $ref: '#/components/schemas/logpushSample'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logpushInstantLogsJobResponseSingle'
          description: Create Instant Logs job response.
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/logpushMessages'
                  messages:
                    $ref: '#/components/schemas/logpushMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    nullable: true
                    properties:
                      destination_conf:
                        $ref: '#/components/schemas/logpushSchemasDestinationConf'
                      fields:
                        $ref: '#/components/schemas/logpushFields'
                      filter:
                        $ref: '#/components/schemas/logpushSchemasFilter'
                      sample:
                        $ref: '#/components/schemas/logpushSample'
                      session_id:
                        $ref: '#/components/schemas/logpushSessionId'
                    type: object
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Create Instant Logs job response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create Instant Logs job
      tags:
      - Instant Logs jobs for a zone
      x-api-token-group:
      - Logs Read
      x-cfPermissionsRequired:
        enum:
        - '#logs:read'
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: logpush
        resource_chain:
        - edge
        method: create
