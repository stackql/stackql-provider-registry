    loadBalancingSessionAffinity:
      default: none
      description: >-
        Specifies the type of session affinity the load balancer should use
        unless specified as `"none"`. The supported types are: - `"cookie"`: On
        the first request to a proxied load balancer, a cookie is generated,
        encoding information of which origin the request will be forwarded to.
        Subsequent requests, by the same client to the same load balancer, will
        be sent to the origin server the cookie encodes, for the duration of the
        cookie and as long as the origin server remains healthy. If the cookie
        has expired or the origin server is unhealthy, then a new origin server
        is calculated and used. - `"ip_cookie"`: Behaves the same as `"cookie"`
        except the initial origin selection is stable and based on the client's
        ip address. - `"header"`: On the first request to a proxied load
        balancer, a session key based on the configured HTTP headers (see
        `session_affinity_attributes.headers`) is generated, encoding the
        request headers used for storing in the load balancer session state
        which origin the request will be forwarded to. Subsequent requests to
        the load balancer with the same headers will be sent to the same origin
        server, for the duration of the session and as long as the origin server
        remains healthy. If the session has been idle for the duration of
        `session_affinity_ttl` seconds or the origin server is unhealthy, then a
        new origin server is calculated and used. See `headers` in
        `session_affinity_attributes` for additional required configuration.
      enum:
        - none
        - cookie
        - ip_cookie
        - header
      example: cookie
      type: string
      x-auditable: true
    loadBalancingSessionAffinityAttributes:
      description: Configures attributes for session affinity.
      properties:
        drain_duration:
          description: >-
            Configures the drain duration in seconds. This field is only used
            when session affinity is enabled on the load balancer.
          example: 100
          type: number
          x-auditable: true
        headers:
          description: >-
            Configures the names of HTTP headers to base session affinity on
            when header `session_affinity` is enabled. At least one HTTP header
            name must be provided. To specify the exact cookies to be used,
            include an item in the following format:
            `"cookie:<cookie-name-1>,<cookie-name-2>"` (example) where
            everything after the colon is a comma-separated list of cookie
            names. Providing only `"cookie"` will result in all cookies being
            used. The default max number of HTTP header names that can be
            provided depends on your plan: 5 for Enterprise, 1 for all other
            plans.
          items:
            description: An HTTP header name.
            maxLength: 100
            minLength: 1
            type: string
            x-auditable: true
          type: array
          uniqueItems: true
        require_all_headers:
          default: false
          description: >-
            When header `session_affinity` is enabled, this option can be used
            to specify how HTTP headers on load balancing requests will be used.
            The supported values are: - `"true"`: Load balancing requests must
            contain *all* of the HTTP headers specified by the `headers` session
            affinity attribute, otherwise sessions aren't created. - `"false"`:
            Load balancing requests must contain *at least one* of the HTTP
            headers specified by the `headers` session affinity attribute,
            otherwise sessions aren't created.
          type: boolean
          x-auditable: true
        samesite:
          default: Auto
          description: >-
            Configures the SameSite attribute on session affinity cookie. Value
            "Auto" will be translated to "Lax" or "None" depending if Always Use
            HTTPS is enabled. Note: when using value "None", the secure
            attribute can not be set to "Never".
          enum:
            - Auto
            - Lax
            - None
            - Strict
          example: Auto
          type: string
          x-auditable: true
        secure:
          default: Auto
          description: >-
            Configures the Secure attribute on session affinity cookie. Value
            "Always" indicates the Secure attribute will be set in the
            Set-Cookie header, "Never" indicates the Secure attribute will not
            be set, and "Auto" will set the Secure attribute depending if Always
            Use HTTPS is enabled.
          enum:
            - Auto
            - Always
            - Never
          example: Auto
          type: string
          x-auditable: true
        zero_downtime_failover:
          default: none
          description: >-
            Configures the zero-downtime failover between origins within a pool
            when session affinity is enabled. This feature is currently
            incompatible with Argo, Tiered Cache, and Bandwidth Alliance. The
            supported values are: - `"none"`: No failover takes place for
            sessions pinned to the origin (default). - `"temporary"`: Traffic
            will be sent to another other healthy origin until the originally
            pinned origin is available; note that this can potentially result in
            heavy origin flapping. - `"sticky"`: The session affinity cookie is
            updated and subsequent requests are sent to the new origin. Note:
            Zero-downtime failover with sticky sessions is currently not
            supported for session affinity by header.
          enum:
            - none
            - temporary
            - sticky
          example: sticky
          type: string
          x-auditable: true
      type: object
    loadBalancingSessionAffinityTtl:
      description: >-
        Time, in seconds, until a client's session expires after being created.
        Once the expiry time has been reached, subsequent requests may get sent
        to a different origin server. The accepted ranges per `session_affinity`
        policy are: - `"cookie"` / `"ip_cookie"`: The current default of 23
        hours will be used unless explicitly set. The accepted range of values
        is between [1800, 604800]. - `"header"`: The current default of 1800
        seconds will be used unless explicitly set. The accepted range of values
        is between [30, 3600]. Note: With session affinity by header, sessions
        only expire after they haven't been used for the number of seconds
        specified.
      example: 1800
      type: number
      x-auditable: true
    loadBalancingSteeringPolicy:
      default: ''
      description: >-
        Steering Policy for this load balancer. - `"off"`: Use `default_pools`.
        - `"geo"`: Use `region_pools`/`country_pools`/`pop_pools`. For
        non-proxied requests, the country for `country_pools` is determined by
        `location_strategy`. - `"random"`: Select a pool randomly. -
        `"dynamic_latency"`: Use round trip time to select the closest pool in
        default_pools (requires pool health checks). - `"proximity"`: Use the
        pools' latitude and longitude to select the closest pool using the
        Cloudflare PoP location for proxied requests or the location determined
        by `location_strategy` for non-proxied requests. -
        `"least_outstanding_requests"`: Select a pool by taking into
        consideration `random_steering` weights, as well as each pool's number
        of outstanding requests. Pools with more pending requests are weighted
        proportionately less relative to others. - `"least_connections"`: Select
        a pool by taking into consideration `random_steering` weights, as well
        as each pool's number of open connections. Pools with more open
        connections are weighted proportionately less relative to others.
        Supported for HTTP/1 and HTTP/2 connections. - `""`: Will map to `"geo"`
        if you use `region_pools`/`country_pools`/`pop_pools` otherwise `"off"`.
      enum:
        - 'off'
        - geo
        - random
        - dynamic_latency
        - proximity
        - least_outstanding_requests
        - least_connections
        - ''
      example: dynamic_latency
      type: string
      x-auditable: true
    loadBalancingSubdivisionCodeA2:
      description: Two-letter subdivision code followed in ISO 3166-2.
      example: CA
      type: string
      x-auditable: true
    loadBalancingTimeout:
      default: 5
      description: The timeout (in seconds) before marking the health check as failed.
      type: integer
      x-auditable: true
    loadBalancingTimestamp:
      example: '2014-01-01T05:20:00.12345Z'
      readOnly: true
      type: string
      x-auditable: true
    loadBalancingTtl:
      description: >-
        Time to live (TTL) of the DNS entry for the IP address returned by this
        load balancer. This only applies to gray-clouded (unproxied) load
        balancers.
      example: 30
      type: number
      x-auditable: true
    loadBalancingType:
      default: http
      description: >-
        The protocol to use for the health check. Currently supported protocols
        are 'HTTP','HTTPS', 'TCP', 'ICMP-PING', 'UDP-ICMP', and 'SMTP'.
      enum:
        - http
        - https
        - tcp
        - udp_icmp
        - icmp_ping
        - smtp
      example: https
      type: string
      x-auditable: true
    loadBalancingVirtualNetworkId:
      description: >-
        The virtual network subnet ID the origin belongs in. Virtual network
        must also belong to the account.
      example: a5624d4e-044a-4ff0-b3e1-e2465353d4b4
      type: string
    loadBalancingWeight:
      default: 1
      description: >-
        The weight of this origin relative to other origins in the pool. Based
        on the configured weight the total traffic is distributed among origins
        within the pool. -
        `origin_steering.policy="least_outstanding_requests"`: Use weight to
        scale the origin's outstanding requests. -
        `origin_steering.policy="least_connections"`: Use weight to scale the
        origin's open connections.
      example: 0.6
      maximum: 1
      minimum: 0
      multipleOf: 0.01
      type: number
      x-auditable: true
    responseInfo:
      properties:
        code:
          minimum: 1000
          type: integer
        message:
          type: string
        documentation_url:
          type: string
        source:
          type: object
          properties:
            pointer:
              type: string
      required:
        - code
        - message
      type: object
      uniqueItems: true
    unnamedSchemaRef025497b7e63379c31929636b5186e45c:
      properties:
        pools:
          description: Monitored pool IDs mapped to their respective names.
          example:
            abwlnp5jbqn45ecgxd03erbgtxtqai0d: WNAM Datacenter
            ve8h9lrcip5n5bbga9yqmdws28ay5d0l: EEU Datacenter
          type: object
        preview_id:
          $ref: '#/components/schemas/loadBalancingIdentifier'
      type: object
      enum:
        - null
