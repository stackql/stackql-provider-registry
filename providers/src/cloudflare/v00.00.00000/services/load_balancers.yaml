              session_affinity:
                $ref: '#/components/schemas/loadBalancingSessionAffinity'
              session_affinity_attributes:
                $ref: '#/components/schemas/loadBalancingSessionAffinityAttributes'
              session_affinity_ttl:
                $ref: '#/components/schemas/loadBalancingSessionAffinityTtl'
              steering_policy:
                $ref: '#/components/schemas/loadBalancingSteeringPolicy'
              ttl:
                $ref: '#/components/schemas/loadBalancingTtl'
            type: object
          priority:
            default: 0
            description: >-
              The order in which rules should be executed in relation to each
