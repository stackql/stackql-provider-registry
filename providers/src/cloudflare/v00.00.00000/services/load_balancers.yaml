components:
  schemas:
    loadBalancerPool:
      properties:
        check_regions:
          $ref: '#/components/schemas/loadBalancingCheckRegions'
        created_on:
          $ref: '#/components/schemas/loadBalancingTimestamp'
          readOnly: true
        description:
          $ref: '#/components/schemas/loadBalancingSchemasDescription'
        disabled_at:
          $ref: '#/components/schemas/loadBalancingSchemasDisabledAt'
          readOnly: true
        enabled:
          $ref: '#/components/schemas/loadBalancingEnabled'
        id:
          $ref: '#/components/schemas/loadBalancingSchemasIdentifier'
        latitude:
          $ref: '#/components/schemas/loadBalancingLatitude'
        load_shedding:
          $ref: '#/components/schemas/loadBalancingLoadShedding'
        longitude:
          $ref: '#/components/schemas/loadBalancingLongitude'
        minimum_origins:
          $ref: '#/components/schemas/loadBalancingMinimumOrigins'
        modified_on:
          $ref: '#/components/schemas/loadBalancingTimestamp'
          readOnly: true
        monitor:
          $ref: '#/components/schemas/loadBalancingMonitorId'
        monitor_group:
          $ref: '#/components/schemas/loadBalancingMonitorGroupId'
        name:
          $ref: '#/components/schemas/loadBalancingName'
        networks:
          $ref: '#/components/schemas/loadBalancingNetworks'
        notification_email:
          $ref: '#/components/schemas/loadBalancingNotificationEmail'
        notification_filter:
          $ref: '#/components/schemas/loadBalancingNotificationFilter'
        origin_steering:
          $ref: '#/components/schemas/loadBalancingOriginSteering'
        origins:
          $ref: '#/components/schemas/loadBalancingOrigins'
      type: object
      enum:
        - null
    loadBalancingAdaptiveRouting:
      description: >-
        Controls features that modify the routing of requests to pools and
        origins in response to dynamic conditions, such as during the interval
        between active health monitoring requests. For example, zero-downtime
        failover occurs immediately when an origin becomes unavailable due to
        HTTP 521, 522, or 523 response codes. If there is another healthy origin
        in the same pool, the request is retried once against this alternate
        origin.
      properties:
        failover_across_pools:
          default: false
          description: >-
            Extends zero-downtime failover of requests to healthy origins from
            alternate pools, when no healthy alternate exists in the same pool,
            according to the failover order defined by traffic and origin
            steering. When set false (the default) zero-downtime failover will
            only occur between origins within the same pool. See
            `session_affinity_attributes` for control over when sessions are
            broken or reassigned.
          example: true
          type: boolean
          x-auditable: true
      type: object
    loadBalancingAddress:
      description: >-
        The IP address (IPv4 or IPv6) of the origin, or its publicly addressable
        hostname. Hostnames entered here should resolve directly to the origin,
        and not be a hostname proxied by Cloudflare. To set an internal/reserved
        address, virtual_network_id must also be set.
      example: 0.0.0.0
      type: string
      x-auditable: true
    loadBalancingAllowInsecure:
      default: false
      description: >-
        Do not validate the certificate when monitor use HTTPS. This parameter
        is currently only valid for HTTP and HTTPS monitors.
      example: true
      type: boolean
      x-auditable: true
    loadBalancingCheckRegions:
      description: >-
        A list of regions from which to run health checks. Null means every
        Cloudflare data center.
      example:
        - WEU
        - ENAM
      items:
        description: >-
          WNAM: Western North America, ENAM: Eastern North America, WEU: Western
          Europe, EEU: Eastern Europe, NSAM: Northern South America, SSAM:
          Southern South America, OC: Oceania, ME: Middle East, NAF: North
          Africa, SAF: South Africa, SAS: Southern Asia, SEAS: South East Asia,
          NEAS: North East Asia, ALL_REGIONS: all regions (ENTERPRISE customers
          only).
        enum:
          - WNAM
          - ENAM
          - WEU
          - EEU
          - NSAM
          - SSAM
          - OC
          - ME
          - NAF
          - SAF
          - SAS
          - SEAS
          - NEAS
          - ALL_REGIONS
        type: string
        x-auditable: true
      nullable: true
      type: array
    loadBalancingComponentsSchemasDescription:
      description: Object description.
      example: Load Balancer for www.example.com
      type: string
      x-auditable: true
    loadBalancingComponentsSchemasEnabled:
      default: true
      description: Whether to enable (the default) this load balancer.
      example: true
      type: boolean
      x-auditable: true
    loadBalancingComponentsSchemasIdResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/loadBalancingMessages'
        messages:
          $ref: '#/components/schemas/loadBalancingMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          properties:
            id:
              $ref: >-
                #/components/schemas/loadBalancingLoadBalancerComponentsSchemasIdentifier
          type: object
      required:
        - success
        - errors
        - messages
        - result
    loadBalancingComponentsSchemasName:
      description: >-
        The DNS hostname to associate with your Load Balancer. If this hostname
        already exists as a DNS record in Cloudflare's DNS, the Load Balancer
        will take precedence and the DNS record will not be used.
      example: www.example.com
      type: string
      x-auditable: true
    loadBalancingComponentsSchemasSingleResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/loadBalancingMessages'
        messages:
          $ref: '#/components/schemas/loadBalancingMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          description: A list of countries and subdivisions mapped to a region.
          example:
            iso_standard: >-
              Country and subdivision codes follow ISO 3166-1 alpha-2 and ISO
              3166-2
            regions:
              - countries:
                  - country_code_a2: CA
                    country_name: Canada
                    country_subdivisions:
                      - subdivision_code_a2: AB
                        subdivision_name: Alberta
                      - subdivision_code_a2: BC
                        subdivision_name: British Columbia
                  - country_code_a2: HT
                    country_name: Haiti
                  - country_code_a2: MX
                    country_name: Mexico
                  - country_code_a2: US
                    country_name: United States
                    country_subdivisions:
                      - subdivision_code_a2: AZ
                        subdivision_name: Arizona
                      - subdivision_code_a2: CA
                        subdivision_name: California
                      - subdivision_code_a2: CO
                        subdivision_name: Colorado
                      - subdivision_code_a2: HI
                        subdivision_name: Hawaii
                      - subdivision_code_a2: MN
                        subdivision_name: Minnesota
                      - subdivision_code_a2: MO
                        subdivision_name: Missouri
                      - subdivision_code_a2: NV
                        subdivision_name: Nevada
                      - subdivision_code_a2: OR
                        subdivision_name: Oregon
                      - subdivision_code_a2: TX
                        subdivision_name: Texas
                      - subdivision_code_a2: UT
                        subdivision_name: Utah
                      - subdivision_code_a2: WA
                        subdivision_name: Washington
                region_code: WNAM
          type: object
      required:
        - success
        - errors
        - messages
        - result
    loadBalancingComponentsSchemasZoneName:
      example: example.com
      type: string
      x-auditable: true
    loadBalancingConsecutiveDown:
      description: >-
        To be marked unhealthy the monitored origin must fail this healthcheck N
        consecutive times.
      type: integer
      x-auditable: true
    loadBalancingConsecutiveUp:
      description: >-
        To be marked healthy the monitored origin must pass this healthcheck N
        consecutive times.
      type: integer
      x-auditable: true
    loadBalancingCountryPools:
      description: >-
        A mapping of country codes to a list of pool IDs (ordered by their
        failover priority) for the given country. Any country not explicitly
        defined will fall back to using the corresponding region_pool mapping if
        it exists else to default_pools.
      example:
        GB:
          - abd90f38ced07c2e2f4df50b1f61d4194
        US:
          - de90f38ced07c2e2f4df50b1f61d4194
          - 00920f38ce07c2e2f4df50b1f61d4194
      type: object
    loadBalancingDefaultPools:
      description: >-
        A list of pool IDs ordered by their failover priority. Pools defined
        here are used by default, or when region_pools are not configured for a
        given region.
      example:
        - 17b5962d775c646f3f9725cbc7a53df4
        - 9290f38c5d07c2e2f4df57b1f61d4196
        - 00920f38ce07c2e2f4df50b1f61d4194
      items:
        description: A pool ID.
        type: string
      type: array
    loadBalancingDescription:
      default: ''
      description: Object description.
      example: Login page monitor
      type: string
      x-auditable: true
    loadBalancingDisabledAt:
      description: >-
        This field shows up only if the origin is disabled. This field is set
        with the time the origin was disabled.
      format: date-time
      readOnly: true
      type: string
      x-auditable: true
    loadBalancingEnabled:
      default: true
      description: >-
        Whether to enable (the default) or disable this pool. Disabled pools
        will not receive traffic and are excluded from health checks. Disabling
        a pool will cause any load balancers using it to failover to the next
        pool (if any).
      example: false
      type: boolean
      x-auditable: true
    loadBalancingExpectedBody:
      default: ''
      description: >-
        A case-insensitive sub-string to look for in the response body. If this
        string is not found, the origin will be marked as unhealthy. This
        parameter is only valid for HTTP and HTTPS monitors.
      example: alive
      type: string
      x-auditable: true
    loadBalancingExpectedCodes:
      default: ''
      description: >-
        The expected HTTP response code or code range of the health check. This
        parameter is only valid for HTTP and HTTPS monitors.
      example: 2xx
      type: string
      x-auditable: true
    loadBalancingFallbackPool:
      description: The pool ID to use when all other pools are detected as unhealthy.
      type: string
      x-auditable: true
    loadBalancingFilterOptions:
      description: >-
        Filter options for a particular resource type (pool or origin). Use null
        to reset.
      nullable: true
      properties:
        disable:
          default: false
          description: >-
            If set true, disable notifications for this type of resource (pool
            or origin).
          nullable: true
          type: boolean
          x-auditable: true
          x-stainless-terraform-configurability: optional
        healthy:
          description: >-
            If present, send notifications only for this health status (e.g.
            false for only DOWN events). Use null to reset (all events).
          nullable: true
          type: boolean
          x-auditable: true
      type: object
    loadBalancingFollowRedirects:
      default: false
      description: >-
        Follow redirects if returned by the origin. This parameter is only valid
        for HTTP and HTTPS monitors.
      example: true
      type: boolean
      x-auditable: true
    loadBalancingHeader:
      description: >-
        The HTTP request headers to send in the health check. It is recommended
        you set a Host header by default. The User-Agent header cannot be
        overridden. This parameter is only valid for HTTP and HTTPS monitors.
      example:
        Host:
          - example.com
        X-App-ID:
          - abc123
      type: object
    loadBalancingHealthDetails:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/loadBalancingMessages'
        messages:
          $ref: '#/components/schemas/loadBalancingMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          description: >-
            A list of regions from which to run health checks. Null means every
            Cloudflare data center.
          example:
            pool_id: 17b5962d775c646f3f9725cbc7a53df4
            pop_health:
              Amsterdam, NL:
                healthy: true
                origins:
                  - 2001:DB8::5:
                      failure_reason: No failures
                      healthy: true
                      response_code: 401
                      rtt: 12.1ms
          properties:
            pool_id:
              description: Pool ID.
              example: 17b5962d775c646f3f9725cbc7a53df4
              type: string
              x-auditable: true
            pop_health:
              description: List of regions and associated health status.
              properties:
                healthy:
                  description: Whether health check in region is healthy.
                  example: true
                  type: boolean
                  x-auditable: true
                origins:
                  items:
                    $ref: '#/components/schemas/loadBalancingOriginHealth'
                  type: array
              type: object
          type: object
      required:
        - success
        - errors
        - messages
        - result
    loadBalancingHost:
      description: >-
        The 'Host' header allows to override the hostname set in the HTTP
        request. Current support is 1 'Host' header override per origin.
      items:
        example: example.com
        type: string
        x-auditable: true
      type: array
    loadBalancingIdResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/loadBalancingMessages'
        messages:
          $ref: '#/components/schemas/loadBalancingMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          properties:
            id:
              $ref: '#/components/schemas/loadBalancingIdentifier'
          type: object
      required:
        - success
        - errors
        - messages
        - result
    loadBalancingIdentifier:
      example: f1aba936b94213e5b8dca0c0dbf1f9cc
      type: string
      x-auditable: true
    loadBalancingInterval:
      default: 60
      description: >-
        The interval between each health check. Shorter intervals may improve
        failover time, but will increase load on the origins as we check from
        multiple locations.
      type: integer
      x-auditable: true
    loadBalancingLatitude:
      description: >-
        The latitude of the data center containing the origins used in this pool
        in decimal degrees. If this is set, longitude must also be set.
      type: number
      x-auditable: true
    loadBalancingLoadBalancer:
      properties:
        adaptive_routing:
          $ref: '#/components/schemas/loadBalancingAdaptiveRouting'
        country_pools:
          $ref: '#/components/schemas/loadBalancingCountryPools'
        created_on:
          $ref: '#/components/schemas/loadBalancingTimestamp'
          readOnly: true
        default_pools:
          $ref: '#/components/schemas/loadBalancingDefaultPools'
        description:
          $ref: '#/components/schemas/loadBalancingComponentsSchemasDescription'
        enabled:
          $ref: '#/components/schemas/loadBalancingComponentsSchemasEnabled'
        fallback_pool:
          $ref: '#/components/schemas/loadBalancingFallbackPool'
        id:
          $ref: >-
            #/components/schemas/loadBalancingLoadBalancerComponentsSchemasIdentifier
        location_strategy:
          $ref: '#/components/schemas/loadBalancingLocationStrategy'
        modified_on:
          $ref: '#/components/schemas/loadBalancingTimestamp'
          readOnly: true
        name:
          $ref: '#/components/schemas/loadBalancingComponentsSchemasName'
        networks:
          $ref: '#/components/schemas/loadBalancingNetworks'
        pop_pools:
          $ref: '#/components/schemas/loadBalancingPopPools'
        proxied:
          $ref: '#/components/schemas/loadBalancingProxied'
        random_steering:
          $ref: '#/components/schemas/loadBalancingRandomSteering'
        region_pools:
          $ref: '#/components/schemas/loadBalancingRegionPools'
        rules:
          $ref: '#/components/schemas/loadBalancingRules'
        session_affinity:
          $ref: '#/components/schemas/loadBalancingSessionAffinity'
        session_affinity_attributes:
          $ref: '#/components/schemas/loadBalancingSessionAffinityAttributes'
        session_affinity_ttl:
          $ref: '#/components/schemas/loadBalancingSessionAffinityTtl'
        steering_policy:
          $ref: '#/components/schemas/loadBalancingSteeringPolicy'
        ttl:
          $ref: '#/components/schemas/loadBalancingTtl'
        zone_name:
          $ref: '#/components/schemas/loadBalancingComponentsSchemasZoneName'
      type: object
    loadBalancingLoadBalancerComponentsSchemasIdentifier:
      example: 699d98642c564d2e855e9661899b7252
      type: string
      x-auditable: true
    loadBalancingLoadBalancerComponentsSchemasResponseCollection:
      required:
        - success
        - errors
        - messages
        - result
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/loadBalancingMessages'
        messages:
          $ref: '#/components/schemas/loadBalancingMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result_info:
          $ref: '#/components/schemas/loadBalancingResultInfo'
        result:
          items:
            $ref: '#/components/schemas/loadBalancingLoadBalancer'
          type: array
    loadBalancingLoadBalancerComponentsSchemasSingleResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/loadBalancingMessages'
        messages:
          $ref: '#/components/schemas/loadBalancingMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/loadBalancingLoadBalancer'
      required:
        - success
        - errors
        - messages
        - result
    loadBalancingLoadShedding:
      description: Configures load shedding policies and percentages for the pool.
      nullable: true
      properties:
        default_percent:
          default: 0
          description: >-
            The percent of traffic to shed from the pool, according to the
            default policy. Applies to new sessions and traffic without session
            affinity.
          maximum: 100
          minimum: 0
          type: number
          x-auditable: true
        default_policy:
          default: random
          description: >-
            The default policy to use when load shedding. A random policy
            randomly sheds a given percent of requests. A hash policy computes a
            hash over the CF-Connecting-IP address and sheds all requests
            originating from a percent of IPs.
          enum:
            - random
            - hash
          type: string
          x-auditable: true
        session_percent:
          default: 0
          description: >-
            The percent of existing sessions to shed from the pool, according to
            the session policy.
          maximum: 100
          minimum: 0
          type: number
          x-auditable: true
        session_policy:
          default: hash
          description: >-
            Only the hash policy is supported for existing sessions (to avoid
            exponential decay).
          enum:
            - hash
          type: string
          x-auditable: true
      type: object
      x-stainless-terraform-configurability: computed_optional
    loadBalancingLocationStrategy:
      description: >-
        Controls location-based steering for non-proxied requests. See
        `steering_policy` to learn how steering is affected.
      properties:
        mode:
          default: pop
          description: >-
            Determines the authoritative location when ECS is not preferred,
            does not exist in the request, or its GeoIP lookup is unsuccessful.
            - `"pop"`: Use the Cloudflare PoP location. - `"resolver_ip"`: Use
            the DNS resolver GeoIP location. If the GeoIP lookup is
            unsuccessful, use the Cloudflare PoP location.
          enum:
            - pop
            - resolver_ip
          example: resolver_ip
          type: string
          x-auditable: true
        prefer_ecs:
          default: proximity
          description: >-
