openapi: 3.0.3
info:
  title: zaraz API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/settings/zaraz/config:
    get:
      description: >-
        Gets latest Zaraz configuration for a zone. It can be preview or
        published configuration, whichever was the last updated. Secret
        variables values will not be included.
      operationId: get-zones-zone_identifier-zaraz-config
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazZarazConfigResponse'
          description: Get Zaraz configuration response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: Get Zaraz configuration response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Zaraz configuration
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Edit
        - Zaraz Read
        - Zaraz Admin
      x-stackql-sdk:
        service: zaraz
        resource_chain:
          - config
        method: get
    put:
      description: Updates Zaraz configuration for a zone.
      operationId: put-zones-zone_identifier-zaraz-config
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/zarazZarazConfigBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazZarazConfigResponse'
          description: Update Zaraz configuration response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: Update Zaraz configuration response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Zaraz configuration
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Edit
        - Zaraz Admin
      x-stackql-sdk:
        service: zaraz
        resource_chain:
          - config
        method: update
  /zones/{zone_id}/settings/zaraz/default:
    get:
      description: Gets default Zaraz configuration for a zone.
      operationId: get-zones-zone_identifier-zaraz-default
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazZarazConfigResponse'
          description: Get Zaraz default configuration response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: Get Zaraz default configuration response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get default Zaraz configuration
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Edit
        - Zaraz Read
        - Zaraz Admin
      x-stackql-sdk:
        service: zaraz
        resource_chain:
          - default
        method: get
  /zones/{zone_id}/settings/zaraz/export:
    get:
      description: >-
        Exports full current published Zaraz configuration for a zone, secret
        variables included.
      operationId: get-zones-zone_identifier-zaraz-export
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazZarazConfigReturn'
          description: Get Zaraz configuration response.
          headers:
            Content-Disposition:
              schema:
                type: string
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: Get Zaraz configuration response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Export Zaraz configuration
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Edit
        - Zaraz Read
        - Zaraz Admin
      x-stackql-sdk:
        service: zaraz
        resource_chain:
          - export
        method: get
  /zones/{zone_id}/settings/zaraz/history:
    get:
      description: Lists a history of published Zaraz configuration records for a zone.
      operationId: get-zones-zone_identifier-zaraz-history
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: >-
            Ordinal number to start listing the results with. Default value is
            0.
          in: query
          name: offset
          schema:
            minimum: 0
            type: integer
        - description: Maximum amount of results to list. Default value is 10.
          in: query
          name: limit
          schema:
            minimum: 1
            type: integer
        - description: The field to sort by. Default is updated_at.
          in: query
          name: sortField
          schema:
            enum:
              - id
              - user_id
              - description
              - created_at
              - updated_at
            type: string
        - description: Sorting order. Default is DESC.
          in: query
          name: sortOrder
          schema:
            enum:
              - DESC
              - ASC
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazZarazHistoryResponse'
          description: List Zaraz historical configuration records response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: List Zaraz historical configuration records failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Zaraz historical configuration records
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Edit
        - Zaraz Read
        - Zaraz Admin
      x-stackql-sdk:
        service: zaraz
        resource_chain:
          - history
        method: list
    put:
      description: Restores a historical published Zaraz configuration by ID for a zone.
      operationId: put-zones-zone_identifier-zaraz-history
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              description: ID of the Zaraz configuration to restore.
              minimum: 1
              type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazZarazConfigResponse'
          description: Restore Zaraz historical configuration by ID response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: Restore Zaraz historical configuration by ID failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Restore Zaraz historical configuration by ID
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Edit
        - Zaraz Admin
      x-stackql-sdk:
        service: zaraz
        resource_chain:
          - history
        method: update
  /zones/{zone_id}/settings/zaraz/history/configs:
    get:
      description: Gets a history of published Zaraz configurations by ID(s) for a zone.
      operationId: get-zones-zone_identifier-zaraz-config-history
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: Comma separated list of Zaraz configuration IDs.
          explode: false
          in: query
          name: ids
          schema:
            items:
              type: integer
            type: array
          style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazZarazConfigHistoryResponse'
          description: Get Zaraz historical configurations by ID(s) response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: Get Zaraz historical configurations by ID(s) failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Zaraz historical configurations by ID(s)
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Edit
        - Zaraz Read
        - Zaraz Admin
      x-stackql-sdk:
        service: zaraz
        resource_chain:
          - history
          - configs
        method: get
  /zones/{zone_id}/settings/zaraz/publish:
    post:
      description: Publish current Zaraz preview configuration for a zone.
      operationId: post-zones-zone_identifier-zaraz-publish
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              description: Zaraz configuration description.
              type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/zarazMessages'
                  messages:
                    $ref: '#/components/schemas/zarazMessages'
                  success:
                    description: Whether the API call was successful.
                    type: boolean
                    x-auditable: true
                  result:
                    type: string
                required:
                  - success
                  - errors
                  - messages
                  - result
                type: object
          description: Update Zaraz workflow response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: Update Zaraz workflow response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Publish Zaraz preview configuration
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Admin
      x-cfPermissionsRequired:
        enum:
          - '#zaraz:publish'
      x-stackql-sdk:
        service: zaraz
        resource_chain:
          - publish
        method: create
  /zones/{zone_id}/settings/zaraz/workflow:
    get:
      description: Gets Zaraz workflow for a zone.
      operationId: get-zones-zone_identifier-zaraz-workflow
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazZarazWorkflowResponse'
          description: Get Zaraz workflow response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: Get Zaraz workflow response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Zaraz workflow
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Edit
        - Zaraz Read
        - Zaraz Admin
      x-stackql-sdk:
        service: zaraz
        resource_chain:
          - workflow
        method: get
    put:
      description: Updates Zaraz workflow for a zone.
      operationId: put-zones-zone_identifier-zaraz-workflow
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/zarazZarazWorkflow'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazZarazWorkflowResponse'
          description: Update Zaraz workflow response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zarazApiResponseCommonFailure'
          description: Update Zaraz workflow response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Zaraz workflow
      tags:
        - Zaraz
      x-api-token-group:
        - Zaraz Edit
        - Zaraz Admin
      x-stackql-sdk:
        service: zaraz
        resource_chain: []
        method: update
components:
  schemas:
    unnamedSchemaRef3caeef70a38a3ad696413c7d97d9c394:
      properties:
        accept_all:
          description: Object where keys are language codes.
          type: object
        confirm_my_choices:
          description: Object where keys are language codes.
          type: object
        reject_all:
          description: Object where keys are language codes.
          type: object
      required:
        - accept_all
        - reject_all
        - confirm_my_choices
      type: object
    zarazApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/zarazMessages'
        messages:
          example: []
          $ref: '#/components/schemas/zarazMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    zarazMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    zarazZarazConfigBody:
      x-stainless-variantName: trigger_worker
      description: Zaraz configuration.
      properties:
        analytics:
          description: Cloudflare Monitoring settings.
          properties:
            defaultPurpose:
              description: Consent purpose assigned to Monitoring.
              type: string
              x-auditable: true
            enabled:
              description: Whether Advanced Monitoring reports are enabled.
              type: boolean
              x-auditable: true
            sessionExpTime:
              description: Session expiration time (seconds).
              maximum: 86400
              minimum: 60
              type: integer
              x-auditable: true
          type: object
        consent:
          description: Consent management configuration.
          properties:
            buttonTextTranslations:
              $ref: >-
                #/components/schemas/unnamedSchemaRef3caeef70a38a3ad696413c7d97d9c394
            companyEmail:
              type: string
              x-auditable: true
            companyName:
              type: string
              x-auditable: true
            companyStreetAddress:
              type: string
              x-auditable: true
            consentModalIntroHTML:
              type: string
              x-auditable: true
            consentModalIntroHTMLWithTranslations:
              description: Object where keys are language codes.
              type: object
            cookieName:
              type: string
              x-auditable: true
            customCSS:
              type: string
              x-auditable: true
            customIntroDisclaimerDismissed:
              type: boolean
              x-auditable: true
            defaultLanguage:
              type: string
              x-auditable: true
            enabled:
              type: boolean
            hideModal:
              type: boolean
              x-auditable: true
            purposes:
              description: Object where keys are purpose alpha-numeric IDs.
              type: object
            purposesWithTranslations:
              description: Object where keys are purpose alpha-numeric IDs.
              type: object
            tcfCompliant:
              type: boolean
          required:
            - enabled
          type: object
        dataLayer:
          description: Data layer compatibility mode enabled.
          type: boolean
          x-auditable: true
        debugKey:
          description: The key for Zaraz debug mode.
          type: string
          x-auditable: true
        historyChange:
          description: Single Page Application support enabled.
          type: boolean
          x-auditable: true
        settings:
          description: General Zaraz settings.
          properties:
            autoInjectScript:
              description: Automatic injection of Zaraz scripts enabled.
              type: boolean
              x-auditable: true
            contextEnricher:
              description: >-
                Details of the worker that receives and edits Zaraz Context
                object.
              properties:
                escapedWorkerName:
                  type: string
                  x-auditable: true
                workerTag:
                  type: string
                  x-auditable: true
              required:
                - escapedWorkerName
                - workerTag
              type: object
            cookieDomain:
              description: The domain Zaraz will use for writing and reading its cookies.
              type: string
              x-auditable: true
            ecommerce:
              description: Ecommerce API enabled.
              type: boolean
              x-auditable: true
            eventsApiPath:
              description: Custom endpoint for server-side track events.
              type: string
              x-auditable: true
            hideExternalReferer:
              description: Hiding external referrer URL enabled.
              type: boolean
              x-auditable: true
            hideIPAddress:
              description: Trimming IP address enabled.
              type: boolean
              x-auditable: true
            hideQueryParams:
              description: Removing URL query params enabled.
              type: boolean
              x-auditable: true
            hideUserAgent:
              description: Removing sensitive data from User Agent string enabled.
              type: boolean
            initPath:
              description: Custom endpoint for Zaraz init script.
              type: string
              x-auditable: true
            injectIframes:
              description: Injection of Zaraz scripts into iframes enabled.
              type: boolean
              x-auditable: true
            mcRootPath:
              description: Custom path for Managed Components server functionalities.
              type: string
              x-auditable: true
            scriptPath:
              description: Custom endpoint for Zaraz main script.
              type: string
              x-auditable: true
            trackPath:
              description: Custom endpoint for Zaraz tracking requests.
              type: string
              x-auditable: true
          required:
            - autoInjectScript
          type: object
        triggers:
          description: >-
            Triggers set up under Zaraz configuration, where key is the trigger
            alpha-numeric ID and value is the trigger configuration.
          type: object
        variables:
          description: >-
            Variables set up under Zaraz configuration, where key is the
            variable alpha-numeric ID and value is the variable configuration.
            Values of variables of type secret are not included.
          type: object
        zarazVersion:
          description: Zaraz internal version of the config.
          type: integer
          x-auditable: true
        tools:
          description: >-
            Tools set up under Zaraz configuration, where key is the
            alpha-numeric tool ID and value is the tool configuration object.
          type: object
      required:
        - tools
        - triggers
        - variables
        - settings
        - dataLayer
        - debugKey
        - zarazVersion
      type: object
