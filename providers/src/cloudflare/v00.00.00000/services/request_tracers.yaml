openapi: 3.0.3
info:
  title: request_tracers API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/request-tracer/trace:
    post:
      operationId: account-request-tracer-request-trace
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                body:
                  properties:
                    base64:
                      description: Base64 encoded request body
                      type: string
                      x-auditable: true
                    json:
                      description: Arbitrary json as request body
                      type: object
                    plain_text:
                      description: Request body as plain text
                      type: string
                      x-auditable: true
                  type: object
                context:
                  description: Additional request parameters
                  properties:
                    bot_score:
                      description: Bot score used for evaluating tracing request processing
                      type: integer
                      x-auditable: true
                    geoloc:
                      description: Geodata for tracing request
                      properties:
                        city:
                          type: string
                          x-auditable: true
                        continent:
                          type: string
                          x-auditable: true
                        is_eu_country:
                          type: boolean
                          x-auditable: true
                        iso_code:
                          type: string
                          x-auditable: true
                        latitude:
                          type: number
                          x-auditable: true
                        longitude:
                          type: number
                          x-auditable: true
                        postal_code:
                          type: string
                          x-auditable: true
                        region_code:
                          type: string
                          x-auditable: true
                        subdivision_2_iso_code:
                          type: string
                          x-auditable: true
                        timezone:
                          type: string
                          x-auditable: true
                      type: object
                    skip_challenge:
                      description: 'Whether to skip any challenges for tracing request (e.g.: captcha)'
                      type: boolean
                      x-auditable: true
                    threat_score:
                      description: Threat score used for evaluating tracing request processing
                      type: integer
                      x-auditable: true
                  type: object
                cookies:
                  description: Cookies added to tracing request
                  type: object
                headers:
                  description: Headers added to tracing request
                  type: object
                method:
                  description: HTTP Method of tracing request
                  type: string
                  x-auditable: true
                protocol:
                  description: HTTP Protocol of tracing request
                  type: string
                  x-auditable: true
                skip_response:
                  description: Skip sending the request to the Origin server after all rules evaluation
                  type: boolean
                  x-auditable: true
                url:
                  description: URL to which perform tracing request
                  type: string
                  x-auditable: true
              required:
              - url
              - method
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/requestTracerMessages'
                  messages:
                    $ref: '#/components/schemas/requestTracerMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    type: boolean
                  result:
                    description: Trace result with an origin status code
                    properties:
                      status_code:
                        description: HTTP Status code of zone response
                        type: integer
                        x-auditable: true
                      trace:
                        $ref: '#/components/schemas/requestTracerTrace'
                    type: object
                required:
                - success
                - errors
                - messages
          description: Request Trace response
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/requestTracerApiResponseCommonFailure'
          description: Request Trace response failure
      security:
      - api_email: []
        api_key: []
      summary: Request Trace
      tags:
      - Account Request Tracer
      x-api-token-group:
      - Allow Request Tracer Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: request_tracers
        resource_chain:
        - traces
        method: create
components:
  schemas:
    requestTracerApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/requestTracerMessages'
        messages:
          example: []
          $ref: '#/components/schemas/requestTracerMessages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    requestTracerMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
        - code
        - message
        type: object
        uniqueItems: true
      type: array
    requestTracerTrace:
      items:
        description: List of steps acting on request/response
        properties:
          action:
            description: If step type is rule, then action performed by this rule
            example: execute
            type: string
            x-auditable: true
          action_parameters:
            description: If step type is rule, then action parameters of this rule as JSON
            example:
              id: 4814384a9e5d4991b9815dcfc25d2f1f
            type: object
            x-auditable: true
          description:
            description: If step type is rule or ruleset, the description of this entity
            example: some rule
            type: string
            x-auditable: true
          expression:
            description: If step type is rule, then expression used to match for this rule
            example: ip.src ne 1.1.1.1
            type: string
            x-auditable: true
          kind:
            description: If step type is ruleset, then kind of this ruleset
            example: zone
            type: string
            x-auditable: true
          matched:
            description: Whether tracing step affected tracing request/response
            example: true
            type: boolean
            x-auditable: true
          name:
            description: If step type is ruleset, then name of this ruleset
            example: some ruleset name
            type: string
            x-auditable: true
          step_name:
            description: Tracing step identifying name
            example: rule_id01
            type: string
            x-auditable: true
          trace:
            $ref: '#/components/schemas/requestTracerTrace'
          type:
            description: Tracing step type
            example: rule
            type: string
            x-auditable: true
        type: object
      type: array
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: The preferred authorization scheme for interacting with the Cloudflare API. [Create a token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: Used when interacting with the Origin CA certificates API. [View/change your key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    request_tracer:
      id: cloudflare.request_tracers.request_tracer
      name: request_tracer
      title: Request Tracer
      methods:
        create_trace:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1accounts~1{account_id}~1request-tracer~1trace/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .body }}{{ $sep }}"body": {{ if eq (kindOf .body) "string" }}{{ .body }}{{ else }}{{ toJson .body }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .context }}{{ $sep }}"context": {{ if eq (kindOf .context) "string" }}{{ .context }}{{ else }}{{ toJson .context }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .cookies }}{{ $sep }}"cookies": {{ if eq (kindOf .cookies) "string" }}{{ .cookies }}{{ else }}{{ toJson .cookies }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .headers }}{{ $sep }}"headers": {{ if eq (kindOf .headers) "string" }}{{ .headers }}{{ else }}{{ toJson .headers }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .method }}{{ $sep }}"method": {{ toJson .method }}{{- $sep = "," -}}{{ end }}

                {{- if .protocol }}{{ $sep }}"protocol": {{ toJson .protocol }}{{- $sep = "," -}}{{ end }}

                {{- if .skip_response }}{{ $sep }}"skip_response": {{ toJson .skip_response }}{{- $sep = "," -}}{{ end }}

                {{- if .url }}{{ $sep }}"url": {{ toJson .url }}{{- $sep = "," -}}{{ end }}

                }

                '
      sqlVerbs:
        select: []
        insert: []
        update: []
        delete: []
        replace: []
