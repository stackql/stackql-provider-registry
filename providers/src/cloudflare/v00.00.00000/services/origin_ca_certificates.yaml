openapi: 3.0.3
info:
  title: origin_ca_certificates API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /certificates:
    get:
      description: List all existing Origin CA certificates for a given zone. You can use an Origin CA Key as your User Service Key or an API token when calling this endpoint ([see above](#requests)).
      operationId: origin-ca-list-certificates
      parameters:
      - in: query
        name: zone_id
        schema:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
      - in: query
        name: page
        schema:
          default: 1
          description: Page number of paginated results.
          minimum: 1
          type: number
      - in: query
        name: per_page
        schema:
          default: 20
          description: Number of records per page.
          maximum: 50
          minimum: 5
          type: number
      - in: query
        name: limit
        schema:
          description: Limit to the number of records returned.
          type: integer
      - in: query
        name: offset
        schema:
          description: Offset the results
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasCertificateResponseCollection'
          description: List Certificates response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificates'
                    type: array
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: List Certificates response failure
      security:
      - user_service_key: []
      - api_token: []
      summary: List Certificates
      tags:
      - Origin CA
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_ca_certificates
        resource_chain: []
        method: list
    post:
      description: Create an Origin CA certificate. You can use an Origin CA Key as your User Service Key or an API token when calling this endpoint ([see above](#requests)).
      operationId: origin-ca-create-certificate
      requestBody:
        content:
          application/json:
            schema:
              properties:
                csr:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesCsr'
                hostnames:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesHostnames'
                request_type:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesRequestType'
                requested_validity:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesRequestedValidity'
              required:
              - hostnames
              - request_type
              - csr
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasCertificateResponseSingle'
          description: Create Certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    properties:
                      certificate:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificatesComponentsSchemasCertificate'
                      csr:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCsr'
                      expires_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasExpiresOn'
                      hostnames:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesHostnames'
                      id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                      request_type:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesRequestType'
                      requested_validity:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesRequestedValidity'
                    required:
                    - hostnames
                    - csr
                    - requested_validity
                    - request_type
                    type: object
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Create Certificate response failure
      security:
      - user_service_key: []
      - api_token: []
      summary: Create Certificate
      tags:
      - Origin CA
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_ca_certificates
        resource_chain: []
        method: create
  /certificates/{certificate_id}:
    delete:
      description: Revoke an existing Origin CA certificate by its serial number. You can use an Origin CA Key as your User Service Key or an API token when calling this endpoint ([see above](#requests)).
      operationId: origin-ca-revoke-certificate
      parameters:
      - name: certificate_id
        in: path
        required: true
        description: The certificate ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificateRevokeResponse'
          description: Revoke Certificate response
        4XX:
          content:
            application/json:
              schema:
                properties:
                  result:
                    properties:
                      id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                      revoked_at:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesRevokedAt'
                    type: object
                    enum:
                    - null
                  errors:
                    minLength: 1
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - false
                    type: boolean
                type: object
                required:
                - success
                - errors
                - messages
                - result
          description: Revoke Certificate response failure
      security:
      - user_service_key: []
      - api_token: []
      summary: Revoke Certificate
      tags:
      - Origin CA
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_ca_certificates
        resource_chain: []
        method: delete
    get:
      description: Get an existing Origin CA certificate by its serial number. You can use an Origin CA Key as your User Service Key or an API token when calling this endpoint ([see above](#requests)).
      operationId: origin-ca-get-certificate
      parameters:
      - name: certificate_id
        in: path
        required: true
        description: The certificate ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasCertificateResponseSingle'
          description: Get Certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                    - true
                    - false
                    type: boolean
                  result:
                    properties:
                      certificate:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificatesComponentsSchemasCertificate'
                      csr:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesCsr'
                      expires_on:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasExpiresOn'
                      hostnames:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesHostnames'
                      id:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
                      request_type:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesRequestType'
                      requested_validity:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesRequestedValidity'
                    required:
                    - hostnames
                    - csr
                    - requested_validity
                    - request_type
                    type: object
                    enum:
                    - null
                required:
                - success
                - errors
                - messages
                - success
                - errors
                - messages
                - result
          description: Get Certificate response failure
      security:
      - user_service_key: []
      - api_token: []
      summary: Get Certificate
      tags:
      - Origin CA
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: origin_ca_certificates
        resource_chain: []
        method: get
components:
  schemas:
    tlsCertificatesAndHostnamesCertificateRevokeResponse:
      properties:
        result:
          properties:
            id:
              $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
            revoked_at:
              $ref: '#/components/schemas/tlsCertificatesAndHostnamesRevokedAt'
          type: object
      type: object
    tlsCertificatesAndHostnamesCertificates:
      properties:
        certificate:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificatesComponentsSchemasCertificate'
        csr:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCsr'
        expires_on:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesComponentsSchemasExpiresOn'
        hostnames:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesHostnames'
        id:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
        request_type:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesRequestType'
        requested_validity:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesRequestedValidity'
      required:
      - hostnames
      - csr
      - requested_validity
      - request_type
      type: object
    tlsCertificatesAndHostnamesCertificatesComponentsSchemasCertificate:
      description: The Origin CA certificate. Will be newline-encoded.
      example: '-----BEGIN CERTIFICATE-----

        MIICvDCCAaQCAQAwdzELMAkGA1UEBhMCVVMxDTALBgNVBAgMBFV0YWgxDzANBgNV

        BAcMBkxpbmRvbjEWMBQGA1UECgwNRGlnaUNlcnQgSW5jLjERMA8GA1UECwwIRGln

        aUNlcnQxHTAbBgNVBAMMFGV4YW1wbGUuZGlnaWNlcnQuY29tMIIBIjANBgkqhkiG

        9w0BAQEFAAOCAQ8AMIIBCgKCAQEA8+To7d+2kPWeBv/orU3LVbJwDrSQbeKamCmo

        wp5bqDxIwV20zqRb7APUOKYoVEFFOEQs6T6gImnIolhbiH6m4zgZ/CPvWBOkZc+c

        1Po2EmvBz+AD5sBdT5kzGQA6NbWyZGldxRthNLOs1efOhdnWFuhI162qmcflgpiI

        WDuwq4C9f+YkeJhNn9dF5+owm8cOQmDrV8NNdiTqin8q3qYAHHJRW28glJUCZkTZ

        wIaSR6crBQ8TbYNE0dc+Caa3DOIkz1EOsHWzTx+n0zKfqcbgXi4DJx+C1bjptYPR

        BPZL8DAeWuA8ebudVT44yEp82G96/Ggcf7F33xMxe0yc+Xa6owIDAQABoAAwDQYJ

        KoZIhvcNAQEFBQADggEBAB0kcrFccSmFDmxox0Ne01UIqSsDqHgL+XmHTXJwre6D

        hJSZwbvEtOK0G3+dr4Fs11WuUNt5qcLsx5a8uk4G6AKHMzuhLsJ7XZjgmQXGECpY

        Q4mC3yT3ZoCGpIXbw+iP3lmEEXgaQL0Tx5LFl/okKbKYwIqNiyKWOMj7ZR/wxWg/

        ZDGRs55xuoeLDJ/ZRFf9bI+IaCUd1YrfYcHIl3G87Av+r49YVwqRDT0VDV7uLgqn

        29XI1PpVUNCPQGn9p/eX6Qo7vpDaPybRtA2R7XLKjQaF9oXWeCUqy1hvJac9QFO2

        97Ob1alpHPoZ7mWiEuJwjBPii6a9M9G30nUo39lBi1w=

        -----END CERTIFICATE-----'
      readOnly: true
      type: string
    tlsCertificatesAndHostnamesComponentsSchemasExpiresOn:
      description: When the certificate will expire.
      example: 2014-01-01 05:20:00 +0000 UTC
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesCsr:
      description: The Certificate Signing Request (CSR). Must be newline-encoded.
      example: '-----BEGIN CERTIFICATE REQUEST-----

        MIICxzCCAa8CAQAwSDELMAkGA1UEBhMCVVMxFjAUBgNVBAgTDVNhbiBGcmFuY2lz

        Y28xCzAJBgNVBAcTAkNBMRQwEgYDVQQDEwtleGFtcGxlLm5ldDCCASIwDQYJKoZI

        hvcNAQEBBQADggEPADCCAQoCggEBALxejtu4b+jPdFeFi6OUsye8TYJQBm3WfCvL

        Hu5EvijMO/4Z2TImwASbwUF7Ir8OLgH+mGlQZeqyNvGoSOMEaZVXcYfpR1hlVak8

        4GGVr+04IGfOCqaBokaBFIwzclGZbzKmLGwIQioNxGfqFm6RGYGA3be2Je2iseBc

        N8GV1wYmvYE0RR+yWweJCTJ157exyRzu7sVxaEW9F87zBQLyOnwXc64rflXslRqi

        g7F7w5IaQYOl8yvmk/jEPCAha7fkiUfEpj4N12+oPRiMvleJF98chxjD4MH39c5I

        uOslULhrWunfh7GB1jwWNA9y44H0snrf+xvoy2TcHmxvma9Eln8CAwEAAaA6MDgG

        CSqGSIb3DQEJDjErMCkwJwYDVR0RBCAwHoILZXhhbXBsZS5uZXSCD3d3dy5leGFt

        cGxlLm5ldDANBgkqhkiG9w0BAQsFAAOCAQEAcBaX6dOnI8ncARrI9ZSF2AJX+8mx

        pTHY2+Y2C0VvrVDGMtbBRH8R9yMbqWtlxeeNGf//LeMkSKSFa4kbpdx226lfui8/

        auRDBTJGx2R1ccUxmLZXx4my0W5iIMxunu+kez+BDlu7bTT2io0uXMRHue4i6quH

        yc5ibxvbJMjR7dqbcanVE10/34oprzXQsJ/VmSuZNXtjbtSKDlmcpw6To/eeAJ+J

        hXykcUihvHyG4A1m2R6qpANBjnA0pHexfwM/SgfzvpbvUg0T1ubmer8BgTwCKIWs

        dcWYTthM51JIqRBfNqy4QcBnX+GY05yltEEswQI55wdiS3CjTTA67sdbcQ==

        -----END CERTIFICATE REQUEST-----'
      type: string
    tlsCertificatesAndHostnamesHostnames:
      description: Array of hostnames or wildcard names bound to the certificate. Hostnames must be fully qualified domain names (FQDNs) belonging to zones on your account (e.g., `example.com` or `sub.example.com`). Wildcards are supported only as a `*.` prefix for a single level (e.g., `*.example.com`). Double wildcards (`*.*.example.com`) and interior wildcards (`foo.*.example.com`) are not allowed. The wildcard suffix must be a multi-label domain (`*.example.com` is valid, but `*.com` is not). Unicode/IDN hostnames are accepted and automatically converted to punycode.
      example:
      - example.com
      - '*.example.com'
      - sub.example.com
      items:
        minLength: 1
        type: string
        x-auditable: true
      maxItems: 100
      minItems: 1
      type: array
    tlsCertificatesAndHostnamesIdentifier:
      description: Identifier.
      example: 023e105f4ecef8ad9ca31a8372d0c353
      maxLength: 32
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
        - code
        - message
        type: object
        uniqueItems: true
      type: array
    tlsCertificatesAndHostnamesRequestType:
      description: Signature type desired on certificate ("origin-rsa" (rsa), "origin-ecc" (ecdsa), or "keyless-certificate" (for Keyless SSL servers).
      enum:
      - origin-rsa
      - origin-ecc
      - keyless-certificate
      example: origin-rsa
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesRequestedValidity:
      default: 5475
      description: The number of days for which the certificate should be valid.
      enum:
      - 7
      - 30
      - 90
      - 365
      - 730
      - 1095
      - 5475
      example: 5475
      type: number
      x-auditable: true
    tlsCertificatesAndHostnamesRevokedAt:
      description: When the certificate was revoked.
      example: '2024-09-06T18:43:47.928893Z'
      format: date-time
      readOnly: true
      type: string
      x-auditable: true
    tlsCertificatesAndHostnamesSchemasCertificateResponseCollection:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificates'
          type: array
      required:
      - success
      - errors
      - messages
    tlsCertificatesAndHostnamesSchemasCertificateResponseSingle:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        messages:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificates'
      required:
      - success
      - errors
      - messages
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: The previous authorization scheme for interacting with the Cloudflare API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: The preferred authorization scheme for interacting with the Cloudflare API. [Create a token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: Used when interacting with the Origin CA certificates API. [View/change your key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    certificates:
      id: cloudflare.origin_ca_certificates.certificates
      name: certificates
      title: Certificates
      methods:
        list:
          operation:
            $ref: '#/paths/~1certificates/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1certificates/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
          request:
            mediaType: application/json
            transform:
              type: golang_template_json_v0.3.0
              body: '{

                {{- $sep := "" -}}

                {{- if .csr }}{{ $sep }}"csr": {{ toJson .csr }}{{- $sep = "," -}}{{ end }}

                {{- if .hostnames }}{{ $sep }}"hostnames": {{ if eq (kindOf .hostnames) "string" }}{{ .hostnames }}{{ else }}{{ toJson .hostnames }}{{ end }}{{- $sep = "," -}}{{ end }}

                {{- if .request_type }}{{ $sep }}"request_type": {{ toJson .request_type }}{{- $sep = "," -}}{{ end }}

                {{- if .requested_validity }}{{ $sep }}"requested_validity": {{ toJson .requested_validity }}{{- $sep = "," -}}{{ end }}

                }

                '
        delete:
          operation:
            $ref: '#/paths/~1certificates~1{certificate_id}/delete'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: '#/paths/~1certificates~1{certificate_id}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
      sqlVerbs:
        select:
        - $ref: '#/components/x-stackQL-resources/certificates/methods/get'
        - $ref: '#/components/x-stackQL-resources/certificates/methods/list'
        insert:
        - $ref: '#/components/x-stackQL-resources/certificates/methods/create'
        update: []
        delete:
        - $ref: '#/components/x-stackQL-resources/certificates/methods/delete'
        replace: []
