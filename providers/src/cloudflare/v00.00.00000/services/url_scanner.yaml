                  - LT
                  - LU
                  - MO
                  - MG
                  - MW
                  - MY
                  - MV
                  - ML
                  - MR
                  - MU
                  - MX
                  - FM
                  - MD
                  - MC
                  - MN
                  - MS
                  - MA
                  - MZ
                  - MM
                  - NA
                  - NR
                  - NP
                  - NL
                  - NZ
                  - NI
                  - NE
                  - NG
                  - KP
                  - MK
                  - 'NO'
                  - OM
