                  - TM
                  - UG
                  - UA
                  - AE
                  - GB
                  - US
                  - UY
                  - UZ
                  - VU
                  - VE
                  - VN
                  - YE
                  - ZM
                  - ZW
                  type: string
                customHeaders:
                  description: Set custom headers.
                  type: object
                screenshotsResolutions:
                  default:
                  - desktop
                  description: Take multiple screenshots targeting different device types.
                  items:
                    default: desktop
                    description: Device resolutions.
                    enum:
                    - desktop
                    - mobile
                    - tablet
                    type: string
                  type: array
                url:
                  type: string
                visibility:
                  default: Public
                  description: The option `Public` means it will be included in listings like recent scans and search results. `Unlisted` means it will not be included in the aforementioned listings, users will need to have the scan's ID to access it. A a scan will be automatically marked as unlisted if it fails, if it contains potential PII or other sensitive material.
                  enum:
                  - Public
                  - Unlisted
                  type: string
              required:
              - url
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    properties:
                      time:
                        description: Time when url was submitted for scanning.
                        format: date-time
                        type: string
                      url:
                        description: Canonical form of submitted URL. Use this if you want to later search by URL.
                        type: string
                      uuid:
                        description: Scan ID.
                        format: uuid
                        type: string
                      visibility:
                        description: Submitted visibility status.
                        enum:
                        - public
                        - unlisted
                        type: string
                    required:
                    - visibility
                    - uuid
                    - url
                    - time
                    type: object
                  success:
                    type: boolean
                required:
                - messages
                - errors
                - success
                - result
                type: object
          description: Scan request accepted successfully.
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  success:
                    description: Whether request was successful or not
                    type: boolean
                required:
                - messages
                - errors
                - success
                type: object
          description: Invalid params.
        '409':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    properties:
                      tasks:
                        items:
                          properties:
                            clientLocation:
                              description: Submitter location
                              type: string
                            clientType:
                              enum:
                              - Site
                              - Automatic
                              - Api
                              type: string
                            effectiveUrl:
                              description: URL of the primary request, after all HTTP redirects
                              type: string
                            errors:
                              items:
                                properties:
                                  message:
                                    type: string
                                required:
                                - message
                                type: object
                              type: array
                            scannedFrom:
                              properties:
                                colo:
                                  description: IATA code of Cloudflare datacenter
                                  type: string
                              required:
                              - colo
                              type: object
                            status:
                              enum:
                              - Queued
                              - InProgress
                              - InPostProcessing
                              - Finished
                              type: string
                            success:
                              type: boolean
                            time:
                              type: string
                            timeEnd:
                              type: string
                            url:
                              description: Submitted URL
                              type: string
                            uuid:
                              description: Scan ID
                              type: string
                            visibility:
                              enum:
                              - Public
                              - Unlisted
                              type: string
                          required:
                          - uuid
                          - url
                          - status
                          - success
                          - errors
                          - time
                          - timeEnd
                          - visibility
                          - clientLocation
                          - clientType
                          - effectiveUrl
                          - scannedFrom
                          type: object
                        type: array
                    required:
                    - tasks
                    type: object
                  success:
                    type: boolean
                required:
                - messages
                - errors
                - success
                - result
                type: object
          description: 'Scan request denied: hostname was recently scanned.'
        '429':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  success:
                    type: boolean
                required:
                - messages
                - errors
                - success
                type: object
          description: 'Scan request denied: rate limited.'
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create URL Scan
      tags:
      - URL Scanner (Deprecated)
      x-api-token-group:
      - URL Scanner Write
      - URL Scanner Read
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stainless-deprecation-message: Use [V2](https://developers.cloudflare.com/api/resources/url_scanner/subresources/scans/methods/create/) instead.
  /accounts/{account_id}/urlscanner/scan/{scan_id}:
    get:
      deprecated: true
      description: Get URL scan by uuid
      operationId: urlscanner-get-scan
      parameters:
      - description: Scan UUID.
        in: path
        name: scan_id
        schema:
          description: Scan UUID.
          format: uuid
          type: string
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Whether to return full report (scan summary and network log).
        in: query
        name: full
        schema:
          description: Whether to return full report (scan summary and network log).
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  messages:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    properties:
                      scan:
                        properties:
                          asns:
                            description: Dictionary of Autonomous System Numbers where ASN's are the keys
                            properties:
                              asn:
                                description: ASN's contacted
                                properties:
                                  asn:
                                    type: string
                                  description:
                                    type: string
                                  location_alpha2:
                                    type: string
                                  name:
                                    type: string
                                  org_name:
                                    type: string
                                required:
                                - asn
                                - name
                                - description
                                - org_name
                                - location_alpha2
                                type: object
                            type: object
                          certificates:
                            items:
                              properties:
                                issuer:
                                  type: string
                                subjectName:
                                  type: string
                                validFrom:
                                  type: number
                                validTo:
                                  type: number
                              required:
                              - issuer
                              - subjectName
                              - validFrom
                              - validTo
                              type: object
                            type: array
                          domains:
                            properties:
                              example.com:
                                properties:
                                  categories:
                                    properties:
                                      content:
                                        items:
                                          $ref: '#/components/schemas/unnamedSchemaRef6d7a78acccfc753a8e931b1c4e72b6a6'
                                        type: array
                                      inherited:
                                        properties:
                                          content:
                                            items:
                                              $ref: '#/components/schemas/unnamedSchemaRef6d7a78acccfc753a8e931b1c4e72b6a6'
                                            type: array
                                          from:
                                            type: string
                                          risks:
                                            items:
                                              $ref: '#/components/schemas/unnamedSchemaRef6d7a78acccfc753a8e931b1c4e72b6a6'
                                            type: array
                                        type: object
                                      risks:
                                        items:
                                          $ref: '#/components/schemas/unnamedSchemaRef6d7a78acccfc753a8e931b1c4e72b6a6'
                                        type: array
                                    required:
                                    - inherited
                                    type: object
                                  dns:
                                    items:
                                      properties:
                                        address:
                                          type: string
                                        dnssec_valid:
                                          type: boolean
                                        name:
                                          type: string
                                        type:
                                          type: string
                                      required:
                                      - name
                                      - address
                                      - type
                                      - dnssec_valid
                                      type: object
                                    type: array
                                  name:
                                    type: string
                                  rank:
                                    properties:
                                      bucket:
                                        type: string
                                      name:
                                        type: string
                                      rank:
                                        description: Rank in the Global Radar Rank, if set. See more at https://blog.cloudflare.com/radar-domain-rankings/
                                        type: integer
                                    required:
                                    - name
                                    - bucket
                                    type: object
                                  type:
                                    type: string
                                required:
                                - name
                                - type
                                - categories
                                - dns
                                - rank
                                type: object
                            type: object
                          geo:
                            properties:
                              continents:
                                items:
                                  description: GeoIP continent location
                                  type: string
                                type: array
                              locations:
                                items:
                                  description: GeoIP country location
                                  type: string
                                type: array
                            required:
                            - locations
                            - continents
                            type: object
                          ips:
                            properties:
                              ip:
                                properties:
                                  asn:
                                    type: string
                                  asnDescription:
                                    type: string
                                  asnLocationAlpha2:
                                    type: string
                                  asnName:
                                    type: string
                                  asnOrgName:
                                    type: string
                                  continent:
                                    type: string
                                  geonameId:
                                    type: string
                                  ip:
                                    type: string
                                  ipVersion:
                                    type: string
                                  latitude:
                                    type: string
                                  locationAlpha2:
                                    type: string
                                  locationName:
                                    type: string
                                  longitude:
                                    type: string
                                  subdivision1Name:
                                    type: string
                                  subdivision2Name:
                                    type: string
                                required:
                                - ip
                                - ipVersion
                                - locationAlpha2
                                - locationName
                                - subdivision1Name
                                - subdivision2Name
                                - latitude
                                - longitude
                                - continent
                                - geonameId
                                - asn
                                - asnName
                                - asnOrgName
                                - asnDescription
                                - asnLocationAlpha2
