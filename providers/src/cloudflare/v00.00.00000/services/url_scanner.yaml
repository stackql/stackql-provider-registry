  /accounts/{account_id}/urlscanner/v2/search:
    get:
      description: 'Use a subset of ElasticSearch Query syntax to filter scans. Some example queries:<br/> <br/>- ''path:"/bundles/jquery.js"'': Searches for scans who requested resources with the given path.<br/>- ''page.asn:AS24940 AND hash:xxx'': Websites hosted in AS24940 where a resource with the given hash was downloaded.<br/>- ''page.domain:microsoft* AND verdicts.malicious:true AND NOT page.domain:microsoft.com'': malicious scans whose hostname starts with "microsoft".<br/>- ''apikey:me AND date:[2025-01 TO 2025-02]'': my scans from 2025 January to 2025 February.'
      operationId: urlscanner-search-scans-v2
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Limit the number of objects in the response.
        in: query
        name: size
        schema:
          description: Limit the number of objects in the response.
          type: integer
      - description: Filter scans
        in: query
        name: q
        schema:
          description: Filter scans
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  results:
                    items:
                      properties:
                        _id:
                          type: string
                        page:
                          properties:
                            asn:
                              type: string
                            country:
                              type: string
                            ip:
                              type: string
                            url:
                              type: string
                          required:
                          - country
                          - ip
                          - url
                          - asn
                          type: object
                        result:
                          type: string
                        stats:
                          properties:
                            dataLength:
                              type: number
                            requests:
                              type: number
                            uniqCountries:
                              type: number
                            uniqIPs:
                              type: number
                          required:
                          - uniqIPs
                          - uniqCountries
                          - dataLength
                          - requests
                          type: object
                        task:
                          properties:
                            time:
                              type: string
                            url:
                              type: string
                            uuid:
                              type: string
                            visibility:
                              type: string
                          required:
                          - visibility
                          - time
                          - uuid
                          - url
                          type: object
                        verdicts:
                          properties:
                            malicious:
                              type: boolean
                          required:
                          - malicious
                          type: object
                      required:
                      - task
                      - stats
                      - page
                      - verdicts
                      - _id
                      - result
                      type: object
                    type: array
                required:
                - results
                type: object
          description: Search results
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        detail:
                          type: string
                        status:
                          description: Status code.
