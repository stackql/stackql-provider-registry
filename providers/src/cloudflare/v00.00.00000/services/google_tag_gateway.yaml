openapi: 3.0.3
info:
  title: google_tag_gateway API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/settings/google-tag-gateway/config:
    get:
      description: Gets the Google Tag Gateway configuration for a zone.
      operationId: zone-settings-get-google-tag-gateway-config
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/googleTagGatewayMessages'
                  messages:
                    $ref: '#/components/schemas/googleTagGatewayMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/googleTagGatewayGoogleTagGatewayConfig
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: Get Google Tag Gateway configuration response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/googleTagGatewayApiResponseCommonFailure'
          description: Get Google Tag Gateway configuration response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Google Tag Gateway configuration
      tags:
        - Google Tag Gateway
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
      x-cfPermissionsRequired:
        enum:
          - '#zone_settings:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: google_tag_gateway
        resource_chain:
          - config
        method: get
    put:
      description: Updates the Google Tag Gateway configuration for a zone.
      operationId: zone-settings-change-google-tag-gateway-config
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/googleTagGatewayGoogleTagGatewayConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    $ref: '#/components/schemas/googleTagGatewayMessages'
                  messages:
                    $ref: '#/components/schemas/googleTagGatewayMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    $ref: >-
                      #/components/schemas/googleTagGatewayGoogleTagGatewayConfig
                required:
                  - success
                  - errors
                  - messages
                type: object
          description: Update Google Tag Gateway configuration response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/googleTagGatewayApiResponseCommonFailure'
          description: Update Google Tag Gateway configuration response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update Google Tag Gateway configuration
      tags:
        - Google Tag Gateway
      x-api-token-group:
        - Zone Settings Write
      x-cfPermissionsRequired:
        enum:
          - '#zone_settings:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: google_tag_gateway
        resource_chain:
          - config
        method: update
components:
  schemas:
    googleTagGatewayApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/googleTagGatewayMessages'
        messages:
          example: []
          $ref: '#/components/schemas/googleTagGatewayMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    googleTagGatewayGoogleTagGatewayConfig:
      description: Google Tag Gateway configuration for a zone.
      properties:
        enabled:
          description: Enables or disables Google Tag Gateway for this zone.
          example: true
          type: boolean
          x-auditable: true
        endpoint:
          description: >-
            Specifies the endpoint path for proxying Google Tag Manager
            requests. Use an absolute path starting with '/', with no nested
            paths and alphanumeric characters only (e.g. /metrics).
          example: /metrics
          type: string
          x-auditable: true
        hideOriginalIp:
          description: Hides the original client IP address from Google when enabled.
          example: true
          type: boolean
          x-auditable: true
        measurementId:
          description: >-
            Specify the Google Tag Manager container or measurement ID (e.g.
            GTM-XXXXXXX or G-XXXXXXXXXX).
          example: GTM-P2F3N47Q
          type: string
          x-auditable: true
        setUpTag:
          description: >-
            Set up the associated Google Tag on the zone automatically when
            enabled.
          example: true
          nullable: true
          type: boolean
          x-auditable: true
      required:
        - enabled
        - endpoint
        - hideOriginalIp
        - measurementId
      title: Google Tag Gateway configuration
      type: object
    googleTagGatewayMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API, used in conjunction with a Global API key.
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
      description: >-
        The previous authorization scheme for interacting with the Cloudflare
        API. When possible, use API tokens instead of Global API keys.
    api_token:
      scheme: bearer
      type: http
      description: >-
        The preferred authorization scheme for interacting with the Cloudflare
        API. [Create a
        token](https://developers.cloudflare.com/fundamentals/api/get-started/create-token/).
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
      description: >-
        Used when interacting with the Origin CA certificates API. [View/change
        your
        key](https://developers.cloudflare.com/fundamentals/api/get-started/ca-keys/#viewchange-your-origin-ca-keys).
  x-stackQL-resources:
    config:
      id: cloudflare.google_tag_gateway.config
      name: config
      title: Config
      methods:
        list:
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1settings~1google-tag-gateway~1config/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1settings~1google-tag-gateway~1config/put
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/config/methods/list'
        insert: []
        update: []
        delete: []
        replace:
          - $ref: '#/components/x-stackQL-resources/config/methods/update'
