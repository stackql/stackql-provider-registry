openapi: 3.0.3
info:
  title: resource_sharing API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/shares:
    get:
      description: Lists all account shares.
      operationId: shares-list
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - description: Filter shares by status.
        in: query
        name: status
        schema:
          $ref: '#/components/schemas/resourceSharingShareStatus'
      - description: Filter shares by kind.
        in: query
        name: kind
        schema:
          $ref: '#/components/schemas/resourceSharingShareKind'
      - description: Filter shares by target_type.
        in: query
        name: target_type
        schema:
          $ref: '#/components/schemas/resourceSharingShareTargetType'
      - description: Filter share resources by resource_types.
        in: query
        name: resource_types
        schema:
          items:
            $ref: '#/components/schemas/resourceSharingResourceType'
          type: array
        explode: true
      - description: Order shares by values in the given field.
        in: query
        name: order
        schema:
          default: created
          enum:
          - name
          - created
          type: string
      - description: Direction to sort objects.
        in: query
        name: direction
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
      - description: Page number.
        in: query
        name: page
        schema:
          minimum: 0
          multipleOf: 1
          type: integer
      - description: Number of objects to return per page.
        in: query
        name: per_page
        schema:
          maximum: 100
          minimum: 0
          multipleOf: 1
          type: integer
      - description: Include resources in the response.
        in: query
        name: include_resources
        schema:
          type: boolean
      - description: Include recipient counts in the response.
        in: query
        name: include_recipient_counts
        schema:
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingShareResponseCollection'
          description: List account shares response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: List account shares response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: List account shares response failure.
      security:
      - api_email: []
        api_key: []
      summary: List account shares
      tags:
      - Resource Sharing
      x-api-token-group: null
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_sharing
        resource_chain: []
        method: list
    post:
      description: Creates a new resource share for sharing Cloudflare resources with other accounts or organizations.
      operationId: share-create
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/resourceSharingCreateShareRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingShareResponseSingle'
          description: Share created.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Create share failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Create share failure.
      security:
      - api_email: []
        api_key: []
      summary: Create a new share
      tags:
      - Resource Sharing
      x-api-token-group: null
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_sharing
        resource_chain: []
        method: create
  /accounts/{account_id}/shares/{share_id}:
    delete:
      description: Deletion is not immediate, an updated share object with a new status will be returned.
      operationId: share-delete
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: share_id
        schema:
          $ref: '#/components/schemas/resourceSharingShareId'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingShareResponseSingle'
          description: Share deleted.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Delete share failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Delete share failure.
      security:
      - api_email: []
        api_key: []
      summary: Delete a share
      tags:
      - Resource Sharing
      x-api-token-group: null
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_sharing
        resource_chain: []
        method: delete
    get:
      description: Fetches share by ID.
      operationId: shares-get-by-id
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: share_id
        schema:
          $ref: '#/components/schemas/resourceSharingShareId'
        required: true
      - description: Include resources in the response.
        in: query
        name: include_resources
        schema:
          type: boolean
      - description: Include recipient counts in the response.
        in: query
        name: include_recipient_counts
        schema:
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingShareResponseSingle'
          description: Get account share response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Get account share response failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Get account share response failure.
      security:
      - api_email: []
        api_key: []
      summary: Get account share by ID
      tags:
      - Resource Sharing
      x-api-token-group: null
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_sharing
        resource_chain: []
        method: get
    put:
      description: Updating is not immediate, an updated share object with a new status will be returned.
      operationId: share-update
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
        name: share_id
        schema:
          $ref: '#/components/schemas/resourceSharingShareId'
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/resourceSharingUpdateShareRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingShareResponseSingle'
          description: Share updated.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Update share failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Update share failure.
      security:
      - api_email: []
        api_key: []
      summary: Update a share
      tags:
      - Resource Sharing
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_sharing
        resource_chain: []
        method: update
  /accounts/{account_id}/shares/{share_id}/recipients:
