          description: List account share recipients response failure.
      security:
      - api_email: []
        api_key: []
      summary: List share recipients by share ID
      tags:
      - Resource Sharing
      x-api-token-group: null
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
      x-stackql-sdk:
        service: resource_sharing
        resource_chain:
        - recipients
        method: list
    post:
      description: Adds a recipient to a resource share, granting them access to the shared resources.
      operationId: share-recipient-create
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
