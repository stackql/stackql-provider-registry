        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/resourceSharingUpdateShareRecipientsRequest'
      responses:
        '204':
          description: Empty body
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Update share recipients failure.
        5XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/resourceSharingApiResponseCommonFailure'
          description: Update share recipients failure.
      security:
      - api_email: []
        api_key: []
      summary: Update a share's recipients
      tags:
      - Resource Sharing
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
