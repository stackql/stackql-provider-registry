          description: Create share recipient failure.
      security:
      - api_email: []
        api_key: []
      summary: Create a new share recipient
      tags:
      - Resource Sharing
      x-api-token-group: null
      x-cfPlanAvailability:
        business: false
        enterprise: true
        free: false
        pro: false
    put:
      description: Changes a share's recipients to match the given list. Returns an error if the share targets an organization.
      operationId: share-recipients-update
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: path
