openapi: 3.0.3
info:
  title: schema_validation API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/schema_validation/schemas:
    get:
      description: >-
        Lists all OpenAPI schemas uploaded to API Shield with pagination
        support.
      operationId: schema-validation-list-schemas-paginated
      parameters:
        - description: Page number of paginated results.
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - description: Maximum number of results per page.
          in: query
          name: per_page
          schema:
            default: 20
            maximum: 50
            minimum: 5
            type: integer
        - description: Omit the source-files of schemas and only retrieve their meta-data.
          in: query
          name: omit_source
          schema:
            default: false
            type: boolean
        - description: Filter for enabled schemas
          in: query
          name: validation_enabled
          schema:
            description: Flag whether schema is enabled for validation.
            type: boolean
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/apiShieldPublicSchema'
                    type: array
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Success
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List all uploaded schemas
      tags:
        - Schema Validation
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
      x-stackql-sdk:
        service: schema_validation
        resource_chain:
          - schemas
        method: list
    post:
      description: >-
        Uploads a new OpenAPI schema for API Shield schema validation. The
        schema defines expected request/response formats for API endpoints.
      operationId: schema-validation-create-schema
      requestBody:
        content:
          application/json:
            schema:
              properties:
                kind:
                  description: The kind of the schema
                  enum:
                    - openapi_v3
                  type: string
                name:
                  description: A human-readable name for the schema
                  type: string
                source:
                  description: >-
                    The raw schema, e.g., the OpenAPI schema, either as JSON or
                    YAML
                  type: string
                validation_enabled:
                  description: An indicator if this schema is enabled
                  type: boolean
              required:
                - name
                - kind
                - source
                - validation_enabled
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                          description: >-
                            A unique error code that describes the kind of issue
                            with the schema
                        documentation_url:
                          type: string
                        message:
                          type: string
                          description: A short text explaining the issue with the schema
                        source:
                          properties:
                            pointer:
                              type: string
                            locations:
                              description: >-
                                A list of JSON path expression(s) that describe
                                the location(s) of the issue within the provided
                                resource. See
                                [https://goessner.net/articles/JsonPath/](https://goessner.net/articles/JsonPath/)
                                for JSONPath specification.
                              items:
                                type: string
                              type: array
                          type: object
                      required:
                        - code
                        - message
                        - code
                        - message
                      type: object
                      uniqueItems: true
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                          description: >-
                            A unique error code that describes the kind of issue
                            with the schema
                        documentation_url:
                          type: string
                        message:
                          type: string
                          description: A short text explaining the issue with the schema
                        source:
                          properties:
                            pointer:
                              type: string
                            locations:
                              description: >-
                                A list of JSON path expression(s) that describe
                                the location(s) of the issue within the provided
                                resource. See
                                [https://goessner.net/articles/JsonPath/](https://goessner.net/articles/JsonPath/)
                                for JSONPath specification.
                              items:
                                type: string
                              type: array
                          type: object
                      required:
                        - code
                        - message
                        - code
                        - message
                      type: object
                      uniqueItems: true
                    type: array
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/apiShieldPublicSchema'
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - messages
          description: Successfully uploaded the schema
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    minLength: 1
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                          description: >-
                            A unique error code that describes the kind of issue
                            with the schema
                        documentation_url:
                          type: string
                        message:
                          type: string
                          description: A short text explaining the issue with the schema
                        source:
                          properties:
                            pointer:
                              type: string
                            locations:
                              description: >-
                                A list of JSON path expression(s) that describe
                                the location(s) of the issue within the provided
                                resource. See
                                [https://goessner.net/articles/JsonPath/](https://goessner.net/articles/JsonPath/)
                                for JSONPath specification.
                              items:
                                type: string
                              type: array
                          type: object
                      required:
                        - code
                        - message
                        - code
                        - message
                      type: object
                      uniqueItems: true
                    type: array
                  messages:
                    items:
                      properties:
                        code:
                          minimum: 1000
                          type: integer
                          description: >-
                            A unique error code that describes the kind of issue
                            with the schema
                        documentation_url:
                          type: string
                        message:
                          type: string
                          description: A short text explaining the issue with the schema
                        source:
                          properties:
                            pointer:
                              type: string
                            locations:
                              description: >-
                                A list of JSON path expression(s) that describe
                                the location(s) of the issue within the provided
                                resource. See
                                [https://goessner.net/articles/JsonPath/](https://goessner.net/articles/JsonPath/)
                                for JSONPath specification.
                              items:
                                type: string
                              type: array
                          type: object
                      required:
                        - code
                        - message
                        - code
                        - message
                      type: object
                      uniqueItems: true
                    type: array
                  result:
                    enum:
                      - null
                    nullable: true
                    type: object
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - false
                    type: boolean
                required:
                  - success
                  - errors
                  - messages
                  - result
                  - errors
          description: Failed uploaded the schema
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Upload a schema
      tags:
        - Schema Validation
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      x-stackql-sdk:
        service: schema_validation
        resource_chain:
          - schemas
        method: create
  /zones/{zone_id}/schema_validation/schemas/hosts:
    get:
      description: Lists all unique hosts found in uploaded OpenAPI schemas for the zone.
      operationId: schema-validation-list-schema-hosts
      parameters:
        - description: Page number of paginated results.
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - description: Maximum number of results per page.
          in: query
          name: per_page
          schema:
            default: 20
            maximum: 50
            minimum: 5
            type: integer
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: '#/components/schemas/apiShieldSchemaHosts'
                    type: array
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Success
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List hosts covered by uploaded schemas
      tags:
        - Schema Validation
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
  /zones/{zone_id}/schema_validation/schemas/{schema_id}:
    delete:
      description: >-
        Permanently removes an uploaded OpenAPI schema from API Shield.
        Operations using this schema will lose their validation rules.
      operationId: schema-validation-delete-schema
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    properties:
                      id:
                        description: The ID of the schema that was just deleted
                        format: uuid
                        type: string
                        x-auditable: true
                    required:
                      - id
                    type: object
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Success
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete a schema
      tags:
        - Schema Validation
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: The unique identifier of the schema
          in: path
          name: schema_id
          schema:
            type: string
            $ref: '#/components/schemas/apiShieldSchemasUuid'
            format: uuid
            readOnly: true
          required: true
      x-stackql-sdk:
        service: schema_validation
        resource_chain:
          - schemas
        method: delete
    get:
      description: >-
        Gets the contents and metadata of a specific OpenAPI schema uploaded to
        API Shield.
      operationId: schema-validation-get-schema
      parameters:
        - description: Omit the source-files of schemas and only retrieve their meta-data.
          in: query
          name: omit_source
          schema:
            default: false
            type: boolean
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: The unique identifier of the schema
          in: path
          name: schema_id
          schema:
            type: string
            $ref: '#/components/schemas/apiShieldSchemasUuid'
            format: uuid
            readOnly: true
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldPublicSchemaSuccessResult'
          description: Success
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get details of a schema
      tags:
        - Schema Validation
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
      x-stackql-sdk:
        service: schema_validation
        resource_chain:
          - schemas
        method: get
    patch:
      description: >-
        Modifies an existing OpenAPI schema in API Shield, updating the
        validation rules for associated API operations.
      operationId: schema-validation-edit-schema
      requestBody:
        content:
          application/json:
            schema:
              properties:
                validation_enabled:
                  description: Flag whether schema is enabled for validation.
                  type: boolean
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldPublicSchemaSuccessResult'
          description: Success
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Edit details of a schema to enable validation
      tags:
        - Schema Validation
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: The unique identifier of the schema
          in: path
          name: schema_id
          schema:
            type: string
            $ref: '#/components/schemas/apiShieldSchemasUuid'
            format: uuid
            readOnly: true
          required: true
      x-stackql-sdk:
        service: schema_validation
        resource_chain:
          - schemas
        method: edit
  /zones/{zone_id}/schema_validation/schemas/{schema_id}/operations:
    get:
      description: >-
        Retrieves all operations from the schema. Operations that already exist
        in API Shield Endpoint Management will be returned as full operations.
      operationId: schema-validation-extract-operations-from-schema
      parameters:
        - description: >-
            Add feature(s) to the results. The feature name that is given here
            corresponds to the resulting feature object. Have a look at the
            top-level object description for more details on the specific
            meaning.
          in: query
          name: feature
          schema:
            items:
              enum:
                - thresholds
                - parameter_schemas
                - schema_info
              type: string
            type: array
            uniqueItems: true
          explode: true
        - in: query
          name: host
          schema:
            description: Filter results to only include the specified hosts.
            items:
              type: string
            type: array
            uniqueItems: true
          explode: true
        - in: query
          name: method
          schema:
            description: Filter results to only include the specified HTTP methods.
            items:
              type: string
            type: array
            uniqueItems: true
          explode: true
        - in: query
          name: endpoint
          schema:
            description: Filter results to only include endpoints containing this pattern.
            type: string
        - description: Page number of paginated results.
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - description: Maximum number of results per page.
          in: query
          name: per_page
          schema:
            default: 20
            maximum: 50
            minimum: 5
            type: integer
        - description: >-
            Filter results by whether operations exist in Web Asset Management
            or not. `new` will just return operations from the schema that do
            not exist otherwise. `existing` will just return operations from the
            schema that already exist.
          in: query
          name: operation_status
          schema:
            enum:
              - new
              - existing
            type: string
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - description: The unique identifier of the schema
          in: path
          name: schema_id
          schema:
            type: string
            $ref: '#/components/schemas/apiShieldSchemasUuid'
            format: uuid
            readOnly: true
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      type: object
                      properties:
                        endpoint:
                          $ref: '#/components/schemas/apiShieldEndpoint'
                        host:
                          $ref: '#/components/schemas/apiShieldHost'
                        method:
                          $ref: '#/components/schemas/apiShieldMethod'
                        last_updated:
                          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
                        operation_id:
                          $ref: '#/components/schemas/apiShieldSchemasUuid'
                        features:
                          $ref: '#/components/schemas/apiShieldOperationFeatures'
                      required:
                        - endpoint
                        - host
                        - method
                    type: array
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: All operations in the schema
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Retrieve all operations from the schema.
      tags:
        - Schema Validation
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
  /zones/{zone_id}/schema_validation/settings:
    get:
      description: Retrieves the current global schema validation settings for a zone.
      operationId: schema-validation-get-settings
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/apiShieldGlobalSettings'
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Success
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get global schema validation settings
      tags:
        - Schema Validation Settings
      x-api-token-group:
        - Account API Gateway
        - Account API Gateway Read
        - Domain API Gateway
        - Domain API Gateway Read
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      x-stackql-sdk:
        service: schema_validation
        resource_chain:
          - settings
        method: get
    patch:
      description: >-
        Partially updates global schema validation settings for a zone using
        PATCH semantics.
      operationId: schema-validation-edit-settings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/apiShieldGlobalSettingChangeBase'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/apiShieldGlobalSettings'
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Success
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Edit global schema validation settings
      tags:
        - Schema Validation Settings
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      x-stackql-sdk:
        service: schema_validation
        resource_chain:
          - settings
        method: edit
    put:
      description: >-
        Fully updates global schema validation settings for a zone, replacing
        existing configuration.
      operationId: schema-validation-update-settings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/apiShieldGlobalSettingChangeBase'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/apiShieldMessages'
                  messages:
                    $ref: '#/components/schemas/apiShieldMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                    type: boolean
                  result:
                    $ref: '#/components/schemas/apiShieldGlobalSettings'
                required:
                  - success
                  - errors
                  - messages
                  - result
          description: Success
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/apiShieldApiResponseCommonFailure'
          description: Failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Update global schema validation settings
      tags:
        - Schema Validation Settings
      x-api-token-group:
        - Account API Gateway
        - Domain API Gateway
      parameters:
        - name: zone_id
          in: path
          required: true
