            objectKey: $.result
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: '#/paths/~1zones~1{zone_id}~1schema_validation~1schemas/post'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        delete:
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1schema_validation~1schemas~1{schema_id}/delete
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get:
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1schema_validation~1schemas~1{schema_id}/get
          response:
            mediaType: application/json
            openAPIDocKey: '200'
            objectKey: $.result
        edit:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: >-
              #/paths/~1zones~1{zone_id}~1schema_validation~1schemas~1{schema_id}/patch
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: '#/components/x-stackQL-resources/schemas/methods/get'
