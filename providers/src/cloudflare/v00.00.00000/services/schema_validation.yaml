components:
  schemas:
    apiShieldApiResponseCommonFailure:
      properties:
        errors:
          example:
            - code: 7003
              message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          example: []
          $ref: '#/components/schemas/apiShieldMessages'
        result:
          enum:
            - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
            - false
          example: false
          type: boolean
      required:
        - success
        - errors
        - messages
        - result
      type: object
    apiShieldAuthIdTokens:
      description: The total number of auth-ids seen across this calculation.
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldConfidenceIntervalsBounds:
      description: Upper and lower bound for percentile estimate
      properties:
        lower:
          description: Lower bound for percentile estimate
          example: 20.5
          type: number
          x-auditable: true
        upper:
          description: Upper bound for percentile estimate
          example: 30.4
          type: number
          x-auditable: true
      readOnly: true
      type: object
    apiShieldDataPoints:
      description: The number of data points used for the threshold suggestion calculation.
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldEndpoint:
      description: >-
        The endpoint which can contain path parameter templates in curly braces,
        each will be replaced from left to right with {varN}, starting with
        {var1}, during insertion. This will further be Cloudflare-normalized
        upon insertion. See:
        https://developers.cloudflare.com/rules/normalization/how-it-works/.
      example: /api/v1/users/{var1}
      format: uri-template
      maxLength: 4096
      type: string
      x-auditable: true
    apiShieldGlobalSettingChangeBase:
      properties:
        validation_default_mitigation_action:
          description: >-
            The default mitigation action used Mitigation actions are as
            follows: - `"log"` - log request when request does not conform to
            schema - `"block"` - deny access to the site when request does not
            conform to schema - `"none"` - skip running schema validation
          enum:
            - none
            - log
            - block
          example: block
          type: string
          x-auditable: true
        validation_override_mitigation_action:
          description: >-
            When set, this overrides both zone level and operation level
            mitigation actions. - `"none"` - skip running schema validation
            entirely for the request - `null` - clears any existing override
          enum:
            - none
            - null
          nullable: true
          type: string
          x-auditable: true
      type: object
    apiShieldGlobalSettings:
      properties:
        validation_default_mitigation_action:
          description: >-
            The default mitigation action used Mitigation actions are as
            follows: - `log` - log request when request does not conform to
            schema - `block` - deny access to the site when request does not
            conform to schema - `none` - skip running schema validation
          enum:
            - none
            - log
            - block
          example: block
          type: string
          x-auditable: true
        validation_override_mitigation_action:
          description: >-
            When not null, this overrides global both zone level and operation
            level mitigation actions. This can serve as a quick way to disable
            schema validation for the whole zone. - `"none"` will skip running
            schema validation entirely for the request
          enum:
            - none
          type: string
          x-auditable: true
      required:
        - validation_default_mitigation_action
      type: object
    apiShieldHost:
      description: RFC3986-compliant host.
      example: www.example.com
      format: hostname
      maxLength: 255
      type: string
      x-auditable: true
    apiShieldMessages:
      example: []
      items:
        properties:
          code:
            minimum: 1000
            type: integer
          documentation_url:
            type: string
          message:
            type: string
          source:
            properties:
              pointer:
                type: string
            type: object
        required:
          - code
          - message
        type: object
        uniqueItems: true
      type: array
    apiShieldMethod:
      description: The HTTP method used to access the endpoint.
      enum:
        - GET
        - POST
        - HEAD
        - OPTIONS
        - PUT
        - DELETE
        - CONNECT
        - PATCH
        - TRACE
      example: GET
      type: string
      x-auditable: true
    apiShieldOperationFeatures:
      readOnly: true
      type: object
      properties:
        thresholds:
          properties:
            auth_id_tokens:
              $ref: '#/components/schemas/apiShieldAuthIdTokens'
            data_points:
              $ref: '#/components/schemas/apiShieldDataPoints'
            last_updated:
              $ref: '#/components/schemas/apiShieldTimestamp'
            p50:
              $ref: '#/components/schemas/apiShieldP50'
            p90:
              $ref: '#/components/schemas/apiShieldP90'
            p99:
              $ref: '#/components/schemas/apiShieldP99'
            period_seconds:
              $ref: '#/components/schemas/apiShieldPeriodSeconds'
            requests:
              $ref: '#/components/schemas/apiShieldRequests'
            suggested_threshold:
              $ref: '#/components/schemas/apiShieldSuggestedThreshold'
          type: object
        parameter_schemas:
          properties:
            last_updated:
              $ref: '#/components/schemas/apiShieldTimestamp'
            parameter_schemas:
              $ref: '#/components/schemas/apiShieldParameterSchemasDefinition'
          type: object
        api_routing:
          description: API Routing settings on endpoint.
          properties:
            last_updated:
              $ref: '#/components/schemas/apiShieldTimestamp'
            route:
              description: Target route.
              example: https://api.example.com/api/service
              type: string
              x-auditable: true
          type: object
        confidence_intervals:
          properties:
            last_updated:
              $ref: '#/components/schemas/apiShieldTimestamp'
            suggested_threshold:
              properties:
                confidence_intervals:
                  properties:
                    p90:
                      $ref: '#/components/schemas/apiShieldConfidenceIntervalsBounds'
                    p95:
                      $ref: '#/components/schemas/apiShieldConfidenceIntervalsBounds'
                    p99:
                      $ref: '#/components/schemas/apiShieldConfidenceIntervalsBounds'
                  type: object
                mean:
                  description: Suggested threshold.
                  example: 25.5
                  type: number
                  x-auditable: true
              type: object
          type: object
        schema_info:
          properties:
            active_schema:
              description: Schema active on endpoint.
              properties:
                created_at:
                  $ref: '#/components/schemas/apiShieldTimestamp'
                  readOnly: true
                id:
                  $ref: '#/components/schemas/apiShieldSchemasUuid'
                is_learned:
                  description: True if schema is Cloudflare-provided.
                  example: true
                  type: boolean
                  x-auditable: true
                name:
                  description: Schema file name.
                  example: >-
                    api-endpoints-8694824bf5c04d019edcbf399c03c103-api-discovery.example.com-thresholds.json
                  type: string
                  x-auditable: true
              type: object
            learned_available:
              description: >-
                True if a Cloudflare-provided learned schema is available for
                this endpoint.
              example: true
              type: boolean
              x-auditable: true
            mitigation_action:
              description: Action taken on requests failing validation.
              enum:
                - none
                - log
                - block
              example: block
              nullable: true
              type: string
              x-auditable: true
          type: object
      required:
        - last_updated
      example:
        api_routing:
          last_updated: '2014-01-01T05:20:00.12345Z'
          route: https://api.example.com/api/service
    apiShieldP50:
      description: The p50 quantile of requests (in period_seconds).
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldP90:
      description: The p90 quantile of requests (in period_seconds).
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldP99:
      description: The p99 quantile of requests (in period_seconds).
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldParameterSchemasDefinition:
      description: An operation schema object containing a response.
      example:
        parameters:
          - description: >-
              Sufficient requests have been observed for this parameter to
              provide high confidence in this parameter schema.
            in: path
            name: var1
            schema:
              maximum: 10
              minimum: 1
              type: integer
        responses: null
      properties:
        parameters:
          description: An array containing the learned parameter schemas.
          example:
            - description: >-
                Sufficient requests have been observed for this parameter to
                provide high confidence in this parameter schema.
              in: path
              name: var1
              schema:
                maximum: 10
                minimum: 1
                type: integer
          items:
            type: object
          readOnly: true
          type: array
        responses:
          description: >-
            An empty response object. This field is required to yield a valid
            operation schema.
          nullable: true
          readOnly: true
          type: object
      readOnly: true
      type: object
    apiShieldPerOperationBulkSettings:
      description: Operation ID to per operation setting mapping
      type: object
    apiShieldPerOperationSetting:
      properties:
        mitigation_action:
          description: >-
            When set, this applies a mitigation action to this operation which
            supersedes a global schema validation setting just for this
            operation - `"log"` - log request when request does not conform to
            schema for this operation - `"block"` - deny access to the site when
            request does not conform to schema for this operation - `"none"` -
            will skip mitigation for this operation
          enum:
            - log
            - block
            - none
          example: block
          type: string
          x-auditable: true
        operation_id:
          $ref: '#/components/schemas/apiShieldSchemasUuid'
      required:
        - operation_id
        - mitigation_action
      type: object
    apiShieldPerOperationSettingChangeBase:
      properties:
        mitigation_action:
          description: >-
            When set, this applies a mitigation action to this operation -
            `"log"` - log request when request does not conform to schema for
            this operation - `"block"` - deny access to the site when request
            does not conform to schema for this operation - `"none"` - will skip
            mitigation for this operation - `null` - clears any mitigation
            action
          enum:
            - log
            - block
            - none
            - null
          example: block
          nullable: true
          type: string
          x-auditable: true
      type: object
    apiShieldPeriodSeconds:
      description: The period over which this threshold is suggested.
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldPublicSchema:
      description: A schema used in schema validation
      properties:
        created_at:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
          readOnly: true
        kind:
          description: The kind of the schema
          enum:
            - openapi_v3
          example: openapi_v3
          readOnly: true
          type: string
          x-auditable: true
        name:
          description: A human-readable name for the schema
          example: petstore schema
          readOnly: true
          type: string
          x-auditable: true
        schema_id:
          type: string
          x-auditable: true
          $ref: '#/components/schemas/apiShieldSchemasUuid'
          description: A unique identifier of this schema
          format: uuid
          readOnly: true
        source:
          description: The raw schema, e.g., the OpenAPI schema, either as JSON or YAML
          example: <schema file contents>
          readOnly: true
          type: string
          x-auditable: true
        validation_enabled:
          description: An indicator if this schema is enabled
          type: boolean
          x-auditable: true
      required:
        - schema_id
        - name
        - kind
        - source
        - created_at
      type: object
    apiShieldPublicSchemaSuccessResult:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/apiShieldMessages'
        messages:
          $ref: '#/components/schemas/apiShieldMessages'
        success:
          description: Whether the API call was successful.
          enum:
            - true
          example: true
          type: boolean
        result:
          $ref: '#/components/schemas/apiShieldPublicSchema'
      required:
        - success
        - errors
        - messages
        - result
    apiShieldRequests:
      description: The estimated number of requests covered by these calculations.
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldSchemaHosts:
      properties:
        created_at:
          $ref: '#/components/schemas/apiShieldSchemasTimestamp'
          readOnly: true
        hosts:
          description: Hosts serving the schema, e.g zone.host.com
          items:
            type: string
          readOnly: true
          type: array
          x-auditable: true
        name:
          description: Name of the schema
          example: petstore schema
          readOnly: true
          type: string
          x-auditable: true
        schema_id:
          type: string
          x-auditable: true
          $ref: '#/components/schemas/apiShieldSchemasUuid'
          description: A unique identifier of this schema
          format: uuid
          readOnly: true
      required:
        - schema_id
        - name
        - hosts
        - created_at
      type: object
    apiShieldSchemasTimestamp:
      $ref: '#/components/schemas/apiShieldTimestamp'
      readOnly: true
      type: string
      x-auditable: true
    apiShieldSchemasUuid:
      minLength: 36
      type: string
      x-auditable: true
      $ref: '#/components/schemas/apiShieldUuid'
    apiShieldSuggestedThreshold:
      description: >-
        The suggested threshold in requests done by the same auth_id or
        period_seconds.
      readOnly: true
      type: integer
      x-auditable: true
    apiShieldTimestamp:
      example: '2014-01-01T05:20:00.12345Z'
      format: date-time
      type: string
      x-auditable: true
    apiShieldUuid:
      description: UUID.
      example: f174e90a-fafe-4643-bbbc-4a0ed4fc8415
      maxLength: 36
      type: string
      x-auditable: true
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
