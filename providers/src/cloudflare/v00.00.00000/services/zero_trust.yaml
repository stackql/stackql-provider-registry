openapi: 3.0.3
info:
  title: zero_trust API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/access/ai-controls/mcp/portals:
    get:
      description: Lists all MCP portals configured for the account.
      operationId: mcp-portals-api-list-portals
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - in: query
        name: per_page
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
      - in: query
        name: search
        schema:
          description: Search by id, name, hostname
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  result:
                    items:
                      properties:
                        allow_code_mode:
                          default: true
                          description: Allow remote code execution in Dynamic Workers (beta)
                          type: boolean
                        created_at:
                          format: date-time
                          readOnly: true
                          type: string
                        created_by:
                          readOnly: true
                          type: string
                        description:
                          maxLength: 512
                          type: string
                        hostname:
                          type: string
                        id:
                          description: portal id
                          maxLength: 32
                          minLength: 1
                          type: string
                        modified_at:
                          format: date-time
                          readOnly: true
                          type: string
                        modified_by:
                          readOnly: true
                          type: string
                        name:
                          maxLength: 350
                          type: string
                        secure_web_gateway:
                          default: false
                          description: Route outbound MCP traffic through Zero Trust Secure Web Gateway
                          type: boolean
                        servers:
                          items:
                            properties:
                              auth_type:
                                enum:
                                - oauth
                                - bearer
                                - unauthenticated
                                type: string
                              created_at:
                                format: date-time
                                readOnly: true
                                type: string
                              created_by:
                                readOnly: true
                                type: string
                              default_disabled:
                                default: false
                                type: boolean
                              description:
                                maxLength: 512
                                nullable: true
                                type: string
                              error:
                                readOnly: true
                                type: string
                              hostname:
                                format: uri
                                type: string
                              id:
                                description: server id
                                maxLength: 32
                                minLength: 1
                                type: string
                              last_successful_sync:
                                format: date-time
                                readOnly: true
                                type: string
                              last_synced:
                                format: date-time
                                readOnly: true
                                type: string
                              modified_at:
                                format: date-time
                                readOnly: true
                                type: string
                              modified_by:
                                readOnly: true
                                type: string
                              name:
                                maxLength: 350
                                type: string
                              on_behalf:
                                default: true
                                type: boolean
                              prompts:
                                items:
                                  type: object
                                readOnly: true
                                type: array
                              status:
                                default: waiting
                                readOnly: true
                                type: string
                              tools:
                                items:
                                  type: object
                                readOnly: true
                                type: array
                              updated_prompts:
                                items:
                                  properties:
                                    description:
                                      type: string
                                    enabled:
                                      type: boolean
                                    name:
                                      type: string
                                    portal_alias:
                                      type: string
                                    server_alias:
                                      type: string
                                  required:
                                  - name
                                  type: object
                                type: array
                              updated_tools:
                                items:
                                  properties:
                                    description:
                                      type: string
                                    enabled:
                                      type: boolean
                                    name:
                                      type: string
                                    portal_alias:
                                      type: string
                                    server_alias:
                                      type: string
                                  required:
                                  - name
                                  type: object
                                type: array
                            required:
                            - id
                            - name
                            - hostname
                            - auth_type
                            - tools
                            - prompts
                            type: object
                          type: array
                      required:
                      - id
                      - name
                      - hostname
                      - servers
                      type: object
                    type: array
                  success:
                    type: boolean
                required:
                - success
                - result
                type: object
          description: List objects
        '400':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    items:
                      properties:
                        message:
                          type: string
                      required:
                      - message
                      type: object
                    type: array
                  result:
                    type: object
                  success:
                    type: boolean
                required:
                - result
                - success
                - errors
                type: object
          description: Bad Request
