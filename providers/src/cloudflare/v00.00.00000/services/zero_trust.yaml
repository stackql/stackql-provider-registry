components:
  schemas:
    accessAaguid:
      description: The Authenticator Attestation GUID (AAGUID) uniquely identifying a FIDO2 authenticator model
      example: 2fc0579f-8113-47ea-b116-bb5a8db9202a
      format: uuid
      type: string
    accessAccessRequests:
      properties:
        action:
          $ref: '#/components/schemas/accessAction'
        allowed:
          $ref: '#/components/schemas/accessAllowed'
        app_domain:
          $ref: '#/components/schemas/accessAppDomain'
        app_uid:
          $ref: '#/components/schemas/accessAppUid'
        connection:
          $ref: '#/components/schemas/accessConnection'
        created_at:
          $ref: '#/components/schemas/accessTimestamp'
          readOnly: true
        ip_address:
          $ref: '#/components/schemas/accessIp'
        ray_id:
          $ref: '#/components/schemas/accessRayId'
        user_email:
          $ref: '#/components/schemas/accessComponentsSchemasEmail'
      type: object
    accessAccessRequestsComponentsSchemasResponseCollection:
      properties:
        errors:
          $ref: '#/components/schemas/accessMessages'
        messages:
          $ref: '#/components/schemas/accessMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          items:
            $ref: '#/components/schemas/accessAccessRequests'
          type: array
      required:
      - success
      - errors
      - messages
      type: object
    accessAccessSeat:
      description: True if the seat is part of Access.
      example: false
      type: boolean
      x-auditable: true
    accessAction:
      description: The event that occurred, such as a login attempt.
      example: login
      type: string
    accessActiveDeviceCount:
      description: The number of active devices registered to the user.
      example: 2
      type: number
    accessActiveSessionResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/accessMessages'
        messages:
          $ref: '#/components/schemas/accessMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result:
          type: object
          properties:
            account_id:
              example: '1234567890'
              type: string
              x-auditable: true
            auth_status:
              example: NONE
              type: string
              x-auditable: true
            common_name:
              example: ''
              type: string
            devicePosture:
              type: object
            device_id:
              example: ''
              type: string
            device_sessions:
              $ref: '#/components/schemas/accessStringKeyMapDeviceSession'
            email:
              example: test@cloudflare.com
              type: string
            geo:
              $ref: '#/components/schemas/accessGeo'
            iat:
              example: 1694791905
              type: number
            idp:
              properties:
                id:
                  type: string
                type:
                  type: string
              type: object
            ip:
              example: 127.0.0.0
              type: string
            is_gateway:
              example: false
              type: boolean
            is_warp:
              example: false
              type: boolean
            mtls_auth:
              properties:
                auth_status:
                  type: string
                cert_issuer_dn:
                  type: string
                cert_issuer_ski:
                  type: string
                cert_presented:
                  type: boolean
                cert_serial:
                  type: string
              type: object
            service_token_id:
              example: ''
              type: string
            service_token_status:
              example: false
              type: boolean
            user_uuid:
              example: 57cf8cf2-f55a-4588-9ac9-f5e41e9f09b4
              type: string
            version:
              example: 2
              type: number
            isActive:
              example: true
              type: boolean
      required:
      - success
      - errors
      - messages
    accessActiveSessionsResponse:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/accessMessages'
        messages:
          $ref: '#/components/schemas/accessMessages'
        success:
          description: Whether the API call was successful.
          enum:
          - true
          example: true
          type: boolean
        result_info:
          properties:
            count:
              description: Total number of results for the requested service.
              example: 1
              type: number
            page:
              description: Current page within paginated list of results.
              example: 1
              type: number
            per_page:
              description: Number of results per page of results.
              example: 20
              type: number
            total_count:
              description: Total results available without any search parameters.
              example: 2000
              type: number
            total_pages:
              description: The number of total pages in the entire result set.
              example: 100
              type: number
          type: object
        result:
          items:
            $ref: '#/components/schemas/accessActiveSessionsResponse_result_item'
          type: array
      required:
      - success
      - errors
      - messages
    accessActiveSessionsResponse_result_item:
      properties:
        expiration:
          example: 1694813506
          type: integer
        metadata:
          properties:
            apps:
              type: object
            expires:
              example: 1694813506
              type: integer
            iat:
              example: 1694791905
              type: integer
            nonce:
              example: X1aXj1lFVcqqyoXF
              type: string
            ttl:
              example: 21600
              type: integer
          type: object
        name:
          type: string
      type: object
    accessAllowAllHeaders:
      description: Allows all HTTP request headers.
      example: true
      type: boolean
    accessAllowAllMethods:
      description: Allows all HTTP request methods.
      type: boolean
    accessAllowAllOrigins:
      description: Allows all origins.
      type: boolean
    accessAllowAuthenticateViaWarp:
      default: false
      description: When set to true, users can authenticate via WARP for any application in your organization. Application settings will take precedence over this value.
      type: boolean
      x-auditable: true
    accessAllowCredentials:
      description: When set to `true`, includes credentials (cookies, authorization headers, or TLS client certificates) with requests.
      type: boolean
    accessAllowIframe:
      description: Enables loading application content in an iFrame.
      example: true
      type: boolean
    accessAllowed:
      default: false
      description: The result of the authentication event.
      type: boolean
    accessAllowedClipboardLocalToRemoteFormats:
      description: Clipboard formats allowed when copying from local machine to remote RDP session.
      example:
      - text
      items:
        $ref: '#/components/schemas/accessRdpClipboardFormat'
      type: array
    accessAllowedClipboardRemoteToLocalFormats:
      description: Clipboard formats allowed when copying from remote RDP session to local machine.
      example:
      - text
      items:
        $ref: '#/components/schemas/accessRdpClipboardFormat'
      type: array
    accessAllowedHeaders:
      description: Allowed HTTP request headers.
      items:
        type: string
      type: array
    accessAllowedIdps:
      description: The identity providers your users can select when connecting to this application. Defaults to all IdPs configured in your account.
      items:
        description: The identity providers selected for application.
        example: 699d98642c564d2e855e9661899b7252
        type: string
      type: array
    accessAllowedMethods:
      description: Allowed HTTP request methods.
      example:
      - GET
      items:
        enum:
        - GET
        - POST
        - HEAD
        - PUT
        - DELETE
        - CONNECT
        - OPTIONS
        - TRACE
        - PATCH
        type: string
      type: array
    accessAllowedOrigins:
      description: Allowed origins.
      example:
      - https://example.com
      items:
        type: string
      type: array
    accessApiResponseCommonFailure:
      properties:
        errors:
          example:
          - code: 7003
            message: No route for the URI
          minLength: 1
          $ref: '#/components/schemas/accessMessages'
        messages:
          example: []
          $ref: '#/components/schemas/accessMessages'
        result:
          enum:
          - null
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    accessAppCount:
      description: Number of access applications currently using this policy.
      example: 2
      type: integer
      x-auditable: true
    accessAppDomain:
      description: The URL of the Access application.
      example: test.example.com/admin
      type: string
    accessAppLauncherLogoUrl:
      description: The image URL of the logo shown in the App Launcher header.
      example: https://www.cloudflare.com/img/logo-web-badges/cf-logo-on-white-bg.svg
      type: string
