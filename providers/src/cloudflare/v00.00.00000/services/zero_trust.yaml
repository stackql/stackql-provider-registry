      example:
      - type: public
        uri: test.example.com/admin
      - type: public
        uri: test.anotherexample.com/staff
      - cidr: 10.5.0.0/24
        port_range: 80-90
        type: private
      - cidr: 10.5.0.3/32
        port_range: '80'
        type: private
