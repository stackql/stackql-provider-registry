openapi: 3.0.3
info:
  title: streams API
  description: Welcome to Cloudflare's API documentation site. We are experimenting with an updated version of our API documentation - check out [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/) to test out the new experience. To get started using Cloudflare's products and services via the API, refer to [how to interact with Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/), which covers using tools like [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform) and the [official SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to maintain your Cloudflare resources. Using the Cloudflare API requires authentication so that Cloudflare knows who is making requests and what permissions you have. Create an API token to grant access to the API to perform actions. You can also authenticate with [API keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations) that make them less secure than API tokens. Whenever possible, use API tokens to interact with the Cloudflare API. To create an API token, from the Cloudflare dashboard, go to My Profile > API Tokens and select Create Token. For more information on how to create and troubleshoot API tokens, refer to our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/). For information regarding rate limits, refer to our [API Rate Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits). Totally new to Cloudflare? [Start here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
- url: https://api.cloudflare.com/client/v4
security:
- api_token: []
paths:
  /accounts/{account_id}/stream:
    get:
      description: Lists up to 1000 videos from a single request. For a specific range, refer to the optional parameters.
      operationId: stream-videos-list-videos
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: status
        schema:
          $ref: '#/components/schemas/streamMediaState'
      - in: query
        name: creator
        schema:
          $ref: '#/components/schemas/streamCreator'
      - in: query
        name: type
        schema:
          $ref: '#/components/schemas/streamType'
      - in: query
        name: asc
        schema:
          $ref: '#/components/schemas/streamAsc'
      - in: query
        name: video_name
        schema:
          $ref: '#/components/schemas/streamVideoName'
      - in: query
        name: search
        schema:
          $ref: '#/components/schemas/streamSearch'
      - in: query
        name: start
        schema:
          $ref: '#/components/schemas/streamStart'
      - in: query
        name: end
        schema:
          $ref: '#/components/schemas/streamEnd'
      - in: query
        name: include_counts
        schema:
          $ref: '#/components/schemas/streamIncludeCounts'
      - description: Filter by video ID(s). Can be a single ID or a comma-separated list of IDs.
        in: query
        name: id
        schema:
          type: string
      - description: Filter by video name/UID(s). Can be a single name or a comma-separated list.
        in: query
        name: name
        schema:
          type: string
      - description: Filter by live input ID to find videos associated with a specific live stream.
        in: query
        name: live_input_id
        schema:
          type: string
      - description: Alias for 'end'. Returns videos created before this date/time (RFC 3339 format).
        in: query
        name: before
        schema:
          format: date-time
          type: string
      - description: Alias for 'start'. Returns videos created after this date/time (RFC 3339 format).
        in: query
        name: after
        schema:
          format: date-time
          type: string
      - description: Maximum number of videos to return (default 1000, max 1000).
        in: query
        name: limit
        schema:
          maximum: 1000
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamVideoResponseCollection'
          description: List videos response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: List videos response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List videos
      tags:
      - Stream Videos
      x-api-token-group:
      - Stream Write
      - Stream Read
      x-stackql-sdk:
        service: stream
        resource_chain: []
        method: list
    post:
      description: Initiates a video upload using the TUS protocol. On success, the server responds with a status code 201 (created) and includes a `location` header to indicate where the content should be uploaded. Refer to https://tus.io for protocol details.
      operationId: stream-videos-initiate-video-uploads-using-tus
      parameters:
      - in: header
        name: Tus-Resumable
        schema:
          $ref: '#/components/schemas/streamTusResumable'
      - in: header
        name: Upload-Creator
        schema:
          $ref: '#/components/schemas/streamCreator'
      - in: header
        name: Upload-Length
        schema:
          $ref: '#/components/schemas/streamUploadLength'
      - in: header
        name: Upload-Metadata
        schema:
          $ref: '#/components/schemas/streamUploadMetadata'
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: direct_user
        schema:
          $ref: '#/components/schemas/streamDirectUser'
      responses:
        '201':
          description: Initiate video uploads using TUS response. Returns a 201 Created status with Location header for TUS uploads.
          headers:
            Location:
              description: The URL where the upload should be sent.
              schema:
                type: string
            Stream-Media-ID:
              description: The unique identifier for the video being uploaded.
              schema:
                type: string
            Tus-Resumable:
              description: The TUS protocol version.
              schema:
                type: string
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Initiate video uploads using TUS response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Initiate video uploads using TUS
      tags:
      - Stream Videos
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain: []
        method: create
  /accounts/{account_id}/stream/clip:
    post:
      description: Clips a video based on the specified start and end times provided in seconds.
      operationId: stream-video-clipping-clip-videos-given-a-start-and-end-time
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/streamVideoClipStandard'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamClipResponseSingle'
          description: Clip videos given a start and end time response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Clip videos given a start and end time response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Clip videos given a start and end time
      tags:
      - Stream Video Clipping
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain:
        - clip
        method: create
  /accounts/{account_id}/stream/copy:
    post:
      description: Uploads a video to Stream from a provided URL.
      operationId: stream-videos-upload-videos-from-a-url
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: Upload-Creator
        schema:
          $ref: '#/components/schemas/streamCreator'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/streamVideoCopyRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamVideoResponseSingle'
          description: Upload videos from a URL response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Upload videos from a URL response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Upload videos from a URL
      tags:
      - Stream Videos
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain:
        - copy
        method: create
  /accounts/{account_id}/stream/direct_upload:
    post:
      description: Creates a direct upload that allows video uploads without an API key.
      operationId: stream-videos-upload-videos-via-direct-upload-ur-ls
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: header
        name: Upload-Creator
        schema:
          $ref: '#/components/schemas/streamCreator'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/streamDirectUploadRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamDirectUploadResponse'
          description: Upload videos via direct upload URLs response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Upload videos via direct upload URLs response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Upload videos via direct upload URLs
      tags:
      - Stream Videos
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain:
        - direct_upload
        method: create
  /accounts/{account_id}/stream/keys:
    get:
      description: Lists the video ID and creation date and time when a signing key was created.
      operationId: stream-signing-keys-list-signing-keys
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamKeyResponseCollection'
          description: List signing keys response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: List signing keys response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List signing keys
      tags:
      - Stream Signing Keys
      x-api-token-group:
      - Stream Write
      - Stream Read
      x-stackql-sdk:
        service: stream
        resource_chain:
        - keys
        method: get
    post:
      description: Creates an RSA private key in PEM and JWK formats. Key files are only displayed once after creation. Keys are created, used, and deleted independently of videos, and every key can sign any video.
      operationId: stream-signing-keys-create-signing-keys
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamKeyGenerationResponse'
          description: Create signing keys response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Create signing keys response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create signing keys
      tags:
      - Stream Signing Keys
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain:
        - keys
        method: create
  /accounts/{account_id}/stream/keys/{identifier}:
    delete:
      description: Deletes signing keys and revokes all signed URLs generated with the key.
      operationId: stream-signing-keys-delete-signing-keys
      parameters:
      - name: identifier
        in: path
        required: true
        description: Resource identifier.
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamDeletedResponse'
          description: Delete signing keys response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Delete signing keys response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete signing keys
      tags:
      - Stream Signing Keys
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain:
        - keys
        method: delete
  /accounts/{account_id}/stream/live_inputs:
    get:
      description: Lists the live inputs created for an account. To get the credentials needed to stream to a specific live input, request a single live input.
      operationId: stream-live-inputs-list-live-inputs
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      - in: query
        name: include_counts
        schema:
          $ref: '#/components/schemas/streamIncludeCounts'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamLiveInputResponseCollection'
          description: List live inputs response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: List live inputs response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List live inputs
      tags:
      - Stream Live Inputs
      x-api-token-group:
      - Stream Write
      - Stream Read
      x-stackql-sdk:
        service: stream
        resource_chain:
        - live_inputs
        method: list
    post:
      description: Creates a live input, and returns credentials that you or your users can use to stream live video to Cloudflare Stream.
      operationId: stream-live-inputs-create-a-live-input
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/streamCreateInputRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamLiveInputResponseSingle'
          description: Create a live input response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Create a live input response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a live input
      tags:
      - Stream Live Inputs
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain:
        - live_inputs
        method: create
  /accounts/{account_id}/stream/live_inputs/{live_input_identifier}:
    delete:
      description: Prevents a live input from being streamed to and makes the live input inaccessible to any future API calls.
      operationId: stream-live-inputs-delete-a-live-input
      parameters:
      - in: path
        name: live_input_identifier
        schema:
          $ref: '#/components/schemas/streamLiveInputIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json: {}
          description: Delete a live input response.
        4XX:
          content:
            application/json: {}
          description: Delete a live input response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete a live input
      tags:
      - Stream Live Inputs
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain:
        - live_inputs
        method: delete
    get:
      description: Retrieves details of an existing live input.
      operationId: stream-live-inputs-retrieve-a-live-input
      parameters:
      - in: path
        name: live_input_identifier
        schema:
          $ref: '#/components/schemas/streamLiveInputIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamLiveInputResponseSingle'
          description: Retrieve a live input response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Retrieve a live input response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Retrieve a live input
      tags:
      - Stream Live Inputs
      x-api-token-group:
      - Stream Write
      - Stream Read
      x-stackql-sdk:
        service: stream
        resource_chain:
        - live_inputs
        method: get
    put:
      description: Updates a specified live input.
      operationId: stream-live-inputs-update-a-live-input
      parameters:
      - in: path
        name: live_input_identifier
        schema:
          $ref: '#/components/schemas/streamLiveInputIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/streamUpdateInputRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamLiveInputResponseSingle'
          description: Update a live input response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Update a live input response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Update a live input
      tags:
      - Stream Live Inputs
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain:
        - live_inputs
        method: update
  /accounts/{account_id}/stream/live_inputs/{live_input_identifier}/disable:
    post:
      description: Prevents a live input from being streamed to and makes the live input inaccessible to any future API calls until enabled.
      operationId: stream-live-inputs-disable-a-live-input
      parameters:
      - in: path
        name: live_input_identifier
        schema:
          $ref: '#/components/schemas/streamLiveInputIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamLiveInputResponseSingle'
          description: Disable a live input response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Disable a live input response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Disable a live input
      tags:
      - Stream Live Inputs
  /accounts/{account_id}/stream/live_inputs/{live_input_identifier}/enable:
    post:
      description: Allows a live input to be streamed to and makes the live input accessible to any future API calls.
      operationId: stream-live-inputs-enable-a-live-input
      parameters:
      - in: path
        name: live_input_identifier
        schema:
          $ref: '#/components/schemas/streamLiveInputIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamLiveInputResponseSingle'
          description: Enable a live input response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Enable a live input response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Enable a live input
      tags:
      - Stream Live Inputs
  /accounts/{account_id}/stream/live_inputs/{live_input_identifier}/outputs:
    get:
      description: Retrieves all outputs associated with a specified live input.
      operationId: stream-live-inputs-list-all-outputs-associated-with-a-specified-live-input
      parameters:
      - in: path
        name: live_input_identifier
        schema:
          $ref: '#/components/schemas/streamLiveInputIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamOutputResponseCollection'
          description: List all outputs associated with a specified live input response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: List all outputs associated with a specified live input response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: List all outputs associated with a specified live input
      tags:
      - Stream Live Inputs
      x-api-token-group:
      - Stream Write
      - Stream Read
      x-stackql-sdk:
        service: stream
        resource_chain:
        - live_inputs
        - outputs
        method: list
    post:
      description: "Creates a new output that can be used to simulcast or restream live video to other RTMP or SRT destinations. Outputs are always linked to a specific live input \u2014 one live input can have many outputs."
      operationId: stream-live-inputs-create-a-new-output,-connected-to-a-live-input
      parameters:
      - in: path
        name: live_input_identifier
        schema:
          $ref: '#/components/schemas/streamLiveInputIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/streamCreateOutputRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamOutputResponseSingle'
          description: Create a new output, connected to a live input response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/streamApiResponseCommonFailure'
          description: Create a new output, connected to a live input response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Create a new output, connected to a live input
      tags:
      - Stream Live Inputs
      x-stackql-sdk:
        service: stream
        resource_chain:
        - live_inputs
        - outputs
        method: create
  /accounts/{account_id}/stream/live_inputs/{live_input_identifier}/outputs/{output_identifier}:
    delete:
      description: Deletes an output and removes it from the associated live input.
      operationId: stream-live-inputs-delete-an-output
      parameters:
      - in: path
        name: output_identifier
        schema:
          $ref: '#/components/schemas/streamOutputIdentifier'
        required: true
      - in: path
        name: live_input_identifier
        schema:
          $ref: '#/components/schemas/streamLiveInputIdentifier'
        required: true
      - name: account_id
        in: path
        required: true
        description: The Cloudflare account ID.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json: {}
          description: Delete an output response.
        4XX:
          content:
            application/json: {}
          description: Delete an output response failure.
      security:
      - api_token: []
      - api_email: []
        api_key: []
      summary: Delete an output
      tags:
      - Stream Live Inputs
      x-api-token-group:
      - Stream Write
      x-stackql-sdk:
        service: stream
        resource_chain:
        - live_inputs
        - outputs
        method: delete
    put:
      description: Updates the state of an output.
      operationId: stream-live-inputs-update-an-output
      parameters:
      - in: path
        name: output_identifier
        schema:
          $ref: '#/components/schemas/streamOutputIdentifier'
        required: true
      - in: path
