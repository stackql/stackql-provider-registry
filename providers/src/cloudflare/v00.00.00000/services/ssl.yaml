          type: string
          x-auditable: true
      type: object
    tlsCertificatesAndHostnamesVerificationStatus:
      description: >-
        Status of the required verification information, omitted if verification
        status is unknown.
      example: true
      type: boolean
      x-auditable: true
    tlsCertificatesAndHostnamesVerificationType:
      description: Method of verification.
      enum:
        - cname
        - meta tag
      example: cname
      type: string
      x-auditable: true
    unnamedSchemaRef16aca57bde2963201c7e6e895436c1c1:
      default: ubiquitous
      description: >-
        A ubiquitous bundle has the highest probability of being verified
        everywhere, even by clients using outdated or unusual trust stores. An
        optimal bundle uses the shortest chain and newest intermediates. And the
        force bundle verifies the chain, but does not otherwise modify it.
      enum:
        - ubiquitous
        - optimal
        - force
      example: ubiquitous
      type: string
      x-auditable: true
