openapi: 3.0.3
info:
  title: ssl API
  description: >-
    Welcome to Cloudflare's API documentation site. We are experimenting with an
    updated version of our API documentation - check out
    [developers.cloudflare.com/api-next/](https://developers.cloudflare.com/api-next/)
    to test out the new experience. To get started using Cloudflare's products
    and services via the API, refer to [how to interact with
    Cloudflare](https://developers.cloudflare.com/fundamentals/basic-tasks/interact-with-cloudflare/),
    which covers using tools like
    [Terraform](https://developers.cloudflare.com/terraform/#cloudflare-terraform)
    and the [official
    SDKs](https://developers.cloudflare.com/fundamentals/api/reference/sdks/) to
    maintain your Cloudflare resources. Using the Cloudflare API requires
    authentication so that Cloudflare knows who is making requests and what
    permissions you have. Create an API token to grant access to the API to
    perform actions. You can also authenticate with [API
    keys](https://developers.cloudflare.com/fundamentals/api/get-started/keys/),
    but these keys have [several
    limitations](https://developers.cloudflare.com/fundamentals/api/get-started/keys/#limitations)
    that make them less secure than API tokens. Whenever possible, use API
    tokens to interact with the Cloudflare API. To create an API token, from the
    Cloudflare dashboard, go to My Profile > API Tokens and select Create Token.
    For more information on how to create and troubleshoot API tokens, refer to
    our [API fundamentals](https://developers.cloudflare.com/fundamentals/api/).
    For information regarding rate limits, refer to our [API Rate
    Limits](https://developers.cloudflare.com/cloudflare-for-platforms/workers-for-platforms/platform/limits/#api-rate-limits).
    Totally new to Cloudflare? [Start
    here](https://developers.cloudflare.com/fundamentals/get-started/).
  version: 4.0.0
  contact:
    name: Cloudflare
    url: https://www.cloudflare.com
servers:
  - url: https://api.cloudflare.com/client/v4
security:
  - api_token: []
paths:
  /zones/{zone_id}/ssl/analyze:
    post:
      description: >-
        Returns the set of hostnames, the signature algorithm, and the
        expiration date of the certificate.
      operationId: analyze-certificate-analyze-certificate
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                bundle_method:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesBundleMethod'
                certificate:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesCertificate'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCertificateAnalyzeResponse
          description: Analyze Certificate response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    type: object
                    enum:
                      - null
                    nullable: true
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Analyze Certificate response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Analyze Certificate
      tags:
        - Analyze Certificate
      x-api-token-group:
        - 'Access: Mutual TLS Certificates Write'
        - 'Access: Mutual TLS Certificates Read'
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ssl
        resource_chain:
          - analyze
        method: create
  /zones/{zone_id}/ssl/certificate_packs:
    get:
      description: For a given zone, list all active certificate packs.
      operationId: certificate-packs-list-certificate-packs
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
        - in: query
          name: page
          schema:
            default: 1
            description: Page number of paginated results.
            minimum: 1
            type: number
        - in: query
          name: per_page
          schema:
            default: 20
            description: Number of certificate packs per page.
            maximum: 50
            minimum: 5
            type: number
        - in: query
          name: status
          schema:
            description: Include Certificate Packs of all statuses, not just active ones.
            enum:
              - all
            type: string
        - in: query
          name: deploy
          schema:
            description: Specify the deployment environment for the certificate packs.
            enum:
              - staging
              - production
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCertificatePackResponseCollection
          description: List Certificate Packs response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result_info:
                    properties:
                      count:
                        description: Total number of results for the requested service.
                        type: number
                      page:
                        description: Current page within paginated list of results.
                        type: number
                      per_page:
                        description: Number of results per page of results.
                        type: number
                      total_count:
                        description: Total results available without any search parameters.
                        type: number
                      total_pages:
                        description: The number of total pages in the entire result set.
                        type: number
                    type: object
                  result:
                    items:
                      $ref: >-
                        #/components/schemas/tlsCertificatesAndHostnamesCertificatePack
                    type: array
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: List Certificate Packs response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: List Certificate Packs
      tags:
        - Certificate Packs
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ssl
        resource_chain:
          - certificate_packs
        method: list
  /zones/{zone_id}/ssl/certificate_packs/order:
    post:
      description: For a given zone, order an advanced certificate pack.
      operationId: certificate-packs-order-advanced-certificate-manager-certificate-pack
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                certificate_authority:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificateAuthority
                cloudflare_branding:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesCloudflareBranding
                hosts:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesSchemasHosts'
                type:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesAdvancedType'
                validation_method:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesValidationMethod
                validity_days:
                  $ref: '#/components/schemas/tlsCertificatesAndHostnamesValidityDays'
              required:
                - type
                - hosts
                - validation_method
                - validity_days
                - certificate_authority
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesAdvancedCertificatePackResponseSingle
          description: Order Advanced Certificate Manager Certificate Pack response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    description: A certificate pack with all its properties.
                    properties:
                      certificate_authority:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificateAuthority
                      certificates:
                        description: Array of certificates in this pack.
                        items:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesCertificatePackCertificate
                        type: array
                      cloudflare_branding:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCloudflareBranding
                      dcv_delegation_records:
                        description: DCV Delegation records for domain validation.
                        items:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesValidationRecord
                        readOnly: true
                        type: array
                      hosts:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasHosts
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      primary_certificate:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesPrimary
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCertificatePacksComponentsSchemasStatus
                      type:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasType
                      validation_errors:
                        description: >-
                          Domain validation errors that have been received by
                          the certificate authority (CA).
                        items:
                          properties:
                            message:
                              description: A domain validation error.
                              type: string
                              x-auditable: true
                          type: object
                        type: array
                      validation_method:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesValidationMethod
                      validation_records:
                        description: Certificates' validation records.
                        items:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesValidationRecord
                        type: array
                      validity_days:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesValidityDays
                    required:
                      - id
                      - type
                      - hosts
                      - certificates
                      - status
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Order Advanced Certificate Manager Certificate Pack response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Order Advanced Certificate Manager Certificate Pack
      tags:
        - Certificate Packs
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ssl
        resource_chain:
          - certificate_packs
        method: create
  /zones/{zone_id}/ssl/certificate_packs/quota:
    get:
      description: For a given zone, list certificate pack quotas.
      operationId: certificate-packs-get-certificate-pack-quotas
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCertificatePackQuotaResponse
          description: Get Certificate Pack Quotas response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    properties:
                      advanced:
                        $ref: '#/components/schemas/tlsCertificatesAndHostnamesQuota'
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Get Certificate Pack Quotas response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Certificate Pack Quotas
      tags:
        - Certificate Packs
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ssl
        resource_chain:
          - certificate_packs
          - quota
        method: get
  /zones/{zone_id}/ssl/certificate_packs/{certificate_pack_id}:
    delete:
      description: For a given zone, delete an advanced certificate pack.
      operationId: certificate-packs-delete-advanced-certificate-manager-certificate-pack
      parameters:
        - in: path
          name: certificate_pack_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesDeleteAdvancedCertificatePackResponseSingle
          description: Delete Advanced Certificate Manager Certificate Pack response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    $ref: '#/components/schemas/identifier'
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: >-
            Delete Advanced Certificate Manager Certificate Pack response
            failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Delete Advanced Certificate Manager Certificate Pack
      tags:
        - Certificate Packs
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ssl
        resource_chain:
          - certificate_packs
        method: delete
    get:
      description: For a given zone, get a certificate pack.
      operationId: certificate-packs-get-certificate-pack
      parameters:
        - in: path
          name: certificate_pack_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesCertificatePackResponseSingle
          description: Get Certificate Pack response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    description: A certificate pack with all its properties.
                    properties:
                      certificate_authority:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificateAuthority
                      certificates:
                        description: Array of certificates in this pack.
                        items:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesCertificatePackCertificate
                        type: array
                      cloudflare_branding:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCloudflareBranding
                      dcv_delegation_records:
                        description: DCV Delegation records for domain validation.
                        items:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesValidationRecord
                        readOnly: true
                        type: array
                      hosts:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasHosts
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      primary_certificate:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesPrimary
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCertificatePacksComponentsSchemasStatus
                      type:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasType
                      validation_errors:
                        description: >-
                          Domain validation errors that have been received by
                          the certificate authority (CA).
                        items:
                          properties:
                            message:
                              description: A domain validation error.
                              type: string
                              x-auditable: true
                          type: object
                        type: array
                      validation_method:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesValidationMethod
                      validation_records:
                        description: Certificates' validation records.
                        items:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesValidationRecord
                        type: array
                      validity_days:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesValidityDays
                    required:
                      - id
                      - type
                      - hosts
                      - certificates
                      - status
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: Get Certificate Pack response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: Get Certificate Pack
      tags:
        - Certificate Packs
      x-api-token-group:
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ssl
        resource_chain:
          - certificate_packs
        method: get
    patch:
      description: >-
        For a given zone, restart validation or add cloudflare branding for an
        advanced certificate pack. The former is only a validation operation for
        a Certificate Pack in a validation_timed_out status.
      operationId: >-
        certificate-packs-restart-validation-for-advanced-certificate-manager-certificate-pack
      parameters:
        - in: path
          name: certificate_pack_id
          schema:
            $ref: '#/components/schemas/tlsCertificatesAndHostnamesIdentifier'
          required: true
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                cloudflare_branding:
                  $ref: >-
                    #/components/schemas/tlsCertificatesAndHostnamesCloudflareBranding
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesAdvancedCertificatePackResponseSingle
          description: >-
            Restart Validation for Advanced Certificate Manager Certificate Pack
            response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  messages:
                    $ref: '#/components/schemas/tlsCertificatesAndHostnamesMessages'
                  success:
                    description: Whether the API call was successful.
                    enum:
                      - true
                      - false
                    type: boolean
                  result:
                    description: A certificate pack with all its properties.
                    properties:
                      certificate_authority:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasCertificateAuthority
                      certificates:
                        description: Array of certificates in this pack.
                        items:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesCertificatePackCertificate
                        type: array
                      cloudflare_branding:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCloudflareBranding
                      dcv_delegation_records:
                        description: DCV Delegation records for domain validation.
                        items:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesValidationRecord
                        readOnly: true
                        type: array
                      hosts:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasHosts
                      id:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesIdentifier
                      primary_certificate:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesPrimary
                      status:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesCertificatePacksComponentsSchemasStatus
                      type:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesSchemasType
                      validation_errors:
                        description: >-
                          Domain validation errors that have been received by
                          the certificate authority (CA).
                        items:
                          properties:
                            message:
                              description: A domain validation error.
                              type: string
                              x-auditable: true
                          type: object
                        type: array
                      validation_method:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesValidationMethod
                      validation_records:
                        description: Certificates' validation records.
                        items:
                          $ref: >-
                            #/components/schemas/tlsCertificatesAndHostnamesValidationRecord
                        type: array
                      validity_days:
                        $ref: >-
                          #/components/schemas/tlsCertificatesAndHostnamesValidityDays
                    required:
                      - id
                      - type
                      - hosts
                      - certificates
                      - status
                    type: object
                    enum:
                      - null
                required:
                  - success
                  - errors
                  - messages
                  - success
                  - errors
                  - messages
                  - result
          description: >-
            Restart Validation for Advanced Certificate Manager Certificate Pack
            response failure
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: >-
        Restart Validation or Update Advanced Certificate Manager Certificate
        Pack
      tags:
        - Certificate Packs
      x-api-token-group:
        - SSL and Certificates Write
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
          - '#ssl:edit'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stackql-sdk:
        service: ssl
        resource_chain:
          - certificate_packs
        method: edit
  /zones/{zone_id}/ssl/recommendation:
    get:
      deprecated: true
      description: Retrieve the SSL/TLS Recommender's recommendation for a zone.
      operationId: ssl/-tls-mode-recommendation-ssl/-tls-recommendation
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheApiResponseSingleId'
          description: SSL/TLS Recommendation response.
        4XX:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cacheApiResponseCommonFailure'
          description: SSL/TLS Recommendation response failure.
      security:
        - api_token: []
        - api_email: []
          api_key: []
      summary: SSL/TLS Recommendation
      tags:
        - SSL/TLS Mode Recommendation
      x-api-token-group:
        - Zone Settings Write
        - Zone Settings Read
        - SSL and Certificates Write
        - SSL and Certificates Read
      x-cfPermissionsRequired:
        enum:
          - '#ssl:read'
      x-cfPlanAvailability:
        business: true
        enterprise: true
        free: true
        pro: true
      x-stainless-deprecation-message: >-
        SSL/TLS Recommender has been decommissioned in favor of Automatic
        SSL/TLS
      x-stackql-sdk:
        service: ssl
        resource_chain:
          - recommendations
        method: get
  /zones/{zone_id}/ssl/universal/settings:
    get:
      description: Get Universal SSL Settings for a Zone.
      operationId: universal-ssl-settings-for-a-zone-universal-ssl-settings-details
      parameters:
        - name: zone_id
          in: path
          required: true
          description: The Cloudflare zone ID.
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tlsCertificatesAndHostnamesSslUniversalSettingsResponse
          description: Universal SSL Settings Details response
        4XX:
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
