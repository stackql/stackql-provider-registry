    Sku:
      type: object
      description: Defines the SKU of a search service, which determines billing rate and capacity limits.
      properties:
        name:
          $ref: "#/components/schemas/SkuName"
          description: "The SKU of the search service. Valid values include: 'free': Shared service. 'basic': Dedicated service with up to 3 replicas. 'standard': Dedicated service with up to 12 partitions and 12 replicas. 'standard2': Similar to standard, but with more capacity per search unit. 'standard3': The largest Standard offering with up to 12 partitions and 12 replicas (or up to 3 partitions with more indexes if you also set the hostingMode property to 'highDensity'). 'storage_optimized_l1': Supports 1TB per partition, up to 12 partitions. 'storage_optimized_l2': Supports 2TB per partition, up to 12 partitions. 'serverless': Serverless tier with auto-scaling capabilities. Known values are: \"free\", \"basic\", \"standard\", \"standard2\", \"standard3\", \"storage_optimized_l1\", \"storage_optimized_l2\", and \"serverless\"."
    SkuName:
      type: string
      enum:
        - free
        - basic
        - standard
        - standard2
        - standard3
        - storage_optimized_l1
        - storage_optimized_l2
        - serverless
