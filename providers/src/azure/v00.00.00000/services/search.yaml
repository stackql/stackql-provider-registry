    SearchServiceProperties:
      type: object
      description: Properties of the search service.
      properties:
        replicaCount:
          type: integer
          description: The number of replicas in the dedicated search service. If specified, it must be a value between 1 and 12 inclusive for standard SKUs or between 1 and 3 inclusive for basic SKU.
        partitionCount:
          type: integer
          description: The number of partitions in the dedicated search service; if specified, it can be 1, 2, 3, 4, 6, or 12. Values greater than 1 are only valid for standard SKUs. For 'standard3' services with hostingMode set to 'highDensity', the allowed values are between 1 and 3.
        endpoint:
          type: string
          description: The endpoint of the Azure AI Search service.
        hostingMode:
          $ref: "#/components/schemas/HostingMode"
          description: "Applicable only for the standard3 SKU. You can set this property to enable up to 3 high density partitions that allow up to 1000 indexes, which is much higher than the maximum indexes allowed for any other SKU. For the standard3 SKU, the value is either 'Default' or 'HighDensity'. For all other SKUs, this value must be 'Default'. Known values are: \"Default\" and \"HighDensity\"."
        computeType:
          $ref: "#/components/schemas/ComputeType"
          description: 'Configure this property to support the search service using either the Default Compute or Azure Confidential Compute. Known values are: "Default" and "Confidential".'
        publicNetworkAccess:
          $ref: "#/components/schemas/PublicNetworkAccess"
          description: "This value can be set to 'Enabled' to avoid breaking changes on existing customer resources and templates. If set to 'Disabled', traffic over public interface is not allowed, and private endpoint connections would be the exclusive access method. Known values are: \"Enabled\", \"Disabled\", and \"SecuredByPerimeter\"."
        status:
          $ref: "#/components/schemas/SearchServiceStatus"
          description: "The status of the search service. Possible values include: 'running': The search service is running and no provisioning operations are underway. 'provisioning': The search service is being provisioned or scaled up or down. 'deleting': The search service is being deleted. 'degraded': The search service is degraded. This can occur when the underlying search units are not healthy. The search service is most likely operational, but performance might be slow and some requests might be dropped. 'disabled': The search service is disabled. In this state, the service will reject all API requests. 'error': The search service is in an error state. 'stopped': The search service is in a subscription that's disabled. If your service is in the degraded, disabled, or error states, it means the Azure AI Search team is actively investigating the underlying issue. Dedicated services in these states are still chargeable based on the number of search units provisioned. Known values are: \"running\", \"provisioning\", \"deleting\", \"degraded\", \"disabled\", \"error\", and \"stopped\"."
        statusDetails:
          type: string
          description: The details of the search service status.
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: "The state of the last provisioning operation performed on the search service. Provisioning is an intermediate state that occurs while service capacity is being established. After capacity is set up, provisioningState changes to either 'Succeeded' or 'Failed'. Client applications can poll provisioning status (the recommended polling interval is from 30 seconds to one minute) by using the Get Search Service operation to see when an operation is completed. If you are using the free service, this value tends to come back as 'Succeeded' directly in the call to Create search service. This is because the free service uses capacity that is already set up. Known values are: \"succeeded\", \"provisioning\", and \"failed\"."
        networkRuleSet:
