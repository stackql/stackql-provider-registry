openapi: 3.0.0
servers:
  - url: https://{endpoint}/speechtotext
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Transcription Client
  description: TranscriptionClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-10-15-stackql-generated
  x-serviceAlias: ai_transcription
  x-sdkPackage: azure-ai-transcription
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    TranscriptionOptions:
      type: object
      description: Metadata for a transcription request.
      properties:
        audioUrl:
          type: string
          description: The URL of the audio to be transcribed. The audio must be shorter than 2 hours in audio duration and smaller than 250 MB in size. If both Audio and AudioUrl are provided, Audio is used.
        locales:
          type: array
          items:
            type: string
          description: A list of possible locales for the transcription. If not specified, the locale of the speech in the audio is detected automatically from all supported locales.
        models:
          type: object
          properties: {}
          description: Maps some or all candidate locales to a model URI to be used for transcription. If no mapping is given, the default model for the locale is used.
        profanityFilterMode:
          $ref: "#/components/schemas/ProfanityFilterMode"
          description: 'Mode of profanity filtering. Known values are: "None", "Removed", "Tags", and "Masked".'
        diarization:
          $ref: "#/components/schemas/TranscriptionDiarizationOptions"
          description: Mode of diarization.
        channels:
          type: array
          items:
            type: integer
          description: The 0-based indices of the channels to be transcribed separately. If not specified, multiple channels are merged and transcribed jointly. Only up to two channels are supported.
        enhancedMode:
          $ref: "#/components/schemas/EnhancedModeProperties"
          description: Enhanced mode properties.
        phraseList:
          $ref: "#/components/schemas/PhraseListProperties"
          description: Phrase list properties.
    ProfanityFilterMode:
      type: string
      enum:
        - None
        - Removed
        - Tags
        - Masked
    TranscriptionDiarizationOptions:
      type: object
      description: The Speaker Diarization settings. Diarization settings must be specified to enable speaker diarization.
      properties:
        enabled:
          type: boolean
          description: Enable speaker diarization. This is automatically set to true when maxSpeakers is specified.
        maxSpeakers:
          type: integer
          description: Gets or sets a hint for the maximum number of speakers for diarization. Must be greater than 1 and less than 36.
    EnhancedModeProperties:
      type: object
      description: Enhanced mode properties for transcription.
      properties:
        enabled:
          type: boolean
          description: Enable enhanced mode for transcription. This is automatically set to true when task, targetLanguage, or prompt are specified.
        task:
          type: string
          description: Task type for enhanced mode.
        targetLanguage:
          type: string
          description: Target language for enhanced mode.
        prompt:
          type: array
          items:
            type: string
          description: A list of user prompts.
    PhraseListProperties:
      type: object
      description: Phrase list properties for transcription.
      properties:
        phrases:
          type: array
          items:
            type: string
          description: List of phrases for recognition.
        biasingWeight:
          type: number
          description: Biasing weight for phrase list (0.0-2.0).
    TranscriptionResult:
      type: object
      description: The result of the transcribe operation.
      properties:
        durationMilliseconds:
          type: integer
          description: The duration of the audio in milliseconds. Required.
        combinedPhrases:
          type: array
          items:
            $ref: "#/components/schemas/ChannelCombinedPhrases"
          description: The full transcript for each channel. Required.
        phrases:
          type: array
          items:
            $ref: "#/components/schemas/TranscribedPhrase"
          description: The transcription results segmented into phrases. Required.
      required:
        - durationMilliseconds
        - combinedPhrases
        - phrases
    ChannelCombinedPhrases:
      type: object
      description: The full transcript per channel.
      properties:
        channel:
          type: integer
          description: The 0-based channel index. Only present if channel separation is enabled.
        text:
          type: string
          description: The complete transcribed text for the channel. Required.
      required:
        - text
    TranscribedPhrase:
      type: object
      description: A transcribed phrase.
      properties:
        channel:
          type: integer
          description: The 0-based channel index. Only present if channel separation is enabled.
        speaker:
          type: integer
          description: A unique integer number that is assigned to each speaker detected in the audio without particular order. Only present if speaker diarization is enabled.
        offsetMilliseconds:
          type: integer
          description: The start offset of the phrase in milliseconds. Required.
        durationMilliseconds:
          type: integer
          description: The duration of the phrase in milliseconds. Required.
        text:
          type: string
          description: The transcribed text of the phrase. Required.
        words:
          type: array
          items:
            $ref: "#/components/schemas/TranscribedWord"
          description: The words that make up the phrase. Only present if word-level timestamps are enabled.
        locale:
          type: string
          description: The locale of the phrase.
        confidence:
          type: number
          description: The confidence value for the phrase. Required.
      required:
        - offsetMilliseconds
        - durationMilliseconds
        - text
        - confidence
    TranscribedWord:
      type: object
      description: Time-stamped word in the display form.
      properties:
        text:
          type: string
          description: The recognized word, including punctuation. Required.
        offsetMilliseconds:
          type: integer
          description: The start offset of the word in milliseconds. Required.
        durationMilliseconds:
          type: integer
          description: The duration of the word in milliseconds. Required.
      required:
        - text
        - offsetMilliseconds
        - durationMilliseconds
  x-stackQL-resources:
    transcribes:
      id: azure.ai_transcription.transcribes
      name: transcribes
      title: transcribes
      methods:
        transcribe:
          operation:
            $ref: "#/paths/~1transcriptions:transcribe?api-version=2025-10-15/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select: []
        insert: []
        update: []
        delete: []
paths:
  /transcriptions:transcribe?api-version=2025-10-15:
    post:
      operationId: _TranscriptionClient_transcribe
      description: Transcribes the provided audio stream.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                definition:
                  $ref: "#/components/schemas/TranscriptionOptions"
                  description: Metadata for a transcription request. This field contains a JSON-serialized object of type `TranscriptionOptions`. Required.
                audio:
                  type: object
                  properties: {}
                  description: The content of the audio file to be transcribed. The audio file must be shorter than 2 hours in audio duration and smaller than 250 MB in size. Optional if audioUrl is provided in the definition.
              required:
                - definition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptionResult"
