          $ref: "#/components/schemas/FastProvisioningSupport"
          description: "Indicates if fast provisioning is supported. 'Enabled' means fast provisioning is supported. 'Disabled' stands for fast provisioning is not supported. Will be deprecated in the future. Look to Supported Features for 'FastProvisioning'. Known values are: \"Enabled\" and \"Disabled\"."
