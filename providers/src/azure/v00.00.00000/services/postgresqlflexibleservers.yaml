          $ref: "#/components/schemas/LocationRestricted"
          description: "Indicates if this location is restricted. 'Enabled' means location is restricted. 'Disabled' stands for location is not restricted. Will be deprecated in the future. Look to Supported Features for 'Restricted'. Known values are: \"Enabled\" and \"Disabled\"."
