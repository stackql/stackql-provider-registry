          $ref: "#/components/schemas/GeographicallyRedundantBackupSupport"
          description: "Indicates if geographically redundant backups are supported in this location. 'Enabled' means geographically redundant backups are supported. 'Disabled' stands for geographically redundant backup is not supported. Will be deprecated in the future. Look to Supported Features for 'GeoBackup'. Known values are: \"Enabled\" and \"Disabled\"."
        zoneRedundantHaSupported:
          $ref: "#/components/schemas/ZoneRedundantHighAvailabilitySupport"
          description: "Indicates if high availability with zone redundancy is supported in this location. 'Enabled' means high availability with zone redundancy is supported. 'Disabled' stands for high availability with zone redundancy is not supported. Will be deprecated in the future. Look to Supported Features for 'ZoneRedundantHa'. Known values are: \"Enabled\" and \"Disabled\"."
        zoneRedundantHaAndGeoBackupSupported:
          $ref: "#/components/schemas/ZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport"
          description: "Indicates if high availability with zone redundancy is supported in conjunction with geographically redundant backups in this location. 'Enabled' means high availability with zone redundancy is supported in conjunction with geographically redundant backups is supported. 'Disabled' stands for high availability with zone redundancy is supported in conjunction with geographically redundant backups is not supported. Will be deprecated in the future. Look to Supported Features for 'ZoneRedundantHaAndGeoBackup'. Known values are: \"Enabled\" and \"Disabled\"."
        storageAutoGrowthSupported:
          $ref: "#/components/schemas/StorageAutoGrowthSupport"
          description: "Indicates if storage autogrow is supported in this location. 'Enabled' means storage autogrow is supported. 'Disabled' stands for storage autogrow is not supported. Will be deprecated in the future. Look to Supported Features for 'StorageAutoGrowth'. Known values are: \"Enabled\" and \"Disabled\"."
        onlineResizeSupported:
          $ref: "#/components/schemas/OnlineStorageResizeSupport"
          description: "Indicates if resizing the storage, without interrupting the operation of the database engine, is supported in this location for the given subscription. 'Enabled' means resizing the storage without interrupting the operation of the database engine is supported. 'Disabled' means resizing the storage without interrupting the operation of the database engine is not supported. Will be deprecated in the future. Look to Supported Features for 'OnlineResize'. Known values are: \"Enabled\" and \"Disabled\"."
