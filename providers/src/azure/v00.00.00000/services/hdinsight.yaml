openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure HDInsight
  description: Managed Hadoop, Spark, Kafka, HBase clusters plus HDInsight on AKS cluster pools.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-01-15-preview-stackql-generated
  x-serviceAlias: hdinsight
  x-sdkPackage: azure-mgmt-hdinsight
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    ApplicationProperties:
      type: object
      description: The HDInsight cluster application GET response.
      properties:
        computeProfile:
          $ref: "#/components/schemas/ComputeProfile"
          description: The list of roles in the cluster.
        installScriptActions:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeScriptAction"
          description: The list of install script actions.
        uninstallScriptActions:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeScriptAction"
          description: The list of uninstall script actions.
        httpsEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationGetHttpsEndpoint"
          description: The list of application HTTPS endpoints.
        sshEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationGetEndpoint"
          description: The list of application SSH endpoints.
        provisioningState:
          type: string
          description: The provisioning state of the application.
        applicationType:
          type: string
          description: The application type.
        applicationState:
          type: string
          description: The application state.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Errors"
          description: The list of errors.
        createdDate:
          type: string
          description: The application create date time.
        marketplaceIdentifier:
          type: string
          description: The marketplace identifier.
        privateLinkConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/PrivateLinkConfiguration"
          description: The private link configurations.
    ComputeProfile:
      type: object
      description: Describes the compute profile.
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
          description: The list of roles in the cluster.
    Role:
      type: object
      description: Describes a role on the cluster.
      properties:
        name:
          type: string
          description: The name of the role.
        minInstanceCount:
          type: integer
          description: The minimum instance count of the cluster.
        targetInstanceCount:
          type: integer
          description: The instance count of the cluster.
        VMGroupName:
          type: string
          description: The name of the virtual machine group.
        autoscale:
          $ref: "#/components/schemas/Autoscale"
          description: The autoscale configurations.
        hardwareProfile:
          $ref: "#/components/schemas/HardwareProfile"
          description: The hardware profile.
        osProfile:
          $ref: "#/components/schemas/OsProfile"
          description: The operating system profile.
        virtualNetworkProfile:
          $ref: "#/components/schemas/VirtualNetworkProfile"
          description: The virtual network profile.
        dataDisksGroups:
          type: array
          items:
            $ref: "#/components/schemas/DataDisksGroups"
          description: The data disks groups for the role.
        scriptActions:
          type: array
          items:
            $ref: "#/components/schemas/ScriptAction"
          description: The list of script actions on the role.
        encryptDataDisks:
          type: boolean
          description: Indicates whether encrypt the data disks.
    Autoscale:
      type: object
      description: The autoscale request parameters.
      properties:
        capacity:
          $ref: "#/components/schemas/AutoscaleCapacity"
          description: Parameters for load-based autoscale.
        recurrence:
          $ref: "#/components/schemas/AutoscaleRecurrence"
          description: Parameters for schedule-based autoscale.
    AutoscaleCapacity:
      type: object
      description: The load-based autoscale request parameters.
      properties:
        minInstanceCount:
          type: integer
          description: The minimum instance count of the cluster.
        maxInstanceCount:
          type: integer
          description: The maximum instance count of the cluster.
    AutoscaleRecurrence:
      type: object
      description: Schedule-based autoscale request parameters.
      properties:
        timeZone:
          type: string
          description: The time zone for the autoscale schedule times.
        schedule:
          type: array
          items:
            $ref: "#/components/schemas/AutoscaleSchedule"
          description: Array of schedule-based autoscale rules.
    AutoscaleSchedule:
      type: object
      description: Parameters for a schedule-based autoscale rule, consisting of an array of days + a time and capacity.
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/DaysOfWeek"
          description: Days of the week for a schedule-based autoscale rule.
        timeAndCapacity:
          $ref: "#/components/schemas/AutoscaleTimeAndCapacity"
          description: Time and capacity for a schedule-based autoscale rule.
    DaysOfWeek:
      type: string
      enum:
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
        - Sunday
    AutoscaleTimeAndCapacity:
      type: object
      description: Time and capacity request parameters.
      properties:
        time:
          type: string
          description: 24-hour time in the form xx:xx.
        minInstanceCount:
          type: integer
          description: The minimum instance count of the cluster.
        maxInstanceCount:
          type: integer
          description: The maximum instance count of the cluster.
    HardwareProfile:
      type: object
      description: The hardware profile.
      properties:
        vmSize:
          type: string
          description: The size of the VM.
    OsProfile:
      type: object
      description: The Linux operation systems profile.
      properties:
        linuxOperatingSystemProfile:
          $ref: "#/components/schemas/LinuxOperatingSystemProfile"
          description: The Linux OS profile.
    LinuxOperatingSystemProfile:
      type: object
      description: The ssh username, password, and ssh public key.
      properties:
        username:
          type: string
          description: The username.
        password:
          type: string
          description: The password.
        sshProfile:
          $ref: "#/components/schemas/SshProfile"
          description: The SSH profile.
    SshProfile:
      type: object
      description: The list of SSH public keys.
      properties:
        publicKeys:
          type: array
          items:
            $ref: "#/components/schemas/SshPublicKey"
          description: The list of SSH public keys.
    SshPublicKey:
      type: object
      description: The SSH public key for the cluster nodes.
      properties:
        certificateData:
          type: string
          description: The certificate for SSH.
    VirtualNetworkProfile:
      type: object
      description: The virtual network properties.
      properties:
        id:
          type: string
          description: The ID of the virtual network.
        subnet:
          type: string
          description: The name of the subnet.
    DataDisksGroups:
      type: object
      description: The data disks groups for the role.
      properties:
        disksPerNode:
          type: integer
          description: The number of disks per node.
        storageAccountType:
          type: string
          description: ReadOnly. The storage account type. Do not set this value.
        diskSizeGB:
          type: integer
          description: ReadOnly. The DiskSize in GB. Do not set this value.
    ScriptAction:
      type: object
      description: Describes a script action on role on the cluster.
      properties:
        name:
          type: string
          description: The name of the script action. Required.
        uri:
          type: string
          description: The URI to the script. Required.
        parameters:
          type: string
          description: The parameters for the script provided. Required.
      required:
        - name
        - uri
        - parameters
    RuntimeScriptAction:
      type: object
      description: Describes a script action on a running cluster.
      properties:
        name:
          type: string
          description: The name of the script action. Required.
        uri:
          type: string
          description: The URI to the script. Required.
        parameters:
          type: string
          description: The parameters for the script.
        roles:
          type: array
          items:
            type: string
          description: The list of roles where script will be executed. Required.
        applicationName:
          type: string
          description: The application name of the script action, if any.
      required:
        - name
        - uri
        - roles
    ApplicationGetHttpsEndpoint:
      type: object
      description: Gets the application HTTP endpoints.
      properties:
        accessModes:
          type: array
          items:
            type: string
          description: The list of access modes for the application.
        location:
          type: string
          description: The location of the endpoint.
        destinationPort:
          type: integer
          description: The destination port to connect to.
        publicPort:
          type: integer
          description: The public port to connect to.
        privateIPAddress:
          type: string
          description: The private ip address of the endpoint.
        subDomainSuffix:
          type: string
          description: The subdomain suffix of the application.
        disableGatewayAuth:
          type: boolean
          description: The value indicates whether to disable GatewayAuth.
    ApplicationGetEndpoint:
      type: object
      description: Gets the application SSH endpoint.
      properties:
        location:
          type: string
          description: The location of the endpoint.
        destinationPort:
          type: integer
          description: The destination port to connect to.
        publicPort:
          type: integer
          description: The public port to connect to.
        privateIPAddress:
          type: string
          description: The private ip address of the endpoint.
    Errors:
      type: object
      description: The error message associated with the cluster creation.
      properties:
        code:
          type: string
          description: The error code.
        message:
          type: string
          description: The error message.
    PrivateLinkConfiguration:
      type: object
      description: The private link configuration.
      properties:
        id:
          type: string
          description: The private link configuration id.
        name:
          type: string
          description: The name of private link configuration. Required.
        type:
          type: string
          description: The type of the private link configuration.
        properties:
          $ref: "#/components/schemas/PrivateLinkConfigurationProperties"
          description: The private link configuration properties. Required.
      required:
        - name
        - properties
    PrivateLinkConfigurationProperties:
      type: object
      description: The private link configuration properties.
      properties:
        groupId:
          type: string
          description: The HDInsight private linkable sub-resource name to apply the private link configuration to. For example, 'headnode', 'gateway', 'edgenode'. Required.
        provisioningState:
          $ref: "#/components/schemas/PrivateLinkConfigurationProvisioningState"
          description: 'The private link configuration provisioning state, which only appears in the response. Known values are: "InProgress", "Failed", "Succeeded", "Canceled", and "Deleting".'
        ipConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/IPConfiguration"
          description: The IP configurations for the private link service. Required.
      required:
        - groupId
        - ipConfigurations
    PrivateLinkConfigurationProvisioningState:
      type: string
      enum:
        - InProgress
        - Failed
        - Succeeded
        - Canceled
        - Deleting
    IPConfiguration:
      type: object
      description: The ip configurations for the private link service.
      properties:
        id:
          type: string
          description: The private link IP configuration id.
        name:
          type: string
          description: The name of private link IP configuration. Required.
        type:
          type: string
          description: The type of the private link IP configuration.
        properties:
          $ref: "#/components/schemas/IPConfigurationProperties"
          description: The private link ip configuration properties.
      required:
        - name
    IPConfigurationProperties:
      type: object
      description: The private link ip configuration properties.
      properties:
        provisioningState:
          $ref: "#/components/schemas/PrivateLinkConfigurationProvisioningState"
          description: 'The private link configuration provisioning state, which only appears in the response. Known values are: "InProgress", "Failed", "Succeeded", "Canceled", and "Deleting".'
        primary:
          type: boolean
          description: Indicates whether this IP configuration is primary for the corresponding NIC.
        privateIPAddress:
          type: string
          description: The IP address.
        privateIPAllocationMethod:
          $ref: "#/components/schemas/PrivateIPAllocationMethod"
          description: 'The method that private IP address is allocated. Known values are: "dynamic" and "static".'
        subnet:
          $ref: "#/components/schemas/ResourceId"
          description: The subnet resource id.
    PrivateIPAllocationMethod:
      type: string
      enum:
        - dynamic
        - static
    ResourceId:
      type: object
      description: The azure resource id.
      properties:
        id:
          type: string
          description: The azure resource id.
    ApplicationFlattened:
      type: object
      description: Flattened view of Application ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        etag:
          type: string
          description: The ETag for the application.
        tags:
          type: object
          properties: {}
          description: The tags for the application.
        computeProfile:
          $ref: "#/components/schemas/ComputeProfile"
          description: The list of roles in the cluster.
        installScriptActions:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeScriptAction"
          description: The list of install script actions.
        uninstallScriptActions:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeScriptAction"
          description: The list of uninstall script actions.
        httpsEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationGetHttpsEndpoint"
          description: The list of application HTTPS endpoints.
        sshEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationGetEndpoint"
          description: The list of application SSH endpoints.
        provisioningState:
          type: string
          description: The provisioning state of the application.
        applicationType:
          type: string
          description: The application type.
        applicationState:
          type: string
          description: The application state.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Errors"
          description: The list of errors.
        createdDate:
          type: string
          description: The application create date time.
        marketplaceIdentifier:
          type: string
          description: The marketplace identifier.
        privateLinkConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/PrivateLinkConfiguration"
          description: The private link configurations.
    PagedApplicationFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationFlattened"
        nextLink:
          type: string
    AsyncOperationState:
      type: string
      enum:
        - InProgress
        - Succeeded
        - Failed
    AsyncOperationResult:
      type: object
      description: The azure async operation response.
      properties:
        status:
          $ref: "#/components/schemas/AsyncOperationState"
          description: 'The async operation state. Known values are: "InProgress", "Succeeded", and "Failed".'
        error:
          $ref: "#/components/schemas/Errors"
          description: The operation error information.
    Application:
      type: object
      description: The HDInsight cluster application.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/ApplicationProperties"
          description: The properties of the application.
        etag:
          type: string
          description: The ETag for the application.
        tags:
          type: object
          properties: {}
          description: The tags for the application.
    ClusterGetProperties:
      type: object
      description: The properties of cluster.
      properties:
        clusterVersion:
          type: string
          description: The version of the cluster.
        clusterHdpVersion:
          type: string
          description: The hdp version of the cluster.
        osType:
          $ref: "#/components/schemas/OSType"
          description: 'The type of operating system. Known values are: "Windows" and "Linux".'
        tier:
          $ref: "#/components/schemas/Tier"
          description: 'The cluster tier. Known values are: "Standard" and "Premium".'
        clusterId:
          type: string
          description: The cluster id.
        clusterDefinition:
          $ref: "#/components/schemas/ClusterDefinition"
          description: The cluster definition. Required.
        kafkaRestProperties:
          $ref: "#/components/schemas/KafkaRestProperties"
          description: The cluster kafka rest proxy configuration.
        securityProfile:
          $ref: "#/components/schemas/SecurityProfile"
          description: The security profile.
        computeProfile:
          $ref: "#/components/schemas/ComputeProfile"
          description: The compute profile.
        provisioningState:
          $ref: "#/components/schemas/HDInsightClusterProvisioningState"
          description: 'The provisioning state, which only appears in the response. Known values are: "InProgress", "Failed", "Succeeded", "Canceled", and "Deleting".'
        createdDate:
          type: string
          description: The date on which the cluster was created.
        clusterState:
          type: string
          description: The state of the cluster.
        quotaInfo:
          $ref: "#/components/schemas/QuotaInfo"
          description: The quota information.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Errors"
          description: The list of errors.
        connectivityEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/ConnectivityEndpoint"
          description: The list of connectivity endpoints.
        diskEncryptionProperties:
          $ref: "#/components/schemas/DiskEncryptionProperties"
          description: The disk encryption properties.
        encryptionInTransitProperties:
          $ref: "#/components/schemas/EncryptionInTransitProperties"
          description: The encryption-in-transit properties.
        storageProfile:
          $ref: "#/components/schemas/StorageProfile"
          description: The storage profile.
        minSupportedTlsVersion:
          type: string
          description: The minimal supported tls version.
        excludedServicesConfig:
          $ref: "#/components/schemas/ExcludedServicesConfig"
          description: The excluded services config.
        networkProperties:
          $ref: "#/components/schemas/NetworkProperties"
          description: The network properties.
        computeIsolationProperties:
          $ref: "#/components/schemas/ComputeIsolationProperties"
          description: The compute isolation properties.
        privateLinkConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/PrivateLinkConfiguration"
          description: The private link configurations.
        privateEndpointConnections:
          type: array
          items:
            $ref: "#/components/schemas/PrivateEndpointConnection"
          description: The list of private endpoint connections.
      required:
        - clusterDefinition
    OSType:
      type: string
      enum:
        - Windows
        - Linux
    Tier:
      type: string
      enum:
        - Standard
        - Premium
    ClusterDefinition:
      type: object
      description: The cluster definition.
      properties:
        blueprint:
          type: string
          description: The link to the blueprint.
        kind:
          type: string
          description: The type of cluster.
        componentVersion:
          type: object
          properties: {}
          description: The versions of different services in the cluster.
        configurations:
          type: object
          properties: {}
          description: The cluster configurations.
    KafkaRestProperties:
      type: object
      description: The kafka rest proxy configuration which contains AAD security group information.
      properties:
        clientGroupInfo:
          $ref: "#/components/schemas/ClientGroupInfo"
          description: The information of AAD security group.
        configurationOverride:
          type: object
          properties: {}
          description: The configurations that need to be overriden.
    ClientGroupInfo:
      type: object
      description: The information of AAD security group.
      properties:
        groupName:
          type: string
          description: The AAD security group name.
        groupId:
          type: string
          description: The AAD security group id.
    SecurityProfile:
      type: object
      description: The security profile which contains Ssh public key for the HDInsight cluster.
      properties:
        directoryType:
          $ref: "#/components/schemas/DirectoryType"
          description: The directory type. "ActiveDirectory"
        domain:
          type: string
          description: The organization's active directory domain.
        organizationalUnitDN:
          type: string
          description: The organizational unit within the Active Directory to place the cluster and service accounts.
        ldapsUrls:
          type: array
          items:
            type: string
          description: The LDAPS protocol URLs to communicate with the Active Directory.
        domainUsername:
          type: string
          description: The domain user account that will have admin privileges on the cluster.
        domainUserPassword:
          type: string
          description: The domain admin password.
        clusterUsersGroupDNs:
          type: array
          items:
            type: string
          description: Optional. The Distinguished Names for cluster user groups.
        aaddsResourceId:
          type: string
          description: The resource ID of the user's Azure Active Directory Domain Service.
        msiResourceId:
          type: string
          description: User assigned identity that has permissions to read and create cluster-related artifacts in the user's AADDS.
    DirectoryType:
      type: string
      enum:
        - ActiveDirectory
    HDInsightClusterProvisioningState:
      type: string
      enum:
        - InProgress
        - Failed
        - Succeeded
        - Canceled
        - Deleting
    QuotaInfo:
      type: object
      description: The quota properties for the cluster.
      properties:
        coresUsed:
          type: integer
          description: The cores used by the cluster.
    ConnectivityEndpoint:
      type: object
      description: The connectivity properties.
      properties:
        name:
          type: string
          description: The name of the endpoint.
        protocol:
          type: string
          description: The protocol of the endpoint.
        location:
          type: string
          description: The location of the endpoint.
        port:
          type: integer
          description: The port to connect to.
        privateIPAddress:
          type: string
          description: The private ip address of the endpoint.
    DiskEncryptionProperties:
      type: object
      description: The disk encryption properties.
      properties:
        vaultUri:
          type: string
          description: Base key vault URI where the customers key is located eg. `https://myvault.vault.azure.net `_.
        keyName:
          type: string
          description: Key name that is used for enabling disk encryption.
        keyVersion:
          type: string
          description: Specific key version that is used for enabling disk encryption.
        encryptionAlgorithm:
          $ref: "#/components/schemas/JsonWebKeyEncryptionAlgorithm"
          description: 'Algorithm identifier for encryption, default RSA-OAEP. Known values are: "RSA-OAEP", "RSA-OAEP-256", and "RSA1_5".'
        msiResourceId:
          type: string
          description: Resource ID of Managed Identity that is used to access the key vault.
        encryptionAtHost:
          type: boolean
          description: Indicates whether or not resource disk encryption is enabled.
    JsonWebKeyEncryptionAlgorithm:
      type: string
      enum:
        - RSA-OAEP
        - RSA-OAEP-256
        - RSA1_5
    EncryptionInTransitProperties:
      type: object
      description: The encryption-in-transit properties.
      properties:
        isEncryptionInTransitEnabled:
          type: boolean
          description: Indicates whether or not inter cluster node communication is encrypted in transit.
    StorageProfile:
      type: object
      description: The storage profile.
      properties:
        storageaccounts:
          type: array
          items:
            $ref: "#/components/schemas/StorageAccount"
          description: The list of storage accounts in the cluster.
    StorageAccount:
      type: object
      description: The storage Account.
      properties:
        name:
          type: string
          description: The name of the storage account.
        isDefault:
          type: boolean
          description: Whether or not the storage account is the default storage account.
        container:
          type: string
          description: The container in the storage account, only to be specified for WASB storage accounts.
        fileSystem:
          type: string
          description: The filesystem, only to be specified for Azure Data Lake Storage Gen 2.
        key:
          type: string
          description: The storage account access key.
        resourceId:
          type: string
          description: The resource ID of storage account, only to be specified for Azure Data Lake Storage Gen 2.
        msiResourceId:
          type: string
          description: The managed identity (MSI) that is allowed to access the storage account, only to be specified for Azure Data Lake Storage Gen 2.
        saskey:
          type: string
          description: The shared access signature key.
        fileshare:
          type: string
          description: The file share name.
        enableSecureChannel:
          type: boolean
          description: Enable secure channel or not, it's an optional field. Default value is false when cluster version < 5.1 and true when cluster version >= 5.1 ,.
    ExcludedServicesConfig:
      type: object
