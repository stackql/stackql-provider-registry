openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Synapse Analytics
  description: Synapse workspaces, SQL/Spark pools, integration runtimes, private link hubs and Kusto pools.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2021-06-01-preview-stackql-generated
  x-serviceAlias: synapse
  x-sdkPackage: azure-mgmt-synapse
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
