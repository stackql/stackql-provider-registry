            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataLakeStoreAccountFlattened"
    put:
      operationId: Accounts_begin_create
      description: Creates the specified Data Lake Store account.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Azure resource group. Required.
        - name: account_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Data Lake Store account. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                location:
                  type: string
                  description: The resource location. Required.
                tags:
                  type: object
                  properties: {}
                  description: The resource tags.
                identity:
                  $ref: "#/components/schemas/EncryptionIdentity"
                  description: The Key Vault encryption identity, if any.
                properties:
                  type: object
                  properties:
                    defaultGroup:
                      type: string
                      description: The default owner group for all new folders and files created in the Data Lake Store account.
                    encryptionConfig:
                      $ref: "#/components/schemas/EncryptionConfig"
                      description: The Key Vault encryption configuration.
                    encryptionState:
                      type: string
                      description: 'The current state of encryption for this Data Lake Store account. Known values are: "Enabled" and "Disabled".'
                    firewallRules:
                      type: array
                      items:
                        $ref: "#/components/schemas/CreateFirewallRuleWithAccountParameters"
                      description: The list of firewall rules associated with this Data Lake Store account.
                    virtualNetworkRules:
                      type: array
                      items:
                        $ref: "#/components/schemas/CreateVirtualNetworkRuleWithAccountParameters"
                      description: The list of virtual network rules associated with this Data Lake Store account.
                    firewallState:
                      type: string
                      description: 'The current state of the IP address firewall for this Data Lake Store account. Known values are: "Enabled" and "Disabled".'
                    firewallAllowAzureIps:
                      type: string
                      description: 'The current state of allowing or disallowing IPs originating within Azure through the firewall. If the firewall is disabled, this is not enforced. Known values are: "Enabled" and "Disabled".'
                    trustedIdProviders:
                      type: array
                      items:
                        $ref: "#/components/schemas/CreateTrustedIdProviderWithAccountParameters"
                      description: The list of trusted identity providers associated with this Data Lake Store account.
                    trustedIdProviderState:
                      type: string
                      description: 'The current state of the trusted identity provider feature for this Data Lake Store account. Known values are: "Enabled" and "Disabled".'
                    newTier:
                      type: string
                      description: 'The commitment tier to use for next month. Known values are: "Consumption", "Commitment_1TB", "Commitment_10TB", "Commitment_100TB", "Commitment_500TB", "Commitment_1PB", and "Commitment_5PB".'
              required:
                - location
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataLakeStoreAccount"
    patch:
      operationId: Accounts_begin_update
      description: Updates the specified Data Lake Store account information.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Azure resource group. Required.
        - name: account_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Data Lake Store account. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: object
                  properties: {}
                  description: Resource tags.
                properties:
                  type: object
                  properties:
                    defaultGroup:
                      type: string
                      description: The default owner group for all new folders and files created in the Data Lake Store account.
                    encryptionConfig:
                      $ref: "#/components/schemas/UpdateEncryptionConfig"
                      description: Used for rotation of user managed Key Vault keys. Can only be used to rotate a user managed encryption Key Vault key.
                    firewallRules:
                      type: array
                      items:
                        $ref: "#/components/schemas/UpdateFirewallRuleWithAccountParameters"
                      description: The list of firewall rules associated with this Data Lake Store account.
                    virtualNetworkRules:
                      type: array
                      items:
                        $ref: "#/components/schemas/UpdateVirtualNetworkRuleWithAccountParameters"
                      description: The list of virtual network rules associated with this Data Lake Store account.
                    firewallState:
                      type: string
                      description: 'The current state of the IP address firewall for this Data Lake Store account. Disabling the firewall does not remove existing rules, they will just be ignored until the firewall is re-enabled. Known values are: "Enabled" and "Disabled".'
                    firewallAllowAzureIps:
                      type: string
                      description: 'The current state of allowing or disallowing IPs originating within Azure through the firewall. If the firewall is disabled, this is not enforced. Known values are: "Enabled" and "Disabled".'
                    trustedIdProviders:
                      type: array
                      items:
                        $ref: "#/components/schemas/UpdateTrustedIdProviderWithAccountParameters"
                      description: The list of trusted identity providers associated with this Data Lake Store account.
                    trustedIdProviderState:
                      type: string
                      description: 'The current state of the trusted identity provider feature for this Data Lake Store account. Disabling trusted identity provider functionality does not remove the providers, they will just be ignored until this feature is re-enabled. Known values are: "Enabled" and "Disabled".'
                    newTier:
                      type: string
                      description: 'The commitment tier to use for next month. Known values are: "Consumption", "Commitment_1TB", "Commitment_10TB", "Commitment_100TB", "Commitment_500TB", "Commitment_1PB", and "Commitment_5PB".'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataLakeStoreAccount"
