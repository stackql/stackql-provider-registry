          - $ref: "#/components/x-stackQL-resources/classification_policies/methods/delete_classification_policy"
    exception_policies:
      id: azure.communication_jobrouter.exception_policies
      name: exception_policies
      title: exception_policies
      methods:
        list_exception_policies:
          operation:
            $ref: "#/paths/~1routing~1exceptionPolicies?api-version=2024-01-18-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.value
          request:
            nativeCasing: camel
        get_exception_policy:
          operation:
            $ref: "#/paths/~1routing~1exceptionPolicies~1{exception_policy_id}?api-version=2024-01-18-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        delete_exception_policy:
          operation:
            $ref: "#/paths/~1routing~1exceptionPolicies~1{exception_policy_id}?api-version=2024-01-18-preview/delete"
          response:
            openAPIDocKey: "204"
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/exception_policies/methods/get_exception_policy"
          - $ref: "#/components/x-stackQL-resources/exception_policies/methods/list_exception_policies"
        insert: []
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/exception_policies/methods/delete_exception_policy"
    queues:
      id: azure.communication_jobrouter.queues
      name: queues
      title: queues
      methods:
        list_queues:
          operation:
            $ref: "#/paths/~1routing~1queues?api-version=2024-01-18-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.value
