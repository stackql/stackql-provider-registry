openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Job Router Administration Client
  description: JobRouterAdministrationClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2024-01-18-preview-stackql-generated
  x-serviceAlias: communication_jobrouter
  x-sdkPackage: azure-communication-jobrouter
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    DistributionMode:
      type: object
      description: "Abstract base class for defining a distribution mode. You probably want to use the sub-classes and not this class directly. Known sub-classes are: BestWorkerMode, LongestIdleMode, RoundRobinMode All required parameters must be populated in order to send to server."
      properties:
        minConcurrentOffers:
          type: integer
          description: Governs the minimum desired number of active concurrent offers a job can have.
        maxConcurrentOffers:
          type: integer
          description: Governs the maximum number of active concurrent offers a job can have.
        bypassSelectors:
          type: boolean
          description: "If set to true, then router will match workers to jobs even if they don't match label selectors. Warning: You may get workers that are not qualified for a job they are matched with if you set this variable to true. This flag is intended more for temporary usage. By default, set to false."
        kind:
          type: string
          description: 'The type discriminator describing a sub-type of DistributionMode. Required. Known values are: "bestWorker", "longestIdle", and "roundRobin".'
      required:
        - kind
    DistributionPolicy:
      type: object
      description: Policy governing how jobs are distributed to workers. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        etag:
          type: string
          description: The entity tag for this resource. Required.
        id:
          type: string
          description: Id of a distribution policy. Required.
        name:
          type: string
          description: Friendly name of this policy.
        offerExpiresAfterSeconds:
          type: number
          description: Number of seconds after which any offers created under this policy will be expired.
        mode:
          $ref: "#/components/schemas/DistributionMode"
          description: Mode governing the specific distribution method.
    PagedDistributionPolicy:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DistributionPolicy"
        nextLink:
          type: string
    QueueSelectorAttachment:
      type: object
      description: "An attachment of queue selectors to resolve a queue to a job from a classification policy. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ConditionalQueueSelectorAttachment, PassThroughQueueSelectorAttachment, RuleEngineQueueSelectorAttachment, StaticQueueSelectorAttachment, WeightedAllocationQueueSelectorAttachment All required parameters must be populated in order to send to server."
      properties:
        kind:
          type: string
          description: 'The type discriminator describing a sub-type of QueueSelectorAttachment. Required. Known values are: "conditional", "passThrough", "ruleEngine", "static", and "weightedAllocation".'
      required:
        - kind
    RouterRule:
      type: object
      description: "A rule of one of the following types: StaticRule: A rule providing static rules that always return the same result, regardless of input. DirectMapRule: A rule that return the same labels as the input labels. ExpressionRule: A rule providing inline expression rules. FunctionRule: A rule providing a binding to an HTTP Triggered Azure Function. WebhookRule: A rule providing a binding to a webserver following OAuth2.0 authentication protocol. You probably want to use the sub-classes and not this class directly. Known sub-classes are: DirectMapRouterRule, ExpressionRouterRule, FunctionRouterRule, StaticRouterRule, WebhookRouterRule All required parameters must be populated in order to send to server."
      properties:
        kind:
          type: string
          description: 'The type discriminator describing a sub-type of RouterRule. Required. Known values are: "directMap", "expression", "function", "static", and "webhook".'
      required:
        - kind
    WorkerSelectorAttachment:
      type: object
      description: "An attachment which attaches worker selectors to a job. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ConditionalWorkerSelectorAttachment, PassThroughWorkerSelectorAttachment, RuleEngineWorkerSelectorAttachment, StaticWorkerSelectorAttachment, WeightedAllocationWorkerSelectorAttachment All required parameters must be populated in order to send to server."
      properties:
        kind:
          type: string
          description: 'The type discriminator describing a sub-type of WorkerSelectorAttachment. Required. Known values are: "conditional", "passThrough", "ruleEngine", "static", and "weightedAllocation".'
      required:
        - kind
    ClassificationPolicy:
      type: object
      description: A container for the rules that govern how jobs are classified. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        etag:
          type: string
          description: The entity tag for this resource. Required.
        id:
          type: string
          description: Id of a classification policy. Required.
        name:
          type: string
          description: Friendly name of this policy.
        fallbackQueueId:
          type: string
          description: Id of a fallback queue to select if queue selector attachments doesn't find a match.
        queueSelectorAttachments:
          type: array
          items:
            $ref: "#/components/schemas/QueueSelectorAttachment"
          description: Queue selector attachments used to resolve a queue for a job.
        prioritizationRule:
          $ref: "#/components/schemas/RouterRule"
          description: A rule to determine a priority score for a job.
        workerSelectorAttachments:
          type: array
          items:
            $ref: "#/components/schemas/WorkerSelectorAttachment"
          description: Worker selector attachments used to attach worker selectors to a job.
    PagedClassificationPolicy:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ClassificationPolicy"
        nextLink:
          type: string
    ExceptionRule:
      type: object
      description: A rule that defines actions to execute upon a specific trigger. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: Id of an exception rule. Required.
        trigger:
          $ref: "#/components/schemas/ExceptionTrigger"
          description: The trigger for this exception rule. Required.
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ExceptionAction"
          description: A collection of actions to perform once the exception is triggered. Required.
      required:
        - id
        - trigger
        - actions
    ExceptionTrigger:
      type: object
      description: "Abstract base class for defining a trigger for exception rules. You probably want to use the sub-classes and not this class directly. Known sub-classes are: QueueLengthExceptionTrigger, WaitTimeExceptionTrigger All required parameters must be populated in order to send to server."
      properties:
        kind:
          type: string
          description: 'The type discriminator describing a sub-type of ExceptionTrigger. Required. Known values are: "queueLength" and "waitTime".'
      required:
        - kind
    ExceptionAction:
      type: object
      description: "The action to take when the exception is triggered. You probably want to use the sub-classes and not this class directly. Known sub-classes are: CancelExceptionAction, ManualReclassifyExceptionAction, ReclassifyExceptionAction All required parameters must be populated in order to send to server."
      properties:
        id:
          type: string
          description: Unique Id of the exception action.
        kind:
          type: string
          description: 'The type discriminator describing a sub-type of ExceptionAction. Required. Known values are: "cancel", "manualReclassify", and "reclassify".'
      required:
        - kind
    ExceptionPolicy:
      type: object
      description: A policy that defines actions to execute when exception are triggered. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        etag:
          type: string
          description: The entity tag for this resource. Required.
        id:
          type: string
          description: Id of an exception policy. Required.
        name:
          type: string
          description: Friendly name of this policy.
        exceptionRules:
          type: array
          items:
            $ref: "#/components/schemas/ExceptionRule"
          description: A collection of exception rules on the exception policy.
    PagedExceptionPolicy:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ExceptionPolicy"
        nextLink:
          type: string
    RouterQueue:
      type: object
      description: A queue that can contain jobs to be routed. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        etag:
          type: string
          description: The entity tag for this resource. Required.
        id:
          type: string
          description: Id of a queue. Required.
        name:
          type: string
          description: Friendly name of this queue.
        distributionPolicyId:
          type: string
          description: Id of a distribution policy that will determine how a job is distributed to workers.
        labels:
          type: object
          properties: {}
          description: A set of key/value pairs that are identifying attributes used by the rules engines to make decisions. Values must be primitive values - number, string, boolean.
        exceptionPolicyId:
          type: string
          description: Id of an exception policy that determines various job escalation rules.
    PagedRouterQueue:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/RouterQueue"
        nextLink:
          type: string
    RouterJobStatus:
      type: string
      enum:
        - pendingClassification
        - queued
        - assigned
        - completed
        - closed
        - cancelled
        - classificationFailed
        - created
        - pendingSchedule
        - scheduled
        - scheduleFailed
        - waitingForActivation
    RouterWorkerSelector:
      type: object
      description: Describes a condition that must be met against a set of labels for worker selection. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        key:
          type: string
          description: The label key to query against. Required.
        labelOperator:
          $ref: "#/components/schemas/LabelOperator"
          description: 'Describes how the value of the label is compared to the value defined on the worker selector. Required. Known values are: "equal", "notEqual", "lessThan", "lessThanOrEqual", "greaterThan", and "greaterThanOrEqual".'
        value:
          type: object
          properties: {}
          description: The value to compare against the actual label value with the given operator. Values must be primitive values - number, string, boolean.
        expiresAfterSeconds:
          type: number
          description: Describes how long this label selector is valid in seconds.
        expedite:
          type: boolean
          description: Pushes a job to the front of the queue as long as this selector is active.
        status:
          $ref: "#/components/schemas/RouterWorkerSelectorStatus"
          description: 'Status of the worker selector. Known values are: "active" and "expired".'
        expiresAt:
          type: string
          format: date-time
          description: The time at which this worker selector expires in UTC.
      required:
        - key
        - labelOperator
    LabelOperator:
      type: string
      enum:
        - equal
        - notEqual
        - lessThan
        - lessThanOrEqual
        - greaterThan
        - greaterThanOrEqual
    RouterWorkerSelectorStatus:
      type: string
      enum:
        - active
        - expired
    RouterJobNote:
      type: object
      description: A note attached to a job. All required parameters must be populated in order to send to server.
      properties:
        message:
          type: string
          description: The message contained in the note. Required.
        addedAt:
          type: string
          format: date-time
          description: The time at which the note was added in UTC. If not provided, will default to the current time.
      required:
        - message
    JobMatchingMode:
      type: object
      description: "A matching mode of one of the following types: QueueAndMatchMode: Used when matching worker to a job is required to be done right after job is queued. ScheduleAndSuspendMode: Used for scheduling jobs to be queued at a future time. At specified time, matching of a worker to the job will not start automatically. SuspendMode: Used when matching workers to a job needs to be suspended. You probably want to use the sub-classes and not this class directly. Known sub-classes are: QueueAndMatchMode, ScheduleAndSuspendMode, SuspendMode All required parameters must be populated in order to send to server."
      properties:
        kind:
          type: string
          description: 'The type discriminator describing a sub-type of JobMatchingMode. Required. Known values are: "queueAndMatch", "scheduleAndSuspend", and "suspend".'
      required:
        - kind
    RouterJob:
      type: object
      description: A unit of work to be routed. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        etag:
          type: string
          description: The entity tag for this resource. Required.
        id:
          type: string
          description: Id of a job. Required.
        channelReference:
          type: string
          description: Reference to an external parent context, eg. call ID.
        status:
          $ref: "#/components/schemas/RouterJobStatus"
          description: 'The status of the job. Known values are: "pendingClassification", "queued", "assigned", "completed", "closed", "cancelled", "classificationFailed", "created", "pendingSchedule", "scheduled", "scheduleFailed", and "waitingForActivation".'
        enqueuedAt:
          type: string
          format: date-time
          description: Timestamp a job was queued in UTC.
        channelId:
          type: string
          description: The channel identifier. eg. voice, chat, etc.
        classificationPolicyId:
          type: string
          description: Id of a classification policy used for classifying this job.
        queueId:
          type: string
          description: Id of a queue that this job is queued to.
        priority:
          type: integer
          description: Priority of this job.
        dispositionCode:
          type: string
          description: Reason code for cancelled or closed jobs.
        requestedWorkerSelectors:
          type: array
          items:
            $ref: "#/components/schemas/RouterWorkerSelector"
          description: A collection of manually specified worker selectors, which a worker must satisfy in order to process this job.
        attachedWorkerSelectors:
          type: array
          items:
            $ref: "#/components/schemas/RouterWorkerSelector"
          description: A collection of worker selectors attached by a classification policy, which a worker must satisfy in order to process this job.
        labels:
          type: object
          properties: {}
          description: A set of key/value pairs that are identifying attributes used by the rules engines to make decisions. Values must be primitive values - number, string, boolean.
        assignments:
          type: object
          properties: {}
          description: A collection of the assignments of the job. Key is AssignmentId.
        tags:
          type: object
          properties: {}
          description: A set of non-identifying attributes attached to this job. Values must be primitive values - number, string, boolean.
        notes:
          type: array
          items:
            $ref: "#/components/schemas/RouterJobNote"
          description: Notes attached to a job, sorted by timestamp.
        scheduledAt:
          type: string
          format: date-time
          description: If set, job will be scheduled to be enqueued at a given time.
        matchingMode:
          $ref: "#/components/schemas/JobMatchingMode"
          description: "If provided, will determine how job matching will be carried out. Default mode: QueueAndMatchMode."
    PagedRouterJob:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/RouterJob"
        nextLink:
          type: string
    RouterWorkerState:
      type: string
      enum:
        - active
        - draining
        - inactive
    RouterChannel:
      type: object
      description: Represents the capacity a job in this channel will consume from a worker. All required parameters must be populated in order to send to server.
      properties:
        channelId:
          type: string
          description: Id of a channel. Required.
        capacityCostPerJob:
          type: integer
          description: The amount of capacity that an instance of a job of this channel will consume of the total worker capacity. Required.
        maxNumberOfJobs:
          type: integer
          description: The maximum number of jobs that can be supported concurrently for this channel.
      required:
        - channelId
        - capacityCostPerJob
    RouterJobOffer:
      type: object
      description: An offer of a job to a worker. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        offerId:
          type: string
          description: Id of an offer. Required.
        jobId:
          type: string
          description: Id of the job. Required.
        capacityCost:
          type: integer
          description: The capacity cost consumed by the job offer. Required.
        offeredAt:
          type: string
          format: date-time
          description: Timestamp when the offer was created in UTC.
        expiresAt:
          type: string
          format: date-time
          description: Timestamp when the offer will expire in UTC.
      required:
        - jobId
        - capacityCost
    RouterWorkerAssignment:
      type: object
      description: The assignment for a worker to a job. All required parameters must be populated in order to send to server.
      properties:
        assignmentId:
          type: string
          description: Id of the assignment. Required.
        jobId:
          type: string
          description: Id of the job assigned. Required.
        capacityCost:
          type: integer
          description: The amount of capacity this assignment has consumed on the worker. Required.
        assignedAt:
          type: string
          format: date-time
          description: The assignment time of the job in UTC. Required.
      required:
        - assignmentId
        - jobId
        - capacityCost
        - assignedAt
    RouterWorker:
      type: object
      description: An entity for jobs to be routed to. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        etag:
          type: string
          description: The entity tag for this resource. Required.
        id:
          type: string
          description: Id of a worker. Required.
        state:
          $ref: "#/components/schemas/RouterWorkerState"
          description: 'Current state of a worker. Known values are: "active", "draining", and "inactive".'
        queues:
          type: array
          items:
            type: string
          description: Collection of queue(s) that this worker can receive work from.
        capacity:
          type: integer
          description: The total capacity score this worker has to manage multiple concurrent jobs.
        labels:
          type: object
          properties: {}
          description: A set of key/value pairs that are identifying attributes used by the rules engines to make decisions. Values must be primitive values - number, string, boolean.
        tags:
          type: object
          properties: {}
          description: A set of non-identifying attributes attached to this worker. Values must be primitive values - number, string, boolean.
        channels:
          type: array
          items:
            $ref: "#/components/schemas/RouterChannel"
          description: Collection of channel(s) this worker can handle and their impact on the workers capacity.
        offers:
          type: array
          items:
            $ref: "#/components/schemas/RouterJobOffer"
          description: A list of active offers issued to this worker.
        assignedJobs:
          type: array
          items:
            $ref: "#/components/schemas/RouterWorkerAssignment"
          description: A list of assigned jobs attached to this worker.
        loadRatio:
          type: number
          description: A value indicating the workers capacity. A value of '1' means all capacity is consumed. A value of '0' means no capacity is currently consumed.
        availableForOffers:
          type: boolean
          description: A flag indicating this worker is open to receive offers or not.
        maxConcurrentOffers:
          type: integer
          description: If this is set, the worker will only receive up to this many new offers at a time.
    PagedRouterWorker:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/RouterWorker"
        nextLink:
          type: string
    RouterJobPositionDetails:
      type: object
      description: Position and estimated wait time for a job. All required parameters must be populated in order to send to server.
      properties:
        jobId:
          type: string
          description: Id of the job these details are about. Required.
        position:
          type: integer
          description: Position of the job in question within that queue. Required.
        queueId:
          type: string
          description: Id of the queue this job is enqueued in. Required.
        queueLength:
          type: integer
          description: "Length of the queue: total number of enqueued jobs. Required."
        estimatedWaitTimeMinutes:
          type: number
          description: Estimated wait time of the job rounded up to the nearest minute. Required.
      required:
        - jobId
        - position
        - queueId
        - queueLength
        - estimatedWaitTimeMinutes
    RouterQueueStatistics:
      type: object
      description: Statistics for the queue. All required parameters must be populated in order to send to server.
      properties:
        queueId:
          type: string
          description: Id of the queue these details are about. Required.
        length:
          type: integer
          description: "Length of the queue: total number of enqueued jobs. Required."
        estimatedWaitTimeMinutes:
          type: object
          properties: {}
          description: The estimated wait time of this queue rounded up to the nearest minute, grouped by job priority.
        longestJobWaitTimeMinutes:
          type: number
          description: The wait time of the job that has been enqueued in this queue for the longest.
      required:
        - queueId
        - length
    UnassignJobResult:
      type: object
      description: Response payload after a job has been successfully unassigned. All required parameters must be populated in order to send to server.
      properties:
        jobId:
          type: string
          description: Id of an unassigned job. Required.
        unassignmentCount:
          type: integer
          description: The number of times a job is unassigned. At a maximum 3. Required.
      required:
        - jobId
        - unassignmentCount
    AcceptJobOfferResult:
      type: object
      description: Response containing ids for the worker, job, and assignment from an accepted offer. All required parameters must be populated in order to send to server.
      properties:
        assignmentId:
          type: string
          description: Id of job assignment that assigns a worker that has accepted an offer to a job. Required.
        jobId:
          type: string
          description: Id of the job assigned. Required.
        workerId:
          type: string
          description: Id of the worker that has been assigned this job. Required.
      required:
        - assignmentId
        - jobId
        - workerId
