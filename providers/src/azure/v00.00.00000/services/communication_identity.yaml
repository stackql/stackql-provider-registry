      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    CommunicationIdentityAccessTokenResult:
      type: object
      description: A communication identity with access token. All required parameters must be populated in order to send to Azure.
      properties:
        identity:
          $ref: "#/components/schemas/CommunicationIdentity"
          description: A communication identity. Required.
        accessToken:
          $ref: "#/components/schemas/CommunicationIdentityAccessToken"
          description: An access token.
      required:
        - identity
    CommunicationIdentity:
      type: object
      description: A communication identity. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: Identifier of the identity. Required.
      required:
        - id
    CommunicationIdentityAccessToken:
      type: object
      description: An access token. All required parameters must be populated in order to send to Azure.
      properties:
        token:
          type: string
          description: The access token issued for the identity. Required.
        expiresOn:
          type: string
          description: The expiry time of the token. Required.
      required:
        - token
        - expiresOn
