      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    Error:
      type: object
      description: Error definition. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        code:
          type: string
          description: Service specific error code which serves as the substatus for the HTTP error code.
        message:
          type: string
          description: A human-readable representation of the error.
        details:
          type: array
          items:
            $ref: "#/components/schemas/Error"
          description: Internal error details.
        innererror:
          $ref: "#/components/schemas/InnerError"
          description: An object containing more specific information than the current object about the error.
    InnerError:
      type: object
      description: A more specific error description than was provided by the containing error.
      properties:
        code:
          type: string
          description: A more specific error code than was provided by the containing error.
        innererror:
          $ref: "#/components/schemas/InnerError"
          description: An object containing more specific information than the current object about the error.
    DeleteJob:
      type: object
      description: A job which contains a reference to the operations to perform, results, and execution metadata. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        id:
          type: string
          description: The identifier of the delete job.
        status:
          type: string
          description: 'Status of the job. Known values are: "notstarted", "running", "failed", and "succeeded".'
        createdDateTime:
          type: string
          format: date-time
          description: "Start time of the job. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        finishedDateTime:
          type: string
          format: date-time
          description: "End time of the job. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        purgeDateTime:
          type: string
          format: date-time
          description: "Time at which job will be purged by the service from the system. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        error:
          $ref: "#/components/schemas/Error"
          description: Details of the error(s) that occurred executing the import job.
    PagedDeleteJob:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DeleteJob"
        nextLink:
          type: string
    DigitalTwinsModelData:
      type: object
      description: A model definition and metadata for that model. All required parameters must be populated in order to send to server.
      properties:
        displayName:
          type: object
          properties: {}
          description: A language map that contains the localized display names as specified in the model definition.
        description:
          type: object
          properties: {}
          description: A language map that contains the localized descriptions as specified in the model definition.
        id:
          type: string
          description: The id of the model as specified in the model definition. Required.
        uploadTime:
          type: string
          format: date-time
          description: The time the model was uploaded to the service.
        decommissioned:
          type: boolean
          description: Indicates if the model is decommissioned. Decommissioned models cannot be referenced by newly created digital twins.
        model:
          type: object
          properties: {}
          description: The model definition.
      required:
        - id
    PagedDigitalTwinsModelData:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DigitalTwinsModelData"
        nextLink:
          type: string
    IncomingRelationship:
      type: object
      description: An incoming relationship.
      properties:
        $relationshipId:
          type: string
          description: A user-provided string representing the id of this relationship, unique in the context of the source digital twin, i.e. sourceId + relationshipId is unique in the context of the service.
        $sourceId:
          type: string
          description: The id of the source digital twin.
        $relationshipName:
          type: string
          description: The name of the relationship.
        $relationshipLink:
          type: string
          description: Link to the relationship, to be used for deletion.
    PagedIncomingRelationship:
      type: object
