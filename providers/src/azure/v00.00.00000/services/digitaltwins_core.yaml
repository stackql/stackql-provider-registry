paths:
  /jobs/deletions?api-version=2023-10-31:
    get:
      operationId: DeleteJobs_list
      description: "Retrieves all deletion jobs. This may be useful to find a delete job that was previously requested, or to view a history of delete jobs that have run or are currently running on the instance. Status codes: * 200 OK."
      parameters:
        - name: traceparent
          in: header
          required: false
          schema:
            type: string
        - name: tracestate
          in: header
          required: false
          schema:
            type: string
        - name: max-items-per-page
          in: header
          required: false
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                traceparent:
                  type: string
                  description: Identifies the request in a distributed tracing system.
                tracestate:
                  type: string
                  description: Provides vendor-specific trace identification information and is a companion to traceparent.
                MaxItemsPerPage:
                  type: integer
                  description: The maximum number of items to retrieve per request. The server may choose to return less than the requested number.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDeleteJob"
    post:
      operationId: DeleteJobs_begin_add
      description: "Initiates a job which deletes all models, twins, and relationships on the instance. Does not delete any other types of entities. Status codes: * 202 Created * 400 Bad Request * JobLimitReached - The maximum number of delete jobs allowed has been reached. * ValidationFailed - Operation-Id already exists."
      parameters:
        - name: traceparent
          in: header
          required: false
          schema:
            type: string
        - name: tracestate
          in: header
          required: false
          schema:
            type: string
        - name: operation-id
          in: header
          required: false
          schema:
            type: string
        - name: timeoutInMinutes
          in: query
          required: false
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                traceparent:
                  type: string
                  description: Identifies the request in a distributed tracing system.
                tracestate:
                  type: string
                  description: Provides vendor-specific trace identification information and is a companion to traceparent.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteJob"
  /jobs/deletions/{id}?api-version=2023-10-31:
    get:
      operationId: DeleteJobs_get_by_id
      description: "Retrieves a delete job. Status codes: * 200 OK * 404 Not Found * DeleteJobNotFound - The delete job was not found."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The id for the delete job. The id is unique within the service and case sensitive. Required.
        - name: traceparent
          in: header
          required: false
          schema:
            type: string
        - name: tracestate
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                traceparent:
                  type: string
                  description: Identifies the request in a distributed tracing system.
                tracestate:
                  type: string
                  description: Provides vendor-specific trace identification information and is a companion to traceparent.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteJob"
  /models?api-version=2023-10-31:
    get:
      operationId: DigitalTwinModels_list
      description: "Retrieves model metadata and, optionally, model definitions. Status codes: * 200 OK * 400 Bad Request * InvalidArgument - The model id is invalid. * LimitExceeded - The maximum number of model ids allowed in 'dependenciesFor' has been reached. * 404 Not Found * ModelNotFound - The model was not found."
      parameters:
        - name: traceparent
          in: header
          required: false
          schema:
            type: string
        - name: tracestate
          in: header
          required: false
          schema:
            type: string
        - name: includeModelDefinition
          in: query
          required: false
          schema:
            type: boolean
          description: When true the model definition will be returned as part of the result. Default value is False.
        - name: max-items-per-page
          in: header
          required: false
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                traceparent:
                  type: string
                  description: Identifies the request in a distributed tracing system.
