      type: object
      description: A route which directs notification and telemetry events to an endpoint. Endpoints are a destination outside of Azure Digital Twins such as an EventHub. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: The id of the event route.
        endpointName:
          type: string
          description: The name of the endpoint this event route is bound to. Required.
        filter:
          type: string
          description: An expression which describes the events which are routed to the endpoint. Required.
      required:
        - endpointName
        - filter
    PagedDigitalTwinsEventRoute:
      type: object
      properties:
        value:
          type: array
          items:
