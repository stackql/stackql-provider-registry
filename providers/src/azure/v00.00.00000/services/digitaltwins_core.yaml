        id:
          type: string
          description: The identifier of the import job.
        inputBlobUri:
          type: string
          description: The path to the input Azure storage blob that contains file(s) describing the operations to perform in the job. Required.
        outputBlobUri:
          type: string
          description: The path to the output Azure storage blob that will contain the errors and progress logs of import job. Required.
        status:
          type: string
          description: 'Status of the job. Known values are: "notstarted", "running", "failed", "succeeded", "cancelling", and "cancelled".'
        createdDateTime:
          type: string
          format: date-time
          description: "Start time of the job. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        lastActionDateTime:
          type: string
          format: date-time
          description: "Last time service performed any action from the job. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        finishedDateTime:
          type: string
          format: date-time
          description: "End time of the job. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        purgeDateTime:
          type: string
          format: date-time
          description: "Time at which job will be purged by the service from the system. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        error:
          $ref: "#/components/schemas/Error"
          description: Details of the error(s) that occurred executing the import job.
      required:
        - inputBlobUri
        - outputBlobUri
    PagedImportJob:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ImportJob"
        nextLink:
          type: string
    QueryResult:
      type: object
      description: The results of a query operation and an optional continuation token. All required parameters must be populated in order to send to server.
