openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure Communication Services - Call Automation (Data Plane)
  description: "Server-based call workflows: answer, transfer, record and play media in calls."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-03-12-stackql-generated
  x-serviceAlias: communication_call_automation
  x-sdkPackage: azure-communication-callautomation
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    CommunicationIdentifierModel:
      type: object
      description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value."
      properties:
        kind:
          type: string
          description: 'The identifier kind. Only required in responses. Known values are: "unknown", "communicationUser", "phoneNumber", "microsoftTeamsUser", "microsoftTeamsApp", and "teamsExtensionUser".'
        rawId:
          type: string
          description: Raw Id of the identifier. Optional in requests, required in responses.
        communicationUser:
          $ref: "#/components/schemas/CommunicationUserIdentifierModel"
          description: The communication user.
        phoneNumber:
          $ref: "#/components/schemas/PhoneNumberIdentifierModel"
          description: The phone number.
        microsoftTeamsUser:
          $ref: "#/components/schemas/MicrosoftTeamsUserIdentifierModel"
          description: The Microsoft Teams user.
        microsoftTeamsApp:
          $ref: "#/components/schemas/MicrosoftTeamsAppIdentifierModel"
          description: The Microsoft Teams application.
        teamsExtensionUser:
          $ref: "#/components/schemas/TeamsExtensionUserIdentifierModel"
          description: The Microsoft Teams Extension user.
    CommunicationUserIdentifierModel:
      type: object
      description: A user that got created with an Azure Communication Services resource. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: The Id of the communication user. Required.
      required:
        - id
    PhoneNumberIdentifierModel:
      type: object
      description: A phone number. All required parameters must be populated in order to send to server.
      properties:
        value:
          type: string
          description: The phone number, usually in E.164 format. Required.
        isAnonymous:
          type: boolean
          description: True if the phone number is anonymous. By default false if missing. If the phone number is anonymous, the value will be the string 'anonymous'.
        assertedId:
          type: string
          description: The asserted Id of the phone number. An asserted Id gets generated when the same phone number joins the same call more than once.
      required:
        - value
    MicrosoftTeamsUserIdentifierModel:
      type: object
      description: A Microsoft Teams user. All required parameters must be populated in order to send to server.
      properties:
        userId:
          type: string
          description: The Id of the Microsoft Teams user. If not anonymous, this is the Entra ID object Id of the user. Required.
        isAnonymous:
          type: boolean
          description: True if the Microsoft Teams user is anonymous. By default false if missing.
        cloud:
          type: string
          description: "The cloud that the Microsoft Teams user belongs to. By default 'public' if missing. Known values are: \"public\", \"dod\", and \"gcch\"."
      required:
        - userId
    MicrosoftTeamsAppIdentifierModel:
      type: object
      description: A Microsoft Teams application. All required parameters must be populated in order to send to server.
      properties:
        appId:
          type: string
          description: The Id of the Microsoft Teams application. Required.
        cloud:
          type: string
          description: "The cloud that the Microsoft Teams application belongs to. By default 'public' if missing. Known values are: \"public\", \"dod\", and \"gcch\"."
      required:
        - appId
    TeamsExtensionUserIdentifierModel:
      type: object
      description: A Microsoft Teams Phone user who is using a Communication Services resource to extend their Teams Phone set up. All required parameters must be populated in order to send to server.
      properties:
        userId:
          type: string
          description: The Id of the Microsoft Teams Extension user, i.e. the Entra ID object Id of the user. Required.
        tenantId:
          type: string
          description: The tenant Id of the Microsoft Teams Extension user. Required.
        resourceId:
          type: string
          description: The Communication Services resource Id. Required.
        cloud:
          type: string
          description: "The cloud that the Microsoft Teams Extension user belongs to. By default 'public' if missing. Known values are: \"public\", \"dod\", and \"gcch\"."
      required:
        - userId
        - tenantId
        - resourceId
    MediaStreamingSubscription:
      type: object
      description: Media streaming Subscription Object.
      properties:
        id:
          type: string
          description: Subscription Id.
        state:
          type: string
          description: 'Current state of media streaming session. Known values are: "disabled", "inactive", and "active".'
        subscribedContentTypes:
          type: array
          items:
            type: string
          description: Subscribed media streaming content types.
    TranscriptionSubscription:
      type: object
      description: Transcription Subscription Object.
      properties:
        id:
          type: string
          description: Subscription Id.
        state:
          type: string
          description: 'Current state of transcription session. Known values are: "disabled", "inactive", and "active".'
        subscribedResultTypes:
          type: array
          items:
            type: string
          description: Subscribed transcription result types.
        locale:
          type: string
          description: Specifies the locale used for transcription, e.g., en-CA or en-AU.
    CallConnectionProperties:
      type: object
      description: Properties of a call connection.
      properties:
        callConnectionId:
          type: string
          description: The call connection id.
        serverCallId:
          type: string
          description: The server call id.
        targets:
          type: array
          items:
            $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: The targets of the call.
        callConnectionState:
          type: string
          description: 'The states of a call connection. Known values are: "unknown", "connecting", "connected", "transferring", "transferAccepted", "disconnecting", and "disconnected".'
        callbackUri:
          type: string
          description: The callback URI.
        sourceCallerIdNumber:
          $ref: "#/components/schemas/PhoneNumberIdentifierModel"
          description: A phone number.
        sourceDisplayName:
          type: string
          description: Display name of the call if dialing out to a pstn number.
        source:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value."
        correlationId:
          type: string
          description: The correlation ID.
        answeredBy:
          $ref: "#/components/schemas/CommunicationUserIdentifierModel"
          description: A user that got created with an Azure Communication Services resource.
        mediaStreamingSubscription:
          $ref: "#/components/schemas/MediaStreamingSubscription"
          description: Media streaming Subscription Object.
        transcriptionSubscription:
          $ref: "#/components/schemas/TranscriptionSubscription"
          description: Transcription Subscription Object.
        answeredFor:
          $ref: "#/components/schemas/PhoneNumberIdentifierModel"
          description: A phone number.
    CallParticipant:
      type: object
      description: A call participant.
      properties:
        identifier:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value."
        isMuted:
          type: boolean
          description: Is participant muted.
        isOnHold:
          type: boolean
          description: Is participant on hold.
    PagedCallParticipant:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/CallParticipant"
        nextLink:
          type: string
    CustomCallingContext:
      type: object
      description: The custom calling context which will be sent to the target.
      properties:
        voipHeaders:
          type: object
          properties: {}
          description: Custom calling context VoiP headers.
        sipHeaders:
          type: object
          properties: {}
          description: Custom calling context SIP headers.
        teamsPhoneCallDetails:
          $ref: "#/components/schemas/TeamsPhoneCallDetails"
          description: The call details which will be sent to the target.
    TeamsPhoneCallDetails:
      type: object
      description: The call details which will be sent to the target.
      properties:
        teamsPhoneCallerDetails:
          $ref: "#/components/schemas/TeamsPhoneCallerDetails"
          description: Container for details relating to the original caller of the call.
        teamsPhoneSourceDetails:
          $ref: "#/components/schemas/TeamsPhoneSourceDetails"
          description: Container for details relating to the entity responsible for the creation of these call details.
        sessionId:
          type: string
          description: Id to exclusively identify this call session. IVR will use this for their telemetry/reporting.
        intent:
          type: string
          description: The intent of the call.
        callTopic:
          type: string
          description: A very short description (max 48 chars) of the reason for the call. To be displayed in Teams CallNotification.
        callContext:
          type: string
          description: A summary of the call thus far. It will be displayed on a side panel in the Teams UI.
        transcriptUrl:
          type: string
          description: Url for fetching the transcript of the call.
        callSentiment:
          type: string
          description: Sentiment of the call thus far.
        suggestedActions:
          type: string
          description: Recommendations for resolving the issue based on the customer's intent and interaction history.
    TeamsPhoneCallerDetails:
      type: object
      description: Container for details relating to the original caller of the call. All required parameters must be populated in order to send to server.
      properties:
        caller:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value. Required."
        name:
          type: string
          description: Caller's name. Required.
        phoneNumber:
          type: string
          description: Caller's phone number. Required.
        recordId:
          type: string
          description: Caller's record ID (ex in CRM).
        screenPopUrl:
          type: string
          description: Caller's screen pop URL.
        isAuthenticated:
          type: boolean
          description: Flag indicating whether the caller was authenticated.
        additionalCallerInformation:
          type: object
          properties: {}
          description: A set of key value pairs (max 10, any additional entries would be ignored) which a bot author wants to pass to the Teams Client for display to the agent.
      required:
        - caller
        - name
        - phoneNumber
    TeamsPhoneSourceDetails:
      type: object
      description: Container for details relating to the entity responsible for the creation of these call details. All required parameters must be populated in order to send to server.
      properties:
        source:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value. Required."
        language:
          type: string
          description: Language of the source entity passing along the call details, passed in the ISO-639 standard. Required.
        status:
          type: string
          description: Status of the source entity passing along the call details. Required.
        intendedTargets:
          type: object
          properties: {}
          description: Intended targets of the source entity passing along the call details.
      required:
        - source
        - language
        - status
    TransferCallResponse:
      type: object
      description: The response payload for transferring the call.
      properties:
        operationContext:
          type: string
          description: The operation context provided by client.
    AddParticipantResponse:
      type: object
      description: The response payload for adding participants to the call.
      properties:
        participant:
          $ref: "#/components/schemas/CallParticipant"
          description: A call participant.
        operationContext:
          type: string
          description: The operation context provided by client.
        invitationId:
          type: string
          description: Invitation ID used to add a participant.
    RemoveParticipantResponse:
      type: object
      description: The response payload for removing participants of the call.
      properties:
        operationContext:
          type: string
          description: The operation context provided by client.
    MuteParticipantsResult:
      type: object
      description: The result payload for muting participants from the call.
      properties:
        operationContext:
          type: string
          description: The operation context provided by client.
    CancelAddParticipantResponse:
      type: object
      description: Response payload for cancel add participant request.
      properties:
        invitationId:
          type: string
          description: Invitation ID used to cancel the add participant action.
        operationContext:
          type: string
          description: The operation context provided by client.
    MoveParticipantsResponse:
      type: object
      description: The response payload for moving participants to the call.
      properties:
        participants:
          type: array
          items:
            $ref: "#/components/schemas/CallParticipant"
          description: List of current participants in the call.
        operationContext:
          type: string
          description: The operation context provided by client.
        fromCall:
          type: string
          description: The CallConnectionId for the call you want to move the participant from.
    PlaySource:
      type: object
      description: PlaySource. All required parameters must be populated in order to send to server.
      properties:
        kind:
          type: string
          description: 'Defines the types of play source. Required. Known values are: "file", "text", and "ssml".'
        playSourceCacheId:
          type: string
          description: Defines the identifier to be used for caching related media.
        file:
          $ref: "#/components/schemas/FileSource"
          description: ":vartype file: ~azure.communication.callautomation.models.FileSource"
        text:
          $ref: "#/components/schemas/TextSource"
          description: ":vartype text: ~azure.communication.callautomation.models.TextSource"
        ssml:
          $ref: "#/components/schemas/SsmlSource"
          description: ":vartype ssml: ~azure.communication.callautomation.models.SsmlSource"
      required:
        - kind
    FileSource:
      type: object
      description: FileSource. All required parameters must be populated in order to send to server.
      properties:
        uri:
          type: string
          description: Uri for the audio file to be played. Required.
      required:
        - uri
    TextSource:
      type: object
      description: TextSource. All required parameters must be populated in order to send to server.
      properties:
        text:
          type: string
          description: Text for the cognitive service to be played. Required.
        sourceLocale:
          type: string
          description: "Source language locale to be played Refer to available locales here:"
        voiceKind:
          type: string
          description: 'Audio kind type. Known values are: "male" and "female".'
        voiceName:
          type: string
          description: "Voice name to be played Refer to available Text-to-speech voices here:"
        customVoiceEndpointId:
          type: string
          description: Endpoint where the custom voice was deployed.
      required:
        - text
    SsmlSource:
      type: object
      description: SsmlSource. All required parameters must be populated in order to send to server.
      properties:
        ssmlText:
          type: string
          description: Ssml string for the cognitive service to be played. Required.
        customVoiceEndpointId:
          type: string
          description: Endpoint where the custom voice was deployed.
      required:
        - ssmlText
    PlayOptions:
      type: object
      description: PlayOptions. All required parameters must be populated in order to send to server.
      properties:
        loop:
          type: boolean
          description: The option to play the provided audio source in loop when set to true. Required.
      required:
        - loop
    RecognizeOptions:
      type: object
      description: RecognizeOptions. All required parameters must be populated in order to send to server.
      properties:
        interruptPrompt:
          type: boolean
          description: Determines if we interrupt the prompt and start recognizing.
        initialSilenceTimeoutInSeconds:
          type: integer
          description: Time to wait for first input after prompt (if any).
        targetParticipant:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value. Required."
        speechLanguage:
          type: string
          description: Speech language to be recognized, If not set default is en-US.
        speechRecognitionModelEndpointId:
          type: string
          description: Endpoint where the custom model was deployed.
        dtmfOptions:
          $ref: "#/components/schemas/DtmfOptions"
          description: Options for DTMF recognition.
        choices:
          type: array
          items:
            $ref: "#/components/schemas/Choice"
          description: Defines Ivr choices for recognize.
        speechOptions:
          $ref: "#/components/schemas/SpeechOptions"
          description: Options for continuous speech recognition.
      required:
        - targetParticipant
    DtmfOptions:
      type: object
      description: Options for DTMF recognition.
      properties:
        interToneTimeoutInSeconds:
          type: integer
          description: Time to wait between DTMF inputs to stop recognizing.
        maxTonesToCollect:
          type: integer
          description: Maximum number of DTMF tones to be collected.
        stopTones:
          type: array
          items:
            type: string
          description: List of tones that will stop recognizing.
    Choice:
      type: object
      description: Choice. All required parameters must be populated in order to send to server.
      properties:
        label:
          type: string
          description: Identifier for a given choice. Required.
        phrases:
          type: array
          items:
            type: string
          description: List of phrases to recognize. Required.
        tone:
          type: string
          description: 'List of valid stop tones. Known values are: "zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "a", "b", "c", "d", "pound", and "asterisk".'
      required:
        - label
        - phrases
    SpeechOptions:
      type: object
      description: Options for continuous speech recognition.
      properties:
        endSilenceTimeoutInMs:
          type: integer
          description: The length of end silence when user stops speaking and cogservice send response.
    SendDtmfTonesResult:
      type: object
      description: SendDtmfTonesResult.
      properties:
        operationContext:
          type: string
          description: The operation context provided by client.
    RecordingStateResponse:
      type: object
      description: RecordingStateResponse.
      properties:
        recordingId:
          type: string
          description: ":vartype recording_id: str"
        recordingState:
          type: string
          description: 'Known values are: "active" and "inactive".'
        recordingKind:
          type: string
          description: 'Known values are: "azureCommunicationServices", "teams", and "teamsCompliance".'
    CallLocator:
      type: object
      description: The locator used for joining or taking action on a call.
      properties:
        groupCallId:
          type: string
          description: The group call id.
        serverCallId:
          type: string
          description: The server call id.
        roomId:
          type: string
          description: The Acs room id. (Not supported for Start Recording).
        kind:
          type: string
          description: 'The call locator kind. Known values are: "groupCallLocator", "serverCallLocator", and "roomCallLocator".'
    ChannelAffinity:
      type: object
      description: Channel affinity for a participant. All required parameters must be populated in order to send to server.
      properties:
        channel:
          type: integer
          description: Channel number to which bitstream from a particular participant will be written.
        participant:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value. Required."
      required:
        - participant
    ExternalStorage:
      type: object
      description: ExternalStorage. All required parameters must be populated in order to send to server.
      properties:
        recordingStorageKind:
          type: string
          description: 'Defines the kind of external storage. Required. Known values are: "azureCommunicationServices" and "azureBlobStorage".'
        recordingDestinationContainerUrl:
          type: string
          description: Uri of a container or a location within a container.
      required:
        - recordingStorageKind
    CallIntelligenceOptions:
      type: object
      description: AI options for the call.
      properties:
        cognitiveServicesEndpoint:
          type: string
          description: The identifier of the Cognitive Service resource assigned to this call.
    MediaStreamingOptions:
      type: object
      description: "Options for media streaming. You probably want to use the sub-classes and not this class directly. Known sub-classes are: WebSocketMediaStreamingOptions All required parameters must be populated in order to send to server."
      properties:
        transportType:
          type: string
          description: Defines the transport type used for streaming. Note that future values may be introduced that are not currently documented. Required. "websocket"
        audioChannelType:
          type: string
          description: 'The audio channel type to stream, e.g., unmixed audio, mixed audio. Required. Known values are: "mixed" and "unmixed".'
      required:
        - transportType
        - audioChannelType
    TranscriptionOptions:
      type: object
      description: "Options for live transcription. You probably want to use the sub-classes and not this class directly. Known sub-classes are: WebSocketTranscriptionOptions All required parameters must be populated in order to send to server."
      properties:
        transportType:
          type: string
          description: Defines the transport type used for streaming. Note that future values may be introduced that are not currently documented. Required. "websocket"
        locale:
          type: string
          description: Specifies the Locale used for transcription, e.g., en-CA or en-AU. Required.
      required:
        - transportType
        - locale
  x-stackQL-resources:
    call_connection:
      id: azure.communication_call_automation.call_connection
      name: call_connection
      title: call_connection
      methods:
        get_call:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}?api-version=2026-03-12/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        hangup_call:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}?api-version=2026-03-12/delete"
          response:
            openAPIDocKey: "204"
        get_participants:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}~1participants?api-version=2026-03-12/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.value
        get_participant:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}~1participants~1{participant_raw_id}?api-version=2026-03-12/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        terminate_call:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}:terminate?api-version=2026-03-12/post"
          response:
            openAPIDocKey: "200"
        transfer_to_participant:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}:transferToParticipant?api-version=2026-03-12/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        add_participant:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}~1participants:add?api-version=2026-03-12/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        remove_participant:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}~1participants:remove?api-version=2026-03-12/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        mute:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}~1participants:mute?api-version=2026-03-12/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        cancel_add_participant:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}~1participants:cancelAddParticipant?api-version=2026-03-12/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        move_participants:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}~1participants:moveHere?api-version=2026-03-12/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/call_connection/methods/get_participant"
          - $ref: "#/components/x-stackQL-resources/call_connection/methods/get_call"
        insert: []
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/call_connection/methods/hangup_call"
    call_media:
      id: azure.communication_call_automation.call_media
      name: call_media
      title: call_media
      methods:
        play:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}:play?api-version=2026-03-12/post"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        start_transcription:
          operation:
            $ref: "#/paths/~1calling~1callConnections~1{call_connection_id}:startTranscription?api-version=2026-03-12/post"
