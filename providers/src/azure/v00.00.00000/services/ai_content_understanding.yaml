  /analyzers/{analyzer_id}:analyzeBinary?api-version=2025-11-01:
    post:
      operationId: _ContentUnderstandingClient_begin_analyze_binary
      description: Extract content and fields from input.
      parameters:
        - name: analyzer_id
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier of the analyzer. Required.
        - name: stringEncoding
          in: query
          required: true
          schema:
            type: string
          description: The string encoding format for content spans in the response. Possible values are 'codePoint', 'utf16', and `utf8`. Default is `codePoint`."). Required.
        - name: range
          in: query
          required: false
          schema:
            type: string
          description: Range of the input to analyze (ex. `1-3,5,9-`). Document content uses 1-based page numbers, while audio visual content uses integer milliseconds. Default value is None.
        - name: processingLocation
          in: query
          required: false
          schema:
