openapi: 3.0.0
servers:
  - url: https://{endpoint}/contentunderstanding
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure AI Content Understanding (Data Plane)
  description: Extract structured insights from documents, images, audio and video with multimodal analyzers.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-11-01-stackql-generated
  x-serviceAlias: ai_content_understanding
  x-sdkPackage: azure-ai-contentunderstanding
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ContentAnalyzerStatus:
      type: string
      enum:
        - creating
        - ready
        - deleting
        - failed
    ContentAnalyzerConfig:
      type: object
      description: Configuration settings for an analyzer.
      properties:
        returnDetails:
          type: boolean
          description: Return all content details.
        locales:
          type: array
          items:
            type: string
          description: List of locale hints for speech transcription.
        enableOcr:
          type: boolean
          description: Enable optical character recognition (OCR).
        enableLayout:
          type: boolean
          description: Enable layout analysis.
        enableFigureDescription:
          type: boolean
          description: Enable generation of figure description.
        enableFigureAnalysis:
          type: boolean
          description: Enable analysis of figures, such as charts and diagrams.
        enableFormula:
          type: boolean
          description: Enable mathematical formula detection.
        tableFormat:
          $ref: "#/components/schemas/TableFormat"
          description: 'Representation format of tables in analyze result markdown. Known values are: "html" and "markdown".'
        chartFormat:
          $ref: "#/components/schemas/ChartFormat"
          description: 'Representation format of charts in analyze result markdown. Known values are: "chartJs" and "markdown".'
        annotationFormat:
          $ref: "#/components/schemas/AnnotationFormat"
          description: 'Representation format of annotations in analyze result markdown. Known values are: "none" and "markdown".'
        disableFaceBlurring:
          type: boolean
          description: Disable the default blurring of faces for privacy while processing the content.
        estimateFieldSourceAndConfidence:
          type: boolean
          description: Return field grounding source and confidence.
        contentCategories:
          type: object
          properties: {}
          description: Map of categories to classify the input content(s) against.
        enableSegment:
          type: boolean
          description: Enable segmentation of the input by contentCategories.
        segmentPerPage:
          type: boolean
          description: Force segmentation of document content by page.
        omitContent:
          type: boolean
          description: Omit the content for this analyzer from analyze result. Only return content(s) from additional analyzers specified in contentCategories, if any.
    TableFormat:
      type: string
      enum:
        - html
        - markdown
    ChartFormat:
      type: string
      enum:
        - chartJs
        - markdown
    AnnotationFormat:
      type: string
      enum:
        - none
        - markdown
    ContentFieldSchema:
      type: object
      description: Schema of fields to be extracted from documents.
      properties:
        name:
          type: string
          description: The name of the field schema.
        description:
          type: string
          description: A description of the field schema.
        fields:
          type: object
          properties: {}
          description: The fields defined in the schema. Required.
        definitions:
          type: object
          properties: {}
          description: Additional definitions referenced by the fields in the schema.
      required:
        - fields
    ProcessingLocation:
      type: string
      enum:
        - geography
        - dataZone
        - global
    KnowledgeSource:
      type: object
      description: "Knowledge source. You probably want to use the sub-classes and not this class directly. Known sub-classes are: LabeledDataKnowledgeSource"
      properties:
        kind:
          type: string
          description: The kind of knowledge source. Required. "labeledData"
      required:
        - kind
    SupportedModels:
      type: object
      description: Chat completion and embedding models supported by the analyzer.
      properties:
        completion:
          type: array
          items:
            type: string
          description: Chat completion models supported by the analyzer.
        embedding:
          type: array
          items:
            type: string
          description: Embedding models supported by the analyzer.
    ContentAnalyzer:
      type: object
      description: Analyzer that extracts content and fields from multimodal documents.
      properties:
        analyzerId:
          type: string
          description: The unique identifier of the analyzer. Required.
        description:
          type: string
          description: A description of the analyzer.
        tags:
          type: object
          properties: {}
          description: Tags associated with the analyzer.
        status:
          $ref: "#/components/schemas/ContentAnalyzerStatus"
          description: 'The status of the analyzer. Required. Known values are: "creating", "ready", "deleting", and "failed".'
        createdAt:
          type: string
          format: date-time
          description: The date and time when the analyzer was created. Required.
        lastModifiedAt:
          type: string
          format: date-time
          description: The date and time when the analyzer was last modified. Required.
        warnings:
          type: array
          items:
            type: object
            properties: {}
          description: Warnings encountered while creating the analyzer.
        baseAnalyzerId:
          type: string
          description: The analyzer to incrementally train from.
        config:
          $ref: "#/components/schemas/ContentAnalyzerConfig"
          description: Analyzer configuration settings.
        fieldSchema:
          $ref: "#/components/schemas/ContentFieldSchema"
          description: The schema of fields to extracted.
        dynamicFieldSchema:
          type: boolean
          description: Indicates whether the result may contain additional fields outside of the defined schema.
        processingLocation:
          $ref: "#/components/schemas/ProcessingLocation"
          description: 'The location where the data may be processed. Defaults to global. Known values are: "geography", "dataZone", and "global".'
        knowledgeSources:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeSource"
          description: Additional knowledge sources used to enhance the analyzer.
        models:
          type: object
          properties: {}
          description: 'Mapping of model roles to specific model names. Ex. { "completion": "gpt-4.1", "embedding": "text-embedding-3-large" }.'
        supportedModels:
          $ref: "#/components/schemas/SupportedModels"
          description: Chat completion and embedding models supported by the analyzer.
    PagedContentAnalyzer:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ContentAnalyzer"
        nextLink:
          type: string
    ContentUnderstandingDefaults:
      type: object
      description: Default settings for this Content Understanding resource.
      properties:
        modelDeployments:
          type: object
          properties: {}
          description: Specify the default mapping of model names to LLM/embedding deployments in Microsoft Foundry. For details and current semantics, see `https://aka.ms/cudoc-quickstart-rest `_. Required.
      required:
        - modelDeployments
    AnalysisResult:
      type: object
      description: Analyze operation result.
      properties:
        analyzerId:
          type: string
          description: The unique identifier of the analyzer.
        apiVersion:
          type: string
          description: The version of the API used to analyze the document.
        createdAt:
          type: string
          format: date-time
          description: The date and time when the result was created.
        warnings:
          type: array
          items:
            type: object
            properties: {}
          description: Warnings encountered while analyzing the document.
        stringEncoding:
          type: string
          description: The string encoding format for content spans in the response. Possible values are 'codePoint', 'utf16', and `utf8`. Default is `codePoint`.").
        contents:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisContent"
          description: The extracted content. Required.
      required:
        - contents
    AnalysisContent:
      type: object
      description: "Media content base class. You probably want to use the sub-classes and not this class directly. Known sub-classes are: AudioVisualContent, DocumentContent"
      properties:
        kind:
          type: string
          description: 'Content kind. Required. Known values are: "document" and "audioVisual".'
        mimeType:
          type: string
          description: Detected MIME type of the content. Ex. application/pdf, image/jpeg, etc. Required.
        analyzerId:
          type: string
          description: The analyzer that generated this content.
        category:
          type: string
          description: Classified content category.
        path:
          type: string
          description: The path of the content in the input.
        markdown:
          type: string
          description: Markdown representation of the content.
        fields:
          type: object
          properties: {}
          description: Extracted fields from the content.
      required:
        - kind
        - mimeType
    CopyAuthorization:
      type: object
      description: Copy authorization details for cross-resource copy.
      properties:
        source:
          type: string
          description: Full path of the source analyzer. Required.
        targetAzureResourceId:
          type: string
          description: Azure resource ID of the target location to copy to. Required.
        expiresAt:
          type: string
          format: date-time
          description: Date/time when the copy authorization expires. Required.
      required:
        - source
        - targetAzureResourceId
        - expiresAt
