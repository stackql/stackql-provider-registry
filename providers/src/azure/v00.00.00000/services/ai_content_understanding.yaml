    put:
      operationId: _ContentUnderstandingClient_begin_create_analyzer
      description: Create a new analyzer asynchronously.
      parameters:
        - name: analyzer_id
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier of the analyzer. Required.
        - name: allowReplace
          in: query
          required: false
          schema:
            type: boolean
          description: Allow the operation to replace an existing resource. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
