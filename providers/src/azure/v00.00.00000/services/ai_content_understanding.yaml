                $ref: "#/components/schemas/PagedContentAnalyzer"
  /analyzers/{analyzer_id}?api-version=2025-11-01:
    get:
      operationId: _ContentUnderstandingClient_get_analyzer
      description: Get analyzer properties.
      parameters:
