                models:
                  type: object
                  properties: {}
                  description: 'Mapping of model roles to specific model names. Ex. { "completion": "gpt-4.1", "embedding": "text-embedding-3-large" }.'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentAnalyzer"
    delete:
      operationId: _ContentUnderstandingClient_delete_analyzer
      description: Delete analyzer.
