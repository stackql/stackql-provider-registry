      operationId: _ContentUnderstandingClient_delete_result
      description: Mark the result of an analysis operation for deletion.
      parameters:
        - name: operation_id
          in: path
          required: true
          schema:
            type: string
          description: Operation identifier. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /analyzers/{analyzer_id}:grantCopyAuthorization?api-version=2025-11-01:
    post:
      operationId: _ContentUnderstandingClient_grant_copy_authorization
      description: Get authorization for copying this analyzer to another location.
      parameters:
        - name: analyzer_id
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier of the analyzer. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyAuthorization"
