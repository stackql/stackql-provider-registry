              schema:
                $ref: "#/components/schemas/PagedCollection"
  /app/transactions?api-version=2024-12-09-preview:
    get:
      operationId: _ConfidentialLedgerClient_list_ledger_entries
      description: Gets ledger entries from a collection corresponding to a range. A collection id may optionally be specified. Only entries in the specified (or default) collection will be returned.
      parameters:
        - name: collectionId
          in: query
          required: false
          schema:
            type: string
          description: The collection id. Default value is None.
        - name: fromTransactionId
          in: query
          required: false
          schema:
            type: string
          description: Specify the first transaction ID in a range. Default value is None.
        - name: toTransactionId
          in: query
          required: false
          schema:
            type: string
          description: Specify the last transaction ID in a range. Default value is None.
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: Single tag. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedLedgerEntry"
    post:
      operationId: _ConfidentialLedgerClient_create_ledger_entry
      description: Writes a ledger entry. A collection id may optionally be specified.
      parameters:
        - name: collectionId
          in: query
          required: false
          schema:
            type: string
          description: The collection id. Default value is None.
        - name: tags
          in: query
          required: false
          schema:
            type: string
          description: Comma separated tags. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contents:
                  type: string
                  description: Contents of the ledger entry. Required.
                preHooks:
                  type: array
                  items:
                    $ref: "#/components/schemas/UserDefinedFunctionHook"
                  description: List of user defined function hooks to be executed before the ledger entry is written.
                postHooks:
                  type: array
                  items:
                    $ref: "#/components/schemas/UserDefinedFunctionHook"
                  description: List of user defined function hooks to be executed after the ledger entry is written.
              required:
                - contents
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerWriteResult"
