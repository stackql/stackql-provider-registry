openapi: 3.0.0
servers:
  - url: https://{ledger_endpoint}
    variables:
      ledger_endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `ledgerEndpoint` parameter.
info:
  title: Confidential Ledger Client
  description: Write and retrieve ledger entries against the Confidential Ledger service.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2024-12-09-preview-stackql-generated
  x-serviceAlias: confidentialledger_dataplane
  x-sdkPackage: azure-confidentialledger
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ConsortiumMember:
      type: object
      description: Describes a member of the consortium.
      properties:
        certificate:
          type: string
          description: PEM-encoded certificate associated with the member. Required.
        id:
          type: string
          description: Identifier assigned to the member. Required.
      required:
        - certificate
        - id
    PagedConsortiumMember:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/ConsortiumMember"
        nextLink:
          type: string
    Collection:
      type: object
      description: Identifier for collections.
      properties:
        collectionId:
          type: string
          description: Identifier for the collection. Required.
      required:
        - collectionId
    PagedCollection:
      type: object
      properties:
        collections:
          type: array
          items:
            $ref: "#/components/schemas/Collection"
        nextLink:
          type: string
    UserDefinedFunctionHook:
      type: object
      description: Hook for a user defined function execution.
      properties:
        functionId:
          type: string
          description: ID of the user defined function to execute. Required.
        properties:
          $ref: "#/components/schemas/UserDefinedFunctionExecutionProperties"
          description: The properties for executing a user defined function.
      required:
        - functionId
    UserDefinedFunctionExecutionProperties:
      type: object
      description: The properties for executing a user defined function.
      properties:
        arguments:
          type: array
          items:
            type: string
          description: Runtime arguments of the user defined function. Defaults to an empty list.
        exportedFunctionName:
          type: string
          description: Name of the exported function to execute in the code of the user defined function. Defaults to main.
        runtimeOptions:
          $ref: "#/components/schemas/JsRuntimeOptions"
          description: JS runtime options for user defined endpoints and functions.
    JsRuntimeOptions:
      type: object
      description: JS runtime options for user defined endpoints and functions.
      properties:
        log_exception_details:
          type: boolean
          description: Whether to log exception details in the runtime.
        max_cached_interpreters:
          type: integer
          description: Maximum number of cached interpreters.
        max_execution_time_ms:
          type: integer
          description: Maximum execution time in milliseconds.
        max_heap_bytes:
          type: integer
          description: Maximum heap size in bytes.
        max_stack_bytes:
          type: integer
          description: Maximum stack size in bytes.
        return_exception_details:
          type: boolean
          description: Whether to return exception details in the response.
    LedgerEntry:
      type: object
      description: An entry in the ledger.
      properties:
        contents:
          type: string
          description: Contents of the ledger entry. Required.
        collectionId:
          type: string
          description: The collection identifier for this ledger entry.
        transactionId:
          type: string
          description: A unique identifier for the state of the ledger. If returned as part of a LedgerEntry, it indicates the state from which the entry was read.
        preHooks:
          type: array
          items:
            $ref: "#/components/schemas/UserDefinedFunctionHook"
          description: List of user defined function hooks to be executed before the ledger entry is written.
        postHooks:
          type: array
          items:
            $ref: "#/components/schemas/UserDefinedFunctionHook"
          description: List of user defined function hooks to be executed after the ledger entry is written.
      required:
        - contents
    PagedLedgerEntry:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LedgerEntry"
        nextLink:
          type: string
    ConfidentialLedgerUserRoleName:
      type: string
      enum:
        - Administrator
        - Contributor
        - Reader
    LedgerUser:
      type: object
      description: Details about a Confidential Ledger user.
      properties:
        assignedRole:
          $ref: "#/components/schemas/ConfidentialLedgerUserRoleName"
          description: 'Represents an assignable role. Required. Known values are: "Administrator", "Contributor", and "Reader".'
        userId:
          type: string
          description: Identifier for the user. This must either be an AAD object id or a certificate fingerprint.
      required:
        - assignedRole
    PagedLedgerUser:
      type: object
      properties:
        ledgerUsers:
          type: array
          items:
            $ref: "#/components/schemas/LedgerUser"
        nextLink:
          type: string
    LedgerUserMultipleRoles:
      type: object
      description: Details about a Confidential Ledger user.
      properties:
        assignedRoles:
          type: array
          items:
            $ref: "#/components/schemas/ConfidentialLedgerUserRoleName"
          description: Represents an assignable role. Required.
        userId:
          type: string
          description: Identifier for the user. This must either be an AAD object id or a certificate fingerprint.
      required:
        - assignedRoles
    PagedLedgerUserMultipleRoles:
      type: object
      properties:
        ledgerUsers:
          type: array
          items:
            $ref: "#/components/schemas/LedgerUserMultipleRoles"
        nextLink:
          type: string
    UserDefinedFunction:
      type: object
      description: A user defined function in the ledger.
      properties:
        code:
          type: string
          description: Code of the user defined function in JavaScript. Required.
        id:
          type: string
          description: ID of the user defined function.
      required:
        - code
    PagedUserDefinedFunction:
      type: object
      properties:
        functions:
          type: array
          items:
            $ref: "#/components/schemas/UserDefinedFunction"
        nextLink:
          type: string
    Constitution:
      type: object
      description: The governance script for the application.
      properties:
        digest:
          type: string
          description: SHA256 digest of the constitution script. Required.
        script:
          type: string
          description: Contents of the constitution. Required.
      required:
        - digest
        - script
    ConfidentialLedgerEnclaves:
      type: object
      description: Information about the enclaves running the Confidential Ledger.
      properties:
        currentNodeId:
          type: string
          description: Id of the Confidential Ledger node responding to the request. Required.
        enclaveQuotes:
          type: object
          properties: {}
          description: Dictionary of enclave quotes, indexed by node id. Required.
      required:
        - currentNodeId
        - enclaveQuotes
    ConfidentialLedgerQueryState:
      type: string
      enum:
        - Loading
        - Ready
    LedgerQueryResult:
      type: object
      description: The result of querying for a ledger entry from an older transaction id. The ledger entry is available in the response only if the returned state is Ready.
      properties:
        state:
          $ref: "#/components/schemas/ConfidentialLedgerQueryState"
          description: 'State of a ledger query. Required. Known values are: "Loading" and "Ready".'
        entry:
          $ref: "#/components/schemas/LedgerEntry"
          description: The ledger entry found as a result of the query. This is only available if the query is in Ready state.
      required:
        - state
    ApplicationClaim:
      type: object
      description: A claim of a ledger application.
      properties:
        digest:
          $ref: "#/components/schemas/ClaimDigest"
          description: An application claim in digested form.
        kind:
          $ref: "#/components/schemas/ApplicationClaimKind"
          description: 'Represents the kind of an application claim. Required. Known values are: "LedgerEntry" and "ClaimDigest".'
        ledgerEntry:
          $ref: "#/components/schemas/LedgerEntryClaim"
          description: An application claim derived from ledger entry data.
      required:
        - kind
    ClaimDigest:
      type: object
      description: An application claim in digested form.
      properties:
        value:
          type: string
          description: The digest of the application claim, in hexadecimal form.
        protocol:
          $ref: "#/components/schemas/ApplicationClaimProtocol"
          description: Represents the protocol to be used to compute the digest of a claim from the given claim data. Required. "LedgerEntryV1"
      required:
        - protocol
    ApplicationClaimProtocol:
      type: string
      enum:
        - LedgerEntryV1
    ApplicationClaimKind:
      type: string
      enum:
        - LedgerEntry
        - ClaimDigest
    LedgerEntryClaim:
      type: object
      description: An application claim derived from ledger entry data.
      properties:
        collectionId:
          type: string
          description: Identifier of a collection.
        contents:
          type: string
          description: Contents of a ledger entry.
        secretKey:
          type: string
          description: Base64-encoded secret key.
        protocol:
          $ref: "#/components/schemas/ApplicationClaimProtocol"
          description: Represents the protocol to be used to compute the digest of a claim from the given claim data. Required. "LedgerEntryV1"
      required:
        - protocol
    ReceiptContents:
      type: object
      description: The contents of a receipt.
      properties:
        cert:
          type: string
          description: Certificate.
        leaf:
          type: string
          description: Leaf.
        leafComponents:
          $ref: "#/components/schemas/ReceiptLeafComponents"
          description: Leaf components of the receipt.
        nodeId:
          type: string
          description: Node identifier. Required.
        proof:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptElement"
          description: Proof. Required.
        root:
          type: string
          description: Root.
        serviceEndorsements:
          type: array
          items:
            type: string
          description: Service endorsements.
        signature:
          type: string
          description: The signature of the receipt. Required.
      required:
        - nodeId
        - proof
        - signature
    ReceiptLeafComponents:
      type: object
      description: Components that make up a receipt leaf node.
      properties:
        claimsDigest:
          type: string
          description: Claims digest.
        commitEvidence:
          type: string
          description: Commit evidence.
        writeSetDigest:
          type: string
          description: TWrite set digest.
    ReceiptElement:
      type: object
      description: Receipt element.
      properties:
        left:
          type: string
          description: Left.
        right:
          type: string
          description: Right.
    TransactionReceipt:
      type: object
      description: A receipt certifying the transaction at the specified id.
      properties:
        applicationClaims:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationClaim"
          description: List of application claims.
        receipt:
          $ref: "#/components/schemas/ReceiptContents"
          description: The receipt contents for the transaction.
        state:
          $ref: "#/components/schemas/ConfidentialLedgerQueryState"
          description: 'State of a ledger query. Required. Known values are: "Loading" and "Ready".'
        transactionId:
          type: string
          description: A unique identifier for the state of the ledger. If returned as part of a LedgerEntry, it indicates the state from which the entry was read. Required.
      required:
        - state
        - transactionId
    TransactionState:
      type: string
      enum:
        - Committed
        - Pending
    TransactionStatus:
      type: object
      description: Response returned to a query for the transaction status.
      properties:
        state:
          $ref: "#/components/schemas/TransactionState"
          description: 'Represents the state of the transaction. Required. Known values are: "Committed" and "Pending".'
        transactionId:
          type: string
          description: A unique identifier for the state of the ledger. If returned as part of a LedgerEntry, it indicates the state from which the entry was read. Required.
      required:
        - state
        - transactionId
    Metadata:
      type: object
      description: Metadata for endpoints.
      properties:
        endpoints:
          type: object
          properties: {}
          description: A map of path to method endpoints for the path. Required.
      required:
        - endpoints
    ModuleDef:
      type: object
      description: Module definition.
      properties:
        module:
          type: string
          description: Module. Required.
        name:
          type: string
          description: Name. Required.
      required:
        - module
        - name
    Bundle:
      type: object
      description: bundle for the user defined endpoints.
      properties:
        metadata:
          $ref: "#/components/schemas/Metadata"
          description: Metadata information for the bundle. Required.
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleDef"
          description: Any object. Required.
      required:
        - metadata
        - modules
    Role:
      type: object
      description: Definition for roles.
      properties:
        roleName:
          type: string
          description: name of the user defined role.
        roleActions:
          type: array
          items:
            type: string
          description: role actions.
    Roles:
      type: object
      description: Roles.
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
          description: Roles. Required.
      required:
        - roles
    LedgerWriteResult:
      type: object
      description: Returned as a result of a write to the Confidential Ledger, the transaction id in the response indicates when the write will become durable.
      properties:
        collectionId:
          type: string
          description: The collection identifier of the ledger entry. Required.
      required:
        - collectionId
    UserDefinedFunctionExecutionResponse:
      type: object
      description: The result of a user defined function execution.
      properties:
        error:
          $ref: "#/components/schemas/UserDefinedFunctionExecutionError"
          description: The error object of a user defined function execution. This is returned only when the user defined function execution throws an exception.
        result:
          $ref: "#/components/schemas/UserDefinedFunctionExecutionResult"
          description: The result object of a user defined function execution. This is returned only when the user defined function executes successfully.
        status:
          $ref: "#/components/schemas/UserDefinedFunctionExecutionStatus"
          description: 'Represents the status of a user defined function execution. Required. Known values are: "Succeeded" and "Failed".'
      required:
        - status
    UserDefinedFunctionExecutionError:
      type: object
      description: The error object of a user defined function execution. This is returned only when the user defined function execution throws an exception.
      properties:
        message:
          type: string
          description: Message indicating the error thrown when executing the function.
    UserDefinedFunctionExecutionResult:
      type: object
      description: The result object of a user defined function execution. This is returned only when the user defined function executes successfully.
      properties:
        returnValue:
          type: string
          description: String-encoded value returned by the user defined function execution. If the function does not return any value, this is set to an empty string.
    UserDefinedFunctionExecutionStatus:
      type: string
      enum:
        - Succeeded
        - Failed
