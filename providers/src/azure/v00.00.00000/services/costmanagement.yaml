      type: object
      description: Status of a benefit utilization summaries report. Provides Async Benefit Utilization Summaries Request input, status, and report sas url.
      properties:
        input:
          $ref: "#/components/schemas/BenefitUtilizationSummariesRequest"
          description: Input given to create the benefit utilization summaries report.
        status:
          $ref: "#/components/schemas/OperationStatusType"
          description: 'The status of the creation of the benefit utilization summaries report. Known values are: "Running", "Completed", and "Failed".'
        properties:
          $ref: "#/components/schemas/AsyncOperationStatusProperties"
          description: Contains sas url to the async benefit utilization summaries report and a date that the url is valid until. These values will be empty if the report is in a Running or Failed state.
    BenefitUtilizationSummariesRequest:
      type: object
      description: Properties of an async benefit utilization summaries request.
      properties:
        billingAccountId:
          type: string
          description: Billing account the benefit utilization summaries report is for. Required for billing account and billing profile scopes. Not supported for any benefit scopes.
        billingProfileId:
          type: string
          description: Billing profile id the benefit utilization summaries report is for. Required for billing profile scope. Not supported for billing account or any benefit scopes.
        benefitOrderId:
          type: string
          description: Benefit order id the benefit utilization summaries report is for. Required for benefit order and benefit id scopes. Not supported for any billing scopes.
        benefitId:
          type: string
          description: Benefit id the benefit utilization summaries report is for. Required for benefit id scope. Not supported for benefit order or any billing scopes.
        grain:
          $ref: "#/components/schemas/Grain"
          description: "The grain the summaries data is served at in the report. Accepted values are 'Daily' or 'Monthly'. Required. Known values are: \"Hourly\", \"Daily\", and \"Monthly\"."
        startDate:
          type: string
          format: date-time
          description: The start date of the summaries data that will be served in the report. Required.
        endDate:
          type: string
          format: date-time
          description: The end date of the summaries data that will be served in the report. Required.
        kind:
          $ref: "#/components/schemas/BenefitKind"
          description: 'The type of benefit data requested. Required for billing account and billing profile scopes. Implied and not to be passed at benefit scopes. Supported values are Reservation and SavingsPlan. Known values are: "IncludedQuantity", "Reservation", and "SavingsPlan".'
      required:
        - grain
        - startDate
        - endDate
    OperationStatusType:
      type: string
      enum:
        - Running
        - Completed
        - Failed
    AsyncOperationStatusProperties:
      type: object
      description: Object representing the report url and valid until date of the async report generated.
      properties:
        reportUrl:
          $ref: "#/components/schemas/BenefitUtilizationSummaryReportSchema"
          description: 'Sas url to the async benefit utilization summaries report. Will be empty if the report is in Running or Failed state. Known values are: "Kind", "AvgUtilizationPercentage", "BenefitOrderId", "BenefitId", "BenefitType", "MaxUtilizationPercentage", "MinUtilizationPercentage", "UsageDate", and "UtilizedPercentage".'
        secondaryReportUrl:
          $ref: "#/components/schemas/BenefitUtilizationSummaryReportSchema"
          description: 'Sas url to async benefit utilization summaries report in secondary storage in case of primary outage. Will be empty if the report is in Running or Failed state. Known values are: "Kind", "AvgUtilizationPercentage", "BenefitOrderId", "BenefitId", "BenefitType", "MaxUtilizationPercentage", "MinUtilizationPercentage", "UsageDate", and "UtilizedPercentage".'
        validUntil:
          type: string
          format: date-time
          description: The date that the sas url provided in reportUrl expires.
    BenefitUtilizationSummaryReportSchema:
