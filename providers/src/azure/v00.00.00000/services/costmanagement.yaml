openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Cost Management Client
  description: CostManagement management client provides access to CostManagement resources for Azure Enterprise Subscriptions.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-03-01-stackql-generated
  x-serviceAlias: costmanagement
  x-sdkPackage: azure-mgmt-costmanagement
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AlertProperties:
      type: object
      description: Alert properties.
      properties:
        definition:
          $ref: "#/components/schemas/AlertPropertiesDefinition"
          description: defines the type of alert.
        description:
          type: string
          description: Alert description.
        source:
          $ref: "#/components/schemas/AlertSource"
          description: 'Source of alert. Known values are: "Preset" and "User".'
        details:
          $ref: "#/components/schemas/AlertPropertiesDetails"
          description: Alert details.
        costEntityId:
          type: string
          description: related budget.
        status:
          $ref: "#/components/schemas/AlertStatus"
          description: 'alert status. Known values are: "None", "Active", "Overridden", "Resolved", and "Dismissed".'
        creationTime:
          type: string
          description: dateTime in which alert was created.
        closeTime:
          type: string
          description: dateTime in which alert was closed.
        modificationTime:
          type: string
          description: dateTime in which alert was last modified.
        statusModificationUserName:
          type: string
          description: User who last modified the alert.
        statusModificationTime:
          type: string
          description: dateTime in which the alert status was last modified.
    AlertPropertiesDefinition:
      type: object
      description: defines the type of alert.
      properties:
        type:
          $ref: "#/components/schemas/AlertType"
          description: 'type of alert. Known values are: "Budget", "Invoice", "Credit", "Quota", "General", "xCloud", and "BudgetForecast".'
        category:
          $ref: "#/components/schemas/AlertCategory"
          description: 'Alert category. Known values are: "Cost", "Usage", "Billing", and "System".'
        criteria:
          $ref: "#/components/schemas/AlertCriteria"
          description: 'Criteria that triggered alert. Known values are: "CostThresholdExceeded", "UsageThresholdExceeded", "CreditThresholdApproaching", "CreditThresholdReached", "QuotaThresholdApproaching", "QuotaThresholdReached", "MultiCurrency", "ForecastCostThresholdExceeded", "ForecastUsageThresholdExceeded", "InvoiceDueDateApproaching", "InvoiceDueDateReached", "CrossCloudNewDataAvailable", "CrossCloudCollectionError", and "GeneralThresholdError".'
    AlertType:
      type: string
      enum:
        - Budget
        - Invoice
        - Credit
        - Quota
        - General
        - xCloud
        - BudgetForecast
    AlertCategory:
      type: string
      enum:
        - Cost
        - Usage
        - Billing
        - System
    AlertCriteria:
      type: string
      enum:
        - CostThresholdExceeded
        - UsageThresholdExceeded
        - CreditThresholdApproaching
        - CreditThresholdReached
        - QuotaThresholdApproaching
        - QuotaThresholdReached
        - MultiCurrency
        - ForecastCostThresholdExceeded
        - ForecastUsageThresholdExceeded
        - InvoiceDueDateApproaching
        - InvoiceDueDateReached
        - CrossCloudNewDataAvailable
        - CrossCloudCollectionError
        - GeneralThresholdError
    AlertSource:
      type: string
      enum:
        - Preset
        - User
    AlertPropertiesDetails:
      type: object
      description: Alert details.
      properties:
        timeGrainType:
          $ref: "#/components/schemas/AlertTimeGrainType"
          description: 'Type of timegrain cadence. Known values are: "None", "Monthly", "Quarterly", "Annually", "BillingMonth", "BillingQuarter", and "BillingAnnual".'
        periodStartDate:
          type: string
          description: datetime of periodStartDate.
        triggeredBy:
          type: string
          description: notificationId that triggered this alert.
        resourceGroupFilter:
          type: array
          items:
            type: object
            properties: {}
          description: array of resourceGroups to filter by.
        resourceFilter:
          type: array
          items:
            type: object
            properties: {}
          description: array of resources to filter by.
        meterFilter:
          type: array
          items:
            type: object
            properties: {}
          description: array of meters to filter by.
        tagFilter:
          type: object
          properties: {}
          description: tags to filter by.
        threshold:
          type: number
          description: notification threshold percentage as a decimal which activated this alert.
        operator:
          $ref: "#/components/schemas/AlertOperator"
          description: 'operator used to compare currentSpend with amount. Known values are: "None", "EqualTo", "GreaterThan", "GreaterThanOrEqualTo", "LessThan", and "LessThanOrEqualTo".'
        amount:
          type: number
          description: budget threshold amount.
        unit:
          type: string
          description: unit of currency being used.
        currentSpend:
          type: number
          description: current spend.
        contactEmails:
          type: array
          items:
            type: string
          description: list of emails to contact.
        contactGroups:
          type: array
          items:
            type: string
          description: list of action groups to broadcast to.
        contactRoles:
          type: array
          items:
            type: string
          description: list of contact roles.
        overridingAlert:
          type: string
          description: overriding alert.
        departmentName:
          type: string
          description: department name.
        companyName:
          type: string
          description: company name.
        enrollmentNumber:
          type: string
          description: enrollment number.
        enrollmentStartDate:
          type: string
          description: datetime of enrollmentStartDate.
        enrollmentEndDate:
          type: string
          description: datetime of enrollmentEndDate.
        invoicingThreshold:
          type: number
          description: invoicing threshold.
    AlertTimeGrainType:
      type: string
      enum:
        - None
        - Monthly
        - Quarterly
        - Annually
        - BillingMonth
        - BillingQuarter
        - BillingAnnual
    AlertOperator:
      type: string
      enum:
        - None
        - EqualTo
        - GreaterThan
        - GreaterThanOrEqualTo
        - LessThan
        - LessThanOrEqualTo
    AlertStatus:
      type: string
      enum:
        - None
        - Active
        - Overridden
        - Resolved
        - Dismissed
    AlertFlattened:
      type: object
      description: Flattened view of Alert ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        eTag:
          type: string
          description: eTag of the resource. To handle concurrent update scenario, this field will be used to determine whether the user is updating the latest version or not.
        definition:
          $ref: "#/components/schemas/AlertPropertiesDefinition"
          description: defines the type of alert.
        description:
          type: string
          description: Alert description.
        source:
          $ref: "#/components/schemas/AlertSource"
          description: 'Source of alert. Known values are: "Preset" and "User".'
        details:
          $ref: "#/components/schemas/AlertPropertiesDetails"
          description: Alert details.
        costEntityId:
          type: string
          description: related budget.
        status:
          $ref: "#/components/schemas/AlertStatus"
          description: 'alert status. Known values are: "None", "Active", "Overridden", "Resolved", and "Dismissed".'
        creationTime:
          type: string
          description: dateTime in which alert was created.
        closeTime:
          type: string
          description: dateTime in which alert was closed.
        modificationTime:
          type: string
          description: dateTime in which alert was last modified.
        statusModificationUserName:
          type: string
          description: User who last modified the alert.
        statusModificationTime:
          type: string
          description: dateTime in which the alert status was last modified.
    Alert:
      type: object
      description: An individual alert.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/AlertProperties"
          description: Alert properties.
        eTag:
          type: string
          description: eTag of the resource. To handle concurrent update scenario, this field will be used to determine whether the user is updating the latest version or not.
    AlertsResult:
      type: object
      description: Result of alerts.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
          description: List of alerts.
        nextLink:
          type: string
          description: URL to get the next set of alerts results if there are any.
    BenefitKind:
      type: string
      enum:
        - IncludedQuantity
        - Reservation
        - SavingsPlan
    BenefitRecommendationProperties:
      type: object
      description: "The properties of the benefit recommendations. You probably want to use the sub-classes and not this class directly. Known sub-classes are: SharedScopeBenefitRecommendationProperties, SingleScopeBenefitRecommendationProperties"
      properties:
        firstConsumptionDate:
          type: string
          format: date-time
          description: The first usage date used for looking back for computing the recommendations.
        lastConsumptionDate:
          type: string
          format: date-time
          description: The last usage date used for looking back for computing the recommendations.
        lookBackPeriod:
          $ref: "#/components/schemas/LookBackPeriod"
          description: 'The number of days of usage evaluated for computing the recommendations. Known values are: "Last7Days", "Last30Days", and "Last60Days".'
        totalHours:
          type: integer
          description: The total hours for which the cost is covered. Its equal to number of records in a property 'properties/usage/charges'.
        usage:
          $ref: "#/components/schemas/RecommendationUsageDetails"
          description: On-demand charges between firstConsumptionDate and lastConsumptionDate that were used for computing benefit recommendations.
        armSkuName:
          type: string
          description: ARM SKU name. 'Compute_Savings_Plan' for SavingsPlan.
        term:
          $ref: "#/components/schemas/Term"
          description: 'Term period of the benefit. For example, P1Y or P3Y. Known values are: "P1Y" and "P3Y".'
        commitmentGranularity:
          $ref: "#/components/schemas/Grain"
          description: "Grain of the proposed commitment amount. Supported values: 'Hourly'. Known values are: \"Hourly\", \"Daily\", and \"Monthly\"."
        currencyCode:
          type: string
          description: An ISO 4217 currency code identifier for the costs and savings amounts.
        costWithoutBenefit:
          type: number
          description: The current cost without benefit, corresponds to 'totalHours' in the look-back period.
        recommendationDetails:
          $ref: "#/components/schemas/AllSavingsBenefitDetails"
          description: The details of the proposed recommendation.
        allRecommendationDetails:
          $ref: "#/components/schemas/AllSavingsList"
          description: The list of all benefit recommendations with the recommendation details.
        scope:
          type: string
          description: 'Benefit scope. For example, Single or Shared. Required. Known values are: "Single" and "Shared".'
      required:
        - scope
    LookBackPeriod:
      type: string
      enum:
        - Last7Days
        - Last30Days
        - Last60Days
    RecommendationUsageDetails:
      type: object
      description: On-demand charges between firstConsumptionDate and lastConsumptionDate that were used for computing benefit recommendations.
      properties:
        usageGrain:
          $ref: "#/components/schemas/Grain"
          description: "The grain of the usage. Supported values: 'Hourly'. Known values are: \"Hourly\", \"Daily\", and \"Monthly\"."
        charges:
          type: array
          items:
            type: number
          description: On-demand charges for each hour between firstConsumptionDate and lastConsumptionDate that were used for computing benefit recommendations.
    Grain:
      type: string
      enum:
        - Hourly
        - Daily
        - Monthly
    Term:
      type: string
      enum:
        - P1Y
        - P3Y
    AllSavingsBenefitDetails:
      type: object
      description: Benefit recommendation details.
      properties:
        overageCost:
          type: number
          description: The difference between total cost and benefit cost for the 'totalHours' in the look-back period.
        benefitCost:
          type: number
          description: The estimated cost with benefit for the 'totalHours' in the look-back period. It's equal to (commitmentAmount * totalHours).
        totalCost:
          type: number
          description: Total cost, which is sum of benefit cost and overage cost.
        savingsAmount:
          type: number
          description: The amount saved for the 'totalHours' in the look-back period, by purchasing the recommended quantity of the benefit.
        savingsPercentage:
          type: number
          description: The savings in percentage for the 'totalHours' in the look-back period, by purchasing the recommended quantity of benefit.
        coveragePercentage:
          type: number
          description: Estimated benefit coverage percentage for the 'totalHours' in the look-back period, with this commitment.
        commitmentAmount:
          type: number
          description: The commitment amount at the commitmentGranularity.
        averageUtilizationPercentage:
          type: number
          description: Estimated average utilization percentage for the 'totalHours' in the look-back period, with this commitment.
        wastageCost:
          type: number
          description: Estimated unused portion of the 'benefitCost'.
    AllSavingsList:
      type: object
      description: The list of all benefit recommendations with the recommendation details.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AllSavingsBenefitDetails"
          description: The list of benefit recommendations with the recommendation details..
        nextLink:
          type: string
          description: The link (URL) to the next page of results.
    BenefitRecommendationModelFlattened:
      type: object
      description: Flattened view of BenefitRecommendationModel ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        kind:
          $ref: "#/components/schemas/BenefitKind"
          description: 'Reservation or SavingsPlan. Known values are: "IncludedQuantity", "Reservation", and "SavingsPlan".'
        firstConsumptionDate:
          type: string
          format: date-time
          description: The first usage date used for looking back for computing the recommendations.
        lastConsumptionDate:
          type: string
          format: date-time
          description: The last usage date used for looking back for computing the recommendations.
        lookBackPeriod:
          $ref: "#/components/schemas/LookBackPeriod"
          description: 'The number of days of usage evaluated for computing the recommendations. Known values are: "Last7Days", "Last30Days", and "Last60Days".'
        totalHours:
          type: integer
          description: The total hours for which the cost is covered. Its equal to number of records in a property 'properties/usage/charges'.
        usage:
          $ref: "#/components/schemas/RecommendationUsageDetails"
          description: On-demand charges between firstConsumptionDate and lastConsumptionDate that were used for computing benefit recommendations.
        armSkuName:
          type: string
          description: ARM SKU name. 'Compute_Savings_Plan' for SavingsPlan.
        term:
          $ref: "#/components/schemas/Term"
          description: 'Term period of the benefit. For example, P1Y or P3Y. Known values are: "P1Y" and "P3Y".'
        commitmentGranularity:
          $ref: "#/components/schemas/Grain"
          description: "Grain of the proposed commitment amount. Supported values: 'Hourly'. Known values are: \"Hourly\", \"Daily\", and \"Monthly\"."
        currencyCode:
          type: string
          description: An ISO 4217 currency code identifier for the costs and savings amounts.
        costWithoutBenefit:
          type: number
          description: The current cost without benefit, corresponds to 'totalHours' in the look-back period.
        recommendationDetails:
          $ref: "#/components/schemas/AllSavingsBenefitDetails"
          description: The details of the proposed recommendation.
        allRecommendationDetails:
          $ref: "#/components/schemas/AllSavingsList"
          description: The list of all benefit recommendations with the recommendation details.
        scope:
          type: string
          description: 'Benefit scope. For example, Single or Shared. Required. Known values are: "Single" and "Shared".'
    PagedBenefitRecommendationModelFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BenefitRecommendationModelFlattened"
        nextLink:
          type: string
    BenefitUtilizationSummary:
      type: object
      description: "Benefit utilization summary resource. You probably want to use the sub-classes and not this class directly. Known sub-classes are: IncludedQuantityUtilizationSummary, SavingsPlanUtilizationSummary"
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        kind:
          type: string
          description: "Supported values: 'SavingsPlan'. Required. Known values are: \"IncludedQuantity\", \"Reservation\", and \"SavingsPlan\"."
      required:
        - kind
    PagedBenefitUtilizationSummary:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BenefitUtilizationSummary"
        nextLink:
          type: string
    BudgetProperties:
      type: object
      description: The properties of the budget.
      properties:
        category:
          $ref: "#/components/schemas/CategoryType"
          description: "The category of the budget. * 'Cost' defines a Budget. * 'ReservationUtilization' defines a Reservation Utilization Alert Rule. Required. Known values are: \"Cost\" and \"ReservationUtilization\"."
        amount:
          type: number
          description: "The total amount of cost to track with the budget. Supported for CategoryType(s): Cost. Required for CategoryType(s): Cost."
        timeGrain:
          $ref: "#/components/schemas/TimeGrainType"
          description: 'The time covered by a budget. Tracking of the amount will be reset based on the time grain. Supported for CategoryType(s): Cost, ReservationUtilization. Supported timeGrainTypes for **CategoryType: Cost** * Monthly * Quarterly * Annually * BillingMonth* * BillingQuarter* * BillingAnnual* *only supported for Web Direct customers. Supported timeGrainTypes for **CategoryType: ReservationUtilization** * Last7Days * Last30Days Required for CategoryType(s): Cost, ReservationUtilization. Required. Known values are: "Monthly", "Quarterly", "Annually", "BillingMonth", "BillingQuarter", "BillingAnnual", "Last7Days", and "Last30Days".'
        timePeriod:
          $ref: "#/components/schemas/BudgetTimePeriod"
          description: "The time period that defines the active period of the budget. The budget will evaluate data on or after the startDate and will expire on the endDate. Supported for CategoryType(s): Cost, ReservationUtilization. Required for CategoryType(s): Cost, ReservationUtilization. Required."
        filter:
          $ref: "#/components/schemas/BudgetFilter"
          description: "May be used to filter budgets by user-specified dimensions and/or tags. Supported for CategoryType(s): Cost, ReservationUtilization."
        currentSpend:
          $ref: "#/components/schemas/CurrentSpend"
          description: "The current amount of cost which is being tracked for a budget. Supported for CategoryType(s): Cost."
        notifications:
          type: object
          properties: {}
          description: "Dictionary of notifications associated with the budget. Supported for CategoryType(s): Cost, ReservationUtilization. * Constraints for **CategoryType: Cost** - Budget can have up to 5 notifications with thresholdType: Actual and 5 notifications with thresholdType: Forecasted. * Constraints for **CategoryType: ReservationUtilization** - Only one notification allowed. thresholdType is not applicable."
        forecastSpend:
          $ref: "#/components/schemas/ForecastSpend"
          description: "The forecasted cost which is being tracked for a budget. Supported for CategoryType(s): Cost."
      required:
        - category
        - timeGrain
        - timePeriod
    CategoryType:
      type: string
      enum:
        - Cost
        - ReservationUtilization
    TimeGrainType:
      type: string
      enum:
        - Monthly
        - Quarterly
        - Annually
        - BillingMonth
        - BillingQuarter
        - BillingAnnual
        - Last7Days
        - Last30Days
    BudgetTimePeriod:
      type: object
      description: "The time period that defines the active period of the budget. The budget will evaluate data on or after the startDate and will expire on the endDate. Supported for CategoryType(s): Cost, ReservationUtilization. Required for CategoryType(s): Cost, ReservationUtilization."
      properties:
        startDate:
          type: string
          format: date-time
          description: "The start date for the budget. * Constraints for **CategoryType: Cost** - Must be first of the month and should be less than the end date. Budget start date must be on or after June 1, 2017. Future start date should not be more than twelve months. Past start date should be selected within the timegrain period. * Constraints for **CategoryType: ReservationUtilization** - Must be on or after the current date and less than the end date. Required."
        endDate:
          type: string
          format: date-time
          description: "The end date for the budget. * Constraints for **CategoryType: Cost** - No constraints. If not provided, we default this to 10 years from the start date. * Constraints for **CategoryType: ReservationUtilization** - End date cannot be more than 3 years after the start date."
      required:
        - startDate
    BudgetFilter:
      type: object
      description: "May be used to filter budgets by user-specified dimensions and/or tags. Supported for CategoryType(s): Cost, ReservationUtilization."
      properties:
        and:
          type: array
          items:
            $ref: "#/components/schemas/BudgetFilterProperties"
          description: 'The logical "AND" expression. Must have at least 2 items. Supported for CategoryType(s): Cost.'
        dimensions:
          $ref: "#/components/schemas/BudgetComparisonExpression"
          description: "Has comparison expression for a dimension. Supported for CategoryType(s): Cost, ReservationUtilization. Supported dimension names for **CategoryType: ReservationUtilization** * ReservationId * ReservedResourceType."
        tags:
          $ref: "#/components/schemas/BudgetComparisonExpression"
          description: "Has comparison expression for a tag. Supported for CategoryType(s): Cost."
    BudgetFilterProperties:
      type: object
      description: "The Dimensions or Tags to filter a budget by. Supported for CategoryType(s): Cost, ReservationUtilization."
      properties:
        dimensions:
          $ref: "#/components/schemas/BudgetComparisonExpression"
          description: "Has comparison expression for a dimension. Supported for CategoryType(s): Cost, ReservationUtilization. Supported dimension names for **CategoryType: ReservationUtilization** * ReservationId * ReservedResourceType."
        tags:
          $ref: "#/components/schemas/BudgetComparisonExpression"
          description: "Has comparison expression for a tag. Supported for CategoryType(s): Cost."
    BudgetComparisonExpression:
      type: object
      description: The comparison expression to be used in the budgets.
      properties:
        name:
          type: string
          description: The name of the column to use in comparison. Required.
        operator:
          $ref: "#/components/schemas/BudgetOperatorType"
          description: The operator to use for comparison. Required. "In"
        values:
          type: array
          items:
            type: string
          description: Array of values to use for comparison. Required.
      required:
        - name
        - operator
        - values
    BudgetOperatorType:
      type: string
      enum:
        - In
    CurrentSpend:
      type: object
      description: "The current amount of cost which is being tracked for a budget. Supported for CategoryType(s): Cost."
      properties:
        amount:
          type: number
          description: The total amount of cost which is being tracked by the budget.
        unit:
          type: string
          description: The unit of measure for the budget amount.
    ForecastSpend:
      type: object
      description: "The forecasted cost which is being tracked for a budget. Supported for CategoryType(s): Cost."
      properties:
        amount:
          type: number
          description: The forecasted cost for the total time period which is being tracked by the budget. This value is only provided if the budget contains a forecast alert type.
        unit:
          type: string
          description: The unit of measure for the budget amount.
    BudgetFlattened:
      type: object
      description: Flattened view of Budget ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
