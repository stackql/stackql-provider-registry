          type: number
          description: "The total amount of cost to track with the budget. Supported for CategoryType(s): Cost. Required for CategoryType(s): Cost."
        timeGrain:
          $ref: "#/components/schemas/TimeGrainType"
          description: 'The time covered by a budget. Tracking of the amount will be reset based on the time grain. Supported for CategoryType(s): Cost, ReservationUtilization. Supported timeGrainTypes for **CategoryType: Cost** * Monthly * Quarterly * Annually * BillingMonth* * BillingQuarter* * BillingAnnual* *only supported for Web Direct customers. Supported timeGrainTypes for **CategoryType: ReservationUtilization** * Last7Days * Last30Days Required for CategoryType(s): Cost, ReservationUtilization. Required. Known values are: "Monthly", "Quarterly", "Annually", "BillingMonth", "BillingQuarter", "BillingAnnual", "Last7Days", and "Last30Days".'
        timePeriod:
          $ref: "#/components/schemas/BudgetTimePeriod"
          description: "The time period that defines the active period of the budget. The budget will evaluate data on or after the startDate and will expire on the endDate. Supported for CategoryType(s): Cost, ReservationUtilization. Required for CategoryType(s): Cost, ReservationUtilization. Required."
        filter:
          $ref: "#/components/schemas/BudgetFilter"
          description: "May be used to filter budgets by user-specified dimensions and/or tags. Supported for CategoryType(s): Cost, ReservationUtilization."
        currentSpend:
          $ref: "#/components/schemas/CurrentSpend"
          description: "The current amount of cost which is being tracked for a budget. Supported for CategoryType(s): Cost."
        notifications:
          type: object
          properties: {}
          description: "Dictionary of notifications associated with the budget. Supported for CategoryType(s): Cost, ReservationUtilization. * Constraints for **CategoryType: Cost** - Budget can have up to 5 notifications with thresholdType: Actual and 5 notifications with thresholdType: Forecasted. * Constraints for **CategoryType: ReservationUtilization** - Only one notification allowed. thresholdType is not applicable."
        forecastSpend:
