          $ref: "#/components/schemas/ExportDeliveryDestination"
          description: Has destination for the export being delivered. Required.
      required:
        - destination
    ExportDeliveryDestination:
      type: object
      description: This represents the blob storage account location where exports of costs will be delivered. There are two ways to configure the destination. The approach recommended for most customers is to specify the resourceId of the storage account. This requires a one-time registration of the account's subscription with the Microsoft.CostManagementExports resource provider in order to give Cost Management services access to the storage. When creating an export in the Azure portal this registration is performed automatically but API users may need to register the subscription explicitly (for more information see `https://docs.microsoft.com/en-us/azure/azure-resource-manager/resource-manager-supported-services `_ ). Another way to configure the destination is available ONLY to Partners with a Microsoft Partner Agreement plan who are global admins of their billing account. These Partners, instead of specifying the resourceId of a storage account, can specify the storage account name along with a SAS token for the account. This allows exports of costs to a storage account in any tenant. The SAS token should be created for the blob service with Service/Container/Object resource types and with Read/Write/Delete/List/Add/Create permissions (for more information see `https://docs.microsoft.com/en-us/azure/cost-management-billing/costs/export-cost-data-storage-account-sas-key `_ ).
      properties:
        type:
          $ref: "#/components/schemas/DestinationType"
          description: The export delivery destination type. Currently only 'AzureBlob' is supported. "AzureBlob"
        resourceId:
          type: string
          description: The resource id of the storage account where exports will be delivered. This is not required if a sasToken and storageAccount are specified.
        container:
          type: string
          description: The name of the container where exports will be uploaded. If the container does not exist it will be created. Required.
        rootFolderPath:
          type: string
          description: The name of the directory where exports will be uploaded.
        sasToken:
          type: string
          description: "A SAS token for the storage account. For a restricted set of Azure customers this together with storageAccount can be specified instead of resourceId. Note: the value returned by the API for this property will always be obfuscated. Returning this same obfuscated value will not result in the SAS token being updated. To update this value a new SAS token must be specified."
        storageAccount:
          type: string
          description: The storage account where exports will be uploaded. For a restricted set of Azure customers this together with sasToken can be specified instead of resourceId.
      required:
        - container
    DestinationType:
      type: string
      enum:
        - AzureBlob
    ExportDefinition:
      type: object
      description: The definition of an export.
      properties:
        type:
          $ref: "#/components/schemas/ExportType"
          description: "The type of the export. Note that 'Usage' is equivalent to 'ActualCost' and is applicable to exports that do not yet provide data for charges or amortization for service reservations. Required. Known values are: \"Usage\", \"ActualCost\", \"AmortizedCost\", \"FocusCost\", \"PriceSheet\", \"ReservationTransactions\", \"ReservationRecommendations\", and \"ReservationDetails\"."
        timeframe:
          $ref: "#/components/schemas/TimeframeType"
          description: 'The time frame for pulling data for the export. If custom, then a specific time period must be provided. Required. Known values are: "MonthToDate", "BillingMonthToDate", "TheLastMonth", "TheLastBillingMonth", "WeekToDate", "Custom", and "TheCurrentMonth".'
        timePeriod:
          $ref: "#/components/schemas/ExportTimePeriod"
          description: Has time period for pulling data for the export.
