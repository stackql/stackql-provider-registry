        downloadFileProperties:
          $ref: "#/components/schemas/MCAPriceSheetProperties"
          description: The properties in downloaded file.
    MCAPriceSheetProperties:
      type: object
      description: The properties of the price sheet.
      properties:
        billingAccountID:
          type: string
          description: Unique identifier for the billing account.
        billingAccountName:
          type: string
          description: Name of the billing profile that is set up to receive invoices. The prices in the price sheet are associated with this billing profile.
        billingProfileId:
          type: string
          description: Unique identifier for the billing profile.
        billingProfileName:
          type: string
          description: Name of the billing profile that is set up to receive invoices. The prices in the price sheet are associated with this billing profile.
        productOrderName:
          type: string
          description: Name of the purchased product plan. Indicates if this pricing is standard Azure Plan pricing, Dev/Test pricing etc. Currently unavailable for Azure 3rd party and ReservedInstance meters.
        serviceFamily:
          type: number
          description: Type of Azure service. For example, Compute, Analytics, and Security.
        product:
          type: string
          description: Name of the product accruing the charges.
        productId:
          type: string
          description: Unique identifier for the product whose meter is consumed.
        skuId:
          type: string
          description: Unique identifier of the SKU.
        unitOfMeasure:
          type: string
          description: How usage is measured for the service.
        meterId:
          type: string
          description: Unique identifier of the meter.
        meterName:
          type: string
          description: Name of the meter. The meter represents the deployable resource of an Azure service.
        meterType:
          type: string
          description: Name of the meter type.
        meterCategory:
          type: string
          description: Name of the classification category for the meter. For example, Cloud services, Networking, etc.
        meterSubCategory:
          type: string
          description: Name of the meter subclassification category.
        meterRegion:
          type: string
          description: Name of the Azure region where the meter for the service is available.
        tierMinimumUnits:
          type: string
          description: Defines the lower bound of the tier range for which prices are defined. For example, if the range is 0 to 100, tierMinimumUnits would be 0.
        effectiveStartDate:
          type: string
          format: date-time
          description: Effective start date of the Price Sheet billing period.
        effectiveEndDate:
          type: string
          format: date-time
          description: Effective end date of the Price Sheet billing period.
        unitPrice:
          type: string
          description: "The per-unit price at the time of billing for a given product or service, inclusive of any negotiated discounts on top of the market price. For PriceType ReservedInstance, unit price reflects the total cost of the 1 or 3-year commitment including discounts. Note: The unit price isn't the same as the effective price in usage details downloads when services have differential prices across tiers. If services have multi-tiered pricing, the effective price is a blended rate across the tiers and doesn't show a tier-specific unit price. The blended price or effective price is the net price for the consumed quantity spanning across the multiple tiers (where each tier has a specific unit price)."
        basePrice:
          type: string
          description: The unit price at the time the customer signs on or the unit price at the time of service meter GA launch if it is after sign-on. This is applicable for Enterprise Agreement users.
        marketPrice:
          type: string
          description: The current list price for a given product or service. This price is without any negotiations and is based on your Microsoft Agreement type. For PriceType Consumption, market price is reflected as the pay-as-you-go price. For PriceType Savings Plan, market price reflects the Savings plan benefit on top of pay-as-you-go price for the corresponding commitment term. For PriceType ReservedInstance, market price reflects the total price of the 1 or 3-year commitment.
        currency:
          type: string
          description: Currency in which all the prices are reflected.
        billingCurrency:
          type: string
          description: Currency in which charges are posted.
        term:
          type: string
          description: Term length for Azure Savings Plan or Reservation term – one year or three years (P1Y or P3Y).
        priceType:
          type: string
          description: Price type for a product. For example, an Azure resource with a pay-as-you-go rate with priceType as Consumption. Other price types include ReservedInstance and Savings Plan.
    QueryTimePeriod:
