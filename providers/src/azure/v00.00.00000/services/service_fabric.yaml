          type: string
          description: The Service Fabric runtime version of the cluster. This property can only by set the user when **upgradeMode** is set to 'Manual'. To get list of available Service Fabric versions for new clusters use `ClusterVersion API `_. To get the list of available version for existing clusters use **availableClusterVersions**.
        clusterEndpoint:
