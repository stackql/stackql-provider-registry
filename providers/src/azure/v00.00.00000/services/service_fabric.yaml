    ClusterProperties:
      type: object
      description: Describes the cluster resource properties.
      properties:
        addOnFeatures:
          type: array
          items:
            $ref: "#/components/schemas/AddOnFeatures"
          description: The list of add-on features to enable in the cluster.
        availableClusterVersions:
          type: array
          items:
            $ref: "#/components/schemas/ClusterVersionDetails"
          description: The Service Fabric runtime versions available for this cluster.
        azureActiveDirectory:
          $ref: "#/components/schemas/AzureActiveDirectory"
          description: The AAD authentication settings of the cluster.
        certificate:
          $ref: "#/components/schemas/CertificateDescription"
          description: The certificate to use for securing the cluster. The certificate provided will be used for node to node security within the cluster, SSL certificate for cluster management endpoint and default admin client.
        certificateCommonNames:
          $ref: "#/components/schemas/ServerCertificateCommonNames"
          description: Describes a list of server certificates referenced by common name that are used to secure the cluster.
        clientCertificateCommonNames:
          type: array
          items:
            $ref: "#/components/schemas/ClientCertificateCommonName"
          description: The list of client certificates referenced by common name that are allowed to manage the cluster.
        clientCertificateThumbprints:
          type: array
          items:
            $ref: "#/components/schemas/ClientCertificateThumbprint"
          description: The list of client certificates referenced by thumbprint that are allowed to manage the cluster.
        clusterCodeVersion:
          type: string
          description: The Service Fabric runtime version of the cluster. This property can only by set the user when **upgradeMode** is set to 'Manual'. To get list of available Service Fabric versions for new clusters use `ClusterVersion API `_. To get the list of available version for existing clusters use **availableClusterVersions**.
        clusterEndpoint:
          type: string
          description: The Azure Resource Provider endpoint. A system service in the cluster connects to this endpoint.
        clusterId:
          type: string
          description: A service generated unique identifier for the cluster resource.
        clusterState:
          $ref: "#/components/schemas/ClusterState"
          description: "The current state of the cluster. * WaitingForNodes - Indicates that the cluster resource is created and the resource provider is waiting for Service Fabric VM extension to boot up and report to it. * Deploying - Indicates that the Service Fabric runtime is being installed on the VMs. Cluster resource will be in this state until the cluster boots up and system services are up. * BaselineUpgrade - Indicates that the cluster is upgrading to establishes the cluster version. This upgrade is automatically initiated when the cluster boots up for the first time. * UpdatingUserConfiguration - Indicates that the cluster is being upgraded with the user provided configuration. * UpdatingUserCertificate - Indicates that the cluster is being upgraded with the user provided certificate. * UpdatingInfrastructure - Indicates that the cluster is being upgraded with the latest Service Fabric runtime version. This happens only when the **upgradeMode** is set to 'Automatic'. * EnforcingClusterVersion - Indicates that cluster is on a different version than expected and the cluster is being upgraded to the expected version. * UpgradeServiceUnreachable - Indicates that the system service in the cluster is no longer polling the Resource Provider. Clusters in this state cannot be managed by the Resource Provider. * AutoScale - Indicates that the ReliabilityLevel of the cluster is being adjusted. * Ready - Indicates that the cluster is in a stable state. Known values are: \"WaitingForNodes\", \"Deploying\", \"BaselineUpgrade\", \"UpdatingUserConfiguration\", \"UpdatingUserCertificate\", \"UpdatingInfrastructure\", \"EnforcingClusterVersion\", \"UpgradeServiceUnreachable\", \"AutoScale\", and \"Ready\"."
        diagnosticsStorageAccountConfig:
          $ref: "#/components/schemas/DiagnosticsStorageAccountConfig"
          description: The storage account information for storing Service Fabric diagnostic logs.
        eventStoreServiceEnabled:
          type: boolean
          description: Indicates if the event store service is enabled.
        fabricSettings:
          type: array
          items:
            $ref: "#/components/schemas/SettingsSectionDescription"
          description: The list of custom fabric settings to configure the cluster.
        managementEndpoint:
          type: string
          description: The http management endpoint of the cluster. Required.
        nodeTypes:
          type: array
          items:
            $ref: "#/components/schemas/NodeTypeDescription"
          description: The list of node types in the cluster. Required.
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'The provisioning state of the cluster resource. Known values are: "Updating", "Succeeded", "Failed", and "Canceled".'
        reliabilityLevel:
          $ref: "#/components/schemas/ReliabilityLevel"
          description: 'The reliability level sets the replica set size of system services. Learn about `ReliabilityLevel `_. * None - Run the System services with a target replica set count of 1. This should only be used for test clusters. * Bronze - Run the System services with a target replica set count of 3. This should only be used for test clusters. * Silver - Run the System services with a target replica set count of 5. * Gold - Run the System services with a target replica set count of 7. * Platinum - Run the System services with a target replica set count of 9. Known values are: "None", "Bronze", "Silver", "Gold", and "Platinum".'
        reverseProxyCertificate:
          $ref: "#/components/schemas/CertificateDescription"
          description: The server certificate used by reverse proxy.
        reverseProxyCertificateCommonNames:
          $ref: "#/components/schemas/ServerCertificateCommonNames"
          description: Describes a list of server certificates referenced by common name that are used to secure the cluster.
        upgradeDescription:
          $ref: "#/components/schemas/ClusterUpgradePolicy"
          description: The policy to use when upgrading the cluster.
        upgradeMode:
          $ref: "#/components/schemas/UpgradeMode"
          description: 'The upgrade mode of the cluster when new Service Fabric runtime version is available. Known values are: "Automatic" and "Manual".'
        applicationTypeVersionsCleanupPolicy:
          $ref: "#/components/schemas/ApplicationTypeVersionsCleanupPolicy"
          description: The policy used to clean up unused versions.
        vmImage:
          type: string
          description: The VM image VMSS has been configured with. Generic names such as Windows or Linux can be used.
        sfZonalUpgradeMode:
          $ref: "#/components/schemas/SfZonalUpgradeMode"
          description: "This property controls the logical grouping of VMs in upgrade domains (UDs). This property can't be modified if a node type with multiple Availability Zones is already present in the cluster. Known values are: \"Parallel\" and \"Hierarchical\"."
        vmssZonalUpgradeMode:
          $ref: "#/components/schemas/VmssZonalUpgradeMode"
          description: 'This property defines the upgrade mode for the virtual machine scale set, it is mandatory if a node type with multiple Availability Zones is added. Known values are: "Parallel" and "Hierarchical".'
        infrastructureServiceManager:
          type: boolean
          description: Indicates if infrastructure service manager is enabled.
        upgradeWave:
          $ref: "#/components/schemas/ClusterUpgradeCadence"
          description: "Indicates when new cluster runtime version upgrades will be applied after they are released. By default is Wave0. Only applies when **upgradeMode** is set to 'Automatic'. Known values are: \"Wave0\", \"Wave1\", and \"Wave2\"."
        upgradePauseStartTimestampUtc:
          type: string
          format: date-time
          description: Indicates the start date and time to pause automatic runtime version upgrades on the cluster for an specific period of time on the cluster (UTC).
        upgradePauseEndTimestampUtc:
          type: string
          format: date-time
          description: Indicates the end date and time to pause automatic runtime version upgrades on the cluster for an specific period of time on the cluster (UTC).
        waveUpgradePaused:
          type: boolean
          description: Boolean to pause automatic runtime version upgrades to the cluster.
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
          description: Indicates a list of notification channels for cluster events.
        enableHttpGatewayExclusiveAuthMode:
          type: boolean
          description: If true, token-based authentication is not allowed on the HttpGatewayEndpoint. This is required to support TLS versions 1.3 and above. If token-based authentication is used, HttpGatewayTokenAuthEndpointPort must be defined.
      required:
        - managementEndpoint
        - nodeTypes
