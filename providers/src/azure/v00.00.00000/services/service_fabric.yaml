          description: The list of custom fabric settings to configure the cluster.
        managementEndpoint:
          type: string
          description: The http management endpoint of the cluster. Required.
        nodeTypes:
          type: array
          items:
            $ref: "#/components/schemas/NodeTypeDescription"
          description: The list of node types in the cluster. Required.
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'The provisioning state of the cluster resource. Known values are: "Updating", "Succeeded", "Failed", and "Canceled".'
        reliabilityLevel:
