        value:
          type: string
          description: The parameter value of fabric setting. Required.
      required:
        - name
        - value
    NodeTypeDescription:
      type: object
      description: Describes a node type in the cluster, each node type represents sub set of nodes in the cluster.
      properties:
        name:
          type: string
          description: The name of the node type. Required.
        placementProperties:
          type: object
          properties: {}
          description: The placement tags applied to nodes in the node type, which can be used to indicate where certain services (workload) should run.
        capacities:
          type: object
          properties: {}
          description: The capacity tags applied to the nodes in the node type, the cluster resource manager uses these tags to understand how much resource a node has.
        clientConnectionEndpointPort:
          type: integer
          description: The TCP cluster management endpoint port. Required.
        httpGatewayEndpointPort:
          type: integer
          description: The HTTP cluster management endpoint port. Required.
        durabilityLevel:
          $ref: "#/components/schemas/DurabilityLevel"
          description: 'The durability level of the node type. Learn about `DurabilityLevel `_. * Bronze - No privileges. This is the default. * Silver - The infrastructure jobs can be paused for a duration of 10 minutes per UD. * Gold - The infrastructure jobs can be paused for a duration of 2 hours per UD. Gold durability can be enabled only on full node VM skus like D15_V2, G5 etc. Known values are: "Bronze", "Silver", and "Gold".'
        applicationPorts:
          $ref: "#/components/schemas/EndpointRangeDescription"
          description: The range of ports from which cluster assigned port to Service Fabric applications.
        ephemeralPorts:
          $ref: "#/components/schemas/EndpointRangeDescription"
          description: The range of ephemeral ports that nodes in this node type should be configured with.
        isPrimary:
          type: boolean
          description: The node type on which system services will run. Only one node type should be marked as primary. Primary node type cannot be deleted or changed for existing clusters. Required.
        vmInstanceCount:
          type: integer
          description: "VMInstanceCount should be 1 to n, where n indicates the number of VM instances corresponding to this nodeType. VMInstanceCount = 0 can be done only in these scenarios: NodeType is a secondary nodeType. Durability = Bronze or Durability >= Bronze and InfrastructureServiceManager = true. If VMInstanceCount = 0, implies the VMs for this nodeType will not be used for the initial cluster size computation. Required."
        reverseProxyEndpointPort:
          type: integer
          description: The endpoint used by reverse proxy.
        isStateless:
          type: boolean
          description: Indicates if the node type can only host Stateless workloads.
        multipleAvailabilityZones:
          type: boolean
          description: Indicates if the node type is enabled to support multiple zones.
        httpGatewayTokenAuthEndpointPort:
          type: integer
          description: The port used for token-auth based HTTPS connections to the cluster. Cannot be set to the same port as HttpGatewayEndpoint.
