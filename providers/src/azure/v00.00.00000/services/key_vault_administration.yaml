  /ekm?api-version=2026-01-01-preview:
    get:
      operationId: _KeyVaultClient_get_ekm_connection
      description: Gets the EKM connection. The External Key Manager (EKM) Get operation returns EKM connection. This operation requires ekm/read permission.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EkmConnection"
    patch:
      operationId: _KeyVaultClient_update_ekm_connection
      description: Updates the EKM connection. The External Key Manager (EKM) updates the existing EKM connection. If the EKM connection does not exist, this operation fails. This operation requires ekm/write permission.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                host:
                  type: string
                  description: EKM proxy FQDN (Fully Qualified Domain Name). Only allowed characters are a-z, A-Z, 0-9, hyphen (-), dot (.), and colon (:). Required.
                path_prefix:
                  type: string
                  description: Optional path prefix for the EKM proxy (if any).
                server_ca_certificates:
                  type: array
                  items:
                    type: string
                    format: byte
                  description: The root CA certificate chain that issued the proxy server's certificate. An array of certificates in the certificate chain, each in DER format and base64 encoded. Required.
                server_subject_common_name:
                  type: string
                  description: The subject common name of the server certificate of EKM Proxy.
              required:
                - host
                - server_ca_certificates
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EkmConnection"
    delete:
      operationId: _KeyVaultClient_delete_ekm_connection
      description: Deletes the EKM connection. The External Key Manager (EKM) deletes the existing EKM connection. If the EKM connection does not already exists, this operation fails. This operation requires ekm/delete permission.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
