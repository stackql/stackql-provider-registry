          format: date-time
          description: The start time of the restore operation.
        endTime:
          type: string
          format: date-time
          description: The end time of the restore operation.
    EkmProxyInfo:
      type: object
      description: EKM proxy information.
      properties:
        api_version:
          type: string
          description: The highest version of proxy interface API supported by the EKM Proxy. Required.
        proxy_vendor:
          type: string
          description: The name of the proxy vendor. Required.
        proxy_name:
          type: string
          description: The name of the proxy product and its version. Required.
        ekm_vendor:
          type: string
          description: The name of the EKM vendor. Required.
        ekm_product:
          type: string
          description: The name of the EKM product and its version. Required.
