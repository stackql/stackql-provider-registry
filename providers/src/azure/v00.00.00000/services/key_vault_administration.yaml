openapi: 3.0.0
servers:
  - url: https://{vault_base_url}
    variables:
      vault_base_url:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `vaultBaseUrl` parameter.
info:
  title: Azure Key Vault - Administration (Data Plane)
  description: Managed HSM RBAC, full backup/restore and security domain administration.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-01-01-preview-stackql-generated
  x-serviceAlias: key_vault_administration
  x-sdkPackage: azure-keyvault-administration
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    RoleAssignmentPropertiesWithScope:
      type: object
      description: Role assignment properties with scope.
      properties:
        scope:
          $ref: "#/components/schemas/RoleScope"
          description: 'The role scope. Known values are: "/" and "/keys".'
        roleDefinitionId:
          type: string
          description: The role definition ID.
        principalId:
          type: string
          description: The principal ID.
    RoleScope:
      type: string
      enum:
        - /
        - /keys
    RoleAssignmentFlattened:
      type: object
      description: Flattened view of RoleAssignment ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: The role assignment ID.
        name:
          type: string
          description: The role assignment name.
        type:
          type: string
          description: The role assignment type.
        scope:
          $ref: "#/components/schemas/RoleScope"
          description: 'The role scope. Known values are: "/" and "/keys".'
        roleDefinitionId:
          type: string
          description: The role definition ID.
        principalId:
          type: string
          description: The principal ID.
    PagedRoleAssignmentFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/RoleAssignmentFlattened"
        nextLink:
          type: string
    RoleAssignment:
      type: object
      description: Role Assignments.
      properties:
        id:
          type: string
          description: The role assignment ID.
        name:
          type: string
          description: The role assignment name.
        type:
          type: string
          description: The role assignment type.
        properties:
          $ref: "#/components/schemas/RoleAssignmentPropertiesWithScope"
          description: Role assignment properties.
    RoleAssignmentProperties:
      type: object
      description: Role assignment properties.
      properties:
        roleDefinitionId:
          type: string
          description: The role definition ID used in the role assignment. Required.
        principalId:
          type: string
          description: The principal ID assigned to the role. This maps to the ID inside the Active Directory. It can point to a user, service principal, or security group. Required.
      required:
        - roleDefinitionId
        - principalId
    RoleDefinitionType:
      type: string
      enum:
        - Microsoft.Authorization/roleDefinitions
    RoleDefinitionProperties:
      type: object
      description: Role definition properties.
      properties:
        roleName:
          type: string
          description: The role name.
        description:
          type: string
          description: The role definition description.
        type:
          $ref: "#/components/schemas/RoleType"
          description: 'The role type. Known values are: "AKVBuiltInRole" and "CustomRole".'
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
          description: Role definition permissions.
        assignableScopes:
          type: array
          items:
            $ref: "#/components/schemas/RoleScope"
          description: Role definition assignable scopes.
    RoleType:
      type: string
      enum:
        - AKVBuiltInRole
        - CustomRole
    Permission:
      type: object
      description: Role definition permissions.
      properties:
        actions:
          type: array
          items:
            type: string
          description: Action permissions that are granted.
        notActions:
          type: array
          items:
            type: string
          description: Action permissions that are excluded but not denied. They may be granted by other role definitions assigned to a principal.
        dataActions:
          type: array
          items:
            $ref: "#/components/schemas/DataAction"
          description: Data action permissions that are granted.
        notDataActions:
          type: array
          items:
            $ref: "#/components/schemas/DataAction"
          description: Data action permissions that are excluded but not denied. They may be granted by other role definitions assigned to a principal.
    DataAction:
      type: string
