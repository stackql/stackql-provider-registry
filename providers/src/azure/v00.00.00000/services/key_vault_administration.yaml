          $ref: "#/components/schemas/RoleDefinitionProperties"
          description: Role definition properties.
    SettingTypeEnum:
      type: string
      enum:
        - boolean
    Setting:
      type: object
      description: A Key Vault account setting.
      properties:
        name:
          type: string
          description: The account setting to be updated. Required.
        value:
          type: string
          description: The value of the pool setting. Required.
        type:
          $ref: "#/components/schemas/SettingTypeEnum"
          description: The type specifier of the value. "boolean"
      required:
        - name
        - value
    SettingsListResult:
      type: object
      description: The settings list result.
      properties:
        settings:
          type: array
          items:
            $ref: "#/components/schemas/Setting"
          description: A response message containing a list of account settings with their associated value.
    EkmConnection:
      type: object
      description: A EkmConnection model object.
      properties:
        host:
          type: string
          description: EKM proxy FQDN (Fully Qualified Domain Name). Only allowed characters are a-z, A-Z, 0-9, hyphen (-), dot (.), and colon (:). Required.
        path_prefix:
          type: string
          description: Optional path prefix for the EKM proxy (if any).
        server_ca_certificates:
          type: array
          items:
            type: string
            format: byte
          description: The root CA certificate chain that issued the proxy server's certificate. An array of certificates in the certificate chain, each in DER format and base64 encoded. Required.
        server_subject_common_name:
          type: string
          description: The subject common name of the server certificate of EKM Proxy.
      required:
        - host
        - server_ca_certificates
    EkmProxyClientCertificateInfo:
      type: object
      description: EKM proxy client certificate information.
      properties:
        ca_certificates:
          type: array
          items:
            type: string
            format: byte
          description: The client root CA certificate chain to authenticate to the EKM proxy. An array of certificates in the certificate chain, each in DER format and base64 encoded. Required.
        subject_common_name:
          type: string
          description: The subject common name of the client certificate used to authenticate to the EKM proxy. Required.
