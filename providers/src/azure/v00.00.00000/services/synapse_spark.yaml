          type: string
          format: date-time
        runningAt:
          type: string
          format: date-time
        deadAt:
          type: string
          format: date-time
        successAt:
          type: string
          format: date-time
        killedAt:
          type: string
          format: date-time
        recoveringAt:
          type: string
          format: date-time
        currentState:
          type: string
        jobCreationRequest:
          $ref: "#/components/schemas/SparkRequest"
    SparkRequest:
      type: object
      description: SparkRequest.
      properties:
        name:
          type: string
        file:
          type: string
        className:
          type: string
        args:
          type: array
          items:
            type: string
        jars:
          type: array
          items:
            type: string
        pyFiles:
          type: array
          items:
            type: string
        files:
          type: array
          items:
            type: string
        archives:
          type: array
          items:
            type: string
        conf:
          type: object
          properties: {}
        driverMemory:
          type: string
        driverCores:
          type: integer
        executorMemory:
          type: string
        executorCores:
          type: integer
        numExecutors:
          type: integer
