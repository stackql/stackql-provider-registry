paths:
  /livyApi/versions/{livy_api_version}/sparkPools/{spark_pool_name}/batches:
    get:
      operationId: SparkBatch_get_spark_batch_jobs
      description: List all spark batch jobs which are running under a particular spark pool.
      parameters:
        - name: livy_api_version
          in: path
          required: true
          schema:
            type: string
        - name: spark_pool_name
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: integer
          description: Optional param specifying which index the list should begin from.
        - name: size
          in: query
          required: false
          schema:
            type: integer
          description: Optional param specifying the size of the returned list. By default it is 20 and that is the maximum.
        - name: detailed
          in: query
          required: false
          schema:
            type: boolean
          description: Optional query param specifying whether detailed response is returned beyond plain livy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SparkBatchJobCollection"
    post:
      operationId: SparkBatch_create_spark_batch_job
      description: Create new spark batch job.
      parameters:
        - name: livy_api_version
          in: path
          required: true
          schema:
            type: string
        - name: spark_pool_name
          in: path
          required: true
          schema:
            type: string
        - name: detailed
          in: query
          required: false
          schema:
            type: boolean
          description: Optional query param specifying whether detailed response is returned beyond plain livy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: object
                  properties: {}
                artifactId:
                  type: string
                name:
                  type: string
                file:
                  type: string
                className:
                  type: string
                args:
                  type: array
                  items:
                    type: string
                jars:
                  type: array
                  items:
                    type: string
                pyFiles:
                  type: array
                  items:
                    type: string
                files:
                  type: array
                  items:
                    type: string
                archives:
                  type: array
                  items:
                    type: string
                conf:
                  type: object
                  properties: {}
                driverMemory:
                  type: string
                driverCores:
                  type: integer
                executorMemory:
                  type: string
                executorCores:
                  type: integer
                numExecutors:
                  type: integer
