          $ref: "#/components/schemas/ServiceLevel"
          description: 'The service level of the file system. Known values are: "Standard", "Premium", "Ultra", "StandardZRS", and "Flexible".'
        usageThreshold:
          type: integer
          description: Maximum storage quota allowed for a file system in bytes. This is a soft quota used for alerting only. For regular volumes, valid values are in the range 50GiB to 100TiB. For large volumes, valid values are in the range 100TiB to 500TiB, and on an exceptional basis, from to 2400GiB to 2400TiB. For extra large volumes, valid values are in the range 2400GiB to 7200TiB. Values expressed in bytes as multiples of 1 GiB.
