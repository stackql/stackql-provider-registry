          type: string
          description: Unique FileSystem Identifier.
        creationToken:
          type: string
          description: A unique file path for the volume. Used when creating mount targets. Required.
        serviceLevel:
          $ref: "#/components/schemas/ServiceLevel"
          description: 'The service level of the file system. Known values are: "Standard", "Premium", "Ultra", "StandardZRS", and "Flexible".'
        usageThreshold:
          type: integer
          description: Maximum storage quota allowed for a file system in bytes. This is a soft quota used for alerting only. For regular volumes, valid values are in the range 50GiB to 100TiB. For large volumes, valid values are in the range 100TiB to 500TiB, and on an exceptional basis, from to 2400GiB to 2400TiB. For extra large volumes, valid values are in the range 2400GiB to 7200TiB. Values expressed in bytes as multiples of 1 GiB. Required.
        exportPolicy:
          $ref: "#/components/schemas/VolumePropertiesExportPolicy"
          description: Set of export policy rules.
        protocolTypes:
          type: array
          items:
            type: string
          description: Set of protocol types, default NFSv3, CIFS for SMB protocol.
        provisioningState:
          type: string
          description: Azure lifecycle management.
        snapshotId:
          type: string
          description: Resource identifier used to identify the Snapshot.
        deleteBaseSnapshot:
          type: boolean
          description: If enabled (true) the snapshot the volume was created from will be automatically deleted after the volume create operation has finished. Defaults to false.
        backupId:
          type: string
          description: Resource identifier used to identify the Backup.
        baremetalTenantId:
          type: string
          description: Unique Baremetal Tenant Identifier.
        subnetId:
          type: string
          description: The Azure Resource URI for a delegated subnet. Must have the delegation Microsoft.NetApp/volumes. Required.
        networkFeatures:
          $ref: "#/components/schemas/NetworkFeatures"
          description: 'The original value of the network features type available to the volume at the time it was created. Known values are: "Basic", "Standard", "Basic_Standard", and "Standard_Basic".'
        effectiveNetworkFeatures:
          $ref: "#/components/schemas/NetworkFeatures"
          description: 'The effective value of the network features type available to the volume, or current effective state of update. Known values are: "Basic", "Standard", "Basic_Standard", and "Standard_Basic".'
        networkSiblingSetId:
          type: string
          description: Network Sibling Set ID for the the group of volumes sharing networking resources.
        storageToNetworkProximity:
          $ref: "#/components/schemas/VolumeStorageToNetworkProximity"
          description: 'Provides storage to network proximity information for the volume. Known values are: "Default", "T1", "T2", and "AcrossT2".'
        mountTargets:
          type: array
          items:
            $ref: "#/components/schemas/MountTargetProperties"
          description: List of mount targets.
        volumeType:
          type: string
          description: What type of volume is this. For destination volumes in Cross Region Replication, set type to DataProtection. For creating clone volume, set type to ShortTermClone.
        dataProtection:
          $ref: "#/components/schemas/VolumePropertiesDataProtection"
          description: DataProtection type volumes include an object containing details of the replication.
        acceptGrowCapacityPoolForShortTermCloneSplit:
          $ref: "#/components/schemas/AcceptGrowCapacityPoolForShortTermCloneSplit"
          description: 'While auto splitting the short term clone volume, if the parent pool does not have enough space to accommodate the volume after split, it will be automatically resized, which will lead to increased billing. To accept capacity pool size auto grow and create a short term clone volume, set the property as accepted. Known values are: "Accepted" and "Declined".'
        isRestoring:
          type: boolean
          description: Restoring.
        snapshotDirectoryVisible:
          type: boolean
          description: If enabled (true) the volume will contain a read-only snapshot directory which provides access to each of the volume's snapshots (defaults to true).
        kerberosEnabled:
          type: boolean
          description: Describe if a volume is KerberosEnabled. To be use with swagger version 2020-05-01 or later.
        securityStyle:
          $ref: "#/components/schemas/SecurityStyle"
          description: 'The security style of volume, default unix, defaults to ntfs for dual protocol or CIFS protocol. Known values are: "ntfs" and "unix".'
        smbEncryption:
          type: boolean
          description: Enables encryption for in-flight smb3 data. Only applicable for SMB/DualProtocol volume. To be used with swagger version 2020-08-01 or later.
        smbAccessBasedEnumeration:
          $ref: "#/components/schemas/SmbAccessBasedEnumeration"
          description: 'Enables access-based enumeration share property for SMB Shares. Only applicable for SMB/DualProtocol volume. Known values are: "Disabled" and "Enabled".'
        smbNonBrowsable:
          $ref: "#/components/schemas/SmbNonBrowsable"
          description: 'Enables non-browsable property for SMB Shares. Only applicable for SMB/DualProtocol volume. Known values are: "Disabled" and "Enabled".'
        smbContinuouslyAvailable:
          type: boolean
          description: Enables continuously available share property for smb volume. Only applicable for SMB volume.
        throughputMibps:
          type: number
          description: Maximum throughput in MiB/s that can be achieved by this volume and this will be accepted as input only for manual qosType volume.
        actualThroughputMibps:
          type: number
          description: Actual throughput in MiB/s for auto qosType volumes calculated based on size and serviceLevel.
        encryptionKeySource:
          $ref: "#/components/schemas/EncryptionKeySource"
          description: "Source of key used to encrypt data in volume. Applicable if NetApp account has encryption.keySource = 'Microsoft.KeyVault'. Possible values (case-insensitive) are: 'Microsoft.NetApp, Microsoft.KeyVault'. Known values are: \"Microsoft.NetApp\" and \"Microsoft.KeyVault\"."
        keyVaultPrivateEndpointResourceId:
          type: string
          description: The resource ID of private endpoint for KeyVault. It must reside in the same VNET as the volume. Only applicable if encryptionKeySource = 'Microsoft.KeyVault'.
        ldapEnabled:
          type: boolean
          description: Specifies whether LDAP is enabled or not for a given NFS volume.
        ldapServerType:
          $ref: "#/components/schemas/LdapServerType"
          description: 'Specifies the type of LDAP server for a given NFS volume. Known values are: "ActiveDirectory" and "OpenLDAP".'
        coolAccess:
          type: boolean
          description: Specifies whether Cool Access(tiering) is enabled for the volume.
        coolnessPeriod:
          type: integer
          description: Specifies the number of days after which data that is not accessed by clients will be tiered.
        coolAccessRetrievalPolicy:
          $ref: "#/components/schemas/CoolAccessRetrievalPolicy"
          description: 'coolAccessRetrievalPolicy determines the data retrieval behavior from the cool tier to standard storage based on the read pattern for cool access enabled volumes. The possible values for this field are: Default - Data will be pulled from cool tier to standard storage on random reads. This policy is the default. OnRead - All client-driven data read is pulled from cool tier to standard storage on both sequential and random reads. Never - No client-driven data is pulled from cool tier to standard storage. Known values are: "Default", "OnRead", and "Never".'
        coolAccessTieringPolicy:
          $ref: "#/components/schemas/CoolAccessTieringPolicy"
          description: 'coolAccessTieringPolicy determines which cold data blocks are moved to cool tier. The possible values for this field are: Auto - Moves cold user data blocks in both the Snapshot copies and the active file system to the cool tier tier. This policy is the default. SnapshotOnly - Moves user data blocks of the Volume Snapshot copies that are not associated with the active file system to the cool tier. Known values are: "Auto" and "SnapshotOnly".'
        unixPermissions:
          type: string
          description: "UNIX permissions for NFS volume accepted in octal 4 digit format. First digit selects the set user ID(4), set group ID (2) and sticky (1) attributes. Second digit selects permission for the owner of the file: read (4), write (2) and execute (1). Third selects permissions for other users in the same group. the fourth for other users not in the group. 0755 - gives read/write/execute permissions to owner and read/execute to group and other users."
        cloneProgress:
          type: integer
          description: When a volume is being restored from another volume's snapshot, will show the percentage completion of this cloning process. When this value is empty/null there is no cloning process currently happening on this volume. This value will update every 5 minutes during cloning.
        fileAccessLogs:
          $ref: "#/components/schemas/FileAccessLogs"
          description: 'Flag indicating whether file access logs are enabled for the volume, based on active diagnostic settings present on the volume. Known values are: "Enabled" and "Disabled".'
        avsDataStore:
          $ref: "#/components/schemas/AvsDataStore"
          description: 'Specifies whether the volume is enabled for Azure VMware Solution (AVS) datastore purpose. Known values are: "Enabled" and "Disabled".'
        dataStoreResourceId:
          type: array
          items:
            type: string
          description: Data store resource unique identifier.
        isDefaultQuotaEnabled:
          type: boolean
          description: Specifies if default quota is enabled for the volume.
        defaultUserQuotaInKiBs:
          type: integer
          description: Default user quota for volume in KiBs. If isDefaultQuotaEnabled is set, the minimum value of 4 KiBs applies .
        defaultGroupQuotaInKiBs:
          type: integer
          description: Default group quota for volume in KiBs. If isDefaultQuotaEnabled is set, the minimum value of 4 KiBs applies.
        maximumNumberOfFiles:
          type: integer
          description: Maximum number of files allowed. Needs a service request in order to be changed. Only allowed to be changed if volume quota is more than 4TiB.
        volumeGroupName:
          type: string
          description: Volume Group Name.
        capacityPoolResourceId:
          type: string
          description: Pool Resource Id used in case of creating a volume through volume group.
        proximityPlacementGroup:
          type: string
          description: Proximity placement group associated with the volume.
        t2Network:
          type: string
          description: T2 network information.
        volumeSpecName:
          type: string
          description: Volume spec name is the application specific designation or identifier for the particular volume in a volume group for e.g. data, log.
        encrypted:
          type: boolean
          description: Specifies if the volume is encrypted or not. Only available on volumes created or updated after 2022-01-01.
        placementRules:
          type: array
          items:
            $ref: "#/components/schemas/PlacementKeyValuePairs"
          description: Application specific placement rules for the particular volume.
        enableSubvolumes:
          $ref: "#/components/schemas/EnableSubvolumes"
          description: 'Flag indicating whether subvolume operations are enabled on the volume. Known values are: "Enabled" and "Disabled".'
        provisionedAvailabilityZone:
          type: string
          description: The availability zone where the volume is provisioned. This refers to the logical availability zone where the volume resides.
        isLargeVolume:
          type: boolean
          description: Specifies whether volume is a Large Volume or Regular Volume.
        largeVolumeType:
          $ref: "#/components/schemas/LargeVolumeType"
          description: "Specifies the type of the Large Volume. When set to 'LargeVolume', the large volume is created with standard configuration. If it is set to 'ExtraLargeVolume7Dot2PiB', the extra large volume is created with higher capacity limit 7.2PiB with cool access enabled, delivering higher capacity limit with lower costs. Known values are: \"LargeVolume\" and \"PremExtraLargeVolume7Dot2PiB\"."
        originatingResourceId:
          type: string
          description: Id of the snapshot or backup that the volume is restored from.
        inheritedSizeInBytes:
          type: integer
          description: Space shared by short term clone volume with parent volume in bytes.
        language:
          $ref: "#/components/schemas/VolumeLanguage"
          description: 'Language supported for volume. Known values are: "c.utf-8", "utf8mb4", "ar", "ar.utf-8", "hr", "hr.utf-8", "cs", "cs.utf-8", "da", "da.utf-8", "nl", "nl.utf-8", "en", "en.utf-8", "fi", "fi.utf-8", "fr", "fr.utf-8", "de", "de.utf-8", "he", "he.utf-8", "hu", "hu.utf-8", "it", "it.utf-8", "ja", "ja.utf-8", "ja-v1", "ja-v1.utf-8", "ja-jp.pck", "ja-jp.pck.utf-8", "ja-jp.932", "ja-jp.932.utf-8", "ja-jp.pck-v2", "ja-jp.pck-v2.utf-8", "ko", "ko.utf-8", "no", "no.utf-8", "pl", "pl.utf-8", "pt", "pt.utf-8", "c", "ro", "ro.utf-8", "ru", "ru.utf-8", "zh", "zh.utf-8", "zh.gbk", "zh.gbk.utf-8", "zh-tw.big5", "zh-tw.big5.utf-8", "zh-tw", "zh-tw.utf-8", "sk", "sk.utf-8", "sl", "sl.utf-8", "es", "es.utf-8", "sv", "sv.utf-8", "tr", "tr.utf-8", "en-us", and "en-us.utf-8".'
