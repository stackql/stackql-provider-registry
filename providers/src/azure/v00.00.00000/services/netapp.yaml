openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure NetApp Files
  description: "Enterprise file storage: NetApp accounts, capacity pools, volumes, snapshots and replication."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-04-15-preview-stackql-generated
  x-serviceAlias: netapp
  x-sdkPackage: azure-mgmt-netapp
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AccountProperties:
      type: object
      description: NetApp account properties.
      properties:
        provisioningState:
          type: string
          description: Azure lifecycle management.
        activeDirectories:
          type: array
          items:
            $ref: "#/components/schemas/ActiveDirectory"
          description: Active Directories.
        entraIdConfig:
          $ref: "#/components/schemas/EntraIdConfig"
          description: Entra ID configuration for the account.
        encryption:
          $ref: "#/components/schemas/AccountEncryption"
          description: Encryption settings.
        disableShowmount:
          type: boolean
          description: Shows the status of disableShowmount for all volumes under the subscription, null equals false.
        nfsV4IDDomain:
          type: string
          description: Domain for NFSv4 user ID mapping. This property will be set for all NetApp accounts in the subscription and region and only affect non ldap NFSv4 volumes.
        multiAdStatus:
          $ref: "#/components/schemas/MultiAdStatus"
          description: 'MultiAD Status for the account. Known values are: "Disabled" and "Enabled".'
        ldapConfiguration:
          $ref: "#/components/schemas/LdapConfiguration"
          description: LDAP Configuration for the account.
    ActiveDirectory:
      type: object
      description: Active Directory.
      properties:
        activeDirectoryId:
          type: string
          description: Id of the Active Directory.
        username:
          type: string
          description: A domain user account with permission to create machine accounts.
        password:
          type: string
          description: Plain text password of Active Directory domain administrator, value is masked in the response.
        domain:
          type: string
          description: Name of the Active Directory domain.
        dns:
          type: string
          description: Comma separated list of DNS server IP addresses (IPv4 only) for the Active Directory domain.
        status:
          $ref: "#/components/schemas/ActiveDirectoryStatus"
          description: 'Status of the Active Directory. Known values are: "Created", "InUse", "Deleted", "Error", and "Updating".'
        statusDetails:
          type: string
          description: Any details in regards to the Status of the Active Directory.
        smbServerName:
          type: string
          description: NetBIOS name of the SMB server. This name will be registered as a computer account in the AD and used to mount volumes.
        organizationalUnit:
          type: string
          description: The Organizational Unit (OU) within the Windows Active Directory.
        site:
          type: string
          description: The Active Directory site the service will limit Domain Controller discovery to.
        backupOperators:
          type: array
          items:
            type: string
          description: Users to be added to the Built-in Backup Operator active directory group. A list of unique usernames without domain specifier.
        administrators:
          type: array
          items:
            type: string
          description: Users to be added to the Built-in Administrators active directory group. A list of unique usernames without domain specifier.
        kdcIP:
          type: string
          description: kdc server IP address for the active directory machine. This optional parameter is used only while creating kerberos volume.
        adName:
          type: string
          description: Name of the active directory machine. This optional parameter is used only while creating kerberos volume.
        serverRootCACertificate:
          type: string
          description: When LDAP over SSL/TLS is enabled, the LDAP client is required to have base64 encoded Active Directory Certificate Service's self-signed root CA certificate, this optional parameter is used only for dual protocol with LDAP user-mapping volumes.
        aesEncryption:
          type: boolean
          description: If enabled, AES encryption will be enabled for SMB communication.
        ldapSigning:
          type: boolean
          description: Specifies whether or not the LDAP traffic needs to be signed.
        securityOperators:
          type: array
          items:
            type: string
          description: Domain Users in the Active directory to be given SeSecurityPrivilege privilege (Needed for SMB Continuously available shares for SQL). A list of unique usernames without domain specifier.
        ldapOverTLS:
          type: boolean
          description: Specifies whether or not the LDAP traffic needs to be secured via TLS.
        allowLocalNfsUsersWithLdap:
          type: boolean
          description: If enabled, NFS client local users can also (in addition to LDAP users) access the NFS volumes.
        encryptDCConnections:
          type: boolean
          description: If enabled, Traffic between the SMB server to Domain Controller (DC) will be encrypted.
        ldapSearchScope:
          $ref: "#/components/schemas/LdapSearchScopeOpt"
          description: LDAP Search scope options.
        preferredServersForLdapClient:
          type: string
          description: Comma separated list of IPv4 addresses of preferred servers for LDAP client. At most two comma separated IPv4 addresses can be passed.
    ActiveDirectoryStatus:
      type: string
      enum:
        - Created
        - InUse
        - Deleted
        - Error
        - Updating
    LdapSearchScopeOpt:
      type: object
      description: LDAP search scope.
      properties:
        userDN:
          type: string
          description: This specifies the user DN, which overrides the base DN for user lookups.
        groupDN:
          type: string
          description: This specifies the group DN, which overrides the base DN for group lookups.
        groupMembershipFilter:
          type: string
          description: This specifies the custom LDAP search filter to be used when looking up group membership from LDAP server.
    EntraIdConfig:
      type: object
      description: Entra ID configuration for the account.
      properties:
        applicationId:
          type: string
          description: ApplicationId of the app created by customer to provide authentication and required API permissions for Microsoft Graph endpoint. Required.
        domain:
          type: string
          description: Domain of the Active directory synced to Entra ID for hybrid identities. Required.
        serverNamePrefix:
          type: string
          description: Using ServerNamePrefix, FQDN (Fully Qualified Domain Name) will be generated for SMB share, using this FQDN, SMB Share will be mounted on Entra Joined VM. Required.
        entraIdAkvConfig:
          $ref: "#/components/schemas/EntraIdAkvConfig"
          description: Using AKV config, certificate will be fetched, which will contain private key & public certificate, that correspond to the public certificate which is uploaded on the application created by customer. This will be used further for authentication.
      required:
        - applicationId
        - domain
        - serverNamePrefix
    EntraIdAkvConfig:
      type: object
      description: Using AKV config, certificate will be fetched, which will contain private key & public certificate, that correspond to the public certificate which is uploaded on the application created by customer. This will be used further for authentication.
      properties:
        azureKeyVaultUri:
          type: string
          description: The Azure Key Vault URI where the Entra ID credentials are stored. Required.
        certificateName:
          type: string
          description: The name of the certificate in Azure Key Vault. Required.
        userAssignedIdentity:
          type: string
          description: The ARM resource identifier of the user assigned identity used to authenticate with key vault.
      required:
        - azureKeyVaultUri
        - certificateName
    AccountEncryption:
      type: object
      description: Encryption settings.
      properties:
        keySource:
          $ref: "#/components/schemas/KeySource"
          description: 'The encryption keySource (provider). Possible values (case-insensitive): Microsoft.NetApp, Microsoft.KeyVault. Known values are: "Microsoft.NetApp" and "Microsoft.KeyVault".'
        keyVaultProperties:
          $ref: "#/components/schemas/KeyVaultProperties"
          description: Properties provided by KeVault. Applicable if keySource is 'Microsoft.KeyVault'.
        identity:
          $ref: "#/components/schemas/EncryptionIdentity"
          description: Identity used to authenticate to KeyVault. Applicable if keySource is 'Microsoft.KeyVault'.
    KeySource:
      type: string
      enum:
        - Microsoft.NetApp
        - Microsoft.KeyVault
    KeyVaultProperties:
      type: object
      description: Properties of key vault.
      properties:
        keyVaultId:
          type: string
          description: UUID v4 used to identify the Azure Key Vault configuration.
        keyVaultUri:
          type: string
          description: The Uri of KeyVault. Required.
        keyName:
          type: string
          description: The name of KeyVault key. Required.
        keyVaultResourceId:
          type: string
          description: The resource ID of KeyVault.
        status:
          $ref: "#/components/schemas/KeyVaultStatus"
          description: 'Status of the KeyVault connection. Known values are: "Created", "InUse", "Deleted", "Error", and "Updating".'
      required:
        - keyVaultUri
        - keyName
    KeyVaultStatus:
      type: string
      enum:
        - Created
        - InUse
        - Deleted
        - Error
        - Updating
    EncryptionIdentity:
      type: object
      description: Identity used to authenticate with key vault.
      properties:
        principalId:
          type: string
          description: The principal ID (object ID) of the identity used to authenticate with key vault. Read-only.
        userAssignedIdentity:
          type: string
          description: The ARM resource identifier of the user assigned identity used to authenticate with key vault. Applicable if identity.type has 'UserAssigned'. It should match key of identity.userAssignedIdentities.
        federatedClientId:
          type: string
          description: ClientId of the multi-tenant Entra ID Application. Used to access cross-tenant keyvaults.
    MultiAdStatus:
      type: string
      enum:
        - Disabled
        - Enabled
    LdapConfiguration:
      type: object
      description: LDAP configuration.
      properties:
        domain:
          type: string
          description: Name of the LDAP configuration domain.
        ldapServers:
          type: array
          items:
            type: string
          description: List of LDAP server IP addresses (IPv4 only) for the LDAP domain.
        ldapOverTLS:
          type: boolean
          description: Specifies whether or not the LDAP traffic needs to be secured via TLS.
        serverCACertificate:
          type: string
          description: When LDAP over SSL/TLS is enabled, the LDAP client is required to have base64 encoded ldap servers CA certificate.
        certificateCNHost:
          type: string
          description: The CN host name used while generating the certificate, LDAP Over TLS requires the CN host name to create DNS host entry.
        bindAuthenticationLevel:
          $ref: "#/components/schemas/BindAuthenticationLevel"
          description: 'The authentication level to use when binding to the LDAP server, defaults to Anonymous. Known values are: "Anonymous" and "Simple".'
        bindDN:
          type: string
          description: The distinguished name (DN) to bind as when performing LDAP operations.
        bindPasswordAkvConfig:
          $ref: "#/components/schemas/BindPasswordAkvConfig"
          description: The Azure Key Vault configuration where the Bind DN (Distinguished Name) user password is stored.
    BindAuthenticationLevel:
      type: string
      enum:
        - Anonymous
        - Simple
    BindPasswordAkvConfig:
      type: object
      description: The Azure Key Vault configuration where the Bind DN (Distinguished Name) user password is stored.
      properties:
        azureKeyVaultUri:
          type: string
          description: The Azure Key Vault URI where the Bind DN user password is stored. Required.
        secretName:
          type: string
          description: The name of the secret in Azure Key Vault that contains the Bind DN user password. Required.
        userAssignedIdentity:
          type: string
          description: The ARM resource identifier of the user assigned identity used to authenticate with key vault.
      required:
        - azureKeyVaultUri
        - secretName
    ManagedServiceIdentity:
      type: object
      description: Managed service identity (system assigned and/or user assigned identities).
      properties:
        principalId:
          type: string
          description: The service principal ID of the system assigned identity. This property will only be provided for a system assigned identity.
        tenantId:
          type: string
          description: The tenant ID of the system assigned identity. This property will only be provided for a system assigned identity.
        type:
          $ref: "#/components/schemas/ManagedServiceIdentityType"
          description: 'The type of managed identity assigned to this resource. Required. Known values are: "None", "SystemAssigned", "UserAssigned", and "SystemAssigned,UserAssigned".'
        userAssignedIdentities:
          type: object
          properties: {}
          description: The identities assigned to this resource by the user.
      required:
        - type
    ManagedServiceIdentityType:
      type: string
      enum:
        - None
        - SystemAssigned
        - UserAssigned
        - SystemAssigned,UserAssigned
    NetAppAccountFlattened:
      type: object
      description: Flattened view of NetAppAccount ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        location:
          type: string
          description: The geo-location where the resource lives. Required.
        etag:
          type: string
          description: '"If etag is provided in the response body, it may also be provided as a header per the normal etag convention. Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.").'
        identity:
          $ref: "#/components/schemas/ManagedServiceIdentity"
          description: The managed service identities assigned to this resource.
        provisioningState:
          type: string
          description: Azure lifecycle management.
        activeDirectories:
          type: array
          items:
            $ref: "#/components/schemas/ActiveDirectory"
          description: Active Directories.
        entraIdConfig:
          $ref: "#/components/schemas/EntraIdConfig"
          description: Entra ID configuration for the account.
        encryption:
          $ref: "#/components/schemas/AccountEncryption"
          description: Encryption settings.
        disableShowmount:
          type: boolean
          description: Shows the status of disableShowmount for all volumes under the subscription, null equals false.
        nfsV4IDDomain:
          type: string
          description: Domain for NFSv4 user ID mapping. This property will be set for all NetApp accounts in the subscription and region and only affect non ldap NFSv4 volumes.
        multiAdStatus:
          $ref: "#/components/schemas/MultiAdStatus"
          description: 'MultiAD Status for the account. Known values are: "Disabled" and "Enabled".'
        ldapConfiguration:
          $ref: "#/components/schemas/LdapConfiguration"
          description: LDAP Configuration for the account.
    PagedNetAppAccountFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/NetAppAccountFlattened"
        nextLink:
          type: string
    NetAppAccount:
      type: object
      description: NetApp account resource.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        location:
          type: string
          description: The geo-location where the resource lives. Required.
        properties:
          $ref: "#/components/schemas/AccountProperties"
          description: NetApp Account properties.
        etag:
          type: string
          description: '"If etag is provided in the response body, it may also be provided as a header per the normal etag convention. Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.").'
        identity:
          $ref: "#/components/schemas/ManagedServiceIdentity"
          description: The managed service identities assigned to this resource.
      required:
        - location
    GetKeyVaultStatusResponseProperties:
      type: object
      description: Properties which represents Change key vault status.
      properties:
        keyVaultUri:
          type: string
          description: The URI of the key vault/managed HSM that should be used for encryption.
        keyName:
          type: string
          description: The name of the key that should be used for encryption.
        keyVaultResourceId:
          type: string
          description: Azure resource ID of the key vault/managed HSM that should be used for encryption.
        keyVaultPrivateEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/KeyVaultPrivateEndpoint"
          description: Pairs of virtual network ID and private endpoint ID. Every virtual network that has volumes encrypted with customer-managed keys needs its own key vault private endpoint.
    KeyVaultPrivateEndpoint:
      type: object
      description: Pairs of virtual network ID and private endpoint ID. Every virtual network that has volumes encrypted with customer-managed keys needs its own key vault private endpoint.
      properties:
        virtualNetworkId:
          type: string
          description: Identifier for the virtual network id.
        privateEndpointId:
          type: string
          description: Identifier of the private endpoint to reach the Azure Key Vault.
    GetKeyVaultStatusResponseFlattened:
      type: object
      description: Flattened view of GetKeyVaultStatusResponse ('properties' hoisted to the top level).
      properties:
        keyVaultUri:
          type: string
          description: The URI of the key vault/managed HSM that should be used for encryption.
        keyName:
          type: string
          description: The name of the key that should be used for encryption.
        keyVaultResourceId:
          type: string
          description: Azure resource ID of the key vault/managed HSM that should be used for encryption.
        keyVaultPrivateEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/KeyVaultPrivateEndpoint"
          description: Pairs of virtual network ID and private endpoint ID. Every virtual network that has volumes encrypted with customer-managed keys needs its own key vault private endpoint.
    AccountPropertiesPatch:
      type: object
      description: NetApp account patch properties.
      properties:
        activeDirectories:
          type: array
          items:
            $ref: "#/components/schemas/ActiveDirectory"
          description: Active Directories.
        encryption:
          $ref: "#/components/schemas/AccountEncryption"
          description: Encryption settings.
        nfsV4IDDomain:
          type: string
          description: Domain for NFSv4 user ID mapping. This property will be set for all NetApp accounts in the subscription and region and only affect non ldap NFSv4 volumes.
        entraIdConfig:
          $ref: "#/components/schemas/EntraIdConfigPatch"
          description: Entra ID configuration for the account.
        ldapConfiguration:
          $ref: "#/components/schemas/LdapConfigurationPatch"
          description: LDAP Configuration for the account.
    EntraIdConfigPatch:
      type: object
      description: Entra ID Patch configuration for the account.
      properties:
        applicationId:
          type: string
          description: ApplicationId of the app created by customer to provide authentication and required API permissions for Microsoft Graph endpoint.
        domain:
          type: string
          description: Domain of the Active directory synced to Entra ID for hybrid identities.
        serverNamePrefix:
          type: string
          description: Using ServerNamePrefix, FQDN (Fully Qualified Domain Name) will be generated for SMB share, using this FQDN, SMB Share will be mounted on Entra Joined VM.
        entraIdAkvConfig:
          $ref: "#/components/schemas/EntraIdAkvConfigPatch"
          description: Using AKV config, certificate will be fetched, which will contain private key & public certificate, that correspond to the public certificate which is uploaded on the application created by customer. This will be used further for authentication.
    EntraIdAkvConfigPatch:
      type: object
      description: Entra ID Patch configuration for the account.
      properties:
        azureKeyVaultUri:
          type: string
          description: The Azure Key Vault URI where the Entra ID credentials are stored.
        certificateName:
          type: string
          description: The name of the certificate in Azure Key Vault.
        userAssignedIdentity:
          type: string
          description: The ARM resource identifier of the user assigned identity used to authenticate with key vault.
    LdapConfigurationPatch:
      type: object
      description: LDAP configuration for PATCH operations (no default values).
      properties:
        domain:
          type: string
          description: Name of the LDAP configuration domain.
        ldapServers:
          type: array
          items:
            type: string
          description: List of LDAP server IP addresses (IPv4 only) for the LDAP domain.
        ldapOverTLS:
          type: boolean
          description: Specifies whether or not the LDAP traffic needs to be secured via TLS.
        serverCACertificate:
          type: string
          description: When LDAP over SSL/TLS is enabled, the LDAP client is required to have base64 encoded ldap servers CA certificate.
        certificateCNHost:
          type: string
          description: The CN host name used while generating the certificate, LDAP Over TLS requires the CN host name to create DNS host entry.
        bindAuthenticationLevel:
          $ref: "#/components/schemas/BindAuthenticationLevel"
          description: 'The authentication level to use when binding to the LDAP server, defaults to Anonymous. Known values are: "Anonymous" and "Simple".'
        bindDN:
          type: string
          description: The distinguished name (DN) to bind as when performing LDAP operations.
        bindPasswordAkvConfig:
          $ref: "#/components/schemas/BindPasswordAkvConfigPatch"
          description: The Azure Key Vault configuration where the Bind DN (Distinguished Name) user password is stored.
    BindPasswordAkvConfigPatch:
      type: object
      description: The Azure Key Vault configuration where the Bind DN (Distinguished Name) user password is stored.
      properties:
        azureKeyVaultUri:
          type: string
          description: The Azure Key Vault URI where the Bind DN user password is stored.
        secretName:
          type: string
          description: The name of the secret in Azure Key Vault that contains the Bind DN user password.
        userAssignedIdentity:
          type: string
          description: The ARM resource identifier of the user assigned identity used to authenticate with key vault.
    ActiveDirectoryConfigProperties:
      type: object
      description: Active Directory Configuration properties.
      properties:
        userName:
          type: string
          description: A domain user account with permission to create machine accounts.
        dns:
          type: array
          items:
            type: string
          description: An array of DNS server IP addresses(IPv4 only) for the Active Directory.
        smbServerName:
          type: string
          description: NetBIOS name of the SMB server. This name will be registered as a computer account in the AD and used to mount volumes.
        organizationalUnit:
          type: string
          description: The Organizational Unit (OU) within the Windows Active Directory.
        site:
          type: string
          description: The Active Directory site the service will limit Domain Controller discovery to. Required.
        backupOperators:
          type: array
          items:
            type: string
          description: Users to be added to the Built-in Backup Operator active directory group. A list of unique usernames without domain specifier.
        administrators:
          type: array
          items:
            type: string
          description: Users to be added to the Built-in Administrators active directory group. A list of unique usernames without domain specifier.
        securityOperators:
          type: array
          items:
            type: string
          description: Domain Users in the Active directory to be given SecurityPrivilege privilege (Needed for SMB Continuously available shares for SQL). A list of unique usernames without domain specifier.
        activeDirectoryStatus:
          $ref: "#/components/schemas/ActiveDirectoryStatus"
          description: 'Status of the Active Directory. Known values are: "Created", "InUse", "Deleted", "Error", and "Updating".'
        provisioningState:
          $ref: "#/components/schemas/NetAppProvisioningState"
          description: 'Azure lifecycle management. Known values are: "Accepted", "Creating", "Patching", "Updating", "Deleting", "Moving", "Failed", and "Succeeded".'
        domain:
          type: string
          description: Name of the Active Directory domain. Required.
        secretPassword:
          $ref: "#/components/schemas/SecretPassword"
          description: Access password from Azure KeyVault Secrets to connect Active Directory. Required.
      required:
        - site
        - domain
        - secretPassword
    NetAppProvisioningState:
      type: string
      enum:
        - Accepted
        - Creating
        - Patching
        - Updating
        - Deleting
        - Moving
        - Failed
        - Succeeded
    SecretPassword:
      type: object
      description: Access password from Azure KeyVault Secrets to connect Active Directory.
      properties:
        keyVaultProperties:
          $ref: "#/components/schemas/SecretPasswordKeyVaultProperties"
          description: Properties provided by KeyVault.
        identity:
          $ref: "#/components/schemas/SecretPasswordIdentity"
          description: Identity used to authenticate to KeyVault. Applicable if keySource is 'Microsoft.KeyVault'.
    SecretPasswordKeyVaultProperties:
      type: object
      description: Properties of key vault to get the secrets for password.
      properties:
        keyVaultUri:
          type: string
          description: The Uri of KeyVault. Required.
        secretName:
          type: string
          description: The name of KeyVault password secret. Required.
      required:
        - keyVaultUri
        - secretName
    SecretPasswordIdentity:
      type: object
      description: Identity used to authenticate with key vault.
      properties:
        principalId:
          type: string
          description: The principal ID (object ID) of the identity used to authenticate with key vault. Read-only.
        userAssignedIdentity:
          type: string
          description: The Azure resource identifier of the user assigned identity used to authenticate with key vault. Applicable if identity.type has 'UserAssigned'. It should match key of identity.userAssignedIdentities.
    ActiveDirectoryConfigFlattened:
      type: object
      description: Flattened view of ActiveDirectoryConfig ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
