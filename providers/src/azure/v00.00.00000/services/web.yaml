        unauthenticatedClientAction:
          $ref: "#/components/schemas/UnauthenticatedClientAction"
          description: 'The action to take when an unauthenticated client attempts to access the app. Known values are: "RedirectToLoginPage" and "AllowAnonymous".'
        tokenStoreEnabled:
          type: boolean
          description: true to durably store platform-specific security tokens that are obtained during login flows; otherwise, false. The default is false.
        allowedExternalRedirectUrls:
          type: array
          items:
            type: string
          description: External URLs that can be redirected to as part of logging in or logging out of the app. Note that the query string part of the URL is ignored. This is an advanced setting typically only needed by Windows Store application backends. Note that URLs within the current domain are always implicitly allowed.
        defaultProvider:
          $ref: "#/components/schemas/BuiltInAuthenticationProvider"
          description: 'The default authentication provider to use when multiple providers are configured. This setting is only needed if multiple providers are configured and the unauthenticated client action is set to "RedirectToLoginPage". Known values are: "AzureActiveDirectory", "Facebook", "Google", "MicrosoftAccount", "Twitter", and "Github".'
        tokenRefreshExtensionHours:
          type: number
          description: The number of hours after session token expiration that a session token can be used to call the token refresh API. The default is 72 hours.
        clientId:
          type: string
          description: "The Client ID of this relying party application, known as the client_id. This setting is required for enabling OpenID Connection authentication with Azure Active Directory or other 3rd party OpenID Connect providers. More information on OpenID Connect: `http://openid.net/specs/openid-connect-core-1_0.html `_."
        clientSecret:
          type: string
          description: "The Client Secret of this relying party application (in Azure Active Directory, this is also referred to as the Key). This setting is optional. If no client secret is configured, the OpenID Connect implicit auth flow is used to authenticate end users. Otherwise, the OpenID Connect Authorization Code Flow is used to authenticate end users. More information on OpenID Connect: `http://openid.net/specs/openid-connect-core-1_0.html `_."
        clientSecretSettingName:
          type: string
          description: The app setting name that contains the client secret of the relying party application.
        clientSecretCertificateThumbprint:
          type: string
          description: An alternative to the client secret, that is the thumbprint of a certificate used for signing purposes. This property acts as a replacement for the Client Secret. It is also optional.
        issuer:
          type: string
          description: "The OpenID Connect Issuer URI that represents the entity which issues access tokens for this application. When using Azure Active Directory, this value is the URI of the directory tenant, e.g. `https://sts.windows.net/{tenant-guid}/`. This URI is a case-sensitive identifier for the token issuer. More information on OpenID Connect Discovery: `http://openid.net/specs/openid-connect-discovery-1_0.html `_."
        validateIssuer:
          type: boolean
          description: Gets a value indicating whether the issuer should be a valid HTTPS url and be validated as such.
        allowedAudiences:
          type: array
          items:
            type: string
