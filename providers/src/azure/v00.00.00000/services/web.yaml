          description: Description of the Virtual Network. Required.
        internalLoadBalancingMode:
          $ref: "#/components/schemas/LoadBalancingMode"
          description: 'Specifies which endpoints to serve internally in the Virtual Network for the App Service Environment. Known values are: "None", "Web", "Publishing", and "Web, Publishing".'
