    IpSecurityRestriction:
      type: object
      description: IP security restriction on an app.
      properties:
        ipAddress:
          type: string
          description: IP address the security restriction is valid for. It can be in form of pure ipv4 address (required SubnetMask property) or CIDR notation such as ipv4/mask (leading bit match). For CIDR, SubnetMask property must not be specified.
        subnetMask:
          type: string
          description: Subnet mask for the range of IP addresses the restriction is valid for.
        vnetSubnetResourceId:
          type: string
          description: Virtual network resource id.
        vnetTrafficTag:
          type: integer
          description: (internal) Vnet traffic tag.
        subnetTrafficTag:
          type: integer
          description: (internal) Subnet traffic tag.
        action:
          type: string
          description: Allow or Deny access for this IP range.
        tag:
          $ref: "#/components/schemas/IpFilterTag"
          description: 'Defines what this IP filter will be used for. This is to support IP filtering on proxies. Known values are: "Default", "XffProxy", and "ServiceTag".'
        priority:
          type: integer
          description: Priority of IP restriction rule.
        name:
          type: string
          description: IP restriction rule name.
        description:
          type: string
          description: IP restriction rule description.
        headers:
          type: object
          properties: {}
          description: IP restriction rule headers. X-Forwarded-Host (`https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Forwarded-Host#Examples `_). The matching logic is .. * If the property is null or empty (default), all hosts(or lack of) are allowed. * A value is compared using ordinal-ignore-case (excluding port number). * Subdomain wildcards are permitted but don't match the root domain. For example, *.contoso.com matches the subdomain foo.contoso.com but not the root domain contoso.com or multi-level foo.bar.contoso.com * Unicode host names are allowed but are converted to Punycode for matching. X-Forwarded-For (`https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Forwarded-For#Examples `_). The matching logic is .. * If the property is null or empty (default), any forwarded-for chains (or lack of) are allowed. * If any address (excluding port number) in the chain (comma separated) matches the CIDR defined by the property. X-Azure-FDID and X-FD-HealthProbe. The matching logic is exact match.
    IpFilterTag:
      type: string
      enum:
        - Default
        - XffProxy
        - ServiceTag
    DefaultAction:
      type: string
      enum:
        - Allow
        - Deny
    SupportedTlsVersions:
      type: string
      enum:
        - "1.0"
        - "1.1"
        - "1.2"
        - "1.3"
