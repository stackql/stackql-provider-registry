    get:
      operationId: BlobContainers_get
      description: Gets properties of a specified container.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: account_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only. Required.
        - name: container_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the blob container within the specified storage account. Blob container names must be between 3 and 63 characters in length and use numbers, lower-case letters and dash (-) only. Every dash (-) character must be immediately preceded and followed by a letter or number. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlobContainerFlattened"
    put:
      operationId: BlobContainers_create
      description: Creates a new container under the specified account as described by request body. The container resource includes metadata and properties for that container. It does not include a list of the blobs contained by the container.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
