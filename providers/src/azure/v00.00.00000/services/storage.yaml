  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/Microsoft.Storage/storageAccounts/{account_name}/failover?api-version=2025-08-01:
    post:
      operationId: StorageAccounts_begin_failover
      description: A failover request can be triggered for a storage account in the event a primary endpoint becomes unavailable for any reason. The failover occurs from the storage account's primary cluster to the secondary cluster for RA-GRS accounts. The secondary cluster will become primary after failover and the account is converted to LRS. In the case of a Planned Failover, the primary and secondary clusters are swapped after failover and the account remains geo-replicated. Failover should continue to be used in the event of availability issues as Planned failover is only available while the primary and secondary endpoints are available. The primary use case of a Planned Failover is disaster recovery testing drills. This type of failover is invoked by setting FailoverType parameter to 'Planned'. Learn more about the failover options here- `https://learn.microsoft.com/azure/storage/common/storage-disaster-recovery-guidance `_.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: account_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: failoverType
          in: query
          required: false
          schema:
            type: string
          description: The parameter is set to 'Planned' to indicate whether a Planned failover is requested. Known values are "Planned" and None. Default value is "Planned".
      responses:
        "204":
          description: Success (no content / accepted)
