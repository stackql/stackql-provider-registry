          type: boolean
          description: A boolean flag which indicates whether IPv6 storage endpoints are to be published.
    BlobRestoreStatus:
      type: object
      description: Blob restore status.
      properties:
        status:
          $ref: "#/components/schemas/BlobRestoreProgressStatus"
          description: 'The status of blob restore progress. Possible values are: - InProgress: Indicates that blob restore is ongoing. - Complete: Indicates that blob restore has been completed successfully. - Failed: Indicates that blob restore is failed. Known values are: "InProgress", "Complete", and "Failed".'
        failureReason:
          type: string
          description: Failure reason when blob restore is failed.
        restoreId:
          type: string
          description: Id for tracking blob restore request.
        parameters:
          $ref: "#/components/schemas/BlobRestoreParameters"
          description: Blob restore request parameters.
    BlobRestoreProgressStatus:
      type: string
      enum:
        - InProgress
        - Complete
        - Failed
    BlobRestoreParameters:
      type: object
      description: Blob restore parameters.
      properties:
        timeToRestore:
          type: string
          format: date-time
          description: Restore blob to the specified time. Required.
        blobRanges:
          type: array
          items:
            $ref: "#/components/schemas/BlobRestoreRange"
          description: Blob ranges to restore. Required.
      required:
        - timeToRestore
        - blobRanges
    BlobRestoreRange:
      type: object
      description: Blob range.
      properties:
        startRange:
          type: string
          description: Blob start range. This is inclusive. Empty means account start. Required.
        endRange:
          type: string
          description: Blob end range. This is exclusive. Empty means account end. Required.
      required:
        - startRange
        - endRange
    MinimumTlsVersion:
      type: string
      enum:
        - TLS1_0
        - TLS1_1
        - TLS1_2
        - TLS1_3
    PublicNetworkAccess:
      type: string
      enum:
        - Enabled
        - Disabled
        - SecuredByPerimeter
    ImmutableStorageAccount:
      type: object
      description: This property enables and defines account-level immutability. Enabling the feature auto-enables Blob Versioning.
      properties:
        enabled:
          type: boolean
          description: A boolean flag which enables account-level immutability. All the containers under such an account have object-level immutability enabled by default.
        immutabilityPolicy:
          $ref: "#/components/schemas/AccountImmutabilityPolicyProperties"
          description: Specifies the default account-level immutability policy which is inherited and applied to objects that do not possess an explicit immutability policy at the object level. The object-level immutability policy has higher precedence than the container-level immutability policy, which has a higher precedence than the account-level immutability policy.
    AccountImmutabilityPolicyProperties:
      type: object
      description: This defines account-level immutability policy properties.
      properties:
        immutabilityPeriodSinceCreationInDays:
          type: integer
          description: The immutability period for the blobs in the container since the policy creation, in days.
        state:
          $ref: "#/components/schemas/AccountImmutabilityPolicyState"
          description: 'The ImmutabilityPolicy state defines the mode of the policy. Disabled state disables the policy, Unlocked state allows increase and decrease of immutability retention time and also allows toggling allowProtectedAppendWrites property, Locked state only allows the increase of the immutability retention time. A policy can only be created in a Disabled or Unlocked state and can be toggled between the two states. Only a policy in an Unlocked state can transition to a Locked state which cannot be reverted. Known values are: "Unlocked", "Locked", and "Disabled".'
        allowProtectedAppendWrites:
          type: boolean
          description: This property can only be changed for disabled and unlocked time-based retention policies. When enabled, new blocks can be written to an append blob while maintaining immutability protection and compliance. Only new blocks can be added and any existing blocks cannot be modified or deleted.
    AccountImmutabilityPolicyState:
      type: string
      enum:
        - Unlocked
        - Locked
        - Disabled
    AllowedCopyScope:
      type: string
      enum:
        - PrivateLink
        - AAD
        - All
    StorageAccountSkuConversionStatus:
