    BlobInventoryPolicyRule:
      type: object
      description: An object that wraps the blob inventory rule. Each rule is uniquely defined by name.
      properties:
        enabled:
          type: boolean
          description: Rule is enabled when set to true. Required.
        name:
          type: string
          description: A rule name can contain any combination of alpha numeric characters. Rule name is case-sensitive. It must be unique within a policy. Required.
        destination:
          type: string
          description: Container name where blob inventory files are stored. Must be pre-created. Required.
        definition:
          $ref: "#/components/schemas/BlobInventoryPolicyDefinition"
          description: An object that defines the blob inventory policy rule. Required.
      required:
        - enabled
        - name
        - destination
        - definition
