            type: string
          description: The value of restrictions. If the restriction type is set to location. This would be different locations where the SKU is restricted.
        reasonCode:
          $ref: "#/components/schemas/ReasonCode"
          description: 'The reason for the restriction. As of now this can be "QuotaId" or "NotAvailableForSubscription". Quota Id is set when the SKU has requiredQuotas parameter as the subscription does not belong to that quota. The "NotAvailableForSubscription" is related to capacity at DC. Known values are: "QuotaId" and "NotAvailableForSubscription".'
    ReasonCode:
      type: string
      enum:
        - QuotaId
        - NotAvailableForSubscription
    SkuInformation:
      type: object
      description: Storage SKU and its properties.
      properties:
        name:
          $ref: "#/components/schemas/SkuName"
          description: 'The SKU name. Required for account creation; optional for update. Note that in older versions, SKU name was called accountType. Required. Known values are: "Standard_LRS", "Standard_GRS", "Standard_RAGRS", "Standard_ZRS", "Premium_LRS", "Premium_ZRS", "Standard_GZRS", "Standard_RAGZRS", "StandardV2_LRS", "StandardV2_GRS", "StandardV2_ZRS", "StandardV2_GZRS", "PremiumV2_LRS", and "PremiumV2_ZRS".'
        tier:
          $ref: "#/components/schemas/SkuTier"
          description: 'The SKU tier. This is based on the SKU name. Known values are: "Standard" and "Premium".'
        resourceType:
          type: string
          description: The type of the resource, usually it is 'storageAccounts'.
        kind:
          $ref: "#/components/schemas/Kind"
          description: 'Indicates the type of storage account. Known values are: "Storage", "StorageV2", "BlobStorage", "FileStorage", and "BlockBlobStorage".'
        locations:
          type: array
          items:
            type: string
          description: The set of locations that the SKU is available. This will be supported and registered Azure Geo Regions (e.g. West US, East US, Southeast Asia, etc.).
        locationInfo:
          type: array
          items:
            $ref: "#/components/schemas/SkuInformationLocationInfoItem"
          description: ":vartype location_info: list[~azure.mgmt.storage.models.SkuInformationLocationInfoItem]"
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/SKUCapability"
          description: The capability information in the specified SKU, including file encryption, network ACLs, change notification, etc.
        restrictions:
          type: array
          items:
            $ref: "#/components/schemas/Restriction"
          description: The restrictions because of which SKU cannot be used. This is empty if there are no restrictions.
      required:
