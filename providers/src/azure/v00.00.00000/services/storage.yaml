        isHnsEnabled:
          type: boolean
          description: Account HierarchicalNamespace enabled if sets to true.
        geoReplicationStats:
          $ref: "#/components/schemas/GeoReplicationStats"
          description: Geo Replication Stats.
        failoverInProgress:
          type: boolean
          description: If the failover is in progress, the value will be true, otherwise, it will be null.
        largeFileSharesState:
          $ref: "#/components/schemas/LargeFileSharesState"
          description: 'Allow large file shares if sets to Enabled. It cannot be disabled once it is enabled. Known values are: "Disabled" and "Enabled".'
        privateEndpointConnections:
          type: array
          items:
            $ref: "#/components/schemas/PrivateEndpointConnection"
          description: List of private endpoint connection associated with the specified storage account.
        routingPreference:
