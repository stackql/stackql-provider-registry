          description: 'Routing Choice defines the kind of network routing opted by the user. Known values are: "MicrosoftRouting" and "InternetRouting".'
        publishMicrosoftEndpoints:
          type: boolean
          description: A boolean flag which indicates whether microsoft routing storage endpoints are to be published.
        publishInternetEndpoints:
