    GeoReplicationStats:
      type: object
      description: Statistics related to replication for storage account's Blob, Table, Queue and File services. It is only available when geo-redundant replication is enabled for the storage account.
      properties:
        status:
          $ref: "#/components/schemas/GeoReplicationStatus"
          description: 'The status of the secondary location. Possible values are: - Live: Indicates that the secondary location is active and operational. - Bootstrap: Indicates initial synchronization from the primary location to the secondary location is in progress.This typically occurs when replication is first enabled. - Unavailable: Indicates that the secondary location is temporarily unavailable. Known values are: "Live", "Bootstrap", and "Unavailable".'
        lastSyncTime:
          type: string
          format: date-time
          description: All primary writes preceding this UTC date/time value are guaranteed to be available for read operations. Primary writes following this point in time may or may not be available for reads. Element may be default value if value of LastSyncTime is not available, this can happen if secondary is offline or we are in bootstrap.
        canFailover:
          type: boolean
          description: A boolean flag which indicates whether or not account failover is supported for the account.
        canPlannedFailover:
          type: boolean
          description: A boolean flag which indicates whether or not planned account failover is supported for the account.
        postFailoverRedundancy:
          $ref: "#/components/schemas/PostFailoverRedundancy"
          description: 'The redundancy type of the account after an account failover is performed. Known values are: "Standard_LRS" and "Standard_ZRS".'
        postPlannedFailoverRedundancy:
          $ref: "#/components/schemas/PostPlannedFailoverRedundancy"
          description: 'The redundancy type of the account after a planned account failover is performed. Known values are: "Standard_GRS", "Standard_GZRS", "Standard_RAGRS", and "Standard_RAGZRS".'
    GeoReplicationStatus:
      type: string
      enum:
        - Live
        - Bootstrap
        - Unavailable
    PostFailoverRedundancy:
      type: string
      enum:
        - Standard_LRS
        - Standard_ZRS
    PostPlannedFailoverRedundancy:
      type: string
      enum:
        - Standard_GRS
        - Standard_GZRS
        - Standard_RAGRS
        - Standard_RAGZRS
    LargeFileSharesState:
      type: string
      enum:
        - Disabled
        - Enabled
    RoutingPreference:
      type: object
      description: Routing preference defines the type of network, either microsoft or internet routing to be used to deliver the user data, the default option is microsoft routing.
      properties:
        routingChoice:
