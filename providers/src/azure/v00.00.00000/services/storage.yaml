      properties:
        filters:
          $ref: "#/components/schemas/BlobInventoryPolicyFilter"
          description: An object that defines the filter set.
        format:
          $ref: "#/components/schemas/Format"
          description: 'This is a required field, it specifies the format for the inventory files. Required. Known values are: "Csv" and "Parquet".'
        schedule:
          $ref: "#/components/schemas/Schedule"
          description: 'This is a required field. This field is used to schedule an inventory formation. Required. Known values are: "Daily" and "Weekly".'
