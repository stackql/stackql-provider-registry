        - available
        - unavailable
    CustomDomain:
      type: object
      description: The custom domain assigned to this storage account. This can be set via Update.
      properties:
        name:
          type: string
          description: Gets or sets the custom domain name assigned to the storage account. Name is the CNAME source. Required.
        useSubDomainName:
          type: boolean
          description: Indicates whether indirect CName validation is enabled. Default value is false. This should only be set on updates.
      required:
