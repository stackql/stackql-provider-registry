      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AttestationProperties:
      type: object
      description: The properties of an attestation resource.
      properties:
        policyAssignmentId:
          type: string
          description: The resource ID of the policy assignment that the attestation is setting the state for. Required.
        policyDefinitionReferenceId:
          type: string
          description: The policy definition reference ID from a policy set definition that the attestation is setting the state for. If the policy assignment assigns a policy set definition the attestation can choose a definition within the set definition with this property or omit this and set the state for the entire set definition.
        complianceState:
          $ref: "#/components/schemas/ComplianceState"
          description: 'The compliance state that should be set on the resource. Known values are: "Compliant", "NonCompliant", and "Unknown".'
        expiresOn:
          type: string
          format: date-time
          description: The time the compliance state should expire.
        owner:
          type: string
          description: The person responsible for setting the state of the resource. This value is typically an Azure Active Directory object ID.
        comments:
          type: string
          description: Comments describing why this attestation was created.
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/AttestationEvidence"
          description: The evidence supporting the compliance state set in this attestation.
        provisioningState:
          type: string
          description: The status of the attestation.
        lastComplianceStateChangeAt:
          type: string
          format: date-time
          description: The time the compliance state was last changed in this attestation.
        assessmentDate:
          type: string
          format: date-time
          description: The time the evidence was assessed.
        metadata:
          type: object
          properties: {}
          description: Additional metadata for this attestation.
      required:
        - policyAssignmentId
    ComplianceState:
      type: string
      enum:
        - Compliant
        - NonCompliant
        - Unknown
    AttestationEvidence:
      type: object
      description: A piece of evidence supporting the compliance state set in the attestation.
      properties:
        description:
          type: string
          description: The description for this piece of evidence.
        sourceUri:
          type: string
          description: The URI location of the evidence.
