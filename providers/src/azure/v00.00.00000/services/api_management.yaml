          type: integer
          description: The priority of the backend entity in the backend pool. Must be between 0 and 100. It can be also null if the value not specified.
        preferredCarbonEmission:
          $ref: "#/components/schemas/CarbonEmissionCategory"
          description: "Scope 2 carbon emission preference for the backend. When specified, the load balancer will optimize traffic flow by routing to regions that have carbon emission less than or equal to the specified category. However, when all other backends are not available it will route traffic to these regions anyway. This requires the backend to be attributed with 'azureRegion' information. Known values are: \"VeryLow\", \"Low\", \"Medium\", \"High\", and \"VeryHigh\"."
