      type: object
      description: BackendBaseParametersPool.
      properties:
        services:
          type: array
          items:
            $ref: "#/components/schemas/BackendPoolItem"
          description: The list of backend entities belonging to a pool.
        failureResponse:
          $ref: "#/components/schemas/BackendFailureResponse"
          description: The response to be returned when all the backends in the pool are inactive.
        sessionAffinity:
          $ref: "#/components/schemas/BackendSessionAffinity"
          description: The session stickiness properties of the backend pool.
