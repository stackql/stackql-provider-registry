paths:
  /:
    get:
      operationId: Directory_list_files_and_directories_segment
      description: Returns a list of files or directories under the specified share or directory. It lists the contents only for a single level of the directory hierarchy.
      parameters:
        - name: x-ms-version
          in: header
          required: true
          schema:
            type: string
        - name: prefix
          in: query
          required: false
          schema:
            type: string
          description: Filters the results to return only entries whose name begins with the specified prefix. Default value is None.
        - name: sharesnapshot
          in: query
          required: false
          schema:
            type: string
          description: The snapshot parameter is an opaque DateTime value that, when present, specifies the share snapshot to query. Default value is None.
        - name: marker
          in: query
          required: false
          schema:
            type: string
          description: A string value that identifies the portion of the list to be returned with the next list operation. The operation returns a marker value within the response body if the list returned was not complete. The marker value may then be used in a subsequent call to request the next set of list items. The marker value is opaque to the client. Default value is None.
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Specifies the maximum number of entries to return. If the request does not specify maxresults, or specifies a value greater than 5,000, the server will return up to 5,000 items. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see
        - name: include
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Include this parameter to specify one or more datasets to include in the response. Default value is None.
        - name: x-ms-file-extended-info
          in: header
          required: false
          schema:
            type: boolean
          description: Include extended information. Default value is None.
        - name: x-ms-allow-trailing-dot
          in: header
          required: false
          schema:
            type: boolean
        - name: x-ms-file-request-intent
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFilesAndDirectoriesSegmentResponse"
    put:
      operationId: Directory_create
      description: Creates a new directory under the specified share or parent directory.
      parameters:
        - name: x-ms-version
          in: header
          required: true
          schema:
            type: string
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see
        - name: x-ms-meta
          in: header
          required: false
          schema:
            type: object
            properties: {}
          description: A name-value pair to associate with a file storage object. Default value is None.
        - name: x-ms-file-permission
          in: header
          required: false
          schema:
            type: string
          description: 'If specified the permission (security descriptor) shall be set for the directory/file. This header can be used if Permission size is <= 8KB, else x-ms-file-permission-key header shall be used. Default value: Inherit. If SDDL is specified as input, it must have owner, group and dacl. Note: Only one of the x-ms-file-permission or x-ms-file-permission-key should be specified. Default value is "inherit".'
        - name: x-ms-file-permission-format
          in: header
          required: false
          schema:
            type: string
          description: 'Optional. Available for version 2023-06-01 and later. Specifies the format in which the permission is returned. Acceptable values are SDDL or binary. If x-ms-file-permission-format is unspecified or explicitly set to SDDL, the permission is returned in SDDL format. If x-ms-file-permission-format is explicitly set to binary, the permission is returned as a base64 string representing the binary encoding of the permission. Known values are: "Sddl" and "Binary". Default value is None.'
        - name: x-ms-file-permission-key
          in: header
          required: false
          schema:
            type: string
          description: "Key of the permission to be set for the directory/file. Note: Only one of the x-ms-file-permission or x-ms-file-permission-key should be specified. Default value is None."
        - name: x-ms-file-attributes
          in: header
          required: false
          schema:
            type: string
          description: 'If specified, the provided file attributes shall be set. Default value: ‘Archive’ for file and ‘Directory’ for directory. ‘None’ can also be specified as default. Default value is "none".'
        - name: x-ms-file-creation-time
          in: header
          required: false
          schema:
            type: string
          description: 'Creation time for the file/directory. Default value: Now. Default value is "now".'
