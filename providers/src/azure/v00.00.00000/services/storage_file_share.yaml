openapi: 3.0.0
servers:
  - url: https://{account}.file.core.windows.net
    variables:
      account:
        default: ""
        description: Storage account name.
info:
  title: Azure Files (Data Plane)
  description: SMB file shares, directories, files and share snapshots.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: unversioned-stackql-generated
  x-serviceAlias: storage_file_share
  x-sdkPackage: azure-storage-file-share
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    StringEncoded:
      type: object
      description: StringEncoded.
      properties:
        Encoded:
          type: boolean
          description: ":vartype encoded: bool"
        content:
          type: string
          description: ":vartype content: str"
    FilesAndDirectoriesListSegment:
      type: object
      description: Abstract for entries that can be listed from Directory. All required parameters must be populated in order to send to server.
      properties:
        DirectoryItems:
          type: array
          items:
            $ref: "#/components/schemas/DirectoryItem"
          description: Required.
        FileItems:
          type: array
          items:
            $ref: "#/components/schemas/FileItem"
          description: Required.
      required:
        - DirectoryItems
        - FileItems
    DirectoryItem:
      type: object
      description: A listed directory item. All required parameters must be populated in order to send to server.
      properties:
        Name:
          $ref: "#/components/schemas/StringEncoded"
          description: Required.
        FileId:
          type: string
          description: ":vartype file_id: str"
        Properties:
          $ref: "#/components/schemas/FileProperty"
          description: File properties.
        Attributes:
          type: string
          description: ":vartype attributes: str"
        PermissionKey:
          type: string
          description: ":vartype permission_key: str"
      required:
        - Name
    FileProperty:
      type: object
      description: File properties. All required parameters must be populated in order to send to server.
      properties:
        Content-Length:
          type: integer
          description: Content length of the file. This value may not be up-to-date since an SMB client may have modified the file locally. The value of Content-Length may not reflect that fact until the handle is closed or the op-lock is broken. To retrieve current property values, call Get File Properties. Required.
        CreationTime:
          type: string
          format: date-time
          description: ":vartype creation_time: ~datetime.datetime"
        LastAccessTime:
          type: string
          format: date-time
          description: ":vartype last_access_time: ~datetime.datetime"
        LastWriteTime:
          type: string
          format: date-time
          description: ":vartype last_write_time: ~datetime.datetime"
        ChangeTime:
          type: string
          format: date-time
          description: ":vartype change_time: ~datetime.datetime"
        Last-Modified:
          type: string
          description: ":vartype last_modified: ~datetime.datetime"
        Etag:
          type: string
          description: ":vartype etag: str"
      required:
        - Content-Length
    FileItem:
      type: object
      description: A listed file item. All required parameters must be populated in order to send to server.
      properties:
        Name:
          $ref: "#/components/schemas/StringEncoded"
          description: Required.
        FileId:
          type: string
          description: ":vartype file_id: str"
        Properties:
          $ref: "#/components/schemas/FileProperty"
          description: File properties. Required.
        Attributes:
          type: string
          description: ":vartype attributes: str"
        PermissionKey:
          type: string
          description: ":vartype permission_key: str"
      required:
        - Name
        - Properties
    ListFilesAndDirectoriesSegmentResponse:
      type: object
      description: An enumeration of directories and files. All required parameters must be populated in order to send to server.
      properties:
        ServiceEndpoint:
          type: string
          description: Required.
        ShareName:
          type: string
          description: Required.
        ShareSnapshot:
          type: string
          description: ":vartype share_snapshot: str"
        Encoded:
          type: boolean
          description: ":vartype encoded: bool"
        DirectoryPath:
          type: string
          description: Required.
        Prefix:
          $ref: "#/components/schemas/StringEncoded"
          description: Required.
        Marker:
          type: string
          description: ":vartype marker: str"
        MaxResults:
          type: integer
          description: ":vartype max_results: int"
        Segment:
          $ref: "#/components/schemas/FilesAndDirectoriesListSegment"
          description: Abstract for entries that can be listed from Directory. Required.
        NextMarker:
          type: string
          description: Required.
        DirectoryId:
          type: string
          description: ":vartype directory_id: str"
      required:
        - ServiceEndpoint
        - ShareName
        - DirectoryPath
        - Prefix
        - Segment
        - NextMarker
    HandleItem:
      type: object
      description: A listed Azure Storage handle item. All required parameters must be populated in order to send to server.
      properties:
        HandleId:
          type: string
          description: XSMB service handle ID. Required.
        Path:
          $ref: "#/components/schemas/StringEncoded"
          description: Required.
        FileId:
          type: string
          description: FileId uniquely identifies the file or directory. Required.
        ParentId:
          type: string
          description: ParentId uniquely identifies the parent directory of the object.
        SessionId:
          type: string
          description: SMB session ID in context of which the file handle was opened. Required.
        ClientIp:
          type: string
          description: Client IP that opened the handle. Required.
        ClientName:
          type: string
          description: Name of the client machine where the share is being mounted. Required.
        OpenTime:
          type: string
          description: Time when the session that previously opened the handle has last been reconnected. (UTC). Required.
        LastReconnectTime:
          type: string
          description: Time handle was last connected to (UTC).
        AccessRightList:
          type: array
          items:
            type: string
          description: ":vartype access_right_list: list[str or ~azure.storage.fileshare.models.AccessRight]"
      required:
        - HandleId
        - Path
        - FileId
        - SessionId
        - ClientIp
        - ClientName
        - OpenTime
    ListHandlesResponse:
      type: object
      description: An enumeration of handles. All required parameters must be populated in order to send to server.
      properties:
        HandleList:
          type: array
          items:
            $ref: "#/components/schemas/HandleItem"
          description: ":vartype handle_list: list[~azure.storage.fileshare.models.HandleItem]"
        NextMarker:
          type: string
          description: Required.
      required:
        - NextMarker
    FileRange:
      type: object
      description: An Azure Storage file range. All required parameters must be populated in order to send to server.
      properties:
        Start:
          type: integer
          description: Start of the range. Required.
        End:
          type: integer
          description: End of the range. Required.
      required:
        - Start
        - End
    ClearRange:
      type: object
      description: ClearRange. All required parameters must be populated in order to send to server.
      properties:
        Start:
          type: integer
          description: Required.
        End:
          type: integer
          description: Required.
      required:
        - Start
        - End
    ShareFileRangeList:
      type: object
      description: The list of file ranges.
      properties:
        Ranges:
          type: array
          items:
            $ref: "#/components/schemas/FileRange"
          description: ":vartype ranges: list[~azure.storage.fileshare.models.FileRange]"
        ClearRanges:
          type: array
          items:
            $ref: "#/components/schemas/ClearRange"
          description: ":vartype clear_ranges: list[~azure.storage.fileshare.models.ClearRange]"
    ShareItemInternal:
      type: object
      description: A listed Azure Storage share item. All required parameters must be populated in order to send to server.
      properties:
        Name:
          type: string
          description: Required.
        Snapshot:
          type: string
          description: ":vartype snapshot: str"
        Deleted:
          type: boolean
          description: ":vartype deleted: bool"
        Version:
          type: string
          description: ":vartype version: str"
        Properties:
          $ref: "#/components/schemas/SharePropertiesInternal"
          description: Properties of a share. Required.
        Metadata:
          type: object
          properties: {}
          description: Dictionary of .
      required:
        - Name
        - Properties
    SharePropertiesInternal:
      type: object
      description: Properties of a share. All required parameters must be populated in order to send to server.
      properties:
        Last-Modified:
          type: string
          description: Required.
        Etag:
          type: string
          description: Required.
        Quota:
          type: integer
          description: Required.
        ProvisionedIops:
          type: integer
          description: ":vartype provisioned_iops: int"
        ProvisionedIngressMBps:
          type: integer
          description: ":vartype provisioned_ingress_m_bps: int"
        ProvisionedEgressMBps:
          type: integer
          description: ":vartype provisioned_egress_m_bps: int"
        ProvisionedBandwidthMiBps:
          type: integer
          description: ":vartype provisioned_bandwidth_mi_bps: int"
        NextAllowedQuotaDowngradeTime:
          type: string
          description: ":vartype next_allowed_quota_downgrade_time: ~datetime.datetime"
        DeletedTime:
          type: string
          description: ":vartype deleted_time: ~datetime.datetime"
        RemainingRetentionDays:
          type: integer
          description: ":vartype remaining_retention_days: int"
        AccessTier:
          type: string
          description: ":vartype access_tier: str"
        AccessTierChangeTime:
          type: string
          description: ":vartype access_tier_change_time: ~datetime.datetime"
        AccessTierTransitionState:
          type: string
          description: ":vartype access_tier_transition_state: str"
        LeaseStatus:
          type: string
          description: 'The current lease status of the share. Known values are: "locked" and "unlocked".'
        LeaseState:
          type: string
          description: 'Lease state of the share. Known values are: "available", "leased", "expired", "breaking", and "broken".'
        LeaseDuration:
          type: string
          description: 'When a share is leased, specifies whether the lease is of infinite or fixed duration. Known values are: "infinite" and "fixed".'
        EnabledProtocols:
          type: string
          description: ":vartype enabled_protocols: str"
        RootSquash:
          type: string
          description: 'Known values are: "NoRootSquash", "RootSquash", and "AllSquash".'
        EnableSnapshotVirtualDirectoryAccess:
          type: boolean
          description: ":vartype enable_snapshot_virtual_directory_access: bool"
        PaidBurstingEnabled:
          type: boolean
          description: ":vartype paid_bursting_enabled: bool"
        PaidBurstingMaxIops:
          type: integer
          description: ":vartype paid_bursting_max_iops: int"
        PaidBurstingMaxBandwidthMibps:
          type: integer
          description: ":vartype paid_bursting_max_bandwidth_mibps: int"
        IncludedBurstIops:
          type: integer
          description: ":vartype included_burst_iops: int"
        MaxBurstCreditsForIops:
          type: integer
          description: ":vartype max_burst_credits_for_iops: int"
        NextAllowedProvisionedIopsDowngradeTime:
          type: string
          description: ":vartype next_allowed_provisioned_iops_downgrade_time: ~datetime.datetime"
        NextAllowedProvisionedBandwidthDowngradeTime:
          type: string
          description: ":vartype next_allowed_provisioned_bandwidth_downgrade_time: ~datetime.datetime"
        EnableSmbDirectoryLease:
          type: boolean
          description: ":vartype enable_smb_directory_lease: bool"
      required:
        - Last-Modified
        - Etag
        - Quota
    ListSharesResponse:
      type: object
      description: An enumeration of shares. All required parameters must be populated in order to send to server.
      properties:
        ServiceEndpoint:
          type: string
          description: Required.
        Prefix:
          type: string
          description: ":vartype prefix: str"
        Marker:
          type: string
          description: ":vartype marker: str"
        MaxResults:
          type: integer
          description: ":vartype max_results: int"
        ShareItems:
          type: array
          items:
            $ref: "#/components/schemas/ShareItemInternal"
          description: ":vartype share_items: list[~azure.storage.fileshare.models.ShareItemInternal]"
        NextMarker:
          type: string
          description: Required.
      required:
        - ServiceEndpoint
        - NextMarker
    Metrics:
      type: object
      description: Storage Analytics metrics for file service. All required parameters must be populated in order to send to server.
      properties:
        Version:
          type: string
          description: The version of Storage Analytics to configure. Required.
        Enabled:
          type: boolean
          description: Indicates whether metrics are enabled for the File service. Required.
        IncludeAPIs:
          type: boolean
          description: Indicates whether metrics should generate summary statistics for called API operations.
        RetentionPolicy:
          $ref: "#/components/schemas/RetentionPolicy"
          description: The retention policy.
      required:
        - Version
        - Enabled
    RetentionPolicy:
      type: object
      description: The retention policy. All required parameters must be populated in order to send to server.
      properties:
        Enabled:
          type: boolean
          description: Indicates whether a retention policy is enabled for the File service. If false, metrics data is retained, and the user is responsible for deleting it. Required.
        Days:
          type: integer
          description: Indicates the number of days that metrics data should be retained. All data older than this value will be deleted. Metrics data is deleted on a best-effort basis after the retention period expires.
      required:
        - Enabled
    CorsRule:
      type: object
      description: CORS is an HTTP feature that enables a web application running under one domain to access resources in another domain. Web browsers implement a security restriction known as same-origin policy that prevents a web page from calling APIs in a different domain; CORS provides a secure way to allow one domain (the origin domain) to call APIs in another domain. All required parameters must be populated in order to send to server.
      properties:
        AllowedOrigins:
          type: string
          description: The origin domains that are permitted to make a request against the storage service via CORS. The origin domain is the domain from which the request originates. Note that the origin must be an exact case-sensitive match with the origin that the user age sends to the service. You can also use the wildcard character '*' to allow all origin domains to make requests via CORS. Required.
        AllowedMethods:
          type: string
          description: The methods (HTTP request verbs) that the origin domain may use for a CORS request. (comma separated). Required.
        AllowedHeaders:
          type: string
          description: The request headers that the origin domain may specify on the CORS request. Required.
        ExposedHeaders:
          type: string
          description: The response headers that may be sent in the response to the CORS request and exposed by the browser to the request issuer. Required.
        MaxAgeInSeconds:
          type: integer
          description: The maximum amount time that a browser should cache the preflight OPTIONS request. Required.
      required:
        - AllowedOrigins
        - AllowedMethods
        - AllowedHeaders
        - ExposedHeaders
        - MaxAgeInSeconds
    ShareProtocolSettings:
      type: object
      description: Protocol settings.
      properties:
        Smb:
          $ref: "#/components/schemas/ShareSmbSettings"
          description: Settings for SMB protocol.
        Nfs:
          $ref: "#/components/schemas/ShareNfsSettings"
          description: Settings for NFS protocol.
    ShareSmbSettings:
      type: object
      description: Settings for SMB protocol.
      properties:
        Multichannel:
          $ref: "#/components/schemas/SmbMultichannel"
          description: Settings for SMB Multichannel.
        EncryptionInTransit:
          $ref: "#/components/schemas/ShareSmbSettingsEncryptionInTransit"
          description: Enable or disable encryption in transit.
    SmbMultichannel:
      type: object
      description: Settings for SMB multichannel.
      properties:
        Enabled:
          type: boolean
          description: If SMB multichannel is enabled.
    ShareSmbSettingsEncryptionInTransit:
      type: object
      description: Enable or disable encryption in transit.
      properties:
        Required:
          type: boolean
          description: If encryption in transit is required.
    ShareNfsSettings:
      type: object
      description: Settings for SMB protocol.
      properties:
        EncryptionInTransit:
          $ref: "#/components/schemas/ShareNfsSettingsEncryptionInTransit"
          description: Enable or disable encryption in transit.
    ShareNfsSettingsEncryptionInTransit:
      type: object
      description: Enable or disable encryption in transit.
      properties:
        Required:
          type: boolean
          description: If encryption in transit is required.
    StorageServiceProperties:
      type: object
      description: Storage service properties.
      properties:
        HourMetrics:
          $ref: "#/components/schemas/Metrics"
          description: A summary of request statistics grouped by API in hourly aggregates for files.
        MinuteMetrics:
          $ref: "#/components/schemas/Metrics"
          description: A summary of request statistics grouped by API in minute aggregates for files.
        Cors:
          type: array
          items:
            $ref: "#/components/schemas/CorsRule"
          description: The set of CORS rules.
        Protocol:
          $ref: "#/components/schemas/ShareProtocolSettings"
          description: Protocol settings.
    UserDelegationKey:
      type: object
      description: A user delegation key. All required parameters must be populated in order to send to server.
      properties:
        SignedOid:
          type: string
          description: The Azure Active Directory object ID in GUID format. Required.
        SignedTid:
          type: string
          description: The Azure Active Directory tenant ID in GUID format. Required.
        SignedStart:
          type: string
          format: date-time
          description: The date-time the key is active. Required.
        SignedExpiry:
          type: string
          format: date-time
          description: The date-time the key expires. Required.
        SignedService:
          type: string
          description: Abbreviation of the Azure Storage service that accepts the key. Required.
        SignedVersion:
          type: string
          description: The service version that created the key. Required.
        SignedDelegatedUserTid:
          type: string
          description: The delegated user tenant id in Azure AD. Return if DelegatedUserTid is specified.
        Value:
          type: string
          description: The key as a base64 string. Required.
      required:
        - SignedOid
        - SignedTid
        - SignedStart
        - SignedExpiry
        - SignedService
        - SignedVersion
        - Value
    SharePermission:
      type: object
      description: A permission (a security descriptor) at the share level. All required parameters must be populated in order to send to server.
      properties:
        permission:
          type: string
          description: The permission in the Security Descriptor Definition Language (SDDL). Required.
        format:
          type: string
          description: 'Known values are: "Sddl" and "Binary".'
      required:
        - permission
    AccessPolicy:
      type: object
      description: An Access policy.
      properties:
        Start:
          type: string
          description: The date-time the policy is active.
        Expiry:
          type: string
          description: The date-time the policy expires.
        Permission:
          type: string
          description: The permissions for the ACL policy.
    SignedIdentifier:
      type: object
      description: Signed identifier. All required parameters must be populated in order to send to server.
      properties:
        Id:
          type: string
          description: A unique id. Required.
        AccessPolicy:
          $ref: "#/components/schemas/AccessPolicy"
          description: The access policy.
      required:
        - Id
    ShareStats:
      type: object
      description: Stats for the share. All required parameters must be populated in order to send to server.
      properties:
        ShareUsageBytes:
          type: integer
          description: The approximate size of the data stored in bytes. Note that this value may not include all recently created or recently resized files. Required.
      required:
        - ShareUsageBytes
