openapi: 3.0.0
servers:
  - url: https://{endpoint}/translator
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure AI Translator - Document Translation (Data Plane)
  description: Batch and single document translation across languages and file formats.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2024-05-01-stackql-generated
  x-serviceAlias: ai_translation_document
  x-sdkPackage: azure-ai-translation-document
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    Status:
      type: string
      enum:
        - NotStarted
        - Running
        - Succeeded
        - Failed
        - Cancelled
        - Cancelling
        - ValidationFailed
    DocumentTranslationError:
      type: object
      description: This contains an outer error with error code, message, details, target and an inner error with more descriptive details. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        code:
          $ref: "#/components/schemas/TranslationErrorCode"
          description: 'Enums containing high level error codes. Required. Known values are: "InvalidRequest", "InvalidArgument", "InternalServerError", "ServiceUnavailable", "ResourceNotFound", "Unauthorized", and "RequestRateTooHigh".'
        message:
          type: string
          description: Gets high level error message. Required.
        target:
          type: string
          description: Gets the source of the error. For example it would be "documents" or "document id" in case of invalid document.
        innerError:
          $ref: "#/components/schemas/InnerTranslationError"
          description: New Inner Error format which conforms to Cognitive Services API Guidelines which is available at https://microsoft.sharepoint.com/%3Aw%3A/t/CognitiveServicesPMO/EUoytcrjuJdKpeOKIK_QRC8BPtUYQpKBi8JsWyeDMRsWlQ?e=CPq8ow. This contains required properties ErrorCode, message and optional properties target, details(key value pair), inner error(this can be nested).
      required:
        - code
        - message
    TranslationErrorCode:
      type: string
      enum:
        - InvalidRequest
        - InvalidArgument
        - InternalServerError
        - ServiceUnavailable
        - ResourceNotFound
        - Unauthorized
        - RequestRateTooHigh
    InnerTranslationError:
      type: object
      description: New Inner Error format which conforms to Cognitive Services API Guidelines which is available at https://microsoft.sharepoint.com/%3Aw%3A/t/CognitiveServicesPMO/EUoytcrjuJdKpeOKIK_QRC8BPtUYQpKBi8JsWyeDMRsWlQ?e=CPq8ow. This contains required properties ErrorCode, message and optional properties target, details(key value pair), inner error(this can be nested). Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        code:
          type: string
          description: Gets code error string. Required.
        message:
          type: string
          description: Gets high level error message. Required.
        target:
          type: string
          description: Gets the source of the error. For example it would be "documents" or "document id" in case of invalid document.
        innerError:
          $ref: "#/components/schemas/InnerTranslationError"
          description: New Inner Error format which conforms to Cognitive Services API Guidelines which is available at https://microsoft.sharepoint.com/%3Aw%3A/t/CognitiveServicesPMO/EUoytcrjuJdKpeOKIK_QRC8BPtUYQpKBi8JsWyeDMRsWlQ?e=CPq8ow. This contains required properties ErrorCode, message and optional properties target, details(key value pair), inner error(this can be nested).
      required:
        - code
        - message
    TranslationStatusSummary:
      type: object
      description: Status Summary.
      properties:
        total:
          type: integer
          description: Total count. Required.
        failed:
          type: integer
          description: Failed count. Required.
        success:
          type: integer
          description: Number of Success. Required.
        inProgress:
          type: integer
          description: Number of in progress. Required.
        notYetStarted:
          type: integer
          description: Count of not yet started. Required.
        cancelled:
          type: integer
          description: Number of cancelled. Required.
        totalCharacterCharged:
          type: integer
          description: Total characters charged by the API. Required.
      required:
        - total
        - failed
        - success
        - inProgress
        - notYetStarted
        - cancelled
        - totalCharacterCharged
    TranslationStatus:
      type: object
      description: Translation job status response.
      properties:
        id:
          type: string
          description: Id of the translation operation. Required.
        createdDateTimeUtc:
          type: string
          format: date-time
          description: Operation created date time. Required.
        lastActionDateTimeUtc:
          type: string
          format: date-time
          description: Date time in which the operation's status has been updated. Required.
        status:
          $ref: "#/components/schemas/Status"
          description: 'List of possible statuses for job or document. Required. Known values are: "NotStarted", "Running", "Succeeded", "Failed", "Cancelled", "Cancelling", and "ValidationFailed".'
        error:
          $ref: "#/components/schemas/DocumentTranslationError"
          description: This contains an outer error with error code, message, details, target and an inner error with more descriptive details.
        summary:
          $ref: "#/components/schemas/TranslationStatusSummary"
          description: Status Summary. Required.
      required:
        - id
        - createdDateTimeUtc
        - lastActionDateTimeUtc
        - status
        - summary
    PagedTranslationStatus:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TranslationStatus"
        nextLink:
          type: string
    DocumentStatus:
      type: object
      description: Document Status Response.
      properties:
        path:
          type: string
          description: Location of the document or folder.
        sourcePath:
          type: string
          description: Location of the source document. Required.
        createdDateTimeUtc:
          type: string
          format: date-time
          description: Operation created date time. Required.
        lastActionDateTimeUtc:
          type: string
          format: date-time
          description: Date time in which the operation's status has been updated. Required.
        status:
          $ref: "#/components/schemas/Status"
          description: 'List of possible statuses for job or document. Required. Known values are: "NotStarted", "Running", "Succeeded", "Failed", "Cancelled", "Cancelling", and "ValidationFailed".'
        to:
          type: string
          description: To language. Required.
        error:
          $ref: "#/components/schemas/DocumentTranslationError"
          description: This contains an outer error with error code, message, details, target and an inner error with more descriptive details.
        progress:
          type: number
          description: Progress of the translation if available. Required.
        id:
          type: string
          description: Document Id. Required.
        characterCharged:
          type: integer
          description: Character charged by the API.
      required:
        - sourcePath
        - createdDateTimeUtc
        - lastActionDateTimeUtc
        - status
        - to
        - progress
        - id
    PagedDocumentStatus:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DocumentStatus"
        nextLink:
          type: string
