paths:
  /document/batches?api-version=2024-05-01:
    get:
      operationId: DocumentTranslationClient_list_translation_statuses
      description: "Returns a list of batch requests submitted and the status for each request. Returns a list of batch requests submitted and the status for each request. This list only contains batch requests submitted by the user (based on the resource). If the number of requests exceeds our paging limit, server-side paging is used. Paginated responses indicate a partial result and include a continuation token in the response. The absence of a continuation token means that no additional pages are available. top, skip and maxpagesize query parameters can be used to specify a number of results to return and an offset for the collection. top indicates the total number of records the user wants to be returned across all pages. skip indicates the number of records to skip from the list of batches based on the sorting method specified. By default, we sort by descending start time. maxpagesize is the maximum items returned in a page. If more items are requested via top (or top is not specified and there are more items to be returned), @nextLink will contain the link to the next page. orderby query parameter can be used to sort the returned list (ex \"orderby=createdDateTimeUtc asc\" or \"orderby=createdDateTimeUtc desc\"). The default sorting is descending by createdDateTimeUtc. Some query parameters can be used to filter the returned list (ex: \"status=Succeeded,Cancelled\") will only return succeeded and cancelled operations. createdDateTimeUtcStart and createdDateTimeUtcEnd can be used combined or separately to specify a range of datetime to filter the returned list by. The supported filtering query parameters are (status, ids, createdDateTimeUtcStart, createdDateTimeUtcEnd). The server honors the values specified by the client. However, clients must be prepared to handle responses that contain a different page size or contain a continuation token. When both top and skip are included, the server should first apply skip and then top on the collection. Note: If the server can't honor top and/or skip, the server must return an error to the client informing about it instead of just ignoring the query options. This reduces the risk of the client making assumptions about the data returned."
      parameters:
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: "top indicates the total number of records the user wants to be returned across all pages. Clients MAY use top and skip query parameters to specify a number of results to return and an offset into the collection. When both top and skip are given by a client, the server SHOULD first apply skip and then top on the collection. Note: If the server can't honor top and/or skip, the server MUST return an error to the client informing about it instead of just ignoring the query options. Default value is None."
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: "skip indicates the number of records to skip from the list of records held by the server based on the sorting method specified. By default, we sort by descending start time. Clients MAY use top and skip query parameters to specify a number of results to return and an offset into the collection. When both top and skip are given by a client, the server SHOULD first apply skip and then top on the collection. Note: If the server can't honor top and/or skip, the server MUST return an error to the client informing about it instead of just ignoring the query options. Default value is None."
        - name: maxpagesize
          in: query
          required: false
          schema:
            type: integer
        - name: ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Ids to use in filtering. Default value is None.
        - name: statuses
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Statuses to use in filtering. Default value is None.
        - name: createdDateTimeUtcStart
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: the start datetime to get items after. Default value is None.
        - name: createdDateTimeUtcEnd
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: the end datetime to get items before. Default value is None.
        - name: orderby
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: "the sorting query for the collection (ex: 'CreatedDateTimeUtc asc','CreatedDateTimeUtc desc'). Default value is None."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedTranslationStatus"
  /document/batches/{id}/documents?api-version=2024-05-01:
    get:
      operationId: DocumentTranslationClient_list_document_statuses
      description: "Returns the status for all documents in a batch document translation request. Returns the status for all documents in a batch document translation request. If the number of documents in the response exceeds our paging limit, server-side paging is used. Paginated responses indicate a partial result and include a continuation token in the response. The absence of a continuation token means that no additional pages are available. top, skip and maxpagesize query parameters can be used to specify a number of results to return and an offset for the collection. top indicates the total number of records the user wants to be returned across all pages. skip indicates the number of records to skip from the list of document status held by the server based on the sorting method specified. By default, we sort by descending start time. maxpagesize is the maximum items returned in a page. If more items are requested via top (or top is not specified and there are more items to be returned), @nextLink will contain the link to the next page. orderby query parameter can be used to sort the returned list (ex \"orderby=createdDateTimeUtc asc\" or \"orderby=createdDateTimeUtc desc\"). The default sorting is descending by createdDateTimeUtc. Some query parameters can be used to filter the returned list (ex: \"status=Succeeded,Cancelled\") will only return succeeded and cancelled documents. createdDateTimeUtcStart and createdDateTimeUtcEnd can be used combined or separately to specify a range of datetime to filter the returned list by. The supported filtering query parameters are (status, ids, createdDateTimeUtcStart, createdDateTimeUtcEnd). When both top and skip are included, the server should first apply skip and then top on the collection. Note: If the server can't honor top and/or skip, the server must return an error to the client informing about it instead of just ignoring the query options. This reduces the risk of the client making assumptions about the data returned."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Format - uuid. The operation id. Required.
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: "top indicates the total number of records the user wants to be returned across all pages. Clients MAY use top and skip query parameters to specify a number of results to return and an offset into the collection. When both top and skip are given by a client, the server SHOULD first apply skip and then top on the collection. Note: If the server can't honor top and/or skip, the server MUST return an error to the client informing about it instead of just ignoring the query options. Default value is None."
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: "skip indicates the number of records to skip from the list of records held by the server based on the sorting method specified. By default, we sort by descending start time. Clients MAY use top and skip query parameters to specify a number of results to return and an offset into the collection. When both top and skip are given by a client, the server SHOULD first apply skip and then top on the collection. Note: If the server can't honor top and/or skip, the server MUST return an error to the client informing about it instead of just ignoring the query options. Default value is None."
        - name: maxpagesize
          in: query
          required: false
          schema:
            type: integer
        - name: ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Ids to use in filtering. Default value is None.
        - name: statuses
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Statuses to use in filtering. Default value is None.
        - name: createdDateTimeUtcStart
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: the start datetime to get items after. Default value is None.
        - name: createdDateTimeUtcEnd
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: the end datetime to get items before. Default value is None.
        - name: orderby
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: "the sorting query for the collection (ex: 'CreatedDateTimeUtc asc','CreatedDateTimeUtc desc'). Default value is None."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDocumentStatus"
  /document/batches/{id}/documents/{document_id}?api-version=2024-05-01:
    get:
      operationId: DocumentTranslationClient_get_document_status
      description: Returns the status for a specific document. Returns the translation status for a specific document based on the request Id and document Id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Format - uuid. The batch id. Required.
        - name: document_id
          in: path
          required: true
          schema:
            type: string
          description: Format - uuid. The document id. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStatus"
  /document/batches/{id}?api-version=2024-05-01:
    get:
      operationId: DocumentTranslationClient_get_translation_status
      description: Returns the status for a document translation request. Returns the status for a document translation request. The status includes the overall request status, as well as the status for documents that are being translated as part of that request.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Format - uuid. The operation id. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationStatus"
    delete:
      operationId: DocumentTranslationClient_cancel_translation
      description: Cancel a currently processing or queued translation. Cancel a currently processing or queued translation. A translation will not be cancelled if it is already completed or failed or cancelling. A bad request will be returned. All documents that have completed translation will not be cancelled and will be charged. All pending documents will be cancelled if possible.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Format - uuid. The operation-id. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationStatus"
  /document:translate?api-version=2024-05-01:
    post:
      operationId: SingleDocumentTranslationClient_translate
      description: Submit a single document translation request to the Document Translation service. Use this API to submit a single translation request to the Document Translation Service.
      parameters:
        - name: targetLanguage
          in: query
          required: true
          schema:
            type: string
          description: Specifies the language of the output document. The target language must be one of the supported languages included in the translation scope. For example if you want to translate the document in German language, then use targetLanguage=de. Required.
        - name: sourceLanguage
          in: query
          required: false
          schema:
            type: string
          description: Specifies source language of the input document. If this parameter isn't specified, automatic language detection is applied to determine the source language. For example if the source document is written in English, then use sourceLanguage=en. Default value is None.
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: "A string specifying the category (domain) of the translation. This parameter is used to get translations from a customized system built with Custom Translator. Add the Category ID from your Custom Translator project details to this parameter to use your deployed customized system. Default value is: general. Default value is None."
        - name: allowFallback
          in: query
          required: false
          schema:
            type: boolean
          description: "Specifies that the service is allowed to fall back to a general system when a custom system doesn't exist. Possible values are: true (default) or false. Default value is None."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                document:
                  type: object
                  properties: {}
                  description: Document to be translated in the form. Required.
                glossary:
                  type: array
                  items:
                    type: object
                    properties: {}
                  description: Glossary-translation memory will be used during translation in the form.
              required:
                - document
      responses:
        "200":
          description: Success
