          description: Registry login server name. This is likely to be similar to {registry-name}.azurecr.io. Required.
        imageName:
          type: string
          description: Image name. Required.
        tag:
          $ref: "#/components/schemas/TagAttributesBase"
          description: List of tag attribute details. Required.
    ManifestAttributesBase:
      type: object
      description: Manifest details.
      properties:
        digest:
          type: string
          description: Manifest. Required.
        imageSize:
          type: integer
          description: Image size.
        createdTime:
          type: string
          format: date-time
          description: Created time. Required.
        lastUpdateTime:
          type: string
          format: date-time
          description: Last update time. Required.
        architecture:
          $ref: "#/components/schemas/ArtifactArchitecture"
          description: 'CPU architecture. Known values are: "386", "amd64", "arm", "arm64", "mips", "mipsle", "mips64", "mips64le", "ppc64", "ppc64le", "riscv64", "s390x", and "wasm".'
        os:
          $ref: "#/components/schemas/ArtifactOperatingSystem"
          description: 'Operating system. Known values are: "aix", "android", "darwin", "dragonfly", "freebsd", "illumos", "ios", "js", "linux", "netbsd", "openbsd", "plan9", "solaris", and "windows".'
        references:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactManifestPlatform"
          description: List of artifacts that are referenced by this manifest list, with information about the platform each supports. This list will be empty if this is a leaf manifest and not a manifest list.
        configMediaType:
          type: string
          description: Config blob media type.
        tags:
          type: array
          items:
            type: string
          description: List of tags.
        changeableAttributes:
          $ref: "#/components/schemas/ManifestWriteableProperties"
          description: Writeable properties of the resource.
    ArtifactArchitecture:
      type: string
      enum:
        - "386"
        - amd64
        - arm
        - arm64
        - mips
        - mipsle
        - mips64
        - mips64le
        - ppc64
        - ppc64le
        - riscv64
        - s390x
        - wasm
    ArtifactOperatingSystem:
      type: string
      enum:
        - aix
        - android
        - darwin
        - dragonfly
        - freebsd
        - illumos
        - ios
        - js
        - linux
        - netbsd
        - openbsd
        - plan9
        - solaris
        - windows
    ArtifactManifestPlatform:
      type: object
      description: The artifact's platform, consisting of operating system and architecture.
      properties:
        digest:
          type: string
          description: Manifest digest. Required.
        architecture:
          $ref: "#/components/schemas/ArtifactArchitecture"
          description: 'CPU architecture. Known values are: "386", "amd64", "arm", "arm64", "mips", "mipsle", "mips64", "mips64le", "ppc64", "ppc64le", "riscv64", "s390x", and "wasm".'
        os:
          $ref: "#/components/schemas/ArtifactOperatingSystem"
          description: 'Operating system. Known values are: "aix", "android", "darwin", "dragonfly", "freebsd", "illumos", "ios", "js", "linux", "netbsd", "openbsd", "plan9", "solaris", and "windows".'
    ManifestWriteableProperties:
      type: object
      description: Changeable attributes.
      properties:
        deleteEnabled:
          type: boolean
          description: Delete enabled.
        writeEnabled:
          type: boolean
          description: Write enabled.
        listEnabled:
          type: boolean
          description: List enabled.
        readEnabled:
          type: boolean
          description: Read enabled.
    AcrManifests:
      type: object
      description: Manifest attributes.
      properties:
        registry:
          type: string
          description: Registry login server name. This is likely to be similar to {registry-name}.azurecr.io.
        imageName:
          type: string
          description: Image name.
        manifests:
          type: array
          items:
            $ref: "#/components/schemas/ManifestAttributesBase"
          description: List of manifests.
        link:
          type: string
          description: Link to the next page of results.
    ArtifactManifestProperties:
      type: object
      description: Manifest attributes details.
      properties:
        registry:
          type: string
          description: Registry login server name. This is likely to be similar to {registry-name}.azurecr.io.
        imageName:
          type: string
          description: Repository name.
        manifest:
          $ref: "#/components/schemas/ManifestAttributesBase"
          description: Manifest attributes. Required.
