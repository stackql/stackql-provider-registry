  /{next_blob_uuid_link}?api-version=2021-07-01:
    get:
      operationId: ContainerRegistryBlob_get_upload_status
      description: Retrieve status of upload identified by uuid. The primary purpose of this endpoint is to resolve the current status of a resumable upload.
      parameters:
        - name: next_blob_uuid_link
          in: path
          required: true
          schema:
            type: string
          description: Link acquired from upload start or previous chunk. Note, do not include initial / (must do substring(1) ). Required.
      responses:
        "200":
          description: Success
    patch:
      operationId: ContainerRegistryBlob_upload_chunk
      description: Upload a stream of data without completing the upload.
      parameters:
        - name: next_blob_uuid_link
          in: path
          required: true
          schema:
            type: string
          description: Link acquired from upload start or previous chunk. Note, do not include initial / (must do substring(1) ). Required.
      responses:
        "200":
          description: Success
    put:
      operationId: ContainerRegistryBlob_complete_upload
      description: Complete the upload, providing all the data in the body, if necessary. A request without a body will just complete the upload with previously uploaded content.
      parameters:
        - name: next_blob_uuid_link
          in: path
          required: true
          schema:
            type: string
          description: Link acquired from upload start or previous chunk. Note, do not include initial / (must do substring(1) ). Required.
        - name: digest
          in: query
          required: true
          schema:
            type: string
          description: Digest of a BLOB. Required.
      responses:
        "200":
          description: Success
    delete:
      operationId: ContainerRegistryBlob_cancel_upload
      description: Cancel outstanding upload processes, releasing associated resources. If this is not called, the unfinished uploads will eventually timeout.
      parameters:
        - name: next_blob_uuid_link
          in: path
          required: true
          schema:
            type: string
          description: Link acquired from upload start or previous chunk. Note, do not include initial / (must do substring(1) ). Required.
      responses:
        "204":
          description: Success (no content / accepted)
