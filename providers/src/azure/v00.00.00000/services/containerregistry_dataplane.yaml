paths:
  /oauth2/token?api-version=2021-07-01:
    get:
      operationId: Authentication_get_acr_access_token_from_login
      description: Exchange Username, Password and Scope for an ACR Access Token.
      parameters:
        - name: service
          in: query
          required: true
          schema:
            type: string
          description: Indicates the name of your Azure container registry. Required.
        - name: scope
          in: query
          required: true
          schema:
            type: string
          description: Expected to be a valid scope, and can be specified more than once for multiple scope requests. You can obtain this from the Www-Authenticate response header from the challenge. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcrAccessToken"
  /oauth2/exchange:
    post:
      operationId: Authentication_exchange_aad_access_token_for_acr_refresh_token
      description: Exchange AAD tokens for an ACR refresh Token.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                grantType:
                  $ref: "#/components/schemas/PostContentSchemaGrantType"
                  description: 'Can take a value of access_token_refresh_token, or access_token, or refresh_token. Required. Known values are: "access_token_refresh_token", "access_token", and "refresh_token".'
                service:
                  type: string
                  description: Indicates the name of your Azure container registry. Required.
                tenant:
                  type: string
                  description: AAD tenant associated to the AAD credentials.
                refreshToken:
                  type: string
                  description: AAD refresh token, mandatory when grant_type is access_token_refresh_token or refresh_token.
                accessToken:
                  type: string
                  description: AAD access token, mandatory when grant_type is access_token_refresh_token or access_token.
              required:
                - grantType
                - service
      responses:
        "200":
