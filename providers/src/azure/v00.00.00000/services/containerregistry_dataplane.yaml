          type: string
          description: Tag name. Required.
        digest:
          type: string
          description: Tag digest. Required.
        createdTime:
          type: string
          format: date-time
          description: Tag created time. Required.
        lastUpdateTime:
          type: string
          format: date-time
          description: Tag last update time. Required.
        signed:
          type: boolean
          description: Is signed.
        changeableAttributes:
