  /subscriptions/{subscription_id}/resources?api-version=2025-04-01:
    get:
      operationId: Resources_list
      description: Get all the resources in a subscription.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: $filter
          in: query
          required: false
          schema:
            type: string
          description: "The filter to apply on the operation.Filter comparison operators include `eq` (equals) and `ne` (not equals) and may be used with the following properties: `location`, `resourceType`, `name`, `resourceGroup`, `identity`, `identity/principalId`, `plan`, `plan/publisher`, `plan/product`, `plan/name`, `plan/version`, and `plan/promotionCode`.For example, to filter by a resource type, use `$filter=resourceType eq 'Microsoft.Network/virtualNetworks'``substringof(value, property)` can be used to filter for substrings of the following currently-supported properties: `name` and `resourceGroup`For example, to get all resources with 'demo' anywhere in the resource name, use `$filter=substringof('demo', name)`Multiple substring operations can also be combined using `and`/`or` operators.Note that any truncated number of results queried via `$top` may also not be compatible when using a filter.Resources can be filtered by tag names and values. For example, to filter for a tag name and value, use `$filter=tagName eq 'tag1' and tagValue eq 'Value1'`. Note that when resources are filtered by tag name and value, the original tags for each resource will not be returned in the results. Any list of additional properties queried via `$expand` may also not be compatible when filtering by tag names/values. For tag names only, resources can be filtered by prefix using the following syntax: `$filter=startswith(tagName, 'depart')`. This query will return all resources with a tag name prefixed by the phrase `depart` (i.e.`department`, `departureDate`, `departureTime`, etc.)Note that some properties can be combined when filtering resources, which include the following: `substringof() and/or resourceType`, `plan and plan/publisher and plan/name`, and `identity and identity/principalId`. Default value is None."
        - name: $expand
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of additional properties to be included in the response. Valid values include `createdTime`, `changedTime` and `provisioningState`. For example, `$expand=createdTime,changedTime`. Default value is None.
        - name: $top
          in: query
          required: false
          schema:
            type: integer
          description: The number of recommendations per page if a paged version of this API is being used. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedGenericResourceExpanded"
