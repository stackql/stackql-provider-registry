          description: The fully qualified Azure Resource manager identifier of the resource. Required.
        - name: $expand
          in: query
          required: false
          schema:
            type: string
          description: May be used to expand the properties/additionalInfo or properties/meterDetails within a list of usage details. By default, these fields are not included when listing usage details. Default value is None.
        - name: $filter
          in: query
          required: false
          schema:
            type: string
          description: May be used to filter usageDetails by properties/resourceGroup, properties/resourceName, properties/resourceId, properties/chargeType, properties/reservationId, properties/publisherType or tags. The filter supports 'eq', 'lt', 'gt', 'le', 'ge', and 'and'. It does not currently support 'ne', 'or', or 'not'. Tag filter is a key value pair string where key and value is separated by a colon (:). PublisherType Filter accepts two values azure and marketplace and it is currently supported for Web Direct Offer Type. Default value is None.
        - name: $skiptoken
          in: query
          required: false
          schema:
            type: string
          description: Skiptoken is only used if a previous operation returned a partial result. If a previous response contains a nextLink element, the value of the nextLink element will include a skiptoken parameter that specifies a starting point to use for subsequent calls. Default value is None.
        - name: $top
          in: query
          required: false
          schema:
            type: integer
          description: May be used to limit the number of results to the most recent N usageDetails. Default value is None.
        - name: metric
          in: query
          required: false
          schema:
            type: string
          description: 'Allows to select different type of cost/usage records. Known values are: "actualcost", "amortizedcost", and "usage". Default value is None.'
