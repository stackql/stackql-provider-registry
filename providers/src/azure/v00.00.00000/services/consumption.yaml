      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  $ref: "#/components/schemas/BudgetProperties"
                  description: The properties of the budget.
                eTag:
                  type: string
                  description: eTag of the resource. To handle concurrent update scenario, this field will be used to determine whether the user is updating the latest version or not.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
    delete:
      operationId: Budgets_delete
      description: The operation to delete a budget.
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: The fully qualified Azure Resource manager identifier of the resource. Required.
        - name: budget_name
          in: path
          required: true
