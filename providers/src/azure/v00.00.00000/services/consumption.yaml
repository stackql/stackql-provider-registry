      operationId: Budgets_create_or_update
      description: The operation to create or update a budget. You can optionally provide an eTag if desired as a form of concurrency control. To obtain the latest eTag for a given budget, perform a get operation prior to your put operation.
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: The fully qualified Azure Resource manager identifier of the resource. Required.
        - name: budget_name
          in: path
          required: true
          schema:
            type: string
