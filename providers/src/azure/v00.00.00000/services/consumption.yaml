    BudgetProperties:
      type: object
      description: The properties of the budget.
      properties:
        category:
          $ref: "#/components/schemas/CategoryType"
          description: The category of the budget, whether the budget tracks cost or usage. Required. "Cost"
        amount:
          type: number
          description: The total amount of cost to track with the budget. Required.
        timeGrain:
          $ref: "#/components/schemas/TimeGrainType"
          description: 'The time covered by a budget. Tracking of the amount will be reset based on the time grain. BillingMonth, BillingQuarter, and BillingAnnual are only supported by WD customers. Required. Known values are: "Monthly", "Quarterly", "Annually", "BillingMonth", "BillingQuarter", and "BillingAnnual".'
        timePeriod:
          $ref: "#/components/schemas/BudgetTimePeriod"
          description: Has start and end date of the budget. The start date must be first of the month and should be less than the end date. Budget start date must be on or after June 1, 2017. Future start date should not be more than twelve months. Past start date should be selected within the timegrain period. There are no restrictions on the end date. Required.
        filter:
          $ref: "#/components/schemas/BudgetFilter"
          description: May be used to filter budgets by user-specified dimensions and/or tags.
        currentSpend:
          $ref: "#/components/schemas/CurrentSpend"
          description: The current amount of cost which is being tracked for a budget.
        notifications:
          type: object
          properties: {}
          description: Dictionary of notifications associated with the budget. Budget can have up to five notifications.
        forecastSpend:
          $ref: "#/components/schemas/ForecastSpend"
          description: The forecasted cost which is being tracked for a budget.
      required:
        - category
        - amount
        - timeGrain
        - timePeriod
    CategoryType:
      type: string
      enum:
        - Cost
    TimeGrainType:
      type: string
      enum:
        - Monthly
        - Quarterly
        - Annually
        - BillingMonth
        - BillingQuarter
        - BillingAnnual
    BudgetTimePeriod:
      type: object
      description: The start and end date for a budget.
      properties:
        startDate:
          type: string
          format: date-time
          description: The start date for the budget. Required.
        endDate:
          type: string
          format: date-time
          description: The end date for the budget. If not provided, we default this to 10 years from the start date.
      required:
        - startDate
    BudgetFilter:
      type: object
      description: May be used to filter budgets by resource group, resource, or meter.
      properties:
        and:
          type: array
          items:
            $ref: "#/components/schemas/BudgetFilterProperties"
          description: The logical "AND" expression. Must have at least 2 items.
        dimensions:
          $ref: "#/components/schemas/BudgetComparisonExpression"
          description: Has comparison expression for a dimension.
        tags:
