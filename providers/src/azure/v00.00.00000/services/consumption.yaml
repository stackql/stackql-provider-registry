  /providers/Microsoft.Billing/billingAccounts/{billing_account_id}/providers/Microsoft.Consumption/reservationTransactions?api-version=2024-08-01:
    get:
      operationId: ReservationTransactions_list
      description: "List of transactions for reserved instances on billing account scope. Note: The refund transactions are posted along with its purchase transaction (i.e. in the purchase billing month). For example, The refund is requested in May 2021. This refund transaction will have event date as May 2021 but the billing month as April 2020 when the reservation purchase was made. Note: ARM has a payload size limit of 12MB, so currently callers get 400 when the response size exceeds the ARM limit. In such cases, API call should be made with smaller date ranges."
      parameters:
        - name: billing_account_id
          in: path
          required: true
          schema:
            type: string
          description: BillingAccount ID. Required.
        - name: $filter
          in: query
          required: false
          schema:
            type: string
          description: "Filter reservation transactions by date range. The properties/EventDate for start date and end date. The filter supports 'le' and 'ge'. Note: API returns data for the entire start date's and end date's billing month. For example, filter properties/eventDate+ge+2020-01-01+AND+properties/eventDate+le+2020-12-29 will include data for the entire December 2020 month (i.e. will contain records for dates December 30 and 31). Default value is None."
        - name: useMarkupIfPartner
          in: query
          required: false
          schema:
            type: boolean
          description: Applies mark up to the transactions if the caller is a partner. Default value is None.
        - name: previewMarkupPercentage
          in: query
          required: false
          schema:
            type: number
          description: Preview markup percentage to be applied. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedReservationTransactionFlattened"
