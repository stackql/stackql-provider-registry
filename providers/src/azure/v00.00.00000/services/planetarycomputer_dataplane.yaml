        maxItemsPerTile:
          type: integer
          description: Maximum number of items to include in a single tile. Required.
        defaultLocation:
          $ref: "#/components/schemas/DefaultLocation"
          description: Default map location when displaying this collection.
      required:
        - minZoom
        - maxItemsPerTile
