      type: object
      description: Defines a default geographic location for map visualization.
      properties:
        zoom:
          type: integer
          description: Default zoom level for the map. Required.
        coordinates:
          type: array
          items:
            type: number
          description: Default center coordinates [latitude, longitude] for the map. Required.
      required:
        - zoom
        - coordinates
