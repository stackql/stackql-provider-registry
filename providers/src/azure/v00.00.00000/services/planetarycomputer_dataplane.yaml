      type: object
      description: Defines a named mosaic with filtering criteria.
      properties:
        id:
          type: string
          description: Unique identifier for the mosaic. Required.
        name:
          type: string
          description: Short descriptive name for the mosaic. Required.
        description:
          type: string
          description: Detailed description of the mosaic.
        cql:
          type: array
          items:
            type: object
            properties: {}
          description: A list of valid CQL2-JSON expressions used to filter the collection to moasic. Required.
      required:
        - id
        - name
        - cql
    RenderOption:
      type: object
      description: Defines visualization parameters for rendering data on a map.
      properties:
        id:
          type: string
          description: Unique identifier for the render option. Required.
        name:
          type: string
          description: Short descriptive name for the render option. Required.
        description:
          type: string
          description: A longer description of the render option that can be used to explain its content.
        type:
          $ref: "#/components/schemas/RenderOptionType"
          description: 'The type of rendering to apply (raster or vector). Known values are: "raster-tile", "vt-polygon", and "vt-line".'
        options:
          type: string
          description: A URL query-string encoded string of TiTiler rendering options. Valid only for `raster-tile` types. See `Query Parameters `_.
        vectorOptions:
          $ref: "#/components/schemas/RenderOptionVectorOptions"
          description: Options for rendering vector tiles. Valid only for `vt-polygon` and `vt-line` types.
        minZoom:
          type: integer
          description: Minimum zoom level at which to display this layer.
        legend:
          $ref: "#/components/schemas/RenderOptionLegend"
          description: Legend configuration for this render option.
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/RenderOptionCondition"
          description: A list of property/value conditions that must be in the active mosaic CQL for this render option to be enabled.
      required:
        - id
        - name
    RenderOptionType:
      type: string
      enum:
        - raster-tile
        - vt-polygon
        - vt-line
    RenderOptionVectorOptions:
      type: object
      description: Defines parameters for vector tile rendering.
      properties:
        tilejsonKey:
          type: string
          description: Asset key containing the TileJSON URL. Required.
        sourceLayer:
          type: string
          description: Name of the source layer in the vector tiles. Required.
        fillColor:
          type: string
          description: Fill color for polygon features.
        strokeColor:
          type: string
          description: Stroke color for line features.
        strokeWidth:
          type: integer
          description: Width of line strokes in pixels.
        filter:
          type: array
          items:
            type: string
          description: MapBox GL filter expression to filter features.
      required:
        - tilejsonKey
        - sourceLayer
    RenderOptionLegend:
      type: object
      description: Configuration for generating a data legend.
      properties:
        type:
          $ref: "#/components/schemas/LegendConfigType"
          description: 'Legend type to make, one of: `continuous`, `classmap`, `interval` or `none` (note, `none` is a string literal). Known values are: "continuous", "classmap", "interval", and "none".'
        labels:
          type: array
          items:
            type: string
          description: Text labels to display on the legend.
        trimStart:
          type: integer
          description: The number of items to trim from the start of the legend definition. Used if there are values important for rendering (e.g. nodata) that aren't desirable in the legend.
        trimEnd:
          type: integer
          description: Number of items to trim from the end of the legend.
        scaleFactor:
          type: number
          description: A factor to multiply interval legend labels by. Useful for scaled rasters whose colormap definitions map to unscaled values, effectively showing legend labels as scaled values.
    LegendConfigType:
      type: string
      enum:
        - continuous
        - classmap
        - interval
        - none
    RenderOptionCondition:
      type: object
