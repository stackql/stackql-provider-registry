  /stac/search?api-version=2026-04-15:
    post:
      operationId: Stac_search
      description: Search. STAC search operation.
      parameters:
        - name: sign
          in: query
          required: false
          schema:
            type: string
          description: 'Whether to sign asset URLs in the response. Known values are: "true" and "false". Default value is None.'
        - name: duration
          in: query
          required: false
          schema:
            type: integer
          description: URL signature duration in minutes. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                collections:
                  type: array
                  items:
                    type: string
                  description: List of collection IDs to search within.
                ids:
                  type: array
                  items:
                    type: string
                  description: List of specific item IDs to return.
                bbox:
                  type: array
                  items:
                    type: number
                  description: Bounding box for spatial filtering in format [west, south, east, north].
                intersects:
                  $ref: "#/components/schemas/Geometry"
                  description: GeoJSON geometry for spatial filtering.
                datetime:
                  type: string
                  description: Temporal filter in RFC 3339 format, can be a single time or range.
                limit:
                  type: integer
                  description: Maximum number of results to return.
                conf:
                  type: object
                  properties: {}
                  description: Conf Overrides datetime validation from the base request model.
                query:
                  type: object
                  properties: {}
                  description: STAC Query See the `STAC Query Extension `_.
                sortby:
                  type: array
                  items:
                    $ref: "#/components/schemas/StacSortExtension"
                  description: Sort criteria for the search results. See the `STAC Sort Extension `_.
                fields:
                  type: array
                  items:
                    $ref: "#/components/schemas/SearchOptionsFields"
                  description: Specifies which fields to include or exclude in the STAC search results. See the `STAC Fields Extension `_.
                filter:
                  type: object
                  properties: {}
                  description: CQL2 Filter See the `STAC Filter Extension `_.
                filter-crs:
                  type: string
                  description: Coordinate reference system for the filter.
                filter-lang:
                  $ref: "#/components/schemas/FilterLanguage"
                  description: 'Filter language to use for the filter expression. Known values are: "cql-json", "cql2-json", and "cql2-text".'
                token:
                  type: string
                  description: Pagination token for fetching the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StacItemCollection"
