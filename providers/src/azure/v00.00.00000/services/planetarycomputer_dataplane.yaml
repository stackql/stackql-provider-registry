  /stac/collections/{collection_id}/items?api-version=2026-04-15:
    get:
      operationId: Stac_get_item_collection
      description: Fetch features of the feature collection with id `collectionId`. Every feature in a dataset belongs to a collection. A dataset may consist of multiple feature collections. A feature collection is often a collection of features of a similar type, based on a common schema.
      parameters:
        - name: collection_id
          in: path
          required: true
          schema:
            type: string
          description: Catalog collection id. Required.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: The optional limit parameter recommends the number of items that should be present in the response document. If the limit parameter value is greater than advertised limit maximum, the server must return the maximum possible number of items, rather than responding with an error. Only items are counted that are on the first level of the collection in the response document. Nested objects contained within the explicitly requested items must not be counted. Minimum = 1. Maximum = 10000. Default = 10. Default value is None.
        - name: bbox
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: "Only features that have a geometry that intersects the bounding box are selected. The bounding box is provided as four or six numbers, depending on whether the coordinate reference system includes a vertical axis (height or depth): * Lower left corner, coordinate axis 1 * Lower left corner, coordinate axis 2 * Minimum value, coordinate axis 3 (optional) * Upper right corner, coordinate axis 1 * Upper right corner, coordinate axis 2 * Maximum value, coordinate axis 3 (optional) The coordinate reference system of the values is WGS 84 longitude/latitude (`http://www.opengis.net/def/crs/OGC/1.3/CRS84 `_). For WGS 84 longitude/latitude the values are in most cases the sequence of minimum longitude, minimum latitude, maximum longitude and maximum latitude. However, in cases where the box spans the antimeridian the first value (west-most box edge) is larger than the third value (east-most box edge). If the vertical axis is included, the third and the sixth number are the bottom and the top of the 3-dimensional bounding box. If a feature has multiple spatial geometry properties, it is the decision of the server whether only a single spatial geometry property is used to determine the extent or all relevant geometries. Default value is None."
        - name: datetime
          in: query
          required: false
          schema:
            type: string
          description: 'Either a date-time or an interval, open or closed. Date and time expressions adhere to RFC 3339. Open intervals are expressed using double-dots. Examples: * A date-time: "2018-02-12T23:20:50Z" * A closed interval: "2018-02-12T00:00:00Z/2018-03-18T12:31:12Z" * Open intervals: "2018-02-12T00:00:00Z/.." or "../2018-03-18T12:31:12Z" Only features that have a temporal property that intersects the value of `datetime` are selected. If a feature has multiple temporal properties, it is the decision of the server whether only a single temporal property is used to determine the extent or all relevant temporal properties. Default value is None.'
        - name: sign
          in: query
          required: false
          schema:
            type: string
          description: 'Whether to sign asset URLs in the response. Known values are: "true" and "false". Default value is None.'
        - name: duration
          in: query
          required: false
          schema:
            type: integer
          description: URL signature duration in minutes. Default value is None.
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: Pagination token for fetching the next set of results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StacItemCollection"
    post:
      operationId: Stac_begin_create_item
      description: Create a new STAC item or a set of items in a collection.
      parameters:
        - name: collection_id
          in: path
          required: true
          schema:
            type: string
          description: Catalog collection id. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: 'Discriminator property for StacItemOrStacItemCollection. Required. Known values are: "Feature" and "FeatureCollection".'
                stac_version:
                  type: string
                  description: Stac Version.
                links:
                  type: array
                  items:
                    $ref: "#/components/schemas/StacLink"
                  description: Links to related resources and endpoints.
                msft:_created:
                  type: string
                  format: date-time
                  description: MSFT Created.
                msft:_updated:
                  type: string
                  format: date-time
                  description: MSFT Updated.
                msft:short_description:
                  type: string
                  description: MSFT Short Description.
                stac_extensions:
                  type: array
                  items:
                    type: string
                  description: URLs to STAC extensions implemented by this STAC resource.
              required:
                - type
      responses:
        "204":
          description: Success (no content / accepted)
