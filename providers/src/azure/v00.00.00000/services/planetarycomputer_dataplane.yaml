  /data/mosaic/searches/{search_id}/tiles/{tile_matrix_set_id}/{z}/{x}/{y}/assets?api-version=2026-04-15:
    get:
      operationId: Data_get_search_assets_for_tile
      description: Searches Assets For Tile Tilematrixsetid As Path. Return a list of assets which overlap a given tile.
      parameters:
        - name: search_id
          in: path
          required: true
          schema:
            type: string
          description: Search Id (pgSTAC Search Hash). Required.
        - name: tile_matrix_set_id
          in: path
          required: true
          schema:
            type: string
          description: Identifier selecting one of the TileMatrixSetId supported. Required.
        - name: z
          in: path
          required: true
          schema:
            type: number
          description: Identifier (Z) selecting one of the scales defined in the TileMatrixSet and representing the scaleDenominator the tile. Required.
        - name: x
          in: path
          required: true
          schema:
            type: number
          description: Column (X) index of the tile on the selected TileMatrix. It cannot exceed the MatrixHeight-1 for the selected TileMatrix. Required.
        - name: "y"
          in: path
          required: true
          schema:
            type: number
          description: Row (Y) index of the tile on the selected TileMatrix. It cannot exceed the MatrixWidth-1 for the selected TileMatrix. Required.
        - name: collection
          in: query
          required: true
          schema:
            type: string
          description: STAC Collection Identifier. Required.
        - name: scan_limit
          in: query
          required: false
          schema:
            type: integer
          description: Return as soon as we scan N items (defaults to 10000). Default value is None.
        - name: items_limit
          in: query
          required: false
          schema:
            type: integer
          description: Return as soon as we have N items per geometry (defaults to 100). Default value is None.
        - name: time_limit
          in: query
          required: false
          schema:
            type: integer
          description: Return after N seconds to avoid long requests (defaults to 5). Default value is None.
        - name: exitwhenfull
          in: query
          required: false
          schema:
            type: boolean
          description: Return as soon as the geometry is fully covered (defaults to True). Default value is None.
        - name: skipcovered
          in: query
          required: false
          schema:
            type: boolean
          description: Skip any items that would show up completely under the previous items (defaults to True). Default value is None.
        - name: subdataset_name
          in: query
          required: false
          schema:
            type: string
          description: The name of a subdataset within the asset. Default value is None.
        - name: subdataset_bands
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          description: The index of a subdataset band within the asset. Default value is None.
        - name: crs
          in: query
          required: false
          schema:
            type: string
          description: Coordinate Reference System. Default value is None.
        - name: datetime
          in: query
          required: false
          schema:
            type: string
          description: Datetime to use for subsetting the asset. Default value is None.
        - name: sel_method
          in: query
          required: false
          schema:
            type: string
          description: 'Xarray indexing method to use for inexact matches. Known values are: "nearest", "linear", "bilinear", "cubic", "cubic_spline", "lanczos", "area", and "mode". Default value is None.'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TilerAssetGeoJson"
