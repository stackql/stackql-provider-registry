      type: object
      description: Configuration for data mosaic visualization.
      properties:
        mosaics:
          type: array
          items:
            $ref: "#/components/schemas/StacMosaic"
          description: Predefined data mosaics available for this collection. Required.
        renderOptions:
          type: array
          items:
            $ref: "#/components/schemas/RenderOption"
          description: Available render options for visualizing the data. Required.
        defaultLocation:
          $ref: "#/components/schemas/DefaultLocation"
          description: Default map location when displaying this collection.
