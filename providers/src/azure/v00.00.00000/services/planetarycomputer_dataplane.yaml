  /data/mosaic/collections/{collection_id}/items/{item_id}/asset_statistics?api-version=2026-04-15:
    get:
      operationId: Data_get_item_asset_statistics
      description: Item Asset Statistics. Per asset statistics for a STAC item.
      parameters:
        - name: collection_id
          in: path
          required: true
          schema:
            type: string
          description: STAC Collection Identifier. Required.
        - name: item_id
          in: path
          required: true
          schema:
            type: string
          description: STAC Item Identifier. Required.
        - name: asset_bidx
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Per asset band indexes (coma separated indexes, e.g. "image|1,2,3" means use the bands 1, 2, and 3 from the asset named "image"). Default value is None.
        - name: nodata
          in: query
          required: false
          schema:
            type: string
          description: Overwrite internal Nodata value. Default value is None.
        - name: unscale
          in: query
          required: false
          schema:
            type: boolean
          description: Apply internal Scale or Offset. Default value is None.
        - name: reproject
          in: query
          required: false
          schema:
            type: string
          description: 'WarpKernel resampling algorithm (only used when doing re-projection). Defaults to `nearest`. Known values are: "nearest", "bilinear", "cubic", "cubic_spline", "lanczos", "average", "mode", "max", "min", "med", "q1", "q3", "sum", and "rms". Default value is None.'
        - name: resampling
          in: query
          required: false
          schema:
            type: string
          description: 'Resampling method. Known values are: "nearest", "bilinear", "cubic", "cubic_spline", "lanczos", "average", "mode", "gauss", and "rms". Default value is None.'
        - name: max_size
          in: query
          required: false
          schema:
            type: integer
          description: Maximum dimension in pixels for the source data used to calculate statistics. Default value is None.
        - name: categorical
          in: query
          required: false
          schema:
            type: boolean
          description: Return statistics for categorical dataset. Default value is None.
        - name: c
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          description: List of pixel categorical values for which to report counts. Default value is None.
        - name: p
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          description: List of percentile values (default to [2, 98]). Default value is None.
        - name: histogram_bins
          in: query
          required: false
          schema:
            type: string
          description: "Defines the number of equal-width bins in the given range (10, by default). If bins is a sequence (comma `,` delimited values), it defines a monotonically increasing array of bin edges, including the rightmost edge, allowing for non-uniform bin widths. link: `https://numpy.org/doc/stable/reference/generated/numpy.histogram.html `_. Default value is None."
        - name: histogram_range
          in: query
          required: false
          schema:
            type: string
          description: "Comma `,` delimited range of the bins. The lower and upper range of the bins. If not provided, range is simply (a.min(), a.max()). Values outside the range are ignored. The first element of the range must be less than or equal to the second. range affects the automatic bin computation as well. link: `https://numpy.org/doc/stable/reference/generated/numpy.histogram.html `_. Default value is None."
        - name: subdataset_name
          in: query
          required: false
          schema:
            type: string
          description: The name of a subdataset within the asset. Default value is None.
        - name: subdataset_bands
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          description: The index of a subdataset band within the asset. Default value is None.
        - name: crs
          in: query
          required: false
          schema:
            type: string
          description: Coordinate Reference System. Default value is None.
        - name: datetime
          in: query
          required: false
          schema:
            type: string
          description: Datetime to use for subsetting the asset. Default value is None.
        - name: sel_method
          in: query
          required: false
          schema:
            type: string
          description: 'Xarray indexing method to use for inexact matches. Known values are: "nearest", "linear", "bilinear", "cubic", "cubic_spline", "lanczos", "area", and "mode". Default value is None.'
        - name: asset_expression
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Per asset band expression. Default value is None.
        - name: height
          in: query
          required: false
          schema:
            type: integer
          description: Force output image height. Default value is None.
        - name: width
          in: query
          required: false
          schema:
            type: integer
          description: Force output image width. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetStatisticsResponse"
