  /data/legend/interval/{classmap_name}?api-version=2026-04-15:
    get:
      operationId: Data_get_interval_legend
      description: "Get Interval Legend. Generate values and color swatches mapping for a given interval classmap. Returns a color map for intervals, where each interval is defined by a numeric range [min, max] representing the interval boundaries and an RGBA color [red, green, blue, alpha] associated with the interval. The response is a 2D array of interval definitions, where each element is a pair: the first element is an array of two numbers [min, max] defining the interval, and the second element is an array of four numbers [red, green, blue, alpha] defining the RGBA color. Example: [[ [-2, 0], [0, 0, 0, 0] ], [ [1, 32], [255, 255, 178, 255] ]]. This defines two intervals: [-2, 0] mapped to transparent black and [1, 32] mapped to opaque yellow."
      parameters:
        - name: classmap_name
          in: path
          required: true
          schema:
            type: string
          description: classmap name. Required.
        - name: trim_start
          in: query
          required: false
          schema:
            type: integer
          description: Number of items to trim from the start of the cmap. Default value is None.
        - name: trim_end
          in: query
          required: false
