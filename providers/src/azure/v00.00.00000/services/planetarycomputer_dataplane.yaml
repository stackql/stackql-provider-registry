openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Planetary Computer Pro Client
  description: PlanetaryComputerProClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-04-15-stackql-generated
  x-serviceAlias: planetarycomputer_dataplane
  x-sdkPackage: azure-planetarycomputer
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    TileMatrixSetBoundingBox:
      type: object
      description: Geographic extent of the tile matrix set expressed in the specified coordinate reference system.
      properties:
        lowerLeft:
          type: array
          items:
            type: string
          description: Lower-left corner coordinates [x, y] of bounding box. Required.
        upperRight:
          type: array
          items:
            type: string
          description: Upper-right corner coordinates [x, y] of bounding box. Required.
        crs:
          type: string
          description: Coordinate reference system identifier.
        orderedAxes:
          type: array
          items:
            type: string
          description: Explicit axis order for the CRS coordinates (e.g., ['x', 'y']).
      required:
        - lowerLeft
        - upperRight
    TileMatrix:
      type: object
      description: "Tile Matrix Definition A tile matrix, usually corresponding to a particular zoom level of a TileMatrixSet. ref: `https://github.com/opengeospatial/2D-Tile-Matrix-Set/blob/master/schemas/tms/2.0/json/tileMatrix.json `_ Definition of a tile matrix at a specific zoom level within a tile matrix set."
      properties:
        title:
          type: string
          description: Human-readable title of the tile matrix level.
        description:
          type: string
          description: Human-readable description of this tile matrix level.
        keywords:
          type: array
          items:
            type: string
          description: Unordered list of one or more commonly used or formalized word(s) or phrase(s) used to describe this dataset.
        id:
          type: string
          description: Unique identifier for this tile matrix level, often the zoom level. Required.
        scaleDenominator:
          type: number
          description: Scale denominator representing the scale of this tile matrix level. Required.
        cellSize:
          type: number
          description: Size of a pixel in map units at this tile matrix level. Required.
        cornerOfOrigin:
          $ref: "#/components/schemas/TileMatrixCornerOfOrigin"
          description: 'The corner of the tile matrix (*topLeft* or *bottomLeft*) used as the origin for numbering tile rows and columns. This corner is also a corner of the (0, 0) tile. Known values are: "topLeft" and "bottomLeft".'
        pointOfOrigin:
          type: array
          items:
            type: number
          description: Precise position in CRS coordinates of the corner of origin (e.g. the top-left corner) for this tile matrix. This position is also a corner of the (0, 0) tile. In previous version, this was 'topLeftCorner' and 'cornerOfOrigin' did not exist. Required.
        tileWidth:
          type: integer
          description: Pixel width of each tile at this level. Required.
        tileHeight:
          type: integer
          description: Pixel height of each tile at this level. Required.
        matrixWidth:
          type: integer
          description: Number of tiles horizontally at this matrix level. Required.
        matrixHeight:
          type: integer
          description: Number of tiles vertically at this matrix level. Required.
        variableMatrixWidths:
          type: array
          items:
            $ref: "#/components/schemas/VariableMatrixWidth"
          description: "Describes the rows that has variable matrix width ref: `https://github.com/opengeospatial/2D-Tile-Matrix-Set/blob/master/schemas/tms/2.0/json/variableMatrixWidth.json `_."
      required:
        - id
        - scaleDenominator
        - cellSize
        - pointOfOrigin
        - tileWidth
        - tileHeight
        - matrixWidth
        - matrixHeight
    TileMatrixCornerOfOrigin:
      type: string
      enum:
        - topLeft
        - bottomLeft
    VariableMatrixWidth:
      type: object
      description: Model for variableMatrixWidth.
      properties:
        coalesce:
          type: integer
          description: Number of tiles in width that coalesce in a single tile for these rows. Required.
        minTileRow:
          type: integer
          description: First tile row where the coalescence factor applies for this tilematrix. Required.
        maxTileRow:
          type: integer
          description: Last tile row where the coalescence factor applies for this tilematrix. Required.
      required:
        - coalesce
        - minTileRow
        - maxTileRow
    TileMatrixSet:
      type: object
      description: "`https://github.com/opengeospatial/2D-Tile-Matrix-Set/blob/master/schemas/tms/2.0/json/tileMatrixSet.json `_ A definition of a tile matrix set following the Tile Matrix Set standard. For tileset metadata, such a description (in `tileMatrixSet` property) is only required for offline use, as an alternative to a link with a `http://www.opengis.net/def/rel/ogc/1.0/tiling-scheme` relation type."
      properties:
        title:
          type: string
          description: Human-readable title of the tile matrix set.
        description:
          type: string
          description: Brief narrative description of this tile matrix set, normally available for display to a human.
        keywords:
          type: array
          items:
            type: string
          description: Unordered list of one or more commonly used or formalized word(s) or phrase(s) used to describe this tile matrix set.
        id:
          type: string
          description: Unique identifier for the tile matrix set.
        uri:
          type: string
          description: URI reference to the official definition.
        orderedAxes:
          type: array
          items:
            type: string
          description: Names of the coordinate axes in order.
        crs:
          type: string
          description: Coordinate reference system identifier. Required.
        wellKnownScaleSet:
          type: string
          description: URL reference to a standardized scale set.
        boundingBox:
          $ref: "#/components/schemas/TileMatrixSetBoundingBox"
          description: Geographic extent of the tile matrix set.
        tileMatrices:
          type: array
          items:
            $ref: "#/components/schemas/TileMatrix"
          description: Array of tile matrices at different zoom levels. Required.
      required:
        - crs
        - tileMatrices
    ClassMapLegendResponse:
      type: object
      description: ClassMap legend response model.
      properties: {}
    TileSetEntry:
      type: object
      description: Summary information about a single tileset within a list of available tilesets.
      properties:
        title:
          type: string
          description: Human-readable title of the tileset.
        dataType:
          type: string
          description: Type of data in the tiles (e.g., 'map', 'vector').
        crs:
          type: string
          description: Coordinate reference system identifier.
        links:
          type: array
          items:
            $ref: "#/components/schemas/TileSetLink"
          description: Links related to this tileset.
        boundingBox:
          $ref: "#/components/schemas/TileSetBoundingBox"
          description: Bounding box of the tileset.
        accessConstraints:
          type: string
          description: Access constraints for the tileset.
    TileSetLink:
      type: object
      description: A link object used in OGC tile resources.
      properties:
        href:
          type: string
          description: The URL target of the link. Required.
        rel:
          type: string
          description: The relationship type of the link. Required.
        type:
          type: string
          description: The media type of the linked resource.
        title:
          type: string
          description: Human-readable title of the link.
      required:
        - href
        - rel
    TileSetBoundingBox:
      type: object
      description: Bounding box for a tile set.
      properties:
        lowerLeft:
          type: array
          items:
            type: number
          description: Lower-left corner coordinates [x, y]. Required.
        upperRight:
          type: array
          items:
            type: number
          description: Upper-right corner coordinates [x, y]. Required.
        crs:
          type: string
          description: Coordinate reference system identifier.
      required:
        - lowerLeft
        - upperRight
    TileSetList:
      type: object
      description: Response containing a list of available tilesets.
      properties:
        tilesets:
          type: array
          items:
            $ref: "#/components/schemas/TileSetEntry"
          description: Array of available tilesets. Required.
      required:
        - tilesets
    TileMatrixSetLimitsEntry:
      type: object
      description: Limits for a specific tile matrix within a tileset, defining the valid row/column range.
      properties:
        tileMatrix:
          type: string
          description: Identifier of the tile matrix level. Required.
        minTileRow:
          type: integer
          description: Minimum tile row index at this zoom level. Required.
        maxTileRow:
          type: integer
          description: Maximum tile row index at this zoom level. Required.
        minTileCol:
          type: integer
          description: Minimum tile column index at this zoom level. Required.
        maxTileCol:
          type: integer
          description: Maximum tile column index at this zoom level. Required.
      required:
        - tileMatrix
        - minTileRow
        - maxTileRow
        - minTileCol
        - maxTileCol
    TileSetMetadata:
      type: object
      description: Detailed metadata about a specific tileset, including tile matrix set limits.
      properties:
        title:
          type: string
          description: Human-readable title of the tileset.
        dataType:
          type: string
          description: Type of data in the tiles.
        crs:
          type: string
          description: Coordinate reference system identifier.
        links:
          type: array
          items:
            $ref: "#/components/schemas/TileSetLink"
          description: Links related to this tileset.
        boundingBox:
          $ref: "#/components/schemas/TileSetBoundingBox"
          description: Bounding box of the tileset.
        accessConstraints:
          type: string
          description: Access constraints for the tileset.
        tileMatrixSetLimits:
          type: array
          items:
            $ref: "#/components/schemas/TileMatrixSetLimitsEntry"
          description: Limits for each tile matrix level in the tileset.
    StacItemBounds:
      type: object
      description: Geographic extent of a dataset expressed as a bounding box.
      properties:
        bounds:
          type: array
          items:
            type: number
          description: Array of coordinates defining the bounding box [west, south, east, north]. Required.
      required:
        - bounds
    TilerInfoMapResponse:
      type: object
      description: Return dataset's basic info.
      properties: {}
    FeatureType:
      type: string
      enum:
        - Feature
    Geometry:
      type: object
      description: "Represents a GeoJSON geometry object as defined by RFC 7946. Supported geometry types include: * **Point**: A single geographic coordinate. * **LineString**: A sequence of geographic coordinates forming a line. * **Polygon**: A closed shape defined by linear rings. * **MultiPoint**: A collection of Points. * **MultiLineString**: A collection of LineStrings. * **MultiPolygon**: A collection of Polygons. Used for spatial filtering in STAC. You probably want to use the sub-classes and not this class directly. Known sub-classes are: LineString, MultiLineString, MultiPoint, MultiPolygon, Point, Polygon"
      properties:
        type:
          type: string
          description: 'Discriminator property for Geometry. Required. Known values are: "Point", "LineString", "Polygon", "MultiPoint", "MultiLineString", and "MultiPolygon".'
        bbox:
          type: array
          items:
            type: number
          description: Optional bounding box of the geometry.
      required:
        - type
    TilerInfoGeoJsonFeature:
      type: object
      description: GeoJSON Feature object containing rio-tiler model information.
      properties:
        type:
          $ref: "#/components/schemas/FeatureType"
          description: GeoJSON type identifier. Required. "Feature"
        geometry:
          $ref: "#/components/schemas/Geometry"
          description: Geometry object defining the feature's shape. Required.
        properties:
          type: object
          properties: {}
          description: Properties. Required.
        id:
          type: string
          description: Unique identifier for the feature.
        bbox:
          type: array
          items:
            type: number
          description: Bounding box coordinates for the feature.
      required:
        - type
        - geometry
        - properties
    AssetStatisticsResponse:
      type: object
      description: Return dataset's statistics.
      properties: {}
    TilerStacItemStatistics:
      type: object
      description: Return dataset's statistics.
      properties: {}
    StacItemStatisticsGeoJson:
      type: object
      description: STAC Item representing a spatiotemporal asset with statistical information.
      properties:
        geometry:
          $ref: "#/components/schemas/Geometry"
          description: Geometry object defining the feature's shape. Required.
        type:
          $ref: "#/components/schemas/FeatureType"
          description: GeoJSON type identifier for Feature. Required. "Feature"
        properties:
          $ref: "#/components/schemas/StacItemStatisticsGeoJsonProperties"
          description: Feature properties.
      required:
        - geometry
        - type
    StacItemStatisticsGeoJsonProperties:
      type: object
      description: Properties for STAC Item statistics GeoJSON Feature.
      properties:
        statistics:
          type: object
          properties: {}
          description: Statistical information for each band in the asset. Required.
      required:
        - statistics
    TileAddressingScheme:
      type: string
      enum:
        - xyz
        - tms
    TileJsonMetadata:
      type: object
      description: TileJSON metadata describing a tile set according to the TileJSON specification Based on `https://github.com/mapbox/tilejson-spec/tree/master/2.2.0 `_.
      properties:
        tilejson:
          type: string
          description: TileJson.
        name:
          type: string
          description: Human-readable name of the tile set.
        description:
          type: string
          description: Human-readable description of the tile set.
        version:
          type: string
          description: Version.
        attribution:
          type: string
          description: Attribution text for the data sources.
        template:
          type: string
          description: URL template for feature info queries.
        legend:
          type: string
          description: URL to legend content for the tile set.
        scheme:
          $ref: "#/components/schemas/TileAddressingScheme"
          description: 'Tile addressing scheme (xyz or tms). Known values are: "xyz" and "tms".'
        tiles:
          type: array
          items:
            type: string
          description: Array of tile URL templates. Required.
        grids:
          type: array
          items:
            type: string
          description: Array of UTFGrid URL templates.
        data:
          type: array
          items:
            type: string
          description: Array of data file URL templates.
        minzoom:
          type: integer
          description: Minimum zoom level available in the tile set.
        maxzoom:
          type: integer
          description: Maximum zoom level available in the tile set.
        bounds:
          type: array
          items:
            type: number
          description: Bounds.
        center:
          type: array
          items:
            type: number
          description: Default center point [longitude, latitude, zoom] for the tile set.
      required:
        - tiles
    TilerCoreModelsResponsesPoint:
      type: object
      description: Response model for point query operations providing values at a specific location.
      properties:
        coordinates:
          type: array
          items:
            type: number
          description: Geographic coordinates [longitude, latitude] of the queried point. Required.
        values:
          type: array
          items:
            type: number
          description: Array of pixel values at the queried point for each band. Required.
        band_names:
          type: array
          items:
            type: string
          description: Names of each band in the raster data. Required.
      required:
        - coordinates
        - values
        - band_names
    TilerAssetGeoJson:
      type: object
      description: Represents GeoJSON with feature with an asset property.
      properties:
        id:
          type: string
          description: Unique identifier for the feature. Required.
        collection:
          type: string
          description: ID of the STAC collection this item belongs to.
        bbox:
          type: array
          items:
            type: number
          description: Bounding box coordinates for the feature. Required.
        assets:
          type: object
          properties: {}
          description: Assets. Required.
      required:
        - id
        - bbox
        - assets
    TilerStacSearchDefinition:
      type: object
      description: "Stored search query See: `https://github.com/stac-utils/pgstac/blob/3499daa2bfa700ae7bb07503795c169bf2ebafc7/sql/004_search.sql#L907-L915 `_."
      properties:
        hash:
          type: string
          description: Unique hash identifier for the search query. Required.
        search:
          type: object
          properties: {}
          description: Search. Required.
        lastused:
          type: string
          format: date-time
          description: Timestamp when the search was last accessed. Required.
        usecount:
          type: integer
          description: Number of times the search has been accessed. Required.
        metadata:
          $ref: "#/components/schemas/MosaicMetadata"
          description: Additional metadata associated with the search. Required.
      required:
        - hash
        - search
        - lastused
        - usecount
        - metadata
    MosaicMetadata:
      type: object
      description: Metadata information for mosaic or search results.
      properties:
        type:
          $ref: "#/components/schemas/MosaicMetadataType"
          description: 'Type of metadata resource. Known values are: "mosaic" and "search".'
        bounds:
          type: string
          description: Geographic bounding box in [west, south, east, north] format.
        minzoom:
          type: integer
          description: Minimum zoom level supported.
        maxzoom:
          type: integer
          description: Maximum zoom level supported.
        name:
          type: string
          description: Human-readable name for the resource.
        assets:
          type: array
          items:
            type: string
          description: List of asset identifiers included in the resource.
        defaults:
          type: object
          properties: {}
          description: Defaults.
    MosaicMetadataType:
      type: string
      enum:
        - mosaic
        - search
    StacLink:
      type: object
      description: "Link model. Ref: `http://schemas.opengis.net/ogcapi/features/part1/1.0/openapi/schemas/link.yaml `_ Represents a link."
      properties:
        rel:
          type: string
          description: The relationship type of the link.
        title:
          type: string
          description: The title of the link.
        type:
          $ref: "#/components/schemas/StacLinkType"
          description: 'The MIME type of the linked resource. Known values are: "image/tiff; application=geotiff", "image/jp2", "image/png", "image/jpeg", "image/jpg", "image/webp", "application/x-binary", "application/xml", "application/json", "application/geo+json", "text/html", "text/plain", and "application/x-protobuf".'
        href:
          type: string
          description: The URL of the link. Required.
        hreflang:
          type: string
          description: The language of the linked resource.
        length:
          type: integer
          description: The length of the linked resource.
        method:
          type: string
          description: 'Specifies the HTTP method that the resource expects. Default: GET. Is one of the following types: Literal["GET"], Literal["POST"], str'
        headers:
          type: object
          properties: {}
          description: 'Object key-value pairs that map to headers. Example: { "Accept": "application/json" }.'
        body:
          type: object
          properties: {}
          description: For POST requests, the resource can specify the HTTP body as a JSON object.
        merge:
          type: boolean
          description: "Indicates whether the client is expected to merge the body value into the current request body before following the link. This is only valid when the server is responding to a POST request. Default: false."
      required:
        - href
    StacLinkType:
      type: string
      enum:
        - image/tiff; application=geotiff
        - image/jp2
        - image/png
        - image/jpeg
        - image/jpg
        - image/webp
        - application/x-binary
        - application/xml
        - application/json
        - application/geo+json
        - text/html
        - text/plain
        - application/x-protobuf
    TilerStacSearchRegistration:
      type: object
      description: Information about a registered STAC search query.
      properties:
        search:
          $ref: "#/components/schemas/TilerStacSearchDefinition"
          description: Details of the saved search query See the `PgSTAC Search table definition `_. Required.
        links:
          type: array
          items:
            $ref: "#/components/schemas/StacLink"
          description: Related links for the search query.
      required:
        - search
    StacItemPointAsset:
      type: object
      description: Asset information for the specified point.
      properties:
        id:
          type: string
          description: STAC item ID. Required.
        bbox:
          type: array
          items:
            type: number
          description: Bounding box coordinates for the feature. Required.
        assets:
          type: object
          properties: {}
          description: Asset information for the specified point. Required.
        collection:
          type: string
          description: Collection ID. Required.
      required:
        - id
        - bbox
        - assets
        - collection
    TilerMosaicSearchRegistrationResponse:
      type: object
      description: Response from a successful mosaic registration with search ID and related links.
      properties:
        searchid:
          type: string
          description: Unique identifier for the registered search. Required.
        links:
          type: array
          items:
            $ref: "#/components/schemas/StacLink"
          description: Related links for the registered mosaic.
      required:
        - searchid
    IngestionType:
      type: string
      enum:
        - StaticCatalog
        - StacGeoparquet
    IngestionStatus:
      type: string
      enum:
        - Ready
        - Deleting
    IngestionDefinition:
      type: object
      description: Microsoft Planetary Computer Pro geo-catalog ingestion creation model.
      properties:
        id:
          type: string
          description: Ingestion id. Required.
        importType:
          $ref: "#/components/schemas/IngestionType"
          description: 'Ingestion type. Required. Known values are: "StaticCatalog" and "StacGeoparquet".'
        displayName:
          type: string
          description: Ingestion name.
        sourceCatalogUrl:
          type: string
          description: Source catalog URL. Required for StaticCatalog ingestion type.
        stacGeoparquetUrl:
          type: string
          description: Parquet catalog URL. Required for StacGeoparquet ingestion type.
        skipExistingItems:
          type: boolean
          description: Skip processing existing items in the catalog.
        keepOriginalAssets:
          type: boolean
          description: Keep original source assets.
        creationTime:
          type: string
          format: date-time
          description: Ingestion creation time. Required.
        status:
          $ref: "#/components/schemas/IngestionStatus"
          description: 'Ingestion status. Required. Known values are: "Ready" and "Deleting".'
      required:
        - importType
    PagedIngestionDefinition:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/IngestionDefinition"
        nextLink:
          type: string
    OperationStatus:
      type: string
      enum:
        - Pending
        - Running
        - Succeeded
        - Canceled
        - Canceling
        - Failed
    OperationStatusHistoryItem:
      type: object
      description: Operation status history item.
      properties:
        timestamp:
          type: string
          format: date-time
          description: The UTC time at which the status was set. Required.
        status:
          $ref: "#/components/schemas/OperationStatus"
          description: 'The status of the operation. Required. Known values are: "Pending", "Running", "Succeeded", "Canceled", "Canceling", and "Failed".'
        errorCode:
          type: string
          description: If the status is failed, the error code.
        errorMessage:
          type: string
          description: If the status is failed, the error message.
      required:
        - timestamp
        - status
    ErrorInfo:
      type: object
      description: Error information wrapper.
      properties:
        error:
          type: object
          properties: {}
          description: Error details. Required.
      required:
        - error
    Operation:
      type: object
      description: Microsoft Planetary Computer Pro geo-catalog operation.
      properties:
        id:
          type: string
          description: Operation id. Required.
        status:
          $ref: "#/components/schemas/OperationStatus"
          description: 'Operation status. Required. Known values are: "Pending", "Running", "Succeeded", "Canceled", "Canceling", and "Failed".'
        type:
          type: string
          description: Operation type. Required.
        creationTime:
          type: string
          format: date-time
          description: The UTC time at which the operation was created. Required.
        collectionId:
          type: string
          description: Collection ID.
        statusHistory:
          type: array
          items:
            $ref: "#/components/schemas/OperationStatusHistoryItem"
          description: The history of the operation status in time. Required.
        startTime:
          type: string
          format: date-time
          description: The UTC time at which the operation was started.
        finishTime:
          type: string
          format: date-time
          description: The UTC time at which the operation finished its execution.
        additionalInformation:
          type: object
          properties: {}
          description: Additional information elements about the particular operation type.
        error:
          $ref: "#/components/schemas/ErrorInfo"
          description: Error information.
      required:
        - id
        - status
        - type
        - creationTime
        - statusHistory
    PagedOperation:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
        nextLink:
          type: string
    IngestionRunOperation:
      type: object
      description: Microsoft Planetary Computer Pro geo-catalog ingestion run operation.
      properties:
        id:
          type: string
          description: Operation id. Required.
        status:
          $ref: "#/components/schemas/OperationStatus"
          description: 'Operation status. Required. Known values are: "Pending", "Running", "Succeeded", "Canceled", "Canceling", and "Failed".'
        creationTime:
          type: string
          format: date-time
          description: The UTC time at which the operation was created. Required.
        statusHistory:
          type: array
          items:
            $ref: "#/components/schemas/OperationStatusHistoryItem"
          description: The history of the operation status in time. Required.
        startTime:
          type: string
          format: date-time
          description: The UTC time at which the operation was started.
        finishTime:
          type: string
          format: date-time
          description: The UTC time at which the operation finished its execution.
        totalItems:
          type: integer
          description: The number of total items to be processed. Required.
        totalPendingItems:
          type: integer
          description: The number of items pending to be processed. Required.
        totalSuccessfulItems:
          type: integer
