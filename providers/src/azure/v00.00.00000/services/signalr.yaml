      type: object
      description: Feature of a resource, which controls the runtime behavior. All required parameters must be populated in order to send to Azure.
      properties:
        flag:
          type: string
          description: "FeatureFlags is the supported features of Azure SignalR service. * ServiceMode: Flag for backend server for SignalR service. Values allowed: \"Default\": have your own backend server; \"Serverless\": your application doesn't have a backend server; \"Classic\": for backward compatibility. Support both Default and Serverless mode but not recommended; \"PredefinedOnly\": for future use. * EnableConnectivityLogs: \"true\"/\"false\", to enable/disable the connectivity log category respectively. * EnableMessagingLogs: \"true\"/\"false\", to enable/disable the connectivity log category respectively. * EnableLiveTrace: Live Trace allows you to know what's happening inside Azure SignalR service, it will give you live traces in real time, it will be helpful when you developing your own Azure SignalR based web application or self-troubleshooting some issues. Please note that live traces are counted as outbound messages that will be charged. Values allowed: \"true\"/\"false\", to enable/disable live trace feature. Required. Known values are: \"ServiceMode\", \"EnableConnectivityLogs\", \"EnableMessagingLogs\", and \"EnableLiveTrace\"."
        value:
          type: string
          description: Value of the feature flag. See Azure SignalR service document https://docs.microsoft.com/azure/azure-signalr/ for allowed values. Required.
        properties:
          type: object
          properties: {}
          description: Optional properties related to this feature.
      required:
