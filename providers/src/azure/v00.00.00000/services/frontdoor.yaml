openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Front Door Management Client
  description: APIs to manage web application firewall rules.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-10-01-stackql-generated
  x-serviceAlias: frontdoor
  x-sdkPackage: azure-mgmt-frontdoor
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ExperimentProperties:
      type: object
      description: Defines the properties of an experiment.
      properties:
        description:
          type: string
          description: The description of the details or intents of the Experiment.
        endpointA:
          $ref: "#/components/schemas/Endpoint"
          description: The endpoint A of an experiment.
        endpointB:
          $ref: "#/components/schemas/Endpoint"
          description: The endpoint B of an experiment.
        enabledState:
          $ref: "#/components/schemas/State"
          description: 'The state of the Experiment. Known values are: "Enabled" and "Disabled".'
        resourceState:
          $ref: "#/components/schemas/NetworkExperimentResourceState"
          description: 'Resource status. Known values are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", and "Deleting".'
        status:
          type: string
          description: The description of Experiment status from the server side.
        scriptFileUri:
          type: string
          description: The uri to the Script used in the Experiment.
    Endpoint:
      type: object
      description: Defines the endpoint properties.
      properties:
        name:
          type: string
          description: The name of the endpoint.
        endpoint:
          type: string
          description: The endpoint URL.
    State:
      type: string
      enum:
        - Enabled
        - Disabled
    NetworkExperimentResourceState:
      type: string
      enum:
        - Creating
        - Enabling
        - Enabled
        - Disabling
        - Disabled
        - Deleting
    ExperimentFlattened:
      type: object
      description: Flattened view of Experiment ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Resource ID.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
        location:
          type: string
          description: Resource location.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        description:
          type: string
          description: The description of the details or intents of the Experiment.
        endpointA:
          $ref: "#/components/schemas/Endpoint"
          description: The endpoint A of an experiment.
        endpointB:
          $ref: "#/components/schemas/Endpoint"
          description: The endpoint B of an experiment.
        enabledState:
          $ref: "#/components/schemas/State"
          description: 'The state of the Experiment. Known values are: "Enabled" and "Disabled".'
        resourceState:
          $ref: "#/components/schemas/NetworkExperimentResourceState"
          description: 'Resource status. Known values are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", and "Deleting".'
        status:
          type: string
          description: The description of Experiment status from the server side.
        scriptFileUri:
          type: string
          description: The uri to the Script used in the Experiment.
    PagedExperimentFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ExperimentFlattened"
        nextLink:
          type: string
    Experiment:
      type: object
      description: Defines the properties of an Experiment.
      properties:
        id:
          type: string
          description: Resource ID.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
        location:
          type: string
          description: Resource location.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        properties:
          $ref: "#/components/schemas/ExperimentProperties"
          description: The properties of an Experiment.
    ExperimentUpdateProperties:
      type: object
      description: Defines the properties of an experiment.
      properties:
        description:
          type: string
          description: The description of the intent or details of the Experiment.
        enabledState:
          $ref: "#/components/schemas/State"
          description: 'The state of the Experiment. Known values are: "Enabled" and "Disabled".'
    ResourceType:
      type: string
      enum:
        - Microsoft.Network/frontDoors
        - Microsoft.Network/frontDoors/frontendEndpoints
    CheckNameAvailabilityOutput:
      type: object
      description: Output of check name availability API.
      properties:
        nameAvailability:
          $ref: "#/components/schemas/Availability"
          description: 'Indicates whether the name is available. Known values are: "Available" and "Unavailable".'
        reason:
          type: string
          description: The reason why the name is not available.
        message:
          type: string
          description: The detailed error message describing why the name is not available.
    Availability:
      type: string
      enum:
        - Available
        - Unavailable
    FrontDoorProperties:
      type: object
      description: The JSON object that contains the properties required to create an endpoint.
      properties:
        friendlyName:
          type: string
          description: A friendly name for the frontDoor.
        routingRules:
          type: array
          items:
            $ref: "#/components/schemas/RoutingRule"
          description: Routing rules associated with this Front Door.
        loadBalancingSettings:
          type: array
          items:
            $ref: "#/components/schemas/LoadBalancingSettingsModel"
          description: Load balancing settings associated with this Front Door instance.
        healthProbeSettings:
          type: array
          items:
            $ref: "#/components/schemas/HealthProbeSettingsModel"
          description: Health probe settings associated with this Front Door instance.
        backendPools:
          type: array
          items:
            $ref: "#/components/schemas/BackendPool"
          description: Backend pools available to routing rules.
        frontendEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/FrontendEndpoint"
          description: Frontend endpoints available to routing rules.
        backendPoolsSettings:
          $ref: "#/components/schemas/BackendPoolsSettings"
          description: Settings for all backendPools.
        enabledState:
          $ref: "#/components/schemas/FrontDoorEnabledState"
          description: "Operational status of the Front Door load balancer. Permitted values are 'Enabled' or 'Disabled'. Known values are: \"Enabled\" and \"Disabled\"."
        resourceState:
          $ref: "#/components/schemas/FrontDoorResourceState"
          description: 'Resource status of the Front Door or Front Door SubResource. Known values are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", "Deleting", "Migrating", and "Migrated".'
        provisioningState:
          type: string
          description: Provisioning state of the Front Door.
        cname:
          type: string
          description: The host that each frontendEndpoint must CNAME to.
        frontdoorId:
          type: string
          description: The Id of the frontdoor.
        rulesEngines:
          type: array
          items:
            $ref: "#/components/schemas/RulesEngine"
          description: Rules Engine Configurations available to routing rules.
        extendedProperties:
          type: object
          properties: {}
          description: Key-Value pair representing additional properties for frontdoor.
    RoutingRule:
      type: object
      description: A routing rule represents a specification for traffic to treat and where to send it, along with health probe information.
      properties:
        id:
          type: string
          description: Resource ID.
        properties:
          $ref: "#/components/schemas/RoutingRuleProperties"
          description: Properties of the Front Door Routing Rule.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
    RoutingRuleProperties:
      type: object
      description: The JSON object that contains the properties required to create a routing rule.
      properties:
        frontendEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/SubResource"
          description: Frontend endpoints associated with this rule.
        acceptedProtocols:
          type: array
          items:
            $ref: "#/components/schemas/FrontDoorProtocol"
          description: Protocol schemes to match for this rule.
        patternsToMatch:
          type: array
          items:
            type: string
          description: The route patterns of the rule.
        enabledState:
          $ref: "#/components/schemas/RoutingRuleEnabledState"
          description: "Whether to enable use of this rule. Permitted values are 'Enabled' or 'Disabled'. Known values are: \"Enabled\" and \"Disabled\"."
        routeConfiguration:
          $ref: "#/components/schemas/RouteConfiguration"
          description: A reference to the routing configuration.
        rulesEngine:
          $ref: "#/components/schemas/SubResource"
          description: A reference to a specific Rules Engine Configuration to apply to this route.
        webApplicationFirewallPolicyLink:
          $ref: "#/components/schemas/RoutingRuleUpdateParametersWebApplicationFirewallPolicyLink"
          description: Defines the Web Application Firewall policy for each routing rule (if applicable).
        resourceState:
          $ref: "#/components/schemas/FrontDoorResourceState"
          description: 'Resource status of the Front Door or Front Door SubResource. Known values are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", "Deleting", "Migrating", and "Migrated".'
    SubResource:
      type: object
      description: Reference to another subresource.
      properties:
        id:
          type: string
          description: Resource ID.
    FrontDoorProtocol:
      type: string
      enum:
        - Http
        - Https
    RoutingRuleEnabledState:
      type: string
      enum:
        - Enabled
        - Disabled
    RouteConfiguration:
      type: object
      description: "Base class for all types of Route. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ForwardingConfiguration, RedirectConfiguration"
      properties:
        "@odata":
          type: object
          properties:
            type:
              type: string
              description: Required. Default value is None.
      required:
        - "@odata"
    RoutingRuleUpdateParametersWebApplicationFirewallPolicyLink:
      type: object
      description: Defines the Web Application Firewall policy for each routing rule (if applicable).
      properties:
        id:
          type: string
          description: Resource ID.
    FrontDoorResourceState:
      type: string
      enum:
        - Creating
        - Enabling
        - Enabled
        - Disabling
        - Disabled
        - Deleting
        - Migrating
        - Migrated
    LoadBalancingSettingsModel:
      type: object
      description: Load balancing settings for a backend pool.
      properties:
        id:
          type: string
          description: Resource ID.
        properties:
          $ref: "#/components/schemas/LoadBalancingSettingsProperties"
          description: Properties of the load balancing settings.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
    LoadBalancingSettingsProperties:
      type: object
      description: The JSON object that contains the properties required to create load balancing settings.
      properties:
        sampleSize:
          type: integer
          description: The number of samples to consider for load balancing decisions.
        successfulSamplesRequired:
          type: integer
          description: The number of samples within the sample period that must succeed.
        additionalLatencyMilliseconds:
          type: integer
          description: The additional latency in milliseconds for probes to fall into the lowest latency bucket.
        resourceState:
          $ref: "#/components/schemas/FrontDoorResourceState"
          description: 'Resource status of the Front Door or Front Door SubResource. Known values are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", "Deleting", "Migrating", and "Migrated".'
    HealthProbeSettingsModel:
      type: object
      description: Load balancing settings for a backend pool.
      properties:
        id:
          type: string
          description: Resource ID.
        properties:
          $ref: "#/components/schemas/HealthProbeSettingsProperties"
          description: Properties of the health probe settings.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
    HealthProbeSettingsProperties:
      type: object
      description: The JSON object that contains the properties required to create a health probe settings.
      properties:
        path:
          type: string
          description: The path to use for the health probe. Default is /.
        protocol:
          $ref: "#/components/schemas/FrontDoorProtocol"
          description: 'Protocol scheme to use for this probe. Known values are: "Http" and "Https".'
        intervalInSeconds:
          type: integer
          description: The number of seconds between health probes.
        healthProbeMethod:
          $ref: "#/components/schemas/FrontDoorHealthProbeMethod"
          description: 'Configures which HTTP method to use to probe the backends defined under backendPools. Known values are: "GET" and "HEAD".'
        enabledState:
          $ref: "#/components/schemas/HealthProbeEnabled"
          description: 'Whether to enable health probes to be made against backends defined under backendPools. Health probes can only be disabled if there is a single enabled backend in single enabled backend pool. Known values are: "Enabled" and "Disabled".'
        resourceState:
          $ref: "#/components/schemas/FrontDoorResourceState"
          description: 'Resource status of the Front Door or Front Door SubResource. Known values are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", "Deleting", "Migrating", and "Migrated".'
    FrontDoorHealthProbeMethod:
      type: string
      enum:
        - GET
        - HEAD
    HealthProbeEnabled:
      type: string
      enum:
        - Enabled
        - Disabled
    BackendPool:
      type: object
      description: A backend pool is a collection of backends that can be routed to.
      properties:
        id:
          type: string
          description: Resource ID.
        properties:
          $ref: "#/components/schemas/BackendPoolProperties"
          description: Properties of the Front Door Backend Pool.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
    BackendPoolProperties:
      type: object
      description: The JSON object that contains the properties required to create a Backend Pool.
      properties:
        backends:
          type: array
          items:
            $ref: "#/components/schemas/Backend"
          description: The set of backends for this pool.
        loadBalancingSettings:
          $ref: "#/components/schemas/SubResource"
          description: Load balancing settings for a backend pool.
        healthProbeSettings:
          $ref: "#/components/schemas/SubResource"
          description: L7 health probe settings for a backend pool.
        resourceState:
          $ref: "#/components/schemas/FrontDoorResourceState"
          description: 'Resource status of the Front Door or Front Door SubResource. Known values are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", "Deleting", "Migrating", and "Migrated".'
    Backend:
      type: object
      description: Backend address of a frontDoor load balancer.
      properties:
        address:
          type: string
          description: Location of the backend (IP address or FQDN).
        privateLinkAlias:
          type: string
          description: The Alias of the Private Link resource. Populating this optional field indicates that this backend is 'Private'.
        privateLinkResourceId:
          type: string
          description: The Resource Id of the Private Link resource. Populating this optional field indicates that this backend is 'Private'.
        privateLinkLocation:
          type: string
          description: The location of the Private Link resource. Required only if 'privateLinkResourceId' is populated.
        privateEndpointStatus:
          $ref: "#/components/schemas/PrivateEndpointStatus"
          description: 'The Approval status for the connection to the Private Link. Known values are: "Pending", "Approved", "Rejected", "Disconnected", and "Timeout".'
        privateLinkApprovalMessage:
          type: string
          description: A custom message to be included in the approval request to connect to the Private Link.
        httpPort:
          type: integer
          description: The HTTP TCP port number. Must be between 1 and 65535.
        httpsPort:
          type: integer
          description: The HTTPS TCP port number. Must be between 1 and 65535.
        enabledState:
          $ref: "#/components/schemas/BackendEnabledState"
          description: "Whether to enable use of this backend. Permitted values are 'Enabled' or 'Disabled'. Known values are: \"Enabled\" and \"Disabled\"."
        priority:
          type: integer
          description: Priority to use for load balancing. Higher priorities will not be used for load balancing if any lower priority backend is healthy.
        weight:
          type: integer
          description: Weight of this endpoint for load balancing purposes.
        backendHostHeader:
          type: string
          description: The value to use as the host header sent to the backend. If blank or unspecified, this defaults to the incoming host.
    PrivateEndpointStatus:
      type: string
      enum:
        - Pending
        - Approved
        - Rejected
        - Disconnected
        - Timeout
    BackendEnabledState:
      type: string
      enum:
        - Enabled
        - Disabled
    FrontendEndpoint:
      type: object
      description: A frontend endpoint used for routing.
      properties:
        id:
          type: string
          description: Resource ID.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
        properties:
          $ref: "#/components/schemas/FrontendEndpointProperties"
          description: Properties of the Frontend endpoint.
    FrontendEndpointProperties:
      type: object
      description: The JSON object that contains the properties required to create a frontend endpoint.
      properties:
        hostName:
          type: string
          description: The host name of the frontendEndpoint. Must be a domain name.
        sessionAffinityEnabledState:
          $ref: "#/components/schemas/SessionAffinityEnabledState"
          description: "Whether to allow session affinity on this host. Valid options are 'Enabled' or 'Disabled'. Known values are: \"Enabled\" and \"Disabled\"."
        sessionAffinityTtlSeconds:
          type: integer
          description: UNUSED. This field will be ignored. The TTL to use in seconds for session affinity, if applicable.
        webApplicationFirewallPolicyLink:
          $ref: "#/components/schemas/FrontendEndpointUpdateParametersWebApplicationFirewallPolicyLink"
          description: Defines the Web Application Firewall policy for each host (if applicable).
        resourceState:
          $ref: "#/components/schemas/FrontDoorResourceState"
          description: 'Resource status of the Front Door or Front Door SubResource. Known values are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", "Deleting", "Migrating", and "Migrated".'
        customHttpsProvisioningState:
          $ref: "#/components/schemas/CustomHttpsProvisioningState"
          description: 'Provisioning status of Custom Https of the frontendEndpoint. Known values are: "Enabling", "Enabled", "Disabling", "Disabled", and "Failed".'
        customHttpsProvisioningSubstate:
          $ref: "#/components/schemas/CustomHttpsProvisioningSubstate"
          description: 'Provisioning substate shows the progress of custom HTTPS enabling/disabling process step by step. Known values are: "SubmittingDomainControlValidationRequest", "PendingDomainControlValidationREquestApproval", "DomainControlValidationRequestApproved", "DomainControlValidationRequestRejected", "DomainControlValidationRequestTimedOut", "IssuingCertificate", "DeployingCertificate", "CertificateDeployed", "DeletingCertificate", and "CertificateDeleted".'
        customHttpsConfiguration:
          $ref: "#/components/schemas/CustomHttpsConfiguration"
          description: The configuration specifying how to enable HTTPS.
    SessionAffinityEnabledState:
      type: string
      enum:
        - Enabled
        - Disabled
    FrontendEndpointUpdateParametersWebApplicationFirewallPolicyLink:
      type: object
      description: Defines the Web Application Firewall policy for each host (if applicable).
      properties:
        id:
          type: string
          description: Resource ID.
    CustomHttpsProvisioningState:
      type: string
      enum:
        - Enabling
        - Enabled
        - Disabling
        - Disabled
        - Failed
    CustomHttpsProvisioningSubstate:
      type: string
      enum:
        - SubmittingDomainControlValidationRequest
        - PendingDomainControlValidationREquestApproval
        - DomainControlValidationRequestApproved
        - DomainControlValidationRequestRejected
        - DomainControlValidationRequestTimedOut
        - IssuingCertificate
        - DeployingCertificate
        - CertificateDeployed
        - DeletingCertificate
        - CertificateDeleted
    CustomHttpsConfiguration:
      type: object
      description: Https settings for a domain.
      properties:
        certificateSource:
          $ref: "#/components/schemas/FrontDoorCertificateSource"
          description: 'Defines the source of the SSL certificate. Required. Known values are: "AzureKeyVault" and "FrontDoor".'
        protocolType:
          $ref: "#/components/schemas/FrontDoorTlsProtocolType"
          description: Defines the TLS extension protocol that is used for secure delivery. Required. "ServerNameIndication"
        minimumTlsVersion:
          $ref: "#/components/schemas/MinimumTLSVersion"
          description: 'The minimum TLS version required from the clients to establish an SSL handshake with Front Door. Required. Known values are: "1.0" and "1.2".'
        keyVaultCertificateSourceParameters:
          $ref: "#/components/schemas/KeyVaultCertificateSourceParameters"
          description: KeyVault certificate source parameters (if certificateSource=AzureKeyVault).
        frontDoorCertificateSourceParameters:
          $ref: "#/components/schemas/FrontDoorCertificateSourceParameters"
          description: Parameters required for enabling SSL with Front Door-managed certificates (if certificateSource=FrontDoor).
      required:
        - certificateSource
        - protocolType
        - minimumTlsVersion
    FrontDoorCertificateSource:
      type: string
      enum:
        - AzureKeyVault
        - FrontDoor
    FrontDoorTlsProtocolType:
      type: string
      enum:
        - ServerNameIndication
    MinimumTLSVersion:
      type: string
      enum:
        - "1.0"
        - "1.2"
    KeyVaultCertificateSourceParameters:
      type: object
      description: Parameters required for bring-your-own-certification via Key Vault.
      properties:
        vault:
          $ref: "#/components/schemas/KeyVaultCertificateSourceParametersVault"
          description: The Key Vault containing the SSL certificate.
        secretName:
          type: string
          description: The name of the Key Vault secret representing the full certificate PFX.
        secretVersion:
          type: string
          description: The version of the Key Vault secret representing the full certificate PFX.
    KeyVaultCertificateSourceParametersVault:
      type: object
      description: The Key Vault containing the SSL certificate.
      properties:
        id:
          type: string
          description: Resource ID.
    FrontDoorCertificateSourceParameters:
      type: object
      description: Parameters required for enabling SSL with Front Door-managed certificates.
      properties:
        certificateType:
          $ref: "#/components/schemas/FrontDoorCertificateType"
          description: Defines the type of the certificate used for secure connections to a frontendEndpoint. "Dedicated"
    FrontDoorCertificateType:
      type: string
      enum:
        - Dedicated
    BackendPoolsSettings:
      type: object
      description: Settings that apply to all backend pools.
      properties:
        enforceCertificateNameCheck:
          $ref: "#/components/schemas/EnforceCertificateNameCheckEnabledState"
          description: 'Whether to enforce certificate name check on HTTPS requests to all backend pools. No effect on non-HTTPS requests. Known values are: "Enabled" and "Disabled".'
        sendRecvTimeoutSeconds:
          type: integer
          description: Send and receive timeout on forwarding request to the backend. When timeout is reached, the request fails and returns.
    EnforceCertificateNameCheckEnabledState:
      type: string
      enum:
        - Enabled
        - Disabled
    FrontDoorEnabledState:
      type: string
      enum:
        - Enabled
        - Disabled
    RulesEngine:
      type: object
      description: A rules engine configuration containing a list of rules that will run to modify the runtime behavior of the request and response.
      properties:
        id:
          type: string
          description: Resource ID.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
        properties:
          $ref: "#/components/schemas/RulesEngineProperties"
          description: Properties of the Rules Engine Configuration.
    RulesEngineProperties:
      type: object
      description: The JSON object that contains the properties required to create a Rules Engine Configuration.
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/RulesEngineRule"
          description: A list of rules that define a particular Rules Engine Configuration.
        resourceState:
          $ref: "#/components/schemas/FrontDoorResourceState"
          description: 'Resource status of the Front Door or Front Door SubResource. Known values are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", "Deleting", "Migrating", and "Migrated".'
    RulesEngineRule:
      type: object
      description: Contains a list of match conditions, and an action on how to modify the request/response. If multiple rules match, the actions from one rule that conflict with a previous rule overwrite for a singular action, or append in the case of headers manipulation.
      properties:
        name:
          type: string
          description: A name to refer to this specific rule. Required.
        priority:
          type: integer
          description: A priority assigned to this rule. Required.
        action:
          $ref: "#/components/schemas/RulesEngineAction"
          description: Actions to perform on the request and response if all of the match conditions are met. Required.
        matchConditions:
          type: array
          items:
            $ref: "#/components/schemas/RulesEngineMatchCondition"
          description: A list of match conditions that must meet in order for the actions of this rule to run. Having no match conditions means the actions will always run.
        matchProcessingBehavior:
          $ref: "#/components/schemas/MatchProcessingBehavior"
          description: 'If this rule is a match should the rules engine continue running the remaining rules or stop. If not present, defaults to Continue. Known values are: "Continue" and "Stop".'
      required:
        - name
        - priority
        - action
    RulesEngineAction:
      type: object
      description: One or more actions that will execute, modifying the request and/or response.
      properties:
        requestHeaderActions:
          type: array
          items:
            $ref: "#/components/schemas/HeaderAction"
          description: A list of header actions to apply from the request from AFD to the origin.
        responseHeaderActions:
          type: array
          items:
            $ref: "#/components/schemas/HeaderAction"
          description: A list of header actions to apply from the response from AFD to the client.
        routeConfigurationOverride:
          $ref: "#/components/schemas/RouteConfiguration"
          description: Override the route configuration.
    HeaderAction:
      type: object
      description: An action that can manipulate an http header.
      properties:
        headerActionType:
          $ref: "#/components/schemas/HeaderActionType"
          description: 'Which type of manipulation to apply to the header. Required. Known values are: "Append", "Delete", and "Overwrite".'
        headerName:
          type: string
          description: The name of the header this action will apply to. Required.
        value:
          type: string
          description: The value to update the given header name with. This value is not used if the actionType is Delete.
      required:
        - headerActionType
        - headerName
    HeaderActionType:
      type: string
      enum:
        - Append
        - Delete
        - Overwrite
    RulesEngineMatchCondition:
      type: object
      description: Define a match condition.
      properties:
        rulesEngineMatchVariable:
          $ref: "#/components/schemas/RulesEngineMatchVariable"
          description: 'Match Variable. Required. Known values are: "IsMobile", "RemoteAddr", "RequestMethod", "QueryString", "PostArgs", "RequestUri", "RequestPath", "RequestFilename", "RequestFilenameExtension", "RequestHeader", "RequestBody", and "RequestScheme".'
        selector:
          type: string
          description: Name of selector in RequestHeader or RequestBody to be matched.
        rulesEngineOperator:
