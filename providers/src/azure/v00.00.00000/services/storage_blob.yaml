paths:
  /:
    put:
      operationId: AppendBlob_create
      description: The Create Append Blob operation creates a new append blob.
      parameters:
        - name: Content-Length
          in: header
          required: true
          schema:
            type: integer
          description: The length of the request. Required.
        - name: x-ms-version
          in: header
          required: true
          schema:
            type: string
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see
        - name: x-ms-blob-content-type
          in: header
          required: false
