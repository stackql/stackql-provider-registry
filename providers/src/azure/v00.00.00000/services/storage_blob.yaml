openapi: 3.0.0
servers:
  - url: https://{account}.blob.core.windows.net
    variables:
      account:
        default: ""
        description: Storage account name.
info:
  title: Azure Blob Storage (Data Plane)
  description: "Containers and blob operations: upload, download, lease, tags and versions."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: unversioned-stackql-generated
  x-serviceAlias: storage_blob
  x-sdkPackage: azure-storage-blob
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    BlobTag:
      type: object
      description: BlobTag. All required parameters must be populated in order to send to server.
      properties:
        Key:
          type: string
          description: Required.
        Value:
          type: string
          description: Required.
      required:
        - Key
        - Value
    BlobTags:
      type: object
      description: Blob tags. All required parameters must be populated in order to send to server.
      properties:
        BlobTagSet:
          type: array
          items:
            $ref: "#/components/schemas/BlobTag"
          description: Required.
      required:
        - BlobTagSet
    Block:
      type: object
      description: Represents a single block in a block blob. It describes the block's ID and size. All required parameters must be populated in order to send to server.
      properties:
        Name:
          type: string
          description: The base64 encoded block ID. Required.
        Size:
          type: integer
          description: The block size in bytes. Required.
      required:
        - Name
        - Size
    BlockList:
      type: object
      description: BlockList.
      properties:
        CommittedBlocks:
          type: array
          items:
            $ref: "#/components/schemas/Block"
          description: ":vartype committed_blocks: list[~azure.storage.blob.models.Block]"
        UncommittedBlocks:
          type: array
          items:
            $ref: "#/components/schemas/Block"
          description: ":vartype uncommitted_blocks: list[~azure.storage.blob.models.Block]"
    BlobFlatListSegment:
      type: object
      description: BlobFlatListSegment. All required parameters must be populated in order to send to server.
      properties:
        BlobItems:
          type: array
          items:
            $ref: "#/components/schemas/BlobItemInternal"
          description: Required.
      required:
        - BlobItems
    BlobItemInternal:
      type: object
      description: An Azure Storage blob. All required parameters must be populated in order to send to server.
      properties:
        Name:
          $ref: "#/components/schemas/BlobName"
          description: Required.
        Deleted:
          type: boolean
          description: Required.
        Snapshot:
          type: string
          description: Required.
        VersionId:
          type: string
          description: ":vartype version_id: str"
        IsCurrentVersion:
          type: boolean
          description: ":vartype is_current_version: bool"
        Properties:
          $ref: "#/components/schemas/BlobPropertiesInternal"
          description: Properties of a blob. Required.
        Metadata:
          $ref: "#/components/schemas/BlobMetadata"
          description: ":vartype metadata: ~azure.storage.blob.models.BlobMetadata"
        BlobTags:
          $ref: "#/components/schemas/BlobTags"
          description: Blob tags.
        HasVersionsOnly:
          type: boolean
          description: ":vartype has_versions_only: bool"
        OrMetadata:
          type: object
          properties: {}
          description: Dictionary of .
      required:
        - Name
        - Deleted
        - Snapshot
        - Properties
    BlobName:
      type: object
      description: BlobName.
      properties:
        Encoded:
          type: boolean
          description: Indicates if the blob name is encoded.
        content:
          type: string
          description: The name of the blob.
    BlobPropertiesInternal:
      type: object
      description: Properties of a blob. All required parameters must be populated in order to send to server.
      properties:
        Creation-Time:
          type: string
          description: ":vartype creation_time: ~datetime.datetime"
        Last-Modified:
          type: string
          description: Required.
        Etag:
          type: string
          description: Required.
        Content-Length:
          type: integer
          description: Size in bytes.
        Content-Type:
          type: string
          description: ":vartype content_type: str"
        Content-Encoding:
          type: string
          description: ":vartype content_encoding: str"
        Content-Language:
          type: string
          description: ":vartype content_language: str"
        Content-MD5:
          type: string
          format: byte
          description: ":vartype content_md5: bytes"
        Content-Disposition:
          type: string
          description: ":vartype content_disposition: str"
        Cache-Control:
          type: string
          description: ":vartype cache_control: str"
        x-ms-blob-sequence-number:
          type: integer
          description: ":vartype blob_sequence_number: int"
        BlobType:
          type: string
          description: 'Known values are: "BlockBlob", "PageBlob", and "AppendBlob".'
        LeaseStatus:
          type: string
          description: 'Known values are: "locked" and "unlocked".'
        LeaseState:
          type: string
          description: 'Known values are: "available", "leased", "expired", "breaking", and "broken".'
        LeaseDuration:
          type: string
          description: 'Known values are: "infinite" and "fixed".'
        CopyId:
          type: string
          description: ":vartype copy_id: str"
        CopyStatus:
          type: string
          description: 'Known values are: "pending", "success", "aborted", and "failed".'
        CopySource:
          type: string
          description: ":vartype copy_source: str"
        CopyProgress:
          type: string
          description: ":vartype copy_progress: str"
        CopyCompletionTime:
          type: string
          description: ":vartype copy_completion_time: ~datetime.datetime"
        CopyStatusDescription:
          type: string
          description: ":vartype copy_status_description: str"
        ServerEncrypted:
          type: boolean
          description: ":vartype server_encrypted: bool"
        IncrementalCopy:
          type: boolean
          description: ":vartype incremental_copy: bool"
        DestinationSnapshot:
          type: string
          description: ":vartype destination_snapshot: str"
        DeletedTime:
          type: string
          description: ":vartype deleted_time: ~datetime.datetime"
        RemainingRetentionDays:
          type: integer
          description: ":vartype remaining_retention_days: int"
        AccessTier:
          type: string
          description: 'Known values are: "P4", "P6", "P10", "P15", "P20", "P30", "P40", "P50", "P60", "P70", "P80", "Hot", "Cool", "Archive", "Premium", "Cold", and "Smart".'
        AccessTierInferred:
          type: boolean
          description: ":vartype access_tier_inferred: bool"
        ArchiveStatus:
          type: string
          description: 'Known values are: "rehydrate-pending-to-hot", "rehydrate-pending-to-cool", "rehydrate-pending-to-cold", and "rehydrate-pending-to-smart".'
        SmartAccessTier:
          type: string
          description: 'Known values are: "P4", "P6", "P10", "P15", "P20", "P30", "P40", "P50", "P60", "P70", "P80", "Hot", "Cool", "Archive", "Premium", "Cold", and "Smart".'
        CustomerProvidedKeySha256:
          type: string
          description: ":vartype customer_provided_key_sha256: str"
        EncryptionScope:
          type: string
          description: The name of the encryption scope under which the blob is encrypted.
        AccessTierChangeTime:
          type: string
          description: ":vartype access_tier_change_time: ~datetime.datetime"
        TagCount:
          type: integer
          description: ":vartype tag_count: int"
        Expiry-Time:
          type: string
          description: ":vartype expires_on: ~datetime.datetime"
        Sealed:
          type: boolean
          description: ":vartype is_sealed: bool"
        RehydratePriority:
          type: string
          description: 'If an object is in rehydrate pending state then this header is returned with priority of rehydrate. Valid values are High and Standard. Known values are: "High" and "Standard".'
        LastAccessTime:
          type: string
          description: ":vartype last_accessed_on: ~datetime.datetime"
        ImmutabilityPolicyUntilDate:
          type: string
          description: ":vartype immutability_policy_expires_on: ~datetime.datetime"
        ImmutabilityPolicyMode:
          type: string
          description: 'Known values are: "Mutable", "Unlocked", and "Locked".'
        LegalHold:
          type: boolean
          description: ":vartype legal_hold: bool"
      required:
        - Last-Modified
        - Etag
    BlobMetadata:
      type: object
      description: BlobMetadata.
      properties:
        "":
          type: object
          properties: {}
          description: Unmatched properties from the message are deserialized to this collection.
        Encrypted:
          type: string
          description: ":vartype encrypted: str"
    ListBlobsFlatSegmentResponse:
      type: object
      description: An enumeration of blobs. All required parameters must be populated in order to send to server.
      properties:
        ServiceEndpoint:
          type: string
          description: Required.
        ContainerName:
          type: string
          description: Required.
        Prefix:
          type: string
          description: ":vartype prefix: str"
        Marker:
          type: string
          description: ":vartype marker: str"
        MaxResults:
          type: integer
          description: ":vartype max_results: int"
        Segment:
          $ref: "#/components/schemas/BlobFlatListSegment"
          description: Required.
        NextMarker:
          type: string
          description: ":vartype next_marker: str"
      required:
        - ServiceEndpoint
        - ContainerName
        - Segment
    BlobHierarchyListSegment:
      type: object
      description: BlobHierarchyListSegment. All required parameters must be populated in order to send to server.
      properties:
        BlobPrefixes:
          type: array
          items:
            $ref: "#/components/schemas/BlobPrefix"
          description: ":vartype blob_prefixes: list[~azure.storage.blob.models.BlobPrefix]"
        BlobItems:
          type: array
          items:
            $ref: "#/components/schemas/BlobItemInternal"
          description: Required.
      required:
        - BlobItems
    BlobPrefix:
      type: object
      description: BlobPrefix. All required parameters must be populated in order to send to server.
      properties:
        Name:
          $ref: "#/components/schemas/BlobName"
          description: Required.
      required:
        - Name
    ListBlobsHierarchySegmentResponse:
      type: object
      description: An enumeration of blobs. All required parameters must be populated in order to send to server.
      properties:
        ServiceEndpoint:
          type: string
          description: Required.
        ContainerName:
          type: string
          description: Required.
        Prefix:
          type: string
          description: ":vartype prefix: str"
        Marker:
          type: string
          description: ":vartype marker: str"
        MaxResults:
          type: integer
          description: ":vartype max_results: int"
        Delimiter:
          type: string
          description: ":vartype delimiter: str"
        Segment:
          $ref: "#/components/schemas/BlobHierarchyListSegment"
          description: Required.
        NextMarker:
          type: string
          description: ":vartype next_marker: str"
      required:
        - ServiceEndpoint
        - ContainerName
        - Segment
    AccessPolicy:
      type: object
      description: An Access policy.
      properties:
        Start:
          type: string
          description: the date-time the policy is active.
        Expiry:
          type: string
          description: the date-time the policy expires.
        Permission:
          type: string
          description: the permissions for the acl policy.
    SignedIdentifier:
      type: object
      description: signed identifier. All required parameters must be populated in order to send to server.
      properties:
        Id:
          type: string
          description: a unique id. Required.
        AccessPolicy:
          $ref: "#/components/schemas/AccessPolicy"
          description: An Access policy.
      required:
        - Id
    FilterBlobSegment:
      type: object
      description: The result of a Filter Blobs API call. All required parameters must be populated in order to send to server.
      properties:
        ServiceEndpoint:
          type: string
          description: Required.
        Where:
          type: string
          description: Required.
        Blobs:
          type: array
          items:
            $ref: "#/components/schemas/FilterBlobItem"
          description: Required.
        NextMarker:
          type: string
          description: ":vartype next_marker: str"
      required:
        - ServiceEndpoint
        - Where
        - Blobs
    FilterBlobItem:
      type: object
      description: Blob info from a Filter Blobs API call. All required parameters must be populated in order to send to server.
      properties:
        Name:
          type: string
          description: Required.
        ContainerName:
          type: string
          description: Required.
        Tags:
          $ref: "#/components/schemas/BlobTags"
          description: Blob tags.
        VersionId:
          type: string
          description: ":vartype version_id: str"
        IsCurrentVersion:
          type: boolean
          description: ":vartype is_current_version: bool"
      required:
        - Name
        - ContainerName
    PageRange:
      type: object
      description: PageRange. All required parameters must be populated in order to send to server.
      properties:
        Start:
          type: integer
          description: Required.
        End:
          type: integer
          description: Required.
      required:
        - Start
        - End
    ClearRange:
      type: object
      description: ClearRange. All required parameters must be populated in order to send to server.
      properties:
        Start:
          type: integer
          description: Required.
        End:
          type: integer
          description: Required.
      required:
        - Start
        - End
    PageList:
      type: object
      description: the list of pages.
      properties:
        PageRange:
          type: array
          items:
            $ref: "#/components/schemas/PageRange"
          description: ":vartype page_range: list[~azure.storage.blob.models.PageRange]"
        ClearRange:
          type: array
          items:
            $ref: "#/components/schemas/ClearRange"
          description: ":vartype clear_range: list[~azure.storage.blob.models.ClearRange]"
        NextMarker:
          type: string
          description: ":vartype next_marker: str"
    ContainerItem:
      type: object
      description: An Azure Storage container. All required parameters must be populated in order to send to server.
      properties:
        Name:
          type: string
          description: Required.
        Deleted:
          type: boolean
          description: ":vartype deleted: bool"
        Version:
          type: string
          description: ":vartype version: str"
        Properties:
          $ref: "#/components/schemas/ContainerProperties"
          description: Properties of a container. Required.
        Metadata:
          type: object
          properties: {}
          description: Dictionary of .
      required:
        - Name
        - Properties
    ContainerProperties:
      type: object
      description: Properties of a container. All required parameters must be populated in order to send to server.
      properties:
        Last-Modified:
          type: string
          description: Required.
        Etag:
          type: string
          description: Required.
        LeaseStatus:
          type: string
          description: 'Known values are: "locked" and "unlocked".'
        LeaseState:
          type: string
          description: 'Known values are: "available", "leased", "expired", "breaking", and "broken".'
        LeaseDuration:
          type: string
          description: 'Known values are: "infinite" and "fixed".'
        PublicAccess:
          type: string
          description: 'Known values are: "container" and "blob".'
        HasImmutabilityPolicy:
          type: boolean
          description: ":vartype has_immutability_policy: bool"
        HasLegalHold:
          type: boolean
          description: ":vartype has_legal_hold: bool"
        DefaultEncryptionScope:
          type: string
          description: ":vartype default_encryption_scope: str"
        DenyEncryptionScopeOverride:
          type: boolean
          description: ":vartype prevent_encryption_scope_override: bool"
        DeletedTime:
          type: string
          description: ":vartype deleted_time: ~datetime.datetime"
        RemainingRetentionDays:
          type: integer
          description: ":vartype remaining_retention_days: int"
        ImmutableStorageWithVersioningEnabled:
          type: boolean
          description: Indicates if version level worm is enabled on this container.
      required:
        - Last-Modified
        - Etag
    ListContainersSegmentResponse:
      type: object
      description: An enumeration of containers. All required parameters must be populated in order to send to server.
      properties:
        ServiceEndpoint:
          type: string
          description: Required.
        Prefix:
          type: string
          description: ":vartype prefix: str"
        Marker:
          type: string
          description: ":vartype marker: str"
        MaxResults:
          type: integer
          description: ":vartype max_results: int"
        ContainerItems:
          type: array
          items:
            $ref: "#/components/schemas/ContainerItem"
          description: Required.
        NextMarker:
          type: string
          description: ":vartype next_marker: str"
      required:
        - ServiceEndpoint
        - ContainerItems
    Logging:
      type: object
      description: Azure Analytics Logging settings. All required parameters must be populated in order to send to server.
      properties:
        Version:
          type: string
          description: The version of Storage Analytics to configure. Required.
        Delete:
          type: boolean
          description: Indicates whether all delete requests should be logged. Required.
        Read:
          type: boolean
          description: Indicates whether all read requests should be logged. Required.
        Write:
          type: boolean
          description: Indicates whether all write requests should be logged. Required.
        RetentionPolicy:
          $ref: "#/components/schemas/RetentionPolicy"
          description: the retention policy which determines how long the associated data should persist. Required.
      required:
        - Version
        - Delete
        - Read
        - Write
        - RetentionPolicy
    RetentionPolicy:
      type: object
      description: the retention policy which determines how long the associated data should persist. All required parameters must be populated in order to send to server.
      properties:
        Enabled:
          type: boolean
          description: Indicates whether a retention policy is enabled for the storage service. Required.
        Days:
          type: integer
          description: Indicates the number of days that metrics or logging or soft-deleted data should be retained. All data older than this value will be deleted.
        AllowPermanentDelete:
          type: boolean
          description: Indicates whether permanent delete is allowed on this storage account.
      required:
        - Enabled
    Metrics:
      type: object
      description: a summary of request statistics grouped by API in hour or minute aggregates for blobs. All required parameters must be populated in order to send to server.
      properties:
        Version:
          type: string
          description: The version of Storage Analytics to configure.
        Enabled:
          type: boolean
          description: Indicates whether metrics are enabled for the Blob service. Required.
        IncludeAPIs:
          type: boolean
          description: Indicates whether metrics should generate summary statistics for called API operations.
        RetentionPolicy:
          $ref: "#/components/schemas/RetentionPolicy"
          description: the retention policy which determines how long the associated data should persist.
      required:
        - Enabled
    CorsRule:
      type: object
      description: CORS is an HTTP feature that enables a web application running under one domain to access resources in another domain. Web browsers implement a security restriction known as same-origin policy that prevents a web page from calling APIs in a different domain; CORS provides a secure way to allow one domain (the origin domain) to call APIs in another domain. All required parameters must be populated in order to send to server.
      properties:
        AllowedOrigins:
          type: string
          description: The origin domains that are permitted to make a request against the storage service via CORS. The origin domain is the domain from which the request originates. Note that the origin must be an exact case-sensitive match with the origin that the user age sends to the service. You can also use the wildcard character '*' to allow all origin domains to make requests via CORS. Required.
        AllowedMethods:
          type: string
          description: The methods (HTTP request verbs) that the origin domain may use for a CORS request. (comma separated). Required.
        AllowedHeaders:
          type: string
          description: the request headers that the origin domain may specify on the CORS request. Required.
        ExposedHeaders:
          type: string
          description: The response headers that may be sent in the response to the CORS request and exposed by the browser to the request issuer. Required.
        MaxAgeInSeconds:
          type: integer
          description: The maximum amount time that a browser should cache the preflight OPTIONS request. Required.
      required:
        - AllowedOrigins
        - AllowedMethods
        - AllowedHeaders
        - ExposedHeaders
        - MaxAgeInSeconds
    StaticWebsite:
      type: object
      description: The properties that enable an account to host a static website. All required parameters must be populated in order to send to server.
      properties:
        Enabled:
          type: boolean
          description: Indicates whether this account is hosting a static website. Required.
        IndexDocument:
          type: string
          description: The default name of the index page under each directory.
        ErrorDocument404Path:
          type: string
          description: The absolute path of the custom 404 page.
        DefaultIndexDocumentPath:
          type: string
          description: Absolute path of the default index page.
      required:
        - Enabled
    StorageServiceProperties:
      type: object
      description: Storage Service Properties.
      properties:
        Logging:
          $ref: "#/components/schemas/Logging"
          description: Azure Analytics Logging settings.
        HourMetrics:
          $ref: "#/components/schemas/Metrics"
          description: a summary of request statistics grouped by API in hour or minute aggregates for blobs.
        MinuteMetrics:
          $ref: "#/components/schemas/Metrics"
          description: a summary of request statistics grouped by API in hour or minute aggregates for blobs.
        Cors:
          type: array
          items:
            $ref: "#/components/schemas/CorsRule"
          description: The set of CORS rules.
        DefaultServiceVersion:
          type: string
          description: The default version to use for requests to the Blob service if an incoming request's version is not specified. Possible values include version 2008-10-27 and all more recent versions.
        DeleteRetentionPolicy:
          $ref: "#/components/schemas/RetentionPolicy"
          description: the retention policy which determines how long the associated data should persist.
        StaticWebsite:
          $ref: "#/components/schemas/StaticWebsite"
          description: The properties that enable an account to host a static website.
    GeoReplication:
      type: object
      description: Geo-Replication information for the Secondary Storage Service. All required parameters must be populated in order to send to server.
      properties:
        Status:
          type: string
          description: 'The status of the secondary location. Required. Known values are: "live", "bootstrap", and "unavailable".'
        LastSyncTime:
          type: string
          description: A GMT date/time value, to the second. All primary writes preceding this value are guaranteed to be available for read operations at the secondary. Primary writes after this point in time may or may not be available for reads. Required.
      required:
        - Status
        - LastSyncTime
    StorageServiceStats:
      type: object
      description: Stats for the storage service.
      properties:
        GeoReplication:
          $ref: "#/components/schemas/GeoReplication"
          description: Geo-Replication information for the Secondary Storage Service.
    UserDelegationKey:
      type: object
      description: A user delegation key. All required parameters must be populated in order to send to server.
      properties:
        SignedOid:
          type: string
          description: The Azure Active Directory object ID in GUID format. Required.
        SignedTid:
          type: string
          description: The Azure Active Directory tenant ID in GUID format. Required.
        SignedStart:
          type: string
          format: date-time
          description: The date-time the key is active. Required.
        SignedExpiry:
          type: string
          format: date-time
          description: The date-time the key expires. Required.
        SignedService:
          type: string
          description: Abbreviation of the Azure Storage service that accepts the key. Required.
        SignedVersion:
          type: string
          description: The service version that created the key. Required.
        SignedDelegatedUserTid:
          type: string
          description: The delegated user tenant id in Azure AD. Return if DelegatedUserTid is specified.
        Value:
          type: string
          description: The key as a base64 string. Required.
      required:
        - SignedOid
        - SignedTid
        - SignedStart
        - SignedExpiry
        - SignedService
        - SignedVersion
        - Value
