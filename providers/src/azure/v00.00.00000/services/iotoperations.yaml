        matchLabels:
          type: object
          properties: {}
          description: MatchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels map is equivalent to an element of matchExpressions, whose key field is "key", the operator is "In", and the values array contains only "value". The requirements are ANDed.
    VolumeClaimSpecSelectorMatchExpressions:
      type: object
      description: VolumeClaimSpecSelectorMatchExpressions properties.
      properties:
        key:
          type: string
          description: key is the label key that the selector applies to. Required.
        operator:
          $ref: "#/components/schemas/OperatorValues"
          description: "operator represents a key's relationship to a set of values. Valid operators are In, NotIn, Exists and DoesNotExist. Required. Known values are: \"In\", \"NotIn\", \"Exists\", and \"DoesNotExist\"."
        values:
          type: array
          items:
            type: string
          description: values is an array of string values. If the operator is In or NotIn, the values array must be non-empty. If the operator is Exists or DoesNotExist, the values array must be empty. This array is replaced during a strategic merge patch.
      required:
        - key
        - operator
    OperatorValues:
      type: string
      enum:
        - In
        - NotIn
        - Exists
        - DoesNotExist
    GenerateResourceLimits:
      type: object
      description: GenerateResourceLimits properties.
      properties:
        cpu:
          $ref: "#/components/schemas/OperationalMode"
          description: 'The toggle to enable/disable cpu resource limits. Known values are: "Enabled" and "Disabled".'
    BrokerMemoryProfile:
      type: string
      enum:
        - Tiny
        - Low
        - Medium
        - High
    BrokerPersistence:
      type: object
      description: "Disk persistence configuration. When persistence is enabled, certain items (non-performance-critical data) selected for persistence will reside only on disk. Below are the affected items: * Retained messages will be stored on disk only. * WILL messages will be stored on disk only. * DSS key/value pairs will be stored on disk only, except for performance-critical items like timed locks, which remain in both disk and memory for improved performance. Optional. Everything is in-memory if not set. Note: if configured, all MQTT session states are written to disk."
      properties:
        maxSize:
          type: string
          description: The max size of the message buffer on disk. If a PVC template is specified using persistentVolumeClaimSpec Then this size is used as the request and limit sizes of that template. If a PVC template isn't specified Then local-path provisioner is requested with this size limit. Required. Required.
        persistentVolumeClaimSpec:
          $ref: "#/components/schemas/VolumeClaimSpec"
          description: Use the specified persistent volume claim template to mount a persistent volume. Same object as in diskBackedMessageBuffer, but with a limitation that access modes field must be set to `ReadWriteOncePod`. If unset, a default PVC with default properties will be used. Among other things this PVC will use the cluster default storage class, which may or may not be using a local path provisioner. User is opting in to sub-optimal behavior if they leave this unset or set it without the storage class field, and their cluster default is not a local path class.
        retain:
          $ref: "#/components/schemas/BrokerRetainMessagesPolicy"
          description: Controls which topic's retained messages should be persisted to disk.
        stateStore:
          $ref: "#/components/schemas/BrokerStateStorePolicy"
          description: Controls which keys should be persisted to disk for the state store.
        subscriberQueue:
          $ref: "#/components/schemas/BrokerSubscriberQueuePolicy"
          description: "Controls which subscriber message queues should be persisted to disk. Important: to facilitate reconnection, session state metadata are ALWAYS written to disk if any persistence setting is specified, even if this section isn't set."
        encryption:
          $ref: "#/components/schemas/BrokerPersistenceEncryption"
          description: Controls settings related to encryption of the persistence database. Optional, defaults to enabling encryption.
      required:
        - maxSize
    BrokerRetainMessagesPolicy:
      type: object
      description: "Broker Retain policy properties. You probably want to use the sub-classes and not this class directly. Known sub-classes are: BrokerRetainMessagesCustomPolicy"
      properties:
        mode:
          type: string
          description: "'All' to persist all retain messages, 'None' to not persist any, 'Custom' to persist only the specified topics. Required. Known values are: \"All\", \"None\", and \"Custom\"."
      required:
        - mode
    BrokerStateStorePolicy:
      type: object
      description: "Broker State Store Policy. You probably want to use the sub-classes and not this class directly. Known sub-classes are: BrokerStateStoreCustomPolicy"
      properties:
        mode:
          type: string
          description: "'All' to persist all keys, 'None' to not persist any, 'Custom' to persist only the specified keys. Required. Known values are: \"All\", \"None\", and \"Custom\"."
      required:
        - mode
    BrokerSubscriberQueuePolicy:
      type: object
      description: "Broker Subscriber Queue Policy properties. You probably want to use the sub-classes and not this class directly. Known sub-classes are: BrokerSubscriberQueueCustomPolicy"
      properties:
        mode:
          type: string
          description: "'All' to persist all subscriber queues, 'None' to not persist any, 'Custom' to persist only the specified queues. Required. Known values are: \"All\", \"None\", and \"Custom\"."
      required:
