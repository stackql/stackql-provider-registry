        inputs:
          type: array
          items:
            type: string
          description: List of fields for enriching from the Broker State Store. Required.
        expression:
          type: string
          description: "Condition to enrich data from Broker State Store. Example: $1 < 0 || $1 > $2 (Assuming inputs section $1 and $2 are provided)."
      required:
        - key
        - inputs
