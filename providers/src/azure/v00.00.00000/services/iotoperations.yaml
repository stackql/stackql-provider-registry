        inputs:
          type: array
          items:
            type: string
          description: List of fields for filtering in JSON path expression. Required.
        expression:
          type: string
          description: "Condition to filter data. Can reference input fields with {n} where n is the index of the input field starting from 1. Example: $1 < 0 || $1 > $2 (Assuming inputs section $1 and $2 are provided). Required."
      required:
        - inputs
        - expression
