openapi: 3.0.0
servers:
  - url: https://{account}.queue.core.windows.net
    variables:
      account:
        default: ""
        description: Storage account name.
info:
  title: Azure Queue Storage (Data Plane)
  description: Queues and queue message operations.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: unversioned-stackql-generated
  x-serviceAlias: storage_queue
  x-sdkPackage: azure-storage-queue
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SignedIdentifier:
      type: object
      description: The signed identifier.
      properties:
        id:
          type: string
          description: The unique ID for the signed identifier. Required.
        accessPolicy:
          $ref: "#/components/schemas/AccessPolicy"
          description: The access policy for the signed identifier. Required.
      required:
        - id
        - accessPolicy
    AccessPolicy:
      type: object
      description: The access policy.
      properties:
        start:
          type: string
          description: The date-time the policy is active.
        expiry:
          type: string
          description: The date-time the policy expires.
        permission:
          type: string
          description: The permissions for the policy.
    SignedIdentifiers:
      type: object
      description: An array of signed identifiers.
      properties:
        items_:
          type: array
          items:
            $ref: "#/components/schemas/SignedIdentifier"
          description: The list of signed identifiers. Required.
      required:
        - items_
    ReceivedMessages:
      type: object
      description: The response of receive messages.
      properties:
        items_:
          type: array
          items:
            $ref: "#/components/schemas/ReceivedMessage"
          description: The list of received messages. Required.
      required:
        - items_
    ReceivedMessage:
      type: object
      description: The received queue message.
      properties:
        messageId:
          type: string
          description: The ID of the message. Required.
        insertionTime:
          type: string
          format: date-time
          description: The time the message was inserted into the queue. Required.
        expirationTime:
          type: string
          format: date-time
          description: The time that the message will expire and be automatically deleted. Required.
        popReceipt:
          type: string
          description: An opaque value required to delete the message. If deletion fails using this PopReceipt then the message has been dequeued by another client. Required.
        timeNextVisible:
          type: string
          format: date-time
          description: The time that the message will again become visible in the queue. Required.
        dequeueCount:
          type: integer
          description: The number of times the message has been dequeued. Required.
        messageText:
          type: string
          description: The content of the message. Required.
      required:
        - messageId
        - insertionTime
        - expirationTime
        - popReceipt
        - timeNextVisible
        - dequeueCount
        - messageText
    ListOfSentMessage:
      type: object
      description: The response of send message.
      properties:
        items_:
          type: array
          items:
            $ref: "#/components/schemas/SentMessage"
          description: The list of sent messages. Required.
      required:
        - items_
    SentMessage:
      type: object
      description: The sent queue message.
      properties:
        messageId:
          type: string
          description: The ID of the message. Required.
        insertionTime:
          type: string
          format: date-time
          description: The time the message was inserted into the queue. Required.
        expirationTime:
          type: string
          format: date-time
          description: The time that the message will expire and be automatically deleted. Required.
        popReceipt:
          type: string
          description: An opaque value required to delete the message. If deletion fails using this PopReceipt then the message has been dequeued by another client. Required.
        timeNextVisible:
          type: string
          format: date-time
          description: The time that the message will again become visible in the queue. Required.
      required:
        - messageId
        - insertionTime
        - expirationTime
        - popReceipt
        - timeNextVisible
    PeekedMessages:
      type: object
      description: The response of peek messages.
      properties:
        items_:
          type: array
          items:
            $ref: "#/components/schemas/PeekedMessage"
          description: The list of peeked messages. Required.
      required:
        - items_
    PeekedMessage:
      type: object
      description: The peeked queue message.
      properties:
        messageId:
          type: string
          description: The ID of the message. Required.
        insertionTime:
          type: string
          format: date-time
          description: The time the message was inserted into the queue. Required.
        expirationTime:
          type: string
          format: date-time
          description: The time that the message will expire and be automatically deleted. Required.
        dequeueCount:
          type: integer
          description: The number of times the message has been dequeued. Required.
        messageText:
          type: string
          description: The content of the message. Required.
      required:
        - messageId
        - insertionTime
        - expirationTime
        - dequeueCount
        - messageText
    Logging:
      type: object
      description: Azure Analytics Logging settings.
      properties:
        version:
          type: string
          description: The version of the logging properties. Required.
        delete:
          type: boolean
          description: Whether delete operation is logged. Required.
        read:
          type: boolean
          description: Whether read operation is logged. Required.
        write:
          type: boolean
          description: Whether write operation is logged. Required.
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicy"
          description: The retention policy of the logs. Required.
      required:
        - version
        - delete
        - read
        - write
        - retentionPolicy
    RetentionPolicy:
      type: object
      description: The retention policy.
      properties:
        enabled:
          type: boolean
          description: Whether to enable the retention policy. Required.
        days:
          type: integer
          description: The number of days to retain the logs.
      required:
        - enabled
    Metrics:
      type: object
      description: The metrics properties.
      properties:
        version:
          type: string
          description: The version of the metrics properties.
        enabled:
          type: boolean
          description: Whether it is enabled. Required.
        includeApis:
          type: boolean
          description: Whether to include API in the metrics.
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicy"
          description: The retention policy of the metrics.
      required:
        - enabled
    CorsRule:
      type: object
      description: The CORS rules.
      properties:
        allowedOrigins:
          type: string
          description: The allowed origins. Required.
        allowedMethods:
          type: string
          description: The allowed methods. Required.
        allowedHeaders:
          type: string
          description: The allowed headers. Required.
        exposedHeaders:
          type: string
          description: The exposed headers. Required.
        maxAgeInSeconds:
          type: integer
          description: The maximum age in seconds. Required.
      required:
        - allowedOrigins
        - allowedMethods
        - allowedHeaders
        - exposedHeaders
        - maxAgeInSeconds
    QueueServiceProperties:
      type: object
      description: The service properties.
      properties:
        logging:
          $ref: "#/components/schemas/Logging"
          description: The logging properties.
        hourMetrics:
          $ref: "#/components/schemas/Metrics"
          description: The hour metrics properties.
        minuteMetrics:
          $ref: "#/components/schemas/Metrics"
          description: The minute metrics properties.
        cors:
          type: array
          items:
            $ref: "#/components/schemas/CorsRule"
          description: The CORS properties.
    GeoReplication:
      type: object
      description: Geo replication information for the secondary storage location.
      properties:
        status:
          $ref: "#/components/schemas/GeoReplicationStatus"
          description: 'The status of the secondary location. Required. Known values are: "live", "bootstrap", and "unavailable".'
        lastSyncTime:
          type: string
          format: date-time
          description: A GMT date/time value, to the second. All primary writes preceding this value are guaranteed to be available for read operations at the secondary. Primary writes after this point in time may or may not be available for reads. Required.
      required:
        - status
        - lastSyncTime
    GeoReplicationStatus:
      type: string
      enum:
        - live
        - bootstrap
        - unavailable
    QueueServiceStats:
      type: object
      description: Statistics for the storage queue service.
      properties:
        geoReplication:
          $ref: "#/components/schemas/GeoReplication"
          description: The geo replication stats.
    UserDelegationKey:
      type: object
      description: A user delegation key.
      properties:
        signedOid:
          type: string
          description: The Entra ID object ID in GUID format. Required.
        signedTid:
          type: string
          description: The Entra ID tenant ID in GUID format. Required.
        signedStart:
          type: string
          description: The date-time the key is active. Required.
        signedExpiry:
          type: string
          description: The date-time the key expires. Required.
        signedService:
          type: string
          description: The service that created the key. Required.
        signedVersion:
          type: string
          description: The service version used when creating the key. Required.
        signedDelegatedUserTid:
          type: string
          description: The delegated user tenant ID in Entra ID. Return if DelegatedUserTid is specified.
        value:
          type: string
          description: The key as a base64 string. Required.
      required:
        - signedOid
        - signedTid
        - signedStart
        - signedExpiry
        - signedService
        - signedVersion
        - value
    QueueItem:
      type: object
      description: An Azure Storage Queue.
      properties:
        name:
          type: string
          description: The name of the queue. Required.
        metadata:
          type: object
          properties: {}
          description: The metadata of the queue.
      required:
        - name
    ListQueuesResponse:
      type: object
      description: The list queues response.
      properties:
        serviceEndpoint:
          type: string
          description: The service endpoint. Required.
        prefix:
          type: string
          description: The prefix of the queues. Required.
        marker:
          type: string
          description: Identifies the current position in the list queues operation.
        maxResults:
          type: integer
          description: The max results. Required.
        queueItems:
          type: array
          items:
            $ref: "#/components/schemas/QueueItem"
          description: The list of queues.
        nextMarker:
          type: string
          description: Identifies the portion of the list of queues to be returned with the next listing operation. Required.
      required:
        - serviceEndpoint
        - prefix
        - maxResults
        - nextMarker
  x-stackQL-resources:
    queue:
      id: azure.storage_queue.queue
      name: queue
      title: queue
      methods:
        get_properties:
          operation:
            $ref: "#/paths/~1?comp=metadata/get"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
        set_metadata:
          operation:
            $ref: "#/paths/~1?comp=metadata/put"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
        get_access_policy:
          operation:
            $ref: "#/paths/~1?comp=acl/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
        set_access_policy:
          operation:
            $ref: "#/paths/~1?comp=acl/put"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        receive_messages:
          operation:
            $ref: "#/paths/~1messages/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
        clear:
          operation:
            $ref: "#/paths/~1messages/delete"
          response:
            openAPIDocKey: "204"
          request:
            nativeCasing: camel
        send_message:
          operation:
            $ref: "#/paths/~1messages/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        peek_messages:
          operation:
            $ref: "#/paths/~1messages?peekonly=true/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
        update_message:
          operation:
            $ref: "#/paths/~1messages~1{message_id}/put"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_message:
          operation:
            $ref: "#/paths/~1messages~1{message_id}/delete"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/queue/methods/get_access_policy"
        insert: []
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/queue/methods/clear"
    service:
      id: azure.storage_queue.service
      name: service
      title: service
      methods:
        get_properties:
          operation:
            $ref: "#/paths/~1?restype=service&comp=properties/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
        set_properties:
          operation:
            $ref: "#/paths/~1?restype=service&comp=properties/put"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        get_statistics:
          operation:
            $ref: "#/paths/~1?restype=service&comp=stats/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
        get_user_delegation_key:
          operation:
            $ref: "#/paths/~1?restype=service&comp=userdelegationkey/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        get_queues:
          operation:
            $ref: "#/paths/~1?comp=list/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/service/methods/get_user_delegation_key"
          - $ref: "#/components/x-stackQL-resources/service/methods/get_properties"
        insert: []
        update: []
        delete: []
paths:
  /?comp=metadata:
    get:
      operationId: Queue_get_properties
      description: Returns all user-defined metadata and system properties for the specified queue.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      responses:
        "200":
          description: Success
    put:
      operationId: Queue_set_metadata
      description: Sets user-defined metadata for the specified queue.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
        - name: x-ms-meta
          in: header
          required: false
          schema:
            type: string
          description: The metadata headers. Default value is None.
      responses:
        "200":
          description: Success
  /?comp=acl:
    get:
      operationId: Queue_get_access_policy
      description: Gets the access policy for the specified queue.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedIdentifiers"
    put:
      operationId: Queue_set_access_policy
      description: Sets the permissions for the specified queue.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items_:
                  type: array
                  items:
                    $ref: "#/components/schemas/SignedIdentifier"
                  description: The list of signed identifiers. Required.
              required:
                - items_
      responses:
        "200":
          description: Success
  /messages:
    get:
      operationId: Queue_receive_messages
      description: Retrieves one or more messages from the front of the queue.
      parameters:
        - name: numofmessages
          in: query
          required: false
          schema:
            type: integer
          description: A nonzero integer value that specifies the number of messages to retrieve from the queue, up to a maximum of 32. If fewer are visible, the visible messages are returned. By default, a single message is retrieved from the queue with this operation. Default value is None.
        - name: visibilitytimeout
          in: query
          required: false
          schema:
            type: integer
          description: Specifies the new visibility timeout value, in seconds, relative to server time. A specified value must be larger than or equal to 1 second, and cannot be larger than 7 days. The visibility timeout of a message can be set to a value later than the expiry time. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceivedMessages"
    delete:
      operationId: Queue_clear
      description: Deletes all messages from the specified queue.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      responses:
        "204":
          description: Success (no content / accepted)
    post:
      operationId: Queue_send_message
      description: Adds a new message to the back of the message queue. A visibility timeout can also be specified to make the message invisible until the visibility timeout expires.
      parameters:
        - name: visibilitytimeout
          in: query
          required: false
          schema:
            type: integer
          description: Specifies the new visibility timeout value, in seconds, relative to server time. A specified value must be larger than or equal to 1 second, and cannot be larger than 7 days. The visibility timeout of a message can be set to a value later than the expiry time. Default value is None.
        - name: messagettl
          in: query
          required: false
          schema:
            type: integer
          description: Specifies the time-to-live interval for the message, in seconds. Prior to version 2017-07-29, the maximum time-to-live allowed is 7 days. For version 2017-07-29 or later, the maximum time-to-live can be any positive number, as well as -1 indicating that the message does not expire. If this parameter is omitted, the default time-to-live is 7 days. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messageText:
                  type: string
                  description: The content of the message. Required.
              required:
                - messageText
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOfSentMessage"
  /messages?peekonly=true:
    get:
      operationId: Queue_peek_messages
      description: Retrieves one or more messages from the front of the queue, but does not alter the visibility of the message.
      parameters:
        - name: numofmessages
          in: query
          required: false
          schema:
            type: integer
          description: A nonzero integer value that specifies the number of messages to retrieve from the queue, up to a maximum of 32. If fewer are visible, the visible messages are returned. By default, a single message is retrieved from the queue with this operation. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeekedMessages"
  /messages/{message_id}:
    put:
      operationId: Queue_update_message
      description: Updates the visibility timeout of a message. This operation can also be used to update the contents of a message.
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the queue message. Required.
        - name: popreceipt
          in: query
          required: true
          schema:
            type: string
          description: An opaque value required to delete the message. If deletion fails using this PopReceipt then the message has been dequeued by another client. Required.
        - name: visibilitytimeout
          in: query
          required: true
          schema:
            type: integer
          description: Specifies the new visibility timeout value, in seconds, relative to server time. A specified value must be larger than or equal to 1 second, and cannot be larger than 7 days. The visibility timeout of a message can be set to a value later than the expiry time. Required.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messageText:
                  type: string
                  description: The content of the message. Required.
              required:
                - messageText
      responses:
        "200":
          description: Success
    delete:
      operationId: Queue_delete_message
      description: Deletes the specified message.
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the queue message. Required.
        - name: popreceipt
          in: query
          required: true
          schema:
            type: string
          description: An opaque value required to delete the message. If deletion fails using this PopReceipt then the message has been dequeued by another client. Required.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      responses:
        "200":
          description: Success
  /?restype=service&comp=properties:
    get:
      operationId: Service_get_properties
      description: Retrieves properties of a storage account's Queue service, including properties for Storage Analytics and CORS (Cross-Origin Resource Sharing) rules.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueServiceProperties"
    put:
      operationId: Service_set_properties
      description: Sets properties for a storage account's Queue service endpoint, including properties for Storage Analytics and CORS (Cross-Origin Resource Sharing) rules.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                logging:
                  $ref: "#/components/schemas/Logging"
                  description: The logging properties.
                hourMetrics:
                  $ref: "#/components/schemas/Metrics"
                  description: The hour metrics properties.
                minuteMetrics:
                  $ref: "#/components/schemas/Metrics"
                  description: The minute metrics properties.
                cors:
                  type: array
                  items:
                    $ref: "#/components/schemas/CorsRule"
                  description: The CORS properties.
      responses:
        "200":
          description: Success
  /?restype=service&comp=stats:
    get:
      operationId: Service_get_statistics
      description: Retrieves statistics related to replication for the Queue service. It is only available on the secondary location endpoint when read-access geo-redundant replication is enabled for the storage account.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueServiceStats"
  /?restype=service&comp=userdelegationkey:
    post:
      operationId: Service_get_user_delegation_key
      description: Retrieves a user delegation key for the Queue service. This is only a valid operation when using bearer token authentication.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see Setting Timeouts for Queue Service Operations.. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                start:
                  type: string
                  description: The date-time the key is active in ISO 8601 UTC time.
                expiry:
                  type: string
                  description: The date-time the key expires in ISO 8601 UTC time. Required.
                delegatedUserTid:
                  type: string
                  description: The delegated user tenant ID in Entra ID.
