openapi: 3.0.0
servers:
  - url: https://{vault_name}.vault.azure.net
    variables:
      vault_name:
        default: ""
        description: Key vault name.
info:
  title: Azure Key Vault - Certificates (Data Plane)
  description: "Certificate lifecycle: issuers, policies, versions and contacts."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-03-01-preview-stackql-generated
  x-serviceAlias: key_vault_certificates
  x-sdkPackage: azure-keyvault-certificates
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    CertificateAttributes:
      type: object
      description: The certificate management attributes.
      properties:
        enabled:
          type: boolean
          description: Determines whether the object is enabled.
        nbf:
          type: string
          format: date-time
          description: Not before date in UTC.
        exp:
          type: string
          format: date-time
          description: Expiry date in UTC.
        created:
          type: string
          format: date-time
          description: Creation time in UTC.
        updated:
          type: string
          format: date-time
          description: Last updated time in UTC.
        recoverableDays:
          type: integer
          description: softDelete data retention days. Value should be >=7 and <=90 when softDelete enabled, otherwise 0.
        recoveryLevel:
          $ref: "#/components/schemas/DeletionRecoveryLevel"
          description: "Reflects the deletion recovery level currently in effect for certificates in the current vault. If it contains 'Purgeable', the certificate can be permanently deleted by a privileged user; otherwise, only the system can purge the certificate, at the end of the retention interval. Known values are: \"Purgeable\", \"Recoverable+Purgeable\", \"Recoverable\", \"Recoverable+ProtectedSubscription\", \"CustomizedRecoverable+Purgeable\", \"CustomizedRecoverable\", and \"CustomizedRecoverable+ProtectedSubscription\"."
    DeletionRecoveryLevel:
      type: string
      enum:
        - Purgeable
        - Recoverable+Purgeable
        - Recoverable
        - Recoverable+ProtectedSubscription
        - CustomizedRecoverable+Purgeable
        - CustomizedRecoverable
        - CustomizedRecoverable+ProtectedSubscription
    CertificateItem:
      type: object
      description: The certificate item containing certificate metadata.
      properties:
        id:
          type: string
          description: Certificate identifier.
        attributes:
          $ref: "#/components/schemas/CertificateAttributes"
          description: The certificate management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        x5t:
          type: string
          format: byte
          description: Thumbprint of the certificate.
    PagedCertificateItem:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/CertificateItem"
        nextLink:
          type: string
    Contact:
      type: object
      description: The contact information for the vault certificates.
      properties:
        email:
          type: string
          description: Email address.
        name:
          type: string
          description: Name.
        phone:
          type: string
          description: Phone number.
    Contacts:
      type: object
      description: The contacts for the vault certificates.
      properties:
        id:
          type: string
          description: Identifier for the contacts collection.
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
          description: The contact list for the vault certificates.
    CertificateIssuerItem:
      type: object
      description: The certificate issuer item containing certificate issuer metadata.
      properties:
        id:
          type: string
          description: Certificate Identifier.
        provider:
          type: string
          description: The issuer provider.
    PagedCertificateIssuerItem:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/CertificateIssuerItem"
        nextLink:
          type: string
    IssuerCredentials:
      type: object
      description: The credentials to be used for the certificate issuer.
      properties:
        account_id:
          type: string
          description: The user name/account name/account id.
        pwd:
          type: string
          description: The password/secret/account key.
    OrganizationDetails:
      type: object
      description: Details of the organization of the certificate issuer.
      properties:
        id:
          type: string
          description: Id of the organization.
        admin_details:
          type: array
          items:
            $ref: "#/components/schemas/AdministratorDetails"
          description: Details of the organization administrator.
    AdministratorDetails:
      type: object
      description: Details of the organization administrator of the certificate issuer.
      properties:
        first_name:
          type: string
          description: First name.
        last_name:
          type: string
          description: Last name.
        email:
          type: string
          description: Email address.
        phone:
          type: string
          description: Phone number.
    IssuerAttributes:
      type: object
      description: The attributes of an issuer managed by the Key Vault service.
      properties:
        enabled:
          type: boolean
          description: Determines whether the issuer is enabled.
        created:
          type: string
          format: date-time
          description: Creation time in UTC.
        updated:
          type: string
          format: date-time
          description: Last updated time in UTC.
    IssuerBundle:
      type: object
      description: The issuer for Key Vault certificate.
      properties:
        id:
          type: string
          description: Identifier for the issuer object.
        provider:
          type: string
          description: The issuer provider.
        credentials:
          $ref: "#/components/schemas/IssuerCredentials"
          description: The credentials to be used for the issuer.
        org_details:
          $ref: "#/components/schemas/OrganizationDetails"
          description: Details of the organization as provided to the issuer.
        attributes:
          $ref: "#/components/schemas/IssuerAttributes"
          description: Attributes of the issuer object.
    KeyProperties:
      type: object
      description: Properties of the key pair backing a certificate.
      properties:
        exportable:
          type: boolean
          description: Indicates if the private key can be exported. Release policy must be provided when creating the first version of an exportable key.
        kty:
          $ref: "#/components/schemas/JsonWebKeyType"
          description: 'The type of key pair to be used for the certificate. Known values are: "EC", "EC-HSM", "RSA", "RSA-HSM", "oct", and "oct-HSM".'
        key_size:
          type: integer
          description: "The key size in bits. For example: 2048, 3072, or 4096 for RSA."
        reuse_key:
          type: boolean
          description: Indicates if the same key pair will be used on certificate renewal.
        crv:
          $ref: "#/components/schemas/JsonWebKeyCurveName"
          description: 'Elliptic curve name. For valid values, see JsonWebKeyCurveName. Known values are: "P-256", "P-384", "P-521", and "P-256K".'
    JsonWebKeyType:
      type: string
      enum:
        - EC
        - EC-HSM
        - RSA
        - RSA-HSM
        - oct
        - oct-HSM
    JsonWebKeyCurveName:
      type: string
      enum:
        - P-256
        - P-384
        - P-521
        - P-256K
    SecretProperties:
      type: object
      description: Properties of the key backing a certificate.
      properties:
        contentType:
          type: string
          description: The media type (MIME type).
    X509CertificateProperties:
      type: object
      description: Properties of the X509 component of a certificate.
      properties:
        subject:
          type: string
          description: The subject name. Should be a valid X509 distinguished Name.
        ekus:
          type: array
          items:
            type: string
          description: The enhanced key usage.
        sans:
          $ref: "#/components/schemas/SubjectAlternativeNames"
          description: The subject alternative names.
        key_usage:
          type: array
          items:
            $ref: "#/components/schemas/KeyUsageType"
          description: Defines how the certificate's key may be used.
        validity_months:
          type: integer
          description: The duration that the certificate is valid in months.
    SubjectAlternativeNames:
      type: object
      description: The Subject Alternative Names of a X509 object.
      properties:
        emails:
          type: array
          items:
            type: string
          description: Email addresses.
        dns_names:
          type: array
          items:
            type: string
          description: Domain Names.
        upns:
          type: array
          items:
            type: string
          description: User Principal Names.
        uris:
          type: array
          items:
            type: string
          description: Uniform Resource Identifiers.
        ipAddresses:
          type: array
          items:
            type: string
          description: IP addresses; supports IPv4 and IPv6.
    KeyUsageType:
      type: string
      enum:
        - digitalSignature
        - nonRepudiation
        - keyEncipherment
        - dataEncipherment
        - keyAgreement
        - keyCertSign
        - cRLSign
        - encipherOnly
        - decipherOnly
    LifetimeAction:
      type: object
      description: Action and its trigger that will be performed by Key Vault over the lifetime of a certificate.
      properties:
        trigger:
          $ref: "#/components/schemas/Trigger"
          description: The condition that will execute the action.
        action:
          $ref: "#/components/schemas/Action"
          description: The action that will be executed.
    Trigger:
      type: object
      description: A condition to be satisfied for an action to be executed.
      properties:
        lifetime_percentage:
          type: integer
          description: Percentage of lifetime at which to trigger. Value should be between 1 and 99.
        days_before_expiry:
          type: integer
          description: Days before expiry to attempt renewal. Value should be between 1 and validity_in_months multiplied by 27. If validity_in_months is 36, then value should be between 1 and 972 (36 * 27).
    Action:
      type: object
      description: The action that will be executed.
      properties:
        action_type:
          $ref: "#/components/schemas/CertificatePolicyAction"
          description: 'The type of the action. Known values are: "EmailContacts" and "AutoRenew".'
    CertificatePolicyAction:
      type: string
      enum:
        - EmailContacts
        - AutoRenew
    IssuerParameters:
      type: object
      description: Parameters for the issuer of the X509 component of a certificate.
      properties:
        name:
          type: string
          description: Name of the referenced issuer object or reserved names; for example, 'Self' or 'Unknown'.
        cty:
          type: string
          description: Certificate type as supported by the provider (optional); for example 'OV-SSL', 'EV-SSL'.
        cert_transparency:
          type: boolean
          description: Indicates if the certificates generated under this policy should be published to certificate transparency logs.
    PlatformManaged:
      type: object
      description: Properties of the platform managed certificate. This feature is currently intended for internal use only.
      properties:
        certificateUsage:
          type: string
          description: The intended usage of the certificate. Required.
        metadata:
          type: object
          properties: {}
          description: JSON-formatted platform managed metadata. The schema is intentionally undefined as this feature is currently intended for internal use only.
      required:
        - certificateUsage
    CertificatePolicy:
      type: object
      description: Management policy for a certificate.
      properties:
        id:
          type: string
          description: The certificate id.
        key_props:
          $ref: "#/components/schemas/KeyProperties"
          description: Properties of the key backing a certificate.
        secret_props:
          $ref: "#/components/schemas/SecretProperties"
          description: Properties of the secret backing a certificate.
        x509_props:
          $ref: "#/components/schemas/X509CertificateProperties"
          description: Properties of the X509 component of a certificate.
        lifetime_actions:
          type: array
          items:
            $ref: "#/components/schemas/LifetimeAction"
          description: Actions that will be performed by Key Vault over the lifetime of a certificate.
        issuer:
          $ref: "#/components/schemas/IssuerParameters"
          description: Parameters for the issuer of the X509 component of a certificate.
        attributes:
          $ref: "#/components/schemas/CertificateAttributes"
          description: The certificate attributes.
        platformManaged:
          $ref: "#/components/schemas/PlatformManaged"
          description: Configuration that enables the platform to manage the certificate on behalf of the user. This feature is currently intended for internal use only.
    CertificateBundle:
      type: object
      description: A certificate bundle consists of a certificate (X509) plus its attributes.
      properties:
        id:
          type: string
          description: The certificate id.
        kid:
          type: string
          description: The key id.
        sid:
          type: string
          description: The secret id.
        x5t:
          type: string
          format: byte
          description: Thumbprint of the certificate.
        policy:
          $ref: "#/components/schemas/CertificatePolicy"
          description: The management policy.
        cer:
          type: string
          format: byte
          description: CER contents of x509 certificate.
        contentType:
          type: string
          description: The content type of the secret. eg. 'application/x-pem-file' or 'application/x-pkcs12'.
        attributes:
          $ref: "#/components/schemas/CertificateAttributes"
          description: The certificate attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        preserveCertOrder:
          type: boolean
          description: Specifies whether the certificate chain preserves its original order. The default value is false, which sets the leaf certificate at index 0.
    KeyVaultErrorError:
      type: object
      description: KeyVaultErrorError.
      properties:
        code:
          type: string
          description: The error code.
        message:
          type: string
          description: The error message.
        innererror:
          $ref: "#/components/schemas/KeyVaultErrorError"
          description: The key vault server error.
    CertificateOperation:
      type: object
      description: A certificate operation is returned in case of asynchronous requests.
      properties:
        id:
          type: string
          description: The certificate id.
        issuer:
          $ref: "#/components/schemas/IssuerParameters"
          description: Parameters for the issuer of the X509 component of a certificate.
        csr:
          type: string
          format: byte
          description: The certificate signing request (CSR) that is being used in the certificate operation.
        cancellation_requested:
          type: boolean
          description: Indicates if cancellation was requested on the certificate operation.
        status:
          type: string
          description: Status of the certificate operation.
        status_details:
          type: string
          description: The status details of the certificate operation.
        error:
          $ref: "#/components/schemas/KeyVaultErrorError"
          description: Error encountered, if any, during the certificate operation.
        target:
          type: string
          description: Location which contains the result of the certificate operation.
        preserveCertOrder:
          type: boolean
          description: Specifies whether the certificate chain preserves its original order. The default value is false, which sets the leaf certificate at index 0.
        request_id:
          type: string
          description: Identifier for the certificate operation.
    DeletedCertificateItem:
      type: object
      description: The deleted certificate item containing metadata about the deleted certificate.
      properties:
        id:
          type: string
          description: Certificate identifier.
        attributes:
          $ref: "#/components/schemas/CertificateAttributes"
          description: The certificate management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        x5t:
          type: string
          format: byte
          description: Thumbprint of the certificate.
        recoveryId:
          type: string
          description: The url of the recovery object, used to identify and recover the deleted certificate.
        scheduledPurgeDate:
          type: string
          format: date-time
          description: The time when the certificate is scheduled to be purged, in UTC.
        deletedDate:
          type: string
          format: date-time
          description: The time when the certificate was deleted, in UTC.
    PagedDeletedCertificateItem:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DeletedCertificateItem"
        nextLink:
          type: string
    DeletedCertificateBundle:
      type: object
      description: A Deleted Certificate consisting of its previous id, attributes and its tags, as well as information on when it will be purged.
      properties:
        id:
          type: string
          description: The certificate id.
        kid:
          type: string
          description: The key id.
        sid:
          type: string
          description: The secret id.
        x5t:
          type: string
          format: byte
          description: Thumbprint of the certificate.
        policy:
          $ref: "#/components/schemas/CertificatePolicy"
          description: The management policy.
        cer:
          type: string
          format: byte
          description: CER contents of x509 certificate.
        contentType:
          type: string
          description: The content type of the secret. eg. 'application/x-pem-file' or 'application/x-pkcs12'.
        attributes:
          $ref: "#/components/schemas/CertificateAttributes"
          description: The certificate attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        preserveCertOrder:
          type: boolean
          description: Specifies whether the certificate chain preserves its original order. The default value is false, which sets the leaf certificate at index 0.
        recoveryId:
          type: string
          description: The url of the recovery object, used to identify and recover the deleted certificate.
        scheduledPurgeDate:
          type: string
          format: date-time
          description: The time when the certificate is scheduled to be purged, in UTC.
        deletedDate:
          type: string
          format: date-time
          description: The time when the certificate was deleted, in UTC.
    BackupCertificateResult:
      type: object
      description: The backup certificate result, containing the backup blob.
      properties:
        value:
          type: string
          format: byte
          description: The backup blob containing the backed up certificate.
