paths:
  /certificates?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_certificates
      description: List certificates in a specified key vault. The GetCertificates operation returns the set of certificates resources in the specified key vault. This operation requires the certificates/list permission.
      parameters:
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
        - name: includePending
          in: query
          required: false
          schema:
            type: boolean
          description: Specifies whether to include certificates which are not completely provisioned. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedCertificateItem"
  /certificates/contacts?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_certificate_contacts
      description: Lists the certificate contacts for a specified key vault. The GetCertificateContacts operation returns the set of certificate contact resources in the specified key vault. This operation requires the certificates/managecontacts permission.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contacts"
    put:
      operationId: _KeyVaultClient_set_certificate_contacts
      description: Sets the certificate contacts for the specified key vault. Sets the certificate contacts for the specified key vault. This operation requires the certificates/managecontacts permission.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contacts:
                  type: array
                  items:
                    $ref: "#/components/schemas/Contact"
                  description: The contact list for the vault certificates.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contacts"
    delete:
      operationId: _KeyVaultClient_delete_certificate_contacts
      description: Deletes the certificate contacts for a specified key vault. Deletes the certificate contacts for a specified key vault certificate. This operation requires the certificates/managecontacts permission.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contacts"
  /certificates/issuers?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_certificate_issuers
      description: List certificate issuers for a specified key vault. The GetCertificateIssuers operation returns the set of certificate issuer resources in the specified key vault. This operation requires the certificates/manageissuers/getissuers permission.
      parameters:
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedCertificateIssuerItem"
  /certificates/issuers/{issuer_name}?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_certificate_issuer
      description: Lists the specified certificate issuer. The GetCertificateIssuer operation returns the specified certificate issuer resources in the specified key vault. This operation requires the certificates/manageissuers/getissuers permission.
      parameters:
        - name: issuer_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the issuer. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuerBundle"
    put:
      operationId: _KeyVaultClient_set_certificate_issuer
      description: Sets the specified certificate issuer. The SetCertificateIssuer operation adds or updates the specified certificate issuer. This operation requires the certificates/setissuers permission.
      parameters:
        - name: issuer_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the issuer. The value you provide may be copied globally for the purpose of running the service. The value provided should not include personally identifiable or sensitive information. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  description: The issuer provider. Required.
                credentials:
                  $ref: "#/components/schemas/IssuerCredentials"
                  description: The credentials to be used for the issuer.
                org_details:
                  $ref: "#/components/schemas/OrganizationDetails"
                  description: Details of the organization as provided to the issuer.
                attributes:
                  $ref: "#/components/schemas/IssuerAttributes"
                  description: Attributes of the issuer object.
              required:
                - provider
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuerBundle"
    patch:
      operationId: _KeyVaultClient_update_certificate_issuer
      description: Updates the specified certificate issuer. The UpdateCertificateIssuer operation performs an update on the specified certificate issuer entity. This operation requires the certificates/setissuers permission.
      parameters:
        - name: issuer_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the issuer. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  description: The issuer provider.
                credentials:
                  $ref: "#/components/schemas/IssuerCredentials"
                  description: The credentials to be used for the issuer.
                org_details:
                  $ref: "#/components/schemas/OrganizationDetails"
                  description: Details of the organization as provided to the issuer.
                attributes:
                  $ref: "#/components/schemas/IssuerAttributes"
                  description: Attributes of the issuer object.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuerBundle"
    delete:
      operationId: _KeyVaultClient_delete_certificate_issuer
      description: Deletes the specified certificate issuer. The DeleteCertificateIssuer operation permanently removes the specified certificate issuer from the vault. This operation requires the certificates/manageissuers/deleteissuers permission.
      parameters:
        - name: issuer_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the issuer. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuerBundle"
  /certificates/{certificate_name}/versions?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_certificate_versions
      description: List the versions of a certificate. The GetCertificateVersions operation returns the versions of a certificate in the specified key vault. This operation requires the certificates/list permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. Required.
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedCertificateItem"
  /certificates/{certificate_name}/policy?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_certificate_policy
      description: Lists the policy for a certificate. The GetCertificatePolicy operation returns the specified certificate policy resources in the specified key vault. This operation requires the certificates/get permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate in a given key vault. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificatePolicy"
    patch:
      operationId: _KeyVaultClient_update_certificate_policy
      description: Updates the policy for a certificate. Set specified members in the certificate policy. Leave others as null. This operation requires the certificates/update permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate in the given vault. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key_props:
                  $ref: "#/components/schemas/KeyProperties"
                  description: Properties of the key backing a certificate.
                secret_props:
                  $ref: "#/components/schemas/SecretProperties"
                  description: Properties of the secret backing a certificate.
                x509_props:
                  $ref: "#/components/schemas/X509CertificateProperties"
                  description: Properties of the X509 component of a certificate.
                lifetime_actions:
                  type: array
                  items:
                    $ref: "#/components/schemas/LifetimeAction"
                  description: Actions that will be performed by Key Vault over the lifetime of a certificate.
                issuer:
                  $ref: "#/components/schemas/IssuerParameters"
                  description: Parameters for the issuer of the X509 component of a certificate.
                attributes:
                  $ref: "#/components/schemas/CertificateAttributes"
                  description: The certificate attributes.
                platformManaged:
                  $ref: "#/components/schemas/PlatformManaged"
                  description: Configuration that enables the platform to manage the certificate on behalf of the user. This feature is currently intended for internal use only.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificatePolicy"
  /certificates/{certificate_name}/{certificate_version}?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_certificate
      description: Gets information about a certificate. Gets information about a specific certificate. This operation requires the certificates/get permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate in the given vault. Required.
        - name: certificate_version
          in: path
          required: true
          schema:
            type: string
          description: The version of the certificate. This URI fragment is optional. If not specified, the latest version of the certificate is returned. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateBundle"
    patch:
      operationId: _KeyVaultClient_update_certificate
      description: Updates the specified attributes associated with the given certificate. The UpdateCertificate operation applies the specified update on the given certificate; the only elements updated are the certificate's attributes. This operation requires the certificates/update permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate in the given key vault. Required.
        - name: certificate_version
          in: path
          required: true
          schema:
            type: string
          description: The version of the certificate. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy:
                  $ref: "#/components/schemas/CertificatePolicy"
                  description: The management policy for the certificate.
                attributes:
                  $ref: "#/components/schemas/CertificateAttributes"
                  description: The attributes of the certificate (optional).
                tags:
                  type: object
                  properties: {}
                  description: Application specific metadata in the form of key-value pairs.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateBundle"
  /certificates/{certificate_name}/pending?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_certificate_operation
      description: Gets the creation operation of a certificate. Gets the creation operation associated with a specified certificate. This operation requires the certificates/get permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateOperation"
    patch:
      operationId: _KeyVaultClient_update_certificate_operation
      description: Updates a certificate operation. Updates a certificate creation operation that is already in progress. This operation requires the certificates/update permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cancellation_requested:
                  type: boolean
                  description: Indicates if cancellation was requested on the certificate operation. Required.
              required:
                - cancellation_requested
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateOperation"
    delete:
      operationId: _KeyVaultClient_delete_certificate_operation
      description: Deletes the creation operation for a specific certificate. Deletes the creation operation for a specified certificate that is in the process of being created. The certificate is no longer created. This operation requires the certificates/update permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateOperation"
  /deletedcertificates?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_deleted_certificates
      description: Lists the deleted certificates in the specified vault currently available for recovery. The GetDeletedCertificates operation retrieves the certificates in the current vault which are in a deleted state and ready for recovery or purging. This operation includes deletion-specific information. This operation requires the certificates/get/list permission. This operation can only be enabled on soft-delete enabled vaults.
      parameters:
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
        - name: includePending
          in: query
          required: false
          schema:
            type: boolean
          description: Specifies whether to include certificates which are not completely provisioned. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDeletedCertificateItem"
  /deletedcertificates/{certificate_name}?api-version=2026-03-01-preview:
    get:
      operationId: _KeyVaultClient_get_deleted_certificate
      description: Retrieves information about the specified deleted certificate. The GetDeletedCertificate operation retrieves the deleted certificate information plus its attributes, such as retention interval, scheduled permanent deletion and the current deletion recovery level. This operation requires the certificates/get permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedCertificateBundle"
    delete:
      operationId: _KeyVaultClient_purge_deleted_certificate
      description: Permanently deletes the specified deleted certificate. The PurgeDeletedCertificate operation performs an irreversible deletion of the specified certificate, without possibility for recovery. The operation is not available if the recovery level does not specify 'Purgeable'. This operation requires the certificate/purge permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /certificates/{certificate_name}?api-version=2026-03-01-preview:
    delete:
      operationId: _KeyVaultClient_delete_certificate
      description: Deletes a certificate from a specified key vault. Deletes all versions of a certificate object along with its associated policy. Delete certificate cannot be used to remove individual versions of a certificate object. This operation requires the certificates/delete permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedCertificateBundle"
  /certificates/{certificate_name}/create?api-version=2026-03-01-preview:
    post:
      operationId: _KeyVaultClient_create_certificate
      description: Creates a new certificate. If this is the first version, the certificate resource is created. This operation requires the certificates/create permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. The value you provide may be copied globally for the purpose of running the service. The value provided should not include personally identifiable or sensitive information. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy:
                  $ref: "#/components/schemas/CertificatePolicy"
                  description: The management policy for the certificate.
                attributes:
                  $ref: "#/components/schemas/CertificateAttributes"
                  description: The attributes of the certificate (optional).
                tags:
                  type: object
                  properties: {}
                  description: Application specific metadata in the form of key-value pairs.
                preserveCertOrder:
                  type: boolean
                  description: Specifies whether the certificate chain preserves its original order. The default value is false, which sets the leaf certificate at index 0.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateOperation"
  /certificates/{certificate_name}/import?api-version=2026-03-01-preview:
    post:
      operationId: _KeyVaultClient_import_certificate
      description: Imports a certificate into a specified key vault. Imports an existing valid certificate, containing a private key, into Azure Key Vault. This operation requires the certificates/import permission. The certificate to be imported can be in either PFX or PEM format. If the certificate is in PEM format the PEM file must contain the key as well as x509 certificates. Key Vault will only accept a key in PKCS#8 format.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. The value you provide may be copied globally for the purpose of running the service. The value provided should not include personally identifiable or sensitive information. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  description: Base64 encoded representation of the certificate object to import. This certificate needs to contain the private key. Required.
                pwd:
                  type: string
                  description: If the private key in base64EncodedCertificate is encrypted, the password used for encryption.
                policy:
                  $ref: "#/components/schemas/CertificatePolicy"
                  description: The management policy for the certificate.
                attributes:
                  $ref: "#/components/schemas/CertificateAttributes"
                  description: The attributes of the certificate (optional).
                tags:
                  type: object
                  properties: {}
                  description: Application specific metadata in the form of key-value pairs.
                preserveCertOrder:
                  type: boolean
                  description: Specifies whether the certificate chain preserves its original order. The default value is false, which sets the leaf certificate at index 0.
              required:
                - value
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateBundle"
  /certificates/{certificate_name}/pending/merge?api-version=2026-03-01-preview:
    post:
      operationId: _KeyVaultClient_merge_certificate
      description: Merges a certificate or a certificate chain with a key pair existing on the server. The MergeCertificate operation performs the merging of a certificate or certificate chain with a key pair currently available in the service. This operation requires the certificates/create permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                x5c:
                  type: array
                  items:
                    type: string
                    format: byte
                  description: The certificate or the certificate chain to merge. Required.
                attributes:
                  $ref: "#/components/schemas/CertificateAttributes"
                  description: The attributes of the certificate (optional).
                tags:
                  type: object
                  properties: {}
                  description: Application specific metadata in the form of key-value pairs.
              required:
                - x5c
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateBundle"
  /certificates/{certificate_name}/backup?api-version=2026-03-01-preview:
    post:
      operationId: _KeyVaultClient_backup_certificate
      description: Backs up the specified certificate. Requests that a backup of the specified certificate be downloaded to the client. All versions of the certificate will be downloaded. This operation requires the certificates/backup permission.
      parameters:
        - name: certificate_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the certificate. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupCertificateResult"
  /certificates/restore?api-version=2026-03-01-preview:
    post:
      operationId: _KeyVaultClient_restore_certificate
      description: Restores a backed up certificate to a vault. Restores a backed up certificate, and all its versions, to a vault. This operation requires the certificates/restore permission.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  format: byte
                  description: The backup blob associated with a certificate bundle. Required.
              required:
                - value
      responses:
        "200":
          description: Success
          content:
            application/json:
