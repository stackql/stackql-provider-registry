openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Reservations
  description: Reserved capacity orders, exchanges, calculations and applied reservations.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2022-11-01-stackql-generated
  x-serviceAlias: reservations
  x-sdkPackage: azure-mgmt-reservations
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    CalculateExchangeRequestProperties:
      type: object
      description: Calculate exchange request properties.
      properties:
        reservationsToPurchase:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseRequest"
          description: List of reservations that are being purchased in this exchange.
        savingsPlansToPurchase:
          type: array
          items:
            $ref: "#/components/schemas/SavingsPlanPurchaseRequest"
          description: List of savings plans that are being purchased in this exchange.
        reservationsToExchange:
          type: array
          items:
            $ref: "#/components/schemas/ReservationToReturn"
          description: List of reservations that are being returned in this exchange.
    PurchaseRequest:
      type: object
      description: The request for reservation purchase.
      properties:
        sku:
          $ref: "#/components/schemas/SkuName"
          description: The name of sku.
        location:
          type: string
          description: The Azure region where the reserved resource lives.
        properties:
          $ref: "#/components/schemas/PurchaseRequestProperties"
          description: Properties of reservation purchase request.
    SkuName:
      type: object
      description: The name of sku.
      properties:
        name:
          type: string
          description: ":vartype name: str"
    PurchaseRequestProperties:
      type: object
      description: Properties of reservation purchase request.
      properties:
        reservedResourceType:
          $ref: "#/components/schemas/ReservedResourceType"
          description: 'The type of the resource that is being reserved. In addition to below types we have also added the following: OpenAIPTU, MDC, Sentinel. Known values are: "VirtualMachines", "SqlDatabases", "SuseLinux", "CosmosDb", "RedHat", "SqlDataWarehouse", "VMwareCloudSimple", "RedHatOsa", "Databricks", "AppService", "ManagedDisk", "BlockBlob", "RedisCache", "AzureDataExplorer", "MySql", "MariaDb", "PostgreSql", "DedicatedHost", "SapHana", "SqlAzureHybridBenefit", "AVS", "DataFactory", "NetAppStorage", "AzureFiles", "SqlEdge", and "VirtualMachineSoftware".'
        billingScopeId:
          type: string
          description: Subscription that will be charged for purchasing reservation or savings plan.
        term:
          $ref: "#/components/schemas/ReservationTerm"
          description: 'Represent the term of reservation. Known values are: "P1Y", "P3Y", and "P5Y".'
        billingPlan:
          $ref: "#/components/schemas/ReservationBillingPlan"
          description: 'Represent the billing plans. Known values are: "Upfront" and "Monthly".'
        quantity:
          type: integer
          description: Quantity of the skus that are part of the reservation.
        displayName:
          type: string
          description: Friendly name of the reservation.
        appliedScopeType:
          $ref: "#/components/schemas/AppliedScopeType"
          description: 'Type of the Applied Scope. Known values are: "Single", "Shared", and "ManagementGroup".'
        appliedScopes:
          type: array
          items:
            type: string
          description: List of the subscriptions that the benefit will be applied. Do not specify if AppliedScopeType is Shared. This property will be deprecated and replaced by appliedScopeProperties instead for Single AppliedScopeType.
        appliedScopeProperties:
          $ref: "#/components/schemas/AppliedScopeProperties"
          description: Properties specific to applied scope type. Not required if not applicable. Required and need to provide tenantId and managementGroupId if AppliedScopeType is ManagementGroup.
        renew:
          type: boolean
          description: Setting this to true will automatically purchase a new reservation on the expiration date time.
        reservedResourceProperties:
          $ref: "#/components/schemas/PurchaseRequestPropertiesReservedResourceProperties"
          description: Properties specific to each reserved resource type. Not required if not applicable.
        reviewDateTime:
          type: string
          format: date-time
          description: This is the date-time when the Azure hybrid benefit needs to be reviewed.
    ReservedResourceType:
      type: string
      enum:
        - VirtualMachines
        - SqlDatabases
        - SuseLinux
        - CosmosDb
        - RedHat
        - SqlDataWarehouse
        - VMwareCloudSimple
        - RedHatOsa
        - Databricks
        - AppService
        - ManagedDisk
        - BlockBlob
        - RedisCache
        - AzureDataExplorer
        - MySql
        - MariaDb
        - PostgreSql
        - DedicatedHost
        - SapHana
        - SqlAzureHybridBenefit
        - AVS
        - DataFactory
        - NetAppStorage
        - AzureFiles
        - SqlEdge
        - VirtualMachineSoftware
    ReservationTerm:
      type: string
      enum:
        - P1Y
        - P3Y
        - P5Y
    ReservationBillingPlan:
      type: string
      enum:
        - Upfront
        - Monthly
    AppliedScopeType:
      type: string
      enum:
        - Single
        - Shared
        - ManagementGroup
    AppliedScopeProperties:
      type: object
      description: Properties specific to applied scope type. Not required if not applicable. Required and need to provide tenantId and managementGroupId if AppliedScopeType is ManagementGroup.
      properties:
        tenantId:
          type: string
          description: Tenant ID where the savings plan should apply benefit.
        managementGroupId:
          type: string
          description: Fully-qualified identifier of the management group where the benefit must be applied.
        subscriptionId:
          type: string
          description: Fully-qualified identifier of the subscription.
        resourceGroupId:
          type: string
          description: Fully-qualified identifier of the resource group.
        displayName:
          type: string
          description: Display name.
    PurchaseRequestPropertiesReservedResourceProperties:
      type: object
      description: Properties specific to each reserved resource type. Not required if not applicable.
      properties:
        instanceFlexibility:
          $ref: "#/components/schemas/InstanceFlexibility"
          description: 'Turning this on will apply the reservation discount to other VMs in the same VM size group. Only specify for VirtualMachines reserved resource type. Known values are: "On" and "Off".'
    InstanceFlexibility:
      type: string
      enum:
        - "On"
        - "Off"
    SavingsPlanPurchaseRequest:
      type: object
      description: Request body for savings plan purchase.
      properties:
        sku:
          $ref: "#/components/schemas/SkuName"
          description: The name of sku.
        properties:
          $ref: "#/components/schemas/SavingsPlanPurchaseRequestProperties"
          description: Properties of a savings plan purchase.
    SavingsPlanPurchaseRequestProperties:
      type: object
      description: Properties of a savings plan purchase.
      properties:
        displayName:
          type: string
          description: Friendly name of the savings plan.
        billingScopeId:
          type: string
          description: Subscription that will be charged for purchasing reservation or savings plan.
        term:
          $ref: "#/components/schemas/SavingsPlanTerm"
          description: 'Represent savings plan term in ISO 8601 format. Known values are: "P1Y" and "P3Y".'
        billingPlan:
          $ref: "#/components/schemas/BillingPlan"
          description: Represents the billing plan in ISO 8601 format. Required only for monthly billing plans. "P1M"
        appliedScopeType:
          $ref: "#/components/schemas/AppliedScopeType"
          description: 'Type of the Applied Scope. Known values are: "Single", "Shared", and "ManagementGroup".'
        appliedScopeProperties:
          $ref: "#/components/schemas/AppliedScopeProperties"
          description: Properties specific to applied scope type. Not required if not applicable. Required and need to provide tenantId and managementGroupId if AppliedScopeType is ManagementGroup.
        commitment:
          $ref: "#/components/schemas/Commitment"
          description: Commitment towards the benefit.
    SavingsPlanTerm:
      type: string
      enum:
        - P1Y
        - P3Y
    BillingPlan:
      type: string
      enum:
        - P1M
    Commitment:
      type: object
      description: Commitment towards the benefit.
      properties:
        currencyCode:
          type: string
          description: The ISO 4217 3-letter currency code for the currency used by this purchase record.
        amount:
          type: number
          description: ":vartype amount: float"
        grain:
          $ref: "#/components/schemas/CommitmentGrain"
          description: Commitment grain. "Hourly"
    CommitmentGrain:
      type: string
      enum:
        - Hourly
    ReservationToReturn:
      type: object
      description: Reservation to return.
      properties:
        reservationId:
          type: string
          description: Fully qualified identifier of the reservation being returned.
        quantity:
          type: integer
          description: Quantity to be returned. Must be greater than zero.
    CalculateExchangeOperationResultResponse:
      type: object
      description: CalculateExchange operation result.
      properties:
        id:
          type: string
          description: It should match what is used to GET the operation result.
        name:
          type: string
          description: It must match the last segment of the id field, and will typically be a GUID / system generated value.
        status:
          $ref: "#/components/schemas/CalculateExchangeOperationResultStatus"
          description: 'Status of the operation. Known values are: "Succeeded", "Failed", "Cancelled", and "Pending".'
        properties:
          $ref: "#/components/schemas/CalculateExchangeResponseProperties"
          description: CalculateExchange response properties.
        error:
          $ref: "#/components/schemas/OperationResultError"
          description: Required if status == failed or status == canceled.
    CalculateExchangeOperationResultStatus:
      type: string
      enum:
        - Succeeded
        - Failed
        - Cancelled
        - Pending
    CalculateExchangeResponseProperties:
      type: object
      description: CalculateExchange response properties.
      properties:
        sessionId:
          type: string
          description: Exchange session identifier.
        netPayable:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        refundsTotal:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        purchasesTotal:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        reservationsToPurchase:
          type: array
          items:
            $ref: "#/components/schemas/ReservationToPurchaseCalculateExchange"
          description: Details of the reservations being purchased.
        savingsPlansToPurchase:
          type: array
          items:
            $ref: "#/components/schemas/SavingsPlanToPurchaseCalculateExchange"
          description: Details of the savings plans being purchased.
        reservationsToExchange:
          type: array
          items:
            $ref: "#/components/schemas/ReservationToExchange"
          description: Details of the reservations being returned.
        policyResult:
          $ref: "#/components/schemas/ExchangePolicyErrors"
          description: Exchange policy errors.
    Price:
      type: object
      description: Pricing information containing the amount and the currency code.
      properties:
        currencyCode:
          type: string
          description: The ISO 4217 3-letter currency code for the currency used by this purchase record.
        amount:
          type: number
          description: ":vartype amount: float"
    ReservationToPurchaseCalculateExchange:
      type: object
      description: Reservation purchase details.
      properties:
        properties:
          $ref: "#/components/schemas/PurchaseRequest"
          description: The request for reservation purchase.
        billingCurrencyTotal:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
    SavingsPlanToPurchaseCalculateExchange:
      type: object
      description: Savings plan purchase details.
      properties:
        properties:
          $ref: "#/components/schemas/SavingsPlanPurchaseRequest"
          description: Request body for savings plan purchase.
        billingCurrencyTotal:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
    ReservationToExchange:
      type: object
      description: Reservation refund details.
      properties:
        reservationId:
          type: string
          description: Fully qualified id of the reservation being returned.
        quantity:
          type: integer
          description: Quantity to be returned.
        billingRefundAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        billingInformation:
          $ref: "#/components/schemas/BillingInformation"
          description: billing information.
    BillingInformation:
      type: object
      description: billing information.
      properties:
        billingCurrencyTotalPaidAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        billingCurrencyProratedAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        billingCurrencyRemainingCommitmentAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
    ExchangePolicyErrors:
      type: object
      description: Exchange policy errors.
      properties:
        policyErrors:
          type: array
          items:
            $ref: "#/components/schemas/ExchangePolicyError"
          description: Exchange Policy errors.
    ExchangePolicyError:
      type: object
      description: error details.
      properties:
        code:
          type: string
          description: ":vartype code: str"
        message:
          type: string
          description: ":vartype message: str"
    OperationResultError:
      type: object
      description: Required if status == failed or status == canceled.
      properties:
        code:
          type: string
          description: Required if status == failed or status == cancelled. If status == failed, provide an invariant error code used for error troubleshooting, aggregation, and analysis.
        message:
          type: string
          description: Required if status == failed. Localized. If status == failed, provide an actionable error message indicating what error occurred, and what the user can do to address the issue.
    CalculateRefundRequestProperties:
      type: object
      description: Properties needed for calculate refund including the scope and the reservation to be returned.
      properties:
        scope:
          type: string
          description: The scope of the refund, e.g. Reservation.
        reservationToReturn:
          $ref: "#/components/schemas/ReservationToReturn"
          description: Reservation to return.
    CalculateRefundResponse:
      type: object
      description: The response of calculate refund containing refund information of reservation.
      properties:
        id:
          type: string
          description: Fully qualified identifier of the reservation being returned.
        properties:
          $ref: "#/components/schemas/RefundResponseProperties"
          description: The refund properties of reservation.
    RefundResponseProperties:
      type: object
      description: The refund properties of reservation.
      properties:
        sessionId:
          type: string
          description: Refund session identifier.
        quantity:
          type: integer
          description: Quantity to be returned.
        billingRefundAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        pricingRefundAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        policyResult:
          $ref: "#/components/schemas/RefundPolicyResult"
          description: Refund policy result.
        billingInformation:
          $ref: "#/components/schemas/RefundBillingInformation"
          description: billing information.
    RefundPolicyResult:
      type: object
      description: Refund policy result.
      properties:
        properties:
          $ref: "#/components/schemas/RefundPolicyResultProperty"
          description: Refund policy result property.
    RefundPolicyResultProperty:
      type: object
      description: Refund policy result property.
      properties:
        consumedRefundsTotal:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        maxRefundLimit:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        policyErrors:
          type: array
          items:
            $ref: "#/components/schemas/RefundPolicyError"
          description: Refund Policy errors.
    RefundPolicyError:
      type: object
      description: error details.
      properties:
        code:
          $ref: "#/components/schemas/ErrorResponseCode"
          description: 'Error code describing the reason that service is not able to process the incoming request. Known values are: "NotSpecified", "InternalServerError", "ServerTimeout", "AuthorizationFailed", "BadRequest", "ClientCertificateThumbprintNotSet", "InvalidRequestContent", "OperationFailed", "HttpMethodNotSupported", "InvalidRequestUri", "MissingTenantId", "InvalidTenantId", "InvalidReservationOrderId", "InvalidReservationId", "ReservationIdNotInReservationOrder", "ReservationOrderNotFound", "InvalidSubscriptionId", "InvalidAccessToken", "InvalidLocationId", "UnauthenticatedRequestsThrottled", "InvalidHealthCheckType", "Forbidden", "BillingScopeIdCannotBeChanged", "AppliedScopesNotAssociatedWithCommerceAccount", "PatchValuesSameAsExisting", "RoleAssignmentCreationFailed", "ReservationOrderCreationFailed", "ReservationOrderNotEnabled", "CapacityUpdateScopesFailed", "UnsupportedReservationTerm", "ReservationOrderIdAlreadyExists", "RiskCheckFailed", "CreateQuoteFailed", "ActivateQuoteFailed", "NonsupportedAccountId", "PaymentInstrumentNotFound", "MissingAppliedScopesForSingle", "NoValidReservationsToReRate", "ReRateOnlyAllowedForEA", "OperationCannotBePerformedInCurrentState", "InvalidSingleAppliedScopesCount", "InvalidFulfillmentRequestParameters", "NotSupportedCountry", "InvalidRefundQuantity", "PurchaseError", "BillingCustomerInputError", "BillingPaymentInstrumentSoftError", "BillingPaymentInstrumentHardError", "BillingTransientError", "BillingError", "FulfillmentConfigurationError", "FulfillmentOutOfStockError", "FulfillmentTransientError", "FulfillmentError", "CalculatePriceFailed", "AppliedScopesSameAsExisting", "SelfServiceRefundNotSupported", and "RefundLimitExceeded".'
        message:
          type: string
          description: ":vartype message: str"
    ErrorResponseCode:
      type: string
      enum:
        - NotSpecified
        - InternalServerError
        - ServerTimeout
        - AuthorizationFailed
        - BadRequest
        - ClientCertificateThumbprintNotSet
        - InvalidRequestContent
        - OperationFailed
        - HttpMethodNotSupported
        - InvalidRequestUri
        - MissingTenantId
        - InvalidTenantId
        - InvalidReservationOrderId
        - InvalidReservationId
        - ReservationIdNotInReservationOrder
        - ReservationOrderNotFound
        - InvalidSubscriptionId
        - InvalidAccessToken
        - InvalidLocationId
        - UnauthenticatedRequestsThrottled
        - InvalidHealthCheckType
        - Forbidden
        - BillingScopeIdCannotBeChanged
        - AppliedScopesNotAssociatedWithCommerceAccount
        - PatchValuesSameAsExisting
        - RoleAssignmentCreationFailed
        - ReservationOrderCreationFailed
        - ReservationOrderNotEnabled
        - CapacityUpdateScopesFailed
        - UnsupportedReservationTerm
        - ReservationOrderIdAlreadyExists
        - RiskCheckFailed
        - CreateQuoteFailed
        - ActivateQuoteFailed
        - NonsupportedAccountId
        - PaymentInstrumentNotFound
        - MissingAppliedScopesForSingle
        - NoValidReservationsToReRate
        - ReRateOnlyAllowedForEA
        - OperationCannotBePerformedInCurrentState
        - InvalidSingleAppliedScopesCount
        - InvalidFulfillmentRequestParameters
        - NotSupportedCountry
        - InvalidRefundQuantity
        - PurchaseError
        - BillingCustomerInputError
        - BillingPaymentInstrumentSoftError
        - BillingPaymentInstrumentHardError
        - BillingTransientError
        - BillingError
        - FulfillmentConfigurationError
        - FulfillmentOutOfStockError
        - FulfillmentTransientError
        - FulfillmentError
        - CalculatePriceFailed
        - AppliedScopesSameAsExisting
        - SelfServiceRefundNotSupported
        - RefundLimitExceeded
    RefundBillingInformation:
      type: object
      description: billing information.
      properties:
        billingPlan:
          $ref: "#/components/schemas/ReservationBillingPlan"
          description: 'Represent the billing plans. Known values are: "Upfront" and "Monthly".'
        completedTransactions:
          type: integer
          description: The number of completed transactions in this reservation's payment.
        totalTransactions:
          type: integer
          description: The number of total transactions in this reservation's payment.
        billingCurrencyTotalPaidAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        billingCurrencyProratedAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        billingCurrencyRemainingCommitmentAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
    ExchangeRequestProperties:
      type: object
      description: Exchange request properties.
      properties:
        sessionId:
          type: string
          description: SessionId that was returned by CalculateExchange API.
    ExchangeOperationResultResponse:
      type: object
      description: Exchange operation result.
      properties:
        id:
          type: string
          description: It should match what is used to GET the operation result.
        name:
          type: string
          description: It must match the last segment of the id field, and will typically be a GUID / system generated value.
        status:
          $ref: "#/components/schemas/ExchangeOperationResultStatus"
          description: 'Status of the operation. Known values are: "Succeeded", "Failed", "Cancelled", "PendingRefunds", and "PendingPurchases".'
        properties:
          $ref: "#/components/schemas/ExchangeResponseProperties"
          description: Exchange response properties.
        error:
          $ref: "#/components/schemas/OperationResultError"
          description: Required if status == failed or status == canceled.
    ExchangeOperationResultStatus:
      type: string
      enum:
        - Succeeded
        - Failed
        - Cancelled
        - PendingRefunds
        - PendingPurchases
    ExchangeResponseProperties:
      type: object
      description: Exchange response properties.
      properties:
        sessionId:
          type: string
          description: Exchange session identifier.
        netPayable:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        refundsTotal:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        purchasesTotal:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        reservationsToPurchase:
          type: array
          items:
            $ref: "#/components/schemas/ReservationToPurchaseExchange"
          description: Details of the reservations being purchased.
        savingsPlansToPurchase:
          type: array
          items:
            $ref: "#/components/schemas/SavingsPlanToPurchaseExchange"
          description: Details of the savings plans being purchased.
        reservationsToExchange:
          type: array
          items:
            $ref: "#/components/schemas/ReservationToReturnForExchange"
          description: Details of the reservations being returned.
        policyResult:
          $ref: "#/components/schemas/ExchangePolicyErrors"
          description: Exchange policy errors.
    ReservationToPurchaseExchange:
      type: object
      description: Reservation purchase details.
      properties:
        reservationOrderId:
          type: string
          description: Fully qualified id of the reservationOrder being purchased.
        reservationId:
          type: string
          description: Fully qualified id of the reservation being purchased. This value is only guaranteed to be non-null if the purchase is successful.
        properties:
          $ref: "#/components/schemas/PurchaseRequest"
          description: The request for reservation purchase.
        billingCurrencyTotal:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        status:
          $ref: "#/components/schemas/OperationStatus"
          description: 'Status of the individual operation. Known values are: "Succeeded", "Failed", "Cancelled", and "Pending".'
    OperationStatus:
      type: string
      enum:
        - Succeeded
        - Failed
        - Cancelled
        - Pending
    SavingsPlanToPurchaseExchange:
      type: object
      description: Savings plan purchase details.
      properties:
        savingsPlanOrderId:
          type: string
          description: Fully qualified id of the savings plan order being purchased.
        savingsPlanId:
          type: string
          description: Fully qualified id of the savings plan being purchased. This value is only guaranteed to be non-null if the purchase is successful.
        properties:
          $ref: "#/components/schemas/SavingsPlanPurchaseRequest"
          description: Request body for savings plan purchase.
        billingCurrencyTotal:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        status:
          $ref: "#/components/schemas/OperationStatus"
          description: 'Status of the individual operation. Known values are: "Succeeded", "Failed", "Cancelled", and "Pending".'
    ReservationToReturnForExchange:
      type: object
      description: Reservation refund details.
      properties:
        reservationId:
          type: string
          description: Fully qualified id of the reservation being returned.
        quantity:
          type: integer
          description: Quantity to be returned.
        billingRefundAmount:
          $ref: "#/components/schemas/Price"
          description: Pricing information containing the amount and the currency code.
        billingInformation:
          $ref: "#/components/schemas/BillingInformation"
          description: billing information.
        status:
          $ref: "#/components/schemas/OperationStatus"
          description: 'Status of the individual operation. Known values are: "Succeeded", "Failed", "Cancelled", and "Pending".'
    OperationDisplay:
      type: object
      description: Information about an operation.
      properties:
        provider:
          type: string
          description: ":vartype provider: str"
        resource:
          type: string
          description: ":vartype resource: str"
        operation:
          type: string
          description: ":vartype operation: str"
        description:
          type: string
          description: ":vartype description: str"
    OperationResponse:
      type: object
      description: The response containing operation information.
      properties:
        name:
          type: string
          description: Name of the operation.
        isDataAction:
          type: boolean
          description: Indicates whether the operation is a data action.
        display:
          $ref: "#/components/schemas/OperationDisplay"
          description: Display of the operation.
        origin:
          type: string
          description: Origin of the operation.
        properties:
          type: object
          properties: {}
          description: Properties of the operation.
    PagedOperationResponse:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/OperationResponse"
        nextLink:
          type: string
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
