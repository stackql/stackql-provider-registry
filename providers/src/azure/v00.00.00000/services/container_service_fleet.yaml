openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Kubernetes Fleet Manager
  description: Multi-cluster AKS fleets with update runs, strategies and auto-upgrade profiles.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-03-02-preview-stackql-generated
  x-serviceAlias: container_service_fleet
  x-sdkPackage: azure-mgmt-containerservicefleet
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    GenerateResponse:
      type: object
      description: GenerateResponse is the response of a generate request.
      properties:
        id:
          type: string
          description: "The ARM resource id of the generated UpdateRun. e.g.: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ContainerService/fleets/{fleetName}/updateRuns/{updateRunName}'. Required."
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AutoUpgradeProfileProperties:
      type: object
      description: The properties of the AutoUpgradeProfile.
      properties:
        provisioningState:
          $ref: "#/components/schemas/AutoUpgradeProfileProvisioningState"
          description: 'The provisioning state of the AutoUpgradeProfile resource. Known values are: "Succeeded", "Failed", and "Canceled".'
        updateStrategyId:
          type: string
          description: The resource id of the UpdateStrategy resource to reference. If not specified, the auto upgrade will run on all clusters which are members of the fleet.
        channel:
          $ref: "#/components/schemas/UpgradeChannel"
          description: 'Configures how auto-upgrade will be run. Required. Known values are: "Stable", "Rapid", "NodeImage", and "TargetKubernetesVersion".'
        nodeImageSelection:
          $ref: "#/components/schemas/AutoUpgradeNodeImageSelection"
          description: The node image upgrade to be applied to the target clusters in auto upgrade.
        disabled:
          type: boolean
          description: "If set to False: the auto upgrade has effect - target managed clusters will be upgraded on schedule. If set to True: the auto upgrade has no effect - no upgrade will be run on the target managed clusters. This is a boolean and not an enum because enabled/disabled are all available states of the auto upgrade profile. By default, this is set to False."
        autoUpgradeProfileStatus:
          $ref: "#/components/schemas/AutoUpgradeProfileStatus"
          description: The status of the auto upgrade profile.
        targetKubernetesVersion:
          type: string
          description: This is the target Kubernetes version for auto-upgrade. The format must be `{major version}.{minor version}`. For example, "1.30". By default, this is empty. If upgrade channel is set to TargetKubernetesVersion, this field must not be empty. If upgrade channel is Rapid, Stable or NodeImage, this field must be empty.
        longTermSupport:
          type: boolean
          description: "If upgrade channel is not TargetKubernetesVersion, this field must be False. If set to True: Fleet auto upgrade will continue generate update runs for patches of minor versions earlier than N-2 (where N is the latest supported minor version) if those minor versions support Long-Term Support (LTS). By default, this is set to False. For more information on AKS LTS, please see `https://learn.microsoft.com/en-us/azure/aks/long-term-support `_."
      required:
        - channel
    AutoUpgradeProfileProvisioningState:
      type: string
      enum:
        - Succeeded
        - Failed
        - Canceled
    UpgradeChannel:
      type: string
      enum:
        - Stable
        - Rapid
        - NodeImage
        - TargetKubernetesVersion
    AutoUpgradeNodeImageSelection:
      type: object
      description: The node image upgrade to be applied to the target clusters in auto upgrade.
      properties:
        type:
          $ref: "#/components/schemas/AutoUpgradeNodeImageSelectionType"
          description: 'The node image upgrade type. Required. Known values are: "Latest" and "Consistent".'
      required:
        - type
    AutoUpgradeNodeImageSelectionType:
      type: string
      enum:
        - Latest
        - Consistent
    AutoUpgradeProfileStatus:
      type: object
      description: AutoUpgradeProfileStatus is the status of an auto upgrade profile.
      properties:
        lastTriggeredAt:
          type: string
          format: date-time
          description: The UTC time of the last attempt to automatically create and start an UpdateRun as triggered by the release of new versions.
        lastTriggerStatus:
          $ref: "#/components/schemas/AutoUpgradeLastTriggerStatus"
          description: 'The status of the last AutoUpgrade trigger. Known values are: "Succeeded" and "Failed".'
        lastTriggerError:
          $ref: "#/components/schemas/ErrorDetail"
          description: The error details of the last trigger.
        lastTriggerUpgradeVersions:
          type: array
          items:
            type: string
          description: The target Kubernetes version or node image versions of the last trigger.
    AutoUpgradeLastTriggerStatus:
      type: string
      enum:
        - Succeeded
        - Failed
    ErrorDetail:
      type: object
      description: The error detail.
      properties:
        code:
          type: string
          description: The error code.
        message:
          type: string
          description: The error message.
        target:
          type: string
          description: The error target.
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
          description: The error details.
        additionalInfo:
          type: array
          items:
            $ref: "#/components/schemas/ErrorAdditionalInfo"
          description: The error additional info.
    ErrorAdditionalInfo:
      type: object
      description: The resource management error additional info.
      properties:
        type:
          type: string
          description: The additional info type.
        info:
          type: object
          properties: {}
          description: The additional info.
    AutoUpgradeProfileFlattened:
      type: object
      description: Flattened view of AutoUpgradeProfile ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        eTag:
          type: string
          description: If eTag is provided in the response body, it may also be provided as a header per the normal etag convention. Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
        provisioningState:
          $ref: "#/components/schemas/AutoUpgradeProfileProvisioningState"
          description: 'The provisioning state of the AutoUpgradeProfile resource. Known values are: "Succeeded", "Failed", and "Canceled".'
        updateStrategyId:
          type: string
          description: The resource id of the UpdateStrategy resource to reference. If not specified, the auto upgrade will run on all clusters which are members of the fleet.
        channel:
          $ref: "#/components/schemas/UpgradeChannel"
          description: 'Configures how auto-upgrade will be run. Required. Known values are: "Stable", "Rapid", "NodeImage", and "TargetKubernetesVersion".'
        nodeImageSelection:
          $ref: "#/components/schemas/AutoUpgradeNodeImageSelection"
          description: The node image upgrade to be applied to the target clusters in auto upgrade.
        disabled:
          type: boolean
          description: "If set to False: the auto upgrade has effect - target managed clusters will be upgraded on schedule. If set to True: the auto upgrade has no effect - no upgrade will be run on the target managed clusters. This is a boolean and not an enum because enabled/disabled are all available states of the auto upgrade profile. By default, this is set to False."
        autoUpgradeProfileStatus:
          $ref: "#/components/schemas/AutoUpgradeProfileStatus"
          description: The status of the auto upgrade profile.
        targetKubernetesVersion:
          type: string
          description: This is the target Kubernetes version for auto-upgrade. The format must be `{major version}.{minor version}`. For example, "1.30". By default, this is empty. If upgrade channel is set to TargetKubernetesVersion, this field must not be empty. If upgrade channel is Rapid, Stable or NodeImage, this field must be empty.
        longTermSupport:
          type: boolean
          description: "If upgrade channel is not TargetKubernetesVersion, this field must be False. If set to True: Fleet auto upgrade will continue generate update runs for patches of minor versions earlier than N-2 (where N is the latest supported minor version) if those minor versions support Long-Term Support (LTS). By default, this is set to False. For more information on AKS LTS, please see `https://learn.microsoft.com/en-us/azure/aks/long-term-support `_."
    PagedAutoUpgradeProfileFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AutoUpgradeProfileFlattened"
        nextLink:
          type: string
    AutoUpgradeProfile:
      type: object
      description: The AutoUpgradeProfile resource.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/AutoUpgradeProfileProperties"
          description: The resource-specific properties for this resource.
        eTag:
          type: string
          description: If eTag is provided in the response body, it may also be provided as a header per the normal etag convention. Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
    ClusterMeshProfileProperties:
      type: object
      description: A cluster mesh profile stores the general information about the mesh.
      properties:
        provisioningState:
          $ref: "#/components/schemas/ClusterMeshProfileProvisioningState"
          description: 'The provisioning state of the cluster mesh profile. Known values are: "Succeeded", "Failed", and "Canceled".'
        memberSelector:
          $ref: "#/components/schemas/MemberSelector"
          description: Select the members of the mesh. * Only key/value pairs with the `=` operator are accepted in the label selector. * If empty or not specified, no Fleet members will be selected to join the mesh.
        status:
          $ref: "#/components/schemas/ClusterMeshProfileStatus"
          description: The cluster mesh profile status.
    ClusterMeshProfileProvisioningState:
      type: string
      enum:
        - Succeeded
        - Failed
        - Canceled
    MemberSelector:
      type: object
      description: Select members of a fleet.
      properties:
        byLabel:
          type: string
          description: Kubernetes-style label selector for selecting Fleet members, e.g. `env=production`. Required.
      required:
        - byLabel
    ClusterMeshProfileStatus:
      type: object
      description: Status of the cluster mesh.
      properties:
        state:
          $ref: "#/components/schemas/ClusterMeshState"
          description: 'The state of the cluster mesh. Required. Known values are: "NotConnected", "Applying", "Connected", "Degraded", and "Failed".'
        lastAppliedMemberSelector:
          $ref: "#/components/schemas/MemberSelector"
          description: The last applied MemberSelector for the cluster mesh profile.
        lastOperationId:
          type: string
          description: The last operation ID for the cluster mesh profile.
        lastOperationError:
          $ref: "#/components/schemas/ErrorDetail"
          description: The last operation error of the cluster mesh profile.
    ClusterMeshState:
      type: string
      enum:
        - NotConnected
        - Applying
        - Connected
        - Degraded
        - Failed
    ClusterMeshProfileFlattened:
      type: object
      description: Flattened view of ClusterMeshProfile ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        eTag:
          type: string
          description: If eTag is provided in the response body, it may also be provided as a header per the normal etag convention. Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
        provisioningState:
          $ref: "#/components/schemas/ClusterMeshProfileProvisioningState"
          description: 'The provisioning state of the cluster mesh profile. Known values are: "Succeeded", "Failed", and "Canceled".'
        memberSelector:
          $ref: "#/components/schemas/MemberSelector"
          description: Select the members of the mesh. * Only key/value pairs with the `=` operator are accepted in the label selector. * If empty or not specified, no Fleet members will be selected to join the mesh.
        status:
          $ref: "#/components/schemas/ClusterMeshProfileStatus"
          description: The cluster mesh profile status.
    PagedClusterMeshProfileFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ClusterMeshProfileFlattened"
        nextLink:
          type: string
    ClusterMeshProfile:
      type: object
      description: A cluster mesh profile stores the general information about the mesh.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/ClusterMeshProfileProperties"
          description: The resource-specific properties for this resource.
        eTag:
          type: string
          description: If eTag is provided in the response body, it may also be provided as a header per the normal etag convention. Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
    FleetManagedNamespaceProperties:
      type: object
      description: The properties of a fleet managed namespace.
      properties:
        provisioningState:
          $ref: "#/components/schemas/FleetManagedNamespaceProvisioningState"
          description: 'The status of the last operation. Known values are: "Succeeded", "Failed", "Canceled", "Creating", "Updating", and "Deleting".'
        managedNamespaceProperties:
          $ref: "#/components/schemas/ManagedNamespaceProperties"
          description: The namespace properties for the fleet managed namespace.
        adoptionPolicy:
          $ref: "#/components/schemas/AdoptionPolicy"
          description: 'Action if the managed namespace with the same name already exists. Default is Never. Required. Known values are: "Never", "IfIdentical", and "Always".'
        deletePolicy:
          $ref: "#/components/schemas/DeletePolicy"
          description: 'Delete options of a fleet managed namespace. Default is Keep. Required. Known values are: "Keep" and "Delete".'
        propagationPolicy:
          $ref: "#/components/schemas/PropagationPolicy"
          description: The profile of the propagation to create the namespace.
        status:
          $ref: "#/components/schemas/FleetManagedNamespaceStatus"
          description: Status information of the last operation for fleet managed namespace.
        portalFqdn:
          type: string
          description: The Azure Portal FQDN of the Fleet hub.
      required:
        - adoptionPolicy
        - deletePolicy
    FleetManagedNamespaceProvisioningState:
      type: string
      enum:
        - Succeeded
        - Failed
        - Canceled
        - Creating
        - Updating
        - Deleting
    ManagedNamespaceProperties:
      type: object
      description: The namespace properties for the fleet managed namespace.
      properties:
        labels:
          type: object
          properties: {}
          description: The labels for the fleet managed namespace.
        annotations:
          type: object
          properties: {}
          description: The annotations for the fleet managed namespace.
        defaultResourceQuota:
          $ref: "#/components/schemas/ResourceQuota"
          description: The default resource quota for the fleet managed namespace.
        defaultNetworkPolicy:
          $ref: "#/components/schemas/NetworkPolicy"
          description: The default network policy for the fleet managed namespace.
    ResourceQuota:
      type: object
      description: The resource quota for the managed namespace.
      properties:
        cpuRequest:
          type: string
          description: The CPU request for the managed namespace. See more at `https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-cpu `_.
        cpuLimit:
          type: string
          description: The CPU limit for the managed namespace. See more at `https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-cpu `_.
        memoryRequest:
          type: string
          description: The memory request for the managed namespace. See more at `https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-memory `_.
        memoryLimit:
          type: string
          description: The memory limit for the managed namespace. See more at `https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-memory `_.
    NetworkPolicy:
      type: object
      description: The network policy for the managed namespace.
      properties:
        ingress:
          $ref: "#/components/schemas/PolicyRule"
          description: 'The ingress policy for the managed namespace. Known values are: "AllowAll", "DenyAll", and "AllowSameNamespace".'
        egress:
          $ref: "#/components/schemas/PolicyRule"
          description: 'The egress policy for the managed namespace. Known values are: "AllowAll", "DenyAll", and "AllowSameNamespace".'
    PolicyRule:
      type: string
      enum:
        - AllowAll
        - DenyAll
        - AllowSameNamespace
    AdoptionPolicy:
      type: string
      enum:
        - Never
        - IfIdentical
        - Always
    DeletePolicy:
      type: string
      enum:
        - Keep
        - Delete
    PropagationPolicy:
      type: object
      description: The propagation to be used for provisioning the namespace among the fleet.
      properties:
        type:
          $ref: "#/components/schemas/PropagationType"
          description: The type of the policy to be used. Default is Placement. Required. "Placement"
        placementProfile:
          $ref: "#/components/schemas/PlacementProfile"
          description: The profile to be used for propagation via placement.
      required:
        - type
    PropagationType:
      type: string
      enum:
        - Placement
    PlacementProfile:
      type: object
      description: The configuration profile for default ClusterResourcePlacement for placement.
      properties:
        defaultClusterResourcePlacement:
          $ref: "#/components/schemas/ClusterResourcePlacementSpec"
          description: The default ClusterResourcePlacement policy configuration.
    ClusterResourcePlacementSpec:
      type: object
      description: ClusterResourcePlacementSpec defines the desired state of ClusterResourcePlacement.
      properties:
        policy:
          $ref: "#/components/schemas/PlacementPolicy"
          description: Policy defines how to select member clusters to place the selected resources. If unspecified, all the joined member clusters are selected.
    PlacementPolicy:
      type: object
      description: "PlacementPolicy contains the rules to select target member clusters to place the selected resources. Note that only clusters that are both joined and satisfying the rules will be selected. You can only specify at most one of the two fields: ClusterNames and Affinity. If none is specified, all the joined clusters are selected."
      properties:
        placementType:
          $ref: "#/components/schemas/PlacementType"
          description: 'Type of placement. Can be "PickAll", "PickN" or "PickFixed". Default is PickAll. Known values are: "PickAll" and "PickFixed".'
        clusterNames:
          type: array
          items:
            type: string
          description: ClusterNames contains a list of names of MemberCluster to place the selected resources. Only valid if the placement type is "PickFixed".
        affinity:
          $ref: "#/components/schemas/Affinity"
          description: Affinity contains cluster affinity scheduling rules. Defines which member clusters to place the selected resources. Only valid if the placement type is "PickAll" or "PickN".
        tolerations:
          type: array
          items:
            $ref: "#/components/schemas/Toleration"
          description: If specified, the ClusterResourcePlacement's Tolerations. Tolerations cannot be updated or deleted. This field is beta-level and is for the taints and tolerations feature.
    PlacementType:
      type: string
      enum:
        - PickAll
        - PickFixed
    Affinity:
      type: object
      description: Affinity is a group of cluster affinity scheduling rules. More to be added.
      properties:
        clusterAffinity:
          $ref: "#/components/schemas/ClusterAffinity"
          description: ClusterAffinity contains cluster affinity scheduling rules for the selected resources.
    ClusterAffinity:
      type: object
      description: ClusterAffinity contains cluster affinity scheduling rules for the selected resources.
      properties:
        requiredDuringSchedulingIgnoredDuringExecution:
          $ref: "#/components/schemas/ClusterSelector"
          description: If the affinity requirements specified by this field are not met at scheduling time, the resource will not be scheduled onto the cluster. If the affinity requirements specified by this field cease to be met at some point after the placement (e.g. due to an update), the system may or may not try to eventually remove the resource from the cluster.
    ClusterSelector:
      type: object
      description: ClusterSelector.
      properties:
        clusterSelectorTerms:
          type: array
          items:
            $ref: "#/components/schemas/ClusterSelectorTerm"
          description: ClusterSelectorTerms is a list of cluster selector terms. The terms are `ORed`. Required.
      required:
        - clusterSelectorTerms
    ClusterSelectorTerm:
      type: object
      description: ClusterSelectorTerm.
      properties:
        labelSelector:
          $ref: "#/components/schemas/LabelSelector"
          description: LabelSelector is a label query over all the joined member clusters. Clusters matching the query are selected. If you specify both label and property selectors in the same term, the results are AND'd.
        propertySelector:
          $ref: "#/components/schemas/PropertySelector"
          description: PropertySelector is a property query over all joined member clusters. Clusters matching the query are selected. If you specify both label and property selectors in the same term, the results are AND'd. At this moment, PropertySelector can only be used with `RequiredDuringSchedulingIgnoredDuringExecution` affinity terms. This field is beta-level; it is for the property-based scheduling feature and is only functional when a property provider is enabled in the deployment.
    LabelSelector:
      type: object
      description: A label selector is a label query over a set of resources. The result of matchLabels and matchExpressions are ANDed. An empty label selector matches all objects. A null label selector matches no objects.
      properties:
        matchLabels:
          type: object
          properties: {}
          description: matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels map is equivalent to an element of matchExpressions, whose key field is "key", the operator is "In", and the values array contains only "value". The requirements are ANDed.
        matchExpressions:
          type: array
          items:
            $ref: "#/components/schemas/LabelSelectorRequirement"
          description: matchExpressions is a list of label selector requirements. The requirements are ANDed.
    LabelSelectorRequirement:
      type: object
      description: A label selector requirement is a selector that contains values, a key, and an operator that relates the key and values.
      properties:
        key:
          type: string
          description: key is the label key that the selector applies to. Required.
        operator:
          $ref: "#/components/schemas/LabelSelectorOperator"
          description: "operator represents a key's relationship to a set of values. Valid operators are In, NotIn, Exists and DoesNotExist. Required. Known values are: \"In\", \"NotIn\", \"Exists\", and \"DoesNotExist\"."
        values:
          type: array
          items:
            type: string
          description: values is an array of string values. If the operator is In or NotIn, the values array must be non-empty. If the operator is Exists or DoesNotExist, the values array must be empty. This array is replaced during a strategic merge patch.
      required:
        - key
        - operator
    LabelSelectorOperator:
      type: string
      enum:
        - In
        - NotIn
        - Exists
        - DoesNotExist
    PropertySelector:
      type: object
      description: PropertySelector helps user specify property requirements when picking clusters for resource placement.
      properties:
        matchExpressions:
          type: array
          items:
            $ref: "#/components/schemas/PropertySelectorRequirement"
          description: MatchExpressions is an array of PropertySelectorRequirements. The requirements are AND'd. Required.
      required:
        - matchExpressions
    PropertySelectorRequirement:
      type: object
      description: PropertySelectorRequirement is a specific property requirement when picking clusters for resource placement.
      properties:
        name:
          type: string
          description: Name is the name of the property; it should be a Kubernetes label name. Required.
        operator:
          $ref: "#/components/schemas/PropertySelectorOperator"
          description: "Operator specifies the relationship between a cluster's observed value of the specified property and the values given in the requirement. Required. Known values are: \"Gt\", \"Ge\", \"Eq\", \"Ne\", \"Lt\", and \"Le\"."
        values:
          type: array
          items:
            type: string
          description: Values are a list of values of the specified property which Fleet will compare against the observed values of individual member clusters in accordance with the given operator. At this moment, each value should be a Kubernetes quantity. For more information, see `https://pkg.go.dev/k8s.io/apimachinery/pkg/api/resource#Quantity `_. If the operator is Gt (greater than), Ge (greater than or equal to), Lt (less than), or `Le` (less than or equal to), Eq (equal to), or Ne (ne), exactly one value must be specified in the list. Required.
      required:
        - name
        - operator
        - values
    PropertySelectorOperator:
      type: string
      enum:
        - Gt
        - Ge
        - Eq
        - Ne
        - Lt
        - Le
    Toleration:
      type: object
      description: Toleration allows ClusterResourcePlacement to tolerate any taint that matches the triple using the matching operator .
      properties:
        key:
          type: string
          description: Key is the taint key that the toleration applies to. Empty means match all taint keys. If the key is empty, operator must be Exists; this combination means to match all values and all keys.
        operator:
          $ref: "#/components/schemas/TolerationOperator"
          description: "Operator represents a key's relationship to the value. Valid operators are Exists and Equal. Defaults to Equal. Exists is equivalent to wildcard for value, so that a ClusterResourcePlacement can tolerate all taints of a particular category. Known values are: \"Exists\" and \"Equal\"."
        value:
          type: string
          description: Value is the taint value the toleration matches to. If the operator is Exists, the value should be empty, otherwise just a regular string.
        effect:
          $ref: "#/components/schemas/TaintEffect"
          description: Effect indicates the taint effect to match. Empty means match all taint effects. When specified, only allowed value is NoSchedule. "NoSchedule"
