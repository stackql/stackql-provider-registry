          type: string
          description: Optional Field - Platform Error Message.
        healthState:
          $ref: "#/components/schemas/RevisionHealthState"
          description: 'Current health State of the revision. Known values are: "Healthy", "Unhealthy", and "None".'
        provisioningState:
          $ref: "#/components/schemas/RevisionProvisioningState"
          description: 'Current provisioning State of the revision. Known values are: "Provisioning", "Provisioned", "Failed", "Deprovisioning", and "Deprovisioned".'
        runningState:
          $ref: "#/components/schemas/RevisionRunningState"
          description: 'Current running state of the revision. Known values are: "Running", "Processing", "Stopped", "Degraded", "Failed", and "Unknown".'
    Template:
      type: object
      description: Container App versioned application definition. Defines the desired state of an immutable revision. Any changes to this section Will result in a new revision being created.
      properties:
