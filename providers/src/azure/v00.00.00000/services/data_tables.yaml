openapi: 3.0.0
servers:
  - url: https://{account}.table.cosmos.azure.com
    variables:
      account:
        default: ""
        description: Cosmos DB Table API account name.
  - url: https://{account}.table.core.windows.net
    variables:
      account:
        default: ""
        description: Storage account name (Azure Table Storage).
info:
  title: Tables Base Client
  description: Base class for TableClient
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: unversioned-stackql-generated
  x-serviceAlias: data_tables
  x-sdkPackage: azure-data-tables
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    Logging:
      type: object
      description: Azure Analytics Logging settings.
      properties:
        version:
          type: string
          description: The version of the logging properties. Required.
        delete:
          type: boolean
          description: Whether delete operation is logged. Required.
        read:
          type: boolean
          description: Whether read operation is logged. Required.
        write:
          type: boolean
          description: Whether write operation is logged. Required.
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicy"
          description: The retention policy of the logs. Required.
      required:
        - version
        - delete
        - read
        - write
        - retentionPolicy
    RetentionPolicy:
      type: object
      description: The retention policy.
      properties:
        enabled:
          type: boolean
          description: Whether to enable the retention policy. Required.
        days:
          type: integer
          description: Indicates the number of days that metrics or logging or soft-deleted data should be retained. All data older than this value will be deleted.
      required:
        - enabled
    Metrics:
      type: object
      description: The metrics properties.
      properties:
        version:
          type: string
          description: The version of the metrics properties.
        enabled:
          type: boolean
          description: Indicates whether metrics are enabled for the Table service. Required.
        includeApis:
          type: boolean
          description: Indicates whether metrics should generate summary statistics for called API operations.
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicy"
          description: The retention policy of the metrics.
      required:
        - enabled
    CorsRule:
      type: object
      description: CORS is an HTTP feature that enables a web application running under one domain to access resources in another domain. Web browsers implement a security restriction known as same-origin policy that prevents a web page from calling APIs in a different domain; CORS provides a secure way to allow one domain (the origin domain) to call APIs in another domain.
      properties:
        allowedOrigins:
          type: string
          description: The origin domains that are permitted to make a request against the service via CORS. The origin domain is the domain from which the request originates. Note that the origin must be an exact case-sensitive match with the origin that the user age sends to the service. You can also use the wildcard character '*' to allow all origin domains to make requests via CORS. Required.
        allowedMethods:
          type: string
          description: The methods (HTTP request verbs) that the origin domain may use for a CORS request. Required.
        allowedHeaders:
          type: string
          description: The request headers that the origin domain may specify on the CORS request. Required.
        exposedHeaders:
          type: string
          description: The response headers that may be sent in the response to the CORS request and exposed by the browser to the request issuer. Required.
        maxAgeInSeconds:
          type: integer
          description: The maximum amount time that a browser should cache the preflight OPTIONS request. Required.
      required:
        - allowedOrigins
        - allowedMethods
        - allowedHeaders
        - exposedHeaders
        - maxAgeInSeconds
    TableServiceProperties:
      type: object
      description: The service properties.
      properties:
        logging:
          $ref: "#/components/schemas/Logging"
          description: The logging properties.
        hourMetrics:
          $ref: "#/components/schemas/Metrics"
          description: The hour metrics properties.
        minuteMetrics:
          $ref: "#/components/schemas/Metrics"
          description: The minute metrics properties.
        cors:
          type: array
          items:
            $ref: "#/components/schemas/CorsRule"
          description: The CORS properties.
    GeoReplication:
      type: object
      description: Geo-Replication information for the Secondary Storage Service.
      properties:
        status:
          $ref: "#/components/schemas/GeoReplicationStatusType"
          description: 'The status of the secondary location. Required. Known values are: "live", "bootstrap", and "unavailable".'
        lastSyncTime:
          type: string
          format: date-time
          description: A GMT date/time value, to the second. All primary writes preceding this value are guaranteed to be available for read operations at the secondary. Primary writes after this point in time may or may not be available for reads. Required.
      required:
        - status
        - lastSyncTime
    GeoReplicationStatusType:
      type: string
      enum:
        - live
        - bootstrap
        - unavailable
    TableServiceStats:
      type: object
      description: Stats for the table service.
      properties:
        geoReplication:
          $ref: "#/components/schemas/GeoReplication"
          description: Geo-Replication information for the Secondary Storage Service.
    SignedIdentifier:
      type: object
      description: The signed identifier.
      properties:
        id:
          type: string
          description: The unique ID for the signed identifier. Required.
        accessPolicy:
          $ref: "#/components/schemas/AccessPolicy"
          description: The access policy for the signed identifier.
      required:
        - id
    AccessPolicy:
      type: object
      description: An access policy.
      properties:
        start:
          type: string
          description: The date-time the policy is active. Required.
        expiry:
          type: string
          description: The date-time the policy expires. Required.
        permission:
          type: string
          description: The permissions for acl the policy. Required.
      required:
        - start
        - expiry
        - permission
    SignedIdentifiers:
      type: object
      description: Table signed identifiers.
      properties:
        identifiers:
          type: array
          items:
            $ref: "#/components/schemas/SignedIdentifier"
          description: An array of signed identifiers. Required.
      required:
        - identifiers
    TableProperties:
      type: object
      description: The properties for the table response.
      properties:
        TableName:
          type: string
          description: The name of the table.
        odata:
          type: object
          properties:
            type:
              type: string
              description: The odata type of the table.
            id:
              type: string
              description: The id of the table.
            editLink:
              type: string
              description: The edit link of the table.
    PagedTableProperties:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TableProperties"
        nextLink:
          type: string
    TableResponse:
      type: object
      description: The table properties as returned in an echo response.
      properties:
        TableName:
          type: string
          description: The name of the table.
        odata:
          type: object
          properties:
            type:
              type: string
              description: The odata type of the table.
            id:
              type: string
              description: The id of the table.
            editLink:
              type: string
              description: The edit link of the table.
            metadata:
              type: string
              description: The metadata response of the table.
    TableEntityQueryResponse:
      type: object
      description: The properties for the table entity query response.
      properties:
        odata:
          type: object
          properties:
            metadata:
              type: string
              description: The metadata response of the table.
        value:
          type: array
          items:
            type: object
            properties: {}
          description: List of table entities.
  x-stackQL-resources:
    service:
      id: azure.data_tables.service
      name: service
      title: service
      methods:
        get_properties:
          operation:
            $ref: "#/paths/~1?restype=service&comp=properties/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
        set_properties:
          operation:
            $ref: "#/paths/~1?restype=service&comp=properties/put"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        get_statistics:
          operation:
            $ref: "#/paths/~1?restype=service&comp=stats/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/service/methods/get_properties"
        insert: []
        update: []
        replace:
          - $ref: "#/components/x-stackQL-resources/service/methods/set_properties"
        delete: []
    table:
      id: azure.data_tables.table
      name: table
      title: table
      methods:
        get_access_policy:
          operation:
            $ref: "#/paths/~1{table_name}?comp=acl/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
        set_access_policy:
          operation:
            $ref: "#/paths/~1{table_name}?comp=acl/put"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        query:
          operation:
            $ref: "#/paths/~1Tables/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
        create:
          operation:
            $ref: "#/paths/~1Tables/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        delete:
          operation:
            $ref: "#/paths/~1Tables('{table_name}')/delete"
          response:
            openAPIDocKey: "204"
        query_entities:
          operation:
            $ref: "#/paths/~1{table_name}()/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
        query_entity_with_partition_and_row_key:
          operation:
            $ref: "#/paths/~1{table_name}(PartitionKey='{partition_key}',RowKey='{row_key}')/get"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
        update_entity:
          operation:
            $ref: "#/paths/~1{table_name}(PartitionKey='{partition_key}',RowKey='{row_key}')/put"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
        merge_entity:
          operation:
            $ref: "#/paths/~1{table_name}(PartitionKey='{partition_key}',RowKey='{row_key}')/patch"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
        delete_entity:
          operation:
            $ref: "#/paths/~1{table_name}(PartitionKey='{partition_key}',RowKey='{row_key}')/delete"
          response:
            openAPIDocKey: "204"
          request:
            nativeCasing: camel
        insert_entity:
          operation:
            $ref: "#/paths/~1{table_name}/post"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: camel
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/table/methods/get_access_policy"
        insert:
          - $ref: "#/components/x-stackQL-resources/table/methods/create"
        update:
          - $ref: "#/components/x-stackQL-resources/table/methods/update_entity"
        replace:
          - $ref: "#/components/x-stackQL-resources/table/methods/set_access_policy"
        delete:
          - $ref: "#/components/x-stackQL-resources/table/methods/delete_entity"
          - $ref: "#/components/x-stackQL-resources/table/methods/delete"
paths:
  /?restype=service&comp=properties:
    get:
      operationId: Service_get_properties
      description: Gets the properties of an account's Table service, including properties for Analytics and CORS (Cross-Origin Resource Sharing) rules.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableServiceProperties"
    put:
      operationId: Service_set_properties
      description: Sets properties for an account's Table service endpoint, including properties for Analytics and CORS (Cross-Origin Resource Sharing) rules.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                logging:
                  $ref: "#/components/schemas/Logging"
                  description: The logging properties.
                hourMetrics:
                  $ref: "#/components/schemas/Metrics"
                  description: The hour metrics properties.
                minuteMetrics:
                  $ref: "#/components/schemas/Metrics"
                  description: The minute metrics properties.
                cors:
                  type: array
                  items:
                    $ref: "#/components/schemas/CorsRule"
                  description: The CORS properties.
      responses:
        "200":
          description: Success
  /?restype=service&comp=stats:
    get:
      operationId: Service_get_statistics
      description: Retrieves statistics related to replication for the Table service. It is only available on the secondary location endpoint when read-access geo-redundant replication is enabled for the account.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableServiceStats"
  /{table_name}?comp=acl:
    get:
      operationId: Table_get_access_policy
      description: Retrieves details about any stored access policies specified on the table that may be used with Shared Access Signatures.
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the table. Required.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedIdentifiers"
    put:
      operationId: Table_set_access_policy
      description: Sets stored access policies for the table that may be used with Shared Access Signatures.
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the table. Required.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifiers:
                  type: array
                  items:
                    $ref: "#/components/schemas/SignedIdentifier"
                  description: An array of signed identifiers. Required.
              required:
                - identifiers
      responses:
        "200":
          description: Success
  /Tables:
    get:
      operationId: Table_query
      description: Queries tables under the given account.
      parameters:
        - name: $format
          in: query
          required: false
          schema:
            type: string
          description: 'Specifies the metadata format for the response. Known values are: "application/json;odata=nometadata", "application/json;odata=minimalmetadata", and "application/json;odata=fullmetadata". Default value is None.'
        - name: $top
          in: query
          required: false
          schema:
            type: integer
          description: Specifies the maximum number of records to return. Default value is None.
        - name: $select
          in: query
          required: false
          schema:
            type: string
          description: Select expression using OData notation. Limits the columns on each record to just those requested. Default value is None.
        - name: $filter
          in: query
          required: false
          schema:
            type: string
          description: OData filter expression. Default value is None.
        - name: NextTableName
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedTableProperties"
    post:
      operationId: Table_create
      description: Creates a new table under the given account.
      parameters:
        - name: $format
          in: query
          required: false
          schema:
            type: string
          description: 'Specifies the metadata format for the response. Known values are: "application/json;odata=nometadata", "application/json;odata=minimalmetadata", and "application/json;odata=fullmetadata". Default value is None.'
        - name: Prefer
          in: header
          required: false
          schema:
            type: string
          description: 'Specifies whether the response should include the created table in the payload. Possible values are return-no-content and return-content. Known values are: "return-no-content" and "return-content". Default value is None.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TableName:
                  type: string
                  description: The name of the table.
                odata:
                  type: object
                  properties:
                    type:
                      type: string
                      description: The odata type of the table.
                    id:
                      type: string
                      description: The id of the table.
                    editLink:
                      type: string
                      description: The edit link of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableResponse"
  /Tables('{table_name}'):
    delete:
      operationId: Table_delete
      description: Deletes an existing table.
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the table. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /{table_name}():
    get:
      operationId: Table_query_entities
      description: Queries entities under the given table.
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the table. Required.
        - name: $format
          in: query
          required: false
          schema:
            type: string
          description: 'Specifies the metadata format for the response. Known values are: "application/json;odata=nometadata", "application/json;odata=minimalmetadata", and "application/json;odata=fullmetadata". Default value is None.'
        - name: $top
          in: query
          required: false
          schema:
            type: integer
          description: Specifies the maximum number of records to return. Default value is None.
        - name: $select
          in: query
          required: false
          schema:
            type: string
          description: Select expression using OData notation. Limits the columns on each record to just those requested. Default value is None.
        - name: $filter
          in: query
          required: false
          schema:
            type: string
          description: OData filter expression. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
        - name: NextPartitionKey
          in: query
          required: false
          schema:
            type: string
          description: An entity partition key query continuation token from a previous call. Default value is None.
        - name: NextRowKey
          in: query
          required: false
          schema:
            type: string
          description: An entity row key query continuation token from a previous call. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableEntityQueryResponse"
  /{table_name}(PartitionKey='{partition_key}',RowKey='{row_key}'):
    get:
      operationId: Table_query_entity_with_partition_and_row_key
      description: Retrieve a single entity.
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the table. Required.
        - name: partition_key
          in: path
          required: true
          schema:
            type: string
          description: The partition key of the entity. Required.
        - name: row_key
          in: path
          required: true
          schema:
            type: string
          description: The row key of the entity. Required.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
        - name: $format
          in: query
          required: false
          schema:
            type: string
          description: 'Specifies the metadata format for the response. Known values are: "application/json;odata=nometadata", "application/json;odata=minimalmetadata", and "application/json;odata=fullmetadata". Default value is None.'
        - name: $select
          in: query
          required: false
          schema:
            type: string
          description: Select expression using OData notation. Limits the columns on each record to just those requested. Default value is None.
        - name: $filter
          in: query
          required: false
          schema:
            type: string
          description: OData filter expression. Default value is None.
      responses:
        "200":
          description: Success
    put:
      operationId: Table_update_entity
      description: Update entity in a table.
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the table. Required.
        - name: partition_key
          in: path
          required: true
          schema:
            type: string
          description: The partition key of the entity. Required.
        - name: row_key
          in: path
          required: true
          schema:
            type: string
          description: The row key of the entity. Required.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
      responses:
        "200":
          description: Success
    patch:
      operationId: Table_merge_entity
      description: Merge entity in a table.
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the table. Required.
        - name: partition_key
          in: path
          required: true
          schema:
            type: string
          description: The partition key of the entity. Required.
        - name: row_key
          in: path
          required: true
          schema:
            type: string
          description: The row key of the entity. Required.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
      responses:
        "200":
          description: Success
    delete:
      operationId: Table_delete_entity
      description: Deletes the specified entity in a table.
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the table. Required.
        - name: partition_key
          in: path
          required: true
          schema:
            type: string
          description: The partition key of the entity. Required.
        - name: row_key
          in: path
          required: true
          schema:
            type: string
          description: The row key of the entity. Required.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
      responses:
        "204":
          description: Success (no content / accepted)
  /{table_name}:
    post:
      operationId: Table_insert_entity
      description: Insert entity in a table.
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the table. Required.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. Default value is None.
        - name: $format
          in: query
          required: false
          schema:
            type: string
          description: 'Specifies the metadata format for the response. Known values are: "application/json;odata=nometadata", "application/json;odata=minimalmetadata", and "application/json;odata=fullmetadata". Default value is None.'
        - name: Prefer
          in: header
          required: false
          schema:
            type: string
          description: 'Specifies whether the response should include the inserted entity in the payload. Possible values are return-no-content and return-content. Known values are: "return-no-content" and "return-content". Default value is None.'
      responses:
        "200":
          description: Success
