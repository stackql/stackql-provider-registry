paths:
  /authoring/query-knowledgebases/projects?api-version=2025-05-15-preview:
    get:
      operationId: _QuestionAnsweringAuthoringClient_list_projects
      description: Gets all projects for a user.
      parameters:
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: The maximum number of resources to return from the collection. Default value is None.
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: An offset into the collection of the first resource to be returned. Default value is None.
        - name: maxpagesize
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedQuestionAnsweringProject"
  /authoring/query-knowledgebases/projects/{project_name}/deployments?api-version=2025-05-15-preview:
    get:
      operationId: _QuestionAnsweringAuthoringClient_list_deployments
      description: List all deployments of a project.
      parameters:
        - name: project_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the project. Required.
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: The maximum number of resources to return from the collection. Default value is None.
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: An offset into the collection of the first resource to be returned. Default value is None.
        - name: maxpagesize
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedProjectDeployment"
  /authoring/query-knowledgebases/projects/{project_name}/synonyms?api-version=2025-05-15-preview:
    get:
      operationId: _QuestionAnsweringAuthoringClient_list_synonyms
      description: Gets all the synonyms of a project.
      parameters:
        - name: project_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the project. Required.
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: The maximum number of resources to return from the collection. Default value is None.
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: An offset into the collection of the first resource to be returned. Default value is None.
        - name: maxpagesize
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedWordAlterations"
    put:
      operationId: _QuestionAnsweringAuthoringClient_update_synonyms
      description: Updates all the synonyms of a project.
      parameters:
        - name: project_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the project to use. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: array
                  items:
                    $ref: "#/components/schemas/WordAlterations"
                  description: The WordAlterations items on this page. Required.
                nextLink:
                  type: string
                  description: The link to the next page of items.
              required:
                - value
      responses:
        "200":
          description: Success
  /authoring/query-knowledgebases/projects/{project_name}/sources?api-version=2025-05-15-preview:
    get:
      operationId: _QuestionAnsweringAuthoringClient_list_sources
      description: Gets all the sources of a project.
      parameters:
        - name: project_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the project. Required.
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: The maximum number of resources to return from the collection. Default value is None.
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: An offset into the collection of the first resource to be returned. Default value is None.
        - name: maxpagesize
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedQnaSourceRecord"
    patch:
      operationId: _QuestionAnsweringAuthoringClient_begin_update_sources
      description: Updates the sources of a project.
      parameters:
        - name: project_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the project to use. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                op:
                  $ref: "#/components/schemas/UpdateOperationKind"
                  description: 'Update operation type for assets. Required. Known values are: "add", "delete", and "replace".'
                value:
                  $ref: "#/components/schemas/UpdateQnaSourceRecord"
                  description: Update source record. Required.
              required:
                - op
                - value
      responses:
        "204":
          description: Success (no content / accepted)
