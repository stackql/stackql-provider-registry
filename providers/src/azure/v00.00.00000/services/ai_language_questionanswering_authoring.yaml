openapi: 3.0.0
servers:
  - url: https://{endpoint}/language
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `Endpoint` parameter.
info:
  title: Question Answering Authoring Client
  description: QuestionAnsweringAuthoringClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-05-15-preview-stackql-generated
  x-serviceAlias: ai_language_questionanswering_authoring
  x-sdkPackage: azure-ai-language-questionanswering-authoring
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ProjectSettings:
      type: object
      description: Configurable settings of the Project.
      properties:
        defaultAnswer:
          type: string
          description: Default Answer response when no good match is found in the knowledge base.
    QuestionAnsweringProject:
      type: object
      description: Represents the project.
      properties:
        projectName:
          type: string
          description: Name of the project. Required.
        description:
          type: string
          description: Description of the project.
        language:
          type: string
          description: Language of the text records. This is BCP-47 representation of a language. For example, use "en" for English; "es" for Spanish etc. If not set, use "en" for English as default.
        multilingualResource:
          type: boolean
          description: Resource enabled for multiple languages across projects or not.
        settings:
          $ref: "#/components/schemas/ProjectSettings"
          description: Configurable settings of the Project.
        createdDateTime:
          type: string
          format: date-time
          description: Project creation date-time.
        lastModifiedDateTime:
          type: string
          format: date-time
          description: Represents the project last modified date-time.
        lastDeployedDateTime:
          type: string
          format: date-time
          description: Represents the project last deployment date-time.
        configureSemanticRanking:
          type: boolean
          description: Represents if semantic ranking is configured.
    PagedQuestionAnsweringProject:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/QuestionAnsweringProject"
        nextLink:
          type: string
    ProjectDeployment:
      type: object
      description: Project deployment details.
      properties:
        deploymentName:
          type: string
          description: Name of the deployment. Required.
        lastDeployedDateTime:
          type: string
          format: date-time
          description: Represents the project last deployment date-time.
    PagedProjectDeployment:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ProjectDeployment"
        nextLink:
          type: string
    WordAlterations:
      type: object
      description: Collection of word alterations.
      properties:
        alterations:
          type: array
          items:
            type: string
          description: Collection of word alterations. Required.
      required:
        - alterations
    PagedWordAlterations:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/WordAlterations"
        nextLink:
          type: string
    SourceKind:
      type: string
      enum:
        - file
        - url
    SourceContentStructureKind:
      type: string
      enum:
        - unstructured
    QnaSourceRecord:
      type: object
      description: Custom source record with last updated date-time.
      properties:
        displayName:
          type: string
          description: Friendly name of the Source.
        source:
          type: string
          description: Unique source identifier. Name of the file if it's a 'file' source; otherwise, the complete URL if it's a 'url' source. Required.
        sourceUri:
          type: string
          description: URI location for the file or url. Required.
        sourceKind:
          $ref: "#/components/schemas/SourceKind"
          description: 'Supported source types. Required. Known values are: "file" and "url".'
        contentStructureKind:
          $ref: "#/components/schemas/SourceContentStructureKind"
          description: Content structure type for sources. "unstructured"
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: Date-time when the QnA was last updated.
      required:
        - source
        - sourceUri
        - sourceKind
    PagedQnaSourceRecord:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/QnaSourceRecord"
        nextLink:
          type: string
    QnaDialog:
      type: object
      description: Dialog associated with QnA Record.
      properties:
        isContextOnly:
          type: boolean
          description: To mark if a prompt is relevant only with a previous question or not. If true, do not include this QnA as answer for queries without context; otherwise, ignores context and includes this QnA in answers.
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/QnaPrompt"
          description: List of prompts associated with the answer.
    QnaPrompt:
      type: object
      description: Prompt for an answer.
      properties:
        displayOrder:
          type: integer
          description: Index of the prompt. It is used for ordering of the prompts.
        qnaId:
          type: integer
          description: ID of the QnA corresponding to the prompt.
        qna:
          $ref: "#/components/schemas/QnaRecord"
          description: QnA record. Either QnAId or QnA record needs to be present in a Prompt.
        displayText:
          type: string
          description: Text displayed to represent a follow up question prompt.
    QnaRecord:
      type: object
      description: QnA record.
      properties:
        id:
          type: integer
          description: Unique ID for the QnA. Required.
        answer:
          type: string
          description: Answer text.
        source:
          type: string
          description: Source from which QnA was indexed e.g. `https://docs.microsoft.com/en-us/azure/cognitive-services/QnAMaker/FAQs `_ .
        questions:
          type: array
          items:
            type: string
          description: List of questions associated with the answer.
        metadata:
          type: object
          properties: {}
          description: Metadata associated with the answer, useful to categorize or filter question answers.
        dialog:
          $ref: "#/components/schemas/QnaDialog"
          description: Context of a QnA.
        activeLearningSuggestions:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedQuestionsCluster"
          description: List of Active Learning suggestions for the QnA.
      required:
        - id
    SuggestedQuestionsCluster:
      type: object
      description: Active Learning suggested questions cluster details.
      properties:
        clusterHead:
          type: string
          description: Question chosen as the head of suggested questions cluster by Active Learning clustering algorithm.
        suggestedQuestions:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedQuestion"
          description: List of all suggested questions for the QnA.
    SuggestedQuestion:
      type: object
      description: Question suggested by the Active Learning feature.
      properties:
        question:
          type: string
          description: Question suggested by the Active Learning feature.
        userSuggestedCount:
          type: integer
          description: The number of times the question was suggested explicitly by the user.
        autoSuggestedCount:
          type: integer
          description: The number of times the question was suggested automatically by the Active Learning algorithm.
    RetrieveQnaRecord:
      type: object
      description: QnA Record with last updated date-time.
      properties:
        id:
          type: integer
          description: Unique ID for the QnA. Required.
        answer:
          type: string
          description: Answer text.
        source:
          type: string
          description: Source from which QnA was indexed e.g. `https://docs.microsoft.com/en-us/azure/cognitive-services/QnAMaker/FAQs `_ .
        questions:
          type: array
          items:
            type: string
          description: List of questions associated with the answer.
        metadata:
          type: object
          properties: {}
          description: Metadata associated with the answer, useful to categorize or filter question answers.
        dialog:
          $ref: "#/components/schemas/QnaDialog"
          description: Context of a QnA.
        activeLearningSuggestions:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedQuestionsCluster"
          description: List of Active Learning suggestions for the QnA.
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: Date-time when the QnA was last updated.
      required:
        - id
    PagedRetrieveQnaRecord:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/RetrieveQnaRecord"
        nextLink:
          type: string
    Assets:
      type: object
      description: All assets for this project.
      properties:
        synonyms:
          type: array
          items:
            $ref: "#/components/schemas/WordAlterations"
          description: Collection of synonyms.
        qnas:
          type: array
          items:
            $ref: "#/components/schemas/ImportQnaRecord"
          description: List of QnA records to import.
    ImportQnaRecord:
      type: object
      description: Import QnA Record.
      properties:
        id:
          type: integer
          description: Unique ID for the QnA. Required.
        answer:
          type: string
          description: Answer text.
        source:
          type: string
          description: Source from which QnA was indexed e.g. `https://docs.microsoft.com/en-us/azure/cognitive-services/QnAMaker/FAQs `_ .
        questions:
          type: array
          items:
            type: string
          description: List of questions associated with the answer.
        metadata:
          type: object
          properties: {}
          description: Metadata associated with the answer, useful to categorize or filter question answers.
        dialog:
          $ref: "#/components/schemas/QnaDialog"
          description: Context of a QnA.
        activeLearningSuggestions:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedQuestionsCluster"
          description: List of Active Learning suggestions for the QnA.
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: Date-time when the QnA was last updated.
        sourceDisplayName:
          type: string
          description: Friendly name of the Source.
      required:
        - id
    UpdateOperationKind:
      type: string
      enum:
        - add
        - delete
        - replace
    UpdateQnaSourceRecord:
      type: object
      description: Update source record.
      properties:
        displayName:
          type: string
          description: Friendly name of the Source.
        source:
          type: string
          description: Unique source identifier. Name of the file if it's a 'file' source; otherwise, the complete URL if it's a 'url' source. Required.
        sourceUri:
          type: string
          description: URI location for the file or url. Required.
        sourceKind:
          $ref: "#/components/schemas/SourceKind"
          description: 'Supported source types. Required. Known values are: "file" and "url".'
        contentStructureKind:
          $ref: "#/components/schemas/SourceContentStructureKind"
          description: Content structure type for sources. "unstructured"
        refresh:
          type: boolean
          description: Boolean flag used to refresh data from the Source.
      required:
        - source
        - sourceUri
        - sourceKind
    UpdateSourceFromFileOperationRecord:
      type: object
      description: A single file operation for updating sources for a project. Used to add, remove or replace a source from a knowledgebase.
      properties:
        operation:
          $ref: "#/components/schemas/UpdateOperationKind"
          description: 'Update operation type for assets. Required. Known values are: "add", "delete", and "replace".'
        fileDisplayName:
          type: string
          description: Friendly name of the Source. If not provided, would be equal to fileSource.
        fileName:
          type: string
          description: This would be name of the file. This links to the fileName of the file being sent in multipart. Required.
        refresh:
          type: boolean
          description: Bool value for refresh.
      required:
        - operation
        - fileName
    FeedbackRecord:
      type: object
      description: Feedback Record for Active Learning.
      properties:
        userId:
          type: string
          description: Unique identifier of the user.
        userQuestion:
          type: string
          description: User suggested question for the QnA.
        qnaId:
          type: integer
          description: Unique ID of the QnA.
