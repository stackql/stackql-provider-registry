      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
        nextLink:
          type: string
    ResourceChangesRequestParametersInterval:
      type: object
      description: Specifies the date and time interval for a changes request.
      properties:
        start:
          type: string
          format: date-time
          description: A datetime indicating the inclusive/closed start of the time interval, i.e. `[`**`start`**`, end)`. Specifying a `start` that occurs chronologically after `end` will result in an error. Required.
        end:
          type: string
          format: date-time
          description: A datetime indicating the exclusive/open end of the time interval, i.e. `[start, `**`end`**`)`. Specifying an `end` that occurs chronologically before `start` will result in an error. Required.
      required:
        - start
        - end
    ResourceChangeList:
      type: object
      description: A list of changes associated with a resource over a specific time interval.
      properties:
        changes:
          type: array
          items:
            $ref: "#/components/schemas/ResourceChangeData"
          description: The pageable value returned by the operation, i.e. a list of changes to the resource. * The list is ordered from the most recent changes to the least recent changes. * This list will be empty if there were no changes during the requested interval. * The `Before` snapshot timestamp value of the oldest change can be outside of the specified time interval.
        $skipToken:
          type: object
          properties: {}
          description: Skip token that encodes the skip information while executing the current request.
    ResourceChangeData:
      type: object
      description: Data on a specific change, represented by a pair of before and after resource snapshots.
      properties:
        resourceId:
          type: string
          description: The resource for a change.
        changeId:
          type: string
          description: The change ID. Valid and unique within the specified resource only. Required.
        beforeSnapshot:
          $ref: "#/components/schemas/ResourceChangeDataBeforeSnapshot"
          description: The snapshot before the change. Required.
        afterSnapshot:
          $ref: "#/components/schemas/ResourceChangeDataAfterSnapshot"
          description: The snapshot after the change. Required.
        changeType:
          $ref: "#/components/schemas/ChangeType"
          description: 'The change type for snapshot. PropertyChanges will be provided in case of Update change type. Known values are: "Create", "Update", and "Delete".'
        propertyChanges:
          type: array
          items:
            $ref: "#/components/schemas/ResourcePropertyChange"
          description: An array of resource property change.
      required:
        - changeId
        - beforeSnapshot
        - afterSnapshot
    ResourceChangeDataBeforeSnapshot:
      type: object
      description: The snapshot before the change.
      properties:
        snapshotId:
          type: string
          description: The ID of the snapshot.
        timestamp:
          type: string
          format: date-time
          description: The time when the snapshot was created. The snapshot timestamp provides an approximation as to when a modification to a resource was detected. There can be a difference between the actual modification time and the detection time. This is due to differences in how operations that modify a resource are processed, versus how operation that record resource snapshots are processed. Required.
        content:
          type: object
          properties: {}
          description: The resource snapshot content (in resourceChangeDetails response only).
      required:
        - timestamp
    ResourceChangeDataAfterSnapshot:
      type: object
      description: The snapshot after the change.
      properties:
        snapshotId:
          type: string
          description: The ID of the snapshot.
        timestamp:
          type: string
          format: date-time
          description: The time when the snapshot was created. The snapshot timestamp provides an approximation as to when a modification to a resource was detected. There can be a difference between the actual modification time and the detection time. This is due to differences in how operations that modify a resource are processed, versus how operation that record resource snapshots are processed. Required.
        content:
          type: object
          properties: {}
          description: The resource snapshot content (in resourceChangeDetails response only).
      required:
        - timestamp
    ChangeType:
      type: string
      enum:
        - Create
        - Update
        - Delete
    ResourcePropertyChange:
      type: object
      description: The resource property change.
      properties:
        propertyName:
          type: string
          description: The property name. Required.
        beforeValue:
          type: string
          description: The property value in before snapshot.
        afterValue:
          type: string
          description: The property value in after snapshot.
        changeCategory:
          $ref: "#/components/schemas/ChangeCategory"
          description: 'The change category. Required. Known values are: "User" and "System".'
        propertyChangeType:
          $ref: "#/components/schemas/PropertyChangeType"
          description: 'The property change Type. Required. Known values are: "Insert", "Update", and "Remove".'
      required:
        - propertyName
        - changeCategory
        - propertyChangeType
    ChangeCategory:
      type: string
      enum:
        - User
        - System
    PropertyChangeType:
      type: string
      enum:
        - Insert
        - Update
        - Remove
    QueryRequestOptions:
      type: object
      description: The options for query evaluation.
      properties:
        $skipToken:
          type: string
          description: Continuation token for pagination, capturing the next page size and offset, as well as the context of the query.
        $top:
          type: integer
          description: The maximum number of rows that the query should return. Overrides the page size when `$skipToken` property is present.
        $skip:
          type: integer
          description: The number of rows to skip from the beginning of the results. Overrides the next page offset when `$skipToken` property is present.
        resultFormat:
          $ref: "#/components/schemas/ResultFormat"
          description: 'Defines in which format query result returned. Known values are: "table" and "objectArray".'
        allowPartialScopes:
          type: boolean
          description: Only applicable for tenant and management group level queries to decide whether to allow partial scopes for result in case the number of subscriptions exceed allowed limits.
        authorizationScopeFilter:
          $ref: "#/components/schemas/AuthorizationScopeFilter"
          description: 'Defines what level of authorization resources should be returned based on the which subscriptions and management groups are passed as scopes. Known values are: "AtScopeAndBelow", "AtScopeAndAbove", "AtScopeExact", and "AtScopeAboveAndBelow".'
    ResultFormat:
      type: string
      enum:
        - table
        - objectArray
    AuthorizationScopeFilter:
      type: string
      enum:
        - AtScopeAndBelow
        - AtScopeAndAbove
        - AtScopeExact
        - AtScopeAboveAndBelow
    FacetRequest:
      type: object
      description: A request to compute additional statistics (facets) over the query results.
      properties:
        expression:
          type: string
          description: The column or list of columns to summarize by. Required.
        options:
          $ref: "#/components/schemas/FacetRequestOptions"
          description: The options for facet evaluation.
      required:
        - expression
    FacetRequestOptions:
      type: object
      description: The options for facet evaluation.
      properties:
        sortBy:
          type: string
          description: The column name or query expression to sort on. Defaults to count if not present.
        sortOrder:
          $ref: "#/components/schemas/FacetSortOrder"
          description: 'The sorting order by the selected column (count by default). Known values are: "asc" and "desc".'
        filter:
          type: string
          description: Specifies the filter condition for the 'where' clause which will be run on main query's result, just before the actual faceting.
        $top:
          type: integer
          description: The maximum number of facet rows that should be returned.
    FacetSortOrder:
      type: string
      enum:
        - asc
        - desc
    QueryResponse:
      type: object
      description: Query result.
      properties:
        totalRecords:
          type: integer
          description: Number of total records matching the query. Required.
        count:
          type: integer
          description: Number of records returned in the current response. In the case of paging, this is the number of records in the current page. Required.
        resultTruncated:
          $ref: "#/components/schemas/ResultTruncated"
          description: 'Indicates whether the query results are truncated. Required. Known values are: "true" and "false".'
        $skipToken:
          type: string
          description: When present, the value can be passed to a subsequent query call (together with the same query and scopes used in the current request) to retrieve the next page of data.
        data:
          type: object
          properties: {}
          description: Query output in JObject array or Table format. Required.
        facets:
          type: array
          items:
            $ref: "#/components/schemas/Facet"
          description: Query facets.
      required:
        - totalRecords
        - count
        - resultTruncated
        - data
    ResultTruncated:
      type: string
      enum:
        - "true"
        - "false"
    Facet:
      type: object
      description: "A facet containing additional statistics on the response of a query. Can be either FacetResult or FacetError. You probably want to use the sub-classes and not this class directly. Known sub-classes are: FacetError, FacetResult"
      properties:
        expression:
          type: string
          description: Facet expression, same as in the corresponding facet request. Required.
        resultType:
          type: string
          description: Result type. Required. Default value is None.
      required:
        - expression
        - resultType
    ResourcesHistoryRequestOptions:
      type: object
      description: The options for history request evaluation.
      properties:
        interval:
          $ref: "#/components/schemas/DateTimeInterval"
          description: The time interval used to fetch history.
        $top:
          type: integer
          description: The maximum number of rows that the query should return. Overrides the page size when `$skipToken` property is present.
        $skip:
          type: integer
          description: The number of rows to skip from the beginning of the results. Overrides the next page offset when `$skipToken` property is present.
        $skipToken:
          type: string
          description: Continuation token for pagination, capturing the next page size and offset, as well as the context of the query.
        resultFormat:
          $ref: "#/components/schemas/ResultFormat"
          description: 'Defines in which format query result returned. Known values are: "table" and "objectArray".'
    DateTimeInterval:
      type: object
      description: An interval in time specifying the date and time for the inclusive start and exclusive end, i.e. `[start, end)`.
      properties:
        start:
          type: string
          format: date-time
          description: A datetime indicating the inclusive/closed start of the time interval, i.e. `[`**`start`**`, end)`. Specifying a `start` that occurs chronologically after `end` will result in an error. Required.
        end:
          type: string
          format: date-time
          description: A datetime indicating the exclusive/open end of the time interval, i.e. `[start, `**`end`**`)`. Specifying an `end` that occurs chronologically before `start` will result in an error. Required.
      required:
        - start
        - end
