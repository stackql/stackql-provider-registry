paths:
  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/Microsoft.ResourceGraph/queries/{resource_name}?api-version=2024-04-01:
    get:
      operationId: GraphQuery_get
      description: Get a single graph query by its resourceName.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: resource_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Graph Query resource. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphQueryResourceFlattened"
    put:
      operationId: GraphQuery_create_or_update
      description: Create a new graph query.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: resource_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Graph Query resource. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  $ref: "#/components/schemas/GraphQueryProperties"
                  description: Metadata describing a graph query for an Azure resource.
                tags:
                  type: object
                  properties: {}
                  description: Resource tags.
                location:
                  type: string
                  description: The location of the resource.
                etag:
                  type: string
                  description: This will be used to handle Optimistic Concurrency. If not present, it will always overwrite the existing resource without checking conflict.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphQueryResource"
    patch:
      operationId: GraphQuery_update
      description: Updates a graph query that has already been added.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
