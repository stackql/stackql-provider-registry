          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        location:
          type: string
          description: The location of the resource.
        etag:
          type: string
          description: This will be used to handle Optimistic Concurrency. If not present, it will always overwrite the existing resource without checking conflict.
        timeModified:
          type: string
          format: date-time
          description: Date and time in UTC of the last modification that was made to this graph query definition.
        description:
          type: string
          description: The description of a graph query.
        query:
          type: string
          description: KQL query that will be graph. Required.
        resultKind:
          $ref: "#/components/schemas/ResultKind"
          description: Enum indicating a type of graph query. "basic"
    PagedGraphQueryResourceFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/GraphQueryResourceFlattened"
        nextLink:
          type: string
    GraphQueryResource:
      type: object
      description: Graph Query entity definition.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/GraphQueryProperties"
          description: Metadata describing a graph query for an Azure resource.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        location:
          type: string
          description: The location of the resource.
        etag:
          type: string
          description: This will be used to handle Optimistic Concurrency. If not present, it will always overwrite the existing resource without checking conflict.
    GraphQueryPropertiesUpdateParameters:
      type: object
      description: Properties that contain a workbook for PATCH operation.
      properties:
        description:
          type: string
          description: The description of a graph query.
        query:
          type: string
          description: KQL query that will be graph.
    OperationDisplay:
      type: object
      description: Display metadata associated with the operation.
      properties:
        provider:
          type: string
          description: "Service provider: Microsoft Resource Graph."
        resource:
          type: string
          description: Resource on which the operation is performed etc.
        operation:
          type: string
          description: "Type of operation: get, read, delete, etc."
        description:
          type: string
          description: Description for the operation.
    Operation:
      type: object
      description: Resource Graph REST API operation definition.
      properties:
        name:
          type: string
          description: "Operation name: {provider}/{resource}/{operation}."
        display:
          $ref: "#/components/schemas/OperationDisplay"
          description: Display metadata associated with the operation.
        origin:
          type: string
          description: The origin of operations.
