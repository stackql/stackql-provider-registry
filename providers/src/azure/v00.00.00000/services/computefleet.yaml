    NetworkInterfaceAuxiliarySku:
      type: string
      enum:
        - None
        - A1
        - A2
        - A4
        - A8
    NetworkApiVersion:
      type: string
      enum:
        - "2020-11-01"
    SecurityProfile:
      type: object
      description: Specifies the Security profile settings for the virtual machine or virtual machine scale set.
      properties:
        uefiSettings:
          $ref: "#/components/schemas/UefiSettings"
          description: "Specifies the security settings like secure boot and vTPM used while creating the virtual machine. Minimum api-version: 2020-12-01."
        encryptionAtHost:
          type: boolean
          description: "This property can be used by user in the request to enable or disable the Host Encryption for the virtual machine or virtual machine scale set. This will enable the encryption for all the disks including Resource/Temp disk at host itself. The default behavior is: The Encryption at host will be disabled unless this property is set to true for the resource."
        securityType:
          $ref: "#/components/schemas/SecurityTypes"
          description: 'Specifies the SecurityType of the virtual machine. It has to be set to any specified value to enable UefiSettings. The default behavior is: UefiSettings will not be enabled unless this property is set. Known values are: "TrustedLaunch" and "ConfidentialVM".'
        encryptionIdentity:
          $ref: "#/components/schemas/EncryptionIdentity"
          description: Specifies the Managed Identity used by ADE to get access token for keyvault operations.
        proxyAgentSettings:
          $ref: "#/components/schemas/ProxyAgentSettings"
          description: "Specifies ProxyAgent settings while creating the virtual machine. Minimum api-version: 2023-09-01."
    UefiSettings:
      type: object
      description: "Specifies the security settings like secure boot and vTPM used while creating the virtual machine. Minimum api-version: 2020-12-01."
      properties:
        secureBootEnabled:
          type: boolean
          description: "Specifies whether secure boot should be enabled on the virtual machine. Minimum api-version: 2020-12-01."
        vTpmEnabled:
          type: boolean
          description: "Specifies whether vTPM should be enabled on the virtual machine. Minimum api-version: 2020-12-01."
    SecurityTypes:
      type: string
      enum:
        - TrustedLaunch
        - ConfidentialVM
    EncryptionIdentity:
      type: object
      description: Specifies the Managed Identity used by ADE to get access token for keyvault operations.
      properties:
        userAssignedIdentityResourceId:
          type: string
          description: Specifies ARM Resource ID of one of the user identities associated with the VM.
    ProxyAgentSettings:
      type: object
      description: "Specifies ProxyAgent settings while creating the virtual machine. Minimum api-version: 2023-09-01."
      properties:
        enabled:
          type: boolean
          description: Specifies whether ProxyAgent feature should be enabled on the virtual machine or virtual machine scale set.
        mode:
          $ref: "#/components/schemas/Mode"
          description: 'Specifies the mode that ProxyAgent will execute on if the feature is enabled. ProxyAgent will start to audit or monitor but not enforce access control over requests to host endpoints in Audit mode, while in Enforce mode it will enforce access control. The default value is Enforce mode. Known values are: "Audit" and "Enforce".'
        keyIncarnationId:
          type: integer
          description: Increase the value of this property allows user to reset the key used for securing communication channel between guest and host.
    Mode:
      type: string
      enum:
        - Audit
        - Enforce
    DiagnosticsProfile:
      type: object
      description: "Specifies the boot diagnostic settings state. Minimum api-version: 2015-06-15."
      properties:
        bootDiagnostics:
          $ref: "#/components/schemas/BootDiagnostics"
          description: "Boot Diagnostics is a debugging feature which allows you to view Console Output and Screenshot to diagnose VM status. **NOTE**: If storageUri is being specified then ensure that the storage account is in the same region and subscription as the VM. You can easily view the output of your console log. Azure also enables you to see a screenshot of the VM from the hypervisor."
    BootDiagnostics:
      type: object
      description: Boot Diagnostics is a debugging feature which allows you to view Console Output and Screenshot to diagnose VM status. You can easily view the output of your console log. Azure also enables you to see a screenshot of the VM from the hypervisor.
      properties:
        enabled:
          type: boolean
          description: Whether boot diagnostics should be enabled on the Virtual Machine.
        storageUri:
          type: string
          description: Uri of the storage account to use for placing the console output and screenshot. If storageUri is not specified while enabling boot diagnostics, managed storage will be used.
    VirtualMachineScaleSetExtensionProfile:
      type: object
      description: Describes a virtual machine scale set extension profile.
      properties:
        extensions:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineScaleSetExtension"
          description: The virtual machine scale set child extension resources.
        extensionsTimeBudget:
          type: string
          description: "Specifies the time alloted for all extensions to start. The time duration should be between 15 minutes and 120 minutes (inclusive) and should be specified in ISO 8601 format. The default value is 90 minutes (PT1H30M). Minimum api-version: 2020-06-01."
    VirtualMachineScaleSetExtension:
      type: object
      description: Describes a Virtual Machine Scale Set Extension.
      properties:
        id:
          type: string
          description: Resource Id.
        name:
          type: string
          description: The name of the extension.
        type:
          type: string
          description: Resource type.
        properties:
          $ref: "#/components/schemas/VirtualMachineScaleSetExtensionProperties"
          description: Describes the properties of a Virtual Machine Scale Set Extension.
    VirtualMachineScaleSetExtensionProperties:
      type: object
      description: Describes the properties of a Virtual Machine Scale Set Extension.
      properties:
        forceUpdateTag:
          type: string
          description: If a value is provided and is different from the previous value, the extension handler will be forced to update even if the extension configuration has not changed.
        publisher:
          type: string
          description: The name of the extension handler publisher.
        type:
          type: string
          description: Specifies the type of the extension; an example is "CustomScriptExtension".
        typeHandlerVersion:
          type: string
          description: Specifies the version of the script handler.
        autoUpgradeMinorVersion:
          type: boolean
          description: Indicates whether the extension should use a newer minor version if one is available at deployment time. Once deployed, however, the extension will not upgrade minor versions unless redeployed, even with this property set to true.
        enableAutomaticUpgrade:
          type: boolean
          description: Indicates whether the extension should be automatically upgraded by the platform if there is a newer version of the extension available.
        settings:
          type: object
          properties: {}
          description: Json formatted public settings for the extension.
        protectedSettings:
          type: object
          properties: {}
          description: The extension can contain either protectedSettings or protectedSettingsFromKeyVault or no protected settings at all.
        provisioningState:
          type: string
          description: The provisioning state, which only appears in the response.
        provisionAfterExtensions:
          type: array
          items:
            type: string
          description: Collection of extension names after which this extension needs to be provisioned.
        suppressFailures:
          type: boolean
          description: Indicates whether failures stemming from the extension will be suppressed (Operational failures such as not connecting to the VM will not be suppressed regardless of this value). The default is false.
        protectedSettingsFromKeyVault:
          $ref: "#/components/schemas/KeyVaultSecretReference"
          description: The extensions protected settings that are passed by reference, and consumed from key vault.
    KeyVaultSecretReference:
      type: object
      description: Describes a reference to Key Vault Secret.
      properties:
        secretUrl:
          type: string
          description: The URL referencing a secret in a Key Vault. Required.
        sourceVault:
          $ref: "#/components/schemas/SubResource"
          description: The relative URL of the Key Vault containing the secret. Required.
      required:
        - secretUrl
        - sourceVault
    ScheduledEventsProfile:
      type: object
      description: Specifies Scheduled Event related configurations.
      properties:
        terminateNotificationProfile:
          $ref: "#/components/schemas/TerminateNotificationProfile"
          description: Specifies Terminate Scheduled Event related configurations.
        osImageNotificationProfile:
          $ref: "#/components/schemas/OSImageNotificationProfile"
          description: Specifies OS Image Scheduled Event related configurations.
    TerminateNotificationProfile:
      type: object
      description: Specifies Terminate Scheduled Event related configurations.
      properties:
        notBeforeTimeout:
          type: string
          description: Configurable length of time a Virtual Machine being deleted will have to potentially approve the Terminate Scheduled Event before the event is auto approved (timed out). The configuration must be specified in ISO 8601 format, the default value is 5 minutes (PT5M).
        enable:
          type: boolean
          description: Specifies whether the Terminate Scheduled event is enabled or disabled.
    OSImageNotificationProfile:
      type: object
      description: Specifies OS Image Scheduled Event related configurations.
      properties:
        notBeforeTimeout:
          type: string
          description: Length of time a Virtual Machine being reimaged or having its OS upgraded will have to potentially approve the OS Image Scheduled Event before the event is auto approved (timed out). The configuration is specified in ISO 8601 format, and the value must not exceed 15 minutes (PT15M).
        enable:
          type: boolean
          description: Specifies whether the OS Image Scheduled event is enabled or disabled.
    CapacityReservationProfile:
      type: object
      description: The parameters of a capacity reservation Profile.
      properties:
        capacityReservationGroup:
          $ref: "#/components/schemas/SubResource"
          description: Specifies the capacity reservation group resource id that should be used for allocating the virtual machine or scaleset vm instances provided enough capacity has been reserved. Please refer to `https://aka.ms/CapacityReservation `_ for more details.
    ApplicationProfile:
      type: object
      description: Contains the list of gallery applications that should be made available to the VM/VMSS.
      properties:
        galleryApplications:
          type: array
          items:
            $ref: "#/components/schemas/VMGalleryApplication"
          description: Specifies the gallery applications that should be made available to the VM/VMSS.
    VMGalleryApplication:
      type: object
      description: Specifies the required information to reference a compute gallery application version.
      properties:
        tags:
          type: string
          description: Optional, Specifies a passthrough value for more generic context.
        order:
          type: integer
          description: Optional, Specifies the order in which the packages have to be installed.
        packageReferenceId:
          type: string
          description: Specifies the GalleryApplicationVersion resource id on the form of /subscriptions/{SubscriptionId}/resourceGroups/{ResourceGroupName}/providers/Microsoft.Compute/galleries/{galleryName}/applications/{application}/versions/{version}. Required.
        configurationReference:
          type: string
          description: Optional, Specifies the uri to an azure blob that will replace the default configuration for the package if provided.
        treatFailureAsDeploymentFailure:
          type: boolean
          description: Optional, If true, any failure for any operation in the VmApplication will fail the deployment.
        enableAutomaticUpgrade:
          type: boolean
          description: If set to true, when a new Gallery Application version is available in PIR/SIG, it will be automatically updated for the VM/VMSS.
      required:
        - packageReferenceId
    VirtualMachineScaleSetHardwareProfile:
      type: object
      description: Specifies the hardware settings for the virtual machine scale set.
      properties:
        vmSizeProperties:
          $ref: "#/components/schemas/VMSizeProperties"
          description: "Specifies the properties for customizing the size of the virtual machine. Minimum api-version: 2021-11-01. Please follow the instructions in `VM Customization `_ for more details."
    VMSizeProperties:
      type: object
      description: Specifies VM Size Property settings on the virtual machine.
      properties:
        vCPUsAvailable:
          type: integer
          description: Specifies the number of vCPUs available for the VM. When this property is not specified in the request body the default behavior is to set it to the value of vCPUs available for that VM size exposed in api response of `List all available virtual machine sizes in a region `_.
        vCPUsPerCore:
          type: integer
          description: Specifies the vCPU to physical core ratio. When this property is not specified in the request body the default behavior is set to the value of vCPUsPerCore for the VM Size exposed in api response of `List all available virtual machine sizes in a region `_. **Setting this property to 1 also means that hyper-threading is disabled.**.
    ServiceArtifactReference:
      type: object
      description: "Specifies the service artifact reference id used to set same image version for all virtual machines in the scale set when using 'latest' image version. Minimum api-version: 2022-11-01."
      properties:
        id:
          type: string
          description: The service artifact reference id in the form of /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Compute/galleries/{galleryName}/serviceArtifacts/{serviceArtifactName}/vmArtifactsProfiles/{vmArtifactsProfilesName}.
    SecurityPostureReference:
      type: object
      description: "Specifies the security posture to be used for all virtual machines in the scale set. Minimum api-version: 2023-03-01."
      properties:
        id:
          type: string
          description: The security posture reference id in the form of /CommunityGalleries/{communityGalleryName}/securityPostures/{securityPostureName}/versions/{major.minor.patch}|{major.*}|latest.
        excludeExtensions:
          type: array
          items:
            type: string
          description: List of virtual machine extension names to exclude when applying the security posture.
        isOverridable:
          type: boolean
          description: Whether the security posture can be overridden by the user.
    ComputeProfile:
      type: object
      description: Compute Profile to use for running user's workloads.
      properties:
        baseVirtualMachineProfile:
          $ref: "#/components/schemas/BaseVirtualMachineProfile"
          description: Base Virtual Machine Profile Properties to be specified according to "specification/compute/resource-manager/Microsoft.Compute/ComputeRP/stable/{computeApiVersion}/virtualMachineScaleSet.json#/definitions/VirtualMachineScaleSetVMProfile". Required.
        computeApiVersion:
          type: string
          description: Specifies the Microsoft.Compute API version to use when creating underlying Virtual Machine scale sets and Virtual Machines. The default value will be the latest supported computeApiVersion by Compute Fleet.
        platformFaultDomainCount:
          type: integer
          description: Specifies the number of fault domains to use when creating the underlying VMSS. A fault domain is a logical group of hardware within an Azure datacenter. VMs in the same fault domain share a common power source and network switch. If not specified, defaults to 1, which represents "Max Spreading" (using as many fault domains as possible). This property cannot be updated.
        additionalVirtualMachineCapabilities:
          $ref: "#/components/schemas/AdditionalCapabilities"
          description: "Specifies VMSS and VM API entity models support two additional capabilities as of today: ultraSSDEnabled and hibernationEnabled. ultraSSDEnabled: Enables UltraSSD_LRS storage account type on the VMSS VMs. hibernationEnabled: Enables the hibernation capability on the VMSS VMs. Default value is null if not specified. This property cannot be updated once set."
      required:
        - baseVirtualMachineProfile
    AdditionalCapabilities:
      type: object
      description: AdditionalCapabilities for VM.
      properties:
        ultraSSDEnabled:
          type: boolean
          description: The flag that enables or disables a capability to have one or more managed data disks with UltraSSD_LRS storage account type on the VM or VMSS. Managed disks with storage account type UltraSSD_LRS can be added to a virtual machine or virtual machine scale set only if this property is enabled.
        hibernationEnabled:
          type: boolean
          description: The flag that enables or disables hibernation capability on the VM.
    FleetMode:
      type: string
      enum:
        - Managed
        - Launch
    CapacityType:
      type: string
      enum:
        - VM
        - VCpu
    ZoneAllocationPolicy:
      type: object
      description: ZoneAllocationPolicy for Compute Fleet.
      properties:
        distributionStrategy:
          $ref: "#/components/schemas/ZoneDistributionStrategy"
          description: 'Distribution strategy used for zone allocation policy. Required. Known values are: "BestEffortSingleZone" and "Prioritized".'
        zonePreferences:
          type: array
          items:
            $ref: "#/components/schemas/ZonePreference"
          description: Zone preferences, required when zone distribution strategy is Prioritized.
      required:
        - distributionStrategy
    ZoneDistributionStrategy:
      type: string
      enum:
        - BestEffortSingleZone
        - Prioritized
    ZonePreference:
      type: object
      description: Zone preferences for Compute Fleet zone allocation policy.
      properties:
        zone:
          type: string
          description: Name of the zone. Required.
        rank:
          type: integer
          description: The rank of the zone. This is used with 'Prioritized' ZoneDistributionStrategy. The lower the number, the higher the priority, starting with 0. 0 is the highest rank. If not specified, defaults to lowest rank.
      required:
        - zone
    ManagedServiceIdentity:
