        networkSecurityGroup:
          $ref: "#/components/schemas/SubResource"
          description: The network security group.
        dnsSettings:
          $ref: "#/components/schemas/VirtualMachineScaleSetNetworkConfigurationDnsSettings"
          description: The dns settings to be applied on the network interfaces.
        ipConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineScaleSetIPConfiguration"
          description: Specifies the IP configurations of the network interface. Required.
        enableIPForwarding:
          type: boolean
          description: Whether IP forwarding enabled on this NIC.
        deleteOption:
          $ref: "#/components/schemas/DeleteOptions"
          description: 'Specify what happens to the network interface when the VM is deleted. Known values are: "Delete" and "Detach".'
        auxiliaryMode:
          $ref: "#/components/schemas/NetworkInterfaceAuxiliaryMode"
          description: 'Specifies whether the Auxiliary mode is enabled for the Network Interface resource. Known values are: "None", "AcceleratedConnections", and "Floating".'
        auxiliarySku:
          $ref: "#/components/schemas/NetworkInterfaceAuxiliarySku"
          description: 'Specifies whether the Auxiliary sku is enabled for the Network Interface resource. Known values are: "None", "A1", "A2", "A4", and "A8".'
