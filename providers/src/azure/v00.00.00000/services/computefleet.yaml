          description: specifies the Microsoft.Network API version used when creating networking resources in the Network Interface Configurations for Virtual Machine Scale Set with orchestration mode 'Flexible'. "2020-11-01"
    ApiEntityReference:
      type: object
      description: The API entity reference.
      properties:
        id:
          type: string
          description: The ARM resource id in the form of /subscriptions/{SubscriptionId}/resourceGroups/{ResourceGroupName}/...
    VirtualMachineScaleSetNetworkConfiguration:
      type: object
      description: Describes a virtual machine scale set network profile's network configurations.
      properties:
        name:
          type: string
          description: The network configuration name. Required.
        properties:
          $ref: "#/components/schemas/VirtualMachineScaleSetNetworkConfigurationProperties"
