openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Compute Fleet Mgmt Client
  description: ComputeFleetMgmtClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-04-01-preview-stackql-generated
  x-serviceAlias: computefleet
  x-sdkPackage: azure-mgmt-computefleet
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    FleetProperties:
      type: object
      description: Details of the Compute Fleet.
      properties:
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'The status of the last operation. Known values are: "Succeeded", "Failed", "Canceled", "Creating", "Updating", "Deleting", and "Migrating".'
        spotPriorityProfile:
          $ref: "#/components/schemas/SpotPriorityProfile"
          description: Configuration Options for Spot instances in Compute Fleet.
        regularPriorityProfile:
          $ref: "#/components/schemas/RegularPriorityProfile"
          description: Configuration Options for Regular instances in Compute Fleet.
        vmSizesProfile:
          type: array
          items:
            $ref: "#/components/schemas/VmSizeProfile"
          description: List of VM sizes supported for Compute Fleet. Required.
        vmAttributes:
          $ref: "#/components/schemas/VMAttributes"
          description: Attribute based Fleet.
        additionalLocationsProfile:
          $ref: "#/components/schemas/AdditionalLocationsProfile"
          description: Represents the configuration for additional locations where Fleet resources may be deployed.
        computeProfile:
          $ref: "#/components/schemas/ComputeProfile"
          description: Compute Profile to use for running user's workloads. Required.
        timeCreated:
          type: string
          format: date-time
          description: Specifies the time at which the Compute Fleet is created.
        uniqueId:
          type: string
          description: Specifies the ID which uniquely identifies a Compute Fleet.
        mode:
          $ref: "#/components/schemas/FleetMode"
          description: 'Mode of the Fleet. Known values are: "Managed" and "Launch".'
        vmNamePrefix:
          type: string
          description: VirtualMachine prefix to be used for the virtual machines launched by Fleet. Can be used only with Launch mode.
        capacityType:
          $ref: "#/components/schemas/CapacityType"
          description: 'Specifies capacity type for Fleet Regular and Spot priority profiles. capacityType is an immutable property. Once set during Fleet creation, it cannot be updated. Specifying different capacity type for Fleet Regular and Spot priority profiles is not allowed. Known values are: "VM" and "VCpu".'
        zoneAllocationPolicy:
          $ref: "#/components/schemas/ZoneAllocationPolicy"
          description: Zone Allocation Policy for Fleet.
      required:
        - vmSizesProfile
        - computeProfile
    ProvisioningState:
      type: string
      enum:
        - Succeeded
        - Failed
        - Canceled
        - Creating
        - Updating
        - Deleting
        - Migrating
    SpotPriorityProfile:
      type: object
      description: Configuration Options for Spot instances in Compute Fleet.
      properties:
        capacity:
          type: integer
          description: Total capacity to achieve. It is currently in terms of number of VMs.
        minCapacity:
          type: integer
          description: Minimum capacity to achieve which cannot be updated. If we will not be able to "guarantee" minimum capacity, we will reject the request in the sync path itself.
        maxPricePerVM:
          type: number
          description: Price per hour of each Spot VM will never exceed this.
        evictionPolicy:
          $ref: "#/components/schemas/EvictionPolicy"
          description: 'Eviction Policy to follow when evicting Spot VMs. Known values are: "Delete" and "Deallocate".'
        allocationStrategy:
          $ref: "#/components/schemas/SpotAllocationStrategy"
          description: 'Allocation strategy to follow when determining the VM sizes distribution for Spot VMs. Known values are: "PriceCapacityOptimized", "LowestPrice", and "CapacityOptimized".'
        maintain:
          type: boolean
          description: Flag to enable/disable continuous goal seeking for the desired capacity and restoration of evicted Spot VMs. If maintain is enabled, AzureFleetRP will use all VM sizes in vmSizesProfile to create new VMs (if VMs are evicted deleted) or update existing VMs with new VM sizes (if VMs are evicted deallocated or failed to allocate due to capacity constraint) in order to achieve the desired capacity. Maintain is enabled by default.
    EvictionPolicy:
      type: string
      enum:
        - Delete
        - Deallocate
    SpotAllocationStrategy:
      type: string
      enum:
        - PriceCapacityOptimized
        - LowestPrice
        - CapacityOptimized
    RegularPriorityProfile:
      type: object
      description: Configuration Options for Regular instances in Compute Fleet.
      properties:
        capacity:
          type: integer
          description: Total capacity to achieve. It is currently in terms of number of VMs.
        minCapacity:
          type: integer
          description: Minimum capacity to achieve which cannot be updated. If we will not be able to "guarantee" minimum capacity, we will reject the request in the sync path itself.
        allocationStrategy:
          $ref: "#/components/schemas/RegularPriorityAllocationStrategy"
          description: 'Allocation strategy to follow when determining the VM sizes distribution for Regular VMs. Known values are: "LowestPrice" and "Prioritized".'
    RegularPriorityAllocationStrategy:
      type: string
      enum:
        - LowestPrice
        - Prioritized
    VmSizeProfile:
      type: object
      description: Specifications about a VM Size. This will also contain the corresponding rank and weight in future.
      properties:
        name:
          type: string
          description: The Sku name (e.g. 'Standard_DS1_v2'). Required.
        rank:
          type: integer
          description: The rank of the VM size. This is used with 'RegularPriorityAllocationStrategy.Prioritized' The lower the number, the higher the priority. Starting with 0.
      required:
        - name
    VMAttributes:
      type: object
      description: VMAttributes that will be used to filter VMSizes which will be used to build Fleet.
      properties:
        vCpuCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of vCpuCount specified from Min to Max. Must be specified if VMAttributes are specified, either Min or Max is required if specified. Required.
        memoryInGiB:
          $ref: "#/components/schemas/VMAttributeMinMaxDouble"
          description: The range of memory specified from Min to Max. Must be specified if VMAttributes are specified, either Min or Max is required if specified. Required.
        memoryInGiBPerVCpu:
          $ref: "#/components/schemas/VMAttributeMinMaxDouble"
          description: The range of memory in GiB per vCPU specified from min to max. Optional parameter. Either Min or Max is required if specified.
        localStorageSupport:
          $ref: "#/components/schemas/VMAttributeSupport"
          description: 'Specifies whether the VMSize supporting local storage should be used to build Fleet or not. Included - Default if not specified as most Azure VMs support local storage. Known values are: "Excluded", "Included", and "Required".'
        localStorageInGiB:
          $ref: "#/components/schemas/VMAttributeMinMaxDouble"
          description: LocalStorageSupport should be set to "Included" or "Required" to use this VMAttribute. If localStorageSupport is "Excluded", this VMAttribute can not be used.
        localStorageDiskTypes:
          type: array
          items:
            $ref: "#/components/schemas/LocalStorageDiskType"
          description: The local storage disk types specified as a list. LocalStorageSupport should be set to "Included" or "Required" to use this VMAttribute. If localStorageSupport is "Excluded", this VMAttribute can not be used.
        dataDiskCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of data disk count specified from Min to Max. Optional parameter. Either Min or Max is required if specified.
        networkInterfaceCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of network interface count specified from Min to Max. Optional parameter. Either Min or Max is required if specified.
        networkBandwidthInMbps:
          $ref: "#/components/schemas/VMAttributeMinMaxDouble"
          description: The range of network bandwidth in Mbps specified from Min to Max. Optional parameter. Either Min or Max is required if specified.
        rdmaSupport:
          $ref: "#/components/schemas/VMAttributeSupport"
          description: 'Specifies whether the VMSize supporting RDMA (Remote Direct Memory Access) should be used to build Fleet or not. Known values are: "Excluded", "Included", and "Required".'
        rdmaNetworkInterfaceCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of RDMA (Remote Direct Memory Access) network interface count specified from Min to Max. Optional parameter. Either Min or Max is required if specified. rdmaSupport should be set to "Included" or "Required" to use this VMAttribute. If rdmaSupport is "Excluded", this VMAttribute can not be used.
        acceleratorSupport:
          $ref: "#/components/schemas/VMAttributeSupport"
          description: 'Specifies whether the VMSize supporting accelerator should be used to build Fleet or not. acceleratorSupport should be set to "Included" or "Required" to use this VMAttribute. If acceleratorSupport is "Excluded", this VMAttribute can not be used. Known values are: "Excluded", "Included", and "Required".'
        acceleratorManufacturers:
          type: array
          items:
            $ref: "#/components/schemas/AcceleratorManufacturer"
          description: The accelerator manufacturers specified as a list. acceleratorSupport should be set to "Included" or "Required" to use this VMAttribute. If acceleratorSupport is "Excluded", this VMAttribute can not be used.
        acceleratorTypes:
          type: array
          items:
            $ref: "#/components/schemas/AcceleratorType"
          description: The accelerator types specified as a list. acceleratorSupport should be set to "Included" or "Required" to use this VMAttribute. If acceleratorSupport is "Excluded", this VMAttribute can not be used.
        acceleratorCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of accelerator count specified from min to max. Optional parameter. Either Min or Max is required if specified. acceleratorSupport should be set to "Included" or "Required" to use this VMAttribute. If acceleratorSupport is "Excluded", this VMAttribute can not be used.
        vmCategories:
          type: array
          items:
            $ref: "#/components/schemas/VMCategory"
          description: The VM category specified as a list. Optional parameter.
        architectureTypes:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureType"
          description: The VM architecture types specified as a list. Optional parameter.
        cpuManufacturers:
          type: array
          items:
            $ref: "#/components/schemas/CpuManufacturer"
          description: The VM CPU manufacturers specified as a list. Optional parameter.
        burstableSupport:
          $ref: "#/components/schemas/VMAttributeSupport"
          description: 'Specifies whether the VMSize supporting burstable capability should be used to build Fleet or not. Known values are: "Excluded", "Included", and "Required".'
        excludedVMSizes:
          type: array
          items:
            type: string
          description: Specifies which VMSizes should be excluded while building Fleet. Optional parameter.
      required:
        - vCpuCount
        - memoryInGiB
    VMAttributeMinMaxInteger:
      type: object
      description: While retrieving VMSizes from CRS, Min = 0 (uint.MinValue) if not specified, Max = 4294967295 (uint.MaxValue) if not specified. This allows to filter VMAttributes on all available VMSizes.
      properties:
        min:
          type: integer
          description: Min VMSize from CRS, Min = 0 (uint.MinValue) if not specified.
        max:
          type: integer
          description: Max VMSize from CRS, Max = 4294967295 (uint.MaxValue) if not specified.
    VMAttributeMinMaxDouble:
      type: object
      description: VMAttributes using double values.
      properties:
        min:
          type: number
          description: Minimum value. default 0. Double.MinValue().
        max:
          type: number
          description: Maximum value. Double.MaxValue(1.7976931348623157E+308).
    VMAttributeSupport:
      type: string
      enum:
        - Excluded
        - Included
        - Required
    LocalStorageDiskType:
      type: string
      enum:
        - HDD
        - SSD
    AcceleratorManufacturer:
      type: string
      enum:
        - AMD
        - Nvidia
        - Xilinx
    AcceleratorType:
      type: string
      enum:
        - GPU
        - FPGA
    VMCategory:
      type: string
      enum:
        - GeneralPurpose
        - ComputeOptimized
        - MemoryOptimized
        - StorageOptimized
        - GpuAccelerated
        - FpgaAccelerated
        - HighPerformanceCompute
    ArchitectureType:
      type: string
      enum:
        - ARM64
        - X64
    CpuManufacturer:
      type: string
      enum:
        - Intel
        - AMD
        - Microsoft
        - Ampere
    AdditionalLocationsProfile:
      type: object
      description: Represents the configuration for additional locations where Fleet resources may be deployed.
      properties:
        locationProfiles:
          type: array
          items:
            $ref: "#/components/schemas/LocationProfile"
          description: The list of location profiles. Required.
      required:
        - locationProfiles
    LocationProfile:
      type: object
      description: Represents the profile for a single additional location in the Fleet. The location and the virtualMachineProfileOverride (optional).
      properties:
        location:
          type: string
          description: The ARM location name of the additional region. If LocationProfile is specified, then location is required. Required.
        virtualMachineProfileOverride:
          $ref: "#/components/schemas/BaseVirtualMachineProfile"
          description: An override for computeProfile.baseVirtualMachineProfile specific to this region. This override is merged with the base virtual machine profile to define the final virtual machine profile for the resources deployed in this location.
      required:
        - location
    BaseVirtualMachineProfile:
      type: object
      description: Describes the base virtual machine profile for fleet.
      properties:
        osProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetOSProfile"
          description: Specifies the operating system settings for the virtual machines in the scale set.
        storageProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetStorageProfile"
          description: Specifies the storage settings for the virtual machine disks.
        networkProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetNetworkProfile"
          description: Specifies properties of the network interfaces of the virtual machines in the scale set.
        securityProfile:
          $ref: "#/components/schemas/SecurityProfile"
          description: Specifies the Security related profile settings for the virtual machines in the scale set.
        diagnosticsProfile:
          $ref: "#/components/schemas/DiagnosticsProfile"
          description: Specifies the boot diagnostic settings state.
        extensionProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetExtensionProfile"
          description: Specifies a collection of settings for extensions installed on virtual machines in the scale set.
        licenseType:
          type: string
          description: "Specifies that the image or disk that is being used was licensed on-premises. Possible values for Windows Server operating system are: Windows_Client Windows_Server Possible values for Linux Server operating system are: RHEL_BYOS (for RHEL) SLES_BYOS (for SUSE) For more information, see `Azure Hybrid Use Benefit for Windows Server `_ `Azure Hybrid Use Benefit for Linux Server `_ Minimum api-version: 2015-06-15."
        scheduledEventsProfile:
          $ref: "#/components/schemas/ScheduledEventsProfile"
          description: Specifies Scheduled Event related configurations.
        userData:
          type: string
          description: "UserData for the virtual machines in the scale set, which must be base-64 encoded. Customer should not pass any secrets in here. Minimum api-version: 2021-03-01."
        capacityReservation:
          $ref: "#/components/schemas/CapacityReservationProfile"
          description: "Specifies the capacity reservation related details of a scale set. Minimum api-version: 2021-04-01."
        applicationProfile:
          $ref: "#/components/schemas/ApplicationProfile"
          description: Specifies the gallery applications that should be made available to the VM/VMSS.
        hardwareProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetHardwareProfile"
          description: "Specifies the hardware profile related details of a scale set. Minimum api-version: 2021-11-01."
        serviceArtifactReference:
          $ref: "#/components/schemas/ServiceArtifactReference"
          description: "Specifies the service artifact reference id used to set same image version for all virtual machines in the scale set when using 'latest' image version. Minimum api-version: 2022-11-01."
        securityPostureReference:
          $ref: "#/components/schemas/SecurityPostureReference"
          description: "Specifies the security posture to be used for all virtual machines in the scale set. Minimum api-version: 2023-03-01."
        timeCreated:
          type: string
          format: date-time
          description: 'Specifies the time in which this VM profile for the Virtual Machine Scale Set was created. Minimum API version for this property is 2023-09-01. This value will be added to VMSS Flex VM tags when creating/updating the VMSS VM Profile with minimum api-version 2023-09-01. Examples: "2024-07-01T00:00:01.1234567+00:00".'
    VirtualMachineScaleSetOSProfile:
      type: object
      description: Describes a virtual machine scale set OS profile.
      properties:
        computerNamePrefix:
          type: string
          description: Specifies the computer name prefix for all of the virtual machines in the scale set. Computer name prefixes must be 1 to 15 characters long.
        adminUsername:
          type: string
          description: Specifies the name of the administrator account. **Windows-only restriction:** Cannot end in "." **Disallowed values:** "administrator", "admin", "user", "user1", "test", "user2", "test1", "user3", "admin1", "1", "123", "a", "actuser", "adm", "admin2", "aspnet", "backup", "console", "david", "guest", "john", "owner", "root", "server", "sql", "support", "support_388945a0", "sys", "test2", "test3", "user4", "user5". **Minimum-length (Linux):** 1 character **Max-length (Linux):** 64 characters **Max-length (Windows):** 20 characters.
        adminPassword:
          type: string
          description: Specifies the password of the administrator account. **Minimum-length (Windows):** 8 characters **Minimum-length (Linux):** 6 characters **Max-length (Windows):** 123 characters **Max-length (Linux):** 72 characters **Complexity requirements:** 3 out of 4 conditions below need to be fulfilled Has lower characters Has upper characters Has a digit Has a special character (Regex match [\W_]) **Disallowed values:** "abc@123", "P@$$w0rd", "P@ssw0rd", "P@ssword123", "Pa$$word", "pass@word1", "Password!", "Password1", "Password22", "iloveyou!" For resetting the password, see `How to reset the Remote Desktop service or its login password in a Windows VM `_ For resetting root password, see `Manage users, SSH, and check or repair disks on Azure Linux VMs using the VMAccess Extension `_.
        customData:
          type: string
          description: Specifies a base-64 encoded string of custom data. The base-64 encoded string is decoded to a binary array that is saved as a file on the Virtual Machine. The maximum length of the binary array is 65535 bytes. For using cloud-init for your VM, see `Using cloud-init to customize a Linux VM during creation `_.
        windowsConfiguration:
          $ref: "#/components/schemas/WindowsConfiguration"
          description: Specifies Windows operating system settings on the virtual machine.
        linuxConfiguration:
          $ref: "#/components/schemas/LinuxConfiguration"
          description: Specifies the Linux operating system settings on the virtual machine. For a list of supported Linux distributions, see `Linux on Azure-Endorsed Distributions `_.
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/VaultSecretGroup"
          description: Specifies set of certificates that should be installed onto the virtual machines in the scale set. To install certificates on a virtual machine it is recommended to use the `Azure Key Vault virtual machine extension for Linux `_ or the `Azure Key Vault virtual machine extension for Windows `_.
        allowExtensionOperations:
          type: boolean
          description: Specifies whether extension operations should be allowed on the virtual machine scale set. This may only be set to False when no extensions are present on the virtual machine scale set.
        requireGuestProvisionSignal:
          type: boolean
          description: Optional property which must either be set to True or omitted.
    WindowsConfiguration:
      type: object
      description: Specifies Windows operating system settings on the virtual machine.
      properties:
        provisionVMAgent:
          type: boolean
          description: Indicates whether virtual machine agent should be provisioned on the virtual machine. When this property is not specified in the request body, it is set to true by default. This will ensure that VM Agent is installed on the VM so that extensions can be added to the VM later.
        enableAutomaticUpdates:
          type: boolean
          description: Indicates whether Automatic Updates is enabled for the Windows virtual machine. Default value is true. For virtual machine scale sets, this property can be updated and updates will take effect on OS reprovisioning.
        timeZone:
          type: string
          description: Specifies the time zone of the virtual machine. e.g. "Pacific Standard Time". Possible values can be `TimeZoneInfo.Id `_ value from time zones returned by `TimeZoneInfo.GetSystemTimeZones `_.
        additionalUnattendContent:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalUnattendContent"
          description: Specifies additional base-64 encoded XML formatted information that can be included in the Unattend.xml file, which is used by Windows Setup.
        patchSettings:
          $ref: "#/components/schemas/PatchSettings"
          description: "[Preview Feature] Specifies settings related to VM Guest Patching on Windows."
        winRM:
          $ref: "#/components/schemas/WinRMConfiguration"
          description: Specifies the Windows Remote Management listeners. This enables remote Windows PowerShell.
        enableVMAgentPlatformUpdates:
          type: boolean
          description: Indicates whether VMAgent Platform Updates is enabled for the Windows virtual machine. Default value is false.
    AdditionalUnattendContent:
      type: object
      description: Specifies additional XML formatted information that can be included in the Unattend.xml file, which is used by Windows Setup. Contents are defined by setting name, component name, and the pass in which the content is applied.
      properties:
        passName:
          type: string
          description: The pass name. Currently, the only allowable value is OobeSystem. Default value is "OobeSystem".
        componentName:
          type: string
          description: The component name. Currently, the only allowable value is Microsoft-Windows-Shell-Setup. Default value is "Microsoft-Windows-Shell-Setup".
        settingName:
          $ref: "#/components/schemas/SettingNames"
          description: 'Specifies the name of the setting to which the content applies. Possible values are: FirstLogonCommands and AutoLogon. Known values are: "AutoLogon" and "FirstLogonCommands".'
        content:
          type: string
          description: Specifies the XML formatted content that is added to the unattend.xml file for the specified path and component. The XML must be less than 4KB and must include the root element for the setting or feature that is being inserted.
    SettingNames:
      type: string
      enum:
        - AutoLogon
        - FirstLogonCommands
    PatchSettings:
      type: object
      description: Specifies settings related to VM Guest Patching on Windows.
      properties:
        patchMode:
          $ref: "#/components/schemas/WindowsVMGuestPatchMode"
          description: 'Specifies the mode of VM Guest Patching to IaaS virtual machine or virtual machines associated to virtual machine scale set with OrchestrationMode as Flexible. Possible values are: **Manual** - You control the application of patches to a virtual machine. You do this by applying patches manually inside the VM. In this mode, automatic updates are disabled; the property WindowsConfiguration.enableAutomaticUpdates must be false **AutomaticByOS** - The virtual machine will automatically be updated by the OS. The property WindowsConfiguration.enableAutomaticUpdates must be true. **AutomaticByPlatform** - the virtual machine will automatically updated by the platform. The properties provisionVMAgent and WindowsConfiguration.enableAutomaticUpdates must be true. Known values are: "Manual", "AutomaticByOS", and "AutomaticByPlatform".'
        enableHotpatching:
          type: boolean
          description: Enables customers to patch their Azure VMs without requiring a reboot. For enableHotpatching, the 'provisionVMAgent' must be set to true and 'patchMode' must be set to 'AutomaticByPlatform'.
        assessmentMode:
          $ref: "#/components/schemas/WindowsPatchAssessmentMode"
          description: 'Specifies the mode of VM Guest patch assessment for the IaaS virtual machine. Possible values are: **ImageDefault** - You control the timing of patch assessments on a virtual machine. **AutomaticByPlatform** - The platform will trigger periodic patch assessments. The property provisionVMAgent must be true. Known values are: "ImageDefault" and "AutomaticByPlatform".'
        automaticByPlatformSettings:
          $ref: "#/components/schemas/WindowsVMGuestPatchAutomaticByPlatformSettings"
          description: Specifies additional settings for patch mode AutomaticByPlatform in VM Guest Patching on Windows.
    WindowsVMGuestPatchMode:
      type: string
      enum:
        - Manual
        - AutomaticByOS
        - AutomaticByPlatform
    WindowsPatchAssessmentMode:
      type: string
      enum:
        - ImageDefault
        - AutomaticByPlatform
    WindowsVMGuestPatchAutomaticByPlatformSettings:
      type: object
      description: Specifies additional settings to be applied when patch mode AutomaticByPlatform is selected in Windows patch settings.
      properties:
        rebootSetting:
          $ref: "#/components/schemas/WindowsVMGuestPatchAutomaticByPlatformRebootSetting"
          description: 'Specifies the reboot setting for all AutomaticByPlatform patch installation operations. Known values are: "Unknown", "IfRequired", "Never", and "Always".'
        bypassPlatformSafetyChecksOnUserSchedule:
          type: boolean
          description: Enables customer to schedule patching without accidental upgrades.
    WindowsVMGuestPatchAutomaticByPlatformRebootSetting:
      type: string
      enum:
        - Unknown
        - IfRequired
        - Never
        - Always
    WinRMConfiguration:
      type: object
      description: Describes Windows Remote Management configuration of the VM.
      properties:
        listeners:
          type: array
          items:
            $ref: "#/components/schemas/WinRMListener"
          description: The list of Windows Remote Management listeners.
    WinRMListener:
      type: object
      description: Describes Protocol and thumbprint of Windows Remote Management listener.
      properties:
        protocol:
          $ref: "#/components/schemas/ProtocolTypes"
          description: 'Specifies the protocol of WinRM listener. Possible values are: **http,** **https.**. Known values are: "Http" and "Https".'
        certificateUrl:
          type: string
          description: 'This is the URL of a certificate that has been uploaded to Key Vault as a secret. For adding a secret to the Key Vault, see `Add a key or secret to the key vault `_. In this case, your certificate needs to be the Base64 encoding of the following JSON Object which is encoded in UTF-8: { "data":"", "dataType":"pfx", "password":""} To install certificates on a virtual machine it is recommended to use the `Azure Key Vault virtual machine extension for Linux `_ or the `Azure Key Vault virtual machine extension for Windows `_.'
    ProtocolTypes:
      type: string
      enum:
        - Http
        - Https
    LinuxConfiguration:
      type: object
      description: Specifies the Linux operating system settings on the virtual machine. For a list of supported Linux distributions, see `Linux on Azure-Endorsed Distributions `_.
      properties:
        disablePasswordAuthentication:
          type: boolean
          description: Specifies whether password authentication should be disabled.
        ssh:
          $ref: "#/components/schemas/SshConfiguration"
          description: Specifies the ssh key configuration for a Linux OS.
        provisionVMAgent:
          type: boolean
          description: Indicates whether virtual machine agent should be provisioned on the virtual machine. When this property is not specified in the request body, default behavior is to set it to true. This will ensure that VM Agent is installed on the VM so that extensions can be added to the VM later.
        patchSettings:
          $ref: "#/components/schemas/LinuxPatchSettings"
          description: "[Preview Feature] Specifies settings related to VM Guest Patching on Linux."
        enableVMAgentPlatformUpdates:
          type: boolean
          description: Indicates whether VMAgent Platform Updates is enabled for the Linux virtual machine. Default value is false.
    SshConfiguration:
      type: object
      description: SSH configuration for Linux based VMs running on Azure.
      properties:
        publicKeys:
          type: array
          items:
            $ref: "#/components/schemas/SshPublicKey"
          description: The list of SSH public keys used to authenticate with linux based VMs.
    SshPublicKey:
      type: object
      description: Contains information about SSH certificate public key and the path on the Linux VM where the public key is placed.
      properties:
        path:
          type: string
          description: "Specifies the full path on the created VM where ssh public key is stored. If the file already exists, the specified key is appended to the file. Example: /home/user/.ssh/authorized_keys."
        keyData:
          type: string
          description: SSH public key certificate used to authenticate with the VM through ssh. The key needs to be at least 2048-bit and in ssh-rsa format. For creating ssh keys, see [Create SSH keys on Linux and Mac for Linux VMs in Azure]`https://learn.microsoft.com/azure/virtual-machines/linux/create-ssh-keys-detailed `_).
    LinuxPatchSettings:
      type: object
      description: Specifies settings related to VM Guest Patching on Linux.
      properties:
        patchMode:
          $ref: "#/components/schemas/LinuxVMGuestPatchMode"
          description: "Specifies the mode of VM Guest Patching to IaaS virtual machine or virtual machines associated to virtual machine scale set with OrchestrationMode as Flexible. Possible values are: **ImageDefault** - The virtual machine's default patching configuration is used. **AutomaticByPlatform** - The virtual machine will be automatically updated by the platform. The property provisionVMAgent must be true. Known values are: \"ImageDefault\" and \"AutomaticByPlatform\"."
        assessmentMode:
          $ref: "#/components/schemas/LinuxPatchAssessmentMode"
          description: 'Specifies the mode of VM Guest Patch Assessment for the IaaS virtual machine. Possible values are: **ImageDefault** - You control the timing of patch assessments on a virtual machine. **AutomaticByPlatform** - The platform will trigger periodic patch assessments. The property provisionVMAgent must be true. Known values are: "ImageDefault" and "AutomaticByPlatform".'
        automaticByPlatformSettings:
          $ref: "#/components/schemas/LinuxVMGuestPatchAutomaticByPlatformSettings"
          description: Specifies additional settings for patch mode AutomaticByPlatform in VM Guest Patching on Linux.
    LinuxVMGuestPatchMode:
      type: string
      enum:
        - ImageDefault
        - AutomaticByPlatform
    LinuxPatchAssessmentMode:
      type: string
      enum:
        - ImageDefault
        - AutomaticByPlatform
    LinuxVMGuestPatchAutomaticByPlatformSettings:
      type: object
      description: Specifies additional settings to be applied when patch mode AutomaticByPlatform is selected in Linux patch settings.
      properties:
        rebootSetting:
          $ref: "#/components/schemas/LinuxVMGuestPatchAutomaticByPlatformRebootSetting"
          description: 'Specifies the reboot setting for all AutomaticByPlatform patch installation operations. Known values are: "Unknown", "IfRequired", "Never", and "Always".'
        bypassPlatformSafetyChecksOnUserSchedule:
          type: boolean
          description: Enables customer to schedule patching without accidental upgrades.
    LinuxVMGuestPatchAutomaticByPlatformRebootSetting:
      type: string
      enum:
        - Unknown
        - IfRequired
        - Never
        - Always
    VaultSecretGroup:
      type: object
      description: Describes a set of certificates which are all in the same Key Vault.
      properties:
        sourceVault:
          $ref: "#/components/schemas/SubResource"
          description: The relative URL of the Key Vault containing all of the certificates in VaultCertificates.
        vaultCertificates:
          type: array
          items:
            $ref: "#/components/schemas/VaultCertificate"
          description: The list of key vault references in SourceVault which contain certificates.
    SubResource:
      type: object
      description: Describes SubResource.
      properties:
        id:
          type: string
          description: Resource Id.
    VaultCertificate:
      type: object
      description: Describes a single certificate reference in a Key Vault, and where the certificate should reside on the VM.
      properties:
        certificateUrl:
          type: string
          description: 'This is the URL of a certificate that has been uploaded to Key Vault as a secret. For adding a secret to the Key Vault, see `Add a key or secret to the key vault `_. In this case, your certificate needs to be It is the Base64 encoding of the following JSON Object which is encoded in UTF-8: { "data":"", "dataType":"pfx", "password":""} To install certificates on a virtual machine it is recommended to use the `Azure Key Vault virtual machine extension for Linux `_ or the `Azure Key Vault virtual machine extension for Windows `_.'
        certificateStore:
          type: string
          description: For Windows VMs, specifies the certificate store on the Virtual Machine to which the certificate should be added. The specified certificate store is implicitly in the LocalMachine account. For Linux VMs, the certificate file is placed under the /var/lib/waagent directory, with the file name `<UppercaseThumbprint>`.crt for the X509 certificate file and `<UppercaseThumbprint>`.prv for private key. Both of these files are .pem formatted.
    VirtualMachineScaleSetStorageProfile:
      type: object
      description: Describes a virtual machine scale set storage profile.
      properties:
        imageReference:
          $ref: "#/components/schemas/ImageReference"
          description: Specifies information about the image to use. You can specify information about platform images, marketplace images, or virtual machine images. This element is required when you want to use a platform image, marketplace image, or virtual machine image, but is not used in other creation operations.
        osDisk:
          $ref: "#/components/schemas/VirtualMachineScaleSetOSDisk"
          description: Specifies information about the operating system disk used by the virtual machines in the scale set. For more information about disks, see `About disks and VHDs for Azure virtual machines `_.
        dataDisks:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineScaleSetDataDisk"
          description: Specifies the parameters that are used to add data disks to the virtual machines in the scale set. For more information about disks, see `About disks and VHDs for Azure virtual machines `_.
        diskControllerType:
          $ref: "#/components/schemas/DiskControllerTypes"
          description: 'Specifies the disk controller type configured for the virtual machines in the scale set. Minimum api-version: 2022-08-01. Known values are: "SCSI" and "NVMe".'
    ImageReference:
      type: object
      description: "Specifies information about the image to use. You can specify information about platform images, marketplace images, or virtual machine images. This element is required when you want to use a platform image, marketplace image, or virtual machine image, but is not used in other creation operations. NOTE: Image reference publisher and offer can only be set when you create the scale set."
      properties:
        id:
          type: string
          description: Resource Id.
        publisher:
          type: string
          description: The image publisher.
        offer:
          type: string
          description: Specifies the offer of the platform image or marketplace image used to create the virtual machine.
        sku:
          type: string
          description: The image SKU.
        version:
          type: string
          description: Specifies the version of the platform image or marketplace image used to create the virtual machine. The allowed formats are Major.Minor.Build or 'latest'. Major, Minor, and Build are decimal numbers. Specify 'latest' to use the latest version of an image available at deploy time. Even if you use 'latest', the VM image will not automatically update after deploy time even if a new version becomes available. Please do not use field 'version' for gallery image deployment, gallery image should always use 'id' field for deployment, to use 'latest' version of gallery image, just set '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Compute/galleries/{galleryName}/images/{imageName}' in the 'id' field without version input.
        exactVersion:
          type: string
          description: Specifies in decimal numbers, the version of platform image or marketplace image used to create the virtual machine. This readonly field differs from 'version', only if the value specified in 'version' field is 'latest'.
        sharedGalleryImageId:
          type: string
          description: Specified the shared gallery image unique id for vm deployment. This can be fetched from shared gallery image GET call.
        communityGalleryImageId:
          type: string
          description: Specified the community gallery image unique id for vm deployment. This can be fetched from community gallery image GET call.
    VirtualMachineScaleSetOSDisk:
      type: object
      description: Describes a virtual machine scale set operating system disk.
      properties:
        name:
          type: string
          description: The disk name.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Specifies the caching requirements. Possible values are: **None,** **ReadOnly,** **ReadWrite.** The default values are: **None for Standard storage. ReadOnly for Premium storage.**. Known values are: "None", "ReadOnly", and "ReadWrite".'
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
        createOption:
          $ref: "#/components/schemas/DiskCreateOptionTypes"
          description: 'Specifies how the virtual machines in the scale set should be created. The only allowed value is: **FromImage.** This value is used when you are using an image to create the virtual machine. If you are using a platform image, you also use the imageReference element described above. If you are using a marketplace image, you also use the plan element previously described. Required. Known values are: "FromImage", "Empty", "Attach", "Copy", and "Restore".'
        diffDiskSettings:
          $ref: "#/components/schemas/DiffDiskSettings"
          description: Specifies the ephemeral disk Settings for the operating system disk used by the virtual machine scale set.
        diskSizeGB:
          type: integer
          description: Specifies the size of an empty data disk in gigabytes. This element can be used to overwrite the size of the disk in a virtual machine image. The property 'diskSizeGB' is the number of bytes x 1024^3 for the disk and the value cannot be larger than 1023.
        osType:
          $ref: "#/components/schemas/OperatingSystemTypes"
          description: 'This property allows you to specify the type of the OS that is included in the disk if creating a VM from user-image or a specialized VHD. Possible values are: **Windows,** **Linux.**. Known values are: "Windows" and "Linux".'
        image:
          $ref: "#/components/schemas/VirtualHardDisk"
          description: Specifies information about the unmanaged user image to base the scale set on.
        vhdContainers:
          type: array
          items:
            type: string
          description: Specifies the container urls that are used to store operating system disks for the scale set.
        managedDisk:
          $ref: "#/components/schemas/VirtualMachineScaleSetManagedDiskParameters"
          description: The managed disk parameters.
        deleteOption:
          $ref: "#/components/schemas/DiskDeleteOptionTypes"
          description: 'Specifies whether OS Disk should be deleted or detached upon VMSS Flex deletion (This feature is available for VMSS with Flexible OrchestrationMode only). Possible values: **Delete** If this value is used, the OS disk is deleted when VMSS Flex VM is deleted. **Detach** If this value is used, the OS disk is retained after VMSS Flex VM is deleted. The default value is set to **Delete**. For an Ephemeral OS Disk, the default value is set to **Delete**. User cannot change the delete option for Ephemeral OS Disk. Known values are: "Delete" and "Detach".'
      required:
        - createOption
    CachingTypes:
      type: string
      enum:
        - None
        - ReadOnly
        - ReadWrite
    DiskCreateOptionTypes:
      type: string
      enum:
        - FromImage
        - Empty
        - Attach
        - Copy
        - Restore
    DiffDiskSettings:
      type: object
      description: Describes the parameters of ephemeral disk settings that can be specified for operating system disk. **Note:** The ephemeral disk settings can only be specified for managed disk.
      properties:
        option:
          $ref: "#/components/schemas/DiffDiskOptions"
          description: Specifies the ephemeral disk settings for operating system disk. "Local"
        placement:
          $ref: "#/components/schemas/DiffDiskPlacement"
          description: 'Specifies the ephemeral disk placement for operating system disk. Possible values are: **CacheDisk,** **ResourceDisk.** The defaulting behavior is: **CacheDisk** if one is configured for the VM size otherwise **ResourceDisk** is used. Refer to the VM size documentation for Windows VM at `https://learn.microsoft.com/azure/virtual-machines/windows/sizes `_ and Linux VM at `https://learn.microsoft.com/azure/virtual-machines/linux/sizes `_ to check which VM sizes exposes a cache disk. Known values are: "CacheDisk", "ResourceDisk", and "NvmeDisk".'
    DiffDiskOptions:
      type: string
      enum:
        - Local
    DiffDiskPlacement:
      type: string
      enum:
        - CacheDisk
        - ResourceDisk
        - NvmeDisk
    OperatingSystemTypes:
      type: string
      enum:
        - Windows
        - Linux
    VirtualHardDisk:
      type: object
      description: Describes the uri of a disk.
      properties:
        uri:
          type: string
          description: Specifies the virtual hard disk's uri.
    VirtualMachineScaleSetManagedDiskParameters:
      type: object
      description: Describes the parameters of a ScaleSet managed disk.
      properties:
        storageAccountType:
          $ref: "#/components/schemas/StorageAccountTypes"
          description: 'Specifies the storage account type for the managed disk. NOTE: UltraSSD_LRS can only be used with data disks, it cannot be used with OS Disk. Known values are: "Standard_LRS", "Premium_LRS", "StandardSSD_LRS", "UltraSSD_LRS", "Premium_ZRS", "StandardSSD_ZRS", and "PremiumV2_LRS".'
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Specifies the customer managed disk encryption set resource id for the managed disk.
        securityProfile:
          $ref: "#/components/schemas/VMDiskSecurityProfile"
          description: Specifies the security profile for the managed disk.
    StorageAccountTypes:
      type: string
      enum:
        - Standard_LRS
        - Premium_LRS
        - StandardSSD_LRS
        - UltraSSD_LRS
        - Premium_ZRS
        - StandardSSD_ZRS
        - PremiumV2_LRS
    DiskEncryptionSetParameters:
      type: object
      description: Describes the parameter of customer managed disk encryption set resource id that can be specified for disk. **Note:** The disk encryption set resource id can only be specified for managed disk. Please refer `https://aka.ms/mdssewithcmkoverview `_ for more details.
      properties:
        id:
          type: string
          description: Resource Id.
    VMDiskSecurityProfile:
      type: object
      description: Specifies the security profile settings for the managed disk. **Note:** It can only be set for Confidential VMs.
      properties:
        securityEncryptionType:
          $ref: "#/components/schemas/SecurityEncryptionTypes"
          description: 'Specifies the EncryptionType of the managed disk. It is set to DiskWithVMGuestState for encryption of the managed disk along with VMGuestState blob, VMGuestStateOnly for encryption of just the VMGuestState blob, and NonPersistedTPM for not persisting firmware state in the VMGuestState blob.. **Note:** It can be set for only Confidential VMs. Known values are: "VMGuestStateOnly", "DiskWithVMGuestState", and "NonPersistedTPM".'
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Specifies the customer managed disk encryption set resource id for the managed disk that is used for Customer Managed Key encrypted ConfidentialVM OS Disk and VMGuest blob.
    SecurityEncryptionTypes:
      type: string
      enum:
        - VMGuestStateOnly
        - DiskWithVMGuestState
        - NonPersistedTPM
    DiskDeleteOptionTypes:
      type: string
      enum:
        - Delete
        - Detach
    VirtualMachineScaleSetDataDisk:
      type: object
      description: Describes a virtual machine scale set data disk.
      properties:
        name:
          type: string
          description: The disk name.
        lun:
          type: integer
          description: Specifies the logical unit number of the data disk. This value is used to identify data disks within the VM and therefore must be unique for each data disk attached to a VM. Required.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Specifies the caching requirements. Possible values are: **None,** **ReadOnly,** **ReadWrite.** The default values are: **None for Standard storage. ReadOnly for Premium storage.**. Known values are: "None", "ReadOnly", and "ReadWrite".'
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
        createOption:
          $ref: "#/components/schemas/DiskCreateOptionTypes"
          description: 'The create option. Required. Known values are: "FromImage", "Empty", "Attach", "Copy", and "Restore".'
        diskSizeGB:
          type: integer
          description: Specifies the size of an empty data disk in gigabytes. This element can be used to overwrite the size of the disk in a virtual machine image. The property diskSizeGB is the number of bytes x 1024^3 for the disk and the value cannot be larger than 1023.
        managedDisk:
          $ref: "#/components/schemas/VirtualMachineScaleSetManagedDiskParameters"
          description: The managed disk parameters.
        diskIOPSReadWrite:
          type: integer
          description: Specifies the Read-Write IOPS for the managed disk. Should be used only when StorageAccountType is UltraSSD_LRS. If not specified, a default value would be assigned based on diskSizeGB.
        diskMBpsReadWrite:
          type: integer
          description: Specifies the bandwidth in MB per second for the managed disk. Should be used only when StorageAccountType is UltraSSD_LRS. If not specified, a default value would be assigned based on diskSizeGB.
        deleteOption:
          $ref: "#/components/schemas/DiskDeleteOptionTypes"
          description: 'Specifies whether data disk should be deleted or detached upon VMSS Flex deletion (This feature is available for VMSS with Flexible OrchestrationMode only). Possible values: **Delete** If this value is used, the data disk is deleted when the VMSS Flex VM is deleted. **Detach** If this value is used, the data disk is retained after VMSS Flex VM is deleted. The default value is set to **Delete**. Known values are: "Delete" and "Detach".'
      required:
        - lun
        - createOption
    DiskControllerTypes:
      type: string
      enum:
