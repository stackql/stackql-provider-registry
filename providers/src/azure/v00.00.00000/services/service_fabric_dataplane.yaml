  /Partitions/{partition_id}/$/ResumeBackup?api-version=6.4:
    post:
      operationId: ServiceFabricClientAPIs_resume_partition_backup
      description: Resumes periodic backup of partition which was previously suspended. The previously suspended partition resumes taking periodic backup as per the backup policy currently configured for the same.
      parameters:
        - name: partition_id
          in: path
          required: true
