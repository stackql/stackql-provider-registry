  /ImageStore/{content_path}/$/UploadChunk?api-version=6.0:
    put:
      operationId: ServiceFabricClientAPIs_upload_file_chunk
      description: Uploads a file chunk to the image store relative path. Uploads a file chunk to the image store with the specified upload session ID and image store relative path. This API allows user to resume the file upload operation. user doesn't have to restart the file upload from scratch whenever there is a network interruption. Use this option if the file size is large. To perform a resumable file upload, user need to break the file into multiple chunks and upload these chunks to the image store one-by-one. Chunks don't have to be uploaded in order. If the file represented by the image store relative path already exists, it will be overwritten when the upload session commits.
      parameters:
        - name: session-id
          in: query
          required: true
          schema:
            type: string
          description: A GUID generated by the user for a file uploading. It identifies an image store upload session which keeps track of all file chunks until it is committed.
        - name: Content-Range
          in: header
          required: true
          schema:
            type: string
          description: When uploading file chunks to the image store, the Content-Range header field need to be configured and sent with a request. The format should looks like "bytes {First-Byte-Position}-{Last-Byte-Position}/{File-Length}". For example, Content-Range:bytes 300-5000/20000 indicates that user is sending bytes 300 through 5,000 and the total file length is 20,000 bytes.
        - name: content_path
          in: path
          required: true
          schema:
