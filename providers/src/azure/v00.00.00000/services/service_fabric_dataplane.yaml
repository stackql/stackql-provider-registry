      description: Sends a health report on the Service Fabric replica. Reports health state of the specified Service Fabric replica. The report must contain the information about the source of the health report and property on which it is reported. The report is sent to a Service Fabric gateway Replica, which forwards to the health store. The report may be accepted by the gateway, but rejected by the health store after extra validation. For example, the health store may reject the report because of an invalid parameter, like a stale sequence number. To see whether the report was applied in the health store, run GetReplicaHealth and check that the report appears in the HealthEvents section.
      parameters:
        - name: replica_id
          in: path
          required: true
          schema:
            type: string
          description: The identifier of the replica.
        - name: partition_id
          in: path
          required: true
          schema:
            type: string
          description: The identity of the partition.
        - name: ServiceKind
          in: query
          required: false
          schema:
            type: string
          description: "The kind of service replica (Stateless or Stateful) for which the health is being reported. Following are the possible values. Possible values include: 'Stateless', 'Stateful'"
        - name: Immediate
          in: query
          required: false
          schema:
            type: boolean
          description: A flag that indicates whether the report should be sent immediately. A health report is sent to a Service Fabric gateway Application, which forwards to the health store. If Immediate is set to true, the report is sent immediately from HTTP Gateway to the health store, regardless of the fabric client settings that the HTTP Gateway Application is using. This is useful for critical reports that should be sent as soon as possible. Depending on timing and other conditions, sending the report may still fail, for example if the HTTP Gateway is closed or the message doesn't reach the Gateway. If Immediate is set to false, the report is sent based on the health client settings from the HTTP Gateway. Therefore, it will be batched according to the HealthReportSendInterval configuration. This is the recommended setting because it allows the health client to optimize health reporting messages to health store as well as health report processing. By default, reports are not sent immediately.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: The server timeout for performing the operation in seconds. This timeout specifies the time duration that the client is willing to wait for the requested operation to complete. The default value for this parameter is 60 seconds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SourceId:
                  type: string
                Property:
                  type: string
                HealthState:
                  type: string
                TimeToLiveInMilliSeconds:
                  type: string
                Description:
                  type: string
                SequenceNumber:
                  type: string
                RemoveWhenExpired:
                  type: boolean
                HealthReportId:
                  type: string
              required:
                - SourceId
                - Property
                - HealthState
      responses:
        "200":
          description: Success
