        memoryInGB:
          type: number
        cpu:
          type: number
      required:
        - memoryInGB
        - cpu
    ResourceLimits:
      type: object
      description: This type describes the resource limits for a given container. It describes the most amount of resources a container is allowed to use before being restarted.
      properties:
