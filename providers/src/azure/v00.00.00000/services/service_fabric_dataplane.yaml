      description: Enables periodic backup of the stateful persisted partition. Enables periodic backup of stateful persisted partition. Each partition is backed up as per the specified backup policy description. In case the application or service, which is partition is part of, is already enabled for backup then this operation would override the policy being used to take the periodic backup of this partition. Note only C# based Reliable Actor and Reliable Stateful services are currently supported for periodic backup.
      parameters:
        - name: partition_id
          in: path
          required: true
          schema:
            type: string
          description: The identity of the partition.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: The server timeout for performing the operation in seconds. This timeout specifies the time duration that the client is willing to wait for the requested operation to complete. The default value for this parameter is 60 seconds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupPolicyName:
                  type: string
              required:
                - BackupPolicyName
      responses:
        "200":
          description: Success
  /Partitions/{partition_id}/$/DisableBackup?api-version=6.4:
    post:
      operationId: ServiceFabricClientAPIs_disable_partition_backup
      description: Disables periodic backup of Service Fabric partition which was previously enabled. Disables periodic backup of partition which was previously enabled. Backup must be explicitly enabled before it can be disabled. In case the backup is enabled for the Service Fabric application or service, which this partition is part of, this partition would continue to be periodically backed up as per the policy mapped at the higher level entity.
      parameters:
        - name: partition_id
