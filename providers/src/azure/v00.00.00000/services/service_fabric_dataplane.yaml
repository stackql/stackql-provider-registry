      type: object
      description: Defines matching criteria to determine whether a application should be included in the cluster health chunk. One filter can match zero, one or multiple applications, depending on its properties.
      properties:
        ApplicationNameFilter:
          type: string
        ApplicationTypeNameFilter:
          type: string
        HealthStateFilter:
          type: integer
        ServiceFilters:
          type: array
          items:
            $ref: "#/components/schemas/ServiceHealthStateFilter"
        DeployedApplicationFilters:
          type: array
          items:
            $ref: "#/components/schemas/DeployedApplicationHealthStateFilter"
    ServiceHealthStateFilter:
      type: object
      description: Defines matching criteria to determine whether a service should be included as a child of an application in the cluster health chunk. The services are only returned if the parent application matches a filter specified in the cluster health chunk query description. One filter can match zero, one or multiple services, depending on its properties.
      properties:
        ServiceNameFilter:
          type: string
        HealthStateFilter:
          type: integer
