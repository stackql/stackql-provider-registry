openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme).
info:
  title: Azure Service Fabric (Data Plane)
  description: "Cluster runtime operations: nodes, applications, services, partitions and replicas."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 8.2-stackql-generated
  x-serviceAlias: service_fabric_dataplane
  x-sdkPackage: azure-servicefabric
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ServiceResourceDescription:
      type: object
      description: This type describes a service resource. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        name:
          type: string
        properties:
          type: object
          properties:
            osType:
              type: string
            codePackages:
              type: array
              items:
                $ref: "#/components/schemas/ContainerCodePackageProperties"
            networkRefs:
              type: array
              items:
                $ref: "#/components/schemas/NetworkRef"
            diagnostics:
              $ref: "#/components/schemas/DiagnosticsRef"
            description:
              type: string
            replicaCount:
              type: integer
            executionPolicy:
              $ref: "#/components/schemas/ExecutionPolicy"
            autoScalingPolicies:
              type: array
              items:
                $ref: "#/components/schemas/AutoScalingPolicy"
            status:
              type: string
              description: "Status of the service. Possible values include: 'Unknown', 'Ready', 'Upgrading', 'Creating', 'Deleting', 'Failed'"
            statusDetails:
              type: string
              description: Gives additional information about the current status of the service.
            healthState:
              type: string
              description: "Describes the health state of an application resource. Possible values include: 'Invalid', 'Ok', 'Warning', 'Error', 'Unknown'"
            unhealthyEvaluation:
              type: string
              description: When the service's health state is not 'Ok', this additional details from service fabric Health Manager for the user to know why the service is marked unhealthy.
            identityRefs:
              type: array
              items:
                $ref: "#/components/schemas/ServiceIdentity"
            dnsName:
              type: string
      required:
        - name
        - properties
    ContainerCodePackageProperties:
      type: object
      description: Describes a container and its runtime properties. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
