  /Partitions/{partition_id}/$/Backup?api-version=6.4:
    post:
      operationId: ServiceFabricClientAPIs_backup_partition
      description: Triggers backup of the partition's state. Creates a backup of the stateful persisted partition's state. In case the partition is already being periodically backed up, then by default the new backup is created at the same backup storage. One can also override the same by specifying the backup storage details as part of the request body. Once the backup is initiated, its progress can be tracked using the GetBackupProgress operation. In case, the operation times out, specify a greater backup timeout value in the query parameter.
      parameters:
        - name: partition_id
          in: path
          required: true
          schema:
            type: string
          description: The identity of the partition.
        - name: BackupTimeout
          in: query
          required: false
          schema:
            type: integer
          description: Specifies the maximum amount of time, in minutes, to wait for the backup operation to complete. Post that, the operation completes with timeout error. However, in certain corner cases it could be that though the operation returns back timeout, the backup actually goes through. In case of timeout error, its recommended to invoke this operation again with a greater timeout value. The default value for the same is 10 minutes.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: The server timeout for performing the operation in seconds. This timeout specifies the time duration that the client is willing to wait for the requested operation to complete. The default value for this parameter is 60 seconds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupStorage:
                  $ref: "#/components/schemas/BackupStorageDescription"
      responses:
        "200":
          description: Success
  /Partitions/{partition_id}/$/Restore?api-version=6.4:
    post:
      operationId: ServiceFabricClientAPIs_restore_partition
      description: Triggers restore of the state of the partition using the specified restore partition description. Restores the state of a of the stateful persisted partition using the specified backup point. In case the partition is already being periodically backed up, then by default the backup point is looked for in the storage specified in backup policy. One can also override the same by specifying the backup storage details as part of the restore partition description in body. Once the restore is initiated, its progress can be tracked using the GetRestoreProgress operation. In case, the operation times out, specify a greater restore timeout value in the query parameter.
      parameters:
        - name: partition_id
          in: path
          required: true
          schema:
            type: string
          description: The identity of the partition.
        - name: RestoreTimeout
          in: query
          required: false
          schema:
            type: integer
          description: Specifies the maximum amount of time to wait, in minutes, for the restore operation to complete. Post that, the operation returns back with timeout error. However, in certain corner cases it could be that the restore operation goes through even though it completes with timeout. In case of timeout error, its recommended to invoke this operation again with a greater timeout value. the default value for the same is 10 minutes.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: The server timeout for performing the operation in seconds. This timeout specifies the time duration that the client is willing to wait for the requested operation to complete. The default value for this parameter is 60 seconds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupId:
                  type: string
                BackupLocation:
                  type: string
                BackupStorage:
                  $ref: "#/components/schemas/BackupStorageDescription"
              required:
                - BackupId
                - BackupLocation
      responses:
        "200":
          description: Success
