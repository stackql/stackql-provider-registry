      type: object
      description: Pricing properties for the relevant scope.
      properties:
        pricingTier:
          $ref: "#/components/schemas/PricingTier"
          description: 'Indicates whether the Defender plan is enabled on the selected scope. Microsoft Defender for Cloud is provided in two pricing tiers: free and standard. The standard tier offers advanced security capabilities, while the free tier offers basic security features. Required. Known values are: "Free" and "Standard".'
        subPlan:
          type: string
          description: The sub-plan selected for a Standard pricing configuration, when more than one sub-plan is available. Each sub-plan enables a set of security features. When not specified, full plan is applied. For VirtualMachines plan, available sub plans are 'P1' & 'P2', where for resource level only 'P1' sub plan is supported.
        freeTrialRemainingTime:
          type: string
          description: The duration left for the subscriptions free trial period - in ISO 8601 format (e.g. P3Y6M4DT12H30M5S).
        enablementTime:
          type: string
          format: date-time
          description: Optional. If `pricingTier` is `Standard` then this property holds the date of the last time the `pricingTier` was set to `Standard`, when available (e.g 2023-03-01T12:42:42.1921106Z).
        enforce:
          $ref: "#/components/schemas/Enforce"
          description: 'If set to "False", it allows the descendants of this scope to override the pricing configuration set on this scope (allows setting inherited="False"). If set to "True", it prevents overrides and forces this pricing configuration on all the descendants of this scope. This field is only available for subscription-level pricing. Known values are: "False" and "True".'
        inherited:
          $ref: "#/components/schemas/Inherited"
          description: '"inherited" = "True" indicates that the current scope inherits its pricing configuration from its parent. The ID of the parent scope that provides the inherited configuration is displayed in the "inheritedFrom" field. On the other hand, "inherited" = "False" indicates that the current scope has its own pricing configuration explicitly set, and does not inherit from its parent. This field is read only and available only for resource-level pricing. Known values are: "True" and "False".'
        inheritedFrom:
          type: string
          description: The id of the scope inherited from. "Null" if not inherited. This field is only available for resource-level pricing.
        resourcesCoverageStatus:
          $ref: "#/components/schemas/ResourcesCoverageStatus"
          description: "This field is available for subscription-level only, and reflects the coverage status of the resources under the subscription. Please note: The \"pricingTier\" field reflects the plan status of the subscription. However, since the plan status can also be defined at the resource level, there might be misalignment between the subscription's plan status and the resource status. This field helps indicate the coverage status of the resources. Known values are: \"FullyCovered\", \"PartiallyCovered\", and \"NotCovered\"."
        extensions:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
          description: Optional. List of extensions offered under a plan.
        deprecated:
          type: boolean
          description: Optional. True if the plan is deprecated. If there are replacing plans they will appear in `replacedBy` property.
        replacedBy:
          type: array
          items:
            type: string
          description: Optional. List of plans that replace this plan. This property exists only if this plan is deprecated.
