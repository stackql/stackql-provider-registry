        expectedValue:
          type: string
          description: The expected value.
        operator:
          $ref: "#/components/schemas/Operator"
          description: 'A valid comparer operator to use. A case-insensitive comparison will be applied for String PropertyType. Known values are: "Equals", "GreaterThan", "GreaterThanOrEqualTo", "LesserThan", "LesserThanOrEqualTo", "NotEquals", "Contains", "StartsWith", and "EndsWith".'
