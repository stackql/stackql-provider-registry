        - PartiallyCovered
        - NotCovered
    Extension:
      type: object
      description: A plan's extension properties.
      properties:
        name:
          type: string
          description: "The extension name. Supported values are: **AgentlessDiscoveryForKubernetes** - Provides zero footprint, API-based discovery of Kubernetes clusters, their configurations and deployments. The collected data is used to create a contextualized security graph for Kubernetes clusters, provide risk hunting capabilities, and visualize risks and threats to Kubernetes environments and workloads.Available for CloudPosture plan and Containers plan.**OnUploadMalwareScanning** - Limits the GB to be scanned per month for each storage account within the subscription. Once this limit reached on a given storage account, Blobs won't be scanned during current calendar month.Available for StorageAccounts plan (DefenderForStorageV2 sub plans).**SensitiveDataDiscovery** - Sensitive data discovery identifies Blob storage container with sensitive data such as credentials, credit cards, and more, to help prioritize and investigate security events.Available for StorageAccounts plan (DefenderForStorageV2 sub plan) and CloudPosture plan.**ContainerRegistriesVulnerabilityAssessments** - Provides vulnerability management for images stored in your container registries.Available for CloudPosture plan and Containers plan.**MdeDesignatedSubscription** - Direct onboarding is a seamless integration between Defender for Endpoint and Defender for Cloud that doesn't require extra software deployment on your servers. The onboarded resources will be presented under a designated Azure Subscription you configureAvailable for VirtualMachines plan (P1 and P2 sub plans).**AgentlessVmScanning** - Scans your machines for installed software, vulnerabilities, malware and secret scanning without relying on agents or impacting machine performance. Learn more here `https://learn.microsoft.com/en-us/azure/defender-for-cloud/concept-agentless-data-collection `_.Available for CloudPosture plan, VirtualMachines plan (P2 sub plan) and Containers plan.**EntraPermissionsManagement** - Permissions Management provides Cloud Infrastructure Entitlement Management (CIEM) capabilities that helps organizations to manage and control user access and entitlements in their cloud infrastructure - important attack vector for cloud environments.Permissions Management analyzes all permissions and active usage, and suggests recommendations to reduce permissions to enforce the principle of least privilege. Learn more here `https://learn.microsoft.com/en-us/azure/defender-for-cloud/permissions-management `_.Available for CloudPosture plan. **FileIntegrityMonitoring** - File integrity monitoring (FIM), examines operating system files.Windows registries, Linux system files, in real time, for changes that might indicate an attack.Available for VirtualMachines plan (P2 sub plan). **ContainerSensor** - The sensor is based on IG and provides a rich threat detection suite for Kubernetes clusters, nodes, and workloads, powered by Microsoft leading threat intelligence, provides mapping to MITRE ATT&CK framework.Available for Containers plan. **AIPromptEvidence** - Exposes the prompts passed between the user and the AI model as alert evidence. This helps classify and triage the alerts with relevant user context. The prompt snippets will include only segments of the user prompt or model response that were deemed suspicious and relevant for security classifications. The prompt evidence will be available through Defender portal as part of each alert.Available for AI plan. . Required."
        isEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: 'Indicates whether the extension is enabled. Required. Known values are: "True" and "False".'
        additionalExtensionProperties:
          type: object
          properties: {}
          description: Property values associated with the extension.
        operationStatus:
          $ref: "#/components/schemas/OperationStatus"
          description: Optional. A status describing the success/failure of the extension's enablement/disablement operation.
      required:
        - name
        - isEnabled
    IsEnabled:
      type: string
      enum:
        - "True"
        - "False"
