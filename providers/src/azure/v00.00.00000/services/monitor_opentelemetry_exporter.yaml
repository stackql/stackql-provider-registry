openapi: 3.0.0
servers:
  - url: https://{host}/{api_version}
    variables:
      host:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `host` parameter.
      api_version:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `apiVersion` parameter.
info:
  title: Azure Monitor Client
  description: OpenTelemetry Exporter for Azure Monitor.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2024-04-01-preview-stackql-generated
  x-serviceAlias: monitor_opentelemetry_exporter
  x-sdkPackage: azure-monitor-opentelemetry-exporter
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    MonitorBase:
      type: object
      description: Data struct to contain only C section with custom fields.
      properties:
        baseType:
          type: string
          description: Name of item (B section) if any. If telemetry data is derived straight from this, this should be null.
        baseData:
          $ref: "#/components/schemas/MonitorDomain"
          description: The data payload for the telemetry request.
    MonitorDomain:
      type: object
      description: "The abstract common base of all domains. You probably want to use the sub-classes and not this class directly. Known sub-classes are: AvailabilityData, TelemetryEventData, TelemetryExceptionData, MessageData, MetricsData, PageViewData, PageViewPerfData, RemoteDependencyData, RequestData"
      properties:
        ver:
          type: integer
          description: Schema version. Required.
        kind:
          type: string
          description: 'Discriminator property to identify the specific telemetry data type. Required. Known values are: "AvailabilityData", "EventData", "ExceptionData", "MessageData", "MetricsData", "PageViewData", "PageViewPerfData", "RemoteDependencyData", and "RequestData".'
      required:
        - ver
    TrackResponse:
      type: object
      description: Response containing the status of each telemetry item.
      properties:
        itemsReceived:
          type: integer
          description: The number of items received.
        itemsAccepted:
          type: integer
          description: The number of items accepted.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryErrorDetails"
          description: An array of error detail objects.
    TelemetryErrorDetails:
      type: object
      description: The error details.
      properties:
        index:
          type: integer
          description: The index in the original payload of the item.
        statusCode:
          type: integer
          description: The item specific HTTP Response status code.
        message:
          type: string
          description: The error message.
    MetricPoint:
      type: object
      description: Metric data point.
      properties:
        Name:
          type: string
          description: Metric name. Required.
        Value:
          type: number
          description: Metric value. Required.
        Weight:
          type: integer
          description: Metric weight. Required.
      required:
        - Name
        - Value
        - Weight
    DocumentIngress:
      type: object
      description: "Base class of the specific document types. You probably want to use the sub-classes and not this class directly. Known sub-classes are: Event, Exception, RemoteDependency, Request, Trace"
      properties:
        DocumentType:
          type: string
          description: "Telemetry type. Types not defined in enum will get replaced with a 'Unknown' type. Required. Known values are: \"Request\", \"RemoteDependency\", \"Exception\", \"Event\", \"Trace\", and \"Unknown\"."
        DocumentStreamIds:
          type: array
          items:
            type: string
          description: An array of document streaming ids. Each id identifies a flow of documents customized by UX customers.
        Properties:
          type: array
          items:
            $ref: "#/components/schemas/KeyValuePairStringString"
          description: Collection of custom properties.
      required:
        - DocumentType
    KeyValuePairStringString:
      type: object
      description: Key-value pair of string and string.
      properties:
        key:
          type: string
          description: Key of the key-value pair. Required.
        value:
          type: string
          description: Value of the key-value pair. Required.
      required:
        - key
        - value
    ProcessCpuData:
      type: object
      description: CPU consumption datapoint.
      properties:
        ProcessName:
          type: string
          description: Process name. Required.
        CpuPercentage:
          type: integer
          description: CPU consumption percentage. Required.
      required:
        - ProcessName
        - CpuPercentage
    CollectionConfigurationError:
      type: object
      description: Represents an error while SDK parses and applies an instance of CollectionConfigurationInfo.
      properties:
        CollectionConfigurationErrorType:
          $ref: "#/components/schemas/CollectionConfigurationErrorType"
          description: 'Error type. Required. Known values are: "Unknown", "PerformanceCounterParsing", "PerformanceCounterUnexpected", "PerformanceCounterDuplicateIds", "DocumentStreamDuplicateIds", "DocumentStreamFailureToCreate", "DocumentStreamFailureToCreateFilterUnexpected", "MetricDuplicateIds", "MetricTelemetryTypeUnsupported", "MetricFailureToCreate", "MetricFailureToCreateFilterUnexpected", "FilterFailureToCreateUnexpected", and "CollectionConfigurationFailureToCreateUnexpected".'
        Message:
          type: string
          description: Error message. Required.
        FullException:
          type: string
          description: Exception that led to the creation of the configuration error. Required.
        Data:
          type: array
          items:
            $ref: "#/components/schemas/KeyValuePairStringString"
          description: Custom properties to add more information to the error. Required.
      required:
        - CollectionConfigurationErrorType
        - Message
        - FullException
        - Data
    CollectionConfigurationErrorType:
      type: string
      enum:
        - Unknown
        - PerformanceCounterParsing
        - PerformanceCounterUnexpected
        - PerformanceCounterDuplicateIds
        - DocumentStreamDuplicateIds
        - DocumentStreamFailureToCreate
        - DocumentStreamFailureToCreateFilterUnexpected
        - MetricDuplicateIds
        - MetricTelemetryTypeUnsupported
        - MetricFailureToCreate
        - MetricFailureToCreateFilterUnexpected
        - FilterFailureToCreateUnexpected
        - CollectionConfigurationFailureToCreateUnexpected
    CollectionConfigurationInfo:
      type: object
      description: Represents the collection configuration - a customizable description of performance counters, metrics, and full telemetry documents to be collected by the client SDK.
      properties:
        ETag:
          type: string
          description: An encoded string that indicates whether the collection configuration is changed. Required.
        Metrics:
          type: array
          items:
            $ref: "#/components/schemas/DerivedMetricInfo"
          description: An array of metric configuration info. Required.
        DocumentStreams:
          type: array
          items:
            $ref: "#/components/schemas/DocumentStreamInfo"
          description: An array of document stream configuration info. Required.
        QuotaInfo:
          $ref: "#/components/schemas/QuotaConfigurationInfo"
          description: Controls document quotas to be sent to Live Metrics.
      required:
        - ETag
        - Metrics
        - DocumentStreams
    DerivedMetricInfo:
      type: object
      description: A metric configuration set by UX to scope the metrics it's interested in.
      properties:
        Id:
          type: string
          description: metric configuration identifier. Required.
        TelemetryType:
          type: string
          description: Telemetry type. Required.
        FilterGroups:
          type: array
          items:
            $ref: "#/components/schemas/FilterConjunctionGroupInfo"
          description: A collection of filters to scope metrics that UX needs. Required.
        Projection:
          type: string
          description: "Telemetry's metric dimension whose value is to be aggregated. Example values: Duration, Count(),... Required."
        Aggregation:
          $ref: "#/components/schemas/AggregationType"
          description: 'Aggregation type. This is the aggregation done from everything within a single server. Required. Known values are: "Avg", "Sum", "Min", and "Max".'
        BackEndAggregation:
          $ref: "#/components/schemas/AggregationType"
          description: 'Aggregation type. This Aggregation is done across the values for all the servers taken together. Required. Known values are: "Avg", "Sum", "Min", and "Max".'
      required:
        - Id
        - TelemetryType
        - FilterGroups
        - Projection
        - Aggregation
        - BackEndAggregation
    FilterConjunctionGroupInfo:
      type: object
      description: An AND-connected group of FilterInfo objects.
      properties:
        Filters:
          type: array
          items:
            $ref: "#/components/schemas/FilterInfo"
          description: An array of filters. Required.
      required:
        - Filters
    FilterInfo:
      type: object
      description: A filter set on UX.
      properties:
        FieldName:
          type: string
          description: dimension name of the filter. Required.
        Predicate:
          $ref: "#/components/schemas/PredicateType"
          description: 'Operator of the filter. Required. Known values are: "Equal", "NotEqual", "LessThan", "GreaterThan", "LessThanOrEqual", "GreaterThanOrEqual", "Contains", and "DoesNotContain".'
        Comparand:
          type: string
          description: Comparand of the filter. Required.
      required:
        - FieldName
        - Predicate
        - Comparand
    PredicateType:
      type: string
      enum:
        - Equal
        - NotEqual
        - LessThan
        - GreaterThan
        - LessThanOrEqual
        - GreaterThanOrEqual
        - Contains
        - DoesNotContain
    AggregationType:
      type: string
      enum:
        - Avg
        - Sum
        - Min
        - Max
    DocumentStreamInfo:
      type: object
      description: Configurations/filters set by UX to scope the document/telemetry it's interested in.
      properties:
        Id:
          type: string
          description: Identifier of the document stream initiated by a UX. Required.
        DocumentFilterGroups:
          type: array
          items:
            $ref: "#/components/schemas/DocumentFilterConjunctionGroupInfo"
          description: Gets or sets an OR-connected collection of filter groups. Required.
      required:
        - Id
        - DocumentFilterGroups
    DocumentFilterConjunctionGroupInfo:
      type: object
      description: A collection of filters for a specific telemetry type.
      properties:
        TelemetryType:
          $ref: "#/components/schemas/TelemetryType"
          description: 'Telemetry type. Required. Known values are: "Request", "Dependency", "Exception", "Event", "Metric", "PerformanceCounter", and "Trace".'
        Filters:
          $ref: "#/components/schemas/FilterConjunctionGroupInfo"
          description: An array of filter groups. Required.
      required:
        - TelemetryType
        - Filters
    TelemetryType:
      type: string
      enum:
        - Request
        - Dependency
        - Exception
        - Event
        - Metric
        - PerformanceCounter
        - Trace
    QuotaConfigurationInfo:
      type: object
      description: Controls document quotas to be sent to Live Metrics.
      properties:
        InitialQuota:
          type: number
          description: Initial quota.
        MaxQuota:
          type: number
          description: Max quota. Required.
        QuotaAccrualRatePerSec:
          type: number
          description: Quota accrual rate per second. Required.
      required:
        - MaxQuota
        - QuotaAccrualRatePerSec
  x-stackQL-resources:
    tracks:
      id: azure.monitor_opentelemetry_exporter.tracks
