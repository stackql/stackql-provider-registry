paths:
  /track:
    post:
      operationId: _AzureMonitorClient_track
      description: Track telemetry events. This operation sends a sequence of telemetry events that will be monitored by Azure Monitor.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ver:
                  type: integer
                  description: "Envelope version. For internal use only. By assigning this the default, it will not be serialized within the payload unless changed to a value other than #1."
                name:
                  type: string
                  description: Type name of telemetry data item. Required.
                time:
                  type: string
                  format: date-time
                  description: "Event date time when telemetry item was created. This is the wall clock time on the client when the event was generated. There is no guarantee that the client's time is accurate. This field must be formatted in UTC ISO 8601 format, with a trailing 'Z' character, as described publicly on `https://en.wikipedia.org/wiki/ISO_8601#UTC `_. Note: the number of decimal seconds digits provided are variable (and unspecified). Consumers should handle this, i.e. managed code consumers should not use format 'O' for parsing as it specifies a fixed length. Example: 2009-06-15T13:45:30.0000000Z. Required."
                sampleRate:
                  type: number
                  description: Sampling rate used in application. This telemetry item represents 100 / sampleRate actual telemetry items.
                seq:
                  type: string
                  description: Sequence field used to track absolute order of uploaded events.
                iKey:
                  type: string
                  description: The instrumentation key of the Application Insights resource.
                tags:
                  type: object
                  properties: {}
                  description: Key/value collection of context properties. See ContextTagKeys for information on available properties.
                data:
                  $ref: "#/components/schemas/MonitorBase"
                  description: Telemetry data item.
              required:
                - name
                - time
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackResponse"
  /QuickPulseService.svc/ping?api-version=2024-04-01-preview:
    post:
      operationId: _LiveMetricsClient_is_subscribed
      description: Determine whether there is any subscription to the metrics and documents.
      parameters:
        - name: ikey
          in: query
          required: true
          schema:
            type: string
          description: The instrumentation key of the target Application Insights component for which the client checks whether there's any subscription to it. Required.
        - name: x-ms-qps-transmission-time
          in: header
          required: false
          schema:
            type: integer
          description: Timestamp when the client transmits the metrics and documents to Live Metrics. A 8-byte long type of ticks. Default value is None.
        - name: x-ms-qps-machine-name
          in: header
          required: false
          schema:
            type: string
          description: Computer name where Application Insights SDK lives. Live Metrics uses machine name with instance name as a backup. Default value is None.
        - name: x-ms-qps-instance-name
          in: header
          required: false
          schema:
            type: string
          description: Service instance name where Application Insights SDK lives. Live Metrics uses machine name with instance name as a backup. Default value is None.
        - name: x-ms-qps-stream-id
          in: header
          required: false
          schema:
            type: string
          description: Identifies an Application Insights SDK as trusted agent to report metrics and documents. Default value is None.
        - name: x-ms-qps-role-name
          in: header
          required: false
          schema:
            type: string
          description: Cloud role name of the service. Default value is None.
        - name: x-ms-qps-invariant-version
          in: header
          required: false
          schema:
            type: string
          description: Version/generation of the data contract (MonitoringDataPoint) between the client and Live Metrics. Default value is None.
        - name: x-ms-qps-configuration-etag
          in: header
          required: false
          schema:
            type: string
          description: An encoded string that indicates whether the collection configuration is changed. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Version:
                  type: string
                  description: Application Insights SDK version. Required.
                InvariantVersion:
                  type: integer
                  description: Version/generation of the data contract (MonitoringDataPoint) between SDK and Live Metrics. Required.
                Instance:
                  type: string
                  description: Service instance name where Application Insights SDK lives. Required.
                RoleName:
                  type: string
                  description: Service role name. Required.
                MachineName:
                  type: string
                  description: Computer name where Application Insights SDK lives. Required.
                StreamId:
                  type: string
                  description: Identifies an Application Insights SDK as a trusted agent to report metrics and documents. Required.
                Timestamp:
                  type: string
                  format: date-time
                  description: Data point generation timestamp.
                TransmissionTime:
                  type: string
                  format: date-time
                  description: Timestamp when the client transmits the metrics and documents to Live Metrics.
                IsWebApp:
                  type: boolean
                  description: True if the current application is an Azure Web App. Required.
                PerformanceCollectionSupported:
                  type: boolean
                  description: True if performance counters collection is supported. Required.
                Metrics:
                  type: array
                  items:
                    $ref: "#/components/schemas/MetricPoint"
                  description: An array of metric data points.
                Documents:
                  type: array
                  items:
                    $ref: "#/components/schemas/DocumentIngress"
                  description: An array of documents of a specific type {Request}, {RemoteDependency}, {Exception}, {Event}, or {Trace}.
                TopCpuProcesses:
                  type: array
                  items:
                    $ref: "#/components/schemas/ProcessCpuData"
                  description: An array of top cpu consumption data point.
                CollectionConfigurationErrors:
                  type: array
                  items:
                    $ref: "#/components/schemas/CollectionConfigurationError"
                  description: An array of error while SDK parses and applies the {CollectionConfigurationInfo} provided by Live Metrics.
              required:
                - Version
                - InvariantVersion
                - Instance
                - RoleName
                - MachineName
                - StreamId
                - IsWebApp
                - PerformanceCollectionSupported
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionConfigurationInfo"
  /QuickPulseService.svc/post?api-version=2024-04-01-preview:
    post:
      operationId: _LiveMetricsClient_publish
      description: Publish live metrics to the Live Metrics service when there is an active subscription to the metrics.
      parameters:
        - name: ikey
          in: query
          required: true
          schema:
            type: string
          description: The instrumentation key of the target Application Insights component for which the client checks whether there's any subscription to it. Required.
        - name: x-ms-qps-configuration-etag
          in: header
          required: false
          schema:
            type: string
          description: An encoded string that indicates whether the collection configuration is changed. Default value is None.
        - name: x-ms-qps-transmission-time
          in: header
          required: false
          schema:
            type: integer
          description: Timestamp when the client transmits the metrics and documents to Live Metrics. A 8-byte long type of ticks. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Version:
                  type: string
                  description: Application Insights SDK version. Required.
                InvariantVersion:
                  type: integer
                  description: Version/generation of the data contract (MonitoringDataPoint) between SDK and Live Metrics. Required.
                Instance:
                  type: string
                  description: Service instance name where Application Insights SDK lives. Required.
                RoleName:
                  type: string
                  description: Service role name. Required.
                MachineName:
                  type: string
                  description: Computer name where Application Insights SDK lives. Required.
                StreamId:
                  type: string
                  description: Identifies an Application Insights SDK as a trusted agent to report metrics and documents. Required.
                Timestamp:
                  type: string
                  format: date-time
                  description: Data point generation timestamp.
                TransmissionTime:
                  type: string
                  format: date-time
                  description: Timestamp when the client transmits the metrics and documents to Live Metrics.
                IsWebApp:
                  type: boolean
                  description: True if the current application is an Azure Web App. Required.
                PerformanceCollectionSupported:
                  type: boolean
                  description: True if performance counters collection is supported. Required.
                Metrics:
                  type: array
                  items:
                    $ref: "#/components/schemas/MetricPoint"
                  description: An array of metric data points.
                Documents:
                  type: array
                  items:
                    $ref: "#/components/schemas/DocumentIngress"
                  description: An array of documents of a specific type {Request}, {RemoteDependency}, {Exception}, {Event}, or {Trace}.
                TopCpuProcesses:
                  type: array
                  items:
                    $ref: "#/components/schemas/ProcessCpuData"
                  description: An array of top cpu consumption data point.
                CollectionConfigurationErrors:
                  type: array
                  items:
                    $ref: "#/components/schemas/CollectionConfigurationError"
                  description: An array of error while SDK parses and applies the {CollectionConfigurationInfo} provided by Live Metrics.
              required:
                - Version
                - InvariantVersion
                - Instance
                - RoleName
                - MachineName
                - StreamId
                - IsWebApp
                - PerformanceCollectionSupported
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionConfigurationInfo"
