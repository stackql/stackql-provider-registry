      description: Lists virtual network links to a DNS forwarding ruleset.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: dns_forwarding_ruleset_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the DNS forwarding ruleset. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: $top
          in: query
          required: false
          schema:
            type: integer
          description: The maximum number of results to return. If not specified, returns up to 100 results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedVirtualNetworkLinkFlattened"
