paths:
  /text/blocklists/{blocklist_name}/blocklistItems?api-version=2023-10-01:
    get:
      operationId: BlocklistClient_list_text_blocklist_items
      description: Get All BlocklistItems By blocklistName. Get all blocklistItems in a text blocklist.
      parameters:
        - name: blocklist_name
          in: path
          required: true
          schema:
            type: string
          description: Text blocklist name. Required.
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: The number of result items to return. Default value is None.
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: The number of result items to skip. Default value is None.
        - name: maxpagesize
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedTextBlocklistItem"
  /text/blocklists?api-version=2023-10-01:
    get:
      operationId: BlocklistClient_list_text_blocklists
      description: Get All Text Blocklists. Get all text blocklists details.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedTextBlocklist"
  /text/blocklists/{blocklist_name}?api-version=2023-10-01:
    get:
      operationId: BlocklistClient_get_text_blocklist
      description: Get Text Blocklist By blocklistName. Returns text blocklist details.
      parameters:
        - name: blocklist_name
          in: path
          required: true
          schema:
            type: string
          description: Text blocklist name. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextBlocklist"
    patch:
      operationId: BlocklistClient_create_or_update_text_blocklist
      description: Create Or Update Text Blocklist. Updates a text blocklist. If the blocklistName does not exist, a new blocklist will be created.
      parameters:
        - name: blocklist_name
          in: path
          required: true
          schema:
            type: string
          description: Text blocklist name. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                blocklistName:
                  type: string
                  description: Text blocklist name. Required.
                description:
                  type: string
                  description: Text blocklist description.
              required:
                - blocklistName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextBlocklist"
    delete:
      operationId: BlocklistClient_delete_text_blocklist
      description: Delete Text Blocklist By blocklistName. Deletes a text blocklist.
      parameters:
        - name: blocklist_name
          in: path
          required: true
          schema:
            type: string
          description: Text blocklist name. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /text/blocklists/{blocklist_name}/blocklistItems/{blocklist_item_id}?api-version=2023-10-01:
    get:
      operationId: BlocklistClient_get_text_blocklist_item
      description: Get BlocklistItem By blocklistName And blocklistItemId. Get blocklistItem by blocklistName and blocklistItemId from a text blocklist.
      parameters:
        - name: blocklist_name
          in: path
          required: true
          schema:
            type: string
          description: Text blocklist name. Required.
        - name: blocklist_item_id
          in: path
          required: true
          schema:
            type: string
          description: The service will generate a BlocklistItemId, which will be a UUID. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextBlocklistItem"
  /text/blocklists/{blocklist_name}:addOrUpdateBlocklistItems?api-version=2023-10-01:
    post:
      operationId: BlocklistClient_add_or_update_blocklist_items
      description: Add or update BlocklistItems To Text Blocklist. Add or update blocklistItems to a text blocklist. You can add or update at most 100 blocklistItems in one request.
      parameters:
        - name: blocklist_name
          in: path
          required: true
          schema:
            type: string
          description: Text blocklist name. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                blocklistItems:
                  type: array
                  items:
                    $ref: "#/components/schemas/TextBlocklistItem"
                  description: Array of blocklistItems to add. Required.
              required:
                - blocklistItems
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddOrUpdateTextBlocklistItemsResult"
  /text/blocklists/{blocklist_name}:removeBlocklistItems?api-version=2023-10-01:
    post:
      operationId: BlocklistClient_remove_blocklist_items
      description: Remove BlocklistItems From Text Blocklist. Remove blocklistItems from a text blocklist. You can remove at most 100 BlocklistItems in one request.
      parameters:
        - name: blocklist_name
          in: path
          required: true
          schema:
            type: string
          description: Text blocklist name. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                blocklistItemIds:
                  type: array
                  items:
                    type: string
                  description: Array of blocklistItemIds to remove. Required.
              required:
                - blocklistItemIds
      responses:
        "200":
          description: Success
  /text:analyze?api-version=2023-10-01:
    post:
      operationId: ContentSafetyClient_analyze_text
      description: "Analyze Text. A synchronous API for the analysis of potentially harmful text content. Currently, it supports four categories: Hate, SelfHarm, Sexual, and Violence."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                  description: The text needs to be analyzed. We support a maximum of 10k Unicode characters (Unicode code points) in the text of one request. Required.
                categories:
                  type: array
                  items:
                    $ref: "#/components/schemas/TextCategory"
                  description: The categories will be analyzed. If they are not assigned, a default set of analysis results for the categories will be returned.
                blocklistNames:
                  type: array
                  items:
                    type: string
                  description: The names of blocklists.
                haltOnBlocklistHit:
                  type: boolean
                  description: When set to true, further analyses of harmful content will not be performed in cases where blocklists are hit. When set to false, all analyses of harmful content will be performed, whether or not blocklists are hit.
                outputType:
                  $ref: "#/components/schemas/AnalyzeTextOutputType"
                  description: 'This refers to the type of text analysis output. If no value is assigned, the default value will be "FourSeverityLevels". Known values are: "FourSeverityLevels" and "EightSeverityLevels".'
              required:
                - text
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeTextResult"
  /image:analyze?api-version=2023-10-01:
    post:
      operationId: ContentSafetyClient_analyze_image
      description: "Analyze Image. A synchronous API for the analysis of potentially harmful image content. Currently, it supports four categories: Hate, SelfHarm, Sexual, and Violence."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                image:
                  $ref: "#/components/schemas/ImageData"
                  description: The image needs to be analyzed. Required.
                categories:
                  type: array
                  items:
                    $ref: "#/components/schemas/ImageCategory"
                  description: The categories will be analyzed. If they are not assigned, a default set of analysis results for the categories will be returned.
                outputType:
                  $ref: "#/components/schemas/AnalyzeImageOutputType"
                  description: This refers to the type of image analysis output. If no value is assigned, the default value will be "FourSeverityLevels". "FourSeverityLevels"
              required:
                - image
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeImageResult"
