openapi: 3.0.0
servers:
  - url: https://{endpoint}/contentsafety
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure AI Content Safety (Data Plane)
  description: Detect harmful text and image content, manage blocklists and analyze content risk.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2023-10-01-stackql-generated
  x-serviceAlias: ai_content_safety
  x-sdkPackage: azure-ai-contentsafety
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    TextBlocklistItem:
      type: object
      description: Item in a TextBlocklist. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        blocklistItemId:
          type: string
          description: The service will generate a BlocklistItemId, which will be a UUID. Required.
        description:
          type: string
          description: BlocklistItem description.
        text:
          type: string
          description: BlocklistItem content. Required.
      required:
        - text
    PagedTextBlocklistItem:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TextBlocklistItem"
        nextLink:
          type: string
    TextBlocklist:
      type: object
      description: Text Blocklist. All required parameters must be populated in order to send to server.
      properties:
        blocklistName:
          type: string
          description: Text blocklist name. Required.
        description:
          type: string
          description: Text blocklist description.
      required:
        - blocklistName
    PagedTextBlocklist:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TextBlocklist"
        nextLink:
          type: string
    AddOrUpdateTextBlocklistItemsResult:
      type: object
      description: The response of adding blocklistItems to the text blocklist. All required parameters must be populated in order to send to server.
      properties:
        blocklistItems:
          type: array
          items:
            $ref: "#/components/schemas/TextBlocklistItem"
          description: Array of blocklistItems have been added. Required.
      required:
        - blocklistItems
    TextCategory:
      type: string
      enum:
        - Hate
        - SelfHarm
        - Sexual
        - Violence
    AnalyzeTextOutputType:
      type: string
      enum:
        - FourSeverityLevels
        - EightSeverityLevels
    AnalyzeTextResult:
      type: object
      description: The text analysis response. All required parameters must be populated in order to send to server.
      properties:
        blocklistsMatch:
          type: array
          items:
            $ref: "#/components/schemas/TextBlocklistMatch"
          description: The blocklist match details.
        categoriesAnalysis:
          type: array
          items:
            $ref: "#/components/schemas/TextCategoriesAnalysis"
          description: Analysis result for categories. Required.
      required:
        - categoriesAnalysis
    TextBlocklistMatch:
      type: object
      description: The result of blocklist match. All required parameters must be populated in order to send to server.
      properties:
        blocklistName:
          type: string
          description: The name of the matched blocklist. Required.
        blocklistItemId:
          type: string
          description: The ID of the matched item. Required.
        blocklistItemText:
          type: string
          description: The content of the matched item. Required.
      required:
        - blocklistName
        - blocklistItemId
        - blocklistItemText
    TextCategoriesAnalysis:
      type: object
      description: Text analysis result. All required parameters must be populated in order to send to server.
      properties:
        category:
          $ref: "#/components/schemas/TextCategory"
          description: 'The text analysis category. Required. Known values are: "Hate", "SelfHarm", "Sexual", and "Violence".'
        severity:
          type: integer
          description: The value increases with the severity of the input content. The value of this field is determined by the output type specified in the request. The output type could be ‘FourSeverityLevels’ or ‘EightSeverity Levels’, and the output value can be 0, 2, 4, 6 or 0, 1, 2, 3, 4, 5, 6, or 7.
      required:
        - category
    ImageData:
      type: object
      description: The image can be either base64 encoded bytes or a blob URL. You can choose only one of these options. If both are provided, the request will be refused. The maximum image size is 2048 x 2048 pixels and should not exceed 4 MB, while the minimum image size is 50 x 50 pixels.
      properties:
        content:
          type: string
          format: byte
          description: The Base64 encoding of the image.
        blobUrl:
          type: string
          description: The blob url of the image.
    ImageCategory:
      type: string
      enum:
        - Hate
        - SelfHarm
        - Sexual
        - Violence
    AnalyzeImageOutputType:
      type: string
      enum:
        - FourSeverityLevels
    AnalyzeImageResult:
      type: object
      description: The image analysis response. All required parameters must be populated in order to send to server.
      properties:
        categoriesAnalysis:
          type: array
          items:
            $ref: "#/components/schemas/ImageCategoriesAnalysis"
          description: Analysis result for categories. Required.
      required:
        - categoriesAnalysis
    ImageCategoriesAnalysis:
      type: object
      description: Image analysis result. All required parameters must be populated in order to send to server.
      properties:
        category:
          $ref: "#/components/schemas/ImageCategory"
          description: 'The image analysis category. Required. Known values are: "Hate", "SelfHarm", "Sexual", and "Violence".'
        severity:
          type: integer
          description: The value increases with the severity of the input content. The value of this field is determined by the output type specified in the request. The output type could be ‘FourSeverityLevels’, and the output value can be 0, 2, 4, 6.
      required:
        - category
  x-stackQL-resources:
    text_blocklist_items:
      id: azure.ai_content_safety.text_blocklist_items
