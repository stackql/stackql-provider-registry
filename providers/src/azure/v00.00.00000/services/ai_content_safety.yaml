            objectKey: $.value
          request:
            nativeCasing: camel
        get_text_blocklist_item:
          operation:
            $ref: "#/paths/~1text~1blocklists~1{blocklist_name}~1blocklistItems~1{blocklist_item_id}?api-version=2023-10-01/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/text_blocklist_items/methods/get_text_blocklist_item"
          - $ref: "#/components/x-stackQL-resources/text_blocklist_items/methods/list_text_blocklist_items"
        insert: []
        update: []
        delete: []
    text_blocklists:
      id: azure.ai_content_safety.text_blocklists
      name: text_blocklists
      title: text_blocklists
      methods:
