    analyze_texts:
      id: azure.ai_content_safety.analyze_texts
      name: analyze_texts
      title: analyze_texts
      methods:
        analyze_text:
          operation:
            $ref: "#/paths/~1text:analyze?api-version=2023-10-01/post"
          response:
