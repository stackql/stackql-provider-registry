paths:
  /keys/{key_name}/{key_version}?api-version=2026-01-01-preview:
    get:
      operationId: _KeyVaultClient_get_key
      description: Gets the public part of a stored key. The get key operation is applicable to all key types. If the requested key is symmetric, then no key material is released in the response. This operation requires the keys/get permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key to get. Required.
        - name: key_version
          in: path
          required: true
          schema:
            type: string
          description: Adding the version parameter retrieves a specific version of a key. This URI fragment is optional. If not specified, the latest version of the key is returned. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyBundle"
    patch:
      operationId: _KeyVaultClient_update_key
      description: "The update key operation changes specified attributes of a stored key and can be applied to any key type and key version stored in Azure Key Vault. In order to perform this operation, the key must already exist in the Key Vault. Note: The cryptographic material of a key itself cannot be changed. This operation requires the keys/update permission."
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of key to update. Required.
        - name: key_version
          in: path
          required: true
          schema:
            type: string
          description: The version of the key to update. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key_ops:
                  type: array
                  items:
                    $ref: "#/components/schemas/JsonWebKeyOperation"
                  description: Json web key operations. For more information on possible key operations, see JsonWebKeyOperation.
                attributes:
                  $ref: "#/components/schemas/KeyAttributes"
                  description: The attributes of a key managed by the key vault service.
                tags:
                  type: object
                  properties: {}
                  description: Application specific metadata in the form of key-value pairs.
                release_policy:
                  $ref: "#/components/schemas/KeyReleasePolicy"
                  description: The policy rules under which the key can be exported.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyBundle"
  /keys/{key_name}/versions?api-version=2026-01-01-preview:
    get:
      operationId: _KeyVaultClient_get_key_versions
      description: Retrieves a list of individual key versions with the same key name. The full key identifier, attributes, and tags are provided in the response. This operation requires the keys/list permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key. Required.
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedKeyItem"
  /keys?api-version=2026-01-01-preview:
    get:
      operationId: _KeyVaultClient_get_keys
      description: List keys in the specified vault. Retrieves a list of the keys in the Key Vault as JSON Web Key structures that contain the public part of a stored key. The LIST operation is applicable to all key types, however only the base key identifier, attributes, and tags are provided in the response. Individual versions of a key are not listed in the response. This operation requires the keys/list permission.
      parameters:
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedKeyItem"
  /deletedkeys?api-version=2026-01-01-preview:
    get:
      operationId: _KeyVaultClient_get_deleted_keys
      description: Lists the deleted keys in the specified vault. Retrieves a list of the keys in the Key Vault as JSON Web Key structures that contain the public part of a deleted key. This operation includes deletion-specific information. The Get Deleted Keys operation is applicable for vaults enabled for soft-delete. While the operation can be invoked on any vault, it will return an error if invoked on a non soft-delete enabled vault. This operation requires the keys/list permission.
      parameters:
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDeletedKeyItem"
  /deletedkeys/{key_name}?api-version=2026-01-01-preview:
    get:
      operationId: _KeyVaultClient_get_deleted_key
      description: Gets the public part of a deleted key. The Get Deleted Key operation is applicable for soft-delete enabled vaults. While the operation can be invoked on any vault, it will return an error if invoked on a non soft-delete enabled vault. This operation requires the keys/get permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedKeyBundle"
    delete:
      operationId: _KeyVaultClient_purge_deleted_key
      description: Permanently deletes the specified key. The Purge Deleted Key operation is applicable for soft-delete enabled vaults. While the operation can be invoked on any vault, it will return an error if invoked on a non soft-delete enabled vault. This operation requires the keys/purge permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /keys/{key_name}/rotationpolicy?api-version=2026-01-01-preview:
    get:
      operationId: _KeyVaultClient_get_key_rotation_policy
      description: Lists the policy for a key. The GetKeyRotationPolicy operation returns the specified key policy resources in the specified key vault. This operation requires the keys/get permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key in a given key vault. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyRotationPolicy"
    put:
      operationId: _KeyVaultClient_update_key_rotation_policy
      description: Updates the rotation policy for a key. Set specified members in the key policy. Leave others as undefined. This operation requires the keys/update permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key in the given vault. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lifetimeActions:
                  type: array
                  items:
                    $ref: "#/components/schemas/LifetimeActions"
                  description: "Actions that will be performed by Key Vault over the lifetime of a key. For preview, lifetimeActions can only have two items at maximum: one for rotate, one for notify. Notification time would be default to 30 days before expiry and it is not configurable."
                attributes:
                  $ref: "#/components/schemas/KeyRotationPolicyAttributes"
                  description: The key rotation policy attributes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyRotationPolicy"
  /rng?api-version=2026-01-01-preview:
    post:
      operationId: _KeyVaultClient_get_random_bytes
      description: Get the requested number of bytes containing random values. Get the requested number of bytes containing random values from a managed HSM.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                count:
                  type: integer
                  description: The requested number of random bytes. Required.
              required:
                - count
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RandomBytes"
  /keys/{key_name}/{key_version}/attestation?api-version=2026-01-01-preview:
    get:
      operationId: _KeyVaultClient_get_key_attestation
      description: Gets the public part of a stored key along with its attestation blob. The get key attestation operation returns the key along with its attestation blob. This operation requires the keys/get permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key to retrieve attestation for. Required.
        - name: key_version
          in: path
          required: true
          schema:
            type: string
          description: Adding the version parameter retrieves attestation blob for specific version of a key. This URI fragment is optional. If not specified, the latest version of the key attestation blob is returned. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyBundle"
  /keys/{key_name}/create?api-version=2026-01-01-preview:
    post:
      operationId: _KeyVaultClient_create_key
      description: Creates a new key, stores it, then returns key parameters and attributes to the client. The create key operation can be used to create any key type in Azure Key Vault. If the named key already exists, Azure Key Vault creates a new version of the key. It requires the keys/create permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name for the new key. The system will generate the version name for the new key. The value you provide may be copied globally for the purpose of running the service. The value provided should not include personally identifiable or sensitive information. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kty:
                  $ref: "#/components/schemas/JsonWebKeyType"
                  description: 'The type of key to create. For valid values, see JsonWebKeyType. Required. Known values are: "EC", "EC-HSM", "RSA", "RSA-HSM", "oct", and "oct-HSM".'
                key_size:
                  type: integer
                  description: "The key size in bits. For example: 2048, 3072, or 4096 for RSA."
                public_exponent:
                  type: integer
                  description: The public exponent for a RSA key.
                key_ops:
                  type: array
                  items:
                    $ref: "#/components/schemas/JsonWebKeyOperation"
                  description: Json web key operations. For more information on possible key operations, see JsonWebKeyOperation.
                attributes:
                  $ref: "#/components/schemas/KeyAttributes"
                  description: The attributes of a key managed by the key vault service.
                tags:
                  type: object
                  properties: {}
                  description: Application specific metadata in the form of key-value pairs.
                crv:
                  $ref: "#/components/schemas/JsonWebKeyCurveName"
                  description: 'Elliptic curve name. For valid values, see JsonWebKeyCurveName. Known values are: "P-256", "P-384", "P-521", and "P-256K".'
                release_policy:
                  $ref: "#/components/schemas/KeyReleasePolicy"
                  description: The policy rules under which the key can be exported.
              required:
                - kty
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyBundle"
  /keys/{key_name}/rotate?api-version=2026-01-01-preview:
    post:
      operationId: _KeyVaultClient_rotate_key
      description: Creates a new key version, stores it, then returns key parameters, attributes and policy to the client. The operation will rotate the key based on the key policy. It requires the keys/rotate permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of key to be rotated. The system will generate a new version in the specified key. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyBundle"
  /keys/{key_name}?api-version=2026-01-01-preview:
    put:
      operationId: _KeyVaultClient_import_key
      description: Imports an externally created key, stores it, and returns key parameters and attributes to the client. The import key operation may be used to import any key type into an Azure Key Vault. If the named key already exists, Azure Key Vault creates a new version of the key. This operation requires the keys/import permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: Name for the imported key. The value you provide may be copied globally for the purpose of running the service. The value provided should not include personally identifiable or sensitive information. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Hsm:
                  type: boolean
                  description: Whether to import as a hardware key (HSM) or software key.
                key:
                  $ref: "#/components/schemas/JsonWebKey"
                  description: The Json web key. Required.
                attributes:
                  $ref: "#/components/schemas/KeyAttributes"
                  description: The key management attributes.
                tags:
                  type: object
                  properties: {}
                  description: Application specific metadata in the form of key-value pairs.
                release_policy:
                  $ref: "#/components/schemas/KeyReleasePolicy"
                  description: The policy rules under which the key can be exported.
              required:
                - key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyBundle"
    delete:
      operationId: _KeyVaultClient_delete_key
      description: Deletes a key of any type from storage in Azure Key Vault. The delete key operation cannot be used to remove individual versions of a key. This operation removes the cryptographic material associated with the key, which means the key is not usable for Sign/Verify, Wrap/Unwrap or Encrypt/Decrypt operations. This operation requires the keys/delete permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key to delete. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedKeyBundle"
  /keys/{key_name}/backup?api-version=2026-01-01-preview:
    post:
      operationId: _KeyVaultClient_backup_key
      description: Requests that a backup of the specified key be downloaded to the client. The Key Backup operation exports a key from Azure Key Vault in a protected form. Note that this operation does NOT return key material in a form that can be used outside the Azure Key Vault system, the returned key material is either protected to a Azure Key Vault HSM or to Azure Key Vault itself. The intent of this operation is to allow a client to GENERATE a key in one Azure Key Vault instance, BACKUP the key, and then RESTORE it into another Azure Key Vault instance. The BACKUP operation may be used to export, in protected form, any key type from Azure Key Vault. Individual versions of a key cannot be backed up. BACKUP / RESTORE can be performed within geographical boundaries only; meaning that a BACKUP from one geographical area cannot be restored to another geographical area. For example, a backup from the US geographical area cannot be restored in an EU geographical area. This operation requires the key/backup permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupKeyResult"
  /keys/restore?api-version=2026-01-01-preview:
    post:
      operationId: _KeyVaultClient_restore_key
      description: "Restores a backed up key to a vault. Imports a previously backed up key into Azure Key Vault, restoring the key, its key identifier, attributes and access control policies. The RESTORE operation may be used to import a previously backed up key. Individual versions of a key cannot be restored. The key is restored in its entirety with the same key name as it had when it was backed up. If the key name is not available in the target Key Vault, the RESTORE operation will be rejected. While the key name is retained during restore, the final key identifier will change if the key is restored to a different vault. Restore will restore all versions and preserve version identifiers. The RESTORE operation is subject to security constraints: The target Key Vault must be owned by the same Microsoft Azure Subscription as the source Key Vault The user must have RESTORE permission in the target Key Vault. This operation requires the keys/restore permission."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  format: byte
                  description: The backup blob associated with a key bundle. Required.
              required:
                - value
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyBundle"
  /keys/{key_name}/{key_version}/encrypt?api-version=2026-01-01-preview:
    post:
      operationId: _KeyVaultClient_encrypt
      description: Encrypts an arbitrary sequence of bytes using an encryption key that is stored in a key vault. The ENCRYPT operation encrypts an arbitrary sequence of bytes using an encryption key that is stored in Azure Key Vault. Note that the ENCRYPT operation only supports a single block of data, the size of which is dependent on the target key and the encryption algorithm to be used. The ENCRYPT operation is only strictly necessary for symmetric keys stored in Azure Key Vault since protection with an asymmetric key can be performed using public portion of the key. This operation is supported for asymmetric keys as a convenience for callers that have a key-reference but do not have access to the public key material. This operation requires the keys/encrypt permission.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key. Required.
        - name: key_version
          in: path
          required: true
          schema:
            type: string
          description: The version of the key. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alg:
                  $ref: "#/components/schemas/JsonWebKeyEncryptionAlgorithm"
                  description: 'algorithm identifier. Required. Known values are: "RSA-OAEP", "RSA-OAEP-256", "RSA1_5", "A128GCM", "A192GCM", "A256GCM", "A128KW", "A192KW", "A256KW", "A128CBC", "A192CBC", "A256CBC", "A128CBCPAD", "A192CBCPAD", "A256CBCPAD", "CKM_AES_KEY_WRAP", and "CKM_AES_KEY_WRAP_PAD".'
                value:
                  type: string
                  format: byte
                  description: The value to operate on. Required.
                iv:
                  type: string
                  format: byte
                  description: Cryptographically random, non-repeating initialization vector for symmetric algorithms.
                aad:
                  type: string
                  format: byte
                  description: Additional data to authenticate but not encrypt/decrypt when using authenticated crypto algorithms.
                tag:
                  type: string
                  format: byte
                  description: The tag to authenticate when performing decryption with an authenticated algorithm.
              required:
                - alg
                - value
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyOperationResult"
  /keys/{key_name}/{key_version}/decrypt?api-version=2026-01-01-preview:
    post:
      operationId: _KeyVaultClient_decrypt
      description: Decrypts a single block of encrypted data. The DECRYPT operation decrypts a well-formed block of ciphertext using the target encryption key and specified algorithm. This operation is the reverse of the ENCRYPT operation; only a single block of data may be decrypted, the size of this block is dependent on the target key and the algorithm to be used. The DECRYPT operation applies to asymmetric and symmetric keys stored in Azure Key Vault since it uses the private portion of the key. This operation requires the keys/decrypt permission. Microsoft recommends not to use CBC algorithms for decryption without first ensuring the integrity of the ciphertext using an HMAC, for example. See `https://learn.microsoft.com/dotnet/standard/security/vulnerabilities-cbc-mode `_ for more information.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the key. Required.
        - name: key_version
          in: path
          required: true
          schema:
            type: string
          description: The version of the key. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alg:
                  $ref: "#/components/schemas/JsonWebKeyEncryptionAlgorithm"
                  description: 'algorithm identifier. Required. Known values are: "RSA-OAEP", "RSA-OAEP-256", "RSA1_5", "A128GCM", "A192GCM", "A256GCM", "A128KW", "A192KW", "A256KW", "A128CBC", "A192CBC", "A256CBC", "A128CBCPAD", "A192CBCPAD", "A256CBCPAD", "CKM_AES_KEY_WRAP", and "CKM_AES_KEY_WRAP_PAD".'
                value:
                  type: string
                  format: byte
                  description: The value to operate on. Required.
                iv:
                  type: string
                  format: byte
                  description: Cryptographically random, non-repeating initialization vector for symmetric algorithms.
                aad:
                  type: string
                  format: byte
                  description: Additional data to authenticate but not encrypt/decrypt when using authenticated crypto algorithms.
                tag:
                  type: string
                  format: byte
                  description: The tag to authenticate when performing decryption with an authenticated algorithm.
              required:
                - alg
                - value
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyOperationResult"
  /keys/{key_name}/{key_version}/sign?api-version=2026-01-01-preview:
    post:
      operationId: _KeyVaultClient_sign
