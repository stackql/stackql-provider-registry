openapi: 3.0.0
servers:
  - url: https://{vault_name}.vault.azure.net
    variables:
      vault_name:
        default: ""
        description: Key vault name.
info:
  title: Azure Key Vault - Keys (Data Plane)
  description: "Key lifecycle plus cryptographic operations: encrypt, sign, wrap, rotate."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-01-01-preview-stackql-generated
  x-serviceAlias: key_vault_keys
  x-sdkPackage: azure-keyvault-keys
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    JsonWebKey:
      type: object
      description: As of `http://tools.ietf.org/html/draft-ietf-jose-json-web-key-18 `_.
      properties:
        kid:
          type: string
          description: Key identifier.
        kty:
          $ref: "#/components/schemas/JsonWebKeyType"
          description: 'JsonWebKey Key Type (kty), as defined in `https://tools.ietf.org/html/draft-ietf-jose-json-web-algorithms-40 `_. Known values are: "EC", "EC-HSM", "RSA", "RSA-HSM", "oct", and "oct-HSM".'
        key_ops:
          type: array
          items:
            type: string
          description: Json web key operations. For more information on possible key operations, see JsonWebKeyOperation.
        "n":
          type: string
          format: byte
          description: RSA modulus.
        e:
          type: string
          format: byte
          description: RSA public exponent.
        d:
          type: string
          format: byte
          description: RSA private exponent, or the D component of an EC private key.
        dp:
          type: string
          format: byte
          description: RSA private key parameter.
        dq:
          type: string
          format: byte
          description: RSA private key parameter.
        qi:
          type: string
          format: byte
          description: RSA private key parameter.
        p:
          type: string
          format: byte
          description: RSA secret prime.
        q:
          type: string
          format: byte
          description: RSA secret prime, with p < q.
        k:
          type: string
          format: byte
          description: Symmetric key.
        key_hsm:
          type: string
          format: byte
          description: Protected Key, used with 'Bring Your Own Key'.
        crv:
          $ref: "#/components/schemas/JsonWebKeyCurveName"
          description: 'Elliptic curve name. For valid values, see JsonWebKeyCurveName. Known values are: "P-256", "P-384", "P-521", and "P-256K".'
        x:
          type: string
          format: byte
          description: X component of an EC public key.
        "y":
          type: string
          format: byte
          description: Y component of an EC public key.
    JsonWebKeyType:
      type: string
      enum:
        - EC
        - EC-HSM
        - RSA
        - RSA-HSM
        - oct
        - oct-HSM
    JsonWebKeyCurveName:
      type: string
      enum:
        - P-256
        - P-384
        - P-521
        - P-256K
    KeyAttributes:
      type: object
      description: The attributes of a key managed by the key vault service.
      properties:
        enabled:
          type: boolean
          description: Determines whether the object is enabled.
        nbf:
          type: string
          format: date-time
          description: Not before date in UTC.
        exp:
          type: string
          format: date-time
          description: Expiry date in UTC.
        created:
          type: string
          format: date-time
          description: Creation time in UTC.
        updated:
          type: string
          format: date-time
          description: Last updated time in UTC.
        recoverableDays:
          type: integer
          description: softDelete data retention days. Value should be >=7 and <=90 when softDelete enabled, otherwise 0.
        recoveryLevel:
          $ref: "#/components/schemas/DeletionRecoveryLevel"
          description: "Reflects the deletion recovery level currently in effect for keys in the current vault. If it contains 'Purgeable' the key can be permanently deleted by a privileged user; otherwise, only the system can purge the key, at the end of the retention interval. Known values are: \"Purgeable\", \"Recoverable+Purgeable\", \"Recoverable\", \"Recoverable+ProtectedSubscription\", \"CustomizedRecoverable+Purgeable\", \"CustomizedRecoverable\", and \"CustomizedRecoverable+ProtectedSubscription\"."
        exportable:
          type: boolean
          description: Indicates if the private key can be exported. Release policy must be provided when creating the first version of an exportable key.
        hsmPlatform:
          type: string
          description: The underlying HSM Platform.
        attestation:
          $ref: "#/components/schemas/KeyAttestation"
          description: The key or key version attestation information.
        external_key:
          $ref: "#/components/schemas/ExternalKey"
          description: The external key information.
        key_size:
          type: integer
          description: "The optional key size in bits for symmetric keys. For example: 128, 192, or 256 for AES keys."
    DeletionRecoveryLevel:
      type: string
      enum:
        - Purgeable
        - Recoverable+Purgeable
        - Recoverable
        - Recoverable+ProtectedSubscription
        - CustomizedRecoverable+Purgeable
        - CustomizedRecoverable
        - CustomizedRecoverable+ProtectedSubscription
    KeyAttestation:
      type: object
      description: The key attestation information.
      properties:
        certificatePemFile:
          type: string
          format: byte
          description: A base64url-encoded string containing certificates in PEM format, used for attestation validation.
        privateKeyAttestation:
          type: string
          format: byte
          description: The attestation blob bytes encoded as base64url string corresponding to a private key.
        publicKeyAttestation:
          type: string
          format: byte
          description: The attestation blob bytes encoded as base64url string corresponding to a public key in case of asymmetric key.
        version:
          type: string
          description: The version of the attestation.
    ExternalKey:
      type: object
      description: External Key parameters.
      properties:
        id:
          type: string
          description: The external key identifier. The valid id can only contain characters in the set [a-zA-Z0-9-]. Maximum length is 64 characters. Required.
      required:
        - id
    KeyReleasePolicy:
      type: object
      description: The policy rules under which the key can be exported.
      properties:
        contentType:
          type: string
          description: Content type and version of key release policy.
        immutable:
          type: boolean
          description: Defines the mutability state of the policy. Once marked immutable, this flag cannot be reset and the policy cannot be changed under any circumstances.
        data:
          type: string
          format: byte
          description: Blob encoding the policy rules under which the key can be released. Blob must be base64 URL encoded.
    KeyBundle:
      type: object
      description: A KeyBundle consisting of a WebKey plus its attributes.
      properties:
        key:
          $ref: "#/components/schemas/JsonWebKey"
          description: The Json web key.
        attributes:
          $ref: "#/components/schemas/KeyAttributes"
          description: The key management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        managed:
          type: boolean
          description: True if the key's lifetime is managed by key vault. If this is a key backing a certificate, then managed will be true.
        release_policy:
          $ref: "#/components/schemas/KeyReleasePolicy"
          description: The policy rules under which the key can be exported.
    KeyItem:
      type: object
      description: The key item containing key metadata.
      properties:
        kid:
          type: string
          description: Key identifier.
        attributes:
          $ref: "#/components/schemas/KeyAttributes"
          description: The key management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        managed:
          type: boolean
          description: True if the key's lifetime is managed by key vault. If this is a key backing a certificate, then managed will be true.
    PagedKeyItem:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/KeyItem"
        nextLink:
          type: string
    DeletedKeyItem:
      type: object
      description: The deleted key item containing the deleted key metadata and information about deletion.
      properties:
        kid:
          type: string
          description: Key identifier.
        attributes:
          $ref: "#/components/schemas/KeyAttributes"
          description: The key management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        managed:
          type: boolean
          description: True if the key's lifetime is managed by key vault. If this is a key backing a certificate, then managed will be true.
        recoveryId:
          type: string
          description: The url of the recovery object, used to identify and recover the deleted key.
        scheduledPurgeDate:
          type: string
          format: date-time
          description: The time when the key is scheduled to be purged, in UTC.
        deletedDate:
          type: string
          format: date-time
          description: The time when the key was deleted, in UTC.
    PagedDeletedKeyItem:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DeletedKeyItem"
        nextLink:
          type: string
    DeletedKeyBundle:
      type: object
      description: A DeletedKeyBundle consisting of a WebKey plus its Attributes and deletion info.
      properties:
        key:
          $ref: "#/components/schemas/JsonWebKey"
          description: The Json web key.
        attributes:
          $ref: "#/components/schemas/KeyAttributes"
          description: The key management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        managed:
          type: boolean
          description: True if the key's lifetime is managed by key vault. If this is a key backing a certificate, then managed will be true.
        release_policy:
          $ref: "#/components/schemas/KeyReleasePolicy"
          description: The policy rules under which the key can be exported.
        recoveryId:
          type: string
          description: The url of the recovery object, used to identify and recover the deleted key.
        scheduledPurgeDate:
          type: string
          format: date-time
          description: The time when the key is scheduled to be purged, in UTC.
        deletedDate:
          type: string
          format: date-time
          description: The time when the key was deleted, in UTC.
    LifetimeActions:
      type: object
      description: Action and its trigger that will be performed by Key Vault over the lifetime of a key.
      properties:
        trigger:
          $ref: "#/components/schemas/LifetimeActionsTrigger"
          description: The condition that will execute the action.
        action:
          $ref: "#/components/schemas/LifetimeActionsType"
          description: The action that will be executed.
    LifetimeActionsTrigger:
      type: object
      description: A condition to be satisfied for an action to be executed.
      properties:
        timeAfterCreate:
          type: string
          description: 'Time after creation to attempt to rotate. It only applies to rotate. It will be in ISO 8601 duration format. Example: 90 days : "P90D".'
        timeBeforeExpiry:
          type: string
          description: 'Time before expiry to attempt to rotate or notify. It will be in ISO 8601 duration format. Example: 90 days : "P90D".'
    LifetimeActionsType:
      type: object
      description: The action that will be executed.
      properties:
        type:
          $ref: "#/components/schemas/KeyRotationPolicyAction"
          description: 'The type of the action. The value should be compared case-insensitively. Known values are: "Rotate" and "Notify".'
    KeyRotationPolicyAction:
      type: string
      enum:
        - Rotate
        - Notify
    KeyRotationPolicyAttributes:
      type: object
      description: The key rotation policy attributes.
      properties:
        expiryTime:
          type: string
          description: "The expiryTime will be applied on the new key version. It should be at least 28 days. It will be in ISO 8601 Format. Examples: 90 days: P90D, 3 months: P3M, 48 hours: PT48H, 1 year and 10 days: P1Y10D."
        created:
          type: string
          format: date-time
          description: The key rotation policy created time in UTC.
        updated:
          type: string
          format: date-time
          description: The key rotation policy's last updated time in UTC.
    KeyRotationPolicy:
      type: object
      description: Management policy for a key.
      properties:
        id:
          type: string
          description: The key policy id.
        lifetimeActions:
          type: array
          items:
            $ref: "#/components/schemas/LifetimeActions"
          description: "Actions that will be performed by Key Vault over the lifetime of a key. For preview, lifetimeActions can only have two items at maximum: one for rotate, one for notify. Notification time would be default to 30 days before expiry and it is not configurable."
        attributes:
          $ref: "#/components/schemas/KeyRotationPolicyAttributes"
          description: The key rotation policy attributes.
    RandomBytes:
      type: object
      description: The get random bytes response object containing the bytes.
      properties:
        value:
          type: string
          format: byte
          description: The bytes encoded as a base64url string. Required.
      required:
        - value
    JsonWebKeyOperation:
      type: string
      enum:
        - encrypt
        - decrypt
        - sign
        - verify
        - wrapKey
        - unwrapKey
        - import
        - export
    BackupKeyResult:
      type: object
      description: The backup key result, containing the backup blob.
      properties:
        value:
          type: string
          format: byte
          description: The backup blob containing the backed up key.
    JsonWebKeyEncryptionAlgorithm:
      type: string
      enum:
        - RSA-OAEP
        - RSA-OAEP-256
        - RSA1_5
        - A128GCM
        - A192GCM
        - A256GCM
        - A128KW
        - A192KW
        - A256KW
        - A128CBC
        - A192CBC
        - A256CBC
        - A128CBCPAD
        - A192CBCPAD
        - A256CBCPAD
        - CKM_AES_KEY_WRAP
        - CKM_AES_KEY_WRAP_PAD
    KeyOperationResult:
      type: object
      description: The key operation result.
      properties:
        kid:
          type: string
          description: Key identifier.
        value:
          type: string
          format: byte
          description: The result of the operation.
        iv:
          type: string
          format: byte
          description: Cryptographically random, non-repeating initialization vector for symmetric algorithms.
        tag:
          type: string
          format: byte
          description: The tag to authenticate when performing decryption with an authenticated algorithm.
        aad:
          type: string
          format: byte
          description: Additional data to authenticate but not encrypt/decrypt when using authenticated crypto algorithms.
    JsonWebKeySignatureAlgorithm:
      type: string
      enum:
        - PS256
        - PS384
        - PS512
        - RS256
        - RS384
        - RS512
        - HS256
        - HS384
        - HS512
        - RSNULL
        - ES256
        - ES384
        - ES512
        - ES256K
    KeyVerifyResult:
      type: object
      description: The key verify result.
      properties:
        value:
          type: boolean
          description: True if the signature is verified, otherwise false.
    JsonWebKeyWrapAlgorithm:
      type: string
      enum:
        - RSA-OAEP-256
        - A128KW
        - A192KW
        - A256KW
        - A256KWPAD
        - A128KWPAD
        - A192KWPAD
        - CKM_AES_KEY_WRAP
        - CKM_AES_KEY_WRAP_PAD
    SecureKeyOperationResult:
      type: object
      description: The secure key wrap operation result.
      properties:
        kid:
          type: string
          description: Key identifier. Required.
        alg:
          $ref: "#/components/schemas/JsonWebKeyWrapAlgorithm"
          description: 'The algorithm used for the operation. Required. Known values are: "RSA-OAEP-256", "A128KW", "A192KW", "A256KW", "A256KWPAD", "A128KWPAD", "A192KWPAD", "CKM_AES_KEY_WRAP", and "CKM_AES_KEY_WRAP_PAD".'
        value:
          type: string
          format: byte
          description: The result of the operation. Required.
      required:
        - kid
        - alg
        - value
    KeyEncryptionAlgorithm:
      type: string
      enum:
        - CKM_RSA_AES_KEY_WRAP
        - RSA_AES_KEY_WRAP_256
        - RSA_AES_KEY_WRAP_384
    KeyReleaseResult:
      type: object
      description: The release result, containing the released key.
      properties:
        value:
          type: string
          description: A signed object containing the released key.
