      properties:
        pem:
          type: string
          description: PEM formatted public key.
    CassandraError:
      type: object
      description: CassandraError.
      properties:
        code:
          type: string
          description: The code of error that occurred.
        message:
          type: string
          description: The message of the error.
        target:
          type: string
          description: The target resource of the error.
        additionalErrorInfo:
          type: string
          description: Additional information about the error.
    BackupSchedule:
      type: object
      description: BackupSchedule.
      properties:
        scheduleName:
          type: string
          description: The unique identifier of backup schedule.
        cronExpression:
          type: string
          description: The cron expression that defines when you want to back up your data.
        retentionInHours:
          type: integer
          description: The retention period (hours) of the backups. If you want to retain data forever, set retention to 0.
    ScheduledEventStrategy:
      type: string
      enum:
        - Ignore
        - StopAny
        - StopByRack
    AzureConnectionType:
      type: string
      enum:
        - None
        - VPN
    ManagedCassandraManagedServiceIdentity:
      type: object
      description: Identity for the resource.
      properties:
        principalId:
          type: string
          description: The object id of the identity resource.
        tenantId:
          type: string
          description: The tenant id of the resource.
        type:
          $ref: "#/components/schemas/ManagedCassandraResourceIdentityType"
          description: 'The type of the resource. Known values are: "SystemAssigned" and "None".'
    ManagedCassandraResourceIdentityType:
      type: string
