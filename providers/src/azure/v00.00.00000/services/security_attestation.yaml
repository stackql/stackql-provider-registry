openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Attestation Client
  description: Describes the interface for the per-tenant enclave service.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-06-01-stackql-generated
  x-serviceAlias: security_attestation
  x-sdkPackage: azure-security-attestation
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    AttestationResponse:
      type: object
      description: The result of an attestation operation.
      properties:
        token:
          type: string
          description: An RFC 7519 JSON Web Token, the body of which is an AttestationResult object.
    SealedAttestationResponse:
      type: object
      description: The sealed result of an attestation operation.
      properties:
        token:
          type: string
          description: Sealed RFC 7519 JSON Web Token with AttestationResult body.
    TpmAttestationResponse:
      type: object
      description: Attestation response for Trusted Platform Module (TPM) attestation.
      properties:
        data:
          type: string
          format: byte
          description: Protocol data containing attestation service response.
    OpenIDConfigurationResponse:
      type: object
      description: The response to the OpenID metadata description document API.
      properties:
        response_types_supported:
          type: array
          items:
            type: string
          description: Types supported in the OpenID metadata API.
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
          description: List of the supported signing algorithms.
        revocation_endpoint:
          type: string
          description: Revocation endpoint.
        issuer:
          type: string
          description: Issuer tenant base endpoint.
        jwks_uri:
          type: string
          description: The URI to retrieve the signing keys.
        claims_supported:
          type: array
          items:
            type: string
          description: Set of claims supported by the OpenID metadata endpoint.
    PolicyCertificatesResponse:
      type: object
      description: The response to an attestation policy management API.
      properties:
        token:
          type: string
          description: RFC7519 JSON Web Token containing PolicyCertificatesResults object.
    PolicyCertificatesModifyResponse:
      type: object
      description: The response to an attestation policy management API.
      properties:
        token:
          type: string
          description: RFC7519 JSON Web Token with PolicyCertificatesModificationResult body.
    PolicyResponse:
      type: object
      description: The response to an attestation policy operation.
      properties:
        token:
          type: string
          description: An RFC7519 JSON Web Token structure whose body is an PolicyResult object.
    JsonWebKey:
      type: object
      description: JsonWebKey.
      properties:
        alg:
          type: string
          description: Algorithm parameter for the key.
        crv:
          type: string
          description: Curve parameter identifies the curve type.
        d:
          type: string
          description: RSA private exponent or ECC private key.
        dp:
          type: string
          description: RSA Private Key Parameter.
        dq:
          type: string
          description: RSA Private Key Parameter.
        e:
          type: string
          description: RSA public exponent, in Base64.
        k:
          type: string
          description: Symmetric key.
        kid:
          type: string
          description: Key ID parameter used to match a specific key.
        kty:
          type: string
          description: Key type parameter identifies the cryptographic algorithm family.
        "n":
          type: string
          description: RSA modulus, in Base64.
        p:
          type: string
          description: RSA secret prime.
        q:
          type: string
          description: RSA secret prime, with p < q.
        qi:
          type: string
          description: RSA Private Key Parameter.
        use:
          type: string
          description: Public key use parameter.
        x:
          type: string
          description: X coordinate for the Elliptic Curve point.
        x5c:
          type: array
          items:
            type: string
          description: X.509 certificate chain parameter.
        "y":
          type: string
          description: Y coordinate for the Elliptic Curve point.
      required:
        - kty
    JsonWebKeySet:
      type: object
      description: JsonWebKeySet.
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/JsonWebKey"
          description: Array of JWK values.
    TcbBaseline:
      type: object
      description: TEE specific Tcb baseline used in attestation.
      properties:
        tcbIdentifier:
          type: string
          description: The Tcb baseline Identifier used in attestation policy.
        tcbEvaluationDataNumber:
          type: integer
          description: Monotonically increasing sequence number.
        tcbReleaseDate:
          type: string
          format: date-time
          description: Date and time when the Tcb is released.
        minimumPswLinuxVersion:
          type: string
          description: Minimum Linux PSW version required.
        minimumPswWindowsVersion:
          type: string
          description: Minimum Windows PSW version required.
        isSelectedTcb:
          type: boolean
          description: Whether this Tcb baseline is used in attestation.
    TcbBaselineResult:
      type: object
      description: Azure supported baseline details for a TEE type.
      properties:
        tcbBaselines:
          type: array
          items:
            $ref: "#/components/schemas/TcbBaseline"
          description: List of Azure supported baseline details for the TEE type.
