paths:
  /attest/OpenEnclave?api-version=2025-06-01:
    post:
      operationId: Attestation_attest_open_enclave
      description: Attest to an SGX enclave. Processes an OpenEnclave report , producing an artifact. The type of artifact produced is dependent upon attestation policy.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationResponse"
  /attest/SgxEnclave?api-version=2025-06-01:
    post:
      operationId: Attestation_attest_sgx_enclave
      description: Attest to an SGX enclave. Processes an SGX enclave quote, producing an artifact. The type of artifact produced is dependent upon attestation policy.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationResponse"
  /attest/AzureGuest?api-version=2025-06-01:
    post:
      operationId: Attestation_attest_azure_guest
      description: Attest to an Azure Guest VM. Processes an Azure Guest TCG Log, producing an artifact. The type of artifact produced is dependent upon attestation policy.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SealedAttestationResponse"
  /attest/Tpm?api-version=2025-06-01:
    post:
      operationId: Attestation_attest_tpm
      description: Attest a Virtualization-based Security (VBS) enclave. Processes attestation evidence from a VBS enclave, producing an attestation result. The attestation result produced is dependent upon the attestation policy.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TpmAttestationResponse"
  /attest/SevSnpVm?api-version=2025-06-01:
    post:
      operationId: Attestation_attest_sev_snp_vm
      description: Attest to an SEV SNP Virtual Machine. Processes a SEV SNP Boot chain. The type of artifact produced is dependent upon attestation policy.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationResponse"
  /attest/TdxVm?api-version=2025-06-01:
    post:
      operationId: Attestation_attest_tdx_vm
      description: Attest to a TDX Virtual Machine. Processes an TDX quote, producing an artifact. The type of artifact produced is dependent upon attestation policy.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationResponse"
  /.well-known/openid-configuration?api-version=2025-06-01:
    get:
      operationId: MetadataConfiguration_get
      description: Retrieves the OpenID Configuration data for the Azure Attestation Service. Retrieves metadata about the attestation signing keys in use by the attestation service.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenIDConfigurationResponse"
  /certificates?api-version=2025-06-01:
    get:
      operationId: PolicyCertificates_get
      description: Retrieves the set of certificates used to express policy for the current tenant. Retrieves the set of certificates used to express policy for the current tenant.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyCertificatesResponse"
  /certificates:add?api-version=2025-06-01:
    post:
      operationId: PolicyCertificates_add
      description: Adds a new attestation policy certificate to the set of policy management certificates. Adds a new attestation policy certificate to the set of policy management certificates.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyCertificatesModifyResponse"
  /certificates:remove?api-version=2025-06-01:
    post:
      operationId: PolicyCertificates_remove
      description: Removes the specified policy management certificate. Note that the final policy management certificate cannot be removed. Removes the specified policy management certificate. Note that the final policy management certificate cannot be removed.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyCertificatesModifyResponse"
  /policies/{attestation_type}?api-version=2025-06-01:
    get:
      operationId: Policy_get
      description: Retrieves the current policy for an attestation type. Retrieves the current policy for an attestation type.
      parameters:
        - name: attestation_type
          in: path
          required: true
          schema:
            type: string
          description: 'Specifies the trusted execution environment to be used to validate the evidence. Known values are: "SgxEnclave", "OpenEnclave", "AzureGuest", "SevSnpVm", "Tpm", and "TdxVm". Required.'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
    put:
      operationId: Policy_set
      description: Sets the policy for a given attestation type. Sets the policy for a given attestation type.
      parameters:
        - name: attestation_type
          in: path
          required: true
          schema:
            type: string
          description: 'Specifies the trusted execution environment to be used to validate the evidence. Known values are: "SgxEnclave", "OpenEnclave", "AzureGuest", "SevSnpVm", "Tpm", and "TdxVm". Required.'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
  /policies/{attestation_type}:reset?api-version=2025-06-01:
    post:
      operationId: Policy_reset
      description: Resets the attestation policy for the specified tenant and reverts to the default policy. Resets the attestation policy for the specified tenant and reverts to the default policy.
      parameters:
        - name: attestation_type
          in: path
          required: true
          schema:
            type: string
          description: 'Specifies the trusted execution environment to be used to validate the evidence. Known values are: "SgxEnclave", "OpenEnclave", "AzureGuest", "SevSnpVm", "Tpm", and "TdxVm". Required.'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
  /certs?api-version=2025-06-01:
    get:
      operationId: SigningCertificates_get
      description: Retrieves the attestation signing keys in use by the attestation service. Retrieves metadata signing certificates in use by the attestation service.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonWebKeySet"
  /tcbbaselines/{attestation_type}?api-version=2025-06-01:
    get:
      operationId: TcbBaselines_get
      description: Retrieves a list of all Azure supported baseline details for the a TEE type along with an indication of which one is in enforced for the attestation provider. Retrieves a list of all Azure supported baseline details for the a TEE type along with an indication of which one is in enforced for the attestation provider.
      parameters:
        - name: attestation_type
          in: path
          required: true
          schema:
            type: string
          description: 'Specifies the trusted execution environment to be used to validate the evidence. Known values are: "SgxEnclave", "OpenEnclave", "AzureGuest", "SevSnpVm", "Tpm", and "TdxVm". Required.'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TcbBaselineResult"
