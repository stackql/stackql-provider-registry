        - entityType
    MaccStatus:
      type: string
      enum:
        - Unknown
        - Scheduled
        - Active
        - Pending
        - Failed
        - Canceled
        - Completed
        - Stopped
        - PendingSettlement
        - ShortfallCharged
        - ShortfallWaived
    MaccEntityType:
      type: string
      enum:
        - Primary
        - Contributor
    Commitment:
      type: object
      description: Commitment towards the benefit.
      properties:
        currencyCode:
          type: string
          description: The ISO 4217 3-letter currency code for the currency used by this purchase record.
        amount:
          type: number
          description: ":vartype amount: float"
        grain:
          $ref: "#/components/schemas/CommitmentGrain"
          description: 'The grain of the commitment. Known values are: "Hourly", "FullTerm", and "Unknown".'
