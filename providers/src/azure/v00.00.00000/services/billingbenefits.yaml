          description: End date time for the milestone. Timestamp must be in the ISO date format YYYY-MM-DDT23:59:59Z.
        automaticShortfall:
          $ref: "#/components/schemas/EnablementMode"
          description: "Setting this to 'Enable' enables automatic shortfall invoicing when milestone commitment is not met. Known values are: \"Unknown\", \"Enabled\", and \"Disabled\"."
        automaticShortfallSuppressReason:
