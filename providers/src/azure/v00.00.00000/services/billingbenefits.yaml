          description: Fully-qualified resource identifier of the credits associated with the shortfall.
        balanceVersion:
          type: number
          description: Points to BalanceVersion document that indicates the remaining commitment balance when the credit was created.
        systemId:
          type: string
          description: This is an identifier of the shortfall which will not change for its lifetime.
