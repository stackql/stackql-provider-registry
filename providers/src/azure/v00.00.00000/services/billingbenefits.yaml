openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Billing Benefits Mgmt Client
  description: Azure Benefits RP let users create and manage benefits.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-12-01-preview-stackql-generated
  x-serviceAlias: billingbenefits
  x-sdkPackage: azure-mgmt-billingbenefits
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    MaccModelProperties:
      type: object
      description: MACC properties.
      properties:
        provisioningState:
          type: string
          description: Provisioning state of MACC as assigned by RPaaS. This indicates the last operation's status. For all practical purposes, this can be ignored. For current status of MACC resource, refer to MaccStatus.
        status:
          $ref: "#/components/schemas/MaccStatus"
          description: 'Represents the current status of the MACC. Known values are: "Unknown", "Scheduled", "Active", "Pending", "Failed", "Canceled", "Completed", "Stopped", "PendingSettlement", "ShortfallCharged", and "ShortfallWaived".'
        entityType:
          $ref: "#/components/schemas/MaccEntityType"
          description: 'Represents type of the object being operated on. Possible values are primary or contributor. Required. Known values are: "Primary" and "Contributor".'
        displayName:
          type: string
          description: Display name.
        productCode:
          type: string
          description: Represents catalog UPN.
        billingAccountResourceId:
          type: string
          description: "Fully-qualified identifier of the billing account where the MACC is applied. Present only for Enterprise Agreement customers. Format must be Azure Resource ID: /providers/Microsoft.Billing/billingAccounts/{acctId:orgId}."
        commitment:
          $ref: "#/components/schemas/Commitment"
          description: Commitment towards the benefit.
        startAt:
          type: string
          format: date-time
          description: Must be start of month. Timestamp must be in the ISO date format YYYY-MM-DDT00:00:00Z.
        endAt:
          type: string
          format: date-time
          description: Must be end of month. Timestamp must be in the ISO date format YYYY-MM-DDT23:59:59Z.
        systemId:
          type: string
          description: This is the globally unique identifier of the MACC which will not change for the lifetime of the MACC.
        automaticShortfall:
          $ref: "#/components/schemas/EnablementMode"
          description: "Setting this to 'Enable' enables automatic shortfall charging when commitment is not met. Known values are: \"Unknown\", \"Enabled\", and \"Disabled\"."
        automaticShortfallSuppressReason:
          $ref: "#/components/schemas/AutomaticShortfallSuppressReason"
          description: Optional field to record suppression reason for automatic shortfall.
        shortfall:
          $ref: "#/components/schemas/Shortfall"
          description: MACC shortfall.
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/MaccMilestone"
          description: List of milestones associated with this MACC.
        resourceId:
          type: string
          description: "This is the resource identifier of either the primary MACC or the contributor. Format: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.BillingBenefits/maccs/{maccName}."
        allowContributors:
          type: boolean
          description: Setting this to true means multi-entity.
        primaryResourceId:
          type: string
          description: "Fully-qualified resource identifier of the primary MACC. Format: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.BillingBenefits/maccs/{maccName}."
        primaryBillingAccountResourceId:
          type: string
          description: "Fully-qualified billing account resource identifier of the primary MACC. Format must be Azure Resource ID: /providers/Microsoft.Billing/billingAccounts/{acctId:orgId}."
