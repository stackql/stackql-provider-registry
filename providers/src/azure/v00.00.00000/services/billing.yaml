paths:
  /providers/Microsoft.Billing/validateAddress?api-version=2024-04-01:
    post:
      operationId: Address_validate
      description: Validates an address. Use the operation to validate an address before using it as soldTo or a billTo address.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addressLine1:
                  type: string
                  description: Address line 1. Required.
                addressLine2:
                  type: string
                  description: Address line 2.
                addressLine3:
                  type: string
                  description: Address line 3.
                city:
                  type: string
                  description: Address city.
                companyName:
                  type: string
                  description: Company name. Optional for MCA Individual (Pay-as-you-go).
                country:
                  type: string
                  description: Country code uses ISO 3166-1 Alpha-2 format. Required.
                district:
                  type: string
                  description: Address district.
                email:
                  type: string
                  description: Email address.
                firstName:
                  type: string
                  description: First name. Optional for MCA Enterprise.
                lastName:
                  type: string
                  description: Last name. Optional for MCA Enterprise.
                middleName:
                  type: string
                  description: Middle name.
                phoneNumber:
                  type: string
                  description: Phone number.
                postalCode:
                  type: string
                  description: Postal code.
                region:
                  type: string
                  description: Address region.
                isValidAddress:
                  type: boolean
                  description: Indicates if the address is incomplete.
              required:
                - addressLine1
                - country
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressValidationResponse"
  /providers/Microsoft.Billing/billingAccounts/{billing_account_name}/agreements/{agreement_name}?api-version=2024-04-01:
    get:
      operationId: Agreements_get
      description: Gets an agreement by ID.
      parameters:
        - name: billing_account_name
          in: path
          required: true
          schema:
            type: string
          description: The ID that uniquely identifies a billing account. Required.
        - name: agreement_name
          in: path
          required: true
          schema:
            type: string
          description: The ID that uniquely identifies an agreement. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
