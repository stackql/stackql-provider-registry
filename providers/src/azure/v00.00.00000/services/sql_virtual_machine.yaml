openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: SQL Server on Azure Virtual Machines
  description: SQL VM resources, availability group listeners and licensing/patching configuration.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2022-08-01-preview-stackql-generated
  x-serviceAlias: sql_virtual_machine
  x-sdkPackage: azure-mgmt-sqlvirtualmachine
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          type: string
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          type: string
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    LoadBalancerConfiguration:
      type: object
      description: A load balancer configuration for an availability group listener.
      properties:
        privateIpAddress:
          $ref: "#/components/schemas/PrivateIPAddress"
          description: Private IP address.
        publicIpAddressResourceId:
          type: string
          description: Resource id of the public IP.
        loadBalancerResourceId:
          type: string
          description: Resource id of the load balancer.
        probePort:
          type: integer
          description: Probe port.
        sqlVirtualMachineInstances:
          type: array
          items:
            type: string
          description: List of the SQL virtual machine instance resource id's that are enrolled into the availability group listener.
    PrivateIPAddress:
      type: object
      description: A private IP address bound to the availability group listener.
      properties:
        ipAddress:
          type: string
          description: Private IP address bound to the availability group listener.
        subnetResourceId:
          type: string
          description: Subnet used to include private IP.
    MultiSubnetIpConfiguration:
      type: object
      description: Multi subnet ip configuration for an availability group listener. All required parameters must be populated in order to send to Azure.
      properties:
        privateIpAddress:
          $ref: "#/components/schemas/PrivateIPAddress"
          description: Private IP address. Required.
        sqlVirtualMachineInstance:
          type: string
          description: SQL virtual machine instance resource id that are enrolled into the availability group listener. Required.
      required:
        - privateIpAddress
        - sqlVirtualMachineInstance
    AgConfiguration:
      type: object
      description: Availability group configuration.
      properties:
        replicas:
          type: array
          items:
            $ref: "#/components/schemas/AgReplica"
          description: Replica configurations.
    AgReplica:
      type: object
      description: Availability group replica configuration.
      properties:
        sqlVirtualMachineInstanceId:
          type: string
          description: Sql VirtualMachine Instance Id.
        role:
          type: string
          description: 'Replica Role in availability group. Known values are: "PRIMARY" and "SECONDARY".'
        commit:
          type: string
          description: 'Replica commit mode in availability group. Known values are: "SYNCHRONOUS_COMMIT" and "ASYNCHRONOUS_COMMIT".'
        failover:
          type: string
          description: 'Replica failover mode in availability group. Known values are: "AUTOMATIC" and "MANUAL".'
        readableSecondary:
          type: string
          description: 'Replica readable secondary mode in availability group. Known values are: "NO", "ALL", and "READ_ONLY".'
    AvailabilityGroupListenerFlattened:
      type: object
      description: Flattened view of AvailabilityGroupListener ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Resource ID.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Metadata pertaining to creation and last modification of the resource.
        provisioningState:
          type: string
          description: Provisioning state to track the async operation status.
        availabilityGroupName:
          type: string
          description: Name of the availability group.
        loadBalancerConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/LoadBalancerConfiguration"
          description: List of load balancer configurations for an availability group listener.
        multiSubnetIpConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/MultiSubnetIpConfiguration"
          description: List of multi subnet IP configurations for an AG listener.
        createDefaultAvailabilityGroupIfNotExist:
          type: boolean
          description: Create a default availability group if it does not exist.
        port:
          type: integer
          description: Listener port.
        availabilityGroupConfiguration:
          $ref: "#/components/schemas/AgConfiguration"
          description: Availability Group configuration.
    PagedAvailabilityGroupListenerFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityGroupListenerFlattened"
        nextLink:
          type: string
    AvailabilityGroupListener:
      type: object
      description: A SQL Server availability group listener. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        id:
          type: string
          description: Resource ID.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Metadata pertaining to creation and last modification of the resource.
        properties:
          type: object
          properties:
            provisioningState:
              type: string
              description: Provisioning state to track the async operation status.
            availabilityGroupName:
              type: string
              description: Name of the availability group.
            loadBalancerConfigurations:
              type: array
              items:
                $ref: "#/components/schemas/LoadBalancerConfiguration"
              description: List of load balancer configurations for an availability group listener.
            multiSubnetIpConfigurations:
              type: array
              items:
                $ref: "#/components/schemas/MultiSubnetIpConfiguration"
              description: List of multi subnet IP configurations for an AG listener.
            createDefaultAvailabilityGroupIfNotExist:
              type: boolean
              description: Create a default availability group if it does not exist.
            port:
              type: integer
              description: Listener port.
            availabilityGroupConfiguration:
              $ref: "#/components/schemas/AgConfiguration"
              description: Availability Group configuration.
    OperationDisplay:
      type: object
      description: Display metadata associated with the operation. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        provider:
          type: string
          description: The localized friendly form of the resource provider name.
        resource:
          type: string
          description: The localized friendly form of the resource type related to this action/operation.
        operation:
          type: string
          description: The localized friendly name for the operation.
        description:
          type: string
          description: The localized friendly description for the operation.
    Operation:
      type: object
      description: SQL REST API operation definition. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        name:
          type: string
          description: The name of the operation being performed on this particular object.
        display:
          $ref: "#/components/schemas/OperationDisplay"
          description: The localized display information for this particular operation / action.
        origin:
          type: string
          description: 'The intended executor of the operation. Known values are: "user" and "system".'
        properties:
          type: object
          properties: {}
          description: Additional descriptions for the operation.
    PagedOperation:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
        nextLink:
          type: string
    WsfcDomainProfile:
      type: object
      description: Active Directory account details to operate Windows Server Failover Cluster.
      properties:
        domainFqdn:
          type: string
          description: Fully qualified name of the domain.
        ouPath:
          type: string
          description: Organizational Unit path in which the nodes and cluster will be present.
        clusterBootstrapAccount:
          type: string
          description: Account name used for creating cluster (at minimum needs permissions to 'Create Computer Objects' in domain).
        clusterOperatorAccount:
          type: string
          description: Account name used for operating cluster i.e. will be part of administrators group on all the participating virtual machines in the cluster.
        sqlServiceAccount:
          type: string
          description: Account name under which SQL service will run on all participating SQL virtual machines in the cluster.
        fileShareWitnessPath:
          type: string
          description: Optional path for fileshare witness.
        storageAccountUrl:
          type: string
          description: Fully qualified ARM resource id of the witness storage account.
        storageAccountPrimaryKey:
          type: string
          description: Primary key of the witness storage account.
        clusterSubnetType:
          type: string
          description: 'Cluster subnet type. Known values are: "SingleSubnet" and "MultiSubnet".'
    SqlVirtualMachineGroupFlattened:
      type: object
      description: Flattened view of SqlVirtualMachineGroup ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Resource ID.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
        location:
          type: string
          description: Resource location. Required.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Metadata pertaining to creation and last modification of the resource.
        provisioningState:
          type: string
          description: Provisioning state to track the async operation status.
        sqlImageOffer:
          type: string
          description: SQL image offer. Examples may include SQL2016-WS2016, SQL2017-WS2016.
        sqlImageSku:
          type: string
          description: 'SQL image sku. Known values are: "Developer" and "Enterprise".'
        scaleType:
          type: string
          description: Scale type. "HA"
        clusterManagerType:
          type: string
          description: 'Type of cluster manager: Windows Server Failover Cluster (WSFC), implied by the scale type of the group and the OS type. "WSFC"'
        clusterConfiguration:
          type: string
          description: Cluster type. "Domainful"
        wsfcDomainProfile:
          $ref: "#/components/schemas/WsfcDomainProfile"
          description: Cluster Active Directory domain profile.
    PagedSqlVirtualMachineGroupFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/SqlVirtualMachineGroupFlattened"
        nextLink:
          type: string
    SqlVirtualMachineGroup:
      type: object
      description: A SQL virtual machine group. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: Resource ID.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
        location:
          type: string
          description: Resource location. Required.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Metadata pertaining to creation and last modification of the resource.
        properties:
          type: object
          properties:
            provisioningState:
              type: string
              description: Provisioning state to track the async operation status.
            sqlImageOffer:
              type: string
              description: SQL image offer. Examples may include SQL2016-WS2016, SQL2017-WS2016.
            sqlImageSku:
              type: string
              description: 'SQL image sku. Known values are: "Developer" and "Enterprise".'
            scaleType:
              type: string
              description: Scale type. "HA"
            clusterManagerType:
              type: string
              description: 'Type of cluster manager: Windows Server Failover Cluster (WSFC), implied by the scale type of the group and the OS type. "WSFC"'
            clusterConfiguration:
              type: string
              description: Cluster type. "Domainful"
            wsfcDomainProfile:
              $ref: "#/components/schemas/WsfcDomainProfile"
              description: Cluster Active Directory domain profile.
      required:
        - location
    TroubleshootingAdditionalProperties:
      type: object
      description: SQL VM Troubleshooting additional properties.
      properties:
        unhealthyReplicaInfo:
          $ref: "#/components/schemas/UnhealthyReplicaInfo"
          description: The unhealthy replica information.
    UnhealthyReplicaInfo:
      type: object
      description: SQL VM Troubleshoot UnhealthyReplica scenario information.
      properties:
        availabilityGroupName:
          type: string
          description: The name of the availability group.
    SqlVmTroubleshooting:
      type: object
      description: Details required for SQL VM troubleshooting. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        startTimeUtc:
          type: string
          format: date-time
          description: Start time in UTC timezone.
        endTimeUtc:
          type: string
          format: date-time
          description: End time in UTC timezone.
        troubleshootingScenario:
          type: string
          description: SQL VM troubleshooting scenario. "UnhealthyReplica"
        properties:
          $ref: "#/components/schemas/TroubleshootingAdditionalProperties"
          description: Troubleshooting properties.
        virtualMachineResourceId:
          type: string
          description: Virtual machine resource id for response.
    ResourceIdentity:
      type: object
      description: Azure Active Directory identity configuration for a resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        principalId:
          type: string
          description: The Azure Active Directory principal id.
        type:
          type: string
          description: "The identity type. Set this to 'SystemAssigned' in order to automatically create and assign an Azure Active Directory principal for the resource. Known values are: \"None\" and \"SystemAssigned\"."
        tenantId:
          type: string
          description: The Azure Active Directory tenant id.
    WsfcDomainCredentials:
      type: object
      description: Domain credentials for setting up Windows Server Failover Cluster for SQL availability group.
      properties:
        clusterBootstrapAccountPassword:
          type: string
          description: Cluster bootstrap account password.
        clusterOperatorAccountPassword:
          type: string
          description: Cluster operator account password.
        sqlServiceAccountPassword:
          type: string
          description: SQL service account password.
    AutoPatchingSettings:
      type: object
      description: Set a patching window during which Windows and SQL patches will be applied.
      properties:
        enable:
          type: boolean
          description: Enable or disable autopatching on SQL virtual machine.
        dayOfWeek:
          type: string
          description: 'Day of week to apply the patch on. Known values are: "Everyday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", and "Sunday".'
        maintenanceWindowStartingHour:
          type: integer
          description: Hour of the day when patching is initiated. Local VM time.
        maintenanceWindowDuration:
          type: integer
          description: Duration of patching.
    AutoBackupSettings:
      type: object
      description: Configure backups for databases in your SQL virtual machine.
      properties:
        enable:
          type: boolean
          description: Enable or disable autobackup on SQL virtual machine.
        enableEncryption:
          type: boolean
          description: Enable or disable encryption for backup on SQL virtual machine.
        retentionPeriod:
          type: integer
          description: "Retention period of backup: 1-90 days."
        storageAccountUrl:
          type: string
          description: Storage account url where backup will be taken to.
        storageContainerName:
          type: string
          description: Storage container name where backup will be taken to.
        storageAccessKey:
          type: string
          description: Storage account key where backup will be taken to.
        password:
          type: string
          description: Password for encryption on backup.
        backupSystemDbs:
          type: boolean
          description: Include or exclude system databases from auto backup.
        backupScheduleType:
          type: string
          description: 'Backup schedule type. Known values are: "Manual" and "Automated".'
        fullBackupFrequency:
          type: string
          description: 'Frequency of full backups. In both cases, full backups begin during the next scheduled time window. Known values are: "Daily" and "Weekly".'
        daysOfWeek:
          type: array
          items:
            type: string
          description: Days of the week for the backups when FullBackupFrequency is set to Weekly.
        fullBackupStartTime:
          type: integer
          description: Start time of a given day during which full backups can take place. 0-23 hours.
        fullBackupWindowHours:
          type: integer
          description: Duration of the time window of a given day during which full backups can take place. 1-23 hours.
        logBackupFrequency:
          type: integer
          description: Frequency of log backups. 5-60 minutes.
    KeyVaultCredentialSettings:
      type: object
      description: Configure your SQL virtual machine to be able to connect to the Azure Key Vault service.
      properties:
        enable:
          type: boolean
          description: Enable or disable key vault credential setting.
        credentialName:
          type: string
          description: Credential name.
        azureKeyVaultUrl:
          type: string
          description: Azure Key Vault url.
        servicePrincipalName:
          type: string
          description: Service principal name to access key vault.
        servicePrincipalSecret:
          type: string
          description: Service principal name secret to access key vault.
    ServerConfigurationsManagementSettings:
      type: object
      description: Set the connectivity, storage and workload settings.
      properties:
        sqlConnectivityUpdateSettings:
          $ref: "#/components/schemas/SqlConnectivityUpdateSettings"
          description: SQL connectivity type settings.
        sqlWorkloadTypeUpdateSettings:
          $ref: "#/components/schemas/SqlWorkloadTypeUpdateSettings"
          description: SQL workload type settings.
        sqlStorageUpdateSettings:
          $ref: "#/components/schemas/SqlStorageUpdateSettings"
          description: SQL storage update settings.
        additionalFeaturesServerConfigurations:
          $ref: "#/components/schemas/AdditionalFeaturesServerConfigurations"
          description: Additional SQL feature settings.
        sqlInstanceSettings:
          $ref: "#/components/schemas/SQLInstanceSettings"
          description: SQL Instance settings.
        azureAdAuthenticationSettings:
          $ref: "#/components/schemas/AADAuthenticationSettings"
          description: Azure AD authentication Settings.
    SqlConnectivityUpdateSettings:
      type: object
      description: Set the access level and network port settings for SQL Server.
      properties:
        connectivityType:
          type: string
          description: 'SQL Server connectivity option. Known values are: "LOCAL", "PRIVATE", and "PUBLIC".'
        port:
          type: integer
          description: SQL Server port.
        sqlAuthUpdateUserName:
          type: string
          description: SQL Server sysadmin login to create.
        sqlAuthUpdatePassword:
          type: string
          description: SQL Server sysadmin login password.
    SqlWorkloadTypeUpdateSettings:
      type: object
      description: Set workload type to optimize storage for SQL Server.
      properties:
        sqlWorkloadType:
          type: string
          description: 'SQL Server workload type. Known values are: "GENERAL", "OLTP", and "DW".'
    SqlStorageUpdateSettings:
      type: object
      description: Set disk storage settings for SQL Server.
      properties:
        diskCount:
          type: integer
          description: Virtual machine disk count.
        startingDeviceId:
          type: integer
          description: Device id of the first disk to be updated.
        diskConfigurationType:
          type: string
          description: 'Disk configuration to apply to SQL Server. Known values are: "NEW", "EXTEND", and "ADD".'
    AdditionalFeaturesServerConfigurations:
      type: object
      description: Additional SQL Server feature settings.
      properties:
        isRServicesEnabled:
          type: boolean
          description: Enable or disable R services (SQL 2016 onwards).
    SQLInstanceSettings:
      type: object
      description: Set the server/instance-level settings for SQL Server.
      properties:
        collation:
          type: string
          description: SQL Server Collation.
        maxDop:
          type: integer
          description: SQL Server MAXDOP.
        isOptimizeForAdHocWorkloadsEnabled:
          type: boolean
          description: SQL Server Optimize for Adhoc workloads.
        minServerMemoryMB:
          type: integer
          description: SQL Server minimum memory.
        maxServerMemoryMB:
          type: integer
          description: SQL Server maximum memory.
        isLpimEnabled:
          type: boolean
          description: SQL Server LPIM.
        isIfiEnabled:
          type: boolean
          description: SQL Server IFI.
    AADAuthenticationSettings:
      type: object
      description: Enable AAD authentication for SQL VM.
      properties:
        clientId:
          type: string
          description: The client Id of the Managed Identity to query Microsoft Graph API. An empty string must be used for the system assigned Managed Identity.
    StorageConfigurationSettings:
      type: object
      description: Storage Configurations for SQL Data, Log and TempDb.
      properties:
        sqlDataSettings:
          $ref: "#/components/schemas/SQLStorageSettings"
          description: SQL Server Data Storage Settings.
        sqlLogSettings:
          $ref: "#/components/schemas/SQLStorageSettings"
          description: SQL Server Log Storage Settings.
        sqlTempDbSettings:
          $ref: "#/components/schemas/SQLTempDbSettings"
          description: SQL Server TempDb Storage Settings.
        sqlSystemDbOnDataDisk:
          type: boolean
          description: SQL Server SystemDb Storage on DataPool if true.
        diskConfigurationType:
          type: string
          description: 'Disk configuration to apply to SQL Server. Known values are: "NEW", "EXTEND", and "ADD".'
        storageWorkloadType:
          type: string
          description: 'Storage workload type. Known values are: "GENERAL", "OLTP", and "DW".'
    SQLStorageSettings:
      type: object
      description: Set disk storage settings for SQL Server.
      properties:
        luns:
          type: array
          items:
            type: integer
          description: Logical Unit Numbers for the disks.
        defaultFilePath:
          type: string
          description: SQL Server default file path.
    SQLTempDbSettings:
      type: object
      description: Set tempDb storage settings for SQL Server.
      properties:
        dataFileSize:
          type: integer
          description: SQL Server tempdb data file size.
        dataGrowth:
          type: integer
          description: SQL Server tempdb data file autoGrowth size.
        logFileSize:
          type: integer
          description: SQL Server tempdb log file size.
        logGrowth:
          type: integer
          description: SQL Server tempdb log file autoGrowth size.
        dataFileCount:
          type: integer
          description: SQL Server tempdb data file count.
        persistFolder:
          type: boolean
          description: SQL Server tempdb persist folder choice.
        persistFolderPath:
          type: string
          description: SQL Server tempdb persist folder location.
        luns:
          type: array
          items:
            type: integer
          description: Logical Unit Numbers for the disks.
        defaultFilePath:
          type: string
          description: SQL Server default file path.
    TroubleshootingStatus:
      type: object
      description: Status of last troubleshooting operation on this SQL VM. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        rootCause:
          type: string
          description: Root cause of the issue.
        lastTriggerTimeUtc:
          type: string
          format: date-time
          description: Last troubleshooting trigger time in UTC timezone.
        startTimeUtc:
          type: string
          format: date-time
          description: Start time in UTC timezone.
        endTimeUtc:
          type: string
          format: date-time
          description: End time in UTC timezone.
        troubleshootingScenario:
          type: string
          description: SQL VM troubleshooting scenario. "UnhealthyReplica"
        properties:
          $ref: "#/components/schemas/TroubleshootingAdditionalProperties"
          description: Troubleshooting properties.
    AssessmentSettings:
      type: object
      description: Configure SQL best practices Assessment for databases in your SQL virtual machine.
      properties:
        enable:
          type: boolean
          description: Enable or disable SQL best practices Assessment feature on SQL virtual machine.
        runImmediately:
          type: boolean
          description: Run SQL best practices Assessment immediately on SQL virtual machine.
        schedule:
          $ref: "#/components/schemas/Schedule"
          description: Schedule for SQL best practices Assessment.
    Schedule:
      type: object
      description: Set assessment schedule for SQL Server.
      properties:
        enable:
          type: boolean
          description: Enable or disable assessment schedule on SQL virtual machine.
        weeklyInterval:
          type: integer
          description: Number of weeks to schedule between 2 assessment runs. Takes value from 1-6.
        monthlyOccurrence:
          type: integer
          description: "Occurrence of the DayOfWeek day within a month to schedule assessment. Takes values: 1,2,3,4 and -1. Use -1 for last DayOfWeek day of the month."
        dayOfWeek:
          type: string
          description: 'Day of the week to run assessment. Known values are: "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", and "Sunday".'
        startTime:
          type: string
          description: Time of the day in HH:mm format. Eg. 17:30.
    SqlVirtualMachineFlattened:
      type: object
      description: Flattened view of SqlVirtualMachine ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Resource ID.
        name:
          type: string
          description: Resource name.
        type:
          type: string
          description: Resource type.
        location:
          type: string
          description: Resource location. Required.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        identity:
          $ref: "#/components/schemas/ResourceIdentity"
          description: Azure Active Directory identity of the server.
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Metadata pertaining to creation and last modification of the resource.
        virtualMachineResourceId:
          type: string
          description: ARM Resource id of underlying virtual machine created from SQL marketplace image.
        provisioningState:
          type: string
          description: Provisioning state to track the async operation status.
        sqlImageOffer:
          type: string
          description: SQL image offer. Examples include SQL2016-WS2016, SQL2017-WS2016.
        sqlServerLicenseType:
          type: string
          description: 'SQL Server license type. Known values are: "PAYG", "AHUB", and "DR".'
        sqlManagement:
          type: string
          description: 'SQL Server Management type. Known values are: "Full", "LightWeight", and "NoAgent".'
        leastPrivilegeMode:
          type: string
          description: 'SQL IaaS Agent least privilege mode. Known values are: "Enabled" and "NotSet".'
        sqlImageSku:
          type: string
          description: 'SQL Server edition type. Known values are: "Developer", "Express", "Standard", "Enterprise", and "Web".'
        sqlVirtualMachineGroupResourceId:
          type: string
          description: ARM resource id of the SQL virtual machine group this SQL virtual machine is or will be part of.
        wsfcDomainCredentials:
          $ref: "#/components/schemas/WsfcDomainCredentials"
          description: Domain credentials for setting up Windows Server Failover Cluster for SQL availability group.
        wsfcStaticIp:
          type: string
          description: Domain credentials for setting up Windows Server Failover Cluster for SQL availability group.
