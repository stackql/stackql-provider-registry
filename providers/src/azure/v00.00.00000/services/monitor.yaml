      description: "**Lists the metric data for a subscription**. Parameters can be specified on either query params or the body. This API used the `default ARM throttling limits `_."
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: region
          in: query
          required: true
          schema:
            type: string
          description: The region where the metrics you want reside. Required.
        - name: timespan
          in: query
          required: false
          schema:
            type: string
          description: The timespan of the query. It is a string with the following format 'startDateTime_ISO/endDateTime_ISO'. Default value is None.
        - name: interval
          in: query
          required: false
          schema:
            type: string
          description: "The interval (i.e. timegrain) of the query in ISO 8601 duration format. Defaults to PT1M. Special case for 'FULL' value that returns single datapoint for entire time span requested. *Examples: PT15M, PT1H, P1D, FULL*. Default value is None."
        - name: metricnames
          in: query
          required: false
          schema:
            type: string
          description: The names of the metrics (comma separated) to retrieve. Limit 20 metrics. Default value is None.
        - name: aggregation
          in: query
          required: false
          schema:
            type: string
          description: "The list of aggregation types (comma separated) to retrieve. *Examples: average, minimum, maximum*. Default value is None."
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: The maximum number of records to retrieve per resource ID in the request. Valid only if filter is specified. Defaults to 10. Default value is None.
        - name: orderby
          in: query
          required: false
          schema:
            type: string
          description: "The aggregation to use for sorting results and the direction of the sort. Only one order can be specified. *Examples: sum asc*. Default value is None."
        - name: $filter
          in: query
          required: false
          schema:
            type: string
          description: The **$filter** is used to reduce the set of metric data returned.Example:Metric contains metadata A, B and C.- Return all time series of C where A = a1 and B = b1 or b2**$filter=A eq ‘a1’ and B eq ‘b1’ or B eq ‘b2’ and C eq ‘*’**- Invalid variant:**$filter=A eq ‘a1’ and B eq ‘b1’ and C eq ‘*’ or B = ‘b2’**This is invalid because the logical or operator cannot separate two different metadata names.- Return all time series where A = a1, B = b1 and C = c1:**$filter=A eq ‘a1’ and B eq ‘b1’ and C eq ‘c1’**- Return all time series where A = a1**$filter=A eq ‘a1’ and B eq ‘*’ and C eq ‘*’**. Default value is None.
        - name: resultType
          in: query
          required: false
          schema:
            type: string
          description: "Reduces the set of data collected. The syntax allowed depends on the operation. See the operation's description for details. Known values are: \"Data\" and \"Metadata\". Default value is None."
        - name: metricnamespace
          in: query
          required: false
          schema:
            type: string
          description: Metric namespace where the metrics you want reside. Default value is None.
        - name: AutoAdjustTimegrain
          in: query
          required: false
          schema:
            type: boolean
          description: When set to true, if the timespan passed in is not supported by this metric, the API will return the result using the closest supported timespan. When set to false, an error is returned for invalid timespan parameters. Defaults to false. Default value is None.
        - name: ValidateDimensions
          in: query
          required: false
          schema:
            type: boolean
          description: When set to false, invalid filter parameter values will be ignored. When set to true, an error is returned for invalid filter parameters. Defaults to true. Default value is None.
        - name: rollupby
          in: query
          required: false
          schema:
            type: string
          description: Dimension name(s) to rollup results by. For example if you only want to see metric values with a filter like 'City eq Seattle or City eq Tacoma' but don't want to see separate values for each city, you can specify 'RollUpBy=City' to see the results for Seattle and Tacoma rolled up into one timeseries. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timespan:
                  type: string
                  description: The timespan of the query. It is a string with the following format 'startDateTime_ISO/endDateTime_ISO'.
                interval:
                  type: string
                  description: "The interval (i.e. timegrain) of the query in ISO 8601 duration format. Defaults to PT1M. Special case for 'FULL' value that returns single datapoint for entire time span requested. *Examples: PT15M, PT1H, P1D, FULL*."
                metricNames:
                  type: string
                  description: The names of the metrics (comma separated) to retrieve.
                aggregation:
                  type: string
                  description: The list of aggregation types (comma separated) to retrieve.
                filter:
                  type: string
                  description: The **$filter** is used to reduce the set of metric data returned.Example:Metric contains metadata A, B and C.- Return all time series of C where A = a1 and B = b1 or b2**$filter=A eq ‘a1’ and B eq ‘b1’ or B eq ‘b2’ and C eq ‘*’**- Invalid variant:**$filter=A eq ‘a1’ and B eq ‘b1’ and C eq ‘*’ or B = ‘b2’**This is invalid because the logical or operator cannot separate two different metadata names.- Return all time series where A = a1, B = b1 and C = c1:**$filter=A eq ‘a1’ and B eq ‘b1’ and C eq ‘c1’**- Return all time series where A = a1**$filter=A eq ‘a1’ and B eq ‘*’ and C eq ‘*’**.
                top:
                  type: integer
                  description: The maximum number of records to retrieve. Valid only if $filter is specified. Defaults to 10.
                orderBy:
                  type: string
                  description: "The aggregation to use for sorting results and the direction of the sort. Only one order can be specified. Examples: sum asc."
                rollUpBy:
                  type: string
                  description: Dimension name(s) to rollup results by. For example if you only want to see metric values with a filter like 'City eq Seattle or City eq Tacoma' but don't want to see separate values for each city, you can specify 'RollUpBy=City' to see the results for Seattle and Tacoma rolled up into one timeseries.
                resultType:
                  $ref: "#/components/schemas/MetricResultType"
                  description: "Reduces the set of data collected. The syntax allowed depends on the operation. See the operation's description for details. Known values are: \"Data\" and \"Metadata\"."
                metricNamespace:
                  type: string
                  description: Metric namespace where the metrics you want reside.
                autoAdjustTimegrain:
                  type: boolean
                  description: When set to true, if the timespan passed in is not supported by this metric, the API will return the result using the closest supported timespan. When set to false, an error is returned for invalid timespan parameters. Defaults to false.
                validateDimensions:
                  type: boolean
                  description: When set to false, invalid filter parameter values will be ignored. When set to true, an error is returned for invalid filter parameters. Defaults to true.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
