        - primaryDnsIpAddress
        - domainName
        - domainNetBiosName
        - cacheNetBiosName
    DomainJoinedType:
      type: string
      enum:
        - "Yes"
        - "No"
        - Error
    CacheActiveDirectorySettingsCredentials:
      type: object
      description: Active Directory admin credentials used to join the HPC Cache to a domain.
      properties:
        username:
          type: string
          description: Username of the Active Directory domain administrator. This value is stored encrypted and not returned on response. Required.
        password:
          type: string
