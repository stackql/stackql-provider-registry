      type: object
      description: The status of the archive.
      properties:
        state:
          $ref: "#/components/schemas/ArchiveStatusType"
          description: 'The state of the archive operation. Known values are: "NotConfigured", "Idle", "InProgress", "Canceled", "Completed", "Failed", "Cancelling", and "FSScanInProgress".'
        lastCompletionTime:
          type: string
          format: date-time
          description: The time of the last completed archive operation.
        lastStartedTime:
          type: string
          format: date-time
          description: The time the latest archive operation started.
        percentComplete:
          type: integer
          description: The completion percentage of the archive operation.
        errorCode:
          type: string
          description: Server-defined error code for the archive operation.
        errorMessage:
          type: string
          description: Server-defined error message for the archive operation.
    ArchiveStatusType:
      type: string
      enum:
        - NotConfigured
        - Idle
        - InProgress
        - Canceled
        - Completed
        - Failed
        - Cancelling
        - FSScanInProgress
    AmlFilesystemRootSquashSettings:
      type: object
      description: AML file system squash settings.
      properties:
        mode:
          $ref: "#/components/schemas/AmlFilesystemSquashMode"
          description: "Squash mode of the AML file system. 'All': User and Group IDs on files will be squashed to the provided values for all users on non-trusted systems. 'RootOnly': User and Group IDs on files will be squashed to provided values for solely the root user on non-trusted systems. 'None': No squashing of User and Group IDs is performed for any users on any systems. Known values are: \"None\", \"RootOnly\", and \"All\"."
        noSquashNidLists:
          type: string
          description: Semicolon separated NID IP Address list(s) to be added to the TrustedSystems.
        squashUID:
          type: integer
          description: User ID to squash to.
        squashGID:
          type: integer
          description: Group ID to squash to.
        status:
