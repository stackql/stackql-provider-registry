openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Storage Cache Management Client
  description: A Storage Cache provides scalable caching service for NAS clients, serving data from either NFSv3 or Blob at-rest storage (referred to as "Storage Targets"). These operations allow you to manage Caches.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-01-01-stackql-generated
  x-serviceAlias: storagecache
  x-sdkPackage: azure-mgmt-storagecache
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AmlFilesystemProperties:
      type: object
      description: Properties of the AML file system.
      properties:
        storageCapacityTiB:
          type: number
          description: The size of the AML file system, in TiB. This might be rounded up. Required.
        currentStorageCapacityTiB:
          type: number
          description: The current storage capacity of the AML file system, in TiB. This reflects the actual capacity including any expansions.
        clusterUuid:
          type: string
          description: The unique identifier of the AML file system cluster.
        health:
          $ref: "#/components/schemas/AmlFilesystemHealth"
          description: Health of the AML file system.
        provisioningState:
          $ref: "#/components/schemas/AmlFilesystemProvisioningStateType"
          description: 'ARM provisioning state. Known values are: "Succeeded", "Failed", "Creating", "Deleting", "Updating", and "Canceled".'
        filesystemSubnet:
          type: string
          description: Subnet used for managing the AML file system and for client-facing operations. This subnet should have at least a /24 subnet mask within the VNET's address space. Required.
        clientInfo:
          $ref: "#/components/schemas/AmlFilesystemClientInfo"
          description: Client information for the AML file system.
        throughputProvisionedMBps:
          type: integer
          description: Throughput provisioned in MB per sec, calculated as storageCapacityTiB * per-unit storage throughput.
        encryptionSettings:
          $ref: "#/components/schemas/AmlFilesystemEncryptionSettings"
          description: Specifies encryption settings of the AML file system.
        maintenanceWindow:
          $ref: "#/components/schemas/AmlFilesystemPropertiesMaintenanceWindow"
          description: Start time of a 30-minute weekly maintenance window. Required.
        hsm:
          $ref: "#/components/schemas/AmlFilesystemPropertiesHsm"
          description: Hydration and archive settings and status.
        rootSquashSettings:
          $ref: "#/components/schemas/AmlFilesystemRootSquashSettings"
          description: Specifies root squash settings of the AML file system.
      required:
        - storageCapacityTiB
        - filesystemSubnet
        - maintenanceWindow
    AmlFilesystemHealth:
      type: object
      description: An indication of AML file system health. Gives more information about health than just that related to provisioning.
