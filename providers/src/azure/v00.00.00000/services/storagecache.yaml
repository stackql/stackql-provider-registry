        domainJoined:
          $ref: "#/components/schemas/DomainJoinedType"
          description: 'True if the HPC Cache is joined to the Active Directory domain. Known values are: "Yes", "No", and "Error".'
        credentials:
          $ref: "#/components/schemas/CacheActiveDirectorySettingsCredentials"
          description: Active Directory admin credentials used to join the HPC Cache to a domain.
