paths:
  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/Microsoft.StorageCache/amlFilesystems/{aml_filesystem_name}?api-version=2026-01-01:
    get:
      operationId: AmlFilesystems_get
      description: Returns an AML file system.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: aml_filesystem_name
          in: path
          required: true
          schema:
            type: string
          description: Name for the AML file system. Allows alphanumerics, underscores, and hyphens. Start and end with alphanumeric. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmlFilesystemFlattened"
    put:
      operationId: AmlFilesystems_begin_create_or_update
      description: Create or update an AML file system.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: aml_filesystem_name
          in: path
          required: true
          schema:
            type: string
          description: Name for the AML file system. Allows alphanumerics, underscores, and hyphens. Start and end with alphanumeric. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: object
                  properties: {}
                  description: Resource tags.
                location:
                  type: string
                  description: The geo-location where the resource lives. Required.
                properties:
                  $ref: "#/components/schemas/AmlFilesystemProperties"
                  description: Properties of the AML file system.
                identity:
                  $ref: "#/components/schemas/AmlFilesystemIdentity"
                  description: The managed identity used by the AML file system, if configured.
                sku:
                  $ref: "#/components/schemas/SkuName"
                  description: SKU for the resource.
                zones:
                  type: array
                  items:
                    type: string
                  description: The availability zones.
              required:
                - location
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmlFilesystem"
    patch:
      operationId: AmlFilesystems_begin_update
      description: Update an AML file system instance.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: aml_filesystem_name
          in: path
          required: true
          schema:
            type: string
          description: Name for the AML file system. Allows alphanumerics, underscores, and hyphens. Start and end with alphanumeric. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: object
                  properties: {}
                  description: Resource tags.
                properties:
                  $ref: "#/components/schemas/AmlFilesystemUpdateProperties"
                  description: Properties of the AML file system.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmlFilesystem"
    delete:
      operationId: AmlFilesystems_begin_delete
      description: Schedules an AML file system for deletion.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: aml_filesystem_name
          in: path
          required: true
          schema:
            type: string
          description: Name for the AML file system. Allows alphanumerics, underscores, and hyphens. Start and end with alphanumeric. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Success (no content / accepted)
  /subscriptions/{subscription_id}/providers/Microsoft.StorageCache/amlFilesystems?api-version=2026-01-01:
    get:
      operationId: AmlFilesystems_list
      description: Returns all AML file systems the user has access to under a subscription.
      parameters:
