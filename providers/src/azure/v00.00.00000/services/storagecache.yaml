          description: 'The operational state of auto export. InProgress indicates the export is running. Disabling indicates the user has requested to disable the export but the disabling is still in progress. Disabled indicates auto export has been disabled. DisableFailed indicates the disabling has failed. Failed means the export was unable to continue, due to a fatal error. Known values are: "InProgress", "Disabling", "Disabled", "DisableFailed", and "Failed".'
