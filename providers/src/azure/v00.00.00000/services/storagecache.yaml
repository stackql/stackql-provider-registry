        adminStatus:
          $ref: "#/components/schemas/AutoImportJobPropertiesAdminStatus"
          description: "The administrative status of the auto import job. Possible values: 'Enable', 'Disable'. Passing in a value of 'Disable' will disable the current active auto import job. By default it is set to 'Enable'. Known values are: \"Enable\" and \"Disable\"."
        autoImportPrefixes:
          type: array
          items:
            type: string
