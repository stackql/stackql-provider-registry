openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Container Instances
  description: "Run containers without managing servers: container groups, profiles and ngroups."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-06-01-preview-stackql-generated
  x-serviceAlias: container_instance
  x-sdkPackage: azure-mgmt-containerinstance
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    ContainerGroupProfileProperties:
      type: object
      description: The container group profile properties.
      properties:
        sku:
          $ref: "#/components/schemas/ContainerGroupSku"
          description: 'The SKU for a container group. Known values are: "NotSpecified", "Standard", "Dedicated", and "Confidential".'
        encryptionProperties:
          $ref: "#/components/schemas/EncryptionProperties"
          description: The encryption properties for a container group.
        containers:
          type: array
          items:
            $ref: "#/components/schemas/Container"
          description: The containers within the container group. Required.
        initContainers:
          type: array
          items:
            $ref: "#/components/schemas/InitContainerDefinition"
          description: The init containers for a container group.
        extensions:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentExtensionSpec"
          description: extensions used by virtual kubelet.
        imageRegistryCredentials:
          type: array
          items:
            $ref: "#/components/schemas/ImageRegistryCredential"
          description: The image registry credentials by which the container group is created from.
        restartPolicy:
          $ref: "#/components/schemas/ContainerGroupRestartPolicy"
          description: 'Restart policy for all containers within the container group. * `Always` Always restart * `OnFailure` Restart on failure * `Never` Never restart. Known values are: "Always", "OnFailure", and "Never".'
        shutdownGracePeriod:
          type: string
          format: date-time
          description: Shutdown grace period for containers in a container group.
        ipAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address type of the container group.
        timeToLive:
          type: string
          format: date-time
          description: Post completion time to live for containers of a CG.
        osType:
          $ref: "#/components/schemas/OperatingSystemTypes"
          description: 'The operating system type required by the containers in the container group. Required. Known values are: "Windows" and "Linux".'
        volumes:
          type: array
          items:
            $ref: "#/components/schemas/Volume"
          description: The list of volumes that can be mounted by containers in this container group.
        diagnostics:
          $ref: "#/components/schemas/ContainerGroupDiagnostics"
          description: The diagnostic information for a container group.
        priority:
          $ref: "#/components/schemas/ContainerGroupPriority"
          description: 'The priority of the container group. Known values are: "Regular" and "Spot".'
        confidentialComputeProperties:
          $ref: "#/components/schemas/ConfidentialComputeProperties"
          description: The properties for confidential container group.
        securityContext:
          $ref: "#/components/schemas/SecurityContextDefinition"
          description: The container security properties.
        revision:
          type: integer
          description: Container group profile current revision number.
        registeredRevisions:
          type: array
          items:
            type: integer
          description: Registered revisions are calculated at request time based off the records in the table logs.
        useKrypton:
          type: boolean
          description: Gets or sets Krypton use property.
      required:
        - containers
        - osType
    ContainerGroupSku:
      type: string
      enum:
        - NotSpecified
        - Standard
        - Dedicated
        - Confidential
    EncryptionProperties:
      type: object
      description: The container group encryption properties.
      properties:
        vaultBaseUrl:
          type: string
          description: The keyvault base url. Required.
        keyName:
          type: string
          description: The encryption key name. Required.
        keyVersion:
          type: string
          description: The encryption key version. Required.
        identity:
          type: string
          description: The keyvault managed identity.
      required:
        - vaultBaseUrl
        - keyName
        - keyVersion
    Container:
      type: object
      description: A container instance.
      properties:
        name:
          type: string
          description: The user-provided name of the container instance. Required.
        properties:
          $ref: "#/components/schemas/ContainerProperties"
          description: The properties of the container instance. Required.
      required:
        - name
        - properties
    ContainerProperties:
      type: object
      description: The container instance properties.
      properties:
        image:
          type: string
          description: The name of the image used to create the container instance.
        command:
          type: array
          items:
            type: string
          description: The commands to execute within the container instance in exec form.
        ports:
          type: array
          items:
            $ref: "#/components/schemas/ContainerPort"
          description: The exposed ports on the container instance.
        environmentVariables:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentVariable"
          description: The environment variables to set in the container instance.
        instanceView:
          $ref: "#/components/schemas/ContainerPropertiesInstanceView"
          description: The instance view of the container instance. Only valid in response.
        resources:
          $ref: "#/components/schemas/ResourceRequirements"
          description: The resource requirements of the container instance.
        volumeMounts:
          type: array
          items:
            $ref: "#/components/schemas/VolumeMount"
          description: The volume mounts available to the container instance.
        livenessProbe:
          $ref: "#/components/schemas/ContainerProbe"
          description: The liveness probe.
        readinessProbe:
          $ref: "#/components/schemas/ContainerProbe"
          description: The readiness probe.
        securityContext:
          $ref: "#/components/schemas/SecurityContextDefinition"
          description: The container security properties.
        configMap:
          $ref: "#/components/schemas/ConfigMap"
          description: The config map.
    ContainerPort:
      type: object
      description: The port exposed on the container instance.
      properties:
        protocol:
          $ref: "#/components/schemas/ContainerNetworkProtocol"
          description: 'The protocol associated with the port. Known values are: "TCP" and "UDP".'
        port:
          type: integer
          description: The port number exposed within the container group. Required.
      required:
        - port
    ContainerNetworkProtocol:
      type: string
      enum:
        - TCP
        - UDP
    EnvironmentVariable:
      type: object
      description: The environment variable to set within the container instance.
      properties:
        name:
          type: string
          description: The name of the environment variable. Required.
        value:
          type: string
          description: The value of the environment variable.
        secureValue:
          type: string
          description: The value of the secure environment variable.
        secureValueReference:
          type: string
          description: The reference of the secure environment variable.
      required:
        - name
    ContainerPropertiesInstanceView:
      type: object
      description: The instance view of the container instance. Only valid in response.
      properties:
        restartCount:
          type: integer
          description: The number of times that the container instance has been restarted.
        currentState:
          $ref: "#/components/schemas/ContainerState"
          description: Current container instance state.
        previousState:
          $ref: "#/components/schemas/ContainerState"
          description: Previous container instance state.
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
          description: The events of the container instance.
    ContainerState:
      type: object
      description: The container instance state.
      properties:
        state:
          type: string
          description: The state of the container instance.
        startTime:
          type: string
          format: date-time
          description: The date-time when the container instance state started.
        exitCode:
          type: integer
          description: The container instance exit codes correspond to those from the `docker run` command.
        finishTime:
          type: string
          format: date-time
          description: The date-time when the container instance state finished.
        detailStatus:
          type: string
          description: The human-readable status of the container instance state.
    Event:
      type: object
      description: A container group or container instance event.
      properties:
        count:
          type: integer
          description: The count of the event.
        firstTimestamp:
          type: string
          format: date-time
          description: The date-time of the earliest logged event.
        lastTimestamp:
          type: string
          format: date-time
          description: The date-time of the latest logged event.
        name:
          type: string
          description: The event name.
        message:
          type: string
          description: The event message.
        type:
          type: string
          description: The event type.
    ResourceRequirements:
      type: object
      description: The resource requirements.
      properties:
        requests:
          $ref: "#/components/schemas/ResourceRequests"
          description: The resource requests of this container instance. Required.
        limits:
          $ref: "#/components/schemas/ResourceLimits"
          description: The resource limits of this container instance.
      required:
        - requests
    ResourceRequests:
      type: object
      description: The resource requests.
      properties:
        memoryInGB:
          type: number
          description: The memory request in GB of this container instance. Required.
        cpu:
          type: number
          description: The CPU request of this container instance. Required.
        gpu:
          $ref: "#/components/schemas/GpuResource"
          description: The GPU request of this container instance.
      required:
        - memoryInGB
        - cpu
    GpuResource:
      type: object
      description: The GPU resource.
      properties:
        count:
          type: integer
          description: The count of the GPU resource. Required.
        sku:
          $ref: "#/components/schemas/GpuSku"
          description: 'The SKU of the GPU resource. Required. Known values are: "K80", "P100", and "V100".'
      required:
        - count
        - sku
    GpuSku:
      type: string
      enum:
        - K80
        - P100
        - V100
    ResourceLimits:
      type: object
      description: The resource limits.
      properties:
        memoryInGB:
          type: number
          description: The memory limit in GB of this container instance.
        cpu:
          type: number
          description: The CPU limit of this container instance.
        gpu:
          $ref: "#/components/schemas/GpuResource"
          description: The GPU limit of this container instance.
    VolumeMount:
      type: object
      description: The properties of the volume mount.
      properties:
        name:
          type: string
          description: The name of the volume mount. Required.
        mountPath:
          type: string
          description: The path within the container where the volume should be mounted. Must not contain colon (:). Required.
        readOnly:
          type: boolean
          description: The flag indicating whether the volume mount is read-only.
      required:
        - name
        - mountPath
    ContainerProbe:
      type: object
      description: The container probe, for liveness or readiness.
      properties:
        exec:
          $ref: "#/components/schemas/ContainerExec"
          description: The execution command to probe.
        httpGet:
          $ref: "#/components/schemas/ContainerHttpGet"
          description: The Http Get settings to probe.
        initialDelaySeconds:
          type: integer
          description: The initial delay seconds.
        periodSeconds:
          type: integer
          description: The period seconds.
        failureThreshold:
          type: integer
          description: The failure threshold.
        successThreshold:
          type: integer
          description: The success threshold.
        timeoutSeconds:
          type: integer
          description: The timeout seconds.
    ContainerExec:
      type: object
      description: The container execution command, for liveness or readiness probe.
      properties:
        command:
          type: array
          items:
            type: string
          description: The commands to execute within the container.
    ContainerHttpGet:
      type: object
      description: The container Http Get settings, for liveness or readiness probe.
      properties:
        path:
          type: string
          description: The path to probe.
        port:
          type: integer
          description: The port number to probe. Required.
        scheme:
          $ref: "#/components/schemas/Scheme"
          description: 'The scheme. Known values are: "http" and "https".'
        httpHeaders:
          type: array
          items:
            $ref: "#/components/schemas/HttpHeader"
          description: The HTTP headers.
      required:
        - port
    Scheme:
      type: string
      enum:
        - http
        - https
    HttpHeader:
      type: object
      description: The HTTP header.
      properties:
        name:
          type: string
          description: The header name.
        value:
          type: string
          description: The header value.
    SecurityContextDefinition:
      type: object
      description: The security context for the container.
      properties:
        privileged:
          type: boolean
          description: The flag to determine if the container permissions is elevated to Privileged.
        allowPrivilegeEscalation:
          type: boolean
          description: A boolean value indicating whether the init process can elevate its privileges.
        capabilities:
          $ref: "#/components/schemas/SecurityContextCapabilitiesDefinition"
          description: The capabilities to add or drop from a container.
        runAsGroup:
          type: integer
          description: Sets the User GID for the container.
        runAsUser:
          type: integer
          description: Sets the User UID for the container.
        seccompProfile:
          type: string
          description: a base64 encoded string containing the contents of the JSON in the seccomp profile.
    SecurityContextCapabilitiesDefinition:
      type: object
      description: The capabilities to add or drop from a container.
      properties:
        add:
          type: array
          items:
            type: string
          description: The capabilities to add to the container.
        drop:
          type: array
          items:
            type: string
          description: The capabilities to drop from the container.
    ConfigMap:
      type: object
      description: The container config map.
      properties:
        keyValuePairs:
          type: object
          properties: {}
          description: The key value pairs dictionary in the config map.
    InitContainerDefinition:
      type: object
      description: The init container definition.
      properties:
        name:
          type: string
          description: The name for the init container. Required.
        properties:
          $ref: "#/components/schemas/InitContainerPropertiesDefinition"
          description: The properties for the init container. Required.
      required:
        - name
        - properties
    InitContainerPropertiesDefinition:
      type: object
      description: The init container definition properties.
      properties:
        image:
          type: string
          description: The image of the init container.
        command:
          type: array
          items:
            type: string
          description: The command to execute within the init container in exec form.
        environmentVariables:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentVariable"
          description: The environment variables to set in the init container.
        instanceView:
          $ref: "#/components/schemas/InitContainerPropertiesDefinitionInstanceView"
          description: The instance view of the init container. Only valid in response.
        volumeMounts:
          type: array
          items:
            $ref: "#/components/schemas/VolumeMount"
          description: The volume mounts available to the init container.
        securityContext:
          $ref: "#/components/schemas/SecurityContextDefinition"
          description: The container security properties.
    InitContainerPropertiesDefinitionInstanceView:
      type: object
      description: The instance view of the init container. Only valid in response.
      properties:
        restartCount:
          type: integer
          description: The number of times that the init container has been restarted.
        currentState:
          $ref: "#/components/schemas/ContainerState"
          description: The current state of the init container.
        previousState:
          $ref: "#/components/schemas/ContainerState"
          description: The previous state of the init container.
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
          description: The events of the init container.
    DeploymentExtensionSpec:
      type: object
      description: Extension sidecars to be added to the deployment.
      properties:
        name:
          type: string
          description: Name of the extension. Required.
        properties:
          $ref: "#/components/schemas/DeploymentExtensionSpecProperties"
          description: Extension specific properties.
      required:
        - name
    DeploymentExtensionSpecProperties:
      type: object
      description: Extension specific properties.
      properties:
        extensionType:
          type: string
          description: Type of extension to be added. Required.
        version:
          type: string
          description: Version of the extension being used. Required.
        settings:
          type: object
          properties: {}
          description: Settings for the extension.
        protectedSettings:
          type: object
          properties: {}
          description: Protected settings for the extension.
      required:
        - extensionType
        - version
    ImageRegistryCredential:
      type: object
      description: Image registry credential.
      properties:
        server:
          type: string
          description: The Docker image registry server without a protocol such as "http" and "https". Required.
        username:
          type: string
          description: The username for the private registry.
        password:
          type: string
          description: The password for the private registry.
        passwordReference:
          type: string
          description: The reference for the private registry password.
        identity:
          type: string
          description: The identity for the private registry.
        identityUrl:
          type: string
          description: The identity URL for the private registry.
      required:
        - server
    ContainerGroupRestartPolicy:
      type: string
      enum:
        - Always
        - OnFailure
        - Never
    IpAddress:
      type: object
      description: IP address for the container group.
      properties:
        ports:
          type: array
          items:
            $ref: "#/components/schemas/Port"
          description: The list of ports exposed on the container group. Required.
        type:
          $ref: "#/components/schemas/ContainerGroupIpAddressType"
          description: 'Specifies if the IP is exposed to the public internet or private VNET. Required. Known values are: "Public" and "Private".'
        ip:
          type: string
          description: The IP exposed to the public internet.
        dnsNameLabel:
          type: string
          description: The Dns name label for the IP.
        autoGeneratedDomainNameLabelScope:
          $ref: "#/components/schemas/DnsNameLabelReusePolicy"
          description: "The value representing the security enum. The 'Unsecure' value is the default value if not selected and means the object's domain name label is not secured against subdomain takeover. The 'TenantReuse' value is the default value if selected and means the object's domain name label can be reused within the same tenant. The 'SubscriptionReuse' value means the object's domain name label can be reused within the same subscription. The 'ResourceGroupReuse' value means the object's domain name label can be reused within the same resource group. The 'NoReuse' value means the object's domain name label cannot be reused within the same resource group, subscription, or tenant. Known values are: \"Unsecure\", \"TenantReuse\", \"SubscriptionReuse\", \"ResourceGroupReuse\", and \"Noreuse\"."
        fqdn:
          type: string
          description: The FQDN for the IP.
      required:
        - ports
        - type
    Port:
      type: object
      description: The port exposed on the container group.
      properties:
        protocol:
          $ref: "#/components/schemas/ContainerGroupNetworkProtocol"
          description: 'The protocol associated with the port. Known values are: "TCP" and "UDP".'
        port:
          type: integer
          description: The port number. Required.
      required:
        - port
    ContainerGroupNetworkProtocol:
      type: string
      enum:
        - TCP
        - UDP
    ContainerGroupIpAddressType:
      type: string
      enum:
        - Public
        - Private
    DnsNameLabelReusePolicy:
      type: string
      enum:
        - Unsecure
        - TenantReuse
        - SubscriptionReuse
        - ResourceGroupReuse
        - Noreuse
    OperatingSystemTypes:
      type: string
      enum:
        - Windows
        - Linux
    Volume:
      type: object
      description: The properties of the volume.
      properties:
        name:
          type: string
          description: The name of the volume. Required.
        azureFile:
          $ref: "#/components/schemas/AzureFileVolume"
          description: The Azure File volume.
        emptyDir:
          type: object
          properties: {}
          description: The empty directory volume.
        secret:
          type: object
          properties: {}
          description: The secret volume.
        secretReference:
          type: object
          properties: {}
          description: The secret reference volume.
        gitRepo:
          $ref: "#/components/schemas/GitRepoVolume"
          description: The git repo volume.
      required:
        - name
    AzureFileVolume:
      type: object
      description: The properties of the Azure File volume. Azure File shares are mounted as volumes.
      properties:
        shareName:
          type: string
          description: The name of the Azure File share to be mounted as a volume. Required.
        readOnly:
          type: boolean
          description: The flag indicating whether the Azure File shared mounted as a volume is read-only.
        storageAccountName:
          type: string
          description: The name of the storage account that contains the Azure File share. Required.
        storageAccountKey:
          type: string
          description: The storage account access key used to access the Azure File share.
        storageAccountKeyReference:
          type: string
          description: The reference to the storage account access key used to access the Azure File share.
      required:
        - shareName
        - storageAccountName
    GitRepoVolume:
      type: object
      description: Represents a volume that is populated with the contents of a git repository.
      properties:
        directory:
          type: string
          description: Target directory name. Must not contain or start with '..'. If '.' is supplied, the volume directory will be the git repository. Otherwise, if specified, the volume will contain the git repository in the subdirectory with the given name.
        repository:
          type: string
          description: Repository URL. Required.
        revision:
          type: string
          description: Commit hash for the specified revision.
      required:
        - repository
    ContainerGroupDiagnostics:
      type: object
      description: Container group diagnostic information.
      properties:
        logAnalytics:
          $ref: "#/components/schemas/LogAnalytics"
          description: Container group log analytics information.
    LogAnalytics:
      type: object
      description: Container group log analytics information.
      properties:
        workspaceId:
          type: string
          description: The workspace id for log analytics. Required.
        workspaceKey:
          type: string
          description: The workspace key for log analytics. Required.
        logType:
          $ref: "#/components/schemas/LogAnalyticsLogType"
          description: 'The log type to be used. Known values are: "ContainerInsights" and "ContainerInstanceLogs".'
        metadata:
          type: object
          properties: {}
          description: Metadata for log analytics.
        workspaceResourceId:
          type: string
          description: The workspace resource id for log analytics.
      required:
        - workspaceId
        - workspaceKey
    LogAnalyticsLogType:
      type: string
      enum:
        - ContainerInsights
        - ContainerInstanceLogs
    ContainerGroupPriority:
      type: string
      enum:
        - Regular
        - Spot
    ConfidentialComputeProperties:
      type: object
      description: The properties for confidential container group.
      properties:
        ccePolicy:
          type: string
          description: The base64 encoded confidential compute enforcement policy.
    ContainerGroupProfileFlattened:
      type: object
      description: Flattened view of ContainerGroupProfile ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        location:
          type: string
          description: The geo-location where the resource lives.
        zones:
          type: array
          items:
            type: string
          description: The availability zones.
        sku:
          $ref: "#/components/schemas/ContainerGroupSku"
          description: 'The SKU for a container group. Known values are: "NotSpecified", "Standard", "Dedicated", and "Confidential".'
        encryptionProperties:
          $ref: "#/components/schemas/EncryptionProperties"
          description: The encryption properties for a container group.
        containers:
          type: array
          items:
            $ref: "#/components/schemas/Container"
          description: The containers within the container group. Required.
        initContainers:
          type: array
          items:
            $ref: "#/components/schemas/InitContainerDefinition"
          description: The init containers for a container group.
        extensions:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentExtensionSpec"
          description: extensions used by virtual kubelet.
        imageRegistryCredentials:
          type: array
          items:
            $ref: "#/components/schemas/ImageRegistryCredential"
          description: The image registry credentials by which the container group is created from.
        restartPolicy:
          $ref: "#/components/schemas/ContainerGroupRestartPolicy"
          description: 'Restart policy for all containers within the container group. * `Always` Always restart * `OnFailure` Restart on failure * `Never` Never restart. Known values are: "Always", "OnFailure", and "Never".'
        shutdownGracePeriod:
          type: string
          format: date-time
          description: Shutdown grace period for containers in a container group.
        ipAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address type of the container group.
        timeToLive:
          type: string
          format: date-time
          description: Post completion time to live for containers of a CG.
        osType:
          $ref: "#/components/schemas/OperatingSystemTypes"
          description: 'The operating system type required by the containers in the container group. Required. Known values are: "Windows" and "Linux".'
        volumes:
          type: array
          items:
            $ref: "#/components/schemas/Volume"
          description: The list of volumes that can be mounted by containers in this container group.
