      type: object
      description: Plan for the resource. All required parameters must be populated in order to send to Azure.
      properties:
        name:
          type: string
          description: A user defined name of the 3rd Party Artifact that is being procured. Required.
        publisher:
          type: string
          description: The publisher of the 3rd Party Artifact that is being bought. E.g. NewRelic. Required.
        product:
          type: string
          description: The 3rd Party artifact that is being procured. E.g. NewRelic. Product maps to the OfferID specified for the artifact at the time of Data Market onboarding. Required.
        promotionCode:
          type: string
          description: A publisher provided promotion code as provisioned in Data Market for the said product/artifact.
        version:
          type: string
          description: The version of the desired product/artifact.
      required:
        - name
        - publisher
        - product
