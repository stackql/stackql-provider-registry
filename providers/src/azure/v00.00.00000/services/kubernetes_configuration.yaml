      description: Identity for the resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        principalId:
          type: string
          description: The principal ID of resource identity.
        tenantId:
          type: string
          description: The tenant ID of resource.
        type:
          type: string
          description: The identity type. Default value is "SystemAssigned".
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          type: string
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          type: string
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
