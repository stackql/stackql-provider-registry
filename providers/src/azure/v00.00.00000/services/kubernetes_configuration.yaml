paths:
  /providers/Microsoft.KubernetesConfiguration/operations?api-version=2023-05-01:
    get:
      operationId: kubernetesconfiguration_list
      description: List all the available operations the KubernetesConfiguration resource provider supports.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResourceProviderOperation"
  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/{cluster_rp}/{cluster_resource_name}/{cluster_name}/providers/Microsoft.KubernetesConfiguration/sourceControlConfigurations/{source_control_configuration_name}?api-version=2023-05-01:
    get:
      operationId: SourceControlConfigurations_get
      description: Gets details of the Source Control Configuration.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: cluster_rp
          in: path
          required: true
          schema:
            type: string
          description: The Kubernetes cluster RP - i.e. Microsoft.ContainerService, Microsoft.Kubernetes, Microsoft.HybridContainerService. Required.
        - name: cluster_resource_name
          in: path
          required: true
          schema:
            type: string
          description: The Kubernetes cluster resource name - i.e. managedClusters, connectedClusters, provisionedClusters. Required.
        - name: cluster_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the kubernetes cluster. Required.
        - name: source_control_configuration_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the Source Control Configuration. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceControlConfigurationFlattened"
    put:
      operationId: SourceControlConfigurations_create_or_update
      description: Create a new Kubernetes Source Control Configuration.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: cluster_rp
          in: path
          required: true
          schema:
            type: string
          description: The Kubernetes cluster RP - i.e. Microsoft.ContainerService, Microsoft.Kubernetes, Microsoft.HybridContainerService. Required.
        - name: cluster_resource_name
          in: path
          required: true
          schema:
            type: string
          description: The Kubernetes cluster resource name - i.e. managedClusters, connectedClusters, provisionedClusters. Required.
        - name: cluster_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the kubernetes cluster. Required.
        - name: source_control_configuration_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the Source Control Configuration. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: object
                  properties:
                    repositoryUrl:
                      type: string
                      description: Url of the SourceControl Repository.
                    operatorNamespace:
                      type: string
                      description: The namespace to which this operator is installed to. Maximum of 253 lower case alphanumeric characters, hyphen and period only.
                    operatorInstanceName:
                      type: string
                      description: Instance name of the operator - identifying the specific configuration.
                    operatorType:
                      type: string
                      description: Type of the operator. "Flux"
                    operatorParams:
                      type: string
                      description: Any Parameters for the Operator instance in string format.
                    configurationProtectedSettings:
                      type: object
                      properties: {}
                      description: Name-value pairs of protected configuration settings for the configuration.
                    operatorScope:
                      type: string
                      description: 'Scope at which the operator will be installed. Known values are: "cluster" and "namespace".'
                    sshKnownHostsContents:
                      type: string
                      description: Base64-encoded known_hosts contents containing public SSH keys required to access private Git instances.
                    enableHelmOperator:
                      type: boolean
