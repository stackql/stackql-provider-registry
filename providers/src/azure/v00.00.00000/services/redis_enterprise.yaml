          type: string
          description: The name of the group of linked database resources. This should match the existing replication group name.
        linkedDatabases:
          type: array
          items:
            $ref: "#/components/schemas/LinkedDatabase"
          description: The resource IDs of the databases that are expected to be linked and included in the replication group. This parameter is used to validate that the linking is to the expected (unlinked) part of the replication group, if it is splintered.
    MigrationProperties:
      type: object
      description: "Properties for Redis Enterprise migration operation. You probably want to use the sub-classes and not this class directly. Known sub-classes are: AzureCacheForRedisMigrationProperties"
      properties:
        sourceType:
          type: string
          description: Describes the source of the migration operation. Required. "AzureCacheForRedis"
        targetResourceId:
          type: string
          description: The Azure resource ID of the Azure Managed Redis destination cache to migrate.
        provisioningState:
          $ref: "#/components/schemas/MigrationProvisioningState"
          description: 'Current provisioning status of the migration. Known values are: "Accepted", "InProgress", "ReadyForDnsSwitch", "Succeeded", "Failed", "Cancelling", "Cancelled", and "CancellationFailed".'
        statusDetails:
          type: string
          description: Additional details about the migration operation's status in free text format.
        creationTime:
          type: string
          format: date-time
          description: The timestamp when the migration operation was created.
        lastModifiedTime:
          type: string
