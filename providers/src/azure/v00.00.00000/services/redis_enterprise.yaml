openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Managed Redis (Redis Enterprise)
  description: Redis Enterprise clusters and databases including Azure Managed Redis.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-02-01-preview-stackql-generated
  x-serviceAlias: redis_enterprise
  x-sdkPackage: azure-mgmt-redisenterprise
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AccessPolicyAssignmentProperties:
      type: object
      description: Properties of Redis Enterprise database access policy assignment.
      properties:
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Current provisioning status of the access policy assignment. Known values are: "Succeeded", "Failed", "Canceled", "Creating", "Updating", and "Deleting".'
        accessPolicyName:
          type: string
          description: Name of access policy under specific access policy assignment. Only "default" policy is supported for now. Required.
        user:
          $ref: "#/components/schemas/AccessPolicyAssignmentPropertiesUser"
          description: The user associated with the access policy. Required.
      required:
        - accessPolicyName
        - user
    ProvisioningState:
      type: string
      enum:
        - Succeeded
        - Failed
        - Canceled
        - Creating
        - Updating
        - Deleting
    AccessPolicyAssignmentPropertiesUser:
      type: object
      description: The user associated with the access policy.
      properties:
        objectId:
          type: string
          description: The object ID of the user.
    AccessPolicyAssignmentFlattened:
      type: object
      description: Flattened view of AccessPolicyAssignment ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Current provisioning status of the access policy assignment. Known values are: "Succeeded", "Failed", "Canceled", "Creating", "Updating", and "Deleting".'
        accessPolicyName:
          type: string
          description: Name of access policy under specific access policy assignment. Only "default" policy is supported for now. Required.
        user:
          $ref: "#/components/schemas/AccessPolicyAssignmentPropertiesUser"
          description: The user associated with the access policy. Required.
    PagedAccessPolicyAssignmentFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AccessPolicyAssignmentFlattened"
        nextLink:
          type: string
    AccessPolicyAssignment:
      type: object
      description: Describes the access policy assignment of Redis Enterprise database.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/AccessPolicyAssignmentProperties"
          description: Properties of the access policy assignment.
    DatabaseCreateProperties:
      type: object
      description: Properties for creating Redis Enterprise databases.
      properties:
        clientProtocol:
          $ref: "#/components/schemas/Protocol"
          description: 'Specifies whether redis clients can connect using TLS-encrypted or plaintext redis protocols. Default is TLS-encrypted. Known values are: "Encrypted" and "Plaintext".'
        port:
          type: integer
          description: TCP port of the database endpoint. Specified at create time. Defaults to an available port.
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Current provisioning status of the database. Known values are: "Succeeded", "Failed", "Canceled", "Creating", "Updating", and "Deleting".'
        resourceState:
          $ref: "#/components/schemas/ResourceState"
          description: 'Current resource status of the database. Known values are: "Running", "Creating", "CreateFailed", "Updating", "UpdateFailed", "Deleting", "DeleteFailed", "Enabling", "EnableFailed", "Disabling", "DisableFailed", "Disabled", "Scaling", "ScalingFailed", and "Moving".'
        clusteringPolicy:
          $ref: "#/components/schemas/ClusteringPolicy"
          description: 'Clustering policy - default is OSSCluster. This property can be updated only if the current value is NoCluster. If the value is OSSCluster or EnterpriseCluster, it cannot be updated without deleting the database. Known values are: "EnterpriseCluster", "OSSCluster", and "NoCluster".'
        evictionPolicy:
          $ref: "#/components/schemas/EvictionPolicy"
          description: 'Redis eviction policy - default is VolatileLRU. Known values are: "AllKeysLFU", "AllKeysLRU", "AllKeysRandom", "VolatileLRU", "VolatileLFU", "VolatileTTL", "VolatileRandom", and "NoEviction".'
        persistence:
          $ref: "#/components/schemas/Persistence"
          description: Persistence settings.
        modules:
          type: array
          items:
            $ref: "#/components/schemas/Module"
          description: Optional set of redis modules to enable in this database - modules can only be added at creation time.
        geoReplication:
          $ref: "#/components/schemas/DatabasePropertiesGeoReplication"
          description: Optional set of properties to configure geo replication for this database.
        redisVersion:
          type: string
          description: Version of Redis the database is running on, e.g. '6.0'.
        deferUpgrade:
          $ref: "#/components/schemas/DeferUpgradeSetting"
          description: 'Option to defer upgrade when newest version is released - default is NotDeferred. Learn more: `https://aka.ms/redisversionupgrade `_. Known values are: "Deferred" and "NotDeferred".'
        accessKeysAuthentication:
          $ref: "#/components/schemas/AccessKeysAuthentication"
          description: 'This property can be Enabled/Disabled to allow or deny access with the current access keys. Can be updated even after database is created. Known values are: "Disabled" and "Enabled".'
        notifyKeyspaceEvents:
          type: string
          description: Specifies which keyspace events should trigger notifications. Default is an empty string, meaning this feature is disabled. When enabled, at least 'K' (keyspace events) or 'E' (keyevent events) must be present. For example, 'AKE' enables all standard events. See `https://redis.io/docs/latest/develop/use/keyspace-notifications/ `_ for the complete list of event types.
    Protocol:
      type: string
      enum:
        - Encrypted
        - Plaintext
    ResourceState:
      type: string
      enum:
        - Running
        - Creating
        - CreateFailed
        - Updating
        - UpdateFailed
        - Deleting
        - DeleteFailed
        - Enabling
        - EnableFailed
        - Disabling
        - DisableFailed
        - Disabled
        - Scaling
        - ScalingFailed
        - Moving
    ClusteringPolicy:
      type: string
      enum:
        - EnterpriseCluster
        - OSSCluster
        - NoCluster
    EvictionPolicy:
      type: string
      enum:
        - AllKeysLFU
        - AllKeysLRU
        - AllKeysRandom
        - VolatileLRU
        - VolatileLFU
        - VolatileTTL
        - VolatileRandom
        - NoEviction
    Persistence:
      type: object
      description: Persistence-related configuration for the Redis Enterprise database.
      properties:
        aofEnabled:
          type: boolean
          description: Sets whether AOF is enabled. Note that at most one of AOF or RDB persistence may be enabled.
        rdbEnabled:
          type: boolean
          description: Sets whether RDB is enabled. Note that at most one of AOF or RDB persistence may be enabled.
        aofFrequency:
          $ref: "#/components/schemas/AofFrequency"
          description: "Sets the frequency at which data is written to disk. Defaults to '1s', meaning 'every second'. Note that the 'always' setting is deprecated, because of its performance impact. Known values are: \"1s\" and \"always\"."
        rdbFrequency:
          $ref: "#/components/schemas/RdbFrequency"
          description: 'Sets the frequency at which a snapshot of the database is created. Known values are: "1h", "6h", and "12h".'
    AofFrequency:
      type: string
      enum:
        - 1s
        - always
    RdbFrequency:
      type: string
      enum:
        - 1h
        - 6h
        - 12h
    Module:
      type: object
      description: Specifies configuration of a redis module.
      properties:
        name:
          type: string
          description: The name of the module, e.g. 'RedisBloom', 'RediSearch', 'RedisTimeSeries'. Required.
        args:
          type: string
          description: Configuration options for the module, e.g. 'ERROR_RATE 0.01 INITIAL_SIZE 400'.
        version:
          type: string
          description: The version of the module, e.g. '1.0'.
      required:
        - name
    DatabasePropertiesGeoReplication:
      type: object
      description: Optional set of properties to configure geo replication for this database.
      properties:
        groupNickname:
          type: string
          description: Name for the group of linked database resources.
        linkedDatabases:
          type: array
          items:
            $ref: "#/components/schemas/LinkedDatabase"
          description: List of database resources to link with this database.
    LinkedDatabase:
      type: object
      description: Specifies details of a linked database resource.
      properties:
        id:
          type: string
          description: Resource ID of a database resource to link with this database.
        state:
          $ref: "#/components/schemas/LinkState"
          description: 'State of the link between the database resources. Known values are: "Linked", "Linking", "Unlinking", "LinkFailed", and "UnlinkFailed".'
    LinkState:
      type: string
      enum:
        - Linked
        - Linking
        - Unlinking
        - LinkFailed
        - UnlinkFailed
    DeferUpgradeSetting:
      type: string
      enum:
        - Deferred
        - NotDeferred
    AccessKeysAuthentication:
      type: string
      enum:
        - Disabled
        - Enabled
    DatabaseFlattened:
      type: object
      description: Flattened view of Database ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
