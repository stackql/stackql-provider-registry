    MigrationValidationResponse:
      type: object
      description: Response for migration validation operation.
      properties:
        isValid:
          type: boolean
          description: Indicates whether the migration validation passed. Required.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/MigrationValidationError"
          description: List of validation errors that prevent migration.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/MigrationValidationWarning"
          description: List of validation warnings that may impact migration.
      required:
        - isValid
    MigrationValidationError:
      type: object
      description: Represents a validation error that prevents migration.
      properties:
        disparities:
          type: array
          items:
            $ref: "#/components/schemas/MigrationValidationDisparity"
          description: List of specific disparities that cause this error. Required.
      required:
        - disparities
    MigrationValidationDisparity:
      type: object
      description: Represents a specific validation issue found during migration validation.
      properties:
        category:
          type: string
          description: A localized string denoting the category of the validation issue. Examples are "Region", "Data", "Identity", "Clustering Mode", and "TLS". Required.
        message:
          type: string
          description: Detailed message describing the validation issue. Required.
      required:
        - category
        - message
    MigrationValidationWarning:
      type: object
      description: Represents a validation warning that may impact migration.
      properties:
        disparities:
          type: array
          items:
            $ref: "#/components/schemas/MigrationValidationDisparity"
          description: List of specific disparities that cause this warning. Required.
      required:
        - disparities
    OperationDisplay:
      type: object
      description: Localized display information for an operation.
      properties:
        provider:
          type: string
          description: The localized friendly form of the resource provider name, e.g. "Microsoft Monitoring Insights" or "Microsoft Compute".
        resource:
          type: string
          description: The localized friendly name of the resource type related to this operation. E.g. "Virtual Machines" or "Job Schedule Collections".
        operation:
          type: string
          description: The concise, localized friendly name for the operation; suitable for dropdowns. E.g. "Create or Update Virtual Machine", "Restart Virtual Machine".
        description:
          type: string
          description: The short, localized friendly description of the operation; suitable for tool tips and detailed views.
