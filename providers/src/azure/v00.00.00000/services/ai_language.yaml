openapi: 3.0.0
servers:
  - url: https://{endpoint}/language
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `Endpoint` parameter.
info:
  title: Azure AI Language (Data Plane)
  description: Conversational language understanding, question answering and their authoring surfaces - conversation analysis, QA runtime, and CLU/QA project authoring.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-11-15-preview-stackql-generated
  x-serviceAlias: ai_language
  x-sdkPackage: azure-ai-language-conversations
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    AnalyzeConversationActionResult:
      type: object
      description: "The base class of a conversation input task result. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ConversationActionResult, ConversationalAITaskResult"
      properties:
        kind:
          type: string
          description: 'The base class of a conversation input task result. Required. Known values are: "ConversationResult" and "ConversationalAIResult".'
      required:
        - kind
    AssignedProjectResource:
      type: object
      description: Represents the assigned project resource.
      properties:
        azureResourceId:
          type: string
          description: The Azure resource ID of the language or AI resource. Required.
        region:
          type: string
          description: The Azure resource region. Required.
        assignedAoaiResource:
          $ref: "#/components/schemas/DataGenerationConnectionInfo"
          description: Represents the AOAI resource assigned for data generation.
      required:
        - azureResourceId
        - region
    DataGenerationConnectionInfo:
      type: object
      description: Represents the connection info for the Azure resource to use during data generation.
      properties:
        kind:
          $ref: "#/components/schemas/DataGenerationConnectionKind"
          description: Connection type for data generation settings. Currently only supports Azure OpenAI. Required. "AzureOpenAI"
        deploymentName:
          type: string
          description: Deployment name of model to be used for synthetic data generation. Required.
        resourceId:
          type: string
          description: Resource ID for the data generation resource. Looks something like "/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CognitiveServices/accounts/{resourceName}".
      required:
        - kind
        - deploymentName
    DataGenerationConnectionKind:
      type: string
      enum:
        - AzureOpenAI
    ProjectDeployment:
      type: object
      description: Represents a project deployment.
      properties:
        deploymentName:
          type: string
          description: Represents deployment name. Required.
        modelId:
          type: string
          description: Represents deployment modelId. Required.
        lastTrainedDateTime:
          type: string
          format: date-time
          description: Represents deployment last trained time. Required.
        lastDeployedDateTime:
          type: string
          format: date-time
          description: Represents deployment last deployed time. Required.
        deploymentExpirationDate:
          type: string
          format: date
          description: Represents deployment expiration date in the runtime. Required.
        modelTrainingConfigVersion:
          type: string
          description: Represents model training config version. Required.
        assignedResources:
          type: array
          items:
            $ref: "#/components/schemas/AssignedProjectResource"
          description: Represents the metadata of the assigned Azure resources. Required.
      required:
        - modelId
        - lastTrainedDateTime
        - lastDeployedDateTime
        - deploymentExpirationDate
        - modelTrainingConfigVersion
        - assignedResources
    OperationStatus:
      type: string
      enum:
        - notStarted
        - running
        - succeeded
        - failed
        - cancelled
        - cancelling
        - partiallyCompleted
    DeploymentDeleteFromResourcesState:
      type: object
