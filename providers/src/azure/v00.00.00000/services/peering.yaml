  /subscriptions/{subscription_id}/providers/Microsoft.Peering/legacyPeerings?api-version=2019-08-01-preview:
    get:
      operationId: LegacyPeerings_list
      description: Lists all of the legacy peerings under the given subscription matching the specified kind and location.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
