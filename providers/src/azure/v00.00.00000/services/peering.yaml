        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: object
                  properties:
                    peerAsn:
                      type: integer
                      description: The Autonomous System Number (ASN) of the peer.
                    peerContactInfo:
                      $ref: "#/components/schemas/ContactInfo"
                      description: The contact information of the peer.
                    peerName:
                      type: string
                      description: The name of the peer.
                    validationState:
                      type: string
                      description: 'The validation state of the ASN associated with the peer. Known values are: "None", "Pending", "Approved", and "Failed".'
