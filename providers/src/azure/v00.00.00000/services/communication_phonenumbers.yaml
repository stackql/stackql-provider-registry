  /availablePhoneNumbers/reservations/{reservation_id}?api-version=2025-06-01:
    get:
      operationId: PhoneNumbers_get_reservation
      description: Gets a reservation by its ID. Retrieves the reservation with the given ID, including all of the phone numbers associated with it.
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
          description: The id of the reservation. Required.
