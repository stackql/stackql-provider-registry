openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Phone Numbers Client
  description: The phone numbers client uses Azure Communication Services to purchase and manage phone numbers.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-06-01-stackql-generated
  x-serviceAlias: communication_phonenumbers
  x-sdkPackage: azure-communication-phonenumbers
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    PhoneNumberAreaCode:
      type: object
      description: Represents an Area Code.
      properties:
        areaCode:
          type: string
          description: An area code.
    PagedPhoneNumberAreaCode:
      type: object
      properties:
        area_codes:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumberAreaCode"
        nextLink:
          type: string
    PhoneNumberCountry:
      type: object
      description: Represents a country. All required parameters must be populated in order to send to server.
      properties:
        localizedName:
          type: string
          description: Represents the name of the country. Required.
        countryCode:
          type: string
          description: Represents the abbreviated name of the country. Required.
      required:
        - localizedName
        - countryCode
    PagedPhoneNumberCountry:
      type: object
      properties:
        countries:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumberCountry"
        nextLink:
          type: string
    PhoneNumberAdministrativeDivision:
      type: object
      description: Represents an administrative division. e.g. state or province. All required parameters must be populated in order to send to server.
      properties:
        localizedName:
          type: string
          description: Represents the localized name of the administrative division of the locality. e.g. state or province localized name. Required.
        abbreviatedName:
          type: string
          description: Represents the abbreviated name of the administrative division of the locality. e.g. state or province abbreviation such as WA (Washington). Required.
      required:
        - localizedName
        - abbreviatedName
    PhoneNumberLocality:
      type: object
      description: Represents a locality. All required parameters must be populated in order to send to server.
      properties:
        localizedName:
          type: string
          description: Represents the localized name of the locality. Required.
        administrativeDivision:
          $ref: "#/components/schemas/PhoneNumberAdministrativeDivision"
          description: Represents an administrative division. e.g. state or province.
      required:
        - localizedName
    PagedPhoneNumberLocality:
      type: object
      properties:
        phone_number_localities:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumberLocality"
        nextLink:
          type: string
    PhoneNumberCapabilities:
      type: object
      description: Capabilities of a phone number. All required parameters must be populated in order to send to server.
      properties:
        calling:
          type: string
          description: 'Capability value for calling. Required. Known values are: "none", "inbound", "outbound", and "inbound+outbound".'
        sms:
          type: string
          description: 'Capability value for SMS. Required. Known values are: "none", "inbound", "outbound", and "inbound+outbound".'
      required:
        - calling
        - sms
    PhoneNumberCost:
      type: object
      description: The incurred cost for a single phone number. All required parameters must be populated in order to send to server.
      properties:
        amount:
          type: number
          description: The cost amount. Required.
        currencyCode:
          type: string
          description: The ISO 4217 currency code for the cost amount, e.g. USD. Required.
        billingFrequency:
          type: string
          description: The frequency with which the cost gets billed. Required. "monthly"
      required:
        - amount
        - currencyCode
        - billingFrequency
    PhoneNumberOffering:
      type: object
      description: Represents a phone number capability offering. All required parameters must be populated in order to send to server.
      properties:
        phoneNumberType:
          type: string
          description: 'Represents the number type of the offering. Known values are: "geographic", "tollFree", and "mobile".'
        assignmentType:
          type: string
          description: 'Represents the assignment type of the offering. Known values are: "person" and "application".'
        availableCapabilities:
          $ref: "#/components/schemas/PhoneNumberCapabilities"
          description: Capabilities of a phone number.
        cost:
          $ref: "#/components/schemas/PhoneNumberCost"
          description: The incurred cost for a single phone number. Required.
      required:
        - cost
    PagedPhoneNumberOffering:
      type: object
      properties:
        phone_number_offerings:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumberOffering"
        nextLink:
          type: string
    PhoneNumbersReservation:
      type: object
      description: Represents a reservation for phone numbers. A reservation is a temporary hold on phone numbers that can later be purchased. The reservation has a limited lifetime after which the phone numbers are released if not purchased. Reservations older than 1 month are automatically deleted. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        id:
          type: string
          description: The id of the reservation.
        expiresAt:
          type: string
          format: date-time
          description: The time at which the reservation will expire. If a reservation is not purchased before this time, all of the reserved phone numbers will be released and made available for others to purchase.
        phoneNumbers:
          type: object
          properties: {}
          description: A dictionary containing the reservation phone numbers. The key is the ID of the phone number (digits only) and values are AvailablePhoneNumber objects. Not populated when retrieving PhoneNumbersReservation collections.
        status:
          type: string
          description: "Represents the status of the reservation. Possible values include: 'active', 'submitted', 'completed', 'expired'. Known values are: \"active\", \"submitted\", \"completed\", and \"expired\"."
    PagedPhoneNumbersReservation:
      type: object
      properties:
        reservations:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumbersReservation"
        nextLink:
          type: string
    PurchasedPhoneNumber:
      type: object
      description: Represents a purchased phone number. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: The id of the phone number, e.g. 11234567890. Required.
        phoneNumber:
          type: string
          description: String of the E.164 format of the phone number, e.g. +11234567890. Required.
        countryCode:
          type: string
          description: The ISO 3166-2 code of the phone number's country, e.g. US. Required.
        phoneNumberType:
          type: string
          description: "The phone number's type, e.g. geographic, tollFree, mobile. Required. Known values are: \"geographic\", \"tollFree\", and \"mobile\"."
        capabilities:
          $ref: "#/components/schemas/PhoneNumberCapabilities"
          description: Capabilities of a phone number. Required.
        assignmentType:
          type: string
          description: 'The assignment type of the phone number. A phone number can be assigned to a person, or to an application. Required. Known values are: "person" and "application".'
        purchaseDate:
          type: string
          format: date-time
          description: The date and time that the phone number was purchased. Required.
        cost:
          $ref: "#/components/schemas/PhoneNumberCost"
          description: The incurred cost for a single phone number. Required.
      required:
        - id
        - phoneNumber
        - countryCode
        - phoneNumberType
        - capabilities
        - assignmentType
        - purchaseDate
        - cost
    PagedPurchasedPhoneNumber:
      type: object
      properties:
        phone_numbers:
          type: array
          items:
            $ref: "#/components/schemas/PurchasedPhoneNumber"
        nextLink:
          type: string
    PhoneNumberSearchResult:
      type: object
      description: The result of a phone number search operation. All required parameters must be populated in order to send to server.
      properties:
        searchId:
          type: string
          description: The search id. Required.
        phoneNumbers:
          type: array
          items:
            type: string
          description: The phone numbers that are available. Can be fewer than the desired search quantity. Required.
        phoneNumberType:
          type: string
          description: "The phone number's type, e.g. geographic, tollFree, mobile. Required. Known values are: \"geographic\", \"tollFree\", and \"mobile\"."
        assignmentType:
          type: string
          description: "Phone number's assignment type. Required. Known values are: \"person\" and \"application\"."
        capabilities:
          $ref: "#/components/schemas/PhoneNumberCapabilities"
          description: Capabilities of a phone number. Required.
        cost:
          $ref: "#/components/schemas/PhoneNumberCost"
          description: The incurred cost for a single phone number. Required.
        searchExpiresBy:
          type: string
          format: date-time
          description: The date that this search result expires and phone numbers are no longer on hold. A search result expires in less than 15min, e.g. 2020-11-19T16:31:49.048Z. Required.
        isAgreementToNotResellRequired:
          type: boolean
          description: Indicates if do not resell agreement is required. If true, the phone numbers cannot be acquired unless the customer provides explicit agreement to not resell them.
        errorCode:
          type: integer
          description: The error code of the search.
        error:
          type: string
          description: 'Mapping Error Messages to Codes. Known values are: "NoError", "UnknownErrorCode", "OutOfStock", "AuthorizationDenied", "MissingAddress", "InvalidAddress", "InvalidOfferModel", "NotEnoughLicenses", "NoWallet", "NotEnoughCredit", "NumbersPartiallyAcquired", "AllNumbersNotAcquired", "ReservationExpired", "PurchaseFailed", "BillingUnavailable", "ProvisioningFailed", and "UnknownSearchError".'
      required:
        - searchId
        - phoneNumbers
        - phoneNumberType
        - assignmentType
        - capabilities
        - cost
        - searchExpiresBy
    CommunicationError:
      type: object
      description: The Communication Services error. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        code:
          type: string
          description: The error code. Required.
        message:
          type: string
          description: The error message. Required.
        target:
          type: string
          description: The error target.
        details:
          type: array
          items:
            $ref: "#/components/schemas/CommunicationError"
          description: Further details about specific errors that led to this error.
        innererror:
          $ref: "#/components/schemas/CommunicationError"
          description: The inner error if any.
      required:
        - code
        - message
    PhoneNumberOperation:
      type: object
      description: PhoneNumberOperation. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        operationType:
          type: string
          description: 'The type of operation, e.g. Search. Required. Known values are: "purchase", "releasePhoneNumber", "search", "updatePhoneNumberCapabilities", and "reservationPurchase".'
        status:
          type: string
          description: 'Status of operation. Required. Known values are: "notStarted", "running", "succeeded", and "failed".'
        resourceLocation:
          type: string
          description: URL for retrieving the result of the operation, if any.
        createdDateTime:
          type: string
          format: date-time
          description: The date that the operation was created. Required.
        error:
          $ref: "#/components/schemas/CommunicationError"
          description: The Communication Services error.
        id:
          type: string
          description: Id of operation. Required.
        lastActionDateTime:
          type: string
          format: date-time
          description: The most recent date that the operation was changed.
      required:
        - operationType
        - status
        - createdDateTime
        - id
    PhoneNumberBrowseCapabilitiesRequest:
      type: object
      description: The minimum desired capabilities for the browse operation request.
      properties:
        calling:
          type: string
          description: 'Capability value for calling. Known values are: "none", "inbound", "outbound", and "inbound+outbound".'
        sms:
          type: string
          description: 'Capability value for SMS. Known values are: "none", "inbound", "outbound", and "inbound+outbound".'
    PhoneNumbersBrowseResult:
      type: object
      description: The result of a phone number browse operation. All required parameters must be populated in order to send to server.
      properties:
        phoneNumbers:
          type: array
          items:
            $ref: "#/components/schemas/AvailablePhoneNumber"
          description: The phone numbers that are available for purchase. Required.
      required:
        - phoneNumbers
    AvailablePhoneNumber:
      type: object
      description: Represents a phone number available in inventory. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: The id of the phone number.
        countryCode:
          type: string
          description: The ISO 3166-2 country code, e.g. US. Required.
        phoneNumber:
          type: string
          description: The phone number in E.164 format, e.g. +11234567890.
        capabilities:
          $ref: "#/components/schemas/PhoneNumberCapabilities"
          description: Capabilities of a phone number. Required.
        phoneNumberType:
          type: string
          description: 'Represents the number type of the offering. Required. Known values are: "geographic", "tollFree", and "mobile".'
        assignmentType:
          type: string
          description: 'Represents the assignment type of the offering. Also known as the use case. Required. Known values are: "person" and "application".'
        cost:
          $ref: "#/components/schemas/PhoneNumberCost"
          description: The incurred cost for this phone number.
        status:
          type: string
          description: "Represents the status of the phone number. Possible values include: 'available', 'reserved', 'expired', 'error', 'purchased'. Known values are: \"available\", \"reserved\", \"expired\", \"error\", and \"purchased\"."
        isAgreementToNotResellRequired:
          type: boolean
          description: Indicates if do not resell agreement is required. If true, the phone number cannot be acquired unless the customer provides explicit agreement to not resell it.
        error:
          $ref: "#/components/schemas/CommunicationError"
          description: The Communication Services error.
      required:
        - countryCode
        - capabilities
        - phoneNumberType
        - assignmentType
    OperatorInformationOptions:
      type: object
      description: Represents options to modify a search request for operator information.
      properties:
        includeAdditionalOperatorDetails:
          type: boolean
          description: "Includes the fields operatorDetails, numberType, and isoCountryCode in the response. Please note: use of this option will result in additional costs."
    OperatorInformationResult:
      type: object
      description: Represents a search result containing format and operator information associated with the requested phone numbers.
      properties:
        values:
          type: array
          items:
            $ref: "#/components/schemas/OperatorInformation"
          description: Results of a search. This array will have one entry per requested phone number which will contain the relevant operator information.
    OperatorInformation:
      type: object
      description: Represents metadata about a phone number that is controlled/provided by that phone number's operator. All required parameters must be populated in order to send to server.
      properties:
        phoneNumber:
          type: string
          description: E.164 formatted string representation of the phone number. Required.
        nationalFormat:
          type: string
          description: National format of the phone number.
        internationalFormat:
          type: string
          description: International format of the phone number.
        isoCountryCode:
          type: string
          description: ISO 3166-1 two character ('alpha-2') code associated with the phone number.
        numberType:
          type: string
          description: 'Type of service associated with the phone number. Known values are: "unknown", "other", "geographic", and "mobile".'
        operatorDetails:
          $ref: "#/components/schemas/OperatorDetails"
          description: Represents metadata describing the operator of a phone number.
      required:
        - phoneNumber
    OperatorDetails:
      type: object
      description: Represents metadata describing the operator of a phone number.
      properties:
        name:
          type: string
          description: Name of the phone operator.
        mobileNetworkCode:
          type: string
          description: Mobile Network Code, 2 or 3 decimal digits that identify mobile networks within a country/region.
        mobileCountryCode:
          type: string
          description: Mobile Country Code, 3 decimal digits that identify a country/region.
    SipTrunkRouteInternal:
      type: object
      description: Represents a trunk route for routing calls. All required parameters must be populated in order to send to Azure.
      properties:
        description:
          type: string
          description: Gets or sets description of the route.
        name:
          type: string
          description: Gets or sets name of the route. Required.
        numberPattern:
          type: string
          description: Gets or sets regex number pattern for routing calls. .NET regex format is supported. The regex should match only digits with an optional '+' prefix without spaces. I.e. "^+[1-9][0-9]{3,23}$". Required.
        trunks:
          type: array
          items:
            type: string
          description: Gets or sets list of SIP trunks for routing calls. Trunks are represented as FQDN.
      required:
        - name
        - numberPattern
    SipConfiguration:
      type: object
      description: Represents a SIP configuration. When a call is being routed the routes are applied in the same order as in the routes list. A route is matched by its number pattern. Call is then directed into route's first available trunk, based on the order in the route's trunks list.
      properties:
        trunks:
          type: object
          properties: {}
          description: SIP trunks for routing calls. Map key is trunk's FQDN (1-249 characters).
        routes:
          type: array
          items:
            $ref: "#/components/schemas/SipTrunkRouteInternal"
          description: Trunk routes for routing calls.
