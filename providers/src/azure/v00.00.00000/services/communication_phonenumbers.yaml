paths:
  /availablePhoneNumbers/countries/{country_code}/areaCodes?api-version=2025-06-01:
    get:
      operationId: PhoneNumbers_list_area_codes
      description: Gets the list of available area codes. Gets the list of available area codes.
      parameters:
        - name: country_code
          in: path
          required: true
          schema:
            type: string
          description: The ISO 3166-2 country code, e.g. US. Required.
        - name: phoneNumberType
          in: query
          required: true
