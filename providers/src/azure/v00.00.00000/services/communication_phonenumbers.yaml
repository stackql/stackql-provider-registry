        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneNumbersReservation"
    patch:
      operationId: PhoneNumbers_create_or_update_reservation
      description: Creates or updates a reservation by its ID. Adds and removes phone numbers from the reservation with the given ID. The response will be the updated state of the reservation. Phone numbers can be reserved by including them in the payload. If a number is already in the reservation, it will be ignored. To remove a phone number, set it explicitly to null in the request payload. This operation is idempotent. If a reservation with the same ID already exists, it will be updated, otherwise a new one is created. Only reservations with 'active' status can be updated. Updating a reservation will extend the expiration time of the reservation to 15 minutes after the last change, up to a maximum of 2 hours from creation time. Partial success is possible, in which case the response will have a 207 status code.
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
          description: The id of the reservation. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneNumbers:
                  type: object
                  properties: {}
                  description: A dictionary containing the reservation phone numbers. The key is the ID of the phone number (digits only) and values are AvailablePhoneNumber objects. Not populated when retrieving PhoneNumbersReservation collections.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneNumbersReservation"
    delete:
      operationId: PhoneNumbers_delete_reservation
      description: Deletes a reservation by its ID. Deletes the reservation with the given ID. Any phone number in the reservation will be released and made available for others to purchase. Only reservations with 'active' status can be deleted.
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
          description: The id of the reservation. Required.
      responses:
        "204":
          description: Success (no content / accepted)
