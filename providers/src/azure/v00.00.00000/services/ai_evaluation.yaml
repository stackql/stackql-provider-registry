      description: Metadata about the insights.
      properties:
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the insights were created. Required.
        completedAt:
          type: string
          format: date-time
          description: The timestamp when the insights were completed.
      required:
        - createdAt
    OperationState:
      type: string
