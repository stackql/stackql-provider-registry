      properties:
        type:
          type: string
          description: 'The type of request. Required. Known values are: "EvaluationRunClusterInsight", "AgentClusterInsight", and "EvaluationComparison".'
      required:
        - type
    InsightResult:
      type: object
      description: "The result of the insights. You probably want to use the sub-classes and not this class directly. Known sub-classes are: AgentClusterInsightResult, EvalCompareReport, EvaluationRunClusterInsightResult"
      properties:
        type:
          type: string
          description: 'The type of insights result. Required. Known values are: "EvaluationRunClusterInsight", "AgentClusterInsight", and "EvaluationComparison".'
      required:
        - type
    Insight:
      type: object
      description: The response body for cluster insights.
      properties:
        id:
          type: string
