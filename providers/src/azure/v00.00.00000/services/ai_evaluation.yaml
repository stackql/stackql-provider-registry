paths:
  /connections/{name}?api-version=2025-11-15-preview:
    get:
      operationId: Connections_get
      description: Get a connection by name, without populating connection credentials.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The friendly name of the connection, provided by the user. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
  /connections?api-version=2025-11-15-preview:
    get:
      operationId: Connections_list
      description: List all connections in the project, without populating connection credentials.
      parameters:
        - name: connectionType
          in: query
          required: false
          schema:
            type: string
          description: 'List connections of this specific type. Known values are: "AzureOpenAI", "AzureBlob", "AzureStorageAccount", "CognitiveSearch", "CosmosDB", "ApiKey", "AppConfig", "AppInsights", and "CustomKeys". Default value is None.'
        - name: defaultConnection
          in: query
          required: false
          schema:
            type: boolean
          description: List connections that are default connections. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedConnection"
  /connections/{name}/getConnectionWithCredentials?api-version=2025-11-15-preview:
    post:
      operationId: Connections_get_with_credentials
      description: Get a connection by name, with its connection credentials.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The friendly name of the connection, provided by the user. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
  /datasets/{name}/versions?api-version=2025-11-15-preview:
    get:
      operationId: Datasets_list_versions
      description: List all versions of the given DatasetVersion.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDatasetVersion"
  /datasets?api-version=2025-11-15-preview:
    get:
      operationId: Datasets_list_latest
      description: List the latest version of each DatasetVersion.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDatasetVersion"
  /datasets/{name}/versions/{version}?api-version=2025-11-15-preview:
    get:
      operationId: Datasets_get_version
      description: Get the specific version of the DatasetVersion. The service returns 404 Not Found error if the DatasetVersion does not exist.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource. Required.
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: The specific version id of the DatasetVersion to retrieve. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
    delete:
      operationId: Datasets_delete_version
      description: Delete the specific version of the DatasetVersion. The service returns 204 No Content if the DatasetVersion was deleted successfully or if the DatasetVersion does not exist.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource. Required.
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: The version of the DatasetVersion to delete. Required.
      responses:
        "204":
          description: Success (no content / accepted)
    patch:
      operationId: Datasets_create_or_update_version
      description: Create a new or update an existing DatasetVersion with the given version id.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource. Required.
        - name: version
          in: path
          required: true
