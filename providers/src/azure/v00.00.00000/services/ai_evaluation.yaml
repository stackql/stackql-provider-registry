openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Evaluation Service One D P Client
  description: Use Azure AI Evaluation SDK to assess the performance of your generative AI applications. Generative AI application generations are quantitatively measured with mathematical based metrics, AI-assisted quality and safety metrics. Metrics are defined as `evaluators`. Built-in or custom evaluators can provide comprehensive insights into the application's capabilities and limitations.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-11-15-preview-stackql-generated
  x-serviceAlias: ai_evaluation
  x-sdkPackage: azure-ai-evaluation
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ConnectionType:
      type: string
      enum:
        - AzureOpenAI
        - AzureBlob
        - AzureStorageAccount
        - CognitiveSearch
        - CosmosDB
        - ApiKey
        - AppConfig
        - AppInsights
        - CustomKeys
    BaseCredentials:
      type: object
      description: "A base class for connection credentials. You probably want to use the sub-classes and not this class directly. Known sub-classes are: EntraIDCredentials, ApiKeyCredentials, CustomCredential, NoAuthenticationCredentials, SASCredentials"
      properties:
        type:
          type: string
          description: 'The type of credential used by the connection. Required. Known values are: "ApiKey", "AAD", "SAS", "CustomKeys", and "None".'
    Connection:
      type: object
      description: Response from the list and get connections operations.
      properties:
        name:
          type: string
          description: The friendly name of the connection, provided by the user. Required.
        id:
          type: string
          description: A unique identifier for the connection, generated by the service. Required.
        type:
          $ref: "#/components/schemas/ConnectionType"
          description: 'Category of the connection. Required. Known values are: "AzureOpenAI", "AzureBlob", "AzureStorageAccount", "CognitiveSearch", "CosmosDB", "ApiKey", "AppConfig", "AppInsights", and "CustomKeys".'
        target:
          type: string
          description: The connection URL to be used for this service. Required.
        isDefault:
          type: boolean
          description: Whether the connection is tagged as the default connection of its type. Required.
        credentials:
          $ref: "#/components/schemas/BaseCredentials"
          description: The credentials used by the connection. Required.
        metadata:
          type: object
          properties: {}
          description: Metadata of the connection. Required.
    PagedConnection:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Connection"
        nextLink:
          type: string
    DatasetVersion:
      type: object
      description: "DatasetVersion Definition. You probably want to use the sub-classes and not this class directly. Known sub-classes are: FileDatasetVersion, FolderDatasetVersion"
      properties:
        dataUri:
          type: string
          description: "URI of the data. Example: `https://go.microsoft.com/fwlink/?linkid=2202330 `_. Required."
        type:
          type: string
          description: 'Dataset type. Required. Known values are: "uri_file" and "uri_folder".'
        isReference:
          type: boolean
          description: Indicates if the dataset holds a reference to the storage, or the dataset manages storage itself. If true, the underlying data will not be deleted when the dataset version is deleted.
        connectionName:
          type: string
          description: The Azure Storage Account connection name. Required if startPendingUploadVersion was not called before creating the Dataset.
        id:
          type: string
          description: Asset ID, a unique identifier for the asset.
        name:
          type: string
          description: The name of the resource. Required.
        version:
          type: string
          description: The version of the resource. Required.
        description:
          type: string
          description: The asset description text.
        tags:
          type: object
          properties: {}
          description: Tag dictionary. Tags can be added, removed, and updated.
      required:
        - dataUri
        - type
    PagedDatasetVersion:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DatasetVersion"
        nextLink:
          type: string
    AssetCredentialResponse:
      type: object
      description: Represents a reference to a blob for consumption.
      properties:
        blobReference:
          $ref: "#/components/schemas/BlobReference"
          description: Credential info to access the storage account. Required.
      required:
        - blobReference
    BlobReference:
      type: object
      description: Blob reference details.
      properties:
        blobUri:
          type: string
          description: "Blob URI path for client to upload data. Example: `https://blob.windows.core.net/Container/Path `_. Required."
        storageAccountArmId:
          type: string
          description: ARM ID of the storage account to use. Required.
        credential:
          $ref: "#/components/schemas/SasCredential"
          description: Credential info to access the storage account. Required.
      required:
        - blobUri
        - storageAccountArmId
        - credential
    SasCredential:
      type: object
      description: SAS Credential definition.
      properties:
        sasUri:
          type: string
          description: SAS uri. Required.
        type:
          type: string
          description: Type of credential. Required. Default value is "SAS".
    PendingUploadResponse:
      type: object
      description: Represents the response for a pending upload request.
      properties:
        blobReferenceForConsumption:
          $ref: "#/components/schemas/BlobReferenceForConsumption"
          description: Container-level read, write, list SAS. Required.
        blobReference:
          $ref: "#/components/schemas/BlobReference"
          description: Container-level read, write, list SAS. Required.
        pendingUploadId:
          type: string
          description: ID for this upload request. Required.
        version:
          type: string
          description: Version of asset to be created if user did not specify version when initially creating upload.
        pendingUploadType:
          type: string
          description: BlobReference is the only supported type. Required. Temporary Blob Reference is the only supported type.
      required:
        - blobReferenceForConsumption
        - blobReference
        - pendingUploadId
        - pendingUploadType
    BlobReferenceForConsumption:
      type: object
      description: Represents a reference to a blob for consumption.
      properties:
        blobUri:
          type: string
          description: "Blob URI path for client to upload data. Example: `https://blob.windows.core.net/Container/Path `_. Required."
        storageAccountArmId:
          type: string
          description: ARM ID of the storage account to use. Required.
        credential:
          $ref: "#/components/schemas/SasCredential"
          description: Credential info to access the storage account. Required.
      required:
        - blobUri
        - storageAccountArmId
        - credential
    Deployment:
      type: object
      description: "Model Deployment Definition. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ModelDeployment"
      properties:
        type:
          type: string
          description: The type of the deployment. Required. "ModelDeployment"
        name:
          type: string
          description: Name of the deployment. Required.
      required:
        - type
    PagedDeployment:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Deployment"
        nextLink:
          type: string
    ResultType:
      type: string
      enum:
        - Benchmark
        - Evaluation
        - Redteam
        - Simulation
    EvaluationResult:
      type: object
      description: Evaluation Result resource Definition.
      properties:
        resultType:
          $ref: "#/components/schemas/ResultType"
          description: 'Type of Evaluation result. Known values are: "Benchmark", "Evaluation", "Redteam", and "Simulation".'
        metrics:
          type: object
          properties: {}
          description: Aggregated metrics.
        blobUri:
          type: string
          description: Blob URI.
        id:
          type: string
          description: Asset ID, a unique identifier for the asset.
        name:
          type: string
          description: The name of the resource. Required.
        version:
          type: string
          description: The version of the resource. Required.
        description:
          type: string
          description: The asset description text.
        tags:
          type: object
          properties: {}
          description: Tag dictionary. Tags can be added, removed, and updated.
    PagedEvaluationResult:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/EvaluationResult"
        nextLink:
          type: string
    EvaluationRuleAction:
      type: object
      description: "Evaluation action model. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ContinuousEvaluationRuleAction, HumanEvaluationRuleAction"
      properties:
        type:
          type: string
          description: 'Type of the evaluation action. Required. Known values are: "continuousEvaluation" and "humanEvaluation".'
      required:
        - type
    EvaluationRuleFilter:
      type: object
      description: Evaluation filter model.
      properties:
        agentName:
          type: string
          description: Filter by agent name. Required.
      required:
        - agentName
    EvaluationRuleEventType:
      type: string
      enum:
        - response.completed
        - manual
    EvaluationRule:
      type: object
      description: Evaluation rule model.
      properties:
        id:
          type: string
          description: Unique identifier for the evaluation rule. Required.
        displayName:
          type: string
          description: Display Name for the evaluation rule.
        description:
          type: string
          description: Description for the evaluation rule.
        action:
          $ref: "#/components/schemas/EvaluationRuleAction"
          description: Definition of the evaluation rule action. Required.
        filter:
          $ref: "#/components/schemas/EvaluationRuleFilter"
          description: Filter condition of the evaluation rule.
        eventType:
          $ref: "#/components/schemas/EvaluationRuleEventType"
          description: 'Event type that the evaluation rule applies to. Required. Known values are: "response.completed" and "manual".'
        enabled:
          type: boolean
          description: Indicates whether the evaluation rule is enabled. Default is true. Required.
        systemData:
          type: object
          properties: {}
          description: System metadata for the evaluation rule. Required.
      required:
        - action
        - eventType
        - enabled
    PagedEvaluationRule:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/EvaluationRule"
        nextLink:
          type: string
    EvaluationTaxonomyInput:
      type: object
      description: "Input configuration for the evaluation taxonomy. You probably want to use the sub-classes and not this class directly. Known sub-classes are: AgentTaxonomyInput"
      properties:
        type:
          type: string
          description: 'Input type of the evaluation taxonomy. Required. Known values are: "agent" and "policy".'
      required:
        - type
    TaxonomyCategory:
      type: object
      description: Taxonomy category definition.
      properties:
        name:
          type: string
          description: Name of the taxonomy category. Required.
        description:
          type: string
          description: Description of the taxonomy category.
        riskCategory:
          $ref: "#/components/schemas/RiskCategory"
          description: 'Risk category associated with this taxonomy category. Required. Known values are: "HateUnfairness", "Violence", "Sexual", "SelfHarm", "ProtectedMaterial", "CodeVulnerability", and "UngroundedAttributes".'
        subCategories:
          type: array
          items:
            $ref: "#/components/schemas/TaxonomySubCategory"
          description: List of taxonomy sub categories. Required.
        properties:
          type: object
          properties: {}
          description: Additional properties for the taxonomy category.
      required:
        - name
        - riskCategory
        - subCategories
    RiskCategory:
      type: string
      enum:
        - HateUnfairness
        - Violence
        - Sexual
        - SelfHarm
        - ProtectedMaterial
        - CodeVulnerability
        - UngroundedAttributes
    TaxonomySubCategory:
      type: object
      description: Taxonomy sub-category definition.
      properties:
        name:
          type: string
          description: Name of the taxonomy sub-category. Required.
        description:
          type: string
          description: Description of the taxonomy sub-category.
        enabled:
          type: boolean
          description: List of taxonomy items under this sub-category. Required.
        properties:
          type: object
          properties: {}
          description: Additional properties for the taxonomy sub-category.
      required:
        - name
        - enabled
    EvaluationTaxonomy:
      type: object
      description: Evaluation Taxonomy Definition.
      properties:
        id:
          type: string
          description: Asset ID, a unique identifier for the asset.
        name:
          type: string
          description: The name of the resource. Required.
        version:
          type: string
          description: The version of the resource. Required.
        description:
          type: string
          description: The asset description text.
        tags:
          type: object
          properties: {}
          description: Tag dictionary. Tags can be added, removed, and updated.
        taxonomyInput:
          $ref: "#/components/schemas/EvaluationTaxonomyInput"
          description: Input configuration for the evaluation taxonomy. Required.
        taxonomyCategories:
          type: array
          items:
            $ref: "#/components/schemas/TaxonomyCategory"
          description: List of taxonomy categories. Required.
        properties:
          type: object
          properties: {}
          description: Additional properties for the evaluation taxonomy.
      required:
        - taxonomyInput
        - taxonomyCategories
    PagedEvaluationTaxonomy:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/EvaluationTaxonomy"
        nextLink:
          type: string
    InputData:
      type: object
      description: "Abstract data class. You probably want to use the sub-classes and not this class directly. Known sub-classes are: InputDataset"
      properties:
        type:
          type: string
          description: Type of the data. Required. Default value is None.
      required:
        - type
    EvaluationTarget:
      type: object
      description: "Abstract base model for defining evaluation targets. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ModelResponseGenerationTarget"
      properties:
        type:
          type: string
          description: Discriminator that defines the type of the evaluation target. Required. "modelResponseGeneration"
      required:
        - type
    Evaluation:
      type: object
      description: Evaluation Definition.
      properties:
        id:
          type: string
          description: Identifier of the evaluation. Required.
        data:
          $ref: "#/components/schemas/InputData"
          description: Data for evaluation. Required.
        displayName:
          type: string
          description: Display Name for evaluation. It helps to find the evaluation easily in AI Foundry. It does not need to be unique.
        description:
          type: string
          description: Description of the evaluation. It can be used to store additional information about the evaluation and is mutable.
        status:
          type: string
          description: Status of the evaluation. It is set by service and is read-only.
        tags:
          type: object
          properties: {}
          description: Evaluation's tags. Unlike properties, tags are fully mutable.
        properties:
          type: object
          properties: {}
          description: Evaluation's properties. Unlike tags, properties are add-only. Once added, a property cannot be removed.
        evaluators:
          type: object
          properties: {}
          description: Evaluators to be used for the evaluation. Required.
        target:
          $ref: "#/components/schemas/EvaluationTarget"
          description: Specifies the type and configuration of the entity used for this evaluation.
      required:
        - data
        - evaluators
    PagedEvaluation:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Evaluation"
        nextLink:
          type: string
    AgentEvaluationSamplingConfiguration:
      type: object
      description: Definition for sampling strategy.
      properties:
        name:
          type: string
          description: Name of the sampling strategy. Required.
        samplingPercent:
          type: number
          description: Percentage of sampling per hour (0-100). Required.
        maxRequestRate:
          type: number
          description: Maximum request rate per hour (0 to 1000). Required.
      required:
        - name
        - samplingPercent
        - maxRequestRate
    AgentEvaluationRedactionConfiguration:
      type: object
      description: The redaction configuration will allow the user to control what is redacted.
      properties:
        redactScoreProperties:
          type: boolean
          description: Redact score properties. If not specified, the default is to redact in production.
    AgentEvaluation:
      type: object
      description: Evaluation response for agent evaluation run.
      properties:
        id:
          type: string
          description: Identifier of the agent evaluation run. Required.
        status:
          type: string
          description: "Status of the agent evaluation. Options: Running, Completed, Failed. Required."
        error:
          type: string
          description: The reason of the request failure for the long running process, if applicable.
        result:
          type: array
          items:
            $ref: "#/components/schemas/AgentEvaluationResult"
          description: The agent evaluation result.
      required:
        - id
        - status
    AgentEvaluationResult:
      type: object
      description: Result for the agent evaluation evaluator run.
      properties:
        evaluator:
          type: string
          description: Evaluator's name. This is the name of the evaluator that was used to evaluate the agent's completion. Required.
        evaluatorId:
          type: string
          description: Identifier of the evaluator. Required.
        score:
          type: number
          description: Score of the given evaluator. No restriction on range. Required.
        status:
          type: string
          description: "Status of the evaluator result. Options: Running, Completed, Failed, NotApplicable. Required."
        reason:
          type: string
          description: Reasoning for the evaluation result.
        version:
          type: string
          description: Version of the evaluator that was used to evaluate the agent's completion.
        threadId:
          type: string
          description: The unique identifier of the thread.
        runId:
          type: string
          description: The unique identifier of the run. Required.
        error:
          type: string
          description: A string explaining why there was an error, if applicable.
        additionalDetails:
          type: object
          properties: {}
          description: Additional properties relevant to the evaluator. These will differ between evaluators.
      required:
        - evaluator
        - evaluatorId
        - score
        - status
        - runId
    Content:
      type: object
      description: Content.
      properties:
        Messages:
          type: array
          items:
            type: object
            properties: {}
          description: Required.
      required:
        - Messages
    EvaluatorType:
      type: string
      enum:
