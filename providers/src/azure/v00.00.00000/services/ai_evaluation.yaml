        - safety
        - agents
    EvaluatorDefinition:
      type: object
      description: "Base evaluator configuration with discriminator. You probably want to use the sub-classes and not this class directly. Known sub-classes are: CodeBasedEvaluatorDefinition, PromptBasedEvaluatorDefinition"
      properties:
        type:
          type: string
          description: 'The type of evaluator definition. Required. Known values are: "prompt", "code", "prompt_and_code", "service", and "openai_graders".'
        init_parameters:
          type: object
          properties: {}
          description: The JSON schema (Draft 2020-12) for the evaluator's input parameters. This includes parameters like type, properties, required.
        data_schema:
          type: object
          properties: {}
          description: The JSON schema (Draft 2020-12) for the evaluator's input data. This includes parameters like type, properties, required.
        metrics:
          type: object
          properties: {}
          description: List of output metrics produced by this evaluator.
      required:
        - type
    EvaluatorVersion:
      type: object
      description: Evaluator Definition.
      properties:
        display_name:
          type: string
          description: Display Name for evaluator. It helps to find the evaluator easily in AI Foundry. It does not need to be unique.
        metadata:
          type: object
          properties: {}
          description: Metadata about the evaluator.
        evaluator_type:
          $ref: "#/components/schemas/EvaluatorType"
          description: 'The type of the evaluator. Required. Known values are: "builtin" and "custom".'
        categories:
          type: array
          items:
            $ref: "#/components/schemas/EvaluatorCategory"
          description: The categories of the evaluator. Required.
        definition:
          $ref: "#/components/schemas/EvaluatorDefinition"
          description: Definition of the evaluator. Required.
        created_by:
          type: string
          description: Creator of the evaluator. Required.
        created_at:
          type: integer
          description: Creation date/time of the evaluator. Required.
        modified_at:
          type: integer
          description: Last modified date/time of the evaluator. Required.
        id:
          type: string
          description: Asset ID, a unique identifier for the asset.
        name:
          type: string
          description: The name of the resource. Required.
        version:
          type: string
          description: The version of the resource. Required.
        description:
          type: string
          description: The asset description text.
        tags:
          type: object
          properties: {}
          description: Tag dictionary. Tags can be added, removed, and updated.
      required:
        - evaluator_type
        - categories
        - definition
    PagedEvaluatorVersion:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/EvaluatorVersion"
        nextLink:
          type: string
    Index:
      type: object
      description: "Index resource Definition. You probably want to use the sub-classes and not this class directly. Known sub-classes are: AzureAISearchIndex, CosmosDBIndex, ManagedAzureAISearchIndex"
      properties:
        type:
          type: string
          description: 'Type of index. Required. Known values are: "AzureSearch", "CosmosDBNoSqlVectorStore", and "ManagedAzureSearch".'
        id:
          type: string
          description: Asset ID, a unique identifier for the asset.
        name:
          type: string
          description: The name of the resource. Required.
        version:
          type: string
          description: The version of the resource. Required.
        description:
          type: string
