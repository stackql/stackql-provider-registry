          type: integer
          description: The number of tokens corresponding to audio input. Required.
        reasoning_tokens:
          type: integer
          description: The number of tokens corresponding to reasoning. Required.
        total_tokens:
          type: integer
          description: The total number of tokens processed for the completions request and response. Required.
    PromptUsageDetails:
