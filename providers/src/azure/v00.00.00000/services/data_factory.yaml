openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Data Factory
  description: Data integration pipelines, datasets, linked services, triggers and integration runtimes.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2018-06-01-stackql-generated
  x-serviceAlias: data_factory
  x-sdkPackage: azure-mgmt-datafactory
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    RunQueryFilter:
      type: object
      description: Query filter option for listing runs.
      properties:
        operand:
          $ref: "#/components/schemas/RunQueryFilterOperand"
          description: 'Parameter name to be used for filter. The allowed operands to query pipeline runs are PipelineName, RunStart, RunEnd and Status; to query activity runs are ActivityName, ActivityRunStart, ActivityRunEnd, ActivityType and Status, and to query trigger runs are TriggerName, TriggerRunTimestamp and Status. Required. Known values are: "PipelineName", "Status", "RunStart", "RunEnd", "ActivityName", "ActivityRunStart", "ActivityRunEnd", "ActivityType", "TriggerName", "TriggerRunTimestamp", "RunGroupId", and "LatestOnly".'
        operator:
          $ref: "#/components/schemas/RunQueryFilterOperator"
          description: 'Operator to be used for filter. Required. Known values are: "Equals", "NotEquals", "In", and "NotIn".'
        values:
          type: array
          items:
            type: string
          description: List of filter values. Required.
      required:
        - operand
        - operator
        - values
    RunQueryFilterOperand:
      type: string
      enum:
        - PipelineName
        - Status
        - RunStart
        - RunEnd
        - ActivityName
        - ActivityRunStart
        - ActivityRunEnd
        - ActivityType
        - TriggerName
        - TriggerRunTimestamp
        - RunGroupId
        - LatestOnly
    RunQueryFilterOperator:
      type: string
      enum:
        - Equals
        - NotEquals
        - In
        - NotIn
    RunQueryOrderBy:
      type: object
      description: An object to provide order by options for listing runs.
      properties:
        orderBy:
          $ref: "#/components/schemas/RunQueryOrderByField"
          description: 'Parameter name to be used for order by. The allowed parameters to order by for pipeline runs are PipelineName, RunStart, RunEnd and Status; for activity runs are ActivityName, ActivityRunStart, ActivityRunEnd and Status; for trigger runs are TriggerName, TriggerRunTimestamp and Status. Required. Known values are: "RunStart", "RunEnd", "PipelineName", "Status", "ActivityName", "ActivityRunStart", "ActivityRunEnd", "TriggerName", and "TriggerRunTimestamp".'
        order:
          $ref: "#/components/schemas/RunQueryOrder"
          description: 'Sorting order of the parameter. Required. Known values are: "ASC" and "DESC".'
      required:
        - orderBy
        - order
    RunQueryOrderByField:
      type: string
      enum:
        - RunStart
        - RunEnd
        - PipelineName
        - Status
        - ActivityName
        - ActivityRunStart
        - ActivityRunEnd
        - TriggerName
        - TriggerRunTimestamp
    RunQueryOrder:
      type: string
      enum:
        - ASC
        - DESC
    ActivityRun:
      type: object
      description: Information about an activity run in a pipeline.
      properties:
        pipelineName:
          type: string
          description: The name of the pipeline.
        pipelineRunId:
          type: string
          description: The id of the pipeline run.
        activityName:
          type: string
          description: The name of the activity.
        activityType:
          type: string
          description: The type of the activity.
        activityRunId:
          type: string
          description: The id of the activity run.
        linkedServiceName:
          type: string
          description: The name of the compute linked service.
        status:
          type: string
          description: The status of the activity run.
        activityRunStart:
          type: string
