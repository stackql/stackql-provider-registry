openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure VM Image Builder
  description: Image template pipelines that build and distribute custom VM images.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-10-01-stackql-generated
  x-serviceAlias: image_builder
  x-sdkPackage: azure-mgmt-imagebuilder
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    OperationDisplay:
      type: object
      description: The object that describes the operation.
      properties:
        provider:
          type: string
          description: Friendly name of the resource provider.
        operation:
          type: string
          description: "For example: read, write, delete, or listKeys/action."
        resource:
          type: string
          description: The resource type on which the operation is performed.
        description:
          type: string
          description: The friendly name of the operation.
    Operation:
      type: object
      description: A REST API operation.
      properties:
        name:
          type: string
          description: This is of the format {provider}/{resource}/{operation}.
        display:
          $ref: "#/components/schemas/OperationDisplay"
          description: The object that describes the operation.
        origin:
          type: string
          description: The intended executor of the operation.
        properties:
          type: object
          properties: {}
          description: Properties of the operation.
        isDataAction:
          type: boolean
          description: The flag that indicates whether the operation applies to data plane.
    PagedOperation:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
        nextLink:
          type: string
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    TriggerProperties:
      type: object
      description: "Describes the properties of a trigger. You probably want to use the sub-classes and not this class directly. Known sub-classes are: SourceImageTriggerProperties"
      properties:
        kind:
          type: string
          description: The kind of trigger. Required. Default value is None.
        status:
          $ref: "#/components/schemas/TriggerStatus"
          description: Trigger status.
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Provisioning state of the resource. Known values are: "Creating", "Updating", "Succeeded", "Failed", "Deleting", and "Canceled".'
      required:
        - kind
    TriggerStatus:
      type: object
      description: Describes the status of a trigger.
      properties:
        code:
          type: string
          description: The status code.
        message:
          type: string
          description: The detailed status message, including for alerts and error messages.
        time:
          type: string
          format: date-time
          description: The time of the status.
    ProvisioningState:
      type: string
      enum:
        - Creating
        - Updating
        - Succeeded
        - Failed
        - Deleting
        - Canceled
    TriggerFlattened:
      type: object
      description: Flattened view of Trigger ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        kind:
          type: string
          description: The kind of trigger. Required. Default value is None.
        status:
          $ref: "#/components/schemas/TriggerStatus"
          description: Trigger status.
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Provisioning state of the resource. Known values are: "Creating", "Updating", "Succeeded", "Failed", "Deleting", and "Canceled".'
    PagedTriggerFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TriggerFlattened"
        nextLink:
          type: string
    Trigger:
      type: object
      description: Represents a trigger that can invoke an image template build.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/TriggerProperties"
          description: The properties of a trigger.
    ImageTemplateProperties:
      type: object
      description: Describes the properties of an image template.
      properties:
        source:
          $ref: "#/components/schemas/ImageTemplateSource"
          description: Specifies the properties used to describe the source image. Required.
        customize:
          type: array
          items:
            $ref: "#/components/schemas/ImageTemplateCustomizer"
          description: Specifies the properties used to describe the customization steps of the image, like Image source etc.
        optimize:
          $ref: "#/components/schemas/ImageTemplatePropertiesOptimize"
          description: Specifies optimization to be performed on image.
        validate:
          $ref: "#/components/schemas/ImageTemplatePropertiesValidate"
          description: Configuration options and list of validations to be performed on the resulting image.
        distribute:
          type: array
          items:
            $ref: "#/components/schemas/ImageTemplateDistributor"
          description: The distribution targets where the image output needs to go to. Required.
        errorHandling:
          $ref: "#/components/schemas/ImageTemplatePropertiesErrorHandling"
          description: Error handling options upon a build failure.
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Provisioning state of the resource. Known values are: "Creating", "Updating", "Succeeded", "Failed", "Deleting", and "Canceled".'
        provisioningError:
          $ref: "#/components/schemas/ProvisioningError"
          description: Provisioning error, if any.
        lastRunStatus:
          $ref: "#/components/schemas/ImageTemplateLastRunStatus"
          description: State of 'run' that is currently executing or was last executed.
        buildTimeoutInMinutes:
          type: integer
          description: Maximum duration to wait while building the image template (includes all customizations, optimization, validations, and distributions). Omit or specify 0 to use the default (4 hours).
        vmProfile:
          $ref: "#/components/schemas/ImageTemplateVmProfile"
          description: Describes how virtual machine is set up to build images.
        additionalDataDisks:
          type: array
          items:
            $ref: "#/components/schemas/DataDisk"
          description: Optional array of additional data disks to be added to the image.
        stagingResourceGroup:
          type: string
          description: The staging resource group id in the same subscription as the image template that will be used to build the image. If this field is empty, a resource group with a random name will be created. If the resource group specified in this field doesn't exist, it will be created with the same name. If the resource group specified exists, it must be empty and in the same region as the image template. The resource group created will be deleted during template deletion if this field is empty or the resource group specified doesn't exist, but if the resource group specified exists the resources created in the resource group will be deleted during template deletion and the resource group itself will remain.
        exactStagingResourceGroup:
          type: string
          description: The staging resource group id in the same subscription as the image template that will be used to build the image. This read-only field differs from 'stagingResourceGroup' only if the value specified in the 'stagingResourceGroup' field is empty.
        autoRun:
          $ref: "#/components/schemas/ImageTemplateAutoRun"
          description: Indicates whether or not to automatically run the image template build on template creation or update.
        managedResourceTags:
          type: object
          properties: {}
          description: Tags that will be applied to the resource group and/or resources created by the service.
      required:
        - source
        - distribute
    ImageTemplateSource:
      type: object
      description: "Describes a virtual machine image source for building, customizing and distributing. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ImageTemplateManagedImageSource, ImageTemplatePlatformImageSource, ImageTemplateSharedImageVersionSource"
      properties:
        type:
          type: string
          description: Specifies the type of source image you want to start with. Required. Default value is None.
      required:
        - type
    ImageTemplateCustomizer:
      type: object
      description: "Describes a unit of image customization. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ImageTemplateFileCustomizer, ImageTemplatePowerShellCustomizer, ImageTemplateShellCustomizer, ImageTemplateRestartCustomizer, ImageTemplateWindowsUpdateCustomizer"
      properties:
        type:
          type: string
          description: The type of customization tool you want to use on the Image. For example, "Shell" can be shell customizer. Required. Default value is None.
        name:
          type: string
          description: Friendly Name to provide context on what this customization step does.
      required:
        - type
    ImageTemplatePropertiesOptimize:
      type: object
      description: Specifies optimization to be performed on image.
      properties:
        vmBoot:
          $ref: "#/components/schemas/ImageTemplatePropertiesOptimizeVmBoot"
          description: Optimization is applied on the image for a faster VM boot.
        workload:
          $ref: "#/components/schemas/ImageTemplatePropertiesOptimizeWorkload"
          description: Optimization is applied on the image for specific workloads.
    ImageTemplatePropertiesOptimizeVmBoot:
      type: object
      description: Optimization is applied on the image for a faster VM boot.
      properties:
        state:
          $ref: "#/components/schemas/VMBootOptimizationState"
          description: 'Enabling this field will improve VM boot time by optimizing the final customized image output. Known values are: "Enabled" and "Disabled".'
    VMBootOptimizationState:
      type: string
      enum:
        - Enabled
        - Disabled
    ImageTemplatePropertiesOptimizeWorkload:
      type: object
      description: Optimization is applied on the image for specific workloads.
      properties:
        state:
          $ref: "#/components/schemas/WorkloadOptimizationState"
          description: 'Enabling this field will optimize vm images for specific workloads. Known values are: "Enabled" and "Disabled".'
        scriptUri:
          type: string
          description: URI of the script to be run for workload optimization. It can be a github link, SAS URI for Azure Storage, etc.
        sha256Checksum:
          type: string
          description: SHA256 checksum of the script provided in the scriptUri field.
    WorkloadOptimizationState:
      type: string
      enum:
        - Enabled
        - Disabled
    ImageTemplatePropertiesValidate:
      type: object
      description: Configuration options and list of validations to be performed on the resulting image.
      properties:
        continueDistributeOnFailure:
          type: boolean
          description: "If validation fails and this field is set to false, output image(s) will not be distributed. This is the default behavior. If validation fails and this field is set to true, output image(s) will still be distributed. Please use this option with caution as it may result in bad images being distributed for use. In either case (true or false), the end to end image run will be reported as having failed in case of a validation failure. [Note: This field has no effect if validation succeeds.]."
        sourceValidationOnly:
          type: boolean
          description: If this field is set to true, the image specified in the 'source' section will directly be validated. No separate build will be run to generate and then validate a customized image.
        inVMValidations:
          type: array
          items:
            $ref: "#/components/schemas/ImageTemplateInVMValidator"
          description: List of validations to be performed.
    ImageTemplateInVMValidator:
      type: object
      description: "Describes a unit of in-VM validation of image. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ImageTemplateFileValidator, ImageTemplatePowerShellValidator, ImageTemplateShellValidator"
      properties:
        type:
          type: string
          description: The type of validation you want to use on the Image. For example, "Shell" can be shell validation. Required. Default value is None.
        name:
          type: string
          description: Friendly Name to provide context on what this validation step does.
      required:
        - type
    ImageTemplateDistributor:
      type: object
      description: "Generic distribution object. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ImageTemplateManagedImageDistributor, ImageTemplateSharedImageDistributor, ImageTemplateVhdDistributor"
      properties:
        type:
          type: string
          description: Type of distribution. Required. Default value is None.
        runOutputName:
          type: string
          description: The name to be used for the associated RunOutput. Required.
        artifactTags:
          type: object
          properties: {}
          description: Tags that will be applied to the artifact once it has been created/updated by the distributor.
      required:
        - type
        - runOutputName
    ImageTemplatePropertiesErrorHandling:
      type: object
      description: Error handling options upon a build failure.
      properties:
        onCustomizerError:
          $ref: "#/components/schemas/OnBuildError"
          description: "If there is a customizer error and this field is set to 'cleanup', the build VM and associated network resources will be cleaned up. This is the default behavior. If there is a customizer error and this field is set to 'abort', the build VM will be preserved. Known values are: \"cleanup\" and \"abort\"."
        onValidationError:
          $ref: "#/components/schemas/OnBuildError"
          description: "If there is a validation error and this field is set to 'cleanup', the build VM and associated network resources will be cleaned up. This is the default behavior. If there is a validation error and this field is set to 'abort', the build VM will be preserved. Known values are: \"cleanup\" and \"abort\"."
    OnBuildError:
      type: string
      enum:
        - cleanup
        - abort
    ProvisioningError:
      type: object
      description: Describes the error happened when create or update an image template.
      properties:
        provisioningErrorCode:
          $ref: "#/components/schemas/ProvisioningErrorCode"
          description: 'Error code of the provisioning failure. Known values are: "BadSourceType", "BadPIRSource", "BadManagedImageSource", "BadSharedImageVersionSource", "BadCustomizerType", "UnsupportedCustomizerType", "NoCustomizerScript", "BadValidatorType", "UnsupportedValidatorType", "NoValidatorScript", "BadDistributeType", "BadSharedImageDistribute", "BadStagingResourceGroup", "ServerError", and "Other".'
        message:
          type: string
          description: Verbose error message about the provisioning failure.
    ProvisioningErrorCode:
      type: string
      enum:
        - BadSourceType
        - BadPIRSource
        - BadManagedImageSource
        - BadSharedImageVersionSource
        - BadCustomizerType
        - UnsupportedCustomizerType
        - NoCustomizerScript
        - BadValidatorType
        - UnsupportedValidatorType
        - NoValidatorScript
        - BadDistributeType
        - BadSharedImageDistribute
        - BadStagingResourceGroup
        - ServerError
        - Other
    ImageTemplateLastRunStatus:
      type: object
      description: Describes the latest status of running an image template.
      properties:
        startTime:
          type: string
          format: date-time
          description: Start time of the last run (UTC).
        endTime:
          type: string
          format: date-time
          description: End time of the last run (UTC).
        runState:
          $ref: "#/components/schemas/RunState"
          description: 'State of the last run. Known values are: "Running", "Canceling", "Succeeded", "PartiallySucceeded", "Failed", and "Canceled".'
        runSubState:
          $ref: "#/components/schemas/RunSubState"
          description: 'Sub-state of the last run. Known values are: "Queued", "Building", "Customizing", "Optimizing", "Validating", and "Distributing".'
        message:
          type: string
          description: Verbose information about the last run state.
    RunState:
      type: string
      enum:
        - Running
        - Canceling
        - Succeeded
        - PartiallySucceeded
        - Failed
        - Canceled
    RunSubState:
      type: string
      enum:
        - Queued
        - Building
        - Customizing
        - Optimizing
        - Validating
        - Distributing
    ImageTemplateVmProfile:
      type: object
      description: Describes the virtual machines used to build and validate images.
      properties:
        vmSize:
          type: string
          description: Size of the virtual machine used to build, customize and capture images. Omit or specify empty string to use the default (Standard_D1_v2 for Gen1 images and Standard_D2ds_v4 for Gen2 images).
        osDiskSizeGB:
          type: integer
          description: Size of the OS disk in GB. Omit or specify 0 to use Azure's default OS disk size.
        userAssignedIdentities:
          type: array
          items:
            type: string
          description: Optional array of resource IDs of user assigned managed identities to be configured on the build VM and validation VM. This may include the identity of the image template.
        vnetConfig:
          $ref: "#/components/schemas/VirtualNetworkConfig"
          description: Optional configuration of the virtual network to use to deploy the build VM and validation VM in. Omit if no specific virtual network needs to be used.
    VirtualNetworkConfig:
      type: object
      description: Virtual Network configuration.
      properties:
        subnetId:
          type: string
          description: Resource id of a pre-existing subnet on which the build VM and validation VM will be deployed.
        containerInstanceSubnetId:
          type: string
          description: Resource id of a pre-existing subnet on which Azure Container Instance will be deployed for Isolated Builds. This field may be specified only if `subnetId` is also specified and must be on the same Virtual Network as the subnet specified in `subnetId`.
        proxyVmSize:
          type: string
          description: Size of the proxy virtual machine used to pass traffic to the build VM and validation VM. This must not be specified if `containerInstanceSubnetId` is specified because no proxy virtual machine is deployed in that case. Omit or specify empty string to use the default (Standard_A1_v2).
    DataDisk:
      type: object
      description: Data disk properties.
      properties:
        sizeGB:
          type: integer
          description: Size of the data disk in GB.
    ImageTemplateAutoRun:
      type: object
      description: Indicates if the image template needs to be built on create/update.
      properties:
        state:
          $ref: "#/components/schemas/AutoRunState"
          description: 'Enabling this field will trigger an automatic build on image template creation or update. Known values are: "Enabled" and "Disabled".'
    AutoRunState:
      type: string
      enum:
        - Enabled
        - Disabled
    ImageTemplateIdentity:
      type: object
      description: Identity for the image template.
      properties:
        type:
          $ref: "#/components/schemas/ResourceIdentityType"
          description: "The type of identity used for the image template. The type 'None' will remove any identities from the image template. Known values are: \"UserAssigned\" and \"None\"."
        userAssignedIdentities:
          type: object
          properties: {}
          description: "The set of user assigned identities associated with the resource. The userAssignedIdentities dictionary keys will be ARM resource ids in the form: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}. The dictionary values can be empty objects ({}) in requests."
    ResourceIdentityType:
      type: string
      enum:
        - UserAssigned
        - None
