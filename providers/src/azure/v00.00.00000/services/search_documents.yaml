paths:
  /knowledgebases('{knowledge_base_name}')/retrieve?api-version=2026-05-01-preview:
    post:
      operationId: _KnowledgeBaseRetrievalClient_retrieve
      description: KnowledgeBase retrieves relevant data from backing stores.
      parameters:
        - name: knowledge_base_name
          in: path
          required: true
          schema:
            type: string
        - name: x-ms-query-source-authorization
          in: header
          required: false
          schema:
            type: string
          description: Token identifying the user for which the query is being executed. This token is used to enforce security restrictions on documents. Default value is None.
      responses:
        "200":
          description: Success
  /indexes('{index_name}')/docs/$count?api-version=2026-05-01-preview:
    get:
      operationId: _SearchClient_get_document_count
      description: Queries the number of documents in the index.
      parameters:
        - name: index_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
  /indexes('{index_name}')/docs('{key_name}')?api-version=2026-05-01-preview:
    get:
      operationId: _SearchClient_get_document
      description: Retrieves a document from the index.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            type: string
          description: The key of the document to retrieve. Required.
        - name: index_name
          in: path
          required: true
          schema:
            type: string
        - name: x-ms-query-source-authorization
          in: header
          required: false
          schema:
            type: string
          description: Token identifying the user for which the query is being executed. This token is used to enforce security restrictions on documents. Default value is None.
        - name: x-ms-enable-elevated-read
          in: header
          required: false
          schema:
            type: boolean
          description: A value that enables elevated read that bypass document level permission checks for the query operation. Default value is None.
        - name: $select
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: List of field names to retrieve for the document; Any field not retrieved will be missing from the returned document. Default value is None.
      responses:
        "200":
          description: Success
  /aliases?api-version=2026-05-01-preview:
    get:
      operationId: _SearchIndexClient_list_aliases
      description: Lists all aliases available for a search service.
      parameters: []
      responses:
        "200":
          description: Success
    post:
      operationId: _SearchIndexClient_create_alias
      description: Creates a new search alias.
      parameters: []
      responses:
        "200":
          description: Success
  /knowledgebases?api-version=2026-05-01-preview:
    get:
      operationId: _SearchIndexClient_list_knowledge_bases
      description: Lists all knowledge bases available for a search service.
