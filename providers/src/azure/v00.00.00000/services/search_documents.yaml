  /indexstats?api-version=2026-05-01-preview:
    get:
      operationId: _SearchIndexClient_list_index_stats_summary
      description: Retrieves a summary of statistics for all indexes in the search service.
      parameters:
        - name: $top
          in: query
          required: false
          schema:
            type: integer
          description: The number of items to retrieve. Default is 50, maximum is 1000. Default value is None.
        - name: $skip
          in: query
          required: false
          schema:
            type: integer
          description: The number of items to skip. Default value is None.
        - name: $count
          in: query
          required: false
          schema:
            type: boolean
          description: A value that specifies whether to fetch the total count of items. Default is false. Default value is None.
      responses:
        "200":
