          description: 'Status of the requested review history instance data. This is either requested, in-progress, done or error. The state transitions are as follows - Requested -> InProgress -> Done -> Expired. Known values are: "Requested", "InProgress", "Done", and "Error".'
        runDateTime:
          type: string
          format: date-time
          description: Date time when the history data report is scheduled to be generated.
        fulfilledDateTime:
