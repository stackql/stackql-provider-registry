openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Authorization (RBAC)
  description: Role definitions, role assignments, deny assignments and Privileged Identity Management scheduling.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-12-01-preview-stackql-generated
  x-serviceAlias: authorization
  x-sdkPackage: azure-mgmt-authorization
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AccessReviewScheduleSettings:
      type: object
      description: Settings of an Access Review.
      properties:
        mailNotificationsEnabled:
          type: boolean
          description: Flag to indicate whether sending mails to reviewers and the review creator is enabled.
        reminderNotificationsEnabled:
          type: boolean
          description: Flag to indicate whether sending reminder emails to reviewers are enabled.
        defaultDecisionEnabled:
          type: boolean
          description: Flag to indicate whether reviewers are required to provide a justification when reviewing access.
        justificationRequiredOnApproval:
          type: boolean
          description: Flag to indicate whether the reviewer is required to pass justification when recording a decision.
        defaultDecision:
          $ref: "#/components/schemas/DefaultDecisionType"
          description: 'This specifies the behavior for the autoReview feature when an access review completes. Known values are: "Approve", "Deny", and "Recommendation".'
        autoApplyDecisionsEnabled:
          type: boolean
          description: Flag to indicate whether auto-apply capability, to automatically change the target object access resource, is enabled. If not enabled, a user must, after the review completes, apply the access review.
        recommendationsEnabled:
          type: boolean
          description: Flag to indicate whether showing recommendations to reviewers is enabled.
        recommendationLookBackDuration:
          type: string
          description: "Recommendations for access reviews are calculated by looking back at 30 days of data(w.r.t the start date of the review) by default. However, in some scenarios, customers want to change how far back to look at and want to configure 60 days, 90 days, etc. instead. This setting allows customers to configure this duration. The value should be in ISO 8601 format (`http://en.wikipedia.org/wiki/ISO_8601#Durations).This `_ code can be used to convert TimeSpan to a valid interval string: XmlConvert.ToString(new TimeSpan(hours, minutes, seconds))."
        instanceDurationInDays:
          type: integer
          description: The duration in days for an instance.
        recurrence:
          $ref: "#/components/schemas/AccessReviewRecurrenceSettings"
          description: Access Review Settings.
    DefaultDecisionType:
      type: string
      enum:
        - Approve
        - Deny
        - Recommendation
    AccessReviewRecurrenceSettings:
      type: object
      description: Recurrence Settings of an Access Review Schedule Definition.
      properties:
        pattern:
          $ref: "#/components/schemas/AccessReviewRecurrencePattern"
          description: Access Review schedule definition recurrence pattern.
        range:
          $ref: "#/components/schemas/AccessReviewRecurrenceRange"
          description: Access Review schedule definition recurrence range.
    AccessReviewRecurrencePattern:
      type: object
      description: Recurrence Pattern of an Access Review Schedule Definition.
      properties:
        type:
          $ref: "#/components/schemas/AccessReviewRecurrencePatternType"
          description: 'The recurrence type : weekly, monthly, etc. Known values are: "weekly" and "absoluteMonthly".'
        interval:
          type: integer
          description: The interval for recurrence. For a quarterly review, the interval is 3 for type
    AccessReviewRecurrencePatternType:
      type: string
      enum:
        - weekly
        - absoluteMonthly
    AccessReviewRecurrenceRange:
      type: object
      description: Recurrence Range of an Access Review Schedule Definition.
      properties:
        type:
          $ref: "#/components/schemas/AccessReviewRecurrenceRangeType"
          description: 'The recurrence range type. The possible values are: endDate, noEnd, numbered. Known values are: "endDate", "noEnd", and "numbered".'
        numberOfOccurrences:
          type: integer
          description: The number of times to repeat the access review. Required and must be positive if type is numbered.
        startDate:
          type: string
          format: date-time
          description: The DateTime when the review is scheduled to be start. This could be a date in the future. Required on create.
        endDate:
          type: string
          format: date-time
          description: The DateTime when the review is scheduled to end. Required if type is endDate.
    AccessReviewRecurrenceRangeType:
      type: string
