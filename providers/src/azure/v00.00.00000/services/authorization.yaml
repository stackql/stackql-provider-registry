paths:
  /subscriptions/{subscription_id}/providers/Microsoft.Authorization/accessReviewScheduleSettings/default?api-version=2021-12-01-preview:
    get:
      operationId: AccessReviewDefaultSettings_get
      description: Get access review default settings for the subscription.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessReviewDefaultSettingsFlattened"
    put:
      operationId: AccessReviewDefaultSettings_put
      description: Get access review default settings for the subscription.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mailNotificationsEnabled:
                  type: boolean
                  description: Flag to indicate whether sending mails to reviewers and the review creator is enabled.
                reminderNotificationsEnabled:
                  type: boolean
                  description: Flag to indicate whether sending reminder emails to reviewers are enabled.
                defaultDecisionEnabled:
                  type: boolean
                  description: Flag to indicate whether reviewers are required to provide a justification when reviewing access.
                justificationRequiredOnApproval:
                  type: boolean
                  description: Flag to indicate whether the reviewer is required to pass justification when recording a decision.
                defaultDecision:
                  $ref: "#/components/schemas/DefaultDecisionType"
                  description: 'This specifies the behavior for the autoReview feature when an access review completes. Known values are: "Approve", "Deny", and "Recommendation".'
                autoApplyDecisionsEnabled:
                  type: boolean
                  description: Flag to indicate whether auto-apply capability, to automatically change the target object access resource, is enabled. If not enabled, a user must, after the review completes, apply the access review.
                recommendationsEnabled:
                  type: boolean
                  description: Flag to indicate whether showing recommendations to reviewers is enabled.
                recommendationLookBackDuration:
                  type: string
                  description: "Recommendations for access reviews are calculated by looking back at 30 days of data(w.r.t the start date of the review) by default. However, in some scenarios, customers want to change how far back to look at and want to configure 60 days, 90 days, etc. instead. This setting allows customers to configure this duration. The value should be in ISO 8601 format (`http://en.wikipedia.org/wiki/ISO_8601#Durations).This `_ code can be used to convert TimeSpan to a valid interval string: XmlConvert.ToString(new TimeSpan(hours, minutes, seconds))."
                instanceDurationInDays:
                  type: integer
                  description: The duration in days for an instance.
                recurrence:
                  $ref: "#/components/schemas/AccessReviewRecurrenceSettings"
                  description: Access Review Settings.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessReviewDefaultSettings"
  /subscriptions/{subscription_id}/providers/Microsoft.Authorization/accessReviewHistoryDefinitions/{history_definition_id}/instances/{instance_id}/generateDownloadUri?api-version=2021-12-01-preview:
    post:
      operationId: AccessReviewHistoryDefinitionInstance_generate_download_uri
      description: Generates a uri which can be used to retrieve review history data. This URI has a TTL of 1 day and can be retrieved by fetching the accessReviewHistoryDefinition object.
      parameters:
        - name: history_definition_id
          in: path
          required: true
          schema:
            type: string
          description: The id of the access review history definition. Required.
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
          description: The id of the access review history definition instance to generate a URI for. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessReviewHistoryInstance"
  /subscriptions/{subscription_id}/providers/Microsoft.Authorization/accessReviewHistoryDefinitions/{history_definition_id}/instances?api-version=2021-12-01-preview:
    get:
      operationId: AccessReviewHistoryDefinitionInstances_list
      description: Get access review history definition instances by definition Id.
      parameters:
        - name: history_definition_id
          in: path
          required: true
          schema:
            type: string
          description: The id of the access review history definition. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedAccessReviewHistoryInstanceFlattened"
  /subscriptions/{subscription_id}/providers/Microsoft.Authorization/accessReviewHistoryDefinitions/{history_definition_id}?api-version=2021-12-01-preview:
    put:
      operationId: AccessReviewHistoryDefinition_create
      description: Create a scheduled or one-time Access Review History Definition.
      parameters:
        - name: history_definition_id
          in: path
          required: true
          schema:
            type: string
          description: The id of the access review history definition. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  description: The display name for the history definition.
                decisions:
                  type: array
                  items:
                    $ref: "#/components/schemas/AccessReviewResult"
                  description: Collection of review decisions which the history data should be filtered on. For example if Approve and Deny are supplied the data will only contain review results in which the decision maker approved or denied a review request.
                scopes:
                  type: array
                  items:
                    $ref: "#/components/schemas/AccessReviewScope"
                  description: A collection of scopes used when selecting review history data.
                settings:
                  $ref: "#/components/schemas/AccessReviewHistoryScheduleSettings"
                  description: Recurrence settings for recurring history reports, skip for one-time reports.
                instances:
                  type: array
                  items:
                    $ref: "#/components/schemas/AccessReviewHistoryInstance"
                  description: Set of access review history instances for this history definition.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessReviewHistoryDefinition"
    delete:
      operationId: AccessReviewHistoryDefinition_delete_by_id
      description: Delete an access review history definition.
      parameters:
        - name: history_definition_id
          in: path
          required: true
          schema:
            type: string
          description: The id of the access review history definition. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Success (no content / accepted)
    get:
      operationId: AccessReviewHistoryDefinitions_get_by_id
      description: Get access review history definition by definition Id.
      parameters:
        - name: history_definition_id
          in: path
          required: true
          schema:
            type: string
          description: The id of the access review history definition. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
