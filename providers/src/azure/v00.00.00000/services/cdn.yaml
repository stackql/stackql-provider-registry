            $ref: "#/components/schemas/EdgeNodeFlattened"
        nextLink:
          type: string
    EndpointProperties:
      type: object
      description: The JSON object that contains the properties required to create an endpoint.
      properties:
        originPath:
          type: string
          description: A directory path on the origin that CDN can use to retrieve content from, e.g. contoso.cloudapp.net/originpath.
        contentTypesToCompress:
          type: array
          items:
            type: string
          description: List of content types on which compression applies. The value should be a valid MIME type.
        originHostHeader:
          type: string
          description: The host header value sent to the origin with each request. This property at Endpoint is only allowed when endpoint uses single origin and can be overridden by the same property specified at origin.If you leave this blank, the request hostname determines this value. Azure CDN origins, such as Web Apps, Blob Storage, and Cloud Services require this host header value to match the origin hostname by default.
        isCompressionEnabled:
          type: boolean
          description: Indicates whether content compression is enabled on CDN. Default value is false. If compression is enabled, content will be served as compressed if user requests for a compressed version. Content won't be compressed on CDN when requested content is smaller than 1 byte or larger than 1 MB.
        isHttpAllowed:
          type: boolean
          description: Indicates whether HTTP traffic is allowed on the endpoint. Default value is true. At least one protocol (HTTP or HTTPS) must be allowed.
        isHttpsAllowed:
          type: boolean
          description: Indicates whether HTTPS traffic is allowed on the endpoint. Default value is true. At least one protocol (HTTP or HTTPS) must be allowed.
        queryStringCachingBehavior:
          $ref: "#/components/schemas/QueryStringCachingBehavior"
          description: 'Defines how CDN caches requests that include query strings. You can ignore any query strings when caching, bypass caching to prevent requests that contain query strings from being cached, or cache every request with a unique URL. Known values are: "IgnoreQueryString", "BypassCaching", "UseQueryString", and "NotSet".'
        optimizationType:
          $ref: "#/components/schemas/OptimizationType"
          description: 'Specifies what scenario the customer wants this CDN endpoint to optimize for, e.g. Download, Media services. With this information, CDN can apply scenario driven optimization. Known values are: "GeneralWebDelivery", "GeneralMediaStreaming", "VideoOnDemandMediaStreaming", "LargeFileDownload", and "DynamicSiteAcceleration".'
        probePath:
          type: string
          description: Path to a file hosted on the origin which helps accelerate delivery of the dynamic content and calculate the most optimal routes for the CDN. This is relative to the origin path. This property is only relevant when using a single origin.
        geoFilters:
          type: array
          items:
            $ref: "#/components/schemas/GeoFilter"
          description: List of rules defining the user's geo access within a CDN endpoint. Each geo filter defines an access rule to a specified path or content, e.g. block APAC for path /pictures/.
        defaultOriginGroup:
          $ref: "#/components/schemas/ResourceReference"
          description: A reference to the origin group.
        urlSigningKeys:
          type: array
          items:
            $ref: "#/components/schemas/UrlSigningKey"
          description: List of keys used to validate the signed URL hashes.
        deliveryPolicy:
          $ref: "#/components/schemas/EndpointPropertiesUpdateParametersDeliveryPolicy"
          description: A policy that specifies the delivery rules to be used for an endpoint.
        webApplicationFirewallPolicyLink:
          $ref: "#/components/schemas/EndpointPropertiesUpdateParametersWebApplicationFirewallPolicyLink"
          description: Defines the Web Application Firewall policy for the endpoint (if applicable).
        hostName:
          type: string
          description: The host name of the endpoint structured as {endpointName}.{DNSZone}, e.g. contoso.azureedge.net.
        origins:
          type: array
          items:
            $ref: "#/components/schemas/DeepCreatedOrigin"
          description: The source of the content being delivered via CDN. Required.
        originGroups:
          type: array
          items:
            $ref: "#/components/schemas/DeepCreatedOriginGroup"
          description: The origin groups comprising of origins that are used for load balancing the traffic based on availability.
        customDomains:
          type: array
          items:
            $ref: "#/components/schemas/DeepCreatedCustomDomain"
          description: The custom domains under the endpoint.
        resourceState:
          $ref: "#/components/schemas/EndpointResourceState"
          description: 'Resource status of the endpoint. Known values are: "Creating", "Deleting", "Running", "Starting", "Stopped", and "Stopping".'
        provisioningState:
          $ref: "#/components/schemas/EndpointProvisioningState"
          description: 'Provisioning status of the endpoint. Known values are: "Succeeded", "Failed", "Updating", "Deleting", and "Creating".'
      required:
        - origins
    QueryStringCachingBehavior:
      type: string
      enum:
        - IgnoreQueryString
        - BypassCaching
        - UseQueryString
        - NotSet
    OptimizationType:
      type: string
      enum:
        - GeneralWebDelivery
        - GeneralMediaStreaming
        - VideoOnDemandMediaStreaming
        - LargeFileDownload
        - DynamicSiteAcceleration
    GeoFilter:
      type: object
      description: Rules defining user's geo access within a CDN endpoint.
      properties:
        relativePath:
          type: string
          description: Relative path applicable to geo filter. (e.g. '/mypictures', '/mypicture/kitty.jpg', and etc.). Required.
        action:
          $ref: "#/components/schemas/GeoFilterActions"
          description: 'Action of the geo filter, i.e. allow or block access. Required. Known values are: "Block" and "Allow".'
        countryCodes:
          type: array
          items:
            type: string
          description: Two letter country or region codes defining user country or region access in a geo filter, e.g. AU, MX, US. Required.
      required:
        - relativePath
        - action
        - countryCodes
    GeoFilterActions:
      type: string
      enum:
        - Block
        - Allow
    UrlSigningKey:
      type: object
      description: Url signing key.
      properties:
        keyId:
          type: string
          description: Defines the customer defined key Id. This id will exist in the incoming request to indicate the key used to form the hash. Required.
        keySourceParameters:
          $ref: "#/components/schemas/KeyVaultSigningKeyParameters"
          description: Defines the parameters for using customer key vault for Url Signing Key. Required.
      required:
        - keyId
        - keySourceParameters
    KeyVaultSigningKeyParameters:
      type: object
      description: Describes the parameters for using a user's KeyVault for URL Signing Key.
      properties:
        typeName:
          $ref: "#/components/schemas/KeyVaultSigningKeyParametersTypeName"
          description: Required. "KeyVaultSigningKeyParameters"
        subscriptionId:
          type: string
          description: Subscription Id of the user's Key Vault containing the secret. Required.
        resourceGroupName:
          type: string
          description: Resource group of the user's Key Vault containing the secret. Required.
        vaultName:
          type: string
          description: The name of the user's Key Vault containing the secret. Required.
        secretName:
          type: string
          description: The name of secret in Key Vault. Required.
        secretVersion:
          type: string
          description: The version(GUID) of secret in Key Vault. Required.
      required:
        - typeName
        - subscriptionId
        - resourceGroupName
        - vaultName
        - secretName
        - secretVersion
    KeyVaultSigningKeyParametersTypeName:
      type: string
      enum:
        - KeyVaultSigningKeyParameters
    EndpointPropertiesUpdateParametersDeliveryPolicy:
      type: object
      description: A policy that specifies the delivery rules to be used for an endpoint.
      properties:
        description:
          type: string
          description: User-friendly description of the policy.
        rules:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryRule"
          description: A list of the delivery rules. Required.
      required:
        - rules
    DeliveryRule:
      type: object
      description: A rule that specifies a set of actions and conditions.
      properties:
        name:
          type: string
          description: Name of the rule.
        order:
          type: integer
          description: The order in which the rules are applied for the endpoint. Possible values {0,1,2,3,………}. A rule with a lesser order will be applied before a rule with a greater order. Rule with order 0 is a special rule. It does not require any condition and actions listed in it will always be applied. Required.
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryRuleCondition"
          description: A list of conditions that must be matched for the actions to be executed.
        actions:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryRuleAction"
          description: A list of actions that are executed when all the conditions of a rule are satisfied. Required.
      required:
        - order
        - actions
    DeliveryRuleCondition:
      type: object
      description: "A condition for the delivery rule. You probably want to use the sub-classes and not this class directly. Known sub-classes are: DeliveryRuleClientPortCondition, DeliveryRuleCookiesCondition, DeliveryRuleHostNameCondition, DeliveryRuleHttpVersionCondition, DeliveryRuleIsDeviceCondition, DeliveryRulePostArgsCondition, DeliveryRuleQueryStringCondition, DeliveryRuleRemoteAddressCondition, DeliveryRuleRequestBodyCondition, DeliveryRuleRequestHeaderCondition, DeliveryRuleRequestMethodCondition, DeliveryRuleRequestSchemeCondition, DeliveryRuleRequestUriCondition, DeliveryRuleServerPortCondition, DeliveryRuleSocketAddrCondition, DeliveryRuleSslProtocolCondition, DeliveryRuleUrlFileExtensionCondition, DeliveryRuleUrlFileNameCondition, DeliveryRuleUrlPathCondition"
      properties:
        name:
          type: string
          description: 'The name of the condition for the delivery rule. Required. Known values are: "RemoteAddress", "RequestMethod", "QueryString", "PostArgs", "RequestUri", "RequestHeader", "RequestBody", "RequestScheme", "UrlPath", "UrlFileExtension", "UrlFileName", "HttpVersion", "Cookies", "IsDevice", "SocketAddr", "ClientPort", "ServerPort", "HostName", and "SslProtocol".'
      required:
        - name
    DeliveryRuleAction:
      type: object
      description: "An action for the delivery rule. You probably want to use the sub-classes and not this class directly. Known sub-classes are: DeliveryRuleCacheExpirationAction, DeliveryRuleCacheKeyQueryStringAction, DeliveryRuleRequestHeaderAction, DeliveryRuleResponseHeaderAction, OriginGroupOverrideAction, DeliveryRuleRouteConfigurationOverrideAction, UrlRedirectAction, UrlRewriteAction, UrlSigningAction"
      properties:
        name:
          type: string
          description: 'The name of the action for the delivery rule. Required. Known values are: "CacheExpiration", "CacheKeyQueryString", "ModifyRequestHeader", "ModifyResponseHeader", "UrlRedirect", "UrlRewrite", "UrlSigning", "OriginGroupOverride", and "RouteConfigurationOverride".'
      required:
        - name
    EndpointPropertiesUpdateParametersWebApplicationFirewallPolicyLink:
      type: object
      description: Defines the Web Application Firewall policy for the endpoint (if applicable).
      properties:
        id:
          type: string
          description: Resource ID.
    DeepCreatedOrigin:
      type: object
      description: The main origin of CDN content which is added when creating a CDN endpoint.
      properties:
        name:
          type: string
          description: Origin name which must be unique within the endpoint. Required.
        properties:
          $ref: "#/components/schemas/DeepCreatedOriginProperties"
          description: Properties of the origin created on the CDN endpoint.
      required:
        - name
    DeepCreatedOriginProperties:
      type: object
      description: Properties of the origin created on the CDN endpoint.
      properties:
        hostName:
          type: string
          description: The address of the origin. It can be a domain name, IPv4 address, or IPv6 address. This should be unique across all origins in an endpoint. Required.
        httpPort:
          type: integer
          description: The value of the HTTP port. Must be between 1 and 65535.
        httpsPort:
          type: integer
          description: The value of the HTTPS port. Must be between 1 and 65535.
        originHostHeader:
          type: string
          description: The host header value sent to the origin with each request. If you leave this blank, the request hostname determines this value. Azure CDN origins, such as Web Apps, Blob Storage, and Cloud Services require this host header value to match the origin hostname by default.
        priority:
          type: integer
          description: Priority of origin in given origin group for load balancing. Higher priorities will not be used for load balancing if any lower priority origin is healthy.Must be between 1 and 5.
        weight:
          type: integer
          description: Weight of the origin in given origin group for load balancing. Must be between 1 and 1000.
        enabled:
          type: boolean
          description: Origin is enabled for load balancing or not. By default, origin is always enabled.
        privateLinkAlias:
          type: string
          description: The Alias of the Private Link resource. Populating this optional field indicates that this origin is 'Private'.
        privateLinkResourceId:
          type: string
          description: The Resource Id of the Private Link resource. Populating this optional field indicates that this backend is 'Private'.
        privateLinkLocation:
          type: string
          description: The location of the Private Link resource. Required only if 'privateLinkResourceId' is populated.
        privateLinkApprovalMessage:
          type: string
          description: A custom message to be included in the approval request to connect to the Private Link.
        privateEndpointStatus:
          $ref: "#/components/schemas/PrivateEndpointStatus"
          description: 'The approval status for the connection to the Private Link. Known values are: "Pending", "Approved", "Rejected", "Disconnected", and "Timeout".'
      required:
        - hostName
    PrivateEndpointStatus:
      type: string
      enum:
        - Pending
        - Approved
        - Rejected
        - Disconnected
        - Timeout
    DeepCreatedOriginGroup:
      type: object
      description: The origin group for CDN content which is added when creating a CDN endpoint. Traffic is sent to the origins within the origin group based on origin health.
      properties:
        name:
          type: string
          description: Origin group name which must be unique within the endpoint. Required.
