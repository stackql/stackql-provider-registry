          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: string
          description: User Id. Default value is None.
        - name: minutesToExpire
          in: query
          required: false
          schema:
            type: integer
          description: The expire time of the generated token. Default value is None.
        - name: clientType
          in: query
          required: false
          schema:
            type: string
          description: "The type of client. Case-insensitive. If not set, it's \"Default\". For Web PubSub for Socket.IO, only the default value is supported. For Web PubSub, the valid values are 'Default' and 'MQTT'. Known values are: \"Default\" and \"MQTT\". Default value is None."
