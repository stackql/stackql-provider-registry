paths:
  /api/hubs/{hub}/groups/{group_name}/connections?api-version=2024-12-01:
    get:
      operationId: _WebPubSubServiceClient_list_connections_in_group
      description: List connections in a group. List connections in a group.
      parameters:
        - name: group_name
          in: path
          required: true
          schema:
            type: string
          description: Target group name, whose length should be greater than 0 and less than 1025. Required.
        - name: hub
          in: path
          required: true
          schema:
            type: string
        - name: maxpagesize
          in: query
          required: false
          schema:
            type: integer
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: The maximum number of connections to return. If the value is not set, then all the connections in a group are returned. Default value is None.
        - name: continuationToken
          in: query
          required: false
          schema:
            type: string
          description: A token that allows the client to retrieve the next page of results. This parameter is provided by the service in the response of a previous request when there are additional results to be fetched. Clients should include the continuationToken in the next request to receive the subsequent page of data. If this parameter is omitted, the server will return the first page of results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedGroupMember"
