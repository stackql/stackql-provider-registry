        value:
          type: array
          items:
            $ref: "#/components/schemas/AppTemplate"
        nextLink:
          type: string
    AppAvailabilityInfo:
      type: object
      description: The properties indicating whether a given IoT Central application name or subdomain is available. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        nameAvailable:
          type: boolean
          description: The value which indicates whether the provided name is available.
        reason:
          type: string
          description: The reason for unavailability.
        message:
          type: string
          description: The detailed reason message.
    OperationDisplay:
      type: object
      description: The object that represents the operation. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        provider:
          type: string
          description: "Service provider: Microsoft IoT Central."
