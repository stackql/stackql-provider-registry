        - name: resource_name
          in: path
          required: true
          schema:
            type: string
          description: The ARM resource name of the IoT Central application. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: object
                  properties: {}
                  description: Instance tags.
                sku:
                  $ref: "#/components/schemas/AppSkuInfo"
                  description: A valid instance SKU.
                identity:
                  $ref: "#/components/schemas/SystemAssignedServiceIdentity"
                  description: The managed identities for the IoT Central application.
                properties:
                  type: object
                  properties:
                    displayName:
                      type: string
                      description: The display name of the application.
                    subdomain:
                      type: string
                      description: The subdomain of the application.
                    template:
                      type: string
                      description: The ID of the application template, which is a blueprint that defines the characteristics and behaviors of an application. Optional; if not specified, defaults to a blank blueprint and allows the application to be defined from scratch.
      responses:
        "200":
