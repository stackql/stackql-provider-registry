          type: string
          description: The tenant ID of the system assigned identity. This property will only be provided for a system assigned identity.
        type:
          type: string
          description: 'Type of managed service identity (either system assigned, or none). Required. Known values are: "None" and "SystemAssigned".'
      required:
        - type
