        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppFlattened"
    put:
      operationId: Apps_begin_create_or_update
      description: Create or update the metadata of an IoT Central application. The usual pattern to modify a property is to retrieve the IoT Central application metadata and security metadata, and then combine them with the modified values in a new body to update the IoT Central application.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group that contains the IoT Central application. Required.
        - name: resource_name
          in: path
          required: true
          schema:
            type: string
          description: The ARM resource name of the IoT Central application. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                location:
                  type: string
                  description: The resource location. Required.
                tags:
                  type: object
                  properties: {}
                  description: The resource tags.
                sku:
                  $ref: "#/components/schemas/AppSkuInfo"
                  description: A valid instance SKU. Required.
                identity:
                  $ref: "#/components/schemas/SystemAssignedServiceIdentity"
                  description: The managed identities for the IoT Central application.
                properties:
                  type: object
                  properties:
                    displayName:
                      type: string
                      description: The display name of the application.
                    subdomain:
                      type: string
                      description: The subdomain of the application.
                    template:
                      type: string
                      description: The ID of the application template, which is a blueprint that defines the characteristics and behaviors of an application. Optional; if not specified, defaults to a blank blueprint and allows the application to be defined from scratch.
              required:
                - location
                - sku
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
    patch:
      operationId: Apps_begin_update
      description: Update the metadata of an IoT Central application.
