  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/Microsoft.IoTCentral/iotApps/{resource_name}?api-version=2021-06-01:
    get:
      operationId: Apps_get
      description: Get the metadata of an IoT Central application.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group that contains the IoT Central application. Required.
