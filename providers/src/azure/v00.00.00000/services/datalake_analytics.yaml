paths:
  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/Microsoft.DataLakeAnalytics/accounts/{account_name}?api-version=2019-11-01-preview:
    get:
      operationId: Accounts_get
      description: Gets details of the specified Data Lake Analytics account.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Azure resource group. Required.
        - name: account_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Data Lake Analytics account. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataLakeAnalyticsAccountFlattened"
    put:
      operationId: Accounts_begin_create
      description: Creates the specified Data Lake Analytics account. This supplies the user with computation services for Data Lake Analytics workloads.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Azure resource group. Required.
        - name: account_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Data Lake Analytics account. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                location:
                  type: string
                  description: The resource location. Required.
                tags:
                  type: object
                  properties: {}
                  description: The resource tags.
                properties:
                  type: object
                  properties:
                    defaultDataLakeStoreAccount:
                      type: string
                      description: The default Data Lake Store account associated with this account. Required.
                    dataLakeStoreAccounts:
                      type: array
                      items:
                        $ref: "#/components/schemas/AddDataLakeStoreWithAccountParameters"
                      description: The list of Data Lake Store accounts associated with this account. Required.
                    storageAccounts:
                      type: array
                      items:
                        $ref: "#/components/schemas/AddStorageAccountWithAccountParameters"
                      description: The list of Azure Blob Storage accounts associated with this account.
                    computePolicies:
                      type: array
                      items:
                        $ref: "#/components/schemas/CreateComputePolicyWithAccountParameters"
                      description: The list of compute policies associated with this account.
                    firewallRules:
                      type: array
                      items:
                        $ref: "#/components/schemas/CreateFirewallRuleWithAccountParameters"
                      description: The list of firewall rules associated with this account.
                    firewallState:
                      type: string
                      description: 'The current state of the IP address firewall for this account. Known values are: "Enabled" and "Disabled".'
                    firewallAllowAzureIps:
                      type: string
                      description: 'The current state of allowing or disallowing IPs originating within Azure through the firewall. If the firewall is disabled, this is not enforced. Known values are: "Enabled" and "Disabled".'
                    newTier:
                      type: string
                      description: 'The commitment tier for the next month. Known values are: "Consumption", "Commitment_100AUHours", "Commitment_500AUHours", "Commitment_1000AUHours", "Commitment_5000AUHours", "Commitment_10000AUHours", "Commitment_50000AUHours", "Commitment_100000AUHours", and "Commitment_500000AUHours".'
                    maxJobCount:
                      type: integer
                      description: The maximum supported jobs running under the account at the same time.
                    maxDegreeOfParallelism:
                      type: integer
                      description: The maximum supported degree of parallelism for this account.
                    maxDegreeOfParallelismPerJob:
                      type: integer
                      description: The maximum supported degree of parallelism per job for this account.
                    minPriorityPerJob:
                      type: integer
                      description: The minimum supported priority per job for this account.
                    queryStoreRetention:
                      type: integer
                      description: The number of days that job metadata is retained.
              required:
                - location
                - properties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataLakeAnalyticsAccount"
    patch:
      operationId: Accounts_begin_update
      description: Updates the Data Lake Analytics account object specified by the accountName with the contents of the account object.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Azure resource group. Required.
        - name: account_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Data Lake Analytics account. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: object
                  properties: {}
                  description: The resource tags.
                properties:
                  type: object
                  properties:
                    dataLakeStoreAccounts:
                      type: array
                      items:
                        $ref: "#/components/schemas/UpdateDataLakeStoreWithAccountParameters"
                      description: The list of Data Lake Store accounts associated with this account.
                    storageAccounts:
                      type: array
                      items:
                        $ref: "#/components/schemas/UpdateStorageAccountWithAccountParameters"
                      description: The list of Azure Blob storage accounts associated with this account.
                    computePolicies:
                      type: array
                      items:
                        $ref: "#/components/schemas/UpdateComputePolicyWithAccountParameters"
                      description: The list of compute policies associated with this account.
                    firewallRules:
                      type: array
                      items:
                        $ref: "#/components/schemas/UpdateFirewallRuleWithAccountParameters"
                      description: The list of firewall rules associated with this account.
                    firewallState:
                      type: string
                      description: 'The current state of the IP address firewall for this account. Disabling the firewall does not remove existing rules, they will just be ignored until the firewall is re-enabled. Known values are: "Enabled" and "Disabled".'
                    firewallAllowAzureIps:
                      type: string
                      description: 'The current state of allowing or disallowing IPs originating within Azure through the firewall. If the firewall is disabled, this is not enforced. Known values are: "Enabled" and "Disabled".'
                    newTier:
                      type: string
                      description: 'The commitment tier to use for next month. Known values are: "Consumption", "Commitment_100AUHours", "Commitment_500AUHours", "Commitment_1000AUHours", "Commitment_5000AUHours", "Commitment_10000AUHours", "Commitment_50000AUHours", "Commitment_100000AUHours", and "Commitment_500000AUHours".'
                    maxJobCount:
                      type: integer
                      description: The maximum supported jobs running under the account at the same time.
                    maxDegreeOfParallelism:
                      type: integer
                      description: The maximum supported degree of parallelism for this account.
                    maxDegreeOfParallelismPerJob:
                      type: integer
                      description: The maximum supported degree of parallelism per job for this account.
                    minPriorityPerJob:
                      type: integer
                      description: The minimum supported priority per job for this account.
                    queryStoreRetention:
                      type: integer
                      description: The number of days that job metadata is retained.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataLakeAnalyticsAccount"
    delete:
      operationId: Accounts_begin_delete
      description: Begins the delete process for the Data Lake Analytics account object specified by the account name.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Azure resource group. Required.
        - name: account_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Data Lake Analytics account. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Success (no content / accepted)
