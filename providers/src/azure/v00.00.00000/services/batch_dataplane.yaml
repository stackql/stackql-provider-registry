    post:
      operationId: _BatchClient_upload_node_logs
      description: Upload Azure Batch service log files from the specified Compute Node to Azure Blob Storage. This is for gathering Azure Batch service log files in an automated fashion from Compute Nodes if you are experiencing an error and wish to escalate to Azure support. The Azure Batch service log files should be shared with Azure support to aid in debugging issues with the Batch service.
      parameters:
        - name: pool_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the Pool that contains the Compute Node. Required.
        - name: node_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the Compute Node for which you want to get the Remote Desktop Protocol file. Required.
        - name: timeOut
          in: query
          required: false
          schema:
            type: integer
          description: The maximum time that the server can spend processing the request, in seconds. The default is 30 seconds. If the value is larger than 30, the default will be used instead.". Default value is None.
        - name: ocp-date
          in: header
          required: false
          schema:
            type: string
          description: The time the request was issued. Client libraries typically set this to the current system clock time; set it explicitly if you are calling the REST API directly. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                containerUrl:
                  type: string
                  description: The URL of the container within Azure Blob Storage to which to upload the Batch Service log file(s). If a user assigned managed identity is not being used, the URL must include a Shared Access Signature (SAS) granting write permissions to the container. The SAS duration must allow enough time for the upload to finish. The start time for SAS is optional and recommended to not be specified. Required.
                startTime:
                  type: string
                  format: date-time
                  description: The start of the time range from which to upload Batch Service log file(s). Any log file containing a log message in the time range will be uploaded. This means that the operation might retrieve more logs than have been requested since the entire log file is always uploaded, but the operation should not retrieve fewer logs than have been requested. Required.
                endTime:
                  type: string
                  format: date-time
                  description: The end of the time range from which to upload Batch Service log file(s). Any log file containing a log message in the time range will be uploaded. This means that the operation might retrieve more logs than have been requested since the entire log file is always uploaded, but the operation should not retrieve fewer logs than have been requested. If omitted, the default is to upload all logs available after the startTime.
                identityReference:
                  $ref: "#/components/schemas/BatchNodeIdentityReference"
                  description: The reference to the user assigned identity to use to access Azure Blob Storage specified by containerUrl. The identity must have write access to the Azure Blob Storage container.
              required:
                - containerUrl
                - startTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadBatchServiceLogsResult"
