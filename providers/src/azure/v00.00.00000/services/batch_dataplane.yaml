    BatchJobState:
      type: string
      enum:
        - active
        - disabling
        - disabled
        - enabling
        - terminating
        - completed
        - deleting
    BatchJobConstraints:
      type: object
      description: The execution constraints for a Job.
      properties:
        maxWallClockTime:
          type: string
          description: The maximum elapsed time that the Job may run, measured from the time the Job is created. If the Job does not complete within the time limit, the Batch service terminates it and any Tasks that are still running. In this case, the termination reason will be MaxWallClockTimeExpiry. If this property is not specified, there is no time limit on how long the Job may run. The time duration is specified in ISO 8601 format.
        maxTaskRetryCount:
          type: integer
          description: The maximum number of times each Task may be retried. The Batch service retries a Task if its exit code is nonzero. Note that this value specifically controls the number of retries. The Batch service will try each Task once, and may then retry up to this limit. For example, if the maximum retry count is 3, Batch tries a Task up to 4 times (one initial try and 3 retries). If the maximum retry count is 0, the Batch service does not retry Tasks. If the maximum retry count is -1, the Batch service retries Tasks without limit. The default value is 0 (no retries).
    BatchJobManagerTask:
      type: object
      description: Specifies details of a Job Manager Task. The Job Manager Task is automatically started when the Job is created. The Batch service tries to schedule the Job Manager Task before any other Tasks in the Job. When shrinking a Pool, the Batch service tries to preserve Nodes where Job Manager Tasks are running for as long as possible (that is, Compute Nodes running 'normal' Tasks are removed before Compute Nodes running Job Manager Tasks). When a Job Manager Task fails and needs to be restarted, the system tries to schedule it at the highest priority. If there are no idle Compute Nodes available, the system may terminate one of the running Tasks in the Pool and return it to the queue in order to make room for the Job Manager Task to restart. Note that a Job Manager Task in one Job does not have priority over Tasks in other Jobs. Across Jobs, only Job level priorities are observed. For example, if a Job Manager in a priority 0 Job needs to be restarted, it will not displace Tasks of a priority 1 Job. Batch will retry Tasks when a recovery operation is triggered on a Node. Examples of recovery operations include (but are not limited to) when an unhealthy Node is rebooted or a Compute Node disappeared due to host failure. Retries due to recovery operations are independent of and are not counted against the maxTaskRetryCount. Even if the maxTaskRetryCount is 0, an internal retry due to a recovery operation may occur. Because of this, all Tasks should be idempotent. This means Tasks need to tolerate being interrupted and restarted without causing any corruption or duplicate data. The best practice for long running Tasks is to use some form of checkpointing.
      properties:
        id:
          type: string
          description: A string that uniquely identifies the Job Manager Task within the Job. The ID can contain any combination of alphanumeric characters including hyphens and underscores and cannot contain more than 64 characters. Required.
        displayName:
          type: string
          description: The display name of the Job Manager Task. It need not be unique and can contain any Unicode characters up to a maximum length of 1024.
        commandLine:
          type: string
          description: The command line of the Job Manager Task. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux. If the command line refers to file paths, it should use a relative path (relative to the Task working directory), or use the Batch provided environment variable (`https://learn.microsoft.com/azure/batch/batch-compute-node-environment-variables `_). Required.
        containerSettings:
          $ref: "#/components/schemas/BatchTaskContainerSettings"
          description: The settings for the container under which the Job Manager Task runs. If the Pool that will run this Task has containerConfiguration set, this must be set as well. If the Pool that will run this Task doesn't have containerConfiguration set, this must not be set. When this is specified, all directories recursively below the AZ_BATCH_NODE_ROOT_DIR (the root of Azure Batch directories on the node) are mapped into the container, all Task environment variables are mapped into the container, and the Task command line is executed in the container. Files produced in the container outside of AZ_BATCH_NODE_ROOT_DIR might not be reflected to the host disk, meaning that Batch file APIs will not be able to access those files.
        resourceFiles:
          type: array
          items:
            $ref: "#/components/schemas/ResourceFile"
          description: A list of files that the Batch service will download to the Compute Node before running the command line. Files listed under this element are located in the Task's working directory. There is a maximum size for the list of resource files. When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers.
        outputFiles:
          type: array
          items:
            $ref: "#/components/schemas/OutputFile"
          description: A list of files that the Batch service will upload from the Compute Node after running the command line. For multi-instance Tasks, the files will only be uploaded from the Compute Node on which the primary Task is executed.
        environmentSettings:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentSetting"
          description: A list of environment variable settings for the Job Manager Task.
        constraints:
          $ref: "#/components/schemas/BatchTaskConstraints"
          description: Constraints that apply to the Job Manager Task.
        requiredSlots:
          type: integer
          description: The number of scheduling slots that the Task requires to run. The default is 1. A Task can only be scheduled to run on a compute node if the node has enough free scheduling slots available. For multi-instance Tasks, this property is not supported and must not be specified.
        killJobOnCompletion:
          type: boolean
          description: Whether completion of the Job Manager Task signifies completion of the entire Job. If true, when the Job Manager Task completes, the Batch service marks the Job as complete. If any Tasks are still running at this time (other than Job Release), those Tasks are terminated. If false, the completion of the Job Manager Task does not affect the Job status. In this case, you should either use the onAllTasksComplete attribute to terminate the Job, or have a client or user terminate the Job explicitly. An example of this is if the Job Manager creates a set of Tasks but then takes no further role in their execution. The default value is true. If you are using the onAllTasksComplete and onTaskFailure attributes to control Job lifetime, and using the Job Manager Task only to create the Tasks for the Job (not to monitor progress), then it is important to set killJobOnCompletion to false.
        userIdentity:
          $ref: "#/components/schemas/UserIdentity"
          description: The user identity under which the Job Manager Task runs. If omitted, the Task runs as a non-administrative user unique to the Task.
        runExclusive:
          type: boolean
          description: Whether the Job Manager Task requires exclusive use of the Compute Node where it runs. If true, no other Tasks will run on the same Node for as long as the Job Manager is running. If false, other Tasks can run simultaneously with the Job Manager on a Compute Node. The Job Manager Task counts normally against the Compute Node's concurrent Task limit, so this is only relevant if the Compute Node allows multiple concurrent Tasks. The default value is true.
        applicationPackageReferences:
          type: array
          items:
            $ref: "#/components/schemas/BatchApplicationPackageReference"
          description: A list of Application Packages that the Batch service will deploy to the Compute Node before running the command line.Application Packages are downloaded and deployed to a shared directory, not the Task working directory. Therefore, if a referenced Application Package is already on the Compute Node, and is up to date, then it is not re-downloaded; the existing copy on the Compute Node is used. If a referenced Application Package cannot be installed, for example because the package has been deleted or because download failed, the Task fails.
        allowLowPriorityNode:
          type: boolean
          description: Whether the Job Manager Task may run on a Spot/Low-priority Compute Node. The default value is true.
      required:
        - id
        - commandLine
    OutputFile:
      type: object
      description: On every file uploads, Batch service writes two log files to the compute node, 'fileuploadout.txt' and 'fileuploaderr.txt'. These log files are used to learn more about a specific failure.
      properties:
        filePattern:
          type: string
          description: "A pattern indicating which file(s) to upload. Both relative and absolute paths are supported. Relative paths are relative to the Task working directory. The following wildcards are supported: * matches 0 or more characters (for example pattern abc* would match abc or abcdef), \\*\\* matches any directory, ? matches any single character, [abc] matches one character in the brackets, and [a-c] matches one character in the range. Brackets can include a negation to match any character not specified (for example [!abc] matches any character but a, b, or c). If a file name starts with \".\" it is ignored by default but may be matched by specifying it explicitly (for example *.gif will not match .a.gif, but .*.gif will). A simple example: \\*\\*\\\\*.txt matches any file that does not start in '.' and ends with .txt in the Task working directory or any subdirectory. If the filename contains a wildcard character it can be escaped using brackets (for example abc[*] would match a file named abc*). Note that both \\\\ and / are treated as directory separators on Windows, but only / is on Linux. Environment variables (%var% on Windows or $var on Linux) are expanded prior to the pattern being applied. Required."
        destination:
          $ref: "#/components/schemas/OutputFileDestination"
          description: The destination for the output file(s). Required.
        uploadOptions:
          $ref: "#/components/schemas/OutputFileUploadConfiguration"
          description: Additional options for the upload operation, including under what conditions to perform the upload. Required.
      required:
        - filePattern
        - destination
        - uploadOptions
    OutputFileDestination:
      type: object
      description: The destination to which a file should be uploaded.
      properties:
        container:
          $ref: "#/components/schemas/OutputFileBlobContainerDestination"
          description: A location in Azure blob storage to which files are uploaded.
    OutputFileBlobContainerDestination:
      type: object
      description: Specifies a file upload destination within an Azure blob storage container.
      properties:
        path:
          type: string
          description: The destination blob or virtual directory within the Azure Storage container. If filePattern refers to a specific file (i.e. contains no wildcards), then path is the name of the blob to which to upload that file. If filePattern contains one or more wildcards (and therefore may match multiple files), then path is the name of the blob virtual directory (which is prepended to each blob name) to which to upload the file(s). If omitted, file(s) are uploaded to the root of the container with a blob name matching their file name.
        containerUrl:
          type: string
          description: The URL of the container within Azure Blob Storage to which to upload the file(s). If not using a managed identity, the URL must include a Shared Access Signature (SAS) granting write permissions to the container. Required.
        identityReference:
          $ref: "#/components/schemas/BatchNodeIdentityReference"
          description: The reference to the user assigned identity to use to access Azure Blob Storage specified by containerUrl. The identity must have write access to the Azure Blob Storage container.
        uploadHeaders:
          type: array
          items:
            $ref: "#/components/schemas/OutputFileUploadHeader"
          description: "A list of name-value pairs for headers to be used in uploading output files. These headers will be specified when uploading files to Azure Storage. Official document on allowed headers when uploading blobs: `https://learn.microsoft.com/rest/api/storageservices/put-blob#request-headers-all-blob-types `_."
      required:
        - containerUrl
    OutputFileUploadHeader:
      type: object
      description: An HTTP header name-value pair.
      properties:
        name:
          type: string
          description: The case-insensitive name of the header to be used while uploading output files. Required.
        value:
          type: string
          description: The value of the header to be used while uploading output files.
      required:
        - name
    OutputFileUploadConfiguration:
      type: object
      description: Options for an output file upload operation, including under what conditions to perform the upload.
      properties:
        uploadCondition:
          $ref: "#/components/schemas/OutputFileUploadCondition"
          description: 'The conditions under which the Task output file or set of files should be uploaded. The default is taskcompletion. Required. Known values are: "tasksuccess", "taskfailure", and "taskcompletion".'
      required:
        - uploadCondition
    OutputFileUploadCondition:
      type: string
      enum:
        - tasksuccess
        - taskfailure
        - taskcompletion
    BatchTaskConstraints:
      type: object
      description: Execution constraints to apply to a Task.
      properties:
        maxWallClockTime:
          type: string
          description: The maximum elapsed time that the Task may run, measured from the time the Task starts. If the Task does not complete within the time limit, the Batch service terminates it. If this is not specified, there is no time limit on how long the Task may run. The time duration is specified in ISO 8601 format.
        retentionTime:
          type: string
          description: The minimum time to retain the Task directory on the Compute Node where it ran, from the time it completes execution. After this time, the Batch service may delete the Task directory and all its contents. The default is 7 days, i.e. the Task directory will be retained for 7 days unless the Compute Node is removed or the Job is deleted. The time duration is specified in ISO 8601 format.
        maxTaskRetryCount:
          type: integer
          description: The maximum number of times the Task may be retried. The Batch service retries a Task if its exit code is nonzero. Note that this value specifically controls the number of retries for the Task executable due to a nonzero exit code. The Batch service will try the Task once, and may then retry up to this limit. For example, if the maximum retry count is 3, Batch tries the Task up to 4 times (one initial try and 3 retries). If the maximum retry count is 0, the Batch service does not retry the Task after the first attempt. If the maximum retry count is -1, the Batch service retries the Task without limit, however this is not recommended for a start task or any task. The default value is 0 (no retries).
    BatchJobPreparationTask:
      type: object
      description: "A Job Preparation Task to run before any Tasks of the Job on any given Compute Node. You can use Job Preparation to prepare a Node to run Tasks for the Job. Activities commonly performed in Job Preparation include: Downloading common resource files used by all the Tasks in the Job. The Job Preparation Task can download these common resource files to the shared location on the Node. (AZ_BATCH_NODE_ROOT_DIR\\shared), or starting a local service on the Node so that all Tasks of that Job can communicate with it. If the Job Preparation Task fails (that is, exhausts its retry count before exiting with exit code 0), Batch will not run Tasks of this Job on the Node. The Compute Node remains ineligible to run Tasks of this Job until it is reimaged. The Compute Node remains active and can be used for other Jobs. The Job Preparation Task can run multiple times on the same Node. Therefore, you should write the Job Preparation Task to handle re-execution. If the Node is rebooted, the Job Preparation Task is run again on the Compute Node before scheduling any other Task of the Job, if rerunOnNodeRebootAfterSuccess is true or if the Job Preparation Task did not previously complete. If the Node is reimaged, the Job Preparation Task is run again before scheduling any Task of the Job. Batch will retry Tasks when a recovery operation is triggered on a Node. Examples of recovery operations include (but are not limited to) when an unhealthy Node is rebooted or a Compute Node disappeared due to host failure. Retries due to recovery operations are independent of and are not counted against the maxTaskRetryCount. Even if the maxTaskRetryCount is 0, an internal retry due to a recovery operation may occur. Because of this, all Tasks should be idempotent. This means Tasks need to tolerate being interrupted and restarted without causing any corruption or duplicate data. The best practice for long running Tasks is to use some form of checkpointing."
      properties:
        id:
          type: string
          description: A string that uniquely identifies the Job Preparation Task within the Job. The ID can contain any combination of alphanumeric characters including hyphens and underscores and cannot contain more than 64 characters. If you do not specify this property, the Batch service assigns a default value of 'jobpreparation'. No other Task in the Job can have the same ID as the Job Preparation Task. If you try to submit a Task with the same id, the Batch service rejects the request with error code TaskIdSameAsJobPreparationTask; if you are calling the REST API directly, the HTTP status code is 409 (Conflict).
        commandLine:
          type: string
          description: The command line of the Job Preparation Task. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux. If the command line refers to file paths, it should use a relative path (relative to the Task working directory), or use the Batch provided environment variable (`https://learn.microsoft.com/azure/batch/batch-compute-node-environment-variables `_). Required.
        containerSettings:
          $ref: "#/components/schemas/BatchTaskContainerSettings"
          description: The settings for the container under which the Job Preparation Task runs. When this is specified, all directories recursively below the AZ_BATCH_NODE_ROOT_DIR (the root of Azure Batch directories on the node) are mapped into the container, all Task environment variables are mapped into the container, and the Task command line is executed in the container. Files produced in the container outside of AZ_BATCH_NODE_ROOT_DIR might not be reflected to the host disk, meaning that Batch file APIs will not be able to access those files.
        resourceFiles:
          type: array
          items:
            $ref: "#/components/schemas/ResourceFile"
          description: A list of files that the Batch service will download to the Compute Node before running the command line. Files listed under this element are located in the Task's working directory. There is a maximum size for the list of resource files. When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers.
        environmentSettings:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentSetting"
          description: A list of environment variable settings for the Job Preparation Task.
        constraints:
          $ref: "#/components/schemas/BatchTaskConstraints"
          description: Constraints that apply to the Job Preparation Task.
        waitForSuccess:
          type: boolean
          description: Whether the Batch service should wait for the Job Preparation Task to complete successfully before scheduling any other Tasks of the Job on the Compute Node. A Job Preparation Task has completed successfully if it exits with exit code 0. If true and the Job Preparation Task fails on a Node, the Batch service retries the Job Preparation Task up to its maximum retry count (as specified in the constraints element). If the Task has still not completed successfully after all retries, then the Batch service will not schedule Tasks of the Job to the Node. The Node remains active and eligible to run Tasks of other Jobs. If false, the Batch service will not wait for the Job Preparation Task to complete. In this case, other Tasks of the Job can start executing on the Compute Node while the Job Preparation Task is still running; and even if the Job Preparation Task fails, new Tasks will continue to be scheduled on the Compute Node. The default value is true.
        userIdentity:
          $ref: "#/components/schemas/UserIdentity"
          description: The user identity under which the Job Preparation Task runs. If omitted, the Task runs as a non-administrative user unique to the Task on Windows Compute Nodes, or a non-administrative user unique to the Pool on Linux Compute Nodes.
        rerunOnNodeRebootAfterSuccess:
          type: boolean
          description: Whether the Batch service should rerun the Job Preparation Task after a Compute Node reboots. The Job Preparation Task is always rerun if a Compute Node is reimaged, or if the Job Preparation Task did not complete (e.g. because the reboot occurred while the Task was running). Therefore, you should always write a Job Preparation Task to be idempotent and to behave correctly if run multiple times. The default value is true.
      required:
        - commandLine
    BatchJobReleaseTask:
      type: object
      description: "A Job Release Task to run on Job completion on any Compute Node where the Job has run. The Job Release Task runs when the Job ends, because of one of the following: The user calls the Terminate Job API, or the Delete Job API while the Job is still active, the Job's maximum wall clock time constraint is reached, and the Job is still active, or the Job's Job Manager Task completed, and the Job is configured to terminate when the Job Manager completes. The Job Release Task runs on each Node where Tasks of the Job have run and the Job Preparation Task ran and completed. If you reimage a Node after it has run the Job Preparation Task, and the Job ends without any further Tasks of the Job running on that Node (and hence the Job Preparation Task does not re-run), then the Job Release Task does not run on that Compute Node. If a Node reboots while the Job Release Task is still running, the Job Release Task runs again when the Compute Node starts up. The Job is not marked as complete until all Job Release Tasks have completed. The Job Release Task runs in the background. It does not occupy a scheduling slot; that is, it does not count towards the taskSlotsPerNode limit specified on the Pool."
      properties:
        id:
          type: string
          description: A string that uniquely identifies the Job Release Task within the Job. The ID can contain any combination of alphanumeric characters including hyphens and underscores and cannot contain more than 64 characters. If you do not specify this property, the Batch service assigns a default value of 'jobrelease'. No other Task in the Job can have the same ID as the Job Release Task. If you try to submit a Task with the same id, the Batch service rejects the request with error code TaskIdSameAsJobReleaseTask; if you are calling the REST API directly, the HTTP status code is 409 (Conflict).
        commandLine:
          type: string
          description: The command line of the Job Release Task. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux. If the command line refers to file paths, it should use a relative path (relative to the Task working directory), or use the Batch provided environment variable (`https://learn.microsoft.com/azure/batch/batch-compute-node-environment-variables `_). Required.
        containerSettings:
          $ref: "#/components/schemas/BatchTaskContainerSettings"
          description: The settings for the container under which the Job Release Task runs. When this is specified, all directories recursively below the AZ_BATCH_NODE_ROOT_DIR (the root of Azure Batch directories on the node) are mapped into the container, all Task environment variables are mapped into the container, and the Task command line is executed in the container. Files produced in the container outside of AZ_BATCH_NODE_ROOT_DIR might not be reflected to the host disk, meaning that Batch file APIs will not be able to access those files.
        resourceFiles:
          type: array
          items:
            $ref: "#/components/schemas/ResourceFile"
          description: A list of files that the Batch service will download to the Compute Node before running the command line. There is a maximum size for the list of resource files. When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers. Files listed under this element are located in the Task's working directory.
        environmentSettings:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentSetting"
          description: A list of environment variable settings for the Job Release Task.
        maxWallClockTime:
          type: string
          description: The maximum elapsed time that the Job Release Task may run on a given Compute Node, measured from the time the Task starts. If the Task does not complete within the time limit, the Batch service terminates it. The default value is 15 minutes. You may not specify a timeout longer than 15 minutes. If you do, the Batch service rejects it with an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). The time duration is specified in ISO 8601 format.
        retentionTime:
          type: string
          description: The minimum time to retain the Task directory for the Job Release Task on the Compute Node. After this time, the Batch service may delete the Task directory and all its contents. The default is 7 days, i.e. the Task directory will be retained for 7 days unless the Compute Node is removed or the Job is deleted. The time duration is specified in ISO 8601 format.
        userIdentity:
          $ref: "#/components/schemas/UserIdentity"
          description: The user identity under which the Job Release Task runs. If omitted, the Task runs as a non-administrative user unique to the Task.
      required:
        - commandLine
    BatchPoolInfo:
      type: object
      description: Specifies how a Job should be assigned to a Pool.
      properties:
        poolId:
          type: string
          description: The ID of an existing Pool. All the Tasks of the Job will run on the specified Pool. You must ensure that the Pool referenced by this property exists. If the Pool does not exist at the time the Batch service tries to schedule a Job, no Tasks for the Job will run until you create a Pool with that id. Note that the Batch service will not reject the Job request; it will simply not run Tasks until the Pool exists. You must specify either the Pool ID or the auto Pool specification, but not both.
        autoPoolSpecification:
          $ref: "#/components/schemas/BatchAutoPoolSpecification"
          description: Characteristics for a temporary 'auto pool'. The Batch service will create this auto Pool when the Job is submitted. If auto Pool creation fails, the Batch service moves the Job to a completed state, and the Pool creation error is set in the Job's scheduling error property. The Batch service manages the lifetime (both creation and, unless keepAlive is specified, deletion) of the auto Pool. Any user actions that affect the lifetime of the auto Pool while the Job is active will result in unexpected behavior. You must specify either the Pool ID or the auto Pool specification, but not both.
    BatchAutoPoolSpecification:
      type: object
      description: Specifies characteristics for a temporary 'auto pool'. The Batch service will create this auto Pool when the Job is submitted.
      properties:
        autoPoolIdPrefix:
          type: string
          description: A prefix to be added to the unique identifier when a Pool is automatically created. The Batch service assigns each auto Pool a unique identifier on creation. To distinguish between Pools created for different purposes, you can specify this element to add a prefix to the ID that is assigned. The prefix can be up to 20 characters long.
        poolLifetimeOption:
          $ref: "#/components/schemas/BatchPoolLifetimeOption"
          description: 'The minimum lifetime of created auto Pools, and how multiple Jobs on a schedule are assigned to Pools. Required. Known values are: "jobschedule" and "job".'
        keepAlive:
          type: boolean
          description: Whether to keep an auto Pool alive after its lifetime expires. If false, the Batch service deletes the Pool once its lifetime (as determined by the poolLifetimeOption setting) expires; that is, when the Job or Job Schedule completes. If true, the Batch service does not delete the Pool automatically. It is up to the user to delete auto Pools created with this option.
        pool:
          $ref: "#/components/schemas/BatchPoolSpecification"
          description: The Pool specification for the auto Pool.
      required:
        - poolLifetimeOption
    BatchPoolLifetimeOption:
      type: string
      enum:
        - jobschedule
        - job
    BatchPoolSpecification:
      type: object
      description: Specification for creating a new Pool.
      properties:
        displayName:
          type: string
          description: The display name for the Pool. The display name need not be unique and can contain any Unicode characters up to a maximum length of 1024.
        vmSize:
          type: string
          description: The size of the virtual machines in the Pool. All virtual machines in a Pool are the same size. For information about available sizes of virtual machines in Pools, see Choose a VM size for Compute Nodes in an Azure Batch Pool (`https://learn.microsoft.com/azure/batch/batch-pool-vm-sizes `_). Required.
        virtualMachineConfiguration:
          $ref: "#/components/schemas/VirtualMachineConfiguration"
          description: The virtual machine configuration for the Pool. This property must be specified.
        taskSlotsPerNode:
          type: integer
          description: The number of task slots that can be used to run concurrent tasks on a single compute node in the pool. The default value is 1. The maximum value is the smaller of 4 times the number of cores of the vmSize of the pool or 256.
        taskSchedulingPolicy:
          $ref: "#/components/schemas/BatchTaskSchedulingPolicy"
          description: How Tasks are distributed across Compute Nodes in a Pool. If not specified, the default is spread.
        resizeTimeout:
          type: string
          description: The timeout for allocation of Compute Nodes to the Pool. This timeout applies only to manual scaling; it has no effect when enableAutoScale is set to true. The default value is 15 minutes. The minimum value is 5 minutes. If you specify a value less than 5 minutes, the Batch service rejects the request with an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). The time duration is specified in ISO 8601 format.
        targetDedicatedNodes:
          type: integer
          description: The desired number of dedicated Compute Nodes in the Pool. This property must not be specified if enableAutoScale is set to true. If enableAutoScale is set to false, then you must set either targetDedicatedNodes, targetLowPriorityNodes, or both.
        targetLowPriorityNodes:
          type: integer
          description: The desired number of Spot/Low-priority Compute Nodes in the Pool. This property must not be specified if enableAutoScale is set to true. If enableAutoScale is set to false, then you must set either targetDedicatedNodes, targetLowPriorityNodes, or both.
        enableAutoScale:
          type: boolean
          description: Whether the Pool size should automatically adjust over time. If false, at least one of targetDedicatedNodes and targetLowPriorityNodes must be specified. If true, the autoScaleFormula element is required. The Pool automatically resizes according to the formula. The default value is false.
        autoScaleFormula:
          type: string
          description: The formula for the desired number of Compute Nodes in the Pool. This property must not be specified if enableAutoScale is set to false. It is required if enableAutoScale is set to true. The formula is checked for validity before the Pool is created. If the formula is not valid, the Batch service rejects the request with detailed error information.
        autoScaleEvaluationInterval:
          type: string
          description: The time interval at which to automatically adjust the Pool size according to the autoscale formula. The default value is 15 minutes. The minimum and maximum value are 5 minutes and 168 hours respectively. If you specify a value less than 5 minutes or greater than 168 hours, the Batch service rejects the request with an invalid property value error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). The time duration is specified in ISO 8601 format.
        enableInterNodeCommunication:
          type: boolean
          description: Whether the Pool permits direct communication between Compute Nodes. Enabling inter-node communication limits the maximum size of the Pool due to deployment restrictions on the Compute Nodes of the Pool. This may result in the Pool not reaching its desired size. The default value is false.
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: The network configuration for the Pool.
        startTask:
          $ref: "#/components/schemas/BatchStartTask"
          description: A Task to run on each Compute Node as it joins the Pool. The Task runs when the Compute Node is added to the Pool or when the Compute Node is restarted.
        applicationPackageReferences:
          type: array
          items:
            $ref: "#/components/schemas/BatchApplicationPackageReference"
          description: The list of Packages to be installed on each Compute Node in the Pool. When creating a pool, the package's application ID must be fully qualified (/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Batch/batchAccounts/{accountName}/applications/{applicationName}). Changes to Package references affect all new Nodes joining the Pool, but do not affect Compute Nodes that are already in the Pool until they are rebooted or reimaged. There is a maximum of 10 Package references on any given Pool.
        userAccounts:
          type: array
          items:
            $ref: "#/components/schemas/UserAccount"
          description: The list of user Accounts to be created on each Compute Node in the Pool.
        metadata:
          type: array
          items:
            $ref: "#/components/schemas/BatchMetadataItem"
          description: A list of name-value pairs associated with the Pool as metadata. The Batch service does not assign any meaning to metadata; it is solely for the use of user code.
        mountConfiguration:
          type: array
          items:
            $ref: "#/components/schemas/MountConfiguration"
          description: A list of file systems to mount on each node in the pool. This supports Azure Files, NFS, CIFS/SMB, and Blobfuse.
        upgradePolicy:
          $ref: "#/components/schemas/UpgradePolicy"
          description: The upgrade policy for the Pool. Describes an upgrade policy - automatic, manual, or rolling.
      required:
        - vmSize
    BatchAllTasksCompleteMode:
      type: string
      enum:
        - noaction
        - terminatejob
    BatchTaskFailureMode:
      type: string
      enum:
        - noaction
        - performexitoptionsjobaction
    BatchJobNetworkConfiguration:
      type: object
      description: (This property is not available by default. Please contact support for more information) The network configuration for the Job.
      properties:
        subnetId:
          type: string
          description: "The ARM resource identifier of the virtual network subnet which Compute Nodes running Tasks from the Job will join for the duration of the Task. The virtual network must be in the same region and subscription as the Azure Batch Account. The specified subnet should have enough free IP addresses to accommodate the number of Compute Nodes which will run Tasks from the Job. This can be up to the number of Compute Nodes in the Pool. The 'MicrosoftAzureBatch' service principal must have the 'Classic Virtual Machine Contributor' Role-Based Access Control (RBAC) role for the specified VNet so that Azure Batch service can schedule Tasks on the Nodes. This can be verified by checking if the specified VNet has any associated Network Security Groups (NSG). If communication to the Nodes in the specified subnet is denied by an NSG, then the Batch service will set the state of the Compute Nodes to unusable. This is of the form /subscriptions/{subscription}/resourceGroups/{group}/providers/{provider}/virtualNetworks/{network}/subnets/{subnet}. If the specified VNet has any associated Network Security Groups (NSG), then a few reserved system ports must be enabled for inbound communication from the Azure Batch service. For Pools created with a Virtual Machine configuration, enable ports 29876 and 29877, as well as port 22 for Linux and port 3389 for Windows. Port 443 is also required to be open for outbound connections for communications to Azure Storage. For more details see: `https://learn.microsoft.com/azure/batch/batch-api-basics#virtual-network-vnet-and-firewall-configuration `_. Required."
        skipWithdrawFromVNet:
          type: boolean
          description: Whether to withdraw Compute Nodes from the virtual network to DNC when the job is terminated or deleted. If true, nodes will remain joined to the virtual network to DNC. If false, nodes will automatically withdraw when the job ends. Defaults to false.
      required:
        - subnetId
    BatchJobExecutionInfo:
      type: object
      description: Contains information about the execution of a Job in the Azure Batch service.
      properties:
        startTime:
          type: string
          format: date-time
          description: The start time of the Job. This is the time at which the Job was created. Required.
        endTime:
          type: string
          format: date-time
          description: The completion time of the Job. This property is set only if the Job is in the completed state.
        poolId:
          type: string
          description: The ID of the Pool to which this Job is assigned. This element contains the actual Pool where the Job is assigned. When you get Job details from the service, they also contain a poolInfo element, which contains the Pool configuration data from when the Job was added or updated. That poolInfo element may also contain a poolId element. If it does, the two IDs are the same. If it does not, it means the Job ran on an auto Pool, and this property contains the ID of that auto Pool.
        schedulingError:
          $ref: "#/components/schemas/BatchJobSchedulingError"
          description: Details of any error encountered by the service in starting the Job. This property is not set if there was no error starting the Job.
        terminateReason:
          type: string
          description: "A string describing the reason the Job ended. This property is set only if the Job is in the completed state. If the Batch service terminates the Job, it sets the reason as follows: JMComplete - the Job Manager Task completed, and killJobOnCompletion was set to true. MaxWallClockTimeExpiry - the Job reached its maxWallClockTime constraint. TerminateJobSchedule - the Job ran as part of a schedule, and the schedule terminated. AllTasksComplete - the Job's onAllTasksComplete attribute is set to terminatejob, and all Tasks in the Job are complete. TaskFailed - the Job's onTaskFailure attribute is set to performExitOptionsJobAction, and a Task in the Job failed with an exit condition that specified a jobAction of terminatejob. Any other string is a user-defined reason specified in a call to the 'Terminate a Job' operation."
      required:
        - startTime
    BatchJobSchedulingError:
      type: object
      description: An error encountered by the Batch service when scheduling a Job.
      properties:
        category:
          $ref: "#/components/schemas/BatchErrorSourceCategory"
          description: 'The category of the Job scheduling error. Required. Known values are: "usererror" and "servererror".'
        code:
          type: string
          description: An identifier for the Job scheduling error. Codes are invariant and are intended to be consumed programmatically.
        message:
          type: string
          description: A message describing the Job scheduling error, intended to be suitable for display in a user interface.
        details:
          type: array
          items:
            $ref: "#/components/schemas/NameValuePair"
          description: A list of additional error details related to the scheduling error.
      required:
        - category
    BatchErrorSourceCategory:
      type: string
      enum:
        - usererror
        - servererror
    BatchJobStatistics:
      type: object
      description: Resource usage statistics for a Job.
      properties:
        url:
          type: string
          description: The URL of the statistics. Required.
        startTime:
          type: string
          format: date-time
          description: The start time of the time range covered by the statistics. Required.
        lastUpdateTime:
          type: string
          format: date-time
          description: The time at which the statistics were last updated. All statistics are limited to the range between startTime and lastUpdateTime. Required.
        userCPUTime:
          type: string
          description: The total user mode CPU time (summed across all cores and all Compute Nodes) consumed by all Tasks in the Job. The time duration is specified in ISO 8601 format. Required.
        kernelCPUTime:
          type: string
          description: The total kernel mode CPU time (summed across all cores and all Compute Nodes) consumed by all Tasks in the Job. The time duration is specified in ISO 8601 format. Required.
        wallClockTime:
          type: string
          description: The total wall clock time of all Tasks in the Job. The wall clock time is the elapsed time from when the Task started running on a Compute Node to when it finished (or to the last time the statistics were updated, if the Task had not finished by then). If a Task was retried, this includes the wall clock time of all the Task retries. The time duration is specified in ISO 8601 format. Required.
        readIOps:
          type: integer
          description: The total number of disk read operations made by all Tasks in the Job. Required.
        writeIOps:
          type: integer
          description: The total number of disk write operations made by all Tasks in the Job. Required.
        readIOGiB:
          type: number
          description: The total amount of data in GiB read from disk by all Tasks in the Job. Required.
        writeIOGiB:
          type: number
          description: The total amount of data in GiB written to disk by all Tasks in the Job. Required.
        numSucceededTasks:
          type: integer
          description: The total number of Tasks successfully completed in the Job during the given time range. A Task completes successfully if it returns exit code 0. Required.
        numFailedTasks:
          type: integer
          description: The total number of Tasks in the Job that failed during the given time range. A Task fails if it exhausts its maximum retry count without returning exit code 0. Required.
        numTaskRetries:
          type: integer
          description: The total number of retries on all the Tasks in the Job during the given time range. Required.
        waitTime:
          type: string
          description: The total wait time of all Tasks in the Job. The wait time for a Task is defined as the elapsed time between the creation of the Task and the start of Task execution. (If the Task is retried due to failures, the wait time is the time to the most recent Task execution.) This value is only reported in the Account lifetime statistics; it is not included in the Job statistics. The time duration is specified in ISO 8601 format. Required.
      required:
        - url
        - startTime
        - lastUpdateTime
        - userCPUTime
        - kernelCPUTime
        - wallClockTime
        - readIOps
        - writeIOps
        - readIOGiB
        - writeIOGiB
        - numSucceededTasks
        - numFailedTasks
        - numTaskRetries
        - waitTime
    BatchJob:
      type: object
      description: An Azure Batch Job.
      properties:
        id:
          type: string
          description: A string that uniquely identifies the Job within the Account. The ID is case-preserving and case-insensitive (that is, you may not have two IDs within an Account that differ only by case). Required.
        displayName:
          type: string
          description: The display name for the Job.
        usesTaskDependencies:
          type: boolean
          description: Whether Tasks in the Job can define dependencies on each other. The default is false.
        url:
          type: string
          description: The URL of the Job. Required.
        eTag:
          type: string
          description: The ETag of the Job. This is an opaque string. You can use it to detect whether the Job has changed between requests. In particular, you can be pass the ETag when updating a Job to specify that your changes should take effect only if nobody else has modified the Job in the meantime. Required.
        lastModified:
          type: string
          format: date-time
          description: The last modified time of the Job. This is the last time at which the Job level data, such as the Job state or priority, changed. It does not factor in task-level changes such as adding new Tasks or Tasks changing state. Required.
        creationTime:
          type: string
          format: date-time
          description: The creation time of the Job. Required.
        state:
          $ref: "#/components/schemas/BatchJobState"
          description: 'The current state of the Job. Required. Known values are: "active", "disabling", "disabled", "enabling", "terminating", "completed", and "deleting".'
        stateTransitionTime:
          type: string
          format: date-time
          description: The time at which the Job entered its current state. Required.
        previousState:
          $ref: "#/components/schemas/BatchJobState"
          description: 'The previous state of the Job. This property is not set if the Job is in its initial Active state. Known values are: "active", "disabling", "disabled", "enabling", "terminating", "completed", and "deleting".'
        previousStateTransitionTime:
          type: string
          format: date-time
          description: The time at which the Job entered its previous state. This property is not set if the Job is in its initial Active state.
        priority:
          type: integer
          description: The priority of the Job. Priority values can range from -1000 to 1000, with -1000 being the lowest priority and 1000 being the highest priority. The default value is 0.
        allowTaskPreemption:
          type: boolean
          description: Whether Tasks in this job can be preempted by other high priority jobs. (This property is not available by default. Please contact support for more information) If the value is set to True, other high priority jobs submitted to the system will take precedence and will be able requeue tasks from this job. You can update a job's allowTaskPreemption after it has been created using the update job API.
        maxParallelTasks:
          type: integer
          description: The maximum number of tasks that can be executed in parallel for the job. (This property is not available by default. Please contact support for more information) The value of maxParallelTasks must be -1 or greater than 0 if specified. If not specified, the default value is -1, which means there's no limit to the number of tasks that can be run at once. You can update a job's maxParallelTasks after it has been created using the update job API.
        constraints:
          $ref: "#/components/schemas/BatchJobConstraints"
          description: The execution constraints for the Job.
        jobManagerTask:
          $ref: "#/components/schemas/BatchJobManagerTask"
          description: Details of a Job Manager Task to be launched when the Job is started.
        jobPreparationTask:
          $ref: "#/components/schemas/BatchJobPreparationTask"
          description: The Job Preparation Task. The Job Preparation Task is a special Task run on each Compute Node before any other Task of the Job.
        jobReleaseTask:
          $ref: "#/components/schemas/BatchJobReleaseTask"
          description: The Job Release Task. The Job Release Task is a special Task run at the end of the Job on each Compute Node that has run any other Task of the Job.
        commonEnvironmentSettings:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentSetting"
          description: The list of common environment variable settings. These environment variables are set for all Tasks in the Job (including the Job Manager, Job Preparation and Job Release Tasks). Individual Tasks can override an environment setting specified here by specifying the same setting name with a different value.
        poolInfo:
          $ref: "#/components/schemas/BatchPoolInfo"
          description: The Pool settings associated with the Job. Required.
        onAllTasksComplete:
          $ref: "#/components/schemas/BatchAllTasksCompleteMode"
          description: 'The action the Batch service should take when all Tasks in the Job are in the completed state. The default is noaction. Known values are: "noaction" and "terminatejob".'
        onTaskFailure:
          $ref: "#/components/schemas/BatchTaskFailureMode"
          description: 'The action the Batch service should take when any Task in the Job fails. A Task is considered to have failed if has a failureInfo. A failureInfo is set if the Task completes with a non-zero exit code after exhausting its retry count, or if there was an error starting the Task, for example due to a resource file download error. The default is noaction. Known values are: "noaction" and "performexitoptionsjobaction".'
        networkConfiguration:
          $ref: "#/components/schemas/BatchJobNetworkConfiguration"
          description: (This property is not available by default. Please contact support for more information) The network configuration for the Job.
        metadata:
          type: array
          items:
            $ref: "#/components/schemas/BatchMetadataItem"
          description: A list of name-value pairs associated with the Job as metadata. The Batch service does not assign any meaning to metadata; it is solely for the use of user code.
        executionInfo:
          $ref: "#/components/schemas/BatchJobExecutionInfo"
          description: The execution information for the Job.
        stats:
          $ref: "#/components/schemas/BatchJobStatistics"
          description: Resource usage statistics for the entire lifetime of the Job. This property is populated only if the BatchJob was retrieved with an expand clause including the 'stats' attribute; otherwise it is null. The statistics may not be immediately available. The Batch service performs periodic roll-up of statistics. The typical delay is about 30 minutes.
      required:
        - poolInfo
    PagedBatchJob:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchJob"
        nextLink:
          type: string
    BatchJobPreparationTaskExecutionInfo:
      type: object
      description: Contains information about the execution of a Job Preparation Task on a Compute Node.
      properties:
        startTime:
          type: string
          format: date-time
          description: The time at which the Task started running. If the Task has been restarted or retried, this is the most recent time at which the Task started running. Required.
        endTime:
          type: string
          format: date-time
          description: The time at which the Job Preparation Task completed. This property is set only if the Task is in the Completed state.
        state:
          $ref: "#/components/schemas/BatchJobPreparationTaskState"
          description: 'The current state of the Job Preparation Task on the Compute Node. Required. Known values are: "running" and "completed".'
        taskRootDirectory:
          type: string
          description: The root directory of the Job Preparation Task on the Compute Node. You can use this path to retrieve files created by the Task, such as log files.
        taskRootDirectoryUrl:
          type: string
          description: The URL to the root directory of the Job Preparation Task on the Compute Node.
        exitCode:
          type: integer
          description: The exit code of the program specified on the Task command line. This parameter is returned only if the Task is in the completed state. The exit code for a process reflects the specific convention implemented by the application developer for that process. If you use the exit code value to make decisions in your code, be sure that you know the exit code convention used by the application process. Note that the exit code may also be generated by the Compute Node operating system, such as when a process is forcibly terminated.
        containerInfo:
          $ref: "#/components/schemas/BatchTaskContainerExecutionInfo"
          description: Information about the container under which the Task is executing. This property is set only if the Task runs in a container context.
        failureInfo:
          $ref: "#/components/schemas/BatchTaskFailureInfo"
          description: Information describing the Task failure, if any. This property is set only if the Task is in the completed state and encountered a failure.
        retryCount:
          type: integer
          description: The number of times the Task has been retried by the Batch service. Task application failures (non-zero exit code) are retried, pre-processing errors (the Task could not be run) and file upload errors are not retried. The Batch service will retry the Task up to the limit specified by the constraints. Task application failures (non-zero exit code) are retried, pre-processing errors (the Task could not be run) and file upload errors are not retried. The Batch service will retry the Task up to the limit specified by the constraints. Required.
        lastRetryTime:
          type: string
          format: date-time
          description: The most recent time at which a retry of the Job Preparation Task started running. This property is set only if the Task was retried (i.e. retryCount is nonzero). If present, this is typically the same as startTime, but may be different if the Task has been restarted for reasons other than retry; for example, if the Compute Node was rebooted during a retry, then the startTime is updated but the lastRetryTime is not.
        result:
          $ref: "#/components/schemas/BatchTaskExecutionResult"
          description: "The result of the Task execution. If the value is 'failed', then the details of the failure can be found in the failureInfo property. Known values are: \"success\" and \"failure\"."
      required:
        - startTime
        - state
        - retryCount
    BatchJobPreparationTaskState:
      type: string
      enum:
        - running
        - completed
    BatchTaskContainerExecutionInfo:
      type: object
      description: Contains information about the container which a Task is executing.
      properties:
        containerId:
          type: string
          description: The ID of the container.
        state:
          type: string
          description: The state of the container. This is the state of the container according to the Docker service. It is equivalent to the status field returned by "docker inspect".
        error:
          type: string
          description: Detailed error information about the container. This is the detailed error string from the Docker service, if available. It is equivalent to the error field returned by "docker inspect".
    BatchTaskFailureInfo:
      type: object
      description: Information about a Task failure.
      properties:
        category:
          $ref: "#/components/schemas/BatchErrorSourceCategory"
          description: 'The category of the Task error. Required. Known values are: "usererror" and "servererror".'
        code:
          type: string
          description: An identifier for the Task error. Codes are invariant and are intended to be consumed programmatically.
        message:
          type: string
          description: A message describing the Task error, intended to be suitable for display in a user interface.
        details:
          type: array
          items:
            $ref: "#/components/schemas/NameValuePair"
          description: A list of additional details related to the error.
      required:
        - category
    BatchTaskExecutionResult:
      type: string
      enum:
        - success
        - failure
    BatchJobReleaseTaskExecutionInfo:
      type: object
      description: Contains information about the execution of a Job Release Task on a Compute Node.
      properties:
        startTime:
          type: string
          format: date-time
          description: The time at which the Task started running. If the Task has been restarted or retried, this is the most recent time at which the Task started running. Required.
        endTime:
          type: string
          format: date-time
          description: The time at which the Job Release Task completed. This property is set only if the Task is in the Completed state.
        state:
          $ref: "#/components/schemas/BatchJobReleaseTaskState"
          description: 'The current state of the Job Release Task on the Compute Node. Required. Known values are: "running" and "completed".'
        taskRootDirectory:
          type: string
          description: The root directory of the Job Release Task on the Compute Node. You can use this path to retrieve files created by the Task, such as log files.
        taskRootDirectoryUrl:
          type: string
          description: The URL to the root directory of the Job Release Task on the Compute Node.
        exitCode:
          type: integer
          description: The exit code of the program specified on the Task command line. This parameter is returned only if the Task is in the completed state. The exit code for a process reflects the specific convention implemented by the application developer for that process. If you use the exit code value to make decisions in your code, be sure that you know the exit code convention used by the application process. Note that the exit code may also be generated by the Compute Node operating system, such as when a process is forcibly terminated.
        containerInfo:
          $ref: "#/components/schemas/BatchTaskContainerExecutionInfo"
          description: Information about the container under which the Task is executing. This property is set only if the Task runs in a container context.
        failureInfo:
          $ref: "#/components/schemas/BatchTaskFailureInfo"
          description: Information describing the Task failure, if any. This property is set only if the Task is in the completed state and encountered a failure.
        result:
          $ref: "#/components/schemas/BatchTaskExecutionResult"
          description: "The result of the Task execution. If the value is 'failed', then the details of the failure can be found in the failureInfo property. Known values are: \"success\" and \"failure\"."
      required:
        - startTime
        - state
    BatchJobReleaseTaskState:
      type: string
      enum:
        - running
        - completed
    BatchJobPreparationAndReleaseTaskStatus:
      type: object
      description: The status of the Job Preparation and Job Release Tasks on a Compute Node.
      properties:
        poolId:
          type: string
          description: The ID of the Pool containing the Compute Node to which this entry refers.
        nodeId:
          type: string
          description: The ID of the Compute Node to which this entry refers.
        nodeUrl:
          type: string
          description: The URL of the Compute Node to which this entry refers.
        jobPreparationTaskExecutionInfo:
          $ref: "#/components/schemas/BatchJobPreparationTaskExecutionInfo"
          description: Information about the execution status of the Job Preparation Task on this Compute Node.
        jobReleaseTaskExecutionInfo:
          $ref: "#/components/schemas/BatchJobReleaseTaskExecutionInfo"
          description: Information about the execution status of the Job Release Task on this Compute Node. This property is set only if the Job Release Task has run on the Compute Node.
    PagedBatchJobPreparationAndReleaseTaskStatus:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchJobPreparationAndReleaseTaskStatus"
        nextLink:
          type: string
    BatchJobScheduleState:
      type: string
      enum:
        - active
        - completed
        - disabled
        - terminating
        - deleting
    BatchJobScheduleConfiguration:
      type: object
      description: The schedule according to which Jobs will be created. All times are fixed respective to UTC and are not impacted by daylight saving time.
      properties:
        doNotRunUntil:
          type: string
          format: date-time
          description: The earliest time at which any Job may be created under this Job Schedule. If you do not specify a doNotRunUntil time, the schedule becomes ready to create Jobs immediately.
        doNotRunAfter:
          type: string
          format: date-time
          description: A time after which no Job will be created under this Job Schedule. The schedule will move to the completed state as soon as this deadline is past and there is no active Job under this Job Schedule. If you do not specify a doNotRunAfter time, and you are creating a recurring Job Schedule, the Job Schedule will remain active until you explicitly terminate it.
        startWindow:
          type: string
          description: The time interval, starting from the time at which the schedule indicates a Job should be created, within which a Job must be created. If a Job is not created within the startWindow interval, then the 'opportunity' is lost; no Job will be created until the next recurrence of the schedule. If the schedule is recurring, and the startWindow is longer than the recurrence interval, then this is equivalent to an infinite startWindow, because the Job that is 'due' in one recurrenceInterval is not carried forward into the next recurrence interval. The default is infinite. The minimum value is 1 minute. If you specify a lower value, the Batch service rejects the schedule with an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). The time duration is specified in ISO 8601 format.
        recurrenceInterval:
          type: string
          description: "The time interval between the start times of two successive Jobs under the Job Schedule. A Job Schedule can have at most one active Job under it at any given time. Because a Job Schedule can have at most one active Job under it at any given time, if it is time to create a new Job under a Job Schedule, but the previous Job is still running, the Batch service will not create the new Job until the previous Job finishes. If the previous Job does not finish within the startWindow period of the new recurrenceInterval, then no new Job will be scheduled for that interval. For recurring Jobs, you should normally specify a jobManagerTask in the jobSpecification. If you do not use jobManagerTask, you will need an external process to monitor when Jobs are created, add Tasks to the Jobs and terminate the Jobs ready for the next recurrence. The default is that the schedule does not recur: one Job is created, within the startWindow after the doNotRunUntil time, and the schedule is complete as soon as that Job finishes. The minimum value is 1 minute. If you specify a lower value, the Batch service rejects the schedule with an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). The time duration is specified in ISO 8601 format."
    BatchJobSpecification:
      type: object
      description: Specifies details of the Jobs to be created on a schedule.
      properties:
        priority:
          type: integer
          description: The priority of Jobs created under this schedule. Priority values can range from -1000 to 1000, with -1000 being the lowest priority and 1000 being the highest priority. The default value is 0. This priority is used as the default for all Jobs under the Job Schedule. You can update a Job's priority after it has been created using by using the update Job API.
        allowTaskPreemption:
          type: boolean
          description: Whether Tasks in this job can be preempted by other high priority jobs. (This property is not available by default. Please contact support for more information) If the value is set to True, other high priority jobs submitted to the system will take precedence and will be able requeue tasks from this job. You can update a job's allowTaskPreemption after it has been created using the update job API.
        maxParallelTasks:
          type: integer
          description: The maximum number of tasks that can be executed in parallel for the job. (This property is not available by default. Please contact support for more information) The value of maxParallelTasks must be -1 or greater than 0 if specified. If not specified, the default value is -1, which means there's no limit to the number of tasks that can be run at once. You can update a job's maxParallelTasks after it has been created using the update job API.
        displayName:
          type: string
          description: The display name for Jobs created under this schedule. The name need not be unique and can contain any Unicode characters up to a maximum length of 1024.
        usesTaskDependencies:
          type: boolean
          description: Whether Tasks in the Job can define dependencies on each other. The default is false.
        onAllTasksComplete:
          $ref: "#/components/schemas/BatchAllTasksCompleteMode"
          description: 'The action the Batch service should take when all Tasks in a Job created under this schedule are in the completed state. Note that if a Job contains no Tasks, then all Tasks are considered complete. This option is therefore most commonly used with a Job Manager task; if you want to use automatic Job termination without a Job Manager, you should initially set onAllTasksComplete to noaction and update the Job properties to set onAllTasksComplete to terminatejob once you have finished adding Tasks. The default is noaction. Known values are: "noaction" and "terminatejob".'
        onTaskFailure:
          $ref: "#/components/schemas/BatchTaskFailureMode"
          description: 'The action the Batch service should take when any Task fails in a Job created under this schedule. A Task is considered to have failed if it have failed if has a failureInfo. A failureInfo is set if the Task completes with a non-zero exit code after exhausting its retry count, or if there was an error starting the Task, for example due to a resource file download error. The default is noaction. Known values are: "noaction" and "performexitoptionsjobaction".'
        networkConfiguration:
          $ref: "#/components/schemas/BatchJobNetworkConfiguration"
          description: (This property is not available by default. Please contact support for more information) The network configuration for the Job.
        constraints:
          $ref: "#/components/schemas/BatchJobConstraints"
          description: The execution constraints for Jobs created under this schedule.
        jobManagerTask:
          $ref: "#/components/schemas/BatchJobManagerTask"
          description: The details of a Job Manager Task to be launched when a Job is started under this schedule. If the Job does not specify a Job Manager Task, the user must explicitly add Tasks to the Job using the Task API. If the Job does specify a Job Manager Task, the Batch service creates the Job Manager Task when the Job is created, and will try to schedule the Job Manager Task before scheduling other Tasks in the Job.
        jobPreparationTask:
          $ref: "#/components/schemas/BatchJobPreparationTask"
          description: The Job Preparation Task for Jobs created under this schedule. If a Job has a Job Preparation Task, the Batch service will run the Job Preparation Task on a Node before starting any Tasks of that Job on that Compute Node.
        jobReleaseTask:
          $ref: "#/components/schemas/BatchJobReleaseTask"
          description: The Job Release Task for Jobs created under this schedule. The primary purpose of the Job Release Task is to undo changes to Nodes made by the Job Preparation Task. Example activities include deleting local files, or shutting down services that were started as part of Job preparation. A Job Release Task cannot be specified without also specifying a Job Preparation Task for the Job. The Batch service runs the Job Release Task on the Compute Nodes that have run the Job Preparation Task.
        commonEnvironmentSettings:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentSetting"
          description: A list of common environment variable settings. These environment variables are set for all Tasks in Jobs created under this schedule (including the Job Manager, Job Preparation and Job Release Tasks). Individual Tasks can override an environment setting specified here by specifying the same setting name with a different value.
        poolInfo:
          $ref: "#/components/schemas/BatchPoolInfo"
          description: The Pool on which the Batch service runs the Tasks of Jobs created under this schedule. Required.
        metadata:
          type: array
          items:
            $ref: "#/components/schemas/BatchMetadataItem"
          description: A list of name-value pairs associated with each Job created under this schedule as metadata. The Batch service does not assign any meaning to metadata; it is solely for the use of user code.
      required:
        - poolInfo
    BatchJobScheduleExecutionInfo:
      type: object
      description: Contains information about Jobs that have been and will be run under a Job Schedule.
      properties:
        nextRunTime:
          type: string
          format: date-time
          description: The next time at which a Job will be created under this schedule. This property is meaningful only if the schedule is in the active state when the time comes around. For example, if the schedule is disabled, no Job will be created at nextRunTime unless the Job is enabled before then.
        recentJob:
          $ref: "#/components/schemas/RecentBatchJob"
          description: Information about the most recent Job under the Job Schedule. This property is present only if the at least one Job has run under the schedule.
        endTime:
          type: string
          format: date-time
          description: The time at which the schedule ended. This property is set only if the Job Schedule is in the completed state.
    RecentBatchJob:
      type: object
      description: Information about the most recent Job to run under the Job Schedule.
      properties:
        id:
          type: string
          description: The ID of the Job.
        url:
          type: string
          description: The URL of the Job.
    BatchJobScheduleStatistics:
      type: object
      description: Resource usage statistics for a Job Schedule.
      properties:
        url:
          type: string
          description: The URL of the statistics. Required.
        startTime:
          type: string
          format: date-time
          description: The start time of the time range covered by the statistics. Required.
        lastUpdateTime:
          type: string
          format: date-time
          description: The time at which the statistics were last updated. All statistics are limited to the range between startTime and lastUpdateTime. Required.
        userCPUTime:
          type: string
          description: The total user mode CPU time (summed across all cores and all Compute Nodes) consumed by all Tasks in all Jobs created under the schedule. The time duration is specified in ISO 8601 format. Required.
        kernelCPUTime:
          type: string
          description: The total kernel mode CPU time (summed across all cores and all Compute Nodes) consumed by all Tasks in all Jobs created under the schedule. The time duration is specified in ISO 8601 format. Required.
        wallClockTime:
          type: string
          description: The total wall clock time of all the Tasks in all the Jobs created under the schedule. The wall clock time is the elapsed time from when the Task started running on a Compute Node to when it finished (or to the last time the statistics were updated, if the Task had not finished by then). If a Task was retried, this includes the wall clock time of all the Task retries. The time duration is specified in ISO 8601 format. Required.
        readIOps:
          type: integer
          description: The total number of disk read operations made by all Tasks in all Jobs created under the schedule. Required.
        writeIOps:
          type: integer
          description: The total number of disk write operations made by all Tasks in all Jobs created under the schedule. Required.
        readIOGiB:
          type: number
          description: The total gibibytes read from disk by all Tasks in all Jobs created under the schedule. Required.
        writeIOGiB:
          type: number
          description: The total gibibytes written to disk by all Tasks in all Jobs created under the schedule. Required.
        numSucceededTasks:
          type: integer
          description: The total number of Tasks successfully completed during the given time range in Jobs created under the schedule. A Task completes successfully if it returns exit code 0. Required.
        numFailedTasks:
          type: integer
          description: The total number of Tasks that failed during the given time range in Jobs created under the schedule. A Task fails if it exhausts its maximum retry count without returning exit code 0. Required.
        numTaskRetries:
          type: integer
          description: The total number of retries during the given time range on all Tasks in all Jobs created under the schedule. Required.
        waitTime:
          type: string
          description: The total wait time of all Tasks in all Jobs created under the schedule. The wait time for a Task is defined as the elapsed time between the creation of the Task and the start of Task execution. (If the Task is retried due to failures, the wait time is the time to the most recent Task execution.). This value is only reported in the Account lifetime statistics; it is not included in the Job statistics. The time duration is specified in ISO 8601 format. Required.
      required:
        - url
        - startTime
        - lastUpdateTime
        - userCPUTime
        - kernelCPUTime
        - wallClockTime
        - readIOps
        - writeIOps
        - readIOGiB
        - writeIOGiB
        - numSucceededTasks
        - numFailedTasks
        - numTaskRetries
        - waitTime
    BatchJobSchedule:
      type: object
      description: A Job Schedule that allows recurring Jobs by specifying when to run Jobs and a specification used to create each Job.
      properties:
        id:
          type: string
          description: A string that uniquely identifies the schedule within the Account. Required.
        displayName:
          type: string
          description: The display name for the schedule.
        url:
          type: string
          description: The URL of the Job Schedule. Required.
        eTag:
          type: string
          description: The ETag of the Job Schedule. This is an opaque string. You can use it to detect whether the Job Schedule has changed between requests. In particular, you can be pass the ETag with an Update Job Schedule request to specify that your changes should take effect only if nobody else has modified the schedule in the meantime. Required.
        lastModified:
          type: string
          format: date-time
          description: The last modified time of the Job Schedule. This is the last time at which the schedule level data, such as the Job specification or recurrence information, changed. It does not factor in job-level changes such as new Jobs being created or Jobs changing state. Required.
        creationTime:
          type: string
          format: date-time
          description: The creation time of the Job Schedule. Required.
        state:
          $ref: "#/components/schemas/BatchJobScheduleState"
          description: 'The current state of the Job Schedule. Required. Known values are: "active", "completed", "disabled", "terminating", and "deleting".'
        stateTransitionTime:
          type: string
          format: date-time
          description: The time at which the Job Schedule entered the current state. Required.
        previousState:
          $ref: "#/components/schemas/BatchJobScheduleState"
          description: 'The previous state of the Job Schedule. This property is not present if the Job Schedule is in its initial active state. Known values are: "active", "completed", "disabled", "terminating", and "deleting".'
        previousStateTransitionTime:
          type: string
          format: date-time
          description: The time at which the Job Schedule entered its previous state. This property is not present if the Job Schedule is in its initial active state.
        schedule:
          $ref: "#/components/schemas/BatchJobScheduleConfiguration"
          description: The schedule according to which Jobs will be created. All times are fixed respective to UTC and are not impacted by daylight saving time.
        jobSpecification:
          $ref: "#/components/schemas/BatchJobSpecification"
          description: The details of the Jobs to be created on this schedule. Required.
        executionInfo:
          $ref: "#/components/schemas/BatchJobScheduleExecutionInfo"
          description: Information about Jobs that have been and will be run under this schedule. Required.
        metadata:
          type: array
          items:
            $ref: "#/components/schemas/BatchMetadataItem"
          description: A list of name-value pairs associated with the schedule as metadata. The Batch service does not assign any meaning to metadata; it is solely for the use of user code.
        stats:
          $ref: "#/components/schemas/BatchJobScheduleStatistics"
          description: The lifetime resource usage statistics for the Job Schedule. The statistics may not be immediately available. The Batch service performs periodic roll-up of statistics. The typical delay is about 30 minutes.
      required:
        - jobSpecification
    PagedBatchJobSchedule:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchJobSchedule"
        nextLink:
          type: string
    ExitConditions:
      type: object
      description: Specifies how the Batch service should respond when the Task completes.
      properties:
        exitCodes:
          type: array
          items:
            $ref: "#/components/schemas/ExitCodeMapping"
          description: A list of individual Task exit codes and how the Batch service should respond to them.
        exitCodeRanges:
          type: array
          items:
            $ref: "#/components/schemas/ExitCodeRangeMapping"
          description: A list of Task exit code ranges and how the Batch service should respond to them.
        preProcessingError:
          $ref: "#/components/schemas/ExitOptions"
          description: How the Batch service should respond if the Task fails to start due to an error.
        fileUploadError:
          $ref: "#/components/schemas/ExitOptions"
          description: How the Batch service should respond if a file upload error occurs. If the Task exited with an exit code that was specified via exitCodes or exitCodeRanges, and then encountered a file upload error, then the action specified by the exit code takes precedence.
        default:
          $ref: "#/components/schemas/ExitOptions"
          description: How the Batch service should respond if the Task fails with an exit condition not covered by any of the other properties. This value is used if the Task exits with any nonzero exit code not listed in the exitCodes or exitCodeRanges collection, with a pre-processing error if the preProcessingError property is not present, or with a file upload error if the fileUploadError property is not present. If you want non-default behavior on exit code 0, you must list it explicitly using the exitCodes or exitCodeRanges collection.
    ExitCodeMapping:
      type: object
      description: How the Batch service should respond if a Task exits with a particular exit code.
      properties:
        code:
          type: integer
          description: A process exit code. Required.
        exitOptions:
          $ref: "#/components/schemas/ExitOptions"
          description: How the Batch service should respond if the Task exits with this exit code. Required.
      required:
        - code
        - exitOptions
    ExitOptions:
      type: object
      description: Specifies how the Batch service responds to a particular exit condition.
      properties:
        jobAction:
          $ref: "#/components/schemas/BatchJobActionKind"
          description: "An action to take on the Job containing the Task, if the Task completes with the given exit condition and the Job's onTaskFailed property is 'performExitOptionsJobAction'. The default is none for exit code 0 and terminate for all other exit conditions. If the Job's onTaskFailed property is noaction, then specifying this property returns an error and the add Task request fails with an invalid property value error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). Known values are: \"none\", \"disable\", and \"terminate\"."
        dependencyAction:
          $ref: "#/components/schemas/DependencyAction"
          description: "An action that the Batch service performs on Tasks that depend on this Task. Possible values are 'satisfy' (allowing dependent tasks to progress) and 'block' (dependent tasks continue to wait). Batch does not yet support cancellation of dependent tasks. Known values are: \"satisfy\" and \"block\"."
    BatchJobActionKind:
      type: string
      enum:
        - none
        - disable
        - terminate
    DependencyAction:
      type: string
      enum:
        - satisfy
        - block
    ExitCodeRangeMapping:
      type: object
      description: A range of exit codes and how the Batch service should respond to exit codes within that range.
      properties:
        start:
          type: integer
          description: The first exit code in the range. Required.
        end:
          type: integer
          description: The last exit code in the range. Required.
        exitOptions:
          $ref: "#/components/schemas/ExitOptions"
          description: How the Batch service should respond if the Task exits with an exit code in the range start to end (inclusive). Required.
      required:
        - start
        - end
        - exitOptions
    BatchTaskState:
      type: string
      enum:
        - active
        - preparing
        - running
        - completed
    BatchAffinityInfo:
      type: object
      description: A locality hint that can be used by the Batch service to select a Compute Node on which to start a Task.
      properties:
        affinityId:
          type: string
          description: An opaque string representing the location of a Compute Node or a Task that has run previously. You can pass the affinityId of a Node to indicate that this Task needs to run on that Compute Node. Note that this is just a soft affinity. If the target Compute Node is busy or unavailable at the time the Task is scheduled, then the Task will be scheduled elsewhere. Required.
      required:
        - affinityId
    BatchTaskExecutionInfo:
      type: object
      description: Information about the execution of a Task.
      properties:
        startTime:
          type: string
          format: date-time
          description: The time at which the Task started running. 'Running' corresponds to the running state, so if the Task specifies resource files or Packages, then the start time reflects the time at which the Task started downloading or deploying these. If the Task has been restarted or retried, this is the most recent time at which the Task started running. This property is present only for Tasks that are in the running or completed state.
        endTime:
          type: string
          format: date-time
          description: The time at which the Task completed. This property is set only if the Task is in the Completed state.
        exitCode:
          type: integer
          description: The exit code of the program specified on the Task command line. This property is set only if the Task is in the completed state. In general, the exit code for a process reflects the specific convention implemented by the application developer for that process. If you use the exit code value to make decisions in your code, be sure that you know the exit code convention used by the application process. However, if the Batch service terminates the Task (due to timeout, or user termination via the API) you may see an operating system-defined exit code.
        containerInfo:
          $ref: "#/components/schemas/BatchTaskContainerExecutionInfo"
          description: Information about the container under which the Task is executing. This property is set only if the Task runs in a container context.
        failureInfo:
          $ref: "#/components/schemas/BatchTaskFailureInfo"
          description: Information describing the Task failure, if any. This property is set only if the Task is in the completed state and encountered a failure.
        retryCount:
          type: integer
          description: The number of times the Task has been retried by the Batch service. Task application failures (non-zero exit code) are retried, pre-processing errors (the Task could not be run) and file upload errors are not retried. The Batch service will retry the Task up to the limit specified by the constraints. Required.
        lastRetryTime:
          type: string
          format: date-time
          description: The most recent time at which a retry of the Task started running. This element is present only if the Task was retried (i.e. retryCount is nonzero). If present, this is typically the same as startTime, but may be different if the Task has been restarted for reasons other than retry; for example, if the Compute Node was rebooted during a retry, then the startTime is updated but the lastRetryTime is not.
        requeueCount:
          type: integer
          description: The number of times the Task has been requeued by the Batch service as the result of a user request. When the user removes Compute Nodes from a Pool (by resizing/shrinking the pool) or when the Job is being disabled, the user can specify that running Tasks on the Compute Nodes be requeued for execution. This count tracks how many times the Task has been requeued for these reasons. Required.
        lastRequeueTime:
          type: string
          format: date-time
          description: The most recent time at which the Task has been requeued by the Batch service as the result of a user request. This property is set only if the requeueCount is nonzero.
        result:
          $ref: "#/components/schemas/BatchTaskExecutionResult"
          description: "The result of the Task execution. If the value is 'failed', then the details of the failure can be found in the failureInfo property. Known values are: \"success\" and \"failure\"."
      required:
        - retryCount
        - requeueCount
    BatchNodeInfo:
      type: object
      description: Information about the Compute Node on which a Task ran.
      properties:
        affinityId:
          type: string
          description: An identifier for the Node on which the Task ran, which can be passed when adding a Task to request that the Task be scheduled on this Compute Node.
        nodeUrl:
          type: string
          description: The URL of the Compute Node on which the Task ran.
        poolId:
          type: string
          description: The ID of the Pool on which the Task ran.
        nodeId:
          type: string
          description: The ID of the Compute Node on which the Task ran.
        taskRootDirectory:
          type: string
          description: The root directory of the Task on the Compute Node.
        taskRootDirectoryUrl:
          type: string
          description: The URL to the root directory of the Task on the Compute Node.
    MultiInstanceSettings:
      type: object
      description: Multi-instance Tasks are commonly used to support MPI Tasks. In the MPI case, if any of the subtasks fail (for example due to exiting with a non-zero exit code) the entire multi-instance Task fails. The multi-instance Task is then terminated and retried, up to its retry limit.
      properties:
        numberOfInstances:
          type: integer
          description: The number of Compute Nodes required by the Task. If omitted, the default is 1.
        coordinationCommandLine:
          type: string
          description: The command line to run on all the Compute Nodes to enable them to coordinate when the primary runs the main Task command. A typical coordination command line launches a background service and verifies that the service is ready to process inter-node messages. Required.
        commonResourceFiles:
          type: array
          items:
            $ref: "#/components/schemas/ResourceFile"
          description: A list of files that the Batch service will download before running the coordination command line. The difference between common resource files and Task resource files is that common resource files are downloaded for all subtasks including the primary, whereas Task resource files are downloaded only for the primary. Also note that these resource files are not downloaded to the Task working directory, but instead are downloaded to the Task root directory (one directory above the working directory). There is a maximum size for the list of resource files. When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers.
      required:
        - coordinationCommandLine
    BatchTaskStatistics:
      type: object
      description: Resource usage statistics for a Task.
      properties:
        url:
          type: string
          description: The URL of the statistics. Required.
        startTime:
          type: string
          format: date-time
          description: The start time of the time range covered by the statistics. Required.
        lastUpdateTime:
          type: string
          format: date-time
          description: The time at which the statistics were last updated. All statistics are limited to the range between startTime and lastUpdateTime. Required.
        userCPUTime:
          type: string
          description: The total user mode CPU time (summed across all cores and all Compute Nodes) consumed by the Task. The time duration is specified in ISO 8601 format. Required.
        kernelCPUTime:
          type: string
          description: The total kernel mode CPU time (summed across all cores and all Compute Nodes) consumed by the Task. The time duration is specified in ISO 8601 format. Required.
        wallClockTime:
          type: string
          description: The total wall clock time of the Task. The wall clock time is the elapsed time from when the Task started running on a Compute Node to when it finished (or to the last time the statistics were updated, if the Task had not finished by then). If the Task was retried, this includes the wall clock time of all the Task retries. The time duration is specified in ISO 8601 format. Required.
        readIOps:
          type: integer
          description: The total number of disk read operations made by the Task. Required.
        writeIOps:
          type: integer
          description: The total number of disk write operations made by the Task. Required.
        readIOGiB:
          type: number
          description: The total gibibytes read from disk by the Task. Required.
        writeIOGiB:
          type: number
          description: The total gibibytes written to disk by the Task. Required.
        waitTime:
          type: string
          description: The total wait time of the Task. The wait time for a Task is defined as the elapsed time between the creation of the Task and the start of Task execution. (If the Task is retried due to failures, the wait time is the time to the most recent Task execution.). The time duration is specified in ISO 8601 format. Required.
      required:
        - url
        - startTime
        - lastUpdateTime
        - userCPUTime
        - kernelCPUTime
        - wallClockTime
        - readIOps
        - writeIOps
        - readIOGiB
        - writeIOGiB
        - waitTime
    BatchTaskDependencies:
      type: object
      description: Specifies any dependencies of a Task. Any Task that is explicitly specified or within a dependency range must complete before the dependant Task will be scheduled.
      properties:
        taskIds:
          type: array
          items:
            type: string
          description: The list of Task IDs that this Task depends on. All Tasks in this list must complete successfully before the dependent Task can be scheduled. The taskIds collection is limited to 64000 characters total (i.e. the combined length of all Task IDs). If the taskIds collection exceeds the maximum length, the Add Task request fails with error code TaskDependencyListTooLong. In this case consider using Task ID ranges instead.
        taskIdRanges:
          type: array
          items:
            $ref: "#/components/schemas/BatchTaskIdRange"
          description: The list of Task ID ranges that this Task depends on. All Tasks in all ranges must complete successfully before the dependent Task can be scheduled.
    BatchTaskIdRange:
      type: object
      description: The start and end of the range are inclusive. For example, if a range has start 9 and end 12, then it represents Tasks '9', '10', '11' and '12'.
      properties:
        start:
          type: integer
          description: The first Task ID in the range. Required.
        end:
          type: integer
          description: The last Task ID in the range. Required.
      required:
        - start
        - end
    BatchTask:
      type: object
      description: Batch will retry Tasks when a recovery operation is triggered on a Node. Examples of recovery operations include (but are not limited to) when an unhealthy Node is rebooted or a Compute Node disappeared due to host failure. Retries due to recovery operations are independent of and are not counted against the maxTaskRetryCount. Even if the maxTaskRetryCount is 0, an internal retry due to a recovery operation may occur. Because of this, all Tasks should be idempotent. This means Tasks need to tolerate being interrupted and restarted without causing any corruption or duplicate data. The best practice for long running Tasks is to use some form of checkpointing.
      properties:
        id:
          type: string
          description: A string that uniquely identifies the Task within the Job. The ID can contain any combination of alphanumeric characters including hyphens and underscores, and cannot contain more than 64 characters. Required.
        displayName:
          type: string
          description: A display name for the Task. The display name need not be unique and can contain any Unicode characters up to a maximum length of 1024.
        url:
          type: string
          description: The URL of the Task. Required.
        eTag:
          type: string
          description: The ETag of the Task. This is an opaque string. You can use it to detect whether the Task has changed between requests. In particular, you can be pass the ETag when updating a Task to specify that your changes should take effect only if nobody else has modified the Task in the meantime. Required.
        lastModified:
          type: string
          format: date-time
          description: The last modified time of the Task. Required.
        creationTime:
          type: string
          format: date-time
          description: The creation time of the Task. Required.
        exitConditions:
          $ref: "#/components/schemas/ExitConditions"
          description: How the Batch service should respond when the Task completes.
        state:
          $ref: "#/components/schemas/BatchTaskState"
          description: 'The current state of the Task. Required. Known values are: "active", "preparing", "running", and "completed".'
        stateTransitionTime:
          type: string
          format: date-time
          description: The time at which the Task entered its current state. Required.
        previousState:
          $ref: "#/components/schemas/BatchTaskState"
          description: 'The previous state of the Task. This property is not set if the Task is in its initial Active state. Known values are: "active", "preparing", "running", and "completed".'
        previousStateTransitionTime:
          type: string
          format: date-time
          description: The time at which the Task entered its previous state. This property is not set if the Task is in its initial Active state.
        commandLine:
          type: string
          description: The command line of the Task. For multi-instance Tasks, the command line is executed as the primary Task, after the primary Task and all subtasks have finished executing the coordination command line. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux. If the command line refers to file paths, it should use a relative path (relative to the Task working directory), or use the Batch provided environment variable (`https://learn.microsoft.com/azure/batch/batch-compute-node-environment-variables `_). Required.
        containerSettings:
          $ref: "#/components/schemas/BatchTaskContainerSettings"
          description: The settings for the container under which the Task runs. If the Pool that will run this Task has containerConfiguration set, this must be set as well. If the Pool that will run this Task doesn't have containerConfiguration set, this must not be set. When this is specified, all directories recursively below the AZ_BATCH_NODE_ROOT_DIR (the root of Azure Batch directories on the node) are mapped into the container, all Task environment variables are mapped into the container, and the Task command line is executed in the container. Files produced in the container outside of AZ_BATCH_NODE_ROOT_DIR might not be reflected to the host disk, meaning that Batch file APIs will not be able to access those files.
        resourceFiles:
          type: array
          items:
            $ref: "#/components/schemas/ResourceFile"
          description: A list of files that the Batch service will download to the Compute Node before running the command line. For multi-instance Tasks, the resource files will only be downloaded to the Compute Node on which the primary Task is executed. There is a maximum size for the list of resource files. When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers.
        outputFiles:
          type: array
          items:
            $ref: "#/components/schemas/OutputFile"
          description: A list of files that the Batch service will upload from the Compute Node after running the command line. For multi-instance Tasks, the files will only be uploaded from the Compute Node on which the primary Task is executed.
        environmentSettings:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentSetting"
          description: A list of environment variable settings for the Task.
        affinityInfo:
          $ref: "#/components/schemas/BatchAffinityInfo"
          description: A locality hint that can be used by the Batch service to select a Compute Node on which to start the new Task.
        constraints:
          $ref: "#/components/schemas/BatchTaskConstraints"
          description: The execution constraints that apply to this Task.
        requiredSlots:
          type: integer
          description: The number of scheduling slots that the Task requires to run. The default is 1. A Task can only be scheduled to run on a compute node if the node has enough free scheduling slots available. For multi-instance Tasks, this must be 1.
        userIdentity:
          $ref: "#/components/schemas/UserIdentity"
          description: The user identity under which the Task runs. If omitted, the Task runs as a non-administrative user unique to the Task.
        executionInfo:
          $ref: "#/components/schemas/BatchTaskExecutionInfo"
          description: Information about the execution of the Task.
        nodeInfo:
          $ref: "#/components/schemas/BatchNodeInfo"
          description: Information about the Compute Node on which the Task ran.
        multiInstanceSettings:
          $ref: "#/components/schemas/MultiInstanceSettings"
          description: An object that indicates that the Task is a multi-instance Task, and contains information about how to run the multi-instance Task.
        stats:
          $ref: "#/components/schemas/BatchTaskStatistics"
          description: Resource usage statistics for the Task.
        dependsOn:
          $ref: "#/components/schemas/BatchTaskDependencies"
          description: The Tasks that this Task depends on. This Task will not be scheduled until all Tasks that it depends on have completed successfully. If any of those Tasks fail and exhaust their retry counts, this Task will never be scheduled.
        applicationPackageReferences:
          type: array
          items:
            $ref: "#/components/schemas/BatchApplicationPackageReference"
          description: A list of Packages that the Batch service will deploy to the Compute Node before running the command line. Application packages are downloaded and deployed to a shared directory, not the Task working directory. Therefore, if a referenced package is already on the Node, and is up to date, then it is not re-downloaded; the existing copy on the Compute Node is used. If a referenced Package cannot be installed, for example because the package has been deleted or because download failed, the Task fails.
    PagedBatchTask:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchTask"
        nextLink:
          type: string
    BatchSubtaskState:
      type: string
      enum:
        - preparing
        - running
        - completed
    BatchSubtask:
      type: object
      description: Information about an Azure Batch subtask.
      properties:
        id:
          type: integer
          description: The ID of the subtask.
        nodeInfo:
          $ref: "#/components/schemas/BatchNodeInfo"
          description: Information about the Compute Node on which the subtask ran.
        startTime:
          type: string
          format: date-time
          description: The time at which the subtask started running. If the subtask has been restarted or retried, this is the most recent time at which the subtask started running.
        endTime:
          type: string
          format: date-time
          description: The time at which the subtask completed. This property is set only if the subtask is in the Completed state.
        exitCode:
          type: integer
          description: The exit code of the program specified on the subtask command line. This property is set only if the subtask is in the completed state. In general, the exit code for a process reflects the specific convention implemented by the application developer for that process. If you use the exit code value to make decisions in your code, be sure that you know the exit code convention used by the application process. However, if the Batch service terminates the subtask (due to timeout, or user termination via the API) you may see an operating system-defined exit code.
        containerInfo:
          $ref: "#/components/schemas/BatchTaskContainerExecutionInfo"
          description: Information about the container under which the Task is executing. This property is set only if the Task runs in a container context.
        failureInfo:
          $ref: "#/components/schemas/BatchTaskFailureInfo"
          description: Information describing the Task failure, if any. This property is set only if the Task is in the completed state and encountered a failure.
        state:
          $ref: "#/components/schemas/BatchSubtaskState"
          description: 'The current state of the subtask. Known values are: "preparing", "running", and "completed".'
        stateTransitionTime:
          type: string
          format: date-time
          description: The time at which the subtask entered its current state.
        previousState:
          $ref: "#/components/schemas/BatchSubtaskState"
          description: 'The previous state of the subtask. This property is not set if the subtask is in its initial running state. Known values are: "preparing", "running", and "completed".'
        previousStateTransitionTime:
          type: string
          format: date-time
          description: The time at which the subtask entered its previous state. This property is not set if the subtask is in its initial running state.
        result:
          $ref: "#/components/schemas/BatchTaskExecutionResult"
          description: "The result of the Task execution. If the value is 'failed', then the details of the failure can be found in the failureInfo property. Known values are: \"success\" and \"failure\"."
    PagedBatchSubtask:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchSubtask"
        nextLink:
          type: string
    FileProperties:
      type: object
      description: The properties of a file on a Compute Node.
      properties:
        creationTime:
          type: string
          format: date-time
          description: The file creation time. The creation time is not returned for files on Linux Compute Nodes.
        lastModified:
          type: string
          format: date-time
          description: The time at which the file was last modified. Required.
        contentLength:
          type: integer
          description: The length of the file. Required.
        contentType:
          type: string
          description: The content type of the file.
        fileMode:
          type: string
          description: The file mode attribute in octal format. The file mode is returned only for files on Linux Compute Nodes.
      required:
        - lastModified
        - contentLength
    BatchNodeFileFlattened:
      type: object
      description: Flattened view of BatchNodeFile ('properties' hoisted to the top level).
      properties:
        name:
          type: string
          description: The file path.
        url:
          type: string
          description: The URL of the file.
        isDirectory:
          type: boolean
          description: Whether the object represents a directory.
        creationTime:
          type: string
          format: date-time
          description: The file creation time. The creation time is not returned for files on Linux Compute Nodes.
        lastModified:
          type: string
          format: date-time
          description: The time at which the file was last modified. Required.
        contentLength:
          type: integer
          description: The length of the file. Required.
        contentType:
          type: string
          description: The content type of the file.
        fileMode:
          type: string
          description: The file mode attribute in octal format. The file mode is returned only for files on Linux Compute Nodes.
    PagedBatchNodeFileFlattened:
      type: object
