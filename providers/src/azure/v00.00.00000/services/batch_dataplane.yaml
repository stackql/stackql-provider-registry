    post:
      operationId: _BatchClient_create_job
      description: "Creates a Job to the specified Account. The Batch service supports two ways to control the work done as part of a Job. In the first approach, the user specifies a Job Manager Task. The Batch service launches this Task when it is ready to start the Job. The Job Manager Task controls all other Tasks that run under this Job, by using the Task APIs. In the second approach, the user directly controls the execution of Tasks under an active Job, by using the Task APIs. Also note: when naming Jobs, avoid including sensitive information such as user names or secret project names. This information may appear in telemetry logs accessible to Microsoft Support engineers."
      parameters:
        - name: timeOut
          in: query
          required: false
          schema:
            type: integer
          description: The maximum time that the server can spend processing the request, in seconds. The default is 30 seconds. If the value is larger than 30, the default will be used instead.". Default value is None.
        - name: ocp-date
          in: header
          required: false
          schema:
            type: string
          description: The time the request was issued. Client libraries typically set this to the current system clock time; set it explicitly if you are calling the REST API directly. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: A string that uniquely identifies the Job within the Account. The ID can contain any combination of alphanumeric characters including hyphens and underscores, and cannot contain more than 64 characters. The ID is case-preserving and case-insensitive (that is, you may not have two IDs within an Account that differ only by case). Required.
                displayName:
                  type: string
                  description: The display name for the Job. The display name need not be unique and can contain any Unicode characters up to a maximum length of 1024.
                usesTaskDependencies:
                  type: boolean
                  description: Whether Tasks in the Job can define dependencies on each other. The default is false.
                priority:
                  type: integer
                  description: The priority of the Job. Priority values can range from -1000 to 1000, with -1000 being the lowest priority and 1000 being the highest priority. The default value is 0.
                allowTaskPreemption:
                  type: boolean
                  description: Whether Tasks in this job can be preempted by other high priority jobs. (This property is not available by default. Please contact support for more information) If the value is set to True, other high priority jobs submitted to the system will take precedence and will be able requeue tasks from this job. You can update a job's allowTaskPreemption after it has been created using the update job API.
                maxParallelTasks:
                  type: integer
                  description: The maximum number of tasks that can be executed in parallel for the job. (This property is not available by default. Please contact support for more information) The value of maxParallelTasks must be -1 or greater than 0 if specified. If not specified, the default value is -1, which means there's no limit to the number of tasks that can be run at once. You can update a job's maxParallelTasks after it has been created using the update job API.
                constraints:
                  $ref: "#/components/schemas/BatchJobConstraints"
                  description: The execution constraints for the Job.
                jobManagerTask:
                  $ref: "#/components/schemas/BatchJobManagerTask"
                  description: Details of a Job Manager Task to be launched when the Job is started. If the Job does not specify a Job Manager Task, the user must explicitly add Tasks to the Job. If the Job does specify a Job Manager Task, the Batch service creates the Job Manager Task when the Job is created, and will try to schedule the Job Manager Task before scheduling other Tasks in the Job. The Job Manager Task's typical purpose is to control and/or monitor Job execution, for example by deciding what additional Tasks to run, determining when the work is complete, etc. (However, a Job Manager Task is not restricted to these activities - it is a fully-fledged Task in the system and perform whatever actions are required for the Job.) For example, a Job Manager Task might download a file specified as a parameter, analyze the contents of that file and submit additional Tasks based on those contents.
                jobPreparationTask:
                  $ref: "#/components/schemas/BatchJobPreparationTask"
                  description: The Job Preparation Task. If a Job has a Job Preparation Task, the Batch service will run the Job Preparation Task on a Node before starting any Tasks of that Job on that Compute Node.
                jobReleaseTask:
                  $ref: "#/components/schemas/BatchJobReleaseTask"
                  description: The Job Release Task. A Job Release Task cannot be specified without also specifying a Job Preparation Task for the Job. The Batch service runs the Job Release Task on the Nodes that have run the Job Preparation Task. The primary purpose of the Job Release Task is to undo changes to Compute Nodes made by the Job Preparation Task. Example activities include deleting local files, or shutting down services that were started as part of Job preparation.
                commonEnvironmentSettings:
                  type: array
                  items:
                    $ref: "#/components/schemas/EnvironmentSetting"
                  description: The list of common environment variable settings. These environment variables are set for all Tasks in the Job (including the Job Manager, Job Preparation and Job Release Tasks). Individual Tasks can override an environment setting specified here by specifying the same setting name with a different value.
                poolInfo:
                  $ref: "#/components/schemas/BatchPoolInfo"
                  description: The Pool on which the Batch service runs the Job's Tasks. Required.
                onAllTasksComplete:
                  $ref: "#/components/schemas/BatchAllTasksCompleteMode"
                  description: 'The action the Batch service should take when all Tasks in the Job are in the completed state. Note that if a Job contains no Tasks, then all Tasks are considered complete. This option is therefore most commonly used with a Job Manager task; if you want to use automatic Job termination without a Job Manager, you should initially set onAllTasksComplete to noaction and update the Job properties to set onAllTasksComplete to terminatejob once you have finished adding Tasks. The default is noaction. Known values are: "noaction" and "terminatejob".'
                onTaskFailure:
                  $ref: "#/components/schemas/BatchTaskFailureMode"
                  description: 'The action the Batch service should take when any Task in the Job fails. A Task is considered to have failed if has a failureInfo. A failureInfo is set if the Task completes with a non-zero exit code after exhausting its retry count, or if there was an error starting the Task, for example due to a resource file download error. The default is noaction. Known values are: "noaction" and "performexitoptionsjobaction".'
                networkConfiguration:
                  $ref: "#/components/schemas/BatchJobNetworkConfiguration"
                  description: (This property is not available by default. Please contact support for more information) The network configuration for the Job.
                metadata:
                  type: array
                  items:
                    $ref: "#/components/schemas/BatchMetadataItem"
                  description: A list of name-value pairs associated with the Job as metadata. The Batch service does not assign any meaning to metadata; it is solely for the use of user code.
              required:
                - id
                - poolInfo
      responses:
        "200":
          description: Success
