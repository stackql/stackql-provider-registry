    post:
      operationId: _BatchClient_create_pool
      description: Creates a Pool to the specified Account. When naming Pools, avoid including sensitive information such as user names or secret project names. This information may appear in telemetry logs accessible to Microsoft Support engineers.
      parameters:
        - name: timeOut
          in: query
          required: false
          schema:
            type: integer
          description: The maximum time that the server can spend processing the request, in seconds. The default is 30 seconds. If the value is larger than 30, the default will be used instead.". Default value is None.
        - name: ocp-date
          in: header
          required: false
          schema:
            type: string
          description: The time the request was issued. Client libraries typically set this to the current system clock time; set it explicitly if you are calling the REST API directly. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: A string that uniquely identifies the Pool within the Account. The ID can contain any combination of alphanumeric characters including hyphens and underscores, and cannot contain more than 64 characters. The ID is case-preserving and case-insensitive (that is, you may not have two Pool IDs within an Account that differ only by case). Required.
                displayName:
                  type: string
                  description: The display name for the Pool. The display name need not be unique and can contain any Unicode characters up to a maximum length of 1024.
                vmSize:
                  type: string
                  description: The size of virtual machines in the Pool. All virtual machines in a Pool are the same size. For information about available VM sizes for Pools using Images from the Virtual Machines Marketplace (pools created with virtualMachineConfiguration), see Sizes for Virtual Machines in Azure (`https://learn.microsoft.com/azure/virtual-machines/sizes/overview `_). Batch supports all Azure VM sizes except STANDARD_A0 and those with premium storage (STANDARD_GS, STANDARD_DS, and STANDARD_DSV2 series). Required.
                virtualMachineConfiguration:
                  $ref: "#/components/schemas/VirtualMachineConfiguration"
                  description: The virtual machine configuration for the Pool. This property must be specified.
                resizeTimeout:
                  type: string
                  description: The timeout for allocation of Compute Nodes to the Pool. This timeout applies only to manual scaling; it has no effect when enableAutoScale is set to true. The default value is 15 minutes. The minimum value is 5 minutes. If you specify a value less than 5 minutes, the Batch service returns an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). The time duration is specified in ISO 8601 format.
                targetDedicatedNodes:
                  type: integer
                  description: The desired number of dedicated Compute Nodes in the Pool. This property must not be specified if enableAutoScale is set to true. If enableAutoScale is set to false, then you must set either targetDedicatedNodes, targetLowPriorityNodes, or both.
                targetLowPriorityNodes:
                  type: integer
                  description: The desired number of Spot/Low-priority Compute Nodes in the Pool. This property must not be specified if enableAutoScale is set to true. If enableAutoScale is set to false, then you must set either targetDedicatedNodes, targetLowPriorityNodes, or both.
                enableAutoScale:
                  type: boolean
                  description: Whether the Pool size should automatically adjust over time. If false, at least one of targetDedicatedNodes and targetLowPriorityNodes must be specified. If true, the autoScaleFormula property is required and the Pool automatically resizes according to the formula. The default value is false.
                autoScaleFormula:
                  type: string
                  description: A formula for the desired number of Compute Nodes in the Pool. This property must not be specified if enableAutoScale is set to false. It is required if enableAutoScale is set to true. The formula is checked for validity before the Pool is created. If the formula is not valid, the Batch service rejects the request with detailed error information. For more information about specifying this formula, see 'Automatically scale Compute Nodes in an Azure Batch Pool' (`https://learn.microsoft.com/azure/batch/batch-automatic-scaling `_).
                autoScaleEvaluationInterval:
                  type: string
                  description: The time interval at which to automatically adjust the Pool size according to the autoscale formula. The default value is 15 minutes. The minimum and maximum value are 5 minutes and 168 hours respectively. If you specify a value less than 5 minutes or greater than 168 hours, the Batch service returns an error; if you are calling the REST API directly, the HTTP status code is 400 (Bad Request). The time duration is specified in ISO 8601 format.
                enableInterNodeCommunication:
                  type: boolean
                  description: Whether the Pool permits direct communication between Compute Nodes. Enabling inter-node communication limits the maximum size of the Pool due to deployment restrictions on the Compute Nodes of the Pool. This may result in the Pool not reaching its desired size. The default value is false.
                networkConfiguration:
                  $ref: "#/components/schemas/NetworkConfiguration"
                  description: The network configuration for the Pool.
                startTask:
                  $ref: "#/components/schemas/BatchStartTask"
                  description: A Task specified to run on each Compute Node as it joins the Pool. The Task runs when the Compute Node is added to the Pool or when the Compute Node is restarted.
                applicationPackageReferences:
                  type: array
                  items:
                    $ref: "#/components/schemas/BatchApplicationPackageReference"
                  description: The list of Packages to be installed on each Compute Node in the Pool. When creating a pool, the package's application ID must be fully qualified (/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Batch/batchAccounts/{accountName}/applications/{applicationName}). Changes to Package references affect all new Nodes joining the Pool, but do not affect Compute Nodes that are already in the Pool until they are rebooted or reimaged. There is a maximum of 10 Package references on any given Pool.
                taskSlotsPerNode:
                  type: integer
                  description: The number of task slots that can be used to run concurrent tasks on a single compute node in the pool. The default value is 1. The maximum value is the smaller of 4 times the number of cores of the vmSize of the pool or 256.
                taskSchedulingPolicy:
                  $ref: "#/components/schemas/BatchTaskSchedulingPolicy"
                  description: How Tasks are distributed across Compute Nodes in a Pool. If not specified, the default is spread.
                userAccounts:
                  type: array
                  items:
                    $ref: "#/components/schemas/UserAccount"
                  description: The list of user Accounts to be created on each Compute Node in the Pool.
                metadata:
                  type: array
                  items:
                    $ref: "#/components/schemas/BatchMetadataItem"
                  description: A list of name-value pairs associated with the Pool as metadata. The Batch service does not assign any meaning to metadata; it is solely for the use of user code.
                mountConfiguration:
                  type: array
                  items:
                    $ref: "#/components/schemas/MountConfiguration"
                  description: Mount storage using specified file system for the entire lifetime of the pool. Mount the storage using Azure fileshare, NFS, CIFS or Blobfuse based file system.
                upgradePolicy:
                  $ref: "#/components/schemas/UpgradePolicy"
                  description: The upgrade policy for the Pool. Describes an upgrade policy - automatic, manual, or rolling.
              required:
                - id
                - vmSize
      responses:
        "200":
          description: Success
