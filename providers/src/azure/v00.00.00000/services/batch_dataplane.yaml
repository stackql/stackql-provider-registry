openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure Batch (Data Plane)
  description: Data-plane operations for Batch jobs, tasks, pools, nodes and job schedules.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-06-01-stackql-generated
  x-serviceAlias: batch_dataplane
  x-sdkPackage: azure-batch
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    BatchApplication:
      type: object
      description: Contains information about an application in an Azure Batch Account.
      properties:
        id:
          type: string
          description: A string that uniquely identifies the application within the Account. Required.
        displayName:
          type: string
          description: The display name for the application. Required.
        versions:
          type: array
          items:
            type: string
          description: The list of available versions of the application. Required.
      required:
        - id
        - displayName
        - versions
    PagedBatchApplication:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchApplication"
        nextLink:
          type: string
    BatchPoolUsageMetrics:
      type: object
      description: Usage metrics for a Pool across an aggregation interval.
      properties:
        poolId:
          type: string
          description: The ID of the Pool whose metrics are aggregated in this entry. Required.
        startTime:
          type: string
          format: date-time
          description: The start time of the aggregation interval covered by this entry. Required.
        endTime:
          type: string
          format: date-time
          description: The end time of the aggregation interval covered by this entry. Required.
        vmSize:
          type: string
          description: The size of virtual machines in the Pool. All VMs in a Pool are the same size. For information about available sizes of virtual machines in Pools, see Choose a VM size for Compute Nodes in an Azure Batch Pool (`https://learn.microsoft.com/azure/batch/batch-pool-vm-sizes `_). Required.
        totalCoreHours:
          type: number
          description: The total core hours used in the Pool during this aggregation interval. Required.
      required:
        - poolId
        - startTime
        - endTime
        - vmSize
        - totalCoreHours
    PagedBatchPoolUsageMetrics:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchPoolUsageMetrics"
        nextLink:
          type: string
    BatchPoolState:
      type: string
      enum:
        - active
        - deleting
    AllocationState:
      type: string
      enum:
        - steady
        - resizing
        - stopping
    VirtualMachineConfiguration:
      type: object
      description: The configuration for Compute Nodes in a Pool based on the Azure Virtual Machines infrastructure.
      properties:
        imageReference:
          $ref: "#/components/schemas/BatchVmImageReference"
          description: A reference to the Azure Virtual Machines Marketplace Image or the custom Virtual Machine Image to use. Required.
        nodeAgentSKUId:
          type: string
          description: The SKU of the Batch Compute Node agent to be provisioned on Compute Nodes in the Pool. The Batch Compute Node agent is a program that runs on each Compute Node in the Pool, and provides the command-and-control interface between the Compute Node and the Batch service. There are different implementations of the Compute Node agent, known as SKUs, for different operating systems. You must specify a Compute Node agent SKU which matches the selected Image reference. To get the list of supported Compute Node agent SKUs along with their list of verified Image references, see the 'List supported Compute Node agent SKUs' operation. Required.
        windowsConfiguration:
          $ref: "#/components/schemas/WindowsConfiguration"
          description: Windows operating system settings on the virtual machine. This property must not be specified if the imageReference property specifies a Linux OS Image.
        dataDisks:
          type: array
          items:
            $ref: "#/components/schemas/DataDisk"
          description: The configuration for data disks attached to the Compute Nodes in the Pool. This property must be specified if the Compute Nodes in the Pool need to have empty data disks attached to them. This cannot be updated. Each Compute Node gets its own disk (the disk is not a file share). Existing disks cannot be attached, each attached disk is empty. When the Compute Node is removed from the Pool, the disk and all data associated with it is also deleted. The disk is not formatted after being attached, it must be formatted before use - for more information see `https://learn.microsoft.com/azure/virtual-machines/linux/classic/attach-disk#initialize-a-new-data-disk-in-linux `_ and `https://learn.microsoft.com/azure/virtual-machines/windows/attach-disk-ps#add-an-empty-data-disk-to-a-virtual-machine `_.
        licenseType:
          type: string
          description: "This only applies to Images that contain the Windows operating system, and should only be used when you hold valid on-premises licenses for the Compute Nodes which will be deployed. If omitted, no on-premises licensing discount is applied. Values are: Windows_Server (the on-premises license is for Windows Server) and Windows_Client (the on-premises license is for Windows Client)."
        containerConfiguration:
          $ref: "#/components/schemas/BatchContainerConfiguration"
          description: The container configuration for the Pool. If specified, setup is performed on each Compute Node in the Pool to allow Tasks to run in containers. All regular Tasks and Job manager Tasks run on this Pool must specify the containerSettings property, and all other Tasks may specify it.
        diskEncryptionConfiguration:
          $ref: "#/components/schemas/DiskEncryptionConfiguration"
          description: The disk encryption configuration for the pool. If specified, encryption is performed on each node in the pool during node provisioning.
        nodePlacementConfiguration:
          $ref: "#/components/schemas/BatchNodePlacementConfiguration"
          description: The node placement configuration for the pool. This configuration will specify rules on how nodes in the pool will be physically allocated.
        extensions:
          type: array
          items:
            $ref: "#/components/schemas/VMExtension"
          description: The virtual machine extension for the pool. If specified, the extensions mentioned in this configuration will be installed on each node.
        osDisk:
          $ref: "#/components/schemas/BatchOsDisk"
          description: Settings for the operating system disk of the Virtual Machine.
        securityProfile:
          $ref: "#/components/schemas/SecurityProfile"
          description: Specifies the security profile settings for the virtual machine or virtual machine scale set.
        serviceArtifactReference:
          $ref: "#/components/schemas/ServiceArtifactReference"
          description: Specifies the service artifact reference id used to set same image version for all virtual machines in the scale set when using 'latest' image version. The service artifact reference id in the form of /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Compute/galleries/{galleryName}/serviceArtifacts/{serviceArtifactName}/vmArtifactsProfiles/{vmArtifactsProfilesName}.
      required:
        - imageReference
        - nodeAgentSKUId
    BatchVmImageReference:
      type: object
      description: A reference to an Azure Virtual Machines Marketplace Image or a Azure Compute Gallery Image. To get the list of all Azure Marketplace Image references verified by Azure Batch, see the ' List Supported Images ' operation.
      properties:
        publisher:
          type: string
          description: The publisher of the Azure Virtual Machines Marketplace Image. For example, Canonical or MicrosoftWindowsServer.
        offer:
          type: string
          description: The offer type of the Azure Virtual Machines Marketplace Image. For example, UbuntuServer or WindowsServer.
        sku:
          type: string
          description: The SKU of the Azure Virtual Machines Marketplace Image. For example, 18.04-LTS or 2019-Datacenter.
        version:
          type: string
          description: The version of the Azure Virtual Machines Marketplace Image. A value of 'latest' can be specified to select the latest version of an Image. If omitted, the default is 'latest'.
        virtualMachineImageId:
          type: string
          description: The ARM resource identifier of the Azure Compute Gallery Image. Compute Nodes in the Pool will be created using this Image Id. This is of the form /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Compute/galleries/{galleryName}/images/{imageDefinitionName}/versions/{VersionId} or /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Compute/galleries/{galleryName}/images/{imageDefinitionName} for always defaulting to the latest image version. This property is mutually exclusive with other ImageReference properties. The Azure Compute Gallery Image must have replicas in the same region and must be in the same subscription as the Azure Batch account. If the image version is not specified in the imageId, the latest version will be used. For information about the firewall settings for the Batch Compute Node agent to communicate with the Batch service see `https://learn.microsoft.com/azure/batch/nodes-and-pools#virtual-network-vnet-and-firewall-configuration `_.
        exactVersion:
          type: string
          description: The specific version of the platform image or marketplace image used to create the node. This read-only field differs from 'version' only if the value specified for 'version' when the pool was created was 'latest'.
        sharedGalleryImageId:
          type: string
          description: The shared gallery image unique identifier. This property is mutually exclusive with other properties and can be fetched from shared gallery image GET call.
        communityGalleryImageId:
          type: string
          description: The community gallery image unique identifier. This property is mutually exclusive with other properties and can be fetched from community gallery image GET call.
    WindowsConfiguration:
      type: object
      description: Windows operating system settings to apply to the virtual machine.
      properties:
        enableAutomaticUpdates:
          type: boolean
          description: Whether automatic updates are enabled on the virtual machine. If omitted, the default value is true.
    DataDisk:
      type: object
      description: Settings which will be used by the data disks associated to Compute Nodes in the Pool. When using attached data disks, you need to mount and format the disks from within a VM to use them.
      properties:
        lun:
          type: integer
          description: The logical unit number. The logicalUnitNumber is used to uniquely identify each data disk. If attaching multiple disks, each should have a distinct logicalUnitNumber. The value must be between 0 and 63, inclusive. Required.
        caching:
          $ref: "#/components/schemas/CachingType"
          description: 'The type of caching to be enabled for the data disks. The default value for caching is readwrite. For information about the caching options see: `https://blogs.msdn.microsoft.com/windowsazurestorage/2012/06/27/exploring-windows-azure-drives-disks-and-images/ `_. Known values are: "none", "readonly", and "readwrite".'
        diskSizeGB:
          type: integer
          description: The initial disk size in gigabytes. Required.
        managedDisk:
          $ref: "#/components/schemas/ManagedDisk"
          description: The managed disk parameters.
      required:
        - lun
        - diskSizeGB
    CachingType:
      type: string
      enum:
        - none
        - readonly
        - readwrite
    ManagedDisk:
      type: object
      description: The managed disk parameters.
      properties:
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Specifies the customer managed disk encryption set resource id for the managed disk. It can be set only in UserSubscription mode.
        storageAccountType:
          $ref: "#/components/schemas/StorageAccountType"
          description: 'The storage account type for managed disk. Known values are: "standard_lrs", "premium_lrs", and "standardssd_lrs".'
        securityProfile:
          $ref: "#/components/schemas/BatchVmDiskSecurityProfile"
          description: Specifies the security profile settings for the managed disk.
    DiskEncryptionSetParameters:
      type: object
      description: The ARM resource id of the disk encryption set.
      properties:
        id:
          type: string
          description: The ARM resource id of the disk encryption set. The resource must be in the same subscription as the Batch account.
    StorageAccountType:
      type: string
      enum:
        - standard_lrs
        - premium_lrs
        - standardssd_lrs
    BatchVmDiskSecurityProfile:
      type: object
      description: "Specifies the security profile settings for the managed disk. **Note**: It can only be set for Confidential VMs and required when using Confidential VMs."
      properties:
        securityEncryptionType:
          $ref: "#/components/schemas/SecurityEncryptionTypes"
          description: 'Specifies the EncryptionType of the managed disk. It is set to VMGuestStateOnly for encryption of just the VMGuestState blob, and NonPersistedTPM for not persisting firmware state in the VMGuestState blob. **Note**: It can be set for only Confidential VMs and is required when using Confidential VMs. Known values are: "DiskWithVMGuestState", "NonPersistedTPM", and "VMGuestStateOnly".'
    SecurityEncryptionTypes:
      type: string
      enum:
        - DiskWithVMGuestState
        - NonPersistedTPM
        - VMGuestStateOnly
    BatchContainerConfiguration:
      type: object
      description: The configuration for container-enabled Pools.
      properties:
        type:
          $ref: "#/components/schemas/ContainerType"
          description: 'The container technology to be used. Required. Known values are: "dockerCompatible" and "criCompatible".'
        containerImageNames:
          type: array
          items:
            type: string
          description: The collection of container Image names. This is the full Image reference, as would be specified to "docker pull". An Image will be sourced from the default Docker registry unless the Image is fully qualified with an alternative registry.
        containerRegistries:
          type: array
          items:
            $ref: "#/components/schemas/ContainerRegistryReference"
          description: Additional private registries from which containers can be pulled. If any Images must be downloaded from a private registry which requires credentials, then those credentials must be provided here.
      required:
        - type
    ContainerType:
      type: string
      enum:
        - dockerCompatible
        - criCompatible
    ContainerRegistryReference:
      type: object
      description: A private container registry.
      properties:
        username:
          type: string
          description: The user name to log into the registry server.
        password:
          type: string
          description: The password to log into the registry server.
        registryServer:
          type: string
          description: The registry URL. If omitted, the default is "docker.io".
        identityReference:
          $ref: "#/components/schemas/BatchNodeIdentityReference"
          description: The reference to the user assigned identity to use to access an Azure Container Registry instead of username and password.
    BatchNodeIdentityReference:
      type: object
      description: The reference to a user assigned identity associated with the Batch pool which a compute node will use.
      properties:
        resourceId:
          type: string
          description: The ARM resource id of the user assigned identity.
    DiskEncryptionConfiguration:
      type: object
      description: The disk encryption configuration applied on compute nodes in the pool. Disk encryption configuration is not supported on Linux pool created with Azure Compute Gallery Image.
      properties:
        customerManagedKey:
          $ref: "#/components/schemas/DiskCustomerManagedKey"
          description: The Customer Managed Key reference to encrypt the OS Disk. Customer Managed Key will encrypt OS Disk by EncryptionAtRest, and by default we will encrypt the data disk as well. It can be used only when the pool is configured with an identity and OsDisk is set as one of the targets of DiskEncryption.
        targets:
          type: array
          items:
            $ref: "#/components/schemas/DiskEncryptionTarget"
          description: The list of disk targets Batch Service will encrypt on the compute node. The list of disk targets Batch Service will encrypt on the compute node.
    DiskCustomerManagedKey:
      type: object
      description: The Customer Managed Key reference to encrypt the Disk.
      properties:
        identityReference:
          $ref: "#/components/schemas/BatchPoolIdentityReference"
          description: The reference of one of the pool identities to encrypt Disk. This identity will be used to access the KeyVault.
        keyUrl:
          type: string
          description: Fully versioned Key Url pointing to a key in KeyVault. Version segment of the Url is required regardless of rotationToLatestKeyVersionEnabled value.
        rotationToLatestKeyVersionEnabled:
          type: boolean
          description: Set this flag to true to enable auto-updating of the Disk Encryption to the latest key version. Default is false.
    BatchPoolIdentityReference:
      type: object
      description: The reference of one of the pool identities to encrypt Disk. This identity will be used to access the key vault.
      properties:
        resourceId:
          type: string
          description: The ARM resource id of the user assigned identity. This reference must be included in the pool identities.
    DiskEncryptionTarget:
      type: string
      enum:
        - osdisk
        - temporarydisk
    BatchNodePlacementConfiguration:
      type: object
      description: For regional placement, nodes in the pool will be allocated in the same region. For zonal placement, nodes in the pool will be spread across different zones with best effort balancing.
      properties:
        policy:
          $ref: "#/components/schemas/BatchNodePlacementPolicyType"
          description: 'Node placement Policy type on Batch Pools. Allocation policy used by Batch Service to provision the nodes. If not specified, Batch will use the regional policy. Known values are: "regional" and "zonal".'
    BatchNodePlacementPolicyType:
      type: string
      enum:
        - regional
        - zonal
    VMExtension:
      type: object
      description: The configuration for virtual machine extensions.
      properties:
        name:
          type: string
          description: The name of the virtual machine extension. Required.
        publisher:
          type: string
          description: The name of the extension handler publisher. Required.
        type:
          type: string
          description: The type of the extension. Required.
        typeHandlerVersion:
          type: string
          description: The version of script handler.
        autoUpgradeMinorVersion:
          type: boolean
          description: Indicates whether the extension should use a newer minor version if one is available at deployment time. Once deployed, however, the extension will not upgrade minor versions unless redeployed, even with this property set to true.
        enableAutomaticUpgrade:
          type: boolean
          description: Indicates whether the extension should be automatically upgraded by the platform if there is a newer version of the extension available.
        settings:
          type: object
          properties: {}
          description: JSON formatted public settings for the extension.
        protectedSettings:
          type: object
          properties: {}
          description: The extension can contain either protectedSettings or protectedSettingsFromKeyVault or no protected settings at all.
        provisionAfterExtensions:
          type: array
          items:
            type: string
          description: The collection of extension names. Collection of extension names after which this extension needs to be provisioned.
      required:
        - name
        - publisher
        - type
    BatchOsDisk:
      type: object
      description: Settings for the operating system disk of the compute node (VM).
      properties:
        ephemeralOSDiskSettings:
          $ref: "#/components/schemas/BatchDiffDiskSettings"
          description: Specifies the ephemeral Disk Settings for the operating system disk used by the compute node (VM).
        caching:
          $ref: "#/components/schemas/CachingType"
          description: 'Specifies the caching requirements. Possible values are: None, ReadOnly, ReadWrite. The default values are: None for Standard storage. ReadOnly for Premium storage. Known values are: "none", "readonly", and "readwrite".'
        diskSizeGB:
          type: integer
          description: The initial disk size in GB when creating new OS disk.
        managedDisk:
          $ref: "#/components/schemas/ManagedDisk"
          description: The managed disk parameters.
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
    BatchDiffDiskSettings:
      type: object
      description: Specifies the ephemeral Disk Settings for the operating system disk used by the compute node (VM).
      properties:
        placement:
          $ref: "#/components/schemas/DiffDiskPlacement"
          description: Specifies the ephemeral disk placement for operating system disk for all VMs in the pool. This property can be used by user in the request to choose the location e.g., cache disk space for Ephemeral OS disk provisioning. For more information on Ephemeral OS disk size requirements, please refer to Ephemeral OS disk size requirements for Windows VMs at `https://learn.microsoft.com/azure/virtual-machines/windows/ephemeral-os-disks#size-requirements `_ and Linux VMs at `https://learn.microsoft.com/azure/virtual-machines/linux/ephemeral-os-disks#size-requirements `_. "cachedisk"
    DiffDiskPlacement:
      type: string
      enum:
        - cachedisk
    SecurityProfile:
      type: object
      description: Specifies the security profile settings for the virtual machine or virtual machine scale set.
      properties:
        encryptionAtHost:
          type: boolean
          description: This property can be used by user in the request to enable or disable the Host Encryption for the virtual machine or virtual machine scale set. This will enable the encryption for all the disks including Resource/Temp disk at host itself. For more information on encryption at host requirements, please refer to `https://learn.microsoft.com/azure/virtual-machines/disk-encryption#supported-vm-sizes `_.
        proxyAgentSettings:
          $ref: "#/components/schemas/ProxyAgentSettings"
          description: Specifies ProxyAgent settings while creating the virtual machine.
        securityType:
          $ref: "#/components/schemas/SecurityTypes"
          description: 'Specifies the SecurityType of the virtual machine. It has to be set to any specified value to enable UefiSettings. Known values are: "trustedLaunch" and "confidentialvm".'
        uefiSettings:
          $ref: "#/components/schemas/BatchUefiSettings"
          description: Specifies the security settings like secure boot and vTPM used while creating the virtual machine. Specifies the security settings like secure boot and vTPM used while creating the virtual machine.
    ProxyAgentSettings:
      type: object
      description: Specifies ProxyAgent settings while creating the virtual machine.
      properties:
        enabled:
          type: boolean
          description: Specifies whether Metadata Security Protocol feature should be enabled on the virtual machine or virtual machine scale set. Default is False.
        imds:
          $ref: "#/components/schemas/HostEndpointSettings"
          description: Settings for the IMDS endpoint.
        wireServer:
          $ref: "#/components/schemas/HostEndpointSettings"
          description: Settings for the WireServer endpoint.
    HostEndpointSettings:
      type: object
      description: Specifies particular host endpoint settings.
      properties:
        inVMAccessControlProfileReferenceId:
          type: string
          description: Specifies the reference to the InVMAccessControlProfileVersion resource id in the form of /subscriptions/{SubscriptionId}/resourceGroups/{ResourceGroupName}/providers/Microsoft.Compute/galleries/{galleryName}/inVMAccessControlProfiles/{profile}/versions/{version}.
        mode:
          $ref: "#/components/schemas/HostEndpointSettingsModeTypes"
          description: 'Specifies the access control policy execution mode. Known values are: "Audit" and "Enforce".'
    HostEndpointSettingsModeTypes:
      type: string
      enum:
        - Audit
        - Enforce
    SecurityTypes:
      type: string
      enum:
        - trustedLaunch
        - confidentialvm
    BatchUefiSettings:
      type: object
      description: Specifies the security settings like secure boot and vTPM used while creating the virtual machine.
      properties:
        secureBootEnabled:
          type: boolean
          description: Specifies whether secure boot should be enabled on the virtual machine.
        vTpmEnabled:
          type: boolean
          description: Specifies whether vTPM should be enabled on the virtual machine.
    ServiceArtifactReference:
      type: object
      description: Specifies the service artifact reference id used to set same image version for all virtual machines in the scale set when using 'latest' image version.
      properties:
        id:
          type: string
          description: The service artifact reference id of ServiceArtifactReference. The service artifact reference id in the form of /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Compute/galleries/{galleryName}/serviceArtifacts/{serviceArtifactName}/vmArtifactsProfiles/{vmArtifactsProfilesName}. Required.
      required:
        - id
    ResizeError:
      type: object
      description: An error that occurred when resizing a Pool.
      properties:
        code:
          type: string
          description: An identifier for the Pool resize error. Codes are invariant and are intended to be consumed programmatically.
        message:
          type: string
          description: A message describing the Pool resize error, intended to be suitable for display in a user interface.
        values:
          type: array
          items:
            $ref: "#/components/schemas/NameValuePair"
          description: A list of additional error details related to the Pool resize error.
    NameValuePair:
      type: object
      description: Represents a name-value pair.
      properties:
        name:
          type: string
          description: The name in the name-value pair.
        value:
          type: string
          description: The value in the name-value pair.
    AutoScaleRun:
      type: object
      description: The results and errors from an execution of a Pool autoscale formula.
      properties:
        timestamp:
          type: string
          format: date-time
          description: The time at which the autoscale formula was last evaluated. Required.
        results:
          type: string
          description: The final values of all variables used in the evaluation of the autoscale formula. Each variable value is returned in the form $variable=value, and variables are separated by semicolons.
        error:
          $ref: "#/components/schemas/AutoScaleRunError"
          description: Details of the error encountered evaluating the autoscale formula on the Pool, if the evaluation was unsuccessful.
      required:
        - timestamp
    AutoScaleRunError:
      type: object
      description: An error that occurred when executing or evaluating a Pool autoscale formula.
      properties:
        code:
          type: string
          description: An identifier for the autoscale error. Codes are invariant and are intended to be consumed programmatically.
        message:
          type: string
          description: A message describing the autoscale error, intended to be suitable for display in a user interface.
        values:
          type: array
          items:
            $ref: "#/components/schemas/NameValuePair"
          description: A list of additional error details related to the autoscale error.
    NetworkConfiguration:
      type: object
      description: The network configuration for a Pool.
      properties:
        subnetId:
          type: string
          description: "The ARM resource identifier of the virtual network subnet which the Compute Nodes of the Pool will join. This is of the form /subscriptions/{subscription}/resourceGroups/{group}/providers/{provider}/virtualNetworks/{network}/subnets/{subnet}. The virtual network must be in the same region and subscription as the Azure Batch Account. The specified subnet should have enough free IP addresses to accommodate the number of Compute Nodes in the Pool. If the subnet doesn't have enough free IP addresses, the Pool will partially allocate Nodes and a resize error will occur. The 'MicrosoftAzureBatch' service principal must have the 'Classic Virtual Machine Contributor' Role-Based Access Control (RBAC) role for the specified VNet. The specified subnet must allow communication from the Azure Batch service to be able to schedule Tasks on the Nodes. This can be verified by checking if the specified VNet has any associated Network Security Groups (NSG). If communication to the Nodes in the specified subnet is denied by an NSG, then the Batch service will set the state of the Compute Nodes to unusable. Only ARM virtual networks ('Microsoft.Network/virtualNetworks') are supported. If the specified VNet has any associated Network Security Groups (NSG), then a few reserved system ports must be enabled for inbound communication, including ports 29876 and 29877. Also enable outbound connections to Azure Storage on port 443. For more details see: `https://learn.microsoft.com/azure/batch/nodes-and-pools#virtual-network-vnet-and-firewall-configuration `_."
        dynamicVNetAssignmentScope:
          $ref: "#/components/schemas/DynamicVNetAssignmentScope"
          description: 'The scope of dynamic vnet assignment. Known values are: "none" and "job".'
        endpointConfiguration:
          $ref: "#/components/schemas/BatchPoolEndpointConfiguration"
          description: The configuration for endpoints on Compute Nodes in the Batch Pool.
        publicIPAddressConfiguration:
          $ref: "#/components/schemas/BatchPublicIpAddressConfiguration"
          description: The Public IPAddress configuration for Compute Nodes in the Batch Pool.
        enableAcceleratedNetworking:
          type: boolean
          description: "Whether this pool should enable accelerated networking. Accelerated networking enables single root I/O virtualization (SR-IOV) to a VM, which may lead to improved networking performance. For more details, see: `https://learn.microsoft.com/azure/virtual-network/accelerated-networking-overview `_."
    DynamicVNetAssignmentScope:
      type: string
      enum:
        - none
        - job
    BatchPoolEndpointConfiguration:
      type: object
      description: The endpoint configuration for a Pool.
      properties:
        inboundNATPools:
          type: array
          items:
            $ref: "#/components/schemas/BatchInboundNatPool"
          description: A list of inbound NAT Pools that can be used to address specific ports on an individual Compute Node externally. The maximum number of inbound NAT Pools per Batch Pool is 5. If the maximum number of inbound NAT Pools is exceeded the request fails with HTTP status code 400. This cannot be specified if the IPAddressProvisioningType is NoPublicIPAddresses. Required.
      required:
        - inboundNATPools
    BatchInboundNatPool:
      type: object
      description: A inbound NAT Pool that can be used to address specific ports on Compute Nodes in a Batch Pool externally.
      properties:
        name:
          type: string
          description: The name of the endpoint. The name must be unique within a Batch Pool, can contain letters, numbers, underscores, periods, and hyphens. Names must start with a letter or number, must end with a letter, number, or underscore, and cannot exceed 77 characters. If any invalid values are provided the request fails with HTTP status code 400. Required.
        protocol:
          $ref: "#/components/schemas/InboundEndpointProtocol"
          description: 'The protocol of the endpoint. Required. Known values are: "tcp" and "udp".'
        backendPort:
          type: integer
          description: The port number on the Compute Node. This must be unique within a Batch Pool. Acceptable values are between 1 and 65535 except for 29876 and 29877 as these are reserved. If any reserved values are provided the request fails with HTTP status code 400. Required.
        frontendPortRangeStart:
          type: integer
          description: The first port number in the range of external ports that will be used to provide inbound access to the backendPort on individual Compute Nodes. Acceptable values range between 1 and 65534 except ports from 50000 to 55000 which are reserved. All ranges within a Pool must be distinct and cannot overlap. Each range must contain at least 40 ports. If any reserved or overlapping values are provided the request fails with HTTP status code 400. Required.
        frontendPortRangeEnd:
          type: integer
          description: The last port number in the range of external ports that will be used to provide inbound access to the backendPort on individual Compute Nodes. Acceptable values range between 1 and 65534 except ports from 50000 to 55000 which are reserved by the Batch service. All ranges within a Pool must be distinct and cannot overlap. Each range must contain at least 40 ports. If any reserved or overlapping values are provided the request fails with HTTP status code 400. Required.
        networkSecurityGroupRules:
          type: array
          items:
            $ref: "#/components/schemas/NetworkSecurityGroupRule"
          description: A list of network security group rules that will be applied to the endpoint. The maximum number of rules that can be specified across all the endpoints on a Batch Pool is 25. If no network security group rules are specified, a default rule will be created to allow inbound access to the specified backendPort. If the maximum number of network security group rules is exceeded the request fails with HTTP status code 400.
      required:
        - name
        - protocol
        - backendPort
        - frontendPortRangeStart
        - frontendPortRangeEnd
    InboundEndpointProtocol:
      type: string
      enum:
        - tcp
        - udp
    NetworkSecurityGroupRule:
      type: object
      description: A network security group rule to apply to an inbound endpoint.
      properties:
        priority:
          type: integer
          description: The priority for this rule. Priorities within a Pool must be unique and are evaluated in order of priority. The lower the number the higher the priority. For example, rules could be specified with order numbers of 150, 250, and 350. The rule with the order number of 150 takes precedence over the rule that has an order of 250. Allowed priorities are 150 to 4096. If any reserved or duplicate values are provided the request fails with HTTP status code 400. Required.
        access:
          $ref: "#/components/schemas/NetworkSecurityGroupRuleAccess"
          description: 'The action that should be taken for a specified IP address, subnet range or tag. Required. Known values are: "allow" and "deny".'
        sourceAddressPrefix:
          type: string
          description: The source address prefix or tag to match for the rule. Valid values are a single IP address (i.e. 10.10.10.10), IP subnet (i.e. 192.168.1.0/24), default tag, or * (for all addresses). If any other values are provided the request fails with HTTP status code 400. Required.
        sourcePortRanges:
          type: array
          items:
            type: string
          description: The source port ranges to match for the rule. Valid values are '*' (for all ports 0 - 65535), a specific port (i.e. 22), or a port range (i.e. 100-200). The ports must be in the range of 0 to 65535. Each entry in this collection must not overlap any other entry (either a range or an individual port). If any other values are provided the request fails with HTTP status code 400. The default value is '*'.
      required:
        - priority
        - access
        - sourceAddressPrefix
    NetworkSecurityGroupRuleAccess:
      type: string
      enum:
        - allow
        - deny
    BatchPublicIpAddressConfiguration:
      type: object
      description: The public IP Address configuration of the networking configuration of a Pool.
      properties:
        provision:
          $ref: "#/components/schemas/IpAddressProvisioningType"
          description: 'The provisioning type for Public IP Addresses for the Pool. The default value is BatchManaged. Known values are: "batchmanaged", "usermanaged", and "nopublicipaddresses".'
        ipFamilies:
          type: array
          items:
            $ref: "#/components/schemas/IPFamily"
          description: The IP families used to specify IP versions available to the pool. IP families are used to determine single-stack or dual-stack pools. For single-stack, the expected value is IPv4. For dual-stack, the expected values are IPv4 and IPv6.
        ipAddressIds:
          type: array
          items:
            type: string
          description: "The list of public IPs which the Batch service will use when provisioning Compute Nodes. The number of IPs specified here limits the maximum size of the Pool - 100 dedicated nodes or 100 Spot/Low-priority nodes can be allocated for each public IP. For example, a pool needing 250 dedicated VMs would need at least 3 public IPs specified. Each element of this collection is of the form: /subscriptions/{subscription}/resourceGroups/{group}/providers/Microsoft.Network/publicIPAddresses/{ip}."
        ipTags:
          type: array
          items:
            $ref: "#/components/schemas/IPTag"
          description: A list of IP tags associated with the public IP addresses of the Pool. IP tags are used to categorize and filter public IP addresses for billing and management purposes.
    IpAddressProvisioningType:
      type: string
      enum:
        - batchmanaged
        - usermanaged
        - nopublicipaddresses
    IPFamily:
      type: string
      enum:
        - IPv4
        - IPv6
    IPTag:
      type: object
      description: Contains the IP tag associated with the public IP address.
      properties:
        ipTagType:
          type: string
          description: "The IP Tag type. Example: FirstPartyUsage."
        tag:
          type: string
          description: "The value of the IP tag associated with the public IP. Example: SQL."
    BatchStartTask:
      type: object
      description: Batch will retry Tasks when a recovery operation is triggered on a Node. Examples of recovery operations include (but are not limited to) when an unhealthy Node is rebooted or a Compute Node disappeared due to host failure. Retries due to recovery operations are independent of and are not counted against the maxTaskRetryCount. Even if the maxTaskRetryCount is 0, an internal retry due to a recovery operation may occur. Because of this, all Tasks should be idempotent. This means Tasks need to tolerate being interrupted and restarted without causing any corruption or duplicate data. The best practice for long running Tasks is to use some form of checkpointing. In some cases the StartTask may be re-run even though the Compute Node was not rebooted. Special care should be taken to avoid StartTasks which create breakaway process or install/launch services from the StartTask working directory, as this will block Batch from being able to re-run the StartTask.
      properties:
        commandLine:
          type: string
          description: The command line of the StartTask. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux. If the command line refers to file paths, it should use a relative path (relative to the Task working directory), or use the Batch provided environment variable (`https://learn.microsoft.com/azure/batch/batch-compute-node-environment-variables `_). Required.
        containerSettings:
          $ref: "#/components/schemas/BatchTaskContainerSettings"
          description: The settings for the container under which the StartTask runs. When this is specified, all directories recursively below the AZ_BATCH_NODE_ROOT_DIR (the root of Azure Batch directories on the node) are mapped into the container, all Task environment variables are mapped into the container, and the Task command line is executed in the container. Files produced in the container outside of AZ_BATCH_NODE_ROOT_DIR might not be reflected to the host disk, meaning that Batch file APIs will not be able to access those files.
        resourceFiles:
          type: array
          items:
            $ref: "#/components/schemas/ResourceFile"
          description: A list of files that the Batch service will download to the Compute Node before running the command line. There is a maximum size for the list of resource files. When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers. Files listed under this element are located in the Task's working directory.
        environmentSettings:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentSetting"
          description: A list of environment variable settings for the StartTask.
        userIdentity:
          $ref: "#/components/schemas/UserIdentity"
          description: The user identity under which the StartTask runs. If omitted, the Task runs as a non-administrative user unique to the Task.
        maxTaskRetryCount:
          type: integer
          description: The maximum number of times the Task may be retried. The Batch service retries a Task if its exit code is nonzero. Note that this value specifically controls the number of retries. The Batch service will try the Task once, and may then retry up to this limit. For example, if the maximum retry count is 3, Batch tries the Task up to 4 times (one initial try and 3 retries). If the maximum retry count is 0, the Batch service does not retry the Task. If the maximum retry count is -1, the Batch service retries the Task without limit, however this is not recommended for a start task or any task. The default value is 0 (no retries).
        waitForSuccess:
          type: boolean
          description: Whether the Batch service should wait for the StartTask to complete successfully (that is, to exit with exit code 0) before scheduling any Tasks on the Compute Node. If true and the StartTask fails on a Node, the Batch service retries the StartTask up to its maximum retry count (maxTaskRetryCount). If the Task has still not completed successfully after all retries, then the Batch service marks the Node unusable, and will not schedule Tasks to it. This condition can be detected via the Compute Node state and failure info details. If false, the Batch service will not wait for the StartTask to complete. In this case, other Tasks can start executing on the Compute Node while the StartTask is still running; and even if the StartTask fails, new Tasks will continue to be scheduled on the Compute Node. The default is true.
      required:
        - commandLine
    BatchTaskContainerSettings:
      type: object
      description: The container settings for a Task.
      properties:
        containerRunOptions:
          type: string
          description: Additional options to the container create command. These additional options are supplied as arguments to the "docker create" command, in addition to those controlled by the Batch Service.
        imageName:
          type: string
          description: The Image to use to create the container in which the Task will run. This is the full Image reference, as would be specified to "docker pull". If no tag is provided as part of the Image name, the tag ":latest" is used as a default. Required.
        registry:
          $ref: "#/components/schemas/ContainerRegistryReference"
          description: The private registry which contains the container Image. This setting can be omitted if was already provided at Pool creation.
        workingDirectory:
          $ref: "#/components/schemas/ContainerWorkingDirectory"
          description: "The location of the container Task working directory. The default is 'taskWorkingDirectory'. Known values are: \"taskWorkingDirectory\" and \"containerImageDefault\"."
        containerHostBatchBindMounts:
          type: array
          items:
            $ref: "#/components/schemas/ContainerHostBatchBindMountEntry"
          description: The paths you want to mounted to container task. If this array is null or be not present, container task will mount entire temporary disk drive in windows (or AZ_BATCH_NODE_ROOT_DIR in Linux). It won't' mount any data paths into container if this array is set as empty.
      required:
        - imageName
    ContainerWorkingDirectory:
      type: string
      enum:
        - taskWorkingDirectory
        - containerImageDefault
    ContainerHostBatchBindMountEntry:
      type: object
      description: The entry of path and mount mode you want to mount into task container.
      properties:
        source:
          $ref: "#/components/schemas/ContainerHostDataPath"
          description: 'The path which be mounted to container customer can select. Known values are: "Shared", "Startup", "VfsMounts", "Task", "JobPrep", and "Applications".'
        isReadOnly:
          type: boolean
          description: Mount this source path as read-only mode or not. Default value is false (read/write mode). For Linux, if you mount this path as a read/write mode, this does not mean that all users in container have the read/write access for the path, it depends on the access in host VM. If this path is mounted read-only, all users within the container will not be able to modify the path.
    ContainerHostDataPath:
      type: string
      enum:
        - Shared
        - Startup
        - VfsMounts
        - Task
        - JobPrep
        - Applications
    ResourceFile:
      type: object
      description: A single file or multiple files to be downloaded to a Compute Node.
      properties:
        autoStorageContainerName:
          type: string
          description: The storage container name in the auto storage Account. The autoStorageContainerName, storageContainerUrl and httpUrl properties are mutually exclusive and one of them must be specified.
        storageContainerUrl:
          type: string
          description: "The URL of the blob container within Azure Blob Storage. The autoStorageContainerName, storageContainerUrl and httpUrl properties are mutually exclusive and one of them must be specified. This URL must be readable and listable from compute nodes. There are three ways to get such a URL for a container in Azure storage: include a Shared Access Signature (SAS) granting read and list permissions on the container, use a managed identity with read and list permissions, or set the ACL for the container to allow public access."
        httpUrl:
          type: string
          description: "The URL of the file to download. The autoStorageContainerName, storageContainerUrl and httpUrl properties are mutually exclusive and one of them must be specified. If the URL points to Azure Blob Storage, it must be readable from compute nodes. There are three ways to get such a URL for a blob in Azure storage: include a Shared Access Signature (SAS) granting read permissions on the blob, use a managed identity with read permission, or set the ACL for the blob or its container to allow public access."
        blobPrefix:
          type: string
          description: The blob prefix to use when downloading blobs from an Azure Storage container. Only the blobs whose names begin with the specified prefix will be downloaded. The property is valid only when autoStorageContainerName or storageContainerUrl is used. This prefix can be a partial filename or a subdirectory. If a prefix is not specified, all the files in the container will be downloaded.
        filePath:
          type: string
          description: The location on the Compute Node to which to download the file(s), relative to the Task's working directory. If the httpUrl property is specified, the filePath is required and describes the path which the file will be downloaded to, including the filename. Otherwise, if the autoStorageContainerName or storageContainerUrl property is specified, filePath is optional and is the directory to download the files to. In the case where filePath is used as a directory, any directory structure already associated with the input data will be retained in full and appended to the specified filePath directory. The specified relative path cannot break out of the Task's working directory (for example by using '..').
        fileMode:
          type: string
          description: The file permission mode attribute in octal format. This property applies only to files being downloaded to Linux Compute Nodes. It will be ignored if it is specified for a resourceFile which will be downloaded to a Windows Compute Node. If this property is not specified for a Linux Compute Node, then a default value of 0770 is applied to the file.
        identityReference:
          $ref: "#/components/schemas/BatchNodeIdentityReference"
          description: The reference to the user assigned identity to use to access Azure Blob Storage specified by storageContainerUrl or httpUrl.
    EnvironmentSetting:
      type: object
      description: An environment variable to be set on a Task process.
      properties:
        name:
          type: string
          description: The name of the environment variable. Required.
        value:
          type: string
          description: The value of the environment variable.
      required:
        - name
    UserIdentity:
      type: object
      description: The definition of the user identity under which the Task is run. Specify either the userName or autoUser property, but not both.
      properties:
        username:
          type: string
          description: The name of the user identity under which the Task is run. The userName and autoUser properties are mutually exclusive; you must specify one but not both.
        autoUser:
          $ref: "#/components/schemas/AutoUserSpecification"
          description: The auto user under which the Task is run. The userName and autoUser properties are mutually exclusive; you must specify one but not both.
    AutoUserSpecification:
      type: object
      description: Specifies the options for the auto user that runs an Azure Batch Task.
      properties:
        scope:
          $ref: "#/components/schemas/AutoUserScope"
          description: 'The scope for the auto user. The default value is pool. If the pool is running Windows a value of Task should be specified if stricter isolation between tasks is required. For example, if the task mutates the registry in a way which could impact other tasks. Known values are: "task" and "pool".'
        elevationLevel:
          $ref: "#/components/schemas/ElevationLevel"
          description: 'The elevation level of the auto user. The default value is nonAdmin. Known values are: "nonadmin" and "admin".'
    AutoUserScope:
      type: string
      enum:
        - task
        - pool
    ElevationLevel:
      type: string
      enum:
        - nonadmin
        - admin
    BatchApplicationPackageReference:
      type: object
      description: A reference to an Package to be deployed to Compute Nodes.
      properties:
        applicationId:
          type: string
          description: The ID of the application to deploy. When creating a pool, the package's application ID must be fully qualified (/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Batch/batchAccounts/{accountName}/applications/{applicationName}). Required.
        version:
          type: string
          description: The version of the application to deploy. If omitted, the default version is deployed. If this is omitted on a Pool, and no default version is specified for this application, the request fails with the error code InvalidApplicationPackageReferences and HTTP status code 409. If this is omitted on a Task, and no default version is specified for this application, the Task fails with a pre-processing error.
      required:
        - applicationId
    BatchTaskSchedulingPolicy:
      type: object
      description: Specifies how Tasks should be distributed across Compute Nodes.
      properties:
        jobDefaultOrder:
          $ref: "#/components/schemas/BatchJobDefaultOrder"
          description: 'The order for scheduling tasks from different jobs with the same priority. If not specified, the default is none. Known values are: "none" and "creationtime".'
        nodeFillType:
          $ref: "#/components/schemas/BatchNodeFillType"
          description: 'How Tasks are distributed across Compute Nodes in a Pool. If not specified, the default is spread. Required. Known values are: "spread" and "pack".'
      required:
        - nodeFillType
    BatchJobDefaultOrder:
      type: string
      enum:
        - none
        - creationtime
    BatchNodeFillType:
      type: string
      enum:
        - spread
        - pack
    UserAccount:
      type: object
      description: Properties used to create a user used to execute Tasks on an Azure Batch Compute Node.
      properties:
        name:
          type: string
          description: The name of the user Account. Names can contain any Unicode characters up to a maximum length of 20. Required.
        password:
          type: string
          description: The password for the user Account. Required.
        elevationLevel:
          $ref: "#/components/schemas/ElevationLevel"
          description: 'The elevation level of the user Account. The default value is nonAdmin. Known values are: "nonadmin" and "admin".'
        linuxUserConfiguration:
          $ref: "#/components/schemas/LinuxUserConfiguration"
          description: The Linux-specific user configuration for the user Account. This property is ignored if specified on a Windows Pool. If not specified, the user is created with the default options.
        windowsUserConfiguration:
          $ref: "#/components/schemas/WindowsUserConfiguration"
          description: The Windows-specific user configuration for the user Account. This property can only be specified if the user is on a Windows Pool. If not specified and on a Windows Pool, the user is created with the default options.
      required:
        - name
        - password
    LinuxUserConfiguration:
      type: object
      description: Properties used to create a user Account on a Linux Compute Node.
      properties:
        uid:
          type: integer
          description: The user ID of the user Account. The uid and gid properties must be specified together or not at all. If not specified the underlying operating system picks the uid.
        gid:
          type: integer
          description: The group ID for the user Account. The uid and gid properties must be specified together or not at all. If not specified the underlying operating system picks the gid.
        sshPrivateKey:
          type: string
          description: The SSH private key for the user Account. The private key must not be password protected. The private key is used to automatically configure asymmetric-key based authentication for SSH between Compute Nodes in a Linux Pool when the Pool's enableInterNodeCommunication property is true (it is ignored if enableInterNodeCommunication is false). It does this by placing the key pair into the user's .ssh directory. If not specified, password-less SSH is not configured between Compute Nodes (no modification of the user's .ssh directory is done).
    WindowsUserConfiguration:
      type: object
      description: Properties used to create a user Account on a Windows Compute Node.
      properties:
        loginMode:
          $ref: "#/components/schemas/LoginMode"
          description: "The login mode for the user. The default is 'batch'. Known values are: \"batch\" and \"interactive\"."
    LoginMode:
      type: string
      enum:
        - batch
        - interactive
    BatchMetadataItem:
      type: object
      description: The Batch service does not assign any meaning to this metadata; it is solely for the use of user code.
      properties:
        name:
          type: string
          description: The name of the metadata item. Required.
        value:
          type: string
          description: The value of the metadata item. Required.
      required:
        - name
        - value
    BatchPoolStatistics:
      type: object
      description: Contains utilization and resource usage statistics for the lifetime of a Pool.
      properties:
        url:
          type: string
          description: The URL for the statistics. Required.
        startTime:
          type: string
          format: date-time
          description: The start time of the time range covered by the statistics. Required.
        lastUpdateTime:
          type: string
          format: date-time
          description: The time at which the statistics were last updated. All statistics are limited to the range between startTime and lastUpdateTime. Required.
        usageStats:
          $ref: "#/components/schemas/BatchPoolUsageStatistics"
          description: Statistics related to Pool usage, such as the amount of core-time used.
        resourceStats:
          $ref: "#/components/schemas/BatchPoolResourceStatistics"
          description: Statistics related to resource consumption by Compute Nodes in the Pool.
      required:
        - url
        - startTime
        - lastUpdateTime
    BatchPoolUsageStatistics:
      type: object
      description: Statistics related to Pool usage information.
      properties:
        startTime:
          type: string
          format: date-time
          description: The start time of the time range covered by the statistics. Required.
        lastUpdateTime:
          type: string
          format: date-time
          description: The time at which the statistics were last updated. All statistics are limited to the range between startTime and lastUpdateTime. Required.
        dedicatedCoreTime:
          type: string
          description: The aggregated wall-clock time of the dedicated Compute Node cores being part of the Pool. The time duration is specified in ISO 8601 format. Required.
      required:
        - startTime
        - lastUpdateTime
        - dedicatedCoreTime
    BatchPoolResourceStatistics:
      type: object
      description: Statistics related to resource consumption by Compute Nodes in a Pool.
      properties:
        startTime:
          type: string
          format: date-time
          description: The start time of the time range covered by the statistics. Required.
        lastUpdateTime:
          type: string
          format: date-time
          description: The time at which the statistics were last updated. All statistics are limited to the range between startTime and lastUpdateTime. Required.
        avgCPUPercentage:
          type: number
          description: The average CPU usage across all Compute Nodes in the Pool (percentage per node). Required.
        avgMemoryGiB:
          type: number
          description: The average memory usage in GiB across all Compute Nodes in the Pool. Required.
        peakMemoryGiB:
          type: number
          description: The peak memory usage in GiB across all Compute Nodes in the Pool. Required.
        avgDiskGiB:
          type: number
          description: The average used disk space in GiB across all Compute Nodes in the Pool. Required.
        peakDiskGiB:
          type: number
          description: The peak used disk space in GiB across all Compute Nodes in the Pool. Required.
        diskReadIOps:
          type: integer
          description: The total number of disk read operations across all Compute Nodes in the Pool. Required.
        diskWriteIOps:
          type: integer
          description: The total number of disk write operations across all Compute Nodes in the Pool. Required.
        diskReadGiB:
          type: number
          description: The total amount of data in GiB of disk reads across all Compute Nodes in the Pool. Required.
        diskWriteGiB:
          type: number
          description: The total amount of data in GiB of disk writes across all Compute Nodes in the Pool. Required.
        networkReadGiB:
          type: number
          description: The total amount of data in GiB of network reads across all Compute Nodes in the Pool. Required.
        networkWriteGiB:
          type: number
          description: The total amount of data in GiB of network writes across all Compute Nodes in the Pool. Required.
      required:
        - startTime
        - lastUpdateTime
        - avgCPUPercentage
        - avgMemoryGiB
        - peakMemoryGiB
        - avgDiskGiB
        - peakDiskGiB
        - diskReadIOps
        - diskWriteIOps
        - diskReadGiB
        - diskWriteGiB
        - networkReadGiB
        - networkWriteGiB
    MountConfiguration:
      type: object
      description: The file system to mount on each node.
      properties:
        azureBlobFileSystemConfiguration:
          $ref: "#/components/schemas/AzureBlobFileSystemConfiguration"
          description: The Azure Storage Container to mount using blob FUSE on each node. This property is mutually exclusive with all other properties.
        nfsMountConfiguration:
          $ref: "#/components/schemas/NfsMountConfiguration"
          description: The NFS file system to mount on each node. This property is mutually exclusive with all other properties.
        cifsMountConfiguration:
          $ref: "#/components/schemas/CifsMountConfiguration"
          description: The CIFS/SMB file system to mount on each node. This property is mutually exclusive with all other properties.
        azureFileShareConfiguration:
          $ref: "#/components/schemas/AzureFileShareConfiguration"
          description: The Azure File Share to mount on each node. This property is mutually exclusive with all other properties.
    AzureBlobFileSystemConfiguration:
      type: object
      description: Information used to connect to an Azure Storage Container using Blobfuse.
      properties:
        accountName:
          type: string
          description: The Azure Storage Account name. Required.
        containerName:
          type: string
          description: The Azure Blob Storage Container name. Required.
        accountKey:
          type: string
          description: The Azure Storage Account key. This property is mutually exclusive with both sasKey and identity; exactly one must be specified.
        sasKey:
          type: string
          description: The Azure Storage SAS token. This property is mutually exclusive with both accountKey and identity; exactly one must be specified.
        blobfuseOptions:
          type: string
          description: Additional command line options to pass to the mount command. These are 'net use' options in Windows and 'mount' options in Linux.
        relativeMountPath:
          type: string
          description: The relative path on the compute node where the file system will be mounted. All file systems are mounted relative to the Batch mounts directory, accessible via the AZ_BATCH_NODE_MOUNTS_DIR environment variable. Required.
        identityReference:
          $ref: "#/components/schemas/BatchNodeIdentityReference"
          description: The reference to the user assigned identity to use to access containerName. This property is mutually exclusive with both accountKey and sasKey; exactly one must be specified.
      required:
        - accountName
        - containerName
        - relativeMountPath
    NfsMountConfiguration:
      type: object
      description: Information used to connect to an NFS file system.
      properties:
        source:
          type: string
          description: The URI of the file system to mount. Required.
        relativeMountPath:
          type: string
          description: The relative path on the compute node where the file system will be mounted. All file systems are mounted relative to the Batch mounts directory, accessible via the AZ_BATCH_NODE_MOUNTS_DIR environment variable. Required.
        mountOptions:
          type: string
          description: Additional command line options to pass to the mount command. These are 'net use' options in Windows and 'mount' options in Linux.
      required:
        - source
        - relativeMountPath
    CifsMountConfiguration:
      type: object
      description: Information used to connect to a CIFS file system.
      properties:
        username:
          type: string
          description: The user to use for authentication against the CIFS file system. Required.
        source:
          type: string
          description: The URI of the file system to mount. Required.
        relativeMountPath:
          type: string
          description: The relative path on the compute node where the file system will be mounted. All file systems are mounted relative to the Batch mounts directory, accessible via the AZ_BATCH_NODE_MOUNTS_DIR environment variable. Required.
        mountOptions:
          type: string
          description: Additional command line options to pass to the mount command. These are 'net use' options in Windows and 'mount' options in Linux.
        password:
          type: string
          description: The password to use for authentication against the CIFS file system. Required.
      required:
        - username
        - source
        - relativeMountPath
        - password
    AzureFileShareConfiguration:
      type: object
      description: Information used to connect to an Azure Fileshare.
      properties:
        accountName:
          type: string
          description: The Azure Storage account name. Required.
        accountKey:
          type: string
          description: The Azure Storage account key. Required.
        azureFileUrl:
          type: string
          description: The Azure Files URL. This is of the form 'https://{account}.file.core.windows.net/'. Required.
        relativeMountPath:
          type: string
          description: The relative path on the compute node where the file system will be mounted. All file systems are mounted relative to the Batch mounts directory, accessible via the AZ_BATCH_NODE_MOUNTS_DIR environment variable. Required.
        mountOptions:
          type: string
          description: Additional command line options to pass to the mount command. These are 'net use' options in Windows and 'mount' options in Linux.
      required:
        - accountName
        - accountKey
        - azureFileUrl
        - relativeMountPath
    BatchPoolIdentity:
      type: object
      description: The identity of the Batch pool, if configured.
      properties:
        type:
          $ref: "#/components/schemas/BatchPoolIdentityType"
          description: "The identity of the Batch pool, if configured. The list of user identities associated with the Batch pool. The user identity dictionary key references will be ARM resource ids in the form: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}'. Required. Known values are: \"UserAssigned\" and \"None\"."
        userAssignedIdentities:
          type: array
          items:
            $ref: "#/components/schemas/BatchUserAssignedIdentity"
          description: "The list of user identities associated with the Batch account. The user identity dictionary key references will be ARM resource ids in the form: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}'."
      required:
        - type
    BatchPoolIdentityType:
      type: string
      enum:
        - UserAssigned
        - None
    BatchUserAssignedIdentity:
      type: object
      description: The user assigned Identity.
      properties:
        resourceId:
          type: string
          description: The ARM resource id of the user assigned identity. Required.
        clientId:
          type: string
          description: The client id of the user assigned identity.
        principalId:
          type: string
          description: The principal id of the user assigned identity.
      required:
        - resourceId
    UpgradePolicy:
      type: object
      description: Describes an upgrade policy - automatic, manual, or rolling.
      properties:
        mode:
          $ref: "#/components/schemas/UpgradeMode"
          description: 'Specifies the mode of an upgrade to virtual machines in the scale set. Possible values are: **Manual** - You control the application of updates to virtual machines in the scale set. You do this by using the manualUpgrade action. **Automatic** - All virtual machines in the scale set are automatically updated at the same time. **Rolling** - Scale set performs updates in batches with an optional pause time in between. Required. Known values are: "automatic", "manual", and "rolling".'
        automaticOSUpgradePolicy:
          $ref: "#/components/schemas/AutomaticOsUpgradePolicy"
          description: Configuration parameters used for performing automatic OS Upgrade. The configuration parameters used for performing automatic OS upgrade.
        rollingUpgradePolicy:
          $ref: "#/components/schemas/RollingUpgradePolicy"
          description: The configuration parameters used while performing a rolling upgrade.
      required:
        - mode
    UpgradeMode:
      type: string
      enum:
        - automatic
        - manual
        - rolling
    AutomaticOsUpgradePolicy:
      type: object
      description: The configuration parameters used for performing automatic OS upgrade.
      properties:
        disableAutomaticRollback:
          type: boolean
          description: Whether OS image rollback feature should be disabled.
        enableAutomaticOSUpgrade:
          type: boolean
          description: Indicates whether OS upgrades should automatically be applied to scale set instances in a rolling fashion when a newer version of the OS image becomes available. If this is set to true for Windows based pools, `WindowsConfiguration.enableAutomaticUpdates `_ cannot be set to true.
        useRollingUpgradePolicy:
          type: boolean
          description: Indicates whether rolling upgrade policy should be used during Auto OS Upgrade. Auto OS Upgrade will fallback to the default policy if no policy is defined on the VMSS.
        osRollingUpgradeDeferral:
          type: boolean
          description: Defer OS upgrades on the TVMs if they are running tasks.
    RollingUpgradePolicy:
      type: object
      description: The configuration parameters used while performing a rolling upgrade.
      properties:
        enableCrossZoneUpgrade:
          type: boolean
          description: Allow VMSS to ignore AZ boundaries when constructing upgrade batches. Take into consideration the Update Domain and maxBatchInstancePercent to determine the batch size. This field is able to be set to true or false only when using NodePlacementConfiguration as Zonal.
        maxBatchInstancePercent:
          type: integer
          description: The maximum percent of total virtual machine instances that will be upgraded simultaneously by the rolling upgrade in one batch. As this is a maximum, unhealthy instances in previous or future batches can cause the percentage of instances in a batch to decrease to ensure higher reliability. The value of this field should be between 5 and 100, inclusive. If both maxBatchInstancePercent and maxUnhealthyInstancePercent are assigned with value, the value of maxBatchInstancePercent should not be more than maxUnhealthyInstancePercent.
        maxUnhealthyInstancePercent:
          type: integer
          description: The maximum percentage of the total virtual machine instances in the scale set that can be simultaneously unhealthy, either as a result of being upgraded, or by being found in an unhealthy state by the virtual machine health checks before the rolling upgrade aborts. This constraint will be checked prior to starting any batch. The value of this field should be between 5 and 100, inclusive. If both maxBatchInstancePercent and maxUnhealthyInstancePercent are assigned with value, the value of maxBatchInstancePercent should not be more than maxUnhealthyInstancePercent.
        maxUnhealthyUpgradedInstancePercent:
          type: integer
          description: The maximum percentage of upgraded virtual machine instances that can be found to be in an unhealthy state. This check will happen after each batch is upgraded. If this percentage is ever exceeded, the rolling update aborts. The value of this field should be between 0 and 100, inclusive.
        pauseTimeBetweenBatches:
          type: string
          description: The wait time between completing the update for all virtual machines in one batch and starting the next batch. The time duration is specified in ISO 8601 format.
        prioritizeUnhealthyInstances:
          type: boolean
          description: Upgrade all unhealthy instances in a scale set before any healthy instances.
        rollbackFailedInstancesOnPolicyBreach:
          type: boolean
          description: Rollback failed instances to previous model if the Rolling Upgrade policy is violated.
    BatchPool:
      type: object
      description: A Pool in the Azure Batch service.
      properties:
        id:
          type: string
          description: A string that uniquely identifies the Pool within the Account. The ID can contain any combination of alphanumeric characters including hyphens and underscores, and cannot contain more than 64 characters. The ID is case-preserving and case-insensitive (that is, you may not have two IDs within an Account that differ only by case). Required.
        displayName:
          type: string
          description: The display name need not be unique and can contain any Unicode characters up to a maximum length of 1024.
        url:
          type: string
          description: The URL of the Pool. Required.
        eTag:
          type: string
          description: The ETag of the Pool. This is an opaque string. You can use it to detect whether the Pool has changed between requests. In particular, you can be pass the ETag when updating a Pool to specify that your changes should take effect only if nobody else has modified the Pool in the meantime. Required.
        lastModified:
          type: string
          format: date-time
          description: The last modified time of the Pool. This is the last time at which the Pool level data, such as the targetDedicatedNodes or enableAutoscale settings, changed. It does not factor in node-level changes such as a Compute Node changing state. Required.
        creationTime:
          type: string
          format: date-time
          description: The creation time of the Pool. Required.
        state:
          $ref: "#/components/schemas/BatchPoolState"
          description: 'The current state of the Pool. Required. Known values are: "active" and "deleting".'
        stateTransitionTime:
          type: string
          format: date-time
          description: The time at which the Pool entered its current state. Required.
        allocationState:
          $ref: "#/components/schemas/AllocationState"
          description: 'Whether the Pool is resizing. Known values are: "steady", "resizing", and "stopping".'
        allocationStateTransitionTime:
          type: string
          format: date-time
          description: The time at which the Pool entered its current allocation state.
        vmSize:
          type: string
          description: The size of virtual machines in the Pool. All virtual machines in a Pool are the same size. For information about available sizes of virtual machines in Pools, see Choose a VM size for Compute Nodes in an Azure Batch Pool (`https://learn.microsoft.com/azure/batch/batch-pool-vm-sizes `_). Required.
        virtualMachineConfiguration:
          $ref: "#/components/schemas/VirtualMachineConfiguration"
          description: The virtual machine configuration for the Pool. This property must be specified.
        resizeTimeout:
          type: string
          description: The timeout for allocation of Compute Nodes to the Pool. This is the timeout for the most recent resize operation. (The initial sizing when the Pool is created counts as a resize.) The default value is 15 minutes. The time duration is specified in ISO 8601 format.
        resizeErrors:
          type: array
          items:
            $ref: "#/components/schemas/ResizeError"
          description: A list of errors encountered while performing the last resize on the Pool. This property is set only if one or more errors occurred during the last Pool resize, and only when the Pool allocationState is Steady.
        currentDedicatedNodes:
          type: integer
          description: The number of dedicated Compute Nodes currently in the Pool. Required.
        currentLowPriorityNodes:
          type: integer
          description: The number of Spot/Low-priority Compute Nodes currently in the Pool. Spot/Low-priority Compute Nodes which have been preempted are included in this count. Required.
        targetDedicatedNodes:
          type: integer
          description: The desired number of dedicated Compute Nodes in the Pool.
        targetLowPriorityNodes:
          type: integer
          description: The desired number of Spot/Low-priority Compute Nodes in the Pool.
        enableAutoScale:
          type: boolean
          description: Whether the Pool size should automatically adjust over time. If false, at least one of targetDedicatedNodes and targetLowPriorityNodes must be specified. If true, the autoScaleFormula property is required and the Pool automatically resizes according to the formula. The default value is false.
        autoScaleFormula:
          type: string
          description: A formula for the desired number of Compute Nodes in the Pool. This property is set only if the Pool automatically scales, i.e. enableAutoScale is true.
        autoScaleEvaluationInterval:
          type: string
          description: The time interval at which to automatically adjust the Pool size according to the autoscale formula. This property is set only if the Pool automatically scales, i.e. enableAutoScale is true. The time duration is specified in ISO 8601 format.
        autoScaleRun:
          $ref: "#/components/schemas/AutoScaleRun"
          description: The results and errors from the last execution of the autoscale formula. This property is set only if the Pool automatically scales, i.e. enableAutoScale is true.
        enableInterNodeCommunication:
          type: boolean
          description: Whether the Pool permits direct communication between Compute Nodes. Enabling inter-node communication limits the maximum size of the Pool due to deployment restrictions on the Compute Nodes of the Pool. This may result in the Pool not reaching its desired size. The default value is false.
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: The network configuration for the Pool.
        startTask:
          $ref: "#/components/schemas/BatchStartTask"
          description: A Task specified to run on each Compute Node as it joins the Pool.
        applicationPackageReferences:
          type: array
          items:
            $ref: "#/components/schemas/BatchApplicationPackageReference"
          description: The list of Packages to be installed on each Compute Node in the Pool. Changes to Package references affect all new Nodes joining the Pool, but do not affect Compute Nodes that are already in the Pool until they are rebooted or reimaged. There is a maximum of 10 Package references on any given Pool.
        taskSlotsPerNode:
          type: integer
          description: The number of task slots that can be used to run concurrent tasks on a single compute node in the pool. The default value is 1. The maximum value is the smaller of 4 times the number of cores of the vmSize of the pool or 256.
        taskSchedulingPolicy:
          $ref: "#/components/schemas/BatchTaskSchedulingPolicy"
          description: How Tasks are distributed across Compute Nodes in a Pool. If not specified, the default is spread.
        userAccounts:
          type: array
          items:
            $ref: "#/components/schemas/UserAccount"
          description: The list of user Accounts to be created on each Compute Node in the Pool.
        metadata:
          type: array
          items:
            $ref: "#/components/schemas/BatchMetadataItem"
          description: A list of name-value pairs associated with the Pool as metadata.
        stats:
          $ref: "#/components/schemas/BatchPoolStatistics"
          description: Utilization and resource usage statistics for the entire lifetime of the Pool. This property is populated only if the BatchPool was retrieved with an expand clause including the 'stats' attribute; otherwise it is null. The statistics may not be immediately available. The Batch service performs periodic roll-up of statistics. The typical delay is about 30 minutes.
        mountConfiguration:
          type: array
          items:
            $ref: "#/components/schemas/MountConfiguration"
          description: Mount storage using specified file system for the entire lifetime of the pool. Mount the storage using Azure fileshare, NFS, CIFS or Blobfuse based file system.
        identity:
          $ref: "#/components/schemas/BatchPoolIdentity"
          description: "The identity of the Batch pool, if configured. The list of user identities associated with the Batch pool. The user identity dictionary key references will be ARM resource ids in the form: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}'."
        upgradePolicy:
          $ref: "#/components/schemas/UpgradePolicy"
          description: The upgrade policy for the Pool. Describes an upgrade policy - automatic, manual, or rolling.
    PagedBatchPool:
      type: object
      properties:
