      properties:
        taskUrl:
          type: string
          description: The URL of the Task.
        jobId:
          type: string
          description: The ID of the Job to which the Task belongs.
        taskId:
          type: string
          description: The ID of the Task.
        subtaskId:
          type: integer
          description: The ID of the subtask if the Task is a multi-instance Task.
        taskState:
