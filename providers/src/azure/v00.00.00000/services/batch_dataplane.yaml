    BatchStartTaskInfo:
      type: object
      description: Information about a StartTask running on a Compute Node.
      properties:
        state:
          $ref: "#/components/schemas/BatchStartTaskState"
          description: 'The state of the StartTask on the Compute Node. Required. Known values are: "running" and "completed".'
        startTime:
          type: string
          format: date-time
          description: The time at which the StartTask started running. This value is reset every time the Task is restarted or retried (that is, this is the most recent time at which the StartTask started running). Required.
        endTime:
          type: string
          format: date-time
          description: The time at which the StartTask stopped running. This is the end time of the most recent run of the StartTask, if that run has completed (even if that run failed and a retry is pending). This element is not present if the StartTask is currently running.
        exitCode:
          type: integer
          description: The exit code of the program specified on the StartTask command line. This property is set only if the StartTask is in the completed state. In general, the exit code for a process reflects the specific convention implemented by the application developer for that process. If you use the exit code value to make decisions in your code, be sure that you know the exit code convention used by the application process. However, if the Batch service terminates the StartTask (due to timeout, or user termination via the API) you may see an operating system-defined exit code.
        containerInfo:
          $ref: "#/components/schemas/BatchTaskContainerExecutionInfo"
          description: Information about the container under which the Task is executing. This property is set only if the Task runs in a container context.
        failureInfo:
          $ref: "#/components/schemas/BatchTaskFailureInfo"
          description: Information describing the Task failure, if any. This property is set only if the Task is in the completed state and encountered a failure.
        retryCount:
          type: integer
          description: The number of times the Task has been retried by the Batch service. Task application failures (non-zero exit code) are retried, pre-processing errors (the Task could not be run) and file upload errors are not retried. The Batch service will retry the Task up to the limit specified by the constraints. Required.
        lastRetryTime:
          type: string
          format: date-time
          description: The most recent time at which a retry of the Task started running. This element is present only if the Task was retried (i.e. retryCount is nonzero). If present, this is typically the same as startTime, but may be different if the Task has been restarted for reasons other than retry; for example, if the Compute Node was rebooted during a retry, then the startTime is updated but the lastRetryTime is not.
        result:
          $ref: "#/components/schemas/BatchTaskExecutionResult"
          description: "The result of the Task execution. If the value is 'failed', then the details of the failure can be found in the failureInfo property. Known values are: \"success\" and \"failure\"."
      required:
        - state
        - startTime
        - retryCount
    BatchStartTaskState:
      type: string
      enum:
        - running
        - completed
    BatchNodeError:
      type: object
      description: An error encountered by a Compute Node.
      properties:
        code:
          type: string
          description: An identifier for the Compute Node error. Codes are invariant and are intended to be consumed programmatically.
        message:
          type: string
          description: A message describing the Compute Node error, intended to be suitable for display in a user interface.
        errorDetails:
          type: array
          items:
            $ref: "#/components/schemas/NameValuePair"
          description: The list of additional error details related to the Compute Node error.
    BatchNodeEndpointConfiguration:
      type: object
      description: The endpoint configuration for the Compute Node.
      properties:
        inboundEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/InboundEndpoint"
          description: The list of inbound endpoints that are accessible on the Compute Node. Required.
      required:
        - inboundEndpoints
    InboundEndpoint:
      type: object
      description: An inbound endpoint on a Compute Node.
      properties:
        name:
          type: string
          description: The name of the endpoint. Required.
        protocol:
          $ref: "#/components/schemas/InboundEndpointProtocol"
          description: 'The protocol of the endpoint. Required. Known values are: "tcp" and "udp".'
        publicIPAddress:
          type: string
          description: The public IP address of the Compute Node. Required.
        publicFQDN:
          type: string
          description: The public fully qualified domain name for the Compute Node. Required.
        frontendPort:
          type: integer
          description: The public port number of the endpoint. Required.
        backendPort:
          type: integer
          description: The backend port number of the endpoint. Required.
      required:
        - name
        - protocol
        - publicIPAddress
        - publicFQDN
        - frontendPort
        - backendPort
    BatchNodeAgentInfo:
      type: object
      description: The Batch Compute Node agent is a program that runs on each Compute Node in the Pool and provides Batch capability on the Compute Node.
      properties:
        version:
          type: string
          description: The version of the Batch Compute Node agent running on the Compute Node. This version number can be checked against the Compute Node agent release notes located at `https://github.com/Azure/Batch/blob/master/changelogs/nodeagent/CHANGELOG.md `_. Required.
        lastUpdateTime:
          type: string
          format: date-time
          description: The time when the Compute Node agent was updated on the Compute Node. This is the most recent time that the Compute Node agent was updated to a new version. Required.
      required:
        - version
        - lastUpdateTime
    VirtualMachineInfo:
      type: object
      description: Info about the current state of the virtual machine.
      properties:
        imageReference:
          $ref: "#/components/schemas/BatchVmImageReference"
          description: The reference to the Azure Virtual Machine's Marketplace Image.
        scaleSetVmResourceId:
          type: string
          description: The resource ID of the Compute Node's current Virtual Machine Scale Set VM. Only defined if the Batch Account was created with its poolAllocationMode property set to 'UserSubscription'.
    BatchNode:
      type: object
      description: A Compute Node in the Batch service.
      properties:
        id:
          type: string
          description: The ID of the Compute Node. Every Compute Node that is added to a Pool is assigned a unique ID. Whenever a Compute Node is removed from a Pool, all of its local files are deleted, and the ID is reclaimed and could be reused for new Compute Nodes. Required.
        url:
          type: string
          description: The URL of the Compute Node. Required.
        state:
          $ref: "#/components/schemas/BatchNodeState"
          description: 'The current state of the Compute Node. Required. Known values are: "idle", "rebooting", "reimaging", "running", "unusable", "creating", "starting", "waitingforstarttask", "starttaskfailed", "unknown", "leavingpool", "offline", "preempted", "upgradingos", "deallocated", and "deallocating".'
        schedulingState:
          $ref: "#/components/schemas/SchedulingState"
          description: 'Whether the Compute Node is available for Task scheduling. Known values are: "enabled" and "disabled".'
        stateTransitionTime:
          type: string
          format: date-time
          description: The time at which the Compute Node entered its current state. Required.
        lastBootTime:
          type: string
          format: date-time
          description: The last time at which the Compute Node was started. This property may not be present if the Compute Node state is unusable. Required.
        allocationTime:
          type: string
          format: date-time
          description: The time at which this Compute Node was allocated to the Pool. This is the time when the Compute Node was initially allocated and doesn't change once set. It is not updated when the Compute Node is service healed or preempted. Required.
        ipAddress:
          type: string
          description: The IP address that other Nodes can use to communicate with this Compute Node. Every Compute Node that is added to a Pool is assigned a unique IP address. Whenever a Compute Node is removed from a Pool, all of its local files are deleted, and the IP address is reclaimed and could be reused for new Compute Nodes. Required.
        ipv6Address:
          type: string
          description: The IPv6 address that other Nodes can use to communicate with this Compute Node. Every Compute Node that is added to a Pool is assigned a unique IP address. Whenever a Compute Node is removed from a Pool, all of its local files are deleted, and the IP address is reclaimed and could be reused for new Compute Nodes. This property will not be present if the Pool is not configured for IPv6. Required.
        affinityId:
          type: string
          description: An identifier which can be passed when adding a Task to request that the Task be scheduled on this Compute Node. Note that this is just a soft affinity. If the target Compute Node is busy or unavailable at the time the Task is scheduled, then the Task will be scheduled elsewhere. Required.
        vmSize:
          type: string
          description: The size of the virtual machine hosting the Compute Node. For information about available sizes of virtual machines in Pools, see Choose a VM size for Compute Nodes in an Azure Batch Pool (`https://learn.microsoft.com/azure/batch/batch-pool-vm-sizes `_). Required.
        totalTasksRun:
          type: integer
          description: The total number of Job Tasks completed on the Compute Node. This includes Job Manager Tasks and normal Tasks, but not Job Preparation, Job Release or Start Tasks. Required.
        runningTasksCount:
          type: integer
          description: The total number of currently running Job Tasks on the Compute Node. This includes Job Manager Tasks and normal Tasks, but not Job Preparation, Job Release or Start Tasks.
        runningTaskSlotsCount:
          type: integer
          description: The total number of scheduling slots used by currently running Job Tasks on the Compute Node. This includes Job Manager Tasks and normal Tasks, but not Job Preparation, Job Release or Start Tasks.
        totalTasksSucceeded:
          type: integer
          description: The total number of Job Tasks which completed successfully (with exitCode 0) on the Compute Node. This includes Job Manager Tasks and normal Tasks, but not Job Preparation, Job Release or Start Tasks.
        recentTasks:
          type: array
          items:
            $ref: "#/components/schemas/BatchTaskInfo"
          description: A list of Tasks whose state has recently changed. This property is present only if at least one Task has run on this Compute Node since it was assigned to the Pool.
        startTask:
          $ref: "#/components/schemas/BatchStartTask"
          description: The Task specified to run on the Compute Node as it joins the Pool.
        startTaskInfo:
          $ref: "#/components/schemas/BatchStartTaskInfo"
          description: Runtime information about the execution of the StartTask on the Compute Node.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/BatchNodeError"
          description: The list of errors that are currently being encountered by the Compute Node.
        isDedicated:
          type: boolean
          description: Whether this Compute Node is a dedicated Compute Node. If false, the Compute Node is a Spot/Low-priority Compute Node.
        endpointConfiguration:
          $ref: "#/components/schemas/BatchNodeEndpointConfiguration"
          description: The endpoint configuration for the Compute Node.
        nodeAgentInfo:
          $ref: "#/components/schemas/BatchNodeAgentInfo"
          description: Information about the Compute Node agent version and the time the Compute Node upgraded to a new version.
        virtualMachineInfo:
          $ref: "#/components/schemas/VirtualMachineInfo"
          description: Info about the current state of the virtual machine. Required.
    PagedBatchNode:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchNode"
        nextLink:
          type: string
    VMExtensionInstanceView:
      type: object
      description: The vm extension instance view.
      properties:
        name:
          type: string
          description: The name of the vm extension instance view.
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/InstanceViewStatus"
          description: The resource status information.
        subStatuses:
          type: array
          items:
            $ref: "#/components/schemas/InstanceViewStatus"
          description: The resource status information.
    InstanceViewStatus:
      type: object
      description: The instance view status.
      properties:
        code:
          type: string
          description: The status code.
        displayStatus:
          type: string
          description: The localized label for the status.
        level:
          $ref: "#/components/schemas/StatusLevelTypes"
          description: 'Level code. Known values are: "Error", "Info", and "Warning".'
        message:
          type: string
          description: The detailed status message.
        time:
          type: string
          format: date-time
          description: The time of the status.
    StatusLevelTypes:
      type: string
      enum:
        - Error
        - Info
        - Warning
    BatchNodeVMExtension:
      type: object
      description: The configuration for virtual machine extension instance view.
      properties:
        provisioningState:
          type: string
          description: The provisioning state of the virtual machine extension.
        vmExtension:
          $ref: "#/components/schemas/VMExtension"
          description: The virtual machine extension.
        instanceView:
          $ref: "#/components/schemas/VMExtensionInstanceView"
          description: The vm extension instance view.
    PagedBatchNodeVMExtension:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchNodeVMExtension"
        nextLink:
          type: string
    BatchTaskCounts:
      type: object
      description: The Task counts for a Job.
      properties:
        active:
          type: integer
          description: The number of Tasks in the active state. Required.
        running:
          type: integer
          description: The number of Tasks in the running or preparing state. Required.
        completed:
          type: integer
          description: The number of Tasks in the completed state. Required.
        succeeded:
          type: integer
          description: The number of Tasks which succeeded. A Task succeeds if its result (found in the executionInfo property) is 'success'. Required.
        failed:
          type: integer
          description: The number of Tasks which failed. A Task fails if its result (found in the executionInfo property) is 'failure'. Required.
      required:
        - active
        - running
        - completed
        - succeeded
        - failed
    BatchTaskSlotCounts:
      type: object
      description: The TaskSlot counts for a Job.
      properties:
        active:
          type: integer
          description: The number of TaskSlots for active Tasks. Required.
        running:
          type: integer
          description: The number of TaskSlots for running Tasks. Required.
        completed:
          type: integer
          description: The number of TaskSlots for completed Tasks. Required.
        succeeded:
          type: integer
          description: The number of TaskSlots for succeeded Tasks. Required.
        failed:
          type: integer
          description: The number of TaskSlots for failed Tasks. Required.
      required:
        - active
        - running
        - completed
        - succeeded
        - failed
    BatchTaskCountsResult:
      type: object
      description: The Task and TaskSlot counts for a Job.
      properties:
        taskCounts:
          $ref: "#/components/schemas/BatchTaskCounts"
          description: The number of Tasks per state. Required.
        taskSlotCounts:
          $ref: "#/components/schemas/BatchTaskSlotCounts"
          description: The number of TaskSlots required by Tasks per state. Required.
      required:
        - taskCounts
        - taskSlotCounts
    BatchNodeRemoteLoginSettings:
      type: object
      description: The remote login settings for a Compute Node.
      properties:
        ipv6RemoteLoginIPAddress:
          type: string
          description: The IPv6 address used for remote login to the Compute Node.
        ipv6RemoteLoginPort:
          type: integer
          description: The port used for remote login to the Compute Node.
        remoteLoginIPAddress:
          type: string
          description: The IP address used for remote login to the Compute Node. Required.
        remoteLoginPort:
          type: integer
          description: The port used for remote login to the Compute Node. Required.
      required:
        - remoteLoginIPAddress
        - remoteLoginPort
    BatchTaskCreateOptions:
      type: object
      description: Parameters for creating an Azure Batch Task.
      properties:
        id:
          type: string
          description: A string that uniquely identifies the Task within the Job. The ID can contain any combination of alphanumeric characters including hyphens and underscores, and cannot contain more than 64 characters. The ID is case-preserving and case-insensitive (that is, you may not have two IDs within a Job that differ only by case). Required.
        displayName:
          type: string
          description: A display name for the Task. The display name need not be unique and can contain any Unicode characters up to a maximum length of 1024.
        exitConditions:
          $ref: "#/components/schemas/ExitConditions"
          description: How the Batch service should respond when the Task completes.
        commandLine:
          type: string
          description: The command line of the Task. For multi-instance Tasks, the command line is executed as the primary Task, after the primary Task and all subtasks have finished executing the coordination command line. The command line does not run under a shell, and therefore cannot take advantage of shell features such as environment variable expansion. If you want to take advantage of such features, you should invoke the shell in the command line, for example using "cmd /c MyCommand" in Windows or "/bin/sh -c MyCommand" in Linux. If the command line refers to file paths, it should use a relative path (relative to the Task working directory), or use the Batch provided environment variable (`https://learn.microsoft.com/azure/batch/batch-compute-node-environment-variables `_). Required.
        containerSettings:
          $ref: "#/components/schemas/BatchTaskContainerSettings"
          description: The settings for the container under which the Task runs. If the Pool that will run this Task has containerConfiguration set, this must be set as well. If the Pool that will run this Task doesn't have containerConfiguration set, this must not be set. When this is specified, all directories recursively below the AZ_BATCH_NODE_ROOT_DIR (the root of Azure Batch directories on the node) are mapped into the container, all Task environment variables are mapped into the container, and the Task command line is executed in the container. Files produced in the container outside of AZ_BATCH_NODE_ROOT_DIR might not be reflected to the host disk, meaning that Batch file APIs will not be able to access those files.
        resourceFiles:
          type: array
          items:
            $ref: "#/components/schemas/ResourceFile"
          description: A list of files that the Batch service will download to the Compute Node before running the command line. For multi-instance Tasks, the resource files will only be downloaded to the Compute Node on which the primary Task is executed. There is a maximum size for the list of resource files. When the max size is exceeded, the request will fail and the response error code will be RequestEntityTooLarge. If this occurs, the collection of ResourceFiles must be reduced in size. This can be achieved using .zip files, Application Packages, or Docker Containers.
        outputFiles:
          type: array
          items:
            $ref: "#/components/schemas/OutputFile"
          description: A list of files that the Batch service will upload from the Compute Node after running the command line. For multi-instance Tasks, the files will only be uploaded from the Compute Node on which the primary Task is executed.
        environmentSettings:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentSetting"
          description: A list of environment variable settings for the Task.
        affinityInfo:
          $ref: "#/components/schemas/BatchAffinityInfo"
          description: A locality hint that can be used by the Batch service to select a Compute Node on which to start the new Task.
        constraints:
          $ref: "#/components/schemas/BatchTaskConstraints"
          description: The execution constraints that apply to this Task. If you do not specify constraints, the maxTaskRetryCount is the maxTaskRetryCount specified for the Job, the maxWallClockTime is infinite, and the retentionTime is 7 days.
        requiredSlots:
          type: integer
          description: The number of scheduling slots that the Task required to run. The default is 1. A Task can only be scheduled to run on a compute node if the node has enough free scheduling slots available. For multi-instance Tasks, this must be 1.
        userIdentity:
          $ref: "#/components/schemas/UserIdentity"
          description: The user identity under which the Task runs. If omitted, the Task runs as a non-administrative user unique to the Task.
        multiInstanceSettings:
          $ref: "#/components/schemas/MultiInstanceSettings"
          description: An object that indicates that the Task is a multi-instance Task, and contains information about how to run the multi-instance Task.
        dependsOn:
          $ref: "#/components/schemas/BatchTaskDependencies"
          description: The Tasks that this Task depends on. This Task will not be scheduled until all Tasks that it depends on have completed successfully. If any of those Tasks fail and exhaust their retry counts, this Task will never be scheduled. If the Job does not have usesTaskDependencies set to true, and this element is present, the request fails with error code TaskDependenciesNotSpecifiedOnJob.
        applicationPackageReferences:
          type: array
          items:
            $ref: "#/components/schemas/BatchApplicationPackageReference"
          description: A list of Packages that the Batch service will deploy to the Compute Node before running the command line. Application packages are downloaded and deployed to a shared directory, not the Task working directory. Therefore, if a referenced package is already on the Node, and is up to date, then it is not re-downloaded; the existing copy on the Compute Node is used. If a referenced Package cannot be installed, for example because the package has been deleted or because download failed, the Task fails.
      required:
        - id
        - commandLine
    BatchCreateTaskCollectionResult:
      type: object
      description: The result of creating a collection of Tasks to a Job.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/BatchTaskCreateResult"
          description: The results of the create Task collection operation.
    BatchTaskCreateResult:
      type: object
      description: Result for a single Task created as part of an add Task collection operation.
      properties:
        status:
          $ref: "#/components/schemas/BatchTaskAddStatus"
          description: 'The status of the add Task request. Required. Known values are: "success", "clienterror", and "servererror".'
        taskId:
          type: string
          description: The ID of the Task for which this is the result. Required.
        eTag:
          type: string
          description: The ETag of the Task, if the Task was successfully added. You can use this to detect whether the Task has changed between requests. In particular, you can be pass the ETag with an Update Task request to specify that your changes should take effect only if nobody else has modified the Job in the meantime.
        lastModified:
          type: string
          format: date-time
          description: The last modified time of the Task.
        location:
          type: string
          description: The URL of the Task, if the Task was successfully added.
        error:
          $ref: "#/components/schemas/BatchError"
          description: The error encountered while attempting to add the Task.
      required:
        - status
        - taskId
    BatchTaskAddStatus:
      type: string
      enum:
        - success
        - clienterror
        - servererror
    BatchError:
      type: object
      description: An error response received from the Azure Batch service.
      properties:
        code:
          type: string
          description: An identifier for the error. Codes are invariant and are intended to be consumed programmatically.
        message:
          $ref: "#/components/schemas/BatchErrorMessage"
          description: A message describing the error, intended to be suitable for display in a user interface.
        values:
          type: array
          items:
            $ref: "#/components/schemas/BatchErrorDetail"
          description: A collection of key-value pairs containing additional details about the error.
    BatchErrorMessage:
      type: object
      description: An error message received in an Azure Batch error response.
      properties:
        lang:
          type: string
          description: The language code of the error message.
        value:
          type: string
          description: The text of the message.
    BatchErrorDetail:
      type: object
      description: An item of additional information included in an Azure Batch error response.
      properties:
        key:
          type: string
          description: An identifier specifying the meaning of the Value property.
        value:
          type: string
          description: The additional information included with the error response.
    BatchNodeDisableSchedulingOption:
      type: string
      enum:
        - requeue
        - terminate
        - taskcompletion
    UploadBatchServiceLogsResult:
      type: object
      description: The result of uploading Batch service log files from a specific Compute Node.
      properties:
        virtualDirectoryName:
          type: string
          description: The virtual directory within Azure Blob Storage container to which the Batch Service log file(s) will be uploaded. The virtual directory name is part of the blob name for each log file uploaded, and it is built based poolId, nodeId and a unique identifier. Required.
        numberOfFilesUploaded:
          type: integer
          description: The number of log files which will be uploaded. Required.
      required:
        - virtualDirectoryName
        - numberOfFilesUploaded
