        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signingKey:
                  $ref: "#/components/schemas/SigningKey"
                  description: 'The Maps account key to use for signing. Picking `primaryKey` or `secondaryKey` will use the Maps account Shared Keys, and using `managedIdentity` will use the auto-renewed private key to sign the SAS. Required. Known values are: "primaryKey", "secondaryKey", and "managedIdentity".'
                principalId:
                  type: string
                  description: The principal Id also known as the object Id of a User Assigned Managed Identity currently assigned to the Maps Account. To assign a Managed Identity of the account, use operation Create or Update an assign a User Assigned Identity resource Id. Required.
                regions:
                  type: array
                  items:
                    type: string
                  description: 'Optional, allows control of which region locations are permitted access to Azure Maps REST APIs with the SAS token. Example: "eastus", "westus2". Omitting this parameter will allow all region locations to be accessible.'
