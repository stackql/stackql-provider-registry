openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Key Vault Management Client
  description: The Azure management API provides a RESTful set of web services that interact with Azure Key Vault.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-02-01-stackql-generated
  x-serviceAlias: keyvault
  x-sdkPackage: azure-mgmt-keyvault
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
