        - Application
        - ManagedIdentity
        - Key
    KeyProperties:
      type: object
      description: The properties of the key.
      properties:
        attributes:
          $ref: "#/components/schemas/KeyAttributes"
          description: The attributes of the key.
        kty:
          $ref: "#/components/schemas/JsonWebKeyType"
          description: 'The type of the key. For valid values, see JsonWebKeyType. Known values are: "EC", "EC-HSM", "RSA", and "RSA-HSM".'
        keyOps:
          type: array
          items:
            $ref: "#/components/schemas/JsonWebKeyOperation"
          description: ":vartype key_ops: list[str or ~azure.mgmt.keyvault.models.JsonWebKeyOperation]"
        keySize:
          type: integer
          description: "The key size in bits. For example: 2048, 3072, or 4096 for RSA. Default for RSA and RSA-HSM keys is 2048. Exception made for bring your own key (BYOK), key exchange keys default to 4096."
        curveName:
          $ref: "#/components/schemas/JsonWebKeyCurveName"
          description: 'The elliptic curve name. For valid values, see JsonWebKeyCurveName. Default for EC and EC-HSM keys is P-256. Known values are: "P-256", "P-384", "P-521", and "P-256K".'
        keyUri:
          type: string
          description: The URI to retrieve the current version of the key.
        keyUriWithVersion:
          type: string
          description: The URI to retrieve the specific version of the key.
        rotationPolicy:
          $ref: "#/components/schemas/RotationPolicy"
          description: Key rotation policy in response. It will be used for both output and input. Omitted if empty.
        release_policy:
          $ref: "#/components/schemas/KeyReleasePolicy"
