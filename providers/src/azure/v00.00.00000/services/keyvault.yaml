            $ref: "#/components/schemas/CertificatePermissions"
          description: Permissions to certificates.
        storage:
          type: array
          items:
            $ref: "#/components/schemas/StoragePermissions"
          description: Permissions to storage accounts.
    KeyPermissions:
      type: string
