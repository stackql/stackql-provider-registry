openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Iot Hub Client
  description: Use this API to manage the IoT hubs in your Azure subscription.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-03-01-preview-stackql-generated
  x-serviceAlias: iothub
  x-sdkPackage: azure-mgmt-iothub
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    CertificateProperties:
      type: object
      description: The description of an X509 CA Certificate.
      properties:
        subject:
          type: string
          description: The certificate's subject name.
        expiry:
          type: string
          format: date-time
          description: The certificate's expiration date and time.
        thumbprint:
          type: string
          description: The certificate's thumbprint.
        isVerified:
          type: boolean
          description: Determines whether certificate has been verified.
        created:
          type: string
          format: date-time
          description: The certificate's create date and time.
        updated:
          type: string
          format: date-time
          description: The certificate's last update date and time.
        certificate:
          type: string
          description: The certificate content.
        policyResourceId:
          type: string
          description: The reference to policy stored in Azure Device Registry (ADR).
    CertificateDescriptionFlattened:
      type: object
      description: Flattened view of CertificateDescription ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        etag:
          type: string
          description: The entity tag.
        subject:
          type: string
          description: The certificate's subject name.
        expiry:
          type: string
          format: date-time
          description: The certificate's expiration date and time.
        thumbprint:
          type: string
          description: The certificate's thumbprint.
        isVerified:
          type: boolean
          description: Determines whether certificate has been verified.
        created:
          type: string
          format: date-time
          description: The certificate's create date and time.
        updated:
          type: string
          format: date-time
          description: The certificate's last update date and time.
        certificate:
          type: string
          description: The certificate content.
        policyResourceId:
          type: string
          description: The reference to policy stored in Azure Device Registry (ADR).
    CertificateDescription:
      type: object
      description: The X509 Certificate.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/CertificateProperties"
          description: The description of an X509 CA Certificate.
        etag:
          type: string
          description: The entity tag.
    CertificateListDescription:
      type: object
      description: The JSON-serialized array of Certificate objects.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/CertificateDescription"
          description: The array of Certificate objects.
    CertificateWithNonceDescription:
      type: object
      description: The X509 Certificate.
      properties:
        properties:
          $ref: "#/components/schemas/CertificatePropertiesWithNonce"
          description: The description of an X509 CA Certificate including the challenge nonce issued for the Proof-Of-Possession flow.
        id:
          type: string
          description: The resource identifier.
        name:
          type: string
          description: The name of the certificate.
        etag:
          type: string
          description: The entity tag.
        type:
          type: string
          description: The resource type.
    CertificatePropertiesWithNonce:
      type: object
      description: The description of an X509 CA Certificate including the challenge nonce issued for the Proof-Of-Possession flow.
      properties:
        subject:
          type: string
          description: The certificate's subject name.
        expiry:
          type: string
          format: date-time
          description: The certificate's expiration date and time.
        thumbprint:
          type: string
          description: The certificate's thumbprint.
        isVerified:
          type: boolean
          description: Determines whether certificate has been verified.
        created:
          type: string
          format: date-time
          description: The certificate's create date and time.
        updated:
          type: string
          format: date-time
          description: The certificate's last update date and time.
        verificationCode:
          type: string
          description: The certificate's verification code that will be used for proof of possession.
        certificate:
          type: string
          description: The certificate content.
        policyResourceId:
          type: string
          description: The reference to policy stored in Azure Device Registry (ADR).
    IotHubProperties:
      type: object
      description: The properties of an IoT hub.
      properties:
        authorizationPolicies:
          type: array
          items:
            $ref: "#/components/schemas/SharedAccessSignatureAuthorizationRule"
          description: The shared access policies you can use to secure a connection to the IoT hub.
        disableLocalAuth:
          type: boolean
          description: If true, SAS tokens with Iot hub scoped SAS keys cannot be used for authentication.
        disableDeviceSAS:
          type: boolean
          description: If true, all device(including Edge devices but excluding modules) scoped SAS keys cannot be used for authentication.
        disableModuleSAS:
          type: boolean
          description: If true, all module scoped SAS keys cannot be used for authentication.
        restrictOutboundNetworkAccess:
          type: boolean
          description: If true, egress from IotHub will be restricted to only the allowed FQDNs that are configured via allowedFqdnList.
        allowedFqdnList:
          type: array
          items:
            type: string
          description: List of allowed FQDNs(Fully Qualified Domain Name) for egress from Iot Hub.
        publicNetworkAccess:
          $ref: "#/components/schemas/PublicNetworkAccess"
          description: 'Whether requests from Public Network are allowed. Known values are: "Enabled" and "Disabled".'
        ipFilterRules:
          type: array
          items:
            $ref: "#/components/schemas/IpFilterRule"
          description: The IP filter rules.
        networkRuleSets:
          $ref: "#/components/schemas/NetworkRuleSetProperties"
          description: Network Rule Set Properties of IotHub.
        minTlsVersion:
          type: string
          description: Specifies the minimum TLS version to support for this hub. Can be set to "1.2" to have clients that use a TLS version below 1.2 to be rejected.
        privateEndpointConnections:
          type: array
          items:
            $ref: "#/components/schemas/PrivateEndpointConnection"
          description: Private endpoint connections created on this IotHub.
        provisioningState:
          type: string
          description: The provisioning state.
        state:
          type: string
          description: The hub state.
        hostName:
          type: string
          description: The name of the host.
        deviceHostName:
          type: string
          description: The name of the device host. Supports secure connections over TLS 1.3.
        serviceHostName:
          type: string
          description: The name of the service host. Supports secure connections over TLS 1.3.
        eventHubEndpoints:
          type: object
          properties: {}
          description: The Event Hub-compatible endpoint properties. The only possible keys to this dictionary is events. This key has to be present in the dictionary while making create or update calls for the IoT hub.
        routing:
          $ref: "#/components/schemas/RoutingProperties"
          description: "The routing related properties of the IoT hub. See: `https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-messaging `_."
        storageEndpoints:
          type: object
          properties: {}
          description: The list of Azure Storage endpoints where you can upload files. Currently you can configure only one Azure Storage account and that MUST have its key as $default. Specifying more than one storage account causes an error to be thrown. Not specifying a value for this property when the enableFileUploadNotifications property is set to True, causes an error to be thrown.
        messagingEndpoints:
          type: object
          properties: {}
          description: The messaging endpoint properties for the file upload notification queue.
        enableFileUploadNotifications:
          type: boolean
          description: If True, file upload notifications are enabled.
        cloudToDevice:
          $ref: "#/components/schemas/CloudToDeviceProperties"
          description: The IoT hub cloud-to-device messaging properties.
        comments:
          type: string
          description: IoT hub comments.
        deviceStreams:
          $ref: "#/components/schemas/IotHubPropertiesDeviceStreams"
          description: The device streams properties of iothub.
        features:
          $ref: "#/components/schemas/Capabilities"
          description: 'The capabilities and features enabled for the IoT hub. Known values are: "None" and "DeviceManagement".'
        encryption:
          $ref: "#/components/schemas/EncryptionPropertiesDescription"
          description: The encryption properties for the IoT hub.
        locations:
          type: array
          items:
            $ref: "#/components/schemas/IotHubLocationDescription"
          description: Primary and secondary location for iot hub.
        enableDataResidency:
          type: boolean
          description: This property when set to true, will enable data residency, thus, disabling disaster recovery.
        rootCertificate:
          $ref: "#/components/schemas/RootCertificateProperties"
          description: This property store root certificate related information.
        ipVersion:
          $ref: "#/components/schemas/IpVersion"
          description: 'This property specifies the IP Version the hub is currently utilizing. Known values are: "ipv4", "ipv6", and "ipv4ipv6".'
        deviceRegistry:
          $ref: "#/components/schemas/DeviceRegistry"
          description: Represents properties related to the Azure Device Registry (ADR).
        iotHubDetails:
          $ref: "#/components/schemas/IotHubDetails"
          description: Set of additional read-only properties for the IoT hub.
    SharedAccessSignatureAuthorizationRule:
      type: object
      description: The properties of an IoT hub shared access policy.
      properties:
        keyName:
          type: string
          description: The name of the shared access policy. Required.
        primaryKey:
          type: string
          description: The primary key.
        secondaryKey:
          type: string
          description: The secondary key.
        rights:
          $ref: "#/components/schemas/AccessRights"
          description: 'The permissions assigned to the shared access policy. Required. Known values are: "RegistryRead", "RegistryWrite", "ServiceConnect", "DeviceConnect", "RegistryRead, RegistryWrite", "RegistryRead, ServiceConnect", "RegistryRead, DeviceConnect", "RegistryWrite, ServiceConnect", "RegistryWrite, DeviceConnect", "ServiceConnect, DeviceConnect", "RegistryRead, RegistryWrite, ServiceConnect", "RegistryRead, RegistryWrite, DeviceConnect", "RegistryRead, ServiceConnect, DeviceConnect", "RegistryWrite, ServiceConnect, DeviceConnect", and "RegistryRead, RegistryWrite, ServiceConnect, DeviceConnect".'
      required:
        - keyName
        - rights
    AccessRights:
      type: string
      enum:
        - RegistryRead
        - RegistryWrite
        - ServiceConnect
        - DeviceConnect
        - RegistryRead, RegistryWrite
        - RegistryRead, ServiceConnect
        - RegistryRead, DeviceConnect
        - RegistryWrite, ServiceConnect
        - RegistryWrite, DeviceConnect
        - ServiceConnect, DeviceConnect
        - RegistryRead, RegistryWrite, ServiceConnect
        - RegistryRead, RegistryWrite, DeviceConnect
        - RegistryRead, ServiceConnect, DeviceConnect
        - RegistryWrite, ServiceConnect, DeviceConnect
        - RegistryRead, RegistryWrite, ServiceConnect, DeviceConnect
    PublicNetworkAccess:
      type: string
      enum:
        - Enabled
        - Disabled
    IpFilterRule:
      type: object
      description: The IP filter rules for the IoT hub.
      properties:
        filterName:
          type: string
          description: The name of the IP filter rule. Required.
        action:
          $ref: "#/components/schemas/IpFilterActionType"
          description: 'The desired action for requests captured by this rule. Required. Known values are: "Accept" and "Reject".'
        ipMask:
          type: string
          description: A string that contains the IP address range in CIDR notation for the rule. Required.
      required:
        - filterName
        - action
        - ipMask
    IpFilterActionType:
      type: string
      enum:
        - Accept
        - Reject
    NetworkRuleSetProperties:
      type: object
      description: Network Rule Set Properties of IotHub.
      properties:
        defaultAction:
          $ref: "#/components/schemas/DefaultAction"
          description: 'Default Action for Network Rule Set. Known values are: "Deny" and "Allow".'
        applyToBuiltInEventHubEndpoint:
          type: boolean
          description: If True, then Network Rule Set is also applied to BuiltIn EventHub EndPoint of IotHub. Required.
        ipRules:
          type: array
          items:
            $ref: "#/components/schemas/NetworkRuleSetIpRule"
          description: List of IP Rules. Required.
      required:
        - applyToBuiltInEventHubEndpoint
        - ipRules
    DefaultAction:
      type: string
      enum:
        - Deny
        - Allow
    NetworkRuleSetIpRule:
      type: object
      description: IP Rule to be applied as part of Network Rule Set.
      properties:
        filterName:
          type: string
          description: Name of the IP filter rule. Required.
        action:
          $ref: "#/components/schemas/NetworkRuleIPAction"
          description: IP Filter Action. "Allow"
        ipMask:
          type: string
          description: A string that contains the IP address range in CIDR notation for the rule. Required.
      required:
        - filterName
        - ipMask
    NetworkRuleIPAction:
      type: string
      enum:
        - Allow
    PrivateEndpointConnection:
      type: object
      description: The private endpoint connection of an IotHub.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/PrivateEndpointConnectionProperties"
          description: The properties of a private endpoint connection. Required.
      required:
        - properties
    PrivateEndpointConnectionProperties:
      type: object
      description: The properties of a private endpoint connection.
      properties:
        privateEndpoint:
          $ref: "#/components/schemas/PrivateEndpoint"
          description: The private endpoint property of a private endpoint connection.
        privateLinkServiceConnectionState:
          $ref: "#/components/schemas/PrivateLinkServiceConnectionState"
          description: The current state of a private endpoint connection. Required.
      required:
        - privateLinkServiceConnectionState
    PrivateEndpoint:
      type: object
      description: The private endpoint property of a private endpoint connection.
      properties:
        id:
          type: string
          description: The resource identifier.
    PrivateLinkServiceConnectionState:
      type: object
      description: The current state of a private endpoint connection.
      properties:
        status:
          $ref: "#/components/schemas/PrivateLinkServiceConnectionStatus"
          description: 'The status of a private endpoint connection. Required. Known values are: "Pending", "Approved", "Rejected", and "Disconnected".'
        description:
          type: string
          description: The description for the current state of a private endpoint connection. Required.
        actionsRequired:
          type: string
          description: Actions required for a private endpoint connection.
      required:
        - status
        - description
    PrivateLinkServiceConnectionStatus:
      type: string
      enum:
        - Pending
        - Approved
        - Rejected
        - Disconnected
    RoutingProperties:
      type: object
      description: "The routing related properties of the IoT hub. See: `https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-messaging `_."
      properties:
        endpoints:
          $ref: "#/components/schemas/RoutingEndpoints"
          description: The properties related to the custom endpoints to which your IoT hub routes messages based on the routing rules. A maximum of 10 custom endpoints are allowed across all endpoint types for paid hubs and only 1 custom endpoint is allowed across all endpoint types for free hubs.
        routes:
          type: array
          items:
            $ref: "#/components/schemas/RouteProperties"
          description: The list of user-provided routing rules that the IoT hub uses to route messages to built-in and custom endpoints. A maximum of 100 routing rules are allowed for paid hubs and a maximum of 5 routing rules are allowed for free hubs.
        fallbackRoute:
          $ref: "#/components/schemas/FallbackRouteProperties"
          description: The properties of the route that is used as a fall-back route when none of the conditions specified in the 'routes' section are met. This is an optional parameter. When this property is not set, the messages which do not meet any of the conditions specified in the 'routes' section get routed to the built-in eventhub endpoint.
        enrichments:
          type: array
          items:
            $ref: "#/components/schemas/EnrichmentProperties"
          description: "The list of user-provided enrichments that the IoT hub applies to messages to be delivered to built-in and custom endpoints. See: `https://aka.ms/telemetryoneventgrid `_."
    RoutingEndpoints:
      type: object
      description: The properties related to the custom endpoints to which your IoT hub routes messages based on the routing rules. A maximum of 10 custom endpoints are allowed across all endpoint types for paid hubs and only 1 custom endpoint is allowed across all endpoint types for free hubs.
      properties:
        serviceBusQueues:
          type: array
          items:
            $ref: "#/components/schemas/RoutingServiceBusQueueEndpointProperties"
          description: The list of Service Bus queue endpoints that IoT hub routes the messages to, based on the routing rules.
        serviceBusTopics:
          type: array
          items:
            $ref: "#/components/schemas/RoutingServiceBusTopicEndpointProperties"
          description: The list of Service Bus topic endpoints that the IoT hub routes the messages to, based on the routing rules.
        eventHubs:
          type: array
          items:
            $ref: "#/components/schemas/RoutingEventHubProperties"
          description: The list of Event Hubs endpoints that IoT hub routes messages to, based on the routing rules. This list does not include the built-in Event Hubs endpoint.
        storageContainers:
          type: array
          items:
            $ref: "#/components/schemas/RoutingStorageContainerProperties"
          description: The list of storage container endpoints that IoT hub routes messages to, based on the routing rules.
        cosmosDBSqlContainers:
          type: array
          items:
            $ref: "#/components/schemas/RoutingCosmosDBSqlApiProperties"
          description: The list of Cosmos DB container endpoints that IoT hub routes messages to, based on the routing rules.
    RoutingServiceBusQueueEndpointProperties:
      type: object
      description: The properties related to service bus queue endpoint types.
      properties:
        id:
          type: string
          description: Id of the service bus queue endpoint.
        connectionString:
          type: string
          description: The connection string of the service bus queue endpoint.
        endpointUri:
          type: string
          description: The url of the service bus queue endpoint. It must include the protocol sb://.
        entityPath:
          type: string
          description: Queue name on the service bus namespace.
        authenticationType:
          $ref: "#/components/schemas/AuthenticationType"
          description: 'Method used to authenticate against the service bus queue endpoint. Known values are: "keyBased" and "identityBased".'
        identity:
          $ref: "#/components/schemas/ManagedIdentity"
          description: Managed identity properties of routing service bus queue endpoint.
        name:
          type: string
          description: "The name that identifies this endpoint. The name can only include alphanumeric characters, periods, underscores, hyphens and has a maximum length of 64 characters. The following names are reserved: events, fileNotifications, $default. Endpoint names must be unique across endpoint types. The name need not be the same as the actual queue name. Required."
        subscriptionId:
          type: string
          description: The subscription identifier of the service bus queue endpoint.
        resourceGroup:
          type: string
          description: The name of the resource group of the service bus queue endpoint.
      required:
        - name
    AuthenticationType:
      type: string
      enum:
        - keyBased
        - identityBased
    ManagedIdentity:
      type: object
      description: The properties of the Managed identity.
      properties:
        userAssignedIdentity:
          type: string
          description: The user assigned identity.
    RoutingServiceBusTopicEndpointProperties:
      type: object
      description: The properties related to service bus topic endpoint types.
      properties:
        id:
          type: string
          description: Id of the service bus topic endpoint.
        connectionString:
          type: string
          description: The connection string of the service bus topic endpoint.
        endpointUri:
          type: string
          description: The url of the service bus topic endpoint. It must include the protocol sb://.
        entityPath:
          type: string
          description: Queue name on the service bus topic.
        authenticationType:
          $ref: "#/components/schemas/AuthenticationType"
          description: 'Method used to authenticate against the service bus topic endpoint. Known values are: "keyBased" and "identityBased".'
        identity:
          $ref: "#/components/schemas/ManagedIdentity"
          description: Managed identity properties of routing service bus topic endpoint.
        name:
          type: string
          description: "The name that identifies this endpoint. The name can only include alphanumeric characters, periods, underscores, hyphens and has a maximum length of 64 characters. The following names are reserved: events, fileNotifications, $default. Endpoint names must be unique across endpoint types. The name need not be the same as the actual topic name. Required."
        subscriptionId:
          type: string
          description: The subscription identifier of the service bus topic endpoint.
        resourceGroup:
          type: string
          description: The name of the resource group of the service bus topic endpoint.
      required:
        - name
    RoutingEventHubProperties:
      type: object
      description: The properties related to an event hub endpoint.
      properties:
        id:
          type: string
          description: Id of the event hub endpoint.
        connectionString:
          type: string
          description: The connection string of the event hub endpoint.
        endpointUri:
          type: string
          description: The url of the event hub endpoint. It must include the protocol sb://.
        entityPath:
          type: string
          description: Event hub name on the event hub namespace.
        authenticationType:
          $ref: "#/components/schemas/AuthenticationType"
          description: 'Method used to authenticate against the event hub endpoint. Known values are: "keyBased" and "identityBased".'
        identity:
          $ref: "#/components/schemas/ManagedIdentity"
          description: Managed identity properties of routing event hub endpoint.
        name:
          type: string
          description: "The name that identifies this endpoint. The name can only include alphanumeric characters, periods, underscores, hyphens and has a maximum length of 64 characters. The following names are reserved: events, fileNotifications, $default. Endpoint names must be unique across endpoint types. Required."
        subscriptionId:
          type: string
          description: The subscription identifier of the event hub endpoint.
        resourceGroup:
          type: string
          description: The name of the resource group of the event hub endpoint.
      required:
        - name
    RoutingStorageContainerProperties:
      type: object
      description: The properties related to a storage container endpoint.
      properties:
        id:
          type: string
          description: Id of the storage container endpoint.
        connectionString:
          type: string
          description: The connection string of the storage account.
        endpointUri:
          type: string
          description: The url of the storage endpoint. It must include the protocol https://.
        authenticationType:
          $ref: "#/components/schemas/AuthenticationType"
          description: 'Method used to authenticate against the storage endpoint. Known values are: "keyBased" and "identityBased".'
        identity:
          $ref: "#/components/schemas/ManagedIdentity"
          description: Managed identity properties of routing storage endpoint.
        name:
          type: string
          description: "The name that identifies this endpoint. The name can only include alphanumeric characters, periods, underscores, hyphens and has a maximum length of 64 characters. The following names are reserved: events, fileNotifications, $default. Endpoint names must be unique across endpoint types. Required."
        subscriptionId:
          type: string
          description: The subscription identifier of the storage account.
        resourceGroup:
          type: string
          description: The name of the resource group of the storage account.
        containerName:
          type: string
          description: The name of storage container in the storage account. Required.
        fileNameFormat:
          type: string
          description: File name format for the blob. Default format is {iothub}/{partition}/{YYYY}/{MM}/{DD}/{HH}/{mm}. All parameters are mandatory but can be reordered.
        batchFrequencyInSeconds:
          type: integer
          description: Time interval at which blobs are written to storage. Value should be between 60 and 720 seconds. Default value is 300 seconds.
        maxChunkSizeInBytes:
          type: integer
          description: Maximum number of bytes for each blob written to storage. Value should be between 10485760(10MB) and 524288000(500MB). Default value is 314572800(300MB).
        encoding:
          $ref: "#/components/schemas/RoutingStorageContainerPropertiesEncoding"
          description: "Encoding that is used to serialize messages to blobs. Supported values are 'avro', 'avrodeflate', and 'JSON'. Default value is 'avro'. Known values are: \"Avro\", \"AvroDeflate\", and \"JSON\"."
      required:
        - name
        - containerName
    RoutingStorageContainerPropertiesEncoding:
      type: string
      enum:
        - Avro
        - AvroDeflate
        - JSON
    RoutingCosmosDBSqlApiProperties:
      type: object
      description: The properties related to a cosmos DB sql container endpoint.
      properties:
        name:
          type: string
          description: "The name that identifies this endpoint. The name can only include alphanumeric characters, periods, underscores, hyphens and has a maximum length of 64 characters. The following names are reserved: events, fileNotifications, $default. Endpoint names must be unique across endpoint types. Required."
        id:
          type: string
          description: Id of the cosmos DB sql container endpoint.
        subscriptionId:
          type: string
          description: The subscription identifier of the cosmos DB account.
        resourceGroup:
          type: string
          description: The name of the resource group of the cosmos DB account.
        endpointUri:
          type: string
          description: The url of the cosmos DB account. It must include the protocol https://. Required.
        authenticationType:
          $ref: "#/components/schemas/AuthenticationType"
