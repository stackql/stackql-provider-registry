        - dimensions
    SpatialAggregationType:
      type: string
      enum:
        - Average
        - Min
        - Max
        - Sum
        - Count
    TemporalAggregation:
      type: object
      description: Represents temporal aggregation settings.
      properties:
        type:
          $ref: "#/components/schemas/TemporalAggregationType"
          description: 'Type of temporal aggregation. Required. Known values are: "Average", "Min", "Max", "Sum", "Rate", "IRate", "Delta", "IDelta", and "Increase".'
