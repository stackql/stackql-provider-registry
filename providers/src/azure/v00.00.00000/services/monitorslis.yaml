        - signalSourceId
        - sourceAmwAccountManagedIdentity
        - sourceAmwAccountResourceId
        - metricNamespace
        - metricName
        - filters
        - spatialAggregation
        - temporalAggregation
    Condition:
      type: object
      description: Represents a filtering condition.
      properties:
        dimensionName:
          type: string
          description: Dimension name used in filtering.
        scalarFunction:
          $ref: "#/components/schemas/ScalarFunction"
          description: 'Scalar function applied for filtering. Known values are: "max", "min", "avg", and "sum".'
        samplingType:
          $ref: "#/components/schemas/SamplingType"
          description: 'Defines the sampling type. Known values are: "Average", "Sum", "Count", "Min", and "Max".'
        operator:
          $ref: "#/components/schemas/ConditionOperator"
          description: 'Operator used in the filtering condition. Required. Known values are: "eq", "ne", "lt", "lte", "gt", "gte", "in", "notin", "startswith", "notstartswith", "contains", and "notcontains".'
        value:
          type: string
          description: Value used in filtering. For most operators (eq, ne, lt, lte, gt, gte, startswith, notstartswith, contains, notcontains) this is a single value (for example "GetContosoUsers"). For the `in` and `notin` operators, multiple values must be joined by the delimiter `^^` (for example "east^^west^^north"). Required.
      required:
        - operator
        - value
    ScalarFunction:
      type: string
      enum:
        - max
        - min
        - avg
        - sum
    SamplingType:
      type: string
      enum:
        - Average
        - Sum
        - Count
        - Min
        - Max
    ConditionOperator:
      type: string
      enum:
