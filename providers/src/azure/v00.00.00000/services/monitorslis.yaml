          type: string
          description: A user-provided description of the SLI, with a maximum length of 1000 characters. Required.
        category:
          $ref: "#/components/schemas/Category"
          description: 'Specifies the category of the SLI, used to classify signals such as Availability and Latency. Required. Known values are: "Availability" and "Latency".'
        evaluationType:
          $ref: "#/components/schemas/EvaluationType"
          description: 'Determines how the SLI is evaluated—either based on request counts or time windows. Required. Known values are: "WindowBased" and "RequestBased".'
