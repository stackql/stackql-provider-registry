    SliResource:
      type: object
      description: Defines the root level properties of an SLI resource.
      properties:
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Indicates the provisioning status of the last operation. Known values are: "Succeeded", "Failed", and "Canceled".'
