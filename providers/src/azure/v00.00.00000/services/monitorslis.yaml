        sourceAmwAccountResourceId:
          type: string
          description: Resource ID of the source AMW account. Required.
        metricNamespace:
          type: string
          description: Namespace of the metric. Required.
        metricName:
          type: string
          description: Name of the metric. Required.
        filters:
          type: array
          items:
            $ref: "#/components/schemas/Condition"
          description: Filters applied to modify signal values. Required.
        spatialAggregation:
          $ref: "#/components/schemas/SpatialAggregation"
          description: Defines how measurements are aggregated across multiple time series. Required.
        temporalAggregation:
          $ref: "#/components/schemas/TemporalAggregation"
          description: Defines how measurements are aggregated over a specific time window within the same time series. Required.
