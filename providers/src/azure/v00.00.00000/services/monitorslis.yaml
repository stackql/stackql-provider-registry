          type: integer
          description: Time window size for aggregation, in minutes.
      required:
        - type
    TemporalAggregationType:
      type: string
      enum:
        - Average
        - Min
        - Max
        - Sum
        - Rate
        - IRate
        - Delta
        - IDelta
        - Increase
    WindowUptimeCriteria:
      type: object
      description: Represents criteria for determining uptime in window-based SLIs.
      properties:
        target:
          type: number
          description: Threshold value used to determine uptime. Required.
        comparator:
          $ref: "#/components/schemas/WindowUptimeCriteriaComparator"
          description: 'Comparison operator used for uptime evaluation. Required. Known values are: "lt", "gt", "lte", and "gte".'
      required:
