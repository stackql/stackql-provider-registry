      properties:
        operatorType:
          type: string
          description: 'The operator type used for filtering, e.g., NumberIn, StringContains, BoolEquals and others. Required. Known values are: "NumberIn", "NumberNotIn", "NumberLessThan", "NumberGreaterThan", "NumberLessThanOrEquals", "NumberGreaterThanOrEquals", "BoolEquals", "StringIn", "StringNotIn", "StringBeginsWith", "StringEndsWith", "StringContains", "NumberInRange", "NumberNotInRange", "StringNotBeginsWith", "StringNotEndsWith", "StringNotContains", "IsNullOrUndefined", and "IsNotNull".'
