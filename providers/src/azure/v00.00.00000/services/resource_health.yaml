openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Resource Health
  description: Availability statuses, service health events and emerging issues.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-05-01-stackql-generated
  x-serviceAlias: resource_health
  x-sdkPackage: azure-mgmt-resourcehealth
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    AvailabilityStatusProperties:
      type: object
      description: Properties of availability state.
      properties:
        availabilityState:
          $ref: "#/components/schemas/AvailabilityStateValues"
          description: 'Availability status of the resource. When it is null, this availabilityStatus object represents an availability impacting event. Known values are: "Available", "Unavailable", "Degraded", and "Unknown".'
        title:
          type: string
          description: Title description of the availability status.
        summary:
          type: string
          description: Summary description of the availability status.
        detailedStatus:
          type: string
          description: Details of the availability status.
        reasonType:
          type: string
          description: When the resource's availabilityState is Unavailable, it describes where the health impacting event was originated. Examples are planned, unplanned, user initiated or an outage etc.
        context:
          type: string
          description: When an event is created, it can either be triggered by a customer or the platform of the resource and this field will illustrate that. This field is connected to the category field in this object.
        category:
          type: string
          description: When a context field is set to Platform, this field will reflect if the event was planned or unplanned. If the context field does not have a value of Platform, then this field will be ignored.
        articleId:
          type: string
          description: The Article Id.
        rootCauseAttributionTime:
          type: string
          format: date-time
          description: When the resource's availabilityState is Unavailable, it provides the Timestamp for when the health impacting event was received.
        healthEventType:
          type: string
          description: In case of an availability impacting event, it describes when the health impacting event was originated. Examples are Lifecycle, Downtime, Fault Analysis etc.
        healthEventCause:
          type: string
          description: In case of an availability impacting event, it describes where the health impacting event was originated. Examples are PlatformInitiated, UserInitiated etc.
        healthEventCategory:
          type: string
          description: In case of an availability impacting event, it describes the category of a PlatformInitiated health impacting event. Examples are Planned, Unplanned etc.
        healthEventId:
          type: string
          description: It is a unique Id that identifies the event.
        resolutionETA:
          type: string
          format: date-time
          description: When the resource's availabilityState is Unavailable and the reasonType is not User Initiated, it provides the date and time for when the issue is expected to be resolved.
        occuredTime:
          type: string
          format: date-time
          description: Timestamp for when last change in health status occurred.
        reasonChronicity:
          $ref: "#/components/schemas/ReasonChronicityTypes"
          description: 'Chronicity of the availability transition. Known values are: "Transient" and "Persistent".'
        reportedTime:
          type: string
          format: date-time
          description: Timestamp for when the health was last checked.
        recentlyResolved:
          $ref: "#/components/schemas/AvailabilityStatusPropertiesRecentlyResolved"
          description: An annotation describing a change in the availabilityState to Available from Unavailable with a reasonType of type Unplanned.
        recommendedActions:
          type: array
          items:
            $ref: "#/components/schemas/RecommendedAction"
          description: Lists actions the user can take based on the current availabilityState of the resource.
        serviceImpactingEvents:
          type: array
          items:
            $ref: "#/components/schemas/ServiceImpactingEvent"
          description: Lists the service impacting events that may be affecting the health of the resource.
    AvailabilityStateValues:
      type: string
      enum:
        - Available
        - Unavailable
        - Degraded
        - Unknown
    ReasonChronicityTypes:
      type: string
      enum:
        - Transient
        - Persistent
    AvailabilityStatusPropertiesRecentlyResolved:
      type: object
      description: An annotation describing a change in the availabilityState to Available from Unavailable with a reasonType of type Unplanned.
      properties:
        unavailableOccuredTime:
          type: string
          format: date-time
          description: Timestamp for when the availabilityState changed to Unavailable.
        resolvedTime:
          type: string
          format: date-time
          description: Timestamp when the availabilityState changes to Available.
        unavailableSummary:
          type: string
          description: Brief description of cause of the resource becoming unavailable.
    RecommendedAction:
      type: object
      description: Lists actions the user can take based on the current availabilityState of the resource.
      properties:
        action:
          type: string
          description: Recommended action.
        actionUrl:
          type: string
          description: Link to the action.
        _ActionUrl:
          type: object
          properties:
            Comment:
              type: string
              description: the comment for the Action.
        actionUrlText:
          type: string
          description: Substring of action, it describes which text should host the action URL.
    ServiceImpactingEvent:
      type: object
      description: Lists the service impacting events that may be affecting the health of the resource.
      properties:
        eventStartTime:
          type: string
          format: date-time
          description: Timestamp for when the event started.
        eventStatusLastModifiedTime:
          type: string
          format: date-time
          description: Timestamp for when event was submitted/detected.
        correlationId:
          type: string
          description: Correlation id for the event.
        status:
          $ref: "#/components/schemas/ServiceImpactingEventStatus"
          description: Status of the service impacting event.
        incidentProperties:
          $ref: "#/components/schemas/ServiceImpactingEventIncidentProperties"
          description: Properties of the service impacting event.
    ServiceImpactingEventStatus:
      type: object
      description: Status of the service impacting event.
      properties:
        value:
          type: string
          description: Current status of the event.
    ServiceImpactingEventIncidentProperties:
      type: object
      description: Properties of the service impacting event.
      properties:
        title:
          type: string
          description: Title of the incident.
        service:
          type: string
          description: Service impacted by the event.
        region:
          type: string
          description: Region impacted by the event.
        incidentType:
          type: string
          description: Type of Event.
    AvailabilityStatusFlattened:
      type: object
      description: Flattened view of AvailabilityStatus ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Azure Resource Manager Identity for the availabilityStatuses resource.
        name:
          type: string
          description: ":vartype name: str"
        type:
          type: string
          description: Microsoft.ResourceHealth/AvailabilityStatuses.
        location:
          type: string
          description: Azure Resource Manager geo location of the resource.
        availabilityState:
          $ref: "#/components/schemas/AvailabilityStateValues"
          description: 'Availability status of the resource. When it is null, this availabilityStatus object represents an availability impacting event. Known values are: "Available", "Unavailable", "Degraded", and "Unknown".'
        title:
          type: string
          description: Title description of the availability status.
        summary:
          type: string
          description: Summary description of the availability status.
        detailedStatus:
          type: string
          description: Details of the availability status.
        reasonType:
          type: string
          description: When the resource's availabilityState is Unavailable, it describes where the health impacting event was originated. Examples are planned, unplanned, user initiated or an outage etc.
        context:
          type: string
          description: When an event is created, it can either be triggered by a customer or the platform of the resource and this field will illustrate that. This field is connected to the category field in this object.
        category:
          type: string
          description: When a context field is set to Platform, this field will reflect if the event was planned or unplanned. If the context field does not have a value of Platform, then this field will be ignored.
        articleId:
          type: string
          description: The Article Id.
        rootCauseAttributionTime:
          type: string
          format: date-time
          description: When the resource's availabilityState is Unavailable, it provides the Timestamp for when the health impacting event was received.
        healthEventType:
          type: string
          description: In case of an availability impacting event, it describes when the health impacting event was originated. Examples are Lifecycle, Downtime, Fault Analysis etc.
        healthEventCause:
          type: string
          description: In case of an availability impacting event, it describes where the health impacting event was originated. Examples are PlatformInitiated, UserInitiated etc.
        healthEventCategory:
          type: string
          description: In case of an availability impacting event, it describes the category of a PlatformInitiated health impacting event. Examples are Planned, Unplanned etc.
        healthEventId:
          type: string
          description: It is a unique Id that identifies the event.
        resolutionETA:
          type: string
          format: date-time
          description: When the resource's availabilityState is Unavailable and the reasonType is not User Initiated, it provides the date and time for when the issue is expected to be resolved.
        occuredTime:
          type: string
          format: date-time
          description: Timestamp for when last change in health status occurred.
        reasonChronicity:
          $ref: "#/components/schemas/ReasonChronicityTypes"
          description: 'Chronicity of the availability transition. Known values are: "Transient" and "Persistent".'
        reportedTime:
          type: string
          format: date-time
          description: Timestamp for when the health was last checked.
        recentlyResolved:
          $ref: "#/components/schemas/AvailabilityStatusPropertiesRecentlyResolved"
          description: An annotation describing a change in the availabilityState to Available from Unavailable with a reasonType of type Unplanned.
        recommendedActions:
          type: array
          items:
            $ref: "#/components/schemas/RecommendedAction"
          description: Lists actions the user can take based on the current availabilityState of the resource.
        serviceImpactingEvents:
          type: array
          items:
            $ref: "#/components/schemas/ServiceImpactingEvent"
          description: Lists the service impacting events that may be affecting the health of the resource.
    PagedAvailabilityStatusFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityStatusFlattened"
        nextLink:
          type: string
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    EmergingIssue:
      type: object
      description: On-going emerging issue from azure status.
      properties:
        refreshTimestamp:
          type: string
          format: date-time
          description: Timestamp for when last time refreshed for ongoing emerging issue.
        statusBanners:
          type: array
          items:
            $ref: "#/components/schemas/StatusBanner"
          description: The list of emerging issues of banner type.
        statusActiveEvents:
          type: array
          items:
            $ref: "#/components/schemas/StatusActiveEvent"
          description: The list of emerging issues of active event type.
    StatusBanner:
      type: object
      description: Banner type of emerging issue.
      properties:
        title:
          type: string
          description: The banner title.
        message:
          type: string
          description: The details of banner.
        cloud:
          type: string
          description: The cloud type of this banner.
        lastModifiedTime:
          type: string
          format: date-time
          description: The last time modified on this banner.
    StatusActiveEvent:
      type: object
      description: Active event type of emerging issue.
      properties:
        title:
          type: string
          description: The active event title.
        description:
          type: string
          description: The details of active event.
        trackingId:
          type: string
          description: The tracking id of this active event.
        startTime:
          type: string
          format: date-time
          description: The impact start time on this active event.
        cloud:
          type: string
          description: The cloud type of this active event.
        severity:
          $ref: "#/components/schemas/SeverityValues"
          description: 'The severity level of this active event. Known values are: "Information", "Warning", and "Error".'
        stage:
          $ref: "#/components/schemas/StageValues"
          description: 'The stage of this active event. Known values are: "Active", "Resolve", and "Archived".'
        published:
          type: boolean
          description: The boolean value of this active event if published or not.
        lastModifiedTime:
          type: string
          format: date-time
          description: The last time modified on this banner.
        impacts:
          type: array
          items:
            $ref: "#/components/schemas/EmergingIssueImpact"
          description: The list of emerging issues impacts.
    SeverityValues:
      type: string
      enum:
        - Information
        - Warning
        - Error
    StageValues:
      type: string
      enum:
        - Active
        - Resolve
        - Archived
    EmergingIssueImpact:
      type: object
      description: Object of the emerging issue impact on services and regions.
      properties:
        id:
          type: string
          description: The impacted service id.
        name:
          type: string
          description: The impacted service name.
        regions:
          type: array
          items:
            $ref: "#/components/schemas/ImpactedRegion"
          description: The list of impacted regions for corresponding emerging issues.
    ImpactedRegion:
      type: object
      description: Object of impacted region.
      properties:
        id:
          type: string
          description: The impacted region id.
        name:
          type: string
          description: The impacted region name.
    EmergingIssuesGetResultFlattened:
      type: object
      description: Flattened view of EmergingIssuesGetResult ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        refreshTimestamp:
          type: string
          format: date-time
          description: Timestamp for when last time refreshed for ongoing emerging issue.
        statusBanners:
          type: array
          items:
            $ref: "#/components/schemas/StatusBanner"
          description: The list of emerging issues of banner type.
        statusActiveEvents:
          type: array
          items:
            $ref: "#/components/schemas/StatusActiveEvent"
          description: The list of emerging issues of active event type.
    PagedEmergingIssuesGetResultFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/EmergingIssuesGetResultFlattened"
        nextLink:
          type: string
    EventProperties:
      type: object
      description: Properties of event.
      properties:
        eventType:
          $ref: "#/components/schemas/EventTypeValues"
          description: 'Type of event. Known values are: "ServiceIssue", "PlannedMaintenance", "HealthAdvisory", "RCA", "EmergingIssues", "SecurityAdvisory", and "Billing".'
        eventSubType:
          $ref: "#/components/schemas/EventSubTypeValues"
          description: 'Sub-type of event. Known values are: "Retirement", "ForeignExchangeRateChange", "Underbilling", "Overbilling", "PriceChanges", "TaxChanges", "MeterIDChanges", and "UnauthorizedPartyAbuse".'
        eventSource:
          $ref: "#/components/schemas/EventSourceValues"
          description: 'Source of event. Known values are: "ResourceHealth" and "ServiceHealth".'
        status:
          $ref: "#/components/schemas/EventStatusValues"
          description: 'Current status of event. Known values are: "Active" and "Resolved".'
        title:
          type: string
          description: Title text of event.
        summary:
          type: string
          description: Summary text of event. Use fetchEventDetails endpoint to get summary of sensitive events.
        header:
          type: string
          description: Header text of event.
        level:
          $ref: "#/components/schemas/LevelValues"
          description: 'Level of insight. Known values are: "Critical" and "Warning".'
        eventLevel:
          $ref: "#/components/schemas/EventLevelValues"
          description: 'Level of event. Known values are: "Critical", "Error", "Warning", and "Informational".'
        isEventSensitive:
          type: boolean
          description: If true the event may contains sensitive data. Use the post events/{trackingId}/fetchEventDetails endpoint to fetch sensitive data see `https://learn.microsoft.com/en-us/azure/service-health/security-advisories-elevated-access `_.
        externalIncidentId:
          type: string
          description: The id of the Incident.
        reason:
          type: string
          description: The reason for the Incident.
        article:
          $ref: "#/components/schemas/EventPropertiesArticle"
          description: Article of event.
        links:
          type: array
          items:
            $ref: "#/components/schemas/Link"
          description: Useful links of event.
        impactStartTime:
          type: string
          format: date-time
          description: It provides the Timestamp for when the health impacting event started.
        impactMitigationTime:
          type: string
          format: date-time
          description: It provides the Timestamp for when the health impacting event resolved.
        impact:
          type: array
          items:
            $ref: "#/components/schemas/Impact"
          description: List services impacted by the service health event.
        recommendedActions:
          $ref: "#/components/schemas/EventPropertiesRecommendedActions"
          description: Recommended actions of event.
        faqs:
          type: array
          items:
            $ref: "#/components/schemas/Faq"
          description: Frequently asked questions for the service health event.
        isHIR:
          type: boolean
          description: It provides information if the event is High incident rate event or not.
        enableMicrosoftSupport:
          type: boolean
          description: Tells if we want to enable or disable Microsoft Support for this event.
        description:
          type: string
          description: Contains the communication message for the event, that could include summary, root cause and other details. Use fetchEventDetails endpoint to get description of sensitive events.
        platformInitiated:
          type: boolean
          description: Is true if the event is platform initiated.
        enableChatWithUs:
          type: boolean
          description: Tells if we want to enable or disable Microsoft Support for this event.
        priority:
          type: integer
          description: Priority level of the event. Has value from 0 to 23. 0 is the highest priority. Service issue events have higher priority followed by planned maintenance and health advisory. Critical events have higher priority followed by error, warning and informational. Furthermore, active events have higher priority than resolved.
        lastUpdateTime:
          type: string
          format: date-time
          description: It provides the Timestamp for when the health impacting event was last updated.
        hirStage:
          type: string
          description: Stage for HIR Document.
        additionalInformation:
          $ref: "#/components/schemas/EventPropertiesAdditionalInformation"
          description: Additional information.
        duration:
          type: integer
          description: duration in seconds.
        impactType:
          type: string
          description: The type of the impact.
        eventTags:
          type: array
          items:
            type: string
          description: "A list of metadata tags associated with the event. Possible values include: -Action Recommended: Action may be required by you to avoid possible disruptions or mitigate risks for your services. It is recommended to evaluate these actions and the potential impact on your services. * False Positive: After investigation, we've determined your service is healthy and service issues did not impact your services as originally communicated. * Preliminary PIR: For our largest, most impactful service issues a Preliminary Post Incident Review (PIR) is published generally within 72 hours of mitigation, to summarize what we have learned so far from the still-in-progress investigation. * Final PIR: For service issues, a Final Post Incident Review (PIR) may be published to provide additional details or learnings. Sometimes this requires us to complete an internal retrospective, generally within 14 days of mitigation."
        newRate:
          type: number
          description: Billing rate change information - new rate.
        oldRate:
          type: number
          description: Billing rate change information - old rate.
        currencyType:
          type: string
          description: "Billing currency type information. Example: USD, CAD."
        billingId:
          type: string
          description: Billing identifier information.
    EventTypeValues:
      type: string
      enum:
        - ServiceIssue
        - PlannedMaintenance
        - HealthAdvisory
        - RCA
        - EmergingIssues
        - SecurityAdvisory
        - Billing
    EventSubTypeValues:
      type: string
      enum:
        - Retirement
        - ForeignExchangeRateChange
        - Underbilling
        - Overbilling
        - PriceChanges
        - TaxChanges
        - MeterIDChanges
        - UnauthorizedPartyAbuse
    EventSourceValues:
      type: string
      enum:
        - ResourceHealth
        - ServiceHealth
    EventStatusValues:
      type: string
      enum:
        - Active
        - Resolved
    LevelValues:
      type: string
      enum:
        - Critical
        - Warning
    EventLevelValues:
      type: string
      enum:
        - Critical
        - Error
        - Warning
        - Informational
    EventPropertiesArticle:
      type: object
      description: Article of event.
      properties:
        articleContent:
          type: string
          description: Article content of event.
        articleId:
          type: string
          description: Article Id.
        parameters:
          type: object
          properties: {}
          description: It provides a map of parameter name and value.
    Link:
      type: object
      description: Useful links for service health event.
      properties:
        type:
          $ref: "#/components/schemas/LinkTypeValues"
          description: 'Type of link. Known values are: "Button" and "Hyperlink".'
        displayText:
          $ref: "#/components/schemas/LinkDisplayText"
          description: Display text of link.
        extensionName:
          type: string
          description: It provides the name of portal extension to produce link for given service health event.
        bladeName:
          type: string
          description: It provides the name of portal extension blade to produce link for given service health event.
        parameters:
          type: object
          properties: {}
          description: It provides a map of parameter name and value for portal extension blade to produce lik for given service health event.
    LinkTypeValues:
      type: string
      enum:
        - Button
        - Hyperlink
    LinkDisplayText:
      type: object
      description: Display text of link.
      properties:
        value:
          type: string
          description: Display text of link.
        localizedValue:
          type: string
          description: Localized display text of link.
    Impact:
      type: object
      description: Azure service impacted by the service health event.
      properties:
        impactedService:
          type: string
          description: Impacted service name.
        impactedServiceGuid:
          type: string
          description: Impacted service guid. This is the permanent identifier for the impacted service.
        impactedRegions:
          type: array
          items:
            $ref: "#/components/schemas/ImpactedServiceRegion"
          description: List regions impacted by the service health event.
    ImpactedServiceRegion:
      type: object
      description: Azure region impacted by the service health event.
      properties:
        impactedRegion:
          type: string
          description: Impacted region name.
        status:
          $ref: "#/components/schemas/EventStatusValues"
          description: 'Current status of event in the region. Known values are: "Active" and "Resolved".'
        impactedSubscriptions:
          type: array
          items:
            type: string
          description: List subscription impacted by the service health event.
        impactedTenants:
          type: array
          items:
            type: string
          description: List tenant impacted by the service health event.
        lastUpdateTime:
          type: string
          format: date-time
          description: It provides the Timestamp for when the last update for the service health event.
        updates:
          type: array
          items:
            $ref: "#/components/schemas/Update"
          description: List of updates for given service health event. Use fetchEventDetails endpoint to get updates of sensitive events.
    Update:
      type: object
      description: Update for service health event.
      properties:
        summary:
          type: string
          description: Summary text for the given update for the service health event.
        updateDateTime:
          type: string
          format: date-time
          description: It provides the Timestamp for the given update for the service health event.
        eventTags:
          type: array
          items:
            type: string
          description: "A list of metadata tags associated with the event. Possible values include: -Action Recommended: Action may be required by you to avoid possible disruptions or mitigate risks for your services. It is recommended to evaluate these actions and the potential impact on your services. * False Positive: After investigation, we've determined your service is healthy and service issues did not impact your services as originally communicated. * Preliminary PIR: For our largest, most impactful service issues a Preliminary Post Incident Review (PIR) is published generally within 72 hours of mitigation, to summarize what we have learned so far from the still-in-progress investigation. * Final PIR: For service issues, a Final Post Incident Review (PIR) may be published to provide additional details or learnings. Sometimes this requires us to complete an internal retrospective, generally within 14 days of mitigation."
    EventPropertiesRecommendedActions:
      type: object
      description: Recommended actions of event.
      properties:
        message:
          type: string
          description: Recommended action title for the service health event.
        actions:
          type: array
          items:
            $ref: "#/components/schemas/EventPropertiesRecommendedActionsItem"
          description: Recommended actions for the service health event.
        localeCode:
          type: string
          description: Recommended action locale for the service health event.
    EventPropertiesRecommendedActionsItem:
      type: object
      description: Recommended action for the service health event.
      properties:
        groupId:
          type: integer
          description: Recommended action group Id for the service health event.
        actionText:
          type: string
          description: Recommended action text.
    Faq:
      type: object
      description: Frequently asked question for the service health event.
      properties:
        question:
          type: string
          description: FAQ question for the service health event.
        answer:
          type: string
          description: FAQ answer for the service health event.
        localeCode:
          type: string
          description: FAQ locale for the service health event.
    EventPropertiesAdditionalInformation:
      type: object
      description: Additional information.
      properties:
        message:
          type: string
          description: Additional information Message.
    EventFlattened:
      type: object
      description: Flattened view of Event ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
