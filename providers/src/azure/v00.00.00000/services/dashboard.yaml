          type: string
          description: The Grafana software version.
        endpoint:
          type: string
          description: The endpoint of the Grafana instance.
        publicNetworkAccess:
          $ref: "#/components/schemas/PublicNetworkAccess"
          description: 'Indicate the state for enable or disable traffic over the public interface. Known values are: "Enabled" and "Disabled".'
        zoneRedundancy:
          $ref: "#/components/schemas/ZoneRedundancy"
          description: 'The zone redundancy setting of the Grafana instance. Known values are: "Disabled" and "Enabled".'
        apiKey:
          $ref: "#/components/schemas/ApiKey"
          description: 'The api key setting of the Grafana instance. Known values are: "Disabled" and "Enabled".'
        creatorCanAdmin:
          $ref: "#/components/schemas/CreatorCanAdmin"
          description: 'The creator will have admin access for the Grafana instance. Known values are: "Disabled" and "Enabled".'
