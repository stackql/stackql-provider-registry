          $ref: "#/components/schemas/StartTLSPolicy"
          description: 'The StartTLSPolicy setting of the SMTP configuration `https://pkg.go.dev/github.com/go-mail/mail#StartTLSPolicy `_. Known values are: "OpportunisticStartTLS", "MandatoryStartTLS", and "NoStartTLS".'
