      type: object
      description: Email server settings. `https://grafana.com/docs/grafana/v9.0/setup-grafana/configure-grafana/#smtp `_.
      properties:
        enabled:
          type: boolean
          description: Enable this to allow Grafana to send email. Default is false.
        host:
          type: string
          description: SMTP server hostname with port, e.g. test.email.net:587.
        user:
          type: string
          description: User of SMTP auth.
        password:
          type: string
          description: "Password of SMTP auth. If the password contains # or ;, then you have to wrap it with triple quotes."
        fromAddress:
          type: string
          description: Address used when sending out emails `https://pkg.go.dev/net/mail#Address `_.
        fromName:
          type: string
          description: Name to be used when sending out emails. Default is "Azure Managed Grafana Notification" `https://pkg.go.dev/net/mail#Address `_.
