          description: Represents the model training status. Required.
        dataGenerationStatus:
          $ref: "#/components/schemas/SubTrainingState"
          description: Represents the model data generation status. Required.
        evaluationStatus:
          $ref: "#/components/schemas/SubTrainingState"
          description: Represents model evaluation status.
        estimatedEndDateTime:
          type: string
          format: date-time
          description: Represents the estimated end date time for training and evaluation.
