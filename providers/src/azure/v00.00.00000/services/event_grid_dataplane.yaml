paths:
  /topics/{topic_name}/eventsubscriptions/{event_subscription_name}:receive?api-version=2024-06-01:
    post:
      operationId: EventGridConsumerClient_receive
      description: Receive a batch of Cloud Events from a subscription.
      parameters:
        - name: topic_name
          in: path
          required: true
          schema:
            type: string
          description: Topic Name. Required.
        - name: event_subscription_name
          in: path
          required: true
          schema:
            type: string
          description: Event Subscription Name. Required.
        - name: maxEvents
          in: query
          required: false
          schema:
            type: integer
          description: Max Events count to be received. Minimum value is 1, while maximum value is 100 events. If not specified, the default value is 1. Default value is None.
        - name: maxWaitTime
          in: query
          required: false
          schema:
            type: integer
          description: Max wait time value for receive operation in Seconds. It is the time in seconds that the server approximately waits for the availability of an event and responds to the request. If an event is available, the broker responds immediately to the client. Minimum value is 10 seconds, while maximum value is 120 seconds. If not specified, the default value is 60 seconds. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties: {}
  /topics/{topic_name}/eventsubscriptions/{event_subscription_name}:acknowledge?api-version=2024-06-01:
    post:
      operationId: EventGridConsumerClient_acknowledge
      description: Acknowledge a batch of Cloud Events. The response will include the set of successfully acknowledged lock tokens, along with other failed lock tokens with their corresponding error information. Successfully acknowledged events will no longer be available to be received by any consumer.
      parameters:
        - name: topic_name
          in: path
          required: true
          schema:
            type: string
          description: Topic Name. Required.
        - name: event_subscription_name
          in: path
          required: true
          schema:
            type: string
          description: Event Subscription Name. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgeResult"
  /topics/{topic_name}/eventsubscriptions/{event_subscription_name}:release?api-version=2024-06-01:
    post:
      operationId: EventGridConsumerClient_release
      description: Release a batch of Cloud Events. The response will include the set of successfully released lock tokens, along with other failed lock tokens with their corresponding error information. Successfully released events can be received by consumers.
      parameters:
        - name: topic_name
          in: path
          required: true
          schema:
            type: string
          description: Topic Name. Required.
        - name: event_subscription_name
          in: path
          required: true
          schema:
            type: string
          description: Event Subscription Name. Required.
        - name: releaseDelayInSeconds
          in: query
          required: false
          schema:
            type: string
          description: 'Release cloud events with the specified delay in seconds. Known values are: "0", "10", "60", "600", and "3600". Default value is None.'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResult"
  /topics/{topic_name}/eventsubscriptions/{event_subscription_name}:reject?api-version=2024-06-01:
    post:
      operationId: EventGridConsumerClient_reject
      description: Reject a batch of Cloud Events. The response will include the set of successfully rejected lock tokens, along with other failed lock tokens with their corresponding error information. Successfully rejected events will be dead-lettered and can no longer be received by a consumer.
      parameters:
        - name: topic_name
          in: path
          required: true
          schema:
            type: string
          description: Topic Name. Required.
        - name: event_subscription_name
          in: path
          required: true
          schema:
            type: string
          description: Event Subscription Name. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectResult"
  /topics/{topic_name}/eventsubscriptions/{event_subscription_name}:renewLock?api-version=2024-06-01:
    post:
      operationId: EventGridConsumerClient_renew_locks
      description: Renew locks for a batch of Cloud Events. The response will include the set of successfully renewed lock tokens, along with other failed lock tokens with their corresponding error information. Successfully renewed locks will ensure that the associated event is only available to the consumer that holds the renewed lock.
      parameters:
        - name: topic_name
          in: path
          required: true
          schema:
            type: string
          description: Topic Name. Required.
        - name: event_subscription_name
          in: path
          required: true
          schema:
            type: string
          description: Event Subscription Name. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenewLocksResult"
  /topics/{topic_name}:publish?api-version=2024-06-01:
    post:
      operationId: EventGridPublisherClient_send
      description: Publish a single Cloud Event to a namespace topic.
      parameters:
        - name: topic_name
          in: path
          required: true
          schema:
            type: string
          description: Topic Name. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties: {}
  /api/events?api-version=2018-01-01:
    post:
      operationId: EventGridPublisherClient_publish_events
      description: Publishes a batch of events to an Azure Event Grid topic.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: An unique identifier for the event. Required.
                topic:
                  type: string
                  description: The resource path of the event source.
                subject:
                  type: string
                  description: A resource path relative to the topic path. Required.
                data:
                  type: object
                  properties: {}
                  description: Event data specific to the event type. Required.
                eventType:
                  type: string
                  description: The type of the event that occurred. Required.
                eventTime:
                  type: string
                  format: date-time
                  description: The time (in UTC) the event was generated. Required.
                dataVersion:
                  type: string
                  description: The schema version of the data object. Required.
              required:
                - id
                - subject
                - data
                - eventType
                - eventTime
                - dataVersion
      responses:
        "200":
          description: Success
