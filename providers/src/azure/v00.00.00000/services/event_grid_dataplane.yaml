          scopes:
            user_impersonation: impersonate your user account
  schemas:
    AcknowledgeResult:
      type: object
      description: The result of the Acknowledge operation.
      properties:
        failedLockTokens:
          type: array
          items:
            $ref: "#/components/schemas/FailedLockToken"
          description: Array of FailedLockToken for failed cloud events. Each FailedLockToken includes the lock token along with the related error information (namely, the error code and description). Required.
        succeededLockTokens:
          type: array
          items:
            type: string
          description: Array of lock tokens for the successfully acknowledged cloud events. Required.
      required:
        - failedLockTokens
        - succeededLockTokens
    FailedLockToken:
      type: object
      description: Failed LockToken information.
      properties:
        lockToken:
          type: string
          description: The lock token of an entry in the request. Required.
        error:
          type: object
          properties: {}
          description: Error information of the failed operation result for the lock token in the request. Required.
      required:
        - lockToken
        - error
    ReleaseResult:
      type: object
      description: The result of the Release operation.
      properties:
        failedLockTokens:
          type: array
          items:
            $ref: "#/components/schemas/FailedLockToken"
