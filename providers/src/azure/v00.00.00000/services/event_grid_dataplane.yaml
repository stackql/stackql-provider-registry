            type: string
          description: Array of lock tokens for the successfully released cloud events. Required.
      required:
        - failedLockTokens
        - succeededLockTokens
    RejectResult:
      type: object
      description: The result of the Reject operation.
      properties:
        failedLockTokens:
          type: array
          items:
            $ref: "#/components/schemas/FailedLockToken"
          description: Array of FailedLockToken for failed cloud events. Each FailedLockToken includes the lock token along with the related error information (namely, the error code and description). Required.
        succeededLockTokens:
          type: array
          items:
            type: string
          description: Array of lock tokens for the successfully rejected cloud events. Required.
      required:
        - failedLockTokens
        - succeededLockTokens
    RenewLocksResult:
      type: object
      description: The result of the RenewLock operation.
      properties:
        failedLockTokens:
          type: array
          items:
            $ref: "#/components/schemas/FailedLockToken"
