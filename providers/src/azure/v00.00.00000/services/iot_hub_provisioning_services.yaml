          description: Raw data within the certificate. Default value is None.
        - name: certificate.isVerified
          in: query
          required: false
          schema:
            type: boolean
          description: Indicates if certificate has been verified by owner of the private key. Default value is None.
        - name: certificate.purpose
          in: query
          required: false
          schema:
            type: string
          description: 'A description that mentions the purpose of the certificate. Known values are: "clientAuthentication" and "serverAuthentication". Default value is None.'
        - name: certificate.created
          in: query
          required: false
          schema:
            type: string
