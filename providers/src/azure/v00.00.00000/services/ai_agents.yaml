openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure AI Foundry Agent Service (Data Plane)
  description: Create and run AI agents with tools, threads and runs in Azure AI Foundry projects.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-05-15-preview-stackql-generated
  x-serviceAlias: ai_agents
  x-sdkPackage: azure-ai-agents
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    FilePurpose:
      type: string
      enum:
        - assistants
        - assistants_output
        - vision
    FileState:
      type: string
      enum:
        - uploaded
        - pending
        - running
        - processed
        - error
        - deleting
        - deleted
    FileInfo:
      type: object
      description: Represents an agent that can call the model and use tools.
      properties:
        object:
          type: string
          description: The object type, which is always 'file'. Required. Default value is "file".
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints. Required.
        bytes:
          type: integer
          description: The size of the file, in bytes. Required.
        filename:
          type: string
          description: The name of the file. Required.
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this object was created. Required.
        purpose:
          $ref: "#/components/schemas/FilePurpose"
          description: 'The intended purpose of a file. Required. Known values are: "assistants", "assistants_output", and "vision".'
        status:
          $ref: "#/components/schemas/FileState"
          description: 'The state of the file. This field is available in Azure OpenAI only. Known values are: "uploaded", "pending", "running", "processed", "error", "deleting", and "deleted".'
        status_details:
          type: string
          description: The error message with details in case processing of this file failed. This field is available in Azure OpenAI only.
      required:
        - object
        - id
        - bytes
        - filename
        - created_at
        - purpose
    FileListResponse:
      type: object
      description: The response data from a file list operation.
      properties:
        object:
          type: string
          description: The object type, which is always 'list'. Required. Default value is "list".
        data:
          type: array
          items:
            $ref: "#/components/schemas/FileInfo"
          description: The files returned for the request. Required.
      required:
        - object
        - data
    MessageStatus:
      type: string
      enum:
        - in_progress
        - incomplete
        - completed
    MessageIncompleteDetails:
      type: object
      description: Information providing additional detail about a message entering an incomplete status.
      properties:
        reason:
          $ref: "#/components/schemas/MessageIncompleteDetailsReason"
          description: 'The provided reason describing why the message was marked as incomplete. Required. Known values are: "content_filter", "max_tokens", "run_cancelled", "run_failed", and "run_expired".'
      required:
        - reason
    MessageIncompleteDetailsReason:
      type: string
      enum:
        - content_filter
        - max_tokens
        - run_cancelled
        - run_failed
        - run_expired
    MessageRole:
      type: string
      enum:
        - user
        - assistant
    MessageContent:
      type: object
      description: "An abstract representation of a single item of thread message content. You probably want to use the sub-classes and not this class directly. Known sub-classes are: MessageImageFileContent, MessageTextContent"
      properties:
        type:
          type: string
          description: The object type. Required. Default value is None.
      required:
        - type
    MessageAttachment:
      type: object
      description: This describes to which tools a file has been attached.
      properties:
        file_id:
          type: string
          description: The ID of the file to attach to the message.
        data_source:
          $ref: "#/components/schemas/VectorStoreDataSource"
          description: Azure asset ID.
        tools:
          type: array
          items:
            type: object
            properties: {}
          description: The tools to add to this file. Required.
      required:
        - tools
    VectorStoreDataSource:
      type: object
      description: The structure, containing Azure asset URI path and the asset type of the file used as a data source for the enterprise file search.
      properties:
        uri:
          type: string
          description: Asset URI. Required.
        type:
          $ref: "#/components/schemas/VectorStoreDataSourceAssetType"
          description: 'The asset type. Required. Known values are: "uri_asset" and "id_asset".'
      required:
        - uri
        - type
    VectorStoreDataSourceAssetType:
      type: string
      enum:
        - uri_asset
        - id_asset
    ThreadMessage:
      type: object
      description: A single, existing message within an agent thread.
      properties:
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints. Required.
        object:
          type: string
          description: The object type, which is always 'thread.message'. Required. Default value is "thread.message".
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this object was created. Required.
        thread_id:
          type: string
          description: The ID of the thread that this message belongs to. Required.
        status:
          $ref: "#/components/schemas/MessageStatus"
          description: 'The status of the message. Required. Known values are: "in_progress", "incomplete", and "completed".'
        incomplete_details:
          $ref: "#/components/schemas/MessageIncompleteDetails"
          description: On an incomplete message, details about why the message is incomplete. Required.
        completed_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) for when the message was completed. Required.
        incomplete_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) for when the message was marked as incomplete. Required.
        role:
          $ref: "#/components/schemas/MessageRole"
          description: 'The role associated with the agent thread message. Required. Known values are: "user" and "assistant".'
        content:
          type: array
          items:
            $ref: "#/components/schemas/MessageContent"
          description: The list of content items associated with the agent thread message. Required.
        assistant_id:
          type: string
          description: If applicable, the ID of the agent that authored this message. Required.
        run_id:
          type: string
          description: If applicable, the ID of the run associated with the authoring of this message. Required.
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/MessageAttachment"
          description: A list of files attached to the message, and the tools they were added to. Required.
        metadata:
          type: object
          properties: {}
          description: A set of up to 16 key/value pairs that can be attached to an object, used for storing additional information about that object in a structured format. Keys may be up to 64 characters in length and values may be up to 512 characters in length. Required.
      required:
        - id
        - object
        - created_at
        - thread_id
        - status
        - incomplete_details
        - completed_at
        - incomplete_at
        - role
        - content
        - assistant_id
        - run_id
        - attachments
        - metadata
    PagedThreadMessage:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ThreadMessage"
        nextLink:
          type: string
    RunStepType:
      type: string
      enum:
        - message_creation
        - tool_calls
        - activities
    RunStepStatus:
      type: string
      enum:
        - in_progress
        - cancelled
        - failed
        - completed
        - expired
    RunStepDetails:
      type: object
      description: "An abstract representation of the details for a run step. You probably want to use the sub-classes and not this class directly. Known sub-classes are: RunStepActivityDetails, RunStepMessageCreationDetails, RunStepToolCallDetails"
      properties:
        type:
          type: string
          description: 'The object type. Required. Known values are: "message_creation", "tool_calls", and "activities".'
      required:
        - type
    RunStepError:
      type: object
      description: The error information associated with a failed run step.
      properties:
        code:
          $ref: "#/components/schemas/RunStepErrorCode"
          description: 'The error code for this error. Required. Known values are: "server_error" and "rate_limit_exceeded".'
        message:
          type: string
          description: The human-readable text associated with this error. Required.
      required:
        - code
        - message
    RunStepErrorCode:
      type: string
      enum:
        - server_error
        - rate_limit_exceeded
    RunStepCompletionUsage:
      type: object
      description: Usage statistics related to the run step.
      properties:
        completion_tokens:
          type: integer
          description: Number of completion tokens used over the course of the run step. Required.
        prompt_tokens:
          type: integer
          description: Number of prompt tokens used over the course of the run step. Required.
        total_tokens:
          type: integer
          description: Total number of tokens used (prompt + completion). Required.
      required:
        - completion_tokens
        - prompt_tokens
        - total_tokens
    RunStep:
      type: object
      description: Detailed information about a single step of an agent thread run.
      properties:
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints. Required.
        object:
          type: string
          description: The object type, which is always 'thread.run.step'. Required. Default value is "thread.run.step".
        type:
          $ref: "#/components/schemas/RunStepType"
          description: 'The type of run step, which can be either message_creation or tool_calls. Required. Known values are: "message_creation", "tool_calls", and "activities".'
        assistant_id:
          type: string
          description: The ID of the agent associated with the run step. Required.
        thread_id:
          type: string
          description: The ID of the thread that was run. Required.
        run_id:
          type: string
          description: The ID of the run that this run step is a part of. Required.
        status:
          $ref: "#/components/schemas/RunStepStatus"
          description: 'The status of this run step. Required. Known values are: "in_progress", "cancelled", "failed", "completed", and "expired".'
        step_details:
          $ref: "#/components/schemas/RunStepDetails"
          description: The details for this run step. Required.
        last_error:
          $ref: "#/components/schemas/RunStepError"
          description: If applicable, information about the last error encountered by this run step. Required.
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this object was created. Required.
        expired_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this item expired. Required.
        completed_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this completed. Required.
        cancelled_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this was cancelled. Required.
        failed_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this failed. Required.
        usage:
          $ref: "#/components/schemas/RunStepCompletionUsage"
          description: Usage statistics related to the run step. This value will be `null` while the run step's status is `in_progress`.
        metadata:
          type: object
          properties: {}
          description: A set of up to 16 key/value pairs that can be attached to an object, used for storing additional information about that object in a structured format. Keys may be up to 64 characters in length and values may be up to 512 characters in length. Required.
      required:
        - id
        - object
        - type
        - assistant_id
        - thread_id
        - run_id
        - status
        - step_details
        - last_error
        - created_at
        - expired_at
        - completed_at
        - cancelled_at
        - failed_at
        - metadata
    PagedRunStep:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RunStep"
        nextLink:
          type: string
    RunStatus:
      type: string
      enum:
        - queued
        - in_progress
        - requires_action
        - cancelling
        - cancelled
        - failed
        - completed
        - expired
    RequiredAction:
      type: object
      description: "An abstract representation of a required action for an agent thread run to continue. You probably want to use the sub-classes and not this class directly. Known sub-classes are: SubmitToolApprovalAction, SubmitToolOutputsAction"
      properties:
        type:
          type: string
          description: The object type. Required. Default value is None.
      required:
        - type
    RunError:
      type: object
      description: The details of an error as encountered by an agent thread run.
      properties:
        code:
          type: string
          description: The status for the error. Required.
        message:
          type: string
          description: The human-readable text associated with the error. Required.
      required:
        - code
        - message
    ToolDefinition:
      type: object
      description: "An abstract representation of an input tool definition that an agent can use. You probably want to use the sub-classes and not this class directly. Known sub-classes are: AzureAISearchToolDefinition, AzureFunctionToolDefinition, BingCustomSearchToolDefinition, BingGroundingToolDefinition, BrowserAutomationToolDefinition, CodeInterpreterToolDefinition, ComputerUseToolDefinition, ConnectedAgentToolDefinition, DeepResearchToolDefinition, MicrosoftFabricToolDefinition, FileSearchToolDefinition, FunctionToolDefinition, MCPToolDefinition, OpenApiToolDefinition, SharepointToolDefinition"
      properties:
        type:
          type: string
          description: The object type. Required. Default value is None.
      required:
        - type
    IncompleteRunDetails:
      type: object
      description: Details on why the run is incomplete. Will be `null` if the run is not incomplete.
      properties:
        reason:
          $ref: "#/components/schemas/IncompleteDetailsReason"
          description: 'The reason why the run is incomplete. This indicates which specific token limit was reached during the run. Required. Known values are: "max_completion_tokens" and "max_prompt_tokens".'
      required:
        - reason
    IncompleteDetailsReason:
      type: string
      enum:
        - max_completion_tokens
        - max_prompt_tokens
    RunCompletionUsage:
      type: object
      description: Usage statistics related to the run. This value will be `null` if the run is not in a terminal state (i.e. `in_progress`, `queued`, etc.).
      properties:
        completion_tokens:
          type: integer
          description: Number of completion tokens used over the course of the run. Required.
        prompt_tokens:
          type: integer
          description: Number of prompt tokens used over the course of the run. Required.
        total_tokens:
          type: integer
          description: Total number of tokens used (prompt + completion). Required.
      required:
        - completion_tokens
        - prompt_tokens
        - total_tokens
    TruncationObject:
      type: object
      description: Controls for how a thread will be truncated prior to the run. Use this to control the initial context window of the run.
      properties:
        type:
          $ref: "#/components/schemas/TruncationStrategy"
          description: 'The truncation strategy to use for the thread. The default is `auto`. If set to `last_messages`, the thread will be truncated to the `lastMessages` count most recent messages in the thread. When set to `auto`, messages in the middle of the thread will be dropped to fit the context length of the model, `max_prompt_tokens`. Required. Known values are: "auto" and "last_messages".'
        last_messages:
          type: integer
          description: The number of most recent messages from the thread when constructing the context for the run.
      required:
        - type
    TruncationStrategy:
      type: string
      enum:
        - auto
        - last_messages
    ToolResources:
      type: object
      description: A set of resources that are used by the agent's tools. The resources are specific to the type of tool. For example, the `code_interpreter` tool requires a list of file IDs, while the `file_search` tool requires a list of vector store IDs.
      properties:
        code_interpreter:
          $ref: "#/components/schemas/CodeInterpreterToolResource"
          description: Resources to be used by the `code_interpreter` tool consisting of file IDs.
        file_search:
          $ref: "#/components/schemas/FileSearchToolResource"
          description: Resources to be used by the `file_search` tool consisting of vector store IDs.
        azure_ai_search:
          $ref: "#/components/schemas/AzureAISearchToolResource"
          description: Resources to be used by the `azure_ai_search` tool consisting of index IDs and names.
        mcp:
          type: array
          items:
            $ref: "#/components/schemas/MCPToolResource"
          description: Resources to be used by the `mcp` tool consisting of a server label and headers.
    CodeInterpreterToolResource:
      type: object
      description: A set of resources that are used by the `code_interpreter` tool.
      properties:
        file_ids:
          type: array
          items:
            type: string
          description: A list of file IDs made available to the `code_interpreter` tool. There can be a maximum of 20 files associated with the tool.
        data_sources:
          type: array
          items:
            $ref: "#/components/schemas/VectorStoreDataSource"
          description: The data sources to be used. This option is mutually exclusive with the `fileIds` property.
    FileSearchToolResource:
      type: object
      description: A set of resources that are used by the `file_search` tool.
      properties:
        vector_store_ids:
          type: array
          items:
            type: string
          description: The ID of the vector store attached to this agent. There can be a maximum of 1 vector store attached to the agent.
        vector_stores:
          type: array
          items:
            $ref: "#/components/schemas/VectorStoreConfigurations"
          description: The list of vector store configuration objects from Azure. This list is limited to one element. The only element of this list contains the list of azure asset IDs used by the search tool.
    VectorStoreConfigurations:
      type: object
      description: The structure, containing the list of vector storage configurations i.e. the list of azure asset IDs.
      properties:
        name:
          type: string
          description: Name. Required.
        configuration:
          $ref: "#/components/schemas/VectorStoreConfiguration"
          description: Configurations. Required.
      required:
        - name
        - configuration
    VectorStoreConfiguration:
      type: object
      description: Vector storage configuration is the list of data sources, used when multiple files can be used for the enterprise file search.
      properties:
        data_sources:
          type: array
          items:
            $ref: "#/components/schemas/VectorStoreDataSource"
          description: Data sources. Required.
      required:
        - data_sources
    AzureAISearchToolResource:
      type: object
      description: A set of index resources used by the `azure_ai_search` tool.
      properties:
        indexes:
          type: array
          items:
            $ref: "#/components/schemas/AISearchIndexResource"
          description: The indices attached to this agent. There can be a maximum of 1 index resource attached to the agent.
    AISearchIndexResource:
      type: object
      description: A AI Search Index resource.
      properties:
        index_connection_id:
          type: string
          description: An index connection id in an IndexResource attached to this agent.
        index_name:
          type: string
          description: The name of an index in an IndexResource attached to this agent.
        query_type:
          $ref: "#/components/schemas/AzureAISearchQueryType"
          description: 'Type of query in an AIIndexResource attached to this agent. Known values are: "simple", "semantic", "vector", "vector_simple_hybrid", and "vector_semantic_hybrid".'
        top_k:
          type: integer
          description: Number of documents to retrieve from search and present to the model.
        filter:
          type: string
          description: filter string for search resource.
        index_asset_id:
          type: string
          description: Index asset id for search resource.
    AzureAISearchQueryType:
      type: string
      enum:
        - simple
        - semantic
        - vector
        - vector_simple_hybrid
        - vector_semantic_hybrid
    MCPToolResource:
      type: object
      description: A set of resources that are used by the `mcp` tool.
      properties:
        server_label:
          type: string
          description: The label for the MCP server. Required.
        headers:
          type: object
          properties: {}
          description: The headers for the MCP server updates. Required.
        require_approval:
          type: object
          properties: {}
          description: 'Does MCP server require approval. Is one of the following types: str, Literal["never"], Literal["always"], MCPApprovalPerTool'
      required:
        - server_label
        - headers
    ThreadRun:
      type: object
      description: Data representing a single evaluation run of an agent thread.
      properties:
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints. Required.
        object:
          type: string
          description: The object type, which is always 'thread.run'. Required. Default value is "thread.run".
        thread_id:
          type: string
          description: The ID of the thread associated with this run. Required.
        assistant_id:
          type: string
          description: The ID of the agent associated with the thread this run was performed against. Required.
        status:
          $ref: "#/components/schemas/RunStatus"
          description: 'The status of the agent thread run. Required. Known values are: "queued", "in_progress", "requires_action", "cancelling", "cancelled", "failed", "completed", and "expired".'
        required_action:
          $ref: "#/components/schemas/RequiredAction"
          description: The details of the action required for the agent thread run to continue.
        last_error:
          $ref: "#/components/schemas/RunError"
          description: The last error, if any, encountered by this agent thread run. Required.
        model:
          type: string
          description: The ID of the model to use. Required.
        instructions:
          type: string
          description: The overridden system instructions used for this agent thread run. Required.
        tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolDefinition"
          description: The overridden enabled tools used for this agent thread run. Required.
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this object was created. Required.
        expires_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this item expires. Required.
        started_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this item was started. Required.
        completed_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this completed. Required.
        cancelled_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this was cancelled. Required.
        failed_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this failed. Required.
        incomplete_details:
          $ref: "#/components/schemas/IncompleteRunDetails"
          description: Details on why the run is incomplete. Will be `null` if the run is not incomplete. Required.
        usage:
          $ref: "#/components/schemas/RunCompletionUsage"
          description: Usage statistics related to the run. This value will be `null` if the run is not in a terminal state (i.e. `in_progress`, `queued`, etc.). Required.
        temperature:
          type: number
          description: The sampling temperature used for this run. If not set, defaults to 1.
        top_p:
          type: number
          description: The nucleus sampling value used for this run. If not set, defaults to 1.
        max_prompt_tokens:
          type: integer
          description: The maximum number of prompt tokens specified to have been used over the course of the run. Required.
        max_completion_tokens:
          type: integer
          description: The maximum number of completion tokens specified to have been used over the course of the run. Required.
        truncation_strategy:
          $ref: "#/components/schemas/TruncationObject"
          description: The strategy to use for dropping messages as the context windows moves forward. Required.
        tool_choice:
          type: object
          properties: {}
          description: 'Controls whether or not and which tool is called by the model. Required. Is one of the following types: str, Union[str, "_models.AgentsToolChoiceOptionMode"], AgentsNamedToolChoice'
        response_format:
          type: object
          properties: {}
          description: 'The response format of the tool calls used in this run. Required. Is one of the following types: str, Union[str, "_models.AgentsResponseFormatMode"], AgentsResponseFormat, ResponseFormatJsonSchemaType'
        metadata:
          type: object
          properties: {}
          description: A set of up to 16 key/value pairs that can be attached to an object, used for storing additional information about that object in a structured format. Keys may be up to 64 characters in length and values may be up to 512 characters in length. Required.
        tool_resources:
          $ref: "#/components/schemas/ToolResources"
          description: Override the tools the agent can use for this run. This is useful for modifying the behavior on a per-run basis.
        parallel_tool_calls:
          type: boolean
          description: Determines if tools can be executed in parallel within the run. Required.
      required:
        - id
        - object
        - thread_id
        - assistant_id
        - status
        - last_error
        - model
        - instructions
        - tools
        - created_at
        - expires_at
        - started_at
        - completed_at
        - cancelled_at
        - failed_at
        - incomplete_details
        - usage
        - max_prompt_tokens
        - max_completion_tokens
        - truncation_strategy
        - tool_choice
        - response_format
        - metadata
        - parallel_tool_calls
    PagedThreadRun:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ThreadRun"
        nextLink:
          type: string
    AgentThread:
      type: object
      description: Information about a single thread associated with an agent.
      properties:
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints. Required.
        object:
          type: string
          description: The object type, which is always 'thread'. Required. Default value is "thread".
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this object was created. Required.
        tool_resources:
          $ref: "#/components/schemas/ToolResources"
          description: A set of resources that are made available to the agent's tools in this thread. The resources are specific to the type of tool. For example, the `code_interpreter` tool requires a list of file IDs, while the `file_search` tool requires a list of vector store IDs. Required.
        metadata:
          type: object
          properties: {}
          description: A set of up to 16 key/value pairs that can be attached to an object, used for storing additional information about that object in a structured format. Keys may be up to 64 characters in length and values may be up to 512 characters in length. Required.
      required:
        - id
        - object
        - created_at
        - tool_resources
        - metadata
    PagedAgentThread:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AgentThread"
        nextLink:
          type: string
    VectorStoreFileBatchStatus:
      type: string
      enum:
        - in_progress
        - completed
        - cancelled
        - failed
    VectorStoreFileCount:
      type: object
      description: Counts of files processed or being processed by this vector store grouped by status.
      properties:
        in_progress:
          type: integer
          description: The number of files that are currently being processed. Required.
        completed:
          type: integer
          description: The number of files that have been successfully processed. Required.
        failed:
          type: integer
          description: The number of files that have failed to process. Required.
        cancelled:
          type: integer
          description: The number of files that were cancelled. Required.
        total:
          type: integer
          description: The total number of files. Required.
      required:
        - in_progress
        - completed
        - failed
        - cancelled
        - total
    VectorStoreFileBatch:
      type: object
      description: A batch of files attached to a vector store.
      properties:
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints. Required.
        object:
          type: string
          description: The object type, which is always `vector_store.file_batch`. Required. Default value is "vector_store.files_batch".
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) for when the vector store files batch was created. Required.
        vector_store_id:
          type: string
          description: The ID of the vector store that the file is attached to. Required.
        status:
          $ref: "#/components/schemas/VectorStoreFileBatchStatus"
          description: 'The status of the vector store files batch, which can be either `in_progress`, `completed`, `cancelled` or `failed`. Required. Known values are: "in_progress", "completed", "cancelled", and "failed".'
        file_counts:
          $ref: "#/components/schemas/VectorStoreFileCount"
          description: Files count grouped by status processed or being processed by this vector store. Required.
      required:
        - id
        - object
        - created_at
        - vector_store_id
        - status
        - file_counts
    VectorStoreFileStatus:
      type: string
      enum:
        - in_progress
        - completed
        - failed
        - cancelled
    VectorStoreFileError:
      type: object
      description: Details on the error that may have occurred while processing a file for this vector store.
      properties:
        code:
          $ref: "#/components/schemas/VectorStoreFileErrorCode"
          description: 'One of `server_error` or `rate_limit_exceeded`. Required. Known values are: "server_error", "invalid_file", and "unsupported_file".'
        message:
          type: string
          description: A human-readable description of the error. Required.
      required:
        - code
        - message
    VectorStoreFileErrorCode:
      type: string
      enum:
        - server_error
        - invalid_file
        - unsupported_file
    VectorStoreChunkingStrategyResponse:
      type: object
      description: "An abstract representation of a vector store chunking strategy configuration. You probably want to use the sub-classes and not this class directly. Known sub-classes are: VectorStoreAutoChunkingStrategyResponse, VectorStoreStaticChunkingStrategyResponse"
      properties:
        type:
          type: string
          description: 'The object type. Required. Known values are: "other" and "static".'
      required:
        - type
    VectorStoreFile:
      type: object
      description: Description of a file attached to a vector store.
      properties:
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints. Required.
        object:
          type: string
          description: The object type, which is always `vector_store.file`. Required. Default value is "vector_store.file".
        usage_bytes:
          type: integer
          description: The total vector store usage in bytes. Note that this may be different from the original file size. Required.
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) for when the vector store file was created. Required.
        vector_store_id:
          type: string
          description: The ID of the vector store that the file is attached to. Required.
        status:
          $ref: "#/components/schemas/VectorStoreFileStatus"
          description: 'The status of the vector store file, which can be either `in_progress`, `completed`, `cancelled`, or `failed`. The status `completed` indicates that the vector store file is ready for use. Required. Known values are: "in_progress", "completed", "failed", and "cancelled".'
        last_error:
          $ref: "#/components/schemas/VectorStoreFileError"
          description: The last error associated with this vector store file. Will be `null` if there are no errors. Required.
        chunking_strategy:
          $ref: "#/components/schemas/VectorStoreChunkingStrategyResponse"
          description: The strategy used to chunk the file. Required.
      required:
        - id
        - object
        - usage_bytes
        - created_at
        - vector_store_id
        - status
        - last_error
        - chunking_strategy
    PagedVectorStoreFile:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/VectorStoreFile"
        nextLink:
          type: string
    VectorStoreStatus:
      type: string
      enum:
        - expired
        - in_progress
        - completed
    VectorStoreExpirationPolicy:
      type: object
      description: The expiration policy for a vector store.
      properties:
        anchor:
          $ref: "#/components/schemas/VectorStoreExpirationPolicyAnchor"
          description: 'Anchor timestamp after which the expiration policy applies. Supported anchors: `last_active_at`. Required. "last_active_at"'
        days:
          type: integer
          description: The anchor timestamp after which the expiration policy applies. Required.
      required:
        - anchor
        - days
    VectorStoreExpirationPolicyAnchor:
      type: string
      enum:
        - last_active_at
    VectorStore:
      type: object
      description: A vector store is a collection of processed files can be used by the `file_search` tool.
      properties:
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints. Required.
        object:
          type: string
          description: The object type, which is always `vector_store`. Required. Default value is "vector_store".
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) for when the vector store was created. Required.
        name:
          type: string
          description: The name of the vector store. Required.
        usage_bytes:
          type: integer
          description: The total number of bytes used by the files in the vector store. Required.
        file_counts:
          $ref: "#/components/schemas/VectorStoreFileCount"
          description: Files count grouped by status processed or being processed by this vector store. Required.
        status:
          $ref: "#/components/schemas/VectorStoreStatus"
          description: 'The status of the vector store, which can be either `expired`, `in_progress`, or `completed`. A status of `completed` indicates that the vector store is ready for use. Required. Known values are: "expired", "in_progress", and "completed".'
        expires_after:
          $ref: "#/components/schemas/VectorStoreExpirationPolicy"
          description: Details on when this vector store expires.
        expires_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) for when the vector store will expire.
        last_active_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) for when the vector store was last active. Required.
        metadata:
          type: object
          properties: {}
          description: A set of up to 16 key/value pairs that can be attached to an object, used for storing additional information about that object in a structured format. Keys may be up to 64 characters in length and values may be up to 512 characters in length. Required.
      required:
        - id
        - object
        - created_at
        - name
        - usage_bytes
        - file_counts
        - status
        - last_active_at
        - metadata
    PagedVectorStore:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/VectorStore"
        nextLink:
          type: string
    Agent:
      type: object
      description: Represents an agent that can call the model and use tools.
      properties:
        id:
          type: string
          description: The identifier, which can be referenced in API endpoints. Required.
        object:
          type: string
          description: The object type, which is always assistant. Required. Default value is "assistant".
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp, in seconds, representing when this object was created. Required.
        name:
          type: string
          description: The name of the agent. Required.
        description:
          type: string
          description: The description of the agent. Required.
        model:
          type: string
          description: The ID of the model to use. Required.
        instructions:
          type: string
          description: The system instructions for the agent to use. Required.
        tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolDefinition"
          description: The collection of tools enabled for the agent. Required.
        tool_resources:
          $ref: "#/components/schemas/ToolResources"
          description: A set of resources that are used by the agent's tools. The resources are specific to the type of tool. For example, the `code_interpreter` tool requires a list of file IDs, while the `file_search` tool requires a list of vector store IDs. Required.
        temperature:
          type: number
          description: What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic. Required.
        top_p:
          type: number
          description: An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. So 0.1 means only the tokens comprising the top 10% probability mass are considered. We generally recommend altering this or temperature but not both. Required.
        response_format:
          type: object
          properties: {}
          description: 'The response format of the tool calls used by this agent. Is one of the following types: str, Union[str, "_models.AgentsResponseFormatMode"], AgentsResponseFormat, ResponseFormatJsonSchemaType'
        metadata:
          type: object
          properties: {}
          description: A set of up to 16 key/value pairs that can be attached to an object, used for storing additional information about that object in a structured format. Keys may be up to 64 characters in length and values may be up to 512 characters in length. Required.
      required:
        - id
        - object
        - created_at
        - name
        - description
        - model
        - instructions
        - tools
        - tool_resources
        - temperature
        - top_p
        - metadata
    PagedAgent:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        nextLink:
          type: string
