paths:
  /files/{file_id}?api-version=2025-05-15-preview:
    get:
      operationId: Files_get
      description: Returns information about a specific file. Does not retrieve file content.
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the file to retrieve. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfo"
  /files?api-version=2025-05-15-preview:
    get:
      operationId: Files_list
      description: Gets a list of previously uploaded files.
      parameters:
        - name: purpose
          in: query
          required: false
          schema:
            type: string
          description: 'The purpose of the file. Known values are: "assistants", "assistants_output", and "vision". Default value is None.'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"
  /threads/{thread_id}/messages/{message_id}?api-version=2025-05-15-preview:
    get:
      operationId: Messages_get
      description: Retrieves an existing message.
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
          description: Identifier of the thread. Required.
        - name: message_id
          in: path
          required: true
          schema:
            type: string
          description: Identifier of the message. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadMessage"
    post:
      operationId: Messages_update
      description: Modifies an existing message on an existing thread.
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
          description: Identifier of the thread. Required.
        - name: message_id
          in: path
          required: true
          schema:
            type: string
          description: Identifier of the message. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadMessage"
  /threads/{thread_id}/messages?api-version=2025-05-15-preview:
    get:
      operationId: Messages_list
