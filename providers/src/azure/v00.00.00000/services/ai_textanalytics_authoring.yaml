openapi: 3.0.0
servers:
  - url: https://{endpoint}/language
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `Endpoint` parameter.
info:
  title: Text Authoring Client
  description: TextAuthoringClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-05-15-preview-stackql-generated
  x-serviceAlias: ai_textanalytics_authoring
  x-sdkPackage: azure-ai-textanalytics-authoring
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    DeploymentResource:
      type: object
      description: Represents an Azure resource assigned to a deployment.
      properties:
        resourceId:
          type: string
          description: Represents the Azure resource Id. Required.
        region:
          type: string
          description: Represents the resource region. Required.
      required:
        - resourceId
        - region
    ProjectDeployment:
      type: object
      description: Represents a project deployment.
      properties:
        deploymentName:
          type: string
          description: Represents deployment name. Required.
        modelId:
          type: string
          description: Represents deployment modelId. Required.
        lastTrainedDateTime:
          type: string
          format: date-time
          description: Represents deployment last trained time. Required.
        lastDeployedDateTime:
          type: string
          format: date-time
          description: Represents deployment last deployed time. Required.
        deploymentExpirationDate:
          type: string
          format: date
          description: Represents deployment expiration date in the runtime. Required.
        modelTrainingConfigVersion:
          type: string
          description: Represents model training config version. Required.
        assignedResources:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentResource"
          description: Represents the metadata of the assigned Azure resources. Required.
      required:
        - modelId
        - lastTrainedDateTime
        - lastDeployedDateTime
        - deploymentExpirationDate
        - modelTrainingConfigVersion
        - assignedResources
    ExportedTrainedModel:
      type: object
      description: Represents an exported trained model.
      properties:
        exportedModelName:
          type: string
          description: The exported model name. Required.
        modelId:
          type: string
          description: The model ID. Required.
        lastTrainedDateTime:
          type: string
          format: date-time
          description: The last trained date time of the model. Required.
        lastExportedModelDateTime:
          type: string
          format: date-time
          description: The last exported date time of the model. Required.
        modelExpirationDate:
          type: string
          format: date
          description: The model expiration date. Required.
        modelTrainingConfigVersion:
          type: string
          description: The model training config version. Required.
      required:
        - modelId
        - lastTrainedDateTime
        - lastExportedModelDateTime
        - modelExpirationDate
        - modelTrainingConfigVersion
    ModelFile:
      type: object
      description: Represents the properties for the model file.
      properties:
        name:
          type: string
          description: The name of the file. Required.
        contentUri:
          type: string
          description: The URI to retrieve the content of the file. Required.
      required:
        - name
        - contentUri
    ExportedModelManifest:
      type: object
      description: Represents the properties for the exported model manifest.
      properties:
        modelFiles:
          type: array
          items:
            $ref: "#/components/schemas/ModelFile"
          description: The model files belonging to this model. Required.
      required:
        - modelFiles
    ProjectTrainedModel:
      type: object
      description: Represents a trained model.
      properties:
        label:
          type: string
          description: The trained model label. Required.
        modelId:
          type: string
          description: The model ID. Required.
        lastTrainedDateTime:
          type: string
          format: date-time
          description: The last trained date time of the model. Required.
        lastTrainingDurationInSeconds:
          type: integer
          description: The duration of the model's last training request in seconds. Required.
        modelExpirationDate:
          type: string
          format: date
          description: The model expiration date. Required.
        modelTrainingConfigVersion:
          type: string
          description: The model training config version. Required.
        hasSnapshot:
          type: boolean
          description: The flag to indicate if the trained model has a snapshot ready. Required.
      required:
        - modelId
        - lastTrainedDateTime
        - lastTrainingDurationInSeconds
        - modelExpirationDate
        - modelTrainingConfigVersion
        - hasSnapshot
    PagedProjectTrainedModel:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ProjectTrainedModel"
        nextLink:
          type: string
    OperationStatus:
      type: string
      enum:
        - notStarted
        - running
        - succeeded
        - failed
        - cancelled
        - cancelling
        - partiallyCompleted
    TrainingJobResult:
      type: object
      description: Represents the output of a training job.
      properties:
        modelLabel:
          type: string
          description: Represents trained model label. Required.
        trainingConfigVersion:
          type: string
          description: Represents training config version. Required.
        trainingStatus:
          $ref: "#/components/schemas/SubTrainingState"
          description: Represents model train status. Required.
        evaluationStatus:
          $ref: "#/components/schemas/SubTrainingState"
          description: Represents model evaluation status.
        estimatedEndDateTime:
          type: string
          format: date-time
          description: Represents the estimate end date time for training and evaluation.
      required:
        - modelLabel
        - trainingConfigVersion
        - trainingStatus
    SubTrainingState:
      type: object
      description: Represents the detailed state of a training sub-operation.
      properties:
        percentComplete:
          type: integer
          description: Represents progress percentage. Required.
        startDateTime:
          type: string
          format: date-time
          description: Represents the start date time.
        endDateTime:
          type: string
          format: date-time
          description: Represents the end date time.
        status:
          $ref: "#/components/schemas/OperationStatus"
          description: 'Represents the status of the sub-operation. Required. Known values are: "notStarted", "running", "succeeded", "failed", "cancelled", "cancelling", and "partiallyCompleted".'
      required:
        - percentComplete
        - status
    TrainingState:
      type: object
      description: Represents the state of a training job.
      properties:
        jobId:
          type: string
          description: The job ID. Required.
        createdDateTime:
          type: string
          format: date-time
          description: The creation date time of the job. Required.
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: The last date time the job was updated. Required.
        expirationDateTime:
          type: string
          format: date-time
          description: The expiration date time of the job.
        status:
          $ref: "#/components/schemas/OperationStatus"
          description: 'The job status. Required. Known values are: "notStarted", "running", "succeeded", "failed", "cancelled", "cancelling", and "partiallyCompleted".'
        warnings:
          type: array
          items:
            type: object
            properties: {}
          description: The warnings that were encountered while executing the job.
        errors:
          type: array
          items:
            type: object
            properties: {}
          description: The errors encountered while executing the job.
        result:
          $ref: "#/components/schemas/TrainingJobResult"
          description: Represents training tasks detailed result. Required.
      required:
        - createdDateTime
        - lastUpdatedDateTime
        - status
        - result
    PagedTrainingState:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TrainingState"
        nextLink:
          type: string
    AssignedDeploymentResource:
      type: object
      description: Represents the assigned deployment resource.
      properties:
        azureResourceId:
          type: string
          description: The resource ID. Required.
        region:
          type: string
          description: The resource region. Required.
      required:
        - region
    PagedAssignedDeploymentResource:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AssignedDeploymentResource"
        nextLink:
          type: string
    PagedProjectDeployment:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ProjectDeployment"
        nextLink:
          type: string
    PagedExportedTrainedModel:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ExportedTrainedModel"
        nextLink:
          type: string
    ProjectKind:
      type: string
      enum:
        - CustomSingleLabelClassification
        - CustomMultiLabelClassification
        - CustomEntityRecognition
        - CustomAbstractiveSummarization
        - CustomHealthcare
        - CustomTextSentiment
    ProjectSettings:
      type: object
      description: Represents the settings used to define the project behavior.
      properties:
        confidenceThreshold:
          type: number
          description: The threshold of the class with the highest confidence, at which the prediction will automatically be changed to "None". The value of the threshold should be between 0 and 1 inclusive.
        amlProjectPath:
          type: string
          description: The path to the AML connected project.
        isLabelingLocked:
          type: boolean
          description: Indicates whether the labeling experience can be modified or not.
        runGptPredictions:
          type: boolean
          description: Indicates whether to run GPT predictions or not.
        gptPredictiveLookahead:
          type: integer
          description: The predictive lookahead for GPT predictions that is specified by the user.
    ProjectDetails:
      type: object
      description: Represents the metadata of a project.
      properties:
        createdDateTime:
          type: string
          format: date-time
          description: Represents the project creation datetime. Required.
        lastModifiedDateTime:
          type: string
          format: date-time
          description: Represents the project last modification datetime. Required.
        lastTrainedDateTime:
          type: string
          format: date-time
          description: Represents the project last training datetime.
        lastDeployedDateTime:
          type: string
          format: date-time
          description: Represents the project last deployment datetime.
        projectKind:
          $ref: "#/components/schemas/ProjectKind"
          description: 'The project kind. Required. Known values are: "CustomSingleLabelClassification", "CustomMultiLabelClassification", "CustomEntityRecognition", "CustomAbstractiveSummarization", "CustomHealthcare", and "CustomTextSentiment".'
        storageInputContainerName:
          type: string
          description: The storage container name. Required.
        settings:
          $ref: "#/components/schemas/ProjectSettings"
          description: The project settings.
        projectName:
          type: string
          description: The new project name. Required.
        multilingual:
          type: boolean
          description: Whether the project would be used for multiple languages or not.
        description:
          type: string
          description: The project description.
        language:
          type: string
          description: The project language. This is BCP-47 representation of a language. For example, use "en" for English, "en-gb" for English (UK), "es" for Spanish etc. Required.
      required:
        - createdDateTime
        - lastModifiedDateTime
        - projectKind
        - storageInputContainerName
        - language
    ResourceMetadata:
      type: object
      description: Represents metadata for the Azure resource..
      properties:
        azureResourceId:
          type: string
          description: Represents the Azure resource ID. Required.
        customDomain:
          type: string
          description: Represents the Azure resource custom domain. Required.
        region:
          type: string
          description: Represents the Azure resource region. Required.
      required:
        - azureResourceId
        - customDomain
        - region
    StringIndexType:
      type: string
      enum:
        - Utf16CodeUnit
    CreateProjectOptions:
      type: object
      description: Represents the options used to create or update a project.
      properties:
        projectKind:
          $ref: "#/components/schemas/ProjectKind"
          description: 'The project kind. Required. Known values are: "CustomSingleLabelClassification", "CustomMultiLabelClassification", "CustomEntityRecognition", "CustomAbstractiveSummarization", "CustomHealthcare", and "CustomTextSentiment".'
        storageInputContainerName:
          type: string
          description: The storage container name. Required.
        settings:
          $ref: "#/components/schemas/ProjectSettings"
          description: The project settings.
        projectName:
          type: string
          description: The new project name. Required.
        multilingual:
          type: boolean
          description: Whether the project would be used for multiple languages or not.
        description:
          type: string
          description: The project description.
        language:
          type: string
          description: The project language. This is BCP-47 representation of a language. For example, use "en" for English, "en-gb" for English (UK), "es" for Spanish etc. Required.
      required:
        - projectKind
        - storageInputContainerName
        - projectName
        - language
    ExportedProjectAsset:
      type: object
      description: "Represents the assets of an exported project. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ExportedCustomAbstractiveSummarizationProjectAsset, ExportedCustomEntityRecognitionProjectAsset, ExportedCustomHealthcareProjectAsset, ExportedCustomMultiLabelClassificationProjectAsset, ExportedCustomSingleLabelClassificationProjectAsset, CustomTextSentimentProjectAssets"
      properties:
        projectKind:
          type: string
          description: 'Required. Known values are: "CustomSingleLabelClassification", "CustomMultiLabelClassification", "CustomEntityRecognition", "CustomAbstractiveSummarization", "CustomHealthcare", and "CustomTextSentiment".'
      required:
        - projectKind
    CopyProjectDetails:
      type: object
      description: Represents the options for copying an existing project to another Azure resource.
      properties:
        projectKind:
          $ref: "#/components/schemas/ProjectKind"
          description: 'Represents the project kind. Required. Known values are: "CustomSingleLabelClassification", "CustomMultiLabelClassification", "CustomEntityRecognition", "CustomAbstractiveSummarization", "CustomHealthcare", and "CustomTextSentiment".'
        targetProjectName:
          type: string
          description: The project name to be copied-into. Required.
        accessToken:
          type: string
          description: The access token. Required.
        expiresAt:
          type: string
          format: date-time
          description: The expiration of the access token. Required.
        targetResourceId:
          type: string
          description: Represents the target Azure resource ID. Required.
        targetResourceRegion:
          type: string
          description: Represents the target Azure resource region. Required.
      required:
        - projectKind
        - targetProjectName
        - accessToken
        - expiresAt
        - targetResourceId
        - targetResourceRegion
    EvaluationDetails:
      type: object
      description: Represents the options used running the evaluation.
      properties:
        kind:
          $ref: "#/components/schemas/EvaluationKind"
          description: 'Represents the evaluation kind. By default, the evaluation kind is set to percentage. Known values are: "percentage" and "manual".'
        trainingSplitPercentage:
          type: integer
          description: Represents the training dataset split percentage. Only needed in case the evaluation kind is percentage.
        testingSplitPercentage:
          type: integer
          description: Represents the testing dataset split percentage. Only needed in case the evaluation kind is percentage.
    EvaluationKind:
      type: string
      enum:
        - percentage
        - manual
    DataGenerationSetting:
      type: object
      description: Represents the settings for using data generation as part of training a custom model.
      properties:
        enableDataGeneration:
          type: boolean
          description: If set to true, augment customer provided training data with synthetic data to improve model quality. Required.
        dataGenerationConnectionInfo:
          $ref: "#/components/schemas/DataGenerationConnectionInfo"
          description: Represents the connection info for the Azure resource to use during data generation as part of training a custom model. Required.
      required:
        - enableDataGeneration
        - dataGenerationConnectionInfo
    DataGenerationConnectionInfo:
      type: object
      description: Represents the connection info for the Azure resource to use during data generation as part of training a custom model.
      properties:
        kind:
          type: string
          description: Connection type for data generation settings. Currently only supports Azure Open AI. Required. Default value is "AzureOpenAI".
        resourceId:
          type: string
          description: Resource ID for the data generation resource. Looks something like "/subscriptions//resourceGroups//providers/Microsoft.CognitiveServices/accounts/". Required.
        deploymentName:
          type: string
          description: Deployment name of model to be used for synthetic data generation. Required.
      required:
        - kind
        - resourceId
        - deploymentName
    DocumentEvalResult:
      type: object
      description: "Represents the evaluation result of a document. You probably want to use the sub-classes and not this class directly. Known sub-classes are: CustomEntityRecognitionDocumentEvalResult, CustomHealthcareDocumentEvalResult, CustomMultiLabelClassificationDocumentEvalResult, CustomSingleLabelClassificationDocumentEvalResult, CustomTextSentimentDocumentEvalResult"
      properties:
        projectKind:
          type: string
          description: 'Represents the project kind. Required. Known values are: "CustomSingleLabelClassification", "CustomMultiLabelClassification", "CustomEntityRecognition", "CustomAbstractiveSummarization", "CustomHealthcare", and "CustomTextSentiment".'
        location:
          type: string
          description: Represents the document path. Required.
        language:
          type: string
          description: Represents the document language. This is BCP-47 representation of a language. For example, use "en" for English, "en-gb" for English (UK), "es" for Spanish etc. Required.
      required:
        - location
        - language
    PagedDocumentEvalResult:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DocumentEvalResult"
        nextLink:
          type: string
    EvalSummary:
      type: object
      description: "Represents the summary for an evaluation operation. You probably want to use the sub-classes and not this class directly. Known sub-classes are: CustomEntityRecognitionEvalSummary, CustomHealthcareEvalSummary, CustomMultiLabelClassificationEvalSummary, CustomSingleLabelClassificationEvalSummary, CustomTextSentimentEvalSummary"
      properties:
        projectKind:
          type: string
          description: 'Represents the project type that the evaluation ran on. Required. Known values are: "CustomSingleLabelClassification", "CustomMultiLabelClassification", "CustomEntityRecognition", "CustomAbstractiveSummarization", "CustomHealthcare", and "CustomTextSentiment".'
        evaluationOptions:
          $ref: "#/components/schemas/EvaluationDetails"
          description: Represents the options used running the evaluation. Required.
      required:
        - projectKind
        - evaluationOptions
    EvaluationJobResult:
      type: object
      description: EvaluationJobResult.
      properties:
        evaluationOptions:
          $ref: "#/components/schemas/EvaluationDetails"
          description: Represents the options used running the evaluation. Required.
        modelLabel:
          type: string
          description: Represents trained model label. Required.
        trainingConfigVersion:
          type: string
          description: Represents training config version. Required.
        percentComplete:
          type: integer
          description: Represents progress percentage. Required.
      required:
        - evaluationOptions
        - modelLabel
        - trainingConfigVersion
        - percentComplete
    PagedProjectDetails:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ProjectDetails"
        nextLink:
          type: string
    SupportedLanguage:
      type: object
      description: Represents a supported language.
      properties:
        languageName:
          type: string
          description: The language name. Required.
        languageCode:
          type: string
          description: The language code. This is BCP-47 representation of a language. For example, "en" for English, "en-gb" for English (UK), "es" for Spanish etc. Required.
      required:
        - languageCode
    PagedSupportedLanguage:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/SupportedLanguage"
        nextLink:
          type: string
    AssignedProjectDeploymentMetadata:
      type: object
      description: Represents the metadata for an assigned deployment.
      properties:
        deploymentName:
          type: string
          description: Represents the deployment name. Required.
        lastDeployedDateTime:
          type: string
          format: date-time
          description: Represents deployment last deployed time. Required.
        deploymentExpirationDate:
          type: string
          format: date
          description: Represents deployment expiration date in the runtime. Required.
      required:
        - deploymentName
        - lastDeployedDateTime
        - deploymentExpirationDate
    AssignedProjectDeploymentsMetadata:
      type: object
      description: Represents the metadata for assigned deployments for a project.
      properties:
        projectName:
          type: string
          description: Represents the project name. Required.
        deploymentsMetadata:
          type: array
          items:
            $ref: "#/components/schemas/AssignedProjectDeploymentMetadata"
          description: Represents the resource region. Required.
      required:
        - deploymentsMetadata
    PagedAssignedProjectDeploymentsMetadata:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AssignedProjectDeploymentsMetadata"
        nextLink:
          type: string
    PrebuiltEntity:
      type: object
      description: Represents a supported prebuilt entity.
      properties:
        category:
          type: string
          description: The prebuilt entity category. Required.
        description:
          type: string
          description: The description. Required.
        examples:
          type: string
          description: English examples for the entity. Required.
      required:
        - description
        - examples
    PagedPrebuiltEntity:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/PrebuiltEntity"
        nextLink:
          type: string
    TrainingConfigVersion:
      type: object
      description: Represents a training config version.
      properties:
        trainingConfigVersion:
          type: string
          description: Represents the version of the config. Required.
        modelExpirationDate:
          type: string
          format: date
          description: Represents the training config version expiration date. Required.
      required:
        - modelExpirationDate
    PagedTrainingConfigVersion:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TrainingConfigVersion"
        nextLink:
          type: string
  x-stackQL-resources:
    deployment:
      id: azure.ai_textanalytics_authoring.deployment
      name: deployment
      title: deployment
      methods:
        get_deployment:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1deployments~1{deployment_name}?api-version=2025-05-15-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        deploy_project:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1deployments~1{deployment_name}?api-version=2025-05-15-preview/put"
          response:
            openAPIDocKey: "204"
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_deployment:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1deployments~1{deployment_name}?api-version=2025-05-15-preview/delete"
          response:
            openAPIDocKey: "204"
        delete_deployment_from_resources:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1deployments~1{deployment_name}~1:delete-from-resources?api-version=2025-05-15-preview/post"
          response:
            openAPIDocKey: "204"
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/deployment/methods/get_deployment"
        insert: []
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/deployment/methods/delete_deployment"
    exported_model:
      id: azure.ai_textanalytics_authoring.exported_model
      name: exported_model
      title: exported_model
      methods:
        get_exported_model:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1exported-models~1{exported_model_name}?api-version=2025-05-15-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        delete_exported_model:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1exported-models~1{exported_model_name}?api-version=2025-05-15-preview/delete"
          response:
            openAPIDocKey: "204"
        create_or_update_exported_model:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1exported-models~1{exported_model_name}?api-version=2025-05-15-preview/put"
          response:
            openAPIDocKey: "204"
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        get_exported_model_manifest:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1exported-models~1{exported_model_name}~1manifest?api-version=2025-05-15-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/exported_model/methods/get_exported_model"
        insert:
          - $ref: "#/components/x-stackQL-resources/exported_model/methods/create_or_update_exported_model"
        update: []
        replace:
          - $ref: "#/components/x-stackQL-resources/exported_model/methods/create_or_update_exported_model"
        delete:
          - $ref: "#/components/x-stackQL-resources/exported_model/methods/delete_exported_model"
    project:
      id: azure.ai_textanalytics_authoring.project
      name: project
      title: project
      methods:
        list_trained_models:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1models?api-version=2025-05-15-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.value
          request:
            nativeCasing: camel
        list_training_jobs:
          operation:
            $ref: "#/paths/~1authoring~1analyze-text~1projects~1{project_name}~1train~1jobs?api-version=2025-05-15-preview/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.value
          request:
            nativeCasing: camel
