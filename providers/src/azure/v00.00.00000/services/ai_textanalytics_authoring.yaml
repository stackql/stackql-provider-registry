paths:
  /authoring/analyze-text/projects/{project_name}/deployments/{deployment_name}?api-version=2025-05-15-preview:
    get:
      operationId: Deployment_get_deployment
      description: Gets the details of a deployment.
      parameters:
        - name: deployment_name
          in: path
          required: true
          schema:
            type: string
          description: Represents deployment name. Required.
        - name: project_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDeployment"
    put:
      operationId: Deployment_begin_deploy_project
      description: Creates a new deployment or replaces an existing one.
      parameters:
        - name: deployment_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the specific deployment of the project to use. Required.
        - name: project_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trainedModelLabel:
                  type: string
                  description: Represents the trained model label. Required.
                assignedResourceIds:
                  type: array
                  items:
                    type: string
                  description: Represents the resource IDs to be assigned to the deployment. If provided, the deployment will be rolled out to the resources provided here as well as the original resource in which the project is created.
              required:
                - trainedModelLabel
      responses:
        "204":
          description: Success (no content / accepted)
    delete:
      operationId: Deployment_begin_delete_deployment
      description: Deletes a project deployment.
      parameters:
        - name: deployment_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the specific deployment of the project to use. Required.
        - name: project_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Success (no content / accepted)
  /authoring/analyze-text/projects/{project_name}/deployments/{deployment_name}/:delete-from-resources?api-version=2025-05-15-preview:
    post:
      operationId: Deployment_begin_delete_deployment_from_resources
      description: Deletes a project deployment from the specified assigned resources.
      parameters:
        - name: deployment_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the specific deployment of the project to use. Required.
        - name: project_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assignedResourceIds:
                  type: array
                  items:
                    type: string
                  description: Represents the resource IDs to delete the deployment from. If not provided, the deployment will be rolled out from all the resources it is deployed to. If provided, it will delete the deployment only from the specified assigned resources, and leave it for the rest.
      responses:
        "204":
          description: Success (no content / accepted)
