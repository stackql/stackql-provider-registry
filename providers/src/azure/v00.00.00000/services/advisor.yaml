    put:
      operationId: Configurations_create_in_subscription
      description: Create/Overwrite Azure Advisor configuration. Create/Overwrite Azure Advisor configuration and also delete all configurations of contained resource groups.
      parameters:
        - name: configuration_name
          in: path
          required: true
          schema:
            type: string
          description: Advisor configuration name. Value must be 'default'. "default" Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
