    put:
      operationId: Configurations_create_in_resource_group
      description: Create/Overwrite Azure Advisor configuration. Create/Overwrite Azure Advisor configuration.
      parameters:
        - name: configuration_name
          in: path
          required: true
          schema:
            type: string
          description: Advisor configuration name. Value must be 'default'. "default" Required.
        - name: resource_group
          in: path
          required: true
          schema:
            type: string
          description: The name of the Azure resource group. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: object
                  properties:
                    exclude:
                      type: boolean
                      description: "Exclude the resource from Advisor evaluations. Valid values: False (default) or True."
