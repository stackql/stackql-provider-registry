paths:
  /subscriptions/{subscription_id}/providers/Microsoft.Advisor/configurations?api-version=2020-01-01:
    get:
      operationId: Configurations_list_by_subscription
      description: Retrieve Azure Advisor configurations. Retrieve Azure Advisor configurations and also retrieve configurations of contained resource groups.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedConfigDataFlattened"
  /subscriptions/{subscription_id}/resourceGroups/{resource_group}/providers/Microsoft.Advisor/configurations?api-version=2020-01-01:
    get:
      operationId: Configurations_list_by_resource_group
      description: Retrieve Azure Advisor configurations. Retrieve Azure Advisor configurations.
      parameters:
        - name: resource_group
          in: path
          required: true
          schema:
            type: string
          description: The name of the Azure resource group. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedConfigDataFlattened"
