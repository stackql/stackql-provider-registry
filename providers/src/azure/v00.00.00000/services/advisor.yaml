                      description: "Exclude the resource from Advisor evaluations. Valid values: False (default) or True."
                    lowCpuThreshold:
                      type: string
                      description: 'Minimum percentage threshold for Advisor low CPU utilization evaluation. Valid only for subscriptions. Valid values: 5 (default), 10, 15 or 20. Known values are: "5", "10", "15", and "20".'
                    digests:
                      type: array
                      items:
                        $ref: "#/components/schemas/DigestConfig"
