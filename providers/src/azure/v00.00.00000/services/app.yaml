openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Container Apps (Legacy SDK)
  description: Container Apps management surface from the legacy azure-mgmt-app package (see appcontainers for the current surface).
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: unversioned-stackql-generated
  x-serviceAlias: app
  x-sdkPackage: azure-mgmt-app
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          type: string
          description: 'The type of identity that created the resource. Possible values include: "User", "Application", "ManagedIdentity", "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          type: string
          description: 'The type of identity that last modified the resource. Possible values include: "User", "Application", "ManagedIdentity", "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CertificateProperties:
      type: object
      description: Certificate resource specific properties. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        provisioningState:
          type: string
          description: 'Provisioning state of the certificate. Possible values include: "Succeeded", "Failed", "Canceled", "DeleteFailed", "Pending".'
        password:
          type: string
          description: Certificate password.
        subjectName:
          type: string
          description: Subject name of the certificate.
        value:
          type: string
          format: byte
          description: PFX or PEM blob.
        issuer:
          type: string
          description: Certificate issuer.
        issueDate:
          type: string
          format: date-time
          description: Certificate issue Date.
        expirationDate:
          type: string
          format: date-time
          description: Certificate expiration date.
        thumbprint:
          type: string
          description: Certificate thumbprint.
        valid:
          type: boolean
          description: Is the certificate valid?.
        publicKeyHash:
          type: string
          description: Public key hash.
    CertificateFlattened:
      type: object
      description: Flattened view of Certificate ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        tags:
          type: object
          properties: {}
          description: A set of tags. Resource tags.
        location:
          type: string
          description: Required. The geo-location where the resource lives.
        provisioningState:
          type: string
          description: 'Provisioning state of the certificate. Possible values include: "Succeeded", "Failed", "Canceled", "DeleteFailed", "Pending".'
        password:
          type: string
          description: Certificate password.
        subjectName:
          type: string
          description: Subject name of the certificate.
        value:
          type: string
          format: byte
          description: PFX or PEM blob.
        issuer:
          type: string
          description: Certificate issuer.
        issueDate:
          type: string
          format: date-time
          description: Certificate issue Date.
        expirationDate:
          type: string
          format: date-time
          description: Certificate expiration date.
        thumbprint:
          type: string
          description: Certificate thumbprint.
        valid:
          type: boolean
          description: Is the certificate valid?.
        publicKeyHash:
          type: string
          description: Public key hash.
    Certificate:
      type: object
      description: Certificate used for Custom Domain bindings of Container Apps in a Managed Environment. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        tags:
          type: object
          properties: {}
          description: A set of tags. Resource tags.
        location:
          type: string
          description: Required. The geo-location where the resource lives.
        properties:
          $ref: "#/components/schemas/CertificateProperties"
          description: Certificate resource specific properties.
      required:
        - location
    CertificateCollection:
      type: object
      description: Collection of Certificates. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Certificate"
          description: Required. Collection of resources.
        nextLink:
          type: string
          description: Link to next page of resources.
      required:
        - value
    PagedCertificateCollection:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/CertificateCollection"
        nextLink:
          type: string
    AuthPlatform:
      type: object
      description: The configuration settings of the platform of ContainerApp Service Authentication/Authorization.
      properties:
        enabled:
          type: boolean
          description: true if the Authentication / Authorization feature is enabled for the current app; otherwise, false.
        runtimeVersion:
          type: string
          description: The RuntimeVersion of the Authentication / Authorization feature in use for the current app. The setting in this value can control the behavior of certain features in the Authentication / Authorization module.
    GlobalValidation:
      type: object
      description: The configuration settings that determines the validation flow of users using ContainerApp Service Authentication/Authorization.
      properties:
        unauthenticatedClientAction:
          type: string
          description: 'The action to take when an unauthenticated client attempts to access the app. Possible values include: "RedirectToLoginPage", "AllowAnonymous", "Return401", "Return403".'
        redirectToProvider:
          type: string
          description: The default authentication provider to use when multiple providers are configured. This setting is only needed if multiple providers are configured and the unauthenticated client action is set to "RedirectToLoginPage".
        excludedPaths:
          type: array
          items:
            type: string
          description: The paths for which unauthenticated flow would not be redirected to the login page.
    IdentityProviders:
      type: object
      description: The configuration settings of each of the identity providers used to configure ContainerApp Service Authentication/Authorization.
      properties:
        azureActiveDirectory:
          $ref: "#/components/schemas/AzureActiveDirectory"
          description: The configuration settings of the Azure Active directory provider.
        facebook:
          $ref: "#/components/schemas/Facebook"
          description: The configuration settings of the Facebook provider.
        gitHub:
          $ref: "#/components/schemas/GitHub"
          description: The configuration settings of the GitHub provider.
        google:
          $ref: "#/components/schemas/Google"
          description: The configuration settings of the Google provider.
        twitter:
          $ref: "#/components/schemas/Twitter"
          description: The configuration settings of the Twitter provider.
        apple:
          $ref: "#/components/schemas/Apple"
          description: The configuration settings of the Apple provider.
        azureStaticWebApps:
          $ref: "#/components/schemas/AzureStaticWebApps"
          description: The configuration settings of the Azure Static Web Apps provider.
        customOpenIdConnectProviders:
          type: object
          properties: {}
          description: The map of the name of the alias of each custom Open ID Connect provider to the configuration settings of the custom Open ID Connect provider.
    AzureActiveDirectory:
      type: object
      description: The configuration settings of the Azure Active directory provider.
      properties:
        enabled:
          type: boolean
          description: false if the Azure Active Directory provider should not be enabled despite the set registration; otherwise, true.
        registration:
          $ref: "#/components/schemas/AzureActiveDirectoryRegistration"
          description: The configuration settings of the Azure Active Directory app registration.
        login:
          $ref: "#/components/schemas/AzureActiveDirectoryLogin"
          description: The configuration settings of the Azure Active Directory login flow.
        validation:
          $ref: "#/components/schemas/AzureActiveDirectoryValidation"
          description: The configuration settings of the Azure Active Directory token validation flow.
        isAutoProvisioned:
          type: boolean
          description: Gets a value indicating whether the Azure AD configuration was auto-provisioned using 1st party tooling. This is an internal flag primarily intended to support the Azure Management Portal. Users should not read or write to this property.
    AzureActiveDirectoryRegistration:
      type: object
      description: The configuration settings of the Azure Active Directory app registration.
      properties:
        openIdIssuer:
          type: string
          description: "The OpenID Connect Issuer URI that represents the entity which issues access tokens for this application. When using Azure Active Directory, this value is the URI of the directory tenant, e.g. https://login.microsoftonline.com/v2.0/{tenant-guid}/. This URI is a case-sensitive identifier for the token issuer. More information on OpenID Connect Discovery: http://openid.net/specs/openid-connect-discovery-1_0.html."
        clientId:
          type: string
          description: "The Client ID of this relying party application, known as the client_id. This setting is required for enabling OpenID Connection authentication with Azure Active Directory or other 3rd party OpenID Connect providers. More information on OpenID Connect: http://openid.net/specs/openid-connect-core-1_0.html."
        clientSecretSettingName:
          type: string
          description: The app setting name that contains the client secret of the relying party application.
        clientSecretCertificateThumbprint:
          type: string
          description: An alternative to the client secret, that is the thumbprint of a certificate used for signing purposes. This property acts as a replacement for the Client Secret. It is also optional.
        clientSecretCertificateSubjectAlternativeName:
          type: string
          description: An alternative to the client secret thumbprint, that is the subject alternative name of a certificate used for signing purposes. This property acts as a replacement for the Client Secret Certificate Thumbprint. It is also optional.
        clientSecretCertificateIssuer:
          type: string
          description: An alternative to the client secret thumbprint, that is the issuer of a certificate used for signing purposes. This property acts as a replacement for the Client Secret Certificate Thumbprint. It is also optional.
    AzureActiveDirectoryLogin:
      type: object
      description: The configuration settings of the Azure Active Directory login flow.
      properties:
        loginParameters:
          type: array
          items:
            type: string
          description: Login parameters to send to the OpenID Connect authorization endpoint when a user logs in. Each parameter must be in the form "key=value".
        disableWWWAuthenticate:
          type: boolean
          description: true if the www-authenticate provider should be omitted from the request; otherwise, false.
    AzureActiveDirectoryValidation:
      type: object
      description: The configuration settings of the Azure Active Directory token validation flow.
      properties:
        jwtClaimChecks:
          $ref: "#/components/schemas/JwtClaimChecks"
          description: The configuration settings of the checks that should be made while validating the JWT Claims.
        allowedAudiences:
          type: array
          items:
            type: string
          description: The list of audiences that can make successful authentication/authorization requests.
        defaultAuthorizationPolicy:
          $ref: "#/components/schemas/DefaultAuthorizationPolicy"
          description: The configuration settings of the default authorization policy.
    JwtClaimChecks:
      type: object
      description: The configuration settings of the checks that should be made while validating the JWT Claims.
      properties:
        allowedGroups:
          type: array
          items:
            type: string
          description: The list of the allowed groups.
        allowedClientApplications:
          type: array
          items:
            type: string
          description: The list of the allowed client applications.
    DefaultAuthorizationPolicy:
      type: object
      description: The configuration settings of the Azure Active Directory default authorization policy.
      properties:
        allowedPrincipals:
          $ref: "#/components/schemas/AllowedPrincipals"
          description: The configuration settings of the Azure Active Directory allowed principals.
        allowedApplications:
          type: array
          items:
            type: string
          description: The configuration settings of the Azure Active Directory allowed applications.
    AllowedPrincipals:
      type: object
      description: The configuration settings of the Azure Active Directory allowed principals.
      properties:
        groups:
          type: array
          items:
            type: string
          description: The list of the allowed groups.
        identities:
          type: array
          items:
            type: string
          description: The list of the allowed identities.
    Facebook:
      type: object
      description: The configuration settings of the Facebook provider.
      properties:
        enabled:
          type: boolean
          description: false if the Facebook provider should not be enabled despite the set registration; otherwise, true.
        registration:
          $ref: "#/components/schemas/AppRegistration"
          description: The configuration settings of the app registration for the Facebook provider.
        graphApiVersion:
          type: string
          description: The version of the Facebook api to be used while logging in.
        login:
          $ref: "#/components/schemas/LoginScopes"
          description: The configuration settings of the login flow.
    AppRegistration:
      type: object
      description: The configuration settings of the app registration for providers that have app ids and app secrets.
      properties:
        appId:
          type: string
          description: The App ID of the app used for login.
        appSecretSettingName:
          type: string
          description: The app setting name that contains the app secret.
    LoginScopes:
      type: object
      description: The configuration settings of the login flow, including the scopes that should be requested.
      properties:
        scopes:
          type: array
          items:
            type: string
          description: A list of the scopes that should be requested while authenticating.
    GitHub:
      type: object
      description: The configuration settings of the GitHub provider.
      properties:
        enabled:
          type: boolean
          description: false if the GitHub provider should not be enabled despite the set registration; otherwise, true.
        registration:
          $ref: "#/components/schemas/ClientRegistration"
          description: The configuration settings of the app registration for the GitHub provider.
        login:
          $ref: "#/components/schemas/LoginScopes"
          description: The configuration settings of the login flow.
    ClientRegistration:
      type: object
      description: The configuration settings of the app registration for providers that have client ids and client secrets.
      properties:
        clientId:
          type: string
          description: The Client ID of the app used for login.
        clientSecretSettingName:
          type: string
          description: The app setting name that contains the client secret.
    Google:
      type: object
      description: The configuration settings of the Google provider.
      properties:
        enabled:
          type: boolean
          description: false if the Google provider should not be enabled despite the set registration; otherwise, true.
        registration:
          $ref: "#/components/schemas/ClientRegistration"
          description: The configuration settings of the app registration for the Google provider.
        login:
          $ref: "#/components/schemas/LoginScopes"
          description: The configuration settings of the login flow.
        validation:
          $ref: "#/components/schemas/AllowedAudiencesValidation"
          description: The configuration settings of the Azure Active Directory token validation flow.
    AllowedAudiencesValidation:
      type: object
      description: The configuration settings of the Allowed Audiences validation flow.
      properties:
        allowedAudiences:
          type: array
          items:
            type: string
          description: The configuration settings of the allowed list of audiences from which to validate the JWT token.
    Twitter:
      type: object
      description: The configuration settings of the Twitter provider.
      properties:
        enabled:
          type: boolean
          description: false if the Twitter provider should not be enabled despite the set registration; otherwise, true.
        registration:
          $ref: "#/components/schemas/TwitterRegistration"
          description: The configuration settings of the app registration for the Twitter provider.
    TwitterRegistration:
      type: object
      description: The configuration settings of the app registration for the Twitter provider.
      properties:
        consumerKey:
          type: string
          description: "The OAuth 1.0a consumer key of the Twitter application used for sign-in. This setting is required for enabling Twitter Sign-In. Twitter Sign-In documentation: https://dev.twitter.com/web/sign-in."
        consumerSecretSettingName:
          type: string
          description: The app setting name that contains the OAuth 1.0a consumer secret of the Twitter application used for sign-in.
    Apple:
      type: object
      description: The configuration settings of the Apple provider.
      properties:
        enabled:
          type: boolean
          description: false if the Apple provider should not be enabled despite the set registration; otherwise, true.
        registration:
          $ref: "#/components/schemas/AppleRegistration"
          description: The configuration settings of the Apple registration.
        login:
          $ref: "#/components/schemas/LoginScopes"
          description: The configuration settings of the login flow.
    AppleRegistration:
      type: object
      description: The configuration settings of the registration for the Apple provider.
      properties:
        clientId:
          type: string
          description: The Client ID of the app used for login.
        clientSecretSettingName:
          type: string
          description: The app setting name that contains the client secret.
    AzureStaticWebApps:
      type: object
      description: The configuration settings of the Azure Static Web Apps provider.
      properties:
        enabled:
          type: boolean
          description: false if the Azure Static Web Apps provider should not be enabled despite the set registration; otherwise, true.
        registration:
          $ref: "#/components/schemas/AzureStaticWebAppsRegistration"
          description: The configuration settings of the Azure Static Web Apps registration.
    AzureStaticWebAppsRegistration:
      type: object
      description: The configuration settings of the registration for the Azure Static Web Apps provider.
      properties:
        clientId:
          type: string
          description: The Client ID of the app used for login.
    Login:
      type: object
      description: The configuration settings of the login flow of users using ContainerApp Service Authentication/Authorization.
      properties:
        routes:
          $ref: "#/components/schemas/LoginRoutes"
          description: The routes that specify the endpoints used for login and logout requests.
        preserveUrlFragmentsForLogins:
          type: boolean
          description: true if the fragments from the request are preserved after the login request is made; otherwise, false.
        allowedExternalRedirectUrls:
          type: array
          items:
            type: string
          description: External URLs that can be redirected to as part of logging in or logging out of the app. Note that the query string part of the URL is ignored. This is an advanced setting typically only needed by Windows Store application backends. Note that URLs within the current domain are always implicitly allowed.
        cookieExpiration:
          $ref: "#/components/schemas/CookieExpiration"
          description: The configuration settings of the session cookie's expiration.
        nonce:
          $ref: "#/components/schemas/Nonce"
          description: The configuration settings of the nonce used in the login flow.
    LoginRoutes:
      type: object
      description: The routes that specify the endpoints used for login and logout requests.
      properties:
        logoutEndpoint:
          type: string
          description: The endpoint at which a logout request should be made.
    CookieExpiration:
      type: object
      description: The configuration settings of the session cookie's expiration.
      properties:
        convention:
          type: string
          description: "The convention used when determining the session cookie's expiration. Possible values include: \"FixedTime\", \"IdentityProviderDerived\"."
        timeToExpiration:
          type: string
          description: The time after the request is made when the session cookie should expire.
    Nonce:
      type: object
      description: The configuration settings of the nonce used in the login flow.
      properties:
        validateNonce:
          type: boolean
          description: false if the nonce should not be validated while completing the login flow; otherwise, true.
        nonceExpirationInterval:
          type: string
          description: The time after the request is made when the nonce should expire.
    HttpSettings:
      type: object
      description: The configuration settings of the HTTP requests for authentication and authorization requests made against ContainerApp Service Authentication/Authorization.
      properties:
        requireHttps:
          type: boolean
          description: false if the authentication/authorization responses not having the HTTPS scheme are permissible; otherwise, true.
        routes:
          $ref: "#/components/schemas/HttpSettingsRoutes"
          description: The configuration settings of the paths HTTP requests.
        forwardProxy:
          $ref: "#/components/schemas/ForwardProxy"
          description: The configuration settings of a forward proxy used to make the requests.
    HttpSettingsRoutes:
      type: object
      description: The configuration settings of the paths HTTP requests.
      properties:
        apiPrefix:
          type: string
          description: The prefix that should precede all the authentication/authorization paths.
    ForwardProxy:
      type: object
      description: The configuration settings of a forward proxy used to make the requests.
      properties:
        convention:
          type: string
          description: 'The convention used to determine the url of the request made. Possible values include: "NoProxy", "Standard", "Custom".'
        customHostHeaderName:
          type: string
          description: The name of the header containing the host of the request.
        customProtoHeaderName:
          type: string
          description: The name of the header containing the scheme of the request.
    AuthConfigFlattened:
      type: object
      description: Flattened view of AuthConfig ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        platform:
          $ref: "#/components/schemas/AuthPlatform"
          description: The configuration settings of the platform of ContainerApp Service Authentication/Authorization.
        globalValidation:
          $ref: "#/components/schemas/GlobalValidation"
          description: The configuration settings that determines the validation flow of users using Service Authentication/Authorization.
        identityProviders:
          $ref: "#/components/schemas/IdentityProviders"
          description: The configuration settings of each of the identity providers used to configure ContainerApp Service Authentication/Authorization.
        login:
          $ref: "#/components/schemas/Login"
          description: The configuration settings of the login flow of users using ContainerApp Service Authentication/Authorization.
        httpSettings:
          $ref: "#/components/schemas/HttpSettings"
          description: The configuration settings of the HTTP requests for authentication and authorization requests made against ContainerApp Service Authentication/Authorization.
    AuthConfig:
      type: object
      description: Configuration settings for the Azure ContainerApp Service Authentication / Authorization feature. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          type: object
          properties:
            platform:
              $ref: "#/components/schemas/AuthPlatform"
              description: The configuration settings of the platform of ContainerApp Service Authentication/Authorization.
            globalValidation:
              $ref: "#/components/schemas/GlobalValidation"
              description: The configuration settings that determines the validation flow of users using Service Authentication/Authorization.
            identityProviders:
              $ref: "#/components/schemas/IdentityProviders"
              description: The configuration settings of each of the identity providers used to configure ContainerApp Service Authentication/Authorization.
            login:
              $ref: "#/components/schemas/Login"
              description: The configuration settings of the login flow of users using ContainerApp Service Authentication/Authorization.
            httpSettings:
              $ref: "#/components/schemas/HttpSettings"
              description: The configuration settings of the HTTP requests for authentication and authorization requests made against ContainerApp Service Authentication/Authorization.
    AuthConfigCollection:
      type: object
      description: AuthConfig collection ARM resource. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AuthConfig"
          description: Required. Collection of resources.
        nextLink:
          type: string
          description: Link to next page of resources.
      required:
        - value
    PagedAuthConfigCollection:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AuthConfigCollection"
        nextLink:
          type: string
    ManagedServiceIdentity:
      type: object
      description: Managed service identity (system assigned and/or user assigned identities). Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        principalId:
          type: string
          description: The service principal ID of the system assigned identity. This property will only be provided for a system assigned identity.
        tenantId:
          type: string
          description: The tenant ID of the system assigned identity. This property will only be provided for a system assigned identity.
        type:
          type: string
          description: 'Required. Type of managed service identity (where both SystemAssigned and UserAssigned types are allowed). Possible values include: "None", "SystemAssigned", "UserAssigned", "SystemAssigned,UserAssigned".'
        userAssignedIdentities:
          type: object
          properties: {}
          description: "The set of user assigned identities associated with the resource. The userAssignedIdentities dictionary keys will be ARM resource ids in the form: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}. The dictionary values can be empty objects ({}) in requests."
      required:
        - type
    Configuration:
      type: object
      description: Non versioned Container App configuration properties that define the mutable settings of a Container app.
      properties:
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/Secret"
          description: Collection of secrets used by a Container app.
        activeRevisionsMode:
          type: string
          description: 'ActiveRevisionsMode controls how active revisions are handled for the Container app: .. raw:: html Multiple: multiple revisions can be active. If no value if provided, this is the defaultSingle: Only one revision can be active at a time. Revision weights can not be used in this mode. Possible values include: "multiple", "single".'
        ingress:
          $ref: "#/components/schemas/Ingress"
          description: Ingress configurations.
        registries:
          type: array
          items:
            $ref: "#/components/schemas/RegistryCredentials"
          description: Collection of private container registry credentials for containers used by the Container app.
        dapr:
          $ref: "#/components/schemas/Dapr"
          description: Dapr configuration for the Container App.
    Secret:
      type: object
      description: Secret definition.
      properties:
        name:
          type: string
          description: Secret Name.
        value:
          type: string
          description: Secret Value.
    Ingress:
      type: object
      description: Container App Ingress configuration. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        fqdn:
          type: string
          description: Hostname.
        external:
          type: boolean
          description: Bool indicating if app exposes an external http endpoint.
