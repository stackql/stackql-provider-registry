        httpHeaders:
          type: array
          items:
            $ref: "#/components/schemas/ContainerAppProbeHttpGetHttpHeadersItem"
          description: Custom headers to set in the request. HTTP allows repeated headers.
        path:
          type: string
          description: Path to access on the HTTP server.
        port:
          type: integer
          description: Required. Name or number of the port to access on the container. Number must be in the range 1 to 65535. Name must be an IANA_SVC_NAME.
        scheme:
          type: string
          description: Scheme to use for connecting to the host. Defaults to HTTP.
