          type: array
          items:
            $ref: "#/components/schemas/ManagedResourceReference"
          description: An array of resources currently managed by the deployment stack.
        deploymentExtensions:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentExtension"
          description: The extensions used during deployment. Contains extension data for all extensible resources managed by the stack.
