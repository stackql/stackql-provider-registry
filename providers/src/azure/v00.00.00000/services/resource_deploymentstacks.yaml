    ActionOnUnmanage:
      type: object
      description: Defines the behavior of resources that are no longer managed after the stack is updated or deleted.
      properties:
        resources:
          $ref: "#/components/schemas/UnmanageActionResourceMode"
          description: 'Specifies an action for a newly unmanaged resource. Required. Known values are: "delete" and "detach".'
        resourceGroups:
          $ref: "#/components/schemas/UnmanageActionResourceGroupMode"
          description: 'Specifies an action for a newly unmanaged resource group. Known values are: "delete" and "detach".'
        managementGroups:
          $ref: "#/components/schemas/UnmanageActionManagementGroupMode"
          description: 'Specifies an action for a newly unmanaged resource management group. Known values are: "delete" and "detach".'
        resourcesWithoutDeleteSupport:
          $ref: "#/components/schemas/ResourcesWithoutDeleteSupportAction"
          description: 'Some resources do not support deletion. This flag will denote how the stack should handle those resources. Known values are: "detach" and "fail".'
      required:
        - resources
    UnmanageActionResourceMode:
      type: string
      enum:
        - delete
        - detach
    UnmanageActionResourceGroupMode:
      type: string
      enum:
        - delete
        - detach
    UnmanageActionManagementGroupMode:
      type: string
