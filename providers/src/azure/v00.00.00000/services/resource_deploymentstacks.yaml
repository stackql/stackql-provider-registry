components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    DeploymentStackProperties:
      type: object
      description: Deployment stack properties.
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: The error detail.
        template:
          type: object
          properties: {}
          description: The template content. You use this element when you want to pass the template syntax directly in the request rather than link to an existing template. It can be a JObject or well-formed JSON string. Use either the templateLink property or the template property, but not both.
        templateLink:
          $ref: "#/components/schemas/DeploymentStacksTemplateLink"
          description: The URI of the template. Use either the templateLink property or the template property, but not both.
        parameters:
          type: object
          properties: {}
          description: Name and value pairs that define the deployment parameters for the template. Use this element when providing the parameter values directly in the request, rather than linking to an existing parameter file. Use either the parametersLink property or the parameters property, but not both.
        parametersLink:
          $ref: "#/components/schemas/DeploymentStacksParametersLink"
          description: The URI of parameters file. Use this element to link to an existing parameters file. Use either the parametersLink property or the parameters property, but not both.
        extensionConfigs:
          type: object
          properties: {}
          description: The deployment extension configs. Keys of this object are extension aliases as defined in the deployment template.
        externalInputs:
          type: object
          properties: {}
          description: External input values, used by external tooling for parameter evaluation.
        externalInputDefinitions:
          type: object
          properties: {}
          description: External input definitions, used by external tooling to define expected external input values.
        actionOnUnmanage:
          $ref: "#/components/schemas/ActionOnUnmanage"
          description: Defines the behavior of resources that are no longer managed after the Deployment stack is updated or deleted. Required.
        debugSetting:
          $ref: "#/components/schemas/DeploymentStacksDebugSetting"
          description: The debug setting of the deployment.
        deploymentScope:
          type: string
          description: "The scope at which the initial deployment should be created. If a scope is not specified, it will default to the scope of the deployment stack. Valid scopes are: management group (format: '/providers/Microsoft.Management/managementGroups/{managementGroupId}'), subscription (format: '/subscriptions/{subscriptionId}'), resource group (format: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}')."
        description:
          type: string
          description: Deployment stack description. Max length of 4096 characters.
        denySettings:
          $ref: "#/components/schemas/DenySettings"
          description: Defines how resources deployed by the stack are locked. Required.
        provisioningState:
          $ref: "#/components/schemas/DeploymentStackProvisioningState"
          description: 'State of the deployment stack. Known values are: "creating", "validating", "waiting", "deploying", "canceling", "updatingDenyAssignments", "deletingResources", "succeeded", "failed", "canceled", "deleting", "initializing", and "running".'
        correlationId:
          type: string
          description: The correlation id of the last Deployment stack upsert or delete operation. It is in GUID format and is used for tracing.
        validationLevel:
          $ref: "#/components/schemas/ValidationLevel"
          description: 'The validation level of the deployment stack. Known values are: "Template", "Provider", and "ProviderNoRbac".'
        bypassStackOutOfSyncError:
          type: boolean
          description: Flag to bypass service errors that indicate the stack resource list is not correctly synchronized.
        detachedResources:
          type: array
          items:
            $ref: "#/components/schemas/ResourceReference"
          description: An array of resources that were detached during the most recent Deployment stack update. Detached means that the resource was removed from the template, but no relevant deletion operations were specified. So, the resource still exists while no longer being associated with the stack.
        deletedResources:
          type: array
          items:
            $ref: "#/components/schemas/ResourceReference"
          description: An array of resources that were deleted during the most recent Deployment stack update. Deleted means that the resource was removed from the template and relevant deletion operations were specified.
        failedResources:
          type: array
          items:
            $ref: "#/components/schemas/ResourceReferenceExtended"
          description: An array of resources that failed to reach goal state during the most recent update. Each resourceId is accompanied by an error message.
