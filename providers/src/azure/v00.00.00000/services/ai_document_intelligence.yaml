            type: string
          description: Unique document classifier name. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentClassifierDetails"
    delete:
      operationId: DocumentIntelligenceAdministrationClient_delete_classifier
      description: Deletes document classifier.
      parameters:
        - name: classifier_id
          in: path
          required: true
          schema:
            type: string
          description: Unique document classifier name. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /documentModels:build?api-version=2024-11-30:
    post:
      operationId: DocumentIntelligenceAdministrationClient_begin_build_document_model
      description: Builds a custom document analysis model.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                modelId:
                  type: string
                  description: Unique document model name. Required.
                description:
                  type: string
                  description: Document model description.
                buildMode:
                  $ref: "#/components/schemas/DocumentBuildMode"
                  description: 'Custom document model build mode. Required. Known values are: "template" and "neural".'
                azureBlobSource:
                  $ref: "#/components/schemas/AzureBlobContentSource"
                  description: Azure Blob Storage location containing the training data. Either azureBlobSource or azureBlobFileListSource must be specified.
                azureBlobFileListSource:
                  $ref: "#/components/schemas/AzureBlobFileListContentSource"
                  description: Azure Blob Storage file list specifying the training data. Either azureBlobSource or azureBlobFileListSource must be specified.
                tags:
                  type: object
                  properties: {}
                  description: List of key-value tag attributes associated with the document model.
                maxTrainingHours:
                  type: number
                  description: Max number of V100-equivalent GPU hours to use for model training. Default=0.5.
                allowOverwrite:
                  type: boolean
                  description: Allow overwriting an existing model with the same name.
              required:
                - modelId
                - buildMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentModelDetails"
  /documentModels:compose?api-version=2024-11-30:
    post:
      operationId: DocumentIntelligenceAdministrationClient_begin_compose_model
      description: Creates a new document model from document types of existing document models.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                modelId:
                  type: string
                  description: Unique document model name. Required.
                description:
                  type: string
                  description: Document model description.
                classifierId:
                  type: string
                  description: Custom classifier to split and classify the input file. Required.
                split:
