openapi: 3.0.0
servers:
  - url: https://{endpoint}/documentintelligence
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure AI Document Intelligence (Data Plane)
  description: Analyze documents and forms with prebuilt and custom models (formerly Form Recognizer).
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2024-11-30-stackql-generated
  x-serviceAlias: ai_document_intelligence
  x-sdkPackage: azure-ai-documentintelligence
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    DocumentBuildMode:
      type: string
      enum:
        - template
        - neural
    AzureBlobContentSource:
      type: object
      description: Azure Blob Storage content.
      properties:
        containerUrl:
          type: string
          description: Azure Blob Storage container URL. Required.
        prefix:
          type: string
          description: Blob name prefix.
      required:
        - containerUrl
    AzureBlobFileListContentSource:
      type: object
      description: File list in Azure Blob Storage.
      properties:
        containerUrl:
          type: string
          description: Azure Blob Storage container URL. Required.
        fileList:
          type: string
          description: Path to a JSONL file within the container specifying a subset of documents. Required.
      required:
        - containerUrl
        - fileList
    SplitMode:
      type: string
      enum:
        - auto
        - none
        - perPage
    DocumentIntelligenceWarning:
      type: object
      description: The error object.
      properties:
        code:
          type: string
          description: One of a server-defined set of warning codes. Required.
        message:
          type: string
          description: A human-readable representation of the warning. Required.
        target:
          type: string
          description: The target of the error.
      required:
        - code
        - message
    DocumentModelDetails:
      type: object
      description: Document model info. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        modelId:
          type: string
          description: Unique document model name. Required.
        description:
          type: string
          description: Document model description.
        createdDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the document model was created. Required.
        expirationDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the document model will expire.
        modifiedDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the document model was last modified.
        apiVersion:
          type: string
          description: API version used to create this document model.
        tags:
          type: object
          properties: {}
          description: List of key-value tag attributes associated with the document model.
        buildMode:
          $ref: "#/components/schemas/DocumentBuildMode"
          description: 'Custom document model build mode. Known values are: "template" and "neural".'
        azureBlobSource:
          $ref: "#/components/schemas/AzureBlobContentSource"
          description: Azure Blob Storage location containing the training data. Either azureBlobSource or azureBlobFileListSource must be specified.
        azureBlobFileListSource:
          $ref: "#/components/schemas/AzureBlobFileListContentSource"
          description: Azure Blob Storage file list specifying the training data. Either azureBlobSource or azureBlobFileListSource must be specified.
        classifierId:
          type: string
          description: For composed models, the custom classifier to split and classify the input file.
        split:
          $ref: "#/components/schemas/SplitMode"
          description: 'For composed models, the file splitting behavior. Known values are: "auto", "none", and "perPage".'
        docTypes:
          type: object
          properties: {}
          description: Supported document types.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/DocumentIntelligenceWarning"
          description: List of warnings encountered while building the model.
        trainingHours:
          type: number
          description: Number of V100-equivalent GPU hours consumed for model training.
      required:
        - modelId
    PagedDocumentModelDetails:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DocumentModelDetails"
        nextLink:
          type: string
    DocumentIntelligenceOperationStatus:
      type: string
      enum:
        - notStarted
        - running
        - failed
        - succeeded
        - canceled
        - skipped
    DocumentIntelligenceError:
      type: object
      description: The error object.
      properties:
        code:
          type: string
          description: One of a server-defined set of error codes. Required.
        message:
          type: string
          description: A human-readable representation of the error. Required.
        target:
          type: string
          description: The target of the error.
        details:
          type: array
          items:
            $ref: "#/components/schemas/DocumentIntelligenceError"
          description: An array of details about specific errors that led to this reported error.
        innererror:
          $ref: "#/components/schemas/DocumentIntelligenceInnerError"
          description: An object containing more specific information than the current object about the error.
      required:
        - code
        - message
    DocumentIntelligenceInnerError:
      type: object
      description: An object containing more specific information about the error.
      properties:
        code:
          type: string
          description: One of a server-defined set of error codes.
        message:
          type: string
          description: A human-readable representation of the error.
        innererror:
          $ref: "#/components/schemas/DocumentIntelligenceInnerError"
          description: Inner error.
    DocumentIntelligenceOperationDetails:
      type: object
      description: "Operation info. You probably want to use the sub-classes and not this class directly. Known sub-classes are: DocumentClassifierBuildOperationDetails, DocumentClassifierCopyToOperationDetails, DocumentModelBuildOperationDetails, DocumentModelComposeOperationDetails, DocumentModelCopyToOperationDetails"
      properties:
        operationId:
          type: string
          description: Operation ID. Required.
        status:
          $ref: "#/components/schemas/DocumentIntelligenceOperationStatus"
          description: 'Operation status. notStarted, running, completed, or failed. Required. Known values are: "notStarted", "running", "failed", "succeeded", "canceled", and "skipped".'
        percentCompleted:
          type: integer
          description: Operation progress (0-100).
        createdDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the operation was created. Required.
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the status was last updated. Required.
        kind:
          type: string
          description: 'Type of operation. Required. Known values are: "documentModelBuild", "documentModelCompose", "documentModelCopyTo", "documentClassifierCopyTo", and "documentClassifierBuild".'
        resourceLocation:
          type: string
          description: URL of the resource targeted by this operation. Required.
        apiVersion:
          type: string
          description: API version used to create this operation.
        tags:
          type: object
          properties: {}
          description: List of key-value tag attributes associated with the document model.
        error:
          $ref: "#/components/schemas/DocumentIntelligenceError"
          description: Encountered error.
      required:
        - operationId
        - status
        - createdDateTime
        - lastUpdatedDateTime
        - kind
        - resourceLocation
    PagedDocumentIntelligenceOperationDetails:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DocumentIntelligenceOperationDetails"
        nextLink:
          type: string
    DocumentClassifierDetails:
      type: object
      description: Document classifier info. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        classifierId:
          type: string
          description: Unique document classifier name. Required.
        description:
          type: string
          description: Document classifier description.
        createdDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the document classifier was created. Required.
        expirationDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the document classifier will expire.
        modifiedDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the document model was last modified.
        apiVersion:
          type: string
          description: API version used to create this document classifier. Required.
        baseClassifierId:
          type: string
          description: Base classifierId on top of which the classifier was trained.
        docTypes:
          type: object
          properties: {}
          description: List of document types to classify against. Required.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/DocumentIntelligenceWarning"
          description: List of warnings encountered while building the classifier.
      required:
        - classifierId
        - createdDateTime
        - apiVersion
        - docTypes
    PagedDocumentClassifierDetails:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DocumentClassifierDetails"
        nextLink:
          type: string
    CustomDocumentModelsDetails:
      type: object
      description: Details regarding custom document models.
      properties:
        count:
          type: integer
          description: Number of custom document models in the current resource. Required.
        limit:
          type: integer
          description: Maximum number of custom document models supported in the current resource. Required.
      required:
        - count
        - limit
    DocumentIntelligenceResourceDetails:
      type: object
      description: General information regarding the current resource.
      properties:
        customDocumentModels:
          $ref: "#/components/schemas/CustomDocumentModelsDetails"
          description: Details regarding custom document models. Required.
      required:
        - customDocumentModels
    ModelCopyAuthorization:
      type: object
      description: Authorization to copy a document model to the specified target resource and modelId.
      properties:
        targetResourceId:
          type: string
          description: ID of the target Azure resource where the document model should be copied to. Required.
        targetResourceRegion:
          type: string
          description: Location of the target Azure resource where the document model should be copied to. Required.
        targetModelId:
          type: string
          description: Identifier of the target document model. Required.
        targetModelLocation:
          type: string
          description: URL of the copied document model in the target account. Required.
        accessToken:
          type: string
          description: Token used to authorize the request. Required.
        expirationDateTime:
          type: string
          format: date-time
          description: Date/time when the access token expires. Required.
      required:
        - targetResourceId
        - targetResourceRegion
        - targetModelId
        - targetModelLocation
        - accessToken
        - expirationDateTime
    ClassifierCopyAuthorization:
      type: object
      description: Authorization to copy a document classifier to the specified target resource and classifierId.
      properties:
        targetResourceId:
          type: string
          description: ID of the target Azure resource where the document classifier should be copied to. Required.
        targetResourceRegion:
          type: string
          description: Location of the target Azure resource where the document classifier should be copied to. Required.
        targetClassifierId:
          type: string
          description: Identifier of the target document classifier. Required.
        targetClassifierLocation:
          type: string
          description: URL of the copied document classifier in the target account. Required.
        accessToken:
          type: string
          description: Token used to authorize the request. Required.
        expirationDateTime:
          type: string
          format: date-time
          description: Date/time when the access token expires. Required.
      required:
        - targetResourceId
        - targetResourceRegion
        - targetClassifierId
        - targetClassifierLocation
        - accessToken
        - expirationDateTime
    AnalyzeBatchResult:
      type: object
      description: Batch document analysis result.
      properties:
        succeededCount:
          type: integer
          description: Number of documents that completed with status succeeded. Required.
        failedCount:
          type: integer
          description: Number of documents that completed with status failed. Required.
        skippedCount:
          type: integer
          description: Number of documents that completed with status skipped. Required.
        details:
          type: array
          items:
            $ref: "#/components/schemas/AnalyzeBatchOperationDetail"
          description: Operation detail for each document in the batch.
      required:
        - succeededCount
        - failedCount
        - skippedCount
    AnalyzeBatchOperationDetail:
      type: object
      description: Operation detail for a document in a batch analysis.
      properties:
        status:
          $ref: "#/components/schemas/DocumentIntelligenceOperationStatus"
          description: 'Analyze status. succeeded, failed, or skipped. Required. Known values are: "notStarted", "running", "failed", "succeeded", "canceled", and "skipped".'
        sourceUrl:
          type: string
          description: URL of the source document. Required.
        resultUrl:
          type: string
          description: URL of the analyze result JSON.
        error:
          $ref: "#/components/schemas/DocumentIntelligenceError"
          description: Encountered error.
      required:
        - status
        - sourceUrl
    AnalyzeBatchOperation:
      type: object
      description: Status and result of the analyze batch operation.
      properties:
        resultId:
          type: string
          description: Analyze batch operation result ID.
        status:
          $ref: "#/components/schemas/DocumentIntelligenceOperationStatus"
          description: 'Operation status. notStarted, running, succeeded, or failed. Required. Known values are: "notStarted", "running", "failed", "succeeded", "canceled", and "skipped".'
        createdDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the operation was submitted. Required.
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the status was last updated. Required.
        percentCompleted:
          type: integer
          description: Operation progress (0-100).
        error:
          $ref: "#/components/schemas/DocumentIntelligenceError"
          description: Encountered error during batch document analysis.
        result:
          $ref: "#/components/schemas/AnalyzeBatchResult"
          description: Batch document analysis result.
      required:
        - status
        - createdDateTime
        - lastUpdatedDateTime
    PagedAnalyzeBatchOperation:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AnalyzeBatchOperation"
        nextLink:
          type: string
    AnalyzeResult:
      type: object
      description: Document analysis result.
      properties:
        apiVersion:
          type: string
          description: API version used to produce this result. Required.
        modelId:
          type: string
          description: Document model ID used to produce this result. Required.
        stringIndexType:
          $ref: "#/components/schemas/StringIndexType"
          description: 'Method used to compute string offset and length. Required. Known values are: "textElements", "unicodeCodePoint", and "utf16CodeUnit".'
        contentFormat:
          $ref: "#/components/schemas/DocumentContentFormat"
          description: 'Format of the analyze result top-level content. Known values are: "text" and "markdown".'
        content:
          type: string
          description: Concatenate string representation of all textual and visual elements in reading order. Required.
        pages:
          type: array
          items:
            $ref: "#/components/schemas/DocumentPage"
          description: Analyzed pages. Required.
        paragraphs:
          type: array
          items:
            $ref: "#/components/schemas/DocumentParagraph"
          description: Extracted paragraphs.
        tables:
          type: array
          items:
            $ref: "#/components/schemas/DocumentTable"
          description: Extracted tables.
        figures:
          type: array
          items:
            $ref: "#/components/schemas/DocumentFigure"
          description: Extracted figures.
        sections:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSection"
          description: Extracted sections.
        keyValuePairs:
          type: array
          items:
            $ref: "#/components/schemas/DocumentKeyValuePair"
          description: Extracted key-value pairs.
        styles:
          type: array
          items:
            $ref: "#/components/schemas/DocumentStyle"
          description: Extracted font styles.
        languages:
          type: array
          items:
            $ref: "#/components/schemas/DocumentLanguage"
          description: Detected languages.
        documents:
          type: array
          items:
            $ref: "#/components/schemas/AnalyzedDocument"
          description: Extracted documents.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/DocumentIntelligenceWarning"
          description: List of warnings encountered.
      required:
        - apiVersion
        - modelId
        - stringIndexType
        - content
        - pages
    StringIndexType:
      type: string
      enum:
        - textElements
        - unicodeCodePoint
        - utf16CodeUnit
    DocumentContentFormat:
      type: string
      enum:
        - text
        - markdown
    DocumentPage:
      type: object
      description: Content and layout elements extracted from a page from the input.
      properties:
        pageNumber:
          type: integer
          description: 1-based page number in the input document. Required.
        angle:
          type: number
          description: The general orientation of the content in clockwise direction, measured in degrees between (-180, 180].
        width:
          type: number
          description: The width of the image/PDF in pixels/inches, respectively.
        height:
          type: number
          description: The height of the image/PDF in pixels/inches, respectively.
        unit:
          $ref: "#/components/schemas/LengthUnit"
          description: 'The unit used by the width, height, and polygon properties. For images, the unit is "pixel". For PDF, the unit is "inch". Known values are: "pixel" and "inch".'
        spans:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSpan"
          description: Location of the page in the reading order concatenated content. Required.
        words:
          type: array
          items:
            $ref: "#/components/schemas/DocumentWord"
          description: Extracted words from the page.
        selectionMarks:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSelectionMark"
          description: Extracted selection marks from the page.
        lines:
          type: array
          items:
            $ref: "#/components/schemas/DocumentLine"
          description: Extracted lines from the page, potentially containing both textual and visual elements.
        barcodes:
          type: array
          items:
            $ref: "#/components/schemas/DocumentBarcode"
          description: Extracted barcodes from the page.
        formulas:
          type: array
          items:
            $ref: "#/components/schemas/DocumentFormula"
          description: Extracted formulas from the page.
      required:
        - pageNumber
        - spans
    LengthUnit:
      type: string
      enum:
        - pixel
        - inch
    DocumentSpan:
      type: object
      description: Contiguous region of the concatenated content property, specified as an offset and length.
      properties:
        offset:
          type: integer
          description: Zero-based index of the content represented by the span. Required.
        length:
          type: integer
          description: Number of characters in the content represented by the span. Required.
      required:
        - offset
        - length
    DocumentWord:
      type: object
      description: A word object consisting of a contiguous sequence of characters. For non-space delimited languages, such as Chinese, Japanese, and Korean, each character is represented as its own word.
      properties:
        content:
          type: string
          description: Text content of the word. Required.
        polygon:
          type: array
          items:
            type: number
          description: Bounding polygon of the word, with coordinates specified relative to the top-left of the page. The numbers represent the x, y values of the polygon vertices, clockwise from the left (-180 degrees inclusive) relative to the element orientation.
        span:
          $ref: "#/components/schemas/DocumentSpan"
          description: Location of the word in the reading order concatenated content. Required.
        confidence:
          type: number
          description: Confidence of correctly extracting the word. Required.
      required:
        - content
        - span
        - confidence
    DocumentSelectionMark:
      type: object
      description: A selection mark object representing check boxes, radio buttons, and other elements indicating a selection.
      properties:
        state:
          $ref: "#/components/schemas/DocumentSelectionMarkState"
          description: 'State of the selection mark. Required. Known values are: "selected" and "unselected".'
        polygon:
          type: array
          items:
            type: number
          description: Bounding polygon of the selection mark, with coordinates specified relative to the top-left of the page. The numbers represent the x, y values of the polygon vertices, clockwise from the left (-180 degrees inclusive) relative to the element orientation.
        span:
          $ref: "#/components/schemas/DocumentSpan"
          description: Location of the selection mark in the reading order concatenated content. Required.
        confidence:
          type: number
          description: Confidence of correctly extracting the selection mark. Required.
      required:
        - state
        - span
        - confidence
    DocumentSelectionMarkState:
      type: string
      enum:
        - selected
        - unselected
    DocumentLine:
      type: object
      description: A content line object consisting of an adjacent sequence of content elements, such as words and selection marks.
      properties:
        content:
          type: string
          description: Concatenated content of the contained elements in reading order. Required.
        polygon:
          type: array
          items:
            type: number
          description: Bounding polygon of the line, with coordinates specified relative to the top-left of the page. The numbers represent the x, y values of the polygon vertices, clockwise from the left (-180 degrees inclusive) relative to the element orientation.
        spans:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSpan"
          description: Location of the line in the reading order concatenated content. Required.
      required:
        - content
        - spans
    DocumentBarcode:
      type: object
      description: A barcode object.
      properties:
        kind:
          $ref: "#/components/schemas/DocumentBarcodeKind"
          description: 'Barcode kind. Required. Known values are: "QRCode", "PDF417", "UPCA", "UPCE", "Code39", "Code128", "EAN8", "EAN13", "DataBar", "Code93", "Codabar", "DataBarExpanded", "ITF", "MicroQRCode", "Aztec", "DataMatrix", and "MaxiCode".'
        value:
          type: string
          description: Barcode value. Required.
        polygon:
          type: array
          items:
            type: number
          description: Bounding polygon of the barcode, with coordinates specified relative to the top-left of the page. The numbers represent the x, y values of the polygon vertices, clockwise from the left (-180 degrees inclusive) relative to the element orientation.
        span:
          $ref: "#/components/schemas/DocumentSpan"
          description: Location of the barcode in the reading order concatenated content. Required.
        confidence:
          type: number
          description: Confidence of correctly extracting the barcode. Required.
      required:
        - kind
        - value
        - span
        - confidence
    DocumentBarcodeKind:
      type: string
      enum:
        - QRCode
        - PDF417
        - UPCA
        - UPCE
        - Code39
        - Code128
        - EAN8
        - EAN13
        - DataBar
        - Code93
        - Codabar
        - DataBarExpanded
        - ITF
        - MicroQRCode
        - Aztec
        - DataMatrix
        - MaxiCode
    DocumentFormula:
      type: object
      description: A formula object.
      properties:
        kind:
          $ref: "#/components/schemas/DocumentFormulaKind"
          description: 'Formula kind. Required. Known values are: "inline" and "display".'
        value:
          type: string
          description: LaTex expression describing the formula. Required.
        polygon:
          type: array
          items:
            type: number
          description: Bounding polygon of the formula, with coordinates specified relative to the top-left of the page. The numbers represent the x, y values of the polygon vertices, clockwise from the left (-180 degrees inclusive) relative to the element orientation.
        span:
          $ref: "#/components/schemas/DocumentSpan"
          description: Location of the formula in the reading order concatenated content. Required.
        confidence:
          type: number
          description: Confidence of correctly extracting the formula. Required.
      required:
        - kind
        - value
        - span
        - confidence
    DocumentFormulaKind:
      type: string
      enum:
        - inline
        - display
    DocumentParagraph:
      type: object
      description: A paragraph object consisting with contiguous lines generally with common alignment and spacing.
      properties:
        role:
          $ref: "#/components/schemas/ParagraphRole"
          description: 'Semantic role of the paragraph. Known values are: "pageHeader", "pageFooter", "pageNumber", "title", "sectionHeading", "footnote", and "formulaBlock".'
        content:
          type: string
          description: Concatenated content of the paragraph in reading order. Required.
        boundingRegions:
          type: array
          items:
            $ref: "#/components/schemas/BoundingRegion"
          description: Bounding regions covering the paragraph.
        spans:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSpan"
          description: Location of the paragraph in the reading order concatenated content. Required.
      required:
        - content
        - spans
    ParagraphRole:
      type: string
      enum:
        - pageHeader
        - pageFooter
        - pageNumber
        - title
        - sectionHeading
        - footnote
        - formulaBlock
    BoundingRegion:
      type: object
      description: Bounding polygon on a specific page of the input.
      properties:
        pageNumber:
          type: integer
          description: 1-based page number of page containing the bounding region. Required.
        polygon:
          type: array
          items:
            type: number
          description: Bounding polygon on the page, or the entire page if not specified. Coordinates specified relative to the top-left of the page. The numbers represent the x, y values of the polygon vertices, clockwise from the left (-180 degrees inclusive) relative to the element orientation. Required.
      required:
        - pageNumber
        - polygon
    DocumentTable:
      type: object
      description: A table object consisting table cells arranged in a rectangular layout.
      properties:
        rowCount:
          type: integer
          description: Number of rows in the table. Required.
        columnCount:
          type: integer
          description: Number of columns in the table. Required.
        cells:
          type: array
          items:
            $ref: "#/components/schemas/DocumentTableCell"
          description: Cells contained within the table. Required.
        boundingRegions:
          type: array
          items:
            $ref: "#/components/schemas/BoundingRegion"
          description: Bounding regions covering the table.
        spans:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSpan"
          description: Location of the table in the reading order concatenated content. Required.
        caption:
          $ref: "#/components/schemas/DocumentCaption"
          description: Caption associated with the table.
        footnotes:
          type: array
          items:
            $ref: "#/components/schemas/DocumentFootnote"
          description: List of footnotes associated with the table.
      required:
        - rowCount
        - columnCount
        - cells
        - spans
    DocumentTableCell:
      type: object
      description: An object representing the location and content of a table cell.
      properties:
        kind:
          $ref: "#/components/schemas/DocumentTableCellKind"
          description: 'Table cell kind. Known values are: "content", "rowHeader", "columnHeader", "stubHead", and "description".'
        rowIndex:
