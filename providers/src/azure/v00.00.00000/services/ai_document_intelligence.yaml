  /documentModels/{model_id}:analyze?api-version=2024-11-30:
    post:
      operationId: DocumentIntelligenceClient_begin_analyze_document
      description: Analyzes document with document model.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Unique document model name. Required.
        - name: pages
          in: query
          required: false
          schema:
            type: string
          description: 1-based page numbers to analyze. Ex. "1-3,5,7-9". Default value is None.
        - name: locale
          in: query
          required: false
          schema:
            type: string
          description: Locale hint for text recognition and document analysis. Value may contain only the language code (ex. "en", "fr") or BCP 47 language tag (ex. "en-US"). Default value is None.
        - name: stringIndexType
          in: query
          required: false
          schema:
            type: string
          description: 'Method used to compute string offset and length. Known values are: "textElements", "unicodeCodePoint", and "utf16CodeUnit". Default value is None.'
        - name: features
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: List of optional analysis features. Default value is None.
        - name: queryFields
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: List of additional fields to extract. Ex. "NumberOfGuests,StoreNumber". Default value is None.
        - name: outputContentFormat
          in: query
          required: false
          schema:
            type: string
          description: 'Format of the analyze result top-level content. Known values are: "text" and "markdown". Default value is None.'
        - name: output
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Additional outputs to generate during analysis. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urlSource:
                  type: string
                  description: Document URL to analyze. Either urlSource or base64Source must be specified.
                base64Source:
                  type: string
                  format: byte
                  description: Base64 encoding of the document to analyze. Either urlSource or base64Source must be specified.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResult"
  /documentModels/{model_id}/analyzeResults/{result_id}?api-version=2024-11-30:
    delete:
      operationId: DocumentIntelligenceClient_delete_analyze_result
