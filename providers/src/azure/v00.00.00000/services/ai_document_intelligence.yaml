paths:
  /documentModels?api-version=2024-11-30:
    get:
      operationId: DocumentIntelligenceAdministrationClient_list_models
      description: List all document models.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDocumentModelDetails"
  /operations?api-version=2024-11-30:
    get:
      operationId: DocumentIntelligenceAdministrationClient_list_operations
      description: Lists all operations.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDocumentIntelligenceOperationDetails"
  /documentClassifiers?api-version=2024-11-30:
    get:
      operationId: DocumentIntelligenceAdministrationClient_list_classifiers
      description: List all document classifiers.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDocumentClassifierDetails"
  /documentModels/{model_id}?api-version=2024-11-30:
    get:
      operationId: DocumentIntelligenceAdministrationClient_get_model
      description: Gets detailed document model information.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Unique document model name. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentModelDetails"
    delete:
      operationId: DocumentIntelligenceAdministrationClient_delete_model
      description: Deletes document model.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Unique document model name. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /info?api-version=2024-11-30:
    get:
      operationId: DocumentIntelligenceAdministrationClient_get_resource_details
      description: Return information about the current resource.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentIntelligenceResourceDetails"
  /operations/{operation_id}?api-version=2024-11-30:
    get:
      operationId: DocumentIntelligenceAdministrationClient_get_operation
      description: Gets operation info.
      parameters:
        - name: operation_id
          in: path
          required: true
          schema:
            type: string
          description: Operation ID. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentIntelligenceOperationDetails"
  /documentClassifiers/{classifier_id}?api-version=2024-11-30:
    get:
      operationId: DocumentIntelligenceAdministrationClient_get_classifier
      description: Gets detailed document classifier information.
      parameters:
        - name: classifier_id
          in: path
          required: true
