          type: string
          description: Concatenated content of the table cell in reading order. Required.
        boundingRegions:
          type: array
          items:
            $ref: "#/components/schemas/BoundingRegion"
          description: Bounding regions covering the table cell.
        spans:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSpan"
          description: Location of the table cell in the reading order concatenated content. Required.
        elements:
          type: array
          items:
