      type: object
      description: An object representing the field key or value in a key-value pair.
      properties:
        content:
          type: string
          description: Concatenated content of the key-value element in reading order. Required.
        boundingRegions:
          type: array
          items:
            $ref: "#/components/schemas/BoundingRegion"
          description: Bounding regions covering the key-value element.
        spans:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSpan"
          description: Location of the key-value element in the reading order concatenated content. Required.
      required:
        - content
        - spans
    DocumentStyle:
      type: object
      description: An object representing observed text styles.
      properties:
        isHandwritten:
          type: boolean
          description: Is content handwritten?.
        similarFontFamily:
          type: string
          description: Visually most similar font from among the set of supported font families, with fallback fonts following CSS convention (ex. 'Arial, sans-serif').
        fontStyle:
          $ref: "#/components/schemas/DocumentFontStyle"
          description: 'Font style. Known values are: "normal" and "italic".'
        fontWeight:
          $ref: "#/components/schemas/DocumentFontWeight"
          description: 'Font weight. Known values are: "normal" and "bold".'
        color:
          type: string
          description: "Foreground color in #rrggbb hexadecimal format."
        backgroundColor:
          type: string
          description: "Background color in #rrggbb hexadecimal format.."
        spans:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSpan"
          description: Location of the text elements in the concatenated content the style applies to. Required.
        confidence:
          type: number
          description: Confidence of correctly identifying the style. Required.
      required:
        - spans
        - confidence
    DocumentFontStyle:
      type: string
      enum:
        - normal
        - italic
    DocumentFontWeight:
      type: string
      enum:
        - normal
        - bold
    DocumentLanguage:
      type: object
      description: An object representing the detected language for a given text span.
      properties:
        locale:
          type: string
          description: Detected language. Value may an ISO 639-1 language code (ex. "en", "fr") or BCP 47 language tag (ex. "zh-Hans"). Required.
        spans:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSpan"
          description: Location of the text elements in the concatenated content the language applies to. Required.
        confidence:
          type: number
          description: Confidence of correctly identifying the language. Required.
      required:
        - locale
        - spans
        - confidence
    AnalyzedDocument:
      type: object
      description: An object describing the location and semantic content of a document.
      properties:
        docType:
          type: string
          description: Document type. Required.
        boundingRegions:
          type: array
          items:
            $ref: "#/components/schemas/BoundingRegion"
          description: Bounding regions covering the document.
        spans:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSpan"
          description: Location of the document in the reading order concatenated content. Required.
        fields:
          type: object
          properties: {}
          description: Dictionary of named field values.
        confidence:
          type: number
          description: Confidence of correctly extracting the document. Required.
      required:
        - docType
        - spans
        - confidence
