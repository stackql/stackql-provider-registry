        privateEndpointNetworkPolicies:
          $ref: "#/components/schemas/PrivateEndpointNetworkPolicies"
          description: 'Enable or Disable apply network policies on private end point in the subnet. Known values are: "enabled" and "disabled".'
        privateLinkServiceNetworkPolicies:
