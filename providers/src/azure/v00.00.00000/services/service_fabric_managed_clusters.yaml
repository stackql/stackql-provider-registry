    ApplicationUpgradePolicy:
      type: object
      description: Describes the policy for a monitored application upgrade.
      properties:
        applicationHealthPolicy:
          $ref: "#/components/schemas/ApplicationHealthPolicy"
          description: Defines a health policy used to evaluate the health of an application or one of its children entities.
        forceRestart:
          type: boolean
          description: If true, then processes are forcefully restarted during upgrade even when the code version has not changed (the upgrade only changes configuration or data).
        rollingUpgradeMonitoringPolicy:
          $ref: "#/components/schemas/RollingUpgradeMonitoringPolicy"
          description: The policy used for monitoring the application upgrade.
        instanceCloseDelayDuration:
          type: integer
          description: Duration in seconds, to wait before a stateless instance is closed, to allow the active requests to drain gracefully. This would be effective when the instance is closing during the application/cluster upgrade, only for those instances which have a non-zero delay duration configured in the service description.
        upgradeMode:
          $ref: "#/components/schemas/RollingUpgradeMode"
          description: 'The mode used to monitor health during a rolling upgrade. The values are Monitored, and UnmonitoredAuto. Known values are: "Monitored" and "UnmonitoredAuto".'
        upgradeReplicaSetCheckTimeout:
          type: integer
          description: The maximum amount of time to block processing of an upgrade domain and prevent loss of availability when there are unexpected issues. When this timeout expires, processing of the upgrade domain will proceed regardless of availability loss issues. The timeout is reset at the start of each upgrade domain. Valid values are between 0 and 42949672925 inclusive. (unsigned 32-bit integer). Unit is in seconds.
        recreateApplication:
          type: boolean
          description: Determines whether the application should be recreated on update. If value=true, the rest of the upgrade policy parameters are not allowed.
    ApplicationHealthPolicy:
      type: object
      description: Defines a health policy used to evaluate the health of an application or one of its children entities.
      properties:
        considerWarningAsError:
          type: boolean
          description: Indicates whether warnings are treated with the same severity as errors. Required.
        maxPercentUnhealthyDeployedApplications:
          type: integer
          description: The maximum allowed percentage of unhealthy deployed applications. Allowed values are Byte values from zero to 100. The percentage represents the maximum tolerated percentage of deployed applications that can be unhealthy before the application is considered in error. This is calculated by dividing the number of unhealthy deployed applications over the number of nodes where the application is currently deployed on in the cluster. The computation rounds up to tolerate one failure on small numbers of nodes. Default percentage is zero. Required.
        defaultServiceTypeHealthPolicy:
          $ref: "#/components/schemas/ServiceTypeHealthPolicy"
          description: The health policy used by default to evaluate the health of a service type.
        serviceTypeHealthPolicyMap:
          type: object
          properties: {}
          description: The map with service type health policy per service type name. The map is empty by default.
      required:
        - considerWarningAsError
        - maxPercentUnhealthyDeployedApplications
    ServiceTypeHealthPolicy:
      type: object
      description: Represents the health policy used to evaluate the health of services belonging to a service type.
      properties:
        maxPercentUnhealthyServices:
          type: integer
          description: The maximum allowed percentage of unhealthy services. The percentage represents the maximum tolerated percentage of services that can be unhealthy before the application is considered in error. If the percentage is respected but there is at least one unhealthy service, the health is evaluated as Warning. This is calculated by dividing the number of unhealthy services of the specific service type over the total number of services of the specific service type. The computation rounds up to tolerate one failure on small numbers of services. Required.
        maxPercentUnhealthyPartitionsPerService:
          type: integer
          description: The maximum allowed percentage of unhealthy partitions per service. The percentage represents the maximum tolerated percentage of partitions that can be unhealthy before the service is considered in error. If the percentage is respected but there is at least one unhealthy partition, the health is evaluated as Warning. The percentage is calculated by dividing the number of unhealthy partitions over the total number of partitions in the service. The computation rounds up to tolerate one failure on small numbers of partitions. Required.
        maxPercentUnhealthyReplicasPerPartition:
          type: integer
          description: The maximum allowed percentage of unhealthy replicas per partition. The percentage represents the maximum tolerated percentage of replicas that can be unhealthy before the partition is considered in error. If the percentage is respected but there is at least one unhealthy replica, the health is evaluated as Warning. The percentage is calculated by dividing the number of unhealthy replicas over the total number of replicas in the partition. The computation rounds up to tolerate one failure on small numbers of replicas. Required.
      required:
        - maxPercentUnhealthyServices
        - maxPercentUnhealthyPartitionsPerService
        - maxPercentUnhealthyReplicasPerPartition
    RollingUpgradeMonitoringPolicy:
      type: object
      description: The policy used for monitoring the application upgrade.
      properties:
        failureAction:
          $ref: "#/components/schemas/FailureAction"
          description: 'The compensating action to perform when a Monitored upgrade encounters monitoring policy or health policy violations. Invalid indicates the failure action is invalid. Rollback specifies that the upgrade will start rolling back automatically. Manual indicates that the upgrade will switch to UnmonitoredManual upgrade mode. Required. Known values are: "Rollback" and "Manual".'
        healthCheckWaitDuration:
          type: string
          description: The amount of time to wait after completing an upgrade domain before applying health policies. It is interpreted as a string representing an ISO 8601 duration with following format "hh:mm:ss.fff". Required.
        healthCheckStableDuration:
          type: string
          description: The amount of time that the application or cluster must remain healthy before the upgrade proceeds to the next upgrade domain. It is interpreted as a string representing an ISO 8601 duration with following format "hh:mm:ss.fff". Required.
        healthCheckRetryTimeout:
          type: string
          description: The amount of time to retry health evaluation when the application or cluster is unhealthy before FailureAction is executed. It is interpreted as a string representing an ISO 8601 duration with following format "hh:mm:ss.fff". Required.
        upgradeTimeout:
          type: string
          description: The amount of time the overall upgrade has to complete before FailureAction is executed. Cannot be larger than 12 hours. It is interpreted as a string representing an ISO 8601 duration with following format "hh:mm:ss.fff". Required.
        upgradeDomainTimeout:
          type: string
          description: The amount of time each upgrade domain has to complete before FailureAction is executed. Cannot be larger than 12 hours. It is interpreted as a string representing an ISO 8601 duration with following format "hh:mm:ss.fff". Required.
      required:
        - failureAction
        - healthCheckWaitDuration
        - healthCheckStableDuration
        - healthCheckRetryTimeout
        - upgradeTimeout
        - upgradeDomainTimeout
    FailureAction:
      type: string
      enum:
        - Rollback
        - Manual
    RollingUpgradeMode:
      type: string
      enum:
        - Monitored
        - UnmonitoredAuto
    ManagedIdentity:
