          type: string
          description: VM Size type.
        size:
          type: string
          description: VM Size name.
    PagedManagedVMSizeFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ManagedVMSizeFlattened"
        nextLink:
          type: string
    NodeTypeSupportedSku:
      type: object
      description: Describes a node type supported sku.
      properties:
        name:
          type: string
          description: The sku name.
        tier:
          type: string
          description: "Specifies the tier of the node type. Possible Values: **Standard**."
    NodeTypeSkuCapacity:
      type: object
      description: Provides information about how node type can be scaled.
      properties:
        minimum:
          type: integer
          description: Lowest permitted node count in a node type.
        maximum:
          type: integer
          description: Highest permitted node count in a node type.
        default:
          type: integer
          description: Default node count in a node type.
        scaleType:
          $ref: "#/components/schemas/NodeTypeSkuScaleType"
          description: 'Node type capacity scale type. Known values are: "None", "Manual", and "Automatic".'
    NodeTypeSkuScaleType:
      type: string
      enum:
        - None
        - Manual
        - Automatic
    NodeTypeAvailableSku:
      type: object
      description: Defines the type of sku available for a node type.
      properties:
        resourceType:
          type: string
          description: "The type of resource the sku applies to. Value: Microsoft.ServiceFabric/managedClusters/nodeTypes."
        sku:
          $ref: "#/components/schemas/NodeTypeSupportedSku"
          description: The supported SKU for a for node type.
        capacity:
          $ref: "#/components/schemas/NodeTypeSkuCapacity"
          description: Provides information about how the node count can be scaled.
    PagedNodeTypeAvailableSku:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/NodeTypeAvailableSku"
        nextLink:
          type: string
    NodeTypeProperties:
      type: object
      description: Describes a node type in the cluster, each node type represents sub set of nodes in the cluster.
      properties:
        isPrimary:
          type: boolean
          description: Indicates the Service Fabric system services for the cluster will run on this node type. This setting cannot be changed once the node type is created. Required.
        vmInstanceCount:
          type: integer
          description: The number of nodes in the node type. **Values:** -1 - Use when auto scale rules are configured or sku.capacity is defined 0 - Not supported >0 - Use for manual scale. Required.
        dataDiskSizeGB:
          type: integer
          description: Disk size for the managed disk attached to the vms on the node type in GBs.
        dataDiskType:
          $ref: "#/components/schemas/DiskType"
          description: 'Managed data disk type. Specifies the storage account type for the managed disk. Known values are: "Standard_LRS", "StandardSSD_LRS", "Premium_LRS", "PremiumV2_LRS", "StandardSSD_ZRS", and "Premium_ZRS".'
        dataDiskLetter:
          type: string
          description: Managed data disk letter. It can not use the reserved letter C or D and it can not change after created.
        placementProperties:
          type: object
          properties: {}
          description: The placement tags applied to nodes in the node type, which can be used to indicate where certain services (workload) should run.
        capacities:
          type: object
          properties: {}
          description: The capacity tags applied to the nodes in the node type, the cluster resource manager uses these tags to understand how much resource a node has.
        applicationPorts:
          $ref: "#/components/schemas/EndpointRangeDescription"
          description: The range of ports from which cluster assigned port to Service Fabric applications.
        ephemeralPorts:
          $ref: "#/components/schemas/EndpointRangeDescription"
          description: The range of ephemeral ports that nodes in this node type should be configured with.
        vmSize:
          type: string
          description: The size of virtual machines in the pool. All virtual machines in a pool are the same size. For example, Standard_D3.
        vmImagePublisher:
          type: string
          description: The publisher of the Azure Virtual Machines Marketplace image. For example, Canonical or MicrosoftWindowsServer.
        vmImageOffer:
          type: string
          description: The offer type of the Azure Virtual Machines Marketplace image. For example, UbuntuServer or WindowsServer.
        vmImageSku:
          type: string
          description: The SKU of the Azure Virtual Machines Marketplace image. For example, 14.04.0-LTS or 2012-R2-Datacenter.
        vmImageVersion:
          type: string
          description: The version of the Azure Virtual Machines Marketplace image. A value of 'latest' can be specified to select the latest version of an image. If omitted, the default is 'latest'.
        vmSecrets:
          type: array
          items:
            $ref: "#/components/schemas/VaultSecretGroup"
          description: The secrets to install in the virtual machines.
        vmExtensions:
          type: array
          items:
            $ref: "#/components/schemas/VMSSExtension"
          description: Set of extensions that should be installed onto the virtual machines.
        vmManagedIdentity:
          $ref: "#/components/schemas/VmManagedIdentity"
          description: Identities to assign to the virtual machine scale set under the node type.
        isStateless:
          type: boolean
          description: Indicates if the node type can only host Stateless workloads.
        multiplePlacementGroups:
          type: boolean
          description: Indicates if scale set associated with the node type can be composed of multiple placement groups.
        frontendConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/FrontendConfiguration"
          description: Indicates the node type uses its own frontend configurations instead of the default one for the cluster. This setting can only be specified for non-primary node types and can not be added or removed after the node type is created.
        networkSecurityRules:
          type: array
          items:
            $ref: "#/components/schemas/NetworkSecurityRule"
          description: The Network Security Rules for this node type. This setting can only be specified for node types that are configured with frontend configurations.
        additionalDataDisks:
          type: array
          items:
            $ref: "#/components/schemas/VmssDataDisk"
          description: Additional managed data disks.
        enableEncryptionAtHost:
          type: boolean
          description: "Enable or disable the Host Encryption for the virtual machines on the node type. This will enable the encryption for all the disks including Resource/Temp disk at host itself. Default: The Encryption at host will be disabled unless this property is set to true for the resource."
        provisioningState:
          $ref: "#/components/schemas/ManagedResourceProvisioningState"
          description: 'The provisioning state of the node type resource. Known values are: "None", "Creating", "Created", "Updating", "Succeeded", "Failed", "Canceled", "Deleting", "Deleted", and "Other".'
        enableAcceleratedNetworking:
          type: boolean
          description: Specifies whether the network interface is accelerated networking-enabled.
        useDefaultPublicLoadBalancer:
          type: boolean
          description: Specifies whether the use public load balancer. If not specified and the node type doesn't have its own frontend configuration, it will be attached to the default load balancer. If the node type uses its own Load balancer and useDefaultPublicLoadBalancer is true, then the frontend has to be an Internal Load Balancer. If the node type uses its own Load balancer and useDefaultPublicLoadBalancer is false or not set, then the custom load balancer must include a public load balancer to provide outbound connectivity.
        useTempDataDisk:
          type: boolean
          description: Specifies whether to use the temporary disk for the service fabric data root, in which case no managed data disk will be attached and the temporary disk will be used. It is only allowed for stateless node types.
        enableOverProvisioning:
          type: boolean
          description: Specifies whether the node type should be overprovisioned. It is only allowed for stateless node types.
        zones:
          type: array
          items:
            type: string
          description: Specifies the availability zones where the node type would span across. If the cluster is not spanning across availability zones, initiates az migration for the cluster.
        isSpotVM:
          type: boolean
          description: Indicates whether the node type will be Spot Virtual Machines. Azure will allocate the VMs if there is capacity available and the VMs can be evicted at any time.
        hostGroupId:
          type: string
          description: Specifies the full host group resource Id. This property is used for deploying on azure dedicated hosts.
        useEphemeralOSDisk:
          type: boolean
          description: Indicates whether to use ephemeral os disk. The sku selected on the vmSize property needs to support this feature.
        spotRestoreTimeout:
          type: string
          description: Indicates the time duration after which the platform will not try to restore the VMSS SPOT instances specified as ISO 8601.
        evictionPolicy:
          $ref: "#/components/schemas/EvictionPolicyType"
          description: 'Specifies the eviction policy for virtual machines in a SPOT node type. Default is Delete. Known values are: "Delete" and "Deallocate".'
        vmImageResourceId:
          type: string
          description: Indicates the resource id of the vm image. This parameter is used for custom vm image.
        subnetId:
          type: string
          description: Indicates the resource id of the subnet for the node type.
        vmSetupActions:
          type: array
          items:
            $ref: "#/components/schemas/VmSetupAction"
          description: Specifies the actions to be performed on the vms before bootstrapping the service fabric runtime.
        securityType:
          $ref: "#/components/schemas/SecurityType"
          description: 'Specifies the security type of the nodeType. Supported values include Standard, TrustedLaunch and ConfidentialVM. Known values are: "TrustedLaunch", "Standard", and "ConfidentialVM".'
        securityEncryptionType:
          $ref: "#/components/schemas/SecurityEncryptionType"
          description: 'Specifies the EncryptionType of the managed disk. It is set to DiskWithVMGuestState for encryption of the managed disk along with VMGuestState blob and VMGuestStateOnly for encryption of just the VMGuestState blob. Note: It can be set for only Confidential VMs. Known values are: "DiskWithVMGuestState" and "VMGuestStateOnly".'
        secureBootEnabled:
          type: boolean
          description: Specifies whether secure boot should be enabled on the nodeType. Can only be used with TrustedLaunch and ConfidentialVM SecurityType.
        enableNodePublicIP:
          type: boolean
          description: Specifies whether each node is allocated its own public IPv4 address. This is only supported on secondary node types with custom Load Balancers.
        enableNodePublicIPv6:
          type: boolean
          description: Specifies whether each node is allocated its own public IPv6 address. This is only supported on secondary node types with custom Load Balancers.
        vmSharedGalleryImageId:
          type: string
          description: Indicates the resource id of the vm shared galleries image. This parameter is used for custom vm image.
        natGatewayId:
          type: string
          description: Specifies the resource id of a NAT Gateway to attach to the subnet of this node type. Node type must use custom load balancer.
        natConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/NodeTypeNatConfig"
          description: Specifies the NAT configuration on default public Load Balancer for the node type. This is only supported for node types use the default public Load Balancer.
        vmImagePlan:
          $ref: "#/components/schemas/VmImagePlan"
          description: Specifies information about the marketplace image used to create the virtual machine. This element is only used for marketplace images. Before you can use a marketplace image from an API, you must enable the image for programmatic use. In the Azure portal, find the marketplace image that you want to use and then click Want to deploy programmatically, Get Started ->. Enter any required information and then click Save.
        serviceArtifactReferenceId:
          type: string
          description: Specifies the service artifact reference id used to set same image version for all virtual machines in the scale set when using 'latest' image version.
        dscpConfigurationId:
          type: string
          description: Specifies the resource id of the DSCP configuration to apply to the node type network interface.
        additionalNetworkInterfaceConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalNetworkInterfaceConfiguration"
          description: Specifies the settings for any additional secondary network interfaces to attach to the node type.
        computerNamePrefix:
          type: string
          description: Specifies the computer name prefix. Limited to 9 characters. If specified, allows for a longer name to be specified for the node type name.
        vmApplications:
          type: array
          items:
            $ref: "#/components/schemas/VmApplication"
          description: Specifies the gallery applications that should be made available to the underlying VMSS.
        zoneBalance:
          type: boolean
          description: Setting this to true allows stateless node types to scale out without equal distribution across zones.
        isOutboundOnly:
          type: boolean
          description: Specifies the node type should be configured for only outbound traffic and not inbound traffic.
        enableResilientEphemeralOsDisk:
          type: boolean
          description: Specifies whether the node type should use a resilient ephemeral OS disk when using a supported SKU size. A resilient ephemeral OS disk provides improved reliability for ephemeral OS disks by enabling full caching.
        scaleInPolicy:
          $ref: "#/components/schemas/ScaleInPolicy"
          description: Specifies the scale in policy for the node type, which will be used when scale in happens on the cluster. If not specified, the default is Default which means the platform will decide which nodes to remove during scale in.
        proxyAgentSettings:
          $ref: "#/components/schemas/ProxyAgentSettings"
          description: Specifies the settings for the proxy agent on the node type.
      required:
        - isPrimary
        - vmInstanceCount
    DiskType:
      type: string
      enum:
        - Standard_LRS
        - StandardSSD_LRS
        - Premium_LRS
        - PremiumV2_LRS
        - StandardSSD_ZRS
        - Premium_ZRS
    EndpointRangeDescription:
      type: object
      description: Port range details.
      properties:
        startPort:
          type: integer
          description: Starting port of a range of ports. Required.
        endPort:
          type: integer
          description: End port of a range of ports. Required.
      required:
        - startPort
        - endPort
    VaultSecretGroup:
      type: object
      description: Specifies set of certificates that should be installed onto the virtual machines.
      properties:
        sourceVault:
          $ref: "#/components/schemas/SubResource"
          description: The relative URL of the Key Vault containing all of the certificates in VaultCertificates. Required.
        vaultCertificates:
          type: array
          items:
            $ref: "#/components/schemas/VaultCertificate"
          description: The list of key vault references in SourceVault which contain certificates. Required.
      required:
        - sourceVault
        - vaultCertificates
    SubResource:
      type: object
      description: Azure resource identifier.
      properties:
        id:
          type: string
          description: Azure resource identifier.
    VaultCertificate:
      type: object
      description: Describes a single certificate reference in a Key Vault, and where the certificate should reside on the VM.
      properties:
        certificateUrl:
          type: string
          description: This is the URL of a certificate that has been uploaded to Key Vault as a secret. For adding a secret to the Key Vault, see `Add a key or secret to the key vault `_. Required.
        certificateStore:
          type: string
          description: For Windows VMs, specifies the certificate store on the Virtual Machine to which the certificate should be added. The specified certificate store is implicitly in the LocalMachine account. For Linux VMs, the certificate file is placed under the /var/lib/waagent directory, with the file name {UppercaseThumbprint}.crt for the X509 certificate file and {UppercaseThumbprint}.prv for private key. Both of these files are .pem formatted. Required.
      required:
        - certificateUrl
        - certificateStore
    VMSSExtension:
      type: object
      description: Specifies set of extensions that should be installed onto the virtual machines.
      properties:
        name:
          type: string
          description: The name of the extension. Required.
        properties:
          $ref: "#/components/schemas/VMSSExtensionProperties"
          description: Describes the properties of a Virtual Machine Scale Set Extension. Required.
      required:
        - name
        - properties
    VMSSExtensionProperties:
      type: object
      description: Describes the properties of a Virtual Machine Scale Set Extension.
      properties:
        publisher:
          type: string
          description: The name of the extension handler publisher. Required.
        type:
          type: string
          description: Specifies the type of the extension; an example is "CustomScriptExtension". Required.
        typeHandlerVersion:
          type: string
          description: Specifies the version of the script handler. Required.
        autoUpgradeMinorVersion:
          type: boolean
          description: Indicates whether the extension should use a newer minor version if one is available at deployment time. Once deployed, however, the extension will not upgrade minor versions unless redeployed, even with this property set to true.
        settings:
          type: object
          properties: {}
          description: Json formatted public settings for the extension.
        protectedSettings:
          type: object
          properties: {}
          description: The extension can contain either protectedSettings or protectedSettingsFromKeyVault or no protected settings at all.
        forceUpdateTag:
          type: string
          description: If a value is provided and is different from the previous value, the extension handler will be forced to update even if the extension configuration has not changed.
        provisionAfterExtensions:
          type: array
          items:
            type: string
          description: Collection of extension names after which this extension needs to be provisioned.
        provisioningState:
          type: string
          description: The provisioning state, which only appears in the response.
        enableAutomaticUpgrade:
          type: boolean
          description: Indicates whether the extension should be automatically upgraded by the platform if there is a newer version of the extension available.
        setupOrder:
          type: array
          items:
            $ref: "#/components/schemas/VmssExtensionSetupOrder"
          description: Indicates the setup order for the extension.
      required:
        - publisher
        - type
        - typeHandlerVersion
    VmssExtensionSetupOrder:
      type: string
      enum:
        - BeforeSFRuntime
    VmManagedIdentity:
      type: object
      description: Identities for the virtual machine scale set under the node type.
      properties:
        userAssignedIdentities:
          type: array
          items:
            type: string
          description: "The list of user identities associated with the virtual machine scale set under the node type. Each entry will be an ARM resource ids in the form: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}'."
    FrontendConfiguration:
      type: object
      description: Describes the frontend configurations for the node type.
      properties:
        ipAddressType:
          $ref: "#/components/schemas/IPAddressType"
          description: 'The IP address type of this frontend configuration. If omitted the default value is IPv4. Known values are: "IPv4" and "IPv6".'
        loadBalancerBackendAddressPoolId:
          type: string
          description: The resource Id of the Load Balancer backend address pool that the VM instances of the node type are associated with. The format of the resource Id is '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/loadBalancers/{loadBalancerName}/backendAddressPools/{backendAddressPoolName}'.
        loadBalancerInboundNatPoolId:
          type: string
          description: The resource Id of the Load Balancer inbound NAT pool that the VM instances of the node type are associated with. The format of the resource Id is '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/loadBalancers/{loadBalancerName}/inboundNatPools/{inboundNatPoolName}'.
        applicationGatewayBackendAddressPoolId:
          type: string
          description: The resource Id of application gateway backend address pool. The format of the resource Id is '/subscriptions//resourceGroups/{resourceGroupName}/providers/Microsoft.Network/applicationGateways/{applicationGatewayName}/backendAddressPools/{backendAddressPoolName}'.
    IPAddressType:
      type: string
      enum:
        - IPv4
        - IPv6
    VmssDataDisk:
      type: object
      description: Managed data disk description.
      properties:
        lun:
          type: integer
          description: Specifies the logical unit number of the data disk. This value is used to identify data disks within the VM and therefore must be unique for each data disk attached to a VM. Lun 0 is reserved for the service fabric data disk. Required.
        diskSizeGB:
          type: integer
          description: Disk size for each vm in the node type in GBs. Required.
        diskType:
          $ref: "#/components/schemas/DiskType"
          description: 'Managed data disk type. Specifies the storage account type for the managed disk. Required. Known values are: "Standard_LRS", "StandardSSD_LRS", "Premium_LRS", "PremiumV2_LRS", "StandardSSD_ZRS", and "Premium_ZRS".'
        diskLetter:
          type: string
          description: Managed data disk letter. It can not use the reserved letter C or D and it can not change after created. Required.
      required:
        - lun
        - diskSizeGB
        - diskType
        - diskLetter
    EvictionPolicyType:
      type: string
      enum:
        - Delete
        - Deallocate
    VmSetupAction:
      type: string
      enum:
        - EnableContainers
        - EnableHyperV
    SecurityType:
      type: string
      enum:
        - TrustedLaunch
        - Standard
        - ConfidentialVM
    SecurityEncryptionType:
      type: string
      enum:
        - DiskWithVMGuestState
        - VMGuestStateOnly
    NodeTypeNatConfig:
      type: object
      description: Provides information about NAT configuration on the default public Load Balancer for the node type.
      properties:
        backendPort:
          type: integer
          description: The internal port for the NAT configuration.
        frontendPortRangeStart:
          type: integer
          description: The port range start for the external endpoint.
        frontendPortRangeEnd:
          type: integer
          description: The port range end for the external endpoint.
    VmImagePlan:
      type: object
      description: Specifies information about the marketplace image used to create the virtual machine. This element is only used for marketplace images. Before you can use a marketplace image from an API, you must enable the image for programmatic use. In the Azure portal, find the marketplace image that you want to use and then click Want to deploy programmatically, Get Started. Enter any required information and then click Save.
      properties:
        name:
          type: string
          description: The plan ID.
        product:
          type: string
          description: Specifies the product of the image from the marketplace. This is the same value as Offer under the imageReference element.
        promotionCode:
          type: string
          description: The promotion code.
        publisher:
          type: string
          description: The publisher ID.
    AdditionalNetworkInterfaceConfiguration:
      type: object
      description: Specifies the settings for a network interface to attach to the node type.
      properties:
        name:
          type: string
          description: Name of the network interface. Required.
        enableAcceleratedNetworking:
          type: boolean
          description: Specifies whether the network interface is accelerated networking-enabled.
        dscpConfiguration:
          $ref: "#/components/schemas/SubResource"
          description: Specifies the DSCP configuration to apply to the network interface.
        ipConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/IpConfiguration"
          description: Specifies the IP configurations of the network interface. Required.
      required:
        - name
        - ipConfigurations
    IpConfiguration:
      type: object
      description: Specifies an IP configuration of the network interface.
      properties:
        name:
          type: string
          description: Name of the network interface. Required.
        applicationGatewayBackendAddressPools:
          type: array
          items:
            $ref: "#/components/schemas/SubResource"
          description: Specifies an array of references to backend address pools of application gateways. A node type can reference backend address pools of multiple application gateways. Multiple node types cannot use the same application gateway.
        loadBalancerBackendAddressPools:
          type: array
          items:
            $ref: "#/components/schemas/SubResource"
          description: Specifies an array of references to backend address pools of load balancers. A node type can reference backend address pools of one public and one internal load balancer. Multiple node types cannot use the same basic sku load balancer.
        loadBalancerInboundNatPools:
          type: array
          items:
            $ref: "#/components/schemas/SubResource"
          description: Specifies an array of references to inbound Nat pools of the load balancers. A node type can reference inbound nat pools of one public and one internal load balancer. Multiple node types cannot use the same basic sku load balancer.
        subnet:
          $ref: "#/components/schemas/SubResource"
          description: Specifies the subnet of the network interface.
        privateIPAddressVersion:
          $ref: "#/components/schemas/PrivateIPAddressVersion"
          description: "Specifies whether the IP configuration's private IP is IPv4 or IPv6. Default is IPv4. Known values are: \"IPv4\" and \"IPv6\"."
        publicIPAddressConfiguration:
          $ref: "#/components/schemas/IpConfigurationPublicIPAddressConfiguration"
          description: The public IP address configuration of the network interface.
      required:
        - name
    PrivateIPAddressVersion:
      type: string
      enum:
        - IPv4
        - IPv6
    IpConfigurationPublicIPAddressConfiguration:
      type: object
      description: The public IP address configuration of the network interface.
      properties:
        name:
          type: string
          description: Name of the network interface. Required.
        ipTags:
          type: array
          items:
            $ref: "#/components/schemas/IpTag"
          description: Specifies the list of IP tags associated with the public IP address.
        publicIPAddressVersion:
          $ref: "#/components/schemas/PublicIPAddressVersion"
          description: "Specifies whether the IP configuration's public IP is IPv4 or IPv6. Default is IPv4. Known values are: \"IPv4\" and \"IPv6\"."
      required:
        - name
    PublicIPAddressVersion:
      type: string
      enum:
        - IPv4
        - IPv6
    VmApplication:
      type: object
      description: Specifies the gallery application that should be made available to the underlying VMSS.
      properties:
        configurationReference:
          type: string
          description: Optional, Specifies the uri to an azure blob that will replace the default configuration for the package if provided.
        enableAutomaticUpgrade:
          type: boolean
          description: If set to true, when a new Gallery Application version is available in PIR/SIG, it will be automatically updated for the underlying VMSS.
        order:
          type: integer
          description: Optional, Specifies the order in which the packages have to be installed.
        packageReferenceId:
          type: string
          description: Specifies the GalleryApplicationVersion resource id on the form of /subscriptions/{SubscriptionId}/resourceGroups/{ResourceGroupName}/providers/Microsoft.Compute/galleries/{galleryName}/applications/{application}/versions/{version}. Required.
        vmGalleryTags:
          type: string
          description: Optional, Specifies a passthrough value for more generic context. Accepts a JSON-formatted string e.g. '{"Tag1":"Value1","Tag2":"Value2"}'.
        treatFailureAsDeploymentFailure:
          type: boolean
          description: Optional, If true, any failure for any operation in the VmApplication will fail the deployment.
      required:
        - packageReferenceId
    ScaleInPolicy:
      type: object
      description: Scale in policy for a node type. This is used to specify the mode for scale in operations on a node type.
      properties:
        mode:
          $ref: "#/components/schemas/ScaleInPolicyMode"
          description: 'The scale in policy mode for a node type. Known values are: "Default", "OldestNodeFirst", and "NewestNodeFirst".'
    ScaleInPolicyMode:
      type: string
      enum:
        - Default
        - OldestNodeFirst
        - NewestNodeFirst
    ProxyAgentSettings:
      type: object
      description: Specifies ProxyAgent settings for the virtual machine or virtual machine scale set.
      properties:
        enabled:
          type: boolean
          description: Specifies whether ProxyAgent feature should be enabled on the virtual machine or virtual machine scale set.
        keyIncarnationId:
          type: integer
          description: Increasing the value of this property allows users to reset the key used for securing communication channel between guest and host.
        wireServer:
          $ref: "#/components/schemas/HostEndpointSettings"
          description: Specifies the Wire Server endpoint settings while creating the virtual machine or virtual machine scale set.
        imds:
          $ref: "#/components/schemas/HostEndpointSettings"
          description: Specifies the IMDS endpoint settings while creating the virtual machine or virtual machine scale set.
        addProxyAgentExtension:
          type: boolean
          description: Specify whether to implicitly install the ProxyAgent Extension. This option is currently applicable only for Linux Os.
    HostEndpointSettings:
      type: object
      description: Specifies particular host endpoint settings.
      properties:
        mode:
          type: string
          description: Specifies the execution mode. In Audit mode, the system acts as if it is enforcing the access control policy, including emitting access denial entries in the logs but it does not actually deny any requests to host endpoints. In Enforce mode, the system will enforce the access control and it is the recommended mode of operation.
        inVMAccessControlProfileReferenceId:
          type: string
          description: Specifies the InVMAccessControlProfileVersion resource id in the format of /subscriptions/{SubscriptionId}/resourceGroups/{ResourceGroupName}/providers/Microsoft.Compute/galleries/{galleryName}/inVMAccessControlProfiles/{profile}/versions/{version}.
    NodeTypeSku:
      type: object
      description: Describes a node type sku.
      properties:
        name:
          type: string
          description: The sku name. Name is internally generated and is used in auto-scale scenarios. Property does not allow to be changed to other values than generated. To avoid deployment errors please omit the property.
        tier:
          type: string
          description: "Specifies the tier of the node type. Possible Values: **Standard**."
        capacity:
          type: integer
          description: The number of nodes in the node type. If present in request it will override properties.vmInstanceCount. Required.
      required:
        - capacity
    NodeTypeFlattened:
      type: object
      description: Flattened view of NodeType ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        sku:
          $ref: "#/components/schemas/NodeTypeSku"
          description: The node type sku.
        isPrimary:
          type: boolean
          description: Indicates the Service Fabric system services for the cluster will run on this node type. This setting cannot be changed once the node type is created. Required.
        vmInstanceCount:
          type: integer
          description: The number of nodes in the node type. **Values:** -1 - Use when auto scale rules are configured or sku.capacity is defined 0 - Not supported >0 - Use for manual scale. Required.
        dataDiskSizeGB:
          type: integer
          description: Disk size for the managed disk attached to the vms on the node type in GBs.
        dataDiskType:
          $ref: "#/components/schemas/DiskType"
          description: 'Managed data disk type. Specifies the storage account type for the managed disk. Known values are: "Standard_LRS", "StandardSSD_LRS", "Premium_LRS", "PremiumV2_LRS", "StandardSSD_ZRS", and "Premium_ZRS".'
        dataDiskLetter:
          type: string
          description: Managed data disk letter. It can not use the reserved letter C or D and it can not change after created.
        placementProperties:
          type: object
          properties: {}
          description: The placement tags applied to nodes in the node type, which can be used to indicate where certain services (workload) should run.
        capacities:
          type: object
          properties: {}
          description: The capacity tags applied to the nodes in the node type, the cluster resource manager uses these tags to understand how much resource a node has.
        applicationPorts:
          $ref: "#/components/schemas/EndpointRangeDescription"
          description: The range of ports from which cluster assigned port to Service Fabric applications.
        ephemeralPorts:
          $ref: "#/components/schemas/EndpointRangeDescription"
          description: The range of ephemeral ports that nodes in this node type should be configured with.
        vmSize:
          type: string
          description: The size of virtual machines in the pool. All virtual machines in a pool are the same size. For example, Standard_D3.
        vmImagePublisher:
          type: string
          description: The publisher of the Azure Virtual Machines Marketplace image. For example, Canonical or MicrosoftWindowsServer.
        vmImageOffer:
          type: string
          description: The offer type of the Azure Virtual Machines Marketplace image. For example, UbuntuServer or WindowsServer.
        vmImageSku:
          type: string
          description: The SKU of the Azure Virtual Machines Marketplace image. For example, 14.04.0-LTS or 2012-R2-Datacenter.
        vmImageVersion:
          type: string
          description: The version of the Azure Virtual Machines Marketplace image. A value of 'latest' can be specified to select the latest version of an image. If omitted, the default is 'latest'.
        vmSecrets:
          type: array
          items:
            $ref: "#/components/schemas/VaultSecretGroup"
          description: The secrets to install in the virtual machines.
        vmExtensions:
          type: array
          items:
            $ref: "#/components/schemas/VMSSExtension"
          description: Set of extensions that should be installed onto the virtual machines.
        vmManagedIdentity:
          $ref: "#/components/schemas/VmManagedIdentity"
          description: Identities to assign to the virtual machine scale set under the node type.
        isStateless:
          type: boolean
          description: Indicates if the node type can only host Stateless workloads.
        multiplePlacementGroups:
          type: boolean
          description: Indicates if scale set associated with the node type can be composed of multiple placement groups.
        frontendConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/FrontendConfiguration"
          description: Indicates the node type uses its own frontend configurations instead of the default one for the cluster. This setting can only be specified for non-primary node types and can not be added or removed after the node type is created.
        networkSecurityRules:
          type: array
          items:
            $ref: "#/components/schemas/NetworkSecurityRule"
          description: The Network Security Rules for this node type. This setting can only be specified for node types that are configured with frontend configurations.
        additionalDataDisks:
          type: array
          items:
            $ref: "#/components/schemas/VmssDataDisk"
          description: Additional managed data disks.
        enableEncryptionAtHost:
          type: boolean
          description: "Enable or disable the Host Encryption for the virtual machines on the node type. This will enable the encryption for all the disks including Resource/Temp disk at host itself. Default: The Encryption at host will be disabled unless this property is set to true for the resource."
        provisioningState:
          $ref: "#/components/schemas/ManagedResourceProvisioningState"
          description: 'The provisioning state of the node type resource. Known values are: "None", "Creating", "Created", "Updating", "Succeeded", "Failed", "Canceled", "Deleting", "Deleted", and "Other".'
        enableAcceleratedNetworking:
          type: boolean
          description: Specifies whether the network interface is accelerated networking-enabled.
        useDefaultPublicLoadBalancer:
          type: boolean
          description: Specifies whether the use public load balancer. If not specified and the node type doesn't have its own frontend configuration, it will be attached to the default load balancer. If the node type uses its own Load balancer and useDefaultPublicLoadBalancer is true, then the frontend has to be an Internal Load Balancer. If the node type uses its own Load balancer and useDefaultPublicLoadBalancer is false or not set, then the custom load balancer must include a public load balancer to provide outbound connectivity.
        useTempDataDisk:
          type: boolean
          description: Specifies whether to use the temporary disk for the service fabric data root, in which case no managed data disk will be attached and the temporary disk will be used. It is only allowed for stateless node types.
        enableOverProvisioning:
          type: boolean
          description: Specifies whether the node type should be overprovisioned. It is only allowed for stateless node types.
        zones:
          type: array
          items:
            type: string
          description: Specifies the availability zones where the node type would span across. If the cluster is not spanning across availability zones, initiates az migration for the cluster.
        isSpotVM:
          type: boolean
          description: Indicates whether the node type will be Spot Virtual Machines. Azure will allocate the VMs if there is capacity available and the VMs can be evicted at any time.
        hostGroupId:
          type: string
          description: Specifies the full host group resource Id. This property is used for deploying on azure dedicated hosts.
        useEphemeralOSDisk:
          type: boolean
          description: Indicates whether to use ephemeral os disk. The sku selected on the vmSize property needs to support this feature.
        spotRestoreTimeout:
          type: string
          description: Indicates the time duration after which the platform will not try to restore the VMSS SPOT instances specified as ISO 8601.
        evictionPolicy:
          $ref: "#/components/schemas/EvictionPolicyType"
          description: 'Specifies the eviction policy for virtual machines in a SPOT node type. Default is Delete. Known values are: "Delete" and "Deallocate".'
        vmImageResourceId:
          type: string
          description: Indicates the resource id of the vm image. This parameter is used for custom vm image.
        subnetId:
          type: string
          description: Indicates the resource id of the subnet for the node type.
        vmSetupActions:
          type: array
          items:
            $ref: "#/components/schemas/VmSetupAction"
          description: Specifies the actions to be performed on the vms before bootstrapping the service fabric runtime.
        securityType:
          $ref: "#/components/schemas/SecurityType"
          description: 'Specifies the security type of the nodeType. Supported values include Standard, TrustedLaunch and ConfidentialVM. Known values are: "TrustedLaunch", "Standard", and "ConfidentialVM".'
        securityEncryptionType:
          $ref: "#/components/schemas/SecurityEncryptionType"
          description: 'Specifies the EncryptionType of the managed disk. It is set to DiskWithVMGuestState for encryption of the managed disk along with VMGuestState blob and VMGuestStateOnly for encryption of just the VMGuestState blob. Note: It can be set for only Confidential VMs. Known values are: "DiskWithVMGuestState" and "VMGuestStateOnly".'
        secureBootEnabled:
          type: boolean
          description: Specifies whether secure boot should be enabled on the nodeType. Can only be used with TrustedLaunch and ConfidentialVM SecurityType.
        enableNodePublicIP:
          type: boolean
          description: Specifies whether each node is allocated its own public IPv4 address. This is only supported on secondary node types with custom Load Balancers.
        enableNodePublicIPv6:
          type: boolean
          description: Specifies whether each node is allocated its own public IPv6 address. This is only supported on secondary node types with custom Load Balancers.
        vmSharedGalleryImageId:
          type: string
          description: Indicates the resource id of the vm shared galleries image. This parameter is used for custom vm image.
        natGatewayId:
          type: string
          description: Specifies the resource id of a NAT Gateway to attach to the subnet of this node type. Node type must use custom load balancer.
        natConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/NodeTypeNatConfig"
          description: Specifies the NAT configuration on default public Load Balancer for the node type. This is only supported for node types use the default public Load Balancer.
        vmImagePlan:
          $ref: "#/components/schemas/VmImagePlan"
          description: Specifies information about the marketplace image used to create the virtual machine. This element is only used for marketplace images. Before you can use a marketplace image from an API, you must enable the image for programmatic use. In the Azure portal, find the marketplace image that you want to use and then click Want to deploy programmatically, Get Started ->. Enter any required information and then click Save.
        serviceArtifactReferenceId:
          type: string
          description: Specifies the service artifact reference id used to set same image version for all virtual machines in the scale set when using 'latest' image version.
        dscpConfigurationId:
          type: string
          description: Specifies the resource id of the DSCP configuration to apply to the node type network interface.
        additionalNetworkInterfaceConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalNetworkInterfaceConfiguration"
          description: Specifies the settings for any additional secondary network interfaces to attach to the node type.
        computerNamePrefix:
          type: string
          description: Specifies the computer name prefix. Limited to 9 characters. If specified, allows for a longer name to be specified for the node type name.
        vmApplications:
          type: array
          items:
            $ref: "#/components/schemas/VmApplication"
          description: Specifies the gallery applications that should be made available to the underlying VMSS.
        zoneBalance:
          type: boolean
          description: Setting this to true allows stateless node types to scale out without equal distribution across zones.
        isOutboundOnly:
          type: boolean
          description: Specifies the node type should be configured for only outbound traffic and not inbound traffic.
        enableResilientEphemeralOsDisk:
          type: boolean
          description: Specifies whether the node type should use a resilient ephemeral OS disk when using a supported SKU size. A resilient ephemeral OS disk provides improved reliability for ephemeral OS disks by enabling full caching.
        scaleInPolicy:
          $ref: "#/components/schemas/ScaleInPolicy"
          description: Specifies the scale in policy for the node type, which will be used when scale in happens on the cluster. If not specified, the default is Default which means the platform will decide which nodes to remove during scale in.
        proxyAgentSettings:
          $ref: "#/components/schemas/ProxyAgentSettings"
          description: Specifies the settings for the proxy agent on the node type.
    PagedNodeTypeFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/NodeTypeFlattened"
        nextLink:
          type: string
    NodeType:
      type: object
      description: Describes a node type in the cluster, each node type represents sub set of nodes in the cluster.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/NodeTypeProperties"
          description: The node type properties.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        sku:
          $ref: "#/components/schemas/NodeTypeSku"
          description: The node type sku.
    UpdateType:
      type: string
      enum:
        - Default
        - ByUpgradeDomain
    ErrorModelError:
