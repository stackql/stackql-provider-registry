          description: The absolute expiration timestamp (UTC) after which this fault simulation should be stopped if it's still active.
    FaultSimulation:
      type: object
      description: Fault simulation object with status.
      properties:
        simulationId:
          type: string
          description: unique identifier for the fault simulation.
        status:
          $ref: "#/components/schemas/FaultSimulationStatus"
          description: 'Fault simulation status. Known values are: "Starting", "Active", "Stopping", "Done", "StartFailed", and "StopFailed".'
        startTime:
          type: string
          format: date-time
          description: The start time of the fault simulation.
        endTime:
          type: string
          format: date-time
          description: The end time of the fault simulation.
        details:
          $ref: "#/components/schemas/FaultSimulationDetails"
          description: Fault simulation details.
    PagedFaultSimulation:
      type: object
