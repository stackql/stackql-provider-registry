          items:
            $ref: "#/components/schemas/LoadBalancingRule"
          description: Load balancing rules that are applied to the public load balancer of the cluster.
        allowRdpAccess:
          type: boolean
          description: Setting this to true enables RDP access to the VM. The default NSG rule opens RDP port to Internet which can be overridden with custom Network Security Rules. The default value for this setting is false.
        networkSecurityRules:
          type: array
          items:
            $ref: "#/components/schemas/NetworkSecurityRule"
          description: Custom Network Security Rules that are applied to the Virtual Network of the cluster.
        clients:
          type: array
          items:
            $ref: "#/components/schemas/ClientCertificate"
          description: Client certificates that are allowed to manage the cluster.
        azureActiveDirectory:
          $ref: "#/components/schemas/AzureActiveDirectory"
          description: The AAD authentication settings of the cluster.
        fabricSettings:
          type: array
          items:
            $ref: "#/components/schemas/SettingsSectionDescription"
          description: The list of custom fabric settings to configure the cluster.
        provisioningState:
          $ref: "#/components/schemas/ManagedResourceProvisioningState"
          description: 'The provisioning state of the managed cluster resource. Known values are: "None", "Creating", "Created", "Updating", "Succeeded", "Failed", "Canceled", "Deleting", "Deleted", and "Other".'
        clusterCodeVersion:
          type: string
          description: The Service Fabric runtime version of the cluster. This property is required when **clusterUpgradeMode** is set to 'Manual'. To get list of available Service Fabric versions for new clusters use `ClusterVersion API <./ClusterVersion.md>`_. To get the list of available version for existing clusters use **availableClusterVersions**.
        clusterUpgradeMode:
          $ref: "#/components/schemas/ClusterUpgradeMode"
          description: 'The upgrade mode of the cluster when new Service Fabric runtime version is available. Known values are: "Automatic" and "Manual".'
        clusterUpgradeCadence:
          $ref: "#/components/schemas/ClusterUpgradeCadence"
          description: "Indicates when new cluster runtime version upgrades will be applied after they are released. By default is Wave0. Only applies when **clusterUpgradeMode** is set to 'Automatic'. Known values are: \"Wave0\", \"Wave1\", and \"Wave2\"."
        addonFeatures:
          type: array
          items:
            $ref: "#/components/schemas/ManagedClusterAddOnFeature"
          description: List of add-on features to enable on the cluster.
        enableAutoOSUpgrade:
          type: boolean
          description: Enables automatic OS upgrade for node types created using OS images with version 'latest'. The default value for this setting is false.
        zonalResiliency:
          type: boolean
          description: Indicates if the cluster has zone resiliency.
        applicationTypeVersionsCleanupPolicy:
          $ref: "#/components/schemas/ApplicationTypeVersionsCleanupPolicy"
          description: The policy used to clean up unused versions.
        enableIpv6:
          type: boolean
          description: Setting this to true creates IPv6 address space for the default VNet used by the cluster. This setting cannot be changed once the cluster is created. The default value for this setting is false.
        subnetId:
          type: string
          description: If specified, the node types for the cluster are created in this subnet instead of the default VNet. The **networkSecurityRules** specified for the cluster are also applied to this subnet. This setting cannot be changed once the cluster is created.
        ipTags:
          type: array
          items:
            $ref: "#/components/schemas/IpTag"
          description: The list of IP tags associated with the default public IP address of the cluster.
        ipv6Address:
          type: string
          description: IPv6 address for the cluster if IPv6 is enabled.
        enableServicePublicIP:
          type: boolean
          description: Setting this to true will link the IPv4 address as the ServicePublicIP of the IPv6 address. It can only be set to True if IPv6 is enabled on the cluster.
        auxiliarySubnets:
          type: array
          items:
            $ref: "#/components/schemas/Subnet"
          description: Auxiliary subnets for the cluster.
        serviceEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/ServiceEndpoint"
          description: Service endpoints for subnets in the cluster.
        zonalUpdateMode:
          $ref: "#/components/schemas/ZonalUpdateMode"
          description: 'Indicates the update mode for Cross Az clusters. Known values are: "Standard" and "Fast".'
        useCustomVnet:
          type: boolean
          description: For new clusters, this parameter indicates that it uses Bring your own VNet, but the subnet is specified at node type level; and for such clusters, the subnetId property is required for node types.
        publicIPPrefixId:
          type: string
          description: Specify the resource id of a public IPv4 prefix that the load balancer will allocate a public IPv4 address from. This setting cannot be changed once the cluster is created.
        publicIPv6PrefixId:
          type: string
          description: Specify the resource id of a public IPv6 prefix that the load balancer will allocate a public IPv6 address from. This setting cannot be changed once the cluster is created.
        ddosProtectionPlanId:
          type: string
          description: Specify the resource id of a DDoS network protection plan that will be associated with the virtual network of the cluster.
        upgradeDescription:
          $ref: "#/components/schemas/ClusterUpgradePolicy"
          description: The policy to use when upgrading the cluster.
        httpGatewayTokenAuthConnectionPort:
          type: integer
          description: The port used for token-auth based HTTPS connections to the cluster. Cannot be set to the same port as HttpGatewayEndpoint.
        enableHttpGatewayExclusiveAuthMode:
          type: boolean
          description: If true, token-based authentication is not allowed on the HttpGatewayEndpoint. This is required to support TLS versions 1.3 and above. If token-based authentication is used, HttpGatewayTokenAuthConnectionPort must be defined.
        autoGeneratedDomainNameLabelScope:
          $ref: "#/components/schemas/AutoGeneratedDomainNameLabelScope"
          description: 'This property is the entry point to using a public CA cert for your cluster cert. It specifies the level of reuse allowed for the custom FQDN created, matching the subject of the public CA cert. Known values are: "TenantReuse", "SubscriptionReuse", "ResourceGroupReuse", and "NoReuse".'
        allocatedOutboundPorts:
          type: integer
          description: The number of outbound ports allocated for SNAT for each node in the backend pool of the default load balancer. The default value is 0 which provides dynamic port allocation based on pool size.
        VMImage:
          type: string
          description: "The VM image the node types are configured with. This property controls the Service Fabric component packages to be used for the cluster. Allowed values are: 'Windows'. The default value is 'Windows'."
        enableOutboundOnlyNodeTypes:
          type: boolean
          description: Enable the creation of node types with only outbound traffic enabled. If set, a separate load balancer backend pool will be created for node types with inbound traffic enabled. Can only be set at the time of cluster creation.
        skipManagedNsgAssignment:
          type: boolean
          description: Determines whether to skip the assignment of the managed network security group (SF-NSG) to the cluster subnet when using a bring-your-own virtual network (BYOVNET) configuration. The default value is false.
      required:
        - dnsName
        - adminUserName
    ClusterState:
      type: string
      enum:
        - WaitingForNodes
        - Deploying
        - BaselineUpgrade
        - Upgrading
        - UpgradeFailed
        - Ready
    LoadBalancingRule:
      type: object
      description: Describes a load balancing rule.
      properties:
        frontendPort:
          type: integer
          description: The port for the external endpoint. Port numbers for each rule must be unique within the Load Balancer. Acceptable values are between 1 and 65534. Required.
        backendPort:
          type: integer
          description: The port used for internal connections on the endpoint. Acceptable values are between 1 and 65535. Required.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: 'The reference to the transport protocol used by the load balancing rule. Required. Known values are: "tcp" and "udp".'
        probePort:
          type: integer
          description: The prob port used by the load balancing rule. Acceptable values are between 1 and 65535.
        probeProtocol:
          $ref: "#/components/schemas/ProbeProtocol"
          description: 'the reference to the load balancer probe used by the load balancing rule. Required. Known values are: "tcp", "http", and "https".'
        probeRequestPath:
          type: string
          description: The probe request path. Only supported for HTTP/HTTPS probes.
        loadDistribution:
          type: string
          description: The load distribution policy for this rule.
      required:
        - frontendPort
        - backendPort
        - protocol
        - probeProtocol
    Protocol:
      type: string
      enum:
        - tcp
        - udp
    ProbeProtocol:
      type: string
      enum:
        - tcp
        - http
        - https
    NetworkSecurityRule:
      type: object
      description: Describes a network security rule.
      properties:
        name:
          type: string
          description: Network security rule name. Required.
        description:
          type: string
          description: Network security rule description.
        protocol:
          $ref: "#/components/schemas/NsgProtocol"
          description: 'Network protocol this rule applies to. Required. Known values are: "http", "https", "tcp", "udp", "icmp", "ah", and "esp".'
        sourceAddressPrefixes:
          type: array
          items:
            type: string
          description: The CIDR or source IP ranges.
        destinationAddressPrefixes:
          type: array
          items:
            type: string
          description: The destination address prefixes. CIDR or destination IP ranges.
        sourcePortRanges:
          type: array
          items:
            type: string
          description: The source port ranges.
        destinationPortRanges:
          type: array
          items:
            type: string
          description: The destination port ranges.
        sourceAddressPrefix:
          type: string
          description: The CIDR or source IP range. Asterisk '*' can also be used to match all source IPs. Default tags such as 'VirtualNetwork', 'AzureLoadBalancer' and 'Internet' can also be used. If this is an ingress rule, specifies where network traffic originates from.
        destinationAddressPrefix:
          type: string
          description: The destination address prefix. CIDR or destination IP range. Asterisk '*' can also be used to match all source IPs. Default tags such as 'VirtualNetwork', 'AzureLoadBalancer' and 'Internet' can also be used.
        sourcePortRange:
          type: string
          description: The source port or range. Integer or range between 0 and 65535. Asterisk '*' can also be used to match all ports.
        destinationPortRange:
          type: string
          description: he destination port or range. Integer or range between 0 and 65535. Asterisk '*' can also be used to match all ports.
        access:
          $ref: "#/components/schemas/Access"
          description: 'The network traffic is allowed or denied. Required. Known values are: "allow" and "deny".'
        priority:
          type: integer
          description: The priority of the rule. The value can be in the range 1000 to 3000. Values outside this range are reserved for Service Fabric ManagerCluster Resource Provider. The priority number must be unique for each rule in the collection. The lower the priority number, the higher the priority of the rule. Required.
        direction:
          $ref: "#/components/schemas/Direction"
          description: 'Network security rule direction. Required. Known values are: "inbound" and "outbound".'
      required:
        - name
        - protocol
        - access
        - priority
        - direction
    NsgProtocol:
      type: string
      enum:
        - http
        - https
        - tcp
        - udp
        - icmp
        - ah
        - esp
    Access:
      type: string
      enum:
        - allow
        - deny
    Direction:
