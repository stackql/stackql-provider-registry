      description: Details for Fault Simulation.
      properties:
        clusterId:
          type: string
          description: unique identifier for the cluster resource.
        operationId:
          type: string
          description: unique identifier for the operation associated with the fault simulation.
        nodeTypeFaultSimulation:
          type: array
          items:
            $ref: "#/components/schemas/NodeTypeFaultSimulation"
          description: List of node type simulations associated with the cluster fault simulation.
        parameters:
          $ref: "#/components/schemas/FaultSimulationContent"
          description: Fault simulation parameters.
    NodeTypeFaultSimulation:
      type: object
      description: Node type fault simulation object with status.
      properties:
        nodeTypeName:
          type: string
          description: Node type name.
        status:
          $ref: "#/components/schemas/FaultSimulationStatus"
          description: 'Fault simulation status. Known values are: "Starting", "Active", "Stopping", "Done", "StartFailed", and "StopFailed".'
        operationId:
          type: string
          description: Current or latest asynchronous operation identifier on the node type.
        operationStatus:
          $ref: "#/components/schemas/SfmcOperationStatus"
          description: 'Current or latest asynchronous operation status on the node type. Known values are: "Created", "Started", "Succeeded", "Failed", "Aborted", and "Canceled".'
    SfmcOperationStatus:
      type: string
      enum:
        - Created
        - Started
        - Succeeded
        - Failed
        - Aborted
        - Canceled
    FaultSimulationContent:
      type: object
      description: "Parameters for Fault Simulation action. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ZoneFaultSimulationContent"
      properties:
        faultKind:
          type: string
          description: The kind of fault to be simulated. Required. "Zone"
        force:
          type: boolean
          description: Force the action to go through without any check on the cluster.
        constraints:
          $ref: "#/components/schemas/FaultSimulationConstraints"
          description: Constraints for Fault Simulation action.
