          description: A list that describes the correlation of the service with other services.
        serviceLoadMetrics:
          type: array
          items:
            $ref: "#/components/schemas/ServiceLoadMetric"
          description: The service load metrics is given as an array of ServiceLoadMetric objects.
        servicePlacementPolicies:
          type: array
          items:
            $ref: "#/components/schemas/ServicePlacementPolicy"
          description: A list that describes the correlation of the service with other services.
        defaultMoveCost:
          $ref: "#/components/schemas/MoveCost"
          description: 'Specifies the move cost for the service. Known values are: "Zero", "Low", "Medium", and "High".'
        scalingPolicies:
          type: array
          items:
            $ref: "#/components/schemas/ScalingPolicy"
          description: Scaling policies for this service.
        provisioningState:
          type: string
          description: The current deployment or provisioning state, which only appears in the response.
        serviceKind:
          type: string
          description: 'The kind of service (Stateless or Stateful). Required. Known values are: "Stateless" and "Stateful".'
        serviceTypeName:
          type: string
          description: The name of the service type. Required.
        partitionDescription:
          $ref: "#/components/schemas/Partition"
          description: Describes how the service is partitioned. Required.
        servicePackageActivationMode:
          $ref: "#/components/schemas/ServicePackageActivationMode"
          description: 'The activation Mode of the service package. Known values are: "SharedProcess" and "ExclusiveProcess".'
        serviceDnsName:
          type: string
          description: Dns name used for the service. If this is specified, then the DNS name can be used to return the IP addresses of service endpoints for application layer protocols (e.g., HTTP). When updating serviceDnsName, old name may be temporarily resolvable. However, rely on new name. When removing serviceDnsName, removed name may temporarily be resolvable. Do not rely on the name being unresolvable.
      required:
        - serviceKind
        - serviceTypeName
        - partitionDescription
