          description: Last window update time in UTC.
        lastWindowStartTimeUTC:
          type: string
          format: date-time
          description: Last window start time in UTC.
        lastWindowEndTimeUTC:
          type: string
          format: date-time
          description: Last window end time in UTC.
    VMSize:
