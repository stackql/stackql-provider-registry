    ZonalUpdateMode:
      type: string
      enum:
        - Standard
        - Fast
    ClusterUpgradePolicy:
      type: object
      description: Describes the policy used when upgrading the cluster.
      properties:
        forceRestart:
          type: boolean
          description: If true, then processes are forcefully restarted during upgrade even when the code version has not changed (the upgrade only changes configuration or data).
        healthPolicy:
          $ref: "#/components/schemas/ClusterHealthPolicy"
          description: The cluster health policy defines a health policy used to evaluate the health of the cluster during a cluster upgrade.
        deltaHealthPolicy:
          $ref: "#/components/schemas/ClusterUpgradeDeltaHealthPolicy"
          description: The cluster delta health policy defines a health policy used to evaluate the health of the cluster during a cluster upgrade.
        monitoringPolicy:
          $ref: "#/components/schemas/ClusterMonitoringPolicy"
          description: The cluster monitoring policy describes the parameters for monitoring an upgrade in Monitored mode.
        upgradeReplicaSetCheckTimeout:
          type: string
          description: The maximum amount of time to block processing of an upgrade domain and prevent loss of availability when there are unexpected issues. When this timeout expires, processing of the upgrade domain will proceed regardless of availability loss issues. The timeout is reset at the start of each upgrade domain. The timeout can be in either hh:mm:ss or in d.hh:mm:ss.ms format. This value must be between 00:00:00 and 49710.06:28:15 (unsigned 32 bit integer for seconds).
    ClusterHealthPolicy:
      type: object
      description: Defines a health policy used to evaluate the health of the cluster or of a cluster node.
      properties:
        maxPercentUnhealthyNodes:
          type: integer
          description: The maximum allowed percentage of unhealthy nodes before reporting an error. For example, to allow 10% of nodes to be unhealthy, this value would be 10. The percentage represents the maximum tolerated percentage of nodes that can be unhealthy before the cluster is considered in error. If the percentage is respected but there is at least one unhealthy node, the health is evaluated as Warning. The percentage is calculated by dividing the number of unhealthy nodes over the total number of nodes in the cluster. The computation rounds up to tolerate one failure on small numbers of nodes. Default percentage is zero. In large clusters, some nodes will always be down or out for repairs, so this percentage should be configured to tolerate that. Required.
        maxPercentUnhealthyApplications:
          type: integer
          description: The maximum allowed percentage of unhealthy applications before reporting an error. For example, to allow 10% of applications to be unhealthy, this value would be 10. The percentage represents the maximum tolerated percentage of applications that can be unhealthy before the cluster is considered in error. If the percentage is respected but there is at least one unhealthy application, the health is evaluated as Warning. This is calculated by dividing the number of unhealthy applications over the total number of application instances in the cluster, excluding applications of application types that are included in the ApplicationTypeHealthPolicyMap. The computation rounds up to tolerate one failure on small numbers of applications. Default percentage is zero. Required.
      required:
        - maxPercentUnhealthyNodes
        - maxPercentUnhealthyApplications
    ClusterUpgradeDeltaHealthPolicy:
      type: object
      description: Describes the delta health policies for the cluster upgrade.
      properties:
        maxPercentDeltaUnhealthyNodes:
          type: integer
          description: The maximum allowed percentage of nodes health degradation allowed during cluster upgrades. The delta is measured between the state of the nodes at the beginning of upgrade and the state of the nodes at the time of the health evaluation. The check is performed after every upgrade domain upgrade completion to make sure the global state of the cluster is within tolerated limits. Required.
        maxPercentUpgradeDomainDeltaUnhealthyNodes:
          type: integer
          description: The maximum allowed percentage of upgrade domain nodes health degradation allowed during cluster upgrades. The delta is measured between the state of the upgrade domain nodes at the beginning of upgrade and the state of the upgrade domain nodes at the time of the health evaluation. The check is performed after every upgrade domain upgrade completion for all completed upgrade domains to make sure the state of the upgrade domains is within tolerated limits.
        maxPercentDeltaUnhealthyApplications:
          type: integer
          description: "The maximum allowed percentage of applications health degradation allowed during cluster upgrades. The delta is measured between the state of the applications at the beginning of upgrade and the state of the applications at the time of the health evaluation. The check is performed after every upgrade domain upgrade completion to make sure the global state of the cluster is within tolerated limits. System services are not included in this. NOTE: This value will overwrite the value specified in properties.UpgradeDescription.HealthPolicy.MaxPercentUnhealthyApplications."
      required:
        - maxPercentDeltaUnhealthyNodes
    ClusterMonitoringPolicy:
      type: object
      description: Describes the monitoring policies for the cluster upgrade.
      properties:
        healthCheckWaitDuration:
          type: string
          description: The length of time to wait after completing an upgrade domain before performing health checks. The duration can be in either hh:mm:ss or in d.hh:mm:ss.ms format. Required.
        healthCheckStableDuration:
          type: string
          description: The amount of time that the application or cluster must remain healthy before the upgrade proceeds to the next upgrade domain. The duration can be in either hh:mm:ss or in d.hh:mm:ss.ms format. Required.
        healthCheckRetryTimeout:
          type: string
          description: The amount of time to retry health evaluation when the application or cluster is unhealthy before the upgrade rolls back. The timeout can be in either hh:mm:ss or in d.hh:mm:ss.ms format. Required.
        upgradeTimeout:
          type: string
          description: The amount of time the overall upgrade has to complete before the upgrade rolls back. The timeout can be in either hh:mm:ss or in d.hh:mm:ss.ms format. Required.
        upgradeDomainTimeout:
          type: string
          description: The amount of time each upgrade domain has to complete before the upgrade rolls back. The timeout can be in either hh:mm:ss or in d.hh:mm:ss.ms format. Required.
      required:
        - healthCheckWaitDuration
        - healthCheckStableDuration
        - healthCheckRetryTimeout
        - upgradeTimeout
        - upgradeDomainTimeout
