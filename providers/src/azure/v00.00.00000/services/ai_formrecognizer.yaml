paths:
  /custom/models:
    get:
      operationId: FormRecognizerClient_list_custom_models
      description: List Custom Models. Get information about all custom models.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedModels"
  /custom/models/{model_id}:
    get:
      operationId: FormRecognizerClient_get_custom_model
      description: Get Custom Model. Get detailed information about a custom model.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Model identifier.
        - name: includeKeys
          in: query
          required: false
          schema:
            type: boolean
          description: Include list of extracted keys in model information. Default value is False.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
    delete:
      operationId: FormRecognizerClient_delete_custom_model
      description: Delete Custom Model. Mark model for deletion. Model artifacts will be permanently removed within a predetermined period.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Model identifier.
      responses:
        "204":
          description: Success (no content / accepted)
  /custom/models/{model_id}/analyzeResults/{result_id}:
    get:
      operationId: FormRecognizerClient_get_analyze_form_result
      description: Get Analyze Form Result. Obtain current status and the result of the analyze form operation.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Model identifier.
        - name: result_id
          in: path
          required: true
          schema:
            type: string
          description: Analyze operation result identifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeOperationResult"
  /custom/models/{model_id}/copyResults/{result_id}:
    get:
      operationId: FormRecognizerClient_get_custom_model_copy_result
      description: Get Custom Model Copy Result. Obtain current status and the result of a custom model copy operation.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Model identifier.
        - name: result_id
          in: path
          required: true
          schema:
            type: string
          description: Copy operation result identifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyOperationResult"
  /prebuilt/businessCard/analyzeResults/{result_id}:
    get:
      operationId: FormRecognizerClient_get_analyze_business_card_result
