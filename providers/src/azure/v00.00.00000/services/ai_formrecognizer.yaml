openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme).
info:
  title: Document Analysis Client
  description: "DocumentAnalysisClient analyzes information from documents and images, and classifies documents. It is the interface to use for analyzing with prebuilt models (receipts, business cards, invoices, identity documents, among others), analyzing layout from documents, analyzing general document types, and analyzing custom documents with built models (to see a full list of models supported by the service, see: https://aka.ms/azsdk/formrecognizer/models). It provides different methods based on inputs from a URL and inputs from a stream. .. note:: DocumentAnalysisClient should be used with API versions 2022-08-31 and up. To use API versions <=v2.1, instantiate a FormRecognizerClient."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: unversioned-stackql-generated
  x-serviceAlias: ai_formrecognizer
  x-sdkPackage: azure-ai-formrecognizer
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ModelInfo:
      type: object
      description: Basic custom model information. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        modelId:
          type: string
          description: Required. Model identifier.
        status:
          type: string
          description: 'Required. Status of the model. Known values are: "creating", "ready", "invalid".'
        createdDateTime:
          type: string
          format: date-time
          description: Required. Date and time (UTC) when the model was created.
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: Required. Date and time (UTC) when the status was last updated.
        modelName:
          type: string
          description: "Optional user defined model name (max length: 1024)."
        attributes:
          $ref: "#/components/schemas/Attributes"
          description: Optional model attributes.
      required:
        - modelInfo
        - modelId
        - status
        - createdDateTime
        - lastUpdatedDateTime
    KeysResult:
      type: object
      description: Keys extracted by the custom model. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        clusters:
          type: object
          properties: {}
          description: Required. Object mapping clusterIds to a list of keys.
      required:
        - modelInfo
        - clusters
    TrainResult:
      type: object
      description: Custom model training result. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        trainingDocuments:
          type: array
          items:
            $ref: "#/components/schemas/TrainingDocumentInfo"
          description: Required. List of the documents used to train the model and any errors reported in each document.
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FormFieldsReport"
          description: List of fields used to train the model and the train operation error reported by each.
        averageModelAccuracy:
          type: number
          description: Average accuracy.
        modelId:
          type: string
          description: Model identifier.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorInformation"
          description: Errors returned during the training operation.
      required:
        - modelInfo
        - trainingDocuments
    TrainingDocumentInfo:
      type: object
      description: Report for a custom model training document. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        documentName:
          type: string
          description: Required. Training document name.
        pages:
          type: integer
          description: Required. Total number of pages trained.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorInformation"
          description: Required. List of errors.
        status:
          type: string
          description: 'Required. Status of the training operation. Known values are: "succeeded", "partiallySucceeded", "failed".'
      required:
        - modelInfo
        - documentName
        - pages
        - errors
        - status
    ErrorInformation:
      type: object
      description: ErrorInformation. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        code:
          type: string
          description: Required.
        message:
          type: string
          description: Required.
      required:
        - modelInfo
        - code
        - message
    FormFieldsReport:
      type: object
      description: Report for a custom model training field. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        fieldName:
          type: string
          description: Required. Training field name.
        accuracy:
          type: number
          description: Required. Estimated extraction accuracy for this field.
      required:
        - modelInfo
        - fieldName
        - accuracy
    Attributes:
      type: object
      description: Optional model attributes.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        isComposed:
          type: boolean
          description: "Is this model composed? (default: false)."
      required:
        - modelInfo
    ModelsSummary:
      type: object
      description: Summary of all trained custom models. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        count:
          type: integer
          description: Required. Current count of trained custom models.
        limit:
          type: integer
          description: Required. Max number of models that can be trained for this account.
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: Required. Date and time (UTC) when the summary was last updated.
      required:
        - modelInfo
        - count
        - limit
        - lastUpdatedDateTime
    Models:
      type: object
      description: Response to the list custom models operation.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        summary:
          $ref: "#/components/schemas/ModelsSummary"
          description: Summary of all trained custom models.
        modelList:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"
          description: Collection of trained custom models.
        nextLink:
          type: string
          description: Link to the next page of custom models.
      required:
        - modelInfo
    PagedModels:
      type: object
      properties:
        model_list:
          type: array
          items:
            $ref: "#/components/schemas/Models"
        nextLink:
          type: string
    Model:
      type: object
      description: Response to the get custom model operation. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
      required:
        - modelInfo
    AnalyzeResult:
      type: object
      description: Analyze operation result. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        version:
          type: string
          description: Required. Version of schema used for this result.
        readResults:
          type: array
          items:
            $ref: "#/components/schemas/ReadResult"
          description: Required. Text extracted from the input.
        pageResults:
          type: array
          items:
            $ref: "#/components/schemas/PageResult"
          description: Page-level information extracted from the input.
        documentResults:
          type: array
          items:
            $ref: "#/components/schemas/DocumentResult"
          description: Document-level information extracted from the input.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorInformation"
          description: List of errors reported during the analyze operation.
      required:
        - modelInfo
        - version
        - readResults
    ReadResult:
      type: object
      description: Text extracted from a page in the input document. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        page:
          type: integer
          description: Required. The 1-based page number in the input document.
        angle:
          type: number
          description: Required. The general orientation of the text in clockwise direction, measured in degrees between (-180, 180].
        width:
          type: number
          description: Required. The width of the image/PDF in pixels/inches, respectively.
        height:
          type: number
          description: Required. The height of the image/PDF in pixels/inches, respectively.
        unit:
          type: string
          description: 'Required. The unit used by the width, height and boundingBox properties. For images, the unit is "pixel". For PDF, the unit is "inch". Known values are: "pixel", "inch".'
        lines:
          type: array
          items:
            $ref: "#/components/schemas/TextLine"
          description: When includeTextDetails is set to true, a list of recognized text lines. The maximum number of lines returned is 300 per page. The lines are sorted top to bottom, left to right, although in certain cases proximity is treated with higher priority. As the sorting order depends on the detected text, it may change across images and OCR version updates. Thus, business logic should be built upon the actual line location instead of order.
        selectionMarks:
          type: array
          items:
            $ref: "#/components/schemas/SelectionMark"
          description: List of selection marks extracted from the page.
      required:
        - modelInfo
        - page
        - angle
        - width
        - height
        - unit
    TextLine:
      type: object
      description: An object representing an extracted text line. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        text:
          type: string
          description: Required. The text content of the line.
        boundingBox:
          type: array
          items:
            type: number
          description: Required. Bounding box of an extracted line.
        words:
          type: array
          items:
            $ref: "#/components/schemas/TextWord"
          description: Required. List of words in the text line.
        appearance:
          $ref: "#/components/schemas/Appearance"
          description: Text appearance properties.
      required:
        - modelInfo
        - text
        - boundingBox
        - words
    TextWord:
      type: object
      description: An object representing a word. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        text:
          type: string
          description: Required. The text content of the word.
        boundingBox:
          type: array
          items:
            type: number
          description: Required. Bounding box of an extracted word.
        confidence:
          type: number
          description: Confidence value.
      required:
        - modelInfo
        - text
        - boundingBox
    Appearance:
      type: object
      description: An object representing the appearance of the text line. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        style:
          $ref: "#/components/schemas/Style"
          description: Required. An object representing the style of the text line.
      required:
        - modelInfo
        - style
    Style:
      type: object
      description: An object representing the style of the text line. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        name:
          type: string
          description: 'Required. The text line style name, including handwriting and other. Known values are: "other", "handwriting".'
        confidence:
          type: number
          description: Required. The confidence of text line style.
      required:
        - modelInfo
        - name
        - confidence
    SelectionMark:
      type: object
      description: Information about the extracted selection mark. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        boundingBox:
          type: array
          items:
            type: number
          description: Required. Bounding box of the selection mark.
        confidence:
          type: number
          description: Required. Confidence value.
        state:
          type: string
          description: 'Required. State of the selection mark. Known values are: "selected", "unselected".'
      required:
        - modelInfo
        - boundingBox
        - confidence
        - state
    PageResult:
      type: object
      description: Extracted information from a single page. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        page:
          type: integer
          description: Required. Page number.
        clusterId:
          type: integer
          description: Cluster identifier.
        keyValuePairs:
          type: array
          items:
            $ref: "#/components/schemas/KeyValuePair"
          description: List of key-value pairs extracted from the page.
        tables:
          type: array
          items:
            $ref: "#/components/schemas/DataTable"
          description: List of data tables extracted from the page.
      required:
        - modelInfo
        - page
    KeyValuePair:
      type: object
      description: Information about the extracted key-value pair. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        label:
          type: string
          description: A user defined label for the key/value pair entry.
        key:
          $ref: "#/components/schemas/KeyValueElement"
          description: Required. Information about the extracted key in a key-value pair.
        value:
          $ref: "#/components/schemas/KeyValueElement"
          description: Required. Information about the extracted value in a key-value pair.
        confidence:
          type: number
          description: Required. Confidence value.
      required:
        - modelInfo
        - key
        - value
        - confidence
    KeyValueElement:
      type: object
      description: Information about the extracted key or value in a key-value pair. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        type:
          type: string
          description: 'Semantic data type of the key value element. Known values are: "string", "selectionMark".'
        text:
          type: string
          description: Required. The text content of the key or value.
        boundingBox:
          type: array
          items:
            type: number
          description: Bounding box of the key or value.
        elements:
          type: array
          items:
            type: string
          description: When includeTextDetails is set to true, a list of references to the text elements constituting this key or value.
      required:
        - modelInfo
        - text
    DataTable:
      type: object
      description: Information about the extracted table contained in a page. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        rows:
          type: integer
          description: Required. Number of rows.
        columns:
          type: integer
          description: Required. Number of columns.
        cells:
          type: array
          items:
            $ref: "#/components/schemas/DataTableCell"
          description: Required. List of cells contained in the table.
        boundingBox:
          type: array
          items:
            type: number
          description: Required. Bounding box of the table.
      required:
        - modelInfo
        - rows
        - columns
        - cells
        - boundingBox
    DataTableCell:
      type: object
      description: Information about the extracted cell in a table. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        rowIndex:
          type: integer
          description: Required. Row index of the cell.
        columnIndex:
          type: integer
          description: Required. Column index of the cell.
        rowSpan:
          type: integer
          description: Number of rows spanned by this cell.
        columnSpan:
          type: integer
          description: Number of columns spanned by this cell.
        text:
          type: string
          description: Required. Text content of the cell.
        boundingBox:
          type: array
          items:
            type: number
          description: Required. Bounding box of the cell.
        confidence:
          type: number
          description: Required. Confidence value.
        elements:
          type: array
          items:
            type: string
          description: When includeTextDetails is set to true, a list of references to the text elements constituting this table cell.
        isHeader:
          type: boolean
          description: Is the current cell a header cell?.
        isFooter:
          type: boolean
          description: Is the current cell a footer cell?.
      required:
        - modelInfo
        - rowIndex
        - columnIndex
        - text
        - boundingBox
        - confidence
    DocumentResult:
      type: object
      description: A set of extracted fields corresponding to the input document. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        docType:
          type: string
          description: Required. Document type.
        modelId:
          type: string
          description: Model identifier.
        pageRange:
          type: array
          items:
            type: integer
          description: Required. First and last page number where the document is found.
        docTypeConfidence:
          type: number
          description: Predicted document type confidence.
        fields:
          type: object
          properties: {}
          description: Required. Dictionary of named field values.
      required:
        - modelInfo
        - docType
        - pageRange
        - fields
    AnalyzeOperationResult:
      type: object
      description: Status and result of the queued analyze operation. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
