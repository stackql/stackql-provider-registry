        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        modelId:
          type: string
          description: Required. Identifier of the target model.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorInformation"
          description: Errors returned during the copy operation.
      required:
        - modelInfo
        - modelId
    CopyOperationResult:
      type: object
      description: Status and result of the queued copy operation. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        status:
          type: string
          description: 'Required. Operation status. Known values are: "notStarted", "running", "succeeded", "failed".'
        createdDateTime:
          type: string
          format: date-time
          description: Required. Date and time (UTC) when the copy operation was submitted.
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: Required. Date and time (UTC) when the status was last updated.
        copyResult:
          $ref: "#/components/schemas/CopyResult"
          description: Results of the copy operation.
      required:
        - modelInfo
        - status
        - createdDateTime
        - lastUpdatedDateTime
    CopyAuthorizationResult:
      type: object
      description: Request parameter that contains authorization claims for copy operation. All required parameters must be populated in order to send to Azure.
      properties:
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Required. Basic custom model information.
        keys:
          $ref: "#/components/schemas/KeysResult"
          description: Keys extracted by the custom model.
        trainResult:
          $ref: "#/components/schemas/TrainResult"
          description: Training result for custom model.
        composedTrainResults:
          type: array
          items:
            $ref: "#/components/schemas/TrainResult"
          description: Training result for composed model.
        modelId:
          type: string
          description: Required. Model identifier.
        accessToken:
          type: string
          description: Required. Token claim used to authorize the request.
        expirationDateTimeTicks:
          type: integer
          format: int64
          description: Required. The time when the access token expires. The date is represented as the number of seconds from 1970-01-01T0:0:0Z UTC until the expiration time.
      required:
        - modelInfo
        - modelId
        - accessToken
        - expirationDateTimeTicks
