paths:
  /:
    get:
      operationId: FileSystem_list_paths
      description: List Paths. List FileSystem paths and their properties.
      parameters:
        - name: recursive
          in: query
          required: true
          schema:
            type: boolean
          description: Required. Required.
        - name: x-ms-version
          in: header
          required: true
          schema:
            type: string
        - name: x-ms-client-request-id
          in: header
          required: false
          schema:
            type: string
          description: Provides a client-generated, opaque value with a 1 KB character limit that is recorded in the analytics logs when storage analytics logging is enabled. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see
        - name: continuation
          in: query
          required: false
          schema:
            type: string
          description: Optional. When deleting a directory, the number of paths that are deleted with each invocation is limited. If the number of paths to be deleted exceeds this limit, a continuation token is returned in this response header. When a continuation token is returned in the response, it must be specified in a subsequent invocation of the delete operation to continue deleting the directory. Default value is None.
        - name: directory
          in: query
          required: false
          schema:
            type: string
          description: Optional. Filters results to paths within the specified directory. An error occurs if the directory does not exist. Default value is None.
        - name: maxResults
          in: query
          required: false
          schema:
            type: integer
          description: An optional value that specifies the maximum number of items to return. If omitted or greater than 5,000, the response will include up to 5,000 items. Default value is None.
        - name: upn
          in: query
          required: false
          schema:
            type: boolean
          description: Optional. Valid only when Hierarchical Namespace is enabled for the account. If "true", the user identity values returned in the x-ms-owner, x-ms-group, and x-ms-acl response headers will be transformed from Azure Active Directory Object IDs to User Principal Names. If "false", the values will be returned as Azure Active Directory Object IDs. The default value is false. Note that group and application Object IDs are not translated because they do not have unique friendly names. Default value is None.
        - name: beginFrom
          in: query
          required: false
          schema:
            type: string
          description: Optional. A relative path within the specified directory where the listing will start from. For example, a recursive listing under directory folder1/folder2 with beginFrom as folder3/readmefile.txt will start listing from folder1/folder2/folder3/readmefile.txt. Please note that, multiple entity levels are supported for recursive listing. Non-recursive listing supports only one entity level. An error will appear if multiple entity levels are specified for non-recursive listing. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathList"
    head:
      operationId: FileSystem_get_properties
      description: Get FileSystem Properties. All system and user-defined filesystem properties are specified in the response headers.
      parameters:
        - name: x-ms-version
          in: header
          required: true
          schema:
            type: string
        - name: x-ms-client-request-id
          in: header
          required: false
          schema:
            type: string
          description: Provides a client-generated, opaque value with a 1 KB character limit that is recorded in the analytics logs when storage analytics logging is enabled. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see
      responses:
        "200":
          description: Success
    put:
      operationId: FileSystem_create
      description: Create FileSystem. Create a FileSystem rooted at the specified location. If the FileSystem already exists, the operation fails. This operation does not support conditional HTTP requests.
      parameters:
        - name: x-ms-version
          in: header
          required: true
          schema:
            type: string
        - name: x-ms-client-request-id
          in: header
          required: false
          schema:
            type: string
          description: Provides a client-generated, opaque value with a 1 KB character limit that is recorded in the analytics logs when storage analytics logging is enabled. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see
        - name: x-ms-properties
          in: header
          required: false
          schema:
            type: string
          description: Optional. User-defined properties to be stored with the filesystem, in the format of a comma-separated list of name and value pairs "n1=v1, n2=v2, ...", where each value is a base64 encoded string. Note that the string may only contain ASCII characters in the ISO-8859-1 character set. If the filesystem exists, any properties not included in the list will be removed. All properties are removed if the header is omitted. To merge new and existing properties, first get all existing properties and the current E-Tag, then make a conditional request with the E-Tag and include values for all properties. Default value is None.
      responses:
        "200":
          description: Success
    patch:
      operationId: FileSystem_set_properties
      description: Set FileSystem Properties. Set properties for the FileSystem. This operation supports conditional HTTP requests. For more information, see `Specifying Conditional Headers for Blob Service Operations `_.
      parameters:
        - name: x-ms-version
          in: header
          required: true
          schema:
            type: string
        - name: x-ms-client-request-id
          in: header
          required: false
          schema:
            type: string
          description: Provides a client-generated, opaque value with a 1 KB character limit that is recorded in the analytics logs when storage analytics logging is enabled. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see
        - name: x-ms-properties
          in: header
          required: false
          schema:
            type: string
          description: Optional. User-defined properties to be stored with the filesystem, in the format of a comma-separated list of name and value pairs "n1=v1, n2=v2, ...", where each value is a base64 encoded string. Note that the string may only contain ASCII characters in the ISO-8859-1 character set. If the filesystem exists, any properties not included in the list will be removed. All properties are removed if the header is omitted. To merge new and existing properties, first get all existing properties and the current E-Tag, then make a conditional request with the E-Tag and include values for all properties. Default value is None.
        - name: If-Modified-Since
          in: header
          required: false
          schema:
            type: string
        - name: If-Unmodified-Since
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ifModifiedSince:
                  type: string
                  description: Specify this header value to operate only on a blob if it has been modified since the specified date/time.
                ifUnmodifiedSince:
                  type: string
                  description: Specify this header value to operate only on a blob if it has not been modified since the specified date/time.
                ifMatch:
                  type: string
                  description: Specify an ETag value to operate only on blobs with a matching value.
                ifNoneMatch:
                  type: string
                  description: Specify an ETag value to operate only on blobs without a matching value.
      responses:
        "200":
          description: Success
    delete:
      operationId: FileSystem_delete
      description: Delete FileSystem. Marks the FileSystem for deletion. When a FileSystem is deleted, a FileSystem with the same identifier cannot be created for at least 30 seconds. While the filesystem is being deleted, attempts to create a filesystem with the same identifier will fail with status code 409 (Conflict), with the service returning additional error information indicating that the filesystem is being deleted. All other operations, including operations on any files or directories within the filesystem, will fail with status code 404 (Not Found) while the filesystem is being deleted. This operation supports conditional HTTP requests. For more information, see `Specifying Conditional Headers for Blob Service Operations `_.
      parameters:
        - name: x-ms-version
          in: header
          required: true
          schema:
            type: string
        - name: x-ms-client-request-id
          in: header
          required: false
          schema:
            type: string
          description: Provides a client-generated, opaque value with a 1 KB character limit that is recorded in the analytics logs when storage analytics logging is enabled. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see
        - name: If-Modified-Since
          in: header
          required: false
          schema:
            type: string
        - name: If-Unmodified-Since
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ifModifiedSince:
                  type: string
                  description: Specify this header value to operate only on a blob if it has been modified since the specified date/time.
                ifUnmodifiedSince:
                  type: string
                  description: Specify this header value to operate only on a blob if it has not been modified since the specified date/time.
                ifMatch:
                  type: string
                  description: Specify an ETag value to operate only on blobs with a matching value.
                ifNoneMatch:
                  type: string
                  description: Specify an ETag value to operate only on blobs without a matching value.
      responses:
        "204":
          description: Success (no content / accepted)
    post:
      operationId: Path_lease
      description: Lease Path. Create and manage a lease to restrict write and delete access to the path. This operation supports conditional HTTP requests. For more information, see `Specifying Conditional Headers for Blob Service Operations `_.
      parameters:
        - name: x-ms-lease-action
          in: header
          required: true
          schema:
            type: string
          description: 'There are five lease actions: "acquire", "break", "change", "renew", and "release". Use "acquire" and specify the "x-ms-proposed-lease-id" and "x-ms-lease-duration" to acquire a new lease. Use "break" to break an existing lease. When a lease is broken, the lease break period is allowed to elapse, during which time no lease operation except break and release can be performed on the file. When a lease is successfully broken, the response indicates the interval in seconds until a new lease can be acquired. Use "change" and specify the current lease ID in "x-ms-lease-id" and the new lease ID in "x-ms-proposed-lease-id" to change the lease ID of an active lease. Use "renew" and specify the "x-ms-lease-id" to renew an existing lease. Use "release" and specify the "x-ms-lease-id" to release a lease. Known values are: "acquire", "break", "change", "renew", and "release". Required.'
        - name: x-ms-version
          in: header
          required: true
          schema:
            type: string
        - name: x-ms-client-request-id
          in: header
          required: false
          schema:
            type: string
          description: Provides a client-generated, opaque value with a 1 KB character limit that is recorded in the analytics logs when storage analytics logging is enabled. Default value is None.
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
          description: The timeout parameter is expressed in seconds. For more information, see
        - name: x-ms-lease-break-period
          in: header
          required: false
          schema:
            type: integer
          description: The lease break period duration is optional to break a lease, and specifies the break period of the lease in seconds. The lease break duration must be between 0 and 60 seconds. Default value is None.
        - name: x-ms-lease-id
          in: header
          required: false
          schema:
            type: string
        - name: x-ms-proposed-lease-id
          in: header
          required: false
          schema:
            type: string
          description: Proposed lease ID, in a GUID string format. The Blob service returns 400 (Invalid request) if the proposed lease ID is not in the correct format. See Guid Constructor (String) for a list of valid GUID string formats. Default value is None.
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
        - name: If-Modified-Since
          in: header
          required: false
          schema:
            type: string
        - name: If-Unmodified-Since
          in: header
          required: false
          schema:
            type: string
        - name: x-ms-lease-duration
          in: header
          required: false
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                leaseId:
                  type: string
                  description: If specified, the operation only succeeds if the resource's lease is active and matches this ID.
      responses:
        "200":
          description: Success
