    ConfigurationExclusions:
      type: object
      description: Model that represents exclusion criteria for protecting resources from fault injection. Uses union (OR) logic - a resource is excluded if it matches ANY criteria.
      properties:
        resources:
          type: array
          items:
            type: string
          description: Array of specific resource IDs to exclude from fault injection.
        tags:
          type: array
          items:
