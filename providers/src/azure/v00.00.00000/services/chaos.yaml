          description: Array of tag key-value pairs. Resources with matching tags are excluded.
        types:
          type: array
          items:
            type: string
          description: Array of resource types. All resources of these types are excluded.
    ConfigurationFilters:
      type: object
      description: Model that represents filter criteria for constraining which discovered resources participate in fault injection. Uses intersection (AND) logic — a resource is included only if it matches all criteria.
      properties:
        locations:
          type: array
          items:
            type: string
          description: Array of Azure location strings. Only resources in these locations are included. Null or omitted means all locations (no filter). Empty array means include nothing.
        zones:
          type: array
          items:
            type: string
          description: Array of availability zone identifiers ("1", "2", "3", "zone-redundant"). Only resources whose zones intersect this list are included. Null or omitted means all zones (including non-zonal). Empty array means include nothing. Mutually exclusive with `physicalZones` — set one or the other, not both.
