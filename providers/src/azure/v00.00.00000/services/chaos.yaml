          type: array
          items:
            type: string
          description: Array of physical availability zone identifiers in `{region}-az{N}` format (e.g., `"westus2-az1"`). Only resources in the corresponding logical zone for each subscription are included. At execution time, each physical zone is resolved to per-subscription logical zones via the Azure locations API. The resolved mapping is surfaced on the scenario run response (`zoneResolution`). Null or omitted means physical zone targeting is not used. Only one physical zone is supported in preview. Mutually exclusive with `zones` — set one or the other, not both.
