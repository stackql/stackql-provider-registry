  schemas:
    Key:
      type: object
      description: Keys serve as identifiers for key-values and are used to store and retrieve corresponding values.
      properties:
        name:
          type: string
          description: The name of the key. Required.
    PagedKey:
      type: object
      properties:
        items_:
          type: array
          items:
            $ref: "#/components/schemas/Key"
        nextLink:
          type: string
    KeyValue:
      type: object
      description: A key-value pair representing application settings.
      properties:
        key:
          type: string
          description: The key of the key-value. Required.
        label:
          type: string
          description: The label the key-value belongs to.
        content_type:
          type: string
          description: The content type of the value stored within the key-value.
        value:
          type: string
          description: The value of the key-value.
        last_modified:
          type: string
          format: date-time
          description: A date representing the last time the key-value was modified.
        tags:
          type: object
          properties: {}
          description: The tags of the key-value.
        description:
          type: string
          description: The description of the key-value.
        locked:
          type: boolean
          description: Indicates whether the key-value is locked.
        etag:
          type: string
          description: A value representing the current state of the resource.
    PagedKeyValue:
      type: object
      properties:
        items_:
          type: array
          items:
            $ref: "#/components/schemas/KeyValue"
        nextLink:
          type: string
    SnapshotStatus:
      type: string
      enum:
        - provisioning
        - ready
        - archived
        - failed
    KeyValueFilter:
      type: object
      description: "Enables filtering of key-values. Syntax reference: `https://aka.ms/azconfig/docs/restapisnapshots `_."
      properties:
        key:
          type: string
          description: Filters key-values by their key field. Required.
        label:
          type: string
          description: Filters key-values by their label field.
        tags:
          type: array
          items:
            type: string
          description: Filters key-values by their tags field.
      required:
        - key
    SnapshotComposition:
      type: string
      enum:
        - key
        - key_label
    Snapshot:
      type: object
      description: A snapshot is a named, immutable subset of an App Configuration store's key-values.
      properties:
        name:
          type: string
          description: The name of the snapshot. Required.
        status:
          $ref: "#/components/schemas/SnapshotStatus"
          description: 'The current status of the snapshot. Known values are: "provisioning", "ready", "archived", and "failed".'
        filters:
          type: array
          items:
            $ref: "#/components/schemas/KeyValueFilter"
          description: A list of filters used to filter the key-values included in the snapshot. Required.
        composition_type:
          $ref: "#/components/schemas/SnapshotComposition"
          description: "The composition type describes how the key-values within the snapshot are composed. The 'key' composition type ensures there are no two key-values containing the same key. The 'key_label' composition type ensures there are no two key-values containing the same key and label. Known values are: \"key\" and \"key_label\"."
        created:
          type: string
          format: date-time
          description: The time that the snapshot was created.
        expires:
          type: string
          format: date-time
          description: The time that the snapshot will expire.
        retention_period:
          type: integer
          description: The amount of time, in seconds, that a snapshot will remain in the archived state before expiring. This property is only writable during the creation of a snapshot. If not specified, the default lifetime of key-value revisions will be used.
        size:
          type: integer
          description: The size in bytes of the snapshot.
        items_count:
          type: integer
          description: The amount of key-values in the snapshot.
        tags:
          type: object
          properties: {}
          description: The tags of the snapshot.
        description:
          type: string
          description: The description of the snapshot.
        etag:
          type: string
          description: A value representing the current state of the snapshot.
      required:
        - filters
    PagedSnapshot:
      type: object
      properties:
        items_:
          type: array
          items:
            $ref: "#/components/schemas/Snapshot"
        nextLink:
          type: string
    OperationState:
      type: string
      enum:
        - NotStarted
        - Running
        - Succeeded
        - Failed
        - Canceled
    OperationDetails:
      type: object
      description: Details of a long running operation.
      properties:
        id:
          type: string
          description: The unique id of the operation. Required.
        status:
          $ref: "#/components/schemas/OperationState"
          description: 'The current status of the operation. Required. Known values are: "NotStarted", "Running", "Succeeded", "Failed", and "Canceled".'
        error:
          type: object
          properties: {}
          description: An error, available when the status is `Failed`, describing why the operation failed.
      required:
        - id
        - status
    Label:
      type: object
      description: Labels are used to group key-values.
      properties:
        name:
          type: string
          description: The name of the label.
    PagedLabel:
      type: object
