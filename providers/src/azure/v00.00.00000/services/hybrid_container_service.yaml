openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: AKS enabled by Azure Arc
  description: Provisioned Kubernetes clusters, agent pools and networks on Arc-connected infrastructure.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2024-01-01-stackql-generated
  x-serviceAlias: hybrid_container_service
  x-sdkPackage: azure-mgmt-hybridcontainerservice
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
