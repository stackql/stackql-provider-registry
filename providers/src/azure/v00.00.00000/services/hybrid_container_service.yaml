      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          type: string
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          type: string
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    AgentPoolProperties:
      type: object
      description: Properties of the agent pool resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        osType:
          type: string
          description: 'The particular KubernetesVersion Image OS Type (Linux, Windows). Known values are: "Windows" and "Linux".'
        osSKU:
          type: string
          description: 'Specifies the OS SKU used by the agent pool. The default is CBLMariner if OSType is Linux. The default is Windows2019 when OSType is Windows. Known values are: "CBLMariner", "Windows2019", and "Windows2022".'
        nodeLabels:
          type: object
          properties: {}
          description: The node labels to be persisted across all nodes in agent pool.
        nodeTaints:
          type: array
          items:
            type: string
          description: Taints added to new nodes during node pool create and scale. For example, key=value:NoSchedule.
        maxCount:
          type: integer
          description: The maximum number of nodes for auto-scaling.
        minCount:
          type: integer
          description: The minimum number of nodes for auto-scaling.
        enableAutoScaling:
          type: boolean
          description: Whether to enable auto-scaler. Default value is false.
        maxPods:
          type: integer
          description: The maximum number of pods that can run on a node.
        count:
          type: integer
          description: Number of nodes in the agent pool. The default value is 1.
        vmSize:
          type: string
          description: The VM sku size of the agent pool node VMs.
        kubernetesVersion:
          type: string
          description: Version of Kubernetes in use by the agent pool. This is inherited from the kubernetesVersion of the provisioned cluster.
        provisioningState:
          type: string
          description: 'The status of the latest long running operation for the agent pool. Known values are: "Succeeded", "Failed", "Canceled", "Pending", "Creating", "Deleting", "Updating", "Upgrading", and "Accepted".'
        status:
          $ref: "#/components/schemas/AgentPoolProvisioningStatusStatus"
