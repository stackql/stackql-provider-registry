components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    OperationDisplay:
      type: object
      description: Localized display information for an operation.
      properties:
        provider:
          type: string
          description: The localized friendly form of the resource provider name, e.g. "Microsoft Monitoring Insights" or "Microsoft Compute".
        resource:
          type: string
          description: The localized friendly name of the resource type related to this operation. E.g. "Virtual Machines" or "Job Schedule Collections".
        operation:
          type: string
          description: The concise, localized friendly name for the operation; suitable for dropdowns. E.g. "Create or Update Virtual Machine", "Restart Virtual Machine".
        description:
          type: string
          description: The short, localized friendly description of the operation; suitable for tool tips and detailed views.
    Origin:
      type: string
      enum:
        - user
        - system
        - user,system
    ActionType:
      type: string
      enum:
        - Internal
    Operation:
      type: object
      description: REST API Operation.
      properties:
        name:
          type: string
          description: 'The name of the operation, as per Resource-Based Access Control (RBAC). Examples: "Microsoft.Compute/virtualMachines/write", "Microsoft.Compute/virtualMachines/capture/action".'
        isDataAction:
          type: boolean
          description: Whether the operation applies to data-plane. This is "true" for data-plane operations and "false" for Azure Resource Manager/control-plane operations.
        display:
          $ref: "#/components/schemas/OperationDisplay"
          description: Localized display information for this particular operation.
        origin:
          $ref: "#/components/schemas/Origin"
          description: 'The intended executor of the operation; as in Resource Based Access Control (RBAC) and audit logs UX. Default value is "user,system". Known values are: "user", "system", and "user,system".'
        actionType:
          $ref: "#/components/schemas/ActionType"
          description: Extensible enum. Indicates the action type. "Internal" refers to actions that are for internal only APIs. "Internal"
    PagedOperation:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
        nextLink:
          type: string
    SubscriptionState:
      type: string
      enum:
        - Enabled
        - Warned
        - PastDue
        - Disabled
        - Deleted
    SubscriptionPolicies:
      type: object
      description: Subscription policies.
      properties:
        locationPlacementId:
          type: string
          description: The subscription location placement ID. The ID indicates which regions are visible for a subscription. For example, a subscription with a location placement Id of Public_2014-09-01 has access to Azure public regions.
        quotaId:
          type: string
          description: The subscription quota ID.
        spendingLimit:
          $ref: "#/components/schemas/SpendingLimit"
          description: 'The subscription spending limit. Known values are: "On", "Off", and "CurrentPeriodOff".'
    SpendingLimit:
      type: string
      enum:
        - "On"
        - "Off"
        - CurrentPeriodOff
    ManagedByTenant:
      type: object
      description: Information about a tenant managing the subscription.
      properties:
        tenantId:
          type: string
          description: The tenant ID of the managing tenant. This is a GUID.
    Subscription:
      type: object
      description: Subscription information.
      properties:
        id:
          type: string
          description: The fully qualified ID for the subscription. For example, /subscriptions/8d65815f-a5b6-402f-9298-045155da7d74.
        subscriptionId:
          type: string
          description: The subscription ID.
        displayName:
          type: string
          description: The subscription display name.
        tenantId:
          type: string
          description: The subscription tenant ID.
        state:
          $ref: "#/components/schemas/SubscriptionState"
          description: 'The subscription state. Possible values are Enabled, Warned, PastDue, Disabled, and Deleted. Known values are: "Enabled", "Warned", "PastDue", "Disabled", and "Deleted".'
        subscriptionPolicies:
          $ref: "#/components/schemas/SubscriptionPolicies"
          description: The subscription policies.
        authorizationSource:
          type: string
          description: The authorization source of the request. Valid values are one or more combinations of Legacy, RoleBased, Bypassed, Direct and Management. For example, 'Legacy, RoleBased'.
        managedByTenants:
          type: array
          items:
            $ref: "#/components/schemas/ManagedByTenant"
          description: An array containing the tenants managing the subscription.
        tags:
          type: object
          properties: {}
          description: The tags attached to the subscription.
    PagedSubscription:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
        nextLink:
          type: string
    LocationType:
      type: string
      enum:
        - Region
        - EdgeZone
    LocationMetadata:
      type: object
      description: Location metadata information.
      properties:
        regionType:
          $ref: "#/components/schemas/RegionType"
          description: 'The type of the region. Known values are: "Physical" and "Logical".'
        regionCategory:
          $ref: "#/components/schemas/RegionCategory"
          description: 'The category of the region. Known values are: "Recommended", "Extended", and "Other".'
        geography:
          type: string
          description: The geography of the location.
        geographyGroup:
          type: string
          description: The geography group of the location.
        longitude:
          type: string
          description: The longitude of the location.
        latitude:
          type: string
          description: The latitude of the location.
        physicalLocation:
          type: string
          description: The physical location of the Azure location.
        pairedRegion:
          type: array
          items:
            $ref: "#/components/schemas/PairedRegion"
          description: The regions paired to this region.
        homeLocation:
          type: string
          description: The home location of an edge zone.
    RegionType:
      type: string
      enum:
        - Physical
        - Logical
    RegionCategory:
      type: string
      enum:
        - Recommended
        - Extended
        - Other
    PairedRegion:
      type: object
      description: Information regarding paired region.
      properties:
        name:
          type: string
          description: The name of the paired region.
        id:
          type: string
          description: The fully qualified ID of the location. For example, /subscriptions/8d65815f-a5b6-402f-9298-045155da7d74/locations/westus.
        subscriptionId:
          type: string
          description: The subscription ID.
    AvailabilityZoneMappings:
      type: object
      description: Availability zone mappings for the region.
      properties:
        logicalZone:
          type: string
          description: The logical zone id for the availability zone.
        physicalZone:
          type: string
          description: The fully qualified physical zone id of availability zone to which logical zone id is mapped to.
    Location:
      type: object
      description: Location information.
      properties:
        id:
          type: string
          description: The fully qualified ID of the location. For example, /subscriptions/8d65815f-a5b6-402f-9298-045155da7d74/locations/westus.
        subscriptionId:
          type: string
          description: The subscription ID.
        name:
          type: string
          description: The location name.
        type:
          $ref: "#/components/schemas/LocationType"
          description: 'The location type. Known values are: "Region" and "EdgeZone".'
        displayName:
          type: string
          description: The display name of the location.
        regionalDisplayName:
          type: string
          description: The display name of the location and its region.
        metadata:
          $ref: "#/components/schemas/LocationMetadata"
          description: Metadata of the location, such as lat/long, paired region, and others.
        availabilityZoneMappings:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityZoneMappings"
          description: The availability zone mappings for this region.
    PagedLocation:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Location"
        nextLink:
          type: string
    CheckZonePeersResult:
      type: object
      description: Result of the Check zone peers operation.
      properties:
        subscriptionId:
          type: string
          description: The subscription ID.
        location:
          type: string
          description: the location of the subscription.
        availabilityZonePeers:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityZonePeers"
          description: The Availability Zones shared by the subscriptions.
    AvailabilityZonePeers:
      type: object
      description: List of availability zones shared by the subscriptions.
      properties:
        availabilityZone:
          type: string
          description: The availabilityZone.
        peers:
          type: array
          items:
            $ref: "#/components/schemas/Peers"
          description: Details of shared availability zone.
    Peers:
      type: object
      description: Information about shared availability zone.
      properties:
        subscriptionId:
          type: string
          description: The subscription ID.
        availabilityZone:
          type: string
          description: The availabilityZone.
    TenantCategory:
      type: string
      enum:
        - Home
        - ProjectedBy
        - ManagedBy
    TenantIdDescription:
      type: object
      description: Tenant Id information.
      properties:
        id:
          type: string
          description: The fully qualified ID of the tenant. For example, /tenants/8d65815f-a5b6-402f-9298-045155da7d74.
        tenantId:
          type: string
          description: The tenant ID. For example, 8d65815f-a5b6-402f-9298-045155da7d74.
        tenantCategory:
          $ref: "#/components/schemas/TenantCategory"
          description: 'Category of the tenant. Known values are: "Home", "ProjectedBy", and "ManagedBy".'
        country:
          type: string
          description: Country/region name of the address for the tenant.
        countryCode:
          type: string
          description: Country/region abbreviation for the tenant.
        displayName:
          type: string
          description: The display name of the tenant.
        domains:
          type: array
          items:
            type: string
          description: The list of domains for the tenant.
        defaultDomain:
          type: string
          description: The default domain for the tenant.
        tenantType:
          type: string
          description: The tenant type. Only available for 'Home' tenant category.
        tenantBrandingLogoUrl:
          type: string
          description: The tenant's branding logo URL. Only available for 'Home' tenant category.
    PagedTenantIdDescription:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TenantIdDescription"
        nextLink:
          type: string
    CheckResourceNameResult:
      type: object
      description: Resource Name valid if not a reserved word, does not contain a reserved word and does not start with a reserved word.
      properties:
        name:
          type: string
          description: Name of Resource.
        type:
          type: string
          description: Type of Resource.
        status:
          $ref: "#/components/schemas/ResourceNameStatus"
          description: 'Is the resource name Allowed or Reserved. Known values are: "Allowed" and "Reserved".'
    ResourceNameStatus:
      type: string
      enum:
        - Allowed
        - Reserved
