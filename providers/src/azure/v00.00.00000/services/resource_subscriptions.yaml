paths:
  /providers/Microsoft.Resources/operations?api-version=2022-12-01:
    get:
      operationId: resource_subscriptions_list
      description: List the operations for the provider.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedOperation"
  /subscriptions/{subscription_id}?api-version=2022-12-01:
    get:
      operationId: Subscriptions_get
      description: Gets details about a specified subscription.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the target subscription. The value must be an UUID. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
  /subscriptions?api-version=2022-12-01:
    get:
      operationId: Subscriptions_list
      description: Gets all subscriptions for a tenant.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedSubscription"
  /subscriptions/{subscription_id}/locations?api-version=2022-12-01:
    get:
      operationId: Subscriptions_list_locations
      description: Gets all available geo-locations. This operation provides all the locations that are available for resource providers; however, each resource provider may support a subset of this list.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the target subscription. The value must be an UUID. Required.
        - name: includeExtendedLocations
          in: query
          required: false
          schema:
            type: boolean
          description: Whether to include extended locations. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedLocation"
  /subscriptions/{subscription_id}/providers/Microsoft.Resources/checkZonePeers/?api-version=2022-12-01:
    post:
      operationId: Subscriptions_check_zone_peers
      description: Compares a subscriptions logical zone mapping.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the target subscription. The value must be an UUID. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                location:
                  type: string
                  description: The Microsoft location.
                subscriptionIds:
                  type: array
                  items:
                    type: string
                  description: The peer Microsoft Azure subscription ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckZonePeersResult"
  /tenants?api-version=2022-12-01:
    get:
      operationId: Tenants_list
      description: Gets the tenants for your account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedTenantIdDescription"
  /providers/Microsoft.Resources/checkResourceName?api-version=2022-12-01:
    post:
      operationId: _SubscriptionClient_check_resource_name
      description: Checks resource name validity. A resource name is valid if it is not a reserved word, does not contains a reserved word and does not start with a reserved word.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the resource. Required.
                type:
                  type: string
                  description: The type of the resource. Required.
              required:
                - name
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResourceNameResult"
