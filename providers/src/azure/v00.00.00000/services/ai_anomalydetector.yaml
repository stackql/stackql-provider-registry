paths:
  /multivariate/models:
    get:
      operationId: AnomalyDetectorClient_list_multivariate_models
      description: List Multivariate Models. List models of a resource.
      parameters:
        - name: skip
          in: query
          required: false
          schema:
            type: integer
          description: Skip indicates how many models will be skipped. Default value is None.
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: Top indicates how many models will be fetched. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedAnomalyDetectionModel"
    post:
      operationId: AnomalyDetectorClient_train_multivariate_model
      description: "Train a Multivariate Anomaly Detection Model. Create and train a multivariate anomaly detection model. The request must include a source parameter to indicate an externally accessible Azure blob storage URI.There are two types of data input: An URI pointed to an Azure blob storage folder which contains multiple CSV files, and each CSV file contains two columns, timestamp and variable. Another type of input is an URI pointed to a CSV file in Azure blob storage, which contains all the variables and a timestamp column."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dataSource:
                  type: string
                  description: Source link to the input data to indicate an accessible Azure storage Uri, either pointed to an Azure blob storage folder, or pointed to a CSV file in Azure blob storage based on you data schema selection. Required.
                dataSchema:
                  $ref: "#/components/schemas/DataSchema"
                  description: 'Data schema of input data source: OneTable or MultiTable. The default DataSchema is OneTable. Known values are: "OneTable" and "MultiTable".'
                startTime:
                  type: string
                  format: date-time
                  description: A required field, indicating the start time of training data, which should be date-time of ISO 8601 format. Required.
                endTime:
                  type: string
                  format: date-time
                  description: A required field, indicating the end time of training data, which should be date-time of ISO 8601 format. Required.
                displayName:
                  type: string
                  description: An optional field. The display name of the model whose maximum length is 24 characters.
                slidingWindow:
                  type: integer
                  description: An optional field, indicating how many previous timestamps will be used to detect whether the timestamp is anomaly or not.
                alignPolicy:
                  $ref: "#/components/schemas/AlignPolicy"
                  description: An optional field, indicating the manner to align multiple variables.
                status:
                  $ref: "#/components/schemas/ModelStatus"
                  description: 'Model status. One of CREATED, RUNNING, READY, and FAILED. Known values are: "CREATED", "RUNNING", "READY", and "FAILED".'
                errors:
                  type: array
                  items:
                    $ref: "#/components/schemas/ErrorResponse"
                  description: Error messages when failed to create a model.
                diagnosticsInfo:
                  $ref: "#/components/schemas/DiagnosticsInfo"
                  description: Diagnostics information to help inspect the states of model or variable.
              required:
                - dataSource
                - startTime
                - endTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyDetectionModel"
