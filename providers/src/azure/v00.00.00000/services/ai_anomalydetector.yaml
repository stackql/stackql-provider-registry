openapi: 3.0.0
servers:
  - url: https://{endpoint}/anomalydetector/{api_version}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `Endpoint` parameter.
      api_version:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `ApiVersion` parameter.
info:
  title: Anomaly Detector Client
  description: The Anomaly Detector API detects anomalies automatically in time series data. It supports two kinds of mode, one is for stateless using, another is for stateful using. In stateless mode, there are three functionalities. Entire Detect is for detecting the whole series with model trained by the time series, Last Detect is detecting last point with model trained by points before. ChangePoint Detect is for detecting trend changes in time series. In stateful mode, user can store time series, the stored time series will be used for detection anomalies. Under this mode, user can still use the above three functionalities by only giving a time range without preparing time series in client side. Besides the above three functionalities, stateful model also provide group based detection and labeling service. By leveraging labeling service user can provide labels for each detection result, these labels will be used for retuning or regenerating detection models. Inconsistency detection is a kind of group based detection, this detection will find inconsistency ones in a set of time series. By using anomaly detector service, business customers can discover incidents and establish a logic flow for root cause analysis.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: unversioned-stackql-generated
  x-serviceAlias: ai_anomalydetector
  x-sdkPackage: azure-ai-anomalydetector
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ModelInfo:
      type: object
      description: Training result of a model including its status, errors and diagnostics information. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        dataSource:
          type: string
          description: Source link to the input data to indicate an accessible Azure storage Uri, either pointed to an Azure blob storage folder, or pointed to a CSV file in Azure blob storage based on you data schema selection. Required.
        dataSchema:
          $ref: "#/components/schemas/DataSchema"
          description: 'Data schema of input data source: OneTable or MultiTable. The default DataSchema is OneTable. Known values are: "OneTable" and "MultiTable".'
        startTime:
          type: string
          format: date-time
          description: A required field, indicating the start time of training data, which should be date-time of ISO 8601 format. Required.
        endTime:
          type: string
          format: date-time
          description: A required field, indicating the end time of training data, which should be date-time of ISO 8601 format. Required.
        displayName:
          type: string
          description: An optional field. The display name of the model whose maximum length is 24 characters.
        slidingWindow:
          type: integer
          description: An optional field, indicating how many previous timestamps will be used to detect whether the timestamp is anomaly or not.
        alignPolicy:
          $ref: "#/components/schemas/AlignPolicy"
          description: An optional field, indicating the manner to align multiple variables.
        status:
          $ref: "#/components/schemas/ModelStatus"
          description: 'Model status. One of CREATED, RUNNING, READY, and FAILED. Known values are: "CREATED", "RUNNING", "READY", and "FAILED".'
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorResponse"
          description: Error messages when failed to create a model.
        diagnosticsInfo:
          $ref: "#/components/schemas/DiagnosticsInfo"
          description: Diagnostics information to help inspect the states of model or variable.
      required:
        - dataSource
        - startTime
        - endTime
    DataSchema:
      type: string
      enum:
        - OneTable
        - MultiTable
    AlignPolicy:
      type: object
      description: An optional field, indicating the manner to align multiple variables.
      properties:
        alignMode:
          $ref: "#/components/schemas/AlignMode"
          description: 'An optional field, indicating how to align different variables to the same time-range. Either Inner or Outer. Known values are: "Inner" and "Outer".'
        fillNAMethod:
          $ref: "#/components/schemas/FillNAMethod"
          description: 'An optional field, indicating how missing values will be filled. One of Previous, Subsequent, Linear, Zero, Fixed. Known values are: "Previous", "Subsequent", "Linear", "Zero", and "Fixed".'
        paddingValue:
          type: number
          description: An optional field. Required when fillNAMethod is Fixed.
    AlignMode:
      type: string
      enum:
        - Inner
        - Outer
    FillNAMethod:
      type: string
      enum:
        - Previous
        - Subsequent
        - Linear
        - Zero
        - Fixed
    ModelStatus:
      type: string
      enum:
        - CREATED
        - RUNNING
        - READY
        - FAILED
    ErrorResponse:
      type: object
      description: ErrorResponse contains code and message that shows the error information. All required parameters must be populated in order to send to Azure.
      properties:
        code:
          type: string
          description: The error code. Required.
        message:
          type: string
          description: The message explaining the error reported by the service. Required.
      required:
        - code
        - message
    DiagnosticsInfo:
      type: object
      description: Diagnostics information to help inspect the states of model or variable.
      properties:
        modelState:
          $ref: "#/components/schemas/ModelState"
          description: Model status.
        variableStates:
          type: array
          items:
            $ref: "#/components/schemas/VariableState"
          description: Variable Status.
    ModelState:
      type: object
      description: Model status.
      properties:
        epochIds:
          type: array
          items:
            type: integer
          description: This indicates the number of passes of the entire training dataset the algorithm has completed.
        trainLosses:
          type: array
          items:
            type: number
          description: List of metrics used to assess how the model fits the training data for each epoch.
        validationLosses:
          type: array
          items:
            type: number
          description: List of metrics used to assess how the model fits the validation set for each epoch.
        latenciesInSeconds:
          type: array
          items:
            type: number
          description: Latency for each epoch.
    VariableState:
      type: object
      description: Variable Status.
      properties:
        variable:
          type: string
          description: Variable name in variable states.
        filledNARatio:
          type: number
          description: Proportion of missing values that need to be filled by fillNAMethod.
        effectiveCount:
          type: integer
          description: Number of effective data points before applying fillNAMethod.
        firstTimestamp:
          type: string
          format: date-time
          description: First valid timestamp with value of input data.
        lastTimestamp:
          type: string
          format: date-time
          description: Last valid timestamp with value of input data.
    AnomalyDetectionModel:
      type: object
      description: Response of getting a model. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        modelId:
          type: string
          description: Model identifier. Required.
        createdTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the model was created. Required.
        lastUpdatedTime:
          type: string
          format: date-time
          description: Date and time (UTC) when the model was last updated. Required.
        modelInfo:
          $ref: "#/components/schemas/ModelInfo"
          description: Training result of a model including its status, errors and diagnostics information.
      required:
        - modelId
        - createdTime
        - lastUpdatedTime
    PagedAnomalyDetectionModel:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/AnomalyDetectionModel"
        nextLink:
          type: string
    MultivariateBatchDetectionResultSummary:
      type: object
      description: Multivariate anomaly detection status. All required parameters must be populated in order to send to Azure.
      properties:
        status:
          $ref: "#/components/schemas/MultivariateBatchDetectionStatus"
          description: 'Status of detection results. One of CREATED, RUNNING, READY, and FAILED. Required. Known values are: "CREATED", "RUNNING", "READY", and "FAILED".'
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorResponse"
          description: Error message when detection is failed.
        variableStates:
          type: array
          items:
            $ref: "#/components/schemas/VariableState"
          description: Variable Status.
        setupInfo:
          $ref: "#/components/schemas/MultivariateBatchDetectionOptions"
          description: Detection request for batch inference. This is an asynchronous inference which will need another API to get detection results. Required.
      required:
        - status
        - setupInfo
    MultivariateBatchDetectionStatus:
      type: string
      enum:
        - CREATED
        - RUNNING
        - READY
        - FAILED
    MultivariateBatchDetectionOptions:
      type: object
      description: Detection request for batch inference. This is an asynchronous inference which will need another API to get detection results. All required parameters must be populated in order to send to Azure.
      properties:
        dataSource:
          type: string
          description: Source link to the input data to indicate an accessible Azure storage Uri, either pointed to an Azure blob storage folder, or pointed to a CSV file in Azure blob storage based on you data schema selection. The data schema should be exactly the same with those used in the training phase. Required.
        topContributorCount:
          type: integer
          description: An optional field, which is used to specify the number of top contributed variables for one anomalous timestamp in the response. The default number is 10. Required.
        startTime:
          type: string
          format: date-time
          description: A required field, indicating the start time of data for detection, which should be date-time of ISO 8601 format. Required.
        endTime:
          type: string
          format: date-time
          description: A required field, indicating the end time of data for detection, which should be date-time of ISO 8601 format. Required.
      required:
        - dataSource
        - topContributorCount
        - startTime
        - endTime
    AnomalyState:
      type: object
      description: Anomaly status and information. All required parameters must be populated in order to send to Azure.
      properties:
        timestamp:
          type: string
          format: date-time
          description: The timestamp for this anomaly. Required.
        value:
          $ref: "#/components/schemas/AnomalyValue"
          description: The detailed value of this anomalous timestamp.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorResponse"
          description: Error message for the current timestamp.
      required:
        - timestamp
    AnomalyValue:
      type: object
      description: Detailed information of the anomalous timestamp. All required parameters must be populated in order to send to Azure.
      properties:
        isAnomaly:
          type: boolean
          description: True if an anomaly is detected at the current timestamp. Required.
        severity:
          type: number
          description: Indicates the significance of the anomaly. The higher the severity, the more significant the anomaly is. Required.
        score:
          type: number
          description: Raw anomaly score of severity, will help indicate the degree of abnormality as well. Required.
        interpretation:
          type: array
          items:
            $ref: "#/components/schemas/AnomalyInterpretation"
          description: Interpretation of this anomalous timestamp.
      required:
        - isAnomaly
        - severity
        - score
    AnomalyInterpretation:
      type: object
      description: Interpretation of the anomalous timestamp.
      properties:
        variable:
          type: string
          description: Variable.
        contributionScore:
          type: number
          description: This score shows the percentage contributing to the anomalous timestamp. A number between 0 and 1.
        correlationChanges:
          $ref: "#/components/schemas/CorrelationChanges"
          description: Correlation changes among the anomalous variables.
    CorrelationChanges:
      type: object
      description: Correlation changes among the anomalous variables.
      properties:
        changedVariables:
          type: array
          items:
            type: string
          description: The correlated variables that have correlation changes under an anomaly.
    MultivariateDetectionResult:
      type: object
      description: Detection results for the given resultId. Readonly variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to Azure.
      properties:
        resultId:
          type: string
          description: Result identifier, which is used to fetch the results of an inference call. Required.
        summary:
          $ref: "#/components/schemas/MultivariateBatchDetectionResultSummary"
          description: Multivariate anomaly detection status. Required.
        results:
          type: array
          items:
            $ref: "#/components/schemas/AnomalyState"
          description: Detection result for each timestamp. Required.
      required:
        - resultId
        - summary
        - results
    TimeSeriesPoint:
      type: object
      description: The definition of input timeseries points. All required parameters must be populated in order to send to Azure.
      properties:
        timestamp:
          type: string
          format: date-time
          description: Optional argument, timestamp of a data point (ISO8601 format).
        value:
          type: number
          description: The measurement of that point, should be float. Required.
      required:
        - value
    TimeGranularity:
      type: string
      enum:
        - yearly
        - monthly
        - weekly
        - daily
        - hourly
        - minutely
        - secondly
        - microsecond
        - none
    ImputeMode:
      type: string
      enum:
        - auto
        - previous
        - linear
        - fixed
        - zero
        - notFill
    UnivariateEntireDetectionResult:
      type: object
      description: The response of entire anomaly detection. All required parameters must be populated in order to send to Azure.
      properties:
        period:
          type: integer
          description: Frequency extracted from the series, zero means no recurrent pattern has been found. Required.
        expectedValues:
          type: array
          items:
            type: number
          description: ExpectedValues contain expected value for each input point. The index of the array is consistent with the input series. Required.
        upperMargins:
          type: array
          items:
            type: number
          description: UpperMargins contain upper margin of each input point. UpperMargin is used to calculate upperBoundary, which equals to expectedValue + (100 - marginScale)*upperMargin. Anomalies in response can be filtered by upperBoundary and lowerBoundary. By adjusting marginScale value, less significant anomalies can be filtered in client side. The index of the array is consistent with the input series. Required.
        lowerMargins:
          type: array
          items:
            type: number
          description: LowerMargins contain lower margin of each input point. LowerMargin is used to calculate lowerBoundary, which equals to expectedValue - (100 - marginScale)*lowerMargin. Points between the boundary can be marked as normal ones in client side. The index of the array is consistent with the input series. Required.
        isAnomaly:
          type: array
          items:
            type: boolean
          description: IsAnomaly contains anomaly properties for each input point. True means an anomaly either negative or positive has been detected. The index of the array is consistent with the input series. Required.
        isNegativeAnomaly:
          type: array
          items:
            type: boolean
          description: IsNegativeAnomaly contains anomaly status in negative direction for each input point. True means a negative anomaly has been detected. A negative anomaly means the point is detected as an anomaly and its real value is smaller than the expected one. The index of the array is consistent with the input series. Required.
        isPositiveAnomaly:
          type: array
          items:
            type: boolean
          description: IsPositiveAnomaly contain anomaly status in positive direction for each input point. True means a positive anomaly has been detected. A positive anomaly means the point is detected as an anomaly and its real value is larger than the expected one. The index of the array is consistent with the input series. Required.
        severity:
          type: array
          items:
            type: number
          description: The severity score for each input point. The larger the value is, the more sever the anomaly is. For normal points, the "severity" is always 0.
      required:
        - period
        - expectedValues
        - upperMargins
        - lowerMargins
        - isAnomaly
        - isNegativeAnomaly
        - isPositiveAnomaly
    UnivariateLastDetectionResult:
      type: object
      description: The response of last anomaly detection. All required parameters must be populated in order to send to Azure.
      properties:
        period:
          type: integer
          description: Frequency extracted from the series, zero means no recurrent pattern has been found. Required.
        suggestedWindow:
          type: integer
          description: Suggested input series points needed for detecting the latest point. Required.
        expectedValue:
          type: number
          description: Expected value of the latest point. Required.
        upperMargin:
          type: number
          description: Upper margin of the latest point. UpperMargin is used to calculate upperBoundary, which equals to expectedValue + (100 - marginScale)*upperMargin. If the value of latest point is between upperBoundary and lowerBoundary, it should be treated as normal value. By adjusting marginScale value, anomaly status of latest point can be changed. Required.
        lowerMargin:
          type: number
          description: Lower margin of the latest point. LowerMargin is used to calculate lowerBoundary, which equals to expectedValue - (100 - marginScale)*lowerMargin. Required.
        isAnomaly:
          type: boolean
          description: Anomaly status of the latest point, true means the latest point is an anomaly either in negative direction or positive direction. Required.
        isNegativeAnomaly:
          type: boolean
          description: Anomaly status in negative direction of the latest point. True means the latest point is an anomaly and its real value is smaller than the expected one. Required.
        isPositiveAnomaly:
          type: boolean
          description: Anomaly status in positive direction of the latest point. True means the latest point is an anomaly and its real value is larger than the expected one. Required.
        severity:
          type: number
          description: The severity score for the last input point. The larger the value is, the more sever the anomaly is. For normal points, the "severity" is always 0.
      required:
        - period
        - suggestedWindow
        - expectedValue
        - upperMargin
        - lowerMargin
        - isAnomaly
        - isNegativeAnomaly
        - isPositiveAnomaly
    UnivariateChangePointDetectionResult:
      type: object
      description: The response of change point detection. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        period:
          type: integer
          description: Frequency extracted from the series, zero means no recurrent pattern has been found.
        isChangePoint:
          type: array
          items:
            type: boolean
          description: isChangePoint contains change point properties for each input point. True means an anomaly either negative or positive has been detected. The index of the array is consistent with the input series.
        confidenceScores:
          type: array
          items:
            type: number
          description: the change point confidence of each point.
    VariableValues:
      type: object
      description: Variable values. All required parameters must be populated in order to send to Azure.
      properties:
        variable:
          type: string
          description: Variable name of last detection request. Required.
        timestamps:
          type: array
          items:
            type: string
          description: Timestamps of last detection request. Required.
        values:
          type: array
          items:
            type: number
          description: Values of variables. Required.
      required:
        - variable
        - timestamps
        - values
    MultivariateLastDetectionResult:
      type: object
      description: Results of last detection.
      properties:
        variableStates:
          type: array
          items:
            $ref: "#/components/schemas/VariableState"
          description: Variable Status.
        results:
          type: array
          items:
            $ref: "#/components/schemas/AnomalyState"
          description: Anomaly status and information.
