  /timeseries/changepoint/detect:
    post:
      operationId: AnomalyDetectorClient_detect_univariate_change_point
      description: Detect change point for the entire series. Evaluate change point score of every series point.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                series:
                  type: array
                  items:
                    $ref: "#/components/schemas/TimeSeriesPoint"
                  description: Time series data points. Points should be sorted by timestamp in ascending order to match the change point detection result. Required.
                granularity:
                  $ref: "#/components/schemas/TimeGranularity"
                  description: 'Can only be one of yearly, monthly, weekly, daily, hourly, minutely or secondly. Granularity is used for verify whether input series is valid. Required. Known values are: "yearly", "monthly", "weekly", "daily", "hourly", "minutely", "secondly", "microsecond", and "none".'
                customInterval:
                  type: integer
                  description: Custom Interval is used to set non-standard time interval, for example, if the series is 5 minutes, request can be set as {"granularity":"minutely", "customInterval":5}.
                period:
                  type: integer
                  description: Optional argument, periodic value of a time series. If the value is null or does not present, the API will determine the period automatically.
                stableTrendWindow:
                  type: integer
                  description: Optional argument, advanced model parameter, a default stableTrendWindow will be used in detection.
                threshold:
                  type: number
                  description: Optional argument, advanced model parameter, between 0.0-1.0, the lower the value is, the larger the trend error will be which means less change point will be accepted.
              required:
                - series
                - granularity
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnivariateChangePointDetectionResult"
  /multivariate/models/{model_id}:detect-batch:
    post:
      operationId: AnomalyDetectorClient_detect_multivariate_batch_anomaly
      description: Detect Multivariate Anomaly. Submit multivariate anomaly detection task with the modelId of trained model and inference data, the input schema should be the same with the training request. The request will complete asynchronously and return a resultId to query the detection result.The request should be a source link to indicate an externally accessible Azure storage Uri, either pointed to an Azure blob storage folder, or pointed to a CSV file in Azure blob storage.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Model identifier. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dataSource:
                  type: string
                  description: Source link to the input data to indicate an accessible Azure storage Uri, either pointed to an Azure blob storage folder, or pointed to a CSV file in Azure blob storage based on you data schema selection. The data schema should be exactly the same with those used in the training phase. Required.
                topContributorCount:
                  type: integer
                  description: An optional field, which is used to specify the number of top contributed variables for one anomalous timestamp in the response. The default number is 10. Required.
                startTime:
                  type: string
                  format: date-time
                  description: A required field, indicating the start time of data for detection, which should be date-time of ISO 8601 format. Required.
                endTime:
                  type: string
                  format: date-time
                  description: A required field, indicating the end time of data for detection, which should be date-time of ISO 8601 format. Required.
              required:
                - dataSource
                - topContributorCount
                - startTime
                - endTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultivariateDetectionResult"
  /multivariate/models/{model_id}:detect-last:
    post:
      operationId: AnomalyDetectorClient_detect_multivariate_last_anomaly
      description: Detect anomalies in the last point of the request body. Submit multivariate anomaly detection task with the modelId of trained model and inference data, and the inference data should be put into request body in a JSON format. The request will complete synchronously and return the detection immediately in the response body.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Model identifier. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                variables:
                  type: array
                  items:
                    $ref: "#/components/schemas/VariableValues"
                  description: This contains the inference data, including the name, timestamps(ISO 8601) and values of variables. Required.
                topContributorCount:
                  type: integer
                  description: An optional field, which is used to specify the number of top contributed variables for one anomalous timestamp in the response. The default number is 10. Required.
              required:
                - variables
                - topContributorCount
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultivariateLastDetectionResult"
