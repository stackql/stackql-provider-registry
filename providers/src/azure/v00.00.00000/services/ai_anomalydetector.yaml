  /timeseries/entire/detect:
    post:
      operationId: AnomalyDetectorClient_detect_univariate_entire_series
      description: Detect anomalies for the entire series in batch. This operation generates a model with an entire series, each point is detected with the same model. With this method, points before and after a certain point are used to determine whether it is an anomaly. The entire detection can give user an overall status of the time series.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                series:
                  type: array
                  items:
                    $ref: "#/components/schemas/TimeSeriesPoint"
                  description: Time series data points. Points should be sorted by timestamp in ascending order to match the anomaly detection result. If the data is not sorted correctly or there is duplicated timestamp, the API will not work. In such case, an error message will be returned. Required.
                granularity:
                  $ref: "#/components/schemas/TimeGranularity"
                  description: 'Optional argument, can be one of yearly, monthly, weekly, daily, hourly, minutely, secondly, microsecond or none. If granularity is not present, it will be none by default. If granularity is none, the timestamp property in time series point can be absent. Known values are: "yearly", "monthly", "weekly", "daily", "hourly", "minutely", "secondly", "microsecond", and "none".'
                customInterval:
                  type: integer
                  description: Custom Interval is used to set non-standard time interval, for example, if the series is 5 minutes, request can be set as {"granularity":"minutely", "customInterval":5}.
                period:
                  type: integer
                  description: Optional argument, periodic value of a time series. If the value is null or does not present, the API will determine the period automatically.
                maxAnomalyRatio:
                  type: number
                  description: Optional argument, advanced model parameter, max anomaly ratio in a time series.
                sensitivity:
                  type: integer
                  description: Optional argument, advanced model parameter, between 0-99, the lower the value is, the larger the margin value will be which means less anomalies will be accepted.
                imputeMode:
                  $ref: "#/components/schemas/ImputeMode"
                  description: "Used to specify how to deal with missing values in the input series, it's used when granularity is not \"none\". Known values are: \"auto\", \"previous\", \"linear\", \"fixed\", \"zero\", and \"notFill\"."
                imputeFixedValue:
                  type: number
                  description: Used to specify the value to fill, it's used when granularity is not "none" and imputeMode is "fixed".
              required:
                - series
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnivariateEntireDetectionResult"
