        virtualMachinesAllocated:
          type: array
          items:
            $ref: "#/components/schemas/SubResourceReadOnly"
          description: A list of all virtual machines resource ids allocated against the capacity reservation.
    ResourceSharingProfile:
      type: object
      description: ResourceSharingProfile.
      properties:
        subscriptionIds:
          type: array
          items:
            $ref: "#/components/schemas/SubResource"
          description: "Specifies an array of subscription resource IDs that capacity reservation group is shared with. Block Capacity Reservations does not support sharing across subscriptions. **Note:** Minimum api-version: 2023-09-01. Please refer to `https://aka.ms/computereservationsharing `_ for more details."
