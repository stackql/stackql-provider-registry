      enum:
        - Delete
        - Detach
    DataDisk:
      type: object
      description: Describes a data disk.
      properties:
        lun:
          type: integer
          description: Specifies the logical unit number of the data disk. This value is used to identify data disks within the VM and therefore must be unique for each data disk attached to a VM. Required.
        name:
          type: string
          description: The disk name.
        vhd:
          $ref: "#/components/schemas/VirtualHardDisk"
          description: The virtual hard disk.
        image:
          $ref: "#/components/schemas/VirtualHardDisk"
          description: The source user image virtual hard disk. The virtual hard disk will be copied before being attached to the virtual machine. If SourceImage is provided, the destination virtual hard drive must not exist.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Specifies the caching requirements. Possible values are: **None,** **ReadOnly,** **ReadWrite.** The defaulting behavior is: **None for Standard storage. ReadOnly for Premium storage.**. Known values are: "None", "ReadOnly", and "ReadWrite".'
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
        createOption:
          $ref: "#/components/schemas/DiskCreateOptionTypes"
          description: 'Specifies how the virtual machine disk should be created. Possible values are **Attach:** This value is used when you are using a specialized disk to create the virtual machine. **FromImage:** This value is used when you are using an image to create the virtual machine data disk. If you are using a platform image, you should also use the imageReference element described above. If you are using a marketplace image, you should also use the plan element previously described. **Empty:** This value is used when creating an empty data disk. **Copy:** This value is used to create a data disk from a snapshot or another disk. **Restore:** This value is used to create a data disk from a disk restore point. Required. Known values are: "FromImage", "Empty", "Attach", "Copy", and "Restore".'
        diskSizeGB:
          type: integer
          description: Specifies the size of an empty data disk in gigabytes. This element can be used to overwrite the size of the disk in a virtual machine image. The property 'diskSizeGB' is the number of bytes x 1024^3 for the disk and the value cannot be larger than 1023.
        storageFaultDomainAlignment:
          $ref: "#/components/schemas/StorageFaultDomainAlignmentType"
