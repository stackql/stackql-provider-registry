    VMSizeProperties:
      type: object
      description: Specifies VM Size Property settings on the virtual machine.
      properties:
        vCPUsAvailable:
          type: integer
          description: Specifies the number of vCPUs available for the VM. When this property is not specified in the request body the default behavior is to set it to the value of vCPUs available for that VM size exposed in api response of `List all available virtual machine sizes in a region `_.
        vCPUsPerCore:
          type: integer
          description: Specifies the vCPU to physical core ratio. When this property is not specified in the request body the default behavior is set to the value of vCPUsPerCore for the VM Size exposed in api response of `List all available virtual machine sizes in a region `_. **Setting this property to 1 also means that hyper-threading is disabled.**.
    RestorePointSourceVMStorageProfile:
      type: object
      description: Describes the storage profile.
      properties:
        osDisk:
          $ref: "#/components/schemas/RestorePointSourceVMOSDisk"
          description: Gets the OS disk of the VM captured at the time of the restore point creation.
        dataDisks:
          type: array
          items:
            $ref: "#/components/schemas/RestorePointSourceVMDataDisk"
          description: Gets the data disks of the VM captured at the time of the restore point creation.
        diskControllerType:
          $ref: "#/components/schemas/DiskControllerTypes"
          description: 'Gets the disk controller type of the VM captured at the time of the restore point creation. Known values are: "SCSI" and "NVMe".'
    RestorePointSourceVMOSDisk:
      type: object
      description: Describes an Operating System disk.
      properties:
        osType:
          $ref: "#/components/schemas/OperatingSystemType"
          description: 'Gets the Operating System type. Known values are: "Windows" and "Linux".'
        encryptionSettings:
          $ref: "#/components/schemas/DiskEncryptionSettings"
          description: Gets the disk encryption settings.
        name:
          type: string
          description: Gets the disk name.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Gets the caching type. Known values are: "None", "ReadOnly", and "ReadWrite".'
        diskSizeGB:
          type: integer
          description: Gets the disk size in GB.
        managedDisk:
          $ref: "#/components/schemas/ManagedDiskParameters"
          description: Gets the managed disk details.
        diskRestorePoint:
          $ref: "#/components/schemas/DiskRestorePointAttributes"
          description: Contains Disk Restore Point properties.
        writeAcceleratorEnabled:
          type: boolean
          description: Shows true if the disk is write-accelerator enabled.
    OperatingSystemType:
      type: string
      enum:
        - Windows
        - Linux
    DiskEncryptionSettings:
      type: object
      description: Describes a Encryption Settings for a Disk.
      properties:
        diskEncryptionKey:
          $ref: "#/components/schemas/KeyVaultSecretReference"
          description: Specifies the location of the disk encryption key, which is a Key Vault Secret.
        keyEncryptionKey:
          $ref: "#/components/schemas/KeyVaultKeyReference"
          description: Specifies the location of the key encryption key in Key Vault.
        enabled:
          type: boolean
          description: Specifies whether disk encryption should be enabled on the virtual machine.
    KeyVaultSecretReference:
      type: object
      description: Describes a reference to Key Vault Secret.
      properties:
        secretUrl:
          type: string
          description: The URL referencing a secret in a Key Vault. Required.
        sourceVault:
          $ref: "#/components/schemas/SubResource"
          description: The relative URL of the Key Vault containing the secret. Required.
      required:
        - secretUrl
        - sourceVault
    KeyVaultKeyReference:
      type: object
      description: Describes a reference to Key Vault Key.
      properties:
        keyUrl:
          type: string
          description: The URL referencing a key encryption key in Key Vault. Required.
        sourceVault:
          $ref: "#/components/schemas/SubResource"
          description: The relative URL of the Key Vault containing the key. Required.
      required:
        - keyUrl
        - sourceVault
    ManagedDiskParameters:
      type: object
      description: The parameters of a managed disk.
      properties:
        id:
          type: string
          description: Resource Id.
        storageAccountType:
          $ref: "#/components/schemas/StorageAccountTypes"
          description: 'Specifies the storage account type for the managed disk. NOTE: UltraSSD_LRS can only be used with data disks, it cannot be used with OS Disk. Known values are: "Standard_LRS", "Premium_LRS", "StandardSSD_LRS", "UltraSSD_LRS", "Premium_ZRS", "StandardSSD_ZRS", and "PremiumV2_LRS".'
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Specifies the customer managed disk encryption set resource id for the managed disk.
        securityProfile:
          $ref: "#/components/schemas/VMDiskSecurityProfile"
          description: Specifies the security profile for the managed disk.
    VMDiskSecurityProfile:
      type: object
      description: Specifies the security profile settings for the managed disk. **Note:** It can only be set for Confidential VMs.
      properties:
        securityEncryptionType:
          $ref: "#/components/schemas/SecurityEncryptionTypes"
          description: 'Specifies the EncryptionType of the managed disk. It is set to DiskWithVMGuestState for encryption of the managed disk along with VMGuestState blob, VMGuestStateOnly for encryption of just the VMGuestState blob, and NonPersistedTPM for not persisting firmware state in the VMGuestState blob.. **Note:** It can be set for only Confidential VMs. Known values are: "VMGuestStateOnly", "DiskWithVMGuestState", and "NonPersistedTPM".'
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Specifies the customer managed disk encryption set resource id for the managed disk that is used for Customer Managed Key encrypted ConfidentialVM OS Disk and VMGuest blob.
    SecurityEncryptionTypes:
      type: string
      enum:
        - VMGuestStateOnly
        - DiskWithVMGuestState
        - NonPersistedTPM
    DiskRestorePointAttributes:
      type: object
      description: Disk Restore Point details.
      properties:
        id:
          type: string
          description: Resource Id.
        encryption:
          $ref: "#/components/schemas/RestorePointEncryption"
          description: Encryption at rest settings for disk restore point. It is an optional property that can be specified in the input while creating a restore point.
        sourceDiskRestorePoint:
          $ref: "#/components/schemas/ApiEntityReference"
          description: Resource Id of the source disk restore point.
    RestorePointEncryption:
      type: object
      description: Encryption at rest settings for disk restore point. It is an optional property that can be specified in the input while creating a restore point.
      properties:
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Describes the parameter of customer managed disk encryption set resource id that can be specified for disk. **Note:** The disk encryption set resource id can only be specified for managed disk. Please refer `https://aka.ms/mdssewithcmkoverview `_ for more details.
        type:
          $ref: "#/components/schemas/RestorePointEncryptionType"
          description: 'The type of key used to encrypt the data of the disk restore point. Known values are: "EncryptionAtRestWithPlatformKey", "EncryptionAtRestWithCustomerKey", and "EncryptionAtRestWithPlatformAndCustomerKeys".'
    RestorePointEncryptionType:
      type: string
      enum:
        - EncryptionAtRestWithPlatformKey
        - EncryptionAtRestWithCustomerKey
        - EncryptionAtRestWithPlatformAndCustomerKeys
    RestorePointSourceVMDataDisk:
      type: object
      description: Describes a data disk.
      properties:
        lun:
          type: integer
          description: Gets the logical unit number.
        name:
          type: string
          description: Gets the disk name.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Gets the caching type. Known values are: "None", "ReadOnly", and "ReadWrite".'
        diskSizeGB:
          type: integer
          description: Gets the initial disk size in GB for blank data disks, and the new desired size for existing OS and Data disks.
        managedDisk:
          $ref: "#/components/schemas/ManagedDiskParameters"
          description: Contains the managed disk details.
        diskRestorePoint:
          $ref: "#/components/schemas/DiskRestorePointAttributes"
          description: Contains Disk Restore Point properties.
        writeAcceleratorEnabled:
          type: boolean
          description: Shows true if the disk is write-accelerator enabled.
    DiskControllerTypes:
      type: string
      enum:
        - SCSI
        - NVMe
    OSProfile:
      type: object
      description: Specifies the operating system settings for the virtual machine. Some of the settings cannot be changed once VM is provisioned.
      properties:
        computerName:
          type: string
          description: Specifies the host OS name of the virtual machine. This name cannot be updated after the VM is created. **Max-length (Windows):** 15 characters. **Max-length (Linux):** 64 characters. For naming conventions and restrictions see `Azure infrastructure services implementation guidelines `_.
        adminUsername:
          type: string
          description: Specifies the name of the administrator account. This property cannot be updated after the VM is created. **Windows-only restriction:** Cannot end in "." **Disallowed values:** "administrator", "admin", "user", "user1", "test", "user2", "test1", "user3", "admin1", "1", "123", "a", "actuser", "adm", "admin2", "aspnet", "backup", "console", "david", "guest", "john", "owner", "root", "server", "sql", "support", "support_388945a0", "sys", "test2", "test3", "user4", "user5". **Minimum-length (Linux):** 1 character **Max-length (Linux):** 64 characters **Max-length (Windows):** 20 characters.
        adminPassword:
          type: string
          description: Specifies the password of the administrator account. **Minimum-length (Windows):** 8 characters **Minimum-length (Linux):** 6 characters **Max-length (Windows):** 123 characters **Max-length (Linux):** 72 characters **Complexity requirements:** 3 out of 4 conditions below need to be fulfilled Has lower characters Has upper characters Has a digit Has a special character (Regex match [\W_]) **Disallowed values:** "abc@123", "P@$$w0rd", "P@ssw0rd", "P@ssword123", "Pa$$word", "pass@word1", "Password!", "Password1", "Password22", "iloveyou!" For resetting the password, see `How to reset the Remote Desktop service or its login password in a Windows VM `_ For resetting root password, see `Manage users, SSH, and check or repair disks on Azure Linux VMs using the VMAccess Extension `_.
        customData:
          type: string
          description: "Specifies a base-64 encoded string of custom data. The base-64 encoded string is decoded to a binary array that is saved as a file on the Virtual Machine. The maximum length of the binary array is 65535 bytes. **Note: Do not pass any secrets or passwords in customData property.** This property cannot be updated after the VM is created. The property 'customData' is passed to the VM to be saved as a file, for more information see `Custom Data on Azure VMs `_. For using cloud-init for your Linux VM, see `Using cloud-init to customize a Linux VM during creation `_."
        windowsConfiguration:
          $ref: "#/components/schemas/WindowsConfiguration"
          description: Specifies Windows operating system settings on the virtual machine.
        linuxConfiguration:
          $ref: "#/components/schemas/LinuxConfiguration"
          description: Specifies the Linux operating system settings on the virtual machine. For a list of supported Linux distributions, see `Linux on Azure-Endorsed Distributions `_.
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/VaultSecretGroup"
          description: Specifies set of certificates that should be installed onto the virtual machine. To install certificates on a virtual machine it is recommended to use the `Azure Key Vault virtual machine extension for Linux `_ or the `Azure Key Vault virtual machine extension for Windows `_.
        allowExtensionOperations:
          type: boolean
          description: Specifies whether extension operations should be allowed on the virtual machine. This may only be set to False when no extensions are present on the virtual machine.
        requireGuestProvisionSignal:
          type: boolean
          description: Optional property which must either be set to True or omitted.
    WindowsConfiguration:
      type: object
      description: Specifies Windows operating system settings on the virtual machine.
      properties:
        provisionVMAgent:
          type: boolean
          description: Indicates whether virtual machine agent should be provisioned on the virtual machine. When this property is not specified in the request body, it is set to true by default. This will ensure that VM Agent is installed on the VM so that extensions can be added to the VM later.
        enableAutomaticUpdates:
          type: boolean
          description: Indicates whether Automatic Updates is enabled for the Windows virtual machine. Default value is true. For virtual machine scale sets, this property can be updated and updates will take effect on OS reprovisioning.
        timeZone:
          type: string
          description: Specifies the time zone of the virtual machine. e.g. "Pacific Standard Time". Possible values can be `TimeZoneInfo.Id `_ value from time zones returned by `TimeZoneInfo.GetSystemTimeZones `_.
        additionalUnattendContent:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalUnattendContent"
          description: Specifies additional base-64 encoded XML formatted information that can be included in the Unattend.xml file, which is used by Windows Setup.
        patchSettings:
          $ref: "#/components/schemas/PatchSettings"
          description: "[Preview Feature] Specifies settings related to VM Guest Patching on Windows."
        winRM:
          $ref: "#/components/schemas/WinRMConfiguration"
          description: Specifies the Windows Remote Management listeners. This enables remote Windows PowerShell.
        enableVMAgentPlatformUpdates:
          type: boolean
          description: Indicates whether VMAgent Platform Updates are enabled for the Windows Virtual Machine.
    AdditionalUnattendContent:
      type: object
      description: Specifies additional XML formatted information that can be included in the Unattend.xml file, which is used by Windows Setup. Contents are defined by setting name, component name, and the pass in which the content is applied.
      properties:
        passName:
          $ref: "#/components/schemas/PassNames"
          description: The pass name. Currently, the only allowable value is OobeSystem. "OobeSystem"
        componentName:
          $ref: "#/components/schemas/ComponentNames"
          description: The component name. Currently, the only allowable value is Microsoft-Windows-Shell-Setup. "Microsoft-Windows-Shell-Setup"
        settingName:
          $ref: "#/components/schemas/SettingNames"
          description: 'Specifies the name of the setting to which the content applies. Possible values are: FirstLogonCommands and AutoLogon. Known values are: "AutoLogon" and "FirstLogonCommands".'
        content:
          type: string
          description: Specifies the XML formatted content that is added to the unattend.xml file for the specified path and component. The XML must be less than 4KB and must include the root element for the setting or feature that is being inserted.
    PassNames:
      type: string
      enum:
        - OobeSystem
    ComponentNames:
      type: string
      enum:
        - Microsoft-Windows-Shell-Setup
    SettingNames:
      type: string
      enum:
        - AutoLogon
        - FirstLogonCommands
    PatchSettings:
      type: object
      description: Specifies settings related to VM Guest Patching on Windows.
      properties:
        patchMode:
          $ref: "#/components/schemas/WindowsVMGuestPatchMode"
          description: 'Specifies the mode of VM Guest Patching to IaaS virtual machine or virtual machines associated to virtual machine scale set with OrchestrationMode as Flexible. Possible values are: **Manual** - You control the application of patches to a virtual machine. You do this by applying patches manually inside the VM. In this mode, automatic updates are disabled; the property WindowsConfiguration.enableAutomaticUpdates must be false **AutomaticByOS** - The virtual machine will automatically be updated by the OS. The property WindowsConfiguration.enableAutomaticUpdates must be true. **AutomaticByPlatform** - the virtual machine will automatically updated by the platform. The properties provisionVMAgent and WindowsConfiguration.enableAutomaticUpdates must be true. Known values are: "Manual", "AutomaticByOS", and "AutomaticByPlatform".'
        enableHotpatching:
          type: boolean
          description: Enables customers to patch their Azure VMs without requiring a reboot. For enableHotpatching, the 'provisionVMAgent' must be set to true and 'patchMode' must be set to 'AutomaticByPlatform'.
        assessmentMode:
          $ref: "#/components/schemas/WindowsPatchAssessmentMode"
          description: 'Specifies the mode of VM Guest patch assessment for the IaaS virtual machine. Possible values are: **ImageDefault** - You control the timing of patch assessments on a virtual machine. **AutomaticByPlatform** - The platform will trigger periodic patch assessments. The property provisionVMAgent must be true. Known values are: "ImageDefault" and "AutomaticByPlatform".'
        automaticByPlatformSettings:
          $ref: "#/components/schemas/WindowsVMGuestPatchAutomaticByPlatformSettings"
          description: Specifies additional settings for patch mode AutomaticByPlatform in VM Guest Patching on Windows.
    WindowsVMGuestPatchMode:
      type: string
      enum:
        - Manual
        - AutomaticByOS
        - AutomaticByPlatform
    WindowsPatchAssessmentMode:
      type: string
      enum:
        - ImageDefault
        - AutomaticByPlatform
    WindowsVMGuestPatchAutomaticByPlatformSettings:
      type: object
      description: Specifies additional settings to be applied when patch mode AutomaticByPlatform is selected in Windows patch settings.
      properties:
        rebootSetting:
          $ref: "#/components/schemas/WindowsVMGuestPatchAutomaticByPlatformRebootSetting"
          description: 'Specifies the reboot setting for all AutomaticByPlatform patch installation operations. Known values are: "Unknown", "IfRequired", "Never", and "Always".'
        bypassPlatformSafetyChecksOnUserSchedule:
          type: boolean
          description: Enables customer to schedule patching without accidental upgrades.
    WindowsVMGuestPatchAutomaticByPlatformRebootSetting:
      type: string
      enum:
        - Unknown
        - IfRequired
        - Never
        - Always
    WinRMConfiguration:
