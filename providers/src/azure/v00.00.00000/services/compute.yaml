        image:
          $ref: "#/components/schemas/VirtualHardDisk"
          description: The source user image virtual hard disk. The virtual hard disk will be copied before being attached to the virtual machine. If SourceImage is provided, the destination virtual hard drive must not exist.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Specifies the caching requirements. Possible values are: **None,** **ReadOnly,** **ReadWrite.** The defaulting behavior is: **None for Standard storage. ReadOnly for Premium storage.**. Known values are: "None", "ReadOnly", and "ReadWrite".'
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
        diffDiskSettings:
          $ref: "#/components/schemas/DiffDiskSettings"
          description: Specifies the ephemeral Disk Settings for the operating system disk used by the virtual machine.
        createOption:
          $ref: "#/components/schemas/DiskCreateOptionTypes"
          description: 'Specifies how the virtual machine disk should be created. Possible values are **Attach:** This value is used when you are using a specialized disk to create the virtual machine. **FromImage:** This value is used when you are using an image to create the virtual machine. If you are using a platform image, you should also use the imageReference element described above. If you are using a marketplace image, you should also use the plan element previously described. Required. Known values are: "FromImage", "Empty", "Attach", "Copy", and "Restore".'
        diskSizeGB:
          type: integer
          description: Specifies the size of an empty data disk in gigabytes. This element can be used to overwrite the size of the disk in a virtual machine image. The property 'diskSizeGB' is the number of bytes x 1024^3 for the disk and the value cannot be larger than 1023.
        storageFaultDomainAlignment:
          $ref: "#/components/schemas/StorageFaultDomainAlignmentType"
          description: 'Specifies the storage fault domain alignment type for the disk. Known values are: "Aligned" and "BestEffortAligned".'
        managedDisk:
          $ref: "#/components/schemas/ManagedDiskParameters"
          description: The managed disk parameters.
        deleteOption:
          $ref: "#/components/schemas/DiskDeleteOptionTypes"
          description: 'Specifies whether OS Disk should be deleted or detached upon VM deletion. Possible values are: **Delete.** If this value is used, the OS disk is deleted when VM is deleted. **Detach.** If this value is used, the os disk is retained after VM is deleted. The default value is set to **Detach**. For an ephemeral OS Disk, the default value is set to **Delete**. The user cannot change the delete option for an ephemeral OS Disk. Known values are: "Delete" and "Detach".'
      required:
        - createOption
