        diskMBpsReadWrite:
          type: integer
          description: Specifies the bandwidth in MB per second for the managed disk when StorageAccountType is UltraSSD_LRS.
        detachOption:
          $ref: "#/components/schemas/DiskDetachOptionTypes"
          description: "Specifies the detach behavior to be used while detaching a disk or which is already in the process of detachment from the virtual machine. Supported values: **ForceDetach.** detachOption: **ForceDetach** is applicable only for managed data disks. If a previous detachment attempt of the data disk did not complete due to an unexpected failure from the virtual machine and the disk is still not released then use force-detach as a last resort option to detach the disk forcibly from the VM. All writes might not have been flushed when using this detach behavior. **This feature is still in preview**. To force-detach a data disk update toBeDetached to 'true' along with setting detachOption: 'ForceDetach'. \"ForceDetach\""
        deleteOption:
          $ref: "#/components/schemas/DiskDeleteOptionTypes"
          description: 'Specifies whether data disk should be deleted or detached upon VM deletion. Possible values are: **Delete.** If this value is used, the data disk is deleted when VM is deleted. **Detach.** If this value is used, the data disk is retained after VM is deleted. The default value is set to **Detach**. Known values are: "Delete" and "Detach".'
