openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Compute Management Client
  description: Compute Client.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-03-01-stackql-generated
  x-serviceAlias: compute
  x-sdkPackage: azure-mgmt-compute
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AvailabilitySetProperties:
      type: object
      description: The instance view of a resource.
      properties:
        platformUpdateDomainCount:
          type: integer
          description: Update Domain count.
        platformFaultDomainCount:
          type: integer
          description: Fault Domain count.
        virtualMachines:
          type: array
          items:
            $ref: "#/components/schemas/SubResource"
          description: A list of references to all virtual machines in the availability set.
        proximityPlacementGroup:
          $ref: "#/components/schemas/SubResource"
          description: "Specifies information about the proximity placement group that the availability set should be assigned to. Minimum api-version: 2018-04-01."
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/InstanceViewStatus"
          description: The resource status information.
        scheduledEventsPolicy:
          $ref: "#/components/schemas/ScheduledEventsPolicy"
          description: Specifies Redeploy, Reboot and ScheduledEventsAdditionalPublishingTargets Scheduled Event related configurations for the availability set.
        virtualMachineScaleSetMigrationInfo:
          $ref: "#/components/schemas/VirtualMachineScaleSetMigrationInfo"
          description: Describes the migration properties on the Availability Set.
    SubResource:
      type: object
      description: SubResource.
      properties:
        id:
