        osType:
          $ref: "#/components/schemas/OperatingSystemTypes"
          description: 'The Operating System type. Known values are: "Windows" and "Linux".'
        hyperVGeneration:
          $ref: "#/components/schemas/HyperVGeneration"
          description: 'The hypervisor generation of the Virtual Machine. Applicable to OS disks only. Known values are: "V1" and "V2".'
        purchasePlan:
          $ref: "#/components/schemas/DiskPurchasePlan"
          description: "Purchase plan information for the the image from which the OS disk was created. E.g. - {name: 2019-Datacenter, publisher: MicrosoftWindowsServer, product: WindowsServer}."
        supportedCapabilities:
          $ref: "#/components/schemas/SupportedCapabilities"
          description: List of supported capabilities for the image from which the OS disk was created.
        creationData:
          $ref: "#/components/schemas/CreationData"
          description: Disk source information. CreationData information cannot be changed after the disk has been created. Required.
