          description: 'Specifies the priority for the virtual machine. Minimum api-version: 2019-03-01. Known values are: "Regular", "Low", and "Spot".'
        evictionPolicy:
          $ref: "#/components/schemas/VirtualMachineEvictionPolicyTypes"
          description: "Specifies the eviction policy for the Azure Spot virtual machine and Azure Spot scale set. For Azure Spot virtual machines, both 'Deallocate' and 'Delete' are supported and the minimum api-version is 2019-03-01. For Azure Spot scale sets, both 'Deallocate' and 'Delete' are supported and the minimum api-version is 2017-10-30-preview. Known values are: \"Deallocate\" and \"Delete\"."
        billingProfile:
          $ref: "#/components/schemas/BillingProfile"
          description: "Specifies the billing related details of a Azure Spot virtual machine. Minimum api-version: 2019-03-01."
        host:
          $ref: "#/components/schemas/SubResource"
          description: "Specifies information about the dedicated host that the virtual machine resides in. Minimum api-version: 2018-10-01."
        hostGroup:
          $ref: "#/components/schemas/SubResource"
          description: "Specifies information about the dedicated host group that the virtual machine resides in. **Note:** User cannot specify both host and hostGroup properties. Minimum api-version: 2020-06-01."
        provisioningState:
          type: string
          description: The provisioning state, which only appears in the response.
        instanceView:
          $ref: "#/components/schemas/VirtualMachineInstanceView"
          description: The virtual machine instance view.
        licenseType:
          type: string
          description: "Specifies that the image or disk that is being used was licensed on-premises. Possible values for Windows Server operating system are: Windows_Client Windows_Server Possible values for Linux Server operating system are: RHEL_BYOS (for RHEL) SLES_BYOS (for SUSE) For more information, see `Azure Hybrid Use Benefit for Windows Server `_ `Azure Hybrid Use Benefit for Linux Server `_ Minimum api-version: 2015-06-15."
        vmId:
          type: string
          description: Specifies the VM unique ID which is a 128-bits identifier that is encoded and stored in all Azure IaaS VMs SMBIOS and can be read using platform BIOS commands.
        extensionsTimeBudget:
          type: string
          description: "Specifies the time alloted for all extensions to start. The time duration should be between 15 minutes and 120 minutes (inclusive) and should be specified in ISO 8601 format. The default value is 90 minutes (PT1H30M). Minimum api-version: 2020-06-01."
        platformFaultDomain:
          type: integer
