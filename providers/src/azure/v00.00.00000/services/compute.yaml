    ProxyAgentSettings:
      type: object
      description: "Specifies ProxyAgent settings for the virtual machine or virtual machine scale set. Minimum api-version: 2023-09-01."
      properties:
        enabled:
          type: boolean
          description: Specifies whether ProxyAgent feature should be enabled on the virtual machine or virtual machine scale set.
        mode:
          $ref: "#/components/schemas/Mode"
          description: "Specifies the mode that ProxyAgent will execute on. Warning: this property has been deprecated, please specify 'mode' under particular hostendpoint setting. Known values are: \"Audit\" and \"Enforce\"."
        keyIncarnationId:
          type: integer
