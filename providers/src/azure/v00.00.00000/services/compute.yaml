        keyData:
          type: string
          description: SSH public key certificate used to authenticate with the VM through ssh. The key needs to be at least 2048-bit and in ssh-rsa format. For creating ssh keys, see [Create SSH keys on Linux and Mac for Linux VMs in Azure]`https://docs.microsoft.com/azure/virtual-machines/linux/create-ssh-keys-detailed `_).
    LinuxPatchSettings:
      type: object
      description: Specifies settings related to VM Guest Patching on Linux.
      properties:
        patchMode:
          $ref: "#/components/schemas/LinuxVMGuestPatchMode"
          description: "Specifies the mode of VM Guest Patching to IaaS virtual machine or virtual machines associated to virtual machine scale set with OrchestrationMode as Flexible. Possible values are: **ImageDefault** - The virtual machine's default patching configuration is used. **AutomaticByPlatform** - The virtual machine will be automatically updated by the platform. The property provisionVMAgent must be true. Known values are: \"ImageDefault\" and \"AutomaticByPlatform\"."
        assessmentMode:
