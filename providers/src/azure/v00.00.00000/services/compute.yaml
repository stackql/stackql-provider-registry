          description: "Specifies a base-64 encoded string of custom data. The base-64 encoded string is decoded to a binary array that is saved as a file on the Virtual Machine. The maximum length of the binary array is 65535 bytes. **Note: Do not pass any secrets or passwords in customData property.** This property cannot be updated after the VM is created. The property customData is passed to the VM to be saved as a file, for more information see `Custom Data on Azure VMs `_. If using cloud-init for your Linux VM, see `Using cloud-init to customize a Linux VM during creation `_."
    DataDisksToAttach:
      type: object
      description: Describes the data disk to be attached.
      properties:
        diskId:
          type: string
          description: ID of the managed data disk. Required.
        lun:
          type: integer
          description: The logical unit number of the data disk. This value is used to identify data disks within the VM and therefore must be unique for each data disk attached to a VM. If not specified, lun would be auto assigned.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Specifies the caching requirements. Possible values are: **None,** **ReadOnly,** **ReadWrite.** The defaulting behavior is: **None for Standard storage. ReadOnly for Premium storage.**. Known values are: "None", "ReadOnly", and "ReadWrite".'
        deleteOption:
          $ref: "#/components/schemas/DiskDeleteOptionTypes"
          description: 'Specifies whether data disk should be deleted or detached upon VM deletion. Possible values are: **Delete.** If this value is used, the data disk is deleted when VM is deleted. **Detach.** If this value is used, the data disk is retained after VM is deleted. The default value is set to **Detach**. Known values are: "Delete" and "Detach".'
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Specifies the customer managed disk encryption set resource id for the managed disk.
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
      required:
        - diskId
    DataDisksToDetach:
      type: object
      description: Describes the data disk to be detached.
      properties:
        diskId:
          type: string
          description: ID of the managed data disk. Required.
        detachOption:
          $ref: "#/components/schemas/DiskDetachOptionTypes"
          description: Supported options available for Detach of a disk from a VM. Refer to DetachOption object reference for more details. "ForceDetach"
      required:
        - diskId
    RetrieveBootDiagnosticsDataResult:
      type: object
      description: The SAS URIs of the console screenshot and serial log blobs.
      properties:
        consoleScreenshotBlobUri:
          type: string
          description: The console screenshot blob URI.
        serialConsoleLogBlobUri:
          type: string
          description: The serial console log blob URI.
    RunCommandResult:
      type: object
      description: RunCommandResult.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/InstanceViewStatus"
          description: Run command operation response.
    VirtualMachineScaleSetProperties:
      type: object
      description: Describes the properties of a Virtual Machine Scale Set.
      properties:
        upgradePolicy:
          $ref: "#/components/schemas/UpgradePolicy"
          description: The upgrade policy.
        scheduledEventsPolicy:
          $ref: "#/components/schemas/ScheduledEventsPolicy"
          description: The ScheduledEventsPolicy.
        automaticRepairsPolicy:
          $ref: "#/components/schemas/AutomaticRepairsPolicy"
          description: Policy for automatic repairs.
        virtualMachineProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetVMProfile"
          description: The virtual machine profile.
        provisioningState:
          type: string
          description: The provisioning state, which only appears in the response.
        overprovision:
          type: boolean
          description: Specifies whether the Virtual Machine Scale Set should be overprovisioned.
        doNotRunExtensionsOnOverprovisionedVMs:
          type: boolean
          description: When Overprovision is enabled, extensions are launched only on the requested number of VMs which are finally kept. This property will hence ensure that the extensions do not run on the extra overprovisioned VMs.
        uniqueId:
          type: string
          description: Specifies the ID which uniquely identifies a Virtual Machine Scale Set.
        singlePlacementGroup:
          type: boolean
          description: "When true this limits the scale set to a single placement group, of max size 100 virtual machines. NOTE: If singlePlacementGroup is true, it may be modified to false. However, if singlePlacementGroup is false, it may not be modified to true."
        zoneBalance:
          type: boolean
          description: Whether to force strictly even Virtual Machine distribution cross x-zones in case there is zone outage. zoneBalance property can only be set if the zones property of the scale set contains more than one zone. If there are no zones or only one zone specified, then zoneBalance property should not be set.
        platformFaultDomainCount:
          type: integer
          description: Fault Domain count for each placement group.
        proximityPlacementGroup:
          $ref: "#/components/schemas/SubResource"
          description: "Specifies information about the proximity placement group that the virtual machine scale set should be assigned to. Minimum api-version: 2018-04-01."
        hostGroup:
          $ref: "#/components/schemas/SubResource"
          description: "Specifies information about the dedicated host group that the virtual machine scale set resides in. Minimum api-version: 2020-06-01."
        additionalCapabilities:
          $ref: "#/components/schemas/AdditionalCapabilities"
          description: "Specifies additional capabilities enabled or disabled on the Virtual Machines in the Virtual Machine Scale Set. For instance: whether the Virtual Machines have the capability to support attaching managed data disks with UltraSSD_LRS storage account type."
        scaleInPolicy:
          $ref: "#/components/schemas/ScaleInPolicy"
          description: Specifies the policies applied when scaling in Virtual Machines in the Virtual Machine Scale Set.
        orchestrationMode:
          $ref: "#/components/schemas/OrchestrationMode"
          description: 'Specifies the orchestration mode for the virtual machine scale set. Known values are: "Uniform" and "Flexible".'
        spotRestorePolicy:
          $ref: "#/components/schemas/SpotRestorePolicy"
          description: Specifies the Spot Restore properties for the virtual machine scale set.
        priorityMixPolicy:
          $ref: "#/components/schemas/PriorityMixPolicy"
          description: Specifies the desired targets for mixing Spot and Regular priority VMs within the same VMSS Flex instance.
        timeCreated:
          type: string
          format: date-time
          description: "Specifies the time at which the Virtual Machine Scale Set resource was created. Minimum api-version: 2021-11-01."
        constrainedMaximumCapacity:
          type: boolean
          description: Optional property which must either be set to True or omitted.
        resiliencyPolicy:
          $ref: "#/components/schemas/ResiliencyPolicy"
          description: Policy for Resiliency.
        zonalPlatformFaultDomainAlignMode:
          $ref: "#/components/schemas/ZonalPlatformFaultDomainAlignMode"
          description: 'Specifies the align mode between Virtual Machine Scale Set compute and storage Fault Domain count. Known values are: "Aligned", "Unaligned", and "BestEffortAligned".'
        skuProfile:
          $ref: "#/components/schemas/SkuProfile"
          description: Specifies the sku profile for the virtual machine scale set.
        highSpeedInterconnectPlacement:
          $ref: "#/components/schemas/HighSpeedInterconnectPlacement"
          description: 'Specifies the high speed interconnect placement for the virtual machine scale set. Known values are: "None" and "Trunk".'
        lifecycleHooksProfile:
          $ref: "#/components/schemas/LifecycleHooksProfile"
          description: Specifies the lifecycle hooks profile for the virtual machine scale set.
        externalHealthPolicy:
          $ref: "#/components/schemas/ExternalHealthPolicy"
          description: Specifies the external health policy for the virtual machine scale set.
    UpgradePolicy:
      type: object
      description: Describes an upgrade policy - automatic, manual, or rolling.
      properties:
        mode:
          $ref: "#/components/schemas/UpgradeMode"
          description: 'Specifies the mode of an upgrade to virtual machines in the scale set. Possible values are: **Manual** - You control the application of updates to virtual machines in the scale set. You do this by using the manualUpgrade action. **Automatic** - All virtual machines in the scale set are automatically updated at the same time. Known values are: "Automatic", "Manual", and "Rolling".'
        rollingUpgradePolicy:
          $ref: "#/components/schemas/RollingUpgradePolicy"
          description: The configuration parameters used while performing a rolling upgrade.
        automaticOSUpgradePolicy:
          $ref: "#/components/schemas/AutomaticOSUpgradePolicy"
          description: Configuration parameters used for performing automatic OS Upgrade.
    UpgradeMode:
      type: string
      enum:
        - Automatic
        - Manual
        - Rolling
    AutomaticOSUpgradePolicy:
      type: object
      description: The configuration parameters used for performing automatic OS upgrade.
      properties:
        enableAutomaticOSUpgrade:
          type: boolean
          description: Indicates whether OS upgrades should automatically be applied to scale set instances in a rolling fashion when a newer version of the OS image becomes available. Default value is false. If this is set to true for Windows based scale sets, `enableAutomaticUpdates `_ is automatically set to false and cannot be set to true.
        disableAutomaticRollback:
          type: boolean
          description: Whether OS image rollback feature should be disabled. Default value is false.
        useRollingUpgradePolicy:
          type: boolean
          description: Indicates whether rolling upgrade policy should be used during Auto OS Upgrade. Default value is false. Auto OS Upgrade will fallback to the default policy if no policy is defined on the VMSS.
        osRollingUpgradeDeferral:
          type: boolean
          description: Indicates whether Auto OS Upgrade should undergo deferral. Deferred OS upgrades will send advanced notifications on a per-VM basis that an OS upgrade from rolling upgrades is incoming, via the IMDS tag 'Platform.PendingOSUpgrade'. The upgrade then defers until the upgrade is approved via an ApproveRollingUpgrade call.
    AutomaticRepairsPolicy:
      type: object
      description: Specifies the configuration parameters for automatic repairs on the virtual machine scale set.
      properties:
        enabled:
          type: boolean
          description: Specifies whether automatic repairs should be enabled on the virtual machine scale set. The default value is false.
        gracePeriod:
          type: string
          description: The amount of time for which automatic repairs are suspended due to a state change on VM. The grace time starts after the state change has completed. This helps avoid premature or accidental repairs. The time duration should be specified in ISO 8601 format. The minimum allowed grace period is 10 minutes (PT10M), which is also the default value. The maximum allowed grace period is 90 minutes (PT90M).
        repairAction:
          $ref: "#/components/schemas/RepairAction"
          description: 'Type of repair action (replace, restart, reimage) that will be used for repairing unhealthy virtual machines in the scale set. Default value is replace. Known values are: "Replace", "Restart", and "Reimage".'
    RepairAction:
      type: string
      enum:
        - Replace
        - Restart
        - Reimage
    VirtualMachineScaleSetVMProfile:
      type: object
      description: Describes a virtual machine scale set virtual machine profile.
      properties:
        osProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetOSProfile"
          description: Specifies the operating system settings for the virtual machines in the scale set.
        storageProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetStorageProfile"
          description: Specifies the storage settings for the virtual machine disks.
        networkProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetNetworkProfile"
          description: Specifies properties of the network interfaces of the virtual machines in the scale set.
        securityProfile:
          $ref: "#/components/schemas/SecurityProfile"
          description: Specifies the Security related profile settings for the virtual machines in the scale set.
        diagnosticsProfile:
          $ref: "#/components/schemas/DiagnosticsProfile"
          description: "Specifies the boot diagnostic settings state. Minimum api-version: 2015-06-15."
        extensionProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetExtensionProfile"
          description: Specifies a collection of settings for extensions installed on virtual machines in the scale set.
        licenseType:
          type: string
          description: "Specifies that the image or disk that is being used was licensed on-premises. Possible values for Windows Server operating system are: Windows_Client Windows_Server Possible values for Linux Server operating system are: RHEL_BYOS (for RHEL) SLES_BYOS (for SUSE) For more information, see `Azure Hybrid Use Benefit for Windows Server `_ `Azure Hybrid Use Benefit for Linux Server `_ Minimum api-version: 2015-06-15."
        priority:
          $ref: "#/components/schemas/VirtualMachinePriorityTypes"
          description: 'Specifies the priority for the virtual machines in the scale set. Minimum api-version: 2017-10-30-preview. Known values are: "Regular", "Low", and "Spot".'
        evictionPolicy:
          $ref: "#/components/schemas/VirtualMachineEvictionPolicyTypes"
          description: "Specifies the eviction policy for the Azure Spot virtual machine and Azure Spot scale set. For Azure Spot virtual machines, both 'Deallocate' and 'Delete' are supported and the minimum api-version is 2019-03-01. For Azure Spot scale sets, both 'Deallocate' and 'Delete' are supported and the minimum api-version is 2017-10-30-preview. Known values are: \"Deallocate\" and \"Delete\"."
        billingProfile:
          $ref: "#/components/schemas/BillingProfile"
          description: "Specifies the billing related details of a Azure Spot VMSS. Minimum api-version: 2019-03-01."
        scheduledEventsProfile:
          $ref: "#/components/schemas/ScheduledEventsProfile"
          description: Specifies Scheduled Event related configurations.
        userData:
          type: string
          description: "UserData for the virtual machines in the scale set, which must be base-64 encoded. Customer should not pass any secrets in here. Minimum api-version: 2021-03-01."
        capacityReservation:
          $ref: "#/components/schemas/CapacityReservationProfile"
          description: "Specifies the capacity reservation related details of a scale set. Minimum api-version: 2021-04-01."
        interconnectBlockProfile:
          $ref: "#/components/schemas/InterconnectBlockProfile"
          description: "Specifies the Interconnect Block related details of a Scale Set. Minimum api-version: 2026-03-01."
        applicationProfile:
          $ref: "#/components/schemas/ApplicationProfile"
          description: Specifies the gallery applications that should be made available to the VM/VMSS.
        hardwareProfile:
          $ref: "#/components/schemas/VirtualMachineScaleSetHardwareProfile"
          description: "Specifies the hardware profile related details of a scale set. Minimum api-version: 2021-11-01."
        serviceArtifactReference:
          $ref: "#/components/schemas/ServiceArtifactReference"
          description: "Specifies the service artifact reference id used to set same image version for all virtual machines in the scale set when using 'latest' image version. Minimum api-version: 2022-11-01."
        securityPostureReference:
          $ref: "#/components/schemas/SecurityPostureReference"
          description: "Specifies the security posture to be used in the scale set. Minimum api-version: 2023-03-01."
        timeCreated:
          type: string
          format: date-time
          description: Specifies the time in which this VM profile for the Virtual Machine Scale Set was created. This value will be added to VMSS Flex VM tags when creating/updating the VMSS VM Profile. Minimum API version for this property is 2023-09-01.
    VirtualMachineScaleSetOSProfile:
      type: object
      description: Describes a virtual machine scale set OS profile.
      properties:
        computerNamePrefix:
          type: string
          description: Specifies the computer name prefix for all of the virtual machines in the scale set. Computer name prefixes must be 1 to 15 characters long.
        adminUsername:
          type: string
          description: Specifies the name of the administrator account. **Windows-only restriction:** Cannot end in "." **Disallowed values:** "administrator", "admin", "user", "user1", "test", "user2", "test1", "user3", "admin1", "1", "123", "a", "actuser", "adm", "admin2", "aspnet", "backup", "console", "david", "guest", "john", "owner", "root", "server", "sql", "support", "support_388945a0", "sys", "test2", "test3", "user4", "user5". **Minimum-length (Linux):** 1 character **Max-length (Linux):** 64 characters **Max-length (Windows):** 20 characters.
        adminPassword:
          type: string
          description: Specifies the password of the administrator account. **Minimum-length (Windows):** 8 characters **Minimum-length (Linux):** 6 characters **Max-length (Windows):** 123 characters **Max-length (Linux):** 72 characters **Complexity requirements:** 3 out of 4 conditions below need to be fulfilled Has lower characters Has upper characters Has a digit Has a special character (Regex match [\W_]) **Disallowed values:** "abc@123", "P@$$w0rd", "P@ssw0rd", "P@ssword123", "Pa$$word", "pass@word1", "Password!", "Password1", "Password22", "iloveyou!" For resetting the password, see `How to reset the Remote Desktop service or its login password in a Windows VM `_ For resetting root password, see `Manage users, SSH, and check or repair disks on Azure Linux VMs using the VMAccess Extension `_.
        customData:
          type: string
          description: Specifies a base-64 encoded string of custom data. The base-64 encoded string is decoded to a binary array that is saved as a file on the Virtual Machine. The maximum length of the binary array is 65535 bytes. For using cloud-init for your VM, see `Using cloud-init to customize a Linux VM during creation `_.
        windowsConfiguration:
          $ref: "#/components/schemas/WindowsConfiguration"
          description: Specifies Windows operating system settings on the virtual machine.
        linuxConfiguration:
          $ref: "#/components/schemas/LinuxConfiguration"
          description: Specifies the Linux operating system settings on the virtual machine. For a list of supported Linux distributions, see `Linux on Azure-Endorsed Distributions `_.
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/VaultSecretGroup"
          description: Specifies set of certificates that should be installed onto the virtual machines in the scale set. To install certificates on a virtual machine it is recommended to use the `Azure Key Vault virtual machine extension for Linux `_ or the `Azure Key Vault virtual machine extension for Windows `_.
        allowExtensionOperations:
          type: boolean
          description: Specifies whether extension operations should be allowed on the virtual machine scale set. This may only be set to False when no extensions are present on the virtual machine scale set.
        requireGuestProvisionSignal:
          type: boolean
          description: Optional property which must either be set to True or omitted.
    VirtualMachineScaleSetStorageProfile:
      type: object
      description: Describes a virtual machine scale set storage profile.
      properties:
        imageReference:
          $ref: "#/components/schemas/ImageReference"
          description: Specifies information about the image to use. You can specify information about platform images, marketplace images, or virtual machine images. This element is required when you want to use a platform image, marketplace image, or virtual machine image, but is not used in other creation operations.
        osDisk:
          $ref: "#/components/schemas/VirtualMachineScaleSetOSDisk"
          description: Specifies information about the operating system disk used by the virtual machines in the scale set. For more information about disks, see `About disks and VHDs for Azure virtual machines `_.
        dataDisks:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineScaleSetDataDisk"
          description: Specifies the parameters that are used to add data disks to the virtual machines in the scale set. For more information about disks, see `About disks and VHDs for Azure virtual machines `_.
        diskControllerType:
          $ref: "#/components/schemas/DiskControllerTypes"
          description: 'Specifies the disk controller type configured for the virtual machines in the scale set. Minimum api-version: 2022-08-01. Known values are: "SCSI" and "NVMe".'
    VirtualMachineScaleSetOSDisk:
      type: object
      description: Describes a virtual machine scale set operating system disk.
      properties:
        name:
          type: string
          description: The disk name.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Specifies the caching requirements. Possible values are: **None,** **ReadOnly,** **ReadWrite.** The default values are: **None for Standard storage. ReadOnly for Premium storage.**. Known values are: "None", "ReadOnly", and "ReadWrite".'
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
        createOption:
          $ref: "#/components/schemas/DiskCreateOptionTypes"
          description: 'Specifies how the virtual machines in the scale set should be created. The only allowed value is: **FromImage.** This value is used when you are using an image to create the virtual machine. If you are using a platform image, you also use the imageReference element described above. If you are using a marketplace image, you also use the plan element previously described. Required. Known values are: "FromImage", "Empty", "Attach", "Copy", and "Restore".'
        diffDiskSettings:
          $ref: "#/components/schemas/DiffDiskSettings"
          description: Specifies the ephemeral disk Settings for the operating system disk used by the virtual machine scale set.
        diskSizeGB:
          type: integer
          description: Specifies the size of an empty data disk in gigabytes. This element can be used to overwrite the size of the disk in a virtual machine image. The property 'diskSizeGB' is the number of bytes x 1024^3 for the disk and the value cannot be larger than 1023.
        storageFaultDomainAlignment:
          $ref: "#/components/schemas/StorageFaultDomainAlignmentType"
          description: 'Specifies the storage fault domain alignment type for the disk. Known values are: "Aligned" and "BestEffortAligned".'
        osType:
          $ref: "#/components/schemas/OperatingSystemTypes"
          description: 'This property allows you to specify the type of the OS that is included in the disk if creating a VM from user-image or a specialized VHD. Possible values are: **Windows,** **Linux.**. Known values are: "Windows" and "Linux".'
        image:
          $ref: "#/components/schemas/VirtualHardDisk"
          description: Specifies information about the unmanaged user image to base the scale set on.
        vhdContainers:
          type: array
          items:
            type: string
          description: Specifies the container urls that are used to store operating system disks for the scale set.
        managedDisk:
          $ref: "#/components/schemas/VirtualMachineScaleSetManagedDiskParameters"
          description: The managed disk parameters.
        deleteOption:
          $ref: "#/components/schemas/DiskDeleteOptionTypes"
          description: 'Specifies whether OS Disk should be deleted or detached upon VMSS Flex deletion (This feature is available for VMSS with Flexible OrchestrationMode only). Possible values: **Delete** If this value is used, the OS disk is deleted when VMSS Flex VM is deleted. **Detach** If this value is used, the OS disk is retained after VMSS Flex VM is deleted. The default value is set to **Delete**. For an Ephemeral OS Disk, the default value is set to **Delete**. User cannot change the delete option for Ephemeral OS Disk. Known values are: "Delete" and "Detach".'
      required:
        - createOption
    VirtualMachineScaleSetManagedDiskParameters:
      type: object
      description: Describes the parameters of a ScaleSet managed disk.
      properties:
        storageAccountType:
          $ref: "#/components/schemas/StorageAccountTypes"
          description: 'Specifies the storage account type for the managed disk. NOTE: UltraSSD_LRS can only be used with data disks, it cannot be used with OS Disk. Known values are: "Standard_LRS", "Premium_LRS", "StandardSSD_LRS", "UltraSSD_LRS", "Premium_ZRS", "StandardSSD_ZRS", and "PremiumV2_LRS".'
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Specifies the customer managed disk encryption set resource id for the managed disk.
        securityProfile:
          $ref: "#/components/schemas/VMDiskSecurityProfile"
          description: Specifies the security profile for the managed disk.
    VirtualMachineScaleSetDataDisk:
      type: object
      description: Describes a virtual machine scale set data disk.
      properties:
        name:
          type: string
          description: The disk name.
        lun:
          type: integer
          description: Specifies the logical unit number of the data disk. This value is used to identify data disks within the VM and therefore must be unique for each data disk attached to a VM. Required.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Specifies the caching requirements. Possible values are: **None,** **ReadOnly,** **ReadWrite.** The default values are: **None for Standard storage. ReadOnly for Premium storage.**. Known values are: "None", "ReadOnly", and "ReadWrite".'
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
        createOption:
          $ref: "#/components/schemas/DiskCreateOptionTypes"
          description: 'The create option. Required. Known values are: "FromImage", "Empty", "Attach", "Copy", and "Restore".'
        diskSizeGB:
          type: integer
          description: Specifies the size of an empty data disk in gigabytes. This element can be used to overwrite the size of the disk in a virtual machine image. The property diskSizeGB is the number of bytes x 1024^3 for the disk and the value cannot be larger than 1023.
        storageFaultDomainAlignment:
          $ref: "#/components/schemas/StorageFaultDomainAlignmentType"
          description: 'Specifies the storage fault domain alignment type for the disk. Known values are: "Aligned" and "BestEffortAligned".'
        managedDisk:
          $ref: "#/components/schemas/VirtualMachineScaleSetManagedDiskParameters"
          description: The managed disk parameters.
        diskIOPSReadWrite:
          type: integer
          description: Specifies the Read-Write IOPS for the managed disk. Should be used only when StorageAccountType is UltraSSD_LRS. If not specified, a default value would be assigned based on diskSizeGB.
        diskMBpsReadWrite:
          type: integer
          description: Specifies the bandwidth in MB per second for the managed disk. Should be used only when StorageAccountType is UltraSSD_LRS. If not specified, a default value would be assigned based on diskSizeGB.
        deleteOption:
          $ref: "#/components/schemas/DiskDeleteOptionTypes"
          description: 'Specifies whether data disk should be deleted or detached upon VMSS Flex deletion (This feature is available for VMSS with Flexible OrchestrationMode only). Possible values: **Delete** If this value is used, the data disk is deleted when the VMSS Flex VM is deleted. **Detach** If this value is used, the data disk is retained after VMSS Flex VM is deleted. The default value is set to **Delete**. Known values are: "Delete" and "Detach".'
      required:
        - lun
        - createOption
    VirtualMachineScaleSetNetworkProfile:
      type: object
      description: Describes a virtual machine scale set network profile.
      properties:
        healthProbe:
          $ref: "#/components/schemas/ApiEntityReference"
          description: "A reference to a load balancer probe used to determine the health of an instance in the virtual machine scale set. The reference will be in the form: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/loadBalancers/{loadBalancerName}/probes/{probeName}'."
        networkInterfaceConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineScaleSetNetworkConfiguration"
          description: The list of network configurations.
        networkApiVersion:
          $ref: "#/components/schemas/NetworkApiVersion"
          description: "specifies the Microsoft.Network API version used when creating networking resources in the Network Interface Configurations for Virtual Machine Scale Set with orchestration mode 'Flexible'. Known values are: \"2020-11-01\" and \"2022-11-01\"."
        interconnectGroupProfile:
          $ref: "#/components/schemas/InterconnectGroupProfile"
          description: "Specifies the interconnect group profile to associate with the scale set. Minimum api-version: 2026-03-01."
    VirtualMachineScaleSetExtensionProfile:
      type: object
      description: Describes a virtual machine scale set extension profile.
      properties:
        extensions:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineScaleSetExtension"
          description: The virtual machine scale set child extension resources.
        extensionsTimeBudget:
          type: string
          description: "Specifies the time alloted for all extensions to start. The time duration should be between 15 minutes and 120 minutes (inclusive) and should be specified in ISO 8601 format. The default value is 90 minutes (PT1H30M). Minimum api-version: 2020-06-01."
    VirtualMachinePriorityTypes:
      type: string
      enum:
        - Regular
        - Low
        - Spot
    VirtualMachineEvictionPolicyTypes:
      type: string
      enum:
        - Deallocate
        - Delete
    BillingProfile:
      type: object
      description: "Specifies the billing related details of a Azure Spot VM or VMSS. Minimum api-version: 2019-03-01."
      properties:
        maxPrice:
          type: number
          description: "Specifies the maximum price you are willing to pay for a Azure Spot VM/VMSS. This price is in US Dollars. This price will be compared with the current Azure Spot price for the VM size. Also, the prices are compared at the time of create/update of Azure Spot VM/VMSS and the operation will only succeed if the maxPrice is greater than the current Azure Spot price. The maxPrice will also be used for evicting a Azure Spot VM/VMSS if the current Azure Spot price goes beyond the maxPrice after creation of VM/VMSS. Possible values are: - Any decimal value greater than zero. Example: 0.01538 -1 – indicates default price to be up-to on-demand. You can set the maxPrice to -1 to indicate that the Azure Spot VM/VMSS should not be evicted for price reasons. Also, the default max price is -1 if it is not provided by you. Minimum api-version: 2019-03-01."
    ScheduledEventsProfile:
      type: object
      description: ScheduledEventsProfile.
      properties:
        terminateNotificationProfile:
          $ref: "#/components/schemas/TerminateNotificationProfile"
          description: Specifies Terminate Scheduled Event related configurations.
        osImageNotificationProfile:
          $ref: "#/components/schemas/OSImageNotificationProfile"
          description: Specifies OS Image Scheduled Event related configurations.
    TerminateNotificationProfile:
      type: object
      description: TerminateNotificationProfile.
      properties:
        notBeforeTimeout:
          type: string
          description: Configurable length of time a Virtual Machine being deleted will have to potentially approve the Terminate Scheduled Event before the event is auto approved (timed out). The configuration must be specified in ISO 8601 format, the default value is 5 minutes (PT5M).
        enable:
          type: boolean
          description: Specifies whether the Terminate Scheduled event is enabled or disabled.
    OSImageNotificationProfile:
      type: object
      description: OSImageNotificationProfile.
      properties:
        notBeforeTimeout:
          type: string
          description: Length of time a Virtual Machine being reimaged or having its OS upgraded will have to potentially approve the OS Image Scheduled Event before the event is auto approved (timed out). The configuration is specified in ISO 8601 format, and the value must be 15 minutes (PT15M).
        enable:
          type: boolean
          description: Specifies whether the OS Image Scheduled event is enabled or disabled.
    CapacityReservationProfile:
      type: object
      description: The parameters of a capacity reservation Profile.
      properties:
        capacityReservationGroup:
          $ref: "#/components/schemas/SubResource"
          description: Specifies the capacity reservation group resource id that should be used for allocating the virtual machine or scaleset vm instances provided enough capacity has been reserved. Please refer to `https://aka.ms/CapacityReservation `_ for more details.
    ApplicationProfile:
      type: object
      description: Contains the list of gallery applications that should be made available to the VM/VMSS.
      properties:
        galleryApplications:
          type: array
          items:
            $ref: "#/components/schemas/VMGalleryApplication"
          description: Specifies the gallery applications that should be made available to the VM/VMSS.
    VMGalleryApplication:
      type: object
      description: Specifies the required information to reference a compute gallery application version.
      properties:
        tags:
          type: string
          description: Optional, Specifies a passthrough value for more generic context.
        order:
          type: integer
          description: Optional, Specifies the order in which the packages have to be installed.
        packageReferenceId:
          type: string
          description: Specifies the GalleryApplicationVersion resource id on the form of /subscriptions/{SubscriptionId}/resourceGroups/{ResourceGroupName}/providers/Microsoft.Compute/galleries/{galleryName}/applications/{application}/versions/{version}. Required.
        configurationReference:
          type: string
          description: Optional, Specifies the uri to an azure blob that will replace the default configuration for the package if provided.
        treatFailureAsDeploymentFailure:
          type: boolean
          description: Optional, If true, any failure for any operation in the VmApplication will fail the deployment.
        enableAutomaticUpgrade:
          type: boolean
          description: If set to true, when a new Gallery Application version is available in PIR/SIG, it will be automatically updated for the VM/VMSS.
      required:
        - packageReferenceId
    VirtualMachineScaleSetHardwareProfile:
      type: object
      description: Specifies the hardware settings for the virtual machine scale set.
      properties:
        vmSizeProperties:
          $ref: "#/components/schemas/VMSizeProperties"
          description: "Specifies the properties for customizing the size of the virtual machine. Minimum api-version: 2021-11-01. Please follow the instructions in `VM Customization `_ for more details."
    ServiceArtifactReference:
      type: object
      description: "Specifies the service artifact reference id used to set same image version for all virtual machines in the scale set when using 'latest' image version. Minimum api-version: 2022-11-01."
      properties:
        id:
          type: string
          description: The service artifact reference id in the form of /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Compute/galleries/{galleryName}/serviceArtifacts/{serviceArtifactName}/vmArtifactsProfiles/{vmArtifactsProfilesName}.
    SecurityPostureReference:
      type: object
      description: "Specifies the security posture to be used in the scale set. Minimum api-version: 2023-03-01."
      properties:
        id:
          type: string
          description: The security posture reference id in the form of /CommunityGalleries/{communityGalleryName}/securityPostures/{securityPostureName}/versions/{major.minor.patch}|latest. Required.
        excludeExtensions:
          type: array
          items:
            type: string
          description: The list of virtual machine extension names to exclude when applying the security posture.
        isOverridable:
          type: boolean
          description: Whether the security posture can be overridden by the user.
      required:
        - id
    ScaleInPolicy:
      type: object
      description: Describes a scale-in policy for a virtual machine scale set.
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineScaleSetScaleInRules"
          description: "The rules to be followed when scaling-in a virtual machine scale set. Possible values are: **Default** When a virtual machine scale set is scaled in, the scale set will first be balanced across zones if it is a zonal scale set. Then, it will be balanced across Fault Domains as far as possible. Within each Fault Domain, the virtual machines chosen for removal will be the newest ones that are not protected from scale-in. **OldestVM** When a virtual machine scale set is being scaled-in, the oldest virtual machines that are not protected from scale-in will be chosen for removal. For zonal virtual machine scale sets, the scale set will first be balanced across zones. Within each zone, the oldest virtual machines that are not protected will be chosen for removal. **NewestVM** When a virtual machine scale set is being scaled-in, the newest virtual machines that are not protected from scale-in will be chosen for removal. For zonal virtual machine scale sets, the scale set will first be balanced across zones. Within each zone, the newest virtual machines that are not protected will be chosen for removal. ."
        forceDeletion:
          type: boolean
          description: This property allows you to specify if virtual machines chosen for removal have to be force deleted when a virtual machine scale set is being scaled-in.(Feature in Preview).
        prioritizeUnhealthyVMs:
          type: boolean
          description: This property allows you to prioritize the deletion of unhealthy and inactive VMs when a virtual machine scale set is being scaled-in.(Feature in Preview).
    VirtualMachineScaleSetScaleInRules:
      type: string
      enum:
        - Default
        - OldestVM
        - NewestVM
    OrchestrationMode:
      type: string
      enum:
        - Uniform
        - Flexible
    SpotRestorePolicy:
      type: object
      description: Specifies the Spot-Try-Restore properties for the virtual machine scale set. With this property customer can enable or disable automatic restore of the evicted Spot VMSS VM instances opportunistically based on capacity availability and pricing constraint.
      properties:
        enabled:
          type: boolean
          description: Enables the Spot-Try-Restore feature where evicted VMSS SPOT instances will be tried to be restored opportunistically based on capacity availability and pricing constraints.
        restoreTimeout:
          type: string
          description: Timeout value expressed as an ISO 8601 time duration after which the platform will not try to restore the VMSS SPOT instances.
    PriorityMixPolicy:
      type: object
      description: Specifies the target splits for Spot and Regular priority VMs within a scale set with flexible orchestration mode. With this property the customer is able to specify the base number of regular priority VMs created as the VMSS flex instance scales out and the split between Spot and Regular priority VMs after this base target has been reached.
      properties:
        baseRegularPriorityCount:
          type: integer
          description: The base number of regular priority VMs that will be created in this scale set as it scales out.
        regularPriorityPercentageAboveBase:
          type: integer
          description: The percentage of VM instances, after the base regular priority count has been reached, that are expected to use regular priority.
    ResiliencyPolicy:
      type: object
      description: Describes an resiliency policy - AutomaticZoneRebalancingPolicy, ResilientVMCreationPolicy, ResilientVMDeletionPolicy and OperationRecoverySettings (version > 2025-11-01).
      properties:
        resilientVMCreationPolicy:
          $ref: "#/components/schemas/ResilientVMCreationPolicy"
          description: The configuration parameters used while performing resilient VM creation.
        resilientVMDeletionPolicy:
          $ref: "#/components/schemas/ResilientVMDeletionPolicy"
          description: The configuration parameters used while performing resilient VM deletion.
        automaticZoneRebalancingPolicy:
          $ref: "#/components/schemas/AutomaticZoneRebalancingPolicy"
          description: The configuration parameters used while performing automatic AZ balancing.
        zoneAllocationPolicy:
          $ref: "#/components/schemas/ZoneAllocationPolicy"
          description: The configuration parameters used while performing zone allocation.
        operationRecoverySettings:
          $ref: "#/components/schemas/OperationRecoverySettings"
          description: The configuration parameters used for operation recovery settings.
    ResilientVMCreationPolicy:
      type: object
      description: The configuration parameters used while performing resilient VM creation.
      properties:
        enabled:
          type: boolean
          description: Specifies whether resilient VM creation should be enabled on the virtual machine scale set. The default value is false.
    ResilientVMDeletionPolicy:
      type: object
      description: The configuration parameters used while performing resilient VM deletion.
      properties:
        enabled:
          type: boolean
          description: Specifies whether resilient VM deletion should be enabled on the virtual machine scale set. The default value is false.
    AutomaticZoneRebalancingPolicy:
      type: object
      description: The configuration parameters used while performing automatic AZ balancing.
      properties:
        enabled:
          type: boolean
          description: Specifies whether Automatic AZ Balancing should be enabled on the virtual machine scale set. The default value is false.
        rebalanceStrategy:
          $ref: "#/components/schemas/RebalanceStrategy"
          description: Type of rebalance strategy that will be used for rebalancing virtual machines in the scale set across availability zones. Default and only supported value for now is Recreate. "Recreate"
        rebalanceBehavior:
          $ref: "#/components/schemas/RebalanceBehavior"
          description: Type of rebalance behavior that will be used for recreating virtual machines in the scale set across availability zones. Default and only supported value for now is CreateBeforeDelete. "CreateBeforeDelete"
    RebalanceStrategy:
      type: string
      enum:
        - Recreate
    RebalanceBehavior:
      type: string
      enum:
        - CreateBeforeDelete
    ZoneAllocationPolicy:
      type: object
      description: The configuration parameters for zone allocation of a virtual machine scale set.
      properties:
        maxZoneCount:
          type: integer
          description: The maximum number of availability zones to use if the ZonePlacementPolicy is 'Auto'. If not specified, all availability zones will be used.
        maxInstancePercentPerZonePolicy:
          $ref: "#/components/schemas/MaxInstancePercentPerZonePolicy"
          description: The configuration parameters used to limit the number of virtual machines per availability zone in the virtual machine scale set.
    MaxInstancePercentPerZonePolicy:
      type: object
      description: The configuration parameters used to limit the number of virtual machines per availability zone in the virtual machine scale set.
      properties:
        enabled:
          type: boolean
          description: Specifies whether maxInstancePercentPerZonePolicy should be enabled on the virtual machine scale set.
        value:
          type: integer
          description: Limit on the number of instances in each zone as a percentage of the total capacity of the virtual machine scale set.
    OperationRecoverySettings:
      type: object
      description: The configuration parameters used for operation recovery settings on a virtual machine scale set.
      properties:
        restartRecoveryPolicy:
          $ref: "#/components/schemas/RestartRecoveryPolicy"
          description: The configuration parameters used for restart recovery policy.
        startRecoveryPolicy:
          $ref: "#/components/schemas/StartRecoveryPolicy"
          description: The configuration parameters used for start recovery policy.
        reimageRecoveryPolicy:
          $ref: "#/components/schemas/ReimageRecoveryPolicy"
          description: The configuration parameters used for reimage recovery policy.
    RestartRecoveryPolicy:
      type: object
      description: The configuration parameters used while performing restart recovery.
      properties:
        enabled:
          type: boolean
          description: Specifies whether restart recovery should be enabled. The default value is false.
    StartRecoveryPolicy:
      type: object
      description: The configuration parameters used while performing start recovery.
      properties:
        enabled:
          type: boolean
          description: Specifies whether start recovery should be enabled. The default value is false.
    ReimageRecoveryPolicy:
      type: object
      description: The configuration parameters used while performing reimage recovery.
      properties:
        enabled:
          type: boolean
          description: Specifies whether reimage recovery should be enabled. The default value is false.
    ZonalPlatformFaultDomainAlignMode:
      type: string
      enum:
        - Aligned
        - Unaligned
        - BestEffortAligned
    SkuProfile:
      type: object
      description: Specifies the sku profile for the virtual machine scale set. With this property the customer is able to specify a list of VM sizes and an allocation strategy.
      properties:
        vmSizes:
          type: array
          items:
            $ref: "#/components/schemas/SkuProfileVMSize"
          description: Specifies the VM sizes for the virtual machine scale set.
        allocationStrategy:
          $ref: "#/components/schemas/AllocationStrategy"
          description: 'Specifies the allocation strategy for the virtual machine scale set based on which the VMs will be allocated. Known values are: "LowestPrice", "CapacityOptimized", and "Prioritized".'
        automaticSkuMigrationPolicy:
          $ref: "#/components/schemas/AutomaticSkuMigrationPolicy"
          description: Specifies the policy that controls whether the platform may automatically migrate scale set instances to a different VM size from the SKU profile depending on platform demands. When omitted, automatic SKU migration is disabled.
    SkuProfileVMSize:
      type: object
      description: Specifies the VM Size.
      properties:
        name:
          type: string
          description: Specifies the name of the VM Size.
        rank:
          type: integer
          description: Specifies the rank (a.k.a priority) associated with the VM Size.
    AllocationStrategy:
      type: string
      enum:
        - LowestPrice
        - CapacityOptimized
        - Prioritized
    AutomaticSkuMigrationPolicy:
      type: object
      description: Specifies the configuration parameters used to control automatic SKU migration for the virtual machine scale set. When enabled, the platform may migrate instances to a different VM size from the SKU profile depending on platform demands.
      properties:
        enabled:
          type: boolean
          description: Specifies whether automatic SKU migration should be enabled on the virtual machine scale set. The default value is false.
    HighSpeedInterconnectPlacement:
      type: string
      enum:
        - None
        - Trunk
    LifecycleHooksProfile:
      type: object
      description: Specifies the lifecycle hooks profile for the virtual machine scale set.
      properties:
        lifecycleHooks:
          type: array
          items:
            $ref: "#/components/schemas/LifecycleHook"
          description: Specifies the lifecycle hooks configured for the virtual machine scale set.
    LifecycleHook:
      type: object
      description: Describes a lifecycle hook.
      properties:
        type:
          $ref: "#/components/schemas/VMScaleSetLifecycleHookEventType"
          description: 'Specifies the type of the lifecycle hook. Known values are: "UpgradeAutoOSScheduling" and "UpgradeAutoOSRollingBatchStarting".'
        waitDuration:
          type: string
          description: Specifies the time duration a virtual machine scale set lifecycle hook event sent to the customer waits for a response from the customer. It should be in ISO 8601 format.
        defaultAction:
          $ref: "#/components/schemas/LifecycleHookAction"
          description: 'Specifies the action that will be applied to a target resource in the virtual machine scale set lifecycle hook event if the platform does not receive a response from the customer for the target resource before waitUntil. Known values are: "Approve" and "Reject".'
    ExternalHealthPolicy:
      type: object
      description: Specifies the external health policy for the virtual machine scale set.
      properties:
        enabled:
          type: boolean
          description: If true, external health is enabled for this scale set. Cannot be set to true on instances where another health monitoring source is active (ApplicationHealth extension or SLB). Defaults to false.
        expiryDuration:
          type: string
          description: 'Defines how long the health status set by External Health API will last on the VM. If a signal is not received/updated within this time, the VM Health will be marked as "unknown". Uses the ISO 8601 format. Minimum: 5 minutes (PT5M), Maximum: 3 hours (PT3H).'
        gracePeriod:
          type: string
          description: "Grace period for newly created VMs or when the External Health policy is first applied on VMSS. Uses the ISO 8601 format. Minimum: 5 minutes (PT5M), Maximum: 4 hours (PT4H)."
    VirtualMachineScaleSetIdentity:
      type: object
      description: Identity for the virtual machine scale set.
      properties:
        principalId:
          type: string
          description: The principal id of virtual machine scale set identity. This property will only be provided for a system assigned identity.
        tenantId:
          type: string
          description: The tenant id associated with the virtual machine scale set. This property will only be provided for a system assigned identity.
        type:
          $ref: "#/components/schemas/ResourceIdentityType"
          description: "The type of identity used for the virtual machine scale set. The type 'SystemAssigned, UserAssigned' includes both an implicitly created identity and a set of user assigned identities. The type 'None' will remove any identities from the virtual machine scale set. Known values are: \"SystemAssigned\", \"UserAssigned\", \"SystemAssigned, UserAssigned\", and \"None\"."
        userAssignedIdentities:
          type: object
          properties: {}
          description: "The list of user identities associated with the virtual machine scale set. The user identity dictionary key references will be ARM resource ids in the form: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}'."
    VirtualMachineScaleSetFlattened:
