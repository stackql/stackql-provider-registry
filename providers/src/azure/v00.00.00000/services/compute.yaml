        timeCreated:
          type: string
          format: date-time
          description: "Specifies the time at which the Virtual Machine resource was created. Minimum api-version: 2021-11-01."
        resiliencyProfile:
          $ref: "#/components/schemas/ResiliencyProfile"
          description: Resiliency profile for the virtual machine.
