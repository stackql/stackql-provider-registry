      description: Describes the properties of a Virtual Machine run command.
      properties:
        source:
          $ref: "#/components/schemas/VirtualMachineRunCommandScriptSource"
          description: The source of the run command script.
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/RunCommandInputParameter"
          description: The parameters used by the script.
        protectedParameters:
          type: array
          items:
            $ref: "#/components/schemas/RunCommandInputParameter"
          description: The parameters used by the script.
        asyncExecution:
          type: boolean
          description: Optional. If set to true, provisioning will complete as soon as the script starts and will not wait for script to complete.
        runAsUser:
          type: string
          description: Specifies the user account on the VM when executing the run command.
        runAsPassword:
          type: string
          description: Specifies the user account password on the VM when executing the run command.
        timeoutInSeconds:
          type: integer
          description: The timeout in seconds to execute the run command.
        outputBlobUri:
          type: string
          description: Specifies the Azure storage blob where script output stream will be uploaded. Use a SAS URI with read, append, create, write access OR use managed identity to provide the VM access to the blob. Refer outputBlobManagedIdentity parameter.
        errorBlobUri:
          type: string
          description: Specifies the Azure storage blob where script error stream will be uploaded. Use a SAS URI with read, append, create, write access OR use managed identity to provide the VM access to the blob. Refer errorBlobManagedIdentity parameter.
        outputBlobManagedIdentity:
          $ref: "#/components/schemas/RunCommandManagedIdentity"
          description: User-assigned managed identity that has access to outputBlobUri storage blob. Use an empty object in case of system-assigned identity. Make sure managed identity has been given access to blob's container with 'Storage Blob Data Contributor' role assignment. In case of user-assigned identity, make sure you add it under VM's identity. For more info on managed identity and Run Command, refer `https://aka.ms/ManagedIdentity `_ and `https://aka.ms/RunCommandManaged `_.
        errorBlobManagedIdentity:
          $ref: "#/components/schemas/RunCommandManagedIdentity"
          description: User-assigned managed identity that has access to errorBlobUri storage blob. Use an empty object in case of system-assigned identity. Make sure managed identity has been given access to blob's container with 'Storage Blob Data Contributor' role assignment. In case of user-assigned identity, make sure you add it under VM's identity. For more info on managed identity and Run Command, refer `https://aka.ms/ManagedIdentity `_ and `https://aka.ms/RunCommandManaged `_.
        provisioningState:
          type: string
          description: "The provisioning state, which only appears in the response. If treatFailureAsDeploymentFailure set to true, any failure in the script will fail the deployment and ProvisioningState will be marked as Failed. If treatFailureAsDeploymentFailure set to false, ProvisioningState would only reflect whether the run command was run or not by the extensions platform, it would not indicate whether script failed in case of script failures. See instance view of run command in case of script failures to see executionMessage, output, error: `https://aka.ms/runcommandmanaged#get-execution-status-and-results `_."
        instanceView:
          $ref: "#/components/schemas/VirtualMachineRunCommandInstanceView"
          description: The virtual machine run command instance view.
        treatFailureAsDeploymentFailure:
          type: boolean
          description: "Optional. If set to true, any failure in the script will fail the deployment and ProvisioningState will be marked as Failed. If set to false, ProvisioningState would only reflect whether the run command was run or not by the extensions platform, it would not indicate whether script failed in case of script failures. See instance view of run command in case of script failures to see executionMessage, output, error: `https://aka.ms/runcommandmanaged#get-execution-status-and-results `_."
    VirtualMachineRunCommandScriptSource:
      type: object
      description: "Describes the script sources for run command. Use only one of these script sources: script, scriptUri, commandId, galleryScriptReferenceId."
      properties:
        script:
          type: string
          description: Specifies the script content to be executed on the VM.
        scriptUri:
          type: string
          description: Specifies the script download location. It can be either SAS URI of an Azure storage blob with read access or public URI.
        commandId:
          type: string
          description: Specifies a commandId of predefined built-in script. Command IDs available for Linux are listed at `https://aka.ms/RunCommandManagedLinux#available-commands `_, Windows at `https://aka.ms/RunCommandManagedWindows#available-commands `_.
        scriptUriManagedIdentity:
          $ref: "#/components/schemas/RunCommandManagedIdentity"
          description: User-assigned managed identity that has access to scriptUri in case of Azure storage blob. Use an empty object in case of system-assigned identity. Make sure the Azure storage blob exists, and managed identity has been given access to blob's container with 'Storage Blob Data Reader' role assignment. In case of user-assigned identity, make sure you add it under VM's identity. For more info on managed identity and Run Command, refer `https://aka.ms/ManagedIdentity `_ and `https://aka.ms/RunCommandManaged `_.
        scriptShell:
          $ref: "#/components/schemas/ScriptShellTypes"
          description: 'Optional. Specify which shell to use for running the script. These values must match those expected by the extension. Currently supported only for Windows VMs, script uses Powershell 7 when specified. Powershell 7 must be already installed on the machine to use Powershell7 parameter value. Known values are: "Default" and "Powershell7".'
        galleryScriptReferenceId:
          type: string
          description: The resource ID of a Gallery Script version that needs to be executed. Example ID looks like /subscriptions/{subId}/resourceGroups/{rgName}/providers/Microsoft.Compute/galleries/{galleryName}/scripts/{scriptName}/versions/{version}.
    RunCommandManagedIdentity:
      type: object
      description: Contains clientId or objectId (use only one, not both) of a user-assigned managed identity that has access to storage blob used in Run Command. Use an empty RunCommandManagedIdentity object in case of system-assigned identity. Make sure the Azure storage blob exists in case of scriptUri, and managed identity has been given access to blob's container with 'Storage Blob Data Reader' role assignment with scriptUri blob and 'Storage Blob Data Contributor' for Append blobs(outputBlobUri, errorBlobUri). In case of user assigned identity, make sure you add it under VM's identity. For more info on managed identity and Run Command, refer `https://aka.ms/ManagedIdentity `_ and `https://aka.ms/RunCommandManaged `_.
      properties:
        clientId:
          type: string
          description: Client Id (GUID value) of the user-assigned managed identity. ObjectId should not be used if this is provided.
        objectId:
          type: string
          description: Object Id (GUID value) of the user-assigned managed identity. ClientId should not be used if this is provided.
    ScriptShellTypes:
      type: string
      enum:
        - Default
        - Powershell7
    RunCommandInputParameter:
      type: object
      description: Describes the properties of a run command parameter.
      properties:
        name:
          type: string
          description: The run command parameter name. Required.
        value:
          type: string
          description: The run command parameter value. Required.
      required:
