      type: object
      description: Describes the properties of a VM size.
      properties:
        name:
          type: string
          description: The name of the virtual machine size.
        numberOfCores:
          type: integer
          description: The number of cores supported by the virtual machine size. For Constrained vCPU capable VM sizes, this number represents the total vCPUs of quota that the VM uses. For accurate vCPU count, please refer to `https://docs.microsoft.com/azure/virtual-machines/constrained-vcpu `_ or `https://docs.microsoft.com/rest/api/compute/resourceskus/list `_.
