openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Compute Bulk Actions
  description: Bulk operations across compute resources (Microsoft.ComputeBulkActions).
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-02-01-preview-stackql-generated
  x-serviceAlias: compute_bulk_actions
  x-sdkPackage: azure-mgmt-computebulkactions
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    LaunchBulkInstancesOperationProperties:
      type: object
      description: Details of the LaunchBulkInstancesOperation.
      properties:
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'The status of the last operation. Known values are: "Creating", "Succeeded", "Failed", "Deleting", and "Canceled".'
        capacity:
          type: integer
          description: Total capacity to achieve. It can be in terms of VMs or vCPUs. Required.
        capacityType:
          $ref: "#/components/schemas/CapacityType"
          description: 'Specifies capacity type for launching instances. It can be in terms of VMs or vCPUs. Known values are: "VM" and "VCpu".'
        priorityProfile:
          $ref: "#/components/schemas/PriorityProfile"
          description: Configuration Options for Regular or Spot instances in LaunchBulkInstancesOperation. Required.
        vmSizesProfile:
          type: array
          items:
            $ref: "#/components/schemas/VmSizeProfile"
          description: List of VM sizes supported for LaunchBulkInstancesOperation.
        vmAttributes:
          $ref: "#/components/schemas/VMAttributes"
          description: Attributes to launch instances.
        computeProfile:
          $ref: "#/components/schemas/ComputeProfile"
          description: Compute Profile to configure the Virtual Machines. Required.
        zoneAllocationPolicy:
          $ref: "#/components/schemas/ZoneAllocationPolicy"
          description: Zone Allocation Policy for launching instances.
        retryPolicy:
          $ref: "#/components/schemas/RetryPolicy"
          description: Retry policy the user can pass.
      required:
        - capacity
        - priorityProfile
        - computeProfile
    ProvisioningState:
      type: string
      enum:
        - Creating
        - Succeeded
        - Failed
        - Deleting
        - Canceled
    CapacityType:
      type: string
      enum:
        - VM
        - VCpu
    PriorityProfile:
      type: object
      description: Contains properties that are applicable to both Spot and Regular.
      properties:
        type:
          $ref: "#/components/schemas/VirtualMachineType"
          description: 'Specifies the type of Virtual Machine. Known values are: "Regular" and "Spot".'
        maxPricePerVM:
          type: number
          description: Price per hour of each Spot VM will never exceed this.
        evictionPolicy:
          $ref: "#/components/schemas/EvictionPolicy"
          description: 'Eviction Policy to follow when evicting Spot VMs. Known values are: "Delete" and "Deallocate".'
        allocationStrategy:
          $ref: "#/components/schemas/AllocationStrategy"
          description: 'Allocation strategy to follow when determining the VM sizes distribution. Known values are: "LowestPrice", "CapacityOptimized", and "Prioritized".'
    VirtualMachineType:
      type: string
      enum:
        - Regular
        - Spot
    EvictionPolicy:
      type: string
      enum:
        - Delete
        - Deallocate
    AllocationStrategy:
      type: string
      enum:
        - LowestPrice
        - CapacityOptimized
        - Prioritized
    VmSizeProfile:
      type: object
      description: Specifications about a VM Size. This will also contain the corresponding rank and weight in future.
      properties:
        name:
          type: string
          description: The Sku name (e.g. 'Standard_DS1_v2'). Required.
        rank:
          type: integer
          description: The rank of the VM size. This is used with 'AllocationStrategy.Prioritized' The lower the number, the higher the priority. Starting with 0.
      required:
        - name
    VMAttributes:
      type: object
      description: VMAttributes that will be used to filter VMSizes which will be used to launch instances.
      properties:
        vCpuCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of vCpuCount specified from Min to Max. Must be specified if VMAttributes are specified, either Min or Max is required if specified. Required.
        memoryInGiB:
          $ref: "#/components/schemas/VMAttributeMinMaxDouble"
          description: The range of memory specified from Min to Max. Must be specified if VMAttributes are specified, either Min or Max is required if specified. Required.
        architectureTypes:
          type: array
          items:
            $ref: "#/components/schemas/ArchitectureType"
          description: The VM architecture types specified as a list. Must be specified if VMAttributes are specified. Must be compatible with image used. Required.
        memoryInGiBPerVCpu:
          $ref: "#/components/schemas/VMAttributeMinMaxDouble"
          description: The range of memory in GiB per vCPU specified from min to max. Optional parameter. Either Min or Max is required if specified.
        localStorageSupport:
          $ref: "#/components/schemas/VMAttributeSupport"
          description: 'Specifies whether the VMSize supporting local storage should be used to launch instances or not. Included - Default if not specified as most Azure VMs support local storage. Known values are: "Excluded", "Included", and "Required".'
        localStorageInGiB:
          $ref: "#/components/schemas/VMAttributeMinMaxDouble"
          description: LocalStorageSupport should be set to "Included" or "Required" to use this VMAttribute. If localStorageSupport is "Excluded", this VMAttribute can not be used.
        localStorageDiskTypes:
          type: array
          items:
            $ref: "#/components/schemas/LocalStorageDiskType"
          description: The local storage disk types specified as a list. LocalStorageSupport should be set to "Included" or "Required" to use this VMAttribute. If localStorageSupport is "Excluded", this VMAttribute can not be used.
        dataDiskCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of data disk count specified from Min to Max. Optional parameter. Either Min or Max is required if specified.
        networkInterfaceCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of network interface count specified from Min to Max. Optional parameter. Either Min or Max is required if specified.
        networkBandwidthInMbps:
          $ref: "#/components/schemas/VMAttributeMinMaxDouble"
          description: The range of network bandwidth in Mbps specified from Min to Max. Optional parameter. Either Min or Max is required if specified.
        rdmaSupport:
          $ref: "#/components/schemas/VMAttributeSupport"
          description: 'Specifies whether the VMSize supporting RDMA (Remote Direct Memory Access) should be used to build launch instances or not. Known values are: "Excluded", "Included", and "Required".'
        rdmaNetworkInterfaceCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of RDMA (Remote Direct Memory Access) network interface count specified from Min to Max. Optional parameter. Either Min or Max is required if specified. rdmaSupport should be set to "Included" or "Required" to use this VMAttribute. If rdmaSupport is "Excluded", this VMAttribute can not be used.
        acceleratorSupport:
          $ref: "#/components/schemas/VMAttributeSupport"
          description: 'Specifies whether the VMSize supporting accelerator should be used to launch instances or not. acceleratorSupport should be set to "Included" or "Required" to use this VMAttribute. If acceleratorSupport is "Excluded", this VMAttribute can not be used. Known values are: "Excluded", "Included", and "Required".'
        acceleratorManufacturers:
          type: array
          items:
            $ref: "#/components/schemas/AcceleratorManufacturer"
          description: The accelerator manufacturers specified as a list. acceleratorSupport should be set to "Included" or "Required" to use this VMAttribute. If acceleratorSupport is "Excluded", this VMAttribute can not be used.
        acceleratorTypes:
          type: array
          items:
            $ref: "#/components/schemas/AcceleratorType"
          description: The accelerator types specified as a list. acceleratorSupport should be set to "Included" or "Required" to use this VMAttribute. If acceleratorSupport is "Excluded", this VMAttribute can not be used.
        acceleratorCount:
          $ref: "#/components/schemas/VMAttributeMinMaxInteger"
          description: The range of accelerator count specified from min to max. Optional parameter. Either Min or Max is required if specified. acceleratorSupport should be set to "Included" or "Required" to use this VMAttribute. If acceleratorSupport is "Excluded", this VMAttribute can not be used.
        vmCategories:
          type: array
          items:
            $ref: "#/components/schemas/VMCategory"
          description: The VM category specified as a list. Optional parameter.
        cpuManufacturers:
          type: array
          items:
            $ref: "#/components/schemas/CpuManufacturer"
          description: The VM CPU manufacturers specified as a list. Optional parameter.
        hyperVGenerations:
          type: array
          items:
            $ref: "#/components/schemas/HyperVGeneration"
          description: The hyperV generations specified as a list. Optional parameter.
        burstableSupport:
          $ref: "#/components/schemas/VMAttributeSupport"
          description: 'Specifies whether the VMSize supporting burstable capability should be used to launch instances or not. Known values are: "Excluded", "Included", and "Required".'
        allowedVMSizes:
          type: array
          items:
            type: string
          description: Specifies which VMSizes should be allowed while filtering on VMAttributes. Cannot be specified together with excludedVMSizes. Maximum of 10 VM sizes allowed. Optional parameter.
        excludedVMSizes:
          type: array
          items:
            type: string
          description: Specifies which VMSizes should be excluded while filtering on VMAttributes. Cannot be specified together with allowedVMSizes. Maximum of 10 VM sizes allowed. Optional parameter.
      required:
        - vCpuCount
        - memoryInGiB
        - architectureTypes
    VMAttributeMinMaxInteger:
      type: object
      description: While retrieving VMSizes from CRS, Min = 0 (uint.MinValue) if not specified, Max = 4294967295 (uint.MaxValue) if not specified. This allows to filter VMAttributes on all available VMSizes.
      properties:
        min:
          type: integer
          description: Min VMSize from CRS, Min = 0 (uint.MinValue) if not specified.
        max:
          type: integer
          description: Max VMSize from CRS, Max = 4294967295 (uint.MaxValue) if not specified.
    VMAttributeMinMaxDouble:
      type: object
      description: VMAttributes using double values.
      properties:
        min:
          type: number
          description: Minimum value. If not specified, no minimum filter is applied.
        max:
          type: number
          description: Maximum value. Must be greater than zero. Double.MaxValue(1.7976931348623157E+308).
    ArchitectureType:
      type: string
      enum:
        - ARM64
        - X64
    VMAttributeSupport:
      type: string
      enum:
        - Excluded
        - Included
        - Required
    LocalStorageDiskType:
      type: string
      enum:
        - HDD
        - SSD
    AcceleratorManufacturer:
      type: string
      enum:
        - AMD
        - Nvidia
        - Xilinx
    AcceleratorType:
      type: string
      enum:
        - GPU
        - FPGA
    VMCategory:
      type: string
      enum:
        - GeneralPurpose
        - ComputeOptimized
        - MemoryOptimized
        - StorageOptimized
        - GpuAccelerated
        - FpgaAccelerated
        - HighPerformanceCompute
    CpuManufacturer:
      type: string
      enum:
        - Intel
        - AMD
        - Microsoft
        - Ampere
    HyperVGeneration:
      type: string
      enum:
        - Gen1
        - Gen2
    ComputeProfile:
      type: object
      description: Compute Profile to configure the Virtual Machines.
      properties:
        virtualMachineProfile:
          $ref: "#/components/schemas/VirtualMachineProfile"
          description: Base Virtual Machine Profile Properties to be specified according to "specification/compute/resource-manager/Microsoft.Compute/ComputeRP/stable/{computeApiVersion}/virtualMachine.json#/definitions/VirtualMachineProperties". Required.
        extensions:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineExtension"
          description: Virtual Machine Extensions Array to be specified according to "specification/compute/resource-manager/Microsoft.Compute/ComputeRP/stable/{computeApiVersion}/virtualMachine.json#/definitions/VirtualMachineExtension".
        computeApiVersion:
          type: string
          description: Specifies the Microsoft.Compute API version to use when creating underlying Virtual Machines. The default value will be the latest supported computeApiVersion by LaunchBulkInstancesOperation.
      required:
        - virtualMachineProfile
    VirtualMachineProfile:
      type: object
      description: Describes the properties of a Virtual Machine.
      properties:
        scheduledEventsPolicy:
          $ref: "#/components/schemas/ScheduledEventsPolicy"
          description: Specifies Redeploy, Reboot and ScheduledEventsAdditionalPublishingTargets Scheduled Event related configurations for the virtual machine.
        storageProfile:
          $ref: "#/components/schemas/StorageProfile"
          description: Specifies the storage settings for the virtual machine disks.
        additionalCapabilities:
          $ref: "#/components/schemas/AdditionalCapabilities"
          description: Specifies additional capabilities enabled or disabled on the virtual machine.
        osProfile:
          $ref: "#/components/schemas/OSProfile"
          description: Specifies the operating system settings used while creating the virtual machine. Some of the settings cannot be changed once VM is provisioned.
        networkProfile:
          $ref: "#/components/schemas/NetworkProfile"
          description: Specifies the network interfaces of the virtual machine.
        securityProfile:
          $ref: "#/components/schemas/SecurityProfile"
          description: Specifies the Security related profile settings for the virtual machine.
        diagnosticsProfile:
          $ref: "#/components/schemas/DiagnosticsProfile"
          description: "Specifies the boot diagnostic settings state. Minimum compute api-version: 2015-06-15."
        licenseType:
          type: string
          description: "Specifies that the image or disk that is being used was licensed on-premises. Possible values for Windows Server operating system are: Windows_Client Windows_Server Possible values for Linux Server operating system are: RHEL_BYOS (for RHEL) SLES_BYOS (for SUSE) For more information, see `Azure Hybrid Use Benefit for Windows Server `_ `Azure Hybrid Use Benefit for Linux Server `_ Minimum api-version: 2015-06-15."
        extensionsTimeBudget:
          type: string
          description: "Specifies the time alloted for all extensions to start. The time duration should be between 15 minutes and 120 minutes (inclusive) and should be specified in ISO 8601 format. The default value is 90 minutes (PT1H30M). Minimum compute api-version: 2020-06-01."
        scheduledEventsProfile:
          $ref: "#/components/schemas/ScheduledEventsProfile"
          description: Specifies Scheduled Event related configurations.
        userData:
          type: string
          description: "UserData for the VM, which must be base-64 encoded. Customer should not pass any secrets in here. Minimum compute api-version: 2021-03-01."
        capacityReservation:
          $ref: "#/components/schemas/CapacityReservationProfile"
          description: "Specifies information about the capacity reservation that is used to allocate virtual machine. Minimum compute api-version: 2021-04-01."
        applicationProfile:
          $ref: "#/components/schemas/ApplicationProfile"
          description: Specifies the gallery applications that should be made available to the VM.
    ScheduledEventsPolicy:
      type: object
      description: Specifies Redeploy, Reboot and ScheduledEventsAdditionalPublishingTargets Scheduled Event related configurations.
      properties:
        userInitiatedRedeploy:
          $ref: "#/components/schemas/UserInitiatedRedeploy"
          description: The configuration parameters used while creating userInitiatedRedeploy scheduled event setting creation.
        userInitiatedReboot:
          $ref: "#/components/schemas/UserInitiatedReboot"
          description: The configuration parameters used while creating userInitiatedReboot scheduled event setting creation.
        scheduledEventsAdditionalPublishingTargets:
          $ref: "#/components/schemas/ScheduledEventsAdditionalPublishingTargets"
          description: The configuration parameters used while publishing scheduledEventsAdditionalPublishingTargets.
        allInstancesDown:
          $ref: "#/components/schemas/AllInstancesDown"
          description: The configuration parameters used while creating AllInstancesDown scheduled event setting creation.
    UserInitiatedRedeploy:
      type: object
      description: Specifies Redeploy related Scheduled Event related configurations.
      properties:
        automaticallyApprove:
          type: boolean
          description: Specifies Redeploy Scheduled Event related configurations.
    UserInitiatedReboot:
      type: object
      description: Specifies Reboot related Scheduled Event related configurations.
      properties:
        automaticallyApprove:
          type: boolean
          description: Specifies Reboot Scheduled Event related configurations.
    ScheduledEventsAdditionalPublishingTargets:
      type: object
      description: Specifies additional publishing targets for scheduled events.
      properties:
        eventGridAndResourceGraph:
          $ref: "#/components/schemas/EventGridAndResourceGraph"
          description: The configuration parameters used while creating eventGridAndResourceGraph Scheduled Event setting.
    EventGridAndResourceGraph:
      type: object
      description: Specifies eventGridAndResourceGraph related Scheduled Event related configurations.
      properties:
        enable:
          type: boolean
          description: Specifies if event grid and resource graph is enabled for Scheduled event related configurations.
        scheduledEventsApiVersion:
          type: string
          description: Specifies the api-version to determine which Scheduled Events configuration schema version will be delivered.
    AllInstancesDown:
      type: object
      description: Specifies if Scheduled Events should be auto-approved when all instances are down.
      properties:
        automaticallyApprove:
          type: boolean
          description: Specifies if Scheduled Events should be auto-approved when all instances are down. Its default value is true.
    StorageProfile:
      type: object
      description: Specifies the storage settings for the virtual machine disks.
      properties:
        imageReference:
          $ref: "#/components/schemas/ImageReference"
          description: Specifies information about the image to use. You can specify information about platform images, marketplace images, or virtual machine images. This element is required when you want to use a platform image, marketplace image, or virtual machine image, but is not used in other creation operations.
        osDisk:
          $ref: "#/components/schemas/OSDisk"
          description: Specifies information about the operating system disk used by the virtual machine. For more information about disks, see `About disks and VHDs for Azure virtual machines `_.
        dataDisks:
          type: array
          items:
            $ref: "#/components/schemas/DataDisk"
          description: Specifies the parameters that are used to add a data disk to a virtual machine. For more information about disks, see `About disks and VHDs for Azure virtual machines `_.
        diskControllerType:
          $ref: "#/components/schemas/DiskControllerTypes"
          description: "Specifies the disk controller type configured for the VM. **Note:** This property will be set to the default disk controller type if not specified provided virtual machine is being created with 'hyperVGeneration' set to V2 based on the capabilities of the operating system disk and VM size from the the specified minimum api version. You need to deallocate the VM before updating its disk controller type unless you are updating the VM size in the VM configuration which implicitly deallocates and reallocates the VM. Minimum api-version: 2022-08-01. Known values are: \"SCSI\" and \"NVMe\"."
    ImageReference:
      type: object
      description: "Specifies information about the image to use. You can specify information about platform images, marketplace images, or virtual machine images. This element is required when you want to use a platform image, marketplace image, or virtual machine image, but is not used in other creation operations. NOTE: Image reference publisher and offer can only be set when you create the scale set."
      properties:
        id:
          type: string
          description: The ID of the sub-resource.
        publisher:
          type: string
          description: The image publisher.
        offer:
          type: string
          description: Specifies the offer of the platform image or marketplace image used to create the virtual machine.
        sku:
          type: string
          description: The image SKU.
        version:
          type: string
          description: Specifies the version of the platform image or marketplace image used to create the virtual machine. The allowed formats are Major.Minor.Build or 'latest'. Major, Minor, and Build are decimal numbers. Specify 'latest' to use the latest version of an image available at deploy time. Even if you use 'latest', the VM image will not automatically update after deploy time even if a new version becomes available. Please do not use field 'version' for gallery image deployment, gallery image should always use 'id' field for deployment, to use 'latest' version of gallery image, just set '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Compute/galleries/{galleryName}/images/{imageName}' in the 'id' field without version input.
        sharedGalleryImageId:
          type: string
          description: Specified the shared gallery image unique id for vm deployment. This can be fetched from shared gallery image GET call.
        communityGalleryImageId:
          type: string
          description: Specified the community gallery image unique id for vm deployment. This can be fetched from community gallery image GET call.
    OSDisk:
      type: object
      description: Specifies information about the operating system disk used by the virtual machine. For more information about disks, see `About disks and VHDs for Azure virtual machines `_.
      properties:
        osType:
          $ref: "#/components/schemas/OperatingSystemTypes"
          description: 'This property allows you to specify the type of the OS that is included in the disk if creating a VM from user-image or a specialized VHD. Possible values are: Windows, Linux. Known values are: "Windows" and "Linux".'
        encryptionSettings:
          $ref: "#/components/schemas/DiskEncryptionSettings"
          description: "Specifies the encryption settings for the OS Disk. Minimum compute api-version: 2015-06-15."
        name:
          type: string
          description: The disk name.
        vhd:
          $ref: "#/components/schemas/VirtualHardDisk"
          description: The virtual hard disk.
        image:
          $ref: "#/components/schemas/VirtualHardDisk"
          description: The source user image virtual hard disk. The virtual hard disk will be copied before being attached to the virtual machine. If SourceImage is provided, the destination virtual hard drive must not exist.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Specifies the caching requirements. Possible values are: None, ReadOnly, ReadWrite. The defaulting behavior is: None for Standard storage. ReadOnly for Premium storage. Known values are: "None", "ReadOnly", and "ReadWrite".'
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
        diffDiskSettings:
          $ref: "#/components/schemas/DiffDiskSettings"
          description: Specifies the ephemeral Disk Settings for the operating system disk used by the virtual machine.
        createOption:
          $ref: "#/components/schemas/DiskCreateOptionTypes"
          description: 'Specifies how the virtual machine disk should be created. Possible values are Attach, FromImage. If you are using a platform image, you should also use the imageReference element described above. If you are using a marketplace image, you should also use the plan element previously described. Required. Known values are: "FromImage", "Empty", "Attach", "Copy", and "Restore".'
        diskSizeGB:
          type: integer
          description: Specifies the size of an empty data disk in gigabytes. This element can be used to overwrite the size of the disk in a virtual machine image. The property 'diskSizeGB' is the number of bytes x 1024^3 for the disk and the value cannot be larger than 1023.
        managedDisk:
          $ref: "#/components/schemas/ManagedDiskParameters"
          description: The managed disk parameters.
        deleteOption:
          $ref: "#/components/schemas/DiskDeleteOptionTypes"
          description: 'Specifies whether OS Disk should be deleted or detached upon VM deletion. Possible values are: Delete, Detach. The default value is set to Detach. For an ephemeral OS Disk, the default value is set to Delete. The user cannot change the delete option for an ephemeral OS Disk. Known values are: "Delete" and "Detach".'
      required:
        - createOption
    OperatingSystemTypes:
      type: string
      enum:
        - Windows
        - Linux
    DiskEncryptionSettings:
      type: object
      description: Describes a Encryption Settings for a Disk.
      properties:
        diskEncryptionKey:
          $ref: "#/components/schemas/KeyVaultSecretReference"
          description: Specifies the location of the disk encryption key, which is a Key Vault Secret.
        keyEncryptionKey:
          $ref: "#/components/schemas/KeyVaultKeyReference"
          description: Specifies the location of the key encryption key in Key Vault.
        enabled:
          type: boolean
          description: Specifies whether disk encryption should be enabled on the virtual machine.
    KeyVaultSecretReference:
      type: object
      description: Describes a reference to Key Vault Secret.
      properties:
        secretUrl:
          type: string
          description: The URL referencing a secret in a Key Vault. Required.
        sourceVault:
          $ref: "#/components/schemas/SubResource"
          description: The relative URL of the Key Vault containing the secret. Required.
      required:
        - secretUrl
        - sourceVault
    SubResource:
      type: object
      description: Describes a reference to a sub-resource.
      properties:
        id:
          type: string
          description: The ID of the sub-resource.
    KeyVaultKeyReference:
      type: object
      description: Describes a reference to Key Vault Key.
      properties:
        keyUrl:
          type: string
          description: The URL referencing a key encryption key in Key Vault. Required.
        sourceVault:
          $ref: "#/components/schemas/SubResource"
          description: The relative URL of the Key Vault containing the key. Required.
      required:
        - keyUrl
        - sourceVault
    VirtualHardDisk:
      type: object
      description: Describes the uri of a disk.
      properties:
        uri:
          type: string
          description: Specifies the virtual hard disk's uri.
    CachingTypes:
      type: string
      enum:
        - None
        - ReadOnly
        - ReadWrite
    DiffDiskSettings:
      type: object
      description: "Describes the parameters of ephemeral disk settings that can be specified for operating system disk. Note: The ephemeral disk settings can only be specified for managed disk."
      properties:
        option:
          $ref: "#/components/schemas/DiffDiskOptions"
          description: Specifies the ephemeral disk settings for operating system disk. "Local"
        placement:
          $ref: "#/components/schemas/DiffDiskPlacement"
          description: 'Specifies the ephemeral disk placement for operating system disk. Possible values are: CacheDisk, ResourceDisk, NvmeDisk. The defaulting behavior is: CacheDisk if one is configured for the VM size otherwise ResourceDisk or NvmeDisk is used. Minimum api-version for NvmeDisk: 2024-03-01. Known values are: "CacheDisk", "ResourceDisk", and "NvmeDisk".'
    DiffDiskOptions:
      type: string
      enum:
        - Local
    DiffDiskPlacement:
      type: string
      enum:
        - CacheDisk
        - ResourceDisk
        - NvmeDisk
    DiskCreateOptionTypes:
      type: string
      enum:
        - FromImage
        - Empty
        - Attach
        - Copy
        - Restore
    ManagedDiskParameters:
      type: object
      description: The parameters of a managed disk.
      properties:
        id:
          type: string
          description: The ID of the sub-resource.
        storageAccountType:
          $ref: "#/components/schemas/StorageAccountTypes"
          description: 'Specifies the storage account type for the managed disk. NOTE: UltraSSD_LRS can only be used with data disks, it cannot be used with OS Disk. Known values are: "Standard_LRS", "Premium_LRS", "StandardSSD_LRS", "UltraSSD_LRS", "Premium_ZRS", "StandardSSD_ZRS", and "PremiumV2_LRS".'
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Specifies the customer managed disk encryption set resource id for the managed disk.
        securityProfile:
          $ref: "#/components/schemas/VMDiskSecurityProfile"
          description: Specifies the security profile for the managed disk.
    StorageAccountTypes:
      type: string
      enum:
        - Standard_LRS
        - Premium_LRS
        - StandardSSD_LRS
        - UltraSSD_LRS
        - Premium_ZRS
        - StandardSSD_ZRS
        - PremiumV2_LRS
    DiskEncryptionSetParameters:
      type: object
      description: Describes the parameter of customer managed disk encryption set resource id that can be specified for disk. **Note:** The disk encryption set resource id can only be specified for managed disk. Please refer `https://aka.ms/mdssewithcmkoverview `_ for more details.
      properties:
        id:
          type: string
          description: The ID of the sub-resource.
    VMDiskSecurityProfile:
      type: object
      description: Specifies the security profile settings for the managed disk. **Note:** It can only be set for Confidential VMs.
      properties:
        securityEncryptionType:
          $ref: "#/components/schemas/SecurityEncryptionTypes"
          description: 'Specifies the EncryptionType of the managed disk. It is set to DiskWithVMGuestState for encryption of the managed disk along with VMGuestState blob, VMGuestStateOnly for encryption of just the VMGuestState blob, and NonPersistedTPM for not persisting firmware state in the VMGuestState blob.. **Note:** It can be set for only Confidential VMs. Known values are: "VMGuestStateOnly", "DiskWithVMGuestState", and "NonPersistedTPM".'
        diskEncryptionSet:
          $ref: "#/components/schemas/DiskEncryptionSetParameters"
          description: Specifies the customer managed disk encryption set resource id for the managed disk that is used for Customer Managed Key encrypted ConfidentialVM OS Disk and VMGuest blob.
    SecurityEncryptionTypes:
      type: string
      enum:
        - VMGuestStateOnly
        - DiskWithVMGuestState
        - NonPersistedTPM
    DiskDeleteOptionTypes:
      type: string
      enum:
        - Delete
        - Detach
    DataDisk:
      type: object
      description: Describes a data disk.
      properties:
        lun:
          type: integer
          description: Specifies the logical unit number of the data disk. This value is used to identify data disks within the VM and therefore must be unique for each data disk attached to a VM. Required.
        name:
          type: string
          description: The disk name.
        vhd:
          $ref: "#/components/schemas/VirtualHardDisk"
          description: The virtual hard disk.
        image:
          $ref: "#/components/schemas/VirtualHardDisk"
          description: The source user image virtual hard disk. The virtual hard disk will be copied before being attached to the virtual machine. If SourceImage is provided, the destination virtual hard drive must not exist.
        caching:
          $ref: "#/components/schemas/CachingTypes"
          description: 'Specifies the caching requirements. Possible values are: None, ReadOnly, ReadWrite. The defaulting behavior is: None for Standard storage. ReadOnly for Premium storage. Known values are: "None", "ReadOnly", and "ReadWrite".'
        writeAcceleratorEnabled:
          type: boolean
          description: Specifies whether writeAccelerator should be enabled or disabled on the disk.
        createOption:
          $ref: "#/components/schemas/DiskCreateOptionTypes"
          description: 'Specifies how the virtual machine disk should be created. Possible values are Attach, FromImage, Empty, Copy, Restore. Required. Known values are: "FromImage", "Empty", "Attach", "Copy", and "Restore".'
        diskSizeGB:
          type: integer
          description: Specifies the size of an empty data disk in gigabytes. This element can be used to overwrite the size of the disk in a virtual machine image. The property 'diskSizeGB' is the number of bytes x 1024^3 for the disk and the value cannot be larger than 1023.
        managedDisk:
          $ref: "#/components/schemas/ManagedDiskParameters"
          description: The managed disk parameters.
        sourceResource:
          $ref: "#/components/schemas/ApiEntityReference"
          description: The source resource identifier. It can be a snapshot, or disk restore point from which to create a disk.
        toBeDetached:
          type: boolean
          description: Specifies whether the data disk is in process of detachment from the VirtualMachine/VirtualMachineScaleset.
        detachOption:
          $ref: "#/components/schemas/DiskDetachOptionTypes"
          description: "Specifies the detach behavior to be used while detaching a disk or which is already in the process of detachment from the virtual machine. Supported values: ForceDetach. This feature is still in preview. To force-detach a data disk update toBeDetached to 'true' along with setting detachOption: 'ForceDetach'. \"ForceDetach\""
        deleteOption:
          $ref: "#/components/schemas/DiskDeleteOptionTypes"
          description: 'Specifies whether data disk should be deleted or detached upon VM deletion. Possible values are: Delete, Detach. The default value is set to Detach. Known values are: "Delete" and "Detach".'
      required:
        - lun
        - createOption
    ApiEntityReference:
      type: object
      description: The API entity reference.
      properties:
        id:
          type: string
          description: The ARM resource id in the form of /subscriptions/{SubscriptionId}/resourceGroups/{ResourceGroupName}/...
    DiskDetachOptionTypes:
      type: string
      enum:
        - ForceDetach
    DiskControllerTypes:
      type: string
      enum:
        - SCSI
        - NVMe
    AdditionalCapabilities:
      type: object
      description: Enables or disables a capability on the virtual machine or virtual machine scale set.
      properties:
        ultraSSDEnabled:
          type: boolean
          description: The flag that enables or disables a capability to have one or more managed data disks with UltraSSD_LRS storage account type on the VM or VMSS. Managed disks with storage account type UltraSSD_LRS can be added to a virtual machine or virtual machine scale set only if this property is enabled.
        hibernationEnabled:
          type: boolean
          description: The flag that enables or disables hibernation capability on the VM.
    OSProfile:
      type: object
      description: Specifies the operating system settings for the virtual machine. Some of the settings cannot be changed once VM is provisioned.
      properties:
        computerName:
          type: string
          description: Specifies the host OS name of the virtual machine. This name cannot be updated after the VM is created. **Max-length (Windows):** 15 characters. **Max-length (Linux):** 64 characters. For naming conventions and restrictions see `Azure infrastructure services implementation guidelines `_.
        adminUsername:
          type: string
          description: Specifies the name of the administrator account. This property cannot be updated after the VM is created. **Windows-only restriction:** Cannot end in "." **Disallowed values:** "administrator", "admin", "user", "user1", "test", "user2", "test1", "user3", "admin1", "1", "123", "a", "actuser", "adm", "admin2", "aspnet", "backup", "console", "david", "guest", "john", "owner", "root", "server", "sql", "support", "support_388945a0", "sys", "test2", "test3", "user4", "user5". **Minimum-length (Linux):** 1 character **Max-length (Linux):** 64 characters **Max-length (Windows):** 20 characters.
        adminPassword:
          type: string
          description: Specifies the password of the administrator account. **Minimum-length (Windows):** 8 characters **Minimum-length (Linux):** 6 characters **Max-length (Windows):** 123 characters **Max-length (Linux):** 72 characters **Complexity requirements:** 3 out of 4 conditions below need to be fulfilled Has lower characters Has upper characters Has a digit Has a special character (Regex match [\W_]) **Disallowed values:** "abc@123", "P@$$w0rd", "P@ssw0rd", "P@ssword123", "Pa$$word", "pass@word1", "Password!", "Password1", "Password22", "iloveyou!" For resetting the password, see `How to reset the Remote Desktop service or its login password in a Windows VM `_ For resetting root password, see `Manage users, SSH, and check or repair disks on Azure Linux VMs using the VMAccess Extension `_.
        customData:
          type: string
          description: "Specifies a base-64 encoded string of custom data. The base-64 encoded string is decoded to a binary array that is saved as a file on the Virtual Machine. The maximum length of the binary array is 65535 bytes. **Note: Do not pass any secrets or passwords in customData property.** This property cannot be updated after the VM is created. The property 'customData' is passed to the VM to be saved as a file, for more information see `Custom Data on Azure VMs `_. For using cloud-init for your Linux VM, see `Using cloud-init to customize a Linux VM during creation `_."
        windowsConfiguration:
          $ref: "#/components/schemas/WindowsConfiguration"
          description: Specifies Windows operating system settings on the virtual machine.
        linuxConfiguration:
          $ref: "#/components/schemas/LinuxConfiguration"
          description: Specifies the Linux operating system settings on the virtual machine. For a list of supported Linux distributions, see `Linux on Azure-Endorsed Distributions `_.
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/VaultSecretGroup"
          description: Specifies set of certificates that should be installed onto the virtual machine. To install certificates on a virtual machine it is recommended to use the `Azure Key Vault virtual machine extension for Linux `_ or the `Azure Key Vault virtual machine extension for Windows `_.
        allowExtensionOperations:
          type: boolean
          description: Specifies whether extension operations should be allowed on the virtual machine. This may only be set to False when no extensions are present on the virtual machine.
        requireGuestProvisionSignal:
          type: boolean
          description: Optional property which must either be set to True or omitted.
    WindowsConfiguration:
      type: object
      description: Specifies Windows operating system settings on the virtual machine.
      properties:
        provisionVMAgent:
          type: boolean
          description: Indicates whether virtual machine agent should be provisioned on the virtual machine. When this property is not specified in the request body, it is set to true by default. This will ensure that VM Agent is installed on the VM so that extensions can be added to the VM later.
        enableAutomaticUpdates:
          type: boolean
          description: Indicates whether Automatic Updates is enabled for the Windows virtual machine. Default value is true. For virtual machine scale sets, this property can be updated and updates will take effect on OS reprovisioning.
        timeZone:
          type: string
          description: Specifies the time zone of the virtual machine. e.g. "Pacific Standard Time". Possible values can be `TimeZoneInfo.Id `_ value from time zones returned by `TimeZoneInfo.GetSystemTimeZones `_.
        additionalUnattendContent:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalUnattendContent"
          description: Specifies additional base-64 encoded XML formatted information that can be included in the Unattend.xml file, which is used by Windows Setup.
        patchSettings:
          $ref: "#/components/schemas/PatchSettings"
          description: "[Preview Feature] Specifies settings related to VM Guest Patching on Windows."
        winRM:
          $ref: "#/components/schemas/WinRMConfiguration"
          description: Specifies the Windows Remote Management listeners. This enables remote Windows PowerShell.
    AdditionalUnattendContent:
      type: object
      description: Specifies additional XML formatted information that can be included in the Unattend.xml file, which is used by Windows Setup. Contents are defined by setting name, component name, and the pass in which the content is applied.
      properties:
        passName:
          type: string
          description: The pass name. Currently, the only allowable value is OobeSystem. Default value is "OobeSystem".
        componentName:
          type: string
          description: The component name. Currently, the only allowable value is Microsoft-Windows-Shell-Setup. Default value is "Microsoft-Windows-Shell-Setup".
        settingName:
          $ref: "#/components/schemas/SettingNames"
          description: 'Specifies the name of the setting to which the content applies. Possible values are: FirstLogonCommands and AutoLogon. Known values are: "AutoLogon" and "FirstLogonCommands".'
        content:
          type: string
          description: Specifies the XML formatted content that is added to the unattend.xml file for the specified path and component. The XML must be less than 4KB and must include the root element for the setting or feature that is being inserted.
    SettingNames:
      type: string
      enum:
        - AutoLogon
        - FirstLogonCommands
    PatchSettings:
      type: object
      description: Specifies settings related to VM Guest Patching on Windows.
      properties:
        patchMode:
          $ref: "#/components/schemas/WindowsVMGuestPatchMode"
          description: 'Specifies the mode of VM Guest Patching to IaaS virtual machine or virtual machines associated to virtual machine scale set with OrchestrationMode as Flexible. Possible values are: **Manual** - You control the application of patches to a virtual machine. You do this by applying patches manually inside the VM. In this mode, automatic updates are disabled; the property WindowsConfiguration.enableAutomaticUpdates must be false **AutomaticByOS** - The virtual machine will automatically be updated by the OS. The property WindowsConfiguration.enableAutomaticUpdates must be true. **AutomaticByPlatform** - the virtual machine will automatically updated by the platform. The properties provisionVMAgent and WindowsConfiguration.enableAutomaticUpdates must be true. Known values are: "Manual", "AutomaticByOS", and "AutomaticByPlatform".'
        enableHotpatching:
          type: boolean
          description: Enables customers to patch their Azure VMs without requiring a reboot. For enableHotpatching, the 'provisionVMAgent' must be set to true and 'patchMode' must be set to 'AutomaticByPlatform'.
        assessmentMode:
          $ref: "#/components/schemas/WindowsPatchAssessmentMode"
          description: 'Specifies the mode of VM Guest patch assessment for the IaaS virtual machine. Possible values are: **ImageDefault** - You control the timing of patch assessments on a virtual machine. **AutomaticByPlatform** - The platform will trigger periodic patch assessments. The property provisionVMAgent must be true. Known values are: "ImageDefault" and "AutomaticByPlatform".'
        automaticByPlatformSettings:
          $ref: "#/components/schemas/WindowsVMGuestPatchAutomaticByPlatformSettings"
          description: Specifies additional settings for patch mode AutomaticByPlatform in VM Guest Patching on Windows.
    WindowsVMGuestPatchMode:
      type: string
      enum:
        - Manual
        - AutomaticByOS
        - AutomaticByPlatform
    WindowsPatchAssessmentMode:
      type: string
      enum:
        - ImageDefault
        - AutomaticByPlatform
    WindowsVMGuestPatchAutomaticByPlatformSettings:
      type: object
      description: Specifies additional settings to be applied when patch mode AutomaticByPlatform is selected in Windows patch settings.
      properties:
        rebootSetting:
          $ref: "#/components/schemas/WindowsVMGuestPatchAutomaticByPlatformRebootSetting"
          description: 'Specifies the reboot setting for all AutomaticByPlatform patch installation operations. Known values are: "Unknown", "IfRequired", "Never", and "Always".'
        bypassPlatformSafetyChecksOnUserSchedule:
          type: boolean
          description: Enables customer to schedule patching without accidental upgrades.
    WindowsVMGuestPatchAutomaticByPlatformRebootSetting:
      type: string
      enum:
        - Unknown
        - IfRequired
        - Never
        - Always
    WinRMConfiguration:
      type: object
      description: Describes Windows Remote Management configuration of the VM.
      properties:
        listeners:
          type: array
          items:
            $ref: "#/components/schemas/WinRMListener"
          description: The list of Windows Remote Management listeners.
    WinRMListener:
      type: object
      description: Describes Protocol and thumbprint of Windows Remote Management listener.
      properties:
        protocol:
          $ref: "#/components/schemas/ProtocolTypes"
          description: 'Specifies the protocol of WinRM listener. Possible values are: **http,** **https.**. Known values are: "Http" and "Https".'
        certificateUrl:
          type: string
          description: 'This is the URL of a certificate that has been uploaded to Key Vault as a secret. For adding a secret to the Key Vault, see `Add a key or secret to the key vault `_. In this case, your certificate needs to be the Base64 encoding of the following JSON Object which is encoded in UTF-8: { "data":"", "dataType":"pfx", "password":""} To install certificates on a virtual machine it is recommended to use the `Azure Key Vault virtual machine extension for Linux `_ or the `Azure Key Vault virtual machine extension for Windows `_.'
    ProtocolTypes:
      type: string
      enum:
        - Http
        - Https
    LinuxConfiguration:
      type: object
      description: Specifies the Linux operating system settings on the virtual machine. For a list of supported Linux distributions, see `Linux on Azure-Endorsed Distributions `_.
      properties:
        disablePasswordAuthentication:
          type: boolean
          description: Specifies whether password authentication should be disabled.
        ssh:
          $ref: "#/components/schemas/SshConfiguration"
          description: Specifies the ssh key configuration for a Linux OS.
        provisionVMAgent:
          type: boolean
          description: Indicates whether virtual machine agent should be provisioned on the virtual machine. When this property is not specified in the request body, default behavior is to set it to true. This will ensure that VM Agent is installed on the VM so that extensions can be added to the VM later.
        patchSettings:
          $ref: "#/components/schemas/LinuxPatchSettings"
          description: "[Preview Feature] Specifies settings related to VM Guest Patching on Linux."
        enableVMAgentPlatformUpdates:
          type: boolean
          description: Indicates whether VMAgent Platform Updates is enabled for the Linux virtual machine. Default value is false.
    SshConfiguration:
      type: object
      description: SSH configuration for Linux based VMs running on Azure.
      properties:
        publicKeys:
          type: array
          items:
            $ref: "#/components/schemas/SshPublicKey"
          description: The list of SSH public keys used to authenticate with linux based VMs.
    SshPublicKey:
      type: object
      description: Contains information about SSH certificate public key and the path on the Linux VM where the public key is placed.
      properties:
        path:
          type: string
          description: "Specifies the full path on the created VM where ssh public key is stored. If the file already exists, the specified key is appended to the file. Example: /home/user/.ssh/authorized_keys."
        keyData:
          type: string
          description: SSH public key certificate used to authenticate with the VM through ssh. The key needs to be at least 2048-bit and in ssh-rsa format. For creating ssh keys, see [Create SSH keys on Linux and Mac for Linux VMs in Azure]`https://docs.microsoft.com/azure/virtual-machines/linux/create-ssh-keys-detailed `_).
    LinuxPatchSettings:
      type: object
      description: Specifies settings related to VM Guest Patching on Linux.
      properties:
        patchMode:
          $ref: "#/components/schemas/LinuxVMGuestPatchMode"
          description: "Specifies the mode of VM Guest Patching to IaaS virtual machine or virtual machines associated to virtual machine scale set with OrchestrationMode as Flexible. Possible values are: **ImageDefault** - The virtual machine's default patching configuration is used. **AutomaticByPlatform** - The virtual machine will be automatically updated by the platform. The property provisionVMAgent must be true. Known values are: \"ImageDefault\" and \"AutomaticByPlatform\"."
        assessmentMode:
          $ref: "#/components/schemas/LinuxPatchAssessmentMode"
          description: 'Specifies the mode of VM Guest Patch Assessment for the IaaS virtual machine. Possible values are: **ImageDefault** - You control the timing of patch assessments on a virtual machine. **AutomaticByPlatform** - The platform will trigger periodic patch assessments. The property provisionVMAgent must be true. Known values are: "ImageDefault" and "AutomaticByPlatform".'
        automaticByPlatformSettings:
          $ref: "#/components/schemas/LinuxVMGuestPatchAutomaticByPlatformSettings"
          description: Specifies additional settings for patch mode AutomaticByPlatform in VM Guest Patching on Linux.
    LinuxVMGuestPatchMode:
      type: string
      enum:
        - ImageDefault
        - AutomaticByPlatform
    LinuxPatchAssessmentMode:
      type: string
      enum:
        - ImageDefault
        - AutomaticByPlatform
    LinuxVMGuestPatchAutomaticByPlatformSettings:
      type: object
      description: Specifies additional settings to be applied when patch mode AutomaticByPlatform is selected in Linux patch settings.
      properties:
        rebootSetting:
          $ref: "#/components/schemas/LinuxVMGuestPatchAutomaticByPlatformRebootSetting"
          description: 'Specifies the reboot setting for all AutomaticByPlatform patch installation operations. Known values are: "Unknown", "IfRequired", "Never", and "Always".'
        bypassPlatformSafetyChecksOnUserSchedule:
          type: boolean
          description: Enables customer to schedule patching without accidental upgrades.
    LinuxVMGuestPatchAutomaticByPlatformRebootSetting:
      type: string
      enum:
        - Unknown
        - IfRequired
        - Never
        - Always
    VaultSecretGroup:
      type: object
      description: Describes a set of certificates which are all in the same Key Vault.
      properties:
        sourceVault:
          $ref: "#/components/schemas/SubResource"
          description: The relative URL of the Key Vault containing all of the certificates in VaultCertificates.
        vaultCertificates:
          type: array
          items:
            $ref: "#/components/schemas/VaultCertificate"
          description: The list of key vault references in SourceVault which contain certificates.
    VaultCertificate:
      type: object
      description: Describes a single certificate reference in a Key Vault, and where the certificate should reside on the VM.
      properties:
        certificateUrl:
          type: string
          description: "This is the URL of a certificate that has been uploaded to Key Vault as a secret. For adding a secret to the Key Vault, see `Add a key or secret to the key vault `_. In this case, your certificate needs to be It is the Base64 encoding of the following JSON Object which is encoded in UTF-8: { 'data':'', 'dataType':'pfx', 'password':''} To install certificates on a virtual machine it is recommended to use the `Azure Key Vault virtual machine extension for Linux `_ or the `Azure Key Vault virtual machine extension for Windows `_."
        certificateStore:
          type: string
          description: For Windows VMs, specifies the certificate store on the Virtual Machine to which the certificate should be added. The specified certificate store is implicitly in the LocalMachine account. For Linux VMs, the certificate file is placed under the /var/lib/waagent directory, with the file name .crt for the X509 certificate file and .prv for private key. Both of these files are .pem formatted.
    NetworkProfile:
      type: object
      description: Specifies the network interfaces or the networking configuration of the virtual machine.
      properties:
        networkInterfaces:
          type: array
          items:
            $ref: "#/components/schemas/NetworkInterfaceReference"
          description: Specifies the list of resource Ids for the network interfaces associated with the virtual machine.
        networkApiVersion:
          $ref: "#/components/schemas/NetworkApiVersion"
          description: 'specifies the Microsoft.Network API version used when creating networking resources in the Network Interface Configurations. Known values are: "2020-11-01" and "2022-11-01".'
        networkInterfaceConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineNetworkInterfaceConfiguration"
          description: Specifies the networking configurations that will be used to create the virtual machine networking resources.
    NetworkInterfaceReference:
      type: object
      description: Describes a network interface reference.
      properties:
        id:
          type: string
          description: The ID of the sub-resource.
        properties:
          $ref: "#/components/schemas/NetworkInterfaceReferenceProperties"
          description: Describes a network interface reference properties.
    NetworkInterfaceReferenceProperties:
      type: object
      description: Describes a network interface reference properties.
      properties:
        primary:
          type: boolean
          description: Specifies the primary network interface in case the virtual machine has more than 1 network interface.
        deleteOption:
          $ref: "#/components/schemas/DeleteOptions"
          description: 'Specify what happens to the network interface when the VM is deleted. Known values are: "Delete" and "Detach".'
    DeleteOptions:
      type: string
      enum:
        - Delete
        - Detach
    NetworkApiVersion:
      type: string
      enum:
        - "2020-11-01"
        - "2022-11-01"
    VirtualMachineNetworkInterfaceConfiguration:
      type: object
      description: Describes a virtual machine network interface configurations.
      properties:
        name:
          type: string
          description: The network interface configuration name. Required.
        properties:
          $ref: "#/components/schemas/VirtualMachineNetworkInterfaceConfigurationProperties"
          description: Describes a virtual machine network profile's IP configuration.
        tags:
          type: object
          properties: {}
          description: Resource tags applied to the networkInterface address created by this NetworkInterfaceConfiguration.
      required:
        - name
    VirtualMachineNetworkInterfaceConfigurationProperties:
      type: object
      description: Describes a virtual machine network profile's IP configuration.
      properties:
        primary:
          type: boolean
          description: Specifies the primary network interface in case the virtual machine has more than 1 network interface.
        deleteOption:
          $ref: "#/components/schemas/DeleteOptions"
          description: 'Specify what happens to the network interface when the VM is deleted. Known values are: "Delete" and "Detach".'
        enableAcceleratedNetworking:
          type: boolean
          description: Specifies whether the network interface is accelerated networking-enabled.
        disableTcpStateTracking:
          type: boolean
          description: Specifies whether the network interface is disabled for tcp state tracking.
        enableFpga:
          type: boolean
          description: Specifies whether the network interface is FPGA networking-enabled.
        enableIPForwarding:
          type: boolean
          description: Whether IP forwarding enabled on this NIC.
        networkSecurityGroup:
          $ref: "#/components/schemas/SubResource"
          description: The network security group.
        dnsSettings:
          $ref: "#/components/schemas/VirtualMachineNetworkInterfaceDnsSettingsConfiguration"
          description: The dns settings to be applied on the network interfaces.
        ipConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineNetworkInterfaceIPConfiguration"
          description: Specifies the IP configurations of the network interface. Required.
        dscpConfiguration:
          $ref: "#/components/schemas/SubResource"
          description: The DSCP configuration for the network interface.
        auxiliaryMode:
          $ref: "#/components/schemas/NetworkInterfaceAuxiliaryMode"
          description: 'Specifies whether the Auxiliary mode is enabled for the Network Interface resource. Known values are: "None", "AcceleratedConnections", and "Floating".'
        auxiliarySku:
          $ref: "#/components/schemas/NetworkInterfaceAuxiliarySku"
          description: 'Specifies whether the Auxiliary sku is enabled for the Network Interface resource. Known values are: "None", "A1", "A2", "A4", and "A8".'
      required:
        - ipConfigurations
    VirtualMachineNetworkInterfaceDnsSettingsConfiguration:
      type: object
      description: Describes a virtual machines network configuration's DNS settings.
      properties:
        dnsServers:
          type: array
          items:
            type: string
          description: List of DNS servers IP addresses.
    VirtualMachineNetworkInterfaceIPConfiguration:
      type: object
      description: Describes a virtual machine network profile's IP configuration.
      properties:
        name:
          type: string
          description: The IP configuration name. Required.
        properties:
          $ref: "#/components/schemas/VirtualMachineNetworkInterfaceIPConfigurationProperties"
          description: Describes a virtual machine network interface IP configuration properties.
      required:
        - name
    VirtualMachineNetworkInterfaceIPConfigurationProperties:
      type: object
      description: Describes a virtual machine network interface IP configuration properties.
      properties:
        subnet:
          $ref: "#/components/schemas/SubResource"
          description: Specifies the identifier of the subnet.
        primary:
          type: boolean
          description: Specifies the primary network interface in case the virtual machine has more than 1 network interface.
        publicIPAddressConfiguration:
          $ref: "#/components/schemas/VirtualMachinePublicIPAddressConfiguration"
          description: The publicIPAddressConfiguration.
        privateIPAddressVersion:
          $ref: "#/components/schemas/IPVersions"
          description: "Available from Api-Version 2017-03-30 onwards, it represents whether the specific ipconfiguration is IPv4 or IPv6. Default is taken as IPv4. Possible values are: 'IPv4' and 'IPv6'. Known values are: \"IPv4\" and \"IPv6\"."
        applicationSecurityGroups:
          type: array
          items:
            $ref: "#/components/schemas/SubResource"
          description: Specifies an array of references to application security group.
        applicationGatewayBackendAddressPools:
          type: array
          items:
            $ref: "#/components/schemas/SubResource"
          description: Specifies an array of references to backend address pools of application gateways. A virtual machine can reference backend address pools of multiple application gateways. Multiple virtual machines cannot use the same application gateway.
        loadBalancerBackendAddressPools:
          type: array
          items:
            $ref: "#/components/schemas/SubResource"
          description: Specifies an array of references to backend address pools of load balancers. A virtual machine can reference backend address pools of one public and one internal load balancer. [Multiple virtual machines cannot use the same basic sku load balancer].
    VirtualMachinePublicIPAddressConfiguration:
      type: object
      description: Describes a virtual machines IP Configuration's PublicIPAddress configuration.
      properties:
        name:
          type: string
          description: The publicIP address configuration name. Required.
        properties:
          $ref: "#/components/schemas/VirtualMachinePublicIPAddressConfigurationProperties"
          description: Describes a virtual machines IP Configuration's PublicIPAddress configuration.
