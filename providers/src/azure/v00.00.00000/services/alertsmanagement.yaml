          type: string
          description: Target ARM resource, on which alert got created.
        targetResourceName:
          type: string
          description: Name of the target ARM resource name, on which alert got created.
        targetResourceGroup:
          type: string
          description: Resource group of target ARM resource, on which alert got created.
        targetResourceType:
          type: string
          description: Resource type of target ARM resource, on which alert got created.
        monitorService:
          $ref: "#/components/schemas/MonitorService"
          description: 'Monitor service on which the rule(monitor) is set. Known values are: "Application Insights", "ActivityLog Administrative", "ActivityLog Security", "ActivityLog Recommendation", "ActivityLog Policy", "ActivityLog Autoscale", "Log Analytics", "Nagios", "Platform", "SCOM", "ServiceHealth", "SmartDetector", "VM Insights", "Zabbix", and "Resource Health".'
