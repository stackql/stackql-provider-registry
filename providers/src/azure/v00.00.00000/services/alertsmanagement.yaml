          properties: {}
          description: Information specific to the monitor service that gives more contextual details about the alert.
        egressConfig:
          type: object
          properties: {}
          description: Config which would be used for displaying the data in portal.
        customProperties:
          type: object
          properties: {}
          description: Custom properties that can hold any user defined key-value pairs.
    Essentials:
      type: object
      description: This object contains consistent fields across different monitor services.
      properties:
        severity:
          $ref: "#/components/schemas/Severity"
          description: 'Severity of alert Sev0 being highest and Sev4 being lowest. Known values are: "Sev0", "Sev1", "Sev2", "Sev3", and "Sev4".'
        signalType:
          $ref: "#/components/schemas/SignalType"
          description: 'The type of signal the alert is based on, which could be metrics, logs or activity logs. Known values are: "Metric", "Log", and "Unknown".'
        alertState:
          $ref: "#/components/schemas/AlertState"
          description: 'Alert object state, which can be modified by the user. Known values are: "New", "Acknowledged", and "Closed".'
        monitorCondition:
          $ref: "#/components/schemas/MonitorCondition"
          description: "Can be 'Fired' or 'Resolved', which represents whether the underlying conditions have crossed the defined alert rule thresholds. Known values are: \"Fired\" and \"Resolved\"."
