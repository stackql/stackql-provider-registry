      parameters:
        - name: targetResource
          in: query
          required: false
          schema:
            type: string
          description: Filter by target resource( which is full ARM ID) Default value is select all. Default value is None.
        - name: targetResourceType
          in: query
          required: false
          schema:
            type: string
          description: Filter by target resource type. Default value is select all. Default value is None.
        - name: targetResourceGroup
          in: query
          required: false
          schema:
            type: string
          description: Filter by target resource group name. Default value is select all. Default value is None.
        - name: monitorService
          in: query
          required: false
          schema:
            type: string
          description: 'Filter by monitor service which generates the alert instance. Default value is select all. Known values are: "Application Insights", "ActivityLog Administrative", "ActivityLog Security", "ActivityLog Recommendation", "ActivityLog Policy", "ActivityLog Autoscale", "Log Analytics", "Nagios", "Platform", "SCOM", "ServiceHealth", "SmartDetector", "VM Insights", "Zabbix", and "Resource Health". Default value is None.'
        - name: monitorCondition
          in: query
          required: false
          schema:
            type: string
          description: "Filter by monitor condition which is either 'Fired' or 'Resolved'. Default value is to select all. Known values are: \"Fired\" and \"Resolved\". Default value is None."
        - name: severity
          in: query
          required: false
          schema:
            type: string
          description: 'Filter by severity. Default value is select all. Known values are: "Sev0", "Sev1", "Sev2", "Sev3", and "Sev4". Default value is None.'
        - name: alertState
          in: query
          required: false
          schema:
            type: string
          description: 'Filter by state of the alert instance. Default value is to select all. Known values are: "New", "Acknowledged", and "Closed". Default value is None.'
        - name: alertRule
          in: query
          required: false
          schema:
            type: string
          description: Filter by specific alert rule. Default value is to select all. Default value is None.
        - name: smartGroupId
          in: query
          required: false
          schema:
            type: string
          description: Filter the alerts list by the Smart Group Id. Default value is none. Default value is None.
        - name: includeContext
          in: query
          required: false
          schema:
            type: boolean
          description: Include context which has contextual data specific to the monitor service. Default value is false'. Default value is None.
        - name: includeEgressConfig
          in: query
          required: false
          schema:
            type: boolean
          description: Include egress config which would be used for displaying the content in portal. Default value is 'false'. Default value is None.
        - name: pageCount
          in: query
          required: false
          schema:
            type: integer
          description: Determines number of alerts returned per page in response. Permissible value is between 1 to 250. When the "includeContent" filter is selected, maximum value allowed is 25. Default value is 25. Default value is None.
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
          description: "Sort the query results by input field, Default value is 'lastModifiedDateTime'. Known values are: \"name\", \"severity\", \"alertState\", \"monitorCondition\", \"targetResource\", \"targetResourceName\", \"targetResourceGroup\", \"targetResourceType\", \"startDateTime\", and \"lastModifiedDateTime\". Default value is None."
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
          description: "Sort the query results order in either ascending or descending. Default value is 'desc' for time fields and 'asc' for others. Known values are: \"asc\" and \"desc\". Default value is None."
        - name: select
          in: query
          required: false
          schema:
            type: string
          description: This filter allows to selection of the fields(comma separated) which would be part of the essential section. This would allow to project only the required fields rather than getting entire content. Default is to fetch all the fields in the essentials section. Default value is None.
        - name: timeRange
          in: query
          required: false
          schema:
            type: string
          description: 'Filter by time range by below listed values. Default value is 1 day. Known values are: "1h", "1d", "7d", and "30d". Default value is None.'
        - name: customTimeRange
          in: query
          required: false
          schema:
            type: string
          description: Filter by custom time range in the format / where time is in (ISO-8601 format)'. Permissible values is within 30 days from query time. Either timeRange or customTimeRange could be used but not both. Default is none. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedAlertFlattened"
