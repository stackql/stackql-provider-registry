      operationId: MachineLearningCompute_begin_create_or_update
      description: Creates or updates compute. This call will overwrite a compute if it exists. This is a nonrecoverable operation. If your intent is to create a new compute, do a GET first to verify that it does not exist yet.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the resource group in which workspace is located. Required.
        - name: workspace_name
          in: path
          required: true
          schema:
            type: string
          description: Name of Azure Machine Learning workspace. Required.
        - name: compute_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the Azure Machine Learning compute. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identity:
                  $ref: "#/components/schemas/Identity"
                  description: The identity of the resource.
                location:
                  type: string
                  description: Specifies the location of the resource.
                tags:
                  type: object
                  properties: {}
                  description: Contains resource tags defined as key/value pairs.
                sku:
                  $ref: "#/components/schemas/Sku"
                  description: The sku of the workspace.
                properties:
                  $ref: "#/components/schemas/Compute"
                  description: Compute properties.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeResource"
    patch:
      operationId: MachineLearningCompute_begin_update
