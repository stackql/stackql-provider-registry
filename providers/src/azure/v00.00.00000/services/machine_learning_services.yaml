        - name: compute_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the Azure Machine Learning compute. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: object
                  properties:
                    scaleSettings:
                      $ref: "#/components/schemas/ScaleSettings"
                      description: Desired scale settings for the amlCompute.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeResource"
    delete:
      operationId: MachineLearningCompute_begin_delete
      description: Deletes specified Machine Learning compute.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the resource group in which workspace is located. Required.
        - name: workspace_name
          in: path
          required: true
          schema:
            type: string
          description: Name of Azure Machine Learning workspace. Required.
        - name: compute_name
          in: path
          required: true
          schema:
            type: string
          description: Name of the Azure Machine Learning compute. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: underlyingResourceAction
          in: query
          required: true
          schema:
            type: string
          description: "Delete the underlying compute if 'Delete', or detach the underlying compute from workspace if 'Detach'. Known values are: \"Delete\" and \"Detach\". Required."
