        privateEndpointConnections:
          type: array
          items:
            $ref: "#/components/schemas/PrivateEndpointConnectionReference"
          description: The list of private endpoint connections that are set up for this resource.
        publicNetworkAccess:
          $ref: "#/components/schemas/PublicNetworkAccess"
          description: 'Control permission for data plane traffic coming from public networks while private endpoint is enabled. Known values are: "Enabled", "Disabled", and "SecuredByPerimeter".'
