          $ref: "#/components/schemas/DataPlaneProxyProperties"
          description: Property specifying the configuration of data plane proxy for Azure Resource Manager (ARM).
        createMode:
          $ref: "#/components/schemas/CreateMode"
          description: 'Indicates whether the configuration store need to be recovered. Known values are: "Recover" and "Default".'
