openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure Dev Center (Data Plane)
  description: "Developer-facing operations: create and manage dev boxes and deployment environments."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2023-04-01-stackql-generated
  x-serviceAlias: developer_devcenter
  x-sdkPackage: azure-developer-devcenter
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
