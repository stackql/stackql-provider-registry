paths:
  /subscriptions/{subscription_id}/metrics:getBatch?api-version=2024-02-01:
    post:
      operationId: _MetricsClient_query_resources
      description: Lists the metric values for multiple resources.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
          description: The subscription identifier for the resources in this batch. Required.
        - name: metricnamespace
          in: query
          required: true
          schema:
            type: string
          description: Metric namespace that contains the requested metric names. Required.
        - name: metricnames
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: The names of the metrics (comma separated) to retrieve. Required.
        - name: starttime
          in: query
          required: false
          schema:
            type: string
          description: The start time of the query. It is a string in the format 'yyyy-MM-ddTHH:mm:ss.fffZ'. If you have specified the endtime parameter, then this parameter is required. If only starttime is specified, then endtime defaults to the current time. If no time interval is specified, the default is 1 hour. Default value is None.
        - name: endtime
          in: query
          required: false
          schema:
            type: string
          description: The end time of the query. It is a string in the format 'yyyy-MM-ddTHH:mm:ss.fffZ'. Default value is None.
        - name: interval
          in: query
          required: false
          schema:
            type: string
          description: "The interval (i.e. timegrain) of the query in ISO 8601 duration format. Defaults to PT1M. Special case for 'FULL' value that returns single datapoint for entire time span requested. *Examples: PT15M, PT1H, P1D, FULL*. Default value is None."
        - name: aggregation
          in: query
          required: false
          schema:
            type: string
          description: "The list of aggregation types (comma separated) to retrieve. *Examples: average, minimum, maximum*. Default value is None."
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: The maximum number of records to retrieve per resource ID in the request. Valid only if filter is specified. Defaults to 10. Default value is None.
        - name: orderby
          in: query
          required: false
          schema:
            type: string
          description: "The aggregation to use for sorting results and the direction of the sort. Only one order can be specified. *Examples: sum asc*. Default value is None."
        - name: filter
          in: query
          required: false
          schema:
            type: string
          description: The filter is used to reduce the set of metric data returned.Example:Metric contains metadata A, B and C.- Return all time series of C where A = a1 and B = b1 or b2**filter=A eq ‘a1’ and B eq ‘b1’ or B eq ‘b2’ and C eq ‘*’**- Invalid variant:**filter=A eq ‘a1’ and B eq ‘b1’ and C eq ‘*’ or B = ‘b2’**This is invalid because the logical or operator cannot separate two different metadata names.- Return all time series where A = a1, B = b1 and C = c1:**filter=A eq ‘a1’ and B eq ‘b1’ and C eq ‘c1’**- Return all time series where A = a1**filter=A eq ‘a1’ and B eq ‘*’ and C eq ‘*’**. Default value is None.
        - name: rollupby
          in: query
          required: false
          schema:
            type: string
          description: Dimension name(s) to rollup results by. For example if you only want to see metric values with a filter like 'City eq Seattle or City eq Tacoma' but don't want to see separate values for each city, you can specify 'RollUpBy=City' to see the results for Seattle and Tacoma rolled up into one timeseries. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties: {}
