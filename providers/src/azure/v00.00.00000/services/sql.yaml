        autoExecuteStatus:
          $ref: "#/components/schemas/AutoExecuteStatus"
          description: "Gets the auto-execute status (whether to let the system execute the recommendations) of this advisor. Possible values are 'Enabled' and 'Disabled'. Required. Known values are: \"Enabled\", \"Disabled\", and \"Default\"."
        autoExecuteStatusInheritedFrom:
          $ref: "#/components/schemas/AutoExecuteStatusInheritedFrom"
          description: "Gets the resource from which current value of auto-execute status is inherited. Auto-execute status can be set on (and inherited from) different levels in the resource hierarchy. Possible values are 'Subscription', 'Server', 'ElasticPool', 'Database' and 'Default' (when status is not explicitly set on any level). Known values are: \"Default\", \"Subscription\", \"Server\", \"ElasticPool\", and \"Database\"."
        recommendationsStatus:
          type: string
          description: Gets that status of recommendations for this advisor and reason for not having any recommendations. Possible values include, but are not limited to, 'Ok' (Recommendations available),LowActivity (not enough workload to analyze), 'DbSeemsTuned' (Database is doing well), etc.
        lastChecked:
          type: string
          format: date-time
          description: Gets the time when the current resource was analyzed for recommendations by this advisor.
        recommendedActions:
          type: array
          items:
