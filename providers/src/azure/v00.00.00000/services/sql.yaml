    DatabaseProperties:
      type: object
      description: The database's properties.
      properties:
        createMode:
          $ref: "#/components/schemas/CreateMode"
          description: "Specifies the mode of database creation. Default: regular database creation. Copy: creates a database as a copy of an existing database. sourceDatabaseId must be specified as the resource ID of the source database. Secondary: creates a database as a secondary replica of an existing database. sourceDatabaseId must be specified as the resource ID of the existing primary database. PointInTimeRestore: Creates a database by restoring a point in time backup of an existing database. sourceDatabaseId must be specified as the resource ID of the existing database, and restorePointInTime must be specified. Recovery: Creates a database by restoring a geo-replicated backup. sourceDatabaseId must be specified as the recoverable database resource ID to restore. Restore: Creates a database by restoring a backup of a deleted database. sourceDatabaseId must be specified. If sourceDatabaseId is the database's original resource ID, then sourceDatabaseDeletionDate must be specified. Otherwise sourceDatabaseId must be the restorable dropped database resource ID and sourceDatabaseDeletionDate is ignored. restorePointInTime may also be specified to restore from an earlier point in time. RestoreLongTermRetentionBackup: Creates a database by restoring from a long term retention vault. recoveryServicesRecoveryPointResourceId must be specified as the recovery point resource ID. Copy, Secondary, and RestoreLongTermRetentionBackup are not supported for DataWarehouse edition. Known values are: \"Default\", \"Copy\", \"Secondary\", \"PointInTimeRestore\", \"Restore\", \"Recovery\", \"RestoreExternalBackup\", \"RestoreExternalBackupSecondary\", \"RestoreLongTermRetentionBackup\", and \"OnlineSecondary\"."
        collation:
          type: string
          description: The collation of the database.
        maxSizeBytes:
          type: integer
          description: The max size of the database expressed in bytes.
        sampleName:
          $ref: "#/components/schemas/SampleName"
          description: 'The name of the sample schema to apply when creating this database. Known values are: "AdventureWorksLT", "WideWorldImportersStd", and "WideWorldImportersFull".'
        elasticPoolId:
          type: string
          description: The resource identifier of the elastic pool containing this database.
        sourceDatabaseId:
          type: string
          description: The resource identifier of the source database associated with create operation of this database.
        status:
          $ref: "#/components/schemas/DatabaseStatus"
          description: 'The status of the database. Known values are: "Online", "Restoring", "RecoveryPending", "Recovering", "Suspect", "Offline", "Standby", "Shutdown", "EmergencyMode", "AutoClosed", "Copying", "Creating", "Inaccessible", "OfflineSecondary", "Pausing", "Paused", "Resuming", "Scaling", "OfflineChangingDwPerformanceTiers", "OnlineChangingDwPerformanceTiers", "Disabled", "Stopping", "Stopped", and "Starting".'
        databaseId:
          type: string
          description: The ID of the database.
        creationDate:
          type: string
          format: date-time
          description: The creation date of the database (ISO8601 format).
        currentServiceObjectiveName:
          type: string
          description: The current service level objective name of the database.
        requestedServiceObjectiveName:
          type: string
          description: The requested service level objective name of the database.
        defaultSecondaryLocation:
          type: string
          description: The default secondary region for this database.
        failoverGroupId:
          type: string
          description: Failover Group resource identifier that this database belongs to.
        restorePointInTime:
          type: string
          format: date-time
          description: Specifies the point in time (ISO8601 format) of the source database that will be restored to create the new database.
        sourceDatabaseDeletionDate:
          type: string
          format: date-time
          description: Specifies the time that the database was deleted.
        recoveryServicesRecoveryPointId:
          type: string
          description: The resource identifier of the recovery point associated with create operation of this database.
        longTermRetentionBackupResourceId:
          type: string
          description: The resource identifier of the long term retention backup associated with create operation of this database.
        recoverableDatabaseId:
          type: string
          description: The resource identifier of the recoverable database associated with create operation of this database.
        restorableDroppedDatabaseId:
          type: string
          description: The resource identifier of the restorable dropped database associated with create operation of this database.
        catalogCollation:
          $ref: "#/components/schemas/CatalogCollationType"
          description: 'Collation of the metadata catalog. Known values are: "DATABASE_DEFAULT" and "SQL_Latin1_General_CP1_CI_AS".'
        zoneRedundant:
