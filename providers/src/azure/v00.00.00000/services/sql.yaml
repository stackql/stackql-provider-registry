          $ref: "#/components/schemas/SecondaryType"
          description: 'The secondary type of the database if it is a secondary. Valid values are Geo, Named and Standby. Known values are: "Geo", "Named", and "Standby".'
        currentSku:
          $ref: "#/components/schemas/Sku"
          description: The name and tier of the SKU.
        autoPauseDelay:
          type: integer
          description: Time in minutes after which database is automatically paused. A value of -1 means that automatic pause is disabled.
        currentBackupStorageRedundancy:
          $ref: "#/components/schemas/BackupStorageRedundancy"
          description: 'The storage account type used to store backups for this database. Known values are: "Geo", "Local", "Zone", and "GeoZone".'
        requestedBackupStorageRedundancy:
          $ref: "#/components/schemas/BackupStorageRedundancy"
          description: 'The storage account type to be used to store backups for this database. Known values are: "Geo", "Local", "Zone", and "GeoZone".'
        minCapacity:
          type: number
          description: Minimal capacity that database will always have allocated, if not paused.
        pausedDate:
          type: string
          format: date-time
          description: The date when database was paused by user configuration or action(ISO8601 format). Null if the database is ready.
        resumedDate:
          type: string
          format: date-time
          description: The date when database was resumed by user action or database login (ISO8601 format). Null if the database is paused.
        maintenanceConfigurationId:
          type: string
          description: Maintenance configuration id assigned to the database. This configuration defines the period when the maintenance updates will occur.
        isLedgerOn:
          type: boolean
          description: "Whether or not this database is a ledger database, which means all tables in the database are ledger tables. Note: the value of this property cannot be changed after the database has been created."
        isInfraEncryptionEnabled:
          type: boolean
          description: Infra encryption is enabled for this database.
        federatedClientId:
          type: string
          description: The Client id used for cross tenant per database CMK scenario.
        keys:
          type: object
          properties: {}
          description: The resource ids of the user assigned identities to use.
        encryptionProtector:
          type: string
          description: The azure key vault URI of the database if it's configured with per Database Customer Managed Keys.
        preferredEnclaveType:
          $ref: "#/components/schemas/AlwaysEncryptedEnclaveType"
          description: 'Type of enclave requested on the database i.e. Default or VBS enclaves. Known values are: "Default" and "VBS".'
        useFreeLimit:
          type: boolean
          description: Whether or not the database uses free monthly limits. Allowed on one database in a subscription.
        freeLimitExhaustionBehavior:
          $ref: "#/components/schemas/FreeLimitExhaustionBehavior"
          description: 'Specifies the behavior when monthly free limits are exhausted for the free database. AutoPause: The database will be auto paused upon exhaustion of free limits for remainder of the month. BillForUsage: The database will continue to be online upon exhaustion of free limits and any overage will be billed. Known values are: "AutoPause" and "BillOverUsage".'
        manualCutover:
          type: boolean
          description: Whether or not customer controlled manual cutover needs to be done during Update Database operation to Hyperscale tier. This property is only applicable when scaling database from Business Critical/General Purpose/Premium/Standard tier to Hyperscale tier. When manualCutover is specified, the scaling operation will wait for user input to trigger cutover to Hyperscale database. To trigger cutover, please provide 'performCutover' parameter when the Scaling operation is in Waiting state.
        performCutover:
          type: boolean
          description: To trigger customer controlled manual cutover during the wait state while Scaling operation is in progress. This property parameter is only applicable for scaling operations that are initiated along with 'manualCutover' parameter. This property is only applicable when scaling database from Business Critical/General Purpose/Premium/Standard tier to Hyperscale tier is already in progress. When performCutover is specified, the scaling operation will trigger cutover and perform role-change to Hyperscale database.
        encryptionProtectorAutoRotation:
          type: boolean
          description: The flag to enable or disable auto rotation of database encryption protector AKV key.
