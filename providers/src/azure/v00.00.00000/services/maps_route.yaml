openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme).
info:
  title: Azure Maps - Route (Data Plane)
  description: Route directions, ranges and matrix calculations.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 1.0-stackql-generated
  x-serviceAlias: maps_route
  x-sdkPackage: azure-maps-route
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    RouteMatrix:
      type: object
      description: Matrix result object. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        statusCode:
          type: integer
          description: StatusCode property for the current cell in the input matrix.
        response:
          $ref: "#/components/schemas/RouteMatrixResultResponse"
          description: Response object of the current cell in the input matrix.
    RouteMatrixResultResponse:
      type: object
      description: Response object of the current cell in the input matrix. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        routeSummary:
          $ref: "#/components/schemas/RouteLegSummary"
          description: Summary object for route section.
    RouteLegSummary:
      type: object
      description: Summary object for route section. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        lengthInMeters:
          type: integer
          description: Length In Meters property.
        travelTimeInSeconds:
          type: integer
          description: Estimated travel time in seconds property that includes the delay due to real-time traffic. Note that even when traffic=false travelTimeInSeconds still includes the delay due to traffic. If DepartAt is in the future, travel time is calculated using time-dependent historic traffic data.
        trafficDelayInSeconds:
          type: integer
          description: Estimated delay in seconds caused by the real-time incident(s) according to traffic information. For routes planned with departure time in the future, delays is always 0. To return additional travel times using different types of traffic information, parameter computeTravelTimeFor=all needs to be added.
        departureTime:
          type: string
          format: date-time
          description: The estimated departure time for the route or leg.
        arrivalTime:
          type: string
          format: date-time
          description: The estimated arrival time for the route or leg.
        noTrafficTravelTimeInSeconds:
          type: integer
          description: Estimated travel time calculated as if there are no delays on the route due to traffic conditions (e.g. congestion). Included only if computeTravelTimeFor = all is used in the query.
        historicTrafficTravelTimeInSeconds:
          type: integer
          description: Estimated travel time calculated using time-dependent historic traffic data. Included only if computeTravelTimeFor = all is used in the query.
        liveTrafficIncidentsTravelTimeInSeconds:
          type: integer
          description: Estimated travel time calculated using real-time speed data. Included only if computeTravelTimeFor = all is used in the query.
        fuelConsumptionInLiters:
          type: number
          description: Estimated fuel consumption in liters using the Combustion Consumption Model. Included if vehicleEngineType is set to *combustion* and constantSpeedConsumptionInLitersPerHundredkm is specified. The value will be non-negative.
        batteryConsumptionInkWh:
          type: number
          description: Estimated electric energy consumption in kilowatt hours (kWh) using the Electric Consumption Model. Included if vehicleEngineType is set to electric and constantSpeedConsumptionInkWhPerHundredkm is specified. The value of batteryConsumptionInkWh includes the recuperated electric energy and can therefore be negative (which indicates gaining energy). If both maxChargeInkWh and currentChargeInkWh are specified, recuperation will be capped to ensure that the battery charge level never exceeds maxChargeInkWh. If neither maxChargeInkWh nor currentChargeInkWh are specified, unconstrained recuperation is assumed in the consumption calculation.
    RouteMatrixSummary:
      type: object
      description: Summary object. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        successfulRoutes:
          type: integer
          description: Number of successful routes in the response.
        totalRoutes:
          type: integer
          description: Total number of routes requested. Number of cells in the input matrix.
    RouteMatrixResult:
      type: object
      description: This object is returned from a successful Route Matrix call. For ex, if 2 origins and 3 destinations are provided, there are going to 2 arrays with 3 elements in each. Each element's content depends on the options provided in the query. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        formatVersion:
          type: string
          description: Format Version property.
        matrix:
          type: array
          items:
            type: array
            items:
              $ref: "#/components/schemas/RouteMatrix"
          description: Results as a 2 dimensional array of route summaries.
        summary:
          $ref: "#/components/schemas/RouteMatrixSummary"
          description: Summary object.
    Route:
      type: object
      description: Route. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        summary:
          $ref: "#/components/schemas/RouteSummary"
          description: Summary object.
        legs:
          type: array
          items:
            $ref: "#/components/schemas/RouteLeg"
          description: Legs array.
        sections:
          type: array
          items:
            $ref: "#/components/schemas/RouteSection"
          description: Sections array.
        guidance:
          $ref: "#/components/schemas/RouteGuidance"
          description: Contains guidance related elements. This field is present only when guidance was requested and is available.
    RouteSummary:
      type: object
      description: Summary object. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        lengthInMeters:
          type: integer
          description: Length In Meters property.
        travelTimeInSeconds:
          type: integer
          description: Estimated travel time in seconds property that includes the delay due to real-time traffic. Note that even when traffic=false travelTimeInSeconds still includes the delay due to traffic. If DepartAt is in the future, travel time is calculated using time-dependent historic traffic data.
        trafficDelayInSeconds:
          type: integer
          description: Estimated delay in seconds caused by the real-time incident(s) according to traffic information. For routes planned with departure time in the future, delays is always 0. To return additional travel times using different types of traffic information, parameter computeTravelTimeFor=all needs to be added.
        departureTime:
          type: string
          format: date-time
          description: The estimated departure time for the route or leg.
        arrivalTime:
          type: string
          format: date-time
          description: The estimated arrival time for the route or leg.
    RouteLeg:
      type: object
      description: A description of a part of a route, comprised of a list of points. Each additional waypoint provided in the request will result in an additional leg in the returned route. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        summary:
          $ref: "#/components/schemas/RouteLegSummary"
          description: Summary object for route section.
        points:
          type: array
          items:
            $ref: "#/components/schemas/LatLongPair"
          description: Points array.
    LatLongPair:
      type: object
      description: A location represented as a latitude and longitude.
      properties:
        latitude:
          type: number
          description: Latitude property.
        longitude:
          type: number
          description: Longitude property.
    RouteSection:
      type: object
      description: Route sections contain additional information about parts of a route. Each section contains at least the elements `startPointIndex`\ , `endPointIndex`\ , and `sectionType`. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        startPointIndex:
          type: integer
          description: Index of the first point (offset 0) in the route this section applies to.
        endPointIndex:
          type: integer
          description: Index of the last point (offset 0) in the route this section applies to.
        sectionType:
          type: string
          description: 'Section types of the reported route response. Known values are: "CAR_TRAIN", "COUNTRY", "FERRY", "MOTORWAY", "PEDESTRIAN", "TOLL_ROAD", "TOLL_VIGNETTE", "TRAFFIC", "TRAVEL_MODE", "TUNNEL", "CARPOOL", and "URBAN".'
        travelMode:
          type: string
          description: 'Travel mode for the calculated route. The value will be set to `other` if the requested mode of transport is not possible in this section. Known values are: "car", "truck", "taxi", "bus", "van", "motorcycle", "bicycle", "pedestrian", and "other".'
        simpleCategory:
          type: string
          description: 'Type of the incident. Can currently be JAM, ROAD_WORK, ROAD_CLOSURE, or OTHER. See "tec" for detailed information. Known values are: "JAM", "ROAD_WORK", "ROAD_CLOSURE", and "OTHER".'
        effectiveSpeedInKmh:
          type: integer
          description: Effective speed of the incident in km/h, averaged over its entire length.
        delayInSeconds:
          type: integer
          description: Delay in seconds caused by the incident.
        magnitudeOfDelay:
          type: string
          description: 'The magnitude of delay caused by the incident. These values correspond to the values of the response field ty of the `Get Traffic Incident Detail API `_. Known values are: "0", "1", "2", "3", and "4".'
        tec:
          $ref: "#/components/schemas/RouteSectionTec"
          description: Details of the traffic event, using definitions in the `TPEG2-TEC `_ standard. Can contain effectCode and causes elements.
    RouteSectionTec:
      type: object
      description: Details of the traffic event, using definitions in the `TPEG2-TEC `_ standard. Can contain effectCode and causes elements. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        effectCode:
          type: integer
          description: The effect on the traffic flow. Contains a value in the tec001:EffectCode table, as defined in the `TPEG2-TEC `_ standard. Can be used to color-code traffic events according to severity.
        causes:
          type: array
          items:
            $ref: "#/components/schemas/RouteSectionTecCause"
          description: Causes array.
    RouteSectionTecCause:
      type: object
      description: The cause of the traffic event. Can contain mainCauseCode and subCauseCode elements. Can be used to define iconography and descriptions. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        mainCauseCode:
          type: integer
          description: The main cause of the traffic event. Contains a value in the tec002:CauseCode table, as defined in the `TPEG2-TEC `_ standard.
        subCauseCode:
          type: integer
          description: The subcause of the traffic event. Contains a value in the sub cause table defined by the mainCauseCode, as defined in the `TPEG2-TEC `_ standard.
    RouteGuidance:
      type: object
      description: Contains guidance related elements. This field is present only when guidance was requested and is available. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        instructions:
          type: array
          items:
            $ref: "#/components/schemas/RouteInstruction"
          description: A list of instructions describing maneuvers.
        instructionGroups:
          type: array
          items:
            $ref: "#/components/schemas/RouteInstructionGroup"
          description: Groups a sequence of instruction elements which are related to each other.
    RouteInstruction:
      type: object
      description: A set of attributes describing a maneuver, e.g. 'Turn right', 'Keep left', 'Take the ferry', 'Take the motorway', 'Arrive'. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        routeOffsetInMeters:
          type: integer
          description: Distance from the start of the route to the point of the instruction.
        travelTimeInSeconds:
          type: integer
          description: Estimated travel time up to the point corresponding to routeOffsetInMeters.
        point:
          $ref: "#/components/schemas/LatLongPair"
          description: A location represented as a latitude and longitude.
        pointIndex:
          type: integer
          description: The index of the point in the list of polyline "points" corresponding to the point of the instruction.
        instructionType:
          type: string
          description: 'Type of the instruction, e.g., turn or change of road form. Known values are: "TURN", "ROAD_CHANGE", "LOCATION_DEPARTURE", "LOCATION_ARRIVAL", "DIRECTION_INFO", and "LOCATION_WAYPOINT".'
        roadNumbers:
          type: array
          items:
            type: string
          description: 'The road number(s) of the next significant road segment(s) after the maneuver, or of the road(s) to be followed. Example: ["E34", "N205"].'
        exitNumber:
          type: string
          description: The number(s) of a highway exit taken by the current maneuver. If an exit has multiple exit numbers, they will be separated by "," and possibly aggregated by "-", e.g., "10, 13-15".
        street:
          type: string
          description: Street name of the next significant road segment after the maneuver, or of the street that should be followed.
        signpostText:
          type: string
          description: The text on a signpost which is most relevant to the maneuver, or to the direction that should be followed.
        countryCode:
          type: string
          description: 3-character `ISO 3166-1 `_ alpha-3 country code. E.g. USA.
        stateCode:
          type: string
          description: A subdivision (e.g., state) of the country, represented by the second part of an `ISO 3166-2 `_ code. This is only available for some countries like the US, Canada, and Mexico.
        junctionType:
          type: string
          description: 'The type of the junction where the maneuver takes place. For larger roundabouts, two separate instructions are generated for entering and leaving the roundabout. Known values are: "REGULAR", "ROUNDABOUT", and "BIFURCATION".'
        turnAngleInDecimalDegrees:
          type: integer
          description: "Indicates the direction of an instruction. If junctionType indicates a turn instruction: * 180 = U-turn * [-179, -1] = Left turn * 0 = Straight on (a '0 degree' turn) * [1, 179] = Right turn If junctionType indicates a bifurcation instruction: * <0 - keep left * >0 - keep right."
        roundaboutExitNumber:
          type: string
          description: This indicates which exit to take at a roundabout.
        possibleCombineWithNext:
          type: boolean
          description: It is possible to optionally combine the instruction with the next one. This can be used to build messages like "Turn left and then turn right".
        drivingSide:
          type: string
          description: 'Indicates left-hand vs. right-hand side driving at the point of the maneuver. Known values are: "LEFT" and "RIGHT".'
        maneuver:
          type: string
          description: 'A code identifying the maneuver. Known values are: "ARRIVE", "ARRIVE_LEFT", "ARRIVE_RIGHT", "DEPART", "STRAIGHT", "KEEP_RIGHT", "BEAR_RIGHT", "TURN_RIGHT", "SHARP_RIGHT", "KEEP_LEFT", "BEAR_LEFT", "TURN_LEFT", "SHARP_LEFT", "MAKE_UTURN", "ENTER_MOTORWAY", "ENTER_FREEWAY", "ENTER_HIGHWAY", "TAKE_EXIT", "MOTORWAY_EXIT_LEFT", "MOTORWAY_EXIT_RIGHT", "TAKE_FERRY", "ROUNDABOUT_CROSS", "ROUNDABOUT_RIGHT", "ROUNDABOUT_LEFT", "ROUNDABOUT_BACK", "TRY_MAKE_UTURN", "FOLLOW", "SWITCH_PARALLEL_ROAD", "SWITCH_MAIN_ROAD", "ENTRANCE_RAMP", "WAYPOINT_LEFT", "WAYPOINT_RIGHT", and "WAYPOINT_REACHED".'
        message:
          type: string
          description: A human-readable message for the maneuver.
        combinedMessage:
          type: string
          description: "A human-readable message for the maneuver combined with the message from the next instruction. Sometimes it is possible to combine two successive instructions into a single instruction making it easier to follow. When this is the case the possibleCombineWithNext flag will be true. For example: .. code-block:: 10. Turn left onto Einsteinweg/A10/E22 towards Ring Amsterdam 11. Follow Einsteinweg/A10/E22 towards Ring Amsterdam The possibleCombineWithNext flag on instruction 10 is true. This indicates to the clients of coded guidance that it can be combined with instruction 11. The instructions will be combined automatically for clients requesting human-readable guidance. The combinedMessage field contains the combined message: .. code-block:: Turn left onto Einsteinweg/A10/E22 towards Ring Amsterdam then follow Einsteinweg/A10/E22 towards Ring Amsterdam."
    RouteInstructionGroup:
      type: object
      description: Groups a sequence of instruction elements which are related to each other. The sequence range is constrained with firstInstructionIndex and lastInstructionIndex. When human-readable text messages are requested for guidance (instructionType=text or tagged), then the instructionGroup has a summary message returned when available. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        firstInstructionIndex:
          type: integer
          description: Index of the first instruction in the instructions and belonging to this group.
        lastInstructionIndex:
          type: integer
          description: Index of the last instruction in the instructions and belonging to this group.
        groupLengthInMeters:
          type: integer
          description: Length of the group.
        groupMessage:
          type: string
          description: Summary message when human-readable text messages are requested for guidance (instructionType=text or tagged).
    RouteOptimizedWaypoint:
      type: object
      description: Optimized way point object. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        providedIndex:
          type: integer
          description: Way point index provided by the user.
        optimizedIndex:
          type: integer
          description: Optimized way point index from the system.
    RouteReport:
      type: object
      description: Reports the effective settings used in the current call. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        effectiveSettings:
          type: array
          items:
            $ref: "#/components/schemas/EffectiveSetting"
          description: Effective parameters or data used when calling this Route API.
    EffectiveSetting:
      type: object
      description: Effective parameter or data used when calling this Route API. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        key:
          type: string
          description: Name of the parameter used.
        value:
          type: string
          description: Value of the parameter used.
    RouteDirections:
      type: object
      description: This object is returned from a successful Route Directions call. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        formatVersion:
          type: string
          description: Format Version property.
        routes:
          type: array
          items:
            $ref: "#/components/schemas/Route"
          description: Routes array.
        optimizedWaypoints:
          type: array
          items:
            $ref: "#/components/schemas/RouteOptimizedWaypoint"
          description: 'Optimized sequence of waypoints. It shows the index from the user provided waypoint sequence for the original and optimized list. For instance, a response: .. code-block:: means that the original sequence is [0, 1, 2] and optimized sequence is [1, 2, 0]. Since the index starts by 0 the original is "first, second, third" while the optimized is "second, third, first".'
        report:
          $ref: "#/components/schemas/RouteReport"
          description: Reports the effective settings used in the current call.
    GeoJsonGeometryCollection:
      type: object
      description: A valid `GeoJSON GeometryCollection` object type. Please refer to `RFC 7946 `__ for details. All required parameters must be populated in order to send to server.
      properties:
        type:
          type: string
          description: 'Specifies the `GeoJSON` type. Must be one of the nine valid GeoJSON object types - Point, MultiPoint, LineString, MultiLineString, Polygon, MultiPolygon, GeometryCollection, Feature and FeatureCollection. Required. Known values are: "Point", "MultiPoint", "LineString", "MultiLineString", "Polygon", "MultiPolygon", "GeometryCollection", "Feature", and "FeatureCollection".'
        geometries:
          type: array
          items:
            $ref: "#/components/schemas/GeoJsonGeometry"
          description: Contains a list of valid `GeoJSON` geometry objects. **Note** that coordinates in GeoJSON are in x, y order (longitude, latitude). Required.
      required:
        - type
        - geometries
    GeoJsonGeometry:
      type: object
      description: "A valid `GeoJSON` geometry object. The type must be one of the seven valid GeoJSON geometry types - Point, MultiPoint, LineString, MultiLineString, Polygon, MultiPolygon and GeometryCollection. Please refer to `RFC 7946 `__ for details. You probably want to use the sub-classes and not this class directly. Known sub-classes are: GeoJsonGeometryCollection, GeoJsonLineString, GeoJsonMultiLineString, GeoJsonMultiPoint, GeoJsonMultiPolygon, GeoJsonPoint, GeoJsonPolygon All required parameters must be populated in order to send to server."
      properties:
        type:
          type: string
          description: 'Specifies the `GeoJSON` type. Must be one of the nine valid GeoJSON object types - Point, MultiPoint, LineString, MultiLineString, Polygon, MultiPolygon, GeometryCollection, Feature and FeatureCollection. Required. Known values are: "Point", "MultiPoint", "LineString", "MultiLineString", "Polygon", "MultiPolygon", "GeometryCollection", "Feature", and "FeatureCollection".'
      required:
        - type
    GeoJsonMultiPolygon:
      type: object
      description: A valid `GeoJSON MultiPolygon` object type. Please refer to `RFC 7946 `__ for details. All required parameters must be populated in order to send to server.
      properties:
        type:
          type: string
          description: 'Specifies the `GeoJSON` type. Must be one of the nine valid GeoJSON object types - Point, MultiPoint, LineString, MultiLineString, Polygon, MultiPolygon, GeometryCollection, Feature and FeatureCollection. Required. Known values are: "Point", "MultiPoint", "LineString", "MultiLineString", "Polygon", "MultiPolygon", "GeometryCollection", "Feature", and "FeatureCollection".'
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              items:
                type: array
                items:
                  type: number
          description: Contains a list of valid `GeoJSON Polygon` objects. **Note** that coordinates in GeoJSON are in x, y order (longitude, latitude). Required.
      required:
        - type
        - coordinates
    RouteRange:
      type: object
      description: Reachable Range. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        center:
          $ref: "#/components/schemas/LatLongPair"
          description: Center point of the reachable range.
        boundary:
          type: array
          items:
            $ref: "#/components/schemas/LatLongPair"
          description: Polygon boundary of the reachable range represented as a list of points.
    RouteRangeResult:
      type: object
      description: This object is returned from a successful Route Reachable Range call. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        formatVersion:
          type: string
          description: Format Version property.
        reachableRange:
          $ref: "#/components/schemas/RouteRange"
          description: Reachable Range.
        report:
          $ref: "#/components/schemas/RouteReport"
          description: Reports the effective settings used in the current call.
    BatchResultSummary:
      type: object
      description: Summary of the results for the batch request. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        successfulRequests:
          type: integer
          description: Number of successful requests in the batch.
        totalRequests:
          type: integer
          description: Total number of requests in the batch.
    RouteDirectionsBatchItem:
      type: object
      description: An item returned from Route Directions Batch service call. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        statusCode:
          type: integer
          description: HTTP request status code.
        response:
          $ref: "#/components/schemas/RouteDirectionsBatchItemResponse"
          description: The result of the query. RouteDirections if the query completed successfully, ErrorResponse otherwise.
    RouteDirectionsBatchItemResponse:
      type: object
      description: The result of the query. RouteDirections if the query completed successfully, ErrorResponse otherwise. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        formatVersion:
          type: string
          description: Format Version property.
        routes:
          type: array
          items:
            $ref: "#/components/schemas/Route"
          description: Routes array.
        optimizedWaypoints:
          type: array
          items:
            $ref: "#/components/schemas/RouteOptimizedWaypoint"
          description: 'Optimized sequence of waypoints. It shows the index from the user provided waypoint sequence for the original and optimized list. For instance, a response: .. code-block:: means that the original sequence is [0, 1, 2] and optimized sequence is [1, 2, 0]. Since the index starts by 0 the original is "first, second, third" while the optimized is "second, third, first".'
        report:
          $ref: "#/components/schemas/RouteReport"
          description: Reports the effective settings used in the current call.
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: The error object.
    ErrorDetail:
      type: object
      description: The error detail. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        code:
          type: string
          description: The error code.
        message:
          type: string
          description: The error message.
        target:
          type: string
          description: The error target.
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
          description: The error details.
        additionalInfo:
          type: array
          items:
            $ref: "#/components/schemas/ErrorAdditionalInfo"
          description: The error additional info.
    ErrorAdditionalInfo:
      type: object
      description: The resource management error additional info. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        type:
          type: string
          description: The additional info type.
        info:
          type: object
          properties: {}
          description: The additional info.
    RouteDirectionsBatchResult:
      type: object
      description: This object is returned from a successful Route Directions Batch service call. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        summary:
          $ref: "#/components/schemas/BatchResultSummary"
          description: Summary of the results for the batch request.
        batchItems:
          type: array
          items:
            $ref: "#/components/schemas/RouteDirectionsBatchItem"
          description: Array containing the batch results.
    GeoJsonMultiPoint:
      type: object
      description: A valid `GeoJSON MultiPoint` geometry type. Please refer to `RFC 7946 `__ for details. All required parameters must be populated in order to send to server.
      properties:
        type:
          type: string
          description: 'Specifies the `GeoJSON` type. Must be one of the nine valid GeoJSON object types - Point, MultiPoint, LineString, MultiLineString, Polygon, MultiPolygon, GeometryCollection, Feature and FeatureCollection. Required. Known values are: "Point", "MultiPoint", "LineString", "MultiLineString", "Polygon", "MultiPolygon", "GeometryCollection", "Feature", and "FeatureCollection".'
        coordinates:
          type: array
          items:
            type: array
            items:
              type: number
          description: Coordinates for the `GeoJson MultiPoint` geometry. Required.
      required:
        - type
        - coordinates
    BatchRequestItem:
      type: object
      description: Batch request object.
      properties:
        query:
          type: string
          description: This parameter contains a query string used to perform an unstructured geocoding operation. The query string will be passed verbatim to the search API for processing.
  x-stackQL-resources:
    route:
      id: azure.maps_route.route
      name: route
      title: route
      methods:
        get_route_matrix:
          operation:
            $ref: "#/paths/~1route~1matrix~1{format}?api-version=1.0/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        request_route_matrix:
          operation:
            $ref: "#/paths/~1route~1matrix~1{format}?api-version=1.0/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        get_route_directions:
          operation:
            $ref: "#/paths/~1route~1directions~1{format}?api-version=1.0/get"
          response:
            openAPIDocKey: "200"
