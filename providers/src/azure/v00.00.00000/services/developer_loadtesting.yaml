openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Load Test Administration Client
  description: LoadTestAdministrationClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-11-01-preview-stackql-generated
  x-serviceAlias: developer_loadtesting
  x-sdkPackage: azure-developer-loadtesting
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    FileType:
      type: string
      enum:
        - JMX_FILE
        - USER_PROPERTIES
        - ADDITIONAL_ARTIFACTS
        - ZIPPED_ARTIFACTS
        - URL_TEST_CONFIG
        - TEST_SCRIPT
        - BROWSER_RECORDING
        - TEST_PLAN_RECOMMENDATIONS
    FileValidationStatus:
      type: string
      enum:
        - NOT_VALIDATED
        - VALIDATION_SUCCESS
        - VALIDATION_FAILURE
        - VALIDATION_INITIATED
        - VALIDATION_NOT_REQUIRED
    TestFileInfo:
      type: object
      description: Test file info.
      properties:
        fileName:
          type: string
          description: Name of the file. Required.
        url:
          type: string
          description: File URL.
        fileType:
          $ref: "#/components/schemas/FileType"
          description: 'File type. Known values are: "JMX_FILE", "USER_PROPERTIES", "ADDITIONAL_ARTIFACTS", "ZIPPED_ARTIFACTS", "URL_TEST_CONFIG", "TEST_SCRIPT", "BROWSER_RECORDING", and "TEST_PLAN_RECOMMENDATIONS".'
        expireDateTime:
          type: string
          format: date-time
          description: Expiry time of the file (RFC 3339 literal format).
        validationStatus:
          $ref: "#/components/schemas/FileValidationStatus"
          description: 'Validation status of the file. Known values are: "NOT_VALIDATED", "VALIDATION_SUCCESS", "VALIDATION_FAILURE", "VALIDATION_INITIATED", and "VALIDATION_NOT_REQUIRED".'
        validationFailureDetails:
          type: string
          description: Validation failure error details.
      required:
        - fileName
    PagedTestFileInfo:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TestFileInfo"
        nextLink:
          type: string
    PassFailCriteria:
      type: object
      description: Pass fail criteria for a test.
      properties:
        passFailMetrics:
          type: object
          properties: {}
          description: "Map of id and pass fail metrics { id : pass fail metrics }."
        passFailServerMetrics:
          type: object
          properties: {}
          description: "Map of id and pass fail server metrics { id : pass fail metrics }."
    AutoStopCriteria:
      type: object
      description: Auto stop criteria for a test. This will automatically stop a load test if the error percentage is high for a certain time window.
      properties:
        autoStopDisabled:
          type: boolean
          description: Whether auto-stop should be disabled. The default value is false.
        errorRate:
          type: number
          description: Threshold percentage of errors on which test run should be automatically stopped. Allowed values are in range of 0.0-100.0.
        errorRateTimeWindowInSeconds:
          type: integer
          description: Time window during which the error percentage should be evaluated in seconds.
        maximumVirtualUsersPerEngine:
          type: integer
          description: Maximum number of virtual users per load testing engine, at which the test run should be automatically stopped.
    CertificateMetadata:
      type: object
      description: Certificates metadata.
      properties:
        value:
          type: string
          description: The value of the certificate for respective type.
        type:
          $ref: "#/components/schemas/CertificateType"
          description: Type of certificate. "AKV_CERT_URI"
        name:
          type: string
          description: Name of the certificate.
    CertificateType:
      type: string
      enum:
        - AKV_CERT_URI
    LoadTestConfiguration:
      type: object
      description: Configurations for the load test.
      properties:
        engineInstances:
          type: integer
          description: The number of engine instances to execute load test. Supported values are in range of 1-400. Required for creating a new test.
        splitAllCSVs:
          type: boolean
          description: If false, Azure Load Testing copies and processes your input files unmodified across all test engine instances. If true, Azure Load Testing splits the CSV input data evenly across all engine instances. If you provide multiple CSV files, each file will be split evenly.
        quickStartTest:
          type: boolean
          description: If true, optionalLoadTestConfig is required and JMX script for the load test is not required to upload.
        optionalLoadTestConfig:
          $ref: "#/components/schemas/OptionalLoadTestConfiguration"
          description: Configuration for quick load test.
        regionalLoadTestConfig:
          type: array
          items:
            $ref: "#/components/schemas/RegionalConfiguration"
          description: Region distribution configuration for the load test.
    OptionalLoadTestConfiguration:
      type: object
      description: Configuration for quick load test.
      properties:
        endpointUrl:
          type: string
          description: Test URL. Provide the complete HTTP URL. For example, `https://contoso-app.azurewebsites.net/login `_.
        requestsPerSecond:
          type: integer
          description: Target throughput (requests per second). This may not be necessarily achieved. The actual throughput will be lower if the application is not capable of handling it.
        maxResponseTimeInMs:
          type: integer
          description: Maximum response time in milliseconds of the API/endpoint.
        virtualUsers:
          type: integer
          description: No of concurrent virtual users.
        rampUpTime:
          type: integer
          description: Ramp up time in seconds.
        duration:
          type: integer
          description: Test run duration in seconds.
    RegionalConfiguration:
      type: object
      description: Region distribution configuration for the load test.
      properties:
        engineInstances:
          type: integer
          description: The number of engine instances to execute load test in specified region. Supported values are in range of 1-400. Required.
        region:
          type: string
          description: Azure region name. The region name should of format accepted by ARM, and should be a region supported by Azure Load Testing. For example, East US should be passed as "eastus". The region name must match one of the strings in the "Name" column returned from running the "az account list-locations -o table" Azure CLI command. Required.
      required:
        - engineInstances
        - region
    TestInputArtifacts:
      type: object
      description: The input artifacts for the test.
      properties:
        configFileInfo:
          $ref: "#/components/schemas/TestFileInfo"
          description: The load test YAML file that contains the the test configuration.
        testScriptFileInfo:
          $ref: "#/components/schemas/TestFileInfo"
          description: The test script file for the test run.
        userPropFileInfo:
          $ref: "#/components/schemas/TestFileInfo"
          description: The user properties file.
        inputArtifactsZipFileInfo:
          $ref: "#/components/schemas/TestFileInfo"
          description: The zip file with all input artifacts.
        urlTestConfigFileInfo:
          $ref: "#/components/schemas/TestFileInfo"
          description: The config json file for url based test.
        additionalFileInfo:
          type: array
          items:
            $ref: "#/components/schemas/TestFileInfo"
          description: Additional supported files for the test run.
    TestKind:
      type: string
      enum:
        - URL
        - JMX
        - Locust
    ManagedIdentityType:
      type: string
      enum:
        - SystemAssigned
        - UserAssigned
    TestPreferences:
      type: object
      description: Preferences for the test.
      properties:
        enableAIErrorInsights:
          type: boolean
          description: Enable or disable AI based insights on Test Run Errors.
    Test:
      type: object
      description: Load test model.
      properties:
        passFailCriteria:
          $ref: "#/components/schemas/PassFailCriteria"
          description: Pass fail criteria for a test.
        autoStopCriteria:
          $ref: "#/components/schemas/AutoStopCriteria"
          description: Auto stop criteria for a test. This will automatically stop a load test if the error percentage is high for a certain time window.
        secrets:
          type: object
          properties: {}
          description: Secrets can be stored in an Azure Key Vault or any other secret store. If the secret is stored in an Azure Key Vault, the value should be the secret identifier and the type should be AKV_SECRET_URI. If the secret is stored elsewhere, the secret value should be provided directly and the type should be SECRET_VALUE.
        certificate:
          $ref: "#/components/schemas/CertificateMetadata"
          description: Certificates metadata.
        environmentVariables:
          type: object
          properties: {}
          description: Environment variables which are defined as a set of pairs.
        loadTestConfiguration:
          $ref: "#/components/schemas/LoadTestConfiguration"
          description: The load test configuration.
        baselineTestRunId:
          type: string
          description: Id of the test run to be marked as baseline to view trends of client-side metrics from recent test runs.
        inputArtifacts:
          $ref: "#/components/schemas/TestInputArtifacts"
          description: The input artifacts for the test.
        testId:
          type: string
          description: Unique test identifier for the load test, must contain only lower-case alphabetic, numeric, underscore or hyphen characters. Required.
        description:
          type: string
          description: The test description.
        displayName:
          type: string
          description: Display name of a test.
        subnetId:
          type: string
          description: Subnet ID on which the load test instances should run.
        kind:
          $ref: "#/components/schemas/TestKind"
          description: 'Kind of test. Known values are: "URL", "JMX", and "Locust".'
        publicIPDisabled:
          type: boolean
          description: Inject load test engines without deploying public IP for outbound access.
        keyvaultReferenceIdentityType:
          type: string
          description: Type of the managed identity referencing the Key vault.
        keyvaultReferenceIdentityId:
          type: string
          description: Resource Id of the managed identity referencing the Key vault.
        metricsReferenceIdentityType:
          $ref: "#/components/schemas/ManagedIdentityType"
          description: 'Type of the managed identity referencing the metrics. Known values are: "SystemAssigned" and "UserAssigned".'
        metricsReferenceIdentityId:
          type: string
          description: Resource Id of the managed identity referencing the metrics.
        engineBuiltInIdentityType:
          $ref: "#/components/schemas/ManagedIdentityType"
          description: 'Type of the managed identity built in load test engines. Known values are: "SystemAssigned" and "UserAssigned".'
        engineBuiltInIdentityIds:
          type: array
          items:
            type: string
          description: Resource Ids of the managed identity built in to load test engines. Required if engineBuiltInIdentityType is UserAssigned.
        estimatedVirtualUserHours:
          type: number
          description: Estimated virtual user hours for the test.
        preferences:
          $ref: "#/components/schemas/TestPreferences"
          description: Preferences for the test.
        createdDateTime:
          type: string
          format: date-time
          description: The creation datetime(RFC 3339 literal format).
        createdBy:
          type: string
          description: The user that created.
        lastModifiedDateTime:
          type: string
          format: date-time
          description: The last Modified datetime(RFC 3339 literal format).
        lastModifiedBy:
          type: string
          description: The user that last modified.
    PagedTest:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Test"
        nextLink:
          type: string
    TargetResourceConfigurations:
      type: object
      description: "Configurations of a target resource. This varies with the kind of resource. You probably want to use the sub-classes and not this class directly. Known sub-classes are: FunctionFlexConsumptionTargetResourceConfigurations"
      properties:
        kind:
          type: string
          description: Kind of the resource for which the configurations apply. Required. "FunctionsFlexConsumption"
      required:
        - kind
    TestProfile:
      type: object
      description: Test Profile Model.
      properties:
        testProfileId:
          type: string
          description: Unique identifier for the test profile, must contain only lower-case alphabetic, numeric, underscore or hyphen characters. Required.
        displayName:
          type: string
          description: Display name of the test profile.
        description:
          type: string
          description: Description for the test profile.
        testId:
          type: string
          description: Associated test ID for the test profile. This property is required for creating a Test Profile and it's not allowed to be updated.
        targetResourceId:
          type: string
          description: Target resource ID on which the test profile is created. This property is required for creating a Test Profile and it's not allowed to be updated.
        targetResourceConfigurations:
          $ref: "#/components/schemas/TargetResourceConfigurations"
          description: Configurations of the target resource on which testing would be done.
        createdDateTime:
          type: string
          format: date-time
          description: The creation datetime(RFC 3339 literal format).
        createdBy:
          type: string
          description: The user that created.
        lastModifiedDateTime:
          type: string
          format: date-time
          description: The last Modified datetime(RFC 3339 literal format).
        lastModifiedBy:
          type: string
          description: The user that last modified.
    PagedTestProfile:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TestProfile"
        nextLink:
          type: string
    TriggerState:
      type: string
      enum:
        - Active
        - Paused
        - Completed
        - Disabled
    StateDetails:
      type: object
      description: State details of the trigger.
      properties:
        message:
          type: string
          description: The error message if the trigger is in disabled state.
    Trigger:
      type: object
      description: "Trigger model. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ScheduleTestsTrigger"
      properties:
        triggerId:
          type: string
          description: The unique identifier of the trigger. Required.
        displayName:
          type: string
          description: The name of the trigger. Required.
        description:
          type: string
          description: The description of the trigger.
        kind:
          type: string
          description: The type of the trigger. Required. "ScheduleTestsTrigger"
        state:
          $ref: "#/components/schemas/TriggerState"
          description: 'The current state of the trigger. Known values are: "Active", "Paused", "Completed", and "Disabled".'
        stateDetails:
          $ref: "#/components/schemas/StateDetails"
          description: Details of current state of the trigger.
        createdDateTime:
          type: string
          format: date-time
          description: The creation datetime(RFC 3339 literal format).
        createdBy:
          type: string
          description: The user that created.
        lastModifiedDateTime:
          type: string
          format: date-time
          description: The last Modified datetime(RFC 3339 literal format).
        lastModifiedBy:
          type: string
          description: The user that last modified.
      required:
        - displayName
        - kind
    PagedTrigger:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/Trigger"
        nextLink:
          type: string
    NotificationRule:
      type: object
      description: "Notification rule model. You probably want to use the sub-classes and not this class directly. Known sub-classes are: TestsNotificationRule"
      properties:
        notificationRuleId:
          type: string
          description: The unique identifier of the notification rule. Required.
        displayName:
          type: string
          description: The name of the notification rule. Required.
        actionGroupIds:
          type: array
          items:
            type: string
          description: The action groups to notify. Required.
        scope:
          type: string
          description: The scope of the notification rule. Required. "Tests"
        createdDateTime:
          type: string
          format: date-time
          description: The creation datetime(RFC 3339 literal format).
        createdBy:
          type: string
          description: The user that created.
        lastModifiedDateTime:
          type: string
          format: date-time
          description: The last Modified datetime(RFC 3339 literal format).
        lastModifiedBy:
          type: string
          description: The user that last modified.
      required:
        - displayName
        - actionGroupIds
        - scope
    PagedNotificationRule:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/NotificationRule"
        nextLink:
          type: string
    TestAppComponents:
      type: object
      description: Test app components.
      properties:
        components:
          type: object
          properties: {}
          description: Azure resource collection { resource id (fully qualified resource Id e.g subscriptions/{subId}/resourceGroups/{rg}/providers/Microsoft.LoadTestService/loadtests/{resName})
        testId:
          type: string
          description: Test identifier.
        createdDateTime:
          type: string
          format: date-time
          description: The creation datetime(RFC 3339 literal format).
        createdBy:
          type: string
          description: The user that created.
        lastModifiedDateTime:
          type: string
          format: date-time
          description: The last Modified datetime(RFC 3339 literal format).
        lastModifiedBy:
          type: string
          description: The user that last modified.
      required:
        - components
    TestServerMetricsConfiguration:
      type: object
      description: Test server metrics configuration.
      properties:
        testId:
          type: string
          description: Test identifier.
        metrics:
          type: object
          properties: {}
          description: "Azure resource metrics collection {metric id : metrics object} (Refer : `https://learn.microsoft.com/en-us/rest/api/monitor/metric-definitions/list#metricdefinition `_ for metric id). Required."
        createdDateTime:
          type: string
          format: date-time
          description: The creation datetime(RFC 3339 literal format).
        createdBy:
          type: string
          description: The user that created.
        lastModifiedDateTime:
          type: string
          format: date-time
          description: The last Modified datetime(RFC 3339 literal format).
        lastModifiedBy:
          type: string
          description: The user that last modified.
      required:
        - metrics
    OperationState:
      type: string
      enum:
        - NotStarted
        - Running
        - Succeeded
        - Failed
        - Canceled
    OperationKind:
      type: string
      enum:
        - CloneTest
        - GenerateTestRunInsights
        - TestPlanRecommendations
    OperationStatus:
      type: object
      description: Status of a long running operation.
      properties:
        id:
          type: string
          description: The unique ID of the operation. Required.
        status:
          $ref: "#/components/schemas/OperationState"
          description: 'The state of the operation. Required. Known values are: "NotStarted", "Running", "Succeeded", "Failed", and "Canceled".'
        kind:
          $ref: "#/components/schemas/OperationKind"
          description: 'The kind of the operation. Required. Known values are: "CloneTest", "GenerateTestRunInsights", and "TestPlanRecommendations".'
        error:
          type: object
          properties: {}
          description: Error object that describes the error when status is "Failed".
      required:
        - status
        - kind
    DimensionFilter:
      type: object
      description: Dimension name and values to filter.
      properties:
        name:
          type: string
          description: The dimension name.
        values:
          type: array
          items:
            type: string
          description: The dimension values. Maximum values can be 20.
    TimeSeriesElement:
      type: object
      description: The time series returned when a data query is performed.
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MetricValue"
          description: An array of data points representing the metric values.
        dimensionValues:
          type: array
          items:
            $ref: "#/components/schemas/DimensionValue"
          description: The dimension values.
    MetricValue:
      type: object
      description: Represents a metric value.
      properties:
        timestamp:
          type: string
          format: date-time
          description: The timestamp for the metric value in RFC 3339 format.
        value:
          type: number
          description: The metric value.
    DimensionValue:
      type: object
      description: Represents a metric dimension value.
      properties:
        name:
          type: string
          description: The name of the dimension.
        value:
          type: string
          description: The value of the dimension.
    PagedTimeSeriesElement:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesElement"
        nextLink:
          type: string
    ErrorDetails:
      type: object
      description: Error details if there is any failure in load test run.
      properties:
        code:
          type: string
          description: Error code if there is any failure in load test run.
        message:
          type: string
          description: Error details in case test run was not successfully run.
        properties:
          type: object
          properties: {}
          description: A dictionary for storing additional error information for better context. Each key is a property name (e.g., "Description", "Resolution", "Category", "Region"), and its value is an array of strings with relevant details.
    TestRunArtifacts:
      type: object
      description: Collection of test run artifacts.
      properties:
        inputArtifacts:
          $ref: "#/components/schemas/TestRunInputArtifacts"
          description: The input artifacts for the test run.
        outputArtifacts:
          $ref: "#/components/schemas/TestRunOutputArtifacts"
          description: The output artifacts for the test run.
    TestRunInputArtifacts:
      type: object
      description: The input artifacts for the test run.
      properties:
        configFileInfo:
          $ref: "#/components/schemas/TestRunFileInfo"
          description: The load test YAML file that contains the the test configuration.
        testScriptFileInfo:
          $ref: "#/components/schemas/TestRunFileInfo"
          description: The test script file for the test run.
        userPropFileInfo:
          $ref: "#/components/schemas/TestRunFileInfo"
          description: The user properties file.
        inputArtifactsZipFileInfo:
          $ref: "#/components/schemas/TestRunFileInfo"
          description: The zip file for all input artifacts.
        urlTestConfigFileInfo:
          $ref: "#/components/schemas/TestRunFileInfo"
          description: The config json file for url based test.
        additionalFileInfo:
          type: array
          items:
            $ref: "#/components/schemas/TestRunFileInfo"
          description: Additional supported files for the test run.
    TestRunFileInfo:
      type: object
      description: Test run file info.
      properties:
        fileName:
          type: string
          description: Name of the file. Required.
        url:
          type: string
          description: File URL.
        fileType:
          $ref: "#/components/schemas/FileType"
          description: 'File type. Known values are: "JMX_FILE", "USER_PROPERTIES", "ADDITIONAL_ARTIFACTS", "ZIPPED_ARTIFACTS", "URL_TEST_CONFIG", "TEST_SCRIPT", "BROWSER_RECORDING", and "TEST_PLAN_RECOMMENDATIONS".'
        expireDateTime:
          type: string
          format: date-time
          description: Expiry time of the file (RFC 3339 literal format).
        validationStatus:
          $ref: "#/components/schemas/FileValidationStatus"
          description: 'Validation status of the file. Known values are: "NOT_VALIDATED", "VALIDATION_SUCCESS", "VALIDATION_FAILURE", "VALIDATION_INITIATED", and "VALIDATION_NOT_REQUIRED".'
        validationFailureDetails:
          type: string
          description: Validation failure error details.
      required:
        - fileName
    TestRunOutputArtifacts:
      type: object
      description: The output artifacts for the test run.
      properties:
        resultFileInfo:
          $ref: "#/components/schemas/TestRunFileInfo"
          description: The test run results file.
        logsFileInfo:
          $ref: "#/components/schemas/TestRunFileInfo"
          description: The test run report with metrics.
        artifactsContainerInfo:
          $ref: "#/components/schemas/ArtifactsContainerInfo"
          description: The container for test run artifacts.
        reportFileInfo:
          $ref: "#/components/schemas/TestRunFileInfo"
          description: The report file for the test run.
    ArtifactsContainerInfo:
      type: object
      description: Artifacts container info.
      properties:
        url:
          type: string
          description: This is a SAS URI to an Azure Storage Container that contains the test run artifacts.
        expireDateTime:
          type: string
          format: date-time
          description: Expiry time of the container (RFC 3339 literal format).
    PassFailTestResult:
      type: string
      enum:
        - PASSED
        - NOT_APPLICABLE
        - FAILED
    TestRunStatus:
      type: string
      enum:
        - ACCEPTED
        - NOTSTARTED
        - PROVISIONING
        - PROVISIONED
        - CONFIGURING
        - CONFIGURED
        - EXECUTING
        - EXECUTED
        - DEPROVISIONING
        - DEPROVISIONED
        - DONE
        - CANCELLING
        - CANCELLED
        - FAILED
        - VALIDATION_SUCCESS
        - VALIDATION_FAILURE
    RequestDataLevel:
      type: string
      enum:
        - NONE
        - ERRORS
    CreatedByType:
      type: string
      enum:
        - User
        - ScheduledTrigger
        - AzurePipelines
        - GitHubWorkflows
    TestRun:
      type: object
      description: Load test run model.
      properties:
        testRunId:
          type: string
          description: Unique test run identifier for the load test run, must contain only lower-case alphabetic, numeric, underscore or hyphen characters. Required.
        passFailCriteria:
          $ref: "#/components/schemas/PassFailCriteria"
          description: Pass fail criteria for a test.
        autoStopCriteria:
          $ref: "#/components/schemas/AutoStopCriteria"
          description: Auto stop criteria for a test. This will automatically stop a load test if the error percentage is high for a certain time window.
        secrets:
          type: object
          properties: {}
          description: Secrets can be stored in an Azure Key Vault or any other secret store. If the secret is stored in an Azure Key Vault, the value should be the secret identifier and the type should be AKV_SECRET_URI. If the secret is stored elsewhere, the secret value should be provided directly and the type should be SECRET_VALUE.
        certificate:
          $ref: "#/components/schemas/CertificateMetadata"
          description: Certificates metadata.
        environmentVariables:
          type: object
          properties: {}
          description: Environment variables which are defined as a set of pairs.
        errorDetails:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetails"
          description: Error details if there is any failure in load test run.
        testRunStatistics:
          type: object
          properties: {}
          description: Test run statistics. Key is the sampler name and value is the set of statistics for performance metrics like response time, throughput, etc. from the load test run. The sampler name is the same as the name mentioned in the test script. Sampler name "Total" represents the aggregated statistics of all the samplers.
        regionalStatistics:
          type: object
          properties: {}
          description: Regional statistics. Key is the Azure region name and value is the test run statistics. The region name should of format accepted by ARM, and should be a region supported by Azure Load Testing. For example, East US should be passed as "eastus". The region name must match one of the strings in the "Name" column returned from running the "az account list-locations -o table" Azure CLI command.
        loadTestConfiguration:
          $ref: "#/components/schemas/LoadTestConfiguration"
