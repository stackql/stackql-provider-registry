  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/Microsoft.Network/applicationGateways/{application_gateway_name}/getBackendHealthOnDemand?api-version=2025-07-01:
    post:
      operationId: ApplicationGateways_begin_backend_health_on_demand
      description: Gets the backend health for given combination of backend pool and http setting of the specified application gateway in a resource group.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: application_gateway_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the application gateway. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: $expand
          in: query
          required: false
          schema:
            type: string
          description: Expands BackendAddressPool and BackendHttpSettings referenced in backend health. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                protocol:
                  $ref: "#/components/schemas/ApplicationGatewayProtocol"
                  description: 'The protocol used for the probe. Known values are: "Http", "Https", "Tcp", and "Tls".'
                host:
                  type: string
                  description: Host name to send the probe to.
                path:
                  type: string
                  description: Relative path of probe. Valid path starts from '/'. Probe is sent to ://:.
                timeout:
                  type: integer
                  description: The probe timeout in seconds. Probe marked as failed if valid response is not received with this timeout period. Acceptable values are from 1 second to 86400 seconds.
                pickHostNameFromBackendHttpSettings:
                  type: boolean
                  description: Whether the host header should be picked from the backend http settings. Default value is false.
                enableProbeProxyProtocolHeader:
                  type: boolean
                  description: Whether to send Proxy Protocol header along with the Health Probe over TCP or TLS protocol. Default value is false.
                match:
                  $ref: "#/components/schemas/ApplicationGatewayProbeHealthResponseMatch"
                  description: Criterion for classifying a healthy probe response.
                backendAddressPool:
                  $ref: "#/components/schemas/SubResource"
                  description: Reference to backend pool of application gateway to which probe request will be sent.
                backendHttpSettings:
                  $ref: "#/components/schemas/SubResource"
                  description: Reference to backend http setting of application gateway to be used for test probe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationGatewayBackendHealthOnDemand"
