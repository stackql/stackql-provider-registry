  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/Microsoft.Network/virtualNetworkGateways/{virtual_network_gateway_name}/setvpnclientipsecparameters?api-version=2025-07-01:
    post:
      operationId: VirtualNetworkGateways_begin_set_vpnclient_ipsec_parameters
      description: The Set VpnclientIpsecParameters operation sets the vpnclient ipsec policy for P2S client of virtual network gateway in the specified resource group through Network resource provider.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: virtual_network_gateway_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the virtual network gateway. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                saLifeTimeSeconds:
                  type: integer
                  description: The IPSec Security Association (also called Quick Mode or Phase 2 SA) lifetime in seconds for P2S client. Required.
                saDataSizeKilobytes:
                  type: integer
                  description: The IPSec Security Association (also called Quick Mode or Phase 2 SA) payload size in KB for P2S client.. Required.
                ipsecEncryption:
                  $ref: "#/components/schemas/IpsecEncryption"
                  description: 'The IPSec encryption algorithm (IKE phase 1). Required. Known values are: "None", "DES", "DES3", "AES128", "AES192", "AES256", "GCMAES128", "GCMAES192", and "GCMAES256".'
                ipsecIntegrity:
                  $ref: "#/components/schemas/IpsecIntegrity"
                  description: 'The IPSec integrity algorithm (IKE phase 1). Required. Known values are: "MD5", "SHA1", "SHA256", "GCMAES128", "GCMAES192", and "GCMAES256".'
                ikeEncryption:
                  $ref: "#/components/schemas/IkeEncryption"
                  description: 'The IKE encryption algorithm (IKE phase 2). Required. Known values are: "DES", "DES3", "AES128", "AES192", "AES256", "GCMAES256", and "GCMAES128".'
                ikeIntegrity:
                  $ref: "#/components/schemas/IkeIntegrity"
                  description: 'The IKE integrity algorithm (IKE phase 2). Required. Known values are: "MD5", "SHA1", "SHA256", "SHA384", "GCMAES256", and "GCMAES128".'
                dhGroup:
                  $ref: "#/components/schemas/DhGroup"
                  description: 'The DH Group used in IKE Phase 1 for initial SA. Required. Known values are: "None", "DHGroup1", "DHGroup2", "DHGroup14", "DHGroup2048", "ECP256", "ECP384", and "DHGroup24".'
                pfsGroup:
                  $ref: "#/components/schemas/PfsGroup"
                  description: 'The Pfs Group used in IKE Phase 2 for new child SA. Required. Known values are: "None", "PFS1", "PFS2", "PFS2048", "ECP256", "ECP384", "PFS24", "PFS14", and "PFSMM".'
              required:
                - saLifeTimeSeconds
                - saDataSizeKilobytes
                - ipsecEncryption
                - ipsecIntegrity
                - ikeEncryption
                - ikeIntegrity
                - dhGroup
                - pfsGroup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnClientIPsecParameters"
