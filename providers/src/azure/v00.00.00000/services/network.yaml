            type: string
          description: The name of the service gateway. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  $ref: "#/components/schemas/UpdateAction"
                  description: 'Specifies the type of update operation to perform on address locations within the service gateway. * FullUpdate: Replaces all existing address location data with the new list provided in the request. Any previously defined locations not included will be removed. * PartialUpdate: Updates only the specified address locations. Known values are: "FullUpdate" and "PartialUpdate".'
                addressLocations:
                  type: array
                  items:
                    $ref: "#/components/schemas/ServiceGatewayAddressLocation"
                  description: An array of address locations to create or update.
      responses:
        "204":
          description: Success (no content / accepted)
