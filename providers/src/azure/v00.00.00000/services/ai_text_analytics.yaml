openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme).
info:
  title: Azure AI Language - Text Analytics (Data Plane)
  description: Sentiment analysis, entity recognition, key phrases, PII detection and summarization runtime.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: unversioned-stackql-generated
  x-serviceAlias: ai_text_analytics
  x-sdkPackage: azure-ai-textanalytics
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    MultiLanguageBatchInput:
      type: object
      description: Contains a set of input documents to be analyzed by the service. All required parameters must be populated in order to send to Azure.
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/MultiLanguageInput"
          description: The set of documents to process as part of this batch. Required.
      required:
        - documents
    MultiLanguageInput:
      type: object
      description: Contains an input document to be analyzed by the service. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: A unique, non-empty document identifier. Required.
        text:
          type: string
          description: The input text to process. Required.
        language:
          type: string
          description: (Optional) This is the 2 letter ISO 639-1 representation of a language. For example, use "en" for English; "es" for Spanish etc. If not set, use "en" for English as default.
      required:
        - id
        - text
    JobManifestTasks:
      type: object
      description: The set of tasks to execute on the input documents. Cannot specify the same task more than once.
      properties:
        entityRecognitionTasks:
          type: array
          items:
            $ref: "#/components/schemas/EntitiesTask"
          description: ":vartype entity_recognition_tasks: list[~azure.ai.textanalytics.v3_1.models.EntitiesTask]"
        entityRecognitionPiiTasks:
          type: array
          items:
            $ref: "#/components/schemas/PiiTask"
          description: ":vartype entity_recognition_pii_tasks: list[~azure.ai.textanalytics.v3_1.models.PiiTask]"
        keyPhraseExtractionTasks:
          type: array
          items:
            $ref: "#/components/schemas/KeyPhrasesTask"
          description: ":vartype key_phrase_extraction_tasks: list[~azure.ai.textanalytics.v3_1.models.KeyPhrasesTask]"
        entityLinkingTasks:
          type: array
          items:
            $ref: "#/components/schemas/EntityLinkingTask"
          description: ":vartype entity_linking_tasks: list[~azure.ai.textanalytics.v3_1.models.EntityLinkingTask]"
        sentimentAnalysisTasks:
          type: array
          items:
            $ref: "#/components/schemas/SentimentAnalysisTask"
          description: ":vartype sentiment_analysis_tasks: list[~azure.ai.textanalytics.v3_1.models.SentimentAnalysisTask]"
    EntitiesTask:
      type: object
      description: EntitiesTask.
      properties:
        parameters:
          $ref: "#/components/schemas/EntitiesTaskParameters"
          description: ":vartype parameters: ~azure.ai.textanalytics.v3_1.models.EntitiesTaskParameters"
        taskName:
          type: string
          description: ":vartype task_name: str"
    EntitiesTaskParameters:
      type: object
      description: EntitiesTaskParameters.
      properties:
        model-version:
          type: string
          description: ":vartype model_version: str"
        loggingOptOut:
          type: boolean
          description: ":vartype logging_opt_out: bool"
        stringIndexType:
          type: string
          description: 'Known values are: "TextElement_v8", "UnicodeCodePoint", and "Utf16CodeUnit".'
    PiiTask:
      type: object
      description: PiiTask.
      properties:
        parameters:
          $ref: "#/components/schemas/PiiTaskParameters"
          description: ":vartype parameters: ~azure.ai.textanalytics.v3_1.models.PiiTaskParameters"
        taskName:
          type: string
          description: ":vartype task_name: str"
    PiiTaskParameters:
      type: object
      description: PiiTaskParameters.
      properties:
        domain:
          type: string
          description: 'Known values are: "phi" and "none".'
        model-version:
          type: string
          description: ":vartype model_version: str"
        loggingOptOut:
          type: boolean
          description: ":vartype logging_opt_out: bool"
        piiCategories:
          type: array
          items:
            type: string
          description: (Optional) describes the PII categories to return.
        stringIndexType:
          type: string
          description: 'Known values are: "TextElement_v8", "UnicodeCodePoint", and "Utf16CodeUnit".'
    KeyPhrasesTask:
      type: object
      description: KeyPhrasesTask.
      properties:
        parameters:
          $ref: "#/components/schemas/KeyPhrasesTaskParameters"
          description: ":vartype parameters: ~azure.ai.textanalytics.v3_1.models.KeyPhrasesTaskParameters"
        taskName:
          type: string
          description: ":vartype task_name: str"
    KeyPhrasesTaskParameters:
      type: object
      description: KeyPhrasesTaskParameters.
      properties:
        model-version:
          type: string
          description: ":vartype model_version: str"
        loggingOptOut:
          type: boolean
          description: ":vartype logging_opt_out: bool"
    EntityLinkingTask:
      type: object
      description: EntityLinkingTask.
      properties:
        parameters:
          $ref: "#/components/schemas/EntityLinkingTaskParameters"
          description: ":vartype parameters: ~azure.ai.textanalytics.v3_1.models.EntityLinkingTaskParameters"
        taskName:
          type: string
          description: ":vartype task_name: str"
    EntityLinkingTaskParameters:
      type: object
      description: EntityLinkingTaskParameters.
      properties:
        model-version:
          type: string
          description: ":vartype model_version: str"
        loggingOptOut:
          type: boolean
          description: ":vartype logging_opt_out: bool"
        stringIndexType:
          type: string
          description: 'Known values are: "TextElement_v8", "UnicodeCodePoint", and "Utf16CodeUnit".'
    SentimentAnalysisTask:
      type: object
      description: SentimentAnalysisTask.
      properties:
        parameters:
          $ref: "#/components/schemas/SentimentAnalysisTaskParameters"
          description: ":vartype parameters: ~azure.ai.textanalytics.v3_1.models.SentimentAnalysisTaskParameters"
        taskName:
          type: string
          description: ":vartype task_name: str"
    SentimentAnalysisTaskParameters:
      type: object
      description: SentimentAnalysisTaskParameters.
      properties:
        model-version:
          type: string
          description: ":vartype model_version: str"
        loggingOptOut:
          type: boolean
          description: ":vartype logging_opt_out: bool"
        opinionMining:
          type: boolean
          description: ":vartype opinion_mining: bool"
        stringIndexType:
          type: string
          description: 'Known values are: "TextElement_v8", "UnicodeCodePoint", and "Utf16CodeUnit".'
    AnalyzeJobState:
      type: object
      description: AnalyzeJobState. All required parameters must be populated in order to send to Azure.
      properties:
        createdDateTime:
          type: string
          format: date-time
          description: Required.
        expirationDateTime:
          type: string
          format: date-time
          description: ":vartype expiration_date_time: ~datetime.datetime"
        jobId:
          type: string
          description: Required.
        lastUpdateDateTime:
          type: string
          format: date-time
          description: Required.
        status:
          type: string
          description: 'Required. Known values are: "notStarted", "running", "succeeded", "failed", "rejected", "cancelled", and "cancelling".'
        displayName:
          type: string
          description: ":vartype display_name: str"
        tasks:
          $ref: "#/components/schemas/TasksStateTasks"
          description: Required.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/TextAnalyticsError"
          description: ":vartype errors: list[~azure.ai.textanalytics.v3_1.models.TextAnalyticsError]"
        statistics:
          $ref: "#/components/schemas/RequestStatistics"
          description: if showStats=true was specified in the request this field will contain information about the request payload.
        "@nextLink":
          type: string
          description: ":vartype next_link: str"
      required:
        - createdDateTime
        - jobId
        - lastUpdateDateTime
        - status
        - tasks
    TasksStateTasks:
      type: object
      description: TasksStateTasks. All required parameters must be populated in order to send to Azure.
      properties:
        completed:
          type: integer
          description: Required.
        failed:
          type: integer
          description: Required.
        inProgress:
          type: integer
          description: Required.
        total:
          type: integer
          description: Required.
        entityRecognitionTasks:
          type: array
          items:
            $ref: "#/components/schemas/TasksStateTasksEntityRecognitionTasksItem"
          description: ":vartype entity_recognition_tasks: list[~azure.ai.textanalytics.v3_1.models.TasksStateTasksEntityRecognitionTasksItem]"
        entityRecognitionPiiTasks:
          type: array
          items:
            $ref: "#/components/schemas/TasksStateTasksEntityRecognitionPiiTasksItem"
          description: ":vartype entity_recognition_pii_tasks: list[~azure.ai.textanalytics.v3_1.models.TasksStateTasksEntityRecognitionPiiTasksItem]"
        keyPhraseExtractionTasks:
          type: array
          items:
            $ref: "#/components/schemas/TasksStateTasksKeyPhraseExtractionTasksItem"
          description: ":vartype key_phrase_extraction_tasks: list[~azure.ai.textanalytics.v3_1.models.TasksStateTasksKeyPhraseExtractionTasksItem]"
        entityLinkingTasks:
          type: array
          items:
            $ref: "#/components/schemas/TasksStateTasksEntityLinkingTasksItem"
          description: ":vartype entity_linking_tasks: list[~azure.ai.textanalytics.v3_1.models.TasksStateTasksEntityLinkingTasksItem]"
        sentimentAnalysisTasks:
          type: array
          items:
            $ref: "#/components/schemas/TasksStateTasksSentimentAnalysisTasksItem"
          description: ":vartype sentiment_analysis_tasks: list[~azure.ai.textanalytics.v3_1.models.TasksStateTasksSentimentAnalysisTasksItem]"
      required:
        - completed
        - failed
        - inProgress
        - total
    TasksStateTasksEntityRecognitionTasksItem:
      type: object
      description: TasksStateTasksEntityRecognitionTasksItem. All required parameters must be populated in order to send to Azure.
      properties:
        lastUpdateDateTime:
          type: string
          format: date-time
          description: Required.
        taskName:
          type: string
          description: Required.
        status:
          type: string
          description: 'Required. Known values are: "notStarted", "running", "succeeded", "failed", "rejected", "cancelled", and "cancelling".'
        results:
          $ref: "#/components/schemas/EntitiesResult"
          description: ":vartype results: ~azure.ai.textanalytics.v3_1.models.EntitiesResult"
      required:
        - lastUpdateDateTime
        - taskName
        - status
    EntitiesResult:
      type: object
      description: EntitiesResult. All required parameters must be populated in order to send to Azure.
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentEntities"
          description: Response by document. Required.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/DocumentError"
          description: Errors by document id. Required.
        statistics:
          $ref: "#/components/schemas/RequestStatistics"
          description: if showStats=true was specified in the request this field will contain information about the request payload.
        modelVersion:
          type: string
          description: This field indicates which model is used for scoring. Required.
      required:
        - documents
        - errors
        - modelVersion
    DocumentEntities:
      type: object
      description: DocumentEntities. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: Unique, non-empty document identifier. Required.
        entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
          description: Recognized entities in the document. Required.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/TextAnalyticsWarning"
          description: Warnings encountered while processing document. Required.
        statistics:
          $ref: "#/components/schemas/DocumentStatistics"
          description: if showStats=true was specified in the request this field will contain information about the document payload.
      required:
        - id
        - entities
        - warnings
    Entity:
      type: object
      description: Entity. All required parameters must be populated in order to send to Azure.
      properties:
        text:
          type: string
          description: Entity text as appears in the request. Required.
        category:
          type: string
          description: Entity type. Required.
        subcategory:
          type: string
          description: (Optional) Entity sub type.
        offset:
          type: integer
          description: Start position for the entity text. Use of different 'stringIndexType' values can affect the offset returned. Required.
        length:
          type: integer
          description: Length for the entity text. Use of different 'stringIndexType' values can affect the length returned. Required.
        confidenceScore:
          type: number
          description: Confidence score between 0 and 1 of the extracted entity. Required.
      required:
        - text
        - category
        - offset
        - length
        - confidenceScore
    TextAnalyticsWarning:
      type: object
      description: TextAnalyticsWarning. All required parameters must be populated in order to send to Azure.
      properties:
        code:
          type: string
          description: 'Error code. Required. Known values are: "LongWordsInDocument" and "DocumentTruncated".'
        message:
          type: string
          description: Warning message. Required.
        targetRef:
          type: string
          description: A JSON pointer reference indicating the target object.
      required:
        - code
        - message
    DocumentStatistics:
      type: object
      description: if showStats=true was specified in the request this field will contain information about the document payload. All required parameters must be populated in order to send to Azure.
      properties:
        charactersCount:
          type: integer
          description: Number of text elements recognized in the document. Required.
        transactionsCount:
          type: integer
          description: Number of transactions for the document. Required.
      required:
        - charactersCount
        - transactionsCount
    DocumentError:
      type: object
      description: DocumentError. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: Document Id. Required.
        error:
          $ref: "#/components/schemas/TextAnalyticsError"
          description: Document Error. Required.
      required:
        - id
        - error
    TextAnalyticsError:
      type: object
      description: TextAnalyticsError. All required parameters must be populated in order to send to Azure.
      properties:
        code:
          type: string
          description: 'Error code. Required. Known values are: "InvalidRequest", "InvalidArgument", "InternalServerError", "ServiceUnavailable", and "NotFound".'
        message:
          type: string
          description: Error message. Required.
        target:
          type: string
          description: Error target.
        innererror:
          $ref: "#/components/schemas/InnerError"
          description: Inner error contains more specific information.
        details:
          type: array
          items:
            $ref: "#/components/schemas/TextAnalyticsError"
          description: Details about specific errors that led to this reported error.
      required:
        - code
        - message
    InnerError:
      type: object
      description: InnerError. All required parameters must be populated in order to send to Azure.
      properties:
        code:
          type: string
          description: 'Error code. Required. Known values are: "InvalidParameterValue", "InvalidRequestBodyFormat", "EmptyRequest", "MissingInputRecords", "InvalidDocument", "ModelVersionIncorrect", "InvalidDocumentBatch", "UnsupportedLanguageCode", and "InvalidCountryHint".'
        message:
          type: string
          description: Error message. Required.
        details:
          type: object
          properties: {}
          description: Error details.
        target:
          type: string
          description: Error target.
        innererror:
          $ref: "#/components/schemas/InnerError"
          description: Inner error contains more specific information.
      required:
        - code
        - message
    RequestStatistics:
      type: object
      description: if showStats=true was specified in the request this field will contain information about the request payload. All required parameters must be populated in order to send to Azure.
      properties:
        documentsCount:
          type: integer
          description: Number of documents submitted in the request. Required.
        validDocumentsCount:
          type: integer
          description: Number of valid documents. This excludes empty, over-size limit or non-supported languages documents. Required.
        erroneousDocumentsCount:
          type: integer
          description: Number of invalid documents. This includes empty, over-size limit or non-supported languages documents. Required.
        transactionsCount:
          type: integer
          description: Number of transactions for the request. Required.
      required:
        - documentsCount
        - validDocumentsCount
        - erroneousDocumentsCount
        - transactionsCount
    TasksStateTasksEntityRecognitionPiiTasksItem:
      type: object
      description: TasksStateTasksEntityRecognitionPiiTasksItem. All required parameters must be populated in order to send to Azure.
      properties:
        lastUpdateDateTime:
          type: string
          format: date-time
          description: Required.
        taskName:
          type: string
          description: Required.
        status:
          type: string
          description: 'Required. Known values are: "notStarted", "running", "succeeded", "failed", "rejected", "cancelled", and "cancelling".'
        results:
          $ref: "#/components/schemas/PiiResult"
          description: ":vartype results: ~azure.ai.textanalytics.v3_1.models.PiiResult"
      required:
        - lastUpdateDateTime
        - taskName
        - status
    PiiResult:
      type: object
      description: PiiResult. All required parameters must be populated in order to send to Azure.
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/PiiDocumentEntities"
          description: Response by document. Required.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/DocumentError"
          description: Errors by document id. Required.
        statistics:
          $ref: "#/components/schemas/RequestStatistics"
          description: if showStats=true was specified in the request this field will contain information about the request payload.
        modelVersion:
          type: string
          description: This field indicates which model is used for scoring. Required.
      required:
        - documents
        - errors
        - modelVersion
    PiiDocumentEntities:
      type: object
      description: PiiDocumentEntities. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: Unique, non-empty document identifier. Required.
        redactedText:
          type: string
          description: Returns redacted text. Required.
        entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
          description: Recognized entities in the document. Required.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/TextAnalyticsWarning"
          description: Warnings encountered while processing document. Required.
        statistics:
          $ref: "#/components/schemas/DocumentStatistics"
          description: if showStats=true was specified in the request this field will contain information about the document payload.
      required:
        - id
        - redactedText
        - entities
        - warnings
    TasksStateTasksKeyPhraseExtractionTasksItem:
      type: object
      description: TasksStateTasksKeyPhraseExtractionTasksItem. All required parameters must be populated in order to send to Azure.
      properties:
        lastUpdateDateTime:
          type: string
          format: date-time
          description: Required.
        taskName:
          type: string
          description: Required.
        status:
          type: string
          description: 'Required. Known values are: "notStarted", "running", "succeeded", "failed", "rejected", "cancelled", and "cancelling".'
        results:
          $ref: "#/components/schemas/KeyPhraseResult"
          description: ":vartype results: ~azure.ai.textanalytics.v3_1.models.KeyPhraseResult"
      required:
        - lastUpdateDateTime
        - taskName
        - status
    KeyPhraseResult:
      type: object
      description: KeyPhraseResult. All required parameters must be populated in order to send to Azure.
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentKeyPhrases"
          description: Response by document. Required.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/DocumentError"
          description: Errors by document id. Required.
        statistics:
          $ref: "#/components/schemas/RequestStatistics"
          description: if showStats=true was specified in the request this field will contain information about the request payload.
        modelVersion:
          type: string
          description: This field indicates which model is used for scoring. Required.
      required:
        - documents
        - errors
        - modelVersion
    DocumentKeyPhrases:
      type: object
      description: DocumentKeyPhrases. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: Unique, non-empty document identifier. Required.
        keyPhrases:
          type: array
          items:
            type: string
          description: A list of representative words or phrases. The number of key phrases returned is proportional to the number of words in the input document. Required.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/TextAnalyticsWarning"
          description: Warnings encountered while processing document. Required.
        statistics:
          $ref: "#/components/schemas/DocumentStatistics"
          description: if showStats=true was specified in the request this field will contain information about the document payload.
      required:
        - id
        - keyPhrases
        - warnings
    TasksStateTasksEntityLinkingTasksItem:
      type: object
      description: TasksStateTasksEntityLinkingTasksItem. All required parameters must be populated in order to send to Azure.
      properties:
        lastUpdateDateTime:
          type: string
          format: date-time
          description: Required.
        taskName:
          type: string
          description: Required.
        status:
          type: string
          description: 'Required. Known values are: "notStarted", "running", "succeeded", "failed", "rejected", "cancelled", and "cancelling".'
        results:
          $ref: "#/components/schemas/EntityLinkingResult"
          description: ":vartype results: ~azure.ai.textanalytics.v3_1.models.EntityLinkingResult"
      required:
        - lastUpdateDateTime
        - taskName
        - status
    EntityLinkingResult:
      type: object
      description: EntityLinkingResult. All required parameters must be populated in order to send to Azure.
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentLinkedEntities"
          description: Response by document. Required.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/DocumentError"
          description: Errors by document id. Required.
        statistics:
          $ref: "#/components/schemas/RequestStatistics"
          description: if showStats=true was specified in the request this field will contain information about the request payload.
        modelVersion:
          type: string
          description: This field indicates which model is used for scoring. Required.
      required:
        - documents
        - errors
        - modelVersion
    DocumentLinkedEntities:
      type: object
      description: DocumentLinkedEntities. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: Unique, non-empty document identifier. Required.
        entities:
          type: array
          items:
            $ref: "#/components/schemas/LinkedEntity"
          description: Recognized well known entities in the document. Required.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/TextAnalyticsWarning"
          description: Warnings encountered while processing document. Required.
        statistics:
          $ref: "#/components/schemas/DocumentStatistics"
          description: if showStats=true was specified in the request this field will contain information about the document payload.
      required:
        - id
        - entities
        - warnings
    LinkedEntity:
      type: object
      description: LinkedEntity. All required parameters must be populated in order to send to Azure.
      properties:
        name:
          type: string
          description: Entity Linking formal name. Required.
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
          description: List of instances this entity appears in the text. Required.
        language:
          type: string
          description: Language used in the data source. Required.
        id:
          type: string
          description: Unique identifier of the recognized entity from the data source.
        url:
          type: string
          description: URL for the entity's page from the data source. Required.
        dataSource:
          type: string
          description: Data source used to extract entity linking, such as Wiki/Bing etc. Required.
        bingId:
          type: string
          description: Bing Entity Search API unique identifier of the recognized entity.
      required:
        - name
        - matches
        - language
        - url
        - dataSource
    Match:
      type: object
      description: Match. All required parameters must be populated in order to send to Azure.
      properties:
        confidenceScore:
          type: number
          description: If a well known item is recognized, a decimal number denoting the confidence level between 0 and 1 will be returned. Required.
        text:
          type: string
          description: Entity text as appears in the request. Required.
        offset:
          type: integer
          description: Start position for the entity match text. Required.
        length:
          type: integer
          description: Length for the entity match text. Required.
      required:
        - confidenceScore
        - text
        - offset
        - length
    TasksStateTasksSentimentAnalysisTasksItem:
      type: object
      description: TasksStateTasksSentimentAnalysisTasksItem. All required parameters must be populated in order to send to Azure.
      properties:
        lastUpdateDateTime:
          type: string
          format: date-time
          description: Required.
        taskName:
          type: string
          description: Required.
        status:
          type: string
          description: 'Required. Known values are: "notStarted", "running", "succeeded", "failed", "rejected", "cancelled", and "cancelling".'
        results:
          $ref: "#/components/schemas/SentimentResponse"
          description: ":vartype results: ~azure.ai.textanalytics.v3_1.models.SentimentResponse"
      required:
        - lastUpdateDateTime
        - taskName
        - status
    SentimentResponse:
      type: object
      description: SentimentResponse. All required parameters must be populated in order to send to Azure.
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSentiment"
          description: Sentiment analysis per document. Required.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/DocumentError"
          description: Errors by document id. Required.
        statistics:
