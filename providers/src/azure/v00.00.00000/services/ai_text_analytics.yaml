          $ref: "#/components/schemas/HealthcareAssertion"
          description: ":vartype assertion: ~azure.ai.textanalytics.v3_1.models.HealthcareAssertion"
        name:
          type: string
          description: "Preferred name for the entity. Example: 'histologically' would have a 'name' of 'histologic'."
        links:
          type: array
          items:
            $ref: "#/components/schemas/HealthcareEntityLink"
          description: Entity references in known data sources.
      required:
        - text
        - category
        - offset
        - length
        - confidenceScore
    HealthcareAssertion:
      type: object
      description: HealthcareAssertion.
      properties:
        conditionality:
          type: string
          description: 'Describes any conditionality on the entity. Known values are: "hypothetical" and "conditional".'
        certainty:
          type: string
          description: 'Describes the entities certainty and polarity. Known values are: "positive", "positivePossible", "neutralPossible", "negativePossible", and "negative".'
        association:
          type: string
          description: 'Describes if the entity is the subject of the text or if it describes someone else. Known values are: "subject" and "other".'
    HealthcareEntityLink:
      type: object
      description: HealthcareEntityLink. All required parameters must be populated in order to send to Azure.
      properties:
        dataSource:
          type: string
          description: "Entity Catalog. Examples include: UMLS, CHV, MSH, etc. Required."
        id:
          type: string
          description: Entity id in the given source catalog. Required.
      required:
        - dataSource
        - id
    HealthcareRelation:
      type: object
      description: Every relation is an entity graph of a certain relationType, where all entities are connected and have specific roles within the relation context. All required parameters must be populated in order to send to Azure.
      properties:
        relationType:
          type: string
          description: "Type of relation. Examples include: `DosageOfMedication` or 'FrequencyOfMedication', etc. Required. Known values are: \"Abbreviation\", \"DirectionOfBodyStructure\", \"DirectionOfCondition\", \"DirectionOfExamination\", \"DirectionOfTreatment\", \"DosageOfMedication\", \"FormOfMedication\", \"FrequencyOfMedication\", \"FrequencyOfTreatment\", \"QualifierOfCondition\", \"RelationOfExamination\", \"RouteOfMedication\", \"TimeOfCondition\", \"TimeOfEvent\", \"TimeOfExamination\", \"TimeOfMedication\", \"TimeOfTreatment\", \"UnitOfCondition\", \"UnitOfExamination\", \"ValueOfCondition\", and \"ValueOfExamination\"."
        entities:
          type: array
          items:
            $ref: "#/components/schemas/HealthcareRelationEntity"
          description: The entities in the relation. Required.
      required:
        - relationType
        - entities
    HealthcareRelationEntity:
      type: object
      description: HealthcareRelationEntity. All required parameters must be populated in order to send to Azure.
      properties:
        ref:
          type: string
          description: Reference link object, using a JSON pointer RFC 6901 (URI Fragment Identifier Representation), pointing to the entity . Required.
        role:
          type: string
          description: "Role of entity in the relationship. For example: 'CD20-positive diffuse large B-cell lymphoma' has the following entities with their roles in parenthesis: CD20 (GeneOrProtein), Positive (Expression), diffuse large B-cell lymphoma (Diagnosis). Required."
      required:
        - ref
        - role
    LanguageResult:
      type: object
      description: LanguageResult. All required parameters must be populated in order to send to Azure.
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentLanguage"
          description: Response by document. Required.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/DocumentError"
          description: Errors by document id. Required.
        statistics:
          $ref: "#/components/schemas/RequestStatistics"
          description: if showStats=true was specified in the request this field will contain information about the request payload.
        modelVersion:
          type: string
          description: This field indicates which model is used for scoring. Required.
      required:
        - documents
        - errors
        - modelVersion
    DocumentLanguage:
      type: object
      description: DocumentLanguage. All required parameters must be populated in order to send to Azure.
      properties:
        id:
          type: string
          description: Unique, non-empty document identifier. Required.
        detectedLanguage:
          $ref: "#/components/schemas/DetectedLanguage"
          description: Detected Language. Required.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/TextAnalyticsWarning"
          description: Warnings encountered while processing document. Required.
        statistics:
          $ref: "#/components/schemas/DocumentStatistics"
          description: if showStats=true was specified in the request this field will contain information about the document payload.
      required:
        - id
        - detectedLanguage
        - warnings
    DetectedLanguage:
      type: object
      description: DetectedLanguage. All required parameters must be populated in order to send to Azure.
      properties:
        name:
          type: string
          description: Long name of a detected language (e.g. English, French). Required.
        iso6391Name:
          type: string
          description: A two letter representation of the detected language according to the ISO 639-1 standard (e.g. en, fr). Required.
        confidenceScore:
          type: number
          description: A confidence score between 0 and 1. Scores close to 1 indicate 100% certainty that the identified language is true. Required.
      required:
        - name
        - iso6391Name
        - confidenceScore
