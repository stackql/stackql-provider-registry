          description: Healthcare entity relations. Required.
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/TextAnalyticsWarning"
          description: Warnings encountered while processing document. Required.
        statistics:
          $ref: "#/components/schemas/DocumentStatistics"
          description: if showStats=true was specified in the request this field will contain information about the document payload.
      required:
        - id
