        - relations
        - warnings
    HealthcareEntity:
      type: object
      description: HealthcareEntity. All required parameters must be populated in order to send to Azure.
      properties:
        text:
          type: string
          description: Entity text as appears in the request. Required.
        category:
          type: string
          description: 'Healthcare Entity Category. Required. Known values are: "BodyStructure", "Age", "Gender", "ExaminationName", "Date", "Direction", "Frequency", "MeasurementValue", "MeasurementUnit", "RelationalOperator", "Time", "GeneOrProtein", "Variant", "AdministrativeEvent", "CareEnvironment", "HealthcareProfession", "Diagnosis", "SymptomOrSign", "ConditionQualifier", "MedicationClass", "MedicationName", "Dosage", "MedicationForm", "MedicationRoute", "FamilyRelation", and "TreatmentName".'
        subcategory:
          type: string
          description: (Optional) Entity sub type.
        offset:
          type: integer
          description: Start position for the entity text. Use of different 'stringIndexType' values can affect the offset returned. Required.
        length:
          type: integer
          description: Length for the entity text. Use of different 'stringIndexType' values can affect the length returned. Required.
        confidenceScore:
          type: number
          description: Confidence score between 0 and 1 of the extracted entity. Required.
