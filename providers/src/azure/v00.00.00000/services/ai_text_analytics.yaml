paths:
  /analyze:
    post:
      operationId: TextAnalyticsClient_begin_analyze
      description: Submit analysis job. Submit a collection of text documents for analysis. Specify one or more unique tasks to be executed.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  description: Optional display name for the analysis job.
                analysisInput:
                  $ref: "#/components/schemas/MultiLanguageBatchInput"
                  description: Contains a set of input documents to be analyzed by the service. Required.
                tasks:
                  $ref: "#/components/schemas/JobManifestTasks"
                  description: The set of tasks to execute on the input documents. Cannot specify the same task more than once. Required.
              required:
                - analysisInput
                - tasks
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeJobState"
  /analyze/jobs/{job_id}:
    get:
      operationId: TextAnalyticsClient_analyze_status
      description: Get analysis status and results. Get the status of an analysis job. A job may consist of one or more tasks. Once all tasks are completed, the job will transition to the completed state and results will be available for each task.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job ID for Analyze. Required.
        - name: showStats
          in: query
          required: false
          schema:
            type: boolean
          description: (Optional) if set to true, response will contain request and document level statistics. Default value is None.
        - name: $top
          in: query
          required: false
          schema:
            type: integer
          description: (Optional) Set the maximum number of results per task. When both $top and $skip are specified, $skip is applied first. Default value is 20.
        - name: $skip
          in: query
          required: false
          schema:
            type: integer
          description: (Optional) Set the number of elements to offset in the response. When both $top and $skip are specified, $skip is applied first. Default value is 0.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeJobState"
  /entities/health/jobs/{job_id}:
    get:
      operationId: TextAnalyticsClient_health_status
      description: Get healthcare analysis job status and results. Get details of the healthcare prediction job specified by the jobId.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job ID. Required.
        - name: $top
          in: query
          required: false
          schema:
            type: integer
          description: (Optional) Set the maximum number of results per task. When both $top and $skip are specified, $skip is applied first. Default value is 20.
        - name: $skip
          in: query
          required: false
          schema:
            type: integer
          description: (Optional) Set the number of elements to offset in the response. When both $top and $skip are specified, $skip is applied first. Default value is 0.
        - name: showStats
          in: query
          required: false
          schema:
            type: boolean
          description: (Optional) if set to true, response will contain request and document level statistics. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthcareJobState"
    delete:
      operationId: TextAnalyticsClient_begin_cancel_health_job
      description: Cancel healthcare prediction job. Cancel healthcare prediction job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job ID. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /entities/health/jobs:
    post:
      operationId: TextAnalyticsClient_begin_health
      description: Submit healthcare analysis job. Start a healthcare analysis job to recognize healthcare related entities (drugs, conditions, symptoms, etc) and their relations.
      parameters:
        - name: model-version
          in: query
          required: false
          schema:
            type: string
          description: (Optional) This value indicates which model will be used for scoring. If a model-version is not specified, the API should default to the latest, non-preview version. Default value is None.
        - name: stringIndexType
          in: query
          required: false
          schema:
            type: string
          description: '(Optional) Specifies the method used to interpret string offsets. Defaults to Text Elements (Graphemes) according to Unicode v8.0.0. For additional information see https://aka.ms/text-analytics-offsets. Known values are: "TextElement_v8", "UnicodeCodePoint", and "Utf16CodeUnit". Default value is None.'
        - name: loggingOptOut
          in: query
          required: false
          schema:
            type: boolean
          description: (Optional) If set to true, you opt-out of having your text input logged for troubleshooting. By default, Text Analytics logs your input text for 48 hours, solely to allow for troubleshooting issues in providing you with the Text Analytics natural language processing functions. Setting this parameter to true, disables input logging and may limit our ability to remediate issues that occur. Please see Cognitive Services Compliance and Privacy notes at https://aka.ms/cs-compliance for additional details, and Microsoft Responsible AI principles at https://www.microsoft.com/ai/responsible-ai. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: A unique, non-empty document identifier. Required.
                text:
                  type: string
                  description: The input text to process. Required.
                language:
                  type: string
                  description: (Optional) This is the 2 letter ISO 639-1 representation of a language. For example, use "en" for English; "es" for Spanish etc. If not set, use "en" for English as default.
              required:
                - id
                - text
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthcareJobState"
  /entities/recognition/general:
    post:
      operationId: TextAnalyticsClient_entities_recognition_general
      description: Named Entity Recognition. The API returns a list of general named entities in a given document. For the list of supported entity types, check Supported Entity Types in Text Analytics API. See the Supported languages in Text Analytics API for the list of enabled languages.
      parameters:
        - name: model-version
          in: query
          required: false
          schema:
            type: string
          description: (Optional) This value indicates which model will be used for scoring. If a model-version is not specified, the API should default to the latest, non-preview version. Default value is None.
        - name: showStats
          in: query
          required: false
          schema:
            type: boolean
          description: (Optional) if set to true, response will contain request and document level statistics. Default value is None.
        - name: loggingOptOut
          in: query
          required: false
          schema:
            type: boolean
          description: (Optional) If set to true, you opt-out of having your text input logged for troubleshooting. By default, Text Analytics logs your input text for 48 hours, solely to allow for troubleshooting issues in providing you with the Text Analytics natural language processing functions. Setting this parameter to true, disables input logging and may limit our ability to remediate issues that occur. Please see Cognitive Services Compliance and Privacy notes at https://aka.ms/cs-compliance for additional details, and Microsoft Responsible AI principles at https://www.microsoft.com/ai/responsible-ai. Default value is None.
        - name: stringIndexType
          in: query
          required: false
          schema:
            type: string
          description: '(Optional) Specifies the method used to interpret string offsets. Defaults to Text Elements (Graphemes) according to Unicode v8.0.0. For additional information see https://aka.ms/text-analytics-offsets. Known values are: "TextElement_v8", "UnicodeCodePoint", and "Utf16CodeUnit". Default value is None.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: A unique, non-empty document identifier. Required.
                text:
                  type: string
                  description: The input text to process. Required.
                language:
                  type: string
                  description: (Optional) This is the 2 letter ISO 639-1 representation of a language. For example, use "en" for English; "es" for Spanish etc. If not set, use "en" for English as default.
              required:
                - id
                - text
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitiesResult"
