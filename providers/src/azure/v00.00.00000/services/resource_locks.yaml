            application/json:
              schema:
                $ref: "#/components/schemas/ManagementLockObjectFlattened"
    put:
      operationId: ManagementLocks_create_or_update_at_resource_group_level
      description: Creates or updates a management lock at the resource group level. When you apply a lock at a parent scope, all child resources inherit the same lock. To create management locks, you must have access to Microsoft.Authorization/\ * or Microsoft.Authorization/locks/* actions. Of the built-in roles, only Owner and User Access Administrator are granted those actions.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group to lock. Required.
        - name: lock_name
