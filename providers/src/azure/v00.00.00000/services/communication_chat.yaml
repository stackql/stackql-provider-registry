paths:
  /chat/threads?api-version=2024-03-07:
    get:
      operationId: Chat_list_chat_threads
      description: Gets the list of chat threads of a user. Gets the list of chat threads of a user.
      parameters:
        - name: maxPageSize
          in: query
          required: false
          schema:
            type: integer
          description: The maximum number of chat threads returned per page. Default value is None.
        - name: startTime
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: "The earliest point in time to get chat threads up to. The timestamp should be in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`. Default value is None."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedChatThreadItem"
    post:
      operationId: Chat_create_chat_thread
      description: Creates a chat thread. Creates a chat thread.
      parameters:
        - name: repeatability-request-id
          in: header
          required: false
          schema:
            type: string
          description: If specified, the client directs that the request is repeatable; that is, that the client can make the request multiple times with the same Repeatability-Request-Id and get back an appropriate response without the server executing the request multiple times. The value of the Repeatability-Request-Id is an opaque string representing a client-generated, globally unique for all time, identifier for the request. It is recommended to use version 4 (random) UUIDs. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  type: string
                  description: The chat thread topic. Required.
                participants:
                  type: array
                  items:
                    $ref: "#/components/schemas/ChatParticipant"
                  description: Participants to be added to the chat thread.
              required:
                - topic
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChatThreadResult"
