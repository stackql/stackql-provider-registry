      operationId: Chat_delete_chat_thread
      description: Deletes a thread. Deletes a thread.
      parameters:
        - name: chat_thread_id
          in: path
          required: true
          schema:
            type: string
          description: Id of the thread to be deleted. Required.
      responses:
        "204":
          description: Success (no content / accepted)
    get:
      operationId: ChatThread_get_chat_thread_properties
      description: Gets a chat thread's properties. Gets a chat thread's properties.
      parameters:
