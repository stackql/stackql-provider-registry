openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme).
info:
  title: Chat Client
  description: A client to interact with the AzureCommunicationService Chat gateway. This client provides operations to create chat thread, delete chat thread, get chat thread client by thread id, list chat threads.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2024-03-07-stackql-generated
  x-serviceAlias: communication_chat
  x-sdkPackage: azure-communication-chat
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ChatThreadItem:
      type: object
      description: Summary information of a chat thread. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: Chat thread id. Required.
        topic:
          type: string
          description: Chat thread topic. Required.
        deletedOn:
          type: string
          format: date-time
          description: "The timestamp when the chat thread was deleted. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        lastMessageReceivedOn:
          type: string
          format: date-time
          description: "The timestamp when the last message arrived at the server. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
      required:
        - id
        - topic
    PagedChatThreadItem:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ChatThreadItem"
        nextLink:
          type: string
    ChatParticipant:
      type: object
      description: A participant of the chat thread. All required parameters must be populated in order to send to server.
      properties:
        communicationIdentifier:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value. Required."
        displayName:
          type: string
          description: Display name for the chat participant.
        shareHistoryTime:
          type: string
          format: date-time
          description: "Time from which the chat history is shared with the participant. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
      required:
        - communicationIdentifier
    CommunicationIdentifierModel:
      type: object
      description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value."
      properties:
        kind:
          type: string
          description: 'The identifier kind. Only required in responses. Known values are: "unknown", "communicationUser", "phoneNumber", "microsoftTeamsUser", and "microsoftTeamsApp".'
        rawId:
          type: string
          description: Raw Id of the identifier. Optional in requests, required in responses.
        communicationUser:
          $ref: "#/components/schemas/CommunicationUserIdentifierModel"
          description: The communication user.
        phoneNumber:
          $ref: "#/components/schemas/PhoneNumberIdentifierModel"
          description: The phone number.
        microsoftTeamsUser:
          $ref: "#/components/schemas/MicrosoftTeamsUserIdentifierModel"
          description: The Microsoft Teams user.
        microsoftTeamsApp:
          $ref: "#/components/schemas/MicrosoftTeamsAppIdentifierModel"
          description: The Microsoft Teams application.
    CommunicationUserIdentifierModel:
      type: object
      description: A user that got created with an Azure Communication Services resource. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: The Id of the communication user. Required.
      required:
        - id
    PhoneNumberIdentifierModel:
      type: object
      description: A phone number. All required parameters must be populated in order to send to server.
      properties:
        value:
          type: string
          description: The phone number in E.164 format. Required.
      required:
        - value
    MicrosoftTeamsUserIdentifierModel:
      type: object
      description: A Microsoft Teams user. All required parameters must be populated in order to send to server.
      properties:
        userId:
          type: string
          description: The Id of the Microsoft Teams user. If not anonymous, this is the AAD object Id of the user. Required.
        isAnonymous:
          type: boolean
          description: True if the Microsoft Teams user is anonymous. By default false if missing.
        cloud:
          type: string
          description: "The cloud that the Microsoft Teams user belongs to. By default 'public' if missing. Known values are: \"public\", \"dod\", and \"gcch\"."
      required:
        - userId
    MicrosoftTeamsAppIdentifierModel:
      type: object
      description: A Microsoft Teams application. All required parameters must be populated in order to send to server.
      properties:
        appId:
          type: string
          description: The Id of the Microsoft Teams application. Required.
        cloud:
          type: string
          description: "The cloud that the Microsoft Teams application belongs to. By default 'public' if missing. Known values are: \"public\", \"dod\", and \"gcch\"."
      required:
        - appId
    CreateChatThreadResult:
      type: object
      description: Result of the create chat thread operation. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        chatThread:
          $ref: "#/components/schemas/ChatThreadProperties"
          description: Chat thread.
        invalidParticipants:
          type: array
          items:
            $ref: "#/components/schemas/ChatError"
          description: The participants that failed to be added to the chat thread.
    ChatThreadProperties:
      type: object
      description: Chat thread. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: Chat thread id. Required.
        topic:
          type: string
          description: Chat thread topic. Required.
        createdOn:
          type: string
          format: date-time
          description: "The timestamp when the chat thread was created. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`. Required."
        createdByCommunicationIdentifier:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value. Required."
        deletedOn:
          type: string
          format: date-time
          description: "The timestamp when the chat thread was deleted. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
      required:
        - id
        - topic
        - createdOn
        - createdByCommunicationIdentifier
    ChatError:
      type: object
      description: The Communication Services error. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        code:
          type: string
          description: The error code. Required.
        message:
          type: string
          description: The error message. Required.
        target:
          type: string
          description: The error target.
        details:
          type: array
          items:
            $ref: "#/components/schemas/ChatError"
          description: Further details about specific errors that led to this error.
        innererror:
          $ref: "#/components/schemas/ChatError"
          description: The inner error if any.
      required:
        - code
        - message
    ChatMessageReadReceipt:
      type: object
      description: A chat message read receipt indicates the time a chat message was read by a recipient. All required parameters must be populated in order to send to server.
      properties:
        senderCommunicationIdentifier:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value. Required."
        chatMessageId:
          type: string
          description: Id of the chat message that has been read. This id is generated by the server. Required.
        readOn:
          type: string
          format: date-time
          description: "The time at which the message was read. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`. Required."
      required:
        - senderCommunicationIdentifier
        - chatMessageId
        - readOn
    PagedChatMessageReadReceipt:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessageReadReceipt"
        nextLink:
          type: string
    ChatMessageContent:
      type: object
      description: Content of a chat message.
      properties:
        message:
          type: string
          description: Chat message content for messages of types text or html.
        topic:
          type: string
          description: Chat message content for messages of type topicUpdated.
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ChatParticipant"
          description: Chat message content for messages of types participantAdded or participantRemoved.
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/ChatAttachment"
          description: List of attachments for this message.
        initiatorCommunicationIdentifier:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value."
    ChatAttachment:
      type: object
      description: An attachment in a chat message. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: Id of the attachment. Required.
        attachmentType:
          type: string
          description: 'The type of attachment. Required. Known values are: "image" and "file".'
        name:
          type: string
          description: The name of the attachment content.
        url:
          type: string
          description: The URL where the attachment can be downloaded.
        previewUrl:
          type: string
          description: The URL where the preview of attachment can be downloaded.
      required:
        - id
        - attachmentType
    ChatMessage:
      type: object
      description: Chat message. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: The id of the chat message. This id is server generated. Required.
        type:
          type: string
          description: 'The chat message type. Required. Known values are: "text", "html", "topicUpdated", "participantAdded", and "participantRemoved".'
        sequenceId:
          type: string
          description: Sequence of the chat message in the conversation. Required.
        version:
          type: string
          description: Version of the chat message. Required.
        content:
          $ref: "#/components/schemas/ChatMessageContent"
          description: Content of a chat message.
        senderDisplayName:
          type: string
          description: The display name of the chat message sender. This property is used to populate sender name for push notifications.
        createdOn:
          type: string
          format: date-time
          description: "The timestamp when the chat message arrived at the server. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`. Required."
        senderCommunicationIdentifier:
          $ref: "#/components/schemas/CommunicationIdentifierModel"
          description: "Identifies a participant in Azure Communication services. A participant is, for example, a phone number or an Azure communication user. This model is polymorphic: Apart from kind and rawId, at most one further property may be set which must match the kind enum value."
        deletedOn:
          type: string
          format: date-time
          description: "The timestamp (if applicable) when the message was deleted. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        editedOn:
          type: string
          format: date-time
          description: "The last timestamp (if applicable) when the message was edited. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`."
        metadata:
          type: object
          properties: {}
          description: Message metadata.
      required:
        - id
        - type
        - sequenceId
        - version
        - createdOn
    PagedChatMessage:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        nextLink:
          type: string
    PagedChatParticipant:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ChatParticipant"
        nextLink:
          type: string
    SendChatMessageResult:
      type: object
      description: Result of the send message operation. All required parameters must be populated in order to send to server.
      properties:
        id:
          type: string
          description: A server-generated message id. Required.
      required:
        - id
    AddChatParticipantsResult:
      type: object
      description: Result of the add chat participants operation. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        invalidParticipants:
          type: array
          items:
            $ref: "#/components/schemas/ChatError"
          description: The participants that failed to be added to the chat thread.
