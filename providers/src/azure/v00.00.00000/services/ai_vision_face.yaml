  /detect:
    post:
      operationId: FaceSessionClient_detect_from_session_image
      description: Detect human faces in an image, return face rectangles, and optionally with faceIds, landmarks, and attributes. Please refer to https://learn.microsoft.com/rest/api/face/face-detection-operations/detect-from-session-image-id for more details.
      parameters:
        - name: detectionModel
          in: query
          required: false
          schema:
            type: string
          description: "The 'detectionModel' associated with the detected faceIds. Supported 'detectionModel' values include 'detection_01', 'detection_02' and 'detection_03'. The default value is 'detection_01'. 'detection_03' is recommended since its accuracy is improved on smaller faces (64x64 pixels) and rotated face orientations. Known values are: \"detection_01\", \"detection_02\", and \"detection_03\". Default value is None."
        - name: recognitionModel
          in: query
          required: false
          schema:
            type: string
          description: "The 'recognitionModel' associated with the detected faceIds. Supported 'recognitionModel' values include 'recognition_01', 'recognition_02', 'recognition_03' or 'recognition_04'. The default value is 'recognition_01'. 'recognition_04' is recommended since its accuracy is improved on faces wearing masks compared with 'recognition_03', and its overall accuracy is improved compared with 'recognition_01' and 'recognition_02'. Known values are: \"recognition_01\", \"recognition_02\", \"recognition_03\", and \"recognition_04\". Default value is None."
        - name: returnFaceId
          in: query
          required: false
          schema:
            type: boolean
          description: Return faceIds of the detected faces or not. The default value is true. Default value is None.
        - name: returnFaceAttributes
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Analyze and return the one or more specified face attributes in the comma-separated string like 'returnFaceAttributes=headPose,glasses'. Face attribute analysis has additional computational and time cost. Default value is None.
        - name: returnFaceLandmarks
          in: query
          required: false
          schema:
            type: boolean
          description: Return face landmarks of the detected faces or not. The default value is false. Default value is None.
        - name: returnRecognitionModel
          in: query
          required: false
          schema:
            type: boolean
          description: Return 'recognitionModel' or not. The default value is false. This is only applicable when returnFaceId = true. Default value is None.
        - name: faceIdTimeToLive
          in: query
          required: false
          schema:
            type: integer
          description: The number of seconds for the face ID being cached. Supported range from 60 seconds up to 86400 seconds. The default value is 86400 (24 hours). Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaceDetectionResult"
