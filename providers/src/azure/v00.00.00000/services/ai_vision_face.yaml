  /largepersongroups/{large_person_group_id}/persons/{person_id}/persistedfaces:
    post:
      operationId: LargePersonGroup_add_face_from_url
      description: Add a face to a person into a Large Person Group for face identification or verification. Please refer to https://learn.microsoft.com/rest/api/face/person-group-operations/add-large-person-group-person-face-from-url for more details.
      parameters:
        - name: large_person_group_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the container. Required.
        - name: person_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the person. Required.
        - name: targetFace
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          description: A face rectangle to specify the target face to be added to a person, in the format of 'targetFace=left,top,width,height'. Default value is None.
        - name: detectionModel
          in: query
          required: false
          schema:
            type: string
          description: "The 'detectionModel' associated with the detected faceIds. Supported 'detectionModel' values include 'detection_01', 'detection_02' and 'detection_03'. The default value is 'detection_01'. Known values are: \"detection_01\", \"detection_02\", and \"detection_03\". Default value is None."
        - name: userData
          in: query
          required: false
          schema:
            type: string
          description: User-provided data attached to the face. The size limit is 1K. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddFaceResult"
