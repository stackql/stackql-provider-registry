paths:
  /findsimilars:
    post:
      operationId: FaceClient_find_similar
      description: Given query face's faceId, to search the similar-looking faces from a faceId array. A faceId array contains the faces created by Detect. Please refer to https://learn.microsoft.com/rest/api/face/face-recognition-operations/find-similar for more details.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaceFindSimilarResult"
  /verify:
    post:
      operationId: FaceClient_verify_face_to_face
      description: Verify whether two faces belong to a same person. Please refer to https://learn.microsoft.com/rest/api/face/face-recognition-operations/verify-face-to-face for more details.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaceVerificationResult"
  /group:
    post:
      operationId: FaceClient_group
      description: Divide candidate faces into groups based on face similarity. Please refer to https://learn.microsoft.com/rest/api/face/face-recognition-operations/group for more details.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaceGroupingResult"
  /identify:
    post:
      operationId: FaceClient_identify_from_large_person_group
      description: 1-to-many identification to find the closest matches of the specific query person face from a Large Person Group. Please refer to https://learn.microsoft.com/rest/api/face/face-recognition-operations/identify-from-person-group for more details.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaceIdentificationResult"
  /detectLiveness/singleModal/sessions/{session_id}:
    get:
      operationId: FaceSessionClient_get_liveness_session_result
      description: Please refer to https://learn.microsoft.com/rest/api/face/liveness-session-operations/get-liveness-session-result for more details.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID to reference this session. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessSession"
    delete:
      operationId: FaceSessionClient_delete_liveness_session
      description: Delete all session related information for matching the specified session id. Please refer to https://learn.microsoft.com/rest/api/face/liveness-session-operations/delete-liveness-session for more details.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID to reference this session. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /detectLiveness/singleModal/sessions:
    get:
      operationId: FaceSessionClient_get_liveness_sessions
      description: Lists sessions for /detectLiveness/SingleModal. Please refer to https://learn.microsoft.com/rest/api/face/liveness-session-operations/get-liveness-sessions for more details.
      parameters:
        - name: start
          in: query
          required: false
          schema:
            type: string
          description: List resources greater than the "start". It contains no more than 64 characters. Default is empty. Default value is None.
        - name: top
          in: query
          required: false
          schema:
            type: integer
          description: The number of items to list, ranging in [1, 1000]. Default is 1000. Default value is None.
