        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessSessionItem"
    post:
      operationId: FaceSessionClient_create_liveness_session
      description: Create a new detect liveness session. Please refer to https://learn.microsoft.com/rest/api/face/liveness-session-operations/create-liveness-session for more details.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                livenessOperationMode:
                  $ref: "#/components/schemas/LivenessOperationMode"
                  description: 'Type of liveness mode the client should follow. Required. Known values are: "Passive" and "PassiveActive".'
                sendResultsToClient:
                  type: boolean
                  description: Whether or not to allow a '200 - Success' response body to be sent to the client, which may be undesirable for security reasons. Default is false, clients will receive a '204 - NoContent' empty body response. Regardless of selection, calling Session GetResult will always contain a response body enabling business logic to be implemented.
                deviceCorrelationIdSetInClient:
                  type: boolean
                  description: Whether or not to allow client to set their own 'deviceCorrelationId' via the Vision SDK. Default is false, and 'deviceCorrelationId' must be set in this request body.
                enableSessionImage:
                  type: boolean
                  description: Whether or not store the session image.
                livenessSingleModalModel:
                  $ref: "#/components/schemas/LivenessModel"
                  description: 'The model version used for liveness classification. This is an optional parameter, and if this is not specified, then the latest supported model version will be chosen. Known values are: "2022-10-15-preview.04" and "2023-12-20-preview.06".'
                deviceCorrelationId:
                  type: string
                  description: Unique Guid per each end-user device. This is to provide rate limiting and anti-hammering. If 'deviceCorrelationIdSetInClient' is true in this request, this 'deviceCorrelationId' must be null.
                authTokenTimeToLiveInSeconds:
                  type: integer
                  description: Seconds the session should last for. Range is 60 to 86400 seconds. Default value is 600.
              required:
                - livenessOperationMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLivenessSessionResult"
