openapi: 3.0.0
servers:
  - url: https://{endpoint}/face/{api_version}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
      api_version:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `apiVersion` parameter.
info:
  title: Azure AI Vision - Face (Data Plane)
  description: Face detection, verification, identification and liveness operations.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: unversioned-stackql-generated
  x-serviceAlias: ai_vision_face
  x-sdkPackage: azure-ai-vision-face
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    FaceFindSimilarResult:
      type: object
      description: Response body for find similar face operation.
      properties:
        confidence:
          type: number
          description: Confidence value of the candidate. The higher confidence, the more similar. Range between [0,1]. Required.
        faceId:
          type: string
          description: faceId of candidate face when find by faceIds. faceId is created by "Detect" and will expire 24 hours after the detection call.
        persistedFaceId:
          type: string
          description: persistedFaceId of candidate face when find by faceListId or largeFaceListId. persistedFaceId in face list/large face list is persisted and will not expire.
      required:
        - confidence
    FaceVerificationResult:
      type: object
      description: Verify result.
      properties:
        isIdentical:
          type: boolean
          description: True if the two faces belong to the same person or the face belongs to the person, otherwise false. Required.
        confidence:
          type: number
          description: A number indicates the similarity confidence of whether two faces belong to the same person, or whether the face belongs to the person. By default, isIdentical is set to True if similarity confidence is greater than or equal to 0.5. This is useful for advanced users to override 'isIdentical' and fine-tune the result on their own data. Required.
      required:
        - isIdentical
        - confidence
    FaceGroupingResult:
      type: object
      description: Response body for group face operation.
      properties:
        groups:
          type: array
          items:
            type: array
            items:
              type: string
          description: A partition of the original faces based on face similarity. Groups are ranked by number of faces. Required.
        messyGroup:
          type: array
          items:
            type: string
          description: Face ids array of faces that cannot find any similar faces from original faces. Required.
      required:
        - groups
        - messyGroup
    FaceIdentificationResult:
      type: object
      description: Identify result.
      properties:
        faceId:
          type: string
          description: faceId of the query face. Required.
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/FaceIdentificationCandidate"
          description: Identified person candidates for that face (ranked by confidence). Array size should be no larger than input maxNumOfCandidatesReturned. If no person is identified, will return an empty array. Required.
      required:
        - faceId
        - candidates
    FaceIdentificationCandidate:
      type: object
      description: Candidate for identify call.
      properties:
        personId:
          type: string
          description: personId of candidate person. Required.
        confidence:
          type: number
          description: Confidence value of the candidate. The higher confidence, the more similar. Range between [0,1]. Required.
      required:
        - personId
        - confidence
    FaceSessionStatus:
      type: string
      enum:
        - NotStarted
        - Started
        - ResultAvailable
    LivenessSessionAuditEntry:
      type: object
      description: Audit entry for a request in session.
      properties:
        id:
          type: integer
          description: The unique id to refer to this audit request. Use this id with the 'start' query parameter to continue on to the next page of audit results. Required.
        sessionId:
          type: string
          description: The unique sessionId of the created session. It will expire 48 hours after it was created or may be deleted sooner using the corresponding session DELETE operation. Required.
        requestId:
          type: string
          description: The unique requestId that is returned by the service to the client in the 'apim-request-id' header. Required.
        clientRequestId:
          type: string
          description: The unique clientRequestId that is sent by the client in the 'client-request-id' header. Required.
        receivedDateTime:
          type: string
          format: date-time
          description: The UTC DateTime that the request was received. Required.
        request:
          $ref: "#/components/schemas/AuditRequestInfo"
          description: The request of this entry. Required.
        response:
          $ref: "#/components/schemas/AuditLivenessResponseInfo"
          description: The response of this entry. Required.
        digest:
          type: string
          description: The server calculated digest for this request. If the client reported digest differs from the server calculated digest, then the message integrity between the client and service has been compromised and the result should not be trusted. For more information, see how to guides on how to leverage this value to secure your end-to-end solution. Required.
        sessionImageId:
          type: string
          description: The image ID of the session request.
        verifyImageHash:
          type: string
          description: The sha256 hash of the verify-image in the request.
      required:
        - id
        - sessionId
        - requestId
        - clientRequestId
        - receivedDateTime
        - request
        - response
        - digest
    AuditRequestInfo:
      type: object
      description: Audit entry for a request in the session.
      properties:
        url:
          type: string
          description: The relative URL and query of the liveness request. Required.
        method:
          type: string
          description: The HTTP method of the request (i.e., GET, POST, DELETE). Required.
        contentLength:
          type: integer
          description: The length of the request body in bytes.
        contentType:
          type: string
          description: The content type of the request. Required.
        userAgent:
          type: string
          description: The user agent used to submit the request.
      required:
        - url
        - method
        - contentType
    AuditLivenessResponseInfo:
      type: object
      description: Audit entry for a response in the session.
      properties:
        body:
          $ref: "#/components/schemas/LivenessResponseBody"
          description: The response body. The schema of this field will depend on the request.url and request.method used by the client. Required.
        statusCode:
          type: integer
          description: The HTTP status code returned to the client. Required.
        latencyInMilliseconds:
          type: integer
          description: The server measured latency for this request in milliseconds. Required.
      required:
        - body
        - statusCode
        - latencyInMilliseconds
    LivenessResponseBody:
      type: object
      description: The response body of detect liveness API call.
      properties:
        livenessDecision:
          $ref: "#/components/schemas/FaceLivenessDecision"
          description: 'The liveness classification for the target face. Known values are: "uncertain", "realface", and "spoofface".'
        target:
          $ref: "#/components/schemas/LivenessOutputsTarget"
          description: Specific targets used for liveness classification.
        modelVersionUsed:
          $ref: "#/components/schemas/LivenessModel"
          description: 'The model version used for liveness classification. Known values are: "2022-10-15-preview.04" and "2023-12-20-preview.06".'
        verifyResult:
          $ref: "#/components/schemas/LivenessWithVerifyOutputs"
          description: The face verification output. Only available when the request is liveness with verify.
    FaceLivenessDecision:
      type: string
      enum:
        - uncertain
        - realface
        - spoofface
    LivenessOutputsTarget:
      type: object
      description: The liveness classification for target face.
      properties:
        faceRectangle:
          $ref: "#/components/schemas/FaceRectangle"
          description: The face region where the liveness classification was made on. Required.
        fileName:
          type: string
          description: The file name which contains the face rectangle where the liveness classification was made on. Required.
        timeOffsetWithinFile:
          type: integer
          description: The time offset within the file of the frame which contains the face rectangle where the liveness classification was made on. Required.
        imageType:
          $ref: "#/components/schemas/FaceImageType"
          description: 'The image type which contains the face rectangle where the liveness classification was made on. Required. Known values are: "Color", "Infrared", and "Depth".'
      required:
        - faceRectangle
        - fileName
        - timeOffsetWithinFile
        - imageType
    FaceRectangle:
      type: object
      description: A rectangle within which a face can be found.
      properties:
        top:
          type: integer
          description: The distance from the top edge if the image to the top edge of the rectangle, in pixels. Required.
        left:
          type: integer
          description: The distance from the left edge if the image to the left edge of the rectangle, in pixels. Required.
        width:
          type: integer
          description: The width of the rectangle, in pixels. Required.
        height:
          type: integer
          description: The height of the rectangle, in pixels. Required.
      required:
        - top
        - left
        - width
        - height
    FaceImageType:
      type: string
      enum:
        - Color
        - Infrared
        - Depth
    LivenessModel:
      type: string
      enum:
        - 2022-10-15-preview.04
        - 2023-12-20-preview.06
    LivenessWithVerifyOutputs:
      type: object
      description: The face verification output.
      properties:
        verifyImage:
          $ref: "#/components/schemas/LivenessWithVerifyImage"
          description: The detail of face for verification. Required.
        matchConfidence:
          type: number
          description: The target face liveness face and comparison image face verification confidence. Required.
        isIdentical:
          type: boolean
          description: Whether the target liveness face and comparison image face match. Required.
      required:
        - verifyImage
        - matchConfidence
        - isIdentical
    LivenessWithVerifyImage:
      type: object
      description: The detail of face for verification.
      properties:
        faceRectangle:
          $ref: "#/components/schemas/FaceRectangle"
          description: The face region where the comparison image's classification was made. Required.
        qualityForRecognition:
          $ref: "#/components/schemas/QualityForRecognition"
          description: 'Quality of face image for recognition. Required. Known values are: "low", "medium", and "high".'
      required:
        - faceRectangle
        - qualityForRecognition
    QualityForRecognition:
      type: string
      enum:
        - low
        - medium
        - high
    LivenessSession:
      type: object
      description: Session result of detect liveness. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        id:
          type: string
          description: The unique ID to reference this session. Required.
        createdDateTime:
          type: string
          format: date-time
          description: DateTime when this session was created. Required.
        sessionStartDateTime:
          type: string
          format: date-time
          description: DateTime when this session was started by the client.
        sessionExpired:
          type: boolean
          description: Whether or not the session is expired. Required.
        deviceCorrelationId:
          type: string
          description: Unique Guid per each end-user device. This is to provide rate limiting and anti-hammering. If 'deviceCorrelationIdSetInClient' is true in this request, this 'deviceCorrelationId' must be null.
        authTokenTimeToLiveInSeconds:
          type: integer
          description: Seconds the session should last for. Range is 60 to 86400 seconds. Default value is 600.
        status:
          $ref: "#/components/schemas/FaceSessionStatus"
          description: 'The current status of the session. Required. Known values are: "NotStarted", "Started", and "ResultAvailable".'
        result:
          $ref: "#/components/schemas/LivenessSessionAuditEntry"
          description: The latest session audit result only populated if status == 'ResultAvailable'.
      required:
        - createdDateTime
        - sessionExpired
        - status
    LivenessSessionItem:
      type: object
      description: Session data returned for enumeration. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        id:
          type: string
          description: The unique ID to reference this session. Required.
        createdDateTime:
          type: string
          format: date-time
          description: DateTime when this session was created. Required.
        sessionStartDateTime:
          type: string
          format: date-time
          description: DateTime when this session was started by the client.
        sessionExpired:
          type: boolean
          description: Whether or not the session is expired. Required.
        deviceCorrelationId:
          type: string
          description: Unique Guid per each end-user device. This is to provide rate limiting and anti-hammering. If 'deviceCorrelationIdSetInClient' is true in this request, this 'deviceCorrelationId' must be null.
        authTokenTimeToLiveInSeconds:
          type: integer
          description: Seconds the session should last for. Range is 60 to 86400 seconds. Default value is 600.
      required:
        - createdDateTime
        - sessionExpired
    LivenessWithVerifySession:
      type: object
      description: Session result of detect liveness with verify. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        id:
          type: string
          description: The unique ID to reference this session. Required.
        createdDateTime:
          type: string
          format: date-time
          description: DateTime when this session was created. Required.
        sessionStartDateTime:
          type: string
          format: date-time
          description: DateTime when this session was started by the client.
        sessionExpired:
          type: boolean
          description: Whether or not the session is expired. Required.
        deviceCorrelationId:
          type: string
          description: Unique Guid per each end-user device. This is to provide rate limiting and anti-hammering. If 'deviceCorrelationIdSetInClient' is true in this request, this 'deviceCorrelationId' must be null.
        authTokenTimeToLiveInSeconds:
          type: integer
          description: Seconds the session should last for. Range is 60 to 86400 seconds. Default value is 600.
        status:
          $ref: "#/components/schemas/FaceSessionStatus"
          description: 'The current status of the session. Required. Known values are: "NotStarted", "Started", and "ResultAvailable".'
        result:
          $ref: "#/components/schemas/LivenessSessionAuditEntry"
          description: The latest session audit result only populated if status == 'ResultAvailable'.
      required:
        - createdDateTime
        - sessionExpired
        - status
    LivenessOperationMode:
      type: string
      enum:
        - Passive
        - PassiveActive
    CreateLivenessSessionResult:
      type: object
      description: Response of liveness session creation.
      properties:
        sessionId:
          type: string
          description: The unique session ID of the created session. It will expire 48 hours after it was created or may be deleted sooner using the corresponding Session DELETE operation. Required.
        authToken:
          type: string
          description: Bearer token to provide authentication for the Vision SDK running on a client application. This Bearer token has limited permissions to perform only the required action and expires after the TTL time. It is also auditable. Required.
      required:
        - sessionId
        - authToken
    FaceDetectionResult:
      type: object
      description: Response for detect API.
      properties:
        faceId:
          type: string
          description: Unique faceId of the detected face, created by detection API and it will expire 24 hours after the detection call. To return this, it requires 'returnFaceId' parameter to be true.
        recognitionModel:
          $ref: "#/components/schemas/FaceRecognitionModel"
          description: "The 'recognitionModel' associated with this faceId. This is only returned when 'returnRecognitionModel' is explicitly set as true. Known values are: \"recognition_01\", \"recognition_02\", \"recognition_03\", and \"recognition_04\"."
        faceRectangle:
          $ref: "#/components/schemas/FaceRectangle"
          description: A rectangle area for the face location on image. Required.
        faceLandmarks:
          $ref: "#/components/schemas/FaceLandmarks"
          description: An array of 27-point face landmarks pointing to the important positions of face components. To return this, it requires 'returnFaceLandmarks' parameter to be true.
        faceAttributes:
          $ref: "#/components/schemas/FaceAttributes"
          description: Face attributes for detected face.
      required:
        - faceRectangle
    FaceRecognitionModel:
      type: string
      enum:
        - recognition_01
        - recognition_02
        - recognition_03
        - recognition_04
    FaceLandmarks:
      type: object
      description: A collection of 27-point face landmarks pointing to the important positions of face components.
      properties:
        pupilLeft:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the left eye pupil. Required.
        pupilRight:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the right eye pupil. Required.
        noseTip:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the nose tip. Required.
        mouthLeft:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the mouth left. Required.
        mouthRight:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the mouth right. Required.
        eyebrowLeftOuter:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the left eyebrow outer. Required.
        eyebrowLeftInner:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the left eyebrow inner. Required.
        eyeLeftOuter:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the left eye outer. Required.
        eyeLeftTop:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the left eye top. Required.
        eyeLeftBottom:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the left eye bottom. Required.
        eyeLeftInner:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the left eye inner. Required.
        eyebrowRightInner:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the right eyebrow inner. Required.
        eyebrowRightOuter:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the right eyebrow outer. Required.
        eyeRightInner:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the right eye inner. Required.
        eyeRightTop:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the right eye top. Required.
        eyeRightBottom:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the right eye bottom. Required.
        eyeRightOuter:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the right eye outer. Required.
        noseRootLeft:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the nose root left. Required.
        noseRootRight:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the nose root right. Required.
        noseLeftAlarTop:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the nose left alar top. Required.
        noseRightAlarTop:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the nose right alar top. Required.
        noseLeftAlarOutTip:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the nose left alar out tip. Required.
        noseRightAlarOutTip:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the nose right alar out tip. Required.
        upperLipTop:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the upper lip top. Required.
        upperLipBottom:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the upper lip bottom. Required.
        underLipTop:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the under lip top. Required.
        underLipBottom:
          $ref: "#/components/schemas/LandmarkCoordinate"
          description: The coordinates of the under lip bottom. Required.
      required:
        - pupilLeft
        - pupilRight
        - noseTip
        - mouthLeft
        - mouthRight
        - eyebrowLeftOuter
        - eyebrowLeftInner
        - eyeLeftOuter
        - eyeLeftTop
        - eyeLeftBottom
        - eyeLeftInner
        - eyebrowRightInner
        - eyebrowRightOuter
        - eyeRightInner
        - eyeRightTop
        - eyeRightBottom
        - eyeRightOuter
        - noseRootLeft
        - noseRootRight
        - noseLeftAlarTop
        - noseRightAlarTop
        - noseLeftAlarOutTip
        - noseRightAlarOutTip
        - upperLipTop
        - upperLipBottom
        - underLipTop
        - underLipBottom
    LandmarkCoordinate:
      type: object
      description: Landmark coordinates within an image.
      properties:
        x:
          type: number
          description: The horizontal component, in pixels. Required.
        "y":
          type: number
          description: The vertical component, in pixels. Required.
      required:
        - x
        - "y"
    FaceAttributes:
      type: object
      description: Face attributes for the detected face.
      properties:
        age:
          type: number
          description: Age in years.
        smile:
          type: number
          description: Smile intensity, a number between [0,1].
        facialHair:
          $ref: "#/components/schemas/FacialHair"
          description: Properties describing facial hair attributes.
        glasses:
          $ref: "#/components/schemas/GlassesType"
          description: 'Glasses type if any of the face. Known values are: "noGlasses", "readingGlasses", "sunglasses", and "swimmingGoggles".'
        headPose:
          $ref: "#/components/schemas/HeadPose"
          description: 3-D roll/yaw/pitch angles for face direction.
        hair:
          $ref: "#/components/schemas/HairProperties"
          description: Properties describing hair attributes.
        occlusion:
          $ref: "#/components/schemas/OcclusionProperties"
          description: Properties describing occlusions on a given face.
        accessories:
          type: array
          items:
            $ref: "#/components/schemas/AccessoryItem"
          description: Properties describing any accessories on a given face.
        blur:
          $ref: "#/components/schemas/BlurProperties"
          description: Properties describing any presence of blur within the image.
        exposure:
          $ref: "#/components/schemas/ExposureProperties"
          description: Properties describing exposure level of the image.
        noise:
          $ref: "#/components/schemas/NoiseProperties"
          description: Properties describing noise level of the image.
        mask:
          $ref: "#/components/schemas/MaskProperties"
          description: Properties describing the presence of a mask on a given face.
        qualityForRecognition:
          $ref: "#/components/schemas/QualityForRecognition"
          description: 'Properties describing the overall image quality regarding whether the image being used in the detection is of sufficient quality to attempt face recognition on. Known values are: "low", "medium", and "high".'
    FacialHair:
      type: object
      description: Properties describing facial hair attributes.
      properties:
        moustache:
          type: number
          description: A number ranging from 0 to 1 indicating a level of confidence associated with a property. Required.
        beard:
          type: number
          description: A number ranging from 0 to 1 indicating a level of confidence associated with a property. Required.
        sideburns:
          type: number
          description: A number ranging from 0 to 1 indicating a level of confidence associated with a property. Required.
      required:
        - moustache
        - beard
        - sideburns
    GlassesType:
      type: string
      enum:
        - noGlasses
        - readingGlasses
        - sunglasses
        - swimmingGoggles
    HeadPose:
      type: object
      description: 3-D roll/yaw/pitch angles for face direction.
      properties:
        pitch:
          type: number
          description: Value of angles. Required.
        roll:
          type: number
          description: Value of angles. Required.
        yaw:
          type: number
          description: Value of angles. Required.
      required:
        - pitch
        - roll
        - yaw
    HairProperties:
      type: object
      description: Properties describing hair attributes.
      properties:
        bald:
          type: number
          description: A number describing confidence level of whether the person is bald. Required.
        invisible:
          type: boolean
          description: A boolean value describing whether the hair is visible in the image. Required.
        hairColor:
          type: array
          items:
            $ref: "#/components/schemas/HairColor"
          description: An array of candidate colors and confidence level in the presence of each. Required.
      required:
        - bald
        - invisible
        - hairColor
    HairColor:
      type: object
      description: An array of candidate colors and confidence level in the presence of each.
      properties:
        color:
          $ref: "#/components/schemas/HairColorType"
          description: 'Name of the hair color. Required. Known values are: "unknown", "white", "gray", "blond", "brown", "red", "black", and "other".'
        confidence:
          type: number
          description: Confidence level of the color. Range between [0,1]. Required.
      required:
        - color
        - confidence
    HairColorType:
      type: string
      enum:
        - unknown
        - white
        - gray
        - blond
        - brown
        - red
        - black
        - other
    OcclusionProperties:
      type: object
      description: Properties describing occlusions on a given face.
      properties:
        foreheadOccluded:
          type: boolean
          description: A boolean value indicating whether forehead is occluded. Required.
        eyeOccluded:
          type: boolean
          description: A boolean value indicating whether eyes are occluded. Required.
        mouthOccluded:
          type: boolean
          description: A boolean value indicating whether the mouth is occluded. Required.
      required:
        - foreheadOccluded
        - eyeOccluded
        - mouthOccluded
    AccessoryItem:
      type: object
      description: Accessory item and corresponding confidence level.
      properties:
        type:
          $ref: "#/components/schemas/AccessoryType"
          description: 'Type of the accessory. Required. Known values are: "headwear", "glasses", and "mask".'
        confidence:
          type: number
          description: Confidence level of the accessory type. Range between [0,1]. Required.
      required:
        - type
        - confidence
    AccessoryType:
      type: string
      enum:
        - headwear
        - glasses
        - mask
    BlurProperties:
      type: object
      description: Properties describing any presence of blur within the image.
      properties:
        blurLevel:
          $ref: "#/components/schemas/BlurLevel"
          description: 'An enum value indicating level of blurriness. Required. Known values are: "low", "medium", and "high".'
        value:
          type: number
          description: A number indicating level of blurriness ranging from 0 to 1. Required.
      required:
        - blurLevel
        - value
    BlurLevel:
      type: string
      enum:
        - low
        - medium
        - high
    ExposureProperties:
      type: object
      description: Properties describing exposure level of the image.
      properties:
        exposureLevel:
          $ref: "#/components/schemas/ExposureLevel"
          description: 'An enum value indicating level of exposure. Required. Known values are: "underExposure", "goodExposure", and "overExposure".'
        value:
          type: number
          description: A number indicating level of exposure level ranging from 0 to 1. [0, 0.25) is under exposure. [0.25, 0.75) is good exposure. [0.75, 1] is over exposure. Required.
      required:
        - exposureLevel
        - value
    ExposureLevel:
      type: string
      enum:
        - underExposure
        - goodExposure
        - overExposure
    NoiseProperties:
      type: object
      description: Properties describing noise level of the image.
      properties:
        noiseLevel:
          $ref: "#/components/schemas/NoiseLevel"
          description: 'An enum value indicating level of noise. Required. Known values are: "low", "medium", and "high".'
        value:
          type: number
          description: A number indicating level of noise level ranging from 0 to 1. [0, 0.25) is under exposure. [0.25, 0.75) is good exposure. [0.75, 1] is over exposure. [0, 0.3) is low noise level. [0.3, 0.7) is medium noise level. [0.7, 1] is high noise level. Required.
      required:
        - noiseLevel
        - value
    NoiseLevel:
      type: string
      enum:
        - low
        - medium
        - high
    MaskProperties:
      type: object
      description: Properties describing the presence of a mask on a given face.
      properties:
        noseAndMouthCovered:
          type: boolean
          description: A boolean value indicating whether nose and mouth are covered. Required.
        type:
          $ref: "#/components/schemas/MaskType"
          description: 'Type of the mask. Required. Known values are: "faceMask", "noMask", "otherMaskOrOcclusion", and "uncertain".'
      required:
        - noseAndMouthCovered
        - type
    MaskType:
      type: string
      enum:
        - faceMask
        - noMask
        - otherMaskOrOcclusion
        - uncertain
    LargeFaceList:
      type: object
      description: Large face list is a list of faces, up to 1,000,000 faces. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        name:
          type: string
          description: User defined name, maximum length is 128. Required.
        userData:
          type: string
          description: Optional user defined data. Length should not exceed 16K.
        recognitionModel:
          $ref: "#/components/schemas/FaceRecognitionModel"
          description: 'Name of recognition model. Recognition model is used when the face features are extracted and associated with detected faceIds. Known values are: "recognition_01", "recognition_02", "recognition_03", and "recognition_04".'
        largeFaceListId:
          type: string
          description: Valid character is letter in lower case or digit or '-' or '_', maximum length is 64. Required.
      required:
        - name
    FaceOperationStatus:
      type: string
      enum:
        - notStarted
        - running
        - succeeded
        - failed
    FaceTrainingResult:
      type: object
      description: Training result of a container.
      properties:
        status:
          $ref: "#/components/schemas/FaceOperationStatus"
          description: 'Training status of the container. Required. Known values are: "notStarted", "running", "succeeded", and "failed".'
        createdDateTime:
          type: string
          format: date-time
          description: A combined UTC date and time string that describes the created time of the person group, large person group or large face list. Required.
        lastActionDateTime:
          type: string
          format: date-time
          description: A combined UTC date and time string that describes the last modify time of the person group, large person group or large face list, could be null value when the group is not successfully trained. Required.
        lastSuccessfulTrainingDateTime:
          type: string
          format: date-time
          description: A combined UTC date and time string that describes the last successful training time of the person group, large person group or large face list. Required.
        message:
          type: string
          description: Show failure message when training failed (omitted when training succeed).
      required:
        - status
        - createdDateTime
        - lastActionDateTime
        - lastSuccessfulTrainingDateTime
    LargeFaceListFace:
      type: object
      description: Face resource for large face list. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        persistedFaceId:
          type: string
          description: Face ID of the face. Required.
        userData:
          type: string
          description: User-provided data attached to the face. The length limit is 1K.
    AddFaceResult:
      type: object
      description: Response body for adding face.
      properties:
        persistedFaceId:
          type: string
          description: Persisted Face ID of the added face, which is persisted and will not expire. Different from faceId which is created in "Detect" and will expire in 24 hours after the detection call. Required.
      required:
        - persistedFaceId
    LargePersonGroup:
      type: object
      description: The container of the uploaded person data, including face recognition feature, and up to 1,000,000 people. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        name:
          type: string
          description: User defined name, maximum length is 128. Required.
        userData:
          type: string
          description: Optional user defined data. Length should not exceed 16K.
        recognitionModel:
          $ref: "#/components/schemas/FaceRecognitionModel"
          description: 'Name of recognition model. Recognition model is used when the face features are extracted and associated with detected faceIds. Known values are: "recognition_01", "recognition_02", "recognition_03", and "recognition_04".'
        largePersonGroupId:
          type: string
          description: ID of the container. Required.
      required:
        - name
    LargePersonGroupPerson:
      type: object
      description: The person in a specified large person group. To add face to this person, please call "Add Large Person Group Person Face". Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        personId:
          type: string
          description: ID of the person. Required.
        name:
          type: string
          description: User defined name, maximum length is 128. Required.
        userData:
          type: string
          description: Optional user defined data. Length should not exceed 16K.
        persistedFaceIds:
          type: array
          items:
            type: string
          description: Face ids of registered faces in the person.
      required:
        - name
    LargePersonGroupPersonFace:
      type: object
      description: Face resource for large person group person. Readonly variables are only populated by the server, and will be ignored when sending a request.
      properties:
        persistedFaceId:
          type: string
          description: Face ID of the face. Required.
        userData:
          type: string
          description: User-provided data attached to the face. The length limit is 1K.
    CreatePersonResult:
      type: object
      description: Response of create person.
      properties:
        personId:
          type: string
          description: Person ID of the person. Required.
      required:
        - personId
