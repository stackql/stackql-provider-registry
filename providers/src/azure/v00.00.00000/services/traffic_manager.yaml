openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Traffic Manager
  description: DNS-based traffic routing profiles, endpoints and user metrics keys.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2024-04-01-preview-stackql-generated
