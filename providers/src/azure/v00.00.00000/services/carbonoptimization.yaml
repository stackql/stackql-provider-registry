paths:
  /providers/Microsoft.Carbon/carbonEmissionReports?api-version=2025-04-01:
    post:
      operationId: CarbonService_query_carbon_emission_reports
      description: API for Carbon Emissions Reports.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reportType:
                  type: string
                  description: 'The ReportType requested for carbon emissions data. Required. Specifies how data is aggregated and displayed in the output, as explained in the ReportTypeEnum. Required. Known values are: "OverallSummaryReport", "MonthlySummaryReport", "TopItemsSummaryReport", "TopItemsMonthlySummaryReport", and "ItemDetailsReport".'
                dateRange:
                  $ref: "#/components/schemas/DateRange"
                  description: "The start and end dates for carbon emissions data. Required. For ItemDetailsReport and TopItemsSummaryReport, only one month of data is supported at a time, so start and end dates should be equal within DateRange (e.g., start: 2024-06-01 and end: 2024-06-01). Required."
                subscriptionList:
                  type: array
                  items:
                    type: string
                  description: List of subscription IDs for which carbon emissions data is requested. Required. Each subscription ID should be in lowercase format. The max length of list is 100. Required.
                resourceGroupUrlList:
                  type: array
                  items:
                    type: string
                  description: List of resource group URLs for carbon emissions data. Optional. Each URL must follow the format '/subscriptions/{subscriptionId}/resourcegroups/{resourceGroup}', and should be in all lowercase.
                resourceTypeList:
                  type: array
                  items:
                    type: string
                  description: List of resource types for carbon emissions data. Optional. Each resource type should be specified in lowercase, following the format 'microsoft.{service}/{resourceType}', e.g., 'microsoft.storage/storageaccounts'.
                locationList:
                  type: array
                  items:
                    type: string
                  description: List of locations(Azure Region Display Name) for carbon emissions data, with each location specified in lowercase (e.g., 'east us'). Optional. You can use the command 'az account list-locations -o table' to find Azure Region Display Names.
                carbonScopeList:
                  type: array
                  items:
                    $ref: "#/components/schemas/EmissionScopeEnum"
                  description: List of carbon emission scopes. Required. Accepts one or more values from EmissionScopeEnum (e.g., Scope1, Scope2, Scope3) in list form. The output will include the total emissions for the specified scopes. Required.
              required:
                - reportType
                - dateRange
                - subscriptionList
                - carbonScopeList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarbonEmissionDataListResult"
  /providers/Microsoft.Carbon/queryCarbonEmissionDataAvailableDateRange?api-version=2025-04-01:
    post:
      operationId: CarbonService_query_carbon_emission_data_available_date_range
      description: API for query carbon emission data available date range.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarbonEmissionDataAvailableDateRange"
  /providers/Microsoft.Carbon/operations?api-version=2025-04-01:
    get:
      operationId: carbonoptimization_list
      description: List the operations for the provider.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedOperation"
