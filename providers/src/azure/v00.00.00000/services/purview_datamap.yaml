openapi: 3.0.0
servers:
  - url: https://{endpoint}/datamap/api
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Data Map Client
  description: DataMapClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2023-09-01-stackql-generated
  x-serviceAlias: purview_datamap
  x-sdkPackage: azure-purview-datamap
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SearchFacetItem:
      type: object
      description: The content of a search facet result item.
      properties:
        count:
          type: integer
          description: The count of the facet item.
        facet:
          type: string
          description: The name of the facet item.
        sort:
          $ref: "#/components/schemas/SearchFacetSort"
          description: Define the sorting criteria for items.
    SearchFacetSort:
      type: object
      description: The sorting criteria.
      properties:
        count:
          $ref: "#/components/schemas/SearchSortOrder"
          description: 'Order by count. Known values are: "asc" and "desc".'
        value:
          $ref: "#/components/schemas/SearchSortOrder"
          description: 'Order by value. Known values are: "asc" and "desc".'
    SearchSortOrder:
      type: string
      enum:
        - asc
        - desc
    SearchTaxonomySetting:
      type: object
      description: Taxonomy setting for search request.
      properties:
        assetTypes:
          type: array
          items:
            type: string
          description: Asset types.
        facet:
          $ref: "#/components/schemas/SearchFacetItem"
          description: The content of a search facet result item.
    QueryResult:
      type: object
      description: The result of the search result.
      properties:
        "@search":
          type: object
          properties:
            count:
              type: integer
              description: The total number of search results (not the number of documents in a single page).
              properties:
                approximate:
                  type: boolean
                  description: "'True' if the '@search.count' is an approximate value and vise versa."
            facets:
              $ref: "#/components/schemas/SearchFacetResultValue"
              description: A facet list that consists of index fields assetType ,classification, contactId, and label. When the facet is specified in the request, the value of the facet is returned as an element of @search.facets.
        continuationToken:
          type: string
          description: The token used to get next batch of data. Absent if there's no more data.
        value:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultValue"
          description: Search result value.
    SearchFacetResultValue:
      type: object
      description: A facet list that consists of index fields assetType ,classification, contactId, and label. When the facet is specified in the request, the value of the facet is returned as an element of @search.facets.
      properties:
        entityType:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Entity type.
        assetType:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Asset type.
        classification:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Classification.
        term:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Term.
        contactId:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Contact id.
        contactType:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Contact type.
        label:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Label.
        glossaryType:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Glossary type.
        termStatus:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Term status.
        termTemplate:
          type: array
          items:
            $ref: "#/components/schemas/SearchFacetItemValue"
          description: Term template.
    SearchFacetItemValue:
      type: object
      description: The content of a search facet result item.
      properties:
        count:
          type: integer
          description: The count of the facet item.
        value:
          type: string
          description: The name of the facet item.
    SearchResultValue:
      type: object
      description: The value item of the search result.
      properties:
        "@search":
          type: object
          properties:
            score:
              type: number
              description: The search score calculated by the search engine. The results are ordered by search score by default.
            highlights:
              $ref: "#/components/schemas/SearchHighlights"
              description: A highlight list that consists of index fields id ,qualifiedName, name, description, entityType. When the keyword appears in those fields, the value of the field, attached with emphasis mark, is returned as an element of @search.highlights.
        objectType:
          type: string
          description: The object type of the record. Object type is the top-level property to distinguish whether a record is an asset or a term.
        createTime:
          type: integer
          description: The create time of the record. The Unix epoch format.
        updateTime:
          type: integer
          description: The last update time of the record. The Unix epoch format.
        id:
          type: string
          description: The GUID of the record.
        name:
          type: string
          description: The name of the record.
        qualifiedName:
          type: string
          description: The qualified name of the record.
        entityType:
          type: string
          description: The type name of the asset.
        description:
          type: string
          description: The description of the asset.
        endorsement:
          type: array
          items:
            type: string
          description: The endorsement of the asset.
        owner:
          type: string
          description: The owner of the record.
        classification:
          type: array
          items:
            type: string
          description: The classifications of the record.
        label:
          type: array
          items:
            type: string
          description: The labels of the asset.
        term:
          type: array
          items:
            $ref: "#/components/schemas/TermSearchResultValue"
          description: The terms assigned to the asset.
        contact:
          type: array
          items:
            $ref: "#/components/schemas/ContactSearchResultValue"
          description: The contacts of the asset.
        assetType:
          type: array
          items:
            type: string
          description: The asset types of the asset.
        glossaryType:
          type: string
          description: The type name of the term. Could be AtlasGlossary, AtlasGlossaryTerm or AtlasGlossaryCategory.
        glossary:
          type: string
          description: The glossary name of the term.
        termStatus:
          type: string
          description: The status of the term.
        termTemplate:
          type: array
          items:
            type: string
          description: The term template names used by the term.
        longDescription:
          type: string
          description: The definition of the term.
    SearchHighlights:
      type: object
      description: A highlight list that consists of index fields id ,qualifiedName, name, description, entityType. When the keyword appears in those fields, the value of the field, attached with emphasis mark, is returned as an element of @search.highlights.
      properties:
        id:
          type: array
          items:
            type: string
          description: Id.
        qualifiedName:
          type: array
          items:
            type: string
          description: Qualified name.
        name:
          type: array
          items:
            type: string
          description: Name.
        description:
          type: array
          items:
            type: string
          description: Description.
        entityType:
          type: array
          items:
            type: string
          description: Entity type.
    TermSearchResultValue:
      type: object
      description: The context.
      properties:
        name:
          type: string
          description: The name of the term.
        glossaryName:
          type: string
          description: The name of the glossary which contains the term.
        guid:
          type: string
          description: The GUID of the term.
    ContactSearchResultValue:
      type: object
      description: The contact in the search and suggest result.
      properties:
        id:
          type: string
          description: The GUID of the contact.
        info:
          type: string
          description: The description of the contact.
        contactType:
          type: string
          description: The type of the contact. It can be Expert or Owner for an entity. It can be Expert or Steward for a glossary term.
    SuggestResult:
      type: object
      description: The result item of the search suggest.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/SuggestResultValue"
          description: The result value.
    SuggestResultValue:
      type: object
      description: The value item of the search suggest.
      properties:
        "@search":
          type: object
          properties:
            score:
              type: number
              description: The search score calculated by the search engine. The results are ordered by search score by default.
            text:
              type: string
              description: The target text that contains the keyword as prefix. The keyword is wrapped with emphasis mark.
        objectType:
          type: string
          description: The object type of the record. Object type is the top-level property to distinguish whether a record is an asset or a term.
        createTime:
          type: integer
          description: The create time of the record. The Unix epoch format.
        updateTime:
          type: integer
          description: The last update time of the record. The Unix epoch format.
        id:
          type: string
          description: The GUID of the record.
        name:
          type: string
          description: The name of the record.
        qualifiedName:
          type: string
          description: The qualified name of the record.
        entityType:
          type: string
          description: The type name of the asset.
        description:
          type: string
          description: The description of the asset.
        endorsement:
          type: array
          items:
            type: string
          description: The endorsement of the asset.
        owner:
          type: string
          description: The owner of the record.
        classification:
          type: array
          items:
            type: string
          description: The classifications of the record.
        label:
          type: array
          items:
            type: string
          description: The labels of the asset.
        term:
          type: array
          items:
            $ref: "#/components/schemas/TermSearchResultValue"
          description: The terms assigned to the asset.
        contact:
          type: array
          items:
            $ref: "#/components/schemas/ContactSearchResultValue"
          description: The contacts of the asset.
        assetType:
          type: array
          items:
            type: string
          description: The asset types of the asset.
        glossaryType:
          type: string
          description: The type name of the term. Could be AtlasGlossary, AtlasGlossaryTerm or AtlasGlossaryCategory.
        glossary:
          type: string
          description: The glossary name of the term.
        termStatus:
          type: string
          description: The status of the term.
        termTemplate:
          type: array
          items:
            type: string
          description: The term template names used by the term.
        longDescription:
          type: string
          description: The definition of the term.
    AutoCompleteResult:
      type: object
      description: The result of the autocomplete request.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AutoCompleteResultValue"
          description: The result value.
    AutoCompleteResultValue:
      type: object
      description: The value item of the autocomplete suggest.
      properties:
        text:
          type: string
          description: The completed term or phrase.
        queryPlusText:
          type: string
          description: The completed search query text.
    AtlasEntity:
      type: object
      description: An instance of an entity - like hive_table, hive_database.
      properties:
        attributes:
          type: object
          properties: {}
          description: The attributes of the struct.
        typeName:
          type: string
          description: The name of the type.
        lastModifiedTS:
