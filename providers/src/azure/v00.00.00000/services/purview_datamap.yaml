      parameters:
        - name: type_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the type. Required.
        - name: direction
          in: query
          required: true
          schema:
            type: string
          description: 'The direction of the lineage, which could be INPUT, OUTPUT or BOTH. Known values are: "INPUT", "OUTPUT", and "BOTH". Required.'
        - name: depth
          in: query
          required: false
          schema:
            type: integer
          description: The number of hops for lineage. Default value is None.
        - name: attr:qualifiedName
          in: query
          required: false
          schema:
            type: string
          description: The qualified name of the entity. (This is only an example. qualifiedName can be changed to other unique attributes). Default value is None.
