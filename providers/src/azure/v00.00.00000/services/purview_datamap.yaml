    AtlasRelationshipDef:
      type: object
      description: "AtlasRelationshipDef is a TypeDef that defines a relationship. As with other typeDefs the AtlasRelationshipDef has a name. Once created the RelationshipDef has a guid. The name and the guid are the 2 ways that the RelationshipDef is identified. RelationshipDefs have 2 ends, each of which specify cardinality, an EntityDef type name and name and optionally whether the end is a container. RelationshipDefs can have AttributeDefs - though only primitive types are allowed. RelationshipDefs have a relationshipCategory specifying the UML type of relationship required The way EntityDefs and RelationshipDefs are intended to be used is that EntityDefs will define AttributeDefs these AttributeDefs will not specify an EntityDef type name as their types. RelationshipDefs introduce new attributes to the entity instances. For example EntityDef A might have attributes attr1,attr2,attr3 EntityDef B might have attributes attr4,attr5,attr6 RelationshipDef AtoB might define 2 ends end1: type A, name attr7 end2: type B, name attr8 When an instance of EntityDef A is created, it will have attributes attr1,attr2,attr3,attr7 When an instance of EntityDef B is created, it will have attributes attr4,attr5,attr6,attr8 In this way relationshipDefs can be authored separately from entityDefs and can inject relationship attributes into the entity instances."
      properties:
        category:
          $ref: "#/components/schemas/TypeCategory"
          description: 'The enum of type category. Known values are: "PRIMITIVE", "OBJECT_ID_TYPE", "ENUM", "STRUCT", "CLASSIFICATION", "ENTITY", "ARRAY", "MAP", "RELATIONSHIP", and "TERM_TEMPLATE".'
        createTime:
          type: integer
          description: The created time of the record.
        createdBy:
          type: string
          description: The user who created the record.
        dateFormatter:
          $ref: "#/components/schemas/DateFormat"
          description: The date format.
        description:
          type: string
          description: The description of the type definition.
        guid:
          type: string
          description: The GUID of the type definition.
        name:
          type: string
          description: The name of the type definition.
        options:
          type: object
          properties: {}
          description: The options for the type definition.
        serviceType:
          type: string
          description: The service type.
        typeVersion:
          type: string
          description: The version of the type.
        updateTime:
          type: integer
          description: The update time of the record.
        updatedBy:
          type: string
          description: The user who updated the record.
        version:
          type: integer
          description: The version of the record.
        lastModifiedTS:
          type: string
          description: ETag for concurrency control.
        attributeDefs:
          type: array
          items:
            $ref: "#/components/schemas/AtlasAttributeDef"
          description: An array of attribute definitions.
        endDef1:
          $ref: "#/components/schemas/AtlasRelationshipEndDef"
          description: The relationshipEndDef represents an end of the relationship. The end of the relationship is defined by a type, an attribute name, cardinality and whether it is the container end of the relationship.
        endDef2:
          $ref: "#/components/schemas/AtlasRelationshipEndDef"
          description: The relationshipEndDef represents an end of the relationship. The end of the relationship is defined by a type, an attribute name, cardinality and whether it is the container end of the relationship.
        relationshipCategory:
          $ref: "#/components/schemas/RelationshipCategory"
          description: 'The Relationship category determines the style of relationship around containment and lifecycle. UML terminology is used for the values. ASSOCIATION is a relationship with no containment. COMPOSITION and AGGREGATION are containment relationships. The difference being in the lifecycles of the container and its children. In the COMPOSITION case, the children cannot exist without the container. For AGGREGATION, the life cycles of the container and children are totally independent. Known values are: "ASSOCIATION", "AGGREGATION", and "COMPOSITION".'
        relationshipLabel:
          type: string
          description: The label of the relationship.
    AtlasRelationshipEndDef:
      type: object
      description: The relationshipEndDef represents an end of the relationship. The end of the relationship is defined by a type, an attribute name, cardinality and whether it is the container end of the relationship.
