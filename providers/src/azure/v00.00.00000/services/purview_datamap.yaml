paths:
  /search/query?api-version=2023-09-01:
    post:
      operationId: Discovery_query
      description: Get data using search.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                keywords:
                  type: string
                  description: The keywords applied to all searchable fields.
                limit:
                  type: integer
                  description: The limit of the number of the search result. default value is 50; maximum value is 1000.
                continuationToken:
                  type: string
                  description: The token used to get next batch of data. Default 'Null' to get the first batch, and will return new token in each response unless there's no more data.
                orderby:
                  type: array
                  items:
                    type: object
                    properties: {}
                  description: The sort order of search results, can specify multiple fields.
                filter:
                  type: object
                  properties: {}
                  description: The filter for the search. See examples for the usage of supported filters.
                facets:
                  type: array
                  items:
                    $ref: "#/components/schemas/SearchFacetItem"
                  description: The facets for search. See examples for the usage of supported facets.
                taxonomySetting:
                  $ref: "#/components/schemas/SearchTaxonomySetting"
                  description: The taxonomy setting for search.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResult"
  /search/suggest?api-version=2023-09-01:
    post:
      operationId: Discovery_suggest
      description: Get search suggestions by query criteria.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                keywords:
                  type: string
                  description: The keywords applied to all fields that support suggest operation. It must be at least 1 character, and no more than 100 characters. In the index schema we defined a default suggester which lists all the supported fields and specifies a search mode.
                limit:
                  type: integer
                  description: The number of suggestions we hope to return. The default value is 5. The value must be a number between 1 and 100.
                filter:
                  type: object
                  properties: {}
                  description: The filter for the search.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestResult"
  /search/autocomplete?api-version=2023-09-01:
    post:
      operationId: Discovery_auto_complete
      description: Get auto complete options.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                keywords:
                  type: string
                  description: The keywords applied to all fields that support autocomplete operation. It must be at least 1 character, and no more than 100 characters.
                limit:
                  type: integer
                  description: The number of autocomplete results we hope to return. The default value is 50. The value must be a number between 1 and 100.
                filter:
                  type: object
                  properties: {}
                  description: The filter for the autocomplete request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoCompleteResult"
  /atlas/v2/entity/guid/{guid}:
    get:
      operationId: Entity_get
      description: Get complete definition of an entity given its GUID.
      parameters:
        - name: guid
          in: path
          required: true
          schema:
            type: string
          description: The globally unique identifier of the entity. Required.
        - name: minExtInfo
          in: query
          required: false
          schema:
            type: boolean
          description: Whether to return minimal information for referred entities. Default value is None.
        - name: ignoreRelationships
          in: query
          required: false
          schema:
            type: boolean
          description: Whether to ignore relationship attributes. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtlasEntityWithExtInfo"
    put:
      operationId: Entity_update_attribute_by_id
      description: Update entity partially - create or update entity attribute identified by its GUID. Supports only primitive attribute type and entity references. It does not support updating complex types like arrays, and maps. Null updates are not possible.
      parameters:
        - name: guid
          in: path
          required: true
          schema:
            type: string
          description: The globally unique identifier of the entity. Required.
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: The name of the attribute. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityMutationResult"
    delete:
      operationId: Entity_delete
      description: Delete an entity identified by its GUID.
      parameters:
        - name: guid
          in: path
          required: true
          schema:
            type: string
          description: The globally unique identifier of the entity. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityMutationResult"
  /atlas/v2/entity?api-version=2023-09-01:
    post:
      operationId: Entity_create_or_update
      description: "Create or update an entity. Existing entity is matched using its unique guid if supplied or by its unique attributes eg: qualifiedName. Map and array of collections are not well supported. E.g., array>, array>. For each contact type, the maximum number of contacts is 20."
      parameters:
        - name: businessAttributeUpdateBehavior
          in: query
          required: false
          schema:
            type: string
          description: 'Used to define the update behavior for business attributes when updating entities. Known values are: "ignore", "replace", and "merge". Default value is None.'
        - name: collectionId
          in: query
          required: false
          schema:
            type: string
          description: The collection where entities will be moved to. Only specify a value if you need to move an entity to another collection. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                referredEntities:
                  type: object
                  properties: {}
                  description: The referred entities.
                entity:
                  $ref: "#/components/schemas/AtlasEntity"
                  description: An instance of an entity - like hive_table, hive_database.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityMutationResult"
  /atlas/v2/entity/bulk?api-version=2023-09-01:
    get:
      operationId: Entity_get_by_ids
      description: List entities in bulk identified by its GUIDs.
      parameters:
        - name: minExtInfo
          in: query
          required: false
          schema:
            type: boolean
          description: Whether to return minimal information for referred entities. Default value is None.
        - name: ignoreRelationships
          in: query
          required: false
          schema:
            type: boolean
          description: Whether to ignore relationship attributes. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
