          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        dataExportId:
          type: string
          description: The data export rule ID.
        tableNames:
          type: array
          items:
            type: string
          description: "An array of tables to export, for example: [“Heartbeat, SecurityEvent”]. Required."
        destination:
