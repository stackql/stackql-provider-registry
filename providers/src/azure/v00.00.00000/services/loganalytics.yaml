          $ref: "#/components/schemas/WorkspaceReplicationProperties"
          description: workspace replication properties.
        failover:
          $ref: "#/components/schemas/WorkspaceFailoverProperties"
          description: workspace failover properties.
    WorkspaceEntityStatus:
      type: string
      enum:
        - Creating
        - Succeeded
        - Failed
        - Canceled
        - Deleting
        - ProvisioningAccount
        - Updating
    WorkspaceSku:
      type: object
      description: The SKU (tier) of a workspace.
      properties:
        name:
          $ref: "#/components/schemas/WorkspaceSkuNameEnum"
          description: 'The name of the SKU. Required. Known values are: "Free", "Standard", "Premium", "PerNode", "PerGB2018", "Standalone", "CapacityReservation", and "LACluster".'
        capacityReservationLevel:
          type: integer
          description: The capacity reservation level in GB for this workspace, when CapacityReservation sku is selected.
        lastSkuUpdate:
          type: string
          format: date-time
          description: The last time when the sku was updated.
      required:
        - name
    WorkspaceSkuNameEnum:
      type: string
      enum:
        - Free
        - Standard
        - Premium
        - PerNode
        - PerGB2018
        - Standalone
        - CapacityReservation
        - LACluster
    WorkspaceCapping:
      type: object
      description: The daily volume cap for ingestion.
      properties:
        dailyQuotaGb:
          type: number
          description: The workspace daily quota for ingestion.
        quotaNextResetTime:
          type: string
          description: The time when the quota will be rest.
        dataIngestionStatus:
          $ref: "#/components/schemas/DataIngestionStatus"
          description: 'The status of data ingestion for this workspace. Known values are: "RespectQuota", "ForceOn", "ForceOff", "OverQuota", "SubscriptionSuspended", and "ApproachingQuota".'
    DataIngestionStatus:
      type: string
      enum:
        - RespectQuota
        - ForceOn
        - ForceOff
        - OverQuota
        - SubscriptionSuspended
        - ApproachingQuota
    PublicNetworkAccessType:
      type: string
      enum:
        - Enabled
        - Disabled
        - SecuredByPerimeter
    PrivateLinkScopedResource:
      type: object
      description: The private link scope resource reference.
      properties:
        resourceId:
          type: string
          description: The full resource Id of the private link scope resource.
        scopeId:
          type: string
          description: The private link scope unique Identifier.
    WorkspaceFeatures:
      type: object
      description: Workspace features.
      properties:
        enableDataExport:
          type: boolean
          description: Flag that indicate if data should be exported.
        immediatePurgeDataOn30Days:
          type: boolean
          description: Flag that describes if we want to remove the data after 30 days.
        enableLogAccessUsingOnlyResourcePermissions:
          type: boolean
          description: Flag that indicate which permission to use - resource or workspace or both.
        clusterResourceId:
          type: string
          description: Dedicated LA cluster resourceId that is linked to the workspaces.
        disableLocalAuth:
          type: boolean
          description: Disable Non-AAD based Auth.
        unifiedSentinelBillingOnly:
          type: boolean
          description: An indication if the specify workspace is limited to sentinel's unified billing model only.
        associations:
          type: array
          items:
            type: string
          description: "List of associations for the workspace. Indicates if the workspace is associated with any of the following experiences: MDC, Sentinel, SentinelGraph, etc."
    WorkspaceReplicationProperties:
      type: object
      description: Workspace replication properties.
      properties:
        location:
          type: string
          description: The location of the replication.
        enabled:
          type: boolean
          description: Specifies whether the replication is enabled or not. When true, workspace configuration and data is replicated to the specified location. If replication is been enabled, location must be provided.
        provisioningState:
          $ref: "#/components/schemas/WorkspaceReplicationState"
          description: 'The provisioning state of the replication. Known values are: "Succeeded", "EnableRequested", "Enabling", "DisableRequested", "Disabling", "RollbackRequested", "RollingBack", "Failed", and "Canceled".'
        createdDate:
          type: string
          format: date-time
          description: The last time when the replication was enabled.
        lastModifiedDate:
          type: string
          format: date-time
          description: The last time when the replication was updated.
    WorkspaceReplicationState:
      type: string
      enum:
        - Succeeded
        - EnableRequested
        - Enabling
        - DisableRequested
        - Disabling
        - RollbackRequested
        - RollingBack
        - Failed
        - Canceled
    WorkspaceFailoverProperties:
      type: object
      description: The failover state of the replication.
      properties:
        state:
          $ref: "#/components/schemas/WorkspaceFailoverState"
          description: 'The failover state of the replication. Known values are: "Inactive", "Activating", "Active", "Deactivating", and "Failed".'
        lastModifiedDate:
          type: string
