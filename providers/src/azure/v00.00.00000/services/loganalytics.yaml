        - EventHub
    DestinationMetaData:
      type: object
      description: Destination meta data.
      properties:
        eventHubName:
          type: string
          description: Optional. Allows to define an Event Hub name. Not applicable when destination is Storage Account.
    DataExportFlattened:
      type: object
      description: Flattened view of DataExport ('properties' hoisted to the top level).
      properties:
        id:
