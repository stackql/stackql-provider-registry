openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Log Analytics Management Client
  description: LogAnalyticsManagementClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-07-01-stackql-generated
  x-serviceAlias: loganalytics
  x-sdkPackage: azure-mgmt-loganalytics
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SkuNameEnum:
      type: string
      enum:
        - Free
        - Standard
        - Premium
        - PerNode
        - PerGB2018
        - Standalone
        - CapacityReservation
    AvailableServiceTier:
      type: object
      description: Service Tier details.
      properties:
        serviceTier:
          $ref: "#/components/schemas/SkuNameEnum"
          description: 'The name of the Service Tier. Known values are: "Free", "Standard", "Premium", "PerNode", "PerGB2018", "Standalone", and "CapacityReservation".'
        enabled:
          type: boolean
          description: True if the Service Tier is enabled for the workspace.
        minimumRetention:
          type: integer
          description: The minimum retention for the Service Tier, in days.
        maximumRetention:
          type: integer
          description: The maximum retention for the Service Tier, in days.
        defaultRetention:
          type: integer
          description: The default retention for the Service Tier, in days.
        capacityReservationLevel:
          type: integer
          description: The capacity reservation level in GB per day. Returned for the Capacity Reservation Service Tier.
        lastSkuUpdate:
          type: string
          description: Time when the sku was last updated for the workspace. Returned for the Capacity Reservation Service Tier.
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    ClusterProperties:
      type: object
      description: Cluster properties.
      properties:
        clusterId:
          type: string
          description: The ID associated with the cluster.
        provisioningState:
          $ref: "#/components/schemas/ClusterEntityStatus"
          description: 'The provisioning state of the cluster. Known values are: "Creating", "Succeeded", "Failed", "Canceled", "Deleting", "ProvisioningAccount", and "Updating".'
        isDoubleEncryptionEnabled:
          type: boolean
          description: Configures whether cluster will use double encryption. This Property can not be modified after cluster creation. Default value is 'true'.
        isAvailabilityZonesEnabled:
          type: boolean
          description: Sets whether the cluster will support availability zones. This can be set as true only in regions where Azure Data Explorer support Availability Zones. This Property can not be modified after cluster creation. Default value is 'true' if region supports Availability Zones.
        billingType:
          $ref: "#/components/schemas/BillingType"
          description: "The cluster's billing type. Known values are: \"Cluster\" and \"Workspaces\"."
        keyVaultProperties:
          $ref: "#/components/schemas/KeyVaultProperties"
          description: The associated key properties.
        lastModifiedDate:
          type: string
          format: date-time
          description: The last time the cluster was updated.
        createdDate:
          type: string
          format: date-time
          description: The cluster creation time.
        associatedWorkspaces:
          type: array
          items:
            $ref: "#/components/schemas/AssociatedWorkspace"
          description: The list of Log Analytics workspaces associated with the cluster.
        capacityReservationProperties:
          $ref: "#/components/schemas/CapacityReservationProperties"
          description: Additional properties for capacity reservation.
        replication:
          $ref: "#/components/schemas/ClusterReplicationProperties"
          description: Cluster's replication properties.
    ClusterEntityStatus:
      type: string
      enum:
        - Creating
        - Succeeded
        - Failed
        - Canceled
        - Deleting
        - ProvisioningAccount
        - Updating
    BillingType:
      type: string
      enum:
        - Cluster
        - Workspaces
    KeyVaultProperties:
      type: object
      description: The key vault properties.
      properties:
        keyVaultUri:
          type: string
          description: The Key Vault uri which holds they key associated with the Log Analytics cluster.
        keyName:
          type: string
          description: The name of the key associated with the Log Analytics cluster.
        keyVersion:
          type: string
          description: The version of the key associated with the Log Analytics cluster.
        keyRsaSize:
          type: integer
          description: Selected key minimum required size.
    AssociatedWorkspace:
      type: object
      description: The list of Log Analytics workspaces associated with the cluster.
      properties:
        workspaceId:
          type: string
          description: Associated workspace immutable id.
        workspaceName:
          type: string
          description: Associated workspace resource name.
        resourceId:
          type: string
          description: "Associated workspace arm resource id, in the form of: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OperationalInsights/workspaces/{workspaceName}."
        associateDate:
          type: string
          format: date-time
          description: The time of workspace association.
    CapacityReservationProperties:
      type: object
      description: The Capacity Reservation properties.
      properties:
        lastSkuUpdate:
          type: string
          format: date-time
          description: The last time Sku was updated.
        minCapacity:
          type: integer
          description: Minimum CapacityReservation value in Gigabytes.
    ClusterReplicationProperties:
      type: object
      description: Cluster replication properties.
      properties:
        location:
          type: string
          description: The secondary location of the replication. If replication is being enabled, enabled must be provided.
        enabled:
          type: boolean
          description: Specifies whether the replication is enabled or not. When true the cluster is replicate to the specified location.
        isAvailabilityZonesEnabled:
          type: boolean
          description: Should enable AvailabilityZones for the given replicated cluster.
        provisioningState:
          $ref: "#/components/schemas/ClusterReplicationState"
          description: 'The provisioning state of the cluster replication. Known values are: "Succeeded", "EnableRequested", "Enabling", "DisableRequested", "Disabling", "RollbackRequested", "RollingBack", "Failed", and "Canceled".'
        createdDate:
          type: string
          format: date-time
          description: The cluster's replication creation time.
        lastModifiedDate:
          type: string
          format: date-time
          description: The last time the cluster's replication was updated.
    ClusterReplicationState:
      type: string
      enum:
        - Succeeded
        - EnableRequested
        - Enabling
        - DisableRequested
        - Disabling
        - RollbackRequested
        - RollingBack
        - Failed
        - Canceled
    ManagedServiceIdentity:
      type: object
      description: Managed service identity (system assigned and/or user assigned identities).
      properties:
        principalId:
          type: string
          description: The service principal ID of the system assigned identity. This property will only be provided for a system assigned identity.
        tenantId:
          type: string
          description: The tenant ID of the system assigned identity. This property will only be provided for a system assigned identity.
        type:
          $ref: "#/components/schemas/ManagedServiceIdentityType"
          description: 'The type of managed identity assigned to this resource. Required. Known values are: "None", "SystemAssigned", "UserAssigned", and "SystemAssigned,UserAssigned".'
        userAssignedIdentities:
          type: object
          properties: {}
          description: The identities assigned to this resource by the user.
      required:
        - type
    ManagedServiceIdentityType:
      type: string
      enum:
        - None
        - SystemAssigned
        - UserAssigned
        - SystemAssigned,UserAssigned
    ClusterSku:
      type: object
      description: The cluster sku definition.
      properties:
        capacity:
          type: integer
          description: The capacity reservation level in Gigabytes for this cluster.
        name:
          $ref: "#/components/schemas/ClusterSkuNameEnum"
          description: The SKU (tier) of a cluster. "CapacityReservation"
    ClusterSkuNameEnum:
      type: string
      enum:
        - CapacityReservation
    ClusterFlattened:
      type: object
      description: Flattened view of Cluster ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        tags:
          type: object
