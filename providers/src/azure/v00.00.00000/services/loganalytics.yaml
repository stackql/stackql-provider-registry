        - ChangeTrackingCustomPath
        - ChangeTrackingPath
        - ChangeTrackingServices
        - ChangeTrackingDataTypeConfiguration
        - ChangeTrackingDefaultRegistry
        - ChangeTrackingRegistry
        - ChangeTrackingLinuxPath
        - LinuxChangeTrackingPath
        - ChangeTrackingContentLocation
        - WindowsTelemetry
        - Office365
        - SecurityWindowsBaselineConfiguration
        - SecurityCenterSecurityWindowsBaselineConfiguration
        - SecurityEventCollectionConfiguration
        - SecurityInsightsSecurityEventCollectionConfiguration
        - ImportComputerGroup
        - NetworkMonitoring
        - Itsm
        - DnsAnalytics
        - ApplicationInsights
        - SqlDataClassification
    DataSource:
      type: object
      description: Datasources under OMS Workspace.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          type: object
          properties: {}
          description: The data source properties in raw json format, each kind of data source have it's own schema. Required.
        etag:
          type: string
          description: The ETag of the data source.
        kind:
          $ref: "#/components/schemas/DataSourceKind"
          description: 'The kind of the DataSource. Required. Known values are: "WindowsEvent", "WindowsPerformanceCounter", "IISLogs", "LinuxSyslog", "LinuxSyslogCollection", "LinuxPerformanceObject", "LinuxPerformanceCollection", "CustomLog", "CustomLogCollection", "AzureAuditLog", "AzureActivityLog", "GenericDataSource", "ChangeTrackingCustomPath", "ChangeTrackingPath", "ChangeTrackingServices", "ChangeTrackingDataTypeConfiguration", "ChangeTrackingDefaultRegistry", "ChangeTrackingRegistry", "ChangeTrackingLinuxPath", "LinuxChangeTrackingPath", "ChangeTrackingContentLocation", "WindowsTelemetry", "Office365", "SecurityWindowsBaselineConfiguration", "SecurityCenterSecurityWindowsBaselineConfiguration", "SecurityEventCollectionConfiguration", "SecurityInsightsSecurityEventCollectionConfiguration", "ImportComputerGroup", "NetworkMonitoring", "Itsm", "DnsAnalytics", "ApplicationInsights", and "SqlDataClassification".'
