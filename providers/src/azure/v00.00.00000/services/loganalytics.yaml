    Destination:
      type: object
      description: Destination properties.
      properties:
        resourceId:
          type: string
          description: The destination resource ID. This can be copied from the Properties entry of the destination resource in Azure. Required.
        type:
          $ref: "#/components/schemas/Type"
          description: 'The type of the destination resource. Known values are: "StorageAccount" and "EventHub".'
        metaData:
          $ref: "#/components/schemas/DestinationMetaData"
          description: destination meta data.
      required:
        - resourceId
    Type:
      type: string
      enum:
