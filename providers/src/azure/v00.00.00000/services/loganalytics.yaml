          description: The name of the workspace. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                table:
                  type: string
                  description: Table from which to purge data. Required.
                filters:
                  type: array
                  items:
                    $ref: "#/components/schemas/WorkspacePurgeBodyFilters"
                  description: The set of columns and filters (queries) to run over them to purge the resulting data. Required.
