openapi: 3.0.0
servers:
  - url: https://{vault_name}.vault.azure.net
    variables:
      vault_name:
        default: ""
        description: Key vault name.
info:
  title: Secret Client
  description: A high-level interface for managing a vault's secrets.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-07-01-stackql-generated
  x-serviceAlias: keyvault_secrets
  x-sdkPackage: azure-keyvault-secrets
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SecretAttributes:
      type: object
      description: The secret management attributes.
      properties:
        enabled:
          type: boolean
          description: Determines whether the object is enabled.
        nbf:
          type: string
          format: date-time
          description: Not before date in UTC.
        exp:
          type: string
          format: date-time
          description: Expiry date in UTC.
        created:
          type: string
          format: date-time
          description: Creation time in UTC.
        updated:
          type: string
          format: date-time
          description: Last updated time in UTC.
        recoverableDays:
          type: integer
          description: softDelete data retention days. Value should be >=7 and <=90 when softDelete enabled, otherwise 0.
        recoveryLevel:
          $ref: "#/components/schemas/DeletionRecoveryLevel"
          description: "Reflects the deletion recovery level currently in effect for secrets in the current vault. If it contains 'Purgeable', the secret can be permanently deleted by a privileged user; otherwise, only the system can purge the secret, at the end of the retention interval. Known values are: \"Purgeable\", \"Recoverable+Purgeable\", \"Recoverable\", \"Recoverable+ProtectedSubscription\", \"CustomizedRecoverable+Purgeable\", \"CustomizedRecoverable\", and \"CustomizedRecoverable+ProtectedSubscription\"."
    DeletionRecoveryLevel:
      type: string
      enum:
        - Purgeable
        - Recoverable+Purgeable
        - Recoverable
        - Recoverable+ProtectedSubscription
        - CustomizedRecoverable+Purgeable
        - CustomizedRecoverable
        - CustomizedRecoverable+ProtectedSubscription
    SecretBundle:
      type: object
      description: A secret consisting of a value, id and its attributes.
      properties:
        value:
          type: string
          description: The secret value.
        id:
          type: string
          description: The secret id.
        contentType:
          type: string
          description: The content type of the secret.
        attributes:
          $ref: "#/components/schemas/SecretAttributes"
          description: The secret management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        kid:
          type: string
          description: If this is a secret backing a KV certificate, then this field specifies the corresponding key backing the KV certificate.
        managed:
          type: boolean
          description: True if the secret's lifetime is managed by key vault. If this is a secret backing a certificate, then managed will be true.
        previousVersion:
          type: string
          description: The version of the previous certificate, if applicable. Applies only to certificates created after June 1, 2025. Certificates created before this date are not retroactively updated.
    SecretItem:
      type: object
      description: The secret item containing secret metadata.
      properties:
        id:
          type: string
          description: Secret identifier.
        attributes:
          $ref: "#/components/schemas/SecretAttributes"
          description: The secret management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        contentType:
          type: string
          description: Type of the secret value such as a password.
        managed:
          type: boolean
          description: True if the secret's lifetime is managed by key vault. If this is a key backing a certificate, then managed will be true.
    PagedSecretItem:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/SecretItem"
        nextLink:
          type: string
    DeletedSecretItem:
      type: object
      description: The deleted secret item containing metadata about the deleted secret.
      properties:
        id:
          type: string
          description: Secret identifier.
        attributes:
          $ref: "#/components/schemas/SecretAttributes"
          description: The secret management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        contentType:
          type: string
          description: Type of the secret value such as a password.
        managed:
          type: boolean
          description: True if the secret's lifetime is managed by key vault. If this is a key backing a certificate, then managed will be true.
        recoveryId:
          type: string
          description: The url of the recovery object, used to identify and recover the deleted secret.
        scheduledPurgeDate:
          type: string
          format: date-time
          description: The time when the secret is scheduled to be purged, in UTC.
        deletedDate:
          type: string
          format: date-time
          description: The time when the secret was deleted, in UTC.
    PagedDeletedSecretItem:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DeletedSecretItem"
        nextLink:
          type: string
    DeletedSecretBundle:
      type: object
      description: A Deleted Secret consisting of its previous id, attributes and its tags, as well as information on when it will be purged.
      properties:
        value:
          type: string
          description: The secret value.
        id:
          type: string
          description: The secret id.
        contentType:
          type: string
          description: The content type of the secret.
        attributes:
          $ref: "#/components/schemas/SecretAttributes"
          description: The secret management attributes.
        tags:
          type: object
          properties: {}
          description: Application specific metadata in the form of key-value pairs.
        kid:
          type: string
          description: If this is a secret backing a KV certificate, then this field specifies the corresponding key backing the KV certificate.
        managed:
          type: boolean
          description: True if the secret's lifetime is managed by key vault. If this is a secret backing a certificate, then managed will be true.
        previousVersion:
          type: string
          description: The version of the previous certificate, if applicable. Applies only to certificates created after June 1, 2025. Certificates created before this date are not retroactively updated.
        recoveryId:
          type: string
          description: The url of the recovery object, used to identify and recover the deleted secret.
        scheduledPurgeDate:
          type: string
          format: date-time
          description: The time when the secret is scheduled to be purged, in UTC.
        deletedDate:
          type: string
          format: date-time
          description: The time when the secret was deleted, in UTC.
    BackupSecretResult:
      type: object
      description: The backup secret result, containing the backup blob.
      properties:
        value:
          type: string
          format: byte
          description: The backup blob containing the backed up secret.
