paths:
  /secrets/{secret_name}/{secret_version}?api-version=2025-07-01:
    get:
      operationId: _KeyVaultClient_get_secret
      description: Get a specified secret from a given key vault. The GET operation is applicable to any secret stored in Azure Key Vault. This operation requires the secrets/get permission.
      parameters:
        - name: secret_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the secret. Required.
        - name: secret_version
          in: path
          required: true
          schema:
            type: string
          description: The version of the secret. This URI fragment is optional. If not specified, the latest version of the secret is returned. Required.
        - name: outContentType
          in: query
          required: false
          schema:
            type: string
          description: 'The media type (MIME type) of the certificate. If a supported format is specified, the certificate content is converted to the requested format. Currently, only PFX to PEM conversion is supported. If an unsupported format is specified, the request is rejected. If not specified, the certificate is returned in its original format without conversion. Known values are: "application/x-pkcs12" and "application/x-pem-file". Default value is None.'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretBundle"
    patch:
      operationId: _KeyVaultClient_update_secret
      description: Updates the attributes associated with a specified secret in a given key vault. The UPDATE operation changes specified attributes of an existing stored secret. Attributes that are not specified in the request are left unchanged. The value of a secret itself cannot be changed. This operation requires the secrets/set permission.
      parameters:
        - name: secret_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the secret. Required.
        - name: secret_version
          in: path
          required: true
          schema:
            type: string
          description: The version of the secret. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contentType:
                  type: string
                  description: Type of the secret value such as a password.
                attributes:
                  $ref: "#/components/schemas/SecretAttributes"
                  description: The secret management attributes.
                tags:
                  type: object
                  properties: {}
                  description: Application specific metadata in the form of key-value pairs.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretBundle"
  /secrets?api-version=2025-07-01:
    get:
      operationId: _KeyVaultClient_get_secrets
      description: List secrets in a specified key vault. The Get Secrets operation is applicable to the entire vault. However, only the base secret identifier and its attributes are provided in the response. Individual secret versions are not listed in the response. This operation requires the secrets/list permission.
      parameters:
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedSecretItem"
  /secrets/{secret_name}/versions?api-version=2025-07-01:
    get:
      operationId: _KeyVaultClient_get_secret_versions
      description: List all versions of the specified secret. The full secret identifier and attributes are provided in the response. No values are returned for the secrets. This operations requires the secrets/list permission.
      parameters:
        - name: secret_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the secret. Required.
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedSecretItem"
  /deletedsecrets?api-version=2025-07-01:
    get:
      operationId: _KeyVaultClient_get_deleted_secrets
      description: Lists deleted secrets for the specified vault. The Get Deleted Secrets operation returns the secrets that have been deleted for a vault enabled for soft-delete. This operation requires the secrets/list permission.
      parameters:
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return in a page. If not specified the service will return up to 25 results. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDeletedSecretItem"
  /deletedsecrets/{secret_name}?api-version=2025-07-01:
    get:
      operationId: _KeyVaultClient_get_deleted_secret
      description: Gets the specified deleted secret. The Get Deleted Secret operation returns the specified deleted secret along with its attributes. This operation requires the secrets/get permission.
      parameters:
        - name: secret_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the secret. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedSecretBundle"
    delete:
      operationId: _KeyVaultClient_purge_deleted_secret
      description: Permanently deletes the specified secret. The purge deleted secret operation removes the secret permanently, without the possibility of recovery. This operation can only be enabled on a soft-delete enabled vault. This operation requires the secrets/purge permission.
      parameters:
        - name: secret_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the secret. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /secrets/{secret_name}?api-version=2025-07-01:
    put:
      operationId: _KeyVaultClient_set_secret
      description: Sets a secret in a specified key vault. The SET operation adds a secret to the Azure Key Vault. If the named secret already exists, Azure Key Vault creates a new version of that secret. This operation requires the secrets/set permission.
      parameters:
        - name: secret_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the secret. The value you provide may be copied globally for the purpose of running the service. The value provided should not include personally identifiable or sensitive information. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  description: The value of the secret. Required.
                tags:
                  type: object
                  properties: {}
                  description: Application specific metadata in the form of key-value pairs.
                contentType:
                  type: string
                  description: Type of the secret value such as a password.
                attributes:
                  $ref: "#/components/schemas/SecretAttributes"
                  description: The secret management attributes.
              required:
                - value
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretBundle"
    delete:
      operationId: _KeyVaultClient_delete_secret
      description: Deletes a secret from a specified key vault. The DELETE operation applies to any secret stored in Azure Key Vault. DELETE cannot be applied to an individual version of a secret. This operation requires the secrets/delete permission.
      parameters:
        - name: secret_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the secret. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedSecretBundle"
  /deletedsecrets/{secret_name}/recover?api-version=2025-07-01:
    post:
      operationId: _KeyVaultClient_recover_deleted_secret
      description: Recovers the deleted secret to the latest version. Recovers the deleted secret in the specified vault. This operation can only be performed on a soft-delete enabled vault. This operation requires the secrets/recover permission.
      parameters:
        - name: secret_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the deleted secret. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretBundle"
  /secrets/{secret_name}/backup?api-version=2025-07-01:
    post:
      operationId: _KeyVaultClient_backup_secret
      description: Backs up the specified secret. Requests that a backup of the specified secret be downloaded to the client. All versions of the secret will be downloaded. This operation requires the secrets/backup permission.
      parameters:
        - name: secret_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the secret. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSecretResult"
  /secrets/restore?api-version=2025-07-01:
    post:
      operationId: _KeyVaultClient_restore_secret
      description: Restores a backed up secret to a vault. Restores a backed up secret, and all its versions, to a vault. This operation requires the secrets/restore permission.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  format: byte
                  description: The backup blob associated with a secret bundle. Required.
              required:
                - value
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretBundle"
