    post:
      operationId: Components_purge
      description: "Purges data in an Application Insights component by a set of user-defined filters. In order to manage system resources, purge requests are throttled at 50 requests per hour. You should batch the execution of purge requests by sending a single command whose predicate includes all user identities that require purging. Use the in operator to specify multiple identities. You should run the query prior to using for a purge request to verify that the results are expected. Note: this operation is intended for Classic resources, for workspace-based Application Insights resource please run purge operation (directly on the workspace)(`https://docs.microsoft.com/en-us/rest/api/loganalytics/workspace-purge/purge `_) , scoped to specific resource id."
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. The name is case insensitive. Required.
        - name: resource_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Application Insights component resource. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                table:
                  type: string
                  description: Table from which to purge data. Required.
                filters:
                  type: array
                  items:
                    $ref: "#/components/schemas/ComponentPurgeBodyFilters"
                  description: The set of columns and filters (queries) to run over them to purge the resulting data. Required.
              required:
                - table
                - filters
      responses:
        "200":
          description: Success
          content:
