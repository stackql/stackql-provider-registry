paths:
  /providers/Microsoft.Resources/operations?api-version=2016-09-01:
    get:
      operationId: resource_links_list
      description: Lists all of the available Microsoft.Resources REST API operations.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedOperation"
  /{link_id}?api-version=2016-09-01:
    get:
      operationId: ResourceLinks_get
      description: Gets a resource link with the specified ID.
      parameters:
        - name: link_id
          in: path
          required: true
          schema:
            type: string
          description: The fully qualified Id of the resource link. For example, /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myGroup/Microsoft.Web/sites/mySite/Microsoft.Resources/links/myLink. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceLinkFlattened"
    put:
      operationId: ResourceLinks_create_or_update
      description: Creates or updates a resource link between the specified resources.
      parameters:
        - name: link_id
          in: path
          required: true
          schema:
            type: string
          description: The fully qualified ID of the resource link. Use the format, /subscriptions/{subscription-id}/resourceGroups/{resource-group-name}/{provider-namespace}/{resource-type}/{resource-name}/Microsoft.Resources/links/{link-name}. For example, /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myGroup/Microsoft.Web/sites/mySite/Microsoft.Resources/links/myLink. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  $ref: "#/components/schemas/ResourceLinkProperties"
                  description: Properties for resource link.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceLink"
    delete:
      operationId: ResourceLinks_delete
      description: Deletes a resource link with the specified ID.
      parameters:
        - name: link_id
          in: path
          required: true
          schema:
            type: string
          description: The fully qualified ID of the resource link. Use the format, /subscriptions/{subscription-id}/resourceGroups/{resource-group-name}/{provider-namespace}/{resource-type}/{resource-name}/Microsoft.Resources/links/{link-name}. For example, /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myGroup/Microsoft.Web/sites/mySite/Microsoft.Resources/links/myLink. Required.
      responses:
        "204":
          description: Success (no content / accepted)
  /subscriptions/{subscription_id}/providers/Microsoft.Resources/links?api-version=2016-09-01:
    get:
      operationId: ResourceLinks_list_at_subscription
      description: Gets all the linked resources for the subscription.
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: $filter
          in: query
          required: false
          schema:
            type: string
          description: The filter to apply on the list resource links operation. The supported filter for list resource links is targetId. For example, $filter=targetId eq {value}. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResourceLinkFlattened"
  /{scope}/providers/Microsoft.Resources/links?api-version=2016-09-01:
    get:
      operationId: ResourceLinks_list_at_source_scope
      description: Gets a list of resource links at and below the specified source scope.
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: The fully qualified ID of the scope for getting the resource links. For example, to list resource links at and under a resource group, set the scope to /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myGroup. Required.
        - name: $filter
          in: query
          required: false
          schema:
            type: string
          description: The filter to apply when getting resource links. To get links only at the specified scope (not below the scope), use Filter.atScope(). Known values are "atScope()" and None. Default value is "atScope()".
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedResourceLinkFlattened"
