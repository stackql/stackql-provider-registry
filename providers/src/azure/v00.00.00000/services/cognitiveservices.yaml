    RaiEgressPolicyConfig:
      type: object
      description: Egress (outbound network) policy configuration nested within an RAI policy. Controls which external endpoints sandboxed agents can reach and what transformations (header injection, URL rewrite) are applied to matching traffic.
      properties:
        mode:
          $ref: "#/components/schemas/RaiEgressMode"
          description: 'The enforcement mode for egress rules. If omitted on create, the server defaults to Enforced. On subsequent GET requests, the server always returns the effective mode. Known values are: "Enforced" and "Audit".'
        defaultAction:
          $ref: "#/components/schemas/RaiEgressDefaultAction"
          description: 'The default action when no user-defined rules match. Deny blocks unmatched traffic; Allow permits it. Transform and Rewrite rules are always applied to their matched traffic regardless of this setting — defaultAction only governs traffic that does not match any rule. If omitted on create, the server defaults to Deny (fail-closed). On subsequent GET requests, the server always returns the effective value. Known values are: "Allow" and "Deny".'
        description:
          type: string
          description: Description of the egress policy.
        rules:
          type: array
          items:
            $ref: "#/components/schemas/RaiEgressRule"
          description: Ordered list of egress rules. First matching rule wins. Rules are evaluated in declaration order; the first rule whose match criteria are satisfied determines the action taken on the request.
    RaiEgressMode:
      type: string
      enum:
        - Enforced
        - Audit
    RaiEgressDefaultAction:
      type: string
      enum:
        - Allow
        - Deny
    RaiEgressRule:
      type: object
      description: A single egress rule. Rules are evaluated in order; first match wins.
      properties:
        name:
          type: string
          description: Name of the rule. Must be unique within the policy. Required.
        description:
          type: string
          description: Description of the rule.
        ruleType:
          $ref: "#/components/schemas/RaiEgressRuleType"
          description: The type of rule (e.g., Fqdn). Determines how match criteria are interpreted. Required. "Fqdn"
        match:
          $ref: "#/components/schemas/RaiEgressRuleMatch"
          description: The match criteria for this rule.
        action:
          $ref: "#/components/schemas/RaiEgressRuleAction"
          description: The action to take when this rule matches, including the action type and any type-specific configuration (headers for Transform, rewrite target for Rewrite). Required.
      required:
        - name
        - ruleType
        - action
    RaiEgressRuleType:
      type: string
      enum:
        - Fqdn
    RaiEgressRuleMatch:
      type: object
      description: The match criteria for an egress rule. If both host and path are omitted, the rule matches all traffic. Host uses DNS wildcard syntax (e.g., "*.openai.com" matches "api.openai.com"). Path uses URI prefix matching with '*' as a single-segment wildcard (e.g., "/v1/*" matches "/v1/chat").
      properties:
        host:
          type: string
          description: Host pattern to match using DNS wildcard syntax (e.g., "*.openai.com"). A leading "*." matches any subdomain. Omit to match all hosts.
        path:
          type: string
          description: Path pattern to match using URI prefix with '*' wildcard (e.g., "/v1/*"). Omit to match all paths.
    RaiEgressRuleAction:
      type: object
      description: "The action an egress rule takes when it matches. * Allow/Deny: no additional fields needed; headers and rewrite must not be set. * Transform: headers is required with at least one entry; rewrite must not be set. * Rewrite: rewrite is required with at least one of scheme/host/path; headers is optional for injecting headers alongside the redirect."
      properties:
        actionType:
          $ref: "#/components/schemas/RaiEgressRuleActionType"
          description: 'The kind of action. Required. Known values are: "Allow", "Deny", "Transform", and "Rewrite".'
        headers:
          type: array
          items:
            $ref: "#/components/schemas/RaiEgressHeaderTransform"
          description: Header transforms to apply. Required for Transform; optional for Rewrite; not allowed for Allow or Deny.
        rewrite:
          $ref: "#/components/schemas/RaiEgressRewriteTarget"
          description: Destination override. Required for Rewrite; not allowed otherwise.
      required:
        - actionType
    RaiEgressRuleActionType:
      type: string
      enum:
        - Allow
        - Deny
        - Transform
        - Rewrite
    RaiEgressHeaderTransform:
      type: object
      description: A header transformation applied to matched traffic. For Set or Insert operations, exactly one of value or valueRef must be provided. For Remove operations, neither value nor valueRef should be set.
      properties:
        operation:
          $ref: "#/components/schemas/RaiEgressHeaderOperation"
          description: 'The operation to perform on this header. Required. Known values are: "Set", "Insert", and "Remove".'
        name:
          type: string
          description: The HTTP header name (e.g., "Authorization", "X-Custom-Auth"). Required.
        value:
          type: string
          description: "A static header value. Write-only: accepted on create/update, never returned on read. If omitted on update, the existing value is preserved. Use this for non-sensitive values; for credentials, use valueRef instead."
        valueRef:
          $ref: "#/components/schemas/RaiEgressHeaderValueRef"
          description: A dynamic header value resolved at request time from a secret or managed identity.
      required:
        - operation
        - name
    RaiEgressHeaderOperation:
      type: string
      enum:
        - Set
        - Insert
        - Remove
    RaiEgressHeaderValueRef:
      type: object
      description: A dynamic source for a header value. Exactly one of secretRef or managedIdentityRef must be set.
      properties:
        secretRef:
          $ref: "#/components/schemas/RaiEgressSecretRef"
          description: Resolve the value from a stored secret.
        managedIdentityRef:
          $ref: "#/components/schemas/RaiEgressManagedIdentityRef"
          description: Resolve the value from a managed-identity token.
    RaiEgressSecretRef:
      type: object
      description: A reference to a stored secret used as a header value.
      properties:
        secretId:
          type: string
          description: Identifier of the secret to inject. Required.
        secretKey:
          type: string
          description: Optional key within the secret.
        format:
          type: string
          description: Optional format for the resolved value; "{value}" is the placeholder, e.g. "Bearer {value}".
      required:
        - secretId
    RaiEgressManagedIdentityRef:
      type: object
      description: A reference to a managed-identity token used as a header value.
      properties:
        resource:
          type: string
          description: The resource/audience the token is requested for. Required.
        format:
          type: string
          description: Optional format for the resolved token; "{value}" is the placeholder, e.g. "Bearer {value}".
      required:
        - resource
    RaiEgressRewriteTarget:
      type: object
      description: Where a Rewrite action sends matched traffic. At least one field must be set; omitted fields retain the original request values. This constraint is enforced by the server (400 Bad Request if all fields are omitted).
      properties:
        scheme:
          $ref: "#/components/schemas/RaiEgressScheme"
          description: 'Target scheme. Original scheme is kept if omitted. Known values are: "http" and "https".'
        host:
          type: string
          description: Target host. Original host is kept if omitted.
        path:
          type: string
          description: Target path (literal string). Original path (and query) is kept if omitted.
    RaiEgressScheme:
      type: string
      enum:
        - http
        - https
