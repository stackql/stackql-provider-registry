  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/Microsoft.DataBox/jobs/{job_name}/mitigate?api-version=2025-02-01:
    post:
      operationId: DataBoxManagementClient_mitigate
      description: Request to mitigate for a given job.
      parameters:
        - name: job_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the job Resource within the specified resource group. job names must be between 3 and 24 characters in length and use any alphanumeric and underscore only. Required.
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The Resource Group Name. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerResolutionCode:
                  type: string
                  description: 'Resolution code for the job. Known values are: "None", "MoveToCleanUpDevice", "Resume", "Restart", and "ReachOutToOperation".'
                serialNumberCustomerResolutionMap:
                  type: object
                  properties: {}
                  description: Serial number and the customer resolution code corresponding to each serial number.
      responses:
        "200":
          description: Success
  /subscriptions/{subscription_id}/resourceGroups/{resource_group_name}/providers/Microsoft.DataBox/jobs/{job_name}?api-version=2025-02-01:
    get:
      operationId: Jobs_get
      description: Gets information about the specified job.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The Resource Group Name. Required.
        - name: job_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the job Resource within the specified resource group. job names must be between 3 and 24 characters in length and use any alphanumeric and underscore only. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: $expand
          in: query
          required: false
          schema:
            type: string
          description: $expand is supported on details parameter for job, which provides details on the job stages. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResourceFlattened"
    put:
      operationId: Jobs_begin_create
      description: Creates a new job with the specified parameters. Existing job cannot be updated with this API and should instead be updated with the Update job API.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The Resource Group Name. Required.
        - name: job_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the job Resource within the specified resource group. job names must be between 3 and 24 characters in length and use any alphanumeric and underscore only. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                location:
                  type: string
                  description: The location of the resource. This will be one of the supported and registered Azure Regions (e.g. West US, East US, Southeast Asia, etc.). The region of a resource cannot be changed once it is created, but if an identical region is specified on update the request will succeed. Required.
                tags:
                  type: object
                  properties: {}
                  description: The list of key value pairs that describe the resource. These tags can be used in viewing and grouping this resource (across resource groups).
                sku:
                  $ref: "#/components/schemas/Sku"
                  description: The sku type. Required.
                identity:
                  $ref: "#/components/schemas/ResourceIdentity"
                  description: Msi identity of the resource.
                properties:
                  type: object
                  properties:
                    transferType:
                      type: string
                      description: 'Type of the data transfer. Required. Known values are: "ImportToAzure" and "ExportFromAzure".'
                    details:
                      $ref: "#/components/schemas/JobDetails"
                      description: Details of a job run. This field will only be sent for expand details filter.
                    deliveryType:
                      type: string
                      description: 'Delivery type of Job. Known values are: "NonScheduled" and "Scheduled".'
                    deliveryInfo:
                      $ref: "#/components/schemas/JobDeliveryInfo"
                      description: Delivery Info of Job.
              required:
                - location
                - sku
                - properties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResource"
    delete:
      operationId: Jobs_begin_delete
      description: Deletes a job.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The Resource Group Name. Required.
        - name: job_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the job Resource within the specified resource group. job names must be between 3 and 24 characters in length and use any alphanumeric and underscore only. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Success (no content / accepted)
    patch:
      operationId: Jobs_begin_update
      description: Updates the properties of an existing job.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The Resource Group Name. Required.
        - name: job_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the job Resource within the specified resource group. job names must be between 3 and 24 characters in length and use any alphanumeric and underscore only. Required.
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
          description: Defines the If-Match condition. The patch will be performed only if the ETag of the job on the server matches this value. Default value is None.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: object
                  properties: {}
                  description: The list of key value pairs that describe the resource. These tags can be used in viewing and grouping this resource (across resource groups).
                identity:
                  $ref: "#/components/schemas/ResourceIdentity"
                  description: Msi identity of the resource.
                properties:
                  type: object
                  properties:
                    details:
                      $ref: "#/components/schemas/UpdateJobDetails"
                      description: Details of a job to be updated.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResource"
