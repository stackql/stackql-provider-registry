openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Data Box
  description: Offline bulk data transfer jobs using shipped storage devices.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-02-01-stackql-generated
  x-serviceAlias: data_box
  x-sdkPackage: azure-mgmt-databox
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    Sku:
      type: object
      description: The Sku. All required parameters must be populated in order to send to server.
      properties:
        name:
          type: string
          description: 'The sku name. Required. Known values are: "DataBox", "DataBoxDisk", "DataBoxHeavy", and "DataBoxCustomerDisk".'
        displayName:
          type: string
          description: The display name of the sku.
        family:
          type: string
          description: The sku family.
        model:
          type: string
          description: 'The customer friendly name of the combination of version and capacity of the device. This field is necessary only at the time of ordering the newer generation device i.e. AzureDataBox120 and AzureDataBox525 as of Feb/2025. Known values are: "DataBox", "DataBoxDisk", "DataBoxHeavy", "DataBoxCustomerDisk", "AzureDataBox120", and "AzureDataBox525".'
      required:
        - name
    ResourceIdentity:
      type: object
      description: Msi identity details of the resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        type:
          type: string
          description: Identity type.
        principalId:
          type: string
          description: Service Principal Id backing the Msi.
        tenantId:
          type: string
          description: Home Tenant Id.
        userAssignedIdentities:
          type: object
          properties: {}
          description: User Assigned Identities.
    SystemData:
      type: object
      description: Provides details about resource creation and update time. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        createdBy:
          type: string
          description: A string identifier for the identity that created the resource.
        createdByType:
          type: string
          description: "The type of identity that created the resource: user, application, managedIdentity."
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: A string identifier for the identity that last modified the resource.
        lastModifiedByType:
          type: string
          description: "The type of identity that last modified the resource: user, application, managedIdentity."
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CloudError:
      type: object
      description: Provides additional information about an http error response. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        additionalInfo:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalErrorInfo"
          description: Gets or sets additional error info.
        code:
          type: string
          description: Error code.
        details:
          type: array
          items:
            $ref: "#/components/schemas/CloudError"
          description: Gets or sets details for the error.
        message:
          type: string
          description: The error message parsed from the body of the http error response.
        target:
          type: string
          description: Gets or sets the target of the error.
    AdditionalErrorInfo:
      type: object
      description: This class represents additional info which Resource Providers pass when an error occurs.
      properties:
        info:
          type: object
          properties: {}
          description: Additional information of the type of error.
        type:
          type: string
          description: Type of error (e.g. CustomerIntervention, PolicyViolation, SecurityViolation).
    JobDetails:
      type: object
      description: "Job details. You probably want to use the sub-classes and not this class directly. Known sub-classes are: DataBoxJobDetails, DataBoxCustomerDiskJobDetails, DataBoxDiskJobDetails, DataBoxHeavyJobDetails Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server."
      properties:
        jobStages:
          type: array
          items:
            $ref: "#/components/schemas/JobStages"
          description: List of stages that run in the job.
        contactDetails:
          $ref: "#/components/schemas/ContactDetails"
          description: Contact details for notification and shipping. Required.
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
          description: Shipping address of the customer.
        deliveryPackage:
          $ref: "#/components/schemas/PackageShippingDetails"
          description: Delivery package shipping details.
        returnPackage:
          $ref: "#/components/schemas/PackageShippingDetails"
          description: Return package shipping details.
        dataImportDetails:
          type: array
          items:
            $ref: "#/components/schemas/DataImportDetails"
          description: Details of the data to be imported into azure.
        dataExportDetails:
          type: array
          items:
            $ref: "#/components/schemas/DataExportDetails"
          description: Details of the data to be exported from azure.
        jobDetailsType:
          type: string
          description: 'Indicates the type of job details. Required. Known values are: "DataBox", "DataBoxDisk", "DataBoxHeavy", and "DataBoxCustomerDisk".'
        preferences:
          $ref: "#/components/schemas/Preferences"
          description: Preferences for the order.
        reverseShippingDetails:
          $ref: "#/components/schemas/ReverseShippingDetails"
          description: Optional Reverse Shipping details for order.
        copyLogDetails:
          type: array
          items:
            $ref: "#/components/schemas/CopyLogDetails"
          description: List of copy log details.
        reverseShipmentLabelSasKey:
          type: string
          description: Shared access key to download the return shipment label.
        chainOfCustodySasKey:
          type: string
          description: Shared access key to download the chain of custody logs.
        deviceErasureDetails:
          $ref: "#/components/schemas/DeviceErasureDetails"
          description: Holds device data erasure details.
        keyEncryptionKey:
          $ref: "#/components/schemas/KeyEncryptionKey"
          description: Details about which key encryption type is being used.
        expectedDataSizeInTeraBytes:
          type: integer
          description: The expected size of the data, which needs to be transferred in this job, in terabytes.
        actions:
          type: array
          items:
            type: string
          description: Available actions on the job.
        lastMitigationActionOnJob:
          $ref: "#/components/schemas/LastMitigationActionOnJob"
          description: Last mitigation action performed on the job.
        datacenterAddress:
          $ref: "#/components/schemas/DatacenterAddressResponse"
          description: Datacenter address to ship to, for the given sku and storage location.
        dataCenterCode:
          type: string
          description: 'DataCenter code. Known values are: "Invalid", "BY2", "BY1", "ORK70", "AM2", "AMS20", "BY21", "BY24", "MWH01", "AMS06", "SSE90", "SYD03", "SYD23", "CBR20", "YTO20", "CWL20", "LON24", "BOM01", "BL20", "BL7", "SEL20", "TYO01", "BN1", "SN5", "CYS04", "TYO22", "YTO21", "YQB20", "FRA22", "MAA01", "CPQ02", "CPQ20", "SIN20", "HKG20", "SG2", "MEL23", "SEL21", "OSA20", "SHA03", "BJB", "JNB22", "JNB21", "MNZ21", "SN8", "AUH20", "ZRH20", "PUS20", "AdHoc", "CH1", "DSM05", "DUB07", "PNQ01", "SVG20", "OSA02", "OSA22", "PAR22", "BN7", "SN6", "BJS20", "BL24", "IDC5", "TYO23", "CPQ21", "NTG20", "DXB23", "DSM11", "OSA23", and "AMS25".'
      required:
        - contactDetails
        - jobDetailsType
    JobStages:
      type: object
      description: Job stages. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        stageName:
          type: string
          description: 'Name of the job stage. Known values are: "DeviceOrdered", "DevicePrepared", "Dispatched", "Delivered", "PickedUp", "AtAzureDC", "DataCopy", "Completed", "CompletedWithErrors", "Cancelled", "Failed_IssueReportedAtCustomer", "Failed_IssueDetectedAtAzureDC", "Aborted", "CompletedWithWarnings", "ReadyToDispatchFromAzureDC", "ReadyToReceiveAtAzureDC", "Created", "ShippedToAzureDC", "AwaitingShipmentDetails", "PreparingToShipFromAzureDC", and "ShippedToCustomer".'
        displayName:
          type: string
          description: Display name of the job stage.
        stageStatus:
          type: string
          description: 'Status of the job stage. Known values are: "None", "InProgress", "Succeeded", "Failed", "Cancelled", "Cancelling", "SucceededWithErrors", "WaitingForCustomerAction", "SucceededWithWarnings", "WaitingForCustomerActionForKek", "WaitingForCustomerActionForCleanUp", "CustomerActionPerformedForCleanUp", and "CustomerActionPerformed".'
        stageTime:
          type: string
          format: date-time
          description: Time for the job stage in UTC ISO 8601 format.
        jobStageDetails:
          type: object
          properties: {}
          description: Job Stage Details.
        delayInformation:
          type: array
          items:
            $ref: "#/components/schemas/JobDelayDetails"
          description: Delay information for the job stages.
    JobDelayDetails:
      type: object
      description: Job Delay Notification details. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        status:
          type: string
          description: 'Status of notification. Known values are: "Active" and "Resolved".'
        errorCode:
          type: string
          description: 'Delay Error code. Known values are: "InternalIssueDelay", "ActiveOrderLimitBreachedDelay", "HighDemandDelay", and "LargeNumberOfFilesDelay".'
        description:
          type: string
          description: Description of the delay.
        startTime:
          type: string
          format: date-time
          description: Timestamp when the delay notification was created.
        resolutionTime:
          type: string
          format: date-time
          description: Timestamp when the delay notification was resolved.
    ContactDetails:
      type: object
      description: Contact Details. All required parameters must be populated in order to send to server.
      properties:
        contactName:
          type: string
          description: Contact name of the person. Required.
        phone:
          type: string
          description: Phone number of the contact person. Required.
        phoneExtension:
          type: string
          description: Phone extension number of the contact person.
        mobile:
          type: string
          description: Mobile number of the contact person.
        emailList:
          type: array
          items:
            type: string
          description: List of Email-ids to be notified about job progress. Required.
        notificationPreference:
          type: array
          items:
            $ref: "#/components/schemas/NotificationPreference"
          description: Notification preference for a job stage.
      required:
        - contactName
        - phone
        - emailList
    NotificationPreference:
      type: object
      description: Notification preference for a job stage. All required parameters must be populated in order to send to server.
      properties:
        stageName:
          type: string
          description: 'Name of the stage. Required. Known values are: "DevicePrepared", "Dispatched", "Delivered", "PickedUp", "AtAzureDC", "DataCopy", "Created", and "ShippedToCustomer".'
        sendNotification:
          type: boolean
          description: Notification is required or not.
      required:
        - stageName
        - sendNotification
    ShippingAddress:
      type: object
      description: Shipping address where customer wishes to receive the device. All required parameters must be populated in order to send to server.
      properties:
        streetAddress1:
          type: string
          description: Street Address line 1. Required.
        streetAddress2:
          type: string
          description: Street Address line 2.
        streetAddress3:
          type: string
          description: Street Address line 3.
        city:
          type: string
          description: Name of the City.
        stateOrProvince:
          type: string
          description: Name of the State or Province.
        country:
          type: string
          description: Name of the Country. Required.
        postalCode:
          type: string
          description: Postal code.
        zipExtendedCode:
          type: string
          description: Extended Zip Code.
        companyName:
          type: string
          description: Name of the company.
        addressType:
          type: string
          description: 'Type of address. Known values are: "None", "Residential", and "Commercial".'
        skipAddressValidation:
          type: boolean
          description: Flag to indicate if customer has chosen to skip default address validation.
        taxIdentificationNumber:
          type: string
          description: Tax Identification Number.
      required:
        - streetAddress1
        - country
    PackageShippingDetails:
      type: object
      description: package shipping details. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        trackingUrl:
          type: string
          description: Url where shipment can be tracked.
        carrierName:
          type: string
          description: Name of the carrier.
        trackingId:
          type: string
          description: Tracking Id of shipment.
    DataImportDetails:
      type: object
      description: Details of the data to be used for importing data to azure. All required parameters must be populated in order to send to server.
      properties:
        accountDetails:
          $ref: "#/components/schemas/DataAccountDetails"
          description: Account details of the data to be transferred. Required.
        logCollectionLevel:
          type: string
          description: 'Level of the logs to be collected. Known values are: "Error" and "Verbose".'
      required:
        - accountDetails
    DataAccountDetails:
      type: object
      description: "Account details of the data to be transferred. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ManagedDiskDetails, StorageAccountDetails All required parameters must be populated in order to send to server."
      properties:
        dataAccountType:
          type: string
          description: 'Account Type of the data to be transferred. Required. Known values are: "StorageAccount" and "ManagedDisk".'
        sharePassword:
          type: string
          description: "Password for all the shares to be created on the device. Should not be passed for TransferType:ExportFromAzure jobs. If this is not passed, the service will generate password itself. This will not be returned in Get Call. Password Requirements : Password must be minimum of 12 and maximum of 64 characters. Password must have at least one uppercase alphabet, one number and one special character. Password cannot have the following characters : IilLoO0 Password can have only alphabets, numbers and these characters : @#-$%^!+=;:_()]+."
      required:
        - dataAccountType
    DataExportDetails:
      type: object
      description: Details of the data to be used for exporting data from azure. All required parameters must be populated in order to send to server.
      properties:
        transferConfiguration:
          $ref: "#/components/schemas/TransferConfiguration"
          description: Configuration for the data transfer. Required.
        logCollectionLevel:
          type: string
          description: 'Level of the logs to be collected. Known values are: "Error" and "Verbose".'
        accountDetails:
          $ref: "#/components/schemas/DataAccountDetails"
          description: Account details of the data to be transferred. Required.
      required:
        - transferConfiguration
        - accountDetails
    TransferConfiguration:
      type: object
      description: Configuration for defining the transfer of data. All required parameters must be populated in order to send to server.
      properties:
        transferConfigurationType:
          type: string
          description: 'Type of the configuration for transfer. Required. Known values are: "TransferAll" and "TransferUsingFilter".'
        transferFilterDetails:
          $ref: "#/components/schemas/TransferConfigurationTransferFilterDetails"
          description: Map of filter type and the details to filter. This field is required only if the TransferConfigurationType is given as TransferUsingFilter.
        transferAllDetails:
          $ref: "#/components/schemas/TransferConfigurationTransferAllDetails"
          description: Map of filter type and the details to transfer all data. This field is required only if the TransferConfigurationType is given as TransferAll.
      required:
        - transferConfigurationType
    TransferConfigurationTransferFilterDetails:
      type: object
      description: Map of filter type and the details to filter. This field is required only if the TransferConfigurationType is given as TransferUsingFilter.
      properties:
        include:
          $ref: "#/components/schemas/TransferFilterDetails"
          description: Details of the filtering the transfer of data.
    TransferFilterDetails:
      type: object
      description: Details of the filtering the transfer of data. All required parameters must be populated in order to send to server.
      properties:
        dataAccountType:
          type: string
          description: 'Type of the account of data. Required. Known values are: "StorageAccount" and "ManagedDisk".'
        blobFilterDetails:
          $ref: "#/components/schemas/BlobFilterDetails"
          description: Filter details to transfer blobs.
        azureFileFilterDetails:
          $ref: "#/components/schemas/AzureFileFilterDetails"
          description: Filter details to transfer Azure files.
        filterFileDetails:
          type: array
          items:
            $ref: "#/components/schemas/FilterFileDetails"
          description: Details of the filter files to be used for data transfer.
      required:
        - dataAccountType
    BlobFilterDetails:
      type: object
      description: Filter details to transfer Azure Blobs.
      properties:
        blobPrefixList:
          type: array
          items:
            type: string
          description: Prefix list of the Azure blobs to be transferred.
        blobPathList:
          type: array
          items:
            type: string
          description: List of full path of the blobs to be transferred.
        containerList:
          type: array
          items:
            type: string
          description: List of blob containers to be transferred.
    AzureFileFilterDetails:
      type: object
      description: Filter details to transfer Azure files.
      properties:
        filePrefixList:
          type: array
          items:
            type: string
          description: Prefix list of the Azure files to be transferred.
        filePathList:
          type: array
          items:
            type: string
          description: List of full path of the files to be transferred.
        fileShareList:
          type: array
          items:
            type: string
          description: List of file shares to be transferred.
    FilterFileDetails:
      type: object
      description: Details of the filter files to be used for data transfer. All required parameters must be populated in order to send to server.
      properties:
        filterFileType:
          type: string
          description: 'Type of the filter file. Required. Known values are: "AzureBlob" and "AzureFile".'
        filterFilePath:
          type: string
          description: Path of the file that contains the details of all items to transfer. Required.
      required:
        - filterFileType
        - filterFilePath
    TransferConfigurationTransferAllDetails:
      type: object
      description: Map of filter type and the details to transfer all data. This field is required only if the TransferConfigurationType is given as TransferAll.
      properties:
        include:
          $ref: "#/components/schemas/TransferAllDetails"
          description: Details to transfer all data.
    TransferAllDetails:
      type: object
      description: Details to transfer all data. All required parameters must be populated in order to send to server.
      properties:
        dataAccountType:
          type: string
          description: 'Type of the account of data. Required. Known values are: "StorageAccount" and "ManagedDisk".'
        transferAllBlobs:
          type: boolean
          description: To indicate if all Azure blobs have to be transferred.
        transferAllFiles:
          type: boolean
          description: To indicate if all Azure Files have to be transferred.
      required:
        - dataAccountType
    Preferences:
      type: object
      description: Preferences related to the order.
      properties:
        preferredDataCenterRegion:
          type: array
          items:
            type: string
          description: Preferred data center region.
        transportPreferences:
          $ref: "#/components/schemas/TransportPreferences"
          description: Preferences related to the shipment logistics of the sku.
        reverseTransportPreferences:
          $ref: "#/components/schemas/TransportPreferences"
          description: Optional Preferences related to the reverse shipment logistics of the sku.
        encryptionPreferences:
          $ref: "#/components/schemas/EncryptionPreferences"
          description: Preferences related to the Encryption.
        storageAccountAccessTierPreferences:
          type: array
          items:
            type: string
          description: Preferences related to the Access Tier of storage accounts.
    TransportPreferences:
      type: object
      description: Preferences related to the shipment logistics of the sku. Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server.
      properties:
        preferredShipmentType:
          type: string
          description: 'Indicates Shipment Logistics type that the customer preferred. Required. Known values are: "CustomerManaged" and "MicrosoftManaged".'
        isUpdated:
          type: boolean
          description: Read only property which indicates whether transport preferences has been updated or not after device is prepared.
      required:
        - preferredShipmentType
    EncryptionPreferences:
      type: object
      description: Preferences related to the Encryption.
      properties:
        doubleEncryption:
          type: string
          description: 'Defines secondary layer of software-based encryption enablement. Known values are: "Enabled" and "Disabled".'
        hardwareEncryption:
          type: string
          description: 'Defines Hardware level encryption (Only for disk). Known values are: "Enabled" and "Disabled".'
    ReverseShippingDetails:
      type: object
      description: Reverse Shipping Address and contact details for a job. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        contactDetails:
          $ref: "#/components/schemas/ContactInfo"
          description: Contact Info.
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
          description: Shipping address where customer wishes to receive the device.
        isUpdated:
          type: boolean
          description: A flag to indicate whether Reverse Shipping details are updated or not after device has been prepared. Read only field.
    ContactInfo:
      type: object
      description: Contact Info. All required parameters must be populated in order to send to server.
      properties:
        contactName:
          type: string
          description: Contact name of the person. Required.
        phone:
          type: string
          description: Phone number of the contact person. Required.
        phoneExtension:
          type: string
          description: Phone extension number of the contact person.
        mobile:
          type: string
          description: Mobile number of the contact person.
      required:
        - contactName
        - phone
    CopyLogDetails:
      type: object
      description: "Details for log generated during copy. You probably want to use the sub-classes and not this class directly. Known sub-classes are: DataBoxAccountCopyLogDetails, DataBoxCustomerDiskCopyLogDetails, DataBoxDiskCopyLogDetails, DataBoxHeavyAccountCopyLogDetails All required parameters must be populated in order to send to server."
      properties:
        copyLogDetailsType:
          type: string
          description: 'Indicates the type of job details. Required. Known values are: "DataBox", "DataBoxDisk", "DataBoxHeavy", and "DataBoxCustomerDisk".'
      required:
        - copyLogDetailsType
    DeviceErasureDetails:
      type: object
      description: Device erasure details with erasure completion status and erasureordestructionlog sas key. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        deviceErasureStatus:
          type: string
          description: 'Holds the device erasure completion status. Known values are: "None", "InProgress", "Succeeded", "Failed", "Cancelled", "Cancelling", "SucceededWithErrors", "WaitingForCustomerAction", "SucceededWithWarnings", "WaitingForCustomerActionForKek", "WaitingForCustomerActionForCleanUp", "CustomerActionPerformedForCleanUp", and "CustomerActionPerformed".'
        erasureOrDestructionCertificateSasKey:
          type: string
          description: Shared access key to download cleanup or destruction certificate for device.
    KeyEncryptionKey:
      type: object
      description: Encryption key containing details about key to encrypt different keys. All required parameters must be populated in order to send to server.
      properties:
        kekType:
          type: string
          description: 'Type of encryption key used for key encryption. Known values are: "MicrosoftManaged" and "CustomerManaged".'
        identityProperties:
          $ref: "#/components/schemas/IdentityProperties"
          description: Managed identity properties used for key encryption.
        kekUrl:
          type: string
          description: Key encryption key. It is required in case of Customer managed KekType.
        kekVaultResourceID:
          type: string
          description: Kek vault resource id. It is required in case of Customer managed KekType.
      required:
        - kekType
    IdentityProperties:
      type: object
      description: Managed identity properties.
      properties:
        type:
          type: string
          description: Managed service identity type.
        userAssigned:
          $ref: "#/components/schemas/UserAssignedProperties"
          description: User assigned identity properties.
    UserAssignedProperties:
      type: object
      description: User assigned identity properties.
      properties:
        resourceId:
          type: string
          description: Arm resource id for user assigned identity to be used to fetch MSI token.
    LastMitigationActionOnJob:
      type: object
      description: Last Mitigation Action Performed On Job.
      properties:
        actionDateTimeInUtc:
          type: string
          format: date-time
          description: Action performed date time.
        isPerformedByCustomer:
          type: boolean
          description: Action performed by customer, possibility is that mitigation might happen by customer or service or by ops.
        customerResolution:
          type: string
          description: 'Resolution code provided by customer. Known values are: "None", "MoveToCleanUpDevice", "Resume", "Restart", and "ReachOutToOperation".'
    DatacenterAddressResponse:
      type: object
      description: "Datacenter address for given storage location. You probably want to use the sub-classes and not this class directly. Known sub-classes are: DatacenterAddressInstructionResponse, DatacenterAddressLocationResponse Variables are only populated by the server, and will be ignored when sending a request. All required parameters must be populated in order to send to server."
      properties:
        datacenterAddressType:
          type: string
          description: 'Data center address type. Required. Known values are: "DatacenterAddressLocation" and "DatacenterAddressInstruction".'
        supportedCarriersForReturnShipment:
          type: array
          items:
            type: string
          description: List of supported carriers for return shipment.
        dataCenterAzureLocation:
          type: string
          description: Azure Location where the Data Center serves primarily.
      required:
        - datacenterAddressType
    JobDeliveryInfo:
      type: object
      description: Additional delivery info.
      properties:
        scheduledDateTime:
          type: string
          format: date-time
          description: Scheduled date time.
    JobResourceFlattened:
      type: object
      description: Flattened view of JobResource ('properties' hoisted to the top level).
      properties:
        location:
          type: string
          description: The location of the resource. This will be one of the supported and registered Azure Regions (e.g. West US, East US, Southeast Asia, etc.). The region of a resource cannot be changed once it is created, but if an identical region is specified on update the request will succeed. Required.
        tags:
          type: object
          properties: {}
          description: The list of key value pairs that describe the resource. These tags can be used in viewing and grouping this resource (across resource groups).
        sku:
          $ref: "#/components/schemas/Sku"
          description: The sku type. Required.
        identity:
          $ref: "#/components/schemas/ResourceIdentity"
          description: Msi identity of the resource.
        name:
          type: string
          description: Name of the object.
        id:
          type: string
          description: Id of the object.
        type:
          type: string
          description: Type of the object.
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Metadata pertaining to creation and last modification of the resource.
        transferType:
          type: string
          description: 'Type of the data transfer. Required. Known values are: "ImportToAzure" and "ExportFromAzure".'
        isCancellable:
          type: boolean
