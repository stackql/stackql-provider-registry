paths:
  /{scope}/providers/Microsoft.CustomProviders/associations/{association_name}?api-version=2018-09-01-preview:
    get:
      operationId: Associations_get
      description: Get an association.
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: The scope of the association. Required.
        - name: association_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the association. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationFlattened"
    put:
      operationId: Associations_begin_create_or_update
      description: Create or update an association.
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: The scope of the association. The scope can be any valid REST resource instance. For example, use '/subscriptions/{subscription-id}/resourceGroups/{resource-group-name}/providers/Microsoft.Compute/virtualMachines/{vm-name}' for a virtual machine resource. Required.
        - name: association_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the association. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: object
                  properties:
                    targetResourceId:
                      type: string
                      description: The REST resource instance of the target resource for this association.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Association"
    delete:
      operationId: Associations_begin_delete
      description: Delete an association.
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
          description: The scope of the association. Required.
        - name: association_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the association. Required.
      responses:
        "204":
          description: Success (no content / accepted)
