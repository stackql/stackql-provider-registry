      operationId: CustomResourceProvider_begin_delete
      description: Deletes the custom resource provider.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. Required.
        - name: resource_provider_name
