          application/json:
            schema:
              type: object
              properties:
                location:
                  type: string
                  description: Resource location. Required.
                tags:
                  type: object
                  properties: {}
                  description: Resource tags.
                properties:
                  type: object
                  properties:
                    actions:
                      type: array
                      items:
                        $ref: "#/components/schemas/CustomRPActionRouteDefinition"
                      description: A list of actions that the custom resource provider implements.
                    resourceTypes:
