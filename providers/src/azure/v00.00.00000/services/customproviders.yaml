    put:
      operationId: CustomResourceProvider_begin_create_or_update
      description: Creates or updates the custom resource provider.
      parameters:
        - name: resource_group_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource group. Required.
        - name: resource_provider_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the resource provider. Required.
        - name: subscription_id
          in: path
          required: true
