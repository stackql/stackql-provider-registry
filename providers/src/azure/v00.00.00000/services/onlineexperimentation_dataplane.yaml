openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Online Experimentation Client
  description: OnlineExperimentationClient.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-05-31-preview-stackql-generated
  x-serviceAlias: onlineexperimentation_dataplane
  x-sdkPackage: azure-onlineexperimentation
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    LifecycleStage:
      type: string
      enum:
        - Active
        - Inactive
    DesiredDirection:
      type: string
      enum:
        - Increase
        - Decrease
        - Neutral
    ExperimentMetricDefinition:
      type: object
      description: "The metric definition, which determines how the metric value is calculated from event data. You probably want to use the sub-classes and not this class directly. Known sub-classes are: AverageMetricDefinition, EventCountMetricDefinition, EventRateMetricDefinition, PercentileMetricDefinition, SumMetricDefinition, UserCountMetricDefinition, UserRateMetricDefinition"
      properties:
        type:
          type: string
          description: 'Discriminator property for ExperimentMetricDefinition. Required. Known values are: "EventCount", "UserCount", "EventRate", "UserRate", "Sum", "Average", and "Percentile".'
      required:
        - type
    ExperimentMetric:
      type: object
      description: Defines experiment metric metadata and computation details.
      properties:
        id:
          type: string
          description: Identifier for this experiment metric. Must start with a lowercase letter and contain only lowercase letters, numbers, and underscores. Required.
        lifecycle:
          $ref: "#/components/schemas/LifecycleStage"
          description: 'Determines whether it is included in experiment analysis. Required. Known values are: "Active" and "Inactive".'
        displayName:
          type: string
          description: A user-friendly display name for the experiment metric shown in reports and dashboards. Required.
        description:
          type: string
          description: A detailed description of the experiment metric. Required.
        categories:
          type: array
          items:
            type: string
          description: Categories associated with the experiment metric. Used for organizing and filtering metrics. Required.
        desiredDirection:
          $ref: "#/components/schemas/DesiredDirection"
          description: 'The desired direction for changes in the metric value. Required. Known values are: "Increase", "Decrease", and "Neutral".'
        definition:
          $ref: "#/components/schemas/ExperimentMetricDefinition"
          description: The metric definition specifying how the metric value is calculated from event data. Required.
        eTag:
          type: string
          description: ETag of the experiment metric. Required.
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp (UTC) of the last modification to the experiment metric resource. Required.
      required:
        - lifecycle
        - displayName
        - description
        - categories
        - desiredDirection
        - definition
    PagedExperimentMetric:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ExperimentMetric"
        nextLink:
          type: string
    ExperimentMetricValidationResult:
      type: object
      description: The result of validating an experiment metric.
      properties:
        isValid:
          type: boolean
          description: Indicates whether the experiment metric is valid. Required.
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosticDetail"
          description: Diagnostic details from the validation process. Required.
      required:
        - isValid
    DiagnosticDetail:
      type: object
      description: Diagnostic details for validation errors.
      properties:
        message:
          type: string
          description: A human-readable error message. Required.
        code:
          $ref: "#/components/schemas/DiagnosticCode"
          description: 'The diagnostic error code. Required. Known values are: "FailedSchemaValidation", "InvalidEventCondition", "UnsupportedEventCondition", and "InvalidExperimentMetricDefinition".'
    DiagnosticCode:
      type: string
      enum:
        - FailedSchemaValidation
        - InvalidEventCondition
        - UnsupportedEventCondition
        - InvalidExperimentMetricDefinition
  x-stackQL-resources:
    metrics:
      id: azure.onlineexperimentation_dataplane.metrics
      name: metrics
      title: metrics
      methods:
        list_metrics:
          operation:
