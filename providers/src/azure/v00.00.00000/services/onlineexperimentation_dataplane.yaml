            mediaType: application/json
        create_or_update_metric:
          operation:
            $ref: "#/paths/~1experiment-metrics~1{experiment_metric_id}?api-version=2025-05-31-preview/patch"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_metric:
          operation:
            $ref: "#/paths/~1experiment-metrics~1{experiment_metric_id}?api-version=2025-05-31-preview/delete"
          response:
            openAPIDocKey: "204"
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/metrics/methods/get_metric"
          - $ref: "#/components/x-stackQL-resources/metrics/methods/list_metrics"
        insert:
          - $ref: "#/components/x-stackQL-resources/metrics/methods/create_or_update_metric"
        update: []
        replace:
          - $ref: "#/components/x-stackQL-resources/metrics/methods/create_or_update_metric"
        delete:
          - $ref: "#/components/x-stackQL-resources/metrics/methods/delete_metric"
    validate_metrics:
      id: azure.onlineexperimentation_dataplane.validate_metrics
      name: validate_metrics
      title: validate_metrics
      methods:
        validate_metric:
          operation:
            $ref: "#/paths/~1experiment-metrics:validate?api-version=2025-05-31-preview/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: camel
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select: []
        insert: []
        update: []
        delete: []
