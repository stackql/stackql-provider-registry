openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Kusto Management Client
  description: The Azure Kusto management API provides a RESTful set of web services that interact with Azure Kusto services to manage your clusters and databases. The API enables you to create, update, and delete clusters and databases.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-02-14-stackql-generated
  x-serviceAlias: kusto
  x-sdkPackage: azure-mgmt-kusto
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AttachedDatabaseConfigurationProperties:
      type: object
      description: Class representing the an attached database configuration properties of kind specific.
      properties:
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'The provisioned state of the resource. Known values are: "Running", "Creating", "Deleting", "Succeeded", "Failed", "Moving", and "Canceled".'
        databaseName:
          type: string
          description: The name of the database which you would like to attach, use * if you want to follow all current and future databases. Required.
        clusterResourceId:
          type: string
          description: The resource id of the cluster where the databases you would like to attach reside. Required.
        attachedDatabaseNames:
          type: array
          items:
            type: string
          description: The list of databases from the clusterResourceId which are currently attached to the cluster.
        defaultPrincipalsModificationKind:
          $ref: "#/components/schemas/DefaultPrincipalsModificationKind"
          description: 'The default principals modification kind. Required. Known values are: "Union", "Replace", and "None".'
        tableLevelSharingProperties:
          $ref: "#/components/schemas/TableLevelSharingProperties"
          description: Table level sharing specifications.
        databaseNameOverride:
          type: string
          description: Overrides the original database name. Relevant only when attaching to a specific database.
        databaseNamePrefix:
          type: string
          description: Adds a prefix to the attached databases name. When following an entire cluster, that prefix would be added to all of the databases original names from leader cluster.
      required:
        - databaseName
        - clusterResourceId
        - defaultPrincipalsModificationKind
    ProvisioningState:
      type: string
      enum:
        - Running
        - Creating
        - Deleting
        - Succeeded
        - Failed
        - Moving
        - Canceled
    DefaultPrincipalsModificationKind:
      type: string
      enum:
        - Union
        - Replace
        - None
    TableLevelSharingProperties:
      type: object
      description: Tables that will be included and excluded in the follower database.
      properties:
        tablesToInclude:
          type: array
          items:
            type: string
          description: List of tables to include in the follower database.
        tablesToExclude:
          type: array
          items:
            type: string
          description: List of tables to exclude from the follower database.
        externalTablesToInclude:
          type: array
          items:
            type: string
          description: List of external tables to include in the follower database.
        externalTablesToExclude:
          type: array
          items:
            type: string
          description: List of external tables to exclude from the follower database.
        materializedViewsToInclude:
          type: array
