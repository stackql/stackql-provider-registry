        netCoreOptmemMax:
          type: integer
          description: Sysctl setting net.core.optmem_max.
        netIpv4TcpMaxSynBacklog:
          type: integer
          description: Sysctl setting net.ipv4.tcp_max_syn_backlog.
        netIpv4TcpMaxTwBuckets:
          type: integer
          description: Sysctl setting net.ipv4.tcp_max_tw_buckets.
        netIpv4TcpFinTimeout:
          type: integer
          description: Sysctl setting net.ipv4.tcp_fin_timeout.
        netIpv4TcpKeepaliveTime:
          type: integer
          description: Sysctl setting net.ipv4.tcp_keepalive_time.
        netIpv4TcpKeepaliveProbes:
          type: integer
          description: Sysctl setting net.ipv4.tcp_keepalive_probes.
        netIpv4TcpkeepaliveIntvl:
          type: integer
          description: Sysctl setting net.ipv4.tcp_keepalive_intvl.
        netIpv4TcpTwReuse:
          type: boolean
          description: Sysctl setting net.ipv4.tcp_tw_reuse.
        netIpv4IpLocalPortRange:
          type: string
          description: Sysctl setting net.ipv4.ip_local_port_range.
        netIpv4NeighDefaultGcThresh1:
          type: integer
          description: Sysctl setting net.ipv4.neigh.default.gc_thresh1.
        netIpv4NeighDefaultGcThresh2:
          type: integer
          description: Sysctl setting net.ipv4.neigh.default.gc_thresh2.
        netIpv4NeighDefaultGcThresh3:
          type: integer
          description: Sysctl setting net.ipv4.neigh.default.gc_thresh3.
        netNetfilterNfConntrackMax:
          type: integer
          description: Sysctl setting net.netfilter.nf_conntrack_max.
        netNetfilterNfConntrackBuckets:
          type: integer
          description: Sysctl setting net.netfilter.nf_conntrack_buckets.
        fsInotifyMaxUserWatches:
          type: integer
          description: Sysctl setting fs.inotify.max_user_watches.
        fsFileMax:
          type: integer
          description: Sysctl setting fs.file-max.
        fsAioMaxNr:
          type: integer
          description: Sysctl setting fs.aio-max-nr.
        fsNrOpen:
          type: integer
          description: Sysctl setting fs.nr_open.
        kernelThreadsMax:
          type: integer
          description: Sysctl setting kernel.threads-max.
        vmMaxMapCount:
          type: integer
          description: Sysctl setting vm.max_map_count.
        vmSwappiness:
          type: integer
          description: Sysctl setting vm.swappiness.
        vmVfsCachePressure:
          type: integer
          description: Sysctl setting vm.vfs_cache_pressure.
    GPUInstanceProfile:
      type: string
      enum:
        - MIG1g
        - MIG2g
        - MIG3g
        - MIG4g
        - MIG7g
    CreationData:
      type: object
      description: Data used when creating a target resource from a source resource.
      properties:
        sourceResourceId:
          type: string
          description: This is the ARM ID of the source object to be used to create the target object.
    AgentPoolNetworkProfile:
      type: object
      description: Network settings of an agent pool.
      properties:
        nodePublicIPTags:
          type: array
          items:
            $ref: "#/components/schemas/IPTag"
          description: IPTags of instance-level public IPs.
        nodePublicIPPrefixIDs:
          type: array
          items:
            type: string
          description: The resource IDs of public IP prefixes for node public IPs. At most one IPv4 and one IPv6 prefix may be specified. Order does not matter; the RP determines IP version from the referenced resource's publicIPAddressVersion. Requires enableNodePublicIP to be true on the agent pool. Mutually exclusive with the top-level nodePublicIPPrefixID property. Immutable after node pool creation. To change prefixes, delete and recreate the node pool. For more information, see `https://aka.ms/aks/ipv6-ilpip `_.
        allowedHostPorts:
          type: array
          items:
            $ref: "#/components/schemas/PortRange"
          description: The port ranges that are allowed to access. The specified ranges are allowed to overlap.
        applicationSecurityGroups:
          type: array
          items:
            type: string
          description: The IDs of the application security groups which agent pool will associate when created.
        secondaryNetworkInterfaces:
          type: array
          items:
            $ref: "#/components/schemas/AgentPoolNetworkInterface"
          description: "Secondary network interface configurations for each VM in the agent pool. Each entry is a template: one physical NIC per entry is provisioned on every VM instance. These interfaces are created at agent pool creation time and are immutable. The length of the list must be less than the NIC capacity minus 1 for the VM size of the agent pool (AKS manages the primary NIC). For example, a Standard_D8a_v4 VM supports up to 4 NICs, so the maximum number of secondary interfaces allowed is 3. For mixed-SKU VM pools the effective capacity is the minimum across all SKUs: count(secondaryNetworkInterfaces) + 1 <= min(maxNICs). For more information, see `https://aka.ms/aks/multi-nic `_."
    IPTag:
      type: object
      description: Contains the IPTag associated with the object.
      properties:
        ipTagType:
          type: string
          description: "The IP tag type. Example: RoutingPreference."
        tag:
          type: string
          description: "The value of the IP tag associated with the public IP. Example: Internet."
    PortRange:
      type: object
      description: The port range.
      properties:
        portStart:
          type: integer
          description: The minimum port that is included in the range. It should be ranged from 1 to 65535, and be less than or equal to portEnd.
        portEnd:
          type: integer
          description: The maximum port that is included in the range. It should be ranged from 1 to 65535, and be greater than or equal to portStart.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: 'The network protocol of the port. Known values are: "TCP" and "UDP".'
    Protocol:
      type: string
      enum:
        - TCP
        - UDP
    AgentPoolNetworkInterface:
      type: object
      description: Configuration of a secondary network interface provisioned on each VM instance in the agent pool. For more information, see `https://aka.ms/aks/multi-nic `_.
      properties:
        type:
          $ref: "#/components/schemas/AgentPoolNetworkInterfaceType"
          description: 'Type of NIC to be provisioned on the VM. Known values are: "Standard" and "Dynamic".'
        vnetSubnetId:
          type: string
          description: The resource ID of the subnet which will be attached to the secondary network interface. Required when `type` is `Standard`; must be an empty string (`""`) or omitted when `type` is `Dynamic`.
        enableAcceleratedNetworking:
          type: boolean
          description: Whether accelerated networking is enabled on this secondary NIC. If omitted, this defaults to true only when the agent pool VM SKU supports accelerated networking. Validation will fail if it is enabled on an unsupported SKU or NIC configuration.
    AgentPoolNetworkInterfaceType:
      type: string
      enum:
        - Standard
        - Dynamic
    AgentPoolWindowsProfile:
      type: object
      description: The Windows agent pool's specific profile.
      properties:
        disableOutboundNat:
          type: boolean
          description: Whether to disable OutboundNAT in windows nodes. The default value is false. Outbound NAT can only be disabled if the cluster outboundType is NAT Gateway and the Windows agent pool does not have node public IP enabled.
    AgentPoolSecurityProfile:
      type: object
      description: The security settings of an agent pool.
      properties:
        enableVTPM:
          type: boolean
          description: vTPM is a Trusted Launch feature for configuring a dedicated secure vault for keys and measurements held locally on the node. For more details, see aka.ms/aks/trustedlaunch. If not specified, the default is false.
        enableSecureBoot:
          type: boolean
          description: Secure Boot is a feature of Trusted Launch which ensures that only signed operating systems and drivers can boot. For more details, see aka.ms/aks/trustedlaunch. If not specified, the default is false.
        sshAccess:
          $ref: "#/components/schemas/AgentPoolSSHAccess"
          description: 'SSH access method of an agent pool. Known values are: "LocalUser", "Disabled", and "EntraId".'
    AgentPoolSSHAccess:
      type: string
      enum:
        - LocalUser
        - Disabled
        - EntraId
    GPUProfile:
      type: object
      description: GPU settings for the Agent Pool.
      properties:
        driver:
          $ref: "#/components/schemas/GPUDriver"
          description: "Whether to install GPU drivers. When it's not specified, default is Install. Known values are: \"Install\" and \"None\"."
        driverType:
          $ref: "#/components/schemas/DriverType"
          description: 'Specify the type of GPU driver to install when creating Windows agent pools. If not provided, AKS selects the driver based on system compatibility. This cannot be changed once the AgentPool has been created. This cannot be set on Linux AgentPools. For Linux AgentPools, the driver is selected based on system compatibility. Known values are: "GRID" and "CUDA".'
        nvidia:
          $ref: "#/components/schemas/NvidiaGPUProfile"
          description: NVIDIA-specific GPU settings.
    GPUDriver:
      type: string
      enum:
        - Install
        - None
    DriverType:
      type: string
      enum:
        - GRID
        - CUDA
    NvidiaGPUProfile:
      type: object
      description: NVIDIA-specific GPU settings.
      properties:
        managementMode:
          $ref: "#/components/schemas/ManagementMode"
          description: 'The Managed GPU experience installs additional components, such as the Data Center GPU Manager (DCGM) metrics for monitoring, on top of the GPU driver for you. For more details of what is installed, check out aka.ms/aks/managed-gpu. Known values are: "Unmanaged" and "Managed".'
        migStrategy:
          $ref: "#/components/schemas/MigStrategy"
          description: 'Sets the MIG (Multi-Instance GPU) strategy that will be used for managed MIG support. For more information about the different strategies, visit aka.ms/aks/managed-gpu. When not specified, the default is None. Known values are: "None", "Single", and "Mixed".'
    ManagementMode:
      type: string
      enum:
        - Unmanaged
        - Managed
    MigStrategy:
      type: string
      enum:
        - None
        - Single
        - Mixed
    AgentPoolGatewayProfile:
      type: object
      description: Profile of the managed cluster gateway agent pool.
      properties:
        publicIPPrefixSize:
          type: integer
          description: The Gateway agent pool associates one public IPPrefix for each static egress gateway to provide public egress. The size of Public IPPrefix should be selected by the user. Each node in the agent pool is assigned with one IP from the IPPrefix. The IPPrefix size thus serves as a cap on the size of the Gateway agent pool. Due to Azure public IPPrefix size limitation, the valid value range is [28, 31] (/31 = 2 nodes/IPs, /30 = 4 nodes/IPs, /29 = 8 nodes/IPs, /28 = 16 nodes/IPs). The default value is 31.
    AgentPoolArtifactStreamingProfile:
      type: object
      description: Artifact streaming profile for the agent pool.
      properties:
        enabled:
          type: boolean
          description: Artifact streaming speeds up the cold-start of containers on a node through on-demand image loading. To use this feature, container images must also enable artifact streaming on ACR. If not specified, the default is false.
    VirtualMachinesProfile:
      type: object
      description: Specifications on VirtualMachines agent pool.
      properties:
        scale:
          $ref: "#/components/schemas/ScaleProfile"
          description: Specifications on how to scale a VirtualMachines agent pool.
    ScaleProfile:
      type: object
      description: Specifications on how to scale a VirtualMachines agent pool.
      properties:
        manual:
          type: array
          items:
            $ref: "#/components/schemas/ManualScaleProfile"
          description: Specifications on how to scale the VirtualMachines agent pool to a fixed size.
        autoscale:
          type: array
          items:
            $ref: "#/components/schemas/AutoScaleProfile"
          description: Specifications on how to auto-scale the VirtualMachines agent pool within a predefined size range. Each profile targets a specific VM SKU and is evaluated independently. Scaling decisions across profiles are governed by the cluster autoscaler expander, configurable via `ManagedCluster.properties.autoScalerProfile.expander`.
    ManualScaleProfile:
      type: object
      description: Specifications on number of machines.
      properties:
        size:
          type: string
          description: VM size that AKS will use when creating and scaling e.g. 'Standard_E4s_v3', 'Standard_E16s_v3' or 'Standard_D16s_v5'.
        count:
          type: integer
          description: Number of nodes.
    AutoScaleProfile:
      type: object
      description: Specifications on auto-scaling.
      properties:
        size:
          type: string
          description: VM size that AKS will use when creating and scaling e.g. 'Standard_E4s_v3', 'Standard_E16s_v3' or 'Standard_D16s_v5'.
        minCount:
          type: integer
          description: The minimum number of nodes of the specified sizes.
        maxCount:
          type: integer
          description: The maximum number of nodes of the specified sizes.
    VirtualMachineNodes:
      type: object
      description: Current status on a group of nodes of the same vm size.
      properties:
        size:
          type: string
          description: The VM size of the agents used to host this group of nodes.
        count:
          type: integer
          description: Number of nodes.
    AgentPoolStatus:
      type: object
      description: Contains read-only information about the Agent Pool.
      properties:
        provisioningError:
          $ref: "#/components/schemas/ErrorDetail"
          description: The error detail information of the agent pool. Preserves the detailed info of failure. If there was no error, this field is omitted.
    ErrorDetail:
      type: object
      description: The error detail.
      properties:
        code:
          type: string
          description: The error code.
        message:
          type: string
          description: The error message.
        target:
          type: string
          description: The error target.
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
          description: The error details.
        additionalInfo:
          type: array
          items:
            $ref: "#/components/schemas/ErrorAdditionalInfo"
          description: The error additional info.
    ErrorAdditionalInfo:
      type: object
      description: The resource management error additional info.
      properties:
        type:
          type: string
          description: The additional info type.
        info:
          type: object
          properties: {}
          description: The additional info.
    LocalDNSProfile:
      type: object
      description: Configures the per-node local DNS, with VnetDNS and KubeDNS overrides. LocalDNS helps improve performance and reliability of DNS resolution in an AKS cluster. For more details see aka.ms/aks/localdns.
      properties:
        mode:
          $ref: "#/components/schemas/LocalDNSMode"
          description: 'Mode of enablement for localDNS. Known values are: "Preferred", "Required", and "Disabled".'
        state:
          $ref: "#/components/schemas/LocalDNSState"
          description: 'System-generated state of localDNS. Known values are: "Enabled" and "Disabled".'
        vnetDNSOverrides:
          type: object
          properties: {}
          description: VnetDNS overrides apply to DNS traffic from pods with dnsPolicy:default or kubelet (referred to as VnetDNS traffic).
        kubeDNSOverrides:
          type: object
          properties: {}
          description: KubeDNS overrides apply to DNS traffic from pods with dnsPolicy:ClusterFirst (referred to as KubeDNS traffic).
    LocalDNSMode:
      type: string
      enum:
        - Preferred
        - Required
        - Disabled
    LocalDNSState:
      type: string
      enum:
        - Enabled
        - Disabled
    PreparedImageSpecificationProfile:
      type: object
      description: Settings to determine the prepared image specification used to provision nodes in a pool.
      properties:
        preparedImageSpecificationId:
          type: string
          description: The resource ID of the prepared image specification resource to use. This can include a version. Omitting the version will use the latest version of the prepared image specification.
    AgentPoolFlattened:
      type: object
      description: Flattened view of AgentPool ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        eTag:
          type: string
          description: Unique read-only string used to implement optimistic concurrency. The eTag value will change when the resource is updated. Specify an if-match or if-none-match header with the eTag value for a subsequent request to enable optimistic concurrency per the normal eTag convention.
        count:
          type: integer
          description: Number of agents (VMs) to host docker containers. Allowed values must be in the range of 0 to 1000 (inclusive) for user pools and in the range of 1 to 1000 (inclusive) for system pools. The default value is 1.
        vmSize:
          type: string
          description: "The size of the agent pool VMs. VM size availability varies by region. If a node contains insufficient compute resources (memory, cpu, etc) pods might fail to run correctly. For more details on restricted VM sizes, see: `https://docs.microsoft.com/azure/aks/quotas-skus-regions `_."
        osDiskSizeGB:
          type: integer
          description: OS Disk Size in GB to be used to specify the disk size for every machine in the master/agent pool. If you specify 0, it will apply the default osDisk size according to the vmSize specified.
        osDiskType:
          $ref: "#/components/schemas/OSDiskType"
          description: "The OS disk type to be used for machines in the agent pool. The default is 'Ephemeral' if the VM supports it and has a cache disk larger than the requested OSDiskSizeGB. Otherwise, defaults to 'Managed'. May not be changed after creation. For more information see `Ephemeral OS `_. Known values are: \"Managed\" and \"Ephemeral\"."
        kubeletDiskType:
          $ref: "#/components/schemas/KubeletDiskType"
          description: 'Determines the placement of emptyDir volumes, container runtime data root, and Kubelet ephemeral storage. Known values are: "OS" and "Temporary".'
        workloadRuntime:
          $ref: "#/components/schemas/WorkloadRuntime"
          description: 'Determines the type of workload a node can run. Known values are: "OCIContainer", "WasmWasi", "KataMshvVmIsolation", and "KataVmIsolation".'
        messageOfTheDay:
          type: string
          description: Message of the day for Linux nodes, base64-encoded. A base64-encoded string which will be written to /etc/motd after decoding. This allows customization of the message of the day for Linux nodes. It must not be specified for Windows nodes. It must be a static string (i.e., will be printed raw and not be executed as a script).
        vnetSubnetID:
          type: string
          description: "The ID of the subnet which agent pool nodes and optionally pods will join on startup. If this is not specified, a VNET and subnet will be generated and used. If no podSubnetID is specified, this applies to nodes and pods, otherwise it applies to just nodes. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/virtualNetworks/{virtualNetworkName}/subnets/{subnetName}."
        podSubnetID:
          type: string
          description: "The ID of the subnet which pods will join when launched. If omitted, pod IPs are statically assigned on the node subnet (see vnetSubnetID for more details). This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/virtualNetworks/{virtualNetworkName}/subnets/{subnetName}."
        podIPAllocationMode:
          $ref: "#/components/schemas/PodIPAllocationMode"
          description: "Pod IP Allocation Mode. The IP allocation mode for pods in the agent pool. Must be used with podSubnetId. The default is 'DynamicIndividual'. Known values are: \"DynamicIndividual\" and \"StaticBlock\"."
        maxPods:
          type: integer
          description: The maximum number of pods that can run on a node.
        osType:
          $ref: "#/components/schemas/OSType"
          description: 'The operating system type. The default is Linux. Known values are: "Linux" and "Windows".'
        osSKU:
          $ref: "#/components/schemas/OSSKU"
          description: 'Specifies the OS SKU used by the agent pool. The default is Ubuntu if OSType is Linux. The default is Windows2019 when Kubernetes <= 1.24 or Windows2022 when Kubernetes >= 1.25 if OSType is Windows. Known values are: "Ubuntu", "AzureLinux", "AzureLinux3", "Mariner", "Flatcar", "CBLMariner", "Windows2019", "Windows2022", "Ubuntu2204", "Windows2025", "WindowsAnnual", "Ubuntu2404", and "AzureContainerLinux".'
        maxCount:
          type: integer
          description: The maximum number of nodes for auto-scaling.
        minCount:
          type: integer
          description: The minimum number of nodes for auto-scaling.
        enableAutoScaling:
          type: boolean
          description: Whether to enable auto-scaler.
        scaleDownMode:
          $ref: "#/components/schemas/ScaleDownMode"
          description: 'The scale down mode to use when scaling the Agent Pool. This also effects the cluster autoscaler behavior. If not specified, it defaults to Delete. Known values are: "Delete" and "Deallocate".'
        mode:
          $ref: "#/components/schemas/AgentPoolMode"
          description: "The mode of an agent pool. A cluster must have at least one 'System' Agent Pool at all times. For additional information on agent pool restrictions and best practices, see: `https://docs.microsoft.com/azure/aks/use-system-pools `_. Known values are: \"System\", \"User\", \"Gateway\", \"ManagedSystem\", and \"Machines\"."
        orchestratorVersion:
          type: string
          description: The version of Kubernetes specified by the user. Both patch version (e.g. 1.20.13) and (e.g. 1.20) are supported. When is specified, the latest supported GA patch version is chosen automatically. Updating the cluster with the same once it has been created (e.g. 1.14.x -> 1.14) will not trigger an upgrade, even if a newer patch version is available. As a best practice, you should upgrade all node pools in an AKS cluster to the same Kubernetes version. The node pool version must have the same major version as the control plane. The node pool minor version must be within two minor versions of the control plane version. The node pool version cannot be greater than the control plane version. For more information see `upgrading a node pool `_.
        currentOrchestratorVersion:
          type: string
          description: The version of Kubernetes the Agent Pool is running. If orchestratorVersion is a fully specified version , this field will be exactly equal to it. If orchestratorVersion is , this field will contain the full version being used.
        nodeImageVersion:
          type: string
          description: The version of the node image. Setting this value triggers an agentPool rollback. Only values from `recentlyUsedVersions` are allowed.
        upgradeStrategy:
          $ref: "#/components/schemas/UpgradeStrategy"
          description: 'Defines the upgrade strategy for the agent pool. The default is Rolling. Known values are: "Rolling" and "BlueGreen".'
        enableOSDiskFullCaching:
          type: boolean
          description: Whether to enable the full-cache ephemeral OS disk feature. When this feature is enabled, the entire operating system will be locally cached on the ephemeral OS disk, preventing E17 events caused by network failures.
        upgradeSettings:
          $ref: "#/components/schemas/AgentPoolUpgradeSettings"
          description: Settings for upgrading the agentpool.
        upgradeSettingsBlueGreen:
          $ref: "#/components/schemas/AgentPoolBlueGreenUpgradeSettings"
          description: Settings for Blue-Green upgrade on the agentpool. Applies when upgrade strategy is set to BlueGreen.
        provisioningState:
          type: string
          description: The current deployment or provisioning state.
        powerState:
          $ref: "#/components/schemas/PowerState"
          description: Whether the Agent Pool is running or stopped. When an Agent Pool is first created it is initially Running. The Agent Pool can be stopped by setting this field to Stopped. A stopped Agent Pool stops all of its VMs and does not accrue billing charges. An Agent Pool can only be stopped if it is Running and provisioning state is Succeeded.
        availabilityZones:
          type: array
          items:
            type: string
          description: The list of Availability zones to use for nodes. This can only be specified if the AgentPoolType property is 'VirtualMachineScaleSets'.
        enableNodePublicIP:
          type: boolean
          description: Whether each node is allocated its own public IP. Some scenarios may require nodes in a node pool to receive their own dedicated public IP addresses. A common scenario is for gaming workloads, where a console needs to make a direct connection to a cloud virtual machine to minimize hops. For more information see `assigning a public IP per node `_. The default is false.
        nodePublicIPPrefixID:
          type: string
          description: "The public IP prefix ID which VM nodes should use IPs from. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/publicIPPrefixes/{publicIPPrefixName}."
        scaleSetPriority:
          $ref: "#/components/schemas/ScaleSetPriority"
          description: 'The Virtual Machine Scale Set priority. Known values are: "Spot" and "Regular".'
        scaleSetEvictionPolicy:
          $ref: "#/components/schemas/ScaleSetEvictionPolicy"
          description: 'The Virtual Machine Scale Set eviction policy. The eviction policy specifies what to do with the VM when it is evicted. The default is Delete. For more information about eviction see `spot VMs `_. Known values are: "Delete" and "Deallocate".'
        spotMaxPrice:
          type: number
          description: The max price (in US Dollars) you are willing to pay for spot instances. Possible values are any decimal value greater than zero or -1 which indicates default price to be up-to on-demand. Possible values are any decimal value greater than zero or -1 which indicates the willingness to pay any on-demand price. For more details on spot pricing, see `spot VMs pricing `_.
        tags:
          type: object
          properties: {}
          description: The tags to be persisted on the agent pool virtual machine scale set.
        nodeLabels:
          type: object
          properties: {}
          description: The node labels to be persisted across all nodes in agent pool.
        nodeTaints:
          type: array
          items:
            type: string
          description: The taints added to new nodes during node pool create and scale. For example, key=value:NoSchedule.
        nodeInitializationTaints:
          type: array
          items:
            type: string
          description: Taints added on the nodes during creation that will not be reconciled by AKS. These taints will not be reconciled by AKS and can be removed with a kubectl call. This field can be modified after node pool is created, but nodes will not be recreated with new taints until another operation that requires recreation (e.g. node image upgrade) happens. These taints allow for required configuration to run before the node is ready to accept workloads, for example 'key1=value1:NoSchedule' that then can be removed with `kubectl taint nodes node1 key1=value1:NoSchedule-`.
        proximityPlacementGroupID:
          type: string
          description: The ID for Proximity Placement Group.
        kubeletConfig:
          $ref: "#/components/schemas/KubeletConfig"
          description: The Kubelet configuration on the agent pool nodes.
        linuxOSConfig:
          $ref: "#/components/schemas/LinuxOSConfig"
          description: The OS configuration of Linux agent nodes.
        enableEncryptionAtHost:
          type: boolean
          description: "Whether to enable host based OS and data drive encryption. This is only supported on certain VM sizes and in certain Azure regions. For more information, see: `https://docs.microsoft.com/azure/aks/enable-host-encryption `_."
        enableUltraSSD:
          type: boolean
          description: Whether to enable UltraSSD.
        enableFIPS:
          type: boolean
          description: Whether to use a FIPS-enabled OS. See `Add a FIPS-enabled node pool `_ for more details.
        gpuInstanceProfile:
          $ref: "#/components/schemas/GPUInstanceProfile"
          description: 'GPUInstanceProfile to be used to specify GPU MIG instance profile for supported GPU VM SKU. Known values are: "MIG1g", "MIG2g", "MIG3g", "MIG4g", and "MIG7g".'
        creationData:
          $ref: "#/components/schemas/CreationData"
          description: CreationData to be used to specify the source Snapshot ID if the node pool will be created/upgraded using a snapshot.
        capacityReservationGroupID:
          type: string
