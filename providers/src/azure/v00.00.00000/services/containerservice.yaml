    ManagedClusterAgentPoolProfile:
      type: object
      description: Profile for the container service agent pool.
      properties:
        eTag:
          type: string
          description: Unique read-only string used to implement optimistic concurrency. The eTag value will change when the resource is updated. Specify an if-match or if-none-match header with the eTag value for a subsequent request to enable optimistic concurrency per the normal eTag convention.
        count:
          type: integer
          description: Number of agents (VMs) to host docker containers. Allowed values must be in the range of 0 to 1000 (inclusive) for user pools and in the range of 1 to 1000 (inclusive) for system pools. The default value is 1.
        vmSize:
          type: string
          description: "The size of the agent pool VMs. VM size availability varies by region. If a node contains insufficient compute resources (memory, cpu, etc) pods might fail to run correctly. For more details on restricted VM sizes, see: `https://docs.microsoft.com/azure/aks/quotas-skus-regions `_."
        osDiskSizeGB:
          type: integer
          description: OS Disk Size in GB to be used to specify the disk size for every machine in the master/agent pool. If you specify 0, it will apply the default osDisk size according to the vmSize specified.
        osDiskType:
          $ref: "#/components/schemas/OSDiskType"
          description: "The OS disk type to be used for machines in the agent pool. The default is 'Ephemeral' if the VM supports it and has a cache disk larger than the requested OSDiskSizeGB. Otherwise, defaults to 'Managed'. May not be changed after creation. For more information see `Ephemeral OS `_. Known values are: \"Managed\" and \"Ephemeral\"."
        kubeletDiskType:
          $ref: "#/components/schemas/KubeletDiskType"
          description: 'Determines the placement of emptyDir volumes, container runtime data root, and Kubelet ephemeral storage. Known values are: "OS" and "Temporary".'
        workloadRuntime:
          $ref: "#/components/schemas/WorkloadRuntime"
          description: 'Determines the type of workload a node can run. Known values are: "OCIContainer", "WasmWasi", "KataMshvVmIsolation", and "KataVmIsolation".'
        messageOfTheDay:
          type: string
          description: Message of the day for Linux nodes, base64-encoded. A base64-encoded string which will be written to /etc/motd after decoding. This allows customization of the message of the day for Linux nodes. It must not be specified for Windows nodes. It must be a static string (i.e., will be printed raw and not be executed as a script).
        vnetSubnetID:
          type: string
          description: "The ID of the subnet which agent pool nodes and optionally pods will join on startup. If this is not specified, a VNET and subnet will be generated and used. If no podSubnetID is specified, this applies to nodes and pods, otherwise it applies to just nodes. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/virtualNetworks/{virtualNetworkName}/subnets/{subnetName}."
        podSubnetID:
          type: string
          description: "The ID of the subnet which pods will join when launched. If omitted, pod IPs are statically assigned on the node subnet (see vnetSubnetID for more details). This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/virtualNetworks/{virtualNetworkName}/subnets/{subnetName}."
        podIPAllocationMode:
          $ref: "#/components/schemas/PodIPAllocationMode"
          description: "Pod IP Allocation Mode. The IP allocation mode for pods in the agent pool. Must be used with podSubnetId. The default is 'DynamicIndividual'. Known values are: \"DynamicIndividual\" and \"StaticBlock\"."
        maxPods:
          type: integer
          description: The maximum number of pods that can run on a node.
        osType:
          $ref: "#/components/schemas/OSType"
          description: 'The operating system type. The default is Linux. Known values are: "Linux" and "Windows".'
        osSKU:
          $ref: "#/components/schemas/OSSKU"
          description: 'Specifies the OS SKU used by the agent pool. The default is Ubuntu if OSType is Linux. The default is Windows2019 when Kubernetes <= 1.24 or Windows2022 when Kubernetes >= 1.25 if OSType is Windows. Known values are: "Ubuntu", "AzureLinux", "AzureLinux3", "Mariner", "Flatcar", "CBLMariner", "Windows2019", "Windows2022", "Ubuntu2204", "Windows2025", "WindowsAnnual", "Ubuntu2404", and "AzureContainerLinux".'
        maxCount:
          type: integer
          description: The maximum number of nodes for auto-scaling.
        minCount:
          type: integer
          description: The minimum number of nodes for auto-scaling.
        enableAutoScaling:
          type: boolean
          description: Whether to enable auto-scaler.
        scaleDownMode:
          $ref: "#/components/schemas/ScaleDownMode"
          description: 'The scale down mode to use when scaling the Agent Pool. This also effects the cluster autoscaler behavior. If not specified, it defaults to Delete. Known values are: "Delete" and "Deallocate".'
        type:
          $ref: "#/components/schemas/AgentPoolType"
          description: 'The type of Agent Pool. Known values are: "VirtualMachineScaleSets", "AvailabilitySet", and "VirtualMachines".'
        mode:
          $ref: "#/components/schemas/AgentPoolMode"
          description: "The mode of an agent pool. A cluster must have at least one 'System' Agent Pool at all times. For additional information on agent pool restrictions and best practices, see: `https://docs.microsoft.com/azure/aks/use-system-pools `_. Known values are: \"System\", \"User\", \"Gateway\", \"ManagedSystem\", and \"Machines\"."
        orchestratorVersion:
          type: string
          description: The version of Kubernetes specified by the user. Both patch version (e.g. 1.20.13) and (e.g. 1.20) are supported. When is specified, the latest supported GA patch version is chosen automatically. Updating the cluster with the same once it has been created (e.g. 1.14.x -> 1.14) will not trigger an upgrade, even if a newer patch version is available. As a best practice, you should upgrade all node pools in an AKS cluster to the same Kubernetes version. The node pool version must have the same major version as the control plane. The node pool minor version must be within two minor versions of the control plane version. The node pool version cannot be greater than the control plane version. For more information see `upgrading a node pool `_.
        currentOrchestratorVersion:
          type: string
          description: The version of Kubernetes the Agent Pool is running. If orchestratorVersion is a fully specified version , this field will be exactly equal to it. If orchestratorVersion is , this field will contain the full version being used.
        nodeImageVersion:
          type: string
          description: The version of the node image. Setting this value triggers an agentPool rollback. Only values from `recentlyUsedVersions` are allowed.
        upgradeStrategy:
          $ref: "#/components/schemas/UpgradeStrategy"
          description: 'Defines the upgrade strategy for the agent pool. The default is Rolling. Known values are: "Rolling" and "BlueGreen".'
        enableOSDiskFullCaching:
          type: boolean
          description: Whether to enable the full-cache ephemeral OS disk feature. When this feature is enabled, the entire operating system will be locally cached on the ephemeral OS disk, preventing E17 events caused by network failures.
        upgradeSettings:
          $ref: "#/components/schemas/AgentPoolUpgradeSettings"
          description: Settings for upgrading the agentpool.
        upgradeSettingsBlueGreen:
          $ref: "#/components/schemas/AgentPoolBlueGreenUpgradeSettings"
          description: Settings for Blue-Green upgrade on the agentpool. Applies when upgrade strategy is set to BlueGreen.
        provisioningState:
          type: string
          description: The current deployment or provisioning state.
        powerState:
          $ref: "#/components/schemas/PowerState"
          description: Whether the Agent Pool is running or stopped. When an Agent Pool is first created it is initially Running. The Agent Pool can be stopped by setting this field to Stopped. A stopped Agent Pool stops all of its VMs and does not accrue billing charges. An Agent Pool can only be stopped if it is Running and provisioning state is Succeeded.
        availabilityZones:
          type: array
          items:
            type: string
          description: The list of Availability zones to use for nodes. This can only be specified if the AgentPoolType property is 'VirtualMachineScaleSets'.
        enableNodePublicIP:
          type: boolean
          description: Whether each node is allocated its own public IP. Some scenarios may require nodes in a node pool to receive their own dedicated public IP addresses. A common scenario is for gaming workloads, where a console needs to make a direct connection to a cloud virtual machine to minimize hops. For more information see `assigning a public IP per node `_. The default is false.
        nodePublicIPPrefixID:
          type: string
          description: "The public IP prefix ID which VM nodes should use IPs from. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/publicIPPrefixes/{publicIPPrefixName}."
        scaleSetPriority:
          $ref: "#/components/schemas/ScaleSetPriority"
          description: 'The Virtual Machine Scale Set priority. Known values are: "Spot" and "Regular".'
        scaleSetEvictionPolicy:
          $ref: "#/components/schemas/ScaleSetEvictionPolicy"
          description: 'The Virtual Machine Scale Set eviction policy. The eviction policy specifies what to do with the VM when it is evicted. The default is Delete. For more information about eviction see `spot VMs `_. Known values are: "Delete" and "Deallocate".'
        spotMaxPrice:
          type: number
          description: The max price (in US Dollars) you are willing to pay for spot instances. Possible values are any decimal value greater than zero or -1 which indicates default price to be up-to on-demand. Possible values are any decimal value greater than zero or -1 which indicates the willingness to pay any on-demand price. For more details on spot pricing, see `spot VMs pricing `_.
        tags:
          type: object
          properties: {}
          description: The tags to be persisted on the agent pool virtual machine scale set.
        nodeLabels:
          type: object
          properties: {}
          description: The node labels to be persisted across all nodes in agent pool.
        nodeTaints:
          type: array
          items:
            type: string
          description: The taints added to new nodes during node pool create and scale. For example, key=value:NoSchedule.
        nodeInitializationTaints:
          type: array
          items:
            type: string
          description: Taints added on the nodes during creation that will not be reconciled by AKS. These taints will not be reconciled by AKS and can be removed with a kubectl call. This field can be modified after node pool is created, but nodes will not be recreated with new taints until another operation that requires recreation (e.g. node image upgrade) happens. These taints allow for required configuration to run before the node is ready to accept workloads, for example 'key1=value1:NoSchedule' that then can be removed with `kubectl taint nodes node1 key1=value1:NoSchedule-`.
        proximityPlacementGroupID:
          type: string
          description: The ID for Proximity Placement Group.
        kubeletConfig:
          $ref: "#/components/schemas/KubeletConfig"
          description: The Kubelet configuration on the agent pool nodes.
        linuxOSConfig:
          $ref: "#/components/schemas/LinuxOSConfig"
          description: The OS configuration of Linux agent nodes.
        enableEncryptionAtHost:
          type: boolean
          description: "Whether to enable host based OS and data drive encryption. This is only supported on certain VM sizes and in certain Azure regions. For more information, see: `https://docs.microsoft.com/azure/aks/enable-host-encryption `_."
        enableUltraSSD:
          type: boolean
          description: Whether to enable UltraSSD.
        enableFIPS:
          type: boolean
          description: Whether to use a FIPS-enabled OS. See `Add a FIPS-enabled node pool `_ for more details.
        gpuInstanceProfile:
          $ref: "#/components/schemas/GPUInstanceProfile"
          description: 'GPUInstanceProfile to be used to specify GPU MIG instance profile for supported GPU VM SKU. Known values are: "MIG1g", "MIG2g", "MIG3g", "MIG4g", and "MIG7g".'
        creationData:
          $ref: "#/components/schemas/CreationData"
          description: CreationData to be used to specify the source Snapshot ID if the node pool will be created/upgraded using a snapshot.
        capacityReservationGroupID:
          type: string
          description: "The fully qualified resource ID of the Capacity Reservation Group to provide virtual machines from a reserved group of Virtual Machines. This is of the form: '/subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/Microsoft.Compute/capacityreservationgroups/{capacityReservationGroupName}' Customers use it to create an agentpool with a specified CRG. For more information see `Capacity Reservation `_."
        hostGroupID:
          type: string
          description: "The fully qualified resource ID of the Dedicated Host Group to provision virtual machines from, used only in creation scenario and not allowed to changed once set. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Compute/hostGroups/{hostGroupName}. For more information see `Azure dedicated hosts `_."
        networkProfile:
          $ref: "#/components/schemas/AgentPoolNetworkProfile"
          description: Network-related settings of an agent pool.
        windowsProfile:
          $ref: "#/components/schemas/AgentPoolWindowsProfile"
          description: The Windows agent pool's specific profile.
        securityProfile:
          $ref: "#/components/schemas/AgentPoolSecurityProfile"
          description: The security settings of an agent pool.
        gpuProfile:
          $ref: "#/components/schemas/GPUProfile"
          description: GPU settings for the Agent Pool.
        gatewayProfile:
          $ref: "#/components/schemas/AgentPoolGatewayProfile"
          description: Profile specific to a managed agent pool in Gateway mode. This field cannot be set if agent pool mode is not Gateway.
        artifactStreamingProfile:
          $ref: "#/components/schemas/AgentPoolArtifactStreamingProfile"
          description: Configuration for using artifact streaming on AKS.
        virtualMachinesProfile:
          $ref: "#/components/schemas/VirtualMachinesProfile"
          description: Specifications on VirtualMachines agent pool.
        virtualMachineNodesStatus:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineNodes"
          description: The status of nodes in a VirtualMachines agent pool.
        status:
          $ref: "#/components/schemas/AgentPoolStatus"
          description: Contains read-only information about the Agent Pool.
        localDNSProfile:
          $ref: "#/components/schemas/LocalDNSProfile"
          description: Configures the per-node local DNS, with VnetDNS and KubeDNS overrides. LocalDNS helps improve performance and reliability of DNS resolution in an AKS cluster. For more details see aka.ms/aks/localdns.
        preparedImageSpecificationProfile:
          $ref: "#/components/schemas/PreparedImageSpecificationProfile"
          description: Settings to determine the prepared image specification used to provision nodes in a pool.
        name:
          type: string
          description: Unique name of the agent pool profile in the context of the subscription and resource group. Windows agent pool names must be 6 characters or less. Required.
      required:
        - name
    ContainerServiceLinuxProfile:
      type: object
      description: Profile for Linux VMs in the container service cluster.
      properties:
        adminUsername:
          type: string
          description: The administrator username to use for Linux VMs. Required.
        ssh:
          $ref: "#/components/schemas/ContainerServiceSshConfiguration"
          description: The SSH configuration for Linux-based VMs running on Azure. Required.
      required:
        - adminUsername
        - ssh
    ContainerServiceSshConfiguration:
      type: object
      description: SSH configuration for Linux-based VMs running on Azure.
      properties:
        publicKeys:
          type: array
          items:
            $ref: "#/components/schemas/ContainerServiceSshPublicKey"
          description: The list of SSH public keys used to authenticate with Linux-based VMs. A maximum of 1 key may be specified. Required.
      required:
        - publicKeys
    ContainerServiceSshPublicKey:
      type: object
      description: Contains information about SSH certificate public key data.
      properties:
        keyData:
          type: string
          description: Certificate public key used to authenticate with VMs through SSH. The certificate must be in PEM format with or without headers. Required.
      required:
        - keyData
    ManagedClusterWindowsProfile:
      type: object
      description: Profile for Windows VMs in the managed cluster.
      properties:
        adminUsername:
          type: string
          description: Specifies the name of the administrator account. **Restriction:** Cannot end in "." **Disallowed values:** "administrator", "admin", "user", "user1", "test", "user2", "test1", "user3", "admin1", "1", "123", "a", "actuser", "adm", "admin2", "aspnet", "backup", "console", "david", "guest", "john", "owner", "root", "server", "sql", "support", "support_388945a0", "sys", "test2", "test3", "user4", "user5". **Minimum-length:** 1 character **Max-length:** 20 characters. Required.
        adminPassword:
          type: string
          description: Specifies the password of the administrator account. **Minimum-length:** 8 characters **Max-length:** 123 characters **Complexity requirements:** 3 out of 4 conditions below need to be fulfilled Has lower characters Has upper characters Has a digit Has a special character (Regex match [\W_]) **Disallowed values:** "abc@123", "P@$$w0rd", "P@ssw0rd", "P@ssword123", "Pa$$word", "pass@word1", "Password!", "Password1", "Password22", "iloveyou!".
        licenseType:
          $ref: "#/components/schemas/LicenseType"
          description: 'The license type to use for Windows VMs. See `Azure Hybrid User Benefits `_ for more details. Known values are: "None" and "Windows_Server".'
        enableCSIProxy:
          type: boolean
          description: Whether to enable CSI proxy. For more details on CSI proxy, see the `CSI proxy GitHub repo `_.
        gmsaProfile:
          $ref: "#/components/schemas/WindowsGmsaProfile"
          description: The Windows gMSA Profile in the Managed Cluster.
      required:
        - adminUsername
    LicenseType:
      type: string
      enum:
        - None
        - Windows_Server
    WindowsGmsaProfile:
      type: object
      description: Windows gMSA Profile in the managed cluster.
      properties:
        enabled:
          type: boolean
          description: Whether to enable Windows gMSA. Specifies whether to enable Windows gMSA in the managed cluster.
        dnsServer:
          type: string
          description: Specifies the DNS server for Windows gMSA. Set it to empty if you have configured the DNS server in the vnet which is used to create the managed cluster.
        rootDomainName:
          type: string
          description: Specifies the root domain name for Windows gMSA. Set it to empty if you have configured the DNS server in the vnet which is used to create the managed cluster.
    ManagedClusterServicePrincipalProfile:
      type: object
      description: Information about a service principal identity for the cluster to use for manipulating Azure APIs.
      properties:
        clientId:
          type: string
          description: The ID for the service principal. Required.
        secret:
          type: string
          description: The secret password associated with the service principal in plain text.
      required:
        - clientId
    ManagedClusterPodIdentityProfile:
      type: object
      description: The pod identity profile of the Managed Cluster. See `use AAD pod identity `_ for more details on pod identity integration.
      properties:
        enabled:
          type: boolean
          description: Whether the pod identity addon is enabled.
        allowNetworkPluginKubenet:
          type: boolean
          description: Whether pod identity is allowed to run on clusters with Kubenet networking. Running in Kubenet is disabled by default due to the security related nature of AAD Pod Identity and the risks of IP spoofing. See `using Kubenet network plugin with AAD Pod Identity `_ for more information.
        userAssignedIdentities:
          type: array
          items:
            $ref: "#/components/schemas/ManagedClusterPodIdentity"
          description: The pod identities to use in the cluster.
        userAssignedIdentityExceptions:
          type: array
          items:
            $ref: "#/components/schemas/ManagedClusterPodIdentityException"
          description: The pod identity exceptions to allow.
    ManagedClusterPodIdentity:
      type: object
      description: Details about the pod identity assigned to the Managed Cluster.
      properties:
        name:
          type: string
          description: The name of the pod identity. Required.
        namespace:
          type: string
          description: The namespace of the pod identity. Required.
        bindingSelector:
          type: string
          description: The binding selector to use for the AzureIdentityBinding resource.
        identity:
          $ref: "#/components/schemas/UserAssignedIdentity"
          description: The user assigned identity details. Required.
        provisioningState:
          $ref: "#/components/schemas/ManagedClusterPodIdentityProvisioningState"
          description: 'The current provisioning state of the pod identity. Known values are: "Assigned", "Canceled", "Deleting", "Failed", "Succeeded", and "Updating".'
        provisioningInfo:
          $ref: "#/components/schemas/ManagedClusterPodIdentityProvisioningInfo"
          description: The provisioning information for the pod identity.
      required:
        - name
        - namespace
        - identity
    UserAssignedIdentity:
      type: object
      description: Details about a user assigned identity.
      properties:
        resourceId:
          type: string
          description: The resource ID of the user assigned identity.
        clientId:
          type: string
          description: The client ID of the user assigned identity.
        objectId:
          type: string
          description: The object ID of the user assigned identity.
    ManagedClusterPodIdentityProvisioningState:
      type: string
      enum:
        - Assigned
        - Canceled
        - Deleting
        - Failed
        - Succeeded
        - Updating
    ManagedClusterPodIdentityProvisioningInfo:
      type: object
      description: Pod identity provisioning information.
      properties:
        error:
          $ref: "#/components/schemas/ManagedClusterPodIdentityProvisioningError"
          description: Pod identity assignment error (if any).
    ManagedClusterPodIdentityProvisioningError:
      type: object
      description: An error response from the pod identity provisioning.
      properties:
        error:
          $ref: "#/components/schemas/ManagedClusterPodIdentityProvisioningErrorBody"
          description: Details about the error.
    ManagedClusterPodIdentityProvisioningErrorBody:
      type: object
      description: An error response from the pod identity provisioning.
      properties:
        code:
          type: string
          description: An identifier for the error. Codes are invariant and are intended to be consumed programmatically.
        message:
          type: string
          description: A message describing the error, intended to be suitable for display in a user interface.
        target:
          type: string
          description: The target of the particular error. For example, the name of the property in error.
        details:
          type: array
          items:
            $ref: "#/components/schemas/ManagedClusterPodIdentityProvisioningErrorBody"
          description: A list of additional details about the error.
    ManagedClusterPodIdentityException:
      type: object
      description: A pod identity exception, which allows pods with certain labels to access the Azure Instance Metadata Service (IMDS) endpoint without being intercepted by the node-managed identity (NMI) server. See `disable AAD Pod Identity for a specific Pod/Application `_ for more details.
      properties:
        name:
          type: string
          description: The name of the pod identity exception. Required.
        namespace:
          type: string
          description: The namespace of the pod identity exception. Required.
        podLabels:
          type: object
          properties: {}
          description: The pod labels to match. Required.
      required:
        - name
        - namespace
        - podLabels
    ManagedClusterOIDCIssuerProfile:
      type: object
      description: The OIDC issuer profile of the Managed Cluster.
      properties:
        issuerURL:
          type: string
          description: The OIDC issuer url of the Managed Cluster.
        enabled:
          type: boolean
          description: Whether the OIDC issuer is enabled.
    ManagedClusterNodeResourceGroupProfile:
      type: object
      description: Node resource group lockdown profile for a managed cluster.
      properties:
        restrictionLevel:
          $ref: "#/components/schemas/RestrictionLevel"
          description: "The restriction level applied to the cluster's node resource group. If not specified, the default is 'Unrestricted'. Known values are: \"Unrestricted\" and \"ReadOnly\"."
    RestrictionLevel:
      type: string
      enum:
        - Unrestricted
        - ReadOnly
    KubernetesSupportPlan:
      type: string
      enum:
        - KubernetesOfficial
        - AKSLongTermSupport
    ContainerServiceNetworkProfile:
      type: object
      description: Profile of network configuration.
      properties:
        networkPlugin:
          $ref: "#/components/schemas/NetworkPlugin"
          description: 'Network plugin used for building the Kubernetes network. Known values are: "azure", "kubenet", and "none".'
        networkPluginMode:
          $ref: "#/components/schemas/NetworkPluginMode"
          description: The mode the network plugin should use. "overlay"
        networkPolicy:
          $ref: "#/components/schemas/NetworkPolicy"
          description: 'Network policy used for building the Kubernetes network. Known values are: "none", "calico", "azure", and "cilium".'
        networkMode:
          $ref: "#/components/schemas/NetworkMode"
          description: "The network mode Azure CNI is configured with. This cannot be specified if networkPlugin is anything other than 'azure'. Known values are: \"transparent\" and \"bridge\"."
        networkDataplane:
          $ref: "#/components/schemas/NetworkDataplane"
          description: 'Network dataplane used in the Kubernetes cluster. Known values are: "azure" and "cilium".'
        advancedNetworking:
          $ref: "#/components/schemas/AdvancedNetworking"
          description: Advanced Networking profile for enabling observability and security feature suite on a cluster. For more information see aka.ms/aksadvancednetworking.
        podCidr:
          type: string
          description: A CIDR notation IP range from which to assign pod IPs when kubenet is used.
        serviceCidr:
          type: string
          description: A CIDR notation IP range from which to assign service cluster IPs. It must not overlap with any Subnet IP ranges.
        dnsServiceIP:
          type: string
          description: An IP address assigned to the Kubernetes DNS service. It must be within the Kubernetes service address range specified in serviceCidr.
        outboundType:
          $ref: "#/components/schemas/OutboundType"
          description: 'The outbound (egress) routing method. This can only be set at cluster creation time and cannot be changed later. For more information see `egress outbound type `_. Known values are: "loadBalancer", "userDefinedRouting", "managedNATGateway", "managedNATGatewayV2", "userAssignedNATGateway", and "none".'
        loadBalancerSku:
          $ref: "#/components/schemas/LoadBalancerSku"
          description: "The load balancer sku for the managed cluster. The default is 'standard'. See `Azure Load Balancer SKUs `_ for more information about the differences between load balancer SKUs. Known values are: \"standard\" and \"basic\"."
        loadBalancerProfile:
          $ref: "#/components/schemas/ManagedClusterLoadBalancerProfile"
          description: Profile of the cluster load balancer.
        bastionProfile:
          $ref: "#/components/schemas/BastionProfile"
          description: Profile of the Bastion Host associated with the managed cluster. See `https://aka.ms/aks/BastionConnect `_ for more details.
        natGatewayProfile:
          $ref: "#/components/schemas/ManagedClusterNATGatewayProfile"
          description: Profile of the cluster NAT gateway.
        staticEgressGatewayProfile:
          $ref: "#/components/schemas/ManagedClusterStaticEgressGatewayProfile"
          description: The profile for Static Egress Gateway addon. For more details about Static Egress Gateway, see `https://aka.ms/aks/static-egress-gateway `_.
        podCidrs:
          type: array
          items:
            type: string
          description: The CIDR notation IP ranges from which to assign pod IPs. One IPv4 CIDR is expected for single-stack networking. Two CIDRs, one for each IP family (IPv4/IPv6), is expected for dual-stack networking.
        serviceCidrs:
          type: array
          items:
            type: string
          description: The CIDR notation IP ranges from which to assign service cluster IPs. One IPv4 CIDR is expected for single-stack networking. Two CIDRs, one for each IP family (IPv4/IPv6), is expected for dual-stack networking. They must not overlap with any Subnet IP ranges.
        ipFamilies:
          type: array
          items:
            $ref: "#/components/schemas/IPFamily"
          description: The IP families used to specify IP versions available to the cluster. IP families are used to determine single-stack or dual-stack clusters. For single-stack, the expected value is IPv4. For dual-stack, the expected values are IPv4 and IPv6.
        podLinkLocalAccess:
          $ref: "#/components/schemas/PodLinkLocalAccess"
          description: "Defines access to special link local addresses (Azure Instance Metadata Service, aka IMDS) for pods with hostNetwork=false. if not specified, the default is 'IMDS'. Known values are: \"IMDS\" and \"None\"."
        kubeProxyConfig:
          $ref: "#/components/schemas/ContainerServiceNetworkProfileKubeProxyConfig"
          description: Holds configuration customizations for kube-proxy. Any values not defined will use the kube-proxy defaulting behavior. See `https://v `_.docs.kubernetes.io/docs/reference/command-line-tools-reference/kube-proxy/ where is represented by a - string. Kubernetes version 1.23 would be '1-23'.
    NetworkDataplane:
      type: string
      enum:
        - azure
        - cilium
    AdvancedNetworking:
      type: object
      description: Advanced Networking profile for enabling observability and security feature suite on a cluster. For more information see aka.ms/aksadvancednetworking.
      properties:
        enabled:
          type: boolean
          description: Indicates the enablement of Advanced Networking functionalities of observability and security on AKS clusters. When this is set to true, all observability and security features will be set to enabled unless explicitly disabled. If not specified, the default is false.
        observability:
          $ref: "#/components/schemas/AdvancedNetworkingObservability"
          description: Observability profile to enable advanced network metrics and flow logs with historical contexts.
        security:
          $ref: "#/components/schemas/AdvancedNetworkingSecurity"
          description: Security profile to enable security features on cilium based cluster.
        performance:
          $ref: "#/components/schemas/AdvancedNetworkingPerformance"
          description: Profile to enable performance-enhancing features on clusters that use Azure CNI powered by Cilium.
    AdvancedNetworkingObservability:
      type: object
      description: Observability profile to enable advanced network metrics and flow logs with historical contexts.
      properties:
        enabled:
          type: boolean
          description: Indicates the enablement of Advanced Networking observability functionalities on clusters.
    AdvancedNetworkingSecurity:
      type: object
      description: Security profile to enable security features on cilium based cluster.
      properties:
        enabled:
          type: boolean
          description: This feature allows user to configure network policy based on DNS (FQDN) names. It can be enabled only on cilium based clusters. If not specified, the default is false.
        advancedNetworkPolicies:
          $ref: "#/components/schemas/AdvancedNetworkPolicies"
          description: 'Enable advanced network policies. This allows users to configure Layer 7 network policies (FQDN, HTTP, Kafka). Policies themselves must be configured via the Cilium Network Policy resources, see `https://docs.cilium.io/en/latest/security/policy/index.html `_. This can be enabled only on cilium-based clusters. If not specified, the default value is FQDN if security.enabled is set to true. Known values are: "L7", "FQDN", and "None".'
        transitEncryption:
          $ref: "#/components/schemas/AdvancedNetworkingSecurityTransitEncryption"
          description: Encryption configuration for Cilium-based clusters. Once enabled all traffic between Cilium managed pods will be encrypted when it leaves the node boundary.
    AdvancedNetworkPolicies:
      type: string
      enum:
        - L7
        - FQDN
        - None
    AdvancedNetworkingSecurityTransitEncryption:
      type: object
      description: Encryption configuration for Cilium-based clusters. Once enabled all traffic between Cilium managed pods will be encrypted when it leaves the node boundary.
      properties:
        type:
          $ref: "#/components/schemas/TransitEncryptionType"
          description: 'Configures pod-to-pod encryption. This can be enabled only on Cilium-based clusters. If not specified, the default value is None. Known values are: "WireGuard", "mTLS", and "None".'
    TransitEncryptionType:
      type: string
      enum:
        - WireGuard
        - mTLS
        - None
    AdvancedNetworkingPerformance:
      type: object
      description: Profile to enable performance-enhancing features on clusters that use Azure CNI powered by Cilium.
      properties:
        accelerationMode:
          $ref: "#/components/schemas/AccelerationMode"
          description: 'Enable advanced network acceleration options. This allows users to configure acceleration using BPF host routing. This can be enabled only with Cilium dataplane. If not specified, the default value is None (no acceleration). The acceleration mode can be changed on a pre-existing cluster. See `https://aka.ms/acnsperformance `_ for a detailed explanation. Known values are: "BpfVeth" and "None".'
    AccelerationMode:
      type: string
      enum:
        - BpfVeth
        - None
    OutboundType:
      type: string
      enum:
        - loadBalancer
        - userDefinedRouting
        - managedNATGateway
        - managedNATGatewayV2
        - userAssignedNATGateway
        - none
    ManagedClusterLoadBalancerProfile:
      type: object
      description: Profile of the managed cluster load balancer.
      properties:
        managedOutboundIPs:
          $ref: "#/components/schemas/ManagedClusterLoadBalancerProfileManagedOutboundIPs"
          description: Desired managed outbound IPs for the cluster load balancer.
        outboundIPPrefixes:
          $ref: "#/components/schemas/ManagedClusterLoadBalancerProfileOutboundIPPrefixes"
          description: Desired outbound IP Prefix resources for the cluster load balancer.
        outboundIPs:
          $ref: "#/components/schemas/ManagedClusterLoadBalancerProfileOutboundIPs"
          description: Desired outbound IP resources for the cluster load balancer.
        effectiveOutboundIPs:
          type: array
          items:
            $ref: "#/components/schemas/ResourceReference"
          description: The effective outbound IP resources of the cluster load balancer.
        allocatedOutboundPorts:
          type: integer
          description: The desired number of allocated SNAT ports per VM. Allowed values are in the range of 0 to 64000 (inclusive). The default value is 0 which results in Azure dynamically allocating ports.
        idleTimeoutInMinutes:
          type: integer
          description: Desired outbound flow idle timeout in minutes. Allowed values are in the range of 4 to 120 (inclusive). The default value is 30 minutes.
        enableMultipleStandardLoadBalancers:
          type: boolean
          description: Enable multiple standard load balancers per AKS cluster or not.
        backendPoolType:
          $ref: "#/components/schemas/BackendPoolType"
          description: 'The type of the managed inbound Load Balancer BackendPool. Known values are: "NodeIPConfiguration" and "NodeIP".'
        clusterServiceLoadBalancerHealthProbeMode:
          $ref: "#/components/schemas/ClusterServiceLoadBalancerHealthProbeMode"
          description: 'The health probing behavior for External Traffic Policy Cluster services. Known values are: "ServiceNodePort" and "Shared".'
    ManagedClusterLoadBalancerProfileManagedOutboundIPs:
      type: object
      description: Desired managed outbound IPs for the cluster load balancer.
      properties:
        count:
          type: integer
          description: The desired number of IPv4 outbound IPs created/managed by Azure for the cluster load balancer. Allowed values must be in the range of 1 to 100 (inclusive). The default value is 1.
        countIPv6:
          type: integer
          description: The desired number of IPv6 outbound IPs created/managed by Azure for the cluster load balancer. Allowed values must be in the range of 1 to 100 (inclusive). The default value is 0 for single-stack and 1 for dual-stack.
    ManagedClusterLoadBalancerProfileOutboundIPPrefixes:
      type: object
      description: Desired outbound IP Prefix resources for the cluster load balancer.
      properties:
        publicIPPrefixes:
          type: array
          items:
            $ref: "#/components/schemas/ResourceReference"
          description: A list of public IP prefix resources.
    ResourceReference:
      type: object
      description: A reference to an Azure resource.
      properties:
        id:
          type: string
          description: The fully qualified Azure resource id.
    ManagedClusterLoadBalancerProfileOutboundIPs:
      type: object
      description: Desired outbound IP resources for the cluster load balancer.
      properties:
        publicIPs:
          type: array
          items:
            $ref: "#/components/schemas/ResourceReference"
          description: A list of public IP resources.
    BackendPoolType:
      type: string
      enum:
        - NodeIPConfiguration
        - NodeIP
    ClusterServiceLoadBalancerHealthProbeMode:
      type: string
      enum:
        - ServiceNodePort
        - Shared
    BastionProfile:
      type: object
      description: Profile to enable managed Azure Bastion or reference to an existing Bastion for the managed cluster. See `https://aka.ms/aks/BastionConnect `_ for more details.
      properties:
        enabled:
          type: boolean
          description: Indicates whether managed bastion is enabled.
        bastionId:
          type: string
          description: The resource ID of the managed bastion associated with the managed cluster.
        sku:
          $ref: "#/components/schemas/BastionSku"
          description: 'The SKU of the managed bastion. Only Standard and Premium SKUs are supported. SKU downgrading is not allowed. To downgrade SKU, please disable then re-enable the managed bastion with new SKU. See `https://aka.ms/aks/BastionSKUs `_ for more details. Known values are: "Standard" and "Premium".'
        scaleUnits:
          type: integer
          description: The scale units of the managed bastion. Default value is 2.
        publicIpAddressId:
          type: string
          description: The resource ID of the public IP address associated with the managed bastion. When provided during creation, the managed bastion will reference this existing public IP address instead of creating a new one. The referenced public IP address must be in the same subscription and region as the managed cluster. When not provided during creation, AKS will automatically create a new public IP address. This field cannot be updated. To change IP address after creation, please disable and re-enable the managed bastion with the new public IP address.
    BastionSku:
      type: string
      enum:
        - Standard
        - Premium
    ManagedClusterNATGatewayProfile:
      type: object
      description: Profile of the managed cluster NAT gateway.
      properties:
        managedOutboundIPProfile:
          $ref: "#/components/schemas/ManagedClusterManagedOutboundIPProfile"
          description: Profile of the managed outbound IP resources of the cluster NAT gateway.
        effectiveOutboundIPs:
          type: array
          items:
            $ref: "#/components/schemas/ResourceReference"
          description: The effective outbound IP resources of the cluster NAT gateway.
        outboundIPPrefixes:
          $ref: "#/components/schemas/ManagedClusterNATGatewayProfileOutboundIpPrefixes"
          description: Desired outbound IP Prefix resources for the managed NAT Gateway. Only compatible with NAT Gateway V2.
        outboundIPs:
          $ref: "#/components/schemas/ManagedClusterNATGatewayProfileOutboundIPs"
          description: Desired outbound IP resources for the managed NAT Gateway.
        idleTimeoutInMinutes:
          type: integer
          description: Desired outbound flow idle timeout in minutes. Allowed values are in the range of 4 to 120 (inclusive). The default value is 4 minutes.
    ManagedClusterManagedOutboundIPProfile:
      type: object
      description: Profile of the managed outbound IP resources of the managed cluster.
      properties:
        count:
          type: integer
          description: The desired number of outbound IPs created/managed by Azure. Allowed values must be in the range of 1 to 16 (inclusive). The default value is 1.
        countIPv6:
          type: integer
          description: The desired number of IPv6 outbound IPs created/managed by Azure. Allowed values must be in the range of 1 to 16 (inclusive).
    ManagedClusterNATGatewayProfileOutboundIpPrefixes:
      type: object
      description: ManagedClusterNATGatewayProfileOutboundIpPrefixes.
      properties:
        publicIPPrefixes:
          type: array
          items:
            type: string
          description: A list of public IP prefix resources.
    ManagedClusterNATGatewayProfileOutboundIPs:
      type: object
      description: ManagedClusterNATGatewayProfileOutboundIPs.
      properties:
        publicIPs:
          type: array
          items:
            type: string
          description: A list of public IP resources.
    ManagedClusterStaticEgressGatewayProfile:
      type: object
      description: The Static Egress Gateway addon configuration for the cluster.
      properties:
        enabled:
          type: boolean
          description: Enable Static Egress Gateway addon. Indicates if Static Egress Gateway addon is enabled or not.
    PodLinkLocalAccess:
      type: string
      enum:
        - IMDS
        - None
    ContainerServiceNetworkProfileKubeProxyConfig:
      type: object
      description: Holds configuration customizations for kube-proxy. Any values not defined will use the kube-proxy defaulting behavior. See `https://v `_.docs.kubernetes.io/docs/reference/command-line-tools-reference/kube-proxy/ where is represented by a - string. Kubernetes version 1.23 would be '1-23'.
      properties:
        enabled:
          type: boolean
          description: Whether to enable on kube-proxy on the cluster (if no 'kubeProxyConfig' exists, kube-proxy is enabled in AKS by default without these customizations).
        mode:
          $ref: "#/components/schemas/Mode"
          description: "Specify which proxy mode to use ('IPTABLES', 'IPVS' or 'NFTABLES'). Known values are: \"IPTABLES\", \"IPVS\", and \"NFTABLES\"."
        ipvsConfig:
          $ref: "#/components/schemas/ContainerServiceNetworkProfileKubeProxyConfigIpvsConfig"
          description: Holds configuration customizations for IPVS. May only be specified if 'mode' is set to 'IPVS'.
    Mode:
      type: string
      enum:
        - IPTABLES
        - IPVS
        - NFTABLES
    ContainerServiceNetworkProfileKubeProxyConfigIpvsConfig:
      type: object
      description: Holds configuration customizations for IPVS. May only be specified if 'mode' is set to 'IPVS'.
      properties:
        scheduler:
          $ref: "#/components/schemas/IpvsScheduler"
          description: 'IPVS scheduler, for more information please see `http://www.linuxvirtualserver.org/docs/scheduling.html `_. Known values are: "RoundRobin" and "LeastConnection".'
        tcpTimeoutSeconds:
          type: integer
          description: The timeout value used for idle IPVS TCP sessions in seconds. Must be a positive integer value.
        tcpFinTimeoutSeconds:
          type: integer
          description: The timeout value used for IPVS TCP sessions after receiving a FIN in seconds. Must be a positive integer value.
        udpTimeoutSeconds:
          type: integer
          description: The timeout value used for IPVS UDP packets in seconds. Must be a positive integer value.
    IpvsScheduler:
      type: string
      enum:
        - RoundRobin
        - LeastConnection
    ManagedClusterAADProfile:
      type: object
      description: AADProfile specifies attributes for Azure Active Directory integration. For more details see `managed AAD on AKS `_.
      properties:
        managed:
          type: boolean
          description: Whether to enable managed AAD.
        enableAzureRBAC:
          type: boolean
          description: Whether to enable Azure RBAC for Kubernetes authorization.
        adminGroupObjectIDs:
          type: array
          items:
            type: string
          description: The list of AAD group object IDs that will have admin role of the cluster.
        clientAppID:
          type: string
          description: (DEPRECATED) The client AAD application ID. Learn more at `https://aka.ms/aks/aad-legacy `_.
        serverAppID:
          type: string
          description: (DEPRECATED) The server AAD application ID. Learn more at `https://aka.ms/aks/aad-legacy `_.
        serverAppSecret:
          type: string
          description: (DEPRECATED) The server AAD application secret. Learn more at `https://aka.ms/aks/aad-legacy `_.
        tenantID:
          type: string
          description: The AAD tenant ID to use for authentication. If not specified, will use the tenant of the deployment subscription.
    ManagedClusterAutoUpgradeProfile:
      type: object
      description: Auto upgrade profile for a managed cluster.
      properties:
        upgradeChannel:
          $ref: "#/components/schemas/UpgradeChannel"
          description: "The upgrade channel for auto upgrade. The default is 'none'. For more information see `setting the AKS cluster auto-upgrade channel `_. Known values are: \"rapid\", \"stable\", \"patch\", \"node-image\", and \"none\"."
        nodeOSUpgradeChannel:
          $ref: "#/components/schemas/NodeOSUpgradeChannel"
          description: 'Node OS Upgrade Channel. Manner in which the OS on your nodes is updated. The default is NodeImage. Known values are: "None", "Unmanaged", "NodeImage", and "SecurityPatch".'
    UpgradeChannel:
      type: string
      enum:
        - rapid
        - stable
        - patch
        - node-image
        - none
    NodeOSUpgradeChannel:
      type: string
      enum:
        - None
        - Unmanaged
        - NodeImage
        - SecurityPatch
    ClusterUpgradeSettings:
      type: object
      description: Settings for upgrading a cluster.
      properties:
        overrideSettings:
          $ref: "#/components/schemas/UpgradeOverrideSettings"
          description: Settings for overrides.
    UpgradeOverrideSettings:
      type: object
      description: Settings for overrides when upgrading a cluster.
      properties:
        forceUpgrade:
          type: boolean
          description: Whether to force upgrade the cluster. Note that this option instructs upgrade operation to bypass upgrade protections such as checking for deprecated API usage. Enable this option only with caution.
        until:
          type: string
          format: date-time
          description: Until when the overrides are effective. Note that this only matches the start time of an upgrade, and the effectiveness won't change once an upgrade starts even if the `until` expires as upgrade proceeds. This field is not set by default. It must be set for the overrides to take effect.
    ManagedClusterPropertiesAutoScalerProfile:
      type: object
      description: Parameters to be applied to the cluster-autoscaler when enabled.
      properties:
        balance-similar-node-groups:
          type: string
          description: Detects similar node pools and balances the number of nodes between them. Valid values are 'true' and 'false'.
        daemonset-eviction-for-empty-nodes:
          type: boolean
          description: DaemonSet pods will be gracefully terminated from empty nodes. If set to true, all daemonset pods on empty nodes will be evicted before deletion of the node. If the daemonset pod cannot be evicted another node will be chosen for scaling. If set to false, the node will be deleted without ensuring that daemonset pods are deleted or evicted.
        daemonset-eviction-for-occupied-nodes:
          type: boolean
          description: DaemonSet pods will be gracefully terminated from non-empty nodes. If set to true, all daemonset pods on occupied nodes will be evicted before deletion of the node. If the daemonset pod cannot be evicted another node will be chosen for scaling. If set to false, the node will be deleted without ensuring that daemonset pods are deleted or evicted.
        ignore-daemonsets-utilization:
          type: boolean
          description: Should CA ignore DaemonSet pods when calculating resource utilization for scaling down. If set to true, the resources used by daemonset will be taken into account when making scaling down decisions.
        expander:
          $ref: "#/components/schemas/Expander"
          description: "The expander to use when scaling up. If not specified, the default is 'random'. See `expanders `_ for more information. Known values are: \"least-waste\", \"most-pods\", \"priority\", and \"random\"."
        max-empty-bulk-delete:
          type: string
          description: The maximum number of empty nodes that can be deleted at the same time. This must be a positive integer. The default is 10.
        max-graceful-termination-sec:
          type: string
          description: The maximum number of seconds the cluster autoscaler waits for pod termination when trying to scale down a node. The default is 600.
        max-node-provision-time:
          type: string
          description: The maximum time the autoscaler waits for a node to be provisioned. The default is '15m'. Values must be an integer followed by an 'm'. No unit of time other than minutes (m) is supported.
        max-total-unready-percentage:
          type: string
          description: The maximum percentage of unready nodes in the cluster. After this percentage is exceeded, cluster autoscaler halts operations. The default is 45. The maximum is 100 and the minimum is 0.
        new-pod-scale-up-delay:
          type: string
          description: Ignore unscheduled pods before they're a certain age. For scenarios like burst/batch scale where you don't want CA to act before the kubernetes scheduler could schedule all the pods, you can tell CA to ignore unscheduled pods before they're a certain age. The default is '0s'. Values must be an integer followed by a unit ('s' for seconds, 'm' for minutes, 'h' for hours, etc).
        ok-total-unready-count:
          type: string
          description: The number of allowed unready nodes, irrespective of max-total-unready-percentage. This must be an integer. The default is 3.
        scan-interval:
          type: string
          description: How often cluster is reevaluated for scale up or down. The default is '10'. Values must be an integer number of seconds.
        scale-down-delay-after-add:
          type: string
          description: How long after scale up that scale down evaluation resumes. The default is '10m'. Values must be an integer followed by an 'm'. No unit of time other than minutes (m) is supported.
        scale-down-delay-after-delete:
          type: string
          description: How long after node deletion that scale down evaluation resumes. The default is the scan-interval. Values must be an integer followed by an 'm'. No unit of time other than minutes (m) is supported.
        scale-down-delay-after-failure:
          type: string
          description: How long after scale down failure that scale down evaluation resumes. The default is '3m'. Values must be an integer followed by an 'm'. No unit of time other than minutes (m) is supported.
        scale-down-unneeded-time:
          type: string
          description: How long a node should be unneeded before it is eligible for scale down. The default is '10m'. Values must be an integer followed by an 'm'. No unit of time other than minutes (m) is supported.
        scale-down-unready-time:
          type: string
          description: How long an unready node should be unneeded before it is eligible for scale down. The default is '20m'. Values must be an integer followed by an 'm'. No unit of time other than minutes (m) is supported.
        scale-down-utilization-threshold:
          type: string
          description: Node utilization level, defined as sum of requested resources divided by capacity, below which a node can be considered for scale down. The default is '0.5'.
        skip-nodes-with-local-storage:
          type: string
          description: If cluster autoscaler will skip deleting nodes with pods with local storage, for example, EmptyDir or HostPath. The default is true.
        skip-nodes-with-system-pods:
          type: string
          description: If cluster autoscaler will skip deleting nodes with pods from kube-system (except for DaemonSet or mirror pods). The default is true.
    Expander:
      type: string
      enum:
        - least-waste
        - most-pods
        - priority
        - random
    ManagedClusterAPIServerAccessProfile:
      type: object
      description: Access profile for managed cluster API server.
      properties:
        authorizedIPRanges:
          type: array
          items:
            type: string
          description: The IP ranges authorized to access the Kubernetes API server. IP ranges are specified in CIDR format, e.g. 137.117.106.88/29. This feature is not compatible with clusters that use Public IP Per Node, or clusters that are using a Basic Load Balancer. For more information see `API server authorized IP ranges `_.
        enablePrivateCluster:
          type: boolean
          description: Whether to create the cluster as a private cluster or not. For more details, see `Creating a private AKS cluster `_.
        privateDNSZone:
          type: string
          description: The private DNS zone mode for the cluster. The default is System. For more details see `configure private DNS zone `_. Allowed values are 'system' and 'none'.
        enablePrivateClusterPublicFQDN:
          type: boolean
          description: Whether to create additional public FQDN for private cluster or not.
        disableRunCommand:
          type: boolean
          description: Whether to disable run command for the cluster or not.
        enableVnetIntegration:
          type: boolean
          description: Whether to enable apiserver vnet integration for the cluster or not. See aka.ms/AksVnetIntegration for more details.
        subnetId:
          type: string
          description: The subnet to be used when apiserver vnet integration is enabled. It is required when creating a new cluster with BYO Vnet, or when updating an existing cluster to enable apiserver vnet integration.
    PrivateLinkResource:
      type: object
      description: A private link resource.
      properties:
        id:
          type: string
          description: The ID of the private link resource.
        name:
          type: string
          description: The name of the private link resource. See `naming rules `_ for more details.
        type:
          type: string
          description: The resource type.
        groupId:
          type: string
          description: The group ID of the resource.
        requiredMembers:
          type: array
          items:
            type: string
          description: The RequiredMembers of the resource.
        privateLinkServiceID:
          type: string
          description: The private link service ID of the resource, this field is exposed only to NRP internally.
    ManagedClusterHTTPProxyConfig:
      type: object
      description: Cluster HTTP proxy configuration.
      properties:
        httpProxy:
          type: string
          description: The HTTP proxy server endpoint to use.
        httpsProxy:
          type: string
          description: The HTTPS proxy server endpoint to use.
        noProxy:
          type: array
          items:
            type: string
          description: The endpoints that should not go through proxy.
        effectiveNoProxy:
          type: array
          items:
            type: string
          description: A read-only list of all endpoints for which traffic should not be sent to the proxy. This list is a superset of noProxy and values injected by AKS.
        trustedCa:
          type: string
          description: Alternative CA cert to use for connecting to proxy servers.
        enabled:
          type: boolean
          description: Whether to enable HTTP proxy. If disabled, the specified proxy configuration will be not be set on pods and nodes. If not specified, the default is true.
    ManagedClusterSecurityProfile:
      type: object
      description: Security profile for the container service cluster.
      properties:
        defender:
          $ref: "#/components/schemas/ManagedClusterSecurityProfileDefender"
          description: Microsoft Defender settings for the security profile.
        azureKeyVaultKms:
          $ref: "#/components/schemas/AzureKeyVaultKms"
          description: Azure Key Vault `key management service `_ settings for the security profile.
        kubernetesResourceObjectEncryptionProfile:
          $ref: "#/components/schemas/KubernetesResourceObjectEncryptionProfile"
          description: Encryption at rest of Kubernetes resource objects. More information on this can be found under `https://aka.ms/aks/kubernetesResourceObjectEncryption `_.
        workloadIdentity:
          $ref: "#/components/schemas/ManagedClusterSecurityProfileWorkloadIdentity"
          description: Workload identity settings for the security profile. Workload identity enables Kubernetes applications to access Azure cloud resources securely with Azure AD. See `https://aka.ms/aks/wi `_ for more details.
        imageCleaner:
          $ref: "#/components/schemas/ManagedClusterSecurityProfileImageCleaner"
          description: Image Cleaner settings for the security profile.
        imageIntegrity:
          $ref: "#/components/schemas/ManagedClusterSecurityProfileImageIntegrity"
          description: Image integrity is a feature that works with Azure Policy to verify image integrity by signature. This will not have any effect unless Azure Policy is applied to enforce image signatures. See `https://aka.ms/aks/image-integrity `_ for how to use this feature via policy.
        nodeRestriction:
          $ref: "#/components/schemas/ManagedClusterSecurityProfileNodeRestriction"
          description: "`Node Restriction `_ settings for the security profile."
        customCATrustCertificates:
          type: array
          items:
            type: string
            format: byte
          description: A list of up to 10 base64 encoded CAs that will be added to the trust store on all nodes in the cluster. For more information see `Custom CA Trust Certificates `_.
        serviceAccountImagePullProfile:
          $ref: "#/components/schemas/ServiceAccountImagePullProfile"
          description: Defines service account based image pull settings.
    ManagedClusterSecurityProfileDefender:
      type: object
      description: Microsoft Defender settings for the security profile.
      properties:
        logAnalyticsWorkspaceResourceId:
          type: string
          description: Resource ID of the Log Analytics workspace to be associated with Microsoft Defender. When Microsoft Defender is enabled, this field is required and must be a valid workspace resource ID. When Microsoft Defender is disabled, leave the field empty.
        securityMonitoring:
          $ref: "#/components/schemas/ManagedClusterSecurityProfileDefenderSecurityMonitoring"
          description: Microsoft Defender threat detection for Cloud settings for the security profile.
        securityGating:
          $ref: "#/components/schemas/ManagedClusterSecurityProfileDefenderSecurityGating"
          description: Microsoft Defender settings for security gating, validates container images eligibility for deployment based on Defender for Containers security findings. Using Admission Controller, it either audits or prevents the deployment of images that do not meet security standards.
    ManagedClusterSecurityProfileDefenderSecurityMonitoring:
      type: object
      description: Microsoft Defender settings for the security profile threat detection.
      properties:
        enabled:
          type: boolean
          description: Whether to enable Defender threat detection.
    ManagedClusterSecurityProfileDefenderSecurityGating:
      type: object
      description: Microsoft Defender settings for security gating, validates container images eligibility for deployment based on Defender for Containers security findings. Using Admission Controller, it either audits or prevents the deployment of images that do not meet security standards.
      properties:
        enabled:
          type: boolean
          description: Whether to enable Defender security gating. When enabled, the gating feature will scan container images and audit or block the deployment of images that do not meet security standards according to the configured security rules.
        identities:
          type: array
          items:
            $ref: "#/components/schemas/ManagedClusterSecurityProfileDefenderSecurityGatingIdentitiesItem"
          description: List of identities that the admission controller will make use of in order to pull security artifacts from the registry. These are the same identities used by the cluster to pull container images. Each identity provided should have federated identity credential attached to it.
        allowSecretAccess:
          type: boolean
          description: In use only while registry access granted by secret rather than managed identity. Set whether to grant the Defender gating agent access to the cluster's secrets for pulling images from registries. If secret access is denied and the registry requires pull secrets, the add-on will not perform any image validation. Default value is false.
    ManagedClusterSecurityProfileDefenderSecurityGatingIdentitiesItem:
      type: object
      description: Identity information used by Defender security gating to access container registries.
      properties:
        azureContainerRegistry:
          type: string
          description: The container registry for which the identity will be used; the identity specified here should have a federated identity credential attached to it.
        identity:
          $ref: "#/components/schemas/UserAssignedIdentity"
          description: The identity object used to access the registry.
    AzureKeyVaultKms:
      type: object
      description: Azure Key Vault key management service settings for the security profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable Azure Key Vault key management service. The default is false.
        keyId:
          type: string
          description: Identifier of Azure Key Vault key. See `key identifier format `_ for more details. When Azure Key Vault key management service is enabled, this field is required and must be a valid key identifier. When Azure Key Vault key management service is disabled, leave the field empty.
        keyVaultNetworkAccess:
          $ref: "#/components/schemas/KeyVaultNetworkAccessTypes"
          description: 'Network access of the key vault. Network access of key vault. The possible values are `Public` and `Private`. `Public` means the key vault allows public access from all networks. `Private` means the key vault disables public access and enables private link. The default value is `Public`. Known values are: "Public" and "Private".'
        keyVaultResourceId:
          type: string
          description: Resource ID of key vault. When keyVaultNetworkAccess is `Private`, this field is required and must be a valid resource ID. When keyVaultNetworkAccess is `Public`, leave the field empty.
    KeyVaultNetworkAccessTypes:
      type: string
      enum:
        - Public
        - Private
    KubernetesResourceObjectEncryptionProfile:
      type: object
      description: Encryption at rest of Kubernetes resource objects using service-managed keys. More information on this can be found under `https://aka.ms/aks/kubernetesResourceObjectEncryption `_.
      properties:
        infrastructureEncryption:
          $ref: "#/components/schemas/InfrastructureEncryption"
          description: 'Whether to enable encryption at rest of Kubernetes resource objects using service-managed keys. More information on this can be found under `https://aka.ms/aks/kubernetesResourceObjectEncryption `_. Known values are: "Enabled" and "Disabled".'
    InfrastructureEncryption:
      type: string
      enum:
        - Enabled
        - Disabled
    ManagedClusterSecurityProfileWorkloadIdentity:
      type: object
      description: Workload identity settings for the security profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable workload identity.
    ManagedClusterSecurityProfileImageCleaner:
      type: object
      description: Image Cleaner removes unused images from nodes, freeing up disk space and helping to reduce attack surface area. Here are settings for the security profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable Image Cleaner on AKS cluster.
        intervalHours:
          type: integer
          description: Image Cleaner scanning interval in hours.
    ManagedClusterSecurityProfileImageIntegrity:
      type: object
      description: Image integrity related settings for the security profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable image integrity. The default value is false.
    ManagedClusterSecurityProfileNodeRestriction:
      type: object
      description: Node Restriction settings for the security profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable Node Restriction.
    ServiceAccountImagePullProfile:
      type: object
      description: Profile for configuring image pull authentication to use service account scoped managed identities for authentication instead of node scoped managed identity (kubelet identity) for authentication to Azure Container Registry. For more information, refer to `https://aka.ms/aks/identity-binding/acr-image-pull/docs `_.
      properties:
        enabled:
          type: boolean
          description: Indicates whether service account based image pull is enabled, for which identity bindings are required for the managed identity to be used for authentication. For more information, refer to `https://aka.ms/aks/identity-binding-docs `_.
        defaultManagedIdentityId:
          type: string
          description: Optional. The default managed identity resource ID used for image pulls at the cluster level. When configured, this identity is used if a Pod’s service account does not explicitly specify an identity for pulling images. If not configured and no identity is specified at service account level, image will be pulled via anonymous authentication.
    ManagedClusterStorageProfile:
      type: object
      description: Storage profile for the container service cluster.
      properties:
        diskCSIDriver:
          $ref: "#/components/schemas/ManagedClusterStorageProfileDiskCSIDriver"
          description: AzureDisk CSI Driver settings for the storage profile.
        fileCSIDriver:
          $ref: "#/components/schemas/ManagedClusterStorageProfileFileCSIDriver"
          description: AzureFile CSI Driver settings for the storage profile.
        snapshotController:
          $ref: "#/components/schemas/ManagedClusterStorageProfileSnapshotController"
          description: Snapshot Controller settings for the storage profile.
        blobCSIDriver:
          $ref: "#/components/schemas/ManagedClusterStorageProfileBlobCSIDriver"
          description: AzureBlob CSI Driver settings for the storage profile.
    ManagedClusterStorageProfileDiskCSIDriver:
      type: object
      description: AzureDisk CSI Driver settings for the storage profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable AzureDisk CSI Driver. The default value is true.
    ManagedClusterStorageProfileFileCSIDriver:
      type: object
      description: AzureFile CSI Driver settings for the storage profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable AzureFile CSI Driver. The default value is true.
    ManagedClusterStorageProfileSnapshotController:
      type: object
      description: Snapshot Controller settings for the storage profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable Snapshot Controller. The default value is true.
    ManagedClusterStorageProfileBlobCSIDriver:
      type: object
      description: AzureBlob CSI Driver settings for the storage profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable AzureBlob CSI Driver. The default value is false.
    ManagedClusterIngressProfile:
      type: object
      description: Ingress profile for the container service cluster.
      properties:
        webAppRouting:
          $ref: "#/components/schemas/ManagedClusterIngressProfileWebAppRouting"
          description: App Routing settings for the ingress profile. You can find an overview and onboarding guide for this feature at `https://learn.microsoft.com/en-us/azure/aks/app-routing?tabs=default%2Cdeploy-app-default `_.
        gatewayAPI:
          $ref: "#/components/schemas/ManagedClusterIngressProfileGatewayConfiguration"
          description: Settings for the managed Gateway API installation.
        applicationLoadBalancer:
          $ref: "#/components/schemas/ManagedClusterIngressProfileApplicationLoadBalancer"
          description: Settings for the managed Application Load Balancer installation.
    ManagedClusterIngressProfileWebAppRouting:
      type: object
      description: Application Routing add-on settings for the ingress profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable the Application Routing add-on.
        gatewayAPIImplementations:
          $ref: "#/components/schemas/ManagedClusterWebAppRoutingGatewayAPIImplementations"
          description: Configurations for Gateway API providers to be used for managed ingress with App Routing. See `https://aka.ms/k8s-gateway-api `_ for more information on the Gateway API.
        dnsZoneResourceIds:
          type: array
          items:
            type: string
          description: Resource IDs of the DNS zones to be associated with the Application Routing add-on. Used only when Application Routing add-on is enabled. Public and private DNS zones can be in different resource groups, but all public DNS zones must be in the same resource group and all private DNS zones must be in the same resource group.
        nginx:
          $ref: "#/components/schemas/ManagedClusterIngressProfileNginx"
          description: Configuration for the default NginxIngressController. See more at `https://learn.microsoft.com/en-us/azure/aks/app-routing-nginx-configuration#the-default-nginx-ingress-controller `_.
        identity:
          $ref: "#/components/schemas/UserAssignedIdentity"
          description: Managed identity of the Application Routing add-on. This is the identity that should be granted permissions, for example, to manage the associated Azure DNS resource and get certificates from Azure Key Vault. See `this overview of the add-on `_ for more instructions.
        defaultDomain:
          $ref: "#/components/schemas/ManagedClusterIngressDefaultDomainProfile"
          description: Configuration for the Default Domain. This is a unique, autogenerated domain that comes with a signed TLS Certificate allowing for secure HTTPS. See `the Default Domain documentation `_ for more instructions.
    ManagedClusterWebAppRoutingGatewayAPIImplementations:
      type: object
      description: Configurations for Gateway API providers to be used for managed ingress with App Routing.
      properties:
        appRoutingIstio:
          $ref: "#/components/schemas/ManagedClusterAppRoutingIstio"
          description: Configuration for using a sidecar-less Istio control plane for managed ingress via the Gateway API with App Routing. See `https://aka.ms/gateway-on-istio `_ for information on using Istio for ingress via the Gateway API.
    ManagedClusterAppRoutingIstio:
      type: object
      description: Configuration for using a sidecar-less Istio control plane for managed ingress via the Gateway API with App Routing. See `https://aka.ms/gateway-on-istio `_ for information on using Istio for ingress via the Gateway API.
      properties:
        mode:
          $ref: "#/components/schemas/GatewayAPIIstioEnabled"
          description: 'Whether to enable Istio as a Gateway API implementation for managed ingress with App Routing. Known values are: "Enabled" and "Disabled".'
    GatewayAPIIstioEnabled:
      type: string
      enum:
        - Enabled
        - Disabled
    ManagedClusterIngressProfileNginx:
      type: object
      description: Nginx ingress controller configuration for the managed cluster ingress profile.
      properties:
        defaultIngressControllerType:
          $ref: "#/components/schemas/NginxIngressControllerType"
          description: 'Ingress type for the default NginxIngressController custom resource. Known values are: "AnnotationControlled", "External", "Internal", and "None".'
    NginxIngressControllerType:
      type: string
      enum:
        - AnnotationControlled
        - External
        - Internal
        - None
    ManagedClusterIngressDefaultDomainProfile:
      type: object
      description: Default domain profile for the managed cluster ingress profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable Default Domain.
        domainName:
          type: string
          description: The unique fully qualified domain name assigned to the cluster. This will not change even if disabled then reenabled.
    ManagedClusterIngressProfileGatewayConfiguration:
      type: object
      description: Configuration for managed Gateway API CRDs. See `https://aka.ms/k8s-gateway-api `_ for more details.
      properties:
        installation:
          $ref: "#/components/schemas/ManagedGatewayType"
          description: "Configuration for the managed Gateway API installation. If not specified, the default is 'Disabled'. See `https://aka.ms/k8s-gateway-api `_ for more details. Known values are: \"Disabled\" and \"Standard\"."
    ManagedGatewayType:
      type: string
      enum:
        - Disabled
        - Standard
    ManagedClusterIngressProfileApplicationLoadBalancer:
      type: object
      description: Application Load Balancer settings for the ingress profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable Application Load Balancer.
        identity:
          $ref: "#/components/schemas/UserAssignedIdentity"
          description: Managed identity of the Application Load Balancer add-on. This is the identity that should be granted permissions to manage the associated Application Gateway for Containers resource.
    PublicNetworkAccess:
      type: string
      enum:
        - Enabled
        - Disabled
        - SecuredByPerimeter
    ManagedClusterWorkloadAutoScalerProfile:
      type: object
      description: Workload Auto-scaler profile for the managed cluster.
      properties:
        keda:
          $ref: "#/components/schemas/ManagedClusterWorkloadAutoScalerProfileKeda"
          description: KEDA (Kubernetes Event-driven Autoscaling) settings for the workload auto-scaler profile.
        verticalPodAutoscaler:
          $ref: "#/components/schemas/ManagedClusterWorkloadAutoScalerProfileVerticalPodAutoscaler"
          description: VPA (Vertical Pod Autoscaler) settings for the workload auto-scaler profile.
    ManagedClusterWorkloadAutoScalerProfileKeda:
      type: object
      description: KEDA (Kubernetes Event-driven Autoscaling) settings for the workload auto-scaler profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable KEDA. Required.
      required:
        - enabled
    ManagedClusterWorkloadAutoScalerProfileVerticalPodAutoscaler:
      type: object
      description: VPA (Vertical Pod Autoscaler) settings for the workload auto-scaler profile.
      properties:
        enabled:
          type: boolean
          description: Whether to enable VPA. Default value is false. Required.
        addonAutoscaling:
          $ref: "#/components/schemas/AddonAutoscaling"
          description: 'Whether VPA add-on is enabled and configured to scale AKS-managed add-ons. Known values are: "Enabled" and "Disabled".'
      required:
        - enabled
    AddonAutoscaling:
      type: string
      enum:
        - Enabled
        - Disabled
    ManagedClusterAzureMonitorProfile:
      type: object
      description: Azure Monitor addon profiles for monitoring the managed cluster.
      properties:
        metrics:
          $ref: "#/components/schemas/ManagedClusterAzureMonitorProfileMetrics"
          description: Metrics profile for the Azure Monitor managed service for Prometheus addon. Collect out-of-the-box Kubernetes infrastructure metrics to send to an Azure Monitor Workspace and configure additional scraping for custom targets. See aka.ms/AzureManagedPrometheus for an overview.
        containerInsights:
          $ref: "#/components/schemas/ManagedClusterAzureMonitorProfileContainerInsights"
          description: Azure Monitor Container Insights Profile for Kubernetes Events, Inventory and Container stdout & stderr logs etc. See aka.ms/AzureMonitorContainerInsights for an overview.
        appMonitoring:
          $ref: "#/components/schemas/ManagedClusterAzureMonitorProfileAppMonitoring"
          description: Application Monitoring Profile for Kubernetes Application Container. Collects application logs, metrics and traces through auto-instrumentation of the application using Azure Monitor OpenTelemetry based SDKs. See aka.ms/AzureMonitorApplicationMonitoring for an overview.
    ManagedClusterAzureMonitorProfileMetrics:
      type: object
      description: Metrics profile for the Azure Monitor managed service for Prometheus addon. Collect out-of-the-box Kubernetes infrastructure metrics to send to an Azure Monitor Workspace and configure additional scraping for custom targets. See aka.ms/AzureManagedPrometheus for an overview.
      properties:
        enabled:
          type: boolean
          description: Whether to enable or disable the Azure Managed Prometheus addon for Prometheus monitoring. See aka.ms/AzureManagedPrometheus-aks-enable for details on enabling and disabling. Required.
        kubeStateMetrics:
          $ref: "#/components/schemas/ManagedClusterAzureMonitorProfileKubeStateMetrics"
          description: Kube State Metrics profile for the Azure Managed Prometheus addon. These optional settings are for the kube-state-metrics pod that is deployed with the addon. See aka.ms/AzureManagedPrometheus-optional-parameters for details.
        controlPlane:
          $ref: "#/components/schemas/ManagedClusterAzureMonitorProfileMetricsControlPlane"
          description: Control plane metrics collection profile for the Azure Managed Prometheus addon. Configures collection of operational runtime metrics from managed control plane components (kube-apiserver, etcd, etc). See aka.ms/aks/controlplane-metrics for an overview.
      required:
        - enabled
    ManagedClusterAzureMonitorProfileKubeStateMetrics:
      type: object
      description: Kube State Metrics profile for the Azure Managed Prometheus addon. These optional settings are for the kube-state-metrics pod that is deployed with the addon. See aka.ms/AzureManagedPrometheus-optional-parameters for details.
      properties:
        metricLabelsAllowlist:
          type: string
          description: "Comma-separated list of additional Kubernetes label keys that will be used in the resource's labels metric (Example: 'namespaces=[k8s-label-1,k8s-label-n,...],pods=[app],...'). By default the metric contains only resource name and namespace labels."
        metricAnnotationsAllowList:
          type: string
          description: "Comma-separated list of Kubernetes annotation keys that will be used in the resource's labels metric (Example: 'namespaces=[kubernetes.io/team,...],pods=[kubernetes.io/team],...'). By default the metric contains only resource name and namespace labels."
    ManagedClusterAzureMonitorProfileMetricsControlPlane:
      type: object
      description: Control plane metrics collection profile for the Azure Managed Prometheus addon. Configures collection of operational runtime metrics from managed control plane components (kube-apiserver, etcd, etc). See aka.ms/aks/controlplane-metrics for an overview.
      properties:
        enabled:
          type: boolean
          description: Whether to enable or disable collection of control plane metrics by the Azure Managed Prometheus addon. Defaults to disabled. See aka.ms/aks/controlplane-metrics for details.
    ManagedClusterAzureMonitorProfileContainerInsights:
      type: object
      description: Azure Monitor Container Insights Profile for Kubernetes Events, Inventory and Container stdout & stderr logs etc. See aka.ms/AzureMonitorContainerInsights for an overview.
      properties:
        enabled:
          type: boolean
          description: Indicates if Azure Monitor Container Insights Logs Addon is enabled or not.
        logAnalyticsWorkspaceResourceId:
          type: string
          description: Fully Qualified ARM Resource Id of Azure Log Analytics Workspace for storing Azure Monitor Container Insights Logs.
        syslogPort:
          type: integer
          description: The syslog host port. If not specified, the default port is 28330.
        disableCustomMetrics:
          type: boolean
          description: Indicates whether custom metrics collection has to be disabled or not. If not specified the default is false. No custom metrics will be emitted if this field is false but the container insights enabled field is false.
        disablePrometheusMetricsScraping:
          type: boolean
          description: Indicates whether prometheus metrics scraping is disabled or not. If not specified the default is false. No prometheus metrics will be emitted if this field is false but the container insights enabled field is false.
        containerNetworkLogs:
          $ref: "#/components/schemas/ContainerNetworkLogs"
          description: 'Configures container network logs ingestion with Azure Monitor. Which network logs to ingest is controlled by the CRD found in the following links. No network logs are ingested by default. More information on container network logs can be found at `https://aka.ms/ContainerNetworkLogsDoc `_. More information on configuring container network log can be found at `https://aka.ms/acns/howtoenablecnl `_. If not specified, the default is Disabled. Known values are: "Disabled" and "Enabled".'
    ContainerNetworkLogs:
      type: string
      enum:
        - Disabled
        - Enabled
    ManagedClusterAzureMonitorProfileAppMonitoring:
      type: object
      description: Application Monitoring profile for AKS.
      properties:
        autoInstrumentation:
          $ref: "#/components/schemas/ManagedClusterAzureMonitorProfileAppMonitoringAutoInstrumentation"
          description: Application Monitoring auto-instrumentation for AKS. Deploys a webhook that auto-instruments workloads with Microsoft OpenTelemetry Distros to collect OpenTelemetry metrics, logs, and traces. See `https://aka.ms/AKSAppMonitoringDocs `_ and `https://aka.ms/AzureMonitorApplicationMonitoring `_ for an overview.
        openTelemetryMetrics:
          $ref: "#/components/schemas/ManagedClusterAzureMonitorProfileAppMonitoringOpenTelemetryMetrics"
          description: Application Monitoring Open Telemetry Metrics Profile for AKS. Collects OpenTelemetry metrics of the application using Azure Monitor OpenTelemetry based SDKs. See `https://aka.ms/AKSAppMonitoringDocs `_ and `https://aka.ms/AzureMonitorApplicationMonitoring `_ for an overview.
        openTelemetryLogsAndTraces:
          $ref: "#/components/schemas/ManagedClusterAzureMonitorProfileAppMonitoringOpenTelemetryLogsAndTraces"
          description: Application Monitoring Open Telemetry Logs and Traces Profile for AKS. Collects OpenTelemetry logs and traces of the application using Azure Monitor OpenTelemetry based SDKs. See `https://aka.ms/AKSAppMonitoringDocs `_ and `https://aka.ms/AzureMonitorApplicationMonitoring `_ for an overview.
    ManagedClusterAzureMonitorProfileAppMonitoringAutoInstrumentation:
      type: object
      description: Application Monitoring auto-instrumentation for AKS. Deploys a webhook that auto-instruments workloads with Microsoft OpenTelemetry Distros to collect OpenTelemetry metrics, logs, and traces. See `https://aka.ms/AKSAppMonitoringDocs `_ and `https://aka.ms/AzureMonitorApplicationMonitoring `_ for an overview.
      properties:
        enabled:
          type: boolean
          description: Indicates if Application Monitoring Auto-instrumentation is enabled or not.
    ManagedClusterAzureMonitorProfileAppMonitoringOpenTelemetryMetrics:
      type: object
      description: Application Monitoring Open Telemetry Metrics Profile for AKS. Collects OpenTelemetry metrics of the application using Azure Monitor OpenTelemetry based SDKs. See `https://aka.ms/AKSAppMonitoringDocs `_ and `https://aka.ms/AzureMonitorApplicationMonitoring `_ for an overview.
      properties:
        enabled:
          type: boolean
          description: Indicates if Application Monitoring Open Telemetry Metrics is enabled or not.
        httpPort:
          type: integer
          description: The host port for Open Telemetry HTTP/PROTOBUF metrics. If not specified, the default port is 28333.
        grpcPort:
          type: integer
          description: The host port for Open Telemetry GRPC metrics. If not specified, the default port is 28334.
    ManagedClusterAzureMonitorProfileAppMonitoringOpenTelemetryLogsAndTraces:
      type: object
      description: Application Monitoring Open Telemetry Logs and Traces Profile for AKS. Collects OpenTelemetry logs and traces of the application using Azure Monitor OpenTelemetry based SDKs. See `https://aka.ms/AKSAppMonitoringDocs `_ and `https://aka.ms/AzureMonitorApplicationMonitoring `_ for an overview.
      properties:
        enabled:
          type: boolean
          description: Indicates if Application Monitoring Open Telemetry Logs and traces is enabled or not.
        httpPort:
          type: integer
          description: The host port for Open Telemetry HTTP/PROTOBUF logs and traces. If not specified, the default port is 28331.
        grpcPort:
          type: integer
          description: The host port for Open Telemetry GRPC logs and traces. If not specified, the default port is 28332.
    ServiceMeshProfile:
      type: object
      description: Service mesh profile for a managed cluster.
      properties:
        mode:
          $ref: "#/components/schemas/ServiceMeshMode"
          description: 'Mode of the service mesh. Required. Known values are: "Istio" and "Disabled".'
        istio:
          $ref: "#/components/schemas/IstioServiceMesh"
          description: Istio service mesh configuration.
      required:
        - mode
    ServiceMeshMode:
      type: string
      enum:
        - Istio
        - Disabled
    IstioServiceMesh:
      type: object
      description: Istio service mesh configuration.
      properties:
        components:
          $ref: "#/components/schemas/IstioComponents"
          description: Istio components configuration.
        certificateAuthority:
          $ref: "#/components/schemas/IstioCertificateAuthority"
          description: Istio Service Mesh Certificate Authority (CA) configuration. For now, we only support plugin certificates as described here `https://aka.ms/asm-plugin-ca `_.
        revisions:
          type: array
          items:
            type: string
          description: "The list of revisions of the Istio control plane. When an upgrade is not in progress, this holds one value. When canary upgrade is in progress, this can only hold two consecutive values. For more information, see: `https://learn.microsoft.com/en-us/azure/aks/istio-upgrade `_."
    IstioComponents:
      type: object
      description: Istio components configuration.
      properties:
        ingressGateways:
          type: array
          items:
            $ref: "#/components/schemas/IstioIngressGateway"
          description: Istio ingress gateways.
        egressGateways:
          type: array
          items:
            $ref: "#/components/schemas/IstioEgressGateway"
          description: Istio egress gateways.
        proxyRedirectionMechanism:
          $ref: "#/components/schemas/ProxyRedirectionMechanism"
          description: 'Mode of traffic redirection. Known values are: "InitContainers" and "CNIChaining".'
    IstioIngressGateway:
      type: object
      description: Istio ingress gateway configuration. For now, we support up to one external ingress gateway named `aks-istio-ingressgateway-external` and one internal ingress gateway named `aks-istio-ingressgateway-internal`.
      properties:
        mode:
          $ref: "#/components/schemas/IstioIngressGatewayMode"
          description: 'Mode of an ingress gateway. Required. Known values are: "External" and "Internal".'
        enabled:
          type: boolean
          description: Whether to enable the ingress gateway. Required.
      required:
        - mode
        - enabled
    IstioIngressGatewayMode:
      type: string
      enum:
        - External
        - Internal
    IstioEgressGateway:
      type: object
      description: Istio egress gateway configuration.
      properties:
        enabled:
          type: boolean
          description: Whether to enable the egress gateway. Required.
        name:
          type: string
          description: Name of the Istio add-on egress gateway. Required.
        namespace:
          type: string
          description: Namespace that the Istio add-on egress gateway should be deployed in. If unspecified, the default is aks-istio-egress.
        gatewayConfigurationName:
          type: string
          description: Name of the gateway configuration custom resource for the Istio add-on egress gateway. Must be specified when enabling the Istio egress gateway. Must be deployed in the same namespace that the Istio egress gateway will be deployed in.
      required:
        - enabled
        - name
    ProxyRedirectionMechanism:
      type: string
      enum:
        - InitContainers
        - CNIChaining
    IstioCertificateAuthority:
      type: object
      description: Istio Service Mesh Certificate Authority (CA) configuration. For now, we only support plugin certificates as described here `https://aka.ms/asm-plugin-ca `_.
      properties:
        plugin:
          $ref: "#/components/schemas/IstioPluginCertificateAuthority"
          description: Plugin certificates information for Service Mesh.
    IstioPluginCertificateAuthority:
      type: object
      description: Plugin certificates information for Service Mesh.
      properties:
        keyVaultId:
          type: string
          description: The resource ID of the Key Vault.
        certObjectName:
          type: string
          description: Intermediate certificate object name in Azure Key Vault.
        keyObjectName:
          type: string
          description: Intermediate certificate private key object name in Azure Key Vault.
        rootCertObjectName:
          type: string
          description: Root certificate object name in Azure Key Vault.
        certChainObjectName:
          type: string
          description: Certificate chain object name in Azure Key Vault.
    ManagedClusterMetricsProfile:
      type: object
      description: The metrics profile for the ManagedCluster.
      properties:
        costAnalysis:
          $ref: "#/components/schemas/ManagedClusterCostAnalysis"
          description: The configuration for detailed per-Kubernetes resource cost analysis.
    ManagedClusterCostAnalysis:
      type: object
      description: The cost analysis configuration for the cluster.
      properties:
        enabled:
          type: boolean
          description: Whether to enable cost analysis. The Managed Cluster sku.tier must be set to 'Standard' or 'Premium' to enable this feature. Enabling this will add Kubernetes Namespace and Deployment details to the Cost Analysis views in the Azure portal. If not specified, the default is false. For more information see aka.ms/aks/docs/cost-analysis.
    ManagedClusterNodeProvisioningProfile:
      type: object
      description: Node provisioning profile for the managed cluster.
      properties:
        mode:
          $ref: "#/components/schemas/NodeProvisioningMode"
          description: 'The node provisioning mode. If not specified, the default is Manual. Known values are: "Manual" and "Auto".'
        defaultNodePools:
          $ref: "#/components/schemas/NodeProvisioningDefaultNodePools"
          description: "The set of default Karpenter NodePools (CRDs) configured for node provisioning. This field has no effect unless mode is 'Auto'. Warning: Changing this from Auto to None on an existing cluster will cause the default Karpenter NodePools to be deleted, which will drain and delete the nodes associated with those pools. It is strongly recommended to not do this unless there are idle nodes ready to take the pods evicted by that action. If not specified, the default is Auto. For more information see aka.ms/aks/nap#node-pools. Known values are: \"None\" and \"Auto\"."
    NodeProvisioningMode:
      type: string
      enum:
        - Manual
        - Auto
    NodeProvisioningDefaultNodePools:
      type: string
      enum:
        - None
        - Auto
    ManagedClusterBootstrapProfile:
      type: object
      description: The bootstrap profile.
      properties:
        artifactSource:
          $ref: "#/components/schemas/ArtifactSource"
          description: 'The artifact source. The source where the artifacts are downloaded from. Known values are: "Cache" and "Direct".'
        containerRegistryId:
          type: string
          description: The resource Id of Azure Container Registry. The registry must have private network access, premium SKU and zone redundancy.
    ArtifactSource:
      type: string
      enum:
        - Cache
        - Direct
    ManagedClusterAIToolchainOperatorProfile:
      type: object
      description: When enabling the operator, a set of AKS managed CRDs and controllers will be installed in the cluster. The operator automates the deployment of OSS models for inference and/or training purposes. It provides a set of preset models and enables distributed inference against them.
      properties:
        enabled:
          type: boolean
          description: Whether to enable AI toolchain operator to the cluster. Indicates if AI toolchain operator enabled or not.
    SchedulerProfile:
      type: object
      description: The pod scheduler profile for the cluster.
      properties:
        schedulerInstanceProfiles:
          $ref: "#/components/schemas/SchedulerProfileSchedulerInstanceProfiles"
          description: Mapping of each scheduler instance to its profile.
    SchedulerProfileSchedulerInstanceProfiles:
      type: object
      description: Mapping of each scheduler instance to its profile.
      properties:
        upstream:
          $ref: "#/components/schemas/SchedulerInstanceProfile"
          description: The scheduler profile for the upstream scheduler instance.
    SchedulerInstanceProfile:
      type: object
      description: The scheduler profile for a single scheduler instance.
      properties:
        schedulerConfigMode:
          $ref: "#/components/schemas/SchedulerConfigMode"
          description: 'The config customization mode for this scheduler instance. Known values are: "Default" and "ManagedByCRD".'
    SchedulerConfigMode:
      type: string
      enum:
        - Default
        - ManagedByCRD
    ManagedClusterHostedSystemProfile:
      type: object
      description: Settings for hosted system addons.
      properties:
        enabled:
          type: boolean
          description: Whether to enable hosted system addons for the cluster.
        systemNodeSubnetID:
          type: string
          description: The ID of the subnet that will be joined by system nodes managed and hosted by AKS for running critical system addons. This ID must be provided together with `nodeSubnetID` and `apiserverAccessProfile.subnetId`, and all three subnet IDs must belong to the same VNet. If you don’t specify it, AKS will create a subnet in the managed resource group using a default /26 CIDR.
        nodeSubnetID:
          type: string
          description: The ID of the subnet that will be joined by worker nodes managed by node auto provisioner for running workload pods in your tenant. This must be provided together with `systemNodeSubnetID` and `apiserverAccessProfile.subnetId`, and all three subnet IDs must be in the same VNet. If you don’t specify it, AKS will create a subnet in the managed resource group using a default /16 CIDR.
    ManagedClusterHealthMonitorProfile:
      type: object
      description: Health monitor profile for the managed cluster.
      properties:
        enableContinuousControlPlaneAndAddonMonitor:
          type: boolean
          description: Whether to enable continuous control plane and addon monitor.
        enableOnDemandMonitor:
          type: boolean
          description: Whether to enable on-demand monitor.
    ManagedClusterControlPlaneScalingProfile:
      type: object
      description: Profile for providing scaled and performance guaranteed control plane capacity to deliver consistent performance under high workload. Requires Kubernetes version 1.33.0 or later.
      properties:
        scalingSize:
          $ref: "#/components/schemas/ControlPlaneScalingSize"
          description: 'The scaling size of the control plane. Scaling sizes offer guaranteed capacity and predictable Kubernetes performance beyond standard tier defaults. Higher H sizes provide increased performance guarantees. See `https://aka.ms/aks/hyperscale `_ for performance metrics details for each size. Required. Known values are: "H2", "H4", and "H8".'
      required:
        - scalingSize
    ControlPlaneScalingSize:
      type: string
      enum:
        - H2
        - H4
        - H8
    NodeDisruptionProfile:
      type: object
      description: Node disruption profile for a managed cluster.
      properties:
        nodeDisruptionPolicy:
          $ref: "#/components/schemas/NodeDisruptionPolicy"
          description: "The policy configuration for when to allow certain operations which require node re-image and trigger redeployment. For example, some operations, such as updating the .properties.ManagedClusterSecurityProfile.customCATrustCertificates field on an existing managed cluster, trigger rolling updates of the nodes. This setting allows control over when such updates are accepted. The default is 'Allow'. For a full list of covered operations see aka.ms/aks/nodedisruptionpolicy\". Known values are: \"Allow\", \"AllowDuringMaintenanceWindow\", and \"Block\"."
    NodeDisruptionPolicy:
      type: string
      enum:
        - Allow
        - AllowDuringMaintenanceWindow
        - Block
    ManagedClusterStatus:
      type: object
      description: Contains read-only information about the Managed Cluster.
      properties:
        provisioningError:
          $ref: "#/components/schemas/ErrorDetail"
          description: The error details information of the managed cluster. Preserves the detailed info of failure. If there was no error, this field is omitted.
    ExtendedLocation:
      type: object
      description: The complex type of the extended location.
      properties:
        name:
          type: string
          description: The name of the extended location.
        type:
          $ref: "#/components/schemas/ExtendedLocationTypes"
          description: The type of the extended location. "EdgeZone"
    ExtendedLocationTypes:
      type: string
      enum:
        - EdgeZone
    ManagedClusterIdentity:
      type: object
      description: Identity for the managed cluster.
      properties:
        principalId:
          type: string
          description: The principal id of the system assigned identity which is used by master components.
        tenantId:
          type: string
          description: The tenant id of the system assigned identity which is used by master components.
        type:
          $ref: "#/components/schemas/ResourceIdentityType"
          description: 'The type of identity used for the managed cluster. For more information see `use managed identities in AKS `_. Known values are: "SystemAssigned", "UserAssigned", and "None".'
        delegatedResources:
          type: object
          properties: {}
          description: The delegated identity resources assigned to this managed cluster. This can only be set by another Azure Resource Provider, and managed cluster only accept one delegated identity resource. Internal use only.
        userAssignedIdentities:
          type: object
          properties: {}
          description: "The user identity associated with the managed cluster. This identity will be used in control plane. Only one user assigned identity is allowed. The keys must be ARM resource IDs in the form: '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}'."
    ResourceIdentityType:
      type: string
      enum:
        - SystemAssigned
        - UserAssigned
        - None
    ManagedClusterFlattened:
      type: object
      description: Flattened view of ManagedCluster ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        tags:
          type: object
          properties: {}
          description: Resource tags.
        location:
          type: string
          description: The geo-location where the resource lives. Required.
        eTag:
          type: string
          description: If eTag is provided in the response body, it may also be provided as a header per the normal etag convention. Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
        sku:
          $ref: "#/components/schemas/ManagedClusterSKU"
          description: The managed cluster SKU.
        extendedLocation:
          $ref: "#/components/schemas/ExtendedLocation"
          description: The extended location of the Virtual Machine.
        identity:
          $ref: "#/components/schemas/ManagedClusterIdentity"
          description: The identity of the managed cluster, if configured.
        kind:
