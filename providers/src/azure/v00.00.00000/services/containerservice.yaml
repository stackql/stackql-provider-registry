          description: The properties of the load balancer.
    MachineProperties:
      type: object
      description: The properties of the machine.
      properties:
        network:
          $ref: "#/components/schemas/MachineNetworkProperties"
          description: network properties of the machine.
        resourceId:
          type: string
          description: Azure resource id of the machine. It can be used to GET underlying VM Instance.
        hardware:
          $ref: "#/components/schemas/MachineHardwareProfile"
          description: The hardware and GPU settings of the machine.
        operatingSystem:
          $ref: "#/components/schemas/MachineOSProfile"
          description: The operating system and disk used by the machine.
        kubernetes:
          $ref: "#/components/schemas/MachineKubernetesProfile"
          description: The Kubernetes configurations used by the machine.
        mode:
          $ref: "#/components/schemas/AgentPoolMode"
          description: "Machine only allows 'System' and 'User' mode. Known values are: \"System\", \"User\", \"Gateway\", \"ManagedSystem\", and \"Machines\"."
        security:
          $ref: "#/components/schemas/MachineSecurityProfile"
          description: The security settings of the machine.
        priority:
          $ref: "#/components/schemas/ScaleSetPriority"
          description: "The priority for the machine. If not specified, the default is 'Regular'. Known values are: \"Spot\" and \"Regular\"."
        evictionPolicy:
          $ref: "#/components/schemas/ScaleSetEvictionPolicy"
          description: "The eviction policy for machine. This cannot be specified unless the priority is 'Spot'. If not specified, the default is 'Delete'. Known values are: \"Delete\" and \"Deallocate\"."
        billing:
          $ref: "#/components/schemas/MachineBillingProfile"
          description: The properties having to do with machine billing.
        nodeImageVersion:
          type: string
          description: The version of node image.
        provisioningState:
          type: string
          description: The current deployment or provisioning state.
        tags:
          type: object
          properties: {}
          description: The tags to be persisted on the machine.
        eTag:
          type: string
          description: Unique read-only string used to implement optimistic concurrency. The eTag value will change when the resource is updated. Specify an if-match or if-none-match header with the eTag value for a subsequent request to enable optimistic concurrency per the normal eTag convention.
        status:
          $ref: "#/components/schemas/MachineStatus"
          description: Contains read-only information about the machine.
        localDNSProfile:
          $ref: "#/components/schemas/LocalDNSProfile"
          description: Configures the per-node local DNS, with VnetDNS and KubeDNS overrides. LocalDNS helps improve performance and reliability of DNS resolution in an AKS cluster. For more details see aka.ms/aks/localdns.
    MachineNetworkProperties:
      type: object
      description: network properties of the machine.
      properties:
        ipAddresses:
          type: array
          items:
            $ref: "#/components/schemas/MachineIpAddress"
          description: IPv4, IPv6 addresses of the machine.
        vnetSubnetID:
          type: string
          description: "The ID of the subnet which node and optionally pods will join on startup. If this is not specified, a VNET and subnet will be generated and used. If no podSubnetID is specified, this applies to nodes and pods, otherwise it applies to just nodes. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/virtualNetworks/{virtualNetworkName}/subnets/{subnetName}."
        podSubnetID:
          type: string
          description: "The ID of the subnet which pods will join when launched. If omitted, pod IPs are statically assigned on the node subnet (see vnetSubnetID for more details). This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/virtualNetworks/{virtualNetworkName}/subnets/{subnetName}."
        enableNodePublicIP:
          type: boolean
          description: Whether the machine is allocated its own public IP. Some scenarios may require the machine to receive their own dedicated public IP addresses. A common scenario is for gaming workloads, where a console needs to make a direct connection to a cloud virtual machine to minimize hops. The default is false.
        nodePublicIPPrefixID:
          type: string
          description: "The public IP prefix ID which VM node should use IPs from. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/publicIPPrefixes/{publicIPPrefixName}."
        nodePublicIPTags:
          type: array
          items:
            $ref: "#/components/schemas/IPTag"
          description: IPTags of instance-level public IPs.
    MachineIpAddress:
      type: object
      description: The machine IP address details.
      properties:
        family:
          $ref: "#/components/schemas/IPFamily"
          description: 'To determine if address belongs IPv4 or IPv6 family. Known values are: "IPv4" and "IPv6".'
        ip:
          type: string
          description: IPv4 or IPv6 address of the machine.
    IPFamily:
      type: string
      enum:
        - IPv4
        - IPv6
    MachineHardwareProfile:
      type: object
      description: The hardware and GPU settings of the machine.
      properties:
        vmSize:
          type: string
          description: "The size of the VM. VM size availability varies by region. If a node contains insufficient compute resources (memory, cpu, etc) pods might fail to run correctly. For more details on restricted VM sizes, see: `https://docs.microsoft.com/azure/aks/quotas-skus-regions `_."
        gpuInstanceProfile:
          $ref: "#/components/schemas/GPUInstanceProfile"
          description: 'GPUInstanceProfile to be used to specify GPU MIG instance profile for supported GPU VM SKU. Known values are: "MIG1g", "MIG2g", "MIG3g", "MIG4g", and "MIG7g".'
        gpuProfile:
          $ref: "#/components/schemas/GPUProfile"
          description: The GPU settings of the machine.
        ultraSsdEnabled:
          type: boolean
          description: Whether to enable UltraSSD.
    MachineOSProfile:
      type: object
      description: The operating system and disk used by the machine.
      properties:
        osType:
          $ref: "#/components/schemas/OSType"
          description: 'The operating system type. The default is Linux. Known values are: "Linux" and "Windows".'
        osSKU:
          $ref: "#/components/schemas/OSSKU"
          description: 'Specifies the OS SKU used by the agent pool. If not specified, the default is Ubuntu if OSType=Linux or Windows2019 if OSType=Windows. And the default Windows OSSKU will be changed to Windows2022 after Windows2019 is deprecated. Known values are: "Ubuntu", "AzureLinux", "AzureLinux3", "Mariner", "Flatcar", "CBLMariner", "Windows2019", "Windows2022", "Ubuntu2204", "Windows2025", "WindowsAnnual", "Ubuntu2404", and "AzureContainerLinux".'
        osDiskSizeGB:
          type: integer
          description: OS Disk Size in GB to be used to specify the disk size for every machine in the master/agent pool. If you specify 0, it will apply the default osDisk size according to the vmSize specified.
        osDiskType:
          $ref: "#/components/schemas/OSDiskType"
          description: "The OS disk type to be used for machines in the agent pool. The default is 'Ephemeral' if the VM supports it and has a cache disk larger than the requested OSDiskSizeGB. Otherwise, defaults to 'Managed'. May not be changed after creation. For more information see `Ephemeral OS `_. Known values are: \"Managed\" and \"Ephemeral\"."
        enableFIPS:
          type: boolean
          description: Whether to use a FIPS-enabled OS.
        linuxProfile:
          $ref: "#/components/schemas/MachineOSProfileLinuxProfile"
          description: The Linux machine's specific profile.
        windowsProfile:
          $ref: "#/components/schemas/AgentPoolWindowsProfile"
          description: The Windows machine's specific profile.
    MachineOSProfileLinuxProfile:
      type: object
      description: The Linux machine's specific profile.
      properties:
        linuxOSConfig:
          $ref: "#/components/schemas/LinuxOSConfig"
          description: The OS configuration of Linux machine.
        messageOfTheDay:
          type: string
          description: Message of the day for Linux nodes, base64-encoded. A base64-encoded string which will be written to /etc/motd after decoding. This allows customization of the message of the day for Linux nodes. It must not be specified for Windows nodes. It must be a static string (i.e., will be printed raw and not be executed as a script).
    MachineKubernetesProfile:
      type: object
      description: The Kubernetes configurations used by the machine.
      properties:
        nodeLabels:
          type: object
          properties: {}
          description: The node labels on the machine.
        orchestratorVersion:
          type: string
          description: The version of Kubernetes specified by the user. Both patch version and are supported. When is specified, the latest supported patch version is chosen automatically.
        currentOrchestratorVersion:
          type: string
          description: The version of Kubernetes running on the machine. If orchestratorVersion was a fully specified version , this field will be exactly equal to it. If orchestratorVersion was , this field will contain the full version being used.
        kubeletDiskType:
          $ref: "#/components/schemas/KubeletDiskType"
          description: 'Determines the placement of emptyDir volumes, container runtime data root, and Kubelet ephemeral storage. Known values are: "OS" and "Temporary".'
        kubeletConfig:
          $ref: "#/components/schemas/KubeletConfig"
          description: The Kubelet configuration on the machine.
        nodeInitializationTaints:
          type: array
          items:
            type: string
          description: Taints added on the node during creation that will not be reconciled by AKS. These taints will not be reconciled by AKS and can be removed with a kubectl call. These taints allow for required configuration to run before the node is ready to accept workloads, for example 'key1=value1:NoSchedule' that then can be removed with `kubectl taint nodes node1 key1=value1:NoSchedule-`.
        nodeTaints:
          type: array
          items:
            type: string
          description: The taints added to new node during machine create. For example, key=value:NoSchedule.
        maxPods:
          type: integer
          description: The maximum number of pods that can run on a node.
        nodeName:
          type: string
          description: The node name in the Kubernetes cluster.
        workloadRuntime:
          $ref: "#/components/schemas/WorkloadRuntime"
          description: 'Determines the type of workload a node can run. Known values are: "OCIContainer", "WasmWasi", "KataMshvVmIsolation", and "KataVmIsolation".'
        artifactStreamingProfile:
          $ref: "#/components/schemas/AgentPoolArtifactStreamingProfile"
          description: Configuration for using artifact streaming on AKS.
    MachineSecurityProfile:
      type: object
      description: The security settings of the machine.
      properties:
        enableVTPM:
          type: boolean
          description: vTPM is a Trusted Launch feature for configuring a dedicated secure vault for keys and measurements held locally on the node. For more details, see aka.ms/aks/trustedlaunch. If not specified, the default is false.
        enableSecureBoot:
          type: boolean
          description: Secure Boot is a feature of Trusted Launch which ensures that only signed operating systems and drivers can boot. For more details, see aka.ms/aks/trustedlaunch. If not specified, the default is false.
        sshAccess:
          $ref: "#/components/schemas/AgentPoolSSHAccess"
          description: 'SSH access method of an agent pool. Known values are: "LocalUser", "Disabled", and "EntraId".'
        enableEncryptionAtHost:
          type: boolean
          description: "Whether to enable host based OS and data drive encryption. This is only supported on certain VM sizes and in certain Azure regions. For more information, see: `https://docs.microsoft.com/azure/aks/enable-host-encryption `_."
    MachineBillingProfile:
      type: object
      description: The properties having to do with machine billing.
      properties:
        spotMaxPrice:
          type: number
          description: The max price (in US Dollars) you are willing to pay for spot instances. Possible values are any decimal value greater than zero or -1 which indicates default price to be up-to on-demand. For more details on spot pricing, see `spot VMs pricing `_.
    MachineStatus:
      type: object
      description: Contains read-only information about the machine.
      properties:
        provisioningError:
          $ref: "#/components/schemas/ErrorDetail"
          description: The error details information of the machine. Preserves the detailed info of failure. If there was no error, this field is omitted.
        creationTimestamp:
          type: string
          format: date-time
          description: Specifies the time at which the machine was created.
        driftAction:
          $ref: "#/components/schemas/DriftAction"
          description: 'The drift action of the machine. Indicates whether a machine has deviated from its expected state due to changes in managed cluster properties, requiring corrective action. Known values are: "Synced" and "Recreate".'
        driftReason:
          type: string
          description: Reason for machine drift. Provides detailed information on why the machine has drifted. This field is omitted if the machine is up to date.
        vmState:
          $ref: "#/components/schemas/VmState"
          description: 'Virtual machine state. Indicates the current state of the underlying virtual machine. Known values are: "Running" and "Deleted".'
    DriftAction:
      type: string
      enum:
