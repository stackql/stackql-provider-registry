openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Container Service Client
  description: The Container Service Client.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-04-02-preview-stackql-generated
  x-serviceAlias: containerservice
  x-sdkPackage: azure-mgmt-containerservice
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AgentPoolManagedClusterAgentPoolProfileProperties:
      type: object
      description: Properties for the container service agent pool profile.
      properties:
        eTag:
          type: string
          description: Unique read-only string used to implement optimistic concurrency. The eTag value will change when the resource is updated. Specify an if-match or if-none-match header with the eTag value for a subsequent request to enable optimistic concurrency per the normal eTag convention.
        count:
          type: integer
          description: Number of agents (VMs) to host docker containers. Allowed values must be in the range of 0 to 1000 (inclusive) for user pools and in the range of 1 to 1000 (inclusive) for system pools. The default value is 1.
        vmSize:
          type: string
          description: "The size of the agent pool VMs. VM size availability varies by region. If a node contains insufficient compute resources (memory, cpu, etc) pods might fail to run correctly. For more details on restricted VM sizes, see: `https://docs.microsoft.com/azure/aks/quotas-skus-regions `_."
        osDiskSizeGB:
          type: integer
          description: OS Disk Size in GB to be used to specify the disk size for every machine in the master/agent pool. If you specify 0, it will apply the default osDisk size according to the vmSize specified.
        osDiskType:
          $ref: "#/components/schemas/OSDiskType"
          description: "The OS disk type to be used for machines in the agent pool. The default is 'Ephemeral' if the VM supports it and has a cache disk larger than the requested OSDiskSizeGB. Otherwise, defaults to 'Managed'. May not be changed after creation. For more information see `Ephemeral OS `_. Known values are: \"Managed\" and \"Ephemeral\"."
        kubeletDiskType:
          $ref: "#/components/schemas/KubeletDiskType"
          description: 'Determines the placement of emptyDir volumes, container runtime data root, and Kubelet ephemeral storage. Known values are: "OS" and "Temporary".'
        workloadRuntime:
          $ref: "#/components/schemas/WorkloadRuntime"
          description: 'Determines the type of workload a node can run. Known values are: "OCIContainer", "WasmWasi", "KataMshvVmIsolation", and "KataVmIsolation".'
        messageOfTheDay:
          type: string
          description: Message of the day for Linux nodes, base64-encoded. A base64-encoded string which will be written to /etc/motd after decoding. This allows customization of the message of the day for Linux nodes. It must not be specified for Windows nodes. It must be a static string (i.e., will be printed raw and not be executed as a script).
        vnetSubnetID:
          type: string
          description: "The ID of the subnet which agent pool nodes and optionally pods will join on startup. If this is not specified, a VNET and subnet will be generated and used. If no podSubnetID is specified, this applies to nodes and pods, otherwise it applies to just nodes. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/virtualNetworks/{virtualNetworkName}/subnets/{subnetName}."
        podSubnetID:
          type: string
          description: "The ID of the subnet which pods will join when launched. If omitted, pod IPs are statically assigned on the node subnet (see vnetSubnetID for more details). This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/virtualNetworks/{virtualNetworkName}/subnets/{subnetName}."
        podIPAllocationMode:
          $ref: "#/components/schemas/PodIPAllocationMode"
          description: "Pod IP Allocation Mode. The IP allocation mode for pods in the agent pool. Must be used with podSubnetId. The default is 'DynamicIndividual'. Known values are: \"DynamicIndividual\" and \"StaticBlock\"."
        maxPods:
          type: integer
          description: The maximum number of pods that can run on a node.
        osType:
          $ref: "#/components/schemas/OSType"
          description: 'The operating system type. The default is Linux. Known values are: "Linux" and "Windows".'
        osSKU:
          $ref: "#/components/schemas/OSSKU"
          description: 'Specifies the OS SKU used by the agent pool. The default is Ubuntu if OSType is Linux. The default is Windows2019 when Kubernetes <= 1.24 or Windows2022 when Kubernetes >= 1.25 if OSType is Windows. Known values are: "Ubuntu", "AzureLinux", "AzureLinux3", "Mariner", "Flatcar", "CBLMariner", "Windows2019", "Windows2022", "Ubuntu2204", "Windows2025", "WindowsAnnual", "Ubuntu2404", and "AzureContainerLinux".'
        maxCount:
          type: integer
          description: The maximum number of nodes for auto-scaling.
        minCount:
          type: integer
          description: The minimum number of nodes for auto-scaling.
        enableAutoScaling:
          type: boolean
          description: Whether to enable auto-scaler.
        scaleDownMode:
          $ref: "#/components/schemas/ScaleDownMode"
          description: 'The scale down mode to use when scaling the Agent Pool. This also effects the cluster autoscaler behavior. If not specified, it defaults to Delete. Known values are: "Delete" and "Deallocate".'
        type:
          $ref: "#/components/schemas/AgentPoolType"
          description: 'The type of Agent Pool. Known values are: "VirtualMachineScaleSets", "AvailabilitySet", and "VirtualMachines".'
        mode:
          $ref: "#/components/schemas/AgentPoolMode"
          description: "The mode of an agent pool. A cluster must have at least one 'System' Agent Pool at all times. For additional information on agent pool restrictions and best practices, see: `https://docs.microsoft.com/azure/aks/use-system-pools `_. Known values are: \"System\", \"User\", \"Gateway\", \"ManagedSystem\", and \"Machines\"."
        orchestratorVersion:
          type: string
          description: The version of Kubernetes specified by the user. Both patch version (e.g. 1.20.13) and (e.g. 1.20) are supported. When is specified, the latest supported GA patch version is chosen automatically. Updating the cluster with the same once it has been created (e.g. 1.14.x -> 1.14) will not trigger an upgrade, even if a newer patch version is available. As a best practice, you should upgrade all node pools in an AKS cluster to the same Kubernetes version. The node pool version must have the same major version as the control plane. The node pool minor version must be within two minor versions of the control plane version. The node pool version cannot be greater than the control plane version. For more information see `upgrading a node pool `_.
        currentOrchestratorVersion:
          type: string
          description: The version of Kubernetes the Agent Pool is running. If orchestratorVersion is a fully specified version , this field will be exactly equal to it. If orchestratorVersion is , this field will contain the full version being used.
        nodeImageVersion:
          type: string
          description: The version of the node image. Setting this value triggers an agentPool rollback. Only values from `recentlyUsedVersions` are allowed.
        upgradeStrategy:
          $ref: "#/components/schemas/UpgradeStrategy"
          description: 'Defines the upgrade strategy for the agent pool. The default is Rolling. Known values are: "Rolling" and "BlueGreen".'
        enableOSDiskFullCaching:
          type: boolean
          description: Whether to enable the full-cache ephemeral OS disk feature. When this feature is enabled, the entire operating system will be locally cached on the ephemeral OS disk, preventing E17 events caused by network failures.
        upgradeSettings:
          $ref: "#/components/schemas/AgentPoolUpgradeSettings"
          description: Settings for upgrading the agentpool.
        upgradeSettingsBlueGreen:
          $ref: "#/components/schemas/AgentPoolBlueGreenUpgradeSettings"
          description: Settings for Blue-Green upgrade on the agentpool. Applies when upgrade strategy is set to BlueGreen.
        provisioningState:
          type: string
          description: The current deployment or provisioning state.
        powerState:
          $ref: "#/components/schemas/PowerState"
          description: Whether the Agent Pool is running or stopped. When an Agent Pool is first created it is initially Running. The Agent Pool can be stopped by setting this field to Stopped. A stopped Agent Pool stops all of its VMs and does not accrue billing charges. An Agent Pool can only be stopped if it is Running and provisioning state is Succeeded.
        availabilityZones:
          type: array
          items:
            type: string
          description: The list of Availability zones to use for nodes. This can only be specified if the AgentPoolType property is 'VirtualMachineScaleSets'.
        enableNodePublicIP:
          type: boolean
          description: Whether each node is allocated its own public IP. Some scenarios may require nodes in a node pool to receive their own dedicated public IP addresses. A common scenario is for gaming workloads, where a console needs to make a direct connection to a cloud virtual machine to minimize hops. For more information see `assigning a public IP per node `_. The default is false.
        nodePublicIPPrefixID:
          type: string
          description: "The public IP prefix ID which VM nodes should use IPs from. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/publicIPPrefixes/{publicIPPrefixName}."
        scaleSetPriority:
          $ref: "#/components/schemas/ScaleSetPriority"
          description: 'The Virtual Machine Scale Set priority. Known values are: "Spot" and "Regular".'
        scaleSetEvictionPolicy:
          $ref: "#/components/schemas/ScaleSetEvictionPolicy"
          description: 'The Virtual Machine Scale Set eviction policy. The eviction policy specifies what to do with the VM when it is evicted. The default is Delete. For more information about eviction see `spot VMs `_. Known values are: "Delete" and "Deallocate".'
        spotMaxPrice:
          type: number
          description: The max price (in US Dollars) you are willing to pay for spot instances. Possible values are any decimal value greater than zero or -1 which indicates default price to be up-to on-demand. Possible values are any decimal value greater than zero or -1 which indicates the willingness to pay any on-demand price. For more details on spot pricing, see `spot VMs pricing `_.
        tags:
          type: object
          properties: {}
          description: The tags to be persisted on the agent pool virtual machine scale set.
        nodeLabels:
          type: object
          properties: {}
          description: The node labels to be persisted across all nodes in agent pool.
        nodeTaints:
          type: array
          items:
            type: string
          description: The taints added to new nodes during node pool create and scale. For example, key=value:NoSchedule.
        nodeInitializationTaints:
          type: array
          items:
            type: string
          description: Taints added on the nodes during creation that will not be reconciled by AKS. These taints will not be reconciled by AKS and can be removed with a kubectl call. This field can be modified after node pool is created, but nodes will not be recreated with new taints until another operation that requires recreation (e.g. node image upgrade) happens. These taints allow for required configuration to run before the node is ready to accept workloads, for example 'key1=value1:NoSchedule' that then can be removed with `kubectl taint nodes node1 key1=value1:NoSchedule-`.
        proximityPlacementGroupID:
          type: string
          description: The ID for Proximity Placement Group.
        kubeletConfig:
          $ref: "#/components/schemas/KubeletConfig"
          description: The Kubelet configuration on the agent pool nodes.
        linuxOSConfig:
          $ref: "#/components/schemas/LinuxOSConfig"
          description: The OS configuration of Linux agent nodes.
        enableEncryptionAtHost:
          type: boolean
          description: "Whether to enable host based OS and data drive encryption. This is only supported on certain VM sizes and in certain Azure regions. For more information, see: `https://docs.microsoft.com/azure/aks/enable-host-encryption `_."
        enableUltraSSD:
          type: boolean
          description: Whether to enable UltraSSD.
        enableFIPS:
          type: boolean
          description: Whether to use a FIPS-enabled OS. See `Add a FIPS-enabled node pool `_ for more details.
        gpuInstanceProfile:
          $ref: "#/components/schemas/GPUInstanceProfile"
          description: 'GPUInstanceProfile to be used to specify GPU MIG instance profile for supported GPU VM SKU. Known values are: "MIG1g", "MIG2g", "MIG3g", "MIG4g", and "MIG7g".'
        creationData:
          $ref: "#/components/schemas/CreationData"
          description: CreationData to be used to specify the source Snapshot ID if the node pool will be created/upgraded using a snapshot.
        capacityReservationGroupID:
          type: string
          description: "The fully qualified resource ID of the Capacity Reservation Group to provide virtual machines from a reserved group of Virtual Machines. This is of the form: '/subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/Microsoft.Compute/capacityreservationgroups/{capacityReservationGroupName}' Customers use it to create an agentpool with a specified CRG. For more information see `Capacity Reservation `_."
        hostGroupID:
          type: string
          description: "The fully qualified resource ID of the Dedicated Host Group to provision virtual machines from, used only in creation scenario and not allowed to changed once set. This is of the form: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Compute/hostGroups/{hostGroupName}. For more information see `Azure dedicated hosts `_."
        networkProfile:
          $ref: "#/components/schemas/AgentPoolNetworkProfile"
          description: Network-related settings of an agent pool.
        windowsProfile:
          $ref: "#/components/schemas/AgentPoolWindowsProfile"
          description: The Windows agent pool's specific profile.
        securityProfile:
          $ref: "#/components/schemas/AgentPoolSecurityProfile"
          description: The security settings of an agent pool.
        gpuProfile:
          $ref: "#/components/schemas/GPUProfile"
          description: GPU settings for the Agent Pool.
        gatewayProfile:
          $ref: "#/components/schemas/AgentPoolGatewayProfile"
          description: Profile specific to a managed agent pool in Gateway mode. This field cannot be set if agent pool mode is not Gateway.
        artifactStreamingProfile:
          $ref: "#/components/schemas/AgentPoolArtifactStreamingProfile"
          description: Configuration for using artifact streaming on AKS.
        virtualMachinesProfile:
          $ref: "#/components/schemas/VirtualMachinesProfile"
          description: Specifications on VirtualMachines agent pool.
        virtualMachineNodesStatus:
          type: array
          items:
            $ref: "#/components/schemas/VirtualMachineNodes"
          description: The status of nodes in a VirtualMachines agent pool.
        status:
          $ref: "#/components/schemas/AgentPoolStatus"
          description: Contains read-only information about the Agent Pool.
        localDNSProfile:
          $ref: "#/components/schemas/LocalDNSProfile"
          description: Configures the per-node local DNS, with VnetDNS and KubeDNS overrides. LocalDNS helps improve performance and reliability of DNS resolution in an AKS cluster. For more details see aka.ms/aks/localdns.
        preparedImageSpecificationProfile:
          $ref: "#/components/schemas/PreparedImageSpecificationProfile"
          description: Settings to determine the prepared image specification used to provision nodes in a pool.
    OSDiskType:
      type: string
      enum:
        - Managed
        - Ephemeral
    KubeletDiskType:
      type: string
      enum:
        - OS
        - Temporary
    WorkloadRuntime:
      type: string
      enum:
        - OCIContainer
        - WasmWasi
        - KataMshvVmIsolation
        - KataVmIsolation
    PodIPAllocationMode:
      type: string
      enum:
        - DynamicIndividual
        - StaticBlock
    OSType:
      type: string
      enum:
        - Linux
        - Windows
    OSSKU:
      type: string
      enum:
        - Ubuntu
        - AzureLinux
        - AzureLinux3
        - Mariner
        - Flatcar
        - CBLMariner
        - Windows2019
        - Windows2022
        - Ubuntu2204
        - Windows2025
        - WindowsAnnual
        - Ubuntu2404
        - AzureContainerLinux
    ScaleDownMode:
      type: string
      enum:
        - Delete
        - Deallocate
    AgentPoolType:
      type: string
      enum:
        - VirtualMachineScaleSets
        - AvailabilitySet
        - VirtualMachines
    AgentPoolMode:
      type: string
      enum:
        - System
        - User
        - Gateway
        - ManagedSystem
        - Machines
    UpgradeStrategy:
      type: string
      enum:
        - Rolling
        - BlueGreen
    AgentPoolUpgradeSettings:
      type: object
      description: Settings for upgrading an agentpool.
      properties:
        maxSurge:
          type: string
          description: "The maximum number or percentage of nodes that are surged during upgrade. This can either be set to an integer (e.g. '5') or a percentage (e.g. '50%'). If a percentage is specified, it is the percentage of the total agent pool size at the time of the upgrade. For percentages, fractional nodes are rounded up. If not specified, the default is 10%. For more information, including best practices, see: `https://learn.microsoft.com/en-us/azure/aks/upgrade-cluster `_."
        maxUnavailable:
          type: string
          description: "The maximum number or percentage of nodes that can be simultaneously unavailable during upgrade. This can either be set to an integer (e.g. '1') or a percentage (e.g. '5%'). If a percentage is specified, it is the percentage of the total agent pool size at the time of the upgrade. For percentages, fractional nodes are rounded up. If not specified, the default is 0. For more information, including best practices, see: `https://learn.microsoft.com/en-us/azure/aks/upgrade-cluster `_."
        maxBlockedNodes:
          type: string
          description: "The maximum number or percentage of extra nodes that are allowed to be blocked in the agent pool during an upgrade when undrainable node behavior is Cordon. This can either be set to an integer (e.g. '5') or a percentage (e.g. '50%'). If a percentage is specified, it is the percentage of the total agent pool size at the time of the upgrade. For percentages, fractional nodes are rounded up. If not specified, the default is maxSurge. This must always be greater than or equal to maxSurge. For more information, including best practices, see: `https://learn.microsoft.com/en-us/azure/aks/upgrade-cluster `_."
        drainTimeoutInMinutes:
          type: integer
          description: The drain timeout for a node. The amount of time (in minutes) to wait on eviction of pods and graceful termination per node. This eviction wait time honors waiting on pod disruption budgets. If this time is exceeded, the upgrade fails. If not specified, the default is 30 minutes.
        nodeSoakDurationInMinutes:
          type: integer
          description: The soak duration for a node. The amount of time (in minutes) to wait after draining a node and before reimaging it and moving on to next node. If not specified, the default is 0 minutes.
        undrainableNodeBehavior:
          $ref: "#/components/schemas/UndrainableNodeBehavior"
          description: 'Defines the behavior for undrainable nodes during upgrade. The most common cause of undrainable nodes is Pod Disruption Budgets (PDBs), but other issues, such as pod termination grace period is exceeding the remaining per-node drain timeout or pod is still being in a running state, can also cause undrainable nodes. Known values are: "Cordon" and "Schedule".'
    UndrainableNodeBehavior:
      type: string
      enum:
        - Cordon
        - Schedule
    AgentPoolBlueGreenUpgradeSettings:
      type: object
      description: Settings for blue-green upgrade on an agentpool.
      properties:
        drainBatchSize:
          type: string
          description: "The number or percentage of nodes to drain in batch during blue-green upgrade. Must be a non-zero number. This can either be set to an integer (e.g. '5') or a percentage (e.g. '50%'). If a percentage is specified, it is the percentage of the total number of blue nodes of the initial upgrade operation. For percentages, fractional nodes are rounded up. If not specified, the default is 10%. For more information, including best practices, see: `https://learn.microsoft.com/en-us/azure/aks/upgrade-cluster `_."
        drainTimeoutInMinutes:
          type: integer
          description: The drain timeout for a node, i.e., the amount of time (in minutes) to wait on eviction of pods and graceful termination per node. This eviction wait time honors waiting on pod disruption budgets. If this time is exceeded, the upgrade fails. If not specified, the default is 30 minutes.
        batchSoakDurationInMinutes:
          type: integer
          description: The soak duration after draining a batch of nodes, i.e., the amount of time (in minutes) to wait after draining a batch of nodes before moving on the next batch. If not specified, the default is 15 minutes.
        finalSoakDurationInMinutes:
          type: integer
          description: The soak duration for a node pool, i.e., the amount of time (in minutes) to wait after all old nodes are drained before we remove the old nodes. If not specified, the default is 60 minutes. Only applicable for blue-green upgrade strategy.
    PowerState:
      type: object
      description: Describes the Power State of the cluster.
      properties:
        code:
          $ref: "#/components/schemas/Code"
          description: 'Tells whether the cluster is Running or Stopped. Known values are: "Running" and "Stopped".'
    Code:
      type: string
      enum:
        - Running
        - Stopped
    ScaleSetPriority:
      type: string
      enum:
        - Spot
        - Regular
    ScaleSetEvictionPolicy:
      type: string
      enum:
        - Delete
        - Deallocate
    KubeletConfig:
      type: object
      description: Kubelet configurations of agent nodes. See `AKS custom node configuration `_ for more details.
      properties:
        cpuManagerPolicy:
          type: string
          description: The CPU Manager policy to use. The default is 'none'. See `Kubernetes CPU management policies `_ for more information. Allowed values are 'none' and 'static'.
        cpuCfsQuota:
          type: boolean
          description: If CPU CFS quota enforcement is enabled for containers that specify CPU limits. The default is true.
        cpuCfsQuotaPeriod:
          type: string
          description: "The CPU CFS quota period value. The default is '100ms.' Valid values are a sequence of decimal numbers with an optional fraction and a unit suffix. For example: '300ms', '2h45m'. Supported units are 'ns', 'us', 'ms', 's', 'm', and 'h'."
        imageGcHighThreshold:
          type: integer
          description: The percent of disk usage after which image garbage collection is always run. To disable image garbage collection, set to 100. The default is 85%.
        imageGcLowThreshold:
          type: integer
          description: The percent of disk usage before which image garbage collection is never run. This cannot be set higher than imageGcHighThreshold. The default is 80%.
        topologyManagerPolicy:
          type: string
          description: The Topology Manager policy to use. For more information see `Kubernetes Topology Manager `_. The default is 'none'. Allowed values are 'none', 'best-effort', 'restricted', and 'single-numa-node'.
        allowedUnsafeSysctls:
          type: array
          items:
            type: string
          description: Allowed list of unsafe sysctls or unsafe sysctl patterns (ending in `*`).
        failSwapOn:
          type: boolean
          description: If set to true it will make the Kubelet fail to start if swap is enabled on the node.
        containerLogMaxSizeMB:
          type: integer
          description: The maximum size (e.g. 10Mi) of container log file before it is rotated.
        containerLogMaxFiles:
          type: integer
          description: The maximum number of container log files that can be present for a container. The number must be ≥ 2.
        podMaxPids:
          type: integer
          description: The maximum number of processes per pod.
        seccompDefault:
          $ref: "#/components/schemas/SeccompDefault"
          description: "Specifies the default seccomp profile applied to all workloads. If not specified, 'Unconfined' will be used by default. Known values are: \"Unconfined\" and \"RuntimeDefault\"."
        kubeReserved:
          $ref: "#/components/schemas/KubeReserved"
          description: Kube-reserved values for kubelet. When a value is not set, the system-computed default based on VM size is used. See `AKS node resource reservations `_ for details on computed defaults. Only applicable for Linux nodepools.
        hardEvictionThreshold:
          $ref: "#/components/schemas/HardEvictionThreshold"
          description: Hard eviction thresholds for kubelet. When a threshold is not set, the system default is used. See `AKS node resource reservations `_ for details on computed defaults. Only applicable for Linux nodepools.
    SeccompDefault:
      type: string
      enum:
        - Unconfined
        - RuntimeDefault
    KubeReserved:
      type: object
      description: Kube-reserved values for kubelet. When a value is not set, the system-computed default based on VM size is used. See `AKS node resource reservations `_ for details on computed defaults. Only applicable for Linux nodepools.
      properties:
        cpuMillicores:
          type: integer
          description: The amount of CPU reserved for Kubernetes system daemons, in millicores. Must be greater than or equal to 140. For example, a value of 200 means 200m (0.2 CPU cores).
        memoryMB:
          type: integer
          description: The amount of memory reserved for Kubernetes system daemons, in MiB. Must be greater than or equal to 750.
    HardEvictionThreshold:
      type: object
      description: Hard eviction thresholds for kubelet. These thresholds trigger pod eviction when node resources drop below the specified values. Values must be greater than or equal to the documented minimums for each signal. Supported formats are Ki, Mi, Gi, or percentages using %.
      properties:
        memoryAvailable:
          type: string
          description: The threshold for available memory below which pod eviction is triggered. Accepts absolute values (e.g. '500Mi') or percentage values (e.g. '5%'). Absolute values must be greater than or equal to 100Mi. Percentage values must be greater than or equal to 2%.
        nodeFsAvailable:
          type: string
          description: The threshold for available node filesystem space below which pod eviction is triggered. Accepts absolute values (e.g. '1Gi') or percentage values (e.g. '10%'). Must be greater than or equal to the system default of 10%.
        nodeFsInodesFree:
          type: string
          description: The threshold for available inodes on the node filesystem below which pod eviction is triggered. Accepts absolute inode counts (e.g. '100000') or percentage values (e.g. '5%'). Percentage values must be greater than or equal to the system default of 5%.
    LinuxOSConfig:
      type: object
      description: OS configurations of Linux agent nodes. See `AKS custom node configuration `_ for more details.
      properties:
        sysctls:
          $ref: "#/components/schemas/SysctlConfig"
          description: Sysctl settings for Linux agent nodes.
        transparentHugePageEnabled:
          type: string
          description: Whether transparent hugepages are enabled. Valid values are 'always', 'madvise', and 'never'. The default is 'always'. For more information see `Transparent Hugepages `_.
        transparentHugePageDefrag:
          type: string
          description: Whether the kernel should make aggressive use of memory compaction to make more hugepages available. Valid values are 'always', 'defer', 'defer+madvise', 'madvise' and 'never'. The default is 'madvise'. For more information see `Transparent Hugepages `_.
        swapFileSizeMB:
          type: integer
          description: The size in MB of a swap file that will be created on each node.
    SysctlConfig:
      type: object
      description: Sysctl settings for Linux agent nodes.
      properties:
        netCoreSomaxconn:
          type: integer
          description: Sysctl setting net.core.somaxconn.
        netCoreNetdevMaxBacklog:
          type: integer
          description: Sysctl setting net.core.netdev_max_backlog.
        netCoreRmemDefault:
          type: integer
          description: Sysctl setting net.core.rmem_default.
        netCoreRmemMax:
          type: integer
          description: Sysctl setting net.core.rmem_max.
        netCoreWmemDefault:
          type: integer
          description: Sysctl setting net.core.wmem_default.
        netCoreWmemMax:
          type: integer
