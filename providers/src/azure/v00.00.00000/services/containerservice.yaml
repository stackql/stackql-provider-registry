    Machine:
      type: object
      description: A machine. Contains details about the underlying virtual machine. A machine may be visible here but not in kubectl get nodes; if so it may be because the machine has not been registered with the Kubernetes API Server yet.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/MachineProperties"
          description: The properties of the machine.
        zones:
          type: array
          items:
            type: string
          description: The Availability zone in which machine is located.
    MaintenanceConfigurationProperties:
      type: object
      description: Properties used to configure planned maintenance for a Managed Cluster.
      properties:
        timeInWeek:
          type: array
          items:
            $ref: "#/components/schemas/TimeInWeek"
          description: Time slots during the week when planned maintenance is allowed to proceed. If two array entries specify the same day of the week, the applied configuration is the union of times in both entries.
        notAllowedTime:
          type: array
          items:
            $ref: "#/components/schemas/TimeSpan"
          description: Time slots on which upgrade is not allowed.
        maintenanceWindow:
          $ref: "#/components/schemas/MaintenanceWindow"
          description: Maintenance window for the maintenance configuration.
    TimeInWeek:
      type: object
      description: Time in a week.
      properties:
        day:
          $ref: "#/components/schemas/WeekDay"
          description: 'The day of the week. Known values are: "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", and "Saturday".'
        hourSlots:
          type: array
          items:
            type: integer
          description: A list of hours in the day used to identify a time range. Each integer hour represents a time range beginning at 0m after the hour ending at the next hour (non-inclusive). 0 corresponds to 00:00 UTC, 23 corresponds to 23:00 UTC. Specifying [0, 1] means the 00:00 - 02:00 UTC time range.
    WeekDay:
      type: string
      enum:
        - Sunday
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
    TimeSpan:
      type: object
      description: A time range. For example, between 2021-05-25T13:00:00Z and 2021-05-25T14:00:00Z.
      properties:
        start:
          type: string
          format: date-time
          description: The start of a time span.
        end:
          type: string
          format: date-time
          description: The end of a time span.
    MaintenanceWindow:
      type: object
      description: Maintenance window used to configure scheduled auto-upgrade for a Managed Cluster.
      properties:
        schedule:
          $ref: "#/components/schemas/Schedule"
          description: Recurrence schedule for the maintenance window. Required.
        durationHours:
          type: integer
          description: Length of maintenance window range from 4 to 24 hours. Required.
        utcOffset:
          type: string
          description: The UTC offset in format +/-HH:mm. For example, '+05:30' for IST and '-07:00' for PST. If not specified, the default is '+00:00'.
        startDate:
          type: string
          format: date
          description: The date the maintenance window activates. If the current date is before this date, the maintenance window is inactive and will not be used for upgrades. If not specified, the maintenance window will be active right away.
        startTime:
          type: string
          description: "The start time of the maintenance window. Accepted values are from '00:00' to '23:59'. 'utcOffset' applies to this field. For example: '02:00' with 'utcOffset: +02:00' means UTC time '00:00'. Required."
        notAllowedDates:
          type: array
          items:
            $ref: "#/components/schemas/DateSpan"
          description: "Date ranges on which upgrade is not allowed. 'utcOffset' applies to this field. For example, with 'utcOffset: +02:00' and 'dateSpan' being '2022-12-23' to '2023-01-03', maintenance will be blocked from '2022-12-22 22:00' to '2023-01-03 22:00' in UTC time."
      required:
        - schedule
        - durationHours
        - startTime
    Schedule:
      type: object
      description: One and only one of the schedule types should be specified. Choose either 'daily', 'weekly', 'absoluteMonthly' or 'relativeMonthly' for your maintenance schedule.
      properties:
        daily:
          $ref: "#/components/schemas/DailySchedule"
          description: "For schedules like: 'recur every day' or 'recur every 3 days'."
        weekly:
          $ref: "#/components/schemas/WeeklySchedule"
          description: "For schedules like: 'recur every Monday' or 'recur every 3 weeks on Wednesday'."
        absoluteMonthly:
          $ref: "#/components/schemas/AbsoluteMonthlySchedule"
          description: "For schedules like: 'recur every month on the 15th' or 'recur every 3 months on the 20th'."
        relativeMonthly:
          $ref: "#/components/schemas/RelativeMonthlySchedule"
          description: "For schedules like: 'recur every month on the first Monday' or 'recur every 3 months on last Friday'."
    DailySchedule:
      type: object
      description: "For schedules like: 'recur every day' or 'recur every 3 days'."
      properties:
        intervalDays:
          type: integer
          description: Specifies the number of days between each set of occurrences. Required.
      required:
        - intervalDays
    WeeklySchedule:
      type: object
      description: "For schedules like: 'recur every Monday' or 'recur every 3 weeks on Wednesday'."
      properties:
        intervalWeeks:
          type: integer
          description: Specifies the number of weeks between each set of occurrences. Required.
        dayOfWeek:
          $ref: "#/components/schemas/WeekDay"
          description: 'Specifies on which day of the week the maintenance occurs. Required. Known values are: "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", and "Saturday".'
      required:
        - intervalWeeks
        - dayOfWeek
    AbsoluteMonthlySchedule:
      type: object
      description: "For schedules like: 'recur every month on the 15th' or 'recur every 3 months on the 20th'."
      properties:
        intervalMonths:
          type: integer
          description: Specifies the number of months between each set of occurrences. Required.
        dayOfMonth:
          type: integer
          description: The date of the month. Required.
      required:
        - intervalMonths
        - dayOfMonth
    RelativeMonthlySchedule:
      type: object
      description: "For schedules like: 'recur every month on the first Monday' or 'recur every 3 months on last Friday'."
      properties:
        intervalMonths:
          type: integer
          description: Specifies the number of months between each set of occurrences. Required.
        weekIndex:
          $ref: "#/components/schemas/Type"
          description: 'The week index. Specifies on which week of the month the dayOfWeek applies. Required. Known values are: "First", "Second", "Third", "Fourth", and "Last".'
        dayOfWeek:
          $ref: "#/components/schemas/WeekDay"
          description: 'Specifies on which day of the week the maintenance occurs. Required. Known values are: "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", and "Saturday".'
      required:
        - intervalMonths
        - weekIndex
        - dayOfWeek
    Type:
      type: string
      enum:
        - First
        - Second
        - Third
        - Fourth
        - Last
    DateSpan:
      type: object
      description: A date range. For example, between '2022-12-23' and '2023-01-05'.
      properties:
        start:
          type: string
          format: date
          description: The start date of the date span. Required.
        end:
          type: string
          format: date
          description: The end date of the date span. Required.
      required:
