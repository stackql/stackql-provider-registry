openapi: 3.0.0
servers:
  - url: https://{endpoint}
    variables:
      endpoint:
        default: ""
        description: The service endpoint host (no scheme), e.g. myaccount.table.cosmos.azure.com:443 - value of the client `endpoint` parameter.
info:
  title: Azure AI Foundry Projects (Data Plane)
  description: "Enumerate and manage Azure AI Foundry project assets: connections, datasets, deployments and indexes."
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: v1-stackql-generated
  x-serviceAlias: ai_projects
  x-sdkPackage: azure-ai-projects
  x-plane: data
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    AgentState:
      type: string
      enum:
        - enabled
        - disabled
    AgentObjectVersions:
      type: object
      description: AgentObjectVersions.
      properties:
        latest:
          $ref: "#/components/schemas/AgentVersionDetails"
          description: Required.
      required:
        - latest
    AgentVersionDetails:
      type: object
      description: AgentVersionDetails.
      properties:
        metadata:
          type: object
          properties: {}
          description: Set of 16 key-value pairs that can be attached to an object. This can be useful for storing additional information about the object in a structured format, and querying for objects via API or the dashboard. Keys are strings with a maximum length of 64 characters. Values are strings with a maximum length of 512 characters. Required.
        object:
          type: string
          description: The object type, which is always 'agent.version'. Required. AGENT_VERSION.
        id:
          type: string
          description: The unique identifier of the agent version. Required.
        name:
          type: string
          description: The name of the agent. Name can be used to retrieve/update/delete the agent. Required.
        version:
          type: string
          description: The version identifier of the agent. Agents are immutable and every update creates a new version while keeping the name same. Required.
        description:
          type: string
          description: A human-readable description of the agent.
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp (seconds) when the agent was created. Required.
        definition:
          $ref: "#/components/schemas/AgentDefinition"
          description: Required.
        draft:
          type: boolean
          description: Whether this agent version is a draft (candidate) rather than a release. Draft versions are recorded but excluded from default 'latest' resolution and are not auto-promoted. Defaults to false.
        status:
          $ref: "#/components/schemas/AgentVersionStatus"
          description: "The provisioning status of the agent version. Defaults to 'active' for non-hosted agents. For hosted agents, reflects infrastructure readiness. Known values are: \"creating\", \"active\", \"failed\", \"deleting\", and \"deleted\"."
        instance_identity:
          $ref: "#/components/schemas/AgentIdentity"
          description: The instance identity of the agent.
        blueprint:
          $ref: "#/components/schemas/AgentIdentity"
          description: The blueprint for the agent.
        blueprint_reference:
          $ref: "#/components/schemas/AgentBlueprintReference"
          description: The blueprint for the agent.
        agent_guid:
          type: string
          description: The unique GUID identifier of the agent.
      required:
        - metadata
        - object
        - id
        - name
        - version
        - created_at
        - definition
    AgentDefinition:
      type: object
      description: "AgentDefinition. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ExternalAgentDefinition, HostedAgentDefinition, PromptAgentDefinition, WorkflowAgentDefinition"
      properties:
        kind:
          type: string
          description: 'Required. Known values are: "prompt", "hosted", "workflow", and "external".'
        rai_config:
          $ref: "#/components/schemas/RaiConfig"
          description: Configuration for Responsible AI (RAI) content filtering and safety features.
      required:
        - kind
    RaiConfig:
      type: object
      description: Configuration for Responsible AI (RAI) content filtering and safety features.
      properties:
        rai_policy_name:
          type: string
          description: The name of the RAI policy to apply. Required.
      required:
        - rai_policy_name
    AgentVersionStatus:
      type: string
      enum:
        - creating
        - active
        - failed
        - deleting
        - deleted
    AgentIdentity:
      type: object
      description: AgentIdentity.
      properties:
        principal_id:
          type: string
          description: The principal ID of the agent instance. Required.
        client_id:
          type: string
          description: The client ID of the agent instance. Also referred to as the instance ID. Required.
      required:
        - principal_id
        - client_id
    AgentBlueprintReference:
      type: object
      description: "AgentBlueprintReference. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ManagedAgentIdentityBlueprintReference"
      properties:
        type:
          type: string
          description: Required. "ManagedAgentIdentityBlueprint"
      required:
        - type
    AgentEndpointConfig:
      type: object
      description: AgentEndpointConfig.
      properties:
        version_selector:
          $ref: "#/components/schemas/VersionSelector"
          description: The version selector of the agent endpoint determines how traffic is routed to different versions of the agent.
        protocol_configuration:
          $ref: "#/components/schemas/ProtocolConfiguration"
          description: Per-protocol configuration for the agent endpoint.
        authorization_schemes:
          type: array
          items:
            $ref: "#/components/schemas/AgentEndpointAuthorizationScheme"
          description: The authorization schemes supported by the agent endpoint.
    VersionSelector:
      type: object
      description: VersionSelector.
      properties:
        version_selection_rules:
          type: array
          items:
            $ref: "#/components/schemas/VersionSelectionRule"
          description: Required.
      required:
        - version_selection_rules
    VersionSelectionRule:
      type: object
      description: "VersionSelectionRule. You probably want to use the sub-classes and not this class directly. Known sub-classes are: FixedRatioVersionSelectionRule"
      properties:
        type:
          type: string
          description: Required. "FixedRatio"
        agent_version:
          type: string
          description: The agent version to route traffic to. Required.
      required:
        - type
        - agent_version
    ProtocolConfiguration:
      type: object
      description: Per-protocol configuration for the agent endpoint.
      properties:
        activity:
          $ref: "#/components/schemas/ActivityProtocolConfiguration"
          description: Configuration for the activity protocol.
        responses:
          $ref: "#/components/schemas/ResponsesProtocolConfiguration"
          description: Configuration for the responses protocol.
        a2a:
          $ref: "#/components/schemas/A2AProtocolConfiguration"
          description: Configuration for the A2A protocol.
        mcp:
          $ref: "#/components/schemas/McpProtocolConfiguration"
          description: Configuration for the MCP protocol.
        invocations:
          $ref: "#/components/schemas/InvocationsProtocolConfiguration"
          description: Configuration for the invocations protocol.
        invocations_ws:
          $ref: "#/components/schemas/InvocationsWsProtocolConfiguration"
          description: Configuration for the WebSocket-based invocations protocol.
    ActivityProtocolConfiguration:
      type: object
      description: Configuration specific to the activity protocol.
      properties:
        enable_m365_public_endpoint:
          type: boolean
          description: Whether to enable the M365 public endpoint for the activity protocol.
    ResponsesProtocolConfiguration:
      type: object
      description: Configuration specific to the responses protocol.
      properties: {}
    A2AProtocolConfiguration:
      type: object
      description: Configuration specific to the A2A protocol.
      properties: {}
    McpProtocolConfiguration:
      type: object
      description: Configuration specific to the MCP protocol.
      properties: {}
    InvocationsProtocolConfiguration:
      type: object
      description: Configuration specific to the invocations protocol.
      properties: {}
    InvocationsWsProtocolConfiguration:
      type: object
      description: Configuration specific to the WebSocket-based invocations protocol.
      properties: {}
    AgentEndpointAuthorizationScheme:
      type: object
      description: "AgentEndpointAuthorizationScheme. You probably want to use the sub-classes and not this class directly. Known sub-classes are: BotServiceAuthorizationScheme, BotServiceRbacAuthorizationScheme, BotServiceTenantAuthorizationScheme, EntraAuthorizationScheme"
      properties:
        type:
          type: string
          description: 'Required. Known values are: "Entra", "BotService", "BotServiceRbac", and "BotServiceTenant".'
      required:
        - type
    AgentCard:
      type: object
      description: AgentCard.
      properties:
        version:
          type: string
          description: The version of the agent card. Required.
        description:
          type: string
          description: The description of the agent card.
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentCardSkill"
          description: The set of skills that an agent can perform. Required.
      required:
        - version
        - skills
    AgentCardSkill:
      type: object
      description: AgentCardSkill.
      properties:
        id:
          type: string
          description: a unique identifier for the skill. Required.
        name:
          type: string
          description: The name of the skill. Required.
        description:
          type: string
          description: A description of the skill.
        tags:
          type: array
          items:
            type: string
          description: set of tagwords describing classes of capabilities for the skill.
        examples:
          type: array
          items:
            type: string
          description: A list of example scenarios that the skill can perform.
      required:
        - id
        - name
    AgentDetails:
      type: object
      description: AgentDetails.
      properties:
        object:
          type: string
          description: The object type, which is always 'agent'. Required. AGENT.
        id:
          type: string
          description: The unique identifier of the agent. Required.
        name:
          type: string
          description: The name of the agent. Required.
        state:
          $ref: "#/components/schemas/AgentState"
          description: 'The operational state of the agent. Controls whether the agent endpoint accepts or rejects requests. Required. Known values are: "enabled" and "disabled".'
        versions:
          $ref: "#/components/schemas/AgentObjectVersions"
          description: The latest version of the agent. Required.
        agent_endpoint:
          $ref: "#/components/schemas/AgentEndpointConfig"
          description: The endpoint configuration for the agent.
        instance_identity:
          $ref: "#/components/schemas/AgentIdentity"
          description: The instance identity of the agent.
        blueprint:
          $ref: "#/components/schemas/AgentIdentity"
          description: The blueprint for the agent.
        blueprint_reference:
          $ref: "#/components/schemas/AgentBlueprintReference"
          description: The blueprint for the agent.
        agent_card:
          $ref: "#/components/schemas/AgentCard"
          description: ":vartype agent_card: ~azure.ai.projects.models.AgentCard"
      required:
        - object
        - id
        - name
        - versions
    PagedAgentDetails:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AgentDetails"
        nextLink:
          type: string
    PagedAgentVersionDetails:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AgentVersionDetails"
        nextLink:
          type: string
    VersionIndicator:
      type: object
      description: "Version indicator determining which agent version backs the session. You probably want to use the sub-classes and not this class directly. Known sub-classes are: VersionRefIndicator"
      properties:
        type:
          type: string
          description: The type of version indicator. Required. "version_ref"
      required:
        - type
    AgentSessionStatus:
      type: string
      enum:
        - creating
        - active
        - idle
        - updating
        - failed
        - deleting
        - deleted
        - expired
    AgentSessionResource:
      type: object
      description: An agent session providing a long-lived compute sandbox for hosted agent invocations.
      properties:
        agent_session_id:
          type: string
          description: The session identifier. Required.
        version_indicator:
          $ref: "#/components/schemas/VersionIndicator"
          description: The version indicator determining which agent version backs this session. Required.
        status:
          $ref: "#/components/schemas/AgentSessionStatus"
          description: 'The current status of the session. Required. Known values are: "creating", "active", "idle", "updating", "failed", "deleting", "deleted", and "expired".'
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) when the session was created. Required.
        last_accessed_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) when the session was last accessed. Required.
        expires_at:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) when the session expires (rolling, 30 days from last activity). Required.
      required:
        - agent_session_id
        - version_indicator
        - status
    PagedAgentSessionResource:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AgentSessionResource"
        nextLink:
          type: string
    SessionDirectoryEntry:
      type: object
      description: A single entry in a directory listing.
      properties:
        name:
          type: string
          description: The name of the file or directory. Required.
        size:
          type: integer
          description: The size in bytes (0 for directories). Required.
        is_directory:
          type: boolean
          description: Whether this entry is a directory. Required.
        modified_time:
          type: string
          format: date-time
          description: The Unix timestamp (in seconds) when the file was last modified. Required.
      required:
        - name
        - size
        - is_directory
        - modified_time
    PagedSessionDirectoryEntry:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/SessionDirectoryEntry"
        nextLink:
          type: string
    SessionLogEventType:
      type: string
      enum:
        - log
    SessionLogEvent:
      type: object
      description: 'A single Server-Sent Event frame emitted by the hosted agent session log stream. Each frame contains an `event` field identifying the event type and a `data` field carrying the payload as plain text. Although the current `data` payload is JSON-formatted, its schema is not contractual — additional keys may appear and the format may change over time. Clients should treat `data` as an opaque string and optionally attempt JSON parsing. New event types may be added in the future. Clients should gracefully ignore unrecognized event types. Wire format: .. code-block:: event: log data: {"timestamp":"2026-03-10T09:33:17.121Z","stream":"stdout","message":"Starting server on port 18080"} event: log data: {"timestamp":"2026-03-10T09:34:52.714Z","stream":"status","message":"Successfully connected to container"}'
      properties:
        event:
          $ref: "#/components/schemas/SessionLogEventType"
          description: The SSE event type. Currently `log`, but additional event types may be added in the future. Clients should ignore unrecognized event types. Required. "log"
        data:
          type: string
          description: The event payload as plain text. Currently JSON-formatted but the schema is not contractual and may change. Required.
      required:
        - event
        - data
    DeleteAgentResponse:
      type: object
      description: A deleted agent Object.
      properties:
        object:
          type: string
          description: The object type. Always 'agent.deleted'. Required. AGENT_DELETED.
        name:
          type: string
          description: The name of the agent. Required.
        deleted:
          type: boolean
          description: Whether the agent was successfully deleted. Required.
      required:
        - object
        - name
        - deleted
    DeleteAgentVersionResponse:
      type: object
      description: A deleted agent version Object.
      properties:
        object:
          type: string
          description: The object type. Always 'agent.version.deleted'. Required. AGENT_VERSION_DELETED.
        name:
          type: string
          description: The name of the agent. Required.
        version:
          type: string
          description: The version identifier of the agent. Required.
        deleted:
          type: boolean
          description: Whether the agent was successfully deleted. Required.
      required:
        - object
        - name
        - version
        - deleted
    SessionFileWriteResult:
      type: object
      description: Response from uploading a file to a session sandbox.
      properties:
        path:
          type: string
          description: The path where the file was written, relative to the session home directory. Required.
        bytes_written:
          type: integer
          description: Number of bytes written. Required.
      required:
        - path
        - bytes_written
    JobStatus:
      type: string
      enum:
        - queued
        - in_progress
        - succeeded
        - failed
        - cancelled
    ApiError:
      type: object
      description: ApiError.
      properties:
        code:
          type: string
          description: Required.
        message:
          type: string
          description: Required.
        param:
          type: string
          description: ":vartype param: str"
        type:
          type: string
          description: ":vartype type: str"
        details:
          type: array
          items:
            $ref: "#/components/schemas/ApiError"
          description: ":vartype details: list[~azure.ai.projects.models.ApiError]"
        additionalInfo:
          type: object
          properties: {}
          description: ":vartype additional_info: dict[str, any]"
        debugInfo:
          type: object
          properties: {}
          description: ":vartype debug_info: dict[str, any]"
      required:
        - code
        - message
    OptimizationJobProgress:
      type: object
      description: In-flight progress; only populated while status is queued or in_progress.
      properties:
        candidates_completed:
          type: integer
          description: Number of candidates whose evaluation has completed so far. Required.
        best_score:
          type: number
          description: Best score observed so far across all candidates. Required.
        elapsed_seconds:
          type: number
          description: Wall-clock time elapsed in seconds since the job began executing. Required.
      required:
        - candidates_completed
        - best_score
        - elapsed_seconds
    OptimizationAgentIdentifier:
      type: object
      description: Identifies the registered Foundry agent to optimize (request-only). Skills, tools, and system_prompt are specified in options.optimization_config.
      properties:
        agent_name:
          type: string
          description: Registered Foundry agent name (required). Required.
        agent_version:
          type: string
          description: Pinned agent version. Defaults to latest if omitted.
      required:
        - agent_name
    OptimizationJobListItem:
      type: object
      description: Slim job representation returned by the LIST endpoint.
      properties:
        id:
          type: string
          description: Server-assigned unique identifier. Required.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: 'Current lifecycle status. Required. Known values are: "queued", "in_progress", "succeeded", "failed", and "cancelled".'
        error:
          $ref: "#/components/schemas/ApiError"
          description: Error details — populated only on failure.
        created_at:
          type: string
          format: date-time
          description: The timestamp when the job was created, represented in Unix time. Required.
        updated_at:
          type: string
          format: date-time
          description: The timestamp when the job was last updated, represented in Unix time. Required.
        progress:
          $ref: "#/components/schemas/OptimizationJobProgress"
          description: Progress snapshot. May be present in terminal states reflecting last-known progress.
        agent:
          $ref: "#/components/schemas/OptimizationAgentIdentifier"
          description: The agent targeted by this optimization job.
    PagedOptimizationJobListItem:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/OptimizationJobListItem"
        nextLink:
          type: string
    OptimizationJobInputs:
      type: object
      description: Caller-supplied inputs for an optimization job.
      properties:
        agent:
          $ref: "#/components/schemas/OptimizationAgentIdentifier"
          description: The agent (and pinned version) being optimized. Required.
        train_dataset:
          $ref: "#/components/schemas/OptimizationDatasetInput"
          description: Training dataset — either inline items or a reference to a registered dataset. Required. Required.
        validation_dataset:
          $ref: "#/components/schemas/OptimizationDatasetInput"
          description: Optional held-out validation dataset for measuring generalization of the final candidate.
        evaluators:
          type: array
          items:
            $ref: "#/components/schemas/OptimizationEvaluatorRef"
          description: Job-level evaluators referenced by name and optional version. Required; at least one must be provided. Required.
        options:
          $ref: "#/components/schemas/OptimizationOptions"
          description: Tuning knobs and run-mode.
      required:
        - agent
        - train_dataset
        - evaluators
    OptimizationDatasetInput:
      type: object
      description: "Base discriminated model for dataset input. Either inline items or a registered reference. You probably want to use the sub-classes and not this class directly. Known sub-classes are: OptimizationInlineDatasetInput, OptimizationReferenceDatasetInput"
      properties:
        type:
          type: string
          description: 'Dataset input type discriminator. Required. Known values are: "inline" and "reference".'
      required:
        - type
    OptimizationEvaluatorRef:
      type: object
      description: Reference to a named evaluator, optionally pinned to a version.
      properties:
        name:
          type: string
          description: Evaluator name. Required.
        version:
          type: string
          description: Evaluator version. If not specified, the latest version is used.
      required:
        - name
    OptimizationOptions:
      type: object
      description: Tuning knobs and run-mode for an optimization job.
      properties:
        max_candidates:
          type: integer
          description: "Maximum number of optimization candidates to generate. Must be >= 1. Default: 5."
        optimization_config:
          type: object
          properties: {}
          description: Per-target-attribute configuration overrides. Contains skills, tools, system_prompt for the agent, plus model space for model optimization.
        eval_model:
          type: string
          description: Model deployment used for evaluation. Defaults to server config (typically 'gpt-4o').
        optimization_model:
          type: string
          description: Model deployment for optimization reasoning (must be gpt-5 family). Falls back to the default eval model when not set.
        evaluation_level:
          $ref: "#/components/schemas/EvaluationLevel"
          description: "Evaluation granularity. Null/omitted means per-item single-turn. Set to 'conversation' for per-conversation multi-turn simulation scoring. Known values are: \"turn\" and \"conversation\"."
    EvaluationLevel:
      type: string
      enum:
        - turn
        - conversation
    OptimizationJobResult:
      type: object
      description: Terminal-state result body. Populated when status is succeeded or failed.
      properties:
        baseline:
          type: string
          description: Candidate ID of the original (un-optimized) baseline evaluation.
        best:
          type: string
          description: Candidate ID of the highest-scoring candidate found during optimization.
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/OptimizationCandidate"
          description: All evaluated candidates including baseline.
    OptimizationCandidate:
      type: object
      description: Aggregated evaluation result for a single candidate agent configuration across all tasks.
      properties:
        candidate_id:
          type: string
          description: Server-assigned candidate identifier. Use with GET /candidates/{id} sub-endpoints.
        name:
          type: string
          description: Display name of the candidate (e.g., 'baseline', 'instruction-v2'). Required.
        mutations:
          type: object
          properties: {}
          description: "What was mutated from the baseline (e.g., {system_prompt: 'new prompt'})."
        avg_score:
          type: number
          description: Average composite score across all tasks. Required.
        avg_tokens:
          type: number
          description: Average token usage across all tasks. Required.
        eval_id:
          type: string
          description: Foundry evaluation identifier used to score this candidate.
        eval_run_id:
          type: string
          description: Foundry evaluation run identifier for this candidate's scoring run.
        promotion:
          $ref: "#/components/schemas/PromotionInfo"
          description: Promotion metadata. Null if the candidate has not been promoted.
      required:
        - name
        - avg_score
        - avg_tokens
    PromotionInfo:
      type: object
      description: Promotion metadata recorded when a candidate is deployed to a Foundry agent.
      properties:
        promoted_at:
          type: string
          format: date-time
          description: Timestamp when promotion occurred, represented in Unix time. Required.
        agent_name:
          type: string
          description: Name of the Foundry agent this candidate was promoted to. Required.
        agent_version:
          type: string
          description: Version of the Foundry agent this candidate was promoted to. Required.
      required:
        - promoted_at
        - agent_name
        - agent_version
    OptimizationJob:
      type: object
      description: Agent optimization job resource — a long-running job that optimizes an agent's configuration (instructions, model, skills, tools) to maximize evaluation scores. On success, the result contains scored candidates.
      properties:
        id:
          type: string
          description: Server-assigned unique identifier. Required.
        inputs:
          $ref: "#/components/schemas/OptimizationJobInputs"
          description: Caller-supplied inputs.
        result:
          $ref: "#/components/schemas/OptimizationJobResult"
          description: Result produced on success.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: 'Current lifecycle status. Required. Known values are: "queued", "in_progress", "succeeded", "failed", and "cancelled".'
        error:
          $ref: "#/components/schemas/ApiError"
          description: Error details — populated only on failure.
        created_at:
          type: string
          format: date-time
          description: The timestamp when the job was created, represented in Unix time. Required.
        updated_at:
          type: string
          format: date-time
          description: The timestamp when the job was last updated, represented in Unix time. Required.
        progress:
          $ref: "#/components/schemas/OptimizationJobProgress"
          description: Progress snapshot. May be present in terminal states reflecting last-known progress.
        warnings:
          type: array
          items:
            type: string
          description: Non-fatal warnings emitted at any point during optimization.
    DataGenerationJobInputs:
      type: object
      description: Caller-supplied inputs for a data generation job.
      properties:
        name:
          type: string
          description: The display name of the data generation job. Required.
        sources:
          type: array
          items:
            $ref: "#/components/schemas/DataGenerationJobSource"
          description: The sources used for the data generation job. Required.
        options:
          $ref: "#/components/schemas/DataGenerationJobOptions"
          description: The options for the data generation job. Required.
        scenario:
          $ref: "#/components/schemas/DataGenerationJobScenario"
          description: 'The scenario of the data generation job. Either for fine-tuning or evaluation. Required. Known values are: "supervised_finetuning", "reinforcement_finetuning", and "evaluation".'
        output_options:
          $ref: "#/components/schemas/DataGenerationJobOutputOptions"
          description: Optional caller-supplied metadata for the job's output. See individual fields for whether they apply to file outputs (fine-tuning scenarios), dataset outputs (evaluation scenario), or both.
      required:
        - name
        - sources
        - options
        - scenario
