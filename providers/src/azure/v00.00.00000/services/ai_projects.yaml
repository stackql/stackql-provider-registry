  /agents/{agent_name}/versions/{agent_version}/sessions/{session_id}:logstream?api-version=v1:
    get:
      operationId: Agents_get_session_log_stream
      description: 'Stream console logs for a hosted agent session. Streams console logs (stdout / stderr) for a specific hosted agent session as a Server-Sent Events (SSE) stream. Each SSE frame contains: * `event`: always `"log"` * `data`: a plain-text log line (currently JSON-formatted, but the schema is not contractual and may include additional keys or change format over time; clients should treat it as an opaque string) Example SSE frames: .. code-block:: event: log data: {"timestamp":"2026-03-10T09:33:17.121Z","stream":"stdout","message":"Starting FoundryCBAgent server on port 8088"} event: log data: {"timestamp":"2026-03-10T09:33:17.130Z","stream":"stderr","message":"INFO: Application startup complete."} event: log data: {"timestamp":"2026-03-10T09:34:52.714Z","stream":"status","message":"Successfully connected to container"} event: log data: {"timestamp":"2026-03-10T09:35:52.714Z","stream":"status","message":"No logs since last 60 seconds"} The stream remains open until the client disconnects or the server terminates the connection. Clients should handle reconnection as needed.'
      parameters:
        - name: agent_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the hosted agent. Required.
        - name: agent_version
          in: path
          required: true
          schema:
            type: string
          description: The version of the agent. Required.
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          description: The session ID (maps to an ADC sandbox). Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLogEvent"
