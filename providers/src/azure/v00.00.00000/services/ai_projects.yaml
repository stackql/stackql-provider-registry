    put:
      operationId: EvaluationRules_create_or_update
      description: Create or update an evaluation rule. Creates a new evaluation rule, or replaces the existing rule when the identifier matches.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier for the evaluation rule. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  description: Display Name for the evaluation rule.
