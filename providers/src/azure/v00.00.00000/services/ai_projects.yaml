      description: "An abstract representation of a tool stored in a toolbox. You probably want to use the sub-classes and not this class directly. Known sub-classes are: A2APreviewToolboxTool, AzureAISearchToolboxTool, BrowserAutomationPreviewToolboxTool, CodeInterpreterToolboxTool, FabricIQPreviewToolboxTool, FileSearchToolboxTool, MCPToolboxTool, OpenApiToolboxTool, ReminderPreviewToolboxTool, ToolboxSearchPreviewToolboxTool, WebSearchToolboxTool, WorkIQPreviewToolboxTool"
      properties:
        type:
          type: string
          description: 'The type of tool. Required. Known values are: "code_interpreter", "file_search", "web_search", "mcp", "azure_ai_search", "openapi", "a2a_preview", "browser_automation_preview", "reminder_preview", "work_iq_preview", "fabric_iq_preview", and "toolbox_search_preview".'
        name:
          type: string
          description: Optional user-defined name for this tool or configuration.
        description:
          type: string
          description: Optional user-defined description for this tool or configuration.
        tool_configs:
          type: object
          properties: {}
          description: "Per-tool configuration map. Keys are tool names or `*` (catch-all default). Resolution order: exact tool name match takes priority over `*`. Unknown tool names are silently ignored at runtime."
      required:
        - type
    ToolboxSkill:
      type: object
      description: "A skill source included in a toolbox. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ToolboxSkillReference"
      properties:
        type:
          type: string
          description: The type of skill source. Required. Default value is None.
      required:
        - type
    ToolboxPolicies:
      type: object
      description: Policy configuration for a toolbox, including content safety and other governance settings.
      properties:
        rai_config:
          $ref: "#/components/schemas/RaiConfig"
          description: Responsible AI content filtering configuration.
    ToolboxVersionObject:
      type: object
      description: A specific version of a toolbox.
      properties:
        metadata:
          type: object
          properties: {}
          description: Set of 16 key-value pairs that can be attached to an object. This can be useful for storing additional information about the object in a structured format, and querying for objects via API or the dashboard. Keys are strings with a maximum length of 64 characters. Values are strings with a maximum length of 512 characters. Required.
        id:
          type: string
          description: The unique identifier of the toolbox version. Required.
        name:
          type: string
          description: The name of the toolbox. Required.
        version:
          type: string
          description: The version identifier of the toolbox. Toolbox versions are immutable and every update creates a new version. Required.
        description:
          type: string
          description: A human-readable description of the toolbox.
        created_at:
          type: string
          format: date-time
          description: The Unix timestamp (seconds) when the toolbox version was created. Required.
        tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolboxTool"
          description: The list of tools contained in this toolbox version. Required.
        skills:
          type: array
          items:
            $ref: "#/components/schemas/ToolboxSkill"
          description: The list of skill sources included in this toolbox version.
        policies:
          $ref: "#/components/schemas/ToolboxPolicies"
          description: Policy configuration for the toolbox version.
      required:
        - metadata
        - id
        - name
        - version
        - created_at
        - tools
    PagedToolboxVersionObject:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ToolboxVersionObject"
        nextLink:
          type: string
