paths:
  /agents/{agent_name}?api-version=v1:
    get:
      operationId: Agents_get
      description: Get an agent. Retrieves an agent definition by its unique name.
      parameters:
        - name: agent_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the agent to retrieve. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetails"
    delete:
      operationId: Agents_delete
      description: Delete an agent. Deletes an agent. For hosted agents, if any version has active sessions, the request is rejected with HTTP 409 unless `force` is set to true. When force is true, all associated sessions are cascade-deleted along with the agent and its versions.
      parameters:
        - name: agent_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the agent to delete. Required.
        - name: force
          in: query
          required: false
          schema:
            type: boolean
          description: For Hosted Agents, if `true`, force-deletes the agent even if its versions have active sessions, cascading deletion to all associated sessions. The service defaults to `false` if a value is not specified by the caller. This value is not relevant for other Agent types. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAgentResponse"
    patch:
      operationId: Agents_update_details
      description: Update an agent endpoint. Applies a merge-patch update to the specified agent endpoint configuration.
      parameters:
        - name: agent_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the agent to retrieve. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetails"
  /agents?api-version=v1:
    get:
      operationId: Agents_list
      description: List agents. Returns a paged collection of agent resources.
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
          description: 'Filter agents by kind. If not provided, all agents are returned. Known values are: "prompt", "hosted", "workflow", and "external". Default value is None.'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 20. Default value is None.
        - name: order
          in: query
          required: false
          schema:
            type: string
          description: 'Sort order by the `created_at` timestamp of the objects. `asc` for ascending order and`desc` for descending order. Known values are: "asc" and "desc". Default value is None.'
        - name: after
          in: query
          required: false
          schema:
            type: string
        - name: before
          in: query
          required: false
          schema:
            type: string
          description: A cursor for use in pagination. `before` is an object ID that defines your place in the list. For instance, if you make a list request and receive 100 objects, ending with obj_foo, your subsequent call can include before=obj_foo in order to fetch the previous page of the list. Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedAgentDetails"
  /agents/{agent_name}/versions?api-version=v1:
    get:
      operationId: Agents_list_versions
      description: List agent versions. Returns a paged collection of versions for the specified agent.
      parameters:
        - name: agent_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the agent to retrieve versions for. Required.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 20. Default value is None.
        - name: order
          in: query
          required: false
          schema:
            type: string
          description: 'Sort order by the `created_at` timestamp of the objects. `asc` for ascending order and`desc` for descending order. Known values are: "asc" and "desc". Default value is None.'
        - name: after
          in: query
          required: false
          schema:
            type: string
        - name: before
          in: query
          required: false
          schema:
            type: string
          description: A cursor for use in pagination. `before` is an object ID that defines your place in the list. For instance, if you make a list request and receive 100 objects, ending with obj_foo, your subsequent call can include before=obj_foo in order to fetch the previous page of the list. Default value is None.
        - name: include_drafts
          in: query
          required: false
          schema:
            type: boolean
          description: (Preview) Whether to include draft versions in the listing. The service defaults to `false` if a value is not specified by the caller (only non-draft versions are returned). Default value is None.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedAgentVersionDetails"
    post:
      operationId: Agents_create_version
      description: Create an agent version. Creates a new version for the specified agent and returns the created version resource.
      parameters:
        - name: agent_name
          in: path
          required: true
          schema:
            type: string
          description: The unique name that identifies the agent. Name can be used to retrieve/update/delete the agent. * Must start and end with alphanumeric characters, * Can contain hyphens in the middle * Must not exceed 63 characters. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersionDetails"
  /agents/{agent_name}/endpoint/sessions?api-version=v1:
    get:
      operationId: Agents_list_sessions
      description: List sessions for an agent. Returns a paged collection of sessions associated with the specified agent endpoint.
      parameters:
        - name: agent_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the agent. Required.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 20. Default value is None.
        - name: order
          in: query
