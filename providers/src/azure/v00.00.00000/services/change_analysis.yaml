      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ChangeProperties:
      type: object
      description: The properties of a change.
      properties:
        resourceId:
          type: string
          description: The resource id that the change is attached to.
        timeStamp:
          type: string
          format: date-time
          description: The time when the change is detected.
        initiatedByList:
          type: array
          items:
            type: string
          description: The list of identities who might initiated the change. The identity could be user name (email address) or the object ID of the Service Principal.
        changeType:
          type: string
          description: 'The type of the change. Known values are: "Add", "Remove", and "Update".'
        propertyChanges:
          type: array
          items:
            $ref: "#/components/schemas/PropertyChange"
          description: The list of detailed changes at json property level.
    PropertyChange:
      type: object
      description: Data of a property change.
      properties:
        changeType:
          type: string
          description: 'The type of the change. Known values are: "Add", "Remove", and "Update".'
        changeCategory:
          type: string
          description: 'The change category. Known values are: "User" and "System".'
        jsonPath:
          type: string
          description: The json path of the changed property.
        displayName:
          type: string
          description: The enhanced display name of the json path. E.g., the json path value[0].properties will be translated to something meaningful like slots["Staging"].properties.
        level:
          type: string
          description: 'Known values are: "Noisy", "Normal", and "Important".'
        description:
          type: string
          description: The description of the changed property.
        oldValue:
          type: string
          description: The value of the property before the change.
        newValue:
          type: string
          description: The value of the property after the change.
        isDataMasked:
          type: boolean
          description: The boolean indicating whether the oldValue and newValue are masked. The values are masked if it contains sensitive information that the user doesn't have access to.
    ChangeFlattened:
      type: object
      description: Flattened view of Change ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        resourceId:
          type: string
          description: The resource id that the change is attached to.
        timeStamp:
          type: string
          format: date-time
          description: The time when the change is detected.
        initiatedByList:
          type: array
          items:
            type: string
          description: The list of identities who might initiated the change. The identity could be user name (email address) or the object ID of the Service Principal.
        changeType:
          type: string
          description: 'The type of the change. Known values are: "Add", "Remove", and "Update".'
        propertyChanges:
          type: array
          items:
            $ref: "#/components/schemas/PropertyChange"
          description: The list of detailed changes at json property level.
    PagedChangeFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ChangeFlattened"
        nextLink:
          type: string
    ResourceProviderOperationDisplay:
      type: object
      description: The resource provider operation details.
      properties:
        provider:
          type: string
          description: Name of the resource provider.
        resource:
          type: string
          description: Name of the resource type.
        operation:
          type: string
          description: Name of the resource provider operation.
        description:
          type: string
          description: Description of the resource provider operation.
    ResourceProviderOperationDefinition:
      type: object
      description: The resource provider operation definition.
      properties:
        name:
          type: string
          description: The resource provider operation name.
        display:
