          description: Alert configuration for this entity.
    EntityCoordinates:
      type: object
      description: Visual position of the entity.
      properties:
        x:
          type: number
          description: X Coordinate. Required.
        "y":
          type: number
          description: Y Coordinate. Required.
      required:
