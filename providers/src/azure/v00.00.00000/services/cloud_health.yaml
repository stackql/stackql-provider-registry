    LogAnalyticsSignal:
      type: object
      description: A Log Analytics Query signal instance assigned to an entity.
      properties:
        signalKind:
          type: string
          description: Kind of the signal instance. Required. LOG_ANALYTICS_QUERY.
        name:
          type: string
          description: Unique name of the signal within the entity. Required.
        signalDefinitionName:
          type: string
          description: Optional reference to a signal definition that provides default values.
        status:
          $ref: "#/components/schemas/SignalStatus"
          description: Current status of the signal.
        queryText:
          type: string
          description: Query text in KQL syntax.
        timeGrain:
          type: string
          description: Time range of signal. ISO duration format like PT10M. If not specified, the KQL query must define a time range.
        valueColumnName:
          type: string
          description: Name of the column in the result set to evaluate against the thresholds. Defaults to the first column in the result set if not specified. The column must be numeric.
        displayName:
          type: string
          description: Display name.
        refreshInterval:
          $ref: "#/components/schemas/RefreshInterval"
          description: 'Interval in which the signal is being evaluated. Defaults to PT1M (1 minute). Known values are: "PT1M", "PT5M", "PT10M", "PT30M", "PT1H", and "PT2H".'
        dataUnit:
          type: string
          description: Unit of the signal result (e.g. Bytes, MilliSeconds, Percent, Count)).
        evaluationRules:
          $ref: "#/components/schemas/EvaluationRule"
          description: Evaluation rules for the signal definition.
      required:
        - signalKind
        - name
    AzureMonitorWorkspaceSignals:
      type: object
      description: A grouping of Azure Monitor workspace signals.
      properties:
        authenticationSetting:
          type: string
          description: Reference to the name of the authentication setting which is used for querying the data source. Required.
        azureMonitorWorkspaceResourceId:
          type: string
          description: Azure Monitor workspace resource ID. Required.
        signals:
          type: array
          items:
            $ref: "#/components/schemas/PrometheusMetricsSignal"
          description: Signals assigned to this signal group.
      required:
        - authenticationSetting
        - azureMonitorWorkspaceResourceId
    PrometheusMetricsSignal:
      type: object
      description: A Prometheus Metrics Query signal instance assigned to an entity.
      properties:
        signalKind:
          type: string
          description: Kind of the signal instance. Required. PROMETHEUS_METRICS_QUERY.
        name:
          type: string
          description: Unique name of the signal within the entity. Required.
        signalDefinitionName:
          type: string
          description: Optional reference to a signal definition that provides default values.
        status:
          $ref: "#/components/schemas/SignalStatus"
          description: Current status of the signal.
        queryText:
          type: string
          description: Query text in PromQL syntax.
        timeGrain:
          type: string
          description: Time range of signal. ISO duration format like PT10M.
        displayName:
          type: string
          description: Display name.
        refreshInterval:
          $ref: "#/components/schemas/RefreshInterval"
          description: 'Interval in which the signal is being evaluated. Defaults to PT1M (1 minute). Known values are: "PT1M", "PT5M", "PT10M", "PT30M", "PT1H", and "PT2H".'
        dataUnit:
          type: string
          description: Unit of the signal result (e.g. Bytes, MilliSeconds, Percent, Count)).
        evaluationRules:
          $ref: "#/components/schemas/EvaluationRule"
          description: Evaluation rules for the signal definition.
      required:
        - signalKind
        - name
    DependenciesSignalGroupV2:
      type: object
      description: Properties for dependent entities, i.e. child entities.
      properties:
        aggregationType:
          $ref: "#/components/schemas/DependenciesAggregationType"
          description: 'Aggregation type for child dependencies. Required. Known values are: "WorstOf", "MinHealthy", and "MaxNotHealthy".'
        degradedThreshold:
          type: number
          description: "Degraded threshold for aggregation. For MinHealthy: parent is degraded when healthy count/percentage falls to or below this value. For MaxNotHealthy: parent is degraded when not-healthy count/percentage reaches or exceeds this value. Optional — if not set, there is no degraded state (transitions directly from Healthy to Unhealthy)."
        unhealthyThreshold:
          type: number
          description: "Unhealthy threshold for aggregation. For MinHealthy: parent is unhealthy when healthy count/percentage falls to or below this value. For MaxNotHealthy: parent is unhealthy when not-healthy count/percentage reaches or exceeds this value. Required when aggregationType is MinHealthy or MaxNotHealthy."
        unit:
          $ref: "#/components/schemas/DependenciesAggregationUnit"
          description: 'Unit type for the aggregation thresholds. Required when aggregationType is MinHealthy or MaxNotHealthy. Known values are: "Absolute" and "Percentage".'
        ignoreUnknown:
          type: boolean
          description: If true, children with Unknown health state are excluded from aggregation calculations. Defaults to true.
      required:
        - aggregationType
    DependenciesAggregationType:
      type: string
      enum:
        - WorstOf
        - MinHealthy
        - MaxNotHealthy
    DependenciesAggregationUnit:
      type: string
      enum:
        - Absolute
        - Percentage
    ExternalSignalGroup:
      type: object
      description: A grouping of externally submitted signals.
      properties:
        signals:
          type: array
          items:
            $ref: "#/components/schemas/ExternalSignal"
          description: Signals assigned to this signal group.
    ExternalSignal:
      type: object
      description: An externally submitted signal instance assigned to an entity.
      properties:
        signalKind:
          type: string
          description: Kind of the signal instance. Required. EXTERNAL_SIGNAL.
        name:
          type: string
          description: Unique name of the signal within the entity. Required.
        signalDefinitionName:
