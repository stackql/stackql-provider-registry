openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Monitor Health Models
  description: Entity-based health models for workloads (Microsoft.CloudHealth).
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-01-01-preview-stackql-generated
  x-serviceAlias: cloud_health
  x-sdkPackage: azure-mgmt-cloudhealth
  x-plane: mgmt
security:
