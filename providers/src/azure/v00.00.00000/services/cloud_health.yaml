        - Limited
        - Suppressed
    SignalGroups:
      type: object
      description: Contains various signal groups that can be assigned to an entity.
      properties:
        azureResource:
          $ref: "#/components/schemas/AzureResourceSignals"
          description: Azure Resource Signal Group.
        azureLogAnalytics:
          $ref: "#/components/schemas/LogAnalyticsSignals"
