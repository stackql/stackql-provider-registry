        - "y"
    IconDefinition:
      type: object
      description: Visual icon definition of an entity.
      properties:
        iconName:
          type: string
          description: Name of the built-in icon, or 'Custom' to use customData. Required.
        customData:
          type: string
          description: Custom data. Base64-encoded SVG data. If set, this overrides the built-in icon.
