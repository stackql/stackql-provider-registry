      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        provisioningState:
          $ref: "#/components/schemas/HealthModelProvisioningState"
          description: 'The status of the last operation. Known values are: "Succeeded", "Failed", "Canceled", "Creating", and "Deleting".'
        displayName:
          type: string
          description: Display name.
        authenticationSetting:
          type: string
          description: Reference to the name of the authentication setting which is used for querying Azure Resource Graph. The same authentication setting will also be assigned to any discovered entities. Required.
        discoverRelationships:
          $ref: "#/components/schemas/DiscoveryRuleRelationshipDiscoveryBehavior"
          description: 'Whether to create relationships between the discovered entities based on a set of built-in rules. These relationships cannot be manually deleted. Required. Known values are: "Enabled" and "Disabled".'
        addRecommendedSignals:
          $ref: "#/components/schemas/DiscoveryRuleRecommendedSignalsBehavior"
          description: 'Whether to add all recommended signals to the discovered entities. Required. Known values are: "Enabled" and "Disabled".'
        specification:
          $ref: "#/components/schemas/DiscoveryRuleSpecification"
          description: Specification of the discovery rule defining how entities are discovered. Required.
        error:
          $ref: "#/components/schemas/DiscoveryError"
          description: Error details if the last discovery operation failed.
        entityName:
          type: string
          description: "Name of the entity which represents the discovery rule. Note: It might take a few minutes after creating the discovery rule until the entity is created. Required."
    PagedDiscoveryRuleFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryRuleFlattened"
        nextLink:
          type: string
    DiscoveryRule:
      type: object
      description: A discovery rule which automatically finds entities and relationships in a health model based on an Azure Resource Graph query.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/DiscoveryRuleProperties"
          description: The resource-specific properties for this resource.
    EntityProperties:
      type: object
      description: Properties which are common across all kinds of entities.
      properties:
        provisioningState:
          $ref: "#/components/schemas/HealthModelProvisioningState"
          description: 'The status of the last operation. Known values are: "Succeeded", "Failed", "Canceled", "Creating", and "Deleting".'
        displayName:
          type: string
          description: Display name.
        canvasPosition:
          $ref: "#/components/schemas/EntityCoordinates"
          description: Positioning of the entity on the model canvas.
        icon:
          $ref: "#/components/schemas/IconDefinition"
          description: Visual icon definition. If not set, a default icon is used.
        healthObjective:
          type: number
          description: Health objective as a percentage of time the entity should be healthy.
        impact:
          $ref: "#/components/schemas/EntityImpact"
          description: 'Impact of the entity in health state propagation. Known values are: "Standard", "Limited", and "Suppressed".'
        tags:
          type: object
          properties: {}
          description: Optional set of tags (key-value pairs).
        signalGroups:
          $ref: "#/components/schemas/SignalGroups"
          description: Signal groups which are assigned to this entity.
        discoveredBy:
          type: string
          description: Discovered by which discovery rule. If set, the entity cannot be deleted manually.
        healthState:
          $ref: "#/components/schemas/HealthState"
          description: 'Health state of this entity. Known values are: "Healthy", "Degraded", "Unhealthy", "Unknown", and "Deleted".'
        alerts:
