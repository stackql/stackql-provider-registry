      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    AuthenticationSettingProperties:
      type: object
      description: "Authentication setting properties. You probably want to use the sub-classes and not this class directly. Known sub-classes are: ManagedIdentityAuthenticationSettingProperties"
      properties:
        provisioningState:
          $ref: "#/components/schemas/HealthModelProvisioningState"
          description: 'The status of the last operation. Known values are: "Succeeded", "Failed", "Canceled", "Creating", and "Deleting".'
        displayName:
          type: string
          description: Display name.
        authenticationKind:
          type: string
          description: Kind of the authentication setting. Required. "ManagedIdentity"
      required:
        - authenticationKind
    HealthModelProvisioningState:
      type: string
      enum:
        - Succeeded
        - Failed
        - Canceled
        - Creating
        - Deleting
    AuthenticationSettingFlattened:
      type: object
      description: Flattened view of AuthenticationSetting ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        provisioningState:
          $ref: "#/components/schemas/HealthModelProvisioningState"
          description: 'The status of the last operation. Known values are: "Succeeded", "Failed", "Canceled", "Creating", and "Deleting".'
        displayName:
          type: string
          description: Display name.
        authenticationKind:
          type: string
          description: Kind of the authentication setting. Required. "ManagedIdentity"
    PagedAuthenticationSettingFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/AuthenticationSettingFlattened"
        nextLink:
          type: string
    AuthenticationSetting:
      type: object
      description: An authentication setting in a health model.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
