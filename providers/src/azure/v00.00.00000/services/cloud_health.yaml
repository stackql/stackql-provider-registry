      type: object
      description: An Azure Resource Metric signal instance assigned to an entity.
      properties:
        signalKind:
          type: string
          description: Kind of the signal instance. Required. AZURE_RESOURCE_METRIC.
        name:
          type: string
          description: Unique name of the signal within the entity. Required.
        signalDefinitionName:
          type: string
          description: Optional reference to a signal definition that provides default values.
        status:
          $ref: "#/components/schemas/SignalStatus"
          description: Current status of the signal.
        metricNamespace:
          type: string
          description: Metric namespace.
        metricName:
          type: string
          description: Name of the metric.
        timeGrain:
          type: string
          description: Time range of signal. ISO duration format like PT10M.
        aggregationType:
          $ref: "#/components/schemas/MetricAggregationType"
          description: 'Type of aggregation to apply to the metric. Known values are: "None", "Average", "Count", "Minimum", "Maximum", and "Total".'
        dimension:
          type: string
          description: "Optional: Dimension to split by."
        dimensionFilter:
          type: string
          description: "Optional: Dimension filter to apply to the dimension. Must only be set if also Dimension is set."
        displayName:
          type: string
          description: Display name.
        refreshInterval:
          $ref: "#/components/schemas/RefreshInterval"
          description: 'Interval in which the signal is being evaluated. Defaults to PT1M (1 minute). Known values are: "PT1M", "PT5M", "PT10M", "PT30M", "PT1H", and "PT2H".'
        dataUnit:
          type: string
          description: Unit of the signal result (e.g. Bytes, MilliSeconds, Percent, Count)).
        evaluationRules:
          $ref: "#/components/schemas/EvaluationRule"
          description: Evaluation rules for the signal definition.
      required:
        - signalKind
        - name
    SignalStatus:
      type: object
      description: Status of a signal.
      properties:
        healthState:
          $ref: "#/components/schemas/HealthState"
          description: 'Health state of this signal. Known values are: "Healthy", "Degraded", "Unhealthy", "Unknown", and "Deleted".'
        value:
          type: number
          description: Reported value of the signal.
        reportedAt:
          type: string
          format: date-time
          description: Timestamp when the value was reported.
        error:
          type: string
          description: Error message if the signal status cannot be retrieved.
    HealthState:
      type: string
      enum:
        - Healthy
        - Degraded
        - Unhealthy
        - Unknown
        - Deleted
    MetricAggregationType:
      type: string
      enum:
        - None
        - Average
        - Count
        - Minimum
        - Maximum
        - Total
    RefreshInterval:
      type: string
      enum:
        - PT1M
        - PT5M
        - PT10M
        - PT30M
        - PT1H
        - PT2H
    EvaluationRule:
      type: object
      description: Evaluation rule for a signal definition.
      properties:
        degradedRule:
          $ref: "#/components/schemas/ThresholdRuleV2"
          description: Degraded rule with static threshold.
        unhealthyRule:
          $ref: "#/components/schemas/ThresholdRuleV2"
          description: Unhealthy rule with static threshold. Required.
      required:
        - unhealthyRule
    ThresholdRuleV2:
      type: object
      description: Threshold-based evaluation rule for a signal definition.
      properties:
        operator:
          $ref: "#/components/schemas/SignalOperator"
          description: 'Operator how to compare the signal value with the threshold. Required. Known values are: "GreaterThan", "LessThan", "LessThanOrEqual", "GreaterThanOrEqual", "Equal", and "NotEqual".'
        threshold:
          type: number
          description: Threshold value. Required.
      required:
        - operator
        - threshold
    SignalOperator:
      type: string
      enum:
        - GreaterThan
        - LessThan
        - LessThanOrEqual
        - GreaterThanOrEqual
        - Equal
        - NotEqual
    LogAnalyticsSignals:
      type: object
