openapi: 3.0.3
info:
  title: Anthropic Admin API - organization
  description: Organization info, organization members (users) and invites for the Anthropic Admin API.
  version: "2023-06-01"
servers:
  - url: https://api.anthropic.com
paths:
  /v1/organizations/me:
    get:
      operationId: organization_me
      summary: Get Current Organization
      description: Retrieve information about the organization associated with the authenticated Admin API key.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
  /v1/organizations/users:
    get:
      operationId: users_list
      summary: List Users
      description: List members of the organization.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: before_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately before this object.
          schema:
            type: string
        - name: after_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately after this object.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of items to return per page. Defaults to 20; ranges from 1 to 1000.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 1000
        - name: email
          in: query
          required: false
          description: Filter by user email.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
  /v1/organizations/users/{user_id}:
    get:
      operationId: users_get
      summary: Get User
      description: Get an organization member by ID.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: user_id
          in: path
          required: true
          description: ID of the User.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    post:
      operationId: users_update
      summary: Update User
      description: Update an organization member's role. The role cannot be set to `admin` via the API.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: user_id
          in: path
          required: true
          description: ID of the User.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum:
                    - billing
                    - claude_code_user
                    - developer
                    - user
                  description: New role for the User. Cannot be `admin`.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: users_delete
      summary: Remove User
      description: Remove a member from the organization. Members with the `admin` role cannot be removed via the API.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: user_id
          in: path
          required: true
          description: ID of the User.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID of the User.
                  type:
                    type: string
                    enum:
                      - user_deleted
                    description: Deleted object type. Always `user_deleted`.
  /v1/organizations/invites:
    get:
      operationId: invites_list
      summary: List Invites
      description: List pending and historical invites for the organization.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: before_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately before this object.
          schema:
            type: string
        - name: after_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately after this object.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of items to return per page. Defaults to 20; ranges from 1 to 1000.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteList"
    post:
      operationId: invites_create
      summary: Create Invite
      description: Invite a user to the organization. Invites expire after 21 days.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - role
              properties:
                email:
                  type: string
                  description: Email of the User.
                role:
                  type: string
                  enum:
                    - billing
                    - claude_code_user
                    - developer
                    - user
                  description: Role for the invited User. Cannot be `admin`.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
  /v1/organizations/invites/{invite_id}:
    get:
      operationId: invites_get
      summary: Get Invite
      description: Get an organization invite by ID.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: invite_id
          in: path
          required: true
          description: ID of the Invite.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
    delete:
      operationId: invites_delete
      summary: Delete Invite
      description: Delete an organization invite.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: invite_id
          in: path
          required: true
          description: ID of the Invite.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID of the Invite.
                  type:
                    type: string
                    enum:
                      - invite_deleted
                    description: Deleted object type. Always `invite_deleted`.
components:
  schemas:
    Organization:
      type: object
      description: An Anthropic organization.
      properties:
        id:
          type: string
          description: ID of the Organization.
        name:
          type: string
          description: Name of the Organization.
        type:
          type: string
          enum:
            - organization
          description: Object type. Always `organization`.
    User:
      type: object
      description: An organization member.
      properties:
        id:
          type: string
          description: ID of the User.
        added_at:
          type: string
          description: RFC 3339 datetime string indicating when the User joined the Organization.
        email:
          type: string
          description: Email of the User.
        name:
          type: string
          description: Name of the User.
        role:
          type: string
          enum:
            - admin
            - billing
            - claude_code_user
            - developer
            - user
          description: Organization role of the User.
        type:
          type: string
          enum:
            - user
          description: Object type. Always `user`.
    UserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        first_id:
          type: string
          nullable: true
          description: First ID in the data list, usable as `before_id` for the previous page.
        has_more:
          type: boolean
          description: Indicates if there are more results in the requested page direction.
        last_id:
          type: string
          nullable: true
          description: Last ID in the data list, usable as `after_id` for the next page.
    Invite:
      type: object
      description: An organization invite.
      properties:
        id:
          type: string
          description: ID of the Invite.
        email:
          type: string
          description: Email of the User being invited.
        expires_at:
          type: string
          description: RFC 3339 datetime string indicating when the Invite expires.
        invited_at:
          type: string
          description: RFC 3339 datetime string indicating when the Invite was created.
        role:
          type: string
          enum:
            - admin
            - billing
            - claude_code_user
            - developer
            - user
          description: Organization role of the invited User.
        status:
          type: string
          enum:
            - accepted
            - deleted
            - expired
            - pending
          description: Status of the Invite.
        type:
          type: string
          enum:
            - invite
          description: Object type. Always `invite`.
    InviteList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Invite"
        first_id:
          type: string
          nullable: true
          description: First ID in the data list, usable as `before_id` for the previous page.
        has_more:
          type: boolean
          description: Indicates if there are more results in the requested page direction.
        last_id:
          type: string
          nullable: true
          description: Last ID in the data list, usable as `after_id` for the next page.
  x-stackQL-resources:
    organization:
      id: anthropic_admin.organization.organization
      name: organization
      title: Organization
      methods:
        get:
          operation:
            $ref: "#/paths/~1v1~1organizations~1me/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/organization/methods/get"
        insert: []
        update: []
        delete: []
        replace: []
    users:
      id: anthropic_admin.organization.users
      name: users
      title: Users
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1organizations~1users/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            queryParamPushdown:
              top:
                paramName: limit
                maxValue: 1000
        get:
          operation:
            $ref: "#/paths/~1v1~1organizations~1users~1{user_id}/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: "#/paths/~1v1~1organizations~1users~1{user_id}/post"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
          request:
            mediaType: application/json
        delete:
          operation:
            $ref: "#/paths/~1v1~1organizations~1users~1{user_id}/delete"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/users/methods/get"
          - $ref: "#/components/x-stackQL-resources/users/methods/list"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/users/methods/update"
        delete:
          - $ref: "#/components/x-stackQL-resources/users/methods/delete"
        replace: []
    invites:
      id: anthropic_admin.organization.invites
      name: invites
      title: Invites
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1organizations~1invites/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            queryParamPushdown:
              top:
                paramName: limit
                maxValue: 1000
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: "#/paths/~1v1~1organizations~1invites/post"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
          request:
            mediaType: application/json
        get:
          operation:
            $ref: "#/paths/~1v1~1organizations~1invites~1{invite_id}/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
        delete:
          operation:
            $ref: "#/paths/~1v1~1organizations~1invites~1{invite_id}/delete"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/invites/methods/get"
          - $ref: "#/components/x-stackQL-resources/invites/methods/list"
        insert:
          - $ref: "#/components/x-stackQL-resources/invites/methods/create"
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/invites/methods/delete"
        replace: []
