openapi: 3.0.3
info:
  title: Anthropic Admin API - workspaces
  description: Workspaces, workspace members and workspace rate-limit overrides for the Anthropic Admin API.
  version: "2023-06-01"
servers:
  - url: https://api.anthropic.com
paths:
  /v1/organizations/workspaces:
    get:
      operationId: workspaces_list
      summary: List Workspaces
      description: List workspaces in the organization.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: before_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately before this object.
          schema:
            type: string
        - name: after_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately after this object.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of items to return per page. Defaults to 20; ranges from 1 to 1000.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 1000
        - name: include_archived
          in: query
          required: false
          description: Whether to include Workspaces that have been archived in the response.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceList"
    post:
      operationId: workspaces_create
      summary: Create Workspace
      description: Create a new workspace.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Name of the Workspace.
                data_residency:
                  type: string
                  description: Data residency configuration for the workspace as a JSON object with `allowed_inference_geos`, `default_inference_geo` and `workspace_geo` members. If omitted, defaults to workspace_geo `us`, allowed_inference_geos `unrestricted`, default_inference_geo `global`.
                external_key_id:
                  type: string
                  description: ID of the customer-managed encryption key (CMEK) configuration to use for this Workspace. Write-once; requires CMEK to be enabled for the organization.
                tags:
                  type: string
                  description: User-defined tags as a JSON object of string key-value pairs. Keys may not begin with `anthropic`.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
  /v1/organizations/workspaces/{workspace_id}:
    get:
      operationId: workspaces_get
      summary: Get Workspace
      description: Get a workspace by ID.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: workspace_id
          in: path
          required: true
          description: ID of the Workspace.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    post:
      operationId: workspaces_update
      summary: Update Workspace
      description: Update a workspace's name or tags.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: workspace_id
          in: path
          required: true
          description: ID of the Workspace.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: New name for the Workspace.
                tags:
                  type: string
                  description: User-defined tags as a JSON object of string key-value pairs. Keys may not begin with `anthropic`.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
  /v1/organizations/workspaces/{workspace_id}/archive:
    post:
      operationId: workspaces_archive
      summary: Archive Workspace
      description: Archive a workspace.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: workspace_id
          in: path
          required: true
          description: ID of the Workspace.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
  /v1/organizations/workspaces/{workspace_id}/members:
    get:
      operationId: workspace_members_list
      summary: List Workspace Members
      description: List members of a workspace.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: workspace_id
          in: path
          required: true
          description: ID of the Workspace.
          schema:
            type: string
        - name: before_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately before this object.
          schema:
            type: string
        - name: after_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately after this object.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of items to return per page. Defaults to 20; ranges from 1 to 1000.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberList"
    post:
      operationId: workspace_members_create
      summary: Create Workspace Member
      description: Add an organization member to a workspace. The role cannot be `workspace_billing`.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: workspace_id
          in: path
          required: true
          description: ID of the Workspace.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - workspace_role
              properties:
                user_id:
                  type: string
                  description: ID of the User.
                workspace_role:
                  type: string
                  enum:
                    - workspace_admin
                    - workspace_developer
                    - workspace_restricted_developer
                    - workspace_user
                  description: Role of the new Workspace Member. Cannot be `workspace_billing`.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
  /v1/organizations/workspaces/{workspace_id}/members/{user_id}:
    get:
      operationId: workspace_members_get
      summary: Get Workspace Member
      description: Get a workspace member.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: workspace_id
          in: path
          required: true
          description: ID of the Workspace.
          schema:
            type: string
        - name: user_id
          in: path
          required: true
          description: ID of the User.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
    post:
      operationId: workspace_members_update
      summary: Update Workspace Member
      description: Update a workspace member's role.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: workspace_id
          in: path
          required: true
          description: ID of the Workspace.
          schema:
            type: string
        - name: user_id
          in: path
          required: true
          description: ID of the User.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workspace_role
              properties:
                workspace_role:
                  type: string
                  enum:
                    - workspace_admin
                    - workspace_billing
                    - workspace_developer
                    - workspace_restricted_developer
                    - workspace_user
                  description: New workspace role for the User.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
    delete:
      operationId: workspace_members_delete
      summary: Delete Workspace Member
      description: Remove a member from a workspace.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: workspace_id
          in: path
          required: true
          description: ID of the Workspace.
          schema:
            type: string
        - name: user_id
          in: path
          required: true
          description: ID of the User.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    description: ID of the User.
                  workspace_id:
                    type: string
                    description: ID of the Workspace.
                  type:
                    type: string
                    enum:
                      - workspace_member_deleted
                    description: Deleted object type. Always `workspace_member_deleted`.
  /v1/organizations/workspaces/{workspace_id}/rate_limits:
    get:
      operationId: workspace_rate_limits_list
      summary: List Workspace Rate Limits
      description: List rate-limit overrides configured for a workspace. Only groups and limiter types with a workspace-level override are returned; everything else inherits the organization limits.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: workspace_id
          in: path
          required: true
          description: ID of the Workspace.
          schema:
            type: string
        - name: group_type
          in: query
          required: false
          description: Filter by group type.
          schema:
            type: string
            enum:
              - batch
              - files
              - model_group
              - skills
              - token_count
              - web_search
        - name: page
          in: query
          required: false
          description: Opaque cursor from a previous response's `next_page`.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceRateLimitList"
components:
  schemas:
    Workspace:
      type: object
      description: A workspace.
      properties:
        id:
          type: string
          description: ID of the Workspace.
        archived_at:
          type: string
          nullable: true
          description: RFC 3339 datetime string indicating when the Workspace was archived, or null if the Workspace is not archived.
        compartment_id:
          type: string
          description: Identifier for this Workspace's encryption compartment, referenced by customer-managed encryption key (CMEK) configurations.
        created_at:
          type: string
          description: RFC 3339 datetime string indicating when the Workspace was created.
        data_residency:
          type: object
          description: Data residency configuration with `allowed_inference_geos`, `default_inference_geo` and `workspace_geo` members.
          properties:
            allowed_inference_geos:
              type: string
              description: Permitted inference geo values - the string `unrestricted` or a JSON array of specific geos.
            default_inference_geo:
              type: string
              description: Default inference geo applied when requests omit the parameter.
            workspace_geo:
              type: string
              description: Geographic region for workspace data storage. Immutable after creation.
        display_color:
          type: string
          description: Hex color code representing the Workspace in the Claude Console.
        external_key_id:
          type: string
          nullable: true
          description: ID of the customer-managed encryption key (CMEK) configuration used by this Workspace, or null.
        name:
          type: string
          description: Name of the Workspace.
        tags:
          type: string
          description: User-defined tags as string key-value pairs. (opaque JSON object)
        type:
          type: string
          enum:
            - workspace
          description: Object type. Always `workspace`.
    WorkspaceList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"
        first_id:
          type: string
          nullable: true
          description: First ID in the data list, usable as `before_id` for the previous page.
        has_more:
          type: boolean
          description: Indicates if there are more results in the requested page direction.
        last_id:
          type: string
          nullable: true
          description: Last ID in the data list, usable as `after_id` for the next page.
    WorkspaceMember:
      type: object
      description: A workspace member.
      properties:
        type:
          type: string
          enum:
            - workspace_member
          description: Object type. Always `workspace_member`.
        user_id:
          type: string
          description: ID of the User.
        workspace_id:
          type: string
          description: ID of the Workspace.
        workspace_role:
          type: string
          enum:
            - workspace_admin
            - workspace_billing
            - workspace_developer
            - workspace_restricted_developer
            - workspace_user
          description: Role of the Workspace Member.
    WorkspaceMemberList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceMember"
        first_id:
          type: string
          nullable: true
          description: First ID in the data list, usable as `before_id` for the previous page.
        has_more:
          type: boolean
          description: Indicates if there are more results in the requested page direction.
        last_id:
          type: string
          nullable: true
          description: Last ID in the data list, usable as `after_id` for the next page.
    WorkspaceRateLimit:
      type: object
      description: A workspace rate-limit override entry, one per group with at least one override.
      properties:
        type:
          type: string
          enum:
            - workspace_rate_limit
          description: Object type. Always `workspace_rate_limit`.
        group_type:
          type: string
          enum:
            - batch
            - files
            - model_group
            - skills
            - token_count
            - web_search
          description: The kind of rate-limit group this entry represents. `model_group` entries apply to a family of models; other values apply to an API-surface category and have `models` set to null.
        models:
          type: array
          nullable: true
          description: Model names this entry's limits apply to, including aliases. Null when `group_type` is not `model_group`.
          items:
            type: string
        limits:
          type: array
          description: The limiter values overridden for this group in this workspace. Each item carries `type`, `value` and `org_limit` (the organization-level value for the same limiter, or null).
          items:
            type: object
            properties:
              type:
                type: string
                description: The limiter type (for example `requests_per_minute` or `input_tokens_per_minute`).
              value:
                type: number
                description: The configured limit value for this limiter type.
              org_limit:
                type: number
                nullable: true
                description: The organization-level value for the same limiter type, or null if the organization has no configured limit for it.
    WorkspaceRateLimitList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceRateLimit"
        next_page:
          type: string
          nullable: true
          description: Token to provide as `page` in the subsequent request to retrieve the next page of data.
    StackqlExecResult:
      type: object
      description: Synthetic dispatch-result envelope for EXEC-only methods (see post-pass step 3).
      properties:
        result:
          type: string
          description: Raw response payload.
        items:
          type: array
          items:
            type: string
  x-stackQL-resources:
    workspaces:
      id: anthropic_admin.workspaces.workspaces
      name: workspaces
      title: Workspaces
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            queryParamPushdown:
              top:
                paramName: limit
                maxValue: 1000
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces/post"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
          request:
            mediaType: application/json
        get:
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces~1{workspace_id}/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces~1{workspace_id}/post"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
          request:
            mediaType: application/json
        archive:
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces~1{workspace_id}~1archive/post"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            schema_override:
              $ref: "#/components/schemas/StackqlExecResult"
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/workspaces/methods/get"
          - $ref: "#/components/x-stackQL-resources/workspaces/methods/list"
        insert:
          - $ref: "#/components/x-stackQL-resources/workspaces/methods/create"
        update:
          - $ref: "#/components/x-stackQL-resources/workspaces/methods/update"
        delete: []
        replace: []
    members:
      id: anthropic_admin.workspaces.members
      name: members
      title: Members
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces~1{workspace_id}~1members/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            queryParamPushdown:
              top:
                paramName: limit
                maxValue: 1000
        create:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces~1{workspace_id}~1members/post"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
          request:
            mediaType: application/json
        get:
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces~1{workspace_id}~1members~1{user_id}/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces~1{workspace_id}~1members~1{user_id}/post"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
          request:
            mediaType: application/json
        delete:
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces~1{workspace_id}~1members~1{user_id}/delete"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/members/methods/get"
          - $ref: "#/components/x-stackQL-resources/members/methods/list"
        insert:
          - $ref: "#/components/x-stackQL-resources/members/methods/create"
        update:
          - $ref: "#/components/x-stackQL-resources/members/methods/update"
        delete:
          - $ref: "#/components/x-stackQL-resources/members/methods/delete"
        replace: []
    rate_limits:
      id: anthropic_admin.workspaces.rate_limits
      name: rate_limits
      title: Rate Limits
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1organizations~1workspaces~1{workspace_id}~1rate_limits/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            pagination:
              requestToken:
                key: page
                location: query
              responseToken:
                key: $.next_page
                location: body
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/rate_limits/methods/list"
        insert: []
        update: []
        delete: []
        replace: []
