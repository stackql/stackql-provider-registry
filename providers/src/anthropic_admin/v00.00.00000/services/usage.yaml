openapi: 3.0.3
info:
  title: Anthropic Admin API - usage
  description: Usage reports (Messages API token usage) and Claude Code analytics reports for the Anthropic Admin API.
  version: "2023-06-01"
servers:
  - url: https://api.anthropic.com
paths:
  /v1/organizations/usage_report/messages:
    get:
      operationId: usage_report_messages
      summary: Get Messages Usage Report
      description: Get a Messages API usage report bucketed by time, optionally grouped and filtered. Each row is a time bucket carrying a `results` array with one item per group combination.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: anthropic-beta
          in: header
          required: false
          description: Optional beta version header. Grouping or filtering by `speed` requires `fast-mode-2026-02-01`; no default is stamped so standard reports stay on the GA surface.
          schema:
            type: string
        - name: starting_at
          in: query
          required: true
          description: Time buckets that start on or after this RFC 3339 timestamp will be returned. Snapped to the start of the minute/hour/day in UTC.
          schema:
            type: string
        - name: ending_at
          in: query
          required: false
          description: Time buckets that end before this RFC 3339 timestamp will be returned.
          schema:
            type: string
        - name: bucket_width
          in: query
          required: false
          description: Time granularity of the response data.
          schema:
            type: string
            enum:
              - 1d
              - 1h
              - 1m
        - name: group_by[]
          in: query
          required: false
          description: Group by any subset of `account_id`, `api_key_id`, `context_window`, `inference_geo`, `model`, `service_account_id`, `service_tier`, `speed`, `workspace_id`. Grouping by `speed` requires the `fast-mode-2026-02-01` beta header.
          schema:
            type: array
            items:
              type: string
        - name: account_ids[]
          in: query
          required: false
          description: Restrict usage returned to the specified user account ID(s).
          schema:
            type: array
            items:
              type: string
        - name: api_key_ids[]
          in: query
          required: false
          description: Restrict usage returned to the specified API key ID(s).
          schema:
            type: array
            items:
              type: string
        - name: workspace_ids[]
          in: query
          required: false
          description: Restrict usage returned to the specified workspace ID(s).
          schema:
            type: array
            items:
              type: string
        - name: models[]
          in: query
          required: false
          description: Restrict usage returned to the specified model(s).
          schema:
            type: array
            items:
              type: string
        - name: service_tiers[]
          in: query
          required: false
          description: Restrict usage returned to the specified service tier(s) - `batch`, `flex`, `flex_discount`, `priority`, `priority_on_demand`, `standard`.
          schema:
            type: array
            items:
              type: string
        - name: service_account_ids[]
          in: query
          required: false
          description: Restrict usage returned to the specified service account ID(s).
          schema:
            type: array
            items:
              type: string
        - name: context_window[]
          in: query
          required: false
          description: Restrict usage returned to the specified context window(s) - `0-200k` or `200k-1M`.
          schema:
            type: array
            items:
              type: string
        - name: inference_geos[]
          in: query
          required: false
          description: Restrict usage returned to the specified inference geo(s) - `global`, `us`, or `not_available`.
          schema:
            type: array
            items:
              type: string
        - name: speeds[]
          in: query
          required: false
          description: Restrict usage returned to the specified speed(s), `fast` or `standard` (Claude Code research preview). Requires the `fast-mode-2026-02-01` beta header.
          schema:
            type: array
            items:
              type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of time buckets to return. Defaults 7 (`1d`), 24 (`1h`), 60 (`1m`); maxima 31/168/1440.
          schema:
            type: integer
        - name: page
          in: query
          required: false
          description: Optionally set to the `next_page` token from the previous response.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesUsageReport"
  /v1/organizations/usage_report/claude_code:
    get:
      operationId: usage_report_claude_code
      summary: Get Claude Code Usage Report
      description: Get daily aggregated Claude Code usage analytics. Each record represents one actor's activity for the single UTC day specified by `starting_at`.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: anthropic-beta
          in: header
          required: false
          description: Optional beta version header. Grouping or filtering by `speed` requires `fast-mode-2026-02-01`; no default is stamped so standard reports stay on the GA surface.
          schema:
            type: string
        - name: starting_at
          in: query
          required: true
          description: UTC date in YYYY-MM-DD format; returns metrics for this single day only.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of records per page (default 20, max 1000).
          schema:
            type: integer
        - name: page
          in: query
          required: false
          description: Opaque cursor token from the previous response's `next_page` field.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaudeCodeUsageReport"
components:
  schemas:
    UsageBucket:
      type: object
      description: One time bucket of usage data.
      properties:
        starting_at:
          type: string
          description: Start of the time bucket (inclusive) in RFC 3339 format.
        ending_at:
          type: string
          description: End of the time bucket (exclusive) in RFC 3339 format.
        results:
          type: array
          description: List of usage items for this time bucket; multiple items when one or more `group_by[]` parameters are specified. Each item carries uncached_input_tokens, cache_creation, cache_read_input_tokens, output_tokens, server_tool_use, and the grouping dimensions (account_id, api_key_id, workspace_id, model, service_tier, service_account_id, context_window, inference_geo) which are null unless grouped by.
          items:
            type: object
            properties:
              uncached_input_tokens:
                type: number
                description: The number of uncached input tokens processed.
              cache_creation:
                type: string
                description: The number of input tokens used for cache creation, split by TTL (`ephemeral_5m_input_tokens`, `ephemeral_1h_input_tokens`). (opaque JSON object)
              cache_read_input_tokens:
                type: number
                description: The number of input tokens read from the cache.
              output_tokens:
                type: number
                description: The number of output tokens generated.
              server_tool_use:
                type: string
                description: Server-side tool usage metrics (`web_search_requests`). (opaque JSON object)
              account_id:
                type: string
                nullable: true
                description: ID of the user account that made the request. Null unless grouping by account.
              api_key_id:
                type: string
                nullable: true
                description: ID of the API key used. Null unless grouping by API key, and for Console usage.
              workspace_id:
                type: string
                nullable: true
                description: ID of the Workspace used. Null unless grouping by workspace, and for the default workspace.
              model:
                type: string
                nullable: true
                description: Model used. Null unless grouping by model.
              service_account_id:
                type: string
                nullable: true
                description: ID of the service account that made the request. Null unless grouping by service account.
              service_tier:
                type: string
                nullable: true
                description: Service tier used. Null unless grouping by service tier.
              context_window:
                type: string
                nullable: true
                description: Context window used. Null unless grouping by context window.
              inference_geo:
                type: string
                nullable: true
                description: Inference geo used. Null unless grouping by inference geo.
    MessagesUsageReport:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UsageBucket"
        has_more:
          type: boolean
          description: Indicates if there are more results.
        next_page:
          type: string
          nullable: true
          description: Token to provide as `page` in the subsequent request to retrieve the next page of data.
    ClaudeCodeUsageRecord:
      type: object
      description: One actor's Claude Code activity for a single UTC day.
      properties:
        date:
          type: string
          description: Date in RFC 3339 format (UTC timestamp).
        actor:
          type: string
          description: The user or API key that performed the Claude Code actions - either a `user_actor` with `email_address` or an `api_actor` with `api_key_name`. (opaque JSON object)
        organization_id:
          type: string
          description: Organization UUID.
        customer_type:
          type: string
          description: Type of customer account - `api` for API customers, `subscription` for Pro/Team customers.
        terminal_type:
          type: string
          description: Type of terminal or environment where Claude Code was used (for example `vscode`, `iTerm.app`, `tmux`).
        core_metrics:
          type: string
          description: Productivity metrics - `num_sessions`, `lines_of_code` (`added`/`removed`), `commits_by_claude_code`, `pull_requests_by_claude_code`. (opaque JSON object)
        tool_actions:
          type: string
          description: Tool action acceptance/rejection counts by tool type (`edit_tool`, `multi_edit_tool`, `write_tool`, `notebook_edit_tool`). (opaque JSON object)
        model_breakdown:
          type: array
          description: Per-model token counts and estimated costs. Each item carries `model`, `tokens` (input/output/cache_read/cache_creation) and `estimated_cost` (amount in cents USD, currency).
          items:
            type: string
            description: (opaque JSON object)
    ClaudeCodeUsageReport:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ClaudeCodeUsageRecord"
        has_more:
          type: boolean
          description: Indicates if there are more results.
        next_page:
          type: string
          nullable: true
          description: Token to provide as `page` in the subsequent request to retrieve the next page of data.
  x-stackQL-resources:
    usage_reports:
      id: anthropic_admin.usage.usage_reports
      name: usage_reports
      title: Usage Reports
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1organizations~1usage_report~1messages/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            pagination:
              requestToken:
                key: page
                location: query
              responseToken:
                key: $.next_page
                location: body
            queryParamPushdown:
              top:
                paramName: limit
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/usage_reports/methods/list"
        insert: []
        update: []
        delete: []
        replace: []
    claude_code_reports:
      id: anthropic_admin.usage.claude_code_reports
      name: claude_code_reports
      title: Claude Code Reports
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1organizations~1usage_report~1claude_code/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            pagination:
              requestToken:
                key: page
                location: query
              responseToken:
                key: $.next_page
                location: body
            queryParamPushdown:
              top:
                paramName: limit
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/claude_code_reports/methods/list"
        insert: []
        update: []
        delete: []
        replace: []
