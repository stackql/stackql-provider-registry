openapi: 3.0.3
info:
  title: Anthropic Admin API - rate_limits
  description: Organization-level Messages API rate limits for the Anthropic Admin API. Read-only - limits are configured in the Claude Console.
  version: "2023-06-01"
servers:
  - url: https://api.anthropic.com
paths:
  /v1/organizations/rate_limits:
    get:
      operationId: rate_limits_list
      summary: List Organization Rate Limits
      description: List Messages API rate limits for the organization. Each entry corresponds to one rate-limit group - a model family or an API-surface category such as the Files API or Message Batches - and carries the set of limiter values that apply to it.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: group_type
          in: query
          required: false
          description: Filter by group type.
          schema:
            type: string
            enum:
              - batch
              - files
              - model_group
              - skills
              - token_count
              - web_search
        - name: model
          in: query
          required: false
          description: Filter to the single entry containing this model. Accepts full model names and aliases. Returns 404 if the model is not found or has no rate limits for this organization.
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Opaque cursor from a previous response's `next_page`.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitList"
components:
  schemas:
    RateLimit:
      type: object
      description: An organization rate-limit entry, one per group.
      properties:
        type:
          type: string
          enum:
            - rate_limit
          description: Object type. Always `rate_limit` for organization rate-limit entries.
        group_type:
          type: string
          enum:
            - batch
            - files
            - model_group
            - skills
            - token_count
            - web_search
          description: The kind of rate-limit group this entry represents. `model_group` entries apply to a family of models (listed in `models`); other values apply to an API-surface category and have `models` set to null.
        models:
          type: array
          nullable: true
          description: Model names this entry's limits apply to, including aliases. Null when `group_type` is not `model_group`.
          items:
            type: string
        limits:
          type: array
          description: The limiter values that apply to this group. Each item carries `type` (for example `requests_per_minute` or `input_tokens_per_minute`) and `value`.
          items:
            type: object
            properties:
              type:
                type: string
                description: The limiter type.
              value:
                type: number
                description: The configured limit value for this limiter type.
    RateLimitList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RateLimit"
        next_page:
          type: string
          nullable: true
          description: Token to provide as `page` in the subsequent request to retrieve the next page of data.
  x-stackQL-resources:
    rate_limits:
      id: anthropic_admin.rate_limits.rate_limits
      name: rate_limits
      title: Rate Limits
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1organizations~1rate_limits/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            pagination:
              requestToken:
                key: page
                location: query
              responseToken:
                key: $.next_page
                location: body
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/rate_limits/methods/list"
        insert: []
        update: []
        delete: []
        replace: []
