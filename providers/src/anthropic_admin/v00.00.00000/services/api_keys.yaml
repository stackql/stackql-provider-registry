openapi: 3.0.3
info:
  title: Anthropic Admin API - api_keys
  description: API key monitoring and management for the Anthropic Admin API. Keys can only be created or deleted in the Claude Console; the API surface is list/get/update.
  version: "2023-06-01"
servers:
  - url: https://api.anthropic.com
paths:
  /v1/organizations/api_keys:
    get:
      operationId: api_keys_list
      summary: List API Keys
      description: List API keys in the organization.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: before_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately before this object.
          schema:
            type: string
        - name: after_id
          in: query
          required: false
          description: ID of the object to use as a cursor for pagination. Returns the page of results immediately after this object.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of items to return per page. Defaults to 20; ranges from 1 to 1000.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 1000
        - name: status
          in: query
          required: false
          description: Filter by API key status.
          schema:
            type: string
            enum:
              - active
              - archived
              - expired
              - inactive
        - name: workspace_id
          in: query
          required: false
          description: Filter by Workspace ID.
          schema:
            type: string
        - name: created_by_user_id
          in: query
          required: false
          description: Filter by the ID of the User who created the object.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyList"
  /v1/organizations/api_keys/{api_key_id}:
    get:
      operationId: api_keys_get
      summary: Get API Key
      description: Get an API key by ID.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: api_key_id
          in: path
          required: true
          description: ID of the API key.
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
    post:
      operationId: api_keys_update
      summary: Update API Key
      description: Update an API key's name or status.
      parameters:
        - name: anthropic-version
          in: header
          required: false
          description: The version of the Claude API you want to use.
          schema:
            type: string
            default: "2023-06-01"
        - name: api_key_id
          in: path
          required: true
          description: ID of the API key.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the API key.
                status:
                  type: string
                  enum:
                    - active
                    - archived
                    - inactive
                  description: Status of the API key.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
components:
  schemas:
    ApiKey:
      type: object
      description: An API key.
      properties:
        id:
          type: string
          description: ID of the API key.
        created_at:
          type: string
          description: RFC 3339 datetime string indicating when the API Key was created.
        created_by:
          type: object
          description: The ID and type of the actor that created the API key.
          properties:
            id:
              type: string
              description: ID of the actor that created the object.
            type:
              type: string
              description: Type of the actor that created the object.
        expires_at:
          type: string
          nullable: true
          description: RFC 3339 datetime string indicating when the API Key expires, or null if it never expires.
        name:
          type: string
          description: Name of the API key.
        partial_key_hint:
          type: string
          description: Partially redacted hint for the API key.
        status:
          type: string
          enum:
            - active
            - archived
            - expired
            - inactive
          description: Status of the API key.
        type:
          type: string
          enum:
            - api_key
          description: Object type. Always `api_key`.
        workspace_id:
          type: string
          nullable: true
          description: ID of the Workspace associated with the API key, or null if the API key belongs to the default Workspace.
    ApiKeyList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApiKey"
        first_id:
          type: string
          nullable: true
          description: First ID in the data list, usable as `before_id` for the previous page.
        has_more:
          type: boolean
          description: Indicates if there are more results in the requested page direction.
        last_id:
          type: string
          nullable: true
          description: Last ID in the data list, usable as `after_id` for the next page.
  x-stackQL-resources:
    api_keys:
      id: anthropic_admin.api_keys.api_keys
      name: api_keys
      title: Api Keys
      methods:
        list:
          operation:
            $ref: "#/paths/~1v1~1organizations~1api_keys/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
            objectKey: $.data
          config:
            queryParamPushdown:
              top:
                paramName: limit
                maxValue: 1000
        get:
          operation:
            $ref: "#/paths/~1v1~1organizations~1api_keys~1{api_key_id}/get"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
        update:
          config:
            requestBodyTranslate:
              algorithm: naive
          operation:
            $ref: "#/paths/~1v1~1organizations~1api_keys~1{api_key_id}/post"
          response:
            mediaType: application/json
            openAPIDocKey: "200"
          request:
            mediaType: application/json
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/api_keys/methods/get"
          - $ref: "#/components/x-stackQL-resources/api_keys/methods/list"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/api_keys/methods/update"
        delete: []
        replace: []
