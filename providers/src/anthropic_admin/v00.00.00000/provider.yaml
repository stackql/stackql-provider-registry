id: anthropic_admin
name: anthropic_admin
version: v00.00.00000
providerServices:
  api_keys:
    id: api_keys:v00.00.00000
    name: api_keys
    preferred: true
    service:
      $ref: anthropic_admin/v00.00.00000/services/api_keys.yaml
    title: Anthropic Admin API - api_keys
    version: v00.00.00000
    description: API key monitoring and management for the Anthropic Admin API. Keys can only be created or deleted in the Claude Console; the API surface is list/get/update.
  cost:
    id: cost:v00.00.00000
    name: cost
    preferred: true
    service:
      $ref: anthropic_admin/v00.00.00000/services/cost.yaml
    title: Anthropic Admin API - cost
    version: v00.00.00000
    description: Cost reports (USD service-level cost breakdowns) for the Anthropic Admin API. Priority Tier costs use a different billing model and are not included; track them through the usage endpoint.
  organization:
    id: organization:v00.00.00000
    name: organization
    preferred: true
    service:
      $ref: anthropic_admin/v00.00.00000/services/organization.yaml
    title: Anthropic Admin API - organization
    version: v00.00.00000
    description: Organization info, organization members (users) and invites for the Anthropic Admin API.
  rate_limits:
    id: rate_limits:v00.00.00000
    name: rate_limits
    preferred: true
    service:
      $ref: anthropic_admin/v00.00.00000/services/rate_limits.yaml
    title: Anthropic Admin API - rate_limits
    version: v00.00.00000
    description: Organization-level Messages API rate limits for the Anthropic Admin API. Read-only - limits are configured in the Claude Console.
  usage:
    id: usage:v00.00.00000
    name: usage
    preferred: true
    service:
      $ref: anthropic_admin/v00.00.00000/services/usage.yaml
    title: Anthropic Admin API - usage
    version: v00.00.00000
    description: Usage reports (Messages API token usage) and Claude Code analytics reports for the Anthropic Admin API.
  workspaces:
    id: workspaces:v00.00.00000
    name: workspaces
    preferred: true
    service:
      $ref: anthropic_admin/v00.00.00000/services/workspaces.yaml
    title: Anthropic Admin API - workspaces
    version: v00.00.00000
    description: Workspaces, workspace members and workspace rate-limit overrides for the Anthropic Admin API.
config:
  auth:
    type: custom
    location: header
    name: x-api-key
    credentialsenvvar: ANTHROPIC_ADMIN_KEY
