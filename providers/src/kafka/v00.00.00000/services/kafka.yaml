            value: gzip
    ProduceRequest:
      description: >-
        A single record to be produced to Kafka. To produce multiple records in
        the same request, simply concatenate the records. The delivery reports
        are concatenated in the same order as the records are sent.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProduceRequest'
          examples:
            binary_and_json:
              description: If using type, one of "BINARY", "JSON" or "STRING" is required.
              value:
                partition_id: 1
                headers:
                  - name: Header-1
                    value: SGVhZGVyLTE=
                  - name: Header-2
                    value: SGVhZGVyLTI=
                key:
                  type: BINARY
                  data: Zm9vYmFy
                value:
                  type: JSON
                  data:
                    foo: bar
                timestamp: '2021-02-05T19:14:42Z'
            string:
              description: If using type, one of "BINARY", "JSON" or "STRING" is required.
              value:
                value:
                  type: STRING
                  data: My message
            empty_value:
              description: key or value can be omitted entirely.
              value:
                key:
                  data: 1000
    CreateLinkRequest:
      description: Create a cluster link
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateLinkRequestData'
          examples:
            destination_initiated_link:
              description: Create a destination initiated cluster link
              value:
                source_cluster_id: cluster-1
                configs:
                  - name: bootstrap.servers
                    value: cluster-1-bootstrap-server
                  - name: acl.sync.enable
                    value: 'false'
                  - name: consumer.offset.sync.ms
                    value: '30000'
                  - name: sasl.mechanism
                    value: PLAIN
                  - name: security.protocol
                    value: SASL_SSL
                  - name: sasl.jaas.config
                    value: >-
                      sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule
                      required username='<Kafka API Key>' password='<Kafka API
                      Secret>';
            source_initiated_link_at_source_cluster:
              description: Create a source initiated cluster link at source cluster
              value:
                destination_cluster_id: cluster-2
                configs:
                  - name: bootstrap.servers
                    value: cluster-2-bootstrap-server
                  - name: link.mode
                    value: SOURCE
                  - name: sasl.mechanism
                    value: PLAIN
                  - name: security.protocol
                    value: SASL_SSL
                  - name: sasl.jaas.config
                    value: >-
                      sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule
                      required username='<Remote Kafka API Key>'
                      password='<Remote Kafka API Secret>';
                  - name: local.sasl.mechanism
                    value: PLAIN
                  - name: local.security.protocol
                    value: SASL_SSL
                  - name: local.sasl.jaas.config
                    value: >-
                      sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule
                      required username='<Local Kafka API Key>' password='<Local
                      Kafka API Secret>';
            source_initiated_link_at_destination_cluster:
              description: Create a source initiated cluster link at destination cluster
              value:
                destination_cluster_id: cluster-1
                configs:
                  - name: link.mode
                    value: DESTINATION
                  - name: connection.mode
                    value: INBOUND
                  - name: acl.sync.enable
                    value: 'false'
            bidirectional_link_east:
              description: Create a bidirectional cluster link in east
              value:
                remote_cluster_id: cluster-west
                configs:
                  - name: bootstrap.servers
                    value: cluster-west-bootstrap-server
                  - name: link.mode
                    value: BIDIRECTIONAL
                  - name: cluster.link.prefix
                    value: west.
                  - name: sasl.mechanism
                    value: PLAIN
                  - name: security.protocol
                    value: SASL_SSL
                  - name: sasl.jaas.config
                    value: >-
                      sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule
                      required username='<Kafka API Key>' password='<Kafka API
                      Secret>';
            bidirectional_link_west:
              description: Create a bidirectional cluster link in west
              value:
                remote_cluster_id: cluster-east
                cluster_link_id: eEBkTffYSESld6EO898x3w
                configs:
                  - name: bootstrap.servers
                    value: cluster-east-bootstrap-server
                  - name: link.mode
                    value: BIDIRECTIONAL
                  - name: cluster.link.prefix
                    value: east.
                  - name: sasl.mechanism
                    value: PLAIN
                  - name: security.protocol
                    value: SASL_SSL
                  - name: sasl.jaas.config
                    value: >-
                      sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule
                      required username='<Kafka API Key>' password='<Kafka API
                      Secret>';
