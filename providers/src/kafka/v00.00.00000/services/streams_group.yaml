    BadRequestErrorResponse:
      description: >-
        Indicates a bad request error. It could be caused by an unexpected
        request body format or other forms of request validation failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            bad_request_cannot_deserialize:
              description: >-
                Thrown when trying to deserialize an integer from non-integer
                data.
              value:
                error_code: 400
                message: >-
                  Cannot deserialize value of type `java.lang.Integer` from
                  String "A": not a valid `java.lang.Integer` value
            unsupported_version_exception:
              description: >-
                Thrown when the version of this API is not supported in the
                underlying Kafka cluster.
              value:
                error_code: 40035
                message: >-
                  The version of this API is not supported in the underlying
                  Kafka cluster.
    UnauthorizedErrorResponse:
      description: >-
        Indicates a client authentication error. Kafka authentication failures
        will contain error code 40101 in the response body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            kafka_authentication_failed:
              description: >-
                Thrown when using Basic authentication with wrong Kafka
                credentials.
              value:
                error_code: 40101
                message: Authentication failed
    ForbiddenErrorResponse:
      description: >-
        Indicates a client authorization error. Kafka authorization failures
        will contain error code 40301 in the response body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            kafka_authorization_failed:
              description: >-
                Thrown when the caller is not authorized to perform the
                underlying operation.
              value:
                error_code: 40301
                message: Request is not authorized
    TooManyRequestsErrorResponse:
      description: >-
        Indicates that a rate limit threshold has been reached, and the client
        should retry again later.
      content:
        text/html:
          schema:
            type: string
          example:
            description: A sample response from Jetty's DoSFilter.
            value: >-
              <html> <head> <meta http-equiv="Content-Type"
              content="text/html;charset=utf-8"/> <title>Error 429 Too Many
              Requests</title> </head> <body> <h2>HTTP ERROR 429 Too Many
              Requests</h2> <table> <tr> <th>URI:</th>
              <td>/v3/clusters/my-cluster</td> </tr> <tr> <th>STATUS:</th>
              <td>429</td> </tr> <tr> <th>MESSAGE:</th> <td>Too Many
              Requests</td> </tr> <tr> <th>SERVLET:</th> <td>default</td> </tr>
              </table> </body> </html>
    ServerErrorResponse:
      description: >-
        A server-side problem that might not be addressable from the client
        side. Retriable Kafka errors will contain error code 50003 in the
        response body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
