openapi: 3.0.0
info:
  version: "2017-04-19"
  title: Amazon Lex Model Building Service
  description: Amazon Lex Model Building Service
  x-serviceName: lex
  x-serviceAlias: lex_models
  x-protocol: rest-json
  x-apiVersion: "2017-04-19"
  x-endpointPrefix: models.lex
  x-jsonVersion: "1.1"
servers:
  - url: https://models.lex.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for lex-models
paths:
  /bots/{name}/versions:
    post:
      operationId: CreateBotVersion
      description: Creates a new version of the bot based on the $LATEST version. If the $LATEST version of this resource hasn't changed since you created the last version, Amazon Lex doesn't create a new version. It returns the last created version. You can update only the $LATEST version of the bot. You can't update the numbered versions that you create with the CreateBotVersion operation. When you create the first version of a bot, Amazon Lex sets the version to 1. Subsequent versions increment by 1. For more information, see versioning-intro. This operation requires permission for the lex:CreateBotVersion action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot that you want to create a new version of. The name is case sensitive.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                checksum:
                  $ref: "#/components/schemas/String"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBotVersionResponse"
  /intents/{name}/versions:
    post:
      operationId: CreateIntentVersion
      description: Creates a new version of an intent based on the $LATEST version of the intent. If the $LATEST version of this intent hasn't changed since you last updated it, Amazon Lex doesn't create a new version. It returns the last version you created. You can update only the $LATEST version of the intent. You can't update the numbered versions that you create with the CreateIntentVersion operation. When you create a version of an intent, Amazon Lex sets the version to 1. Subsequent versions increment by 1. For more information, see versioning-intro. This operation requires permissions to perform the lex:CreateIntentVersion action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IntentName"
          description: The name of the intent that you want to create a new version of. The name is case sensitive.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                checksum:
                  $ref: "#/components/schemas/String"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIntentVersionResponse"
  /slottypes/{name}/versions:
    post:
      operationId: CreateSlotTypeVersion
      description: Creates a new version of a slot type based on the $LATEST version of the specified slot type. If the $LATEST version of this resource has not changed since the last version that you created, Amazon Lex doesn't create a new version. It returns the last version that you created. You can update only the $LATEST version of a slot type. You can't update the numbered versions that you create with the CreateSlotTypeVersion operation. When you create a version of a slot type, Amazon Lex sets the version to 1. Subsequent versions increment by 1. For more information, see versioning-intro. This operation requires permissions for the lex:CreateSlotTypeVersion action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SlotTypeName"
          description: The name of the slot type that you want to create a new version for. The name is case sensitive.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                checksum:
                  $ref: "#/components/schemas/String"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSlotTypeVersionResponse"
  /bots/{name}:
    delete:
      operationId: DeleteBot
      description: Deletes all versions of the bot, including the $LATEST version. To delete a specific version of the bot, use the DeleteBotVersion operation. The DeleteBot operation doesn't immediately remove the bot schema. Instead, it is marked for deletion and removed later. Amazon Lex stores utterances indefinitely for improving the ability of your bot to respond to user inputs. These utterances are not removed when the bot is deleted. To remove the utterances, use the DeleteUtterances operation. If a bot has an alias, you can't delete it. Instead, the DeleteBot operation returns a ResourceInUseException exception that includes a reference to the alias that refers to the bot. To remove the reference to the bot, delete the alias. If you get the same exception again, delete the referring alias until the DeleteBot operation is successful. This operation requires permissions for the lex:DeleteBot action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot. The name is case sensitive.
      responses:
        "204":
          description: Success
  /bots/{bot_name}/aliases/{name}:
    delete:
      operationId: DeleteBotAlias
      description: Deletes an alias for the specified bot. You can't delete an alias that is used in the association between a bot and a messaging channel. If an alias is used in a channel association, the DeleteBot operation returns a ResourceInUseException exception that includes a reference to the channel association that refers to the bot. You can remove the reference to the alias by deleting the channel association. If you get the same exception again, delete the referring association until the DeleteBotAlias operation is successful.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AliasName"
          description: The name of the alias to delete. The name is case sensitive.
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot that the alias points to.
      responses:
        "204":
          description: Success
    get:
      operationId: GetBotAlias
      description: Returns information about an Amazon Lex bot alias. For more information about aliases, see versioning-aliases. This operation requires permissions for the lex:GetBotAlias action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AliasName"
          description: The name of the bot alias. The name is case sensitive.
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBotAliasResponse"
    put:
      operationId: PutBotAlias
      description: Creates an alias for the specified version of the bot or replaces an alias for the specified bot. To change the version of the bot that the alias points to, replace the alias. For more information about aliases, see versioning-aliases. This operation requires permissions for the lex:PutBotAlias action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AliasName"
          description: The name of the alias. The name is not case sensitive.
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                botVersion:
                  $ref: "#/components/schemas/Version"
                checksum:
                  $ref: "#/components/schemas/String"
                conversationLogs:
                  $ref: "#/components/schemas/ConversationLogsRequest"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - botVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutBotAliasResponse"
  /bots/{bot_name}/aliases/{alias_name}/channels/{name}:
    delete:
      operationId: DeleteBotChannelAssociation
      description: Deletes the association between an Amazon Lex bot and a messaging platform. This operation requires permission for the lex:DeleteBotChannelAssociation action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotChannelName"
          description: The name of the association. The name is case sensitive.
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the Amazon Lex bot.
        - name: alias_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AliasName"
          description: An alias that points to the specific version of the Amazon Lex bot to which this association is being made.
      responses:
        "204":
          description: Success
    get:
      operationId: GetBotChannelAssociation
      description: Returns information about the association between an Amazon Lex bot and a messaging platform. This operation requires permissions for the lex:GetBotChannelAssociation action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotChannelName"
          description: The name of the association between the bot and the channel. The name is case sensitive.
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the Amazon Lex bot.
        - name: alias_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AliasName"
          description: An alias pointing to the specific version of the Amazon Lex bot to which this association is being made.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBotChannelAssociationResponse"
  /bots/{name}/versions/{version}:
    delete:
      operationId: DeleteBotVersion
      description: Deletes a specific version of a bot. To delete all versions of a bot, use the DeleteBot operation. This operation requires permissions for the lex:DeleteBotVersion action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot.
        - name: version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NumericalVersion"
          description: The version of the bot to delete. You cannot delete the $LATEST version of the bot. To delete the $LATEST version, use the DeleteBot operation.
      responses:
        "204":
          description: Success
  /intents/{name}:
    delete:
      operationId: DeleteIntent
      description: Deletes all versions of the intent, including the $LATEST version. To delete a specific version of the intent, use the DeleteIntentVersion operation. You can delete a version of an intent only if it is not referenced. To delete an intent that is referred to in one or more bots (see how-it-works), you must remove those references first. If you get the ResourceInUseException exception, it provides an example reference that shows where the intent is referenced. To remove the reference to the intent, either update the bot or delete it. If you get the same exception when you attempt to delete the intent again, repeat until the intent has no references and the call to DeleteIntent is successful. This operation requires permission for the lex:DeleteIntent action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IntentName"
          description: The name of the intent. The name is case sensitive.
      responses:
        "204":
          description: Success
  /intents/{name}/versions/{version}:
    delete:
      operationId: DeleteIntentVersion
      description: Deletes a specific version of an intent. To delete all versions of a intent, use the DeleteIntent operation. This operation requires permissions for the lex:DeleteIntentVersion action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IntentName"
          description: The name of the intent.
        - name: version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NumericalVersion"
          description: The version of the intent to delete. You cannot delete the $LATEST version of the intent. To delete the $LATEST version, use the DeleteIntent operation.
      responses:
        "204":
          description: Success
    get:
      operationId: GetIntent
      description: Returns information about an intent. In addition to the intent name, you must specify the intent version. This operation requires permissions to perform the lex:GetIntent action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IntentName"
          description: The name of the intent. The name is case sensitive.
        - name: version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Version"
          description: The version of the intent.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIntentResponse"
  /slottypes/{name}:
    delete:
      operationId: DeleteSlotType
      description: Deletes all versions of the slot type, including the $LATEST version. To delete a specific version of the slot type, use the DeleteSlotTypeVersion operation. You can delete a version of a slot type only if it is not referenced. To delete a slot type that is referred to in one or more intents, you must remove those references first. If you get the ResourceInUseException exception, the exception provides an example reference that shows the intent where the slot type is referenced. To remove the reference to the slot type, either update the intent or delete it. If you get the same exception when you attempt to delete the slot type again, repeat until the slot type has no references and the DeleteSlotType call is successful. This operation requires permission for the lex:DeleteSlotType action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SlotTypeName"
          description: The name of the slot type. The name is case sensitive.
      responses:
        "204":
          description: Success
  /slottypes/{name}/version/{version}:
    delete:
      operationId: DeleteSlotTypeVersion
      description: Deletes a specific version of a slot type. To delete all versions of a slot type, use the DeleteSlotType operation. This operation requires permissions for the lex:DeleteSlotTypeVersion action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SlotTypeName"
          description: The name of the slot type.
        - name: version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NumericalVersion"
          description: The version of the slot type to delete. You cannot delete the $LATEST version of the slot type. To delete the $LATEST version, use the DeleteSlotType operation.
      responses:
        "204":
          description: Success
  /bots/{bot_name}/utterances/{user_id}:
    delete:
      operationId: DeleteUtterances
      description: Deletes stored utterances. Amazon Lex stores the utterances that users send to your bot. Utterances are stored for 15 days for use with the GetUtterancesView operation, and then stored indefinitely for use in improving the ability of your bot to respond to user input. Use the DeleteUtterances operation to manually delete stored utterances for a specific user. When you use the DeleteUtterances operation, utterances stored for improving your bot's ability to respond to user input are deleted immediately. Utterances stored for use with the GetUtterancesView operation are deleted after 15 days. This operation requires permissions for the lex:DeleteUtterances action.
      parameters:
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot that stored the utterances.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier for the user that made the utterances. This is the user ID that was sent in the PostContent or PostText operation request that contained the utterance.
      responses:
        "204":
          description: Success
  /bots/{name}/versions/{versionoralias}:
    get:
      operationId: GetBot
      description: Returns metadata information for a specific bot. You must provide the bot name and the bot version or alias. This operation requires permissions for the lex:GetBot action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot. The name is case sensitive.
        - name: versionoralias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The version or alias of the bot.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBotResponse"
  /bots/{bot_name}/aliases/:
    get:
      operationId: GetBotAliases
      description: Returns a list of aliases for a specified Amazon Lex bot. This operation requires permissions for the lex:GetBotAliases action.
      parameters:
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for fetching the next page of aliases. If the response to this call is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of aliases, specify the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of aliases to return in the response. The default is 50. .
        - name: nameContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AliasName"
          description: Substring to match in bot alias names. An alias will be returned if any part of its name matches the substring. For example, "xyz" matches both "xyzabc" and "abcxyz."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBotAliasesResponse"
  /bots/{bot_name}/aliases/{alias_name}/channels/:
    get:
      operationId: GetBotChannelAssociations
      description: Returns a list of all of the channels associated with the specified bot. The GetBotChannelAssociations operation requires permissions for the lex:GetBotChannelAssociations action.
      parameters:
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the Amazon Lex bot in the association.
        - name: alias_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AliasNameOrListAll"
          description: An alias pointing to the specific version of the Amazon Lex bot to which this association is being made.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for fetching the next page of associations. If the response to this call is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of associations, specify the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of associations to return in the response. The default is 50.
        - name: nameContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BotChannelName"
          description: Substring to match in channel association names. An association will be returned if any part of its name matches the substring. For example, "xyz" matches both "xyzabc" and "abcxyz." To return all bot channel associations, use a hyphen ("-") as the nameContains parameter.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBotChannelAssociationsResponse"
  /bots/{name}/versions/:
    get:
      operationId: GetBotVersions
      description: Gets information about all of the versions of a bot. The GetBotVersions operation returns a BotMetadata object for each version of a bot. For example, if a bot has three numbered versions, the GetBotVersions operation returns four BotMetadata objects in the response, one for each numbered version and one for the $LATEST version. The GetBotVersions operation always returns at least one version, the $LATEST version. This operation requires permissions for the lex:GetBotVersions action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot for which versions should be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for fetching the next page of bot versions. If the response to this call is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of versions, specify the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of bot versions to return in the response. The default is 10.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBotVersionsResponse"
  /bots/:
    get:
      operationId: GetBots
      description: "Returns bot information as follows: If you provide the nameContains field, the response includes information for the $LATEST version of all bots whose name contains the specified string. If you don't specify the nameContains field, the operation returns information about the $LATEST version of all of your bots. This operation requires permission for the lex:GetBots action."
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token that fetches the next page of bots. If the response to this call is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of bots, specify the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of bots to return in the response that the request will return. The default is 10.
        - name: nameContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BotName"
          description: Substring to match in bot names. A bot will be returned if any part of its name matches the substring. For example, "xyz" matches both "xyzabc" and "abcxyz."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBotsResponse"
  /builtins/intents/{signature}:
    get:
      operationId: GetBuiltinIntent
      description: Returns information about a built-in intent. This operation requires permission for the lex:GetBuiltinIntent action.
      parameters:
        - name: signature
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BuiltinIntentSignature"
          description: The unique identifier for a built-in intent. To find the signature for an intent, see Standard Built-in Intents in the Alexa Skills Kit.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBuiltinIntentResponse"
  /builtins/intents/:
    get:
      operationId: GetBuiltinIntents
      description: Gets a list of built-in intents that meet the specified criteria. This operation requires permission for the lex:GetBuiltinIntents action.
      parameters:
        - name: locale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Locale"
          description: A list of locales that the intent supports.
        - name: signatureContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Substring to match in built-in intent signatures. An intent will be returned if any part of its signature matches the substring. For example, "xyz" matches both "xyzabc" and "abcxyz." To find the signature for an intent, see Standard Built-in Intents in the Alexa Skills Kit.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token that fetches the next page of intents. If this API call is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of intents, use the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of intents to return in the response. The default is 10.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBuiltinIntentsResponse"
  /builtins/slottypes/:
    get:
      operationId: GetBuiltinSlotTypes
      description: Gets a list of built-in slot types that meet the specified criteria. For a list of built-in slot types, see Slot Type Reference in the Alexa Skills Kit. This operation requires permission for the lex:GetBuiltInSlotTypes action.
      parameters:
        - name: locale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Locale"
          description: A list of locales that the slot type supports.
        - name: signatureContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Substring to match in built-in slot type signatures. A slot type will be returned if any part of its signature matches the substring. For example, "xyz" matches both "xyzabc" and "abcxyz."
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token that fetches the next page of slot types. If the response to this API call is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of slot types, specify the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of slot types to return in the response. The default is 10.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBuiltinSlotTypesResponse"
  /exports/:
    get:
      operationId: GetExport
      description: Exports the contents of a Amazon Lex resource in a specified format.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the bot to export.
        - name: version
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/NumericalVersion"
          description: The version of the bot to export.
        - name: resourceType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: The type of resource to export.
        - name: exportType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ExportType"
          description: The format of the exported data.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExportResponse"
  /imports/{import_id}:
    get:
      operationId: GetImport
      description: Gets information about an import job started with the StartImport operation.
      parameters:
        - name: import_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier of the import job information to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetImportResponse"
  /intents/{name}/versions/:
    get:
      operationId: GetIntentVersions
      description: Gets information about all of the versions of an intent. The GetIntentVersions operation returns an IntentMetadata object for each version of an intent. For example, if an intent has three numbered versions, the GetIntentVersions operation returns four IntentMetadata objects in the response, one for each numbered version and one for the $LATEST version. The GetIntentVersions operation always returns at least one version, the $LATEST version. This operation requires permissions for the lex:GetIntentVersions action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IntentName"
          description: The name of the intent for which versions should be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for fetching the next page of intent versions. If the response to this call is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of versions, specify the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of intent versions to return in the response. The default is 10.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIntentVersionsResponse"
  /intents/:
    get:
      operationId: GetIntents
      description: "Returns intent information as follows: If you specify the nameContains field, returns the $LATEST version of all intents that contain the specified string. If you don't specify the nameContains field, returns information about the $LATEST version of all intents. The operation requires permission for the lex:GetIntents action."
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token that fetches the next page of intents. If the response to this API call is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of intents, specify the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of intents to return in the response. The default is 10.
        - name: nameContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IntentName"
          description: Substring to match in intent names. An intent will be returned if any part of its name matches the substring. For example, "xyz" matches both "xyzabc" and "abcxyz."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIntentsResponse"
  /migrations/{migration_id}:
    get:
      operationId: GetMigration
      description: Provides details about an ongoing or complete migration from an Amazon Lex V1 bot to an Amazon Lex V2 bot. Use this operation to view the migration alerts and warnings related to the migration.
      parameters:
        - name: migration_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MigrationId"
          description: The unique identifier of the migration to view. The migrationID is returned by the operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMigrationResponse"
  /migrations:
    get:
      operationId: GetMigrations
      description: Gets a list of migrations between Amazon Lex V1 and Amazon Lex V2.
      parameters:
        - name: sortByAttribute
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MigrationSortAttribute"
          description: The field to sort the list of migrations by. You can sort by the Amazon Lex V1 bot name or the date and time that the migration was started.
        - name: sortByOrder
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
          description: The order so sort the list.
        - name: v1BotNameContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BotName"
          description: Filters the list to contain only bots whose name contains the specified string. The string is matched anywhere in bot name.
        - name: migrationStatusEquals
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MigrationStatus"
          description: Filters the list to contain only migrations in the specified state.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of migrations to return in the response. The default is 10.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token that fetches the next page of migrations. If the response to this operation is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of migrations, specify the pagination token in the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMigrationsResponse"
    post:
      operationId: StartMigration
      description: Starts migrating a bot from Amazon Lex V1 to Amazon Lex V2. Migrate your bot when you want to take advantage of the new features of Amazon Lex V2. For more information, see Migrating a bot in the Amazon Lex developer guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                v1BotName:
                  $ref: "#/components/schemas/BotName"
                v1BotVersion:
                  $ref: "#/components/schemas/Version"
                v2BotName:
                  $ref: "#/components/schemas/V2BotName"
                v2BotRole:
                  $ref: "#/components/schemas/IamRoleArn"
                migrationStrategy:
                  $ref: "#/components/schemas/MigrationStrategy"
              required:
                - v1BotName
                - v1BotVersion
                - v2BotName
                - v2BotRole
                - migrationStrategy
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMigrationResponse"
  /slottypes/{name}/versions/{version}:
    get:
      operationId: GetSlotType
      description: Returns information about a specific version of a slot type. In addition to specifying the slot type name, you must specify the slot type version. This operation requires permissions for the lex:GetSlotType action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SlotTypeName"
          description: The name of the slot type. The name is case sensitive.
        - name: version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Version"
          description: The version of the slot type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSlotTypeResponse"
  /slottypes/{name}/versions/:
    get:
      operationId: GetSlotTypeVersions
      description: Gets information about all versions of a slot type. The GetSlotTypeVersions operation returns a SlotTypeMetadata object for each version of a slot type. For example, if a slot type has three numbered versions, the GetSlotTypeVersions operation returns four SlotTypeMetadata objects in the response, one for each numbered version and one for the $LATEST version. The GetSlotTypeVersions operation always returns at least one version, the $LATEST version. This operation requires permissions for the lex:GetSlotTypeVersions action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SlotTypeName"
          description: The name of the slot type for which versions should be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for fetching the next page of slot type versions. If the response to this call is truncated, Amazon Lex returns a pagination token in the response. To fetch the next page of versions, specify the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of slot type versions to return in the response. The default is 10.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSlotTypeVersionsResponse"
  /slottypes/:
    get:
      operationId: GetSlotTypes
      description: "Returns slot type information as follows: If you specify the nameContains field, returns the $LATEST version of all slot types that contain the specified string. If you don't specify the nameContains field, returns information about the $LATEST version of all slot types. The operation requires permission for the lex:GetSlotTypes action."
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token that fetches the next page of slot types. If the response to this API call is truncated, Amazon Lex returns a pagination token in the response. To fetch next page of slot types, specify the pagination token in the next request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of slot types to return in the response. The default is 10.
        - name: nameContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SlotTypeName"
          description: Substring to match in slot type names. A slot type will be returned if any part of its name matches the substring. For example, "xyz" matches both "xyzabc" and "abcxyz."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSlotTypesResponse"
  /bots/{botname}/utterances?view=aggregation:
    get:
      operationId: GetUtterancesView
      description: Use the GetUtterancesView operation to get information about the utterances that your users have made to your bot. You can use this list to tune the utterances that your bot responds to. For example, say that you have created a bot to order flowers. After your users have used your bot for a while, use the GetUtterancesView operation to see the requests that they have made and whether they have been successful. You might find that the utterance "I want flowers" is not being recognized. You could add this utterance to the OrderFlowers intent so that your bot recognizes that utterance. After you publish a new version of a bot, you can get information about the old version and the new so that you can compare the performance across the two versions. Utterance statistics are generated once a day. Data is available for the last 15 days. You can request information for up to 5 versions of your bot in each request. Amazon Lex returns the most frequent utterances received by the bot in the last 15 days. The response contains information about a maximum of 100 utterances for each version. If you set childDirected field to true when you created your bot, if you are using slot obfuscation with one or more slots, or if you opted out of participating in improving Amazon Lex, utterances are not available. This operation requires permissions for the lex:GetUtterancesView action.
      parameters:
        - name: botname
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot for which utterance information should be returned.
        - name: bot_versions
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BotVersions"
          description: An array of bot versions for which utterance information should be returned. The limit is 5 versions per request.
        - name: status_type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/StatusType"
          description: To return utterances that were recognized and handled, use Detected. To return utterances that were not recognized, use Missed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUtterancesViewResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Gets a list of tags associated with the specified resource. Only bots, bot aliases, and bot channels can have tags associated with them.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the resource to get a list of tags for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds the specified tags to the specified resource. If a tag key already exists, the existing value is replaced with the new value.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the bot, bot alias, or bot channel to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - tags
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from a bot, bot alias or bot channel.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the resource to remove the tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of tag keys to remove from the resource. If a tag key does not exist on the resource, it is ignored.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /bots/{name}/versions/$LATEST:
    put:
      operationId: PutBot
      description: Creates an Amazon Lex conversational bot or replaces an existing bot. When you create or update a bot you are only required to specify a name, a locale, and whether the bot is directed toward children under age 13. You can use this to add intents later, or to remove intents from an existing bot. When you create a bot with the minimum information, the bot is created or updated but Amazon Lex returns the response FAILED. You can build the bot after you add one or more intents. For more information about Amazon Lex bots, see how-it-works. If you specify the name of an existing bot, the fields in the request replace the existing values in the $LATEST version of the bot. Amazon Lex removes any fields that you don't provide values for in the request, except for the idleTTLInSeconds and privacySettings fields, which are set to their default values. If you don't specify values for required fields, Amazon Lex throws an exception. This operation requires permissions for the lex:PutBot action. For more information, see security-iam.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot. The name is not case sensitive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                intents:
                  $ref: "#/components/schemas/IntentList"
                enableModelImprovements:
                  $ref: "#/components/schemas/Boolean"
                nluIntentConfidenceThreshold:
                  $ref: "#/components/schemas/ConfidenceThreshold"
                clarificationPrompt:
                  $ref: "#/components/schemas/Prompt"
                abortStatement:
                  $ref: "#/components/schemas/Statement"
                idleSessionTTLInSeconds:
                  $ref: "#/components/schemas/SessionTTL"
                voiceId:
                  $ref: "#/components/schemas/String"
                checksum:
                  $ref: "#/components/schemas/String"
                processBehavior:
                  $ref: "#/components/schemas/ProcessBehavior"
                locale:
                  $ref: "#/components/schemas/Locale"
                childDirected:
                  $ref: "#/components/schemas/Boolean"
                detectSentiment:
                  $ref: "#/components/schemas/Boolean"
                createVersion:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - locale
                - childDirected
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutBotResponse"
  /intents/{name}/versions/$LATEST:
    put:
      operationId: PutIntent
      description: "Creates an intent or replaces an existing intent. To define the interaction between the user and your bot, you use one or more intents. For a pizza ordering bot, for example, you would create an OrderPizza intent. To create an intent or replace an existing intent, you must provide the following: Intent name. For example, OrderPizza. Sample utterances. For example, \"Can I order a pizza, please.\" and \"I want to order a pizza.\" Information to be gathered. You specify slot types for the information that your bot will request from the user. You can specify standard slot types, such as a date or a time, or custom slot types such as the size and crust of a pizza. How the intent will be fulfilled. You can provide a Lambda function or configure the intent to return the intent information to the client application. If you use a Lambda function, when all of the intent information is available, Amazon Lex invokes your Lambda function. If you configure your intent to return the intent information to the client application. You can specify other optional information in the request, such as: A confirmation prompt to ask the user to confirm an intent. For example, \"Shall I order your pizza?\" A conclusion statement to send to the user after the intent has been fulfilled. For example, \"I placed your pizza order.\" A follow-up prompt that asks the user for additional activity. For example, asking \"Do you want to order a drink with your pizza?\" If you specify an existing intent name to update the intent, Amazon Lex replaces the values in the $LATEST version of the intent with the values in the request. Amazon Lex removes fields that you don't provide in the request. If you don't specify the required fields, Amazon Lex throws an exception. When you update the $LATEST version of an intent, the status field of any bot that uses the $LATEST version of the intent is set to NOT_BUILT. For more information, see how-it-works. This operation requires permissions for the lex:PutIntent action."
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IntentName"
          description: The name of the intent. The name is not case sensitive. The name can't match a built-in intent name, or a built-in intent name with "AMAZON." removed. For example, because there is a built-in intent called AMAZON.HelpIntent, you can't create a custom intent called HelpIntent. For a list of built-in intents, see Standard Built-in Intents in the Alexa Skills Kit.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                slots:
                  $ref: "#/components/schemas/SlotList"
                sampleUtterances:
                  $ref: "#/components/schemas/IntentUtteranceList"
                confirmationPrompt:
                  $ref: "#/components/schemas/Prompt"
                rejectionStatement:
                  $ref: "#/components/schemas/Statement"
                followUpPrompt:
                  $ref: "#/components/schemas/FollowUpPrompt"
                conclusionStatement:
                  $ref: "#/components/schemas/Statement"
                dialogCodeHook:
                  $ref: "#/components/schemas/CodeHook"
                fulfillmentActivity:
                  $ref: "#/components/schemas/FulfillmentActivity"
                parentIntentSignature:
                  $ref: "#/components/schemas/BuiltinIntentSignature"
                checksum:
                  $ref: "#/components/schemas/String"
                createVersion:
                  $ref: "#/components/schemas/Boolean"
                kendraConfiguration:
                  $ref: "#/components/schemas/KendraConfiguration"
                inputContexts:
                  $ref: "#/components/schemas/InputContextList"
                outputContexts:
                  $ref: "#/components/schemas/OutputContextList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutIntentResponse"
  /slottypes/{name}/versions/$LATEST:
    put:
      operationId: PutSlotType
      description: Creates a custom slot type or replaces an existing custom slot type. To create a custom slot type, specify a name for the slot type and a set of enumeration values, which are the values that a slot of this type can assume. For more information, see how-it-works. If you specify the name of an existing slot type, the fields in the request replace the existing values in the $LATEST version of the slot type. Amazon Lex removes the fields that you don't provide in the request. If you don't specify required fields, Amazon Lex throws an exception. When you update the $LATEST version of a slot type, if a bot uses the $LATEST version of an intent that contains the slot type, the bot's status field is set to NOT_BUILT. This operation requires permissions for the lex:PutSlotType action.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SlotTypeName"
          description: The name of the slot type. The name is not case sensitive. The name can't match a built-in slot type name, or a built-in slot type name with "AMAZON." removed. For example, because there is a built-in slot type called AMAZON.DATE, you can't create a custom slot type called DATE. For a list of built-in slot types, see Slot Type Reference in the Alexa Skills Kit.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                enumerationValues:
                  $ref: "#/components/schemas/EnumerationValues"
                checksum:
                  $ref: "#/components/schemas/String"
                valueSelectionStrategy:
                  $ref: "#/components/schemas/SlotValueSelectionStrategy"
                createVersion:
                  $ref: "#/components/schemas/Boolean"
                parentSlotTypeSignature:
                  $ref: "#/components/schemas/CustomOrBuiltinSlotTypeName"
                slotTypeConfigurations:
                  $ref: "#/components/schemas/SlotTypeConfigurations"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSlotTypeResponse"
  /imports/:
    post:
      operationId: StartImport
      description: Starts a job to import a resource to Amazon Lex.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  $ref: "#/components/schemas/Blob"
                resourceType:
                  $ref: "#/components/schemas/ResourceType"
                mergeStrategy:
                  $ref: "#/components/schemas/MergeStrategy"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - payload
                - resourceType
                - mergeStrategy
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartImportResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BotName:
      type: string
      minLength: 2
      maxLength: 50
      pattern: ^([A-Za-z]_?)+$
    String:
      type: string
    CreateBotVersionResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/BotName"
          description: The name of the bot.
        description:
          $ref: "#/components/schemas/Description"
          description: A description of the bot.
        intents:
          $ref: "#/components/schemas/IntentList"
          description: An array of Intent objects. For more information, see PutBot.
        clarificationPrompt:
          $ref: "#/components/schemas/Prompt"
          description: The message that Amazon Lex uses when it doesn't understand the user's request. For more information, see PutBot.
        abortStatement:
          $ref: "#/components/schemas/Statement"
          description: The message that Amazon Lex uses to cancel a conversation. For more information, see PutBot.
        status:
          $ref: "#/components/schemas/Status"
          description: When you send a request to create or update a bot, Amazon Lex sets the status response element to BUILDING. After Amazon Lex builds the bot, it sets status to READY. If Amazon Lex can't build the bot, it sets status to FAILED. Amazon Lex returns the reason for the failure in the failureReason response element.
        failureReason:
          $ref: "#/components/schemas/String"
          description: If status is FAILED, Amazon Lex provides the reason that it failed to build the bot.
        lastUpdatedDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the $LATEST version of this bot was updated.
        createdDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the bot version was created.
        idleSessionTTLInSeconds:
          $ref: "#/components/schemas/SessionTTL"
          description: The maximum time in seconds that Amazon Lex retains the data gathered in a conversation. For more information, see PutBot.
        voiceId:
          $ref: "#/components/schemas/String"
          description: The Amazon Polly voice ID that Amazon Lex uses for voice interactions with the user.
        checksum:
          $ref: "#/components/schemas/String"
          description: Checksum identifying the version of the bot that was created.
        version:
          $ref: "#/components/schemas/Version"
          description: The version of the bot.
        locale:
          $ref: "#/components/schemas/Locale"
          description: Specifies the target locale for the bot.
        childDirected:
          $ref: "#/components/schemas/Boolean"
          description: For each Amazon Lex bot created with the Amazon Lex Model Building Service, you must specify whether your use of Amazon Lex is related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to the Children's Online Privacy Protection Act (COPPA) by specifying true or false in the childDirected field. By specifying true in the childDirected field, you confirm that your use of Amazon Lex is related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to COPPA. By specifying false in the childDirected field, you confirm that your use of Amazon Lex is not related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to COPPA. You may not specify a default value for the childDirected field that does not accurately reflect whether your use of Amazon Lex is related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to COPPA. If your use of Amazon Lex relates to a website, program, or other application that is directed in whole or in part, to children under age 13, you must obtain any required verifiable parental consent under COPPA. For information regarding the use of Amazon Lex in connection with websites, programs, or other applications that are directed or targeted, in whole or in part, to children under age 13, see the Amazon Lex FAQ.
        enableModelImprovements:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the bot uses accuracy improvements. true indicates that the bot is using the improvements, otherwise, false.
        detectSentiment:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether utterances entered by the user should be sent to Amazon Comprehend for sentiment analysis.
    Description:
      type: string
      minLength: 0
      maxLength: 200
    IntentList:
      type: array
      items:
        $ref: "#/components/schemas/Intent"
    Intent:
      description: Identifies the specific version of an intent.
      type: object
      properties:
        intentName:
          $ref: "#/components/schemas/IntentName"
          description: The name of the intent.
        intentVersion:
          $ref: "#/components/schemas/Version"
          description: The version of the intent.
      required:
        - intentName
        - intentVersion
    IntentName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z]_?)+$
    Version:
      type: string
      minLength: 1
      maxLength: 64
      pattern: \$LATEST|[0-9]+
    Prompt:
      description: Obtains information from the user. To define a prompt, provide one or more messages and specify the number of attempts to get information from the user. If you provide more than one message, Amazon Lex chooses one of the messages to use to prompt the user. For more information, see how-it-works.
      type: object
      properties:
        messages:
          $ref: "#/components/schemas/MessageList"
          description: An array of objects, each of which provides a message string and its type. You can specify the message string in plain text or in Speech Synthesis Markup Language (SSML).
        maxAttempts:
          $ref: "#/components/schemas/PromptMaxAttempts"
          description: The number of times to prompt the user for information.
        responseCard:
          $ref: "#/components/schemas/ResponseCard"
          description: A response card. Amazon Lex uses this prompt at runtime, in the PostText API response. It substitutes session attributes and slot values for placeholders in the response card. For more information, see ex-resp-card.
      required:
        - messages
        - maxAttempts
    MessageList:
      type: array
      items:
        $ref: "#/components/schemas/Message"
    Message:
      description: The message object that provides the message text and its type.
      type: object
      properties:
        contentType:
          $ref: "#/components/schemas/ContentType"
          description: The content type of the message string.
        content:
          $ref: "#/components/schemas/ContentString"
          description: The text of the message.
        groupNumber:
          $ref: "#/components/schemas/GroupNumber"
          description: Identifies the message group that the message belongs to. When a group is assigned to a message, Amazon Lex returns one message from each group in the response.
      required:
        - contentType
        - content
    ContentType:
      type: string
      enum:
        - PlainText
        - SSML
        - CustomPayload
    ContentString:
      type: string
      minLength: 1
      maxLength: 1000
    GroupNumber:
      type: integer
      minimum: 1
      maximum: 5
    PromptMaxAttempts:
      type: integer
      minimum: 1
      maximum: 5
    ResponseCard:
      type: string
      minLength: 1
      maxLength: 50000
    Statement:
      description: A collection of messages that convey information to the user. At runtime, Amazon Lex selects the message to convey.
      type: object
      properties:
        messages:
          $ref: "#/components/schemas/MessageList"
          description: A collection of message objects.
        responseCard:
          $ref: "#/components/schemas/ResponseCard"
          description: At runtime, if the client is using the PostText API, Amazon Lex includes the response card in the response. It substitutes all of the session attributes and slot values for placeholders in the response card.
      required:
        - messages
    Status:
      type: string
      enum:
        - BUILDING
        - READY
        - READY_BASIC_TESTING
        - FAILED
        - NOT_BUILT
    Timestamp:
      type: string
      format: date-time
    SessionTTL:
      type: integer
      minimum: 60
      maximum: 86400
    Locale:
      type: string
      enum:
        - de-DE
        - en-AU
        - en-GB
        - en-IN
        - en-US
        - es-419
        - es-ES
        - es-US
        - fr-FR
        - fr-CA
        - it-IT
        - ja-JP
        - ko-KR
    Boolean:
      type: boolean
    CreateIntentVersionResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/IntentName"
          description: The name of the intent.
        description:
          $ref: "#/components/schemas/Description"
          description: A description of the intent.
        slots:
          $ref: "#/components/schemas/SlotList"
          description: An array of slot types that defines the information required to fulfill the intent.
        sampleUtterances:
          $ref: "#/components/schemas/IntentUtteranceList"
          description: An array of sample utterances configured for the intent.
        confirmationPrompt:
          $ref: "#/components/schemas/Prompt"
          description: If defined, the prompt that Amazon Lex uses to confirm the user's intent before fulfilling it.
        rejectionStatement:
          $ref: "#/components/schemas/Statement"
          description: If the user answers "no" to the question defined in confirmationPrompt, Amazon Lex responds with this statement to acknowledge that the intent was canceled.
        followUpPrompt:
          $ref: "#/components/schemas/FollowUpPrompt"
          description: If defined, Amazon Lex uses this prompt to solicit additional user activity after the intent is fulfilled.
        conclusionStatement:
          $ref: "#/components/schemas/Statement"
          description: After the Lambda function specified in the fulfillmentActivity field fulfills the intent, Amazon Lex conveys this statement to the user.
        dialogCodeHook:
          $ref: "#/components/schemas/CodeHook"
          description: If defined, Amazon Lex invokes this Lambda function for each user input.
        fulfillmentActivity:
          $ref: "#/components/schemas/FulfillmentActivity"
          description: Describes how the intent is fulfilled.
        parentIntentSignature:
          $ref: "#/components/schemas/BuiltinIntentSignature"
          description: A unique identifier for a built-in intent.
        lastUpdatedDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the intent was updated.
        createdDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the intent was created.
        version:
          $ref: "#/components/schemas/Version"
          description: The version number assigned to the new version of the intent.
        checksum:
          $ref: "#/components/schemas/String"
          description: Checksum of the intent version created.
        kendraConfiguration:
          $ref: "#/components/schemas/KendraConfiguration"
          description: Configuration information, if any, for connecting an Amazon Kendra index with the AMAZON.KendraSearchIntent intent.
        inputContexts:
          $ref: "#/components/schemas/InputContextList"
          description: An array of InputContext objects that lists the contexts that must be active for Amazon Lex to choose the intent in a conversation with the user.
        outputContexts:
          $ref: "#/components/schemas/OutputContextList"
          description: An array of OutputContext objects that lists the contexts that the intent activates when the intent is fulfilled.
    SlotList:
      type: array
      items:
        $ref: "#/components/schemas/Slot"
    Slot:
      description: Identifies the version of a specific slot.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/SlotName"
          description: The name of the slot.
        description:
          $ref: "#/components/schemas/Description"
          description: A description of the slot.
        slotConstraint:
          $ref: "#/components/schemas/SlotConstraint"
          description: Specifies whether the slot is required or optional.
        slotType:
          $ref: "#/components/schemas/CustomOrBuiltinSlotTypeName"
          description: The type of the slot, either a custom slot type that you defined or one of the built-in slot types.
        slotTypeVersion:
          $ref: "#/components/schemas/Version"
          description: The version of the slot type.
        valueElicitationPrompt:
          $ref: "#/components/schemas/Prompt"
          description: The prompt that Amazon Lex uses to elicit the slot value from the user.
        priority:
          $ref: "#/components/schemas/Priority"
          description: Directs Amazon Lex the order in which to elicit this slot value from the user. For example, if the intent has two slots with priorities 1 and 2, AWS Amazon Lex first elicits a value for the slot with priority 1. If multiple slots share the same priority, the order in which Amazon Lex elicits values is arbitrary.
        sampleUtterances:
          $ref: "#/components/schemas/SlotUtteranceList"
          description: If you know a specific pattern with which users might respond to an Amazon Lex request for a slot value, you can provide those utterances to improve accuracy. This is optional. In most cases, Amazon Lex is capable of understanding user utterances.
        responseCard:
          $ref: "#/components/schemas/ResponseCard"
          description: A set of possible responses for the slot type used by text-based clients. A user chooses an option from the response card, instead of using text to reply.
        obfuscationSetting:
          $ref: "#/components/schemas/ObfuscationSetting"
          description: Determines whether a slot is obfuscated in conversation logs and stored utterances. When you obfuscate a slot, the value is replaced by the slot name in curly braces ({}). For example, if the slot name is "full_name", obfuscated values are replaced with "{full_name}". For more information, see Slot Obfuscation .
        defaultValueSpec:
          $ref: "#/components/schemas/SlotDefaultValueSpec"
          description: A list of default values for the slot. Default values are used when Amazon Lex hasn't determined a value for a slot. You can specify default values from context variables, session attributes, and defined values.
      required:
        - name
        - slotConstraint
    SlotName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z](-|_|.)?)+$
    SlotConstraint:
      type: string
      enum:
        - Required
        - Optional
    CustomOrBuiltinSlotTypeName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^((AMAZON\.)_?|[A-Za-z]_?)+
    Priority:
      type: integer
      minimum: 0
      maximum: 100
    SlotUtteranceList:
      type: array
      items:
        $ref: "#/components/schemas/Utterance"
    Utterance:
      type: string
      minLength: 1
      maxLength: 200
    ObfuscationSetting:
      type: string
      enum:
        - NONE
        - DEFAULT_OBFUSCATION
    SlotDefaultValueSpec:
      description: Contains the default values for a slot. Default values are used when Amazon Lex hasn't determined a value for a slot.
      type: object
      properties:
        defaultValueList:
          $ref: "#/components/schemas/SlotDefaultValueList"
          description: The default values for a slot. You can specify more than one default. For example, you can specify a default value to use from a matching context variable, a session attribute, or a fixed value. The default value chosen is selected based on the order that you specify them in the list. For example, if you specify a context variable and a fixed value in that order, Amazon Lex uses the context variable if it is available, else it uses the fixed value.
      required:
        - defaultValueList
    SlotDefaultValueList:
      type: array
      items:
        $ref: "#/components/schemas/SlotDefaultValue"
    SlotDefaultValue:
      description: A default value for a slot.
      type: object
      properties:
        defaultValue:
          $ref: "#/components/schemas/SlotDefaultValueString"
          description: "The default value for the slot. You can specify one of the following: #context-name.slot-name - The slot value \"slot-name\" in the context \"context-name.\" {attribute} - The slot value of the session attribute \"attribute.\" 'value' - The discrete value \"value.\""
      required:
        - defaultValue
    SlotDefaultValueString:
      type: string
      minLength: 1
      maxLength: 202
    IntentUtteranceList:
      type: array
      items:
        $ref: "#/components/schemas/Utterance"
    FollowUpPrompt:
      description: A prompt for additional activity after an intent is fulfilled. For example, after the OrderPizza intent is fulfilled, you might prompt the user to find out whether the user wants to order drinks.
      type: object
      properties:
        prompt:
          $ref: "#/components/schemas/Prompt"
          description: Prompts for information from the user.
        rejectionStatement:
          $ref: "#/components/schemas/Statement"
          description: If the user answers "no" to the question defined in the prompt field, Amazon Lex responds with this statement to acknowledge that the intent was canceled.
      required:
        - prompt
        - rejectionStatement
    CodeHook:
      description: Specifies a Lambda function that verifies requests to a bot or fulfills the user's request to a bot..
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/LambdaARN"
          description: The Amazon Resource Name (ARN) of the Lambda function.
        messageVersion:
          $ref: "#/components/schemas/MessageVersion"
          description: The version of the request-response that you want Amazon Lex to use to invoke your Lambda function. For more information, see using-lambda.
      required:
        - uri
        - messageVersion
    LambdaARN:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[a-zA-Z-]*:lambda:[a-z]+-[a-z]+(-[a-z]+)*-[0-9]:[0-9]{12}:function:[a-zA-Z0-9-_]+(\/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})?(:[a-zA-Z0-9-_]+)?
    MessageVersion:
      type: string
      minLength: 1
      maxLength: 5
    FulfillmentActivity:
      description: "Describes how the intent is fulfilled after the user provides all of the information required for the intent. You can provide a Lambda function to process the intent, or you can return the intent information to the client application. We recommend that you use a Lambda function so that the relevant logic lives in the Cloud and limit the client-side code primarily to presentation. If you need to update the logic, you only update the Lambda function; you don't need to upgrade your client application. Consider the following examples: In a pizza ordering application, after the user provides all of the information for placing an order, you use a Lambda function to place an order with a pizzeria. In a gaming application, when a user says \"pick up a rock,\" this information must go back to the client application so that it can perform the operation and update the graphics. In this case, you want Amazon Lex to return the intent data to the client."
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/FulfillmentActivityType"
          description: How the intent should be fulfilled, either by running a Lambda function or by returning the slot data to the client application.
        codeHook:
          $ref: "#/components/schemas/CodeHook"
          description: A description of the Lambda function that is run to fulfill the intent.
      required:
        - type_
    FulfillmentActivityType:
      type: string
      enum:
        - ReturnIntent
        - CodeHook
    BuiltinIntentSignature:
      type: string
    KendraConfiguration:
      description: Provides configuration information for the AMAZON.KendraSearchIntent intent. When you use this intent, Amazon Lex searches the specified Amazon Kendra index and returns documents from the index that match the user's utterance. For more information, see AMAZON.KendraSearchIntent.
      type: object
      properties:
        kendraIndex:
          $ref: "#/components/schemas/KendraIndexArn"
          description: The Amazon Resource Name (ARN) of the Amazon Kendra index that you want the AMAZON.KendraSearchIntent intent to search. The index must be in the same account and Region as the Amazon Lex bot. If the Amazon Kendra index does not exist, you get an exception when you call the PutIntent operation.
        queryFilterString:
          $ref: "#/components/schemas/QueryFilterString"
          description: A query filter that Amazon Lex sends to Amazon Kendra to filter the response from the query. The filter is in the format defined by Amazon Kendra. For more information, see Filtering queries. You can override this filter string with a new filter string at runtime.
        role:
          $ref: "#/components/schemas/roleArn"
          description: The Amazon Resource Name (ARN) of an IAM role that has permission to search the Amazon Kendra index. The role must be in the same account and Region as the Amazon Lex bot. If the role does not exist, you get an exception when you call the PutIntent operation.
      required:
        - kendraIndex
        - role
    KendraIndexArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws:kendra:[a-z]+-[a-z]+-[0-9]:[0-9]{12}:index\/[a-zA-Z0-9][a-zA-Z0-9_-]*
    QueryFilterString:
      type: string
      minLength: 0
    roleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws:iam::[0-9]{12}:role/.*
    InputContextList:
      type: array
      items:
        $ref: "#/components/schemas/InputContext"
    InputContext:
      description: The name of a context that must be active for an intent to be selected by Amazon Lex.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/InputContextName"
          description: The name of the context.
      required:
        - name
    InputContextName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z]_?)+$
    OutputContextList:
      type: array
      items:
        $ref: "#/components/schemas/OutputContext"
    OutputContext:
      description: The specification of an output context that is set when an intent is fulfilled.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/OutputContextName"
          description: The name of the context.
        timeToLiveInSeconds:
          $ref: "#/components/schemas/ContextTimeToLiveInSeconds"
          description: The number of seconds that the context should be active after it is first sent in a PostContent or PostText response. You can set the value between 5 and 86,400 seconds (24 hours).
        turnsToLive:
          $ref: "#/components/schemas/ContextTurnsToLive"
          description: The number of conversation turns that the context should be active. A conversation turn is one PostContent or PostText request and the corresponding response from Amazon Lex.
      required:
        - name
        - timeToLiveInSeconds
        - turnsToLive
    OutputContextName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z]_?)+$
    ContextTimeToLiveInSeconds:
      type: integer
      minimum: 5
      maximum: 86400
    ContextTurnsToLive:
      type: integer
      minimum: 1
      maximum: 20
    SlotTypeName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z]_?)+$
    CreateSlotTypeVersionResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/SlotTypeName"
          description: The name of the slot type.
        description:
          $ref: "#/components/schemas/Description"
          description: A description of the slot type.
        enumerationValues:
          $ref: "#/components/schemas/EnumerationValues"
          description: A list of EnumerationValue objects that defines the values that the slot type can take.
        lastUpdatedDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the slot type was updated. When you create a resource, the creation date and last update date are the same.
        createdDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the slot type was created.
        version:
          $ref: "#/components/schemas/Version"
          description: The version assigned to the new slot type version.
        checksum:
          $ref: "#/components/schemas/String"
          description: Checksum of the $LATEST version of the slot type.
        valueSelectionStrategy:
          $ref: "#/components/schemas/SlotValueSelectionStrategy"
          description: The strategy that Amazon Lex uses to determine the value of the slot. For more information, see PutSlotType.
        parentSlotTypeSignature:
          $ref: "#/components/schemas/CustomOrBuiltinSlotTypeName"
          description: The built-in slot type used a the parent of the slot type.
        slotTypeConfigurations:
          $ref: "#/components/schemas/SlotTypeConfigurations"
          description: Configuration information that extends the parent built-in slot type.
    EnumerationValues:
      type: array
      items:
        $ref: "#/components/schemas/EnumerationValue"
    EnumerationValue:
      description: Each slot type can have a set of values. Each enumeration value represents a value the slot type can take. For example, a pizza ordering bot could have a slot type that specifies the type of crust that the pizza should have. The slot type could include the values thick thin stuffed
      type: object
      properties:
        value:
          $ref: "#/components/schemas/Value"
          description: The value of the slot type.
        synonyms:
          $ref: "#/components/schemas/SynonymList"
          description: Additional values related to the slot type value.
      required:
        - value
    Value:
      type: string
      minLength: 1
      maxLength: 140
    SynonymList:
      type: array
      items:
        $ref: "#/components/schemas/Value"
    SlotValueSelectionStrategy:
      type: string
      enum:
        - ORIGINAL_VALUE
        - TOP_RESOLUTION
    SlotTypeConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/SlotTypeConfiguration"
    SlotTypeConfiguration:
      description: Provides configuration information for a slot type.
      type: object
      properties:
        regexConfiguration:
          $ref: "#/components/schemas/SlotTypeRegexConfiguration"
          description: A regular expression used to validate the value of a slot.
    SlotTypeRegexConfiguration:
      description: Provides a regular expression used to validate the value of a slot.
      type: object
      properties:
        pattern_:
          $ref: "#/components/schemas/RegexPattern"
          description: 'A regular expression used to validate the value of a slot. Use a standard regular expression. Amazon Lex supports the following characters in the regular expression: A-Z, a-z 0-9 Unicode characters ("\ u`<Unicode>`") Represent Unicode characters with four digits, for example "\u0041" or "\u005A". The following regular expression operators are not supported: Infinite repeaters: *, +, or {x,} with no upper bound. Wild card (.)'
      required:
        - pattern_
    RegexPattern:
      type: string
      minLength: 1
      maxLength: 100
    AliasName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z]_?)+$
    BotChannelName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z]_?)+$
    NumericalVersion:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[0-9]+"
    UserId:
      type: string
      minLength: 2
      maxLength: 100
    GetBotResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/BotName"
          description: The name of the bot.
        description:
          $ref: "#/components/schemas/Description"
          description: A description of the bot.
        intents:
          $ref: "#/components/schemas/IntentList"
          description: An array of intent objects. For more information, see PutBot.
        enableModelImprovements:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the bot uses accuracy improvements. true indicates that the bot is using the improvements, otherwise, false.
        nluIntentConfidenceThreshold:
          $ref: "#/components/schemas/ConfidenceThreshold"
          description: The score that determines where Amazon Lex inserts the AMAZON.FallbackIntent, AMAZON.KendraSearchIntent, or both when returning alternative intents in a PostContent or PostText response. AMAZON.FallbackIntent is inserted if the confidence score for all intents is below this value. AMAZON.KendraSearchIntent is only inserted if it is configured for the bot.
        clarificationPrompt:
          $ref: "#/components/schemas/Prompt"
          description: The message Amazon Lex uses when it doesn't understand the user's request. For more information, see PutBot.
        abortStatement:
          $ref: "#/components/schemas/Statement"
          description: The message that Amazon Lex returns when the user elects to end the conversation without completing it. For more information, see PutBot.
        status:
          $ref: "#/components/schemas/Status"
          description: The status of the bot. When the status is BUILDING Amazon Lex is building the bot for testing and use. If the status of the bot is READY_BASIC_TESTING, you can test the bot using the exact utterances specified in the bot's intents. When the bot is ready for full testing or to run, the status is READY. If there was a problem with building the bot, the status is FAILED and the failureReason field explains why the bot did not build. If the bot was saved but not built, the status is NOT_BUILT.
        failureReason:
          $ref: "#/components/schemas/String"
          description: If status is FAILED, Amazon Lex explains why it failed to build the bot.
        lastUpdatedDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the bot was updated. When you create a resource, the creation date and last updated date are the same.
        createdDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the bot was created.
        idleSessionTTLInSeconds:
          $ref: "#/components/schemas/SessionTTL"
          description: The maximum time in seconds that Amazon Lex retains the data gathered in a conversation. For more information, see PutBot.
        voiceId:
          $ref: "#/components/schemas/String"
          description: The Amazon Polly voice ID that Amazon Lex uses for voice interaction with the user. For more information, see PutBot.
        checksum:
          $ref: "#/components/schemas/String"
          description: Checksum of the bot used to identify a specific revision of the bot's $LATEST version.
        version:
          $ref: "#/components/schemas/Version"
          description: The version of the bot. For a new bot, the version is always $LATEST.
        locale:
          $ref: "#/components/schemas/Locale"
          description: The target locale for the bot.
        childDirected:
          $ref: "#/components/schemas/Boolean"
          description: For each Amazon Lex bot created with the Amazon Lex Model Building Service, you must specify whether your use of Amazon Lex is related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to the Children's Online Privacy Protection Act (COPPA) by specifying true or false in the childDirected field. By specifying true in the childDirected field, you confirm that your use of Amazon Lex is related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to COPPA. By specifying false in the childDirected field, you confirm that your use of Amazon Lex is not related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to COPPA. You may not specify a default value for the childDirected field that does not accurately reflect whether your use of Amazon Lex is related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to COPPA. If your use of Amazon Lex relates to a website, program, or other application that is directed in whole or in part, to children under age 13, you must obtain any required verifiable parental consent under COPPA. For information regarding the use of Amazon Lex in connection with websites, programs, or other applications that are directed or targeted, in whole or in part, to children under age 13, see the Amazon Lex FAQ.
        detectSentiment:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether user utterances should be sent to Amazon Comprehend for sentiment analysis.
