    SynthesizeSpeechOutput:
      type: object
      properties:
        AudioStream:
          $ref: "#/components/schemas/AudioStream"
          description: Stream containing the synthesized speech.
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: Specifies the type audio stream. This should reflect the OutputFormat parameter in your request. If you request mp3 as the OutputFormat, the ContentType returned is audio/mpeg. If you request ogg_vorbis as the OutputFormat, the ContentType returned is audio/ogg. If you request ogg_opus as the OutputFormat, the ContentType returned is audio/ogg. If you request pcm as the OutputFormat, the ContentType returned is audio/pcm in a signed 16-bit, 1 channel (mono), little-endian format. If you request mu-law as the OutputFormat, the ContentType returned is audio/mulaw. If you request a-law as the OutputFormat, the ContentType returned is audio/alaw. If you request json as the OutputFormat, the ContentType returned is application/x-json-stream.
        RequestCharacters:
          $ref: "#/components/schemas/RequestCharacters"
          description: Number of characters synthesized.
    AudioStream:
      type: string
      format: byte
    ContentType:
      type: string
