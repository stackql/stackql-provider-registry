    CoralAvailabilityThrottledResource:
      type: string
    OutputS3BucketName:
      type: string
      pattern: ^[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9]$
    OutputS3KeyPrefix:
      type: string
      pattern: ^[0-9a-zA-Z\/\!\-_\.\*\'\(\):;\$@=+\,\?&]{0,800}$
    StartSpeechSynthesisTaskOutput:
      type: object
      properties:
        SynthesisTask:
          $ref: "#/components/schemas/SynthesisTask"
