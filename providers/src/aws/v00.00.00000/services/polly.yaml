openapi: 3.0.0
info:
  version: "2016-06-10"
  title: Amazon Polly
  description: Amazon Polly
  x-serviceName: polly
  x-serviceAlias: polly
  x-protocol: rest-json
  x-apiVersion: "2016-06-10"
  x-endpointPrefix: polly
servers:
  - url: https://polly.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for polly
paths:
  /v1/lexicons/{lexicon_name}:
    delete:
      operationId: DeleteLexicon
      description: Deletes the specified pronunciation lexicon stored in an Amazon Web Services Region. A lexicon which has been deleted is not available for speech synthesis, nor is it possible to retrieve it using either the GetLexicon or ListLexicon APIs. For more information, see Managing Lexicons.
      parameters:
        - name: lexicon_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LexiconName"
          description: The name of the lexicon to delete. Must be an existing lexicon in the region.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLexiconOutput"
    get:
      operationId: GetLexicon
      description: Returns the content of the specified pronunciation lexicon stored in an Amazon Web Services Region. For more information, see Managing Lexicons.
      parameters:
        - name: lexicon_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LexiconName"
          description: Name of the lexicon.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLexiconOutput"
    put:
      operationId: PutLexicon
      description: Stores a pronunciation lexicon in an Amazon Web Services Region. If a lexicon with the same name already exists in the region, it is overwritten by the new lexicon. Lexicon operations have eventual consistency, therefore, it might take some time before the lexicon is available to the SynthesizeSpeech operation. For more information, see Managing Lexicons.
      parameters:
        - name: lexicon_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LexiconName"
          description: Name of the lexicon. The name must follow the regular express format [0-9A-Za-z]{1,20}. That is, the name is a case-sensitive alphanumeric string up to 20 characters long.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Content:
                  $ref: "#/components/schemas/LexiconContent"
              required:
                - Content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutLexiconOutput"
  /v1/voices:
    get:
      operationId: DescribeVoices
      description: Returns the list of voices that are available for use when requesting speech synthesis. Each voice speaks a specified language, is either male or female, and is identified by an ID, which is the ASCII version of the voice name. When synthesizing speech ( SynthesizeSpeech ), you provide the voice ID for the voice you want from the list of voices returned by DescribeVoices. For example, you want your news reader application to read news in a specific language, but giving a user the option to choose the voice. Using the DescribeVoices operation you can provide the user with a list of available voices to select from. You can optionally specify a language code to filter the available voices. For example, if you specify en-US, the operation returns a list of all available US English voices. This operation requires permissions to perform the polly:DescribeVoices action.
      parameters:
        - name: Engine
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Engine"
          description: Specifies the engine (standard, neural, long-form or generative) used by Amazon Polly when processing input text for speech synthesis.
        - name: LanguageCode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LanguageCode"
          description: The language identification tag (ISO 639 code for the language name-ISO 3166 country code) for filtering the list of voices returned. If you don't specify this optional parameter, all available voices are returned.
        - name: IncludeAdditionalLanguageCodes
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IncludeAdditionalLanguageCodes"
          description: Boolean value indicating whether to return any bilingual voices that use the specified language as an additional language. For instance, if you request all languages that use US English (es-US), and there is an Italian voice that speaks both Italian (it-IT) and US English, that voice will be included if you specify yes but not if you specify no.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: An opaque pagination token returned from the previous DescribeVoices operation. If present, this indicates where to continue the listing.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeVoicesOutput"
  /v1/synthesisTasks/{task_id}:
    get:
      operationId: GetSpeechSynthesisTask
      description: Retrieves a specific SpeechSynthesisTask object based on its TaskID. This object contains information about the given speech synthesis task, including the status of the task, and a link to the S3 bucket containing the output of the task.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TaskId"
          description: The Amazon Polly generated identifier for a speech synthesis task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSpeechSynthesisTaskOutput"
  /v1/lexicons:
    get:
      operationId: ListLexicons
      description: Returns a list of pronunciation lexicons stored in an Amazon Web Services Region. For more information, see Managing Lexicons.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: An opaque pagination token returned from previous ListLexicons operation. If present, indicates where to continue the list of lexicons.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLexiconsOutput"
  /v1/synthesisTasks:
    get:
      operationId: ListSpeechSynthesisTasks
      description: Returns a list of SpeechSynthesisTask objects ordered by their creation date. This operation can filter the tasks by their status, for example, allowing users to list only tasks that are completed.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Maximum number of speech synthesis tasks returned in a List operation.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The pagination token to use in the next request to continue the listing of speech synthesis tasks.
        - name: Status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TaskStatus"
          description: Status of the speech synthesis tasks returned in a List operation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSpeechSynthesisTasksOutput"
    post:
      operationId: StartSpeechSynthesisTask
      description: Allows the creation of an asynchronous synthesis task, by starting a new SpeechSynthesisTask. This operation requires all the standard information needed for speech synthesis, plus the name of an Amazon S3 bucket for the service to store the output of the synthesis task and two optional parameters (OutputS3KeyPrefix and SnsTopicArn). Once the synthesis task is created, this operation will return a SpeechSynthesisTask object, which will include an identifier of this task as well as the current status. The SpeechSynthesisTask object is available for 72 hours after starting the asynchronous synthesis task.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Engine:
                  $ref: "#/components/schemas/Engine"
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                LexiconNames:
                  $ref: "#/components/schemas/LexiconNameList"
                OutputFormat:
                  $ref: "#/components/schemas/OutputFormat"
                OutputS3BucketName:
                  $ref: "#/components/schemas/OutputS3BucketName"
                OutputS3KeyPrefix:
                  $ref: "#/components/schemas/OutputS3KeyPrefix"
                SampleRate:
                  $ref: "#/components/schemas/SampleRate"
                SnsTopicArn:
                  $ref: "#/components/schemas/SnsTopicArn"
                SpeechMarkTypes:
                  $ref: "#/components/schemas/SpeechMarkTypeList"
                Text:
                  $ref: "#/components/schemas/Text"
                TextType:
                  $ref: "#/components/schemas/TextType"
                VoiceId:
                  $ref: "#/components/schemas/VoiceId"
              required:
                - OutputFormat
                - OutputS3BucketName
                - Text
                - VoiceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSpeechSynthesisTaskOutput"
  /v1/synthesisStream:
    post:
      operationId: StartSpeechSynthesisStream
      description: "Synthesizes UTF-8 input, plain text, or SSML over a bidirectional streaming connection. Specify synthesis parameters in HTTP/2 headers, send text incrementally as events on the input stream, and receive synthesized audio as it becomes available. This operation serves as a bidirectional counterpart to SynthesizeSpeech: SynthesizeSpeech"
      parameters:
        - name: x-amzn-Engine
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Engine"
          description: Specifies the engine for Amazon Polly to use when processing input text for speech synthesis. Currently, only the generative engine is supported. If you specify a voice that the selected engine doesn't support, Amazon Polly returns an error.
        - name: x-amzn-LanguageCode
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/LanguageCode"
          description: An optional parameter that sets the language code for the speech synthesis request. Specify this parameter only when using a bilingual voice. If a bilingual voice is used and no language code is specified, Amazon Polly uses the default language of the bilingual voice.
        - name: x-amzn-LexiconNames
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/LexiconNameList"
          description: The names of one or more pronunciation lexicons for the service to apply during synthesis. Amazon Polly applies lexicons only when the lexicon language matches the voice language.
        - name: x-amzn-OutputFormat
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/OutputFormat"
          description: The audio format for the synthesized speech. Currently, Amazon Polly does not support JSON speech marks.
        - name: x-amzn-SampleRate
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SampleRate"
          description: The audio frequency, specified in Hz.
        - name: x-amzn-VoiceId
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/VoiceId"
          description: The voice to use in synthesis. To get a list of available voice IDs, use the DescribeVoices operation.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ActionStream:
                  $ref: "#/components/schemas/StartSpeechSynthesisStreamActionStream"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSpeechSynthesisStreamOutput"
  /v1/speech:
    post:
      operationId: SynthesizeSpeech
      description: Synthesizes UTF-8 input, plain text or SSML, to a stream of bytes. SSML input must be valid, well-formed SSML. Some alphabets might not be available with all the voices (for example, Cyrillic might not be read at all by English voices) unless phoneme mapping is used. For more information, see How it Works.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Engine:
                  $ref: "#/components/schemas/Engine"
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                LexiconNames:
                  $ref: "#/components/schemas/LexiconNameList"
                OutputFormat:
                  $ref: "#/components/schemas/OutputFormat"
                SampleRate:
                  $ref: "#/components/schemas/SampleRate"
                SpeechMarkTypes:
                  $ref: "#/components/schemas/SpeechMarkTypeList"
                Text:
                  $ref: "#/components/schemas/Text"
                TextType:
                  $ref: "#/components/schemas/TextType"
                VoiceId:
                  $ref: "#/components/schemas/VoiceId"
              required:
                - OutputFormat
                - Text
                - VoiceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SynthesizeSpeechOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    LexiconName:
      type: string
      pattern: "[0-9A-Za-z]{1,20}"
    DeleteLexiconOutput:
      type: object
    Engine:
      type: string
      enum:
        - standard
        - neural
        - long-form
        - generative
    LanguageCode:
      type: string
      enum:
        - arb
        - cmn-CN
        - cy-GB
        - da-DK
        - de-DE
        - en-AU
        - en-GB
        - en-GB-WLS
        - en-IN
        - en-US
        - es-ES
        - es-MX
        - es-US
        - fr-CA
        - fr-FR
        - is-IS
        - it-IT
        - ja-JP
        - hi-IN
        - ko-KR
        - nb-NO
        - nl-NL
        - pl-PL
        - pt-BR
        - pt-PT
        - ro-RO
        - ru-RU
        - sv-SE
        - tr-TR
        - en-NZ
        - en-ZA
        - ca-ES
        - de-AT
        - yue-CN
        - ar-AE
        - fi-FI
        - en-IE
        - nl-BE
        - fr-BE
        - cs-CZ
        - de-CH
        - en-SG
    IncludeAdditionalLanguageCodes:
      type: boolean
    NextToken:
      type: string
      minLength: 0
      maxLength: 4096
    DescribeVoicesOutput:
      type: object
      properties:
        Voices:
          $ref: "#/components/schemas/VoiceList"
          description: A list of voices with their properties.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token to use in the next request to continue the listing of voices. NextToken is returned only if the response is truncated.
    VoiceList:
      type: array
      items:
        $ref: "#/components/schemas/Voice"
    Voice:
      description: Description of the voice.
      type: object
      properties:
        Gender:
          $ref: "#/components/schemas/Gender"
          description: Gender of the voice.
        Id:
          $ref: "#/components/schemas/VoiceId"
          description: Amazon Polly assigned voice ID. This is the ID that you specify when calling the SynthesizeSpeech operation.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: Language code of the voice.
        LanguageName:
          $ref: "#/components/schemas/LanguageName"
          description: Human readable name of the language in English.
        Name:
          $ref: "#/components/schemas/VoiceName"
          description: Name of the voice (for example, Salli, Kendra, etc.). This provides a human readable voice name that you might display in your application.
        AdditionalLanguageCodes:
          $ref: "#/components/schemas/LanguageCodeList"
          description: Additional codes for languages available for the specified voice in addition to its default language. For example, the default language for Aditi is Indian English (en-IN) because it was first used for that language. Since Aditi is bilingual and fluent in both Indian English and Hindi, this parameter would show the code hi-IN.
        SupportedEngines:
          $ref: "#/components/schemas/EngineList"
          description: Specifies which engines (standard, neural, long-form or generative) are supported by a given voice.
    Gender:
      type: string
      enum:
        - Female
        - Male
    VoiceId:
      type: string
      enum:
