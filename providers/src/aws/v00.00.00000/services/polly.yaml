    LanguageName:
      type: string
    VoiceName:
      type: string
    LanguageCodeList:
      type: array
      items:
        $ref: "#/components/schemas/LanguageCode"
    EngineList:
      type: array
      items:
        $ref: "#/components/schemas/Engine"
    GetLexiconOutput:
      type: object
      properties:
        Lexicon:
          $ref: "#/components/schemas/Lexicon"
          description: Lexicon object that provides name and the string content of the lexicon.
        LexiconAttributes:
          $ref: "#/components/schemas/LexiconAttributes"
          description: Metadata of the lexicon, including phonetic alphabetic used, language code, lexicon ARN, number of lexemes defined in the lexicon, and size of lexicon in bytes.
    Lexicon:
      description: Provides lexicon name and lexicon content in string format. For more information, see Pronunciation Lexicon Specification (PLS) Version 1.0.
      type: object
      properties:
        Content:
          $ref: "#/components/schemas/LexiconContent"
          description: Lexicon content in string format. The content of a lexicon must be in PLS format.
        Name:
          $ref: "#/components/schemas/LexiconName"
          description: Name of the lexicon.
    LexiconContent:
      type: string
    LexiconAttributes:
      description: Contains metadata describing the lexicon such as the number of lexemes, language code, and so on. For more information, see Managing Lexicons.
      type: object
      properties:
        Alphabet:
          $ref: "#/components/schemas/Alphabet"
          description: Phonetic alphabet used in the lexicon. Valid values are ipa and x-sampa.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: Language code that the lexicon applies to. A lexicon with a language code such as "en" would be applied to all English languages (en-GB, en-US, en-AUS, en-WLS, and so on.
        LastModified:
          $ref: "#/components/schemas/LastModified"
          description: Date lexicon was last modified (a timestamp value).
        LexiconArn:
          $ref: "#/components/schemas/LexiconArn"
          description: Amazon Resource Name (ARN) of the lexicon.
        LexemesCount:
          $ref: "#/components/schemas/LexemesCount"
          description: Number of lexemes in the lexicon.
        Size:
          $ref: "#/components/schemas/Size"
          description: Total size of the lexicon, in characters.
    Alphabet:
      type: string
    LastModified:
      type: string
      format: date-time
    LexiconArn:
      type: string
    LexemesCount:
      type: integer
    Size:
      type: integer
    TaskId:
      type: string
      pattern: ^[a-zA-Z0-9_-]{1,100}$
    GetSpeechSynthesisTaskOutput:
      type: object
      properties:
        SynthesisTask:
          $ref: "#/components/schemas/SynthesisTask"
          description: SynthesisTask object that provides information from the requested task, including output format, creation time, task status, and so on.
    SynthesisTask:
      description: SynthesisTask object that provides information about a speech synthesis task.
      type: object
      properties:
        Engine:
          $ref: "#/components/schemas/Engine"
          description: Specifies the engine (standard, neural, long-form or generative) for Amazon Polly to use when processing input text for speech synthesis. Using a voice that is not supported for the engine selected will result in an error.
        TaskId:
          $ref: "#/components/schemas/TaskId"
          description: The Amazon Polly generated identifier for a speech synthesis task.
        TaskStatus:
          $ref: "#/components/schemas/TaskStatus"
          description: Current status of the individual speech synthesis task.
        TaskStatusReason:
          $ref: "#/components/schemas/TaskStatusReason"
          description: Reason for the current status of a specific speech synthesis task, including errors if the task has failed.
        OutputUri:
          $ref: "#/components/schemas/OutputUri"
          description: Pathway for the output speech file.
        CreationTime:
          $ref: "#/components/schemas/DateTime"
          description: Timestamp for the time the synthesis task was started.
        RequestCharacters:
          $ref: "#/components/schemas/RequestCharacters"
          description: Number of billable characters synthesized.
        SnsTopicArn:
          $ref: "#/components/schemas/SnsTopicArn"
          description: ARN for the SNS topic optionally used for providing status notification for a speech synthesis task.
        LexiconNames:
          $ref: "#/components/schemas/LexiconNameList"
          description: List of one or more pronunciation lexicon names you want the service to apply during synthesis. Lexicons are applied only if the language of the lexicon is the same as the language of the voice.
        OutputFormat:
          $ref: "#/components/schemas/OutputFormat"
          description: The format in which the returned output will be encoded. For audio stream, this will be mp3, ogg_vorbis, ogg_opus, mu-law, a-law, or pcm. For speech marks, this will be json.
        SampleRate:
          $ref: "#/components/schemas/SampleRate"
          description: The audio frequency specified in Hz. The valid values for mp3 and ogg_vorbis are "8000", "16000", "22050", and "24000". The default value for standard voices is "22050". The default value for neural voices is "24000". The default value for long-form voices is "24000". The default value for generative voices is "24000". Valid values for pcm are "8000" and "16000" The default value is "16000". Valid value for ogg_opus is "48000". Valid value for mu-law and a-law is "8000".
        SpeechMarkTypes:
          $ref: "#/components/schemas/SpeechMarkTypeList"
          description: The type of speech marks returned for the input text.
        TextType:
          $ref: "#/components/schemas/TextType"
          description: Specifies whether the input text is plain text or SSML. The default value is plain text.
        VoiceId:
          $ref: "#/components/schemas/VoiceId"
          description: Voice ID to use for the synthesis.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: Optional language code for a synthesis task. This is only necessary if using a bilingual voice, such as Aditi, which can be used for either Indian English (en-IN) or Hindi (hi-IN). If a bilingual voice is used and no language code is specified, Amazon Polly uses the default language of the bilingual voice. The default language for any voice is the one returned by the DescribeVoices operation for the LanguageCode parameter. For example, if no language code is specified, Aditi will use Indian English rather than Hindi.
    TaskStatus:
      type: string
      enum:
        - scheduled
        - inProgress
        - completed
        - failed
    TaskStatusReason:
      type: string
    OutputUri:
      type: string
    DateTime:
      type: string
      format: date-time
    RequestCharacters:
      type: integer
    SnsTopicArn:
      type: string
      pattern: ^arn:aws(-(cn|iso(-b)?|us-gov))?:sns:[a-z0-9_-]{1,50}:\d{12}:[a-zA-Z0-9_-]{1,251}([a-zA-Z0-9_-]{0,5}|\.fifo)$
    LexiconNameList:
      type: array
      items:
        $ref: "#/components/schemas/LexiconName"
    OutputFormat:
      type: string
      enum:
        - json
        - mp3
        - ogg_opus
        - ogg_vorbis
        - pcm
        - mulaw
        - alaw
    SampleRate:
      type: string
    SpeechMarkTypeList:
      type: array
      items:
        $ref: "#/components/schemas/SpeechMarkType"
    SpeechMarkType:
      type: string
      enum:
        - sentence
        - ssml
        - viseme
        - word
    TextType:
      type: string
      enum:
        - ssml
        - text
    ListLexiconsOutput:
      type: object
      properties:
        Lexicons:
          $ref: "#/components/schemas/LexiconDescriptionList"
          description: A list of lexicon names and attributes.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token to use in the next request to continue the listing of lexicons. NextToken is returned only if the response is truncated.
    LexiconDescriptionList:
      type: array
      items:
