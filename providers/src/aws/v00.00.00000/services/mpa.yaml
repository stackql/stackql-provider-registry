openapi: 3.0.0
info:
  version: "2022-07-26"
  title: AWS Multi-party Approval
  description: AWS Multi-party Approval
  x-serviceName: mpa
  x-serviceAlias: mpa
  x-protocol: rest-json
  x-apiVersion: "2022-07-26"
  x-endpointPrefix: mpa
servers:
  - url: https://mpa.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mpa
paths:
  /sessions/{session_arn}:
    put:
      operationId: CancelSession
      description: Cancels an approval session. For more information, see Session in the Multi-party approval User Guide.
      parameters:
        - name: session_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionArn"
          description: Amazon Resource Name (ARN) for the session.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelSessionResponse"
    get:
      operationId: GetSession
      description: Returns details for an approval session. For more information, see Session in the Multi-party approval User Guide.
      parameters:
        - name: session_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionArn"
          description: Amazon Resource Name (ARN) for the session.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionResponse"
  /approval-teams:
    post:
      operationId: CreateApprovalTeam
      description: Creates a new approval team. For more information, see Approval team in the Multi-party approval User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/Token"
                ApprovalStrategy:
                  $ref: "#/components/schemas/ApprovalStrategy"
                Approvers:
                  $ref: "#/components/schemas/ApprovalTeamRequestApprovers"
                Description:
                  $ref: "#/components/schemas/Description"
                Policies:
                  $ref: "#/components/schemas/PoliciesReferences"
                Name:
                  $ref: "#/components/schemas/ApprovalTeamName"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - ApprovalStrategy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApprovalTeamResponse"
  /identity-sources:
    post:
      operationId: CreateIdentitySource
      description: Creates a new identity source. For more information, see Identity Source in the Multi-party approval User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IdentitySourceParameters:
                  $ref: "#/components/schemas/IdentitySourceParameters"
                ClientToken:
                  $ref: "#/components/schemas/Token"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - IdentitySourceParameters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIdentitySourceResponse"
  /identity-sources/{identity_source_arn}:
    delete:
      operationId: DeleteIdentitySource
      description: Deletes an identity source. For more information, see Identity Source in the Multi-party approval User Guide.
      parameters:
        - name: identity_source_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for identity source.
      responses:
        "200":
          description: Success
    get:
      operationId: GetIdentitySource
      description: Returns details for an identity source. For more information, see Identity Source in the Multi-party approval User Guide.
      parameters:
        - name: identity_source_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for the identity source.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIdentitySourceResponse"
  /approval-teams/{arn}/{version_id}:
    delete:
      operationId: DeleteInactiveApprovalTeamVersion
      description: Deletes an inactive approval team. For more information, see Team health in the Multi-party approval User Guide. You can also use this operation to delete a team draft. For more information, see Interacting with drafts in the Multi-party approval User Guide.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApprovalTeamArn"
          description: Amaazon Resource Name (ARN) for the team.
        - name: version_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Version ID for the team.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInactiveApprovalTeamVersionResponse"
  /approval-teams/{arn}:
    get:
      operationId: GetApprovalTeam
      description: Returns details for an approval team.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApprovalTeamArn"
          description: Amazon Resource Name (ARN) for the team.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApprovalTeamResponse"
    patch:
      operationId: UpdateApprovalTeam
      description: Updates an approval team. You can request to update the team description, approval threshold, and approvers in the team. Updates require team approval Updates to an active team must be approved by the team.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApprovalTeamArn"
          description: Amazon Resource Name (ARN) for the team.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ApprovalStrategy:
                  $ref: "#/components/schemas/ApprovalStrategy"
                Approvers:
                  $ref: "#/components/schemas/ApprovalTeamRequestApprovers"
                Description:
                  $ref: "#/components/schemas/Description"
                UpdateActions:
                  $ref: "#/components/schemas/UpdateActions"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApprovalTeamResponse"
  /policy-versions/{policy_version_arn}:
    get:
      operationId: GetPolicyVersion
      description: Returns details for the version of a policy. Policies define the permissions for team resources.
      parameters:
        - name: policy_version_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QualifiedPolicyArn"
          description: Amazon Resource Name (ARN) for the policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPolicyVersionResponse"
  /GetResourcePolicy:
    post:
      operationId: GetResourcePolicy
      description: Returns details about a policy for a resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/String"
                PolicyName:
                  $ref: "#/components/schemas/String"
                PolicyType:
                  $ref: "#/components/schemas/PolicyType"
              required:
                - ResourceArn
                - PolicyName
                - PolicyType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePolicyResponse"
  /approval-teams/?List:
    post:
      operationId: ListApprovalTeams
      description: Returns a list of approval teams.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return in the response. If more results exist than the specified MaxResults value, a token is included in the response so that you can retrieve the remaining results.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: If present, indicates that more output is available than is included in the current response. Use this value in the NextToken request parameter in a next call to the operation to get more output. You can repeat this until the NextToken response element returns null.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApprovalTeamsResponse"
  /identity-sources/?List:
    post:
      operationId: ListIdentitySources
      description: Returns a list of identity sources. For more information, see Identity Source in the Multi-party approval User Guide.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return in the response. If more results exist than the specified MaxResults value, a token is included in the response so that you can retrieve the remaining results.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: If present, indicates that more output is available than is included in the current response. Use this value in the NextToken request parameter in a next call to the operation to get more output. You can repeat this until the NextToken response element returns null.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIdentitySourcesResponse"
  /policies/?List:
    post:
      operationId: ListPolicies
      description: Returns a list of policies. Policies define the permissions for team resources.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return in the response. If more results exist than the specified MaxResults value, a token is included in the response so that you can retrieve the remaining results.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: If present, indicates that more output is available than is included in the current response. Use this value in the NextToken request parameter in a next call to the operation to get more output. You can repeat this until the NextToken response element returns null.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPoliciesResponse"
  /policies/{policy_arn}/?List:
    post:
      operationId: ListPolicyVersions
      description: Returns a list of the versions for policies. Policies define the permissions for team resources.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return in the response. If more results exist than the specified MaxResults value, a token is included in the response so that you can retrieve the remaining results.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: If present, indicates that more output is available than is included in the current response. Use this value in the NextToken request parameter in a next call to the operation to get more output. You can repeat this until the NextToken response element returns null.
        - name: policy_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UnqualifiedPolicyArn"
          description: Amazon Resource Name (ARN) for the policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPolicyVersionsResponse"
  /resource-policies/{resource_arn}/?List:
    post:
      operationId: ListResourcePolicies
      description: Returns a list of policies for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for the resource.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return in the response. If more results exist than the specified MaxResults value, a token is included in the response so that you can retrieve the remaining results.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: If present, indicates that more output is available than is included in the current response. Use this value in the NextToken request parameter in a next call to the operation to get more output. You can repeat this until the NextToken response element returns null.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourcePoliciesResponse"
  /approval-teams/{approval_team_arn}/sessions/?List:
    post:
      operationId: ListSessions
      description: Returns a list of approval sessions. For more information, see Session in the Multi-party approval User Guide.
      parameters:
        - name: approval_team_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApprovalTeamArn"
          description: Amazon Resource Name (ARN) for the approval team.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
                Filters:
                  $ref: "#/components/schemas/Filters"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSessionsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of the tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    put:
      operationId: TagResource
      description: Creates or updates a resource tag. Each tag is a label consisting of a user-defined key and value. Tags can help you manage, identify, organize, search for, and filter resources.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for the resource you want to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    post:
      operationId: UntagResource
      description: Removes a resource tag. Each tag is a label consisting of a user-defined key and value. Tags can help you manage, identify, organize, search for, and filter resources.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for the resource you want to untag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /approval-teams/{arn}?Delete:
    post:
      operationId: StartActiveApprovalTeamDeletion
      description: Starts the deletion process for an active approval team. Deletions require team approval Requests to delete an active team must be approved by the team.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApprovalTeamArn"
          description: Amazon Resource Name (ARN) for the team.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                PendingWindowDays:
                  $ref: "#/components/schemas/Integer"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartActiveApprovalTeamDeletionResponse"
  /approval-teams/{arn}/baseline:
    post:
      operationId: StartApprovalTeamBaseline
      description: Starts a baseline session for specified approvers on an ACTIVE approval team.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApprovalTeamArn"
          description: Amazon Resource Name (ARN) for the approval team.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ApproverIds:
                  $ref: "#/components/schemas/StartApprovalTeamBaselineApproverIds"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartApprovalTeamBaselineResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SessionArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:mpa:[a-z0-9-]{1,20}:[0-9]{12}:session/[a-zA-Z0-9._-]+/[a-zA-Z0-9_-]+
    CancelSessionResponse:
      type: object
    Token:
      type: string
      minLength: 0
      maxLength: 4096
    ApprovalStrategy:
      description: Strategy for how an approval team grants approval.
      type: object
      properties:
        MofN:
          $ref: "#/components/schemas/MofNApprovalStrategy"
          description: Minimum number of approvals (M) required for a total number of approvers (N).
    MofNApprovalStrategy:
      description: Strategy for how an approval team grants approval.
      type: object
      properties:
        MinApprovalsRequired:
          $ref: "#/components/schemas/MofNApprovalStrategyMinApprovalsRequiredInteger"
          description: Minimum number of approvals (M) required for a total number of approvers (N).
      required:
        - MinApprovalsRequired
    MofNApprovalStrategyMinApprovalsRequiredInteger:
      type: integer
      minimum: 1
    ApprovalTeamRequestApprovers:
      type: array
      items:
        $ref: "#/components/schemas/ApprovalTeamRequestApprover"
    ApprovalTeamRequestApprover:
      description: Contains details for an approver.
      type: object
      properties:
        PrimaryIdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: ID for the user.
        PrimaryIdentitySourceArn:
          $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for the identity source. The identity source manages the user authentication for approvers.
      required:
        - PrimaryIdentityId
        - PrimaryIdentitySourceArn
    IdentityId:
      type: string
      minLength: 1
      maxLength: 100
    String:
      type: string
      minLength: 0
      maxLength: 1000
    Description:
      type: string
      minLength: 1
      maxLength: 256
    PoliciesReferences:
      type: array
      items:
        $ref: "#/components/schemas/PolicyReference"
    PolicyReference:
      description: Contains the Amazon Resource Name (ARN) for a policy. Policies define what operations a team that define the permissions for team resources.
      type: object
      properties:
        PolicyArn:
          $ref: "#/components/schemas/QualifiedPolicyArn"
          description: Amazon Resource Name (ARN) for the policy.
      required:
        - PolicyArn
    QualifiedPolicyArn:
      type: string
      minLength: 0
      maxLength: 1224
      pattern: arn:.{1,63}:mpa:::aws:policy/[a-zA-Z0-9_\.-]{1,1023}/[a-zA-Z0-9_\.-]{1,1023}/(?:[\d]+|\$DEFAULT)
    ApprovalTeamName:
      type: string
      minLength: 0
      maxLength: 64
      pattern: "[a-zA-Z0-9._-]+"
    Tags:
      type: object
      properties: {}
    CreateApprovalTeamResponse:
      type: object
      properties:
        CreationTime:
          $ref: "#/components/schemas/IsoTimestamp"
          description: Timestamp when the team was created.
        Arn:
          $ref: "#/components/schemas/ApprovalTeamArn"
          description: Amazon Resource Name (ARN) for the team that was created.
        Name:
          $ref: "#/components/schemas/String"
          description: Name of the team that was created.
        VersionId:
          $ref: "#/components/schemas/String"
          description: Version ID for the team that was created. When a team is updated, the version ID changes.
    IsoTimestamp:
      type: string
      format: date-time
    ApprovalTeamArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:mpa:[a-z0-9-]{1,20}:[0-9]{12}:approval-team/[a-zA-Z0-9._-]+
    IdentitySourceParameters:
      description: Contains details for the resource that provides identities to the identity source. For example, an IAM Identity Center instance.
      type: object
      properties:
        IamIdentityCenter:
          $ref: "#/components/schemas/IamIdentityCenter"
          description: IAM Identity Center credentials.
    IamIdentityCenter:
      description: IAM Identity Center credentials. For more information see, IAM Identity Center .
      type: object
      properties:
        InstanceArn:
          $ref: "#/components/schemas/IdcInstanceArn"
          description: Amazon Resource Name (ARN) for the IAM Identity Center instance.
        Region:
          $ref: "#/components/schemas/String"
          description: Amazon Web Services Region where the IAM Identity Center instance is located.
      required:
        - InstanceArn
        - Region
    IdcInstanceArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:.+:sso:::instance/(?:sso)?ins-[a-zA-Z0-9-.]{16}
    CreateIdentitySourceResponse:
      type: object
      properties:
        IdentitySourceType:
          $ref: "#/components/schemas/IdentitySourceType"
          description: The type of resource that provided identities to the identity source. For example, an IAM Identity Center instance.
        IdentitySourceArn:
          $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for the identity source that was created.
        CreationTime:
          $ref: "#/components/schemas/IsoTimestamp"
          description: Timestamp when the identity source was created.
    IdentitySourceType:
      type: string
      enum:
        - IAM_IDENTITY_CENTER
    DeleteInactiveApprovalTeamVersionResponse:
      type: object
    GetApprovalTeamResponse:
      type: object
      properties:
        CreationTime:
          $ref: "#/components/schemas/IsoTimestamp"
          description: Timestamp when the team was created.
        ApprovalStrategy:
          $ref: "#/components/schemas/ApprovalStrategyResponse"
          description: An ApprovalStrategyResponse object. Contains details for how the team grants approval.
        NumberOfApprovers:
          $ref: "#/components/schemas/Integer"
          description: Total number of approvers in the team.
        Approvers:
          $ref: "#/components/schemas/GetApprovalTeamResponseApprovers"
          description: An array of GetApprovalTeamResponseApprover objects. Contains details for the approvers in the team.
        Arn:
          $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for the team.
        Description:
          $ref: "#/components/schemas/Description"
          description: Description for the team.
        Name:
          $ref: "#/components/schemas/String"
          description: Name of the approval team.
        Status:
          $ref: "#/components/schemas/ApprovalTeamStatus"
          description: Status for the team. For more information, see Team health in the Multi-party approval User Guide.
        StatusCode:
          $ref: "#/components/schemas/ApprovalTeamStatusCode"
          description: Status code for the approval team. For more information, see Team health in the Multi-party approval User Guide.
        StatusMessage:
          $ref: "#/components/schemas/Message"
          description: Message describing the status for the team.
        UpdateSessionArn:
          $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) for the session.
        VersionId:
          $ref: "#/components/schemas/String"
          description: Version ID for the team.
        Policies:
          $ref: "#/components/schemas/PoliciesReferences"
          description: An array of PolicyReference objects. Contains a list of policies that define the permissions for team resources.
        LastUpdateTime:
          $ref: "#/components/schemas/IsoTimestamp"
          description: Timestamp when the team was last updated.
        PendingUpdate:
          $ref: "#/components/schemas/PendingUpdate"
          description: A PendingUpdate object. Contains details for the pending updates for the team, if applicable.
    ApprovalStrategyResponse:
      description: Contains details for how an approval team grants approval.
      type: object
      properties:
        MofN:
          $ref: "#/components/schemas/MofNApprovalStrategy"
          description: Minimum number of approvals (M) required for a total number of approvers (N).
    Integer:
      type: integer
    GetApprovalTeamResponseApprovers:
      type: array
      items:
        $ref: "#/components/schemas/GetApprovalTeamResponseApprover"
    GetApprovalTeamResponseApprover:
      description: Contains details for an approver.
      type: object
      properties:
        ApproverId:
          $ref: "#/components/schemas/ParticipantId"
          description: ID for the approver.
        ResponseTime:
          $ref: "#/components/schemas/IsoTimestamp"
