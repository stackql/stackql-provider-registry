openapi: 3.0.0
info:
  version: "2021-08-28"
  title: AWS Migration Hub Orchestrator
  description: AWS Migration Hub Orchestrator
  x-serviceName: migrationhub-orchestrator
  x-serviceAlias: migrationhuborchestrator
  x-protocol: rest-json
  x-apiVersion: "2021-08-28"
  x-endpointPrefix: migrationhub-orchestrator
  x-jsonVersion: "1.1"
servers:
  - url: https://migrationhub-orchestrator.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for migrationhuborchestrator
paths:
  /template:
    post:
      operationId: CreateTemplate
      description: Creates a migration workflow template.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateName:
                  $ref: "#/components/schemas/CreateTemplateRequestTemplateNameString"
                templateDescription:
                  $ref: "#/components/schemas/CreateTemplateRequestTemplateDescriptionString"
                templateSource:
                  $ref: "#/components/schemas/TemplateSource"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - templateName
                - templateSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTemplateResponse"
  /migrationworkflow/:
    post:
      operationId: CreateWorkflow
      description: Create a workflow to orchestrate your migrations.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CreateMigrationWorkflowRequestNameString"
                description:
                  $ref: "#/components/schemas/CreateMigrationWorkflowRequestDescriptionString"
                templateId:
                  $ref: "#/components/schemas/CreateMigrationWorkflowRequestTemplateIdString"
                applicationConfigurationId:
                  $ref: "#/components/schemas/CreateMigrationWorkflowRequestApplicationConfigurationIdString"
                inputParameters:
                  $ref: "#/components/schemas/StepInputParameters"
                stepTargets:
                  $ref: "#/components/schemas/StringList"
                tags:
                  $ref: "#/components/schemas/StringMap"
              required:
                - name
                - templateId
                - inputParameters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMigrationWorkflowResponse"
  /workflowstep:
    post:
      operationId: CreateWorkflowStep
      description: Create a step in the migration workflow.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/MigrationWorkflowName"
                stepGroupId:
                  $ref: "#/components/schemas/StepGroupId"
                workflowId:
                  $ref: "#/components/schemas/MigrationWorkflowId"
                stepActionType:
                  $ref: "#/components/schemas/StepActionType"
                description:
                  $ref: "#/components/schemas/MigrationWorkflowDescription"
                workflowStepAutomationConfiguration:
                  $ref: "#/components/schemas/WorkflowStepAutomationConfiguration"
                stepTarget:
                  $ref: "#/components/schemas/StringList"
                outputs:
                  $ref: "#/components/schemas/WorkflowStepOutputList"
                previous:
                  $ref: "#/components/schemas/StringList"
                next:
                  $ref: "#/components/schemas/StringList"
              required:
                - name
                - stepGroupId
                - workflowId
                - stepActionType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkflowStepResponse"
  /workflowstepgroups:
    post:
      operationId: CreateWorkflowStepGroup
      description: Create a step group in a migration workflow.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workflowId:
                  $ref: "#/components/schemas/MigrationWorkflowId"
                name:
                  $ref: "#/components/schemas/StepGroupName"
                description:
                  $ref: "#/components/schemas/StepGroupDescription"
                next:
                  $ref: "#/components/schemas/StringList"
                previous:
                  $ref: "#/components/schemas/StringList"
              required:
                - workflowId
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkflowStepGroupResponse"
    get:
      operationId: ListWorkflowStepGroups
      description: List the step groups in a migration workflow.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that can be returned.
        - name: workflowId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkflowStepGroupsResponse"
  /template/{id}:
    delete:
      operationId: DeleteTemplate
      description: Deletes a migration workflow template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: The ID of the request to delete a migration workflow template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTemplateResponse"
    post:
      operationId: UpdateTemplate
      description: Updates a migration workflow template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: The ID of the request to update a migration workflow template.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                templateName:
                  $ref: "#/components/schemas/UpdateTemplateRequestTemplateNameString"
                templateDescription:
                  $ref: "#/components/schemas/UpdateTemplateRequestTemplateDescriptionString"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTemplateResponse"
  /migrationworkflow/{id}:
    delete:
      operationId: DeleteWorkflow
      description: Delete a migration workflow. You must pause a running workflow in Migration Hub Orchestrator console to delete it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow you want to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMigrationWorkflowResponse"
    get:
      operationId: GetWorkflow
      description: Get migration workflow.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMigrationWorkflowResponse"
    post:
      operationId: UpdateWorkflow
      description: Update a migration workflow.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/UpdateMigrationWorkflowRequestNameString"
                description:
                  $ref: "#/components/schemas/UpdateMigrationWorkflowRequestDescriptionString"
                inputParameters:
                  $ref: "#/components/schemas/StepInputParameters"
                stepTargets:
                  $ref: "#/components/schemas/StringList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMigrationWorkflowResponse"
  /workflowstep/{id}:
    delete:
      operationId: DeleteWorkflowStep
      description: Delete a step in a migration workflow. Pause the workflow to delete a running step.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepId"
          description: The ID of the step you want to delete.
        - name: stepGroupId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group that contains the step you want to delete.
        - name: workflowId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkflowStepResponse"
    get:
      operationId: GetWorkflowStep
      description: Get a step in the migration workflow.
      parameters:
        - name: workflowId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
        - name: stepGroupId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepId"
          description: The ID of the step.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkflowStepResponse"
    post:
      operationId: UpdateWorkflowStep
      description: Update a step in a migration workflow.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepId"
          description: The ID of the step.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stepGroupId:
                  $ref: "#/components/schemas/StepGroupId"
                workflowId:
                  $ref: "#/components/schemas/MigrationWorkflowId"
                name:
                  $ref: "#/components/schemas/StepName"
                description:
                  $ref: "#/components/schemas/StepDescription"
                stepActionType:
                  $ref: "#/components/schemas/StepActionType"
                workflowStepAutomationConfiguration:
                  $ref: "#/components/schemas/WorkflowStepAutomationConfiguration"
                stepTarget:
                  $ref: "#/components/schemas/StringList"
                outputs:
                  $ref: "#/components/schemas/WorkflowStepOutputList"
                previous:
                  $ref: "#/components/schemas/StringList"
                next:
                  $ref: "#/components/schemas/StringList"
                status:
                  $ref: "#/components/schemas/StepStatus"
              required:
                - stepGroupId
                - workflowId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkflowStepResponse"
  /workflowstepgroup/{id}:
    delete:
      operationId: DeleteWorkflowStepGroup
      description: Delete a step group in a migration workflow.
      parameters:
        - name: workflowId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group you want to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkflowStepGroupResponse"
    get:
      operationId: GetWorkflowStepGroup
      description: Get the step group of a migration workflow.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group.
        - name: workflowId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkflowStepGroupResponse"
    post:
      operationId: UpdateWorkflowStepGroup
      description: Update the step group in a migration workflow.
      parameters:
        - name: workflowId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/StepGroupName"
                description:
                  $ref: "#/components/schemas/StepGroupDescription"
                next:
                  $ref: "#/components/schemas/StringList"
                previous:
                  $ref: "#/components/schemas/StringList"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkflowStepGroupResponse"
  /migrationworkflowtemplate/{id}:
    get:
      operationId: GetTemplate
      description: Get the template you want to use for creating a migration workflow.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: The ID of the template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMigrationWorkflowTemplateResponse"
  /templatestep/{id}:
    get:
      operationId: GetTemplateStep
      description: Get a specific step in a template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepId"
          description: The ID of the step.
        - name: templateId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: The ID of the template.
        - name: stepGroupId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTemplateStepResponse"
  /templates/{template_id}/stepgroups/{id}:
    get:
      operationId: GetTemplateStepGroup
      description: Get a step group in a template.
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: The ID of the template.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTemplateStepGroupResponse"
  /plugins:
    get:
      operationId: ListPlugins
      description: List AWS Migration Hub Orchestrator plugins.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of plugins that can be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The pagination token.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPluginsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: List the tags added to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Tag a resource by specifying its Amazon Resource Name (ARN).
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource to which you want to add tags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Deletes the tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource from which you want to remove tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: One or more tag keys. Specify only the tag keys, not the tag values.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /templatestepgroups/{template_id}:
    get:
      operationId: ListTemplateStepGroups
      description: List the step groups in a template.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that can be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: The ID of the template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTemplateStepGroupsResponse"
  /templatesteps:
    get:
      operationId: ListTemplateSteps
      description: List the steps in a template.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that can be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        - name: templateId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: The ID of the template.
        - name: stepGroupId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTemplateStepsResponse"
  /migrationworkflowtemplates:
    get:
      operationId: ListTemplates
      description: List the templates available in Migration Hub Orchestrator to create a migration workflow.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that can be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TemplateName"
          description: The name of the template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMigrationWorkflowTemplatesResponse"
  /workflow/{workflow_id}/workflowstepgroups/{step_group_id}/workflowsteps:
    get:
      operationId: ListWorkflowSteps
      description: List the steps in a workflow.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that can be returned.
        - name: workflow_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
        - name: step_group_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkflowStepsResponse"
  /migrationworkflows:
    get:
      operationId: ListWorkflows
      description: List the migration workflows.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that can be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        - name: templateId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: The ID of the template.
        - name: adsApplicationConfigurationName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApplicationConfigurationName"
          description: The name of the application configured in Application Discovery Service.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MigrationWorkflowStatusEnum"
          description: The status of the migration workflow.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the migration workflow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMigrationWorkflowsResponse"
  /retryworkflowstep/{id}:
    post:
      operationId: RetryWorkflowStep
      description: Retry a failed step in a migration workflow.
      parameters:
        - name: workflowId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
        - name: stepGroupId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/StepGroupId"
          description: The ID of the step group.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StepId"
          description: The ID of the step.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryWorkflowStepResponse"
  /migrationworkflow/{id}/start:
    post:
      operationId: StartWorkflow
      description: Start a migration workflow.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMigrationWorkflowResponse"
  /migrationworkflow/{id}/stop:
    post:
      operationId: StopWorkflow
      description: Stop an ongoing migration workflow.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MigrationWorkflowId"
          description: The ID of the migration workflow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopMigrationWorkflowResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
