openapi: 3.0.0
info:
  version: "2018-10-05"
  title: AWS IoT Secure Tunneling
  description: AWS IoT Secure Tunneling
  x-serviceName: IoTSecuredTunneling
  x-serviceAlias: iotsecuretunneling
  x-protocol: json
  x-apiVersion: "2018-10-05"
  x-endpointPrefix: api.tunneling.iot
  x-targetPrefix: IoTSecuredTunneling
  x-jsonVersion: "1.1"
servers:
  - url: https://api.tunneling.iot.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iotsecuretunneling
paths:
  /CloseTunnel:
    post:
      operationId: CloseTunnel
      description: Closes a tunnel identified by the unique tunnel id. When a CloseTunnel request is received, we close the WebSocket connections between the client and proxy server so no data can be transmitted. Requires permission to access the CloseTunnel action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTSecuredTunneling.CloseTunnel
            default: IoTSecuredTunneling.CloseTunnel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                tunnelId:
                  $ref: "#/components/schemas/TunnelId"
                  description: The ID of the tunnel to close.
                delete:
                  $ref: "#/components/schemas/DeleteFlag"
                  description: When set to true, IoT Secure Tunneling deletes the tunnel data immediately.
              required:
                - tunnelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseTunnelResponse"
  /DescribeTunnel:
    post:
      operationId: DescribeTunnel
      description: Gets information about a tunnel identified by the unique tunnel id. Requires permission to access the DescribeTunnel action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTSecuredTunneling.DescribeTunnel
            default: IoTSecuredTunneling.DescribeTunnel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                tunnelId:
                  $ref: "#/components/schemas/TunnelId"
                  description: The tunnel to describe.
              required:
                - tunnelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTunnelResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags for the specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTSecuredTunneling.ListTagsForResource
            default: IoTSecuredTunneling.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The resource ARN.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /ListTunnels:
    post:
      operationId: ListTunnels
      description: List all tunnels for an Amazon Web Services account. Tunnels are listed by creation time in descending order, newer tunnels will be listed before older tunnels. Requires permission to access the ListTunnels action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTSecuredTunneling.ListTunnels
            default: IoTSecuredTunneling.ListTunnels
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                thingName:
                  $ref: "#/components/schemas/ThingName"
                  description: The name of the IoT thing associated with the destination device.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return at once.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTunnelsResponse"
  /OpenTunnel:
    post:
      operationId: OpenTunnel
      description: Creates a new tunnel, and returns two client access tokens for clients to use to connect to the IoT Secure Tunneling proxy server. Requires permission to access the OpenTunnel action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTSecuredTunneling.OpenTunnel
            default: IoTSecuredTunneling.OpenTunnel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                  description: A short text description of the tunnel.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: A collection of tag metadata.
                destinationConfig:
                  $ref: "#/components/schemas/DestinationConfig"
                  description: The destination configuration for the OpenTunnel request.
                timeoutConfig:
                  $ref: "#/components/schemas/TimeoutConfig"
                  description: Timeout configuration for a tunnel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenTunnelResponse"
  /RotateTunnelAccessToken:
    post:
      operationId: RotateTunnelAccessToken
      description: Revokes the current client access token (CAT) and returns new CAT for clients to use when reconnecting to secure tunneling to access the same tunnel. Requires permission to access the RotateTunnelAccessToken action. Rotating the CAT doesn't extend the tunnel duration. For example, say the tunnel duration is 12 hours and the tunnel has already been open for 4 hours. When you rotate the access tokens, the new tokens that are generated can only be used for the remaining 8 hours.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTSecuredTunneling.RotateTunnelAccessToken
            default: IoTSecuredTunneling.RotateTunnelAccessToken
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                tunnelId:
                  $ref: "#/components/schemas/TunnelId"
                  description: The tunnel for which you want to rotate the access tokens.
                clientMode:
                  $ref: "#/components/schemas/ClientMode"
                  description: The mode of the client that will use the client token, which can be either the source or destination, or both source and destination.
                destinationConfig:
                  $ref: "#/components/schemas/DestinationConfig"
              required:
                - tunnelId
                - clientMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateTunnelAccessTokenResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: A resource tag.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTSecuredTunneling.TagResource
            default: IoTSecuredTunneling.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the resource.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags for the resource.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes a tag from a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTSecuredTunneling.UntagResource
            default: IoTSecuredTunneling.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The resource ARN.
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The keys of the tags to remove.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    TunnelId:
      type: string
      pattern: "[a-zA-Z0-9_\\-+=:]{1,128}"
    DeleteFlag:
      type: boolean
    CloseTunnelResponse:
      type: object
    DescribeTunnelResponse:
      type: object
      properties:
        tunnel:
          $ref: "#/components/schemas/Tunnel"
          description: The tunnel being described.
    Tunnel:
      description: A connection between a source computer and a destination device.
      type: object
      properties:
        tunnelId:
          $ref: "#/components/schemas/TunnelId"
          description: A unique alpha-numeric ID that identifies a tunnel.
        tunnelArn:
          $ref: "#/components/schemas/TunnelArn"
          description: The Amazon Resource Name (ARN) of a tunnel.
        status:
          $ref: "#/components/schemas/TunnelStatus"
          description: "The status of a tunnel. Valid values are: Open and Closed."
        sourceConnectionState:
          $ref: "#/components/schemas/ConnectionState"
          description: The connection state of the source application.
        destinationConnectionState:
          $ref: "#/components/schemas/ConnectionState"
          description: The connection state of the destination application.
        description:
          $ref: "#/components/schemas/Description"
          description: A description of the tunnel.
        destinationConfig:
          $ref: "#/components/schemas/DestinationConfig"
          description: The destination configuration that specifies the thing name of the destination device and a service name that the local proxy uses to connect to the destination application.
        timeoutConfig:
          $ref: "#/components/schemas/TimeoutConfig"
          description: Timeout configuration for the tunnel.
        tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tag metadata associated with the secure tunnel.
        createdAt:
          $ref: "#/components/schemas/DateType"
          description: The time when the tunnel was created.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateType"
          description: The last time the tunnel was updated.
    TunnelArn:
      type: string
      minLength: 1
      maxLength: 1600
    TunnelStatus:
      type: string
      enum:
        - OPEN
        - CLOSED
    ConnectionState:
      description: The state of a connection.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ConnectionStatus"
          description: The connection status of the tunnel. Valid values are CONNECTED and DISCONNECTED.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateType"
          description: The last time the connection status was updated.
    ConnectionStatus:
      type: string
      enum:
        - CONNECTED
        - DISCONNECTED
    DateType:
      type: string
      format: date-time
    Description:
      type: string
      pattern: "[^\\p{C}]{1,2048}"
    DestinationConfig:
      description: The destination configuration.
      type: object
      properties:
        thingName:
          $ref: "#/components/schemas/ThingName"
          description: The name of the IoT thing to which you want to connect.
        services:
          $ref: "#/components/schemas/ServiceList"
          description: A list of service names that identify the target application. The IoT client running on the destination device reads this value and uses it to look up a port or an IP address and a port. The IoT client instantiates the local proxy, which uses this information to connect to the destination application.
      required:
        - services
    ThingName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9:_-]+"
    ServiceList:
      type: array
      items:
        $ref: "#/components/schemas/Service"
    Service:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9:_-]+"
    TimeoutConfig:
      description: Tunnel timeout configuration.
      type: object
      properties:
        maxLifetimeTimeoutMinutes:
          $ref: "#/components/schemas/TimeoutInMin"
          description: The maximum amount of time (in minutes) a tunnel can remain open. If not specified, maxLifetimeTimeoutMinutes defaults to 720 minutes. Valid values are from 1 minute to 12 hours (720 minutes)
    TimeoutInMin:
      type: integer
      minimum: 1
      maximum: 720
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: An arbitary key/value pair used to add searchable metadata to secure tunnel resources.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 1011
    ListTagsForResourceResponse:
      type: object
      properties:
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tags for the specified resource.
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    NextToken:
      type: string
      pattern: "[a-zA-Z0-9_=-]{1,4096}"
    ListTunnelsResponse:
      type: object
      properties:
        tunnelSummaries:
          $ref: "#/components/schemas/TunnelSummaryList"
          description: A short description of the tunnels in an Amazon Web Services account.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to get the next set of results, or null if there are no additional results.
    TunnelSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/TunnelSummary"
    TunnelSummary:
      description: Information about the tunnel.
      type: object
      properties:
        tunnelId:
          $ref: "#/components/schemas/TunnelId"
          description: The unique alpha-numeric identifier for the tunnel.
        tunnelArn:
          $ref: "#/components/schemas/TunnelArn"
          description: The Amazon Resource Name of the tunnel.
        status:
          $ref: "#/components/schemas/TunnelStatus"
          description: "The status of a tunnel. Valid values are: Open and Closed."
        description:
          $ref: "#/components/schemas/Description"
          description: A description of the tunnel.
        createdAt:
          $ref: "#/components/schemas/DateType"
          description: The time the tunnel was created.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateType"
          description: The time the tunnel was last updated.
    OpenTunnelResponse:
      type: object
      properties:
        tunnelId:
          $ref: "#/components/schemas/TunnelId"
          description: A unique alpha-numeric tunnel ID.
        tunnelArn:
          $ref: "#/components/schemas/TunnelArn"
          description: The Amazon Resource Name for the tunnel.
        sourceAccessToken:
          $ref: "#/components/schemas/ClientAccessToken"
          description: The access token the source local proxy uses to connect to IoT Secure Tunneling.
        destinationAccessToken:
          $ref: "#/components/schemas/ClientAccessToken"
          description: The access token the destination local proxy uses to connect to IoT Secure Tunneling.
    ClientAccessToken:
      type: string
    ClientMode:
      type: string
      enum:
        - SOURCE
        - DESTINATION
        - ALL
    RotateTunnelAccessTokenResponse:
      type: object
      properties:
        tunnelArn:
          $ref: "#/components/schemas/TunnelArn"
          description: The Amazon Resource Name for the tunnel.
        sourceAccessToken:
          $ref: "#/components/schemas/ClientAccessToken"
          description: The client access token that the source local proxy uses to connect to IoT Secure Tunneling.
        destinationAccessToken:
          $ref: "#/components/schemas/ClientAccessToken"
          description: The client access token that the destination local proxy uses to connect to IoT Secure Tunneling.
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
  x-stackQL-resources:
    tunnels:
      id: aws.iotsecuretunneling.tunnels
      name: tunnels
      title: tunnels
      methods:
        close_tunnel:
          operation:
            $ref: "#/paths/~1CloseTunnel/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        describe_tunnel:
          operation:
            $ref: "#/paths/~1DescribeTunnel/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.tunnel
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        list_tunnels:
          operation:
            $ref: "#/paths/~1ListTunnels/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        rotate_tunnel_access_token:
          operation:
            $ref: "#/paths/~1RotateTunnelAccessToken/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/tunnels/methods/describe_tunnel"
          - $ref: "#/components/x-stackQL-resources/tunnels/methods/list_tunnels"
        insert: []
        update: []
        delete: []
    tags:
      id: aws.iotsecuretunneling.tags
      name: tags
      title: tags
      methods:
        list_tags_for_resource:
          operation:
            $ref: "#/paths/~1ListTagsForResource/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        tag_resource:
          operation:
            $ref: "#/paths/~1TagResource/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        untag_resource:
          operation:
            $ref: "#/paths/~1UntagResource/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/tags/methods/list_tags_for_resource"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/tags/methods/tag_resource"
          - $ref: "#/components/x-stackQL-resources/tags/methods/untag_resource"
        delete: []
