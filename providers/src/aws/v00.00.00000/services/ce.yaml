            default: AWSInsightsIndexService.GetRightsizingRecommendation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Filter:
                  $ref: "#/components/schemas/Expression"
