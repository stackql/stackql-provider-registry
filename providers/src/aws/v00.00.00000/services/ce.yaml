openapi: 3.0.0
info:
  version: "2017-10-25"
  title: AWS Cost Explorer Service
  description: AWS Cost Explorer Service
  x-serviceName: ce
  x-serviceAlias: ce
  x-protocol: json
  x-apiVersion: "2017-10-25"
  x-endpointPrefix: ce
  x-targetPrefix: AWSInsightsIndexService
  x-jsonVersion: "1.1"
servers:
  - url: https://ce.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ce
paths:
  /CreateAnomalyMonitor:
    post:
      operationId: CreateAnomalyMonitor
      description: Creates a new cost anomaly detection monitor with the requested type and monitor specification.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.CreateAnomalyMonitor
            default: AWSInsightsIndexService.CreateAnomalyMonitor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AnomalyMonitor:
                  $ref: "#/components/schemas/AnomalyMonitor"
                  description: The cost anomaly detection monitor object that you want to create.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: "An optional list of tags to associate with the specified AnomalyMonitor . You can use resource tags to control access to your monitor using IAM policies. Each tag consists of a key and a value, and each key must be unique for the resource. The following restrictions apply to resource tags: Although the maximum number of array members is 200, you can assign a maximum of 50 user-tags to one resource. The remaining are reserved for Amazon Web Services use The maximum length of a key is 128 characters The maximum length of a value is 256 characters Keys and values can only contain alphanumeric characters, spaces, and any of the following: _.:/=+@- Keys and values are case sensitive Keys and values are trimmed for any leading or trailing whitespaces Don’t use aws: as a prefix for your keys. This prefix is reserved for Amazon Web Services use"
              required:
                - AnomalyMonitor
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnomalyMonitorResponse"
  /CreateAnomalySubscription:
    post:
      operationId: CreateAnomalySubscription
      description: Adds an alert subscription to a cost anomaly detection monitor. You can use each subscription to define subscribers with email or SNS notifications. Email subscribers can set an absolute or percentage threshold and a time frequency for receiving notifications.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.CreateAnomalySubscription
            default: AWSInsightsIndexService.CreateAnomalySubscription
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AnomalySubscription:
                  $ref: "#/components/schemas/AnomalySubscription"
                  description: The cost anomaly subscription object that you want to create.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: "An optional list of tags to associate with the specified AnomalySubscription . You can use resource tags to control access to your subscription using IAM policies. Each tag consists of a key and a value, and each key must be unique for the resource. The following restrictions apply to resource tags: Although the maximum number of array members is 200, you can assign a maximum of 50 user-tags to one resource. The remaining are reserved for Amazon Web Services use The maximum length of a key is 128 characters The maximum length of a value is 256 characters Keys and values can only contain alphanumeric characters, spaces, and any of the following: _.:/=+@- Keys and values are case sensitive Keys and values are trimmed for any leading or trailing whitespaces Don’t use aws: as a prefix for your keys. This prefix is reserved for Amazon Web Services use"
              required:
                - AnomalySubscription
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnomalySubscriptionResponse"
  /CreateCostCategoryDefinition:
    post:
      operationId: CreateCostCategoryDefinition
      description: Creates a new cost category with the requested name and rules.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.CreateCostCategoryDefinition
            default: AWSInsightsIndexService.CreateCostCategoryDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CostCategoryName"
                EffectiveStart:
                  $ref: "#/components/schemas/ZonedDateTime"
                  description: The cost category's effective start date. It can only be a billing start date (first day of the month). If the date isn't provided, it's the first day of the current month. Dates can't be before the previous twelve months, or in the future.
                RuleVersion:
                  $ref: "#/components/schemas/CostCategoryRuleVersion"
                Rules:
                  $ref: "#/components/schemas/CostCategoryRulesList"
                  description: The cost category rules used to categorize costs. For more information, see CostCategoryRule.
                DefaultValue:
                  $ref: "#/components/schemas/CostCategoryValue"
                SplitChargeRules:
                  $ref: "#/components/schemas/CostCategorySplitChargeRulesList"
                  description: The split charge rules used to allocate your charges between your cost category values.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: "An optional list of tags to associate with the specified CostCategory . You can use resource tags to control access to your cost category using IAM policies. Each tag consists of a key and a value, and each key must be unique for the resource. The following restrictions apply to resource tags: Although the maximum number of array members is 200, you can assign a maximum of 50 user-tags to one resource. The remaining are reserved for Amazon Web Services use The maximum length of a key is 128 characters The maximum length of a value is 256 characters Keys and values can only contain alphanumeric characters, spaces, and any of the following: _.:/=+@- Keys and values are case sensitive Keys and values are trimmed for any leading or trailing whitespaces Don’t use aws: as a prefix for your keys. This prefix is reserved for Amazon Web Services use"
              required:
                - RuleVersion
                - Rules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCostCategoryDefinitionResponse"
  /DeleteAnomalyMonitor:
    post:
      operationId: DeleteAnomalyMonitor
      description: Deletes a cost anomaly monitor.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.DeleteAnomalyMonitor
            default: AWSInsightsIndexService.DeleteAnomalyMonitor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MonitorArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The unique identifier of the cost anomaly monitor that you want to delete.
              required:
                - MonitorArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAnomalyMonitorResponse"
  /DeleteAnomalySubscription:
    post:
      operationId: DeleteAnomalySubscription
      description: Deletes a cost anomaly subscription.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.DeleteAnomalySubscription
            default: AWSInsightsIndexService.DeleteAnomalySubscription
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubscriptionArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The unique identifier of the cost anomaly subscription that you want to delete.
              required:
                - SubscriptionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAnomalySubscriptionResponse"
  /DeleteCostCategoryDefinition:
    post:
      operationId: DeleteCostCategoryDefinition
      description: Deletes a cost category. Expenses from this month going forward will no longer be categorized with this cost category.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.DeleteCostCategoryDefinition
            default: AWSInsightsIndexService.DeleteCostCategoryDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CostCategoryArn:
                  $ref: "#/components/schemas/Arn"
                  description: The unique identifier for your cost category.
              required:
                - CostCategoryArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCostCategoryDefinitionResponse"
  /DescribeCostCategoryDefinition:
    post:
      operationId: DescribeCostCategoryDefinition
      description: Returns the name, Amazon Resource Name (ARN), rules, definition, and effective dates of a cost category that's defined in the account. You have the option to use EffectiveOn to return a cost category that's active on a specific date. If there's no EffectiveOn specified, you see a Cost Category that's effective on the current date. If cost category is still effective, EffectiveEnd is omitted in the response.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.DescribeCostCategoryDefinition
            default: AWSInsightsIndexService.DescribeCostCategoryDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CostCategoryArn:
                  $ref: "#/components/schemas/Arn"
                  description: The unique identifier for your cost category.
                EffectiveOn:
                  $ref: "#/components/schemas/ZonedDateTime"
                  description: The date when the cost category was effective.
              required:
                - CostCategoryArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCostCategoryDefinitionResponse"
  /GetAnomalies:
    post:
      operationId: GetAnomalies
      description: Retrieves all of the cost anomalies detected on your account during the time period that's specified by the DateInterval object. Anomalies are available for up to 90 days.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.GetAnomalies
            default: AWSInsightsIndexService.GetAnomalies
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MonitorArn:
                  $ref: "#/components/schemas/GenericString"
                  description: Retrieves all of the cost anomalies detected for a specific cost anomaly monitor Amazon Resource Name (ARN).
                DateInterval:
                  $ref: "#/components/schemas/AnomalyDateInterval"
                  description: Assigns the start and end dates for retrieving cost anomalies. The returned anomaly object will have an AnomalyEndDate in the specified time range.
                Feedback:
                  $ref: "#/components/schemas/AnomalyFeedbackType"
                  description: Filters anomaly results by the feedback field on the anomaly object.
                TotalImpact:
                  $ref: "#/components/schemas/TotalImpactFilter"
                  description: Filters anomaly results by the total impact field on the anomaly object. For example, you can filter anomalies GREATER_THAN 200.00 to retrieve anomalies, with an estimated dollar impact greater than 200.
                NextPageToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token to retrieve the next set of results. Amazon Web Services provides the token when the response from a previous call has more results than the maximum page size.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The number of entries a paginated response contains.
              required:
                - DateInterval
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAnomaliesResponse"
  /GetAnomalyMonitors:
    post:
      operationId: GetAnomalyMonitors
      description: Retrieves the cost anomaly monitor definitions for your account. You can filter using a list of cost anomaly monitor Amazon Resource Names (ARNs).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.GetAnomalyMonitors
            default: AWSInsightsIndexService.GetAnomalyMonitors
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MonitorArnList:
                  $ref: "#/components/schemas/Values"
                  description: A list of cost anomaly monitor ARNs.
                NextPageToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token to retrieve the next set of results. Amazon Web Services provides the token when the response from a previous call has more results than the maximum page size.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The number of entries that a paginated response contains.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAnomalyMonitorsResponse"
  /GetAnomalySubscriptions:
    post:
      operationId: GetAnomalySubscriptions
      description: Retrieves the cost anomaly subscription objects for your account. You can filter using a list of cost anomaly monitor Amazon Resource Names (ARNs).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.GetAnomalySubscriptions
            default: AWSInsightsIndexService.GetAnomalySubscriptions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubscriptionArnList:
                  $ref: "#/components/schemas/Values"
                  description: A list of cost anomaly subscription ARNs.
                MonitorArn:
                  $ref: "#/components/schemas/GenericString"
                  description: Cost anomaly monitor ARNs.
                NextPageToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token to retrieve the next set of results. Amazon Web Services provides the token when the response from a previous call has more results than the maximum page size.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The number of entries a paginated response contains.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAnomalySubscriptionsResponse"
  /GetApproximateUsageRecords:
    post:
      operationId: GetApproximateUsageRecords
      description: Retrieves estimated usage records for hourly granularity or resource-level data at daily granularity.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.GetApproximateUsageRecords
            default: AWSInsightsIndexService.GetApproximateUsageRecords
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Granularity:
                  $ref: "#/components/schemas/Granularity"
                  description: How granular you want the data to be. You can enable data at hourly or daily granularity.
                Services:
                  $ref: "#/components/schemas/UsageServices"
                  description: The service metadata for the service or services you want to query. If not specified, all elements are returned.
                ApproximationDimension:
                  $ref: "#/components/schemas/ApproximationDimension"
                  description: The service to evaluate for the usage records. You can choose resource-level data at daily granularity, or hourly granularity with or without resource-level data.
              required:
                - Granularity
                - ApproximationDimension
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApproximateUsageRecordsResponse"
  /GetCommitmentPurchaseAnalysis:
    post:
      operationId: GetCommitmentPurchaseAnalysis
      description: Retrieves a commitment purchase analysis result based on the AnalysisId.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.GetCommitmentPurchaseAnalysis
            default: AWSInsightsIndexService.GetCommitmentPurchaseAnalysis
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AnalysisId:
                  $ref: "#/components/schemas/AnalysisId"
                  description: The analysis ID that's associated with the commitment purchase analysis.
              required:
                - AnalysisId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCommitmentPurchaseAnalysisResponse"
  /GetCostAndUsage:
    post:
      operationId: GetCostAndUsage
      description: Retrieves cost and usage metrics for your account. You can specify which cost and usage-related metric that you want the request to return. For example, you can specify BlendedCosts or UsageQuantity. You can also filter and group your data by various dimensions, such as SERVICE or AZ, in a specific time range. For a complete list of valid dimensions, see the GetDimensionValues operation. Management account in an organization in Organizations have access to all member accounts. For information about filter limitations, see Quotas and restrictions in the Billing and Cost Management User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.GetCostAndUsage
            default: AWSInsightsIndexService.GetCostAndUsage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TimePeriod:
                  $ref: "#/components/schemas/DateInterval"
                  description: Sets the start date and end date for retrieving Amazon Web Services costs. The start date is inclusive, but the end date is exclusive. For example, if start is 2017-01-01 and end is 2017-05-01, then the cost and usage data is retrieved from 2017-01-01 up to and including 2017-04-30 but not including 2017-05-01.
                Granularity:
                  $ref: "#/components/schemas/Granularity"
                  description: Sets the Amazon Web Services cost granularity to MONTHLY or DAILY, or HOURLY. If Granularity isn't set, the response object doesn't include the Granularity, either MONTHLY or DAILY, or HOURLY.
                Filter:
                  $ref: "#/components/schemas/Expression"
                  description: Filters Amazon Web Services costs by different dimensions. For example, you can specify SERVICE and LINKED_ACCOUNT and get the costs that are associated with that account's usage of that service. You can nest Expression objects to define any combination of dimension filters. For more information, see Expression. Valid values for MatchOptions for Dimensions are EQUALS and CASE_SENSITIVE. Valid values for MatchOptions for CostCategories and Tags are EQUALS, ABSENT, and CASE_SENSITIVE. Default values are EQUALS and CASE_SENSITIVE.
                Metrics:
                  $ref: "#/components/schemas/MetricNames"
                  description: Which metrics are returned in the query. For more information about blended and unblended rates, see Why does the "blended" annotation appear on some line items in my bill?. Valid values are AmortizedCost, BlendedCost, NetAmortizedCost, NetUnblendedCost, NormalizedUsageAmount, UnblendedCost, and UsageQuantity. If you return the UsageQuantity metric, the service aggregates all usage numbers without taking into account the units. For example, if you aggregate usageQuantity across all of Amazon EC2, the results aren't meaningful because Amazon EC2 compute hours and data transfer are measured in different units (for example, hours and GB). To get more meaningful UsageQuantity metrics, filter by UsageType or UsageTypeGroups. Metrics is required for GetCostAndUsage requests.
                GroupBy:
                  $ref: "#/components/schemas/GroupDefinitions"
                  description: You can group Amazon Web Services costs using up to two different groups, either dimensions, tag keys, cost categories, or any two group by types. Valid values for the DIMENSION type are AZ, INSTANCE_TYPE, LEGAL_ENTITY_NAME, INVOICING_ENTITY, LINKED_ACCOUNT, OPERATION, PLATFORM, PURCHASE_TYPE, SERVICE, TENANCY, RECORD_TYPE, and USAGE_TYPE. When you group by the TAG type and include a valid tag key, you get all tag values, including empty strings.
                BillingViewArn:
                  $ref: "#/components/schemas/BillingViewArn"
                  description: The Amazon Resource Name (ARN) that uniquely identifies a specific billing view. The ARN is used to specify which particular billing view you want to interact with or retrieve information from when making API calls related to Amazon Web Services Billing and Cost Management features. The BillingViewArn can be retrieved by calling the ListBillingViews API.
                NextPageToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token to retrieve the next set of results. Amazon Web Services provides the token when the response from a previous call has more results than the maximum page size.
              required:
                - TimePeriod
                - Granularity
                - Metrics
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCostAndUsageResponse"
  /GetCostAndUsageComparisons:
    post:
      operationId: GetCostAndUsageComparisons
      description: Retrieves cost and usage comparisons for your account between two periods within the last 13 months. If you have enabled multi-year data at monthly granularity, you can go back up to 38 months.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.GetCostAndUsageComparisons
            default: AWSInsightsIndexService.GetCostAndUsageComparisons
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                BillingViewArn:
                  $ref: "#/components/schemas/BillingViewArn"
                  description: The Amazon Resource Name (ARN) that uniquely identifies a specific billing view. The ARN is used to specify which particular billing view you want to interact with or retrieve information from when making API calls related to Amazon Web Services Billing and Cost Management features. The BillingViewArn can be retrieved by calling the ListBillingViews API.
                BaselineTimePeriod:
                  $ref: "#/components/schemas/DateInterval"
                  description: The reference time period for comparison. This time period serves as the baseline against which other cost and usage data will be compared. The interval must start and end on the first day of a month, with a duration of exactly one month.
                ComparisonTimePeriod:
                  $ref: "#/components/schemas/DateInterval"
                  description: The comparison time period for analysis. This time period's cost and usage data will be compared against the baseline time period. The interval must start and end on the first day of a month, with a duration of exactly one month.
                MetricForComparison:
                  $ref: "#/components/schemas/MetricName"
                  description: The cost and usage metric to compare. Valid values are AmortizedCost, BlendedCost, NetAmortizedCost, NetUnblendedCost, NormalizedUsageAmount, UnblendedCost, and UsageQuantity.
                Filter:
                  $ref: "#/components/schemas/Expression"
                GroupBy:
                  $ref: "#/components/schemas/GroupDefinitions"
                  description: You can group results using the attributes DIMENSION, TAG, and COST_CATEGORY.
                MaxResults:
                  $ref: "#/components/schemas/CostAndUsageComparisonsMaxResults"
                  description: The maximum number of results that are returned for the request.
                NextPageToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token to retrieve the next set of paginated results.
              required:
                - BaselineTimePeriod
                - ComparisonTimePeriod
                - MetricForComparison
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCostAndUsageComparisonsResponse"
  /GetCostAndUsageWithResources:
    post:
      operationId: GetCostAndUsageWithResources
      description: Retrieves cost and usage metrics with resources for your account. You can specify which cost and usage-related metric, such as BlendedCosts or UsageQuantity, that you want the request to return. You can also filter and group your data by various dimensions, such as SERVICE or AZ, in a specific time range. For a complete list of valid dimensions, see the GetDimensionValues operation. Management account in an organization in Organizations have access to all member accounts. Hourly granularity is only available for EC2-Instances (Elastic Compute Cloud) resource-level data. All other resource-level data is available at daily granularity. This is an opt-in only feature. You can enable this feature from the Cost Explorer Settings page. For information about how to access the Settings page, see Controlling Access for Cost Explorer in the Billing and Cost Management User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSInsightsIndexService.GetCostAndUsageWithResources
            default: AWSInsightsIndexService.GetCostAndUsageWithResources
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TimePeriod:
                  $ref: "#/components/schemas/DateInterval"
                  description: Sets the start and end dates for retrieving Amazon Web Services costs. The range must be within the last 14 days (the start date cannot be earlier than 14 days ago). The start date is inclusive, but the end date is exclusive. For example, if start is 2017-01-01 and end is 2017-05-01, then the cost and usage data is retrieved from 2017-01-01 up to and including 2017-04-30 but not including 2017-05-01.
                Granularity:
                  $ref: "#/components/schemas/Granularity"
                  description: Sets the Amazon Web Services cost granularity to MONTHLY, DAILY, or HOURLY. If Granularity isn't set, the response object doesn't include the Granularity, MONTHLY, DAILY, or HOURLY.
                Filter:
                  $ref: "#/components/schemas/Expression"
                  description: Filters Amazon Web Services costs by different dimensions. For example, you can specify SERVICE and LINKED_ACCOUNT and get the costs that are associated with that account's usage of that service. You can nest Expression objects to define any combination of dimension filters. For more information, see Expression. The GetCostAndUsageWithResources operation requires that you either group by or filter by a ResourceId. It requires the Expression "SERVICE = Amazon Elastic Compute Cloud - Compute" in the filter. Valid values for MatchOptions for Dimensions are EQUALS and CASE_SENSITIVE. Valid values for MatchOptions for CostCategories and Tags are EQUALS, ABSENT, and CASE_SENSITIVE. Default values are EQUALS and CASE_SENSITIVE.
                Metrics:
                  $ref: "#/components/schemas/MetricNames"
                  description: Which metrics are returned in the query. For more information about blended and unblended rates, see Why does the "blended" annotation appear on some line items in my bill?. Valid values are AmortizedCost, BlendedCost, NetAmortizedCost, NetUnblendedCost, NormalizedUsageAmount, UnblendedCost, and UsageQuantity. If you return the UsageQuantity metric, the service aggregates all usage numbers without taking the units into account. For example, if you aggregate usageQuantity across all of Amazon EC2, the results aren't meaningful because Amazon EC2 compute hours and data transfer are measured in different units (for example, hour or GB). To get more meaningful UsageQuantity metrics, filter by UsageType or UsageTypeGroups. Metrics is required for GetCostAndUsageWithResources requests.
                GroupBy:
                  $ref: "#/components/schemas/GroupDefinitions"
                  description: "You can group Amazon Web Services costs using up to two different groups: DIMENSION, TAG, COST_CATEGORY."
                BillingViewArn:
                  $ref: "#/components/schemas/BillingViewArn"
