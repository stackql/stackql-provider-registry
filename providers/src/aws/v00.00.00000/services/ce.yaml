          $ref: "#/components/schemas/GenericString"
          description: The amortized amount of your Savings Plans commitment that was purchased with either a Partial or a NoUpfront.
        AmortizedUpfrontCommitment:
          $ref: "#/components/schemas/GenericString"
          description: The amortized amount of your Savings Plans commitment that was purchased with an Upfront or PartialUpfront Savings Plans.
        TotalAmortizedCommitment:
          $ref: "#/components/schemas/GenericString"
          description: The total amortized amount of your Savings Plans commitment, regardless of your Savings Plans purchase method.
    SavingsPlansUtilizationAggregates:
      description: The aggregated utilization metrics for your Savings Plans usage.
      type: object
      properties:
        Utilization:
          $ref: "#/components/schemas/SavingsPlansUtilization"
          description: A ratio of your effectiveness of using existing Savings Plans to apply to workloads that are Savings Plans eligible.
        Savings:
          $ref: "#/components/schemas/SavingsPlansSavings"
          description: The amount that's saved by using existing Savings Plans. Savings returns both net savings from Savings Plans and also the onDemandCostEquivalent of the Savings Plans when considering the utilization rate.
