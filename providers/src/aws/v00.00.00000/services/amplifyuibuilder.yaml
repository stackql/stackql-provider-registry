openapi: 3.0.0
info:
  version: "2021-08-11"
  title: AWS Amplify UI Builder
  description: AWS Amplify UI Builder
  x-serviceName: amplifyuibuilder
  x-serviceAlias: amplifyuibuilder
  x-protocol: rest-json
  x-apiVersion: "2021-08-11"
  x-endpointPrefix: amplifyuibuilder
  x-jsonVersion: "1.1"
servers:
  - url: https://amplifyuibuilder.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for amplifyuibuilder
paths:
  /app/{app_id}/environment/{environment_name}/components:
    post:
      operationId: CreateComponent
      description: Creates a new component for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app to associate with the component.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The unique client token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                componentToCreate:
                  $ref: "#/components/schemas/CreateComponentData"
              required:
                - componentToCreate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComponentResponse"
    get:
      operationId: ListComponents
      description: Retrieves a list of components for a specified Amplify app and backend environment.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID for the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to request the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListEntityLimit"
          description: The maximum number of components to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentsResponse"
  /app/{app_id}/environment/{environment_name}/forms:
    post:
      operationId: CreateForm
      description: Creates a new form for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app to associate with the form.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The unique client token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                formToCreate:
                  $ref: "#/components/schemas/CreateFormData"
              required:
                - formToCreate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFormResponse"
    get:
      operationId: ListForms
      description: Retrieves a list of forms for a specified Amplify app and backend environment.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID for the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to request the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListEntityLimit"
          description: The maximum number of forms to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFormsResponse"
  /app/{app_id}/environment/{environment_name}/themes:
    post:
      operationId: CreateTheme
      description: Creates a theme to apply to the components in an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app associated with the theme.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The unique client token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                themeToCreate:
                  $ref: "#/components/schemas/CreateThemeData"
              required:
                - themeToCreate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateThemeResponse"
    get:
      operationId: ListThemes
      description: Retrieves a list of themes for a specified Amplify app and backend environment.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID for the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to request the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListEntityLimit"
          description: The maximum number of theme results to return in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListThemesResponse"
  /app/{app_id}/environment/{environment_name}/components/{id}:
    delete:
      operationId: DeleteComponent
      description: Deletes a component from an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app associated with the component to delete.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID of the component to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetComponent
      description: Returns an existing component for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is part of the Amplify app.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID of the component.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComponentResponse"
    patch:
      operationId: UpdateComponent
      description: Updates an existing component.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID for the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is part of the Amplify app.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID for the component.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The unique client token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                updatedComponent:
                  $ref: "#/components/schemas/UpdateComponentData"
              required:
                - updatedComponent
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateComponentResponse"
  /app/{app_id}/environment/{environment_name}/forms/{id}:
    delete:
      operationId: DeleteForm
      description: Deletes a form from an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app associated with the form to delete.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID of the form to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetForm
      description: Returns an existing form for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is part of the Amplify app.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID of the form.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFormResponse"
    patch:
      operationId: UpdateForm
      description: Updates an existing form.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID for the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is part of the Amplify app.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID for the form.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The unique client token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                updatedForm:
                  $ref: "#/components/schemas/UpdateFormData"
              required:
                - updatedForm
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFormResponse"
  /app/{app_id}/environment/{environment_name}/themes/{id}:
    delete:
      operationId: DeleteTheme
      description: Deletes a theme from an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app associated with the theme to delete.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID of the theme to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetTheme
      description: Returns an existing theme for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is part of the Amplify app.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID for the theme.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetThemeResponse"
    patch:
      operationId: UpdateTheme
      description: Updates an existing theme.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID for the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is part of the Amplify app.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID for the theme.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The unique client token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                updatedTheme:
                  $ref: "#/components/schemas/UpdateThemeData"
              required:
                - updatedTheme
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateThemeResponse"
  /tokens/{provider}:
    post:
      operationId: ExchangeCodeForToken
      description: This is for internal use. Amplify uses this action to exchange an access code for a token.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TokenProviders"
          description: The third-party provider for the token. The only valid value is figma.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request:
                  $ref: "#/components/schemas/ExchangeCodeForTokenRequestBody"
              required:
                - request
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeCodeForTokenResponse"
  /export/app/{app_id}/environment/{environment_name}/components:
    get:
      operationId: ExportComponents
      description: Exports component configurations to code that is ready to integrate into an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app to export components to.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportComponentsResponse"
  /export/app/{app_id}/environment/{environment_name}/forms:
    get:
      operationId: ExportForms
      description: Exports form configurations to code that is ready to integrate into an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app to export forms to.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportFormsResponse"
  /export/app/{app_id}/environment/{environment_name}/themes:
    get:
      operationId: ExportThemes
      description: Exports theme configurations to code that is ready to integrate into an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app to export the themes to.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is part of the Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportThemesResponse"
  /app/{app_id}/environment/{environment_name}/codegen-jobs/{id}:
    get:
      operationId: GetCodegenJob
      description: Returns an existing code generation job.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID of the Amplify app associated with the code generation job.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app associated with the code generation job.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique ID of the code generation job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCodegenJobResponse"
  /app/{app_id}/environment/{environment_name}/metadata:
    get:
      operationId: GetMetadata
      description: Returns existing metadata for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is part of the Amplify app.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMetadataResponse"
  /app/{app_id}/environment/{environment_name}/codegen-jobs:
    get:
      operationId: ListCodegenJobs
      description: Retrieves a list of code generation jobs for a specified Amplify app and backend environment.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to request the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListCodegenJobsLimit"
          description: The maximum number of jobs to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCodegenJobsResponse"
    post:
      operationId: StartCodegenJob
      description: Starts a code generation job for a specified Amplify app and backend environment.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The idempotency token used to ensure that the code generation job request completes only once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                codegenJobToCreate:
                  $ref: "#/components/schemas/StartCodegenJobData"
              required:
                - codegenJobToCreate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCodegenJobResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of tags for a specified Amazon Resource Name (ARN).
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) to use to list tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Tags the resource with a tag key and value.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) to use to tag a resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Untags a resource with a specified Amazon Resource Name (ARN).
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) to use to untag a resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys to use to untag a resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /app/{app_id}/environment/{environment_name}/metadata/features/{feature_name}:
    put:
      operationId: PutMetadataFlag
      description: Stores the metadata information about a feature on a form.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique ID for the Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the backend environment that is part of the Amplify app.
        - name: feature_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the feature associated with the metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/PutMetadataFlagBody"
              required:
                - body
      responses:
        "200":
          description: Success
  /tokens/{provider}/refresh:
    post:
      operationId: RefreshToken
      description: This is for internal use. Amplify uses this action to refresh a previously issued access token that might have expired.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TokenProviders"
          description: The third-party provider for the token. The only valid value is figma.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshTokenBody:
                  $ref: "#/components/schemas/RefreshTokenRequestBody"
              required:
                - refreshTokenBody
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    CreateComponentData:
      description: Represents all of the information that is required to create a component.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ComponentName"
          description: The name of the component
        sourceId:
          $ref: "#/components/schemas/String"
          description: The unique ID of the component in its original source system, such as Figma.
        componentType:
          $ref: "#/components/schemas/ComponentType"
          description: The component type. This can be an Amplify custom UI component or another custom component.
        properties_:
          type: object
          properties: {}
          description: Describes the component's properties.
        children:
          $ref: "#/components/schemas/ComponentChildList"
          description: A list of child components that are instances of the main component.
        variants:
          $ref: "#/components/schemas/ComponentVariants"
          description: A list of the unique variants of this component.
        overrides:
          type: object
          properties: {}
          description: Describes the component properties that can be overriden to customize an instance of the component.
        bindingProperties:
          type: object
          properties: {}
          description: The data binding information for the component's properties.
        collectionProperties:
          type: object
          properties: {}
          description: The data binding configuration for customizing a component's properties. Use this for a collection component.
        tags:
          type: object
          properties: {}
          description: One or more key-value pairs to use when tagging the component data.
        events:
          type: object
          properties: {}
          description: The event configuration for the component. Use for the workflow feature in Amplify Studio that allows you to bind events and actions to components.
        schemaVersion:
          $ref: "#/components/schemas/String"
          description: The schema version of the component when it was imported.
      required:
        - name
        - componentType
        - properties_
        - variants
        - overrides
        - bindingProperties
    ComponentName:
      type: string
      minLength: 1
      maxLength: 255
    ComponentType:
      type: string
      minLength: 1
      maxLength: 255
    ComponentChildList:
      type: array
      items:
        $ref: "#/components/schemas/ComponentChild"
    ComponentChild:
      description: A nested UI configuration within a parent Component.
      type: object
      properties:
        componentType:
          $ref: "#/components/schemas/String"
          description: The type of the child component.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the child component.
        properties_:
          type: object
          properties: {}
          description: Describes the properties of the child component. You can't specify tags as a valid property for properties.
        children:
          $ref: "#/components/schemas/ComponentChildList"
          description: The list of ComponentChild instances for this component.
        events:
          type: object
          properties: {}
          description: Describes the events that can be raised on the child component. Use for the workflow feature in Amplify Studio that allows you to bind events and actions to components.
        sourceId:
          $ref: "#/components/schemas/String"
          description: The unique ID of the child component in its original source system, such as Figma.
      required:
        - componentType
        - name
        - properties_
    ComponentVariants:
      type: array
      items:
        $ref: "#/components/schemas/ComponentVariant"
    ComponentVariant:
      description: Describes the style configuration of a unique variation of a main component.
      type: object
      properties:
        variantValues:
          type: object
          properties: {}
          description: The combination of variants that comprise this variant. You can't specify tags as a valid property for variantValues.
        overrides:
          type: object
          properties: {}
          description: The properties of the component variant that can be overriden when customizing an instance of the component. You can't specify tags as a valid property for overrides.
    CreateComponentResponse:
      type: object
      properties:
        entity:
          $ref: "#/components/schemas/Component"
          description: Describes the configuration of the new component.
    Component:
      description: Contains the configuration settings for a user interface (UI) element for an Amplify app. A component is configured as a primary, stand-alone UI element. Use ComponentChild to configure an instance of a Component. A ComponentChild instance inherits the configuration of the main Component.
      type: object
      properties:
        appId:
          $ref: "#/components/schemas/String"
          description: The unique ID of the Amplify app associated with the component.
        environmentName:
          $ref: "#/components/schemas/String"
          description: The name of the backend environment that is a part of the Amplify app.
        sourceId:
          $ref: "#/components/schemas/String"
          description: The unique ID of the component in its original source system, such as Figma.
        id:
          $ref: "#/components/schemas/Uuid"
          description: The unique ID of the component.
        name:
          $ref: "#/components/schemas/ComponentName"
          description: The name of the component.
        componentType:
          $ref: "#/components/schemas/ComponentType"
          description: The type of the component. This can be an Amplify custom UI component or another custom component.
        properties_:
          type: object
          properties: {}
          description: Describes the component's properties. You can't specify tags as a valid property for properties.
        children:
          $ref: "#/components/schemas/ComponentChildList"
          description: A list of the component's ComponentChild instances.
        variants:
          $ref: "#/components/schemas/ComponentVariants"
          description: A list of the component's variants. A variant is a unique style configuration of a main component.
        overrides:
          type: object
          properties: {}
          description: Describes the component's properties that can be overriden in a customized instance of the component. You can't specify tags as a valid property for overrides.
        bindingProperties:
          type: object
          properties: {}
          description: The information to connect a component's properties to data at runtime. You can't specify tags as a valid property for bindingProperties.
        collectionProperties:
          type: object
          properties: {}
          description: The data binding configuration for the component's properties. Use this for a collection component. You can't specify tags as a valid property for collectionProperties.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time that the component was created.
        modifiedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time that the component was modified.
        tags:
          type: object
          properties: {}
          description: One or more key-value pairs to use when tagging the component.
        events:
          type: object
          properties: {}
          description: Describes the events that can be raised on the component. Use for the workflow feature in Amplify Studio that allows you to bind events and actions to components.
        schemaVersion:
          $ref: "#/components/schemas/String"
          description: The schema version of the component when it was imported.
      required:
        - appId
        - environmentName
        - id
        - name
        - componentType
        - properties_
        - variants
        - overrides
        - bindingProperties
        - createdAt
    Uuid:
      type: string
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    CreateFormData:
      description: Represents all of the information that is required to create a form.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FormName"
          description: The name of the form.
        dataType:
          $ref: "#/components/schemas/FormDataTypeConfig"
          description: The type of data source to use to create the form.
        formActionType:
          $ref: "#/components/schemas/FormActionType"
          description: Specifies whether to perform a create or update action on the form.
        fields:
          type: object
          properties: {}
          description: The configuration information for the form's fields.
        style:
          $ref: "#/components/schemas/FormStyle"
          description: The configuration for the form's style.
