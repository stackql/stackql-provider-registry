openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS Sustainability
  description: AWS Sustainability
  x-serviceName: sustainability
  x-serviceAlias: sustainability
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: sustainability
servers:
  - url: https://sustainability.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for sustainability
paths:
  /v1/estimated-carbon-emissions:
    post:
      operationId: GetEstimatedCarbonEmissions
      description: Returns estimated carbon emission values based on customer grouping and filtering parameters. We recommend using pagination to ensure that the operation returns quickly and successfully.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TimePeriod:
                  $ref: "#/components/schemas/TimePeriod"
                GroupBy:
                  $ref: "#/components/schemas/DimensionList"
                FilterBy:
                  $ref: "#/components/schemas/FilterExpression"
                EmissionsTypes:
                  $ref: "#/components/schemas/EmissionsTypeList"
                Granularity:
                  $ref: "#/components/schemas/TimeGranularity"
                GranularityConfiguration:
                  $ref: "#/components/schemas/GranularityConfiguration"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - TimePeriod
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEstimatedCarbonEmissionsResponse"
  /v1/estimated-carbon-emissions-dimension-values:
    post:
      operationId: GetEstimatedCarbonEmissionsDimensionValues
      description: Returns the possible dimension values available for a customer's account. We recommend using pagination to ensure that the operation returns quickly and successfully.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TimePeriod:
                  $ref: "#/components/schemas/TimePeriod"
                Dimensions:
                  $ref: "#/components/schemas/DimensionList"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - TimePeriod
                - Dimensions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEstimatedCarbonEmissionsDimensionValuesResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    TimePeriod:
      description: Represents a duration of time defined by start and end timestamps.
      type: object
      properties:
        Start:
          $ref: "#/components/schemas/Timestamp"
          description: "The start (inclusive) of the time period. ISO-8601 formatted timestamp, for example: YYYY-MM-DDThh:mm:ss.sssZ"
        End:
          $ref: "#/components/schemas/Timestamp"
          description: "The end (exclusive) of the time period. ISO-8601 formatted timestamp, for example: YYYY-MM-DDThh:mm:ss.sssZ"
      required:
        - Start
        - End
    Timestamp:
      type: string
      format: date-time
    DimensionList:
      type: array
      items:
        $ref: "#/components/schemas/Dimension"
    Dimension:
      description: Specifies the dimensions available for grouping and filtering emissions data.
      type: string
      enum:
        - USAGE_ACCOUNT_ID
        - REGION
        - SERVICE
    FilterExpression:
      description: Filters emission values by specific dimension values.
      type: object
      properties:
        Dimensions:
          type: object
          properties: {}
          description: Filters emission values by specific dimension values.
    EmissionsTypeList:
      type: array
      items:
        $ref: "#/components/schemas/EmissionsType"
    EmissionsType:
      description: Specifies the types of carbon emissions calculations available.
      type: string
      enum:
        - TOTAL_LBM_CARBON_EMISSIONS
        - TOTAL_MBM_CARBON_EMISSIONS
        - TOTAL_SCOPE_1_CARBON_EMISSIONS
        - TOTAL_SCOPE_2_LBM_CARBON_EMISSIONS
        - TOTAL_SCOPE_2_MBM_CARBON_EMISSIONS
        - TOTAL_SCOPE_3_LBM_CARBON_EMISSIONS
        - TOTAL_SCOPE_3_MBM_CARBON_EMISSIONS
    TimeGranularity:
      description: Specifies the time period over which emissions data is aggregated.
      type: string
      enum:
        - YEARLY_CALENDAR
        - YEARLY_FISCAL
        - QUARTERLY_CALENDAR
        - QUARTERLY_FISCAL
        - MONTHLY
    GranularityConfiguration:
      description: Contains configuration for the fiscal year granularities (e.g., YEARLY_FISCAL, QUARTERLY_FISCAL.
      type: object
      properties:
        FiscalYearStartMonth:
          $ref: "#/components/schemas/Month"
          description: The month (1-12) when the fiscal year begins. Used for YEARLY_FISCAL and QUARTERLY_FISCAL granularity. Defaults to 1 (January).
    Month:
      type: integer
      minimum: 1
      maximum: 12
    MaxResults:
      type: integer
      minimum: 1
      maximum: 5000
    NextToken:
      type: string
      minLength: 1
      maxLength: 2000
    GetEstimatedCarbonEmissionsResponse:
      type: object
      properties:
        Results:
          $ref: "#/components/schemas/EstimatedCarbonEmissionsList"
          description: The result of the requested inputs.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token indicating there are additional pages available. You can use the token in a following request to fetch the next set of results.
      required:
        - Results
    EstimatedCarbonEmissionsList:
      type: array
      items:
        $ref: "#/components/schemas/EstimatedCarbonEmissions"
    EstimatedCarbonEmissions:
      description: Contains estimated carbon emissions data for a specific time period and dimension grouping.
      type: object
      properties:
        TimePeriod:
          $ref: "#/components/schemas/TimePeriod"
          description: The reporting period for emission values.
        DimensionsValues:
          type: object
          properties: {}
          description: The dimensions used to group emissions values.
        ModelVersion:
          $ref: "#/components/schemas/ModelVersion"
          description: The semantic version-formatted string that indicates the methodology version used to calculate the emission values. The AWS Sustainability service reflects the most recent model version for every month. You will not see two entries for the same month with different ModelVersion values. To track the evolution of the methodology and compare emission values from previous versions, we recommend creating a Data Export.
        EmissionsValues:
          type: object
          properties: {}
          description: The emissions values for the requested emissions types.
      required:
        - TimePeriod
        - DimensionsValues
        - ModelVersion
        - EmissionsValues
    ModelVersion:
      type: string
      pattern: v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?
    GetEstimatedCarbonEmissionsDimensionValuesResponse:
      type: object
      properties:
        Results:
          $ref: "#/components/schemas/DimensionEntryList"
          description: The list of possible dimensions over which the emissions data is aggregated.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token indicating there are additional pages available. You can use the token in a following request to fetch the next set of results.
    DimensionEntryList:
      type: array
      items:
        $ref: "#/components/schemas/DimensionEntry"
    DimensionEntry:
      description: Represents a dimension and its corresponding value.
      type: object
      properties:
        Dimension:
          $ref: "#/components/schemas/Dimension"
          description: The dimension type that categorizes this entry.
        Value:
          $ref: "#/components/schemas/String"
          description: The value for the specified dimension. Valid values vary based on the dimension type (e.g., us-east-1 for the REGION dimension, AmazonEC2 for the SERVICE dimension).
      required:
        - Dimension
        - Value
    String:
      type: string
  x-stackQL-resources:
    estimated_carbon_emissions:
      id: aws.sustainability.estimated_carbon_emissions
      name: estimated_carbon_emissions
      title: estimated_carbon_emissions
      methods:
        get_estimated_carbon_emissions:
          operation:
            $ref: "#/paths/~1v1~1estimated-carbon-emissions/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Results
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/estimated_carbon_emissions/methods/get_estimated_carbon_emissions"
        insert: []
        update: []
        delete: []
    estimated_carbon_emissions_dimension_values:
      id: aws.sustainability.estimated_carbon_emissions_dimension_values
      name: estimated_carbon_emissions_dimension_values
      title: estimated_carbon_emissions_dimension_values
      methods:
        get_estimated_carbon_emissions_dimension_values:
          operation:
            $ref: "#/paths/~1v1~1estimated-carbon-emissions-dimension-values/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Results
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/estimated_carbon_emissions_dimension_values/methods/get_estimated_carbon_emissions_dimension_values"
        insert: []
        update: []
        delete: []
