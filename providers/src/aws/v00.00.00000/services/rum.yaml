      type: object
      properties:
        Name:
          $ref: "#/components/schemas/QueryFilterKey"
          description: The name of a key to search for. The filter returns only the events that match the Name and Values that you specify. Valid values for Name are Browser | Device | Country | Page | OS | EventType | Invert
        Values:
