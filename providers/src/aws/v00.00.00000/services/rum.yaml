    MetricDefinition:
      description: A structure that displays the definition of one extended metric that RUM sends to CloudWatch or CloudWatch Evidently. For more information, see Additional metrics that you can send to CloudWatch and CloudWatch Evidently.
      type: object
      properties:
        MetricDefinitionId:
          $ref: "#/components/schemas/MetricDefinitionId"
          description: The ID of this metric definition.
        Name:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric that is defined in this structure.
        ValueKey:
          $ref: "#/components/schemas/ValueKey"
          description: The field within the event object that the metric value is sourced from.
        UnitLabel:
          $ref: "#/components/schemas/UnitLabel"
          description: Use this field only if you are sending this metric to CloudWatch. It defines the CloudWatch metric unit that this metric is measured in.
        DimensionKeys:
          type: object
          properties: {}
          description: This field is a map of field paths to dimension names. It defines the dimensions to associate with this metric in CloudWatch The value of this field is used only if the metric destination is CloudWatch. If the metric destination is Evidently, the value of DimensionKeys is ignored.
        EventPattern:
          $ref: "#/components/schemas/EventPattern"
          description: The pattern that defines the metric. RUM checks events that happen in a user's session against the pattern, and events that match the pattern are sent to the metric destination. If the metrics destination is CloudWatch and the event also matches a value in DimensionKeys, then the metric is published with the specified dimensions.
        Namespace:
          $ref: "#/components/schemas/Namespace"
          description: If this metric definition is for a custom metric instead of an extended metric, this field displays the metric namespace that the custom metric is published to.
      required:
        - MetricDefinitionId
        - Name
    MetricDefinitionId:
      type: string
      minLength: 1
      maxLength: 255
    MetricDefinitionIds:
      type: array
      items:
        $ref: "#/components/schemas/MetricDefinitionId"
    BatchDeleteRumMetricDefinitionsResponse:
      type: object
