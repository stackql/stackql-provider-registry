openapi: 3.0.0
info:
  version: "2018-05-10"
  title: CloudWatch RUM
  description: CloudWatch RUM
  x-serviceName: rum
  x-serviceAlias: rum
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: rum
servers:
  - url: https://rum.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for rum
paths:
  /rummetrics/{app_monitor_name}/metrics:
    post:
      operationId: BatchCreateRumMetricDefinitions
      description: Specifies the extended metrics and custom metrics that you want a CloudWatch RUM app monitor to send to a destination. Valid destinations include CloudWatch and Evidently. By default, RUM app monitors send some metrics to CloudWatch. These default metrics are listed in CloudWatch metrics that you can collect with CloudWatch RUM. In addition to these default metrics, you can choose to send extended metrics, custom metrics, or both. Extended metrics let you send metrics with additional dimensions that aren't included in the default metrics. You can also send extended metrics to both Evidently and CloudWatch. The valid dimension names for the additional dimensions for extended metrics are BrowserName, CountryCode, DeviceType, FileType, OSName, and PageId. For more information, see Extended metrics that you can send to CloudWatch and CloudWatch Evidently. Custom metrics are metrics that you define. You can send custom metrics to CloudWatch. CloudWatch Evidently, or both. With custom metrics, you can use any metric name and namespace. To derive the metrics, you can use any custom events, built-in events, custom attributes, or default attributes. You can't send custom metrics to the AWS/RUM namespace. You must send custom metrics to a custom namespace that you define. The namespace that you use can't start with AWS/. CloudWatch RUM prepends RUM/CustomMetrics/ to the custom namespace that you define, so the final namespace for your metrics in CloudWatch is RUM/CustomMetrics/your-custom-namespace . The maximum number of metric definitions that you can specify in one BatchCreateRumMetricDefinitions operation is 200. The maximum number of metric definitions that one destination can contain is 2000. Extended metrics sent to CloudWatch and RUM custom metrics are charged as CloudWatch custom metrics. Each combination of additional dimension name and dimension value counts as a custom metric. For more information, see Amazon CloudWatch Pricing. You must have already created a destination for the metrics before you send them. For more information, see PutRumMetricsDestination. If some metric definitions specified in a BatchCreateRumMetricDefinitions operations are not valid, those metric definitions fail and return errors, but all valid metric definitions in the same operation still succeed.
      parameters:
        - name: app_monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the CloudWatch RUM app monitor that is to send the metrics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Destination:
                  $ref: "#/components/schemas/MetricDestination"
                DestinationArn:
                  $ref: "#/components/schemas/DestinationArn"
                MetricDefinitions:
                  $ref: "#/components/schemas/MetricDefinitionsRequest"
              required:
                - MetricDefinitions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateRumMetricDefinitionsResponse"
    delete:
      operationId: BatchDeleteRumMetricDefinitions
      description: Removes the specified metrics from being sent to an extended metrics destination. If some metric definition IDs specified in a BatchDeleteRumMetricDefinitions operations are not valid, those metric definitions fail and return errors, but all valid metric definition IDs in the same operation are still deleted. The maximum number of metric definitions that you can specify in one BatchDeleteRumMetricDefinitions operation is 200.
      parameters:
        - name: app_monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the CloudWatch RUM app monitor that is sending these metrics.
        - name: destination
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MetricDestination"
          description: Defines the destination where you want to stop sending the specified metrics. Valid values are CloudWatch and Evidently. If you specify Evidently, you must also specify the ARN of the CloudWatchEvidently experiment that is to be the destination and an IAM role that has permission to write to the experiment.
        - name: destinationArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DestinationArn"
          description: This parameter is required if Destination is Evidently. If Destination is CloudWatch, do not use this parameter. This parameter specifies the ARN of the Evidently experiment that was receiving the metrics that are being deleted.
        - name: metricDefinitionIds
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MetricDefinitionIds"
          description: An array of structures which define the metrics that you want to stop sending.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteRumMetricDefinitionsResponse"
    get:
      operationId: BatchGetRumMetricDefinitions
      description: Retrieves the list of metrics and dimensions that a RUM app monitor is sending to a single destination.
      parameters:
        - name: app_monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the CloudWatch RUM app monitor that is sending the metrics.
        - name: destination
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MetricDestination"
          description: The type of destination that you want to view metrics for. Valid values are CloudWatch and Evidently.
        - name: destinationArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DestinationArn"
          description: This parameter is required if Destination is Evidently. If Destination is CloudWatch, do not use this parameter. This parameter specifies the ARN of the Evidently experiment that corresponds to the destination.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsInteger"
          description: The maximum number of results to return in one operation. The default is 50. The maximum that you can specify is 100. To retrieve the remaining results, make another call with the returned NextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Use the token returned by the previous operation to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetRumMetricDefinitionsResponse"
    patch:
      operationId: UpdateRumMetricDefinition
      description: Modifies one existing metric definition for CloudWatch RUM extended metrics. For more information about extended metrics, see BatchCreateRumMetricsDefinitions.
      parameters:
        - name: app_monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the CloudWatch RUM app monitor that sends these metrics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Destination:
                  $ref: "#/components/schemas/MetricDestination"
                DestinationArn:
                  $ref: "#/components/schemas/DestinationArn"
                MetricDefinition:
                  $ref: "#/components/schemas/MetricDefinitionRequest"
                MetricDefinitionId:
                  $ref: "#/components/schemas/MetricDefinitionId"
              required:
                - MetricDefinition
                - MetricDefinitionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRumMetricDefinitionResponse"
  /appmonitor:
    post:
      operationId: CreateAppMonitor
      description: Creates a Amazon CloudWatch RUM app monitor, which collects telemetry data from your application and sends that data to RUM. The data includes performance and reliability information such as page load time, client-side errors, and user behavior. You use this operation only to create a new app monitor. To update an existing app monitor, use UpdateAppMonitor instead. After you create an app monitor, sign in to the CloudWatch RUM console to get the JavaScript code snippet to add to your web application. For more information, see How do I find a code snippet that I've already generated?
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/AppMonitorName"
                Domain:
                  $ref: "#/components/schemas/AppMonitorDomain"
                DomainList:
                  $ref: "#/components/schemas/AppMonitorDomainList"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                AppMonitorConfiguration:
                  $ref: "#/components/schemas/AppMonitorConfiguration"
                CwLogEnabled:
                  $ref: "#/components/schemas/Boolean"
                CustomEvents:
                  $ref: "#/components/schemas/CustomEvents"
                DeobfuscationConfiguration:
                  $ref: "#/components/schemas/DeobfuscationConfiguration"
                Platform:
                  $ref: "#/components/schemas/AppMonitorPlatform"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppMonitorResponse"
  /appmonitor/{name}:
    delete:
      operationId: DeleteAppMonitor
      description: Deletes an existing app monitor. This immediately stops the collection of data.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the app monitor to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppMonitorResponse"
    get:
      operationId: GetAppMonitor
      description: Retrieves the complete configuration information for one app monitor.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The app monitor to retrieve information for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppMonitorResponse"
    patch:
      operationId: UpdateAppMonitor
      description: Updates the configuration of an existing app monitor. When you use this operation, only the parts of the app monitor configuration that you specify in this operation are changed. For any parameters that you omit, the existing values are kept. You can't use this operation to change the tags of an existing app monitor. To change the tags of an existing app monitor, use TagResource. To create a new app monitor, use CreateAppMonitor. After you update an app monitor, sign in to the CloudWatch RUM console to get the updated JavaScript code snippet to add to your web application. For more information, see How do I find a code snippet that I've already generated?
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the app monitor to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Domain:
                  $ref: "#/components/schemas/AppMonitorDomain"
                DomainList:
                  $ref: "#/components/schemas/AppMonitorDomainList"
                AppMonitorConfiguration:
                  $ref: "#/components/schemas/AppMonitorConfiguration"
                CwLogEnabled:
                  $ref: "#/components/schemas/Boolean"
                CustomEvents:
                  $ref: "#/components/schemas/CustomEvents"
                DeobfuscationConfiguration:
                  $ref: "#/components/schemas/DeobfuscationConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppMonitorResponse"
  /appmonitor/{name}/policy:
    delete:
      operationId: DeleteResourcePolicy
      description: Removes the association of a resource-based policy from an app monitor.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The app monitor that you want to remove the resource policy from.
        - name: policyRevisionId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PolicyRevisionId"
          description: Specifies a specific policy revision to delete. Provide a PolicyRevisionId to ensure an atomic delete operation. If the revision ID that you provide doesn't match the latest policy revision ID, the request will be rejected with an InvalidPolicyRevisionIdException error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourcePolicyResponse"
    get:
      operationId: GetResourcePolicy
      description: Use this operation to retrieve information about a resource-based policy that is attached to an app monitor.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the app monitor that is associated with the resource-based policy that you want to view.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePolicyResponse"
    put:
      operationId: PutResourcePolicy
      description: Use this operation to assign a resource-based policy to a CloudWatch RUM app monitor to control access to it. Each app monitor can have one resource-based policy. The maximum size of the policy is 4 KB. To learn more about using resource policies with RUM, see Using resource-based policies with CloudWatch RUM.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the app monitor that you want to apply this resource-based policy to. To find the names of your app monitors, you can use the ListAppMonitors operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PolicyDocument:
                  $ref: "#/components/schemas/String"
                PolicyRevisionId:
                  $ref: "#/components/schemas/PolicyRevisionId"
              required:
                - PolicyDocument
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyResponse"
  /rummetrics/{app_monitor_name}/metricsdestination:
    delete:
      operationId: DeleteRumMetricsDestination
      description: Deletes a destination for CloudWatch RUM extended metrics, so that the specified app monitor stops sending extended metrics to that destination.
      parameters:
        - name: app_monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the app monitor that is sending metrics to the destination that you want to delete.
        - name: destination
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MetricDestination"
          description: The type of destination to delete. Valid values are CloudWatch and Evidently.
        - name: destinationArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DestinationArn"
          description: This parameter is required if Destination is Evidently. If Destination is CloudWatch, do not use this parameter. This parameter specifies the ARN of the Evidently experiment that corresponds to the destination to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRumMetricsDestinationResponse"
    get:
      operationId: ListRumMetricsDestinations
      description: Returns a list of destinations that you have created to receive RUM extended metrics, for the specified app monitor. For more information about extended metrics, see AddRumMetrics.
      parameters:
        - name: app_monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the app monitor associated with the destinations that you want to retrieve.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsInteger"
          description: The maximum number of results to return in one operation. The default is 50. The maximum that you can specify is 100. To retrieve the remaining results, make another call with the returned NextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Use the token returned by the previous operation to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRumMetricsDestinationsResponse"
    post:
      operationId: PutRumMetricsDestination
      description: Creates or updates a destination to receive extended metrics from CloudWatch RUM. You can send extended metrics to CloudWatch or to a CloudWatch Evidently experiment. For more information about extended metrics, see BatchCreateRumMetricDefinitions.
      parameters:
        - name: app_monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the CloudWatch RUM app monitor that will send the metrics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Destination:
                  $ref: "#/components/schemas/MetricDestination"
                DestinationArn:
                  $ref: "#/components/schemas/DestinationArn"
                IamRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutRumMetricsDestinationResponse"
  /appmonitor/{name}/data:
    post:
      operationId: GetAppMonitorData
      description: Retrieves the raw performance events that RUM has collected from your web application, so that you can do your own processing or analysis of this data.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppMonitorName"
          description: The name of the app monitor that collected the data that you want to retrieve.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TimeRange:
                  $ref: "#/components/schemas/TimeRange"
                Filters:
                  $ref: "#/components/schemas/QueryFilters"
                MaxResults:
                  $ref: "#/components/schemas/MaxQueryResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
              required:
                - TimeRange
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppMonitorDataOutputDisplay"
  /appmonitors:
    post:
      operationId: ListAppMonitors
      description: Returns a list of the Amazon CloudWatch RUM app monitors in the account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsInteger"
          description: The maximum number of results to return in one operation. The default is 50. The maximum that you can specify is 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Use the token returned by the previous operation to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppMonitorsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Displays the tags associated with a CloudWatch RUM resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource that you want to see the tags of.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified CloudWatch RUM resource. Currently, the only resources that can be tagged app monitors. Tags can help you organize and categorize your resources. You can also use them to scope user permissions by granting a user permission to access or change only resources with certain tag values. Tags don't have any semantic meaning to Amazon Web Services and are interpreted strictly as strings of characters. You can use the TagResource action with a resource that already has tags. If you specify a new tag key for the resource, this tag is appended to the list of tags associated with the alarm. If you specify a tag key that is already associated with the resource, the new tag value that you specify replaces the previous value for that tag. You can associate as many as 50 tags with a resource. For more information, see Tagging Amazon Web Services resources.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the CloudWatch RUM resource that you're adding tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the CloudWatch RUM resource that you're removing tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The list of tag keys to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /appmonitors/{id}/:
    post:
      operationId: PutRumEvents
      description: Sends telemetry events about your application performance and user behavior to CloudWatch RUM. The code snippet that RUM generates for you to add to your application includes PutRumEvents operations to send this data to RUM. Each PutRumEvents operation can send a batch of events from one user session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PutRumEventsRequestIdString"
          description: The ID of the app monitor that is sending this data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BatchId:
                  $ref: "#/components/schemas/PutRumEventsRequestBatchIdString"
                AppMonitorDetails:
                  $ref: "#/components/schemas/AppMonitorDetails"
                UserDetails:
                  $ref: "#/components/schemas/UserDetails"
                RumEvents:
                  $ref: "#/components/schemas/RumEventList"
                Alias:
                  $ref: "#/components/schemas/Alias"
              required:
                - BatchId
                - AppMonitorDetails
                - UserDetails
                - RumEvents
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutRumEventsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AppMonitorName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: (?!\.)[\.\-_#A-Za-z0-9]+
    MetricDestination:
      type: string
      enum:
        - CloudWatch
        - Evidently
    DestinationArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: .*arn:[^:]*:[^:]*:[^:]*:[^:]*:.*
    MetricDefinitionsRequest:
      type: array
      items:
        $ref: "#/components/schemas/MetricDefinitionRequest"
    MetricDefinitionRequest:
      description: "Use this structure to define one extended metric or custom metric that RUM will send to CloudWatch or CloudWatch Evidently. For more information, see Custom metrics and extended metrics that you can send to CloudWatch and CloudWatch Evidently. This structure is validated differently for extended metrics and custom metrics. For extended metrics that are sent to the AWS/RUM namespace, the following validations apply: The Namespace parameter must be omitted or set to AWS/RUM. Only certain combinations of values for Name, ValueKey, and EventPattern are valid. In addition to what is displayed in the following list, the EventPattern can also include information used by the DimensionKeys field. If Name is PerformanceNavigationDuration, then ValueKeymust be event_details.duration and the EventPattern must include {\"event_type\":[\"com.amazon.rum.performance_navigation_event\"]} If Name is PerformanceResourceDuration, then ValueKeymust be event_details.duration and the EventPattern must include {\"event_type\":[\"com.amazon.rum.performance_resource_event\"]} If Name is NavigationSatisfiedTransaction, then ValueKeymust be null and the EventPattern must include { \"event_type\": [\"com.amazon.rum.performance_navigation_event\"], \"event_details\": { \"duration\": [{ \"numeric\": [\">\",2000] }] } } If Name is NavigationToleratedTransaction, then ValueKeymust be null and the EventPattern must include { \"event_type\": [\"com.amazon.rum.performance_navigation_event\"], \"event_details\": { \"duration\": [{ \"numeric\": [\">=\",2000,\"<\"8000] }] } } If Name is NavigationFrustratedTransaction, then ValueKeymust be null and the EventPattern must include { \"event_type\": [\"com.amazon.rum.performance_navigation_event\"], \"event_details\": { \"duration\": [{ \"numeric\": [\">=\",8000] }] } } If Name is WebVitalsCumulativeLayoutShift, then ValueKeymust be event_details.value and the EventPattern must include {\"event_type\":[\"com.amazon.rum.cumulative_layout_shift_event\"]} If Name is WebVitalsFirstInputDelay, then ValueKeymust be event_details.value and the EventPattern must include {\"event_type\":[\"com.amazon.rum.first_input_delay_event\"]} If Name is WebVitalsLargestContentfulPaint, then ValueKeymust be event_details.value and the EventPattern must include {\"event_type\":[\"com.amazon.rum.largest_contentful_paint_event\"]} If Name is JsErrorCount, then ValueKeymust be null and the EventPattern must include {\"event_type\":[\"com.amazon.rum.js_error_event\"]} If Name is HttpErrorCount, then ValueKeymust be null and the EventPattern must include {\"event_type\":[\"com.amazon.rum.http_event\"]} If Name is SessionCount, then ValueKeymust be null and the EventPattern must include {\"event_type\":[\"com.amazon.rum.session_start_event\"]} If Name is PageViewCount, then ValueKeymust be null and the EventPattern must include {\"event_type\":[\"com.amazon.rum.page_view_event\"]} If Name is Http4xxCount, then ValueKeymust be null and the EventPattern must include {\"event_type\": [\"com.amazon.rum.http_event\"],\"event_details\":{\"response\":{\"status\":[{\"numeric\":[\">=\",400,\"<\",500]}]}}} } If Name is Http5xxCount, then ValueKeymust be null and the EventPattern must include {\"event_type\": [\"com.amazon.rum.http_event\"],\"event_details\":{\"response\":{\"status\":[{\"numeric\":[\">=\",500,\"<=\",599]}]}}} } For custom metrics, the following validation rules apply: The namespace can't be omitted and can't be AWS/RUM. You can use the AWS/RUM namespace only for extended metrics. All dimensions listed in the DimensionKeys field must be present in the value of EventPattern. The values that you specify for ValueKey, EventPattern, and DimensionKeys must be fields in RUM events, so all first-level keys in these fields must be one of the keys in the list later in this section. If you set a value for EventPattern, it must be a JSON object. For every non-empty event_details, there must be a non-empty event_type. If EventPattern contains an event_details field, it must also contain an event_type. For every built-in event_type that you use, you must use a value for event_details that corresponds to that event_type. For information about event details that correspond to event types, see RUM event details. In EventPattern, any JSON array must contain only one value. Valid key values for first-level keys in the ValueKey, EventPattern, and DimensionKeys fields: account_id application_Id application_version application_name batch_id event_details event_id event_interaction event_timestamp event_type event_version log_stream metadata sessionId user_details userId"
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/MetricName"
          description: "The name for the metric that is defined in this structure. For custom metrics, you can specify any name that you like. For extended metrics, valid values are the following: PerformanceNavigationDuration PerformanceResourceDuration NavigationSatisfiedTransaction NavigationToleratedTransaction NavigationFrustratedTransaction WebVitalsCumulativeLayoutShift WebVitalsFirstInputDelay WebVitalsLargestContentfulPaint JsErrorCount HttpErrorCount SessionCount"
        ValueKey:
          $ref: "#/components/schemas/ValueKey"
          description: The field within the event object that the metric value is sourced from. If you omit this field, a hardcoded value of 1 is pushed as the metric value. This is useful if you want to count the number of events that the filter catches. If this metric is sent to CloudWatch Evidently, this field will be passed to Evidently raw. Evidently will handle data extraction from the event.
        UnitLabel:
          $ref: "#/components/schemas/UnitLabel"
          description: The CloudWatch metric unit to use for this metric. If you omit this field, the metric is recorded with no unit.
        DimensionKeys:
          type: object
          properties: {}
          description: 'Use this field only if you are sending the metric to CloudWatch. This field is a map of field paths to dimension names. It defines the dimensions to associate with this metric in CloudWatch. For extended metrics, valid values for the entries in this field are the following: "metadata.pageId": "PageId" "metadata.browserName": "BrowserName" "metadata.deviceType": "DeviceType" "metadata.osName": "OSName" "metadata.countryCode": "CountryCode" "event_details.fileType": "FileType" For both extended metrics and custom metrics, all dimensions listed in this field must also be included in EventPattern.'
        EventPattern:
          $ref: "#/components/schemas/EventPattern"
          description: "The pattern that defines the metric, specified as a JSON object. RUM checks events that happen in a user's session against the pattern, and events that match the pattern are sent to the metric destination. When you define extended metrics, the metric definition is not valid if EventPattern is omitted. Example event patterns: '{ \"event_type\": [\"com.amazon.rum.js_error_event\"], \"metadata\": { \"browserName\": [ \"Chrome\", \"Safari\" ], } }' '{ \"event_type\": [\"com.amazon.rum.performance_navigation_event\"], \"metadata\": { \"browserName\": [ \"Chrome\", \"Firefox\" ] }, \"event_details\": { \"duration\": [{ \"numeric\": [ \"<\", 2000 ] }] } }' '{ \"event_type\": [\"com.amazon.rum.performance_navigation_event\"], \"metadata\": { \"browserName\": [ \"Chrome\", \"Safari\" ], \"countryCode\": [ \"US\" ] }, \"event_details\": { \"duration\": [{ \"numeric\": [ \">=\", 2000, \"<\", 8000 ] }] } }' If the metrics destination is CloudWatch and the event also matches a value in DimensionKeys, then the metric is published with the specified dimensions."
        Namespace:
          $ref: "#/components/schemas/Namespace"
          description: If this structure is for a custom metric instead of an extended metrics, use this parameter to define the metric namespace for that custom metric. Do not specify this parameter if this structure is for an extended metric. You cannot use any string that starts with AWS/ for your namespace.
      required:
        - Name
    MetricName:
      type: string
      minLength: 1
      maxLength: 255
    ValueKey:
      type: string
      minLength: 1
      maxLength: 280
    UnitLabel:
      type: string
      minLength: 1
      maxLength: 256
    EventPattern:
      type: string
      minLength: 0
      maxLength: 4000
    Namespace:
      type: string
      minLength: 1
      maxLength: 237
      pattern: .*[a-zA-Z0-9-._/#:]+
