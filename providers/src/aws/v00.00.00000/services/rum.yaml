        NextToken:
          $ref: "#/components/schemas/String"
          description: A token that you can use in a subsequent operation to retrieve the next set of results.
    AppMonitorDomain:
      type: string
      minLength: 1
      maxLength: 253
      pattern: (localhost)$|^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$|(?=^[a-zA-Z0-9\.\*-]{4,253}$)(?!.*\.-)(?!.*-\.)(?!.*\.\.)(?!.*[^\.]{64,})^(\*\.)?(?![-\.\*])[^\*]{1,}\.(\*|(?!.*--)(?=.*[a-zA-Z])[^\*]{1,}[^\*-])
    AppMonitorDomainList:
      type: array
      items:
        $ref: "#/components/schemas/AppMonitorDomain"
    TagMap:
      type: object
      properties: {}
    AppMonitorConfiguration:
      description: This structure contains much of the configuration data for the app monitor.
      type: object
      properties:
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: The ID of the Amazon Cognito identity pool that is used to authorize the sending of data to RUM.
        ExcludedPages:
          $ref: "#/components/schemas/Pages"
          description: A list of URLs in your website or application to exclude from RUM data collection. You can't include both ExcludedPages and IncludedPages in the same operation.
        IncludedPages:
          $ref: "#/components/schemas/Pages"
          description: If this app monitor is to collect data from only certain pages in your application, this structure lists those pages. You can't include both ExcludedPages and IncludedPages in the same operation.
        FavoritePages:
          $ref: "#/components/schemas/FavoritePages"
          description: A list of pages in your application that are to be displayed with a "favorite" icon in the CloudWatch RUM console.
        SessionSampleRate:
          $ref: "#/components/schemas/SessionSampleRate"
          description: Specifies the portion of user sessions to use for RUM data collection. Choosing a higher portion gives you more data but also incurs more costs. The range for this value is 0 to 1 inclusive. Setting this to 1 means that 100% of user sessions are sampled, and setting it to 0.1 means that 10% of user sessions are sampled. If you omit this parameter, the default of 0.1 is used, and 10% of sessions will be sampled.
        GuestRoleArn:
          $ref: "#/components/schemas/Arn"
          description: "The ARN of the guest IAM role that is attached to the Amazon Cognito identity pool that is used to authorize the sending of data to RUM. It is possible that an app monitor does not have a value for GuestRoleArn. For example, this can happen when you use the console to create an app monitor and you allow CloudWatch RUM to create a new identity pool for Authorization. In this case, GuestRoleArn is not present in the GetAppMonitor response because it is not stored by the service. If this issue affects you, you can take one of the following steps: Use the Cloud Development Kit (CDK) to create an identity pool and the associated IAM role, and use that for your app monitor. Make a separate GetIdentityPoolRoles call to Amazon Cognito to retrieve the GuestRoleArn."
        AllowCookies:
          $ref: "#/components/schemas/Boolean"
          description: If you set this to true, the RUM web client sets two cookies, a session cookie and a user cookie. The cookies allow the RUM web client to collect data relating to the number of users an application has and the behavior of the application across a sequence of events. Cookies are stored in the top-level domain of the current page.
        Telemetries:
          $ref: "#/components/schemas/Telemetries"
          description: An array that lists the types of telemetry data that this app monitor is to collect. errors indicates that RUM collects data about unhandled JavaScript errors raised by your application. performance indicates that RUM collects performance data about how your application and its resources are loaded and rendered. This includes Core Web Vitals. http indicates that RUM collects data about HTTP errors thrown by your application.
        EnableXRay:
          $ref: "#/components/schemas/Boolean"
          description: If you set this to true, RUM enables X-Ray tracing for the user sessions that RUM samples. RUM adds an X-Ray trace header to allowed HTTP requests. It also records an X-Ray segment for allowed HTTP requests. You can see traces and segments from these user sessions in the X-Ray console and the CloudWatch ServiceLens console. For more information, see What is X-Ray?
    IdentityPoolId:
      type: string
      minLength: 1
      maxLength: 55
      pattern: .*[\w-]+:[0-9a-f-]+.*
    Pages:
      type: array
      items:
        $ref: "#/components/schemas/Url"
    Url:
      type: string
      minLength: 1
      maxLength: 1260
      pattern: .*https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}\b([-a-zA-Z0-9()@:%_\+.~#?&*//=]*).*
    FavoritePages:
      type: array
      items:
        $ref: "#/components/schemas/String"
    SessionSampleRate:
      type: number
      format: double
      minimum: 0
      maximum: 1
    Arn:
      type: string
      pattern: .*arn:[^:]*:[^:]*:[^:]*:[^:]*:.*
    Boolean:
      type: boolean
    Telemetries:
      type: array
      items:
        $ref: "#/components/schemas/Telemetry"
