          description: The IDs of the metric definitions that were deleted.
      required:
        - Errors
    BatchDeleteRumMetricDefinitionsErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteRumMetricDefinitionsError"
    BatchDeleteRumMetricDefinitionsError:
