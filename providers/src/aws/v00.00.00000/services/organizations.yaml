                  description: "The ID of the resource to add a tag to. You can specify any of the following taggable resources. Amazon Web Services account – specify the account ID number. Organizational unit – specify the OU ID that begins with ou- and looks similar to: ou-1a2b-34uvwxyz Root – specify the root ID that begins with r- and looks similar to: r-1a2b Policy – specify the policy ID that begins with p- andlooks similar to: p-12abcdefg3"
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to add to the specified resource. For each tag in the list, you must specify both a tag key and a value. The value can be an empty string, but you can't set it to null. If any one of the tags is not valid or if you exceed the maximum allowed number of tags for a resource, then the entire request fails.
              required:
                - ResourceId
                - Tags
      responses:
        "200":
          description: Success
  /TerminateResponsibilityTransfer:
    post:
      operationId: TerminateResponsibilityTransfer
      description: Ends a transfer. A transfer is an arrangement between two management accounts where one account designates the other with specified responsibilities for their organization.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrganizationsV20161128.TerminateResponsibilityTransfer
            default: AWSOrganizationsV20161128.TerminateResponsibilityTransfer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/ResponsibilityTransferId"
                  description: ID for the transfer.
                EndTimestamp:
                  $ref: "#/components/schemas/Timestamp"
                  description: Timestamp when the responsibility transfer is to end.
              required:
                - Id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminateResponsibilityTransferResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes any tags with the specified keys from the specified resource. You can attach tags to the following resources in Organizations. Amazon Web Services account Organization root Organizational unit (OU) Policy (any type) You can only call this operation from the management account or a member account that is a delegated administrator.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrganizationsV20161128.UntagResource
            default: AWSOrganizationsV20161128.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/TaggableResourceId"
                  description: "The ID of the resource to remove a tag from. You can specify any of the following taggable resources. Amazon Web Services account – specify the account ID number. Organizational unit – specify the OU ID that begins with ou- and looks similar to: ou-1a2b-34uvwxyz Root – specify the root ID that begins with r- and looks similar to: r-1a2b Policy – specify the policy ID that begins with p- andlooks similar to: p-12abcdefg3"
                TagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: The list of keys for tags to remove from the specified resource.
              required:
                - ResourceId
                - TagKeys
      responses:
        "200":
          description: Success
  /UpdateOrganizationalUnit:
    post:
      operationId: UpdateOrganizationalUnit
      description: Renames the specified organizational unit (OU). The ID and ARN don't change. The child OUs and accounts remain in place, and any attached policies of the OU remain attached. You can only call this operation from the management account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrganizationsV20161128.UpdateOrganizationalUnit
            default: AWSOrganizationsV20161128.UpdateOrganizationalUnit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OrganizationalUnitId:
                  $ref: "#/components/schemas/OrganizationalUnitId"
                  description: ID for the OU that you want to rename. You can get the ID from the ListOrganizationalUnitsForParent operation. The regex pattern for an organizational unit ID string requires "ou-" followed by from 4 to 32 lowercase letters or digits (the ID of the root that contains the OU). This string is followed by a second "-" dash and from 8 to 32 additional lowercase letters or digits.
                Name:
                  $ref: "#/components/schemas/OrganizationalUnitName"
                  description: The new name that you want to assign to the OU. The regex pattern that is used to validate this parameter is a string of any of the characters in the ASCII character range.
              required:
                - OrganizationalUnitId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOrganizationalUnitResponse"
  /UpdatePolicy:
    post:
      operationId: UpdatePolicy
      description: Updates an existing policy with a new name, description, or content. If you don't supply any parameter, that value remains unchanged. You can't change a policy's type. You can only call this operation from the management account or a member account that is a delegated administrator.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrganizationsV20161128.UpdatePolicy
            default: AWSOrganizationsV20161128.UpdatePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PolicyId:
                  $ref: "#/components/schemas/PolicyId"
                  description: ID for the policy that you want to update. The regex pattern for a policy ID string requires "p-" followed by from 8 to 128 lowercase or uppercase letters, digits, or the underscore character (_).
                Name:
                  $ref: "#/components/schemas/PolicyName"
                  description: If provided, the new name for the policy. The regex pattern that is used to validate this parameter is a string of any of the characters in the ASCII character range.
                Description:
                  $ref: "#/components/schemas/PolicyDescription"
                  description: If provided, the new description for the policy.
                Content:
                  $ref: "#/components/schemas/PolicyContent"
                  description: If provided, the new content for the policy. The text must be correctly formatted JSON that complies with the syntax for the policy's type. For more information, see SCP syntax in the Organizations User Guide. The maximum size of a policy document depends on the policy's type. For more information, see Maximum and minimum values in the Organizations User Guide.
              required:
                - PolicyId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePolicyResponse"
  /UpdateResponsibilityTransfer:
    post:
      operationId: UpdateResponsibilityTransfer
      description: Updates a transfer. A transfer is the arrangement between two management accounts where one account designates the other with specified responsibilities for their organization. You can update the name assigned to a transfer.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrganizationsV20161128.UpdateResponsibilityTransfer
            default: AWSOrganizationsV20161128.UpdateResponsibilityTransfer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/ResponsibilityTransferId"
                  description: ID for the transfer.
                Name:
                  $ref: "#/components/schemas/ResponsibilityTransferName"
                  description: New name you want to assign to the transfer.
              required:
                - Id
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResponsibilityTransferResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    HandshakeId:
      type: string
      maxLength: 34
      pattern: ^h-[0-9a-z]{8,32}$
    AcceptHandshakeResponse:
      type: object
      properties:
        Handshake:
          $ref: "#/components/schemas/Handshake"
          description: A Handshake object. Contains details for the handshake.
    Handshake:
      description: "Contains details for a handshake. A handshake is the secure exchange of information between two Amazon Web Services accounts: a sender and a recipient. Note: Handshakes that are CANCELED, ACCEPTED, DECLINED, or EXPIRED show up in lists for only 30 days after entering that state After that they are deleted."
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/HandshakeId"
          description: ID for the handshake. The regex pattern for handshake ID string requires "h-" followed by from 8 to 32 lowercase letters or digits.
        Arn:
          $ref: "#/components/schemas/HandshakeArn"
          description: Amazon Resource Name (ARN) for the handshake. For more information about ARNs in Organizations, see ARN Formats Supported by Organizations in the Amazon Web Services Service Authorization Reference.
        Parties:
          $ref: "#/components/schemas/HandshakeParties"
          description: An array of HandshakeParty objects. Contains details for participant in a handshake.
        State:
          $ref: "#/components/schemas/HandshakeState"
          description: "Current state for the handshake. REQUESTED: Handshake awaiting a response from the recipient. OPEN: Handshake sent to multiple recipients and all recipients have responded. The sender can now complete the handshake action. CANCELED: Handshake canceled by the sender. ACCEPTED: Handshake accepted by the recipient. DECLINED: Handshake declined by the recipient. EXPIRED: Handshake has expired."
        RequestedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp when the handshake request was made.
        ExpirationTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp when the handshake expires.
        Action:
          $ref: "#/components/schemas/ActionType"
          description: "The type of handshake: INVITE: Handshake sent to a standalone account requesting that it to join the sender's organization. ENABLE_ALL_FEATURES: Handshake sent to invited member accounts to enable all features for the organization. APPROVE_ALL_FEATURES: Handshake sent to the management account when all invited member accounts have approved to enable all features. TRANSFER_RESPONSIBILITY: Handshake sent to another organization's management account requesting that it designate the sender with the specified responsibilities for recipient's organization."
        Resources:
          $ref: "#/components/schemas/HandshakeResources"
          description: An array of HandshakeResource objects. When needed, contains additional details for a handshake. For example, the email address for the sender.
    HandshakeArn:
      type: string
      pattern: ^arn:aws:organizations::\d{12}:handshake\/o-[a-z0-9]{10,32}\/[a-z_]{1,32}\/h-[0-9a-z]{8,32}
    HandshakeParties:
      type: array
      items:
        $ref: "#/components/schemas/HandshakeParty"
    HandshakeParty:
      description: Contains details for a participant in a handshake.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/HandshakePartyId"
          description: 'ID for the participant: Acccount ID, organization ID, or email address. The regex pattern for handshake ID string requires "h-" followed by from 8 to 32 lowercase letters or digits.'
        Type:
          $ref: "#/components/schemas/HandshakePartyType"
          description: The type of ID for the participant.
      required:
        - Id
        - Type
    HandshakePartyId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\s\\S]*"
    HandshakePartyType:
      type: string
      enum:
        - ACCOUNT
        - ORGANIZATION
        - EMAIL
    HandshakeState:
      type: string
      enum:
        - REQUESTED
        - OPEN
        - CANCELED
        - ACCEPTED
        - DECLINED
        - EXPIRED
    Timestamp:
      type: string
      format: date-time
    ActionType:
      type: string
      enum:
        - INVITE
        - ENABLE_ALL_FEATURES
        - APPROVE_ALL_FEATURES
        - ADD_ORGANIZATIONS_SERVICE_LINKED_ROLE
        - TRANSFER_RESPONSIBILITY
    HandshakeResources:
      type: array
      items:
        $ref: "#/components/schemas/HandshakeResource"
    HandshakeResource:
      description: Contains additional details for a handshake.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/HandshakeResourceValue"
          description: Additional information for the handshake. The format of the value string must match the requirements of the specified type.
        Type:
          $ref: "#/components/schemas/HandshakeResourceType"
          description: "The type of information being passed, specifying how the value is to be interpreted by the other party: ACCOUNT: ID for an Amazon Web Services account. ORGANIZATION: ID for an organization. EMAIL: Email address for the recipient. OWNER_EMAIL: Email address for the sender. OWNER_NAME: Name of the sender. NOTES: Additional text included by the sender for the recipient."
        Resources:
          $ref: "#/components/schemas/HandshakeResources"
          description: An array of HandshakeResource objects. When needed, contains additional details for a handshake. For example, the email address for the sender.
    HandshakeResourceValue:
      type: string
    HandshakeResourceType:
      type: string
      enum:
        - ACCOUNT
        - ORGANIZATION
        - ORGANIZATION_FEATURE_SET
        - EMAIL
        - MASTER_EMAIL
        - MASTER_NAME
        - NOTES
        - PARENT_HANDSHAKE
        - RESPONSIBILITY_TRANSFER
        - TRANSFER_START_TIMESTAMP
        - TRANSFER_TYPE
        - MANAGEMENT_ACCOUNT
        - MANAGEMENT_EMAIL
        - MANAGEMENT_NAME
    PolicyId:
      type: string
      maxLength: 130
      pattern: ^p-[0-9a-zA-Z_]{8,128}$
    PolicyTargetId:
      type: string
      maxLength: 100
      pattern: ^(r-[0-9a-z]{4,32})|(\d{12})|(ou-[0-9a-z]{4,32}-[a-z0-9]{8,32})$
    CancelHandshakeResponse:
      type: object
      properties:
        Handshake:
          $ref: "#/components/schemas/Handshake"
          description: A Handshake object. Contains for the handshake that you canceled.
    AccountId:
      type: string
      maxLength: 12
      pattern: ^\d{12}$
    Email:
      type: string
      minLength: 6
      maxLength: 64
      pattern: "[^\\s@]+@[^\\s@]+\\.[^\\s@]+"
    CreateAccountName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[\\u0020-\\u007E]+"
    RoleName:
      type: string
      maxLength: 64
      pattern: "[\\w+=,.@-]{1,64}"
    IAMUserAccessToBilling:
      type: string
      enum:
        - ALLOW
        - DENY
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A custom key-value pair associated with a resource within your organization. You can attach tags to any of the following organization resources. Amazon Web Services account Organizational unit (OU) Organization root Policy
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key identifier, or name, of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The string value that's associated with the key of the tag. You can set the value of a tag to an empty string, but you can't set the value of a tag to null.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    CreateAccountResponse:
      type: object
      properties:
        CreateAccountStatus:
          $ref: "#/components/schemas/CreateAccountStatus"
          description: A structure that contains details about the request to create an account. This response structure might not be fully populated when you first receive it because account creation is an asynchronous process. You can pass the returned CreateAccountStatus ID as a parameter to DescribeCreateAccountStatus to get status about the progress of the request at later times. You can also check the CloudTrail log for the CreateAccountResult event. For more information, see Logging and monitoring in Organizations in the Organizations User Guide.
    CreateAccountStatus:
      description: Contains the status about a CreateAccount or CreateGovCloudAccount request to create an Amazon Web Services account or an Amazon Web Services GovCloud (US) account in an organization.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/CreateAccountRequestId"
          description: The unique identifier (ID) that references this request. You get this value from the response of the initial CreateAccount request to create the account. The regex pattern for a create account request ID string requires "car-" followed by from 8 to 32 lowercase letters or digits.
        AccountName:
          $ref: "#/components/schemas/CreateAccountName"
          description: The account name given to the account when it was created.
        State:
          $ref: "#/components/schemas/CreateAccountState"
          description: The status of the asynchronous request to create an Amazon Web Services account.
        RequestedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the request was made for the account creation.
        CompletedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the account was created and the request completed.
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: If the account was created successfully, the unique identifier (ID) of the new account. The regex pattern for an account ID string requires exactly 12 digits.
        GovCloudAccountId:
          $ref: "#/components/schemas/AccountId"
          description: If the account was created successfully, the ID for the new account in the Amazon Web Services GovCloud (US) Region.
        FailureReason:
          $ref: "#/components/schemas/CreateAccountFailureReason"
          description: "If the request failed, a description of the reason for the failure. ACCOUNT_LIMIT_EXCEEDED: The account couldn't be created because you reached the limit on the number of accounts in your organization. CONCURRENT_ACCOUNT_MODIFICATION: You already submitted a request with the same information. EMAIL_ALREADY_EXISTS: The account could not be created because another Amazon Web Services account with that email address already exists. FAILED_BUSINESS_VALIDATION: The Amazon Web Services account that owns your organization failed to receive business license validation. GOVCLOUD_ACCOUNT_ALREADY_EXISTS: The account in the Amazon Web Services GovCloud (US) Region could not be created because this Region already includes an account with that email address. IDENTITY_INVALID_BUSINESS_VALIDATION: The Amazon Web Services account that owns your organization can't complete business license validation because it doesn't have valid identity data. INVALID_ADDRESS: The account could not be created because the address you provided is not valid. INVALID_EMAIL: The account could not be created because the email address you provided is not valid. INVALID_PAYMENT_INSTRUMENT: The Amazon Web Services account that owns your organization does not have a supported payment method associated with the account. Amazon Web Services does not support cards issued by financial institutions in Russia or Belarus. For more information, see Managing your Amazon Web Services payments. INTERNAL_FAILURE: The account could not be created because of an internal failure. Try again later. If the problem persists, contact Amazon Web Services Customer Support. MISSING_BUSINESS_VALIDATION: The Amazon Web Services account that owns your organization has not received Business Validation. MISSING_PAYMENT_INSTRUMENT: You must configure the management account with a valid payment method, such as a credit card. PENDING_BUSINESS_VALIDATION: The Amazon Web Services account that owns your organization is still in the process of completing business license validation. UNKNOWN_BUSINESS_VALIDATION: The Amazon Web Services account that owns your organization has an unknown issue with business license validation."
    CreateAccountRequestId:
      type: string
      maxLength: 36
      pattern: ^car-[a-z0-9]{8,32}$
    CreateAccountState:
      type: string
      enum:
        - IN_PROGRESS
        - SUCCEEDED
        - FAILED
    CreateAccountFailureReason:
      type: string
      enum:
        - ACCOUNT_LIMIT_EXCEEDED
        - EMAIL_ALREADY_EXISTS
        - INVALID_ADDRESS
        - INVALID_EMAIL
        - CONCURRENT_ACCOUNT_MODIFICATION
        - INTERNAL_FAILURE
        - GOVCLOUD_ACCOUNT_ALREADY_EXISTS
        - MISSING_BUSINESS_VALIDATION
        - FAILED_BUSINESS_VALIDATION
        - PENDING_BUSINESS_VALIDATION
        - INVALID_IDENTITY_FOR_BUSINESS_VALIDATION
        - UNKNOWN_BUSINESS_VALIDATION
        - MISSING_PAYMENT_INSTRUMENT
        - INVALID_PAYMENT_INSTRUMENT
        - UPDATE_EXISTING_RESOURCE_POLICY_WITH_TAGS_NOT_SUPPORTED
    CreateGovCloudAccountResponse:
      type: object
      properties:
        CreateAccountStatus:
          $ref: "#/components/schemas/CreateAccountStatus"
    OrganizationFeatureSet:
      type: string
      enum:
        - ALL
        - CONSOLIDATED_BILLING
    CreateOrganizationResponse:
      type: object
      properties:
        Organization:
          $ref: "#/components/schemas/Organization"
          description: A structure that contains details about the newly created organization.
    Organization:
      description: Contains details about an organization. An organization is a collection of accounts that are centrally managed together using consolidated billing, organized hierarchically with organizational units (OUs), and controlled with policies .
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/OrganizationId"
          description: The unique identifier (ID) of an organization. The regex pattern for an organization ID string requires "o-" followed by from 10 to 32 lowercase letters or digits.
        Arn:
          $ref: "#/components/schemas/OrganizationArn"
          description: The Amazon Resource Name (ARN) of an organization. For more information about ARNs in Organizations, see ARN Formats Supported by Organizations in the Amazon Web Services Service Authorization Reference.
        FeatureSet:
          $ref: "#/components/schemas/OrganizationFeatureSet"
          description: Specifies the functionality that currently is available to the organization. If set to "ALL", then all features are enabled and policies can be applied to accounts in the organization. If set to "CONSOLIDATED_BILLING", then only consolidated billing functionality is available. For more information, see Enabling all features in your organization in the Organizations User Guide.
        MasterAccountArn:
          $ref: "#/components/schemas/AccountArn"
          description: The Amazon Resource Name (ARN) of the account that is designated as the management account for the organization. For more information about ARNs in Organizations, see ARN Formats Supported by Organizations in the Amazon Web Services Service Authorization Reference.
        MasterAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The unique identifier (ID) of the management account of an organization. The regex pattern for an account ID string requires exactly 12 digits.
        MasterAccountEmail:
          $ref: "#/components/schemas/Email"
          description: The email address that is associated with the Amazon Web Services account that is designated as the management account for the organization.
        AvailablePolicyTypes:
          $ref: "#/components/schemas/PolicyTypes"
          description: Do not use. This field is deprecated and doesn't provide complete information about the policies in your organization. To determine the policies that are enabled and available for use in your organization, use the ListRoots operation instead.
    OrganizationId:
      type: string
      pattern: ^o-[a-z0-9]{10,32}$
    OrganizationArn:
      type: string
      pattern: ^arn:aws:organizations::\d{12}:organization\/o-[a-z0-9]{10,32}
    AccountArn:
      type: string
      pattern: ^arn:aws:organizations::\d{12}:account\/o-[a-z0-9]{10,32}\/\d{12}
    PolicyTypes:
      type: array
      items:
        $ref: "#/components/schemas/PolicyTypeSummary"
    PolicyTypeSummary:
      description: Contains information about a policy type and its status in the associated root.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/PolicyType"
          description: The name of the policy type.
        Status:
          $ref: "#/components/schemas/PolicyTypeStatus"
          description: The status of the policy type as it relates to the associated root. To attach a policy of the specified type to a root or to an OU or account in that root, it must be available in the organization and enabled for that root.
    PolicyType:
      type: string
      enum:
        - SERVICE_CONTROL_POLICY
        - RESOURCE_CONTROL_POLICY
        - TAG_POLICY
        - BACKUP_POLICY
        - AISERVICES_OPT_OUT_POLICY
        - CHATBOT_POLICY
        - DECLARATIVE_POLICY_EC2
        - SECURITYHUB_POLICY
        - INSPECTOR_POLICY
        - UPGRADE_ROLLOUT_POLICY
        - BEDROCK_POLICY
        - S3_POLICY
        - NETWORK_SECURITY_DIRECTOR_POLICY
    PolicyTypeStatus:
      type: string
      enum:
        - ENABLED
        - PENDING_ENABLE
        - PENDING_DISABLE
    ParentId:
      type: string
      maxLength: 100
      pattern: ^(r-[0-9a-z]{4,32})|(ou-[0-9a-z]{4,32}-[a-z0-9]{8,32})$
    OrganizationalUnitName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\s\\S]*"
    CreateOrganizationalUnitResponse:
      type: object
      properties:
        OrganizationalUnit:
          $ref: "#/components/schemas/OrganizationalUnit"
          description: A structure that contains details about the newly created OU.
    OrganizationalUnit:
      description: Contains details about an organizational unit (OU). An OU is a container of Amazon Web Services accounts within a root of an organization. Policies that are attached to an OU apply to all accounts contained in that OU and in any child OUs.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/OrganizationalUnitId"
          description: The unique identifier (ID) associated with this OU. The ID is unique to the organization only. The regex pattern for an organizational unit ID string requires "ou-" followed by from 4 to 32 lowercase letters or digits (the ID of the root that contains the OU). This string is followed by a second "-" dash and from 8 to 32 additional lowercase letters or digits.
        Arn:
          $ref: "#/components/schemas/OrganizationalUnitArn"
          description: The Amazon Resource Name (ARN) of this OU. For more information about ARNs in Organizations, see ARN Formats Supported by Organizations in the Amazon Web Services Service Authorization Reference.
        Name:
          $ref: "#/components/schemas/OrganizationalUnitName"
          description: The friendly name of this OU. The regex pattern that is used to validate this parameter is a string of any of the characters in the ASCII character range.
        Path:
