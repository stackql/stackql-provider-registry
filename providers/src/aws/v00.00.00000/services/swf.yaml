                taskStartToCloseTimeout:
                  $ref: "#/components/schemas/DurationInSecondsOptional"
                  description: Specifies the maximum duration of decision tasks for this workflow execution. This parameter overrides the defaultTaskStartToCloseTimout specified when registering the workflow type using RegisterWorkflowType. The duration is specified in seconds, an integer greater than or equal to 0. You can use NONE to specify unlimited duration. A task start-to-close timeout for this workflow execution must be specified either as a default for the workflow type or through this parameter. If neither this parameter is set nor a default task start-to-close timeout was specified at registration time then a fault is returned.
                childPolicy:
                  $ref: "#/components/schemas/ChildPolicy"
                  description: "If set, specifies the policy to use for the child workflow executions of this workflow execution if it is terminated, by calling the TerminateWorkflowExecution action explicitly or due to an expired timeout. This policy overrides the default child policy specified when registering the workflow type using RegisterWorkflowType. The supported child policies are: TERMINATE – The child executions are terminated. REQUEST_CANCEL – A request to cancel is attempted for each child execution by recording a WorkflowExecutionCancelRequested event in its history. It is up to the decider to take appropriate actions when it receives an execution history with this event. ABANDON – No action is taken. The child executions continue to run. A child policy for this workflow execution must be specified either as a default for the workflow type or through this parameter. If neither this parameter is set nor a default child policy was specified at registration time then a fault is returned."
                lambdaRole:
                  $ref: "#/components/schemas/Arn"
                  description: The IAM role to attach to this workflow execution. Executions of this workflow type need IAM roles to invoke Lambda functions. If you don't attach an IAM role, any attempt to schedule a Lambda task fails. This results in a ScheduleLambdaFunctionFailed history event. For more information, see https://docs.aws.amazon.com/amazonswf/latest/developerguide/lambda-task.html in the Amazon SWF Developer Guide.
              required:
                - domain
                - workflowId
                - workflowType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
  /TagResource:
    post:
      operationId: TagResource
      description: Add a tag to a Amazon SWF domain. Amazon SWF supports a maximum of 50 tags per resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.TagResource
            default: SimpleWorkflowService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) for the Amazon SWF domain.
                tags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: "The list of tags to add to a domain. Tags may only contain unicode letters, digits, whitespace, or these symbols: _ . : / = + - @."
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
  /TerminateWorkflowExecution:
    post:
      operationId: TerminateWorkflowExecution
      description: "Records a WorkflowExecutionTerminated event and forces closure of the workflow execution identified by the given domain, runId, and workflowId. The child policy, registered with the workflow type or specified when starting this execution, is applied to any open child workflow executions of this workflow execution. If the identified workflow execution was in progress, it is terminated immediately. If a runId isn't specified, then the WorkflowExecutionTerminated event is recorded in the history of the current open workflow with the matching workflowId in the domain. You should consider using RequestCancelWorkflowExecution action instead because it allows the workflow to gracefully close while TerminateWorkflowExecution doesn't. Access Control You can use IAM policies to control this action's access to Amazon SWF resources as follows: Use a Resource element with the domain name to limit the action to only specified domains. Use an Action element to allow or deny permission to call this action. You cannot use an IAM policy to constrain this action's parameters. If the caller doesn't have sufficient permissions to invoke the action, or the parameter values fall outside the specified constraints, the action fails. The associated event attribute's cause parameter is set to OPERATION_NOT_PERMITTED. For details and example IAM policies, see Using IAM to Manage Access to Amazon SWF Workflows in the Amazon SWF Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.TerminateWorkflowExecution
            default: SimpleWorkflowService.TerminateWorkflowExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                domain:
                  $ref: "#/components/schemas/DomainName"
                  description: The domain of the workflow execution to terminate.
                workflowId:
                  $ref: "#/components/schemas/WorkflowId"
                  description: The workflowId of the workflow execution to terminate.
                runId:
                  $ref: "#/components/schemas/WorkflowRunIdOptional"
                  description: The runId of the workflow execution to terminate.
                reason:
                  $ref: "#/components/schemas/TerminateReason"
                  description: A descriptive reason for terminating the workflow execution.
                details:
                  $ref: "#/components/schemas/Data"
                  description: Details for terminating the workflow execution.
                childPolicy:
                  $ref: "#/components/schemas/ChildPolicy"
                  description: "If set, specifies the policy to use for the child workflow executions of the workflow execution being terminated. This policy overrides the child policy specified for the workflow execution at registration time or when starting the execution. The supported child policies are: TERMINATE – The child executions are terminated. REQUEST_CANCEL – A request to cancel is attempted for each child execution by recording a WorkflowExecutionCancelRequested event in its history. It is up to the decider to take appropriate actions when it receives an execution history with this event. ABANDON – No action is taken. The child executions continue to run. A child policy for this workflow execution must be specified either as a default for the workflow type or through this parameter. If neither this parameter is set nor a default child policy was specified at registration time then a fault is returned."
              required:
                - domain
                - workflowId
      responses:
        "200":
          description: Success
  /UndeprecateActivityType:
    post:
      operationId: UndeprecateActivityType
      description: "Undeprecates a previously deprecated activity type. After an activity type has been undeprecated, you can create new tasks of that activity type. This operation is eventually consistent. The results are best effort and may not exactly reflect recent updates and changes. Access Control You can use IAM policies to control this action's access to Amazon SWF resources as follows: Use a Resource element with the domain name to limit the action to only specified domains. Use an Action element to allow or deny permission to call this action. Constrain the following parameters by using a Condition element with the appropriate keys. activityType.name: String constraint. The key is swf:activityType.name. activityType.version: String constraint. The key is swf:activityType.version. If the caller doesn't have sufficient permissions to invoke the action, or the parameter values fall outside the specified constraints, the action fails. The associated event attribute's cause parameter is set to OPERATION_NOT_PERMITTED. For details and example IAM policies, see Using IAM to Manage Access to Amazon SWF Workflows in the Amazon SWF Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.UndeprecateActivityType
            default: SimpleWorkflowService.UndeprecateActivityType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                domain:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain of the deprecated activity type.
                activityType:
                  $ref: "#/components/schemas/ActivityType"
                  description: The activity type to undeprecate.
              required:
                - domain
                - activityType
      responses:
        "200":
          description: Success
  /UndeprecateDomain:
    post:
      operationId: UndeprecateDomain
      description: "Undeprecates a previously deprecated domain. After a domain has been undeprecated it can be used to create new workflow executions or register new types. This operation is eventually consistent. The results are best effort and may not exactly reflect recent updates and changes. Access Control You can use IAM policies to control this action's access to Amazon SWF resources as follows: Use a Resource element with the domain name to limit the action to only specified domains. Use an Action element to allow or deny permission to call this action. You cannot use an IAM policy to constrain this action's parameters. If the caller doesn't have sufficient permissions to invoke the action, or the parameter values fall outside the specified constraints, the action fails. The associated event attribute's cause parameter is set to OPERATION_NOT_PERMITTED. For details and example IAM policies, see Using IAM to Manage Access to Amazon SWF Workflows in the Amazon SWF Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.UndeprecateDomain
            default: SimpleWorkflowService.UndeprecateDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain of the deprecated workflow type.
              required:
                - name
      responses:
        "200":
          description: Success
  /UndeprecateWorkflowType:
    post:
      operationId: UndeprecateWorkflowType
      description: "Undeprecates a previously deprecated workflow type. After a workflow type has been undeprecated, you can create new executions of that type. This operation is eventually consistent. The results are best effort and may not exactly reflect recent updates and changes. Access Control You can use IAM policies to control this action's access to Amazon SWF resources as follows: Use a Resource element with the domain name to limit the action to only specified domains. Use an Action element to allow or deny permission to call this action. Constrain the following parameters by using a Condition element with the appropriate keys. workflowType.name: String constraint. The key is swf:workflowType.name. workflowType.version: String constraint. The key is swf:workflowType.version. If the caller doesn't have sufficient permissions to invoke the action, or the parameter values fall outside the specified constraints, the action fails. The associated event attribute's cause parameter is set to OPERATION_NOT_PERMITTED. For details and example IAM policies, see Using IAM to Manage Access to Amazon SWF Workflows in the Amazon SWF Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.UndeprecateWorkflowType
            default: SimpleWorkflowService.UndeprecateWorkflowType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                domain:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain of the deprecated workflow type.
                workflowType:
                  $ref: "#/components/schemas/WorkflowType"
                  description: The name of the domain of the deprecated workflow type.
              required:
                - domain
                - workflowType
      responses:
        "200":
          description: Success
  /UntagResource:
    post:
      operationId: UntagResource
      description: Remove a tag from a Amazon SWF domain.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.UntagResource
            default: SimpleWorkflowService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) for the Amazon SWF domain.
                tagKeys:
                  $ref: "#/components/schemas/ResourceTagKeyList"
                  description: The list of tags to remove from the Amazon SWF domain.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DomainName:
      type: string
      minLength: 1
      maxLength: 256
    ExecutionTimeFilter:
      description: 'Used to filter the workflow executions in visibility APIs by various time-based rules. Each parameter, if specified, defines a rule that must be satisfied by each returned query result. The parameter values are in the Unix Time format. For example: "oldestDate": 1325376070.'
      type: object
      properties:
        oldestDate:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies the oldest start or close date and time to return.
        latestDate:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies the latest start or close date and time to return.
      required:
        - oldestDate
    Timestamp:
      type: string
      format: date-time
    WorkflowExecutionFilter:
      description: Used to filter the workflow executions in visibility APIs by their workflowId.
      type: object
      properties:
        workflowId:
          $ref: "#/components/schemas/WorkflowId"
          description: The workflowId to pass of match the criteria of this filter.
      required:
        - workflowId
    WorkflowId:
      type: string
      minLength: 1
      maxLength: 256
    WorkflowTypeFilter:
      description: Used to filter workflow execution query results by type. Each parameter, if specified, defines a rule that must be satisfied by each returned result.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: Name of the workflow type.
        version:
          $ref: "#/components/schemas/VersionOptional"
          description: Version of the workflow type.
      required:
        - name
    Name:
      type: string
      minLength: 1
      maxLength: 256
    VersionOptional:
      type: string
      maxLength: 64
    TagFilter:
      description: Used to filter the workflow executions in visibility APIs based on a tag.
      type: object
      properties:
        tag:
          $ref: "#/components/schemas/Tag"
          description: "Specifies the tag that must be associated with the execution for it to meet the filter criteria. Tags may only contain unicode letters, digits, whitespace, or these symbols: _ . : / = + - @."
      required:
        - tag
    Tag:
      type: string
      minLength: 0
      maxLength: 256
    CloseStatusFilter:
      description: Used to filter the closed workflow executions in visibility APIs by their close status.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/CloseStatus"
          description: The close status that must match the close status of an execution for it to meet the criteria of this filter.
      required:
        - status
    CloseStatus:
      type: string
      enum:
        - COMPLETED
        - FAILED
        - CANCELED
        - TERMINATED
        - CONTINUED_AS_NEW
        - TIMED_OUT
    WorkflowExecutionCount:
      description: Contains the count of workflow executions returned from CountOpenWorkflowExecutions or CountClosedWorkflowExecutions
      type: object
      properties:
        count:
          $ref: "#/components/schemas/Count"
          description: The number of workflow executions.
        truncated:
          $ref: "#/components/schemas/Truncated"
          description: If set to true, indicates that the actual count was more than the maximum supported by this API and the count returned is the truncated value.
      required:
        - count
    Count:
      type: integer
      minimum: 0
    Truncated:
      type: boolean
    TaskList:
      description: Represents a task list.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the task list.
      required:
        - name
    PendingTaskCount:
      description: Contains the count of tasks in a task list.
      type: object
      properties:
        count:
          $ref: "#/components/schemas/Count"
          description: The number of tasks in the task list.
        truncated:
          $ref: "#/components/schemas/Truncated"
          description: If set to true, indicates that the actual count was more than the maximum supported by this API and the count returned is the truncated value.
      required:
        - count
    ActivityType:
      description: Represents an activity type.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of this activity. The combination of activity type name and version must be unique within a domain.
        version:
          $ref: "#/components/schemas/Version"
          description: The version of this activity. The combination of activity type name and version must be unique with in a domain.
      required:
        - name
        - version
    Version:
      type: string
      minLength: 1
      maxLength: 64
    WorkflowType:
      description: Represents a workflow type.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the workflow type. The combination of workflow type name and version must be unique with in a domain.
        version:
          $ref: "#/components/schemas/Version"
          description: The version of the workflow type. The combination of workflow type name and version must be unique with in a domain.
      required:
        - name
        - version
    ActivityTypeDetail:
      description: Detailed information about an activity type.
      type: object
      properties:
        typeInfo:
          $ref: "#/components/schemas/ActivityTypeInfo"
          description: General information about the activity type. The status of activity type (returned in the ActivityTypeInfo structure) can be one of the following. REGISTERED – The type is registered and available. Workers supporting this type should be running. DEPRECATED – The type was deprecated using DeprecateActivityType, but is still in use. You should keep workers supporting this type running. You cannot create new tasks of this type.
        configuration:
          $ref: "#/components/schemas/ActivityTypeConfiguration"
          description: The configuration settings registered with the activity type.
      required:
        - typeInfo
        - configuration
    ActivityTypeInfo:
      description: Detailed information about an activity type.
      type: object
      properties:
        activityType:
          $ref: "#/components/schemas/ActivityType"
          description: The ActivityType type structure representing the activity type.
        status:
          $ref: "#/components/schemas/RegistrationStatus"
          description: The current status of the activity type.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the activity type provided in RegisterActivityType.
        creationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time this activity type was created through RegisterActivityType.
        deprecationDate:
          $ref: "#/components/schemas/Timestamp"
          description: If DEPRECATED, the date and time DeprecateActivityType was called.
      required:
        - activityType
        - status
        - creationDate
    RegistrationStatus:
      type: string
      enum:
        - REGISTERED
        - DEPRECATED
    Description:
      type: string
      maxLength: 1024
    ActivityTypeConfiguration:
      description: Configuration settings registered with the activity type.
      type: object
      properties:
        defaultTaskStartToCloseTimeout:
          $ref: "#/components/schemas/DurationInSecondsOptional"
          description: The default maximum duration for tasks of an activity type specified when registering the activity type. You can override this default when scheduling a task through the ScheduleActivityTask Decision. The duration is specified in seconds, an integer greater than or equal to 0. You can use NONE to specify unlimited duration.
        defaultTaskHeartbeatTimeout:
          $ref: "#/components/schemas/DurationInSecondsOptional"
          description: The default maximum time, in seconds, before which a worker processing a task must report progress by calling RecordActivityTaskHeartbeat. You can specify this value only when registering an activity type. The registered default value can be overridden when you schedule a task through the ScheduleActivityTask Decision. If the activity worker subsequently attempts to record a heartbeat or returns a result, the activity worker receives an UnknownResource fault. In this case, Amazon SWF no longer considers the activity task to be valid; the activity worker should clean up the activity task. The duration is specified in seconds, an integer greater than or equal to 0. You can use NONE to specify unlimited duration.
        defaultTaskList:
          $ref: "#/components/schemas/TaskList"
          description: The default task list specified for this activity type at registration. This default is used if a task list isn't provided when a task is scheduled through the ScheduleActivityTask Decision. You can override the default registered task list when scheduling a task through the ScheduleActivityTask Decision.
        defaultTaskPriority:
          $ref: "#/components/schemas/TaskPriority"
          description: The default task priority for tasks of this activity type, specified at registration. If not set, then 0 is used as the default priority. This default can be overridden when scheduling an activity task. Valid values are integers that range from Java's Integer.MIN_VALUE (-2147483648) to Integer.MAX_VALUE (2147483647). Higher numbers indicate higher priority. For more information about setting task priority, see Setting Task Priority in the Amazon SWF Developer Guide.
        defaultTaskScheduleToStartTimeout:
          $ref: "#/components/schemas/DurationInSecondsOptional"
          description: The default maximum duration, specified when registering the activity type, that a task of an activity type can wait before being assigned to a worker. You can override this default when scheduling a task through the ScheduleActivityTask Decision. The duration is specified in seconds, an integer greater than or equal to 0. You can use NONE to specify unlimited duration.
        defaultTaskScheduleToCloseTimeout:
          $ref: "#/components/schemas/DurationInSecondsOptional"
          description: The default maximum duration, specified when registering the activity type, for tasks of this activity type. You can override this default when scheduling a task through the ScheduleActivityTask Decision. The duration is specified in seconds, an integer greater than or equal to 0. You can use NONE to specify unlimited duration.
    DurationInSecondsOptional:
      type: string
      maxLength: 8
    TaskPriority:
      type: string
    DomainDetail:
      description: Contains details of a domain.
      type: object
      properties:
        domainInfo:
          $ref: "#/components/schemas/DomainInfo"
          description: The basic information about a domain, such as its name, status, and description.
        configuration:
          $ref: "#/components/schemas/DomainConfiguration"
          description: The domain configuration. Currently, this includes only the domain's retention period.
      required:
        - domainInfo
        - configuration
    DomainInfo:
      description: Contains general information about a domain.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DomainName"
          description: The name of the domain. This name is unique within the account.
        status:
          $ref: "#/components/schemas/RegistrationStatus"
          description: "The status of the domain: REGISTERED – The domain is properly registered and available. You can use this domain for registering types and creating new workflow executions. DEPRECATED – The domain was deprecated using DeprecateDomain, but is still in use. You should not create new workflow executions in this domain."
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the domain provided through RegisterDomain.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the domain.
      required:
        - name
        - status
    Arn:
      type: string
      minLength: 1
      maxLength: 1600
    DomainConfiguration:
      description: Contains the configuration settings of a domain.
      type: object
      properties:
        workflowExecutionRetentionPeriodInDays:
          $ref: "#/components/schemas/DurationInDays"
          description: The retention period for workflow executions in this domain.
      required:
        - workflowExecutionRetentionPeriodInDays
    DurationInDays:
      type: string
      minLength: 1
      maxLength: 8
    WorkflowExecution:
      description: Represents a workflow execution.
      type: object
      properties:
        workflowId:
          $ref: "#/components/schemas/WorkflowId"
          description: The user defined identifier associated with the workflow execution.
        runId:
          $ref: "#/components/schemas/WorkflowRunId"
          description: A system-generated unique identifier for the workflow execution.
      required:
        - workflowId
        - runId
    WorkflowRunId:
      type: string
      minLength: 1
      maxLength: 64
    WorkflowExecutionDetail:
      description: Contains details about a workflow execution.
      type: object
      properties:
        executionInfo:
          $ref: "#/components/schemas/WorkflowExecutionInfo"
          description: Information about the workflow execution.
        executionConfiguration:
          $ref: "#/components/schemas/WorkflowExecutionConfiguration"
          description: The configuration settings for this workflow execution including timeout values, tasklist etc.
        openCounts:
          $ref: "#/components/schemas/WorkflowExecutionOpenCounts"
          description: The number of tasks for this workflow execution. This includes open and closed tasks of all types.
        latestActivityTaskTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the last activity task was scheduled for this workflow execution. You can use this information to determine if the workflow has not made progress for an unusually long period of time and might require a corrective action.
        latestExecutionContext:
          $ref: "#/components/schemas/Data"
          description: The latest executionContext provided by the decider for this workflow execution. A decider can provide an executionContext (a free-form string) when closing a decision task using RespondDecisionTaskCompleted.
      required:
        - executionInfo
        - executionConfiguration
        - openCounts
    WorkflowExecutionInfo:
      description: Contains information about a workflow execution.
      type: object
      properties:
        execution:
          $ref: "#/components/schemas/WorkflowExecution"
          description: The workflow execution this information is about.
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
          description: The type of the workflow execution.
        startTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the execution was started.
        closeTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the workflow execution was closed. Set only if the execution status is CLOSED.
        executionStatus:
          $ref: "#/components/schemas/ExecutionStatus"
          description: The current status of the execution.
        closeStatus:
          $ref: "#/components/schemas/CloseStatus"
          description: "If the execution status is closed then this specifies how the execution was closed: COMPLETED – the execution was successfully completed. CANCELED – the execution was canceled.Cancellation allows the implementation to gracefully clean up before the execution is closed. TERMINATED – the execution was force terminated. FAILED – the execution failed to complete. TIMED_OUT – the execution did not complete in the alloted time and was automatically timed out. CONTINUED_AS_NEW – the execution is logically continued. This means the current execution was completed and a new execution was started to carry on the workflow."
        parent:
          $ref: "#/components/schemas/WorkflowExecution"
          description: If this workflow execution is a child of another execution then contains the workflow execution that started this execution.
        tagList:
          $ref: "#/components/schemas/TagList"
          description: The list of tags associated with the workflow execution. Tags can be used to identify and list workflow executions of interest through the visibility APIs. A workflow execution can have a maximum of 5 tags.
        cancelRequested:
          $ref: "#/components/schemas/Canceled"
          description: Set to true if a cancellation is requested for this workflow execution.
      required:
        - execution
        - workflowType
        - startTimestamp
        - executionStatus
    ExecutionStatus:
      type: string
      enum:
        - OPEN
        - CLOSED
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Canceled:
      type: boolean
    WorkflowExecutionConfiguration:
      description: The configuration settings for a workflow execution including timeout values, tasklist etc. These configuration settings are determined from the defaults specified when registering the workflow type and those specified when starting the workflow execution.
      type: object
      properties:
        taskStartToCloseTimeout:
          $ref: "#/components/schemas/DurationInSeconds"
