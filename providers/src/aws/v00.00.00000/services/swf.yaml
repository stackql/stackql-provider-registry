  /GetWorkflowExecutionHistory:
    post:
      operationId: GetWorkflowExecutionHistory
      description: "Returns the history of the specified workflow execution. The results may be split into multiple pages. To retrieve subsequent pages, make the call again using the nextPageToken returned by the initial call. This operation is eventually consistent. The results are best effort and may not exactly reflect recent updates and changes. Access Control You can use IAM policies to control this action's access to Amazon SWF resources as follows: Use a Resource element with the domain name to limit the action to only specified domains. Use an Action element to allow or deny permission to call this action. You cannot use an IAM policy to constrain this action's parameters. If the caller doesn't have sufficient permissions to invoke the action, or the parameter values fall outside the specified constraints, the action fails. The associated event attribute's cause parameter is set to OPERATION_NOT_PERMITTED. For details and example IAM policies, see Using IAM to Manage Access to Amazon SWF Workflows in the Amazon SWF Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.GetWorkflowExecutionHistory
            default: SimpleWorkflowService.GetWorkflowExecutionHistory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                domain:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain containing the workflow execution.
                execution:
                  $ref: "#/components/schemas/WorkflowExecution"
                  description: Specifies the workflow execution for which to return the history.
                nextPageToken:
                  $ref: "#/components/schemas/PageToken"
                  description: 'If NextPageToken is returned there are more results available. The value of NextPageToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return a 400 error: "Specified token has exceeded its maximum lifetime". The configured maximumPageSize determines how many results can be returned in a single call.'
                maximumPageSize:
                  $ref: "#/components/schemas/PageSize"
                  description: The maximum number of results that are returned per call. Use nextPageToken to obtain further pages of results.
                reverseOrder:
                  $ref: "#/components/schemas/ReverseOrder"
                  description: When set to true, returns the events in reverse order. By default the results are returned in ascending order of the eventTimeStamp of the events.
              required:
                - domain
                - execution
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/History"
  /ListActivityTypes:
