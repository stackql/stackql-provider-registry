openapi: 3.0.0
info:
  version: "2012-01-25"
  title: Amazon Simple Workflow Service
  description: Amazon Simple Workflow Service
  x-serviceName: swf
  x-serviceAlias: swf
  x-protocol: json
  x-apiVersion: "2012-01-25"
  x-endpointPrefix: swf
  x-targetPrefix: SimpleWorkflowService
  x-jsonVersion: "1.0"
servers:
  - url: https://swf.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for swf
paths:
  /CountClosedWorkflowExecutions:
    post:
      operationId: CountClosedWorkflowExecutions
      description: "Returns the number of closed workflow executions within the given domain that meet the specified filtering criteria. This operation is eventually consistent. The results are best effort and may not exactly reflect recent updates and changes. Access Control You can use IAM policies to control this action's access to Amazon SWF resources as follows: Use a Resource element with the domain name to limit the action to only specified domains. Use an Action element to allow or deny permission to call this action. Constrain the following parameters by using a Condition element with the appropriate keys. tagFilter.tag: String constraint. The key is swf:tagFilter.tag. typeFilter.name: String constraint. The key is swf:typeFilter.name. typeFilter.version: String constraint. The key is swf:typeFilter.version. If the caller doesn't have sufficient permissions to invoke the action, or the parameter values fall outside the specified constraints, the action fails. The associated event attribute's cause parameter is set to OPERATION_NOT_PERMITTED. For details and example IAM policies, see Using IAM to Manage Access to Amazon SWF Workflows in the Amazon SWF Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.CountClosedWorkflowExecutions
            default: SimpleWorkflowService.CountClosedWorkflowExecutions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                domain:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain containing the workflow executions to count.
                startTimeFilter:
                  $ref: "#/components/schemas/ExecutionTimeFilter"
                  description: If specified, only workflow executions that meet the start time criteria of the filter are counted. startTimeFilter and closeTimeFilter are mutually exclusive. You must specify one of these in a request but not both.
                closeTimeFilter:
                  $ref: "#/components/schemas/ExecutionTimeFilter"
                  description: If specified, only workflow executions that meet the close time criteria of the filter are counted. startTimeFilter and closeTimeFilter are mutually exclusive. You must specify one of these in a request but not both.
                executionFilter:
                  $ref: "#/components/schemas/WorkflowExecutionFilter"
                  description: If specified, only workflow executions matching the WorkflowId in the filter are counted. closeStatusFilter, executionFilter, typeFilter and tagFilter are mutually exclusive. You can specify at most one of these in a request.
                typeFilter:
                  $ref: "#/components/schemas/WorkflowTypeFilter"
                  description: If specified, indicates the type of the workflow executions to be counted. closeStatusFilter, executionFilter, typeFilter and tagFilter are mutually exclusive. You can specify at most one of these in a request.
                tagFilter:
                  $ref: "#/components/schemas/TagFilter"
                  description: If specified, only executions that have a tag that matches the filter are counted. closeStatusFilter, executionFilter, typeFilter and tagFilter are mutually exclusive. You can specify at most one of these in a request.
                closeStatusFilter:
                  $ref: "#/components/schemas/CloseStatusFilter"
                  description: If specified, only workflow executions that match this close status are counted. This filter has an affect only if executionStatus is specified as CLOSED. closeStatusFilter, executionFilter, typeFilter and tagFilter are mutually exclusive. You can specify at most one of these in a request.
              required:
                - domain
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowExecutionCount"
  /CountOpenWorkflowExecutions:
    post:
      operationId: CountOpenWorkflowExecutions
      description: "Returns the number of open workflow executions within the given domain that meet the specified filtering criteria. This operation is eventually consistent. The results are best effort and may not exactly reflect recent updates and changes. Access Control You can use IAM policies to control this action's access to Amazon SWF resources as follows: Use a Resource element with the domain name to limit the action to only specified domains. Use an Action element to allow or deny permission to call this action. Constrain the following parameters by using a Condition element with the appropriate keys. tagFilter.tag: String constraint. The key is swf:tagFilter.tag. typeFilter.name: String constraint. The key is swf:typeFilter.name. typeFilter.version: String constraint. The key is swf:typeFilter.version. If the caller doesn't have sufficient permissions to invoke the action, or the parameter values fall outside the specified constraints, the action fails. The associated event attribute's cause parameter is set to OPERATION_NOT_PERMITTED. For details and example IAM policies, see Using IAM to Manage Access to Amazon SWF Workflows in the Amazon SWF Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.CountOpenWorkflowExecutions
            default: SimpleWorkflowService.CountOpenWorkflowExecutions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                domain:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain containing the workflow executions to count.
                startTimeFilter:
                  $ref: "#/components/schemas/ExecutionTimeFilter"
                  description: Specifies the start time criteria that workflow executions must meet in order to be counted.
                typeFilter:
                  $ref: "#/components/schemas/WorkflowTypeFilter"
                  description: Specifies the type of the workflow executions to be counted. executionFilter, typeFilter and tagFilter are mutually exclusive. You can specify at most one of these in a request.
                tagFilter:
                  $ref: "#/components/schemas/TagFilter"
                  description: If specified, only executions that have a tag that matches the filter are counted. executionFilter, typeFilter and tagFilter are mutually exclusive. You can specify at most one of these in a request.
                executionFilter:
                  $ref: "#/components/schemas/WorkflowExecutionFilter"
                  description: If specified, only workflow executions matching the WorkflowId in the filter are counted. executionFilter, typeFilter and tagFilter are mutually exclusive. You can specify at most one of these in a request.
              required:
                - domain
                - startTimeFilter
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowExecutionCount"
  /CountPendingActivityTasks:
    post:
      operationId: CountPendingActivityTasks
      description: "Returns the estimated number of activity tasks in the specified task list. The count returned is an approximation and isn't guaranteed to be exact. If you specify a task list that no activity task was ever scheduled in then 0 is returned. Access Control You can use IAM policies to control this action's access to Amazon SWF resources as follows: Use a Resource element with the domain name to limit the action to only specified domains. Use an Action element to allow or deny permission to call this action. Constrain the taskList.name parameter by using a Condition element with the swf:taskList.name key to allow the action to access only certain task lists. If the caller doesn't have sufficient permissions to invoke the action, or the parameter values fall outside the specified constraints, the action fails. The associated event attribute's cause parameter is set to OPERATION_NOT_PERMITTED. For details and example IAM policies, see Using IAM to Manage Access to Amazon SWF Workflows in the Amazon SWF Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SimpleWorkflowService.CountPendingActivityTasks
            default: SimpleWorkflowService.CountPendingActivityTasks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                domain:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain that contains the task list.
                taskList:
                  $ref: "#/components/schemas/TaskList"
                  description: The name of the task list.
              required:
                - domain
                - taskList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingTaskCount"
  /CountPendingDecisionTasks:
    post:
      operationId: CountPendingDecisionTasks
      description: "Returns the estimated number of decision tasks in the specified task list. The count returned is an approximation and isn't guaranteed to be exact. If you specify a task list that no decision task was ever scheduled in then 0 is returned. Access Control You can use IAM policies to control this action's access to Amazon SWF resources as follows: Use a Resource element with the domain name to limit the action to only specified domains. Use an Action element to allow or deny permission to call this action. Constrain the taskList.name parameter by using a Condition element with the swf:taskList.name key to allow the action to access only certain task lists. If the caller doesn't have sufficient permissions to invoke the action, or the parameter values fall outside the specified constraints, the action fails. The associated event attribute's cause parameter is set to OPERATION_NOT_PERMITTED. For details and example IAM policies, see Using IAM to Manage Access to Amazon SWF Workflows in the Amazon SWF Developer Guide."
      parameters:
