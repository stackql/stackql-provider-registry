      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                taskToken:
                  $ref: "#/components/schemas/TaskToken"
                  description: The taskToken of the ActivityTask. taskToken is generated by the service and should be treated as an opaque value. If the task is passed to another process, its taskToken must also be passed. This enables it to provide its progress and respond with results.
                details:
                  $ref: "#/components/schemas/LimitedData"
                  description: If specified, contains details about the progress of the task.
              required:
                - taskToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityTaskStatus"
