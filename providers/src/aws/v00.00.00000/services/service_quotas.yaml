  /GetQuotaUtilizationReport:
    post:
      operationId: GetQuotaUtilizationReport
      description: Retrieves the quota utilization report for your Amazon Web Services account. This operation returns paginated results showing your quota usage across all Amazon Web Services services, sorted by utilization percentage in descending order (highest utilization first). You must first initiate a report using the StartQuotaUtilizationReport operation. The report generation process is asynchronous and may take several seconds to complete. Poll this operation periodically to check the status and retrieve results when the report is ready. Each report contains up to 1,000 quota records per page. Use the NextToken parameter to retrieve additional pages of results. Reports are automatically deleted after 15 minutes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.GetQuotaUtilizationReport
            default: ServiceQuotasV20190624.GetQuotaUtilizationReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReportId:
                  $ref: "#/components/schemas/ReportId"
                  description: The unique identifier for the quota utilization report. This identifier is returned by the StartQuotaUtilizationReport operation.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token that indicates the next page of results to retrieve. This token is returned in the response when there are more results available. Omit this parameter for the first request.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsUtilization"
                  description: The maximum number of results to return per page. The default value is 1,000 and the maximum allowed value is 1,000.
              required:
                - ReportId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQuotaUtilizationReportResponse"
