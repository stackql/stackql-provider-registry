      description: Adds a quota increase request to your quota request template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.PutServiceQuotaIncreaseRequestIntoTemplate
            default: ServiceQuotasV20190624.PutServiceQuotaIncreaseRequestIntoTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                QuotaCode:
                  $ref: "#/components/schemas/QuotaCode"
                  description: Specifies the quota identifier. To find the quota code for a specific quota, use the ListServiceQuotas operation, and look for the QuotaCode response in the output for the quota you want.
                ServiceCode:
                  $ref: "#/components/schemas/ServiceCode"
                  description: Specifies the service identifier. To find the service code value for an Amazon Web Services service, use the ListServices operation.
                AwsRegion:
                  $ref: "#/components/schemas/AwsRegion"
                  description: Specifies the Amazon Web Services Region to which the template applies.
                DesiredValue:
                  $ref: "#/components/schemas/QuotaValue"
                  description: Specifies the new, increased value for the quota.
              required:
                - QuotaCode
                - ServiceCode
                - AwsRegion
                - DesiredValue
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutServiceQuotaIncreaseRequestIntoTemplateResponse"
  /RequestServiceQuotaIncrease:
    post:
      operationId: RequestServiceQuotaIncrease
      description: Submits a quota increase request for the specified quota at the account or resource level.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.RequestServiceQuotaIncrease
            default: ServiceQuotasV20190624.RequestServiceQuotaIncrease
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceCode:
                  $ref: "#/components/schemas/ServiceCode"
                  description: Specifies the service identifier. To find the service code value for an Amazon Web Services service, use the ListServices operation.
                QuotaCode:
                  $ref: "#/components/schemas/QuotaCode"
                  description: Specifies the quota identifier. To find the quota code for a specific quota, use the ListServiceQuotas operation, and look for the QuotaCode response in the output for the quota you want.
                DesiredValue:
                  $ref: "#/components/schemas/QuotaValue"
                  description: Specifies the new, increased value for the quota.
                ContextId:
                  $ref: "#/components/schemas/QuotaContextId"
                  description: Specifies the resource with an Amazon Resource Name (ARN).
                SupportCaseAllowed:
                  $ref: "#/components/schemas/SupportCaseAllowed"
                  description: Specifies if an Amazon Web Services Support case can be opened for the quota increase request. This parameter is optional. By default, this flag is set to True and Amazon Web Services may create a support case for some quota increase requests. You can set this flag to False if you do not want a support case created when you request a quota increase. If you set the flag to False, Amazon Web Services does not open a support case and updates the request status to Not approved.
              required:
                - ServiceCode
                - QuotaCode
                - DesiredValue
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestServiceQuotaIncreaseResponse"
  /StartAutoManagement:
    post:
      operationId: StartAutoManagement
      description: Starts Service Quotas Automatic Management for an Amazon Web Services account, including notification preferences and excluded quotas configurations. Automatic Management monitors your Service Quotas utilization and notifies you before you run out of your allocated quotas.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.StartAutoManagement
            default: ServiceQuotasV20190624.StartAutoManagement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OptInLevel:
                  $ref: "#/components/schemas/OptInLevel"
                  description: Sets the opt-in level for Automatic Management. Only Amazon Web Services account level is supported.
                OptInType:
                  $ref: "#/components/schemas/OptInType"
                  description: "Sets the opt-in type for Automatic Management. There are two modes: Notify only and Notify and Auto-Adjust. Currently, only NotifyOnly is available."
                NotificationArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The User Notifications Amazon Resource Name (ARN) for Automatic Management notifications.
                ExclusionList:
                  $ref: "#/components/schemas/ExclusionList"
                  description: List of Amazon Web Services services excluded from Automatic Management. You won't be notified of Service Quotas utilization for Amazon Web Services services added to the Automatic Management exclusion list.
              required:
                - OptInLevel
                - OptInType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAutoManagementResponse"
  /StartQuotaUtilizationReport:
    post:
      operationId: StartQuotaUtilizationReport
      description: Initiates the generation of a quota utilization report for your Amazon Web Services account. This asynchronous operation analyzes your quota usage across all Amazon Web Services services and returns a unique report identifier that you can use to retrieve the results. The report generation process may take several seconds to complete, depending on the number of quotas in your account. Use the GetQuotaUtilizationReport operation to check the status and retrieve the results when the report is ready.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.StartQuotaUtilizationReport
            default: ServiceQuotasV20190624.StartQuotaUtilizationReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartQuotaUtilizationReportResponse"
  /StopAutoManagement:
    post:
      operationId: StopAutoManagement
      description: Stops Service Quotas Automatic Management for an Amazon Web Services account and removes all associated configurations. Automatic Management monitors your Service Quotas utilization and notifies you before you run out of your allocated quotas.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.StopAutoManagement
            default: ServiceQuotasV20190624.StopAutoManagement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopAutoManagementResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds tags to the specified applied quota. You can include one or more tags to add to the quota.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.TagResource
            default: ServiceQuotasV20190624.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) for the applied quota. You can get this information by using the Service Quotas console, or by listing the quotas using the list-service-quotas CLI command or the ListServiceQuotas Amazon Web Services API operation.
                Tags:
                  $ref: "#/components/schemas/InputTags"
                  description: The tags that you want to add to the resource.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from the specified applied quota. You can specify one or more tags to remove.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.UntagResource
            default: ServiceQuotasV20190624.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) for the applied quota that you want to untag. You can get this information by using the Service Quotas console, or by listing the quotas using the list-service-quotas CLI command or the ListServiceQuotas Amazon Web Services API operation.
                TagKeys:
                  $ref: "#/components/schemas/InputTagKeys"
                  description: The keys of the tags that you want to remove from the resource.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateAutoManagement:
    post:
      operationId: UpdateAutoManagement
      description: Updates your Service Quotas Automatic Management configuration, including notification preferences and excluded quotas. Automatic Management monitors your Service Quotas utilization and notifies you before you run out of your allocated quotas.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.UpdateAutoManagement
            default: ServiceQuotasV20190624.UpdateAutoManagement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OptInType:
                  $ref: "#/components/schemas/OptInType"
                  description: "Information on the opt-in type for your Automatic Management configuration. There are two modes: Notify only and Notify and Auto-Adjust. Currently, only NotifyOnly is available."
                NotificationArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The User Notifications Amazon Resource Name (ARN) for Automatic Management notifications you want to update.
                ExclusionList:
                  $ref: "#/components/schemas/ExclusionList"
                  description: List of Amazon Web Services services you want to exclude from Automatic Management. You won't be notified of Service Quotas utilization for Amazon Web Services services added to the Automatic Management exclusion list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAutoManagementResponse"
components:
  parameters:
