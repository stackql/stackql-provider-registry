  /ListRequestedServiceQuotaChangeHistory:
    post:
      operationId: ListRequestedServiceQuotaChangeHistory
      description: Retrieves the quota increase requests for the specified Amazon Web Services service. Filter responses to return quota requests at either the account level, resource level, or all levels. Responses include any open or closed requests within 90 days.
