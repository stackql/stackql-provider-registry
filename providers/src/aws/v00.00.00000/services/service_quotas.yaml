      operationId: GetAssociationForServiceQuotaTemplate
      description: Retrieves the status of the association for the quota request template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.GetAssociationForServiceQuotaTemplate
            default: ServiceQuotasV20190624.GetAssociationForServiceQuotaTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
