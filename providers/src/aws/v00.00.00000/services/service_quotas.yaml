openapi: 3.0.0
info:
  version: "2019-06-24"
  title: Service Quotas
  description: Service Quotas
  x-serviceName: servicequotas
  x-serviceAlias: service_quotas
  x-protocol: json
  x-apiVersion: "2019-06-24"
  x-endpointPrefix: servicequotas
  x-targetPrefix: ServiceQuotasV20190624
  x-jsonVersion: "1.1"
servers:
  - url: https://servicequotas.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for service-quotas
paths:
  /AssociateServiceQuotaTemplate:
    post:
      operationId: AssociateServiceQuotaTemplate
      description: Associates your quota request template with your organization. When a new Amazon Web Services account is created in your organization, the quota increase requests in the template are automatically applied to the account. You can add a quota increase request for any adjustable quota to your template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.AssociateServiceQuotaTemplate
            default: ServiceQuotasV20190624.AssociateServiceQuotaTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateServiceQuotaTemplateResponse"
  /CreateSupportCase:
    post:
      operationId: CreateSupportCase
      description: Creates a Support case for an existing quota increase request. This call only creates a Support case if the request has a Pending status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.CreateSupportCase
            default: ServiceQuotasV20190624.CreateSupportCase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RequestId:
                  $ref: "#/components/schemas/RequestId"
                  description: The ID of the pending quota increase request for which you want to open a Support case.
              required:
                - RequestId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSupportCaseResponse"
  /DeleteServiceQuotaIncreaseRequestFromTemplate:
    post:
      operationId: DeleteServiceQuotaIncreaseRequestFromTemplate
      description: Deletes the quota increase request for the specified quota from your quota request template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.DeleteServiceQuotaIncreaseRequestFromTemplate
            default: ServiceQuotasV20190624.DeleteServiceQuotaIncreaseRequestFromTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceCode:
                  $ref: "#/components/schemas/ServiceCode"
                  description: Specifies the service identifier. To find the service code value for an Amazon Web Services service, use the ListServices operation.
                QuotaCode:
                  $ref: "#/components/schemas/QuotaCode"
                  description: Specifies the quota identifier. To find the quota code for a specific quota, use the ListServiceQuotas operation, and look for the QuotaCode response in the output for the quota you want.
                AwsRegion:
                  $ref: "#/components/schemas/AwsRegion"
                  description: Specifies the Amazon Web Services Region for which the request was made.
              required:
                - ServiceCode
                - QuotaCode
                - AwsRegion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteServiceQuotaIncreaseRequestFromTemplateResponse"
  /DisassociateServiceQuotaTemplate:
    post:
      operationId: DisassociateServiceQuotaTemplate
      description: Disables your quota request template. After a template is disabled, the quota increase requests in the template are not applied to new Amazon Web Services accounts in your organization. Disabling a quota request template does not apply its quota increase requests.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.DisassociateServiceQuotaTemplate
            default: ServiceQuotasV20190624.DisassociateServiceQuotaTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateServiceQuotaTemplateResponse"
  /GetAWSDefaultServiceQuota:
    post:
      operationId: GetAWSDefaultServiceQuota
      description: Retrieves the default value for the specified quota. The default value does not reflect any quota increases.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ServiceQuotasV20190624.GetAWSDefaultServiceQuota
            default: ServiceQuotasV20190624.GetAWSDefaultServiceQuota
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceCode:
                  $ref: "#/components/schemas/ServiceCode"
                  description: Specifies the service identifier. To find the service code value for an Amazon Web Services service, use the ListServices operation.
                QuotaCode:
                  $ref: "#/components/schemas/QuotaCode"
                  description: Specifies the quota identifier. To find the quota code for a specific quota, use the ListServiceQuotas operation, and look for the QuotaCode response in the output for the quota you want.
