        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AssociateServiceQuotaTemplateResponse:
      type: object
    RequestId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[0-9a-zA-Z][a-zA-Z0-9-]{1,128}"
    CreateSupportCaseResponse:
      type: object
    ServiceCode:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-zA-Z][a-zA-Z0-9-]{1,63}"
    QuotaCode:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z][a-zA-Z0-9-]{1,128}"
    AwsRegion:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z][a-zA-Z0-9-]{1,128}"
    DeleteServiceQuotaIncreaseRequestFromTemplateResponse:
      type: object
    DisassociateServiceQuotaTemplateResponse:
      type: object
    GetAWSDefaultServiceQuotaResponse:
      type: object
      properties:
        Quota:
          $ref: "#/components/schemas/ServiceQuota"
          description: Information about the quota.
    ServiceQuota:
      description: Information about a quota.
      type: object
      properties:
        ServiceCode:
          $ref: "#/components/schemas/ServiceCode"
          description: Specifies the service identifier. To find the service code value for an Amazon Web Services service, use the ListServices operation.
        ServiceName:
          $ref: "#/components/schemas/ServiceName"
          description: Specifies the service name.
        QuotaArn:
          $ref: "#/components/schemas/QuotaArn"
          description: The Amazon Resource Name (ARN) of the quota.
        QuotaCode:
          $ref: "#/components/schemas/QuotaCode"
          description: Specifies the quota identifier. To find the quota code for a specific quota, use the ListServiceQuotas operation, and look for the QuotaCode response in the output for the quota you want.
        QuotaName:
          $ref: "#/components/schemas/QuotaName"
          description: Specifies the quota name.
        Value:
          $ref: "#/components/schemas/QuotaValue"
          description: The quota value.
        Unit:
          $ref: "#/components/schemas/QuotaUnit"
          description: The unit of measurement.
        Adjustable:
          $ref: "#/components/schemas/QuotaAdjustable"
          description: Indicates whether the quota value can be increased.
        GlobalQuota:
          $ref: "#/components/schemas/GlobalQuota"
          description: Indicates whether the quota is global.
        UsageMetric:
          $ref: "#/components/schemas/MetricInfo"
          description: Information about the measurement.
        Period:
          $ref: "#/components/schemas/QuotaPeriod"
          description: The period of time.
        ErrorReason:
          $ref: "#/components/schemas/ErrorReason"
          description: The error code and error reason.
        QuotaAppliedAtLevel:
          $ref: "#/components/schemas/AppliedLevelEnum"
          description: Filters the response to return applied quota values for the ACCOUNT, RESOURCE, or ALL levels. ACCOUNT is the default.
        QuotaContext:
          $ref: "#/components/schemas/QuotaContextInfo"
          description: The context for this service quota.
        Description:
          $ref: "#/components/schemas/QuotaDescription"
          description: The quota description.
    ServiceName:
      type: string
    QuotaArn:
      type: string
    QuotaName:
      type: string
    QuotaValue:
      type: number
      format: double
      minimum: 0
      maximum: 10000000000
    QuotaUnit:
      type: string
    QuotaAdjustable:
      type: boolean
    GlobalQuota:
      type: boolean
    MetricInfo:
      description: Information about the CloudWatch metric that reflects quota usage.
      type: object
      properties:
        MetricNamespace:
          $ref: "#/components/schemas/QuotaMetricNamespace"
          description: The namespace of the metric.
        MetricName:
          $ref: "#/components/schemas/QuotaMetricName"
          description: The name of the metric.
        MetricDimensions:
          type: object
          properties: {}
          description: The metric dimension. This is a name/value pair that is part of the identity of a metric.
        MetricStatisticRecommendation:
          $ref: "#/components/schemas/Statistic"
          description: The metric statistic that we recommend you use when determining quota usage.
    QuotaMetricNamespace:
      type: string
    QuotaMetricName:
      type: string
    Statistic:
      type: string
      minLength: 1
      maxLength: 256
      pattern: (Sum|Maximum)
    QuotaPeriod:
      description: Information about the quota period.
      type: object
      properties:
        PeriodValue:
          $ref: "#/components/schemas/PeriodValue"
          description: The value associated with the reported PeriodUnit.
        PeriodUnit:
          $ref: "#/components/schemas/PeriodUnit"
          description: The time unit.
    PeriodValue:
      type: integer
    PeriodUnit:
      type: string
      enum:
        - MICROSECOND
        - MILLISECOND
        - SECOND
        - MINUTE
        - HOUR
        - DAY
        - WEEK
    ErrorReason:
      description: An error that explains why an action did not succeed.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: "Service Quotas returns the following error values: DEPENDENCY_ACCESS_DENIED_ERROR - The caller does not have the required permissions to complete the action. To resolve the error, you must have permission to access the Amazon Web Services service or quota. DEPENDENCY_THROTTLING_ERROR - The Amazon Web Services service is throttling Service Quotas. DEPENDENCY_SERVICE_ERROR - The Amazon Web Services service is not available. SERVICE_QUOTA_NOT_AVAILABLE_ERROR - There was an error in Service Quotas."
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message.
    ErrorCode:
      type: string
      enum:
        - DEPENDENCY_ACCESS_DENIED_ERROR
        - DEPENDENCY_THROTTLING_ERROR
        - DEPENDENCY_SERVICE_ERROR
        - SERVICE_QUOTA_NOT_AVAILABLE_ERROR
    ErrorMessage:
      type: string
    AppliedLevelEnum:
      type: string
      enum:
        - ACCOUNT
        - RESOURCE
        - ALL
    QuotaContextInfo:
      description: A structure that describes the context for a resource-level quota. For resource-level quotas, such as Instances per OpenSearch Service Domain, you can apply the quota value at the resource-level for each OpenSearch Service Domain in your Amazon Web Services account. Together the attributes of this structure help you understand how the quota is implemented by Amazon Web Services and how you can manage it. For quotas such as Amazon OpenSearch Service Domains which can be managed at the account-level for each Amazon Web Services Region, the QuotaContext field is absent. See the attribute descriptions below to further understand how to use them.
      type: object
      properties:
        ContextScope:
          $ref: "#/components/schemas/QuotaContextScope"
          description: Specifies the scope to which the quota value is applied. If the scope is RESOURCE, the quota value is applied to each resource in the Amazon Web Services account. If the scope is ACCOUNT, the quota value is applied to the Amazon Web Services account.
        ContextScopeType:
          $ref: "#/components/schemas/QuotaContextScopeType"
          description: Specifies the resource type to which the quota can be applied.
        ContextId:
          $ref: "#/components/schemas/QuotaContextId"
          description: Specifies the resource, or resources, to which the quota applies. The value for this field is either an Amazon Resource Name (ARN) or *. If the value is an ARN, the quota value applies to that resource. If the value is *, then the quota value applies to all resources listed in the ContextScopeType field. The quota value applies to all resources for which you haven’t previously applied a quota value, and any new resources you create in your Amazon Web Services account.
    QuotaContextScope:
      type: string
      enum:
        - RESOURCE
        - ACCOUNT
    QuotaContextScopeType:
      type: string
    QuotaContextId:
      type: string
    QuotaDescription:
      type: string
      minLength: 0
      maxLength: 350
      pattern: ^.{0,350}$
    GetAssociationForServiceQuotaTemplateResponse:
      type: object
      properties:
        ServiceQuotaTemplateAssociationStatus:
          $ref: "#/components/schemas/ServiceQuotaTemplateAssociationStatus"
          description: The association status. If the status is ASSOCIATED, the quota increase requests in the template are automatically applied to new Amazon Web Services accounts in your organization.
    ServiceQuotaTemplateAssociationStatus:
      type: string
      enum:
        - ASSOCIATED
        - DISASSOCIATED
    GetAutoManagementConfigurationResponse:
      type: object
      properties:
        OptInLevel:
          $ref: "#/components/schemas/OptInLevel"
          description: Information on the opt-in level for Automatic Management. Only Amazon Web Services account level is supported.
        OptInType:
          $ref: "#/components/schemas/OptInType"
          description: "Information on the opt-in type for Automatic Management. There are two modes: Notify only and Notify and Auto-Adjust. Currently, only NotifyOnly is available."
        NotificationArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The User Notifications Amazon Resource Name (ARN) for Automatic Management notifications.
        OptInStatus:
          $ref: "#/components/schemas/OptInStatus"
          description: Status on whether Automatic Management is started or stopped.
        ExclusionList:
          type: object
          properties: {}
          description: List of Amazon Web Services services excluded from Automatic Management. You won't be notified of Service Quotas utilization for Amazon Web Services services added to the Automatic Management exclusion list.
    OptInLevel:
      type: string
      enum:
        - ACCOUNT
    OptInType:
      type: string
      enum:
        - NotifyOnly
        - NotifyAndAdjust
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: arn:aws(-[\w]+)*:*:.+:[0-9]{12}:.+
    OptInStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ReportId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[0-9a-zA-Z][a-zA-Z0-9-]{1,128}"
    NextToken:
      type: string
      maxLength: 2048
      pattern: ^[a-zA-Z0-9/+]*={0,2}$
    MaxResultsUtilization:
      type: integer
      minimum: 1
      maximum: 1000
    GetQuotaUtilizationReportResponse:
      type: object
      properties:
        ReportId:
          $ref: "#/components/schemas/ReportId"
          description: The unique identifier for the quota utilization report.
        Status:
          $ref: "#/components/schemas/ReportStatus"
          description: "The current status of the report generation. Possible values are: PENDING - The report generation is in progress. Retry this operation after a few seconds. IN_PROGRESS - The report is being processed. Continue polling until the status changes to COMPLETED. COMPLETED - The report is ready and quota utilization data is available in the response. FAILED - The report generation failed. Check the ErrorCode and ErrorMessage fields for details."
        GeneratedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the report was generated, in ISO 8601 format.
        TotalCount:
          $ref: "#/components/schemas/TotalCount"
          description: The total number of quotas included in the report across all pages.
        Quotas:
          $ref: "#/components/schemas/QuotaUtilizationInfoList"
          description: A list of quota utilization records, sorted by utilization percentage in descending order. Each record includes the quota code, service code, service name, quota name, namespace, utilization percentage, default value, applied value, and whether the quota is adjustable. Up to 1,000 records are returned per page.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token that indicates more results are available. Include this token in the next request to retrieve the next page of results. If this field is not present, you have retrieved all available results.
        ErrorCode:
          $ref: "#/components/schemas/ReportErrorCode"
          description: An error code indicating the reason for failure when the report status is FAILED. This field is only present when the status is FAILED.
        ErrorMessage:
          $ref: "#/components/schemas/ReportErrorMessage"
          description: A detailed error message describing the failure when the report status is FAILED. This field is only present when the status is FAILED.
    ReportStatus:
      type: string
      enum:
        - PENDING
        - IN_PROGRESS
        - COMPLETED
        - FAILED
    DateTime:
      type: string
      format: date-time
    TotalCount:
      type: integer
      minimum: 0
      maximum: 2147483647
    QuotaUtilizationInfoList:
      type: array
      items:
        $ref: "#/components/schemas/QuotaUtilizationInfo"
    QuotaUtilizationInfo:
      description: Information about a quota's utilization, including the quota code, service information, current usage, and applied limits.
      type: object
      properties:
        QuotaCode:
          $ref: "#/components/schemas/QuotaCode"
          description: The quota identifier.
        ServiceCode:
          $ref: "#/components/schemas/ServiceCode"
          description: The service identifier.
        QuotaName:
          $ref: "#/components/schemas/QuotaName"
          description: The quota name.
        Namespace:
          $ref: "#/components/schemas/QuotaMetricNamespace"
          description: The namespace of the metric used to track quota usage.
        Utilization:
          $ref: "#/components/schemas/UtilizationPct"
          description: The utilization percentage of the quota, calculated as (current usage / applied value) × 100. Values range from 0.0 to 100.0 or higher if usage exceeds the quota limit.
        DefaultValue:
          $ref: "#/components/schemas/DefaultValue"
          description: The default value of the quota.
        AppliedValue:
          $ref: "#/components/schemas/AppliedValue"
          description: The applied value of the quota, which may be higher than the default value if a quota increase has been requested and approved.
        ServiceName:
          $ref: "#/components/schemas/ServiceName"
          description: The service name.
        Adjustable:
          $ref: "#/components/schemas/QuotaAdjustable"
          description: Indicates whether the quota value can be increased.
    UtilizationPct:
      type: number
      format: double
    DefaultValue:
      type: number
      format: double
      minimum: 0
      maximum: 10000000000
    AppliedValue:
      type: number
      format: double
      minimum: 0
      maximum: 10000000000
    ReportErrorCode:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z][a-zA-Z0-9]*"
    ReportErrorMessage:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: ^.*$
    GetRequestedServiceQuotaChangeResponse:
      type: object
      properties:
        RequestedQuota:
          $ref: "#/components/schemas/RequestedServiceQuotaChange"
          description: Information about the quota increase request.
    RequestedServiceQuotaChange:
      description: Information about a quota increase request.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/RequestId"
          description: The unique identifier.
        RequestType:
          $ref: "#/components/schemas/RequestType"
          description: "The type of quota increase request. Possible values include: AutomaticManagement - The request was automatically created by Service Quotas Automatic Management when quota utilization approached the limit. If this field is not present, the request was manually created by a user."
        CaseId:
          $ref: "#/components/schemas/CustomerServiceEngagementId"
          description: The case ID.
        ServiceCode:
          $ref: "#/components/schemas/ServiceCode"
          description: Specifies the service identifier. To find the service code value for an Amazon Web Services service, use the ListServices operation.
        ServiceName:
          $ref: "#/components/schemas/ServiceName"
          description: Specifies the service name.
