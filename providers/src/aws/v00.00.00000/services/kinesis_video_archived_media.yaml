openapi: 3.0.0
info:
  version: "2017-09-30"
  title: Amazon Kinesis Video Streams Archived Media
  description: Amazon Kinesis Video Streams Archived Media
  x-serviceName: kinesisvideo
  x-serviceAlias: kinesis_video_archived_media
  x-protocol: rest-json
  x-apiVersion: "2017-09-30"
  x-endpointPrefix: kinesisvideo
servers:
  - url: https://kinesisvideo.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for kinesis-video-archived-media
paths:
  /getClip:
    post:
      operationId: GetClip
      description: "Downloads an MP4 file (clip) containing the archived, on-demand media from the specified video stream over the specified time range. Both the StreamName and the StreamARN parameters are optional, but you must specify either the StreamName or the StreamARN when invoking this API operation. As a prerequisite to using GetCLip API, you must obtain an endpoint using GetDataEndpoint, specifying GET_CLIP for the APIName parameter. An Amazon Kinesis video stream has the following requirements for providing data through MP4: The media must contain h.264 or h.265 encoded video and, optionally, AAC or G.711 encoded audio. Specifically, the codec ID of track 1 should be V_MPEG/ISO/AVC (for h.264) or V_MPEGH/ISO/HEVC (for H.265). Optionally, the codec ID of track 2 should be A_AAC (for AAC) or A_MS/ACM (for G.711). Data retention must be greater than 0. The video track of each fragment must contain codec private data in the Advanced Video Coding (AVC) for H.264 format and HEVC for H.265 format. For more information, see MPEG-4 specification ISO/IEC 14496-15. For information about adapting stream data to a given format, see NAL Adaptation Flags. The audio track (if present) of each fragment must contain codec private data in the AAC format (AAC specification ISO/IEC 13818-7) or the MS Wave format. You can monitor the amount of outgoing data by monitoring the GetClip.OutgoingBytes Amazon CloudWatch metric. For information about using CloudWatch to monitor Kinesis Video Streams, see Monitoring Kinesis Video Streams. For pricing information, see Amazon Kinesis Video Streams Pricing and Amazon Web Services Pricing. Charges for outgoing Amazon Web Services data apply."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                ClipFragmentSelector:
                  $ref: "#/components/schemas/ClipFragmentSelector"
              required:
                - ClipFragmentSelector
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClipOutput"
  /getDASHStreamingSessionURL:
    post:
      operationId: GetDASHStreamingSessionURL
      description: "Retrieves an MPEG Dynamic Adaptive Streaming over HTTP (DASH) URL for the stream. You can then open the URL in a media player to view the stream contents. Both the StreamName and the StreamARN parameters are optional, but you must specify either the StreamName or the StreamARN when invoking this API operation. An Amazon Kinesis video stream has the following requirements for providing data through MPEG-DASH: The media must contain h.264 or h.265 encoded video and, optionally, AAC or G.711 encoded audio. Specifically, the codec ID of track 1 should be V_MPEG/ISO/AVC (for h.264) or V_MPEGH/ISO/HEVC (for H.265). Optionally, the codec ID of track 2 should be A_AAC (for AAC) or A_MS/ACM (for G.711). Data retention must be greater than 0. The video track of each fragment must contain codec private data in the Advanced Video Coding (AVC) for H.264 format and HEVC for H.265 format. For more information, see MPEG-4 specification ISO/IEC 14496-15. For information about adapting stream data to a given format, see NAL Adaptation Flags. The audio track (if present) of each fragment must contain codec private data in the AAC format (AAC specification ISO/IEC 13818-7) or the MS Wave format. The following procedure shows how to use MPEG-DASH with Kinesis Video Streams: Get an endpoint using GetDataEndpoint, specifying GET_DASH_STREAMING_SESSION_URL for the APIName parameter. Retrieve the MPEG-DASH URL using GetDASHStreamingSessionURL. Kinesis Video Streams creates an MPEG-DASH streaming session to be used for accessing content in a stream using the MPEG-DASH protocol. GetDASHStreamingSessionURL returns an authenticated URL (that includes an encrypted session token) for the session's MPEG-DASH manifest (the root resource needed for streaming with MPEG-DASH). Don't share or store this token where an unauthorized entity can access it. The token provides access to the content of the stream. Safeguard the token with the same measures that you use with your Amazon Web Services credentials. The media that is made available through the manifest consists only of the requested stream, time range, and format. No other media data (such as frames outside the requested window or alternate bitrates) is made available. Provide the URL (containing the encrypted session token) for the MPEG-DASH manifest to a media player that supports the MPEG-DASH protocol. Kinesis Video Streams makes the initialization fragment and media fragments available through the manifest URL. The initialization fragment contains the codec private data for the stream, and other data needed to set up the video or audio decoder and renderer. The media fragments contain encoded video frames or encoded audio samples. The media player receives the authenticated URL and requests stream metadata and media data normally. When the media player requests data, it calls the following actions: GetDASHManifest: Retrieves an MPEG DASH manifest, which contains the metadata for the media that you want to playback. GetMP4InitFragment: Retrieves the MP4 initialization fragment. The media player typically loads the initialization fragment before loading any media fragments. This fragment contains the \"fytp\" and \"moov\" MP4 atoms, and the child atoms that are needed to initialize the media player decoder. The initialization fragment does not correspond to a fragment in a Kinesis video stream. It contains only the codec private data for the stream and respective track, which the media player needs to decode the media frames. GetMP4MediaFragment: Retrieves MP4 media fragments. These fragments contain the \"moof\" and \"mdat\" MP4 atoms and their child atoms, containing the encoded fragment's media frames and their timestamps. After the first media fragment is made available in a streaming session, any fragments that don't contain the same codec private data cause an error to be returned when those different media fragments are loaded. Therefore, the codec private data should not change between fragments in a session. This also means that the session fails if the fragments in a stream change from having only video to having both audio and video. Data retrieved with this action is billable. See Pricing for details. For restrictions that apply to MPEG-DASH sessions, see Kinesis Video Streams Limits. You can monitor the amount of data that the media player consumes by monitoring the GetMP4MediaFragment.OutgoingBytes Amazon CloudWatch metric. For information about using CloudWatch to monitor Kinesis Video Streams, see Monitoring Kinesis Video Streams. For pricing information, see Amazon Kinesis Video Streams Pricing and Amazon Web Services Pricing. Charges for both HLS sessions and outgoing Amazon Web Services data apply. For more information about HLS, see HTTP Live Streaming on the Apple Developer site. If an error is thrown after invoking a Kinesis Video Streams archived media API, in addition to the HTTP status code and the response body, it includes the following pieces of information: x-amz-ErrorType HTTP header – contains a more specific error type in addition to what the HTTP status code provides. x-amz-RequestId HTTP header – if you want to report an issue to Amazon Web Services the support team can better diagnose the problem if given the Request Id. Both the HTTP status code and the ErrorType header can be utilized to make programmatic decisions about whether errors are retry-able and under what conditions, as well as provide information on what actions the client programmer might need to take in order to successfully try again. For more information, see the Errors section at the bottom of this topic, as well as Common Errors."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                PlaybackMode:
                  $ref: "#/components/schemas/DASHPlaybackMode"
                DisplayFragmentTimestamp:
                  $ref: "#/components/schemas/DASHDisplayFragmentTimestamp"
                DisplayFragmentNumber:
                  $ref: "#/components/schemas/DASHDisplayFragmentNumber"
                DASHFragmentSelector:
                  $ref: "#/components/schemas/DASHFragmentSelector"
                Expires:
                  $ref: "#/components/schemas/Expires"
                MaxManifestFragmentResults:
                  $ref: "#/components/schemas/DASHMaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDASHStreamingSessionURLOutput"
  /getHLSStreamingSessionURL:
    post:
      operationId: GetHLSStreamingSessionURL
      description: "Retrieves an HTTP Live Streaming (HLS) URL for the stream. You can then open the URL in a browser or media player to view the stream contents. Both the StreamName and the StreamARN parameters are optional, but you must specify either the StreamName or the StreamARN when invoking this API operation. An Amazon Kinesis video stream has the following requirements for providing data through HLS: For streaming video, the media must contain H.264 or H.265 encoded video and, optionally, AAC encoded audio. Specifically, the codec ID of track 1 should be V_MPEG/ISO/AVC (for H.264) or V_MPEG/ISO/HEVC (for H.265). Optionally, the codec ID of track 2 should be A_AAC. For audio only streaming, the codec ID of track 1 should be A_AAC. Data retention must be greater than 0. The video track of each fragment must contain codec private data in the Advanced Video Coding (AVC) for H.264 format or HEVC for H.265 format (MPEG-4 specification ISO/IEC 14496-15). For information about adapting stream data to a given format, see NAL Adaptation Flags. The audio track (if present) of each fragment must contain codec private data in the AAC format (AAC specification ISO/IEC 13818-7). Kinesis Video Streams HLS sessions contain fragments in the fragmented MPEG-4 form (also called fMP4 or CMAF) or the MPEG-2 form (also called TS chunks, which the HLS specification also supports). For more information about HLS fragment types, see the HLS specification. The following procedure shows how to use HLS with Kinesis Video Streams: Get an endpoint using GetDataEndpoint, specifying GET_HLS_STREAMING_SESSION_URL for the APIName parameter. Retrieve the HLS URL using GetHLSStreamingSessionURL. Kinesis Video Streams creates an HLS streaming session to be used for accessing content in a stream using the HLS protocol. GetHLSStreamingSessionURL returns an authenticated URL (that includes an encrypted session token) for the session's HLS master playlist (the root resource needed for streaming with HLS). Don't share or store this token where an unauthorized entity could access it. The token provides access to the content of the stream. Safeguard the token with the same measures that you would use with your Amazon Web Services credentials. The media that is made available through the playlist consists only of the requested stream, time range, and format. No other media data (such as frames outside the requested window or alternate bitrates) is made available. Provide the URL (containing the encrypted session token) for the HLS master playlist to a media player that supports the HLS protocol. Kinesis Video Streams makes the HLS media playlist, initialization fragment, and media fragments available through the master playlist URL. The initialization fragment contains the codec private data for the stream, and other data needed to set up the video or audio decoder and renderer. The media fragments contain H.264-encoded video frames or AAC-encoded audio samples. The media player receives the authenticated URL and requests stream metadata and media data normally. When the media player requests data, it calls the following actions: GetHLSMasterPlaylist: Retrieves an HLS master playlist, which contains a URL for the GetHLSMediaPlaylist action for each track, and additional metadata for the media player, including estimated bitrate and resolution. GetHLSMediaPlaylist: Retrieves an HLS media playlist, which contains a URL to access the MP4 initialization fragment with the GetMP4InitFragment action, and URLs to access the MP4 media fragments with the GetMP4MediaFragment actions. The HLS media playlist also contains metadata about the stream that the player needs to play it, such as whether the PlaybackMode is LIVE or ON_DEMAND. The HLS media playlist is typically static for sessions with a PlaybackType of ON_DEMAND. The HLS media playlist is continually updated with new fragments for sessions with a PlaybackType of LIVE. There is a distinct HLS media playlist for the video track and the audio track (if applicable) that contains MP4 media URLs for the specific track. GetMP4InitFragment: Retrieves the MP4 initialization fragment. The media player typically loads the initialization fragment before loading any media fragments. This fragment contains the \"fytp\" and \"moov\" MP4 atoms, and the child atoms that are needed to initialize the media player decoder. The initialization fragment does not correspond to a fragment in a Kinesis video stream. It contains only the codec private data for the stream and respective track, which the media player needs to decode the media frames. GetMP4MediaFragment: Retrieves MP4 media fragments. These fragments contain the \"moof\" and \"mdat\" MP4 atoms and their child atoms, containing the encoded fragment's media frames and their timestamps. For the HLS streaming session, in-track codec private data (CPD) changes are supported. After the first media fragment is made available in a streaming session, fragments can contain CPD changes for each track. Therefore, the fragments in a session can have a different resolution, bit rate, or other information in the CPD without interrupting playback. However, any change made in the track number or track codec format can return an error when those different media fragments are loaded. For example, streaming will fail if the fragments in the stream change from having only video to having both audio and video, or if an AAC audio track is changed to an ALAW audio track. For each streaming session, only 500 CPD changes are allowed. Data retrieved with this action is billable. For information, see Pricing. GetTSFragment: Retrieves MPEG TS fragments containing both initialization and media data for all tracks in the stream. If the ContainerFormat is MPEG_TS, this API is used instead of GetMP4InitFragment and GetMP4MediaFragment to retrieve stream media. Data retrieved with this action is billable. For more information, see Kinesis Video Streams pricing. A streaming session URL must not be shared between players. The service might throttle a session if multiple media players are sharing it. For connection limits, see Kinesis Video Streams Limits. You can monitor the amount of data that the media player consumes by monitoring the GetMP4MediaFragment.OutgoingBytes Amazon CloudWatch metric. For information about using CloudWatch to monitor Kinesis Video Streams, see Monitoring Kinesis Video Streams. For pricing information, see Amazon Kinesis Video Streams Pricing and Amazon Web Services Pricing. Charges for both HLS sessions and outgoing Amazon Web Services data apply. For more information about HLS, see HTTP Live Streaming on the Apple Developer site. If an error is thrown after invoking a Kinesis Video Streams archived media API, in addition to the HTTP status code and the response body, it includes the following pieces of information: x-amz-ErrorType HTTP header – contains a more specific error type in addition to what the HTTP status code provides. x-amz-RequestId HTTP header – if you want to report an issue to Amazon Web Services, the support team can better diagnose the problem if given the Request Id. Both the HTTP status code and the ErrorType header can be utilized to make programmatic decisions about whether errors are retry-able and under what conditions, as well as provide information on what actions the client programmer might need to take in order to successfully try again. For more information, see the Errors section at the bottom of this topic, as well as Common Errors."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                PlaybackMode:
                  $ref: "#/components/schemas/HLSPlaybackMode"
                HLSFragmentSelector:
                  $ref: "#/components/schemas/HLSFragmentSelector"
                ContainerFormat:
                  $ref: "#/components/schemas/ContainerFormat"
                DiscontinuityMode:
                  $ref: "#/components/schemas/HLSDiscontinuityMode"
                DisplayFragmentTimestamp:
                  $ref: "#/components/schemas/HLSDisplayFragmentTimestamp"
                Expires:
                  $ref: "#/components/schemas/Expires"
                MaxMediaPlaylistFragmentResults:
                  $ref: "#/components/schemas/HLSMaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHLSStreamingSessionURLOutput"
  /getImages:
    post:
      operationId: GetImages
      description: Retrieves a list of images corresponding to each timestamp for a given time range, sampling interval, and image format configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                ImageSelectorType:
                  $ref: "#/components/schemas/ImageSelectorType"
                StartTimestamp:
                  $ref: "#/components/schemas/Timestamp"
                EndTimestamp:
                  $ref: "#/components/schemas/Timestamp"
                SamplingInterval:
                  $ref: "#/components/schemas/SamplingInterval"
                Format:
                  $ref: "#/components/schemas/Format"
                FormatConfig:
                  $ref: "#/components/schemas/FormatConfig"
                WidthPixels:
                  $ref: "#/components/schemas/WidthPixels"
                HeightPixels:
                  $ref: "#/components/schemas/HeightPixels"
                MaxResults:
                  $ref: "#/components/schemas/GetImagesMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - ImageSelectorType
                - StartTimestamp
                - EndTimestamp
                - Format
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetImagesOutput"
  /getMediaForFragmentList:
    post:
      operationId: GetMediaForFragmentList
      description: "Gets media for a list of fragments (specified by fragment number) from the archived data in an Amazon Kinesis video stream. You must first call the GetDataEndpoint API to get an endpoint. Then send the GetMediaForFragmentList requests to this endpoint using the --endpoint-url parameter. For limits, see Kinesis Video Streams Limits. If an error is thrown after invoking a Kinesis Video Streams archived media API, in addition to the HTTP status code and the response body, it includes the following pieces of information: x-amz-ErrorType HTTP header – contains a more specific error type in addition to what the HTTP status code provides. x-amz-RequestId HTTP header – if you want to report an issue to Amazon Web Services, the support team can better diagnose the problem if given the Request Id. Both the HTTP status code and the ErrorType header can be utilized to make programmatic decisions about whether errors are retry-able and under what conditions, as well as provide information on what actions the client programmer might need to take in order to successfully try again. For more information, see the Errors section at the bottom of this topic, as well as Common Errors."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                Fragments:
                  $ref: "#/components/schemas/FragmentNumberList"
              required:
                - Fragments
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMediaForFragmentListOutput"
  /listFragments:
    post:
      operationId: ListFragments
      description: "Returns a list of Fragment objects from the specified stream and timestamp range within the archived data. Listing fragments is eventually consistent. This means that even if the producer receives an acknowledgment that a fragment is persisted, the result might not be returned immediately from a request to ListFragments. However, results are typically available in less than one second. You must first call the GetDataEndpoint API to get an endpoint. Then send the ListFragments requests to this endpoint using the --endpoint-url parameter. If an error is thrown after invoking a Kinesis Video Streams archived media API, in addition to the HTTP status code and the response body, it includes the following pieces of information: x-amz-ErrorType HTTP header – contains a more specific error type in addition to what the HTTP status code provides. x-amz-RequestId HTTP header – if you want to report an issue to Amazon Web Services, the support team can better diagnose the problem if given the Request Id. Both the HTTP status code and the ErrorType header can be utilized to make programmatic decisions about whether errors are retry-able and under what conditions, as well as provide information on what actions the client programmer might need to take in order to successfully try again. For more information, see the Errors section at the bottom of this topic, as well as Common Errors."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                MaxResults:
                  $ref: "#/components/schemas/ListFragmentsMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                FragmentSelector:
                  $ref: "#/components/schemas/FragmentSelector"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFragmentsOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    StreamName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9_.-]+"
    ResourceARN:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: arn:[a-z\d-]+:kinesisvideo:[a-z0-9-]+:[0-9]+:[a-z]+/[a-zA-Z0-9_.-]+/[0-9]+
    ClipFragmentSelector:
      description: Describes the timestamp range and timestamp origin of a range of fragments. Fragments that have duplicate producer timestamps are deduplicated. This means that if producers are producing a stream of fragments with producer timestamps that are approximately equal to the true clock time, the clip will contain all of the fragments within the requested timestamp range. If some fragments are ingested within the same time range and very different points in time, only the oldest ingested collection of fragments are returned.
      type: object
      properties:
        FragmentSelectorType:
          $ref: "#/components/schemas/ClipFragmentSelectorType"
          description: The origin of the timestamps to use (Server or Producer).
        TimestampRange:
          $ref: "#/components/schemas/ClipTimestampRange"
          description: The range of timestamps to return.
      required:
        - FragmentSelectorType
        - TimestampRange
    ClipFragmentSelectorType:
      type: string
      enum:
        - PRODUCER_TIMESTAMP
        - SERVER_TIMESTAMP
    ClipTimestampRange:
      description: The range of timestamps for which to return fragments.
      type: object
      properties:
        StartTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The starting timestamp in the range of timestamps for which to return fragments. Only fragments that start exactly at or after StartTimestamp are included in the session. Fragments that start before StartTimestamp and continue past it aren't included in the session. If FragmentSelectorType is SERVER_TIMESTAMP, the StartTimestamp must be later than the stream head.
        EndTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The end of the timestamp range for the requested media. This value must be within 24 hours of the specified StartTimestamp, and it must be later than the StartTimestamp value. If FragmentSelectorType for the request is SERVER_TIMESTAMP, this value must be in the past. This value is inclusive. The EndTimestamp is compared to the (starting) timestamp of the fragment. Fragments that start before the EndTimestamp value and continue past it are included in the session.
      required:
        - StartTimestamp
        - EndTimestamp
    Timestamp:
      type: string
      format: date-time
    GetClipOutput:
      type: object
      properties:
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: The content type of the media in the requested clip.
        Payload:
          $ref: "#/components/schemas/Payload"
          description: Traditional MP4 file that contains the media clip from the specified video stream. The output will contain the first 100 MB or the first 200 fragments from the specified start timestamp. For more information, see Kinesis Video Streams Limits.
    ContentType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9_\.\-]+$
    Payload:
      type: string
      format: byte
    DASHPlaybackMode:
      type: string
      enum:
        - LIVE
        - LIVE_REPLAY
        - ON_DEMAND
    DASHDisplayFragmentTimestamp:
      type: string
      enum:
        - ALWAYS
        - NEVER
    DASHDisplayFragmentNumber:
      type: string
      enum:
        - ALWAYS
        - NEVER
    DASHFragmentSelector:
      description: Contains the range of timestamps for the requested media, and the source of the timestamps.
      type: object
      properties:
        FragmentSelectorType:
          $ref: "#/components/schemas/DASHFragmentSelectorType"
          description: The source of the timestamps for the requested media. When FragmentSelectorType is set to PRODUCER_TIMESTAMP and GetDASHStreamingSessionURLInput$PlaybackMode is ON_DEMAND or LIVE_REPLAY, the first fragment ingested with a producer timestamp within the specified FragmentSelector$TimestampRange is included in the media playlist. In addition, the fragments with producer timestamps within the TimestampRange ingested immediately following the first fragment (up to the GetDASHStreamingSessionURLInput$MaxManifestFragmentResults value) are included. Fragments that have duplicate producer timestamps are deduplicated. This means that if producers are producing a stream of fragments with producer timestamps that are approximately equal to the true clock time, the MPEG-DASH manifest will contain all of the fragments within the requested timestamp range. If some fragments are ingested within the same time range and very different points in time, only the oldest ingested collection of fragments are returned. When FragmentSelectorType is set to PRODUCER_TIMESTAMP and GetDASHStreamingSessionURLInput$PlaybackMode is LIVE, the producer timestamps are used in the MP4 fragments and for deduplication. But the most recently ingested fragments based on server timestamps are included in the MPEG-DASH manifest. This means that even if fragments ingested in the past have producer timestamps with values now, they are not included in the HLS media playlist. The default is SERVER_TIMESTAMP.
        TimestampRange:
          $ref: "#/components/schemas/DASHTimestampRange"
          description: The start and end of the timestamp range for the requested media. This value should not be present if PlaybackType is LIVE.
    DASHFragmentSelectorType:
      type: string
      enum:
        - PRODUCER_TIMESTAMP
        - SERVER_TIMESTAMP
    DASHTimestampRange:
      description: The start and end of the timestamp range for the requested media. This value should not be present if PlaybackType is LIVE. The values in DASHimestampRange are inclusive. Fragments that start exactly at or after the start time are included in the session. Fragments that start before the start time and continue past it are not included in the session.
      type: object
      properties:
        StartTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The start of the timestamp range for the requested media. If the DASHTimestampRange value is specified, the StartTimestamp value is required. Only fragments that start exactly at or after StartTimestamp are included in the session. Fragments that start before StartTimestamp and continue past it aren't included in the session. If FragmentSelectorType is SERVER_TIMESTAMP, the StartTimestamp must be later than the stream head.
        EndTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The end of the timestamp range for the requested media. This value must be within 24 hours of the specified StartTimestamp, and it must be later than the StartTimestamp value. If FragmentSelectorType for the request is SERVER_TIMESTAMP, this value must be in the past. The EndTimestamp value is required for ON_DEMAND mode, but optional for LIVE_REPLAY mode. If the EndTimestamp is not set for LIVE_REPLAY mode then the session will continue to include newly ingested fragments until the session expires. This value is inclusive. The EndTimestamp is compared to the (starting) timestamp of the fragment. Fragments that start before the EndTimestamp value and continue past it are included in the session.
    Expires:
      type: integer
      minimum: 300
      maximum: 43200
    DASHMaxResults:
      type: integer
      format: int64
      minimum: 1
      maximum: 5000
    GetDASHStreamingSessionURLOutput:
      type: object
      properties:
        DASHStreamingSessionURL:
          $ref: "#/components/schemas/DASHStreamingSessionURL"
          description: The URL (containing the session token) that a media player can use to retrieve the MPEG-DASH manifest.
    DASHStreamingSessionURL:
      type: string
    HLSPlaybackMode:
      type: string
      enum:
        - LIVE
        - LIVE_REPLAY
        - ON_DEMAND
    HLSFragmentSelector:
      description: Contains the range of timestamps for the requested media, and the source of the timestamps.
      type: object
      properties:
        FragmentSelectorType:
          $ref: "#/components/schemas/HLSFragmentSelectorType"
          description: The source of the timestamps for the requested media. When FragmentSelectorType is set to PRODUCER_TIMESTAMP and GetHLSStreamingSessionURLInput$PlaybackMode is ON_DEMAND or LIVE_REPLAY, the first fragment ingested with a producer timestamp within the specified FragmentSelector$TimestampRange is included in the media playlist. In addition, the fragments with producer timestamps within the TimestampRange ingested immediately following the first fragment (up to the GetHLSStreamingSessionURLInput$MaxMediaPlaylistFragmentResults value) are included. Fragments that have duplicate producer timestamps are deduplicated. This means that if producers are producing a stream of fragments with producer timestamps that are approximately equal to the true clock time, the HLS media playlists will contain all of the fragments within the requested timestamp range. If some fragments are ingested within the same time range and very different points in time, only the oldest ingested collection of fragments are returned. When FragmentSelectorType is set to PRODUCER_TIMESTAMP and GetHLSStreamingSessionURLInput$PlaybackMode is LIVE, the producer timestamps are used in the MP4 fragments and for deduplication. But the most recently ingested fragments based on server timestamps are included in the HLS media playlist. This means that even if fragments ingested in the past have producer timestamps with values now, they are not included in the HLS media playlist. The default is SERVER_TIMESTAMP.
        TimestampRange:
          $ref: "#/components/schemas/HLSTimestampRange"
          description: The start and end of the timestamp range for the requested media. This value should not be present if PlaybackType is LIVE.
    HLSFragmentSelectorType:
      type: string
      enum:
        - PRODUCER_TIMESTAMP
        - SERVER_TIMESTAMP
    HLSTimestampRange:
      description: The start and end of the timestamp range for the requested media. This value should not be present if PlaybackType is LIVE.
      type: object
      properties:
        StartTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The start of the timestamp range for the requested media. If the HLSTimestampRange value is specified, the StartTimestamp value is required. Only fragments that start exactly at or after StartTimestamp are included in the session. Fragments that start before StartTimestamp and continue past it aren't included in the session. If FragmentSelectorType is SERVER_TIMESTAMP, the StartTimestamp must be later than the stream head.
        EndTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The end of the timestamp range for the requested media. This value must be within 24 hours of the specified StartTimestamp, and it must be later than the StartTimestamp value. If FragmentSelectorType for the request is SERVER_TIMESTAMP, this value must be in the past. The EndTimestamp value is required for ON_DEMAND mode, but optional for LIVE_REPLAY mode. If the EndTimestamp is not set for LIVE_REPLAY mode then the session will continue to include newly ingested fragments until the session expires. This value is inclusive. The EndTimestamp is compared to the (starting) timestamp of the fragment. Fragments that start before the EndTimestamp value and continue past it are included in the session.
    ContainerFormat:
      type: string
      enum:
        - FRAGMENTED_MP4
        - MPEG_TS
    HLSDiscontinuityMode:
      type: string
      enum:
        - ALWAYS
        - NEVER
        - ON_DISCONTINUITY
    HLSDisplayFragmentTimestamp:
      type: string
      enum:
        - ALWAYS
        - NEVER
    HLSMaxResults:
      type: integer
      format: int64
      minimum: 1
      maximum: 5000
    GetHLSStreamingSessionURLOutput:
      type: object
      properties:
        HLSStreamingSessionURL:
          $ref: "#/components/schemas/HLSStreamingSessionURL"
          description: The URL (containing the session token) that a media player can use to retrieve the HLS master playlist.
    HLSStreamingSessionURL:
      type: string
    ImageSelectorType:
      type: string
      enum:
        - PRODUCER_TIMESTAMP
        - SERVER_TIMESTAMP
    SamplingInterval:
      type: integer
    Format:
      type: string
      enum:
        - JPEG
        - PNG
    FormatConfig:
      type: object
      properties: {}
    WidthPixels:
      type: integer
      minimum: 1
      maximum: 3840
    HeightPixels:
      type: integer
      minimum: 1
      maximum: 2160
    GetImagesMaxResults:
      type: integer
      format: int64
      minimum: 1
      maximum: 100
    NextToken:
      type: string
      minLength: 1
      maxLength: 4096
      pattern: "[a-zA-Z0-9+/]+={0,2}"
    GetImagesOutput:
      type: object
      properties:
        Images:
          $ref: "#/components/schemas/Images"
          description: The list of images generated from the video stream. If there is no media available for the given timestamp, the NO_MEDIA error will be listed in the output. If an error occurs while the image is being generated, the MEDIA_ERROR will be listed in the output as the cause of the missing image.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The encrypted token that was used in the request to get more images.
    Images:
      type: array
      items:
        $ref: "#/components/schemas/Image"
    Image:
      description: A structure that contains the Timestamp, Error, and ImageContent.
      type: object
      properties:
        TimeStamp:
          $ref: "#/components/schemas/Timestamp"
          description: An attribute of the Image object that is used to extract an image from the video stream. This field is used to manage gaps on images or to better understand the pagination window.
        Error:
          $ref: "#/components/schemas/ImageError"
          description: "The error message shown when the image for the provided timestamp was not extracted due to a non-tryable error. An error will be returned if: There is no media that exists for the specified Timestamp. The media for the specified time does not allow an image to be extracted. In this case the media is audio only, or the incorrect media has been ingested."
        ImageContent:
          $ref: "#/components/schemas/ImageContent"
          description: An attribute of the Image object that is Base64 encoded.
    ImageError:
      type: string
      enum:
        - NO_MEDIA
        - MEDIA_ERROR
    ImageContent:
      type: string
      minLength: 1
      maxLength: 6291456
    FragmentNumberList:
      type: array
      items:
        $ref: "#/components/schemas/FragmentNumberString"
    FragmentNumberString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[0-9]+$
    GetMediaForFragmentListOutput:
      type: object
      properties:
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: The content type of the requested media.
        Payload:
          $ref: "#/components/schemas/Payload"
          description: "The payload that Kinesis Video Streams returns is a sequence of chunks from the specified stream. For information about the chunks, see PutMedia. The chunks that Kinesis Video Streams returns in the GetMediaForFragmentList call also include the following additional Matroska (MKV) tags: AWS_KINESISVIDEO_FRAGMENT_NUMBER - Fragment number returned in the chunk. AWS_KINESISVIDEO_SERVER_SIDE_TIMESTAMP - Server-side timestamp of the fragment. AWS_KINESISVIDEO_PRODUCER_SIDE_TIMESTAMP - Producer-side timestamp of the fragment. The following tags will be included if an exception occurs: AWS_KINESISVIDEO_FRAGMENT_NUMBER - The number of the fragment that threw the exception AWS_KINESISVIDEO_EXCEPTION_ERROR_CODE - The integer code of the AWS_KINESISVIDEO_EXCEPTION_MESSAGE - A text description of the exception"
    ListFragmentsMaxResults:
      type: integer
      format: int64
      minimum: 1
      maximum: 1000
    FragmentSelector:
      description: "Describes the timestamp range and timestamp origin of a range of fragments. Only fragments with a start timestamp greater than or equal to the given start time and less than or equal to the end time are returned. For example, if a stream contains fragments with the following start timestamps: 00:00:00 00:00:02 00:00:04 00:00:06 A fragment selector range with a start time of 00:00:01 and end time of 00:00:04 would return the fragments with start times of 00:00:02 and 00:00:04."
      type: object
      properties:
        FragmentSelectorType:
          $ref: "#/components/schemas/FragmentSelectorType"
          description: The origin of the timestamps to use (Server or Producer).
        TimestampRange:
          $ref: "#/components/schemas/TimestampRange"
          description: The range of timestamps to return.
      required:
        - FragmentSelectorType
        - TimestampRange
    FragmentSelectorType:
      type: string
      enum:
        - PRODUCER_TIMESTAMP
        - SERVER_TIMESTAMP
    TimestampRange:
      description: The range of timestamps for which to return fragments.
      type: object
      properties:
        StartTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The starting timestamp in the range of timestamps for which to return fragments.
        EndTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The ending timestamp in the range of timestamps for which to return fragments.
      required:
        - StartTimestamp
        - EndTimestamp
    ListFragmentsOutput:
      type: object
      properties:
        Fragments:
          $ref: "#/components/schemas/FragmentList"
          description: A list of archived Fragment objects from the stream that meet the selector criteria. Results are in no specific order, even across pages.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the returned list is truncated, the operation returns this token to use to retrieve the next page of results. This value is null when there are no more results to return.
    FragmentList:
      type: array
      items:
        $ref: "#/components/schemas/Fragment"
    Fragment:
      description: Represents a segment of video or other time-delimited data.
      type: object
      properties:
        FragmentNumber:
          $ref: "#/components/schemas/FragmentNumberString"
          description: The unique identifier of the fragment. This value monotonically increases based on the ingestion order.
        FragmentSizeInBytes:
          $ref: "#/components/schemas/Long"
          description: The total fragment size, including information about the fragment and contained media data.
        ProducerTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp from the producer corresponding to the fragment.
        ServerTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp from the Amazon Web Services server corresponding to the fragment.
        FragmentLengthInMilliseconds:
          $ref: "#/components/schemas/Long"
          description: The playback duration or other time value associated with the fragment.
    Long:
      type: integer
      format: int64
