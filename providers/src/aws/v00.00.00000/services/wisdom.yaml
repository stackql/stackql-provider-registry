components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClientToken:
      type: string
      minLength: 1
      maxLength: 4096
    Description:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9\s_.,-]+
    Name:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9\s_.,-]+
    ServerSideEncryptionConfiguration:
      description: The configuration information for the customer managed key used for encryption.
      type: object
      properties:
        kmsKeyId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The customer managed key used for encryption. For more information about setting up a customer managed key for Wisdom, see Enable Amazon Connect Wisdom for your instance. For information about valid ID values, see Key identifiers (KeyId).
    NonEmptyString:
      type: string
      minLength: 1
      maxLength: 4096
    Tags:
      type: object
      properties: {}
    AssistantType:
      type: string
      enum:
        - AGENT
    CreateAssistantResponse:
      type: object
      properties:
        assistant:
          $ref: "#/components/schemas/AssistantData"
          description: Information about the assistant.
    AssistantData:
      description: The assistant data.
      type: object
      properties:
        assistantArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the Wisdom assistant.
        assistantId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the Wisdom assistant.
        description:
          $ref: "#/components/schemas/Description"
          description: The description.
        integrationConfiguration:
          $ref: "#/components/schemas/AssistantIntegrationConfiguration"
          description: The configuration information for the Wisdom assistant integration.
        name:
          $ref: "#/components/schemas/Name"
          description: The name.
        serverSideEncryptionConfiguration:
          $ref: "#/components/schemas/ServerSideEncryptionConfiguration"
          description: The configuration information for the customer managed key used for encryption. This KMS key must have a policy that allows kms:CreateGrant, kms:DescribeKey, and kms:Decrypt/kms:GenerateDataKey permissions to the IAM identity using the key to invoke Wisdom. To use Wisdom with chat, the key policy must also allow kms:Decrypt, kms:GenerateDataKey*, and kms:DescribeKey permissions to the connect.amazonaws.com service principal. For more information about setting up a customer managed key for Wisdom, see Enable Amazon Connect Wisdom for your instance.
        status:
          $ref: "#/components/schemas/AssistantStatus"
          description: The status of the assistant.
        tags:
          type: object
          properties: {}
          description: The tags used to organize, track, or control access for this resource.
        type_:
          $ref: "#/components/schemas/AssistantType"
          description: The type of assistant.
      required:
        - assistantArn
        - assistantId
        - name
        - status
        - type_
    Arn:
      type: string
      pattern: ^arn:[a-z-]*?:wisdom:[a-z0-9-]*?:[0-9]{12}:[a-z-]*?/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(?:/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})?$
    Uuid:
      type: string
      pattern: ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$
    AssistantIntegrationConfiguration:
      description: The configuration information for the Wisdom assistant integration.
      type: object
      properties:
        topicIntegrationArn:
          $ref: "#/components/schemas/GenericArn"
          description: The Amazon Resource Name (ARN) of the integrated Amazon SNS topic used for streaming chat messages.
    GenericArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:[a-z-]+?:[a-z-]+?:[a-z0-9-]*?:([0-9]{12})?:[a-zA-Z0-9-:/]+$
    AssistantStatus:
      type: string
      enum:
        - CREATE_IN_PROGRESS
        - CREATE_FAILED
        - ACTIVE
        - DELETE_IN_PROGRESS
        - DELETE_FAILED
        - DELETED
    UuidOrArn:
      type: string
      pattern: ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$|^arn:[a-z-]*?:wisdom:[a-z0-9-]*?:[0-9]{12}:[a-z-]*?/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(?:/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})?$
    AssistantAssociationInputData:
      description: The data that is input into Wisdom as a result of the assistant association.
      type: object
      properties:
        knowledgeBaseId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it.
    AssociationType:
      type: string
      enum:
        - KNOWLEDGE_BASE
    CreateAssistantAssociationResponse:
      type: object
      properties:
        assistantAssociation:
          $ref: "#/components/schemas/AssistantAssociationData"
          description: The assistant association.
    AssistantAssociationData:
      description: Information about the assistant association.
      type: object
      properties:
        assistantArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the Wisdom assistant.
        assistantAssociationArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the assistant association.
        assistantAssociationId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the assistant association.
        assistantId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the Wisdom assistant.
        associationData:
          $ref: "#/components/schemas/AssistantAssociationOutputData"
          description: A union type that currently has a single argument, the knowledge base ID.
        associationType:
          $ref: "#/components/schemas/AssociationType"
          description: The type of association.
        tags:
          type: object
          properties: {}
          description: The tags used to organize, track, or control access for this resource.
      required:
        - assistantArn
        - assistantAssociationArn
        - assistantAssociationId
        - assistantId
        - associationData
        - associationType
    AssistantAssociationOutputData:
      description: The data that is output as a result of the assistant association.
      type: object
      properties:
        knowledgeBaseAssociation:
          $ref: "#/components/schemas/KnowledgeBaseAssociationData"
          description: The knowledge base where output data is sent.
    KnowledgeBaseAssociationData:
      description: Association information about the knowledge base.
      type: object
      properties:
        knowledgeBaseArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the knowledge base.
        knowledgeBaseId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it.
    ContentMetadata:
      type: object
      properties: {}
    Uri:
      type: string
      minLength: 1
      maxLength: 4096
    ContentTitle:
      type: string
      minLength: 1
      maxLength: 255
    UploadId:
      type: string
      minLength: 1
      maxLength: 1200
    CreateContentResponse:
      type: object
      properties:
        content:
          $ref: "#/components/schemas/ContentData"
          description: The content.
    ContentData:
      description: Information about the content.
      type: object
      properties:
        contentArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the content.
        contentId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the content.
        contentType:
          $ref: "#/components/schemas/ContentType"
          description: The media type of the content.
        knowledgeBaseArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the knowledge base.
        knowledgeBaseId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it.
        linkOutUri:
          $ref: "#/components/schemas/Uri"
          description: The URI of the content.
        metadata:
          type: object
          properties: {}
          description: A key/value map to store attributes without affecting tagging or recommendations. For example, when synchronizing data between an external system and Wisdom, you can store an external version identifier as metadata to utilize for determining drift.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the content.
        revisionId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the content revision.
        status:
          $ref: "#/components/schemas/ContentStatus"
          description: The status of the content.
        tags:
          type: object
          properties: {}
          description: The tags used to organize, track, or control access for this resource.
        title_:
          $ref: "#/components/schemas/ContentTitle"
          description: The title of the content.
        url:
          $ref: "#/components/schemas/Url"
          description: The URL of the content.
        urlExpiry:
          $ref: "#/components/schemas/SyntheticTimestamp_epoch_seconds"
          description: The expiration time of the URL as an epoch timestamp.
      required:
        - contentArn
        - contentId
        - contentType
        - knowledgeBaseArn
        - knowledgeBaseId
        - metadata
        - name
        - revisionId
        - status
        - title_
        - url
        - urlExpiry
    ContentType:
      type: string
      pattern: ^(text/(plain|html|csv))|(application/(pdf|vnd\.openxmlformats-officedocument\.wordprocessingml\.document))|(application/x\.wisdom-json;source=(salesforce|servicenow|zendesk))$
    ContentStatus:
      type: string
      enum:
        - CREATE_IN_PROGRESS
        - CREATE_FAILED
        - ACTIVE
        - DELETE_IN_PROGRESS
        - DELETE_FAILED
        - DELETED
        - UPDATE_FAILED
    Url:
      type: string
      minLength: 1
      maxLength: 4096
    SyntheticTimestamp_epoch_seconds:
      type: string
      format: date-time
    KnowledgeBaseType:
      type: string
      enum:
        - EXTERNAL
        - CUSTOM
        - QUICK_RESPONSES
    RenderingConfiguration:
      description: Information about how to render the content.
      type: object
      properties:
        templateUri:
          $ref: "#/components/schemas/Uri"
          description: "A URI template containing exactly one variable in ${variableName} format. This can only be set for EXTERNAL knowledge bases. For Salesforce, ServiceNow, and Zendesk, the variable must be one of the following: Salesforce: Id, ArticleNumber, VersionNumber, Title, PublishStatus, or IsDeleted ServiceNow: number, short_description, sys_mod_count, workflow_state, or active Zendesk: id, title, updated_at, or draft The variable is replaced with the actual value for a piece of content when calling GetContent."
