openapi: 3.0.0
info:
  version: "2020-10-19"
  title: Amazon Connect Wisdom Service
  description: Amazon Connect Wisdom Service
  x-serviceName: wisdom
  x-serviceAlias: wisdom
  x-protocol: rest-json
  x-apiVersion: "2020-10-19"
  x-endpointPrefix: wisdom
  x-jsonVersion: "1.1"
servers:
  - url: https://wisdom.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for wisdom
paths:
  /assistants:
    post:
      operationId: CreateAssistant
      description: Creates an Amazon Connect Wisdom assistant.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                description:
                  $ref: "#/components/schemas/Description"
                name:
                  $ref: "#/components/schemas/Name"
                serverSideEncryptionConfiguration:
                  $ref: "#/components/schemas/ServerSideEncryptionConfiguration"
                tags:
                  $ref: "#/components/schemas/Tags"
                type:
                  $ref: "#/components/schemas/AssistantType"
              required:
                - name
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssistantResponse"
    get:
      operationId: ListAssistants
      description: Lists information about assistants.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssistantsResponse"
  /assistants/{assistant_id}/associations:
    post:
      operationId: CreateAssistantAssociation
      description: Creates an association between an Amazon Connect Wisdom assistant and another resource. Currently, the only supported association is with a knowledge base. An assistant can have only a single association.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Wisdom assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                association:
                  $ref: "#/components/schemas/AssistantAssociationInputData"
                associationType:
                  $ref: "#/components/schemas/AssociationType"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - association
                - associationType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssistantAssociationResponse"
    get:
      operationId: ListAssistantAssociations
      description: Lists information about assistant associations.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Wisdom assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssistantAssociationsResponse"
  /knowledgeBases/{knowledge_base_id}/contents:
    post:
      operationId: CreateContent
      description: Creates Wisdom content. Before to calling this API, use StartContentUpload to upload an asset.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN. URLs cannot contain the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/NonEmptyString"
                metadata:
                  $ref: "#/components/schemas/ContentMetadata"
                name:
                  $ref: "#/components/schemas/Name"
                overrideLinkOutUri:
                  $ref: "#/components/schemas/Uri"
                tags:
                  $ref: "#/components/schemas/Tags"
                title:
                  $ref: "#/components/schemas/ContentTitle"
                uploadId:
                  $ref: "#/components/schemas/UploadId"
              required:
                - name
                - uploadId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContentResponse"
    get:
      operationId: ListContents
      description: Lists the content.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContentsResponse"
  /knowledgeBases:
    post:
      operationId: CreateKnowledgeBase
      description: "Creates a knowledge base. When using this API, you cannot reuse Amazon AppIntegrations DataIntegrations with external knowledge bases such as Salesforce and ServiceNow. If you do, you'll get an InvalidRequestException error. For example, you're programmatically managing your external knowledge base, and you want to add or remove one of the fields that is being ingested from Salesforce. Do the following: Call DeleteKnowledgeBase. Call DeleteDataIntegration. Call CreateDataIntegration to recreate the DataIntegration or a create different one. Call CreateKnowledgeBase."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/NonEmptyString"
                description:
                  $ref: "#/components/schemas/Description"
                knowledgeBaseType:
                  $ref: "#/components/schemas/KnowledgeBaseType"
                name:
                  $ref: "#/components/schemas/Name"
                renderingConfiguration:
                  $ref: "#/components/schemas/RenderingConfiguration"
                serverSideEncryptionConfiguration:
                  $ref: "#/components/schemas/ServerSideEncryptionConfiguration"
                sourceConfiguration:
                  $ref: "#/components/schemas/SourceConfiguration"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - knowledgeBaseType
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKnowledgeBaseResponse"
    get:
      operationId: ListKnowledgeBases
      description: Lists the knowledge bases.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKnowledgeBasesResponse"
  /knowledgeBases/{knowledge_base_id}/quickResponses:
    post:
      operationId: CreateQuickResponse
      description: Creates a Wisdom quick response.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN. URLs cannot contain the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channels:
                  $ref: "#/components/schemas/Channels"
                clientToken:
                  $ref: "#/components/schemas/NonEmptyString"
                content:
                  $ref: "#/components/schemas/QuickResponseDataProvider"
                contentType:
                  $ref: "#/components/schemas/QuickResponseType"
                description:
                  $ref: "#/components/schemas/QuickResponseDescription"
                groupingConfiguration:
                  $ref: "#/components/schemas/GroupingConfiguration"
                isActive:
                  $ref: "#/components/schemas/Boolean"
                language:
                  $ref: "#/components/schemas/LanguageCode"
                name:
                  $ref: "#/components/schemas/QuickResponseName"
                shortcutKey:
                  $ref: "#/components/schemas/ShortCutKey"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - content
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQuickResponseResponse"
    get:
      operationId: ListQuickResponses
      description: Lists information about quick response.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQuickResponsesResponse"
  /assistants/{assistant_id}/sessions:
    post:
      operationId: CreateSession
      description: Creates a session. A session is a contextual container used for generating recommendations. Amazon Connect creates a new Wisdom session for each contact on which Wisdom is enabled.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Wisdom assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                description:
                  $ref: "#/components/schemas/Description"
                name:
                  $ref: "#/components/schemas/Name"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
  /assistants/{assistant_id}:
    delete:
      operationId: DeleteAssistant
      description: Deletes an assistant.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Wisdom assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssistantResponse"
    get:
      operationId: GetAssistant
      description: Retrieves information about an assistant.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Wisdom assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
  /assistants/{assistant_id}/associations/{assistant_association_id}:
    delete:
      operationId: DeleteAssistantAssociation
      description: Deletes an assistant association.
      parameters:
        - name: assistant_association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the assistant association. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Wisdom assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssistantAssociationResponse"
    get:
      operationId: GetAssistantAssociation
      description: Retrieves information about an assistant association.
      parameters:
        - name: assistant_association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the assistant association. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Wisdom assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantAssociationResponse"
  /knowledgeBases/{knowledge_base_id}/contents/{content_id}:
    delete:
      operationId: DeleteContent
      description: Deletes the content.
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the content. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteContentResponse"
    get:
      operationId: GetContent
      description: Retrieves content, including a pre-signed URL to download the content.
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the content. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContentResponse"
    post:
      operationId: UpdateContent
      description: Updates information about the content.
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the content. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  $ref: "#/components/schemas/ContentMetadata"
                overrideLinkOutUri:
                  $ref: "#/components/schemas/Uri"
                removeOverrideLinkOutUri:
                  $ref: "#/components/schemas/Boolean"
                revisionId:
                  $ref: "#/components/schemas/NonEmptyString"
                title:
                  $ref: "#/components/schemas/ContentTitle"
                uploadId:
                  $ref: "#/components/schemas/UploadId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateContentResponse"
  /knowledgeBases/{knowledge_base_id}/importJobs/{import_job_id}:
    delete:
      operationId: DeleteImportJob
      description: Deletes the quick response import job.
      parameters:
        - name: import_job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The identifier of the import job to be deleted.
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteImportJobResponse"
    get:
      operationId: GetImportJob
      description: Retrieves the started import job.
      parameters:
        - name: import_job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The identifier of the import job to retrieve.
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base that the import job belongs to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetImportJobResponse"
  /knowledgeBases/{knowledge_base_id}:
    delete:
      operationId: DeleteKnowledgeBase
      description: Deletes the knowledge base. When you use this API to delete an external knowledge base such as Salesforce or ServiceNow, you must also delete the Amazon AppIntegrations DataIntegration. This is because you can't reuse the DataIntegration after it's been associated with an external knowledge base. However, you can delete and recreate it. See DeleteDataIntegration and CreateDataIntegration in the Amazon AppIntegrations API Reference.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The knowledge base to delete content from. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteKnowledgeBaseResponse"
    get:
      operationId: GetKnowledgeBase
      description: Retrieves information about the knowledge base.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetKnowledgeBaseResponse"
  /knowledgeBases/{knowledge_base_id}/quickResponses/{quick_response_id}:
    delete:
      operationId: DeleteQuickResponse
      description: Deletes a quick response.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The knowledge base from which the quick response is deleted. The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it.
        - name: quick_response_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the quick response to delete.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteQuickResponseResponse"
    get:
      operationId: GetQuickResponse
      description: Retrieves the quick response.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should be a QUICK_RESPONSES type knowledge base.
        - name: quick_response_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the quick response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQuickResponseResponse"
    post:
      operationId: UpdateQuickResponse
      description: Updates an existing Wisdom quick response.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: quick_response_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the quick response.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                channels:
                  $ref: "#/components/schemas/Channels"
                content:
                  $ref: "#/components/schemas/QuickResponseDataProvider"
                contentType:
                  $ref: "#/components/schemas/QuickResponseType"
                description:
                  $ref: "#/components/schemas/QuickResponseDescription"
                groupingConfiguration:
                  $ref: "#/components/schemas/GroupingConfiguration"
                isActive:
                  $ref: "#/components/schemas/Boolean"
                language:
                  $ref: "#/components/schemas/LanguageCode"
                name:
                  $ref: "#/components/schemas/QuickResponseName"
                removeDescription:
                  $ref: "#/components/schemas/Boolean"
                removeGroupingConfiguration:
                  $ref: "#/components/schemas/Boolean"
                removeShortcutKey:
                  $ref: "#/components/schemas/Boolean"
                shortcutKey:
                  $ref: "#/components/schemas/ShortCutKey"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateQuickResponseResponse"
  /knowledgeBases/{knowledge_base_id}/contents/{content_id}/summary:
    get:
      operationId: GetContentSummary
      description: Retrieves summary information about the content.
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the content. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base if you're storing Wisdom Content resource to it. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContentSummaryResponse"
  /assistants/{assistant_id}/sessions/{session_id}/recommendations:
    get:
      operationId: GetRecommendations
      description: Retrieves recommendations for the specified session. To avoid retrieving the same recommendations in subsequent calls, use NotifyRecommendationsReceived. This API supports long-polling behavior with the waitTimeSeconds parameter. Short poll is the default behavior and only returns recommendations already available. To perform a manual query against an assistant, use QueryAssistant.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Wisdom assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the session. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: waitTimeSeconds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/WaitTimeSeconds"
          description: The duration (in seconds) for which the call waits for a recommendation to be made available before returning. If a recommendation is available, the call returns sooner than WaitTimeSeconds. If no messages are available and the wait time expires, the call returns successfully with an empty list.
      responses:
        "200":
          description: Success
          content:
            application/json:
