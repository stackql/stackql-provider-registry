        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository that contains the requested packages.
        - name: format
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageFormat"
          description: The format used to filter requested packages. Only packages from the provided format will be returned.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageNamespace"
          description: "The namespace prefix used to filter requested packages. Only packages with a namespace that starts with the provided string value are returned. Note that although this option is called --namespace and not --namespace-prefix, it has prefix-matching behavior. Each package format uses namespace as follows: The namespace of a Maven package version is its groupId. The namespace of an npm or Swift package version is its scope. The namespace of a generic package is its namespace. Python, NuGet, Ruby, and Cargo package versions do not contain a corresponding component, package versions of those formats do not have a namespace."
        - name: package-prefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageName"
          description: A prefix used to filter requested packages. Only packages with names that start with packagePrefix are returned.
        - name: max-results
          in: query
