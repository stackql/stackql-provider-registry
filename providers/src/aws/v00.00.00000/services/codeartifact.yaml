  /v1/package/version/publish:
    post:
      operationId: PublishPackageVersion
      description: Creates a new package version containing one or more assets (or files). The unfinished flag can be used to keep the package version in the Unfinished state until all of its assets have been uploaded (see Package version status in the CodeArtifact user guide). To set the package version’s status to Published, omit the unfinished flag when uploading the final asset, or set the status using UpdatePackageVersionStatus. Once a package version’s status is set to Published, it cannot change back to Unfinished. Only generic packages can be published using this API. For more information, see Using generic packages in the CodeArtifact User Guide.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the repository that contains the package version to publish.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the AWS account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository that the package version will be published to.
        - name: format
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageFormat"
          description: A format that specifies the type of the package version with the requested asset file. The only supported value is generic.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageNamespace"
          description: The namespace of the package version to publish.
        - name: package
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageName"
          description: The name of the package version to publish.
        - name: version
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageVersion"
          description: The package version to publish (for example, 3.5.2).
        - name: asset
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AssetName"
          description: "The name of the asset to publish. Asset names can include Unicode letters and numbers, and the following special characters: ~ ! @ ^ & ( ) - ` _ + [ ] { } ; , . `"
        - name: x-amz-content-sha256
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/SHA256"
          description: The SHA256 hash of the assetContent to publish. This value must be calculated by the caller and provided with the request (see Publishing a generic package in the CodeArtifact User Guide). This value is used as an integrity check to verify that the assetContent has not changed after it was originally sent.
        - name: unfinished
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether the package version should remain in the unfinished state. If omitted, the package version status will be set to Published (see Package version status in the CodeArtifact User Guide). Valid values: unfinished"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assetContent:
                  $ref: "#/components/schemas/Asset"
              required:
                - assetContent
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishPackageVersionResult"
  /v1/tag:
