openapi: 3.0.0
info:
  version: "2018-09-22"
  title: CodeArtifact
  description: CodeArtifact
  x-serviceName: codeartifact
  x-serviceAlias: codeartifact
  x-protocol: rest-json
  x-apiVersion: "2018-09-22"
  x-endpointPrefix: codeartifact
  x-jsonVersion: "1.1"
servers:
  - url: https://codeartifact.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codeartifact
paths:
  /v1/repository/external-connection:
    post:
      operationId: AssociateExternalConnection
      description: Adds an existing external connection to a repository. One external connection is allowed per repository. A repository can have one or more upstream repositories, or an external connection.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the repository.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository to which the external connection is added.
        - name: external-connection
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ExternalConnectionName"
          description: "The name of the external connection to add to the repository. The following values are supported: public:npmjs - for the npm public repository. public:nuget-org - for the NuGet Gallery. public:pypi - for the Python Package Index. public:maven-central - for Maven Central. public:maven-googleandroid - for the Google Android repository. public:maven-gradleplugins - for the Gradle plugins repository. public:maven-commonsware - for the CommonsWare Android repository. public:maven-clojars - for the Clojars repository. public:ruby-gems-org - for RubyGems.org. public:crates-io - for Crates.io."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateExternalConnectionResult"
    delete:
      operationId: DisassociateExternalConnection
      description: Removes an existing external connection from a repository.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the repository from which to remove the external repository.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository from which the external connection will be removed.
        - name: external-connection
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ExternalConnectionName"
          description: The name of the external connection to be removed from the repository.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateExternalConnectionResult"
  /v1/package/versions/copy:
    post:
      operationId: CopyPackageVersions
      description: Copies package versions from one repository to another repository in the same domain. You must specify versions or versionRevisions. You cannot specify both.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the source and destination repositories.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: source-repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository that contains the package versions to be copied.
        - name: destination-repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository into which package versions are copied.
        - name: format
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageFormat"
          description: The format of the package versions to be copied.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageNamespace"
          description: "The namespace of the package versions to be copied. The package component that specifies its namespace depends on its type. For example: The namespace is required when copying package versions of the following formats: Maven Swift generic The namespace of a Maven package version is its groupId. The namespace of an npm or Swift package version is its scope. The namespace of a generic package is its namespace. Python, NuGet, Ruby, and Cargo package versions do not contain a corresponding component, package versions of those formats do not have a namespace."
        - name: package
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageName"
          description: The name of the package that contains the versions to be copied.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                versions:
                  $ref: "#/components/schemas/PackageVersionList"
                versionRevisions:
                  $ref: "#/components/schemas/PackageVersionRevisionMap"
                allowOverwrite:
                  $ref: "#/components/schemas/BooleanOptional"
                includeFromUpstream:
                  $ref: "#/components/schemas/BooleanOptional"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyPackageVersionsResult"
  /v1/domain:
    post:
      operationId: CreateDomain
      description: Creates a domain. CodeArtifact domains make it easier to manage multiple repositories across an organization. You can use a domain to apply permissions across many repositories owned by different Amazon Web Services accounts. An asset is stored only once in a domain, even if it's in multiple repositories. Although you can have multiple domains, we recommend a single production domain that contains all published artifacts so that your development teams can find and share packages. You can use a second pre-production domain to test changes to the production domain configuration.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain to create. All domain names in an Amazon Web Services Region that are in the same Amazon Web Services account must be unique. The domain name is used as the prefix in DNS hostnames. Do not use sensitive information in a domain name because it is publicly discoverable.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                encryptionKey:
                  $ref: "#/components/schemas/Arn"
                tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDomainResult"
    delete:
      operationId: DeleteDomain
      description: Deletes a domain. You cannot delete a domain that contains repositories. If you want to delete a domain with repositories, first delete its repositories.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain to delete.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDomainResult"
    get:
      operationId: DescribeDomain
      description: Returns a DomainDescription object that contains information about the requested domain.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: A string that specifies the name of the requested domain.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDomainResult"
  /v1/package-group:
    post:
      operationId: CreatePackageGroup
      description: Creates a package group. For more information about creating package groups, including example CLI commands, see Create a package group in the CodeArtifact User Guide.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain in which you want to create a package group.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                packageGroup:
                  $ref: "#/components/schemas/PackageGroupPattern"
                contactInfo:
                  $ref: "#/components/schemas/PackageGroupContactInfo"
                description:
                  $ref: "#/components/schemas/Description"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - packageGroup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePackageGroupResult"
    delete:
      operationId: DeletePackageGroup
      description: Deletes a package group. Deleting a package group does not delete packages or package versions associated with the package group. When a package group is deleted, the direct child package groups will become children of the package group's direct parent package group. Therefore, if any of the child groups are inheriting any settings from the parent, those settings could change.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The domain that contains the package group to be deleted.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: package-group
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The pattern of the package group to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePackageGroupResult"
    get:
      operationId: DescribePackageGroup
      description: Returns a PackageGroupDescription object that contains information about the requested package group.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the package group.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: package-group
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageGroupPattern"
          description: The pattern of the requested package group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePackageGroupResult"
    put:
      operationId: UpdatePackageGroup
      description: Updates a package group. This API cannot be used to update a package group's origin configuration or pattern. To update a package group's origin configuration, use UpdatePackageGroupOriginConfiguration.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain which contains the package group to be updated.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                packageGroup:
                  $ref: "#/components/schemas/PackageGroupPattern"
                contactInfo:
                  $ref: "#/components/schemas/PackageGroupContactInfo"
                description:
                  $ref: "#/components/schemas/Description"
              required:
                - packageGroup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePackageGroupResult"
  /v1/repository:
    post:
      operationId: CreateRepository
      description: Creates a repository.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the created repository.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository to create.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                upstreams:
                  $ref: "#/components/schemas/UpstreamRepositoryList"
                tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRepositoryResult"
    delete:
      operationId: DeleteRepository
      description: Deletes a repository.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the repository to delete.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRepositoryResult"
    get:
      operationId: DescribeRepository
      description: Returns a RepositoryDescription object that contains detailed information about the requested repository.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the repository to describe.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: A string that specifies the name of the requested repository.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRepositoryResult"
    put:
      operationId: UpdateRepository
      description: Update the properties of a repository.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain associated with the repository to update.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                upstreams:
                  $ref: "#/components/schemas/UpstreamRepositoryList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRepositoryResult"
  /v1/domain/permissions/policy:
    delete:
      operationId: DeleteDomainPermissionsPolicy
      description: Deletes the resource policy set on a domain.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain associated with the resource policy to be deleted.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: policy-revision
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PolicyRevision"
          description: The current revision of the resource policy to be deleted. This revision is used for optimistic locking, which prevents others from overwriting your changes to the domain's resource policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDomainPermissionsPolicyResult"
    get:
      operationId: GetDomainPermissionsPolicy
      description: Returns the resource policy attached to the specified domain. The policy is a resource-based policy, not an identity-based policy. For more information, see Identity-based policies and resource-based policies in the IAM User Guide.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain to which the resource policy is attached.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDomainPermissionsPolicyResult"
    put:
      operationId: PutDomainPermissionsPolicy
      description: Sets a resource policy on a domain that specifies permissions to access it. When you call PutDomainPermissionsPolicy, the resource policy on the domain is ignored when evaluting permissions. This ensures that the owner of a domain cannot lock themselves out of the domain, which would prevent them from being able to update the resource policy.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  $ref: "#/components/schemas/DomainName"
                domainOwner:
                  $ref: "#/components/schemas/AccountId"
                policyRevision:
                  $ref: "#/components/schemas/PolicyRevision"
                policyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
              required:
                - domain
                - policyDocument
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutDomainPermissionsPolicyResult"
  /v1/package:
    delete:
      operationId: DeletePackage
      description: Deletes a package and all associated package versions. A deleted package cannot be restored. To delete one or more package versions, use the DeletePackageVersions API.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the package to delete.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository that contains the package to delete.
        - name: format
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageFormat"
          description: The format of the requested package to delete.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageNamespace"
          description: "The namespace of the package to delete. The package component that specifies its namespace depends on its type. For example: The namespace is required when deleting packages of the following formats: Maven Swift generic The namespace of a Maven package version is its groupId. The namespace of an npm or Swift package version is its scope. The namespace of a generic package is its namespace. Python, NuGet, Ruby, and Cargo package versions do not contain a corresponding component, package versions of those formats do not have a namespace."
        - name: package
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageName"
          description: The name of the package to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePackageResult"
    get:
      operationId: DescribePackage
      description: Returns a PackageDescription object that contains information about the requested package.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the repository that contains the package.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository that contains the requested package.
        - name: format
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageFormat"
          description: A format that specifies the type of the requested package.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageNamespace"
          description: "The namespace of the requested package. The package component that specifies its namespace depends on its type. For example: The namespace is required when requesting packages of the following formats: Maven Swift generic The namespace of a Maven package version is its groupId. The namespace of an npm or Swift package version is its scope. The namespace of a generic package is its namespace. Python, NuGet, Ruby, and Cargo package versions do not contain a corresponding component, package versions of those formats do not have a namespace."
        - name: package
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageName"
          description: The name of the requested package.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePackageResult"
    post:
      operationId: PutPackageOriginConfiguration
      description: Sets the package origin configuration for a package. The package origin configuration determines how new versions of a package can be added to a repository. You can allow or block direct publishing of new package versions, or ingestion and retaining of new package versions from an external connection or upstream source. For more information about package origin controls and configuration, see Editing package origin controls in the CodeArtifact User Guide. PutPackageOriginConfiguration can be called on a package that doesn't yet exist in the repository. When called on a package that does not exist, a package is created in the repository with no versions and the requested restrictions are set on the package. This can be used to preemptively block ingesting or retaining any versions from external connections or upstream repositories, or to block publishing any versions of the package into the repository before connecting any package managers or publishers to the repository.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the repository that contains the package.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository that contains the package.
        - name: format
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageFormat"
          description: A format that specifies the type of the package to be updated.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageNamespace"
          description: "The namespace of the package to be updated. The package component that specifies its namespace depends on its type. For example: The namespace of a Maven package version is its groupId. The namespace of an npm or Swift package version is its scope. The namespace of a generic package is its namespace. Python, NuGet, Ruby, and Cargo package versions do not contain a corresponding component, package versions of those formats do not have a namespace."
        - name: package
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageName"
          description: The name of the package to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                restrictions:
                  $ref: "#/components/schemas/PackageOriginRestrictions"
              required:
                - restrictions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutPackageOriginConfigurationResult"
  /v1/package/versions/delete:
    post:
      operationId: DeletePackageVersions
      description: Deletes one or more versions of a package. A deleted package version cannot be restored in your repository. If you want to remove a package version from your repository and be able to restore it later, set its status to Archived. Archived packages cannot be downloaded from a repository and don't show up with list package APIs (for example, ListPackageVersions), but you can restore them using UpdatePackageVersionsStatus.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the package to delete.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository that contains the package versions to delete.
