                $ref: "#/components/schemas/UntagResourceResult"
  /v1/package-group-origin-configuration:
    put:
      operationId: UpdatePackageGroupOriginConfiguration
      description: Updates the package origin configuration for a package group. The package origin configuration determines how new versions of a package can be added to a repository. You can allow or block direct publishing of new package versions, or ingestion and retaining of new package versions from an external connection or upstream source. For more information about package group origin controls and configuration, see Package group origin controls in the CodeArtifact User Guide.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain which contains the package group for which to update the origin configuration.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: package-group
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageGroupPattern"
          description: The pattern of the package group for which to update the origin configuration.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                restrictions:
                  $ref: "#/components/schemas/OriginRestrictions"
                addAllowedRepositories:
                  $ref: "#/components/schemas/PackageGroupAllowedRepositoryList"
                removeAllowedRepositories:
                  $ref: "#/components/schemas/PackageGroupAllowedRepositoryList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePackageGroupOriginConfigurationResult"
  /v1/package/versions/update_status:
    post:
      operationId: UpdatePackageVersionsStatus
      description: Updates the status of one or more versions of a package. Using UpdatePackageVersionsStatus, you can update the status of package versions to Archived, Published, or Unlisted. To set the status of a package version to Disposed, use DisposePackageVersions.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the repository that contains the package versions with a status to be updated.
        - name: domain-owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain. It does not include dashes or spaces.
        - name: repository
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryName"
          description: The repository that contains the package versions with the status you want to update.
        - name: format
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageFormat"
          description: A format that specifies the type of the package with the statuses to update.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageNamespace"
          description: "The namespace of the package version to be updated. The package component that specifies its namespace depends on its type. For example: The namespace of a Maven package version is its groupId. The namespace of an npm or Swift package version is its scope. The namespace of a generic package is its namespace. Python, NuGet, Ruby, and Cargo package versions do not contain a corresponding component, package versions of those formats do not have a namespace."
        - name: package
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PackageName"
          description: The name of the package with the version statuses to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                versions:
                  $ref: "#/components/schemas/PackageVersionList"
                versionRevisions:
                  $ref: "#/components/schemas/PackageVersionRevisionMap"
                expectedStatus:
                  $ref: "#/components/schemas/PackageVersionStatus"
                targetStatus:
                  $ref: "#/components/schemas/PackageVersionStatus"
              required:
                - versions
                - targetStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePackageVersionsStatusResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DomainName:
      type: string
      minLength: 2
      maxLength: 50
      pattern: "[a-z][a-z0-9\\-]{0,48}[a-z0-9]"
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    RepositoryName:
      type: string
      minLength: 2
      maxLength: 100
      pattern: "[A-Za-z0-9][A-Za-z0-9._\\-]{1,99}"
    ExternalConnectionName:
      type: string
      minLength: 2
      maxLength: 100
      pattern: "[A-Za-z0-9][A-Za-z0-9._\\-:]{1,99}"
    AssociateExternalConnectionResult:
      type: object
      properties:
        repository:
          $ref: "#/components/schemas/RepositoryDescription"
          description: Information about the connected repository after processing the request.
    RepositoryDescription:
      description: The details of a repository stored in CodeArtifact. A CodeArtifact repository contains a set of package versions, each of which maps to a set of assets. Repositories are polyglot—a single repository can contain packages of any supported type. Each repository exposes endpoints for fetching and publishing packages using tools like the npm CLI, the Maven CLI (mvn), and pip. You can create up to 100 repositories per Amazon Web Services account.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository.
        administratorAccount:
          $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that manages the repository.
        domainName:
          $ref: "#/components/schemas/DomainName"
          description: The name of the domain that contains the repository.
        domainOwner:
          $ref: "#/components/schemas/AccountId"
          description: The 12-digit account number of the Amazon Web Services account that owns the domain that contains the repository. It does not include dashes or spaces.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the repository.
        description:
          $ref: "#/components/schemas/Description"
          description: A text description of the repository.
        upstreams:
          $ref: "#/components/schemas/UpstreamRepositoryInfoList"
          description: A list of upstream repositories to associate with the repository. The order of the upstream repositories in the list determines their priority order when CodeArtifact looks for a requested package version. For more information, see Working with upstream repositories.
        externalConnections:
          $ref: "#/components/schemas/RepositoryExternalConnectionInfoList"
          description: An array of external connections associated with the repository.
        createdTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that represents the date and time the repository was created.
    Arn:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: \S+
    Description:
      type: string
      maxLength: 1000
      pattern: \P{C}*
    UpstreamRepositoryInfoList:
      type: array
      items:
