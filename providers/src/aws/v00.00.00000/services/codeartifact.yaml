          description: The format of the package from which to get the associated package group.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageNamespace"
          description: "The namespace of the package from which to get the associated package group. The package component that specifies its namespace depends on its type. For example: The namespace is required when getting associated package groups from packages of the following formats: Maven Swift generic The namespace of a Maven package version is its groupId. The namespace of an npm or Swift package version is its scope. The namespace of a generic package is its namespace. Python, NuGet, Ruby, and Cargo package versions do not contain a corresponding component, package versions of those formats do not have a namespace."
