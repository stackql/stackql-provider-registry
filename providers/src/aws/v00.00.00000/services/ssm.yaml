  /RegisterTargetWithMaintenanceWindow:
    post:
      operationId: RegisterTargetWithMaintenanceWindow
      description: Registers a target with a maintenance window.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.RegisterTargetWithMaintenanceWindow
            default: AmazonSSM.RegisterTargetWithMaintenanceWindow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WindowId:
                  $ref: "#/components/schemas/MaintenanceWindowId"
                  description: The ID of the maintenance window the target should be registered with.
                ResourceType:
                  $ref: "#/components/schemas/MaintenanceWindowResourceType"
                  description: The type of target being registered with the maintenance window.
                Targets:
                  $ref: "#/components/schemas/Targets"
                  description: "The targets to register with the maintenance window. In other words, the managed nodes to run commands on when the maintenance window runs. If a single maintenance window task is registered with multiple targets, its task invocations occur sequentially and not in parallel. If your task must run on multiple targets at the same time, register a task for each target individually and assign each task the same priority level. You can specify targets using managed node IDs, resource group names, or tags that have been applied to managed nodes. Example 1: Specify managed node IDs Key=InstanceIds,Values=`<instance-id-1>`,`<instance-id-2>`,`<instance-id-3>` Example 2: Use tag key-pairs applied to managed nodes Key=tag:`<my-tag-key>`,Values=`<my-tag-value-1>`,`<my-tag-value-2>` Example 3: Use tag-keys applied to managed nodes Key=tag-key,Values=`<my-tag-key-1>`,`<my-tag-key-2>` Example 4: Use resource group names Key=resource-groups:Name,Values=`<resource-group-name>` Example 5: Use filters for resource group types Key=resource-groups:ResourceTypeFilters,Values=`<resource-type-1>`,`<resource-type-2>` For Key=resource-groups:ResourceTypeFilters, specify resource types in the following format Key=resource-groups:ResourceTypeFilters,Values=AWS::EC2::INSTANCE,AWS::EC2::VPC For more information about these examples formats, including the best use case for each one, see Examples: Register targets with a maintenance window in the Amazon Web Services Systems Manager User Guide."
                OwnerInformation:
                  $ref: "#/components/schemas/OwnerInformation"
                  description: User-provided value that will be included in any Amazon CloudWatch Events events raised while running tasks for these targets in this maintenance window.
                Name:
                  $ref: "#/components/schemas/MaintenanceWindowName"
                  description: An optional name for the target.
                Description:
                  $ref: "#/components/schemas/MaintenanceWindowDescription"
                  description: An optional description for the target.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: User-provided idempotency token.
              required:
                - WindowId
                - ResourceType
                - Targets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterTargetWithMaintenanceWindowResult"
  /RegisterTaskWithMaintenanceWindow:
    post:
      operationId: RegisterTaskWithMaintenanceWindow
      description: Adds a new task to a maintenance window.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.RegisterTaskWithMaintenanceWindow
            default: AmazonSSM.RegisterTaskWithMaintenanceWindow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WindowId:
                  $ref: "#/components/schemas/MaintenanceWindowId"
                  description: The ID of the maintenance window the task should be added to.
                Targets:
                  $ref: "#/components/schemas/Targets"
                  description: "The targets (either managed nodes or maintenance window targets). One or more targets must be specified for maintenance window Run Command-type tasks. Depending on the task, targets are optional for other maintenance window task types (Automation, Lambda, and Step Functions). For more information about running tasks that don't specify targets, see Registering maintenance window tasks without targets in the Amazon Web Services Systems Manager User Guide. Specify managed nodes using the following format: Key=InstanceIds,Values=`<instance-id-1>`,`<instance-id-2>` Specify maintenance window targets using the following format: Key=WindowTargetIds,Values=`<window-target-id-1>`,`<window-target-id-2>`"
                TaskArn:
                  $ref: "#/components/schemas/MaintenanceWindowTaskArn"
                  description: The ARN of the task to run.
                ServiceRoleArn:
                  $ref: "#/components/schemas/ServiceRole"
                  description: The Amazon Resource Name (ARN) of the IAM service role for Amazon Web Services Systems Manager to assume when running a maintenance window task. If you do not specify a service role ARN, Systems Manager uses a service-linked role in your account. If no appropriate service-linked role for Systems Manager exists in your account, it is created when you run RegisterTaskWithMaintenanceWindow. However, for an improved security posture, we strongly recommend creating a custom policy and custom service role for running your maintenance window tasks. The policy can be crafted to provide only the permissions needed for your particular maintenance window tasks. For more information, see Setting up Maintenance Windows in the in the Amazon Web Services Systems Manager User Guide.
                TaskType:
                  $ref: "#/components/schemas/MaintenanceWindowTaskType"
                  description: The type of task being registered.
                TaskParameters:
                  $ref: "#/components/schemas/MaintenanceWindowTaskParameters"
                  description: The parameters that should be passed to the task when it is run. TaskParameters has been deprecated. To specify parameters to pass to a task when it runs, instead use the Parameters option in the TaskInvocationParameters structure. For information about how Systems Manager handles these options for the supported maintenance window task types, see MaintenanceWindowTaskInvocationParameters.
                TaskInvocationParameters:
                  $ref: "#/components/schemas/MaintenanceWindowTaskInvocationParameters"
                  description: The parameters that the task should use during execution. Populate only the fields that match the task type. All other fields should be empty.
                Priority:
                  $ref: "#/components/schemas/MaintenanceWindowTaskPriority"
                  description: The priority of the task in the maintenance window, the lower the number the higher the priority. Tasks in a maintenance window are scheduled in priority order with tasks that have the same priority scheduled in parallel.
                MaxConcurrency:
                  $ref: "#/components/schemas/MaxConcurrency"
                  description: "The maximum number of targets this task can be run for, in parallel. Although this element is listed as \"Required: No\", a value can be omitted only when you are registering or updating a targetless task You must provide a value in all other cases. For maintenance window tasks without a target specified, you can't supply a value for this option. Instead, the system inserts a placeholder value of 1. This value doesn't affect the running of your task."
                MaxErrors:
                  $ref: "#/components/schemas/MaxErrors"
                  description: "The maximum number of errors allowed before this task stops being scheduled. Although this element is listed as \"Required: No\", a value can be omitted only when you are registering or updating a targetless task You must provide a value in all other cases. For maintenance window tasks without a target specified, you can't supply a value for this option. Instead, the system inserts a placeholder value of 1. This value doesn't affect the running of your task."
                LoggingInfo:
                  $ref: "#/components/schemas/LoggingInfo"
                  description: A structure containing information about an Amazon Simple Storage Service (Amazon S3) bucket to write managed node-level logs to. LoggingInfo has been deprecated. To specify an Amazon Simple Storage Service (Amazon S3) bucket to contain logs, instead use the OutputS3BucketName and OutputS3KeyPrefix options in the TaskInvocationParameters structure. For information about how Amazon Web Services Systems Manager handles these options for the supported maintenance window task types, see MaintenanceWindowTaskInvocationParameters.
                Name:
                  $ref: "#/components/schemas/MaintenanceWindowName"
                  description: An optional name for the task.
                Description:
                  $ref: "#/components/schemas/MaintenanceWindowDescription"
                  description: An optional description for the task.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: User-provided idempotency token.
                CutoffBehavior:
                  $ref: "#/components/schemas/MaintenanceWindowTaskCutoffBehavior"
                  description: "Indicates whether tasks should continue to run after the cutoff time specified in the maintenance windows is reached. CONTINUE_TASK: When the cutoff time is reached, any tasks that are running continue. The default value. CANCEL_TASK: For Automation, Lambda, Step Functions tasks: When the cutoff time is reached, any task invocations that are already running continue, but no new task invocations are started. For Run Command tasks: When the cutoff time is reached, the system sends a CancelCommand operation that attempts to cancel the command associated with the task. However, there is no guarantee that the command will be terminated and the underlying process stopped. The status for tasks that are not completed is TIMED_OUT."
                AlarmConfiguration:
                  $ref: "#/components/schemas/AlarmConfiguration"
                  description: The CloudWatch alarm you want to apply to your maintenance window task.
              required:
                - WindowId
                - TaskArn
                - TaskType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterTaskWithMaintenanceWindowResult"
  /RemoveTagsFromResource:
    post:
      operationId: RemoveTagsFromResource
      description: Removes tag keys from the specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
