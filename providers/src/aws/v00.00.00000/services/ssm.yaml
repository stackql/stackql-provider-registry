          description: The details for the CloudWatch alarm applied to your command.
        TriggeredAlarms:
          $ref: "#/components/schemas/AlarmStateInformationList"
          description: The CloudWatch alarm that was invoked by the command.
    CommandStatus:
      type: string
      enum:
