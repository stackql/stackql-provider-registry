          description: The name of the filter.
        Values:
          $ref: "#/components/schemas/ComplianceStringFilterValueList"
          description: The value for which to search.
        Type:
          $ref: "#/components/schemas/ComplianceQueryOperatorType"
          description: "The type of comparison that should be performed for the value: Equal, NotEqual, BeginWith, LessThan, or GreaterThan."
    ComplianceStringFilterKey:
      type: string
      minLength: 1
      maxLength: 200
    ComplianceStringFilterValueList:
      type: array
      items:
        $ref: "#/components/schemas/ComplianceFilterValue"
    ComplianceFilterValue:
      type: string
    ComplianceQueryOperatorType:
      type: string
      enum:
        - EQUAL
        - NOT_EQUAL
        - BEGIN_WITH
        - LESS_THAN
        - GREATER_THAN
    ComplianceResourceIdList:
      type: array
      items:
        $ref: "#/components/schemas/ComplianceResourceId"
    ComplianceResourceId:
      type: string
      minLength: 1
      maxLength: 100
    ComplianceResourceTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ComplianceResourceType"
    ComplianceResourceType:
      type: string
      minLength: 1
      maxLength: 50
    ListComplianceItemsResult:
      type: object
      properties:
        ComplianceItems:
          $ref: "#/components/schemas/ComplianceItemList"
          description: A list of compliance information for the specified resource ID.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token for the next set of items to return. Use this token to get the next set of results.
    ComplianceItemList:
      type: array
      items:
        $ref: "#/components/schemas/ComplianceItem"
    ComplianceItem:
      description: Information about the compliance as defined by the resource type. For example, for a patch resource type, Items includes information about the PatchSeverity, Classification, and so on.
      type: object
      properties:
        ComplianceType:
          $ref: "#/components/schemas/ComplianceTypeName"
          description: The compliance type. For example, Association (for a State Manager association), Patch, or Custom:string are all valid compliance types.
        ResourceType:
          $ref: "#/components/schemas/ComplianceResourceType"
          description: The type of resource. ManagedInstance is currently the only supported resource type.
        ResourceId:
          $ref: "#/components/schemas/ComplianceResourceId"
          description: An ID for the resource. For a managed node, this is the node ID.
        Id:
          $ref: "#/components/schemas/ComplianceItemId"
          description: "An ID for the compliance item. For example, if the compliance item is a Windows patch, the ID could be the number of the KB article; for example: KB4010320."
        Title:
          $ref: "#/components/schemas/ComplianceItemTitle"
          description: "A title for the compliance item. For example, if the compliance item is a Windows patch, the title could be the title of the KB article for the patch; for example: Security Update for Active Directory Federation Services."
        Status:
          $ref: "#/components/schemas/ComplianceStatus"
          description: The status of the compliance item. An item is either COMPLIANT, NON_COMPLIANT, or an empty string (for Windows patches that aren't applicable).
        Severity:
          $ref: "#/components/schemas/ComplianceSeverity"
          description: "The severity of the compliance status. Severity can be one of the following: Critical, High, Medium, Low, Informational, Unspecified."
        ExecutionSummary:
          $ref: "#/components/schemas/ComplianceExecutionSummary"
          description: A summary for the compliance item. The summary includes an execution ID, the execution type (for example, command), and the execution time. For State Manager associations, the ExecutionTime value represents when the compliance status was captured and aggregated by the Systems Manager service, not necessarily when the underlying association was executed on the managed node. State Manager updates compliance status for all associations on an instance whenever any association executes, which means multiple associations may show the same execution time even if they were executed at different times.
        Details:
          type: object
          properties: {}
          description: 'A "Key": "Value" tag combination for the compliance item.'
    ComplianceTypeName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[A-Za-z0-9_\\-]\\w+|Custom:[a-zA-Z0-9_\\-]\\w+"
    ComplianceItemId:
      type: string
    ComplianceItemTitle:
      type: string
      maxLength: 500
    ComplianceStatus:
      type: string
      enum:
        - COMPLIANT
        - NON_COMPLIANT
    ComplianceSeverity:
      type: string
      enum:
        - CRITICAL
        - HIGH
        - MEDIUM
        - LOW
        - INFORMATIONAL
        - UNSPECIFIED
    ComplianceExecutionSummary:
      description: "A summary of the call execution that includes an execution ID, the type of execution (for example, Command), and the date/time of the execution using a datetime object that is saved in the following format: yyyy-MM-dd'T'HH:mm:ss'Z'"
      type: object
      properties:
        ExecutionTime:
          $ref: "#/components/schemas/DateTime"
          description: "The time the execution ran as a datetime object that is saved in the following format: yyyy-MM-dd'T'HH:mm:ss'Z' For State Manager associations, this timestamp represents when the compliance status was captured and reported by the Systems Manager service, not when the underlying association was actually executed on the managed node. To track actual association execution times, use the DescribeAssociationExecutionTargets command or check the association execution history in the Systems Manager console."
        ExecutionId:
          $ref: "#/components/schemas/ComplianceExecutionId"
          description: An ID created by the system when PutComplianceItems was called. For example, CommandID is a valid execution ID. You can use this ID in subsequent calls.
        ExecutionType:
          $ref: "#/components/schemas/ComplianceExecutionType"
          description: The type of execution. For example, Command is a valid execution type.
      required:
        - ExecutionTime
    ComplianceExecutionId:
      type: string
      maxLength: 100
    ComplianceExecutionType:
      type: string
      maxLength: 50
    ListComplianceSummariesResult:
      type: object
      properties:
        ComplianceSummaryItems:
          $ref: "#/components/schemas/ComplianceSummaryItemList"
          description: A list of compliant and non-compliant summary counts based on compliance types. For example, this call returns State Manager associations, patches, or custom compliance types according to the filter criteria that you specified.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token for the next set of items to return. Use this token to get the next set of results.
    ComplianceSummaryItemList:
      type: array
      items:
        $ref: "#/components/schemas/ComplianceSummaryItem"
    ComplianceSummaryItem:
      description: A summary of compliance information by compliance type.
      type: object
      properties:
        ComplianceType:
          $ref: "#/components/schemas/ComplianceTypeName"
          description: The type of compliance item. For example, the compliance type can be Association, Patch, or Custom:string.
        CompliantSummary:
          $ref: "#/components/schemas/CompliantSummary"
          description: A list of COMPLIANT items for the specified compliance type.
        NonCompliantSummary:
          $ref: "#/components/schemas/NonCompliantSummary"
          description: A list of NON_COMPLIANT items for the specified compliance type.
    CompliantSummary:
      description: A summary of resources that are compliant. The summary is organized according to the resource count for each compliance type.
      type: object
      properties:
        CompliantCount:
          $ref: "#/components/schemas/ComplianceSummaryCount"
          description: The total number of resources that are compliant.
        SeveritySummary:
          $ref: "#/components/schemas/SeveritySummary"
          description: A summary of the compliance severity by compliance type.
    ComplianceSummaryCount:
      type: integer
    SeveritySummary:
      description: The number of managed nodes found for each patch severity level defined in the request filter.
      type: object
      properties:
        CriticalCount:
          $ref: "#/components/schemas/ComplianceSummaryCount"
          description: The total number of resources or compliance items that have a severity level of Critical. Critical severity is determined by the organization that published the compliance items.
        HighCount:
          $ref: "#/components/schemas/ComplianceSummaryCount"
          description: The total number of resources or compliance items that have a severity level of high. High severity is determined by the organization that published the compliance items.
        MediumCount:
          $ref: "#/components/schemas/ComplianceSummaryCount"
          description: The total number of resources or compliance items that have a severity level of medium. Medium severity is determined by the organization that published the compliance items.
        LowCount:
          $ref: "#/components/schemas/ComplianceSummaryCount"
          description: The total number of resources or compliance items that have a severity level of low. Low severity is determined by the organization that published the compliance items.
        InformationalCount:
          $ref: "#/components/schemas/ComplianceSummaryCount"
          description: The total number of resources or compliance items that have a severity level of informational. Informational severity is determined by the organization that published the compliance items.
        UnspecifiedCount:
          $ref: "#/components/schemas/ComplianceSummaryCount"
          description: The total number of resources or compliance items that have a severity level of unspecified. Unspecified severity is determined by the organization that published the compliance items.
    NonCompliantSummary:
      description: A summary of resources that aren't compliant. The summary is organized according to resource type.
      type: object
      properties:
        NonCompliantCount:
          $ref: "#/components/schemas/ComplianceSummaryCount"
          description: The total number of compliance items that aren't compliant.
        SeveritySummary:
          $ref: "#/components/schemas/SeveritySummary"
          description: A summary of the non-compliance severity by compliance type
    DocumentMetadataEnum:
      type: string
      enum:
        - DocumentReviews
    ListDocumentMetadataHistoryResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DocumentName"
          description: The name of the change template.
        DocumentVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The version of the change template.
        Author:
          $ref: "#/components/schemas/DocumentAuthor"
          description: The user ID of the person in the organization who requested the review of the change template.
        Metadata:
          $ref: "#/components/schemas/DocumentMetadataResponseInfo"
          description: Information about the response to the change template approval request.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
    DocumentMetadataResponseInfo:
      description: Details about the response to a document review request.
      type: object
      properties:
        ReviewerResponse:
          $ref: "#/components/schemas/DocumentReviewerResponseList"
          description: Details about a reviewer's response to a document review request.
    DocumentReviewerResponseList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentReviewerResponseSource"
    DocumentReviewerResponseSource:
      description: Information about a reviewer's response to a document review request.
      type: object
      properties:
        CreateTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time that a reviewer entered a response to a document review request.
        UpdatedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time that a reviewer last updated a response to a document review request.
        ReviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
          description: The current review status of a new custom SSM document created by a member of your organization, or of the latest version of an existing SSM document. Only one version of a document can be in the APPROVED state at a time. When a new version is approved, the status of the previous version changes to REJECTED. Only one version of a document can be in review, or PENDING, at a time.
        Comment:
          $ref: "#/components/schemas/DocumentReviewCommentList"
          description: The comment entered by a reviewer as part of their document review response.
        Reviewer:
          $ref: "#/components/schemas/Reviewer"
          description: The user in your organization assigned to review a document request.
    DocumentReviewCommentList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentReviewCommentSource"
    DocumentReviewCommentSource:
      description: Information about comments added to a document review request.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/DocumentReviewCommentType"
          description: The type of information added to a review request. Currently, only the value Comment is supported.
        Content:
          $ref: "#/components/schemas/DocumentReviewComment"
          description: The content of a comment entered by a user who requests a review of a new document version, or who reviews the new version.
    DocumentReviewCommentType:
      type: string
      enum:
        - Comment
    DocumentReviewComment:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^(?!\s*$).+
    ListDocumentVersionsResult:
      type: object
      properties:
        DocumentVersions:
          $ref: "#/components/schemas/DocumentVersionList"
          description: The document versions.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use when requesting the next set of items. If there are no additional items to return, the string is empty.
    DocumentVersionList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentVersionInfo"
    DocumentVersionInfo:
      description: Version information about the document.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DocumentName"
          description: The document name.
        DisplayName:
          $ref: "#/components/schemas/DocumentDisplayName"
          description: The friendly name of the SSM document. This value can differ for each version of the document. If you want to update this value, see UpdateDocument.
        DocumentVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The document version.
        VersionName:
          $ref: "#/components/schemas/DocumentVersionName"
          description: The version of the artifact associated with the document. For example, 12.6. This value is unique across all versions of a document, and can't be changed.
        CreatedDate:
          $ref: "#/components/schemas/DateTime"
          description: The date the document was created.
        IsDefaultVersion:
          $ref: "#/components/schemas/Boolean"
          description: An identifier for the default version of the document.
        DocumentFormat:
          $ref: "#/components/schemas/DocumentFormat"
          description: The document format, either JSON or YAML.
        Status:
          $ref: "#/components/schemas/DocumentStatus"
          description: The status of the SSM document, such as Creating, Active, Failed, and Deleting.
        StatusInformation:
          $ref: "#/components/schemas/DocumentStatusInformation"
          description: A message returned by Amazon Web Services Systems Manager that explains the Status value. For example, a Failed status might be explained by the StatusInformation message, "The specified S3 bucket doesn't exist. Verify that the URL of the S3 bucket is correct."
        ReviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
          description: The current status of the approval review for the latest version of the document.
    DocumentFilterList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentFilter"
    DocumentFilter:
      description: This data type is deprecated. Instead, use DocumentKeyValuesFilter.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/DocumentFilterKey"
          description: The name of the filter.
        value:
          $ref: "#/components/schemas/DocumentFilterValue"
          description: The value of the filter.
      required:
        - key
        - value
    DocumentFilterKey:
      type: string
      enum:
        - Name
        - Owner
        - PlatformTypes
        - DocumentType
    DocumentFilterValue:
      type: string
      minLength: 1
    DocumentKeyValuesFilterList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentKeyValuesFilter"
    DocumentKeyValuesFilter:
      description: "One or more filters. Use a filter to return a more specific list of documents. For keys, you can specify one or more tags that have been applied to a document. You can also use Amazon Web Services-provided keys, some of which have specific allowed values. These keys and their associated values are as follows: DocumentType ApplicationConfiguration ApplicationConfigurationSchema Automation ChangeCalendar Command Package Policy Session Owner Note that only one Owner can be specified in a request. For example: Key=Owner,Values=Self. Amazon Private Public Self ThirdParty PlatformTypes Linux Windows Name is another Amazon Web Services-provided key. If you use Name as a key, you can use a name prefix to return a list of documents. For example, in the Amazon Web Services CLI, to return a list of all documents that begin with Te, run the following command: aws ssm list-documents --filters Key=Name,Values=Te You can also use the TargetType Amazon Web Services-provided key. For a list of valid resource type values that can be used with this key, see Amazon Web Services resource and property types reference in the CloudFormation User Guide. If you specify more than two keys, only documents that are identified by all the tags are returned in the results. If you specify more than two values for a key, documents that are identified by any of the values are returned in the results. To specify a custom key-value pair, use the format Key=tag:tagName,Values=valueName. For example, if you created a key called region and are using the Amazon Web Services CLI to call the list-documents command: aws ssm list-documents --filters Key=tag:region,Values=east,west Key=Owner,Values=Self"
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/DocumentKeyValuesFilterKey"
          description: The name of the filter key.
        Values:
          $ref: "#/components/schemas/DocumentKeyValuesFilterValues"
          description: The value for the filter key.
    DocumentKeyValuesFilterKey:
      type: string
      minLength: 1
      maxLength: 128
    DocumentKeyValuesFilterValues:
      type: array
      items:
        $ref: "#/components/schemas/DocumentKeyValuesFilterValue"
    DocumentKeyValuesFilterValue:
      type: string
      minLength: 1
      maxLength: 256
    ListDocumentsResult:
      type: object
      properties:
        DocumentIdentifiers:
          $ref: "#/components/schemas/DocumentIdentifierList"
          description: The names of the SSM documents.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use when requesting the next set of items. If there are no additional items to return, the string is empty.
    DocumentIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentIdentifier"
    DocumentIdentifier:
      description: Describes the name of a SSM document.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DocumentARN"
          description: The name of the SSM document.
        CreatedDate:
          $ref: "#/components/schemas/DateTime"
          description: The date the SSM document was created.
        DisplayName:
          $ref: "#/components/schemas/DocumentDisplayName"
          description: An optional field where you can specify a friendly name for the SSM document. This value can differ for each version of the document. If you want to update this value, see UpdateDocument.
        Owner:
          $ref: "#/components/schemas/DocumentOwner"
          description: The Amazon Web Services user that created the document.
        VersionName:
          $ref: "#/components/schemas/DocumentVersionName"
          description: An optional field specifying the version of the artifact associated with the document. For example, 12.6. This value is unique across all versions of a document, and can't be changed.
        PlatformTypes:
          $ref: "#/components/schemas/PlatformTypeList"
          description: The operating system platform.
        DocumentVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The document version.
        DocumentType:
          $ref: "#/components/schemas/DocumentType"
          description: The document type.
        SchemaVersion:
          $ref: "#/components/schemas/DocumentSchemaVersion"
          description: The schema version.
        DocumentFormat:
          $ref: "#/components/schemas/DocumentFormat"
          description: The document format, either JSON or YAML.
        TargetType:
          $ref: "#/components/schemas/TargetType"
          description: The target type which defines the kinds of resources the document can run on. For example, /AWS::EC2::Instance. For a list of valid resource types, see Amazon Web Services resource and property types reference in the CloudFormation User Guide.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags, or metadata, that have been applied to the document.
        Requires:
          $ref: "#/components/schemas/DocumentRequiresList"
          description: A list of SSM documents required by a document. For example, an ApplicationConfiguration document requires an ApplicationConfigurationSchema document.
        ReviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
          description: The current status of a document review.
        Author:
          $ref: "#/components/schemas/DocumentAuthor"
          description: The user in your organization who created the document.
    ListInventoryEntriesResult:
      type: object
      properties:
        TypeName:
          $ref: "#/components/schemas/InventoryItemTypeName"
