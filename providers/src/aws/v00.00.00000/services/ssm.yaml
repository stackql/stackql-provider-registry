openapi: 3.0.0
info:
  version: "2014-11-06"
  title: Amazon Simple Systems Manager (SSM)
  description: Amazon Simple Systems Manager (SSM)
  x-serviceName: ssm
  x-serviceAlias: ssm
  x-protocol: json
  x-apiVersion: "2014-11-06"
  x-endpointPrefix: ssm
  x-targetPrefix: AmazonSSM
  x-jsonVersion: "1.1"
servers:
  - url: https://ssm.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ssm
paths:
  /AddTagsToResource:
    post:
      operationId: AddTagsToResource
      description: "Adds or overwrites one or more tags for the specified resource. Tags are metadata that you can assign to your automations, documents, managed nodes, maintenance windows, Parameter Store parameters, and patch baselines. Tags enable you to categorize your resources in different ways, for example, by purpose, owner, or environment. Each tag consists of a key and an optional value, both of which you define. For example, you could define a set of tags for your account's managed nodes that helps you track each node's owner and stack level. For example: Key=Owner,Value=DbAdmin Key=Owner,Value=SysAdmin Key=Owner,Value=Dev Key=Stack,Value=Production Key=Stack,Value=Pre-Production Key=Stack,Value=Test Most resources can have a maximum of 50 tags. Automations can have a maximum of 5 tags. We recommend that you devise a set of tag keys that meets your needs for each resource type. Using a consistent set of tag keys makes it easier for you to manage your resources. You can search and filter the resources based on the tags you add. Tags don't have any semantic meaning to and are interpreted strictly as a string of characters. For more information about using tags with Amazon Elastic Compute Cloud (Amazon EC2) instances, see Tag your Amazon EC2 resources in the Amazon EC2 User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.AddTagsToResource
            default: AmazonSSM.AddTagsToResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceType:
                  $ref: "#/components/schemas/ResourceTypeForTagging"
                  description: "Specifies the type of resource you are tagging. The ManagedInstance type for this API operation is for on-premises managed nodes. You must specify the name of the managed node in the following format: mi-ID_number . For example, mi-1a2b3c4d5e6f."
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: "The resource ID you want to tag. Use the ID of the resource. Here are some examples: MaintenanceWindow: mw-012345abcde PatchBaseline: pb-012345abcde Automation: example-c160-4567-8519-012345abcde OpsMetadata object: ResourceID for tagging is created from the Amazon Resource Name (ARN) for the object. Specifically, ResourceID is created from the strings that come after the word opsmetadata in the ARN. For example, an OpsMetadata object with an ARN of arn:aws:ssm:us-east-2:1234567890:opsmetadata/aws/ssm/MyGroup/appmanager has a ResourceID of either aws/ssm/MyGroup/appmanager or /aws/ssm/MyGroup/appmanager. For the Document and Parameter values, use the name of the resource. If you're tagging a shared document, you must use the full ARN of the document. ManagedInstance: mi-012345abcde The ManagedInstance type for this API operation is only for on-premises managed nodes. You must specify the name of the managed node in the following format: mi-ID_number . For example, mi-1a2b3c4d5e6f."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tags. The value parameter is required. Don't enter personally identifiable information in this field.
              required:
                - ResourceType
                - ResourceId
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsToResourceResult"
  /AssociateOpsItemRelatedItem:
    post:
      operationId: AssociateOpsItemRelatedItem
      description: Associates a related item to a Systems Manager OpsCenter OpsItem. For example, you can associate an Incident Manager incident or analysis with an OpsItem. Incident Manager and OpsCenter are tools in Amazon Web Services Systems Manager.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.AssociateOpsItemRelatedItem
            default: AmazonSSM.AssociateOpsItemRelatedItem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OpsItemId:
                  $ref: "#/components/schemas/OpsItemId"
                  description: The ID of the OpsItem to which you want to associate a resource as a related item.
                AssociationType:
                  $ref: "#/components/schemas/OpsItemRelatedItemAssociationType"
                  description: The type of association that you want to create between an OpsItem and a resource. OpsCenter supports IsParentOf and RelatesTo association types.
                ResourceType:
                  $ref: "#/components/schemas/OpsItemRelatedItemAssociationResourceType"
                  description: "The type of resource that you want to associate with an OpsItem. OpsCenter supports the following types: AWS::SSMIncidents::IncidentRecord: an Incident Manager incident. AWS::SSM::Document: a Systems Manager (SSM) document."
                ResourceUri:
                  $ref: "#/components/schemas/OpsItemRelatedItemAssociationResourceUri"
                  description: The Amazon Resource Name (ARN) of the Amazon Web Services resource that you want to associate with the OpsItem.
              required:
                - OpsItemId
                - AssociationType
                - ResourceType
                - ResourceUri
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateOpsItemRelatedItemResponse"
  /CancelCommand:
    post:
      operationId: CancelCommand
      description: Attempts to cancel the command specified by the Command ID. There is no guarantee that the command will be terminated and the underlying process stopped.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CancelCommand
            default: AmazonSSM.CancelCommand
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CommandId:
                  $ref: "#/components/schemas/CommandId"
                  description: The ID of the command you want to cancel.
                InstanceIds:
                  $ref: "#/components/schemas/InstanceIdList"
                  description: (Optional) A list of managed node IDs on which you want to cancel the command. If not provided, the command is canceled on every node on which it was requested.
              required:
                - CommandId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelCommandResult"
  /CancelMaintenanceWindowExecution:
    post:
      operationId: CancelMaintenanceWindowExecution
      description: Stops a maintenance window execution that is already in progress and cancels any tasks in the window that haven't already starting running. Tasks already in progress will continue to completion.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CancelMaintenanceWindowExecution
            default: AmazonSSM.CancelMaintenanceWindowExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WindowExecutionId:
                  $ref: "#/components/schemas/MaintenanceWindowExecutionId"
                  description: The ID of the maintenance window execution to stop.
              required:
                - WindowExecutionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelMaintenanceWindowExecutionResult"
  /CreateActivation:
    post:
      operationId: CreateActivation
      description: Generates an activation code and activation ID you can use to register your on-premises servers, edge devices, or virtual machine (VM) with Amazon Web Services Systems Manager. Registering these machines with Systems Manager makes it possible to manage them using Systems Manager tools. You use the activation code and ID when installing SSM Agent on machines in your hybrid environment. For more information about requirements for managing on-premises machines using Systems Manager, see Using Amazon Web Services Systems Manager in hybrid and multicloud environments in the Amazon Web Services Systems Manager User Guide. Amazon Elastic Compute Cloud (Amazon EC2) instances, edge devices, and on-premises servers and VMs that are configured for Systems Manager are all called managed nodes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CreateActivation
            default: AmazonSSM.CreateActivation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/ActivationDescription"
                  description: A user-defined description of the resource that you want to register with Systems Manager. Don't enter personally identifiable information in this field.
                DefaultInstanceName:
                  $ref: "#/components/schemas/DefaultInstanceName"
                  description: The name of the registered, managed node as it will appear in the Amazon Web Services Systems Manager console or when you use the Amazon Web Services command line tools to list Systems Manager resources. Don't enter personally identifiable information in this field.
                IamRole:
                  $ref: "#/components/schemas/IamRole"
                  description: The name of the Identity and Access Management (IAM) role that you want to assign to the managed node. This IAM role must provide AssumeRole permissions for the Amazon Web Services Systems Manager service principal ssm.amazonaws.com. For more information, see Create the IAM service role required for Systems Manager in a hybrid and multicloud environments in the Amazon Web Services Systems Manager User Guide. You can't specify an IAM service-linked role for this parameter. You must create a unique role.
                RegistrationLimit:
                  $ref: "#/components/schemas/RegistrationLimit"
                  description: Specify the maximum number of managed nodes you want to register. The default value is 1.
                ExpirationDate:
                  $ref: "#/components/schemas/ExpirationDate"
                  description: The date by which this activation request should expire, in timestamp format, such as "2024-07-07T00:00:00". You can specify a date up to 30 days in advance. If you don't provide an expiration date, the activation code expires in 24 hours.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "Optional metadata that you assign to a resource. Tags enable you to categorize a resource in different ways, such as by purpose, owner, or environment. For example, you might want to tag an activation to identify which servers or virtual machines (VMs) in your on-premises environment you intend to activate. In this case, you could specify the following key-value pairs: Key=OS,Value=Windows Key=Environment,Value=Production When you install SSM Agent on your on-premises servers and VMs, you specify an activation ID and code. When you specify the activation ID and code, tags assigned to the activation are automatically applied to the on-premises servers or VMs. You can't add tags to or delete tags from an existing activation. You can tag your on-premises servers, edge devices, and VMs after they connect to Systems Manager for the first time and are assigned a managed node ID. This means they are listed in the Amazon Web Services Systems Manager console with an ID that is prefixed with \"mi-\". For information about how to add tags to your managed nodes, see AddTagsToResource. For information about how to remove tags from your managed nodes, see RemoveTagsFromResource."
                RegistrationMetadata:
                  $ref: "#/components/schemas/RegistrationMetadataList"
                  description: Reserved for internal use.
              required:
                - IamRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateActivationResult"
  /CreateAssociation:
    post:
      operationId: CreateAssociation
      description: A State Manager association defines the state that you want to maintain on your managed nodes. For example, an association can specify that anti-virus software must be installed and running on your managed nodes, or that certain ports must be closed. For static targets, the association specifies a schedule for when the configuration is reapplied. For dynamic targets, such as an Amazon Web Services resource group or an Amazon Web Services autoscaling group, State Manager, a tool in Amazon Web Services Systems Manager applies the configuration when new managed nodes are added to the group. The association also specifies actions to take when applying the configuration. For example, an association for anti-virus software might run once a day. If the software isn't installed, then State Manager installs it. If the software is installed, but the service isn't running, then the association might instruct State Manager to start the service.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CreateAssociation
            default: AmazonSSM.CreateAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DocumentARN"
                  description: "The name of the SSM Command document or Automation runbook that contains the configuration information for the managed node. You can specify Amazon Web Services-predefined documents, documents you created, or a document that is shared with you from another Amazon Web Services account. For Systems Manager documents (SSM documents) that are shared with you from other Amazon Web Services accounts, you must specify the complete SSM document ARN, in the following format: arn:partition:ssm:region:account-id:document/document-name For example: arn:aws:ssm:us-east-2:12345678912:document/My-Shared-Document For Amazon Web Services-predefined documents and SSM documents you created in your account, you only need to specify the document name. For example, AWS-ApplyPatchBaseline or My-Document."
                DocumentVersion:
                  $ref: "#/components/schemas/DocumentVersion"
                  description: The document version you want to associate with the targets. Can be a specific version or the default version. State Manager doesn't support running associations that use a new version of a document if that document is shared from another account. State Manager always runs the default version of a document if shared from another account, even though the Systems Manager console shows that a new version was processed. If you want to run an association using a new version of a document shared form another account, you must set the document version to default.
                InstanceId:
                  $ref: "#/components/schemas/InstanceId"
                  description: The managed node ID. InstanceId has been deprecated. To specify a managed node ID for an association, use the Targets parameter. Requests that include the parameter InstanceID with Systems Manager documents (SSM documents) that use schema version 2.0 or later will fail. In addition, if you use the parameter InstanceId, you can't use the parameters AssociationName, DocumentVersion, MaxErrors, MaxConcurrency, OutputLocation, or ScheduleExpression. To use these parameters, you must use the Targets parameter.
                Parameters:
                  $ref: "#/components/schemas/Parameters"
                  description: The parameters for the runtime configuration of the document.
                Targets:
                  $ref: "#/components/schemas/Targets"
                  description: The targets for the association. You can target managed nodes by using tags, Amazon Web Services resource groups, all managed nodes in an Amazon Web Services account, or individual managed node IDs. You can target all managed nodes in an Amazon Web Services account by specifying the InstanceIds key with a value of *. For more information about choosing targets for an association, see Understanding targets and rate controls in State Manager associations in the Amazon Web Services Systems Manager User Guide.
                ScheduleExpression:
                  $ref: "#/components/schemas/ScheduleExpression"
                  description: A cron expression when the association will be applied to the targets.
                OutputLocation:
                  $ref: "#/components/schemas/InstanceAssociationOutputLocation"
                  description: An Amazon Simple Storage Service (Amazon S3) bucket where you want to store the output details of the request.
                AssociationName:
                  $ref: "#/components/schemas/AssociationName"
                  description: Specify a descriptive name for the association.
                AutomationTargetParameterName:
                  $ref: "#/components/schemas/AutomationTargetParameterName"
                  description: Choose the parameter that will define how your automation will branch out. This target is required for associations that use an Automation runbook and target resources by using rate controls. Automation is a tool in Amazon Web Services Systems Manager.
                MaxErrors:
                  $ref: "#/components/schemas/MaxErrors"
                  description: The number of errors that are allowed before the system stops sending requests to run the association on additional targets. You can specify either an absolute number of errors, for example 10, or a percentage of the target set, for example 10%. If you specify 3, for example, the system stops sending requests when the fourth error is received. If you specify 0, then the system stops sending requests after the first error is returned. If you run an association on 50 managed nodes and set MaxError to 10%, then the system stops sending the request when the sixth error is received. Executions that are already running an association when MaxErrors is reached are allowed to complete, but some of these executions may fail as well. If you need to ensure that there won't be more than max-errors failed executions, set MaxConcurrency to 1 so that executions proceed one at a time.
                MaxConcurrency:
                  $ref: "#/components/schemas/MaxConcurrency"
                  description: The maximum number of targets allowed to run the association at the same time. You can specify a number, for example 10, or a percentage of the target set, for example 10%. The default value is 100%, which means all targets run the association at the same time. If a new managed node starts and attempts to run an association while Systems Manager is running MaxConcurrency associations, the association is allowed to run. During the next association interval, the new managed node will process its association within the limit specified for MaxConcurrency.
                ComplianceSeverity:
                  $ref: "#/components/schemas/AssociationComplianceSeverity"
                  description: The severity level to assign to the association.
                SyncCompliance:
                  $ref: "#/components/schemas/AssociationSyncCompliance"
                  description: The mode for generating association compliance. You can specify AUTO or MANUAL. In AUTO mode, the system uses the status of the association execution to determine the compliance status. If the association execution runs successfully, then the association is COMPLIANT. If the association execution doesn't run successfully, the association is NON-COMPLIANT. In MANUAL mode, you must specify the AssociationId as a parameter for the PutComplianceItems API operation. In this case, compliance data isn't managed by State Manager. It is managed by your direct call to the PutComplianceItems API operation. By default, all associations use AUTO mode.
                ApplyOnlyAtCronInterval:
                  $ref: "#/components/schemas/ApplyOnlyAtCronInterval"
                  description: By default, when you create a new association, the system runs it immediately after it is created and then according to the schedule you specified and when target changes are detected. Specify true for ApplyOnlyAtCronIntervalif you want the association to run only according to the schedule you specified. For more information, see Understanding when associations are applied to resources and >About target updates with Automation runbooks in the Amazon Web Services Systems Manager User Guide. This parameter isn't supported for rate expressions.
                CalendarNames:
                  $ref: "#/components/schemas/CalendarNameOrARNList"
                  description: The names of Amazon Resource Names (ARNs) of the Change Calendar type documents you want to gate your associations under. The associations only run when that change calendar is open. For more information, see Amazon Web Services Systems Manager Change Calendar in the Amazon Web Services Systems Manager User Guide.
                TargetLocations:
                  $ref: "#/components/schemas/TargetLocations"
                  description: A location is a combination of Amazon Web Services Regions and Amazon Web Services accounts where you want to run the association. Use this action to create an association in multiple Regions and multiple accounts. The IncludeChildOrganizationUnits parameter is not supported by State Manager.
                ScheduleOffset:
                  $ref: "#/components/schemas/ScheduleOffset"
                  description: "Number of days to wait after the scheduled day to run an association. For example, if you specified a cron schedule of cron(0 0 ? * THU#2 *), you could specify an offset of 3 to run the association each Sunday after the second Thursday of the month. For more information about cron schedules for associations, see Reference: Cron and rate expressions for Systems Manager in the Amazon Web Services Systems Manager User Guide. To use offsets, you must specify the ApplyOnlyAtCronInterval parameter. This option tells the system not to run an association immediately after you create it."
                Duration:
                  $ref: "#/components/schemas/Duration"
                  description: "The number of hours the association can run before it is canceled. Duration applies to associations that are currently running, and any pending and in progress commands on all targets. If a target was taken offline for the association to run, it is made available again immediately, without a reboot. The Duration parameter applies only when both these conditions are true: The association for which you specify a duration is cancelable according to the parameters of the SSM command document or Automation runbook associated with this execution. The command specifies the ApplyOnlyAtCronInterval parameter, which means that the association doesn't run immediately after it is created, but only according to the specified schedule."
                TargetMaps:
                  $ref: "#/components/schemas/TargetMaps"
                  description: A key-value mapping of document parameters to target resources. Both Targets and TargetMaps can't be specified together.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds or overwrites one or more tags for a State Manager association. Tags are metadata that you can assign to your Amazon Web Services resources. Tags enable you to categorize your resources in different ways, for example, by purpose, owner, or environment. Each tag consists of a key and an optional value, both of which you define.
                AlarmConfiguration:
                  $ref: "#/components/schemas/AlarmConfiguration"
                AssociationDispatchAssumeRole:
                  $ref: "#/components/schemas/AssociationDispatchAssumeRoleArn"
                  description: A role used by association to take actions on your behalf. State Manager will assume this role and call required APIs when dispatching configurations to nodes. If not specified, service-linked role for Systems Manager will be used by default. It is recommended that you define a custom IAM role so that you have full control of the permissions that State Manager has when taking actions on your behalf. Service-linked role support in State Manager is being phased out. Associations relying on service-linked role may require updates in the future to continue functioning properly.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssociationResult"
  /CreateAssociationBatch:
    post:
      operationId: CreateAssociationBatch
      description: Associates the specified Amazon Web Services Systems Manager document (SSM document) with the specified managed nodes or targets. When you associate a document with one or more managed nodes using IDs or tags, Amazon Web Services Systems Manager Agent (SSM Agent) running on the managed node processes the document and configures the node as specified. If you associate a document with a managed node that already has an associated document, the system returns the AssociationAlreadyExists exception.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CreateAssociationBatch
            default: AmazonSSM.CreateAssociationBatch
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Entries:
                  $ref: "#/components/schemas/CreateAssociationBatchRequestEntries"
                  description: One or more associations.
                AssociationDispatchAssumeRole:
                  $ref: "#/components/schemas/AssociationDispatchAssumeRoleArn"
                  description: A role used by association to take actions on your behalf. State Manager will assume this role and call required APIs when dispatching configurations to nodes. If not specified, service-linked role for Systems Manager will be used by default. It is recommended that you define a custom IAM role so that you have full control of the permissions that State Manager has when taking actions on your behalf. Service-linked role support in State Manager is being phased out. Associations relying on service-linked role may require updates in the future to continue functioning properly.
              required:
                - Entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssociationBatchResult"
  /CreateDocument:
    post:
      operationId: CreateDocument
      description: Creates a Amazon Web Services Systems Manager (SSM document). An SSM document defines the actions that Systems Manager performs on your managed nodes. For more information about SSM documents, including information about supported schemas, features, and syntax, see Amazon Web Services Systems Manager Documents in the Amazon Web Services Systems Manager User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CreateDocument
            default: AmazonSSM.CreateDocument
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Content:
                  $ref: "#/components/schemas/DocumentContent"
                  description: The content for the new SSM document in JSON or YAML format. The content of the document must not exceed 64KB. This quota also includes the content specified for input parameters at runtime. We recommend storing the contents for your new document in an external JSON or YAML file and referencing the file in a command. For examples, see the following topics in the Amazon Web Services Systems Manager User Guide. Create an SSM document (console) Create an SSM document (command line) Create an SSM document (API)
                Requires:
                  $ref: "#/components/schemas/DocumentRequiresList"
                  description: A list of SSM documents required by a document. This parameter is used exclusively by AppConfig. When a user creates an AppConfig configuration in an SSM document, the user must also specify a required document for validation purposes. In this case, an ApplicationConfiguration document requires an ApplicationConfigurationSchema document for validation purposes. For more information, see What is AppConfig? in the AppConfig User Guide.
                Attachments:
                  $ref: "#/components/schemas/AttachmentsSourceList"
                  description: A list of key-value pairs that describe attachments to a version of a document.
                Name:
                  $ref: "#/components/schemas/DocumentName"
                  description: "A name for the SSM document. You can't use the following strings as document name prefixes. These are reserved by Amazon Web Services for use as document name prefixes: aws amazon amzn AWSEC2 AWSConfigRemediation AWSSupport"
                DisplayName:
                  $ref: "#/components/schemas/DocumentDisplayName"
                  description: An optional field where you can specify a friendly name for the SSM document. This value can differ for each version of the document. You can update this value at a later time using the UpdateDocument operation.
                VersionName:
                  $ref: "#/components/schemas/DocumentVersionName"
                  description: An optional field specifying the version of the artifact you are creating with the document. For example, Release12.1. This value is unique across all versions of a document, and can't be changed.
                DocumentType:
                  $ref: "#/components/schemas/DocumentType"
                  description: The type of document to create. The DeploymentStrategy document type is an internal-use-only document type reserved for AppConfig.
                DocumentFormat:
                  $ref: "#/components/schemas/DocumentFormat"
                  description: Specify the document format for the request. The document format can be JSON, YAML, or TEXT. JSON is the default format.
                TargetType:
                  $ref: "#/components/schemas/TargetType"
                  description: "Specify a target type to define the kinds of resources the document can run on. For example, to run a document on EC2 instances, specify the following value: /AWS::EC2::Instance. If you specify a value of '/' the document can run on all types of resources. If you don't specify a value, the document can't run on any resources. For a list of valid resource types, see Amazon Web Services resource and property types reference in the CloudFormation User Guide."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "Optional metadata that you assign to a resource. Tags enable you to categorize a resource in different ways, such as by purpose, owner, or environment. For example, you might want to tag an SSM document to identify the types of targets or the environment where it will run. In this case, you could specify the following key-value pairs: Key=OS,Value=Windows Key=Environment,Value=Production To add tags to an existing SSM document, use the AddTagsToResource operation."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDocumentResult"
  /CreateMaintenanceWindow:
    post:
      operationId: CreateMaintenanceWindow
      description: Creates a new maintenance window. The value you specify for Duration determines the specific end time for the maintenance window based on the time it begins. No maintenance window tasks are permitted to start after the resulting endtime minus the number of hours you specify for Cutoff. For example, if the maintenance window starts at 3 PM, the duration is three hours, and the value you specify for Cutoff is one hour, no maintenance window tasks can start after 5 PM.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CreateMaintenanceWindow
            default: AmazonSSM.CreateMaintenanceWindow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/MaintenanceWindowName"
                  description: The name of the maintenance window.
                Description:
                  $ref: "#/components/schemas/MaintenanceWindowDescription"
                  description: An optional description for the maintenance window. We recommend specifying a description to help you organize your maintenance windows.
                StartDate:
                  $ref: "#/components/schemas/MaintenanceWindowStringDateTime"
                  description: The date and time, in ISO-8601 Extended format, for when you want the maintenance window to become active. StartDate allows you to delay activation of the maintenance window until the specified future date. When using a rate schedule, if you provide a start date that occurs in the past, the current date and time are used as the start date.
                EndDate:
                  $ref: "#/components/schemas/MaintenanceWindowStringDateTime"
                  description: The date and time, in ISO-8601 Extended format, for when you want the maintenance window to become inactive. EndDate allows you to set a date and time in the future when the maintenance window will no longer run.
                Schedule:
                  $ref: "#/components/schemas/MaintenanceWindowSchedule"
                  description: The schedule of the maintenance window in the form of a cron or rate expression.
                ScheduleTimezone:
                  $ref: "#/components/schemas/MaintenanceWindowTimezone"
                  description: 'The time zone that the scheduled maintenance window executions are based on, in Internet Assigned Numbers Authority (IANA) format. For example: "America/Los_Angeles", "UTC", or "Asia/Seoul". For more information, see the Time Zone Database on the IANA website.'
                ScheduleOffset:
                  $ref: "#/components/schemas/MaintenanceWindowOffset"
                  description: The number of days to wait after the date and time specified by a cron expression before running the maintenance window. For example, the following cron expression schedules a maintenance window to run on the third Tuesday of every month at 11:30 PM. cron(30 23 ? * TUE#3 *) If the schedule offset is 2, the maintenance window won't run until two days later.
                Duration:
                  $ref: "#/components/schemas/MaintenanceWindowDurationHours"
                  description: The duration of the maintenance window in hours.
                Cutoff:
                  $ref: "#/components/schemas/MaintenanceWindowCutoff"
                  description: The number of hours before the end of the maintenance window that Amazon Web Services Systems Manager stops scheduling new tasks for execution.
                AllowUnassociatedTargets:
                  $ref: "#/components/schemas/MaintenanceWindowAllowUnassociatedTargets"
                  description: Enables a maintenance window task to run on managed nodes, even if you haven't registered those nodes as targets. If enabled, then you must specify the unregistered managed nodes (by node ID) when you register a task with the maintenance window. If you don't enable this option, then you must specify previously-registered targets when you register a task with the maintenance window.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: User-provided idempotency token.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "Optional metadata that you assign to a resource. Tags enable you to categorize a resource in different ways, such as by purpose, owner, or environment. For example, you might want to tag a maintenance window to identify the type of tasks it will run, the types of targets, and the environment it will run in. In this case, you could specify the following key-value pairs: Key=TaskType,Value=AgentUpdate Key=OS,Value=Windows Key=Environment,Value=Production To add tags to an existing maintenance window, use the AddTagsToResource operation."
              required:
                - AllowUnassociatedTargets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMaintenanceWindowResult"
  /CreateOpsItem:
    post:
      operationId: CreateOpsItem
      description: Creates a new OpsItem. You must have permission in Identity and Access Management (IAM) to create a new OpsItem. For more information, see Set up OpsCenter in the Amazon Web Services Systems Manager User Guide. Operations engineers and IT professionals use Amazon Web Services Systems Manager OpsCenter to view, investigate, and remediate operational issues impacting the performance and health of their Amazon Web Services resources. For more information, see Amazon Web Services Systems Manager OpsCenter in the Amazon Web Services Systems Manager User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CreateOpsItem
            default: AmazonSSM.CreateOpsItem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/OpsItemDescription"
                  description: User-defined text that contains information about the OpsItem, in Markdown format. Provide enough information so that users viewing this OpsItem for the first time understand the issue.
                OpsItemType:
                  $ref: "#/components/schemas/OpsItemType"
                  description: "The type of OpsItem to create. Systems Manager supports the following types of OpsItems: /aws/issue This type of OpsItem is used for default OpsItems created by OpsCenter. /aws/insight This type of OpsItem is used by OpsCenter for aggregating and reporting on duplicate OpsItems. /aws/changerequest This type of OpsItem is used by Change Manager for reviewing and approving or rejecting change requests. Amazon Web Services Systems Manager Change Manager is no longer open to new customers. Existing customers can continue to use the service as normal. For more information, see Amazon Web Services Systems Manager Change Manager availability change."
                OperationalData:
                  $ref: "#/components/schemas/OpsItemOperationalData"
                  description: "Operational data is custom data that provides useful reference details about the OpsItem. For example, you can specify log files, error strings, license keys, troubleshooting tips, or other relevant data. You enter operational data as key-value pairs. The key has a maximum length of 128 characters. The value has a maximum size of 20 KB. Operational data keys can't begin with the following: amazon, aws, amzn, ssm, /amazon, /aws, /amzn, /ssm. You can choose to make the data searchable by other users in the account or you can restrict search access. Searchable data means that all users with access to the OpsItem Overview page (as provided by the DescribeOpsItems API operation) can view and search on the specified data. Operational data that isn't searchable is only viewable by users who have access to the OpsItem (as provided by the GetOpsItem API operation). Use the /aws/resources key in OperationalData to specify a related resource in the request. Use the /aws/automations key in OperationalData to associate an Automation runbook with the OpsItem. To view Amazon Web Services CLI example commands that use these keys, see Create OpsItems manually in the Amazon Web Services Systems Manager User Guide."
                Notifications:
                  $ref: "#/components/schemas/OpsItemNotifications"
                  description: The Amazon Resource Name (ARN) of an SNS topic where notifications are sent when this OpsItem is edited or changed.
                Priority:
                  $ref: "#/components/schemas/OpsItemPriority"
                  description: The importance of this OpsItem in relation to other OpsItems in the system.
                RelatedOpsItems:
                  $ref: "#/components/schemas/RelatedOpsItems"
                  description: One or more OpsItems that share something in common with the current OpsItems. For example, related OpsItems can include OpsItems with similar error messages, impacted resources, or statuses for the impacted resource.
                Source:
                  $ref: "#/components/schemas/OpsItemSource"
                  description: "The origin of the OpsItem, such as Amazon EC2 or Systems Manager. The source name can't contain the following strings: aws, amazon, and amzn."
                Title:
                  $ref: "#/components/schemas/OpsItemTitle"
                  description: A short heading that describes the nature of the OpsItem and the impacted resource.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "Optional metadata that you assign to a resource. Tags use a key-value pair. For example: Key=Department,Value=Finance To add tags to a new OpsItem, a user must have IAM permissions for both the ssm:CreateOpsItems operation and the ssm:AddTagsToResource operation. To add tags to an existing OpsItem, use the AddTagsToResource operation."
                Category:
                  $ref: "#/components/schemas/OpsItemCategory"
                  description: Specify a category to assign to an OpsItem.
                Severity:
                  $ref: "#/components/schemas/OpsItemSeverity"
                  description: Specify a severity to assign to an OpsItem.
                ActualStartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The time a runbook workflow started. Currently reported only for the OpsItem type /aws/changerequest.
                ActualEndTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The time a runbook workflow ended. Currently reported only for the OpsItem type /aws/changerequest.
                PlannedStartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The time specified in a change request for a runbook workflow to start. Currently supported only for the OpsItem type /aws/changerequest.
                PlannedEndTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The time specified in a change request for a runbook workflow to end. Currently supported only for the OpsItem type /aws/changerequest.
                AccountId:
                  $ref: "#/components/schemas/OpsItemAccountId"
                  description: The target Amazon Web Services account where you want to create an OpsItem. To make this call, your account must be configured to work with OpsItems across accounts. For more information, see Set up OpsCenter in the Amazon Web Services Systems Manager User Guide.
              required:
                - Description
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOpsItemResponse"
  /CreateOpsMetadata:
    post:
      operationId: CreateOpsMetadata
      description: If you create a new application in Application Manager, Amazon Web Services Systems Manager calls this API operation to specify information about the new application, including the application type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CreateOpsMetadata
            default: AmazonSSM.CreateOpsMetadata
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/OpsMetadataResourceId"
                  description: A resource ID for a new Application Manager application.
                Metadata:
                  $ref: "#/components/schemas/MetadataMap"
                  description: Metadata for a new Application Manager application.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "Optional metadata that you assign to a resource. You can specify a maximum of five tags for an OpsMetadata object. Tags enable you to categorize a resource in different ways, such as by purpose, owner, or environment. For example, you might want to tag an OpsMetadata object to identify an environment or target Amazon Web Services Region. In this case, you could specify the following key-value pairs: Key=Environment,Value=Production Key=Region,Value=us-east-2"
              required:
                - ResourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOpsMetadataResult"
  /CreatePatchBaseline:
    post:
      operationId: CreatePatchBaseline
      description: Creates a patch baseline. For information about valid key-value pairs in PatchFilters for each supported operating system type, see PatchFilter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CreatePatchBaseline
            default: AmazonSSM.CreatePatchBaseline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OperatingSystem:
                  $ref: "#/components/schemas/OperatingSystem"
                  description: Defines the operating system the patch baseline applies to. The default value is WINDOWS.
                Name:
                  $ref: "#/components/schemas/BaselineName"
                  description: The name of the patch baseline.
                GlobalFilters:
                  $ref: "#/components/schemas/PatchFilterGroup"
                  description: A set of global filters used to include patches in the baseline. The GlobalFilters parameter can be configured only by using the CLI or an Amazon Web Services SDK. It can't be configured from the Patch Manager console, and its value isn't displayed in the console.
                ApprovalRules:
                  $ref: "#/components/schemas/PatchRuleGroup"
                  description: A set of rules used to include patches in the baseline.
                ApprovedPatches:
                  $ref: "#/components/schemas/PatchIdList"
                  description: A list of explicitly approved patches for the baseline. For information about accepted formats for lists of approved patches and rejected patches, see Package name formats for approved and rejected patch lists in the Amazon Web Services Systems Manager User Guide.
                ApprovedPatchesComplianceLevel:
                  $ref: "#/components/schemas/PatchComplianceLevel"
                  description: Defines the compliance level for approved patches. When an approved patch is reported as missing, this value describes the severity of the compliance violation. The default value is UNSPECIFIED.
                ApprovedPatchesEnableNonSecurity:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether the list of approved patches includes non-security updates that should be applied to the managed nodes. The default value is false. Applies to Linux managed nodes only.
                RejectedPatches:
                  $ref: "#/components/schemas/PatchIdList"
                  description: A list of explicitly rejected patches for the baseline. For information about accepted formats for lists of approved patches and rejected patches, see Package name formats for approved and rejected patch lists in the Amazon Web Services Systems Manager User Guide.
                RejectedPatchesAction:
                  $ref: "#/components/schemas/PatchAction"
                  description: "The action for Patch Manager to take on patches included in the RejectedPackages list. ALLOW_AS_DEPENDENCY Linux and macOS: A package in the rejected patches list is installed only if it is a dependency of another package. It is considered compliant with the patch baseline, and its status is reported as INSTALLED_OTHER. This is the default action if no option is specified. Windows Server: Windows Server doesn't support the concept of package dependencies. If a package in the rejected patches list and already installed on the node, its status is reported as INSTALLED_OTHER. Any package not already installed on the node is skipped. This is the default action if no option is specified. BLOCK All OSs: Packages in the rejected patches list, and packages that include them as dependencies, aren't installed by Patch Manager under any circumstances. State value assignment for patch compliance: If a package was installed before it was added to the rejected patches list, or is installed outside of Patch Manager afterward, it's considered noncompliant with the patch baseline and its status is reported as INSTALLED_REJECTED. If an update attempts to install a dependency package that is now rejected by the baseline, when previous versions of the package were not rejected, the package being updated is reported as MISSING for SCAN operations and as FAILED for INSTALL operations."
                Description:
                  $ref: "#/components/schemas/BaselineDescription"
                  description: A description of the patch baseline.
                Sources:
                  $ref: "#/components/schemas/PatchSourceList"
                  description: Information about the patches to use to update the managed nodes, including target operating systems and source repositories. Applies to Linux managed nodes only.
                AvailableSecurityUpdatesComplianceStatus:
                  $ref: "#/components/schemas/PatchComplianceStatus"
                  description: "Indicates the status you want to assign to security patches that are available but not approved because they don't meet the installation criteria specified in the patch baseline. Example scenario: Security patches that you might want installed can be skipped if you have specified a long period to wait after a patch is released before installation. If an update to the patch is released during your specified waiting period, the waiting period for installing the patch starts over. If the waiting period is too long, multiple versions of the patch could be released but never installed. Supported for Windows Server managed nodes only."
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: User-provided idempotency token.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "Optional metadata that you assign to a resource. Tags enable you to categorize a resource in different ways, such as by purpose, owner, or environment. For example, you might want to tag a patch baseline to identify the severity level of patches it specifies and the operating system family it applies to. In this case, you could specify the following key-value pairs: Key=PatchSeverity,Value=Critical Key=OS,Value=Windows To add tags to an existing patch baseline, use the AddTagsToResource operation."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePatchBaselineResult"
  /CreateResourceDataSync:
    post:
      operationId: CreateResourceDataSync
      description: "A resource data sync helps you view data from multiple sources in a single location. Amazon Web Services Systems Manager offers two types of resource data sync: SyncToDestination and SyncFromSource. You can configure Systems Manager Inventory to use the SyncToDestination type to synchronize Inventory data from multiple Amazon Web Services Regions to a single Amazon Simple Storage Service (Amazon S3) bucket. For more information, see Creating a resource data sync for Inventory in the Amazon Web Services Systems Manager User Guide. You can configure Systems Manager Explorer to use the SyncFromSource type to synchronize operational work items (OpsItems) and operational data (OpsData) from multiple Amazon Web Services Regions to a single Amazon S3 bucket. This type can synchronize OpsItems and OpsData from multiple Amazon Web Services accounts and Amazon Web Services Regions or EntireOrganization by using Organizations. For more information, see Setting up Systems Manager Explorer to display data from multiple accounts and Regions in the Amazon Web Services Systems Manager User Guide. A resource data sync is an asynchronous operation that returns immediately. After a successful initial sync is completed, the system continuously syncs data. To check the status of a sync, use the ListResourceDataSync. By default, data isn't encrypted in Amazon S3. We strongly recommend that you enable encryption in Amazon S3 to ensure secure data storage. We also recommend that you secure access to the Amazon S3 bucket by creating a restrictive bucket policy."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.CreateResourceDataSync
            default: AmazonSSM.CreateResourceDataSync
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SyncName:
                  $ref: "#/components/schemas/ResourceDataSyncName"
                  description: A name for the configuration.
                S3Destination:
                  $ref: "#/components/schemas/ResourceDataSyncS3Destination"
                  description: Amazon S3 configuration details for the sync. This parameter is required if the SyncType value is SyncToDestination.
                SyncType:
                  $ref: "#/components/schemas/ResourceDataSyncType"
                  description: Specify SyncToDestination to create a resource data sync that synchronizes data to an S3 bucket for Inventory. If you specify SyncToDestination, you must provide a value for S3Destination. Specify SyncFromSource to synchronize data from a single account and multiple Regions, or multiple Amazon Web Services accounts and Amazon Web Services Regions, as listed in Organizations for Explorer. If you specify SyncFromSource, you must provide a value for SyncSource. The default value is SyncToDestination.
                SyncSource:
                  $ref: "#/components/schemas/ResourceDataSyncSource"
                  description: Specify information about the data sources to synchronize. This parameter is required if the SyncType value is SyncFromSource.
              required:
                - SyncName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceDataSyncResult"
  /DeleteActivation:
    post:
      operationId: DeleteActivation
      description: Deletes an activation. You aren't required to delete an activation. If you delete an activation, you can no longer use it to register additional managed nodes. Deleting an activation doesn't de-register managed nodes. You must manually de-register managed nodes.
      parameters:
