        Owner:
          $ref: "#/components/schemas/NodeOwnerInfo"
          description: Information about the ownership of the managed node.
        Region:
          $ref: "#/components/schemas/NodeRegion"
          description: The Amazon Web Services Region that a managed node was created in or assigned to.
        NodeType:
          $ref: "#/components/schemas/NodeType"
          description: Information about the type of node.
    NodeCaptureTime:
      type: string
      format: date-time
    NodeId:
      type: string
      pattern: (^i-(\w{8}|\w{17})$)|(^mi-\w{17}$)
    NodeOwnerInfo:
