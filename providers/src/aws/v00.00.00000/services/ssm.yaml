                  description: A list of key-value pairs that describe attachments to a version of a document.
                Name:
                  $ref: "#/components/schemas/DocumentName"
                  description: The name of the SSM document that you want to update.
                DisplayName:
                  $ref: "#/components/schemas/DocumentDisplayName"
                  description: The friendly name of the SSM document that you want to update. This value can differ for each version of the document. If you don't specify a value for this parameter in your request, the existing value is applied to the new document version.
                VersionName:
                  $ref: "#/components/schemas/DocumentVersionName"
                  description: An optional field specifying the version of the artifact you are updating with the document. For example, 12.6. This value is unique across all versions of a document, and can't be changed.
                DocumentVersion:
                  $ref: "#/components/schemas/DocumentVersion"
                  description: The version of the document that you want to update. Currently, Systems Manager supports updating only the latest version of the document. You can specify the version number of the latest version or use the $LATEST variable. If you change a document version for a State Manager association, Systems Manager immediately runs the association unless you previously specifed the apply-only-at-cron-interval parameter.
                DocumentFormat:
                  $ref: "#/components/schemas/DocumentFormat"
                  description: Specify the document format for the new document version. Systems Manager supports JSON and YAML documents. JSON is the default format.
                TargetType:
                  $ref: "#/components/schemas/TargetType"
                  description: Specify a new target type for the document.
      responses:
