        Priority:
          $ref: "#/components/schemas/MaintenanceWindowTaskPriority"
          description: The priority of the task in the maintenance window. The lower the number, the higher the priority. Tasks that have the same priority are scheduled in parallel.
        LoggingInfo:
          $ref: "#/components/schemas/LoggingInfo"
          description: Information about an S3 bucket to write task-level logs to. LoggingInfo has been deprecated. To specify an Amazon Simple Storage Service (Amazon S3) bucket to contain logs, instead use the OutputS3BucketName and OutputS3KeyPrefix options in the TaskInvocationParameters structure. For information about how Amazon Web Services Systems Manager handles these options for the supported maintenance window task types, see MaintenanceWindowTaskInvocationParameters.
        ServiceRoleArn:
          $ref: "#/components/schemas/ServiceRole"
          description: The Amazon Resource Name (ARN) of the IAM service role for Amazon Web Services Systems Manager to assume when running a maintenance window task. If you do not specify a service role ARN, Systems Manager uses a service-linked role in your account. If no appropriate service-linked role for Systems Manager exists in your account, it is created when you run RegisterTaskWithMaintenanceWindow. However, for an improved security posture, we strongly recommend creating a custom policy and custom service role for running your maintenance window tasks. The policy can be crafted to provide only the permissions needed for your particular maintenance window tasks. For more information, see Setting up Maintenance Windows in the in the Amazon Web Services Systems Manager User Guide.
        MaxConcurrency:
          $ref: "#/components/schemas/MaxConcurrency"
          description: "The maximum number of targets this task can be run for, in parallel. Although this element is listed as \"Required: No\", a value can be omitted only when you are registering or updating a targetless task You must provide a value in all other cases. For maintenance window tasks without a target specified, you can't supply a value for this option. Instead, the system inserts a placeholder value of 1. This value doesn't affect the running of your task."
        MaxErrors:
          $ref: "#/components/schemas/MaxErrors"
          description: "The maximum number of errors allowed before this task stops being scheduled. Although this element is listed as \"Required: No\", a value can be omitted only when you are registering or updating a targetless task You must provide a value in all other cases. For maintenance window tasks without a target specified, you can't supply a value for this option. Instead, the system inserts a placeholder value of 1. This value doesn't affect the running of your task."
        Name:
          $ref: "#/components/schemas/MaintenanceWindowName"
          description: The task name.
        Description:
          $ref: "#/components/schemas/MaintenanceWindowDescription"
          description: A description of the task.
        CutoffBehavior:
          $ref: "#/components/schemas/MaintenanceWindowTaskCutoffBehavior"
          description: The specification for whether tasks should continue to run after the cutoff time specified in the maintenance windows is reached.
        AlarmConfiguration:
          $ref: "#/components/schemas/AlarmConfiguration"
          description: The details for the CloudWatch alarm applied to your maintenance window task.
