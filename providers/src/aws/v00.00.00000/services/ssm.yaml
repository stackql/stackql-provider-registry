      description: Information about the results of the execution preview.
      type: object
      properties:
        StepPreviews:
          type: object
          properties: {}
          description: "Information about the type of impact a runbook step would have on a resource. Mutating: The runbook step would make changes to the targets through actions that create, modify, or delete resources. Non_Mutating: The runbook step would retrieve data about resources but not make changes to them. This category generally includes Describe*, List*, Get*, and similar read-only API actions. Undetermined: An undetermined step invokes executions performed by another orchestration service like Lambda, Step Functions, or Amazon Web Services Systems Manager Run Command. An undetermined step might also call a third-party API. Systems Manager Automation doesn't know the outcome of the orchestration processes or third-party API executions, so the results of the steps are undetermined."
