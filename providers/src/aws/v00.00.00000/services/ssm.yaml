        ServiceRole:
          $ref: "#/components/schemas/ServiceRole"
          description: The Identity and Access Management (IAM) service role that Run Command, a tool in Amazon Web Services Systems Manager, uses to act on your behalf when sending notifications about command status changes.
        NotificationConfig:
          $ref: "#/components/schemas/NotificationConfig"
          description: Configurations for sending notifications about command status changes.
        CloudWatchOutputConfig:
          $ref: "#/components/schemas/CloudWatchOutputConfig"
          description: Amazon CloudWatch Logs information where you want Amazon Web Services Systems Manager to send the command output.
        TimeoutSeconds:
          $ref: "#/components/schemas/TimeoutSeconds"
          description: The TimeoutSeconds value specified for a command.
        AlarmConfiguration:
