    GetOpsItemResponse:
      type: object
      properties:
        OpsItem:
          $ref: "#/components/schemas/OpsItem"
          description: The OpsItem.
    OpsItem:
      description: Operations engineers and IT professionals use Amazon Web Services Systems Manager OpsCenter to view, investigate, and remediate operational work items (OpsItems) impacting the performance and health of their Amazon Web Services resources. OpsCenter is integrated with Amazon EventBridge and Amazon CloudWatch. This means you can configure these services to automatically create an OpsItem in OpsCenter when a CloudWatch alarm enters the ALARM state or when EventBridge processes an event from any Amazon Web Services service that publishes events. Configuring Amazon CloudWatch alarms and EventBridge events to automatically create OpsItems allows you to quickly diagnose and remediate issues with Amazon Web Services resources from a single console. To help you diagnose issues, each OpsItem includes contextually relevant information such as the name and ID of the Amazon Web Services resource that generated the OpsItem, alarm or event details, alarm history, and an alarm timeline graph. For the Amazon Web Services resource, OpsCenter aggregates information from Config, CloudTrail logs, and EventBridge, so you don't have to navigate across multiple console pages during your investigation. For more information, see Amazon Web Services Systems Manager OpsCenter in the Amazon Web Services Systems Manager User Guide.
      type: object
      properties:
        CreatedBy:
          $ref: "#/components/schemas/String"
          description: The ARN of the Amazon Web Services account that created the OpsItem.
        OpsItemType:
          $ref: "#/components/schemas/OpsItemType"
          description: "The type of OpsItem. Systems Manager supports the following types of OpsItems: /aws/issue This type of OpsItem is used for default OpsItems created by OpsCenter. /aws/changerequest This type of OpsItem is used by Change Manager for reviewing and approving or rejecting change requests. /aws/insight This type of OpsItem is used by OpsCenter for aggregating and reporting on duplicate OpsItems."
        CreatedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the OpsItem was created.
        Description:
          $ref: "#/components/schemas/OpsItemDescription"
          description: The OpsItem description.
        LastModifiedBy:
          $ref: "#/components/schemas/String"
          description: The ARN of the Amazon Web Services account that last updated the OpsItem.
        LastModifiedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the OpsItem was last updated.
        Notifications:
          $ref: "#/components/schemas/OpsItemNotifications"
          description: The Amazon Resource Name (ARN) of an Amazon Simple Notification Service (Amazon SNS) topic where notifications are sent when this OpsItem is edited or changed.
        Priority:
          $ref: "#/components/schemas/OpsItemPriority"
          description: The importance of this OpsItem in relation to other OpsItems in the system.
        RelatedOpsItems:
          $ref: "#/components/schemas/RelatedOpsItems"
          description: One or more OpsItems that share something in common with the current OpsItem. For example, related OpsItems can include OpsItems with similar error messages, impacted resources, or statuses for the impacted resource.
        Status:
          $ref: "#/components/schemas/OpsItemStatus"
          description: The OpsItem status. For more information, see Editing OpsItem details in the Amazon Web Services Systems Manager User Guide.
        OpsItemId:
          $ref: "#/components/schemas/OpsItemId"
          description: The ID of the OpsItem.
        Version:
          $ref: "#/components/schemas/String"
          description: The version of this OpsItem. Each time the OpsItem is edited the version number increments by one.
        Title:
          $ref: "#/components/schemas/OpsItemTitle"
          description: A short heading that describes the nature of the OpsItem and the impacted resource.
        Source:
          $ref: "#/components/schemas/OpsItemSource"
          description: The origin of the OpsItem, such as Amazon EC2 or Systems Manager. The impacted resource is a subset of source.
        OperationalData:
          type: object
          properties: {}
          description: "Operational data is custom data that provides useful reference details about the OpsItem. For example, you can specify log files, error strings, license keys, troubleshooting tips, or other relevant data. You enter operational data as key-value pairs. The key has a maximum length of 128 characters. The value has a maximum size of 20 KB. Operational data keys can't begin with the following: amazon, aws, amzn, ssm, /amazon, /aws, /amzn, /ssm. You can choose to make the data searchable by other users in the account or you can restrict search access. Searchable data means that all users with access to the OpsItem Overview page (as provided by the DescribeOpsItems API operation) can view and search on the specified data. Operational data that isn't searchable is only viewable by users who have access to the OpsItem (as provided by the GetOpsItem API operation). Use the /aws/resources key in OperationalData to specify a related resource in the request. Use the /aws/automations key in OperationalData to associate an Automation runbook with the OpsItem. To view Amazon Web Services CLI example commands that use these keys, see Creating OpsItems manually in the Amazon Web Services Systems Manager User Guide."
        Category:
          $ref: "#/components/schemas/OpsItemCategory"
          description: "An OpsItem category. Category options include: Availability, Cost, Performance, Recovery, Security."
        Severity:
          $ref: "#/components/schemas/OpsItemSeverity"
          description: The severity of the OpsItem. Severity options range from 1 to 4.
        ActualStartTime:
          $ref: "#/components/schemas/DateTime"
          description: The time a runbook workflow started. Currently reported only for the OpsItem type /aws/changerequest.
        ActualEndTime:
          $ref: "#/components/schemas/DateTime"
          description: The time a runbook workflow ended. Currently reported only for the OpsItem type /aws/changerequest.
        PlannedStartTime:
          $ref: "#/components/schemas/DateTime"
          description: The time specified in a change request for a runbook workflow to start. Currently supported only for the OpsItem type /aws/changerequest.
        PlannedEndTime:
          $ref: "#/components/schemas/DateTime"
          description: The time specified in a change request for a runbook workflow to end. Currently supported only for the OpsItem type /aws/changerequest.
        OpsItemArn:
          $ref: "#/components/schemas/OpsItemArn"
          description: The OpsItem Amazon Resource Name (ARN).
