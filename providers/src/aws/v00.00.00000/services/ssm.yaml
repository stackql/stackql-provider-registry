          $ref: "#/components/schemas/PatchVendor"
          description: The name of the vendor providing the patch.
        ProductFamily:
          $ref: "#/components/schemas/PatchProductFamily"
          description: The product family the patch is applicable for. For example, Windows or Amazon Linux 2.
        Product:
          $ref: "#/components/schemas/PatchProduct"
          description: The specific product the patch is applicable for. For example, WindowsServer2016 or AmazonLinux2018.03.
        Classification:
          $ref: "#/components/schemas/PatchClassification"
          description: The classification of the patch. For example, SecurityUpdates, Updates, or CriticalUpdates.
        MsrcSeverity:
          $ref: "#/components/schemas/PatchMsrcSeverity"
          description: The severity of the patch, such as Critical, Important, or Moderate. Applies to Windows patches only.
        KbNumber:
          $ref: "#/components/schemas/PatchKbNumber"
          description: The Microsoft Knowledge Base ID of the patch. Applies to Windows patches only.
        MsrcNumber:
          $ref: "#/components/schemas/PatchMsrcNumber"
          description: The ID of the Microsoft Security Response Center (MSRC) bulletin the patch is related to. For example, MS14-045. Applies to Windows patches only.
        Language:
          $ref: "#/components/schemas/PatchLanguage"
          description: The language of the patch if it's language-specific.
        AdvisoryIds:
          $ref: "#/components/schemas/PatchAdvisoryIdList"
