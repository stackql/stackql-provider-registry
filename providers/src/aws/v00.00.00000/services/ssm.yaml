            default: AmazonSSM.DeleteOpsMetadata
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OpsMetadataArn:
                  $ref: "#/components/schemas/OpsMetadataArn"
                  description: The Amazon Resource Name (ARN) of an OpsMetadata Object to delete.
              required:
                - OpsMetadataArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOpsMetadataResult"
  /DeleteParameter:
