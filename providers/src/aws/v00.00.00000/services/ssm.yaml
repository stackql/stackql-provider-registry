      items:
        $ref: "#/components/schemas/InstancePatchState"
    InstancePatchState:
      description: Defines the high-level patch compliance state for a managed node, providing information about the number of installed, missing, not applicable, and failed patches along with metadata about the operation when this information was gathered for the managed node.
      type: object
      properties:
        InstanceId:
          $ref: "#/components/schemas/InstanceId"
          description: The ID of the managed node the high-level patch compliance information was collected for.
        PatchGroup:
          $ref: "#/components/schemas/PatchGroup"
          description: The name of the patch group the managed node belongs to.
        BaselineId:
          $ref: "#/components/schemas/BaselineId"
          description: The ID of the patch baseline used to patch the managed node.
        SnapshotId:
          $ref: "#/components/schemas/SnapshotId"
          description: The ID of the patch baseline snapshot used during the patching operation when this compliance data was collected.
        InstallOverrideList:
          $ref: "#/components/schemas/InstallOverrideList"
          description: "An https URL or an Amazon Simple Storage Service (Amazon S3) path-style URL to a list of patches to be installed. This patch installation list, which you maintain in an S3 bucket in YAML format and specify in the SSM document AWS-RunPatchBaseline, overrides the patches specified by the default patch baseline. For more information about the InstallOverrideList parameter, see SSM Command document for patching: AWS-RunPatchBaseline in the Amazon Web Services Systems Manager User Guide."
        OwnerInformation:
          $ref: "#/components/schemas/OwnerInformation"
          description: Placeholder information. This field will always be empty in the current release of the service.
        InstalledCount:
          $ref: "#/components/schemas/PatchInstalledCount"
          description: The number of patches from the patch baseline that are installed on the managed node.
        InstalledOtherCount:
          $ref: "#/components/schemas/PatchInstalledOtherCount"
          description: The number of patches not specified in the patch baseline that are installed on the managed node.
        InstalledPendingRebootCount:
          $ref: "#/components/schemas/PatchInstalledPendingRebootCount"
          description: The number of patches installed by Patch Manager since the last time the managed node was rebooted.
        InstalledRejectedCount:
          $ref: "#/components/schemas/PatchInstalledRejectedCount"
          description: The number of patches installed on a managed node that are specified in a RejectedPatches list. Patches with a status of InstalledRejected were typically installed before they were added to a RejectedPatches list. If ALLOW_AS_DEPENDENCY is the specified option for RejectedPatchesAction, the value of InstalledRejectedCount will always be 0 (zero).
        MissingCount:
          $ref: "#/components/schemas/PatchMissingCount"
          description: The number of patches from the patch baseline that are applicable for the managed node but aren't currently installed.
        FailedCount:
          $ref: "#/components/schemas/PatchFailedCount"
          description: The number of patches from the patch baseline that were attempted to be installed during the last patching operation, but failed to install.
        UnreportedNotApplicableCount:
          $ref: "#/components/schemas/PatchUnreportedNotApplicableCount"
          description: The number of patches beyond the supported limit of NotApplicableCount that aren't reported by name to Inventory. Inventory is a tool in Amazon Web Services Systems Manager.
        NotApplicableCount:
          $ref: "#/components/schemas/PatchNotApplicableCount"
          description: The number of patches from the patch baseline that aren't applicable for the managed node and therefore aren't installed on the node. This number may be truncated if the list of patch names is very large. The number of patches beyond this limit are reported in UnreportedNotApplicableCount.
        AvailableSecurityUpdateCount:
          $ref: "#/components/schemas/PatchAvailableSecurityUpdateCount"
          description: The number of security-related patches that are available but not approved because they didn't meet the patch baseline requirements. For example, an updated version of a patch might have been released before the specified auto-approval period was over. Applies to Windows Server managed nodes only.
        OperationStartTime:
          $ref: "#/components/schemas/DateTime"
          description: The time the most recent patching operation was started on the managed node.
        OperationEndTime:
          $ref: "#/components/schemas/DateTime"
          description: The time the most recent patching operation completed on the managed node.
        Operation:
          $ref: "#/components/schemas/PatchOperationType"
          description: "The type of patching operation that was performed: or SCAN assesses the patch compliance state. INSTALL installs missing patches."
        LastNoRebootInstallOperationTime:
          $ref: "#/components/schemas/DateTime"
          description: The time of the last attempt to patch the managed node with NoReboot specified as the reboot option.
        RebootOption:
          $ref: "#/components/schemas/RebootOption"
          description: "Indicates the reboot option specified in the patch baseline. Reboot options apply to Install operations only. Reboots aren't attempted for Patch Manager Scan operations. RebootIfNeeded: Patch Manager tries to reboot the managed node if it installed any patches, or if any patches are detected with a status of InstalledPendingReboot. NoReboot: Patch Manager attempts to install missing packages without trying to reboot the system. Patches installed with this option are assigned a status of InstalledPendingReboot. These patches might not be in effect until a reboot is performed."
        CriticalNonCompliantCount:
          $ref: "#/components/schemas/PatchCriticalNonCompliantCount"
          description: The number of patches per node that are specified as Critical for compliance reporting in the patch baseline aren't installed. These patches might be missing, have failed installation, were rejected, or were installed but awaiting a required managed node reboot. The status of these managed nodes is NON_COMPLIANT.
        SecurityNonCompliantCount:
          $ref: "#/components/schemas/PatchSecurityNonCompliantCount"
          description: The number of patches per node that are specified as Security in a patch advisory aren't installed. These patches might be missing, have failed installation, were rejected, or were installed but awaiting a required managed node reboot. The status of these managed nodes is NON_COMPLIANT.
        OtherNonCompliantCount:
          $ref: "#/components/schemas/PatchOtherNonCompliantCount"
          description: The number of patches per node that are specified as other than Critical or Security but aren't compliant with the patch baseline. The status of these managed nodes is NON_COMPLIANT.
      required:
        - InstanceId
        - PatchGroup
        - BaselineId
        - OperationStartTime
        - OperationEndTime
        - Operation
