            default: AmazonSSM.StartAutomationExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DocumentName:
                  $ref: "#/components/schemas/DocumentARN"
                  description: The name of the SSM document to run. This can be a public document or a custom document. To run a shared document belonging to another account, specify the document ARN. For more information about how to use shared documents, see Sharing SSM documents in the Amazon Web Services Systems Manager User Guide.
                DocumentVersion:
                  $ref: "#/components/schemas/DocumentVersion"
                  description: The version of the Automation runbook to use for this execution.
                Parameters:
                  $ref: "#/components/schemas/AutomationParameterMap"
                  description: A key-value map of execution parameters, which match the declared parameters in the Automation runbook.
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: User-provided idempotency token. The token must be unique, is case insensitive, enforces the UUID format, and can't be reused.
                Mode:
                  $ref: "#/components/schemas/ExecutionMode"
                  description: "The execution mode of the automation. Valid modes include the following: Auto and Interactive. The default mode is Auto."
                TargetParameterName:
                  $ref: "#/components/schemas/AutomationParameterKey"
                  description: The name of the parameter used as the target resource for the rate-controlled execution. Required if you specify targets.
                Targets:
                  $ref: "#/components/schemas/Targets"
                  description: A key-value mapping to target resources. Required if you specify TargetParameterName. If both this parameter and the TargetLocation:Targets parameter are supplied, TargetLocation:Targets takes precedence.
                TargetMaps:
                  $ref: "#/components/schemas/TargetMaps"
                  description: A key-value mapping of document parameters to target resources. Both Targets and TargetMaps can't be specified together.
                MaxConcurrency:
                  $ref: "#/components/schemas/MaxConcurrency"
                  description: The maximum number of targets allowed to run this task in parallel. You can specify a number, such as 10, or a percentage, such as 10%. The default value is 10. If both this parameter and the TargetLocation:TargetsMaxConcurrency are supplied, TargetLocation:TargetsMaxConcurrency takes precedence.
                MaxErrors:
                  $ref: "#/components/schemas/MaxErrors"
                  description: The number of errors that are allowed before the system stops running the automation on additional targets. You can specify either an absolute number of errors, for example 10, or a percentage of the target set, for example 10%. If you specify 3, for example, the system stops running the automation when the fourth error is received. If you specify 0, then the system stops running the automation on additional targets after the first error result is returned. If you run an automation on 50 resources and set max-errors to 10%, then the system stops running the automation on additional targets when the sixth error is received. Executions that are already running an automation when max-errors is reached are allowed to complete, but some of these executions may fail as well. If you need to ensure that there won't be more than max-errors failed executions, set max-concurrency to 1 so the executions proceed one at a time. If this parameter and the TargetLocation:TargetsMaxErrors parameter are both supplied, TargetLocation:TargetsMaxErrors takes precedence.
                TargetLocations:
                  $ref: "#/components/schemas/TargetLocations"
                  description: A location is a combination of Amazon Web Services Regions and/or Amazon Web Services accounts where you want to run the automation. Use this operation to start an automation in multiple Amazon Web Services Regions and multiple Amazon Web Services accounts. For more information, see Running automations in multiple Amazon Web Services Regions and accounts in the Amazon Web Services Systems Manager User Guide.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "Optional metadata that you assign to a resource. You can specify a maximum of five tags for an automation. Tags enable you to categorize a resource in different ways, such as by purpose, owner, or environment. For example, you might want to tag an automation to identify an environment or operating system. In this case, you could specify the following key-value pairs: Key=environment,Value=test Key=OS,Value=Windows The Array Members maximum value is reported as 1000. This number includes capacity reserved for internal operations. When calling the StartAutomationExecution action, you can specify a maximum of 5 tags. You can, however, use the AddTagsToResource action to add up to a total of 50 tags to an existing automation configuration."
                AlarmConfiguration:
                  $ref: "#/components/schemas/AlarmConfiguration"
                  description: The CloudWatch alarm you want to apply to your automation.
                TargetLocationsURL:
                  $ref: "#/components/schemas/TargetLocationsURL"
                  description: Specify a publicly accessible URL for a file that contains the TargetLocations body. Currently, only files in presigned Amazon S3 buckets are supported.
              required:
                - DocumentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAutomationExecutionResult"
