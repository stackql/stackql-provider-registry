    PatchFilterGroup:
      description: A set of patch filters, typically used for approval rules.
      type: object
      properties:
        PatchFilters:
          $ref: "#/components/schemas/PatchFilterList"
          description: The set of patch filters that make up the group.
      required:
        - PatchFilters
    PatchFilterList:
      type: array
      items:
        $ref: "#/components/schemas/PatchFilter"
    PatchFilter:
      description: Defines which patches should be included in a patch baseline. A patch filter consists of a key and a set of values. The filter key is a patch property. For example, the available filter keys for WINDOWS are PATCH_SET, PRODUCT, PRODUCT_FAMILY, CLASSIFICATION, and MSRC_SEVERITY. The filter values define a matching criterion for the patch property indicated by the key. For example, if the filter key is PRODUCT and the filter values are ["Office 2013", "Office 2016"], then the filter accepts all patches where product name is either "Office 2013" or "Office 2016". The filter values can be exact values for the patch property given as a key, or a wildcard (*), which matches all values. You can view lists of valid values for the patch properties by running the DescribePatchProperties command. For information about which patch properties can be used with each major operating system, see DescribePatchProperties.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/PatchFilterKey"
          description: The key for the filter. Run the DescribePatchProperties command to view lists of valid keys for each operating system type.
        Values:
          $ref: "#/components/schemas/PatchFilterValueList"
          description: The value for the filter key. Run the DescribePatchProperties command to view lists of valid values for each key based on operating system type.
      required:
        - Key
        - Values
    PatchFilterKey:
      type: string
      enum:
        - ARCH
        - ADVISORY_ID
        - BUGZILLA_ID
        - PATCH_SET
        - PRODUCT
        - PRODUCT_FAMILY
        - CLASSIFICATION
        - CVE_ID
        - EPOCH
        - MSRC_SEVERITY
        - NAME
        - PATCH_ID
        - SECTION
        - PRIORITY
        - REPOSITORY
        - RELEASE
        - SEVERITY
        - SECURITY
        - VERSION
    PatchFilterValueList:
      type: array
      items:
        $ref: "#/components/schemas/PatchFilterValue"
    PatchFilterValue:
      type: string
      minLength: 1
      maxLength: 64
    PatchRuleGroup:
      description: A set of rules defining the approval rules for a patch baseline.
      type: object
      properties:
        PatchRules:
          $ref: "#/components/schemas/PatchRuleList"
          description: The rules that make up the rule group.
      required:
        - PatchRules
    PatchRuleList:
      type: array
      items:
        $ref: "#/components/schemas/PatchRule"
    PatchRule:
      description: Defines an approval rule for a patch baseline.
      type: object
      properties:
        PatchFilterGroup:
          $ref: "#/components/schemas/PatchFilterGroup"
          description: The patch filter group that defines the criteria for the rule.
        ComplianceLevel:
          $ref: "#/components/schemas/PatchComplianceLevel"
          description: A compliance severity level for all approved patches in a patch baseline.
        ApproveAfterDays:
          $ref: "#/components/schemas/ApproveAfterDays"
          description: "The number of days after the release date of each patch matched by the rule that the patch is marked as approved in the patch baseline. For example, a value of 7 means that patches are approved seven days after they are released. Patch Manager evaluates patch release dates using Coordinated Universal Time (UTC). If the day represented by 7 is 2025-11-16, patches released between 2025-11-16T00:00:00Z and 2025-11-16T23:59:59Z will be included in the approval. This parameter is marked as Required: No, but your request must include a value for either ApproveAfterDays or ApproveUntilDate. Not supported for Debian Server or Ubuntu Server. Use caution when setting this value for Windows Server patch baselines. Because patch updates that are replaced by later updates are removed, setting too broad a value for this parameter can result in crucial patches not being installed. For more information, see the Windows Server tab in the topic How security patches are selected in the Amazon Web Services Systems Manager User Guide."
        ApproveUntilDate:
          $ref: "#/components/schemas/PatchStringDateTime"
          description: "The cutoff date for auto approval of released patches. Any patches released on or before this date are installed automatically. Enter dates in the format YYYY-MM-DD. For example, 2025-11-16. Patch Manager evaluates patch release dates using Coordinated Universal Time (UTC). If you enter the date 2025-11-16, patches released between 2025-11-16T00:00:00Z and 2025-11-16T23:59:59Z will be included in the approval. This parameter is marked as Required: No, but your request must include a value for either ApproveUntilDate or ApproveAfterDays. Not supported for Debian Server or Ubuntu Server. Use caution when setting this value for Windows Server patch baselines. Because patch updates that are replaced by later updates are removed, setting too broad a value for this parameter can result in crucial patches not being installed. For more information, see the Windows Server tab in the topic How security patches are selected in the Amazon Web Services Systems Manager User Guide."
        EnableNonSecurity:
          $ref: "#/components/schemas/Boolean"
          description: For managed nodes identified by the approval rule filters, enables a patch baseline to apply non-security updates available in the specified repository. The default value is false. Applies to Linux managed nodes only.
      required:
        - PatchFilterGroup
    PatchComplianceLevel:
      type: string
      enum:
        - CRITICAL
        - HIGH
        - MEDIUM
        - LOW
        - INFORMATIONAL
        - UNSPECIFIED
    ApproveAfterDays:
      type: integer
      minimum: 0
      maximum: 360
    PatchStringDateTime:
      type: string
      minLength: 1
      maxLength: 10
