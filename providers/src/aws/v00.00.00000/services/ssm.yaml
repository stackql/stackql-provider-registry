        OrganizationalUnitId:
          $ref: "#/components/schemas/NodeOrganizationalUnitId"
          description: The ID of the organization unit (OU) that the account is part of.
        OrganizationalUnitPath:
          $ref: "#/components/schemas/NodeOrganizationalUnitPath"
          description: "The path for the organizational unit (OU) that owns the managed node. The path for the OU is built using the IDs of the organization, root, and all OUs in the path down to and including the OU. For example: o-a1b2c3d4e5/r-f6g7h8i9j0example/ou-ghi0-awsccccc/ou-jkl0-awsddddd/"
    NodeAccountId:
