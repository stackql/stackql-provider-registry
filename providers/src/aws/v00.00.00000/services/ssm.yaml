  /UpdateMaintenanceWindow:
    post:
      operationId: UpdateMaintenanceWindow
      description: Updates an existing maintenance window. Only specified parameters are modified. The value you specify for Duration determines the specific end time for the maintenance window based on the time it begins. No maintenance window tasks are permitted to start after the resulting endtime minus the number of hours you specify for Cutoff. For example, if the maintenance window starts at 3 PM, the duration is three hours, and the value you specify for Cutoff is one hour, no maintenance window tasks can start after 5 PM.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.UpdateMaintenanceWindow
            default: AmazonSSM.UpdateMaintenanceWindow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WindowId:
                  $ref: "#/components/schemas/MaintenanceWindowId"
                  description: The ID of the maintenance window to update.
                Name:
                  $ref: "#/components/schemas/MaintenanceWindowName"
                  description: The name of the maintenance window.
                Description:
                  $ref: "#/components/schemas/MaintenanceWindowDescription"
                  description: An optional description for the update request.
                StartDate:
                  $ref: "#/components/schemas/MaintenanceWindowStringDateTime"
                  description: The date and time, in ISO-8601 Extended format, for when you want the maintenance window to become active. StartDate allows you to delay activation of the maintenance window until the specified future date. When using a rate schedule, if you provide a start date that occurs in the past, the current date and time are used as the start date.
                EndDate:
                  $ref: "#/components/schemas/MaintenanceWindowStringDateTime"
                  description: The date and time, in ISO-8601 Extended format, for when you want the maintenance window to become inactive. EndDate allows you to set a date and time in the future when the maintenance window will no longer run.
                Schedule:
                  $ref: "#/components/schemas/MaintenanceWindowSchedule"
                  description: The schedule of the maintenance window in the form of a cron or rate expression.
                ScheduleTimezone:
                  $ref: "#/components/schemas/MaintenanceWindowTimezone"
                  description: 'The time zone that the scheduled maintenance window executions are based on, in Internet Assigned Numbers Authority (IANA) format. For example: "America/Los_Angeles", "UTC", or "Asia/Seoul". For more information, see the Time Zone Database on the IANA website.'
                ScheduleOffset:
                  $ref: "#/components/schemas/MaintenanceWindowOffset"
                  description: The number of days to wait after the date and time specified by a cron expression before running the maintenance window. For example, the following cron expression schedules a maintenance window to run the third Tuesday of every month at 11:30 PM. cron(30 23 ? * TUE#3 *) If the schedule offset is 2, the maintenance window won't run until two days later.
                Duration:
                  $ref: "#/components/schemas/MaintenanceWindowDurationHours"
                  description: The duration of the maintenance window in hours.
                Cutoff:
                  $ref: "#/components/schemas/MaintenanceWindowCutoff"
                  description: The number of hours before the end of the maintenance window that Amazon Web Services Systems Manager stops scheduling new tasks for execution.
                AllowUnassociatedTargets:
                  $ref: "#/components/schemas/MaintenanceWindowAllowUnassociatedTargets"
                  description: Whether targets must be registered with the maintenance window before tasks can be defined for those targets.
                Enabled:
                  $ref: "#/components/schemas/MaintenanceWindowEnabled"
                  description: Whether the maintenance window is enabled.
                Replace:
                  $ref: "#/components/schemas/Boolean"
                  description: If True, then all fields that are required by the CreateMaintenanceWindow operation are also required for this API request. Optional fields that aren't specified are set to null.
              required:
                - WindowId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMaintenanceWindowResult"
  /UpdateMaintenanceWindowTarget:
    post:
      operationId: UpdateMaintenanceWindowTarget
      description: "Modifies the target of an existing maintenance window. You can change the following: Name Description Owner IDs for an ID target Tags for a Tag target From any supported tag type to another. The three supported tag types are ID target, Tag target, and resource group. For more information, see Target. If a parameter is null, then the corresponding field isn't modified."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.UpdateMaintenanceWindowTarget
            default: AmazonSSM.UpdateMaintenanceWindowTarget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WindowId:
                  $ref: "#/components/schemas/MaintenanceWindowId"
                  description: The maintenance window ID with which to modify the target.
                WindowTargetId:
                  $ref: "#/components/schemas/MaintenanceWindowTargetId"
                  description: The target ID to modify.
                Targets:
                  $ref: "#/components/schemas/Targets"
                  description: The targets to add or replace.
                OwnerInformation:
                  $ref: "#/components/schemas/OwnerInformation"
                  description: User-provided value that will be included in any Amazon CloudWatch Events events raised while running tasks for these targets in this maintenance window.
                Name:
                  $ref: "#/components/schemas/MaintenanceWindowName"
                  description: A name for the update.
                Description:
                  $ref: "#/components/schemas/MaintenanceWindowDescription"
                  description: An optional description for the update.
                Replace:
                  $ref: "#/components/schemas/Boolean"
                  description: If True, then all fields that are required by the RegisterTargetWithMaintenanceWindow operation are also required for this API request. Optional fields that aren't specified are set to null.
              required:
                - WindowId
                - WindowTargetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMaintenanceWindowTargetResult"
  /UpdateMaintenanceWindowTask:
    post:
      operationId: UpdateMaintenanceWindowTask
      description: "Modifies a task assigned to a maintenance window. You can't change the task type, but you can change the following values: TaskARN. For example, you can change a RUN_COMMAND task from AWS-RunPowerShellScript to AWS-RunShellScript. ServiceRoleArn TaskInvocationParameters Priority MaxConcurrency MaxErrors One or more targets must be specified for maintenance window Run Command-type tasks. Depending on the task, targets are optional for other maintenance window task types (Automation, Lambda, and Step Functions). For more information about running tasks that don't specify targets, see Registering maintenance window tasks without targets in the Amazon Web Services Systems Manager User Guide. If the value for a parameter in UpdateMaintenanceWindowTask is null, then the corresponding field isn't modified. If you set Replace to true, then all fields required by the RegisterTaskWithMaintenanceWindow operation are required for this request. Optional fields that aren't specified are set to null. When you update a maintenance window task that has options specified in TaskInvocationParameters, you must provide again all the TaskInvocationParameters values that you want to retain. The values you don't specify again are removed. For example, suppose that when you registered a Run Command task, you specified TaskInvocationParameters values for Comment, NotificationConfig, and OutputS3BucketName. If you update the maintenance window task and specify only a different OutputS3BucketName value, the values for Comment and NotificationConfig are removed."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.UpdateMaintenanceWindowTask
            default: AmazonSSM.UpdateMaintenanceWindowTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WindowId:
                  $ref: "#/components/schemas/MaintenanceWindowId"
                  description: The maintenance window ID that contains the task to modify.
                WindowTaskId:
                  $ref: "#/components/schemas/MaintenanceWindowTaskId"
                  description: The task ID to modify.
                Targets:
                  $ref: "#/components/schemas/Targets"
                  description: The targets (either managed nodes or tags) to modify. Managed nodes are specified using the format Key=instanceids,Values=instanceID_1,instanceID_2. Tags are specified using the format Key=tag_name,Values=tag_value. One or more targets must be specified for maintenance window Run Command-type tasks. Depending on the task, targets are optional for other maintenance window task types (Automation, Lambda, and Step Functions). For more information about running tasks that don't specify targets, see Registering maintenance window tasks without targets in the Amazon Web Services Systems Manager User Guide.
                TaskArn:
                  $ref: "#/components/schemas/MaintenanceWindowTaskArn"
                  description: The task ARN to modify.
                ServiceRoleArn:
                  $ref: "#/components/schemas/ServiceRole"
                  description: The Amazon Resource Name (ARN) of the IAM service role for Amazon Web Services Systems Manager to assume when running a maintenance window task. If you do not specify a service role ARN, Systems Manager uses a service-linked role in your account. If no appropriate service-linked role for Systems Manager exists in your account, it is created when you run RegisterTaskWithMaintenanceWindow. However, for an improved security posture, we strongly recommend creating a custom policy and custom service role for running your maintenance window tasks. The policy can be crafted to provide only the permissions needed for your particular maintenance window tasks. For more information, see Setting up Maintenance Windows in the in the Amazon Web Services Systems Manager User Guide.
                TaskParameters:
                  $ref: "#/components/schemas/MaintenanceWindowTaskParameters"
                  description: "The parameters to modify. TaskParameters has been deprecated. To specify parameters to pass to a task when it runs, instead use the Parameters option in the TaskInvocationParameters structure. For information about how Systems Manager handles these options for the supported maintenance window task types, see MaintenanceWindowTaskInvocationParameters. The map has the following format: Key: string, between 1 and 255 characters Value: an array of strings, each string is between 1 and 255 characters"
                TaskInvocationParameters:
                  $ref: "#/components/schemas/MaintenanceWindowTaskInvocationParameters"
                  description: The parameters that the task should use during execution. Populate only the fields that match the task type. All other fields should be empty. When you update a maintenance window task that has options specified in TaskInvocationParameters, you must provide again all the TaskInvocationParameters values that you want to retain. The values you don't specify again are removed. For example, suppose that when you registered a Run Command task, you specified TaskInvocationParameters values for Comment, NotificationConfig, and OutputS3BucketName. If you update the maintenance window task and specify only a different OutputS3BucketName value, the values for Comment and NotificationConfig are removed.
                Priority:
                  $ref: "#/components/schemas/MaintenanceWindowTaskPriority"
                  description: The new task priority to specify. The lower the number, the higher the priority. Tasks that have the same priority are scheduled in parallel.
                MaxConcurrency:
                  $ref: "#/components/schemas/MaxConcurrency"
                  description: "The new MaxConcurrency value you want to specify. MaxConcurrency is the number of targets that are allowed to run this task, in parallel. Although this element is listed as \"Required: No\", a value can be omitted only when you are registering or updating a targetless task You must provide a value in all other cases. For maintenance window tasks without a target specified, you can't supply a value for this option. Instead, the system inserts a placeholder value of 1. This value doesn't affect the running of your task."
                MaxErrors:
                  $ref: "#/components/schemas/MaxErrors"
                  description: "The new MaxErrors value to specify. MaxErrors is the maximum number of errors that are allowed before the task stops being scheduled. Although this element is listed as \"Required: No\", a value can be omitted only when you are registering or updating a targetless task You must provide a value in all other cases. For maintenance window tasks without a target specified, you can't supply a value for this option. Instead, the system inserts a placeholder value of 1. This value doesn't affect the running of your task."
                LoggingInfo:
                  $ref: "#/components/schemas/LoggingInfo"
                  description: The new logging location in Amazon S3 to specify. LoggingInfo has been deprecated. To specify an Amazon Simple Storage Service (Amazon S3) bucket to contain logs, instead use the OutputS3BucketName and OutputS3KeyPrefix options in the TaskInvocationParameters structure. For information about how Amazon Web Services Systems Manager handles these options for the supported maintenance window task types, see MaintenanceWindowTaskInvocationParameters.
                Name:
                  $ref: "#/components/schemas/MaintenanceWindowName"
                  description: The new task name to specify.
                Description:
                  $ref: "#/components/schemas/MaintenanceWindowDescription"
                  description: The new task description to specify.
                Replace:
                  $ref: "#/components/schemas/Boolean"
                  description: If True, then all fields that are required by the RegisterTaskWithMaintenanceWindow operation are also required for this API request. Optional fields that aren't specified are set to null.
                CutoffBehavior:
                  $ref: "#/components/schemas/MaintenanceWindowTaskCutoffBehavior"
                  description: "Indicates whether tasks should continue to run after the cutoff time specified in the maintenance windows is reached. CONTINUE_TASK: When the cutoff time is reached, any tasks that are running continue. The default value. CANCEL_TASK: For Automation, Lambda, Step Functions tasks: When the cutoff time is reached, any task invocations that are already running continue, but no new task invocations are started. For Run Command tasks: When the cutoff time is reached, the system sends a CancelCommand operation that attempts to cancel the command associated with the task. However, there is no guarantee that the command will be terminated and the underlying process stopped. The status for tasks that are not completed is TIMED_OUT."
                AlarmConfiguration:
                  $ref: "#/components/schemas/AlarmConfiguration"
                  description: The CloudWatch alarm you want to apply to your maintenance window task.
              required:
                - WindowId
                - WindowTaskId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMaintenanceWindowTaskResult"
  /UpdateManagedInstanceRole:
    post:
      operationId: UpdateManagedInstanceRole
      description: Changes the Identity and Access Management (IAM) role that is assigned to the on-premises server, edge device, or virtual machines (VM). IAM roles are first assigned to these hybrid nodes during the activation process. For more information, see CreateActivation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.UpdateManagedInstanceRole
            default: AmazonSSM.UpdateManagedInstanceRole
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceId:
                  $ref: "#/components/schemas/ManagedInstanceId"
                  description: The ID of the managed node where you want to update the role.
                IamRole:
                  $ref: "#/components/schemas/IamRole"
                  description: The name of the Identity and Access Management (IAM) role that you want to assign to the managed node. This IAM role must provide AssumeRole permissions for the Amazon Web Services Systems Manager service principal ssm.amazonaws.com. For more information, see Create the IAM service role required for Systems Manager in hybrid and multicloud environments in the Amazon Web Services Systems Manager User Guide. You can't specify an IAM service-linked role for this parameter. You must create a unique role.
              required:
                - InstanceId
                - IamRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateManagedInstanceRoleResult"
  /UpdateOpsItem:
    post:
      operationId: UpdateOpsItem
      description: Edit or change an OpsItem. You must have permission in Identity and Access Management (IAM) to update an OpsItem. For more information, see Set up OpsCenter in the Amazon Web Services Systems Manager User Guide. Operations engineers and IT professionals use Amazon Web Services Systems Manager OpsCenter to view, investigate, and remediate operational issues impacting the performance and health of their Amazon Web Services resources. For more information, see Amazon Web Services Systems Manager OpsCenter in the Amazon Web Services Systems Manager User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.UpdateOpsItem
            default: AmazonSSM.UpdateOpsItem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/OpsItemDescription"
                  description: User-defined text that contains information about the OpsItem, in Markdown format.
                OperationalData:
                  $ref: "#/components/schemas/OpsItemOperationalData"
                  description: "Add new keys or edit existing key-value pairs of the OperationalData map in the OpsItem object. Operational data is custom data that provides useful reference details about the OpsItem. For example, you can specify log files, error strings, license keys, troubleshooting tips, or other relevant data. You enter operational data as key-value pairs. The key has a maximum length of 128 characters. The value has a maximum size of 20 KB. Operational data keys can't begin with the following: amazon, aws, amzn, ssm, /amazon, /aws, /amzn, /ssm. You can choose to make the data searchable by other users in the account or you can restrict search access. Searchable data means that all users with access to the OpsItem Overview page (as provided by the DescribeOpsItems API operation) can view and search on the specified data. Operational data that isn't searchable is only viewable by users who have access to the OpsItem (as provided by the GetOpsItem API operation). Use the /aws/resources key in OperationalData to specify a related resource in the request. Use the /aws/automations key in OperationalData to associate an Automation runbook with the OpsItem. To view Amazon Web Services CLI example commands that use these keys, see Creating OpsItems manually in the Amazon Web Services Systems Manager User Guide."
                OperationalDataToDelete:
                  $ref: "#/components/schemas/OpsItemOpsDataKeysList"
                  description: Keys that you want to remove from the OperationalData map.
                Notifications:
                  $ref: "#/components/schemas/OpsItemNotifications"
                  description: The Amazon Resource Name (ARN) of an SNS topic where notifications are sent when this OpsItem is edited or changed.
                Priority:
                  $ref: "#/components/schemas/OpsItemPriority"
                  description: The importance of this OpsItem in relation to other OpsItems in the system.
                RelatedOpsItems:
                  $ref: "#/components/schemas/RelatedOpsItems"
                  description: One or more OpsItems that share something in common with the current OpsItems. For example, related OpsItems can include OpsItems with similar error messages, impacted resources, or statuses for the impacted resource.
                Status:
                  $ref: "#/components/schemas/OpsItemStatus"
                  description: The OpsItem status. For more information, see Editing OpsItem details in the Amazon Web Services Systems Manager User Guide.
                OpsItemId:
                  $ref: "#/components/schemas/OpsItemId"
                  description: The ID of the OpsItem.
                Title:
                  $ref: "#/components/schemas/OpsItemTitle"
                  description: A short heading that describes the nature of the OpsItem and the impacted resource.
                Category:
                  $ref: "#/components/schemas/OpsItemCategory"
                  description: Specify a new category for an OpsItem.
                Severity:
                  $ref: "#/components/schemas/OpsItemSeverity"
                  description: Specify a new severity for an OpsItem.
                ActualStartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The time a runbook workflow started. Currently reported only for the OpsItem type /aws/changerequest.
                ActualEndTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The time a runbook workflow ended. Currently reported only for the OpsItem type /aws/changerequest.
                PlannedStartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The time specified in a change request for a runbook workflow to start. Currently supported only for the OpsItem type /aws/changerequest.
                PlannedEndTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The time specified in a change request for a runbook workflow to end. Currently supported only for the OpsItem type /aws/changerequest.
                OpsItemArn:
                  $ref: "#/components/schemas/OpsItemArn"
                  description: The OpsItem Amazon Resource Name (ARN).
              required:
                - OpsItemId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOpsItemResponse"
  /UpdateOpsMetadata:
    post:
      operationId: UpdateOpsMetadata
      description: Amazon Web Services Systems Manager calls this API operation when you edit OpsMetadata in Application Manager.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.UpdateOpsMetadata
            default: AmazonSSM.UpdateOpsMetadata
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OpsMetadataArn:
                  $ref: "#/components/schemas/OpsMetadataArn"
                  description: The Amazon Resource Name (ARN) of the OpsMetadata Object to update.
                MetadataToUpdate:
                  $ref: "#/components/schemas/MetadataMap"
                  description: Metadata to add to an OpsMetadata object.
                KeysToDelete:
                  $ref: "#/components/schemas/MetadataKeysToDeleteList"
                  description: The metadata keys to delete from the OpsMetadata object.
              required:
                - OpsMetadataArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOpsMetadataResult"
  /UpdatePatchBaseline:
    post:
      operationId: UpdatePatchBaseline
      description: Modifies an existing patch baseline. Fields not specified in the request are left unchanged. For information about valid key-value pairs in PatchFilters for each supported operating system type, see PatchFilter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.UpdatePatchBaseline
            default: AmazonSSM.UpdatePatchBaseline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                BaselineId:
                  $ref: "#/components/schemas/BaselineId"
                  description: The ID of the patch baseline to update.
                Name:
                  $ref: "#/components/schemas/BaselineName"
                  description: The name of the patch baseline.
                GlobalFilters:
                  $ref: "#/components/schemas/PatchFilterGroup"
                  description: A set of global filters used to include patches in the baseline. The GlobalFilters parameter can be configured only by using the CLI or an Amazon Web Services SDK. It can't be configured from the Patch Manager console, and its value isn't displayed in the console.
                ApprovalRules:
                  $ref: "#/components/schemas/PatchRuleGroup"
                  description: A set of rules used to include patches in the baseline.
                ApprovedPatches:
                  $ref: "#/components/schemas/PatchIdList"
                  description: A list of explicitly approved patches for the baseline. For information about accepted formats for lists of approved patches and rejected patches, see Package name formats for approved and rejected patch lists in the Amazon Web Services Systems Manager User Guide.
                ApprovedPatchesComplianceLevel:
                  $ref: "#/components/schemas/PatchComplianceLevel"
                  description: Assigns a new compliance severity level to an existing patch baseline.
                ApprovedPatchesEnableNonSecurity:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether the list of approved patches includes non-security updates that should be applied to the managed nodes. The default value is false. Applies to Linux managed nodes only.
                RejectedPatches:
                  $ref: "#/components/schemas/PatchIdList"
                  description: A list of explicitly rejected patches for the baseline. For information about accepted formats for lists of approved patches and rejected patches, see Package name formats for approved and rejected patch lists in the Amazon Web Services Systems Manager User Guide.
                RejectedPatchesAction:
                  $ref: "#/components/schemas/PatchAction"
                  description: "The action for Patch Manager to take on patches included in the RejectedPackages list. ALLOW_AS_DEPENDENCY Linux and macOS: A package in the rejected patches list is installed only if it is a dependency of another package. It is considered compliant with the patch baseline, and its status is reported as INSTALLED_OTHER. This is the default action if no option is specified. Windows Server: Windows Server doesn't support the concept of package dependencies. If a package in the rejected patches list and already installed on the node, its status is reported as INSTALLED_OTHER. Any package not already installed on the node is skipped. This is the default action if no option is specified. BLOCK All OSs: Packages in the rejected patches list, and packages that include them as dependencies, aren't installed by Patch Manager under any circumstances. State value assignment for patch compliance: If a package was installed before it was added to the rejected patches list, or is installed outside of Patch Manager afterward, it's considered noncompliant with the patch baseline and its status is reported as INSTALLED_REJECTED. If an update attempts to install a dependency package that is now rejected by the baseline, when previous versions of the package were not rejected, the package being updated is reported as MISSING for SCAN operations and as FAILED for INSTALL operations."
                Description:
                  $ref: "#/components/schemas/BaselineDescription"
                  description: A description of the patch baseline.
                Sources:
                  $ref: "#/components/schemas/PatchSourceList"
                  description: Information about the patches to use to update the managed nodes, including target operating systems and source repositories. Applies to Linux managed nodes only.
                AvailableSecurityUpdatesComplianceStatus:
                  $ref: "#/components/schemas/PatchComplianceStatus"
                  description: "Indicates the status to be assigned to security patches that are available but not approved because they don't meet the installation criteria specified in the patch baseline. Example scenario: Security patches that you might want installed can be skipped if you have specified a long period to wait after a patch is released before installation. If an update to the patch is released during your specified waiting period, the waiting period for installing the patch starts over. If the waiting period is too long, multiple versions of the patch could be released but never installed. Supported for Windows Server managed nodes only."
                Replace:
                  $ref: "#/components/schemas/Boolean"
                  description: If True, then all fields that are required by the CreatePatchBaseline operation are also required for this API request. Optional fields that aren't specified are set to null.
              required:
                - BaselineId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePatchBaselineResult"
  /UpdateResourceDataSync:
    post:
      operationId: UpdateResourceDataSync
      description: Update a resource data sync. After you create a resource data sync for a Region, you can't change the account options for that sync. For example, if you create a sync in the us-east-2 (Ohio) Region and you choose the Include only the current account option, you can't edit that sync later and choose the Include all accounts from my Organizations configuration option. Instead, you must delete the first resource data sync, and create a new one. This API operation only supports a resource data sync that was created with a SyncFromSource SyncType.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.UpdateResourceDataSync
            default: AmazonSSM.UpdateResourceDataSync
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SyncName:
                  $ref: "#/components/schemas/ResourceDataSyncName"
                  description: The name of the resource data sync you want to update.
                SyncType:
                  $ref: "#/components/schemas/ResourceDataSyncType"
                  description: The type of resource data sync. The supported SyncType is SyncFromSource.
                SyncSource:
                  $ref: "#/components/schemas/ResourceDataSyncSource"
                  description: Specify information about the data sources to synchronize.
              required:
                - SyncName
                - SyncType
                - SyncSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResourceDataSyncResult"
  /UpdateServiceSetting:
    post:
      operationId: UpdateServiceSetting
      description: ServiceSetting is an account-level setting for an Amazon Web Services service. This setting defines how a user interacts with or uses a service or a feature of a service. For example, if an Amazon Web Services service charges money to the account based on feature or service usage, then the Amazon Web Services service team might create a default setting of "false". This means the user can't use this feature unless they change the setting to "true" and intentionally opt in for a paid feature. Services map a SettingId object to a setting value. Amazon Web Services services teams define the default value for a SettingId. You can't create a new SettingId, but you can overwrite the default value if you have the ssm:UpdateServiceSetting permission for the setting. Use the GetServiceSetting API operation to view the current value. Or, use the ResetServiceSetting to change the value back to the original value defined by the Amazon Web Services service team. Update the service setting for the account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.UpdateServiceSetting
            default: AmazonSSM.UpdateServiceSetting
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SettingId:
                  $ref: "#/components/schemas/ServiceSettingId"
                  description: The Amazon Resource Name (ARN) of the service setting to update. For example, arn:aws:ssm:us-east-1:111122223333:servicesetting/ssm/parameter-store/high-throughput-enabled. The setting ID can be one of the following. /ssm/appmanager/appmanager-enabled /ssm/automation/customer-script-log-destination /ssm/automation/customer-script-log-group-name /ssm/automation/enable-adaptive-concurrency /ssm/documents/console/public-sharing-permission /ssm/managed-instance/activation-tier /ssm/managed-instance/default-ec2-instance-management-role /ssm/opsinsights/opscenter /ssm/parameter-store/default-parameter-tier /ssm/parameter-store/high-throughput-enabled Permissions to update the /ssm/managed-instance/default-ec2-instance-management-role setting should only be provided to administrators. Implement least privilege access when allowing individuals to configure or modify the Default Host Management Configuration.
                SettingValue:
                  $ref: "#/components/schemas/ServiceSettingValue"
                  description: The new value to specify for the service setting. The following list specifies the available values for each setting. For /ssm/appmanager/appmanager-enabled, enter True or False. For /ssm/automation/customer-script-log-destination, enter CloudWatch. For /ssm/automation/customer-script-log-group-name, enter the name of an Amazon CloudWatch Logs log group. For /ssm/documents/console/public-sharing-permission, enter Enable or Disable. For /ssm/managed-instance/activation-tier, enter standard or advanced. For /ssm/managed-instance/default-ec2-instance-management-role, enter the name of an IAM role. For /ssm/opsinsights/opscenter, enter Enabled or Disabled. For /ssm/parameter-store/default-parameter-tier, enter Standard, Advanced, or Intelligent-Tiering For /ssm/parameter-store/high-throughput-enabled, enter true or false.
              required:
                - SettingId
                - SettingValue
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateServiceSettingResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceTypeForTagging:
      type: string
      enum:
        - Document
        - ManagedInstance
        - MaintenanceWindow
        - Parameter
        - PatchBaseline
        - OpsItem
        - OpsMetadata
        - Automation
        - Association
    ResourceId:
      type: string
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata that you assign to your Amazon Web Services resources. Tags enable you to categorize your resources in different ways, for example, by purpose, owner, or environment. In Amazon Web Services Systems Manager, you can apply tags to Systems Manager documents (SSM documents), managed nodes, maintenance windows, parameters, patch baselines, OpsItems, and OpsMetadata.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The name of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    AddTagsToResourceResult:
      type: object
    OpsItemId:
      type: string
      pattern: ^(oi)-[0-9a-f]{12}$
    OpsItemRelatedItemAssociationType:
      type: string
    OpsItemRelatedItemAssociationResourceType:
      type: string
    OpsItemRelatedItemAssociationResourceUri:
      type: string
    AssociateOpsItemRelatedItemResponse:
      type: object
      properties:
        AssociationId:
          $ref: "#/components/schemas/OpsItemRelatedItemAssociationId"
          description: The association ID.
    OpsItemRelatedItemAssociationId:
      type: string
    CommandId:
      type: string
      minLength: 36
      maxLength: 36
    InstanceIdList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceId"
    InstanceId:
      type: string
      pattern: (^i-(\w{8}|\w{17})$)|(^mi-\w{17}$)
    CancelCommandResult:
      description: Whether or not the command was successfully canceled. There is no guarantee that a request can be canceled.
      type: object
    MaintenanceWindowExecutionId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
    CancelMaintenanceWindowExecutionResult:
      type: object
      properties:
        WindowExecutionId:
          $ref: "#/components/schemas/MaintenanceWindowExecutionId"
          description: The ID of the maintenance window execution that has been stopped.
    ActivationDescription:
      type: string
      minLength: 0
      maxLength: 256
    DefaultInstanceName:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    IamRole:
      type: string
      maxLength: 64
    RegistrationLimit:
      type: integer
      minimum: 1
      maximum: 1000
    ExpirationDate:
      type: string
      format: date-time
    RegistrationMetadataList:
      type: array
      items:
        $ref: "#/components/schemas/RegistrationMetadataItem"
    RegistrationMetadataItem:
      description: Reserved for internal use.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/RegistrationMetadataKey"
          description: Reserved for internal use.
        Value:
          $ref: "#/components/schemas/RegistrationMetadataValue"
          description: Reserved for internal use.
      required:
        - Key
        - Value
    RegistrationMetadataKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^(?!\s*$).+
    RegistrationMetadataValue:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(?!\s*$).+
    CreateActivationResult:
      type: object
      properties:
        ActivationId:
          $ref: "#/components/schemas/ActivationId"
          description: The ID number generated by the system when it processed the activation. The activation ID functions like a user name.
        ActivationCode:
          $ref: "#/components/schemas/ActivationCode"
          description: The code the system generates when it processes the activation. The activation code functions like a password to validate the activation ID.
    ActivationId:
      type: string
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    ActivationCode:
      type: string
      minLength: 20
      maxLength: 250
    DocumentARN:
      type: string
      pattern: ^[a-zA-Z0-9_\-.:/]{3,128}$
    DocumentVersion:
      type: string
      pattern: ([$]LATEST|[$]DEFAULT|^[1-9][0-9]*$)
    Parameters:
      type: object
      properties: {}
    Targets:
      type: array
      items:
        $ref: "#/components/schemas/Target"
    Target:
      description: "An array of search criteria that targets managed nodes using a key-value pair that you specify. One or more targets must be specified for maintenance window Run Command-type tasks. Depending on the task, targets are optional for other maintenance window task types (Automation, Lambda, and Step Functions). For more information about running tasks that don't specify targets, see Registering maintenance window tasks without targets in the Amazon Web Services Systems Manager User Guide. Supported formats include the following. For all Systems Manager tools: Key=tag-key,Values=tag-value-1,tag-value-2 For Automation and Change Manager: Key=tag:tag-key,Values=tag-value Key=ResourceGroup,Values=resource-group-name Key=ParameterValues,Values=value-1,value-2,value-3 To target all instances in the Amazon Web Services Region: Key=AWS::EC2::Instance,Values=* Key=InstanceIds,Values=* For Run Command and Maintenance Windows: Key=InstanceIds,Values=instance-id-1,instance-id-2,instance-id-3 Key=tag:tag-key,Values=tag-value-1,tag-value-2 Key=resource-groups:Name,Values=resource-group-name Additionally, Maintenance Windows support targeting resource types: Key=resource-groups:ResourceTypeFilters,Values=resource-type-1,resource-type-2 For State Manager: Key=InstanceIds,Values=instance-id-1,instance-id-2,instance-id-3 Key=tag:tag-key,Values=tag-value-1,tag-value-2 To target all instances in the Amazon Web Services Region: Key=InstanceIds,Values=* For more information about how to send commands that target managed nodes using Key,Value parameters, see Targeting multiple managed nodes in the Amazon Web Services Systems Manager User Guide."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TargetKey"
          description: User-defined criteria for sending commands that target managed nodes that meet the criteria.
        Values:
          $ref: "#/components/schemas/TargetValues"
          description: User-defined criteria that maps to Key. For example, if you specified tag:ServerRole, you could specify value:WebServer to run a command on instances that include EC2 tags of ServerRole,WebServer. Depending on the type of target, the maximum number of values for a key might be lower than the global maximum of 50.
    TargetKey:
      type: string
      minLength: 1
      maxLength: 163
      pattern: ^[\p{L}\p{Z}\p{N}_.:/=\-@]*$|resource-groups:ResourceTypeFilters|resource-groups:Name
    TargetValues:
      type: array
      items:
        $ref: "#/components/schemas/TargetValue"
    TargetValue:
      type: string
    ScheduleExpression:
      type: string
      minLength: 1
      maxLength: 256
    InstanceAssociationOutputLocation:
      description: An S3 bucket where you want to store the results of this request. For the minimal permissions required to enable Amazon S3 output for an association, see Create an association (console) in the Systems Manager User Guide.
      type: object
      properties:
        S3Location:
          $ref: "#/components/schemas/S3OutputLocation"
          description: An S3 bucket where you want to store the results of this request.
    S3OutputLocation:
      description: An S3 bucket where you want to store the results of this request.
      type: object
      properties:
        OutputS3Region:
          $ref: "#/components/schemas/S3Region"
          description: The Amazon Web Services Region of the S3 bucket.
        OutputS3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the S3 bucket.
        OutputS3KeyPrefix:
          $ref: "#/components/schemas/S3KeyPrefix"
          description: The S3 bucket subfolder.
    S3Region:
      type: string
      minLength: 3
      maxLength: 20
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
    S3KeyPrefix:
      type: string
      maxLength: 500
    AssociationName:
      type: string
      pattern: ^[a-zA-Z0-9_\-.]{3,128}$
    AutomationTargetParameterName:
      type: string
      minLength: 1
      maxLength: 50
    MaxErrors:
      type: string
      minLength: 1
      maxLength: 7
      pattern: ^([1-9][0-9]*|[0]|[1-9][0-9]%|[0-9]%|100%)$
    MaxConcurrency:
      type: string
      minLength: 1
      maxLength: 7
      pattern: ^([1-9][0-9]*|[1-9][0-9]%|[1-9]%|100%)$
    AssociationComplianceSeverity:
      type: string
      enum:
        - CRITICAL
        - HIGH
        - MEDIUM
        - LOW
        - UNSPECIFIED
    AssociationSyncCompliance:
      type: string
      enum:
        - AUTO
        - MANUAL
    ApplyOnlyAtCronInterval:
      type: boolean
    CalendarNameOrARNList:
      type: array
      items:
        $ref: "#/components/schemas/CalendarNameOrARN"
    CalendarNameOrARN:
      type: string
    TargetLocations:
      type: array
      items:
        $ref: "#/components/schemas/TargetLocation"
    TargetLocation:
      description: The combination of Amazon Web Services Regions and Amazon Web Services accounts targeted by the current Automation execution.
      type: object
      properties:
        Accounts:
          $ref: "#/components/schemas/Accounts"
          description: The Amazon Web Services accounts targeted by the current Automation execution.
        Regions:
          $ref: "#/components/schemas/Regions"
          description: The Amazon Web Services Regions targeted by the current Automation execution.
        TargetLocationMaxConcurrency:
          $ref: "#/components/schemas/MaxConcurrency"
          description: The maximum number of Amazon Web Services Regions and Amazon Web Services accounts allowed to run the Automation concurrently. TargetLocationMaxConcurrency has a default value of 1.
        TargetLocationMaxErrors:
          $ref: "#/components/schemas/MaxErrors"
          description: The maximum number of errors allowed before the system stops queueing additional Automation executions for the currently running Automation. TargetLocationMaxErrors has a default value of 0.
        ExecutionRoleName:
          $ref: "#/components/schemas/ExecutionRoleName"
          description: The Automation execution role used by the currently running Automation. If not specified, the default value is AWS-SystemsManager-AutomationExecutionRole.
        TargetLocationAlarmConfiguration:
          $ref: "#/components/schemas/AlarmConfiguration"
        IncludeChildOrganizationUnits:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether to include child organizational units (OUs) that are children of the targeted OUs. The default is false. This parameter is not supported by State Manager.
        ExcludeAccounts:
          $ref: "#/components/schemas/ExcludeAccounts"
          description: Amazon Web Services accounts or organizational units to exclude as expanded targets.
        Targets:
          $ref: "#/components/schemas/Targets"
          description: A list of key-value mappings to target resources. If you specify values for this data type, you must also specify a value for TargetParameterName. This Targets parameter takes precedence over the StartAutomationExecution:Targets parameter if both are supplied.
        TargetsMaxConcurrency:
          $ref: "#/components/schemas/MaxConcurrency"
          description: The maximum number of targets allowed to run this task in parallel. This TargetsMaxConcurrency takes precedence over the StartAutomationExecution:MaxConcurrency parameter if both are supplied.
        TargetsMaxErrors:
          $ref: "#/components/schemas/MaxErrors"
          description: The maximum number of errors that are allowed before the system stops running the automation on additional targets. This TargetsMaxErrors parameter takes precedence over the StartAutomationExecution:MaxErrors parameter if both are supplied.
    Accounts:
      type: array
      items:
        $ref: "#/components/schemas/Account"
    Account:
      type: string
    Regions:
      type: array
      items:
        $ref: "#/components/schemas/Region"
    Region:
      type: string
    ExecutionRoleName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\w+=,.@/-]+"
    AlarmConfiguration:
      description: The details for the CloudWatch alarm you want to apply to an automation or command.
      type: object
      properties:
        IgnorePollAlarmFailure:
          $ref: "#/components/schemas/Boolean"
          description: When this value is true, your automation or command continues to run in cases where we can’t retrieve alarm status information from CloudWatch. In cases where we successfully retrieve an alarm status of OK or INSUFFICIENT_DATA, the automation or command continues to run, regardless of this value. Default is false.
        Alarms:
          $ref: "#/components/schemas/AlarmList"
          description: The name of the CloudWatch alarm specified in the configuration.
      required:
        - Alarms
    Boolean:
      type: boolean
    AlarmList:
      type: array
      items:
        $ref: "#/components/schemas/Alarm"
    Alarm:
      description: A CloudWatch alarm you apply to an automation or command.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/AlarmName"
          description: The name of your CloudWatch alarm.
      required:
        - Name
    AlarmName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^(?!\s*$).+
    ExcludeAccounts:
      type: array
      items:
        $ref: "#/components/schemas/ExcludeAccount"
    ExcludeAccount:
      type: string
      minLength: 6
      maxLength: 68
      pattern: ^(ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})|(\d{12})$
    ScheduleOffset:
      type: integer
      minimum: 1
      maximum: 6
    Duration:
      type: integer
      minimum: 1
      maximum: 24
    TargetMaps:
      type: array
      items:
        $ref: "#/components/schemas/TargetMap"
    TargetMap:
      type: object
      properties: {}
    AssociationDispatchAssumeRoleArn:
      type: string
      minLength: 1
      maxLength: 512
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role/.+
    CreateAssociationResult:
      type: object
      properties:
        AssociationDescription:
          $ref: "#/components/schemas/AssociationDescription"
          description: Information about the association.
    AssociationDescription:
      description: Describes the parameters for a document.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DocumentARN"
          description: The name of the SSM document.
        InstanceId:
          $ref: "#/components/schemas/InstanceId"
          description: The managed node ID.
        AssociationVersion:
          $ref: "#/components/schemas/AssociationVersion"
          description: The association version.
        Date:
          $ref: "#/components/schemas/DateTime"
          description: The date when the association was made.
        LastUpdateAssociationDate:
          $ref: "#/components/schemas/DateTime"
          description: The date when the association was last updated.
        Status:
          $ref: "#/components/schemas/AssociationStatus"
          description: The association status.
        Overview:
          $ref: "#/components/schemas/AssociationOverview"
          description: Information about the association.
        DocumentVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The document version.
        AutomationTargetParameterName:
          $ref: "#/components/schemas/AutomationTargetParameterName"
          description: Choose the parameter that will define how your automation will branch out. This target is required for associations that use an Automation runbook and target resources by using rate controls. Automation is a tool in Amazon Web Services Systems Manager.
        Parameters:
          type: object
          properties: {}
          description: A description of the parameters for a document.
        AssociationId:
          $ref: "#/components/schemas/AssociationId"
          description: The association ID.
        Targets:
          $ref: "#/components/schemas/Targets"
          description: The managed nodes targeted by the request.
        ScheduleExpression:
          $ref: "#/components/schemas/ScheduleExpression"
          description: A cron expression that specifies a schedule when the association runs.
        OutputLocation:
          $ref: "#/components/schemas/InstanceAssociationOutputLocation"
          description: An S3 bucket where you want to store the output details of the request.
        LastExecutionDate:
          $ref: "#/components/schemas/DateTime"
          description: The date on which the association was last run.
        LastSuccessfulExecutionDate:
          $ref: "#/components/schemas/DateTime"
          description: The last date on which the association was successfully run.
        AssociationName:
          $ref: "#/components/schemas/AssociationName"
          description: The association name.
        MaxErrors:
          $ref: "#/components/schemas/MaxErrors"
          description: The number of errors that are allowed before the system stops sending requests to run the association on additional targets. You can specify either an absolute number of errors, for example 10, or a percentage of the target set, for example 10%. If you specify 3, for example, the system stops sending requests when the fourth error is received. If you specify 0, then the system stops sending requests after the first error is returned. If you run an association on 50 managed nodes and set MaxError to 10%, then the system stops sending the request when the sixth error is received. Executions that are already running an association when MaxErrors is reached are allowed to complete, but some of these executions may fail as well. If you need to ensure that there won't be more than max-errors failed executions, set MaxConcurrency to 1 so that executions proceed one at a time.
        MaxConcurrency:
          $ref: "#/components/schemas/MaxConcurrency"
          description: The maximum number of targets allowed to run the association at the same time. You can specify a number, for example 10, or a percentage of the target set, for example 10%. The default value is 100%, which means all targets run the association at the same time. If a new managed node starts and attempts to run an association while Systems Manager is running MaxConcurrency associations, the association is allowed to run. During the next association interval, the new managed node will process its association within the limit specified for MaxConcurrency.
        ComplianceSeverity:
          $ref: "#/components/schemas/AssociationComplianceSeverity"
          description: The severity level that is assigned to the association.
        SyncCompliance:
          $ref: "#/components/schemas/AssociationSyncCompliance"
          description: The mode for generating association compliance. You can specify AUTO or MANUAL. In AUTO mode, the system uses the status of the association execution to determine the compliance status. If the association execution runs successfully, then the association is COMPLIANT. If the association execution doesn't run successfully, the association is NON-COMPLIANT. In MANUAL mode, you must specify the AssociationId as a parameter for the PutComplianceItems API operation. In this case, compliance data isn't managed by State Manager, a tool in Amazon Web Services Systems Manager. It is managed by your direct call to the PutComplianceItems API operation. By default, all associations use AUTO mode.
        ApplyOnlyAtCronInterval:
          $ref: "#/components/schemas/ApplyOnlyAtCronInterval"
          description: By default, when you create a new associations, the system runs it immediately after it is created and then according to the schedule you specified. Specify this option if you don't want an association to run immediately after you create it. This parameter isn't supported for rate expressions.
        CalendarNames:
          $ref: "#/components/schemas/CalendarNameOrARNList"
          description: The names or Amazon Resource Names (ARNs) of the Change Calendar type documents your associations are gated under. The associations only run when that change calendar is open. For more information, see Amazon Web Services Systems Manager Change Calendar in the Amazon Web Services Systems Manager User Guide.
        TargetLocations:
          $ref: "#/components/schemas/TargetLocations"
          description: The combination of Amazon Web Services Regions and Amazon Web Services accounts where you want to run the association.
        ScheduleOffset:
          $ref: "#/components/schemas/ScheduleOffset"
          description: Number of days to wait after the scheduled day to run an association.
        Duration:
          $ref: "#/components/schemas/Duration"
          description: The number of hours that an association can run on specified targets. After the resulting cutoff time passes, associations that are currently running are cancelled, and no pending executions are started on remaining targets.
        TargetMaps:
          $ref: "#/components/schemas/TargetMaps"
          description: A key-value mapping of document parameters to target resources. Both Targets and TargetMaps can't be specified together.
        AlarmConfiguration:
          $ref: "#/components/schemas/AlarmConfiguration"
        TriggeredAlarms:
          $ref: "#/components/schemas/AlarmStateInformationList"
          description: The CloudWatch alarm that was invoked during the association.
        AssociationDispatchAssumeRole:
          $ref: "#/components/schemas/AssociationDispatchAssumeRoleArn"
          description: A role used by association to take actions on your behalf. State Manager will assume this role and call required APIs when dispatching configurations to nodes. If not specified, service-linked role for Systems Manager will be used by default.
    AssociationVersion:
      type: string
      pattern: ([$]LATEST)|([1-9][0-9]*)
    DateTime:
      type: string
      format: date-time
    AssociationStatus:
      description: Describes an association status.
      type: object
      properties:
        Date:
          $ref: "#/components/schemas/DateTime"
          description: The date when the status changed.
        Name:
          $ref: "#/components/schemas/AssociationStatusName"
          description: The status.
        Message:
          $ref: "#/components/schemas/StatusMessage"
          description: The reason for the status.
        AdditionalInfo:
          $ref: "#/components/schemas/StatusAdditionalInfo"
          description: A user-defined string.
      required:
        - Date
        - Name
        - Message
    AssociationStatusName:
      type: string
      enum:
        - Pending
        - Success
        - Failed
    StatusMessage:
      type: string
      minLength: 1
      maxLength: 1024
    StatusAdditionalInfo:
      type: string
      maxLength: 1024
    AssociationOverview:
      description: Information about the association.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/StatusName"
          description: "The status of the association. Status can be: Pending, Success, or Failed."
        DetailedStatus:
          $ref: "#/components/schemas/StatusName"
          description: A detailed status of the association.
        AssociationStatusAggregatedCount:
          type: object
          properties: {}
          description: Returns the number of targets for the association status. For example, if you created an association with two managed nodes, and one of them was successful, this would return the count of managed nodes by status.
    StatusName:
      type: string
    AssociationId:
      type: string
      pattern: "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}"
    AlarmStateInformationList:
      type: array
      items:
        $ref: "#/components/schemas/AlarmStateInformation"
    AlarmStateInformation:
      description: The details about the state of your CloudWatch alarm.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/AlarmName"
          description: The name of your CloudWatch alarm.
        State:
          $ref: "#/components/schemas/ExternalAlarmState"
          description: The state of your CloudWatch alarm.
      required:
        - Name
        - State
    ExternalAlarmState:
      type: string
      enum:
        - UNKNOWN
        - ALARM
    CreateAssociationBatchRequestEntries:
      type: array
      items:
        $ref: "#/components/schemas/CreateAssociationBatchRequestEntry"
    CreateAssociationBatchRequestEntry:
      description: Describes the association of a Amazon Web Services Systems Manager document (SSM document) and a managed node.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DocumentARN"
          description: "The name of the SSM document that contains the configuration information for the managed node. You can specify Command or Automation runbooks. You can specify Amazon Web Services-predefined documents, documents you created, or a document that is shared with you from another account. For SSM documents that are shared with you from other Amazon Web Services accounts, you must specify the complete SSM document ARN, in the following format: arn:aws:ssm:region:account-id:document/document-name For example: arn:aws:ssm:us-east-2:12345678912:document/My-Shared-Document For Amazon Web Services-predefined documents and SSM documents you created in your account, you only need to specify the document name. For example, AWS-ApplyPatchBaseline or My-Document."
        InstanceId:
          $ref: "#/components/schemas/InstanceId"
          description: The managed node ID. InstanceId has been deprecated. To specify a managed node ID for an association, use the Targets parameter. Requests that include the parameter InstanceID with Systems Manager documents (SSM documents) that use schema version 2.0 or later will fail. In addition, if you use the parameter InstanceId, you can't use the parameters AssociationName, DocumentVersion, MaxErrors, MaxConcurrency, OutputLocation, or ScheduleExpression. To use these parameters, you must use the Targets parameter.
        Parameters:
          type: object
          properties: {}
          description: A description of the parameters for a document.
        AutomationTargetParameterName:
          $ref: "#/components/schemas/AutomationTargetParameterName"
          description: Specify the target for the association. This target is required for associations that use an Automation runbook and target resources by using rate controls. Automation is a tool in Amazon Web Services Systems Manager.
        DocumentVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The document version.
        Targets:
          $ref: "#/components/schemas/Targets"
          description: The managed nodes targeted by the request.
        ScheduleExpression:
          $ref: "#/components/schemas/ScheduleExpression"
          description: A cron expression that specifies a schedule when the association runs.
        OutputLocation:
          $ref: "#/components/schemas/InstanceAssociationOutputLocation"
          description: An S3 bucket where you want to store the results of this request.
        AssociationName:
          $ref: "#/components/schemas/AssociationName"
          description: Specify a descriptive name for the association.
        MaxErrors:
          $ref: "#/components/schemas/MaxErrors"
          description: The number of errors that are allowed before the system stops sending requests to run the association on additional targets. You can specify either an absolute number of errors, for example 10, or a percentage of the target set, for example 10%. If you specify 3, for example, the system stops sending requests when the fourth error is received. If you specify 0, then the system stops sending requests after the first error is returned. If you run an association on 50 managed nodes and set MaxError to 10%, then the system stops sending the request when the sixth error is received. Executions that are already running an association when MaxErrors is reached are allowed to complete, but some of these executions may fail as well. If you need to ensure that there won't be more than max-errors failed executions, set MaxConcurrency to 1 so that executions proceed one at a time.
        MaxConcurrency:
          $ref: "#/components/schemas/MaxConcurrency"
          description: The maximum number of targets allowed to run the association at the same time. You can specify a number, for example 10, or a percentage of the target set, for example 10%. The default value is 100%, which means all targets run the association at the same time. If a new managed node starts and attempts to run an association while Systems Manager is running MaxConcurrency associations, the association is allowed to run. During the next association interval, the new managed node will process its association within the limit specified for MaxConcurrency.
        ComplianceSeverity:
          $ref: "#/components/schemas/AssociationComplianceSeverity"
          description: The severity level to assign to the association.
        SyncCompliance:
          $ref: "#/components/schemas/AssociationSyncCompliance"
          description: The mode for generating association compliance. You can specify AUTO or MANUAL. In AUTO mode, the system uses the status of the association execution to determine the compliance status. If the association execution runs successfully, then the association is COMPLIANT. If the association execution doesn't run successfully, the association is NON-COMPLIANT. In MANUAL mode, you must specify the AssociationId as a parameter for the PutComplianceItems API operation. In this case, compliance data isn't managed by State Manager, a tool in Amazon Web Services Systems Manager. It is managed by your direct call to the PutComplianceItems API operation. By default, all associations use AUTO mode.
        ApplyOnlyAtCronInterval:
          $ref: "#/components/schemas/ApplyOnlyAtCronInterval"
          description: By default, when you create a new association, the system runs it immediately after it is created and then according to the schedule you specified and when target changes are detected. Specify true for ApplyOnlyAtCronInterval if you want the association to run only according to the schedule you specified. For more information, see Understanding when associations are applied to resources and >About target updates with Automation runbooks in the Amazon Web Services Systems Manager User Guide. This parameter isn't supported for rate expressions.
        CalendarNames:
          $ref: "#/components/schemas/CalendarNameOrARNList"
          description: The names or Amazon Resource Names (ARNs) of the Change Calendar type documents your associations are gated under. The associations only run when that Change Calendar is open. For more information, see Amazon Web Services Systems Manager Change Calendar in the Amazon Web Services Systems Manager User Guide.
        TargetLocations:
          $ref: "#/components/schemas/TargetLocations"
          description: Use this action to create an association in multiple Regions and multiple accounts.
        ScheduleOffset:
          $ref: "#/components/schemas/ScheduleOffset"
          description: Number of days to wait after the scheduled day to run an association.
        Duration:
          $ref: "#/components/schemas/Duration"
          description: "The number of hours the association can run before it is canceled. Duration applies to associations that are currently running, and any pending and in progress commands on all targets. If a target was taken offline for the association to run, it is made available again immediately, without a reboot. The Duration parameter applies only when both these conditions are true: The association for which you specify a duration is cancelable according to the parameters of the SSM command document or Automation runbook associated with this execution. The command specifies the ApplyOnlyAtCronInterval parameter, which means that the association doesn't run immediately after it is created, but only according to the specified schedule."
        TargetMaps:
          $ref: "#/components/schemas/TargetMaps"
          description: A key-value mapping of document parameters to target resources. Both Targets and TargetMaps can't be specified together.
        AlarmConfiguration:
          $ref: "#/components/schemas/AlarmConfiguration"
      required:
        - Name
    CreateAssociationBatchResult:
      type: object
      properties:
        Successful:
          $ref: "#/components/schemas/AssociationDescriptionList"
          description: Information about the associations that succeeded.
        Failed:
          $ref: "#/components/schemas/FailedCreateAssociationList"
          description: Information about the associations that failed.
    AssociationDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/AssociationDescription"
    FailedCreateAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/FailedCreateAssociation"
    FailedCreateAssociation:
      description: Describes a failed association.
      type: object
      properties:
        Entry:
          $ref: "#/components/schemas/CreateAssociationBatchRequestEntry"
          description: The association.
        Message:
          $ref: "#/components/schemas/BatchErrorMessage"
          description: A description of the failure.
        Fault:
          $ref: "#/components/schemas/Fault"
          description: The source of the failure.
    BatchErrorMessage:
      type: string
    Fault:
      type: string
      enum:
        - Client
        - Server
        - Unknown
    DocumentContent:
      type: string
      minLength: 1
    DocumentRequiresList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentRequires"
    DocumentRequires:
      description: An SSM document required by the current document.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DocumentARN"
          description: The name of the required SSM document. The name can be an Amazon Resource Name (ARN).
        Version:
          $ref: "#/components/schemas/DocumentVersion"
          description: The document version required by the current document.
        RequireType:
          $ref: "#/components/schemas/RequireType"
          description: The document type of the required SSM document.
        VersionName:
          $ref: "#/components/schemas/DocumentVersionName"
          description: An optional field specifying the version of the artifact associated with the document. For example, 12.6. This value is unique across all versions of a document, and can't be changed.
      required:
        - Name
    RequireType:
      type: string
      maxLength: 128
      pattern: ^[a-zA-Z0-9_\-.]{1,128}$
    DocumentVersionName:
      type: string
      pattern: ^[a-zA-Z0-9_\-.]{1,128}$
    AttachmentsSourceList:
      type: array
      items:
        $ref: "#/components/schemas/AttachmentsSource"
    AttachmentsSource:
      description: Identifying information about a document attachment, including the file name and a key-value pair that identifies the location of an attachment to a document.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/AttachmentsSourceKey"
          description: The key of a key-value pair that identifies the location of an attachment to a document.
        Values:
          $ref: "#/components/schemas/AttachmentsSourceValues"
          description: 'The value of a key-value pair that identifies the location of an attachment to a document. The format for Value depends on the type of key you specify. For the key SourceUrl, the value is an S3 bucket location. For example: "Values": [ "s3://amzn-s3-demo-bucket/my-prefix" ] For the key S3FileUrl, the value is a file in an S3 bucket. For example: "Values": [ "s3://amzn-s3-demo-bucket/my-prefix/my-file.py" ] For the key AttachmentReference, the value is constructed from the name of another SSM document in your account, a version number of that document, and a file attached to that document version that you want to reuse. For example: "Values": [ "MyOtherDocument/3/my-other-file.py" ] However, if the SSM document is shared with you from another account, the full SSM document ARN must be specified instead of the document name only. For example: "Values": [ "arn:aws:ssm:us-east-2:111122223333:document/OtherAccountDocument/3/their-file.py" ]'
        Name:
          $ref: "#/components/schemas/AttachmentIdentifier"
          description: The name of the document attachment file.
    AttachmentsSourceKey:
      type: string
      enum:
        - SourceUrl
        - S3FileUrl
        - AttachmentReference
    AttachmentsSourceValues:
      type: array
      items:
        $ref: "#/components/schemas/AttachmentsSourceValue"
    AttachmentsSourceValue:
      type: string
      minLength: 1
      maxLength: 1024
    AttachmentIdentifier:
      type: string
      pattern: ^[a-zA-Z0-9_\-.]{3,128}$
    DocumentName:
      type: string
      pattern: ^[a-zA-Z0-9_\-.]{3,128}$
    DocumentDisplayName:
      type: string
      maxLength: 1024
      pattern: ^[\w\.\-\:\/ ]*$
    DocumentType:
      type: string
      enum:
        - Command
        - Policy
        - Automation
        - Session
        - Package
        - ApplicationConfiguration
        - ApplicationConfigurationSchema
        - DeploymentStrategy
        - ChangeCalendar
        - Automation.ChangeTemplate
        - ProblemAnalysis
        - ProblemAnalysisTemplate
        - CloudFormation
        - ConformancePackTemplate
        - QuickSetup
        - ManualApprovalPolicy
        - AutoApprovalPolicy
    DocumentFormat:
      type: string
      enum:
        - YAML
        - JSON
        - TEXT
    TargetType:
      type: string
      maxLength: 200
      pattern: ^\/[\w\.\-\:\/]*$
    CreateDocumentResult:
      type: object
      properties:
        DocumentDescription:
          $ref: "#/components/schemas/DocumentDescription"
          description: Information about the SSM document.
    DocumentDescription:
      description: Describes an Amazon Web Services Systems Manager document (SSM document).
      type: object
      properties:
        Sha1:
          $ref: "#/components/schemas/DocumentSha1"
          description: The SHA1 hash of the document, which you can use for verification.
        Hash:
          $ref: "#/components/schemas/DocumentHash"
          description: The Sha256 or Sha1 hash created by the system when the document was created. Sha1 hashes have been deprecated.
        HashType:
          $ref: "#/components/schemas/DocumentHashType"
          description: The hash type of the document. Valid values include Sha256 or Sha1. Sha1 hashes have been deprecated.
        Name:
          $ref: "#/components/schemas/DocumentARN"
          description: The name of the SSM document.
        DisplayName:
          $ref: "#/components/schemas/DocumentDisplayName"
          description: The friendly name of the SSM document. This value can differ for each version of the document. If you want to update this value, see UpdateDocument.
        VersionName:
          $ref: "#/components/schemas/DocumentVersionName"
          description: The version of the artifact associated with the document.
        Owner:
          $ref: "#/components/schemas/DocumentOwner"
          description: The Amazon Web Services user that created the document.
        CreatedDate:
          $ref: "#/components/schemas/DateTime"
          description: The date when the document was created.
        Status:
          $ref: "#/components/schemas/DocumentStatus"
          description: The status of the SSM document.
        StatusInformation:
          $ref: "#/components/schemas/DocumentStatusInformation"
          description: A message returned by Amazon Web Services Systems Manager that explains the Status value. For example, a Failed status might be explained by the StatusInformation message, "The specified S3 bucket doesn't exist. Verify that the URL of the S3 bucket is correct."
        DocumentVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The document version.
        Description:
          $ref: "#/components/schemas/DescriptionInDocument"
          description: A description of the document.
        Parameters:
          $ref: "#/components/schemas/DocumentParameterList"
          description: A description of the parameters for a document.
        PlatformTypes:
          $ref: "#/components/schemas/PlatformTypeList"
          description: The list of operating system (OS) platforms compatible with this SSM document.
        DocumentType:
          $ref: "#/components/schemas/DocumentType"
          description: The type of document.
        SchemaVersion:
          $ref: "#/components/schemas/DocumentSchemaVersion"
          description: The schema version.
        LatestVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The latest version of the document.
        DefaultVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The default version.
        DocumentFormat:
          $ref: "#/components/schemas/DocumentFormat"
          description: The document format, either JSON or YAML.
        TargetType:
          $ref: "#/components/schemas/TargetType"
          description: The target type which defines the kinds of resources the document can run on. For example, /AWS::EC2::Instance. For a list of valid resource types, see Amazon Web Services resource and property types reference in the CloudFormation User Guide.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags, or metadata, that have been applied to the document.
        AttachmentsInformation:
          $ref: "#/components/schemas/AttachmentInformationList"
          description: Details about the document attachments, including names, locations, sizes, and so on.
        Requires:
