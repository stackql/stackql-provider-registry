      minLength: 1
      maxLength: 68
      pattern: ^ou-[0-9a-z]{4,32}-[a-z0-9]{8,32}$
    NodeOrganizationalUnitPath:
      type: string
      minLength: 1
      maxLength: 512
    NodeRegion:
      type: string
      minLength: 1
      maxLength: 64
    NodeType:
      description: Information about a managed node's type.
      type: object
      properties:
        Instance:
          $ref: "#/components/schemas/InstanceInfo"
          description: Information about a specific managed node.
    InstanceInfo:
      description: Details about a specific managed node.
      type: object
      properties:
        AgentType:
          $ref: "#/components/schemas/AgentType"
          description: The type of agent installed on the node.
        AgentVersion:
          $ref: "#/components/schemas/AgentVersion"
          description: The version number of the agent installed on the node.
        ComputerName:
          $ref: "#/components/schemas/ComputerName"
          description: The fully qualified host name of the managed node.
        InstanceStatus:
          $ref: "#/components/schemas/InstanceStatus"
          description: The current status of the managed node.
        IpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address of the managed node.
        ManagedStatus:
          $ref: "#/components/schemas/ManagedStatus"
          description: Indicates whether the node is managed by Systems Manager.
        PlatformType:
          $ref: "#/components/schemas/PlatformType"
          description: The operating system platform type of the managed node.
        PlatformName:
          $ref: "#/components/schemas/PlatformName"
          description: The name of the operating system platform running on your managed node.
        PlatformVersion:
          $ref: "#/components/schemas/PlatformVersion"
          description: The version of the OS platform running on your managed node.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of instance, either an EC2 instance or another supported machine type in a hybrid fleet.
    AgentType:
      type: string
      minLength: 1
      maxLength: 255
    AgentVersion:
      type: string
      pattern: ^[0-9]{1,6}(\.[0-9]{1,6}){2,3}$
    InstanceStatus:
      type: string
      minLength: 1
      maxLength: 255
    IpAddress:
      type: string
      minLength: 1
      maxLength: 46
    ManagedStatus:
      type: string
      enum:
        - All
        - Managed
        - Unmanaged
    NodeAggregatorList:
      type: array
      items:
        $ref: "#/components/schemas/NodeAggregator"
    NodeAggregator:
