            default: AmazonSSM.SendCommand
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceIds:
                  $ref: "#/components/schemas/InstanceIdList"
                  description: The IDs of the managed nodes where the command should run. Specifying managed node IDs is most useful when you are targeting a limited number of managed nodes, though you can specify up to 50 IDs. To target a larger number of managed nodes, or if you prefer not to list individual node IDs, we recommend using the Targets option instead. Using Targets, which accepts tag key-value pairs to identify the managed nodes to send commands to, you can a send command to tens, hundreds, or thousands of nodes at once. For more information about how to use targets, see Run commands at scale in the Amazon Web Services Systems Manager User Guide.
                Targets:
                  $ref: "#/components/schemas/Targets"
                  description: An array of search criteria that targets managed nodes using a Key,Value combination that you specify. Specifying targets is most useful when you want to send a command to a large number of managed nodes at once. Using Targets, which accepts tag key-value pairs to identify managed nodes, you can send a command to tens, hundreds, or thousands of nodes at once. To send a command to a smaller number of managed nodes, you can use the InstanceIds option instead. For more information about how to use targets, see Run commands at scale in the Amazon Web Services Systems Manager User Guide.
                DocumentName:
                  $ref: "#/components/schemas/DocumentARN"
                  description: The name of the Amazon Web Services Systems Manager document (SSM document) to run. This can be a public document or a custom document. To run a shared document belonging to another account, specify the document Amazon Resource Name (ARN). For more information about how to use shared documents, see Sharing SSM documents in the Amazon Web Services Systems Manager User Guide. If you specify a document name or ARN that hasn't been shared with your account, you receive an InvalidDocument error.
                DocumentVersion:
                  $ref: "#/components/schemas/DocumentVersion"
                  description: "The SSM document version to use in the request. You can specify $DEFAULT, $LATEST, or a specific version number. If you run commands by using the Command Line Interface (Amazon Web Services CLI), then you must escape the first two options by using a backslash. If you specify a version number, then you don't need to use the backslash. For example: --document-version \"\\$DEFAULT\" --document-version \"\\$LATEST\" --document-version \"3\""
                DocumentHash:
                  $ref: "#/components/schemas/DocumentHash"
                  description: The Sha256 or Sha1 hash created by the system when the document was created. Sha1 hashes have been deprecated.
                DocumentHashType:
                  $ref: "#/components/schemas/DocumentHashType"
                  description: Sha256 or Sha1. Sha1 hashes have been deprecated.
                TimeoutSeconds:
                  $ref: "#/components/schemas/TimeoutSeconds"
                  description: If this time is reached and the command hasn't already started running, it won't run.
                Comment:
                  $ref: "#/components/schemas/Comment"
                  description: User-specified information about the command, such as a brief description of what the command should do.
                Parameters:
                  $ref: "#/components/schemas/Parameters"
                  description: The required and optional parameters specified in the document being run.
                OutputS3Region:
                  $ref: "#/components/schemas/S3Region"
                  description: (Deprecated) You can no longer specify this parameter. The system ignores it. Instead, Systems Manager automatically determines the Amazon Web Services Region of the S3 bucket.
                OutputS3BucketName:
                  $ref: "#/components/schemas/S3BucketName"
                  description: The name of the S3 bucket where command execution responses should be stored.
                OutputS3KeyPrefix:
                  $ref: "#/components/schemas/S3KeyPrefix"
                  description: The directory structure within the S3 bucket where the responses should be stored.
                MaxConcurrency:
                  $ref: "#/components/schemas/MaxConcurrency"
                  description: (Optional) The maximum number of managed nodes that are allowed to run the command at the same time. You can specify a number such as 10 or a percentage such as 10%. The default value is 50. For more information about how to use MaxConcurrency, see Using concurrency controls in the Amazon Web Services Systems Manager User Guide.
                MaxErrors:
                  $ref: "#/components/schemas/MaxErrors"
                  description: The maximum number of errors allowed without the command failing. When the command fails one more time beyond the value of MaxErrors, the systems stops sending the command to additional targets. You can specify a number like 10 or a percentage like 10%. The default value is 0. For more information about how to use MaxErrors, see Using error controls in the Amazon Web Services Systems Manager User Guide.
                ServiceRoleArn:
                  $ref: "#/components/schemas/ServiceRole"
                  description: The ARN of the Identity and Access Management (IAM) service role to use to publish Amazon Simple Notification Service (Amazon SNS) notifications for Run Command commands. This role must provide the sns:Publish permission for your notification topic. For information about creating and using this service role, see Monitoring Systems Manager status changes using Amazon SNS notifications in the Amazon Web Services Systems Manager User Guide.
                NotificationConfig:
                  $ref: "#/components/schemas/NotificationConfig"
                  description: Configurations for sending notifications.
                CloudWatchOutputConfig:
                  $ref: "#/components/schemas/CloudWatchOutputConfig"
                  description: Enables Amazon Web Services Systems Manager to send Run Command output to Amazon CloudWatch Logs. Run Command is a tool in Amazon Web Services Systems Manager.
                AlarmConfiguration:
                  $ref: "#/components/schemas/AlarmConfiguration"
                  description: The CloudWatch alarm you want to apply to your command.
              required:
                - DocumentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendCommandResult"
