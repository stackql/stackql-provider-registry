                  description: "The hierarchy for the parameter. Hierarchies start with a forward slash (/). The hierarchy is the parameter name except the last part of the parameter. For the API call to succeed, the last part of the parameter name can't be in the path. A parameter name hierarchy can have a maximum of 15 levels. Here is an example of a hierarchy: /Finance/Prod/IAD/WinServ2016/license33"
                Recursive:
                  $ref: "#/components/schemas/Boolean"
                  description: Retrieve all parameters within a hierarchy. If a user has access to a path, then the user can access all levels of that path. For example, if a user has permission to access path /a, then the user can also access /a/b. Even if a user has explicitly been denied access in IAM for parameter /a/b, they can still call the GetParametersByPath API operation recursively for /a and view /a/b.
                ParameterFilters:
                  $ref: "#/components/schemas/ParameterStringFilterList"
                  description: "Filters to limit the request results. The following Key values are supported for GetParametersByPath: Type, KeyId, and Label. The following Key values aren't supported for GetParametersByPath: tag, DataType, Name, Path, and Tier."
                WithDecryption:
                  $ref: "#/components/schemas/Boolean"
                  description: Retrieve all parameters in a hierarchy with their value decrypted.
                MaxResults:
                  $ref: "#/components/schemas/GetParametersByPathMaxResults"
                  description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
                NextToken:
