          description: The managed node ID targeted by the request to query inventory information.
        SchemaVersion:
          $ref: "#/components/schemas/InventoryItemSchemaVersion"
          description: The inventory schema version used by the managed nodes.
        CaptureTime:
          $ref: "#/components/schemas/InventoryItemCaptureTime"
          description: The time that inventory information was collected for the managed nodes.
        Entries:
          $ref: "#/components/schemas/InventoryItemEntryList"
          description: A list of inventory items on the managed nodes.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use when requesting the next set of items. If there are no additional items to return, the string is empty.
    InventoryItemCaptureTime:
      type: string
