    Command:
      description: Describes a command request.
      type: object
      properties:
        CommandId:
          $ref: "#/components/schemas/CommandId"
          description: A unique identifier for this command.
        DocumentName:
          $ref: "#/components/schemas/DocumentName"
          description: The name of the document requested for execution.
        DocumentVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The Systems Manager document (SSM document) version.
        Comment:
          $ref: "#/components/schemas/Comment"
          description: User-specified information about the command, such as a brief description of what the command should do.
        ExpiresAfter:
          $ref: "#/components/schemas/DateTime"
          description: If a command expires, it changes status to DeliveryTimedOut for all invocations that have the status InProgress, Pending, or Delayed. ExpiresAfter is calculated based on the total timeout for the overall command. For more information, see Understanding command timeout values in the Amazon Web Services Systems Manager User Guide.
        Parameters:
          type: object
          properties: {}
          description: The parameter values to be inserted in the document when running the command.
        InstanceIds:
          $ref: "#/components/schemas/InstanceIdList"
          description: The managed node IDs against which this command was requested.
        Targets:
          $ref: "#/components/schemas/Targets"
          description: An array of search criteria that targets managed nodes using a Key,Value combination that you specify. Targets is required if you don't provide one or more managed node IDs in the call.
        RequestedDateTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the command was requested.
        Status:
          $ref: "#/components/schemas/CommandStatus"
          description: The status of the command.
        StatusDetails:
          $ref: "#/components/schemas/StatusDetails"
          description: "A detailed status of the command execution. StatusDetails includes more information than Status because it includes states resulting from error and concurrency control parameters. StatusDetails can show different results than Status. For more information about these statuses, see Understanding command statuses in the Amazon Web Services Systems Manager User Guide. StatusDetails can be one of the following values: Pending: The command hasn't been sent to any managed nodes. In Progress: The command has been sent to at least one managed node but hasn't reached a final state on all managed nodes. Success: The command successfully ran on all invocations. This is a terminal state. Delivery Timed Out: The value of MaxErrors or more command invocations shows a status of Delivery Timed Out. This is a terminal state. Execution Timed Out: The value of MaxErrors or more command invocations shows a status of Execution Timed Out. This is a terminal state. Failed: The value of MaxErrors or more command invocations shows a status of Failed. This is a terminal state. Incomplete: The command was attempted on all managed nodes and one or more invocations doesn't have a value of Success but not enough invocations failed for the status to be Failed. This is a terminal state. Cancelled: The command was terminated before it was completed. This is a terminal state. Rate Exceeded: The number of managed nodes targeted by the command exceeded the account limit for pending invocations. The system has canceled the command before running it on any managed node. This is a terminal state. Delayed: The system attempted to send the command to the managed node but wasn't successful. The system retries again."
        OutputS3Region:
          $ref: "#/components/schemas/S3Region"
          description: (Deprecated) You can no longer specify this parameter. The system ignores it. Instead, Systems Manager automatically determines the Amazon Web Services Region of the S3 bucket.
        OutputS3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The S3 bucket where the responses to the command executions should be stored. This was requested when issuing the command.
        OutputS3KeyPrefix:
          $ref: "#/components/schemas/S3KeyPrefix"
          description: The S3 directory path inside the bucket where the responses to the command executions should be stored. This was requested when issuing the command.
        MaxConcurrency:
          $ref: "#/components/schemas/MaxConcurrency"
          description: The maximum number of managed nodes that are allowed to run the command at the same time. You can specify a number of managed nodes, such as 10, or a percentage of nodes, such as 10%. The default value is 50. For more information about how to use MaxConcurrency, see Amazon Web Services Systems Manager Run Command in the Amazon Web Services Systems Manager User Guide.
        MaxErrors:
          $ref: "#/components/schemas/MaxErrors"
          description: The maximum number of errors allowed before the system stops sending the command to additional targets. You can specify a number of errors, such as 10, or a percentage or errors, such as 10%. The default value is 0. For more information about how to use MaxErrors, see Amazon Web Services Systems Manager Run Command in the Amazon Web Services Systems Manager User Guide.
        TargetCount:
          $ref: "#/components/schemas/TargetCount"
          description: The number of targets for the command.
        CompletedCount:
