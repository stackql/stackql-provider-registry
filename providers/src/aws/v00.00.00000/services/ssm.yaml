    AssociationList:
      type: array
      items:
        $ref: "#/components/schemas/Association"
    Association:
      description: Describes an association of a Amazon Web Services Systems Manager document (SSM document) and a managed node.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DocumentARN"
          description: The name of the SSM document.
        InstanceId:
          $ref: "#/components/schemas/InstanceId"
          description: The managed node ID.
        AssociationId:
          $ref: "#/components/schemas/AssociationId"
          description: The ID created by the system when you create an association. An association is a binding between a document and a set of targets with a schedule.
        AssociationVersion:
          $ref: "#/components/schemas/AssociationVersion"
          description: The association version.
        DocumentVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The version of the document used in the association. If you change a document version for a State Manager association, Systems Manager immediately runs the association unless you previously specifed the apply-only-at-cron-interval parameter. State Manager doesn't support running associations that use a new version of a document if that document is shared from another account. State Manager always runs the default version of a document if shared from another account, even though the Systems Manager console shows that a new version was processed. If you want to run an association using a new version of a document shared form another account, you must set the document version to default.
        Targets:
          $ref: "#/components/schemas/Targets"
          description: The managed nodes targeted by the request to create an association. You can target all managed nodes in an Amazon Web Services account by specifying the InstanceIds key with a value of *.
        LastExecutionDate:
          $ref: "#/components/schemas/DateTime"
          description: The date on which the association was last run.
        Overview:
          $ref: "#/components/schemas/AssociationOverview"
          description: Information about the association.
        ScheduleExpression:
          $ref: "#/components/schemas/ScheduleExpression"
          description: A cron expression that specifies a schedule when the association runs. The schedule runs in Coordinated Universal Time (UTC).
        AssociationName:
          $ref: "#/components/schemas/AssociationName"
          description: The association name.
        ScheduleOffset:
          $ref: "#/components/schemas/ScheduleOffset"
          description: Number of days to wait after the scheduled day to run an association.
        Duration:
          $ref: "#/components/schemas/Duration"
          description: The number of hours that an association can run on specified targets. After the resulting cutoff time passes, associations that are currently running are cancelled, and no pending executions are started on remaining targets.
        TargetMaps:
          $ref: "#/components/schemas/TargetMaps"
          description: A key-value mapping of document parameters to target resources. Both Targets and TargetMaps can't be specified together.
    CommandMaxResults:
      type: integer
      minimum: 1
      maximum: 50
    CommandFilterList:
      type: array
      items:
        $ref: "#/components/schemas/CommandFilter"
    CommandFilter:
      description: Describes a command filter. A managed node ID can't be specified when a command status is Pending because the command hasn't run on the node yet.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/CommandFilterKey"
          description: The name of the filter. The ExecutionStage filter can't be used with the ListCommandInvocations operation, only with ListCommands.
        value:
          $ref: "#/components/schemas/CommandFilterValue"
          description: "The filter value. Valid values for each filter key are as follows: InvokedAfter: Specify a timestamp to limit your results. For example, specify 2024-07-07T00:00:00Z to see a list of command executions occurring July 7, 2021, and later. InvokedBefore: Specify a timestamp to limit your results. For example, specify 2024-07-07T00:00:00Z to see a list of command executions from before July 7, 2021. Status: Specify a valid command status to see a list of all command executions with that status. The status choices depend on the API you call. The status values you can specify for ListCommands are: Pending InProgress Success Cancelled Failed TimedOut (this includes both Delivery and Execution time outs) AccessDenied DeliveryTimedOut ExecutionTimedOut Incomplete NoInstancesInTag LimitExceeded The status values you can specify for ListCommandInvocations are: Pending InProgress Delayed Success Cancelled Failed TimedOut (this includes both Delivery and Execution time outs) AccessDenied DeliveryTimedOut ExecutionTimedOut Undeliverable InvalidPlatform Terminated DocumentName: Specify name of the Amazon Web Services Systems Manager document (SSM document) for which you want to see command execution results. For example, specify AWS-RunPatchBaseline to see command executions that used this SSM document to perform security patching operations on managed nodes. ExecutionStage: Specify one of the following values (ListCommands operations only): Executing: Returns a list of command executions that are currently still running. Complete: Returns a list of command executions that have already completed."
      required:
        - key
        - value
    CommandFilterKey:
      type: string
      enum:
        - InvokedAfter
        - InvokedBefore
        - Status
        - ExecutionStage
        - DocumentName
    CommandFilterValue:
      type: string
      minLength: 1
      maxLength: 128
    ListCommandInvocationsResult:
      type: object
      properties:
        CommandInvocations:
          $ref: "#/components/schemas/CommandInvocationList"
          description: (Optional) A list of all invocations.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: (Optional) The token for the next set of items to return. (You received this token from a previous call.)
    CommandInvocationList:
      type: array
      items:
        $ref: "#/components/schemas/CommandInvocation"
    CommandInvocation:
      description: An invocation is a copy of a command sent to a specific managed node. A command can apply to one or more managed nodes. A command invocation applies to one managed node. For example, if a user runs SendCommand against three managed nodes, then a command invocation is created for each requested managed node ID. A command invocation returns status and detail information about a command you ran.
      type: object
      properties:
        CommandId:
          $ref: "#/components/schemas/CommandId"
          description: The command against which this invocation was requested.
        InstanceId:
          $ref: "#/components/schemas/InstanceId"
          description: The managed node ID in which this invocation was requested.
        InstanceName:
          $ref: "#/components/schemas/InstanceTagName"
          description: The fully qualified host name of the managed node.
        Comment:
          $ref: "#/components/schemas/Comment"
          description: User-specified information about the command, such as a brief description of what the command should do.
        DocumentName:
          $ref: "#/components/schemas/DocumentName"
          description: The document name that was requested for execution.
        DocumentVersion:
          $ref: "#/components/schemas/DocumentVersion"
          description: The Systems Manager document (SSM document) version.
        RequestedDateTime:
          $ref: "#/components/schemas/DateTime"
          description: The time and date the request was sent to this managed node.
        Status:
          $ref: "#/components/schemas/CommandInvocationStatus"
          description: Whether or not the invocation succeeded, failed, or is pending.
        StatusDetails:
          $ref: "#/components/schemas/StatusDetails"
          description: "A detailed status of the command execution for each invocation (each managed node targeted by the command). StatusDetails includes more information than Status because it includes states resulting from error and concurrency control parameters. StatusDetails can show different results than Status. For more information about these statuses, see Understanding command statuses in the Amazon Web Services Systems Manager User Guide. StatusDetails can be one of the following values: Pending: The command hasn't been sent to the managed node. In Progress: The command has been sent to the managed node but hasn't reached a terminal state. Success: The execution of the command or plugin was successfully completed. This is a terminal state. Delivery Timed Out: The command wasn't delivered to the managed node before the delivery timeout expired. Delivery timeouts don't count against the parent command's MaxErrors limit, but they do contribute to whether the parent command status is Success or Incomplete. This is a terminal state. Execution Timed Out: Command execution started on the managed node, but the execution wasn't complete before the execution timeout expired. Execution timeouts count against the MaxErrors limit of the parent command. This is a terminal state. Failed: The command wasn't successful on the managed node. For a plugin, this indicates that the result code wasn't zero. For a command invocation, this indicates that the result code for one or more plugins wasn't zero. Invocation failures count against the MaxErrors limit of the parent command. This is a terminal state. Cancelled: The command was terminated before it was completed. This is a terminal state. Undeliverable: The command can't be delivered to the managed node. The managed node might not exist or might not be responding. Undeliverable invocations don't count against the parent command's MaxErrors limit and don't contribute to whether the parent command status is Success or Incomplete. This is a terminal state. Terminated: The parent command exceeded its MaxErrors limit and subsequent command invocations were canceled by the system. This is a terminal state. Delayed: The system attempted to send the command to the managed node but wasn't successful. The system retries again."
        TraceOutput:
          $ref: "#/components/schemas/InvocationTraceOutput"
          description: Gets the trace output sent by the agent.
        StandardOutputUrl:
          $ref: "#/components/schemas/Url"
          description: The URL to the plugin's StdOut file in Amazon Simple Storage Service (Amazon S3), if the S3 bucket was defined for the parent command. For an invocation, StandardOutputUrl is populated if there is just one plugin defined for the command, and the S3 bucket was defined for the command.
        StandardErrorUrl:
          $ref: "#/components/schemas/Url"
          description: The URL to the plugin's StdErr file in Amazon Simple Storage Service (Amazon S3), if the S3 bucket was defined for the parent command. For an invocation, StandardErrorUrl is populated if there is just one plugin defined for the command, and the S3 bucket was defined for the command.
        CommandPlugins:
          $ref: "#/components/schemas/CommandPluginList"
          description: Plugins processed by the command.
        ServiceRole:
          $ref: "#/components/schemas/ServiceRole"
          description: The Identity and Access Management (IAM) service role that Run Command, a tool in Amazon Web Services Systems Manager, uses to act on your behalf when sending notifications about command status changes on a per managed node basis.
        NotificationConfig:
          $ref: "#/components/schemas/NotificationConfig"
          description: Configurations for sending notifications about command status changes on a per managed node basis.
        CloudWatchOutputConfig:
          $ref: "#/components/schemas/CloudWatchOutputConfig"
          description: Amazon CloudWatch Logs information where you want Amazon Web Services Systems Manager to send the command output.
    InstanceTagName:
      type: string
      maxLength: 255
