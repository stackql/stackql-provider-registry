        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CommandId:
                  $ref: "#/components/schemas/CommandId"
                  description: (Required) The parent command ID of the invocation plugin.
                InstanceId:
                  $ref: "#/components/schemas/InstanceId"
                  description: (Required) The ID of the managed node targeted by the command. A managed node can be an Amazon Elastic Compute Cloud (Amazon EC2) instance, edge device, and on-premises server or VM in your hybrid environment that is configured for Amazon Web Services Systems Manager.
                PluginName:
                  $ref: "#/components/schemas/CommandPluginName"
                  description: The name of the step for which you want detailed results. If the document contains only one step, you can omit the name and details for that step. If the document contains more than one step, you must specify the name of the step for which you want to view details. Be sure to specify the name of the step, not the name of a plugin like aws:RunShellScript. To find the PluginName, check the document content and find the name of the step you want details for. Alternatively, use ListCommandInvocations with the CommandId and Details parameters. The PluginName is the Name attribute of the CommandPlugin object in the CommandPlugins list.
              required:
                - CommandId
                - InstanceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCommandInvocationResult"
