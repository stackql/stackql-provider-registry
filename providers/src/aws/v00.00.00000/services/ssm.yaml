          description: The task ID.
        TaskArn:
          $ref: "#/components/schemas/MaintenanceWindowTaskArn"
          description: The resource that the task uses during execution. For RUN_COMMAND and AUTOMATION task types, TaskArn is the Amazon Web Services Systems Manager (SSM document) name or ARN. For LAMBDA tasks, it's the function name or ARN. For STEP_FUNCTIONS tasks, it's the state machine ARN.
        Type:
          $ref: "#/components/schemas/MaintenanceWindowTaskType"
          description: The type of task.
        Targets:
          $ref: "#/components/schemas/Targets"
          description: The targets (either managed nodes or tags). Managed nodes are specified using Key=instanceids,Values=`<instanceid1>`,`<instanceid2>`. Tags are specified using Key=<tag name>,Values=<tag value>.
        TaskParameters:
          type: object
          properties: {}
