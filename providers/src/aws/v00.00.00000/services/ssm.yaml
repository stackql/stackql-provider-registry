                - ActivationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteActivationResult"
  /DeleteAssociation:
    post:
      operationId: DeleteAssociation
      description: Disassociates the specified Amazon Web Services Systems Manager document (SSM document) from the specified managed node. If you created the association by using the Targets parameter, then you must delete the association by using the association ID. When you disassociate a document from a managed node, it doesn't change the configuration of the node. To change the configuration state of a managed node after you disassociate a document, you must create a new document with the desired configuration and associate it with the node.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.DeleteAssociation
            default: AmazonSSM.DeleteAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DocumentARN"
                  description: The name of the SSM document.
                InstanceId:
                  $ref: "#/components/schemas/InstanceId"
                  description: The managed node ID. InstanceId has been deprecated. To specify a managed node ID for an association, use the Targets parameter. Requests that include the parameter InstanceID with Systems Manager documents (SSM documents) that use schema version 2.0 or later will fail. In addition, if you use the parameter InstanceId, you can't use the parameters AssociationName, DocumentVersion, MaxErrors, MaxConcurrency, OutputLocation, or ScheduleExpression. To use these parameters, you must use the Targets parameter.
                AssociationId:
                  $ref: "#/components/schemas/AssociationId"
                  description: The association ID that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssociationResult"
  /DeleteDocument:
    post:
      operationId: DeleteDocument
      description: Deletes the Amazon Web Services Systems Manager document (SSM document) and all managed node associations to the document. Before you delete the document, we recommend that you use DeleteAssociation to disassociate all managed nodes that are associated with the document.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonSSM.DeleteDocument
            default: AmazonSSM.DeleteDocument
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DocumentName"
                  description: The name of the document.
                DocumentVersion:
                  $ref: "#/components/schemas/DocumentVersion"
                  description: The version of the document that you want to delete. If not provided, all versions of the document are deleted.
                VersionName:
                  $ref: "#/components/schemas/DocumentVersionName"
                  description: The version name of the document that you want to delete. If not provided, all versions of the document are deleted.
                Force:
                  $ref: "#/components/schemas/Boolean"
                  description: Some SSM document types require that you specify a Force flag before you can delete the document. For example, you must specify a Force flag to delete a document of type ApplicationConfigurationSchema. You can restrict access to the Force flag in an Identity and Access Management (IAM) policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDocumentResult"
  /DeleteInventory:
    post:
      operationId: DeleteInventory
      description: Delete a custom inventory type or the data associated with a custom Inventory type. Deleting a custom inventory type is also referred to as deleting a custom inventory schema.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
