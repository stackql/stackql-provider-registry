        BugzillaIds:
          $ref: "#/components/schemas/PatchBugzillaIdList"
          description: The Bugzilla ID of the patch. For example, 1600646. Applies to Linux-based managed nodes only.
        CVEIds:
          $ref: "#/components/schemas/PatchCVEIdList"
          description: The Common Vulnerabilities and Exposures (CVE) ID of the patch. For example, CVE-2011-3192. Applies to Linux-based managed nodes only.
        Name:
          $ref: "#/components/schemas/PatchName"
          description: The name of the patch. Applies to Linux-based managed nodes only.
        Epoch:
          $ref: "#/components/schemas/PatchEpoch"
          description: The epoch of the patch. For example in pkg-example-EE-20180914-2.2.amzn1.noarch, the epoch value is 20180914-2. Applies to Linux-based managed nodes only.
        Version:
          $ref: "#/components/schemas/PatchVersion"
          description: The version number of the patch. For example, in example-pkg-1.710.10-2.7.abcd.x86_64, the version number is indicated by -1. Applies to Linux-based managed nodes only.
        Release:
          $ref: "#/components/schemas/PatchRelease"
          description: The particular release of a patch. For example, in pkg-example-EE-20180914-2.2.amzn1.noarch, the release is 2.amaz1. Applies to Linux-based managed nodes only.
        Arch:
          $ref: "#/components/schemas/PatchArch"
          description: The architecture of the patch. For example, in example-pkg-0.710.10-2.7.abcd.x86_64, the architecture is indicated by x86_64. Applies to Linux-based managed nodes only.
        Severity:
          $ref: "#/components/schemas/PatchSeverity"
          description: The severity level of the patch. For example, CRITICAL or MODERATE.
        Repository:
          $ref: "#/components/schemas/PatchRepository"
          description: The source patch repository for the operating system and version, such as trusty-security for Ubuntu Server 14.04 LTE and focal-security for Ubuntu Server 20.04 LTE. Applies to Linux-based managed nodes only.
