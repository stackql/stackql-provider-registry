      type: array
      items:
        $ref: "#/components/schemas/CommandPlugin"
    CommandPlugin:
      description: Describes plugin details.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/CommandPluginName"
          description: "The name of the plugin. Must be one of the following: aws:updateAgent, aws:domainjoin, aws:applications, aws:runPowerShellScript, aws:psmodule, aws:cloudWatch, aws:runShellScript, or aws:updateSSMAgent."
        Status:
          $ref: "#/components/schemas/CommandPluginStatus"
          description: The status of this plugin. You can run a document with multiple plugins.
        StatusDetails:
          $ref: "#/components/schemas/StatusDetails"
          description: "A detailed status of the plugin execution. StatusDetails includes more information than Status because it includes states resulting from error and concurrency control parameters. StatusDetails can show different results than Status. For more information about these statuses, see Understanding command statuses in the Amazon Web Services Systems Manager User Guide. StatusDetails can be one of the following values: Pending: The command hasn't been sent to the managed node. In Progress: The command has been sent to the managed node but hasn't reached a terminal state. Success: The execution of the command or plugin was successfully completed. This is a terminal state. Delivery Timed Out: The command wasn't delivered to the managed node before the delivery timeout expired. Delivery timeouts don't count against the parent command's MaxErrors limit, but they do contribute to whether the parent command status is Success or Incomplete. This is a terminal state. Execution Timed Out: Command execution started on the managed node, but the execution wasn't complete before the execution timeout expired. Execution timeouts count against the MaxErrors limit of the parent command. This is a terminal state. Failed: The command wasn't successful on the managed node. For a plugin, this indicates that the result code wasn't zero. For a command invocation, this indicates that the result code for one or more plugins wasn't zero. Invocation failures count against the MaxErrors limit of the parent command. This is a terminal state. Cancelled: The command was terminated before it was completed. This is a terminal state. Undeliverable: The command can't be delivered to the managed node. The managed node might not exist, or it might not be responding. Undeliverable invocations don't count against the parent command's MaxErrors limit, and they don't contribute to whether the parent command status is Success or Incomplete. This is a terminal state. Terminated: The parent command exceeded its MaxErrors limit and subsequent command invocations were canceled by the system. This is a terminal state."
        ResponseCode:
          $ref: "#/components/schemas/ResponseCode"
          description: A numeric response code generated after running the plugin.
        ResponseStartDateTime:
          $ref: "#/components/schemas/DateTime"
          description: The time the plugin started running.
        ResponseFinishDateTime:
          $ref: "#/components/schemas/DateTime"
          description: The time the plugin stopped running. Could stop prematurely if, for example, a cancel command was sent.
        Output:
          $ref: "#/components/schemas/CommandPluginOutput"
          description: Output of the plugin execution.
        StandardOutputUrl:
          $ref: "#/components/schemas/Url"
          description: The URL for the complete text written by the plugin to stdout in Amazon S3. If the S3 bucket for the command wasn't specified, then this string is empty.
        StandardErrorUrl:
          $ref: "#/components/schemas/Url"
          description: The URL for the complete text written by the plugin to stderr. If execution isn't yet complete, then this string is empty.
        OutputS3Region:
          $ref: "#/components/schemas/S3Region"
          description: (Deprecated) You can no longer specify this parameter. The system ignores it. Instead, Amazon Web Services Systems Manager automatically determines the S3 bucket region.
        OutputS3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: "The S3 bucket where the responses to the command executions should be stored. This was requested when issuing the command. For example, in the following response: amzn-s3-demo-bucket/my-prefix/i-02573cafcfEXAMPLE/awsrunShellScript amzn-s3-demo-bucket is the name of the S3 bucket; my-prefix is the name of the S3 prefix; i-02573cafcfEXAMPLE is the managed node ID; awsrunShellScript is the name of the plugin."
        OutputS3KeyPrefix:
