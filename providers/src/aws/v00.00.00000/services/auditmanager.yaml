    EvidenceFinderEnablement:
      description: The settings object that specifies whether evidence finder is enabled. This object also describes the related event data store, and the backfill status for populating the event data store with evidence data.
      type: object
      properties:
        eventDataStoreArn:
          $ref: "#/components/schemas/CloudTrailArn"
          description: The Amazon Resource Name (ARN) of the CloudTrail Lake event data store that’s used by evidence finder. The event data store is the lake of evidence data that evidence finder runs queries against.
        enablementStatus:
          $ref: "#/components/schemas/EvidenceFinderEnablementStatus"
          description: The current status of the evidence finder feature and the related event data store. ENABLE_IN_PROGRESS means that you requested to enable evidence finder. An event data store is currently being created to support evidence finder queries. ENABLED means that an event data store was successfully created and evidence finder is enabled. We recommend that you wait 7 days until the event data store is backfilled with your past two years’ worth of evidence data. You can use evidence finder in the meantime, but not all data might be available until the backfill is complete. DISABLE_IN_PROGRESS means that you requested to disable evidence finder, and your request is pending the deletion of the event data store. DISABLED means that you have permanently disabled evidence finder and the event data store has been deleted. You can't re-enable evidence finder after this point.
        backfillStatus:
          $ref: "#/components/schemas/EvidenceFinderBackfillStatus"
          description: The current status of the evidence data backfill process. The backfill starts after you enable evidence finder. During this task, Audit Manager populates an event data store with your past two years’ worth of evidence data so that your evidence can be queried. NOT_STARTED means that the backfill hasn’t started yet. IN_PROGRESS means that the backfill is in progress. This can take up to 7 days to complete, depending on the amount of evidence data. COMPLETED means that the backfill is complete. All of your past evidence is now queryable.
        error:
          $ref: "#/components/schemas/ErrorMessage"
          description: Represents any errors that occurred when enabling or disabling evidence finder.
    CloudTrailArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:.*:cloudtrail:.*
    EvidenceFinderEnablementStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
        - ENABLE_IN_PROGRESS
        - DISABLE_IN_PROGRESS
    EvidenceFinderBackfillStatus:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - COMPLETED
    DeregistrationPolicy:
      description: The deregistration policy for the data that's stored in Audit Manager. You can use this attribute to determine how your data is handled when you deregister Audit Manager. By default, Audit Manager retains evidence data for two years from the time of its creation. Other Audit Manager resources (including assessments, custom controls, and custom frameworks) remain in Audit Manager indefinitely, and are available if you re-register Audit Manager in the future. For more information about data retention, see Data Protection in the Audit Manager User Guide. If you choose to delete all data, this action permanently deletes all evidence data in your account within seven days. It also deletes all of the Audit Manager resources that you created, including assessments, custom controls, and custom frameworks. Your data will not be available if you re-register Audit Manager in the future.
      type: object
      properties:
        deleteResources:
          $ref: "#/components/schemas/DeleteResources"
          description: Specifies which Audit Manager data will be deleted when you deregister Audit Manager. If you set the value to ALL, all of your data is deleted within seven days of deregistration. If you set the value to DEFAULT, none of your data is deleted at the time of deregistration. However, keep in mind that the Audit Manager data retention policy still applies. As a result, any evidence data will be deleted two years after its creation date. Your other Audit Manager resources will continue to exist indefinitely.
    DeleteResources:
      type: string
      enum:
        - ALL
        - DEFAULT
    DefaultExportDestination:
      description: The default s3 bucket where Audit Manager saves the files that you export from evidence finder.
      type: object
      properties:
        destinationType:
          $ref: "#/components/schemas/ExportDestinationType"
          description: The destination type, such as Amazon S3.
        destination:
