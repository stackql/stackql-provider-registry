        complianceCheck:
          $ref: "#/components/schemas/String"
          description: The evaluation status for automated evidence that falls under the compliance check category. Audit Manager classes evidence as non-compliant if Security Hub reports a Fail result, or if Config reports a Non-compliant result. Audit Manager classes evidence as compliant if Security Hub reports a Pass result, or if Config reports a Compliant result. If a compliance check isn't available or applicable, then no compliance evaluation can be made for that evidence. This is the case if the evidence uses Config or Security Hub as the underlying data source type, but those services aren't enabled. This is also the case if the evidence uses an underlying data source type that doesn't support compliance checks (such as manual evidence, Amazon Web Services API calls, or CloudTrail).
        awsOrganization:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account that the evidence is collected from, and its organization path.
        awsAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The identifier for the Amazon Web Services account.
        evidenceFolderId:
          $ref: "#/components/schemas/UUID"
          description: The identifier for the folder that the evidence is stored in.
        id:
          $ref: "#/components/schemas/UUID"
          description: The identifier for the evidence.
        assessmentReportSelection:
          $ref: "#/components/schemas/String"
          description: Specifies whether the evidence is included in the assessment report.
