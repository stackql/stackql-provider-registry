              properties:
                status:
                  $ref: "#/components/schemas/ControlSetStatus"
                comment:
                  $ref: "#/components/schemas/DelegationComment"
              required:
                - status
                - comment
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAssessmentControlSetStatusResponse"
  /assessments/{assessment_id}/status:
    put:
      operationId: UpdateAssessmentStatus
      description: Updates the status of an assessment in Audit Manager.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the assessment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/AssessmentStatus"
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAssessmentStatusResponse"
  /settings:
    put:
      operationId: UpdateSettings
      description: Updates Audit Manager settings for the current account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                snsTopic:
                  $ref: "#/components/schemas/SnsArn"
                defaultAssessmentReportsDestination:
                  $ref: "#/components/schemas/AssessmentReportsDestination"
                defaultProcessOwners:
                  $ref: "#/components/schemas/Roles"
                kmsKey:
                  $ref: "#/components/schemas/KmsKey"
                evidenceFinderEnabled:
                  $ref: "#/components/schemas/Boolean"
                deregistrationPolicy:
                  $ref: "#/components/schemas/DeregistrationPolicy"
                defaultExportDestination:
                  $ref: "#/components/schemas/DefaultExportDestination"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSettingsResponse"
  /assessmentReports/integrity:
    post:
      operationId: ValidateAssessmentReportIntegrity
      description: Validates the integrity of an assessment report in Audit Manager.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                s3RelativePath:
                  $ref: "#/components/schemas/S3Url"
              required:
                - s3RelativePath
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateAssessmentReportIntegrityResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    UUID:
      type: string
      minLength: 36
      maxLength: 36
      pattern: ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$
    AssociateAssessmentReportEvidenceFolderResponse:
      type: object
    EvidenceIds:
      type: array
      items:
        $ref: "#/components/schemas/UUID"
    BatchAssociateAssessmentReportEvidenceResponse:
      type: object
      properties:
        evidenceIds:
          $ref: "#/components/schemas/EvidenceIds"
          description: The list of evidence identifiers.
        errors:
          $ref: "#/components/schemas/AssessmentReportEvidenceErrors"
          description: A list of errors that the BatchAssociateAssessmentReportEvidence API returned.
    AssessmentReportEvidenceErrors:
      type: array
      items:
        $ref: "#/components/schemas/AssessmentReportEvidenceError"
    AssessmentReportEvidenceError:
      description: An error entity for assessment report evidence errors. This is used to provide more meaningful errors than a simple string message.
      type: object
      properties:
        evidenceId:
          $ref: "#/components/schemas/UUID"
          description: The identifier for the evidence.
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code that was returned.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message that was returned.
    ErrorCode:
      type: string
      minLength: 3
      maxLength: 3
      pattern: "[0-9]{3}"
    ErrorMessage:
      type: string
      maxLength: 300
      pattern: ^[\w\W\s\S]*$
    CreateDelegationRequests:
      type: array
      items:
        $ref: "#/components/schemas/CreateDelegationRequest"
    CreateDelegationRequest:
      description: A collection of attributes that's used to create a delegation for an assessment in Audit Manager.
      type: object
      properties:
        comment:
          $ref: "#/components/schemas/DelegationComment"
          description: A comment that's related to the delegation request.
        controlSetId:
          $ref: "#/components/schemas/ControlSetId"
          description: The unique identifier for the control set.
        roleArn:
          $ref: "#/components/schemas/IamArn"
          description: The Amazon Resource Name (ARN) of the IAM role.
        roleType:
          $ref: "#/components/schemas/RoleType"
          description: The type of customer persona. In CreateAssessment, roleType can only be PROCESS_OWNER. In UpdateSettings, roleType can only be PROCESS_OWNER. In BatchCreateDelegationByAssessment, roleType can only be RESOURCE_OWNER.
    DelegationComment:
      type: string
      maxLength: 350
      pattern: ^[\w\W\s\S]*$
    ControlSetId:
      type: string
      minLength: 1
      maxLength: 300
      pattern: ^[\w\W\s\S]*$
    IamArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:.*:iam:.*
    RoleType:
      type: string
      enum:
        - PROCESS_OWNER
        - RESOURCE_OWNER
    BatchCreateDelegationByAssessmentResponse:
      type: object
      properties:
        delegations:
          $ref: "#/components/schemas/Delegations"
          description: The delegations that are associated with the assessment.
        errors:
          $ref: "#/components/schemas/BatchCreateDelegationByAssessmentErrors"
          description: A list of errors that the BatchCreateDelegationByAssessment API returned.
    Delegations:
      type: array
      items:
        $ref: "#/components/schemas/Delegation"
    Delegation:
      description: The assignment of a control set to a delegate for review.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier for the delegation.
        assessmentName:
          $ref: "#/components/schemas/AssessmentName"
          description: The name of the assessment that's associated with the delegation.
        assessmentId:
          $ref: "#/components/schemas/UUID"
          description: The identifier for the assessment that's associated with the delegation.
        status:
          $ref: "#/components/schemas/DelegationStatus"
          description: The status of the delegation.
        roleArn:
          $ref: "#/components/schemas/IamArn"
          description: The Amazon Resource Name (ARN) of the IAM role.
        roleType:
          $ref: "#/components/schemas/RoleType"
          description: The type of customer persona. In CreateAssessment, roleType can only be PROCESS_OWNER. In UpdateSettings, roleType can only be PROCESS_OWNER. In BatchCreateDelegationByAssessment, roleType can only be RESOURCE_OWNER.
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies when the delegation was created.
        lastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies when the delegation was last updated.
        controlSetId:
          $ref: "#/components/schemas/ControlSetId"
          description: The identifier for the control set that's associated with the delegation.
        comment:
          $ref: "#/components/schemas/DelegationComment"
          description: The comment that's related to the delegation.
        createdBy:
          $ref: "#/components/schemas/CreatedBy"
          description: The user or role that created the delegation.
    AssessmentName:
      type: string
      minLength: 1
      maxLength: 300
      pattern: ^[^\\]*$
    DelegationStatus:
      type: string
      enum:
        - IN_PROGRESS
        - UNDER_REVIEW
        - COMPLETE
    Timestamp:
      type: string
      format: date-time
    CreatedBy:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z0-9\s-_()\[\]]+$
    BatchCreateDelegationByAssessmentErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateDelegationByAssessmentError"
    BatchCreateDelegationByAssessmentError:
      description: An error entity for the BatchCreateDelegationByAssessment API. This is used to provide more meaningful errors than a simple string message.
      type: object
      properties:
        createDelegationRequest:
          $ref: "#/components/schemas/CreateDelegationRequest"
          description: The API request to batch create delegations in Audit Manager.
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code that the BatchCreateDelegationByAssessment API returned.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message that the BatchCreateDelegationByAssessment API returned.
    DelegationIds:
      type: array
      items:
        $ref: "#/components/schemas/UUID"
    BatchDeleteDelegationByAssessmentResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchDeleteDelegationByAssessmentErrors"
          description: A list of errors that the BatchDeleteDelegationByAssessment API returned.
    BatchDeleteDelegationByAssessmentErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteDelegationByAssessmentError"
    BatchDeleteDelegationByAssessmentError:
      description: An error entity for the BatchDeleteDelegationByAssessment API. This is used to provide more meaningful errors than a simple string message.
      type: object
      properties:
        delegationId:
          $ref: "#/components/schemas/UUID"
          description: The identifier for the delegation.
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code that the BatchDeleteDelegationByAssessment API returned.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message that the BatchDeleteDelegationByAssessment API returned.
    BatchDisassociateAssessmentReportEvidenceResponse:
      type: object
      properties:
        evidenceIds:
          $ref: "#/components/schemas/EvidenceIds"
          description: The identifier for the evidence.
        errors:
          $ref: "#/components/schemas/AssessmentReportEvidenceErrors"
          description: A list of errors that the BatchDisassociateAssessmentReportEvidence API returned.
    ManualEvidenceList:
      type: array
      items:
        $ref: "#/components/schemas/ManualEvidence"
    ManualEvidence:
      description: "Evidence that's manually added to a control in Audit Manager. manualEvidence can be one of the following: evidenceFileName, s3ResourcePath, or textResponse."
      type: object
      properties:
        s3ResourcePath:
          $ref: "#/components/schemas/S3Url"
          description: The S3 URL of the object that's imported as manual evidence.
        textResponse:
          $ref: "#/components/schemas/ManualEvidenceTextResponse"
          description: The plain text response that's entered and saved as manual evidence.
        evidenceFileName:
          $ref: "#/components/schemas/ManualEvidenceLocalFileName"
          description: The name of the file that's uploaded as manual evidence. This name is populated using the evidenceFileName value from the GetEvidenceFileUploadUrl API response.
    S3Url:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^(S|s)3:\/\/[a-zA-Z0-9\-\.\(\)\'\*\_\!\=\+\@\:\s\,\?\/]+$
    ManualEvidenceTextResponse:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: ^[\w\W\s\S]*$
    ManualEvidenceLocalFileName:
      type: string
      minLength: 1
      maxLength: 300
      pattern: "[^\\/]*"
    BatchImportEvidenceToAssessmentControlResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchImportEvidenceToAssessmentControlErrors"
          description: A list of errors that the BatchImportEvidenceToAssessmentControl API returned.
    BatchImportEvidenceToAssessmentControlErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchImportEvidenceToAssessmentControlError"
    BatchImportEvidenceToAssessmentControlError:
      description: An error entity for the BatchImportEvidenceToAssessmentControl API. This is used to provide more meaningful errors than a simple string message.
      type: object
      properties:
        manualEvidence:
          $ref: "#/components/schemas/ManualEvidence"
          description: Manual evidence that can't be collected automatically by Audit Manager.
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code that the BatchImportEvidenceToAssessmentControl API returned.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message that the BatchImportEvidenceToAssessmentControl API returned.
    AssessmentDescription:
      type: string
      maxLength: 1000
      pattern: ^[\w\W\s\S]*$
    AssessmentReportsDestination:
      description: The location where Audit Manager saves assessment reports for the given assessment.
      type: object
      properties:
        destinationType:
          $ref: "#/components/schemas/AssessmentReportDestinationType"
          description: The destination type, such as Amazon S3.
        destination:
          $ref: "#/components/schemas/S3Url"
          description: The destination bucket where Audit Manager stores assessment reports.
    AssessmentReportDestinationType:
      type: string
      enum:
        - S3
    Scope:
      description: The wrapper that contains the Amazon Web Services accounts that are in scope for the assessment. You no longer need to specify which Amazon Web Services services are in scope when you create or update an assessment. Audit Manager infers the services in scope by examining your assessment controls and their data sources, and then mapping this information to the relevant Amazon Web Services services. If an underlying data source changes for your assessment, we automatically update the services scope as needed to reflect the correct Amazon Web Services services. This ensures that your assessment collects accurate and comprehensive evidence about all of the relevant services in your AWS environment.
      type: object
      properties:
        awsAccounts:
          $ref: "#/components/schemas/AWSAccounts"
          description: The Amazon Web Services accounts that are included in the scope of the assessment.
        awsServices:
          $ref: "#/components/schemas/AWSServices"
          description: The Amazon Web Services services that are included in the scope of the assessment. This API parameter is no longer supported. If you use this parameter to specify one or more Amazon Web Services services, Audit Manager ignores this input. Instead, the value for awsServices will show as empty.
    AWSAccounts:
      type: array
      items:
        $ref: "#/components/schemas/AWSAccount"
    AWSAccount:
      description: The wrapper of Amazon Web Services account details, such as account ID or email address.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AccountId"
          description: The identifier for the Amazon Web Services account.
        emailAddress:
          $ref: "#/components/schemas/EmailAddress"
          description: The email address that's associated with the Amazon Web Services account.
        name:
          $ref: "#/components/schemas/AccountName"
          description: The name of the Amazon Web Services account.
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^[0-9]{12}$
    EmailAddress:
      type: string
      minLength: 1
      maxLength: 320
      pattern: ^.*@.*$
    AccountName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: ^[\u0020-\u007E]+$
    AWSServices:
      type: array
      items:
        $ref: "#/components/schemas/AWSService"
    AWSService:
      description: "An Amazon Web Services service such as Amazon S3 or CloudTrail. For an example of how to find an Amazon Web Services service name and how to define it in your assessment scope, see the following: Finding an Amazon Web Services service name to use in your assessment scope Defining an Amazon Web Services service name in your assessment scope"
      type: object
      properties:
        serviceName:
          $ref: "#/components/schemas/AWSServiceName"
          description: The name of the Amazon Web Services service.
    AWSServiceName:
      type: string
      minLength: 1
      maxLength: 40
      pattern: ^[a-zA-Z0-9-\s().]+$
    Roles:
      type: array
      items:
        $ref: "#/components/schemas/Role"
    Role:
      description: The wrapper that contains the Audit Manager role information of the current user. This includes the role type and IAM Amazon Resource Name (ARN).
      type: object
      properties:
        roleType:
          $ref: "#/components/schemas/RoleType"
          description: The type of customer persona. In CreateAssessment, roleType can only be PROCESS_OWNER. In UpdateSettings, roleType can only be PROCESS_OWNER. In BatchCreateDelegationByAssessment, roleType can only be RESOURCE_OWNER.
        roleArn:
          $ref: "#/components/schemas/IamArn"
          description: The Amazon Resource Name (ARN) of the IAM role.
      required:
        - roleType
        - roleArn
    TagMap:
      type: object
      properties: {}
    CreateAssessmentResponse:
      type: object
      properties:
        assessment:
          $ref: "#/components/schemas/Assessment"
    Assessment:
      description: An entity that defines the scope of audit evidence collected by Audit Manager. An Audit Manager assessment is an implementation of an Audit Manager framework.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/AuditManagerArn"
          description: The Amazon Resource Name (ARN) of the assessment.
        awsAccount:
          $ref: "#/components/schemas/AWSAccount"
          description: The Amazon Web Services account that's associated with the assessment.
        metadata:
          $ref: "#/components/schemas/AssessmentMetadata"
          description: The metadata for the assessment.
        framework:
          $ref: "#/components/schemas/AssessmentFramework"
          description: The framework that the assessment was created from.
        tags:
          type: object
          properties: {}
          description: The tags that are associated with the assessment.
    AuditManagerArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:.*:auditmanager:.*
    AssessmentMetadata:
      description: The metadata that's associated with the specified assessment.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AssessmentName"
          description: The name of the assessment.
        id:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier for the assessment.
        description:
          $ref: "#/components/schemas/AssessmentDescription"
          description: The description of the assessment.
        complianceType:
          $ref: "#/components/schemas/ComplianceType"
          description: The name of the compliance standard that's related to the assessment, such as PCI-DSS.
        status:
          $ref: "#/components/schemas/AssessmentStatus"
          description: The overall status of the assessment.
        assessmentReportsDestination:
          $ref: "#/components/schemas/AssessmentReportsDestination"
          description: The destination that evidence reports are stored in for the assessment.
        scope:
          $ref: "#/components/schemas/Scope"
          description: The wrapper of Amazon Web Services accounts and services that are in scope for the assessment.
        roles:
          $ref: "#/components/schemas/Roles"
          description: The roles that are associated with the assessment.
        delegations:
          $ref: "#/components/schemas/Delegations"
          description: The delegations that are associated with the assessment.
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies when the assessment was created.
        lastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The time of the most recent update.
    ComplianceType:
      type: string
      maxLength: 100
      pattern: ^[\w\W\s\S]*$
    AssessmentStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    AssessmentFramework:
      description: The file used to structure and automate Audit Manager assessments for a given compliance standard.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier for the framework.
        arn:
          $ref: "#/components/schemas/AuditManagerArn"
          description: The Amazon Resource Name (ARN) of the framework.
        metadata:
          $ref: "#/components/schemas/FrameworkMetadata"
        controlSets:
          $ref: "#/components/schemas/AssessmentControlSets"
          description: The control sets that are associated with the framework.
    FrameworkMetadata:
      description: The metadata of a framework, such as the name, ID, or description.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AssessmentName"
          description: The name of the framework.
        description:
          $ref: "#/components/schemas/AssessmentFrameworkDescription"
          description: The description of the framework.
        logo:
          $ref: "#/components/schemas/Filename"
          description: The logo that's associated with the framework.
        complianceType:
          $ref: "#/components/schemas/ComplianceType"
          description: The compliance standard that's associated with the framework. For example, this could be PCI DSS or HIPAA.
    AssessmentFrameworkDescription:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[\w\W\s\S]*$
    Filename:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[\w,\s-]+\.[A-Za-z]+$
    AssessmentControlSets:
      type: array
      items:
        $ref: "#/components/schemas/AssessmentControlSet"
    AssessmentControlSet:
      description: Represents a set of controls in an Audit Manager assessment.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ControlSetId"
          description: The identifier of the control set in the assessment. This is the control set name in a plain string format.
        description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description for the control set.
        status:
          $ref: "#/components/schemas/ControlSetStatus"
          description: The current status of the control set.
        roles:
          $ref: "#/components/schemas/Roles"
          description: The roles that are associated with the control set.
        controls:
          $ref: "#/components/schemas/AssessmentControls"
          description: The list of controls that's contained with the control set.
        delegations:
          $ref: "#/components/schemas/Delegations"
          description: The delegations that are associated with the control set.
        systemEvidenceCount:
          $ref: "#/components/schemas/Integer"
          description: The total number of evidence objects that are retrieved automatically for the control set.
        manualEvidenceCount:
          $ref: "#/components/schemas/Integer"
          description: The total number of evidence objects that are uploaded manually to the control set.
    NonEmptyString:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: .*\S.*
    ControlSetStatus:
      type: string
      enum:
        - ACTIVE
        - UNDER_REVIEW
        - REVIEWED
    AssessmentControls:
      type: array
      items:
        $ref: "#/components/schemas/AssessmentControl"
    AssessmentControl:
      description: The control entity that represents a standard control or a custom control in an Audit Manager assessment.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          description: The identifier for the control.
        name:
          $ref: "#/components/schemas/ControlName"
          description: The name of the control.
        description:
          $ref: "#/components/schemas/ControlDescription"
          description: The description of the control.
        status:
          $ref: "#/components/schemas/ControlStatus"
          description: The status of the control.
        response:
          $ref: "#/components/schemas/ControlResponse"
          description: The response of the control.
        comments:
          $ref: "#/components/schemas/ControlComments"
          description: The list of comments that's attached to the control.
        evidenceSources:
          $ref: "#/components/schemas/EvidenceSources"
          description: The list of data sources for the evidence.
        evidenceCount:
          $ref: "#/components/schemas/Integer"
          description: The amount of evidence that's collected for the control.
        assessmentReportEvidenceCount:
          $ref: "#/components/schemas/Integer"
          description: The amount of evidence in the assessment report.
    ControlName:
      type: string
      minLength: 1
      maxLength: 300
      pattern: ^[^\\]*$
    ControlDescription:
      type: string
      maxLength: 1000
      pattern: ^[\w\W\s\S]*$
    ControlStatus:
      type: string
      enum:
        - UNDER_REVIEW
        - REVIEWED
        - INACTIVE
    ControlResponse:
      type: string
      enum:
        - MANUAL
        - AUTOMATE
        - DEFER
        - IGNORE
    ControlComments:
      type: array
      items:
        $ref: "#/components/schemas/ControlComment"
    ControlComment:
      description: A comment that's posted by a user on a control. This includes the author's name, the comment text, and a timestamp.
      type: object
      properties:
        authorName:
          $ref: "#/components/schemas/Username"
          description: The name of the user who authored the comment.
        commentBody:
          $ref: "#/components/schemas/ControlCommentBody"
          description: The body text of a control comment.
        postedDate:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the comment was posted.
    Username:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9-_()\s\+=,.@]+$
    ControlCommentBody:
      type: string
      maxLength: 500
      pattern: ^[\w\W\s\S]*$
    EvidenceSources:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    Integer:
      type: integer
    FrameworkName:
      type: string
      minLength: 1
      maxLength: 300
      pattern: ^[^\\]*$
    FrameworkDescription:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: ^[\w\W\s\S]*$
    CreateAssessmentFrameworkControlSets:
      type: array
      items:
        $ref: "#/components/schemas/CreateAssessmentFrameworkControlSet"
    CreateAssessmentFrameworkControlSet:
      description: A controlSet entity that represents a collection of controls in Audit Manager. This doesn't contain the control set ID.
      type: object
