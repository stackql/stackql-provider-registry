openapi: 3.0.0
info:
  version: "2017-07-25"
  title: AWS Audit Manager
  description: AWS Audit Manager
  x-serviceName: auditmanager
  x-serviceAlias: auditmanager
  x-protocol: rest-json
  x-apiVersion: "2017-07-25"
  x-endpointPrefix: auditmanager
  x-jsonVersion: "1.1"
servers:
  - url: https://auditmanager.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for auditmanager
paths:
  /assessments/{assessment_id}/associateToAssessmentReport:
    put:
      operationId: AssociateAssessmentReportEvidenceFolder
      description: Associates an evidence folder to an assessment report in an Audit Manager assessment.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the assessment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evidenceFolderId:
                  $ref: "#/components/schemas/UUID"
              required:
                - evidenceFolderId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAssessmentReportEvidenceFolderResponse"
  /assessments/{assessment_id}/batchAssociateToAssessmentReport:
    put:
      operationId: BatchAssociateAssessmentReportEvidence
      description: Associates a list of evidence to an assessment report in an Audit Manager assessment.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the assessment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evidenceFolderId:
                  $ref: "#/components/schemas/UUID"
                evidenceIds:
                  $ref: "#/components/schemas/EvidenceIds"
              required:
                - evidenceFolderId
                - evidenceIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateAssessmentReportEvidenceResponse"
  /assessments/{assessment_id}/delegations:
    post:
      operationId: BatchCreateDelegationByAssessment
      description: Creates a batch of delegations for an assessment in Audit Manager.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the assessment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                createDelegationRequests:
                  $ref: "#/components/schemas/CreateDelegationRequests"
              required:
                - createDelegationRequests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateDelegationByAssessmentResponse"
    put:
      operationId: BatchDeleteDelegationByAssessment
      description: Deletes a batch of delegations for an assessment in Audit Manager.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the assessment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                delegationIds:
                  $ref: "#/components/schemas/DelegationIds"
              required:
                - delegationIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteDelegationByAssessmentResponse"
  /assessments/{assessment_id}/batchDisassociateFromAssessmentReport:
    put:
      operationId: BatchDisassociateAssessmentReportEvidence
      description: Disassociates a list of evidence from an assessment report in Audit Manager.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the assessment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evidenceFolderId:
                  $ref: "#/components/schemas/UUID"
                evidenceIds:
                  $ref: "#/components/schemas/EvidenceIds"
              required:
                - evidenceFolderId
                - evidenceIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateAssessmentReportEvidenceResponse"
  /assessments/{assessment_id}/controlSets/{control_set_id}/controls/{control_id}/evidence:
    post:
      operationId: BatchImportEvidenceToAssessmentControl
      description: "Adds one or more pieces of evidence to a control in an Audit Manager assessment. You can import manual evidence from any S3 bucket by specifying the S3 URI of the object. You can also upload a file from your browser, or enter plain text in response to a risk assessment question. The following restrictions apply to this action: manualEvidence can be only one of the following: evidenceFileName, s3ResourcePath, or textResponse Maximum size of an individual evidence file: 100 MB Number of daily manual evidence uploads per control: 100 Supported file formats: See Supported file types for manual evidence in the Audit Manager User Guide For more information about Audit Manager service restrictions, see Quotas and restrictions for Audit Manager."
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the assessment.
        - name: control_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ControlSetId"
          description: The identifier for the control set.
        - name: control_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the control.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                manualEvidence:
                  $ref: "#/components/schemas/ManualEvidenceList"
              required:
                - manualEvidence
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportEvidenceToAssessmentControlResponse"
  /assessments:
    post:
      operationId: CreateAssessment
      description: Creates an assessment in Audit Manager.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AssessmentName"
                description:
                  $ref: "#/components/schemas/AssessmentDescription"
                assessmentReportsDestination:
                  $ref: "#/components/schemas/AssessmentReportsDestination"
                scope:
                  $ref: "#/components/schemas/Scope"
                roles:
                  $ref: "#/components/schemas/Roles"
                frameworkId:
                  $ref: "#/components/schemas/UUID"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - assessmentReportsDestination
                - scope
                - roles
                - frameworkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssessmentResponse"
    get:
      operationId: ListAssessments
      description: Returns a list of current and past assessments from Audit Manager.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssessmentStatus"
          description: The current status of the assessment.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Represents the maximum number of results on a page or for an API request call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssessmentsResponse"
  /assessmentFrameworks:
    post:
      operationId: CreateAssessmentFramework
      description: Creates a custom framework in Audit Manager.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/FrameworkName"
                description:
                  $ref: "#/components/schemas/FrameworkDescription"
                complianceType:
                  $ref: "#/components/schemas/ComplianceType"
                controlSets:
                  $ref: "#/components/schemas/CreateAssessmentFrameworkControlSets"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - controlSets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssessmentFrameworkResponse"
    get:
      operationId: ListAssessmentFrameworks
      description: Returns a list of the frameworks that are available in the Audit Manager framework library.
      parameters:
        - name: frameworkType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/FrameworkType"
          description: The type of framework, such as a standard framework or a custom framework.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Represents the maximum number of results on a page or for an API request call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssessmentFrameworksResponse"
  /assessments/{assessment_id}/reports:
    post:
      operationId: CreateAssessmentReport
      description: Creates an assessment report for the specified assessment.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the assessment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AssessmentReportName"
                description:
                  $ref: "#/components/schemas/AssessmentReportDescription"
                queryStatement:
                  $ref: "#/components/schemas/QueryStatement"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssessmentReportResponse"
  /controls:
    post:
      operationId: CreateControl
      description: Creates a new custom control in Audit Manager.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ControlName"
                description:
                  $ref: "#/components/schemas/ControlDescription"
                testingInformation:
                  $ref: "#/components/schemas/TestingInformation"
                actionPlanTitle:
                  $ref: "#/components/schemas/ActionPlanTitle"
                actionPlanInstructions:
                  $ref: "#/components/schemas/ActionPlanInstructions"
                controlMappingSources:
                  $ref: "#/components/schemas/CreateControlMappingSources"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - controlMappingSources
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateControlResponse"
    get:
      operationId: ListControls
      description: Returns a list of controls from Audit Manager.
      parameters:
        - name: controlType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ControlType"
          description: A filter that narrows the list of controls to a specific type.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results on a page or for an API request call.
        - name: controlCatalogId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ControlCatalogId"
          description: A filter that narrows the list of controls to a specific resource from the Amazon Web Services Control Catalog. To use this parameter, specify the ARN of the Control Catalog resource. You can specify either a control domain, a control objective, or a common control. For information about how to find the ARNs for these resources, see ListDomains , ListObjectives , and ListCommonControls . You can only filter by one Control Catalog resource at a time. Specifying multiple resource ARNs isn’t currently supported. If you want to filter by more than one ARN, we recommend that you run the ListControls operation separately for each ARN. Alternatively, specify UNCATEGORIZED to list controls that aren't mapped to a Control Catalog resource. For example, this operation might return a list of custom controls that don't belong to any control domain or control objective.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListControlsResponse"
  /assessments/{assessment_id}:
    delete:
      operationId: DeleteAssessment
      description: Deletes an assessment in Audit Manager.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the assessment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssessmentResponse"
    get:
      operationId: GetAssessment
      description: Gets information about a specified assessment.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the assessment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssessmentResponse"
    put:
      operationId: UpdateAssessment
      description: Edits an Audit Manager assessment.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the assessment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assessmentName:
                  $ref: "#/components/schemas/AssessmentName"
                assessmentDescription:
                  $ref: "#/components/schemas/AssessmentDescription"
                scope:
                  $ref: "#/components/schemas/Scope"
                assessmentReportsDestination:
                  $ref: "#/components/schemas/AssessmentReportsDestination"
                roles:
                  $ref: "#/components/schemas/Roles"
              required:
                - scope
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAssessmentResponse"
  /assessmentFrameworks/{framework_id}:
    delete:
      operationId: DeleteAssessmentFramework
      description: Deletes a custom framework in Audit Manager.
      parameters:
        - name: framework_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the custom framework.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssessmentFrameworkResponse"
    get:
      operationId: GetAssessmentFramework
      description: Gets information about a specified framework.
      parameters:
        - name: framework_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the framework.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssessmentFrameworkResponse"
    put:
      operationId: UpdateAssessmentFramework
      description: Updates a custom framework in Audit Manager.
      parameters:
        - name: framework_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the framework.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/FrameworkName"
                description:
                  $ref: "#/components/schemas/FrameworkDescription"
                complianceType:
                  $ref: "#/components/schemas/ComplianceType"
                controlSets:
                  $ref: "#/components/schemas/UpdateAssessmentFrameworkControlSets"
              required:
                - name
                - controlSets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAssessmentFrameworkResponse"
  /assessmentFrameworkShareRequests/{request_id}:
    delete:
      operationId: DeleteAssessmentFrameworkShare
      description: Deletes a share request for a custom framework in Audit Manager.
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the share request to be deleted.
        - name: requestType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ShareRequestType"
          description: Specifies whether the share request is a sent request or a received request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssessmentFrameworkShareResponse"
    put:
      operationId: UpdateAssessmentFrameworkShare
      description: Updates a share request for a custom framework in Audit Manager.
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the share request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestType:
                  $ref: "#/components/schemas/ShareRequestType"
                action:
                  $ref: "#/components/schemas/ShareRequestAction"
              required:
                - requestType
                - action
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAssessmentFrameworkShareResponse"
  /assessments/{assessment_id}/reports/{assessment_report_id}:
    delete:
      operationId: DeleteAssessmentReport
      description: "Deletes an assessment report in Audit Manager. When you run the DeleteAssessmentReport operation, Audit Manager attempts to delete the following data: The specified assessment report that’s stored in your S3 bucket The associated metadata that’s stored in Audit Manager If Audit Manager can’t access the assessment report in your S3 bucket, the report isn’t deleted. In this event, the DeleteAssessmentReport operation doesn’t fail. Instead, it proceeds to delete the associated metadata only. You must then delete the assessment report from the S3 bucket yourself. This scenario happens when Audit Manager receives a 403 (Forbidden) or 404 (Not Found) error from Amazon S3. To avoid this, make sure that your S3 bucket is available, and that you configured the correct permissions for Audit Manager to delete resources in your S3 bucket. For an example permissions policy that you can use, see Assessment report destination permissions in the Audit Manager User Guide. For information about the issues that could cause a 403 (Forbidden) or 404 (Not Found) error from Amazon S3, see List of Error Codes in the Amazon Simple Storage Service API Reference."
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the assessment.
        - name: assessment_report_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the assessment report.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssessmentReportResponse"
  /controls/{control_id}:
    delete:
      operationId: DeleteControl
      description: Deletes a custom control in Audit Manager. When you invoke this operation, the custom control is deleted from any frameworks or assessments that it’s currently part of. As a result, Audit Manager will stop collecting evidence for that custom control in all of your assessments. This includes assessments that you previously created before you deleted the custom control.
      parameters:
        - name: control_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the control.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteControlResponse"
    get:
      operationId: GetControl
      description: Gets information about a specified control.
      parameters:
        - name: control_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the control.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetControlResponse"
    put:
      operationId: UpdateControl
      description: Updates a custom control in Audit Manager.
      parameters:
        - name: control_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The identifier for the control.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ControlName"
                description:
                  $ref: "#/components/schemas/ControlDescription"
                testingInformation:
                  $ref: "#/components/schemas/TestingInformation"
                actionPlanTitle:
                  $ref: "#/components/schemas/ActionPlanTitle"
                actionPlanInstructions:
                  $ref: "#/components/schemas/ActionPlanInstructions"
                controlMappingSources:
                  $ref: "#/components/schemas/ControlMappingSources"
              required:
                - name
                - controlMappingSources
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateControlResponse"
  /account/deregisterAccount:
    post:
      operationId: DeregisterAccount
      description: Deregisters an account in Audit Manager. Before you deregister, you can use the UpdateSettings API operation to set your preferred data retention policy. By default, Audit Manager retains your data. If you want to delete your data, you can use the DeregistrationPolicy attribute to request the deletion of your data. For more information about data retention, see Data Protection in the Audit Manager User Guide.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterAccountResponse"
  /account/deregisterOrganizationAdminAccount:
    post:
      operationId: DeregisterOrganizationAdminAccount
      description: "Removes the specified Amazon Web Services account as a delegated administrator for Audit Manager. When you remove a delegated administrator from your Audit Manager settings, you continue to have access to the evidence that you previously collected under that account. This is also the case when you deregister a delegated administrator from Organizations. However, Audit Manager stops collecting and attaching evidence to that delegated administrator account moving forward. Keep in mind the following cleanup task if you use evidence finder: Before you use your management account to remove a delegated administrator, make sure that the current delegated administrator account signs in to Audit Manager and disables evidence finder first. Disabling evidence finder automatically deletes the event data store that was created in their account when they enabled evidence finder. If this task isn’t completed, the event data store remains in their account. In this case, we recommend that the original delegated administrator goes to CloudTrail Lake and manually deletes the event data store. This cleanup task is necessary to ensure that you don't end up with multiple event data stores. Audit Manager ignores an unused event data store after you remove or change a delegated administrator account. However, the unused event data store continues to incur storage costs from CloudTrail Lake if you don't delete it. When you deregister a delegated administrator account for Audit Manager, the data for that account isn’t deleted. If you want to delete resource data for a delegated administrator account, you must perform that task separately before you deregister the account. Either, you can do this in the Audit Manager console. Or, you can use one of the delete API operations that are provided by Audit Manager. To delete your Audit Manager resource data, see the following instructions: DeleteAssessment (see also: Deleting an assessment in the Audit Manager User Guide) DeleteAssessmentFramework (see also: Deleting a custom framework in the Audit Manager User Guide) DeleteAssessmentFrameworkShare (see also: Deleting a share request in the Audit Manager User Guide) DeleteAssessmentReport (see also: Deleting an assessment report in the Audit Manager User Guide) DeleteControl (see also: Deleting a custom control in the Audit Manager User Guide) At this time, Audit Manager doesn't provide an option to delete evidence for a specific delegated administrator. Instead, when your management account deregisters Audit Manager, we perform a cleanup for the current delegated administrator account at the time of deregistration."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                adminAccountId:
                  $ref: "#/components/schemas/AccountId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterOrganizationAdminAccountResponse"
  /assessments/{assessment_id}/disassociateFromAssessmentReport:
    put:
      operationId: DisassociateAssessmentReportEvidenceFolder
      description: Disassociates an evidence folder from the specified assessment report in Audit Manager.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier for the assessment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evidenceFolderId:
                  $ref: "#/components/schemas/UUID"
              required:
                - evidenceFolderId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateAssessmentReportEvidenceFolderResponse"
  /account/status:
    get:
      operationId: GetAccountStatus
      description: Gets the registration status of an account in Audit Manager.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountStatusResponse"
  /assessments/{assessment_id}/reports/{assessment_report_id}/url:
    get:
      operationId: GetAssessmentReportUrl
      description: Gets the URL of an assessment report in Audit Manager.
      parameters:
        - name: assessment_report_id
          in: path
          required: true
          schema:
