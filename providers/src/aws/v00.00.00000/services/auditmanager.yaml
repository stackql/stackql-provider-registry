    GetInsightsResponse:
      type: object
      properties:
        insights:
          $ref: "#/components/schemas/Insights"
          description: The analytics data that the GetInsights API returned.
    Insights:
      description: A summary of the latest analytics data for all your active assessments. This summary is a snapshot of the data that your active assessments collected on the lastUpdated date. It’s important to understand that the following totals are daily counts based on this date — they aren’t a total sum to date. The Insights data is eventually consistent. This means that, when you read data from Insights, the response might not instantly reflect the results of a recently completed write or update operation. If you repeat your read request after a few hours, the response should return the latest data. If you delete an assessment or change its status to inactive, InsightsByAssessment includes data for that assessment as follows. Inactive assessments - If Audit Manager collected evidence for your assessment before you changed it inactive, that evidence is included in the InsightsByAssessment counts for that day. Deleted assessments - If Audit Manager collected evidence for your assessment before you deleted it, that evidence isn't included in the InsightsByAssessment counts for that day.
      type: object
      properties:
        activeAssessmentsCount:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of active assessments in Audit Manager.
        noncompliantEvidenceCount:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of compliance check evidence that Audit Manager classified as non-compliant on the lastUpdated date. This includes evidence that was collected from Security Hub with a Fail ruling, or collected from Config with a Non-compliant ruling.
        compliantEvidenceCount:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of compliance check evidence that Audit Manager classified as compliant on the lastUpdated date. This includes evidence that was collected from Security Hub with a Pass ruling, or collected from Config with a Compliant ruling.
        inconclusiveEvidenceCount:
          $ref: "#/components/schemas/NullableInteger"
          description: "The number of evidence without a compliance check ruling. Evidence is inconclusive when the associated control uses Security Hub or Config as a data source but you didn't enable those services. This is also the case when a control uses a data source that doesn’t support compliance checks (for example: manual evidence, API calls, or CloudTrail). If evidence has a compliance check status of not applicable, it's classed as inconclusive in Insights data."
        assessmentControlsCountByNoncompliantEvidence:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of assessment controls that collected non-compliant evidence on the lastUpdated date.
        totalAssessmentControlsCount:
          $ref: "#/components/schemas/NullableInteger"
          description: The total number of controls across all active assessments.
        lastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the cross-assessment insights were last updated.
    NullableInteger:
      type: integer
    GetInsightsByAssessmentResponse:
      type: object
      properties:
        insights:
          $ref: "#/components/schemas/InsightsByAssessment"
          description: The assessment analytics data that the GetInsightsByAssessment API returned.
    InsightsByAssessment:
      description: A summary of the latest analytics data for a specific active assessment. This summary is a snapshot of the data that was collected on the lastUpdated date. It’s important to understand that the totals in InsightsByAssessment are daily counts based on this date — they aren’t a total sum to date. The InsightsByAssessment data is eventually consistent. This means that when you read data from InsightsByAssessment, the response might not instantly reflect the results of a recently completed write or update operation. If you repeat your read request after a few hours, the response returns the latest data. If you delete an assessment or change its status to inactive, InsightsByAssessment includes data for that assessment as follows. Inactive assessments - If Audit Manager collected evidence for your assessment before you changed it inactive, that evidence is included in the InsightsByAssessment counts for that day. Deleted assessments - If Audit Manager collected evidence for your assessment before you deleted it, that evidence isn't included in the InsightsByAssessment counts for that day.
      type: object
      properties:
        noncompliantEvidenceCount:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of compliance check evidence that Audit Manager classified as non-compliant. This includes evidence that was collected from Security Hub with a Fail ruling, or collected from Config with a Non-compliant ruling.
        compliantEvidenceCount:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of compliance check evidence that Audit Manager classified as compliant. This includes evidence that was collected from Security Hub with a Pass ruling, or collected from Config with a Compliant ruling.
        inconclusiveEvidenceCount:
          $ref: "#/components/schemas/NullableInteger"
          description: The amount of evidence without a compliance check ruling. Evidence is inconclusive if the associated control uses Security Hub or Config as a data source and you didn't enable those services. This is also the case if a control uses a data source that doesn’t support compliance checks (for example, manual evidence, API calls, or CloudTrail). If evidence has a compliance check status of not applicable, it's classified as inconclusive in InsightsByAssessment data.
        assessmentControlsCountByNoncompliantEvidence:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of assessment controls that collected non-compliant evidence on the lastUpdated date.
        totalAssessmentControlsCount:
          $ref: "#/components/schemas/NullableInteger"
          description: The total number of controls in the assessment.
        lastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the assessment insights were last updated.
