openapi: 3.0.0
info:
  version: "2022-11-28"
  title: Amazon DocumentDB Elastic Clusters
  description: Amazon DocumentDB Elastic Clusters
  x-serviceName: docdb-elastic
  x-serviceAlias: docdb_elastic
  x-protocol: rest-json
  x-apiVersion: "2022-11-28"
  x-endpointPrefix: docdb-elastic
  x-jsonVersion: "1.1"
servers:
  - url: https://docdb-elastic.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for docdb-elastic
paths:
  /pending-action:
    post:
      operationId: ApplyPendingMaintenanceAction
      description: The type of pending maintenance action to be applied to the resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applyAction:
                  $ref: "#/components/schemas/InputString"
                applyOn:
                  $ref: "#/components/schemas/InputString"
                optInType:
                  $ref: "#/components/schemas/OptInType"
                resourceArn:
                  $ref: "#/components/schemas/InputString"
              required:
                - applyAction
                - optInType
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyPendingMaintenanceActionOutput"
  /cluster-snapshot/{snapshot_arn}/copy:
    post:
      operationId: CopyClusterSnapshot
      description: Copies a snapshot of an elastic cluster.
      parameters:
        - name: snapshot_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) identifier of the elastic cluster snapshot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                copyTags:
                  $ref: "#/components/schemas/Boolean"
                kmsKeyId:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
                targetSnapshotName:
                  $ref: "#/components/schemas/CopyClusterSnapshotInputTargetSnapshotNameString"
              required:
                - targetSnapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyClusterSnapshotOutput"
  /cluster:
    post:
      operationId: CreateCluster
      description: Creates a new Amazon DocumentDB elastic cluster and returns its cluster structure.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                adminUserName:
                  $ref: "#/components/schemas/String"
                adminUserPassword:
                  $ref: "#/components/schemas/Password"
                authType:
                  $ref: "#/components/schemas/Auth"
                backupRetentionPeriod:
                  $ref: "#/components/schemas/Integer"
                clientToken:
                  $ref: "#/components/schemas/String"
                clusterName:
                  $ref: "#/components/schemas/String"
                kmsKeyId:
                  $ref: "#/components/schemas/String"
                preferredBackupWindow:
                  $ref: "#/components/schemas/String"
                preferredMaintenanceWindow:
                  $ref: "#/components/schemas/String"
                shardCapacity:
                  $ref: "#/components/schemas/Integer"
                shardCount:
                  $ref: "#/components/schemas/Integer"
                shardInstanceCount:
                  $ref: "#/components/schemas/Integer"
                subnetIds:
                  $ref: "#/components/schemas/StringList"
                tags:
                  $ref: "#/components/schemas/TagMap"
                vpcSecurityGroupIds:
                  $ref: "#/components/schemas/StringList"
              required:
                - adminUserName
                - adminUserPassword
                - authType
                - clusterName
                - shardCapacity
                - shardCount
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterOutput"
  /cluster-snapshot:
    post:
      operationId: CreateClusterSnapshot
      description: Creates a snapshot of an elastic cluster.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clusterArn:
                  $ref: "#/components/schemas/String"
                snapshotName:
                  $ref: "#/components/schemas/CreateClusterSnapshotInputSnapshotNameString"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - clusterArn
                - snapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterSnapshotOutput"
  /cluster/{cluster_arn}:
    delete:
      operationId: DeleteCluster
      description: Delete an elastic cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster that is to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterOutput"
    get:
      operationId: GetCluster
      description: Returns information about a specific elastic cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClusterOutput"
    put:
      operationId: UpdateCluster
      description: Modifies an elastic cluster. This includes updating admin-username/password, upgrading the API version, and setting up a backup window and maintenance window
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                adminUserPassword:
                  $ref: "#/components/schemas/Password"
                authType:
                  $ref: "#/components/schemas/Auth"
                backupRetentionPeriod:
                  $ref: "#/components/schemas/Integer"
                clientToken:
                  $ref: "#/components/schemas/String"
                preferredBackupWindow:
                  $ref: "#/components/schemas/String"
                preferredMaintenanceWindow:
                  $ref: "#/components/schemas/String"
                shardCapacity:
                  $ref: "#/components/schemas/Integer"
                shardCount:
                  $ref: "#/components/schemas/Integer"
                shardInstanceCount:
                  $ref: "#/components/schemas/Integer"
                subnetIds:
                  $ref: "#/components/schemas/StringList"
                vpcSecurityGroupIds:
                  $ref: "#/components/schemas/StringList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateClusterOutput"
  /cluster-snapshot/{snapshot_arn}:
    delete:
      operationId: DeleteClusterSnapshot
      description: Delete an elastic cluster snapshot.
      parameters:
        - name: snapshot_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster snapshot that is to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterSnapshotOutput"
    get:
      operationId: GetClusterSnapshot
      description: Returns information about a specific elastic cluster snapshot
      parameters:
        - name: snapshot_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster snapshot.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClusterSnapshotOutput"
  /pending-action/{resource_arn}:
    get:
      operationId: GetPendingMaintenanceAction
      description: Retrieves all maintenance actions that are pending.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InputString"
          description: Retrieves pending maintenance actions for a specific Amazon Resource Name (ARN).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPendingMaintenanceActionOutput"
  /cluster-snapshots:
    get:
      operationId: ListClusterSnapshots
      description: Returns information about snapshots for a specified elastic cluster.
      parameters:
        - name: clusterArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListClusterSnapshotsInputMaxResultsInteger"
          description: The maximum number of elastic cluster snapshot results to receive in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond this token, up to the value specified by max-results. If there is no more data in the responce, the nextToken will not be returned.
        - name: snapshotType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: "The type of cluster snapshots to be returned. You can specify one of the following values: automated - Return all cluster snapshots that Amazon DocumentDB has automatically created for your Amazon Web Services account. manual - Return all cluster snapshots that you have manually created for your Amazon Web Services account."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClusterSnapshotsOutput"
  /clusters:
    get:
      operationId: ListClusters
      description: Returns information about provisioned Amazon DocumentDB elastic clusters.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListClustersInputMaxResultsInteger"
          description: The maximum number of elastic cluster snapshot results to receive in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond this token, up to the value specified by max-results. If there is no more data in the responce, the nextToken will not be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClustersOutput"
  /pending-actions:
    get:
      operationId: ListPendingMaintenanceActions
      description: Retrieves a list of all maintenance actions that are pending.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListPendingMaintenanceActionsInputMaxResultsInteger"
          description: The maximum number of results to include in the response. If more records exist than the specified maxResults value, a pagination token (marker) is included in the response so that the remaining results can be retrieved.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An optional pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond the marker, up to the value specified by maxResults.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPendingMaintenanceActionsOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists all tags on a elastic cluster resource
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN identifier of the elastic cluster resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds metadata tags to an elastic cluster resource
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN identifier of the elastic cluster resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes metadata tags from an elastic cluster resource
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN identifier of the elastic cluster resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys to be removed from the elastic cluster resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /cluster-snapshot/{snapshot_arn}/restore:
    post:
      operationId: RestoreClusterFromSnapshot
      description: Restores an elastic cluster from a snapshot.
      parameters:
        - name: snapshot_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster snapshot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clusterName:
                  $ref: "#/components/schemas/String"
                kmsKeyId:
                  $ref: "#/components/schemas/String"
                shardCapacity:
                  $ref: "#/components/schemas/Integer"
                shardInstanceCount:
                  $ref: "#/components/schemas/Integer"
                subnetIds:
                  $ref: "#/components/schemas/StringList"
                tags:
                  $ref: "#/components/schemas/TagMap"
                vpcSecurityGroupIds:
                  $ref: "#/components/schemas/StringList"
              required:
                - clusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreClusterFromSnapshotOutput"
  /cluster/{cluster_arn}/start:
    post:
      operationId: StartCluster
      description: Restarts the stopped elastic cluster that is specified by clusterARN.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartClusterOutput"
  /cluster/{cluster_arn}/stop:
    post:
      operationId: StopCluster
      description: Stops the running elastic cluster that is specified by clusterArn. The elastic cluster must be in the available state.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopClusterOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    InputString:
      type: string
      minLength: 1
      maxLength: 256
    OptInType:
      type: string
      enum:
        - IMMEDIATE
        - NEXT_MAINTENANCE
        - APPLY_ON
        - UNDO_OPT_IN
    ApplyPendingMaintenanceActionOutput:
      type: object
      properties:
        resourcePendingMaintenanceAction:
          $ref: "#/components/schemas/ResourcePendingMaintenanceAction"
          description: The output of the pending maintenance action being applied.
      required:
        - resourcePendingMaintenanceAction
    ResourcePendingMaintenanceAction:
      description: Provides information about a pending maintenance action for a resource.
      type: object
      properties:
        pendingMaintenanceActionDetails:
          $ref: "#/components/schemas/PendingMaintenanceActionDetailsList"
          description: Provides information about a pending maintenance action for a resource.
        resourceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon DocumentDB Amazon Resource Name (ARN) of the resource to which the pending maintenance action applies.
    PendingMaintenanceActionDetailsList:
      type: array
      items:
        $ref: "#/components/schemas/PendingMaintenanceActionDetails"
    PendingMaintenanceActionDetails:
      description: Retrieves the details of maintenance actions that are pending.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/String"
          description: Displays the specific action of a pending maintenance action.
        autoAppliedAfterDate:
          $ref: "#/components/schemas/String"
          description: Displays the date of the maintenance window when the action is applied. The maintenance action is applied to the resource during its first maintenance window after this date. If this date is specified, any NEXT_MAINTENANCE optInType requests are ignored.
        currentApplyDate:
          $ref: "#/components/schemas/String"
          description: Displays the effective date when the pending maintenance action is applied to the resource.
        description:
          $ref: "#/components/schemas/String"
          description: Displays a description providing more detail about the maintenance action.
        forcedApplyDate:
          $ref: "#/components/schemas/String"
          description: Displays the date when the maintenance action is automatically applied. The maintenance action is applied to the resource on this date regardless of the maintenance window for the resource. If this date is specified, any IMMEDIATE optInType requests are ignored.
        optInStatus:
          $ref: "#/components/schemas/String"
          description: Displays the type of optInType request that has been received for the resource.
      required:
        - action
    String:
      type: string
    Boolean:
      type: boolean
    TagMap:
      type: object
      properties: {}
    CopyClusterSnapshotInputTargetSnapshotNameString:
      type: string
      minLength: 1
      maxLength: 63
    CopyClusterSnapshotOutput:
      type: object
      properties:
        snapshot:
          $ref: "#/components/schemas/ClusterSnapshot"
      required:
        - snapshot
    ClusterSnapshot:
      description: Returns information about a specific elastic cluster snapshot.
      type: object
      properties:
        adminUserName:
          $ref: "#/components/schemas/String"
          description: The name of the elastic cluster administrator.
        clusterArn:
          $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster.
        clusterCreationTime:
          $ref: "#/components/schemas/String"
          description: The time when the elastic cluster was created in Universal Coordinated Time (UTC).
        kmsKeyId:
          $ref: "#/components/schemas/String"
          description: The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are creating a cluster using the same Amazon account that owns this KMS encryption key, you can use the KMS key alias instead of the ARN as the KMS encryption key. If an encryption key is not specified here, Amazon DocumentDB uses the default encryption key that KMS creates for your account. Your account has a different default encryption key for each Amazon Region.
        snapshotArn:
          $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster snapshot.
        snapshotCreationTime:
          $ref: "#/components/schemas/String"
          description: The time when the elastic cluster snapshot was created in Universal Coordinated Time (UTC).
        snapshotName:
          $ref: "#/components/schemas/String"
          description: The name of the elastic cluster snapshot.
        snapshotType:
          $ref: "#/components/schemas/SnapshotType"
          description: "The type of cluster snapshots to be returned. You can specify one of the following values: automated - Return all cluster snapshots that Amazon DocumentDB has automatically created for your Amazon Web Services account. manual - Return all cluster snapshots that you have manually created for your Amazon Web Services account."
        status:
          $ref: "#/components/schemas/Status"
          description: The status of the elastic cluster snapshot.
        subnetIds:
          $ref: "#/components/schemas/StringList"
          description: The Amazon EC2 subnet IDs for the elastic cluster.
        vpcSecurityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: A list of EC2 VPC security groups to associate with the elastic cluster.
      required:
        - adminUserName
        - clusterArn
        - clusterCreationTime
        - kmsKeyId
        - snapshotArn
        - snapshotCreationTime
        - snapshotName
        - status
        - subnetIds
        - vpcSecurityGroupIds
    SnapshotType:
      type: string
      enum:
        - MANUAL
        - AUTOMATED
    Status:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - UPDATING
        - VPC_ENDPOINT_LIMIT_EXCEEDED
        - IP_ADDRESS_LIMIT_EXCEEDED
        - INVALID_SECURITY_GROUP_ID
        - INVALID_SUBNET_ID
        - INACCESSIBLE_ENCRYPTION_CREDS
        - INACCESSIBLE_SECRET_ARN
        - INACCESSIBLE_VPC_ENDPOINT
        - INCOMPATIBLE_NETWORK
        - MERGING
        - MODIFYING
        - SPLITTING
        - COPYING
        - STARTING
        - STOPPING
        - STOPPED
        - MAINTENANCE
        - INACCESSIBLE_ENCRYPTION_CREDENTIALS_RECOVERABLE
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Password:
      type: string
    Auth:
      type: string
      enum:
        - PLAIN_TEXT
        - SECRET_ARN
    Integer:
      type: integer
    CreateClusterOutput:
      type: object
      properties:
        cluster:
          $ref: "#/components/schemas/Cluster"
          description: The new elastic cluster that has been created.
      required:
        - cluster
    Cluster:
      description: Returns information about a specific elastic cluster.
      type: object
      properties:
        adminUserName:
          $ref: "#/components/schemas/String"
          description: The name of the elastic cluster administrator.
        authType:
          $ref: "#/components/schemas/Auth"
          description: The authentication type for the elastic cluster.
        backupRetentionPeriod:
          $ref: "#/components/schemas/Integer"
          description: The number of days for which automatic snapshots are retained.
        clusterArn:
          $ref: "#/components/schemas/String"
          description: The ARN identifier of the elastic cluster.
        clusterEndpoint:
          $ref: "#/components/schemas/String"
          description: The URL used to connect to the elastic cluster.
        clusterName:
          $ref: "#/components/schemas/String"
          description: The name of the elastic cluster.
        createTime:
          $ref: "#/components/schemas/String"
          description: The time when the elastic cluster was created in Universal Coordinated Time (UTC).
        kmsKeyId:
          $ref: "#/components/schemas/String"
          description: The KMS key identifier to use to encrypt the elastic cluster.
        preferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: The daily time range during which automated backups are created if automated backups are enabled, as determined by backupRetentionPeriod.
        preferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "The weekly time range during which system maintenance can occur, in Universal Coordinated Time (UTC). Format: ddd:hh24:mi-ddd:hh24:mi"
        shardCapacity:
          $ref: "#/components/schemas/Integer"
          description: The number of vCPUs assigned to each elastic cluster shard. Maximum is 64. Allowed values are 2, 4, 8, 16, 32, 64.
        shardCount:
          $ref: "#/components/schemas/Integer"
          description: The number of shards assigned to the elastic cluster. Maximum is 32.
        shardInstanceCount:
          $ref: "#/components/schemas/Integer"
          description: The number of replica instances applying to all shards in the cluster. A shardInstanceCount value of 1 means there is one writer instance, and any additional instances are replicas that can be used for reads and to improve availability.
        shards:
          $ref: "#/components/schemas/ShardList"
          description: The total number of shards in the cluster.
        status:
          $ref: "#/components/schemas/Status"
          description: The status of the elastic cluster.
        subnetIds:
          $ref: "#/components/schemas/StringList"
          description: The Amazon EC2 subnet IDs for the elastic cluster.
        vpcSecurityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: A list of EC2 VPC security groups associated with thie elastic cluster.
      required:
        - adminUserName
        - authType
        - clusterArn
        - clusterEndpoint
        - clusterName
        - createTime
        - kmsKeyId
        - preferredMaintenanceWindow
        - shardCapacity
        - shardCount
        - status
        - subnetIds
        - vpcSecurityGroupIds
    ShardList:
      type: array
      items:
        $ref: "#/components/schemas/Shard"
    Shard:
      description: The name of the shard.
      type: object
      properties:
        createTime:
          $ref: "#/components/schemas/String"
          description: The time when the shard was created in Universal Coordinated Time (UTC).
        shardId:
          $ref: "#/components/schemas/String"
          description: The ID of the shard.
        status:
          $ref: "#/components/schemas/Status"
          description: The current status of the shard.
      required:
        - createTime
        - shardId
        - status
    CreateClusterSnapshotInputSnapshotNameString:
      type: string
      minLength: 1
      maxLength: 63
    CreateClusterSnapshotOutput:
      type: object
      properties:
        snapshot:
