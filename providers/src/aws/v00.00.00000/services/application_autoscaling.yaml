        ScalableDimension:
          $ref: "#/components/schemas/ScalableDimension"
          description: The scalable dimension. This string consists of the service namespace, resource type, and scaling property. ecs:service:DesiredCount - The task count of an ECS service. elasticmapreduce:instancegroup:InstanceCount - The instance count of an EMR Instance Group. ec2:spot-fleet-request:TargetCapacity - The target capacity of a Spot Fleet. appstream:fleet:DesiredCapacity - The capacity of an AppStream 2.0 fleet. dynamodb:table:ReadCapacityUnits - The provisioned read capacity for a DynamoDB table. dynamodb:table:WriteCapacityUnits - The provisioned write capacity for a DynamoDB table. dynamodb:index:ReadCapacityUnits - The provisioned read capacity for a DynamoDB global secondary index. dynamodb:index:WriteCapacityUnits - The provisioned write capacity for a DynamoDB global secondary index. rds:cluster:ReadReplicaCount - The count of Aurora Replicas in an Aurora DB cluster. Available for Aurora MySQL-compatible edition and Aurora PostgreSQL-compatible edition. sagemaker:variant:DesiredInstanceCount - The number of EC2 instances for a SageMaker model endpoint variant. custom-resource:ResourceType:Property - The scalable dimension for a custom resource provided by your own application or service. comprehend:document-classifier-endpoint:DesiredInferenceUnits - The number of inference units for an Amazon Comprehend document classification endpoint. comprehend:entity-recognizer-endpoint:DesiredInferenceUnits - The number of inference units for an Amazon Comprehend entity recognizer endpoint. lambda:function:ProvisionedConcurrency - The provisioned concurrency for a Lambda function. cassandra:table:ReadCapacityUnits - The provisioned read capacity for an Amazon Keyspaces table. cassandra:table:WriteCapacityUnits - The provisioned write capacity for an Amazon Keyspaces table. kafka:broker-storage:VolumeSize - The provisioned volume size (in GiB) for brokers in an Amazon MSK cluster. elasticache:cache-cluster:Nodes - The number of nodes for an Amazon ElastiCache cache cluster. elasticache:replication-group:NodeGroups - The number of node groups for an Amazon ElastiCache replication group. elasticache:replication-group:Replicas - The number of replicas per node group for an Amazon ElastiCache replication group. neptune:cluster:ReadReplicaCount - The count of read replicas in an Amazon Neptune DB cluster. sagemaker:variant:DesiredProvisionedConcurrency - The provisioned concurrency for a SageMaker serverless endpoint. sagemaker:inference-component:DesiredCopyCount - The number of copies across an endpoint for a SageMaker inference component. workspaces:workspacespool:DesiredUserSessions - The number of user sessions for the WorkSpaces in the pool.
        PolicyType:
          $ref: "#/components/schemas/PolicyType"
          description: "The scaling policy type. The following policy types are supported: TargetTrackingScaling—Not supported for Amazon EMR StepScaling—Not supported for DynamoDB, Amazon Comprehend, Lambda, Amazon Keyspaces, Amazon MSK, Amazon ElastiCache, or Neptune. PredictiveScaling—Only supported for Amazon ECS"
        StepScalingPolicyConfiguration:
          $ref: "#/components/schemas/StepScalingPolicyConfiguration"
          description: A step scaling policy.
        TargetTrackingScalingPolicyConfiguration:
          $ref: "#/components/schemas/TargetTrackingScalingPolicyConfiguration"
          description: A target tracking scaling policy.
        PredictiveScalingPolicyConfiguration:
          $ref: "#/components/schemas/PredictiveScalingPolicyConfiguration"
          description: The predictive scaling policy configuration.
        Alarms:
          $ref: "#/components/schemas/Alarms"
          description: The CloudWatch alarms associated with the scaling policy.
        CreationTime:
          $ref: "#/components/schemas/TimestampType"
          description: The Unix timestamp for when the scaling policy was created.
      required:
        - PolicyARN
        - PolicyName
        - ServiceNamespace
        - ResourceId
        - ScalableDimension
        - PolicyType
        - CreationTime
    PolicyName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: \p{Print}+
    PolicyType:
      type: string
      enum:
        - StepScaling
        - TargetTrackingScaling
        - PredictiveScaling
    StepScalingPolicyConfiguration:
      description: Represents a step scaling policy configuration to use with Application Auto Scaling. For more information, see Step scaling policies in the Application Auto Scaling User Guide.
      type: object
      properties:
        AdjustmentType:
          $ref: "#/components/schemas/AdjustmentType"
          description: Specifies how the ScalingAdjustment value in a StepAdjustment is interpreted (for example, an absolute number or a percentage). The valid values are ChangeInCapacity, ExactCapacity, and PercentChangeInCapacity. AdjustmentType is required if you are adding a new step scaling policy configuration.
        StepAdjustments:
          $ref: "#/components/schemas/StepAdjustments"
          description: A set of adjustments that enable you to scale based on the size of the alarm breach. At least one step adjustment is required if you are adding a new step scaling policy configuration.
        MinAdjustmentMagnitude:
          $ref: "#/components/schemas/MinAdjustmentMagnitude"
          description: The minimum value to scale by when the adjustment type is PercentChangeInCapacity. For example, suppose that you create a step scaling policy to scale out an Amazon ECS service by 25 percent and you specify a MinAdjustmentMagnitude of 2. If the service has 4 tasks and the scaling policy is performed, 25 percent of 4 is 1. However, because you specified a MinAdjustmentMagnitude of 2, Application Auto Scaling scales out the service by 2 tasks.
        Cooldown:
          $ref: "#/components/schemas/Cooldown"
          description: The amount of time, in seconds, to wait for a previous scaling activity to take effect. If not specified, the default value is 300. For more information, see Cooldown period in the Application Auto Scaling User Guide.
        MetricAggregationType:
          $ref: "#/components/schemas/MetricAggregationType"
          description: The aggregation type for the CloudWatch metrics. Valid values are Minimum, Maximum, and Average. If the aggregation type is null, the value is treated as Average.
    AdjustmentType:
      type: string
      enum:
        - ChangeInCapacity
        - PercentChangeInCapacity
        - ExactCapacity
    StepAdjustments:
      type: array
      items:
        $ref: "#/components/schemas/StepAdjustment"
    StepAdjustment:
      description: "Represents a step adjustment for a StepScalingPolicyConfiguration. Describes an adjustment based on the difference between the value of the aggregated CloudWatch metric and the breach threshold that you've defined for the alarm. For the following examples, suppose that you have an alarm with a breach threshold of 50: To initiate the adjustment when the metric is greater than or equal to 50 and less than 60, specify a lower bound of 0 and an upper bound of 10. To initiate the adjustment when the metric is greater than 40 and less than or equal to 50, specify a lower bound of -10 and an upper bound of 0. There are a few rules for the step adjustments for your step policy: The ranges of your step adjustments can't overlap or have a gap. At most one step adjustment can have a null lower bound. If one step adjustment has a negative lower bound, then there must be a step adjustment with a null lower bound. At most one step adjustment can have a null upper bound. If one step adjustment has a positive upper bound, then there must be a step adjustment with a null upper bound. The upper and lower bound can't be null in the same step adjustment."
      type: object
      properties:
        MetricIntervalLowerBound:
          $ref: "#/components/schemas/MetricScale"
          description: The lower bound for the difference between the alarm threshold and the CloudWatch metric. If the metric value is above the breach threshold, the lower bound is inclusive (the metric must be greater than or equal to the threshold plus the lower bound). Otherwise, it's exclusive (the metric must be greater than the threshold plus the lower bound). A null value indicates negative infinity.
        MetricIntervalUpperBound:
          $ref: "#/components/schemas/MetricScale"
          description: The upper bound for the difference between the alarm threshold and the CloudWatch metric. If the metric value is above the breach threshold, the upper bound is exclusive (the metric must be less than the threshold plus the upper bound). Otherwise, it's inclusive (the metric must be less than or equal to the threshold plus the upper bound). A null value indicates positive infinity. The upper bound must be greater than the lower bound.
        ScalingAdjustment:
          $ref: "#/components/schemas/ScalingAdjustment"
          description: The amount by which to scale, based on the specified adjustment type. A positive value adds to the current capacity while a negative number removes from the current capacity. For exact capacity, you must specify a non-negative value.
      required:
        - ScalingAdjustment
    MetricScale:
      type: number
      format: double
    ScalingAdjustment:
      type: integer
    MinAdjustmentMagnitude:
      type: integer
    Cooldown:
      type: integer
    MetricAggregationType:
      type: string
      enum:
        - Average
        - Minimum
        - Maximum
    TargetTrackingScalingPolicyConfiguration:
      description: Represents a target tracking scaling policy configuration to use with Application Auto Scaling. For more information, see Target tracking scaling policies in the Application Auto Scaling User Guide.
      type: object
      properties:
        TargetValue:
          $ref: "#/components/schemas/MetricScale"
          description: The target value for the metric. Although this property accepts numbers of type Double, it won't accept values that are either too small or too large. Values must be in the range of -2^360 to 2^360. The value must be a valid number based on the choice of metric. For example, if the metric is CPU utilization, then the target value is a percent value that represents how much of the CPU can be used before scaling out. If the scaling policy specifies the ALBRequestCountPerTarget predefined metric, specify the target utilization as the optimal average request count per target during any one-minute interval.
        PredefinedMetricSpecification:
          $ref: "#/components/schemas/PredefinedMetricSpecification"
          description: A predefined metric. You can specify either a predefined metric or a customized metric.
        CustomizedMetricSpecification:
          $ref: "#/components/schemas/CustomizedMetricSpecification"
          description: A customized metric. You can specify either a predefined metric or a customized metric.
        ScaleOutCooldown:
          $ref: "#/components/schemas/Cooldown"
          description: The amount of time, in seconds, to wait for a previous scale-out activity to take effect. For more information and for default values, see Define cooldown periods in the Application Auto Scaling User Guide.
        ScaleInCooldown:
          $ref: "#/components/schemas/Cooldown"
          description: The amount of time, in seconds, after a scale-in activity completes before another scale-in activity can start. For more information and for default values, see Define cooldown periods in the Application Auto Scaling User Guide.
        DisableScaleIn:
          $ref: "#/components/schemas/DisableScaleIn"
          description: Indicates whether scale in by the target tracking scaling policy is disabled. If the value is true, scale in is disabled and the target tracking scaling policy won't remove capacity from the scalable target. Otherwise, scale in is enabled and the target tracking scaling policy can remove capacity from the scalable target. The default value is false.
      required:
        - TargetValue
    PredefinedMetricSpecification:
      description: Represents a predefined metric for a target tracking scaling policy to use with Application Auto Scaling. For more information, Predefined metrics for target tracking scaling policies in the Application Auto Scaling User Guide.
      type: object
      properties:
        PredefinedMetricType:
          $ref: "#/components/schemas/MetricType"
          description: The metric type. The ALBRequestCountPerTarget metric type applies only to Spot Fleets and ECS services.
        ResourceLabel:
          $ref: "#/components/schemas/ResourceLabel"
          description: "Identifies the resource associated with the metric type. You can't specify a resource label unless the metric type is ALBRequestCountPerTarget and there is a target group attached to the Spot Fleet or ECS service. You create the resource label by appending the final portion of the load balancer ARN and the final portion of the target group ARN into a single value, separated by a forward slash (/). The format of the resource label is: app/my-alb/778d41231b141a0f/targetgroup/my-alb-target-group/943f017f100becff. Where: app/`<load-balancer-name>`/`<load-balancer-id>` is the final portion of the load balancer ARN targetgroup/`<target-group-name>`/`<target-group-id>` is the final portion of the target group ARN. To find the ARN for an Application Load Balancer, use the DescribeLoadBalancers API operation. To find the ARN for the target group, use the DescribeTargetGroups API operation."
      required:
        - PredefinedMetricType
    MetricType:
      type: string
      enum:
        - DynamoDBReadCapacityUtilization
        - DynamoDBWriteCapacityUtilization
        - ALBRequestCountPerTarget
        - RDSReaderAverageCPUUtilization
        - RDSReaderAverageDatabaseConnections
        - EC2SpotFleetRequestAverageCPUUtilization
        - EC2SpotFleetRequestAverageNetworkIn
        - EC2SpotFleetRequestAverageNetworkOut
        - SageMakerVariantInvocationsPerInstance
        - ECSServiceAverageCPUUtilization
        - ECSServiceAverageMemoryUtilization
        - AppStreamAverageCapacityUtilization
        - ComprehendInferenceUtilization
        - LambdaProvisionedConcurrencyUtilization
        - CassandraReadCapacityUtilization
        - CassandraWriteCapacityUtilization
        - KafkaBrokerStorageUtilization
        - ElastiCacheEngineCPUUtilization
        - ElastiCacheDatabaseMemoryUsagePercentage
        - ElastiCachePrimaryEngineCPUUtilization
        - ElastiCacheReplicaEngineCPUUtilization
        - ElastiCacheDatabaseMemoryUsageCountedForEvictPercentage
        - NeptuneReaderAverageCPUUtilization
        - SageMakerVariantProvisionedConcurrencyUtilization
        - ElastiCacheDatabaseCapacityUsageCountedForEvictPercentage
        - SageMakerInferenceComponentInvocationsPerCopy
        - WorkSpacesAverageUserSessionsCapacityUtilization
        - SageMakerInferenceComponentConcurrentRequestsPerCopyHighResolution
        - SageMakerVariantConcurrentRequestsPerModelHighResolution
    ResourceLabel:
      type: string
      minLength: 1
      maxLength: 1023
    CustomizedMetricSpecification:
      description: "Represents a CloudWatch metric of your choosing for a target tracking scaling policy to use with Application Auto Scaling. For information about the available metrics for a service, see Amazon Web Services services that publish CloudWatch metrics in the Amazon CloudWatch User Guide. To create your customized metric specification: Add values for each required parameter from CloudWatch. You can use an existing metric, or a new metric that you create. To use your own metric, you must first publish the metric to CloudWatch. For more information, see Publish custom metrics in the Amazon CloudWatch User Guide. Choose a metric that changes proportionally with capacity. The value of the metric should increase or decrease in inverse proportion to the number of capacity units. That is, the value of the metric should decrease when capacity increases, and increase when capacity decreases. For more information about the CloudWatch terminology below, see Amazon CloudWatch concepts in the Amazon CloudWatch User Guide."
      type: object
      properties:
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric. To get the exact metric name, namespace, and dimensions, inspect the Metric object that's returned by a call to ListMetrics.
        Namespace:
          $ref: "#/components/schemas/MetricNamespace"
          description: The namespace of the metric.
        Dimensions:
          $ref: "#/components/schemas/MetricDimensions"
          description: "The dimensions of the metric. Conditional: If you published your metric with dimensions, you must specify the same dimensions in your scaling policy."
        Statistic:
          $ref: "#/components/schemas/MetricStatistic"
          description: The statistic of the metric.
        Unit:
          $ref: "#/components/schemas/MetricUnit"
          description: The unit of the metric. For a complete list of the units that CloudWatch supports, see the MetricDatum data type in the Amazon CloudWatch API Reference.
        Metrics:
          $ref: "#/components/schemas/TargetTrackingMetricDataQueries"
          description: The metrics to include in the target tracking scaling policy, as a metric data query. This can include both raw metric and metric math expressions.
    MetricName:
      type: string
    MetricNamespace:
      type: string
    MetricDimensions:
      type: array
      items:
        $ref: "#/components/schemas/MetricDimension"
    MetricDimension:
      description: Describes the dimension names and values associated with a metric.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/MetricDimensionName"
          description: The name of the dimension.
        Value:
          $ref: "#/components/schemas/MetricDimensionValue"
          description: The value of the dimension.
      required:
        - Name
        - Value
    MetricDimensionName:
      type: string
    MetricDimensionValue:
      type: string
    MetricStatistic:
      type: string
      enum:
        - Average
        - Minimum
        - Maximum
        - SampleCount
        - Sum
    MetricUnit:
      type: string
    TargetTrackingMetricDataQueries:
      type: array
      items:
        $ref: "#/components/schemas/TargetTrackingMetricDataQuery"
    TargetTrackingMetricDataQuery:
      description: The metric data to return. Also defines whether this call is returning data for one metric only, or whether it is performing a math expression on the values of returned metric statistics to create a new time series. A time series is a series of data points, each of which is associated with a timestamp. For more information and examples, see Create a target tracking scaling policy for Application Auto Scaling using metric math in the Application Auto Scaling User Guide.
      type: object
      properties:
        Expression:
          $ref: "#/components/schemas/Expression"
          description: "The math expression to perform on the returned data, if this object is performing a math expression. This expression can use the Id of the other metrics to refer to those metrics, and can also use the Id of other expressions to use the result of those expressions. Conditional: Within each TargetTrackingMetricDataQuery object, you must specify either Expression or MetricStat, but not both."
        Id:
          $ref: "#/components/schemas/Id"
          description: A short name that identifies the object's results in the response. This name must be unique among all MetricDataQuery objects specified for a single scaling policy. If you are performing math expressions on this set of data, this name represents that data and can serve as a variable in the mathematical expression. The valid characters are letters, numbers, and underscores. The first character must be a lowercase letter.
        Label:
          $ref: "#/components/schemas/XmlString"
          description: A human-readable label for this metric or expression. This is especially useful if this is a math expression, so that you know what the value represents.
        MetricStat:
          $ref: "#/components/schemas/TargetTrackingMetricStat"
          description: "Information about the metric data to return. Conditional: Within each MetricDataQuery object, you must specify either Expression or MetricStat, but not both."
        ReturnData:
          $ref: "#/components/schemas/ReturnData"
          description: Indicates whether to return the timestamps and raw data values of this metric. If you use any math expressions, specify true for this value for only the final math expression that the metric specification is based on. You must specify false for ReturnData for all the other metrics and expressions used in the metric specification. If you are only retrieving metrics and not performing any math expressions, do not specify anything for ReturnData. This sets it to its default (true).
      required:
        - Id
    Expression:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    Id:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TargetTrackingMetricStat:
      description: This structure defines the CloudWatch metric to return, along with the statistic and unit. For more information about the CloudWatch terminology below, see Amazon CloudWatch concepts in the Amazon CloudWatch User Guide.
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/TargetTrackingMetric"
          description: The CloudWatch metric to return, including the metric name, namespace, and dimensions. To get the exact metric name, namespace, and dimensions, inspect the Metric object that is returned by a call to ListMetrics.
        Stat:
          $ref: "#/components/schemas/XmlString"
          description: The statistic to return. It can include any CloudWatch statistic or extended statistic. For a list of valid values, see the table in Statistics in the Amazon CloudWatch User Guide. The most commonly used metric for scaling is Average.
        Unit:
          $ref: "#/components/schemas/TargetTrackingMetricUnit"
          description: The unit to use for the returned data points. For a complete list of the units that CloudWatch supports, see the MetricDatum data type in the Amazon CloudWatch API Reference.
      required:
        - Metric
        - Stat
    TargetTrackingMetric:
      description: Represents a specific metric. Metric is a property of the TargetTrackingMetricStat object.
      type: object
      properties:
        Dimensions:
          $ref: "#/components/schemas/TargetTrackingMetricDimensions"
          description: "The dimensions for the metric. For the list of available dimensions, see the Amazon Web Services documentation available from the table in Amazon Web Services services that publish CloudWatch metrics in the Amazon CloudWatch User Guide. Conditional: If you published your metric with dimensions, you must specify the same dimensions in your scaling policy."
        MetricName:
          $ref: "#/components/schemas/TargetTrackingMetricName"
          description: The name of the metric.
        Namespace:
          $ref: "#/components/schemas/TargetTrackingMetricNamespace"
          description: The namespace of the metric. For more information, see the table in Amazon Web Services services that publish CloudWatch metrics in the Amazon CloudWatch User Guide.
    TargetTrackingMetricDimensions:
      type: array
      items:
        $ref: "#/components/schemas/TargetTrackingMetricDimension"
    TargetTrackingMetricDimension:
      description: Describes the dimension of a metric.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/TargetTrackingMetricDimensionName"
          description: The name of the dimension.
        Value:
          $ref: "#/components/schemas/TargetTrackingMetricDimensionValue"
          description: The value of the dimension.
      required:
        - Name
        - Value
    TargetTrackingMetricDimensionName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TargetTrackingMetricDimensionValue:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TargetTrackingMetricName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TargetTrackingMetricNamespace:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TargetTrackingMetricUnit:
      type: string
      minLength: 1
      maxLength: 1023
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    ReturnData:
      type: boolean
    DisableScaleIn:
      type: boolean
    PredictiveScalingPolicyConfiguration:
      description: Represents a predictive scaling policy configuration. Predictive scaling is supported on Amazon ECS services.
      type: object
      properties:
        MetricSpecifications:
          $ref: "#/components/schemas/PredictiveScalingMetricSpecifications"
          description: This structure includes the metrics and target utilization to use for predictive scaling. This is an array, but we currently only support a single metric specification. That is, you can specify a target value and a single metric pair, or a target value and one scaling metric and one load metric.
        Mode:
          $ref: "#/components/schemas/PredictiveScalingMode"
          description: The predictive scaling mode. Defaults to ForecastOnly if not specified.
        SchedulingBufferTime:
          $ref: "#/components/schemas/PredictiveScalingSchedulingBufferTime"
          description: The amount of time, in seconds, that the start time can be advanced. The value must be less than the forecast interval duration of 3600 seconds (60 minutes). Defaults to 300 seconds if not specified.
        MaxCapacityBreachBehavior:
          $ref: "#/components/schemas/PredictiveScalingMaxCapacityBreachBehavior"
          description: Defines the behavior that should be applied if the forecast capacity approaches or exceeds the maximum capacity. Defaults to HonorMaxCapacity if not specified.
        MaxCapacityBuffer:
          $ref: "#/components/schemas/PredictiveScalingMaxCapacityBuffer"
          description: The size of the capacity buffer to use when the forecast capacity is close to or exceeds the maximum capacity. The value is specified as a percentage relative to the forecast capacity. For example, if the buffer is 10, this means a 10 percent buffer, such that if the forecast capacity is 50, and the maximum capacity is 40, then the effective maximum capacity is 55. Required if the MaxCapacityBreachBehavior property is set to IncreaseMaxCapacity, and cannot be used otherwise.
      required:
        - MetricSpecifications
    PredictiveScalingMetricSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/PredictiveScalingMetricSpecification"
    PredictiveScalingMetricSpecification:
      description: This structure specifies the metrics and target utilization settings for a predictive scaling policy. You must specify either a metric pair, or a load metric and a scaling metric individually. Specifying a metric pair instead of individual metrics provides a simpler way to configure metrics for a scaling policy. You choose the metric pair, and the policy automatically knows the correct sum and average statistics to use for the load metric and the scaling metric.
      type: object
      properties:
        TargetValue:
          $ref: "#/components/schemas/MetricScale"
          description: Specifies the target utilization.
        PredefinedMetricPairSpecification:
          $ref: "#/components/schemas/PredictiveScalingPredefinedMetricPairSpecification"
          description: The predefined metric pair specification that determines the appropriate scaling metric and load metric to use.
        PredefinedScalingMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingPredefinedScalingMetricSpecification"
          description: The predefined scaling metric specification.
        PredefinedLoadMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingPredefinedLoadMetricSpecification"
          description: The predefined load metric specification.
        CustomizedScalingMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingCustomizedMetricSpecification"
          description: The customized scaling metric specification.
        CustomizedLoadMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingCustomizedMetricSpecification"
          description: The customized load metric specification.
        CustomizedCapacityMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingCustomizedMetricSpecification"
          description: The customized capacity metric specification.
      required:
        - TargetValue
    PredictiveScalingPredefinedMetricPairSpecification:
      description: "Represents a metric pair for a predictive scaling policy. The following predefined metrics are available for predictive scaling: ECSServiceAverageCPUUtilization ECSServiceAverageMemoryUtilization ECSServiceCPUUtilization ECSServiceMemoryUtilization ECSServiceTotalCPUUtilization ECSServiceTotalMemoryUtilization ALBRequestCount ALBRequestCountPerTarget TotalALBRequestCount"
      type: object
      properties:
        PredefinedMetricType:
          $ref: "#/components/schemas/PredictiveScalingMetricType"
          description: "Indicates which metrics to use. There are two different types of metrics for each metric type: one is a load metric and one is a scaling metric."
        ResourceLabel:
          $ref: "#/components/schemas/ResourceLabel"
          description: A label that uniquely identifies a specific target group from which to determine the total and average request count.
      required:
        - PredefinedMetricType
    PredictiveScalingMetricType:
      type: string
      minLength: 1
      maxLength: 128
    PredictiveScalingPredefinedScalingMetricSpecification:
      description: "Describes a scaling metric for a predictive scaling policy. When returned in the output of DescribePolicies, it indicates that a predictive scaling policy uses individually specified load and scaling metrics instead of a metric pair. The following predefined metrics are available for predictive scaling: ECSServiceAverageCPUUtilization ECSServiceAverageMemoryUtilization ECSServiceCPUUtilization ECSServiceMemoryUtilization ECSServiceTotalCPUUtilization ECSServiceTotalMemoryUtilization ALBRequestCount ALBRequestCountPerTarget TotalALBRequestCount"
      type: object
      properties:
        PredefinedMetricType:
          $ref: "#/components/schemas/PredictiveScalingMetricType"
          description: The metric type.
        ResourceLabel:
          $ref: "#/components/schemas/ResourceLabel"
          description: A label that uniquely identifies a specific target group from which to determine the average request count.
      required:
        - PredefinedMetricType
    PredictiveScalingPredefinedLoadMetricSpecification:
      description: "Describes a load metric for a predictive scaling policy. When returned in the output of DescribePolicies, it indicates that a predictive scaling policy uses individually specified load and scaling metrics instead of a metric pair. The following predefined metrics are available for predictive scaling: ECSServiceAverageCPUUtilization ECSServiceAverageMemoryUtilization ECSServiceCPUUtilization ECSServiceMemoryUtilization ECSServiceTotalCPUUtilization ECSServiceTotalMemoryUtilization ALBRequestCount ALBRequestCountPerTarget TotalALBRequestCount"
      type: object
      properties:
        PredefinedMetricType:
          $ref: "#/components/schemas/PredictiveScalingMetricType"
          description: The metric type.
        ResourceLabel:
          $ref: "#/components/schemas/ResourceLabel"
          description: A label that uniquely identifies a target group.
      required:
        - PredefinedMetricType
    PredictiveScalingCustomizedMetricSpecification:
      description: Represents a CloudWatch metric of your choosing for a predictive scaling policy.
      type: object
      properties:
        MetricDataQueries:
          $ref: "#/components/schemas/PredictiveScalingMetricDataQueries"
          description: One or more metric data queries to provide data points for a metric specification.
      required:
        - MetricDataQueries
    PredictiveScalingMetricDataQueries:
      type: array
      items:
        $ref: "#/components/schemas/PredictiveScalingMetricDataQuery"
    PredictiveScalingMetricDataQuery:
      description: The metric data to return. Also defines whether this call is returning data for one metric only, or whether it is performing a math expression on the values of returned metric statistics to create a new time series. A time series is a series of data points, each of which is associated with a timestamp.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/Id"
          description: A short name that identifies the object's results in the response. This name must be unique among all MetricDataQuery objects specified for a single scaling policy. If you are performing math expressions on this set of data, this name represents that data and can serve as a variable in the mathematical expression. The valid characters are letters, numbers, and underscores. The first character must be a lowercase letter.
        Expression:
          $ref: "#/components/schemas/Expression"
          description: "The math expression to perform on the returned data, if this object is performing a math expression. This expression can use the Id of the other metrics to refer to those metrics, and can also use the Id of other expressions to use the result of those expressions. Conditional: Within each MetricDataQuery object, you must specify either Expression or MetricStat, but not both."
        MetricStat:
          $ref: "#/components/schemas/PredictiveScalingMetricStat"
          description: "Information about the metric data to return. Conditional: Within each MetricDataQuery object, you must specify either Expression or MetricStat, but not both."
        Label:
          $ref: "#/components/schemas/XmlString"
          description: A human-readable label for this metric or expression. This is especially useful if this is a math expression, so that you know what the value represents.
        ReturnData:
          $ref: "#/components/schemas/ReturnData"
          description: Indicates whether to return the timestamps and raw data values of this metric. If you use any math expressions, specify true for this value for only the final math expression that the metric specification is based on. You must specify false for ReturnData for all the other metrics and expressions used in the metric specification. If you are only retrieving metrics and not performing any math expressions, do not specify anything for ReturnData. This sets it to its default (true).
      required:
        - Id
    PredictiveScalingMetricStat:
      description: This structure defines the CloudWatch metric to return, along with the statistic and unit.
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/PredictiveScalingMetric"
          description: The CloudWatch metric to return, including the metric name, namespace, and dimensions. To get the exact metric name, namespace, and dimensions, inspect the Metric object that is returned by a call to ListMetrics.
        Stat:
          $ref: "#/components/schemas/XmlString"
          description: The statistic to return. It can include any CloudWatch statistic or extended statistic. For a list of valid values, see the table in Statistics in the Amazon CloudWatch User Guide. The most commonly used metrics for predictive scaling are Average and Sum.
        Unit:
          $ref: "#/components/schemas/PredictiveScalingMetricUnit"
          description: The unit to use for the returned data points. For a complete list of the units that CloudWatch supports, see the MetricDatum data type in the Amazon CloudWatch API Reference.
      required:
        - Metric
        - Stat
    PredictiveScalingMetric:
      description: Describes the scaling metric.
      type: object
      properties:
        Dimensions:
          $ref: "#/components/schemas/PredictiveScalingMetricDimensions"
          description: Describes the dimensions of the metric.
        MetricName:
          $ref: "#/components/schemas/PredictiveScalingMetricName"
          description: The name of the metric.
        Namespace:
          $ref: "#/components/schemas/PredictiveScalingMetricNamespace"
          description: The namespace of the metric.
    PredictiveScalingMetricDimensions:
      type: array
      items:
        $ref: "#/components/schemas/PredictiveScalingMetricDimension"
    PredictiveScalingMetricDimension:
      description: Describes the dimension of a metric.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/PredictiveScalingMetricDimensionName"
          description: The name of the dimension.
        Value:
          $ref: "#/components/schemas/PredictiveScalingMetricDimensionValue"
          description: The value of the dimension.
      required:
        - Name
        - Value
    PredictiveScalingMetricDimensionName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    PredictiveScalingMetricDimensionValue:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    PredictiveScalingMetricName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    PredictiveScalingMetricNamespace:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    PredictiveScalingMetricUnit:
      type: string
      minLength: 1
      maxLength: 1023
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    PredictiveScalingMode:
      type: string
      enum:
        - ForecastOnly
        - ForecastAndScale
    PredictiveScalingSchedulingBufferTime:
      type: integer
      minimum: 0
      maximum: 3600
    PredictiveScalingMaxCapacityBreachBehavior:
      type: string
      enum:
        - HonorMaxCapacity
        - IncreaseMaxCapacity
    PredictiveScalingMaxCapacityBuffer:
      type: integer
      minimum: 0
      maximum: 100
    Alarms:
      type: array
      items:
        $ref: "#/components/schemas/Alarm"
    Alarm:
      description: Represents a CloudWatch alarm associated with a scaling policy.
      type: object
      properties:
        AlarmName:
          $ref: "#/components/schemas/ResourceId"
          description: The name of the alarm.
        AlarmARN:
          $ref: "#/components/schemas/ResourceId"
          description: The Amazon Resource Name (ARN) of the alarm.
      required:
        - AlarmName
        - AlarmARN
    DescribeScheduledActionsResponse:
      type: object
      properties:
        ScheduledActions:
          $ref: "#/components/schemas/ScheduledActions"
          description: Information about the scheduled actions.
        NextToken:
          $ref: "#/components/schemas/XmlString"
          description: The token required to get the next set of results. This value is null if there are no more results to return.
    ScheduledActions:
      type: array
      items:
        $ref: "#/components/schemas/ScheduledAction"
    ScheduledAction:
      description: Represents a scheduled action.
      type: object
      properties:
        ScheduledActionName:
          $ref: "#/components/schemas/ScheduledActionName"
          description: The name of the scheduled action.
        ScheduledActionARN:
          $ref: "#/components/schemas/ResourceIdMaxLen1600"
          description: The Amazon Resource Name (ARN) of the scheduled action.
        ServiceNamespace:
          $ref: "#/components/schemas/ServiceNamespace"
          description: The namespace of the Amazon Web Services service that provides the resource, or a custom-resource.
        Schedule:
          $ref: "#/components/schemas/ResourceIdMaxLen1600"
          description: 'The schedule for this action. The following formats are supported: At expressions - "at(yyyy-mm-ddThh:mm:ss)" Rate expressions - "rate(value unit)" Cron expressions - "cron(fields)" At expressions are useful for one-time schedules. Cron expressions are useful for scheduled actions that run periodically at a specified date and time, and rate expressions are useful for scheduled actions that run at a regular interval. At and cron expressions use Universal Coordinated Time (UTC) by default. The cron format consists of six fields separated by white spaces: [Minutes] [Hours] [Day_of_Month] [Month] [Day_of_Week] [Year]. For rate expressions, value is a positive integer and unit is minute | minutes | hour | hours | day | days. For more information, see Schedule recurring scaling actions using cron expressions in the Application Auto Scaling User Guide.'
        Timezone:
          $ref: "#/components/schemas/ResourceIdMaxLen1600"
          description: The time zone used when referring to the date and time of a scheduled action, when the scheduled action uses an at or cron expression.
        ResourceId:
          $ref: "#/components/schemas/ResourceIdMaxLen1600"
          description: "The identifier of the resource associated with the scaling policy. This string consists of the resource type and unique identifier. ECS service - The resource type is service and the unique identifier is the cluster name and service name. Example: service/my-cluster/my-service. Spot Fleet - The resource type is spot-fleet-request and the unique identifier is the Spot Fleet request ID. Example: spot-fleet-request/sfr-73fbd2ce-aa30-494c-8788-1cee4EXAMPLE. EMR cluster - The resource type is instancegroup and the unique identifier is the cluster ID and instance group ID. Example: instancegroup/j-2EEZNYKUA1NTV/ig-1791Y4E1L8YI0. AppStream 2.0 fleet - The resource type is fleet and the unique identifier is the fleet name. Example: fleet/sample-fleet. DynamoDB table - The resource type is table and the unique identifier is the table name. Example: table/my-table. DynamoDB global secondary index - The resource type is index and the unique identifier is the index name. Example: table/my-table/index/my-table-index. Aurora DB cluster - The resource type is cluster and the unique identifier is the cluster name. Example: cluster:my-db-cluster. SageMaker endpoint variant - The resource type is variant and the unique identifier is the resource ID. Example: endpoint/my-end-point/variant/KMeansClustering. Custom resources are not supported with a resource type. This parameter must specify the OutputValue from the CloudFormation template stack used to access the resources. The unique identifier is defined by the service provider. More information is available in our GitHub repository. Amazon Comprehend document classification endpoint - The resource type and unique identifier are specified using the endpoint ARN. Example: arn:aws:comprehend:us-west-2:123456789012:document-classifier-endpoint/EXAMPLE. Amazon Comprehend entity recognizer endpoint - The resource type and unique identifier are specified using the endpoint ARN. Example: arn:aws:comprehend:us-west-2:123456789012:entity-recognizer-endpoint/EXAMPLE. Lambda provisioned concurrency - The resource type is function and the unique identifier is the function name with a function version or alias name suffix that is not $LATEST. Example: function:my-function:prod or function:my-function:1. Amazon Keyspaces table - The resource type is table and the unique identifier is the table name. Example: keyspace/mykeyspace/table/mytable. Amazon MSK cluster - The resource type and unique identifier are specified using the cluster ARN. Example: arn:aws:kafka:us-east-1:123456789012:cluster/demo-cluster-1/6357e0b2-0e6a-4b86-a0b4-70df934c2e31-5. Amazon ElastiCache replication group - The resource type is replication-group and the unique identifier is the replication group name. Example: replication-group/mycluster. Amazon ElastiCache cache cluster - The resource type is cache-cluster and the unique identifier is the cache cluster name. Example: cache-cluster/mycluster. Neptune cluster - The resource type is cluster and the unique identifier is the cluster name. Example: cluster:mycluster. SageMaker serverless endpoint - The resource type is variant and the unique identifier is the resource ID. Example: endpoint/my-end-point/variant/KMeansClustering. SageMaker inference component - The resource type is inference-component and the unique identifier is the resource ID. Example: inference-component/my-inference-component. Pool of WorkSpaces - The resource type is workspacespool and the unique identifier is the pool ID. Example: workspacespool/wspool-123456."
        ScalableDimension:
          $ref: "#/components/schemas/ScalableDimension"
          description: The scalable dimension. This string consists of the service namespace, resource type, and scaling property. ecs:service:DesiredCount - The task count of an ECS service. elasticmapreduce:instancegroup:InstanceCount - The instance count of an EMR Instance Group. ec2:spot-fleet-request:TargetCapacity - The target capacity of a Spot Fleet. appstream:fleet:DesiredCapacity - The capacity of an AppStream 2.0 fleet. dynamodb:table:ReadCapacityUnits - The provisioned read capacity for a DynamoDB table. dynamodb:table:WriteCapacityUnits - The provisioned write capacity for a DynamoDB table. dynamodb:index:ReadCapacityUnits - The provisioned read capacity for a DynamoDB global secondary index. dynamodb:index:WriteCapacityUnits - The provisioned write capacity for a DynamoDB global secondary index. rds:cluster:ReadReplicaCount - The count of Aurora Replicas in an Aurora DB cluster. Available for Aurora MySQL-compatible edition and Aurora PostgreSQL-compatible edition. sagemaker:variant:DesiredInstanceCount - The number of EC2 instances for a SageMaker model endpoint variant. custom-resource:ResourceType:Property - The scalable dimension for a custom resource provided by your own application or service. comprehend:document-classifier-endpoint:DesiredInferenceUnits - The number of inference units for an Amazon Comprehend document classification endpoint. comprehend:entity-recognizer-endpoint:DesiredInferenceUnits - The number of inference units for an Amazon Comprehend entity recognizer endpoint. lambda:function:ProvisionedConcurrency - The provisioned concurrency for a Lambda function. cassandra:table:ReadCapacityUnits - The provisioned read capacity for an Amazon Keyspaces table. cassandra:table:WriteCapacityUnits - The provisioned write capacity for an Amazon Keyspaces table. kafka:broker-storage:VolumeSize - The provisioned volume size (in GiB) for brokers in an Amazon MSK cluster. elasticache:cache-cluster:Nodes - The number of nodes for an Amazon ElastiCache cache cluster. elasticache:replication-group:NodeGroups - The number of node groups for an Amazon ElastiCache replication group. elasticache:replication-group:Replicas - The number of replicas per node group for an Amazon ElastiCache replication group. neptune:cluster:ReadReplicaCount - The count of read replicas in an Amazon Neptune DB cluster. sagemaker:variant:DesiredProvisionedConcurrency - The provisioned concurrency for a SageMaker serverless endpoint. sagemaker:inference-component:DesiredCopyCount - The number of copies across an endpoint for a SageMaker inference component. workspaces:workspacespool:DesiredUserSessions - The number of user sessions for the WorkSpaces in the pool.
        StartTime:
          $ref: "#/components/schemas/TimestampType"
          description: The date and time that the action is scheduled to begin, in UTC.
        EndTime:
          $ref: "#/components/schemas/TimestampType"
          description: The date and time that the action is scheduled to end, in UTC.
        ScalableTargetAction:
          $ref: "#/components/schemas/ScalableTargetAction"
          description: The new minimum and maximum capacity. You can set both values or just one. At the scheduled time, if the current capacity is below the minimum capacity, Application Auto Scaling scales out to the minimum capacity. If the current capacity is above the maximum capacity, Application Auto Scaling scales in to the maximum capacity.
        CreationTime:
          $ref: "#/components/schemas/TimestampType"
          description: The date and time that the scheduled action was created.
      required:
        - ScheduledActionName
        - ScheduledActionARN
        - ServiceNamespace
        - Schedule
        - ResourceId
        - CreationTime
    ScheduledActionName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: (?!((^[ ]+.*)|(.*([\u0000-\u001f]|[\u007f-\u009f]|[:/|])+.*)|(.*[ ]+$))).+
    ScalableTargetAction:
      description: Represents the minimum and maximum capacity for a scheduled action.
      type: object
      properties:
        MinCapacity:
          $ref: "#/components/schemas/ResourceCapacity"
          description: The minimum capacity. When the scheduled action runs, the resource will have at least this much capacity, but it might have more depending on other settings, such as the target utilization level of a target tracking scaling policy.
        MaxCapacity:
          $ref: "#/components/schemas/ResourceCapacity"
          description: The maximum capacity. Although you can specify a large maximum capacity, note that service quotas may impose lower limits. Each service has its own default quotas for the maximum capacity of the resource. If you want to specify a higher limit, you can request an increase. For more information, consult the documentation for that service. For information about the default quotas for each service, see Service endpoints and quotas in the Amazon Web Services General Reference.
    GetPredictiveScalingForecastResponse:
      type: object
      properties:
        LoadForecast:
          $ref: "#/components/schemas/LoadForecasts"
          description: The load forecast.
        CapacityForecast:
          $ref: "#/components/schemas/CapacityForecast"
          description: The capacity forecast.
        UpdateTime:
          $ref: "#/components/schemas/TimestampType"
          description: The time the forecast was made.
    LoadForecasts:
      type: array
      items:
        $ref: "#/components/schemas/LoadForecast"
    LoadForecast:
      description: A GetPredictiveScalingForecast call returns the load forecast for a predictive scaling policy. This structure includes the data points for that load forecast, along with the timestamps of those data points and the metric specification.
      type: object
      properties:
        Timestamps:
          $ref: "#/components/schemas/PredictiveScalingForecastTimestamps"
          description: The timestamps for the data points, in UTC format.
        Values:
          $ref: "#/components/schemas/PredictiveScalingForecastValues"
          description: The values of the data points.
        MetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingMetricSpecification"
          description: The metric specification for the load forecast.
      required:
        - Timestamps
        - Values
        - MetricSpecification
    PredictiveScalingForecastTimestamps:
      type: array
      items:
        $ref: "#/components/schemas/TimestampType"
    PredictiveScalingForecastValues:
      type: array
      items:
        $ref: "#/components/schemas/MetricScale"
    CapacityForecast:
      description: A GetPredictiveScalingForecast call returns the capacity forecast for a predictive scaling policy. This structure includes the data points for that capacity forecast, along with the timestamps of those data points.
      type: object
      properties:
        Timestamps:
          $ref: "#/components/schemas/PredictiveScalingForecastTimestamps"
          description: The timestamps for the data points, in UTC format.
        Values:
          $ref: "#/components/schemas/PredictiveScalingForecastValues"
          description: The values of the data points.
      required:
        - Timestamps
        - Values
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: ^arn:.+:application-autoscaling:.+:[0-9]+:scalable-target\/[a-zA-Z0-9-]+$
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: A list of tags. Each tag consists of a tag key and a tag value.
    PutScalingPolicyResponse:
      type: object
      properties:
        PolicyARN:
          $ref: "#/components/schemas/ResourceIdMaxLen1600"
          description: The Amazon Resource Name (ARN) of the resulting scaling policy.
        Alarms:
          $ref: "#/components/schemas/Alarms"
          description: The CloudWatch alarms created for the target tracking scaling policy.
      required:
        - PolicyARN
    PutScheduledActionResponse:
      type: object
    TagMap:
      type: object
      properties: {}
    RegisterScalableTargetResponse:
      type: object
      properties:
        ScalableTargetARN:
          $ref: "#/components/schemas/XmlString"
          description: The ARN of the scalable target.
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    UntagResourceResponse:
      type: object
