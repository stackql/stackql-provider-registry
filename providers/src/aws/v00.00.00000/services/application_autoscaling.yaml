  /GetPredictiveScalingForecast:
    post:
      operationId: GetPredictiveScalingForecast
      description: Retrieves the forecast data for a predictive scaling policy. Load forecasts are predictions of the hourly load values using historical load data from CloudWatch and an analysis of historical trends. Capacity forecasts are represented as predicted values for the minimum capacity that is needed on an hourly basis, based on the hourly load forecast. A minimum of 24 hours of data is required to create the initial forecasts. However, having a full 14 days of historical data results in more accurate forecasts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AnyScaleFrontendService.GetPredictiveScalingForecast
            default: AnyScaleFrontendService.GetPredictiveScalingForecast
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceNamespace:
                  $ref: "#/components/schemas/ServiceNamespace"
                  description: The namespace of the Amazon Web Services service that provides the resource. For a resource provided by your own application or service, use custom-resource instead.
                ResourceId:
                  $ref: "#/components/schemas/ResourceIdMaxLen1600"
                  description: The identifier of the resource.
                ScalableDimension:
                  $ref: "#/components/schemas/ScalableDimension"
                  description: The scalable dimension.
                PolicyName:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the policy.
                StartTime:
                  $ref: "#/components/schemas/TimestampType"
                  description: The inclusive start time of the time range for the forecast data to get. At most, the date and time can be one year before the current date and time
                EndTime:
                  $ref: "#/components/schemas/TimestampType"
                  description: The exclusive end time of the time range for the forecast data to get. The maximum time duration between the start and end time is 30 days.
              required:
                - ServiceNamespace
                - ResourceId
                - ScalableDimension
                - PolicyName
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPredictiveScalingForecastResponse"
