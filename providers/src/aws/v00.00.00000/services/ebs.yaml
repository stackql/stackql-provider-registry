openapi: 3.0.0
info:
  version: "2019-11-02"
  title: Amazon Elastic Block Store
  description: Amazon Elastic Block Store
  x-serviceName: ebs
  x-serviceAlias: ebs
  x-protocol: rest-json
  x-apiVersion: "2019-11-02"
  x-endpointPrefix: ebs
  x-jsonVersion: "1.1"
servers:
  - url: https://ebs.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ebs
paths:
  /snapshots/completion/{snapshot_id}:
    post:
      operationId: CompleteSnapshot
      description: Seals and completes the snapshot after all of the required blocks of data have been written to it. Completing the snapshot changes the status to completed. You cannot write new blocks to a snapshot after it has been completed. You should always retry requests that receive server (5xx) error responses, and ThrottlingException and RequestThrottledException client error responses. For more information see Error retries in the Amazon Elastic Compute Cloud User Guide.
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SnapshotId"
          description: The ID of the snapshot.
        - name: x-amz-ChangedBlocksCount
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChangedBlocksCount"
          description: The number of blocks that were written to the snapshot.
        - name: x-amz-Checksum
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Checksum"
          description: An aggregated Base-64 SHA256 checksum based on the checksums of each written block. To generate the aggregated checksum using the linear aggregation method, arrange the checksums for each written block in ascending order of their block index, concatenate them to form a single string, and then generate the checksum on the entire string using the SHA256 algorithm.
        - name: x-amz-Checksum-Algorithm
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ChecksumAlgorithm"
          description: The algorithm used to generate the checksum. Currently, the only supported algorithm is SHA256.
        - name: x-amz-Checksum-Aggregation-Method
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ChecksumAggregationMethod"
          description: The aggregation method used to generate the checksum. Currently, the only supported aggregation method is LINEAR.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteSnapshotResponse"
  /snapshots/{snapshot_id}/blocks/{block_index}:
    get:
      operationId: GetSnapshotBlock
      description: Returns the data in a block in an Amazon Elastic Block Store snapshot. You should always retry requests that receive server (5xx) error responses, and ThrottlingException and RequestThrottledException client error responses. For more information see Error retries in the Amazon Elastic Compute Cloud User Guide.
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SnapshotId"
          description: The ID of the snapshot containing the block from which to get data. If the specified snapshot is encrypted, you must have permission to use the KMS key that was used to encrypt the snapshot. For more information, see Using encryption in the Amazon Elastic Compute Cloud User Guide.
        - name: block_index
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BlockIndex"
          description: The block index of the block in which to read the data. A block index is a logical index in units of 512 KiB blocks. To identify the block index, divide the logical offset of the data in the logical volume by the block size (logical offset of data/524288). The logical offset of the data must be 512 KiB aligned.
        - name: blockToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BlockToken"
          description: The block token of the block from which to get data. You can obtain the BlockToken by running the ListChangedBlocks or ListSnapshotBlocks operations.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSnapshotBlockResponse"
    put:
      operationId: PutSnapshotBlock
      description: Writes a block of data to a snapshot. If the specified block contains data, the existing data is overwritten. The target snapshot must be in the pending state. Data written to a snapshot must be aligned with 512-KiB sectors. You should always retry requests that receive server (5xx) error responses, and ThrottlingException and RequestThrottledException client error responses. For more information see Error retries in the Amazon Elastic Compute Cloud User Guide.
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SnapshotId"
          description: The ID of the snapshot. If the specified snapshot is encrypted, you must have permission to use the KMS key that was used to encrypt the snapshot. For more information, see Using encryption in the Amazon Elastic Compute Cloud User Guide..
        - name: block_index
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BlockIndex"
          description: The block index of the block in which to write the data. A block index is a logical index in units of 512 KiB blocks. To identify the block index, divide the logical offset of the data in the logical volume by the block size (logical offset of data/524288). The logical offset of the data must be 512 KiB aligned.
        - name: x-amz-Data-Length
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/DataLength"
          description: "The size of the data to write to the block, in bytes. Currently, the only supported size is 524288 bytes. Valid values: 524288"
        - name: x-amz-Progress
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Progress"
          description: The progress of the write process, as a percentage.
        - name: x-amz-Checksum
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Checksum"
          description: A Base64-encoded SHA256 checksum of the data. Only SHA256 checksums are supported.
        - name: x-amz-Checksum-Algorithm
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChecksumAlgorithm"
          description: The algorithm used to generate the checksum. Currently, the only supported algorithm is SHA256.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BlockData:
                  $ref: "#/components/schemas/BlockData"
              required:
                - BlockData
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSnapshotBlockResponse"
  /snapshots/{second_snapshot_id}/changedblocks:
    get:
      operationId: ListChangedBlocks
      description: Returns information about the blocks that are different between two Amazon Elastic Block Store snapshots of the same volume/snapshot lineage. You should always retry requests that receive server (5xx) error responses, and ThrottlingException and RequestThrottledException client error responses. For more information see Error retries in the Amazon Elastic Compute Cloud User Guide.
      parameters:
        - name: firstSnapshotId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SnapshotId"
          description: The ID of the first snapshot to use for the comparison. The FirstSnapshotID parameter must be specified with a SecondSnapshotId parameter; otherwise, an error occurs.
        - name: second_snapshot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SnapshotId"
          description: The ID of the second snapshot to use for the comparison. The SecondSnapshotId parameter must be specified with a FirstSnapshotID parameter; otherwise, an error occurs.
        - name: pageToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageToken"
          description: The token to request the next page of results. If you specify NextToken, then StartingBlockIndex is ignored.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of blocks to be returned by the request. Even if additional blocks can be retrieved from the snapshot, the request can return less blocks than MaxResults or an empty array of blocks. To retrieve the next set of blocks from the snapshot, make another request with the returned NextToken value. The value of NextToken is null when there are no more blocks to return.
        - name: startingBlockIndex
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BlockIndex"
          description: The block index from which the comparison should start. The list in the response will start from this block index or the next valid block index in the snapshots. If you specify NextToken, then StartingBlockIndex is ignored.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChangedBlocksResponse"
  /snapshots/{snapshot_id}/blocks:
    get:
      operationId: ListSnapshotBlocks
      description: Returns information about the blocks in an Amazon Elastic Block Store snapshot. You should always retry requests that receive server (5xx) error responses, and ThrottlingException and RequestThrottledException client error responses. For more information see Error retries in the Amazon Elastic Compute Cloud User Guide.
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SnapshotId"
          description: The ID of the snapshot from which to get block indexes and block tokens.
        - name: pageToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageToken"
          description: The token to request the next page of results. If you specify NextToken, then StartingBlockIndex is ignored.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of blocks to be returned by the request. Even if additional blocks can be retrieved from the snapshot, the request can return less blocks than MaxResults or an empty array of blocks. To retrieve the next set of blocks from the snapshot, make another request with the returned NextToken value. The value of NextToken is null when there are no more blocks to return.
        - name: startingBlockIndex
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BlockIndex"
          description: The block index from which the list should start. The list in the response will start from this block index or the next valid block index in the snapshot. If you specify NextToken, then StartingBlockIndex is ignored.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSnapshotBlocksResponse"
  /snapshots:
    post:
      operationId: StartSnapshot
      description: Creates a new Amazon EBS snapshot. The new snapshot enters the pending state after the request completes. After creating the snapshot, use PutSnapshotBlock to write blocks of data to the snapshot. You should always retry requests that receive server (5xx) error responses, and ThrottlingException and RequestThrottledException client error responses. For more information see Error retries in the Amazon Elastic Compute Cloud User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                VolumeSize:
                  $ref: "#/components/schemas/VolumeSize"
                ParentSnapshotId:
                  $ref: "#/components/schemas/SnapshotId"
                Tags:
                  $ref: "#/components/schemas/Tags"
                Description:
                  $ref: "#/components/schemas/Description"
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                Encrypted:
                  $ref: "#/components/schemas/Boolean"
                KmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                Timeout:
                  $ref: "#/components/schemas/Timeout"
              required:
                - VolumeSize
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSnapshotResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SnapshotId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^snap-[0-9a-f]+$
    ChangedBlocksCount:
      type: integer
      minimum: 0
    Checksum:
      type: string
      maxLength: 64
      pattern: ^[A-Za-z0-9+/=]+$
    ChecksumAlgorithm:
      type: string
      enum:
        - SHA256
      maxLength: 32
      pattern: ^[A-Za-z0-9]+$
    ChecksumAggregationMethod:
      type: string
      enum:
        - LINEAR
      maxLength: 32
      pattern: ^[A-Za-z0-9]+$
    CompleteSnapshotResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/Status"
          description: The status of the snapshot.
    Status:
      type: string
      enum:
        - completed
        - pending
        - error
      maxLength: 32
    BlockIndex:
      type: integer
      minimum: 0
    BlockToken:
      type: string
      maxLength: 256
      pattern: ^[A-Za-z0-9+/=]+$
    GetSnapshotBlockResponse:
      type: object
      properties:
        DataLength:
          $ref: "#/components/schemas/DataLength"
          description: The size of the data in the block.
        BlockData:
          $ref: "#/components/schemas/BlockData"
          description: The data content of the block.
        Checksum:
          $ref: "#/components/schemas/Checksum"
          description: The checksum generated for the block, which is Base64 encoded.
        ChecksumAlgorithm:
          $ref: "#/components/schemas/ChecksumAlgorithm"
          description: The algorithm used to generate the checksum for the block, such as SHA256.
    DataLength:
      type: integer
    BlockData:
      type: string
      format: byte
    PageToken:
      type: string
      maxLength: 256
      pattern: ^[A-Za-z0-9+/=]+$
    MaxResults:
      type: integer
      minimum: 100
      maximum: 10000
    ListChangedBlocksResponse:
      type: object
      properties:
        ChangedBlocks:
          $ref: "#/components/schemas/ChangedBlocks"
          description: An array of objects containing information about the changed blocks.
        ExpiryTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The time when the BlockToken expires.
        VolumeSize:
          $ref: "#/components/schemas/VolumeSize"
          description: The size of the volume in GB.
        BlockSize:
          $ref: "#/components/schemas/BlockSize"
          description: The size of the blocks in the snapshot, in bytes.
        NextToken:
          $ref: "#/components/schemas/PageToken"
          description: The token to use to retrieve the next page of results. This value is null when there are no more results to return.
    ChangedBlocks:
      type: array
      items:
        $ref: "#/components/schemas/ChangedBlock"
    ChangedBlock:
      description: A block of data in an Amazon Elastic Block Store snapshot that is different from another snapshot of the same volume/snapshot lineage.
      type: object
      properties:
        BlockIndex:
          $ref: "#/components/schemas/BlockIndex"
          description: The block index.
        FirstBlockToken:
          $ref: "#/components/schemas/BlockToken"
          description: The block token for the block index of the FirstSnapshotId specified in the ListChangedBlocks operation. This value is absent if the first snapshot does not have the changed block that is on the second snapshot.
        SecondBlockToken:
          $ref: "#/components/schemas/BlockToken"
          description: The block token for the block index of the SecondSnapshotId specified in the ListChangedBlocks operation.
    TimeStamp:
      type: string
      format: date-time
    VolumeSize:
      type: integer
      format: int64
      minimum: 1
    BlockSize:
      type: integer
    ListSnapshotBlocksResponse:
      type: object
      properties:
        Blocks:
          $ref: "#/components/schemas/Blocks"
          description: An array of objects containing information about the blocks.
        ExpiryTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The time when the BlockToken expires.
        VolumeSize:
          $ref: "#/components/schemas/VolumeSize"
          description: The size of the volume in GB.
        BlockSize:
          $ref: "#/components/schemas/BlockSize"
          description: The size of the blocks in the snapshot, in bytes.
        NextToken:
          $ref: "#/components/schemas/PageToken"
          description: The token to use to retrieve the next page of results. This value is null when there are no more results to return.
    Blocks:
      type: array
      items:
        $ref: "#/components/schemas/Block"
    Block:
      description: A block of data in an Amazon Elastic Block Store snapshot.
      type: object
      properties:
        BlockIndex:
          $ref: "#/components/schemas/BlockIndex"
          description: The block index.
        BlockToken:
          $ref: "#/components/schemas/BlockToken"
          description: The block token for the block index.
    Progress:
      type: integer
      minimum: 0
      maximum: 100
    PutSnapshotBlockResponse:
      type: object
      properties:
        Checksum:
          $ref: "#/components/schemas/Checksum"
          description: The SHA256 checksum generated for the block data by Amazon EBS.
        ChecksumAlgorithm:
          $ref: "#/components/schemas/ChecksumAlgorithm"
          description: The algorithm used by Amazon EBS to generate the checksum.
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Describes a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
    TagKey:
      type: string
      maxLength: 127
      pattern: ^[\S\s]+$
    TagValue:
      type: string
      maxLength: 255
      pattern: ^[\S\s]*$
    Description:
      type: string
      maxLength: 255
      pattern: ^[\S\s]+$
    IdempotencyToken:
      type: string
      maxLength: 255
      pattern: ^[\S]+$
    Boolean:
      type: boolean
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:kms:.*:[0-9]{12}:key/.*
    Timeout:
      type: integer
      minimum: 10
      maximum: 4320
    StartSnapshotResponse:
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the snapshot.
        SnapshotId:
          $ref: "#/components/schemas/SnapshotId"
          description: The ID of the snapshot.
        OwnerId:
          $ref: "#/components/schemas/OwnerId"
          description: The Amazon Web Services account ID of the snapshot owner.
        Status:
          $ref: "#/components/schemas/Status"
          description: The status of the snapshot.
        StartTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The timestamp when the snapshot was created.
        VolumeSize:
          $ref: "#/components/schemas/VolumeSize"
          description: The size of the volume, in GiB.
        BlockSize:
          $ref: "#/components/schemas/BlockSize"
          description: The size of the blocks in the snapshot, in bytes.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: The tags applied to the snapshot. You can specify up to 50 tags per snapshot. For more information, see Tagging your Amazon EC2 resources in the Amazon Elastic Compute Cloud User Guide.
        ParentSnapshotId:
          $ref: "#/components/schemas/SnapshotId"
          description: The ID of the parent snapshot.
        KmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the Key Management Service (KMS) key used to encrypt the snapshot.
        SseType:
          $ref: "#/components/schemas/SSEType"
          description: Reserved for future use.
    OwnerId:
      type: string
      minLength: 1
      maxLength: 24
      pattern: \S+
    SSEType:
      type: string
      enum:
        - sse-ebs
        - sse-kms
        - none
  x-stackQL-resources:
    snapshot_blocks:
      id: aws.ebs.snapshot_blocks
      name: snapshot_blocks
      title: snapshot_blocks
      methods:
        get_snapshot_block:
          operation:
            $ref: "#/paths/~1snapshots~1{snapshot_id}~1blocks~1{block_index}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
        put_snapshot_block:
          operation:
            $ref: "#/paths/~1snapshots~1{snapshot_id}~1blocks~1{block_index}/put"
          response:
            openAPIDocKey: "201"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_snapshot_blocks:
          operation:
            $ref: "#/paths/~1snapshots~1{snapshot_id}~1blocks/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/snapshot_blocks/methods/get_snapshot_block"
          - $ref: "#/components/x-stackQL-resources/snapshot_blocks/methods/list_snapshot_blocks"
        insert: []
        update: []
        replace:
          - $ref: "#/components/x-stackQL-resources/snapshot_blocks/methods/put_snapshot_block"
        delete: []
    changed_blocks:
      id: aws.ebs.changed_blocks
      name: changed_blocks
      title: changed_blocks
      methods:
        list_changed_blocks:
          operation:
            $ref: "#/paths/~1snapshots~1{second_snapshot_id}~1changedblocks/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/changed_blocks/methods/list_changed_blocks"
        insert: []
        update: []
        delete: []
