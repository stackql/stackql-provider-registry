      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBackendAuthResponse"
  /backend/{app_id}/storage/{backend_environment_name}/remove:
    post:
      operationId: DeleteBackendStorage
      description: Removes the specified backend storage resource.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The app ID.
        - name: backend_environment_name
