  /backend/{app_id}/storage:
    post:
      operationId: CreateBackendStorage
      description: Creates a backend storage resource.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The app ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
