openapi: 3.0.0
info:
  version: "2020-08-11"
  title: AmplifyBackend
  description: AmplifyBackend
  x-serviceName: amplifybackend
  x-serviceAlias: amplifybackend
  x-protocol: rest-json
  x-apiVersion: "2020-08-11"
  x-endpointPrefix: amplifybackend
  x-jsonVersion: "1.1"
servers:
  - url: https://amplifybackend.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for amplifybackend
paths:
  /backend/{app_id}/environments/{backend_environment_name}/clone:
    post:
      operationId: CloneBackend
      description: This operation clones an existing backend.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The app ID.
        - name: backend_environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the backend environment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TargetEnvironmentName:
                  $ref: "#/components/schemas/__string"
              required:
                - TargetEnvironmentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloneBackendResponse"
  /backend:
    post:
      operationId: CreateBackend
      description: This operation creates a backend for an Amplify app. Backends are automatically created at the time of app creation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AppId:
                  $ref: "#/components/schemas/__string"
                AppName:
                  $ref: "#/components/schemas/__string"
                BackendEnvironmentName:
                  $ref: "#/components/schemas/__string"
                ResourceConfig:
                  $ref: "#/components/schemas/ResourceConfig"
                ResourceName:
                  $ref: "#/components/schemas/__string"
              required:
                - AppId
                - AppName
                - BackendEnvironmentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBackendResponse"
  /backend/{app_id}/api:
    post:
      operationId: CreateBackendAPI
      description: Creates a new backend API resource.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The app ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackendEnvironmentName:
                  $ref: "#/components/schemas/__string"
                ResourceConfig:
                  $ref: "#/components/schemas/BackendAPIResourceConfig"
                ResourceName:
                  $ref: "#/components/schemas/__string"
              required:
                - BackendEnvironmentName
                - ResourceConfig
                - ResourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBackendAPIResponse"
  /backend/{app_id}/auth:
    post:
      operationId: CreateBackendAuth
      description: Creates a new backend authentication resource.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The app ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackendEnvironmentName:
                  $ref: "#/components/schemas/__string"
                ResourceConfig:
                  $ref: "#/components/schemas/CreateBackendAuthResourceConfig"
                ResourceName:
                  $ref: "#/components/schemas/__string"
