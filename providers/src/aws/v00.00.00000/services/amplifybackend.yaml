        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID for the job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBackendJobResponse"
