      description: Deletes an existing backend API resource.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The app ID.
        - name: backend_environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
