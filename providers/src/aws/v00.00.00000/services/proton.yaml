openapi: 3.0.0
info:
  version: "2020-07-20"
  title: AWS Proton
  description: AWS Proton
  x-serviceName: proton
  x-serviceAlias: proton
  x-protocol: json
  x-apiVersion: "2020-07-20"
  x-endpointPrefix: proton
  x-targetPrefix: AwsProton20200720
  x-jsonVersion: "1.0"
servers:
  - url: https://proton.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for proton
paths:
  /AcceptEnvironmentAccountConnection:
    post:
      operationId: AcceptEnvironmentAccountConnection
      description: In a management account, an environment account connection request is accepted. When the environment account connection request is accepted, Proton can use the associated IAM role to provision environment infrastructure resources in the associated environment account. For more information, see Environment account connections in the Proton User guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.AcceptEnvironmentAccountConnection
            default: AwsProton20200720.AcceptEnvironmentAccountConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/EnvironmentAccountConnectionId"
                  description: The ID of the environment account connection.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptEnvironmentAccountConnectionOutput"
  /CancelComponentDeployment:
    post:
      operationId: CancelComponentDeployment
      description: Attempts to cancel a component deployment (for a component that is in the IN_PROGRESS deployment status). For more information about components, see Proton components in the Proton User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CancelComponentDeployment
            default: AwsProton20200720.CancelComponentDeployment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                componentName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the component with the deployment to cancel.
              required:
                - componentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelComponentDeploymentOutput"
  /CancelEnvironmentDeployment:
    post:
      operationId: CancelEnvironmentDeployment
      description: Attempts to cancel an environment deployment on an UpdateEnvironment action, if the deployment is IN_PROGRESS. For more information, see Update an environment in the Proton User guide. The following list includes potential cancellation scenarios. If the cancellation attempt succeeds, the resulting deployment state is CANCELLED. If the cancellation attempt fails, the resulting deployment state is FAILED. If the current UpdateEnvironment action succeeds before the cancellation attempt starts, the resulting deployment state is SUCCEEDED and the cancellation attempt has no effect.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CancelEnvironmentDeployment
            default: AwsProton20200720.CancelEnvironmentDeployment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                environmentName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the environment with the deployment to cancel.
              required:
                - environmentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelEnvironmentDeploymentOutput"
  /CancelServiceInstanceDeployment:
    post:
      operationId: CancelServiceInstanceDeployment
      description: Attempts to cancel a service instance deployment on an UpdateServiceInstance action, if the deployment is IN_PROGRESS. For more information, see Update a service instance in the Proton User guide. The following list includes potential cancellation scenarios. If the cancellation attempt succeeds, the resulting deployment state is CANCELLED. If the cancellation attempt fails, the resulting deployment state is FAILED. If the current UpdateServiceInstance action succeeds before the cancellation attempt starts, the resulting deployment state is SUCCEEDED and the cancellation attempt has no effect.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CancelServiceInstanceDeployment
            default: AwsProton20200720.CancelServiceInstanceDeployment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                serviceInstanceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the service instance with the deployment to cancel.
                serviceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the service with the service instance deployment to cancel.
              required:
                - serviceInstanceName
                - serviceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelServiceInstanceDeploymentOutput"
  /CancelServicePipelineDeployment:
    post:
      operationId: CancelServicePipelineDeployment
      description: Attempts to cancel a service pipeline deployment on an UpdateServicePipeline action, if the deployment is IN_PROGRESS. For more information, see Update a service pipeline in the Proton User guide. The following list includes potential cancellation scenarios. If the cancellation attempt succeeds, the resulting deployment state is CANCELLED. If the cancellation attempt fails, the resulting deployment state is FAILED. If the current UpdateServicePipeline action succeeds before the cancellation attempt starts, the resulting deployment state is SUCCEEDED and the cancellation attempt has no effect.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CancelServicePipelineDeployment
            default: AwsProton20200720.CancelServicePipelineDeployment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                serviceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the service with the service pipeline deployment to cancel.
              required:
                - serviceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelServicePipelineDeploymentOutput"
  /CreateComponent:
    post:
      operationId: CreateComponent
      description: Create an Proton component. A component is an infrastructure extension for a service instance. For more information about components, see Proton components in the Proton User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CreateComponent
            default: AwsProton20200720.CreateComponent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: The client token for the created component.
                description:
                  $ref: "#/components/schemas/Description"
                  description: An optional customer-provided description of the component.
                environmentName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Proton environment that you want to associate this component with. You must specify this when you don't specify serviceInstanceName and serviceName.
                manifest:
                  $ref: "#/components/schemas/TemplateManifestContents"
                  description: A path to a manifest file that lists the Infrastructure as Code (IaC) file, template language, and rendering engine for infrastructure that a custom component provisions.
                name:
                  $ref: "#/components/schemas/ResourceName"
                  description: The customer-provided name of the component.
                serviceInstanceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the service instance that you want to attach this component to. If you don't specify this, the component isn't attached to any service instance. Specify both serviceInstanceName and serviceName or neither of them.
                serviceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the service that serviceInstanceName is associated with. If you don't specify this, the component isn't attached to any service instance. Specify both serviceInstanceName and serviceName or neither of them.
                serviceSpec:
                  $ref: "#/components/schemas/SpecContents"
                  description: The service spec that you want the component to use to access service inputs. Set this only when you attach the component to a service instance.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the Proton component. A tag is a key-value pair. For more information, see Proton resources and tagging in the Proton User Guide.
                templateFile:
                  $ref: "#/components/schemas/TemplateFileContents"
                  description: A path to the Infrastructure as Code (IaC) file describing infrastructure that a custom component provisions. Components support a single IaC file, even if you use Terraform as your template language.
              required:
                - manifest
                - name
                - templateFile
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComponentOutput"
  /CreateEnvironment:
    post:
      operationId: CreateEnvironment
      description: "Deploy a new environment. An Proton environment is created from an environment template that defines infrastructure and resources that can be shared across services. You can provision environments using the following methods: Amazon Web Services-managed provisioning: Proton makes direct calls to provision your resources. Self-managed provisioning: Proton makes pull requests on your repository to provide compiled infrastructure as code (IaC) files that your IaC engine uses to provision resources. For more information, see Environments and Provisioning methods in the Proton User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CreateEnvironment
            default: AwsProton20200720.CreateEnvironment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                codebuildRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM service role that allows Proton to provision infrastructure using CodeBuild-based provisioning on your behalf. To use CodeBuild-based provisioning for the environment or for any service instance running in the environment, specify either the environmentAccountConnectionId or codebuildRoleArn parameter.
                componentRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM service role that Proton uses when provisioning directly defined components in this environment. It determines the scope of infrastructure that a component can provision. You must specify componentRoleArn to allow directly defined components to be associated with this environment. For more information about components, see Proton components in the Proton User Guide.
                description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the environment that's being created and deployed.
                environmentAccountConnectionId:
                  $ref: "#/components/schemas/EnvironmentAccountConnectionId"
                  description: The ID of the environment account connection that you provide if you're provisioning your environment infrastructure resources to an environment account. For more information, see Environment account connections in the Proton User guide. To use Amazon Web Services-managed provisioning for the environment, specify either the environmentAccountConnectionId or protonServiceRoleArn parameter and omit the provisioningRepository parameter.
                name:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the environment.
                protonServiceRoleArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the Proton service role that allows Proton to make calls to other services on your behalf. To use Amazon Web Services-managed provisioning for the environment, specify either the environmentAccountConnectionId or protonServiceRoleArn parameter and omit the provisioningRepository parameter.
                provisioningRepository:
                  $ref: "#/components/schemas/RepositoryBranchInput"
                  description: The linked repository that you use to host your rendered infrastructure templates for self-managed provisioning. A linked repository is a repository that has been registered with Proton. For more information, see CreateRepository. To use self-managed provisioning for the environment, specify this parameter and omit the environmentAccountConnectionId and protonServiceRoleArn parameters.
                spec:
                  $ref: "#/components/schemas/SpecContents"
                  description: A YAML formatted string that provides inputs as defined in the environment template bundle schema file. For more information, see Environments in the Proton User Guide.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the Proton environment. A tag is a key-value pair. For more information, see Proton resources and tagging in the Proton User Guide.
                templateMajorVersion:
                  $ref: "#/components/schemas/TemplateVersionPart"
                  description: The major version of the environment template.
                templateMinorVersion:
                  $ref: "#/components/schemas/TemplateVersionPart"
                  description: The minor version of the environment template.
                templateName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the environment template. For more information, see Environment Templates in the Proton User Guide.
              required:
                - name
                - spec
                - templateMajorVersion
                - templateName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentOutput"
  /CreateEnvironmentAccountConnection:
    post:
      operationId: CreateEnvironmentAccountConnection
      description: Create an environment account connection in an environment account so that environment infrastructure resources can be provisioned in the environment account from a management account. An environment account connection is a secure bi-directional connection between a management account and an environment account that maintains authorization and permissions. For more information, see Environment account connections in the Proton User guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CreateEnvironmentAccountConnection
            default: AwsProton20200720.CreateEnvironmentAccountConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: When included, if two identical requests are made with the same client token, Proton returns the environment account connection that the first request created.
                codebuildRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM service role in the environment account. Proton uses this role to provision infrastructure resources using CodeBuild-based provisioning in the associated environment account.
                componentRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM service role that Proton uses when provisioning directly defined components in the associated environment account. It determines the scope of infrastructure that a component can provision in the account. You must specify componentRoleArn to allow directly defined components to be associated with any environments running in this account. For more information about components, see Proton components in the Proton User Guide.
                environmentName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Proton environment that's created in the associated management account.
                managementAccountId:
                  $ref: "#/components/schemas/AwsAccountId"
                  description: The ID of the management account that accepts or rejects the environment account connection. You create and manage the Proton environment in this account. If the management account accepts the environment account connection, Proton can use the associated IAM role to provision environment infrastructure resources in the associated environment account.
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM service role that's created in the environment account. Proton uses this role to provision infrastructure resources in the associated environment account.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the Proton environment account connection. A tag is a key-value pair. For more information, see Proton resources and tagging in the Proton User Guide.
              required:
                - environmentName
                - managementAccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentAccountConnectionOutput"
  /CreateEnvironmentTemplate:
    post:
      operationId: CreateEnvironmentTemplate
      description: "Create an environment template for Proton. For more information, see Environment Templates in the Proton User Guide. You can create an environment template in one of the two following ways: Register and publish a standard environment template that instructs Proton to deploy and manage environment infrastructure. Register and publish a customer managed environment template that connects Proton to your existing provisioned infrastructure that you manage. Proton doesn't manage your existing provisioned infrastructure. To create an environment template for customer provisioned and managed infrastructure, include the provisioning parameter and set the value to CUSTOMER_MANAGED. For more information, see Register and publish an environment template in the Proton User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CreateEnvironmentTemplate
            default: AwsProton20200720.CreateEnvironmentTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the environment template.
                displayName:
                  $ref: "#/components/schemas/DisplayName"
                  description: The environment template name as displayed in the developer interface.
                encryptionKey:
                  $ref: "#/components/schemas/Arn"
                  description: A customer provided encryption key that Proton uses to encrypt data.
                name:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the environment template.
                provisioning:
                  $ref: "#/components/schemas/Provisioning"
                  description: When included, indicates that the environment template is for customer provisioned and managed infrastructure.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the Proton environment template. A tag is a key-value pair. For more information, see Proton resources and tagging in the Proton User Guide.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentTemplateOutput"
  /CreateEnvironmentTemplateVersion:
    post:
      operationId: CreateEnvironmentTemplateVersion
      description: Create a new major or minor version of an environment template. A major version of an environment template is a version that isn't backwards compatible. A minor version of an environment template is a version that's backwards compatible within its major version.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CreateEnvironmentTemplateVersion
            default: AwsProton20200720.CreateEnvironmentTemplateVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: When included, if two identical requests are made with the same client token, Proton returns the environment template version that the first request created.
                description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the new version of an environment template.
                majorVersion:
                  $ref: "#/components/schemas/TemplateVersionPart"
                  description: To create a new minor version of the environment template, include major Version. To create a new major and minor version of the environment template, exclude major Version.
                source:
                  $ref: "#/components/schemas/TemplateVersionSourceInput"
                  description: An object that includes the template bundle S3 bucket path and name for the new version of an template.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the Proton environment template version. A tag is a key-value pair. For more information, see Proton resources and tagging in the Proton User Guide.
                templateName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the environment template.
              required:
                - source
                - templateName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentTemplateVersionOutput"
  /CreateRepository:
    post:
      operationId: CreateRepository
      description: Create and register a link to a repository. Proton uses the link to repeatedly access the repository, to either push to it (self-managed provisioning) or pull from it (template sync). You can share a linked repository across multiple resources (like environments using self-managed provisioning, or synced templates). When you create a repository link, Proton creates a service-linked role for you. For more information, see Self-managed provisioning, Template bundles, and Template sync configurations in the Proton User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CreateRepository
            default: AwsProton20200720.CreateRepository
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                connectionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of your AWS CodeStar connection that connects Proton to your repository provider account. For more information, see Setting up for Proton in the Proton User Guide.
                encryptionKey:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of your customer Amazon Web Services Key Management Service (Amazon Web Services KMS) key.
                name:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The repository name (for example, myrepos/myrepo).
                provider:
                  $ref: "#/components/schemas/RepositoryProvider"
                  description: The repository provider.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the Proton repository. A tag is a key-value pair. For more information, see Proton resources and tagging in the Proton User Guide.
              required:
                - connectionArn
                - name
                - provider
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRepositoryOutput"
  /CreateService:
    post:
      operationId: CreateService
      description: Create an Proton service. An Proton service is an instantiation of a service template and often includes several service instances and pipeline. For more information, see Services in the Proton User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CreateService
            default: AwsProton20200720.CreateService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                branchName:
                  $ref: "#/components/schemas/GitBranchName"
                  description: The name of the code repository branch that holds the code that's deployed in Proton. Don't include this parameter if your service template doesn't include a service pipeline.
                description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the Proton service.
                name:
                  $ref: "#/components/schemas/ResourceName"
                  description: The service name.
                repositoryConnectionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the repository connection. For more information, see Setting up an AWS CodeStar connection in the Proton User Guide. Don't include this parameter if your service template doesn't include a service pipeline.
                repositoryId:
                  $ref: "#/components/schemas/RepositoryId"
                  description: The ID of the code repository. Don't include this parameter if your service template doesn't include a service pipeline.
                spec:
                  $ref: "#/components/schemas/SpecContents"
                  description: A link to a spec file that provides inputs as defined in the service template bundle schema file. The spec file is in YAML format. Don’t include pipeline inputs in the spec if your service template doesn’t include a service pipeline. For more information, see Create a service in the Proton User Guide.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the Proton service. A tag is a key-value pair. For more information, see Proton resources and tagging in the Proton User Guide.
                templateMajorVersion:
                  $ref: "#/components/schemas/TemplateVersionPart"
                  description: The major version of the service template that was used to create the service.
                templateMinorVersion:
                  $ref: "#/components/schemas/TemplateVersionPart"
                  description: The minor version of the service template that was used to create the service.
                templateName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the service template that's used to create the service.
              required:
                - name
                - spec
                - templateMajorVersion
                - templateName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceOutput"
  /CreateServiceInstance:
    post:
      operationId: CreateServiceInstance
      description: Create a service instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CreateServiceInstance
            default: AwsProton20200720.CreateServiceInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: The client token of the service instance to create.
                name:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the service instance to create.
                serviceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the service the service instance is added to.
                spec:
                  $ref: "#/components/schemas/SpecContents"
                  description: The spec for the service instance you want to create.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the Proton service instance. A tag is a key-value pair. For more information, see Proton resources and tagging in the Proton User Guide.
                templateMajorVersion:
                  $ref: "#/components/schemas/TemplateVersionPart"
                  description: To create a new major and minor version of the service template, exclude major Version.
                templateMinorVersion:
                  $ref: "#/components/schemas/TemplateVersionPart"
                  description: To create a new minor version of the service template, include a major Version.
              required:
                - name
                - serviceName
                - spec
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceInstanceOutput"
  /CreateServiceSyncConfig:
    post:
      operationId: CreateServiceSyncConfig
      description: Create the Proton Ops configuration file.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AwsProton20200720.CreateServiceSyncConfig
            default: AwsProton20200720.CreateServiceSyncConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                branch:
                  $ref: "#/components/schemas/GitBranchName"
                  description: The repository branch for your Proton Ops file.
                filePath:
                  $ref: "#/components/schemas/OpsFilePath"
                  description: The path to the Proton Ops file.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The repository name.
                repositoryProvider:
                  $ref: "#/components/schemas/RepositoryProvider"
                  description: The provider type for your repository.
                serviceName:
                  $ref: "#/components/schemas/ResourceName"
