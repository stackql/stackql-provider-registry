        Encrypted:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether server-side encryption (SSE) was enabled during this operation.
        RequestResponses:
          $ref: "#/components/schemas/PutRecordBatchResponseEntryList"
