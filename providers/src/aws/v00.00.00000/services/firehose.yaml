          $ref: "#/components/schemas/GlueDataCatalogARN"
          description: Specifies the Glue catalog ARN identifier of the destination Apache Iceberg Tables. You must specify the ARN in the format arn:aws:glue:region:account-id:catalog.
        WarehouseLocation:
          $ref: "#/components/schemas/WarehouseLocation"
          description: The warehouse location for Apache Iceberg tables. You must configure this when schema evolution and table creation is enabled. Amazon Data Firehose is in preview release and is subject to change.
    GlueDataCatalogARN:
