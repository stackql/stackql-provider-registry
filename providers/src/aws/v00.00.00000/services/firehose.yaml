    UntagDeliveryStreamOutput:
      type: object
    S3DestinationUpdate:
      description: Describes an update for a destination in Amazon S3.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services credentials. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        BucketARN:
          $ref: "#/components/schemas/BucketARN"
          description: The ARN of the S3 bucket. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The "YYYY/MM/DD/HH" time format prefix is automatically used for delivered Amazon S3 files. You can also specify a custom prefix, as described in Custom Prefixes for Amazon S3 Objects.
        ErrorOutputPrefix:
          $ref: "#/components/schemas/ErrorOutputPrefix"
          description: A prefix that Firehose evaluates and adds to failed records before writing them to S3. This prefix appears immediately following the bucket name. For information about how to specify this prefix, see Custom Prefixes for Amazon S3 Objects.
        BufferingHints:
          $ref: "#/components/schemas/BufferingHints"
          description: The buffering option. If no value is specified, BufferingHints object default values are used.
        CompressionFormat:
          $ref: "#/components/schemas/CompressionFormat"
          description: The compression format. If no value is specified, the default is UNCOMPRESSED. The compression formats SNAPPY or ZIP cannot be specified for Amazon Redshift destinations because they are not supported by the Amazon Redshift COPY operation that reads from the S3 bucket.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: The encryption configuration. If no value is specified, the default is no encryption.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
          description: The CloudWatch logging options for your Firehose stream.
    ExtendedS3DestinationUpdate:
      description: Describes an update for a destination in Amazon S3.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services credentials. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        BucketARN:
          $ref: "#/components/schemas/BucketARN"
          description: The ARN of the S3 bucket. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The "YYYY/MM/DD/HH" time format prefix is automatically used for delivered Amazon S3 files. You can also specify a custom prefix, as described in Custom Prefixes for Amazon S3 Objects.
        ErrorOutputPrefix:
          $ref: "#/components/schemas/ErrorOutputPrefix"
          description: A prefix that Firehose evaluates and adds to failed records before writing them to S3. This prefix appears immediately following the bucket name. For information about how to specify this prefix, see Custom Prefixes for Amazon S3 Objects.
        BufferingHints:
          $ref: "#/components/schemas/BufferingHints"
          description: The buffering option.
        CompressionFormat:
          $ref: "#/components/schemas/CompressionFormat"
          description: The compression format. If no value is specified, the default is UNCOMPRESSED.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: The encryption configuration. If no value is specified, the default is no encryption.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
          description: The Amazon CloudWatch logging options for your Firehose stream.
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
          description: The data processing configuration.
        S3BackupMode:
          $ref: "#/components/schemas/S3BackupMode"
          description: You can update a Firehose stream to enable Amazon S3 backup if it is disabled. If backup is enabled, you can't update the Firehose stream to disable it.
        S3BackupUpdate:
          $ref: "#/components/schemas/S3DestinationUpdate"
          description: The Amazon S3 destination for backup.
        DataFormatConversionConfiguration:
          $ref: "#/components/schemas/DataFormatConversionConfiguration"
