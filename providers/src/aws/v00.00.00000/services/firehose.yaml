        DestinationTableConfigurationList:
          $ref: "#/components/schemas/DestinationTableConfigurationList"
          description: Provides a list of DestinationTableConfigurations which Firehose uses to deliver data to Apache Iceberg Tables. Firehose will write data with insert if table specific configuration is not provided here.
        SchemaEvolutionConfiguration:
          $ref: "#/components/schemas/SchemaEvolutionConfiguration"
          description: The configuration to enable automatic schema evolution. Amazon Data Firehose is in preview release and is subject to change.
        TableCreationConfiguration:
          $ref: "#/components/schemas/TableCreationConfiguration"
          description: The configuration to enable automatic table creation. Amazon Data Firehose is in preview release and is subject to change.
