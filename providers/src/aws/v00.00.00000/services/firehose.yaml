    ElasticsearchDestinationUpdate:
      description: Describes an update for a destination in Amazon OpenSearch Service.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the IAM role to be assumed by Firehose for calling the Amazon OpenSearch Service Configuration API and for indexing documents. For more information, see Grant Firehose Access to an Amazon S3 Destination and Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        DomainARN:
          $ref: "#/components/schemas/ElasticsearchDomainARN"
          description: The ARN of the Amazon OpenSearch Service domain. The IAM role must have permissions for DescribeDomain, DescribeDomains, and DescribeDomainConfig after assuming the IAM role specified in RoleARN. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces. Specify either ClusterEndpoint or DomainARN.
        ClusterEndpoint:
          $ref: "#/components/schemas/ElasticsearchClusterEndpoint"
          description: The endpoint to use when communicating with the cluster. Specify either this ClusterEndpoint or the DomainARN field.
        IndexName:
          $ref: "#/components/schemas/ElasticsearchIndexName"
          description: The Elasticsearch index name.
        TypeName:
          $ref: "#/components/schemas/ElasticsearchTypeName"
          description: The Elasticsearch type name. For Elasticsearch 6.x, there can be only one type per index. If you try to specify a new type for an existing index that already has another type, Firehose returns an error during runtime. If you upgrade Elasticsearch from 6.x to 7.x and don’t update your Firehose stream, Firehose still delivers data to Elasticsearch with the old index name and type name. If you want to update your Firehose stream with a new index name, provide an empty string for TypeName.
        IndexRotationPeriod:
          $ref: "#/components/schemas/ElasticsearchIndexRotationPeriod"
          description: The Elasticsearch index rotation period. Index rotation appends a timestamp to IndexName to facilitate the expiration of old data. For more information, see Index Rotation for the Amazon OpenSearch Service Destination. Default value is OneDay.
        BufferingHints:
          $ref: "#/components/schemas/ElasticsearchBufferingHints"
          description: The buffering options. If no value is specified, ElasticsearchBufferingHints object default values are used.
        RetryOptions:
          $ref: "#/components/schemas/ElasticsearchRetryOptions"
          description: The retry behavior in case Firehose is unable to deliver documents to Amazon OpenSearch Service. The default value is 300 (5 minutes).
        S3Update:
          $ref: "#/components/schemas/S3DestinationUpdate"
          description: The Amazon S3 destination.
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
          description: The data processing configuration.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
          description: The CloudWatch logging options for your Firehose stream.
        DocumentIdOptions:
          $ref: "#/components/schemas/DocumentIdOptions"
          description: Indicates the method for setting up document ID. The supported methods are Firehose generated document ID and OpenSearch Service generated document ID.
    AmazonopensearchserviceDestinationUpdate:
