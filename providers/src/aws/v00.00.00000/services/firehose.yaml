        - RecordId
    PutResponseRecordId:
      type: string
      minLength: 1
    PutRecordBatchRequestEntryList:
      type: array
      items:
        $ref: "#/components/schemas/Record"
    PutRecordBatchOutput:
      type: object
      properties:
        FailedPutCount:
          $ref: "#/components/schemas/NonNegativeIntegerObject"
