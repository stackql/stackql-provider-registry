openapi: 3.0.0
info:
  version: "2015-08-04"
  title: Amazon Kinesis Firehose
  description: Amazon Kinesis Firehose
  x-serviceName: firehose
  x-serviceAlias: firehose
  x-protocol: json
  x-apiVersion: "2015-08-04"
  x-endpointPrefix: firehose
  x-targetPrefix: Firehose_20150804
  x-jsonVersion: "1.1"
servers:
  - url: https://firehose.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for firehose
paths:
  /CreateDeliveryStream:
    post:
      operationId: CreateDeliveryStream
      description: "Creates a Firehose stream. By default, you can create up to 5,000 Firehose streams per Amazon Web Services Region. This is an asynchronous operation that immediately returns. The initial status of the Firehose stream is CREATING. After the Firehose stream is created, its status is ACTIVE and it now accepts data. If the Firehose stream creation fails, the status transitions to CREATING_FAILED. Attempts to send data to a delivery stream that is not in the ACTIVE state cause an exception. To check the state of a Firehose stream, use DescribeDeliveryStream. If the status of a Firehose stream is CREATING_FAILED, this status doesn't change, and you can't invoke CreateDeliveryStream again on it. However, you can invoke the DeleteDeliveryStream operation to delete it. A Firehose stream can be configured to receive records directly from providers using PutRecord or PutRecordBatch, or it can be configured to use an existing Kinesis stream as its source. To specify a Kinesis data stream as input, set the DeliveryStreamType parameter to KinesisStreamAsSource, and provide the Kinesis stream Amazon Resource Name (ARN) and role ARN in the KinesisStreamSourceConfiguration parameter. To create a Firehose stream with server-side encryption (SSE) enabled, include DeliveryStreamEncryptionConfigurationInput in your request. This is optional. You can also invoke StartDeliveryStreamEncryption to turn on SSE for an existing Firehose stream that doesn't have SSE enabled. A Firehose stream is configured with a single destination, such as Amazon Simple Storage Service (Amazon S3), Amazon Redshift, Amazon OpenSearch Service, Amazon OpenSearch Serverless, Splunk, and any custom HTTP endpoint or HTTP endpoints owned by or supported by third-party service providers, including Datadog, Dynatrace, LogicMonitor, MongoDB, New Relic, and Sumo Logic. You must specify only one of the following destination configuration parameters: ExtendedS3DestinationConfiguration, S3DestinationConfiguration, ElasticsearchDestinationConfiguration, RedshiftDestinationConfiguration, or SplunkDestinationConfiguration. When you specify S3DestinationConfiguration, you can also provide the following optional values: BufferingHints, EncryptionConfiguration, and CompressionFormat. By default, if no BufferingHints value is provided, Firehose buffers data up to 5 MB or for 5 minutes, whichever condition is satisfied first. BufferingHints is a hint, so there are some cases where the service cannot adhere to these conditions strictly. For example, record boundaries might be such that the size is a little over or under the configured buffering size. By default, no encryption is performed. We strongly recommend that you enable encryption to ensure secure data storage in Amazon S3. A few notes about Amazon Redshift as a destination: An Amazon Redshift destination requires an S3 bucket as intermediate location. Firehose first delivers data to Amazon S3 and then uses COPY syntax to load data into an Amazon Redshift table. This is specified in the RedshiftDestinationConfiguration.S3Configuration parameter. The compression formats SNAPPY or ZIP cannot be specified in RedshiftDestinationConfiguration.S3Configuration because the Amazon Redshift COPY operation that reads from the S3 bucket doesn't support these compression formats. We strongly recommend that you use the user name and password you provide exclusively with Firehose, and that the permissions for the account are restricted for Amazon Redshift INSERT permissions. Firehose assumes the IAM role that is configured as part of the destination. The role should allow the Firehose principal to assume the role, and the role should have permissions that allow the service to deliver the data. For more information, see Grant Firehose Access to an Amazon S3 Destination in the Amazon Firehose Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.CreateDeliveryStream
            default: Firehose_20150804.CreateDeliveryStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream. This name must be unique per Amazon Web Services account in the same Amazon Web Services Region. If the Firehose streams are in different accounts or different Regions, you can have multiple Firehose streams with the same name.
                DeliveryStreamType:
                  $ref: "#/components/schemas/DeliveryStreamType"
                  description: "The Firehose stream type. This parameter can be one of the following values: DirectPut: Provider applications access the Firehose stream directly. KinesisStreamAsSource: The Firehose stream uses a Kinesis data stream as a source."
                DirectPutSourceConfiguration:
                  $ref: "#/components/schemas/DirectPutSourceConfiguration"
                  description: The structure that configures parameters such as ThroughputHintInMBs for a stream configured with Direct PUT as a source.
                KinesisStreamSourceConfiguration:
                  $ref: "#/components/schemas/KinesisStreamSourceConfiguration"
                  description: When a Kinesis data stream is used as the source for the Firehose stream, a KinesisStreamSourceConfiguration containing the Kinesis data stream Amazon Resource Name (ARN) and the role ARN for the source stream.
                DeliveryStreamEncryptionConfigurationInput:
                  $ref: "#/components/schemas/DeliveryStreamEncryptionConfigurationInput"
                  description: Used to specify the type and Amazon Resource Name (ARN) of the KMS key needed for Server-Side Encryption (SSE).
                S3DestinationConfiguration:
                  $ref: "#/components/schemas/S3DestinationConfiguration"
                  description: "[Deprecated] The destination in Amazon S3. You can specify only one destination."
                ExtendedS3DestinationConfiguration:
                  $ref: "#/components/schemas/ExtendedS3DestinationConfiguration"
                  description: The destination in Amazon S3. You can specify only one destination.
                RedshiftDestinationConfiguration:
                  $ref: "#/components/schemas/RedshiftDestinationConfiguration"
                  description: The destination in Amazon Redshift. You can specify only one destination.
                ElasticsearchDestinationConfiguration:
                  $ref: "#/components/schemas/ElasticsearchDestinationConfiguration"
                  description: The destination in Amazon OpenSearch Service. You can specify only one destination.
                AmazonopensearchserviceDestinationConfiguration:
                  $ref: "#/components/schemas/AmazonopensearchserviceDestinationConfiguration"
                  description: The destination in Amazon OpenSearch Service. You can specify only one destination.
                SplunkDestinationConfiguration:
                  $ref: "#/components/schemas/SplunkDestinationConfiguration"
                  description: The destination in Splunk. You can specify only one destination.
                HttpEndpointDestinationConfiguration:
                  $ref: "#/components/schemas/HttpEndpointDestinationConfiguration"
                  description: Enables configuring Kinesis Firehose to deliver data to any HTTP endpoint destination. You can specify only one destination.
                Tags:
                  $ref: "#/components/schemas/TagDeliveryStreamInputTagList"
                  description: "A set of tags to assign to the Firehose stream. A tag is a key-value pair that you can define and assign to Amazon Web Services resources. Tags are metadata. For example, you can add friendly names and descriptions or other types of information that can help you distinguish the Firehose stream. For more information about tags, see Using Cost Allocation Tags in the Amazon Web Services Billing and Cost Management User Guide. You can specify up to 50 tags when creating a Firehose stream. If you specify tags in the CreateDeliveryStream action, Amazon Data Firehose performs an additional authorization on the firehose:TagDeliveryStream action to verify if users have permissions to create tags. If you do not provide this permission, requests to create new Firehose streams with IAM resource tags will fail with an AccessDeniedException such as following. AccessDeniedException User: arn:aws:sts::x:assumed-role/x/x is not authorized to perform: firehose:TagDeliveryStream on resource: arn:aws:firehose:us-east-1:x:deliverystream/x with an explicit deny in an identity-based policy. For an example IAM policy, see Tag example."
                AmazonOpenSearchServerlessDestinationConfiguration:
                  $ref: "#/components/schemas/AmazonOpenSearchServerlessDestinationConfiguration"
                  description: The destination in the Serverless offering for Amazon OpenSearch Service. You can specify only one destination.
                MSKSourceConfiguration:
                  $ref: "#/components/schemas/MSKSourceConfiguration"
                SnowflakeDestinationConfiguration:
                  $ref: "#/components/schemas/SnowflakeDestinationConfiguration"
                  description: Configure Snowflake destination
                IcebergDestinationConfiguration:
                  $ref: "#/components/schemas/IcebergDestinationConfiguration"
                  description: Configure Apache Iceberg Tables destination.
                DatabaseSourceConfiguration:
                  $ref: "#/components/schemas/DatabaseSourceConfiguration"
                  description: The top level object for configuring streams with database as a source. Amazon Data Firehose is in preview release and is subject to change.
              required:
                - DeliveryStreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeliveryStreamOutput"
  /DeleteDeliveryStream:
    post:
      operationId: DeleteDeliveryStream
      description: "Deletes a Firehose stream and its data. You can delete a Firehose stream only if it is in one of the following states: ACTIVE, DELETING, CREATING_FAILED, or DELETING_FAILED. You can't delete a Firehose stream that is in the CREATING state. To check the state of a Firehose stream, use DescribeDeliveryStream. DeleteDeliveryStream is an asynchronous API. When an API request to DeleteDeliveryStream succeeds, the Firehose stream is marked for deletion, and it goes into the DELETING state.While the Firehose stream is in the DELETING state, the service might continue to accept records, but it doesn't make any guarantees with respect to delivering the data. Therefore, as a best practice, first stop any applications that are sending records before you delete a Firehose stream. Removal of a Firehose stream that is in the DELETING state is a low priority operation for the service. A stream may remain in the DELETING state for several minutes. Therefore, as a best practice, applications should not wait for streams in the DELETING state to be removed."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.DeleteDeliveryStream
            default: Firehose_20150804.DeleteDeliveryStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream.
                AllowForceDelete:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Set this to true if you want to delete the Firehose stream even if Firehose is unable to retire the grant for the CMK. Firehose might be unable to retire the grant due to a customer error, such as when the CMK or the grant are in an invalid state. If you force deletion, you can then use the RevokeGrant operation to revoke the grant you gave to Firehose. If a failure to retire the grant happens due to an Amazon Web Services KMS issue, Firehose keeps retrying the delete operation. The default value is false.
              required:
                - DeliveryStreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDeliveryStreamOutput"
  /DescribeDeliveryStream:
    post:
      operationId: DescribeDeliveryStream
      description: Describes the specified Firehose stream and its status. For example, after your Firehose stream is created, call DescribeDeliveryStream to see whether the Firehose stream is ACTIVE and therefore ready for data to be sent to it. If the status of a Firehose stream is CREATING_FAILED, this status doesn't change, and you can't invoke CreateDeliveryStream again on it. However, you can invoke the DeleteDeliveryStream operation to delete it. If the status is DELETING_FAILED, you can force deletion by invoking DeleteDeliveryStream again but with DeleteDeliveryStreamInput$AllowForceDelete set to true.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.DescribeDeliveryStream
            default: Firehose_20150804.DescribeDeliveryStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream.
                Limit:
                  $ref: "#/components/schemas/DescribeDeliveryStreamInputLimit"
                  description: The limit on the number of destinations to return. You can have one destination per Firehose stream.
                ExclusiveStartDestinationId:
                  $ref: "#/components/schemas/DestinationId"
                  description: The ID of the destination to start returning the destination information. Firehose supports one destination per Firehose stream.
              required:
                - DeliveryStreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDeliveryStreamOutput"
  /ListDeliveryStreams:
    post:
      operationId: ListDeliveryStreams
      description: Lists your Firehose streams in alphabetical order of their names. The number of Firehose streams might be too large to return using a single call to ListDeliveryStreams. You can limit the number of Firehose streams returned, using the Limit parameter. To determine whether there are more delivery streams to list, check the value of HasMoreDeliveryStreams in the output. If there are more Firehose streams to list, you can request them by calling this operation again and setting the ExclusiveStartDeliveryStreamName parameter to the name of the last Firehose stream returned in the last call.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.ListDeliveryStreams
            default: Firehose_20150804.ListDeliveryStreams
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Limit:
                  $ref: "#/components/schemas/ListDeliveryStreamsInputLimit"
                  description: The maximum number of Firehose streams to list. The default value is 10.
                DeliveryStreamType:
                  $ref: "#/components/schemas/DeliveryStreamType"
                  description: "The Firehose stream type. This can be one of the following values: DirectPut: Provider applications access the Firehose stream directly. KinesisStreamAsSource: The Firehose stream uses a Kinesis data stream as a source. This parameter is optional. If this parameter is omitted, Firehose streams of all types are returned."
                ExclusiveStartDeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The list of Firehose streams returned by this call to ListDeliveryStreams will start with the Firehose stream whose name comes alphabetically immediately after the name you specify in ExclusiveStartDeliveryStreamName.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDeliveryStreamsOutput"
  /ListTagsForDeliveryStream:
    post:
      operationId: ListTagsForDeliveryStream
      description: Lists the tags for the specified Firehose stream. This operation has a limit of five transactions per second per account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.ListTagsForDeliveryStream
            default: Firehose_20150804.ListTagsForDeliveryStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream whose tags you want to list.
                ExclusiveStartTagKey:
                  $ref: "#/components/schemas/TagKey"
                  description: The key to use as the starting point for the list of tags. If you set this parameter, ListTagsForDeliveryStream gets all tags that occur after ExclusiveStartTagKey.
                Limit:
                  $ref: "#/components/schemas/ListTagsForDeliveryStreamInputLimit"
                  description: The number of tags to return. If this number is less than the total number of tags associated with the Firehose stream, HasMoreTags is set to true in the response. To list additional tags, set ExclusiveStartTagKey to the last key in the response.
              required:
                - DeliveryStreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForDeliveryStreamOutput"
  /PutRecord:
    post:
      operationId: PutRecord
      description: Writes a single data record into an Firehose stream. To write multiple data records into a Firehose stream, use PutRecordBatch. Applications using these operations are referred to as producers. By default, each Firehose stream can take in up to 2,000 transactions per second, 5,000 records per second, or 5 MB per second. If you use PutRecord and PutRecordBatch, the limits are an aggregate across these two operations for each Firehose stream. For more information about limits and how to request an increase, see Amazon Firehose Limits. Firehose accumulates and publishes a particular metric for a customer account in one minute intervals. It is possible that the bursts of incoming bytes/records ingested to a Firehose stream last only for a few seconds. Due to this, the actual spikes in the traffic might not be fully visible in the customer's 1 minute CloudWatch metrics. You must specify the name of the Firehose stream and the data record when using PutRecord. The data record consists of a data blob that can be up to 1,000 KiB in size, and any kind of data. For example, it can be a segment from a log file, geographic location data, website clickstream data, and so on. For multi record de-aggregation, you can not put more than 500 records even if the data blob length is less than 1000 KiB. If you include more than 500 records, the request succeeds but the record de-aggregation doesn't work as expected and transformation lambda is invoked with the complete base64 encoded data blob instead of de-aggregated base64 decoded records. Firehose buffers records before delivering them to the destination. To disambiguate the data blobs at the destination, a common solution is to use delimiters in the data, such as a newline (\n) or some other character unique within the data. This allows the consumer application to parse individual data items when reading the data from the destination. The PutRecord operation returns a RecordId, which is a unique string assigned to each record. Producer applications can use this ID for purposes such as auditability and investigation. If the PutRecord operation throws a ServiceUnavailableException, the API is automatically reinvoked (retried) 3 times. If the exception persists, it is possible that the throughput limits have been exceeded for the Firehose stream. Re-invoking the Put API operations (for example, PutRecord and PutRecordBatch) can result in data duplicates. For larger data assets, allow for a longer time out before retrying Put API operations. Data records sent to Firehose are stored for 24 hours from the time they are added to a Firehose stream as it tries to send the records to the destination. If the destination is unreachable for more than 24 hours, the data is no longer available. Don't concatenate two or more base64 strings to form the data fields of your records. Instead, concatenate the raw data, then perform base64 encoding.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.PutRecord
            default: Firehose_20150804.PutRecord
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream.
                Record:
                  $ref: "#/components/schemas/Record"
                  description: The record.
              required:
                - DeliveryStreamName
                - Record
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutRecordOutput"
  /PutRecordBatch:
    post:
      operationId: PutRecordBatch
      description: "Writes multiple data records into a Firehose stream in a single call, which can achieve higher throughput per producer than when writing single records. To write single data records into a Firehose stream, use PutRecord. Applications using these operations are referred to as producers. Firehose accumulates and publishes a particular metric for a customer account in one minute intervals. It is possible that the bursts of incoming bytes/records ingested to a Firehose stream last only for a few seconds. Due to this, the actual spikes in the traffic might not be fully visible in the customer's 1 minute CloudWatch metrics. For information about service quota, see Amazon Firehose Quota. Each PutRecordBatch request supports up to 500 records. Each record in the request can be as large as 1,000 KB (before base64 encoding), up to a limit of 4 MB for the entire request. These limits cannot be changed. You must specify the name of the Firehose stream and the data record when using PutRecord. The data record consists of a data blob that can be up to 1,000 KB in size, and any kind of data. For example, it could be a segment from a log file, geographic location data, website clickstream data, and so on. For multi record de-aggregation, you can not put more than 500 records even if the data blob length is less than 1000 KiB. If you include more than 500 records, the request succeeds but the record de-aggregation doesn't work as expected and transformation lambda is invoked with the complete base64 encoded data blob instead of de-aggregated base64 decoded records. Firehose buffers records before delivering them to the destination. To disambiguate the data blobs at the destination, a common solution is to use delimiters in the data, such as a newline (\\n) or some other character unique within the data. This allows the consumer application to parse individual data items when reading the data from the destination. The PutRecordBatch response includes a count of failed records, FailedPutCount, and an array of responses, RequestResponses. Even if the PutRecordBatch call succeeds, the value of FailedPutCount may be greater than 0, indicating that there are records for which the operation didn't succeed. Each entry in the RequestResponses array provides additional information about the processed record. It directly correlates with a record in the request array using the same ordering, from the top to the bottom. The response array always includes the same number of records as the request array. RequestResponses includes both successfully and unsuccessfully processed records. Firehose tries to process all records in each PutRecordBatch request. A single record failure does not stop the processing of subsequent records. A successfully processed record includes a RecordId value, which is unique for the record. An unsuccessfully processed record includes ErrorCode and ErrorMessage values. ErrorCode reflects the type of error, and is one of the following values: ServiceUnavailableException or InternalFailure. ErrorMessage provides more detailed information about the error. If there is an internal server error or a timeout, the write might have completed or it might have failed. If FailedPutCount is greater than 0, retry the request, resending only those records that might have failed processing. This minimizes the possible duplicate records and also reduces the total bytes sent (and corresponding charges). We recommend that you handle any duplicates at the destination. If PutRecordBatch throws ServiceUnavailableException, the API is automatically reinvoked (retried) 3 times. If the exception persists, it is possible that the throughput limits have been exceeded for the Firehose stream. Re-invoking the Put API operations (for example, PutRecord and PutRecordBatch) can result in data duplicates. For larger data assets, allow for a longer time out before retrying Put API operations. Data records sent to Firehose are stored for 24 hours from the time they are added to a Firehose stream as it attempts to send the records to the destination. If the destination is unreachable for more than 24 hours, the data is no longer available. Don't concatenate two or more base64 strings to form the data fields of your records. Instead, concatenate the raw data, then perform base64 encoding."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.PutRecordBatch
            default: Firehose_20150804.PutRecordBatch
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream.
                Records:
                  $ref: "#/components/schemas/PutRecordBatchRequestEntryList"
                  description: One or more records.
              required:
                - DeliveryStreamName
                - Records
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutRecordBatchOutput"
  /StartDeliveryStreamEncryption:
    post:
      operationId: StartDeliveryStreamEncryption
      description: Enables server-side encryption (SSE) for the Firehose stream. This operation is asynchronous. It returns immediately. When you invoke it, Firehose first sets the encryption status of the stream to ENABLING, and then to ENABLED. The encryption status of a Firehose stream is the Status property in DeliveryStreamEncryptionConfiguration. If the operation fails, the encryption status changes to ENABLING_FAILED. You can continue to read and write data to your Firehose stream while the encryption status is ENABLING, but the data is not encrypted. It can take up to 5 seconds after the encryption status changes to ENABLED before all records written to the Firehose stream are encrypted. To find out whether a record or a batch of records was encrypted, check the response elements PutRecordOutput$Encrypted and PutRecordBatchOutput$Encrypted, respectively. To check the encryption status of a Firehose stream, use DescribeDeliveryStream. Even if encryption is currently enabled for a Firehose stream, you can still invoke this operation on it to change the ARN of the CMK or both its type and ARN. If you invoke this method to change the CMK, and the old CMK is of type CUSTOMER_MANAGED_CMK, Firehose schedules the grant it had on the old CMK for retirement. If the new CMK is of type CUSTOMER_MANAGED_CMK, Firehose creates a grant that enables it to use the new CMK to encrypt and decrypt data and to manage the grant. For the KMS grant creation to be successful, the Firehose API operations StartDeliveryStreamEncryption and CreateDeliveryStream should not be called with session credentials that are more than 6 hours old. If a Firehose stream already has encryption enabled and then you invoke this operation to change the ARN of the CMK or both its type and ARN and you get ENABLING_FAILED, this only means that the attempt to change the CMK failed. In this case, encryption remains enabled with the old CMK. If the encryption status of your Firehose stream is ENABLING_FAILED, you can invoke this operation again with a valid CMK. The CMK must be enabled and the key policy mustn't explicitly deny the permission for Firehose to invoke KMS encrypt and decrypt operations. You can enable SSE for a Firehose stream only if it's a Firehose stream that uses DirectPut as its source. The StartDeliveryStreamEncryption and StopDeliveryStreamEncryption operations have a combined limit of 25 calls per Firehose stream per 24 hours. For example, you reach the limit if you call StartDeliveryStreamEncryption 13 times and StopDeliveryStreamEncryption 12 times for the same Firehose stream in a 24-hour period.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.StartDeliveryStreamEncryption
            default: Firehose_20150804.StartDeliveryStreamEncryption
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream for which you want to enable server-side encryption (SSE).
                DeliveryStreamEncryptionConfigurationInput:
                  $ref: "#/components/schemas/DeliveryStreamEncryptionConfigurationInput"
                  description: Used to specify the type and Amazon Resource Name (ARN) of the KMS key needed for Server-Side Encryption (SSE).
              required:
                - DeliveryStreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDeliveryStreamEncryptionOutput"
  /StopDeliveryStreamEncryption:
    post:
      operationId: StopDeliveryStreamEncryption
      description: Disables server-side encryption (SSE) for the Firehose stream. This operation is asynchronous. It returns immediately. When you invoke it, Firehose first sets the encryption status of the stream to DISABLING, and then to DISABLED. You can continue to read and write data to your stream while its status is DISABLING. It can take up to 5 seconds after the encryption status changes to DISABLED before all records written to the Firehose stream are no longer subject to encryption. To find out whether a record or a batch of records was encrypted, check the response elements PutRecordOutput$Encrypted and PutRecordBatchOutput$Encrypted, respectively. To check the encryption state of a Firehose stream, use DescribeDeliveryStream. If SSE is enabled using a customer managed CMK and then you invoke StopDeliveryStreamEncryption, Firehose schedules the related KMS grant for retirement and then retires it after it ensures that it is finished delivering records to the destination. The StartDeliveryStreamEncryption and StopDeliveryStreamEncryption operations have a combined limit of 25 calls per Firehose stream per 24 hours. For example, you reach the limit if you call StartDeliveryStreamEncryption 13 times and StopDeliveryStreamEncryption 12 times for the same Firehose stream in a 24-hour period.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.StopDeliveryStreamEncryption
            default: Firehose_20150804.StopDeliveryStreamEncryption
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream for which you want to disable server-side encryption (SSE).
              required:
                - DeliveryStreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopDeliveryStreamEncryptionOutput"
  /TagDeliveryStream:
    post:
      operationId: TagDeliveryStream
      description: Adds or updates tags for the specified Firehose stream. A tag is a key-value pair that you can define and assign to Amazon Web Services resources. If you specify a tag that already exists, the tag value is replaced with the value that you specify in the request. Tags are metadata. For example, you can add friendly names and descriptions or other types of information that can help you distinguish the Firehose stream. For more information about tags, see Using Cost Allocation Tags in the Amazon Web Services Billing and Cost Management User Guide. Each Firehose stream can have up to 50 tags. This operation has a limit of five transactions per second per account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.TagDeliveryStream
            default: Firehose_20150804.TagDeliveryStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream to which you want to add the tags.
                Tags:
                  $ref: "#/components/schemas/TagDeliveryStreamInputTagList"
                  description: A set of key-value pairs to use to create the tags.
              required:
                - DeliveryStreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagDeliveryStreamOutput"
  /UntagDeliveryStream:
    post:
      operationId: UntagDeliveryStream
      description: Removes tags from the specified Firehose stream. Removed tags are deleted, and you can't recover them after this operation successfully completes. If you specify a tag that doesn't exist, the operation ignores it. This operation has a limit of five transactions per second per account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.UntagDeliveryStream
            default: Firehose_20150804.UntagDeliveryStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of tag keys. Each corresponding tag is removed from the delivery stream.
              required:
                - DeliveryStreamName
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagDeliveryStreamOutput"
  /UpdateDestination:
    post:
      operationId: UpdateDestination
      description: Updates the specified destination of the specified Firehose stream. Use this operation to change the destination type (for example, to replace the Amazon S3 destination with Amazon Redshift) or change the parameters associated with a destination (for example, to change the bucket name of the Amazon S3 destination). The update might not occur immediately. The target Firehose stream remains active while the configurations are updated, so data writes to the Firehose stream can continue during this process. The updated configurations are usually effective within a few minutes. Switching between Amazon OpenSearch Service and other services is not supported. For an Amazon OpenSearch Service destination, you can only update to another Amazon OpenSearch Service destination. If the destination type is the same, Firehose merges the configuration parameters specified with the destination configuration that already exists on the delivery stream. If any of the parameters are not specified in the call, the existing values are retained. For example, in the Amazon S3 destination, if EncryptionConfiguration is not specified, then the existing EncryptionConfiguration is maintained on the destination. If the destination type is not the same, for example, changing the destination from Amazon S3 to Amazon Redshift, Firehose does not merge any parameters. In this case, all parameters must be specified. Firehose uses CurrentDeliveryStreamVersionId to avoid race conditions and conflicting merges. This is a required field, and the service updates the configuration only if the existing configuration has a version ID that matches. After the update is applied successfully, the version ID is updated, and can be retrieved using DescribeDeliveryStream. Use the new version ID to set CurrentDeliveryStreamVersionId in the next call.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Firehose_20150804.UpdateDestination
            default: Firehose_20150804.UpdateDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryStreamName:
                  $ref: "#/components/schemas/DeliveryStreamName"
                  description: The name of the Firehose stream.
                CurrentDeliveryStreamVersionId:
                  $ref: "#/components/schemas/DeliveryStreamVersionId"
                  description: Obtain this value from the VersionId result of DeliveryStreamDescription. This value is required, and helps the service perform conditional operations. For example, if there is an interleaving update and this value is null, then the update destination fails. After the update is successful, the VersionId value is updated. The service then performs a merge of the old configuration with the new configuration.
                DestinationId:
                  $ref: "#/components/schemas/DestinationId"
                  description: The ID of the destination.
                S3DestinationUpdate:
                  $ref: "#/components/schemas/S3DestinationUpdate"
                  description: "[Deprecated] Describes an update for a destination in Amazon S3."
                ExtendedS3DestinationUpdate:
                  $ref: "#/components/schemas/ExtendedS3DestinationUpdate"
                  description: Describes an update for a destination in Amazon S3.
                RedshiftDestinationUpdate:
                  $ref: "#/components/schemas/RedshiftDestinationUpdate"
                  description: Describes an update for a destination in Amazon Redshift.
                ElasticsearchDestinationUpdate:
                  $ref: "#/components/schemas/ElasticsearchDestinationUpdate"
                  description: Describes an update for a destination in Amazon OpenSearch Service.
                AmazonopensearchserviceDestinationUpdate:
                  $ref: "#/components/schemas/AmazonopensearchserviceDestinationUpdate"
                  description: Describes an update for a destination in Amazon OpenSearch Service.
                SplunkDestinationUpdate:
                  $ref: "#/components/schemas/SplunkDestinationUpdate"
                  description: Describes an update for a destination in Splunk.
                HttpEndpointDestinationUpdate:
                  $ref: "#/components/schemas/HttpEndpointDestinationUpdate"
                  description: Describes an update to the specified HTTP endpoint destination.
                AmazonOpenSearchServerlessDestinationUpdate:
                  $ref: "#/components/schemas/AmazonOpenSearchServerlessDestinationUpdate"
                  description: Describes an update for a destination in the Serverless offering for Amazon OpenSearch Service.
                SnowflakeDestinationUpdate:
                  $ref: "#/components/schemas/SnowflakeDestinationUpdate"
                  description: Update to the Snowflake destination configuration settings.
                IcebergDestinationUpdate:
                  $ref: "#/components/schemas/IcebergDestinationUpdate"
                  description: Describes an update for a destination in Apache Iceberg Tables.
              required:
                - DeliveryStreamName
                - CurrentDeliveryStreamVersionId
                - DestinationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDestinationOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DeliveryStreamName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_.-]+"
    DeliveryStreamType:
      type: string
      enum:
        - DirectPut
        - KinesisStreamAsSource
        - MSKAsSource
        - DatabaseAsSource
    DirectPutSourceConfiguration:
      description: The structure that configures parameters such as ThroughputHintInMBs for a stream configured with Direct PUT as a source.
      type: object
      properties:
        ThroughputHintInMBs:
          $ref: "#/components/schemas/ThroughputHintInMBs"
          description: The value that you configure for this parameter is for information purpose only and does not affect Firehose delivery throughput limit. You can use the Firehose Limits form to request a throughput limit increase.
      required:
        - ThroughputHintInMBs
    ThroughputHintInMBs:
      type: integer
      minimum: 1
      maximum: 100
    KinesisStreamSourceConfiguration:
      description: The stream and role Amazon Resource Names (ARNs) for a Kinesis data stream used as the source for a Firehose stream.
      type: object
      properties:
        KinesisStreamARN:
          $ref: "#/components/schemas/KinesisStreamARN"
          description: The ARN of the source Kinesis data stream. For more information, see Amazon Kinesis Data Streams ARN Format.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the role that provides access to the source Kinesis data stream. For more information, see Amazon Web Services Identity and Access Management (IAM) ARN Format.
      required:
        - KinesisStreamARN
        - RoleARN
    KinesisStreamARN:
      type: string
      minLength: 1
      maxLength: 512
      pattern: arn:.*:kinesis:[a-zA-Z0-9\-]+:\d{12}:stream/[a-zA-Z0-9_.-]+
    RoleARN:
      type: string
      minLength: 1
      maxLength: 512
      pattern: arn:.*:iam::\d{12}:role/[a-zA-Z_0-9+=,.@\-_/]+
    DeliveryStreamEncryptionConfigurationInput:
      description: Specifies the type and Amazon Resource Name (ARN) of the CMK to use for Server-Side Encryption (SSE).
      type: object
      properties:
        KeyARN:
          $ref: "#/components/schemas/AWSKMSKeyARN"
          description: If you set KeyType to CUSTOMER_MANAGED_CMK, you must specify the Amazon Resource Name (ARN) of the CMK. If you set KeyType to Amazon Web Services_OWNED_CMK, Firehose uses a service-account CMK.
        KeyType:
          $ref: "#/components/schemas/KeyType"
          description: Indicates the type of customer master key (CMK) to use for encryption. The default setting is Amazon Web Services_OWNED_CMK. For more information about CMKs, see Customer Master Keys (CMKs). When you invoke CreateDeliveryStream or StartDeliveryStreamEncryption with KeyType set to CUSTOMER_MANAGED_CMK, Firehose invokes the Amazon KMS operation CreateGrant to create a grant that allows the Firehose service to use the customer managed CMK to perform encryption and decryption. Firehose manages that grant. When you invoke StartDeliveryStreamEncryption to change the CMK for a Firehose stream that is encrypted with a customer managed CMK, Firehose schedules the grant it had on the old CMK for retirement. You can use a CMK of type CUSTOMER_MANAGED_CMK to encrypt up to 500 Firehose streams. If a CreateDeliveryStream or StartDeliveryStreamEncryption operation exceeds this limit, Firehose throws a LimitExceededException. To encrypt your Firehose stream, use symmetric CMKs. Firehose doesn't support asymmetric CMKs. For information about symmetric and asymmetric CMKs, see About Symmetric and Asymmetric CMKs in the Amazon Web Services Key Management Service developer guide.
      required:
        - KeyType
    AWSKMSKeyARN:
      type: string
      minLength: 1
      maxLength: 512
      pattern: arn:.*:kms:[a-zA-Z0-9\-]+:\d{12}:(key|alias)/[a-zA-Z_0-9+=,.@\-_/]+
    KeyType:
      type: string
      enum:
        - AWS_OWNED_CMK
        - CUSTOMER_MANAGED_CMK
    S3DestinationConfiguration:
      description: Describes the configuration of a destination in Amazon S3.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services credentials. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        BucketARN:
          $ref: "#/components/schemas/BucketARN"
          description: The ARN of the S3 bucket. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The "YYYY/MM/DD/HH" time format prefix is automatically used for delivered Amazon S3 files. You can also specify a custom prefix, as described in Custom Prefixes for Amazon S3 Objects.
        ErrorOutputPrefix:
          $ref: "#/components/schemas/ErrorOutputPrefix"
          description: A prefix that Firehose evaluates and adds to failed records before writing them to S3. This prefix appears immediately following the bucket name. For information about how to specify this prefix, see Custom Prefixes for Amazon S3 Objects.
        BufferingHints:
          $ref: "#/components/schemas/BufferingHints"
          description: The buffering option. If no value is specified, BufferingHints object default values are used.
        CompressionFormat:
          $ref: "#/components/schemas/CompressionFormat"
          description: The compression format. If no value is specified, the default is UNCOMPRESSED. The compression formats SNAPPY or ZIP cannot be specified for Amazon Redshift destinations because they are not supported by the Amazon Redshift COPY operation that reads from the S3 bucket.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: The encryption configuration. If no value is specified, the default is no encryption.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
          description: The CloudWatch logging options for your Firehose stream.
      required:
        - RoleARN
        - BucketARN
    BucketARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:.*:s3:::[\w\.\-]{1,255}
    Prefix:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: .*
    ErrorOutputPrefix:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: .*
    BufferingHints:
      description: Describes hints for the buffering to perform before delivering data to the destination. These options are treated as hints, and therefore Firehose might choose to use different values when it is optimal. The SizeInMBs and IntervalInSeconds parameters are optional. However, if specify a value for one of them, you must also provide a value for the other.
      type: object
      properties:
        SizeInMBs:
          $ref: "#/components/schemas/SizeInMBs"
          description: Buffer incoming data to the specified size, in MiBs, before delivering it to the destination. The default value is 5. This parameter is optional but if you specify a value for it, you must also specify a value for IntervalInSeconds, and vice versa. We recommend setting this parameter to a value greater than the amount of data you typically ingest into the Firehose stream in 10 seconds. For example, if you typically ingest data at 1 MiB/sec, the value should be 10 MiB or higher.
        IntervalInSeconds:
          $ref: "#/components/schemas/IntervalInSeconds"
          description: Buffer incoming data for the specified period of time, in seconds, before delivering it to the destination. The default value is 300. This parameter is optional but if you specify a value for it, you must also specify a value for SizeInMBs, and vice versa.
    SizeInMBs:
      type: integer
      minimum: 1
      maximum: 128
    IntervalInSeconds:
      type: integer
      minimum: 0
      maximum: 900
    CompressionFormat:
      type: string
      enum:
        - UNCOMPRESSED
        - GZIP
        - ZIP
        - Snappy
        - HADOOP_SNAPPY
    EncryptionConfiguration:
      description: Describes the encryption for a destination in Amazon S3.
      type: object
      properties:
        NoEncryptionConfig:
          $ref: "#/components/schemas/NoEncryptionConfig"
          description: Specifically override existing encryption information to ensure that no encryption is used.
        KMSEncryptionConfig:
          $ref: "#/components/schemas/KMSEncryptionConfig"
          description: The encryption key.
    NoEncryptionConfig:
      type: string
      enum:
        - NoEncryption
    KMSEncryptionConfig:
      description: Describes an encryption key for a destination in Amazon S3.
      type: object
      properties:
        AWSKMSKeyARN:
          $ref: "#/components/schemas/AWSKMSKeyARN"
          description: The Amazon Resource Name (ARN) of the encryption key. Must belong to the same Amazon Web Services Region as the destination Amazon S3 bucket. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
      required:
        - AWSKMSKeyARN
    CloudWatchLoggingOptions:
      description: Describes the Amazon CloudWatch logging options for your Firehose stream.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Enables or disables CloudWatch logging.
        LogGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: The CloudWatch group name for logging. This value is required if CloudWatch logging is enabled.
        LogStreamName:
          $ref: "#/components/schemas/LogStreamName"
          description: The CloudWatch log stream name for logging. This value is required if CloudWatch logging is enabled.
    BooleanObject:
      type: boolean
    LogGroupName:
      type: string
      minLength: 0
      maxLength: 512
      pattern: "[\\.\\-_/#A-Za-z0-9]*"
    LogStreamName:
      type: string
      minLength: 0
      maxLength: 512
      pattern: "[^:*]*"
    ExtendedS3DestinationConfiguration:
      description: Describes the configuration of a destination in Amazon S3.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services credentials. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        BucketARN:
          $ref: "#/components/schemas/BucketARN"
          description: The ARN of the S3 bucket. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The "YYYY/MM/DD/HH" time format prefix is automatically used for delivered Amazon S3 files. You can also specify a custom prefix, as described in Custom Prefixes for Amazon S3 Objects.
        ErrorOutputPrefix:
          $ref: "#/components/schemas/ErrorOutputPrefix"
          description: A prefix that Firehose evaluates and adds to failed records before writing them to S3. This prefix appears immediately following the bucket name. For information about how to specify this prefix, see Custom Prefixes for Amazon S3 Objects.
        BufferingHints:
          $ref: "#/components/schemas/BufferingHints"
          description: The buffering option.
        CompressionFormat:
          $ref: "#/components/schemas/CompressionFormat"
          description: The compression format. If no value is specified, the default is UNCOMPRESSED.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: The encryption configuration. If no value is specified, the default is no encryption.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
          description: The Amazon CloudWatch logging options for your Firehose stream.
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
          description: The data processing configuration.
        S3BackupMode:
          $ref: "#/components/schemas/S3BackupMode"
          description: The Amazon S3 backup mode. After you create a Firehose stream, you can update it to enable Amazon S3 backup if it is disabled. If backup is enabled, you can't update the Firehose stream to disable it.
        S3BackupConfiguration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
          description: The configuration for backup in Amazon S3.
        DataFormatConversionConfiguration:
          $ref: "#/components/schemas/DataFormatConversionConfiguration"
          description: The serializer, deserializer, and schema for converting data from the JSON format to the Parquet or ORC format before writing it to Amazon S3.
        DynamicPartitioningConfiguration:
          $ref: "#/components/schemas/DynamicPartitioningConfiguration"
          description: The configuration of the dynamic partitioning mechanism that creates smaller data sets from the streaming data by partitioning it based on partition keys. Currently, dynamic partitioning is only supported for Amazon S3 destinations.
        FileExtension:
          $ref: "#/components/schemas/FileExtension"
          description: Specify a file extension. It will override the default file extension
        CustomTimeZone:
          $ref: "#/components/schemas/CustomTimeZone"
          description: The time zone you prefer. UTC is the default.
      required:
        - RoleARN
        - BucketARN
    ProcessingConfiguration:
      description: Describes a data processing configuration.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Enables or disables data processing.
        Processors:
          $ref: "#/components/schemas/ProcessorList"
          description: The data processors.
    ProcessorList:
      type: array
      items:
        $ref: "#/components/schemas/Processor"
    Processor:
      description: Describes a data processor. If you want to add a new line delimiter between records in objects that are delivered to Amazon S3, choose AppendDelimiterToRecord as a processor type. You don’t have to put a processor parameter when you select AppendDelimiterToRecord.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ProcessorType"
          description: The type of processor.
        Parameters:
          $ref: "#/components/schemas/ProcessorParameterList"
          description: The processor parameters.
      required:
        - Type
    ProcessorType:
      type: string
      enum:
        - RecordDeAggregation
        - Decompression
        - CloudWatchLogProcessing
        - Lambda
        - MetadataExtraction
        - AppendDelimiterToRecord
    ProcessorParameterList:
      type: array
      items:
        $ref: "#/components/schemas/ProcessorParameter"
    ProcessorParameter:
      description: Describes the processor parameter.
      type: object
      properties:
        ParameterName:
          $ref: "#/components/schemas/ProcessorParameterName"
          description: "The name of the parameter. Currently the following default values are supported: 3 for NumberOfRetries and 60 for the BufferIntervalInSeconds. The BufferSizeInMBs ranges between 0.2 MB and up to 3MB. The default buffering hint is 1MB for all destinations, except Splunk. For Splunk, the default buffering hint is 256 KB."
        ParameterValue:
          $ref: "#/components/schemas/ProcessorParameterValue"
          description: The parameter value.
      required:
        - ParameterName
        - ParameterValue
    ProcessorParameterName:
      type: string
      enum:
        - LambdaArn
        - NumberOfRetries
        - MetadataExtractionQuery
        - JsonParsingEngine
        - RoleArn
        - BufferSizeInMBs
        - BufferIntervalInSeconds
        - SubRecordType
        - Delimiter
        - CompressionFormat
        - DataMessageExtraction
    ProcessorParameterValue:
      type: string
      minLength: 1
      maxLength: 5120
      pattern: ^(?!\s*$).+
    S3BackupMode:
      type: string
      enum:
        - Disabled
        - Enabled
    DataFormatConversionConfiguration:
      description: Specifies that you want Firehose to convert data from the JSON format to the Parquet or ORC format before writing it to Amazon S3. Firehose uses the serializer and deserializer that you specify, in addition to the column information from the Amazon Web Services Glue table, to deserialize your input data from JSON and then serialize it to the Parquet or ORC format. For more information, see Firehose Record Format Conversion.
      type: object
      properties:
        SchemaConfiguration:
          $ref: "#/components/schemas/SchemaConfiguration"
          description: Specifies the Amazon Web Services Glue Data Catalog table that contains the column information. This parameter is required if Enabled is set to true.
        InputFormatConfiguration:
          $ref: "#/components/schemas/InputFormatConfiguration"
          description: Specifies the deserializer that you want Firehose to use to convert the format of your data from JSON. This parameter is required if Enabled is set to true.
        OutputFormatConfiguration:
          $ref: "#/components/schemas/OutputFormatConfiguration"
          description: Specifies the serializer that you want Firehose to use to convert the format of your data to the Parquet or ORC format. This parameter is required if Enabled is set to true.
        Enabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Defaults to true. Set it to false if you want to disable format conversion while preserving the configuration details.
    SchemaConfiguration:
      description: Specifies the schema to which you want Firehose to configure your data before it writes it to Amazon S3. This parameter is required if Enabled is set to true.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
          description: The role that Firehose can use to access Amazon Web Services Glue. This role must be in the same account you use for Firehose. Cross-account roles aren't allowed. If the SchemaConfiguration request parameter is used as part of invoking the CreateDeliveryStream API, then the RoleARN property is required and its value must be specified.
        CatalogId:
          $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
          description: The ID of the Amazon Web Services Glue Data Catalog. If you don't supply this, the Amazon Web Services account ID is used by default.
        DatabaseName:
          $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
          description: Specifies the name of the Amazon Web Services Glue database that contains the schema for the output data. If the SchemaConfiguration request parameter is used as part of invoking the CreateDeliveryStream API, then the DatabaseName property is required and its value must be specified.
        TableName:
          $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
          description: Specifies the Amazon Web Services Glue table that contains the column information that constitutes your data schema. If the SchemaConfiguration request parameter is used as part of invoking the CreateDeliveryStream API, then the TableName property is required and its value must be specified.
        Region:
          $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
          description: If you don't specify an Amazon Web Services Region, the default is the current Region.
        VersionId:
          $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
          description: Specifies the table version for the output data schema. If you don't specify this version ID, or if you set it to LATEST, Firehose uses the most recent version. This means that any updates to the table are automatically picked up.
    NonEmptyStringWithoutWhitespace:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^\S+$
    InputFormatConfiguration:
      description: Specifies the deserializer you want to use to convert the format of the input data. This parameter is required if Enabled is set to true.
      type: object
      properties:
        Deserializer:
          $ref: "#/components/schemas/Deserializer"
          description: Specifies which deserializer to use. You can choose either the Apache Hive JSON SerDe or the OpenX JSON SerDe. If both are non-null, the server rejects the request.
    Deserializer:
      description: "The deserializer you want Firehose to use for converting the input data from JSON. Firehose then serializes the data to its final format using the Serializer. Firehose supports two types of deserializers: the Apache Hive JSON SerDe and the OpenX JSON SerDe."
      type: object
      properties:
        OpenXJsonSerDe:
          $ref: "#/components/schemas/OpenXJsonSerDe"
          description: The OpenX SerDe. Used by Firehose for deserializing data, which means converting it from the JSON format in preparation for serializing it to the Parquet or ORC format. This is one of two deserializers you can choose, depending on which one offers the functionality you need. The other option is the native Hive / HCatalog JsonSerDe.
        HiveJsonSerDe:
          $ref: "#/components/schemas/HiveJsonSerDe"
          description: The native Hive / HCatalog JsonSerDe. Used by Firehose for deserializing data, which means converting it from the JSON format in preparation for serializing it to the Parquet or ORC format. This is one of two deserializers you can choose, depending on which one offers the functionality you need. The other option is the OpenX SerDe.
    OpenXJsonSerDe:
      description: The OpenX SerDe. Used by Firehose for deserializing data, which means converting it from the JSON format in preparation for serializing it to the Parquet or ORC format. This is one of two deserializers you can choose, depending on which one offers the functionality you need. The other option is the native Hive / HCatalog JsonSerDe.
      type: object
      properties:
        ConvertDotsInJsonKeysToUnderscores:
          $ref: "#/components/schemas/BooleanObject"
          description: When set to true, specifies that the names of the keys include dots and that you want Firehose to replace them with underscores. This is useful because Apache Hive does not allow dots in column names. For example, if the JSON contains a key whose name is "a.b", you can define the column name to be "a_b" when using this option. The default is false.
        CaseInsensitive:
          $ref: "#/components/schemas/BooleanObject"
          description: When set to true, which is the default, Firehose converts JSON keys to lowercase before deserializing them.
        ColumnToJsonKeyMappings:
          type: object
          properties: {}
          description: "Maps column names to JSON keys that aren't identical to the column names. This is useful when the JSON contains keys that are Hive keywords. For example, timestamp is a Hive keyword. If you have a JSON key named timestamp, set this parameter to {\"ts\": \"timestamp\"} to map this key to a column named ts."
    HiveJsonSerDe:
      description: The native Hive / HCatalog JsonSerDe. Used by Firehose for deserializing data, which means converting it from the JSON format in preparation for serializing it to the Parquet or ORC format. This is one of two deserializers you can choose, depending on which one offers the functionality you need. The other option is the OpenX SerDe.
      type: object
      properties:
        TimestampFormats:
          $ref: "#/components/schemas/ListOfNonEmptyStrings"
          description: Indicates how you want Firehose to parse the date and timestamps that may be present in your input data JSON. To specify these format strings, follow the pattern syntax of JodaTime's DateTimeFormat format strings. For more information, see Class DateTimeFormat. You can also use the special value millis to parse timestamps in epoch milliseconds. If you don't specify a format, Firehose uses java.sql.Timestamp::valueOf by default.
    ListOfNonEmptyStrings:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    NonEmptyString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^(?!\s*$).+
    OutputFormatConfiguration:
      description: Specifies the serializer that you want Firehose to use to convert the format of your data before it writes it to Amazon S3. This parameter is required if Enabled is set to true.
      type: object
      properties:
        Serializer:
          $ref: "#/components/schemas/Serializer"
          description: Specifies which serializer to use. You can choose either the ORC SerDe or the Parquet SerDe. If both are non-null, the server rejects the request.
    Serializer:
      description: "The serializer that you want Firehose to use to convert data to the target format before writing it to Amazon S3. Firehose supports two types of serializers: the ORC SerDe and the Parquet SerDe."
      type: object
      properties:
        ParquetSerDe:
          $ref: "#/components/schemas/ParquetSerDe"
          description: A serializer to use for converting data to the Parquet format before storing it in Amazon S3. For more information, see Apache Parquet.
        OrcSerDe:
          $ref: "#/components/schemas/OrcSerDe"
          description: A serializer to use for converting data to the ORC format before storing it in Amazon S3. For more information, see Apache ORC.
    ParquetSerDe:
      description: A serializer to use for converting data to the Parquet format before storing it in Amazon S3. For more information, see Apache Parquet.
      type: object
      properties:
        BlockSizeBytes:
          $ref: "#/components/schemas/BlockSizeBytes"
          description: The Hadoop Distributed File System (HDFS) block size. This is useful if you intend to copy the data from Amazon S3 to HDFS before querying. The default is 256 MiB and the minimum is 64 MiB. Firehose uses this value for padding calculations.
        PageSizeBytes:
          $ref: "#/components/schemas/ParquetPageSizeBytes"
          description: The Parquet page size. Column chunks are divided into pages. A page is conceptually an indivisible unit (in terms of compression and encoding). The minimum value is 64 KiB and the default is 1 MiB.
        Compression:
          $ref: "#/components/schemas/ParquetCompression"
          description: The compression code to use over data blocks. The possible values are UNCOMPRESSED, SNAPPY, and GZIP, with the default being SNAPPY. Use SNAPPY for higher decompression speed. Use GZIP if the compression ratio is more important than speed.
        EnableDictionaryCompression:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether to enable dictionary compression.
        MaxPaddingBytes:
          $ref: "#/components/schemas/NonNegativeIntegerObject"
          description: The maximum amount of padding to apply. This is useful if you intend to copy the data from Amazon S3 to HDFS before querying. The default is 0.
        WriterVersion:
          $ref: "#/components/schemas/ParquetWriterVersion"
          description: Indicates the version of row format to output. The possible values are V1 and V2. The default is V1.
    BlockSizeBytes:
      type: integer
      minimum: 67108864
    ParquetPageSizeBytes:
      type: integer
      minimum: 65536
    ParquetCompression:
      type: string
      enum:
        - UNCOMPRESSED
        - GZIP
        - SNAPPY
    NonNegativeIntegerObject:
      type: integer
      minimum: 0
    ParquetWriterVersion:
      type: string
      enum:
        - V1
        - V2
    OrcSerDe:
      description: A serializer to use for converting data to the ORC format before storing it in Amazon S3. For more information, see Apache ORC.
      type: object
      properties:
        StripeSizeBytes:
          $ref: "#/components/schemas/OrcStripeSizeBytes"
          description: The number of bytes in each stripe. The default is 64 MiB and the minimum is 8 MiB.
        BlockSizeBytes:
          $ref: "#/components/schemas/BlockSizeBytes"
          description: The Hadoop Distributed File System (HDFS) block size. This is useful if you intend to copy the data from Amazon S3 to HDFS before querying. The default is 256 MiB and the minimum is 64 MiB. Firehose uses this value for padding calculations.
        RowIndexStride:
          $ref: "#/components/schemas/OrcRowIndexStride"
          description: The number of rows between index entries. The default is 10,000 and the minimum is 1,000.
        EnablePadding:
          $ref: "#/components/schemas/BooleanObject"
          description: Set this to true to indicate that you want stripes to be padded to the HDFS block boundaries. This is useful if you intend to copy the data from Amazon S3 to HDFS before querying. The default is false.
        PaddingTolerance:
          $ref: "#/components/schemas/Proportion"
          description: A number between 0 and 1 that defines the tolerance for block padding as a decimal fraction of stripe size. The default value is 0.05, which means 5 percent of stripe size. For the default values of 64 MiB ORC stripes and 256 MiB HDFS blocks, the default block padding tolerance of 5 percent reserves a maximum of 3.2 MiB for padding within the 256 MiB block. In such a case, if the available size within the block is more than 3.2 MiB, a new, smaller stripe is inserted to fit within that space. This ensures that no stripe crosses block boundaries and causes remote reads within a node-local task. Firehose ignores this parameter when OrcSerDe$EnablePadding is false.
        Compression:
          $ref: "#/components/schemas/OrcCompression"
          description: The compression code to use over data blocks. The default is SNAPPY.
        BloomFilterColumns:
          $ref: "#/components/schemas/ListOfNonEmptyStringsWithoutWhitespace"
          description: The column names for which you want Firehose to create bloom filters. The default is null.
        BloomFilterFalsePositiveProbability:
          $ref: "#/components/schemas/Proportion"
          description: The Bloom filter false positive probability (FPP). The lower the FPP, the bigger the Bloom filter. The default value is 0.05, the minimum is 0, and the maximum is 1.
        DictionaryKeyThreshold:
          $ref: "#/components/schemas/Proportion"
          description: Represents the fraction of the total number of non-null rows. To turn off dictionary encoding, set this fraction to a number that is less than the number of distinct keys in a dictionary. To always use dictionary encoding, set this threshold to 1.
        FormatVersion:
          $ref: "#/components/schemas/OrcFormatVersion"
          description: The version of the file to write. The possible values are V0_11 and V0_12. The default is V0_12.
    OrcStripeSizeBytes:
      type: integer
      minimum: 8388608
    OrcRowIndexStride:
      type: integer
      minimum: 1000
    Proportion:
      type: number
      format: double
      minimum: 0
      maximum: 1
    OrcCompression:
      type: string
      enum:
        - NONE
        - ZLIB
        - SNAPPY
    ListOfNonEmptyStringsWithoutWhitespace:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
    OrcFormatVersion:
      type: string
      enum:
        - V0_11
        - V0_12
    DynamicPartitioningConfiguration:
      description: The configuration of the dynamic partitioning mechanism that creates smaller data sets from the streaming data by partitioning it based on partition keys. Currently, dynamic partitioning is only supported for Amazon S3 destinations.
      type: object
      properties:
        RetryOptions:
          $ref: "#/components/schemas/RetryOptions"
          description: The retry behavior in case Firehose is unable to deliver data to an Amazon S3 prefix.
        Enabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Specifies that the dynamic partitioning is enabled for this Firehose stream.
    RetryOptions:
      description: The retry behavior in case Firehose is unable to deliver data to a destination.
      type: object
      properties:
        DurationInSeconds:
          $ref: "#/components/schemas/RetryDurationInSeconds"
          description: The period of time during which Firehose retries to deliver data to the specified destination.
    RetryDurationInSeconds:
      type: integer
      minimum: 0
      maximum: 7200
    FileExtension:
      type: string
      minLength: 0
      maxLength: 128
      pattern: ^$|\.[0-9a-z!\-_.*'()]+
    CustomTimeZone:
      type: string
      minLength: 0
      maxLength: 50
      pattern: ^$|[a-zA-Z/_]+
    RedshiftDestinationConfiguration:
      description: Describes the configuration of a destination in Amazon Redshift.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services credentials. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        ClusterJDBCURL:
          $ref: "#/components/schemas/ClusterJDBCURL"
          description: The database connection string.
        CopyCommand:
          $ref: "#/components/schemas/CopyCommand"
          description: The COPY command.
        Username:
          $ref: "#/components/schemas/Username"
          description: The name of the user.
        Password:
          $ref: "#/components/schemas/Password"
          description: The user password.
        RetryOptions:
          $ref: "#/components/schemas/RedshiftRetryOptions"
          description: The retry behavior in case Firehose is unable to deliver documents to Amazon Redshift. Default value is 3600 (60 minutes).
        S3Configuration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
          description: The configuration for the intermediate Amazon S3 location from which Amazon Redshift obtains data. Restrictions are described in the topic for CreateDeliveryStream. The compression formats SNAPPY or ZIP cannot be specified in RedshiftDestinationConfiguration.S3Configuration because the Amazon Redshift COPY operation that reads from the S3 bucket doesn't support these compression formats.
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
          description: The data processing configuration.
        S3BackupMode:
          $ref: "#/components/schemas/RedshiftS3BackupMode"
          description: The Amazon S3 backup mode. After you create a Firehose stream, you can update it to enable Amazon S3 backup if it is disabled. If backup is enabled, you can't update the Firehose stream to disable it.
        S3BackupConfiguration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
          description: The configuration for backup in Amazon S3.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
          description: The CloudWatch logging options for your Firehose stream.
        SecretsManagerConfiguration:
          $ref: "#/components/schemas/SecretsManagerConfiguration"
          description: The configuration that defines how you access secrets for Amazon Redshift.
      required:
        - RoleARN
        - ClusterJDBCURL
        - CopyCommand
        - S3Configuration
    ClusterJDBCURL:
      type: string
      minLength: 1
      maxLength: 512
      pattern: jdbc:(redshift|postgresql)://((?!-)[A-Za-z0-9-]{1,63}(?<!-)\.)+(redshift(-serverless)?)\.([a-zA-Z0-9\.\-]+):\d{1,5}/[a-zA-Z0-9_$-]+
    CopyCommand:
      description: Describes a COPY command for Amazon Redshift.
      type: object
      properties:
        DataTableName:
          $ref: "#/components/schemas/DataTableName"
          description: The name of the target table. The table must already exist in the database.
        DataTableColumns:
          $ref: "#/components/schemas/DataTableColumns"
          description: A comma-separated list of column names.
        CopyOptions:
          $ref: "#/components/schemas/CopyOptions"
          description: "Optional parameters to use with the Amazon Redshift COPY command. For more information, see the \"Optional Parameters\" section of Amazon Redshift COPY command. Some possible examples that would apply to Firehose are as follows: delimiter '\\t' lzop; - fields are delimited with \"\\t\" (TAB character) and compressed using lzop. delimiter '|' - fields are delimited with \"|\" (this is the default delimiter). delimiter '|' escape - the delimiter should be escaped. fixedwidth 'venueid:3,venuename:25,venuecity:12,venuestate:2,venueseats:6' - fields are fixed width in the source, with each width specified after every column in the table. JSON 's3://mybucket/jsonpaths.txt' - data is in JSON format, and the path specified is the format of the data. For more examples, see Amazon Redshift COPY command examples."
      required:
        - DataTableName
    DataTableName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*
    DataTableColumns:
      type: string
      minLength: 0
      maxLength: 10240
      pattern: .*
    CopyOptions:
      type: string
      minLength: 0
      maxLength: 10240
      pattern: .*
    Username:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*
    Password:
      type: string
      minLength: 6
      maxLength: 512
      pattern: .*
    RedshiftRetryOptions:
      description: Configures retry behavior in case Firehose is unable to deliver documents to Amazon Redshift.
      type: object
      properties:
        DurationInSeconds:
          $ref: "#/components/schemas/RedshiftRetryDurationInSeconds"
          description: The length of time during which Firehose retries delivery after a failure, starting from the initial request and including the first attempt. The default value is 3600 seconds (60 minutes). Firehose does not retry if the value of DurationInSeconds is 0 (zero) or if the first delivery attempt takes longer than the current value.
    RedshiftRetryDurationInSeconds:
      type: integer
      minimum: 0
      maximum: 7200
    RedshiftS3BackupMode:
      type: string
      enum:
        - Disabled
        - Enabled
    SecretsManagerConfiguration:
      description: The structure that defines how Firehose accesses the secret.
      type: object
      properties:
        SecretARN:
          $ref: "#/components/schemas/SecretARN"
          description: The ARN of the secret that stores your credentials. It must be in the same region as the Firehose stream and the role. The secret ARN can reside in a different account than the Firehose stream and role as Firehose supports cross-account secret access. This parameter is required when Enabled is set to True.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: Specifies the role that Firehose assumes when calling the Secrets Manager API operation. When you provide the role, it overrides any destination specific role defined in the destination configuration. If you do not provide the then we use the destination specific role. This parameter is required for Splunk.
        Enabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Specifies whether you want to use the secrets manager feature. When set as True the secrets manager configuration overwrites the existing secrets in the destination configuration. When it's set to False Firehose falls back to the credentials in the destination configuration.
      required:
        - Enabled
    SecretARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:.*:secretsmanager:[a-zA-Z0-9\-]+:\d{12}:secret:[a-zA-Z0-9\-/_+=.@!]+
    ElasticsearchDestinationConfiguration:
      description: Describes the configuration of a destination in Amazon OpenSearch Service.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the IAM role to be assumed by Firehose for calling the Amazon OpenSearch Service Configuration API and for indexing documents. For more information, see Grant Firehose Access to an Amazon S3 Destination and Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces.
        DomainARN:
          $ref: "#/components/schemas/ElasticsearchDomainARN"
          description: The ARN of the Amazon OpenSearch Service domain. The IAM role must have permissions for DescribeDomain, DescribeDomains, and DescribeDomainConfig after assuming the role specified in RoleARN. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces. Specify either ClusterEndpoint or DomainARN.
        ClusterEndpoint:
          $ref: "#/components/schemas/ElasticsearchClusterEndpoint"
          description: The endpoint to use when communicating with the cluster. Specify either this ClusterEndpoint or the DomainARN field.
        IndexName:
          $ref: "#/components/schemas/ElasticsearchIndexName"
          description: The Elasticsearch index name.
        TypeName:
          $ref: "#/components/schemas/ElasticsearchTypeName"
          description: The Elasticsearch type name. For Elasticsearch 6.x, there can be only one type per index. If you try to specify a new type for an existing index that already has another type, Firehose returns an error during run time. For Elasticsearch 7.x, don't specify a TypeName.
        IndexRotationPeriod:
          $ref: "#/components/schemas/ElasticsearchIndexRotationPeriod"
          description: The Elasticsearch index rotation period. Index rotation appends a timestamp to the IndexName to facilitate the expiration of old data. For more information, see Index Rotation for the Amazon OpenSearch Service Destination. The default value is OneDay.
        BufferingHints:
          $ref: "#/components/schemas/ElasticsearchBufferingHints"
          description: The buffering options. If no value is specified, the default values for ElasticsearchBufferingHints are used.
        RetryOptions:
          $ref: "#/components/schemas/ElasticsearchRetryOptions"
          description: The retry behavior in case Firehose is unable to deliver documents to Amazon OpenSearch Service. The default value is 300 (5 minutes).
        S3BackupMode:
          $ref: "#/components/schemas/ElasticsearchS3BackupMode"
          description: Defines how documents should be delivered to Amazon S3. When it is set to FailedDocumentsOnly, Firehose writes any documents that could not be indexed to the configured Amazon S3 destination, with AmazonOpenSearchService-failed/ appended to the key prefix. When set to AllDocuments, Firehose delivers all incoming records to Amazon S3, and also writes failed documents with AmazonOpenSearchService-failed/ appended to the prefix. For more information, see Amazon S3 Backup for the Amazon OpenSearch Service Destination. Default value is FailedDocumentsOnly. You can't change this backup mode after you create the Firehose stream.
        S3Configuration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
          description: The configuration for the backup Amazon S3 location.
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
          description: The data processing configuration.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
          description: The Amazon CloudWatch logging options for your Firehose stream.
        VpcConfiguration:
          $ref: "#/components/schemas/VpcConfiguration"
          description: The details of the VPC of the Amazon destination.
        DocumentIdOptions:
          $ref: "#/components/schemas/DocumentIdOptions"
          description: Indicates the method for setting up document ID. The supported methods are Firehose generated document ID and OpenSearch Service generated document ID.
      required:
        - RoleARN
        - IndexName
        - S3Configuration
    ElasticsearchDomainARN:
      type: string
      minLength: 1
      maxLength: 512
      pattern: arn:.*:es:[a-zA-Z0-9\-]+:\d{12}:domain/[a-z][-0-9a-z]{2,27}
    ElasticsearchClusterEndpoint:
      type: string
      minLength: 1
      maxLength: 512
      pattern: https:.*
    ElasticsearchIndexName:
      type: string
      minLength: 1
      maxLength: 80
      pattern: .*
    ElasticsearchTypeName:
      type: string
      minLength: 0
      maxLength: 100
      pattern: .*
    ElasticsearchIndexRotationPeriod:
      type: string
      enum:
        - NoRotation
        - OneHour
        - OneDay
        - OneWeek
        - OneMonth
    ElasticsearchBufferingHints:
      description: Describes the buffering to perform before delivering data to the Amazon OpenSearch Service destination.
      type: object
      properties:
        IntervalInSeconds:
          $ref: "#/components/schemas/ElasticsearchBufferingIntervalInSeconds"
          description: Buffer incoming data for the specified period of time, in seconds, before delivering it to the destination. The default value is 300 (5 minutes).
        SizeInMBs:
          $ref: "#/components/schemas/ElasticsearchBufferingSizeInMBs"
          description: Buffer incoming data to the specified size, in MBs, before delivering it to the destination. The default value is 5. We recommend setting this parameter to a value greater than the amount of data you typically ingest into the Firehose stream in 10 seconds. For example, if you typically ingest data at 1 MB/sec, the value should be 10 MB or higher.
    ElasticsearchBufferingIntervalInSeconds:
      type: integer
      minimum: 0
      maximum: 900
    ElasticsearchBufferingSizeInMBs:
      type: integer
      minimum: 1
      maximum: 100
    ElasticsearchRetryOptions:
      description: Configures retry behavior in case Firehose is unable to deliver documents to Amazon OpenSearch Service.
      type: object
      properties:
        DurationInSeconds:
          $ref: "#/components/schemas/ElasticsearchRetryDurationInSeconds"
          description: After an initial failure to deliver to Amazon OpenSearch Service, the total amount of time during which Firehose retries delivery (including the first attempt). After this time has elapsed, the failed documents are written to Amazon S3. Default value is 300 seconds (5 minutes). A value of 0 (zero) results in no retries.
    ElasticsearchRetryDurationInSeconds:
      type: integer
      minimum: 0
      maximum: 7200
    ElasticsearchS3BackupMode:
      type: string
      enum:
        - FailedDocumentsOnly
        - AllDocuments
    VpcConfiguration:
      description: The details of the VPC of the Amazon OpenSearch or Amazon OpenSearch Serverless destination.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/SubnetIdList"
          description: The IDs of the subnets that you want Firehose to use to create ENIs in the VPC of the Amazon OpenSearch Service destination. Make sure that the routing tables and inbound and outbound rules allow traffic to flow from the subnets whose IDs are specified here to the subnets that have the destination Amazon OpenSearch Service endpoints. Firehose creates at least one ENI in each of the subnets that are specified here. Do not delete or modify these ENIs. The number of ENIs that Firehose creates in the subnets specified here scales up and down automatically based on throughput. To enable Firehose to scale up the number of ENIs to match throughput, ensure that you have sufficient quota. To help you calculate the quota you need, assume that Firehose can create up to three ENIs for this Firehose stream for each of the subnets specified here. For more information about ENI quota, see Network Interfaces in the Amazon VPC Quotas topic.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: "The ARN of the IAM role that you want the Firehose stream to use to create endpoints in the destination VPC. You can use your existing Firehose delivery role or you can specify a new role. In either case, make sure that the role trusts the Firehose service principal and that it grants the following permissions: ec2:DescribeVpcs ec2:DescribeVpcAttribute ec2:DescribeSubnets ec2:DescribeSecurityGroups ec2:DescribeNetworkInterfaces ec2:CreateNetworkInterface ec2:CreateNetworkInterfacePermission ec2:DeleteNetworkInterface When you specify subnets for delivering data to the destination in a private VPC, make sure you have enough number of free IP addresses in chosen subnets. If there is no available free IP address in a specified subnet, Firehose cannot create or add ENIs for the data delivery in the private VPC, and the delivery will be degraded or fail."
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: The IDs of the security groups that you want Firehose to use when it creates ENIs in the VPC of the Amazon OpenSearch Service destination. You can use the same security group that the Amazon OpenSearch Service domain uses or different ones. If you specify different security groups here, ensure that they allow outbound HTTPS traffic to the Amazon OpenSearch Service domain's security group. Also ensure that the Amazon OpenSearch Service domain's security group allows HTTPS traffic from the security groups specified here. If you use the same security group for both your delivery stream and the Amazon OpenSearch Service domain, make sure the security group inbound rule allows HTTPS traffic. For more information about security group rules, see Security group rules in the Amazon VPC documentation.
      required:
        - SubnetIds
        - RoleARN
        - SecurityGroupIds
    SubnetIdList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
    SecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
    DocumentIdOptions:
      description: Indicates the method for setting up document ID. The supported methods are Firehose generated document ID and OpenSearch Service generated document ID.
      type: object
      properties:
        DefaultDocumentIdFormat:
          $ref: "#/components/schemas/DefaultDocumentIdFormat"
          description: When the FIREHOSE_DEFAULT option is chosen, Firehose generates a unique document ID for each record based on a unique internal identifier. The generated document ID is stable across multiple delivery attempts, which helps prevent the same record from being indexed multiple times with different document IDs. When the NO_DOCUMENT_ID option is chosen, Firehose does not include any document IDs in the requests it sends to the Amazon OpenSearch Service. This causes the Amazon OpenSearch Service domain to generate document IDs. In case of multiple delivery attempts, this may cause the same record to be indexed more than once with different document IDs. This option enables write-heavy operations, such as the ingestion of logs and observability data, to consume less resources in the Amazon OpenSearch Service domain, resulting in improved performance.
      required:
        - DefaultDocumentIdFormat
    DefaultDocumentIdFormat:
      type: string
      enum:
        - FIREHOSE_DEFAULT
        - NO_DOCUMENT_ID
    AmazonopensearchserviceDestinationConfiguration:
      description: Describes the configuration of a destination in Amazon OpenSearch Service
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the IAM role to be assumed by Firehose for calling the Amazon OpenSearch Service Configuration API and for indexing documents.
        DomainARN:
          $ref: "#/components/schemas/AmazonopensearchserviceDomainARN"
          description: The ARN of the Amazon OpenSearch Service domain. The IAM role must have permissions for DescribeElasticsearchDomain, DescribeElasticsearchDomains, and DescribeElasticsearchDomainConfig after assuming the role specified in RoleARN.
        ClusterEndpoint:
          $ref: "#/components/schemas/AmazonopensearchserviceClusterEndpoint"
          description: The endpoint to use when communicating with the cluster. Specify either this ClusterEndpoint or the DomainARN field.
        IndexName:
          $ref: "#/components/schemas/AmazonopensearchserviceIndexName"
          description: The ElasticsearAmazon OpenSearch Service index name.
        TypeName:
          $ref: "#/components/schemas/AmazonopensearchserviceTypeName"
          description: The Amazon OpenSearch Service type name. For Elasticsearch 6.x, there can be only one type per index. If you try to specify a new type for an existing index that already has another type, Firehose returns an error during run time.
        IndexRotationPeriod:
          $ref: "#/components/schemas/AmazonopensearchserviceIndexRotationPeriod"
          description: The Amazon OpenSearch Service index rotation period. Index rotation appends a timestamp to the IndexName to facilitate the expiration of old data.
        BufferingHints:
          $ref: "#/components/schemas/AmazonopensearchserviceBufferingHints"
          description: The buffering options. If no value is specified, the default values for AmazonopensearchserviceBufferingHints are used.
        RetryOptions:
          $ref: "#/components/schemas/AmazonopensearchserviceRetryOptions"
          description: The retry behavior in case Firehose is unable to deliver documents to Amazon OpenSearch Service. The default value is 300 (5 minutes).
        S3BackupMode:
          $ref: "#/components/schemas/AmazonopensearchserviceS3BackupMode"
          description: Defines how documents should be delivered to Amazon S3. When it is set to FailedDocumentsOnly, Firehose writes any documents that could not be indexed to the configured Amazon S3 destination, with AmazonOpenSearchService-failed/ appended to the key prefix. When set to AllDocuments, Firehose delivers all incoming records to Amazon S3, and also writes failed documents with AmazonOpenSearchService-failed/ appended to the prefix.
        S3Configuration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
        VpcConfiguration:
          $ref: "#/components/schemas/VpcConfiguration"
        DocumentIdOptions:
          $ref: "#/components/schemas/DocumentIdOptions"
          description: Indicates the method for setting up document ID. The supported methods are Firehose generated document ID and OpenSearch Service generated document ID.
      required:
        - RoleARN
        - IndexName
        - S3Configuration
    AmazonopensearchserviceDomainARN:
      type: string
      minLength: 1
      maxLength: 512
      pattern: arn:.*:es:[a-zA-Z0-9\-]+:\d{12}:domain/[a-z][-0-9a-z]{2,27}
    AmazonopensearchserviceClusterEndpoint:
      type: string
      minLength: 1
      maxLength: 512
      pattern: https:.*
    AmazonopensearchserviceIndexName:
      type: string
      minLength: 1
      maxLength: 80
      pattern: .*
    AmazonopensearchserviceTypeName:
      type: string
      minLength: 0
      maxLength: 100
      pattern: .*
    AmazonopensearchserviceIndexRotationPeriod:
      type: string
      enum:
        - NoRotation
        - OneHour
        - OneDay
        - OneWeek
        - OneMonth
    AmazonopensearchserviceBufferingHints:
      description: Describes the buffering to perform before delivering data to the Amazon OpenSearch Service destination.
      type: object
      properties:
        IntervalInSeconds:
          $ref: "#/components/schemas/AmazonopensearchserviceBufferingIntervalInSeconds"
          description: Buffer incoming data for the specified period of time, in seconds, before delivering it to the destination. The default value is 300 (5 minutes).
        SizeInMBs:
          $ref: "#/components/schemas/AmazonopensearchserviceBufferingSizeInMBs"
          description: Buffer incoming data to the specified size, in MBs, before delivering it to the destination. The default value is 5. We recommend setting this parameter to a value greater than the amount of data you typically ingest into the Firehose stream in 10 seconds. For example, if you typically ingest data at 1 MB/sec, the value should be 10 MB or higher.
    AmazonopensearchserviceBufferingIntervalInSeconds:
      type: integer
      minimum: 0
      maximum: 900
    AmazonopensearchserviceBufferingSizeInMBs:
      type: integer
      minimum: 1
      maximum: 100
    AmazonopensearchserviceRetryOptions:
      description: Configures retry behavior in case Firehose is unable to deliver documents to Amazon OpenSearch Service.
      type: object
      properties:
        DurationInSeconds:
          $ref: "#/components/schemas/AmazonopensearchserviceRetryDurationInSeconds"
          description: After an initial failure to deliver to Amazon OpenSearch Service, the total amount of time during which Firehose retries delivery (including the first attempt). After this time has elapsed, the failed documents are written to Amazon S3. Default value is 300 seconds (5 minutes). A value of 0 (zero) results in no retries.
    AmazonopensearchserviceRetryDurationInSeconds:
      type: integer
      minimum: 0
      maximum: 7200
    AmazonopensearchserviceS3BackupMode:
      type: string
      enum:
        - FailedDocumentsOnly
        - AllDocuments
    SplunkDestinationConfiguration:
      description: Describes the configuration of a destination in Splunk.
      type: object
      properties:
        HECEndpoint:
          $ref: "#/components/schemas/HECEndpoint"
          description: The HTTP Event Collector (HEC) endpoint to which Firehose sends your data.
        HECEndpointType:
          $ref: "#/components/schemas/HECEndpointType"
          description: This type can be either "Raw" or "Event."
        HECToken:
          $ref: "#/components/schemas/HECToken"
          description: This is a GUID that you obtain from your Splunk cluster when you create a new HEC endpoint.
        HECAcknowledgmentTimeoutInSeconds:
          $ref: "#/components/schemas/HECAcknowledgmentTimeoutInSeconds"
          description: The amount of time that Firehose waits to receive an acknowledgment from Splunk after it sends it data. At the end of the timeout period, Firehose either tries to send the data again or considers it an error, based on your retry settings.
        RetryOptions:
          $ref: "#/components/schemas/SplunkRetryOptions"
          description: The retry behavior in case Firehose is unable to deliver data to Splunk, or if it doesn't receive an acknowledgment of receipt from Splunk.
        S3BackupMode:
          $ref: "#/components/schemas/SplunkS3BackupMode"
          description: Defines how documents should be delivered to Amazon S3. When set to FailedEventsOnly, Firehose writes any data that could not be indexed to the configured Amazon S3 destination. When set to AllEvents, Firehose delivers all incoming records to Amazon S3, and also writes failed documents to Amazon S3. The default value is FailedEventsOnly. You can update this backup mode from FailedEventsOnly to AllEvents. You can't update it from AllEvents to FailedEventsOnly.
        S3Configuration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
          description: The configuration for the backup Amazon S3 location.
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
          description: The data processing configuration.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
          description: The Amazon CloudWatch logging options for your Firehose stream.
        BufferingHints:
          $ref: "#/components/schemas/SplunkBufferingHints"
          description: The buffering options. If no value is specified, the default values for Splunk are used.
        SecretsManagerConfiguration:
          $ref: "#/components/schemas/SecretsManagerConfiguration"
          description: The configuration that defines how you access secrets for Splunk.
      required:
        - HECEndpoint
        - HECEndpointType
        - S3Configuration
    HECEndpoint:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: .*
    HECEndpointType:
      type: string
      enum:
        - Raw
        - Event
    HECToken:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: .*
    HECAcknowledgmentTimeoutInSeconds:
      type: integer
      minimum: 180
      maximum: 600
    SplunkRetryOptions:
      description: Configures retry behavior in case Firehose is unable to deliver documents to Splunk, or if it doesn't receive an acknowledgment from Splunk.
      type: object
      properties:
        DurationInSeconds:
          $ref: "#/components/schemas/SplunkRetryDurationInSeconds"
          description: The total amount of time that Firehose spends on retries. This duration starts after the initial attempt to send data to Splunk fails. It doesn't include the periods during which Firehose waits for acknowledgment from Splunk after each attempt.
    SplunkRetryDurationInSeconds:
      type: integer
      minimum: 0
      maximum: 7200
    SplunkS3BackupMode:
      type: string
      enum:
        - FailedEventsOnly
        - AllEvents
    SplunkBufferingHints:
      description: The buffering options. If no value is specified, the default values for Splunk are used.
      type: object
      properties:
        IntervalInSeconds:
          $ref: "#/components/schemas/SplunkBufferingIntervalInSeconds"
          description: Buffer incoming data for the specified period of time, in seconds, before delivering it to the destination. The default value is 60 (1 minute).
        SizeInMBs:
          $ref: "#/components/schemas/SplunkBufferingSizeInMBs"
          description: Buffer incoming data to the specified size, in MBs, before delivering it to the destination. The default value is 5.
    SplunkBufferingIntervalInSeconds:
      type: integer
      minimum: 0
      maximum: 60
    SplunkBufferingSizeInMBs:
      type: integer
      minimum: 1
      maximum: 5
    HttpEndpointDestinationConfiguration:
      description: Describes the configuration of the HTTP endpoint destination.
      type: object
      properties:
        EndpointConfiguration:
          $ref: "#/components/schemas/HttpEndpointConfiguration"
          description: The configuration of the HTTP endpoint selected as the destination.
        BufferingHints:
          $ref: "#/components/schemas/HttpEndpointBufferingHints"
          description: The buffering options that can be used before data is delivered to the specified destination. Firehose treats these options as hints, and it might choose to use more optimal values. The SizeInMBs and IntervalInSeconds parameters are optional. However, if you specify a value for one of them, you must also provide a value for the other.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
        RequestConfiguration:
          $ref: "#/components/schemas/HttpEndpointRequestConfiguration"
          description: The configuration of the request sent to the HTTP endpoint that is specified as the destination.
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: Firehose uses this IAM role for all the permissions that the delivery stream needs.
        RetryOptions:
          $ref: "#/components/schemas/HttpEndpointRetryOptions"
          description: Describes the retry behavior in case Firehose is unable to deliver data to the specified HTTP endpoint destination, or if it doesn't receive a valid acknowledgment of receipt from the specified HTTP endpoint destination.
        S3BackupMode:
          $ref: "#/components/schemas/HttpEndpointS3BackupMode"
          description: Describes the S3 bucket backup options for the data that Firehose delivers to the HTTP endpoint destination. You can back up all documents (AllData) or only the documents that Firehose could not deliver to the specified HTTP endpoint destination (FailedDataOnly).
        S3Configuration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
        SecretsManagerConfiguration:
          $ref: "#/components/schemas/SecretsManagerConfiguration"
          description: The configuration that defines how you access secrets for HTTP Endpoint destination.
      required:
        - EndpointConfiguration
        - S3Configuration
    HttpEndpointConfiguration:
      description: Describes the configuration of the HTTP endpoint to which Kinesis Firehose delivers data.
      type: object
      properties:
        Url:
          $ref: "#/components/schemas/HttpEndpointUrl"
          description: The URL of the HTTP endpoint selected as the destination. If you choose an HTTP endpoint as your destination, review and follow the instructions in the Appendix - HTTP Endpoint Delivery Request and Response Specifications.
        Name:
          $ref: "#/components/schemas/HttpEndpointName"
          description: The name of the HTTP endpoint selected as the destination.
        AccessKey:
          $ref: "#/components/schemas/HttpEndpointAccessKey"
          description: The access key required for Kinesis Firehose to authenticate with the HTTP endpoint selected as the destination.
      required:
        - Url
    HttpEndpointUrl:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: https://.*
    HttpEndpointName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^(?!\s*$).+
    HttpEndpointAccessKey:
      type: string
      minLength: 0
      maxLength: 4096
      pattern: .*
    HttpEndpointBufferingHints:
      description: Describes the buffering options that can be applied before data is delivered to the HTTP endpoint destination. Firehose treats these options as hints, and it might choose to use more optimal values. The SizeInMBs and IntervalInSeconds parameters are optional. However, if specify a value for one of them, you must also provide a value for the other.
      type: object
      properties:
        SizeInMBs:
          $ref: "#/components/schemas/HttpEndpointBufferingSizeInMBs"
          description: Buffer incoming data to the specified size, in MBs, before delivering it to the destination. The default value is 5. We recommend setting this parameter to a value greater than the amount of data you typically ingest into the Firehose stream in 10 seconds. For example, if you typically ingest data at 1 MB/sec, the value should be 10 MB or higher.
        IntervalInSeconds:
          $ref: "#/components/schemas/HttpEndpointBufferingIntervalInSeconds"
          description: Buffer incoming data for the specified period of time, in seconds, before delivering it to the destination. The default value is 300 (5 minutes).
    HttpEndpointBufferingSizeInMBs:
      type: integer
      minimum: 1
      maximum: 64
    HttpEndpointBufferingIntervalInSeconds:
      type: integer
      minimum: 0
      maximum: 900
    HttpEndpointRequestConfiguration:
      description: The configuration of the HTTP endpoint request.
      type: object
      properties:
        ContentEncoding:
          $ref: "#/components/schemas/ContentEncoding"
          description: Firehose uses the content encoding to compress the body of a request before sending the request to the destination. For more information, see Content-Encoding in MDN Web Docs, the official Mozilla documentation.
        CommonAttributes:
          $ref: "#/components/schemas/HttpEndpointCommonAttributesList"
          description: Describes the metadata sent to the HTTP endpoint destination.
    ContentEncoding:
      type: string
      enum:
        - NONE
        - GZIP
    HttpEndpointCommonAttributesList:
      type: array
      items:
        $ref: "#/components/schemas/HttpEndpointCommonAttribute"
    HttpEndpointCommonAttribute:
      description: Describes the metadata that's delivered to the specified HTTP endpoint destination.
      type: object
      properties:
        AttributeName:
          $ref: "#/components/schemas/HttpEndpointAttributeName"
          description: The name of the HTTP endpoint common attribute.
        AttributeValue:
          $ref: "#/components/schemas/HttpEndpointAttributeValue"
          description: The value of the HTTP endpoint common attribute.
      required:
        - AttributeName
        - AttributeValue
    HttpEndpointAttributeName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^(?!\s*$).+
    HttpEndpointAttributeValue:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: .*
    HttpEndpointRetryOptions:
      description: Describes the retry behavior in case Firehose is unable to deliver data to the specified HTTP endpoint destination, or if it doesn't receive a valid acknowledgment of receipt from the specified HTTP endpoint destination.
      type: object
      properties:
        DurationInSeconds:
          $ref: "#/components/schemas/HttpEndpointRetryDurationInSeconds"
          description: The total amount of time that Firehose spends on retries. This duration starts after the initial attempt to send data to the custom destination via HTTPS endpoint fails. It doesn't include the periods during which Firehose waits for acknowledgment from the specified destination after each attempt.
    HttpEndpointRetryDurationInSeconds:
      type: integer
      minimum: 0
      maximum: 7200
    HttpEndpointS3BackupMode:
      type: string
      enum:
        - FailedDataOnly
        - AllData
    TagDeliveryStreamInputTagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata that you can assign to a Firehose stream, consisting of a key-value pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: "A unique identifier for the tag. Maximum length: 128 characters. Valid characters: Unicode letters, digits, white space, _ . / = + - % @"
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "An optional string, which you can use to describe or define the tag. Maximum length: 256 characters. Valid characters: Unicode letters, digits, white space, _ . / = + - % @"
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^(?!aws:)[\p{L}\p{Z}\p{N}_.:\/=+\-@%]*$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^[\p{L}\p{Z}\p{N}_.:\/=+\-@%]*$
    AmazonOpenSearchServerlessDestinationConfiguration:
      description: Describes the configuration of a destination in the Serverless offering for Amazon OpenSearch Service.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the IAM role to be assumed by Firehose for calling the Serverless offering for Amazon OpenSearch Service Configuration API and for indexing documents.
        CollectionEndpoint:
          $ref: "#/components/schemas/AmazonOpenSearchServerlessCollectionEndpoint"
          description: The endpoint to use when communicating with the collection in the Serverless offering for Amazon OpenSearch Service.
        IndexName:
          $ref: "#/components/schemas/AmazonOpenSearchServerlessIndexName"
          description: The Serverless offering for Amazon OpenSearch Service index name.
        BufferingHints:
          $ref: "#/components/schemas/AmazonOpenSearchServerlessBufferingHints"
          description: The buffering options. If no value is specified, the default values for AmazonopensearchserviceBufferingHints are used.
        RetryOptions:
          $ref: "#/components/schemas/AmazonOpenSearchServerlessRetryOptions"
          description: The retry behavior in case Firehose is unable to deliver documents to the Serverless offering for Amazon OpenSearch Service. The default value is 300 (5 minutes).
        S3BackupMode:
          $ref: "#/components/schemas/AmazonOpenSearchServerlessS3BackupMode"
          description: Defines how documents should be delivered to Amazon S3. When it is set to FailedDocumentsOnly, Firehose writes any documents that could not be indexed to the configured Amazon S3 destination, with AmazonOpenSearchService-failed/ appended to the key prefix. When set to AllDocuments, Firehose delivers all incoming records to Amazon S3, and also writes failed documents with AmazonOpenSearchService-failed/ appended to the prefix.
        S3Configuration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
        VpcConfiguration:
          $ref: "#/components/schemas/VpcConfiguration"
      required:
        - RoleARN
        - IndexName
        - S3Configuration
    AmazonOpenSearchServerlessCollectionEndpoint:
      type: string
      minLength: 1
      maxLength: 512
      pattern: https:.*
    AmazonOpenSearchServerlessIndexName:
      type: string
      minLength: 1
      maxLength: 80
      pattern: .*
    AmazonOpenSearchServerlessBufferingHints:
      description: Describes the buffering to perform before delivering data to the Serverless offering for Amazon OpenSearch Service destination.
      type: object
      properties:
        IntervalInSeconds:
          $ref: "#/components/schemas/AmazonOpenSearchServerlessBufferingIntervalInSeconds"
          description: Buffer incoming data for the specified period of time, in seconds, before delivering it to the destination. The default value is 300 (5 minutes).
        SizeInMBs:
          $ref: "#/components/schemas/AmazonOpenSearchServerlessBufferingSizeInMBs"
          description: Buffer incoming data to the specified size, in MBs, before delivering it to the destination. The default value is 5. We recommend setting this parameter to a value greater than the amount of data you typically ingest into the Firehose stream in 10 seconds. For example, if you typically ingest data at 1 MB/sec, the value should be 10 MB or higher.
    AmazonOpenSearchServerlessBufferingIntervalInSeconds:
      type: integer
      minimum: 0
      maximum: 900
    AmazonOpenSearchServerlessBufferingSizeInMBs:
      type: integer
      minimum: 1
      maximum: 100
    AmazonOpenSearchServerlessRetryOptions:
      description: Configures retry behavior in case Firehose is unable to deliver documents to the Serverless offering for Amazon OpenSearch Service.
      type: object
      properties:
        DurationInSeconds:
          $ref: "#/components/schemas/AmazonOpenSearchServerlessRetryDurationInSeconds"
          description: After an initial failure to deliver to the Serverless offering for Amazon OpenSearch Service, the total amount of time during which Firehose retries delivery (including the first attempt). After this time has elapsed, the failed documents are written to Amazon S3. Default value is 300 seconds (5 minutes). A value of 0 (zero) results in no retries.
    AmazonOpenSearchServerlessRetryDurationInSeconds:
      type: integer
      minimum: 0
      maximum: 7200
    AmazonOpenSearchServerlessS3BackupMode:
      type: string
      enum:
        - FailedDocumentsOnly
        - AllDocuments
    MSKSourceConfiguration:
      description: The configuration for the Amazon MSK cluster to be used as the source for a delivery stream.
      type: object
      properties:
        MSKClusterARN:
          $ref: "#/components/schemas/MSKClusterARN"
          description: The ARN of the Amazon MSK cluster.
        TopicName:
          $ref: "#/components/schemas/TopicName"
          description: The topic name within the Amazon MSK cluster.
        AuthenticationConfiguration:
          $ref: "#/components/schemas/AuthenticationConfiguration"
          description: The authentication configuration of the Amazon MSK cluster.
        ReadFromTimestamp:
          $ref: "#/components/schemas/ReadFromTimestamp"
          description: The start date and time in UTC for the offset position within your MSK topic from where Firehose begins to read. By default, this is set to timestamp when Firehose becomes Active. If you want to create a Firehose stream with Earliest start position from SDK or CLI, you need to set the ReadFromTimestamp parameter to Epoch (1970-01-01T00:00:00Z).
      required:
        - MSKClusterARN
        - TopicName
        - AuthenticationConfiguration
    MSKClusterARN:
      type: string
      minLength: 1
      maxLength: 512
      pattern: arn:.*
    TopicName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9\\\\._\\\\-]+"
    AuthenticationConfiguration:
      description: The authentication configuration of the Amazon MSK cluster.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the role used to access the Amazon MSK cluster.
        Connectivity:
          $ref: "#/components/schemas/Connectivity"
          description: The type of connectivity used to access the Amazon MSK cluster.
      required:
        - RoleARN
        - Connectivity
    Connectivity:
      type: string
      enum:
        - PUBLIC
        - PRIVATE
    ReadFromTimestamp:
      type: string
      format: date-time
    SnowflakeDestinationConfiguration:
      description: Configure Snowflake destination
      type: object
      properties:
        AccountUrl:
          $ref: "#/components/schemas/SnowflakeAccountUrl"
          description: URL for accessing your Snowflake account. This URL must include your account identifier. Note that the protocol (https://) and port number are optional.
        PrivateKey:
          $ref: "#/components/schemas/SnowflakePrivateKey"
          description: The private key used to encrypt your Snowflake client. For information, see Using Key Pair Authentication & Key Rotation.
        KeyPassphrase:
          $ref: "#/components/schemas/SnowflakeKeyPassphrase"
          description: Passphrase to decrypt the private key when the key is encrypted. For information, see Using Key Pair Authentication & Key Rotation.
        User:
          $ref: "#/components/schemas/SnowflakeUser"
          description: User login name for the Snowflake account.
        Database:
          $ref: "#/components/schemas/SnowflakeDatabase"
          description: All data in Snowflake is maintained in databases.
        Schema:
          $ref: "#/components/schemas/SnowflakeSchema"
          description: Each database consists of one or more schemas, which are logical groupings of database objects, such as tables and views
        Table:
          $ref: "#/components/schemas/SnowflakeTable"
          description: All data in Snowflake is stored in database tables, logically structured as collections of columns and rows.
        SnowflakeRoleConfiguration:
          $ref: "#/components/schemas/SnowflakeRoleConfiguration"
          description: Optionally configure a Snowflake role. Otherwise the default user role will be used.
        DataLoadingOption:
          $ref: "#/components/schemas/SnowflakeDataLoadingOption"
          description: Choose to load JSON keys mapped to table column names or choose to split the JSON payload where content is mapped to a record content column and source metadata is mapped to a record metadata column.
        MetaDataColumnName:
          $ref: "#/components/schemas/SnowflakeMetaDataColumnName"
          description: 'Specify a column name in the table, where the metadata information has to be loaded. When you enable this field, you will see the following column in the snowflake table, which differs based on the source type. For Direct PUT as source { "firehoseDeliveryStreamName" : "streamname", "IngestionTime" : "timestamp" } For Kinesis Data Stream as source "kinesisStreamName" : "streamname", "kinesisShardId" : "Id", "kinesisPartitionKey" : "key", "kinesisSequenceNumber" : "1234", "subsequenceNumber" : "2334", "IngestionTime" : "timestamp" }'
        ContentColumnName:
          $ref: "#/components/schemas/SnowflakeContentColumnName"
          description: The name of the record content column.
        SnowflakeVpcConfiguration:
          $ref: "#/components/schemas/SnowflakeVpcConfiguration"
          description: The VPCE ID for Firehose to privately connect with Snowflake. The ID format is com.amazonaws.vpce.[region].vpce-svc-<[id]>. For more information, see Amazon PrivateLink & Snowflake
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the Snowflake role
        RetryOptions:
          $ref: "#/components/schemas/SnowflakeRetryOptions"
          description: The time period where Firehose will retry sending data to the chosen HTTP endpoint.
        S3BackupMode:
          $ref: "#/components/schemas/SnowflakeS3BackupMode"
          description: Choose an S3 backup mode
        S3Configuration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
        SecretsManagerConfiguration:
          $ref: "#/components/schemas/SecretsManagerConfiguration"
          description: The configuration that defines how you access secrets for Snowflake.
        BufferingHints:
          $ref: "#/components/schemas/SnowflakeBufferingHints"
          description: Describes the buffering to perform before delivering data to the Snowflake destination. If you do not specify any value, Firehose uses the default values.
      required:
        - AccountUrl
        - Database
        - Schema
        - Table
        - RoleARN
        - S3Configuration
    SnowflakeAccountUrl:
      type: string
      minLength: 24
      maxLength: 2048
      pattern: .+?\.snowflakecomputing\.com
    SnowflakePrivateKey:
      type: string
      minLength: 256
      maxLength: 4096
      pattern: ^(?:[A-Za-z0-9+\/]{4})*(?:[A-Za-z0-9+\/]{2}==|[A-Za-z0-9+\/]{3}=)?$
    SnowflakeKeyPassphrase:
      type: string
      minLength: 7
      maxLength: 255
    SnowflakeUser:
      type: string
      minLength: 1
      maxLength: 255
    SnowflakeDatabase:
      type: string
      minLength: 1
      maxLength: 255
    SnowflakeSchema:
      type: string
      minLength: 1
      maxLength: 255
    SnowflakeTable:
      type: string
      minLength: 1
      maxLength: 255
    SnowflakeRoleConfiguration:
      description: Optionally configure a Snowflake role. Otherwise the default user role will be used.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Enable Snowflake role
        SnowflakeRole:
          $ref: "#/components/schemas/SnowflakeRole"
          description: The Snowflake role you wish to configure
    SnowflakeRole:
      type: string
      minLength: 1
      maxLength: 255
    SnowflakeDataLoadingOption:
      type: string
      enum:
        - JSON_MAPPING
        - VARIANT_CONTENT_MAPPING
        - VARIANT_CONTENT_AND_METADATA_MAPPING
    SnowflakeMetaDataColumnName:
      type: string
      minLength: 1
      maxLength: 255
    SnowflakeContentColumnName:
      type: string
      minLength: 1
      maxLength: 255
    SnowflakeVpcConfiguration:
      description: Configure a Snowflake VPC
      type: object
      properties:
        PrivateLinkVpceId:
          $ref: "#/components/schemas/SnowflakePrivateLinkVpceId"
          description: The VPCE ID for Firehose to privately connect with Snowflake. The ID format is com.amazonaws.vpce.[region].vpce-svc-<[id]>. For more information, see Amazon PrivateLink & Snowflake
      required:
        - PrivateLinkVpceId
    SnowflakePrivateLinkVpceId:
      type: string
      minLength: 47
      maxLength: 255
      pattern: ([a-zA-Z0-9\-\_]+\.){2,3}vpce\.[a-zA-Z0-9\-]*\.vpce-svc\-[a-zA-Z0-9\-]{17}$
    SnowflakeRetryOptions:
      description: Specify how long Firehose retries sending data to the New Relic HTTP endpoint. After sending data, Firehose first waits for an acknowledgment from the HTTP endpoint. If an error occurs or the acknowledgment doesn’t arrive within the acknowledgment timeout period, Firehose starts the retry duration counter. It keeps retrying until the retry duration expires. After that, Firehose considers it a data delivery failure and backs up the data to your Amazon S3 bucket. Every time that Firehose sends data to the HTTP endpoint (either the initial attempt or a retry), it restarts the acknowledgement timeout counter and waits for an acknowledgement from the HTTP endpoint. Even if the retry duration expires, Firehose still waits for the acknowledgment until it receives it or the acknowledgement timeout period is reached. If the acknowledgment times out, Firehose determines whether there's time left in the retry counter. If there is time left, it retries again and repeats the logic until it receives an acknowledgment or determines that the retry time has expired. If you don't want Firehose to retry sending data, set this value to 0.
      type: object
      properties:
        DurationInSeconds:
          $ref: "#/components/schemas/SnowflakeRetryDurationInSeconds"
          description: the time period where Firehose will retry sending data to the chosen HTTP endpoint.
    SnowflakeRetryDurationInSeconds:
      type: integer
      minimum: 0
      maximum: 7200
    SnowflakeS3BackupMode:
      type: string
      enum:
        - FailedDataOnly
        - AllData
    SnowflakeBufferingHints:
      description: Describes the buffering to perform before delivering data to the Snowflake destination. If you do not specify any value, Firehose uses the default values.
      type: object
      properties:
        SizeInMBs:
          $ref: "#/components/schemas/SnowflakeBufferingSizeInMBs"
          description: Buffer incoming data to the specified size, in MBs, before delivering it to the destination. The default value is 128.
        IntervalInSeconds:
          $ref: "#/components/schemas/SnowflakeBufferingIntervalInSeconds"
          description: Buffer incoming data for the specified period of time, in seconds, before delivering it to the destination. The default value is 0.
    SnowflakeBufferingSizeInMBs:
      type: integer
      minimum: 1
      maximum: 128
    SnowflakeBufferingIntervalInSeconds:
      type: integer
      minimum: 0
      maximum: 900
    IcebergDestinationConfiguration:
