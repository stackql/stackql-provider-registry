    StringWithLettersDigitsUnderscoresDots:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9\\.\\_]+"
    PartitionSpec:
      description: 'Represents how to produce partition data for a table. Partition data is produced by transforming columns in a table. Each column transform is represented by a named PartitionField. Here is an example of the schema in JSON. "partitionSpec": { "identity": [ {"sourceName": "column1"}, {"sourceName": "column2"}, {"sourceName": "column3"} ] } Amazon Data Firehose is in preview release and is subject to change.'
      type: object
      properties:
        Identity:
          $ref: "#/components/schemas/PartitionFields"
          description: List of identity transforms that performs an identity transformation. The transform takes the source value, and does not modify it. Result type is the source type. Amazon Data Firehose is in preview release and is subject to change.
    PartitionFields:
      type: array
      items:
        $ref: "#/components/schemas/PartitionField"
    PartitionField:
      description: Represents a single field in a PartitionSpec. Amazon Data Firehose is in preview release and is subject to change.
      type: object
      properties:
        SourceName:
          $ref: "#/components/schemas/NonEmptyStringWithoutWhitespace"
          description: The column name to be configured in partition spec. Amazon Data Firehose is in preview release and is subject to change.
      required:
        - SourceName
    SchemaEvolutionConfiguration:
      description: The configuration to enable schema evolution. Amazon Data Firehose is in preview release and is subject to change.
