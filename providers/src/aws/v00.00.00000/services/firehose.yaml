    SnowflakeDestinationUpdate:
      description: Update to configuration settings
      type: object
      properties:
        AccountUrl:
          $ref: "#/components/schemas/SnowflakeAccountUrl"
          description: URL for accessing your Snowflake account. This URL must include your account identifier. Note that the protocol (https://) and port number are optional.
        PrivateKey:
          $ref: "#/components/schemas/SnowflakePrivateKey"
          description: The private key used to encrypt your Snowflake client. For information, see Using Key Pair Authentication & Key Rotation.
        KeyPassphrase:
          $ref: "#/components/schemas/SnowflakeKeyPassphrase"
          description: Passphrase to decrypt the private key when the key is encrypted. For information, see Using Key Pair Authentication & Key Rotation.
        User:
          $ref: "#/components/schemas/SnowflakeUser"
          description: User login name for the Snowflake account.
        Database:
          $ref: "#/components/schemas/SnowflakeDatabase"
          description: All data in Snowflake is maintained in databases.
        Schema:
          $ref: "#/components/schemas/SnowflakeSchema"
          description: Each database consists of one or more schemas, which are logical groupings of database objects, such as tables and views
        Table:
          $ref: "#/components/schemas/SnowflakeTable"
          description: All data in Snowflake is stored in database tables, logically structured as collections of columns and rows.
        SnowflakeRoleConfiguration:
          $ref: "#/components/schemas/SnowflakeRoleConfiguration"
          description: Optionally configure a Snowflake role. Otherwise the default user role will be used.
        DataLoadingOption:
          $ref: "#/components/schemas/SnowflakeDataLoadingOption"
          description: JSON keys mapped to table column names or choose to split the JSON payload where content is mapped to a record content column and source metadata is mapped to a record metadata column.
        MetaDataColumnName:
          $ref: "#/components/schemas/SnowflakeMetaDataColumnName"
          description: The name of the record metadata column
        ContentColumnName:
          $ref: "#/components/schemas/SnowflakeContentColumnName"
          description: The name of the content metadata column
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the Snowflake role
        RetryOptions:
          $ref: "#/components/schemas/SnowflakeRetryOptions"
          description: Specify how long Firehose retries sending data to the New Relic HTTP endpoint. After sending data, Firehose first waits for an acknowledgment from the HTTP endpoint. If an error occurs or the acknowledgment doesn’t arrive within the acknowledgment timeout period, Firehose starts the retry duration counter. It keeps retrying until the retry duration expires. After that, Firehose considers it a data delivery failure and backs up the data to your Amazon S3 bucket. Every time that Firehose sends data to the HTTP endpoint (either the initial attempt or a retry), it restarts the acknowledgement timeout counter and waits for an acknowledgement from the HTTP endpoint. Even if the retry duration expires, Firehose still waits for the acknowledgment until it receives it or the acknowledgement timeout period is reached. If the acknowledgment times out, Firehose determines whether there's time left in the retry counter. If there is time left, it retries again and repeats the logic until it receives an acknowledgment or determines that the retry time has expired. If you don't want Firehose to retry sending data, set this value to 0.
        S3BackupMode:
          $ref: "#/components/schemas/SnowflakeS3BackupMode"
          description: Choose an S3 backup mode. Once you set the mode as AllData, you can not change it to FailedDataOnly.
        S3Update:
          $ref: "#/components/schemas/S3DestinationUpdate"
        SecretsManagerConfiguration:
          $ref: "#/components/schemas/SecretsManagerConfiguration"
          description: Describes the Secrets Manager configuration in Snowflake.
        BufferingHints:
          $ref: "#/components/schemas/SnowflakeBufferingHints"
          description: Describes the buffering to perform before delivering data to the Snowflake destination.
    IcebergDestinationUpdate:
      description: Describes an update for a destination in Apache Iceberg Tables.
      type: object
      properties:
        DestinationTableConfigurationList:
          $ref: "#/components/schemas/DestinationTableConfigurationList"
