        SchemaEvolutionConfiguration:
          $ref: "#/components/schemas/SchemaEvolutionConfiguration"
          description: The description of automatic schema evolution configuration. Amazon Data Firehose is in preview release and is subject to change.
        TableCreationConfiguration:
          $ref: "#/components/schemas/TableCreationConfiguration"
          description: The description of table creation configuration. Amazon Data Firehose is in preview release and is subject to change.
        BufferingHints:
          $ref: "#/components/schemas/BufferingHints"
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
        S3BackupMode:
          $ref: "#/components/schemas/IcebergS3BackupMode"
          description: Describes how Firehose will backup records. Currently,Firehose only supports FailedDataOnly.
        RetryOptions:
          $ref: "#/components/schemas/RetryOptions"
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the IAM role to be assumed by Firehose for calling Apache Iceberg Tables.
        AppendOnly:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes whether all incoming data for this delivery stream will be append only (inserts only and not for updates and deletes) for Iceberg delivery. This feature is only applicable for Apache Iceberg Tables. The default value is false. If you set this value to true, Firehose automatically increases the throughput limit of a stream based on the throttling levels of the stream. If you set this parameter to true for a stream with updates and deletes, you will see out of order delivery.
        CatalogConfiguration:
          $ref: "#/components/schemas/CatalogConfiguration"
          description: Configuration describing where the destination Iceberg tables are persisted.
        S3DestinationDescription:
          $ref: "#/components/schemas/S3DestinationDescription"
    ListDeliveryStreamsInputLimit:
