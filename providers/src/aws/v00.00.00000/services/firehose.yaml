    SplunkDestinationUpdate:
      description: Describes an update for a destination in Splunk.
      type: object
      properties:
        HECEndpoint:
          $ref: "#/components/schemas/HECEndpoint"
          description: The HTTP Event Collector (HEC) endpoint to which Firehose sends your data.
        HECEndpointType:
          $ref: "#/components/schemas/HECEndpointType"
          description: This type can be either "Raw" or "Event."
        HECToken:
          $ref: "#/components/schemas/HECToken"
          description: A GUID that you obtain from your Splunk cluster when you create a new HEC endpoint.
        HECAcknowledgmentTimeoutInSeconds:
          $ref: "#/components/schemas/HECAcknowledgmentTimeoutInSeconds"
          description: The amount of time that Firehose waits to receive an acknowledgment from Splunk after it sends data. At the end of the timeout period, Firehose either tries to send the data again or considers it an error, based on your retry settings.
        RetryOptions:
          $ref: "#/components/schemas/SplunkRetryOptions"
          description: The retry behavior in case Firehose is unable to deliver data to Splunk or if it doesn't receive an acknowledgment of receipt from Splunk.
        S3BackupMode:
          $ref: "#/components/schemas/SplunkS3BackupMode"
          description: Specifies how you want Firehose to back up documents to Amazon S3. When set to FailedDocumentsOnly, Firehose writes any data that could not be indexed to the configured Amazon S3 destination. When set to AllEvents, Firehose delivers all incoming records to Amazon S3, and also writes failed documents to Amazon S3. The default value is FailedEventsOnly. You can update this backup mode from FailedEventsOnly to AllEvents. You can't update it from AllEvents to FailedEventsOnly.
        S3Update:
          $ref: "#/components/schemas/S3DestinationUpdate"
          description: Your update to the configuration of the backup Amazon S3 location.
        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
          description: The data processing configuration.
        CloudWatchLoggingOptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptions"
          description: The Amazon CloudWatch logging options for your Firehose stream.
        BufferingHints:
          $ref: "#/components/schemas/SplunkBufferingHints"
          description: The buffering options. If no value is specified, the default values for Splunk are used.
        SecretsManagerConfiguration:
          $ref: "#/components/schemas/SecretsManagerConfiguration"
          description: The configuration that defines how you access secrets for Splunk.
    HttpEndpointDestinationUpdate:
