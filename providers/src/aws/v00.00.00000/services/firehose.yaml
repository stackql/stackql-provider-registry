        ProcessingConfiguration:
          $ref: "#/components/schemas/ProcessingConfiguration"
        S3BackupMode:
          $ref: "#/components/schemas/IcebergS3BackupMode"
          description: Describes how Firehose will backup records. Currently,S3 backup only supports FailedDataOnly.
        RetryOptions:
          $ref: "#/components/schemas/RetryOptions"
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the IAM role to be assumed by Firehose for calling Apache Iceberg Tables.
        AppendOnly:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes whether all incoming data for this delivery stream will be append only (inserts only and not for updates and deletes) for Iceberg delivery. This feature is only applicable for Apache Iceberg Tables. The default value is false. If you set this value to true, Firehose automatically increases the throughput limit of a stream based on the throttling levels of the stream. If you set this parameter to true for a stream with updates and deletes, you will see out of order delivery.
        CatalogConfiguration:
          $ref: "#/components/schemas/CatalogConfiguration"
          description: Configuration describing where the destination Apache Iceberg Tables are persisted.
        S3Configuration:
          $ref: "#/components/schemas/S3DestinationConfiguration"
      required:
        - RoleARN
        - CatalogConfiguration
        - S3Configuration
    DestinationTableConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/DestinationTableConfiguration"
    DestinationTableConfiguration:
      description: Describes the configuration of a destination in Apache Iceberg Tables.
      type: object
      properties:
        DestinationTableName:
          $ref: "#/components/schemas/StringWithLettersDigitsUnderscoresDots"
          description: Specifies the name of the Apache Iceberg Table.
        DestinationDatabaseName:
          $ref: "#/components/schemas/StringWithLettersDigitsUnderscoresDots"
          description: The name of the Apache Iceberg database.
        UniqueKeys:
          $ref: "#/components/schemas/ListOfNonEmptyStringsWithoutWhitespace"
          description: A list of unique keys for a given Apache Iceberg table. Firehose will use these for running Create, Update, or Delete operations on the given Iceberg table.
        PartitionSpec:
          $ref: "#/components/schemas/PartitionSpec"
          description: The partition spec configuration for a table that is used by automatic table creation. Amazon Data Firehose is in preview release and is subject to change.
        S3ErrorOutputPrefix:
          $ref: "#/components/schemas/ErrorOutputPrefix"
          description: The table specific S3 error output prefix. All the errors that occurred while delivering to this table will be prefixed with this value in S3 destination.
