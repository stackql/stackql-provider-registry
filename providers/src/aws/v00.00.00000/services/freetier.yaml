openapi: 3.0.0
info:
  version: "2023-09-07"
  title: AWS Free Tier
  description: AWS Free Tier
  x-serviceName: freetier
  x-serviceAlias: freetier
  x-protocol: json
  x-apiVersion: "2023-09-07"
  x-endpointPrefix: freetier
  x-targetPrefix: AWSFreeTierService
  x-jsonVersion: "1.0"
servers:
  - url: https://freetier.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for freetier
paths:
  /GetAccountActivity:
    post:
      operationId: GetAccountActivity
      description: Returns a specific activity record that is available to the customer.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFreeTierService.GetAccountActivity
            default: AWSFreeTierService.GetAccountActivity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                activityId:
                  $ref: "#/components/schemas/ActivityId"
                  description: A unique identifier that identifies the activity.
                languageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language code used to return translated title and description fields.
              required:
                - activityId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountActivityResponse"
  /GetAccountPlanState:
    post:
      operationId: GetAccountPlanState
      description: This returns all of the information related to the state of the account plan related to Free Tier.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFreeTierService.GetAccountPlanState
            default: AWSFreeTierService.GetAccountPlanState
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountPlanStateResponse"
  /GetFreeTierUsage:
    post:
      operationId: GetFreeTierUsage
      description: Returns a list of all Free Tier usage objects that match your filters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFreeTierService.GetFreeTierUsage
            default: AWSFreeTierService.GetFreeTierUsage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/Expression"
                  description: An expression that specifies the conditions that you want each FreeTierUsage object to meet.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in the response. MaxResults means that there can be up to the specified number of values, but there might be fewer results based on your filters.
                nextToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The pagination token that indicates the next set of results to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFreeTierUsageResponse"
  /ListAccountActivities:
    post:
      operationId: ListAccountActivities
      description: Returns a list of activities that are available. This operation supports pagination and filtering by status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFreeTierService.ListAccountActivities
            default: AWSFreeTierService.ListAccountActivities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filterActivityStatuses:
                  $ref: "#/components/schemas/FilterActivityStatuses"
                  description: The activity status filter. This field can be used to filter the response by activities status.
                nextToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: A token from a previous paginated response. If this is specified, the response includes records beginning from this token (inclusive), up to the number specified by maxResults.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return for this request. To get the next page of items, make another request with the token returned in the output.
                languageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language code used to return translated titles.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccountActivitiesResponse"
  /UpgradeAccountPlan:
    post:
      operationId: UpgradeAccountPlan
      description: The account plan type for the Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFreeTierService.UpgradeAccountPlan
            default: AWSFreeTierService.UpgradeAccountPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountPlanType:
                  $ref: "#/components/schemas/AccountPlanType"
                  description: The target account plan type. This makes it explicit about the change and latest value of the accountPlanType.
              required:
                - accountPlanType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeAccountPlanResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ActivityId:
      type: string
      minLength: 32
      maxLength: 32
      pattern: "[a-zA-Z0-9]+"
    LanguageCode:
      type: string
      enum:
        - en-US
        - en-GB
        - id-ID
        - de-DE
        - es-ES
        - fr-FR
        - ja-JP
        - it-IT
        - pt-PT
        - ko-KR
        - zh-CN
        - zh-TW
        - tr-TR
    GetAccountActivityResponse:
      type: object
      properties:
        activityId:
          $ref: "#/components/schemas/ActivityId"
          description: A unique identifier that identifies the activity.
        title_:
          $ref: "#/components/schemas/GenericString"
          description: A short activity title.
        description:
          $ref: "#/components/schemas/GenericString"
          description: Provides detailed information about the activity and its expected outcomes.
        status:
          $ref: "#/components/schemas/ActivityStatus"
          description: The current activity status.
        instructionsUrl:
          $ref: "#/components/schemas/GenericString"
          description: The URL resource that provides guidance on activity requirements and completion.
        reward:
          $ref: "#/components/schemas/ActivityReward"
          description: A reward granted upon activity completion.
        estimatedTimeToCompleteInMinutes:
          $ref: "#/components/schemas/Integer"
          description: The estimated time to complete the activity. This is the duration in minutes.
        expiresAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time by which the activity must be completed to receive a reward.
        startedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp when the activity started. This field appears only for activities in the IN_PROGRESS or COMPLETED states.
        completedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp when the activity is completed. This field appears only for activities in the COMPLETED state.
      required:
        - activityId
        - title_
        - description
        - status
        - instructionsUrl
        - reward
    GenericString:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\S\\s]*"
    ActivityStatus:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - COMPLETED
        - EXPIRING
    ActivityReward:
      description: The summary of the rewards granted as a result of activities completed.
      type: object
      properties:
        credit:
          $ref: "#/components/schemas/MonetaryAmount"
          description: The credits gained by activity rewards.
    MonetaryAmount:
      description: The monetary amount of the credit.
      type: object
      properties:
        amount:
          $ref: "#/components/schemas/GenericDouble"
          description: The aggregated monetary amount of credits earned.
        unit:
          $ref: "#/components/schemas/CurrencyCode"
          description: The unit that the monetary amount is given in.
      required:
        - amount
        - unit
    GenericDouble:
      type: number
      format: double
    CurrencyCode:
      type: string
      enum:
        - USD
    Integer:
      type: integer
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    GetAccountPlanStateResponse:
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: A unique identifier that identifies the account.
        accountPlanType:
          $ref: "#/components/schemas/AccountPlanType"
          description: The plan type for the account.
        accountPlanStatus:
          $ref: "#/components/schemas/AccountPlanStatus"
          description: The current status for the account plan.
        accountPlanRemainingCredits:
          $ref: "#/components/schemas/MonetaryAmount"
          description: The amount of credits remaining for the account.
        accountPlanExpirationDate:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp for when the current account plan expires.
      required:
        - accountId
        - accountPlanType
        - accountPlanStatus
    AccountId:
      type: string
      pattern: "[0-9]{12}"
    AccountPlanType:
      type: string
      enum:
        - FREE
        - PAID
    AccountPlanStatus:
      type: string
      enum:
        - NOT_STARTED
        - ACTIVE
        - EXPIRED
    Expression:
      description: 'Use Expression to filter in the GetFreeTierUsage API operation. You can use the following patterns: Simple dimension values (Dimensions root operator) Complex expressions with logical operators (AND, NOT, and OR root operators). For simple dimension values, you can set the dimension name, values, and match type for the filters that you plan to use. Example for simple dimension values You can filter to match exactly for REGION==us-east-1 OR REGION==us-west-1. The corresponding Expression appears like the following: { "Dimensions": { "Key": "REGION", "Values": [ "us-east-1", "us-west-1" ], "MatchOptions": ["EQUALS"] } } As shown in the previous example, lists of dimension values are combined with OR when you apply the filter. For complex expressions with logical operators, you can have nested expressions to use the logical operators and specify advanced filtering. Example for complex expressions with logical operators You can filter by ((REGION == us-east-1 OR REGION == us-west-1) OR (SERVICE CONTAINS AWSLambda)) AND (USAGE_TYPE !CONTAINS DataTransfer). The corresponding Expression appears like the following: { "And": [ {"Or": [ {"Dimensions": { "Key": "REGION", "Values": [ "us-east-1", "us-west-1" ], "MatchOptions": ["EQUALS"] }}, {"Dimensions": { "Key": "SERVICE", "Values": ["AWSLambda"], "MatchOptions": ["CONTAINS"] } } ]}, {"Not": {"Dimensions": { "Key": "USAGE_TYPE", "Values": ["DataTransfer"], "MatchOptions": ["CONTAINS"] }}} ] } In the following Contents, you must specify exactly one of the following root operators.'
      type: object
      properties:
        Or:
          $ref: "#/components/schemas/Expressions"
          description: Return results that match any of the Expressions that you specified. in the array.
        And:
          $ref: "#/components/schemas/Expressions"
          description: Return results that match all Expressions that you specified in the array.
        Not:
          $ref: "#/components/schemas/Expression"
          description: Return results that don’t match the Expression that you specified.
        Dimensions:
          $ref: "#/components/schemas/DimensionValues"
          description: The specific dimension, values, and match type to filter objects with.
    Expressions:
      type: array
      items:
        $ref: "#/components/schemas/Expression"
    DimensionValues:
      description: Contains the specifications for the filters to use for your request.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/Dimension"
          description: The name of the dimension that you want to filter on.
        Values:
          $ref: "#/components/schemas/Values"
          description: The metadata values you can specify to filter upon, so that the results all match at least one of the specified values.
        MatchOptions:
          $ref: "#/components/schemas/MatchOptions"
          description: The match options that you can use to filter your results. You can specify only one of these values in the array.
      required:
        - Key
        - Values
        - MatchOptions
    Dimension:
      type: string
      enum:
        - SERVICE
        - OPERATION
        - USAGE_TYPE
        - REGION
        - FREE_TIER_TYPE
        - DESCRIPTION
        - USAGE_PERCENTAGE
    Values:
      type: array
      items:
        $ref: "#/components/schemas/Value"
    Value:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "[ a-zA-Z0-9\\-\\:\\.\\_\\/\\,\\$\\(\\)]*"
    MatchOptions:
      type: array
      items:
        $ref: "#/components/schemas/MatchOption"
    MatchOption:
      type: string
      enum:
        - EQUALS
        - STARTS_WITH
        - ENDS_WITH
        - CONTAINS
        - GREATER_THAN_OR_EQUAL
    MaxResults:
      type: integer
      minimum: 1
      maximum: 1000
    NextPageToken:
      type: string
      minLength: 1
      maxLength: 8192
      pattern: "[\\S\\s]*"
    GetFreeTierUsageResponse:
      type: object
      properties:
        freeTierUsages:
          $ref: "#/components/schemas/FreeTierUsages"
          description: The list of Free Tier usage objects that meet your filter expression.
        nextToken:
          $ref: "#/components/schemas/NextPageToken"
          description: The pagination token that indicates the next set of results to retrieve.
      required:
        - freeTierUsages
    FreeTierUsages:
      type: array
      items:
        $ref: "#/components/schemas/FreeTierUsage"
    FreeTierUsage:
      description: Consists of a Amazon Web Services Free Tier offer’s metadata and your data usage for the offer.
      type: object
      properties:
        service:
          $ref: "#/components/schemas/GenericString"
          description: The name of the Amazon Web Services service providing the Free Tier offer. For example, this can be Amazon Elastic Compute Cloud.
        operation:
          $ref: "#/components/schemas/GenericString"
          description: Describes usageType more granularly with the specific Amazon Web Services service API operation. For example, this can be the RunInstances API operation for Amazon Elastic Compute Cloud.
        usageType:
          $ref: "#/components/schemas/GenericString"
          description: Describes the usage details of the offer. For example, this might be Global-BoxUsage:freetrial.
        region:
          $ref: "#/components/schemas/GenericString"
          description: Describes the Amazon Web Services Region for which this offer is applicable
        actualUsageAmount:
          $ref: "#/components/schemas/GenericDouble"
          description: Describes the actual usage accrued month-to-day (MTD) that you've used so far.
        forecastedUsageAmount:
          $ref: "#/components/schemas/GenericDouble"
          description: Describes the forecasted usage by the month that you're expected to use.
        limit:
          $ref: "#/components/schemas/GenericDouble"
          description: Describes the maximum usage allowed in Free Tier.
        unit:
          $ref: "#/components/schemas/GenericString"
          description: Describes the unit of the usageType, such as Hrs.
        description:
          $ref: "#/components/schemas/GenericString"
          description: The description of the Free Tier offer.
        freeTierType:
          $ref: "#/components/schemas/GenericString"
          description: Describes the type of the Free Tier offer. For example, the offer can be "12 Months Free", "Always Free", and "Free Trial".
    FilterActivityStatuses:
      type: array
      items:
        $ref: "#/components/schemas/ActivityStatus"
    ListAccountActivitiesResponse:
      type: object
      properties:
        activities:
          $ref: "#/components/schemas/Activities"
          description: A brief information about the activities.
        nextToken:
          $ref: "#/components/schemas/NextPageToken"
          description: The token to include in another request to get the next page of items. This value is null when there are no more items to return.
      required:
        - activities
    Activities:
      type: array
      items:
        $ref: "#/components/schemas/ActivitySummary"
    ActivitySummary:
      description: The summary of activities.
      type: object
      properties:
        activityId:
          $ref: "#/components/schemas/ActivityId"
          description: A unique identifier that identifies the activity.
        title_:
          $ref: "#/components/schemas/GenericString"
          description: The title of the activity.
        reward:
          $ref: "#/components/schemas/ActivityReward"
          description: The reward for the activity.
        status:
          $ref: "#/components/schemas/ActivityStatus"
          description: The current status of the activity.
      required:
        - activityId
        - title_
        - reward
        - status
    UpgradeAccountPlanResponse:
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: A unique identifier that identifies the account.
        accountPlanType:
          $ref: "#/components/schemas/AccountPlanType"
          description: The type of plan for the account.
        accountPlanStatus:
          $ref: "#/components/schemas/AccountPlanStatus"
          description: This indicates the latest state of the account plan within its lifecycle.
      required:
        - accountId
        - accountPlanType
        - accountPlanStatus
  x-stackQL-resources:
    account_activities:
      id: aws.freetier.account_activities
      name: account_activities
      title: account_activities
      methods:
        get_account_activity:
          operation:
            $ref: "#/paths/~1GetAccountActivity/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        list_account_activities:
          operation:
            $ref: "#/paths/~1ListAccountActivities/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.activities
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            pagination:
              requestToken:
                key: nextToken
                location: body
              responseToken:
                key: $.nextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/account_activities/methods/get_account_activity"
          - $ref: "#/components/x-stackQL-resources/account_activities/methods/list_account_activities"
        insert: []
        update: []
        delete: []
    account_plan_states:
      id: aws.freetier.account_plan_states
      name: account_plan_states
      title: account_plan_states
      methods:
        get_account_plan_state:
          operation:
            $ref: "#/paths/~1GetAccountPlanState/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/account_plan_states/methods/get_account_plan_state"
        insert: []
        update: []
        delete: []
    free_tier_usages:
      id: aws.freetier.free_tier_usages
      name: free_tier_usages
      title: free_tier_usages
      methods:
        get_free_tier_usage:
          operation:
            $ref: "#/paths/~1GetFreeTierUsage/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.freeTierUsages
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            pagination:
              requestToken:
                key: nextToken
                location: body
              responseToken:
                key: $.nextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/free_tier_usages/methods/get_free_tier_usage"
        insert: []
        update: []
        delete: []
