openapi: 3.0.0
info:
  version: "2022-06-10"
  title: CloudWatch Observability Access Manager
  description: CloudWatch Observability Access Manager
  x-serviceName: oam
  x-serviceAlias: oam
  x-protocol: rest-json
  x-apiVersion: "2022-06-10"
  x-endpointPrefix: oam
  x-jsonVersion: "1.1"
servers:
  - url: https://oam.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for oam
paths:
  /CreateLink:
    post:
      operationId: CreateLink
      description: Creates a link between a source account and a sink that you have created in a monitoring account. After the link is created, data is sent from the source account to the monitoring account. When you create a link, you can optionally specify filters that specify which metric namespaces and which log groups are shared from the source account to the monitoring account. Before you create a link, you must create a sink in the monitoring account and create a sink policy in that account. The sink policy must permit the source account to link to it. You can grant permission to source accounts by granting permission to an entire organization or to individual accounts. For more information, see CreateSink and PutSinkPolicy. Each monitoring account can be linked to as many as 100,000 source accounts. Each source account can be linked to as many as five monitoring accounts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LabelTemplate:
                  $ref: "#/components/schemas/LabelTemplate"
                LinkConfiguration:
                  $ref: "#/components/schemas/LinkConfiguration"
                ResourceTypes:
                  $ref: "#/components/schemas/ResourceTypesInput"
                SinkIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                Tags:
                  $ref: "#/components/schemas/TagMapInput"
              required:
                - LabelTemplate
                - ResourceTypes
                - SinkIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLinkOutput"
  /CreateSink:
    post:
      operationId: CreateSink
      description: Use this to create a sink in the current account, so that it can be used as a monitoring account in CloudWatch cross-account observability. A sink is a resource that represents an attachment point in a monitoring account. Source accounts can link to the sink to send observability data. After you create a sink, you must create a sink policy that allows source accounts to attach to it. For more information, see PutSinkPolicy. Each account can contain one sink per Region. If you delete a sink, you can then create a new one in that Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SinkName"
                Tags:
                  $ref: "#/components/schemas/TagMapInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSinkOutput"
  /DeleteLink:
    post:
      operationId: DeleteLink
      description: Deletes a link between a monitoring account sink and a source account. You must run this operation in the source account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Identifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLinkOutput"
  /DeleteSink:
    post:
      operationId: DeleteSink
      description: Deletes a sink. You must delete all links to a sink before you can delete that sink.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Identifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSinkOutput"
  /GetLink:
    post:
      operationId: GetLink
      description: Returns complete information about one link. To use this operation, provide the link ARN. To retrieve a list of link ARNs, use ListLinks.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Identifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                IncludeTags:
                  $ref: "#/components/schemas/IncludeTags"
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLinkOutput"
  /GetSink:
    post:
      operationId: GetSink
      description: Returns complete information about one monitoring account sink. To use this operation, provide the sink ARN. To retrieve a list of sink ARNs, use ListSinks.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Identifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                IncludeTags:
                  $ref: "#/components/schemas/IncludeTags"
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSinkOutput"
  /GetSinkPolicy:
    post:
      operationId: GetSinkPolicy
      description: Returns the current sink policy attached to this sink. The sink policy specifies what accounts can attach to this sink as source accounts, and what types of data they can share.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SinkIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
              required:
                - SinkIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSinkPolicyOutput"
  /ListAttachedLinks:
    post:
      operationId: ListAttachedLinks
      description: Returns a list of source account links that are linked to this monitoring account sink. To use this operation, provide the sink ARN. To retrieve a list of sink ARNs, use ListSinks. To find a list of links for one source account, use ListLinks.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListAttachedLinksMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                SinkIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
              required:
                - SinkIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAttachedLinksOutput"
  /ListLinks:
    post:
      operationId: ListLinks
      description: Use this operation in a source account to return a list of links to monitoring account sinks that this source account has. To find a list of links for one monitoring account sink, use ListAttachedLinks from within the monitoring account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListLinksMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLinksOutput"
  /ListSinks:
    post:
      operationId: ListSinks
      description: Use this operation in a monitoring account to return the list of sinks created in that account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListSinksMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSinksOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Displays the tags associated with a resource. Both sinks and links support tagging.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource that you want to view tags for. The ARN format of a sink is arn:aws:oam:Region:account-id:sink/sink-id The ARN format of a link is arn:aws:oam:Region:account-id:link/link-id For more information about ARN format, see CloudWatch Logs resources and operations. Unlike tagging permissions in other Amazon Web Services services, to retrieve the list of tags for links or sinks you must have the oam:RequestTag permission. The aws:ReguestTag permission does not allow you to tag and untag links and sinks.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    put:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified resource. Both sinks and links can be tagged. Tags can help you organize and categorize your resources. You can also use them to scope user permissions by granting a user permission to access or change only resources with certain tag values. Tags don't have any semantic meaning to Amazon Web Services and are interpreted strictly as strings of characters. You can use the TagResource action with a resource that already has tags. If you specify a new tag key for the alarm, this tag is appended to the list of tags associated with the alarm. If you specify a tag key that is already associated with the alarm, the new tag value that you specify replaces the previous value for that tag. You can associate as many as 50 tags with a resource. Unlike tagging permissions in other Amazon Web Services services, to tag or untag links and sinks you must have the oam:ResourceTag permission. The iam:ResourceTag permission does not allow you to tag and untag links and sinks.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource that you're adding tags to. The ARN format of a sink is arn:aws:oam:Region:account-id:sink/sink-id The ARN format of a link is arn:aws:oam:Region:account-id:link/link-id For more information about ARN format, see CloudWatch Logs resources and operations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMapInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from the specified resource. Unlike tagging permissions in other Amazon Web Services services, to tag or untag links and sinks you must have the oam:ResourceTag permission. The iam:TagResource permission does not allow you to tag and untag links and sinks.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource that you're removing tags from. The ARN format of a sink is arn:aws:oam:Region:account-id:sink/sink-id The ARN format of a link is arn:aws:oam:Region:account-id:link/link-id For more information about ARN format, see CloudWatch Logs resources and operations.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The list of tag keys to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /PutSinkPolicy:
    post:
      operationId: PutSinkPolicy
      description: "Creates or updates the resource policy that grants permissions to source accounts to link to the monitoring account sink. When you create a sink policy, you can grant permissions to all accounts in an organization or to individual accounts. You can also use a sink policy to limit the types of data that is shared. The six types of services with their respective resource types that you can allow or deny are: Metrics - Specify with AWS::CloudWatch::Metric Log groups - Specify with AWS::Logs::LogGroup Traces - Specify with AWS::XRay::Trace Application Insights - Applications - Specify with AWS::ApplicationInsights::Application Internet Monitor - Specify with AWS::InternetMonitor::Monitor Application Signals - Specify with AWS::ApplicationSignals::Service and AWS::ApplicationSignals::ServiceLevelObjective See the examples in this section to see how to specify permitted source accounts and data types."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Policy:
                  $ref: "#/components/schemas/SinkPolicy"
                SinkIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
              required:
                - SinkIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSinkPolicyOutput"
  /UpdateLink:
    post:
      operationId: UpdateLink
      description: Use this operation to change what types of data are shared from a source account to its linked monitoring account sink. You can't change the sink or change the monitoring account with this operation. When you update a link, you can optionally specify filters that specify which metric namespaces and which log groups are shared from the source account to the monitoring account. To update the list of tags associated with the sink, use TagResource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Identifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                IncludeTags:
                  $ref: "#/components/schemas/IncludeTags"
                LinkConfiguration:
                  $ref: "#/components/schemas/LinkConfiguration"
                ResourceTypes:
                  $ref: "#/components/schemas/ResourceTypesInput"
              required:
                - Identifier
                - ResourceTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLinkOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    LabelTemplate:
      type: string
      minLength: 1
      maxLength: 64
    LinkConfiguration:
      description: Use this structure to optionally create filters that specify that only some metric namespaces or log groups are to be shared from the source account to the monitoring account.
      type: object
      properties:
        LogGroupConfiguration:
          $ref: "#/components/schemas/LogGroupConfiguration"
          description: Use this structure to filter which log groups are to send log events from the source account to the monitoring account.
        MetricConfiguration:
          $ref: "#/components/schemas/MetricConfiguration"
          description: Use this structure to filter which metric namespaces are to be shared from the source account to the monitoring account.
    LogGroupConfiguration:
      description: This structure contains the Filter parameter which you can use to specify which log groups are to share log events from this source account to the monitoring account.
      type: object
      properties:
        Filter:
          $ref: "#/components/schemas/LogsFilter"
          description: "Use this field to specify which log groups are to share their log events with the monitoring account. Use the term LogGroupName and one or more of the following operands. Use single quotation marks (') around log group names. The matching of log group names is case sensitive. Each filter has a limit of five conditional operands. Conditional operands are AND and OR. = and != AND OR LIKE and NOT LIKE. These can be used only as prefix searches. Include a % at the end of the string that you want to search for and include. IN and NOT IN, using parentheses ( ) Examples: LogGroupName IN ('This-Log-Group', 'Other-Log-Group') includes only the log groups with names This-Log-Group and Other-Log-Group. LogGroupName NOT IN ('Private-Log-Group', 'Private-Log-Group-2') includes all log groups except the log groups with names Private-Log-Group and Private-Log-Group-2. LogGroupName LIKE 'aws/lambda/%' OR LogGroupName LIKE 'AWSLogs%' includes all log groups that have names that start with aws/lambda/ or AWSLogs. If you are updating a link that uses filters, you can specify * as the only value for the filter parameter to delete the filter and share all log groups with the monitoring account."
      required:
        - Filter
    LogsFilter:
      type: string
      minLength: 1
      maxLength: 2000
    MetricConfiguration:
      description: This structure contains the Filter parameter which you can use to specify which metric namespaces are to be shared from this source account to the monitoring account.
      type: object
      properties:
        Filter:
          $ref: "#/components/schemas/MetricsFilter"
          description: "Use this field to specify which metrics are to be shared with the monitoring account. Use the term Namespace and one or more of the following operands. Use single quotation marks (') around namespace names. The matching of namespace names is case sensitive. Each filter has a limit of five conditional operands. Conditional operands are AND and OR. = and != AND OR LIKE and NOT LIKE. These can be used only as prefix searches. Include a % at the end of the string that you want to search for and include. IN and NOT IN, using parentheses ( ) Examples: Namespace NOT LIKE 'AWS/%' includes only namespaces that don't start with AWS/, such as custom namespaces. Namespace IN ('AWS/EC2', 'AWS/ELB', 'AWS/S3') includes only the metrics in the EC2, Elastic Load Balancing, and Amazon S3 namespaces. Namespace = 'AWS/EC2' OR Namespace NOT LIKE 'AWS/%' includes only the EC2 namespace and your custom namespaces. If you are updating a link that uses filters, you can specify * as the only value for the filter parameter to delete the filter and share all metric namespaces with the monitoring account."
      required:
        - Filter
    MetricsFilter:
      type: string
      minLength: 1
      maxLength: 2000
    ResourceTypesInput:
      type: array
      items:
        $ref: "#/components/schemas/ResourceType"
    ResourceType:
      type: string
      enum:
        - AWS::CloudWatch::Metric
        - AWS::Logs::LogGroup
        - AWS::XRay::Trace
        - AWS::ApplicationInsights::Application
        - AWS::InternetMonitor::Monitor
        - AWS::ApplicationSignals::Service
        - AWS::ApplicationSignals::ServiceLevelObjective
    ResourceIdentifier:
      type: string
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9_:\.\-\/]{0,2047}$
    TagMapInput:
      type: object
      properties: {}
    CreateLinkOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The ARN of the link that is newly created.
        Id:
          $ref: "#/components/schemas/String"
          description: The random ID string that Amazon Web Services generated as part of the link ARN.
        Label:
          $ref: "#/components/schemas/String"
          description: The label that you assigned to this link. If the labelTemplate includes variables, this field displays the variables resolved to their actual values.
        LabelTemplate:
          $ref: "#/components/schemas/String"
          description: The exact label template that you specified, with the variables not resolved.
        LinkConfiguration:
          $ref: "#/components/schemas/LinkConfiguration"
          description: This structure includes filters that specify which metric namespaces and which log groups are shared from the source account to the monitoring account.
        ResourceTypes:
          $ref: "#/components/schemas/ResourceTypesOutput"
          description: The resource types supported by this link.
        SinkArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the sink that is used for this link.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the link.
    String:
      type: string
    ResourceTypesOutput:
      type: array
      items:
        $ref: "#/components/schemas/String"
    SinkName:
      type: string
      pattern: ^[a-zA-Z0-9_\.\-]{1,255}$
    CreateSinkOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The ARN of the sink that is newly created.
        Id:
          $ref: "#/components/schemas/String"
          description: The random ID string that Amazon Web Services generated as part of the sink ARN.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the sink.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the sink.
    DeleteLinkOutput:
      type: object
    DeleteSinkOutput:
      type: object
    IncludeTags:
      type: boolean
    GetLinkOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The ARN of the link.
        Id:
          $ref: "#/components/schemas/String"
          description: The random ID string that Amazon Web Services generated as part of the link ARN.
        Label:
          $ref: "#/components/schemas/String"
          description: The label that you assigned to this link, with the variables resolved to their actual values.
        LabelTemplate:
          $ref: "#/components/schemas/String"
          description: The exact label template that was specified when the link was created, with the template variables not resolved.
        LinkConfiguration:
          $ref: "#/components/schemas/LinkConfiguration"
          description: This structure includes filters that specify which metric namespaces and which log groups are shared from the source account to the monitoring account.
        ResourceTypes:
          $ref: "#/components/schemas/ResourceTypesOutput"
          description: The resource types supported by this link.
        SinkArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the sink that is used for this link.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the link.
    GetSinkOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The ARN of the sink.
        Id:
          $ref: "#/components/schemas/String"
          description: The random ID string that Amazon Web Services generated as part of the sink ARN.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the sink.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the sink.
    GetSinkPolicyOutput:
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/String"
          description: The policy that you specified, in JSON format.
        SinkArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the sink.
        SinkId:
          $ref: "#/components/schemas/String"
          description: The random ID string that Amazon Web Services generated as part of the sink ARN.
    ListAttachedLinksMaxResults:
      type: integer
      minimum: 1
      maximum: 1000
    NextToken:
      type: string
    ListAttachedLinksOutput:
      type: object
      properties:
        Items:
          $ref: "#/components/schemas/ListAttachedLinksItems"
          description: An array of structures that contain the information about the attached links.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The token to use when requesting the next set of links.
      required:
        - Items
    ListAttachedLinksItems:
      type: array
      items:
        $ref: "#/components/schemas/ListAttachedLinksItem"
    ListAttachedLinksItem:
      description: A structure that contains information about one link attached to this monitoring account sink.
      type: object
      properties:
        Label:
          $ref: "#/components/schemas/String"
          description: The label that was assigned to this link at creation, with the variables resolved to their actual values.
        LinkArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the link.
        ResourceTypes:
          $ref: "#/components/schemas/ResourceTypesOutput"
          description: The resource types supported by this link.
    ListLinksMaxResults:
      type: integer
      minimum: 1
      maximum: 5
    ListLinksOutput:
      type: object
      properties:
        Items:
          $ref: "#/components/schemas/ListLinksItems"
          description: An array of structures that contain the information about the returned links.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The token to use when requesting the next set of links.
      required:
        - Items
    ListLinksItems:
      type: array
      items:
        $ref: "#/components/schemas/ListLinksItem"
    ListLinksItem:
      description: A structure that contains information about one of this source account's links to a monitoring account.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The ARN of the link.
        Id:
          $ref: "#/components/schemas/String"
          description: The random ID string that Amazon Web Services generated as part of the link ARN.
        Label:
          $ref: "#/components/schemas/String"
          description: The label that was assigned to this link at creation, with the variables resolved to their actual values.
        ResourceTypes:
          $ref: "#/components/schemas/ResourceTypesOutput"
          description: The resource types supported by this link.
        SinkArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the sink that this link is attached to.
    ListSinksMaxResults:
      type: integer
      minimum: 1
      maximum: 100
    ListSinksOutput:
      type: object
      properties:
        Items:
          $ref: "#/components/schemas/ListSinksItems"
          description: An array of structures that contain the information about the returned sinks.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The token to use when requesting the next set of sinks.
      required:
        - Items
    ListSinksItems:
      type: array
      items:
        $ref: "#/components/schemas/ListSinksItem"
    ListSinksItem:
      description: A structure that contains information about one of this monitoring account's sinks.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The ARN of the sink.
        Id:
          $ref: "#/components/schemas/String"
          description: The random ID string that Amazon Web Services generated as part of the sink ARN.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the sink.
    Arn:
      type: string
      pattern: ^arn:(\w|-)+:oam:.+:.+:.+
    ListTagsForResourceOutput:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: The list of tags associated with the requested resource.>
    SinkPolicy:
      type: string
    PutSinkPolicyOutput:
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/String"
          description: The policy that you specified.
        SinkArn:
