      type: string
      pattern: "[a-z-]+-[a-z]+-[0-9]"
    IndexStatus:
      description: Contains information about the status of a Resource Explorer index operation in a specific Region.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/OperationStatus"
          description: The current status of the index operation. Valid values are SUCCEEDED, FAILED, IN_PROGRESS, or SKIPPED.
        Index:
          $ref: "#/components/schemas/Index"
        ErrorDetails:
          $ref: "#/components/schemas/ErrorDetails"
          description: Details about any error that occurred during the index operation.
    OperationStatus:
      type: string
      enum:
        - SUCCEEDED
        - FAILED
        - IN_PROGRESS
        - SKIPPED
    Index:
      description: An index is the data store used by Amazon Web Services Resource Explorer to hold information about your Amazon Web Services resources that the service discovers. Creating an index in an Amazon Web Services Region turns on Resource Explorer and lets it discover your resources. By default, an index is local, meaning that it contains information about resources in only the same Region as the index. However, you can promote the index of one Region in the account by calling UpdateIndexType to convert it into an aggregator index. The aggregator index receives a replicated copy of the index information from all other Regions where Resource Explorer is turned on. This allows search operations in that Region to return results from all Regions in the account.
      type: object
      properties:
        Region:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services Region in which the index exists.
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon resource name (ARN) of the index.
        Type:
          $ref: "#/components/schemas/IndexType"
          description: "The type of index. It can be one of the following values: LOCAL – The index contains information about resources from only the same Amazon Web Services Region. AGGREGATOR – Resource Explorer replicates copies of the indexed information about resources in all other Amazon Web Services Regions to the aggregator index. This lets search results in the Region with the aggregator index to include resources from all Regions in the account where Resource Explorer is turned on."
    ErrorDetails:
      description: Contains information about an error that occurred during a Resource Explorer setup operation.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/String"
          description: The error code that identifies the type of error that occurred.
        Message:
          $ref: "#/components/schemas/String"
          description: A human-readable description of the error that occurred.
    ViewStatus:
      description: Contains information about the status of a Resource Explorer view operation in a specific Region.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/OperationStatus"
          description: The current status of the view operation. Valid values are SUCCEEDED, FAILED, IN_PROGRESS, or SKIPPED.
        View:
          $ref: "#/components/schemas/View"
        ErrorDetails:
          $ref: "#/components/schemas/ErrorDetails"
          description: Details about any error that occurred during the view operation.
