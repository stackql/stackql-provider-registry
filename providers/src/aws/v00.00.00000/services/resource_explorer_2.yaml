openapi: 3.0.0
info:
  version: "2022-07-28"
  title: AWS Resource Explorer
  description: AWS Resource Explorer
  x-serviceName: resource-explorer-2
  x-serviceAlias: resource_explorer_2
  x-protocol: rest-json
  x-apiVersion: "2022-07-28"
  x-endpointPrefix: resource-explorer-2
servers:
  - url: https://resource-explorer-2.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for resource-explorer-2
paths:
  /AssociateDefaultView:
    post:
      operationId: AssociateDefaultView
      description: Sets the specified view as the default for the Amazon Web Services Region in which you call this operation. When a user performs a Search that doesn't explicitly specify which view to use, then Amazon Web Services Resource Explorer automatically chooses this default view for searches performed in this Amazon Web Services Region. If an Amazon Web Services Region doesn't have a default view configured, then users must explicitly specify a view with every Search operation performed in that Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ViewArn:
                  $ref: "#/components/schemas/AssociateDefaultViewInputViewArnString"
              required:
                - ViewArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateDefaultViewOutput"
  /BatchGetView:
    post:
      operationId: BatchGetView
      description: Retrieves details about a list of views.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ViewArns:
                  $ref: "#/components/schemas/BatchGetViewInputViewArnsList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetViewOutput"
  /CreateIndex:
    post:
      operationId: CreateIndex
      description: "Turns on Amazon Web Services Resource Explorer in the Amazon Web Services Region in which you called this operation by creating an index. Resource Explorer begins discovering the resources in this Region and stores the details about the resources in the index so that they can be queried by using the Search operation. You can create only one index in a Region. This operation creates only a local index. To promote the local index in one Amazon Web Services Region into the aggregator index for the Amazon Web Services account, use the UpdateIndexType operation. For more information, see Turning on cross-Region search by creating an aggregator index in the Amazon Web Services Resource Explorer User Guide. For more details about what happens when you turn on Resource Explorer in an Amazon Web Services Region, see Turn on Resource Explorer to index your resources in an Amazon Web Services Region in the Amazon Web Services Resource Explorer User Guide. If this is the first Amazon Web Services Region in which you've created an index for Resource Explorer, then this operation also creates a service-linked role in your Amazon Web Services account that allows Resource Explorer to enumerate your resources to populate the index. Action: resource-explorer-2:CreateIndex Resource: The ARN of the index (as it will exist after the operation completes) in the Amazon Web Services Region and account in which you're trying to create the index. Use the wildcard character (*) at the end of the string to match the eventual UUID. For example, the following Resource element restricts the role or user to creating an index in only the us-east-2 Region of the specified account. \"Resource\": \"arn:aws:resource-explorer-2:us-west-2:`<account-id>`:index/*\" Alternatively, you can use \"Resource\": \"*\" to allow the role or user to create an index in any Region. Action: iam:CreateServiceLinkedRole Resource: No specific resource (*). This permission is required only the first time you create an index to turn on Resource Explorer in the account. Resource Explorer uses this to create the service-linked role needed to index the resources in your account. Resource Explorer uses the same service-linked role for all additional indexes you create afterwards."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/String"
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIndexOutput"
  /CreateResourceExplorerSetup:
    post:
      operationId: CreateResourceExplorerSetup
      description: Creates a Resource Explorer setup configuration across multiple Amazon Web Services Regions. This operation sets up indexes and views in the specified Regions. This operation can also be used to set an aggregator Region for cross-Region resource search.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RegionList:
                  $ref: "#/components/schemas/CreateResourceExplorerSetupInputRegionListList"
                AggregatorRegions:
                  $ref: "#/components/schemas/CreateResourceExplorerSetupInputAggregatorRegionsList"
                ViewName:
                  $ref: "#/components/schemas/CreateResourceExplorerSetupInputViewNameString"
              required:
                - RegionList
                - ViewName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceExplorerSetupOutput"
  /CreateView:
    post:
      operationId: CreateView
      description: Creates a view that users can query by using the Search operation. Results from queries that you make using this view include only resources that match the view's Filters. For more information about Amazon Web Services Resource Explorer views, see Managing views in the Amazon Web Services Resource Explorer User Guide. Only the principals with an IAM identity-based policy that grants Allow to the Search action on a Resource with the Amazon resource name (ARN) of this view can Search using views you create with this operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/CreateViewInputClientTokenString"
                ViewName:
                  $ref: "#/components/schemas/ViewName"
                IncludedProperties:
                  $ref: "#/components/schemas/IncludedPropertyList"
                Scope:
                  $ref: "#/components/schemas/CreateViewInputScopeString"
                Filters:
                  $ref: "#/components/schemas/SearchFilter"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - ViewName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateViewOutput"
  /DeleteIndex:
    post:
      operationId: DeleteIndex
      description: Deletes the specified index and turns off Amazon Web Services Resource Explorer in the specified Amazon Web Services Region. When you delete an index, Resource Explorer stops discovering and indexing resources in that Region. Resource Explorer also deletes all views in that Region. These actions occur as asynchronous background tasks. You can check to see when the actions are complete by using the GetIndex operation and checking the Status response value. If the index you delete is the aggregator index for the Amazon Web Services account, you must wait 24 hours before you can promote another local index to be the aggregator index for the account. Users can't perform account-wide searches using Resource Explorer until another aggregator index is configured.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIndexOutput"
  /DeleteResourceExplorerSetup:
    post:
      operationId: DeleteResourceExplorerSetup
      description: Deletes a Resource Explorer setup configuration. This operation removes indexes and views from the specified Regions or all Regions where Resource Explorer is configured.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                RegionList:
                  $ref: "#/components/schemas/RegionList"
                DeleteInAllRegions:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourceExplorerSetupOutput"
  /DeleteView:
    post:
      operationId: DeleteView
      description: Deletes the specified view. If the specified view is the default view for its Amazon Web Services Region, then all Search operations in that Region must explicitly specify the view to use until you configure a new default by calling the AssociateDefaultView operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ViewArn:
                  $ref: "#/components/schemas/DeleteViewInputViewArnString"
              required:
                - ViewArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteViewOutput"
  /DisassociateDefaultView:
    post:
      operationId: DisassociateDefaultView
      description: After you call this operation, the affected Amazon Web Services Region no longer has a default view. All Search operations in that Region must explicitly specify a view or the operation fails. You can configure a new default by calling the AssociateDefaultView operation. If an Amazon Web Services Region doesn't have a default view configured, then users must explicitly specify a view with every Search operation performed in that Region.
      parameters: []
      responses:
        "200":
          description: Success
  /GetAccountLevelServiceConfiguration:
    post:
      operationId: GetAccountLevelServiceConfiguration
      description: Retrieves the status of your account's Amazon Web Services service access, and validates the service linked role required to access the multi-account search feature. Only the management account can invoke this API call.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountLevelServiceConfigurationOutput"
  /GetDefaultView:
    post:
      operationId: GetDefaultView
      description: Retrieves the Amazon Resource Name (ARN) of the view that is the default for the Amazon Web Services Region in which you call this operation. You can then call GetView to retrieve the details of that view.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDefaultViewOutput"
  /GetIndex:
    post:
      operationId: GetIndex
      description: Retrieves details about the Amazon Web Services Resource Explorer index in the Amazon Web Services Region in which you invoked the operation.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIndexOutput"
  /GetManagedView:
    post:
      operationId: GetManagedView
      description: Retrieves details of the specified Amazon Web Services-managed view.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ManagedViewArn:
                  $ref: "#/components/schemas/GetManagedViewInputManagedViewArnString"
              required:
                - ManagedViewArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetManagedViewOutput"
  /GetResourceExplorerSetup:
    post:
      operationId: GetResourceExplorerSetup
      description: Retrieves the status and details of a Resource Explorer setup operation. This operation returns information about the progress of creating or deleting Resource Explorer configurations across Regions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TaskId:
                  $ref: "#/components/schemas/GetResourceExplorerSetupInputTaskIdString"
                MaxResults:
                  $ref: "#/components/schemas/GetResourceExplorerSetupInputMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/GetResourceExplorerSetupInputNextTokenString"
              required:
                - TaskId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceExplorerSetupOutput"
  /GetServiceIndex:
    post:
      operationId: GetServiceIndex
      description: Retrieves information about the Resource Explorer index in the current Amazon Web Services Region. This operation returns the ARN and type of the index if one exists.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceIndexOutput"
  /GetServiceView:
    post:
      operationId: GetServiceView
      description: Retrieves details about a specific Resource Explorer service view. This operation returns the configuration and properties of the specified view.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ServiceViewArn:
                  $ref: "#/components/schemas/GetServiceViewInputServiceViewArnString"
              required:
                - ServiceViewArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceViewOutput"
  /GetView:
    post:
      operationId: GetView
      description: Retrieves details of the specified view.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ViewArn:
                  $ref: "#/components/schemas/GetViewInputViewArnString"
              required:
                - ViewArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetViewOutput"
  /ListIndexes:
    post:
      operationId: ListIndexes
      description: Retrieves a list of all of the indexes in Amazon Web Services Regions that are currently collecting resource information for Amazon Web Services Resource Explorer.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Type:
                  $ref: "#/components/schemas/IndexType"
                Regions:
                  $ref: "#/components/schemas/ListIndexesInputRegionsList"
                MaxResults:
                  $ref: "#/components/schemas/ListIndexesInputMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/ListIndexesInputNextTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIndexesOutput"
  /ListIndexesForMembers:
    post:
      operationId: ListIndexesForMembers
      description: Retrieves a list of a member's indexes in all Amazon Web Services Regions that are currently collecting resource information for Amazon Web Services Resource Explorer. Only the management account or a delegated administrator with service access enabled can invoke this API call.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountIdList:
                  $ref: "#/components/schemas/ListIndexesForMembersInputAccountIdListList"
                MaxResults:
                  $ref: "#/components/schemas/ListIndexesForMembersInputMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/ListIndexesForMembersInputNextTokenString"
              required:
                - AccountIdList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIndexesForMembersOutput"
  /ListManagedViews:
    post:
      operationId: ListManagedViews
      description: Lists the Amazon resource names (ARNs) of the Amazon Web Services-managed views available in the Amazon Web Services Region in which you call this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListManagedViewsInputMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/ListManagedViewsInputNextTokenString"
                ServicePrincipal:
                  $ref: "#/components/schemas/ListManagedViewsInputServicePrincipalString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListManagedViewsOutputDisplay"
  /ListResources:
    post:
      operationId: ListResources
      description: Returns a list of resources and their details that match the specified criteria. This query must use a view. If you don’t explicitly specify a view, then Resource Explorer uses the default view for the Amazon Web Services Region in which you call this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/SearchFilter"
                MaxResults:
                  $ref: "#/components/schemas/ListResourcesInputMaxResultsInteger"
                ViewArn:
                  $ref: "#/components/schemas/ListResourcesInputViewArnString"
                NextToken:
                  $ref: "#/components/schemas/ListResourcesInputNextTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourcesOutput"
  /ListServiceIndexes:
    post:
      operationId: ListServiceIndexes
      description: Lists all Resource Explorer indexes across the specified Amazon Web Services Regions. This operation returns information about indexes including their ARNs, types, and Regions.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Regions:
                  $ref: "#/components/schemas/ListServiceIndexesInputRegionsList"
                MaxResults:
                  $ref: "#/components/schemas/ListServiceIndexesInputMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/ListServiceIndexesInputNextTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceIndexesOutput"
  /ListServiceViews:
    post:
      operationId: ListServiceViews
      description: Lists all Resource Explorer service views available in the current Amazon Web Services account. This operation returns the ARNs of available service views.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListServiceViewsInputMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceViewsOutputDisplay"
  /ListStreamingAccessForServices:
    post:
      operationId: ListStreamingAccessForServices
      description: Returns a list of Amazon Web Services services that have been granted streaming access to your Resource Explorer data. Streaming access allows Amazon Web Services services to receive real-time updates about your resources as they are indexed by Resource Explorer.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListStreamingAccessForServicesInputMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamingAccessForServicesOutput"
  /ListSupportedResourceTypes:
    post:
      operationId: ListSupportedResourceTypes
      description: Retrieves a list of all resource types currently supported by Amazon Web Services Resource Explorer.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/String"
                MaxResults:
                  $ref: "#/components/schemas/ListSupportedResourceTypesInputMaxResultsInteger"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSupportedResourceTypesOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags that are attached to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon resource name (ARN) of the view or index that you want to attach tags to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Adds one or more tag key and value pairs to an Amazon Web Services Resource Explorer view or index.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the view or index that you want to attach tags to.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes one or more tag key and value pairs from an Amazon Web Services Resource Explorer view or index.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the view or index that you want to remove tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/StringList"
          description: A list of the keys for the tags that you want to remove from the specified view or index.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /ListViews:
    post:
      operationId: ListViews
      description: Lists the Amazon resource names (ARNs) of the views available in the Amazon Web Services Region in which you call this operation. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/String"
                MaxResults:
                  $ref: "#/components/schemas/ListViewsInputMaxResultsInteger"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListViewsOutputDisplay"
  /Search:
    post:
      operationId: Search
      description: Searches for resources and displays details about all resources that match the specified criteria. You must specify a query string. All search queries must use a view. If you don't explicitly specify a view, then Amazon Web Services Resource Explorer uses the default view for the Amazon Web Services Region in which you call this operation. The results are the logical intersection of the results that match both the QueryString parameter supplied to this operation and the SearchFilter parameter attached to the view. For the complete syntax supported by the QueryString parameter, see Search query syntax reference for Resource Explorer. If your search results are empty, or are missing results that you think should be there, see Troubleshooting Resource Explorer search.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                QueryString:
                  $ref: "#/components/schemas/QueryString"
                MaxResults:
                  $ref: "#/components/schemas/SearchInputMaxResultsInteger"
                ViewArn:
                  $ref: "#/components/schemas/SearchInputViewArnString"
                NextToken:
                  $ref: "#/components/schemas/SearchInputNextTokenString"
              required:
                - QueryString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchOutput"
  /UpdateIndexType:
    post:
      operationId: UpdateIndexType
      description: Changes the type of the index from one of the following types to the other. For more information about indexes and the role they perform in Amazon Web Services Resource Explorer, see Turning on cross-Region search by creating an aggregator index in the Amazon Web Services Resource Explorer User Guide. AGGREGATOR index type The index contains information about resources from all Amazon Web Services Regions in the Amazon Web Services account in which you've created a Resource Explorer index. Resource information from all other Regions is replicated to this Region's index. When you change the index type to AGGREGATOR, Resource Explorer turns on replication of all discovered resource information from the other Amazon Web Services Regions in your account to this index. You can then, from this Region only, perform resource search queries that span all Amazon Web Services Regions in the Amazon Web Services account. Turning on replication from all other Regions is performed by asynchronous background tasks. You can check the status of the asynchronous tasks by using the GetIndex operation. When the asynchronous tasks complete, the Status response of that operation changes from UPDATING to ACTIVE. After that, you can start to see results from other Amazon Web Services Regions in query results. However, it can take several hours for replication from all other Regions to complete. You can have only one aggregator index per Amazon Web Services account. Before you can promote a different index to be the aggregator index for the account, you must first demote the existing aggregator index to type LOCAL. LOCAL index type The index contains information about resources in only the Amazon Web Services Region in which the index exists. If an aggregator index in another Region exists, then information in this local index is replicated to the aggregator index. When you change the index type to LOCAL, Resource Explorer turns off the replication of resource information from all other Amazon Web Services Regions in the Amazon Web Services account to this Region. The aggregator index remains in the UPDATING state until all replication with other Regions successfully stops. You can check the status of the asynchronous task by using the GetIndex operation. When Resource Explorer successfully stops all replication with other Regions, the Status response of that operation changes from UPDATING to ACTIVE. Separately, the resource information from other Regions that was previously stored in the index is deleted within 30 days by another background task. Until that asynchronous task completes, some results from other Regions can continue to appear in search results. After you demote an aggregator index to a local index, you must wait 24 hours before you can promote another index to be the new aggregator index for the account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/String"
                Type:
                  $ref: "#/components/schemas/IndexType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateIndexTypeOutput"
  /UpdateView:
    post:
      operationId: UpdateView
      description: Modifies some of the details of a view. You can change the filter string and the list of included properties. You can't change the name of the view.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ViewArn:
                  $ref: "#/components/schemas/UpdateViewInputViewArnString"
                IncludedProperties:
                  $ref: "#/components/schemas/IncludedPropertyList"
                Filters:
                  $ref: "#/components/schemas/SearchFilter"
              required:
                - ViewArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateViewOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
