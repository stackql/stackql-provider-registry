      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon resource name (ARN) of the index.
        Type:
          $ref: "#/components/schemas/IndexType"
          description: The type of the index in this Region. For information about the aggregator index and how it differs from a local index, see Turning on cross-Region search by creating an aggregator index.
        State:
          $ref: "#/components/schemas/IndexState"
          description: The current state of the index in this Amazon Web Services Region.
        ReplicatingFrom:
          $ref: "#/components/schemas/RegionList"
          description: This response value is present only if this index is Type=AGGREGATOR. A list of the Amazon Web Services Regions that replicate their content to the index in this Region.
        ReplicatingTo:
          $ref: "#/components/schemas/RegionList"
          description: This response value is present only if this index is Type=LOCAL. The Amazon Web Services Region that contains the aggregator index, if one exists. If an aggregator index does exist then the Region in which you called this operation replicates its index information to the Region specified in this response value.
        CreatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time when the index was originally created.
        LastUpdatedAt:
