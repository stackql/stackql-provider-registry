      type: object
      properties:
        AWSServiceAccessStatus:
          $ref: "#/components/schemas/AWSServiceAccessStatus"
          description: This value displays whether your Amazon Web Services service access is ENABLED or DISABLED.
        ServiceLinkedRole:
