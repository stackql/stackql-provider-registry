  schemas:
    AssociateDefaultViewInputViewArnString:
      type: string
      minLength: 1
      maxLength: 1011
    AssociateDefaultViewOutput:
      type: object
      properties:
        ViewArn:
          $ref: "#/components/schemas/String"
          description: The Amazon resource name (ARN) of the view that the operation set as the default for queries made in the Amazon Web Services Region and Amazon Web Services account in which you called this operation.
    String:
      type: string
    BatchGetViewInputViewArnsList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    BatchGetViewOutput:
      type: object
      properties:
        Views:
          $ref: "#/components/schemas/ViewList"
          description: A structure with a list of objects with details for each of the specified views.
        Errors:
          $ref: "#/components/schemas/BatchGetViewErrors"
          description: If any of the specified ARNs result in an error, then this structure describes the error.
    ViewList:
      type: array
      items:
        $ref: "#/components/schemas/View"
    View:
      description: A view is a structure that defines a set of filters that provide a view into the information in the Amazon Web Services Resource Explorer index. The filters specify which information from the index is visible to the users of the view. For example, you can specify filters that include only resources that are tagged with the key "ENV" and the value "DEVELOPMENT" in the results returned by this view. You could also create a second view that includes only resources that are tagged with "ENV" and "PRODUCTION".
      type: object
      properties:
        ViewArn:
          $ref: "#/components/schemas/String"
          description: The Amazon resource name (ARN) of the view.
        ViewName:
          $ref: "#/components/schemas/ViewName"
          description: The name of the view.
        Owner:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account that owns this view.
        LastUpdatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time when this view was last modified.
        Scope:
          $ref: "#/components/schemas/String"
          description: An Amazon resource name (ARN) of an Amazon Web Services account, an organization, or an organizational unit (OU) that specifies whether this view includes resources from only the specified Amazon Web Services account, all accounts in the specified organization, or all accounts in the specified OU. If not specified, the value defaults to the Amazon Web Services account used to call this operation.
        IncludedProperties:
          $ref: "#/components/schemas/IncludedPropertyList"
          description: A structure that contains additional information about the view.
        Filters:
          $ref: "#/components/schemas/SearchFilter"
          description: An array of SearchFilter objects that specify which resources can be included in the results of queries made using this view.
    ViewName:
      type: string
      pattern: "[a-zA-Z0-9\\-]{1,64}"
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    IncludedPropertyList:
      type: array
      items:
        $ref: "#/components/schemas/IncludedProperty"
    IncludedProperty:
      description: Information about an additional property that describes a resource, that you can optionally include in the view. This lets you view that property in search results, and filter your search results based on the value of the property.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/IncludedPropertyNameString"
          description: "The name of the property that is included in this view. You can specify the following property names for this field: tags"
      required:
        - Name
    IncludedPropertyNameString:
      type: string
      minLength: 1
      maxLength: 1011
    SearchFilter:
      description: A search filter defines which resources can be part of a search query result set.
      type: object
      properties:
        FilterString:
          $ref: "#/components/schemas/SearchFilterFilterStringString"
          description: The string that contains the search keywords, prefixes, and operators to control the results that can be returned by a Search operation. For more details, see Search query syntax.
      required:
        - FilterString
    SearchFilterFilterStringString:
      type: string
      minLength: 0
      maxLength: 2048
    BatchGetViewErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetViewError"
    BatchGetViewError:
      description: A collection of error messages for any views that Amazon Web Services Resource Explorer couldn't retrieve details.
      type: object
      properties:
        ViewArn:
          $ref: "#/components/schemas/String"
          description: The Amazon resource name (ARN) of the view for which Resource Explorer failed to retrieve details.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: The description of the error for the specified view.
      required:
        - ViewArn
        - ErrorMessage
    TagMap:
      type: object
      properties: {}
    CreateIndexOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: "The ARN of the new local index for the Region. You can reference this ARN in IAM permission policies to authorize the following operations: DeleteIndex | GetIndex | UpdateIndexType | CreateView"
        State:
          $ref: "#/components/schemas/IndexState"
          description: Indicates the current state of the index. You can check for changes to the state for asynchronous operations by calling the GetIndex operation. The state can remain in the CREATING or UPDATING state for several hours as Resource Explorer discovers the information about your resources and populates the index.
        CreatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and timestamp when the index was created.
    IndexState:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - DELETED
        - UPDATING
