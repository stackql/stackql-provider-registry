    RemoteAccessSession:
      description: Represents information about the remote access session.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the remote access session.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the remote access session.
        created:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the remote access session was created.
        status:
          $ref: "#/components/schemas/ExecutionStatus"
          description: "The status of the remote access session. Can be any of the following: PENDING. PENDING_CONCURRENCY. PENDING_DEVICE. PROCESSING. SCHEDULING. PREPARING. RUNNING. COMPLETED. STOPPING."
        result:
          $ref: "#/components/schemas/ExecutionResult"
          description: "The result of the remote access session. Can be any of the following: PENDING. PASSED. WARNED. FAILED. SKIPPED. ERRORED. STOPPED."
        message:
          $ref: "#/components/schemas/Message"
          description: A message about the remote access session.
        started:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the remote access session was started.
        stopped:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the remote access session was stopped.
        device:
          $ref: "#/components/schemas/Device"
          description: The device (phone or tablet) used in the remote access session.
        instanceArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the instance.
        billingMethod:
          $ref: "#/components/schemas/BillingMethod"
          description: The billing method of the remote access session. Possible values include METERED or UNMETERED. For more information about metered devices, see AWS Device Farm terminology.
        deviceMinutes:
          $ref: "#/components/schemas/DeviceMinutes"
          description: The number of minutes a device is used in a remote access session (including setup and teardown minutes).
        endpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint for the remote access session. This field is deprecated, and is replaced by the new endpoints.interactiveEndpoint field.
        deviceUdid:
          $ref: "#/components/schemas/String"
          description: Unique device identifier for the remote device. Only returned if remote debugging is enabled for the remote access session. Remote debugging is no longer supported.
        interactionMode:
          $ref: "#/components/schemas/InteractionMode"
          description: The interaction mode of the remote access session. Changing the interactive mode of remote access sessions is no longer available.
        skipAppResign:
          $ref: "#/components/schemas/SkipAppResign"
          description: When set to true, for private devices, Device Farm does not sign your app again. For public devices, Device Farm always signs your apps again. For more information about how Device Farm re-signs your apps, see Do you modify my app? in the AWS Device Farm FAQs.
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The VPC security groups and subnets that are attached to a project.
        deviceProxy:
          $ref: "#/components/schemas/DeviceProxy"
          description: The device proxy configured for the remote access session.
        appUpload:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN for the app to be installed onto your device.
        endpoints:
          $ref: "#/components/schemas/RemoteAccessEndpoints"
