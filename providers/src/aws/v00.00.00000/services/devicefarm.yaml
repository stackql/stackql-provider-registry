  /UpdateDevicePool:
    post:
      operationId: UpdateDevicePool
      description: Modifies the name, description, and rules in a device pool given the attributes and the pool ARN. Rule updates are all-or-nothing, meaning they can only be updated as a whole (or not at all).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.UpdateDevicePool
            default: DeviceFarm_20150623.UpdateDevicePool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the Device Farm device pool to update.
                name:
                  $ref: "#/components/schemas/Name"
                  description: A string that represents the name of the device pool to update.
                description:
                  $ref: "#/components/schemas/Message"
                  description: A description of the device pool to update.
                rules:
                  $ref: "#/components/schemas/Rules"
                  description: Represents the rules to modify for the device pool. Updating rules is optional. If you update rules for your request, the update replaces the existing rules.
                maxDevices:
                  $ref: "#/components/schemas/Integer"
                  description: The number of devices that Device Farm can add to your device pool. Device Farm adds devices that are available and that meet the criteria that you assign for the rules parameter. Depending on how many devices meet these constraints, your device pool might contain fewer devices than the value for this parameter. By specifying the maximum number of devices, you can control the costs that you incur by running tests. If you use this parameter in your request, you cannot use the clearMaxDevices parameter in the same request.
                clearMaxDevices:
                  $ref: "#/components/schemas/Boolean"
                  description: Sets whether the maxDevices parameter applies to your device pool. If you set this parameter to true, the maxDevices parameter does not apply, and Device Farm does not limit the number of devices that it adds to your device pool. In this case, Device Farm adds all available devices that meet the criteria specified in the rules parameter. If you use this parameter in your request, you cannot use the maxDevices parameter in the same request.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDevicePoolResult"
  /UpdateInstanceProfile:
