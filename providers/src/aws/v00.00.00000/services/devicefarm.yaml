    RenewOfferingResult:
      description: The result of a renewal offering.
      type: object
      properties:
        offeringTransaction:
          $ref: "#/components/schemas/OfferingTransaction"
          description: Represents the status of the offering transaction for the renewal.
    DeviceSelectionConfiguration:
      description: Represents the device filters used in a test run and the maximum number of devices to be included in the run. It is passed in as the deviceSelectionConfiguration request parameter in ScheduleRun.
      type: object
      properties:
        filters:
          $ref: "#/components/schemas/DeviceFilters"
          description: "Used to dynamically select a set of devices for a test run. A filter is made up of an attribute, an operator, and one or more values. Attribute The aspect of a device such as platform or model used as the selection criteria in a device filter. Allowed values include: ARN: The Amazon Resource Name (ARN) of the device (for example, arn:aws:devicefarm:us-west-2::device:12345Example). PLATFORM: The device platform. Valid values are ANDROID or IOS. OS_VERSION: The operating system version (for example, 10.3.2). MODEL: The device model (for example, iPad 5th Gen). AVAILABILITY: The current availability of the device. Valid values are AVAILABLE, HIGHLY_AVAILABLE, BUSY, or TEMPORARY_NOT_AVAILABLE. FORM_FACTOR: The device form factor. Valid values are PHONE or TABLET. MANUFACTURER: The device manufacturer (for example, Apple). REMOTE_ACCESS_ENABLED: Whether the device is enabled for remote access. Valid values are TRUE or FALSE. REMOTE_DEBUG_ENABLED: Whether the device is enabled for remote debugging. Valid values are TRUE or FALSE. Because remote debugging is no longer supported, this filter is ignored. INSTANCE_ARN: The Amazon Resource Name (ARN) of the device instance. INSTANCE_LABELS: The label of the device instance. FLEET_TYPE: The fleet type. Valid values are PUBLIC or PRIVATE. Operator The filter operator. The EQUALS operator is available for every attribute except INSTANCE_LABELS. The CONTAINS operator is available for the INSTANCE_LABELS and MODEL attributes. The IN and NOT_IN operators are available for the ARN, OS_VERSION, MODEL, MANUFACTURER, and INSTANCE_ARN attributes. The LESS_THAN, GREATER_THAN, LESS_THAN_OR_EQUALS, and GREATER_THAN_OR_EQUALS operators are also available for the OS_VERSION attribute. Values An array of one or more filter values. Operator Values The IN and NOT_IN operators can take a values array that has more than one element. The other operators require an array with a single element. Attribute Values The PLATFORM attribute can be set to ANDROID or IOS. The AVAILABILITY attribute can be set to AVAILABLE, HIGHLY_AVAILABLE, BUSY, or TEMPORARY_NOT_AVAILABLE. The FORM_FACTOR attribute can be set to PHONE or TABLET. The FLEET_TYPE attribute can be set to PUBLIC or PRIVATE."
        maxDevices:
          $ref: "#/components/schemas/Integer"
          description: The maximum number of devices to be included in a test run.
      required:
        - filters
        - maxDevices
    ExecutionConfiguration:
      description: Represents configuration information about a test run, such as the execution timeout (in minutes).
      type: object
      properties:
        jobTimeoutMinutes:
          $ref: "#/components/schemas/JobTimeoutMinutes"
          description: The number of minutes a test run executes before it times out.
        accountsCleanup:
          $ref: "#/components/schemas/AccountsCleanup"
          description: True if account cleanup is enabled at the beginning of the test. Otherwise, false.
        appPackagesCleanup:
          $ref: "#/components/schemas/AppPackagesCleanup"
          description: True if app package cleanup is enabled at the beginning of the test. Otherwise, false.
        videoCapture:
          $ref: "#/components/schemas/VideoCapture"
          description: Set to true to enable video capture. Otherwise, set to false. The default is true.
        skipAppResign:
          $ref: "#/components/schemas/SkipAppResign"
          description: When set to true, for private devices, Device Farm does not sign your app again. For public devices, Device Farm always signs your apps again. For more information about how Device Farm re-signs your apps, see Do you modify my app? in the AWS Device Farm FAQs.
    AccountsCleanup:
      type: boolean
    AppPackagesCleanup:
      type: boolean
    ScheduleRunResult:
