          description: "Specifies the billing method for a test run: metered or unmetered. If the parameter is not specified, the default value is metered. If you have purchased unmetered device slots, you must set this parameter to unmetered to make use of them. Otherwise, your run counts against your metered time."
        environmentVariables:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: Environment variables associated with the run.
        executionRoleArn:
          $ref: "#/components/schemas/AmazonRoleResourceName"
          description: An IAM role to be assumed by the test host for the run.
    Location:
