    ScheduleRunTest:
      description: Represents test settings. This data structure is passed in as the test parameter to ScheduleRun. For an example of the JSON request syntax, see ScheduleRun.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/TestType"
          description: "The test's type. Must be one of the following values: BUILTIN_FUZZ APPIUM_JAVA_JUNIT APPIUM_JAVA_TESTNG APPIUM_PYTHON APPIUM_NODE APPIUM_RUBY APPIUM_WEB_JAVA_JUNIT APPIUM_WEB_JAVA_TESTNG APPIUM_WEB_PYTHON APPIUM_WEB_NODE APPIUM_WEB_RUBY INSTRUMENTATION XCTEST XCTEST_UI"
        testPackageArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the uploaded test to be run.
        testSpecArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the YAML-formatted test specification.
        filter:
          $ref: "#/components/schemas/Filter"
          description: The test's filter.
        parameters:
          type: object
          properties: {}
          description: "The test's parameters, such as test framework parameters and fixture settings. Parameters are represented by name-value pairs of strings. For all tests: app_performance_monitoring: Performance monitoring is enabled by default. Set this parameter to false to disable it. For Appium tests (all types): appium_version: The Appium version. Currently supported values are 1.6.5 (and later), latest, and default. latest runs the latest Appium version supported by Device Farm (1.9.1). For default, Device Farm selects a compatible version of Appium for the device. The current behavior is to run 1.7.2 on Android devices and iOS 9 and earlier and 1.7.2 for iOS 10 and later. This behavior is subject to change. For fuzz tests (Android only): event_count: The number of events, between 1 and 10000, that the UI fuzz test should perform. throttle: The time, in ms, between 0 and 1000, that the UI fuzz test should wait between events. seed: A seed to use for randomizing the UI fuzz test. Using the same seed value between tests ensures identical event sequences. For Instrumentation: filter: A test filter string. Examples: Running a single test case: com.android.abc.Test1 Running a single test: com.android.abc.Test1#smoke Running multiple tests: com.android.abc.Test1,com.android.abc.Test2 For XCTest and XCTestUI: filter: A test filter string. Examples: Running a single test class: LoginTests Running a multiple test classes: LoginTests,SmokeTests Running a single test: LoginTests/testValid Running multiple tests: LoginTests/testValid,LoginTests/testInvalid"
      required:
        - type_
    Filter:
      type: string
      minLength: 0
      maxLength: 8192
    ScheduleRunConfiguration:
