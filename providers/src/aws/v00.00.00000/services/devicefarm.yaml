openapi: 3.0.0
info:
  version: "2015-06-23"
  title: AWS Device Farm
  description: AWS Device Farm
  x-serviceName: devicefarm
  x-serviceAlias: devicefarm
  x-protocol: json
  x-apiVersion: "2015-06-23"
  x-endpointPrefix: devicefarm
  x-targetPrefix: DeviceFarm_20150623
  x-jsonVersion: "1.1"
servers:
  - url: https://devicefarm.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for devicefarm
paths:
  /CreateDevicePool:
    post:
      operationId: CreateDevicePool
      description: Creates a device pool.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.CreateDevicePool
            default: DeviceFarm_20150623.CreateDevicePool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                projectArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the project for the device pool.
                name:
                  $ref: "#/components/schemas/Name"
                  description: The device pool's name.
                description:
                  $ref: "#/components/schemas/Message"
                  description: The device pool's description.
                rules:
                  $ref: "#/components/schemas/Rules"
                  description: The device pool's rules.
                maxDevices:
                  $ref: "#/components/schemas/Integer"
                  description: The number of devices that Device Farm can add to your device pool. Device Farm adds devices that are available and meet the criteria that you assign for the rules parameter. Depending on how many devices meet these constraints, your device pool might contain fewer devices than the value for this parameter. By specifying the maximum number of devices, you can control the costs that you incur by running tests.
              required:
                - projectArn
                - name
                - rules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDevicePoolResult"
  /CreateInstanceProfile:
    post:
      operationId: CreateInstanceProfile
      description: Creates a profile that can be applied to one or more private fleet device instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.CreateInstanceProfile
            default: DeviceFarm_20150623.CreateInstanceProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                  description: The name of your instance profile.
                description:
                  $ref: "#/components/schemas/Message"
                  description: The description of your instance profile.
                packageCleanup:
                  $ref: "#/components/schemas/Boolean"
                  description: When set to true, Device Farm removes app packages after a test run. The default value is false for private devices.
                excludeAppPackagesFromCleanup:
                  $ref: "#/components/schemas/PackageIds"
                  description: An array of strings that specifies the list of app packages that should not be cleaned up from the device after a test run. The list of packages is considered only if you set packageCleanup to true.
                rebootAfterUse:
                  $ref: "#/components/schemas/Boolean"
                  description: When set to true, Device Farm reboots the instance after a test run. The default value is true.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInstanceProfileResult"
  /CreateNetworkProfile:
    post:
      operationId: CreateNetworkProfile
      description: Creates a network profile.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.CreateNetworkProfile
            default: DeviceFarm_20150623.CreateNetworkProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                projectArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the project for which you want to create a network profile.
                name:
                  $ref: "#/components/schemas/Name"
                  description: The name for the new network profile.
                description:
                  $ref: "#/components/schemas/Message"
                  description: The description of the network profile.
                type:
                  $ref: "#/components/schemas/NetworkProfileType"
                  description: The type of network profile to create. Valid values are listed here.
                uplinkBandwidthBits:
                  $ref: "#/components/schemas/Long"
                  description: The data throughput rate in bits per second, as an integer from 0 to 104857600.
                downlinkBandwidthBits:
                  $ref: "#/components/schemas/Long"
                  description: The data throughput rate in bits per second, as an integer from 0 to 104857600.
                uplinkDelayMs:
                  $ref: "#/components/schemas/Long"
                  description: Delay time for all packets to destination in milliseconds as an integer from 0 to 2000.
                downlinkDelayMs:
                  $ref: "#/components/schemas/Long"
                  description: Delay time for all packets to destination in milliseconds as an integer from 0 to 2000.
                uplinkJitterMs:
                  $ref: "#/components/schemas/Long"
                  description: Time variation in the delay of received packets in milliseconds as an integer from 0 to 2000.
                downlinkJitterMs:
                  $ref: "#/components/schemas/Long"
                  description: Time variation in the delay of received packets in milliseconds as an integer from 0 to 2000.
                uplinkLossPercent:
                  $ref: "#/components/schemas/PercentInteger"
                  description: Proportion of transmitted packets that fail to arrive from 0 to 100 percent.
                downlinkLossPercent:
                  $ref: "#/components/schemas/PercentInteger"
                  description: Proportion of received packets that fail to arrive from 0 to 100 percent.
              required:
                - projectArn
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNetworkProfileResult"
  /CreateProject:
    post:
      operationId: CreateProject
      description: Creates a project.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.CreateProject
            default: DeviceFarm_20150623.CreateProject
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                  description: The project's name.
                defaultJobTimeoutMinutes:
                  $ref: "#/components/schemas/JobTimeoutMinutes"
                  description: Sets the execution timeout value (in minutes) for a project. All test runs in this project use the specified execution timeout value unless overridden when scheduling a run.
                vpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: The VPC security groups and subnets that are attached to a project.
                environmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariables"
                  description: A set of environment variables which are used by default for all runs in the project. These environment variables are applied to the test run during the execution of a test spec file. For more information about using test spec files, please see Custom test environments in AWS Device Farm.
                executionRoleArn:
                  $ref: "#/components/schemas/AmazonRoleResourceName"
                  description: An IAM role to be assumed by the test host for all runs in the project.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResult"
  /CreateRemoteAccessSession:
    post:
      operationId: CreateRemoteAccessSession
      description: Specifies and starts a remote access session.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.CreateRemoteAccessSession
            default: DeviceFarm_20150623.CreateRemoteAccessSession
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                projectArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the project for which you want to create a remote access session.
                deviceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the device for which you want to create a remote access session.
                appArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the app to create the remote access session.
                instanceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the device instance for which you want to create a remote access session.
                name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the remote access session to create.
                configuration:
                  $ref: "#/components/schemas/CreateRemoteAccessSessionConfiguration"
                  description: The configuration information for the remote access session request.
                interactionMode:
                  $ref: "#/components/schemas/InteractionMode"
                  description: The interaction mode of the remote access session. Changing the interactive mode of remote access sessions is no longer available.
                skipAppResign:
                  $ref: "#/components/schemas/Boolean"
                  description: When set to true, for private devices, Device Farm does not sign your app again. For public devices, Device Farm always signs your apps again. For more information on how Device Farm modifies your uploads during tests, see Do you modify my app?
              required:
                - projectArn
                - deviceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRemoteAccessSessionResult"
  /CreateTestGridProject:
    post:
      operationId: CreateTestGridProject
      description: Creates a Selenium testing project. Projects are used to track TestGridSession instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.CreateTestGridProject
            default: DeviceFarm_20150623.CreateTestGridProject
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                  description: Human-readable name of the Selenium testing project.
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                  description: Human-readable description of the project.
                vpcConfig:
                  $ref: "#/components/schemas/TestGridVpcConfig"
                  description: The VPC security groups and subnets that are attached to a project.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTestGridProjectResult"
  /CreateTestGridUrl:
    post:
      operationId: CreateTestGridUrl
      description: Creates a signed, short-term URL that can be passed to a Selenium RemoteWebDriver constructor.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.CreateTestGridUrl
            default: DeviceFarm_20150623.CreateTestGridUrl
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                projectArn:
                  $ref: "#/components/schemas/DeviceFarmArn"
                  description: ARN (from CreateTestGridProject or ListTestGridProjects) to associate with the short-term URL.
                expiresInSeconds:
                  $ref: "#/components/schemas/TestGridUrlExpiresInSecondsInput"
                  description: Lifetime, in seconds, of the URL.
              required:
                - projectArn
                - expiresInSeconds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTestGridUrlResult"
  /CreateUpload:
    post:
      operationId: CreateUpload
      description: Uploads an app or test scripts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.CreateUpload
            default: DeviceFarm_20150623.CreateUpload
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                projectArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the project for the upload.
                name:
                  $ref: "#/components/schemas/Name"
                  description: The upload's file name. The name should not contain any forward slashes (/). If you are uploading an iOS app, the file name must end with the .ipa extension. If you are uploading an Android app, the file name must end with the .apk extension. For all others, the file name must end with the .zip file extension.
                type:
                  $ref: "#/components/schemas/UploadType"
                  description: "The upload's upload type. Must be one of the following values: ANDROID_APP IOS_APP WEB_APP EXTERNAL_DATA APPIUM_JAVA_JUNIT_TEST_PACKAGE APPIUM_JAVA_TESTNG_TEST_PACKAGE APPIUM_PYTHON_TEST_PACKAGE APPIUM_NODE_TEST_PACKAGE APPIUM_RUBY_TEST_PACKAGE APPIUM_WEB_JAVA_JUNIT_TEST_PACKAGE APPIUM_WEB_JAVA_TESTNG_TEST_PACKAGE APPIUM_WEB_PYTHON_TEST_PACKAGE APPIUM_WEB_NODE_TEST_PACKAGE APPIUM_WEB_RUBY_TEST_PACKAGE INSTRUMENTATION_TEST_PACKAGE XCTEST_TEST_PACKAGE XCTEST_UI_TEST_PACKAGE APPIUM_JAVA_JUNIT_TEST_SPEC APPIUM_JAVA_TESTNG_TEST_SPEC APPIUM_PYTHON_TEST_SPEC APPIUM_NODE_TEST_SPEC APPIUM_RUBY_TEST_SPEC APPIUM_WEB_JAVA_JUNIT_TEST_SPEC APPIUM_WEB_JAVA_TESTNG_TEST_SPEC APPIUM_WEB_PYTHON_TEST_SPEC APPIUM_WEB_NODE_TEST_SPEC APPIUM_WEB_RUBY_TEST_SPEC INSTRUMENTATION_TEST_SPEC XCTEST_UI_TEST_SPEC If you call CreateUpload with WEB_APP specified, AWS Device Farm throws an ArgumentException error."
                contentType:
                  $ref: "#/components/schemas/ContentType"
                  description: The upload's content type (for example, application/octet-stream).
              required:
                - projectArn
                - name
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUploadResult"
  /CreateVPCEConfiguration:
    post:
      operationId: CreateVPCEConfiguration
      description: Creates a configuration record in Device Farm for your Amazon Virtual Private Cloud (VPC) endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.CreateVPCEConfiguration
            default: DeviceFarm_20150623.CreateVPCEConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                vpceConfigurationName:
                  $ref: "#/components/schemas/VPCEConfigurationName"
                  description: The friendly name you give to your VPC endpoint configuration, to manage your configurations more easily.
                vpceServiceName:
                  $ref: "#/components/schemas/VPCEServiceName"
                  description: The name of the VPC endpoint service running in your AWS account that you want Device Farm to test.
                serviceDnsName:
                  $ref: "#/components/schemas/ServiceDnsName"
                  description: The DNS name of the service running in your VPC that you want Device Farm to test.
                vpceConfigurationDescription:
                  $ref: "#/components/schemas/VPCEConfigurationDescription"
                  description: An optional description that provides details about your VPC endpoint configuration.
              required:
                - vpceConfigurationName
                - vpceServiceName
                - serviceDnsName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVPCEConfigurationResult"
  /DeleteDevicePool:
    post:
      operationId: DeleteDevicePool
      description: Deletes a device pool given the pool ARN. Does not allow deletion of curated pools owned by the system.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.DeleteDevicePool
            default: DeviceFarm_20150623.DeleteDevicePool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Represents the Amazon Resource Name (ARN) of the Device Farm device pool to delete.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDevicePoolResult"
  /DeleteInstanceProfile:
    post:
      operationId: DeleteInstanceProfile
      description: Deletes a profile that can be applied to one or more private device instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.DeleteInstanceProfile
            default: DeviceFarm_20150623.DeleteInstanceProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the instance profile you are requesting to delete.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInstanceProfileResult"
  /DeleteNetworkProfile:
    post:
      operationId: DeleteNetworkProfile
      description: Deletes a network profile.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.DeleteNetworkProfile
            default: DeviceFarm_20150623.DeleteNetworkProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the network profile to delete.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNetworkProfileResult"
  /DeleteProject:
    post:
      operationId: DeleteProject
      description: Deletes an AWS Device Farm project, given the project ARN. You cannot delete a project if it has an active run or session. You cannot undo this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.DeleteProject
            default: DeviceFarm_20150623.DeleteProject
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Represents the Amazon Resource Name (ARN) of the Device Farm project to delete.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProjectResult"
  /DeleteRemoteAccessSession:
    post:
      operationId: DeleteRemoteAccessSession
      description: Deletes a completed remote access session and its results. You cannot delete a remote access session if it is still active. You cannot undo this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.DeleteRemoteAccessSession
            default: DeviceFarm_20150623.DeleteRemoteAccessSession
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the session for which you want to delete remote access.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRemoteAccessSessionResult"
  /DeleteRun:
    post:
      operationId: DeleteRun
      description: Deletes the run, given the run ARN. You cannot delete a run if it is still active. You cannot undo this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.DeleteRun
            default: DeviceFarm_20150623.DeleteRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) for the run to delete.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRunResult"
  /DeleteTestGridProject:
    post:
      operationId: DeleteTestGridProject
      description: Deletes a Selenium testing project and all content generated under it. You cannot delete a project if it has active sessions. You cannot undo this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.DeleteTestGridProject
            default: DeviceFarm_20150623.DeleteTestGridProject
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                projectArn:
                  $ref: "#/components/schemas/DeviceFarmArn"
                  description: The ARN of the project to delete, from CreateTestGridProject or ListTestGridProjects.
              required:
                - projectArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTestGridProjectResult"
  /DeleteUpload:
    post:
      operationId: DeleteUpload
      description: Deletes an upload given the upload ARN.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.DeleteUpload
            default: DeviceFarm_20150623.DeleteUpload
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Represents the Amazon Resource Name (ARN) of the Device Farm upload to delete.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUploadResult"
  /DeleteVPCEConfiguration:
    post:
      operationId: DeleteVPCEConfiguration
      description: Deletes a configuration for your Amazon Virtual Private Cloud (VPC) endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.DeleteVPCEConfiguration
            default: DeviceFarm_20150623.DeleteVPCEConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the VPC endpoint configuration you want to delete.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVPCEConfigurationResult"
  /GetAccountSettings:
    post:
      operationId: GetAccountSettings
      description: Returns the number of unmetered iOS or unmetered Android devices that have been purchased by the account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.GetAccountSettings
            default: DeviceFarm_20150623.GetAccountSettings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountSettingsResult"
  /GetDevice:
    post:
      operationId: GetDevice
      description: Gets information about a unique device type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.GetDevice
            default: DeviceFarm_20150623.GetDevice
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The device type's ARN.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDeviceResult"
  /GetDeviceInstance:
    post:
      operationId: GetDeviceInstance
      description: Returns information about a device instance that belongs to a private device fleet.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DeviceFarm_20150623.GetDeviceInstance
            default: DeviceFarm_20150623.GetDeviceInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
