components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AmazonResourceName:
      type: string
      minLength: 32
      maxLength: 1011
      pattern: ^arn:aws:devicefarm:.+
    Name:
      type: string
      minLength: 0
      maxLength: 256
    Message:
      type: string
      minLength: 0
      maxLength: 16384
    Rules:
      type: array
      items:
        $ref: "#/components/schemas/Rule"
    Rule:
      description: Represents a condition for a device pool.
      type: object
      properties:
        attribute:
          $ref: "#/components/schemas/DeviceAttribute"
          description: "The rule's stringified attribute. For example, specify the value as \"\\\"abc\\\"\". The supported operators for each attribute are provided in the following list. APPIUM_VERSION The Appium version for the test. Supported operators: CONTAINS ARN The Amazon Resource Name (ARN) of the device (for example, arn:aws:devicefarm:us-west-2::device:12345Example. Supported operators: EQUALS, IN, NOT_IN AVAILABILITY The current availability of the device. Valid values are AVAILABLE, HIGHLY_AVAILABLE, BUSY, or TEMPORARY_NOT_AVAILABLE. Supported operators: EQUALS FLEET_TYPE The fleet type. Valid values are PUBLIC or PRIVATE. Supported operators: EQUALS FORM_FACTOR The device form factor. Valid values are PHONE or TABLET. Supported operators: EQUALS, IN, NOT_IN INSTANCE_ARN The Amazon Resource Name (ARN) of the device instance. Supported operators: IN, NOT_IN INSTANCE_LABELS The label of the device instance. Supported operators: CONTAINS MANUFACTURER The device manufacturer (for example, Apple). Supported operators: EQUALS, IN, NOT_IN MODEL The device model, such as Apple iPad Air 2 or Google Pixel. Supported operators: CONTAINS, EQUALS, IN, NOT_IN OS_VERSION The operating system version (for example, 10.3.2). Supported operators: EQUALS, GREATER_THAN, GREATER_THAN_OR_EQUALS, IN, LESS_THAN, LESS_THAN_OR_EQUALS, NOT_IN PLATFORM The device platform. Valid values are ANDROID or IOS. Supported operators: EQUALS, IN, NOT_IN REMOTE_ACCESS_ENABLED Whether the device is enabled for remote access. Valid values are TRUE or FALSE. Supported operators: EQUALS REMOTE_DEBUG_ENABLED Whether the device is enabled for remote debugging. Valid values are TRUE or FALSE. Supported operators: EQUALS Because remote debugging is no longer supported, this filter is ignored."
        operator:
          $ref: "#/components/schemas/RuleOperator"
          description: Specifies how Device Farm compares the rule's attribute to the value. For the operators that are supported by each attribute, see the attribute descriptions.
        value:
          $ref: "#/components/schemas/String"
          description: The rule's value.
    DeviceAttribute:
      type: string
      enum:
        - ARN
        - PLATFORM
        - FORM_FACTOR
        - MANUFACTURER
        - REMOTE_ACCESS_ENABLED
        - REMOTE_DEBUG_ENABLED
        - APPIUM_VERSION
        - INSTANCE_ARN
        - INSTANCE_LABELS
        - FLEET_TYPE
        - OS_VERSION
        - MODEL
        - AVAILABILITY
    RuleOperator:
      type: string
      enum:
        - EQUALS
        - LESS_THAN
        - LESS_THAN_OR_EQUALS
        - GREATER_THAN
        - GREATER_THAN_OR_EQUALS
        - IN
        - NOT_IN
        - CONTAINS
    String:
      type: string
    Integer:
      type: integer
    CreateDevicePoolResult:
      description: Represents the result of a create device pool request.
      type: object
      properties:
        devicePool:
          $ref: "#/components/schemas/DevicePool"
          description: The newly created device pool.
    DevicePool:
      description: Represents a collection of device types.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The device pool's ARN.
        name:
          $ref: "#/components/schemas/Name"
          description: The device pool's name.
        description:
          $ref: "#/components/schemas/Message"
          description: The device pool's description.
        type_:
          $ref: "#/components/schemas/DevicePoolType"
          description: "The device pool's type. Allowed values include: CURATED: A device pool that is created and managed by AWS Device Farm. PRIVATE: A device pool that is created and managed by the device pool developer."
        rules:
          $ref: "#/components/schemas/Rules"
          description: Information about the device pool's rules.
        maxDevices:
          $ref: "#/components/schemas/Integer"
          description: The number of devices that Device Farm can add to your device pool. Device Farm adds devices that are available and meet the criteria that you assign for the rules parameter. Depending on how many devices meet these constraints, your device pool might contain fewer devices than the value for this parameter. By specifying the maximum number of devices, you can control the costs that you incur by running tests.
    DevicePoolType:
      type: string
      enum:
        - CURATED
        - PRIVATE
    Boolean:
      type: boolean
    PackageIds:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CreateInstanceProfileResult:
      type: object
      properties:
        instanceProfile:
          $ref: "#/components/schemas/InstanceProfile"
          description: An object that contains information about your instance profile.
    InstanceProfile:
      description: Represents the instance profile.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the instance profile.
        packageCleanup:
          $ref: "#/components/schemas/Boolean"
          description: When set to true, Device Farm removes app packages after a test run. The default value is false for private devices.
        excludeAppPackagesFromCleanup:
          $ref: "#/components/schemas/PackageIds"
          description: An array of strings containing the list of app packages that should not be cleaned up from the device after a test run completes. The list of packages is considered only if you set packageCleanup to true.
        rebootAfterUse:
          $ref: "#/components/schemas/Boolean"
          description: When set to true, Device Farm reboots the instance after a test run. The default value is true.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the instance profile.
        description:
          $ref: "#/components/schemas/Message"
          description: The description of the instance profile.
    NetworkProfileType:
      type: string
      enum:
        - CURATED
        - PRIVATE
    Long:
      type: integer
      format: int64
    PercentInteger:
      type: integer
      minimum: 0
      maximum: 100
    CreateNetworkProfileResult:
      type: object
      properties:
        networkProfile:
          $ref: "#/components/schemas/NetworkProfile"
          description: The network profile that is returned by the create network profile request.
    NetworkProfile:
      description: An array of settings that describes characteristics of a network profile.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the network profile.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the network profile.
        description:
          $ref: "#/components/schemas/Message"
          description: The description of the network profile.
        type_:
          $ref: "#/components/schemas/NetworkProfileType"
          description: The type of network profile. Valid values are listed here.
        uplinkBandwidthBits:
          $ref: "#/components/schemas/Long"
          description: The data throughput rate in bits per second, as an integer from 0 to 104857600.
        downlinkBandwidthBits:
          $ref: "#/components/schemas/Long"
          description: The data throughput rate in bits per second, as an integer from 0 to 104857600.
        uplinkDelayMs:
          $ref: "#/components/schemas/Long"
          description: Delay time for all packets to destination in milliseconds as an integer from 0 to 2000.
        downlinkDelayMs:
          $ref: "#/components/schemas/Long"
          description: Delay time for all packets to destination in milliseconds as an integer from 0 to 2000.
        uplinkJitterMs:
          $ref: "#/components/schemas/Long"
          description: Time variation in the delay of received packets in milliseconds as an integer from 0 to 2000.
        downlinkJitterMs:
          $ref: "#/components/schemas/Long"
          description: Time variation in the delay of received packets in milliseconds as an integer from 0 to 2000.
        uplinkLossPercent:
          $ref: "#/components/schemas/PercentInteger"
          description: Proportion of transmitted packets that fail to arrive from 0 to 100 percent.
        downlinkLossPercent:
          $ref: "#/components/schemas/PercentInteger"
          description: Proportion of received packets that fail to arrive from 0 to 100 percent.
    JobTimeoutMinutes:
      type: integer
