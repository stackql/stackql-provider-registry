                description:
                  $ref: "#/components/schemas/Message"
                  description: The updated description for your instance profile.
                packageCleanup:
                  $ref: "#/components/schemas/Boolean"
                  description: The updated choice for whether you want to specify package cleanup. The default value is false for private devices.
                excludeAppPackagesFromCleanup:
                  $ref: "#/components/schemas/PackageIds"
                  description: An array of strings that specifies the list of app packages that should not be cleaned up from the device after a test run is over. The list of packages is only considered if you set packageCleanup to true.
                rebootAfterUse:
                  $ref: "#/components/schemas/Boolean"
                  description: The updated choice for whether you want to reboot the device after use. The default value is true.
