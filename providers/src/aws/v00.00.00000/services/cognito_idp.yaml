          $ref: "#/components/schemas/ProvidersListType"
          description: An array of the IdPs in your user pool. For each, the response includes identifiers, the IdP name and type, and trust-relationship details like the issuer URL.
        NextToken:
          $ref: "#/components/schemas/PaginationKeyType"
