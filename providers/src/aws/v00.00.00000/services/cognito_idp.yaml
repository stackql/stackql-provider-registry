          schema:
            type: string
            enum:
              - AWSCognitoIdentityProviderService.DeleteUser
            default: AWSCognitoIdentityProviderService.DeleteUser
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccessToken:
                  $ref: "#/components/schemas/TokenModelType"
                  description: A valid access token that Amazon Cognito issued to the currently signed-in user. Must include a scope claim for aws.cognito.signin.user.admin.
              required:
