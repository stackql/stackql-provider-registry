        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ManagedLoginBrandingId:
                  $ref: "#/components/schemas/ManagedLoginBrandingIdType"
                  description: The ID of the managed login branding style that you want to delete.
                UserPoolId:
                  $ref: "#/components/schemas/UserPoolIdType"
                  description: The ID of the user pool that contains the managed login branding style that you want to delete.
              required:
