      type: object
      properties:
        UserPoolId:
          $ref: "#/components/schemas/UserPoolIdType"
          description: The ID of the user pool with hosted UI customizations.
        ClientId:
          $ref: "#/components/schemas/ClientIdType"
          description: The app client ID for your UI customization. When this value isn't present, the customization applies to all user pool app clients that don't have client-level settings..
        ImageUrl:
          $ref: "#/components/schemas/ImageUrlType"
          description: A URL path to the hosted logo image of your UI customization.
        CSS:
          $ref: "#/components/schemas/CSSType"
          description: The CSS values in the UI customization.
        CSSVersion:
          $ref: "#/components/schemas/CSSVersionType"
          description: The CSS version number.
        LastModifiedDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was modified. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        CreationDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was created. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
    ImageUrlType:
      type: string
    CSSType:
      type: string
      minLength: 0
      maxLength: 131072
    CSSVersionType:
      type: string
    GetUserResponse:
      description: Represents the response from the server from the request to get information about the user.
      type: object
      properties:
        Username:
          $ref: "#/components/schemas/UsernameType"
          description: The name of the user that you requested.
        UserAttributes:
          $ref: "#/components/schemas/AttributeListType"
          description: "An array of name-value pairs representing user attributes. Custom attributes are prepended with the custom: prefix."
        MFAOptions:
          $ref: "#/components/schemas/MFAOptionListType"
          description: This response parameter is no longer supported. It provides information only about SMS MFA configurations. It doesn't provide information about time-based one-time password (TOTP) software token MFA configurations. To look up information about either type of MFA configuration, use UserMFASettingList instead.
        PreferredMfaSetting:
          $ref: "#/components/schemas/StringType"
          description: The user's preferred MFA. Users can prefer SMS message, email message, or TOTP MFA.
        UserMFASettingList:
          $ref: "#/components/schemas/UserMFASettingListType"
          description: The MFA options that are activated for the user. The possible values in this list are SMS_MFA, EMAIL_OTP, and SOFTWARE_TOKEN_MFA.
      required:
        - Username
        - UserAttributes
    GetUserAttributeVerificationCodeResponse:
      description: The verification code response returned by the server response to get the user attribute verification code.
      type: object
      properties:
        CodeDeliveryDetails:
          $ref: "#/components/schemas/CodeDeliveryDetailsType"
          description: Information about the delivery destination of the user attribute verification code.
    GetUserAuthFactorsResponse:
      type: object
      properties:
        Username:
          $ref: "#/components/schemas/UsernameType"
          description: The name of the user who is eligible for the authentication factors in the response.
        PreferredMfaSetting:
          $ref: "#/components/schemas/StringType"
          description: The challenge method that Amazon Cognito returns to the user in response to sign-in requests. Users can prefer SMS message, email message, or TOTP MFA.
        UserMFASettingList:
          $ref: "#/components/schemas/UserMFASettingListType"
          description: The MFA options that are activated for the user. The possible values in this list are SMS_MFA, EMAIL_OTP, and SOFTWARE_TOKEN_MFA.
        ConfiguredUserAuthFactors:
          $ref: "#/components/schemas/ConfiguredUserAuthFactorsListType"
          description: The authentication types that are available to the user with USER_AUTH sign-in, for example ["PASSWORD", "WEB_AUTHN"].
      required:
        - Username
    ConfiguredUserAuthFactorsListType:
      type: array
      items:
        $ref: "#/components/schemas/AuthFactorType"
    GetUserPoolMfaConfigResponse:
      type: object
      properties:
        SmsMfaConfiguration:
          $ref: "#/components/schemas/SmsMfaConfigType"
          description: Shows user pool configuration for SMS message MFA. Includes the message template and the SMS message sending configuration for Amazon SNS.
        SoftwareTokenMfaConfiguration:
          $ref: "#/components/schemas/SoftwareTokenMfaConfigType"
          description: Shows user pool configuration for time-based one-time password (TOTP) MFA. Includes TOTP enabled or disabled state.
        EmailMfaConfiguration:
          $ref: "#/components/schemas/EmailMfaConfigType"
          description: Shows configuration for user pool email message MFA and sign-in with one-time passwords (OTPs). Includes the subject and body of the email message template for sign-in and MFA messages. To activate this setting, your user pool must be in the Essentials tier or higher.
        MfaConfiguration:
          $ref: "#/components/schemas/UserPoolMfaType"
          description: Displays the state of multi-factor authentication (MFA) as on, off, or optional. When ON, all users must set up MFA before they can sign in. When OPTIONAL, your application must make a client-side determination of whether a user wants to register an MFA device. For user pools with adaptive authentication with threat protection, choose OPTIONAL. When MfaConfiguration is OPTIONAL, managed login doesn't automatically prompt users to set up MFA. Amazon Cognito generates MFA prompts in API responses and in managed login for users who have chosen and configured a preferred MFA factor.
        WebAuthnConfiguration:
          $ref: "#/components/schemas/WebAuthnConfigurationType"
          description: Shows user pool configuration for sign-in with passkey authenticators such as biometric devices and security keys. Includes relying-party configuration, user-verification requirements, and whether passkeys can satisfy MFA requirements.
    SmsMfaConfigType:
      description: The configuration of multi-factor authentication (MFA) with SMS messages in a user pool.
      type: object
      properties:
        SmsAuthenticationMessage:
          $ref: "#/components/schemas/SmsVerificationMessageType"
          description: The SMS authentication message that will be sent to users with the code they must sign in with. The message must contain the {####} placeholder. Your user pool replaces the placeholder with the MFA code. If this parameter isn't provided, your user pool sends a default message.
        SmsConfiguration:
          $ref: "#/components/schemas/SmsConfigurationType"
          description: User pool configuration for delivery of SMS messages with Amazon Simple Notification Service. To send SMS messages with Amazon SNS in the Amazon Web Services Region that you want, the Amazon Cognito user pool uses an Identity and Access Management (IAM) role in your Amazon Web Services account. You can set SmsConfiguration in CreateUserPool and UpdateUserPool, or in SetUserPoolMfaConfig.
    SoftwareTokenMfaConfigType:
      description: Settings for time-based one-time password (TOTP) multi-factor authentication (MFA) in a user pool. Enables and disables availability of this feature.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BooleanType"
          description: The activation state of TOTP MFA.
    EmailMfaConfigType:
      description: Sets or shows configuration for user pool email message MFA and sign-in with one-time passwords (OTPs). Includes the subject and body of the email message template for sign-in and MFA messages. To activate this setting, your user pool must be in the Essentials tier or higher.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/EmailMfaMessageType"
          description: The template for the email messages that your user pool sends to users with codes for MFA and sign-in with email OTPs. The message must contain the {####} placeholder. In the message, Amazon Cognito replaces this placeholder with the code. If you don't provide this parameter, Amazon Cognito sends messages in the default format.
        Subject:
          $ref: "#/components/schemas/EmailMfaSubjectType"
          description: The subject of the email messages that your user pool sends to users with codes for MFA and email OTP sign-in.
    EmailMfaMessageType:
      type: string
      minLength: 6
      maxLength: 20000
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*\\{####\\}[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*"
    EmailMfaSubjectType:
      type: string
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s]+"
    WebAuthnConfigurationType:
      description: "Settings for authentication (MFA) with passkey, or webauthN, biometric and security-key devices in a user pool. Configures the following: Configuration for requiring user-verification support in passkeys. The user pool relying-party ID. This is the domain, typically your user pool domain, that user's passkey providers should trust as a receiver of passkey authentication. The providers that you want to allow as origins for passkey authentication."
      type: object
      properties:
        RelyingPartyId:
          $ref: "#/components/schemas/RelyingPartyIdType"
          description: "Sets or displays the authentication domain, typically your user pool domain, that passkey providers must use as a relying party (RP) in their configuration. Under the following conditions, the passkey relying party ID must be the fully-qualified domain name of your custom domain: The user pool is configured for passkey authentication. The user pool has a custom domain, whether or not it also has a prefix domain. Your application performs authentication with managed login or the classic hosted UI."
        UserVerification:
          $ref: "#/components/schemas/UserVerificationType"
          description: When required, users can only register and sign in users with passkeys that are capable of user verification. When preferred, your user pool doesn't require the use of authenticators with user verification but encourages it.
        FactorConfiguration:
          $ref: "#/components/schemas/WebAuthnFactorConfigurationType"
          description: Sets whether passkeys can be used as multi-factor authentication (MFA). When set to MULTI_FACTOR_WITH_USER_VERIFICATION, passkey authentication with user verification satisfies MFA requirements. When set to SINGLE_FACTOR or not set, passkeys are a single authentication factor. To activate this setting, your user pool must be in the Essentials tier or higher.
    RelyingPartyIdType:
      type: string
      minLength: 1
      maxLength: 127
    UserVerificationType:
      type: string
      enum:
        - required
        - preferred
    WebAuthnFactorConfigurationType:
      description: The configuration of passkey authentication as a single factor or a multi-factor authentication (MFA) method. When set to MULTI_FACTOR_WITH_USER_VERIFICATION, your user pool requires passkey authenticators to perform user verification, for example a biometric or PIN. User verification combined with the passkey constitutes multi-factor authentication. When set to SINGLE_FACTOR, passkeys are a single authentication factor.
      type: string
      enum:
        - SINGLE_FACTOR
        - MULTI_FACTOR_WITH_USER_VERIFICATION
    GlobalSignOutResponse:
      description: The response to the request to sign out all devices.
      type: object
    InitiateAuthResponse:
      description: Initiates the authentication response.
      type: object
      properties:
        ChallengeName:
          $ref: "#/components/schemas/ChallengeNameType"
          description: "The name of an additional authentication challenge that you must respond to. Possible challenges include the following: All of the following challenges require USERNAME and, when the app client has a client secret, SECRET_HASH in the parameters. Include a DEVICE_KEY for device authentication. WEB_AUTHN: Respond to the challenge with the results of a successful authentication with a WebAuthn authenticator, or passkey, as CREDENTIAL. Examples of WebAuthn authenticators include biometric devices and security keys. PASSWORD: Respond with the user's password as PASSWORD. PASSWORD_SRP: Respond with the initial SRP secret as SRP_A. SELECT_CHALLENGE: Respond with a challenge selection as ANSWER. It must be one of the challenge types in the AvailableChallenges response parameter. Add the parameters of the selected challenge, for example USERNAME and SMS_OTP. SMS_MFA: Respond with the code that your user pool delivered in an SMS message, as SMS_MFA_CODE EMAIL_MFA: Respond with the code that your user pool delivered in an email message, as EMAIL_MFA_CODE EMAIL_OTP: Respond with the code that your user pool delivered in an email message, as EMAIL_OTP_CODE . SMS_OTP: Respond with the code that your user pool delivered in an SMS message, as SMS_OTP_CODE. PASSWORD_VERIFIER: Respond with the second stage of SRP secrets as PASSWORD_CLAIM_SIGNATURE, PASSWORD_CLAIM_SECRET_BLOCK, and TIMESTAMP. CUSTOM_CHALLENGE: This is returned if your custom authentication flow determines that the user should pass another challenge before tokens are issued. The parameters of the challenge are determined by your Lambda function and issued in the ChallengeParameters of a challenge response. DEVICE_SRP_AUTH: Respond with the initial parameters of device SRP authentication. For more information, see Signing in with a device. DEVICE_PASSWORD_VERIFIER: Respond with PASSWORD_CLAIM_SIGNATURE, PASSWORD_CLAIM_SECRET_BLOCK, and TIMESTAMP after client-side SRP calculations. For more information, see Signing in with a device. NEW_PASSWORD_REQUIRED: For users who are required to change their passwords after successful first login. Respond to this challenge with NEW_PASSWORD and any required attributes that Amazon Cognito returned in the requiredAttributes parameter. You can also set values for attributes that aren't required by your user pool and that your app client can write. Amazon Cognito only returns this challenge for users who have temporary passwords. When you create passwordless users, you must provide values for all required attributes. In a NEW_PASSWORD_REQUIRED challenge response, you can't modify a required attribute that already has a value. In AdminRespondToAuthChallenge or RespondToAuthChallenge, set a value for any keys that Amazon Cognito returned in the requiredAttributes parameter, then use the AdminUpdateUserAttributes or UpdateUserAttributes API operation to modify the value of any additional attributes. MFA_SETUP: For users who are required to setup an MFA factor before they can sign in. The MFA types activated for the user pool will be listed in the challenge parameters MFAS_CAN_SETUP value. To set up time-based one-time password (TOTP) MFA, use the session returned in this challenge from InitiateAuth or AdminInitiateAuth as an input to AssociateSoftwareToken. Then, use the session returned by VerifySoftwareToken as an input to RespondToAuthChallenge or AdminRespondToAuthChallenge with challenge name MFA_SETUP to complete sign-in. To set up SMS or email MFA, collect a phone_number or email attribute for the user. Then restart the authentication flow with an InitiateAuth or AdminInitiateAuth request."
        Session:
          $ref: "#/components/schemas/SessionType"
          description: The session identifier that links a challenge response to the initial authentication request. If the user must pass another challenge, Amazon Cognito returns a session ID and challenge parameters.
        ChallengeParameters:
          type: object
          properties: {}
          description: The required parameters of the ChallengeName challenge. All challenges require USERNAME. They also require SECRET_HASH if your app client has a client secret.
        AuthenticationResult:
          $ref: "#/components/schemas/AuthenticationResultType"
          description: The result of a successful and complete authentication request. This result is only returned if the user doesn't need to pass another challenge. If they must pass another challenge before they get tokens, Amazon Cognito returns a challenge in ChallengeName, ChallengeParameters, and Session response parameters.
        AvailableChallenges:
          $ref: "#/components/schemas/AvailableChallengeListType"
          description: This response parameter lists the available authentication challenges that users can select from in choice-based authentication. For example, they might be able to choose between passkey authentication, a one-time password from an SMS message, and a traditional password.
    ListDevicesResponse:
      description: Represents the response to list devices.
      type: object
      properties:
        Devices:
          $ref: "#/components/schemas/DeviceListType"
          description: An array of devices and their details. Each entry that's returned includes device information, last-accessed and created dates, and the device key.
        PaginationToken:
          $ref: "#/components/schemas/SearchPaginationTokenType"
          description: The identifier that Amazon Cognito returned with the previous request to this operation. When you include a pagination token in your request, Amazon Cognito returns the next set of items in the list. By use of this token, you can paginate through the full list of items.
    ListGroupsResponse:
      type: object
      properties:
