          $ref: "#/components/schemas/IdentityProviderType"
          description: The configuration of the IdP in your user pool. Includes additional identifiers, the IdP name and type, and trust-relationship details like the issuer URL.
      required:
        - IdentityProvider
    GetLogDeliveryConfigurationResponse:
      type: object
      properties:
        LogDeliveryConfiguration:
          $ref: "#/components/schemas/LogDeliveryConfigurationType"
          description: The logging configuration of the requested user pool. Includes types of logs configured and their destinations.
    LogDeliveryConfigurationType:
      description: The logging parameters of a user pool, as returned in the response to a GetLogDeliveryConfiguration request.
      type: object
      properties:
        UserPoolId:
          $ref: "#/components/schemas/UserPoolIdType"
          description: The ID of the user pool where you configured logging.
        LogConfigurations:
          $ref: "#/components/schemas/LogConfigurationListType"
          description: A logging destination of a user pool. User pools can have multiple logging destinations for message-delivery and user-activity logs.
      required:
        - UserPoolId
        - LogConfigurations
    LogConfigurationListType:
      type: array
      items:
        $ref: "#/components/schemas/LogConfigurationType"
    LogConfigurationType:
      description: The configuration of user event logs to an external Amazon Web Services service like Amazon Data Firehose, Amazon S3, or Amazon CloudWatch Logs.
      type: object
      properties:
        LogLevel:
          $ref: "#/components/schemas/LogLevel"
          description: The errorlevel selection of logs that a user pool sends for detailed activity logging. To send userNotification activity with information about message delivery, choose ERROR with CloudWatchLogsConfiguration. To send userAuthEvents activity with user logs from threat protection with the Plus feature plan, choose INFO with one of CloudWatchLogsConfiguration, FirehoseConfiguration, or S3Configuration.
        EventSource:
          $ref: "#/components/schemas/EventSourceName"
          description: The source of events that your user pool sends for logging. To send error-level logs about user notification activity, set to userNotification. To send info-level logs about threat-protection user activity in user pools with the Plus feature plan, set to userAuthEvents.
        CloudWatchLogsConfiguration:
          $ref: "#/components/schemas/CloudWatchLogsConfigurationType"
          description: The CloudWatch log group destination of user pool detailed activity logs, or of user activity log export with threat protection.
        S3Configuration:
          $ref: "#/components/schemas/S3ConfigurationType"
          description: The Amazon S3 bucket destination of user activity log export with threat protection. To activate this setting, your user pool must be on the Plus tier.
        FirehoseConfiguration:
          $ref: "#/components/schemas/FirehoseConfigurationType"
          description: The Amazon Data Firehose stream destination of user activity log export with threat protection. To activate this setting, your user pool must be on the Plus tier.
      required:
        - LogLevel
        - EventSource
    LogLevel:
      type: string
      enum:
        - ERROR
        - INFO
    EventSourceName:
      type: string
      enum:
        - userNotification
        - userAuthEvents
    CloudWatchLogsConfigurationType:
      description: Configuration for the CloudWatch log group destination of user pool detailed activity logging, or of user activity log export with threat protection.
      type: object
      properties:
        LogGroupArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (arn) of a CloudWatch Logs log group where your user pool sends logs. The log group must not be encrypted with Key Management Service and must be in the same Amazon Web Services account as your user pool. To send logs to log groups with a resource policy of a size greater than 5120 characters, configure a log group with a path that starts with /aws/vendedlogs. For more information, see Enabling logging from certain Amazon Web Services services.
    S3ConfigurationType:
      description: Configuration for the Amazon S3 bucket destination of user activity log export with threat protection.
      type: object
      properties:
        BucketArn:
          $ref: "#/components/schemas/S3ArnType"
          description: The ARN of an Amazon S3 bucket that's the destination for threat protection log export.
    S3ArnType:
      type: string
      minLength: 3
      maxLength: 1024
      pattern: arn:[\w+=/,.@-]+:[\w+=/,.@-]+:::[\w+=/,.@-]+(:[\w+=/,.@-]+)?(:[\w+=/,.@-]+)?
    FirehoseConfigurationType:
      description: Configuration for the Amazon Data Firehose stream destination of user activity log export with threat protection.
      type: object
      properties:
        StreamArn:
          $ref: "#/components/schemas/ArnType"
          description: The ARN of an Amazon Data Firehose stream that's the destination for threat protection log export.
    GetSigningCertificateResponse:
      description: Response from Amazon Cognito for a signing certificate request.
      type: object
      properties:
        Certificate:
          $ref: "#/components/schemas/StringType"
          description: The x.509 certificate that signs SAML 2.0 authentication requests for your user pool.
    GetTokensFromRefreshTokenResponse:
      type: object
      properties:
        AuthenticationResult:
          $ref: "#/components/schemas/AuthenticationResultType"
    GetUICustomizationResponse:
