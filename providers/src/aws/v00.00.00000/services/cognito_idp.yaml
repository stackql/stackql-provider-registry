    IdentityProviderType:
      description: A user pool identity provider (IdP). Contains information about a third-party IdP to a user pool, the attributes that it populates to user profiles, and the trust relationship between the IdP and your user pool.
      type: object
      properties:
        UserPoolId:
          $ref: "#/components/schemas/UserPoolIdType"
