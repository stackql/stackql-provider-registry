    DescribeUserPoolDomainResponse:
      type: object
      properties:
        DomainDescription:
          $ref: "#/components/schemas/DomainDescriptionType"
          description: The details of the requested user pool domain.
    DomainDescriptionType:
      description: A container for information about the user pool domain associated with the hosted UI and OAuth endpoints.
      type: object
      properties:
        UserPoolId:
          $ref: "#/components/schemas/UserPoolIdType"
          description: The ID of the user pool that the domain is attached to.
        AWSAccountId:
          $ref: "#/components/schemas/AWSAccountIdType"
          description: The Amazon Web Services account that you created the user pool in.
        Domain:
          $ref: "#/components/schemas/DomainType"
          description: The domain string. For custom domains, this is the fully-qualified domain name, such as auth.example.com. For Amazon Cognito prefix domains, this is the prefix alone, such as auth.
        S3Bucket:
          $ref: "#/components/schemas/S3BucketType"
          description: The Amazon S3 bucket where the static files for this domain are stored.
        CloudFrontDistribution:
          $ref: "#/components/schemas/StringType"
          description: The Amazon CloudFront endpoint that hosts your custom domain.
        Version:
          $ref: "#/components/schemas/DomainVersionType"
          description: The app version.
        Status:
          $ref: "#/components/schemas/DomainStatusType"
          description: The domain status.
        CustomDomainConfig:
          $ref: "#/components/schemas/CustomDomainConfigType"
          description: The configuration for a custom domain that hosts the sign-up and sign-in webpages for your application.
        ManagedLoginVersion:
          $ref: "#/components/schemas/WrappedIntegerType"
          description: The version of managed login branding that you want to apply to your domain. A value of 1 indicates hosted UI (classic) branding and a version of 2 indicates managed login branding. Managed login requires that your user pool be configured for any feature plan other than Lite.
    AWSAccountIdType:
      type: string
      maxLength: 12
      pattern: "[0-9]+"
    S3BucketType:
      type: string
      minLength: 3
      maxLength: 1024
      pattern: ^[0-9A-Za-z\.\-_]*(?<!\.)$
    DomainVersionType:
      type: string
      minLength: 1
      maxLength: 20
    DomainStatusType:
      type: string
      enum:
        - CREATING
        - DELETING
        - UPDATING
        - ACTIVE
        - FAILED
    ForgotPasswordResponse:
