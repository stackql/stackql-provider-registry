        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RefreshToken:
                  $ref: "#/components/schemas/TokenModelType"
                  description: A valid refresh token that can authorize the request for new tokens. When refresh token rotation is active in the requested app client, this token is invalidated after the request is complete and after an optional grace period.
