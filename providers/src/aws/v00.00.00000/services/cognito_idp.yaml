      minLength: 1
      maxLength: 128
      pattern: "[\\w\\s+=,.@-]+"
    UserPoolPolicyType:
      description: A list of user pool policies. Contains the policy that sets password-complexity requirements.
      type: object
      properties:
        PasswordPolicy:
          $ref: "#/components/schemas/PasswordPolicyType"
          description: The password policy settings for a user pool, including complexity, history, and length requirements.
        SignInPolicy:
          $ref: "#/components/schemas/SignInPolicyType"
          description: The policy for allowed types of authentication in a user pool.
    PasswordPolicyType:
      description: The password policy settings for a user pool, including complexity, history, and length requirements.
      type: object
      properties:
        MinimumLength:
          $ref: "#/components/schemas/PasswordPolicyMinLengthType"
          description: The minimum length of the password in the policy that you have set. This value can't be less than 6.
        RequireUppercase:
          $ref: "#/components/schemas/BooleanType"
          description: The requirement in a password policy that users must include at least one uppercase letter in their password.
        RequireLowercase:
          $ref: "#/components/schemas/BooleanType"
          description: The requirement in a password policy that users must include at least one lowercase letter in their password.
        RequireNumbers:
          $ref: "#/components/schemas/BooleanType"
          description: The requirement in a password policy that users must include at least one number in their password.
        RequireSymbols:
          $ref: "#/components/schemas/BooleanType"
          description: The requirement in a password policy that users must include at least one symbol in their password.
        PasswordHistorySize:
          $ref: "#/components/schemas/PasswordHistorySizeType"
          description: The number of previous passwords that you want Amazon Cognito to restrict each user from reusing. Users can't set a password that matches any of n previous passwords, where n is the value of PasswordHistorySize.
        TemporaryPasswordValidityDays:
          $ref: "#/components/schemas/TemporaryPasswordValidityDaysType"
          description: The number of days a temporary password is valid in the password policy. If the user doesn't sign in during this time, an administrator must reset their password. Defaults to 7. If you submit a value of 0, Amazon Cognito treats it as a null value and sets TemporaryPasswordValidityDays to its default value. When you set TemporaryPasswordValidityDays for a user pool, you can no longer set a value for the legacy UnusedAccountValidityDays parameter in that user pool.
    PasswordPolicyMinLengthType:
      type: integer
      minimum: 6
      maximum: 99
    PasswordHistorySizeType:
      type: integer
      minimum: 0
      maximum: 24
    TemporaryPasswordValidityDaysType:
      type: integer
      minimum: 0
      maximum: 365
    SignInPolicyType:
      description: The policy for allowed types of authentication in a user pool. To activate this setting, your user pool must be in the Essentials tier or higher.
      type: object
      properties:
        AllowedFirstAuthFactors:
          $ref: "#/components/schemas/AllowedFirstAuthFactorsListType"
          description: The sign-in methods that a user pool supports as the first factor. You can permit users to start authentication with a standard username and password, or with other one-time password and hardware factors.
    AllowedFirstAuthFactorsListType:
      type: array
      items:
        $ref: "#/components/schemas/AuthFactorType"
    AuthFactorType:
      type: string
      enum:
        - PASSWORD
        - EMAIL_OTP
        - SMS_OTP
        - WEB_AUTHN
    DeletionProtectionType:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    LambdaConfigType:
      description: A collection of user pool Lambda triggers. Amazon Cognito invokes triggers at several possible stages of user pool operations. Triggers can modify the outcome of the operations that invoked them.
      type: object
      properties:
        PreSignUp:
          $ref: "#/components/schemas/ArnType"
          description: The configuration of a pre sign-up Lambda trigger in a user pool. This trigger evaluates new users and can bypass confirmation, link a federated user profile, or block sign-up requests.
        CustomMessage:
          $ref: "#/components/schemas/ArnType"
          description: A custom message Lambda trigger. This trigger is an opportunity to customize all SMS and email messages from your user pool. When a custom message trigger is active, your user pool routes all messages to a Lambda function that returns a runtime-customized message subject and body for your user pool to deliver to a user.
        PostConfirmation:
          $ref: "#/components/schemas/ArnType"
          description: The configuration of a post confirmation Lambda trigger in a user pool. This trigger can take custom actions after a user confirms their user account and their email address or phone number.
        PreAuthentication:
          $ref: "#/components/schemas/ArnType"
          description: The configuration of a pre authentication trigger in a user pool. This trigger can evaluate and modify user sign-in events.
        PostAuthentication:
          $ref: "#/components/schemas/ArnType"
          description: The configuration of a post authentication Lambda trigger in a user pool. This trigger can take custom actions after a user signs in.
        DefineAuthChallenge:
          $ref: "#/components/schemas/ArnType"
          description: The configuration of a define auth challenge Lambda trigger, one of three triggers in the sequence of the custom authentication challenge triggers.
        CreateAuthChallenge:
          $ref: "#/components/schemas/ArnType"
          description: The configuration of a create auth challenge Lambda trigger, one of three triggers in the sequence of the custom authentication challenge triggers.
        VerifyAuthChallengeResponse:
          $ref: "#/components/schemas/ArnType"
          description: The configuration of a verify auth challenge Lambda trigger, one of three triggers in the sequence of the custom authentication challenge triggers.
        PreTokenGeneration:
          $ref: "#/components/schemas/ArnType"
          description: The legacy configuration of a pre token generation Lambda trigger in a user pool. Set this parameter for legacy purposes. If you also set an ARN in PreTokenGenerationConfig, its value must be identical to PreTokenGeneration. For new instances of pre token generation triggers, set the LambdaArn of PreTokenGenerationConfig.
        UserMigration:
          $ref: "#/components/schemas/ArnType"
          description: The configuration of a migrate user Lambda trigger in a user pool. This trigger can create user profiles when users sign in or attempt to reset their password with credentials that don't exist yet.
        PreTokenGenerationConfig:
          $ref: "#/components/schemas/PreTokenGenerationVersionConfigType"
          description: The detailed configuration of a pre token generation Lambda trigger in a user pool. If you also set an ARN in PreTokenGeneration, its value must be identical to PreTokenGenerationConfig.
        CustomSMSSender:
          $ref: "#/components/schemas/CustomSMSLambdaVersionConfigType"
          description: The configuration of a custom SMS sender Lambda trigger. This trigger routes all SMS notifications from a user pool to a Lambda function that delivers the message using custom logic.
        CustomEmailSender:
          $ref: "#/components/schemas/CustomEmailLambdaVersionConfigType"
          description: The configuration of a custom email sender Lambda trigger. This trigger routes all email notifications from a user pool to a Lambda function that delivers the message using custom logic.
        KMSKeyID:
          $ref: "#/components/schemas/ArnType"
          description: The ARN of an KMS key. Amazon Cognito uses the key to encrypt codes and temporary passwords sent to custom sender Lambda triggers.
        InboundFederation:
          $ref: "#/components/schemas/InboundFederationLambdaType"
          description: The configuration of an inbound federation Lambda trigger. This trigger can transform federated user attributes during the authentication with external identity providers.
    PreTokenGenerationVersionConfigType:
      description: The properties of a pre token generation Lambda trigger.
      type: object
      properties:
        LambdaVersion:
          $ref: "#/components/schemas/PreTokenGenerationLambdaVersionType"
          description: The user pool trigger version of the request that Amazon Cognito sends to your Lambda function. Higher-numbered versions add fields that support new features.
        LambdaArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (ARN) of the function that you want to assign to your Lambda trigger. This parameter and the PreTokenGeneration property of LambdaConfig have the same value. For new instances of pre token generation triggers, set LambdaArn.
      required:
        - LambdaVersion
        - LambdaArn
    PreTokenGenerationLambdaVersionType:
      type: string
      enum:
        - V1_0
        - V2_0
        - V3_0
    CustomSMSLambdaVersionConfigType:
      description: The properties of a custom SMS sender Lambda trigger.
      type: object
      properties:
        LambdaVersion:
          $ref: "#/components/schemas/CustomSMSSenderLambdaVersionType"
          description: The user pool trigger version of the request that Amazon Cognito sends to your Lambda function. Higher-numbered versions add fields that support new features. You must use a LambdaVersion of V1_0 with a custom sender function.
        LambdaArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (ARN) of the function that you want to assign to your Lambda trigger.
      required:
        - LambdaVersion
        - LambdaArn
    CustomSMSSenderLambdaVersionType:
      type: string
      enum:
        - V1_0
    CustomEmailLambdaVersionConfigType:
      description: The properties of a custom email sender Lambda trigger.
      type: object
      properties:
        LambdaVersion:
          $ref: "#/components/schemas/CustomEmailSenderLambdaVersionType"
          description: The user pool trigger version of the request that Amazon Cognito sends to your Lambda function. Higher-numbered versions add fields that support new features. You must use a LambdaVersion of V1_0 with a custom sender function.
        LambdaArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (ARN) of the function that you want to assign to your Lambda trigger.
      required:
        - LambdaVersion
        - LambdaArn
    CustomEmailSenderLambdaVersionType:
      type: string
      enum:
        - V1_0
    InboundFederationLambdaType:
      description: The properties of an inbound federation Lambda trigger.
      type: object
      properties:
        LambdaVersion:
          $ref: "#/components/schemas/InboundFederationLambdaVersionType"
          description: The user pool trigger version of the request that Amazon Cognito sends to your Lambda function. Higher-numbered versions add fields that support new features. You must use a LambdaVersion of V1_0 with an inbound federation function.
        LambdaArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (ARN) of the function that you want to assign to your Lambda trigger.
      required:
        - LambdaVersion
        - LambdaArn
    InboundFederationLambdaVersionType:
      type: string
      enum:
        - V1_0
    VerifiedAttributesListType:
      type: array
      items:
        $ref: "#/components/schemas/VerifiedAttributeType"
    VerifiedAttributeType:
      type: string
      enum:
        - phone_number
        - email
    AliasAttributesListType:
      type: array
      items:
        $ref: "#/components/schemas/AliasAttributeType"
    AliasAttributeType:
      type: string
      enum:
        - phone_number
        - email
        - preferred_username
    UsernameAttributesListType:
      type: array
      items:
        $ref: "#/components/schemas/UsernameAttributeType"
    UsernameAttributeType:
      type: string
      enum:
        - phone_number
        - email
    SmsVerificationMessageType:
      type: string
      minLength: 6
      maxLength: 140
      pattern: .*\{####\}.*
    EmailVerificationMessageType:
      type: string
      minLength: 6
      maxLength: 20000
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*\\{####\\}[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*"
    EmailVerificationSubjectType:
      type: string
      minLength: 1
      maxLength: 140
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s]+"
    VerificationMessageTemplateType:
      description: The template for the verification message that your user pool delivers to users who set an email address or phone number attribute.
      type: object
      properties:
        SmsMessage:
          $ref: "#/components/schemas/SmsVerificationMessageType"
          description: The template for SMS messages that Amazon Cognito sends to your users.
        EmailMessage:
          $ref: "#/components/schemas/EmailVerificationMessageType"
          description: The template for email messages that Amazon Cognito sends to your users. You can set an EmailMessage template only if the value of EmailSendingAccount is DEVELOPER. When your EmailSendingAccount is DEVELOPER, your user pool sends email messages with your own Amazon SES configuration.
        EmailSubject:
          $ref: "#/components/schemas/EmailVerificationSubjectType"
          description: The subject line for the email message template. You can set an EmailSubject template only if the value of EmailSendingAccount is DEVELOPER. When your EmailSendingAccount is DEVELOPER, your user pool sends email messages with your own Amazon SES configuration.
        EmailMessageByLink:
          $ref: "#/components/schemas/EmailVerificationMessageByLinkType"
          description: The email message template for sending a confirmation link to the user. You can set an EmailMessageByLink template only if the value of EmailSendingAccount is DEVELOPER. When your EmailSendingAccount is DEVELOPER, your user pool sends email messages with your own Amazon SES configuration.
        EmailSubjectByLink:
          $ref: "#/components/schemas/EmailVerificationSubjectByLinkType"
          description: The subject line for the email message template for sending a confirmation link to the user. You can set an EmailSubjectByLink template only if the value of EmailSendingAccount is DEVELOPER. When your EmailSendingAccount is DEVELOPER, your user pool sends email messages with your own Amazon SES configuration.
        DefaultEmailOption:
          $ref: "#/components/schemas/DefaultEmailOptionType"
          description: The configuration of verification emails to contain a clickable link or a verification code. For link, your template body must contain link text in the format {##Click here##}. "Click here" in the example is a customizable string. For code, your template body must contain a code placeholder in the format {####}.
    EmailVerificationMessageByLinkType:
      type: string
      minLength: 6
      maxLength: 20000
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*\\{##[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*##\\}[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*"
    EmailVerificationSubjectByLinkType:
      type: string
      minLength: 1
      maxLength: 140
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s]+"
    DefaultEmailOptionType:
      type: string
      enum:
        - CONFIRM_WITH_LINK
        - CONFIRM_WITH_CODE
    UserPoolMfaType:
      type: string
      enum:
        - "OFF"
        - "ON"
        - OPTIONAL
    UserAttributeUpdateSettingsType:
      description: The settings for updates to user attributes. These settings include the property AttributesRequireVerificationBeforeUpdate, a user-pool setting that tells Amazon Cognito how to handle changes to the value of your users' email address and phone number attributes. For more information, see Verifying updates to email addresses and phone numbers.
      type: object
      properties:
        AttributesRequireVerificationBeforeUpdate:
          $ref: "#/components/schemas/AttributesRequireVerificationBeforeUpdateType"
          description: Requires that your user verifies their email address, phone number, or both before Amazon Cognito updates the value of that attribute. When you update a user attribute that has this option activated, Amazon Cognito sends a verification message to the new phone number or email address. Amazon Cognito doesn’t change the value of the attribute until your user responds to the verification message and confirms the new value. When AttributesRequireVerificationBeforeUpdate is false, your user pool doesn't require that your users verify attribute changes before Amazon Cognito updates them. In a user pool where AttributesRequireVerificationBeforeUpdate is false, API operations that change attribute values can immediately update a user’s email or phone_number attribute.
    AttributesRequireVerificationBeforeUpdateType:
      type: array
      items:
        $ref: "#/components/schemas/VerifiedAttributeType"
    DeviceConfigurationType:
      description: The device-remembering configuration for a user pool. When you provide a value for any property of DeviceConfiguration, you activate the device remembering for the user pool.
      type: object
      properties:
        ChallengeRequiredOnNewDevice:
          $ref: "#/components/schemas/BooleanType"
          description: When true, a remembered device can sign in with device authentication instead of SMS and time-based one-time password (TOTP) factors for multi-factor authentication (MFA). Whether or not ChallengeRequiredOnNewDevice is true, users who sign in with devices that have not been confirmed or remembered must still provide a second factor in a user pool that requires MFA.
        DeviceOnlyRememberedOnUserPrompt:
          $ref: "#/components/schemas/BooleanType"
          description: When true, Amazon Cognito doesn't automatically remember a user's device when your app sends a ConfirmDevice API request. In your app, create a prompt for your user to choose whether they want to remember their device. Return the user's choice in an UpdateDeviceStatus API request. When DeviceOnlyRememberedOnUserPrompt is false, Amazon Cognito immediately remembers devices that you register in a ConfirmDevice API request.
    EmailConfigurationType:
      description: The email configuration of your user pool. The email configuration type sets your preferred sending method, Amazon Web Services Region, and sender for messages from your user pool. Amazon Cognito can send email messages with Amazon Simple Email Service resources in the Amazon Web Services Region where you created your user pool, and in alternate Regions in some cases. For more information on the supported Regions, see Email settings for Amazon Cognito user pools.
      type: object
      properties:
        SourceArn:
          $ref: "#/components/schemas/ArnType"
          description: "The ARN of a verified email address or an address from a verified domain in Amazon SES. You can set a SourceArn email from a verified domain only with an API request. You can set a verified email address, but not an address in a verified domain, in the Amazon Cognito console. Amazon Cognito uses the email address that you provide in one of the following ways, depending on the value that you specify for the EmailSendingAccount parameter: If you specify COGNITO_DEFAULT, Amazon Cognito uses this address as the custom FROM address when it emails your users using its built-in email account. If you specify DEVELOPER, Amazon Cognito emails your users with this address by calling Amazon SES on your behalf. The Region value of the SourceArn parameter must indicate a supported Amazon Web Services Region of your user pool. Typically, the Region in the SourceArn and the user pool Region are the same. For more information, see Amazon SES email configuration regions in the Amazon Cognito Developer Guide."
        ReplyToEmailAddress:
          $ref: "#/components/schemas/EmailAddressType"
          description: The destination to which the receiver of the email should reply.
        EmailSendingAccount:
          $ref: "#/components/schemas/EmailSendingAccountType"
          description: "Specifies whether Amazon Cognito uses its built-in functionality to send your users email messages, or uses your Amazon Simple Email Service email configuration. Specify one of the following values: COGNITO_DEFAULT When Amazon Cognito emails your users, it uses its built-in email functionality. When you use the default option, Amazon Cognito allows only a limited number of emails each day for your user pool. For typical production environments, the default email limit is less than the required delivery volume. To achieve a higher delivery volume, specify DEVELOPER to use your Amazon SES email configuration. To look up the email delivery limit for the default option, see Limits in the Amazon Cognito Developer Guide. The default FROM address is no-reply@verificationemail.com. To customize the FROM address, provide the Amazon Resource Name (ARN) of an Amazon SES verified email address for the SourceArn parameter. DEVELOPER When Amazon Cognito emails your users, it uses your Amazon SES configuration. Amazon Cognito calls Amazon SES on your behalf to send email from your verified email address. When you use this option, the email delivery limits are the same limits that apply to your Amazon SES verified email address in your Amazon Web Services account. If you use this option, provide the ARN of an Amazon SES verified email address for the SourceArn parameter. Before Amazon Cognito can email your users, it requires additional permissions to call Amazon SES on your behalf. When you update your user pool with this option, Amazon Cognito creates a service-linked role, which is a type of role in your Amazon Web Services account. This role contains the permissions that allow you to access Amazon SES and send email messages from your email address. For more information about the service-linked role that Amazon Cognito creates, see Using Service-Linked Roles for Amazon Cognito in the Amazon Cognito Developer Guide."
        From:
          $ref: "#/components/schemas/StringType"
          description: Either the sender’s email address or the sender’s name with their email address. For example, testuser@example.com or Test User <testuser@example.com>. This address appears before the body of the email.
        ConfigurationSet:
          $ref: "#/components/schemas/SESConfigurationSet"
          description: "The set of configuration rules that can be applied to emails sent using Amazon Simple Email Service. A configuration set is applied to an email by including a reference to the configuration set in the headers of the email. Once applied, all of the rules in that configuration set are applied to the email. Configuration sets can be used to apply the following types of rules to emails: Event publishing Amazon Simple Email Service can track the number of send, delivery, open, click, bounce, and complaint events for each email sent. Use event publishing to send information about these events to other Amazon Web Services services such as and Amazon CloudWatch IP pool management When leasing dedicated IP addresses with Amazon Simple Email Service, you can create groups of IP addresses, called dedicated IP pools. You can then associate the dedicated IP pools with configuration sets."
    EmailAddressType:
      type: string
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+@[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
    EmailSendingAccountType:
      type: string
      enum:
        - COGNITO_DEFAULT
        - DEVELOPER
    SESConfigurationSet:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9_-]+$
    SmsConfigurationType:
      description: User pool configuration for delivery of SMS messages with Amazon Simple Notification Service. To send SMS messages with Amazon SNS in the Amazon Web Services Region that you want, the Amazon Cognito user pool uses an Identity and Access Management (IAM) role in your Amazon Web Services account.
      type: object
      properties:
        SnsCallerArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (ARN) of the Amazon SNS caller. This is the ARN of the IAM role in your Amazon Web Services account that Amazon Cognito will use to send SMS messages. SMS messages are subject to a spending limit.
        ExternalId:
          $ref: "#/components/schemas/StringType"
          description: The external ID provides additional security for your IAM role. You can use an ExternalId with the IAM role that you use with Amazon SNS to send SMS messages for your user pool. If you provide an ExternalId, your Amazon Cognito user pool includes it in the request to assume your IAM role. You can configure the role trust policy to require that Amazon Cognito, and any principal, provide the ExternalID. If you use the Amazon Cognito Management Console to create a role for SMS multi-factor authentication (MFA), Amazon Cognito creates a role with the required permissions and a trust policy that demonstrates use of the ExternalId. For more information about the ExternalId of a role, see How to use an external ID when granting access to your Amazon Web Services resources to a third party.
        SnsRegion:
          $ref: "#/components/schemas/RegionCodeType"
          description: The Amazon Web Services Region to use with Amazon SNS integration. You can choose the same Region as your user pool, or a supported Legacy Amazon SNS alternate Region. Amazon Cognito resources in the Asia Pacific (Seoul) Amazon Web Services Region must use your Amazon SNS configuration in the Asia Pacific (Tokyo) Region. For more information, see SMS message settings for Amazon Cognito user pools.
      required:
        - SnsCallerArn
    RegionCodeType:
      type: string
      minLength: 5
      maxLength: 32
    UserPoolTagsType:
      type: object
      properties: {}
    AdminCreateUserConfigType:
      description: The settings for administrator creation of users in a user pool. Contains settings for allowing user sign-up, customizing invitation messages to new users, and the amount of time before temporary passwords expire.
      type: object
      properties:
        AllowAdminCreateUserOnly:
          $ref: "#/components/schemas/BooleanType"
          description: The setting for allowing self-service sign-up. When true, only administrators can create new user profiles. When false, users can register themselves and create a new user profile with the SignUp operation.
        UnusedAccountValidityDays:
          $ref: "#/components/schemas/AdminCreateUserUnusedAccountValidityDaysType"
          description: This parameter is no longer in use. The password expiration limit in days for administrator-created users. When this time expires, the user can't sign in with their temporary password. To reset the account after that time limit, you must call AdminCreateUser again, specifying RESEND for the MessageAction parameter. The default value for this parameter is 7.
        InviteMessageTemplate:
          $ref: "#/components/schemas/MessageTemplateType"
          description: The template for the welcome message to new users. This template must include the {####} temporary password placeholder if you are creating users with passwords. If your users don't have passwords, you can omit the placeholder. See also Customizing User Invitation Messages.
    AdminCreateUserUnusedAccountValidityDaysType:
      type: integer
      minimum: 0
      maximum: 365
    MessageTemplateType:
      description: The message template structure.
      type: object
      properties:
        SMSMessage:
          $ref: "#/components/schemas/SmsInviteMessageType"
          description: The message template for SMS messages.
        EmailMessage:
          $ref: "#/components/schemas/EmailInviteMessageType"
          description: The message template for email messages. EmailMessage is allowed only if EmailSendingAccount is DEVELOPER.
        EmailSubject:
          $ref: "#/components/schemas/EmailVerificationSubjectType"
          description: The subject line for email messages. EmailSubject is allowed only if EmailSendingAccount is DEVELOPER.
    SmsInviteMessageType:
      type: string
      minLength: 6
      maxLength: 140
      pattern: (?s).*
    EmailInviteMessageType:
      type: string
      minLength: 6
      maxLength: 20000
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*"
    SchemaAttributesListType:
      type: array
      items:
        $ref: "#/components/schemas/SchemaAttributeType"
    UserPoolAddOnsType:
      description: Contains settings for activation of threat protection, including the operating mode and additional authentication types. To log user security information but take no action, set to AUDIT. To configure automatic security responses to potentially unwanted traffic to your user pool, set to ENFORCED. For more information, see Adding advanced security to a user pool. To activate this setting, your user pool must be on the Plus tier.
      type: object
      properties:
        AdvancedSecurityMode:
          $ref: "#/components/schemas/AdvancedSecurityModeType"
          description: The operating mode of threat protection for standard authentication types in your user pool, including username-password and secure remote password (SRP) authentication.
        AdvancedSecurityAdditionalFlows:
          $ref: "#/components/schemas/AdvancedSecurityAdditionalFlowsType"
          description: Threat protection configuration options for additional authentication types in your user pool, including custom authentication.
      required:
        - AdvancedSecurityMode
    AdvancedSecurityModeType:
      type: string
      enum:
        - "OFF"
        - AUDIT
        - ENFORCED
    AdvancedSecurityAdditionalFlowsType:
      description: Threat protection configuration options for additional authentication types in your user pool, including custom authentication.
      type: object
      properties:
        CustomAuthMode:
          $ref: "#/components/schemas/AdvancedSecurityEnabledModeType"
          description: The operating mode of threat protection in custom authentication with Custom authentication challenge Lambda triggers.
    AdvancedSecurityEnabledModeType:
      type: string
      enum:
        - AUDIT
        - ENFORCED
    UsernameConfigurationType:
      description: The configuration of a user pool for username case sensitivity.
      type: object
      properties:
        CaseSensitive:
          $ref: "#/components/schemas/WrappedBooleanType"
          description: "Specifies whether user name case sensitivity will be applied for all users in the user pool through Amazon Cognito APIs. For most use cases, set case sensitivity to False (case insensitive) as a best practice. When usernames and email addresses are case insensitive, users can sign in as the same user when they enter a different capitalization of their user name. Valid values include: true Enables case sensitivity for all username input. When this option is set to true, users must sign in using the exact capitalization of their given username, such as “UserName”. This is the default value. false Enables case insensitivity for all username input. For example, when this option is set to false, users can sign in using username, USERNAME, or UserName. This option also enables both preferred_username and email alias to be case insensitive, in addition to the username attribute."
      required:
        - CaseSensitive
    AccountRecoverySettingType:
      description: The settings for user message delivery in forgot-password operations. Contains preference for email or SMS message delivery of password reset codes, or for admin-only password reset.
      type: object
      properties:
        RecoveryMechanisms:
          $ref: "#/components/schemas/RecoveryMechanismsType"
          description: The list of options and priorities for user message delivery in forgot-password operations. Sets or displays user pool preferences for email or SMS message priority, whether users should fall back to a second delivery method, and whether passwords should only be reset by administrators.
    RecoveryMechanismsType:
      type: array
      items:
        $ref: "#/components/schemas/RecoveryOptionType"
    RecoveryOptionType:
      description: A recovery option for a user. The AccountRecoverySettingType data type is an array of this object. Each RecoveryOptionType has a priority property that determines whether it is a primary or secondary option. For example, if verified_email has a priority of 1 and verified_phone_number has a priority of 2, your user pool sends account-recovery messages to a verified email address but falls back to an SMS message if the user has a verified phone number. The admin_only option prevents self-service account recovery.
      type: object
      properties:
        Priority:
          $ref: "#/components/schemas/PriorityType"
          description: Your priority preference for using the specified attribute in account recovery. The highest priority is 1.
        Name:
          $ref: "#/components/schemas/RecoveryOptionNameType"
          description: The recovery method that this object sets a recovery option for.
      required:
        - Priority
        - Name
    PriorityType:
      type: integer
      minimum: 1
      maximum: 2
    RecoveryOptionNameType:
      type: string
      enum:
        - verified_email
        - verified_phone_number
        - admin_only
    UserPoolTierType:
      type: string
      enum:
        - LITE
        - ESSENTIALS
        - PLUS
    CreateUserPoolResponse:
      description: Represents the response from the server for the request to create a user pool.
      type: object
      properties:
        UserPool:
          $ref: "#/components/schemas/UserPoolType"
          description: The details of the created user pool.
    UserPoolType:
      description: The configuration of a user pool.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/UserPoolIdType"
          description: The ID of the user pool.
        Name:
          $ref: "#/components/schemas/UserPoolNameType"
          description: The name of the user pool.
        Policies:
          $ref: "#/components/schemas/UserPoolPolicyType"
          description: A list of user pool policies. Contains the policy that sets password-complexity requirements.
        DeletionProtection:
          $ref: "#/components/schemas/DeletionProtectionType"
          description: When active, DeletionProtection prevents accidental deletion of your user pool. Before you can delete a user pool that you have protected against deletion, you must deactivate this feature. When you try to delete a protected user pool in a DeleteUserPool API request, Amazon Cognito returns an InvalidParameterException error. To delete a protected user pool, send a new DeleteUserPool request after you deactivate deletion protection in an UpdateUserPool API request.
        LambdaConfig:
          $ref: "#/components/schemas/LambdaConfigType"
          description: A collection of user pool Lambda triggers. Amazon Cognito invokes triggers at several possible stages of user pool operations. Triggers can modify the outcome of the operations that invoked them.
        Status:
          $ref: "#/components/schemas/StatusType"
          description: This parameter is no longer used.
        LastModifiedDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was modified. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        CreationDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was created. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        SchemaAttributes:
          $ref: "#/components/schemas/SchemaAttributesListType"
          description: "A list of the user attributes and their properties in your user pool. The attribute schema contains standard attributes, custom attributes with a custom: prefix, and developer attributes with a dev: prefix. For more information, see User pool attributes. Developer-only attributes are a legacy feature of user pools, and are read-only to all app clients. You can create and update developer-only attributes only with IAM-authenticated API operations. Use app client read/write permissions instead."
        AutoVerifiedAttributes:
          $ref: "#/components/schemas/VerifiedAttributesListType"
          description: The attributes that are auto-verified in a user pool.
        AliasAttributes:
          $ref: "#/components/schemas/AliasAttributesListType"
          description: "Attributes supported as an alias for this user pool. An alias is an attribute that users can enter as an alternative username. Possible values: phone_number, email, or preferred_username."
        UsernameAttributes:
          $ref: "#/components/schemas/UsernameAttributesListType"
          description: Specifies whether a user can use an email address or phone number as a username when they sign up.
        SmsVerificationMessage:
          $ref: "#/components/schemas/SmsVerificationMessageType"
          description: This parameter is no longer used.
        EmailVerificationMessage:
          $ref: "#/components/schemas/EmailVerificationMessageType"
          description: This parameter is no longer used.
        EmailVerificationSubject:
          $ref: "#/components/schemas/EmailVerificationSubjectType"
          description: This parameter is no longer used.
        VerificationMessageTemplate:
          $ref: "#/components/schemas/VerificationMessageTemplateType"
          description: The template for the verification message that your user pool delivers to users who set an email address or phone number attribute.
        SmsAuthenticationMessage:
          $ref: "#/components/schemas/SmsVerificationMessageType"
          description: The contents of the SMS authentication message.
        UserAttributeUpdateSettings:
          $ref: "#/components/schemas/UserAttributeUpdateSettingsType"
          description: The settings for updates to user attributes. These settings include the property AttributesRequireVerificationBeforeUpdate, a user-pool setting that tells Amazon Cognito how to handle changes to the value of your users' email address and phone number attributes. For more information, see Verifying updates to email addresses and phone numbers.
        MfaConfiguration:
          $ref: "#/components/schemas/UserPoolMfaType"
          description: "Can be one of the following values: OFF - MFA tokens aren't required and can't be specified during user registration. ON - MFA tokens are required for all user registrations. You can only specify required when you're initially creating a user pool. OPTIONAL - Users have the option when registering to create an MFA token."
        DeviceConfiguration:
          $ref: "#/components/schemas/DeviceConfigurationType"
          description: The device-remembering configuration for a user pool. A null value indicates that you have deactivated device remembering in your user pool. When you provide a value for any DeviceConfiguration field, you activate the Amazon Cognito device-remembering feature.
        EstimatedNumberOfUsers:
          $ref: "#/components/schemas/IntegerType"
          description: A number estimating the size of the user pool.
        EmailConfiguration:
          $ref: "#/components/schemas/EmailConfigurationType"
          description: The email configuration of your user pool. The email configuration type sets your preferred sending method, Amazon Web Services Region, and sender for messages from your user pool.
        SmsConfiguration:
          $ref: "#/components/schemas/SmsConfigurationType"
          description: User pool configuration for delivery of SMS messages with Amazon Simple Notification Service. To send SMS messages with Amazon SNS in the Amazon Web Services Region that you want, the Amazon Cognito user pool uses an Identity and Access Management (IAM) role in your Amazon Web Services account.
        UserPoolTags:
          type: object
          properties: {}
          description: The tags that are assigned to the user pool. A tag is a label that you can apply to user pools to categorize and manage them in different ways, such as by purpose, owner, environment, or other criteria.
        SmsConfigurationFailure:
          $ref: "#/components/schemas/StringType"
          description: The reason why the SMS configuration can't send the messages to your users. This message might include comma-separated values to describe why your SMS configuration can't send messages to user pool end users. InvalidSmsRoleAccessPolicyException The Identity and Access Management role that Amazon Cognito uses to send SMS messages isn't properly configured. For more information, see SmsConfigurationType. SNSSandbox The Amazon Web Services account is in the SNS SMS Sandbox and messages will only reach verified end users. This parameter won’t get populated with SNSSandbox if the user creating the user pool doesn’t have SNS permissions. To learn how to move your Amazon Web Services account out of the sandbox, see Moving out of the SMS sandbox.
        EmailConfigurationFailure:
          $ref: "#/components/schemas/StringType"
          description: Deprecated. Review error codes from API requests with EventSource:cognito-idp.amazonaws.com in CloudTrail for information about problems with user pool email configuration.
        Domain:
          $ref: "#/components/schemas/DomainType"
          description: The domain prefix, if the user pool has a domain associated with it.
        CustomDomain:
          $ref: "#/components/schemas/DomainType"
          description: A custom domain name that you provide to Amazon Cognito. This parameter applies only if you use a custom domain to host the sign-up and sign-in pages for your application. An example of a custom domain name might be auth.example.com. For more information about adding a custom domain to your user pool, see Using Your Own Domain for the Hosted UI.
        AdminCreateUserConfig:
          $ref: "#/components/schemas/AdminCreateUserConfigType"
          description: The configuration for AdminCreateUser requests.
        UserPoolAddOns:
          $ref: "#/components/schemas/UserPoolAddOnsType"
          description: Contains settings for activation of threat protection, including the operating mode and additional authentication types. To log user security information but take no action, set to AUDIT. To configure automatic security responses to potentially unwanted traffic to your user pool, set to ENFORCED. For more information, see Adding advanced security to a user pool. To activate this setting, your user pool must be on the Plus tier.
        UsernameConfiguration:
          $ref: "#/components/schemas/UsernameConfigurationType"
          description: Case sensitivity of the username input for the selected sign-in option. When case sensitivity is set to False (case insensitive), users can sign in with any combination of capital and lowercase letters. For example, username, USERNAME, or UserName, or for email, email@example.com or EMaiL@eXamplE.Com. For most use cases, set case sensitivity to False (case insensitive) as a best practice. When usernames and email addresses are case insensitive, Amazon Cognito treats any variation in case as the same user, and prevents a case variation from being assigned to the same attribute for a different user.
        Arn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (ARN) of the user pool.
        AccountRecoverySetting:
          $ref: "#/components/schemas/AccountRecoverySettingType"
          description: The available verified method a user can use to recover their password when they call ForgotPassword. You can use this setting to define a preferred method when a user has more than one method available. With this setting, SMS doesn't qualify for a valid password recovery mechanism if the user also has SMS multi-factor authentication (MFA) activated. In the absence of this setting, Amazon Cognito uses the legacy behavior to determine the recovery method where SMS is preferred through email.
        UserPoolTier:
          $ref: "#/components/schemas/UserPoolTierType"
          description: The user pool feature plan, or tier. This parameter determines the eligibility of the user pool for features like managed login, access-token customization, and threat protection. Defaults to ESSENTIALS.
    StatusType:
      type: string
      enum:
        - Enabled
        - Disabled
    DomainType:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^[a-z0-9](?:[a-z0-9\-]{0,61}[a-z0-9])?$
    ClientNameType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w\\s+=,.@-]+"
    GenerateSecret:
      type: boolean
    RefreshTokenValidityType:
      type: integer
      minimum: 0
      maximum: 315360000
    AccessTokenValidityType:
      type: integer
      minimum: 1
      maximum: 86400
    IdTokenValidityType:
      type: integer
      minimum: 1
      maximum: 86400
    TokenValidityUnitsType:
      description: The time units that, with IdTokenValidity, AccessTokenValidity, and RefreshTokenValidity, set and display the duration of ID, access, and refresh tokens for an app client. You can assign a separate token validity unit to each type of token.
      type: object
      properties:
        AccessToken:
          $ref: "#/components/schemas/TimeUnitsType"
          description: A time unit for the value that you set in the AccessTokenValidity parameter. The default AccessTokenValidity time unit is hours. AccessTokenValidity duration can range from five minutes to one day.
        IdToken:
          $ref: "#/components/schemas/TimeUnitsType"
          description: A time unit for the value that you set in the IdTokenValidity parameter. The default IdTokenValidity time unit is hours. IdTokenValidity duration can range from five minutes to one day.
        RefreshToken:
          $ref: "#/components/schemas/TimeUnitsType"
          description: A time unit for the value that you set in the RefreshTokenValidity parameter. The default RefreshTokenValidity time unit is days. RefreshTokenValidity duration can range from 60 minutes to 10 years.
    TimeUnitsType:
      type: string
      enum:
        - seconds
        - minutes
        - hours
        - days
    ClientPermissionListType:
      type: array
      items:
        $ref: "#/components/schemas/ClientPermissionType"
    ClientPermissionType:
      type: string
      minLength: 1
      maxLength: 2048
    ExplicitAuthFlowsListType:
      type: array
      items:
        $ref: "#/components/schemas/ExplicitAuthFlowsType"
    ExplicitAuthFlowsType:
      type: string
      enum:
        - ADMIN_NO_SRP_AUTH
        - CUSTOM_AUTH_FLOW_ONLY
        - USER_PASSWORD_AUTH
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_CUSTOM_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_AUTH
    SupportedIdentityProvidersListType:
      type: array
      items:
        $ref: "#/components/schemas/ProviderNameType"
    CallbackURLsListType:
      type: array
      items:
        $ref: "#/components/schemas/RedirectUrlType"
    RedirectUrlType:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
    LogoutURLsListType:
      type: array
      items:
        $ref: "#/components/schemas/RedirectUrlType"
    OAuthFlowsType:
      type: array
      items:
        $ref: "#/components/schemas/OAuthFlowType"
    OAuthFlowType:
      type: string
      enum:
        - code
        - implicit
        - client_credentials
    ScopeListType:
      type: array
      items:
        $ref: "#/components/schemas/ScopeType"
    ScopeType:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\x21\\x23-\\x5B\\x5D-\\x7E]+"
    AnalyticsConfigurationType:
      description: The settings for Amazon Pinpoint analytics configuration. With an analytics configuration, your application can collect user-activity metrics for user notifications with a Amazon Pinpoint campaign. Amazon Pinpoint isn't available in all Amazon Web Services Regions. For a list of available Regions, see Amazon Cognito and Amazon Pinpoint Region availability.
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/HexStringType"
          description: Your Amazon Pinpoint project ID.
        ApplicationArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (ARN) of an Amazon Pinpoint project that you want to connect to your user pool app client. Amazon Cognito publishes events to the Amazon Pinpoint project that ApplicationArn declares. You can also configure your application to pass an endpoint ID in the AnalyticsMetadata parameter of sign-in operations. The endpoint ID is information about the destination for push notifications
        RoleArn:
          $ref: "#/components/schemas/ArnType"
          description: The ARN of an Identity and Access Management role that has the permissions required for Amazon Cognito to publish events to Amazon Pinpoint analytics.
        ExternalId:
          $ref: "#/components/schemas/StringType"
          description: The external ID of the role that Amazon Cognito assumes to send analytics data to Amazon Pinpoint.
        UserDataShared:
          $ref: "#/components/schemas/BooleanType"
          description: If UserDataShared is true, Amazon Cognito includes user data in the events that it publishes to Amazon Pinpoint analytics.
    HexStringType:
      type: string
      pattern: ^[0-9a-fA-F]+$
    PreventUserExistenceErrorTypes:
      type: string
      enum:
        - LEGACY
        - ENABLED
    AuthSessionValidityType:
      type: integer
      minimum: 3
      maximum: 15
    RefreshTokenRotationType:
      description: The configuration of your app client for refresh token rotation. When enabled, your app client issues new ID, access, and refresh tokens when users renew their sessions with refresh tokens. When disabled, token refresh issues only ID and access tokens.
      type: object
      properties:
        Feature:
          $ref: "#/components/schemas/FeatureType"
          description: The state of refresh token rotation for the current app client.
        RetryGracePeriodSeconds:
          $ref: "#/components/schemas/RetryGracePeriodSecondsType"
          description: When you request a token refresh with GetTokensFromRefreshToken, the original refresh token that you're rotating out can remain valid for a period of time of up to 60 seconds. This allows for client-side retries. When RetryGracePeriodSeconds is 0, the grace period is disabled and a successful request immediately invalidates the submitted refresh token.
      required:
        - Feature
    FeatureType:
      type: string
      enum:
        - ENABLED
        - DISABLED
    RetryGracePeriodSecondsType:
      type: integer
      minimum: 0
      maximum: 60
    CreateUserPoolClientResponse:
      description: Represents the response from the server to create a user pool client.
      type: object
      properties:
        UserPoolClient:
          $ref: "#/components/schemas/UserPoolClientType"
          description: The details of the new app client.
    UserPoolClientType:
      description: The configuration of a user pool client.
      type: object
      properties:
        UserPoolId:
          $ref: "#/components/schemas/UserPoolIdType"
          description: The ID of the user pool associated with the app client.
        ClientName:
          $ref: "#/components/schemas/ClientNameType"
          description: The name of the app client.
        ClientId:
          $ref: "#/components/schemas/ClientIdType"
          description: The ID of the app client.
        ClientSecret:
          $ref: "#/components/schemas/ClientSecretType"
          description: The app client secret.
        LastModifiedDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was modified. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        CreationDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was created. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        RefreshTokenValidity:
          $ref: "#/components/schemas/RefreshTokenValidityType"
          description: The refresh token time limit. After this limit expires, your user can't use their refresh token. To specify the time unit for RefreshTokenValidity as seconds, minutes, hours, or days, set a TokenValidityUnits value in your API request. For example, when you set RefreshTokenValidity as 10 and TokenValidityUnits as days, your user can refresh their session and retrieve new access and ID tokens for 10 days. The default time unit for RefreshTokenValidity in an API request is days. You can't set RefreshTokenValidity to 0. If you do, Amazon Cognito overrides the value with the default value of 30 days. Valid range is displayed below in seconds. If you don't specify otherwise in the configuration of your app client, your refresh tokens are valid for 30 days.
        AccessTokenValidity:
          $ref: "#/components/schemas/AccessTokenValidityType"
          description: The access token time limit. After this limit expires, your user can't use their access token. To specify the time unit for AccessTokenValidity as seconds, minutes, hours, or days, set a TokenValidityUnits value in your API request. For example, when you set AccessTokenValidity to 10 and TokenValidityUnits to hours, your user can authorize access with their access token for 10 hours. The default time unit for AccessTokenValidity in an API request is hours. Valid range is displayed below in seconds. If you don't specify otherwise in the configuration of your app client, your access tokens are valid for one hour.
        IdTokenValidity:
          $ref: "#/components/schemas/IdTokenValidityType"
          description: The ID token time limit. After this limit expires, your user can't use their ID token. To specify the time unit for IdTokenValidity as seconds, minutes, hours, or days, set a TokenValidityUnits value in your API request. For example, when you set IdTokenValidity as 10 and TokenValidityUnits as hours, your user can authenticate their session with their ID token for 10 hours. The default time unit for IdTokenValidity in an API request is hours. Valid range is displayed below in seconds. If you don't specify otherwise in the configuration of your app client, your ID tokens are valid for one hour.
        TokenValidityUnits:
          $ref: "#/components/schemas/TokenValidityUnitsType"
          description: The time units that, with IdTokenValidity, AccessTokenValidity, and RefreshTokenValidity, set and display the duration of ID, access, and refresh tokens for an app client. You can assign a separate token validity unit to each type of token.
        ReadAttributes:
          $ref: "#/components/schemas/ClientPermissionListType"
          description: The list of user attributes that you want your app client to have read access to. After your user authenticates in your app, their access token authorizes them to read their own attribute value for any attribute in this list. When you don't specify the ReadAttributes for your app client, your app can read the values of email_verified, phone_number_verified, and the standard attributes of your user pool. When your user pool app client has read access to these default attributes, ReadAttributes doesn't return any information. Amazon Cognito only populates ReadAttributes in the API response if you have specified your own custom set of read attributes.
        WriteAttributes:
          $ref: "#/components/schemas/ClientPermissionListType"
          description: The list of user attributes that you want your app client to have write access to. After your user authenticates in your app, their access token authorizes them to set or modify their own attribute value for any attribute in this list. When you don't specify the WriteAttributes for your app client, your app can write the values of the Standard attributes of your user pool. When your user pool has write access to these default attributes, WriteAttributes doesn't return any information. Amazon Cognito only populates WriteAttributes in the API response if you have specified your own custom set of write attributes. If your app client allows users to sign in through an IdP, this array must include all attributes that you have mapped to IdP attributes. Amazon Cognito updates mapped attributes when users sign in to your application through an IdP. If your app client does not have write access to a mapped attribute, Amazon Cognito throws an error when it tries to update the attribute. For more information, see Specifying IdP Attribute Mappings for Your user pool.
        ExplicitAuthFlows:
          $ref: "#/components/schemas/ExplicitAuthFlowsListType"
          description: "The authentication flows that you want your user pool client to support. For each app client in your user pool, you can sign in your users with any combination of one or more flows, including with a user name and Secure Remote Password (SRP), a user name and password, or a custom authentication process that you define with Lambda functions. If you don't specify a value for ExplicitAuthFlows, your app client supports ALLOW_REFRESH_TOKEN_AUTH, ALLOW_USER_SRP_AUTH, and ALLOW_CUSTOM_AUTH. The values for authentication flow options include the following. ALLOW_USER_AUTH: Enable selection-based sign-in with USER_AUTH. This setting covers username-password, secure remote password (SRP), passwordless, and passkey authentication. This authentiation flow can do username-password and SRP authentication without other ExplicitAuthFlows permitting them. For example users can complete an SRP challenge through USER_AUTH without the flow USER_SRP_AUTH being active for the app client. This flow doesn't include CUSTOM_AUTH. To activate this setting, your user pool must be in the Essentials tier or higher. ALLOW_ADMIN_USER_PASSWORD_AUTH: Enable admin based user password authentication flow ADMIN_USER_PASSWORD_AUTH. This setting replaces the ADMIN_NO_SRP_AUTH setting. With this authentication flow, your app passes a user name and password to Amazon Cognito in the request, instead of using the Secure Remote Password (SRP) protocol to securely transmit the password. ALLOW_CUSTOM_AUTH: Enable Lambda trigger based authentication. ALLOW_USER_PASSWORD_AUTH: Enable user password-based authentication. In this flow, Amazon Cognito receives the password in the request instead of using the SRP protocol to verify passwords. ALLOW_USER_SRP_AUTH: Enable SRP-based authentication. ALLOW_REFRESH_TOKEN_AUTH: Enable authflow to refresh tokens. In some environments, you will see the values ADMIN_NO_SRP_AUTH, CUSTOM_AUTH_FLOW_ONLY, or USER_PASSWORD_AUTH. You can't assign these legacy ExplicitAuthFlows values to user pool clients at the same time as values that begin with ALLOW_, like ALLOW_USER_SRP_AUTH."
        SupportedIdentityProviders:
          $ref: "#/components/schemas/SupportedIdentityProvidersListType"
          description: "A list of provider names for the identity providers (IdPs) that are supported on this client. The following are supported: COGNITO, Facebook, Google, SignInWithApple, and LoginWithAmazon. You can also specify the names that you configured for the SAML and OIDC IdPs in your user pool, for example MySAMLIdP or MyOIDCIdP. This parameter sets the IdPs that managed login will display on the login page for your app client. The removal of COGNITO from this list doesn't prevent authentication operations for local users with the user pools API in an Amazon Web Services SDK. The only way to prevent SDK-based authentication is to block access with a WAF rule."
        CallbackURLs:
          $ref: "#/components/schemas/CallbackURLsListType"
          description: "A list of allowed redirect (callback) URLs for the IdPs. A redirect URI must: Be an absolute URI. Be registered with the authorization server. Not include a fragment component. See OAuth 2.0 - Redirection Endpoint. Amazon Cognito requires HTTPS over HTTP for callback URLs to http://localhost, http://127.0.0.1 and http://[::1]. These callback URLs are for testing purposes only. You can specify custom TCP ports for your callback URLs. App callback URLs such as myapp://example are also supported."
        LogoutURLs:
          $ref: "#/components/schemas/LogoutURLsListType"
          description: A list of allowed logout URLs for the IdPs.
        DefaultRedirectURI:
          $ref: "#/components/schemas/RedirectUrlType"
          description: "The default redirect URI. Must be in the CallbackURLs list. A redirect URI must: Be an absolute URI. Be registered with the authorization server. Not include a fragment component. See OAuth 2.0 - Redirection Endpoint. Amazon Cognito requires HTTPS over HTTP for callback URLs to http://localhost, http://127.0.0.1 and http://[::1]. These callback URLs are for testing purposes only. You can specify custom TCP ports for your callback URLs. App callback URLs such as myapp://example are also supported."
        AllowedOAuthFlows:
          $ref: "#/components/schemas/OAuthFlowsType"
          description: The OAuth grant types that you want your app client to generate. To create an app client that generates client credentials grants, you must add client_credentials as the only allowed OAuth flow. code Use a code grant flow, which provides an authorization code as the response. This code can be exchanged for access tokens with the /oauth2/token endpoint. implicit Issue the access token (and, optionally, ID token, based on scopes) directly to your user. client_credentials Issue the access token from the /oauth2/token endpoint directly to a non-person user using a combination of the client ID and client secret.
        AllowedOAuthScopes:
          $ref: "#/components/schemas/ScopeListType"
          description: The OAuth 2.0 scopes that you want your app client to support. Can include standard OAuth scopes like phone, email, openid, and profile. Can also include the aws.cognito.signin.user.admin scope that authorizes user profile self-service operations and custom scopes from resource servers.
        AllowedOAuthFlowsUserPoolClient:
          $ref: "#/components/schemas/BooleanType"
          description: "Set to true to use OAuth 2.0 authorization server features in your app client. This parameter must have a value of true before you can configure the following features in your app client. CallBackURLs: Callback URLs. LogoutURLs: Sign-out redirect URLs. AllowedOAuthScopes: OAuth 2.0 scopes. AllowedOAuthFlows: Support for authorization code, implicit, and client credentials OAuth 2.0 grants. To use authorization server features, configure one of these features in the Amazon Cognito console or set AllowedOAuthFlowsUserPoolClient to true in a CreateUserPoolClient or UpdateUserPoolClient API request. If you don't set a value for AllowedOAuthFlowsUserPoolClient in a request with the CLI or SDKs, it defaults to false. When false, only SDK-based API sign-in is permitted."
        AnalyticsConfiguration:
          $ref: "#/components/schemas/AnalyticsConfigurationType"
          description: The user pool analytics configuration for collecting metrics and sending them to your Amazon Pinpoint campaign. In Amazon Web Services Regions where Amazon Pinpoint isn't available, user pools only support sending events to Amazon Pinpoint projects in Amazon Web Services Region us-east-1. In Regions where Amazon Pinpoint is available, user pools support sending events to Amazon Pinpoint projects within that same Region.
        PreventUserExistenceErrors:
          $ref: "#/components/schemas/PreventUserExistenceErrorTypes"
          description: When ENABLED, suppresses messages that might indicate a valid user exists when someone attempts sign-in. This parameters sets your preference for the errors and responses that you want Amazon Cognito APIs to return during authentication, account confirmation, and password recovery when the user doesn't exist in the user pool. When set to ENABLED and the user doesn't exist, authentication returns an error indicating either the username or password was incorrect. Account confirmation and password recovery return a response indicating a code was sent to a simulated destination. When set to LEGACY, those APIs return a UserNotFoundException exception if the user doesn't exist in the user pool. Defaults to LEGACY.
        EnableTokenRevocation:
          $ref: "#/components/schemas/WrappedBooleanType"
          description: Indicates whether token revocation is activated for the user pool client. When you create a new user pool client, token revocation is activated by default.
        EnablePropagateAdditionalUserContextData:
          $ref: "#/components/schemas/WrappedBooleanType"
          description: When EnablePropagateAdditionalUserContextData is true, Amazon Cognito accepts an IpAddress value that you send in the UserContextData parameter. The UserContextData parameter sends information to Amazon Cognito threat protection for risk analysis. You can send UserContextData when you sign in Amazon Cognito native users with the InitiateAuth and RespondToAuthChallenge API operations. When EnablePropagateAdditionalUserContextData is false, you can't send your user's source IP address to Amazon Cognito threat protection with unauthenticated API operations. EnablePropagateAdditionalUserContextData doesn't affect whether you can send a source IP address in a ContextData parameter with the authenticated API operations AdminInitiateAuth and AdminRespondToAuthChallenge. You can only activate EnablePropagateAdditionalUserContextData in an app client that has a client secret. For more information about propagation of user context data, see Adding user device and session data to API requests.
        AuthSessionValidity:
          $ref: "#/components/schemas/AuthSessionValidityType"
          description: Amazon Cognito creates a session token for each API request in an authentication flow. AuthSessionValidity is the duration, in minutes, of that session token. Your user pool native user must respond to each authentication challenge before the session expires.
        RefreshTokenRotation:
          $ref: "#/components/schemas/RefreshTokenRotationType"
          description: The configuration of your app client for refresh token rotation. When enabled, your app client issues new ID, access, and refresh tokens when users renew their sessions with refresh tokens. When disabled, token refresh issues only ID and access tokens.
    WrappedIntegerType:
      type: integer
    CustomDomainConfigType:
      description: The configuration for a hosted UI custom domain.
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (ARN) of an Certificate Manager SSL certificate. You use this certificate for the subdomain of your custom domain.
      required:
        - CertificateArn
    CreateUserPoolDomainResponse:
      type: object
      properties:
        ManagedLoginVersion:
          $ref: "#/components/schemas/WrappedIntegerType"
          description: The version of managed login branding applied your domain. A value of 1 indicates hosted UI (classic) and a version of 2 indicates managed login.
        CloudFrontDomain:
          $ref: "#/components/schemas/DomainType"
          description: The fully-qualified domain name (FQDN) of the Amazon CloudFront distribution that hosts your managed login or classic hosted UI pages. Your domain-name authority must have an alias record that points requests for your custom domain to this FQDN. Amazon Cognito returns this value if you set a custom domain with CustomDomainConfig. If you set an Amazon Cognito prefix domain, this parameter returns null.
    DeleteUserAttributesResponse:
      description: Represents the response from the server to delete user attributes.
      type: object
    DeleteUserPoolClientSecretResponse:
      description: The response from deleting a client secret.
      type: object
    DeleteUserPoolDomainResponse:
      type: object
    DeleteWebAuthnCredentialResponse:
      type: object
    DescribeIdentityProviderResponse:
      type: object
      properties:
        IdentityProvider:
          $ref: "#/components/schemas/IdentityProviderType"
          description: The details of the requested IdP.
      required:
        - IdentityProvider
    DescribeManagedLoginBrandingResponse:
      type: object
      properties:
        ManagedLoginBranding:
          $ref: "#/components/schemas/ManagedLoginBrandingType"
          description: The details of the requested branding style.
    DescribeManagedLoginBrandingByClientResponse:
      type: object
      properties:
        ManagedLoginBranding:
          $ref: "#/components/schemas/ManagedLoginBrandingType"
          description: The details of the requested branding style.
    DescribeResourceServerResponse:
      type: object
      properties:
        ResourceServer:
          $ref: "#/components/schemas/ResourceServerType"
          description: The details of the requested resource server.
      required:
        - ResourceServer
    DescribeRiskConfigurationResponse:
      type: object
      properties:
        RiskConfiguration:
          $ref: "#/components/schemas/RiskConfigurationType"
          description: The details of the requested risk configuration.
      required:
        - RiskConfiguration
    RiskConfigurationType:
      description: The settings of risk configuration for threat protection with threat protection in a user pool.
      type: object
      properties:
        UserPoolId:
          $ref: "#/components/schemas/UserPoolIdType"
          description: The ID of the user pool that has the risk configuration applied.
        ClientId:
          $ref: "#/components/schemas/ClientIdType"
          description: The app client where this configuration is applied. When this parameter isn't present, the risk configuration applies to all user pool app clients that don't have client-level settings.
        CompromisedCredentialsRiskConfiguration:
          $ref: "#/components/schemas/CompromisedCredentialsRiskConfigurationType"
          description: Settings for compromised-credentials actions and authentication types with threat protection in full-function ENFORCED mode.
        AccountTakeoverRiskConfiguration:
          $ref: "#/components/schemas/AccountTakeoverRiskConfigurationType"
          description: The settings for automated responses and notification templates for adaptive authentication with threat protection.
        RiskExceptionConfiguration:
          $ref: "#/components/schemas/RiskExceptionConfigurationType"
          description: Exceptions to the risk evaluation configuration, including always-allow and always-block IP address ranges.
        LastModifiedDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was modified. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
    CompromisedCredentialsRiskConfigurationType:
      description: Settings for compromised-credentials actions and authentication-event sources with threat protection in full-function ENFORCED mode.
      type: object
      properties:
        EventFilter:
          $ref: "#/components/schemas/EventFiltersType"
          description: Settings for the sign-in activity where you want to configure compromised-credentials actions. Defaults to all events.
        Actions:
          $ref: "#/components/schemas/CompromisedCredentialsActionsType"
          description: Settings for the actions that you want your user pool to take when Amazon Cognito detects compromised credentials.
      required:
        - Actions
    EventFiltersType:
      type: array
      items:
        $ref: "#/components/schemas/EventFilterType"
    EventFilterType:
      type: string
      enum:
        - SIGN_IN
        - PASSWORD_CHANGE
        - SIGN_UP
    CompromisedCredentialsActionsType:
      description: Settings for user pool actions when Amazon Cognito detects compromised credentials with threat protection in full-function ENFORCED mode.
      type: object
      properties:
        EventAction:
          $ref: "#/components/schemas/CompromisedCredentialsEventActionType"
          description: The action that Amazon Cognito takes when it detects compromised credentials.
      required:
        - EventAction
    CompromisedCredentialsEventActionType:
      type: string
      enum:
        - BLOCK
        - NO_ACTION
    AccountTakeoverRiskConfigurationType:
      description: The settings for automated responses and notification templates for adaptive authentication with threat protection features.
      type: object
      properties:
        NotifyConfiguration:
          $ref: "#/components/schemas/NotifyConfigurationType"
          description: The settings for composing and sending an email message when threat protection assesses a risk level with adaptive authentication. When you choose to notify users in AccountTakeoverRiskConfiguration, Amazon Cognito sends an email message using the method and template that you set with this data type.
        Actions:
          $ref: "#/components/schemas/AccountTakeoverActionsType"
          description: A list of account-takeover actions for each level of risk that Amazon Cognito might assess with threat protection.
      required:
        - Actions
    NotifyConfigurationType:
      description: The configuration for Amazon SES email messages that threat protection sends to a user when your adaptive authentication automated response has a Notify action.
      type: object
      properties:
        From:
          $ref: "#/components/schemas/StringType"
          description: The email address that sends the email message. The address must be either individually verified with Amazon Simple Email Service, or from a domain that has been verified with Amazon SES.
        ReplyTo:
          $ref: "#/components/schemas/StringType"
          description: The reply-to email address of an email template. Can be an email address in the format admin@example.com or Administrator <admin@example.com>.
        SourceArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name (ARN) of the identity that is associated with the sending authorization policy. This identity permits Amazon Cognito to send for the email address specified in the From parameter.
        BlockEmail:
          $ref: "#/components/schemas/NotifyEmailType"
          description: The template for the email message that your user pool sends when a detected risk event is blocked.
        NoActionEmail:
          $ref: "#/components/schemas/NotifyEmailType"
          description: The template for the email message that your user pool sends when no action is taken in response to a detected risk.
        MfaEmail:
          $ref: "#/components/schemas/NotifyEmailType"
          description: The template for the email message that your user pool sends when MFA is challenged in response to a detected risk.
      required:
        - SourceArn
    NotifyEmailType:
      description: The template for email messages that threat protection sends to a user when your threat protection automated response has a Notify action.
      type: object
      properties:
        Subject:
          $ref: "#/components/schemas/EmailNotificationSubjectType"
          description: The subject of the threat protection email notification.
        HtmlBody:
          $ref: "#/components/schemas/EmailNotificationBodyType"
          description: The body of an email notification formatted in HTML. Choose an HtmlBody or a TextBody to send an HTML-formatted or plaintext message, respectively.
        TextBody:
          $ref: "#/components/schemas/EmailNotificationBodyType"
          description: The body of an email notification formatted in plaintext. Choose an HtmlBody or a TextBody to send an HTML-formatted or plaintext message, respectively.
      required:
        - Subject
    EmailNotificationSubjectType:
      type: string
      minLength: 1
      maxLength: 140
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s]+"
    EmailNotificationBodyType:
      type: string
      minLength: 6
      maxLength: 20000
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]+"
    AccountTakeoverActionsType:
      description: A list of account-takeover actions for each level of risk that Amazon Cognito might assess with threat protection features.
      type: object
      properties:
        LowAction:
          $ref: "#/components/schemas/AccountTakeoverActionType"
          description: The action that you assign to a low-risk assessment by threat protection.
        MediumAction:
          $ref: "#/components/schemas/AccountTakeoverActionType"
          description: The action that you assign to a medium-risk assessment by threat protection.
        HighAction:
          $ref: "#/components/schemas/AccountTakeoverActionType"
          description: The action that you assign to a high-risk assessment by threat protection.
    AccountTakeoverActionType:
      description: The automated response to a risk level for adaptive authentication in full-function, or ENFORCED, mode. You can assign an action to each risk level that threat protection evaluates.
      type: object
      properties:
        Notify:
          $ref: "#/components/schemas/AccountTakeoverActionNotifyType"
          description: Determines whether Amazon Cognito sends a user a notification message when your user pools assesses a user's session at the associated risk level.
        EventAction:
          $ref: "#/components/schemas/AccountTakeoverEventActionType"
          description: "The action to take for the attempted account takeover action for the associated risk level. Valid values are as follows: BLOCK: Block the request. MFA_IF_CONFIGURED: Present an MFA challenge if possible. MFA is possible if the user pool has active MFA methods that the user can set up. For example, if the user pool only supports SMS message MFA but the user doesn't have a phone number attribute, MFA setup isn't possible. If MFA setup isn't possible, allow the request. MFA_REQUIRED: Present an MFA challenge if possible. Block the request if a user hasn't set up MFA. To sign in with required MFA, users must have an email address or phone number attribute, or a registered TOTP factor. NO_ACTION: Take no action. Permit sign-in."
      required:
        - Notify
        - EventAction
    AccountTakeoverActionNotifyType:
      type: boolean
    AccountTakeoverEventActionType:
      type: string
      enum:
        - BLOCK
        - MFA_IF_CONFIGURED
        - MFA_REQUIRED
        - NO_ACTION
    RiskExceptionConfigurationType:
      description: Exceptions to the risk evaluation configuration, including always-allow and always-block IP address ranges.
      type: object
      properties:
        BlockedIPRangeList:
          $ref: "#/components/schemas/BlockedIPRangeListType"
          description: An always-block IP address list. Overrides the risk decision and always blocks authentication requests. This parameter is displayed and set in CIDR notation.
        SkippedIPRangeList:
          $ref: "#/components/schemas/SkippedIPRangeListType"
          description: An always-allow IP address list. Risk detection isn't performed on the IP addresses in this range list. This parameter is displayed and set in CIDR notation.
    BlockedIPRangeListType:
      type: array
      items:
        $ref: "#/components/schemas/StringType"
    SkippedIPRangeListType:
      type: array
      items:
        $ref: "#/components/schemas/StringType"
    DescribeTermsResponse:
      type: object
      properties:
        Terms:
          $ref: "#/components/schemas/TermsType"
          description: A summary of the requested terms documents. Includes a unique identifier for later changes to the terms documents.
    DescribeUserImportJobResponse:
      description: Represents the response from the server to the request to describe the user import job.
      type: object
      properties:
        UserImportJob:
          $ref: "#/components/schemas/UserImportJobType"
          description: The details of the user import job. Includes logging destination, status, and the Amazon S3 pre-signed URL for CSV upload.
    DescribeUserPoolResponse:
      description: Represents the response to describe the user pool.
      type: object
      properties:
        UserPool:
