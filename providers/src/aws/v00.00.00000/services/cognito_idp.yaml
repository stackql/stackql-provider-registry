          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserPoolId:
                  $ref: "#/components/schemas/UserPoolIdType"
                  description: The ID of the user pool where you want to delete the client.
                ClientId:
                  $ref: "#/components/schemas/ClientIdType"
                  description: The ID of the user pool app client that you want to delete.
              required:
                - UserPoolId
                - ClientId
      responses:
        "200":
          description: Success
