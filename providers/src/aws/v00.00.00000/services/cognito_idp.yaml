    EmailMfaSettingsType:
      description: User preferences for multi-factor authentication with email messages. Activates or deactivates email MFA and sets it as the preferred MFA method when multiple methods are available. To activate this setting, your user pool must be in the Essentials tier or higher.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BooleanType"
          description: Specifies whether email message MFA is active for a user. When the value of this parameter is Enabled, the user will be prompted for MFA during all sign-in attempts, unless device tracking is turned on and the device has been trusted.
        PreferredMfa:
          $ref: "#/components/schemas/BooleanType"
          description: Specifies whether email message MFA is the user's preferred method.
    WebAuthnMfaSettingsType:
      description: A user's preference for using passkey, or WebAuthn, multi-factor authentication (MFA). Turns passkey MFA on and off for the user. Unlike other MFA settings types, this type doesn't include a PreferredMfa option because passkey MFA applies only when passkey is the first authentication factor.
