        Session:
          $ref: "#/components/schemas/SessionType"
          description: The session identifier that maintains the state of authentication requests and challenge responses. If an InitiateAuth or RespondToAuthChallenge API request results in a determination that your application must pass another challenge, Amazon Cognito returns a session with other challenge parameters. Send this session identifier, unmodified, to the next RespondToAuthChallenge request.
        ChallengeParameters:
          type: object
          properties: {}
          description: The parameters that define your response to the next challenge.
        AuthenticationResult:
          $ref: "#/components/schemas/AuthenticationResultType"
          description: The outcome of a successful authentication process. After your application has passed all challenges, Amazon Cognito returns an AuthenticationResult with the JSON web tokens (JWTs) that indicate successful sign-in.
    RevokeTokenResponse:
      type: object
    SetLogDeliveryConfigurationResponse:
      type: object
      properties:
        LogDeliveryConfiguration:
          $ref: "#/components/schemas/LogDeliveryConfigurationType"
          description: The logging configuration that you applied to the requested user pool.
    SetRiskConfigurationResponse:
      type: object
      properties:
        RiskConfiguration:
          $ref: "#/components/schemas/RiskConfigurationType"
          description: The API response that contains the risk configuration that you set and the timestamp of the most recent change.
      required:
        - RiskConfiguration
    ImageFileType:
      type: string
      format: byte
      minLength: 0
      maxLength: 131072
    SetUICustomizationResponse:
      type: object
      properties:
        UICustomization:
          $ref: "#/components/schemas/UICustomizationType"
          description: Information about the hosted UI branding that you applied.
      required:
        - UICustomization
    SetUserMFAPreferenceResponse:
      type: object
    SetUserPoolMfaConfigResponse:
      type: object
      properties:
        SmsMfaConfiguration:
          $ref: "#/components/schemas/SmsMfaConfigType"
          description: Shows user pool SMS message configuration for MFA and sign-in with SMS-message OTPs. Includes the message template and the SMS message sending configuration for Amazon SNS.
        SoftwareTokenMfaConfiguration:
          $ref: "#/components/schemas/SoftwareTokenMfaConfigType"
          description: Shows user pool configuration for time-based one-time password (TOTP) MFA. Includes TOTP enabled or disabled state.
        EmailMfaConfiguration:
          $ref: "#/components/schemas/EmailMfaConfigType"
          description: Shows configuration for user pool email message MFA and sign-in with one-time passwords (OTPs). Includes the subject and body of the email message template for sign-in and MFA messages. To activate this setting, your user pool must be in the Essentials tier or higher.
        MfaConfiguration:
          $ref: "#/components/schemas/UserPoolMfaType"
          description: Displays multi-factor authentication (MFA) as on, off, or optional. When ON, all users must set up MFA before they can sign in. When OPTIONAL, your application must make a client-side determination of whether a user wants to register an MFA device. For user pools with adaptive authentication with threat protection, choose OPTIONAL. When MfaConfiguration is OPTIONAL, managed login doesn't automatically prompt users to set up MFA. Amazon Cognito generates MFA prompts in API responses and in managed login for users who have chosen and configured a preferred MFA factor.
        WebAuthnConfiguration:
          $ref: "#/components/schemas/WebAuthnConfigurationType"
          description: The configuration of your user pool for passkey, or WebAuthn, sign-in with authenticators such as biometric and security-key devices. Includes relying-party configuration and settings for user-verification requirements.
    SetUserSettingsResponse:
      description: The response from the server for a set user settings request.
      type: object
    SignUpResponse:
      description: The response from the server for a registration request.
      type: object
      properties:
        UserConfirmed:
          $ref: "#/components/schemas/BooleanType"
          description: Indicates whether the user was automatically confirmed. You can auto-confirm users with a pre sign-up Lambda trigger.
        CodeDeliveryDetails:
          $ref: "#/components/schemas/CodeDeliveryDetailsType"
          description: In user pools that automatically verify and confirm new users, Amazon Cognito sends users a message with a code or link that confirms ownership of the phone number or email address that they entered. The CodeDeliveryDetails object is information about the delivery destination for that link or code.
        UserSub:
          $ref: "#/components/schemas/StringType"
          description: The unique identifier of the new user, for example a1b2c3d4-5678-90ab-cdef-EXAMPLE11111.
        Session:
          $ref: "#/components/schemas/SessionType"
          description: A session Id that you can pass to ConfirmSignUp when you want to immediately sign in your user with the USER_AUTH flow after they complete sign-up.
      required:
        - UserConfirmed
        - UserSub
    StartUserImportJobResponse:
      description: Represents the response from the server to the request to start the user import job.
      type: object
      properties:
        UserImportJob:
          $ref: "#/components/schemas/UserImportJobType"
          description: The details of the user import job. Includes logging destination, status, and the Amazon S3 pre-signed URL for CSV upload.
    StartWebAuthnRegistrationResponse:
      type: object
      properties:
        CredentialCreationOptions:
          $ref: "#/components/schemas/Document"
          description: The information that a user can provide in their request to register with their passkey provider.
      required:
        - CredentialCreationOptions
    StopUserImportJobResponse:
      description: Represents the response from the server to the request to stop the user import job.
      type: object
      properties:
        UserImportJob:
          $ref: "#/components/schemas/UserImportJobType"
          description: The details of the user import job. Includes logging destination, status, and the Amazon S3 pre-signed URL for CSV upload.
    TagResourceResponse:
      type: object
    UserPoolTagsListType:
      type: array
      items:
        $ref: "#/components/schemas/TagKeysType"
    TagKeysType:
      type: string
      minLength: 1
      maxLength: 128
    UntagResourceResponse:
      type: object
    UpdateAuthEventFeedbackResponse:
      type: object
    UpdateDeviceStatusResponse:
      description: The response to the request to update the device status.
      type: object
    UpdateGroupResponse:
      type: object
      properties:
        Group:
          $ref: "#/components/schemas/GroupType"
          description: Contains the updated details of the group, including precedence, IAM role, and description.
    UpdateIdentityProviderResponse:
      type: object
      properties:
        IdentityProvider:
          $ref: "#/components/schemas/IdentityProviderType"
          description: The identity provider details.
      required:
        - IdentityProvider
    UpdateManagedLoginBrandingResponse:
      type: object
      properties:
        ManagedLoginBranding:
          $ref: "#/components/schemas/ManagedLoginBrandingType"
          description: The details of the branding style that you updated.
    UpdateResourceServerResponse:
      type: object
      properties:
        ResourceServer:
          $ref: "#/components/schemas/ResourceServerType"
          description: The updated details of the requested resource server.
      required:
        - ResourceServer
    UpdateTermsResponse:
      type: object
      properties:
        Terms:
          $ref: "#/components/schemas/TermsType"
          description: A summary of the updates to your terms documents.
    UpdateUserAttributesResponse:
      description: Represents the response from the server for the request to update user attributes.
      type: object
      properties:
        CodeDeliveryDetailsList:
          $ref: "#/components/schemas/CodeDeliveryDetailsListType"
          description: When the attribute-update request includes an email address or phone number attribute, Amazon Cognito sends a message to users with a code that confirms ownership of the new value that they entered. The CodeDeliveryDetails object is information about the delivery destination for that link or code. This behavior happens in user pools configured to automatically verify changes to those attributes. For more information, see Verifying when users change their email or phone number.
    CodeDeliveryDetailsListType:
      type: array
      items:
        $ref: "#/components/schemas/CodeDeliveryDetailsType"
    UpdateUserPoolResponse:
      description: Represents the response from the server when you make a request to update the user pool.
      type: object
    UpdateUserPoolClientResponse:
      description: Represents the response from the server to the request to update the user pool client.
      type: object
      properties:
        UserPoolClient:
          $ref: "#/components/schemas/UserPoolClientType"
          description: The updated details of your app client.
    UpdateUserPoolDomainResponse:
      description: The UpdateUserPoolDomain response output.
      type: object
      properties:
        ManagedLoginVersion:
          $ref: "#/components/schemas/WrappedIntegerType"
          description: A version number that indicates the state of managed login for your domain. Version 1 is hosted UI (classic). Version 2 is the newer managed login with the branding editor. For more information, see Managed login.
        CloudFrontDomain:
          $ref: "#/components/schemas/DomainType"
          description: The fully-qualified domain name (FQDN) of the Amazon CloudFront distribution that hosts your managed login or classic hosted UI pages. You domain-name authority must have an alias record that points requests for your custom domain to this FQDN. Amazon Cognito returns this value if you set a custom domain with CustomDomainConfig. If you set an Amazon Cognito prefix domain, this operation returns a blank response.
    SoftwareTokenMFAUserCodeType:
      type: string
      minLength: 6
      maxLength: 6
      pattern: "[0-9]+"
    VerifySoftwareTokenResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/VerifySoftwareTokenResponseType"
          description: Amazon Cognito can accept or reject the code that you provide. This response parameter indicates the success of TOTP verification. Some reasons that this operation might return an error are clock skew on the user's device and excessive retries.
        Session:
          $ref: "#/components/schemas/SessionType"
          description: This session ID satisfies an MFA_SETUP challenge. Supply the session ID in your challenge response.
    VerifySoftwareTokenResponseType:
      type: string
      enum:
        - SUCCESS
        - ERROR
    VerifyUserAttributeResponse:
      description: A container representing the response from the server from the request to verify user attributes.
      type: object
