    post:
      operationId: StartUserImportJob
      description: Instructs your user pool to start importing users from a CSV file that contains their usernames and attributes. For more information about importing users from a CSV file, see Importing users from a CSV file.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityProviderService.StartUserImportJob
            default: AWSCognitoIdentityProviderService.StartUserImportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserPoolId:
                  $ref: "#/components/schemas/UserPoolIdType"
                  description: The ID of the user pool that you want to start importing users into.
                JobId:
                  $ref: "#/components/schemas/UserImportJobIdType"
