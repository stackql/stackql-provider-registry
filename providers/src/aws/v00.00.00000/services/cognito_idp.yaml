                  description: A unique resource server identifier for the resource server. The identifier can be an API friendly name like solar-system-data. You can also set an API URL like https://solar-system-data-api.example.com as your identifier. Amazon Cognito represents scopes in the access token in the format $resource-server-identifier/$scope. Longer scope-identifier strings increase the size of your access tokens.
                Name:
                  $ref: "#/components/schemas/ResourceServerNameType"
                  description: The updated name of the resource server.
                Scopes:
                  $ref: "#/components/schemas/ResourceServerScopeListType"
                  description: An array of updated custom scope names and descriptions that you want to associate with your resource server.
              required:
                - UserPoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResourceServerResponse"
  /UpdateTerms:
    post:
      operationId: UpdateTerms
      description: Modifies existing terms documents for the requested app client. When Terms and conditions and Privacy policy documents are configured, the app client displays links to them in the sign-up page of managed login for the app client. You can provide URLs for terms documents in the languages that are supported by managed login localization. Amazon Cognito directs users to the terms documents for their current language, with fallback to default if no document exists for the language. Each request accepts one type of terms document and a map of language-to-link for that document type. You must provide both types of terms documents in at least one language before Amazon Cognito displays your terms documents. Supply each type in separate requests. For more information, see Terms documents. Amazon Cognito evaluates Identity and Access Management (IAM) policies in requests for this API operation. For this operation, you must use IAM credentials to authorize requests, and you must grant yourself the corresponding IAM permission in a policy. Learn more Signing Amazon Web Services API Requests Using the Amazon Cognito user pools API and user pool endpoints
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityProviderService.UpdateTerms
            default: AWSCognitoIdentityProviderService.UpdateTerms
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TermsId:
                  $ref: "#/components/schemas/TermsIdType"
                  description: The ID of the terms document that you want to update.
                UserPoolId:
                  $ref: "#/components/schemas/UserPoolIdType"
                  description: The ID of the user pool that contains the terms that you want to update.
                TermsName:
                  $ref: "#/components/schemas/TermsNameType"
                  description: The new name that you want to apply to the requested terms documents.
                TermsSource:
                  $ref: "#/components/schemas/TermsSourceType"
                  description: This parameter is reserved for future use and currently accepts only one value.
                Enforcement:
                  $ref: "#/components/schemas/TermsEnforcementType"
                  description: This parameter is reserved for future use and currently accepts only one value.
                Links:
                  $ref: "#/components/schemas/LinksType"
                  description: "A map of URLs to languages. For each localized language that will view the requested TermsName, assign a URL. A selection of cognito:default displays for all languages that don't have a language-specific URL. For example, \"cognito:default\": \"https://terms.example.com\", \"cognito:spanish\": \"https://terms.example.com/es\"."
              required:
                - TermsId
                - UserPoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTermsResponse"
  /UpdateUserAttributes:
    post:
      operationId: UpdateUserAttributes
      description: "Updates the currently signed-in user's attributes. To delete an attribute from the user, submit the attribute in your API request with a blank value. For custom attributes, you must add a custom: prefix to the attribute name, for example custom:department. Authorize this action with a signed-in user's access token. It must include the scope aws.cognito.signin.user.admin. Amazon Cognito doesn't evaluate Identity and Access Management (IAM) policies in requests for this API operation. For this operation, you can't use IAM credentials to authorize requests, and you can't grant IAM permissions in policies. For more information about authorization models in Amazon Cognito, see Using the Amazon Cognito user pools API and user pool endpoints. This action might generate an SMS text message. Starting June 1, 2021, US telecom carriers require you to register an origination phone number before you can send SMS messages to US phone numbers. If you use SMS text messages in Amazon Cognito, you must register a phone number with Amazon Pinpoint. Amazon Cognito uses the registered number automatically. Otherwise, Amazon Cognito users who must receive SMS messages might not be able to sign up, activate their accounts, or sign in. If you have never used SMS text messages with Amazon Cognito or any other Amazon Web Services service, Amazon Simple Notification Service might place your account in the SMS sandbox. In sandbox mode , you can send messages only to verified phone numbers. After you test your app while in the sandbox environment, you can move out of the sandbox and into production. For more information, see SMS message settings for Amazon Cognito user pools in the Amazon Cognito Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityProviderService.UpdateUserAttributes
            default: AWSCognitoIdentityProviderService.UpdateUserAttributes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserAttributes:
                  $ref: "#/components/schemas/AttributeListType"
                  description: "An array of name-value pairs representing user attributes. For custom attributes, you must add a custom: prefix to the attribute name. If you have set an attribute to require verification before Amazon Cognito updates its value, this request doesn’t immediately update the value of that attribute. After your user receives and responds to a verification message to verify the new value, Amazon Cognito updates the attribute value. Your user can sign in and receive messages with the original attribute value until they verify the new value."
                AccessToken:
                  $ref: "#/components/schemas/TokenModelType"
                  description: A valid access token that Amazon Cognito issued to the currently signed-in user. Must include a scope claim for aws.cognito.signin.user.admin.
                ClientMetadata:
                  $ref: "#/components/schemas/ClientMetadataType"
                  description: "A map of custom key-value pairs that you can provide as input for any custom workflows that this action triggers. You create custom workflows by assigning Lambda functions to user pool triggers. When Amazon Cognito invokes any of these functions, it passes a JSON payload, which the function receives as input. This payload contains a clientMetadata attribute that provides the data that you assigned to the ClientMetadata parameter in your request. In your function code, you can process the clientMetadata value to enhance your workflow for your specific needs. To review the Lambda trigger types that Amazon Cognito invokes at runtime with API requests, see Connecting API actions to Lambda triggers in the Amazon Cognito Developer Guide. When you use the ClientMetadata parameter, note that Amazon Cognito won't do the following: Store the ClientMetadata value. This data is available only to Lambda triggers that are assigned to a user pool to support custom workflows. If your user pool configuration doesn't include triggers, the ClientMetadata parameter serves no purpose. Validate the ClientMetadata value. Encrypt the ClientMetadata value. Don't send sensitive information in this parameter."
              required:
                - UserAttributes
                - AccessToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserAttributesResponse"
  /UpdateUserPool:
    post:
      operationId: UpdateUserPool
      description: Updates the configuration of a user pool. To avoid setting parameters to Amazon Cognito defaults, construct this API request to pass the existing configuration of your user pool, modified to include the changes that you want to make. With the exception of UserPoolTier, if you don't provide a value for an attribute, Amazon Cognito sets it to its default value. This action might generate an SMS text message. Starting June 1, 2021, US telecom carriers require you to register an origination phone number before you can send SMS messages to US phone numbers. If you use SMS text messages in Amazon Cognito, you must register a phone number with Amazon Pinpoint. Amazon Cognito uses the registered number automatically. Otherwise, Amazon Cognito users who must receive SMS messages might not be able to sign up, activate their accounts, or sign in. If you have never used SMS text messages with Amazon Cognito or any other Amazon Web Services service, Amazon Simple Notification Service might place your account in the SMS sandbox. In sandbox mode , you can send messages only to verified phone numbers. After you test your app while in the sandbox environment, you can move out of the sandbox and into production. For more information, see SMS message settings for Amazon Cognito user pools in the Amazon Cognito Developer Guide. Amazon Cognito evaluates Identity and Access Management (IAM) policies in requests for this API operation. For this operation, you must use IAM credentials to authorize requests, and you must grant yourself the corresponding IAM permission in a policy. Learn more Signing Amazon Web Services API Requests Using the Amazon Cognito user pools API and user pool endpoints
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityProviderService.UpdateUserPool
            default: AWSCognitoIdentityProviderService.UpdateUserPool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserPoolId:
                  $ref: "#/components/schemas/UserPoolIdType"
                  description: The ID of the user pool you want to update.
                Policies:
                  $ref: "#/components/schemas/UserPoolPolicyType"
                  description: The password policy and sign-in policy in the user pool. The password policy sets options like password complexity requirements and password history. The sign-in policy sets the options available to applications in choice-based authentication.
                DeletionProtection:
                  $ref: "#/components/schemas/DeletionProtectionType"
                  description: When active, DeletionProtection prevents accidental deletion of your user pool. Before you can delete a user pool that you have protected against deletion, you must deactivate this feature. When you try to delete a protected user pool in a DeleteUserPool API request, Amazon Cognito returns an InvalidParameterException error. To delete a protected user pool, send a new DeleteUserPool request after you deactivate deletion protection in an UpdateUserPool API request.
                LambdaConfig:
                  $ref: "#/components/schemas/LambdaConfigType"
                  description: A collection of user pool Lambda triggers. Amazon Cognito invokes triggers at several possible stages of authentication operations. Triggers can modify the outcome of the operations that invoked them.
                AutoVerifiedAttributes:
                  $ref: "#/components/schemas/VerifiedAttributesListType"
                  description: "The attributes that you want your user pool to automatically verify. Possible values: email, phone_number. For more information see Verifying contact information at sign-up."
                SmsVerificationMessage:
                  $ref: "#/components/schemas/SmsVerificationMessageType"
                  description: This parameter is no longer used.
                EmailVerificationMessage:
                  $ref: "#/components/schemas/EmailVerificationMessageType"
                  description: This parameter is no longer used.
                EmailVerificationSubject:
                  $ref: "#/components/schemas/EmailVerificationSubjectType"
                  description: This parameter is no longer used.
                VerificationMessageTemplate:
                  $ref: "#/components/schemas/VerificationMessageTemplateType"
                  description: The template for the verification message that your user pool delivers to users who set an email address or phone number attribute. Set the email message type that corresponds to your DefaultEmailOption selection. For CONFIRM_WITH_LINK, specify an EmailMessageByLink and leave EmailMessage blank. For CONFIRM_WITH_CODE, specify an EmailMessage and leave EmailMessageByLink blank. When you supply both parameters with either choice, Amazon Cognito returns an error.
                SmsAuthenticationMessage:
                  $ref: "#/components/schemas/SmsVerificationMessageType"
                  description: The contents of the SMS message that your user pool sends to users in SMS authentication.
                UserAttributeUpdateSettings:
                  $ref: "#/components/schemas/UserAttributeUpdateSettingsType"
                  description: The settings for updates to user attributes. These settings include the property AttributesRequireVerificationBeforeUpdate, a user-pool setting that tells Amazon Cognito how to handle changes to the value of your users' email address and phone number attributes. For more information, see Verifying updates to email addresses and phone numbers.
                MfaConfiguration:
                  $ref: "#/components/schemas/UserPoolMfaType"
                  description: Sets multi-factor authentication (MFA) to be on, off, or optional. When ON, all users must set up MFA before they can sign in. When OPTIONAL, your application must make a client-side determination of whether a user wants to register an MFA device. For user pools with adaptive authentication with threat protection, choose OPTIONAL. When MfaConfiguration is OPTIONAL, managed login doesn't automatically prompt users to set up MFA. Amazon Cognito generates MFA prompts in API responses and in managed login for users who have chosen and configured a preferred MFA factor.
                DeviceConfiguration:
                  $ref: "#/components/schemas/DeviceConfigurationType"
                  description: The device-remembering configuration for a user pool. Device remembering or device tracking is a "Remember me on this device" option for user pools that perform authentication with the device key of a trusted device in the back end, instead of a user-provided MFA code. For more information about device authentication, see Working with user devices in your user pool. A null value indicates that you have deactivated device remembering in your user pool. When you provide a value for any DeviceConfiguration field, you activate the Amazon Cognito device-remembering feature. For more information, see Working with devices.
                EmailConfiguration:
                  $ref: "#/components/schemas/EmailConfigurationType"
                  description: The email configuration of your user pool. The email configuration type sets your preferred sending method, Amazon Web Services Region, and sender for email invitation and verification messages from your user pool.
                SmsConfiguration:
                  $ref: "#/components/schemas/SmsConfigurationType"
                  description: The SMS configuration with the settings for your Amazon Cognito user pool to send SMS message with Amazon Simple Notification Service. To send SMS messages with Amazon SNS in the Amazon Web Services Region that you want, the Amazon Cognito user pool uses an Identity and Access Management (IAM) role in your Amazon Web Services account. For more information see SMS message settings.
                UserPoolTags:
                  $ref: "#/components/schemas/UserPoolTagsType"
                  description: The tag keys and values to assign to the user pool. A tag is a label that you can use to categorize and manage user pools in different ways, such as by purpose, owner, environment, or other criteria.
                AdminCreateUserConfig:
                  $ref: "#/components/schemas/AdminCreateUserConfigType"
                  description: The configuration for administrative creation of users. Includes the template for the invitation message for new users, the duration of temporary passwords, and permitting self-service sign-up.
                UserPoolAddOns:
                  $ref: "#/components/schemas/UserPoolAddOnsType"
                  description: Contains settings for activation of threat protection, including the operating mode and additional authentication types. To log user security information but take no action, set to AUDIT. To configure automatic security responses to potentially unwanted traffic to your user pool, set to ENFORCED. For more information, see Adding advanced security to a user pool. To activate this setting, your user pool must be on the Plus tier.
                AccountRecoverySetting:
                  $ref: "#/components/schemas/AccountRecoverySettingType"
                  description: The available verified method a user can use to recover their password when they call ForgotPassword. You can use this setting to define a preferred method when a user has more than one method available. With this setting, SMS doesn't qualify for a valid password recovery mechanism if the user also has SMS multi-factor authentication (MFA) activated. In the absence of this setting, Amazon Cognito uses the legacy behavior to determine the recovery method where SMS is preferred through email.
                PoolName:
                  $ref: "#/components/schemas/UserPoolNameType"
                  description: The updated name of your user pool.
                UserPoolTier:
                  $ref: "#/components/schemas/UserPoolTierType"
                  description: The user pool feature plan, or tier. This parameter determines the eligibility of the user pool for features like managed login, access-token customization, and threat protection. Defaults to ESSENTIALS.
              required:
                - UserPoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserPoolResponse"
  /UpdateUserPoolClient:
    post:
      operationId: UpdateUserPoolClient
      description: Given a user pool app client ID, updates the configuration. To avoid setting parameters to Amazon Cognito defaults, construct this API request to pass the existing configuration of your app client, modified to include the changes that you want to make. If you don't provide a value for an attribute, Amazon Cognito sets it to its default value. Unlike app clients created in the console, Amazon Cognito doesn't automatically assign a branding style to app clients that you configure with this API operation. Managed login and classic hosted UI pages aren't available for your client until after you apply a branding style. Amazon Cognito evaluates Identity and Access Management (IAM) policies in requests for this API operation. For this operation, you must use IAM credentials to authorize requests, and you must grant yourself the corresponding IAM permission in a policy. Learn more Signing Amazon Web Services API Requests Using the Amazon Cognito user pools API and user pool endpoints
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityProviderService.UpdateUserPoolClient
            default: AWSCognitoIdentityProviderService.UpdateUserPoolClient
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserPoolId:
                  $ref: "#/components/schemas/UserPoolIdType"
                  description: The ID of the user pool where you want to update the app client.
                ClientId:
                  $ref: "#/components/schemas/ClientIdType"
                  description: The ID of the app client that you want to update.
                ClientName:
                  $ref: "#/components/schemas/ClientNameType"
                  description: A friendly name for the app client.
                RefreshTokenValidity:
                  $ref: "#/components/schemas/RefreshTokenValidityType"
                  description: The refresh token time limit. After this limit expires, your user can't use their refresh token. To specify the time unit for RefreshTokenValidity as seconds, minutes, hours, or days, set a TokenValidityUnits value in your API request. For example, when you set RefreshTokenValidity as 10 and TokenValidityUnits as days, your user can refresh their session and retrieve new access and ID tokens for 10 days. The default time unit for RefreshTokenValidity in an API request is days. You can't set RefreshTokenValidity to 0. If you do, Amazon Cognito overrides the value with the default value of 30 days. Valid range is displayed below in seconds. If you don't specify otherwise in the configuration of your app client, your refresh tokens are valid for 30 days.
                AccessTokenValidity:
                  $ref: "#/components/schemas/AccessTokenValidityType"
                  description: The access token time limit. After this limit expires, your user can't use their access token. To specify the time unit for AccessTokenValidity as seconds, minutes, hours, or days, set a TokenValidityUnits value in your API request. For example, when you set AccessTokenValidity to 10 and TokenValidityUnits to hours, your user can authorize access with their access token for 10 hours. The default time unit for AccessTokenValidity in an API request is hours. Valid range is displayed below in seconds. If you don't specify otherwise in the configuration of your app client, your access tokens are valid for one hour.
                IdTokenValidity:
                  $ref: "#/components/schemas/IdTokenValidityType"
                  description: The ID token time limit. After this limit expires, your user can't use their ID token. To specify the time unit for IdTokenValidity as seconds, minutes, hours, or days, set a TokenValidityUnits value in your API request. For example, when you set IdTokenValidity as 10 and TokenValidityUnits as hours, your user can authenticate their session with their ID token for 10 hours. The default time unit for IdTokenValidity in an API request is hours. Valid range is displayed below in seconds. If you don't specify otherwise in the configuration of your app client, your ID tokens are valid for one hour.
                TokenValidityUnits:
                  $ref: "#/components/schemas/TokenValidityUnitsType"
                  description: The units that validity times are represented in. The default unit for refresh tokens is days, and the default for ID and access tokens are hours.
                ReadAttributes:
                  $ref: "#/components/schemas/ClientPermissionListType"
                  description: The list of user attributes that you want your app client to have read access to. After your user authenticates in your app, their access token authorizes them to read their own attribute value for any attribute in this list. When you don't specify the ReadAttributes for your app client, your app can read the values of email_verified, phone_number_verified, and the standard attributes of your user pool. When your user pool app client has read access to these default attributes, ReadAttributes doesn't return any information. Amazon Cognito only populates ReadAttributes in the API response if you have specified your own custom set of read attributes.
                WriteAttributes:
                  $ref: "#/components/schemas/ClientPermissionListType"
                  description: The list of user attributes that you want your app client to have write access to. After your user authenticates in your app, their access token authorizes them to set or modify their own attribute value for any attribute in this list. When you don't specify the WriteAttributes for your app client, your app can write the values of the Standard attributes of your user pool. When your user pool has write access to these default attributes, WriteAttributes doesn't return any information. Amazon Cognito only populates WriteAttributes in the API response if you have specified your own custom set of write attributes. If your app client allows users to sign in through an IdP, this array must include all attributes that you have mapped to IdP attributes. Amazon Cognito updates mapped attributes when users sign in to your application through an IdP. If your app client does not have write access to a mapped attribute, Amazon Cognito throws an error when it tries to update the attribute. For more information, see Specifying IdP Attribute Mappings for Your user pool.
                ExplicitAuthFlows:
                  $ref: "#/components/schemas/ExplicitAuthFlowsListType"
                  description: "The authentication flows that you want your user pool client to support. For each app client in your user pool, you can sign in your users with any combination of one or more flows, including with a user name and Secure Remote Password (SRP), a user name and password, or a custom authentication process that you define with Lambda functions. If you don't specify a value for ExplicitAuthFlows, your app client supports ALLOW_REFRESH_TOKEN_AUTH, ALLOW_USER_SRP_AUTH, and ALLOW_CUSTOM_AUTH. The values for authentication flow options include the following. ALLOW_USER_AUTH: Enable selection-based sign-in with USER_AUTH. This setting covers username-password, secure remote password (SRP), passwordless, and passkey authentication. This authentiation flow can do username-password and SRP authentication without other ExplicitAuthFlows permitting them. For example users can complete an SRP challenge through USER_AUTH without the flow USER_SRP_AUTH being active for the app client. This flow doesn't include CUSTOM_AUTH. To activate this setting, your user pool must be in the Essentials tier or higher. ALLOW_ADMIN_USER_PASSWORD_AUTH: Enable admin based user password authentication flow ADMIN_USER_PASSWORD_AUTH. This setting replaces the ADMIN_NO_SRP_AUTH setting. With this authentication flow, your app passes a user name and password to Amazon Cognito in the request, instead of using the Secure Remote Password (SRP) protocol to securely transmit the password. ALLOW_CUSTOM_AUTH: Enable Lambda trigger based authentication. ALLOW_USER_PASSWORD_AUTH: Enable user password-based authentication. In this flow, Amazon Cognito receives the password in the request instead of using the SRP protocol to verify passwords. ALLOW_USER_SRP_AUTH: Enable SRP-based authentication. ALLOW_REFRESH_TOKEN_AUTH: Enable authflow to refresh tokens. In some environments, you will see the values ADMIN_NO_SRP_AUTH, CUSTOM_AUTH_FLOW_ONLY, or USER_PASSWORD_AUTH. You can't assign these legacy ExplicitAuthFlows values to user pool clients at the same time as values that begin with ALLOW_, like ALLOW_USER_SRP_AUTH."
                SupportedIdentityProviders:
                  $ref: "#/components/schemas/SupportedIdentityProvidersListType"
                  description: "A list of provider names for the identity providers (IdPs) that are supported on this client. The following are supported: COGNITO, Facebook, Google, SignInWithApple, and LoginWithAmazon. You can also specify the names that you configured for the SAML and OIDC IdPs in your user pool, for example MySAMLIdP or MyOIDCIdP. This parameter sets the IdPs that managed login will display on the login page for your app client. The removal of COGNITO from this list doesn't prevent authentication operations for local users with the user pools API in an Amazon Web Services SDK. The only way to prevent SDK-based authentication is to block access with a WAF rule."
                CallbackURLs:
                  $ref: "#/components/schemas/CallbackURLsListType"
                  description: "A list of allowed redirect, or callback, URLs for managed login authentication. These URLs are the paths where you want to send your users' browsers after they complete authentication with managed login or a third-party IdP. Typically, callback URLs are the home of an application that uses OAuth or OIDC libraries to process authentication outcomes. A redirect URI must meet the following requirements: Be an absolute URI. Be registered with the authorization server. Amazon Cognito doesn't accept authorization requests with redirect_uri values that aren't in the list of CallbackURLs that you provide in this parameter. Not include a fragment component. See OAuth 2.0 - Redirection Endpoint. Amazon Cognito requires HTTPS over HTTP except for http://localhost for testing purposes only. App callback URLs such as myapp://example are also supported."
                LogoutURLs:
                  $ref: "#/components/schemas/LogoutURLsListType"
                  description: A list of allowed logout URLs for managed login authentication. When you pass logout_uri and client_id parameters to /logout, Amazon Cognito signs out your user and redirects them to the logout URL. This parameter describes the URLs that you want to be the permitted targets of logout_uri. A typical use of these URLs is when a user selects "Sign out" and you redirect them to your public homepage. For more information, see Logout endpoint.
                DefaultRedirectURI:
                  $ref: "#/components/schemas/RedirectUrlType"
                  description: The default redirect URI. In app clients with one assigned IdP, replaces redirect_uri in authentication requests. Must be in the CallbackURLs list.
                AllowedOAuthFlows:
                  $ref: "#/components/schemas/OAuthFlowsType"
                  description: The OAuth grant types that you want your app client to generate. To create an app client that generates client credentials grants, you must add client_credentials as the only allowed OAuth flow. code Use a code grant flow, which provides an authorization code as the response. This code can be exchanged for access tokens with the /oauth2/token endpoint. implicit Issue the access token (and, optionally, ID token, based on scopes) directly to your user. client_credentials Issue the access token from the /oauth2/token endpoint directly to a non-person user using a combination of the client ID and client secret.
                AllowedOAuthScopes:
                  $ref: "#/components/schemas/ScopeListType"
                  description: The OAuth, OpenID Connect (OIDC), and custom scopes that you want to permit your app client to authorize access with. Scopes govern access control to user pool self-service API operations, user data from the userInfo endpoint, and third-party APIs. Scope values include phone, email, openid, and profile. The aws.cognito.signin.user.admin scope authorizes user self-service operations. Custom scopes with resource servers authorize access to external APIs.
                AllowedOAuthFlowsUserPoolClient:
                  $ref: "#/components/schemas/BooleanType"
                  description: "Set to true to use OAuth 2.0 authorization server features in your app client. This parameter must have a value of true before you can configure the following features in your app client. CallBackURLs: Callback URLs. LogoutURLs: Sign-out redirect URLs. AllowedOAuthScopes: OAuth 2.0 scopes. AllowedOAuthFlows: Support for authorization code, implicit, and client credentials OAuth 2.0 grants. To use authorization server features, configure one of these features in the Amazon Cognito console or set AllowedOAuthFlowsUserPoolClient to true in a CreateUserPoolClient or UpdateUserPoolClient API request. If you don't set a value for AllowedOAuthFlowsUserPoolClient in a request with the CLI or SDKs, it defaults to false. When false, only SDK-based API sign-in is permitted."
                AnalyticsConfiguration:
                  $ref: "#/components/schemas/AnalyticsConfigurationType"
                  description: The user pool analytics configuration for collecting metrics and sending them to your Amazon Pinpoint campaign. In Amazon Web Services Regions where Amazon Pinpoint isn't available, user pools might not have access to analytics or might be configurable with campaigns in the US East (N. Virginia) Region. For more information, see Using Amazon Pinpoint analytics.
                PreventUserExistenceErrors:
                  $ref: "#/components/schemas/PreventUserExistenceErrorTypes"
                  description: When ENABLED, suppresses messages that might indicate a valid user exists when someone attempts sign-in. This parameters sets your preference for the errors and responses that you want Amazon Cognito APIs to return during authentication, account confirmation, and password recovery when the user doesn't exist in the user pool. When set to ENABLED and the user doesn't exist, authentication returns an error indicating either the username or password was incorrect. Account confirmation and password recovery return a response indicating a code was sent to a simulated destination. When set to LEGACY, those APIs return a UserNotFoundException exception if the user doesn't exist in the user pool. Defaults to LEGACY.
                EnableTokenRevocation:
                  $ref: "#/components/schemas/WrappedBooleanType"
                  description: Activates or deactivates token revocation in the target app client.
                EnablePropagateAdditionalUserContextData:
                  $ref: "#/components/schemas/WrappedBooleanType"
                  description: When true, your application can include additional UserContextData in authentication requests. This data includes the IP address, and contributes to analysis by threat protection features. For more information about propagation of user context data, see Adding session data to API requests. If you don’t include this parameter, you can't send the source IP address to Amazon Cognito threat protection features. You can only activate EnablePropagateAdditionalUserContextData in an app client that has a client secret.
                AuthSessionValidity:
                  $ref: "#/components/schemas/AuthSessionValidityType"
                  description: Amazon Cognito creates a session token for each API request in an authentication flow. AuthSessionValidity is the duration, in minutes, of that session token. Your user pool native user must respond to each authentication challenge before the session expires.
                RefreshTokenRotation:
                  $ref: "#/components/schemas/RefreshTokenRotationType"
                  description: The configuration of your app client for refresh token rotation. When enabled, your app client issues new ID, access, and refresh tokens when users renew their sessions with refresh tokens. When disabled, token refresh issues only ID and access tokens.
              required:
                - UserPoolId
                - ClientId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserPoolClientResponse"
  /UpdateUserPoolDomain:
    post:
      operationId: UpdateUserPoolDomain
      description: A user pool domain hosts managed login, an authorization server and web server for authentication in your application. This operation updates the branding version for user pool domains between 1 for hosted UI (classic) and 2 for managed login. It also updates the SSL certificate for user pool custom domains. Changes to the domain branding version take up to one minute to take effect for a prefix domain and up to five minutes for a custom domain. This operation doesn't change the name of your user pool domain. To change your domain, delete it with DeleteUserPoolDomain and create a new domain with CreateUserPoolDomain. You can pass the ARN of a new Certificate Manager certificate in this request. Typically, ACM certificates automatically renew and you user pool can continue to use the same ARN. But if you generate a new certificate for your custom domain name, replace the original configuration with the new ARN in this request. ACM certificates for custom domains must be in the US East (N. Virginia) Amazon Web Services Region. After you submit your request, Amazon Cognito requires up to 1 hour to distribute your new certificate to your custom domain. For more information about adding a custom domain to your user pool, see Configuring a user pool domain. Amazon Cognito evaluates Identity and Access Management (IAM) policies in requests for this API operation. For this operation, you must use IAM credentials to authorize requests, and you must grant yourself the corresponding IAM permission in a policy. Learn more Signing Amazon Web Services API Requests Using the Amazon Cognito user pools API and user pool endpoints
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityProviderService.UpdateUserPoolDomain
            default: AWSCognitoIdentityProviderService.UpdateUserPoolDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Domain:
                  $ref: "#/components/schemas/DomainType"
                  description: The name of the domain that you want to update. For custom domains, this is the fully-qualified domain name, for example auth.example.com. For prefix domains, this is the prefix alone, such as myprefix.
                UserPoolId:
                  $ref: "#/components/schemas/UserPoolIdType"
                  description: The ID of the user pool that is associated with the domain you're updating.
                ManagedLoginVersion:
                  $ref: "#/components/schemas/WrappedIntegerType"
                  description: A version number that indicates the state of managed login for your domain. Version 1 is hosted UI (classic). Version 2 is the newer managed login with the branding editor. For more information, see Managed login.
                CustomDomainConfig:
                  $ref: "#/components/schemas/CustomDomainConfigType"
                  description: The configuration for a custom domain that hosts managed login for your application. In an UpdateUserPoolDomain request, this parameter specifies an SSL certificate for the managed login hosted webserver. The certificate must be an ACM ARN in us-east-1. When you create a custom domain, the passkey RP ID defaults to the custom domain. If you had a prefix domain active, this will cause passkey integration for your prefix domain to stop working due to a mismatch in RP ID. To keep the prefix domain passkey integration working, you can explicitly set RP ID to the prefix domain.
              required:
                - Domain
                - UserPoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserPoolDomainResponse"
  /VerifySoftwareToken:
    post:
      operationId: VerifySoftwareToken
      description: Registers the current user's time-based one-time password (TOTP) authenticator with a code generated in their authenticator app from a private key that's supplied by your user pool. Marks the user's software token MFA status as "verified" if successful. The request takes an access token or a session string, but not both. Amazon Cognito doesn't evaluate Identity and Access Management (IAM) policies in requests for this API operation. For this operation, you can't use IAM credentials to authorize requests, and you can't grant IAM permissions in policies. For more information about authorization models in Amazon Cognito, see Using the Amazon Cognito user pools API and user pool endpoints.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityProviderService.VerifySoftwareToken
            default: AWSCognitoIdentityProviderService.VerifySoftwareToken
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccessToken:
                  $ref: "#/components/schemas/TokenModelType"
                  description: A valid access token that Amazon Cognito issued to the currently signed-in user. Must include a scope claim for aws.cognito.signin.user.admin.
                Session:
                  $ref: "#/components/schemas/SessionType"
                  description: The session ID from an AssociateSoftwareToken request.
                UserCode:
                  $ref: "#/components/schemas/SoftwareTokenMFAUserCodeType"
                  description: A TOTP that the user generated in their configured authenticator app.
                FriendlyDeviceName:
                  $ref: "#/components/schemas/StringType"
                  description: A friendly name for the device that's running the TOTP authenticator.
              required:
                - UserCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifySoftwareTokenResponse"
  /VerifyUserAttribute:
    post:
      operationId: VerifyUserAttribute
      description: Submits a verification code for a signed-in user who has added or changed a value of an auto-verified attribute. When successful, the user's attribute becomes verified and the attribute email_verified or phone_number_verified becomes true. If your user pool requires verification before Amazon Cognito updates the attribute value, this operation updates the affected attribute to its pending value. Authorize this action with a signed-in user's access token. It must include the scope aws.cognito.signin.user.admin. Amazon Cognito doesn't evaluate Identity and Access Management (IAM) policies in requests for this API operation. For this operation, you can't use IAM credentials to authorize requests, and you can't grant IAM permissions in policies. For more information about authorization models in Amazon Cognito, see Using the Amazon Cognito user pools API and user pool endpoints.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityProviderService.VerifyUserAttribute
            default: AWSCognitoIdentityProviderService.VerifyUserAttribute
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccessToken:
                  $ref: "#/components/schemas/TokenModelType"
                  description: A valid access token that Amazon Cognito issued to the currently signed-in user. Must include a scope claim for aws.cognito.signin.user.admin.
                AttributeName:
                  $ref: "#/components/schemas/AttributeNameType"
                  description: The name of the attribute that you want to verify.
                Code:
                  $ref: "#/components/schemas/ConfirmationCodeType"
                  description: The verification code that your user pool sent to the added or changed attribute, for example the user's email address.
              required:
                - AccessToken
                - AttributeName
                - Code
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyUserAttributeResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    UserPoolIdType:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+_[0-9a-zA-Z]+"
    CustomAttributesListType:
      type: array
      items:
        $ref: "#/components/schemas/SchemaAttributeType"
    SchemaAttributeType:
      description: "A list of the user attributes and their properties in your user pool. The attribute schema contains standard attributes, custom attributes with a custom: prefix, and developer attributes with a dev: prefix. For more information, see User pool attributes. Developer-only dev: attributes are a legacy feature of user pools, and are read-only to all app clients. You can create and update developer-only attributes only with IAM-authenticated API operations. Use app client read/write permissions instead."
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/CustomAttributeNameType"
          description: The name of your user pool attribute. When you create or update a user pool, adding a schema attribute creates a custom or developer-only attribute. When you add an attribute with a Name value of MyAttribute, Amazon Cognito creates the custom attribute custom:MyAttribute. When DeveloperOnlyAttribute is true, Amazon Cognito creates your attribute as dev:MyAttribute. In an operation that describes a user pool, Amazon Cognito returns this value as value for standard attributes, custom:value for custom attributes, and dev:value for developer-only attributes..
        AttributeDataType:
          $ref: "#/components/schemas/AttributeDataType"
          description: "The data format of the values for your attribute. When you choose an AttributeDataType, Amazon Cognito validates the input against the data type. A custom attribute value in your user's ID token is always a string, for example \"custom:isMember\" : \"true\" or \"custom:YearsAsMember\" : \"12\"."
        DeveloperOnlyAttribute:
          $ref: "#/components/schemas/BooleanType"
          description: You should use WriteAttributes in the user pool client to control how attributes can be mutated for new use cases instead of using DeveloperOnlyAttribute. Specifies whether the attribute type is developer only. This attribute can only be modified by an administrator. Users won't be able to modify this attribute using their access token. For example, DeveloperOnlyAttribute can be modified using AdminUpdateUserAttributes but can't be updated using UpdateUserAttributes.
        Mutable:
          $ref: "#/components/schemas/BooleanType"
          description: Specifies whether the value of the attribute can be changed. Any user pool attribute whose value you map from an IdP attribute must be mutable, with a parameter value of true. Amazon Cognito updates mapped attributes when users sign in to your application through an IdP. If an attribute is immutable, Amazon Cognito throws an error when it attempts to update the attribute. For more information, see Specifying Identity Provider Attribute Mappings for Your User Pool.
        Required:
          $ref: "#/components/schemas/BooleanType"
          description: Specifies whether a user pool attribute is required. If the attribute is required and the user doesn't provide a value, registration or sign-in will fail.
        NumberAttributeConstraints:
          $ref: "#/components/schemas/NumberAttributeConstraintsType"
          description: Specifies the constraints for an attribute of the number type.
        StringAttributeConstraints:
          $ref: "#/components/schemas/StringAttributeConstraintsType"
          description: Specifies the constraints for an attribute of the string type.
    CustomAttributeNameType:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
    AttributeDataType:
      type: string
      enum:
        - String
        - Number
        - DateTime
        - Boolean
    BooleanType:
      type: boolean
    NumberAttributeConstraintsType:
      description: The minimum and maximum values of an attribute that is of the number type, for example custom:age.
      type: object
      properties:
        MinValue:
          $ref: "#/components/schemas/StringType"
          description: The minimum value of an attribute that is of the number data type.
        MaxValue:
          $ref: "#/components/schemas/StringType"
          description: The maximum length of a number attribute value. Must be a number less than or equal to 2^1023, represented as a string with a length of 131072 characters or fewer.
    StringType:
      type: string
      minLength: 0
      maxLength: 131072
    StringAttributeConstraintsType:
      description: The minimum and maximum length values of an attribute that is of the string type, for example custom:department.
      type: object
      properties:
        MinLength:
          $ref: "#/components/schemas/StringType"
          description: The minimum length of a string attribute value.
        MaxLength:
          $ref: "#/components/schemas/StringType"
          description: The maximum length of a string attribute value. Must be a number less than or equal to 2^1023, represented as a string with a length of 131072 characters or fewer.
    AddCustomAttributesResponse:
      description: Represents the response from the server for the request to add custom attributes.
      type: object
    ClientIdType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w+]+"
    ClientSecretType:
      type: string
      minLength: 24
      maxLength: 64
      pattern: "[\\w+]+"
    AddUserPoolClientSecretResponse:
      description: The response from creating a new client secret.
      type: object
      properties:
        ClientSecretDescriptor:
          $ref: "#/components/schemas/ClientSecretDescriptorType"
          description: The details of the newly created client secret, including its unique identifier and creation timestamp. The ClientSecretValue is only returned when Amazon Cognito generates the secret. For custom secrets that you provide, the ClientSecretValue is not included in the response.
    ClientSecretDescriptorType:
      description: Contains information about a client secret, including its unique identifier, value, and creation timestamp.
      type: object
      properties:
        ClientSecretId:
          $ref: "#/components/schemas/ClientSecretIdType"
          description: The unique identifier for the client secret. This identifier follows the format `<client-id>`--`<epoch-create-time>`.
        ClientSecretValue:
          $ref: "#/components/schemas/ClientSecretType"
          description: The actual secret value. This is only returned when creating a new secret and only if Amazon Cognito generated the secret. For custom secrets that you provide, this field is not included in the response.
        ClientSecretCreateDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the client secret was created.
    ClientSecretIdType:
      type: string
      minLength: 1
      maxLength: 128
    DateType:
      type: string
      format: date-time
    UsernameType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
    GroupNameType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
    ClientMetadataType:
      type: object
      properties: {}
    AdminConfirmSignUpResponse:
      description: Represents the response from the server for the request to confirm registration.
      type: object
    AttributeListType:
      type: array
      items:
        $ref: "#/components/schemas/AttributeType"
    AttributeType:
      description: The name and value of a user attribute.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/AttributeNameType"
          description: The name of the attribute, for example email or custom:department. In some older user pools, the regex pattern for acceptable values of this parameter is [\p{L}\p{M}\p{S}\p{N}\p{P}]+. Older pools will eventually be updated to use the new pattern. Affected user pools are those created before May 2024 in US East (N. Virginia), US East (Ohio), US West (N. California), US West (Oregon), Asia Pacific (Mumbai), Asia Pacific (Tokyo), Asia Pacific (Seoul), Asia Pacific (Singapore), Asia Pacific (Sydney), Canada (Central), Europe (Frankfurt), Europe (Ireland), Europe (London), Europe (Paris), Europe (Stockholm), Middle East (Bahrain), and South America (São Paulo).
        Value:
          $ref: "#/components/schemas/AttributeValueType"
          description: The value of the attribute.
      required:
        - Name
    AttributeNameType:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\t\\n\\r ]+"
    AttributeValueType:
      type: string
      maxLength: 2048
    PasswordType:
      type: string
      maxLength: 256
      pattern: "[\\S]+"
    ForceAliasCreation:
      type: boolean
    MessageActionType:
      type: string
      enum:
        - RESEND
        - SUPPRESS
    DeliveryMediumListType:
      type: array
      items:
        $ref: "#/components/schemas/DeliveryMediumType"
    DeliveryMediumType:
      type: string
      enum:
        - SMS
        - EMAIL
    AdminCreateUserResponse:
      description: Represents the response from the server to the request to create the user.
      type: object
      properties:
        User:
          $ref: "#/components/schemas/UserType"
          description: The new user's profile details.
    UserType:
      description: A user profile in a Amazon Cognito user pool.
      type: object
      properties:
        Username:
          $ref: "#/components/schemas/UsernameType"
          description: The user's username.
        Attributes:
          $ref: "#/components/schemas/AttributeListType"
          description: Names and values of a user's attributes, for example email.
        UserCreateDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was created. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        UserLastModifiedDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was modified. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        Enabled:
          $ref: "#/components/schemas/BooleanType"
          description: Indicates whether the user's account is enabled or disabled.
        UserStatus:
          $ref: "#/components/schemas/UserStatusType"
          description: "The user status. This can be one of the following: UNCONFIRMED: User has been created but not confirmed. CONFIRMED: User has been confirmed. EXTERNAL_PROVIDER: User signed in with a third-party IdP. RESET_REQUIRED: User is confirmed, but the user must request a code and reset their password before they can sign in. FORCE_CHANGE_PASSWORD: The user is confirmed and the user can sign in using a temporary password, but on first sign-in, the user must change their password to a new value before doing anything else. The statuses ARCHIVED, UNKNOWN, and COMPROMISED are no longer used."
        MFAOptions:
          $ref: "#/components/schemas/MFAOptionListType"
          description: The user's MFA configuration.
    UserStatusType:
      type: string
      enum:
        - UNCONFIRMED
        - CONFIRMED
        - ARCHIVED
        - COMPROMISED
        - UNKNOWN
        - RESET_REQUIRED
        - FORCE_CHANGE_PASSWORD
        - EXTERNAL_PROVIDER
    MFAOptionListType:
      type: array
      items:
        $ref: "#/components/schemas/MFAOptionType"
    MFAOptionType:
      description: This data type is no longer supported. Applies only to SMS multi-factor authentication (MFA) configurations. Does not apply to time-based one-time password (TOTP) software token MFA configurations.
      type: object
      properties:
        DeliveryMedium:
          $ref: "#/components/schemas/DeliveryMediumType"
          description: The delivery medium to send the MFA code. You can use this parameter to set only the SMS delivery medium value.
        AttributeName:
          $ref: "#/components/schemas/AttributeNameType"
          description: The attribute name of the MFA option type. The only valid value is phone_number.
    AttributeNameListType:
      type: array
      items:
        $ref: "#/components/schemas/AttributeNameType"
    AdminDeleteUserAttributesResponse:
      description: Represents the response received from the server for a request to delete user attributes.
      type: object
    ProviderUserIdentifierType:
      description: The characteristics of a source or destination user for linking a federated user profile to a local user profile.
      type: object
      properties:
        ProviderName:
          $ref: "#/components/schemas/ProviderNameType"
          description: The name of the provider, such as Facebook, Google, or Login with Amazon.
        ProviderAttributeName:
          $ref: "#/components/schemas/StringType"
          description: The name of the provider attribute to link to, such as NameID.
        ProviderAttributeValue:
          $ref: "#/components/schemas/StringType"
          description: The value of the provider attribute to link to, such as xxxxx_account.
    ProviderNameType:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\p{Z}]+"
    AdminDisableProviderForUserResponse:
      type: object
    AdminDisableUserResponse:
      description: Represents the response received from the server to disable the user as an administrator.
      type: object
    AdminEnableUserResponse:
      description: Represents the response from the server for the request to enable a user as an administrator.
      type: object
    DeviceKeyType:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+_[0-9a-f-]+"
    AdminGetDeviceResponse:
      description: Gets the device response, as an administrator.
      type: object
      properties:
        Device:
          $ref: "#/components/schemas/DeviceType"
          description: Details of the requested device. Includes device information, last-accessed and created dates, and the device key.
      required:
        - Device
    DeviceType:
      description: Information about a user's device that they've registered for device SRP authentication in your application. For more information, see Working with user devices in your user pool.
      type: object
      properties:
        DeviceKey:
          $ref: "#/components/schemas/DeviceKeyType"
          description: The device key, for example us-west-2_EXAMPLE-a1b2c3d4-5678-90ab-cdef-EXAMPLE22222.
        DeviceAttributes:
          $ref: "#/components/schemas/AttributeListType"
          description: Metadata about a user's device, like name and last-access source IP.
        DeviceCreateDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was created. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        DeviceLastModifiedDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was modified. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        DeviceLastAuthenticatedDate:
          $ref: "#/components/schemas/DateType"
          description: The date when the user last signed in with the device.
    AdminGetUserResponse:
      description: Represents the response from the server from the request to get the specified user as an administrator.
      type: object
      properties:
        Username:
          $ref: "#/components/schemas/UsernameType"
          description: The username of the user that you requested.
        UserAttributes:
          $ref: "#/components/schemas/AttributeListType"
          description: 'An array of name-value pairs of user attributes and their values, for example "email": "testuser@example.com".'
        UserCreateDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was created. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        UserLastModifiedDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was modified. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        Enabled:
          $ref: "#/components/schemas/BooleanType"
          description: Indicates whether the user is activated for sign-in.
        UserStatus:
          $ref: "#/components/schemas/UserStatusType"
          description: "The user's status. Can be one of the following: UNCONFIRMED - User has been created but not confirmed. CONFIRMED - User has been confirmed. UNKNOWN - User status isn't known. RESET_REQUIRED - User is confirmed, but the user must request a code and reset their password before they can sign in. FORCE_CHANGE_PASSWORD - The user is confirmed and the user can sign in using a temporary password, but on first sign-in, the user must change their password to a new value before doing anything else. EXTERNAL_PROVIDER - The user signed in with a third-party identity provider."
        MFAOptions:
          $ref: "#/components/schemas/MFAOptionListType"
          description: This response parameter is no longer supported. It provides information only about SMS MFA configurations. It doesn't provide information about time-based one-time password (TOTP) software token MFA configurations. To look up information about either type of MFA configuration, use UserMFASettingList instead.
        PreferredMfaSetting:
          $ref: "#/components/schemas/StringType"
          description: The user's preferred MFA. Users can prefer SMS message, email message, or TOTP MFA.
        UserMFASettingList:
          $ref: "#/components/schemas/UserMFASettingListType"
          description: The MFA options that are activated for the user. The possible values in this list are SMS_MFA, EMAIL_OTP, and SOFTWARE_TOKEN_MFA.
      required:
        - Username
    UserMFASettingListType:
      type: array
      items:
        $ref: "#/components/schemas/StringType"
    AuthFlowType:
      type: string
      enum:
        - USER_SRP_AUTH
        - REFRESH_TOKEN_AUTH
        - REFRESH_TOKEN
        - CUSTOM_AUTH
        - ADMIN_NO_SRP_AUTH
        - USER_PASSWORD_AUTH
        - ADMIN_USER_PASSWORD_AUTH
        - USER_AUTH
    AuthParametersType:
      type: object
      properties: {}
    AnalyticsMetadataType:
      description: Information that your application adds to authentication requests. Applies an endpoint ID to the analytics data that your user pool sends to Amazon Pinpoint. An endpoint ID uniquely identifies a mobile device, email address or phone number that can receive messages from Amazon Pinpoint analytics. For more information about Amazon Web Services Regions that can contain Amazon Pinpoint resources for use with Amazon Cognito user pools, see Using Amazon Pinpoint analytics with Amazon Cognito user pools.
      type: object
      properties:
        AnalyticsEndpointId:
          $ref: "#/components/schemas/StringType"
          description: The endpoint ID. Information that you want to pass to Amazon Pinpoint about where to send notifications.
    ContextDataType:
      description: Contextual user data used for evaluating the risk of an authentication event by user pool threat protection.
      type: object
      properties:
        IpAddress:
          $ref: "#/components/schemas/StringType"
          description: The source IP address of your user's device.
        ServerName:
          $ref: "#/components/schemas/StringType"
          description: The name of your application's service endpoint.
        ServerPath:
          $ref: "#/components/schemas/StringType"
          description: The path of your application's service endpoint.
        HttpHeaders:
          $ref: "#/components/schemas/HttpHeaderList"
          description: The HTTP headers from your user's authentication request.
        EncodedData:
          $ref: "#/components/schemas/StringType"
          description: Encoded device-fingerprint details that your app collected with the Amazon Cognito context data collection library. For more information, see Adding user device and session data to API requests.
      required:
        - IpAddress
        - ServerName
        - ServerPath
        - HttpHeaders
    HttpHeaderList:
      type: array
      items:
        $ref: "#/components/schemas/HttpHeader"
    HttpHeader:
      description: The HTTP header in the ContextData parameter.
      type: object
      properties:
        headerName:
          $ref: "#/components/schemas/StringType"
          description: The header name.
        headerValue:
          $ref: "#/components/schemas/StringType"
          description: The header value.
    SessionType:
      type: string
      minLength: 20
      maxLength: 2048
    AdminInitiateAuthResponse:
      description: Initiates the authentication response, as an administrator.
      type: object
      properties:
        ChallengeName:
          $ref: "#/components/schemas/ChallengeNameType"
          description: "The name of the challenge that you're responding to with this call. This is returned in the AdminInitiateAuth response if you must pass another challenge. Possible challenges include the following: All of the following challenges require USERNAME and, when the app client has a client secret, SECRET_HASH in the parameters. Include a DEVICE_KEY for device authentication. WEB_AUTHN: Respond to the challenge with the results of a successful authentication with a WebAuthn authenticator, or passkey, as CREDENTIAL. Examples of WebAuthn authenticators include biometric devices and security keys. PASSWORD: Respond with the user's password as PASSWORD. PASSWORD_SRP: Respond with the initial SRP secret as SRP_A. SELECT_CHALLENGE: Respond with a challenge selection as ANSWER. It must be one of the challenge types in the AvailableChallenges response parameter. Add the parameters of the selected challenge, for example USERNAME and SMS_OTP. SMS_MFA: Respond with the code that your user pool delivered in an SMS message, as SMS_MFA_CODE EMAIL_MFA: Respond with the code that your user pool delivered in an email message, as EMAIL_MFA_CODE EMAIL_OTP: Respond with the code that your user pool delivered in an email message, as EMAIL_OTP_CODE . SMS_OTP: Respond with the code that your user pool delivered in an SMS message, as SMS_OTP_CODE. PASSWORD_VERIFIER: Respond with the second stage of SRP secrets as PASSWORD_CLAIM_SIGNATURE, PASSWORD_CLAIM_SECRET_BLOCK, and TIMESTAMP. CUSTOM_CHALLENGE: This is returned if your custom authentication flow determines that the user should pass another challenge before tokens are issued. The parameters of the challenge are determined by your Lambda function and issued in the ChallengeParameters of a challenge response. DEVICE_SRP_AUTH: Respond with the initial parameters of device SRP authentication. For more information, see Signing in with a device. DEVICE_PASSWORD_VERIFIER: Respond with PASSWORD_CLAIM_SIGNATURE, PASSWORD_CLAIM_SECRET_BLOCK, and TIMESTAMP after client-side SRP calculations. For more information, see Signing in with a device. NEW_PASSWORD_REQUIRED: For users who are required to change their passwords after successful first login. Respond to this challenge with NEW_PASSWORD and any required attributes that Amazon Cognito returned in the requiredAttributes parameter. You can also set values for attributes that aren't required by your user pool and that your app client can write. Amazon Cognito only returns this challenge for users who have temporary passwords. When you create passwordless users, you must provide values for all required attributes. In a NEW_PASSWORD_REQUIRED challenge response, you can't modify a required attribute that already has a value. In AdminRespondToAuthChallenge or RespondToAuthChallenge, set a value for any keys that Amazon Cognito returned in the requiredAttributes parameter, then use the AdminUpdateUserAttributes or UpdateUserAttributes API operation to modify the value of any additional attributes. MFA_SETUP: For users who are required to setup an MFA factor before they can sign in. The MFA types activated for the user pool will be listed in the challenge parameters MFAS_CAN_SETUP value. To set up time-based one-time password (TOTP) MFA, use the session returned in this challenge from InitiateAuth or AdminInitiateAuth as an input to AssociateSoftwareToken. Then, use the session returned by VerifySoftwareToken as an input to RespondToAuthChallenge or AdminRespondToAuthChallenge with challenge name MFA_SETUP to complete sign-in. To set up SMS or email MFA, collect a phone_number or email attribute for the user. Then restart the authentication flow with an InitiateAuth or AdminInitiateAuth request."
        Session:
          $ref: "#/components/schemas/SessionType"
          description: The session that must be passed to challenge-response requests. If an AdminInitiateAuth or AdminRespondToAuthChallenge API request results in another authentication challenge, Amazon Cognito returns a session ID and the parameters of the next challenge. Pass this session ID in the Session parameter of AdminRespondToAuthChallenge.
        ChallengeParameters:
          type: object
          properties: {}
          description: The parameters of an authentication challenge. Amazon Cognito returns challenge parameters as a guide to the responses your user or application must provide for the returned ChallengeName. Calculate responses to the challenge parameters and pass them in the ChallengeParameters of AdminRespondToAuthChallenge. All challenges require USERNAME and, when the app client has a client secret, SECRET_HASH. In SRP challenges, Amazon Cognito returns the username attribute in USER_ID_FOR_SRP instead of any email address, preferred username, or phone number alias that you might have specified in your AdminInitiateAuth request. You must use the username and not an alias in the ChallengeResponses of your challenge response.
        AuthenticationResult:
          $ref: "#/components/schemas/AuthenticationResultType"
          description: The outcome of successful authentication. This is only returned if the user pool has no additional challenges to return. If Amazon Cognito returns another challenge, the response includes ChallengeName, ChallengeParameters, and Session so that your user can answer the challenge.
        AvailableChallenges:
          $ref: "#/components/schemas/AvailableChallengeListType"
          description: This response parameter lists the available authentication challenges that users can select from in choice-based authentication. For example, they might be able to choose between passkey authentication, a one-time password from an SMS message, and a traditional password.
    ChallengeNameType:
      type: string
      enum:
        - SMS_MFA
        - EMAIL_OTP
        - SOFTWARE_TOKEN_MFA
        - SELECT_MFA_TYPE
        - MFA_SETUP
        - PASSWORD_VERIFIER
        - CUSTOM_CHALLENGE
        - SELECT_CHALLENGE
        - DEVICE_SRP_AUTH
        - DEVICE_PASSWORD_VERIFIER
        - ADMIN_NO_SRP_AUTH
        - NEW_PASSWORD_REQUIRED
        - SMS_OTP
        - PASSWORD
        - WEB_AUTHN
        - PASSWORD_SRP
    AuthenticationResultType:
      description: The object that your application receives after authentication. Contains tokens and information for device authentication.
      type: object
      properties:
        AccessToken:
          $ref: "#/components/schemas/TokenModelType"
          description: Your user's access token.
        ExpiresIn:
          $ref: "#/components/schemas/IntegerType"
          description: The expiration period of the authentication result in seconds.
        TokenType:
          $ref: "#/components/schemas/StringType"
          description: The intended use of the token, for example Bearer.
        RefreshToken:
          $ref: "#/components/schemas/TokenModelType"
          description: Your user's refresh token.
        IdToken:
          $ref: "#/components/schemas/TokenModelType"
          description: Your user's ID token.
        NewDeviceMetadata:
          $ref: "#/components/schemas/NewDeviceMetadataType"
          description: The new device metadata from an authentication result.
    TokenModelType:
      type: string
      pattern: "[A-Za-z0-9-_=.]+"
    IntegerType:
      type: integer
    NewDeviceMetadataType:
      description: Information that your user pool responds with in AuthenticationResultwhen you configure it to remember devices and a user signs in with an unrecognized device. Amazon Cognito presents a new device key that you can use to set up device authentication in a "Remember me on this device" authentication model.
      type: object
      properties:
        DeviceKey:
          $ref: "#/components/schemas/DeviceKeyType"
          description: The device key, an identifier used in generating the DEVICE_PASSWORD_VERIFIER for device SRP authentication.
        DeviceGroupKey:
          $ref: "#/components/schemas/StringType"
          description: The device group key, an identifier used in generating the DEVICE_PASSWORD_VERIFIER for device SRP authentication.
    AvailableChallengeListType:
      type: array
      items:
        $ref: "#/components/schemas/ChallengeNameType"
    AdminLinkProviderForUserResponse:
      type: object
    QueryLimitType:
      type: integer
      minimum: 0
      maximum: 60
    SearchPaginationTokenType:
      type: string
      minLength: 1
      pattern: "[\\S]+"
    AdminListDevicesResponse:
      description: Lists the device's response, as an administrator.
      type: object
      properties:
        Devices:
          $ref: "#/components/schemas/DeviceListType"
          description: An array of devices and their information. Each entry that's returned includes device information, last-accessed and created dates, and the device key.
        PaginationToken:
          $ref: "#/components/schemas/SearchPaginationTokenType"
          description: The identifier that Amazon Cognito returned with the previous request to this operation. When you include a pagination token in your request, Amazon Cognito returns the next set of items in the list. By use of this token, you can paginate through the full list of items.
    DeviceListType:
      type: array
      items:
        $ref: "#/components/schemas/DeviceType"
    PaginationKey:
      type: string
      minLength: 1
      maxLength: 131072
      pattern: "[\\S]+"
    AdminListGroupsForUserResponse:
      type: object
      properties:
        Groups:
          $ref: "#/components/schemas/GroupListType"
          description: An array of groups and information about them.
        NextToken:
          $ref: "#/components/schemas/PaginationKey"
          description: The identifier that Amazon Cognito returned with the previous request to this operation. When you include a pagination token in your request, Amazon Cognito returns the next set of items in the list. By use of this token, you can paginate through the full list of items.
    GroupListType:
      type: array
      items:
        $ref: "#/components/schemas/GroupType"
    GroupType:
      description: "A user pool group. Contains details about the group and the way that it contributes to IAM role decisions with identity pools. Identity pools can make decisions about the IAM role to assign based on groups: users get credentials for the role associated with their highest-priority group."
      type: object
      properties:
        GroupName:
          $ref: "#/components/schemas/GroupNameType"
          description: The name of the group.
        UserPoolId:
          $ref: "#/components/schemas/UserPoolIdType"
          description: The ID of the user pool that contains the group.
        Description:
          $ref: "#/components/schemas/DescriptionType"
          description: A friendly description of the group.
        RoleArn:
          $ref: "#/components/schemas/ArnType"
          description: The ARN of the IAM role associated with the group. If a group has the highest priority of a user's groups, users who authenticate with an identity pool get credentials for the RoleArn that's associated with the group.
        Precedence:
          $ref: "#/components/schemas/PrecedenceType"
          description: A non-negative integer value that specifies the precedence of this group relative to the other groups that a user can belong to in the user pool. Zero is the highest precedence value. Groups with lower Precedence values take precedence over groups with higher ornull Precedence values. If a user belongs to two or more groups, it is the group with the lowest precedence value whose role ARN is given in the user's tokens for the cognito:roles and cognito:preferred_role claims. Two groups can have the same Precedence value. If this happens, neither group takes precedence over the other. If two groups with the same Precedence have the same role ARN, that role is used in the cognito:preferred_role claim in tokens for users in each group. If the two groups have different role ARNs, the cognito:preferred_role claim isn't set in users' tokens. The default Precedence value is null.
        LastModifiedDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was modified. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        CreationDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was created. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
    DescriptionType:
      type: string
      maxLength: 2048
    ArnType:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w+=/,.@-]+:[\w+=/,.@-]+:([\w+=/,.@-]*)?:[0-9]+:[\w+=/,.@-]+(:[\w+=/,.@-]+)?(:[\w+=/,.@-]+)?
    PrecedenceType:
      type: integer
      minimum: 0
    AdminListUserAuthEventsResponse:
      type: object
      properties:
        AuthEvents:
          $ref: "#/components/schemas/AuthEventsType"
          description: The response object. It includes the EventID, EventType, CreationDate, EventRisk, and EventResponse.
        NextToken:
          $ref: "#/components/schemas/PaginationKey"
          description: The identifier that Amazon Cognito returned with the previous request to this operation. When you include a pagination token in your request, Amazon Cognito returns the next set of items in the list. By use of this token, you can paginate through the full list of items.
    AuthEventsType:
      type: array
      items:
        $ref: "#/components/schemas/AuthEventType"
    AuthEventType:
      description: One authentication event that Amazon Cognito logged in a user pool with threat protection active. Contains user and device metadata and a risk assessment from your user pool.
      type: object
      properties:
        EventId:
          $ref: "#/components/schemas/StringType"
          description: The event ID.
        EventType:
          $ref: "#/components/schemas/EventType"
          description: The type of authentication event.
        CreationDate:
          $ref: "#/components/schemas/DateType"
          description: The date and time when the item was created. Amazon Cognito returns this timestamp in UNIX epoch time format. Your SDK might render the output in a human-readable format like ISO 8601 or a Java Date object.
        EventResponse:
          $ref: "#/components/schemas/EventResponseType"
          description: The event response.
        EventRisk:
          $ref: "#/components/schemas/EventRiskType"
          description: The threat evaluation from your user pool about an event. Contains information about whether your user pool detected compromised credentials, whether the event triggered an automated response, and the level of risk.
        ChallengeResponses:
          $ref: "#/components/schemas/ChallengeResponseListType"
          description: A list of the challenges that the user was requested to answer, for example Password, and the result, for example Success.
        EventContextData:
          $ref: "#/components/schemas/EventContextDataType"
          description: The user context data captured at the time of an event request. This value provides additional information about the client from which event the request is received.
        EventFeedback:
          $ref: "#/components/schemas/EventFeedbackType"
          description: The UpdateAuthEventFeedback or AdminUpdateAuthEventFeedback feedback that you or your user provided in response to the event. A value of Valid indicates that you disagreed with the level of risk that your user pool assigned, and evaluated a session to be valid, or likely safe. A value of Invalid indicates that you agreed with the user pool risk level and evaluated a session to be invalid, or likely malicious.
    EventType:
      type: string
      enum:
        - SignIn
        - SignUp
        - ForgotPassword
        - PasswordChange
        - ResendCode
    EventResponseType:
      type: string
      enum:
        - Pass
        - Fail
        - InProgress
    EventRiskType:
      description: The risk evaluation by adaptive authentication, as displayed in an AdminListUserAuthEvents response. Contains evaluations of compromised-credentials detection and assessed risk level and action taken by adaptive authentication.
      type: object
      properties:
        RiskDecision:
          $ref: "#/components/schemas/RiskDecisionType"
          description: The action taken by adaptive authentication. If NoRisk, your user pool took no action. If AccountTakeover, your user pool applied the adaptive authentication automated response that you configured. If Block, your user pool prevented the attempt.
        RiskLevel:
          $ref: "#/components/schemas/RiskLevelType"
          description: The risk level that adaptive authentication assessed for the authentication event.
        CompromisedCredentialsDetected:
          $ref: "#/components/schemas/WrappedBooleanType"
          description: Indicates whether compromised credentials were detected during an authentication event.
    RiskDecisionType:
      type: string
      enum:
        - NoRisk
        - AccountTakeover
        - Block
    RiskLevelType:
      type: string
      enum:
        - Low
        - Medium
        - High
    WrappedBooleanType:
      type: boolean
    ChallengeResponseListType:
      type: array
      items:
        $ref: "#/components/schemas/ChallengeResponseType"
    ChallengeResponseType:
      description: "The responses to the challenge that you received in the previous request. Each challenge has its own required response parameters. The following examples are partial JSON request bodies that highlight challenge-response parameters. You must provide a SECRET_HASH parameter in all challenge responses to an app client that has a client secret. Include a DEVICE_KEY for device authentication. SELECT_CHALLENGE \"ChallengeName\": \"SELECT_CHALLENGE\", \"ChallengeResponses\": { \"USERNAME\": \"[username]\", \"ANSWER\": \"[Challenge name]\"} Available challenges are PASSWORD, PASSWORD_SRP, EMAIL_OTP, SMS_OTP, and WEB_AUTHN. Complete authentication in the SELECT_CHALLENGE response for PASSWORD, PASSWORD_SRP, and WEB_AUTHN: \"ChallengeName\": \"SELECT_CHALLENGE\", \"ChallengeResponses\": { \"ANSWER\": \"WEB_AUTHN\", \"USERNAME\": \"[username]\", \"CREDENTIAL\": \"[AuthenticationResponseJSON]\"} See AuthenticationResponseJSON. \"ChallengeName\": \"SELECT_CHALLENGE\", \"ChallengeResponses\": { \"ANSWER\": \"PASSWORD\", \"USERNAME\": \"[username]\", \"PASSWORD\": \"[password]\"} \"ChallengeName\": \"SELECT_CHALLENGE\", \"ChallengeResponses\": { \"ANSWER\": \"PASSWORD_SRP\", \"USERNAME\": \"[username]\", \"SRP_A\": \"[SRP_A]\"} For SMS_OTP and EMAIL_OTP, respond with the username and answer. Your user pool will send a code for the user to submit in the next challenge response. \"ChallengeName\": \"SELECT_CHALLENGE\", \"ChallengeResponses\": { \"ANSWER\": \"SMS_OTP\", \"USERNAME\": \"[username]\"} \"ChallengeName\": \"SELECT_CHALLENGE\", \"ChallengeResponses\": { \"ANSWER\": \"EMAIL_OTP\", \"USERNAME\": \"[username]\"} WEB_AUTHN \"ChallengeName\": \"WEB_AUTHN\", \"ChallengeResponses\": { \"USERNAME\": \"[username]\", \"CREDENTIAL\": \"[AuthenticationResponseJSON]\"} See AuthenticationResponseJSON. PASSWORD \"ChallengeName\": \"PASSWORD\", \"ChallengeResponses\": { \"USERNAME\": \"[username]\", \"PASSWORD\": \"[password]\"} PASSWORD_SRP \"ChallengeName\": \"PASSWORD_SRP\", \"ChallengeResponses\": { \"USERNAME\": \"[username]\", \"SRP_A\": \"[SRP_A]\"} SMS_OTP \"ChallengeName\": \"SMS_OTP\", \"ChallengeResponses\": {\"SMS_OTP_CODE\": \"[code]\", \"USERNAME\": \"[username]\"} EMAIL_OTP \"ChallengeName\": \"EMAIL_OTP\", \"ChallengeResponses\": {\"EMAIL_OTP_CODE\": \"[code]\", \"USERNAME\": \"[username]\"} SMS_MFA \"ChallengeName\": \"SMS_MFA\", \"ChallengeResponses\": {\"SMS_MFA_CODE\": \"[code]\", \"USERNAME\": \"[username]\"} PASSWORD_VERIFIER This challenge response is part of the SRP flow. Amazon Cognito requires that your application respond to this challenge within a few seconds. When the response time exceeds this period, your user pool returns a NotAuthorizedException error. \"ChallengeName\": \"PASSWORD_VERIFIER\", \"ChallengeResponses\": {\"PASSWORD_CLAIM_SIGNATURE\": \"[claim_signature]\", \"PASSWORD_CLAIM_SECRET_BLOCK\": \"[secret_block]\", \"TIMESTAMP\": [timestamp], \"USERNAME\": \"[username]\"} CUSTOM_CHALLENGE \"ChallengeName\": \"CUSTOM_CHALLENGE\", \"ChallengeResponses\": {\"USERNAME\": \"[username]\", \"ANSWER\": \"[challenge_answer]\"} NEW_PASSWORD_REQUIRED \"ChallengeName\": \"NEW_PASSWORD_REQUIRED\", \"ChallengeResponses\": {\"NEW_PASSWORD\": \"[new_password]\", \"USERNAME\": \"[username]\"} To set any required attributes that InitiateAuth returned in an requiredAttributes parameter, add \"userAttributes.[attribute_name]\": \"[attribute_value]\". This parameter can also set values for writable attributes that aren't required by your user pool. In a NEW_PASSWORD_REQUIRED challenge response, you can't modify a required attribute that already has a value. In AdminRespondToAuthChallenge or RespondToAuthChallenge, set a value for any keys that Amazon Cognito returned in the requiredAttributes parameter, then use the AdminUpdateUserAttributes or UpdateUserAttributes API operation to modify the value of any additional attributes. SOFTWARE_TOKEN_MFA \"ChallengeName\": \"SOFTWARE_TOKEN_MFA\", \"ChallengeResponses\": {\"USERNAME\": \"[username]\", \"SOFTWARE_TOKEN_MFA_CODE\": [authenticator_code]} DEVICE_SRP_AUTH \"ChallengeName\": \"DEVICE_SRP_AUTH\", \"ChallengeResponses\": {\"USERNAME\": \"[username]\", \"DEVICE_KEY\": \"[device_key]\", \"SRP_A\": \"[srp_a]\"} DEVICE_PASSWORD_VERIFIER \"ChallengeName\": \"DEVICE_PASSWORD_VERIFIER\", \"ChallengeResponses\": {\"DEVICE_KEY\": \"[device_key]\", \"PASSWORD_CLAIM_SIGNATURE\": \"[claim_signature]\", \"PASSWORD_CLAIM_SECRET_BLOCK\": \"[secret_block]\", \"TIMESTAMP\": [timestamp], \"USERNAME\": \"[username]\"} MFA_SETUP \"ChallengeName\": \"MFA_SETUP\", \"ChallengeResponses\": {\"USERNAME\": \"[username]\"}, \"SESSION\": \"[Session ID from VerifySoftwareToken]\" SELECT_MFA_TYPE \"ChallengeName\": \"SELECT_MFA_TYPE\", \"ChallengeResponses\": {\"USERNAME\": \"[username]\", \"ANSWER\": \"[SMS_MFA|EMAIL_MFA|SOFTWARE_TOKEN_MFA]\"} For more information about SECRET_HASH, see Computing secret hash values. For information about DEVICE_KEY, see Working with user devices in your user pool."
      type: object
      properties:
        ChallengeName:
          $ref: "#/components/schemas/ChallengeName"
          description: The type of challenge that your previous authentication request returned in the parameter ChallengeName, for example SMS_MFA.
        ChallengeResponse:
          $ref: "#/components/schemas/ChallengeResponse"
          description: The set of key-value pairs that provides a response to the requested challenge.
    ChallengeName:
      type: string
      enum:
        - Password
        - Mfa
    ChallengeResponse:
      type: string
      enum:
        - Success
        - Failure
    EventContextDataType:
      description: The context data that your application submitted in an authentication request with threat protection, as displayed in an AdminListUserAuthEvents response.
      type: object
      properties:
        IpAddress:
          $ref: "#/components/schemas/StringType"
          description: The source IP address of your user's device.
        DeviceName:
          $ref: "#/components/schemas/StringType"
          description: The user's device name.
        Timezone:
          $ref: "#/components/schemas/StringType"
          description: The user's time zone.
        City:
          $ref: "#/components/schemas/StringType"
          description: The user's city.
        Country:
          $ref: "#/components/schemas/StringType"
          description: The user's country.
    EventFeedbackType:
      description: The feedback that your application submitted to a threat protection event log, as displayed in an AdminListUserAuthEvents response.
      type: object
      properties:
        FeedbackValue:
          $ref: "#/components/schemas/FeedbackValueType"
          description: Your feedback to the authentication event. When you provide a FeedbackValue value of valid, you tell Amazon Cognito that you trust a user session where Amazon Cognito has evaluated some level of risk. When you provide a FeedbackValue value of invalid, you tell Amazon Cognito that you don't trust a user session, or you don't believe that Amazon Cognito evaluated a high-enough risk level.
        Provider:
          $ref: "#/components/schemas/StringType"
          description: The submitter of the event feedback. For example, if you submit event feedback in the Amazon Cognito console, this value is Admin.
        FeedbackDate:
          $ref: "#/components/schemas/DateType"
          description: The date that you or your user submitted the feedback.
      required:
        - FeedbackValue
        - Provider
    FeedbackValueType:
      type: string
      enum:
        - Valid
        - Invalid
    AdminResetUserPasswordResponse:
      description: Represents the response from the server to reset a user password as an administrator.
      type: object
    ChallengeResponsesType:
      type: object
      properties: {}
    AdminRespondToAuthChallengeResponse:
      description: Responds to the authentication challenge, as an administrator.
      type: object
      properties:
        ChallengeName:
          $ref: "#/components/schemas/ChallengeNameType"
          description: "The name of the next challenge that you must respond to. Possible challenges include the following: All of the following challenges require USERNAME and, when the app client has a client secret, SECRET_HASH in the parameters. Include a DEVICE_KEY for device authentication. WEB_AUTHN: Respond to the challenge with the results of a successful authentication with a WebAuthn authenticator, or passkey, as CREDENTIAL. Examples of WebAuthn authenticators include biometric devices and security keys. PASSWORD: Respond with the user's password as PASSWORD. PASSWORD_SRP: Respond with the initial SRP secret as SRP_A. SELECT_CHALLENGE: Respond with a challenge selection as ANSWER. It must be one of the challenge types in the AvailableChallenges response parameter. Add the parameters of the selected challenge, for example USERNAME and SMS_OTP. SMS_MFA: Respond with the code that your user pool delivered in an SMS message, as SMS_MFA_CODE EMAIL_MFA: Respond with the code that your user pool delivered in an email message, as EMAIL_MFA_CODE EMAIL_OTP: Respond with the code that your user pool delivered in an email message, as EMAIL_OTP_CODE . SMS_OTP: Respond with the code that your user pool delivered in an SMS message, as SMS_OTP_CODE. PASSWORD_VERIFIER: Respond with the second stage of SRP secrets as PASSWORD_CLAIM_SIGNATURE, PASSWORD_CLAIM_SECRET_BLOCK, and TIMESTAMP. CUSTOM_CHALLENGE: This is returned if your custom authentication flow determines that the user should pass another challenge before tokens are issued. The parameters of the challenge are determined by your Lambda function and issued in the ChallengeParameters of a challenge response. DEVICE_SRP_AUTH: Respond with the initial parameters of device SRP authentication. For more information, see Signing in with a device. DEVICE_PASSWORD_VERIFIER: Respond with PASSWORD_CLAIM_SIGNATURE, PASSWORD_CLAIM_SECRET_BLOCK, and TIMESTAMP after client-side SRP calculations. For more information, see Signing in with a device. NEW_PASSWORD_REQUIRED: For users who are required to change their passwords after successful first login. Respond to this challenge with NEW_PASSWORD and any required attributes that Amazon Cognito returned in the requiredAttributes parameter. You can also set values for attributes that aren't required by your user pool and that your app client can write. Amazon Cognito only returns this challenge for users who have temporary passwords. When you create passwordless users, you must provide values for all required attributes. In a NEW_PASSWORD_REQUIRED challenge response, you can't modify a required attribute that already has a value. In AdminRespondToAuthChallenge or RespondToAuthChallenge, set a value for any keys that Amazon Cognito returned in the requiredAttributes parameter, then use the AdminUpdateUserAttributes or UpdateUserAttributes API operation to modify the value of any additional attributes. MFA_SETUP: For users who are required to setup an MFA factor before they can sign in. The MFA types activated for the user pool will be listed in the challenge parameters MFAS_CAN_SETUP value. To set up time-based one-time password (TOTP) MFA, use the session returned in this challenge from InitiateAuth or AdminInitiateAuth as an input to AssociateSoftwareToken. Then, use the session returned by VerifySoftwareToken as an input to RespondToAuthChallenge or AdminRespondToAuthChallenge with challenge name MFA_SETUP to complete sign-in. To set up SMS or email MFA, collect a phone_number or email attribute for the user. Then restart the authentication flow with an InitiateAuth or AdminInitiateAuth request."
        Session:
          $ref: "#/components/schemas/SessionType"
          description: The session identifier that maintains the state of authentication requests and challenge responses. If an AdminInitiateAuth or AdminRespondToAuthChallenge API request results in a determination that your application must pass another challenge, Amazon Cognito returns a session with other challenge parameters. Send this session identifier, unmodified, to the next AdminRespondToAuthChallenge request.
        ChallengeParameters:
          type: object
          properties: {}
          description: The parameters that define your response to the next challenge.
        AuthenticationResult:
          $ref: "#/components/schemas/AuthenticationResultType"
          description: The outcome of a successful authentication process. After your application has passed all challenges, Amazon Cognito returns an AuthenticationResult with the JSON web tokens (JWTs) that indicate successful sign-in.
    SMSMfaSettingsType:
      description: A user's preference for using SMS message multi-factor authentication (MFA). Turns SMS MFA on and off, and can set SMS as preferred when other MFA options are available. You can't turn off SMS MFA for any of your users when MFA is required in your user pool; you can only set the type that your user prefers.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BooleanType"
          description: Specifies whether SMS message MFA is activated. If an MFA type is activated for a user, the user will be prompted for MFA during all sign-in attempts, unless device tracking is turned on and the device has been trusted.
        PreferredMfa:
          $ref: "#/components/schemas/BooleanType"
          description: Specifies whether SMS is the preferred MFA method. If true, your user pool prompts the specified user for a code delivered by SMS message after username-password sign-in succeeds.
    SoftwareTokenMfaSettingsType:
      description: A user's preference for using time-based one-time password (TOTP) multi-factor authentication (MFA). Turns TOTP MFA on and off, and can set TOTP as preferred when other MFA options are available. You can't turn off TOTP MFA for any of your users when MFA is required in your user pool; you can only set the type that your user prefers.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BooleanType"
          description: Specifies whether software token MFA is activated. If an MFA type is activated for a user, the user will be prompted for MFA during all sign-in attempts, unless device tracking is turned on and the device has been trusted.
