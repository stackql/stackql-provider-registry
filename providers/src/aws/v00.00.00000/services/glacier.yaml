          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForVaultOutput"
  /{account_id}/vaults:
    get:
      operationId: ListVaults
      description: This operation lists all vaults owned by the calling user's account. The list returned in the response is ASCII-sorted by vault name. By default, this operation returns up to 10 items. If there are more vaults to list, the response marker field contains the vault Amazon Resource Name (ARN) at which to continue the list with a new List Vaults request; otherwise, the marker field is null. To return a list of vaults that begins at a specific vault, set the marker request parameter to the vault ARN you obtained from a previous List Vaults request. You can also limit the number of vaults returned in the response by specifying the limit parameter in the request. An AWS account has full permission to perform all operations (actions). However, AWS Identity and Access Management (IAM) users don't have any permissions by default. You must grant them explicit permission to perform specific actions. For more information, see Access Control Using AWS Identity and Access Management (IAM). For conceptual information and underlying REST API, see Retrieving Vault Metadata in Amazon Glacier and List Vaults in the Amazon Glacier Developer Guide.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The AccountId value is the AWS account ID. This value must match the AWS account ID associated with the credentials used to sign the request. You can either specify an AWS account ID or optionally a single '-' (hyphen), in which case Amazon Glacier uses the AWS account ID associated with the credentials used to sign the request. If you specify your account ID, do not include any hyphens ('-') in the ID.
        - name: marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: A string used for pagination. The marker specifies the vault ARN after which the listing of vaults should begin.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The maximum number of vaults to be returned. The default limit is 10. The number of vaults returned might be fewer than the specified limit, but the number of returned vaults never exceeds the limit.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVaultsOutput"
  /{account_id}/vaults/{vault_name}/tags?operation=remove:
    post:
      operationId: RemoveTagsFromVault
      description: This operation removes one or more tags from the set of tags attached to a vault. For more information about tags, see Tagging Amazon Glacier Resources. This operation is idempotent. The operation will be successful, even if there are no tags attached to the vault.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The AccountId value is the AWS account ID of the account that owns the vault. You can either specify an AWS account ID or optionally a single '-' (hyphen), in which case Amazon Glacier uses the AWS account ID associated with the credentials used to sign the request. If you use an account ID, do not include any hyphens ('-') in the ID.
        - name: vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The name of the vault.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
      responses:
        "204":
          description: Success
  /{account_id}/vaults/{vault_name}/archives:
    post:
      operationId: UploadArchive
      description: This operation adds an archive to a vault. This is a synchronous operation, and for a successful upload, your data is durably persisted. Amazon Glacier returns the archive ID in the x-amz-archive-id header of the response. You must use the archive ID to access your data in Amazon Glacier. After you upload an archive, you should save the archive ID returned so that you can retrieve or delete the archive later. Besides saving the archive ID, you can also index it and give it a friendly name to allow for better searching. You can also use the optional archive description field to specify how the archive is referred to in an external index of archives, such as you might create in Amazon DynamoDB. You can also get the vault inventory to obtain a list of archive IDs in a vault. For more information, see InitiateJob. You must provide a SHA256 tree hash of the data you are uploading. For information about computing a SHA256 tree hash, see Computing Checksums. You can optionally specify an archive description of up to 1,024 printable ASCII characters. You can get the archive description when you either retrieve the archive or get the vault inventory. For more information, see InitiateJob. Amazon Glacier does not interpret the description in any way. An archive description does not need to be unique. You cannot use the description to retrieve or sort the archive list. Archives are immutable. After you upload an archive, you cannot edit the archive or its description. An AWS account has full permission to perform all operations (actions). However, AWS Identity and Access Management (IAM) users don't have any permissions by default. You must grant them explicit permission to perform specific actions. For more information, see Access Control Using AWS Identity and Access Management (IAM). For conceptual information and underlying REST API, see Uploading an Archive in Amazon Glacier and Upload Archive in the Amazon Glacier Developer Guide.
      parameters:
        - name: vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The name of the vault.
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The AccountId value is the AWS account ID of the account that owns the vault. You can either specify an AWS account ID or optionally a single '-' (hyphen), in which case Amazon Glacier uses the AWS account ID associated with the credentials used to sign the request. If you use an account ID, do not include any hyphens ('-') in the ID.
        - name: x-amz-archive-description
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The optional description of the archive you are uploading.
        - name: x-amz-sha256-tree-hash
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The SHA256 tree hash of the data being uploaded.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/Stream"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveCreationOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    string:
      type: string
    TagMap:
      type: object
      properties: {}
    ArchiveCreationOutput:
      description: Contains the Amazon Glacier response to your request. For information about the underlying REST API, see Upload Archive. For conceptual information, see Working with Archives in Amazon Glacier.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/string"
          description: The relative URI path of the newly added archive resource.
        checksum:
          $ref: "#/components/schemas/string"
          description: The checksum of the archive computed by Amazon Glacier.
        archiveId:
          $ref: "#/components/schemas/string"
          description: The ID of the archive. This value is also included as part of the location.
    CreateVaultOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/string"
          description: The URI of the vault that was created.
    GlacierJobDescription:
      description: Contains the description of an Amazon S3 Glacier job.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/string"
          description: An opaque string that identifies an Amazon S3 Glacier job.
        JobDescription:
          $ref: "#/components/schemas/string"
          description: The job description provided when initiating the job.
        Action:
          $ref: "#/components/schemas/ActionCode"
          description: The job type. This value is either ArchiveRetrieval, InventoryRetrieval, or Select.
        ArchiveId:
          $ref: "#/components/schemas/string"
          description: The archive ID requested for a select job or archive retrieval. Otherwise, this field is null.
        VaultARN:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the vault from which an archive retrieval was requested.
        CreationDate:
          $ref: "#/components/schemas/string"
          description: The UTC date when the job was created. This value is a string representation of ISO 8601 date format, for example "2012-03-20T17:03:43.221Z".
        Completed:
          $ref: "#/components/schemas/boolean"
          description: The job status. When a job is completed, you get the job's output using Get Job Output (GET output).
        StatusCode:
          $ref: "#/components/schemas/StatusCode"
          description: The status code can be InProgress, Succeeded, or Failed, and indicates the status of the job.
        StatusMessage:
          $ref: "#/components/schemas/string"
          description: A friendly message that describes the job status.
        ArchiveSizeInBytes:
          $ref: "#/components/schemas/Size"
          description: For an archive retrieval job, this value is the size in bytes of the archive being requested for download. For an inventory retrieval or select job, this value is null.
        InventorySizeInBytes:
          $ref: "#/components/schemas/Size"
          description: For an inventory retrieval job, this value is the size in bytes of the inventory requested for download. For an archive retrieval or select job, this value is null.
        SNSTopic:
          $ref: "#/components/schemas/string"
          description: An Amazon SNS topic that receives notification.
        CompletionDate:
          $ref: "#/components/schemas/string"
          description: The UTC time that the job request completed. While the job is in progress, the value is null.
        SHA256TreeHash:
          $ref: "#/components/schemas/string"
          description: "For an archive retrieval job, this value is the checksum of the archive. Otherwise, this value is null. The SHA256 tree hash value for the requested range of an archive. If the InitiateJob request for an archive specified a tree-hash aligned range, then this field returns a value. If the whole archive is retrieved, this value is the same as the ArchiveSHA256TreeHash value. This field is null for the following: Archive retrieval jobs that specify a range that is not tree-hash aligned Archival jobs that specify a range that is equal to the whole archive, when the job status is InProgress Inventory jobs Select jobs"
        ArchiveSHA256TreeHash:
          $ref: "#/components/schemas/string"
          description: The SHA256 tree hash of the entire archive for an archive retrieval. For inventory retrieval or select jobs, this field is null.
        RetrievalByteRange:
          $ref: "#/components/schemas/string"
          description: The retrieved byte range for archive retrieval jobs in the form StartByteValue-EndByteValue. If no range was specified in the archive retrieval, then the whole archive is retrieved. In this case, StartByteValue equals 0 and EndByteValue equals the size of the archive minus 1. For inventory retrieval or select jobs, this field is null.
        Tier:
          $ref: "#/components/schemas/string"
          description: The tier to use for a select or an archive retrieval. Valid values are Expedited, Standard, or Bulk. Standard is the default.
        InventoryRetrievalParameters:
          $ref: "#/components/schemas/InventoryRetrievalJobDescription"
          description: Parameters used for range inventory retrieval.
        JobOutputPath:
          $ref: "#/components/schemas/string"
          description: Contains the job output location.
        SelectParameters:
          $ref: "#/components/schemas/SelectParameters"
          description: Contains the parameters used for a select.
        OutputLocation:
          $ref: "#/components/schemas/OutputLocation"
          description: Contains the location where the data from the select job is stored.
    ActionCode:
      type: string
      enum:
        - ArchiveRetrieval
        - InventoryRetrieval
        - Select
    boolean:
      type: boolean
    StatusCode:
      type: string
      enum:
        - InProgress
        - Succeeded
        - Failed
    Size:
      type: integer
      format: int64
    InventoryRetrievalJobDescription:
      description: Describes the options for a range inventory retrieval job.
      type: object
      properties:
        Format:
          $ref: "#/components/schemas/string"
          description: The output format for the vault inventory list, which is set by the InitiateJob request when initiating a job to retrieve a vault inventory. Valid values are CSV and JSON.
        StartDate:
          $ref: "#/components/schemas/DateTime"
          description: The start of the date range in Universal Coordinated Time (UTC) for vault inventory retrieval that includes archives created on or after this date. This value should be a string in the ISO 8601 date format, for example 2013-03-20T17:03:43Z.
        EndDate:
          $ref: "#/components/schemas/DateTime"
          description: The end of the date range in UTC for vault inventory retrieval that includes archives created before this date. This value should be a string in the ISO 8601 date format, for example 2013-03-20T17:03:43Z.
        Limit:
          $ref: "#/components/schemas/string"
          description: The maximum number of inventory items returned per vault inventory retrieval request. This limit is set when initiating the job with the a InitiateJob request.
        Marker:
          $ref: "#/components/schemas/string"
          description: An opaque string that represents where to continue pagination of the vault inventory retrieval results. You use the marker in a new InitiateJob request to obtain additional inventory items. If there are no more inventory items, this value is null. For more information, see Range Inventory Retrieval.
    DateTime:
      type: string
    SelectParameters:
      description: Contains information about the parameters used for a select.
      type: object
      properties:
        InputSerialization:
          $ref: "#/components/schemas/InputSerialization"
          description: Describes the serialization format of the object.
        ExpressionType:
          $ref: "#/components/schemas/ExpressionType"
          description: The type of the provided expression, for example SQL.
        Expression:
          $ref: "#/components/schemas/string"
          description: The expression that is used to select the object.
        OutputSerialization:
          $ref: "#/components/schemas/OutputSerialization"
          description: Describes how the results of the select job are serialized.
    InputSerialization:
      description: Describes how the archive is serialized.
      type: object
      properties:
        csv:
          $ref: "#/components/schemas/CSVInput"
          description: Describes the serialization of a CSV-encoded object.
    CSVInput:
      description: Contains information about the comma-separated value (CSV) file to select from.
      type: object
      properties:
        FileHeaderInfo:
          $ref: "#/components/schemas/FileHeaderInfo"
          description: Describes the first line of input. Valid values are None, Ignore, and Use.
        Comments:
          $ref: "#/components/schemas/string"
          description: A single character used to indicate that a row should be ignored when the character is present at the start of that row.
        QuoteEscapeCharacter:
          $ref: "#/components/schemas/string"
          description: A single character used for escaping the quotation-mark character inside an already escaped value.
        RecordDelimiter:
          $ref: "#/components/schemas/string"
          description: A value used to separate individual records from each other.
        FieldDelimiter:
          $ref: "#/components/schemas/string"
          description: A value used to separate individual fields from each other within a record.
        QuoteCharacter:
          $ref: "#/components/schemas/string"
          description: A value used as an escape character where the field delimiter is part of the value.
    FileHeaderInfo:
      type: string
      enum:
        - USE
        - IGNORE
        - NONE
    ExpressionType:
      type: string
      enum:
        - SQL
    OutputSerialization:
      description: Describes how the select output is serialized.
      type: object
      properties:
        csv:
          $ref: "#/components/schemas/CSVOutput"
          description: Describes the serialization of CSV-encoded query results.
    CSVOutput:
      description: Contains information about the comma-separated value (CSV) file that the job results are stored in.
      type: object
      properties:
        QuoteFields:
          $ref: "#/components/schemas/QuoteFields"
          description: A value that indicates whether all output fields should be contained within quotation marks.
        QuoteEscapeCharacter:
          $ref: "#/components/schemas/string"
          description: A single character used for escaping the quotation-mark character inside an already escaped value.
        RecordDelimiter:
          $ref: "#/components/schemas/string"
          description: A value used to separate individual records from each other.
        FieldDelimiter:
          $ref: "#/components/schemas/string"
          description: A value used to separate individual fields from each other within a record.
        QuoteCharacter:
          $ref: "#/components/schemas/string"
          description: A value used as an escape character where the field delimiter is part of the value.
    QuoteFields:
      type: string
      enum:
        - ALWAYS
        - ASNEEDED
    OutputLocation:
      description: Contains information about the location where the select job results are stored.
      type: object
      properties:
        S3:
          $ref: "#/components/schemas/S3Location"
          description: Describes an S3 location that will receive the results of the job request.
    S3Location:
      description: Contains information about the location in Amazon S3 where the select job results are stored.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/string"
          description: The name of the Amazon S3 bucket where the job results are stored.
        Prefix:
          $ref: "#/components/schemas/string"
          description: The prefix that is prepended to the results for this request.
        Encryption:
          $ref: "#/components/schemas/Encryption"
          description: Contains information about the encryption used to store the job results in Amazon S3.
        CannedACL:
          $ref: "#/components/schemas/CannedACL"
          description: The canned access control list (ACL) to apply to the job results.
        AccessControlList:
          $ref: "#/components/schemas/AccessControlPolicyList"
          description: A list of grants that control access to the staged results.
        Tagging:
          type: object
          properties: {}
          description: The tag-set that is applied to the job results.
        UserMetadata:
          type: object
          properties: {}
          description: A map of metadata to store with the job results in Amazon S3.
        StorageClass:
          $ref: "#/components/schemas/StorageClass"
          description: The storage class used to store the job results.
    Encryption:
      description: Contains information about the encryption used to store the job results in Amazon S3.
      type: object
      properties:
        EncryptionType:
          $ref: "#/components/schemas/EncryptionType"
          description: The server-side encryption algorithm used when storing job results in Amazon S3, for example AES256 or aws:kms.
        KMSKeyId:
          $ref: "#/components/schemas/string"
          description: The AWS KMS key ID to use for object encryption. All GET and PUT requests for an object protected by AWS KMS fail if not made by using Secure Sockets Layer (SSL) or Signature Version 4.
        KMSContext:
          $ref: "#/components/schemas/string"
          description: Optional. If the encryption type is aws:kms, you can use this value to specify the encryption context for the job results.
    EncryptionType:
      type: string
      enum:
        - aws:kms
        - AES256
    CannedACL:
      type: string
      enum:
        - private
        - public-read
        - public-read-write
        - aws-exec-read
        - authenticated-read
        - bucket-owner-read
        - bucket-owner-full-control
    AccessControlPolicyList:
      type: array
      items:
        $ref: "#/components/schemas/Grant"
    Grant:
      description: Contains information about a grant.
      type: object
      properties:
        Grantee:
          $ref: "#/components/schemas/Grantee"
          description: The grantee.
        Permission:
          $ref: "#/components/schemas/Permission"
          description: Specifies the permission given to the grantee.
    Grantee:
      description: Contains information about the grantee.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/Type"
          description: Type of grantee
        DisplayName:
          $ref: "#/components/schemas/string"
          description: Screen name of the grantee.
        URI:
          $ref: "#/components/schemas/string"
          description: URI of the grantee group.
        ID:
          $ref: "#/components/schemas/string"
          description: The canonical user ID of the grantee.
        EmailAddress:
          $ref: "#/components/schemas/string"
          description: Email address of the grantee.
      required:
        - Type
    Type:
      type: string
      enum:
        - AmazonCustomerByEmail
        - CanonicalUser
        - Group
    Permission:
      type: string
      enum:
        - FULL_CONTROL
        - WRITE
        - WRITE_ACP
        - READ
        - READ_ACP
    StorageClass:
      type: string
      enum:
        - STANDARD
        - REDUCED_REDUNDANCY
        - STANDARD_IA
    DescribeVaultOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        VaultARN:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the vault.
        VaultName:
          $ref: "#/components/schemas/string"
          description: The name of the vault.
        CreationDate:
          $ref: "#/components/schemas/string"
          description: The Universal Coordinated Time (UTC) date when the vault was created. This value should be a string in the ISO 8601 date format, for example 2012-03-20T17:03:43.221Z.
        LastInventoryDate:
          $ref: "#/components/schemas/string"
          description: The Universal Coordinated Time (UTC) date when Amazon Glacier completed the last vault inventory. This value should be a string in the ISO 8601 date format, for example 2012-03-20T17:03:43.221Z.
        NumberOfArchives:
          $ref: "#/components/schemas/long"
          description: The number of archives in the vault as of the last inventory date. This field will return null if an inventory has not yet run on the vault, for example if you just created the vault.
        SizeInBytes:
          $ref: "#/components/schemas/long"
          description: Total size, in bytes, of the archives in the vault as of the last inventory date. This field will return null if an inventory has not yet run on the vault, for example if you just created the vault.
    long:
      type: integer
      format: int64
    GetDataRetrievalPolicyOutput:
      description: Contains the Amazon Glacier response to the GetDataRetrievalPolicy request.
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/DataRetrievalPolicy"
          description: Contains the returned data retrieval policy in JSON format.
    DataRetrievalPolicy:
      description: Data retrieval policy.
      type: object
      properties:
        Rules:
          $ref: "#/components/schemas/DataRetrievalRulesList"
          description: The policy rule. Although this is a list type, currently there must be only one rule, which contains a Strategy field and optionally a BytesPerHour field.
    DataRetrievalRulesList:
      type: array
      items:
        $ref: "#/components/schemas/DataRetrievalRule"
    DataRetrievalRule:
      description: Data retrieval policy rule.
      type: object
      properties:
        Strategy:
          $ref: "#/components/schemas/string"
          description: "The type of data retrieval policy to set. Valid values: BytesPerHour|FreeTier|None"
        BytesPerHour:
          $ref: "#/components/schemas/NullableLong"
          description: The maximum number of bytes that can be retrieved in an hour. This field is required only if the value of the Strategy field is BytesPerHour. Your PUT operation will be rejected if the Strategy field is not set to BytesPerHour and you set this field.
    NullableLong:
      type: integer
      format: int64
    GetJobOutputOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        body:
          $ref: "#/components/schemas/Stream"
          description: The job data, either archive data or inventory data.
        checksum:
          $ref: "#/components/schemas/string"
          description: "The checksum of the data in the response. This header is returned only when retrieving the output for an archive retrieval job. Furthermore, this header appears only under the following conditions: You get the entire range of the archive. You request a range to return of the archive that starts and ends on a multiple of 1 MB. For example, if you have an 3.1 MB archive and you specify a range to return that starts at 1 MB and ends at 2 MB, then the x-amz-sha256-tree-hash is returned as a response header. You request a range of the archive to return that starts on a multiple of 1 MB and goes to the end of the archive. For example, if you have a 3.1 MB archive and you specify a range that starts at 2 MB and ends at 3.1 MB (the end of the archive), then the x-amz-sha256-tree-hash is returned as a response header."
        status:
          $ref: "#/components/schemas/httpstatus"
          description: The HTTP response code for a job output request. The value depends on whether a range was specified in the request.
        contentRange:
          $ref: "#/components/schemas/string"
          description: The range of bytes returned by Amazon Glacier. If only partial output is downloaded, the response provides the range of bytes Amazon Glacier returned. For example, bytes 0-1048575/8388608 returns the first 1 MB from 8 MB.
        acceptRanges:
          $ref: "#/components/schemas/string"
          description: Indicates the range units accepted. For more information, see RFC2616.
        contentType:
          $ref: "#/components/schemas/string"
          description: The Content-Type depends on whether the job output is an archive or a vault inventory. For archive data, the Content-Type is application/octet-stream. For vault inventory, if you requested CSV format when you initiated the job, the Content-Type is text/csv. Otherwise, by default, vault inventory is returned as JSON, and the Content-Type is application/json.
        archiveDescription:
          $ref: "#/components/schemas/string"
          description: The description of an archive.
    Stream:
      type: string
      format: byte
    httpstatus:
      type: integer
    GetVaultAccessPolicyOutput:
      description: Output for GetVaultAccessPolicy.
      type: object
      properties:
        policy:
          $ref: "#/components/schemas/VaultAccessPolicy"
          description: Contains the returned vault access policy as a JSON string.
    VaultAccessPolicy:
      description: Contains the vault access policy.
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/string"
          description: The vault access policy.
    GetVaultLockOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/string"
          description: The vault lock policy as a JSON string, which uses "\" as an escape character.
        State:
          $ref: "#/components/schemas/string"
          description: The state of the vault lock. InProgress or Locked.
        ExpirationDate:
          $ref: "#/components/schemas/string"
          description: The UTC date and time at which the lock ID expires. This value can be null if the vault lock is in a Locked state.
        CreationDate:
          $ref: "#/components/schemas/string"
          description: The UTC date and time at which the vault lock was put into the InProgress state.
    GetVaultNotificationsOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        vaultNotificationConfig:
          $ref: "#/components/schemas/VaultNotificationConfig"
          description: Returns the notification configuration set on the vault.
    VaultNotificationConfig:
      description: Represents a vault's notification configuration.
      type: object
      properties:
        SNSTopic:
          $ref: "#/components/schemas/string"
          description: The Amazon Simple Notification Service (Amazon SNS) topic Amazon Resource Name (ARN).
        Events:
          $ref: "#/components/schemas/NotificationEventList"
          description: A list of one or more events for which Amazon Glacier will send a notification to the specified Amazon SNS topic.
    NotificationEventList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    JobParameters:
      description: Provides options for defining a job.
      type: object
      properties:
        Format:
          $ref: "#/components/schemas/string"
          description: When initiating a job to retrieve a vault inventory, you can optionally add this parameter to your request to specify the output format. If you are initiating an inventory job and do not specify a Format field, JSON is the default format. Valid values are "CSV" and "JSON".
        Type:
          $ref: "#/components/schemas/string"
          description: The job type. You can initiate a job to perform a select query on an archive, retrieve an archive, or get an inventory of a vault. Valid values are "select", "archive-retrieval" and "inventory-retrieval".
        ArchiveId:
          $ref: "#/components/schemas/string"
          description: The ID of the archive that you want to retrieve. This field is required only if Type is set to select or archive-retrievalcode>. An error occurs if you specify this request parameter for an inventory retrieval job request.
        Description:
          $ref: "#/components/schemas/string"
          description: The optional description for the job. The description must be less than or equal to 1,024 bytes. The allowable characters are 7-bit ASCII without control codes-specifically, ASCII values 32-126 decimal or 0x20-0x7E hexadecimal.
        SNSTopic:
          $ref: "#/components/schemas/string"
          description: The Amazon SNS topic ARN to which Amazon Glacier sends a notification when the job is completed and the output is ready for you to download. The specified topic publishes the notification to its subscribers. The SNS topic must exist.
        RetrievalByteRange:
          $ref: "#/components/schemas/string"
          description: The byte range to retrieve for an archive retrieval. in the form "StartByteValue-EndByteValue" If not specified, the whole archive is retrieved. If specified, the byte range must be megabyte (1024*1024) aligned which means that StartByteValue must be divisible by 1 MB and EndByteValue plus 1 must be divisible by 1 MB or be the end of the archive specified as the archive byte size value minus 1. If RetrievalByteRange is not megabyte aligned, this operation returns a 400 response. An error occurs if you specify this field for an inventory retrieval job request.
        Tier:
          $ref: "#/components/schemas/string"
          description: The tier to use for a select or an archive retrieval job. Valid values are Expedited, Standard, or Bulk. Standard is the default.
        InventoryRetrievalParameters:
          $ref: "#/components/schemas/InventoryRetrievalJobInput"
          description: Input parameters used for range inventory retrieval.
        SelectParameters:
          $ref: "#/components/schemas/SelectParameters"
          description: Contains the parameters that define a job.
        OutputLocation:
          $ref: "#/components/schemas/OutputLocation"
          description: Contains information about the location where the select job results are stored.
    InventoryRetrievalJobInput:
      description: Provides options for specifying a range inventory retrieval job.
      type: object
      properties:
        StartDate:
          $ref: "#/components/schemas/string"
          description: The start of the date range in UTC for vault inventory retrieval that includes archives created on or after this date. This value should be a string in the ISO 8601 date format, for example 2013-03-20T17:03:43Z.
        EndDate:
          $ref: "#/components/schemas/string"
          description: The end of the date range in UTC for vault inventory retrieval that includes archives created before this date. This value should be a string in the ISO 8601 date format, for example 2013-03-20T17:03:43Z.
        Limit:
          $ref: "#/components/schemas/string"
          description: Specifies the maximum number of inventory items returned per vault inventory retrieval request. Valid values are greater than or equal to 1.
        Marker:
          $ref: "#/components/schemas/string"
          description: An opaque string that represents where to continue pagination of the vault inventory retrieval results. You use the marker in a new InitiateJob request to obtain additional inventory items. If there are no more inventory items, this value is null.
    InitiateJobOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/string"
          description: The relative URI path of the job.
        jobId:
          $ref: "#/components/schemas/string"
          description: The ID of the job.
        jobOutputPath:
          $ref: "#/components/schemas/string"
          description: The path to the location of where the select results are stored.
    InitiateMultipartUploadOutput:
      description: The Amazon Glacier response to your request.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/string"
          description: The relative URI path of the multipart upload ID Amazon Glacier created.
        uploadId:
          $ref: "#/components/schemas/string"
          description: The ID of the multipart upload. This value is also included as part of the location.
    VaultLockPolicy:
      description: Contains the vault lock policy.
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/string"
          description: The vault lock policy.
    InitiateVaultLockOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        lockId:
          $ref: "#/components/schemas/string"
          description: The lock ID, which is used to complete the vault locking process.
    ListJobsOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        JobList:
          $ref: "#/components/schemas/JobList"
          description: A list of job objects. Each job object contains metadata describing the job.
        Marker:
          $ref: "#/components/schemas/string"
          description: An opaque string used for pagination that specifies the job at which the listing of jobs should begin. You get the marker value from a previous List Jobs response. You only need to include the marker if you are continuing the pagination of the results started in a previous List Jobs request.
    JobList:
      type: array
      items:
        $ref: "#/components/schemas/GlacierJobDescription"
    ListMultipartUploadsOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        UploadsList:
          $ref: "#/components/schemas/UploadsList"
          description: A list of in-progress multipart uploads.
        Marker:
          $ref: "#/components/schemas/string"
          description: An opaque string that represents where to continue pagination of the results. You use the marker in a new List Multipart Uploads request to obtain more uploads in the list. If there are no more uploads, this value is null.
    UploadsList:
      type: array
      items:
        $ref: "#/components/schemas/UploadListElement"
    UploadListElement:
      description: A list of in-progress multipart uploads for a vault.
      type: object
      properties:
        MultipartUploadId:
          $ref: "#/components/schemas/string"
          description: The ID of a multipart upload.
        VaultARN:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the vault that contains the archive.
        ArchiveDescription:
          $ref: "#/components/schemas/string"
          description: The description of the archive that was specified in the Initiate Multipart Upload request.
        PartSizeInBytes:
          $ref: "#/components/schemas/long"
          description: The part size, in bytes, specified in the Initiate Multipart Upload request. This is the size of all the parts in the upload except the last part, which may be smaller than this size.
        CreationDate:
          $ref: "#/components/schemas/string"
          description: The UTC time at which the multipart upload was initiated.
    ListPartsOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        MultipartUploadId:
          $ref: "#/components/schemas/string"
          description: The ID of the upload to which the parts are associated.
        VaultARN:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the vault to which the multipart upload was initiated.
        ArchiveDescription:
          $ref: "#/components/schemas/string"
          description: The description of the archive that was specified in the Initiate Multipart Upload request.
        PartSizeInBytes:
          $ref: "#/components/schemas/long"
          description: The part size in bytes. This is the same value that you specified in the Initiate Multipart Upload request.
        CreationDate:
          $ref: "#/components/schemas/string"
          description: The UTC time at which the multipart upload was initiated.
        Parts:
          $ref: "#/components/schemas/PartList"
          description: A list of the part sizes of the multipart upload. Each object in the array contains a RangeBytes and sha256-tree-hash name/value pair.
        Marker:
          $ref: "#/components/schemas/string"
          description: An opaque string that represents where to continue pagination of the results. You use the marker in a new List Parts request to obtain more jobs in the list. If there are no more parts, this value is null.
    PartList:
      type: array
      items:
        $ref: "#/components/schemas/PartListElement"
    PartListElement:
      description: A list of the part sizes of the multipart upload.
      type: object
      properties:
        RangeInBytes:
          $ref: "#/components/schemas/string"
          description: The byte range of a part, inclusive of the upper value of the range.
        SHA256TreeHash:
          $ref: "#/components/schemas/string"
          description: The SHA256 tree hash value that Amazon Glacier calculated for the part. This field is never null.
    ListProvisionedCapacityOutput:
      type: object
      properties:
        ProvisionedCapacityList:
          $ref: "#/components/schemas/ProvisionedCapacityList"
          description: The response body contains the following JSON fields.
    ProvisionedCapacityList:
      type: array
      items:
        $ref: "#/components/schemas/ProvisionedCapacityDescription"
    ProvisionedCapacityDescription:
      description: The definition for a provisioned capacity unit.
      type: object
      properties:
        CapacityId:
          $ref: "#/components/schemas/string"
          description: The ID that identifies the provisioned capacity unit.
        StartDate:
          $ref: "#/components/schemas/string"
          description: The date that the provisioned capacity unit was purchased, in Universal Coordinated Time (UTC).
        ExpirationDate:
          $ref: "#/components/schemas/string"
          description: The date that the provisioned capacity unit expires, in Universal Coordinated Time (UTC).
    ListTagsForVaultOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: The tags attached to the vault. Each tag is composed of a key and a value.
    ListVaultsOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        VaultList:
          $ref: "#/components/schemas/VaultList"
          description: List of vaults.
        Marker:
          $ref: "#/components/schemas/string"
          description: The vault ARN at which to continue pagination of the results. You use the marker in another List Vaults request to obtain more vaults in the list.
    VaultList:
      type: array
      items:
        $ref: "#/components/schemas/DescribeVaultOutput"
    PurchaseProvisionedCapacityOutput:
      type: object
      properties:
        capacityId:
          $ref: "#/components/schemas/string"
          description: The ID that identifies the provisioned capacity unit.
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    UploadMultipartPartOutput:
      description: Contains the Amazon Glacier response to your request.
      type: object
      properties:
        checksum:
          $ref: "#/components/schemas/string"
          description: The SHA256 tree hash that Amazon Glacier computed for the uploaded part.
