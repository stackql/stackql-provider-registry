openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS Control Catalog
  description: AWS Control Catalog
  x-serviceName: controlcatalog
  x-serviceAlias: controlcatalog
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: controlcatalog
servers:
  - url: https://controlcatalog.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for controlcatalog
paths:
  /get-control:
    post:
      operationId: GetControl
      description: Returns details about a specific control, most notably a list of Amazon Web Services Regions where this control is supported. Input a value for the ControlArn parameter, in ARN form. GetControl accepts controltower or controlcatalog control ARNs as input. Returns a controlcatalog ARN format. In the API response, controls that have the value GLOBAL in the Scope field do not show the DeployableRegions field, because it does not apply. Controls that have the value REGIONAL in the Scope field return a value for the DeployableRegions field, as shown in the example.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ControlArn:
                  $ref: "#/components/schemas/ControlArn"
              required:
                - ControlArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetControlResponse"
  /common-controls:
    post:
      operationId: ListCommonControls
      description: Returns a paginated list of common controls from the Amazon Web Services Control Catalog. You can apply an optional filter to see common controls that have a specific objective. If you don’t provide a filter, the operation returns all common controls.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxListCommonControlsResults"
          description: The maximum number of results on a page or for an API request call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                CommonControlFilter:
                  $ref: "#/components/schemas/CommonControlFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCommonControlsResponse"
  /list-control-mappings:
    post:
      operationId: ListControlMappings
      description: Returns a paginated list of control mappings from the Control Catalog. Control mappings show relationships between controls and other entities, such as common controls or compliance frameworks.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxListControlMappingsResults"
          description: The maximum number of results on a page or for an API request call.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filter:
                  $ref: "#/components/schemas/ControlMappingFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListControlMappingsResponse"
  /list-controls:
    post:
      operationId: ListControls
      description: Returns a paginated list of all available controls in the Control Catalog library. Allows you to discover available controls. The list of controls is given as structures of type controlSummary. The ARN is returned in the global controlcatalog format, as shown in the examples.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxListControlsResults"
          description: The maximum number of results on a page or for an API request call.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filter:
                  $ref: "#/components/schemas/ControlFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListControlsResponse"
  /domains:
    post:
      operationId: ListDomains
      description: Returns a paginated list of domains from the Control Catalog.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxListDomainsResults"
          description: The maximum number of results on a page or for an API request call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDomainsResponse"
  /objectives:
    post:
      operationId: ListObjectives
      description: Returns a paginated list of objectives from the Control Catalog. You can apply an optional filter to see the objectives that belong to a specific domain. If you don’t provide a filter, the operation returns all objectives.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxListObjectivesResults"
          description: The maximum number of results on a page or for an API request call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ObjectiveFilter:
                  $ref: "#/components/schemas/ObjectiveFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListObjectivesResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ControlArn:
      type: string
      minLength: 34
      maxLength: 2048
      pattern: arn:(aws(?:[-a-z]*)?):(controlcatalog|controltower):[a-zA-Z0-9-]*::control/[0-9a-zA-Z_\-]+
    GetControlResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ControlArn"
          description: The Amazon Resource Name (ARN) of the control.
        Aliases:
          $ref: "#/components/schemas/ControlAliases"
          description: A list of alternative identifiers for the control. These are human-readable designators, such as SH.S3.1. Several aliases can refer to the same control across different Amazon Web Services services or compliance frameworks.
        Name:
          $ref: "#/components/schemas/String"
          description: The display name of the control.
        Description:
          $ref: "#/components/schemas/String"
          description: A description of what the control does.
        Behavior:
          $ref: "#/components/schemas/ControlBehavior"
          description: A term that identifies the control's functional behavior. One of Preventive, Detective, Proactive
        Severity:
          $ref: "#/components/schemas/ControlSeverity"
          description: "An enumerated type, with the following possible values:"
        RegionConfiguration:
          $ref: "#/components/schemas/RegionConfiguration"
        Implementation:
          $ref: "#/components/schemas/ImplementationDetails"
          description: Returns information about the control, as an ImplementationDetails object that shows the underlying implementation type for a control.
        Parameters:
          $ref: "#/components/schemas/ControlParameters"
          description: Returns an array of ControlParameter objects that specify the parameters a control supports. An empty list is returned for controls that don’t support parameters.
        CreateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that notes the time when the control was released (start of its life) as a governance capability in Amazon Web Services.
        GovernedResources:
          $ref: "#/components/schemas/GovernedResources"
          description: A list of Amazon Web Services resource types that are governed by this control. This information helps you understand which controls can govern certain types of resources, and conversely, which resources are affected when the control is implemented. The resources are represented as Amazon Web Services CloudFormation resource types. If GovernedResources cannot be represented by available CloudFormation resource types, it’s returned as an empty list.
      required:
        - Arn
        - Name
        - Description
        - Behavior
        - RegionConfiguration
    ControlAliases:
      type: array
      items:
        $ref: "#/components/schemas/ControlAlias"
    ControlAlias:
      type: string
      pattern: "[a-zA-Z0-9](?:[a-zA-Z0-9_.-]{0,254}[a-zA-Z0-9])"
    String:
      type: string
    ControlBehavior:
      type: string
      enum:
        - PREVENTIVE
        - PROACTIVE
        - DETECTIVE
    ControlSeverity:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
    RegionConfiguration:
      description: Returns information about the control, including the scope of the control, if enabled, and the Regions in which the control is available for deployment. For more information about scope, see Global services. If you are applying controls through an Amazon Web Services Control Tower landing zone environment, remember that the values returned in the RegionConfiguration API operation are not related to the governed Regions in your landing zone. For example, if you are governing Regions A,B,and C while the control is available in Regions A, B, C, and D, you'd see a response with DeployableRegions of A, B, C, and D for a control with REGIONAL scope, even though you may not intend to deploy the control in Region D, because you do not govern it through your landing zone.
      type: object
      properties:
        Scope:
          $ref: "#/components/schemas/ControlScope"
          description: The coverage of the control, if deployed. Scope is an enumerated type, with value Regional, or Global. A control with Global scope is effective in all Amazon Web Services Regions, regardless of the Region from which it is enabled, or to which it is deployed. A control implemented by an SCP is usually Global in scope. A control with Regional scope has operations that are restricted specifically to the Region from which it is enabled and to which it is deployed. Controls implemented by Config rules and CloudFormation hooks usually are Regional in scope. Security Hub controls usually are Regional in scope.
        DeployableRegions:
          $ref: "#/components/schemas/DeployableRegions"
          description: Regions in which the control is available to be deployed.
      required:
        - Scope
    ControlScope:
      type: string
      enum:
        - GLOBAL
        - REGIONAL
    DeployableRegions:
      type: array
      items:
        $ref: "#/components/schemas/RegionCode"
    RegionCode:
      type: string
      pattern: "[a-zA-Z0-9-]{1,128}"
    ImplementationDetails:
      description: "An object that describes the implementation type for a control. Our ImplementationDetails Type format has three required segments: SERVICE-PROVIDER::SERVICE-NAME::RESOURCE-NAME For example, AWS::Config::ConfigRule or AWS::SecurityHub::SecurityControl resources have the format with three required segments. Our ImplementationDetails Type format has an optional fourth segment, which is present for applicable implementation types. The format is as follows: SERVICE-PROVIDER::SERVICE-NAME::RESOURCE-NAME::RESOURCE-TYPE-DESCRIPTION For example, AWS::Organizations::Policy::SERVICE_CONTROL_POLICY or AWS::CloudFormation::Type::HOOK have the format with four segments. Although the format is similar, the values for the Type field do not match any Amazon Web Services CloudFormation values."
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ImplementationType"
          description: A string that describes a control's implementation type.
        Identifier:
          $ref: "#/components/schemas/ImplementationIdentifier"
          description: A service-specific identifier for the control, assigned by the service that implemented the control. For example, this identifier could be an Amazon Web Services Config Rule ID or a Security Hub Control ID.
      required:
        - Type
    ImplementationType:
      type: string
      minLength: 7
      maxLength: 2048
      pattern: "[A-Za-z0-9]+(::[A-Za-z0-9_]+){2,3}"
    ImplementationIdentifier:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9_\\.-]+"
    ControlParameters:
      type: array
      items:
        $ref: "#/components/schemas/ControlParameter"
    ControlParameter:
      description: 'Five types of control parameters are supported. AllowedRegions: List of Amazon Web Services Regions exempted from the control. Each string is expected to be an Amazon Web Services Region code. This parameter is mandatory for the OU Region deny control, CT.MULTISERVICE.PV.1. Example: ["us-east-1","us-west-2"] ExemptedActions: List of Amazon Web Services IAM actions exempted from the control. Each string is expected to be an IAM action. Example: ["logs:DescribeLogGroups","logs:StartQuery","logs:GetQueryResults"] ExemptedPrincipalArns: List of Amazon Web Services IAM principal ARNs exempted from the control. Each string is expected to be an IAM principal that follows the format arn:partition:service::account:resource Example: ["arn:aws:iam::*:role/ReadOnly","arn:aws:sts::*:assumed-role/ReadOnly/*"] ExemptedResourceArns: List of resource ARNs exempted from the control. Each string is expected to be a resource ARN. Example: ["arn:aws:s3:::my-bucket-name"] ExemptAssumeRoot: A parameter that lets you choose whether to exempt requests made with AssumeRoot from this control, for this OU. For member accounts, the AssumeRoot property is included in requests initiated by IAM centralized root access. This parameter applies only to the AWS-GR_RESTRICT_ROOT_USER control. If you add the parameter when enabling the control, the AssumeRoot exemption is allowed. If you omit the parameter, the AssumeRoot exception is not permitted. The parameter does not accept False as a value. Example: Enabling the control and allowing AssumeRoot { "controlIdentifier": "arn:aws:controlcatalog:::control/5kvme4m5d2b4d7if2fs5yg2ui", "parameters": [ { "key": "ExemptAssumeRoot", "value": true } ], "targetIdentifier": "arn:aws:organizations::8633900XXXXX:ou/o-6jmn81636m/ou-qsah-jtiihcla" }'
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The parameter name. This name is the parameter key when you call EnableControl or UpdateEnabledControl .
      required:
        - Name
    Timestamp:
      type: string
      format: date-time
    GovernedResources:
      type: array
      items:
        $ref: "#/components/schemas/GovernedResource"
    GovernedResource:
      type: string
      pattern: "[A-Za-z0-9]{2,64}::[A-Za-z0-9]{2,64}::[A-Za-z0-9]{2,64}"
    MaxListCommonControlsResults:
      type: integer
      minimum: 1
      maximum: 100
    PaginationToken:
      type: string
      minLength: 0
      maxLength: 1024
    CommonControlFilter:
      description: An optional filter that narrows the results to a specific objective.
      type: object
      properties:
        Objectives:
          $ref: "#/components/schemas/ObjectiveResourceFilterList"
          description: The objective that's used as filter criteria. You can use this parameter to specify one objective ARN at a time. Passing multiple ARNs in the CommonControlFilter isn’t supported.
    ObjectiveResourceFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectiveResourceFilter"
    ObjectiveResourceFilter:
      description: The objective resource that's being used as a filter.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ObjectiveArn"
          description: The Amazon Resource Name (ARN) of the objective.
    ObjectiveArn:
      type: string
      minLength: 36
      maxLength: 2048
      pattern: arn:(aws(?:[-a-z]*)?):controlcatalog:::objective/[0-9a-z]+
    ListCommonControlsResponse:
      type: object
      properties:
        CommonControls:
          $ref: "#/components/schemas/CommonControlSummaryList"
          description: The list of common controls that the ListCommonControls API returns.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
      required:
        - CommonControls
    CommonControlSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/CommonControlSummary"
    CommonControlSummary:
      description: A summary of metadata for a common control.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/CommonControlArn"
          description: The Amazon Resource Name (ARN) that identifies the common control.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the common control.
        Description:
          $ref: "#/components/schemas/String"
          description: The description of the common control.
        Domain:
          $ref: "#/components/schemas/AssociatedDomainSummary"
          description: The domain that the common control belongs to.
        Objective:
          $ref: "#/components/schemas/AssociatedObjectiveSummary"
          description: The objective that the common control belongs to.
        CreateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the common control was created.
        LastUpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the common control was most recently updated.
      required:
        - Arn
        - Name
        - Description
        - Domain
        - Objective
        - CreateTime
        - LastUpdateTime
    CommonControlArn:
      type: string
      minLength: 41
      maxLength: 2048
      pattern: arn:(aws(?:[-a-z]*)?):controlcatalog:::common-control/[0-9a-z]+
    AssociatedDomainSummary:
      description: A summary of the domain that a common control or an objective belongs to.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/DomainArn"
          description: The Amazon Resource Name (ARN) of the related domain.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the related domain.
    DomainArn:
      type: string
      minLength: 33
      maxLength: 2048
      pattern: arn:(aws(?:[-a-z]*)?):controlcatalog:::domain/[0-9a-z]+
    AssociatedObjectiveSummary:
      description: A summary of the objective that a common control supports.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ObjectiveArn"
          description: The Amazon Resource Name (ARN) of the related objective.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the related objective.
    MaxListControlMappingsResults:
      type: integer
      minimum: 1
      maximum: 1000
    ControlMappingFilter:
      description: A structure that defines filtering criteria for the ListControlMappings operation. You can use this filter to narrow down the list of control mappings based on control ARNs, common control ARNs, or mapping types.
      type: object
      properties:
        ControlArns:
          $ref: "#/components/schemas/ControlArnFilterList"
          description: A list of control ARNs to filter the mappings. When specified, only mappings associated with these controls are returned.
        CommonControlArns:
          $ref: "#/components/schemas/CommonControlArnFilterList"
          description: A list of common control ARNs to filter the mappings. When specified, only mappings associated with these common controls are returned.
        MappingTypes:
          $ref: "#/components/schemas/MappingTypeFilterList"
          description: A list of mapping types to filter the mappings. When specified, only mappings of these types are returned.
    ControlArnFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ControlArn"
    CommonControlArnFilterList:
      type: array
      items:
        $ref: "#/components/schemas/CommonControlArn"
    MappingTypeFilterList:
      type: array
      items:
        $ref: "#/components/schemas/MappingType"
    MappingType:
      type: string
      enum:
        - FRAMEWORK
        - COMMON_CONTROL
        - RELATED_CONTROL
    ListControlMappingsResponse:
      type: object
      properties:
        ControlMappings:
          $ref: "#/components/schemas/ControlMappings"
          description: The list of control mappings that the ListControlMappings API returns.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
      required:
        - ControlMappings
    ControlMappings:
      type: array
      items:
        $ref: "#/components/schemas/ControlMapping"
    ControlMapping:
      description: A structure that contains information about a control mapping, including the control ARN, mapping type, and mapping details.
      type: object
      properties:
        ControlArn:
          $ref: "#/components/schemas/ControlArn"
          description: The Amazon Resource Name (ARN) that identifies the control in the mapping.
        MappingType:
          $ref: "#/components/schemas/MappingType"
          description: The type of mapping relationship between the control and other entities.
        Mapping:
          $ref: "#/components/schemas/Mapping"
          description: The details of the mapping relationship, for example, containing framework, common control, or related control information.
      required:
        - ControlArn
        - MappingType
        - Mapping
    Mapping:
      description: A structure that contains the details of a mapping relationship, which can be either to a framework or to a common control.
      type: object
      properties:
        Framework:
          $ref: "#/components/schemas/FrameworkMappingDetails"
          description: The framework mapping details when the mapping type relates to a compliance framework.
        CommonControl:
          $ref: "#/components/schemas/CommonControlMappingDetails"
          description: The common control mapping details when the mapping type relates to a common control.
        RelatedControl:
          $ref: "#/components/schemas/RelatedControlMappingDetails"
          description: Returns information about controls that are related to the specified control.
    FrameworkMappingDetails:
      description: A structure that contains details about a framework mapping, including the framework name and specific item within the framework that the control maps to.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/FrameworkName"
          description: The name of the compliance framework that the control maps to.
        Item:
          $ref: "#/components/schemas/FrameworkItem"
          description: The specific item or requirement within the framework that the control maps to.
      required:
        - Name
        - Item
    FrameworkName:
      type: string
      minLength: 3
      maxLength: 250
    FrameworkItem:
      type: string
      minLength: 3
      maxLength: 250
    CommonControlMappingDetails:
      description: A structure that contains details about a common control mapping. In particular, it returns the Amazon Resource Name (ARN) of the common control.
      type: object
      properties:
        CommonControlArn:
          $ref: "#/components/schemas/CommonControlArn"
          description: The Amazon Resource Name (ARN) that identifies the common control in the mapping.
      required:
        - CommonControlArn
    RelatedControlMappingDetails:
      description: A structure that describes a control's relationship status with other controls.
      type: object
      properties:
        ControlArn:
          $ref: "#/components/schemas/ControlArn"
          description: The unique identifier of a control.
        RelationType:
          $ref: "#/components/schemas/ControlRelationType"
          description: Returns an enumerated value that represents the relationship between two or more controls.
      required:
        - RelationType
    ControlRelationType:
      type: string
      enum:
        - COMPLEMENTARY
        - ALTERNATIVE
        - MUTUALLY_EXCLUSIVE
    MaxListControlsResults:
      type: integer
      minimum: 1
      maximum: 100
    ControlFilter:
      description: A structure that defines filtering criteria for the ListControls operation. You can use this filter to narrow down the list of controls based on their implementation details.
      type: object
      properties:
        Implementations:
          $ref: "#/components/schemas/ImplementationFilter"
          description: A filter that narrows the results to controls with specific implementation types or identifiers. This field allows you to find controls that are implemented by specific Amazon Web Services services or with specific service identifiers.
    ImplementationFilter:
      description: A structure that defines filtering criteria for control implementations. You can use this filter to find controls that are implemented by specific Amazon Web Services services or with specific service identifiers.
      type: object
      properties:
        Types:
          $ref: "#/components/schemas/ImplementationTypeFilterList"
          description: A list of implementation types that can serve as filters. For example, you can filter for controls implemented as Amazon Web Services Config Rules by specifying AWS::Config::ConfigRule as a type.
        Identifiers:
          $ref: "#/components/schemas/ImplementationIdentifierFilterList"
          description: A list of service-specific identifiers that can serve as filters. For example, you can filter for controls with specific Amazon Web Services Config Rule IDs or Security Hub Control IDs.
    ImplementationTypeFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ImplementationType"
    ImplementationIdentifierFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ImplementationIdentifier"
    ListControlsResponse:
      type: object
      properties:
        Controls:
          $ref: "#/components/schemas/Controls"
          description: Returns a list of controls, given as structures of type controlSummary.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
      required:
        - Controls
    Controls:
      type: array
      items:
        $ref: "#/components/schemas/ControlSummary"
    ControlSummary:
      description: Overview of information about a control.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ControlArn"
          description: The Amazon Resource Name (ARN) of the control.
        Aliases:
          $ref: "#/components/schemas/ControlAliases"
          description: A list of alternative identifiers for the control. These are human-readable designators, such as SH.S3.1. Several aliases can refer to the same control across different Amazon Web Services services or compliance frameworks.
        Name:
          $ref: "#/components/schemas/String"
          description: The display name of the control.
        Description:
          $ref: "#/components/schemas/String"
          description: A description of the control, as it may appear in the console. Describes the functionality of the control.
        Behavior:
          $ref: "#/components/schemas/ControlBehavior"
          description: "An enumerated type, with the following possible values:"
        Severity:
          $ref: "#/components/schemas/ControlSeverity"
          description: "An enumerated type, with the following possible values:"
        Implementation:
          $ref: "#/components/schemas/ImplementationSummary"
          description: An object of type ImplementationSummary that describes how the control is implemented.
        CreateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that notes the time when the control was released (start of its life) as a governance capability in Amazon Web Services.
        GovernedResources:
          $ref: "#/components/schemas/GovernedResources"
          description: A list of Amazon Web Services resource types that are governed by this control. This information helps you understand which controls can govern certain types of resources, and conversely, which resources are affected when the control is implemented. The resources are represented as Amazon Web Services CloudFormation resource types. If GovernedResources cannot be represented by available CloudFormation resource types, it’s returned as an empty list.
      required:
        - Arn
        - Name
        - Description
    ImplementationSummary:
      description: A summary of how the control is implemented, including the Amazon Web Services service that enforces the control and its service-specific identifier. For example, the value of this field could indicate that the control is implemented as an Amazon Web Services Config Rule or an Amazon Web Services Security Hub control.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ImplementationType"
          description: A string that represents the Amazon Web Services service that implements this control. For example, a value of AWS::Config::ConfigRule indicates that the control is implemented by Amazon Web Services Config, and AWS::SecurityHub::SecurityControl indicates implementation by Amazon Web Services Security Hub.
        Identifier:
          $ref: "#/components/schemas/ImplementationIdentifier"
          description: The identifier originally assigned by the Amazon Web Services service that implements the control. For example, CODEPIPELINE_DEPLOYMENT_COUNT_CHECK.
      required:
        - Type
    MaxListDomainsResults:
      type: integer
      minimum: 1
      maximum: 100
    ListDomainsResponse:
      type: object
      properties:
        Domains:
          $ref: "#/components/schemas/DomainSummaryList"
          description: The list of domains that the ListDomains API returns.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
      required:
        - Domains
    DomainSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/DomainSummary"
    DomainSummary:
      description: A summary of metadata for a domain.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/DomainArn"
          description: The Amazon Resource Name (ARN) that identifies the domain.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the domain.
        Description:
          $ref: "#/components/schemas/String"
          description: The description of the domain.
        CreateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the domain was created.
        LastUpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the domain was most recently updated.
      required:
        - Arn
        - Name
        - Description
        - CreateTime
        - LastUpdateTime
    MaxListObjectivesResults:
      type: integer
      minimum: 1
      maximum: 100
    ObjectiveFilter:
      description: An optional filter that narrows the list of objectives to a specific domain.
      type: object
      properties:
        Domains:
          $ref: "#/components/schemas/DomainResourceFilterList"
          description: The domain that's used as filter criteria. You can use this parameter to specify one domain ARN at a time. Passing multiple ARNs in the ObjectiveFilter isn’t supported.
    DomainResourceFilterList:
      type: array
      items:
        $ref: "#/components/schemas/DomainResourceFilter"
    DomainResourceFilter:
      description: The domain resource that's being used as a filter.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/DomainArn"
          description: The Amazon Resource Name (ARN) of the domain.
    ListObjectivesResponse:
      type: object
      properties:
        Objectives:
          $ref: "#/components/schemas/ObjectiveSummaryList"
          description: The list of objectives that the ListObjectives API returns.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
      required:
        - Objectives
    ObjectiveSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectiveSummary"
    ObjectiveSummary:
      description: A summary of metadata for an objective.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ObjectiveArn"
          description: The Amazon Resource Name (ARN) that identifies the objective.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the objective.
        Description:
          $ref: "#/components/schemas/String"
          description: The description of the objective.
        Domain:
          $ref: "#/components/schemas/AssociatedDomainSummary"
          description: The domain that the objective belongs to.
        CreateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the objective was created.
        LastUpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the objective was most recently updated.
      required:
        - Arn
        - Name
        - Description
        - Domain
        - CreateTime
        - LastUpdateTime
