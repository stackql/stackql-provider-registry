        $ref: "#/components/schemas/ListedConnector"
    ListedConnector:
      description: Returns details of the connector that is specified.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the specified connector.
        ConnectorId:
          $ref: "#/components/schemas/ConnectorId"
          description: The unique identifier for the connector.
        Url:
          $ref: "#/components/schemas/Url"
          description: The URL of the partner's AS2 or SFTP endpoint. When creating AS2 connectors or service-managed SFTP connectors (connectors without egress configuration), you must provide a URL to specify the remote server endpoint. For VPC Lattice type connectors, the URL must be null.
    ListExecutionsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: ListExecutions returns the NextToken parameter in the output. You can then pass the NextToken parameter in a subsequent command to continue listing additional executions.
        WorkflowId:
          $ref: "#/components/schemas/WorkflowId"
          description: A unique identifier for the workflow.
        Executions:
          $ref: "#/components/schemas/ListedExecutions"
          description: Returns the details for each execution, in a ListedExecution array.
      required:
        - WorkflowId
        - Executions
    ListedExecutions:
      type: array
      items:
        $ref: "#/components/schemas/ListedExecution"
    ListedExecution:
      description: Returns properties of the execution that is specified.
      type: object
      properties:
        ExecutionId:
          $ref: "#/components/schemas/ExecutionId"
          description: A unique identifier for the execution of a workflow.
        InitialFileLocation:
          $ref: "#/components/schemas/FileLocation"
          description: "A structure that describes the Amazon S3 or EFS file location. This is the file location when the execution begins: if the file is being copied, this is the initial (as opposed to destination) file location."
        ServiceMetadata:
          $ref: "#/components/schemas/ServiceMetadata"
          description: A container object for the session details that are associated with a workflow.
        Status:
          $ref: "#/components/schemas/ExecutionStatus"
          description: The status is one of the execution. Can be in progress, completed, exception encountered, or handling the exception.
    TransferId:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[0-9a-zA-Z./-]+"
    ListFileTransferResultsResponse:
      type: object
      properties:
        FileTransferResults:
          $ref: "#/components/schemas/ConnectorFileTransferResults"
          description: "Returns the details for the files transferred in the transfer identified by the TransferId and ConnectorId specified. FilePath: the filename and path to where the file was sent to or retrieved from. StatusCode: current status for the transfer. The status returned is one of the following values:QUEUED, IN_PROGRESS, COMPLETED, or FAILED FailureCode: for transfers that fail, this parameter contains a code indicating the reason. For example, RETRIEVE_FILE_NOT_FOUND FailureMessage: for transfers that fail, this parameter describes the reason for the failure."
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: Returns a token that you can use to call ListFileTransferResults again and receive additional results, if there are any (against the same TransferId.
      required:
        - FileTransferResults
    ConnectorFileTransferResults:
      type: array
      items:
        $ref: "#/components/schemas/ConnectorFileTransferResult"
    ConnectorFileTransferResult:
      description: A structure that contains the details for files transferred using an SFTP connector, during a single transfer.
      type: object
      properties:
        FilePath:
          $ref: "#/components/schemas/FilePath"
          description: The filename and path to where the file was sent to or retrieved from.
        StatusCode:
          $ref: "#/components/schemas/TransferTableStatus"
          description: The current status for the transfer.
        FailureCode:
          $ref: "#/components/schemas/FailureCode"
          description: For transfers that fail, this parameter contains a code indicating the reason. For example, RETRIEVE_FILE_NOT_FOUND
        FailureMessage:
          $ref: "#/components/schemas/Message"
          description: For transfers that fail, this parameter describes the reason for the failure.
      required:
        - FilePath
        - StatusCode
    FilePath:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: (.)+
    TransferTableStatus:
      type: string
      enum:
        - QUEUED
        - IN_PROGRESS
        - COMPLETED
        - FAILED
    FailureCode:
      type: string
    Message:
      type: string
    ListHostKeysResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: Returns a token that you can use to call ListHostKeys again and receive additional results, if there are any.
        ServerId:
          $ref: "#/components/schemas/ServerId"
          description: Returns the server identifier that contains the listed host keys.
        HostKeys:
          $ref: "#/components/schemas/ListedHostKeys"
          description: Returns an array, where each item contains the details of a host key.
      required:
        - ServerId
        - HostKeys
    ListedHostKeys:
      type: array
      items:
        $ref: "#/components/schemas/ListedHostKey"
    ListedHostKey:
      description: Returns properties of the host key that's specified.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The unique Amazon Resource Name (ARN) of the host key.
        HostKeyId:
          $ref: "#/components/schemas/HostKeyId"
          description: A unique identifier for the host key.
        Fingerprint:
          $ref: "#/components/schemas/HostKeyFingerprint"
          description: The public key fingerprint, which is a short sequence of bytes used to identify the longer public key.
        Description:
          $ref: "#/components/schemas/HostKeyDescription"
          description: The current description for the host key. You can change it by calling the UpdateHostKey operation and providing a new description.
        Type:
          $ref: "#/components/schemas/HostKeyType"
          description: "The encryption algorithm that is used for the host key. The Type parameter is specified by using one of the following values: ssh-rsa ssh-ed25519 ecdsa-sha2-nistp256 ecdsa-sha2-nistp384 ecdsa-sha2-nistp521"
        DateImported:
          $ref: "#/components/schemas/DateImported"
          description: The date on which the host key was added to the server.
      required:
        - Arn
    ListProfilesResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: Returns a token that you can use to call ListProfiles again and receive additional results, if there are any.
        Profiles:
          $ref: "#/components/schemas/ListedProfiles"
          description: Returns an array, where each item contains the details of a profile.
      required:
        - Profiles
    ListedProfiles:
      type: array
      items:
        $ref: "#/components/schemas/ListedProfile"
    ListedProfile:
      description: Returns the properties of the profile that was specified.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the specified profile.
        ProfileId:
          $ref: "#/components/schemas/ProfileId"
          description: A unique identifier for the local or partner AS2 profile.
        As2Id:
          $ref: "#/components/schemas/As2Id"
          description: The As2Id is the AS2-name, as defined in the RFC 4130. For inbound transfers, this is the AS2-From header for the AS2 messages sent from the partner. For outbound connectors, this is the AS2-To header for the AS2 messages sent to the partner using the StartFileTransfer API operation. This ID cannot include spaces.
        ProfileType:
          $ref: "#/components/schemas/ProfileType"
          description: Indicates whether to list only LOCAL type profiles or only PARTNER type profiles. If not supplied in the request, the command lists all types of profiles.
    ListSecurityPoliciesRowDisplay:
      type: object
