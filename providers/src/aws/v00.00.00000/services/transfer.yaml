  /ImportCertificate:
    post:
      operationId: ImportCertificate
      description: "Imports the signing and encryption certificates that you need to create local (AS2) profiles and partner profiles. You can import both the certificate and its chain in the Certificate parameter. After importing a certificate, Transfer Family automatically creates a Amazon CloudWatch metric called DaysUntilExpiry that tracks the number of days until the certificate expires. The metric is based on the InactiveDate parameter and is published daily in the AWS/Transfer namespace. It can take up to a full day after importing a certificate for Transfer Family to emit the DaysUntilExpiry metric to your account. If you use the Certificate parameter to upload both the certificate and its chain, don't use the CertificateChain parameter. CloudWatch monitoring The DaysUntilExpiry metric includes the following specifications: Units: Count (days) Dimensions: CertificateId (always present), Description (if provided during certificate import) Statistics: Minimum, Maximum, Average Frequency: Published daily"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.ImportCertificate
            default: TransferService.ImportCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Usage:
                  $ref: "#/components/schemas/CertificateUsageType"
                  description: "Specifies how this certificate is used. It can be used in the following ways: SIGNING: For signing AS2 messages ENCRYPTION: For encrypting AS2 messages TLS: For securing AS2 communications sent over HTTPS"
                Certificate:
                  $ref: "#/components/schemas/CertificateBodyType"
                  description: For the CLI, provide a file path for a certificate in URI format. For example, --certificate file://encryption-cert.pem. Alternatively, you can provide the raw content. For the SDK, specify the raw content of a certificate file. For example, --certificate "`cat encryption-cert.pem`". You can provide both the certificate and its chain in this parameter, without needing to use the CertificateChain parameter. If you use this parameter for both the certificate and its chain, do not use the CertificateChain parameter.
                CertificateChain:
                  $ref: "#/components/schemas/CertificateChainType"
                  description: An optional list of certificates that make up the chain for the certificate that's being imported.
                PrivateKey:
                  $ref: "#/components/schemas/PrivateKeyType"
                  description: For the CLI, provide a file path for a private key in URI format. For example, --private-key file://encryption-key.pem. Alternatively, you can provide the raw content of the private key file. For the SDK, specify the raw content of a private key file. For example, --private-key "`cat encryption-key.pem`"
                ActiveDate:
                  $ref: "#/components/schemas/CertDate"
                  description: An optional date that specifies when the certificate becomes active. If you do not specify a value, ActiveDate takes the same value as NotBeforeDate, which is specified by the CA.
                InactiveDate:
                  $ref: "#/components/schemas/CertDate"
                  description: An optional date that specifies when the certificate becomes inactive. If you do not specify a value, InactiveDate takes the same value as NotAfterDate, which is specified by the CA.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A short description that helps identify the certificate.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: Key-value pairs that can be used to group and search for certificates.
              required:
                - Usage
                - Certificate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportCertificateResponse"
