          items:
            $ref: "#/components/schemas/ListSecurityPoliciesRowDisplay"
    ListServersResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When you can get additional results from the ListServers operation, a NextToken parameter is returned in the output. In a following command, you can pass in the NextToken parameter to continue listing additional servers.
        Servers:
          $ref: "#/components/schemas/ListedServers"
          description: An array of servers that were listed.
      required:
        - Servers
    ListedServers:
      type: array
      items:
        $ref: "#/components/schemas/ListedServer"
    ListedServer:
      description: Returns properties of a file transfer protocol-enabled server that was specified.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: Specifies the unique Amazon Resource Name (ARN) for a server to be listed.
        Domain:
          $ref: "#/components/schemas/Domain"
          description: "Specifies the domain of the storage system that is used for file transfers. There are two domains available: Amazon Simple Storage Service (Amazon S3) and Amazon Elastic File System (Amazon EFS). The default value is S3."
        IdentityProviderType:
          $ref: "#/components/schemas/IdentityProviderType"
          description: The mode of authentication for a server. The default value is SERVICE_MANAGED, which allows you to store and access user credentials within the Transfer Family service. Use AWS_DIRECTORY_SERVICE to provide access to Active Directory groups in Directory Service for Microsoft Active Directory or Microsoft Active Directory in your on-premises environment or in Amazon Web Services using AD Connector. This option also requires you to provide a Directory ID by using the IdentityProviderDetails parameter. Use the API_GATEWAY value to integrate with an identity provider of your choosing. The API_GATEWAY setting requires you to provide an Amazon API Gateway endpoint URL to call for authentication by using the IdentityProviderDetails parameter. Use the AWS_LAMBDA value to directly use an Lambda function as your identity provider. If you choose this value, you must specify the ARN for the Lambda function in the Function parameter for the IdentityProviderDetails data type.
        EndpointType:
          $ref: "#/components/schemas/EndpointType"
          description: Specifies the type of VPC endpoint that your server is connected to. If your server is connected to a VPC endpoint, your server isn't accessible over the public internet.
        LoggingRole:
          $ref: "#/components/schemas/Role"
          description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role that allows a server to turn on Amazon CloudWatch logging for Amazon S3 or Amazon EFS events. When set, you can view user activity in your CloudWatch logs.
        ServerId:
          $ref: "#/components/schemas/ServerId"
          description: Specifies the unique system assigned identifier for the servers that were listed.
        State:
          $ref: "#/components/schemas/State"
          description: The condition of the server that was described. A value of ONLINE indicates that the server can accept jobs and transfer files. A State value of OFFLINE means that the server cannot perform file transfer operations. The states of STARTING and STOPPING indicate that the server is in an intermediate state, either not fully able to respond, or not fully offline. The values of START_FAILED or STOP_FAILED can indicate an error condition.
        UserCount:
          $ref: "#/components/schemas/UserCount"
          description: Specifies the number of users that are assigned to a server you specified with the ServerId.
      required:
        - Arn
    ListTagsForResourceResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN you specified to list the tags of.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When you can get additional results from the ListTagsForResource call, a NextToken parameter is returned in the output. You can then pass in a subsequent command to the NextToken parameter to continue listing additional tags.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: Key-value pairs that are assigned to a resource, usually for the purpose of grouping and searching for items. Tags are metadata that you define.
    ListUsersResponse:
      type: object
      properties:
