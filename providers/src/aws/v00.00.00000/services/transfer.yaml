        ServerId:
          $ref: "#/components/schemas/ServerId"
          description: A system-assigned unique identifier for a server that the users are assigned to.
        Users:
          $ref: "#/components/schemas/ListedUsers"
          description: Returns the Transfer Family users and their properties for the ServerId value that you specify.
      required:
        - ServerId
        - Users
    ListedUsers:
      type: array
      items:
        $ref: "#/components/schemas/ListedUser"
    ListedUser:
      description: Returns properties of the user that you specify.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: Provides the unique Amazon Resource Name (ARN) for the user that you want to learn about.
        HomeDirectory:
          $ref: "#/components/schemas/HomeDirectory"
          description: The landing directory (folder) for a user when they log in to the server using the client. A HomeDirectory example is /bucket_name/home/mydirectory. You can use the HomeDirectory parameter for HomeDirectoryType when it is set to either PATH or LOGICAL.
        HomeDirectoryType:
          $ref: "#/components/schemas/HomeDirectoryType"
          description: The type of landing directory (folder) that you want your users' home directory to be when they log in to the server. If you set it to PATH, the user will see the absolute Amazon S3 bucket or Amazon EFS path as is in their file transfer protocol clients. If you set it to LOGICAL, you need to provide mappings in the HomeDirectoryMappings for how you want to make Amazon S3 or Amazon EFS paths visible to your users. If HomeDirectoryType is LOGICAL, you must provide mappings, using the HomeDirectoryMappings parameter. If, on the other hand, HomeDirectoryType is PATH, you provide an absolute path using the HomeDirectory parameter. You cannot have both HomeDirectory and HomeDirectoryMappings in your template.
        Role:
          $ref: "#/components/schemas/Role"
          description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role that controls your users' access to your Amazon S3 bucket or Amazon EFS file system. The policies attached to this role determine the level of access that you want to provide your users when transferring files into and out of your Amazon S3 bucket or Amazon EFS file system. The IAM role should also contain a trust relationship that allows the server to access your resources when servicing your users' transfer requests. The IAM role that controls your users' access to your Amazon S3 bucket for servers with Domain=S3, or your EFS file system for servers with Domain=EFS. The policies attached to this role determine the level of access you want to provide your users when transferring files into and out of your S3 buckets or EFS file systems.
        SshPublicKeyCount:
          $ref: "#/components/schemas/SshPublicKeyCount"
          description: Specifies the number of SSH public keys stored for the user you specified.
        UserName:
          $ref: "#/components/schemas/UserName"
          description: Specifies the name of the user whose ARN was specified. User names are used for authentication purposes.
      required:
        - Arn
    SshPublicKeyCount:
      type: integer
    ListWebAppsResponse:
