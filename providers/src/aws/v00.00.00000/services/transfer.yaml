      required:
        - CertificateId
    UpdateConnectorEgressConfig:
      description: Structure for updating the egress configuration of an existing connector. Allows modification of how traffic is routed from the connector to the SFTP server, including VPC_LATTICE settings.
      type: object
      properties:
        VpcLattice:
          $ref: "#/components/schemas/UpdateConnectorVpcLatticeEgressConfig"
          description: VPC_LATTICE configuration updates for the connector. Use this to modify the Resource Configuration ARN or port number for VPC-based connectivity.
    UpdateConnectorVpcLatticeEgressConfig:
      description: VPC_LATTICE egress configuration updates for modifying how the connector routes traffic through customer VPCs. Changes to these settings may require connector restart to take effect.
      type: object
      properties:
        ResourceConfigurationArn:
          $ref: "#/components/schemas/VpcLatticeResourceConfigurationArn"
          description: Updated ARN of the VPC_LATTICE Resource Configuration. Use this to change the target SFTP server location or modify the network path through the customer's VPC infrastructure.
        PortNumber:
          $ref: "#/components/schemas/SftpPort"
          description: Updated port number for SFTP connections through VPC_LATTICE. Change this if the target SFTP server port has been modified or if connecting to a different server endpoint.
