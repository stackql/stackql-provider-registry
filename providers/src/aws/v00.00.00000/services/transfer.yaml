                  description: An optional date that specifies when the certificate becomes active. If you do not specify a value, ActiveDate takes the same value as NotBeforeDate, which is specified by the CA.
                InactiveDate:
                  $ref: "#/components/schemas/CertDate"
                  description: An optional date that specifies when the certificate becomes inactive. If you do not specify a value, InactiveDate takes the same value as NotAfterDate, which is specified by the CA.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A short description to help identify the certificate.
              required:
                - CertificateId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCertificateResponse"
  /UpdateConnector:
    post:
      operationId: UpdateConnector
      description: Updates some of the parameters for an existing connector. Provide the ConnectorId for the connector that you want to update, along with the new values for the parameters to update.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.UpdateConnector
            default: TransferService.UpdateConnector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConnectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: The unique identifier for the connector.
                Url:
                  $ref: "#/components/schemas/Url"
                  description: The URL of the partner's AS2 or SFTP endpoint. When creating AS2 connectors or service-managed SFTP connectors (connectors without egress configuration), you must provide a URL to specify the remote server endpoint. For VPC Lattice type connectors, the URL must be null.
                As2Config:
                  $ref: "#/components/schemas/As2ConnectorConfig"
                  description: A structure that contains the parameters for an AS2 connector object.
                AccessRole:
                  $ref: "#/components/schemas/Role"
                  description: Connectors are used to send files using either the AS2 or SFTP protocol. For the access role, provide the Amazon Resource Name (ARN) of the Identity and Access Management role to use. For AS2 connectors With AS2, you can send files by calling StartFileTransfer and specifying the file paths in the request parameter, SendFilePaths. We use the file’s parent directory (for example, for --send-file-paths /bucket/dir/file.txt, parent directory is /bucket/dir/) to temporarily store a processed AS2 message file, store the MDN when we receive them from the partner, and write a final JSON file containing relevant metadata of the transmission. So, the AccessRole needs to provide read and write access to the parent directory of the file location used in the StartFileTransfer request. Additionally, you need to provide read and write access to the parent directory of the files that you intend to send with StartFileTransfer. If you are using Basic authentication for your AS2 connector, the access role requires the secretsmanager:GetSecretValue permission for the secret. If the secret is encrypted using a customer-managed key instead of the Amazon Web Services managed key in Secrets Manager, then the role also needs the kms:Decrypt permission for that key. For SFTP connectors Make sure that the access role provides read and write access to the parent directory of the file location that's used in the StartFileTransfer request. Additionally, make sure that the role provides secretsmanager:GetSecretValue permission to Secrets Manager.
                LoggingRole:
                  $ref: "#/components/schemas/Role"
                  description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role that allows a connector to turn on CloudWatch logging for Amazon S3 events. When set, you can view connector activity in your CloudWatch logs.
                SftpConfig:
                  $ref: "#/components/schemas/SftpConnectorConfig"
                  description: A structure that contains the parameters for an SFTP connector object.
                SecurityPolicyName:
                  $ref: "#/components/schemas/ConnectorSecurityPolicyName"
                  description: Specifies the name of the security policy for the connector.
                EgressConfig:
                  $ref: "#/components/schemas/UpdateConnectorEgressConfig"
                  description: Updates the egress configuration for the connector, allowing you to modify how traffic is routed from the connector to the SFTP server. Changes to VPC configuration may require connector restart.
                IpAddressType:
                  $ref: "#/components/schemas/ConnectorsIpAddressType"
                  description: Specifies the IP address type for the connector's network connections. When set to IPV4, the connector uses IPv4 addresses only. When set to DUALSTACK, the connector supports both IPv4 and IPv6 addresses, with IPv6 preferred when available.
              required:
                - ConnectorId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectorResponse"
  /UpdateHostKey:
