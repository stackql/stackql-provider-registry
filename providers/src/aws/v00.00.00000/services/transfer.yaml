                $ref: "#/components/schemas/SendWorkflowStepStateResponse"
  /StartDirectoryListing:
    post:
      operationId: StartDirectoryListing
      description: "Retrieves a list of the contents of a directory from a remote SFTP server. You specify the connector ID, the output path, and the remote directory path. You can also specify the optional MaxItems value to control the maximum number of items that are listed from the remote directory. This API returns a list of all files and directories in the remote directory (up to the maximum value), but does not return files or folders in sub-directories. That is, it only returns a list of files and directories one-level deep. After you receive the listing file, you can provide the files that you want to transfer to the RetrieveFilePaths parameter of the StartFileTransfer API call. The naming convention for the output file is connector-ID-listing-ID.json. The output file contains the following information: filePath: the complete path of a remote file, relative to the directory of the listing request for your SFTP connector on the remote server. modifiedTimestamp: the last time the file was modified, in UTC time format. This field is optional. If the remote file attributes don't contain a timestamp, it is omitted from the file listing. size: the size of the file, in bytes. This field is optional. If the remote file attributes don't contain a file size, it is omitted from the file listing. path: the complete path of a remote directory, relative to the directory of the listing request for your SFTP connector on the remote server. truncated: a flag indicating whether the list output contains all of the items contained in the remote directory or not. If your Truncated output value is true, you can increase the value provided in the optional max-items input attribute to be able to list more items (up to the maximum allowed list size of 200,000 items)."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.StartDirectoryListing
            default: TransferService.StartDirectoryListing
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConnectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: The unique identifier for the connector.
                RemoteDirectoryPath:
                  $ref: "#/components/schemas/FilePath"
                  description: Specifies the directory on the remote SFTP server for which you want to list its contents.
                MaxItems:
                  $ref: "#/components/schemas/MaxItems"
                  description: An optional parameter where you can specify the maximum number of file/directory names to retrieve. The default value is 1,000.
                OutputDirectoryPath:
                  $ref: "#/components/schemas/FilePath"
                  description: Specifies the path (bucket and prefix) in Amazon S3 storage to store the results of the directory listing.
              required:
                - ConnectorId
                - RemoteDirectoryPath
                - OutputDirectoryPath
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDirectoryListingResponse"
  /StartFileTransfer:
    post:
      operationId: StartFileTransfer
      description: "Begins a file transfer between local Amazon Web Services storage and a remote AS2 or SFTP server. For an AS2 connector, you specify the ConnectorId and one or more SendFilePaths to identify the files you want to transfer. For an SFTP connector, the file transfer can be either outbound or inbound. In both cases, you specify the ConnectorId. Depending on the direction of the transfer, you also specify the following items: If you are transferring file from a partner's SFTP server to Amazon Web Services storage, you specify one or more RetrieveFilePaths to identify the files you want to transfer, and a LocalDirectoryPath to specify the destination folder. If you are transferring file to a partner's SFTP server from Amazon Web Services storage, you specify one or more SendFilePaths to identify the files you want to transfer, and a RemoteDirectoryPath to specify the destination folder."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.StartFileTransfer
            default: TransferService.StartFileTransfer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConnectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: The unique identifier for the connector.
                SendFilePaths:
                  $ref: "#/components/schemas/FilePaths"
                  description: One or more source paths for the Amazon S3 storage. Each string represents a source file path for one outbound file transfer. For example, amzn-s3-demo-bucket/myfile.txt . Replace amzn-s3-demo-bucket with one of your actual buckets.
                RetrieveFilePaths:
                  $ref: "#/components/schemas/FilePaths"
                  description: One or more source paths for the partner's SFTP server. Each string represents a source file path for one inbound file transfer.
                LocalDirectoryPath:
                  $ref: "#/components/schemas/FilePath"
                  description: For an inbound transfer, the LocaDirectoryPath specifies the destination for one or more files that are transferred from the partner's SFTP server.
                RemoteDirectoryPath:
                  $ref: "#/components/schemas/FilePath"
                  description: For an outbound transfer, the RemoteDirectoryPath specifies the destination for one or more files that are transferred to the partner's SFTP server. If you don't specify a RemoteDirectoryPath, the destination for transferred files is the SFTP user's home directory.
                CustomHttpHeaders:
                  $ref: "#/components/schemas/CustomHttpHeaders"
                  description: An array of key-value pairs that represent custom HTTP headers to include in AS2 messages. These headers are added to the AS2 message when sending files to your trading partner.
              required:
                - ConnectorId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartFileTransferResponse"
  /StartRemoteDelete:
    post:
      operationId: StartRemoteDelete
      description: Deletes a file or directory on the remote SFTP server.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.StartRemoteDelete
            default: TransferService.StartRemoteDelete
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConnectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: The unique identifier for the connector.
                DeletePath:
                  $ref: "#/components/schemas/FilePath"
                  description: The absolute path of the file or directory to delete. You can only specify one path per call to this operation.
              required:
                - ConnectorId
                - DeletePath
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRemoteDeleteResponse"
  /StartRemoteMove:
    post:
      operationId: StartRemoteMove
      description: Moves or renames a file or directory on the remote SFTP server.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.StartRemoteMove
            default: TransferService.StartRemoteMove
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConnectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: The unique identifier for the connector.
                SourcePath:
                  $ref: "#/components/schemas/FilePath"
                  description: The absolute path of the file or directory to move or rename. You can only specify one path per call to this operation.
                TargetPath:
                  $ref: "#/components/schemas/FilePath"
                  description: The absolute path for the target of the move/rename operation.
              required:
                - ConnectorId
                - SourcePath
                - TargetPath
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRemoteMoveResponse"
  /StartServer:
    post:
      operationId: StartServer
      description: Changes the state of a file transfer protocol-enabled server from OFFLINE to ONLINE. It has no impact on a server that is already ONLINE. An ONLINE server can accept and process file transfer jobs. The state of STARTING indicates that the server is in an intermediate state, either not fully able to respond, or not fully online. The values of START_FAILED can indicate an error condition. No response is returned from this call.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.StartServer
            default: TransferService.StartServer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServerId:
                  $ref: "#/components/schemas/ServerId"
                  description: A system-assigned unique identifier for a server that you start.
              required:
                - ServerId
      responses:
        "200":
          description: Success
  /StopServer:
    post:
      operationId: StopServer
      description: Changes the state of a file transfer protocol-enabled server from ONLINE to OFFLINE. An OFFLINE server cannot accept and process file transfer jobs. Information tied to your server, such as server and user properties, are not affected by stopping your server. Stopping the server does not reduce or impact your file transfer protocol endpoint billing; you must delete the server to stop being billed. The state of STOPPING indicates that the server is in an intermediate state, either not fully able to respond, or not fully offline. The values of STOP_FAILED can indicate an error condition. No response is returned from this call.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.StopServer
            default: TransferService.StopServer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServerId:
                  $ref: "#/components/schemas/ServerId"
                  description: A system-assigned unique identifier for a server that you stopped.
              required:
                - ServerId
      responses:
        "200":
          description: Success
  /TagResource:
    post:
      operationId: TagResource
      description: Attaches a key-value pair to a resource, as identified by its Amazon Resource Name (ARN). Resources are users, servers, roles, and other entities. There is no response returned from this call.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.TagResource
            default: TransferService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/Arn"
                  description: An Amazon Resource Name (ARN) for a specific Amazon Web Services resource, such as a server, user, or role.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: Key-value pairs assigned to ARNs that you can use to group and search for resources by type. You can attach this metadata to resources (servers, users, workflows, and so on) for any purpose.
              required:
                - Arn
                - Tags
      responses:
        "200":
          description: Success
  /TestConnection:
    post:
      operationId: TestConnection
      description: Tests whether your SFTP connector is set up successfully. We highly recommend that you call this operation to test your ability to transfer files between local Amazon Web Services storage and a trading partner's SFTP server.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.TestConnection
            default: TransferService.TestConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConnectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: The unique identifier for the connector.
              required:
                - ConnectorId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"
  /TestIdentityProvider:
    post:
      operationId: TestIdentityProvider
      description: "If the IdentityProviderType of a file transfer protocol-enabled server is AWS_DIRECTORY_SERVICE or API_Gateway, tests whether your identity provider is set up successfully. We highly recommend that you call this operation to test your authentication method as soon as you create your server. By doing so, you can troubleshoot issues with the identity provider integration to ensure that your users can successfully use the service. The ServerId and UserName parameters are required. The ServerProtocol, SourceIp, and UserPassword are all optional. Note the following: You cannot use TestIdentityProvider if the IdentityProviderType of your server is SERVICE_MANAGED. TestIdentityProvider does not work with keys: it only accepts passwords. TestIdentityProvider can test the password operation for a custom Identity Provider that handles keys and passwords. If you provide any incorrect values for any parameters, the Response field is empty. If you provide a server ID for a server that uses service-managed users, you get an error: An error occurred (InvalidRequestException) when calling the TestIdentityProvider operation: s-server-ID not configured for external auth If you enter a Server ID for the --server-id parameter that does not identify an actual Transfer server, you receive the following error: An error occurred (ResourceNotFoundException) when calling the TestIdentityProvider operation: Unknown server. It is possible your sever is in a different region. You can specify a region by adding the following: --region region-code, such as --region us-east-2 to specify a server in US East (Ohio)."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.TestIdentityProvider
            default: TransferService.TestIdentityProvider
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServerId:
                  $ref: "#/components/schemas/ServerId"
                  description: A system-assigned identifier for a specific server. That server's user authentication method is tested with a user name and password.
                ServerProtocol:
                  $ref: "#/components/schemas/Protocol"
                  description: "The type of file transfer protocol to be tested. The available protocols are: Secure Shell (SSH) File Transfer Protocol (SFTP) File Transfer Protocol Secure (FTPS) File Transfer Protocol (FTP) Applicability Statement 2 (AS2)"
                SourceIp:
                  $ref: "#/components/schemas/SourceIp"
                  description: The source IP address of the account to be tested.
                UserName:
                  $ref: "#/components/schemas/UserName"
                  description: The name of the account to be tested.
                UserPassword:
                  $ref: "#/components/schemas/UserPassword"
                  description: The password of the account to be tested.
              required:
                - ServerId
                - UserName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestIdentityProviderResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Detaches a key-value pair from a resource, as identified by its Amazon Resource Name (ARN). Resources are users, servers, roles, and other entities. No response is returned from this call.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.UntagResource
            default: TransferService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/Arn"
                  description: The value of the resource that will have the tag removed. An Amazon Resource Name (ARN) is an identifier for a specific Amazon Web Services resource, such as a server, user, or role.
                TagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: TagKeys are key-value pairs assigned to ARNs that can be used to group and search for resources by type. This metadata can be attached to resources for any purpose.
              required:
                - Arn
                - TagKeys
      responses:
        "200":
          description: Success
  /UpdateAccess:
    post:
      operationId: UpdateAccess
      description: Allows you to update parameters for the access specified in the ServerID and ExternalID parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.UpdateAccess
            default: TransferService.UpdateAccess
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HomeDirectory:
                  $ref: "#/components/schemas/HomeDirectory"
                  description: The landing directory (folder) for a user when they log in to the server using the client. A HomeDirectory example is /bucket_name/home/mydirectory. You can use the HomeDirectory parameter for HomeDirectoryType when it is set to either PATH or LOGICAL.
                HomeDirectoryType:
                  $ref: "#/components/schemas/HomeDirectoryType"
                  description: The type of landing directory (folder) that you want your users' home directory to be when they log in to the server. If you set it to PATH, the user will see the absolute Amazon S3 bucket or Amazon EFS path as is in their file transfer protocol clients. If you set it to LOGICAL, you need to provide mappings in the HomeDirectoryMappings for how you want to make Amazon S3 or Amazon EFS paths visible to your users. If HomeDirectoryType is LOGICAL, you must provide mappings, using the HomeDirectoryMappings parameter. If, on the other hand, HomeDirectoryType is PATH, you provide an absolute path using the HomeDirectory parameter. You cannot have both HomeDirectory and HomeDirectoryMappings in your template.
                HomeDirectoryMappings:
                  $ref: "#/components/schemas/HomeDirectoryMappings"
                  description: 'Logical directory mappings that specify what Amazon S3 or Amazon EFS paths and keys should be visible to your user and how you want to make them visible. You must specify the Entry and Target pair, where Entry shows how the path is made visible and Target is the actual Amazon S3 or Amazon EFS path. If you only specify a target, it is displayed as is. You also must ensure that your Identity and Access Management (IAM) role provides access to paths in Target. This value can be set only when HomeDirectoryType is set to LOGICAL. The following is an Entry and Target pair example. [ { "Entry": "/directory1", "Target": "/bucket_name/home/mydirectory" } ] In most cases, you can use this value instead of the session policy to lock down your user to the designated home directory ("chroot"). To do this, you can set Entry to / and set Target to the HomeDirectory parameter value. The following is an Entry and Target pair example for chroot. [ { "Entry": "/", "Target": "/bucket_name/home/mydirectory" } ]'
                Policy:
                  $ref: "#/components/schemas/Policy"
                  description: A session policy for your user so that you can use the same Identity and Access Management (IAM) role across multiple users. This policy scopes down a user's access to portions of their Amazon S3 bucket. Variables that you can use inside this policy include ${Transfer:UserName}, ${Transfer:HomeDirectory}, and ${Transfer:HomeBucket}. This policy applies only when the domain of ServerId is Amazon S3. Amazon EFS does not use session policies. For session policies, Transfer Family stores the policy as a JSON blob, instead of the Amazon Resource Name (ARN) of the policy. You save the policy as a JSON blob and pass it in the Policy argument. For an example of a session policy, see Example session policy. For more information, see AssumeRole in the Amazon Web ServicesSecurity Token Service API Reference.
                PosixProfile:
                  $ref: "#/components/schemas/PosixProfile"
                Role:
                  $ref: "#/components/schemas/Role"
                  description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role that controls your users' access to your Amazon S3 bucket or Amazon EFS file system. The policies attached to this role determine the level of access that you want to provide your users when transferring files into and out of your Amazon S3 bucket or Amazon EFS file system. The IAM role should also contain a trust relationship that allows the server to access your resources when servicing your users' transfer requests.
                ServerId:
                  $ref: "#/components/schemas/ServerId"
                  description: A system-assigned unique identifier for a server instance. This is the specific server that you added your user to.
                ExternalId:
                  $ref: "#/components/schemas/ExternalId"
                  description: 'A unique identifier that is required to identify specific groups within your directory. The users of the group that you associate have access to your Amazon S3 or Amazon EFS resources over the enabled protocols using Transfer Family. If you know the group name, you can view the SID values by running the following command using Windows PowerShell. Get-ADGroup -Filter {samAccountName -like "YourGroupName*"} -Properties * | Select SamAccountName,ObjectSid In that command, replace YourGroupName with the name of your Active Directory group. The regular expression used to validate this parameter is a string of characters consisting of uppercase and lowercase alphanumeric characters with no spaces. You can also include underscores or any of the following characters: =,.@:/-'
              required:
                - ServerId
                - ExternalId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccessResponse"
  /UpdateAgreement:
    post:
      operationId: UpdateAgreement
      description: Updates some of the parameters for an existing agreement. Provide the AgreementId and the ServerId for the agreement that you want to update, along with the new values for the parameters to update. Specify either BaseDirectory or CustomDirectories, but not both. Specifying both causes the command to fail. If you update an agreement from using base directory to custom directories, the base directory is no longer used. Similarly, if you change from custom directories to a base directory, the custom directories are no longer used.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - TransferService.UpdateAgreement
            default: TransferService.UpdateAgreement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AgreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: A unique identifier for the agreement. This identifier is returned when you create an agreement.
                ServerId:
                  $ref: "#/components/schemas/ServerId"
                  description: A system-assigned unique identifier for a server instance. This is the specific server that the agreement uses.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: To replace the existing description, provide a short description for the agreement.
                Status:
                  $ref: "#/components/schemas/AgreementStatusType"
                  description: You can update the status for the agreement, either activating an inactive agreement or the reverse.
                LocalProfileId:
                  $ref: "#/components/schemas/ProfileId"
                  description: A unique identifier for the AS2 local profile. To change the local profile identifier, provide a new value here.
                PartnerProfileId:
                  $ref: "#/components/schemas/ProfileId"
                  description: A unique identifier for the partner profile. To change the partner profile identifier, provide a new value here.
                BaseDirectory:
                  $ref: "#/components/schemas/HomeDirectory"
                  description: To change the landing directory (folder) for files that are transferred, provide the bucket folder that you want to use; for example, /amzn-s3-demo-bucket/home/mydirectory .
                AccessRole:
                  $ref: "#/components/schemas/Role"
                  description: Connectors are used to send files using either the AS2 or SFTP protocol. For the access role, provide the Amazon Resource Name (ARN) of the Identity and Access Management role to use. For AS2 connectors With AS2, you can send files by calling StartFileTransfer and specifying the file paths in the request parameter, SendFilePaths. We use the file’s parent directory (for example, for --send-file-paths /bucket/dir/file.txt, parent directory is /bucket/dir/) to temporarily store a processed AS2 message file, store the MDN when we receive them from the partner, and write a final JSON file containing relevant metadata of the transmission. So, the AccessRole needs to provide read and write access to the parent directory of the file location used in the StartFileTransfer request. Additionally, you need to provide read and write access to the parent directory of the files that you intend to send with StartFileTransfer. If you are using Basic authentication for your AS2 connector, the access role requires the secretsmanager:GetSecretValue permission for the secret. If the secret is encrypted using a customer-managed key instead of the Amazon Web Services managed key in Secrets Manager, then the role also needs the kms:Decrypt permission for that key. For SFTP connectors Make sure that the access role provides read and write access to the parent directory of the file location that's used in the StartFileTransfer request. Additionally, make sure that the role provides secretsmanager:GetSecretValue permission to Secrets Manager.
                PreserveFilename:
                  $ref: "#/components/schemas/PreserveFilenameType"
                  description: "Determines whether or not Transfer Family appends a unique string of characters to the end of the AS2 message payload filename when saving it. ENABLED: the filename provided by your trading parter is preserved when the file is saved. DISABLED (default value): when Transfer Family saves the file, the filename is adjusted, as described in File names and locations."
                EnforceMessageSigning:
                  $ref: "#/components/schemas/EnforceMessageSigningType"
                  description: "Determines whether or not unsigned messages from your trading partners will be accepted. ENABLED: Transfer Family rejects unsigned messages from your trading partner. DISABLED (default value): Transfer Family accepts unsigned messages from your trading partner."
                CustomDirectories:
                  $ref: "#/components/schemas/CustomDirectoriesType"
                  description: A CustomDirectoriesType structure. This structure specifies custom directories for storing various AS2 message files. You can specify directories for the following types of files. Failed files MDN files Payload files Status files Temporary files
              required:
                - AgreementId
                - ServerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAgreementResponse"
  /UpdateCertificate:
