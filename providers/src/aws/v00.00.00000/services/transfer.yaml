      type: string
      minLength: 1
      maxLength: 2048
    SourceIp:
      type: string
      minLength: 0
      maxLength: 32
      pattern: "[0-9a-fA-F\\.\\:]+"
    UserPassword:
      type: string
      minLength: 0
      maxLength: 1024
    TestIdentityProviderResponse:
      type: object
      properties:
        Response:
          $ref: "#/components/schemas/Response"
          description: The response that is returned from your API Gateway or your Lambda function.
        StatusCode:
          $ref: "#/components/schemas/StatusCode"
          description: The HTTP status code that is the response from your API Gateway or your Lambda function.
        Message:
          $ref: "#/components/schemas/Message"
          description: A message that indicates whether the test was successful or not. If an empty string is returned, the most likely cause is that the authentication failed due to an incorrect username or password.
        Url:
          $ref: "#/components/schemas/Url"
          description: The endpoint of the service used to authenticate a user.
      required:
        - StatusCode
        - Url
    Response:
      type: string
    StatusCode:
      type: integer
    TagKeys:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
