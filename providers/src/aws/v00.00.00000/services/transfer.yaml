        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Specifies the number of users to return as a response to the ListUsers request.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: If there are additional results from the ListUsers call, a NextToken parameter is returned in the output. You can then pass the NextToken to a subsequent ListUsers command, to continue listing additional users.
                ServerId:
                  $ref: "#/components/schemas/ServerId"
                  description: A system-assigned unique identifier for a server that has users assigned to it.
              required:
                - ServerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponse"
  /ListWebApps:
    post:
      operationId: ListWebApps
      description: Lists all web apps associated with your Amazon Web Services account for your current region. The response includes the endpoint type for each web app, showing whether it is publicly accessible or VPC hosted. For more information about using VPC endpoints with Transfer Family, see Create a Transfer Family web app in a VPC.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
