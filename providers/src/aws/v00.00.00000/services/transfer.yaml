            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Returns the NextToken parameter in the output. You can then pass the NextToken parameter in a subsequent command to continue listing additional web apps.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWebAppsResponse"
  /ListWorkflows:
    post:
      operationId: ListWorkflows
      description: Lists all workflows associated with your Amazon Web Services account for your current region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
