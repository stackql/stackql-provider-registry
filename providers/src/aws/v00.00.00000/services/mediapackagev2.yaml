        UriPathType:
          $ref: "#/components/schemas/UriPathType"
          description: The type of path used in manifest URIs. LEAF indicates leaf-relative paths. ROOT indicates root-relative paths that include the full path from root.
      required:
        - ManifestName
        - Url
    GetLowLatencyHlsManifests:
      type: array
      items:
        $ref: "#/components/schemas/GetLowLatencyHlsManifestConfiguration"
    GetLowLatencyHlsManifestConfiguration:
      description: Retrieve the low-latency HTTP live streaming (HLS) manifest configuration.
