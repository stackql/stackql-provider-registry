          description: The layout of the DASH manifest that MediaPackage produces. STANDARD indicates a default manifest, which is compacted. NONE indicates a full manifest.
        SubtitleConfiguration:
          $ref: "#/components/schemas/DashSubtitleConfiguration"
          description: The configuration for DASH subtitles.
        UriPathType:
          $ref: "#/components/schemas/UriPathType"
          description: The type of path used in manifest URIs. LEAF indicates leaf-relative paths. ROOT indicates root-relative paths that include the full path from root.
