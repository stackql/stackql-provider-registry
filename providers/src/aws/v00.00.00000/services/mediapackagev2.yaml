openapi: 3.0.0
info:
  version: "2022-12-25"
  title: AWS Elemental MediaPackage v2
  description: AWS Elemental MediaPackage v2
  x-serviceName: mediapackagev2
  x-serviceAlias: mediapackagev2
  x-protocol: rest-json
  x-apiVersion: "2022-12-25"
  x-endpointPrefix: mediapackagev2
servers:
  - url: https://mediapackagev2.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mediapackagev2
paths:
  /channelGroup/{channel_group_name}/channel/{channel_name}/originEndpoint/{origin_endpoint_name}/harvestJob/{harvest_job_name}:
    put:
      operationId: CancelHarvestJob
      description: Cancels an in-progress harvest job.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel group containing the channel from which the harvest job is running.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel from which the harvest job is running.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the origin endpoint that the harvest job is harvesting from. This cannot be changed after the harvest job is submitted.
        - name: harvest_job_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the harvest job to cancel. This name must be unique within the channel and cannot be changed after the harvest job is submitted.
        - name: x-amzn-update-if-match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/EntityTag"
          description: The current Entity Tag (ETag) associated with the harvest job. Used for concurrency control.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelHarvestJobResponse"
    get:
      operationId: GetHarvestJob
      description: Retrieves the details of a specific harvest job.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel group containing the channel associated with the harvest job.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel associated with the harvest job.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the origin endpoint associated with the harvest job.
        - name: harvest_job_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the harvest job to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHarvestJobResponse"
  /channelGroup/{channel_group_name}/channel:
    post:
      operationId: CreateChannel
      description: Create a channel to start receiving content streams. The channel represents the input to MediaPackage for incoming live content from an encoder such as AWS Elemental MediaLive. The channel receives content, and after packaging it, outputs it through an origin endpoint to downstream devices (such as video players or CDNs) that request the content. You can create only one channel with each request. We recommend that you spread out channels between channel groups, such as putting redundant channels in the same AWS Region in different channel groups.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: x-amzn-client-token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique, case-sensitive token that you provide to ensure the idempotency of the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelName:
                  $ref: "#/components/schemas/ResourceName"
                InputType:
                  $ref: "#/components/schemas/InputType"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                InputSwitchConfiguration:
                  $ref: "#/components/schemas/InputSwitchConfiguration"
                OutputHeaderConfiguration:
                  $ref: "#/components/schemas/OutputHeaderConfiguration"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - ChannelName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelResponse"
    get:
      operationId: ListChannels
      description: Retrieves all channels in a specific channel group that are configured in AWS Elemental MediaPackage.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListResourceMaxResults"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The pagination token from the GET list request. Use the token to fetch the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelsResponse"
  /channelGroup:
    post:
      operationId: CreateChannelGroup
      description: Create a channel group to group your channels and origin endpoints. A channel group is the top-level resource that consists of channels and origin endpoints that are associated with it and that provides predictable URLs for stream delivery. All channels and origin endpoints within the channel group are guaranteed to share the DNS. You can create only one channel group with each request.
      parameters:
        - name: x-amzn-client-token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique, case-sensitive token that you provide to ensure the idempotency of the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelGroupName:
                  $ref: "#/components/schemas/ResourceName"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - ChannelGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelGroupResponse"
    get:
      operationId: ListChannelGroups
      description: Retrieves all channel groups that are configured in Elemental MediaPackage.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListResourceMaxResults"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The pagination token from the GET list request. Use the token to fetch the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelGroupsResponse"
  /channelGroup/{channel_group_name}/channel/{channel_name}/originEndpoint/{origin_endpoint_name}/harvestJob:
    post:
      operationId: CreateHarvestJob
      description: Creates a new harvest job to export content from a MediaPackage v2 channel to an S3 bucket.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel group containing the channel from which to harvest content.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel from which to harvest content.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the origin endpoint from which to harvest content.
        - name: x-amzn-client-token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                HarvestedManifests:
                  $ref: "#/components/schemas/HarvestedManifests"
                ScheduleConfiguration:
                  $ref: "#/components/schemas/HarvesterScheduleConfiguration"
                Destination:
                  $ref: "#/components/schemas/Destination"
                HarvestJobName:
                  $ref: "#/components/schemas/ResourceName"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - HarvestedManifests
                - ScheduleConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHarvestJobResponse"
  /channelGroup/{channel_group_name}/channel/{channel_name}/originEndpoint:
    post:
      operationId: CreateOriginEndpoint
      description: The endpoint is attached to a channel, and represents the output of the live content. You can associate multiple endpoints to a single channel. Each endpoint gives players and downstream CDNs (such as Amazon CloudFront) access to the content for playback. Content can't be served from a channel until it has an endpoint. You can create only one endpoint with each request.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        - name: x-amzn-client-token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique, case-sensitive token that you provide to ensure the idempotency of the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OriginEndpointName:
                  $ref: "#/components/schemas/ResourceName"
                ContainerType:
                  $ref: "#/components/schemas/ContainerType"
                Segment:
                  $ref: "#/components/schemas/Segment"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                StartoverWindowSeconds:
                  $ref: "#/components/schemas/CreateOriginEndpointRequestStartoverWindowSecondsInteger"
                HlsManifests:
                  $ref: "#/components/schemas/CreateHlsManifests"
                LowLatencyHlsManifests:
                  $ref: "#/components/schemas/CreateLowLatencyHlsManifests"
                DashManifests:
                  $ref: "#/components/schemas/CreateDashManifests"
                MssManifests:
                  $ref: "#/components/schemas/CreateMssManifests"
                ForceEndpointErrorConfiguration:
                  $ref: "#/components/schemas/ForceEndpointErrorConfiguration"
                UriSeparator:
                  $ref: "#/components/schemas/UriSeparator"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - OriginEndpointName
                - ContainerType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOriginEndpointResponse"
    get:
      operationId: ListOriginEndpoints
      description: Retrieves all origin endpoints in a specific channel that are configured in AWS Elemental MediaPackage.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListResourceMaxResults"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The pagination token from the GET list request. Use the token to fetch the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOriginEndpointsResponse"
  /channelGroup/{channel_group_name}/channel/{channel_name}/:
    delete:
      operationId: DeleteChannel
      description: Delete a channel to stop AWS Elemental MediaPackage from receiving further content. You must delete the channel's origin endpoints before you can delete the channel.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChannelResponse"
    get:
      operationId: GetChannel
      description: Retrieves the specified channel that's configured in AWS Elemental MediaPackage.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChannelResponse"
    put:
      operationId: UpdateChannel
      description: Update the specified channel. You can edit if MediaPackage sends ingest or egress access logs to the CloudWatch log group, if content will be encrypted, the description on a channel, and your channel's policy settings. You can't edit the name of the channel or CloudFront distribution details. Any edits you make that impact the video output may not be reflected for a few minutes.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        - name: x-amzn-update-if-match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/EntityTag"
          description: The expected current Entity Tag (ETag) for the resource. If the specified ETag does not match the resource's current entity tag, the update request will be rejected.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                InputSwitchConfiguration:
                  $ref: "#/components/schemas/InputSwitchConfiguration"
                OutputHeaderConfiguration:
                  $ref: "#/components/schemas/OutputHeaderConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChannelResponse"
  /channelGroup/{channel_group_name}:
    delete:
      operationId: DeleteChannelGroup
      description: Delete a channel group. You must delete the channel group's channels and origin endpoints before you can delete the channel group. If you delete a channel group, you'll lose access to the egress domain and will have to create a new channel group to replace it.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChannelGroupResponse"
    get:
      operationId: GetChannelGroup
      description: Retrieves the specified channel group that's configured in AWS Elemental MediaPackage.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChannelGroupResponse"
    put:
      operationId: UpdateChannelGroup
      description: Update the specified channel group. You can edit the description on a channel group for easier identification later from the AWS Elemental MediaPackage console. You can't edit the name of the channel group. Any edits you make that impact the video output may not be reflected for a few minutes.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: x-amzn-update-if-match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/EntityTag"
          description: The expected current Entity Tag (ETag) for the resource. If the specified ETag does not match the resource's current entity tag, the update request will be rejected.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChannelGroupResponse"
  /channelGroup/{channel_group_name}/channel/{channel_name}/policy:
    delete:
      operationId: DeleteChannelPolicy
      description: Delete a channel policy.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChannelPolicyResponse"
    get:
      operationId: GetChannelPolicy
      description: Retrieves the specified channel policy that's configured in AWS Elemental MediaPackage. With policies, you can specify who has access to AWS resources and what actions they can perform on those resources.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChannelPolicyResponse"
    put:
      operationId: PutChannelPolicy
      description: Attaches an IAM policy to the specified channel. With policies, you can specify who has access to AWS resources and what actions they can perform on those resources. You can attach only one policy with each request.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Policy:
                  $ref: "#/components/schemas/PolicyText"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutChannelPolicyResponse"
  /channelGroup/{channel_group_name}/channel/{channel_name}/originEndpoint/{origin_endpoint_name}:
    delete:
      operationId: DeleteOriginEndpoint
      description: Origin endpoints can serve content until they're deleted. Delete the endpoint if it should no longer respond to playback requests. You must delete all endpoints from a channel before you can delete the channel.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the origin endpoint. The name is the primary identifier for the origin endpoint, and and must be unique for your account in the AWS Region and channel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOriginEndpointResponse"
    get:
      operationId: GetOriginEndpoint
      description: Retrieves the specified origin endpoint that's configured in AWS Elemental MediaPackage to obtain its playback URL and to view the packaging settings that it's currently using.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the origin endpoint. The name is the primary identifier for the origin endpoint, and and must be unique for your account in the AWS Region and channel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOriginEndpointResponse"
    put:
      operationId: UpdateOriginEndpoint
      description: Update the specified origin endpoint. Edit the packaging preferences on an endpoint to optimize the viewing experience. You can't edit the name of the endpoint. Any edits you make that impact the video output may not be reflected for a few minutes.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the origin endpoint. The name is the primary identifier for the origin endpoint, and and must be unique for your account in the AWS Region and channel.
        - name: x-amzn-update-if-match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/EntityTag"
          description: The expected current Entity Tag (ETag) for the resource. If the specified ETag does not match the resource's current entity tag, the update request will be rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ContainerType:
                  $ref: "#/components/schemas/ContainerType"
                Segment:
                  $ref: "#/components/schemas/Segment"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                StartoverWindowSeconds:
                  $ref: "#/components/schemas/UpdateOriginEndpointRequestStartoverWindowSecondsInteger"
                HlsManifests:
                  $ref: "#/components/schemas/CreateHlsManifests"
                LowLatencyHlsManifests:
                  $ref: "#/components/schemas/CreateLowLatencyHlsManifests"
                DashManifests:
                  $ref: "#/components/schemas/CreateDashManifests"
                MssManifests:
                  $ref: "#/components/schemas/CreateMssManifests"
                ForceEndpointErrorConfiguration:
                  $ref: "#/components/schemas/ForceEndpointErrorConfiguration"
                UriSeparator:
                  $ref: "#/components/schemas/UriSeparator"
              required:
                - ContainerType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOriginEndpointResponse"
  /channelGroup/{channel_group_name}/channel/{channel_name}/originEndpoint/{origin_endpoint_name}/policy:
    delete:
      operationId: DeleteOriginEndpointPolicy
      description: Delete an origin endpoint policy.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the origin endpoint. The name is the primary identifier for the origin endpoint, and and must be unique for your account in the AWS Region and channel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOriginEndpointPolicyResponse"
    get:
      operationId: GetOriginEndpointPolicy
      description: Retrieves the specified origin endpoint policy that's configured in AWS Elemental MediaPackage.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the origin endpoint. The name is the primary identifier for the origin endpoint, and and must be unique for your account in the AWS Region and channel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOriginEndpointPolicyResponse"
    post:
      operationId: PutOriginEndpointPolicy
      description: Attaches an IAM policy to the specified origin endpoint. You can attach only one policy with each request.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name that describes the origin endpoint. The name is the primary identifier for the origin endpoint, and and must be unique for your account in the AWS Region and channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Policy:
                  $ref: "#/components/schemas/PolicyText"
                CdnAuthConfiguration:
                  $ref: "#/components/schemas/CdnAuthConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutOriginEndpointPolicyResponse"
  /channelGroup/{channel_group_name}/harvestJob:
    get:
      operationId: ListHarvestJobs
      description: Retrieves a list of harvest jobs that match the specified criteria.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel group to filter the harvest jobs by. If specified, only harvest jobs associated with channels in this group will be returned.
        - name: channelName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListHarvestJobsRequestChannelNameString"
          description: The name of the channel to filter the harvest jobs by. If specified, only harvest jobs associated with this channel will be returned.
        - name: originEndpointName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListHarvestJobsRequestOriginEndpointNameString"
          description: The name of the origin endpoint to filter the harvest jobs by. If specified, only harvest jobs associated with this origin endpoint will be returned.
        - name: includeStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/HarvestJobStatus"
          description: The status to filter the harvest jobs by. If specified, only harvest jobs with this status will be returned.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListHarvestJobsRequestMaxResultsInteger"
          description: The maximum number of harvest jobs to return in a single request. If not specified, a default value will be used.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A token used for pagination. Provide this value in subsequent requests to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHarvestJobsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags assigned to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagArn"
          description: The ARN of the CloudWatch resource that you want to view tags for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Assigns one of more tags (key-value pairs) to the specified MediaPackage resource. Tags can help you organize and categorize your resources. You can also use them to scope user permissions, by granting a user permission to access or change only resources with certain tag values. You can use the TagResource operation with a resource that already has tags. If you specify a new tag key for the resource, this tag is appended to the list of tags associated with the resource. If you specify a tag key that is already associated with the resource, the new tag value that you specify replaces the previous value for that tag.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagArn"
          description: The ARN of the MediaPackage resource that you're adding tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "204":
          description: Success
    delete:
      operationId: UntagResource
      description: Removes one or more tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagArn"
          description: The ARN of the MediaPackage resource that you're removing tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The list of tag keys to remove from the resource.
      responses:
        "204":
          description: Success
  /channelGroup/{channel_group_name}/channel/{channel_name}/reset:
    post:
      operationId: ResetChannelState
      description: Resetting the channel can help to clear errors from misconfigurations in the encoder. A reset refreshes the ingest stream and removes previous content. Be sure to stop the encoder before you reset the channel, and wait at least 30 seconds before you restart the encoder.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel group that contains the channel that you are resetting.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel that you are resetting.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetChannelStateResponse"
  /channelGroup/{channel_group_name}/channel/{channel_name}/originEndpoint/{origin_endpoint_name}/reset:
    post:
      operationId: ResetOriginEndpointState
      description: Resetting the origin endpoint can help to resolve unexpected behavior and other content packaging issues. It also helps to preserve special events when you don't want the previous content to be available for viewing. A reset clears out all previous content from the origin endpoint. MediaPackage might return old content from this endpoint in the first 30 seconds after the endpoint reset. For best results, when possible, wait 30 seconds from endpoint reset to send playback requests to this endpoint.
      parameters:
        - name: channel_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel group that contains the channel with the origin endpoint that you are resetting.
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the channel with the origin endpoint that you are resetting.
        - name: origin_endpoint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the origin endpoint that you are resetting.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetOriginEndpointStateResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9_-]+"
    EntityTag:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\S]+"
    CancelHarvestJobResponse:
      type: object
    IdempotencyToken:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\S]+"
    InputType:
      type: string
      enum:
        - HLS
        - CMAF
    ResourceDescription:
      type: string
      minLength: 0
      maxLength: 1024
    InputSwitchConfiguration:
      description: The configuration for input switching based on the media quality confidence score (MQCS) as provided from AWS Elemental MediaLive.
      type: object
      properties:
        MQCSInputSwitching:
          $ref: "#/components/schemas/Boolean"
          description: When true, AWS Elemental MediaPackage performs input switching based on the MQCS. Default is false. This setting is valid only when InputType is CMAF.
        PreferredInput:
          $ref: "#/components/schemas/InputSwitchConfigurationPreferredInputInteger"
          description: For CMAF inputs, indicates which input MediaPackage should prefer when both inputs have equal MQCS scores. Select 1 to prefer the first ingest endpoint, or 2 to prefer the second ingest endpoint. If you don't specify a preferred input, MediaPackage uses its default switching behavior when MQCS scores are equal.
    Boolean:
      type: boolean
    InputSwitchConfigurationPreferredInputInteger:
      type: integer
      minimum: 1
      maximum: 2
    OutputHeaderConfiguration:
      description: The settings for what common media server data (CMSD) headers AWS Elemental MediaPackage includes in responses to the CDN.
      type: object
      properties:
        PublishMQCS:
          $ref: "#/components/schemas/Boolean"
          description: When true, AWS Elemental MediaPackage includes the MQCS in responses to the CDN. This setting is valid only when InputType is CMAF.
    TagMap:
      type: object
      properties: {}
    CreateChannelResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) associated with the resource.
        ChannelName:
          $ref: "#/components/schemas/String"
          description: The name that describes the channel. The name is the primary identifier for the channel, and must be unique for your account in the AWS Region and channel group.
        ChannelGroupName:
          $ref: "#/components/schemas/String"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the channel was created.
        ModifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the channel was modified.
        Description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description for your channel.
        IngestEndpoints:
          $ref: "#/components/schemas/IngestEndpointList"
        InputType:
          $ref: "#/components/schemas/InputType"
          description: "The input type will be an immutable field which will be used to define whether the channel will allow CMAF ingest or HLS ingest. If unprovided, it will default to HLS to preserve current behavior. The allowed values are: HLS - The HLS streaming specification (which defines M3U8 manifests and TS segments). CMAF - The DASH-IF CMAF Ingest specification (which defines CMAF segments with optional DASH manifests)."
        ETag:
          $ref: "#/components/schemas/EntityTag"
          description: The current Entity Tag (ETag) associated with this resource. The entity tag can be used to safely make concurrent updates to the resource.
        Tags:
          type: object
          properties: {}
          description: The comma-separated list of tag key:value pairs assigned to the channel.
        InputSwitchConfiguration:
          $ref: "#/components/schemas/InputSwitchConfiguration"
          description: The configuration for input switching based on the media quality confidence score (MQCS) as provided from AWS Elemental MediaLive. This setting is valid only when InputType is CMAF.
        OutputHeaderConfiguration:
          $ref: "#/components/schemas/OutputHeaderConfiguration"
          description: The settings for what common media server data (CMSD) headers AWS Elemental MediaPackage includes in responses to the CDN. This setting is valid only when InputType is CMAF.
      required:
        - Arn
        - ChannelName
        - ChannelGroupName
        - CreatedAt
        - ModifiedAt
    String:
      type: string
    Timestamp:
      type: string
      format: date-time
    IngestEndpointList:
      description: The list of ingest endpoints.
      type: array
      items:
        $ref: "#/components/schemas/IngestEndpoint"
    IngestEndpoint:
      description: The ingest domain URL where the source stream should be sent.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/String"
          description: The system-generated unique identifier for the IngestEndpoint.
        Url:
          $ref: "#/components/schemas/String"
          description: The ingest domain URL where the source stream should be sent.
    CreateChannelGroupResponse:
      type: object
      properties:
        ChannelGroupName:
          $ref: "#/components/schemas/String"
          description: The name that describes the channel group. The name is the primary identifier for the channel group, and must be unique for your account in the AWS Region.
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) associated with the resource.
        EgressDomain:
          $ref: "#/components/schemas/String"
          description: The output domain where the source stream should be sent. Integrate the egress domain with a downstream CDN (such as Amazon CloudFront) or playback device.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the channel group was created.
        ModifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the channel group was modified.
        ETag:
          $ref: "#/components/schemas/EntityTag"
          description: The current Entity Tag (ETag) associated with this resource. The entity tag can be used to safely make concurrent updates to the resource.
        Description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description for your channel group.
        Tags:
          type: object
          properties: {}
          description: The comma-separated list of tag key:value pairs assigned to the channel group.
      required:
        - ChannelGroupName
        - Arn
        - EgressDomain
        - CreatedAt
        - ModifiedAt
    HarvestedManifests:
      description: A collection of harvested manifests of different types.
      type: object
      properties:
        HlsManifests:
          $ref: "#/components/schemas/HarvestedHlsManifestsList"
          description: A list of harvested HLS manifests.
        DashManifests:
          $ref: "#/components/schemas/HarvestedDashManifestsList"
          description: A list of harvested DASH manifests.
        LowLatencyHlsManifests:
          $ref: "#/components/schemas/HarvestedLowLatencyHlsManifestsList"
          description: A list of harvested Low-Latency HLS manifests.
    HarvestedHlsManifestsList:
      type: array
      items:
        $ref: "#/components/schemas/HarvestedHlsManifest"
    HarvestedHlsManifest:
      description: Information about a harvested HLS manifest.
      type: object
      properties:
        ManifestName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the harvested HLS manifest.
      required:
        - ManifestName
    HarvestedDashManifestsList:
      type: array
      items:
        $ref: "#/components/schemas/HarvestedDashManifest"
    HarvestedDashManifest:
      description: Information about a harvested DASH manifest.
      type: object
      properties:
        ManifestName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the harvested DASH manifest.
      required:
        - ManifestName
    HarvestedLowLatencyHlsManifestsList:
      type: array
      items:
        $ref: "#/components/schemas/HarvestedLowLatencyHlsManifest"
    HarvestedLowLatencyHlsManifest:
      description: Information about a harvested Low-Latency HLS manifest.
      type: object
      properties:
        ManifestName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the harvested Low-Latency HLS manifest.
      required:
        - ManifestName
    HarvesterScheduleConfiguration:
      description: Defines the schedule configuration for a harvest job.
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time for the harvest job.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time for the harvest job.
      required:
        - StartTime
        - EndTime
    Destination:
      description: The configuration for the destination where the harvested content will be exported.
      type: object
      properties:
        S3Destination:
          $ref: "#/components/schemas/S3DestinationConfig"
          description: The configuration for exporting harvested content to an S3 bucket. This includes details such as the bucket name and destination path within the bucket.
      required:
        - S3Destination
    S3DestinationConfig:
      description: Configuration parameters for where in an S3 bucket to place the harvested content.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of an S3 bucket within which harvested content will be exported.
        DestinationPath:
          $ref: "#/components/schemas/S3DestinationPath"
          description: The path within the specified S3 bucket where the harvested content will be placed.
      required:
        - BucketName
        - DestinationPath
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
    S3DestinationPath:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\S]+"
    CreateHarvestJobResponse:
      description: The response object returned after creating a harvest job.
      type: object
      properties:
        ChannelGroupName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the channel group containing the channel from which content is being harvested.
        ChannelName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the channel from which content is being harvested.
        OriginEndpointName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the origin endpoint from which content is being harvested.
        Destination:
          $ref: "#/components/schemas/Destination"
          description: The S3 destination where the harvested content will be placed.
        HarvestJobName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the created harvest job.
        HarvestedManifests:
          $ref: "#/components/schemas/HarvestedManifests"
          description: A list of manifests that will be harvested.
        Description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description of the harvest job, if provided.
        ScheduleConfiguration:
          $ref: "#/components/schemas/HarvesterScheduleConfiguration"
          description: The configuration for when the harvest job will run, including start and end times.
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the created harvest job.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the harvest job was created.
        ModifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the harvest job was last modified.
        Status:
          $ref: "#/components/schemas/HarvestJobStatus"
          description: The current status of the harvest job (e.g., CREATED, IN_PROGRESS, ABORTED, COMPLETED, FAILED).
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: An error message if the harvest job creation failed.
        ETag:
          $ref: "#/components/schemas/EntityTag"
          description: The current version of the harvest job. Used for concurrency control.
        Tags:
          type: object
          properties: {}
          description: A collection of tags associated with the harvest job.
      required:
        - ChannelGroupName
        - ChannelName
        - OriginEndpointName
        - Destination
        - HarvestJobName
        - HarvestedManifests
        - ScheduleConfiguration
        - Arn
        - CreatedAt
        - ModifiedAt
        - Status
    HarvestJobStatus:
      type: string
      enum:
        - QUEUED
        - IN_PROGRESS
        - CANCELLED
        - COMPLETED
        - FAILED
    ContainerType:
      type: string
      enum:
        - TS
        - CMAF
        - ISM
    Segment:
      description: The segment configuration, including the segment name, duration, and other configuration values.
      type: object
      properties:
        SegmentDurationSeconds:
          $ref: "#/components/schemas/SegmentSegmentDurationSecondsInteger"
          description: The duration (in seconds) of each segment. Enter a value equal to, or a multiple of, the input segment duration. If the value that you enter is different from the input segment duration, MediaPackage rounds segments to the nearest multiple of the input segment duration.
        SegmentName:
          $ref: "#/components/schemas/SegmentSegmentNameString"
          description: The name that describes the segment. The name is the base name of the segment used in all content manifests inside of the endpoint. You can't use spaces in the name.
        TsUseAudioRenditionGroup:
          $ref: "#/components/schemas/Boolean"
          description: When selected, MediaPackage bundles all audio tracks in a rendition group. All other tracks in the stream can be used with any audio rendition from the group.
        IncludeIframeOnlyStreams:
          $ref: "#/components/schemas/Boolean"
          description: When selected, the stream set includes an additional I-frame only stream, along with the other tracks. If false, this extra stream is not included. MediaPackage generates an I-frame only stream from the first rendition in the manifest. The service inserts EXT-I-FRAMES-ONLY tags in the output manifest, and then generates and includes an I-frames only playlist in the stream. This playlist permits player functionality like fast forward and rewind.
        TsIncludeDvbSubtitles:
          $ref: "#/components/schemas/Boolean"
          description: By default, MediaPackage excludes all digital video broadcasting (DVB) subtitles from the output. When selected, MediaPackage passes through DVB subtitles into the output.
        Scte:
          $ref: "#/components/schemas/Scte"
          description: The SCTE configuration options in the segment settings.
        Encryption:
          $ref: "#/components/schemas/Encryption"
    SegmentSegmentDurationSecondsInteger:
      type: integer
      minimum: 1
      maximum: 30
    SegmentSegmentNameString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9_-]+"
    Scte:
      description: The SCTE configuration.
      type: object
      properties:
        ScteFilter:
          $ref: "#/components/schemas/ScteFilterList"
          description: The SCTE-35 message types that you want to be treated as ad markers in the output.
        ScteInSegments:
          $ref: "#/components/schemas/ScteInSegments"
          description: Controls whether SCTE-35 messages are included in segment files. None – SCTE-35 messages are not included in segments (default) All – SCTE-35 messages are embedded in segment data MatchesFilter – SCTE-35 messages which match the ScteFilter are embedded in segment data For DASH manifests, when set to All or MatchesFilter, an InbandEventStream tag signals that SCTE messages are present in segments. This setting works independently of manifest ad markers.
        CustomAdTypes:
          $ref: "#/components/schemas/CustomAdTypeList"
          description: "A list of additional non-Ad SCTE-35 event types to treat as advertisements. When configured, events matching these types produce ad markers (such as SCTE35-OUT and SCTE35-IN in HLS DATERANGE tags) in manifests. Valid values: PROGRAM | CHAPTER | UNSCHEDULED_EVENT | ALTERNATE_CONTENT_OPPORTUNITY | NETWORK If you don't specify any values, the default is empty (only default ad types are used)."
    ScteFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ScteFilter"
    ScteFilter:
      type: string
      enum:
        - SPLICE_INSERT
        - BREAK
        - PROVIDER_ADVERTISEMENT
        - DISTRIBUTOR_ADVERTISEMENT
        - PROVIDER_PLACEMENT_OPPORTUNITY
        - DISTRIBUTOR_PLACEMENT_OPPORTUNITY
        - PROVIDER_OVERLAY_PLACEMENT_OPPORTUNITY
        - DISTRIBUTOR_OVERLAY_PLACEMENT_OPPORTUNITY
        - PROGRAM
        - CHAPTER
        - UNSCHEDULED_EVENT
        - ALTERNATE_CONTENT_OPPORTUNITY
        - NETWORK
        - PROVIDER_PROMO
        - DISTRIBUTOR_PROMO
        - PROVIDER_AD_BLOCK
        - DISTRIBUTOR_AD_BLOCK
    ScteInSegments:
      type: string
      enum:
        - NONE
        - ALL
        - MATCHES_FILTER
    CustomAdTypeList:
      type: array
      items:
        $ref: "#/components/schemas/CustomAdType"
    CustomAdType:
      type: string
      enum:
        - PROGRAM
        - CHAPTER
        - UNSCHEDULED_EVENT
        - ALTERNATE_CONTENT_OPPORTUNITY
        - NETWORK
    Encryption:
      description: The parameters for encrypting content.
      type: object
      properties:
        ConstantInitializationVector:
          $ref: "#/components/schemas/EncryptionConstantInitializationVectorString"
          description: A 128-bit, 16-byte hex value represented by a 32-character string, used in conjunction with the key for encrypting content. If you don't specify a value, then MediaPackage creates the constant initialization vector (IV).
        EncryptionMethod:
          $ref: "#/components/schemas/EncryptionMethod"
          description: The encryption method to use.
        KeyRotationIntervalSeconds:
          $ref: "#/components/schemas/EncryptionKeyRotationIntervalSecondsInteger"
          description: "The frequency (in seconds) of key changes for live workflows, in which content is streamed real time. The service retrieves content keys before the live content begins streaming, and then retrieves them as needed over the lifetime of the workflow. By default, key rotation is set to 300 seconds (5 minutes), the minimum rotation interval, which is equivalent to setting it to 300. If you don't enter an interval, content keys aren't rotated. The following example setting causes the service to rotate keys every thirty minutes: 1800"
        CmafExcludeSegmentDrmMetadata:
          $ref: "#/components/schemas/Boolean"
          description: "Excludes SEIG and SGPD boxes from segment metadata in CMAF containers. When set to true, MediaPackage omits these DRM metadata boxes from CMAF segments, which can improve compatibility with certain devices and players that don't support these boxes. Important considerations: This setting only affects CMAF container formats Key rotation can still be handled through media playlist signaling PSSH and TENC boxes remain unaffected Default behavior is preserved when this setting is disabled Valid values: true | false Default: false"
        SpekeKeyProvider:
          $ref: "#/components/schemas/SpekeKeyProvider"
          description: The parameters for the SPEKE key provider.
      required:
        - EncryptionMethod
        - SpekeKeyProvider
    EncryptionConstantInitializationVectorString:
      type: string
      minLength: 32
      maxLength: 32
      pattern: "[0-9a-fA-F]+"
    EncryptionMethod:
      description: The encryption type.
      type: object
      properties:
        TsEncryptionMethod:
          $ref: "#/components/schemas/TsEncryptionMethod"
          description: The encryption method to use.
        CmafEncryptionMethod:
          $ref: "#/components/schemas/CmafEncryptionMethod"
          description: The encryption method to use.
        IsmEncryptionMethod:
          $ref: "#/components/schemas/IsmEncryptionMethod"
          description: The encryption method used for Microsoft Smooth Streaming (MSS) content. This specifies how the MSS segments are encrypted to protect the content during delivery to client players.
    TsEncryptionMethod:
      type: string
      enum:
        - AES_128
        - SAMPLE_AES
    CmafEncryptionMethod:
      type: string
      enum:
        - CENC
        - CBCS
    IsmEncryptionMethod:
      type: string
      enum:
        - CENC
    EncryptionKeyRotationIntervalSecondsInteger:
      type: integer
      minimum: 300
      maximum: 31536000
    SpekeKeyProvider:
      description: The parameters for the SPEKE key provider.
      type: object
      properties:
        EncryptionContractConfiguration:
          $ref: "#/components/schemas/EncryptionContractConfiguration"
          description: Configure one or more content encryption keys for your endpoints that use SPEKE Version 2.0. The encryption contract defines which content keys are used to encrypt the audio and video tracks in your stream. To configure the encryption contract, specify which audio and video encryption presets to use.
        ResourceId:
          $ref: "#/components/schemas/SpekeKeyProviderResourceIdString"
          description: "The unique identifier for the content. The service sends this to the key server to identify the current endpoint. How unique you make this depends on how fine-grained you want access controls to be. The service does not permit you to use the same ID for two simultaneous encryption processes. The resource ID is also known as the content ID. The following example shows a resource ID: MovieNight20171126093045"
        DrmSystems:
          $ref: "#/components/schemas/SpekeKeyProviderDrmSystemsList"
          description: The DRM solution provider you're using to protect your content during distribution.
        RoleArn:
          $ref: "#/components/schemas/SpekeKeyProviderRoleArnString"
          description: "The ARN for the IAM role granted by the key provider that provides access to the key provider API. This role must have a trust policy that allows MediaPackage to assume the role, and it must have a sufficient permissions policy to allow access to the specific key retrieval URL. Get this from your DRM solution provider. Valid format: arn:aws:iam::{accountID}:role/{name}. The following example shows a role ARN: arn:aws:iam::444455556666:role/SpekeAccess"
        Url:
          $ref: "#/components/schemas/SpekeKeyProviderUrlString"
          description: "The URL of the API Gateway proxy that you set up to talk to your key server. The API Gateway proxy must reside in the same AWS Region as MediaPackage and must start with https://. The following example shows a URL: https://1wm2dx1f33.execute-api.us-west-2.amazonaws.com/SpekeSample/copyProtection"
        CertificateArn:
          $ref: "#/components/schemas/SpekeKeyProviderCertificateArnString"
          description: The ARN for the certificate that you imported to Amazon Web Services Certificate Manager to add content key encryption to this endpoint. For this feature to work, your DRM key provider must support content key encryption.
      required:
        - EncryptionContractConfiguration
        - ResourceId
        - DrmSystems
        - RoleArn
        - Url
    EncryptionContractConfiguration:
      description: Configure one or more content encryption keys for your endpoints that use SPEKE Version 2.0. The encryption contract defines which content keys are used to encrypt the audio and video tracks in your stream. To configure the encryption contract, specify which audio and video encryption presets to use.
      type: object
      properties:
        PresetSpeke20Audio:
          $ref: "#/components/schemas/PresetSpeke20Audio"
          description: "A collection of audio encryption presets. Value description: PRESET-AUDIO-1 - Use one content key to encrypt all of the audio tracks in your stream. PRESET-AUDIO-2 - Use one content key to encrypt all of the stereo audio tracks and one content key to encrypt all of the multichannel audio tracks. PRESET-AUDIO-3 - Use one content key to encrypt all of the stereo audio tracks, one content key to encrypt all of the multichannel audio tracks with 3 to 6 channels, and one content key to encrypt all of the multichannel audio tracks with more than 6 channels. SHARED - Use the same content key for all of the audio and video tracks in your stream. UNENCRYPTED - Don't encrypt any of the audio tracks in your stream."
        PresetSpeke20Video:
          $ref: "#/components/schemas/PresetSpeke20Video"
          description: "A collection of video encryption presets. Value description: PRESET-VIDEO-1 - Use one content key to encrypt all of the video tracks in your stream. PRESET-VIDEO-2 - Use one content key to encrypt all of the SD video tracks and one content key for all HD and higher resolutions video tracks. PRESET-VIDEO-3 - Use one content key to encrypt all of the SD video tracks, one content key for HD video tracks and one content key for all UHD video tracks. PRESET-VIDEO-4 - Use one content key to encrypt all of the SD video tracks, one content key for HD video tracks, one content key for all UHD1 video tracks and one content key for all UHD2 video tracks. PRESET-VIDEO-5 - Use one content key to encrypt all of the SD video tracks, one content key for HD1 video tracks, one content key for HD2 video tracks, one content key for all UHD1 video tracks and one content key for all UHD2 video tracks. PRESET-VIDEO-6 - Use one content key to encrypt all of the SD video tracks, one content key for HD1 video tracks, one content key for HD2 video tracks and one content key for all UHD video tracks. PRESET-VIDEO-7 - Use one content key to encrypt all of the SD+HD1 video tracks, one content key for HD2 video tracks and one content key for all UHD video tracks. PRESET-VIDEO-8 - Use one content key to encrypt all of the SD+HD1 video tracks, one content key for HD2 video tracks, one content key for all UHD1 video tracks and one content key for all UHD2 video tracks. SHARED - Use the same content key for all of the video and audio tracks in your stream. UNENCRYPTED - Don't encrypt any of the video tracks in your stream."
      required:
        - PresetSpeke20Audio
        - PresetSpeke20Video
    PresetSpeke20Audio:
      type: string
      enum:
        - PRESET_AUDIO_1
        - PRESET_AUDIO_2
        - PRESET_AUDIO_3
        - SHARED
        - UNENCRYPTED
    PresetSpeke20Video:
      type: string
      enum:
        - PRESET_VIDEO_1
        - PRESET_VIDEO_2
        - PRESET_VIDEO_3
        - PRESET_VIDEO_4
        - PRESET_VIDEO_5
        - PRESET_VIDEO_6
        - PRESET_VIDEO_7
        - PRESET_VIDEO_8
        - SHARED
        - UNENCRYPTED
    SpekeKeyProviderResourceIdString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[0-9a-zA-Z_-]+"
    SpekeKeyProviderDrmSystemsList:
      type: array
      items:
        $ref: "#/components/schemas/DrmSystem"
    DrmSystem:
      type: string
      enum:
        - CLEAR_KEY_AES_128
        - FAIRPLAY
        - PLAYREADY
        - WIDEVINE
        - IRDETO
    SpekeKeyProviderRoleArnString:
      type: string
      minLength: 1
      maxLength: 2048
    SpekeKeyProviderUrlString:
      type: string
      minLength: 1
      maxLength: 1024
    SpekeKeyProviderCertificateArnString:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:([^:\n]+):acm:([^:\n]+):([0-9]+):certificate/[a-zA-Z0-9-_]+
    CreateOriginEndpointRequestStartoverWindowSecondsInteger:
      type: integer
      minimum: 0
      maximum: 1209600
    CreateHlsManifests:
      type: array
      items:
        $ref: "#/components/schemas/CreateHlsManifestConfiguration"
    CreateHlsManifestConfiguration:
      description: Create an HTTP live streaming (HLS) manifest configuration.
      type: object
      properties:
        ManifestName:
          $ref: "#/components/schemas/ManifestName"
          description: A short short string that's appended to the endpoint URL. The manifest name creates a unique path to this endpoint. If you don't enter a value, MediaPackage uses the default manifest name, index. MediaPackage automatically inserts the format extension, such as .m3u8. You can't use the same manifest name if you use HLS manifest and low-latency HLS manifest. The manifestName on the HLSManifest object overrides the manifestName you provided on the originEndpoint object.
        ChildManifestName:
          $ref: "#/components/schemas/ManifestName"
          description: A short string that's appended to the endpoint URL. The child manifest name creates a unique path to this endpoint. If you don't enter a value, MediaPackage uses the default manifest name, index, with an added suffix to distinguish it from the manifest name. The manifestName on the HLSManifest object overrides the manifestName you provided on the originEndpoint object.
        ScteHls:
          $ref: "#/components/schemas/ScteHls"
        StartTag:
          $ref: "#/components/schemas/StartTag"
        ManifestWindowSeconds:
          $ref: "#/components/schemas/CreateHlsManifestConfigurationManifestWindowSecondsInteger"
          description: The total duration (in seconds) of the manifest's content.
        ProgramDateTimeIntervalSeconds:
          $ref: "#/components/schemas/CreateHlsManifestConfigurationProgramDateTimeIntervalSecondsInteger"
          description: Inserts EXT-X-PROGRAM-DATE-TIME tags in the output manifest at the interval that you specify. If you don't enter an interval, EXT-X-PROGRAM-DATE-TIME tags aren't included in the manifest. The tags sync the stream to the wall clock so that viewers can seek to a specific time in the playback timeline on the player. Irrespective of this parameter, if any ID3Timed metadata is in the HLS input, it is passed through to the HLS output.
        FilterConfiguration:
          $ref: "#/components/schemas/FilterConfiguration"
        UrlEncodeChildManifest:
          $ref: "#/components/schemas/Boolean"
          description: When enabled, MediaPackage URL-encodes the query string for API requests for HLS child manifests to comply with Amazon Web Services Signature Version 4 (SigV4) signature signing protocol. For more information, see Amazon Web Services Signature Version 4 for API requests in Identity and Access Management User Guide.
        UriPathType:
          $ref: "#/components/schemas/UriPathType"
          description: The type of path to use in manifest URIs. LEAF uses leaf-relative paths (for example, index_1.m3u8). ROOT uses root-relative paths that include the full path from root (for example, /out/v1/channel-group/channel/endpoint/index_1.m3u8). If you don't specify a value, the default is LEAF.
      required:
        - ManifestName
    ManifestName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9-]+"
    ScteHls:
      description: The SCTE configuration.
      type: object
      properties:
        AdMarkerHls:
          $ref: "#/components/schemas/AdMarkerHls"
          description: "Ad markers indicate when ads should be inserted during playback. If you include ad markers in the content stream in your upstream encoders, then you need to inform MediaPackage what to do with the ad markers in the output. Choose what you want MediaPackage to do with the ad markers. Value description: SCTE35_ENHANCED - Generate industry-standard CUE tag ad markers in HLS manifests based on SCTE-35 input messages from the input stream. DATERANGE - Insert EXT-X-DATERANGE tags to signal ad and program transition events in TS and CMAF manifests. If you use DATERANGE, you must set a programDateTimeIntervalSeconds value of 1 or higher. To learn more about DATERANGE, see SCTE-35 Ad Marker EXT-X-DATERANGE."
        ScteInManifests:
          $ref: "#/components/schemas/ScteInManifests"
          description: Controls which SCTE-35 events appear in HLS manifests. ALL includes all non-implicit SCTE-35 events. MATCHES_FILTER includes only events whose type matches the configured ScteFilter. If you don't specify a value, the default is ALL.
    AdMarkerHls:
      type: string
      enum:
        - DATERANGE
        - SCTE35_ENHANCED
    ScteInManifests:
      type: string
      enum:
        - ALL
        - MATCHES_FILTER
    StartTag:
      description: To insert an EXT-X-START tag in your HLS playlist, specify a StartTag configuration object with a valid TimeOffset. When you do, you can also optionally specify whether to include a PRECISE value in the EXT-X-START tag.
      type: object
      properties:
        TimeOffset:
          $ref: "#/components/schemas/Float"
          description: Specify the value for TIME-OFFSET within your EXT-X-START tag. Enter a signed floating point value which, if positive, must be less than the configured manifest duration minus three times the configured segment target duration. If negative, the absolute value must be larger than three times the configured segment target duration, and the absolute value must be smaller than the configured manifest duration.
        Precise:
          $ref: "#/components/schemas/Boolean"
          description: Specify the value for PRECISE within your EXT-X-START tag. Leave blank, or choose false, to use the default value NO. Choose yes to use the value YES.
      required:
        - TimeOffset
    Float:
      type: number
      format: float
    CreateHlsManifestConfigurationManifestWindowSecondsInteger:
      type: integer
      minimum: 30
    CreateHlsManifestConfigurationProgramDateTimeIntervalSecondsInteger:
      type: integer
      minimum: 1
      maximum: 1209600
    FilterConfiguration:
      description: Filter configuration includes settings for manifest filtering, start and end times, and time delay that apply to all of your egress requests for this manifest.
      type: object
      properties:
        ManifestFilter:
          $ref: "#/components/schemas/FilterConfigurationManifestFilterString"
          description: Optionally specify one or more manifest filters for all of your manifest egress requests. When you include a manifest filter, note that you cannot use an identical manifest filter query parameter for this manifest's endpoint URL.
        DrmSettings:
          $ref: "#/components/schemas/FilterConfigurationDrmSettingsString"
          description: Optionally specify one or more DRM settings for all of your manifest egress requests. When you include a DRM setting, note that you cannot use an identical DRM setting query parameter for this manifest's endpoint URL.
        Start:
          $ref: "#/components/schemas/Timestamp"
          description: Optionally specify the start time for all of your manifest egress requests. When you include start time, note that you cannot use start time query parameters for this manifest's endpoint URL.
        End:
