        BaseUrls:
          $ref: "#/components/schemas/DashBaseUrls"
          description: The base URLs to use for retrieving segments.
        ProgramInformation:
          $ref: "#/components/schemas/DashProgramInformation"
          description: Details about the content that you want MediaPackage to pass through in the manifest to the playback device.
        DvbSettings:
          $ref: "#/components/schemas/DashDvbSettings"
          description: For endpoints that use the DVB-DASH profile only. The font download and error reporting information that you want MediaPackage to pass through to the manifest.
        Compactness:
          $ref: "#/components/schemas/DashCompactness"
          description: The layout of the DASH manifest that MediaPackage produces. STANDARD indicates a default manifest, which is compacted. NONE indicates a full manifest. For information about compactness, see DASH manifest compactness in the Elemental MediaPackage v2 User Guide.
        SubtitleConfiguration:
          $ref: "#/components/schemas/DashSubtitleConfiguration"
          description: The configuration for DASH subtitles.
        UriPathType:
          $ref: "#/components/schemas/UriPathType"
          description: The type of path to use in manifest URIs. LEAF uses leaf-relative paths (for example, index_1.mpd). ROOT uses root-relative paths that include the full path from root (for example, /out/v1/channel-group/channel/endpoint/index_1.mpd). If you don't specify a value, the default is LEAF.
        AvailabilityStartTimeConfiguration:
          $ref: "#/components/schemas/DashAvailabilityStartTimeConfiguration"
          description: The configuration for the DASH availabilityStartTime attribute of the Media Presentation Description (MPD). If you don't specify a value, MediaPackage uses the default availability start time of 2024-01-01T00:00:00Z.
