          description: "The schema used by all of the data files of this DataSource. Note: This parameter is provided as part of the verbose format."
    GetEvaluationOutput:
      description: Represents the output of a GetEvaluation operation and describes an Evaluation.
      type: object
      properties:
        EvaluationId:
          $ref: "#/components/schemas/EntityId"
          description: The evaluation ID which is same as the EvaluationId in the request.
        MLModelId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the MLModel that was the focus of the evaluation.
        EvaluationDataSourceId:
          $ref: "#/components/schemas/EntityId"
          description: The DataSource used for this evaluation.
        InputDataLocationS3:
          $ref: "#/components/schemas/S3Url"
          description: The location of the data file or directory in Amazon Simple Storage Service (Amazon S3).
        CreatedByIamUser:
          $ref: "#/components/schemas/AwsUserArn"
          description: The AWS user account that invoked the evaluation. The account type can be either an AWS root account or an AWS Identity and Access Management (IAM) user account.
        CreatedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The time that the Evaluation was created. The time is expressed in epoch time.
        LastUpdatedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The time of the most recent edit to the Evaluation. The time is expressed in epoch time.
        Name:
          $ref: "#/components/schemas/EntityName"
          description: A user-supplied name or description of the Evaluation.
        Status:
          $ref: "#/components/schemas/EntityStatus"
          description: "The status of the evaluation. This element can have one of the following values: PENDING - Amazon Machine Language (Amazon ML) submitted a request to evaluate an MLModel. INPROGRESS - The evaluation is underway. FAILED - The request to evaluate an MLModel did not run to completion. It is not usable. COMPLETED - The evaluation process completed successfully. DELETED - The Evaluation is marked as deleted. It is not usable."
        PerformanceMetrics:
          $ref: "#/components/schemas/PerformanceMetrics"
          description: "Measurements of how well the MLModel performed using observations referenced by the DataSource. One of the following metric is returned based on the type of the MLModel: BinaryAUC: A binary MLModel uses the Area Under the Curve (AUC) technique to measure performance. RegressionRMSE: A regression MLModel uses the Root Mean Square Error (RMSE) technique to measure performance. RMSE measures the difference between predicted and actual values for a single variable. MulticlassAvgFScore: A multiclass MLModel uses the F1 score technique to measure performance. For more information about performance metrics, please see the Amazon Machine Learning Developer Guide."
        LogUri:
          $ref: "#/components/schemas/PresignedS3Url"
          description: A link to the file that contains logs of the CreateEvaluation operation.
        Message:
          $ref: "#/components/schemas/Message"
          description: A description of the most recent details about evaluating the MLModel.
        ComputeTime:
          $ref: "#/components/schemas/LongType"
          description: The approximate CPU time in milliseconds that Amazon Machine Learning spent processing the Evaluation, normalized and scaled on computation resources. ComputeTime is only available if the Evaluation is in the COMPLETED state.
        FinishedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The epoch time when Amazon Machine Learning marked the Evaluation as COMPLETED or FAILED. FinishedAt is only available when the Evaluation is in the COMPLETED or FAILED state.
        StartedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The epoch time when Amazon Machine Learning marked the Evaluation as INPROGRESS. StartedAt isn't available if the Evaluation is in the PENDING state.
    GetMLModelOutput:
      description: Represents the output of a GetMLModel operation, and provides detailed information about a MLModel.
      type: object
      properties:
        MLModelId:
          $ref: "#/components/schemas/EntityId"
          description: The MLModel ID, which is same as the MLModelId in the request.
        TrainingDataSourceId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the training DataSource.
        CreatedByIamUser:
          $ref: "#/components/schemas/AwsUserArn"
          description: The AWS user account from which the MLModel was created. The account type can be either an AWS root account or an AWS Identity and Access Management (IAM) user account.
        CreatedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The time that the MLModel was created. The time is expressed in epoch time.
        LastUpdatedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The time of the most recent edit to the MLModel. The time is expressed in epoch time.
        Name:
          $ref: "#/components/schemas/MLModelName"
          description: A user-supplied name or description of the MLModel.
        Status:
          $ref: "#/components/schemas/EntityStatus"
          description: "The current status of the MLModel. This element can have one of the following values: PENDING - Amazon Machine Learning (Amazon ML) submitted a request to describe a MLModel. INPROGRESS - The request is processing. FAILED - The request did not run to completion. The ML model isn't usable. COMPLETED - The request completed successfully. DELETED - The MLModel is marked as deleted. It isn't usable."
        SizeInBytes:
          $ref: "#/components/schemas/LongType"
        EndpointInfo:
          $ref: "#/components/schemas/RealtimeEndpointInfo"
          description: The current endpoint of the MLModel
        TrainingParameters:
          type: object
          properties: {}
          description: "A list of the training parameters in the MLModel. The list is implemented as a map of key-value pairs. The following is the current set of training parameters: sgd.maxMLModelSizeInBytes - The maximum allowed size of the model. Depending on the input data, the size of the model might affect its performance. The value is an integer that ranges from 100000 to 2147483648. The default value is 33554432. sgd.maxPasses - The number of times that the training process traverses the observations to build the MLModel. The value is an integer that ranges from 1 to 10000. The default value is 10. sgd.shuffleType - Whether Amazon ML shuffles the training data. Shuffling data improves a model's ability to find the optimal solution for a variety of data types. The valid values are auto and none. The default value is none. We strongly recommend that you shuffle your data. sgd.l1RegularizationAmount - The coefficient regularization L1 norm. It controls overfitting the data by penalizing large coefficients. This tends to drive coefficients to zero, resulting in a sparse feature set. If you use this parameter, start by specifying a small value, such as 1.0E-08. The value is a double that ranges from 0 to MAX_DOUBLE. The default is to not use L1 normalization. This parameter can't be used when L2 is specified. Use this parameter sparingly. sgd.l2RegularizationAmount - The coefficient regularization L2 norm. It controls overfitting the data by penalizing large coefficients. This tends to drive coefficients to small, nonzero values. If you use this parameter, start by specifying a small value, such as 1.0E-08. The value is a double that ranges from 0 to MAX_DOUBLE. The default is to not use L2 normalization. This parameter can't be used when L1 is specified. Use this parameter sparingly."
        InputDataLocationS3:
          $ref: "#/components/schemas/S3Url"
          description: The location of the data file or directory in Amazon Simple Storage Service (Amazon S3).
        MLModelType:
          $ref: "#/components/schemas/MLModelType"
          description: 'Identifies the MLModel category. The following are the available types: REGRESSION -- Produces a numeric result. For example, "What price should a house be listed at?" BINARY -- Produces one of two possible results. For example, "Is this an e-commerce website?" MULTICLASS -- Produces one of several possible results. For example, "Is this a HIGH, LOW or MEDIUM risk trade?"'
        ScoreThreshold:
          $ref: "#/components/schemas/ScoreThreshold"
          description: The scoring threshold is used in binary classification MLModel models. It marks the boundary between a positive prediction and a negative prediction. Output values greater than or equal to the threshold receive a positive result from the MLModel, such as true. Output values less than the threshold receive a negative response from the MLModel, such as false.
        ScoreThresholdLastUpdatedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The time of the most recent edit to the ScoreThreshold. The time is expressed in epoch time.
        LogUri:
          $ref: "#/components/schemas/PresignedS3Url"
          description: A link to the file that contains logs of the CreateMLModel operation.
        Message:
          $ref: "#/components/schemas/Message"
          description: A description of the most recent details about accessing the MLModel.
        ComputeTime:
          $ref: "#/components/schemas/LongType"
          description: The approximate CPU time in milliseconds that Amazon Machine Learning spent processing the MLModel, normalized and scaled on computation resources. ComputeTime is only available if the MLModel is in the COMPLETED state.
        FinishedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The epoch time when Amazon Machine Learning marked the MLModel as COMPLETED or FAILED. FinishedAt is only available when the MLModel is in the COMPLETED or FAILED state.
        StartedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The epoch time when Amazon Machine Learning marked the MLModel as INPROGRESS. StartedAt isn't available if the MLModel is in the PENDING state.
        Recipe:
          $ref: "#/components/schemas/Recipe"
          description: "The recipe to use when training the MLModel. The Recipe provides detailed information about the observation data to use during training, and manipulations to perform on the observation data during training. Note: This parameter is provided as part of the verbose format."
        Schema:
          $ref: "#/components/schemas/DataSchema"
          description: "The schema used by all of the data files referenced by the DataSource. Note: This parameter is provided as part of the verbose format."
    Record:
      description: A map of variable name-value pairs that represent an observation.
      type: object
      properties: {}
    PredictOutput:
      type: object
      properties:
        Prediction:
          $ref: "#/components/schemas/Prediction"
    Prediction:
      description: "The output from a Predict operation: Details - Contains the following attributes: DetailsAttributes.PREDICTIVE_MODEL_TYPE - REGRESSION | BINARY | MULTICLASS DetailsAttributes.ALGORITHM - SGD PredictedLabel - Present for either a BINARY or MULTICLASS MLModel request. PredictedScores - Contains the raw classification score corresponding to each label. PredictedValue - Present for a REGRESSION MLModel request."
      type: object
      properties:
        predictedLabel:
          $ref: "#/components/schemas/Label"
          description: The prediction label for either a BINARY or MULTICLASS MLModel.
        predictedValue:
          $ref: "#/components/schemas/floatLabel"
          description: The prediction value for REGRESSION MLModel.
        predictedScores:
          type: object
          properties: {}
        details:
          type: object
          properties: {}
    Label:
      type: string
      minLength: 1
    floatLabel:
      type: number
      format: float
