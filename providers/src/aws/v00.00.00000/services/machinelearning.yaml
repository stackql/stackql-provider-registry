          description: The location of the data file or directory in Amazon Simple Storage Service (Amazon S3).
        DataRearrangement:
          $ref: "#/components/schemas/DataRearrangement"
          description: A JSON string that represents the splitting and rearrangement requirement used when this DataSource was created.
        CreatedByIamUser:
          $ref: "#/components/schemas/AwsUserArn"
          description: The AWS user account from which the DataSource was created. The account type can be either an AWS root account or an AWS Identity and Access Management (IAM) user account.
        CreatedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The time that the DataSource was created. The time is expressed in epoch time.
        LastUpdatedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The time of the most recent edit to the DataSource. The time is expressed in epoch time.
        DataSizeInBytes:
          $ref: "#/components/schemas/LongType"
          description: The total size of observations in the data files.
        NumberOfFiles:
          $ref: "#/components/schemas/LongType"
          description: The number of data files referenced by the DataSource.
        Name:
          $ref: "#/components/schemas/EntityName"
          description: A user-supplied name or description of the DataSource.
        Status:
          $ref: "#/components/schemas/EntityStatus"
          description: "The current status of the DataSource. This element can have one of the following values: PENDING - Amazon ML submitted a request to create a DataSource. INPROGRESS - The creation process is underway. FAILED - The request to create a DataSource did not run to completion. It is not usable. COMPLETED - The creation process completed successfully. DELETED - The DataSource is marked as deleted. It is not usable."
        LogUri:
          $ref: "#/components/schemas/PresignedS3Url"
          description: A link to the file containing logs of CreateDataSourceFrom* operations.
        Message:
          $ref: "#/components/schemas/Message"
          description: The user-supplied description of the most recent details about creating the DataSource.
        RedshiftMetadata:
          $ref: "#/components/schemas/RedshiftMetadata"
        RDSMetadata:
          $ref: "#/components/schemas/RDSMetadata"
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
        ComputeStatistics:
          $ref: "#/components/schemas/ComputeStatistics"
          description: The parameter is true if statistics need to be generated from the observation data.
        ComputeTime:
          $ref: "#/components/schemas/LongType"
          description: The approximate CPU time in milliseconds that Amazon Machine Learning spent processing the DataSource, normalized and scaled on computation resources. ComputeTime is only available if the DataSource is in the COMPLETED state and the ComputeStatistics is set to true.
        FinishedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The epoch time when Amazon Machine Learning marked the DataSource as COMPLETED or FAILED. FinishedAt is only available when the DataSource is in the COMPLETED or FAILED state.
        StartedAt:
          $ref: "#/components/schemas/EpochTime"
          description: The epoch time when Amazon Machine Learning marked the DataSource as INPROGRESS. StartedAt isn't available if the DataSource is in the PENDING state.
        DataSourceSchema:
