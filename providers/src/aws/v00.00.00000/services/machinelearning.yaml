openapi: 3.0.0
info:
  version: "2014-12-12"
  title: Amazon Machine Learning
  description: Amazon Machine Learning
  x-serviceName: machinelearning
  x-serviceAlias: machinelearning
  x-protocol: json
  x-apiVersion: "2014-12-12"
  x-endpointPrefix: machinelearning
  x-targetPrefix: AmazonML_20141212
  x-jsonVersion: "1.1"
servers:
  - url: https://machinelearning.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for machinelearning
paths:
  /AddTags:
    post:
      operationId: AddTags
      description: Adds one or more tags to an object, up to a limit of 10. Each tag consists of a key and an optional value. If you add a tag using a key that is already associated with the ML object, AddTags updates the tag's value.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.AddTags
            default: AmazonML_20141212.AddTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key-value pairs to use to create tags. If you specify a key without specifying a value, Amazon ML creates a tag with the specified key and a value of null.
                ResourceId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the ML object to tag. For example, exampleModelId.
                ResourceType:
                  $ref: "#/components/schemas/TaggableResourceType"
                  description: The type of the ML object to tag.
              required:
                - ResourceId
                - ResourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsOutput"
  /CreateBatchPrediction:
    post:
      operationId: CreateBatchPrediction
      description: Generates predictions for a group of observations. The observations to process exist in one or more data files referenced by a DataSource. This operation creates a new BatchPrediction, and uses an MLModel and the data files referenced by the DataSource as information sources. CreateBatchPrediction is an asynchronous operation. In response to CreateBatchPrediction, Amazon Machine Learning (Amazon ML) immediately returns and sets the BatchPrediction status to PENDING. After the BatchPrediction completes, Amazon ML sets the status to COMPLETED. You can poll for status updates by using the GetBatchPrediction operation and checking the Status parameter of the result. After the COMPLETED status appears, the results are available in the location specified by the OutputUri parameter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.CreateBatchPrediction
            default: AmazonML_20141212.CreateBatchPrediction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                BatchPredictionId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied ID that uniquely identifies the BatchPrediction.
                BatchPredictionName:
                  $ref: "#/components/schemas/EntityName"
                  description: A user-supplied name or description of the BatchPrediction. BatchPredictionName can only use the UTF-8 character set.
                MLModelId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the MLModel that will generate predictions for the group of observations.
                BatchPredictionDataSourceId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the DataSource that points to the group of observations to predict.
                OutputUri:
                  $ref: "#/components/schemas/S3Url"
                  description: "The location of an Amazon Simple Storage Service (Amazon S3) bucket or directory to store the batch prediction results. The following substrings are not allowed in the s3 key portion of the outputURI field: ':', '//', '/./', '/../'. Amazon ML needs permissions to store and retrieve the logs on your behalf. For information about how to set permissions, see the Amazon Machine Learning Developer Guide."
              required:
                - BatchPredictionId
                - MLModelId
                - BatchPredictionDataSourceId
                - OutputUri
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBatchPredictionOutput"
  /CreateDataSourceFromRDS:
    post:
      operationId: CreateDataSourceFromRDS
      description: Creates a DataSource object from an Amazon Relational Database Service (Amazon RDS). A DataSource references data that can be used to perform CreateMLModel, CreateEvaluation, or CreateBatchPrediction operations. CreateDataSourceFromRDS is an asynchronous operation. In response to CreateDataSourceFromRDS, Amazon Machine Learning (Amazon ML) immediately returns and sets the DataSource status to PENDING. After the DataSource is created and ready for use, Amazon ML sets the Status parameter to COMPLETED. DataSource in the COMPLETED or PENDING state can be used only to perform >CreateMLModel>, CreateEvaluation, or CreateBatchPrediction operations. If Amazon ML cannot accept the input source, it sets the Status parameter to FAILED and includes an error message in the Message attribute of the GetDataSource operation response.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.CreateDataSourceFromRDS
            default: AmazonML_20141212.CreateDataSourceFromRDS
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DataSourceId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied ID that uniquely identifies the DataSource. Typically, an Amazon Resource Number (ARN) becomes the ID for a DataSource.
                DataSourceName:
                  $ref: "#/components/schemas/EntityName"
                  description: A user-supplied name or description of the DataSource.
                RDSData:
                  $ref: "#/components/schemas/RDSDataSpec"
                  description: 'The data specification of an Amazon RDS DataSource: DatabaseInformation - DatabaseName - The name of the Amazon RDS database. InstanceIdentifier - A unique identifier for the Amazon RDS database instance. DatabaseCredentials - AWS Identity and Access Management (IAM) credentials that are used to connect to the Amazon RDS database. ResourceRole - A role (DataPipelineDefaultResourceRole) assumed by an EC2 instance to carry out the copy task from Amazon RDS to Amazon Simple Storage Service (Amazon S3). For more information, see Role templates for data pipelines. ServiceRole - A role (DataPipelineDefaultRole) assumed by the AWS Data Pipeline service to monitor the progress of the copy task from Amazon RDS to Amazon S3. For more information, see Role templates for data pipelines. SecurityInfo - The security information to use to access an RDS DB instance. You need to set up appropriate ingress rules for the security entity IDs provided to allow access to the Amazon RDS instance. Specify a [SubnetId, SecurityGroupIds] pair for a VPC-based RDS DB instance. SelectSqlQuery - A query that is used to retrieve the observation data for the Datasource. S3StagingLocation - The Amazon S3 location for staging Amazon RDS data. The data retrieved from Amazon RDS using SelectSqlQuery is stored in this location. DataSchemaUri - The Amazon S3 location of the DataSchema. DataSchema - A JSON string representing the schema. This is not required if DataSchemaUri is specified. DataRearrangement - A JSON string that represents the splitting and rearrangement requirements for the Datasource. Sample - "{\"splitting\":{\"percentBegin\":10,\"percentEnd\":60}}"'
                RoleARN:
                  $ref: "#/components/schemas/RoleARN"
                  description: The role that Amazon ML assumes on behalf of the user to create and activate a data pipeline in the user's account and copy data using the SelectSqlQuery query from Amazon RDS to Amazon S3.
                ComputeStatistics:
                  $ref: "#/components/schemas/ComputeStatistics"
                  description: The compute statistics for a DataSource. The statistics are generated from the observation data referenced by a DataSource. Amazon ML uses the statistics internally during MLModel training. This parameter must be set to true if the DataSource needs to be used for MLModel training.
              required:
                - DataSourceId
                - RDSData
                - RoleARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataSourceFromRDSOutput"
  /CreateDataSourceFromRedshift:
    post:
      operationId: CreateDataSourceFromRedshift
      description: Creates a DataSource from a database hosted on an Amazon Redshift cluster. A DataSource references data that can be used to perform either CreateMLModel, CreateEvaluation, or CreateBatchPrediction operations. CreateDataSourceFromRedshift is an asynchronous operation. In response to CreateDataSourceFromRedshift, Amazon Machine Learning (Amazon ML) immediately returns and sets the DataSource status to PENDING. After the DataSource is created and ready for use, Amazon ML sets the Status parameter to COMPLETED. DataSource in COMPLETED or PENDING states can be used to perform only CreateMLModel, CreateEvaluation, or CreateBatchPrediction operations. If Amazon ML can't accept the input source, it sets the Status parameter to FAILED and includes an error message in the Message attribute of the GetDataSource operation response. The observations should be contained in the database hosted on an Amazon Redshift cluster and should be specified by a SelectSqlQuery query. Amazon ML executes an Unload command in Amazon Redshift to transfer the result set of the SelectSqlQuery query to S3StagingLocation. After the DataSource has been created, it's ready for use in evaluations and batch predictions. If you plan to use the DataSource to train an MLModel, the DataSource also requires a recipe. A recipe describes how each input variable will be used in training an MLModel. Will the variable be included or excluded from training? Will the variable be manipulated; for example, will it be combined with another variable or will it be split apart into word combinations? The recipe provides answers to these questions. You can't change an existing datasource, but you can copy and modify the settings from an existing Amazon Redshift datasource to create a new datasource. To do so, call GetDataSource for an existing datasource and copy the values to a CreateDataSource call. Change the settings that you want to change and make sure that all required fields have the appropriate values.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.CreateDataSourceFromRedshift
            default: AmazonML_20141212.CreateDataSourceFromRedshift
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DataSourceId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied ID that uniquely identifies the DataSource.
                DataSourceName:
                  $ref: "#/components/schemas/EntityName"
                  description: A user-supplied name or description of the DataSource.
                DataSpec:
                  $ref: "#/components/schemas/RedshiftDataSpec"
                  description: 'The data specification of an Amazon Redshift DataSource: DatabaseInformation - DatabaseName - The name of the Amazon Redshift database. ClusterIdentifier - The unique ID for the Amazon Redshift cluster. DatabaseCredentials - The AWS Identity and Access Management (IAM) credentials that are used to connect to the Amazon Redshift database. SelectSqlQuery - The query that is used to retrieve the observation data for the Datasource. S3StagingLocation - The Amazon Simple Storage Service (Amazon S3) location for staging Amazon Redshift data. The data retrieved from Amazon Redshift using the SelectSqlQuery query is stored in this location. DataSchemaUri - The Amazon S3 location of the DataSchema. DataSchema - A JSON string representing the schema. This is not required if DataSchemaUri is specified. DataRearrangement - A JSON string that represents the splitting and rearrangement requirements for the DataSource. Sample - "{\"splitting\":{\"percentBegin\":10,\"percentEnd\":60}}"'
                RoleARN:
                  $ref: "#/components/schemas/RoleARN"
                  description: "A fully specified role Amazon Resource Name (ARN). Amazon ML assumes the role on behalf of the user to create the following: A security group to allow Amazon ML to execute the SelectSqlQuery query on an Amazon Redshift cluster An Amazon S3 bucket policy to grant Amazon ML read/write permissions on the S3StagingLocation"
                ComputeStatistics:
                  $ref: "#/components/schemas/ComputeStatistics"
                  description: The compute statistics for a DataSource. The statistics are generated from the observation data referenced by a DataSource. Amazon ML uses the statistics internally during MLModel training. This parameter must be set to true if the DataSource needs to be used for MLModel training.
              required:
                - DataSourceId
                - DataSpec
                - RoleARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataSourceFromRedshiftOutput"
  /CreateDataSourceFromS3:
    post:
      operationId: CreateDataSourceFromS3
      description: Creates a DataSource object. A DataSource references data that can be used to perform CreateMLModel, CreateEvaluation, or CreateBatchPrediction operations. CreateDataSourceFromS3 is an asynchronous operation. In response to CreateDataSourceFromS3, Amazon Machine Learning (Amazon ML) immediately returns and sets the DataSource status to PENDING. After the DataSource has been created and is ready for use, Amazon ML sets the Status parameter to COMPLETED. DataSource in the COMPLETED or PENDING state can be used to perform only CreateMLModel, CreateEvaluation or CreateBatchPrediction operations. If Amazon ML can't accept the input source, it sets the Status parameter to FAILED and includes an error message in the Message attribute of the GetDataSource operation response. The observation data used in a DataSource should be ready to use; that is, it should have a consistent structure, and missing data values should be kept to a minimum. The observation data must reside in one or more .csv files in an Amazon Simple Storage Service (Amazon S3) location, along with a schema that describes the data items by name and type. The same schema must be used for all of the data files referenced by the DataSource. After the DataSource has been created, it's ready to use in evaluations and batch predictions. If you plan to use the DataSource to train an MLModel, the DataSource also needs a recipe. A recipe describes how each input variable will be used in training an MLModel. Will the variable be included or excluded from training? Will the variable be manipulated; for example, will it be combined with another variable or will it be split apart into word combinations? The recipe provides answers to these questions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.CreateDataSourceFromS3
            default: AmazonML_20141212.CreateDataSourceFromS3
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DataSourceId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied identifier that uniquely identifies the DataSource.
                DataSourceName:
                  $ref: "#/components/schemas/EntityName"
                  description: A user-supplied name or description of the DataSource.
                DataSpec:
                  $ref: "#/components/schemas/S3DataSpec"
                  description: 'The data specification of a DataSource: DataLocationS3 - The Amazon S3 location of the observation data. DataSchemaLocationS3 - The Amazon S3 location of the DataSchema. DataSchema - A JSON string representing the schema. This is not required if DataSchemaUri is specified. DataRearrangement - A JSON string that represents the splitting and rearrangement requirements for the Datasource. Sample - "{\"splitting\":{\"percentBegin\":10,\"percentEnd\":60}}"'
                ComputeStatistics:
                  $ref: "#/components/schemas/ComputeStatistics"
                  description: The compute statistics for a DataSource. The statistics are generated from the observation data referenced by a DataSource. Amazon ML uses the statistics internally during MLModel training. This parameter must be set to true if the DataSource needs to be used for MLModel training.
              required:
                - DataSourceId
                - DataSpec
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataSourceFromS3Output"
  /CreateEvaluation:
    post:
      operationId: CreateEvaluation
      description: "Creates a new Evaluation of an MLModel. An MLModel is evaluated on a set of observations associated to a DataSource. Like a DataSource for an MLModel, the DataSource for an Evaluation contains values for the Target Variable. The Evaluation compares the predicted result for each observation to the actual outcome and provides a summary so that you know how effective the MLModel functions on the test data. Evaluation generates a relevant performance metric, such as BinaryAUC, RegressionRMSE or MulticlassAvgFScore based on the corresponding MLModelType: BINARY, REGRESSION or MULTICLASS. CreateEvaluation is an asynchronous operation. In response to CreateEvaluation, Amazon Machine Learning (Amazon ML) immediately returns and sets the evaluation status to PENDING. After the Evaluation is created and ready for use, Amazon ML sets the status to COMPLETED. You can use the GetEvaluation operation to check progress of the evaluation during the creation operation."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.CreateEvaluation
            default: AmazonML_20141212.CreateEvaluation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EvaluationId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied ID that uniquely identifies the Evaluation.
                EvaluationName:
                  $ref: "#/components/schemas/EntityName"
                  description: A user-supplied name or description of the Evaluation.
                MLModelId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the MLModel to evaluate. The schema used in creating the MLModel must match the schema of the DataSource used in the Evaluation.
                EvaluationDataSourceId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the DataSource for the evaluation. The schema of the DataSource must match the schema used to create the MLModel.
              required:
                - EvaluationId
                - MLModelId
                - EvaluationDataSourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEvaluationOutput"
  /CreateMLModel:
    post:
      operationId: CreateMLModel
      description: Creates a new MLModel using the DataSource and the recipe as information sources. An MLModel is nearly immutable. Users can update only the MLModelName and the ScoreThreshold in an MLModel without creating a new MLModel. CreateMLModel is an asynchronous operation. In response to CreateMLModel, Amazon Machine Learning (Amazon ML) immediately returns and sets the MLModel status to PENDING. After the MLModel has been created and ready is for use, Amazon ML sets the status to COMPLETED. You can use the GetMLModel operation to check the progress of the MLModel during the creation operation. CreateMLModel requires a DataSource with computed statistics, which can be created by setting ComputeStatistics to true in CreateDataSourceFromRDS, CreateDataSourceFromS3, or CreateDataSourceFromRedshift operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.CreateMLModel
            default: AmazonML_20141212.CreateMLModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MLModelId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied ID that uniquely identifies the MLModel.
                MLModelName:
                  $ref: "#/components/schemas/EntityName"
                  description: A user-supplied name or description of the MLModel.
                MLModelType:
                  $ref: "#/components/schemas/MLModelType"
                  description: "The category of supervised learning that this MLModel will address. Choose from the following types: Choose REGRESSION if the MLModel will be used to predict a numeric value. Choose BINARY if the MLModel result has two possible values. Choose MULTICLASS if the MLModel result has a limited number of values. For more information, see the Amazon Machine Learning Developer Guide."
                Parameters:
                  $ref: "#/components/schemas/TrainingParameters"
                  description: "A list of the training parameters in the MLModel. The list is implemented as a map of key-value pairs. The following is the current set of training parameters: sgd.maxMLModelSizeInBytes - The maximum allowed size of the model. Depending on the input data, the size of the model might affect its performance. The value is an integer that ranges from 100000 to 2147483648. The default value is 33554432. sgd.maxPasses - The number of times that the training process traverses the observations to build the MLModel. The value is an integer that ranges from 1 to 10000. The default value is 10. sgd.shuffleType - Whether Amazon ML shuffles the training data. Shuffling the data improves a model's ability to find the optimal solution for a variety of data types. The valid values are auto and none. The default value is none. We strongly recommend that you shuffle your data. sgd.l1RegularizationAmount - The coefficient regularization L1 norm. It controls overfitting the data by penalizing large coefficients. This tends to drive coefficients to zero, resulting in a sparse feature set. If you use this parameter, start by specifying a small value, such as 1.0E-08. The value is a double that ranges from 0 to MAX_DOUBLE. The default is to not use L1 normalization. This parameter can't be used when L2 is specified. Use this parameter sparingly. sgd.l2RegularizationAmount - The coefficient regularization L2 norm. It controls overfitting the data by penalizing large coefficients. This tends to drive coefficients to small, nonzero values. If you use this parameter, start by specifying a small value, such as 1.0E-08. The value is a double that ranges from 0 to MAX_DOUBLE. The default is to not use L2 normalization. This parameter can't be used when L1 is specified. Use this parameter sparingly."
                TrainingDataSourceId:
                  $ref: "#/components/schemas/EntityId"
                  description: The DataSource that points to the training data.
                Recipe:
                  $ref: "#/components/schemas/Recipe"
                  description: The data recipe for creating the MLModel. You must specify either the recipe or its URI. If you don't specify a recipe or its URI, Amazon ML creates a default.
                RecipeUri:
                  $ref: "#/components/schemas/S3Url"
                  description: The Amazon Simple Storage Service (Amazon S3) location and file name that contains the MLModel recipe. You must specify either the recipe or its URI. If you don't specify a recipe or its URI, Amazon ML creates a default.
              required:
                - MLModelId
                - MLModelType
                - TrainingDataSourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMLModelOutput"
  /CreateRealtimeEndpoint:
    post:
      operationId: CreateRealtimeEndpoint
      description: Creates a real-time endpoint for the MLModel. The endpoint contains the URI of the MLModel; that is, the location to send real-time prediction requests for the specified MLModel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.CreateRealtimeEndpoint
            default: AmazonML_20141212.CreateRealtimeEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MLModelId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID assigned to the MLModel during creation.
              required:
                - MLModelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRealtimeEndpointOutput"
  /DeleteBatchPrediction:
    post:
      operationId: DeleteBatchPrediction
      description: "Assigns the DELETED status to a BatchPrediction, rendering it unusable. After using the DeleteBatchPrediction operation, you can use the GetBatchPrediction operation to verify that the status of the BatchPrediction changed to DELETED. Caution: The result of the DeleteBatchPrediction operation is irreversible."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.DeleteBatchPrediction
            default: AmazonML_20141212.DeleteBatchPrediction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                BatchPredictionId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied ID that uniquely identifies the BatchPrediction.
              required:
                - BatchPredictionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBatchPredictionOutput"
  /DeleteDataSource:
    post:
      operationId: DeleteDataSource
      description: "Assigns the DELETED status to a DataSource, rendering it unusable. After using the DeleteDataSource operation, you can use the GetDataSource operation to verify that the status of the DataSource changed to DELETED. Caution: The results of the DeleteDataSource operation are irreversible."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.DeleteDataSource
            default: AmazonML_20141212.DeleteDataSource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DataSourceId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied ID that uniquely identifies the DataSource.
              required:
                - DataSourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataSourceOutput"
  /DeleteEvaluation:
    post:
      operationId: DeleteEvaluation
      description: "Assigns the DELETED status to an Evaluation, rendering it unusable. After invoking the DeleteEvaluation operation, you can use the GetEvaluation operation to verify that the status of the Evaluation changed to DELETED. Caution: The results of the DeleteEvaluation operation are irreversible."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.DeleteEvaluation
            default: AmazonML_20141212.DeleteEvaluation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EvaluationId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied ID that uniquely identifies the Evaluation to delete.
              required:
                - EvaluationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEvaluationOutput"
  /DeleteMLModel:
    post:
      operationId: DeleteMLModel
      description: "Assigns the DELETED status to an MLModel, rendering it unusable. After using the DeleteMLModel operation, you can use the GetMLModel operation to verify that the status of the MLModel changed to DELETED. Caution: The result of the DeleteMLModel operation is irreversible."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.DeleteMLModel
            default: AmazonML_20141212.DeleteMLModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MLModelId:
                  $ref: "#/components/schemas/EntityId"
                  description: A user-supplied ID that uniquely identifies the MLModel.
              required:
                - MLModelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMLModelOutput"
  /DeleteRealtimeEndpoint:
    post:
      operationId: DeleteRealtimeEndpoint
      description: Deletes a real time endpoint of an MLModel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.DeleteRealtimeEndpoint
            default: AmazonML_20141212.DeleteRealtimeEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MLModelId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID assigned to the MLModel during creation.
              required:
                - MLModelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRealtimeEndpointOutput"
  /DeleteTags:
    post:
      operationId: DeleteTags
      description: Deletes the specified tags associated with an ML object. After this operation is complete, you can't recover deleted tags. If you specify a tag that doesn't exist, Amazon ML ignores it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonML_20141212.DeleteTags
