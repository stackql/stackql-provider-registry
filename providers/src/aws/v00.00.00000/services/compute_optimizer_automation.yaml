openapi: 3.0.0
info:
  version: "2025-09-22"
  title: Compute Optimizer Automation
  description: Compute Optimizer Automation
  x-serviceName: aco-automation
  x-serviceAlias: compute_optimizer_automation
  x-protocol: json
  x-apiVersion: "2025-09-22"
  x-endpointPrefix: aco-automation
  x-targetPrefix: ComputeOptimizerAutomationService
  x-jsonVersion: "1.0"
servers:
  - url: https://aco-automation.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for compute-optimizer-automation
paths:
  /AssociateAccounts:
    post:
      operationId: AssociateAccounts
      description: Associates one or more member accounts with your organization's management account, enabling centralized implementation of optimization actions across those accounts. Once associated, the management account (or a delegated administrator) can apply recommended actions to the member account. When you associate a member account, its organization rule mode is automatically set to "Any allowed," which permits the management account to create Automation rules that automatically apply actions to that account. If the member account has not previously enabled the Automation feature, the association process automatically enables it. Only the management account or a delegated administrator can perform this action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.AssociateAccounts
            default: ComputeOptimizerAutomationService.AssociateAccounts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIdList"
                  description: The IDs of the member accounts to associate. You can specify up to 50 account IDs.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier to ensure idempotency of the request. Valid for 24 hours after creation.
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAccountsResponse"
  /CreateAutomationRule:
    post:
      operationId: CreateAutomationRule
      description: Creates a new automation rule to apply recommended actions to resources based on specified criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.CreateAutomationRule
            default: ComputeOptimizerAutomationService.CreateAutomationRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/RuleName"
                  description: The name of the automation rule.
                description:
                  $ref: "#/components/schemas/RuleDescription"
                  description: A description of the automation rule.
                ruleType:
                  $ref: "#/components/schemas/RuleType"
                  description: The type of rule. Only the management account or a delegated administrator can set the ruleType to be OrganizationRule.
                organizationConfiguration:
                  $ref: "#/components/schemas/OrganizationConfiguration"
                  description: Configuration for organization-level rules. Required for OrganizationRule type.
                priority:
                  $ref: "#/components/schemas/String"
                  description: A string representation of a decimal number between 0 and 1 (having up to 30 digits after the decimal point) that determines the priority of the rule. When multiple rules match the same recommended action, Compute Optimizer assigns the action to the rule with the lowest priority value (highest priority), even if that rule is scheduled to run later than other matching rules.
                recommendedActionTypes:
                  $ref: "#/components/schemas/RecommendedActionTypeList"
                  description: The types of recommended actions this rule will automate.
                criteria:
                  $ref: "#/components/schemas/Criteria"
                  description: A set of conditions that specify which recommended action qualify for implementation. When a rule is active and a recommended action matches these criteria, Compute Optimizer implements the action at the scheduled run time.
                schedule:
                  $ref: "#/components/schemas/Schedule"
                  description: The schedule for when the rule should run.
                status:
                  $ref: "#/components/schemas/RuleStatus"
                  description: The status of the rule
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to associate with the rule.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier to ensure idempotency of the request.
              required:
                - name
                - ruleType
                - recommendedActionTypes
                - schedule
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAutomationRuleResponse"
  /DeleteAutomationRule:
    post:
      operationId: DeleteAutomationRule
      description: Deletes an existing automation rule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.DeleteAutomationRule
            default: ComputeOptimizerAutomationService.DeleteAutomationRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ruleArn:
                  $ref: "#/components/schemas/RuleArn"
                  description: The ARN of the rule to delete.
                ruleRevision:
                  $ref: "#/components/schemas/Long"
                  description: The revision number of the rule to delete.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier to ensure idempotency of the request.
              required:
                - ruleArn
                - ruleRevision
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAutomationRuleResponse"
  /DisassociateAccounts:
    post:
      operationId: DisassociateAccounts
      description: Disassociates member accounts from your organization's management account, removing centralized automation capabilities. Once disassociated, organization rules no longer apply to the member account, and the management account (or delegated administrator) cannot create Automation rules for that account. Only the management account or a delegated administrator can perform this action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.DisassociateAccounts
            default: ComputeOptimizerAutomationService.DisassociateAccounts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIdList"
                  description: The IDs of the member accounts to disassociate.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier to ensure idempotency of the request.
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateAccountsResponse"
  /GetAutomationEvent:
    post:
      operationId: GetAutomationEvent
      description: Retrieves details about a specific automation event.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.GetAutomationEvent
            default: ComputeOptimizerAutomationService.GetAutomationEvent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                eventId:
                  $ref: "#/components/schemas/EventId"
                  description: The ID of the automation event to retrieve.
              required:
                - eventId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAutomationEventResponse"
  /GetAutomationRule:
    post:
      operationId: GetAutomationRule
      description: Retrieves details about a specific automation rule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.GetAutomationRule
            default: ComputeOptimizerAutomationService.GetAutomationRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ruleArn:
                  $ref: "#/components/schemas/RuleArn"
                  description: The ARN of the rule to retrieve.
              required:
                - ruleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAutomationRuleResponse"
  /GetEnrollmentConfiguration:
    post:
      operationId: GetEnrollmentConfiguration
      description: Retrieves the current enrollment configuration for Compute Optimizer Automation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.GetEnrollmentConfiguration
            default: ComputeOptimizerAutomationService.GetEnrollmentConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnrollmentConfigurationResponse"
  /ListAccounts:
    post:
      operationId: ListAccounts
      description: Lists the accounts in your organization that are enrolled in Compute Optimizer and whether they have enabled Automation. Only the management account or a delegated administrator can perform this action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListAccounts
            default: ComputeOptimizerAutomationService.ListAccounts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/ListAccountsRequestMaxResultsInteger"
                  description: The maximum number of results to return in a single call.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccountsResponse"
  /ListAutomationEventSteps:
    post:
      operationId: ListAutomationEventSteps
      description: Lists the steps for a specific automation event. You can only list steps for events created within the past year.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListAutomationEventSteps
            default: ComputeOptimizerAutomationService.ListAutomationEventSteps
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                eventId:
                  $ref: "#/components/schemas/EventId"
                  description: The ID of the automation event.
                maxResults:
                  $ref: "#/components/schemas/ListAutomationEventStepsRequestMaxResultsInteger"
                  description: The maximum number of automation event steps to return in a single response. Valid range is 1-1000.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token used for pagination to retrieve the next set of results when the response is truncated.
              required:
                - eventId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomationEventStepsResponse"
  /ListAutomationEventSummaries:
    post:
      operationId: ListAutomationEventSummaries
      description: Provides a summary of automation events based on specified filters. Only events created within the past year will be included in the summary.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListAutomationEventSummaries
            default: ComputeOptimizerAutomationService.ListAutomationEventSummaries
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/AutomationEventFilterList"
                  description: The filters to apply to the list of automation event summaries.
                startDateInclusive:
                  $ref: "#/components/schemas/String"
                  description: The start date for filtering automation event summaries, inclusive. Events created on or after this date will be included.
                endDateExclusive:
                  $ref: "#/components/schemas/String"
                  description: The end date for filtering automation event summaries, exclusive. Events created before this date will be included.
                maxResults:
                  $ref: "#/components/schemas/ListAutomationEventSummariesRequestMaxResultsInteger"
                  description: The maximum number of automation event summaries to return in a single response. Valid range is 1-1000.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token used for pagination to retrieve the next set of results when the response is truncated.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomationEventSummariesResponse"
  /ListAutomationEvents:
    post:
      operationId: ListAutomationEvents
      description: Lists automation events based on specified filters. You can retrieve events that were created within the past year.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListAutomationEvents
            default: ComputeOptimizerAutomationService.ListAutomationEvents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/AutomationEventFilterList"
                  description: The filters to apply to the list of automation events.
                startTimeInclusive:
                  $ref: "#/components/schemas/Timestamp"
                  description: The start of the time range to query for events.
                endTimeExclusive:
                  $ref: "#/components/schemas/Timestamp"
                  description: The end of the time range to query for events.
                maxResults:
                  $ref: "#/components/schemas/ListAutomationEventsRequestMaxResultsInteger"
                  description: The maximum number of results to return in a single call.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomationEventsResponse"
  /ListAutomationRulePreview:
    post:
      operationId: ListAutomationRulePreview
      description: Returns a preview of the recommended actions that match your Automation rule's configuration and criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListAutomationRulePreview
            default: ComputeOptimizerAutomationService.ListAutomationRulePreview
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ruleType:
                  $ref: "#/components/schemas/RuleType"
                  description: The type of rule. Only the management account or a delegated administrator can set the ruleType to be OrganizationRule.
                organizationScope:
                  $ref: "#/components/schemas/OrganizationScope"
                  description: The organizational scope for the rule preview.
                recommendedActionTypes:
                  $ref: "#/components/schemas/RecommendedActionTypeList"
                  description: The types of recommended actions to include in the preview.
                criteria:
                  $ref: "#/components/schemas/Criteria"
                  description: A set of conditions that specify which recommended action qualify for implementation. When a rule is active and a recommended action matches these criteria, Compute Optimizer implements the action at the scheduled run time.
                maxResults:
                  $ref: "#/components/schemas/ListAutomationRulePreviewRequestMaxResultsInteger"
                  description: The maximum number of automation rule preview results to return in a single response. Valid range is 1-1000.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token used for pagination to retrieve the next set of results when the response is truncated.
              required:
                - ruleType
                - recommendedActionTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomationRulePreviewResponse"
  /ListAutomationRulePreviewSummaries:
    post:
      operationId: ListAutomationRulePreviewSummaries
      description: Returns a summary of the recommended actions that match your rule preview configuration and criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListAutomationRulePreviewSummaries
            default: ComputeOptimizerAutomationService.ListAutomationRulePreviewSummaries
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ruleType:
                  $ref: "#/components/schemas/RuleType"
                  description: The type of rule.
                organizationScope:
                  $ref: "#/components/schemas/OrganizationScope"
                  description: The organizational scope for the rule preview.
                recommendedActionTypes:
                  $ref: "#/components/schemas/RecommendedActionTypeList"
                  description: The types of recommended actions to include in the preview.
                criteria:
                  $ref: "#/components/schemas/Criteria"
                maxResults:
                  $ref: "#/components/schemas/ListAutomationRulePreviewSummariesRequestMaxResultsInteger"
                  description: The maximum number of automation rule preview summaries to return in a single response. Valid range is 1-1000.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token used for pagination to retrieve the next set of results when the response is truncated.
              required:
                - ruleType
                - recommendedActionTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomationRulePreviewSummariesResponse"
  /ListAutomationRules:
    post:
      operationId: ListAutomationRules
      description: Lists the automation rules that match specified filters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListAutomationRules
            default: ComputeOptimizerAutomationService.ListAutomationRules
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/FilterList"
                  description: The filters to apply to the list of automation rules.
                maxResults:
                  $ref: "#/components/schemas/ListAutomationRulesRequestMaxResultsInteger"
                  description: The maximum number of automation rules to return in a single response. Valid range is 1-1000.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token used for pagination to retrieve the next set of results when the response is truncated.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomationRulesResponse"
  /ListRecommendedActionSummaries:
    post:
      operationId: ListRecommendedActionSummaries
      description: Provides a summary of recommended actions based on specified filters. Management accounts and delegated administrators can retrieve recommended actions that include associated member accounts. You can associate a member account using AssociateAccounts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListRecommendedActionSummaries
            default: ComputeOptimizerAutomationService.ListRecommendedActionSummaries
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/RecommendedActionFilterList"
                  description: A list of filters to apply when retrieving recommended action summaries. Filters can be based on resource type, action type, account ID, and other criteria.
                maxResults:
                  $ref: "#/components/schemas/ListRecommendedActionSummariesRequestMaxResultsInteger"
                  description: The maximum number of recommended action summaries to return in a single response. Valid range is 1-1000.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token used for pagination to retrieve the next set of results when the response is truncated.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendedActionSummariesResponse"
  /ListRecommendedActions:
    post:
      operationId: ListRecommendedActions
      description: Lists the recommended actions based that match specified filters. Management accounts and delegated administrators can retrieve recommended actions that include associated member accounts. You can associate a member account using AssociateAccounts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListRecommendedActions
            default: ComputeOptimizerAutomationService.ListRecommendedActions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/RecommendedActionFilterList"
                  description: The filters to apply to the list of recommended actions.
                maxResults:
                  $ref: "#/components/schemas/ListRecommendedActionsRequestMaxResultsInteger"
                  description: The maximum number of recommended actions to return in a single response. Valid range is 1-1000.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token used for pagination to retrieve the next set of results when the response is truncated.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendedActionsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags for a specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.ListTagsForResource
            default: ComputeOptimizerAutomationService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/RuleArn"
                  description: The ARN of the resource to list tags for.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /RollbackAutomationEvent:
    post:
      operationId: RollbackAutomationEvent
      description: Initiates a rollback for a completed automation event. Management accounts and delegated administrators can only initiate a rollback for events belonging to associated member accounts. You can associate a member account using AssociateAccounts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.RollbackAutomationEvent
            default: ComputeOptimizerAutomationService.RollbackAutomationEvent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                eventId:
                  $ref: "#/components/schemas/EventId"
                  description: The ID of the automation event to roll back.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Must be 1-64 characters long and contain only alphanumeric characters, underscores, and hyphens.
              required:
                - eventId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RollbackAutomationEventResponse"
  /StartAutomationEvent:
    post:
      operationId: StartAutomationEvent
      description: Initiates a one-time, on-demand automation for the specified recommended action. Management accounts and delegated administrators can only initiate recommended actions for associated member accounts. You can associate a member account using AssociateAccounts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.StartAutomationEvent
            default: ComputeOptimizerAutomationService.StartAutomationEvent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                recommendedActionId:
                  $ref: "#/components/schemas/RecommendedActionId"
                  description: The ID of the recommended action to automate.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Must be 1-64 characters long and contain only alphanumeric characters, underscores, and hyphens.
              required:
                - recommendedActionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAutomationEventResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds tags to the specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.TagResource
            default: ComputeOptimizerAutomationService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/RuleArn"
                  description: The ARN of the resource to tag.
                ruleRevision:
                  $ref: "#/components/schemas/Long"
                  description: The revision number of the automation rule to tag. This ensures you're tagging the correct version of the rule.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to add to the resource.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Must be 1-64 characters long and contain only alphanumeric characters, underscores, and hyphens.
              required:
                - resourceArn
                - ruleRevision
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from the specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.UntagResource
            default: ComputeOptimizerAutomationService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/RuleArn"
                  description: The ARN of the resource to untag.
                ruleRevision:
                  $ref: "#/components/schemas/Long"
                  description: The revision number of the automation rule to untag. This ensures you're untagging the correct version of the rule.
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The keys of the tags to remove from the resource.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Must be 1-64 characters long and contain only alphanumeric characters, underscores, and hyphens.
              required:
                - resourceArn
                - ruleRevision
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateAutomationRule:
    post:
      operationId: UpdateAutomationRule
      description: Updates an existing automation rule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.UpdateAutomationRule
            default: ComputeOptimizerAutomationService.UpdateAutomationRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ruleArn:
                  $ref: "#/components/schemas/RuleArn"
                  description: The ARN of the rule to update.
                ruleRevision:
                  $ref: "#/components/schemas/Long"
                  description: The revision number of the rule to update.
                name:
                  $ref: "#/components/schemas/RuleName"
                  description: The updated name of the automation rule. Must be 1-128 characters long and contain only alphanumeric characters, underscores, and hyphens.
                description:
                  $ref: "#/components/schemas/RuleDescription"
                  description: The updated description of the automation rule. Can be up to 1024 characters long and contain alphanumeric characters, underscores, hyphens, spaces, and certain special characters.
                ruleType:
                  $ref: "#/components/schemas/RuleType"
                  description: The updated type of automation rule. Can be either OrganizationRule for organization-wide rules or AccountRule for account-specific rules.
                organizationConfiguration:
                  $ref: "#/components/schemas/OrganizationConfiguration"
                  description: Updated configuration settings for organization-wide rules, including rule application order and target account IDs.
                priority:
                  $ref: "#/components/schemas/String"
                  description: The updated priority level of the automation rule, used to determine execution order when multiple rules apply to the same resource.
                recommendedActionTypes:
                  $ref: "#/components/schemas/RecommendedActionTypeList"
                  description: Updated list of recommended action types that this rule can execute, such as SnapshotAndDeleteUnattachedEbsVolume or UpgradeEbsVolumeType.
                criteria:
                  $ref: "#/components/schemas/Criteria"
                schedule:
                  $ref: "#/components/schemas/Schedule"
                  description: The updated schedule configuration for when the automation rule should execute, including cron expression, timezone, and execution window.
                status:
                  $ref: "#/components/schemas/RuleStatus"
                  description: The updated status of the automation rule. Can be Active or Inactive.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Must be 1-64 characters long and contain only alphanumeric characters, underscores, and hyphens.
              required:
                - ruleArn
                - ruleRevision
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAutomationRuleResponse"
  /UpdateEnrollmentConfiguration:
    post:
      operationId: UpdateEnrollmentConfiguration
      description: Updates your account’s Compute Optimizer Automation enrollment configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerAutomationService.UpdateEnrollmentConfiguration
            default: ComputeOptimizerAutomationService.UpdateEnrollmentConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/EnrollmentStatus"
                  description: The desired enrollment status. Active - Enables the Automation feature for your account. Inactive - Disables the Automation feature for your account and stops all of your automation rules. If you opt in again later, all rules will be inactive, and you must enable the rules you want to run. You must wait at least 24 hours after opting out to opt in again. The Pending and Failed options cannot be used to update the enrollment status of an account. They are returned in the response of a request to update the enrollment status of an account. If you are a member account, your account must be disassociated from your organization’s management account before you can disable Automation. Contact your administrator to make this change.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Must be 1-64 characters long and contain only alphanumeric characters, underscores, and hyphens.
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnrollmentConfigurationResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AccountIdList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    AccountId:
      type: string
      pattern: "[0-9]{12}"
    ClientToken:
      type: string
      pattern: "[a-zA-Z0-9_-]{1,64}"
    AssociateAccountsResponse:
      type: object
      properties:
        accountIds:
          $ref: "#/components/schemas/AccountIdList"
          description: The IDs of the member accounts that were successfully associated.
        errors:
          $ref: "#/components/schemas/StringList"
          description: Any errors that occurred during the association process.
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    RuleName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9_-]*"
    RuleDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[a-zA-Z0-9_\\-\\s@\\.]*"
    RuleType:
      type: string
      enum:
        - OrganizationRule
        - AccountRule
    OrganizationConfiguration:
      description: Configuration settings for organization-wide automation rules.
      type: object
      properties:
        ruleApplyOrder:
          $ref: "#/components/schemas/RuleApplyOrder"
          description: Specifies when organization rules should be applied relative to account rules.
        accountIds:
          $ref: "#/components/schemas/OrganizationConfigurationAccountIds"
          description: List of specific Amazon Web Services account IDs where the organization rule should be applied.
    RuleApplyOrder:
      type: string
      enum:
        - BeforeAccountRules
        - AfterAccountRules
    OrganizationConfigurationAccountIds:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    RecommendedActionTypeList:
      type: array
      items:
        $ref: "#/components/schemas/RecommendedActionType"
    RecommendedActionType:
      description: Recommended action type enumeration
      type: string
      enum:
        - SnapshotAndDeleteUnattachedEbsVolume
        - UpgradeEbsVolumeType
    Criteria:
      description: A set of conditions that specify which recommended action qualify for implementation. When a rule is active and a recommended action matches these criteria, Compute Optimizer implements the action at the scheduled run time. You can specify up to 20 conditions per filter criteria and 20 values per condition.
      type: object
      properties:
        region:
          $ref: "#/components/schemas/StringCriteriaConditionList"
          description: Filter criteria for Amazon Web Services regions where resources must be located.
        resourceArn:
          $ref: "#/components/schemas/StringCriteriaConditionList"
          description: Filter criteria for specific resource ARNs to include or exclude.
        ebsVolumeType:
          $ref: "#/components/schemas/StringCriteriaConditionList"
          description: Filter criteria for EBS volume types, such as gp2, gp3, io1, io2, st1, or sc1.
        ebsVolumeSizeInGib:
          $ref: "#/components/schemas/IntegerCriteriaConditionList"
          description: Filter criteria for EBS volume sizes in gibibytes (GiB).
        estimatedMonthlySavings:
          $ref: "#/components/schemas/DoubleCriteriaConditionList"
          description: Filter criteria for estimated monthly cost savings from the recommended action.
        resourceTag:
          $ref: "#/components/schemas/ResourceTagsCriteriaConditionList"
          description: Filter criteria for resource tags, allowing filtering by tag key and value combinations.
        lookBackPeriodInDays:
          $ref: "#/components/schemas/IntegerCriteriaConditionList"
          description: Filter criteria for the lookback period in days used to analyze resource utilization.
        restartNeeded:
          $ref: "#/components/schemas/StringCriteriaConditionList"
          description: Filter criteria indicating whether the recommended action requires a resource restart.
    StringCriteriaConditionList:
      type: array
      items:
        $ref: "#/components/schemas/StringCriteriaCondition"
    StringCriteriaCondition:
      description: Criteria condition for filtering based on string values, including comparison operators and target values.
      type: object
      properties:
        comparison:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The comparison operator used to evaluate the string criteria, such as equals, not equals, or contains.
        values:
          $ref: "#/components/schemas/StringCriteriaValues"
          description: List of string values to compare against when applying the criteria condition.
    ComparisonOperator:
      type: string
      enum:
        - StringEquals
        - StringNotEquals
        - StringEqualsIgnoreCase
        - StringNotEqualsIgnoreCase
        - StringLike
        - StringNotLike
        - NumericEquals
        - NumericNotEquals
        - NumericLessThan
        - NumericLessThanEquals
        - NumericGreaterThan
        - NumericGreaterThanEquals
    StringCriteriaValues:
      type: array
      items:
        $ref: "#/components/schemas/StringCriteriaValue"
    StringCriteriaValue:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\w\\s\\.\\-\\:\\/\\=\\+\\@\\*\\?]+"
    IntegerCriteriaConditionList:
      type: array
      items:
        $ref: "#/components/schemas/IntegerCriteriaCondition"
    IntegerCriteriaCondition:
      description: Defines a condition for filtering based on integer values with comparison operators.
      type: object
      properties:
        comparison:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The comparison operator to use, such as equals, greater than, less than, etc.
        values:
          $ref: "#/components/schemas/IntegerList"
          description: The list of integer values to compare against using the specified comparison operator.
    IntegerList:
      type: array
      items:
        $ref: "#/components/schemas/Integer"
    Integer:
      type: integer
    DoubleCriteriaConditionList:
      type: array
      items:
        $ref: "#/components/schemas/DoubleCriteriaCondition"
    DoubleCriteriaCondition:
      description: Defines a condition for filtering based on double/floating-point numeric values with comparison operators.
      type: object
      properties:
        comparison:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The comparison operator to use, such as equals, greater than, less than, etc.
        values:
          $ref: "#/components/schemas/DoubleList"
          description: The list of double values to compare against using the specified comparison operator.
    DoubleList:
      type: array
      items:
        $ref: "#/components/schemas/Double"
    Double:
      type: number
      format: double
    ResourceTagsCriteriaConditionList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceTagsCriteriaCondition"
    ResourceTagsCriteriaCondition:
      description: Criteria condition for filtering resources based on their tags, including comparison operators and values.
      type: object
      properties:
        comparison:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The comparison operator used to evaluate the tag criteria, such as equals, not equals, or contains.
        key:
          $ref: "#/components/schemas/StringCriteriaValue"
          description: The tag key to use for comparison when filtering resources.
        values:
          $ref: "#/components/schemas/StringCriteriaValues"
          description: List of tag values to compare against when filtering resources.
    Schedule:
      description: Configuration for scheduling when automation rules should execute, including timing and execution windows.
      type: object
      properties:
        scheduleExpression:
          $ref: "#/components/schemas/String"
          description: "The expression that defines when the schedule runs. cron expression is supported. A cron expression consists of six fields separated by white spaces: (minutes hours day_of_month month day_of_week year) You can schedule rules to run at most once per day. Your cron expression must use specific values (not wildcards) for the minutes and hours fields. For example: (30 12 * * *) runs daily at 12:30 PM UTC."
        scheduleExpressionTimezone:
          $ref: "#/components/schemas/String"
          description: The timezone to use when interpreting the schedule expression.
        executionWindowInMinutes:
          $ref: "#/components/schemas/ScheduleExecutionWindowInMinutesInteger"
          description: The time window in minutes during which the automation rule can start implementing recommended actions.
    ScheduleExecutionWindowInMinutesInteger:
      type: integer
      minimum: 60
      maximum: 1440
    RuleStatus:
      type: string
      enum:
        - Active
        - Inactive
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key-value pair used to categorize and organize Amazon Web Services resources and automation rules.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The tag key, which can be up to 128 characters long.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The tag value, which can be up to 256 characters long.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w\\s\\.\\-\\:\\/\\=\\+\\@]+"
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\w\\s\\.\\-\\:\\/\\=\\+\\@]*"
    CreateAutomationRuleResponse:
      type: object
      properties:
        ruleArn:
          $ref: "#/components/schemas/RuleArn"
          description: The Amazon Resource Name (ARN) of the created rule.
        ruleId:
          $ref: "#/components/schemas/RuleId"
          description: The unique identifier of the created rule.
        name:
          $ref: "#/components/schemas/RuleName"
          description: The name of the automation rule. Must be 1-128 characters long and contain only alphanumeric characters, underscores, and hyphens.
        description:
          $ref: "#/components/schemas/String"
          description: A description of the automation rule. Can be up to 1024 characters long and contain alphanumeric characters, underscores, hyphens, spaces, and certain special characters.
        ruleType:
          $ref: "#/components/schemas/RuleType"
          description: The type of automation rule. Can be either OrganizationRule for organization-wide rules or AccountRule for account-specific rules.
        ruleRevision:
          $ref: "#/components/schemas/Long"
          description: The revision number of the automation rule. This is incremented each time the rule is updated.
        organizationConfiguration:
          $ref: "#/components/schemas/OrganizationConfiguration"
          description: Configuration settings for organization-wide rules, including rule application order and target account IDs.
        priority:
          $ref: "#/components/schemas/String"
          description: The priority level of the automation rule, used to determine execution order when multiple rules apply to the same resource.
        recommendedActionTypes:
          $ref: "#/components/schemas/RecommendedActionTypeList"
          description: List of recommended action types that this rule can execute, such as SnapshotAndDeleteUnattachedEbsVolume or UpgradeEbsVolumeType.
        criteria:
          $ref: "#/components/schemas/Criteria"
        schedule:
          $ref: "#/components/schemas/Schedule"
          description: The schedule configuration for when the automation rule should execute, including cron expression, timezone, and execution window.
        status:
          $ref: "#/components/schemas/RuleStatus"
          description: The current status of the automation rule. Can be Active or Inactive.
        tags:
          $ref: "#/components/schemas/TagList"
          description: A list of key-value pairs used to categorize and organize the automation rule. Maximum of 200 tags allowed.
        createdTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the automation rule was created.
    RuleArn:
      type: string
      pattern: arn:aws:compute-optimizer::[0-9]{12}:automation-rule/[a-zA-Z0-9_-]+
    RuleId:
      type: string
      pattern: "[0-9A-Za-z]{16}"
    Long:
      type: integer
      format: int64
    Timestamp:
      type: string
      format: date-time
    DeleteAutomationRuleResponse:
      type: object
    DisassociateAccountsResponse:
      type: object
      properties:
        accountIds:
          $ref: "#/components/schemas/AccountIdList"
          description: The IDs of the member accounts that were successfully disassociated.
        errors:
          $ref: "#/components/schemas/StringList"
          description: Any errors that occurred during the disassociation process.
    EventId:
      type: string
      pattern: "[0-9A-Za-z]{16}"
    GetAutomationEventResponse:
      type: object
      properties:
        eventId:
          $ref: "#/components/schemas/EventId"
          description: The ID of the automation event to retrieve.
        eventDescription:
          $ref: "#/components/schemas/String"
          description: A description of the automation event.
        eventType:
          $ref: "#/components/schemas/EventType"
          description: The type of automation event.
        eventStatus:
          $ref: "#/components/schemas/EventStatus"
          description: The current status of the automation event.
        eventStatusReason:
          $ref: "#/components/schemas/String"
          description: The reason for the current event status.
        resourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource affected by the automation event.
        resourceId:
          $ref: "#/components/schemas/ResourceId"
          description: The ID of the resource affected by the automation event.
        recommendedActionId:
          $ref: "#/components/schemas/RecommendedActionId"
          description: The ID of the recommended action associated with this automation event.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID associated with the automation event.
        region:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services Region where the automation event occurred.
        ruleId:
          $ref: "#/components/schemas/RuleId"
          description: The ID of the automation rule that triggered this event.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of resource affected by the automation event.
        createdTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the automation event was created.
        completedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the automation event completed.
        estimatedMonthlySavings:
          $ref: "#/components/schemas/EstimatedMonthlySavings"
    EventType:
      description: Event type enumeration
      type: string
      enum:
        - SnapshotAndDeleteUnattachedEbsVolume
        - UpgradeEbsVolumeType
    EventStatus:
      type: string
      enum:
        - Ready
        - InProgress
        - Complete
        - Failed
        - Cancelled
        - RollbackReady
        - RollbackInProgress
        - RollbackComplete
        - RollbackFailed
    ResourceArn:
      type: string
      pattern: arn:aws[a-z0-9-]*:[a-z0-9-]+:[a-z0-9-]*:[0-9]{0,12}:[a-zA-Z0-9/_.-]+
    ResourceId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9_.-]+"
    RecommendedActionId:
      type: string
      pattern: "[0-9A-Za-z]{16}"
    ResourceType:
      type: string
      enum:
        - EbsVolume
    EstimatedMonthlySavings:
      description: Contains information about estimated monthly cost savings.
      type: object
      properties:
        currency:
          $ref: "#/components/schemas/String"
          description: The currency of the estimated savings.
        beforeDiscountSavings:
          $ref: "#/components/schemas/Double"
          description: The estimated monthly savings before applying any discounts.
        afterDiscountSavings:
          $ref: "#/components/schemas/Double"
          description: The estimated monthly savings after applying any discounts.
        savingsEstimationMode:
          $ref: "#/components/schemas/SavingsEstimationMode"
          description: The mode used to calculate savings, either BeforeDiscount or AfterDiscount.
      required:
        - currency
        - beforeDiscountSavings
        - afterDiscountSavings
        - savingsEstimationMode
    SavingsEstimationMode:
      type: string
      enum:
        - BeforeDiscount
        - AfterDiscount
    GetAutomationRuleResponse:
      type: object
      properties:
        ruleArn:
          $ref: "#/components/schemas/RuleArn"
          description: The Amazon Resource Name (ARN) of the automation rule.
        ruleId:
          $ref: "#/components/schemas/RuleId"
          description: The unique identifier of the automation rule.
        name:
          $ref: "#/components/schemas/RuleName"
          description: The name of the automation rule.
        description:
          $ref: "#/components/schemas/String"
          description: A description of the automation rule.
        ruleType:
          $ref: "#/components/schemas/RuleType"
          description: The type of automation rule.
        ruleRevision:
          $ref: "#/components/schemas/Long"
          description: The revision number of the automation rule.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The 12-digit Amazon Web Services account ID that owns this automation rule.
        organizationConfiguration:
          $ref: "#/components/schemas/OrganizationConfiguration"
        priority:
          $ref: "#/components/schemas/String"
          description: A string representation of a decimal number between 0 and 1 (having up to 30 digits after the decimal point) that determines the priority of the rule.
        recommendedActionTypes:
          $ref: "#/components/schemas/RecommendedActionTypeList"
          description: List of recommended action types that this rule can execute.
        criteria:
          $ref: "#/components/schemas/Criteria"
        schedule:
          $ref: "#/components/schemas/Schedule"
        status:
          $ref: "#/components/schemas/RuleStatus"
          description: The current status of the automation rule (Active or Inactive).
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tags associated with the automation rule.
        createdTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the automation rule was created.
        lastUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the automation rule was last updated.
    GetEnrollmentConfigurationResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/EnrollmentStatus"
          description: The current enrollment status.
        statusReason:
          $ref: "#/components/schemas/String"
          description: The reason for the current enrollment status.
        organizationRuleMode:
          $ref: "#/components/schemas/OrganizationRuleMode"
          description: Specifies whether the management account can create Automation rules that implement optimization actions for this account.
        lastUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the last update to the enrollment configuration.
      required:
        - status
    EnrollmentStatus:
      type: string
      enum:
        - Active
        - Inactive
        - Pending
        - Failed
    OrganizationRuleMode:
      type: string
      enum:
        - AnyAllowed
        - NoneAllowed
    ListAccountsRequestMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 1000
    NextToken:
      type: string
      pattern: "[A-Za-z0-9+/=]+"
    ListAccountsResponse:
      type: object
      properties:
        accounts:
          $ref: "#/components/schemas/AccountInfoList"
          description: The list of accounts in your organization enrolled in Compute Optimizer
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to retrieve the next page of results.
      required:
        - accounts
    AccountInfoList:
      type: array
      items:
        $ref: "#/components/schemas/AccountInfo"
    AccountInfo:
      description: Contains information about an Amazon Web Services account's enrollment and association status with Compute Optimizer Automation.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The ID of the Amazon Web Services account.
        status:
          $ref: "#/components/schemas/EnrollmentStatus"
          description: "The enrollment status of the account: Active, Inactive, Pending, or Failed."
        organizationRuleMode:
          $ref: "#/components/schemas/OrganizationRuleMode"
          description: Specifies whether the management account can create Automation rules that implement optimization actions for this account.
        statusReason:
          $ref: "#/components/schemas/String"
          description: The reason for the current Automation enrollment status.
        lastUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the account's Automation enrollment status was last updated.
      required:
        - accountId
        - status
        - organizationRuleMode
        - lastUpdatedTimestamp
    ListAutomationEventStepsRequestMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    ListAutomationEventStepsResponse:
      type: object
      properties:
        automationEventSteps:
          $ref: "#/components/schemas/AutomationEventSteps"
          description: The list of steps for the specified automation event.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token used for pagination. If present, indicates there are more results available and can be used in subsequent requests.
    AutomationEventSteps:
      type: array
      items:
