          description: The name associated with the finding, usually a CVE number.
        description:
          $ref: "#/components/schemas/FindingDescription"
          description: The description of the finding.
        uri:
          $ref: "#/components/schemas/Url"
          description: A link containing additional details about the security vulnerability.
        severity:
          $ref: "#/components/schemas/FindingSeverity"
          description: The finding severity.
        attributes:
          $ref: "#/components/schemas/AttributeList"
          description: A collection of attributes of the host from which the finding is generated.
    FindingName:
      type: string
    FindingDescription:
      type: string
    FindingSeverity:
      type: string
      enum:
        - INFORMATIONAL
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
        - UNDEFINED
    AttributeList:
      type: array
      items:
        $ref: "#/components/schemas/Attribute"
    Attribute:
      description: This data type is used in the ImageScanFinding data type.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/AttributeKey"
          description: The attribute key.
        value:
          $ref: "#/components/schemas/AttributeValue"
          description: The value assigned to the attribute key.
      required:
        - key
    AttributeKey:
      type: string
      minLength: 1
      maxLength: 128
    AttributeValue:
      type: string
      minLength: 1
      maxLength: 256
    EnhancedImageScanFindingList:
      type: array
      items:
        $ref: "#/components/schemas/EnhancedImageScanFinding"
    EnhancedImageScanFinding:
      description: The details of an enhanced image scan. This is returned when enhanced scanning is enabled for your private registry.
      type: object
      properties:
        awsAccountId:
          $ref: "#/components/schemas/RegistryId"
          description: The Amazon Web Services account ID associated with the image.
        description:
          $ref: "#/components/schemas/FindingDescription"
          description: The description of the finding.
        findingArn:
          $ref: "#/components/schemas/FindingArn"
          description: The Amazon Resource Number (ARN) of the finding.
        firstObservedAt:
          $ref: "#/components/schemas/Date"
          description: The date and time that the finding was first observed.
        lastObservedAt:
          $ref: "#/components/schemas/Date"
          description: The date and time that the finding was last observed.
        packageVulnerabilityDetails:
          $ref: "#/components/schemas/PackageVulnerabilityDetails"
          description: An object that contains the details of a package vulnerability finding.
        remediation:
          $ref: "#/components/schemas/Remediation"
          description: An object that contains the details about how to remediate a finding.
        resources:
          $ref: "#/components/schemas/ResourceList"
          description: Contains information on the resources involved in a finding.
        score:
          $ref: "#/components/schemas/Score"
          description: The Amazon Inspector score given to the finding.
        scoreDetails:
          $ref: "#/components/schemas/ScoreDetails"
          description: An object that contains details of the Amazon Inspector score.
        severity:
          $ref: "#/components/schemas/Severity"
          description: The severity of the finding.
        status:
          $ref: "#/components/schemas/Status"
          description: The status of the finding.
        title_:
          $ref: "#/components/schemas/Title"
          description: The title of the finding.
        type_:
          $ref: "#/components/schemas/Type"
          description: The type of the finding.
        updatedAt:
          $ref: "#/components/schemas/Date"
          description: The date and time the finding was last updated at.
        fixAvailable:
          $ref: "#/components/schemas/FixAvailable"
          description: Details on whether a fix is available through a version update. This value can be YES, NO, or PARTIAL. A PARTIAL fix means that some, but not all, of the packages identified in the finding have fixes available through updated versions.
        exploitAvailable:
          $ref: "#/components/schemas/ExploitAvailable"
          description: If a finding discovered in your environment has an exploit available.
    FindingArn:
      type: string
    PackageVulnerabilityDetails:
