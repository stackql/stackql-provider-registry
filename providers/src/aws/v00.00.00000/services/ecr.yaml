openapi: 3.0.0
info:
  version: "2015-09-21"
  title: Amazon Elastic Container Registry
  description: Amazon Elastic Container Registry
  x-serviceName: ecr
  x-serviceAlias: ecr
  x-protocol: json
  x-apiVersion: "2015-09-21"
  x-endpointPrefix: api.ecr
  x-targetPrefix: AmazonEC2ContainerRegistry_V20150921
  x-jsonVersion: "1.1"
servers:
  - url: https://api.ecr.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ecr
paths:
  /BatchCheckLayerAvailability:
    post:
      operationId: BatchCheckLayerAvailability
      description: Checks the availability of one or more image layers in a repository. When an image is pushed to a repository, each image layer is checked to verify if it has been uploaded before. If it has been uploaded, then the image layer is skipped. This operation is used by the Amazon ECR proxy and is not generally used by customers for pulling and pushing images. In most cases, you should use the docker CLI to pull, tag, and push images.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.BatchCheckLayerAvailability
            default: AmazonEC2ContainerRegistry_V20150921.BatchCheckLayerAvailability
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry that contains the image layers to check. If you do not specify a registry, the default registry is assumed.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository that is associated with the image layers to check.
                layerDigests:
                  $ref: "#/components/schemas/BatchedOperationLayerDigestList"
                  description: The digests of the image layers to check.
              required:
                - repositoryName
                - layerDigests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCheckLayerAvailabilityResponse"
  /BatchDeleteImage:
    post:
      operationId: BatchDeleteImage
      description: Deletes a list of specified images within a repository. Images are specified with either an imageTag or imageDigest. You can remove a tag from an image by specifying the image's tag in your request. When you remove the last tag from an image, the image is deleted from your repository. You can completely delete an image (and all of its tags) by specifying the image's digest in your request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.BatchDeleteImage
            default: AmazonEC2ContainerRegistry_V20150921.BatchDeleteImage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry that contains the image to delete. If you do not specify a registry, the default registry is assumed.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The repository that contains the image to delete.
                imageIds:
                  $ref: "#/components/schemas/ImageIdentifierList"
                  description: A list of image ID references that correspond to images to delete. The format of the imageIds reference is imageTag=tag or imageDigest=digest.
              required:
                - repositoryName
                - imageIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteImageResponse"
  /BatchGetImage:
    post:
      operationId: BatchGetImage
      description: Gets detailed information for an image. Images are specified with either an imageTag or imageDigest. When an image is pulled, the BatchGetImage API is called once to retrieve the image manifest.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.BatchGetImage
            default: AmazonEC2ContainerRegistry_V20150921.BatchGetImage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry that contains the images to describe. If you do not specify a registry, the default registry is assumed.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The repository that contains the images to describe.
                imageIds:
                  $ref: "#/components/schemas/ImageIdentifierList"
                  description: A list of image ID references that correspond to images to describe. The format of the imageIds reference is imageTag=tag or imageDigest=digest.
                acceptedMediaTypes:
                  $ref: "#/components/schemas/MediaTypeList"
                  description: "The accepted media types for the request. Valid values: application/vnd.docker.distribution.manifest.v1+json | application/vnd.docker.distribution.manifest.v2+json | application/vnd.oci.image.manifest.v1+json"
              required:
                - repositoryName
                - imageIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetImageResponse"
  /BatchGetRepositoryScanningConfiguration:
    post:
      operationId: BatchGetRepositoryScanningConfiguration
      description: Gets the scanning configuration for one or more repositories.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.BatchGetRepositoryScanningConfiguration
            default: AmazonEC2ContainerRegistry_V20150921.BatchGetRepositoryScanningConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                repositoryNames:
                  $ref: "#/components/schemas/ScanningConfigurationRepositoryNameList"
                  description: One or more repository names to get the scanning configuration for.
              required:
                - repositoryNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetRepositoryScanningConfigurationResponse"
  /CompleteLayerUpload:
    post:
      operationId: CompleteLayerUpload
      description: Informs Amazon ECR that the image layer upload has completed for a specified registry, repository name, and upload ID. You can optionally provide a sha256 digest of the image layer for data validation purposes. When an image is pushed, the CompleteLayerUpload API is called once per each new image layer to verify that the upload has completed. This operation is used by the Amazon ECR proxy and is not generally used by customers for pulling and pushing images. In most cases, you should use the docker CLI to pull, tag, and push images.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.CompleteLayerUpload
            default: AmazonEC2ContainerRegistry_V20150921.CompleteLayerUpload
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry to which to upload layers. If you do not specify a registry, the default registry is assumed.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository to associate with the image layer.
                uploadId:
                  $ref: "#/components/schemas/UploadId"
                  description: The upload ID from a previous InitiateLayerUpload operation to associate with the image layer.
                layerDigests:
                  $ref: "#/components/schemas/LayerDigestList"
                  description: The sha256 digest of the image layer.
              required:
                - repositoryName
                - uploadId
                - layerDigests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteLayerUploadResponse"
  /CreatePullThroughCacheRule:
    post:
      operationId: CreatePullThroughCacheRule
      description: Creates a pull through cache rule. A pull through cache rule provides a way to cache images from an upstream registry source in your Amazon ECR private registry. For more information, see Using pull through cache rules in the Amazon Elastic Container Registry User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.CreatePullThroughCacheRule
            default: AmazonEC2ContainerRegistry_V20150921.CreatePullThroughCacheRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ecrRepositoryPrefix:
                  $ref: "#/components/schemas/PullThroughCacheRuleRepositoryPrefix"
                  description: The repository name prefix to use when caching images from the source registry. There is always an assumed / applied to the end of the prefix. If you specify ecr-public as the prefix, Amazon ECR treats that as ecr-public/.
                upstreamRegistryUrl:
                  $ref: "#/components/schemas/Url"
                  description: The registry URL of the upstream public registry to use as the source for the pull through cache rule. The following is the syntax to use for each supported upstream registry. Amazon ECR (ecr) – `<accountId>`.dkr.ecr.`<region>`.amazonaws.com Amazon ECR Public (ecr-public) – public.ecr.aws Docker Hub (docker-hub) – registry-1.docker.io GitHub Container Registry (github-container-registry) – ghcr.io GitLab Container Registry (gitlab-container-registry) – registry.gitlab.com Kubernetes (k8s) – registry.k8s.io Microsoft Azure Container Registry (azure-container-registry) – `<custom>`.azurecr.io Quay (quay) – quay.io
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry to create the pull through cache rule for. If you do not specify a registry, the default registry is assumed.
                upstreamRegistry:
                  $ref: "#/components/schemas/UpstreamRegistry"
                  description: The name of the upstream registry.
                credentialArn:
                  $ref: "#/components/schemas/CredentialArn"
                  description: The Amazon Resource Name (ARN) of the Amazon Web Services Secrets Manager secret that identifies the credentials to authenticate to the upstream registry.
                customRoleArn:
                  $ref: "#/components/schemas/CustomRoleArn"
                  description: Amazon Resource Name (ARN) of the IAM role to be assumed by Amazon ECR to authenticate to the ECR upstream registry. This role must be in the same account as the registry that you are configuring.
                upstreamRepositoryPrefix:
                  $ref: "#/components/schemas/PullThroughCacheRuleRepositoryPrefix"
                  description: The repository name prefix of the upstream registry to match with the upstream repository name. When this field isn't specified, Amazon ECR will use the ROOT.
              required:
                - ecrRepositoryPrefix
                - upstreamRegistryUrl
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePullThroughCacheRuleResponse"
  /CreateRepository:
    post:
      operationId: CreateRepository
      description: Creates a repository. For more information, see Amazon ECR repositories in the Amazon Elastic Container Registry User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.CreateRepository
            default: AmazonEC2ContainerRegistry_V20150921.CreateRepository
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry to create the repository. If you do not specify a registry, the default registry is assumed.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name to use for the repository. The repository name may be specified on its own (such as nginx-web-app) or it can be prepended with a namespace to group the repository into a category (such as project-a/nginx-web-app). The repository name must start with a letter and can only contain lowercase letters, numbers, hyphens, underscores, and forward slashes.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata that you apply to the repository to help you categorize and organize them. Each tag consists of a key and an optional value, both of which you define. Tag keys can have a maximum character length of 128 characters, and tag values can have a maximum length of 256 characters.
                imageTagMutability:
                  $ref: "#/components/schemas/ImageTagMutability"
                  description: The tag mutability setting for the repository. If this parameter is omitted, the default setting of MUTABLE will be used which will allow image tags to be overwritten. If IMMUTABLE is specified, all image tags within the repository will be immutable which will prevent them from being overwritten.
                imageTagMutabilityExclusionFilters:
                  $ref: "#/components/schemas/ImageTagMutabilityExclusionFilters"
                  description: A list of filters that specify which image tags should be excluded from the repository's image tag mutability setting.
                imageScanningConfiguration:
                  $ref: "#/components/schemas/ImageScanningConfiguration"
                  description: The imageScanningConfiguration parameter is being deprecated, in favor of specifying the image scanning configuration at the registry level. For more information, see PutRegistryScanningConfiguration. The image scanning configuration for the repository. This determines whether images are scanned for known vulnerabilities after being pushed to the repository.
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                  description: The encryption configuration for the repository. This determines how the contents of your repository are encrypted at rest.
              required:
                - repositoryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRepositoryResponse"
  /CreateRepositoryCreationTemplate:
    post:
      operationId: CreateRepositoryCreationTemplate
      description: Creates a repository creation template. This template is used to define the settings for repositories created by Amazon ECR on your behalf. For example, repositories created through pull through cache actions. For more information, see Private repository creation templates in the Amazon Elastic Container Registry User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.CreateRepositoryCreationTemplate
            default: AmazonEC2ContainerRegistry_V20150921.CreateRepositoryCreationTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                prefix:
                  $ref: "#/components/schemas/Prefix"
                  description: The repository namespace prefix to associate with the template. All repositories created using this namespace prefix will have the settings defined in this template applied. For example, a prefix of prod would apply to all repositories beginning with prod/. Similarly, a prefix of prod/team would apply to all repositories beginning with prod/team/. To apply a template to all repositories in your registry that don't have an associated creation template, you can use ROOT as the prefix. There is always an assumed / applied to the end of the prefix. If you specify ecr-public as the prefix, Amazon ECR treats that as ecr-public/. When using a pull through cache rule, the repository prefix you specify during rule creation is what you should specify as your repository creation template prefix as well.
                description:
                  $ref: "#/components/schemas/RepositoryTemplateDescription"
                  description: A description for the repository creation template.
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfigurationForRepositoryCreationTemplate"
                  description: The encryption configuration to use for repositories created using the template.
                resourceTags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata to apply to the repository to help you categorize and organize. Each tag consists of a key and an optional value, both of which you define. Tag keys can have a maximum character length of 128 characters, and tag values can have a maximum length of 256 characters.
                imageTagMutability:
                  $ref: "#/components/schemas/ImageTagMutability"
                  description: The tag mutability setting for the repository. If this parameter is omitted, the default setting of MUTABLE will be used which will allow image tags to be overwritten. If IMMUTABLE is specified, all image tags within the repository will be immutable which will prevent them from being overwritten.
                imageTagMutabilityExclusionFilters:
                  $ref: "#/components/schemas/ImageTagMutabilityExclusionFilters"
                  description: A list of filters that specify which image tags should be excluded from the repository creation template's image tag mutability setting.
                repositoryPolicy:
                  $ref: "#/components/schemas/RepositoryPolicyText"
                  description: The repository policy to apply to repositories created using the template. A repository policy is a permissions policy associated with a repository to control access permissions.
                lifecyclePolicy:
                  $ref: "#/components/schemas/LifecyclePolicyTextForRepositoryCreationTemplate"
                  description: The lifecycle policy to use for repositories created using the template.
                appliedFor:
                  $ref: "#/components/schemas/RCTAppliedForList"
                  description: A list of enumerable strings representing the Amazon ECR repository creation scenarios that this template will apply towards. The supported scenarios are PULL_THROUGH_CACHE, REPLICATION, and CREATE_ON_PUSH
                customRoleArn:
                  $ref: "#/components/schemas/CustomRoleArn"
                  description: The ARN of the role to be assumed by Amazon ECR. This role must be in the same account as the registry that you are configuring. Amazon ECR will assume your supplied role when the customRoleArn is specified. When this field isn't specified, Amazon ECR will use the service-linked role for the repository creation template.
              required:
                - prefix
                - appliedFor
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRepositoryCreationTemplateResponse"
  /DeleteLifecyclePolicy:
    post:
      operationId: DeleteLifecyclePolicy
      description: Deletes the lifecycle policy associated with the specified repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.DeleteLifecyclePolicy
            default: AmazonEC2ContainerRegistry_V20150921.DeleteLifecyclePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry that contains the repository. If you do not specify a registry, the default registry is assumed.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository.
              required:
                - repositoryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLifecyclePolicyResponse"
  /DeletePullThroughCacheRule:
    post:
      operationId: DeletePullThroughCacheRule
      description: Deletes a pull through cache rule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.DeletePullThroughCacheRule
            default: AmazonEC2ContainerRegistry_V20150921.DeletePullThroughCacheRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ecrRepositoryPrefix:
                  $ref: "#/components/schemas/PullThroughCacheRuleRepositoryPrefix"
                  description: The Amazon ECR repository prefix associated with the pull through cache rule to delete.
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry that contains the pull through cache rule. If you do not specify a registry, the default registry is assumed.
              required:
                - ecrRepositoryPrefix
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePullThroughCacheRuleResponse"
  /DeleteRegistryPolicy:
    post:
      operationId: DeleteRegistryPolicy
      description: Deletes the registry permissions policy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.DeleteRegistryPolicy
            default: AmazonEC2ContainerRegistry_V20150921.DeleteRegistryPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRegistryPolicyResponse"
  /DeleteRepository:
    post:
      operationId: DeleteRepository
      description: Deletes a repository. If the repository isn't empty, you must either delete the contents of the repository or use the force option to delete the repository and have Amazon ECR delete all of its contents on your behalf.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.DeleteRepository
            default: AmazonEC2ContainerRegistry_V20150921.DeleteRepository
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry that contains the repository to delete. If you do not specify a registry, the default registry is assumed.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository to delete.
                force:
                  $ref: "#/components/schemas/ForceFlag"
                  description: If true, deleting the repository force deletes the contents of the repository. If false, the repository must be empty before attempting to delete it.
              required:
                - repositoryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRepositoryResponse"
  /DeleteRepositoryCreationTemplate:
    post:
      operationId: DeleteRepositoryCreationTemplate
      description: Deletes a repository creation template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.DeleteRepositoryCreationTemplate
            default: AmazonEC2ContainerRegistry_V20150921.DeleteRepositoryCreationTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                prefix:
                  $ref: "#/components/schemas/Prefix"
                  description: The repository namespace prefix associated with the repository creation template.
              required:
                - prefix
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRepositoryCreationTemplateResponse"
  /DeleteRepositoryPolicy:
    post:
      operationId: DeleteRepositoryPolicy
      description: Deletes the repository policy associated with the specified repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.DeleteRepositoryPolicy
            default: AmazonEC2ContainerRegistry_V20150921.DeleteRepositoryPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry that contains the repository policy to delete. If you do not specify a registry, the default registry is assumed.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository that is associated with the repository policy to delete.
              required:
                - repositoryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRepositoryPolicyResponse"
  /DeleteSigningConfiguration:
    post:
      operationId: DeleteSigningConfiguration
      description: Deletes the registry's signing configuration. Images pushed after deletion of the signing configuration will no longer be automatically signed. For more information, see Managed signing in the Amazon Elastic Container Registry User Guide. Deleting the signing configuration does not affect existing image signatures.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.DeleteSigningConfiguration
            default: AmazonEC2ContainerRegistry_V20150921.DeleteSigningConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSigningConfigurationResponse"
  /DeregisterPullTimeUpdateExclusion:
    post:
      operationId: DeregisterPullTimeUpdateExclusion
      description: Removes a principal from the pull time update exclusion list for a registry. Once removed, Amazon ECR will resume updating the pull time if the specified principal pulls an image.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.DeregisterPullTimeUpdateExclusion
            default: AmazonEC2ContainerRegistry_V20150921.DeregisterPullTimeUpdateExclusion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                principalArn:
                  $ref: "#/components/schemas/PrincipalArn"
                  description: The ARN of the IAM principal to remove from the pull time update exclusion list.
              required:
                - principalArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterPullTimeUpdateExclusionResponse"
  /DescribeImageReplicationStatus:
    post:
      operationId: DescribeImageReplicationStatus
      description: Returns the replication status for a specified image.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerRegistry_V20150921.DescribeImageReplicationStatus
            default: AmazonEC2ContainerRegistry_V20150921.DescribeImageReplicationStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository that the image is in.
                imageId:
                  $ref: "#/components/schemas/ImageIdentifier"
                registryId:
                  $ref: "#/components/schemas/RegistryId"
                  description: The Amazon Web Services account ID associated with the registry. If you do not specify a registry, the default registry is assumed.
              required:
                - repositoryName
                - imageId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeImageReplicationStatusResponse"
  /DescribeImageScanFindings:
    post:
      operationId: DescribeImageScanFindings
      description: Returns the scan findings for the specified image.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
