components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    OrganizationId:
      type: string
      minLength: 34
      maxLength: 34
      pattern: ^m-[0-9a-f]{32}$
    EntityIdentifier:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9._%+@-]+"
    AssociateDelegateToResourceResponse:
      type: object
    AssociateMemberToGroupResponse:
      type: object
    ImpersonationRoleId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_-]+"
    AssumeImpersonationRoleResponse:
      type: object
      properties:
        Token:
          $ref: "#/components/schemas/ImpersonationToken"
          description: The authentication token for the impersonation role.
        ExpiresIn:
          $ref: "#/components/schemas/ExpiresIn"
          description: The authentication token's validity, in seconds.
    ImpersonationToken:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\x21-\\x7e]+"
    ExpiresIn:
      type: integer
      format: int64
    IdempotencyClientToken:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\x21-\\x7e]+"
    MailboxExportJobId:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[A-Za-z0-9-]+"
    CancelMailboxExportJobResponse:
      type: object
    WorkMailIdentifier:
      type: string
      minLength: 12
      maxLength: 256
    EmailAddress:
      type: string
      minLength: 1
      maxLength: 254
      pattern: "[a-zA-Z0-9._%+-]{1,64}@[a-zA-Z0-9.-]+\\.[a-zA-Z-]{2,}"
    CreateAliasResponse:
      type: object
    DomainName:
      type: string
      minLength: 3
      maxLength: 255
      pattern: "[a-zA-Z0-9.-]+"
    EwsAvailabilityProvider:
      description: Describes an EWS based availability provider. This is only used as input to the service.
      type: object
      properties:
        EwsEndpoint:
          $ref: "#/components/schemas/Url"
          description: The endpoint of the remote EWS server.
        EwsUsername:
          $ref: "#/components/schemas/ExternalUserName"
          description: The username used to authenticate the remote EWS server.
        EwsPassword:
          $ref: "#/components/schemas/Password"
          description: The password used to authenticate the remote EWS server.
      required:
        - EwsEndpoint
        - EwsUsername
        - EwsPassword
    Url:
      type: string
      maxLength: 256
      pattern: https?://[A-Za-z0-9.-]+(:[0-9]+)?/.*
    ExternalUserName:
      type: string
      maxLength: 256
      pattern: "[\\u0020-\\u00FF]+"
    Password:
      type: string
      maxLength: 256
      pattern: "[\\u0020-\\u00FF]+"
    LambdaAvailabilityProvider:
      description: Describes a Lambda based availability provider.
      type: object
      properties:
        LambdaArn:
          $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda that acts as the availability provider.
      required:
        - LambdaArn
    LambdaArn:
      type: string
      minLength: 49
      maxLength: 256
      pattern: arn:aws:lambda:[a-z]{2}-[a-z]+-\d{1}:\d{12}:function:[a-zA-Z0-9\-_\.]+(:(\$LATEST|[a-zA-Z0-9\-_]+))?
    CreateAvailabilityConfigurationResponse:
      type: object
    GroupName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\u0020-\\u00FF]+"
    Boolean:
      type: boolean
    CreateGroupResponse:
      type: object
      properties:
        GroupId:
          $ref: "#/components/schemas/WorkMailIdentifier"
          description: The identifier of the group.
    IdentityCenterApplicationName:
      type: string
      minLength: 0
      maxLength: 255
      pattern: ^[\w+=,.@-]+$
    InstanceArn:
      type: string
      minLength: 10
      maxLength: 1124
      pattern: ^arn:(aws|aws-us-gov|aws-cn|aws-iso|aws-iso-b):sso:::instance/(sso)?ins-[a-zA-Z0-9-.]{16}$
    CreateIdentityCenterApplicationResponse:
      type: object
      properties:
        ApplicationArn:
          $ref: "#/components/schemas/ApplicationArn"
          description: The Amazon Resource Name (ARN) of the application.
    ApplicationArn:
      type: string
      minLength: 10
      maxLength: 1224
      pattern: ^arn:(aws|aws-us-gov|aws-cn|aws-iso|aws-iso-b):sso::\d{12}:application/(sso)?ins-[a-zA-Z0-9-.]{16}/apl-[a-zA-Z0-9]{16}$
    ImpersonationRoleName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[^\\x00-\\x1F\\x7F\\x3C\\x3E\\x5C]+"
    ImpersonationRoleType:
      type: string
      enum:
        - FULL_ACCESS
        - READ_ONLY
    ImpersonationRoleDescription:
      type: string
