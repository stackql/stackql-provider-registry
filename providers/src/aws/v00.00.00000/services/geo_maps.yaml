openapi: 3.0.0
info:
  version: "2020-11-19"
  title: Amazon Location Service Maps V2
  description: Amazon Location Service Maps V2
  x-serviceName: geo-maps
  x-serviceAlias: geo_maps
  x-protocol: rest-json
  x-apiVersion: "2020-11-19"
  x-endpointPrefix: geo-maps
servers:
  - url: https://geo-maps.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for geo-maps
paths:
  /glyphs/{font_stack}/{font_unicode_range}:
    get:
      operationId: GetGlyphs
      description: GetGlyphs returns the map's glyphs. For more information, see Style labels with glyphs in the Amazon Location Service Developer Guide.
      parameters:
        - name: font_stack
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetGlyphsRequestFontStackString"
          description: "Name of the FontStack to retrieve. Example: Amazon Ember Bold,Noto Sans Bold. The supported font stacks are as follows: Amazon Ember Bold Amazon Ember Bold Italic Amazon Ember Bold,Noto Sans Bold Amazon Ember Bold,Noto Sans Bold,Noto Sans Arabic Bold Amazon Ember Condensed RC BdItalic Amazon Ember Condensed RC Bold Amazon Ember Condensed RC Bold Italic Amazon Ember Condensed RC Bold,Noto Sans Bold Amazon Ember Condensed RC Bold,Noto Sans Bold,Noto Sans Arabic Condensed Bold Amazon Ember Condensed RC Light Amazon Ember Condensed RC Light Italic Amazon Ember Condensed RC LtItalic Amazon Ember Condensed RC Regular Amazon Ember Condensed RC Regular Italic Amazon Ember Condensed RC Regular,Noto Sans Regular Amazon Ember Condensed RC Regular,Noto Sans Regular,Noto Sans Arabic Condensed Regular Amazon Ember Condensed RC RgItalic Amazon Ember Condensed RC ThItalic Amazon Ember Condensed RC Thin Amazon Ember Condensed RC Thin Italic Amazon Ember Heavy Amazon Ember Heavy Italic Amazon Ember Light Amazon Ember Light Italic Amazon Ember Medium Amazon Ember Medium Italic Amazon Ember Medium,Noto Sans Medium Amazon Ember Medium,Noto Sans Medium,Noto Sans Arabic Medium Amazon Ember Regular Amazon Ember Regular Italic Amazon Ember Regular Italic,Noto Sans Italic Amazon Ember Regular Italic,Noto Sans Italic,Noto Sans Arabic Regular Amazon Ember Regular,Noto Sans Regular Amazon Ember Regular,Noto Sans Regular,Noto Sans Arabic Regular Amazon Ember Thin Amazon Ember Thin Italic AmazonEmberCdRC_Bd AmazonEmberCdRC_BdIt AmazonEmberCdRC_Lt AmazonEmberCdRC_LtIt AmazonEmberCdRC_Rg AmazonEmberCdRC_RgIt AmazonEmberCdRC_Th AmazonEmberCdRC_ThIt AmazonEmber_Bd AmazonEmber_BdIt AmazonEmber_He AmazonEmber_HeIt AmazonEmber_Lt AmazonEmber_LtIt AmazonEmber_Md AmazonEmber_MdIt AmazonEmber_Rg AmazonEmber_RgIt AmazonEmber_Th AmazonEmber_ThIt Noto Sans Black Noto Sans Black Italic Noto Sans Bold Noto Sans Bold Italic Noto Sans Extra Bold Noto Sans Extra Bold Italic Noto Sans Extra Light Noto Sans Extra Light Italic Noto Sans Italic Noto Sans Light Noto Sans Light Italic Noto Sans Medium Noto Sans Medium Italic Noto Sans Regular Noto Sans Semi Bold Noto Sans Semi Bold Italic Noto Sans Thin Noto Sans Thin Italic NotoSans-Bold NotoSans-Italic NotoSans-Medium NotoSans-Regular Open Sans Regular,Arial Unicode MS Regular"
        - name: font_unicode_range
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetGlyphsRequestFontUnicodeRangeString"
          description: "A Unicode range of characters to download glyphs for. This must be aligned to multiples of 256. Example: 0-255.pbf"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGlyphsResponse"
  /styles/{style}/{color_scheme}/{variant}/sprites/{file_name}:
    get:
      operationId: GetSprites
      description: GetSprites returns the map's sprites. For more information, see Style iconography with sprites in the Amazon Location Service Developer Guide.
      parameters:
        - name: file_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetSpritesRequestFileNameString"
          description: "Sprites API: The name of the sprite ﬁle to retrieve, following pattern sprites(@2x)?\\.(png|json). Example: sprites.png"
        - name: style
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MapStyle"
          description: Style specifies the desired map style for the Sprites APIs.
        - name: color_scheme
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ColorScheme"
          description: "Sets the color tone for the map sprites, such as dark and light. Example: Light Default value: Light Valid values for ColorScheme are case sensitive."
        - name: variant
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Variant"
          description: "Optimizes map styles for specific use case or industry. You can choose allowed variant only with Standard map style. Example: Default Valid values for Variant are case sensitive."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSpritesResponse"
  /static/{file_name}:
    get:
      operationId: GetStaticMap
      description: "This operation is not supported in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. GetStaticMap provides high-quality static map images with customizable options. You can modify the map's appearance and overlay additional information. It's an ideal solution for applications requiring tailored static map snapshots. For more information, see the following topics in the Amazon Location Service Developer Guide: Static maps Customize static maps Overlay on the static map"
      parameters:
        - name: bounding-box
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetStaticMapRequestBoundingBoxString"
          description: "Takes in two pairs of coordinates in World Geodetic System (WGS 84) format: [longitude, latitude], denoting south-westerly and north-easterly edges of the image. The underlying area becomes the view of the image. Example: -123.17075,49.26959,-123.08125,49.31429"
        - name: bounded-positions
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetStaticMapRequestBoundedPositionsString"
          description: "Takes in two or more pair of coordinates in World Geodetic System (WGS 84) format: [longitude, latitude], with each coordinate separated by a comma. The API will generate an image to encompass all of the provided coordinates. Cannot be used with Zoom and or Radius Example: 97.170451,78.039098,99.045536,27.176178"
        - name: center
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PositionString"
          description: "Takes in a pair of coordinates in World Geodetic System (WGS 84) format: [longitude, latitude], which becomes the center point of the image. This parameter requires that either zoom or radius is set. Cannot be used with Zoom and or Radius Example: 49.295,-123.108"
        - name: color-scheme
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ColorScheme"
          description: "Sets the color tone for the map, such as dark and light. Example: Light Default value: Light Valid values for ColorScheme are case sensitive."
        - name: compact-overlay
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CompactOverlay"
          description: "Takes in a string to draw geometries on the image. The input is a comma separated format as follows format: [Lon, Lat] Example: line:-122.407653,37.798557,-122.413291,37.802443;color=%23DD0000;width=7;outline-color=#00DD00;outline-width=5yd|point:-122.40572,37.80004;label=Fog Hill Market;size=large;text-color=%23DD0000;color=#EE4B2B Currently it supports the following geometry types: point, line and polygon. It does not support multiPoint , multiLine and multiPolgyon."
        - name: crop-labels
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: It is a flag that takes in true or false. It prevents the labels that are on the edge of the image from being cut or obscured.
        - name: geojson-overlay
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GeoJsonOverlay"
          description: 'Takes in a string to draw geometries on the image. The input is a valid GeoJSON collection object. Example: {"type":"FeatureCollection","features": [{"type":"Feature","geometry":{"type":"MultiPoint","coordinates": [[-90.076345,51.504107],[-0.074451,51.506892]]},"properties": {"color":"#00DD00"}}]}'
        - name: height
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/GetStaticMapRequestHeightInteger"
          description: Specifies the height of the map image.
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
        - name: label-size
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LabelSize"
          description: Overrides the label size auto-calculated by FileName. Takes in one of the values - Small or Large.
        - name: lang
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LanguageTag"
          description: "Specifies the language on the map labels using the BCP 47 language tag, limited to ISO 639-1 two-letter language codes. If the specified language data isn't available for the map image, the labels will default to the regional primary language. Supported codes: ar as az be bg bn bs ca cs cy da de el en es et eu fi fo fr ga gl gn gu he hi hr hu hy id is it ja ka kk km kn ko ky lt lv mk ml mr ms mt my nl no or pa pl pt ro ru sk sl sq sr sv ta te th tr uk uz vi zh"
        - name: padding
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetStaticMapRequestPaddingInteger"
          description: "Applies additional space (in pixels) around overlay feature to prevent them from being cut or obscured. Value for max and min is determined by: Min: 1 Max: min(height, width)/4 Example: 100"
        - name: political-view
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CountryCode"
          description: "Specifies the political view, using ISO 3166-2 or ISO 3166-3 country code format. The following political views are currently supported: ARG: Argentina's view on the Southern Patagonian Ice Field and Tierra Del Fuego, including the Falkland Islands, South Georgia, and South Sandwich Islands EGY: Egypt's view on Bir Tawil IND: India's view on Gilgit-Baltistan KEN: Kenya's view on the Ilemi Triangle MAR: Morocco's view on Western Sahara RUS: Russia's view on Crimea SDN: Sudan's view on the Halaib Triangle SRB: Serbia's view on Kosovo, Vukovar, and Sarengrad Islands SUR: Suriname's view on the Courantyne Headwaters and Lawa Headwaters SYR: Syria's view on the Golan Heights TUR: Turkey's view on Cyprus and Northern Cyprus TZA: Tanzania's view on Lake Malawi URY: Uruguay's view on Rincon de Artigas VNM: Vietnam's view on the Paracel Islands and Spratly Islands"
        - name: pois
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MapFeatureMode"
          description: Determines if the result image will display icons representing points of interest on the map.
        - name: radius
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DistanceMeters"
          description: "Used with center parameter, it specifies the zoom of the image where you can control it on a granular level. Takes in any value >= 1. Example: 1500 Cannot be used with Zoom. Unit: Meters"
        - name: file_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetStaticMapRequestFileNameString"
          description: "The map scaling parameter to size the image, icons, and labels. It follows the pattern of ^map(@2x)?$. Example: map, map@2x"
        - name: scale-unit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ScaleBarUnit"
          description: "Displays a scale on the bottom right of the map image with the unit specified in the input. Example: KilometersMiles, Miles, Kilometers, MilesKilometers"
        - name: style
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StaticMapStyle"
          description: Style specifies the desired map style.
        - name: width
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/GetStaticMapRequestWidthInteger"
          description: Specifies the width of the map image.
        - name: zoom
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetStaticMapRequestZoomFloat"
          description: Specifies the zoom level of the map image. Cannot be used with Radius.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStaticMapResponse"
  /styles/{style}/descriptor:
    get:
      operationId: GetStyleDescriptor
      description: GetStyleDescriptor returns information about the style. For more information, see Style dynamic maps in the Amazon Location Service Developer Guide.
      parameters:
        - name: style
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MapStyle"
          description: Style specifies the desired map style. For GrabMaps customers, ap-southeast-1 and ap-southeast-5 regions support only the Standard and Monochrome values.
        - name: color-scheme
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ColorScheme"
          description: "Sets the color tone for the map, such as dark and light. Example: Light Default value: Light Valid values for ColorScheme are case sensitive."
        - name: political-view
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CountryCode"
          description: "Specifies the political view using ISO 3166-2 or ISO 3166-3 country code format. Not supported in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. The following political views are currently supported: ARG: Argentina's view on the Southern Patagonian Ice Field and Tierra Del Fuego, including the Falkland Islands, South Georgia, and South Sandwich Islands EGY: Egypt's view on Bir Tawil IND: India's view on Gilgit-Baltistan KEN: Kenya's view on the Ilemi Triangle MAR: Morocco's view on Western Sahara RUS: Russia's view on Crimea SDN: Sudan's view on the Halaib Triangle SRB: Serbia's view on Kosovo, Vukovar, and Sarengrad Islands SUR: Suriname's view on the Courantyne Headwaters and Lawa Headwaters SYR: Syria's view on the Golan Heights TUR: Turkey's view on Cyprus and Northern Cyprus TZA: Tanzania's view on Lake Malawi URY: Uruguay's view on Rincon de Artigas VNM: Vietnam's view on the Paracel Islands and Spratly Islands"
        - name: terrain
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Terrain"
          description: "Adjusts how physical terrain details are rendered on the map. Not supported in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. The following terrain styles are currently supported: Hillshade: Displays the physical terrain details through shading and highlighting of elevation change and geographic features. Terrain3D: Displays physical terrain details and elevations as a three-dimensional model. Hillshade is valid only for the Standard and Monochrome map styles."
        - name: contour-density
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ContourDensity"
          description: Displays the shape and steepness of terrain features using elevation lines. The density value controls how densely the available contour line information is rendered on the map. Not supported in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. This parameter is valid for all map styles except Satellite.
        - name: traffic
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Traffic"
          description: Displays real-time traffic information overlay on map, such as incident events and flow events. Not supported in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. This parameter is valid for all map styles except Satellite.
        - name: travel-modes
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TravelModeList"
          description: Renders additional map information relevant to selected travel modes. Information for multiple travel modes can be displayed simultaneously, although this increases the overall information density rendered on the map. Not supported in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. This parameter is valid for all map styles except Satellite.
        - name: buildings
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Buildings"
          description: "Adjusts how building details are rendered on the map. The following building styles are currently supported: Buildings3D: Displays buildings as three-dimensional extrusions on the map. Buildings3D is valid only for the Standard and Monochrome map styles."
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStyleDescriptorResponse"
  /tiles/{tileset}/{z}/{x}/{y}:
    get:
      operationId: GetTile
      description: GetTile returns a tile. Map tiles are used by clients to render a map. They're addressed using a grid arrangement with an X coordinate, Y coordinate, and Z (zoom) level. For more information, see Tiles in the Amazon Location Service Developer Guide.
      parameters:
        - name: additional-features
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TileAdditionalFeatureList"
          description: A list of optional additional parameters such as map styles that can be requested for each result. Not supported in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers.
        - name: tileset
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tileset"
          description: "Specifies the desired tile set. For GrabMaps customers, ap-southeast-1 and ap-southeast-5 regions support only the vector.basemap value. Valid Values: raster.satellite | vector.basemap | vector.traffic | raster.dem"
        - name: z
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetTileRequestZString"
          description: The zoom value for the map tile.
        - name: x
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetTileRequestXString"
          description: The X axis value for the map tile.
        - name: "y"
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetTileRequestYString"
          description: The Y axis value for the map tile.
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTileResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GetGlyphsRequestFontStackString:
      type: string
      minLength: 0
      maxLength: 1000
    GetGlyphsRequestFontUnicodeRangeString:
      type: string
      minLength: 0
      maxLength: 50
      pattern: "[0-9]+-[0-9]+\\.pbf"
    GetGlyphsResponse:
      type: object
      properties:
        Blob:
          $ref: "#/components/schemas/Blob"
          description: The Glyph, as a binary blob.
        ContentType:
          $ref: "#/components/schemas/String"
          description: Header that represents the format of the response. The response returns the following as the HTTP body.
        CacheControl:
          $ref: "#/components/schemas/String"
          description: Header that instructs caching configuration for the client.
        ETag:
          $ref: "#/components/schemas/String"
          description: The glyph's Etag.
    Blob:
      type: string
      format: byte
    String:
      type: string
    GetSpritesRequestFileNameString:
      type: string
      pattern: sprites(@2x)?\.(png|json)
    MapStyle:
      type: string
      enum:
        - Standard
        - Monochrome
        - Hybrid
        - Satellite
    ColorScheme:
      type: string
      enum:
        - Light
        - Dark
    Variant:
      type: string
      enum:
        - Default
    GetSpritesResponse:
      type: object
      properties:
        Blob:
          $ref: "#/components/schemas/Blob"
          description: The body of the sprite sheet or JSON offset file (image/png or application/json, depending on input).
        ContentType:
          $ref: "#/components/schemas/String"
          description: Header that represents the format of the response. The response returns the following as the HTTP body.
        CacheControl:
          $ref: "#/components/schemas/String"
          description: Header that instructs caching configuration for the client.
        ETag:
          $ref: "#/components/schemas/String"
          description: The sprite's Etag.
    GetStaticMapRequestBoundingBoxString:
      type: string
      minLength: 0
      maxLength: 100
      pattern: (-?\d{1,3}(\.\d{1,14})?,-?\d{1,2}(\.\d{1,14})?)(,(-?\d{1,3}(\.\d{1,14})?,-?\d{1,2}(\.\d{1,14})?))*
    GetStaticMapRequestBoundedPositionsString:
      type: string
      minLength: 0
      maxLength: 5000
      pattern: (-?\d{1,3}(\.\d{1,14})?,-?\d{1,2}(\.\d{1,14})?)(,(-?\d{1,3}(\.\d{1,14})?,-?\d{1,2}(\.\d{1,14})?))*
    PositionString:
      type: string
      minLength: 3
      maxLength: 36
      pattern: -?\d{1,3}(\.\d{1,14})?,-?\d{1,2}(\.\d{1,14})?
    CompactOverlay:
      type: string
      minLength: 1
      maxLength: 5000
    Boolean:
      type: boolean
    GeoJsonOverlay:
      type: string
      minLength: 1
      maxLength: 4200
    GetStaticMapRequestHeightInteger:
      type: integer
      minimum: 64
      maximum: 1400
    ApiKey:
      type: string
      minLength: 0
      maxLength: 1000
    LabelSize:
      type: string
      enum:
        - Small
        - Large
    LanguageTag:
      type: string
      minLength: 2
      maxLength: 35
    GetStaticMapRequestPaddingInteger:
      type: integer
      minimum: 0
      maximum: 350
    CountryCode:
      type: string
      minLength: 2
      maxLength: 3
      pattern: ([A-Z]{2}|[A-Z]{3})
    MapFeatureMode:
      type: string
      enum:
        - Enabled
        - Disabled
    DistanceMeters:
      type: integer
      format: int64
      minimum: 0
      maximum: 4294967295
    GetStaticMapRequestFileNameString:
      type: string
      pattern: map(@2x)?
    ScaleBarUnit:
      type: string
      enum:
        - Kilometers
        - KilometersMiles
        - Miles
        - MilesKilometers
    StaticMapStyle:
      type: string
      enum:
        - Satellite
        - Standard
    GetStaticMapRequestWidthInteger:
      type: integer
      minimum: 64
      maximum: 1400
    GetStaticMapRequestZoomFloat:
      type: number
      format: float
      minimum: 0
      maximum: 20
    GetStaticMapResponse:
      type: object
      properties:
        Blob:
          $ref: "#/components/schemas/Blob"
          description: The blob represents a map image as a jpeg for the GetStaticMap API.
        ContentType:
          $ref: "#/components/schemas/String"
          description: Header that represents the format of the response. The response returns the following as the HTTP body.
        CacheControl:
          $ref: "#/components/schemas/String"
          description: Header that instructs caching configuration for the client.
        ETag:
          $ref: "#/components/schemas/String"
          description: The static map's Etag.
        PricingBucket:
          $ref: "#/components/schemas/String"
          description: The pricing bucket for which the request is charged at.
      required:
        - PricingBucket
    Terrain:
      type: string
      enum:
        - Hillshade
        - Terrain3D
    ContourDensity:
      type: string
      enum:
        - Low
        - Medium
        - High
    Traffic:
      type: string
      enum:
        - All
        - Congestion
    TravelModeList:
      type: array
      items:
        $ref: "#/components/schemas/TravelMode"
    TravelMode:
      type: string
      enum:
        - Transit
        - Truck
    Buildings:
      type: string
      enum:
        - Buildings3D
    GetStyleDescriptorResponse:
      type: object
      properties:
        Blob:
          $ref: "#/components/schemas/Blob"
          description: This Blob contains the body of the style descriptor which is in application/json format.
        ContentType:
          $ref: "#/components/schemas/String"
          description: Header that represents the format of the response. The response returns the following as the HTTP body.
        CacheControl:
          $ref: "#/components/schemas/String"
          description: Header that instructs caching configuration for the client.
        ETag:
          $ref: "#/components/schemas/String"
          description: The style descriptor's Etag.
    TileAdditionalFeatureList:
      type: array
      items:
        $ref: "#/components/schemas/TileAdditionalFeature"
    TileAdditionalFeature:
      type: string
      enum:
        - ContourLines
        - Hillshade
        - Logistics
        - Transit
    Tileset:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[-.\\w]+"
    GetTileRequestZString:
      type: string
      minLength: 0
      maxLength: 2
      pattern: .*\d+.*
    GetTileRequestXString:
      type: string
      minLength: 0
      maxLength: 7
      pattern: .*\d+.*
    GetTileRequestYString:
      type: string
      minLength: 0
      maxLength: 7
      pattern: .*\d+.*
    GetTileResponse:
      type: object
      properties:
        Blob:
          $ref: "#/components/schemas/Blob"
          description: The blob represents a vector tile in mvt or a raster tile in an image format.
        ContentType:
          $ref: "#/components/schemas/String"
