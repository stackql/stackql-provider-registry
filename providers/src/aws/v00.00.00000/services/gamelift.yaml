              schema:
                $ref: "#/components/schemas/DeleteVpcPeeringAuthorizationOutput"
  /DeleteVpcPeeringConnection:
    post:
      operationId: DeleteVpcPeeringConnection
      description: "This API works with the following fleet types: EC2 Removes a VPC peering connection. To delete the connection, you must have a valid authorization for the VPC peering connection that you want to delete.. Once a valid authorization exists, call this operation from the Amazon Web Services account that is used to manage the Amazon GameLift Servers fleets. Identify the connection to delete by the connection ID and fleet ID. If successful, the connection is removed. Related actions All APIs by task"
      parameters:
