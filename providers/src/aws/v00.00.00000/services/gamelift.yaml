            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet that the compute is registered to.
                ComputeName:
                  $ref: "#/components/schemas/ComputeNameOrArn"
                  description: The name of the compute resource you are requesting the authentication token for. For an Anywhere fleet compute, use the registered compute name. For an EC2 fleet instance, use the instance ID.
              required:
