        Build:
          $ref: "#/components/schemas/Build"
          description: Set of properties describing the requested build.
    DescribeComputeOutput:
      type: object
      properties:
        Compute:
          $ref: "#/components/schemas/Compute"
          description: The set of properties for the requested compute resource.
    Compute:
      description: "An Amazon GameLift Servers compute resource for hosting your game servers. Computes in an Amazon GameLift Servers fleet differs depending on the fleet's compute type property as follows: For managed EC2 fleets, a compute is an EC2 instance. For Anywhere fleets, a compute is a computing resource that you provide and is registered to the fleet."
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet that the compute belongs to.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) of the fleet that the compute belongs to.
        ComputeName:
          $ref: "#/components/schemas/ComputeName"
          description: A descriptive label for the compute resource. For instances in a managed EC2 fleet, the compute name is the same value as the InstanceId ID.
        ComputeArn:
          $ref: "#/components/schemas/ComputeArn"
          description: The ARN that is assigned to a compute resource and uniquely identifies it. ARNs are unique across locations. Instances in managed EC2 fleets are not assigned a Compute ARN.
        IpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address of a compute resource. Amazon GameLift Servers requires a DNS name or IP address for a compute.
        DnsName:
          $ref: "#/components/schemas/DnsName"
          description: The DNS name of a compute resource. Amazon GameLift Servers requires a DNS name or IP address for a compute.
        ComputeStatus:
          $ref: "#/components/schemas/ComputeStatus"
          description: Current status of the compute. A compute must have an ACTIVE status to host game sessions. Valid values include PENDING, ACTIVE, TERMINATING, and IMPAIRED. While the ComputeStatus enum type is valid for Container based servers, the result may also include other non-enumerated string values such as "Active" for fleets which are not Container-based.
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: The name of the custom location you added to the fleet that this compute resource resides in.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        OperatingSystem:
          $ref: "#/components/schemas/OperatingSystem"
          description: The type of operating system on the compute resource. Amazon Linux 2 (AL2) will reach end of support on 6/30/2026. See more details in the Amazon Linux 2 FAQs. For game servers that are hosted on AL2 and use server SDK version 4.x for Amazon GameLift Servers, first update the game server build to server SDK 5.x, and then deploy to AL2023 instances. See Migrate to server SDK version 5.
        Type:
          $ref: "#/components/schemas/EC2InstanceType"
          description: The Amazon EC2 instance type that the fleet uses. For registered computes in an Amazon GameLift Servers Anywhere fleet, this property is empty.
        GameLiftServiceSdkEndpoint:
          $ref: "#/components/schemas/GameLiftServiceSdkEndpointOutput"
          description: The Amazon GameLift Servers SDK endpoint connection for a registered compute resource in an Anywhere fleet. The game servers on the compute use this endpoint to connect to the Amazon GameLift Servers service.
        GameLiftAgentEndpoint:
          $ref: "#/components/schemas/GameLiftAgentEndpointOutput"
          description: The endpoint of the Amazon GameLift Servers Agent.
        InstanceId:
          $ref: "#/components/schemas/InstanceId"
          description: The InstanceID of the EC2 instance that is hosting the compute.
        ContainerAttributes:
          $ref: "#/components/schemas/ContainerAttributes"
          description: A set of attributes for each container in the compute.
        GameServerContainerGroupDefinitionArn:
          $ref: "#/components/schemas/ContainerGroupDefinitionNameOrArn"
          description: The game server container group definition for the compute.
    ComputeArn:
      type: string
      maxLength: 1024
      pattern: ^arn:.*:compute\/[a-zA-Z0-9\-]+(\/[a-zA-Z0-9\-]+)?
    ComputeStatus:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - TERMINATING
        - IMPAIRED
    GameLiftServiceSdkEndpointOutput:
      type: string
      minLength: 1
      maxLength: 128
    GameLiftAgentEndpointOutput:
      type: string
      minLength: 1
      maxLength: 128
    InstanceId:
      type: string
      pattern: "[a-zA-Z0-9\\.-]+"
    ContainerAttributes:
      type: array
      items:
        $ref: "#/components/schemas/ContainerAttribute"
    ContainerAttribute:
      description: "A unique identifier for a container in a container fleet compute. Returned by: DescribeCompute"
      type: object
      properties:
        ContainerName:
          $ref: "#/components/schemas/NonZeroAnd128MaxAsciiString"
          description: The identifier for a container that's running in a compute.
        ContainerRuntimeId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The runtime ID for the container that's running in a compute. This value is unique within the compute.
    DescribeContainerFleetOutput:
      type: object
      properties:
        ContainerFleet:
          $ref: "#/components/schemas/ContainerFleet"
          description: The properties for the requested container fleet, including current status.
    DescribeContainerGroupDefinitionOutput:
      type: object
      properties:
        ContainerGroupDefinition:
          $ref: "#/components/schemas/ContainerGroupDefinition"
          description: The properties of the requested container group definition resource.
    DescribeContainerGroupPortMappingsOutput:
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the container fleet.
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: The location of the fleet instance, expressed as an Amazon Web Services Region code, such as us-west-2.
        ContainerGroupDefinitionArn:
          $ref: "#/components/schemas/ContainerGroupDefinitionArn"
          description: The Amazon Resource Name (ARN) that is assigned to the container group definition. The ARN value also identifies the specific container group definition version in use.
        ContainerGroupType:
          $ref: "#/components/schemas/ContainerGroupType"
          description: The type of container group that was specified in the request. Valid values are GAME_SERVER or PER_INSTANCE.
        ComputeName:
          $ref: "#/components/schemas/ComputeName"
          description: A unique identifier for the compute resource running the game server container group. Returned when ContainerGroupType is GAME_SERVER.
        InstanceId:
          $ref: "#/components/schemas/InstanceId"
          description: A unique identifier for the fleet instance. For GAME_SERVER requests, this is the instance running the specified compute. For PER_INSTANCE requests, this is the instance specified in the request.
        ContainerGroupPortMappings:
          $ref: "#/components/schemas/ContainerGroupPortMappingList"
          description: A list of ContainerGroupPortMapping objects that describe the port mappings for each container in the container group.
    ContainerGroupPortMappingList:
      type: array
      items:
        $ref: "#/components/schemas/ContainerGroupPortMapping"
    ContainerGroupPortMapping:
      description: "Describes the port mappings for a single container in a container group. Each mapping shows how a container port maps to a connection port on the fleet instance. Returned by: DescribeContainerGroupPortMappings"
      type: object
      properties:
        ContainerName:
          $ref: "#/components/schemas/NonZeroAnd128MaxAsciiString"
          description: The name of the container, as defined in the container group definition.
        ContainerRuntimeId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The runtime ID for the container that's running in a compute. This value is unique within the compute.
        ContainerPortMappings:
          $ref: "#/components/schemas/ContainerPortMappingList"
          description: A list of ContainerPortMapping objects that describe the port mappings for this container.
    ContainerPortMappingList:
      type: array
      items:
        $ref: "#/components/schemas/ContainerPortMapping"
    ContainerPortMapping:
      description: "Describes a mapping between a container port and a connection port on a fleet instance. You define container ports in a container group definition. Amazon GameLift Servers assigns connection ports when it deploys the container group to an instance. Part of: ContainerGroupPortMapping"
      type: object
      properties:
        ContainerPort:
          $ref: "#/components/schemas/PortNumber"
          description: The port number on the container. This port is defined in the container group definition. Container port numbers must be unique within a container group definition.
        ConnectionPort:
          $ref: "#/components/schemas/PortNumber"
          description: The port number on the fleet instance that maps to the container port. Connection ports are assigned by Amazon GameLift Servers when the container group is deployed to an instance.
        Protocol:
          $ref: "#/components/schemas/IpProtocol"
          description: The network protocol for the port mapping. Valid values are TCP or UDP.
    DescribeEC2InstanceLimitsOutput:
      type: object
      properties:
        EC2InstanceLimits:
          $ref: "#/components/schemas/EC2InstanceLimitList"
          description: The maximum number of instances for the specified instance type.
    EC2InstanceLimitList:
      type: array
      items:
        $ref: "#/components/schemas/EC2InstanceLimit"
    EC2InstanceLimit:
      description: The Amazon GameLift Servers service limits for an Amazon EC2 instance type and current utilization. Amazon GameLift Servers allows Amazon Web Services accounts a maximum number of instances, per instance type, per Amazon Web Services Region or location, for use with Amazon GameLift Servers. You can request an limit increase for your account by using the Service limits page in the Amazon GameLift Servers console.
      type: object
      properties:
        EC2InstanceType:
          $ref: "#/components/schemas/EC2InstanceType"
          description: The name of an Amazon EC2 instance type. See Amazon Elastic Compute Cloud Instance Types for detailed descriptions.
        CurrentInstances:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of instances for the specified type and location that are currently being used by the Amazon Web Services account.
        InstanceLimit:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of instances that is allowed for the specified instance type and location.
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: An Amazon Web Services Region code, such as us-west-2.
    FleetIdOrArnList:
      type: array
      items:
        $ref: "#/components/schemas/FleetIdOrArn"
    DescribeFleetAttributesOutput:
      type: object
      properties:
        FleetAttributes:
          $ref: "#/components/schemas/FleetAttributesList"
          description: A collection of objects containing attribute metadata for each requested fleet ID. Attribute objects are returned only for fleets that currently exist.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    FleetAttributesList:
      type: array
      items:
        $ref: "#/components/schemas/FleetAttributes"
    DescribeFleetCapacityOutput:
      type: object
      properties:
        FleetCapacity:
          $ref: "#/components/schemas/FleetCapacityList"
          description: A collection of objects that contains capacity information for each requested fleet ID. Capacity objects are returned only for fleets that currently exist. Changes in desired instance value can take up to 1 minute to be reflected.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    FleetCapacityList:
      type: array
      items:
        $ref: "#/components/schemas/FleetCapacity"
    FleetCapacity:
      description: "Current resource capacity settings for managed EC2 fleets and managed container fleets. For multi-location fleets, location values might refer to a fleet's remote location or its home Region. Returned by: DescribeFleetCapacity, DescribeFleetLocationCapacity, UpdateFleetCapacity"
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet associated with the location.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        InstanceType:
          $ref: "#/components/schemas/EC2InstanceType"
          description: The Amazon EC2 instance type that is used for instances in a fleet. Instance type determines the computing resources in use, including CPU, memory, storage, and networking capacity. See Amazon Elastic Compute Cloud Instance Types for detailed descriptions.
        InstanceCounts:
          $ref: "#/components/schemas/EC2InstanceCounts"
          description: The current number of instances in the fleet, listed by instance status. Counts for pending and terminating instances might be non-zero if the fleet is adjusting to a scaling event or if access to resources is temporarily affected.
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: The fleet location for the instance count information, expressed as an Amazon Web Services Region code, such as us-west-2.
        GameServerContainerGroupCounts:
          $ref: "#/components/schemas/GameServerContainerGroupCounts"
          description: The number and status of game server container groups deployed in a container fleet.
        ManagedCapacityConfiguration:
          $ref: "#/components/schemas/ManagedCapacityConfiguration"
          description: Configuration settings for managed capacity scaling.
    EC2InstanceCounts:
      description: Resource capacity settings. Fleet capacity is measured in Amazon EC2 instances. Pending and terminating counts are non-zero when the fleet capacity is adjusting to a scaling event or if access to resources is temporarily affected.
      type: object
      properties:
        DESIRED:
          $ref: "#/components/schemas/WholeNumber"
          description: Requested number of active instances. Amazon GameLift Servers takes action as needed to maintain the desired number of instances. Capacity is scaled up or down by changing the desired instances. A change in the desired instances value can take up to 1 minute to be reflected when viewing a fleet's capacity settings.
        MINIMUM:
          $ref: "#/components/schemas/WholeNumber"
          description: The minimum instance count value allowed.
        MAXIMUM:
          $ref: "#/components/schemas/WholeNumber"
          description: The maximum instance count value allowed.
        PENDING:
          $ref: "#/components/schemas/WholeNumber"
          description: Number of instances that are starting but not yet active.
        ACTIVE:
          $ref: "#/components/schemas/WholeNumber"
          description: Actual number of instances that are ready to host game sessions.
        IDLE:
          $ref: "#/components/schemas/WholeNumber"
          description: Number of active instances that are not currently hosting a game session.
        TERMINATING:
          $ref: "#/components/schemas/WholeNumber"
          description: Number of instances that are no longer active but haven't yet been terminated.
    GameServerContainerGroupCounts:
      description: "The number and status of game server container groups that are deployed across a container fleet. Combine this count with the number of server processes that each game server container group runs to learn how many game sessions the fleet is capable of hosting concurrently. For example, if a fleet has 50 game server container groups, and the game server container in each group runs 1 game server process, then the fleet has the capacity to run host 50 game sessions at a time. Returned by: https://docs.aws.amazon.com/gamelift/latest/apireference/API_DescribeFleetCapacity.html, https://docs.aws.amazon.com/gamelift/latest/apireference/API_DescribeFleetLocationCapacity.html"
      type: object
      properties:
        PENDING:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of container groups that are starting up but haven't yet registered.
        ACTIVE:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of container groups that have active game sessions.
        IDLE:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of container groups that have no active game sessions.
        TERMINATING:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of container groups that are in the process of shutting down.
    ManagedCapacityConfiguration:
      description: Use ManagedCapacityConfiguration with the "SCALE_TO_AND_FROM_ZERO" ZeroCapacityStrategy to enable Amazon GameLift Servers to fully manage the MinSize value, switching between 0 and 1 based on game session activity. This is ideal for eliminating compute costs during periods of no game activity. It is particularly beneficial during development when you're away from your desk, iterating on builds for extended periods, in production environments serving low-traffic locations, or for games with long, predictable downtime windows. By automatically managing capacity between 0 and 1 instances, you avoid paying for idle instances while maintaining the ability to serve game sessions when demand arrives. Note that while scale-out is triggered immediately upon receiving a game session request, actual game session availability depends on your server process startup time, so this approach works best with multi-location Fleets where cold-start latency is tolerable. With a "MANUAL" ZeroCapacityStrategy Amazon GameLift Servers will not modify Fleet MinSize values automatically and will not scale out from zero instances in response to game sessions.
      type: object
      properties:
        ZeroCapacityStrategy:
          $ref: "#/components/schemas/ZeroCapacityStrategy"
          description: "The strategy Amazon GameLift Servers will use to automatically scale your capacity to and from zero instances in response to game session activity. Game session activity refers to any active running sessions or game session requests. Possible ZeroCapacityStrategy types include: MANUAL -- (default value) Amazon GameLift Servers will not update capacity to and from zero on your behalf. SCALE_TO_AND_FROM_ZERO -- Amazon GameLift Servers will automatically scale out MinSize and DesiredInstances from 0 to 1 in response to a game session request, and will scale in MinSize and DesiredInstances to 0 after a period with no game session activity. The duration of this scale in period can be configured using ScaleInAfterInactivityMinutes."
        ScaleInAfterInactivityMinutes:
          $ref: "#/components/schemas/ScaleInAfterInactivityMinutes"
          description: "Length of time, in minutes, that Amazon GameLift Servers will wait before scaling in your MinSize and DesiredInstances to 0 after a period with no game session activity. Default: 30 minutes."
    ZeroCapacityStrategy:
      type: string
      enum:
        - MANUAL
        - SCALE_TO_AND_FROM_ZERO
    ScaleInAfterInactivityMinutes:
      type: integer
      minimum: 5
      maximum: 1440
    DescribeFleetDeploymentOutput:
      type: object
      properties:
        FleetDeployment:
          $ref: "#/components/schemas/FleetDeployment"
          description: The requested deployment information.
        LocationalDeployments:
          type: object
          properties: {}
          description: If the deployment is for a multi-location fleet, the requests returns the deployment status in each fleet location.
    FleetDeployment:
      description: Describes a container fleet deployment with updates to the fleet.
      type: object
      properties:
        DeploymentId:
          $ref: "#/components/schemas/DeploymentId"
          description: A unique identifier for the deployment.
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the container fleet.
        GameServerBinaryArn:
          $ref: "#/components/schemas/FleetBinaryArn"
          description: The unique identifier for the version of the game server container group definition that is being deployed.
        RollbackGameServerBinaryArn:
          $ref: "#/components/schemas/FleetBinaryArn"
          description: The unique identifier for the version of the game server container group definition to roll back to if deployment fails. Amazon GameLift Servers sets this property to the container group definition version that the fleet used when it was last active.
        PerInstanceBinaryArn:
          $ref: "#/components/schemas/FleetBinaryArn"
          description: The unique identifier for the version of the per-instance container group definition that is being deployed.
        RollbackPerInstanceBinaryArn:
          $ref: "#/components/schemas/FleetBinaryArn"
          description: The unique identifier for the version of the per-instance container group definition to roll back to if deployment fails. Amazon GameLift Servers sets this property to the container group definition version that the fleet used when it was last active.
        DeploymentStatus:
          $ref: "#/components/schemas/DeploymentStatus"
          description: The status of fleet deployment activity in the location. IN_PROGRESS -- The deployment is in progress. IMPAIRED -- The deployment failed and the fleet has some impaired containers. COMPLETE -- The deployment has completed successfully. ROLLBACK_IN_PROGRESS -- The deployment failed and rollback has been initiated. ROLLBACK_IN_COMPLETE -- The deployment failed and rollback has been completed. CANCELLED -- The deployment was cancelled.
        DeploymentConfiguration:
          $ref: "#/components/schemas/DeploymentConfiguration"
          description: Instructions for how to deploy updates to a container fleet and what actions to take if the deployment fails.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
    FleetBinaryArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9:/-]+"
    DeploymentStatus:
      type: string
      enum:
        - IN_PROGRESS
        - IMPAIRED
        - COMPLETE
        - ROLLBACK_IN_PROGRESS
        - ROLLBACK_COMPLETE
        - CANCELLED
        - PENDING
    DeploymentConfiguration:
      description: Set of rules for processing a deployment for a container fleet update.
      type: object
      properties:
        ProtectionStrategy:
          $ref: "#/components/schemas/DeploymentProtectionStrategy"
          description: Determines how fleet deployment activity affects active game sessions on the fleet. With protection, a deployment honors game session protection, and delays actions that would interrupt a protected active game session until the game session ends. Without protection, deployment activity can shut down all running tasks, including active game sessions, regardless of game session protection.
        MinimumHealthyPercentage:
          $ref: "#/components/schemas/MinimumHealthyPercentage"
          description: Sets a minimum level of healthy tasks to maintain during deployment activity.
        ImpairmentStrategy:
          $ref: "#/components/schemas/DeploymentImpairmentStrategy"
          description: Determines what actions to take if a deployment fails. If the fleet is multi-location, this strategy applies across all fleet locations. With a rollback strategy, updated fleet instances are rolled back to the last successful deployment. Alternatively, you can maintain a few impaired containers for the purpose of debugging, while all other tasks return to the last successful deployment.
    DeploymentProtectionStrategy:
      type: string
      enum:
        - WITH_PROTECTION
        - IGNORE_PROTECTION
    MinimumHealthyPercentage:
      type: integer
      minimum: 30
      maximum: 75
    DeploymentImpairmentStrategy:
      type: string
      enum:
        - MAINTAIN
        - ROLLBACK
    DescribeFleetEventsOutput:
      type: object
      properties:
        Events:
          $ref: "#/components/schemas/EventList"
          description: A collection of objects containing event log entries for the specified fleet.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    EventList:
      type: array
      items:
        $ref: "#/components/schemas/Event"
    Event:
      description: Log entry describing an event that involves Amazon GameLift Servers resources (such as a fleet). In addition to tracking activity, event codes and messages can provide additional information for troubleshooting and debugging problems.
      type: object
      properties:
        EventId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A unique identifier for a fleet event.
        ResourceId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A unique identifier for an event resource, such as a fleet ID.
        EventCode:
          $ref: "#/components/schemas/EventCode"
          description: "The type of event being logged. Fleet state transition events: FLEET_CREATED -- A fleet resource was successfully created with a status of NEW. Event messaging includes the fleet ID. FLEET_STATE_DOWNLOADING -- Fleet status changed from NEW to DOWNLOADING. Amazon GameLift Servers is downloading the compressed build and running install scripts. FLEET_STATE_VALIDATING -- Fleet status changed from DOWNLOADING to VALIDATING. Amazon GameLift Servers has successfully installed build and is now validating the build files. FLEET_STATE_BUILDING -- Fleet status changed from VALIDATING to BUILDING. Amazon GameLift Servers has successfully verified the build files and is now launching a fleet instance. FLEET_STATE_ACTIVATING -- Fleet status changed from BUILDING to ACTIVATING. Amazon GameLift Servers is launching a game server process on the fleet instance and is testing its connectivity with the Amazon GameLift Servers service. FLEET_STATE_ACTIVE -- The fleet's status changed from ACTIVATING to ACTIVE. The fleet is now ready to host game sessions. FLEET_STATE_ERROR -- The Fleet's status changed to ERROR. Describe the fleet event message for more details. Fleet creation events (ordered by fleet creation activity): FLEET_BINARY_DOWNLOAD_FAILED -- The build failed to download to the fleet instance. FLEET_CREATION_EXTRACTING_BUILD -- The game server build was successfully downloaded to an instance, and Amazon GameLift Serversis now extracting the build files from the uploaded build. Failure at this stage prevents a fleet from moving to ACTIVE status. Logs for this stage display a list of the files that are extracted and saved on the instance. Access the logs by using the URL in PreSignedLogUrl. FLEET_CREATION_RUNNING_INSTALLER -- The game server build files were successfully extracted, and Amazon GameLift Servers is now running the build's install script (if one is included). Failure in this stage prevents a fleet from moving to ACTIVE status. Logs for this stage list the installation steps and whether or not the install completed successfully. Access the logs by using the URL in PreSignedLogUrl. FLEET_CREATION_COMPLETED_INSTALLER -- The game server build files were successfully installed and validation of the installation will begin soon. FLEET_CREATION_FAILED_INSTALLER -- The installed failed while attempting to install the build files. This event indicates that the failure occurred before Amazon GameLift Servers could start validation. FLEET_CREATION_VALIDATING_RUNTIME_CONFIG -- The build process was successful, and the GameLift is now verifying that the game server launch paths, which are specified in the fleet's runtime configuration, exist. If any listed launch path exists, Amazon GameLift Servers tries to launch a game server process and waits for the process to report ready. Failures in this stage prevent a fleet from moving to ACTIVE status. Logs for this stage list the launch paths in the runtime configuration and indicate whether each is found. Access the logs by using the URL in PreSignedLogUrl. FLEET_VALIDATION_LAUNCH_PATH_NOT_FOUND -- Validation of the runtime configuration failed because the executable specified in a launch path does not exist on the instance. FLEET_VALIDATION_EXECUTABLE_RUNTIME_FAILURE -- Validation of the runtime configuration failed because the executable specified in a launch path failed to run on the fleet instance. FLEET_VALIDATION_TIMED_OUT -- Validation of the fleet at the end of creation timed out. Try fleet creation again. FLEET_ACTIVATION_FAILED -- The fleet failed to successfully complete one of the steps in the fleet activation process. This event code indicates that the game build was successfully downloaded to a fleet instance, built, and validated, but was not able to start a server process. For more information, see Debug Fleet Creation Issues. FLEET_ACTIVATION_FAILED_NO_INSTANCES -- Fleet creation was not able to obtain any instances based on the input fleet attributes. Try again at a different time or choose a different combination of fleet attributes such as fleet type, instance type, etc. FLEET_INITIALIZATION_FAILED -- A generic exception occurred during fleet creation. Describe the fleet event message for more details. VPC peering events: FLEET_VPC_PEERING_SUCCEEDED -- A VPC peering connection has been established between the VPC for an Amazon GameLift Servers fleet and a VPC in your Amazon Web Services account. FLEET_VPC_PEERING_FAILED -- A requested VPC peering connection has failed. Event details and status information provide additional detail. A common reason for peering failure is that the two VPCs have overlapping CIDR blocks of IPv4 addresses. To resolve this, change the CIDR block for the VPC in your Amazon Web Services account. For more information on VPC peering failures, see https://docs.aws.amazon.com/AmazonVPC/latest/PeeringGuide/invalid-peering-configurations.html FLEET_VPC_PEERING_DELETED -- A VPC peering connection has been successfully deleted. Spot instance events: INSTANCE_INTERRUPTED -- A spot instance was interrupted by EC2 with a two-minute notification. INSTANCE_RECYCLED -- A spot instance was determined to have a high risk of interruption and is scheduled to be recycled once it has no active game sessions. Server process events: SERVER_PROCESS_INVALID_PATH -- The game server executable or script could not be found based on the Fleet runtime configuration. Check that the launch path is correct based on the operating system of the Fleet. SERVER_PROCESS_SDK_INITIALIZATION_TIMEOUT -- The server process did not call InitSDK() within the time expected (5 minutes). Check your game session log to see why InitSDK() was not called in time. This event is not emitted for managed container fleets and Anywhere fleets unless they're deployed with the Amazon GameLift Servers Agent. SERVER_PROCESS_PROCESS_READY_TIMEOUT -- The server process did not call ProcessReady() within the time expected (5 minutes) after calling InitSDK(). Check your game session log to see why ProcessReady() was not called in time. SERVER_PROCESS_CRASHED -- The server process exited without calling ProcessEnding(). Check your game session log to see why ProcessEnding() was not called. SERVER_PROCESS_TERMINATED_UNHEALTHY -- The server process did not report a valid health check for too long and was therefore terminated by GameLift. Check your game session log to see if the thread became stuck processing a synchronous task for too long. SERVER_PROCESS_FORCE_TERMINATED -- The server process did not exit cleanly within the time expected after OnProcessTerminate() was sent. Check your game session log to see why termination took longer than expected. SERVER_PROCESS_PROCESS_EXIT_TIMEOUT -- The server process did not exit cleanly within the time expected (30 seconds) after calling ProcessEnding(). Check your game session log to see why termination took longer than expected. Game session events: GAME_SESSION_ACTIVATION_TIMEOUT -- GameSession failed to activate within the expected time. Check your game session log to see why ActivateGameSession() took longer to complete than expected. Other fleet events: FLEET_SCALING_EVENT -- A change was made to the fleet's capacity settings (desired instances, minimum/maximum scaling limits). Event messaging includes the new capacity settings. FLEET_NEW_GAME_SESSION_PROTECTION_POLICY_UPDATED -- A change was made to the fleet's game session protection policy setting. Event messaging includes both the old and new policy setting. FLEET_DELETED -- A request to delete a fleet was initiated. GENERIC_EVENT -- An unspecified event has occurred."
        Message:
          $ref: "#/components/schemas/NonEmptyString"
          description: Additional information related to the event.
        EventTime:
          $ref: "#/components/schemas/Timestamp"
          description: Time stamp indicating when this event occurred. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        PreSignedLogUrl:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: Location of stored logs with additional detail that is related to the event. This is useful for debugging issues. The URL is valid for 15 minutes. You can also access fleet creation logs through the Amazon GameLift Servers console.
        Count:
          $ref: "#/components/schemas/EventCount"
          description: The number of times that this event occurred.
    EventCode:
      type: string
      enum:
        - GENERIC_EVENT
        - FLEET_CREATED
        - FLEET_DELETED
        - FLEET_SCALING_EVENT
        - FLEET_STATE_DOWNLOADING
        - FLEET_STATE_VALIDATING
        - FLEET_STATE_BUILDING
        - FLEET_STATE_ACTIVATING
