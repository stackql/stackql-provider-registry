            type: string
            enum:
              - GameLift.DeregisterCompute
            default: GameLift.DeregisterCompute
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet the compute resource is currently registered to.
                ComputeName:
                  $ref: "#/components/schemas/ComputeNameOrArn"
                  description: The unique identifier of the compute resource to deregister. For an Anywhere fleet compute, use the registered compute name.
              required:
