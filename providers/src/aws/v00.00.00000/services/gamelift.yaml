        - LOCATION_STATE_ERROR
        - LOCATION_STATE_DELETING
        - LOCATION_STATE_DELETED
    EventCount:
      type: integer
      format: int64
      minimum: 1
      maximum: 101
    DescribeFleetLocationAttributesOutput:
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetIdOrArn"
          description: A unique identifier for the fleet that location attributes were requested for.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        LocationAttributes:
          $ref: "#/components/schemas/LocationAttributesList"
          description: Location-specific information on the requested fleet's remote locations.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    LocationAttributesList:
      type: array
      items:
        $ref: "#/components/schemas/LocationAttributes"
    LocationAttributes:
      description: Details about a location in a multi-location fleet.
      type: object
      properties:
        LocationState:
          $ref: "#/components/schemas/LocationState"
          description: A fleet location and its current life-cycle state.
        StoppedActions:
          $ref: "#/components/schemas/FleetActionList"
          description: A list of fleet actions that have been suspended in the fleet location.
        UpdateStatus:
          $ref: "#/components/schemas/LocationUpdateStatus"
          description: The status of fleet activity updates to the location. The status PENDING_UPDATE indicates that StopFleetActions or StartFleetActions has been requested but the update has not yet been completed for the location.
    LocationUpdateStatus:
      type: string
      enum:
        - PENDING_UPDATE
    DescribeFleetLocationCapacityOutput:
      type: object
      properties:
        FleetCapacity:
          $ref: "#/components/schemas/FleetCapacity"
          description: Resource capacity information for the requested fleet location. Capacity objects are returned only for fleets and locations that currently exist. Changes in desired instance value can take up to 1 minute to be reflected.
    DescribeFleetLocationUtilizationOutput:
      type: object
      properties:
        FleetUtilization:
          $ref: "#/components/schemas/FleetUtilization"
          description: Utilization information for the requested fleet location. Utilization objects are returned only for fleets and locations that currently exist.
    FleetUtilization:
      description: Current resource utilization statistics in a specified fleet or location. The location value might refer to a fleet's remote location or its home region.
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet associated with the location.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        ActiveServerProcessCount:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of server processes in ACTIVE status that are currently running across all instances in the fleet location.
        ActiveGameSessionCount:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of active game sessions that are currently being hosted across all instances in the fleet location.
        CurrentPlayerSessionCount:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of active player sessions that are currently being hosted across all instances in the fleet location.
        MaximumPlayerSessionCount:
          $ref: "#/components/schemas/WholeNumber"
          description: The maximum number of players allowed across all game sessions that are currently being hosted across all instances in the fleet location.
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: The fleet location for the fleet utilization information, expressed as an Amazon Web Services Region code, such as us-west-2.
    DescribeFleetPortSettingsOutput:
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet that was requested.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        InboundPermissions:
          $ref: "#/components/schemas/IpPermissionsList"
          description: The port settings for the requested fleet ID.
        UpdateStatus:
          $ref: "#/components/schemas/LocationUpdateStatus"
          description: The current status of updates to the fleet's port settings in the requested fleet location. A status of PENDING_UPDATE indicates that an update was requested for the fleet but has not yet been completed for the location.
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: The requested fleet location, expressed as an Amazon Web Services Region code, such as us-west-2.
    DescribeFleetUtilizationOutput:
      type: object
      properties:
        FleetUtilization:
          $ref: "#/components/schemas/FleetUtilizationList"
          description: A collection of objects containing utilization information for each requested fleet ID. Utilization objects are returned only for fleets that currently exist.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    FleetUtilizationList:
      type: array
      items:
        $ref: "#/components/schemas/FleetUtilization"
    DescribeGameServerOutput:
      type: object
      properties:
        GameServer:
          $ref: "#/components/schemas/GameServer"
          description: Object that describes the requested game server.
    DescribeGameServerGroupOutput:
      type: object
      properties:
        GameServerGroup:
          $ref: "#/components/schemas/GameServerGroup"
          description: An object with the property settings for the requested game server group resource.
    GameServerInstanceIds:
      type: array
      items:
        $ref: "#/components/schemas/GameServerInstanceId"
    DescribeGameServerInstancesOutput:
      type: object
      properties:
        GameServerInstances:
          $ref: "#/components/schemas/GameServerInstances"
          description: The collection of requested game server instances.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    GameServerInstances:
      type: array
      items:
        $ref: "#/components/schemas/GameServerInstance"
    GameServerInstance:
      description: Additional properties, including status, that describe an EC2 instance in a game server group. Instance configurations are set with game server group properties (see DescribeGameServerGroup and with the EC2 launch template that was used when creating the game server group. Retrieve game server instances for a game server group by calling DescribeGameServerInstances.
      type: object
      properties:
        GameServerGroupName:
          $ref: "#/components/schemas/GameServerGroupName"
          description: A developer-defined identifier for the game server group that includes the game server instance. The name is unique for each Region in each Amazon Web Services account.
        GameServerGroupArn:
          $ref: "#/components/schemas/GameServerGroupArn"
          description: A generated unique identifier for the game server group that includes the game server instance.
        InstanceId:
          $ref: "#/components/schemas/GameServerInstanceId"
          description: "The unique identifier for the instance where the game server is running. This ID is available in the instance metadata. EC2 instance IDs use a 17-character format, for example: i-1234567890abcdef0."
        InstanceStatus:
          $ref: "#/components/schemas/GameServerInstanceStatus"
          description: Current status of the game server instance
    GameServerInstanceStatus:
      type: string
      enum:
        - ACTIVE
        - DRAINING
        - SPOT_TERMINATING
    DescribeGameSessionDetailsOutput:
      type: object
      properties:
        GameSessionDetails:
          $ref: "#/components/schemas/GameSessionDetailList"
          description: A collection of properties for each game session that matches the request.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    GameSessionDetailList:
      type: array
      items:
        $ref: "#/components/schemas/GameSessionDetail"
    GameSessionDetail:
      description: A game session's properties plus the protection policy currently in force.
      type: object
      properties:
        GameSession:
          $ref: "#/components/schemas/GameSession"
          description: Object that describes a game session.
        ProtectionPolicy:
          $ref: "#/components/schemas/ProtectionPolicy"
          description: Current status of protection for the game session. NoProtection -- The game session can be terminated during a scale-down event. FullProtection -- If the game session is in an ACTIVE status, it cannot be terminated during a scale-down event.
    DescribeGameSessionPlacementOutput:
      type: object
      properties:
        GameSessionPlacement:
          $ref: "#/components/schemas/GameSessionPlacement"
          description: Object that describes the requested game session placement.
    GameSessionPlacement:
      description: Represents a potential game session placement, including the full details of the original placement request and the current status. If the game session placement status is PENDING, the properties for game session ID/ARN, region, IP address/DNS, and port aren't final. A game session is not active and ready to accept players until placement status reaches FULFILLED. When the placement is in PENDING status, Amazon GameLift Servers may attempt to place a game session multiple times before succeeding. With each attempt it creates a https://docs.aws.amazon.com/gamelift/latest/apireference/API_GameSession object and updates this placement object with the new game session properties.
      type: object
      properties:
        PlacementId:
          $ref: "#/components/schemas/IdStringModel"
          description: A unique identifier for a game session placement.
        GameSessionQueueName:
          $ref: "#/components/schemas/GameSessionQueueName"
          description: A descriptive label that is associated with game session queue. Queue names must be unique within each Region.
        Status:
          $ref: "#/components/schemas/GameSessionPlacementState"
          description: Current status of the game session placement request. PENDING -- The placement request is in the queue waiting to be processed. Game session properties are not yet final. FULFILLED -- A new game session has been successfully placed. Game session properties are now final. CANCELLED -- The placement request was canceled. TIMED_OUT -- A new game session was not successfully created before the time limit expired. You can resubmit the placement request as needed. FAILED -- Amazon GameLift Servers is not able to complete the process of placing the game session. Common reasons are the game session terminated before the placement process was completed, or an unexpected internal error.
        GameProperties:
          $ref: "#/components/schemas/GamePropertyList"
          description: 'A set of key-value pairs that can store custom data in a game session. For example: {"Key": "difficulty", "Value": "novice"}. Avoid using periods (".") in property keys if you plan to search for game sessions by properties. Property keys containing periods cannot be searched and will be filtered out from search results due to search index limitations. If you use SearchGameSessions API, there is a limit of 500 game property keys across all game sessions and all fleets per region. If the limit is exceeded, there will potentially be game session entries missing from SearchGameSessions API results.'
        MaximumPlayerSessionCount:
          $ref: "#/components/schemas/WholeNumber"
          description: The maximum number of players that can be connected simultaneously to the game session.
        GameSessionName:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A descriptive label that is associated with a game session. Session names do not need to be unique.
        GameSessionId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: "An identifier for the game session that is unique across all regions. The value is always a full ARN in the following format: arn:aws:gamelift:`<location>`::gamesession/<fleet ID>/<ID string>. This value is the same as GameSessionArn. This value isn't final until placement status is FULFILLED."
        GameSessionArn:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: "An identifier for the game session that is unique across all regions. The value is always a full ARN in the following format: arn:aws:gamelift:`<location>`::gamesession/<fleet ID>/<ID string>. This value is the same as GameSessionId. This value isn't final until placement status is FULFILLED."
        GameSessionRegion:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: Name of the Region where the game session created by this placement request is running. This value isn't final until placement status is FULFILLED.
        PlayerLatencies:
          $ref: "#/components/schemas/PlayerLatencyList"
          description: A set of values, expressed in milliseconds, that indicates the amount of latency that a player experiences when connected to Amazon Web Services Regions.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Time stamp indicating when this request was placed in the queue. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Time stamp indicating when this request was completed, canceled, or timed out.
        IpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address of the game session. To connect to a Amazon GameLift Servers game server, an app needs both the IP address and port number. This value isn't final until placement status is FULFILLED.
        DnsName:
          $ref: "#/components/schemas/DnsName"
          description: "The DNS identifier assigned to the instance that is running the game session. Values have the following format: TLS-enabled fleets: <unique identifier>.<region identifier>.amazongamelift.com. Non-TLS-enabled fleets: ec2-<unique identifier>.compute.amazonaws.com. (See Amazon EC2 Instance IP Addressing.) When connecting to a game session that is running on a TLS-enabled fleet, you must use the DNS name, not the IP address."
        Port:
          $ref: "#/components/schemas/PortNumber"
          description: The port number for the game session. To connect to a Amazon GameLift Servers game server, an app needs both the IP address and port number. This value isn't final until placement status is FULFILLED.
        PlacedPlayerSessions:
          $ref: "#/components/schemas/PlacedPlayerSessionList"
          description: A collection of information on player sessions created in response to the game session placement request. These player sessions are created only after a new game session is successfully placed (placement status is FULFILLED). This information includes the player ID, provided in the placement request, and a corresponding player session ID.
        GameSessionData:
          $ref: "#/components/schemas/LargeGameSessionData"
          description: A set of custom game session properties, formatted as a single string value. This data is passed to a game server process with a request to start a new game session. For more information, see Start a game session.
        MatchmakerData:
          $ref: "#/components/schemas/MatchmakerData"
          description: Information on the matchmaking process for this game. Data is in JSON syntax, formatted as a string. It identifies the matchmaking configuration used to create the match, and contains data on all players assigned to the match, including player attributes and team assignments. For more details on matchmaker data, see Match Data.
        PriorityConfigurationOverride:
          $ref: "#/components/schemas/PriorityConfigurationOverride"
          description: An alternative priority list of locations that's included with a game session placement request. When provided, the list overrides a queue's location order list for this game session placement request only. The list might include Amazon Web Services Regions, local zones, and custom locations (for Anywhere fleets). The fallback strategy tells Amazon GameLift Servers what action to take (if any) in the event that it failed to place a new game session.
        PlayerGatewayStatus:
          $ref: "#/components/schemas/PlayerGatewayStatus"
          description: "The current status of player gateway for the game session placement. Note, even if a fleet has PlayerGatewayMode configured as ENABLED, player gateway might not be available in a specific location. For more information about locations where player gateway is supported, see Amazon GameLift Servers service locations. Possible values include: ENABLED -- Player gateway is available for this game session placement. DISABLED -- Player gateway is not available for this game session placement."
    GameSessionPlacementState:
      type: string
      enum:
        - PENDING
        - FULFILLED
        - CANCELLED
        - TIMED_OUT
        - FAILED
    PlayerLatencyList:
      type: array
      items:
        $ref: "#/components/schemas/PlayerLatency"
    PlayerLatency:
      description: Regional latency information for a player, used when requesting a new game session. This value indicates the amount of time lag that exists when the player is connected to a fleet in the specified Region. The relative difference between a player's latency values for multiple Regions are used to determine which fleets are best suited to place a new game session for the player.
      type: object
      properties:
        PlayerId:
          $ref: "#/components/schemas/PlayerId"
          description: A unique identifier for a player associated with the latency data.
        RegionIdentifier:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: Name of the Region that is associated with the latency value.
        LatencyInMilliseconds:
          $ref: "#/components/schemas/Float"
          description: Amount of time that represents the time lag experienced by the player when connected to the specified Region.
    Float:
      type: number
      format: float
    PlacedPlayerSessionList:
      type: array
      items:
        $ref: "#/components/schemas/PlacedPlayerSession"
    PlacedPlayerSession:
      description: Information about a player session. This object contains only the player ID and player session ID. To retrieve full details on a player session, call DescribePlayerSessions with the player session ID.
      type: object
      properties:
        PlayerId:
          $ref: "#/components/schemas/PlayerId"
          description: A unique identifier for a player that is associated with this player session.
        PlayerSessionId:
          $ref: "#/components/schemas/PlayerSessionId"
          description: A unique identifier for a player session.
    PriorityConfigurationOverride:
      description: An alternate list of prioritized locations for use with a game session queue. When this property is included in a StartGameSessionPlacement request, the alternate list overrides the queue's default location priorities, as defined in the queue's PriorityConfiguration setting (LocationOrder). The override is valid for an individual placement request only. Use this property only with queues that have a PriorityConfiguration setting that prioritizes LOCATION first. A priority configuration override list does not override a queue's FilterConfiguration setting, if the queue has one. Filter configurations are used to limit placements to a subset of the locations in a queue's destinations. If the override list includes a location that's not on in the FilterConfiguration allowed list, Amazon GameLift Servers won't attempt to place a game session there.
      type: object
      properties:
        PlacementFallbackStrategy:
          $ref: "#/components/schemas/PlacementFallbackStrategy"
          description: "Instructions for how to proceed if placement fails in every location on the priority override list. Valid strategies include: DEFAULT_AFTER_SINGLE_PASS -- After attempting to place a new game session in every location on the priority override list, try to place a game session in queue's other locations. This is the default behavior. NONE -- Limit placements to locations on the priority override list only."
        LocationOrder:
          $ref: "#/components/schemas/LocationOrderOverrideList"
          description: A prioritized list of hosting locations. The list can include Amazon Web Services Regions (such as us-west-2), local zones, and custom locations (for Anywhere fleets). Each location must be listed only once. For details, see Amazon GameLift Servers service locations.
      required:
        - LocationOrder
    PlacementFallbackStrategy:
      type: string
      enum:
        - DEFAULT_AFTER_SINGLE_PASS
        - NONE
    LocationOrderOverrideList:
      type: array
      items:
        $ref: "#/components/schemas/LocationStringModel"
