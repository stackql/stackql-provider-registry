            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBuildOutput"
  /UpdateContainerFleet:
    post:
      operationId: UpdateContainerFleet
      description: "This API works with the following fleet types: Container Updates the properties of a managed container fleet. Depending on the properties being updated, this operation might initiate a fleet deployment. You can track deployments for a fleet using https://docs.aws.amazon.com/gamelift/latest/apireference/API_DescribeFleetDeployment.html. A managed fleet's runtime environment, which depends on the fleet's Amazon Machine Image {AMI} version, can't be updated. You must create a new fleet. As a best practice, we recommend replacing your managed fleets every 30 days to maintain a secure and up-to-date runtime environment for your hosted game servers. For guidance, see Security best practices for Amazon GameLift Servers. Request options As with CreateContainerFleet, many fleet properties use common defaults or are calculated based on the fleet's container group definitions. Update fleet properties that result in a fleet deployment. Include only those properties that you want to change. Specify deployment configuration settings. Update fleet properties that don't result in a fleet deployment. Include only those properties that you want to change. Changes to the following properties initiate a fleet deployment: GameServerContainerGroupDefinition PerInstanceContainerGroupDefinition GameServerContainerGroupsPerInstance InstanceInboundPermissions InstanceConnectionPortRange LogConfiguration Results If successful, this operation updates the container fleet resource, and might initiate a new deployment of fleet resources using the deployment configuration provided. A deployment replaces existing fleet instances with new instances that are deployed with the updated fleet properties. The fleet is placed in UPDATING status until the deployment is complete, then return to ACTIVE. You can have only one update deployment active at a time for a fleet. If a second update request initiates a deployment while another deployment is in progress, the first deployment is cancelled."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateContainerFleet
            default: GameLift.UpdateContainerFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the container fleet to update. You can use either the fleet ID or ARN value.
                GameServerContainerGroupDefinitionName:
                  $ref: "#/components/schemas/ContainerGroupDefinitionNameOrArn"
                  description: The name or ARN value of a new game server container group definition to deploy on the fleet. If you're updating the fleet to a specific version of a container group definition, use the ARN value and include the version number. If you're updating the fleet to the latest version of a container group definition, you can use the name value. You can't remove a fleet's game server container group definition, you can only update or replace it with another definition. Update a container group definition by calling UpdateContainerGroupDefinition. This operation creates a ContainerGroupDefinition resource with an incremented version.
                PerInstanceContainerGroupDefinitionName:
                  $ref: "#/components/schemas/ContainerGroupDefinitionNameOrArn"
                  description: The name or ARN value of a new per-instance container group definition to deploy on the fleet. If you're updating the fleet to a specific version of a container group definition, use the ARN value and include the version number. If you're updating the fleet to the latest version of a container group definition, you can use the name value. Update a container group definition by calling UpdateContainerGroupDefinition. This operation creates a ContainerGroupDefinition resource with an incremented version. To remove a fleet's per-instance container group definition, leave this parameter empty and use the parameter RemoveAttributes.
                GameServerContainerGroupsPerInstance:
                  $ref: "#/components/schemas/GameServerContainerGroupsPerInstance"
                  description: The number of times to replicate the game server container group on each fleet instance. By default, Amazon GameLift Servers calculates the maximum number of game server container groups that can fit on each instance. You can remove this property value to use the calculated value, or set it manually. If you set this number manually, Amazon GameLift Servers uses your value as long as it's less than the calculated maximum.
                InstanceConnectionPortRange:
                  $ref: "#/components/schemas/ConnectionPortRange"
                  description: A revised set of port numbers to open on each fleet instance. By default, Amazon GameLift Servers calculates an optimal port range based on your fleet configuration. If you previously set this parameter manually, you can't reset this to use the calculated settings. The port range must not overlap with the Amazon GameLift Servers reserved port range 4092-4191. This range is reserved for internal Amazon GameLift Servers services.
                InstanceInboundPermissionAuthorizations:
                  $ref: "#/components/schemas/IpPermissionsList"
                  description: A set of ports to add to the container fleet's inbound permissions. The port range must not overlap with the Amazon GameLift Servers reserved port range 4092-4191. This range is reserved for internal Amazon GameLift Servers services.
                InstanceInboundPermissionRevocations:
                  $ref: "#/components/schemas/IpPermissionsList"
                  description: A set of ports to remove from the container fleet's inbound permissions.
                DeploymentConfiguration:
                  $ref: "#/components/schemas/DeploymentConfiguration"
                  description: Instructions for how to deploy updates to a container fleet, if the fleet update initiates a deployment. The deployment configuration lets you determine how to replace fleet instances and what actions to take if the deployment fails.
                Description:
                  $ref: "#/components/schemas/NonZeroAndMaxString"
                  description: A meaningful description of the container fleet.
                MetricGroups:
                  $ref: "#/components/schemas/MetricGroupList"
                  description: The name of an Amazon Web Services CloudWatch metric group to add this fleet to.
                NewGameSessionProtectionPolicy:
                  $ref: "#/components/schemas/ProtectionPolicy"
                  description: The game session protection policy to apply to all new game sessions that are started in this fleet. Game sessions that already exist are not affected.
                GameSessionCreationLimitPolicy:
                  $ref: "#/components/schemas/GameSessionCreationLimitPolicy"
                  description: A policy that limits the number of game sessions that each individual player can create on instances in this fleet. The limit applies for a specified span of time.
                LogConfiguration:
                  $ref: "#/components/schemas/LogConfiguration"
                  description: The method for collecting container logs for the fleet.
                RemoveAttributes:
                  $ref: "#/components/schemas/ContainerFleetRemoveAttributeList"
                  description: If set, this update removes a fleet's per-instance container group definition. You can't remove a fleet's game server container group definition.
              required:
                - FleetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateContainerFleetOutput"
  /UpdateContainerGroupDefinition:
    post:
      operationId: UpdateContainerGroupDefinition
      description: "This API works with the following fleet types: Container Updates properties in an existing container group definition. This operation doesn't replace the definition. Instead, it creates a new version of the definition and saves it separately. You can access all versions that you choose to retain. The only property you can't update is the container group type. Request options: Update based on the latest version of the container group definition. Specify the container group definition name only, or use an ARN value without a version number. Provide updated values for the properties that you want to change only. All other values remain the same as the latest version. Update based on a specific version of the container group definition. Specify the container group definition name and a source version number, or use an ARN value with a version number. Provide updated values for the properties that you want to change only. All other values remain the same as the source version. Change a game server container definition. Provide the updated container definition. Add or change a support container definition. Provide a complete set of container definitions, including the updated definition. Remove a support container definition. Provide a complete set of container definitions, excluding the definition to remove. If the container group has only one support container definition, provide an empty set. Results: If successful, this operation returns the complete properties of the new container group definition version. If the container group definition version is used in an active fleets, the update automatically initiates a new fleet deployment of the new version. You can track a fleet's deployments using ListFleetDeployments."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateContainerGroupDefinition
            default: GameLift.UpdateContainerGroupDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ContainerGroupDefinitionNameOrArn"
                  description: A descriptive identifier for the container group definition. The name value must be unique in an Amazon Web Services Region.
                GameServerContainerDefinition:
                  $ref: "#/components/schemas/GameServerContainerDefinitionInput"
                  description: An updated definition for the game server container in this group. Define a game server container only when the container group type is GAME_SERVER. You can pass in your container definitions as a JSON file.
                SupportContainerDefinitions:
                  $ref: "#/components/schemas/SupportContainerDefinitionInputList"
                  description: One or more definitions for support containers in this group. You can define a support container in any type of container group. You can pass in your container definitions as a JSON file.
                TotalMemoryLimitMebibytes:
                  $ref: "#/components/schemas/ContainerTotalMemoryLimit"
                  description: The maximum amount of memory (in MiB) to allocate to the container group. All containers in the group share this memory. If you specify memory limits for an individual container, the total value must be greater than any individual container's memory limit.
                TotalVcpuLimit:
                  $ref: "#/components/schemas/ContainerTotalVcpuLimit"
                  description: The maximum amount of vCPU units to allocate to the container group (1 vCPU is equal to 1024 CPU units). All containers in the group share this memory. If you specify vCPU limits for individual containers, the total value must be equal to or greater than the sum of the CPU limits for all containers in the group.
                VersionDescription:
                  $ref: "#/components/schemas/NonZeroAndMaxString"
                  description: A description for this update to the container group definition.
                SourceVersionNumber:
                  $ref: "#/components/schemas/PositiveInteger"
                  description: The container group definition version to update. The new version starts with values from the source version, and then updates values included in this request.
                OperatingSystem:
                  $ref: "#/components/schemas/ContainerOperatingSystem"
                  description: The platform that all containers in the group use. Containers in a group must run on the same operating system. Amazon Linux 2 (AL2) will reach end of support on 6/30/2026. See more details in the Amazon Linux 2 FAQs. For game servers that are hosted on AL2 and use server SDK version 4.x for Amazon GameLift Servers, first update the game server build to server SDK 5.x, and then deploy to AL2023 instances. See Migrate to server SDK version 5.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateContainerGroupDefinitionOutput"
  /UpdateFleetAttributes:
    post:
      operationId: UpdateFleetAttributes
      description: "This API works with the following fleet types: EC2, Anywhere, Container Updates a fleet's mutable attributes, such as game session protection and resource creation limits. To update fleet attributes, specify the fleet ID and the property values that you want to change. If successful, Amazon GameLift Servers returns the identifiers for the updated fleet. A managed fleet's runtime environment, which depends on the fleet's Amazon Machine Image {AMI} version, can't be updated. You must create a new fleet. As a best practice, we recommend replacing your managed fleets every 30 days to maintain a secure and up-to-date runtime environment for your hosted game servers. For guidance, see Security best practices for Amazon GameLift Servers. Learn more Setting up Amazon GameLift Servers fleets"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateFleetAttributes
            default: GameLift.UpdateFleetAttributes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet to update attribute metadata for. You can use either the fleet ID or ARN value.
                Name:
                  $ref: "#/components/schemas/NonZeroAndMaxString"
                  description: A descriptive label that is associated with a fleet. Fleet names do not need to be unique.
                Description:
                  $ref: "#/components/schemas/NonZeroAndMaxString"
                  description: A human-readable description of a fleet.
                NewGameSessionProtectionPolicy:
                  $ref: "#/components/schemas/ProtectionPolicy"
                  description: The game session protection policy to apply to all new game sessions created in this fleet. Game sessions that already exist are not affected. You can set protection for individual game sessions using UpdateGameSession . NoProtection -- The game session can be terminated during a scale-down event. FullProtection -- If the game session is in an ACTIVE status, it cannot be terminated during a scale-down event.
                ResourceCreationLimitPolicy:
                  $ref: "#/components/schemas/ResourceCreationLimitPolicy"
                  description: Policy settings that limit the number of game sessions an individual player can create over a span of time.
                MetricGroups:
                  $ref: "#/components/schemas/MetricGroupList"
                  description: The name of a metric group to add this fleet to. Use a metric group in Amazon CloudWatch to aggregate the metrics from multiple fleets. Provide an existing metric group name, or create a new metric group by providing a new name. A fleet can only be in one metric group at a time.
                AnywhereConfiguration:
                  $ref: "#/components/schemas/AnywhereConfiguration"
                  description: Amazon GameLift Servers Anywhere configuration options.
              required:
                - FleetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFleetAttributesOutput"
  /UpdateFleetCapacity:
    post:
      operationId: UpdateFleetCapacity
      description: "This API works with the following fleet types: EC2, Container Updates capacity settings for a managed EC2 fleet or managed container fleet. For these fleets, you adjust capacity by changing the number of instances in the fleet. Fleet capacity determines the number of game sessions and players that the fleet can host based on its configuration. For fleets with multiple locations, use this operation to manage capacity settings in each location individually. Minimum/maximum size: Set hard limits on the number of Amazon EC2 instances allowed. If Amazon GameLift Servers receives a request--either through manual update or automatic scaling--it won't change the capacity to a value outside of this range. Desired capacity: As an alternative to automatic scaling, manually set the number of Amazon EC2 instances to be maintained. Before changing a fleet's desired capacity, check the maximum capacity of the fleet's Amazon EC2 instance type by calling DescribeEC2InstanceLimits. To update capacity for a fleet's home Region, or if the fleet has no remote locations, omit the Location parameter. The fleet must be in ACTIVE status. To update capacity for a fleet's remote location, set the Location parameter to the location to update. The location must be in ACTIVE status. If successful, Amazon GameLift Servers updates the capacity settings and returns the identifiers for the updated fleet and/or location. If a requested change to desired capacity exceeds the instance type's limit, the LimitExceeded exception occurs. Updates often prompt an immediate change in fleet capacity, such as when current capacity is different than the new desired capacity or outside the new limits. In this scenario, Amazon GameLift Servers automatically initiates steps to add or remove instances in the fleet location. You can track a fleet's current capacity by calling DescribeFleetCapacity or DescribeFleetLocationCapacity. Use ManagedCapacityConfiguration with the \"SCALE_TO_AND_FROM_ZERO\" ZeroCapacityStrategy to enable Amazon GameLift Servers to fully manage the MinSize value, switching between 0 and 1 based on game session activity. This is ideal for eliminating compute costs during periods of no game activity. It is particularly beneficial during development when you're away from your desk, iterating on builds for extended periods, in production environments serving low-traffic locations, or for games with long, predictable downtime windows. By automatically managing capacity between 0 and 1 instances, you avoid paying for idle instances while maintaining the ability to serve game sessions when demand arrives. Note that while scale-out is triggered immediately upon receiving a game session request, actual game session availability depends on your server process startup time, so this approach works best with multi-location Fleets where cold-start latency is tolerable. With a \"MANUAL\" ZeroCapacityStrategy Amazon GameLift Servers will not modify Fleet MinSize values automatically and will not scale out from zero instances in response to game sessions. This is configurable per-location. Learn more Scaling fleet capacity"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateFleetCapacity
            default: GameLift.UpdateFleetCapacity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet to update capacity settings for. You can use either the fleet ID or ARN value.
                DesiredInstances:
                  $ref: "#/components/schemas/WholeNumber"
                  description: The number of Amazon EC2 instances you want to maintain in the specified fleet location. This value must fall between the minimum and maximum size limits. Changes in desired instance value can take up to 1 minute to be reflected when viewing the fleet's capacity settings.
                MinSize:
                  $ref: "#/components/schemas/WholeNumber"
                  description: The minimum number of instances that are allowed in the specified fleet location. If this parameter is not set, the default is 0. This parameter cannot be set when using a ManagedCapacityConfiguration where ZeroCapacityStrategy has a value of SCALE_TO_AND_FROM_ZERO.
                MaxSize:
                  $ref: "#/components/schemas/WholeNumber"
                  description: The maximum number of instances that are allowed in the specified fleet location. If this parameter is not set, the default is 1.
                Location:
                  $ref: "#/components/schemas/LocationStringModel"
                  description: The name of a remote location to update fleet capacity settings for, in the form of an Amazon Web Services Region code such as us-west-2.
                ManagedCapacityConfiguration:
                  $ref: "#/components/schemas/ManagedCapacityConfiguration"
                  description: Configuration for Amazon GameLift Servers-managed capacity scaling options.
              required:
                - FleetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFleetCapacityOutput"
  /UpdateFleetPortSettings:
    post:
      operationId: UpdateFleetPortSettings
      description: "This API works with the following fleet types: EC2, Container Updates permissions that allow inbound traffic to connect to game sessions in the fleet. To update settings, specify the fleet ID to be updated and specify the changes to be made. List the permissions you want to add in InboundPermissionAuthorizations, and permissions you want to remove in InboundPermissionRevocations. Permissions to be removed must match existing fleet permissions. If successful, the fleet ID for the updated fleet is returned. For fleets with remote locations, port setting updates can take time to propagate across all locations. You can check the status of updates in each location by calling DescribeFleetPortSettings with a location name. Learn more Setting up Amazon GameLift Servers fleets"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateFleetPortSettings
            default: GameLift.UpdateFleetPortSettings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet to update port settings for. You can use either the fleet ID or ARN value.
                InboundPermissionAuthorizations:
                  $ref: "#/components/schemas/IpPermissionsList"
                  description: A collection of port settings to be added to the fleet resource.
                InboundPermissionRevocations:
                  $ref: "#/components/schemas/IpPermissionsList"
                  description: A collection of port settings to be removed from the fleet resource.
              required:
                - FleetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFleetPortSettingsOutput"
  /UpdateGameServer:
    post:
      operationId: UpdateGameServer
      description: "This API works with the following fleet types: EC2 (FleetIQ) Updates information about a registered game server to help Amazon GameLift Servers FleetIQ track game server availability. This operation is called by a game server process that is running on an instance in a game server group. Use this operation to update the following types of game server information. You can make all three types of updates in the same request: To update the game server's utilization status from AVAILABLE (when the game server is available to be claimed) to UTILIZED (when the game server is currently hosting games). Identify the game server and game server group and specify the new utilization status. You can't change the status from to UTILIZED to AVAILABLE . To report health status, identify the game server and game server group and set health check to HEALTHY. If a game server does not report health status for a certain length of time, the game server is no longer considered healthy. As a result, it will be eventually deregistered from the game server group to avoid affecting utilization metrics. The best practice is to report health every 60 seconds. To change game server metadata, provide updated game server data. Once a game server is successfully updated, the relevant statuses and timestamps are updated. Learn more Amazon GameLift Servers FleetIQ Guide"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateGameServer
            default: GameLift.UpdateGameServer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GameServerGroupName:
                  $ref: "#/components/schemas/GameServerGroupNameOrArn"
                  description: A unique identifier for the game server group where the game server is running.
                GameServerId:
                  $ref: "#/components/schemas/GameServerId"
                  description: A custom string that uniquely identifies the game server to update.
                GameServerData:
                  $ref: "#/components/schemas/GameServerData"
                  description: A set of custom game server properties, formatted as a single string value. This data is passed to a game client or service when it requests information on game servers.
                UtilizationStatus:
                  $ref: "#/components/schemas/GameServerUtilizationStatus"
                  description: Indicates if the game server is available or is currently hosting gameplay. You can update a game server status from AVAILABLE to UTILIZED, but you can't change a the status from UTILIZED to AVAILABLE.
                HealthCheck:
                  $ref: "#/components/schemas/GameServerHealthCheck"
                  description: Indicates health status of the game server. A request that includes this parameter updates the game server's LastHealthCheckTime timestamp.
              required:
                - GameServerGroupName
                - GameServerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGameServerOutput"
  /UpdateGameServerGroup:
    post:
      operationId: UpdateGameServerGroup
      description: "This API works with the following fleet types: EC2 (FleetIQ) Updates Amazon GameLift Servers FleetIQ-specific properties for a game server group. Many Auto Scaling group properties are updated on the Auto Scaling group directly, including the launch template, Auto Scaling policies, and maximum/minimum/desired instance counts. To update the game server group, specify the game server group ID and provide the updated values. Before applying the updates, the new values are validated to ensure that Amazon GameLift Servers FleetIQ can continue to perform instance balancing activity. If successful, a GameServerGroup object is returned. Learn more Amazon GameLift Servers FleetIQ Guide"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateGameServerGroup
            default: GameLift.UpdateGameServerGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GameServerGroupName:
                  $ref: "#/components/schemas/GameServerGroupNameOrArn"
                  description: A unique identifier for the game server group. Use either the name or ARN value.
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) for an IAM role that allows Amazon GameLift Servers to access your Amazon EC2 Auto Scaling groups.
                InstanceDefinitions:
                  $ref: "#/components/schemas/InstanceDefinitions"
                  description: An updated list of Amazon EC2 instance types to use in the Auto Scaling group. The instance definitions must specify at least two different instance types that are supported by Amazon GameLift Servers FleetIQ. This updated list replaces the entire current list of instance definitions for the game server group. For more information on instance types, see EC2 Instance Types in the Amazon EC2 User Guide. You can optionally specify capacity weighting for each instance type. If no weight value is specified for an instance type, it is set to the default value "1". For more information about capacity weighting, see Instance Weighting for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide.
                GameServerProtectionPolicy:
                  $ref: "#/components/schemas/GameServerProtectionPolicy"
                  description: A flag that indicates whether instances in the game server group are protected from early termination. Unprotected instances that have active game servers running might be terminated during a scale-down event, causing players to be dropped from the game. Protected instances cannot be terminated while there are active game servers running except in the event of a forced game server group deletion (see ). An exception to this is with Spot Instances, which can be terminated by Amazon Web Services regardless of protection status. This property is set to NO_PROTECTION by default.
                BalancingStrategy:
                  $ref: "#/components/schemas/BalancingStrategy"
                  description: "Indicates how Amazon GameLift Servers FleetIQ balances the use of Spot Instances and On-Demand Instances in the game server group. Method options include the following: SPOT_ONLY - Only Spot Instances are used in the game server group. If Spot Instances are unavailable or not viable for game hosting, the game server group provides no hosting capacity until Spot Instances can again be used. Until then, no new instances are started, and the existing nonviable Spot Instances are terminated (after current gameplay ends) and are not replaced. SPOT_PREFERRED - (default value) Spot Instances are used whenever available in the game server group. If Spot Instances are unavailable, the game server group continues to provide hosting capacity by falling back to On-Demand Instances. Existing nonviable Spot Instances are terminated (after current gameplay ends) and are replaced with new On-Demand Instances. ON_DEMAND_ONLY - Only On-Demand Instances are used in the game server group. No Spot Instances are used, even when available, while this balancing strategy is in force."
              required:
                - GameServerGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGameServerGroupOutput"
  /UpdateGameSession:
    post:
      operationId: UpdateGameSession
      description: "This API works with the following fleet types: EC2, Anywhere, Container Updates the mutable properties of a game session. To update a game session, specify the game session ID and the values you want to change. If successful, the updated GameSession object is returned. All APIs by task"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateGameSession
            default: GameLift.UpdateGameSession
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GameSessionId:
                  $ref: "#/components/schemas/ArnStringModel"
                  description: "An identifier for the game session that is unique across all regions to update. The value is always a full ARN in the following format: arn:aws:gamelift:`<location>`::gamesession/<fleet ID>/<ID string>."
                MaximumPlayerSessionCount:
                  $ref: "#/components/schemas/WholeNumber"
                  description: The maximum number of players that can be connected simultaneously to the game session.
                Name:
                  $ref: "#/components/schemas/NonZeroAndMaxString"
                  description: A descriptive label that is associated with a game session. Session names do not need to be unique.
                PlayerSessionCreationPolicy:
                  $ref: "#/components/schemas/PlayerSessionCreationPolicy"
                  description: A policy that determines whether the game session is accepting new players.
                ProtectionPolicy:
                  $ref: "#/components/schemas/ProtectionPolicy"
                  description: Game session protection policy to apply to this game session only. NoProtection -- The game session can be terminated during a scale-down event. FullProtection -- If the game session is in an ACTIVE status, it cannot be terminated during a scale-down event.
                GameProperties:
                  $ref: "#/components/schemas/GamePropertyList"
                  description: 'A set of key-value pairs that can store custom data in a game session. For example: {"Key": "difficulty", "Value": "novice"}. You can use this parameter to modify game properties in an active game session. This action adds new properties and modifies existing properties. There is no way to delete properties. For an example, see Update the value of a game property. Avoid using periods (".") in property keys if you plan to search for game sessions by properties. Property keys containing periods cannot be searched and will be filtered out from search results due to search index limitations. If you use SearchGameSessions API, there is a limit of 500 game property keys across all game sessions and all fleets per region. If the limit is exceeded, there will potentially be game session entries missing from SearchGameSessions API results.'
              required:
                - GameSessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGameSessionOutput"
  /UpdateGameSessionQueue:
    post:
      operationId: UpdateGameSessionQueue
      description: "This API works with the following fleet types: EC2, Anywhere, Container Updates the configuration of a game session queue, which determines how the queue processes new game session requests. To update settings, specify the queue name to be updated and provide the new settings. When updating destinations, provide a complete list of destinations. Learn more Using Multi-Region Queues"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateGameSessionQueue
            default: GameLift.UpdateGameSessionQueue
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/GameSessionQueueNameOrArn"
                  description: A descriptive label that is associated with game session queue. Queue names must be unique within each Region. You can use either the queue ID or ARN value.
                TimeoutInSeconds:
                  $ref: "#/components/schemas/WholeNumber"
                  description: The maximum time, in seconds, that a new game session placement request remains in the queue. When a request exceeds this time, the game session placement changes to a TIMED_OUT status. The minimum value is 10 and the maximum value is 600.
                PlayerLatencyPolicies:
                  $ref: "#/components/schemas/PlayerLatencyPolicyList"
                  description: A set of policies that enforce a sliding cap on player latency when processing game sessions placement requests. Use multiple policies to gradually relax the cap over time if Amazon GameLift Servers can't make a placement. Policies are evaluated in order starting with the lowest maximum latency value. When updating policies, provide a complete collection of policies.
                Destinations:
                  $ref: "#/components/schemas/GameSessionQueueDestinationList"
                  description: A list of fleets and/or fleet aliases that can be used to fulfill game session placement requests in the queue. Destinations are identified by either a fleet ARN or a fleet alias ARN, and are listed in order of placement preference. When updating this list, provide a complete list of destinations.
                FilterConfiguration:
                  $ref: "#/components/schemas/FilterConfiguration"
                  description: A list of locations where a queue is allowed to place new game sessions. Locations are specified in the form of Amazon Web Services Region codes, such as us-west-2. If this parameter is not set, game sessions can be placed in any queue location. To remove an existing filter configuration, pass in an empty set.
                PriorityConfiguration:
                  $ref: "#/components/schemas/PriorityConfiguration"
                  description: Custom settings to use when prioritizing destinations and locations for game session placements. This configuration replaces the FleetIQ default prioritization process. Priority types that are not explicitly named will be automatically applied at the end of the prioritization process. To remove an existing priority configuration, pass in an empty set.
                CustomEventData:
                  $ref: "#/components/schemas/QueueCustomEventData"
                  description: Information to be added to all events that are related to this game session queue.
                NotificationTarget:
                  $ref: "#/components/schemas/QueueSnsArnStringModel"
                  description: An SNS topic ARN that is set up to receive game session placement notifications. See Setting up notifications for game session placement.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGameSessionQueueOutput"
  /UpdateMatchmakingConfiguration:
    post:
      operationId: UpdateMatchmakingConfiguration
      description: "This API works with the following fleet types: EC2, Anywhere, Container Updates settings for a FlexMatch matchmaking configuration. These changes affect all matches and game sessions that are created after the update. To update settings, specify the configuration name to be updated and provide the new settings. Learn more Design a FlexMatch matchmaker"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateMatchmakingConfiguration
            default: GameLift.UpdateMatchmakingConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/MatchmakingConfigurationName"
                  description: A unique identifier for the matchmaking configuration to update. You can use either the configuration name or ARN value.
                Description:
                  $ref: "#/components/schemas/NonZeroAndMaxString"
                  description: A description for the matchmaking configuration.
                GameSessionQueueArns:
                  $ref: "#/components/schemas/QueueArnsList"
                  description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers game session queue resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::gamesessionqueue/<queue name>. Queues can be located in any Region. Queues are used to start new Amazon GameLift Servers-hosted game sessions for matches that are created with this matchmaking configuration. If FlexMatchMode is set to STANDALONE, do not set this parameter.
                RequestTimeoutSeconds:
                  $ref: "#/components/schemas/MatchmakingRequestTimeoutInteger"
                  description: The maximum duration, in seconds, that a matchmaking ticket can remain in process before timing out. Requests that fail due to timing out can be resubmitted as needed.
                AcceptanceTimeoutSeconds:
                  $ref: "#/components/schemas/MatchmakingAcceptanceTimeoutInteger"
                  description: The length of time (in seconds) to wait for players to accept a proposed match, if acceptance is required.
                AcceptanceRequired:
                  $ref: "#/components/schemas/BooleanModel"
                  description: A flag that indicates whether a match that was created with this configuration must be accepted by the matched players. To require acceptance, set to TRUE. With this option enabled, matchmaking tickets use the status REQUIRES_ACCEPTANCE to indicate when a completed potential match is waiting for player acceptance.
                RuleSetName:
                  $ref: "#/components/schemas/MatchmakingRuleSetName"
                  description: A unique identifier for the matchmaking rule set to use with this configuration. You can use either the rule set name or ARN value. A matchmaking configuration can only use rule sets that are defined in the same Region.
                NotificationTarget:
                  $ref: "#/components/schemas/SnsArnStringModel"
                  description: An SNS topic ARN that is set up to receive matchmaking notifications. See Setting up notifications for matchmaking for more information.
                AdditionalPlayerCount:
                  $ref: "#/components/schemas/WholeNumber"
                  description: The number of player slots in a match to keep open for future players. For example, if the configuration's rule set specifies a match for a single 12-person team, and the additional player count is set to 2, only 10 players are selected for the match. This parameter is not used if FlexMatchMode is set to STANDALONE.
                CustomEventData:
                  $ref: "#/components/schemas/CustomEventData"
                  description: Information to add to all events related to the matchmaking configuration.
                GameProperties:
                  $ref: "#/components/schemas/GamePropertyList"
                  description: 'A set of key-value pairs that can store custom data in a game session. For example: {"Key": "difficulty", "Value": "novice"}. This information is added to the new GameSession object that is created for a successful match. This parameter is not used if FlexMatchMode is set to STANDALONE. Avoid using periods (".") in property keys if you plan to search for game sessions by properties. Property keys containing periods cannot be searched and will be filtered out from search results due to search index limitations. If you use SearchGameSessions API, there is a limit of 500 game property keys across all game sessions and all fleets per region. If the limit is exceeded, there will potentially be game session entries missing from SearchGameSessions API results.'
                GameSessionData:
                  $ref: "#/components/schemas/GameSessionData"
                  description: A set of custom game session properties, formatted as a single string value. This data is passed to a game server process with a request to start a new game session. For more information, see Start a game session. This information is added to the game session that is created for a successful match. This parameter is not used if FlexMatchMode is set to STANDALONE.
                BackfillMode:
                  $ref: "#/components/schemas/BackfillMode"
                  description: The method that is used to backfill game sessions created with this matchmaking configuration. Specify MANUAL when your game manages backfill requests manually or does not use the match backfill feature. Specify AUTOMATIC to have GameLift create a match backfill request whenever a game session has one or more open slots. Learn more about manual and automatic backfill in Backfill Existing Games with FlexMatch. Automatic backfill is not available when FlexMatchMode is set to STANDALONE.
                FlexMatchMode:
                  $ref: "#/components/schemas/FlexMatchMode"
                  description: Indicates whether this matchmaking configuration is being used with Amazon GameLift Servers hosting or as a standalone matchmaking solution. STANDALONE - FlexMatch forms matches and returns match information, including players and team assignments, in a MatchmakingSucceeded event. WITH_QUEUE - FlexMatch forms matches and uses the specified Amazon GameLift Servers queue to start a game session for the match.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMatchmakingConfigurationOutput"
  /UpdateRuntimeConfiguration:
    post:
      operationId: UpdateRuntimeConfiguration
      description: "This API works with the following fleet types: EC2 Updates the runtime configuration for the specified fleet. The runtime configuration tells Amazon GameLift Servers how to launch server processes on computes in managed EC2 and Anywhere fleets. You can update a fleet's runtime configuration at any time after the fleet is created; it does not need to be in ACTIVE status. To update runtime configuration, specify the fleet ID and provide a RuntimeConfiguration with an updated set of server process configurations. If successful, the fleet's runtime configuration settings are updated. Fleet computes that run game server processes regularly check for and receive updated runtime configurations. The computes immediately take action to comply with the new configuration by launching new server processes or by not replacing existing processes when they shut down. Updating a fleet's runtime configuration never affects existing server processes. Learn more Setting up Amazon GameLift Servers fleets"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateRuntimeConfiguration
            default: GameLift.UpdateRuntimeConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet to update runtime configuration for. You can use either the fleet ID or ARN value.
                RuntimeConfiguration:
                  $ref: "#/components/schemas/RuntimeConfiguration"
                  description: Instructions for launching server processes on fleet computes. Server processes run either a custom game build executable or a Amazon GameLift Servers Realtime script. The runtime configuration lists the types of server processes to run, how to launch them, and the number of processes to run concurrently.
              required:
                - FleetId
                - RuntimeConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRuntimeConfigurationOutput"
  /UpdateScript:
    post:
      operationId: UpdateScript
      description: "This API works with the following fleet types: EC2 Updates Realtime script metadata and content. To update script metadata, specify the script ID and provide updated name and/or version values. To update script content, provide an updated zip file by pointing to either a local file or an Amazon S3 bucket location. You can use either method regardless of how the original script was uploaded. Use the Version parameter to track updates to the script. If the call is successful, the updated metadata is stored in the script record and a revised script is uploaded to the Amazon GameLift Servers service. Once the script is updated and acquired by a fleet instance, the new version is used for all new game sessions. Learn more Amazon GameLift Servers Amazon GameLift Servers Realtime Related actions All APIs by task"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.UpdateScript
            default: GameLift.UpdateScript
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ScriptId:
                  $ref: "#/components/schemas/ScriptIdOrArn"
                  description: A unique identifier for the Realtime script to update. You can use either the script ID or ARN value.
                Name:
                  $ref: "#/components/schemas/NonZeroAndMaxString"
                  description: A descriptive label that is associated with a script. Script names do not need to be unique.
                Version:
                  $ref: "#/components/schemas/NonZeroAndMaxString"
                  description: Version information that is associated with a build or script. Version strings do not need to be unique.
                StorageLocation:
                  $ref: "#/components/schemas/S3Location"
                  description: The location of the Amazon S3 bucket where a zipped file containing your Realtime scripts is stored. The storage location must specify the Amazon S3 bucket name, the zip file name (the "key"), and a role ARN that allows Amazon GameLift Servers to access the Amazon S3 storage location. The S3 bucket must be in the same Region where you want to create a new script. By default, Amazon GameLift Servers uploads the latest version of the zip file; if you have S3 object versioning turned on, you can use the ObjectVersion parameter to specify an earlier version.
                ZipFile:
                  $ref: "#/components/schemas/ZipBlob"
                  description: 'A data object containing your Realtime scripts and dependencies as a zip file. The zip file can have one or multiple files. Maximum size of a zip file is 5 MB. When using the Amazon Web Services CLI tool to create a script, this parameter is set to the zip file name. It must be prepended with the string "fileb://" to indicate that the file data is a binary object. For example: --zip-file fileb://myRealtimeScript.zip.'
              required:
                - ScriptId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScriptOutput"
  /ValidateMatchmakingRuleSet:
    post:
      operationId: ValidateMatchmakingRuleSet
      description: "This API works with the following fleet types: EC2, Anywhere, Container Validates the syntax of a matchmaking rule or rule set. This operation checks that the rule set is using syntactically correct JSON and that it conforms to allowed property expressions. To validate syntax, provide a rule set JSON string. Learn more Build a rule set"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.ValidateMatchmakingRuleSet
            default: GameLift.ValidateMatchmakingRuleSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RuleSetBody:
                  $ref: "#/components/schemas/RuleSetBody"
                  description: A collection of matchmaking rules to validate, formatted as a JSON string.
              required:
                - RuleSetBody
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateMatchmakingRuleSetOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    MatchmakingIdStringModel:
      type: string
      maxLength: 128
      pattern: "[a-zA-Z0-9-\\.]*"
    PlayerIdsForAcceptMatch:
      type: array
      items:
        $ref: "#/components/schemas/PlayerId"
    PlayerId:
      type: string
      minLength: 1
      maxLength: 1024
    AcceptanceType:
      type: string
      enum:
        - ACCEPT
        - REJECT
    AcceptMatchOutput:
      type: object
    GameServerGroupNameOrArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9-\\.]+|^arn:.*:gameservergroup\\/[a-zA-Z0-9-\\.]+"
    GameServerId:
      type: string
      minLength: 3
      maxLength: 128
      pattern: "[a-zA-Z0-9-\\.]+"
    GameServerData:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .*\S.*
    ClaimFilterOption:
      description: Filters which game servers may be claimed when calling ClaimGameServer.
      type: object
      properties:
        InstanceStatuses:
          $ref: "#/components/schemas/FilterInstanceStatuses"
          description: List of instance statuses that game servers may be claimed on. If provided, the list must contain the ACTIVE status.
    FilterInstanceStatuses:
      type: array
      items:
        $ref: "#/components/schemas/FilterInstanceStatus"
    FilterInstanceStatus:
      type: string
      enum:
        - ACTIVE
        - DRAINING
    ClaimGameServerOutput:
      type: object
      properties:
        GameServer:
          $ref: "#/components/schemas/GameServer"
          description: Object that describes the newly claimed game server.
    GameServer:
      description: Properties describing a game server that is running on an instance in a game server group. A game server is created by a successful call to RegisterGameServer and deleted by calling DeregisterGameServer. A game server is claimed to host a game session by calling ClaimGameServer.
      type: object
      properties:
        GameServerGroupName:
          $ref: "#/components/schemas/GameServerGroupName"
          description: A unique identifier for the game server group where the game server is running.
        GameServerGroupArn:
          $ref: "#/components/schemas/GameServerGroupArn"
          description: The ARN identifier for the game server group where the game server is located.
        GameServerId:
          $ref: "#/components/schemas/GameServerId"
          description: A custom string that uniquely identifies the game server. Game server IDs are developer-defined and are unique across all game server groups in an Amazon Web Services account.
        InstanceId:
          $ref: "#/components/schemas/GameServerInstanceId"
          description: "The unique identifier for the instance where the game server is running. This ID is available in the instance metadata. EC2 instance IDs use a 17-character format, for example: i-1234567890abcdef0."
        ConnectionInfo:
          $ref: "#/components/schemas/GameServerConnectionInfo"
          description: The port and IP address that must be used to establish a client connection to the game server.
        GameServerData:
          $ref: "#/components/schemas/GameServerData"
          description: A set of custom game server properties, formatted as a single string value. This data is passed to a game client or service when it requests information on game servers.
        ClaimStatus:
          $ref: "#/components/schemas/GameServerClaimStatus"
          description: Indicates when an available game server has been reserved for gameplay but has not yet started hosting a game. Once it is claimed, the game server remains in CLAIMED status for a maximum of one minute. During this time, game clients connect to the game server to start the game and trigger the game server to update its utilization status. After one minute, the game server claim status reverts to null.
        UtilizationStatus:
          $ref: "#/components/schemas/GameServerUtilizationStatus"
          description: "Indicates whether the game server is currently available for new games or is busy. Possible statuses include: AVAILABLE - The game server is available to be claimed. A game server that has been claimed remains in this status until it reports game hosting activity. UTILIZED - The game server is currently hosting a game session with players."
        RegistrationTime:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp that indicates when the game server registered. The format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        LastClaimTime:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp that indicates the last time the game server was claimed. The format is a number expressed in Unix time as milliseconds (for example "1469498468.057"). This value is used to calculate when a claimed game server's status should revert to null.
        LastHealthCheckTime:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp that indicates the last time the game server was updated with health status. The format is a number expressed in Unix time as milliseconds (for example "1469498468.057"). After game server registration, this property is only changed when a game server update specifies a health check value.
    GameServerGroupName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9-\\.]+"
    GameServerGroupArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^arn:.*:gameservergroup\/[a-zA-Z0-9-\.]*
    GameServerInstanceId:
      type: string
      minLength: 19
      maxLength: 19
      pattern: ^i-[0-9a-zA-Z]{17}$
    GameServerConnectionInfo:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*\S.*
    GameServerClaimStatus:
      type: string
      enum:
        - CLAIMED
    GameServerUtilizationStatus:
      type: string
      enum:
        - AVAILABLE
        - UTILIZED
    Timestamp:
      type: string
      format: date-time
    NonBlankAndLengthConstraintString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .*\S.*
    NonZeroAndMaxString:
      type: string
      minLength: 1
      maxLength: 1024
    RoutingStrategy:
      description: The routing configuration for a fleet alias. Related actions All APIs by task
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/RoutingStrategyType"
          description: "The type of routing strategy for the alias. Possible routing types include the following: SIMPLE - The alias resolves to one specific fleet. Use this type when routing to active fleets. TERMINAL - The alias does not resolve to a fleet but instead can be used to display a message to the user. A terminal alias throws a TerminalRoutingStrategyException with the message embedded."
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet that the alias points to. This value is the fleet ID, not the fleet ARN.
        Message:
          $ref: "#/components/schemas/FreeText"
          description: The message text to be used with a terminal routing strategy.
    RoutingStrategyType:
      type: string
      enum:
        - SIMPLE
        - TERMINAL
    FleetId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-z]*fleet-[a-zA-Z0-9\-]+
    FreeText:
      type: string
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A label that you can assign to a Amazon GameLift Servers resource. Learn more Tagging Amazon Web Services Resources in the Amazon Web Services General Reference Amazon Web Services Tagging Strategies Related actions All APIs by task
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key for a developer-defined key value pair for tagging an Amazon Web Services resource.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value for a developer-defined key value pair for tagging an Amazon Web Services resource.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateAliasOutput:
      type: object
      properties:
        Alias:
          $ref: "#/components/schemas/Alias"
          description: The newly created alias resource.
    Alias:
      description: Properties that describe an alias resource. Related actions All APIs by task
      type: object
      properties:
        AliasId:
          $ref: "#/components/schemas/AliasId"
          description: A unique identifier for the alias. Alias IDs are unique within a Region.
        Name:
          $ref: "#/components/schemas/NonBlankAndLengthConstraintString"
          description: A descriptive label that is associated with an alias. Alias names do not need to be unique.
        AliasArn:
          $ref: "#/components/schemas/AliasArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers alias resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::alias/alias-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912. In a GameLift alias ARN, the resource ID matches the alias ID value.
        Description:
          $ref: "#/components/schemas/FreeText"
          description: A human-readable description of an alias.
        RoutingStrategy:
          $ref: "#/components/schemas/RoutingStrategy"
          description: The routing configuration, including routing type and fleet target, for the alias.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this data object was last modified. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
    AliasId:
      type: string
      pattern: ^alias-\S+
    AliasArn:
      type: string
      pattern: ^arn:.*:alias\/alias-\S+
    S3Location:
      description: The location in Amazon S3 where build or script files are stored for access by Amazon GameLift Servers.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/NonEmptyString"
          description: An Amazon S3 bucket identifier. Thename of the S3 bucket. Amazon GameLift Servers doesn't support uploading from Amazon S3 buckets with names that contain a dot (.).
        Key:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the zip file that contains the build files or script files.
        RoleArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) for an IAM role that allows Amazon GameLift Servers to access the S3 bucket.
        ObjectVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: The version of the file, if object versioning is turned on for the bucket. Amazon GameLift Servers uses this information when retrieving files from an S3 bucket that you own. Use this parameter to specify a specific version of the file. If not set, the latest version of the file is retrieved.
    NonEmptyString:
      type: string
      minLength: 1
    OperatingSystem:
      type: string
      enum:
        - WINDOWS_2012
        - AMAZON_LINUX
        - AMAZON_LINUX_2
        - WINDOWS_2016
        - AMAZON_LINUX_2023
        - WINDOWS_2022
    ServerSdkVersion:
      description: Data type used for server SDK version.
      type: string
      maxLength: 128
      pattern: ^\d+\.\d+\.\d+$
    CreateBuildOutput:
      type: object
      properties:
        Build:
          $ref: "#/components/schemas/Build"
          description: The newly created build resource, including a unique build IDs and status.
        UploadCredentials:
          $ref: "#/components/schemas/AwsCredentials"
          description: This element is returned only when the operation is called without a storage location. It contains credentials to use when you are uploading a build file to an Amazon S3 bucket that is owned by Amazon GameLift Servers. Credentials have a limited life span. To refresh these credentials, call RequestUploadCredentials.
        StorageLocation:
          $ref: "#/components/schemas/S3Location"
          description: Amazon S3 location for your game build file, including bucket name and key.
    Build:
      description: Properties describing a custom game build. All APIs by task
      type: object
      properties:
        BuildId:
          $ref: "#/components/schemas/BuildId"
          description: A unique identifier for the build.
        BuildArn:
          $ref: "#/components/schemas/BuildArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers build resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::build/build-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912. In a GameLift build ARN, the resource ID matches the BuildId value.
        Name:
          $ref: "#/components/schemas/FreeText"
          description: A descriptive label that is associated with a build. Build names do not need to be unique. It can be set using CreateBuild or UpdateBuild.
        Version:
          $ref: "#/components/schemas/FreeText"
          description: Version information that is associated with a build or script. Version strings do not need to be unique.
        Status:
          $ref: "#/components/schemas/BuildStatus"
          description: "Current status of the build. Possible build statuses include the following: INITIALIZED -- A new build has been defined, but no files have been uploaded. You cannot create fleets for builds that are in this status. When a build is successfully created, the build status is set to this value. READY -- The game build has been successfully uploaded. You can now create new fleets for this build. FAILED -- The game build upload failed. You cannot create new fleets for this build."
        SizeOnDisk:
          $ref: "#/components/schemas/WholeNumberLong"
          description: File size of the uploaded game build, expressed in bytes. When the build status is INITIALIZED or when using a custom Amazon S3 storage location, this value is 0.
        OperatingSystem:
          $ref: "#/components/schemas/OperatingSystem"
          description: Operating system that the game server binaries are built to run on. This value determines the type of fleet resources that you can use for this build. Amazon Linux 2 (AL2) will reach end of support on 6/30/2026. See more details in the Amazon Linux 2 FAQs. For game servers that are hosted on AL2 and use server SDK version 4.x for Amazon GameLift Servers, first update the game server build to server SDK 5.x, and then deploy to AL2023 instances. See Migrate to server SDK version 5.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        ServerSdkVersion:
          $ref: "#/components/schemas/ServerSdkVersion"
          description: The Amazon GameLift Servers Server SDK version used to develop your game server.
    BuildId:
      type: string
      pattern: ^build-\S+
    BuildArn:
      type: string
      pattern: ^arn:.*:build\/build-\S+
    BuildStatus:
      type: string
      enum:
        - INITIALIZED
        - READY
        - FAILED
    WholeNumberLong:
      type: integer
      format: int64
      minimum: 0
    AwsCredentials:
      description: "Amazon Web Services account security credentials that allow interactions with Amazon GameLift Servers resources. The credentials are temporary and valid for a limited time span. You can request fresh credentials at any time. Amazon Web Services security credentials consist of three parts: an access key ID, a secret access key, and a session token. You must use all three parts together to authenticate your access requests. You need Amazon Web Services credentials for the following tasks: To upload a game server build directly to Amazon GameLift Servers S3 storage using CreateBuild. To get access for this task, call https://docs.aws.amazon.com/gamelift/latest/apireference/API_RequestUploadCredentials.html. To remotely connect to an active Amazon GameLift Servers fleet instances. To get remote access, call https://docs.aws.amazon.com/gamelift/latest/apireference/API_GetComputeAccess.html."
      type: object
      properties:
        AccessKeyId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The access key ID that identifies the temporary security credentials.
        SecretAccessKey:
          $ref: "#/components/schemas/NonEmptyString"
          description: The secret access key that can be used to sign requests.
        SessionToken:
          $ref: "#/components/schemas/NonEmptyString"
          description: The token that users must pass to the service API to use the temporary credentials.
    IamRoleArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^arn:.*:role\/[\w+=,.@-]+
    ContainerGroupDefinitionNameOrArn:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^[a-zA-Z0-9\-]+$|^arn:.*:containergroupdefinition\/[a-zA-Z0-9\-]+(:[0-9]+)?$
    ConnectionPortRange:
      description: The set of port numbers to open on each instance in a container fleet. Connection ports are used by inbound traffic to connect with processes that are running in containers on the fleet. The port range must not overlap with the Amazon GameLift Servers reserved port range 4092-4191. This range is reserved for internal Amazon GameLift Servers services.
      type: object
      properties:
        FromPort:
          $ref: "#/components/schemas/PortNumber"
          description: Starting value for the port range.
        ToPort:
          $ref: "#/components/schemas/PortNumber"
          description: Ending value for the port. Port numbers are end-inclusive. This value must be equal to or greater than FromPort.
      required:
        - FromPort
        - ToPort
    PortNumber:
      type: integer
      minimum: 1
      maximum: 60000
    IpPermissionsList:
      type: array
      items:
        $ref: "#/components/schemas/IpPermission"
    IpPermission:
      description: A range of IP addresses and port settings that allow inbound traffic to connect to processes on an instance in a fleet. Processes are assigned an IP address/port number combination, which must fall into the fleet's allowed ranges. For Amazon GameLift Servers Realtime fleets, Amazon GameLift Servers automatically opens two port ranges, one for TCP messaging and one for UDP.
      type: object
      properties:
        FromPort:
          $ref: "#/components/schemas/PortNumber"
          description: A starting value for a range of allowed port numbers. For fleets using Linux builds, only ports 22 and 1026-60000 are valid. For fleets using Windows builds, only ports 1026-60000 are valid.
        ToPort:
          $ref: "#/components/schemas/PortNumber"
          description: An ending value for a range of allowed port numbers. Port numbers are end-inclusive. This value must be equal to or greater than FromPort. For fleets using Linux builds, only ports 22 and 1026-60000 are valid. For fleets using Windows builds, only ports 1026-60000 are valid.
        IpRange:
          $ref: "#/components/schemas/IpRange"
          description: 'A range of allowed IP addresses. This value must be expressed in CIDR notation. Example: "000.000.000.000/[subnet mask]" or optionally the shortened version "0.0.0.0/[subnet mask]".'
        Protocol:
          $ref: "#/components/schemas/IpProtocol"
          description: The network communication protocol used by the fleet.
      required:
        - FromPort
        - ToPort
        - IpRange
        - Protocol
    IpRange:
      type: string
      pattern: "[^\\s]+"
    IpProtocol:
      type: string
      enum:
        - TCP
        - UDP
    GameServerContainerGroupsPerInstance:
      type: integer
      minimum: 1
      maximum: 5000
    ContainerFleetBillingType:
      type: string
      enum:
        - ON_DEMAND
        - SPOT
    LocationConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/LocationConfiguration"
    LocationConfiguration:
      description: A remote location where a multi-location fleet can deploy game servers for game hosting.
      type: object
      properties:
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: An Amazon Web Services Region code, such as us-west-2. For a list of supported Regions and Local Zones, see Amazon GameLift Servers service locations for managed hosting.
      required:
        - Location
    LocationStringModel:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[A-Za-z0-9\-]+
    MetricGroupList:
      type: array
      items:
        $ref: "#/components/schemas/MetricGroup"
    MetricGroup:
      type: string
      minLength: 1
      maxLength: 255
    ProtectionPolicy:
      type: string
      enum:
        - NoProtection
        - FullProtection
    GameSessionCreationLimitPolicy:
      description: A policy that puts limits on the number of game sessions that a player can create within a specified span of time. With this policy, you can control players' ability to consume available resources. The policy is evaluated when a player tries to create a new game session. On receiving a CreateGameSession request, Amazon GameLift Servers checks that the player (identified by CreatorId) has created fewer than game session limit in the specified time period.
      type: object
      properties:
        NewGameSessionsPerCreator:
          $ref: "#/components/schemas/WholeNumber"
          description: A policy that puts limits on the number of game sessions that a player can create within a specified span of time. With this policy, you can control players' ability to consume available resources. The policy evaluates when a player tries to create a new game session. On receiving a CreateGameSession request, Amazon GameLift Servers checks that the player (identified by CreatorId) has created fewer than game session limit in the specified time period.
        PolicyPeriodInMinutes:
          $ref: "#/components/schemas/WholeNumber"
          description: The time span used in evaluating the resource creation limit policy.
    WholeNumber:
      type: integer
      minimum: 0
    LogConfiguration:
      description: "A method for collecting container logs for the fleet. Amazon GameLift Servers saves all standard output for each container in logs, including game session logs. You can select from the following methods:"
      type: object
      properties:
        LogDestination:
          $ref: "#/components/schemas/LogDestination"
          description: The type of log collection to use for a fleet. CLOUDWATCH -- (default value) Send logs to an Amazon CloudWatch log group that you define. Each container emits a log stream, which is organized in the log group. S3 -- Store logs in an Amazon S3 bucket that you define. This bucket must reside in the fleet's home Amazon Web Services Region. NONE -- Don't collect container logs.
        S3BucketName:
          $ref: "#/components/schemas/NonEmptyString"
          description: If log destination is S3, logs are sent to the specified Amazon S3 bucket name.
        LogGroupArn:
          $ref: "#/components/schemas/LogGroupArnStringModel"
          description: If log destination is CLOUDWATCH, logs are sent to the specified log group in Amazon CloudWatch.
    LogDestination:
      type: string
      enum:
        - NONE
        - CLOUDWATCH
        - S3
    LogGroupArnStringModel:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[a-zA-Z0-9:/\\-\\*]+"
    PlayerGatewayMode:
      type: string
      enum:
        - DISABLED
        - ENABLED
        - REQUIRED
    CreateContainerFleetOutput:
      type: object
      properties:
        ContainerFleet:
          $ref: "#/components/schemas/ContainerFleet"
          description: The properties for the new container fleet, including current status. All fleets are initially placed in PENDING status.
    ContainerFleet:
      description: Describes an Amazon GameLift Servers managed container fleet.
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the container fleet to retrieve.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912. In a GameLift fleet ARN, the resource ID matches the FleetId value.
        FleetRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The unique identifier for an Identity and Access Management (IAM) role with permissions to run your containers on resources that are managed by Amazon GameLift Servers. See Set up an IAM service role. This fleet property can't be changed.
        GameServerContainerGroupDefinitionName:
          $ref: "#/components/schemas/ContainerGroupDefinitionName"
          description: The name of the fleet's game server container group definition, which describes how to deploy containers with your game server build and support software onto each fleet instance.
        GameServerContainerGroupDefinitionArn:
          $ref: "#/components/schemas/ContainerGroupDefinitionArn"
          description: The Amazon Resource Name (ARN) that is assigned to the fleet's game server container group. The ARN value also identifies the specific container group definition version in use.
        PerInstanceContainerGroupDefinitionName:
          $ref: "#/components/schemas/ContainerGroupDefinitionName"
          description: The name of the fleet's per-instance container group definition.
        PerInstanceContainerGroupDefinitionArn:
          $ref: "#/components/schemas/ContainerGroupDefinitionArn"
          description: The Amazon Resource Name (ARN) that is assigned to the fleet's per-instance container group. The ARN value also identifies the specific container group definition version in use.
        InstanceConnectionPortRange:
          $ref: "#/components/schemas/ConnectionPortRange"
        InstanceInboundPermissions:
          $ref: "#/components/schemas/IpPermissionsList"
          description: The IP address ranges and port settings that allow inbound traffic to access game server processes and other processes on this fleet.
        GameServerContainerGroupsPerInstance:
          $ref: "#/components/schemas/GameServerContainerGroupsPerInstance"
          description: The number of times to replicate the game server container group on each fleet instance.
        MaximumGameServerContainerGroupsPerInstance:
          $ref: "#/components/schemas/MaximumGameServerContainerGroupsPerInstance"
          description: The calculated maximum number of game server container group that can be deployed on each fleet instance. The calculation depends on the resource needs of the container group and the CPU and memory resources of the fleet's instance type.
        InstanceType:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: The Amazon EC2 instance type to use for all instances in the fleet. Instance type determines the computing resources and processing power that's available to host your game servers. This includes including CPU, memory, storage, and networking capacity. You can't update this fleet property.
        BillingType:
          $ref: "#/components/schemas/ContainerFleetBillingType"
          description: Indicates whether the fleet uses On-Demand or Spot instances for this fleet. Learn more about when to use On-Demand versus Spot Instances. You can't update this fleet property. By default, this property is set to ON_DEMAND.
        Description:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A meaningful description of the container fleet.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        MetricGroups:
          $ref: "#/components/schemas/MetricGroupList"
          description: The name of an Amazon Web Services CloudWatch metric group to add this fleet to. Metric groups aggregate metrics for multiple fleets.
        NewGameSessionProtectionPolicy:
          $ref: "#/components/schemas/ProtectionPolicy"
          description: Determines whether Amazon GameLift Servers can shut down game sessions on the fleet that are actively running and hosting players. Amazon GameLift Servers might prompt an instance shutdown when scaling down fleet capacity or when retiring unhealthy instances. You can also set game session protection for individual game sessions using UpdateGameSession. NoProtection -- Game sessions can be shut down during active gameplay. FullProtection -- Game sessions in ACTIVE status can't be shut down.
        GameSessionCreationLimitPolicy:
          $ref: "#/components/schemas/GameSessionCreationLimitPolicy"
          description: A policy that limits the number of game sessions that each individual player can create on instances in this fleet. The limit applies for a specified span of time.
        Status:
          $ref: "#/components/schemas/ContainerFleetStatus"
          description: The current status of the container fleet. PENDING -- A new container fleet has been requested. CREATING -- A new container fleet resource is being created. CREATED -- A new container fleet resource has been created. No fleet instances have been deployed. ACTIVATING -- New container fleet instances are being deployed. ACTIVE -- The container fleet has been deployed and is ready to host game sessions. UPDATING -- Updates to the container fleet is being updated. A deployment is in progress.
        DeploymentDetails:
          $ref: "#/components/schemas/DeploymentDetails"
          description: Information about the most recent deployment for the container fleet.
        LogConfiguration:
          $ref: "#/components/schemas/LogConfiguration"
          description: The method that is used to collect container logs for the fleet. Amazon GameLift Servers saves all standard output for each container in logs, including game session logs. CLOUDWATCH -- Send logs to an Amazon CloudWatch log group that you define. Each container emits a log stream, which is organized in the log group. S3 -- Store logs in an Amazon S3 bucket that you define. NONE -- Don't collect container logs.
        LocationAttributes:
          $ref: "#/components/schemas/ContainerFleetLocationAttributesList"
          description: Information about the container fleet's remote locations where fleet instances are deployed.
        PlayerGatewayMode:
          $ref: "#/components/schemas/PlayerGatewayMode"
          description: Indicates whether player gateway is enabled for this container fleet. Player gateway provides benefits such as DDoS protection with negligible impact to latency. If ENABLED or REQUIRED, game clients can use player gateway to connect with the game server. If DISABLED, game clients cannot use player gateway. Instead, they have to directly connect to the game server.
    FleetArn:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^arn:.*:[a-z]*fleet\/[a-z]*fleet-[a-zA-Z0-9\-]+$
    ContainerGroupDefinitionName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9\-]+$
    ContainerGroupDefinitionArn:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^arn:.*:containergroupdefinition\/[a-zA-Z0-9\-]+(:[0-9]+)?$
    MaximumGameServerContainerGroupsPerInstance:
      type: integer
      minimum: 1
      maximum: 5000
    ContainerFleetStatus:
      type: string
      enum:
        - PENDING
        - CREATING
        - CREATED
        - ACTIVATING
        - ACTIVE
        - UPDATING
        - DELETING
    DeploymentDetails:
      description: Information about the most recent deployment for the container fleet.
      type: object
      properties:
        LatestDeploymentId:
          $ref: "#/components/schemas/DeploymentId"
          description: A unique identifier for a fleet deployment.
    DeploymentId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[a-zA-Z0-9\-]+$
    ContainerFleetLocationAttributesList:
      type: array
      items:
        $ref: "#/components/schemas/ContainerFleetLocationAttributes"
    ContainerFleetLocationAttributes:
      description: Details about a location in a multi-location container fleet.
      type: object
      properties:
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: A location identifier.
        Status:
          $ref: "#/components/schemas/ContainerFleetLocationStatus"
          description: The status of fleet activity in the location. PENDING -- A new container fleet has been requested. CREATING -- A new container fleet resource is being created. CREATED -- A new container fleet resource has been created. No fleet instances have been deployed. ACTIVATING -- New container fleet instances are being deployed. ACTIVE -- The container fleet has been deployed and is ready to host game sessions. UPDATING -- Updates to the container fleet is being updated. A deployment is in progress.
        PlayerGatewayStatus:
          $ref: "#/components/schemas/PlayerGatewayStatus"
          description: "The current status of player gateway in this location for this container fleet. Note, even if a container fleet has PlayerGatewayMode configured as ENABLED, player gateway might not be available in a specific location. For more information about locations where player gateway is supported, see Amazon GameLift Servers service locations. Possible values include: ENABLED -- Player gateway is available for this container fleet location. DISABLED -- Player gateway is not available for this container fleet location."
    ContainerFleetLocationStatus:
      type: string
      enum:
        - PENDING
        - CREATING
        - CREATED
        - ACTIVATING
        - ACTIVE
        - UPDATING
        - DELETING
    PlayerGatewayStatus:
      type: string
      enum:
        - DISABLED
        - ENABLED
    ContainerGroupType:
      type: string
      enum:
        - GAME_SERVER
        - PER_INSTANCE
    ContainerTotalMemoryLimit:
      type: integer
      minimum: 4
      maximum: 1024000
    ContainerTotalVcpuLimit:
      type: number
      format: double
      minimum: 0.125
      maximum: 10
    GameServerContainerDefinitionInput:
      description: "Describes the configuration for a container that runs your game server executable. This definition includes container configuration, resources, and start instructions. Use this data type when creating or updating a game server container group definition. For properties of a deployed container, see GameServerContainerDefinition. A game server container is automatically considered essential; if an essential container fails, the entire container group restarts. Use with: CreateContainerGroupDefinition, UpdateContainerGroupDefinition"
      type: object
      properties:
        ContainerName:
          $ref: "#/components/schemas/NonZeroAnd128MaxAsciiString"
          description: A string that uniquely identifies the container definition within a container group.
        DependsOn:
          $ref: "#/components/schemas/ContainerDependencyList"
          description: Establishes dependencies between this container and the status of other containers in the same container group. A container can have dependencies on multiple different containers. You can use dependencies to establish a startup/shutdown sequence across the container group. For example, you might specify that ContainerB has a START dependency on ContainerA. This dependency means that ContainerB can't start until after ContainerA has started. This dependency is reversed on shutdown, which means that ContainerB must shut down before ContainerA can shut down.
        MountPoints:
          $ref: "#/components/schemas/ContainerMountPointList"
          description: A mount point that binds a path inside the container to a file or directory on the host system and lets it access the file or directory.
        EnvironmentOverride:
          $ref: "#/components/schemas/ContainerEnvironmentList"
          description: A set of environment variables to pass to the container on startup. See the ContainerDefinition::environment parameter in the Amazon Elastic Container Service API Reference.
        ImageUri:
          $ref: "#/components/schemas/ImageUriString"
          description: "The location of the container image to deploy to a container fleet. Provide an image in an Amazon Elastic Container Registry public or private repository. The repository must be in the same Amazon Web Services account and Amazon Web Services Region where you're creating the container group definition. For limits on image size, see Amazon GameLift Servers endpoints and quotas. You can use any of the following image URI formats: Image ID only: [AWS account].dkr.ecr.[AWS region].amazonaws.com/[repository ID] Image ID and digest: [AWS account].dkr.ecr.[AWS region].amazonaws.com/[repository ID]@[digest] Image ID and tag: [AWS account].dkr.ecr.[AWS region].amazonaws.com/[repository ID]:[tag]"
        PortConfiguration:
          $ref: "#/components/schemas/ContainerPortConfiguration"
          description: A set of ports that Amazon GameLift Servers can assign to processes in a container. The container port configuration must have enough ports for each container process that accepts inbound traffic connections. For example, a game server process requires a container port to allow game clients to connect to it. A container port configuration can have can have one or more container port ranges. Each range specifies starting and ending values as well as the supported network protocol. Container ports aren't directly accessed by inbound traffic. Amazon GameLift Servers maps each container port to an externally accessible connection port (see the container fleet property ConnectionPortRange).
        ServerSdkVersion:
          $ref: "#/components/schemas/ServerSdkVersion"
          description: The Amazon GameLift Servers server SDK version that the game server is integrated with. Only game servers using 5.2.0 or higher are compatible with container fleets.
      required:
        - ContainerName
        - ImageUri
        - PortConfiguration
        - ServerSdkVersion
    NonZeroAnd128MaxAsciiString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9\-]+$
    ContainerDependencyList:
      type: array
      items:
        $ref: "#/components/schemas/ContainerDependency"
    ContainerDependency:
      description: "A container's dependency on another container in the same container group. The dependency impacts how the dependent container is able to start or shut down based the status of the other container. For example, ContainerA is configured with the following dependency: a START dependency on ContainerB. This means that ContainerA can't start until ContainerB has started. It also means that ContainerA must shut down before ContainerB. Part of: GameServerContainerDefinition, GameServerContainerDefinitionInput, SupportContainerDefinition, SupportContainerDefinitionInput"
      type: object
      properties:
        ContainerName:
          $ref: "#/components/schemas/NonZeroAnd128MaxAsciiString"
          description: A descriptive label for the container definition that this container depends on.
        Condition:
          $ref: "#/components/schemas/ContainerDependencyCondition"
          description: "The condition that the dependency container must reach before the dependent container can start. Valid conditions include: START - The dependency container must have started. COMPLETE - The dependency container has run to completion (exits). Use this condition with nonessential containers, such as those that run a script and then exit. The dependency container can't be an essential container. SUCCESS - The dependency container has run to completion and exited with a zero status. The dependency container can't be an essential container. HEALTHY - The dependency container has passed its Docker health check. Use this condition with dependency containers that have health checks configured. This condition is confirmed at container group startup only."
      required:
        - ContainerName
        - Condition
    ContainerDependencyCondition:
      type: string
      enum:
        - START
        - COMPLETE
        - SUCCESS
        - HEALTHY
    ContainerMountPointList:
      type: array
      items:
        $ref: "#/components/schemas/ContainerMountPoint"
    ContainerMountPoint:
      description: "A mount point that binds a container to a file or directory on the host system. Part of: GameServerContainerDefinition, https://docs.aws.amazon.com/gamelift/latest/apireference/API_GameServerContainerDefinitionInput.html, SupportContainerDefinition, https://docs.aws.amazon.com/gamelift/latest/apireference/API_SupportContainerDefinitionInput.html"
      type: object
      properties:
        InstancePath:
          $ref: "#/components/schemas/InstancePathString"
          description: The path to the source file or directory.
        ContainerPath:
          $ref: "#/components/schemas/ContainerPathString"
          description: The mount path on the container. If this property isn't set, the instance path is used.
        AccessLevel:
          $ref: "#/components/schemas/ContainerMountPointAccessLevel"
          description: The type of access for the container.
      required:
        - InstancePath
    InstancePathString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^\/[\s\S]*$
    ContainerPathString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^(\/+[^\/]+\/*)+$
    ContainerMountPointAccessLevel:
      type: string
      enum:
        - READ_ONLY
        - READ_AND_WRITE
    ContainerEnvironmentList:
      type: array
      items:
        $ref: "#/components/schemas/ContainerEnvironment"
    ContainerEnvironment:
      description: "An environment variable to set inside a container, in the form of a key-value pair. Part of: GameServerContainerDefinition, GameServerContainerDefinitionInput, SupportContainerDefinition, SupportContainerDefinitionInput"
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonZeroAnd255MaxString"
          description: The environment variable name.
        Value:
          $ref: "#/components/schemas/NonZeroAnd255MaxString"
          description: The environment variable value.
      required:
        - Name
        - Value
    NonZeroAnd255MaxString:
      type: string
      minLength: 1
      maxLength: 255
    ImageUriString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9-_\.@\/:]+$
    ContainerPortConfiguration:
      description: "A set of port ranges that can be opened on the container. A process that's running in the container can bind to a port number, making it accessible to inbound traffic when it's mapped to a container fleet's connection port. Each container port range specifies a network protocol. When the configuration supports more than one protocol, we recommend that you use a different range for each protocol. If your ranges have overlapping port numbers, Amazon GameLift Servers maps a duplicated container port number to different connection ports. For example, if you include 1935 in port ranges for both TCP and UDP, it might result in the following mappings: container port 1935 (tcp) => connection port 2001 container port 1935 (udp) => connection port 2002 Part of: GameServerContainerDefinition, GameServerContainerDefinitionInput, SupportContainerDefinition, SupportContainerDefinitionInput"
      type: object
      properties:
        ContainerPortRanges:
          $ref: "#/components/schemas/ContainerPortRangeList"
          description: A set of one or more container port number ranges. The ranges can't overlap if the ranges' network protocols are the same. Overlapping ranges with different protocols is allowed but not recommended.
      required:
        - ContainerPortRanges
    ContainerPortRangeList:
      type: array
      items:
        $ref: "#/components/schemas/ContainerPortRange"
    ContainerPortRange:
      description: "A set of one or more port numbers that can be opened on the container, and the supported network protocol. Part of: ContainerPortConfiguration"
      type: object
      properties:
        FromPort:
          $ref: "#/components/schemas/PortNumber"
          description: A starting value for the range of allowed port numbers.
        ToPort:
          $ref: "#/components/schemas/PortNumber"
          description: An ending value for the range of allowed port numbers. Port numbers are end-inclusive. This value must be equal to or greater than FromPort.
        Protocol:
          $ref: "#/components/schemas/IpProtocol"
          description: The network protocol that these ports support.
      required:
        - FromPort
        - ToPort
        - Protocol
    SupportContainerDefinitionInputList:
      type: array
      items:
        $ref: "#/components/schemas/SupportContainerDefinitionInput"
    SupportContainerDefinitionInput:
      description: "Describes a support container in a container group. You can define a support container in either a game server container group or a per-instance container group. Support containers don't run game server processes. This definition includes container configuration, resources, and start instructions. Use this data type when creating or updating a container group definition. For properties of a deployed support container, see SupportContainerDefinition. Use with: CreateContainerGroupDefinition, UpdateContainerGroupDefinition"
      type: object
      properties:
        ContainerName:
          $ref: "#/components/schemas/NonZeroAnd128MaxAsciiString"
          description: A string that uniquely identifies the container definition within a container group.
        DependsOn:
          $ref: "#/components/schemas/ContainerDependencyList"
          description: Establishes dependencies between this container and the status of other containers in the same container group. A container can have dependencies on multiple different containers. . You can use dependencies to establish a startup/shutdown sequence across the container group. For example, you might specify that ContainerB has a START dependency on ContainerA. This dependency means that ContainerB can't start until after ContainerA has started. This dependency is reversed on shutdown, which means that ContainerB must shut down before ContainerA can shut down.
        MountPoints:
          $ref: "#/components/schemas/ContainerMountPointList"
          description: A mount point that binds a path inside the container to a file or directory on the host system and lets it access the file or directory.
        EnvironmentOverride:
          $ref: "#/components/schemas/ContainerEnvironmentList"
          description: A set of environment variables to pass to the container on startup. See the ContainerDefinition::environment parameter in the Amazon Elastic Container Service API Reference.
        Essential:
          $ref: "#/components/schemas/BooleanModel"
          description: Flags the container as vital for the container group to function properly. If an essential container fails, the entire container group restarts. At least one support container in a per-instance container group must be essential. When flagging a container as essential, also configure a health check so that the container can signal that it's healthy.
        HealthCheck:
          $ref: "#/components/schemas/ContainerHealthCheck"
          description: Configuration for a non-terminal health check. A container automatically restarts if it stops functioning. With a health check, you can define additional reasons to flag a container as unhealthy and restart it. If an essential container fails a health check, the entire container group restarts.
        ImageUri:
          $ref: "#/components/schemas/ImageUriString"
          description: "The location of the container image to deploy to a container fleet. Provide an image in an Amazon Elastic Container Registry public or private repository. The repository must be in the same Amazon Web Services account and Amazon Web Services Region where you're creating the container group definition. For limits on image size, see Amazon GameLift Servers endpoints and quotas. You can use any of the following image URI formats: Image ID only: [AWS account].dkr.ecr.[AWS region].amazonaws.com/[repository ID] Image ID and digest: [AWS account].dkr.ecr.[AWS region].amazonaws.com/[repository ID]@[digest] Image ID and tag: [AWS account].dkr.ecr.[AWS region].amazonaws.com/[repository ID]:[tag]"
        MemoryHardLimitMebibytes:
          $ref: "#/components/schemas/ContainerMemoryLimit"
          description: "A specified amount of memory (in MiB) to reserve for this container. If you don't specify a container-specific memory limit, the container shares the container group's total memory allocation. Related data type: ContainerGroupDefinitionTotalMemoryLimitMebibytes"
        PortConfiguration:
          $ref: "#/components/schemas/ContainerPortConfiguration"
          description: A set of ports that Amazon GameLift Servers can assign to processes in a container. The container port configuration must have enough ports for each container process that accepts inbound traffic connections. A container port configuration can have can have one or more container port ranges. Each range specifies starting and ending values as well as the supported network protocol. Container ports aren't directly accessed by inbound traffic. Amazon GameLift Servers maps each container port to an externally accessible connection port (see the container fleet property ConnectionPortRange).
        Vcpu:
          $ref: "#/components/schemas/ContainerVcpu"
          description: "The number of vCPU units to reserve for this container. The container can use more resources when needed, if available. If you don't reserve CPU units for this container, it shares the container group's total vCPU limit. Related data type: ContainerGroupDefinition TotalCpuLimit"
      required:
        - ContainerName
        - ImageUri
    BooleanModel:
      type: boolean
    ContainerHealthCheck:
      description: "Instructions on when and how to check the health of a support container in a container fleet. These properties override any Docker health checks that are set in the container image. For more information on container health checks, see HealthCheck command in the Amazon Elastic Container Service API. Game server containers don't have a health check parameter; Amazon GameLift Servers automatically handles health checks for these containers. The following example instructs the container to initiate a health check command every 60 seconds and wait 10 seconds for it to succeed. If it fails, retry the command 3 times before flagging the container as unhealthy. It also tells the container to wait 100 seconds after launch before counting failed health checks. {\"Command\": [ \"CMD-SHELL\", \"ps cax | grep \"processmanager\" || exit 1\" ], \"Interval\": 60, \"Timeout\": 10, \"Retries\": 3, \"StartPeriod\": 100 } Part of: SupportContainerDefinition, SupportContainerDefinitionInput"
      type: object
      properties:
        Command:
          $ref: "#/components/schemas/ContainerCommandStringList"
          description: A string array that specifies the command that the container runs to determine if it's healthy.
        Interval:
          $ref: "#/components/schemas/ContainerHealthCheckInterval"
          description: The time period (in seconds) between each health check.
        Retries:
          $ref: "#/components/schemas/ContainerHealthCheckRetries"
          description: The number of times to retry a failed health check before flagging the container unhealthy. The first run of the command does not count as a retry.
        StartPeriod:
          $ref: "#/components/schemas/ContainerHealthCheckStartPeriod"
          description: The optional grace period (in seconds) to give a container time to bootstrap before the first failed health check counts toward the number of retries.
        Timeout:
          $ref: "#/components/schemas/ContainerHealthCheckTimeout"
          description: The time period (in seconds) to wait for a health check to succeed before counting a failed health check.
      required:
        - Command
    ContainerCommandStringList:
      type: array
      items:
        $ref: "#/components/schemas/NonZeroAnd255MaxString"
    ContainerHealthCheckInterval:
      type: integer
      minimum: 60
      maximum: 300
    ContainerHealthCheckRetries:
      type: integer
      minimum: 5
      maximum: 10
    ContainerHealthCheckStartPeriod:
      type: integer
      minimum: 0
      maximum: 300
    ContainerHealthCheckTimeout:
      type: integer
      minimum: 30
      maximum: 60
    ContainerMemoryLimit:
      type: integer
      minimum: 4
      maximum: 1024000
    ContainerVcpu:
      type: number
      format: double
      minimum: 0.125
      maximum: 10
    ContainerOperatingSystem:
      type: string
      enum:
        - AMAZON_LINUX_2023
    CreateContainerGroupDefinitionOutput:
      type: object
      properties:
        ContainerGroupDefinition:
          $ref: "#/components/schemas/ContainerGroupDefinition"
          description: The properties of the new container group definition resource. You can use this resource to create a container fleet.
    ContainerGroupDefinition:
      description: "The properties that describe a container group resource. You can update all properties of a container group definition properties. Updates to a container group definition are saved as new versions. Used with: CreateContainerGroupDefinition Returned by: DescribeContainerGroupDefinition, ListContainerGroupDefinitions, UpdateContainerGroupDefinition"
      type: object
      properties:
        ContainerGroupDefinitionArn:
          $ref: "#/components/schemas/ContainerGroupDefinitionArn"
          description: The Amazon Resource Name (ARN) that is assigned to an Amazon GameLift Servers ContainerGroupDefinition resource. It uniquely identifies the resource across all Amazon Web Services Regions. Format is arn:aws:gamelift:[region]::containergroupdefinition/[container group definition name]:[version].
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        OperatingSystem:
          $ref: "#/components/schemas/ContainerOperatingSystem"
          description: The platform that all containers in the container group definition run on. Amazon Linux 2 (AL2) will reach end of support on 6/30/2026. See more details in the Amazon Linux 2 FAQs. For game servers that are hosted on AL2 and use server SDK version 4.x for Amazon GameLift Servers, first update the game server build to server SDK 5.x, and then deploy to AL2023 instances. See Migrate to server SDK version 5.
        Name:
          $ref: "#/components/schemas/ContainerGroupDefinitionName"
          description: A descriptive identifier for the container group definition. The name value is unique in an Amazon Web Services Region.
        ContainerGroupType:
          $ref: "#/components/schemas/ContainerGroupType"
          description: The type of container group. Container group type determines how Amazon GameLift Servers deploys the container group on each fleet instance.
        TotalMemoryLimitMebibytes:
          $ref: "#/components/schemas/ContainerTotalMemoryLimit"
          description: The amount of memory (in MiB) on a fleet instance to allocate for the container group. All containers in the group share these resources. You can set a limit for each container definition in the group. If individual containers have limits, this total value must be greater than any individual container's memory limit.
        TotalVcpuLimit:
          $ref: "#/components/schemas/ContainerTotalVcpuLimit"
          description: The amount of vCPU units on a fleet instance to allocate for the container group (1 vCPU is equal to 1024 CPU units). All containers in the group share these resources. You can set a limit for each container definition in the group. If individual containers have limits, this total value must be equal to or greater than the sum of the limits for each container in the group.
        GameServerContainerDefinition:
          $ref: "#/components/schemas/GameServerContainerDefinition"
          description: The definition for the game server container in this group. This property is used only when the container group type is GAME_SERVER. This container definition specifies a container image with the game server build.
        SupportContainerDefinitions:
          $ref: "#/components/schemas/SupportContainerDefinitionList"
          description: The set of definitions for support containers in this group. A container group definition might have zero support container definitions. Support container can be used in any type of container group.
        VersionNumber:
          $ref: "#/components/schemas/PositiveInteger"
          description: Indicates the version of a particular container group definition. This number is incremented automatically when you update a container group definition. You can view, update, or delete individual versions or the entire container group definition.
        VersionDescription:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: An optional description that was provided for a container group definition update. Each version can have a unique description.
        Status:
          $ref: "#/components/schemas/ContainerGroupDefinitionStatus"
          description: "Current status of the container group definition resource. Values include: COPYING -- Amazon GameLift Servers is in the process of making copies of all container images that are defined in the group. While in this state, the resource can't be used to create a container fleet. READY -- Amazon GameLift Servers has copied the registry images for all containers that are defined in the group. You can use a container group definition in this status to create a container fleet. FAILED -- Amazon GameLift Servers failed to create a valid container group definition resource. For more details on the cause of the failure, see StatusReason. A container group definition resource in failed status will be deleted within a few minutes."
        StatusReason:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: "Additional information about a container group definition that's in FAILED status. Possible reasons include: An internal issue prevented Amazon GameLift Servers from creating the container group definition resource. Delete the failed resource and call CreateContainerGroupDefinitionagain. An access-denied message means that you don't have permissions to access the container image on ECR. See IAM permission examples for help setting up required IAM permissions for Amazon GameLift Servers. The ImageUri value for at least one of the containers in the container group definition was invalid or not found in the current Amazon Web Services account. At least one of the container images referenced in the container group definition exceeds the allowed size. For size limits, see Amazon GameLift Servers endpoints and quotas. At least one of the container images referenced in the container group definition uses a different operating system than the one defined for the container group."
      required:
        - Name
    GameServerContainerDefinition:
      description: "Describes the game server container in an existing game server container group. A game server container identifies a container image with your game server build. A game server container is automatically considered essential; if an essential container fails, the entire container group restarts. You can update a container definition and deploy the updates to an existing fleet. When creating or updating a game server container group definition, use the property https://docs.aws.amazon.com/gamelift/latest/apireference/API_GameServerContainerDefinitionInput. Part of: ContainerGroupDefinition Returned by: DescribeContainerGroupDefinition, ListContainerGroupDefinitions, UpdateContainerGroupDefinition"
      type: object
      properties:
        ContainerName:
          $ref: "#/components/schemas/NonZeroAnd128MaxAsciiString"
          description: The container definition identifier. Container names are unique within a container group definition.
        DependsOn:
          $ref: "#/components/schemas/ContainerDependencyList"
          description: Indicates that the container relies on the status of other containers in the same container group during startup and shutdown sequences. A container might have dependencies on multiple containers.
        MountPoints:
          $ref: "#/components/schemas/ContainerMountPointList"
          description: A mount point that binds a path inside the container to a file or directory on the host system and lets it access the file or directory.
        EnvironmentOverride:
