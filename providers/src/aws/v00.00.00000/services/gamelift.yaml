          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    InstanceList:
      type: array
      items:
        $ref: "#/components/schemas/Instance"
    Instance:
      description: Represents a virtual computing instance that runs game server processes and hosts game sessions. In Amazon GameLift Servers, one or more instances make up a managed EC2 fleet.
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet that the instance belongs to.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        InstanceId:
          $ref: "#/components/schemas/InstanceId"
          description: A unique identifier for the instance.
        IpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: IP address that is assigned to the instance.
        DnsName:
          $ref: "#/components/schemas/DnsName"
          description: "The DNS identifier assigned to the instance that is running the game session. Values have the following format: TLS-enabled fleets: <unique identifier>.<region identifier>.amazongamelift.com. Non-TLS-enabled fleets: ec2-<unique identifier>.compute.amazonaws.com. (See Amazon EC2 Instance IP Addressing.) When connecting to a game session that is running on a TLS-enabled fleet, you must use the DNS name, not the IP address."
        OperatingSystem:
          $ref: "#/components/schemas/OperatingSystem"
          description: Operating system that is running on this EC2 instance. Amazon Linux 2 (AL2) will reach end of support on 6/30/2026. See more details in the Amazon Linux 2 FAQs. For game servers that are hosted on AL2 and use server SDK version 4.x for Amazon GameLift Servers, first update the game server build to server SDK 5.x, and then deploy to AL2023 instances. See Migrate to server SDK version 5.
        Type:
          $ref: "#/components/schemas/EC2InstanceType"
          description: EC2 instance type that defines the computing resources of this instance.
        Status:
          $ref: "#/components/schemas/InstanceStatus"
          description: "Current status of the instance. Possible statuses include the following: PENDING -- The instance is in the process of being created and launching server processes as defined in the fleet's run-time configuration. ACTIVE -- The instance has been successfully created and at least one server process has successfully launched and reported back to Amazon GameLift Servers that it is ready to host a game session. The instance is now considered ready to host game sessions. TERMINATING -- The instance is in the process of shutting down. This may happen to reduce capacity during a scaling down event or to recycle resources in the event of a problem."
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: The fleet location of the instance, expressed as an Amazon Web Services Region code, such as us-west-2.
    InstanceStatus:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - TERMINATING
    MatchmakingIdList:
      type: array
      items:
        $ref: "#/components/schemas/MatchmakingIdStringModel"
    DescribeMatchmakingOutput:
      type: object
      properties:
        TicketList:
          $ref: "#/components/schemas/MatchmakingTicketList"
          description: A collection of existing matchmaking ticket objects matching the request.
    MatchmakingTicketList:
      type: array
      items:
        $ref: "#/components/schemas/MatchmakingTicket"
    MatchmakingTicket:
      description: Ticket generated to track the progress of a matchmaking request. Each ticket is uniquely identified by a ticket ID, supplied by the requester, when creating a matchmaking request.
      type: object
      properties:
        TicketId:
          $ref: "#/components/schemas/MatchmakingIdStringModel"
          description: A unique identifier for a matchmaking ticket.
        ConfigurationName:
          $ref: "#/components/schemas/MatchmakingIdStringModel"
          description: Name of the matchmaking configuration that is used with this ticket. Matchmaking configurations determine how players are grouped into a match and how a new game session is created for the match.
        ConfigurationArn:
          $ref: "#/components/schemas/MatchmakingConfigurationArn"
          description: The Amazon Resource Name (ARN) associated with the GameLift matchmaking configuration resource that is used with this ticket.
        Status:
          $ref: "#/components/schemas/MatchmakingConfigurationStatus"
          description: Current status of the matchmaking request. QUEUED -- The matchmaking request has been received and is currently waiting to be processed. SEARCHING -- The matchmaking request is currently being processed. REQUIRES_ACCEPTANCE -- A match has been proposed and the players must accept the match. This status is used only with requests that use a matchmaking configuration with a player acceptance requirement. PLACING -- The FlexMatch engine has matched players and is in the process of placing a new game session for the match. COMPLETED -- Players have been matched and a game session is ready to host the players. A ticket in this state contains the necessary connection information for players. FAILED -- The matchmaking request was not completed. CANCELLED -- The matchmaking request was canceled. This may be the result of a StopMatchmaking operation or a proposed match that one or more players failed to accept. TIMED_OUT -- The matchmaking request was not successful within the duration specified in the matchmaking configuration. Matchmaking requests that fail to successfully complete (statuses FAILED, CANCELLED, TIMED_OUT) can be resubmitted as new requests with new ticket IDs.
        StatusReason:
          $ref: "#/components/schemas/StringModel"
          description: Code to explain the current status. For example, a status reason may indicate when a ticket has returned to SEARCHING status after a proposed match fails to receive player acceptances.
        StatusMessage:
          $ref: "#/components/schemas/StringModel"
          description: Additional information about the current status.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Time stamp indicating when this matchmaking request was received. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Time stamp indicating when the matchmaking request stopped being processed due to successful completion, timeout, or cancellation. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        Players:
          $ref: "#/components/schemas/PlayerList"
          description: A set of Player objects, each representing a player to find matches for. Players are identified by a unique player ID and may include latency data for use during matchmaking. If the ticket is in status COMPLETED, the Player objects include the team the players were assigned to in the resulting match.
        GameSessionConnectionInfo:
          $ref: "#/components/schemas/GameSessionConnectionInfo"
          description: Connection information for a new game session. Once a match is made, the FlexMatch engine creates a new game session for it. This information is added to the matchmaking ticket, which you can be retrieve by calling DescribeMatchmaking .
        EstimatedWaitTime:
          $ref: "#/components/schemas/WholeNumber"
          description: Average amount of time (in seconds) that players are currently waiting for a match. If there is not enough recent data, this property may be empty.
    MatchmakingConfigurationStatus:
      type: string
      enum:
        - CANCELLED
        - COMPLETED
        - FAILED
        - PLACING
        - QUEUED
        - REQUIRES_ACCEPTANCE
        - SEARCHING
        - TIMED_OUT
    StringModel:
      type: string
    PlayerList:
      type: array
      items:
        $ref: "#/components/schemas/Player"
    Player:
      description: Represents a player in matchmaking. When starting a matchmaking request, a player has a player ID, attributes, and may have latency data. Team information is added after a match has been successfully completed.
      type: object
      properties:
        PlayerId:
          $ref: "#/components/schemas/PlayerId"
          description: A unique identifier for a player
        PlayerAttributes:
          type: object
          properties: {}
          description: 'A collection of key:value pairs containing player information for use in matchmaking. Player attribute keys must match the playerAttributes used in a matchmaking rule set. Example: "PlayerAttributes": {"skill": {"N": "23"}, "gameMode": {"S": "deathmatch"}}. You can provide up to 10 PlayerAttributes.'
        Team:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: Name of the team that the player is assigned to in a match. Team names are defined in a matchmaking rule set.
        LatencyInMs:
          type: object
          properties: {}
          description: A set of values, expressed in milliseconds, that indicates the amount of latency that a player experiences when connected to Amazon Web Services Regions. If this property is present, FlexMatch considers placing the match only in Regions for which latency is reported. If a matchmaker has a rule that evaluates player latency, players must report latency in order to be matched. If no latency is reported in this scenario, FlexMatch assumes that no Regions are available to the player and the ticket is not matchable.
    GameSessionConnectionInfo:
      description: Connection information for a new game session that is created in response to a start matchmaking request. Once a match is made, the FlexMatch engine creates a new game session for it. This information, including the game session endpoint and player sessions for each player in the original matchmaking request, is added to the matchmaking ticket.
      type: object
      properties:
        GameSessionArn:
          $ref: "#/components/schemas/ArnStringModel"
          description: "An identifier for the game session that is unique across all regions. The value is always a full ARN in the following format: arn:aws:gamelift:`<location>`::gamesession/<fleet ID>/<ID string>."
        IpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address of the game session. To connect to a Amazon GameLift Servers game server, an app needs both the IP address and port number.
        DnsName:
          $ref: "#/components/schemas/DnsName"
          description: "The DNS identifier assigned to the instance that is running the game session. Values have the following format: TLS-enabled fleets: <unique identifier>.<region identifier>.amazongamelift.com. Non-TLS-enabled fleets: ec2-<unique identifier>.compute.amazonaws.com. (See Amazon EC2 Instance IP Addressing.) When connecting to a game session that is running on a TLS-enabled fleet, you must use the DNS name, not the IP address."
        Port:
          $ref: "#/components/schemas/PositiveInteger"
          description: The port number for the game session. To connect to a Amazon GameLift Servers game server, an app needs both the IP address and port number.
        MatchedPlayerSessions:
          $ref: "#/components/schemas/MatchedPlayerSessionList"
          description: A collection of player session IDs, one for each player ID that was included in the original matchmaking request.
        PlayerGatewayStatus:
          $ref: "#/components/schemas/PlayerGatewayStatus"
          description: "The current status of player gateway for the game session. Note, even if a fleet has PlayerGatewayMode configured as ENABLED, player gateway might not be available in a specific location. For more information about locations where player gateway is supported, see supported locations. Possible values include: ENABLED -- Player gateway is available for this game session. DISABLED -- Player gateway is not available for this game session."
    MatchedPlayerSessionList:
      type: array
      items:
        $ref: "#/components/schemas/MatchedPlayerSession"
    MatchedPlayerSession:
      description: Represents a new player session that is created as a result of a successful FlexMatch match. A successful match automatically creates new player sessions for every player ID in the original matchmaking request. When players connect to the match's game session, they must include both player ID and player session ID in order to claim their assigned player slot.
      type: object
      properties:
        PlayerId:
          $ref: "#/components/schemas/PlayerId"
          description: A unique identifier for a player
        PlayerSessionId:
          $ref: "#/components/schemas/PlayerSessionId"
          description: A unique identifier for a player session. PlayerSessionId will only be populated for player sessions that are in ACTIVE or RESERVED status when the ticket is completed.
    MatchmakingConfigurationNameList:
      type: array
      items:
        $ref: "#/components/schemas/MatchmakingConfigurationName"
    DescribeMatchmakingConfigurationsOutput:
      type: object
      properties:
        Configurations:
          $ref: "#/components/schemas/MatchmakingConfigurationList"
          description: A collection of requested matchmaking configurations.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    MatchmakingConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/MatchmakingConfiguration"
    MatchmakingRuleSetNameList:
      type: array
      items:
        $ref: "#/components/schemas/MatchmakingRuleSetName"
    RuleSetLimit:
      type: integer
      minimum: 1
      maximum: 10
    DescribeMatchmakingRuleSetsOutput:
      type: object
      properties:
        RuleSets:
          $ref: "#/components/schemas/MatchmakingRuleSetList"
          description: A collection of requested matchmaking rule set objects.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
      required:
        - RuleSets
    MatchmakingRuleSetList:
      type: array
      items:
        $ref: "#/components/schemas/MatchmakingRuleSet"
    DescribePlayerSessionsOutput:
      type: object
      properties:
        PlayerSessions:
          $ref: "#/components/schemas/PlayerSessionList"
          description: A collection of objects containing properties for each player session that matches the request.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    DescribeRuntimeConfigurationOutput:
      type: object
      properties:
        RuntimeConfiguration:
          $ref: "#/components/schemas/RuntimeConfiguration"
          description: Instructions that describe how server processes are launched and maintained on computes in the fleet.
    ScalingStatusType:
      type: string
      enum:
        - ACTIVE
        - UPDATE_REQUESTED
        - UPDATING
        - DELETE_REQUESTED
        - DELETING
        - DELETED
        - ERROR
    DescribeScalingPoliciesOutput:
      type: object
      properties:
        ScalingPolicies:
          $ref: "#/components/schemas/ScalingPolicyList"
          description: A collection of objects containing the scaling policies matching the request.
        NextToken:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A token that indicates where to resume retrieving results on the next call to this operation. If no token is returned, these results represent the end of the list.
    ScalingPolicyList:
      type: array
      items:
        $ref: "#/components/schemas/ScalingPolicy"
    ScalingPolicy:
      description: Rule that controls how a fleet is scaled. Scaling policies are uniquely identified by the combination of name and fleet ID.
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet that is associated with this scaling policy.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        Name:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A descriptive label that is associated with a fleet's scaling policy. Policy names do not need to be unique.
        Status:
          $ref: "#/components/schemas/ScalingStatusType"
          description: Current status of the scaling policy. The scaling policy can be in force only when in an ACTIVE status. Scaling policies can be suspended for individual fleets. If the policy is suspended for a fleet, the policy status does not change. ACTIVE -- The scaling policy can be used for auto-scaling a fleet. UPDATE_REQUESTED -- A request to update the scaling policy has been received. UPDATING -- A change is being made to the scaling policy. DELETE_REQUESTED -- A request to delete the scaling policy has been received. DELETING -- The scaling policy is being deleted. DELETED -- The scaling policy has been deleted. ERROR -- An error occurred in creating the policy. It should be removed and recreated.
        ScalingAdjustment:
          $ref: "#/components/schemas/Integer"
          description: Amount of adjustment to make, based on the scaling adjustment type.
        ScalingAdjustmentType:
          $ref: "#/components/schemas/ScalingAdjustmentType"
          description: The type of adjustment to make to a fleet's instance count. ChangeInCapacity -- add (or subtract) the scaling adjustment value from the current instance count. Positive values scale up while negative values scale down. ExactCapacity -- set the instance count to the scaling adjustment value. PercentChangeInCapacity -- increase or reduce the current instance count by the scaling adjustment, read as a percentage. Positive values scale up while negative values scale down.
        ComparisonOperator:
          $ref: "#/components/schemas/ComparisonOperatorType"
          description: Comparison operator to use when measuring a metric against the threshold value.
        Threshold:
          $ref: "#/components/schemas/Double"
          description: Metric value used to trigger a scaling event.
        EvaluationPeriods:
          $ref: "#/components/schemas/PositiveInteger"
          description: Length of time (in minutes) the metric must be at or beyond the threshold before a scaling event is triggered.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: Name of the Amazon GameLift Servers-defined metric that is used to trigger a scaling adjustment. For detailed descriptions of fleet metrics, see Monitor Amazon GameLift Servers with Amazon CloudWatch. ActivatingGameSessions -- Game sessions in the process of being created. ActiveGameSessions -- Game sessions that are currently running. ActiveInstances -- Fleet instances that are currently running at least one game session. AvailableGameSessions -- Additional game sessions that fleet could host simultaneously, given current capacity. AvailablePlayerSessions -- Empty player slots in currently active game sessions. This includes game sessions that are not currently accepting players. Reserved player slots are not included. CurrentPlayerSessions -- Player slots in active game sessions that are being used by a player or are reserved for a player. IdleInstances -- Active instances that are currently hosting zero game sessions. PercentAvailableGameSessions -- Unused percentage of the total number of game sessions that a fleet could host simultaneously, given current capacity. Use this metric for a target-based scaling policy. PercentIdleInstances -- Percentage of the total number of active instances that are hosting zero game sessions. QueueDepth -- Pending game session placement requests, in any queue, where the current fleet is the top-priority destination. WaitTime -- Current wait time for pending game session placement requests, in any queue, where the current fleet is the top-priority destination.
        PolicyType:
          $ref: "#/components/schemas/PolicyType"
          description: "The type of scaling policy to create. For a target-based policy, set the parameter MetricName to 'PercentAvailableGameSessions' and specify a TargetConfiguration. For a rule-based policy set the following parameters: MetricName, ComparisonOperator, Threshold, EvaluationPeriods, ScalingAdjustmentType, and ScalingAdjustment."
        TargetConfiguration:
          $ref: "#/components/schemas/TargetConfiguration"
          description: An object that contains settings for a target-based scaling policy.
        UpdateStatus:
          $ref: "#/components/schemas/LocationUpdateStatus"
          description: The current status of the fleet's scaling policies in a requested fleet location. The status PENDING_UPDATE indicates that an update was requested for the fleet but has not yet been completed for the location.
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: The fleet location.
    Integer:
      type: integer
    ScalingAdjustmentType:
      type: string
      enum:
        - ChangeInCapacity
        - ExactCapacity
        - PercentChangeInCapacity
    ComparisonOperatorType:
      type: string
      enum:
        - GreaterThanOrEqualToThreshold
        - GreaterThanThreshold
        - LessThanThreshold
        - LessThanOrEqualToThreshold
    Double:
      type: number
      format: double
    MetricName:
      type: string
      enum:
        - ActivatingGameSessions
        - ActiveGameSessions
        - ActiveInstances
        - AvailableGameSessions
        - AvailablePlayerSessions
        - CurrentPlayerSessions
        - IdleInstances
        - PercentAvailableGameSessions
        - PercentIdleInstances
        - QueueDepth
        - WaitTime
        - ConcurrentActivatableGameSessions
    PolicyType:
      type: string
      enum:
        - RuleBased
        - TargetBased
    TargetConfiguration:
      description: Settings for a target-based scaling policy. A target-based policy tracks a particular fleet metric specifies a target value for the metric. As player usage changes, the policy triggers Amazon GameLift Servers to adjust capacity so that the metric returns to the target value. The target configuration specifies settings as needed for the target based policy, including the target value.
      type: object
      properties:
        TargetValue:
          $ref: "#/components/schemas/Double"
          description: Desired value to use with a target-based scaling policy. The value must be relevant for whatever metric the scaling policy is using. For example, in a policy using the metric PercentAvailableGameSessions, the target value should be the preferred size of the fleet's buffer (the percent of capacity that should be idle and ready for new game sessions).
      required:
        - TargetValue
    DescribeScriptOutput:
      type: object
      properties:
        Script:
          $ref: "#/components/schemas/Script"
          description: A set of properties describing the requested script.
    DescribeVpcPeeringAuthorizationsOutput:
      type: object
      properties:
        VpcPeeringAuthorizations:
          $ref: "#/components/schemas/VpcPeeringAuthorizationList"
          description: A collection of objects that describe all valid VPC peering operations for the current Amazon Web Services account.
    VpcPeeringAuthorizationList:
      type: array
      items:
        $ref: "#/components/schemas/VpcPeeringAuthorization"
    DescribeVpcPeeringConnectionsOutput:
      type: object
      properties:
        VpcPeeringConnections:
          $ref: "#/components/schemas/VpcPeeringConnectionList"
          description: A collection of VPC peering connection records that match the request.
    VpcPeeringConnectionList:
      type: array
      items:
        $ref: "#/components/schemas/VpcPeeringConnection"
    VpcPeeringConnection:
      description: Represents a peering connection between a VPC on one of your Amazon Web Services accounts and the VPC for your Amazon GameLift Servers fleets. This record may be for an active peering connection or a pending connection that has not yet been established. Related actions All APIs by task
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet. This ID determines the ID of the Amazon GameLift Servers VPC for your fleet.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) associated with the GameLift fleet resource for this connection.
        IpV4CidrBlock:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: CIDR block of IPv4 addresses assigned to the VPC peering connection for the GameLift VPC. The peered VPC also has an IPv4 CIDR block associated with it; these blocks cannot overlap or the peering connection cannot be created.
        VpcPeeringConnectionId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A unique identifier that is automatically assigned to the connection record. This ID is referenced in VPC peering connection events, and is used when deleting a connection.
        Status:
          $ref: "#/components/schemas/VpcPeeringConnectionStatus"
          description: The status information about the connection. Status indicates if a connection is pending, successful, or failed.
        PeerVpcId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A unique identifier for a VPC with resources to be accessed by your Amazon GameLift Servers fleet. The VPC must be in the same Region as your fleet. To look up a VPC ID, use the VPC Dashboard in the Amazon Web Services Management Console. Learn more about VPC peering in VPC Peering with Amazon GameLift Servers Fleets.
        GameLiftVpcId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A unique identifier for the VPC that contains the Amazon GameLift Servers fleet for this connection. This VPC is managed by Amazon GameLift Servers and does not appear in your Amazon Web Services account.
    VpcPeeringConnectionStatus:
      description: Represents status information for a VPC peering connection. Status codes and messages are provided from EC2 (see VpcPeeringConnectionStateReason). Connection status information is also communicated as a fleet event.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: Code indicating the status of a VPC peering connection.
        Message:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: Additional messaging associated with the connection status.
    GetComputeAccessOutput:
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetIdOrArn"
          description: The ID of the fleet that holds the compute resource to be accessed.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        ComputeName:
          $ref: "#/components/schemas/ComputeNameOrArn"
          description: The identifier of the compute resource to be accessed. This value might be either a compute name or an instance ID.
        ComputeArn:
          $ref: "#/components/schemas/ComputeArn"
          description: The Amazon Resource Name (ARN) that is assigned to an Amazon GameLift Servers compute resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::compute/compute-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        Credentials:
          $ref: "#/components/schemas/AwsCredentials"
          description: A set of temporary Amazon Web Services credentials for use when connecting to the compute resource with Amazon EC2 Systems Manager (SSM).
        Target:
          $ref: "#/components/schemas/SessionTarget"
          description: The instance ID where the compute resource is running.
        ContainerIdentifiers:
          $ref: "#/components/schemas/ContainerIdentifierList"
          description: For a managed container fleet, a list of containers on the compute. Use the container runtime ID with Docker commands to connect to a specific container.
    SessionTarget:
      type: string
      minLength: 1
      maxLength: 400
    ContainerIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/ContainerIdentifier"
    ContainerIdentifier:
