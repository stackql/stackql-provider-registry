      pattern: ^[a-zA-Z0-9\-]+(\/[a-zA-Z0-9\-]+)?$|^arn:.*:compute\/[a-zA-Z0-9\-]+(\/[a-zA-Z0-9\-]+)?
    DeregisterComputeOutput:
      type: object
    DescribeAliasOutput:
      type: object
      properties:
        Alias:
          $ref: "#/components/schemas/Alias"
          description: The requested alias resource.
    DescribeBuildOutput:
