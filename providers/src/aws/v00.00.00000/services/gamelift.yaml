    WeightedCapacity:
      type: string
      minLength: 1
      maxLength: 3
      pattern: ^[\u0031-\u0039][\u0030-\u0039]{0,2}$
    GameServerGroupAutoScalingPolicy:
      description: Configuration settings for intelligent automatic scaling that uses target tracking. These settings are used to add an Auto Scaling policy when creating the corresponding Auto Scaling group. After the Auto Scaling group is created, all updates to Auto Scaling policies, including changing this policy and adding or removing other policies, is done directly on the Auto Scaling group.
      type: object
      properties:
        EstimatedInstanceWarmup:
          $ref: "#/components/schemas/PositiveInteger"
          description: Length of time, in seconds, it takes for a new instance to start new game server processes and register with Amazon GameLift Servers FleetIQ. Specifying a warm-up time can be useful, particularly with game servers that take a long time to start up, because it avoids prematurely starting new instances.
        TargetTrackingConfiguration:
          $ref: "#/components/schemas/TargetTrackingConfiguration"
          description: Settings for a target-based scaling policy applied to Auto Scaling group. These settings are used to create a target-based policy that tracks the Amazon GameLift Servers FleetIQ metric "PercentUtilizedGameServers" and specifies a target value for the metric. As player usage changes, the policy triggers to adjust the game server group capacity so that the metric returns to the target value.
      required:
        - TargetTrackingConfiguration
    TargetTrackingConfiguration:
      description: Settings for a target-based scaling policy as part of a GameServerGroupAutoScalingPolicy . These settings are used to create a target-based policy that tracks the Amazon GameLift Servers FleetIQ metric "PercentUtilizedGameServers" and specifies a target value for the metric. As player usage changes, the policy triggers to adjust the game server group capacity so that the metric returns to the target value.
      type: object
      properties:
        TargetValue:
          $ref: "#/components/schemas/NonNegativeDouble"
          description: Desired value to use with a game server group target-based scaling policy.
      required:
        - TargetValue
    NonNegativeDouble:
      type: number
      format: double
      minimum: 0
    BalancingStrategy:
      type: string
      enum:
        - SPOT_ONLY
        - SPOT_PREFERRED
        - ON_DEMAND_ONLY
    GameServerProtectionPolicy:
      type: string
      enum:
        - NO_PROTECTION
        - FULL_PROTECTION
    VpcSubnets:
      type: array
      items:
        $ref: "#/components/schemas/VpcSubnet"
    VpcSubnet:
      type: string
      minLength: 15
      maxLength: 24
      pattern: ^subnet-[0-9a-z]+$
    CreateGameServerGroupOutput:
      type: object
      properties:
        GameServerGroup:
          $ref: "#/components/schemas/GameServerGroup"
          description: The newly created game server group object, including the new ARN value for the Amazon GameLift Servers FleetIQ game server group and the object's status. The Amazon EC2 Auto Scaling group ARN is initially null, since the group has not yet been created. This value is added once the game server group status reaches ACTIVE.
    GameServerGroup:
      description: Properties that describe a game server group resource. A game server group manages certain properties related to a corresponding Amazon EC2 Auto Scaling group. A game server group is created by a successful call to CreateGameServerGroup and deleted by calling DeleteGameServerGroup. Game server group activity can be temporarily suspended and resumed by calling SuspendGameServerGroup and ResumeGameServerGroup, respectively.
      type: object
      properties:
        GameServerGroupName:
          $ref: "#/components/schemas/GameServerGroupName"
          description: A developer-defined identifier for the game server group. The name is unique for each Region in each Amazon Web Services account.
        GameServerGroupArn:
          $ref: "#/components/schemas/GameServerGroupArn"
          description: A generated unique ID for the game server group.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) for an IAM role that allows Amazon GameLift Servers to access your Amazon EC2 Auto Scaling groups.
        InstanceDefinitions:
          $ref: "#/components/schemas/InstanceDefinitions"
          description: The set of Amazon EC2 instance types that Amazon GameLift Servers FleetIQ can use when balancing and automatically scaling instances in the corresponding Auto Scaling group.
        BalancingStrategy:
          $ref: "#/components/schemas/BalancingStrategy"
          description: "Indicates how Amazon GameLift Servers FleetIQ balances the use of Spot Instances and On-Demand Instances in the game server group. Method options include the following: SPOT_ONLY - Only Spot Instances are used in the game server group. If Spot Instances are unavailable or not viable for game hosting, the game server group provides no hosting capacity until Spot Instances can again be used. Until then, no new instances are started, and the existing nonviable Spot Instances are terminated (after current gameplay ends) and are not replaced. SPOT_PREFERRED - (default value) Spot Instances are used whenever available in the game server group. If Spot Instances are unavailable, the game server group continues to provide hosting capacity by falling back to On-Demand Instances. Existing nonviable Spot Instances are terminated (after current gameplay ends) and are replaced with new On-Demand Instances. ON_DEMAND_ONLY - Only On-Demand Instances are used in the game server group. No Spot Instances are used, even when available, while this balancing strategy is in force."
        GameServerProtectionPolicy:
          $ref: "#/components/schemas/GameServerProtectionPolicy"
          description: A flag that indicates whether instances in the game server group are protected from early termination. Unprotected instances that have active game servers running might be terminated during a scale-down event, causing players to be dropped from the game. Protected instances cannot be terminated while there are active game servers running except in the event of a forced game server group deletion (see ). An exception to this is with Spot Instances, which can be terminated by Amazon Web Services regardless of protection status.
        AutoScalingGroupArn:
          $ref: "#/components/schemas/AutoScalingGroupArn"
          description: A generated unique ID for the Amazon EC2 Auto Scaling group that is associated with this game server group.
        Status:
          $ref: "#/components/schemas/GameServerGroupStatus"
          description: "The current status of the game server group. Possible statuses include: NEW - Amazon GameLift Servers FleetIQ has validated the CreateGameServerGroup() request. ACTIVATING - Amazon GameLift Servers FleetIQ is setting up a game server group, which includes creating an Auto Scaling group in your Amazon Web Services account. ACTIVE - The game server group has been successfully created. DELETE_SCHEDULED - A request to delete the game server group has been received. DELETING - Amazon GameLift Servers FleetIQ has received a valid DeleteGameServerGroup() request and is processing it. Amazon GameLift Servers FleetIQ must first complete and release hosts before it deletes the Auto Scaling group and the game server group. DELETED - The game server group has been successfully deleted. ERROR - The asynchronous processes of activating or deleting a game server group has failed, resulting in an error state."
        StatusReason:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: Additional information about the current game server group status. This information might provide additional insight on groups that are in ERROR status.
        SuspendedActions:
          $ref: "#/components/schemas/GameServerGroupActions"
          description: A list of activities that are currently suspended for this game server group. If this property is empty, all activities are occurring.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when this game server group was last updated.
    AutoScalingGroupArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    GameServerGroupStatus:
      type: string
      enum:
        - NEW
        - ACTIVATING
        - ACTIVE
        - DELETE_SCHEDULED
        - DELETING
        - DELETED
        - ERROR
    GameServerGroupActions:
      type: array
      items:
        $ref: "#/components/schemas/GameServerGroupAction"
    GameServerGroupAction:
      type: string
      enum:
        - REPLACE_INSTANCE_TYPES
    AliasIdOrArn:
      type: string
      pattern: ^alias-\S+|^arn:.*:alias\/alias-\S+
    GamePropertyList:
      type: array
      items:
        $ref: "#/components/schemas/GameProperty"
    GameProperty:
      description: "This key-value pair can store custom data about a game session. For example, you might use a GameProperty to track a game session's map, level of difficulty, or remaining time. The difficulty level could be specified like this: {\"Key\": \"difficulty\", \"Value\":\"Novice\"}. You can set game properties when creating a game session. You can also modify game properties of an active game session. When searching for game sessions, you can filter on game property keys and values. You can't delete game properties from a game session. For examples of working with game properties, see Create a game session with properties."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/GamePropertyKey"
          description: The game property identifier. Avoid using periods (".") in property keys if you plan to search for game sessions by properties. Property keys containing periods cannot be searched and will be filtered out from search results due to search index limitations. If you use SearchGameSessions API, there is a limit of 500 game property keys across all game sessions and all fleets per region. If the limit is exceeded, there will potentially be game session entries missing from SearchGameSessions API results.
        Value:
          $ref: "#/components/schemas/GamePropertyValue"
          description: The game property value.
      required:
        - Key
        - Value
    GamePropertyKey:
      type: string
      maxLength: 32
    GamePropertyValue:
      type: string
      maxLength: 96
    IdStringModel:
      type: string
      minLength: 1
      maxLength: 48
      pattern: "[a-zA-Z0-9-]+"
    LargeGameSessionData:
      type: string
      minLength: 1
      maxLength: 262144
    CreateGameSessionOutput:
      type: object
      properties:
        GameSession:
          $ref: "#/components/schemas/GameSession"
          description: Object that describes the newly created game session record.
    GameSession:
      description: Properties describing a game session. A game session in ACTIVE status can host players. When a game session ends, its status is set to TERMINATED. Amazon GameLift Servers retains a game session resource for 30 days after the game session ends. You can reuse idempotency token values after this time. Game session logs are retained for 14 days. All APIs by task
      type: object
      properties:
        GameSessionId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: "An identifier for the game session that is unique across all regions. The value is always a full ARN in the following format: arn:aws:gamelift:`<location>`::gamesession/<fleet ID>/<ID string>."
        Name:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A descriptive label that is associated with a game session. Session names do not need to be unique.
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet that the game session is running on.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) associated with the GameLift fleet that this game session is running on.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        TerminationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was terminated. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        CurrentPlayerSessionCount:
          $ref: "#/components/schemas/WholeNumber"
          description: Number of players currently in the game session.
        MaximumPlayerSessionCount:
          $ref: "#/components/schemas/WholeNumber"
          description: The maximum number of players that can be connected simultaneously to the game session.
        Status:
          $ref: "#/components/schemas/GameSessionStatus"
          description: Current status of the game session. A game session must have an ACTIVE status to have player sessions.
        StatusReason:
          $ref: "#/components/schemas/GameSessionStatusReason"
          description: Provides additional information about game session status. INTERRUPTED -- The game session was hosted on an EC2 Spot instance that was reclaimed, causing the active game session to be stopped. TRIGGERED_ON_PROCESS_TERMINATE – The game session was stopped by calling TerminateGameSession with the termination mode TRIGGER_ON_PROCESS_TERMINATE. FORCE_TERMINATED – The game session was stopped by calling TerminateGameSession with the termination mode FORCE_TERMINATE.
        GameProperties:
          $ref: "#/components/schemas/GamePropertyList"
          description: 'A set of key-value pairs that can store custom data in a game session. For example: {"Key": "difficulty", "Value": "novice"}. Avoid using periods (".") in property keys if you plan to search for game sessions by properties. Property keys containing periods cannot be searched and will be filtered out from search results due to search index limitations. If you use SearchGameSessions API, there is a limit of 500 game property keys across all game sessions and all fleets per region. If the limit is exceeded, there will potentially be game session entries missing from SearchGameSessions API results.'
        IpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address of the game session. To connect to a Amazon GameLift Servers game server, an app needs both the IP address and port number.
        DnsName:
          $ref: "#/components/schemas/DnsName"
          description: "The DNS identifier assigned to the instance that is running the game session. Values have the following format: TLS-enabled fleets: <unique identifier>.<region identifier>.amazongamelift.com. Non-TLS-enabled fleets: ec2-<unique identifier>.compute.amazonaws.com. (See Amazon EC2 Instance IP Addressing.) When connecting to a game session that is running on a TLS-enabled fleet, you must use the DNS name, not the IP address."
        Port:
          $ref: "#/components/schemas/PortNumber"
          description: The port number for the game session. To connect to a Amazon GameLift Servers game server, an app needs both the IP address and port number.
        PlayerSessionCreationPolicy:
          $ref: "#/components/schemas/PlayerSessionCreationPolicy"
          description: Indicates whether the game session is accepting new players.
        CreatorId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A unique identifier for a player. This ID is used to enforce a resource protection policy (if one exists), that limits the number of game sessions a player can create.
        GameSessionData:
          $ref: "#/components/schemas/LargeGameSessionData"
          description: A set of custom game session properties, formatted as a single string value. This data is passed to a game server process with a request to start a new game session. For more information, see Start a game session.
        MatchmakerData:
          $ref: "#/components/schemas/MatchmakerData"
          description: Information about the matchmaking process that resulted in the game session, if matchmaking was used. Data is in JSON syntax, formatted as a string. Information includes the matchmaker ID as well as player attributes and team assignments. For more details on matchmaker data, see Match Data. Matchmaker data is updated whenever new players are added during a successful backfill (see StartMatchBackfill).
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: The fleet location where the game session is running. This value might specify the fleet's home Region or a remote location. Location is expressed as an Amazon Web Services Region code such as us-west-2.
        ComputeName:
          $ref: "#/components/schemas/ComputeName"
          description: A descriptive label for the compute resource. The compute resource that is hosting the game session. For EC2 fleets, this is the EC2 instance ID. For Container fleets, each game server container group on a fleet instance is assigned a compute name. For Anywhere fleets, this is the custom compute name.
        PlayerGatewayStatus:
          $ref: "#/components/schemas/PlayerGatewayStatus"
          description: "Indicates whether player gateway is available for use for this game session. Note, even if a fleet has PlayerGatewayMode configured as ENABLED, player gateway might not be available in a specific location. For more information about locations where player gateway is supported, see Amazon GameLift Servers service locations. Possible values include: ENABLED -- Player gateway is available for routing player connections for this game session. DISABLED -- Player gateway is not available for this game session."
    GameSessionStatus:
      type: string
      enum:
        - ACTIVE
        - ACTIVATING
        - TERMINATED
        - TERMINATING
        - ERROR
    GameSessionStatusReason:
      type: string
      enum:
        - INTERRUPTED
        - TRIGGERED_ON_PROCESS_TERMINATE
        - FORCE_TERMINATED
    IpAddress:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[0-9A-Fa-f\:\.]+
    DnsName:
      type: string
    PlayerSessionCreationPolicy:
      type: string
      enum:
        - ACCEPT_ALL
        - DENY_ALL
    MatchmakerData:
      type: string
      minLength: 1
      maxLength: 390000
    ComputeName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9\-]+(\/[a-zA-Z0-9\-]+)?
    GameSessionQueueName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9-]+"
    PlayerLatencyPolicyList:
      type: array
      items:
        $ref: "#/components/schemas/PlayerLatencyPolicy"
    PlayerLatencyPolicy:
      description: Sets a latency cap for individual players when placing a game session. With a latency policy in force, a game session cannot be placed in a fleet location where a player reports latency higher than the cap. Latency policies are used only with placement request that provide player latency information. Player latency policies can be stacked to gradually relax latency requirements over time.
      type: object
      properties:
        MaximumIndividualPlayerLatencyMilliseconds:
          $ref: "#/components/schemas/WholeNumber"
          description: The maximum latency value that is allowed for any player, in milliseconds. All policies must have a value set for this property.
        PolicyDurationSeconds:
          $ref: "#/components/schemas/WholeNumber"
          description: The length of time, in seconds, that the policy is enforced while placing a new game session. A null value for this property means that the policy is enforced until the queue times out.
    GameSessionQueueDestinationList:
      type: array
      items:
        $ref: "#/components/schemas/GameSessionQueueDestination"
    GameSessionQueueDestination:
      description: A fleet or alias designated in a game session queue. Queues fulfill requests for new game sessions by placing a new game session on any of the queue's destinations.
      type: object
      properties:
        DestinationArn:
          $ref: "#/components/schemas/ArnStringModel"
          description: The Amazon Resource Name (ARN) that is assigned to fleet or fleet alias. ARNs, which include a fleet ID or alias ID and a Region name, provide a unique identifier across all Regions.
    ArnStringModel:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[a-zA-Z0-9:/-]+"
    FilterConfiguration:
      description: A list of fleet locations where a game session queue can place new game sessions. You can use a filter to temporarily exclude specific locations from receiving placements. For queues that have multi-location fleets, you can use a filter configuration allow placement with some, but not all, of a fleet's locations.
      type: object
      properties:
        AllowedLocations:
          $ref: "#/components/schemas/LocationList"
          description: A list of locations to allow game session placement in, in the form of Amazon Web Services Region codes such as us-west-2.
    LocationList:
      type: array
      items:
        $ref: "#/components/schemas/LocationStringModel"
    PriorityConfiguration:
      description: "Custom prioritization settings to use with a game session queue. Prioritization settings determine how the queue selects a game hosting resource to start a new game session. This configuration replaces the default prioritization process for queues. By default, a queue makes game session placements based on the following criteria: When a game session request does not include player latency data, Amazon GameLift Servers places game sessions based on the following priorities: (1) the queue's default destination order, and (2) for multi-location fleets, an alphabetic list of locations. When a game session request includes player latency data, Amazon GameLift Servers re-orders the queue's destinations to make placements where the average player latency is lowest. It reorders based the following priorities: (1) the lowest average latency across all players, (2) the lowest hosting cost, (3) the queue's default destination order, and (4) for multi-location fleets, an alphabetic list of locations."
      type: object
      properties:
        PriorityOrder:
          $ref: "#/components/schemas/PriorityTypeList"
          description: A custom sequence to use when prioritizing where to place new game sessions. Each priority type is listed once. LATENCY -- Amazon GameLift Servers prioritizes locations where the average player latency is lowest. Player latency data is provided in each game session placement request. COST -- Amazon GameLift Servers prioritizes queue destinations with the lowest current hosting costs. Cost is evaluated based on the destination's location, instance type, and fleet type (Spot or On-Demand). DESTINATION -- Amazon GameLift Servers prioritizes based on the list order of destinations in the queue configuration. LOCATION -- Amazon GameLift Servers prioritizes based on the provided order of locations, as defined in LocationOrder.
        LocationOrder:
          $ref: "#/components/schemas/LocationList"
          description: The prioritization order to use for fleet locations, when the PriorityOrder property includes LOCATION. Locations can include Amazon Web Services Region codes (such as us-west-2), local zones, and custom locations (for Anywhere fleets). Each location must be listed only once. For details, see Amazon GameLift Servers service locations.
    PriorityTypeList:
      type: array
      items:
        $ref: "#/components/schemas/PriorityType"
    PriorityType:
      type: string
      enum:
        - LATENCY
        - COST
        - DESTINATION
        - LOCATION
    QueueCustomEventData:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\s\\S]*"
    QueueSnsArnStringModel:
      type: string
      minLength: 0
      maxLength: 300
      pattern: "[a-zA-Z0-9:_-]*(\\.fifo)?"
    CreateGameSessionQueueOutput:
      type: object
      properties:
        GameSessionQueue:
          $ref: "#/components/schemas/GameSessionQueue"
          description: An object that describes the newly created game session queue.
    GameSessionQueue:
      description: Configuration for a game session placement mechanism that processes requests for new game sessions. A queue can be used on its own or as part of a matchmaking solution.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/GameSessionQueueName"
          description: A descriptive label that is associated with game session queue. Queue names must be unique within each Region.
        GameSessionQueueArn:
          $ref: "#/components/schemas/GameSessionQueueArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers game session queue resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::gamesessionqueue/<queue name>. In a Amazon GameLift Servers game session queue ARN, the resource ID matches the Name value.
        TimeoutInSeconds:
          $ref: "#/components/schemas/WholeNumber"
          description: The maximum time, in seconds, that a new game session placement request remains in the queue. When a request exceeds this time, the game session placement changes to a TIMED_OUT status. The minimum value is 10 and the maximum value is 600.
        PlayerLatencyPolicies:
          $ref: "#/components/schemas/PlayerLatencyPolicyList"
          description: A set of policies that enforce a sliding cap on player latency when processing game sessions placement requests. Use multiple policies to gradually relax the cap over time if Amazon GameLift Servers can't make a placement. Policies are evaluated in order starting with the lowest maximum latency value.
        Destinations:
          $ref: "#/components/schemas/GameSessionQueueDestinationList"
          description: A list of fleets and/or fleet aliases that can be used to fulfill game session placement requests in the queue. Destinations are identified by either a fleet ARN or a fleet alias ARN, and are listed in order of placement preference.
        FilterConfiguration:
          $ref: "#/components/schemas/FilterConfiguration"
          description: A list of locations where a queue is allowed to place new game sessions. Locations are specified in the form of Amazon Web Services Region codes, such as us-west-2. If this parameter is not set, game sessions can be placed in any queue location.
        PriorityConfiguration:
          $ref: "#/components/schemas/PriorityConfiguration"
          description: Custom settings to use when prioritizing destinations and locations for game session placements. This configuration replaces the FleetIQ default prioritization process. Priority types that are not explicitly named will be automatically applied at the end of the prioritization process.
        CustomEventData:
          $ref: "#/components/schemas/QueueCustomEventData"
          description: Information that is added to all events that are related to this game session queue.
        NotificationTarget:
          $ref: "#/components/schemas/QueueSnsArnStringModel"
          description: An SNS topic ARN that is set up to receive game session placement notifications. See Setting up notifications for game session placement.
    GameSessionQueueArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^arn:.*:gamesessionqueue\/[a-zA-Z0-9-]+
    CustomInputLocationStringModel:
      type: string
      minLength: 8
      maxLength: 64
      pattern: ^custom-[A-Za-z0-9\-]+
    CreateLocationOutput:
      type: object
      properties:
        Location:
          $ref: "#/components/schemas/LocationModel"
          description: The details of the custom location you created.
    LocationModel:
      description: Properties of a location, which can include its name, ARN (for custom locations), and ping beacon information.
      type: object
      properties:
        LocationName:
          $ref: "#/components/schemas/LocationStringModel"
          description: The location's name.
        LocationArn:
          $ref: "#/components/schemas/LocationArnModel"
          description: The Amazon Resource Name (ARN) that is assigned to a custom location resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::location/location-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        PingBeacon:
          $ref: "#/components/schemas/PingBeacon"
          description: Information about the UDP ping beacon for this location. Ping beacons are fixed endpoints that you can use to measure network latency between a player device and an Amazon GameLift Servers hosting location.
    LocationArnModel:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^arn:.*:location\/custom-\S+
    PingBeacon:
      description: Information about a UDP ping beacon that can be used to measure network latency between a player device and an Amazon GameLift Servers hosting location.
      type: object
      properties:
        UDPEndpoint:
          $ref: "#/components/schemas/UDPEndpoint"
          description: The domain name and port of the UDP ping beacon. Your game client can send UDP messages to this endpoint and receive responses to measure network latency.
    UDPEndpoint:
      description: The domain name and port information for a UDP endpoint.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: The domain name of the UDP endpoint.
        Port:
          $ref: "#/components/schemas/PositiveInteger"
          description: The port number of the UDP endpoint. For Amazon GameLift Servers ping beacons, this is typically port 7770.
    QueueArnsList:
      type: array
      items:
        $ref: "#/components/schemas/ArnStringModel"
    MatchmakingRequestTimeoutInteger:
      type: integer
      minimum: 1
      maximum: 43200
    MatchmakingAcceptanceTimeoutInteger:
      type: integer
      minimum: 1
      maximum: 600
    MatchmakingRuleSetName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9-\\.]*|^arn:.*:matchmakingruleset\\/[a-zA-Z0-9-\\.]*"
    SnsArnStringModel:
      type: string
      minLength: 0
      maxLength: 300
      pattern: "[a-zA-Z0-9:_/-]*(.fifo)?"
    CustomEventData:
      type: string
      minLength: 0
      maxLength: 256
    GameSessionData:
      type: string
      minLength: 1
      maxLength: 4096
    BackfillMode:
      type: string
      enum:
        - AUTOMATIC
        - MANUAL
    FlexMatchMode:
      type: string
      enum:
        - STANDALONE
        - WITH_QUEUE
    CreateMatchmakingConfigurationOutput:
      type: object
      properties:
        Configuration:
          $ref: "#/components/schemas/MatchmakingConfiguration"
          description: Object that describes the newly created matchmaking configuration.
    MatchmakingConfiguration:
      description: Guidelines for use with FlexMatch to match players into games. All matchmaking requests must specify a matchmaking configuration.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/MatchmakingIdStringModel"
          description: A unique identifier for the matchmaking configuration. This name is used to identify the configuration associated with a matchmaking request or ticket.
        ConfigurationArn:
          $ref: "#/components/schemas/MatchmakingConfigurationArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers matchmaking configuration resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::matchmakingconfiguration/<matchmaking configuration name>. In a Amazon GameLift Servers configuration ARN, the resource ID matches the Name value.
        Description:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A descriptive label that is associated with matchmaking configuration.
        GameSessionQueueArns:
          $ref: "#/components/schemas/QueueArnsList"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers game session queue resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::gamesessionqueue/<queue name>. Queues can be located in any Region. Queues are used to start new Amazon GameLift Servers-hosted game sessions for matches that are created with this matchmaking configuration. This property is not set when FlexMatchMode is set to STANDALONE.
        RequestTimeoutSeconds:
          $ref: "#/components/schemas/MatchmakingRequestTimeoutInteger"
          description: The maximum duration, in seconds, that a matchmaking ticket can remain in process before timing out. Requests that fail due to timing out can be resubmitted as needed.
        AcceptanceTimeoutSeconds:
          $ref: "#/components/schemas/MatchmakingAcceptanceTimeoutInteger"
          description: The length of time (in seconds) to wait for players to accept a proposed match, if acceptance is required. If any player rejects the match or fails to accept before the timeout, the ticket continues to look for an acceptable match.
        AcceptanceRequired:
          $ref: "#/components/schemas/BooleanModel"
          description: A flag that indicates whether a match that was created with this configuration must be accepted by the matched players. To require acceptance, set to TRUE. When this option is enabled, matchmaking tickets use the status REQUIRES_ACCEPTANCE to indicate when a completed potential match is waiting for player acceptance.
        RuleSetName:
          $ref: "#/components/schemas/MatchmakingIdStringModel"
          description: A unique identifier for the matchmaking rule set to use with this configuration. A matchmaking configuration can only use rule sets that are defined in the same Region.
        RuleSetArn:
          $ref: "#/components/schemas/MatchmakingRuleSetArn"
          description: The Amazon Resource Name (ARN) associated with the GameLift matchmaking rule set resource that this configuration uses.
        NotificationTarget:
          $ref: "#/components/schemas/SnsArnStringModel"
          description: An SNS topic ARN that is set up to receive matchmaking notifications.
        AdditionalPlayerCount:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of player slots in a match to keep open for future players. For example, if the configuration's rule set specifies a match for a single 12-person team, and the additional player count is set to 2, only 10 players are selected for the match. This parameter is not used when FlexMatchMode is set to STANDALONE.
        CustomEventData:
          $ref: "#/components/schemas/CustomEventData"
          description: Information to attach to all events related to the matchmaking configuration.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        GameProperties:
          $ref: "#/components/schemas/GamePropertyList"
          description: 'A set of key-value pairs that can store custom data in a game session. For example: {"Key": "difficulty", "Value": "novice"}. This information is added to the new GameSession object that is created for a successful match. This parameter is not used when FlexMatchMode is set to STANDALONE. Avoid using periods (".") in property keys if you plan to search for game sessions by properties. Property keys containing periods cannot be searched and will be filtered out from search results due to search index limitations. If you use SearchGameSessions API, there is a limit of 500 game property keys across all game sessions and all fleets per region. If the limit is exceeded, there will potentially be game session entries missing from SearchGameSessions API results.'
        GameSessionData:
          $ref: "#/components/schemas/GameSessionData"
          description: A set of custom game session properties, formatted as a single string value. This data is passed to a game server process with a request to start a new game session. For more information, see Start a game session. This information is added to the new GameSession object that is created for a successful match. This parameter is not used when FlexMatchMode is set to STANDALONE.
        BackfillMode:
          $ref: "#/components/schemas/BackfillMode"
          description: The method used to backfill game sessions created with this matchmaking configuration. MANUAL indicates that the game makes backfill requests or does not use the match backfill feature. AUTOMATIC indicates that GameLift creates backfill requests whenever a game session has one or more open slots. Learn more about manual and automatic backfill in Backfill existing games with FlexMatch. Automatic backfill is not available when FlexMatchMode is set to STANDALONE.
        FlexMatchMode:
          $ref: "#/components/schemas/FlexMatchMode"
          description: Indicates whether this matchmaking configuration is being used with Amazon GameLift Servers hosting or as a standalone matchmaking solution. STANDALONE - FlexMatch forms matches and returns match information, including players and team assignments, in a MatchmakingSucceeded event. WITH_QUEUE - FlexMatch forms matches and uses the specified Amazon GameLift Servers queue to start a game session for the match.
    MatchmakingConfigurationArn:
      description: Data type used for Matchmaking Configuration ARN.
      type: string
      pattern: ^arn:.*:matchmakingconfiguration\/[a-zA-Z0-9-\.]*
    MatchmakingRuleSetArn:
      description: Data type used for Matchmaking RuleSet ARN.
      type: string
      pattern: ^arn:.*:matchmakingruleset\/[a-zA-Z0-9-\.]*
    RuleSetBody:
      type: string
      minLength: 1
      maxLength: 65535
    CreateMatchmakingRuleSetOutput:
      type: object
      properties:
        RuleSet:
          $ref: "#/components/schemas/MatchmakingRuleSet"
          description: The newly created matchmaking rule set.
      required:
        - RuleSet
    MatchmakingRuleSet:
      description: Set of rule statements, used with FlexMatch, that determine how to build your player matches. Each rule set describes a type of group to be created and defines the parameters for acceptable player matches. A rule set may define the following elements for a match. For detailed information and examples showing how to construct a rule set, see Build a FlexMatch rule set. Teams -- Required. A rule set must define one or multiple teams for the match and set minimum and maximum team sizes. For example, a rule set might describe a 4x4 match that requires all eight slots to be filled. Player attributes -- Optional. These attributes specify a set of player characteristics to evaluate when looking for a match. Matchmaking requests that use a rule set with player attributes must provide the corresponding attribute values. For example, an attribute might specify a player's skill or level. Rules -- Optional. Rules define how to evaluate potential players for a match based on player attributes. A rule might specify minimum requirements for individual players, teams, or entire matches. For example, a rule might require each player to meet a certain skill level, each team to have at least one player in a certain role, or the match to have a minimum average skill level. or may describe an entire group--such as all teams must be evenly matched or have at least one player in a certain role. Expansions -- Optional. Expansions allow you to relax the rules after a period of time when no acceptable matches are found. This feature lets you balance getting players into games in a reasonable amount of time instead of making them wait indefinitely for the best possible match. For example, you might use an expansion to increase the maximum skill variance between players after 30 seconds.
      type: object
      properties:
        RuleSetName:
          $ref: "#/components/schemas/MatchmakingIdStringModel"
          description: A unique identifier for the matchmaking rule set
        RuleSetArn:
          $ref: "#/components/schemas/MatchmakingRuleSetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers matchmaking rule set resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::matchmakingruleset/<ruleset name>. In a GameLift rule set ARN, the resource ID matches the RuleSetName value.
        RuleSetBody:
          $ref: "#/components/schemas/RuleSetBody"
          description: A collection of matchmaking rules, formatted as a JSON string. Comments are not allowed in JSON, but most elements support a description field.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
      required:
        - RuleSetBody
    PlayerData:
      type: string
      minLength: 1
      maxLength: 2048
    CreatePlayerSessionOutput:
      type: object
      properties:
        PlayerSession:
          $ref: "#/components/schemas/PlayerSession"
          description: Object that describes the newly created player session record.
    PlayerSession:
      description: Represents a player session. Player sessions are created either for a specific game session, or as part of a game session placement or matchmaking request. A player session can represents a reserved player slot in a game session (when status is RESERVED) or actual player activity in a game session (when status is ACTIVE). A player session object, including player data, is automatically passed to a game session when the player connects to the game session and is validated. After the game session ends, player sessions information is retained for 30 days and then removed. Related actions All APIs by task
      type: object
      properties:
        PlayerSessionId:
          $ref: "#/components/schemas/PlayerSessionId"
          description: A unique identifier for a player session.
        PlayerId:
          $ref: "#/components/schemas/PlayerId"
          description: A unique identifier for a player that is associated with this player session.
        GameSessionId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: "An identifier for the game session that is unique across all regions that the player session is connected to. The value is always a full ARN in the following format: arn:aws:gamelift:`<location>`::gamesession/<fleet ID>/<ID string>."
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet that the player's game session is running on.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) associated with the GameLift fleet that the player's game session is running on.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        TerminationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was terminated. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        Status:
          $ref: "#/components/schemas/PlayerSessionStatus"
          description: "Current status of the player session. Possible player session statuses include the following: RESERVED -- The player session request has been received, but the player has not yet connected to the server process and/or been validated. ACTIVE -- The player has been validated by the server process and is currently connected. COMPLETED -- The player connection has been dropped. TIMEDOUT -- A player session request was received, but the player did not connect and/or was not validated within the timeout limit (60 seconds)."
        IpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address of the game session. To connect to a Amazon GameLift Servers game server, an app needs both the IP address and port number.
        DnsName:
          $ref: "#/components/schemas/DnsName"
          description: "The DNS identifier assigned to the instance that is running the game session. Values have the following format: TLS-enabled fleets: <unique identifier>.<region identifier>.amazongamelift.com. Non-TLS-enabled fleets: ec2-<unique identifier>.compute.amazonaws.com. (See Amazon EC2 Instance IP Addressing.) When connecting to a game session that is running on a TLS-enabled fleet, you must use the DNS name, not the IP address."
        Port:
          $ref: "#/components/schemas/PortNumber"
          description: Port number for the game session. To connect to a Amazon GameLift Servers server process, an app needs both the IP address and port number.
        PlayerData:
          $ref: "#/components/schemas/PlayerData"
          description: Developer-defined information related to a player. Amazon GameLift Servers does not use this data, so it can be formatted as needed for use in the game.
    PlayerSessionId:
      type: string
      pattern: ^psess-\S+
    PlayerSessionStatus:
      type: string
      enum:
        - RESERVED
        - ACTIVE
        - COMPLETED
        - TIMEDOUT
    PlayerIdList:
      type: array
      items:
        $ref: "#/components/schemas/PlayerId"
    PlayerDataMap:
      type: object
      properties: {}
    CreatePlayerSessionsOutput:
      type: object
      properties:
        PlayerSessions:
          $ref: "#/components/schemas/PlayerSessionList"
          description: A collection of player session objects created for the added players.
    PlayerSessionList:
      type: array
      items:
        $ref: "#/components/schemas/PlayerSession"
    ZipBlob:
      type: string
      format: byte
      maxLength: 5000000
    NodeJsVersion:
      type: string
      maxLength: 16
      pattern: ^[0-9]+\.(?:x|[0-9]+)$
    CreateScriptOutput:
      type: object
      properties:
        Script:
          $ref: "#/components/schemas/Script"
          description: "The newly created script record with a unique script ID and ARN. The new script's storage location reflects an Amazon S3 location: (1) If the script was uploaded from an S3 bucket under your account, the storage location reflects the information that was provided in the CreateScript request; (2) If the script file was uploaded from a local zip file, the storage location reflects an S3 location controls by the Amazon GameLift Servers service."
    Script:
      description: Properties describing a Realtime script. Related actions All APIs by task
      type: object
      properties:
        ScriptId:
          $ref: "#/components/schemas/ScriptId"
          description: A unique identifier for the Realtime script
        ScriptArn:
          $ref: "#/components/schemas/ScriptArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers script resource and uniquely identifies it. ARNs are unique across all Regions. In a GameLift script ARN, the resource ID matches the ScriptId value.
        Name:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A descriptive label that is associated with a script. Script names do not need to be unique.
        Version:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: Version information that is associated with a build or script. Version strings do not need to be unique.
        SizeOnDisk:
          $ref: "#/components/schemas/WholeNumberLong"
          description: The file size of the uploaded Realtime script, expressed in bytes. When files are uploaded from an S3 location, this value remains at "0".
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        StorageLocation:
          $ref: "#/components/schemas/S3Location"
          description: The location of the Amazon S3 bucket where a zipped file containing your Realtime scripts is stored. The storage location must specify the Amazon S3 bucket name, the zip file name (the "key"), and a role ARN that allows Amazon GameLift Servers to access the Amazon S3 storage location. The S3 bucket must be in the same Region where you want to create a new script. By default, Amazon GameLift Servers uploads the latest version of the zip file; if you have S3 object versioning turned on, you can use the ObjectVersion parameter to specify an earlier version.
        NodeJsVersion:
          $ref: "#/components/schemas/NodeJsVersion"
          description: The Node.js version used for execution of your Realtime script. The valid values are 10.x | 24.x. By default, NodeJsVersion is 10.x. This value cannot be updated later. Node.js 10 will reach end of support on September 30, 2026. See more details in the Node.js 10 FAQs. For migration guidance, see Migrating from Node.js 10 to 24.
    CreateVpcPeeringAuthorizationOutput:
      type: object
      properties:
        VpcPeeringAuthorization:
          $ref: "#/components/schemas/VpcPeeringAuthorization"
          description: Details on the requested VPC peering authorization, including expiration.
    VpcPeeringAuthorization:
      description: Represents an authorization for a VPC peering connection between the VPC for an Amazon GameLift Servers fleet and another VPC on an account you have access to. This authorization must exist and be valid for the peering connection to be established. Authorizations are valid for 24 hours after they are issued. Related actions All APIs by task
      type: object
      properties:
        GameLiftAwsAccountId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A unique identifier for the Amazon Web Services account that you use to manage your Amazon GameLift Servers fleet. You can find your Account ID in the Amazon Web Services Management Console under account settings.
        PeerVpcAwsAccountId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: The authorization's peer VPC Amazon Web Services account ID.
        PeerVpcId:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A unique identifier for a VPC with resources to be accessed by your Amazon GameLift Servers fleet. The VPC must be in the same Region as your fleet. To look up a VPC ID, use the VPC Dashboard in the Amazon Web Services Management Console. Learn more about VPC peering in VPC Peering with Amazon GameLift Servers Fleets.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: Time stamp indicating when this authorization was issued. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        ExpirationTime:
          $ref: "#/components/schemas/Timestamp"
          description: Time stamp indicating when this authorization expires (24 hours after issuance). Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
    CreateVpcPeeringConnectionOutput:
