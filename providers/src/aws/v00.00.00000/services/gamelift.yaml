          $ref: "#/components/schemas/Timestamp"
          description: When player gateway is enabled, this is the timestamp indicating when player gateway token expires. Your game backend should call GetPlayerConnectionDetails to retrieve fresh connection information for your game clients before this time. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057"). This value is empty when player gateway is disabled.
