    RuntimeConfiguration:
      description: A set of instructions that define the set of server processes to run on computes in a fleet. Server processes run either an executable in a custom game build or a Amazon GameLift Servers Realtime script. Amazon GameLift Servers launches the processes, manages their life cycle, and replaces them as needed. Computes check regularly for an updated runtime configuration. An Amazon GameLift Servers instance is limited to 50 processes running concurrently. To calculate the total number of processes defined in a runtime configuration, add the values of the ConcurrentExecutions parameter for each server process. Learn more about Running Multiple Processes on a Fleet.
      type: object
      properties:
        ServerProcesses:
          $ref: "#/components/schemas/ServerProcessList"
          description: A collection of server process configurations that identify what server processes to run on fleet computes.
        MaxConcurrentGameSessionActivations:
          $ref: "#/components/schemas/MaxConcurrentGameSessionActivations"
          description: The number of game sessions in status ACTIVATING to allow on an instance or compute. This setting limits the instance resources that can be used for new game activations at any one time.
        GameSessionActivationTimeoutSeconds:
          $ref: "#/components/schemas/GameSessionActivationTimeoutSeconds"
          description: The maximum amount of time (in seconds) allowed to launch a new game session and have it report ready to host players. During this time, the game session is in status ACTIVATING. If the game session does not become active before the timeout, it is ended and the game session status is changed to TERMINATED.
    ServerProcessList:
      type: array
      items:
        $ref: "#/components/schemas/ServerProcess"
    ServerProcess:
      description: A set of instructions for launching server processes on fleet computes. Server processes run either an executable in a custom game build or a Amazon GameLift Servers Realtime script. Server process configurations are part of a fleet's runtime configuration.
      type: object
      properties:
        LaunchPath:
          $ref: "#/components/schemas/LaunchPathStringModel"
          description: "The location of a game build executable or Realtime script. Game builds and Realtime scripts are installed on instances at the root: Windows (custom game builds only): C:\\game. Example: \"C:\\game\\MyGame\\server.exe\" Linux: /local/game. Examples: \"/local/game/MyGame/server.exe\" or \"/local/game/MyRealtimeScript.js\" Amazon GameLift Servers doesn't support the use of setup scripts that launch the game executable. For custom game builds, this parameter must indicate the executable that calls the server SDK operations initSDK() and ProcessReady()."
        Parameters:
          $ref: "#/components/schemas/LaunchParametersStringModel"
          description: An optional list of parameters to pass to the server executable or Realtime script on launch.
        ConcurrentExecutions:
          $ref: "#/components/schemas/PositiveInteger"
          description: The number of server processes using this configuration that run concurrently on each instance or compute.
      required:
        - LaunchPath
        - ConcurrentExecutions
    MaxConcurrentGameSessionActivations:
      type: integer
      minimum: 1
      maximum: 2147483647
    GameSessionActivationTimeoutSeconds:
      type: integer
      minimum: 1
      maximum: 600
    ResourceCreationLimitPolicy:
      description: A policy that puts limits on the number of game sessions that a player can create within a specified span of time. With this policy, you can control players' ability to consume available resources. The policy is evaluated when a player tries to create a new game session. On receiving a CreateGameSession request, Amazon GameLift Servers checks that the player (identified by CreatorId) has created fewer than game session limit in the specified time period.
      type: object
      properties:
        NewGameSessionsPerCreator:
          $ref: "#/components/schemas/WholeNumber"
          description: A policy that puts limits on the number of game sessions that a player can create within a specified span of time. With this policy, you can control players' ability to consume available resources. The policy is evaluated when a player tries to create a new game session. On receiving a CreateGameSession request, Amazon GameLift Servers checks that the player (identified by CreatorId) has created fewer than game session limit in the specified time period.
        PolicyPeriodInMinutes:
          $ref: "#/components/schemas/WholeNumber"
          description: The time span used in evaluating the resource creation limit policy.
    FleetType:
      type: string
      enum:
        - ON_DEMAND
        - SPOT
    CertificateConfiguration:
      description: Determines whether a TLS/SSL certificate is generated for a fleet. This feature must be enabled when creating the fleet. All instances in a fleet share the same certificate. The certificate can be retrieved by calling the Amazon GameLift Servers Server SDK operation GetInstanceCertificate.
      type: object
      properties:
        CertificateType:
          $ref: "#/components/schemas/CertificateType"
          description: "Indicates whether a TLS/SSL certificate is generated for a fleet. Valid values include: GENERATED - Generate a TLS/SSL certificate for this fleet. DISABLED - (default) Do not generate a TLS/SSL certificate for this fleet."
      required:
        - CertificateType
    CertificateType:
      type: string
      enum:
        - DISABLED
        - GENERATED
    ComputeType:
      type: string
      enum:
        - EC2
        - ANYWHERE
    AnywhereConfiguration:
      description: Amazon GameLift Servers configuration options for your Anywhere fleets.
      type: object
      properties:
        Cost:
          $ref: "#/components/schemas/NonNegativeLimitedLengthDouble"
          description: The cost to run your fleet per hour. Amazon GameLift Servers uses the provided cost of your fleet to balance usage in queues. For more information about queues, see Setting up queues in the Amazon GameLift Servers Developer Guide.
      required:
        - Cost
    NonNegativeLimitedLengthDouble:
      type: string
      minLength: 1
      maxLength: 11
      pattern: ^\d{1,5}(?:\.\d{1,5})?$
    InstanceRoleCredentialsProvider:
      type: string
      enum:
        - SHARED_CREDENTIAL_FILE
    PlayerGatewayConfiguration:
      description: Configuration settings for player gateway. Use these settings to specify advanced options for how player gateway handles connections.
      type: object
      properties:
        GameServerIpProtocolSupported:
          $ref: "#/components/schemas/GameServerIpProtocolSupported"
          description: The IP protocol that your game servers support for player connections through player gateway. If the value is set to IPv4, GameLift will install and execute a lightweight IP translation software on fleet instances to receive and transform incoming IPv6 traffic to IPv4. If the value is set to DUAL_STACK, the lightweight IP translation software will not be installed on fleet instances. DUAL_STACK provides slightly better performance than IPv4.
    GameServerIpProtocolSupported:
      type: string
      enum:
        - IPv4
        - DUAL_STACK
    CreateFleetOutput:
      type: object
      properties:
        FleetAttributes:
          $ref: "#/components/schemas/FleetAttributes"
          description: The properties for the new fleet, including the current status. All fleets are placed in NEW status on creation.
        LocationStates:
          $ref: "#/components/schemas/LocationStateList"
          description: The fleet's locations and life-cycle status of each location. For new fleets, the status of all locations is set to NEW. During fleet creation, Amazon GameLift Servers updates each location status as instances are deployed there and prepared for game hosting. This list includes an entry for the fleet's home Region. For fleets with no remote locations, only one entry, representing the home Region, is returned.
    FleetAttributes:
      description: "Describes an Amazon GameLift Servers fleet of game hosting resources. Attributes differ based on the fleet's compute type, as follows: EC2 fleet attributes identify a Build resource (for fleets with customer game server builds) or a Script resource (for Amazon GameLift Servers Realtime fleets). Amazon GameLift Servers Anywhere fleets have an abbreviated set of attributes, because most fleet configurations are set directly on the fleet's computes. Attributes include fleet identifiers and descriptive properties, creation/termination time, and fleet status. Returned by: https://docs.aws.amazon.com/gamelift/latest/apireference/API_DescribeFleetAttributes"
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetId"
          description: A unique identifier for the fleet.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912. In a GameLift fleet ARN, the resource ID matches the FleetId value.
        FleetType:
          $ref: "#/components/schemas/FleetType"
          description: Indicates whether the fleet uses On-Demand or Spot instances. For more information, see On-Demand versus Spot Instances. This fleet property can't be changed after the fleet is created.
        InstanceType:
          $ref: "#/components/schemas/EC2InstanceType"
          description: The Amazon EC2 instance type that the fleet uses. Instance type determines the computing resources of each instance in the fleet, including CPU, memory, storage, and networking capacity. See Amazon Elastic Compute Cloud Instance Types for detailed descriptions. This attribute is used with fleets where ComputeType is EC2.
        Description:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A human-readable description of the fleet.
        Name:
          $ref: "#/components/schemas/NonZeroAndMaxString"
          description: A descriptive label that is associated with a fleet. Fleet names do not need to be unique.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was created. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        TerminationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating when this data object was terminated. Format is a number expressed in Unix time as milliseconds (for example "1469498468.057").
        Status:
          $ref: "#/components/schemas/FleetStatus"
          description: "Current status of the fleet. Possible fleet statuses include the following: NEW -- A new fleet resource has been defined and Amazon GameLift Servers has started creating the fleet. Desired instances is set to 1. DOWNLOADING/VALIDATING/BUILDING -- Amazon GameLift Servers is download the game server build, running install scripts, and then validating the build files. When complete, Amazon GameLift Servers launches a fleet instance. ACTIVATING -- Amazon GameLift Servers is launching a game server process and testing its connectivity with the Amazon GameLift Servers service. ACTIVE -- The fleet is now ready to host game sessions. ERROR -- An error occurred when downloading, validating, building, or activating the fleet. DELETING -- Hosts are responding to a delete fleet request. TERMINATED -- The fleet no longer exists."
        BuildId:
          $ref: "#/components/schemas/BuildId"
          description: A unique identifier for the build resource that is deployed on instances in this fleet. This attribute is used with fleets where ComputeType is "EC2".
        BuildArn:
          $ref: "#/components/schemas/BuildArn"
          description: The Amazon Resource Name (ARN) associated with the Amazon GameLift Servers build resource that is deployed on instances in this fleet. In a GameLift build ARN, the resource ID matches the BuildId value. This attribute is used with fleets where ComputeType is "EC2".
        ScriptId:
          $ref: "#/components/schemas/ScriptId"
          description: A unique identifier for the Realtime script resource that is deployed on instances in this fleet. This attribute is used with fleets where ComputeType is "EC2".
        ScriptArn:
          $ref: "#/components/schemas/ScriptArn"
          description: The Amazon Resource Name (ARN) associated with the GameLift script resource that is deployed on instances in this fleet. In a GameLift script ARN, the resource ID matches the ScriptId value.
        ServerLaunchPath:
          $ref: "#/components/schemas/LaunchPathStringModel"
          description: This parameter is no longer used. Server launch paths are now defined using the fleet's RuntimeConfiguration. Requests that use this parameter continue to be valid.
        ServerLaunchParameters:
          $ref: "#/components/schemas/LaunchParametersStringModel"
          description: This parameter is no longer used. Server launch parameters are now defined using the fleet's runtime configuration. Requests that use this parameter continue to be valid.
        LogPaths:
          $ref: "#/components/schemas/StringList"
          description: This parameter is no longer used. Game session log paths are now defined using the Amazon GameLift Servers server API ProcessReady() logParameters. See more information in the Server API Reference.
        NewGameSessionProtectionPolicy:
          $ref: "#/components/schemas/ProtectionPolicy"
          description: The type of game session protection to set on all new instances that are started in the fleet. This attribute is used with fleets where ComputeType is EC2. NoProtection -- The game session can be terminated during a scale-down event. FullProtection -- If the game session is in an ACTIVE status, it cannot be terminated during a scale-down event.
        OperatingSystem:
          $ref: "#/components/schemas/OperatingSystem"
          description: The operating system of the fleet's computing resources. A fleet's operating system is determined by the OS of the build or script that is deployed on this fleet. This attribute is used with fleets where ComputeType is EC2. Amazon Linux 2 (AL2) will reach end of support on 6/30/2026. See more details in the Amazon Linux 2 FAQs. For game servers that are hosted on AL2 and use server SDK version 4.x for Amazon GameLift Servers, first update the game server build to server SDK 5.x, and then deploy to AL2023 instances. See Migrate to server SDK version 5.
        ResourceCreationLimitPolicy:
          $ref: "#/components/schemas/ResourceCreationLimitPolicy"
        MetricGroups:
          $ref: "#/components/schemas/MetricGroupList"
          description: Name of a metric group that metrics for this fleet are added to. In Amazon CloudWatch, you can view aggregated metrics for fleets that are in a metric group. A fleet can be included in only one metric group at a time. This attribute is used with fleets where ComputeType is EC2.
        StoppedActions:
          $ref: "#/components/schemas/FleetActionList"
          description: A list of fleet activity that has been suspended using StopFleetActions. This includes fleet auto-scaling. This attribute is used with fleets where ComputeType is EC2.
        InstanceRoleArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: A unique identifier for an IAM role that manages access to your Amazon Web Services services. With an instance role ARN set, any application that runs on an instance in this fleet can assume the role, including install scripts, server processes, and daemons (background processes). Create a role or look up a role's ARN by using the IAM dashboard in the Amazon Web Services Management Console. Learn more about using on-box credentials for your game servers at Access external resources from a game server. This attribute is used with fleets where ComputeType is EC2.
        CertificateConfiguration:
          $ref: "#/components/schemas/CertificateConfiguration"
          description: Determines whether a TLS/SSL certificate is generated for a fleet. This feature must be enabled when creating the fleet. All instances in a fleet share the same certificate.
        ComputeType:
          $ref: "#/components/schemas/ComputeType"
          description: The type of compute resource used to host your game servers. You can use your own compute resources with Amazon GameLift Servers Anywhere or use Amazon EC2 instances with managed Amazon GameLift Servers.
        AnywhereConfiguration:
          $ref: "#/components/schemas/AnywhereConfiguration"
          description: A set of attributes that are specific to an Anywhere fleet.
        InstanceRoleCredentialsProvider:
          $ref: "#/components/schemas/InstanceRoleCredentialsProvider"
          description: Indicates that fleet instances maintain a shared credentials file for the IAM role defined in InstanceRoleArn. Shared credentials allow applications that are deployed with the game server executable to communicate with other Amazon Web Services resources. This property is used only when the game server is integrated with the server SDK version 5.x. For more information about using shared credentials, see Communicate with other Amazon Web Services resources from your fleets. This attribute is used with fleets where ComputeType is EC2.
        PlayerGatewayMode:
          $ref: "#/components/schemas/PlayerGatewayMode"
          description: Indicates whether player gateway is enabled for this fleet. Player gateway provides benefits such as DDoS protection with negligible impact to latency. If ENABLED or REQUIRED, game clients can use player gateway to connect with the game server. If DISABLED, game clients cannot use player gateway. Instead, they have to directly connect to the game server.
        PlayerGatewayConfiguration:
          $ref: "#/components/schemas/PlayerGatewayConfiguration"
          description: Configuration settings for player gateway on this fleet.
    FleetStatus:
      type: string
      enum:
        - NEW
        - DOWNLOADING
        - VALIDATING
        - BUILDING
        - ACTIVATING
        - ACTIVE
        - DELETING
        - ERROR
        - TERMINATED
        - NOT_FOUND
    ScriptId:
      type: string
      pattern: ^script-\S+
    ScriptArn:
      type: string
      pattern: ^arn:.*:script\/script-\S+
    FleetActionList:
      type: array
      items:
        $ref: "#/components/schemas/FleetAction"
    FleetAction:
      type: string
      enum:
        - AUTO_SCALING
    LocationStateList:
      type: array
      items:
        $ref: "#/components/schemas/LocationState"
    LocationState:
      description: A fleet location and its life-cycle state. A location state object might be used to describe a fleet's remote location or home Region. Life-cycle state tracks the progress of launching the first instance in a new location and preparing it for game hosting, and then removing all instances and deleting the location from the fleet. NEW -- A new fleet location has been defined and desired instances is set to 1. DOWNLOADING/VALIDATING/BUILDING/ACTIVATING -- Amazon GameLift Servers is setting up the new fleet location, creating new instances with the game build or Realtime script and starting server processes. ACTIVE -- Hosts can now accept game sessions. ERROR -- An error occurred when downloading, validating, building, or activating the fleet location. DELETING -- Hosts are responding to a delete fleet location request. TERMINATED -- The fleet location no longer exists. NOT_FOUND -- The fleet location was not found. This could be because the custom location was removed or not created.
      type: object
      properties:
        Location:
          $ref: "#/components/schemas/LocationStringModel"
          description: The fleet location, expressed as an Amazon Web Services Region code such as us-west-2.
        Status:
          $ref: "#/components/schemas/FleetStatus"
          description: The life-cycle status of a fleet location.
        PlayerGatewayStatus:
          $ref: "#/components/schemas/PlayerGatewayStatus"
          description: "The current status of player gateway in this location for this fleet. Note, even if a fleet has PlayerGatewayMode configured as ENABLED, player gateway might not be available in a specific location. For more information about locations where player gateway is supported, see Amazon GameLift Servers service locations. Possible values include: ENABLED -- Player gateway is available for this fleet location. DISABLED -- Player gateway is not available for this fleet location."
    FleetIdOrArn:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^[a-z]*fleet-[a-zA-Z0-9\-]+$|^arn:.*:[a-z]*fleet\/[a-z]*fleet-[a-zA-Z0-9\-]+$
    CreateFleetLocationsOutput:
      type: object
      properties:
        FleetId:
          $ref: "#/components/schemas/FleetIdOrArn"
          description: A unique identifier for the fleet that was updated with new locations.
        FleetArn:
          $ref: "#/components/schemas/FleetArn"
          description: The Amazon Resource Name (ARN) that is assigned to a Amazon GameLift Servers fleet resource and uniquely identifies it. ARNs are unique across all Regions. Format is arn:aws:gamelift:`<region>`::fleet/fleet-a1234567-b8c9-0d1e-2fa3-b45c6d7e8912.
        LocationStates:
          $ref: "#/components/schemas/LocationStateList"
          description: The remote locations that are being added to the fleet, and the life-cycle status of each location. For new locations, the status is set to NEW. During location creation, Amazon GameLift Servers updates each location's status as instances are deployed there and prepared for game hosting. This list does not include the fleet home Region or any remote locations that were already added to the fleet.
    LaunchTemplateSpecification:
      description: An Amazon Elastic Compute Cloud launch template that contains configuration settings and game server code to be deployed to all instances in a game server group. The launch template is specified when creating a new game server group.
      type: object
      properties:
        LaunchTemplateId:
          $ref: "#/components/schemas/LaunchTemplateId"
          description: A unique identifier for an existing Amazon EC2 launch template.
        LaunchTemplateName:
          $ref: "#/components/schemas/LaunchTemplateName"
          description: A readable identifier for an existing Amazon EC2 launch template.
        Version:
          $ref: "#/components/schemas/LaunchTemplateVersion"
          description: The version of the Amazon EC2 launch template to use. If no version is specified, the default version will be used. With Amazon EC2, you can specify a default version for a launch template. If none is set, the default is the first version created.
    LaunchTemplateId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]+"
    LaunchTemplateName:
      type: string
      minLength: 3
      maxLength: 128
      pattern: "[a-zA-Z0-9\\(\\)\\.\\-/_]+"
    LaunchTemplateVersion:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]+"
    InstanceDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/InstanceDefinition"
    InstanceDefinition:
      description: An allowed instance type for a game server group. All game server groups must have at least two instance types defined for it. Amazon GameLift Servers FleetIQ periodically evaluates each defined instance type for viability. It then updates the Auto Scaling group with the list of viable instance types.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/GameServerGroupInstanceType"
          description: An Amazon EC2 instance type designation.
        WeightedCapacity:
          $ref: "#/components/schemas/WeightedCapacity"
          description: Instance weighting that indicates how much this instance type contributes to the total capacity of a game server group. Instance weights are used by Amazon GameLift Servers FleetIQ to calculate the instance type's cost per unit hour and better identify the most cost-effective options. For detailed information on weighting instance capacity, see Instance Weighting in the Amazon Elastic Compute Cloud Auto Scaling User Guide. Default value is "1".
      required:
