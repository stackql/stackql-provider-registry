          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EC2InstanceType:
                  $ref: "#/components/schemas/EC2InstanceType"
                  description: Name of an Amazon EC2 instance type that is supported in Amazon GameLift Servers. A fleet instance type determines the computing resources of each instance in the fleet, including CPU, memory, storage, and networking capacity. Do not specify a value for this parameter to retrieve limits for all instance types.
                Location:
                  $ref: "#/components/schemas/LocationStringModel"
                  description: The name of a remote location to request instance limits for, in the form of an Amazon Web Services Region code such as us-west-2.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
