      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet to delete locations for. You can use either the fleet ID or ARN value.
                Locations:
                  $ref: "#/components/schemas/LocationList"
                  description: The list of fleet locations to delete. Specify locations in the form of an Amazon Web Services Region code, such as us-west-2.
              required:
                - FleetId
                - Locations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFleetLocationsOutput"
  /DeleteGameServerGroup:
    post:
      operationId: DeleteGameServerGroup
      description: "This API works with the following fleet types: EC2 (FleetIQ) Terminates a game server group and permanently deletes the game server group record. You have several options for how these resources are impacted when deleting the game server group. Depending on the type of delete operation selected, this operation might affect these resources: The game server group The corresponding Auto Scaling group All game servers that are currently running in the group To delete a game server group, identify the game server group to delete and specify the type of delete operation to initiate. Game server groups can only be deleted if they are in ACTIVE or ERROR status. If the delete request is successful, a series of operations are kicked off. The game server group status is changed to DELETE_SCHEDULED, which prevents new game servers from being registered and stops automatic scaling activity. Once all game servers in the game server group are deregistered, Amazon GameLift Servers FleetIQ can begin deleting resources. If any of the delete operations fail, the game server group is placed in ERROR status. Amazon GameLift Servers FleetIQ emits delete events to Amazon CloudWatch. Learn more Amazon GameLift Servers FleetIQ Guide"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.DeleteGameServerGroup
            default: GameLift.DeleteGameServerGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GameServerGroupName:
                  $ref: "#/components/schemas/GameServerGroupNameOrArn"
                  description: A unique identifier for the game server group. Use either the name or ARN value.
                DeleteOption:
                  $ref: "#/components/schemas/GameServerGroupDeleteOption"
                  description: "The type of delete to perform. Options include the following: SAFE_DELETE – (default) Terminates the game server group and Amazon EC2 Auto Scaling group only when it has no game servers that are in UTILIZED status. FORCE_DELETE – Terminates the game server group, including all active game servers regardless of their utilization status, and the Amazon EC2 Auto Scaling group. RETAIN – Does a safe delete of the game server group but retains the Amazon EC2 Auto Scaling group as is."
              required:
                - GameServerGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGameServerGroupOutput"
  /DeleteGameSessionQueue:
    post:
      operationId: DeleteGameSessionQueue
      description: "This API works with the following fleet types: EC2, Anywhere, Container Deletes a game session queue. Once a queue is successfully deleted, unfulfilled StartGameSessionPlacement requests that reference the queue will fail. To delete a queue, specify the queue name."
