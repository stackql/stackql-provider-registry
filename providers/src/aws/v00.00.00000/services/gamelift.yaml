  /DeleteContainerGroupDefinition:
    post:
      operationId: DeleteContainerGroupDefinition
      description: "This API works with the following fleet types: Container Request options: Deletes a container group definition. Delete an entire container group definition, including all versions. Specify the container group definition name, or use an ARN value without the version number. Delete a particular version. Specify the container group definition name and a version number, or use an ARN value that includes the version number. Keep the newest versions and delete all older versions. Specify the container group definition name and the number of versions to retain. For example, set VersionCountToRetain to 5 to delete all but the five most recent versions. Result If successful, Amazon GameLift Servers removes the container group definition versions that you request deletion for. This request will fail for any requested versions if the following is true: If the version is being used in an active fleet If the version is being deployed to a fleet in a deployment that's currently in progress. If the version is designated as a rollback definition in a fleet deployment that's currently in progress. Learn more Manage a container group definition"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.DeleteContainerGroupDefinition
            default: GameLift.DeleteContainerGroupDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ContainerGroupDefinitionNameOrArn"
                  description: The unique identifier for the container group definition to delete. You can use either the Name or ARN value.
                VersionNumber:
                  $ref: "#/components/schemas/PositiveInteger"
                  description: The specific version to delete.
                VersionCountToRetain:
                  $ref: "#/components/schemas/WholeNumber"
                  description: The number of most recent versions to keep while deleting all older versions.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteContainerGroupDefinitionOutput"
  /DeleteFleet:
    post:
      operationId: DeleteFleet
      description: "This API works with the following fleet types: EC2, Anywhere, Container Deletes all resources and information related to a fleet and shuts down any currently running fleet instances, including those in remote locations. If the fleet being deleted has a VPC peering connection, you first need to get a valid authorization (good for 24 hours) by calling CreateVpcPeeringAuthorization. You don't need to explicitly delete the VPC peering connection. To delete a fleet, specify the fleet ID to be terminated. During the deletion process, the fleet status is changed to DELETING. When completed, the status switches to TERMINATED and the fleet event FLEET_DELETED is emitted. Learn more Setting up Amazon GameLift Servers Fleets"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.DeleteFleet
            default: GameLift.DeleteFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet to be deleted. You can use either the fleet ID or ARN value.
              required:
                - FleetId
      responses:
        "200":
          description: Success
  /DeleteFleetLocations:
    post:
      operationId: DeleteFleetLocations
      description: "This API works with the following fleet types: EC2, Container Removes locations from a multi-location fleet. When deleting a location, all game server process and all instances that are still active in the location are shut down. To delete fleet locations, identify the fleet ID and provide a list of the locations to be deleted. If successful, GameLift sets the location status to DELETING, and begins to shut down existing server processes and terminate instances in each location being deleted. When completed, the location status changes to TERMINATED. Learn more Setting up Amazon GameLift Servers fleets"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GameLift.DeleteFleetLocations
