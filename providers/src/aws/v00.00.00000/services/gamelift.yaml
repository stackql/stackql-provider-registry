            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet that the compute belongs to. You can use either the fleet ID or ARN value.
                ComputeName:
                  $ref: "#/components/schemas/ComputeNameOrArn"
                  description: The unique identifier of the compute resource to retrieve properties for. For a managed container fleet or Anywhere fleet, use a compute name. For an EC2 fleet, use an instance ID. To retrieve a fleet's compute identifiers, call ListCompute.
