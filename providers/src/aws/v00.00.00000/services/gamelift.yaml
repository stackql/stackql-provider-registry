            schema:
              type: object
              properties:
                FleetId:
                  $ref: "#/components/schemas/FleetIdOrArn"
                  description: A unique identifier for the fleet that holds the compute resource that you want to connect to. You can use either the fleet ID or ARN value.
                ComputeName:
                  $ref: "#/components/schemas/ComputeNameOrArn"
                  description: A unique identifier for the compute resource that you want to connect to. For an EC2 fleet, use an instance ID. For a managed container fleet, use a compute name. You can retrieve a fleet's compute names by calling ListCompute.
              required:
