openapi: 3.0.0
info:
  version: "2017-11-27"
  title: AmazonMQ
  description: AmazonMQ
  x-serviceName: mq
  x-serviceAlias: mq
  x-protocol: rest-json
  x-apiVersion: "2017-11-27"
  x-endpointPrefix: mq
  x-jsonVersion: "1.1"
servers:
  - url: https://mq.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mq
paths:
  /v1/brokers:
    post:
      operationId: CreateBroker
      description: "Creates a broker. Note: This API is asynchronous. To create a broker, you must either use the AmazonMQFullAccess IAM policy or include the following EC2 permissions in your IAM policy. ec2:CreateNetworkInterface This permission is required to allow Amazon MQ to create an elastic network interface (ENI) on behalf of your account. ec2:CreateNetworkInterfacePermission This permission is required to attach the ENI to the broker instance. ec2:DeleteNetworkInterface ec2:DeleteNetworkInterfacePermission ec2:DetachNetworkInterface ec2:DescribeInternetGateways ec2:DescribeNetworkInterfaces ec2:DescribeNetworkInterfacePermissions ec2:DescribeRouteTables ec2:DescribeSecurityGroups ec2:DescribeSubnets ec2:DescribeVpcs For more information, see Create an IAM User and Get Your Amazon Web Services Credentials and Never Modify or Delete the Amazon MQ Elastic Network Interface in the Amazon MQ Developer Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AuthenticationStrategy:
                  $ref: "#/components/schemas/AuthenticationStrategy"
                AutoMinorVersionUpgrade:
                  $ref: "#/components/schemas/__boolean"
                BrokerName:
                  $ref: "#/components/schemas/__string"
                Configuration:
                  $ref: "#/components/schemas/ConfigurationId"
                CreatorRequestId:
                  $ref: "#/components/schemas/__string"
                DeploymentMode:
                  $ref: "#/components/schemas/DeploymentMode"
                EncryptionOptions:
                  $ref: "#/components/schemas/EncryptionOptions"
                EngineType:
                  $ref: "#/components/schemas/EngineType"
                EngineVersion:
                  $ref: "#/components/schemas/__string"
                HostInstanceType:
                  $ref: "#/components/schemas/__string"
                LdapServerMetadata:
                  $ref: "#/components/schemas/LdapServerMetadataInput"
                Logs:
                  $ref: "#/components/schemas/Logs"
                MaintenanceWindowStartTime:
                  $ref: "#/components/schemas/WeeklyStartTime"
                PubliclyAccessible:
                  $ref: "#/components/schemas/__boolean"
                SecurityGroups:
                  $ref: "#/components/schemas/__listOf__string"
                StorageType:
                  $ref: "#/components/schemas/BrokerStorageType"
                SubnetIds:
                  $ref: "#/components/schemas/__listOf__string"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
                Users:
                  $ref: "#/components/schemas/__listOfUser"
                DataReplicationMode:
                  $ref: "#/components/schemas/DataReplicationMode"
                DataReplicationPrimaryBrokerArn:
                  $ref: "#/components/schemas/__string"
              required:
                - BrokerName
                - DeploymentMode
                - EngineType
                - HostInstanceType
                - PubliclyAccessible
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBrokerResponse"
    get:
      operationId: ListBrokers
      description: Returns a list of all brokers.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of brokers that Amazon MQ can return per page (20 by default). This value must be an integer from 5 to 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results Amazon MQ should return. To request the first page, leave nextToken empty.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBrokersResponse"
  /v1/configurations:
    post:
      operationId: CreateConfiguration
      description: Creates a new configuration for the specified configuration name. Amazon MQ uses the default configuration (the engine type and version).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AuthenticationStrategy:
                  $ref: "#/components/schemas/AuthenticationStrategy"
                EngineType:
                  $ref: "#/components/schemas/EngineType"
                EngineVersion:
                  $ref: "#/components/schemas/__string"
                Name:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
              required:
                - EngineType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfigurationResponse"
    get:
      operationId: ListConfigurations
      description: Returns a list of all configurations.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of brokers that Amazon MQ can return per page (20 by default). This value must be an integer from 5 to 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results Amazon MQ should return. To request the first page, leave nextToken empty.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationsResponse"
  /v1/tags/{resource-arn}:
    post:
      operationId: CreateTags
      description: Add a tag to a resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource tag.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
      responses:
        "204":
          description: Success
    delete:
      operationId: DeleteTags
      description: Removes a tag from a resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource tag.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__listOf__string"
          description: An array of tag keys to delete
      responses:
        "204":
          description: Success
    get:
      operationId: ListTags
      description: Lists tags for a resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource tag.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsResponse"
  /v1/brokers/{broker-id}/users/{username}:
    post:
      operationId: CreateUser
      description: Creates an ActiveMQ user. Do not add personally identifiable information (PII) or other confidential or sensitive information in broker usernames. Broker usernames are accessible to other Amazon Web Services services, including CloudWatch Logs. Broker usernames are not intended to be used for private or sensitive data.
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
        - name: username
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The username of the ActiveMQ user. This value can contain only alphanumeric characters, dashes, periods, underscores, and tildes (- . _ ~). This value must be 2-100 characters long.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ConsoleAccess:
                  $ref: "#/components/schemas/__boolean"
                Groups:
                  $ref: "#/components/schemas/__listOf__string"
                Password:
                  $ref: "#/components/schemas/__string"
                ReplicationUser:
                  $ref: "#/components/schemas/__boolean"
              required:
                - Password
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
    delete:
      operationId: DeleteUser
      description: Deletes an ActiveMQ user.
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
        - name: username
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The username of the ActiveMQ user. This value can contain only alphanumeric characters, dashes, periods, underscores, and tildes (- . _ ~). This value must be 2-100 characters long.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserResponse"
    get:
      operationId: DescribeUser
      description: Returns information about an ActiveMQ user.
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
        - name: username
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The username of the ActiveMQ user. This value can contain only alphanumeric characters, dashes, periods, underscores, and tildes (- . _ ~). This value must be 2-100 characters long.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeUserResponse"
    put:
      operationId: UpdateUser
      description: Updates the information for an ActiveMQ user.
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
        - name: username
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The username of the ActiveMQ user. This value can contain only alphanumeric characters, dashes, periods, underscores, and tildes (- . _ ~). This value must be 2-100 characters long.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ConsoleAccess:
                  $ref: "#/components/schemas/__boolean"
                Groups:
                  $ref: "#/components/schemas/__listOf__string"
                Password:
                  $ref: "#/components/schemas/__string"
                ReplicationUser:
                  $ref: "#/components/schemas/__boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserResponse"
  /v1/brokers/{broker-id}:
    delete:
      operationId: DeleteBroker
      description: "Deletes a broker. Note: This API is asynchronous."
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBrokerResponse"
    get:
      operationId: DescribeBroker
      description: Returns information about the specified broker.
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBrokerResponse"
    put:
      operationId: UpdateBroker
      description: Adds a pending configuration change to a broker.
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AuthenticationStrategy:
                  $ref: "#/components/schemas/AuthenticationStrategy"
                AutoMinorVersionUpgrade:
                  $ref: "#/components/schemas/__boolean"
                Configuration:
                  $ref: "#/components/schemas/ConfigurationId"
                EngineVersion:
                  $ref: "#/components/schemas/__string"
                HostInstanceType:
                  $ref: "#/components/schemas/__string"
                LdapServerMetadata:
                  $ref: "#/components/schemas/LdapServerMetadataInput"
                Logs:
                  $ref: "#/components/schemas/Logs"
                MaintenanceWindowStartTime:
                  $ref: "#/components/schemas/WeeklyStartTime"
                SecurityGroups:
                  $ref: "#/components/schemas/__listOf__string"
                DataReplicationMode:
                  $ref: "#/components/schemas/DataReplicationMode"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBrokerResponse"
  /v1/configurations/{configuration-id}:
    delete:
      operationId: DeleteConfiguration
      description: Deletes the specified configuration.
      parameters:
        - name: configuration-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConfigurationResponse"
    get:
      operationId: DescribeConfiguration
      description: Returns information about the specified configuration.
      parameters:
        - name: configuration-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConfigurationResponse"
    put:
      operationId: UpdateConfiguration
      description: Updates the specified configuration.
      parameters:
        - name: configuration-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Data:
                  $ref: "#/components/schemas/__string"
                Description:
                  $ref: "#/components/schemas/__string"
              required:
                - Data
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConfigurationResponse"
  /v1/broker-engine-types:
    get:
      operationId: DescribeBrokerEngineTypes
      description: Describe available engine types and versions.
      parameters:
        - name: engineType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Filter response by engine type.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of brokers that Amazon MQ can return per page (20 by default). This value must be an integer from 5 to 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results Amazon MQ should return. To request the first page, leave nextToken empty.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBrokerEngineTypesResponse"
  /v1/broker-instance-options:
    get:
      operationId: DescribeBrokerInstanceOptions
      description: Describe available broker instance options.
      parameters:
        - name: engineType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Filter response by engine type.
        - name: hostInstanceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Filter response by host instance type.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of brokers that Amazon MQ can return per page (20 by default). This value must be an integer from 5 to 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results Amazon MQ should return. To request the first page, leave nextToken empty.
        - name: storageType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Filter response by storage type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBrokerInstanceOptionsResponse"
  /v1/configurations/{configuration-id}/revisions/{configuration-revision}:
    get:
      operationId: DescribeConfigurationRevision
      description: Returns the specified configuration revision for the specified configuration.
      parameters:
        - name: configuration-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the configuration.
        - name: configuration-revision
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The revision of the configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConfigurationRevisionResponse"
  /v1/configurations/{configuration-id}/revisions:
    get:
      operationId: ListConfigurationRevisions
      description: Returns a list of all revisions for the specified configuration.
      parameters:
        - name: configuration-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the configuration.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of brokers that Amazon MQ can return per page (20 by default). This value must be an integer from 5 to 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results Amazon MQ should return. To request the first page, leave nextToken empty.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationRevisionsResponse"
  /v1/brokers/{broker-id}/users:
    get:
      operationId: ListUsers
      description: Returns a list of all ActiveMQ users.
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of brokers that Amazon MQ can return per page (20 by default). This value must be an integer from 5 to 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results Amazon MQ should return. To request the first page, leave nextToken empty.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponse"
  /v1/brokers/{broker-id}/promote:
    post:
      operationId: Promote
      description: Promotes a data replication replica broker to the primary broker role.
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Mode:
                  $ref: "#/components/schemas/PromoteMode"
              required:
                - Mode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoteResponse"
  /v1/brokers/{broker-id}/reboot:
    post:
      operationId: RebootBroker
      description: "Reboots a broker. Note: This API is asynchronous."
      parameters:
        - name: broker-id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID that Amazon MQ generates for the broker.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebootBrokerResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AuthenticationStrategy:
      description: Optional. The authentication strategy used to secure the broker. The default is SIMPLE.
      type: string
      enum:
        - SIMPLE
        - LDAP
        - CONFIG_MANAGED
    __boolean:
      type: boolean
    __string:
      type: string
    ConfigurationId:
      description: A list of information about the configuration.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/__string"
          description: Required. The unique ID that Amazon MQ generates for the configuration.
        Revision:
          $ref: "#/components/schemas/__integer"
          description: The revision number of the configuration.
      required:
        - Id
    __integer:
      type: integer
    DeploymentMode:
      description: The broker's deployment mode.
      type: string
      enum:
        - SINGLE_INSTANCE
        - ACTIVE_STANDBY_MULTI_AZ
        - CLUSTER_MULTI_AZ
    EncryptionOptions:
      description: Encryption options for the broker.
      type: object
      properties:
        KmsKeyId:
          $ref: "#/components/schemas/__string"
          description: The customer master key (CMK) to use for the A KMS (KMS). This key is used to encrypt your data at rest. If not provided, Amazon MQ will use a default CMK to encrypt your data.
        UseAwsOwnedKey:
          $ref: "#/components/schemas/__boolean"
          description: Enables the use of an Amazon Web Services owned CMK using KMS (KMS). Set to true by default, if no value is provided, for example, for RabbitMQ brokers.
      required:
        - UseAwsOwnedKey
    EngineType:
      description: The type of broker engine. Amazon MQ supports ActiveMQ and RabbitMQ.
      type: string
      enum:
        - ACTIVEMQ
        - RABBITMQ
    LdapServerMetadataInput:
      description: Optional. The metadata of the LDAP server used to authenticate and authorize connections to the broker. Does not apply to RabbitMQ brokers.
      type: object
      properties:
        Hosts:
          $ref: "#/components/schemas/__listOf__string"
          description: Specifies the location of the LDAP server such as Directory Service for Microsoft Active Directory. Optional failover server.
        RoleBase:
          $ref: "#/components/schemas/__string"
          description: The distinguished name of the node in the directory information tree (DIT) to search for roles or groups. For example, ou=group, ou=corp, dc=corp, dc=example, dc=com.
        RoleName:
          $ref: "#/components/schemas/__string"
          description: Specifies the LDAP attribute that identifies the group name attribute in the object returned from the group membership query.
        RoleSearchMatching:
          $ref: "#/components/schemas/__string"
          description: The LDAP search filter used to find roles within the roleBase. The distinguished name of the user matched by userSearchMatching is substituted into the {0} placeholder in the search filter. The client's username is substituted into the {1} placeholder. For example, if you set this option to (member=uid={1})for the user janedoe, the search filter becomes (member=uid=janedoe) after string substitution. It matches all role entries that have a member attribute equal to uid=janedoe under the subtree selected by the roleBase.
        RoleSearchSubtree:
          $ref: "#/components/schemas/__boolean"
          description: The directory search scope for the role. If set to true, scope is to search the entire subtree.
        ServiceAccountPassword:
          $ref: "#/components/schemas/__string"
          description: Service account password. A service account is an account in your LDAP server that has access to initiate a connection. For example, cn=admin,dc=corp, dc=example, dc=com.
        ServiceAccountUsername:
          $ref: "#/components/schemas/__string"
          description: Service account username. A service account is an account in your LDAP server that has access to initiate a connection. For example, cn=admin,dc=corp, dc=example, dc=com.
        UserBase:
          $ref: "#/components/schemas/__string"
          description: Select a particular subtree of the directory information tree (DIT) to search for user entries. The subtree is specified by a DN, which specifies the base node of the subtree. For example, by setting this option to ou=Users,ou=corp, dc=corp, dc=example, dc=com, the search for user entries is restricted to the subtree beneath ou=Users, ou=corp, dc=corp, dc=example, dc=com.
        UserRoleName:
          $ref: "#/components/schemas/__string"
          description: Specifies the name of the LDAP attribute for the user group membership.
        UserSearchMatching:
          $ref: "#/components/schemas/__string"
          description: The LDAP search filter used to find users within the userBase. The client's username is substituted into the {0} placeholder in the search filter. For example, if this option is set to (uid={0}) and the received username is janedoe, the search filter becomes (uid=janedoe) after string substitution. It will result in matching an entry like uid=janedoe, ou=Users,ou=corp, dc=corp, dc=example, dc=com.
        UserSearchSubtree:
          $ref: "#/components/schemas/__boolean"
          description: The directory search scope for the user. If set to true, scope is to search the entire subtree.
      required:
        - Hosts
        - UserSearchMatching
        - UserBase
        - RoleSearchMatching
        - ServiceAccountUsername
        - RoleBase
        - ServiceAccountPassword
