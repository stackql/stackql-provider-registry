openapi: 3.0.0
info:
  version: "2015-10-07"
  title: Amazon EventBridge Pipes
  description: Amazon EventBridge Pipes
  x-serviceName: pipes
  x-serviceAlias: pipes
  x-protocol: rest-json
  x-apiVersion: "2015-10-07"
  x-endpointPrefix: pipes
servers:
  - url: https://pipes.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for pipes
paths:
  /v1/pipes/{name}:
    post:
      operationId: CreatePipe
      description: Create a pipe. Amazon EventBridge Pipes connect event sources to targets and reduces the need for specialized knowledge and integration code.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipeName"
          description: The name of the pipe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/PipeDescription"
                DesiredState:
                  $ref: "#/components/schemas/RequestedPipeState"
                Source:
                  $ref: "#/components/schemas/ArnOrUrl"
                SourceParameters:
                  $ref: "#/components/schemas/PipeSourceParameters"
                Enrichment:
                  $ref: "#/components/schemas/OptionalArn"
                EnrichmentParameters:
                  $ref: "#/components/schemas/PipeEnrichmentParameters"
                Target:
                  $ref: "#/components/schemas/Arn"
                TargetParameters:
                  $ref: "#/components/schemas/PipeTargetParameters"
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                LogConfiguration:
                  $ref: "#/components/schemas/PipeLogConfigurationParameters"
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifier"
              required:
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePipeResponse"
    delete:
      operationId: DeletePipe
      description: Delete an existing pipe. For more information about pipes, see Amazon EventBridge Pipes in the Amazon EventBridge User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipeName"
          description: The name of the pipe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePipeResponse"
    get:
      operationId: DescribePipe
      description: Get the information about an existing pipe. For more information about pipes, see Amazon EventBridge Pipes in the Amazon EventBridge User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipeName"
          description: The name of the pipe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePipeResponse"
    put:
      operationId: UpdatePipe
      description: Update an existing pipe. When you call UpdatePipe, EventBridge only the updates fields you have specified in the request; the rest remain unchanged. The exception to this is if you modify any Amazon Web Services-service specific fields in the SourceParameters, EnrichmentParameters, or TargetParameters objects. For example, DynamoDBStreamParameters or EventBridgeEventBusParameters. EventBridge updates the fields in these objects atomically as one and overrides existing values. This is by design, and means that if you don't specify an optional field in one of these Parameters objects, EventBridge sets that field to its system-default value during the update. For more information about pipes, see Amazon EventBridge Pipes in the Amazon EventBridge User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipeName"
          description: The name of the pipe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/PipeDescription"
                DesiredState:
                  $ref: "#/components/schemas/RequestedPipeState"
                SourceParameters:
                  $ref: "#/components/schemas/UpdatePipeSourceParameters"
                Enrichment:
                  $ref: "#/components/schemas/OptionalArn"
                EnrichmentParameters:
                  $ref: "#/components/schemas/PipeEnrichmentParameters"
                Target:
                  $ref: "#/components/schemas/Arn"
                TargetParameters:
                  $ref: "#/components/schemas/PipeTargetParameters"
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                LogConfiguration:
                  $ref: "#/components/schemas/PipeLogConfigurationParameters"
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifier"
              required:
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePipeResponse"
  /v1/pipes:
    get:
      operationId: ListPipes
      description: Get the pipes associated with this account. For more information about pipes, see Amazon EventBridge Pipes in the Amazon EventBridge User Guide.
      parameters:
        - name: NamePrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PipeName"
          description: 'A value that will return a subset of the pipes associated with this account. For example, "NamePrefix": "ABC" will return all endpoints with "ABC" in the name.'
        - name: DesiredState
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RequestedPipeState"
          description: The state the pipe should be in.
        - name: CurrentState
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PipeState"
          description: The state the pipe is in.
        - name: SourcePrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The prefix matching the pipe source.
        - name: TargetPrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The prefix matching the pipe target.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
        - name: Limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LimitMax100"
          description: The maximum number of pipes to include in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPipesResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Displays the tags associated with a pipe.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipeArn"
          description: The ARN of the pipe for which you want to view tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified pipe. Tags can help you organize and categorize your resources. You can also use them to scope user permissions by granting a user permission to access or change only resources with certain tag values. Tags don't have any semantic meaning to Amazon Web Services and are interpreted strictly as strings of characters. You can use the TagResource action with a pipe that already has tags. If you specify a new tag key, this tag is appended to the list of tags associated with the pipe. If you specify a tag key that is already associated with the pipe, the new tag value that you specify replaces the previous value for that tag. You can associate as many as 50 tags with a pipe.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipeArn"
          description: The ARN of the pipe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from the specified pipes.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipeArn"
          description: The ARN of the pipe.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The list of tag keys to remove from the pipe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /v1/pipes/{name}/start:
    post:
      operationId: StartPipe
      description: Start an existing pipe.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipeName"
          description: The name of the pipe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPipeResponse"
  /v1/pipes/{name}/stop:
    post:
      operationId: StopPipe
      description: Stop an existing pipe.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipeName"
          description: The name of the pipe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopPipeResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    PipeName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\.\\-_A-Za-z0-9]+"
    PipeDescription:
      type: string
      minLength: 0
      maxLength: 512
      pattern: .*
    RequestedPipeState:
      type: string
      enum:
        - RUNNING
        - STOPPED
    ArnOrUrl:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: smk://(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9]):[0-9]{1,5}|arn:(aws[a-zA-Z0-9-]*):([a-zA-Z0-9\-]+):([a-z]{2,4}((-gov)|(-de)|(-iso([a-z]?)))?-[a-z]+(-\d{1})?)?:(\d{12})?:(.+)
    PipeSourceParameters:
      description: The parameters required to set up a source for your pipe.
      type: object
      properties:
        FilterCriteria:
          $ref: "#/components/schemas/FilterCriteria"
          description: The collection of event patterns used to filter events. To remove a filter, specify a FilterCriteria object with an empty array of Filter objects. For more information, see Events and Event Patterns in the Amazon EventBridge User Guide.
        KinesisStreamParameters:
          $ref: "#/components/schemas/PipeSourceKinesisStreamParameters"
          description: The parameters for using a Kinesis stream as a source.
        DynamoDBStreamParameters:
          $ref: "#/components/schemas/PipeSourceDynamoDBStreamParameters"
          description: The parameters for using a DynamoDB stream as a source.
        SqsQueueParameters:
          $ref: "#/components/schemas/PipeSourceSqsQueueParameters"
          description: The parameters for using a Amazon SQS stream as a source.
        ActiveMQBrokerParameters:
          $ref: "#/components/schemas/PipeSourceActiveMQBrokerParameters"
          description: The parameters for using an Active MQ broker as a source.
        RabbitMQBrokerParameters:
          $ref: "#/components/schemas/PipeSourceRabbitMQBrokerParameters"
          description: The parameters for using a Rabbit MQ broker as a source.
        ManagedStreamingKafkaParameters:
          $ref: "#/components/schemas/PipeSourceManagedStreamingKafkaParameters"
          description: The parameters for using an MSK stream as a source.
        SelfManagedKafkaParameters:
          $ref: "#/components/schemas/PipeSourceSelfManagedKafkaParameters"
          description: The parameters for using a self-managed Apache Kafka stream as a source. A self managed cluster refers to any Apache Kafka cluster not hosted by Amazon Web Services. This includes both clusters you manage yourself, as well as those hosted by a third-party provider, such as Confluent Cloud, CloudKarafka, or Redpanda. For more information, see Apache Kafka streams as a source in the Amazon EventBridge User Guide.
    FilterCriteria:
      description: The collection of event patterns used to filter events. To remove a filter, specify a FilterCriteria object with an empty array of Filter objects. For more information, see Events and Event Patterns in the Amazon EventBridge User Guide.
      type: object
      properties:
        Filters:
          $ref: "#/components/schemas/FilterList"
          description: The event patterns.
    FilterList:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: Filter events using an event pattern. For more information, see Events and Event Patterns in the Amazon EventBridge User Guide.
      type: object
      properties:
        Pattern:
          $ref: "#/components/schemas/EventPattern"
          description: The event pattern.
    EventPattern:
      type: string
      minLength: 0
      maxLength: 4096
    PipeSourceKinesisStreamParameters:
      description: The parameters for using a Kinesis stream as a source.
      type: object
      properties:
        BatchSize:
          $ref: "#/components/schemas/LimitMax10000"
          description: The maximum number of records to include in each batch.
        DeadLetterConfig:
          $ref: "#/components/schemas/DeadLetterConfig"
          description: Define the target queue to send dead-letter queue events to.
        OnPartialBatchItemFailure:
          $ref: "#/components/schemas/OnPartialBatchItemFailureStreams"
          description: Define how to handle item process failures. AUTOMATIC_BISECT halves each batch and retry each half until all the records are processed or there is one failed message left in the batch.
        MaximumBatchingWindowInSeconds:
          $ref: "#/components/schemas/MaximumBatchingWindowInSeconds"
          description: The maximum length of a time to wait for events.
        MaximumRecordAgeInSeconds:
          $ref: "#/components/schemas/MaximumRecordAgeInSeconds"
          description: Discard records older than the specified age. The default value is -1, which sets the maximum age to infinite. When the value is set to infinite, EventBridge never discards old records.
        MaximumRetryAttempts:
          $ref: "#/components/schemas/MaximumRetryAttemptsESM"
          description: Discard records after the specified number of retries. The default value is -1, which sets the maximum number of retries to infinite. When MaximumRetryAttempts is infinite, EventBridge retries failed records until the record expires in the event source.
        ParallelizationFactor:
          $ref: "#/components/schemas/LimitMax10"
          description: The number of batches to process concurrently from each shard. The default value is 1.
        StartingPosition:
          $ref: "#/components/schemas/KinesisStreamStartPosition"
          description: The position in a stream from which to start reading.
        StartingPositionTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: With StartingPosition set to AT_TIMESTAMP, the time from which to start reading, in Unix time seconds.
      required:
        - StartingPosition
    LimitMax10000:
      type: integer
      minimum: 1
      maximum: 10000
    DeadLetterConfig:
      description: A DeadLetterConfig object that contains information about a dead-letter queue configuration.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the specified target for the dead-letter queue. For Amazon Kinesis stream and Amazon DynamoDB stream sources, specify either an Amazon SNS topic or Amazon SQS queue ARN.
    Arn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: arn:(aws[a-zA-Z0-9-]*):([a-zA-Z0-9\-]+):([a-z]{2,4}((-gov)|(-de)|(-iso([a-z]?)))?-[a-z]+(-\d{1})?)?:(\d{12})?:(.+)
    OnPartialBatchItemFailureStreams:
      type: string
      enum:
        - AUTOMATIC_BISECT
    MaximumBatchingWindowInSeconds:
      type: integer
      minimum: 0
      maximum: 300
    MaximumRecordAgeInSeconds:
      type: integer
      minimum: -1
      maximum: 604800
    MaximumRetryAttemptsESM:
      type: integer
      minimum: -1
      maximum: 10000
    LimitMax10:
      type: integer
      minimum: 1
      maximum: 10
    KinesisStreamStartPosition:
      type: string
      enum:
        - TRIM_HORIZON
        - LATEST
        - AT_TIMESTAMP
    Timestamp:
      type: string
      format: date-time
    PipeSourceDynamoDBStreamParameters:
      description: The parameters for using a DynamoDB stream as a source.
      type: object
      properties:
        BatchSize:
          $ref: "#/components/schemas/LimitMax10000"
          description: The maximum number of records to include in each batch.
        DeadLetterConfig:
          $ref: "#/components/schemas/DeadLetterConfig"
          description: Define the target queue to send dead-letter queue events to.
        OnPartialBatchItemFailure:
          $ref: "#/components/schemas/OnPartialBatchItemFailureStreams"
          description: Define how to handle item process failures. AUTOMATIC_BISECT halves each batch and retry each half until all the records are processed or there is one failed message left in the batch.
        MaximumBatchingWindowInSeconds:
          $ref: "#/components/schemas/MaximumBatchingWindowInSeconds"
          description: The maximum length of a time to wait for events.
        MaximumRecordAgeInSeconds:
          $ref: "#/components/schemas/MaximumRecordAgeInSeconds"
          description: Discard records older than the specified age. The default value is -1, which sets the maximum age to infinite. When the value is set to infinite, EventBridge never discards old records.
        MaximumRetryAttempts:
          $ref: "#/components/schemas/MaximumRetryAttemptsESM"
          description: Discard records after the specified number of retries. The default value is -1, which sets the maximum number of retries to infinite. When MaximumRetryAttempts is infinite, EventBridge retries failed records until the record expires in the event source.
        ParallelizationFactor:
          $ref: "#/components/schemas/LimitMax10"
          description: The number of batches to process concurrently from each shard. The default value is 1.
        StartingPosition:
          $ref: "#/components/schemas/DynamoDBStreamStartPosition"
          description: The position in a stream from which to start reading.
      required:
        - StartingPosition
    DynamoDBStreamStartPosition:
      type: string
      enum:
        - TRIM_HORIZON
        - LATEST
    PipeSourceSqsQueueParameters:
      description: The parameters for using a Amazon SQS stream as a source.
      type: object
      properties:
        BatchSize:
          $ref: "#/components/schemas/LimitMax10000"
          description: The maximum number of records to include in each batch.
        MaximumBatchingWindowInSeconds:
          $ref: "#/components/schemas/MaximumBatchingWindowInSeconds"
          description: The maximum length of a time to wait for events.
    PipeSourceActiveMQBrokerParameters:
      description: The parameters for using an Active MQ broker as a source.
      type: object
      properties:
        Credentials:
          $ref: "#/components/schemas/MQBrokerAccessCredentials"
          description: The credentials needed to access the resource.
        QueueName:
          $ref: "#/components/schemas/MQBrokerQueueName"
          description: The name of the destination queue to consume.
        BatchSize:
          $ref: "#/components/schemas/LimitMax10000"
          description: The maximum number of records to include in each batch.
        MaximumBatchingWindowInSeconds:
          $ref: "#/components/schemas/MaximumBatchingWindowInSeconds"
          description: The maximum length of a time to wait for events.
      required:
        - Credentials
        - QueueName
    MQBrokerAccessCredentials:
      description: The Secrets Manager secret that stores your broker credentials.
      type: object
      properties:
        BasicAuth:
          $ref: "#/components/schemas/SecretManagerArn"
          description: The ARN of the Secrets Manager secret.
    SecretManagerArn:
      description: // Optional SecretManager ARN which stores the database credentials
      type: string
      minLength: 1
      maxLength: 1600
      pattern: (^arn:aws([a-z]|\-)*:secretsmanager:([a-z]{2,4}((-gov)|(-de)|(-iso([a-z]?)))?-[a-z]+(-\d{1})?):(\d{12}):secret:.+)
    MQBrokerQueueName:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[\\s\\S]*"
    PipeSourceRabbitMQBrokerParameters:
      description: The parameters for using a Rabbit MQ broker as a source.
      type: object
      properties:
        Credentials:
          $ref: "#/components/schemas/MQBrokerAccessCredentials"
          description: The credentials needed to access the resource.
        QueueName:
          $ref: "#/components/schemas/MQBrokerQueueName"
          description: The name of the destination queue to consume.
        VirtualHost:
          $ref: "#/components/schemas/URI"
          description: The name of the virtual host associated with the source broker.
        BatchSize:
          $ref: "#/components/schemas/LimitMax10000"
          description: The maximum number of records to include in each batch.
        MaximumBatchingWindowInSeconds:
          $ref: "#/components/schemas/MaximumBatchingWindowInSeconds"
          description: The maximum length of a time to wait for events.
      required:
        - Credentials
        - QueueName
    URI:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[a-zA-Z0-9-\\/*:_+=.@-]*"
    PipeSourceManagedStreamingKafkaParameters:
      description: The parameters for using an MSK stream as a source.
      type: object
      properties:
        TopicName:
          $ref: "#/components/schemas/KafkaTopicName"
          description: The name of the topic that the pipe will read from.
        StartingPosition:
          $ref: "#/components/schemas/MSKStartPosition"
          description: The position in a stream from which to start reading.
        BatchSize:
          $ref: "#/components/schemas/LimitMax10000"
          description: The maximum number of records to include in each batch.
        MaximumBatchingWindowInSeconds:
          $ref: "#/components/schemas/MaximumBatchingWindowInSeconds"
          description: The maximum length of a time to wait for events.
        ConsumerGroupID:
          $ref: "#/components/schemas/URI"
          description: The name of the destination queue to consume.
        Credentials:
          $ref: "#/components/schemas/MSKAccessCredentials"
          description: The credentials needed to access the resource.
      required:
        - TopicName
    KafkaTopicName:
      type: string
      minLength: 1
      maxLength: 249
      pattern: "[^.]([a-zA-Z0-9\\-_.]+)"
    MSKStartPosition:
      type: string
      enum:
        - TRIM_HORIZON
        - LATEST
    MSKAccessCredentials:
      description: The Secrets Manager secret that stores your stream credentials.
      type: object
      properties:
        SaslScram512Auth:
          $ref: "#/components/schemas/SecretManagerArn"
          description: The ARN of the Secrets Manager secret.
        ClientCertificateTlsAuth:
          $ref: "#/components/schemas/SecretManagerArn"
          description: The ARN of the Secrets Manager secret.
    PipeSourceSelfManagedKafkaParameters:
      description: The parameters for using a self-managed Apache Kafka stream as a source. A self managed cluster refers to any Apache Kafka cluster not hosted by Amazon Web Services. This includes both clusters you manage yourself, as well as those hosted by a third-party provider, such as Confluent Cloud, CloudKarafka, or Redpanda. For more information, see Apache Kafka streams as a source in the Amazon EventBridge User Guide.
      type: object
      properties:
        TopicName:
          $ref: "#/components/schemas/KafkaTopicName"
          description: The name of the topic that the pipe will read from.
        StartingPosition:
          $ref: "#/components/schemas/SelfManagedKafkaStartPosition"
          description: The position in a stream from which to start reading.
        AdditionalBootstrapServers:
          $ref: "#/components/schemas/KafkaBootstrapServers"
          description: An array of server URLs.
        BatchSize:
          $ref: "#/components/schemas/LimitMax10000"
          description: The maximum number of records to include in each batch.
        MaximumBatchingWindowInSeconds:
          $ref: "#/components/schemas/MaximumBatchingWindowInSeconds"
          description: The maximum length of a time to wait for events.
        ConsumerGroupID:
          $ref: "#/components/schemas/URI"
          description: The name of the destination queue to consume.
        Credentials:
          $ref: "#/components/schemas/SelfManagedKafkaAccessConfigurationCredentials"
          description: The credentials needed to access the resource.
        ServerRootCaCertificate:
          $ref: "#/components/schemas/SecretManagerArn"
          description: The ARN of the Secrets Manager secret used for certification.
        Vpc:
          $ref: "#/components/schemas/SelfManagedKafkaAccessConfigurationVpc"
          description: This structure specifies the VPC subnets and security groups for the stream, and whether a public IP address is to be used.
      required:
        - TopicName
    SelfManagedKafkaStartPosition:
      type: string
      enum:
        - TRIM_HORIZON
        - LATEST
    KafkaBootstrapServers:
      type: array
      items:
        $ref: "#/components/schemas/EndpointString"
    EndpointString:
      type: string
      minLength: 1
      maxLength: 300
      pattern: (([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9]):[0-9]{1,5}
    SelfManagedKafkaAccessConfigurationCredentials:
      description: The Secrets Manager secret that stores your stream credentials.
      type: object
      properties:
        BasicAuth:
          $ref: "#/components/schemas/SecretManagerArn"
          description: The ARN of the Secrets Manager secret.
        SaslScram512Auth:
          $ref: "#/components/schemas/SecretManagerArn"
          description: The ARN of the Secrets Manager secret.
        SaslScram256Auth:
          $ref: "#/components/schemas/SecretManagerArn"
          description: The ARN of the Secrets Manager secret.
        ClientCertificateTlsAuth:
          $ref: "#/components/schemas/SecretManagerArn"
          description: The ARN of the Secrets Manager secret.
    SelfManagedKafkaAccessConfigurationVpc:
      description: This structure specifies the VPC subnets and security groups for the stream, and whether a public IP address is to be used.
      type: object
      properties:
        Subnets:
          $ref: "#/components/schemas/SubnetIds"
          description: Specifies the subnets associated with the stream. These subnets must all be in the same VPC. You can specify as many as 16 subnets.
        SecurityGroup:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: Specifies the security groups associated with the stream. These security groups must all be in the same VPC. You can specify as many as five security groups.
    SubnetIds:
      description: List of SubnetId.
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: subnet-[0-9a-z]*
    SecurityGroupIds:
      description: List of SecurityGroupId.
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: sg-[0-9a-zA-Z]*
    OptionalArn:
      type: string
      minLength: 0
      maxLength: 1600
      pattern: $|arn:(aws[a-zA-Z0-9-]*):([a-zA-Z0-9\-]+):([a-z]{2,4}((-gov)|(-de)|(-iso([a-z]?)))?-[a-z]+(-\d{1})?)?:(\d{12})?:(.+)
    PipeEnrichmentParameters:
      description: The parameters required to set up enrichment on your pipe.
      type: object
      properties:
        InputTemplate:
          $ref: "#/components/schemas/InputTemplate"
          description: Valid JSON text passed to the enrichment. In this case, nothing from the event itself is passed to the enrichment. For more information, see The JavaScript Object Notation (JSON) Data Interchange Format. To remove an input template, specify an empty string.
        HttpParameters:
          $ref: "#/components/schemas/PipeEnrichmentHttpParameters"
          description: Contains the HTTP parameters to use when the target is a API Gateway REST endpoint or EventBridge ApiDestination. If you specify an API Gateway REST API or EventBridge ApiDestination as a target, you can use this parameter to specify headers, path parameters, and query string keys/values as part of your target invoking request. If you're using ApiDestinations, the corresponding Connection can also have these values configured. In case of any conflicting keys, values from the Connection take precedence.
    InputTemplate:
      type: string
      minLength: 0
      maxLength: 8192
    PipeEnrichmentHttpParameters:
      description: These are custom parameter to be used when the target is an API Gateway REST APIs or EventBridge ApiDestinations. In the latter case, these are merged with any InvocationParameters specified on the Connection, with any values from the Connection taking precedence.
      type: object
      properties:
        PathParameterValues:
          $ref: "#/components/schemas/PathParameterList"
          description: The path parameter values to be used to populate API Gateway REST API or EventBridge ApiDestination path wildcards ("*").
        HeaderParameters:
          type: object
          properties: {}
          description: The headers that need to be sent as part of request invoking the API Gateway REST API or EventBridge ApiDestination.
        QueryStringParameters:
          type: object
          properties: {}
          description: The query string keys/values that need to be sent as part of request invoking the API Gateway REST API or EventBridge ApiDestination.
    PathParameterList:
      type: array
      items:
        $ref: "#/components/schemas/PathParameter"
    PathParameter:
      type: string
      pattern: (?!\s*$).+|(\$(\.[\w/_-]+(\[(\d+|\*)\])*)*)
    PipeTargetParameters:
      description: The parameters required to set up a target for your pipe. For more information about pipe target parameters, including how to use dynamic path parameters, see Target parameters in the Amazon EventBridge User Guide.
      type: object
      properties:
        InputTemplate:
          $ref: "#/components/schemas/InputTemplate"
          description: Valid JSON text passed to the target. In this case, nothing from the event itself is passed to the target. For more information, see The JavaScript Object Notation (JSON) Data Interchange Format. To remove an input template, specify an empty string.
        LambdaFunctionParameters:
          $ref: "#/components/schemas/PipeTargetLambdaFunctionParameters"
          description: The parameters for using a Lambda function as a target.
        StepFunctionStateMachineParameters:
          $ref: "#/components/schemas/PipeTargetStateMachineParameters"
          description: The parameters for using a Step Functions state machine as a target.
        KinesisStreamParameters:
          $ref: "#/components/schemas/PipeTargetKinesisStreamParameters"
          description: The parameters for using a Kinesis stream as a target.
        EcsTaskParameters:
          $ref: "#/components/schemas/PipeTargetEcsTaskParameters"
          description: The parameters for using an Amazon ECS task as a target.
        BatchJobParameters:
          $ref: "#/components/schemas/PipeTargetBatchJobParameters"
          description: The parameters for using an Batch job as a target.
        SqsQueueParameters:
          $ref: "#/components/schemas/PipeTargetSqsQueueParameters"
          description: The parameters for using a Amazon SQS stream as a target.
        HttpParameters:
          $ref: "#/components/schemas/PipeTargetHttpParameters"
          description: These are custom parameter to be used when the target is an API Gateway REST APIs or EventBridge ApiDestinations.
        RedshiftDataParameters:
          $ref: "#/components/schemas/PipeTargetRedshiftDataParameters"
          description: These are custom parameters to be used when the target is a Amazon Redshift cluster to invoke the Amazon Redshift Data API BatchExecuteStatement.
        SageMakerPipelineParameters:
          $ref: "#/components/schemas/PipeTargetSageMakerPipelineParameters"
          description: The parameters for using a SageMaker pipeline as a target.
        EventBridgeEventBusParameters:
          $ref: "#/components/schemas/PipeTargetEventBridgeEventBusParameters"
          description: The parameters for using an EventBridge event bus as a target.
        CloudWatchLogsParameters:
          $ref: "#/components/schemas/PipeTargetCloudWatchLogsParameters"
          description: The parameters for using an CloudWatch Logs log stream as a target.
        TimestreamParameters:
          $ref: "#/components/schemas/PipeTargetTimestreamParameters"
          description: The parameters for using a Timestream for LiveAnalytics table as a target.
    PipeTargetLambdaFunctionParameters:
      description: The parameters for using a Lambda function as a target.
      type: object
      properties:
        InvocationType:
          $ref: "#/components/schemas/PipeTargetInvocationType"
          description: Specify whether to invoke the function synchronously or asynchronously. REQUEST_RESPONSE (default) - Invoke synchronously. This corresponds to the RequestResponse option in the InvocationType parameter for the Lambda Invoke API. FIRE_AND_FORGET - Invoke asynchronously. This corresponds to the Event option in the InvocationType parameter for the Lambda Invoke API. For more information, see Invocation types in the Amazon EventBridge User Guide.
    PipeTargetInvocationType:
      type: string
      enum:
        - REQUEST_RESPONSE
        - FIRE_AND_FORGET
    PipeTargetStateMachineParameters:
      description: The parameters for using a Step Functions state machine as a target.
      type: object
      properties:
        InvocationType:
          $ref: "#/components/schemas/PipeTargetInvocationType"
          description: Specify whether to invoke the Step Functions state machine synchronously or asynchronously. REQUEST_RESPONSE (default) - Invoke synchronously. For more information, see StartSyncExecution in the Step Functions API Reference. REQUEST_RESPONSE is not supported for STANDARD state machine workflows. FIRE_AND_FORGET - Invoke asynchronously. For more information, see StartExecution in the Step Functions API Reference. For more information, see Invocation types in the Amazon EventBridge User Guide.
    PipeTargetKinesisStreamParameters:
      description: The parameters for using a Kinesis stream as a target.
      type: object
      properties:
        PartitionKey:
          $ref: "#/components/schemas/KinesisPartitionKey"
          description: Determines which shard in the stream the data record is assigned to. Partition keys are Unicode strings with a maximum length limit of 256 characters for each key. Amazon Kinesis Data Streams uses the partition key as input to a hash function that maps the partition key and associated data to a specific shard. Specifically, an MD5 hash function is used to map partition keys to 128-bit integer values and to map associated data records to shards. As a result of this hashing mechanism, all data records with the same partition key map to the same shard within the stream.
      required:
        - PartitionKey
    KinesisPartitionKey:
      type: string
      minLength: 0
      maxLength: 256
    PipeTargetEcsTaskParameters:
      description: The parameters for using an Amazon ECS task as a target.
      type: object
      properties:
        TaskDefinitionArn:
          $ref: "#/components/schemas/ArnOrJsonPath"
          description: The ARN of the task definition to use if the event target is an Amazon ECS task.
        TaskCount:
          $ref: "#/components/schemas/LimitMin1"
          description: The number of tasks to create based on TaskDefinition. The default is 1.
        LaunchType:
          $ref: "#/components/schemas/LaunchType"
          description: Specifies the launch type on which your task is running. The launch type that you specify here must match one of the launch type (compatibilities) of the target task. The FARGATE value is supported only in the Regions where Fargate with Amazon ECS is supported. For more information, see Fargate on Amazon ECS in the Amazon Elastic Container Service Developer Guide.
        NetworkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: Use this structure if the Amazon ECS task uses the awsvpc network mode. This structure specifies the VPC subnets and security groups associated with the task, and whether a public IP address is to be used. This structure is required if LaunchType is FARGATE because the awsvpc mode is required for Fargate tasks. If you specify NetworkConfiguration when the target ECS task does not use the awsvpc network mode, the task fails.
        PlatformVersion:
          $ref: "#/components/schemas/String"
          description: Specifies the platform version for the task. Specify only the numeric portion of the platform version, such as 1.1.0. This structure is used only if LaunchType is FARGATE. For more information about valid platform versions, see Fargate Platform Versions in the Amazon Elastic Container Service Developer Guide.
        Group:
          $ref: "#/components/schemas/String"
          description: Specifies an Amazon ECS task group for the task. The maximum length is 255 characters.
        CapacityProviderStrategy:
          $ref: "#/components/schemas/CapacityProviderStrategy"
          description: The capacity provider strategy to use for the task. If a capacityProviderStrategy is specified, the launchType parameter must be omitted. If no capacityProviderStrategy or launchType is specified, the defaultCapacityProviderStrategy for the cluster is used.
        EnableECSManagedTags:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to enable Amazon ECS managed tags for the task. For more information, see Tagging Your Amazon ECS Resources in the Amazon Elastic Container Service Developer Guide.
        EnableExecuteCommand:
          $ref: "#/components/schemas/Boolean"
          description: Whether or not to enable the execute command functionality for the containers in this task. If true, this enables execute command functionality on all containers in the task.
        PlacementConstraints:
          $ref: "#/components/schemas/PlacementConstraints"
          description: An array of placement constraint objects to use for the task. You can specify up to 10 constraints per task (including constraints in the task definition and those specified at runtime).
        PlacementStrategy:
          $ref: "#/components/schemas/PlacementStrategies"
          description: The placement strategy objects to use for the task. You can specify a maximum of five strategy rules per task.
        PropagateTags:
          $ref: "#/components/schemas/PropagateTags"
          description: Specifies whether to propagate the tags from the task definition to the task. If no value is specified, the tags are not propagated. Tags can only be propagated to the task during task creation. To add tags to a task after task creation, use the TagResource API action.
        ReferenceId:
          $ref: "#/components/schemas/ReferenceId"
          description: The reference ID to use for the task.
        Overrides:
          $ref: "#/components/schemas/EcsTaskOverride"
          description: The overrides that are associated with a task.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The metadata that you apply to the task to help you categorize and organize them. Each tag consists of a key and an optional value, both of which you define. To learn more, see RunTask in the Amazon ECS API Reference.
      required:
        - TaskDefinitionArn
    ArnOrJsonPath:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: arn:(aws[a-zA-Z0-9-]*):([a-zA-Z0-9\-]+):([a-z]{2,4}((-gov)|(-de)|(-iso([a-z]?)))?-[a-z]+(-\d{1})?)?:(\d{12})?:(.+)|(\$(\.[\w/_-]+(\[(\d+|\*)\])*)*)
    LimitMin1:
      type: integer
      minimum: 1
    LaunchType:
      type: string
      enum:
        - EC2
        - FARGATE
        - EXTERNAL
    NetworkConfiguration:
      description: This structure specifies the network configuration for an Amazon ECS task.
      type: object
      properties:
        awsvpcConfiguration:
          $ref: "#/components/schemas/AwsVpcConfiguration"
          description: Use this structure to specify the VPC subnets and security groups for the task, and whether a public IP address is to be used. This structure is relevant only for ECS tasks that use the awsvpc network mode.
    AwsVpcConfiguration:
      description: This structure specifies the VPC subnets and security groups for the task, and whether a public IP address is to be used. This structure is relevant only for ECS tasks that use the awsvpc network mode.
      type: object
      properties:
        Subnets:
          $ref: "#/components/schemas/Subnets"
          description: Specifies the subnets associated with the task. These subnets must all be in the same VPC. You can specify as many as 16 subnets.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroups"
          description: Specifies the security groups associated with the task. These security groups must all be in the same VPC. You can specify as many as five security groups. If you do not specify a security group, the default security group for the VPC is used.
        AssignPublicIp:
          $ref: "#/components/schemas/AssignPublicIp"
          description: Specifies whether the task's elastic network interface receives a public IP address. You can specify ENABLED only when LaunchType in EcsParameters is set to FARGATE.
      required:
        - Subnets
    Subnets:
      type: array
      items:
        $ref: "#/components/schemas/Subnet"
    Subnet:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: subnet-[0-9a-z]*|(\$(\.[\w/_-]+(\[(\d+|\*)\])*)*)
    SecurityGroups:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroup"
    SecurityGroup:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: sg-[0-9a-zA-Z]*|(\$(\.[\w/_-]+(\[(\d+|\*)\])*)*)
    AssignPublicIp:
      type: string
      enum:
        - ENABLED
        - DISABLED
    String:
      type: string
    CapacityProviderStrategy:
      type: array
      items:
        $ref: "#/components/schemas/CapacityProviderStrategyItem"
    CapacityProviderStrategyItem:
      description: The details of a capacity provider strategy. To learn more, see CapacityProviderStrategyItem in the Amazon ECS API Reference.
      type: object
      properties:
        capacityProvider:
          $ref: "#/components/schemas/CapacityProvider"
          description: The short name of the capacity provider.
        weight:
          $ref: "#/components/schemas/CapacityProviderStrategyItemWeight"
          description: The weight value designates the relative percentage of the total number of tasks launched that should use the specified capacity provider. The weight value is taken into consideration after the base value, if defined, is satisfied.
        base:
          $ref: "#/components/schemas/CapacityProviderStrategyItemBase"
          description: The base value designates how many tasks, at a minimum, to run on the specified capacity provider. Only one capacity provider in a capacity provider strategy can have a base defined. If no value is specified, the default value of 0 is used.
      required:
        - capacityProvider
    CapacityProvider:
      type: string
      minLength: 1
      maxLength: 255
    CapacityProviderStrategyItemWeight:
      type: integer
      minimum: 0
      maximum: 1000
    CapacityProviderStrategyItemBase:
      type: integer
      minimum: 0
      maximum: 100000
    Boolean:
      type: boolean
    PlacementConstraints:
      type: array
      items:
        $ref: "#/components/schemas/PlacementConstraint"
    PlacementConstraint:
      description: An object representing a constraint on task placement. To learn more, see Task Placement Constraints in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/PlacementConstraintType"
          description: The type of constraint. Use distinctInstance to ensure that each task in a particular group is running on a different container instance. Use memberOf to restrict the selection to a group of valid candidates.
        expression:
          $ref: "#/components/schemas/PlacementConstraintExpression"
          description: A cluster query language expression to apply to the constraint. You cannot specify an expression if the constraint type is distinctInstance. To learn more, see Cluster Query Language in the Amazon Elastic Container Service Developer Guide.
    PlacementConstraintType:
      type: string
      enum:
        - distinctInstance
        - memberOf
    PlacementConstraintExpression:
      type: string
      minLength: 0
      maxLength: 2000
    PlacementStrategies:
      type: array
      items:
        $ref: "#/components/schemas/PlacementStrategy"
    PlacementStrategy:
      description: The task placement strategy for a task or service. To learn more, see Task Placement Strategies in the Amazon Elastic Container Service Service Developer Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/PlacementStrategyType"
          description: The type of placement strategy. The random placement strategy randomly places tasks on available candidates. The spread placement strategy spreads placement across available candidates evenly based on the field parameter. The binpack strategy places tasks on available candidates that have the least available amount of the resource that is specified with the field parameter. For example, if you binpack on memory, a task is placed on the instance with the least amount of remaining memory (but still enough to run the task).
        field:
          $ref: "#/components/schemas/PlacementStrategyField"
          description: The field to apply the placement strategy against. For the spread placement strategy, valid values are instanceId (or host, which has the same effect), or any platform or custom attribute that is applied to a container instance, such as attribute:ecs.availability-zone. For the binpack placement strategy, valid values are cpu and memory. For the random placement strategy, this field is not used.
    PlacementStrategyType:
      type: string
      enum:
        - random
        - spread
        - binpack
    PlacementStrategyField:
      type: string
      minLength: 0
      maxLength: 255
    PropagateTags:
      type: string
      enum:
        - TASK_DEFINITION
    ReferenceId:
      type: string
      minLength: 0
      maxLength: 1024
    EcsTaskOverride:
      description: The overrides that are associated with a task.
      type: object
      properties:
        ContainerOverrides:
          $ref: "#/components/schemas/EcsContainerOverrideList"
          description: One or more container overrides that are sent to a task.
        Cpu:
          $ref: "#/components/schemas/String"
          description: The cpu override for the task.
        EphemeralStorage:
          $ref: "#/components/schemas/EcsEphemeralStorage"
          description: "The ephemeral storage setting override for the task. This parameter is only supported for tasks hosted on Fargate that use the following platform versions: Linux platform version 1.4.0 or later. Windows platform version 1.0.0 or later."
        ExecutionRoleArn:
          $ref: "#/components/schemas/ArnOrJsonPath"
          description: The Amazon Resource Name (ARN) of the task execution IAM role override for the task. For more information, see Amazon ECS task execution IAM role in the Amazon Elastic Container Service Developer Guide.
        InferenceAcceleratorOverrides:
          $ref: "#/components/schemas/EcsInferenceAcceleratorOverrideList"
          description: The Elastic Inference accelerator override for the task.
        Memory:
          $ref: "#/components/schemas/String"
          description: The memory override for the task.
        TaskRoleArn:
          $ref: "#/components/schemas/ArnOrJsonPath"
          description: The Amazon Resource Name (ARN) of the IAM role that containers in this task can assume. All containers in this task are granted the permissions that are specified in this role. For more information, see IAM Role for Tasks in the Amazon Elastic Container Service Developer Guide.
    EcsContainerOverrideList:
      type: array
      items:
        $ref: "#/components/schemas/EcsContainerOverride"
    EcsContainerOverride:
      description: 'The overrides that are sent to a container. An empty container override can be passed in. An example of an empty container override is {"containerOverrides": [ ] }. If a non-empty container override is specified, the name parameter must be included.'
      type: object
      properties:
        Command:
          $ref: "#/components/schemas/StringList"
          description: The command to send to the container that overrides the default command from the Docker image or the task definition. You must also specify a container name.
        Cpu:
          $ref: "#/components/schemas/Integer"
          description: The number of cpu units reserved for the container, instead of the default value from the task definition. You must also specify a container name.
        Environment:
          $ref: "#/components/schemas/EcsEnvironmentVariableList"
          description: The environment variables to send to the container. You can add new environment variables, which are added to the container at launch, or you can override the existing environment variables from the Docker image or the task definition. You must also specify a container name.
        EnvironmentFiles:
          $ref: "#/components/schemas/EcsEnvironmentFileList"
          description: A list of files containing the environment variables to pass to a container, instead of the value from the container definition.
        Memory:
          $ref: "#/components/schemas/Integer"
          description: The hard limit (in MiB) of memory to present to the container, instead of the default value from the task definition. If your container attempts to exceed the memory specified here, the container is killed. You must also specify a container name.
        MemoryReservation:
          $ref: "#/components/schemas/Integer"
          description: The soft limit (in MiB) of memory to reserve for the container, instead of the default value from the task definition. You must also specify a container name.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the container that receives the override. This parameter is required if any override is specified.
        ResourceRequirements:
          $ref: "#/components/schemas/EcsResourceRequirementsList"
          description: The type and amount of a resource to assign to a container, instead of the default value from the task definition. The only supported resource is a GPU.
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Integer:
      type: integer
    EcsEnvironmentVariableList:
      type: array
      items:
        $ref: "#/components/schemas/EcsEnvironmentVariable"
    EcsEnvironmentVariable:
      description: The environment variables to send to the container. You can add new environment variables, which are added to the container at launch, or you can override the existing environment variables from the Docker image or the task definition. You must also specify a container name.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the key-value pair. For environment variables, this is the name of the environment variable.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the key-value pair. For environment variables, this is the value of the environment variable.
    EcsEnvironmentFileList:
      type: array
      items:
        $ref: "#/components/schemas/EcsEnvironmentFile"
    EcsEnvironmentFile:
      description: "A list of files containing the environment variables to pass to a container. You can specify up to ten environment files. The file must have a .env file extension. Each line in an environment file should contain an environment variable in VARIABLE=VALUE format. Lines beginning with # are treated as comments and are ignored. For more information about the environment variable file syntax, see Declare default environment variables in file. If there are environment variables specified using the environment parameter in a container definition, they take precedence over the variables contained within an environment file. If multiple environment files are specified that contain the same variable, they're processed from the top down. We recommend that you use unique variable names. For more information, see Specifying environment variables in the Amazon Elastic Container Service Developer Guide. This parameter is only supported for tasks hosted on Fargate using the following platform versions: Linux platform version 1.4.0 or later. Windows platform version 1.0.0 or later."
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/EcsEnvironmentFileType"
          description: The file type to use. The only supported value is s3.
        value:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon S3 object containing the environment variable file.
      required:
        - type_
        - value
    EcsEnvironmentFileType:
      type: string
      enum:
        - s3
    EcsResourceRequirementsList:
      type: array
      items:
        $ref: "#/components/schemas/EcsResourceRequirement"
    EcsResourceRequirement:
      description: The type and amount of a resource to assign to a container. The supported resource types are GPUs and Elastic Inference accelerators. For more information, see Working with GPUs on Amazon ECS or Working with Amazon Elastic Inference on Amazon ECS in the Amazon Elastic Container Service Developer Guide
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/EcsResourceRequirementType"
          description: The type of resource to assign to a container. The supported values are GPU or InferenceAccelerator.
        value:
          $ref: "#/components/schemas/String"
          description: The value for the specified resource type. If the GPU type is used, the value is the number of physical GPUs the Amazon ECS container agent reserves for the container. The number of GPUs that's reserved for all containers in a task can't exceed the number of available GPUs on the container instance that the task is launched on. If the InferenceAccelerator type is used, the value matches the deviceName for an InferenceAccelerator specified in a task definition.
      required:
        - type_
        - value
    EcsResourceRequirementType:
      type: string
      enum:
        - GPU
        - InferenceAccelerator
    EcsEphemeralStorage:
      description: The amount of ephemeral storage to allocate for the task. This parameter is used to expand the total amount of ephemeral storage available, beyond the default amount, for tasks hosted on Fargate. For more information, see Fargate task storage in the Amazon ECS User Guide for Fargate. This parameter is only supported for tasks hosted on Fargate using Linux platform version 1.4.0 or later. This parameter is not supported for Windows containers on Fargate.
      type: object
      properties:
        sizeInGiB:
          $ref: "#/components/schemas/EphemeralStorageSize"
          description: The total amount, in GiB, of ephemeral storage to set for the task. The minimum supported value is 21 GiB and the maximum supported value is 200 GiB.
      required:
        - sizeInGiB
    EphemeralStorageSize:
      type: integer
      minimum: 21
      maximum: 200
    EcsInferenceAcceleratorOverrideList:
      type: array
      items:
        $ref: "#/components/schemas/EcsInferenceAcceleratorOverride"
    EcsInferenceAcceleratorOverride:
      description: Details on an Elastic Inference accelerator task override. This parameter is used to override the Elastic Inference accelerator specified in the task definition. For more information, see Working with Amazon Elastic Inference on Amazon ECS in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        deviceName:
          $ref: "#/components/schemas/String"
          description: The Elastic Inference accelerator device name to override for the task. This parameter must match a deviceName specified in the task definition.
        deviceType:
          $ref: "#/components/schemas/String"
          description: The Elastic Inference accelerator type to use.
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key-value pair associated with an Amazon Web Services resource. In EventBridge, rules and event buses support tagging.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: A string you can use to assign a value. The combination of tag keys and values can help you organize and categorize your resources.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value for the specified tag key.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    PipeTargetBatchJobParameters:
      description: The parameters for using an Batch job as a target.
      type: object
      properties:
        JobDefinition:
          $ref: "#/components/schemas/String"
          description: The job definition used by this job. This value can be one of name, name:revision, or the Amazon Resource Name (ARN) for the job definition. If name is specified without a revision then the latest active revision is used.
        JobName:
          $ref: "#/components/schemas/String"
          description: The name of the job. It can be up to 128 letters long. The first character must be alphanumeric, can contain uppercase and lowercase letters, numbers, hyphens (-), and underscores (_).
        ArrayProperties:
          $ref: "#/components/schemas/BatchArrayProperties"
          description: The array properties for the submitted job, such as the size of the array. The array size can be between 2 and 10,000. If you specify array properties for a job, it becomes an array job. This parameter is used only if the target is an Batch job.
        RetryStrategy:
          $ref: "#/components/schemas/BatchRetryStrategy"
          description: The retry strategy to use for failed jobs. When a retry strategy is specified here, it overrides the retry strategy defined in the job definition.
        ContainerOverrides:
          $ref: "#/components/schemas/BatchContainerOverrides"
          description: The overrides that are sent to a container.
        DependsOn:
          $ref: "#/components/schemas/BatchDependsOn"
          description: A list of dependencies for the job. A job can depend upon a maximum of 20 jobs. You can specify a SEQUENTIAL type dependency without specifying a job ID for array jobs so that each child array job completes sequentially, starting at index 0. You can also specify an N_TO_N type dependency with a job ID for array jobs. In that case, each index child of this job must wait for the corresponding index child of each dependency to complete before it can begin.
        Parameters:
          type: object
          properties: {}
          description: Additional parameters passed to the job that replace parameter substitution placeholders that are set in the job definition. Parameters are specified as a key and value pair mapping. Parameters included here override any corresponding parameter defaults from the job definition.
      required:
        - JobDefinition
        - JobName
    BatchArrayProperties:
      description: The array properties for the submitted job, such as the size of the array. The array size can be between 2 and 10,000. If you specify array properties for a job, it becomes an array job. This parameter is used only if the target is an Batch job.
      type: object
      properties:
        Size:
          $ref: "#/components/schemas/BatchArraySize"
          description: The size of the array, if this is an array batch job.
    BatchArraySize:
      type: integer
      minimum: 2
      maximum: 10000
    BatchRetryStrategy:
      description: The retry strategy that's associated with a job. For more information, see Automated job retries in the Batch User Guide.
      type: object
      properties:
        Attempts:
          $ref: "#/components/schemas/BatchRetryAttempts"
          description: The number of times to move a job to the RUNNABLE status. If the value of attempts is greater than one, the job is retried on failure the same number of attempts as the value.
    BatchRetryAttempts:
      type: integer
      minimum: 1
      maximum: 10
    BatchContainerOverrides:
      description: The overrides that are sent to a container.
      type: object
      properties:
        Command:
          $ref: "#/components/schemas/StringList"
          description: The command to send to the container that overrides the default command from the Docker image or the task definition.
        Environment:
          $ref: "#/components/schemas/BatchEnvironmentVariableList"
          description: The environment variables to send to the container. You can add new environment variables, which are added to the container at launch, or you can override the existing environment variables from the Docker image or the task definition. Environment variables cannot start with "Batch". This naming convention is reserved for variables that Batch sets.
        InstanceType:
          $ref: "#/components/schemas/String"
          description: The instance type to use for a multi-node parallel job. This parameter isn't applicable to single-node container jobs or jobs that run on Fargate resources, and shouldn't be provided.
        ResourceRequirements:
          $ref: "#/components/schemas/BatchResourceRequirementsList"
          description: The type and amount of resources to assign to a container. This overrides the settings in the job definition. The supported resources include GPU, MEMORY, and VCPU.
    BatchEnvironmentVariableList:
      type: array
      items:
        $ref: "#/components/schemas/BatchEnvironmentVariable"
    BatchEnvironmentVariable:
      description: The environment variables to send to the container. You can add new environment variables, which are added to the container at launch, or you can override the existing environment variables from the Docker image or the task definition. Environment variables cannot start with "Batch". This naming convention is reserved for variables that Batch sets.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the key-value pair. For environment variables, this is the name of the environment variable.
        Value:
          $ref: "#/components/schemas/String"
          description: The value of the key-value pair. For environment variables, this is the value of the environment variable.
    BatchResourceRequirementsList:
      type: array
      items:
        $ref: "#/components/schemas/BatchResourceRequirement"
    BatchResourceRequirement:
      description: The type and amount of a resource to assign to a container. The supported resources include GPU, MEMORY, and VCPU.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/BatchResourceRequirementType"
          description: The type of resource to assign to a container. The supported resources include GPU, MEMORY, and VCPU.
        Value:
          $ref: "#/components/schemas/String"
          description: The quantity of the specified resource to reserve for the container. The values vary based on the type specified. type="GPU" The number of physical GPUs to reserve for the container. Make sure that the number of GPUs reserved for all containers in a job doesn't exceed the number of available GPUs on the compute resource that the job is launched on. GPUs aren't available for jobs that are running on Fargate resources. type="MEMORY" The memory hard limit (in MiB) present to the container. This parameter is supported for jobs that are running on EC2 resources. If your container attempts to exceed the memory specified, the container is terminated. This parameter maps to Memory in the Create a container section of the Docker Remote API and the --memory option to docker run. You must specify at least 4 MiB of memory for a job. This is required but can be specified in several places for multi-node parallel (MNP) jobs. It must be specified for each node at least once. This parameter maps to Memory in the Create a container section of the Docker Remote API and the --memory option to docker run. If you're trying to maximize your resource utilization by providing your jobs as much memory as possible for a particular instance type, see Memory management in the Batch User Guide. For jobs that are running on Fargate resources, then value is the hard limit (in MiB), and must match one of the supported values and the VCPU values must be one of the values supported for that memory value. value = 512 VCPU = 0.25 value = 1024 VCPU = 0.25 or 0.5 value = 2048 VCPU = 0.25, 0.5, or 1 value = 3072 VCPU = 0.5, or 1 value = 4096 VCPU = 0.5, 1, or 2 value = 5120, 6144, or 7168 VCPU = 1 or 2 value = 8192 VCPU = 1, 2, 4, or 8 value = 9216, 10240, 11264, 12288, 13312, 14336, or 15360 VCPU = 2 or 4 value = 16384 VCPU = 2, 4, or 8 value = 17408, 18432, 19456, 21504, 22528, 23552, 25600, 26624, 27648, 29696, or 30720 VCPU = 4 value = 20480, 24576, or 28672 VCPU = 4 or 8 value = 36864, 45056, 53248, or 61440 VCPU = 8 value = 32768, 40960, 49152, or 57344 VCPU = 8 or 16 value = 65536, 73728, 81920, 90112, 98304, 106496, 114688, or 122880 VCPU = 16 type="VCPU" The number of vCPUs reserved for the container. This parameter maps to CpuShares in the Create a container section of the Docker Remote API and the --cpu-shares option to docker run. Each vCPU is equivalent to 1,024 CPU shares. For EC2 resources, you must specify at least one vCPU. This is required but can be specified in several places; it must be specified for each node at least once. The default for the Fargate On-Demand vCPU resource count quota is 6 vCPUs. For more information about Fargate quotas, see Fargate quotas in the Amazon Web Services General Reference. For jobs that are running on Fargate resources, then value must match one of the supported values and the MEMORY values must be one of the values supported for that VCPU value. The supported values are 0.25, 0.5, 1, 2, 4, 8, and 16 value = 0.25 MEMORY = 512, 1024, or 2048 value = 0.5 MEMORY = 1024, 2048, 3072, or 4096 value = 1 MEMORY = 2048, 3072, 4096, 5120, 6144, 7168, or 8192 value = 2 MEMORY = 4096, 5120, 6144, 7168, 8192, 9216, 10240, 11264, 12288, 13312, 14336, 15360, or 16384 value = 4 MEMORY = 8192, 9216, 10240, 11264, 12288, 13312, 14336, 15360, 16384, 17408, 18432, 19456, 20480, 21504, 22528, 23552, 24576, 25600, 26624, 27648, 28672, 29696, or 30720 value = 8 MEMORY = 16384, 20480, 24576, 28672, 32768, 36864, 40960, 45056, 49152, 53248, 57344, or 61440 value = 16 MEMORY = 32768, 40960, 49152, 57344, 65536, 73728, 81920, 90112, 98304, 106496, 114688, or 122880
      required:
        - Type
        - Value
    BatchResourceRequirementType:
      type: string
      enum:
        - GPU
        - MEMORY
        - VCPU
    BatchDependsOn:
      type: array
      items:
        $ref: "#/components/schemas/BatchJobDependency"
    BatchJobDependency:
      description: An object that represents an Batch job dependency.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/String"
          description: The job ID of the Batch job that's associated with this dependency.
        Type:
          $ref: "#/components/schemas/BatchJobDependencyType"
          description: The type of the job dependency.
    BatchJobDependencyType:
      type: string
      enum:
        - N_TO_N
        - SEQUENTIAL
    PipeTargetSqsQueueParameters:
      description: The parameters for using a Amazon SQS stream as a target.
      type: object
      properties:
        MessageGroupId:
          $ref: "#/components/schemas/MessageGroupId"
          description: The FIFO message group ID to use as the target.
        MessageDeduplicationId:
          $ref: "#/components/schemas/MessageDeduplicationId"
          description: This parameter applies only to FIFO (first-in-first-out) queues. The token used for deduplication of sent messages.
    MessageGroupId:
      type: string
      minLength: 0
      maxLength: 100
    MessageDeduplicationId:
      type: string
      minLength: 0
      maxLength: 100
    PipeTargetHttpParameters:
      description: These are custom parameter to be used when the target is an API Gateway REST APIs or EventBridge ApiDestinations.
      type: object
      properties:
        PathParameterValues:
          $ref: "#/components/schemas/PathParameterList"
          description: The path parameter values to be used to populate API Gateway REST API or EventBridge ApiDestination path wildcards ("*").
        HeaderParameters:
          type: object
          properties: {}
          description: The headers that need to be sent as part of request invoking the API Gateway REST API or EventBridge ApiDestination.
        QueryStringParameters:
          type: object
          properties: {}
          description: The query string keys/values that need to be sent as part of request invoking the API Gateway REST API or EventBridge ApiDestination.
    PipeTargetRedshiftDataParameters:
      description: These are custom parameters to be used when the target is a Amazon Redshift cluster to invoke the Amazon Redshift Data API BatchExecuteStatement.
      type: object
      properties:
        SecretManagerArn:
          $ref: "#/components/schemas/SecretManagerArnOrJsonPath"
          description: The name or ARN of the secret that enables access to the database. Required when authenticating using Secrets Manager.
        Database:
          $ref: "#/components/schemas/Database"
          description: The name of the database. Required when authenticating using temporary credentials.
        DbUser:
          $ref: "#/components/schemas/DbUser"
          description: The database user name. Required when authenticating using temporary credentials.
        StatementName:
          $ref: "#/components/schemas/StatementName"
          description: The name of the SQL statement. You can name the SQL statement when you create it to identify the query.
        WithEvent:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether to send an event back to EventBridge after the SQL statement runs.
        Sqls:
          $ref: "#/components/schemas/Sqls"
          description: The SQL statement text to run.
      required:
        - Database
        - Sqls
    SecretManagerArnOrJsonPath:
      description: // For targets, can either specify an ARN or a jsonpath pointing to the ARN.
      type: string
      minLength: 1
      maxLength: 1600
      pattern: (^arn:aws([a-z]|\-)*:secretsmanager:([a-z]{2,4}((-gov)|(-de)|(-iso([a-z]?)))?-[a-z]+(-\d{1})?):(\d{12}):secret:.+)|(\$(\.[\w/_-]+(\[(\d+|\*)\])*)*)
    Database:
      description: // Redshift Database
      type: string
      minLength: 1
      maxLength: 64
    DbUser:
      description: // Database user name
      type: string
      minLength: 1
      maxLength: 128
    StatementName:
      description: // A name for Redshift DataAPI statement which can be used as filter of // ListStatement.
      type: string
      minLength: 1
      maxLength: 500
    Sqls:
      description: // A list of SQLs.
      type: array
      items:
        $ref: "#/components/schemas/Sql"
    Sql:
      description: // A single Redshift SQL
      type: string
      minLength: 1
      maxLength: 100000
    PipeTargetSageMakerPipelineParameters:
      description: The parameters for using a SageMaker pipeline as a target.
      type: object
      properties:
        PipelineParameterList:
          $ref: "#/components/schemas/SageMakerPipelineParameterList"
          description: List of Parameter names and values for SageMaker Model Building Pipeline execution.
    SageMakerPipelineParameterList:
      type: array
      items:
        $ref: "#/components/schemas/SageMakerPipelineParameter"
    SageMakerPipelineParameter:
      description: Name/Value pair of a parameter to start execution of a SageMaker Model Building Pipeline.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SageMakerPipelineParameterName"
          description: Name of parameter to start execution of a SageMaker Model Building Pipeline.
        Value:
          $ref: "#/components/schemas/SageMakerPipelineParameterValue"
          description: Value of parameter to start execution of a SageMaker Model Building Pipeline.
      required:
        - Name
        - Value
    SageMakerPipelineParameterName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9])*|(\\$(\\.[\\w/_-]+(\\[(\\d+|\\*)\\])*)*)"
    SageMakerPipelineParameterValue:
      type: string
      minLength: 0
      maxLength: 1024
    PipeTargetEventBridgeEventBusParameters:
      description: The parameters for using an EventBridge event bus as a target.
      type: object
      properties:
        EndpointId:
          $ref: "#/components/schemas/EventBridgeEndpointId"
          description: The URL subdomain of the endpoint. For example, if the URL for Endpoint is https://abcde.veo.endpoints.event.amazonaws.com, then the EndpointId is abcde.veo.
        DetailType:
          $ref: "#/components/schemas/EventBridgeDetailType"
          description: A free-form string, with a maximum of 128 characters, used to decide what fields to expect in the event detail.
        Source:
          $ref: "#/components/schemas/EventBridgeEventSource"
          description: The source of the event.
        Resources:
          $ref: "#/components/schemas/EventBridgeEventResourceList"
          description: Amazon Web Services resources, identified by Amazon Resource Name (ARN), which the event primarily concerns. Any number, including zero, may be present.
        Time:
          $ref: "#/components/schemas/JsonPath"
          description: The time stamp of the event, per RFC3339. If no time stamp is provided, the time stamp of the PutEvents call is used.
    EventBridgeEndpointId:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[A-Za-z0-9\\-]+[\\.][A-Za-z0-9\\-]+"
    EventBridgeDetailType:
      type: string
      minLength: 1
      maxLength: 128
    EventBridgeEventSource:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*(?=[/\.\-_A-Za-z0-9]+)((?!aws\.).*)|(\$(\.[\w/_-]+(\[(\d+|\*)\])*)*).*
    EventBridgeEventResourceList:
      type: array
      items:
        $ref: "#/components/schemas/ArnOrJsonPath"
    JsonPath:
      type: string
      minLength: 1
      maxLength: 256
      pattern: \$(\.[\w/_-]+(\[(\d+|\*)\])*)*
    PipeTargetCloudWatchLogsParameters:
      description: The parameters for using an CloudWatch Logs log stream as a target.
      type: object
      properties:
        LogStreamName:
          $ref: "#/components/schemas/LogStreamName"
          description: The name of the log stream.
        Timestamp:
          $ref: "#/components/schemas/JsonPath"
          description: The time the event occurred, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
    LogStreamName:
      type: string
      minLength: 1
      maxLength: 256
    PipeTargetTimestreamParameters:
      description: The parameters for using a Timestream for LiveAnalytics table as a target.
      type: object
      properties:
        TimeValue:
          $ref: "#/components/schemas/TimeValue"
          description: Dynamic path to the source data field that represents the time value for your data.
        EpochTimeUnit:
          $ref: "#/components/schemas/EpochTimeUnit"
          description: The granularity of the time units used. Default is MILLISECONDS. Required if TimeFieldType is specified as EPOCH.
        TimeFieldType:
          $ref: "#/components/schemas/TimeFieldType"
          description: The type of time value used. The default is EPOCH.
        TimestampFormat:
          $ref: "#/components/schemas/TimestampFormat"
          description: How to format the timestamps. For example, yyyy-MM-dd'T'HH:mm:ss'Z'. Required if TimeFieldType is specified as TIMESTAMP_FORMAT.
        VersionValue:
          $ref: "#/components/schemas/VersionValue"
          description: 64 bit version value or source data field that represents the version value for your data. Write requests with a higher version number will update the existing measure values of the record and version. In cases where the measure value is the same, the version will still be updated. Default value is 1. Timestream for LiveAnalytics does not support updating partial measure values in a record. Write requests for duplicate data with a higher version number will update the existing measure value and version. In cases where the measure value is the same, Version will still be updated. Default value is 1. Version must be 1 or greater, or you will receive a ValidationException error.
        DimensionMappings:
          $ref: "#/components/schemas/DimensionMappings"
          description: Map source data to dimensions in the target Timestream for LiveAnalytics table. For more information, see Amazon Timestream for LiveAnalytics concepts
        SingleMeasureMappings:
          $ref: "#/components/schemas/SingleMeasureMappings"
          description: Mappings of single source data fields to individual records in the specified Timestream for LiveAnalytics table.
        MultiMeasureMappings:
          $ref: "#/components/schemas/MultiMeasureMappings"
          description: Maps multiple measures from the source event to the same record in the specified Timestream for LiveAnalytics table.
      required:
        - TimeValue
        - VersionValue
        - DimensionMappings
    TimeValue:
      type: string
      minLength: 1
      maxLength: 256
    EpochTimeUnit:
      type: string
      enum:
        - MILLISECONDS
        - SECONDS
        - MICROSECONDS
        - NANOSECONDS
    TimeFieldType:
      type: string
      enum:
        - EPOCH
        - TIMESTAMP_FORMAT
    TimestampFormat:
      type: string
      minLength: 1
      maxLength: 256
    VersionValue:
      type: string
      minLength: 1
      maxLength: 256
    DimensionMappings:
      type: array
      items:
        $ref: "#/components/schemas/DimensionMapping"
    DimensionMapping:
      description: Maps source data to a dimension in the target Timestream for LiveAnalytics table. For more information, see Amazon Timestream for LiveAnalytics concepts
      type: object
      properties:
        DimensionValue:
          $ref: "#/components/schemas/DimensionValue"
          description: Dynamic path to the dimension value in the source event.
        DimensionValueType:
          $ref: "#/components/schemas/DimensionValueType"
          description: The data type of the dimension for the time-series data.
        DimensionName:
          $ref: "#/components/schemas/DimensionName"
          description: The metadata attributes of the time series. For example, the name and Availability Zone of an Amazon EC2 instance or the name of the manufacturer of a wind turbine are dimensions.
      required:
        - DimensionValue
        - DimensionValueType
        - DimensionName
    DimensionValue:
      type: string
      minLength: 1
      maxLength: 2048
    DimensionValueType:
      type: string
      enum:
        - VARCHAR
    DimensionName:
      type: string
      minLength: 1
      maxLength: 256
    SingleMeasureMappings:
      type: array
      items:
        $ref: "#/components/schemas/SingleMeasureMapping"
    SingleMeasureMapping:
      description: Maps a single source data field to a single record in the specified Timestream for LiveAnalytics table. For more information, see Amazon Timestream for LiveAnalytics concepts
      type: object
      properties:
        MeasureValue:
          $ref: "#/components/schemas/MeasureValue"
          description: Dynamic path of the source field to map to the measure in the record.
        MeasureValueType:
          $ref: "#/components/schemas/MeasureValueType"
          description: Data type of the source field.
        MeasureName:
          $ref: "#/components/schemas/MeasureName"
          description: Target measure name for the measurement attribute in the Timestream table.
      required:
        - MeasureValue
        - MeasureValueType
        - MeasureName
    MeasureValue:
      type: string
      minLength: 1
      maxLength: 2048
    MeasureValueType:
      type: string
      enum:
        - DOUBLE
        - BIGINT
        - VARCHAR
        - BOOLEAN
        - TIMESTAMP
    MeasureName:
      type: string
      minLength: 1
      maxLength: 1024
    MultiMeasureMappings:
      type: array
      items:
        $ref: "#/components/schemas/MultiMeasureMapping"
    MultiMeasureMapping:
      description: Maps multiple measures from the source event to the same Timestream for LiveAnalytics record. For more information, see Amazon Timestream for LiveAnalytics concepts
      type: object
      properties:
        MultiMeasureName:
          $ref: "#/components/schemas/MultiMeasureName"
          description: The name of the multiple measurements per record (multi-measure).
        MultiMeasureAttributeMappings:
          $ref: "#/components/schemas/MultiMeasureAttributeMappings"
          description: Mappings that represent multiple source event fields mapped to measures in the same Timestream for LiveAnalytics record.
      required:
        - MultiMeasureName
        - MultiMeasureAttributeMappings
    MultiMeasureName:
      type: string
      minLength: 1
      maxLength: 256
    MultiMeasureAttributeMappings:
      type: array
      items:
        $ref: "#/components/schemas/MultiMeasureAttributeMapping"
    MultiMeasureAttributeMapping:
      description: A mapping of a source event data field to a measure in a Timestream for LiveAnalytics record.
      type: object
      properties:
        MeasureValue:
          $ref: "#/components/schemas/MeasureValue"
          description: Dynamic path to the measurement attribute in the source event.
        MeasureValueType:
          $ref: "#/components/schemas/MeasureValueType"
          description: Data type of the measurement attribute in the source event.
        MultiMeasureAttributeName:
          $ref: "#/components/schemas/MultiMeasureAttributeName"
          description: Target measure name to be used.
      required:
        - MeasureValue
        - MeasureValueType
        - MultiMeasureAttributeName
    MultiMeasureAttributeName:
      type: string
      minLength: 1
      maxLength: 256
    RoleArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: arn:(aws[a-zA-Z-]*)?:iam::\d{12}:role/?[a-zA-Z0-9+=,.@\-_/]+
    TagMap:
      type: object
      properties: {}
    PipeLogConfigurationParameters:
      description: Specifies the logging configuration settings for the pipe. When you call UpdatePipe, EventBridge updates the fields in the PipeLogConfigurationParameters object atomically as one and overrides existing values. This is by design. If you don't specify an optional field in any of the Amazon Web Services service parameters objects (CloudwatchLogsLogDestinationParameters, FirehoseLogDestinationParameters, or S3LogDestinationParameters), EventBridge sets that field to its system-default value during the update. For example, suppose when you created the pipe you specified a Firehose stream log destination. You then update the pipe to add an Amazon S3 log destination. In addition to specifying the S3LogDestinationParameters for the new log destination, you must also specify the fields in the FirehoseLogDestinationParameters object in order to retain the Firehose stream log destination. For more information on generating pipe log records, see Log EventBridge Pipes in the Amazon EventBridge User Guide.
      type: object
      properties:
        S3LogDestination:
          $ref: "#/components/schemas/S3LogDestinationParameters"
          description: The Amazon S3 logging configuration settings for the pipe.
        FirehoseLogDestination:
          $ref: "#/components/schemas/FirehoseLogDestinationParameters"
          description: The Amazon Data Firehose logging configuration settings for the pipe.
        CloudwatchLogsLogDestination:
          $ref: "#/components/schemas/CloudwatchLogsLogDestinationParameters"
          description: The Amazon CloudWatch Logs logging configuration settings for the pipe.
        Level:
          $ref: "#/components/schemas/LogLevel"
          description: The level of logging detail to include. This applies to all log destinations for the pipe. For more information, see Specifying EventBridge Pipes log level in the Amazon EventBridge User Guide.
        IncludeExecutionData:
          $ref: "#/components/schemas/IncludeExecutionData"
          description: Specify ALL to include the execution data (specifically, the payload, awsRequest, and awsResponse fields) in the log messages for this pipe. This applies to all log destinations for the pipe. For more information, see Including execution data in logs in the Amazon EventBridge User Guide. By default, execution data is not included.
      required:
        - Level
    S3LogDestinationParameters:
      description: The Amazon S3 logging configuration settings for the pipe.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3LogDestinationParametersBucketNameString"
          description: Specifies the name of the Amazon S3 bucket to which EventBridge delivers the log records for the pipe.
        BucketOwner:
          $ref: "#/components/schemas/S3LogDestinationParametersBucketOwnerString"
          description: Specifies the Amazon Web Services account that owns the Amazon S3 bucket to which EventBridge delivers the log records for the pipe.
        OutputFormat:
          $ref: "#/components/schemas/S3OutputFormat"
          description: How EventBridge should format the log records. EventBridge currently only supports json formatting.
        Prefix:
          $ref: "#/components/schemas/S3LogDestinationParametersPrefixString"
          description: Specifies any prefix text with which to begin Amazon S3 log object names. You can use prefixes to organize the data that you store in Amazon S3 buckets. A prefix is a string of characters at the beginning of the object key name. A prefix can be any length, subject to the maximum length of the object key name (1,024 bytes). For more information, see Organizing objects using prefixes in the Amazon Simple Storage Service User Guide.
      required:
        - BucketName
        - BucketOwner
    S3LogDestinationParametersBucketNameString:
      type: string
      minLength: 3
      maxLength: 63
    S3LogDestinationParametersBucketOwnerString:
      type: string
      pattern: \d{12}
    S3OutputFormat:
      type: string
      enum:
        - json
        - plain
        - w3c
    S3LogDestinationParametersPrefixString:
      type: string
      minLength: 0
      maxLength: 256
    FirehoseLogDestinationParameters:
      description: The Amazon Data Firehose logging configuration settings for the pipe.
      type: object
      properties:
        DeliveryStreamArn:
          $ref: "#/components/schemas/FirehoseArn"
          description: Specifies the Amazon Resource Name (ARN) of the Firehose delivery stream to which EventBridge delivers the pipe log records.
      required:
        - DeliveryStreamArn
    FirehoseArn:
      type: string
