openapi: 3.0.0
info:
  version: "2022-10-28"
  title: AWS SimSpace Weaver
  description: AWS SimSpace Weaver
  x-serviceName: simspaceweaver
  x-serviceAlias: simspaceweaver
  x-protocol: rest-json
  x-apiVersion: "2022-10-28"
  x-endpointPrefix: simspaceweaver
  x-jsonVersion: "1.1"
servers:
  - url: https://simspaceweaver.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for simspaceweaver
paths:
  /createsnapshot:
    post:
      operationId: CreateSnapshot
      description: "Creates a snapshot of the specified simulation. A snapshot is a file that contains simulation state data at a specific time. The state data saved in a snapshot includes entity data from the State Fabric, the simulation configuration specified in the schema, and the clock tick number. You can use the snapshot to initialize a new simulation. For more information about snapshots, see Snapshots in the SimSpace Weaver User Guide. You specify a Destination when you create a snapshot. The Destination is the name of an Amazon S3 bucket and an optional ObjectKeyPrefix. The ObjectKeyPrefix is usually the name of a folder in the bucket. SimSpace Weaver creates a snapshot folder inside the Destination and places the snapshot file there. The snapshot file is an Amazon S3 object. It has an object key with the form: object-key-prefix/snapshot/simulation-name-YYMMdd-HHmm-ss.zip, where: YY is the 2-digit year MM is the 2-digit month dd is the 2-digit day of the month HH is the 2-digit hour (24-hour clock) mm is the 2-digit minutes ss is the 2-digit seconds"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Destination:
                  $ref: "#/components/schemas/S3Destination"
                Simulation:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
              required:
                - Destination
                - Simulation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSnapshotOutput"
  /deleteapp:
    delete:
      operationId: DeleteApp
      description: Deletes the instance of the given custom app.
      parameters:
        - name: app
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the app.
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the domain of the app.
        - name: simulation
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the simulation of the app.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppOutput"
  /deletesimulation:
    delete:
      operationId: DeleteSimulation
      description: Deletes all SimSpace Weaver resources assigned to the given simulation. Your simulation uses resources in other Amazon Web Services. This API operation doesn't delete resources in other Amazon Web Services.
      parameters:
        - name: simulation
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the simulation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSimulationOutput"
  /describeapp:
    get:
      operationId: DescribeApp
      description: Returns the state of the given custom app.
      parameters:
        - name: app
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverLongResourceName"
          description: The name of the app.
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the domain of the app.
        - name: simulation
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the simulation of the app.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppOutput"
  /describesimulation:
    get:
      operationId: DescribeSimulation
      description: Returns the current state of the given simulation.
      parameters:
        - name: simulation
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the simulation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSimulationOutput"
  /listapps:
    get:
      operationId: ListApps
      description: Lists all custom apps or service apps for the given simulation and domain.
      parameters:
        - name: domain
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the domain that you want to list apps for.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PositiveInteger"
          description: The maximum number of apps to list.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OptionalString"
          description: If SimSpace Weaver returns nextToken, then there are more results available. The value of nextToken is a unique pagination token for each page. To retrieve the next page, call the operation again using the returned token. Keep all other arguments unchanged. If no results remain, then nextToken is set to null. Each pagination token expires after 24 hours. If you provide a token that isn't valid, then you receive an HTTP 400 ValidationException error.
        - name: simulation
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the simulation that you want to list apps for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppsOutput"
  /listsimulations:
    get:
      operationId: ListSimulations
      description: Lists the SimSpace Weaver simulations in the Amazon Web Services account used to make the API call.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PositiveInteger"
          description: The maximum number of simulations to list.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OptionalString"
          description: If SimSpace Weaver returns nextToken, then there are more results available. The value of nextToken is a unique pagination token for each page. To retrieve the next page, call the operation again using the returned token. Keep all other arguments unchanged. If no results remain, then nextToken is set to null. Each pagination token expires after 24 hours. If you provide a token that isn't valid, then you receive an HTTP 400 ValidationException error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSimulationsOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists all tags on a SimSpace Weaver resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverArn"
          description: The Amazon Resource Name (ARN) of the resource. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Adds tags to a SimSpace Weaver resource. For more information about tags, see Tagging Amazon Web Services resources in the Amazon Web Services General Reference.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverArn"
          description: The Amazon Resource Name (ARN) of the resource that you want to add tags to. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes tags from a SimSpace Weaver resource. For more information about tags, see Tagging Amazon Web Services resources in the Amazon Web Services General Reference.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SimSpaceWeaverArn"
          description: The Amazon Resource Name (ARN) of the resource that you want to remove tags from. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of tag keys to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /startapp:
    post:
      operationId: StartApp
      description: Starts a custom app with the configuration specified in the simulation schema.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Description:
                  $ref: "#/components/schemas/Description"
                Domain:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
                LaunchOverrides:
                  $ref: "#/components/schemas/LaunchOverrides"
                Name:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
                Simulation:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAppOutput"
  /startclock:
    post:
      operationId: StartClock
      description: Starts the simulation clock.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Simulation:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
              required:
                - Simulation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartClockOutput"
  /startsimulation:
    post:
      operationId: StartSimulation
      description: Starts a simulation with the given name. You must choose to start your simulation from a schema or from a snapshot. For more information about the schema, see the schema reference in the SimSpace Weaver User Guide. For more information about snapshots, see Snapshots in the SimSpace Weaver User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Description:
                  $ref: "#/components/schemas/Description"
                MaximumDuration:
                  $ref: "#/components/schemas/TimeToLiveString"
                Name:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                SchemaS3Location:
                  $ref: "#/components/schemas/S3Location"
                SnapshotS3Location:
                  $ref: "#/components/schemas/S3Location"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - Name
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSimulationOutput"
  /stopapp:
    post:
      operationId: StopApp
      description: Stops the given custom app and shuts down all of its allocated compute resources.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                App:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
                Domain:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
                Simulation:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
              required:
                - App
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopAppOutput"
  /stopclock:
    post:
      operationId: StopClock
      description: Stops the simulation clock.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Simulation:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
              required:
                - Simulation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopClockOutput"
  /stopsimulation:
    post:
      operationId: StopSimulation
      description: Stops the given simulation. You can't restart a simulation after you stop it. If you want to restart a simulation, then you must stop it, delete it, and start a new instance of it.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Simulation:
                  $ref: "#/components/schemas/SimSpaceWeaverResourceName"
              required:
                - Simulation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopSimulationOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    S3Destination:
      description: An Amazon S3 bucket and optional folder (object key prefix) where SimSpace Weaver creates a file.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/BucketName"
          description: The name of an Amazon S3 bucket. For more information about buckets, see Creating, configuring, and working with Amazon S3 buckets in the Amazon Simple Storage Service User Guide.
        ObjectKeyPrefix:
          $ref: "#/components/schemas/ObjectKeyPrefix"
          description: A string prefix for an Amazon S3 object key. It's usually a folder name. For more information about folders in Amazon S3, see Organizing objects in the Amazon S3 console using folders in the Amazon Simple Storage Service User Guide.
      required:
        - BucketName
    BucketName:
      type: string
      minLength: 3
      maxLength: 63
    ObjectKeyPrefix:
      type: string
      minLength: 0
      maxLength: 1024
    SimSpaceWeaverResourceName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9_.-]+$
    CreateSnapshotOutput:
      type: object
    DeleteAppOutput:
      type: object
    DeleteSimulationOutput:
      type: object
    SimSpaceWeaverLongResourceName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[a-zA-Z0-9_.-]+$
    DescribeAppOutput:
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the app.
        Domain:
          $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the domain of the app.
        EndpointInfo:
          $ref: "#/components/schemas/SimulationAppEndpointInfo"
          description: Information about the network endpoint for the custom app. You can use the endpoint to connect to the custom app.
        LaunchOverrides:
          $ref: "#/components/schemas/LaunchOverrides"
        Name:
          $ref: "#/components/schemas/SimSpaceWeaverLongResourceName"
          description: The name of the app.
        Simulation:
          $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the simulation of the app.
        Status:
          $ref: "#/components/schemas/SimulationAppStatus"
          description: The current lifecycle state of the custom app.
        TargetStatus:
          $ref: "#/components/schemas/SimulationAppTargetStatus"
          description: The desired lifecycle state of the custom app.
    Description:
      type: string
      minLength: 0
      maxLength: 500
    SimulationAppEndpointInfo:
      description: "Information about the network endpoint that you can use to connect to your custom or service app. For more information about SimSpace Weaver apps, see Key concepts: Apps in the SimSpace Weaver User Guide.."
      type: object
      properties:
        Address:
          $ref: "#/components/schemas/NonEmptyString"
          description: The IP address of the app. SimSpace Weaver dynamically assigns this IP address when the app starts.
        IngressPortMappings:
          $ref: "#/components/schemas/AppPortMappings"
          description: The inbound TCP/UDP port numbers of the app. The combination of an IP address and a port number form a network endpoint.
    NonEmptyString:
      type: string
      minLength: 1
      maxLength: 1600
    AppPortMappings:
      type: array
      items:
        $ref: "#/components/schemas/SimulationAppPortMapping"
    SimulationAppPortMapping:
      description: A collection of TCP/UDP ports for a custom or service app.
      type: object
      properties:
        Actual:
          $ref: "#/components/schemas/PortNumber"
          description: The TCP/UDP port number of the running app. SimSpace Weaver dynamically assigns this port number when the app starts. SimSpace Weaver maps the Declared port to the Actual port. Clients connect to the app using the app's IP address and the Actual port number.
        Declared:
          $ref: "#/components/schemas/PortNumber"
          description: The TCP/UDP port number of the app, declared in the simulation schema. SimSpace Weaver maps the Declared port to the Actual port. The source code for the app should bind to the Declared port.
    PortNumber:
      type: integer
      minimum: 0
      maximum: 65535
    LaunchOverrides:
      description: Options that apply when the app starts. These options override default behavior.
      type: object
      properties:
        LaunchCommands:
          $ref: "#/components/schemas/LaunchCommandList"
          description: App launch commands and command line parameters that override the launch command configured in the simulation schema.
    LaunchCommandList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    SimulationAppStatus:
      type: string
      enum:
        - STARTING
        - STARTED
        - STOPPING
        - STOPPED
        - ERROR
        - UNKNOWN
    SimulationAppTargetStatus:
      type: string
      enum:
        - UNKNOWN
        - STARTED
        - STOPPED
    DescribeSimulationOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/SimSpaceWeaverArn"
          description: The Amazon Resource Name (ARN) of the simulation. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the simulation was created, expressed as the number of seconds and milliseconds in UTC since the Unix epoch (0:0:0.000, January 1, 1970).
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the simulation.
        ExecutionId:
          $ref: "#/components/schemas/UUID"
          description: A universally unique identifier (UUID) for this simulation.
        LiveSimulationState:
          $ref: "#/components/schemas/LiveSimulationState"
          description: A collection of additional state information, such as domain and clock configuration.
        LoggingConfiguration:
          $ref: "#/components/schemas/LoggingConfiguration"
          description: Settings that control how SimSpace Weaver handles your simulation log data.
        MaximumDuration:
          $ref: "#/components/schemas/TimeToLiveString"
          description: The maximum running time of the simulation, specified as a number of minutes (m or M), hours (h or H), or days (d or D). The simulation stops when it reaches this limit. The maximum value is 14D, or its equivalent in the other units. The default value is 14D. A value equivalent to 0 makes the simulation immediately transition to Stopping as soon as it reaches Started.
        Name:
          $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the simulation.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role that the simulation assumes to perform actions. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference. For more information about IAM roles, see IAM roles in the Identity and Access Management User Guide.
        SchemaError:
          $ref: "#/components/schemas/OptionalString"
          description: An error message that SimSpace Weaver returns only if there is a problem with the simulation schema.
        SchemaS3Location:
          $ref: "#/components/schemas/S3Location"
          description: The location of the simulation schema in Amazon Simple Storage Service (Amazon S3). For more information about Amazon S3, see the Amazon Simple Storage Service User Guide .
        SnapshotS3Location:
          $ref: "#/components/schemas/S3Location"
        StartError:
          $ref: "#/components/schemas/OptionalString"
          description: An error message that SimSpace Weaver returns only if a problem occurs when the simulation is in the STARTING state.
        Status:
          $ref: "#/components/schemas/SimulationStatus"
          description: The current lifecycle state of the simulation.
        TargetStatus:
          $ref: "#/components/schemas/SimulationTargetStatus"
          description: The desired lifecycle state of the simulation.
    SimSpaceWeaverArn:
      type: string
      minLength: 0
      maxLength: 1600
      pattern: ^arn:(?:aws|aws-cn|aws-us-gov):simspaceweaver:([a-z]{2}-[a-z]+-\d{1}):(\d{12})?:([a-z]+)\/(.+)$
    Timestamp:
      type: string
      format: date-time
    UUID:
      type: string
      minLength: 36
      pattern: ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$
    LiveSimulationState:
      description: A collection of additional state information, such as domain and clock configuration.
      type: object
      properties:
        Clocks:
          $ref: "#/components/schemas/SimulationClockList"
          description: A list of simulation clocks. At this time, a simulation has only one clock.
        Domains:
          $ref: "#/components/schemas/DomainList"
          description: "A list of domains for the simulation. For more information about domains, see Key concepts: Domains in the SimSpace Weaver User Guide."
    SimulationClockList:
      type: array
      items:
        $ref: "#/components/schemas/SimulationClock"
    SimulationClock:
      description: Status information about the simulation clock.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ClockStatus"
          description: The current status of the simulation clock.
        TargetStatus:
          $ref: "#/components/schemas/ClockTargetStatus"
          description: The desired status of the simulation clock.
    ClockStatus:
      type: string
      enum:
        - UNKNOWN
        - STARTING
        - STARTED
        - STOPPING
        - STOPPED
    ClockTargetStatus:
      type: string
      enum:
        - UNKNOWN
        - STARTED
        - STOPPED
    DomainList:
      type: array
      items:
        $ref: "#/components/schemas/Domain"
    Domain:
      description: "A collection of app instances that run the same executable app code and have the same launch options and commands. For more information about domains, see Key concepts: Domains in the SimSpace Weaver User Guide."
      type: object
      properties:
        Lifecycle:
          $ref: "#/components/schemas/LifecycleManagementStrategy"
          description: "The type of lifecycle management for apps in the domain. Indicates whether apps in this domain are managed (SimSpace Weaver starts and stops the apps) or unmanaged (you must start and stop the apps). Lifecycle types PerWorker – Managed: SimSpace Weaver starts one app on each worker. BySpatialSubdivision – Managed: SimSpace Weaver starts one app for each spatial partition. ByRequest – Unmanaged: You use the StartApp API to start the apps and use the StopApp API to stop the apps."
        Name:
          $ref: "#/components/schemas/SimSpaceWeaverResourceName"
          description: The name of the domain.
    LifecycleManagementStrategy:
      type: string
      enum:
        - Unknown
        - PerWorker
        - BySpatialSubdivision
        - ByRequest
    LoggingConfiguration:
      description: The logging configuration for a simulation.
      type: object
      properties:
        Destinations:
          $ref: "#/components/schemas/LogDestinations"
          description: A list of the locations where SimSpace Weaver sends simulation log data.
    LogDestinations:
      type: array
      items:
        $ref: "#/components/schemas/LogDestination"
    LogDestination:
      description: The location where SimSpace Weaver sends simulation log data.
      type: object
      properties:
        CloudWatchLogsLogGroup:
          $ref: "#/components/schemas/CloudWatchLogsLogGroup"
          description: An Amazon CloudWatch Logs log group that stores simulation log data. For more information about log groups, see Working with log groups and log streams in the Amazon CloudWatch Logs User Guide.
    CloudWatchLogsLogGroup:
      description: The Amazon CloudWatch Logs log group for the simulation. For more information about log groups, see Working with log groups and log streams in the Amazon CloudWatch Logs User Guide.
      type: object
      properties:
        LogGroupArn:
          $ref: "#/components/schemas/LogGroupArn"
          description: The Amazon Resource Name (ARN) of the Amazon CloudWatch Logs log group for the simulation. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference. For more information about log groups, see Working with log groups and log streams in the Amazon CloudWatch Logs User Guide.
    LogGroupArn:
      type: string
      minLength: 0
      maxLength: 1600
      pattern: ^arn:(?:aws|aws-cn|aws-us-gov):log-group:([a-z]{2}-[a-z]+-\d{1}):(\d{12})?:role\/(.+)$
    TimeToLiveString:
      type: string
      minLength: 2
      maxLength: 6
      pattern: ^\d{1,5}[mhdMHD]$
    RoleArn:
      type: string
      minLength: 0
      maxLength: 1600
