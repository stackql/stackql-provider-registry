        - successfulEntries
    BatchUpdateRecommendationStatusFailedEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchUpdateRecommendationStatusFailedEntry"
    BatchUpdateRecommendationStatusFailedEntry:
      description: List of operational recommendations that did not get included or excluded.
      type: object
      properties:
        entryId:
          $ref: "#/components/schemas/String255"
          description: An identifier of an entry in this batch that is used to communicate the result. The entryIds of a batch request need to be unique within a request.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: Indicates the error that occurred while excluding an operational recommendation.
      required:
        - entryId
        - errorMessage
    BatchUpdateRecommendationStatusSuccessfulEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchUpdateRecommendationStatusSuccessfulEntry"
    BatchUpdateRecommendationStatusSuccessfulEntry:
      description: List of operational recommendations that were successfully included or excluded.
      type: object
      properties:
        appComponentId:
          $ref: "#/components/schemas/EntityName255"
          description: Indicates the identifier of an AppComponent.
        entryId:
          $ref: "#/components/schemas/String255"
          description: An identifier for an entry in this batch that is used to communicate the result. The entryIds of a batch request need to be unique within a request.
        excludeReason:
          $ref: "#/components/schemas/ExcludeRecommendationReason"
          description: Indicates the reason for excluding an operational recommendation.
        excluded:
          $ref: "#/components/schemas/BooleanOptional"
          description: Indicates if the operational recommendation was successfully excluded.
        item:
          $ref: "#/components/schemas/UpdateRecommendationStatusItem"
          description: The operational recommendation item.
        referenceId:
          $ref: "#/components/schemas/SpecReferenceId"
          description: Reference identifier of the operational recommendation.
      required:
        - entryId
        - excluded
        - referenceId
    AppAssessmentScheduleType:
      type: string
      enum:
        - Disabled
        - Daily
    ClientToken:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^[A-Za-z0-9_.-]{0,63}$
    EntityDescription:
      type: string
      minLength: 0
      maxLength: 500
    EventSubscriptionList:
      type: array
      items:
        $ref: "#/components/schemas/EventSubscription"
    EventSubscription:
      description: Indicates an event you would like to subscribe and get notification for. Currently, Resilience Hub supports notifications only for Drift detected and Scheduled assessment failure events.
      type: object
      properties:
        eventType:
          $ref: "#/components/schemas/EventType"
          description: The type of event you would like to subscribe and get notification for. Currently, Resilience Hub supports notifications only for Drift detected (DriftDetected) and Scheduled assessment failure (ScheduledAssessmentFailure) events.
        name:
          $ref: "#/components/schemas/String255"
          description: Unique name to identify an event subscription.
        snsTopicArn:
          $ref: "#/components/schemas/Arn"
          description: "Amazon Resource Name (ARN) of the Amazon Simple Notification Service topic. The format for this ARN is: arn:partition:sns:region:account:topic-name. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference guide."
      required:
        - eventType
        - name
    EventType:
      type: string
      enum:
        - ScheduledAssessmentFailure
        - DriftDetected
    PermissionModel:
      description: Defines the roles and credentials that Resilience Hub would use while creating the application, importing its resources, and running an assessment.
      type: object
      properties:
        crossAccountRoleArns:
          $ref: "#/components/schemas/IamRoleArnList"
          description: Defines a list of role Amazon Resource Names (ARNs) to be used in other accounts. These ARNs are used for querying purposes while importing resources and assessing your application. These ARNs are required only when your resources are in other accounts and you have different role name in these accounts. Else, the invoker role name will be used in the other accounts. These roles must have a trust policy with iam:AssumeRole permission to the invoker role in the primary account.
        invokerRoleName:
          $ref: "#/components/schemas/IamRoleName"
          description: Existing Amazon Web Services IAM role name in the primary Amazon Web Services account that will be assumed by Resilience Hub Service Principle to obtain a read-only access to your application resources while running an assessment. If your IAM role includes a path, you must include the path in the invokerRoleName parameter. For example, if your IAM role's ARN is arn:aws:iam:123456789012:role/my-path/role-name, you should pass my-path/role-name. You must have iam:passRole permission for this role while creating or updating the application. Currently, invokerRoleName accepts only [A-Za-z0-9_+=,.@-] characters.
        type_:
          $ref: "#/components/schemas/PermissionModelType"
          description: Defines how Resilience Hub scans your resources. It can scan for the resources by using a pre-existing role in your Amazon Web Services account, or by using the credentials of the current IAM user.
      required:
        - type_
    IamRoleArnList:
      type: array
      items:
        $ref: "#/components/schemas/IamRoleArn"
    IamRoleArn:
      type: string
      pattern: ^arn:(aws|aws-cn|aws-iso|aws-iso-[a-z]{1}|aws-us-gov):iam::[0-9]{12}:role/(([^/][!-~]+/){1,511})?[A-Za-z0-9_+=,.@-]{1,64}$
    IamRoleName:
      type: string
      pattern: ^([^/]([!-~]+/){1,511})?[A-Za-z0-9_+=,.@-]{1,64}$
    PermissionModelType:
      type: string
      enum:
        - LegacyIAMUser
        - RoleBased
    TagMap:
