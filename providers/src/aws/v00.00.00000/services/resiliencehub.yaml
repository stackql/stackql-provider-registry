            $ref: "#/components/schemas/TimeStamp"
          description: Lower limit of the range that is used to filter applications based on their last assessment times.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Maximum number of results to include in the response. If more results exist than the specified MaxResults value, a token is included in the response so that the remaining results can be retrieved.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntityName"
          description: The name for the one of the listed applications.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Null, or the token from a previous call to get the next set of results.
        - name: reverseOrder
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BooleanOptional"
          description: The application list is sorted based on the values of lastAppComplianceEvaluationTime field. By default, application list is sorted in ascending order. To sort the application list in descending order, set this field to True.
