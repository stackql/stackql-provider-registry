              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                assessmentSchedule:
                  $ref: "#/components/schemas/AppAssessmentScheduleType"
                clearResiliencyPolicyArn:
                  $ref: "#/components/schemas/BooleanOptional"
                description:
                  $ref: "#/components/schemas/EntityDescription"
                eventSubscriptions:
                  $ref: "#/components/schemas/EventSubscriptionList"
                permissionModel:
                  $ref: "#/components/schemas/PermissionModel"
                policyArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppResponse"
  /update-app-version:
    post:
      operationId: UpdateAppVersion
      description: Updates the Resilience Hub application version. This API updates the Resilience Hub application draft version. To use this information for running resiliency assessments, you must publish the Resilience Hub application using the PublishAppVersion API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                additionalInfo:
                  $ref: "#/components/schemas/AdditionalInfoMap"
                appArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppVersionResponse"
  /update-app-version-app-component:
    post:
      operationId: UpdateAppVersionAppComponent
      description: Updates an existing Application Component in the Resilience Hub application. This API updates the Resilience Hub application draft version. To use this Application Component for running assessments, you must publish the Resilience Hub application using the PublishAppVersion API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                additionalInfo:
                  $ref: "#/components/schemas/AdditionalInfoMap"
                appArn:
                  $ref: "#/components/schemas/Arn"
                id:
                  $ref: "#/components/schemas/String255"
                name:
                  $ref: "#/components/schemas/String255"
                type:
                  $ref: "#/components/schemas/String255"
              required:
                - appArn
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppVersionAppComponentResponse"
  /update-app-version-resource:
    post:
      operationId: UpdateAppVersionResource
      description: Updates the resource details in the Resilience Hub application. This action has no effect outside Resilience Hub. This API updates the Resilience Hub application draft version. To use this resource for running resiliency assessments, you must publish the Resilience Hub application using the PublishAppVersion API. To update application version with new physicalResourceID, you must call ResolveAppVersionResources API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                additionalInfo:
                  $ref: "#/components/schemas/AdditionalInfoMap"
                appArn:
                  $ref: "#/components/schemas/Arn"
                appComponents:
                  $ref: "#/components/schemas/AppComponentNameList"
                awsAccountId:
                  $ref: "#/components/schemas/CustomerId"
                awsRegion:
                  $ref: "#/components/schemas/AwsRegion"
                excluded:
                  $ref: "#/components/schemas/BooleanOptional"
                logicalResourceId:
                  $ref: "#/components/schemas/LogicalResourceId"
                physicalResourceId:
                  $ref: "#/components/schemas/String2048"
                resourceName:
                  $ref: "#/components/schemas/EntityName"
                resourceType:
                  $ref: "#/components/schemas/String255"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppVersionResourceResponse"
  /update-resiliency-policy:
    post:
      operationId: UpdateResiliencyPolicy
      description: Updates a resiliency policy. Resilience Hub allows you to provide a value of zero for rtoInSecs and rpoInSecs of your resiliency policy. But, while assessing your application, the lowest possible assessment result is near zero. Hence, if you provide value zero for rtoInSecs and rpoInSecs, the estimated workload RTO and estimated workload RPO result will be near zero and the Compliance status for your application will be set to Policy breached.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dataLocationConstraint:
                  $ref: "#/components/schemas/DataLocationConstraint"
                policy:
                  $ref: "#/components/schemas/DisruptionPolicy"
                policyArn:
                  $ref: "#/components/schemas/Arn"
                policyDescription:
                  $ref: "#/components/schemas/EntityDescription"
                policyName:
                  $ref: "#/components/schemas/EntityName"
                tier:
                  $ref: "#/components/schemas/ResiliencyPolicyTier"
              required:
                - policyArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResiliencyPolicyResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Arn:
      type: string
      pattern: ^arn:(aws|aws-cn|aws-iso|aws-iso-[a-z]{1}|aws-us-gov):[A-Za-z0-9][A-Za-z0-9_/.-]{0,62}:([a-z]{2}-((iso[a-z]{0,1}-)|(gov-)){0,1}[a-z]+-[0-9]):[0-9]{12}:[A-Za-z0-9/][A-Za-z0-9:_/+.-]{0,1023}$
    AcceptGroupingRecommendationEntries:
      type: array
      items:
        $ref: "#/components/schemas/AcceptGroupingRecommendationEntry"
    AcceptGroupingRecommendationEntry:
      description: Indicates the grouping recommendation you have accepted to include in your application.
      type: object
      properties:
        groupingRecommendationId:
          $ref: "#/components/schemas/String255"
          description: Indicates the identifier of the grouping recommendation.
      required:
        - groupingRecommendationId
    String255:
      type: string
      minLength: 1
      maxLength: 255
    AcceptResourceGroupingRecommendationsResponse:
      type: object
      properties:
        appArn:
          $ref: "#/components/schemas/Arn"
          description: "Amazon Resource Name (ARN) of the Resilience Hub application. The format for this ARN is: arn:partition:resiliencehub:region:account:app/app-id. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference guide."
        failedEntries:
          $ref: "#/components/schemas/FailedGroupingRecommendationEntries"
          description: List of resource grouping recommendations that could not be included in your application.
      required:
        - appArn
        - failedEntries
    FailedGroupingRecommendationEntries:
      type: array
      items:
        $ref: "#/components/schemas/FailedGroupingRecommendationEntry"
    FailedGroupingRecommendationEntry:
      description: Indicates the accepted grouping recommendation whose implementation failed.
      type: object
      properties:
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: Indicates the error that occurred while implementing a grouping recommendation.
        groupingRecommendationId:
          $ref: "#/components/schemas/String255"
          description: Indicates the identifier of the grouping recommendation.
      required:
        - errorMessage
        - groupingRecommendationId
    ErrorMessage:
      type: string
      minLength: 0
      maxLength: 500
    ResourceMappingList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceMapping"
    ResourceMapping:
      description: Defines a resource mapping.
      type: object
      properties:
        appRegistryAppName:
          $ref: "#/components/schemas/EntityName"
          description: Name of the application this resource is mapped to when the mappingType is AppRegistryApp.
        eksSourceName:
          $ref: "#/components/schemas/String255"
          description: Name of the Amazon Elastic Kubernetes Service cluster and namespace that this resource is mapped to when the mappingType is EKS. This parameter accepts values in "eks-cluster/namespace" format.
        logicalStackName:
          $ref: "#/components/schemas/String255"
          description: Name of the CloudFormation stack this resource is mapped to when the mappingType is CfnStack.
        mappingType:
          $ref: "#/components/schemas/ResourceMappingType"
          description: Specifies the type of resource mapping.
        physicalResourceId:
          $ref: "#/components/schemas/PhysicalResourceId"
          description: Identifier of the physical resource.
        resourceGroupName:
          $ref: "#/components/schemas/EntityName"
          description: Name of the Resource Groups that this resource is mapped to when the mappingType is ResourceGroup.
        resourceName:
          $ref: "#/components/schemas/EntityName"
          description: Name of the resource that this resource is mapped to when the mappingType is Resource.
        terraformSourceName:
          $ref: "#/components/schemas/String255"
          description: Name of the Terraform source that this resource is mapped to when the mappingType is Terraform.
      required:
        - mappingType
        - physicalResourceId
    EntityName:
      type: string
      pattern: ^[A-Za-z0-9][A-Za-z0-9_\-]{1,59}$
    ResourceMappingType:
      type: string
      enum:
        - CfnStack
        - Resource
        - AppRegistryApp
        - ResourceGroup
        - Terraform
        - EKS
    PhysicalResourceId:
      description: Defines a physical resource identifier.
      type: object
      properties:
        awsAccountId:
          $ref: "#/components/schemas/CustomerId"
          description: The Amazon Web Services account that owns the physical resource.
        awsRegion:
          $ref: "#/components/schemas/AwsRegion"
          description: The Amazon Web Services Region that the physical resource is located in.
        identifier:
          $ref: "#/components/schemas/String255"
          description: Identifier of the physical resource.
        type_:
          $ref: "#/components/schemas/PhysicalIdentifierType"
          description: "Specifies the type of physical resource identifier. Arn The resource identifier is an Amazon Resource Name (ARN) and it can identify the following list of resources: AWS::ECS::Service AWS::EFS::FileSystem AWS::ElasticLoadBalancingV2::LoadBalancer AWS::Lambda::Function AWS::SNS::Topic Native The resource identifier is an Resilience Hub-native identifier and it can identify the following list of resources: AWS::ApiGateway::RestApi AWS::ApiGatewayV2::Api AWS::AutoScaling::AutoScalingGroup AWS::DocDB::DBCluster AWS::DocDB::DBGlobalCluster AWS::DocDB::DBInstance AWS::DynamoDB::GlobalTable AWS::DynamoDB::Table AWS::EC2::EC2Fleet AWS::EC2::Instance AWS::EC2::NatGateway AWS::EC2::Volume AWS::ElasticLoadBalancing::LoadBalancer AWS::RDS::DBCluster AWS::RDS::DBInstance AWS::RDS::GlobalCluster AWS::Route53::RecordSet AWS::S3::Bucket AWS::SQS::Queue"
      required:
        - identifier
        - type_
    CustomerId:
      type: string
      pattern: ^[0-9]{12}$
    AwsRegion:
      type: string
      pattern: ^[a-z]{2}-((iso[a-z]{0,1}-)|(gov-)){0,1}[a-z]+-[0-9]$
    PhysicalIdentifierType:
      type: string
      enum:
        - Arn
        - Native
    AddDraftAppVersionResourceMappingsResponse:
      type: object
      properties:
        appArn:
          $ref: "#/components/schemas/Arn"
          description: "Amazon Resource Name (ARN) of the Resilience Hub application. The format for this ARN is: arn:partition:resiliencehub:region:account:app/app-id. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference guide."
        appVersion:
          $ref: "#/components/schemas/EntityVersion"
          description: The version of the application.
        resourceMappings:
          $ref: "#/components/schemas/ResourceMappingList"
          description: List of sources that are used to map a logical resource from the template to a physical resource. You can use sources such as CloudFormation, Terraform state files, AppRegistry applications, or Amazon EKS.
      required:
        - appArn
        - appVersion
        - resourceMappings
    EntityVersion:
      type: string
      pattern: ^\S{1,50}$
    UpdateRecommendationStatusRequestEntries:
      type: array
      items:
        $ref: "#/components/schemas/UpdateRecommendationStatusRequestEntry"
    UpdateRecommendationStatusRequestEntry:
      description: Defines the operational recommendation item that is to be included or excluded.
      type: object
      properties:
        appComponentId:
          $ref: "#/components/schemas/EntityName255"
          description: Indicates the identifier of the AppComponent.
        entryId:
