        targetAccountId:
          $ref: "#/components/schemas/CustomerId"
          description: Identifier of the target Amazon Web Services account.
        targetRegion:
          $ref: "#/components/schemas/AwsRegion"
          description: Identifier of the target Amazon Web Services Region.
    String500:
      type: string
      minLength: 1
      maxLength: 500
    SpecReferenceId:
      type: string
      minLength: 1
      maxLength: 500
    BatchUpdateRecommendationStatusResponse:
      type: object
      properties:
        appArn:
          $ref: "#/components/schemas/Arn"
          description: "Amazon Resource Name (ARN) of the Resilience Hub application. The format for this ARN is: arn:partition:resiliencehub:region:account:app/app-id. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference guide."
        failedEntries:
          $ref: "#/components/schemas/BatchUpdateRecommendationStatusFailedEntries"
          description: A list of items with error details about each item, which could not be included or excluded.
        successfulEntries:
          $ref: "#/components/schemas/BatchUpdateRecommendationStatusSuccessfulEntries"
          description: A list of items that were included or excluded.
      required:
