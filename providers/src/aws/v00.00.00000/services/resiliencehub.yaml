          description: Indicates if compliance drifts (deviations) were detected while running an assessment for your application.
        eventSubscriptions:
          $ref: "#/components/schemas/EventSubscriptionList"
          description: The list of events you would like to subscribe and get notification for. Currently, Resilience Hub supports notifications only for Drift detected and Scheduled assessment failure events.
        lastAppComplianceEvaluationTime:
          $ref: "#/components/schemas/TimeStamp"
          description: Date and time the most recent compliance evaluation.
        lastDriftEvaluationTime:
          $ref: "#/components/schemas/TimeStamp"
          description: Indicates the last time that a drift was evaluated.
        lastResiliencyScoreEvaluationTime:
          $ref: "#/components/schemas/TimeStamp"
          description: Date and time the most recent resiliency score evaluation.
        name:
          $ref: "#/components/schemas/EntityName"
          description: Name for the application.
        permissionModel:
          $ref: "#/components/schemas/PermissionModel"
          description: Defines the roles and credentials that Resilience Hub would use while creating the application, importing its resources, and running an assessment.
        policyArn:
          $ref: "#/components/schemas/Arn"
          description: "Amazon Resource Name (ARN) of the resiliency policy. The format for this ARN is: arn:partition:resiliencehub:region:account:resiliency-policy/policy-id. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference guide."
        resiliencyScore:
          $ref: "#/components/schemas/Double"
          description: Current resiliency score for the application.
        rpoInSecs:
          $ref: "#/components/schemas/IntegerOptional"
          description: Recovery Point Objective (RPO) in seconds.
        rtoInSecs:
          $ref: "#/components/schemas/IntegerOptional"
          description: Recovery Time Objective (RTO) in seconds.
        status:
          $ref: "#/components/schemas/AppStatusType"
          description: Status of the application.
        tags:
          type: object
          properties: {}
          description: Tags assigned to the resource. A tag is a label that you assign to an Amazon Web Services resource. Each tag consists of a key/value pair.
      required:
        - appArn
        - creationTime
        - name
    AppComplianceStatusType:
      type: string
      enum:
        - PolicyBreached
        - PolicyMet
        - NotAssessed
        - ChangesDetected
        - NotApplicable
        - MissingPolicy
    TimeStamp:
      type: string
      format: date-time
    AppDriftStatusType:
      type: string
      enum:
        - NotChecked
        - NotDetected
        - Detected
    Double:
      type: number
      format: double
    IntegerOptional:
      type: integer
    AppStatusType:
      type: string
      enum:
        - Active
        - Deleting
    AdditionalInfoMap:
      type: object
      properties: {}
    CreateAppVersionAppComponentResponse:
      type: object
      properties:
        appArn:
          $ref: "#/components/schemas/Arn"
          description: "Amazon Resource Name (ARN) of the Resilience Hub application. The format for this ARN is: arn:partition:resiliencehub:region:account:app/app-id. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference guide."
        appComponent:
          $ref: "#/components/schemas/AppComponent"
          description: List of Application Components that belong to this resource.
        appVersion:
          $ref: "#/components/schemas/EntityVersion"
          description: Resilience Hub application version.
      required:
        - appArn
        - appVersion
    AppComponent:
      description: Defines an Application Component.
      type: object
      properties:
        additionalInfo:
          type: object
          properties: {}
          description: 'Additional configuration parameters for an Resilience Hub application. If you want to implement additionalInfo through the Resilience Hub console rather than using an API call, see Configure the application configuration parameters. Currently, this parameter accepts a key-value mapping (in a string format) of only one failover region and one associated account. Key: "failover-regions" Value: "[{"region":"`<REGION>`", "accounts":[{"id":"`<ACCOUNT_ID>`"}]}]"'
        id:
          $ref: "#/components/schemas/EntityName255"
          description: Identifier of the Application Component.
