openapi: 3.0.0
info:
  version: "2020-04-30"
  title: AWS Resilience Hub
  description: AWS Resilience Hub
  x-serviceName: resiliencehub
  x-serviceAlias: resiliencehub
  x-protocol: rest-json
  x-apiVersion: "2020-04-30"
  x-endpointPrefix: resiliencehub
  x-jsonVersion: "1.1"
servers:
  - url: https://resiliencehub.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for resiliencehub
paths:
  /accept-resource-grouping-recommendations:
    post:
      operationId: AcceptResourceGroupingRecommendations
      description: Accepts the resource grouping recommendations suggested by Resilience Hub for your application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                entries:
                  $ref: "#/components/schemas/AcceptGroupingRecommendationEntries"
              required:
                - appArn
                - entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptResourceGroupingRecommendationsResponse"
  /add-draft-app-version-resource-mappings:
    post:
      operationId: AddDraftAppVersionResourceMappings
      description: "Adds the source of resource-maps to the draft version of an application. During assessment, Resilience Hub will use these resource-maps to resolve the latest physical ID for each resource in the application template. For more information about different types of resources supported by Resilience Hub and how to add them in your application, see Step 2: How is your application managed? in the Resilience Hub User Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                resourceMappings:
                  $ref: "#/components/schemas/ResourceMappingList"
              required:
                - appArn
                - resourceMappings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddDraftAppVersionResourceMappingsResponse"
  /batch-update-recommendation-status:
    post:
      operationId: BatchUpdateRecommendationStatus
      description: Enables you to include or exclude one or more operational recommendations.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                requestEntries:
                  $ref: "#/components/schemas/UpdateRecommendationStatusRequestEntries"
              required:
                - appArn
                - requestEntries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateRecommendationStatusResponse"
  /create-app:
    post:
      operationId: CreateApp
      description: Creates an Resilience Hub application. An Resilience Hub application is a collection of Amazon Web Services resources structured to prevent and recover Amazon Web Services application disruptions. To describe a Resilience Hub application, you provide an application name, resources from one or more CloudFormation stacks, Resource Groups, Terraform state files, AppRegistry applications, and an appropriate resiliency policy. In addition, you can also add resources that are located on Amazon Elastic Kubernetes Service (Amazon EKS) clusters as optional resources. For more information about the number of resources supported per application, see Service quotas. After you create an Resilience Hub application, you publish it so that you can run a resiliency assessment on it. You can then use recommendations from the assessment to improve resiliency by running another assessment, comparing results, and then iterating the process until you achieve your goals for recovery time objective (RTO) and recovery point objective (RPO).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assessmentSchedule:
                  $ref: "#/components/schemas/AppAssessmentScheduleType"
                awsApplicationArn:
                  $ref: "#/components/schemas/Arn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                description:
                  $ref: "#/components/schemas/EntityDescription"
                eventSubscriptions:
                  $ref: "#/components/schemas/EventSubscriptionList"
                name:
                  $ref: "#/components/schemas/EntityName"
                permissionModel:
                  $ref: "#/components/schemas/PermissionModel"
                policyArn:
                  $ref: "#/components/schemas/Arn"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppResponse"
  /create-app-version-app-component:
    post:
      operationId: CreateAppVersionAppComponent
      description: Creates a new Application Component in the Resilience Hub application. This API updates the Resilience Hub application draft version. To use this Application Component for running assessments, you must publish the Resilience Hub application using the PublishAppVersion API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                additionalInfo:
                  $ref: "#/components/schemas/AdditionalInfoMap"
                appArn:
                  $ref: "#/components/schemas/Arn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                id:
                  $ref: "#/components/schemas/String255"
                name:
                  $ref: "#/components/schemas/String255"
                type:
                  $ref: "#/components/schemas/String255"
              required:
                - appArn
                - name
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppVersionAppComponentResponse"
  /create-app-version-resource:
    post:
      operationId: CreateAppVersionResource
      description: Adds a resource to the Resilience Hub application and assigns it to the specified Application Components. If you specify a new Application Component, Resilience Hub will automatically create the Application Component. This action has no effect outside Resilience Hub. This API updates the Resilience Hub application draft version. To use this resource for running resiliency assessments, you must publish the Resilience Hub application using the PublishAppVersion API. To update application version with new physicalResourceID, you must call ResolveAppVersionResources API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                additionalInfo:
                  $ref: "#/components/schemas/AdditionalInfoMap"
                appArn:
                  $ref: "#/components/schemas/Arn"
                appComponents:
                  $ref: "#/components/schemas/AppComponentNameList"
                awsAccountId:
                  $ref: "#/components/schemas/CustomerId"
                awsRegion:
                  $ref: "#/components/schemas/AwsRegion"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                logicalResourceId:
                  $ref: "#/components/schemas/LogicalResourceId"
                physicalResourceId:
                  $ref: "#/components/schemas/String2048"
                resourceName:
                  $ref: "#/components/schemas/EntityName"
                resourceType:
                  $ref: "#/components/schemas/String255"
              required:
                - appArn
                - appComponents
                - logicalResourceId
                - physicalResourceId
                - resourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppVersionResourceResponse"
  /create-recommendation-template:
    post:
      operationId: CreateRecommendationTemplate
      description: Creates a new recommendation template for the Resilience Hub application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assessmentArn:
                  $ref: "#/components/schemas/Arn"
                bucketName:
                  $ref: "#/components/schemas/EntityName"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                format:
                  $ref: "#/components/schemas/TemplateFormat"
                name:
                  $ref: "#/components/schemas/EntityName"
                recommendationIds:
                  $ref: "#/components/schemas/RecommendationIdList"
                recommendationTypes:
                  $ref: "#/components/schemas/RenderRecommendationTypeList"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - assessmentArn
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRecommendationTemplateResponse"
  /create-resiliency-policy:
    post:
      operationId: CreateResiliencyPolicy
      description: Creates a resiliency policy for an application. Resilience Hub allows you to provide a value of zero for rtoInSecs and rpoInSecs of your resiliency policy. But, while assessing your application, the lowest possible assessment result is near zero. Hence, if you provide value zero for rtoInSecs and rpoInSecs, the estimated workload RTO and estimated workload RPO result will be near zero and the Compliance status for your application will be set to Policy breached.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                dataLocationConstraint:
                  $ref: "#/components/schemas/DataLocationConstraint"
                policy:
                  $ref: "#/components/schemas/DisruptionPolicy"
                policyDescription:
                  $ref: "#/components/schemas/EntityDescription"
                policyName:
                  $ref: "#/components/schemas/EntityName"
                tags:
                  $ref: "#/components/schemas/TagMap"
                tier:
                  $ref: "#/components/schemas/ResiliencyPolicyTier"
              required:
                - policy
                - policyName
                - tier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResiliencyPolicyResponse"
  /delete-app:
    post:
      operationId: DeleteApp
      description: Deletes an Resilience Hub application. This is a destructive action that can't be undone.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                forceDelete:
                  $ref: "#/components/schemas/BooleanOptional"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppResponse"
  /delete-app-assessment:
    post:
      operationId: DeleteAppAssessment
      description: Deletes an Resilience Hub application assessment. This is a destructive action that can't be undone.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assessmentArn:
                  $ref: "#/components/schemas/Arn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - assessmentArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppAssessmentResponse"
  /delete-app-input-source:
    post:
      operationId: DeleteAppInputSource
      description: Deletes the input source and all of its imported resources from the Resilience Hub application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                eksSourceClusterNamespace:
                  $ref: "#/components/schemas/EksSourceClusterNamespace"
                sourceArn:
                  $ref: "#/components/schemas/Arn"
                terraformSource:
                  $ref: "#/components/schemas/TerraformSource"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppInputSourceResponse"
  /delete-app-version-app-component:
    post:
      operationId: DeleteAppVersionAppComponent
      description: Deletes an Application Component from the Resilience Hub application. This API updates the Resilience Hub application draft version. To use this Application Component for running assessments, you must publish the Resilience Hub application using the PublishAppVersion API. You will not be able to delete an Application Component if it has resources associated with it.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                id:
                  $ref: "#/components/schemas/String255"
              required:
                - appArn
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppVersionAppComponentResponse"
  /delete-app-version-resource:
    post:
      operationId: DeleteAppVersionResource
      description: Deletes a resource from the Resilience Hub application. You can only delete a manually added resource. To exclude non-manually added resources, use the UpdateAppVersionResource API. This action has no effect outside Resilience Hub. This API updates the Resilience Hub application draft version. To use this resource for running resiliency assessments, you must publish the Resilience Hub application using the PublishAppVersion API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                awsAccountId:
                  $ref: "#/components/schemas/CustomerId"
                awsRegion:
                  $ref: "#/components/schemas/AwsRegion"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                logicalResourceId:
                  $ref: "#/components/schemas/LogicalResourceId"
                physicalResourceId:
                  $ref: "#/components/schemas/String2048"
                resourceName:
                  $ref: "#/components/schemas/EntityName"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppVersionResourceResponse"
  /delete-recommendation-template:
    post:
      operationId: DeleteRecommendationTemplate
      description: Deletes a recommendation template. This is a destructive action that can't be undone.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                recommendationTemplateArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - recommendationTemplateArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRecommendationTemplateResponse"
  /delete-resiliency-policy:
    post:
      operationId: DeleteResiliencyPolicy
      description: Deletes a resiliency policy. This is a destructive action that can't be undone.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                policyArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - policyArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResiliencyPolicyResponse"
  /describe-app:
    post:
      operationId: DescribeApp
      description: Describes an Resilience Hub application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppResponse"
  /describe-app-assessment:
    post:
      operationId: DescribeAppAssessment
      description: Describes an assessment for an Resilience Hub application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assessmentArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - assessmentArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppAssessmentResponse"
  /describe-app-version:
    post:
      operationId: DescribeAppVersion
      description: Describes the Resilience Hub application version.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                appVersion:
                  $ref: "#/components/schemas/EntityVersion"
              required:
                - appArn
                - appVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppVersionResponse"
  /describe-app-version-app-component:
    post:
      operationId: DescribeAppVersionAppComponent
      description: Describes an Application Component in the Resilience Hub application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                appVersion:
                  $ref: "#/components/schemas/EntityVersion"
                id:
                  $ref: "#/components/schemas/String255"
              required:
                - appArn
                - appVersion
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppVersionAppComponentResponse"
  /describe-app-version-resource:
    post:
      operationId: DescribeAppVersionResource
      description: "Describes a resource of the Resilience Hub application. This API accepts only one of the following parameters to describe the resource: resourceName logicalResourceId physicalResourceId (Along with physicalResourceId, you can also provide awsAccountId, and awsRegion)"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                appVersion:
                  $ref: "#/components/schemas/EntityVersion"
                awsAccountId:
                  $ref: "#/components/schemas/CustomerId"
                awsRegion:
                  $ref: "#/components/schemas/AwsRegion"
                logicalResourceId:
                  $ref: "#/components/schemas/LogicalResourceId"
                physicalResourceId:
                  $ref: "#/components/schemas/String2048"
                resourceName:
                  $ref: "#/components/schemas/EntityName"
              required:
                - appArn
                - appVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppVersionResourceResponse"
  /describe-app-version-resources-resolution-status:
    post:
      operationId: DescribeAppVersionResourcesResolutionStatus
      description: Returns the resolution status for the specified resolution identifier for an application version. If resolutionId is not specified, the current resolution status is returned.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                appVersion:
                  $ref: "#/components/schemas/EntityVersion"
                resolutionId:
                  $ref: "#/components/schemas/String255"
              required:
                - appArn
                - appVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppVersionResourcesResolutionStatusResponse"
  /describe-app-version-template:
    post:
      operationId: DescribeAppVersionTemplate
      description: Describes details about an Resilience Hub application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                appVersion:
                  $ref: "#/components/schemas/EntityVersion"
              required:
                - appArn
                - appVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppVersionTemplateResponse"
  /describe-draft-app-version-resources-import-status:
    post:
      operationId: DescribeDraftAppVersionResourcesImportStatus
      description: Describes the status of importing resources to an application version. If you get a 404 error with ResourceImportStatusNotFoundAppMetadataException, you must call importResourcesToDraftAppVersion after creating the application and before calling describeDraftAppVersionResourcesImportStatus to obtain the status.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDraftAppVersionResourcesImportStatusResponse"
  /describe-metrics-export:
    post:
      operationId: DescribeMetricsExport
      description: Describes the metrics of the application configuration being exported.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metricsExportId:
                  $ref: "#/components/schemas/String255"
              required:
                - metricsExportId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeMetricsExportResponse"
  /describe-resiliency-policy:
    post:
      operationId: DescribeResiliencyPolicy
      description: Describes a specified resiliency policy for an Resilience Hub application. The returned policy object includes creation time, data location constraints, the Amazon Resource Name (ARN) for the policy, tags, tier, and more.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - policyArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeResiliencyPolicyResponse"
  /describe-resource-grouping-recommendation-task:
    post:
      operationId: DescribeResourceGroupingRecommendationTask
      description: Describes the resource grouping recommendation tasks run by Resilience Hub for your application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                groupingId:
                  $ref: "#/components/schemas/String255"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeResourceGroupingRecommendationTaskResponse"
  /import-resources-to-draft-app-version:
    post:
      operationId: ImportResourcesToDraftAppVersion
      description: Imports resources to Resilience Hub application draft version from different input sources. For more information about the input sources supported by Resilience Hub, see Discover the structure and describe your Resilience Hub application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appArn:
                  $ref: "#/components/schemas/Arn"
                eksSources:
                  $ref: "#/components/schemas/EksSourceList"
                importStrategy:
                  $ref: "#/components/schemas/ResourceImportStrategyType"
                sourceArns:
                  $ref: "#/components/schemas/ArnList"
                terraformSources:
                  $ref: "#/components/schemas/TerraformSourceList"
              required:
                - appArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResourcesToDraftAppVersionResponse"
  /list-alarm-recommendations:
    post:
      operationId: ListAlarmRecommendations
      description: Lists the alarm recommendations for an Resilience Hub application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assessmentArn:
                  $ref: "#/components/schemas/Arn"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - assessmentArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAlarmRecommendationsResponse"
  /list-app-assessment-compliance-drifts:
    post:
      operationId: ListAppAssessmentComplianceDrifts
      description: List of compliance drifts that were detected while running an assessment.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assessmentArn:
                  $ref: "#/components/schemas/Arn"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - assessmentArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppAssessmentComplianceDriftsResponse"
  /list-app-assessment-resource-drifts:
    post:
      operationId: ListAppAssessmentResourceDrifts
      description: List of resource drifts that were detected while running an assessment.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assessmentArn:
                  $ref: "#/components/schemas/Arn"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - assessmentArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
