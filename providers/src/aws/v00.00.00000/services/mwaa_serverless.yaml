openapi: 3.0.0
info:
  version: "2024-07-26"
  title: AmazonMWAAServerless
  description: AmazonMWAAServerless
  x-serviceName: airflow-serverless
  x-serviceAlias: mwaa_serverless
  x-protocol: json
  x-apiVersion: "2024-07-26"
  x-endpointPrefix: airflow-serverless
  x-targetPrefix: AmazonMWAAServerless
  x-jsonVersion: "1.0"
servers:
  - url: https://airflow-serverless.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mwaa-serverless
paths:
  /CreateWorkflow:
    post:
      operationId: CreateWorkflow
      description: Creates a new workflow in Amazon Managed Workflows for Apache Airflow Serverless. This operation initializes a workflow with the specified configuration including the workflow definition, execution role, and optional settings for encryption, logging, and networking. You must provide the workflow definition as a YAML file stored in Amazon S3 that defines the DAG structure using supported Amazon Web Services operators. Amazon Managed Workflows for Apache Airflow Serverless automatically creates the first version of the workflow and sets up the necessary execution environment with multi-tenant isolation and security controls.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.CreateWorkflow
            default: AmazonMWAAServerless.CreateWorkflow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the workflow. You must use unique workflow names within your Amazon Web Services account. The service generates a unique identifier that is appended to ensure temporal uniqueness across the account lifecycle.
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyTokenString"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This token prevents duplicate workflow creation requests.
                DefinitionS3Location:
                  $ref: "#/components/schemas/DefinitionS3Location"
                  description: The Amazon S3 location where the workflow definition file is stored. This must point to a valid YAML file that defines the workflow structure using supported Amazon Web Services operators and tasks. Amazon Managed Workflows for Apache Airflow Serverless takes a snapshot of the definition at creation time, so subsequent changes to the Amazon S3 object will not affect the workflow unless you create a new version. In your YAML definition, include task dependencies, scheduling information, and operator configurations that are compatible with the Amazon Managed Workflows for Apache Airflow Serverless execution environment.
                RoleArn:
                  $ref: "#/components/schemas/RoleARN"
                  description: The Amazon Resource Name (ARN) of the IAM role that Amazon Managed Workflows for Apache Airflow Serverless assumes when executing the workflow. This role must have the necessary permissions to access the required Amazon Web Services services and resources that your workflow tasks will interact with. The role is used for task execution in the isolated, multi-tenant environment and should follow the principle of least privilege. Amazon Managed Workflows for Apache Airflow Serverless validates role access during workflow creation but runtime permission checks are performed by the target services.
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                  description: An optional description of the workflow that you can use to provide additional context about the workflow's purpose and functionality.
                EncryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                  description: The configuration for encrypting workflow data at rest and in transit. Specifies the encryption type and optional KMS key for customer-managed encryption.
                LoggingConfiguration:
                  $ref: "#/components/schemas/LoggingConfiguration"
                  description: The configuration for workflow logging. Specifies the CloudWatch log group where workflow execution logs are stored. Amazon Managed Workflows for Apache Airflow Serverless automatically exports worker logs and task-level information to the specified log group in your account using remote logging functionality. This provides comprehensive observability for debugging and monitoring workflow execution across the distributed, serverless environment.
                EngineVersion:
                  $ref: "#/components/schemas/EngineVersion"
                  description: The version of the Amazon Managed Workflows for Apache Airflow Serverless engine that you want to use for this workflow. This determines the feature set, supported operators, and execution environment capabilities available to your workflow. Amazon Managed Workflows for Apache Airflow Serverless maintains backward compatibility across versions while introducing new features and improvements. Currently supports version 1 with plans for additional versions as the service evolves.
                NetworkConfiguration:
                  $ref: "#/components/schemas/NetworkConfiguration"
                  description: Network configuration for the workflow execution environment, including VPC security groups and subnets for secure network access. When specified, Amazon Managed Workflows for Apache Airflow Serverless deploys ECS worker tasks in your customer VPC to provide secure connectivity to your resources. If not specified, tasks run in the service's default worker VPC with network isolation from other customers. This configuration enables secure access to VPC-only resources like RDS databases or private endpoints.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: A map of tags to assign to the workflow resource. Tags are key-value pairs that are used for resource organization and cost allocation.
                TriggerMode:
                  $ref: "#/components/schemas/GenericString"
                  description: The trigger mode for the workflow execution.
              required:
                - DefinitionS3Location
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkflowResponse"
  /DeleteWorkflow:
    post:
      operationId: DeleteWorkflow
      description: Deletes a workflow and all its versions. This operation permanently removes the workflow and cannot be undone. Amazon Managed Workflows for Apache Airflow Serverless ensures that all associated resources are properly cleaned up, including stopping any running executions, removing scheduled triggers, and cleaning up execution history. The deletion process respects the multi-tenant isolation boundaries and ensures that no residual data or configurations remain that could affect other customers or workflows.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.DeleteWorkflow
            default: AmazonMWAAServerless.DeleteWorkflow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow you want to delete.
                WorkflowVersion:
                  $ref: "#/components/schemas/WorkflowVersion"
                  description: Optional. The specific version of the workflow to delete. If not specified, all versions of the workflow are deleted.
              required:
                - WorkflowArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkflowResponse"
  /GetTaskInstance:
    post:
      operationId: GetTaskInstance
      description: Retrieves detailed information about a specific task instance within a workflow run. Task instances represent individual tasks that are executed as part of a workflow in the Amazon Managed Workflows for Apache Airflow Serverless environment. Each task instance runs in an isolated ECS container with dedicated resources and security boundaries. The service tracks task execution state, retry attempts, and provides detailed timing and error information for troubleshooting and monitoring purposes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.GetTaskInstance
            default: AmazonMWAAServerless.GetTaskInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow that contains the task instance.
                TaskInstanceId:
                  $ref: "#/components/schemas/IdString"
                  description: The unique identifier of the task instance to retrieve.
                RunId:
                  $ref: "#/components/schemas/IdString"
                  description: The unique identifier of the workflow run that contains the task instance.
              required:
                - WorkflowArn
                - TaskInstanceId
                - RunId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTaskInstanceResponse"
  /GetWorkflow:
    post:
      operationId: GetWorkflow
      description: Retrieves detailed information about a workflow, including its configuration, status, and metadata.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.GetWorkflow
            default: AmazonMWAAServerless.GetWorkflow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow you want to retrieve.
                WorkflowVersion:
                  $ref: "#/components/schemas/WorkflowVersion"
                  description: Optional. The specific version of the workflow to retrieve. If not specified, the latest version is returned.
              required:
                - WorkflowArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkflowResponse"
  /GetWorkflowRun:
    post:
      operationId: GetWorkflowRun
      description: Retrieves detailed information about a specific workflow run, including its status, execution details, and task instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.GetWorkflowRun
            default: AmazonMWAAServerless.GetWorkflowRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow that contains the run.
                RunId:
                  $ref: "#/components/schemas/IdString"
                  description: The unique identifier of the workflow run to retrieve.
              required:
                - WorkflowArn
                - RunId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkflowRunResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists all tags that are associated with a specified Amazon Managed Workflows for Apache Airflow Serverless resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.ListTagsForResource
            default: AmazonMWAAServerless.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource for which to list tags.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /ListTaskInstances:
    post:
      operationId: ListTaskInstances
      description: Lists all task instances for a specific workflow run, with optional pagination support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.ListTaskInstances
            default: AmazonMWAAServerless.ListTaskInstances
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow that contains the run.
                RunId:
                  $ref: "#/components/schemas/IdString"
                  description: The unique identifier of the workflow run for which you want a list of task instances.
                MaxResults:
                  $ref: "#/components/schemas/ListTaskInstancesRequestMaxResultsInteger"
                  description: The maximum number of task instances to return in a single response.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token you need to use to retrieve the next set of results. This value is returned from a previous call to ListTaskInstances.
              required:
                - WorkflowArn
                - RunId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTaskInstancesResponse"
  /ListWorkflowRuns:
    post:
      operationId: ListWorkflowRuns
      description: Lists all runs for a specified workflow, with optional pagination and filtering support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.ListWorkflowRuns
            default: AmazonMWAAServerless.ListWorkflowRuns
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListWorkflowRunsRequestMaxResultsInteger"
                  description: The maximum number of workflow runs to return in a single response.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token you need to use to retrieve the next set of results. This value is returned from a previous call to ListWorkflowRuns.
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow for which you want a list of runs.
                WorkflowVersion:
                  $ref: "#/components/schemas/VersionId"
                  description: Optional. The specific version of the workflow for which you want a list of runs. If not specified, runs for all versions are returned.
              required:
                - WorkflowArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkflowRunsResponse"
  /ListWorkflowVersions:
    post:
      operationId: ListWorkflowVersions
      description: Lists all versions of a specified workflow, with optional pagination support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.ListWorkflowVersions
            default: AmazonMWAAServerless.ListWorkflowVersions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListWorkflowVersionsRequestMaxResultsInteger"
                  description: The maximum number of workflow versions to return in a single response.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token you need to use to retrieve the next set of results. This value is returned from a previous call to ListWorkflowVersions.
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow for which you want to list versions.
              required:
                - WorkflowArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkflowVersionsResponse"
  /ListWorkflows:
    post:
      operationId: ListWorkflows
      description: Lists all workflows in your account, with optional pagination support. This operation returns summary information for workflows, showing only the most recently created version of each workflow. Amazon Managed Workflows for Apache Airflow Serverless maintains workflow metadata in a highly available, distributed storage system that enables efficient querying and filtering. The service implements proper access controls to ensure you can only view workflows that you have permissions to access, supporting both individual and team-based workflow management scenarios.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.ListWorkflows
            default: AmazonMWAAServerless.ListWorkflows
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListWorkflowsRequestMaxResultsInteger"
                  description: The maximum number of workflows you want to return in a single response.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token you need to use to retrieve the next set of results. This value is returned from a previous call to ListWorkflows.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkflowsResponse"
  /StartWorkflowRun:
    post:
      operationId: StartWorkflowRun
      description: Starts a new execution of a workflow. This operation creates a workflow run that executes the tasks that are defined in the workflow. Amazon Managed Workflows for Apache Airflow Serverless schedules the workflow execution across its managed Airflow environment, automatically scaling ECS worker tasks based on the workload. The service handles task isolation, dependency resolution, and provides comprehensive monitoring and logging throughout the execution lifecycle.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.StartWorkflowRun
            default: AmazonMWAAServerless.StartWorkflowRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow you want to run.
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyTokenString"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This token prevents duplicate workflow run requests.
                OverrideParameters:
                  $ref: "#/components/schemas/ObjectMap"
                  description: Optional parameters to override default workflow parameters for this specific run. These parameters are passed to the workflow during execution and can be used to customize behavior without modifying the workflow definition. Parameters are made available as environment variables to tasks and you can reference them within the YAML workflow definition using standard parameter substitution syntax.
                WorkflowVersion:
                  $ref: "#/components/schemas/VersionId"
                  description: Optional. The specific version of the workflow to execute. If not specified, the latest version is used.
              required:
                - WorkflowArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartWorkflowRunResponse"
  /StopWorkflowRun:
    post:
      operationId: StopWorkflowRun
      description: Stops a running workflow execution. This operation terminates all running tasks and prevents new tasks from starting. Amazon Managed Workflows for Apache Airflow Serverless gracefully shuts down the workflow execution by stopping task scheduling and terminating active ECS worker containers. The operation transitions the workflow run to a STOPPING state and then to STOPPED once all cleanup is complete. In-flight tasks may complete or be terminated depending on their current execution state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.StopWorkflowRun
            default: AmazonMWAAServerless.StopWorkflowRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow that contains the run you want to stop.
                RunId:
                  $ref: "#/components/schemas/IdString"
                  description: The unique identifier of the workflow run to stop.
              required:
                - WorkflowArn
                - RunId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopWorkflowRunResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds tags to an Amazon Managed Workflows for Apache Airflow Serverless resource. Tags are key-value pairs that help you organize and categorize your resources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.TagResource
            default: AmazonMWAAServerless.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to which to add tags.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: A map of tags to add to the resource. Each tag consists of a key-value pair.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from an Amazon Managed Workflows for Apache Airflow Serverless resource. This operation removes the specified tags from the resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.UntagResource
            default: AmazonMWAAServerless.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource from which to remove tags.
                TagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: A list of tag keys to remove from the resource. Only the keys are required; the values are ignored.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateWorkflow:
    post:
      operationId: UpdateWorkflow
      description: Updates an existing workflow with new configuration settings. This operation allows you to modify the workflow definition, role, and other settings. When you update a workflow, Amazon Managed Workflows for Apache Airflow Serverless automatically creates a new version with the updated configuration and disables scheduling on all previous versions to ensure only one version is actively scheduled at a time. The update operation maintains workflow history while providing a clean transition to the new configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMWAAServerless.UpdateWorkflow
            default: AmazonMWAAServerless.UpdateWorkflow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkflowArn:
                  $ref: "#/components/schemas/WorkflowArn"
                  description: The Amazon Resource Name (ARN) of the workflow you want to update.
                DefinitionS3Location:
                  $ref: "#/components/schemas/DefinitionS3Location"
                  description: The Amazon S3 location where the updated workflow definition file is stored.
                RoleArn:
                  $ref: "#/components/schemas/RoleARN"
                  description: The Amazon Resource Name (ARN) of the IAM role that Amazon Managed Workflows for Apache Airflow Serverless assumes when it executes the updated workflow.
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                  description: An updated description for the workflow.
                LoggingConfiguration:
                  $ref: "#/components/schemas/LoggingConfiguration"
                  description: Updated logging configuration for the workflow.
                EngineVersion:
                  $ref: "#/components/schemas/EngineVersion"
                  description: The version of the Amazon Managed Workflows for Apache Airflow Serverless engine that you want to use for the updated workflow.
                NetworkConfiguration:
                  $ref: "#/components/schemas/NetworkConfiguration"
                  description: Updated network configuration for the workflow execution environment.
                TriggerMode:
                  $ref: "#/components/schemas/GenericString"
                  description: The trigger mode for the workflow execution.
              required:
                - WorkflowArn
                - DefinitionS3Location
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkflowResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    NameString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9]+[a-zA-Z0-9\\.\\-_]*"
    IdempotencyTokenString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\x21-\\x7E]+"
    DefinitionS3Location:
      description: Specifies the Amazon S3 location of a workflow definition file. This structure contains the bucket name, object key, and optional version ID for the workflow definition. Amazon Managed Workflows for Apache Airflow Serverless takes a snapshot of the definition file at the time of workflow creation or update, ensuring that the workflow behavior remains consistent even if the source file is modified. The definition must be a valid YAML file that uses supported Amazon Web Services operators and Amazon Managed Workflows for Apache Airflow Serverless syntax.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon S3 bucket that contains the workflow definition file.
        ObjectKey:
          $ref: "#/components/schemas/String"
          description: The key (name) of the workflow definition file within the S3 bucket.
        VersionId:
          $ref: "#/components/schemas/String"
          description: Optional. The version ID of the workflow definition file in Amazon S3. If not specified, the latest version is used.
      required:
        - Bucket
        - ObjectKey
    String:
      type: string
    RoleARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws(?:-(?:cn|us-gov|iso|iso-b|iso-e|iso-f))?:iam::[0-9]{12}:role(/[a-zA-Z0-9+=,.@_\-]{1,512})*?/[a-zA-Z0-9+=,.@_\-]{1,64}
    DescriptionString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .+
    EncryptionConfiguration:
