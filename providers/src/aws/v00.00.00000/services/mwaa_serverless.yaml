      properties:
        Type:
          $ref: "#/components/schemas/EncryptionType"
          description: The type of encryption to use. Values are AWS_MANAGED_KEY (Amazon Web Services manages the encryption key) or CUSTOMER_MANAGED_KEY (you provide a KMS key).
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: The ID or ARN of the Amazon Web Services KMS key to use for encryption. Required when Type is CUSTOMER_MANAGED_KEY.
      required:
        - Type
    EncryptionType:
      type: string
      enum:
        - AWS_MANAGED_KEY
        - CUSTOMER_MANAGED_KEY
    LoggingConfiguration:
      description: Configuration for workflow logging that specifies where you should store your workflow execution logs. Amazon Managed Workflows for Apache Airflow Serverless provides comprehensive logging capabilities that capture workflow execution details, task-level information, and system events. Logs are automatically exported to your specified CloudWatch log group using remote logging functionality, providing centralized observability across the distributed, multi-tenant execution environment. This enables effective debugging, monitoring, and compliance auditing of workflow executions.
      type: object
      properties:
        LogGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch log group where workflow execution logs are stored.
      required:
        - LogGroupName
    EngineVersion:
      type: integer
    NetworkConfiguration:
      description: Network configuration for workflow execution. Specifies VPC security groups and subnets for secure network access. When provided, Amazon Managed Workflows for Apache Airflow Serverless deploys ECS worker tasks in your specified VPC configuration, enabling secure access to VPC-only resources. The service uses a proxy API container architecture where one container handles external communication while the worker container connects to your VPC for task execution. This design provides both security isolation and connectivity flexibility.
