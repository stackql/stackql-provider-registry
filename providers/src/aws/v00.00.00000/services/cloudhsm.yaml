openapi: 3.0.0
info:
  version: "2014-05-30"
  title: Amazon CloudHSM
  description: Amazon CloudHSM
  x-serviceName: cloudhsm
  x-serviceAlias: cloudhsm
  x-protocol: json
  x-apiVersion: "2014-05-30"
  x-endpointPrefix: cloudhsm
  x-targetPrefix: CloudHsmFrontendService
  x-jsonVersion: "1.1"
servers:
  - url: https://cloudhsm.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cloudhsm
paths:
  /AddTagsToResource:
    post:
      operationId: AddTagsToResource
      description: This is documentation for AWS CloudHSM Classic. For more information, see AWS CloudHSM Classic FAQs, the AWS CloudHSM Classic User Guide, and the AWS CloudHSM Classic API Reference. For information about the current version of AWS CloudHSM, see AWS CloudHSM, the AWS CloudHSM User Guide, and the AWS CloudHSM API Reference. Adds or overwrites one or more tags for the specified AWS CloudHSM resource. Each tag consists of a key and a value. Tag keys must be unique to each resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudHsmFrontendService.AddTagsToResource
            default: CloudHsmFrontendService.AddTagsToResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the AWS CloudHSM resource to tag.
                TagList:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tags.
              required:
                - ResourceArn
                - TagList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsToResourceResponse"
  /CreateHapg:
    post:
      operationId: CreateHapg
      description: This is documentation for AWS CloudHSM Classic. For more information, see AWS CloudHSM Classic FAQs, the AWS CloudHSM Classic User Guide, and the AWS CloudHSM Classic API Reference. For information about the current version of AWS CloudHSM, see AWS CloudHSM, the AWS CloudHSM User Guide, and the AWS CloudHSM API Reference. Creates a high-availability partition group. A high-availability partition group is a group of partitions that spans multiple physical HSMs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudHsmFrontendService.CreateHapg
            default: CloudHsmFrontendService.CreateHapg
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Label:
                  $ref: "#/components/schemas/Label"
                  description: The label of the new high-availability partition group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHapgResponse"
  /CreateHsm:
    post:
      operationId: CreateHsm
      description: This is documentation for AWS CloudHSM Classic. For more information, see AWS CloudHSM Classic FAQs, the AWS CloudHSM Classic User Guide, and the AWS CloudHSM Classic API Reference. For information about the current version of AWS CloudHSM, see AWS CloudHSM, the AWS CloudHSM User Guide, and the AWS CloudHSM API Reference. Creates an uninitialized HSM instance. There is an upfront fee charged for each HSM instance that you create with the CreateHsm operation. If you accidentally provision an HSM and want to request a refund, delete the instance using the DeleteHsm operation, go to the AWS Support Center, create a new case, and select Account and Billing Support. It can take up to 20 minutes to create and provision an HSM. You can monitor the status of the HSM with the DescribeHsm operation. The HSM is ready to be initialized when the status changes to RUNNING.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudHsmFrontendService.CreateHsm
            default: CloudHsmFrontendService.CreateHsm
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubnetId:
                  $ref: "#/components/schemas/SubnetId"
                  description: The identifier of the subnet in your VPC in which to place the HSM.
                SshKey:
                  $ref: "#/components/schemas/SshKey"
                  description: The SSH public key to install on the HSM.
                EniIp:
                  $ref: "#/components/schemas/IpAddress"
                  description: The IP address to assign to the HSM's ENI. If an IP address is not specified, an IP address will be randomly chosen from the CIDR range of the subnet.
                IamRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The ARN of an IAM role to enable the AWS CloudHSM service to allocate an ENI on your behalf.
                ExternalId:
                  $ref: "#/components/schemas/ExternalId"
                  description: The external ID from IamRoleArn, if present.
                SubscriptionType:
                  $ref: "#/components/schemas/SubscriptionType"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A user-defined token to ensure idempotence. Subsequent calls to this operation with the same token will be ignored.
                SyslogIp:
                  $ref: "#/components/schemas/IpAddress"
                  description: The IP address for the syslog monitoring server. The AWS CloudHSM service only supports one syslog monitoring server.
              required:
                - SubnetId
                - SshKey
                - IamRoleArn
                - SubscriptionType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHsmResponse"
