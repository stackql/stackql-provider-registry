          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HsmArn:
                  $ref: "#/components/schemas/HsmArn"
                  description: The ARN of the HSM. Either the HsmArn or the SerialNumber parameter must be specified.
                HsmSerialNumber:
                  $ref: "#/components/schemas/HsmSerialNumber"
                  description: The serial number of the HSM. Either the HsmArn or the HsmSerialNumber parameter must be specified.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeHsmResponse"
