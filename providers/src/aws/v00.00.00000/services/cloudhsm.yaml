            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The NextToken value from a previous call to ListHapgs. Pass null if this is the first call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHapgsOutputDisplay"
  /ListHsms:
    post:
