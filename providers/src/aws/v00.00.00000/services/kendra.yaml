      description: Summary information on a query suggestions block list. This includes information on the block list ID, block list name, when the block list was created, when the block list was last updated, and the count of block words/phrases in the block list. For information on the current quota limits for block lists, see Quotas for Amazon Kendra.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/QuerySuggestionsBlockListId"
          description: The identifier of a block list.
        Name:
          $ref: "#/components/schemas/QuerySuggestionsBlockListName"
          description: The name of the block list.
        Status:
          $ref: "#/components/schemas/QuerySuggestionsBlockListStatus"
          description: The status of the block list.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the block list was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the block list was last updated.
        ItemCount:
          $ref: "#/components/schemas/Integer"
          description: The number of items in the block list file.
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 1011
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags associated with the index, FAQ, data source, or other resource.
    MaxResultsIntegerForListThesauriRequest:
      type: integer
      minimum: 1
      maximum: 100
    ListThesauriResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the response is truncated, Amazon Kendra returns this token that you can use in the subsequent request to retrieve the next set of thesauri.
        ThesaurusSummaryItems:
          $ref: "#/components/schemas/ThesaurusSummaryItems"
          description: An array of summary information for a thesaurus or multiple thesauri.
    ThesaurusSummaryItems:
      type: array
      items:
        $ref: "#/components/schemas/ThesaurusSummary"
    ThesaurusSummary:
      description: An array of summary information for a thesaurus or multiple thesauri.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ThesaurusId"
          description: The identifier of the thesaurus.
        Name:
          $ref: "#/components/schemas/ThesaurusName"
          description: The name of the thesaurus.
        Status:
          $ref: "#/components/schemas/ThesaurusStatus"
          description: The status of the thesaurus.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the thesaurus was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the thesaurus was last updated.
    GroupMembers:
      description: A list of users that belong to a group. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents.
      type: object
      properties:
        MemberGroups:
          $ref: "#/components/schemas/MemberGroups"
          description: A list of users that belong to a group. This can also include sub groups. For example, the sub groups "Research", "Engineering", and "Sales and Marketing" all belong to the group "Company A".
        MemberUsers:
          $ref: "#/components/schemas/MemberUsers"
          description: A list of users that belong to a group. For example, a list of interns all belong to the "Interns" group.
        S3PathforGroupMembers:
          $ref: "#/components/schemas/S3Path"
          description: If you have more than 1000 users and/or sub groups for a single group, you need to provide the path to the S3 file that lists your users and sub groups for a group. Your sub groups can contain more than 1000 users, but the list of sub groups that belong to a group (and/or users) must be no more than 1000. You can download this example S3 file that uses the correct format for listing group members. Note, dataSourceId is optional. The value of type for a group is always GROUP and for a user it is always USER.
    MemberGroups:
      type: array
      items:
        $ref: "#/components/schemas/MemberGroup"
    MemberGroup:
      description: The sub groups that belong to a group.
      type: object
      properties:
        GroupId:
          $ref: "#/components/schemas/GroupId"
          description: The identifier of the sub group you want to map to a group.
        DataSourceId:
          $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source for the sub group you want to map to a group.
      required:
        - GroupId
    MemberUsers:
      type: array
      items:
        $ref: "#/components/schemas/MemberUser"
    MemberUser:
      description: The users that belong to a group.
      type: object
      properties:
        UserId:
          $ref: "#/components/schemas/UserId"
          description: The identifier of the user you want to map to a group.
      required:
        - UserId
    UserId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^\P{C}*$
    FacetList:
      type: array
      items:
        $ref: "#/components/schemas/Facet"
    Facet:
      description: Information about a document attribute or field. You can use document attributes as facets. For example, the document attribute or facet "Department" includes the values "HR", "Engineering", and "Accounting". You can display these values in the search results so that documents can be searched by department. You can display up to 10 facet values per facet for a query. If you want to increase this limit, contact Support.
      type: object
      properties:
        DocumentAttributeKey:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The unique key for the document attribute.
        Facets:
          $ref: "#/components/schemas/FacetList"
          description: An array of document attributes that are nested facets within a facet. For example, the document attribute or facet "Department" includes a value called "Engineering". In addition, the document attribute or facet "SubDepartment" includes the values "Frontend" and "Backend" for documents assigned to "Engineering". You can display nested facets in the search results so that documents can be searched not only by department but also by a sub department within a department. This helps your users further narrow their search. You can only have one nested facet within a facet. If you want to increase this limit, contact Support.
        MaxResults:
          $ref: "#/components/schemas/TopDocumentAttributeValueCountPairsSize"
          description: Maximum number of facet values per facet. The default is 10. You can use this to limit the number of facet values to less than 10. If you want to increase the default, contact Support.
    TopDocumentAttributeValueCountPairsSize:
      type: integer
      minimum: 0
      maximum: 5000
    QueryResultType:
      type: string
      enum:
        - DOCUMENT
        - QUESTION_ANSWER
        - ANSWER
    DocumentRelevanceOverrideConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentRelevanceConfiguration"
    DocumentRelevanceConfiguration:
      description: Overrides the document relevance properties of a custom index field.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DocumentMetadataConfigurationName"
          description: The name of the index field.
        Relevance:
          $ref: "#/components/schemas/Relevance"
          description: Provides information for tuning the relevance of a field in a search. When a query includes terms that match the field, the results are given a boost in the response based on these tuning parameters.
      required:
        - Name
        - Relevance
    SortingConfiguration:
      description: Specifies the document attribute to use to sort the response to a Amazon Kendra query. You can specify a single attribute for sorting. The attribute must have the Sortable flag set to true, otherwise Amazon Kendra returns an exception. You can sort attributes of the following types. Date value Long value String value You can't sort attributes of the following type. String list value
      type: object
      properties:
        DocumentAttributeKey:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: "The name of the document attribute used to sort the response. You can use any field that has the Sortable flag set to true. You can also sort by any of the following built-in attributes: _category _created_at _last_updated_at _version _view_count"
        SortOrder:
          $ref: "#/components/schemas/SortOrder"
          description: The order that the results should be returned in. In case of ties, the relevance assigned to the result by Amazon Kendra is used as the tie-breaker.
      required:
        - DocumentAttributeKey
        - SortOrder
    SortOrder:
      type: string
      enum:
        - DESC
        - ASC
    SortingConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/SortingConfiguration"
    VisitorId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    SpellCorrectionConfiguration:
      description: Provides the configuration information for suggested query spell corrections. Suggested spell corrections are based on words that appear in your indexed documents and how closely a corrected word matches a misspelled word. This feature is designed with certain defaults or limits. For information on the current limits and how to request more support for some limits, see the Spell Checker documentation.
      type: object
      properties:
        IncludeQuerySpellCheckSuggestions:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to suggest spell corrections for queries.
      required:
        - IncludeQuerySpellCheckSuggestions
    CollapseConfiguration:
      description: Specifies how to group results by document attribute value, and how to display them collapsed/expanded under a designated primary document for each group.
      type: object
      properties:
        DocumentAttributeKey:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The document attribute used to group search results. You can use any attribute that has the Sortable flag set to true. You can also sort by any of the following built-in attributes:"_category","_created_at", "_last_updated_at", "_version", "_view_count".
        SortingConfigurations:
          $ref: "#/components/schemas/SortingConfigurationList"
          description: A prioritized list of document attributes/fields that determine the primary document among those in a collapsed group.
        MissingAttributeKeyStrategy:
          $ref: "#/components/schemas/MissingAttributeKeyStrategy"
          description: "Specifies the behavior for documents without a value for the collapse attribute. Amazon Kendra offers three customization options: Choose to COLLAPSE all documents with null or missing values in one group. This is the default configuration. Choose to IGNORE documents with null or missing values. Ignored documents will not appear in query results. Choose to EXPAND each document with a null or missing value into a group of its own."
        Expand:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to expand the collapsed results.
        ExpandConfiguration:
          $ref: "#/components/schemas/ExpandConfiguration"
          description: Provides configuration information to customize expansion options for a collapsed group.
      required:
        - DocumentAttributeKey
    MissingAttributeKeyStrategy:
      type: string
      enum:
        - IGNORE
        - COLLAPSE
        - EXPAND
    ExpandConfiguration:
      description: Specifies the configuration information needed to customize how collapsed search result groups expand.
      type: object
      properties:
        MaxResultItemsToExpand:
          $ref: "#/components/schemas/Integer"
          description: The number of collapsed search result groups to expand. If you set this value to 10, for example, only the first 10 out of 100 result groups will have expand functionality.
        MaxExpandedResultsPerItem:
          $ref: "#/components/schemas/Integer"
          description: The number of expanded results to show per collapsed primary document. For instance, if you set this value to 3, then at most 3 results per collapsed group will be displayed.
    QueryResult:
      type: object
      properties:
        QueryId:
          $ref: "#/components/schemas/QueryId"
          description: The identifier for the search. You also use QueryId to identify the search when using the SubmitFeedback API.
        ResultItems:
          $ref: "#/components/schemas/QueryResultItemList"
          description: The results of the search.
        FacetResults:
          $ref: "#/components/schemas/FacetResultList"
          description: Contains the facet results. A FacetResult contains the counts for each field/attribute key that was specified in the Facets input parameter.
        TotalNumberOfResults:
          $ref: "#/components/schemas/Integer"
          description: The total number of items found by the search. However, you can only retrieve up to 100 items. For example, if the search found 192 items, you can only retrieve the first 100 of the items.
        Warnings:
          $ref: "#/components/schemas/WarningList"
          description: A list of warning codes and their messages on problems with your query. Amazon Kendra currently only supports one type of warning, which is a warning on invalid syntax used in the query. For examples of invalid query syntax, see Searching with advanced query syntax.
        SpellCorrectedQueries:
          $ref: "#/components/schemas/SpellCorrectedQueryList"
          description: A list of information related to suggested spell corrections for a query.
        FeaturedResultsItems:
          $ref: "#/components/schemas/FeaturedResultsItemList"
          description: The list of featured result items. Featured results are displayed at the top of the search results page, placed above all other results for certain queries. If there's an exact match of a query, then certain documents are featured in the search results.
    QueryId:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]*"
    QueryResultItemList:
      type: array
      items:
        $ref: "#/components/schemas/QueryResultItem"
    QueryResultItem:
      description: A single query result. A query result contains information about a document returned by the query. This includes the original location of the document, a list of attributes assigned to the document, and relevant text from the document that satisfies the query.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResultId"
          description: The unique identifier for the query result item id (Id) and the query result item document id (DocumentId) combined. The value of this field changes with every request, even when you have the same documents.
        Type:
          $ref: "#/components/schemas/QueryResultType"
          description: The type of document within the response. For example, a response could include a question-answer that's relevant to the query.
        Format:
          $ref: "#/components/schemas/QueryResultFormat"
          description: If the Type of document within the response is ANSWER, then it is either a TABLE answer or TEXT answer. If it's a table answer, a table excerpt is returned in TableExcerpt. If it's a text answer, a text excerpt is returned in DocumentExcerpt.
        AdditionalAttributes:
          $ref: "#/components/schemas/AdditionalResultAttributeList"
          description: One or more additional fields/attributes associated with the query result.
        DocumentId:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier for the document.
        DocumentTitle:
          $ref: "#/components/schemas/TextWithHighlights"
          description: The title of the document. Contains the text of the title and information for highlighting the relevant terms in the title.
        DocumentExcerpt:
          $ref: "#/components/schemas/TextWithHighlights"
          description: An extract of the text in the document. Contains information about highlighting the relevant terms in the excerpt.
        DocumentURI:
          $ref: "#/components/schemas/Url"
          description: The URI of the original location of the document.
        DocumentAttributes:
          $ref: "#/components/schemas/DocumentAttributeList"
          description: An array of document fields/attributes assigned to a document in the search results. For example, the document author (_author) or the source URI (_source_uri) of the document.
        ScoreAttributes:
          $ref: "#/components/schemas/ScoreAttributes"
          description: Indicates the confidence level of Amazon Kendra providing a relevant result for the query. Each result is placed into a bin that indicates the confidence, VERY_HIGH, HIGH, MEDIUM and LOW. You can use the score to determine if a response meets the confidence needed for your application. The field is only set to LOW when the Type field is set to DOCUMENT and Amazon Kendra is not confident that the result is relevant to the query.
        FeedbackToken:
          $ref: "#/components/schemas/FeedbackToken"
          description: A token that identifies a particular result from a particular query. Use this token to provide click-through feedback for the result. For more information, see Submitting feedback.
        TableExcerpt:
          $ref: "#/components/schemas/TableExcerpt"
          description: An excerpt from a table within a document.
        CollapsedResultDetail:
          $ref: "#/components/schemas/CollapsedResultDetail"
          description: Provides details about a collapsed group of search results.
    QueryResultFormat:
      type: string
      enum:
        - TABLE
        - TEXT
    AdditionalResultAttributeList:
      type: array
      items:
        $ref: "#/components/schemas/AdditionalResultAttribute"
    AdditionalResultAttribute:
      description: An attribute returned from an index query.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: The key that identifies the attribute.
        ValueType:
          $ref: "#/components/schemas/AdditionalResultAttributeValueType"
          description: The data type of the Value property.
        Value:
          $ref: "#/components/schemas/AdditionalResultAttributeValue"
          description: An object that contains the attribute value.
      required:
        - Key
        - ValueType
        - Value
    AdditionalResultAttributeValueType:
      type: string
      enum:
        - TEXT_WITH_HIGHLIGHTS_VALUE
    AdditionalResultAttributeValue:
      description: An attribute returned with a document from a search.
      type: object
      properties:
        TextWithHighlightsValue:
          $ref: "#/components/schemas/TextWithHighlights"
          description: The text associated with the attribute and information about the highlight to apply to the text.
    TextWithHighlights:
      description: Provides text and information about where to highlight the text.
      type: object
      properties:
        Text:
          $ref: "#/components/schemas/String"
          description: The text to display to the user.
        Highlights:
          $ref: "#/components/schemas/HighlightList"
          description: The beginning and end of the text that should be highlighted.
    HighlightList:
      type: array
      items:
        $ref: "#/components/schemas/Highlight"
    Highlight:
      description: Provides information that you can use to highlight a search result so that your users can quickly identify terms in the response.
      type: object
      properties:
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based location in the response string where the highlight starts.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based location in the response string where the highlight ends.
        TopAnswer:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the response is the best response. True if this is the best response; otherwise, false.
        Type:
          $ref: "#/components/schemas/HighlightType"
          description: The highlight type.
      required:
        - BeginOffset
        - EndOffset
    HighlightType:
      type: string
      enum:
        - STANDARD
        - THESAURUS_SYNONYM
    ScoreAttributes:
      description: Provides a relative ranking that indicates how confident Amazon Kendra is that the response is relevant to the query.
      type: object
      properties:
        ScoreConfidence:
          $ref: "#/components/schemas/ScoreConfidence"
          description: A relative ranking for how relevant the response is to the query.
    ScoreConfidence:
      description: Enumeration for query score confidence.
      type: string
      enum:
        - VERY_HIGH
        - HIGH
        - MEDIUM
        - LOW
        - NOT_AVAILABLE
    FeedbackToken:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^\P{C}*.\P{C}*$
    TableExcerpt:
      description: An excerpt from a table within a document. The table excerpt displays up to five columns and three rows, depending on how many table cells are relevant to the query and how many columns are available in the original table. The top most relevant cell is displayed in the table excerpt, along with the next most relevant cells.
      type: object
      properties:
        Rows:
          $ref: "#/components/schemas/TableRowList"
          description: A list of rows in the table excerpt.
        TotalNumberOfRows:
          $ref: "#/components/schemas/Integer"
          description: A count of the number of rows in the original table within the document.
    TableRowList:
      type: array
      items:
        $ref: "#/components/schemas/TableRow"
    TableRow:
      description: Information about a row in a table excerpt.
      type: object
      properties:
        Cells:
          $ref: "#/components/schemas/TableCellList"
          description: A list of table cells in a row.
    TableCellList:
      type: array
      items:
        $ref: "#/components/schemas/TableCell"
    TableCell:
      description: Provides information about a table cell in a table excerpt.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/String"
          description: The actual value or content within a table cell. A table cell could contain a date value of a year, or a string value of text, for example.
        TopAnswer:
          $ref: "#/components/schemas/Boolean"
          description: TRUE if the response of the table cell is the top answer. This is the cell value or content with the highest confidence score or is the most relevant to the query.
        Highlighted:
          $ref: "#/components/schemas/Boolean"
          description: TRUE means that the table cell has a high enough confidence and is relevant to the query, so the value or content should be highlighted.
        Header:
          $ref: "#/components/schemas/Boolean"
          description: TRUE means that the table cell should be treated as a header.
    CollapsedResultDetail:
      description: Provides details about a collapsed group of search results.
      type: object
      properties:
        DocumentAttribute:
          $ref: "#/components/schemas/DocumentAttribute"
          description: The value of the document attribute that results are collapsed on.
        ExpandedResults:
          $ref: "#/components/schemas/ExpandedResultList"
          description: A list of results in the collapsed group.
      required:
        - DocumentAttribute
    ExpandedResultList:
      type: array
      items:
        $ref: "#/components/schemas/ExpandedResultItem"
    ExpandedResultItem:
      description: A single expanded result in a collapsed group of search results. An expanded result item contains information about an expanded result document within a collapsed group of search results. This includes the original location of the document, a list of attributes assigned to the document, and relevant text from the document that satisfies the query.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResultId"
          description: The identifier for the expanded result.
        DocumentId:
          $ref: "#/components/schemas/DocumentId"
          description: The idenitifier of the document.
        DocumentTitle:
          $ref: "#/components/schemas/TextWithHighlights"
        DocumentExcerpt:
          $ref: "#/components/schemas/TextWithHighlights"
        DocumentURI:
          $ref: "#/components/schemas/Url"
          description: The URI of the original location of the document.
        DocumentAttributes:
          $ref: "#/components/schemas/DocumentAttributeList"
          description: An array of document attributes assigned to a document in the search results. For example, the document author ("_author") or the source URI ("_source_uri") of the document.
    FacetResultList:
      type: array
      items:
        $ref: "#/components/schemas/FacetResult"
    FacetResult:
      description: The facet values for the documents in the response.
      type: object
      properties:
        DocumentAttributeKey:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The key for the facet values. This is the same as the DocumentAttributeKey provided in the query.
        DocumentAttributeValueType:
          $ref: "#/components/schemas/DocumentAttributeValueType"
          description: The data type of the facet value. This is the same as the type defined for the index field when it was created.
        DocumentAttributeValueCountPairs:
          $ref: "#/components/schemas/DocumentAttributeValueCountPairList"
          description: An array of key/value pairs, where the key is the value of the attribute and the count is the number of documents that share the key value.
    DocumentAttributeValueCountPairList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentAttributeValueCountPair"
    DocumentAttributeValueCountPair:
      description: Provides the count of documents that match a particular document attribute or field when doing a faceted search.
      type: object
      properties:
        DocumentAttributeValue:
          $ref: "#/components/schemas/DocumentAttributeValue"
          description: The value of the attribute/field. For example, "HR".
        Count:
          $ref: "#/components/schemas/Integer"
          description: The number of documents in the response that have the attribute/field value for the key.
        FacetResults:
          $ref: "#/components/schemas/FacetResultList"
          description: Contains the results of a document attribute/field that is a nested facet. A FacetResult contains the counts for each facet nested within a facet. For example, the document attribute or facet "Department" includes a value called "Engineering". In addition, the document attribute or facet "SubDepartment" includes the values "Frontend" and "Backend" for documents assigned to "Engineering". You can display nested facets in the search results so that documents can be searched not only by department but also by a sub department within a department. The counts for documents that belong to "Frontend" and "Backend" within "Engineering" are returned for a query.
    WarningList:
      type: array
      items:
        $ref: "#/components/schemas/Warning"
    Warning:
      description: The warning code and message that explains a problem with a query.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/WarningMessage"
          description: The message that explains the problem with the query.
        Code:
          $ref: "#/components/schemas/WarningCode"
          description: The code used to show the type of warning for the query.
    WarningMessage:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^\P{C}*$
    WarningCode:
      type: string
      enum:
        - QUERY_LANGUAGE_INVALID_SYNTAX
    SpellCorrectedQueryList:
      type: array
      items:
        $ref: "#/components/schemas/SpellCorrectedQuery"
    SpellCorrectedQuery:
      description: A query with suggested spell corrections.
      type: object
      properties:
        SuggestedQueryText:
          $ref: "#/components/schemas/SuggestedQueryText"
          description: The query with the suggested spell corrections.
        Corrections:
          $ref: "#/components/schemas/CorrectionList"
          description: The corrected misspelled word or words in a query.
    SuggestedQueryText:
      type: string
      minLength: 1
      maxLength: 1000
    CorrectionList:
      type: array
      items:
        $ref: "#/components/schemas/Correction"
    Correction:
      description: A corrected misspelled word in a query.
      type: object
      properties:
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based location in the response string or text where the corrected word starts.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based location in the response string or text where the corrected word ends.
        Term:
          $ref: "#/components/schemas/String"
          description: The string or text of a misspelled word in a query.
        CorrectedTerm:
          $ref: "#/components/schemas/String"
          description: The string or text of a corrected misspelled word in a query.
    FeaturedResultsItemList:
      type: array
      items:
        $ref: "#/components/schemas/FeaturedResultsItem"
    FeaturedResultsItem:
      description: A single featured result item. A featured result is displayed at the top of the search results page, placed above all other results for certain queries. If there's an exact match of a query, then certain documents are featured in the search results.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResultId"
          description: The identifier of the featured result.
        Type:
          $ref: "#/components/schemas/QueryResultType"
          description: The type of document within the featured result response. For example, a response could include a question-answer type that's relevant to the query.
        AdditionalAttributes:
          $ref: "#/components/schemas/AdditionalResultAttributeList"
          description: One or more additional attributes associated with the featured result.
        DocumentId:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the featured document.
        DocumentTitle:
          $ref: "#/components/schemas/TextWithHighlights"
        DocumentExcerpt:
          $ref: "#/components/schemas/TextWithHighlights"
        DocumentURI:
          $ref: "#/components/schemas/Url"
          description: The source URI location of the featured document.
        DocumentAttributes:
          $ref: "#/components/schemas/DocumentAttributeList"
          description: An array of document attributes assigned to a featured document in the search results. For example, the document author (_author) or the source URI (_source_uri) of the document.
        FeedbackToken:
          $ref: "#/components/schemas/FeedbackToken"
          description: A token that identifies a particular featured result from a particular query. Use this token to provide click-through feedback for the result. For more information, see Submitting feedback.
    RetrieveResult:
      type: object
      properties:
        QueryId:
          $ref: "#/components/schemas/QueryId"
          description: The identifier of query used for the search. You also use QueryId to identify the search when using the Submitfeedback API.
        ResultItems:
          $ref: "#/components/schemas/RetrieveResultItemList"
          description: The results of the retrieved relevant passages for the search.
    RetrieveResultItemList:
      type: array
      items:
        $ref: "#/components/schemas/RetrieveResultItem"
    RetrieveResultItem:
      description: A single retrieved relevant passage result.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResultId"
          description: The identifier of the relevant passage result.
        DocumentId:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document.
        DocumentTitle:
          $ref: "#/components/schemas/DocumentTitle"
          description: The title of the document.
        Content:
          $ref: "#/components/schemas/Content"
          description: The contents of the relevant passage.
        DocumentURI:
          $ref: "#/components/schemas/Url"
          description: The URI of the original location of the document.
        DocumentAttributes:
          $ref: "#/components/schemas/DocumentAttributeList"
          description: An array of document fields/attributes assigned to a document in the search results. For example, the document author (_author) or the source URI (_source_uri) of the document.
        ScoreAttributes:
          $ref: "#/components/schemas/ScoreAttributes"
          description: The confidence score bucket for a retrieved passage result. The confidence bucket provides a relative ranking that indicates how confident Amazon Kendra is that the response is relevant to the query.
    DocumentTitle:
      type: string
    Content:
      type: string
    StartDataSourceSyncJobResponse:
      type: object
      properties:
        ExecutionId:
          $ref: "#/components/schemas/String"
          description: Identifies a particular synchronization job.
    ClickFeedbackList:
      type: array
      items:
        $ref: "#/components/schemas/ClickFeedback"
    ClickFeedback:
      description: Gathers information about when a particular result was clicked by a user. Your application uses the SubmitFeedback API to provide click information.
      type: object
      properties:
        ResultId:
          $ref: "#/components/schemas/ResultId"
          description: The identifier of the search result that was clicked.
        ClickTime:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the result was clicked.
      required:
        - ResultId
        - ClickTime
    RelevanceFeedbackList:
      type: array
      items:
        $ref: "#/components/schemas/RelevanceFeedback"
    RelevanceFeedback:
      description: Provides feedback on how relevant a document is to a search. Your application uses the SubmitFeedback API to provide relevance information.
      type: object
      properties:
        ResultId:
          $ref: "#/components/schemas/ResultId"
          description: The identifier of the search result that the user provided relevance feedback for.
        RelevanceValue:
          $ref: "#/components/schemas/RelevanceType"
          description: Whether the document was relevant or not relevant to the search.
      required:
        - ResultId
        - RelevanceValue
    RelevanceType:
      type: string
      enum:
        - RELEVANT
        - NOT_RELEVANT
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
    UpdateAccessControlConfigurationResponse:
      type: object
    UpdateFeaturedResultsSetResponse:
      type: object
      properties:
        FeaturedResultsSet:
          $ref: "#/components/schemas/FeaturedResultsSet"
          description: Information on the set of featured results. This includes the identifier of the featured results set, whether the featured results set is active or inactive, when the featured results set was last updated, and more.
    AttributeSuggestionsUpdateConfig:
      description: Updates the configuration information for the document fields/attributes that you want to base query suggestions on. To deactivate using documents fields for query suggestions, set the mode to INACTIVE. You must also set SuggestionTypes as either QUERY or DOCUMENT_ATTRIBUTES and then call GetQuerySuggestions. If you set to QUERY, then Amazon Kendra uses the query history to base suggestions on. If you set to DOCUMENT_ATTRIBUTES, then Amazon Kendra uses the contents of document fields to base suggestions on.
      type: object
      properties:
        SuggestableConfigList:
          $ref: "#/components/schemas/SuggestableConfigList"
          description: The list of fields/attributes that you want to set as suggestible for query suggestions.
        AttributeSuggestionsMode:
          $ref: "#/components/schemas/AttributeSuggestionsMode"
          description: You can set the mode to ACTIVE or INACTIVE. You must also set SuggestionTypes as either QUERY or DOCUMENT_ATTRIBUTES and then call GetQuerySuggestions. If Mode to use query history is set to ENABLED when calling UpdateQuerySuggestionsConfig and AttributeSuggestionsMode to use fields/attributes is set to ACTIVE, and you haven't set your SuggestionTypes preference to DOCUMENT_ATTRIBUTES, then Amazon Kendra uses the query history.
