            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index you want to get query suggestions from.
                QueryText:
                  $ref: "#/components/schemas/SuggestionQueryText"
                  description: The text of a user's query to generate query suggestions. A query is suggested if the query prefix matches what a user starts to type as their query. Amazon Kendra does not show any suggestions if a user types fewer than two characters or more than 60 characters. A query must also have at least one search result and contain at least one word of more than four characters.
                MaxSuggestionsCount:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum number of query suggestions you want to show to your users.
                SuggestionTypes:
                  $ref: "#/components/schemas/SuggestionTypes"
                  description: The suggestions type to base query suggestions on. The suggestion types are query history or document fields/attributes. You can set one type or the other. If you set query history as your suggestions type, Amazon Kendra suggests queries relevant to your users based on popular queries in the query history. If you set document fields/attributes as your suggestions type, Amazon Kendra suggests queries relevant to your users based on the contents of document fields.
                AttributeSuggestionsConfig:
                  $ref: "#/components/schemas/AttributeSuggestionsGetConfig"
                  description: Configuration information for the document fields/attributes that you want to base query suggestions on.
              required:
                - IndexId
                - QueryText
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQuerySuggestionsResponse"
  /GetSnapshots:
    post:
      operationId: GetSnapshots
      description: Retrieves search metrics data. The data provides a snapshot of how your users interact with your search application and how effective the application is.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.GetSnapshots
            default: AWSKendraFrontendService.GetSnapshots
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index to get search metrics data.
                Interval:
                  $ref: "#/components/schemas/Interval"
                  description: "The time interval or time window to get search metrics data. The time interval uses the time zone of your index. You can view data in the following time windows: THIS_WEEK: The current week, starting on the Sunday and ending on the day before the current date. ONE_WEEK_AGO: The previous week, starting on the Sunday and ending on the following Saturday. TWO_WEEKS_AGO: The week before the previous week, starting on the Sunday and ending on the following Saturday. THIS_MONTH: The current month, starting on the first day of the month and ending on the day before the current date. ONE_MONTH_AGO: The previous month, starting on the first day of the month and ending on the last day of the month. TWO_MONTHS_AGO: The month before the previous month, starting on the first day of the month and ending on last day of the month."
                MetricType:
                  $ref: "#/components/schemas/MetricType"
                  description: The metric you want to retrieve. You can specify only one metric per call. For more information about the metrics you can view, see Gaining insights with search analytics.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: If the previous response was incomplete (because there is more data to retrieve), Amazon Kendra returns a pagination token in the response. You can use this pagination token to retrieve the next set of search metrics data.
                MaxResults:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum number of returned data for the metric.
              required:
                - IndexId
                - Interval
                - MetricType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSnapshotsResponse"
