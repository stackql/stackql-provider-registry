openapi: 3.0.0
info:
  version: "2019-02-03"
  title: AWSKendraFrontendService
  description: AWSKendraFrontendService
  x-serviceName: kendra
  x-serviceAlias: kendra
  x-protocol: json
  x-apiVersion: "2019-02-03"
  x-endpointPrefix: kendra
  x-targetPrefix: AWSKendraFrontendService
  x-jsonVersion: "1.1"
servers:
  - url: https://kendra.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for kendra
paths:
  /AssociateEntitiesToExperience:
    post:
      operationId: AssociateEntitiesToExperience
      description: Grants users or groups in your IAM Identity Center identity source access to your Amazon Kendra experience. You can create an Amazon Kendra experience such as a search application. For more information on creating a search application experience, see Building a search experience with no code.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.AssociateEntitiesToExperience
            default: AWSKendraFrontendService.AssociateEntitiesToExperience
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/ExperienceId"
                  description: The identifier of your Amazon Kendra experience.
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index for your Amazon Kendra experience.
                EntityList:
                  $ref: "#/components/schemas/AssociateEntityList"
                  description: Lists users or groups in your IAM Identity Center identity source.
              required:
                - IndexId
                - EntityList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateEntitiesToExperienceResponse"
  /AssociatePersonasToEntities:
    post:
      operationId: AssociatePersonasToEntities
      description: Defines the specific permissions of users or groups in your IAM Identity Center identity source with access to your Amazon Kendra experience. You can create an Amazon Kendra experience such as a search application. For more information on creating a search application experience, see Building a search experience with no code.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.AssociatePersonasToEntities
            default: AWSKendraFrontendService.AssociatePersonasToEntities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/ExperienceId"
                  description: The identifier of your Amazon Kendra experience.
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index for your Amazon Kendra experience.
                Personas:
                  $ref: "#/components/schemas/EntityPersonaConfigurationList"
                  description: The personas that define the specific permissions of users or groups in your IAM Identity Center identity source. The available personas or access roles are Owner and Viewer. For more information on these personas, see Providing access to your search page.
              required:
                - IndexId
                - Personas
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePersonasToEntitiesResponse"
  /BatchDeleteDocument:
    post:
      operationId: BatchDeleteDocument
      description: Removes one or more documents from an index. The documents must have been added with the BatchPutDocument API. The documents are deleted asynchronously. You can see the progress of the deletion by using Amazon Web Services CloudWatch. Any error messages related to the processing of the batch are sent to your Amazon Web Services CloudWatch log. You can also use the BatchGetDocumentStatus API to monitor the progress of deleting your documents. Deleting documents from an index using BatchDeleteDocument could take up to an hour or more, depending on the number of documents you want to delete.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.BatchDeleteDocument
            default: AWSKendraFrontendService.BatchDeleteDocument
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index that contains the documents to delete.
                DocumentIdList:
                  $ref: "#/components/schemas/DocumentIdList"
                  description: One or more identifiers for documents to delete from the index.
                DataSourceSyncJobMetricTarget:
                  $ref: "#/components/schemas/DataSourceSyncJobMetricTarget"
              required:
                - IndexId
                - DocumentIdList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteDocumentResponse"
  /BatchDeleteFeaturedResultsSet:
    post:
      operationId: BatchDeleteFeaturedResultsSet
      description: Removes one or more sets of featured results. Features results are placed above all other results for certain queries. If there's an exact match of a query, then one or more specific documents are featured in the search results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.BatchDeleteFeaturedResultsSet
            default: AWSKendraFrontendService.BatchDeleteFeaturedResultsSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index used for featuring results.
                FeaturedResultsSetIds:
                  $ref: "#/components/schemas/FeaturedResultsSetIdList"
                  description: The identifiers of the featured results sets that you want to delete.
              required:
                - IndexId
                - FeaturedResultsSetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteFeaturedResultsSetResponse"
  /BatchGetDocumentStatus:
    post:
      operationId: BatchGetDocumentStatus
      description: Returns the indexing status for one or more documents submitted with the BatchPutDocument API. When you use the BatchPutDocument API, documents are indexed asynchronously. You can use the BatchGetDocumentStatus API to get the current status of a list of documents so that you can determine if they have been successfully indexed. You can also use the BatchGetDocumentStatus API to check the status of the BatchDeleteDocument API. When a document is deleted from the index, Amazon Kendra returns NOT_FOUND as the status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.BatchGetDocumentStatus
            default: AWSKendraFrontendService.BatchGetDocumentStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index to add documents to. The index ID is returned by the CreateIndex API.
                DocumentInfoList:
                  $ref: "#/components/schemas/DocumentInfoList"
                  description: A list of DocumentInfo objects that identify the documents for which to get the status. You identify the documents by their document ID and optional attributes.
              required:
                - IndexId
                - DocumentInfoList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetDocumentStatusResponse"
  /BatchPutDocument:
    post:
      operationId: BatchPutDocument
      description: Adds one or more documents to an index. The BatchPutDocument API enables you to ingest inline documents or a set of documents stored in an Amazon S3 bucket. Use this API to ingest your text and unstructured text into an index, add custom attributes to the documents, and to attach an access control list to the documents added to the index. The documents are indexed asynchronously. You can see the progress of the batch using Amazon Web Services CloudWatch. Any error messages related to processing the batch are sent to your Amazon Web Services CloudWatch log. You can also use the BatchGetDocumentStatus API to monitor the progress of indexing your documents. For an example of ingesting inline documents using Python and Java SDKs, see Adding files directly to an index.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.BatchPutDocument
            default: AWSKendraFrontendService.BatchPutDocument
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index to add the documents to. You need to create the index first using the CreateIndex API.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role with permission to access your S3 bucket. For more information, see IAM access roles for Amazon Kendra.
                Documents:
                  $ref: "#/components/schemas/DocumentList"
                  description: One or more documents to add to the index. Documents have the following file size limits. 50 MB total size for any file 5 MB extracted text for any file For more information, see Quotas.
                CustomDocumentEnrichmentConfiguration:
                  $ref: "#/components/schemas/CustomDocumentEnrichmentConfiguration"
                  description: Configuration information for altering your document metadata and content during the document ingestion process when you use the BatchPutDocument API. For more information on how to create, modify and delete document metadata, or make other content alterations when you ingest documents into Amazon Kendra, see Customizing document metadata during the ingestion process.
              required:
                - IndexId
                - Documents
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutDocumentResponse"
  /ClearQuerySuggestions:
    post:
      operationId: ClearQuerySuggestions
      description: Clears existing query suggestions from an index. This deletes existing suggestions only, not the queries in the query log. After you clear suggestions, Amazon Kendra learns new suggestions based on new queries added to the query log from the time you cleared suggestions. If you do not see any new suggestions, then please allow Amazon Kendra to collect enough queries to learn new suggestions. ClearQuerySuggestions is currently not supported in the Amazon Web Services GovCloud (US-West) region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.ClearQuerySuggestions
            default: AWSKendraFrontendService.ClearQuerySuggestions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index you want to clear query suggestions from.
              required:
                - IndexId
      responses:
        "200":
          description: Success
  /CreateAccessControlConfiguration:
    post:
      operationId: CreateAccessControlConfiguration
      description: Creates an access configuration for your documents. This includes user and group access information for your documents. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents. You can use this to re-configure your existing document level access control without indexing all of your documents again. For example, your index contains top-secret company documents that only certain employees or users should access. One of these users leaves the company or switches to a team that should be blocked from accessing top-secret documents. The user still has access to top-secret documents because the user had access when your documents were previously indexed. You can create a specific access control configuration for the user with deny access. You can later update the access control configuration to allow access if the user returns to the company and re-joins the 'top-secret' team. You can re-configure access control for your documents as circumstances change. To apply your access control configuration to certain documents, you call the BatchPutDocument API with the AccessControlConfigurationId included in the Document object. If you use an S3 bucket as a data source, you update the .metadata.json with the AccessControlConfigurationId and synchronize your data source. Amazon Kendra currently only supports access control configuration for S3 data sources and documents indexed using the BatchPutDocument API. You can't configure access control using CreateAccessControlConfiguration for an Amazon Kendra Gen AI Enterprise Edition index. Amazon Kendra will return a ValidationException error for a Gen_AI_ENTERPRISE_EDITION index.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.CreateAccessControlConfiguration
            default: AWSKendraFrontendService.CreateAccessControlConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index to create an access control configuration for your documents.
                Name:
                  $ref: "#/components/schemas/AccessControlConfigurationName"
                  description: A name for the access control configuration.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description for the access control configuration.
                AccessControlList:
                  $ref: "#/components/schemas/PrincipalList"
                  description: Information on principals (users and/or groups) and which documents they should have access to. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents.
                HierarchicalAccessControlList:
                  $ref: "#/components/schemas/HierarchicalPrincipalList"
                  description: The list of principal lists that define the hierarchy for which documents users should have access to.
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenName"
                  description: A token that you provide to identify the request to create an access control configuration. Multiple calls to the CreateAccessControlConfiguration API with the same client token will create only one access control configuration.
              required:
                - IndexId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessControlConfigurationResponse"
  /CreateDataSource:
    post:
      operationId: CreateDataSource
      description: Creates a data source connector that you want to use with an Amazon Kendra index. You specify a name, data source connector type and description for your data source. You also specify configuration information for the data source connector. CreateDataSource is a synchronous operation. The operation returns 200 if the data source was successfully created. Otherwise, an exception is raised. For an example of creating an index and data source using the Python SDK, see Getting started with Python SDK. For an example of creating an index and data source using the Java SDK, see Getting started with Java SDK.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.CreateDataSource
            default: AWSKendraFrontendService.CreateDataSource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DataSourceName"
                  description: A name for the data source connector.
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index you want to use with the data source connector.
                Type:
                  $ref: "#/components/schemas/DataSourceType"
                  description: The type of data source repository. For example, SHAREPOINT.
                Configuration:
                  $ref: "#/components/schemas/DataSourceConfiguration"
                  description: Configuration information to connect to your data source repository. You can't specify the Configuration parameter when the Type parameter is set to CUSTOM. If you do, you receive a ValidationException exception. The Configuration parameter is required for all other data sources.
                VpcConfiguration:
                  $ref: "#/components/schemas/DataSourceVpcConfiguration"
                  description: Configuration information for an Amazon Virtual Private Cloud to connect to your data source. For more information, see Configuring a VPC.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description for the data source connector.
                Schedule:
                  $ref: "#/components/schemas/ScanSchedule"
                  description: Sets the frequency for Amazon Kendra to check the documents in your data source repository and update the index. If you don't set a schedule Amazon Kendra will not periodically update the index. You can call the StartDataSourceSyncJob API to update the index. Specify a cron- format schedule string or an empty string to indicate that the index is updated on demand. You can't specify the Schedule parameter when the Type parameter is set to CUSTOM. If you do, you receive a ValidationException exception.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role with permission to access the data source and required resources. For more information, see IAM access roles for Amazon Kendra.. You can't specify the RoleArn parameter when the Type parameter is set to CUSTOM. If you do, you receive a ValidationException exception. The RoleArn parameter is required for all other data sources.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "A list of key-value pairs that identify or categorize the data source connector. You can also use tags to help control access to the data source connector. Tag keys and values can consist of Unicode letters, digits, white space, and any of the following symbols: _ . : / = + - @."
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenName"
                  description: A token that you provide to identify the request to create a data source connector. Multiple calls to the CreateDataSource API with the same client token will create only one data source connector.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The code for a language. This allows you to support a language for all documents when creating the data source connector. English is supported by default. For more information on supported languages, including their codes, see Adding documents in languages other than English.
                CustomDocumentEnrichmentConfiguration:
                  $ref: "#/components/schemas/CustomDocumentEnrichmentConfiguration"
                  description: Configuration information for altering document metadata and content during the document ingestion process. For more information on how to create, modify and delete document metadata, or make other content alterations when you ingest documents into Amazon Kendra, see Customizing document metadata during the ingestion process.
              required:
                - IndexId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataSourceResponse"
  /CreateExperience:
    post:
      operationId: CreateExperience
      description: Creates an Amazon Kendra experience such as a search application. For more information on creating a search application experience, including using the Python and Java SDKs, see Building a search experience with no code.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.CreateExperience
            default: AWSKendraFrontendService.CreateExperience
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ExperienceName"
                  description: A name for your Amazon Kendra experience.
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index for your Amazon Kendra experience.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role with permission to access Query API, GetQuerySuggestions API, and other required APIs. The role also must include permission to access IAM Identity Center that stores your user and group information. For more information, see IAM access roles for Amazon Kendra.
                Configuration:
                  $ref: "#/components/schemas/ExperienceConfiguration"
                  description: Configuration information for your Amazon Kendra experience. This includes ContentSourceConfiguration, which specifies the data source IDs and/or FAQ IDs, and UserIdentityConfiguration, which specifies the user or group information to grant access to your Amazon Kendra experience.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description for your Amazon Kendra experience.
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenName"
                  description: A token that you provide to identify the request to create your Amazon Kendra experience. Multiple calls to the CreateExperience API with the same client token creates only one Amazon Kendra experience.
              required:
                - IndexId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateExperienceResponse"
  /CreateFaq:
    post:
      operationId: CreateFaq
      description: Creates a set of frequently ask questions (FAQs) using a specified FAQ file stored in an Amazon S3 bucket. Adding FAQs to an index is an asynchronous operation. For an example of adding an FAQ to an index using Python and Java SDKs, see Using your FAQ file.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.CreateFaq
            default: AWSKendraFrontendService.CreateFaq
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index for the FAQ.
                Name:
                  $ref: "#/components/schemas/FaqName"
                  description: A name for the FAQ.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description for the FAQ.
                S3Path:
                  $ref: "#/components/schemas/S3Path"
                  description: The path to the FAQ file in S3.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role with permission to access the S3 bucket that contains the FAQ file. For more information, see IAM access roles for Amazon Kendra.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of key-value pairs that identify the FAQ. You can use the tags to identify and organize your resources and to control access to resources.
                FileFormat:
                  $ref: "#/components/schemas/FaqFileFormat"
                  description: The format of the FAQ input file. You can choose between a basic CSV format, a CSV format that includes customs attributes in a header, and a JSON format that includes custom attributes. The default format is CSV. The format must match the format of the file stored in the S3 bucket identified in the S3Path parameter. For more information, see Adding questions and answers.
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenName"
                  description: A token that you provide to identify the request to create a FAQ. Multiple calls to the CreateFaqRequest API with the same client token will create only one FAQ.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The code for a language. This allows you to support a language for the FAQ document. English is supported by default. For more information on supported languages, including their codes, see Adding documents in languages other than English.
              required:
                - IndexId
                - S3Path
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFaqResponse"
  /CreateFeaturedResultsSet:
    post:
      operationId: CreateFeaturedResultsSet
      description: Creates a set of featured results to display at the top of the search results page. Featured results are placed above all other results for certain queries. You map specific queries to specific documents for featuring in the results. If a query contains an exact match, then one or more specific documents are featured in the search results. You can create up to 50 sets of featured results per index. You can request to increase this limit by contacting Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.CreateFeaturedResultsSet
            default: AWSKendraFrontendService.CreateFeaturedResultsSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index that you want to use for featuring results.
                FeaturedResultsSetName:
                  $ref: "#/components/schemas/FeaturedResultsSetName"
                  description: A name for the set of featured results.
                Description:
                  $ref: "#/components/schemas/FeaturedResultsSetDescription"
                  description: A description for the set of featured results.
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenName"
                  description: A token that you provide to identify the request to create a set of featured results. Multiple calls to the CreateFeaturedResultsSet API with the same client token will create only one featured results set.
                Status:
                  $ref: "#/components/schemas/FeaturedResultsSetStatus"
                  description: The current status of the set of featured results. When the value is ACTIVE, featured results are ready for use. You can still configure your settings before setting the status to ACTIVE. You can set the status to ACTIVE or INACTIVE using the UpdateFeaturedResultsSet API. The queries you specify for featured results must be unique per featured results set for each index, whether the status is ACTIVE or INACTIVE.
                QueryTexts:
                  $ref: "#/components/schemas/QueryTextList"
                  description: A list of queries for featuring results. For more information on the list of queries, see FeaturedResultsSet.
                FeaturedDocuments:
                  $ref: "#/components/schemas/FeaturedDocumentList"
                  description: A list of document IDs for the documents you want to feature at the top of the search results page. For more information on the list of documents, see FeaturedResultsSet.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "A list of key-value pairs that identify or categorize the featured results set. You can also use tags to help control access to the featured results set. Tag keys and values can consist of Unicode letters, digits, white space, and any of the following symbols:_ . : / = + - @."
              required:
                - IndexId
                - FeaturedResultsSetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFeaturedResultsSetResponse"
  /CreateIndex:
    post:
      operationId: CreateIndex
      description: Creates an Amazon Kendra index. Index creation is an asynchronous API. To determine if index creation has completed, check the Status field returned from a call to DescribeIndex. The Status field is set to ACTIVE when the index is ready to use. Once the index is active, you can index your documents using the BatchPutDocument API or using one of the supported data sources. For an example of creating an index and data source using the Python SDK, see Getting started with Python SDK. For an example of creating an index and data source using the Java SDK, see Getting started with Java SDK.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.CreateIndex
            default: AWSKendraFrontendService.CreateIndex
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/IndexName"
                  description: A name for the index.
                Edition:
                  $ref: "#/components/schemas/IndexEdition"
                  description: The Amazon Kendra edition to use for the index. Choose DEVELOPER_EDITION for indexes intended for development, testing, or proof of concept. Use ENTERPRISE_EDITION for production. Use GEN_AI_ENTERPRISE_EDITION for creating generative AI applications. Once you set the edition for an index, it can't be changed. The Edition parameter is optional. If you don't supply a value, the default is ENTERPRISE_EDITION. For more information on quota limits for Gen AI Enterprise Edition, Enterprise Edition, and Developer Edition indices, see Quotas.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role with permission to access your Amazon CloudWatch logs and metrics. For more information, see IAM access roles for Amazon Kendra.
                ServerSideEncryptionConfiguration:
                  $ref: "#/components/schemas/ServerSideEncryptionConfiguration"
                  description: The identifier of the KMS customer managed key (CMK) that's used to encrypt data indexed by Amazon Kendra. Amazon Kendra doesn't support asymmetric CMKs.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description for the index.
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenName"
