          description: The execution status of the synchronization job. When the Status field is set to SUCCEEDED, the synchronization job is done. If the status code is set to FAILED, the ErrorCode and ErrorMessage fields give you the reason for the failure.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
