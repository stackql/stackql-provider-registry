    post:
      operationId: PutPrincipalMapping
      description: Maps users to their groups so that you only need to provide the user ID when you issue the query. You can also map sub groups to groups. For example, the group "Company Intellectual Property Teams" includes sub groups "Research" and "Engineering". These sub groups include their own list of users or people who work in these teams. Only users who work in research and engineering, and therefore belong in the intellectual property group, can see top-secret company documents in their search results. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents. For more information, see Filtering on user context. If more than five PUT actions for a group are currently processing, a validation exception is thrown.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.PutPrincipalMapping
            default: AWSKendraFrontendService.PutPrincipalMapping
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index you want to map users to their groups.
                DataSourceId:
                  $ref: "#/components/schemas/DataSourceId"
                  description: The identifier of the data source you want to map users to their groups. This is useful if a group is tied to multiple data sources, but you only want the group to access documents of a certain data source. For example, the groups "Research", "Engineering", and "Sales and Marketing" are all tied to the company's documents stored in the data sources Confluence and Salesforce. However, "Sales and Marketing" team only needs access to customer-related documents stored in Salesforce.
                GroupId:
                  $ref: "#/components/schemas/GroupId"
                  description: The identifier of the group you want to map its users to.
                GroupMembers:
                  $ref: "#/components/schemas/GroupMembers"
                  description: The list that contains your users that belong the same group. This can include sub groups that belong to a group. For example, the group "Company A" includes the user "CEO" and the sub groups "Research", "Engineering", and "Sales and Marketing". If you have more than 1000 users and/or sub groups for a single group, you need to provide the path to the S3 file that lists your users and sub groups for a group. Your sub groups can contain more than 1000 users, but the list of sub groups that belong to a group (and/or users) must be no more than 1000.
                OrderingId:
                  $ref: "#/components/schemas/PrincipalOrderingId"
                  description: The timestamp identifier you specify to ensure Amazon Kendra doesn't override the latest PUT action with previous actions. The highest number ID, which is the ordering ID, is the latest action you want to process and apply on top of other actions with lower number IDs. This prevents previous actions with lower number IDs from possibly overriding the latest action. The ordering ID can be the Unix time of the last update you made to a group members list. You would then provide this list when calling PutPrincipalMapping. This ensures your PUT action for that updated group with the latest members list doesn't get overwritten by earlier PUT actions for the same group which are yet to be processed. The default ordering ID is the current Unix time in milliseconds that the action was received by Amazon Kendra.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role that has access to the S3 file that contains your list of users that belong to a group. For more information, see IAM roles for Amazon Kendra.
              required:
                - IndexId
                - GroupId
                - GroupMembers
      responses:
        "200":
          description: Success
  /Query:
    post:
      operationId: Query
      description: Searches an index given an input query. If you are working with large language models (LLMs) or implementing retrieval augmented generation (RAG) systems, you can use Amazon Kendra's Retrieve API, which can return longer semantically relevant passages. We recommend using the Retrieve API instead of filing a service limit increase to increase the Query API document excerpt length. You can configure boosting or relevance tuning at the query level to override boosting at the index level, filter based on document fields/attributes and faceted search, and filter based on the user or their group access to documents. You can also include certain fields in the response that might provide useful additional information. A query response contains three types of results. Relevant suggested answers. The answers can be either a text excerpt or table excerpt. The answer can be highlighted in the excerpt. Matching FAQs or questions-answer from your FAQ file. Relevant documents. This result type includes an excerpt of the document with the document title. The searched terms can be highlighted in the excerpt. You can specify that the query return only one type of result using the QueryResultTypeFilter parameter. Each query returns the 100 most relevant results. If you filter result type to only question-answers, a maximum of four results are returned. If you filter result type to only answers, a maximum of three results are returned. If you're using an Amazon Kendra Gen AI Enterprise Edition index, you can only use ATTRIBUTE_FILTER to filter search results by user context. If you're using an Amazon Kendra Gen AI Enterprise Edition index and you try to use USER_TOKEN to configure user context policy, Amazon Kendra returns a ValidationException error.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.Query
            default: AWSKendraFrontendService.Query
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index for the search.
                QueryText:
                  $ref: "#/components/schemas/QueryText"
                  description: "The input query text for the search. Amazon Kendra truncates queries at 30 token words, which excludes punctuation and stop words. Truncation still applies if you use Boolean or more advanced, complex queries. For example, Timeoff AND October AND Category:HR is counted as 3 tokens: timeoff, october, hr. For more information, see Searching with advanced query syntax in the Amazon Kendra Developer Guide."
                AttributeFilter:
                  $ref: "#/components/schemas/AttributeFilter"
                  description: Filters search results by document fields/attributes. You can only provide one attribute filter; however, the AndAllFilters, NotFilter, and OrAllFilters parameters contain a list of other filters. The AttributeFilter parameter means you can create a set of filtering rules that a document must satisfy to be included in the query results. For Amazon Kendra Gen AI Enterprise Edition indices use AttributeFilter to enable document filtering for end users using _email_id or include public documents (_email_id=null).
                Facets:
                  $ref: "#/components/schemas/FacetList"
                  description: An array of documents fields/attributes for faceted search. Amazon Kendra returns a count for each field key specified. This helps your users narrow their search.
                RequestedDocumentAttributes:
                  $ref: "#/components/schemas/DocumentAttributeKeyList"
                  description: An array of document fields/attributes to include in the response. You can limit the response to include certain document fields. By default, all document attributes are included in the response.
                QueryResultTypeFilter:
                  $ref: "#/components/schemas/QueryResultType"
                  description: Sets the type of query result or response. Only results for the specified type are returned.
                DocumentRelevanceOverrideConfigurations:
                  $ref: "#/components/schemas/DocumentRelevanceOverrideConfigurationList"
                  description: Overrides relevance tuning configurations of fields/attributes set at the index level. If you use this API to override the relevance tuning configured at the index level, but there is no relevance tuning configured at the index level, then Amazon Kendra does not apply any relevance tuning. If there is relevance tuning configured for fields at the index level, and you use this API to override only some of these fields, then for the fields you did not override, the importance is set to 1.
                PageNumber:
                  $ref: "#/components/schemas/Integer"
                  description: Query results are returned in pages the size of the PageSize parameter. By default, Amazon Kendra returns the first page of results. Use this parameter to get result pages after the first one.
                PageSize:
                  $ref: "#/components/schemas/Integer"
                  description: Sets the number of results that are returned in each page of results. The default page size is 10. The maximum number of results returned is 100. If you ask for more than 100 results, only 100 are returned.
                SortingConfiguration:
                  $ref: "#/components/schemas/SortingConfiguration"
                  description: Provides information that determines how the results of the query are sorted. You can set the field that Amazon Kendra should sort the results on, and specify whether the results should be sorted in ascending or descending order. In the case of ties in sorting the results, the results are sorted by relevance. If you don't provide sorting configuration, the results are sorted by the relevance that Amazon Kendra determines for the result.
                SortingConfigurations:
                  $ref: "#/components/schemas/SortingConfigurationList"
                  description: Provides configuration information to determine how the results of a query are sorted. You can set upto 3 fields that Amazon Kendra should sort the results on, and specify whether the results should be sorted in ascending or descending order. The sort field quota can be increased. If you don't provide a sorting configuration, the results are sorted by the relevance that Amazon Kendra determines for the result. In the case of ties in sorting the results, the results are sorted by relevance.
                UserContext:
                  $ref: "#/components/schemas/UserContext"
                  description: The user context token or user and group information.
                VisitorId:
                  $ref: "#/components/schemas/VisitorId"
                  description: Provides an identifier for a specific user. The VisitorId should be a unique identifier, such as a GUID. Don't use personally identifiable information, such as the user's email address, as the VisitorId.
                SpellCorrectionConfiguration:
                  $ref: "#/components/schemas/SpellCorrectionConfiguration"
                  description: Enables suggested spell corrections for queries.
                CollapseConfiguration:
                  $ref: "#/components/schemas/CollapseConfiguration"
                  description: Provides configuration to determine how to group results by document attribute value, and how to display them (collapsed or expanded) under a designated primary document for each group.
              required:
                - IndexId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResult"
  /Retrieve:
    post:
      operationId: Retrieve
      description: "Retrieves relevant passages or text excerpts given an input query. This API is similar to the Query API. However, by default, the Query API only returns excerpt passages of up to 100 token words. With the Retrieve API, you can retrieve longer passages of up to 200 token words and up to 100 semantically relevant passages. This doesn't include question-answer or FAQ type responses from your index. The passages are text excerpts that can be semantically extracted from multiple documents and multiple parts of the same document. If in extreme cases your documents produce zero passages using the Retrieve API, you can alternatively use the Query API and its types of responses. You can also do the following: Override boosting at the index level Filter based on document fields or attributes Filter based on the user or their group access to documents View the confidence score bucket for a retrieved passage result. The confidence bucket provides a relative ranking that indicates how confident Amazon Kendra is that the response is relevant to the query. Confidence score buckets are currently available only for English. You can also include certain fields in the response that might provide useful additional information. The Retrieve API shares the number of query capacity units that you set for your index. For more information on what's included in a single capacity unit and the default base capacity for an index, see Adjusting capacity. If you're using an Amazon Kendra Gen AI Enterprise Edition index, you can only use ATTRIBUTE_FILTER to filter search results by user context. If you're using an Amazon Kendra Gen AI Enterprise Edition index and you try to use USER_TOKEN to configure user context policy, Amazon Kendra returns a ValidationException error."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.Retrieve
            default: AWSKendraFrontendService.Retrieve
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index to retrieve relevant passages for the search.
                QueryText:
                  $ref: "#/components/schemas/QueryText"
                  description: "The input query text to retrieve relevant passages for the search. Amazon Kendra truncates queries at 30 token words, which excludes punctuation and stop words. Truncation still applies if you use Boolean or more advanced, complex queries. For example, Timeoff AND October AND Category:HR is counted as 3 tokens: timeoff, october, hr. For more information, see Searching with advanced query syntax in the Amazon Kendra Developer Guide."
                AttributeFilter:
                  $ref: "#/components/schemas/AttributeFilter"
                  description: Filters search results by document fields/attributes. You can only provide one attribute filter; however, the AndAllFilters, NotFilter, and OrAllFilters parameters contain a list of other filters. The AttributeFilter parameter means you can create a set of filtering rules that a document must satisfy to be included in the query results. For Amazon Kendra Gen AI Enterprise Edition indices use AttributeFilter to enable document filtering for end users using _email_id or include public documents (_email_id=null).
                RequestedDocumentAttributes:
                  $ref: "#/components/schemas/DocumentAttributeKeyList"
                  description: A list of document fields/attributes to include in the response. You can limit the response to include certain document fields. By default, all document fields are included in the response.
                DocumentRelevanceOverrideConfigurations:
                  $ref: "#/components/schemas/DocumentRelevanceOverrideConfigurationList"
                  description: Overrides relevance tuning configurations of fields/attributes set at the index level. If you use this API to override the relevance tuning configured at the index level, but there is no relevance tuning configured at the index level, then Amazon Kendra does not apply any relevance tuning. If there is relevance tuning configured for fields at the index level, and you use this API to override only some of these fields, then for the fields you did not override, the importance is set to 1.
                PageNumber:
                  $ref: "#/components/schemas/Integer"
                  description: Retrieved relevant passages are returned in pages the size of the PageSize parameter. By default, Amazon Kendra returns the first page of results. Use this parameter to get result pages after the first one.
                PageSize:
                  $ref: "#/components/schemas/Integer"
                  description: Sets the number of retrieved relevant passages that are returned in each page of results. The default page size is 10. The maximum number of results returned is 100. If you ask for more than 100 results, only 100 are returned.
                UserContext:
                  $ref: "#/components/schemas/UserContext"
                  description: The user context token or user and group information.
              required:
                - IndexId
                - QueryText
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveResult"
  /StartDataSourceSyncJob:
    post:
      operationId: StartDataSourceSyncJob
      description: Starts a synchronization job for a data source connector. If a synchronization job is already in progress, Amazon Kendra returns a ResourceInUseException exception. Re-syncing your data source with your index after modifying, adding, or deleting documents from your data source respository could take up to an hour or more, depending on the number of documents to sync.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.StartDataSourceSyncJob
            default: AWSKendraFrontendService.StartDataSourceSyncJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/DataSourceId"
                  description: The identifier of the data source connector to synchronize.
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index used with the data source connector.
              required:
                - IndexId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDataSourceSyncJobResponse"
  /StopDataSourceSyncJob:
    post:
      operationId: StopDataSourceSyncJob
      description: Stops a synchronization job that is currently running. You can't stop a scheduled synchronization job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.StopDataSourceSyncJob
            default: AWSKendraFrontendService.StopDataSourceSyncJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/DataSourceId"
                  description: The identifier of the data source connector for which to stop the synchronization jobs.
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index used with the data source connector.
              required:
                - IndexId
      responses:
        "200":
          description: Success
  /SubmitFeedback:
    post:
      operationId: SubmitFeedback
      description: Enables you to provide feedback to Amazon Kendra to improve the performance of your index. SubmitFeedback is currently not supported in the Amazon Web Services GovCloud (US-West) region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.SubmitFeedback
            default: AWSKendraFrontendService.SubmitFeedback
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index that was queried.
                QueryId:
                  $ref: "#/components/schemas/QueryId"
                  description: The identifier of the specific query for which you are submitting feedback. The query ID is returned in the response to the Query API.
                ClickFeedbackItems:
                  $ref: "#/components/schemas/ClickFeedbackList"
                  description: Tells Amazon Kendra that a particular search result link was chosen by the user.
                RelevanceFeedbackItems:
                  $ref: "#/components/schemas/RelevanceFeedbackList"
                  description: Provides Amazon Kendra with relevant or not relevant feedback for whether a particular item was relevant to the search.
              required:
                - IndexId
                - QueryId
      responses:
        "200":
          description: Success
  /TagResource:
    post:
      operationId: TagResource
      description: Adds the specified tag to the specified index, FAQ, data source, or other resource. If the tag already exists, the existing value is replaced with the new value.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.TagResource
            default: AWSKendraFrontendService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: "The Amazon Resource Name (ARN) of the index, FAQ, data source, or other resource to add a tag. For example, the ARN of an index is constructed as follows: arn:aws:kendra:your-region:your-account-id:index/index-id For information on how to construct an ARN for all types of Amazon Kendra resources, see Resource types."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tag keys to add to the index, FAQ, data source, or other resource. If a tag already exists, the existing value is replaced with the new value.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes a tag from an index, FAQ, data source, or other resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.UntagResource
            default: AWSKendraFrontendService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: "The Amazon Resource Name (ARN) of the index, FAQ, data source, or other resource to remove a tag. For example, the ARN of an index is constructed as follows: arn:aws:kendra:your-region:your-account-id:index/index-id For information on how to construct an ARN for all types of Amazon Kendra resources, see Resource types."
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of tag keys to remove from the index, FAQ, data source, or other resource. If a tag key doesn't exist for the resource, it is ignored.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateAccessControlConfiguration:
    post:
      operationId: UpdateAccessControlConfiguration
      description: Updates an access control configuration for your documents in an index. This includes user and group access information for your documents. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents. You can update an access control configuration you created without indexing all of your documents again. For example, your index contains top-secret company documents that only certain employees or users should access. You created an 'allow' access control configuration for one user who recently joined the 'top-secret' team, switching from a team with 'deny' access to top-secret documents. However, the user suddenly returns to their previous team and should no longer have access to top secret documents. You can update the access control configuration to re-configure access control for your documents as circumstances change. You call the BatchPutDocument API to apply the updated access control configuration, with the AccessControlConfigurationId included in the Document object. If you use an S3 bucket as a data source, you synchronize your data source to apply the AccessControlConfigurationId in the .metadata.json file. Amazon Kendra currently only supports access control configuration for S3 data sources and documents indexed using the BatchPutDocument API. You can't configure access control using CreateAccessControlConfiguration for an Amazon Kendra Gen AI Enterprise Edition index. Amazon Kendra will return a ValidationException error for a Gen_AI_ENTERPRISE_EDITION index.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.UpdateAccessControlConfiguration
            default: AWSKendraFrontendService.UpdateAccessControlConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index for an access control configuration.
                Id:
                  $ref: "#/components/schemas/AccessControlConfigurationId"
                  description: The identifier of the access control configuration you want to update.
                Name:
                  $ref: "#/components/schemas/AccessControlConfigurationName"
                  description: A new name for the access control configuration.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A new description for the access control configuration.
                AccessControlList:
                  $ref: "#/components/schemas/PrincipalList"
                  description: Information you want to update on principals (users and/or groups) and which documents they should have access to. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents.
                HierarchicalAccessControlList:
                  $ref: "#/components/schemas/HierarchicalPrincipalList"
                  description: The updated list of principal lists that define the hierarchy for which documents users should have access to.
              required:
                - IndexId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccessControlConfigurationResponse"
  /UpdateDataSource:
    post:
      operationId: UpdateDataSource
      description: Updates an Amazon Kendra data source connector.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.UpdateDataSource
            default: AWSKendraFrontendService.UpdateDataSource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/DataSourceId"
                  description: The identifier of the data source connector you want to update.
                Name:
                  $ref: "#/components/schemas/DataSourceName"
                  description: A new name for the data source connector.
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index used with the data source connector.
                Configuration:
                  $ref: "#/components/schemas/DataSourceConfiguration"
                  description: Configuration information you want to update for the data source connector.
                VpcConfiguration:
                  $ref: "#/components/schemas/DataSourceVpcConfiguration"
                  description: Configuration information for an Amazon Virtual Private Cloud to connect to your data source. For more information, see Configuring a VPC.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A new description for the data source connector.
                Schedule:
                  $ref: "#/components/schemas/ScanSchedule"
                  description: The sync schedule you want to update for the data source connector.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role with permission to access the data source and required resources. For more information, see IAM roles for Amazon Kendra.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The code for a language you want to update for the data source connector. This allows you to support a language for all documents when updating the data source. English is supported by default. For more information on supported languages, including their codes, see Adding documents in languages other than English.
                CustomDocumentEnrichmentConfiguration:
                  $ref: "#/components/schemas/CustomDocumentEnrichmentConfiguration"
                  description: Configuration information you want to update for altering document metadata and content during the document ingestion process. For more information on how to create, modify and delete document metadata, or make other content alterations when you ingest documents into Amazon Kendra, see Customizing document metadata during the ingestion process.
              required:
                - IndexId
      responses:
        "200":
          description: Success
  /UpdateExperience:
    post:
      operationId: UpdateExperience
      description: Updates your Amazon Kendra experience such as a search application. For more information on creating a search application experience, see Building a search experience with no code.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.UpdateExperience
            default: AWSKendraFrontendService.UpdateExperience
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/ExperienceId"
                  description: The identifier of your Amazon Kendra experience you want to update.
                Name:
                  $ref: "#/components/schemas/ExperienceName"
                  description: A new name for your Amazon Kendra experience.
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index for your Amazon Kendra experience.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role with permission to access the Query API, QuerySuggestions API, SubmitFeedback API, and IAM Identity Center that stores your users and groups information. For more information, see IAM roles for Amazon Kendra.
                Configuration:
                  $ref: "#/components/schemas/ExperienceConfiguration"
                  description: Configuration information you want to update for your Amazon Kendra experience.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A new description for your Amazon Kendra experience.
              required:
                - IndexId
      responses:
        "200":
          description: Success
  /UpdateFeaturedResultsSet:
    post:
      operationId: UpdateFeaturedResultsSet
      description: Updates a set of featured results. Features results are placed above all other results for certain queries. You map specific queries to specific documents for featuring in the results. If a query contains an exact match of a query, then one or more specific documents are featured in the search results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.UpdateFeaturedResultsSet
            default: AWSKendraFrontendService.UpdateFeaturedResultsSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index used for featuring results.
                FeaturedResultsSetId:
                  $ref: "#/components/schemas/FeaturedResultsSetId"
                  description: The identifier of the set of featured results that you want to update.
                FeaturedResultsSetName:
                  $ref: "#/components/schemas/FeaturedResultsSetName"
                  description: A new name for the set of featured results.
                Description:
                  $ref: "#/components/schemas/FeaturedResultsSetDescription"
                  description: A new description for the set of featured results.
                Status:
                  $ref: "#/components/schemas/FeaturedResultsSetStatus"
                  description: You can set the status to ACTIVE or INACTIVE. When the value is ACTIVE, featured results are ready for use. You can still configure your settings before setting the status to ACTIVE. The queries you specify for featured results must be unique per featured results set for each index, whether the status is ACTIVE or INACTIVE.
                QueryTexts:
                  $ref: "#/components/schemas/QueryTextList"
                  description: A list of queries for featuring results. For more information on the list of queries, see FeaturedResultsSet.
                FeaturedDocuments:
                  $ref: "#/components/schemas/FeaturedDocumentList"
                  description: A list of document IDs for the documents you want to feature at the top of the search results page. For more information on the list of featured documents, see FeaturedResultsSet.
              required:
                - IndexId
                - FeaturedResultsSetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFeaturedResultsSetResponse"
  /UpdateIndex:
    post:
      operationId: UpdateIndex
      description: Updates an Amazon Kendra index.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.UpdateIndex
            default: AWSKendraFrontendService.UpdateIndex
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index you want to update.
                Name:
                  $ref: "#/components/schemas/IndexName"
                  description: A new name for the index.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: An Identity and Access Management (IAM) role that gives Amazon Kendra permission to access Amazon CloudWatch logs and metrics.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A new description for the index.
                DocumentMetadataConfigurationUpdates:
                  $ref: "#/components/schemas/DocumentMetadataConfigurationList"
                  description: The document metadata configuration you want to update for the index. Document metadata are fields or attributes associated with your documents. For example, the company department name associated with each document.
                CapacityUnits:
                  $ref: "#/components/schemas/CapacityUnitsConfiguration"
                  description: Sets the number of additional document storage and query capacity units that should be used by the index. You can change the capacity of the index up to 5 times per day, or make 5 API calls. If you are using extra storage units, you can't reduce the storage capacity below what is required to meet the storage needs for your index.
                UserTokenConfigurations:
                  $ref: "#/components/schemas/UserTokenConfigurationList"
                  description: The user token configuration. If you're using an Amazon Kendra Gen AI Enterprise Edition index and you try to use UserTokenConfigurations to configure user context policy, Amazon Kendra returns a ValidationException error.
                UserContextPolicy:
                  $ref: "#/components/schemas/UserContextPolicy"
                  description: The user context policy. If you're using an Amazon Kendra Gen AI Enterprise Edition index, you can only use ATTRIBUTE_FILTER to filter search results by user context. If you're using an Amazon Kendra Gen AI Enterprise Edition index and you try to use USER_TOKEN to configure user context policy, Amazon Kendra returns a ValidationException error.
                UserGroupResolutionConfiguration:
                  $ref: "#/components/schemas/UserGroupResolutionConfiguration"
                  description: Gets users and groups from IAM Identity Center identity source. To configure this, see UserGroupResolutionConfiguration. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents. If you're using an Amazon Kendra Gen AI Enterprise Edition index, UserGroupResolutionConfiguration isn't supported.
      responses:
        "200":
          description: Success
  /UpdateQuerySuggestionsBlockList:
    post:
      operationId: UpdateQuerySuggestionsBlockList
      description: Updates a block list used for query suggestions for an index. Updates to a block list might not take effect right away. Amazon Kendra needs to refresh the entire suggestions list to apply any updates to the block list. Other changes not related to the block list apply immediately. If a block list is updating, then you need to wait for the first update to finish before submitting another update. Amazon Kendra supports partial updates, so you only need to provide the fields you want to update. UpdateQuerySuggestionsBlockList is currently not supported in the Amazon Web Services GovCloud (US-West) region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.UpdateQuerySuggestionsBlockList
            default: AWSKendraFrontendService.UpdateQuerySuggestionsBlockList
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index for the block list.
                Id:
                  $ref: "#/components/schemas/QuerySuggestionsBlockListId"
                  description: The identifier of the block list you want to update.
                Name:
                  $ref: "#/components/schemas/QuerySuggestionsBlockListName"
                  description: A new name for the block list.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A new description for the block list.
                SourceS3Path:
                  $ref: "#/components/schemas/S3Path"
                  description: The S3 path where your block list text file sits in S3. If you update your block list and provide the same path to the block list text file in S3, then Amazon Kendra reloads the file to refresh the block list. Amazon Kendra does not automatically refresh your block list. You need to call the UpdateQuerySuggestionsBlockList API to refresh you block list. If you update your block list, then Amazon Kendra asynchronously refreshes all query suggestions with the latest content in the S3 file. This means changes might not take effect immediately.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The IAM (Identity and Access Management) role used to access the block list text file in S3.
              required:
                - IndexId
      responses:
        "200":
          description: Success
  /UpdateQuerySuggestionsConfig:
    post:
      operationId: UpdateQuerySuggestionsConfig
      description: Updates the settings of query suggestions for an index. Amazon Kendra supports partial updates, so you only need to provide the fields you want to update. If an update is currently processing, you need to wait for the update to finish before making another update. Updates to query suggestions settings might not take effect right away. The time for your updated settings to take effect depends on the updates made and the number of search queries in your index. You can still enable/disable query suggestions at any time. UpdateQuerySuggestionsConfig is currently not supported in the Amazon Web Services GovCloud (US-West) region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.UpdateQuerySuggestionsConfig
            default: AWSKendraFrontendService.UpdateQuerySuggestionsConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index with query suggestions you want to update.
                Mode:
                  $ref: "#/components/schemas/Mode"
                  description: Set the mode to ENABLED or LEARN_ONLY. By default, Amazon Kendra enables query suggestions. LEARN_ONLY mode allows you to turn off query suggestions. You can to update this at any time. In LEARN_ONLY mode, Amazon Kendra continues to learn from new queries to keep suggestions up to date for when you are ready to switch to ENABLED mode again.
                QueryLogLookBackWindowInDays:
                  $ref: "#/components/schemas/Integer"
                  description: How recent your queries are in your query log time window. The time window is the number of days from current day to past days. By default, Amazon Kendra sets this to 180.
                IncludeQueriesWithoutUserInformation:
                  $ref: "#/components/schemas/ObjectBoolean"
                  description: TRUE to include queries without user information (i.e. all queries, irrespective of the user), otherwise FALSE to only include queries with user information. If you pass user information to Amazon Kendra along with the queries, you can set this flag to FALSE and instruct Amazon Kendra to only consider queries with user information. If you set to FALSE, Amazon Kendra only considers queries searched at least MinimumQueryCount times across MinimumNumberOfQueryingUsers unique users for suggestions. If you set to TRUE, Amazon Kendra ignores all user information and learns from all queries.
                MinimumNumberOfQueryingUsers:
                  $ref: "#/components/schemas/MinimumNumberOfQueryingUsers"
                  description: The minimum number of unique users who must search a query in order for the query to be eligible to suggest to your users. Increasing this number might decrease the number of suggestions. However, this ensures a query is searched by many users and is truly popular to suggest to users. How you tune this setting depends on your specific needs.
                MinimumQueryCount:
                  $ref: "#/components/schemas/MinimumQueryCount"
                  description: The the minimum number of times a query must be searched in order to be eligible to suggest to your users. Decreasing this number increases the number of suggestions. However, this affects the quality of suggestions as it sets a low bar for a query to be considered popular to suggest to users. How you tune this setting depends on your specific needs.
                AttributeSuggestionsConfig:
                  $ref: "#/components/schemas/AttributeSuggestionsUpdateConfig"
                  description: Configuration information for the document fields/attributes that you want to base query suggestions on.
              required:
                - IndexId
      responses:
        "200":
          description: Success
  /UpdateThesaurus:
    post:
      operationId: UpdateThesaurus
      description: Updates a thesaurus for an index.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraFrontendService.UpdateThesaurus
            default: AWSKendraFrontendService.UpdateThesaurus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/ThesaurusId"
                  description: The identifier of the thesaurus you want to update.
                Name:
                  $ref: "#/components/schemas/ThesaurusName"
                  description: A new name for the thesaurus.
                IndexId:
                  $ref: "#/components/schemas/IndexId"
                  description: The identifier of the index for the thesaurus.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A new description for the thesaurus.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: An IAM role that gives Amazon Kendra permissions to access thesaurus file specified in SourceS3Path.
                SourceS3Path:
                  $ref: "#/components/schemas/S3Path"
              required:
                - IndexId
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ExperienceId:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    IndexId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]*"
    AssociateEntityList:
      type: array
      items:
        $ref: "#/components/schemas/EntityConfiguration"
    EntityConfiguration:
      description: Provides the configuration information for users or groups in your IAM Identity Center identity source to grant access your Amazon Kendra experience.
      type: object
      properties:
        EntityId:
          $ref: "#/components/schemas/EntityId"
          description: The identifier of a user or group in your IAM Identity Center identity source. For example, a user ID could be an email.
        EntityType:
          $ref: "#/components/schemas/EntityType"
          description: Specifies whether you are configuring a User or a Group.
      required:
        - EntityId
        - EntityType
    EntityId:
      type: string
      minLength: 1
      maxLength: 47
      pattern: ^([0-9a-f]{10}-|)[A-Fa-f0-9]{8}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{12}$
    EntityType:
      type: string
      enum:
        - USER
        - GROUP
    AssociateEntitiesToExperienceResponse:
      type: object
      properties:
        FailedEntityList:
          $ref: "#/components/schemas/AssociateEntitiesToExperienceFailedEntityList"
          description: Lists the users or groups in your IAM Identity Center identity source that failed to properly configure with your Amazon Kendra experience.
    AssociateEntitiesToExperienceFailedEntityList:
      type: array
      items:
        $ref: "#/components/schemas/FailedEntity"
    FailedEntity:
      description: Information on the users or groups in your IAM Identity Center identity source that failed to properly configure with your Amazon Kendra experience.
      type: object
      properties:
        EntityId:
          $ref: "#/components/schemas/EntityId"
          description: The identifier of the user or group in your IAM Identity Center identity source. For example, a user ID could be an email.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The reason the user or group in your IAM Identity Center identity source failed to properly configure with your Amazon Kendra experience.
    ErrorMessage:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^\P{C}*$
    EntityPersonaConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/EntityPersonaConfiguration"
    EntityPersonaConfiguration:
      description: Provides the configuration information for users or groups in your IAM Identity Center identity source for access to your Amazon Kendra experience. Specific permissions are defined for each user or group once they are granted access to your Amazon Kendra experience.
      type: object
      properties:
        EntityId:
          $ref: "#/components/schemas/EntityId"
          description: The identifier of a user or group in your IAM Identity Center identity source. For example, a user ID could be an email.
        Persona:
          $ref: "#/components/schemas/Persona"
          description: The persona that defines the specific permissions of the user or group in your IAM Identity Center identity source. The available personas or access roles are Owner and Viewer. For more information on these personas, see Providing access to your search page.
      required:
        - EntityId
        - Persona
    Persona:
      type: string
      enum:
        - OWNER
        - VIEWER
    AssociatePersonasToEntitiesResponse:
      type: object
      properties:
        FailedEntityList:
          $ref: "#/components/schemas/FailedEntityList"
          description: Lists the users or groups in your IAM Identity Center identity source that failed to properly configure with your Amazon Kendra experience.
    FailedEntityList:
      type: array
      items:
        $ref: "#/components/schemas/FailedEntity"
    DocumentIdList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentId"
    DocumentId:
      type: string
      minLength: 1
      maxLength: 2048
    DataSourceSyncJobMetricTarget:
      description: Maps a particular data source sync job to a particular data source.
      type: object
      properties:
        DataSourceId:
          $ref: "#/components/schemas/DataSourceId"
          description: The ID of the data source that is running the sync job.
        DataSourceSyncJobId:
          $ref: "#/components/schemas/DataSourceSyncJobId"
          description: The ID of the sync job that is running on the data source. If the ID of a sync job is not provided and there is a sync job running, then the ID of this sync job is used and metrics are generated for this sync job. If the ID of a sync job is not provided and there is no sync job running, then no metrics are generated and documents are indexed/deleted at the index level without sync job metrics included.
      required:
        - DataSourceId
    DataSourceId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    DataSourceSyncJobId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    BatchDeleteDocumentResponse:
      type: object
      properties:
        FailedDocuments:
          $ref: "#/components/schemas/BatchDeleteDocumentResponseFailedDocuments"
          description: A list of documents that could not be removed from the index. Each entry contains an error message that indicates why the document couldn't be removed from the index.
    BatchDeleteDocumentResponseFailedDocuments:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteDocumentResponseFailedDocument"
    BatchDeleteDocumentResponseFailedDocument:
      description: Provides information about documents that could not be removed from an index by the BatchDeleteDocument API.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document that couldn't be removed from the index.
        DataSourceId:
          $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source connector that the document belongs to.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code for why the document couldn't be removed from the index.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: An explanation for why the document couldn't be removed from the index.
    ErrorCode:
      type: string
      enum:
        - InternalError
        - InvalidRequest
    FeaturedResultsSetIdList:
      type: array
      items:
        $ref: "#/components/schemas/FeaturedResultsSetId"
    FeaturedResultsSetId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: ^[a-zA-Z-0-9]*
    BatchDeleteFeaturedResultsSetResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/BatchDeleteFeaturedResultsSetErrors"
          description: The list of errors for the featured results set IDs, explaining why they couldn't be removed from the index.
      required:
        - Errors
    BatchDeleteFeaturedResultsSetErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteFeaturedResultsSetError"
    BatchDeleteFeaturedResultsSetError:
      description: Provides information about a set of featured results that couldn't be removed from an index by the BatchDeleteFeaturedResultsSet API.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/FeaturedResultsSetId"
          description: The identifier of the set of featured results that couldn't be removed from the index.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code for why the set of featured results couldn't be removed from the index.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: An explanation for why the set of featured results couldn't be removed from the index.
      required:
        - Id
        - ErrorCode
        - ErrorMessage
    DocumentInfoList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentInfo"
    DocumentInfo:
      description: Identifies a document for which to retrieve status information
      type: object
      properties:
        DocumentId:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document.
        Attributes:
          $ref: "#/components/schemas/DocumentAttributeList"
          description: 'Attributes that identify a specific version of a document to check. The only valid attributes are: version datasourceId jobExecutionId The attributes follow these rules: dataSourceId and jobExecutionId must be used together. version is ignored if dataSourceId and jobExecutionId are not provided. If dataSourceId and jobExecutionId are provided, but version is not, the version defaults to "0".'
      required:
        - DocumentId
    DocumentAttributeList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentAttribute"
    DocumentAttribute:
      description: A document attribute or metadata field. To create custom document attributes, see Custom attributes.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The identifier for the attribute.
        Value:
          $ref: "#/components/schemas/DocumentAttributeValue"
          description: The value of the attribute.
      required:
        - Key
        - Value
    DocumentAttributeKey:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[a-zA-Z0-9_][a-zA-Z0-9_-]*"
    DocumentAttributeValue:
      description: The value of a document attribute. You can only provide one value for a document attribute.
      type: object
      properties:
        StringValue:
          $ref: "#/components/schemas/DocumentAttributeStringValue"
          description: A string, such as "department".
        StringListValue:
          $ref: "#/components/schemas/DocumentAttributeStringListValue"
          description: A list of strings. The default maximum length or number of strings is 10.
        LongValue:
          $ref: "#/components/schemas/Long"
          description: A long integer value.
        DateValue:
          $ref: "#/components/schemas/Timestamp"
          description: A date expressed as an ISO 8601 string. It is important for the time zone to be included in the ISO 8601 date-time format. For example, 2012-03-25T12:30:10+01:00 is the ISO 8601 date-time format for March 25th 2012 at 12:30PM (plus 10 seconds) in Central European Time.
    DocumentAttributeStringValue:
      type: string
      minLength: 1
      maxLength: 2048
    DocumentAttributeStringListValue:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
      minLength: 1
      maxLength: 2048
    Long:
      type: integer
      format: int64
    Timestamp:
      type: string
      format: date-time
    BatchGetDocumentStatusResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/BatchGetDocumentStatusResponseErrors"
          description: A list of documents that Amazon Kendra couldn't get the status for. The list includes the ID of the document and the reason that the status couldn't be found.
        DocumentStatusList:
          $ref: "#/components/schemas/DocumentStatusList"
          description: The status of documents. The status indicates if the document is waiting to be indexed, is in the process of indexing, has completed indexing, or failed indexing. If a document failed indexing, the status provides the reason why.
    BatchGetDocumentStatusResponseErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetDocumentStatusResponseError"
    BatchGetDocumentStatusResponseError:
      description: Provides a response when the status of a document could not be retrieved.
      type: object
      properties:
        DocumentId:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document whose status could not be retrieved.
        DataSourceId:
          $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source connector that the failed document belongs to.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: Indicates the source of the error.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: States that the API could not get the status of a document. This could be because the request is not valid or there is a system error.
    DocumentStatusList:
      type: array
      items:
        $ref: "#/components/schemas/Status"
    Status:
      description: Provides information about the status of documents submitted for indexing.
      type: object
      properties:
        DocumentId:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document.
        DocumentStatus:
          $ref: "#/components/schemas/DocumentStatus"
          description: The current status of a document. If the document was submitted for deletion, the status is NOT_FOUND after the document is deleted.
        FailureCode:
          $ref: "#/components/schemas/String"
          description: Indicates the source of the error.
        FailureReason:
          $ref: "#/components/schemas/String"
          description: Provides detailed information about why the document couldn't be indexed. Use this information to correct the error before you resubmit the document for indexing.
    DocumentStatus:
      type: string
      enum:
        - NOT_FOUND
        - PROCESSING
        - INDEXED
        - UPDATED
        - FAILED
        - UPDATE_FAILED
    RoleArn:
      type: string
      minLength: 0
      maxLength: 1284
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    DocumentList:
      type: array
      items:
        $ref: "#/components/schemas/Document"
    Document:
      description: A document in an index.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/DocumentId"
          description: A identifier of the document in the index. Note, each document ID must be unique per index. You cannot create a data source to index your documents with their unique IDs and then use the BatchPutDocument API to index the same documents, or vice versa. You can delete a data source and then use the BatchPutDocument API to index the same documents, or vice versa.
        Title:
          $ref: "#/components/schemas/Title"
          description: The title of the document.
        Blob:
          $ref: "#/components/schemas/Blob"
          description: The contents of the document. Documents passed to the Blob parameter must be base64 encoded. Your code might not need to encode the document file bytes if you're using an Amazon Web Services SDK to call Amazon Kendra APIs. If you are calling the Amazon Kendra endpoint directly using REST, you must base64 encode the contents before sending.
        S3Path:
          $ref: "#/components/schemas/S3Path"
        Attributes:
          $ref: "#/components/schemas/DocumentAttributeList"
          description: Custom attributes to apply to the document. Use the custom attributes to provide additional information for searching, to provide facets for refining searches, and to provide additional information in the query response. For example, 'DataSourceId' and 'DataSourceSyncJobId' are custom attributes that provide information on the synchronization of documents running on a data source. Note, 'DataSourceSyncJobId' could be an optional custom attribute as Amazon Kendra will use the ID of a running sync job.
        AccessControlList:
          $ref: "#/components/schemas/PrincipalList"
          description: Information on principals (users and/or groups) and which documents they should have access to. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents.
        HierarchicalAccessControlList:
          $ref: "#/components/schemas/HierarchicalPrincipalList"
          description: The list of principal lists that define the hierarchy for which documents users should have access to.
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: The file type of the document in the Blob field. If you want to index snippets or subsets of HTML documents instead of the entirety of the HTML documents, you must add the HTML start and closing tags (`<HTML>`content</HTML>) around the content.
        AccessControlConfigurationId:
          $ref: "#/components/schemas/AccessControlConfigurationId"
          description: The identifier of the access control configuration that you want to apply to the document.
      required:
        - Id
    Title:
      type: string
    Blob:
      type: string
      format: byte
    S3Path:
      description: Information required to find a specific file in an Amazon S3 bucket.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the S3 bucket that contains the file.
        Key:
          $ref: "#/components/schemas/S3ObjectKey"
          description: The name of the file.
      required:
        - Bucket
        - Key
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-z0-9][\\.\\-a-z0-9]{1,61}[a-z0-9]"
    S3ObjectKey:
      type: string
      minLength: 1
      maxLength: 1024
    PrincipalList:
      type: array
      items:
        $ref: "#/components/schemas/Principal"
    Principal:
      description: Provides user and group information for user context filtering.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/PrincipalName"
          description: The name of the user or group.
        Type:
          $ref: "#/components/schemas/PrincipalType"
          description: The type of principal.
        Access:
          $ref: "#/components/schemas/ReadAccessType"
          description: Whether to allow or deny document access to the principal.
        DataSourceId:
          $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source the principal should access documents from.
      required:
        - Name
        - Type
        - Access
    PrincipalName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^\P{C}*$
    PrincipalType:
      type: string
      enum:
        - USER
        - GROUP
    ReadAccessType:
      type: string
      enum:
        - ALLOW
        - DENY
    HierarchicalPrincipalList:
      description: A list of principal lists that define the hierarchy for which documents users should have access to. Each hierarchical list specifies which user or group has allow or deny access for each document.
      type: array
      items:
        $ref: "#/components/schemas/HierarchicalPrincipal"
    HierarchicalPrincipal:
      description: Information to define the hierarchy for which documents users should have access to.
      type: object
      properties:
        PrincipalList:
          $ref: "#/components/schemas/PrincipalList"
          description: A list of principal lists that define the hierarchy for which documents users should have access to. Each hierarchical list specifies which user or group has allow or deny access for each document.
      required:
        - PrincipalList
    ContentType:
      type: string
      enum:
        - PDF
        - HTML
        - MS_WORD
        - PLAIN_TEXT
        - PPT
        - RTF
        - XML
        - XSLT
        - MS_EXCEL
        - CSV
        - JSON
        - MD
    AccessControlConfigurationId:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[a-zA-Z0-9-]+"
    CustomDocumentEnrichmentConfiguration:
      description: Provides the configuration information for altering document metadata and content during the document ingestion process. For more information, see Customizing document metadata during the ingestion process.
      type: object
      properties:
        InlineConfigurations:
          $ref: "#/components/schemas/InlineCustomDocumentEnrichmentConfigurationList"
          description: Configuration information to alter document attributes or metadata fields and content when ingesting documents into Amazon Kendra.
        PreExtractionHookConfiguration:
          $ref: "#/components/schemas/HookConfiguration"
          description: Configuration information for invoking a Lambda function in Lambda on the original or raw documents before extracting their metadata and text. You can use a Lambda function to apply advanced logic for creating, modifying, or deleting document metadata and content. For more information, see Advanced data manipulation.
        PostExtractionHookConfiguration:
          $ref: "#/components/schemas/HookConfiguration"
          description: Configuration information for invoking a Lambda function in Lambda on the structured documents with their metadata and text extracted. You can use a Lambda function to apply advanced logic for creating, modifying, or deleting document metadata and content. For more information, see Advanced data manipulation.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of an IAM role with permission to run PreExtractionHookConfiguration and PostExtractionHookConfiguration for altering document metadata and content during the document ingestion process. For more information, see an IAM roles for Amazon Kendra.
    InlineCustomDocumentEnrichmentConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/InlineCustomDocumentEnrichmentConfiguration"
    InlineCustomDocumentEnrichmentConfiguration:
      description: Provides the configuration information for applying basic logic to alter document metadata and content when ingesting documents into Amazon Kendra. To apply advanced logic, to go beyond what you can do with basic logic, see HookConfiguration. For more information, see Customizing document metadata during the ingestion process.
      type: object
      properties:
        Condition:
          $ref: "#/components/schemas/DocumentAttributeCondition"
          description: Configuration of the condition used for the target document attribute or metadata field when ingesting documents into Amazon Kendra.
        Target:
          $ref: "#/components/schemas/DocumentAttributeTarget"
          description: Configuration of the target document attribute or metadata field when ingesting documents into Amazon Kendra. You can also include a value.
        DocumentContentDeletion:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to delete content if the condition used for the target attribute is met.
    DocumentAttributeCondition:
      description: The condition used for the target document attribute or metadata field when ingesting documents into Amazon Kendra. You use this with DocumentAttributeTarget to apply the condition. For example, you can create the 'Department' target field and have it prefill department names associated with the documents based on information in the 'Source_URI' field. Set the condition that if the 'Source_URI' field contains 'financial' in its URI value, then prefill the target field 'Department' with the target value 'Finance' for the document. Amazon Kendra cannot create a target field if it has not already been created as an index field. After you create your index field, you can create a document metadata field using DocumentAttributeTarget. Amazon Kendra then will map your newly created metadata field to your index field.
      type: object
      properties:
        ConditionDocumentAttributeKey:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The identifier of the document attribute used for the condition. For example, 'Source_URI' could be an identifier for the attribute or metadata field that contains source URIs associated with the documents. Amazon Kendra currently does not support _document_body as an attribute key used for the condition.
        Operator:
          $ref: "#/components/schemas/ConditionOperator"
          description: The condition operator. For example, you can use 'Contains' to partially match a string.
        ConditionOnValue:
          $ref: "#/components/schemas/DocumentAttributeValue"
          description: The value used by the operator. For example, you can specify the value 'financial' for strings in the 'Source_URI' field that partially match or contain this value.
      required:
        - ConditionDocumentAttributeKey
        - Operator
    ConditionOperator:
      type: string
      enum:
        - GreaterThan
        - GreaterThanOrEquals
        - LessThan
        - LessThanOrEquals
        - Equals
        - NotEquals
        - Contains
        - NotContains
        - Exists
        - NotExists
        - BeginsWith
    DocumentAttributeTarget:
      description: The target document attribute or metadata field you want to alter when ingesting documents into Amazon Kendra. For example, you can delete customer identification numbers associated with the documents, stored in the document metadata field called 'Customer_ID'. You set the target key as 'Customer_ID' and the deletion flag to TRUE. This removes all customer ID values in the field 'Customer_ID'. This would scrub personally identifiable information from each document's metadata. Amazon Kendra cannot create a target field if it has not already been created as an index field. After you create your index field, you can create a document metadata field using DocumentAttributeTarget. Amazon Kendra then will map your newly created metadata field to your index field. You can also use this with DocumentAttributeCondition.
      type: object
      properties:
        TargetDocumentAttributeKey:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The identifier of the target document attribute or metadata field. For example, 'Department' could be an identifier for the target attribute or metadata field that includes the department names associated with the documents.
        TargetDocumentAttributeValueDeletion:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to delete the existing target value for your specified target attribute key. You cannot create a target value and set this to TRUE. To create a target value (TargetDocumentAttributeValue), set this to FALSE.
        TargetDocumentAttributeValue:
          $ref: "#/components/schemas/DocumentAttributeValue"
          description: The target value you want to create for the target attribute. For example, 'Finance' could be the target value for the target attribute key 'Department'.
    Boolean:
      type: boolean
    HookConfiguration:
      description: Provides the configuration information for invoking a Lambda function in Lambda to alter document metadata and content when ingesting documents into Amazon Kendra. You can configure your Lambda function using PreExtractionHookConfiguration if you want to apply advanced alterations on the original or raw documents. If you want to apply advanced alterations on the Amazon Kendra structured documents, you must configure your Lambda function using PostExtractionHookConfiguration. You can only invoke one Lambda function. However, this function can invoke other functions it requires. For more information, see Customizing document metadata during the ingestion process.
      type: object
      properties:
        InvocationCondition:
          $ref: "#/components/schemas/DocumentAttributeCondition"
          description: The condition used for when a Lambda function should be invoked. For example, you can specify a condition that if there are empty date-time values, then Amazon Kendra should invoke a function that inserts the current date-time.
        LambdaArn:
          $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of an IAM role with permission to run a Lambda function during ingestion. For more information, see an IAM roles for Amazon Kendra.
        S3Bucket:
          $ref: "#/components/schemas/S3BucketName"
          description: Stores the original, raw documents or the structured, parsed documents before and after altering them. For more information, see Data contracts for Lambda functions.
      required:
        - LambdaArn
        - S3Bucket
    LambdaArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: /arn:aws[a-zA-Z-]*:lambda:[a-z]+-[a-z]+-[0-9]:[0-9]{12}:function:[a-zA-Z0-9-_]+(\/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})?(:[a-zA-Z0-9-_]+)?/
    BatchPutDocumentResponse:
      type: object
      properties:
        FailedDocuments:
          $ref: "#/components/schemas/BatchPutDocumentResponseFailedDocuments"
          description: A list of documents that were not added to the index because the document failed a validation check. Each document contains an error message that indicates why the document couldn't be added to the index. If there was an error adding a document to an index the error is reported in your Amazon Web Services CloudWatch log. For more information, see Monitoring Amazon Kendra with Amazon CloudWatch logs.
    BatchPutDocumentResponseFailedDocuments:
      type: array
      items:
        $ref: "#/components/schemas/BatchPutDocumentResponseFailedDocument"
    BatchPutDocumentResponseFailedDocument:
      description: Provides information about a document that could not be indexed.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document.
        DataSourceId:
          $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source connector that the failed document belongs to.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The type of error that caused the document to fail to be indexed.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: A description of the reason why the document could not be indexed.
    AccessControlConfigurationName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[\\S\\s]*"
    Description:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: ^\P{C}*$
    ClientTokenName:
      type: string
      minLength: 1
      maxLength: 100
    CreateAccessControlConfigurationResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/AccessControlConfigurationId"
          description: The identifier of the access control configuration for your documents in an index.
      required:
        - Id
    DataSourceName:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    DataSourceType:
      type: string
      enum:
        - S3
        - SHAREPOINT
        - DATABASE
        - SALESFORCE
        - ONEDRIVE
        - SERVICENOW
        - CUSTOM
        - CONFLUENCE
        - GOOGLEDRIVE
        - WEBCRAWLER
        - WORKDOCS
        - FSX
        - SLACK
        - BOX
        - QUIP
        - JIRA
        - GITHUB
        - ALFRESCO
        - TEMPLATE
    DataSourceConfiguration:
      description: Provides the configuration information for an Amazon Kendra data source.
      type: object
      properties:
        S3Configuration:
          $ref: "#/components/schemas/S3DataSourceConfiguration"
          description: Provides the configuration information to connect to an Amazon S3 bucket as your data source. Amazon Kendra now supports an upgraded Amazon S3 connector. You must now use the TemplateConfiguration object instead of the S3DataSourceConfiguration object to configure your connector. Connectors configured using the older console and API architecture will continue to function as configured. However, you won't be able to edit or update them. If you want to edit or update your connector configuration, you must create a new connector. We recommended migrating your connector workflow to the upgraded version. Support for connectors configured using the older architecture is scheduled to end by June 2024.
        SharePointConfiguration:
          $ref: "#/components/schemas/SharePointConfiguration"
          description: Provides the configuration information to connect to Microsoft SharePoint as your data source.
        DatabaseConfiguration:
          $ref: "#/components/schemas/DatabaseConfiguration"
          description: Provides the configuration information to connect to a database as your data source.
        SalesforceConfiguration:
          $ref: "#/components/schemas/SalesforceConfiguration"
          description: Provides the configuration information to connect to Salesforce as your data source.
        OneDriveConfiguration:
          $ref: "#/components/schemas/OneDriveConfiguration"
          description: Provides the configuration information to connect to Microsoft OneDrive as your data source.
        ServiceNowConfiguration:
          $ref: "#/components/schemas/ServiceNowConfiguration"
          description: Provides the configuration information to connect to ServiceNow as your data source.
        ConfluenceConfiguration:
          $ref: "#/components/schemas/ConfluenceConfiguration"
          description: Provides the configuration information to connect to Confluence as your data source.
        GoogleDriveConfiguration:
          $ref: "#/components/schemas/GoogleDriveConfiguration"
          description: Provides the configuration information to connect to Google Drive as your data source.
        WebCrawlerConfiguration:
          $ref: "#/components/schemas/WebCrawlerConfiguration"
        WorkDocsConfiguration:
          $ref: "#/components/schemas/WorkDocsConfiguration"
          description: Provides the configuration information to connect to Amazon WorkDocs as your data source.
        FsxConfiguration:
          $ref: "#/components/schemas/FsxConfiguration"
          description: Provides the configuration information to connect to Amazon FSx as your data source. Amazon Kendra now supports an upgraded Amazon FSx Windows connector. You must now use the TemplateConfiguration object instead of the FsxConfiguration object to configure your connector. Connectors configured using the older console and API architecture will continue to function as configured. However, you won't be able to edit or update them. If you want to edit or update your connector configuration, you must create a new connector. We recommended migrating your connector workflow to the upgraded version. Support for connectors configured using the older architecture is scheduled to end by June 2024.
        SlackConfiguration:
          $ref: "#/components/schemas/SlackConfiguration"
          description: Provides the configuration information to connect to Slack as your data source. Amazon Kendra now supports an upgraded Slack connector. You must now use the TemplateConfiguration object instead of the SlackConfiguration object to configure your connector. Connectors configured using the older console and API architecture will continue to function as configured. However, you won't be able to edit or update them. If you want to edit or update your connector configuration, you must create a new connector. We recommended migrating your connector workflow to the upgraded version. Support for connectors configured using the older architecture is scheduled to end by June 2024.
        BoxConfiguration:
          $ref: "#/components/schemas/BoxConfiguration"
          description: Provides the configuration information to connect to Box as your data source.
        QuipConfiguration:
          $ref: "#/components/schemas/QuipConfiguration"
          description: Provides the configuration information to connect to Quip as your data source.
        JiraConfiguration:
          $ref: "#/components/schemas/JiraConfiguration"
          description: Provides the configuration information to connect to Jira as your data source.
        GitHubConfiguration:
          $ref: "#/components/schemas/GitHubConfiguration"
          description: Provides the configuration information to connect to GitHub as your data source. Amazon Kendra now supports an upgraded GitHub connector. You must now use the TemplateConfiguration object instead of the GitHubConfiguration object to configure your connector. Connectors configured using the older console and API architecture will continue to function as configured. However, you won’t be able to edit or update them. If you want to edit or update your connector configuration, you must create a new connector. We recommended migrating your connector workflow to the upgraded version. Support for connectors configured using the older architecture is scheduled to end by June 2024.
        AlfrescoConfiguration:
          $ref: "#/components/schemas/AlfrescoConfiguration"
          description: Provides the configuration information to connect to Alfresco as your data source. Support for AlfrescoConfiguration ended May 2023. We recommend migrating to or using the Alfresco data source template schema / TemplateConfiguration API.
        TemplateConfiguration:
          $ref: "#/components/schemas/TemplateConfiguration"
          description: Provides a template for the configuration information to connect to your data source.
    S3DataSourceConfiguration:
      description: Provides the configuration information to connect to an Amazon S3 bucket. Amazon Kendra now supports an upgraded Amazon S3 connector. You must now use the TemplateConfiguration object instead of the S3DataSourceConfiguration object to configure your connector. Connectors configured using the older console and API architecture will continue to function as configured. However, you won't be able to edit or update them. If you want to edit or update your connector configuration, you must create a new connector. We recommended migrating your connector workflow to the upgraded version. Support for connectors configured using the older architecture is scheduled to end by June 2024.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the bucket that contains the documents.
        InclusionPrefixes:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of S3 prefixes for the documents that should be included in the index.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: "A list of glob patterns (patterns that can expand a wildcard pattern into a list of path names that match the given pattern) for certain file names and file types to include in your index. If a document matches both an inclusion and exclusion prefix or pattern, the exclusion prefix takes precendence and the document is not indexed. Examples of glob patterns include: /myapp/config/*—All files inside config directory. **/*.png—All .png files in all directories. **/*.{png, ico, md}—All .png, .ico or .md files in all directories. /myapp/src/**/*.ts—All .ts files inside src directory (and all its subdirectories). **/!(*.module).ts—All .ts files but not .module.ts *.png , *.jpg—All PNG and JPEG image files in a directory (files with the extensions .png and .jpg). *internal*—All files in a directory that contain 'internal' in the file name, such as 'internal', 'internal_only', 'company_internal'. **/*internal*—All internal-related files in a directory and its subdirectories. For more examples, see Use of Exclude and Include Filters in the Amazon Web Services CLI Command Reference."
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: "A list of glob patterns (patterns that can expand a wildcard pattern into a list of path names that match the given pattern) for certain file names and file types to exclude from your index. If a document matches both an inclusion and exclusion prefix or pattern, the exclusion prefix takes precendence and the document is not indexed. Examples of glob patterns include: /myapp/config/*—All files inside config directory. **/*.png—All .png files in all directories. **/*.{png, ico, md}—All .png, .ico or .md files in all directories. /myapp/src/**/*.ts—All .ts files inside src directory (and all its subdirectories). **/!(*.module).ts—All .ts files but not .module.ts *.png , *.jpg—All PNG and JPEG image files in a directory (files with the extensions .png and .jpg). *internal*—All files in a directory that contain 'internal' in the file name, such as 'internal', 'internal_only', 'company_internal'. **/*internal*—All internal-related files in a directory and its subdirectories. For more examples, see Use of Exclude and Include Filters in the Amazon Web Services CLI Command Reference."
        DocumentsMetadataConfiguration:
          $ref: "#/components/schemas/DocumentsMetadataConfiguration"
        AccessControlListConfiguration:
          $ref: "#/components/schemas/AccessControlListConfiguration"
          description: Provides the path to the S3 bucket that contains the user context filtering files for the data source. For the format of the file, see Access control for S3 data sources.
      required:
        - BucketName
    DataSourceInclusionsExclusionsStrings:
      type: array
      items:
        $ref: "#/components/schemas/DataSourceInclusionsExclusionsStringsMember"
    DataSourceInclusionsExclusionsStringsMember:
      type: string
      minLength: 1
      maxLength: 300
    DocumentsMetadataConfiguration:
      description: Document metadata files that contain information such as the document access control information, source URI, document author, and custom attributes. Each metadata file contains metadata about a single document.
      type: object
      properties:
        S3Prefix:
          $ref: "#/components/schemas/S3ObjectKey"
          description: A prefix used to filter metadata configuration files in the Amazon Web Services S3 bucket. The S3 bucket might contain multiple metadata files. Use S3Prefix to include only the desired metadata files.
    AccessControlListConfiguration:
      description: Access Control List files for the documents in a data source. For the format of the file, see Access control for S3 data sources.
      type: object
      properties:
        KeyPath:
          $ref: "#/components/schemas/S3ObjectKey"
          description: Path to the Amazon S3 bucket that contains the ACL files.
    SharePointConfiguration:
      description: Provides the configuration information to connect to Microsoft SharePoint as your data source.
      type: object
      properties:
        SharePointVersion:
          $ref: "#/components/schemas/SharePointVersion"
          description: The version of Microsoft SharePoint that you use.
        Urls:
          $ref: "#/components/schemas/SharePointUrlList"
          description: The Microsoft SharePoint site URLs for the documents you want to index.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of an Secrets Manager secret that contains the user name and password required to connect to the SharePoint instance. For more information, see Microsoft SharePoint.
        CrawlAttachments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index document attachments.
        UseChangeLog:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to use the SharePoint change log to determine which documents require updating in the index. Depending on the change log's size, it may take longer for Amazon Kendra to use the change log than to scan all of your documents in SharePoint.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain documents in your SharePoint. Documents that match the patterns are included in the index. Documents that don't match the patterns are excluded from the index. If a document matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the document isn't included in the index. The regex applies to the display URL of the SharePoint document.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain documents in your SharePoint. Documents that match the patterns are excluded from the index. Documents that don't match the patterns are included in the index. If a document matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the document isn't included in the index. The regex applies to the display URL of the SharePoint document.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information for an Amazon Virtual Private Cloud to connect to your Microsoft SharePoint. For more information, see Configuring a VPC.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map SharePoint data source attributes or field names to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to SharePoint fields. For more information, see Mapping data source fields. The SharePoint data source field names must exist in your SharePoint custom metadata.
        DocumentTitleFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The Microsoft SharePoint attribute field that contains the title of the document.
        DisableLocalGroups:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to disable local groups information.
        SslCertificateS3Path:
          $ref: "#/components/schemas/S3Path"
          description: The path to the SSL certificate stored in an Amazon S3 bucket. You use this to connect to SharePoint Server if you require a secure SSL connection. You can generate a self-signed X509 certificate on any computer using OpenSSL. For an example of using OpenSSL to create an X509 certificate, see Create and sign an X509 certificate.
        AuthenticationType:
          $ref: "#/components/schemas/SharePointOnlineAuthenticationType"
          description: Whether you want to connect to SharePoint Online using basic authentication of user name and password, or OAuth authentication of user name, password, client ID, and client secret, or AD App-only authentication of client secret.
        ProxyConfiguration:
          $ref: "#/components/schemas/ProxyConfiguration"
          description: Configuration information to connect to your Microsoft SharePoint site URLs via instance via a web proxy. You can use this option for SharePoint Server. You must provide the website host name and port number. For example, the host name of https://a.example.com/page1.html is "a.example.com" and the port is 443, the standard port for HTTPS. Web proxy credentials are optional and you can use them to connect to a web proxy server that requires basic authentication of user name and password. To store web proxy credentials, you use a secret in Secrets Manager. It is recommended that you follow best security practices when configuring your web proxy. This includes setting up throttling, setting up logging and monitoring, and applying security patches on a regular basis. If you use your web proxy with multiple data sources, sync jobs that occur at the same time could strain the load on your proxy. It is recommended you prepare your proxy beforehand for any security and load requirements.
      required:
        - SharePointVersion
        - Urls
        - SecretArn
    SharePointVersion:
      type: string
      enum:
        - SHAREPOINT_2013
        - SHAREPOINT_2016
        - SHAREPOINT_ONLINE
        - SHAREPOINT_2019
    SharePointUrlList:
      type: array
      items:
        $ref: "#/components/schemas/Url"
    Url:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(https?|ftp|file):\/\/([^\s]*)
    SecretArn:
      type: string
      minLength: 1
      maxLength: 1284
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    DataSourceVpcConfiguration:
      description: Provides the configuration information to connect to an Amazon VPC.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/SubnetIdList"
          description: A list of identifiers for subnets within your Amazon VPC. The subnets should be able to connect to each other in the VPC, and they should have outgoing access to the Internet through a NAT device.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: A list of identifiers of security groups within your Amazon VPC. The security groups should enable Amazon Kendra to connect to the data source.
      required:
        - SubnetIds
        - SecurityGroupIds
    SubnetIdList:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[\\-0-9a-zA-Z]+"
    SecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/VpcSecurityGroupId"
    VpcSecurityGroupId:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[-0-9a-zA-Z]+"
    DataSourceToIndexFieldMappingList:
      type: array
      items:
        $ref: "#/components/schemas/DataSourceToIndexFieldMapping"
    DataSourceToIndexFieldMapping:
      description: Maps attributes or field names of the documents synced from the data source to Amazon Kendra index field names. You can set up field mappings for each data source when calling CreateDataSource or UpdateDataSource API. To create custom fields, use the UpdateIndex API to first create an index field and then map to the data source field. For more information, see Mapping data source fields.
      type: object
      properties:
        DataSourceFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the field in the data source. You must first create the index field using the UpdateIndex API.
        DateFieldFormat:
          $ref: "#/components/schemas/DataSourceDateFieldFormat"
          description: The format for date fields in the data source. If the field specified in DataSourceFieldName is a date field, you must specify the date format. If the field is not a date field, an exception is thrown.
        IndexFieldName:
          $ref: "#/components/schemas/IndexFieldName"
          description: The name of the index field to map to the data source field. The index field type must match the data source field type.
      required:
        - DataSourceFieldName
        - IndexFieldName
    DataSourceFieldName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z][a-zA-Z0-9_.]*$
    DataSourceDateFieldFormat:
      type: string
      minLength: 4
      maxLength: 40
      pattern: ^(?!\s).*(?<!\s)$
    IndexFieldName:
      type: string
      minLength: 1
      maxLength: 30
      pattern: ^\P{C}*$
    SharePointOnlineAuthenticationType:
      type: string
      enum:
        - HTTP_BASIC
        - OAUTH2
    ProxyConfiguration:
      description: Provides the configuration information for a web proxy to connect to website hosts.
      type: object
      properties:
        Host:
          $ref: "#/components/schemas/Host"
          description: The name of the website host you want to connect to via a web proxy server. For example, the host name of https://a.example.com/page1.html is "a.example.com".
        Port:
          $ref: "#/components/schemas/Port"
          description: The port number of the website host you want to connect to via a web proxy server. For example, the port for https://a.example.com/page1.html is 443, the standard port for HTTPS.
        Credentials:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of an Secrets Manager secret. You create a secret to store your credentials in Secrets Manager The credentials are optional. You use a secret if web proxy credentials are required to connect to a website host. Amazon Kendra currently support basic authentication to connect to a web proxy server. The secret stores your credentials.
      required:
        - Host
        - Port
    Host:
      type: string
      minLength: 1
      maxLength: 253
      pattern: ([^\s]*)
    Port:
      type: integer
      minimum: 1
      maximum: 65535
    DatabaseConfiguration:
      description: Provides the configuration information to an Amazon Kendra supported database.
      type: object
      properties:
        DatabaseEngineType:
          $ref: "#/components/schemas/DatabaseEngineType"
          description: The type of database engine that runs the database.
        ConnectionConfiguration:
          $ref: "#/components/schemas/ConnectionConfiguration"
          description: Configuration information that's required to connect to a database.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
        ColumnConfiguration:
          $ref: "#/components/schemas/ColumnConfiguration"
          description: Information about where the index should get the document information from the database.
        AclConfiguration:
          $ref: "#/components/schemas/AclConfiguration"
          description: Information about the database column that provides information for user context filtering.
        SqlConfiguration:
          $ref: "#/components/schemas/SqlConfiguration"
          description: Provides information about how Amazon Kendra uses quote marks around SQL identifiers when querying a database data source.
      required:
        - DatabaseEngineType
        - ConnectionConfiguration
        - ColumnConfiguration
    DatabaseEngineType:
      type: string
      enum:
        - RDS_AURORA_MYSQL
        - RDS_AURORA_POSTGRESQL
        - RDS_MYSQL
        - RDS_POSTGRESQL
    ConnectionConfiguration:
      description: Provides the configuration information that's required to connect to a database.
      type: object
      properties:
        DatabaseHost:
          $ref: "#/components/schemas/DatabaseHost"
          description: The name of the host for the database. Can be either a string (host.subdomain.domain.tld) or an IPv4 or IPv6 address.
        DatabasePort:
          $ref: "#/components/schemas/DatabasePort"
          description: The port that the database uses for connections.
        DatabaseName:
          $ref: "#/components/schemas/DatabaseName"
          description: The name of the database containing the document data.
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the table that contains the document data.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of an Secrets Manager secret that stores the credentials. The credentials should be a user-password pair. For more information, see Using a Database Data Source. For more information about Secrets Manager, see What Is Secrets Manager in the Secrets Manager user guide.
      required:
        - DatabaseHost
        - DatabasePort
        - DatabaseName
        - TableName
        - SecretArn
    DatabaseHost:
      type: string
      minLength: 1
      maxLength: 253
    DatabasePort:
      type: integer
      minimum: 1
      maximum: 65535
    DatabaseName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
    TableName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
    ColumnConfiguration:
      description: Provides information about how Amazon Kendra should use the columns of a database in an index.
      type: object
      properties:
        DocumentIdColumnName:
          $ref: "#/components/schemas/ColumnName"
          description: The column that provides the document's identifier.
        DocumentDataColumnName:
          $ref: "#/components/schemas/ColumnName"
          description: The column that contains the contents of the document.
        DocumentTitleColumnName:
          $ref: "#/components/schemas/ColumnName"
          description: The column that contains the title of the document.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: An array of objects that map database column names to the corresponding fields in an index. You must first create the fields in the index using the UpdateIndex API.
        ChangeDetectingColumns:
          $ref: "#/components/schemas/ChangeDetectingColumns"
          description: One to five columns that indicate when a document in the database has changed.
      required:
        - DocumentIdColumnName
        - DocumentDataColumnName
        - ChangeDetectingColumns
    ColumnName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
    ChangeDetectingColumns:
      type: array
      items:
        $ref: "#/components/schemas/ColumnName"
    AclConfiguration:
      description: Provides information about the column that should be used for filtering the query response by groups.
      type: object
      properties:
        AllowedGroupsColumnName:
          $ref: "#/components/schemas/ColumnName"
          description: A list of groups, separated by semi-colons, that filters a query response based on user context. The document is only returned to users that are in one of the groups specified in the UserContext field of the Query API.
      required:
        - AllowedGroupsColumnName
    SqlConfiguration:
      description: Provides the configuration information to use a SQL database.
      type: object
      properties:
        QueryIdentifiersEnclosingOption:
          $ref: "#/components/schemas/QueryIdentifiersEnclosingOption"
          description: Determines whether Amazon Kendra encloses SQL identifiers for tables and column names in double quotes (") when making a database query. By default, Amazon Kendra passes SQL identifiers the way that they are entered into the data source configuration. It does not change the case of identifiers or enclose them in quotes. PostgreSQL internally converts uppercase characters to lower case characters in identifiers unless they are quoted. Choosing this option encloses identifiers in quotes so that PostgreSQL does not convert the character's case. For MySQL databases, you must enable the ansi_quotes option when you set this field to DOUBLE_QUOTES.
    QueryIdentifiersEnclosingOption:
      type: string
      enum:
        - DOUBLE_QUOTES
        - NONE
    SalesforceConfiguration:
      description: Provides the configuration information to connect to Salesforce as your data source.
      type: object
      properties:
        ServerUrl:
          $ref: "#/components/schemas/Url"
          description: The instance URL for the Salesforce site that you want to index.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: "The Amazon Resource Name (ARN) of an Secrets Managersecret that contains the key/value pairs required to connect to your Salesforce instance. The secret must contain a JSON structure with the following keys: authenticationUrl - The OAUTH endpoint that Amazon Kendra connects to get an OAUTH token. consumerKey - The application public key generated when you created your Salesforce application. consumerSecret - The application private key generated when you created your Salesforce application. password - The password associated with the user logging in to the Salesforce instance. securityToken - The token associated with the user logging in to the Salesforce instance. username - The user name of the user logging in to the Salesforce instance."
        StandardObjectConfigurations:
          $ref: "#/components/schemas/SalesforceStandardObjectConfigurationList"
          description: Configuration of the Salesforce standard objects that Amazon Kendra indexes.
        KnowledgeArticleConfiguration:
          $ref: "#/components/schemas/SalesforceKnowledgeArticleConfiguration"
          description: Configuration information for the knowledge article types that Amazon Kendra indexes. Amazon Kendra indexes standard knowledge articles and the standard fields of knowledge articles, or the custom fields of custom knowledge articles, but not both.
        ChatterFeedConfiguration:
          $ref: "#/components/schemas/SalesforceChatterFeedConfiguration"
          description: Configuration information for Salesforce chatter feeds.
        CrawlAttachments:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether Amazon Kendra should index attachments to Salesforce objects.
        StandardObjectAttachmentConfiguration:
          $ref: "#/components/schemas/SalesforceStandardObjectAttachmentConfiguration"
          description: Configuration information for processing attachments to Salesforce standard objects.
        IncludeAttachmentFilePatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain documents in your Salesforce. Documents that match the patterns are included in the index. Documents that don't match the patterns are excluded from the index. If a document matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the document isn't included in the index. The pattern is applied to the name of the attached file.
        ExcludeAttachmentFilePatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain documents in your Salesforce. Documents that match the patterns are excluded from the index. Documents that don't match the patterns are included in the index. If a document matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the document isn't included in the index. The pattern is applied to the name of the attached file.
      required:
        - ServerUrl
        - SecretArn
    SalesforceStandardObjectConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/SalesforceStandardObjectConfiguration"
    SalesforceStandardObjectConfiguration:
      description: Provides the configuration information for indexing a single standard object.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SalesforceStandardObjectName"
          description: The name of the standard object.
        DocumentDataFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the field in the standard object table that contains the document contents.
        DocumentTitleFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the field in the standard object table that contains the document title.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: Maps attributes or field names of the standard object to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Salesforce fields. For more information, see Mapping data source fields. The Salesforce data source field names must exist in your Salesforce custom metadata.
      required:
        - Name
        - DocumentDataFieldName
    SalesforceStandardObjectName:
      type: string
      enum:
        - ACCOUNT
        - CAMPAIGN
        - CASE
        - CONTACT
        - CONTRACT
        - DOCUMENT
        - GROUP
        - IDEA
        - LEAD
        - OPPORTUNITY
        - PARTNER
        - PRICEBOOK
        - PRODUCT
        - PROFILE
        - SOLUTION
        - TASK
        - USER
    SalesforceKnowledgeArticleConfiguration:
      description: Provides the configuration information for the knowledge article types that Amazon Kendra indexes. Amazon Kendra indexes standard knowledge articles and the standard fields of knowledge articles, or the custom fields of custom knowledge articles, but not both
      type: object
      properties:
        IncludedStates:
          $ref: "#/components/schemas/SalesforceKnowledgeArticleStateList"
          description: Specifies the document states that should be included when Amazon Kendra indexes knowledge articles. You must specify at least one state.
        StandardKnowledgeArticleTypeConfiguration:
          $ref: "#/components/schemas/SalesforceStandardKnowledgeArticleTypeConfiguration"
          description: Configuration information for standard Salesforce knowledge articles.
        CustomKnowledgeArticleTypeConfigurations:
          $ref: "#/components/schemas/SalesforceCustomKnowledgeArticleTypeConfigurationList"
          description: Configuration information for custom Salesforce knowledge articles.
      required:
        - IncludedStates
    SalesforceKnowledgeArticleStateList:
      type: array
      items:
        $ref: "#/components/schemas/SalesforceKnowledgeArticleState"
    SalesforceKnowledgeArticleState:
      type: string
      enum:
        - DRAFT
        - PUBLISHED
        - ARCHIVED
    SalesforceStandardKnowledgeArticleTypeConfiguration:
      description: Provides the configuration information for standard Salesforce knowledge articles.
      type: object
      properties:
        DocumentDataFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the field that contains the document data to index.
        DocumentTitleFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the field that contains the document title.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: Maps attributes or field names of the knowledge article to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Salesforce fields. For more information, see Mapping data source fields. The Salesforce data source field names must exist in your Salesforce custom metadata.
      required:
        - DocumentDataFieldName
    SalesforceCustomKnowledgeArticleTypeConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/SalesforceCustomKnowledgeArticleTypeConfiguration"
    SalesforceCustomKnowledgeArticleTypeConfiguration:
      description: Provides the configuration information for indexing Salesforce custom articles.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SalesforceCustomKnowledgeArticleTypeName"
          description: The name of the configuration.
        DocumentDataFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the field in the custom knowledge article that contains the document data to index.
        DocumentTitleFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the field in the custom knowledge article that contains the document title.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: Maps attributes or field names of the custom knowledge article to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Salesforce fields. For more information, see Mapping data source fields. The Salesforce data source field names must exist in your Salesforce custom metadata.
      required:
        - Name
        - DocumentDataFieldName
    SalesforceCustomKnowledgeArticleTypeName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
    SalesforceChatterFeedConfiguration:
      description: The configuration information for syncing a Salesforce chatter feed. The contents of the object comes from the Salesforce FeedItem table.
      type: object
      properties:
        DocumentDataFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the column in the Salesforce FeedItem table that contains the content to index. Typically this is the Body column.
        DocumentTitleFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the column in the Salesforce FeedItem table that contains the title of the document. This is typically the Title column.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: Maps fields from a Salesforce chatter feed into Amazon Kendra index fields.
        IncludeFilterTypes:
          $ref: "#/components/schemas/SalesforceChatterFeedIncludeFilterTypes"
          description: Filters the documents in the feed based on status of the user. When you specify ACTIVE_USERS only documents from users who have an active account are indexed. When you specify STANDARD_USER only documents for Salesforce standard users are documented. You can specify both.
      required:
        - DocumentDataFieldName
    SalesforceChatterFeedIncludeFilterTypes:
      type: array
      items:
        $ref: "#/components/schemas/SalesforceChatterFeedIncludeFilterType"
    SalesforceChatterFeedIncludeFilterType:
      type: string
      enum:
        - ACTIVE_USER
        - STANDARD_USER
    SalesforceStandardObjectAttachmentConfiguration:
      description: Provides the configuration information for processing attachments to Salesforce standard objects.
      type: object
      properties:
        DocumentTitleFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the field used for the document title.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: One or more objects that map fields in attachments to Amazon Kendra index fields.
    OneDriveConfiguration:
      description: Provides the configuration information to connect to OneDrive as your data source.
      type: object
      properties:
        TenantDomain:
          $ref: "#/components/schemas/TenantDomain"
          description: The Azure Active Directory domain of the organization.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of an Secrets Managersecret that contains the user name and password to connect to OneDrive. The user name should be the application ID for the OneDrive application, and the password is the application key for the OneDrive application.
        OneDriveUsers:
          $ref: "#/components/schemas/OneDriveUsers"
          description: A list of user accounts whose documents should be indexed.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain documents in your OneDrive. Documents that match the patterns are included in the index. Documents that don't match the patterns are excluded from the index. If a document matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the document isn't included in the index. The pattern is applied to the file name.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain documents in your OneDrive. Documents that match the patterns are excluded from the index. Documents that don't match the patterns are included in the index. If a document matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the document isn't included in the index. The pattern is applied to the file name.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map OneDrive data source attributes or field names to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to OneDrive fields. For more information, see Mapping data source fields. The OneDrive data source field names must exist in your OneDrive custom metadata.
        DisableLocalGroups:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to disable local groups information.
      required:
        - TenantDomain
        - SecretArn
        - OneDriveUsers
    TenantDomain:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^([a-zA-Z0-9]+(-[a-zA-Z0-9]+)*\.)+[a-z]{2,}$
    OneDriveUsers:
      description: User accounts whose documents should be indexed.
      type: object
      properties:
        OneDriveUserList:
          $ref: "#/components/schemas/OneDriveUserList"
          description: A list of users whose documents should be indexed. Specify the user names in email format, for example, username@tenantdomain. If you need to index the documents of more than 10 users, use the OneDriveUserS3Path field to specify the location of a file containing a list of users.
        OneDriveUserS3Path:
          $ref: "#/components/schemas/S3Path"
          description: The S3 bucket location of a file containing a list of users whose documents should be indexed.
    OneDriveUserList:
      type: array
      items:
        $ref: "#/components/schemas/OneDriveUser"
    OneDriveUser:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^(?!\s).+@([a-zA-Z0-9_\-\.]+)\.([a-zA-Z]{2,5})$
    ServiceNowConfiguration:
      description: Provides the configuration information to connect to ServiceNow as your data source.
      type: object
      properties:
        HostUrl:
          $ref: "#/components/schemas/ServiceNowHostUrl"
          description: "The ServiceNow instance that the data source connects to. The host endpoint should look like the following: {instance}.service-now.com."
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of the Secrets Manager secret that contains the user name and password required to connect to the ServiceNow instance. You can also provide OAuth authentication credentials of user name, password, client ID, and client secret. For more information, see Using a ServiceNow data source.
        ServiceNowBuildVersion:
          $ref: "#/components/schemas/ServiceNowBuildVersionType"
          description: The identifier of the release that the ServiceNow host is running. If the host is not running the LONDON release, use OTHERS.
        KnowledgeArticleConfiguration:
          $ref: "#/components/schemas/ServiceNowKnowledgeArticleConfiguration"
          description: Configuration information for crawling knowledge articles in the ServiceNow site.
        ServiceCatalogConfiguration:
          $ref: "#/components/schemas/ServiceNowServiceCatalogConfiguration"
          description: Configuration information for crawling service catalogs in the ServiceNow site.
        AuthenticationType:
          $ref: "#/components/schemas/ServiceNowAuthenticationType"
          description: The type of authentication used to connect to the ServiceNow instance. If you choose HTTP_BASIC, Amazon Kendra is authenticated using the user name and password provided in the Secrets Manager secret in the SecretArn field. If you choose OAUTH2, Amazon Kendra is authenticated using the credentials of client ID, client secret, user name and password. When you use OAUTH2 authentication, you must generate a token and a client secret using the ServiceNow console. For more information, see Using a ServiceNow data source.
      required:
        - HostUrl
        - SecretArn
        - ServiceNowBuildVersion
    ServiceNowHostUrl:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(?!(^(https?|ftp|file):\/\/))[a-z0-9-]+(\.service-now\.com)$
    ServiceNowBuildVersionType:
      type: string
      enum:
        - LONDON
        - OTHERS
    ServiceNowKnowledgeArticleConfiguration:
      description: Provides the configuration information for crawling knowledge articles in the ServiceNow site.
      type: object
      properties:
        CrawlAttachments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index attachments to knowledge articles.
        IncludeAttachmentFilePatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns applied to include knowledge article attachments. Attachments that match the patterns are included in the index. Items that don't match the patterns are excluded from the index. If an item matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the item isn't included in the index.
        ExcludeAttachmentFilePatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns applied to exclude certain knowledge article attachments. Attachments that match the patterns are excluded from the index. Items that don't match the patterns are included in the index. If an item matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the item isn't included in the index.
        DocumentDataFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the ServiceNow field that is mapped to the index document contents field in the Amazon Kendra index.
        DocumentTitleFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the ServiceNow field that is mapped to the index document title field.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: Maps attributes or field names of knoweldge articles to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to ServiceNow fields. For more information, see Mapping data source fields. The ServiceNow data source field names must exist in your ServiceNow custom metadata.
        FilterQuery:
          $ref: "#/components/schemas/ServiceNowKnowledgeArticleFilterQuery"
          description: A query that selects the knowledge articles to index. The query can return articles from multiple knowledge bases, and the knowledge bases can be public or private. The query string must be one generated by the ServiceNow console. For more information, see Specifying documents to index with a query.
      required:
        - DocumentDataFieldName
    ServiceNowKnowledgeArticleFilterQuery:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^\P{C}*$
    ServiceNowServiceCatalogConfiguration:
      description: Provides the configuration information for crawling service catalog items in the ServiceNow site
      type: object
      properties:
        CrawlAttachments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index attachments to service catalog items.
        IncludeAttachmentFilePatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain attachments of catalogs in your ServiceNow. Item that match the patterns are included in the index. Items that don't match the patterns are excluded from the index. If an item matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the item isn't included in the index. The regex is applied to the file name of the attachment.
        ExcludeAttachmentFilePatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain attachments of catalogs in your ServiceNow. Item that match the patterns are excluded from the index. Items that don't match the patterns are included in the index. If an item matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the item isn't included in the index. The regex is applied to the file name of the attachment.
        DocumentDataFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the ServiceNow field that is mapped to the index document contents field in the Amazon Kendra index.
        DocumentTitleFieldName:
          $ref: "#/components/schemas/DataSourceFieldName"
          description: The name of the ServiceNow field that is mapped to the index document title field.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: Maps attributes or field names of catalogs to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to ServiceNow fields. For more information, see Mapping data source fields. The ServiceNow data source field names must exist in your ServiceNow custom metadata.
      required:
        - DocumentDataFieldName
    ServiceNowAuthenticationType:
      type: string
      enum:
        - HTTP_BASIC
        - OAUTH2
    ConfluenceConfiguration:
      description: Provides the configuration information to connect to Confluence as your data source.
      type: object
      properties:
        ServerUrl:
          $ref: "#/components/schemas/Url"
          description: The URL of your Confluence instance. Use the full URL of the server. For example, https://server.example.com:port/. You can also use an IP address, for example, https://192.168.1.113/.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of an Secrets Manager secret that contains the user name and password required to connect to the Confluence instance. If you use Confluence Cloud, you use a generated API token as the password. You can also provide authentication credentials in the form of a personal access token. For more information, see Using a Confluence data source.
        Version:
          $ref: "#/components/schemas/ConfluenceVersion"
          description: The version or the type of Confluence installation to connect to.
        SpaceConfiguration:
          $ref: "#/components/schemas/ConfluenceSpaceConfiguration"
          description: Configuration information for indexing Confluence spaces.
        PageConfiguration:
          $ref: "#/components/schemas/ConfluencePageConfiguration"
          description: Configuration information for indexing Confluence pages.
        BlogConfiguration:
          $ref: "#/components/schemas/ConfluenceBlogConfiguration"
          description: Configuration information for indexing Confluence blogs.
        AttachmentConfiguration:
          $ref: "#/components/schemas/ConfluenceAttachmentConfiguration"
          description: Configuration information for indexing attachments to Confluence blogs and pages.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information for an Amazon Virtual Private Cloud to connect to your Confluence. For more information, see Configuring a VPC.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain blog posts, pages, spaces, or attachments in your Confluence. Content that matches the patterns are included in the index. Content that doesn't match the patterns is excluded from the index. If content matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the content isn't included in the index.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain blog posts, pages, spaces, or attachments in your Confluence. Content that matches the patterns are excluded from the index. Content that doesn't match the patterns is included in the index. If content matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the content isn't included in the index.
        ProxyConfiguration:
          $ref: "#/components/schemas/ProxyConfiguration"
          description: Configuration information to connect to your Confluence URL instance via a web proxy. You can use this option for Confluence Server. You must provide the website host name and port number. For example, the host name of https://a.example.com/page1.html is "a.example.com" and the port is 443, the standard port for HTTPS. Web proxy credentials are optional and you can use them to connect to a web proxy server that requires basic authentication of user name and password. To store web proxy credentials, you use a secret in Secrets Manager. It is recommended that you follow best security practices when configuring your web proxy. This includes setting up throttling, setting up logging and monitoring, and applying security patches on a regular basis. If you use your web proxy with multiple data sources, sync jobs that occur at the same time could strain the load on your proxy. It is recommended you prepare your proxy beforehand for any security and load requirements.
        AuthenticationType:
          $ref: "#/components/schemas/ConfluenceAuthenticationType"
          description: Whether you want to connect to Confluence using basic authentication of user name and password, or a personal access token. You can use a personal access token for Confluence Server.
      required:
        - ServerUrl
        - SecretArn
        - Version
    ConfluenceVersion:
      type: string
      enum:
        - CLOUD
        - SERVER
    ConfluenceSpaceConfiguration:
      description: Configuration information for indexing Confluence spaces.
      type: object
      properties:
        CrawlPersonalSpaces:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index personal spaces. You can add restrictions to items in personal spaces. If personal spaces are indexed, queries without user context information may return restricted items from a personal space in their results. For more information, see Filtering on user context.
        CrawlArchivedSpaces:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index archived spaces.
        IncludeSpaces:
          $ref: "#/components/schemas/ConfluenceSpaceList"
          description: A list of space keys for Confluence spaces. If you include a key, the blogs, documents, and attachments in the space are indexed. Spaces that aren't in the list aren't indexed. A space in the list must exist. Otherwise, Amazon Kendra logs an error when the data source is synchronized. If a space is in both the IncludeSpaces and the ExcludeSpaces list, the space is excluded.
        ExcludeSpaces:
          $ref: "#/components/schemas/ConfluenceSpaceList"
          description: A list of space keys of Confluence spaces. If you include a key, the blogs, documents, and attachments in the space are not indexed. If a space is in both the ExcludeSpaces and the IncludeSpaces list, the space is excluded.
        SpaceFieldMappings:
          $ref: "#/components/schemas/ConfluenceSpaceFieldMappingsList"
          description: Maps attributes or field names of Confluence spaces to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Confluence fields. For more information, see Mapping data source fields. The Confluence data source field names must exist in your Confluence custom metadata. If you specify the SpaceFieldMappings parameter, you must specify at least one field mapping.
    ConfluenceSpaceList:
      type: array
      items:
        $ref: "#/components/schemas/ConfluenceSpaceIdentifier"
    ConfluenceSpaceIdentifier:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^\P{C}*$
    ConfluenceSpaceFieldMappingsList:
      type: array
      items:
        $ref: "#/components/schemas/ConfluenceSpaceToIndexFieldMapping"
    ConfluenceSpaceToIndexFieldMapping:
      description: Maps attributes or field names of Confluence spaces to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Confluence fields. For more information, see Mapping data source fields. The Confluence data source field names must exist in your Confluence custom metadata.
      type: object
      properties:
        DataSourceFieldName:
          $ref: "#/components/schemas/ConfluenceSpaceFieldName"
          description: The name of the field in the data source.
        DateFieldFormat:
          $ref: "#/components/schemas/DataSourceDateFieldFormat"
          description: The format for date fields in the data source. If the field specified in DataSourceFieldName is a date field you must specify the date format. If the field is not a date field, an exception is thrown.
        IndexFieldName:
          $ref: "#/components/schemas/IndexFieldName"
          description: The name of the index field to map to the Confluence data source field. The index field type must match the Confluence field type.
    ConfluenceSpaceFieldName:
      type: string
      enum:
        - DISPLAY_URL
        - ITEM_TYPE
        - SPACE_KEY
        - URL
    ConfluencePageConfiguration:
      description: Configuration of the page settings for the Confluence data source.
      type: object
      properties:
        PageFieldMappings:
          $ref: "#/components/schemas/ConfluencePageFieldMappingsList"
          description: Maps attributes or field names of Confluence pages to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Confluence fields. For more information, see Mapping data source fields. The Confluence data source field names must exist in your Confluence custom metadata. If you specify the PageFieldMappings parameter, you must specify at least one field mapping.
    ConfluencePageFieldMappingsList:
      type: array
      items:
        $ref: "#/components/schemas/ConfluencePageToIndexFieldMapping"
    ConfluencePageToIndexFieldMapping:
      description: Maps attributes or field names of Confluence pages to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Confluence fields. For more information, see Mapping data source fields. The Confluence data source field names must exist in your Confluence custom metadata.
      type: object
      properties:
        DataSourceFieldName:
          $ref: "#/components/schemas/ConfluencePageFieldName"
          description: The name of the field in the data source.
        DateFieldFormat:
          $ref: "#/components/schemas/DataSourceDateFieldFormat"
          description: The format for date fields in the data source. If the field specified in DataSourceFieldName is a date field you must specify the date format. If the field is not a date field, an exception is thrown.
        IndexFieldName:
          $ref: "#/components/schemas/IndexFieldName"
          description: The name of the index field to map to the Confluence data source field. The index field type must match the Confluence field type.
    ConfluencePageFieldName:
      type: string
      enum:
        - AUTHOR
        - CONTENT_STATUS
        - CREATED_DATE
        - DISPLAY_URL
        - ITEM_TYPE
        - LABELS
        - MODIFIED_DATE
        - PARENT_ID
        - SPACE_KEY
        - SPACE_NAME
        - URL
        - VERSION
    ConfluenceBlogConfiguration:
      description: Configuration of blog settings for the Confluence data source. Blogs are always indexed unless filtered from the index by the ExclusionPatterns or InclusionPatterns fields in the ConfluenceConfiguration object.
      type: object
      properties:
        BlogFieldMappings:
          $ref: "#/components/schemas/ConfluenceBlogFieldMappingsList"
          description: Maps attributes or field names of Confluence blogs to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Confluence fields. For more information, see Mapping data source fields. The Confluence data source field names must exist in your Confluence custom metadata. If you specify the BlogFieldMappings parameter, you must specify at least one field mapping.
    ConfluenceBlogFieldMappingsList:
      type: array
      items:
        $ref: "#/components/schemas/ConfluenceBlogToIndexFieldMapping"
    ConfluenceBlogToIndexFieldMapping:
      description: Maps attributes or field names of Confluence blog to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Confluence fields. For more information, see Mapping data source fields. The Confluence data source field names must exist in your Confluence custom metadata.
      type: object
      properties:
        DataSourceFieldName:
          $ref: "#/components/schemas/ConfluenceBlogFieldName"
          description: The name of the field in the data source.
        DateFieldFormat:
          $ref: "#/components/schemas/DataSourceDateFieldFormat"
          description: The format for date fields in the data source. If the field specified in DataSourceFieldName is a date field you must specify the date format. If the field is not a date field, an exception is thrown.
        IndexFieldName:
          $ref: "#/components/schemas/IndexFieldName"
          description: The name of the index field to map to the Confluence data source field. The index field type must match the Confluence field type.
    ConfluenceBlogFieldName:
      type: string
      enum:
        - AUTHOR
        - DISPLAY_URL
        - ITEM_TYPE
        - LABELS
        - PUBLISH_DATE
        - SPACE_KEY
        - SPACE_NAME
        - URL
        - VERSION
    ConfluenceAttachmentConfiguration:
      description: Configuration of attachment settings for the Confluence data source. Attachment settings are optional, if you don't specify settings attachments, Amazon Kendra won't index them.
      type: object
      properties:
        CrawlAttachments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index attachments of pages and blogs in Confluence.
        AttachmentFieldMappings:
          $ref: "#/components/schemas/ConfluenceAttachmentFieldMappingsList"
          description: Maps attributes or field names of Confluence attachments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Confluence fields. For more information, see Mapping data source fields. The Confluence data source field names must exist in your Confluence custom metadata. If you specify the AttachentFieldMappings parameter, you must specify at least one field mapping.
    ConfluenceAttachmentFieldMappingsList:
      type: array
      items:
        $ref: "#/components/schemas/ConfluenceAttachmentToIndexFieldMapping"
    ConfluenceAttachmentToIndexFieldMapping:
      description: Maps attributes or field names of Confluence attachments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Confluence fields. For more information, see Mapping data source fields. The Confuence data source field names must exist in your Confluence custom metadata.
      type: object
      properties:
        DataSourceFieldName:
          $ref: "#/components/schemas/ConfluenceAttachmentFieldName"
          description: The name of the field in the data source. You must first create the index field using the UpdateIndex API.
        DateFieldFormat:
          $ref: "#/components/schemas/DataSourceDateFieldFormat"
          description: The format for date fields in the data source. If the field specified in DataSourceFieldName is a date field you must specify the date format. If the field is not a date field, an exception is thrown.
        IndexFieldName:
          $ref: "#/components/schemas/IndexFieldName"
          description: The name of the index field to map to the Confluence data source field. The index field type must match the Confluence field type.
    ConfluenceAttachmentFieldName:
      type: string
      enum:
        - AUTHOR
        - CONTENT_TYPE
        - CREATED_DATE
        - DISPLAY_URL
        - FILE_SIZE
        - ITEM_TYPE
        - PARENT_ID
        - SPACE_KEY
        - SPACE_NAME
        - URL
        - VERSION
    ConfluenceAuthenticationType:
      type: string
      enum:
        - HTTP_BASIC
        - PAT
    GoogleDriveConfiguration:
      description: Provides the configuration information to connect to Google Drive as your data source.
      type: object
      properties:
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of a Secrets Managersecret that contains the credentials required to connect to Google Drive. For more information, see Using a Google Workspace Drive data source.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain items in your Google Drive, including shared drives and users' My Drives. Items that match the patterns are included in the index. Items that don't match the patterns are excluded from the index. If an item matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the item isn't included in the index.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain items in your Google Drive, including shared drives and users' My Drives. Items that match the patterns are excluded from the index. Items that don't match the patterns are included in the index. If an item matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the item isn't included in the index.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: Maps Google Drive data source attributes or field names to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Google Drive fields. For more information, see Mapping data source fields. The Google Drive data source field names must exist in your Google Drive custom metadata.
        ExcludeMimeTypes:
          $ref: "#/components/schemas/ExcludeMimeTypesList"
          description: A list of MIME types to exclude from the index. All documents matching the specified MIME type are excluded. For a list of MIME types, see Using a Google Workspace Drive data source.
        ExcludeUserAccounts:
          $ref: "#/components/schemas/ExcludeUserAccountsList"
          description: A list of email addresses of the users. Documents owned by these users are excluded from the index. Documents shared with excluded users are indexed unless they are excluded in another way.
        ExcludeSharedDrives:
          $ref: "#/components/schemas/ExcludeSharedDrivesList"
          description: A list of identifiers or shared drives to exclude from the index. All files and folders stored on the shared drive are excluded.
      required:
        - SecretArn
    ExcludeMimeTypesList:
      type: array
      items:
        $ref: "#/components/schemas/MimeType"
    MimeType:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^\P{C}*$
    ExcludeUserAccountsList:
      type: array
      items:
        $ref: "#/components/schemas/UserAccount"
    UserAccount:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^\P{C}*$
    ExcludeSharedDrivesList:
      type: array
      items:
        $ref: "#/components/schemas/SharedDriveId"
    SharedDriveId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^\P{C}*$
    WebCrawlerConfiguration:
      description: Provides the configuration information required for Amazon Kendra Web Crawler.
      type: object
      properties:
        Urls:
          $ref: "#/components/schemas/Urls"
          description: Specifies the seed or starting point URLs of the websites or the sitemap URLs of the websites you want to crawl. You can include website subdomains. You can list up to 100 seed URLs and up to three sitemap URLs. You can only crawl websites that use the secure communication protocol, Hypertext Transfer Protocol Secure (HTTPS). If you receive an error when crawling a website, it could be that the website is blocked from crawling. When selecting websites to index, you must adhere to the Amazon Acceptable Use Policy and all other Amazon terms. Remember that you must only use Amazon Kendra Web Crawler to index your own web pages, or web pages that you have authorization to index.
        CrawlDepth:
          $ref: "#/components/schemas/CrawlDepth"
          description: The 'depth' or number of levels from the seed level to crawl. For example, the seed URL page is depth 1 and any hyperlinks on this page that are also crawled are depth 2.
        MaxLinksPerPage:
          $ref: "#/components/schemas/MaxLinksPerPage"
          description: The maximum number of URLs on a web page to include when crawling a website. This number is per web page. As a website’s web pages are crawled, any URLs the web pages link to are also crawled. URLs on a web page are crawled in order of appearance. The default maximum links per page is 100.
        MaxContentSizePerPageInMegaBytes:
          $ref: "#/components/schemas/MaxContentSizePerPageInMegaBytes"
          description: The maximum size (in MB) of a web page or attachment to crawl. Files larger than this size (in MB) are skipped/not crawled. The default maximum size of a web page or attachment is set to 50 MB.
        MaxUrlsPerMinuteCrawlRate:
          $ref: "#/components/schemas/MaxUrlsPerMinuteCrawlRate"
          description: The maximum number of URLs crawled per website host per minute. A minimum of one URL is required. The default maximum number of URLs crawled per website host per minute is 300.
        UrlInclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain URLs to crawl. URLs that match the patterns are included in the index. URLs that don't match the patterns are excluded from the index. If a URL matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the URL file isn't included in the index.
        UrlExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain URLs to crawl. URLs that match the patterns are excluded from the index. URLs that don't match the patterns are included in the index. If a URL matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the URL file isn't included in the index.
        ProxyConfiguration:
          $ref: "#/components/schemas/ProxyConfiguration"
          description: Configuration information required to connect to your internal websites via a web proxy. You must provide the website host name and port number. For example, the host name of https://a.example.com/page1.html is "a.example.com" and the port is 443, the standard port for HTTPS. Web proxy credentials are optional and you can use them to connect to a web proxy server that requires basic authentication. To store web proxy credentials, you use a secret in Secrets Manager.
        AuthenticationConfiguration:
          $ref: "#/components/schemas/AuthenticationConfiguration"
          description: Configuration information required to connect to websites using authentication. You can connect to websites using basic authentication of user name and password. You use a secret in Secrets Manager to store your authentication credentials. You must provide the website host name and port number. For example, the host name of https://a.example.com/page1.html is "a.example.com" and the port is 443, the standard port for HTTPS.
      required:
        - Urls
    Urls:
      description: Provides the configuration information of the URLs to crawl. You can only crawl websites that use the secure communication protocol, Hypertext Transfer Protocol Secure (HTTPS). If you receive an error when crawling a website, it could be that the website is blocked from crawling. When selecting websites to index, you must adhere to the Amazon Acceptable Use Policy and all other Amazon terms. Remember that you must only use Amazon Kendra Web Crawler to index your own web pages, or web pages that you have authorization to index.
      type: object
      properties:
        SeedUrlConfiguration:
          $ref: "#/components/schemas/SeedUrlConfiguration"
          description: Configuration of the seed or starting point URLs of the websites you want to crawl. You can choose to crawl only the website host names, or the website host names with subdomains, or the website host names with subdomains and other domains that the web pages link to. You can list up to 100 seed URLs.
        SiteMapsConfiguration:
          $ref: "#/components/schemas/SiteMapsConfiguration"
          description: Configuration of the sitemap URLs of the websites you want to crawl. Only URLs belonging to the same website host names are crawled. You can list up to three sitemap URLs.
    SeedUrlConfiguration:
      description: Provides the configuration information for the seed or starting point URLs to crawl. When selecting websites to index, you must adhere to the Amazon Acceptable Use Policy and all other Amazon terms. Remember that you must only use Amazon Kendra Web Crawler to index your own web pages, or web pages that you have authorization to index.
      type: object
      properties:
        SeedUrls:
          $ref: "#/components/schemas/SeedUrlList"
          description: The list of seed or starting point URLs of the websites you want to crawl. The list can include a maximum of 100 seed URLs.
        WebCrawlerMode:
          $ref: "#/components/schemas/WebCrawlerMode"
          description: 'You can choose one of the following modes: HOST_ONLY—crawl only the website host names. For example, if the seed URL is "abc.example.com", then only URLs with host name "abc.example.com" are crawled. SUBDOMAINS—crawl the website host names with subdomains. For example, if the seed URL is "abc.example.com", then "a.abc.example.com" and "b.abc.example.com" are also crawled. EVERYTHING—crawl the website host names with subdomains and other domains that the web pages link to. The default mode is set to HOST_ONLY.'
      required:
        - SeedUrls
    SeedUrlList:
      type: array
      items:
        $ref: "#/components/schemas/SeedUrl"
    SeedUrl:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(https?):\/\/([^\s]*)
    WebCrawlerMode:
      type: string
      enum:
        - HOST_ONLY
        - SUBDOMAINS
        - EVERYTHING
    SiteMapsConfiguration:
      description: Provides the configuration information for the sitemap URLs to crawl. When selecting websites to index, you must adhere to the Amazon Acceptable Use Policy and all other Amazon terms. Remember that you must only use Amazon Kendra Web Crawler to index your own web pages, or web pages that you have authorization to index.
      type: object
      properties:
        SiteMaps:
          $ref: "#/components/schemas/SiteMapsList"
          description: The list of sitemap URLs of the websites you want to crawl. The list can include a maximum of three sitemap URLs.
      required:
        - SiteMaps
    SiteMapsList:
      type: array
      items:
        $ref: "#/components/schemas/SiteMap"
    SiteMap:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(https?):\/\/([^\s]*)
    CrawlDepth:
      type: integer
      minimum: 0
      maximum: 10
    MaxLinksPerPage:
      type: integer
      minimum: 1
      maximum: 1000
    MaxContentSizePerPageInMegaBytes:
      type: number
      format: float
      minimum: 0.000001
      maximum: 50
    MaxUrlsPerMinuteCrawlRate:
      type: integer
      minimum: 1
      maximum: 300
    AuthenticationConfiguration:
      description: Provides the configuration information to connect to websites that require user authentication.
      type: object
      properties:
        BasicAuthentication:
          $ref: "#/components/schemas/BasicAuthenticationConfigurationList"
          description: The list of configuration information that's required to connect to and crawl a website host using basic authentication credentials. The list includes the name and port number of the website host.
    BasicAuthenticationConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/BasicAuthenticationConfiguration"
    BasicAuthenticationConfiguration:
      description: Provides the configuration information to connect to websites that require basic user authentication.
      type: object
      properties:
        Host:
          $ref: "#/components/schemas/Host"
          description: The name of the website host you want to connect to using authentication credentials. For example, the host name of https://a.example.com/page1.html is "a.example.com".
        Port:
          $ref: "#/components/schemas/Port"
          description: The port number of the website host you want to connect to using authentication credentials. For example, the port for https://a.example.com/page1.html is 443, the standard port for HTTPS.
        Credentials:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of an Secrets Manager secret. You create a secret to store your credentials in Secrets Manager You use a secret if basic authentication credentials are required to connect to a website. The secret stores your credentials of user name and password.
      required:
        - Host
        - Port
        - Credentials
    WorkDocsConfiguration:
      description: Provides the configuration information to connect to Amazon WorkDocs as your data source. Amazon WorkDocs connector is available in Oregon, North Virginia, Sydney, Singapore and Ireland regions.
      type: object
      properties:
        OrganizationId:
          $ref: "#/components/schemas/OrganizationId"
          description: The identifier of the directory corresponding to your Amazon WorkDocs site repository. You can find the organization ID in the Directory Service by going to Active Directory, then Directories. Your Amazon WorkDocs site directory has an ID, which is the organization ID. You can also set up a new Amazon WorkDocs directory in the Directory Service console and enable a Amazon WorkDocs site for the directory in the Amazon WorkDocs console.
        CrawlComments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to include comments on documents in your index. Including comments in your index means each comment is a document that can be searched on. The default is set to FALSE.
        UseChangeLog:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to use the Amazon WorkDocs change log to determine which documents require updating in the index. Depending on the change log's size, it may take longer for Amazon Kendra to use the change log than to scan all of your documents in Amazon WorkDocs.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain files in your Amazon WorkDocs site repository. Files that match the patterns are included in the index. Files that don't match the patterns are excluded from the index. If a file matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain files in your Amazon WorkDocs site repository. Files that match the patterns are excluded from the index. Files that don’t match the patterns are included in the index. If a file matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map Amazon WorkDocs data source attributes or field names to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Amazon WorkDocs fields. For more information, see Mapping data source fields. The Amazon WorkDocs data source field names must exist in your Amazon WorkDocs custom metadata.
      required:
        - OrganizationId
    OrganizationId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: d-[0-9a-fA-F]{10}
    FsxConfiguration:
      description: Provides the configuration information to connect to Amazon FSx as your data source. Amazon Kendra now supports an upgraded Amazon FSx Windows connector. You must now use the TemplateConfiguration object instead of the FsxConfiguration object to configure your connector. Connectors configured using the older console and API architecture will continue to function as configured. However, you won't be able to edit or update them. If you want to edit or update your connector configuration, you must create a new connector. We recommended migrating your connector workflow to the upgraded version. Support for connectors configured using the older architecture is scheduled to end by June 2024.
      type: object
      properties:
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: The identifier of the Amazon FSx file system. You can find your file system ID on the file system dashboard in the Amazon FSx console. For information on how to create a file system in Amazon FSx console, using Windows File Server as an example, see Amazon FSx Getting started guide.
        FileSystemType:
          $ref: "#/components/schemas/FsxFileSystemType"
          description: The Amazon FSx file system type. Windows is currently the only supported type.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information for an Amazon Virtual Private Cloud to connect to your Amazon FSx. Your Amazon FSx instance must reside inside your VPC.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: "The Amazon Resource Name (ARN) of an Secrets Manager secret that contains the key-value pairs required to connect to your Amazon FSx file system. Windows is currently the only supported type. The secret must contain a JSON structure with the following keys: username—The Active Directory user name, along with the Domain Name System (DNS) domain name. For example, user@corp.example.com. The Active Directory user account must have read and mounting access to the Amazon FSx file system for Windows. password—The password of the Active Directory user account with read and mounting access to the Amazon FSx Windows file system."
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain files in your Amazon FSx file system. Files that match the patterns are included in the index. Files that don't match the patterns are excluded from the index. If a file matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain files in your Amazon FSx file system. Files that match the patterns are excluded from the index. Files that don't match the patterns are included in the index. If a file matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map Amazon FSx data source attributes or field names to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Amazon FSx fields. For more information, see Mapping data source fields. The Amazon FSx data source field names must exist in your Amazon FSx custom metadata.
      required:
        - FileSystemId
        - FileSystemType
        - VpcConfiguration
    FileSystemId:
      type: string
      minLength: 11
      maxLength: 21
      pattern: ^(fs-[0-9a-f]{8,})$
    FsxFileSystemType:
      type: string
      enum:
        - WINDOWS
    SlackConfiguration:
      description: Provides the configuration information to connect to Slack as your data source. Amazon Kendra now supports an upgraded Slack connector. You must now use the TemplateConfiguration object instead of the SlackConfiguration object to configure your connector. Connectors configured using the older console and API architecture will continue to function as configured. However, you won’t be able to edit or update them. If you want to edit or update your connector configuration, you must create a new connector. We recommended migrating your connector workflow to the upgraded version. Support for connectors configured using the older architecture is scheduled to end by June 2024.
      type: object
      properties:
        TeamId:
          $ref: "#/components/schemas/TeamId"
          description: The identifier of the team in the Slack workspace. For example, T0123456789. You can find your team ID in the URL of the main page of your Slack workspace. When you log in to Slack via a browser, you are directed to the URL of the main page. For example, https://app.slack.com/client/T0123456789/....
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: "The Amazon Resource Name (ARN) of an Secrets Manager secret that contains the key-value pairs required to connect to your Slack workspace team. The secret must contain a JSON structure with the following keys: slackToken—The user or bot token created in Slack. For more information on creating a token in Slack, see Authentication for a Slack data source."
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information for an Amazon Virtual Private Cloud to connect to your Slack. For more information, see Configuring a VPC.
        SlackEntityList:
          $ref: "#/components/schemas/SlackEntityList"
          description: Specify whether to index public channels, private channels, group messages, and direct messages. You can specify one or more of these options.
        UseChangeLog:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to use the Slack change log to determine which documents require updating in the index. Depending on the Slack change log's size, it may take longer for Amazon Kendra to use the change log than to scan all of your documents in Slack.
        CrawlBotMessage:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index bot messages from your Slack workspace team.
        ExcludeArchived:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to exclude archived messages to index from your Slack workspace team.
        SinceCrawlDate:
          $ref: "#/components/schemas/SinceCrawlDate"
          description: "The date to start crawling your data from your Slack workspace team. The date must follow this format: yyyy-mm-dd."
        LookBackPeriod:
          $ref: "#/components/schemas/LookBackPeriod"
          description: The number of hours for change log to look back from when you last synchronized your data. You can look back up to 7 days or 168 hours. Change log updates your index only if new content was added since you last synced your data. Updated or deleted content from before you last synced does not get updated in your index. To capture updated or deleted content before you last synced, set the LookBackPeriod to the number of hours you want change log to look back.
        PrivateChannelFilter:
          $ref: "#/components/schemas/PrivateChannelFilter"
          description: The list of private channel names from your Slack workspace team. You use this if you want to index specific private channels, not all private channels. You can also use regular expression patterns to filter private channels.
        PublicChannelFilter:
          $ref: "#/components/schemas/PublicChannelFilter"
          description: The list of public channel names to index from your Slack workspace team. You use this if you want to index specific public channels, not all public channels. You can also use regular expression patterns to filter public channels.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain attached files in your Slack workspace team. Files that match the patterns are included in the index. Files that don't match the patterns are excluded from the index. If a file matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain attached files in your Slack workspace team. Files that match the patterns are excluded from the index. Files that don’t match the patterns are included in the index. If a file matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        FieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map Slack data source attributes or field names to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Slack fields. For more information, see Mapping data source fields. The Slack data source field names must exist in your Slack custom metadata.
      required:
        - TeamId
        - SecretArn
        - SlackEntityList
        - SinceCrawlDate
    TeamId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Z0-9]*"
    SlackEntityList:
      type: array
      items:
        $ref: "#/components/schemas/SlackEntity"
    SlackEntity:
      type: string
      enum:
        - PUBLIC_CHANNEL
        - PRIVATE_CHANNEL
        - GROUP_MESSAGE
        - DIRECT_MESSAGE
    SinceCrawlDate:
      type: string
      minLength: 10
      maxLength: 10
      pattern: (20\d{2})-(0?[1-9]|1[0-2])-(0?[1-9]|1\d|2\d|3[01])
    LookBackPeriod:
      type: integer
      minimum: 0
      maximum: 168
    PrivateChannelFilter:
      type: array
      items:
        $ref: "#/components/schemas/String"
    PublicChannelFilter:
      type: array
      items:
        $ref: "#/components/schemas/String"
    BoxConfiguration:
      description: Provides the configuration information to connect to Box as your data source.
      type: object
      properties:
        EnterpriseId:
          $ref: "#/components/schemas/EnterpriseId"
          description: The identifier of the Box Enterprise platform. You can find the enterprise ID in the Box Developer Console settings or when you create an app in Box and download your authentication credentials. For example, 801234567.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: "The Amazon Resource Name (ARN) of an Secrets Manager secret that contains the key-value pairs required to connect to your Box platform. The secret must contain a JSON structure with the following keys: clientID—The identifier of the client OAuth 2.0 authentication application created in Box. clientSecret—A set of characters known only to the OAuth 2.0 authentication application created in Box. publicKeyId—The identifier of the public key contained within an identity certificate. privateKey—A set of characters that make up an encryption key. passphrase—A set of characters that act like a password. You create an application in Box to generate the keys or credentials required for the secret. For more information, see Using a Box data source."
        UseChangeLog:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to use the Slack change log to determine which documents require updating in the index. Depending on the data source change log's size, it may take longer for Amazon Kendra to use the change log than to scan all of your documents.
        CrawlComments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index comments.
        CrawlTasks:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index the contents of tasks.
        CrawlWebLinks:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index web links.
        FileFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Box files to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Box fields. For more information, see Mapping data source fields. The Box field names must exist in your Box custom metadata.
        TaskFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Box tasks to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Box fields. For more information, see Mapping data source fields. The Box field names must exist in your Box custom metadata.
        CommentFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Box comments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Box fields. For more information, see Mapping data source fields. The Box field names must exist in your Box custom metadata.
        WebLinkFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Box web links to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Box fields. For more information, see Mapping data source fields. The Box field names must exist in your Box custom metadata.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain files and folders in your Box platform. Files and folders that match the patterns are included in the index. Files and folders that don't match the patterns are excluded from the index. If a file or folder matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file or folder isn't included in the index.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain files and folders from your Box platform. Files and folders that match the patterns are excluded from the index.Files and folders that don't match the patterns are included in the index. If a file or folder matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file or folder isn't included in the index.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information for an Amazon VPC to connect to your Box. For more information, see Configuring a VPC.
      required:
        - EnterpriseId
        - SecretArn
    EnterpriseId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[A-Z0-9]*$
    QuipConfiguration:
      description: Provides the configuration information to connect to Quip as your data source.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/Domain"
          description: The Quip site domain. For example, https://quip-company.quipdomain.com/browse. The domain in this example is "quipdomain".
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: "The Amazon Resource Name (ARN) of an Secrets Manager secret that contains the key-value pairs that are required to connect to your Quip. The secret must contain a JSON structure with the following keys: accessToken—The token created in Quip. For more information, see Using a Quip data source."
        CrawlFileComments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index file comments.
        CrawlChatRooms:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index the contents of chat rooms.
        CrawlAttachments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index attachments.
        FolderIds:
          $ref: "#/components/schemas/FolderIdList"
          description: The identifiers of the Quip folders you want to index. You can find the folder ID in your browser URL when you access your folder in Quip. For example, https://quip-company.quipdomain.com/zlLuOVNSarTL/folder-name. The folder ID in this example is "zlLuOVNSarTL".
        ThreadFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Quip threads to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Quip fields. For more information, see Mapping data source fields. The Quip field names must exist in your Quip custom metadata.
        MessageFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Quip messages to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Quip fields. For more information, see Mapping data source fields. The Quip field names must exist in your Quip custom metadata.
        AttachmentFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Quip attachments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Quip fields. For more information, see Mapping data source fields. The Quip field names must exist in your Quip custom metadata.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain files in your Quip file system. Files that match the patterns are included in the index. Files that don't match the patterns are excluded from the index. If a file matches both an inclusion pattern and an exclusion pattern, the exclusion pattern takes precedence, and the file isn't included in the index.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain files in your Quip file system. Files that match the patterns are excluded from the index. Files that don’t match the patterns are included in the index. If a file matches both an inclusion pattern and an exclusion pattern, the exclusion pattern takes precedence, and the file isn't included in the index.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information for an Amazon Virtual Private Cloud (VPC) to connect to your Quip. For more information, see Configuring a VPC.
      required:
        - Domain
        - SecretArn
    Domain:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^(?!-)[A-Za-z0-9-].*(?<!-)$
    FolderIdList:
      type: array
      items:
        $ref: "#/components/schemas/FolderId"
    FolderId:
      type: string
      minLength: 1
      maxLength: 500
    JiraConfiguration:
      description: Provides the configuration information to connect to Jira as your data source.
      type: object
      properties:
        JiraAccountUrl:
          $ref: "#/components/schemas/JiraAccountUrl"
          description: The URL of the Jira account. For example, company.atlassian.net.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: "The Amazon Resource Name (ARN) of a secret in Secrets Manager contains the key-value pairs required to connect to your Jira data source. The secret must contain a JSON structure with the following keys: jiraId—The Jira user name or email. jiraCredentials—The Jira API token. For more information, see Using a Jira data source."
        UseChangeLog:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to use the Jira change log to determine which documents require updating in the index. Depending on the change log's size, it may take longer for Amazon Kendra to use the change log than to scan all of your documents in Jira.
        Project:
          $ref: "#/components/schemas/Project"
          description: Specify which projects to crawl in your Jira data source. You can specify one or more Jira project IDs.
        IssueType:
          $ref: "#/components/schemas/IssueType"
          description: Specify which issue types to crawl in your Jira data source. You can specify one or more of these options to crawl.
        Status:
          $ref: "#/components/schemas/JiraStatus"
          description: Specify which statuses to crawl in your Jira data source. You can specify one or more of these options to crawl.
        IssueSubEntityFilter:
          $ref: "#/components/schemas/IssueSubEntityFilter"
          description: Specify whether to crawl comments, attachments, and work logs. You can specify one or more of these options.
        AttachmentFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Jira attachments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Jira fields. For more information, see Mapping data source fields. The Jira data source field names must exist in your Jira custom metadata.
        CommentFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Jira comments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Jira fields. For more information, see Mapping data source fields. The Jira data source field names must exist in your Jira custom metadata.
        IssueFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Jira issues to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Jira fields. For more information, see Mapping data source fields. The Jira data source field names must exist in your Jira custom metadata.
        ProjectFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Jira projects to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Jira fields. For more information, see Mapping data source fields. The Jira data source field names must exist in your Jira custom metadata.
        WorkLogFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Jira work logs to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Jira fields. For more information, see Mapping data source fields. The Jira data source field names must exist in your Jira custom metadata.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain file paths, file names, and file types in your Jira data source. Files that match the patterns are included in the index. Files that don't match the patterns are excluded from the index. If a file matches both an inclusion pattern and an exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain file paths, file names, and file types in your Jira data source. Files that match the patterns are excluded from the index. Files that don’t match the patterns are included in the index. If a file matches both an inclusion pattern and an exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information for an Amazon Virtual Private Cloud to connect to your Jira. For more information, see Configuring a VPC.
      required:
        - JiraAccountUrl
        - SecretArn
    JiraAccountUrl:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^https:\/\/[a-zA-Z0-9_\-\.]+(\.atlassian\.net\/)$
    Project:
      type: array
      items:
        $ref: "#/components/schemas/String"
    IssueType:
      type: array
      items:
        $ref: "#/components/schemas/String"
    JiraStatus:
      type: array
      items:
        $ref: "#/components/schemas/String"
    IssueSubEntityFilter:
      type: array
      items:
        $ref: "#/components/schemas/IssueSubEntity"
    IssueSubEntity:
      type: string
      enum:
        - COMMENTS
        - ATTACHMENTS
        - WORKLOGS
    GitHubConfiguration:
      description: Provides the configuration information to connect to GitHub as your data source. Amazon Kendra now supports an upgraded GitHub connector. You must now use the TemplateConfiguration object instead of the GitHubConfiguration object to configure your connector. Connectors configured using the older console and API architecture will continue to function as configured. However, you won’t be able to edit or update them. If you want to edit or update your connector configuration, you must create a new connector. We recommended migrating your connector workflow to the upgraded version. Support for connectors configured using the older architecture is scheduled to end by June 2024.
      type: object
      properties:
        SaaSConfiguration:
          $ref: "#/components/schemas/SaaSConfiguration"
          description: Configuration information to connect to GitHub Enterprise Cloud (SaaS).
        OnPremiseConfiguration:
          $ref: "#/components/schemas/OnPremiseConfiguration"
          description: Configuration information to connect to GitHub Enterprise Server (on premises).
        Type:
          $ref: "#/components/schemas/Type"
          description: The type of GitHub service you want to connect to—GitHub Enterprise Cloud (SaaS) or GitHub Enterprise Server (on premises).
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: "The Amazon Resource Name (ARN) of an Secrets Manager secret that contains the key-value pairs required to connect to your GitHub. The secret must contain a JSON structure with the following keys: personalToken—The access token created in GitHub. For more information on creating a token in GitHub, see Using a GitHub data source."
        UseChangeLog:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to use the GitHub change log to determine which documents require updating in the index. Depending on the GitHub change log's size, it may take longer for Amazon Kendra to use the change log than to scan all of your documents in GitHub.
        GitHubDocumentCrawlProperties:
          $ref: "#/components/schemas/GitHubDocumentCrawlProperties"
          description: Configuration information to include certain types of GitHub content. You can configure to index repository files only, or also include issues and pull requests, comments, and comment attachments.
        RepositoryFilter:
          $ref: "#/components/schemas/RepositoryNames"
          description: A list of names of the specific repositories you want to index.
        InclusionFolderNamePatterns:
          $ref: "#/components/schemas/StringList"
          description: A list of regular expression patterns to include certain folder names in your GitHub repository or repositories. Folder names that match the patterns are included in the index. Folder names that don't match the patterns are excluded from the index. If a folder matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the folder isn't included in the index.
        InclusionFileTypePatterns:
          $ref: "#/components/schemas/StringList"
          description: A list of regular expression patterns to include certain file types in your GitHub repository or repositories. File types that match the patterns are included in the index. File types that don't match the patterns are excluded from the index. If a file matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        InclusionFileNamePatterns:
          $ref: "#/components/schemas/StringList"
          description: A list of regular expression patterns to include certain file names in your GitHub repository or repositories. File names that match the patterns are included in the index. File names that don't match the patterns are excluded from the index. If a file matches both an inclusion and exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        ExclusionFolderNamePatterns:
          $ref: "#/components/schemas/StringList"
          description: A list of regular expression patterns to exclude certain folder names in your GitHub repository or repositories. Folder names that match the patterns are excluded from the index. Folder names that don't match the patterns are included in the index. If a folder matches both an exclusion and inclusion pattern, the exclusion pattern takes precedence and the folder isn't included in the index.
        ExclusionFileTypePatterns:
          $ref: "#/components/schemas/StringList"
          description: A list of regular expression patterns to exclude certain file types in your GitHub repository or repositories. File types that match the patterns are excluded from the index. File types that don't match the patterns are included in the index. If a file matches both an exclusion and inclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        ExclusionFileNamePatterns:
          $ref: "#/components/schemas/StringList"
          description: A list of regular expression patterns to exclude certain file names in your GitHub repository or repositories. File names that match the patterns are excluded from the index. File names that don't match the patterns are included in the index. If a file matches both an exclusion and inclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information of an Amazon Virtual Private Cloud to connect to your GitHub. For more information, see Configuring a VPC.
        GitHubRepositoryConfigurationFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map GitHub repository attributes or field names to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to GitHub fields. For more information, see Mapping data source fields. The GitHub data source field names must exist in your GitHub custom metadata.
        GitHubCommitConfigurationFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of GitHub commits to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to GitHub fields. For more information, see Mapping data source fields. The GitHub data source field names must exist in your GitHub custom metadata.
        GitHubIssueDocumentConfigurationFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of GitHub issues to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to GitHub fields. For more information, see Mapping data source fields. The GitHub data source field names must exist in your GitHub custom metadata.
        GitHubIssueCommentConfigurationFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of GitHub issue comments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to GitHub fields. For more information, see Mapping data source fields. The GitHub data source field names must exist in your GitHub custom metadata.
        GitHubIssueAttachmentConfigurationFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of GitHub issue attachments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to GitHub fields. For more information, see Mapping data source fields. The GitHub data source field names must exist in your GitHub custom metadata.
        GitHubPullRequestCommentConfigurationFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of GitHub pull request comments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to GitHub fields. For more information, see Mapping data source fields. The GitHub data source field names must exist in your GitHub custom metadata.
        GitHubPullRequestDocumentConfigurationFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of GitHub pull requests to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to GitHub fields. For more information, see Mapping data source fields. The GitHub data source field names must exist in your GitHub custom metadata.
        GitHubPullRequestDocumentAttachmentConfigurationFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of GitHub pull request attachments to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to GitHub fields. For more information, see Mapping data source fields. The GitHub data source field names must exist in your GitHub custom metadata.
      required:
        - SecretArn
    SaaSConfiguration:
      description: Provides the configuration information to connect to GitHub Enterprise Cloud (SaaS).
      type: object
      properties:
        OrganizationName:
          $ref: "#/components/schemas/OrganizationName"
          description: The name of the organization of the GitHub Enterprise Cloud (SaaS) account you want to connect to. You can find your organization name by logging into GitHub desktop and selecting Your organizations under your profile picture dropdown.
        HostUrl:
          $ref: "#/components/schemas/Url"
          description: The GitHub host URL or API endpoint URL. For example, https://api.github.com.
      required:
        - OrganizationName
        - HostUrl
    OrganizationName:
      type: string
      minLength: 1
      maxLength: 60
      pattern: ^[A-Za-z0-9_.-]+$
    OnPremiseConfiguration:
      description: Provides the configuration information to connect to GitHub Enterprise Server (on premises).
      type: object
      properties:
        HostUrl:
          $ref: "#/components/schemas/Url"
          description: The GitHub host URL or API endpoint URL. For example, https://on-prem-host-url/api/v3/
        OrganizationName:
          $ref: "#/components/schemas/OrganizationName"
          description: The name of the organization of the GitHub Enterprise Server (on-premises) account you want to connect to. You can find your organization name by logging into GitHub desktop and selecting Your organizations under your profile picture dropdown.
        SslCertificateS3Path:
          $ref: "#/components/schemas/S3Path"
          description: The path to the SSL certificate stored in an Amazon S3 bucket. You use this to connect to GitHub if you require a secure SSL connection. You can simply generate a self-signed X509 certificate on any computer using OpenSSL. For an example of using OpenSSL to create an X509 certificate, see Create and sign an X509 certificate.
      required:
        - HostUrl
        - OrganizationName
        - SslCertificateS3Path
    Type:
      type: string
      enum:
        - SAAS
        - ON_PREMISE
    GitHubDocumentCrawlProperties:
      description: Provides the configuration information to include certain types of GitHub content. You can configure to index repository files only, or also include issues and pull requests, comments, and comment attachments.
      type: object
      properties:
        CrawlRepositoryDocuments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index all files with a repository.
        CrawlIssue:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index all issues within a repository.
        CrawlIssueComment:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index all comments on issues.
        CrawlIssueCommentAttachment:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to include all comment attachments for issues.
        CrawlPullRequest:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index all pull requests within a repository.
        CrawlPullRequestComment:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index all comments on pull requests.
        CrawlPullRequestCommentAttachment:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to include all comment attachments for pull requests.
    RepositoryNames:
      type: array
      items:
        $ref: "#/components/schemas/RepositoryName"
    RepositoryName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[A-Za-z0-9_.-]+$
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    AlfrescoConfiguration:
      description: Provides the configuration information to connect to Alfresco as your data source. Support for AlfrescoConfiguration ended May 2023. We recommend migrating to or using the Alfresco data source template schema / TemplateConfiguration API.
      type: object
      properties:
        SiteUrl:
          $ref: "#/components/schemas/SiteUrl"
          description: The URL of the Alfresco site. For example, https://hostname:8080.
        SiteId:
          $ref: "#/components/schemas/SiteId"
          description: The identifier of the Alfresco site. For example, my-site.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: "The Amazon Resource Name (ARN) of an Secrets Manager secret that contains the key-value pairs required to connect to your Alfresco data source. The secret must contain a JSON structure with the following keys: username—The user name of the Alfresco account. password—The password of the Alfresco account."
        SslCertificateS3Path:
          $ref: "#/components/schemas/S3Path"
          description: The path to the SSL certificate stored in an Amazon S3 bucket. You use this to connect to Alfresco if you require a secure SSL connection. You can simply generate a self-signed X509 certificate on any computer using OpenSSL. For an example of using OpenSSL to create an X509 certificate, see Create and sign an X509 certificate.
        CrawlSystemFolders:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index shared files.
        CrawlComments:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to index comments of blogs and other content.
        EntityFilter:
          $ref: "#/components/schemas/EntityFilter"
          description: Specify whether to index document libraries, wikis, or blogs. You can specify one or more of these options.
        DocumentLibraryFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Alfresco document libraries to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Alfresco fields. For more information, see Mapping data source fields. The Alfresco data source field names must exist in your Alfresco custom metadata.
        BlogFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Alfresco blogs to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Alfresco fields. For more information, see Mapping data source fields. The Alfresco data source field names must exist in your Alfresco custom metadata.
        WikiFieldMappings:
          $ref: "#/components/schemas/DataSourceToIndexFieldMappingList"
          description: A list of DataSourceToIndexFieldMapping objects that map attributes or field names of Alfresco wikis to Amazon Kendra index field names. To create custom fields, use the UpdateIndex API before you map to Alfresco fields. For more information, see Mapping data source fields. The Alfresco data source field names must exist in your Alfresco custom metadata.
        InclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to include certain files in your Alfresco data source. Files that match the patterns are included in the index. Files that don't match the patterns are excluded from the index. If a file matches both an inclusion pattern and an exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        ExclusionPatterns:
          $ref: "#/components/schemas/DataSourceInclusionsExclusionsStrings"
          description: A list of regular expression patterns to exclude certain files in your Alfresco data source. Files that match the patterns are excluded from the index. Files that don't match the patterns are included in the index. If a file matches both an inclusion pattern and an exclusion pattern, the exclusion pattern takes precedence and the file isn't included in the index.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information for an Amazon Virtual Private Cloud to connect to your Alfresco. For more information, see Configuring a VPC.
      required:
        - SiteUrl
        - SiteId
        - SecretArn
        - SslCertificateS3Path
    SiteUrl:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^https:\/\/[a-zA-Z0-9_\-\.]+$
    SiteId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[A-Za-z0-9-]+$
    EntityFilter:
      type: array
      items:
        $ref: "#/components/schemas/AlfrescoEntity"
    AlfrescoEntity:
      type: string
      enum:
        - wiki
        - blog
        - documentLibrary
    TemplateConfiguration:
      description: Provides a template for the configuration information to connect to your data source.
      type: object
      properties:
        Template:
          $ref: "#/components/schemas/Template"
          description: The template schema used for the data source, where templates schemas are supported. See Data source template schemas.
    Template:
      description: The template schema used for the data source, where templates schemas are supported. See Data source template schemas.
      type: object
    ScanSchedule:
      type: string
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A key-value pair that identifies or categorizes an index, FAQ, data source, or other resource. TA tag key and value can consist of Unicode letters, digits, white space, and any of the following symbols: _ . : / = + - @."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key for the tag. Keys are not case sensitive and must be unique for the index, FAQ, data source, or other resource.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value associated with the tag. The value may be an empty string but it can't be null.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    LanguageCode:
      description: The code for a language. The default language is English. For more information on supported languages, including their codes, see Adding documents in languages other than English.
      type: string
      minLength: 2
      maxLength: 10
      pattern: "[a-zA-Z-]*"
    CreateDataSourceResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source connector.
      required:
        - Id
    ExperienceName:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    ExperienceConfiguration:
      description: Provides the configuration information for your Amazon Kendra experience. This includes the data source IDs and/or FAQ IDs, and user or group information to grant access to your Amazon Kendra experience.
      type: object
      properties:
        ContentSourceConfiguration:
          $ref: "#/components/schemas/ContentSourceConfiguration"
          description: The identifiers of your data sources and FAQs. Or, you can specify that you want to use documents indexed via the BatchPutDocument API. This is the content you want to use for your Amazon Kendra experience.
        UserIdentityConfiguration:
          $ref: "#/components/schemas/UserIdentityConfiguration"
          description: The IAM Identity Center field name that contains the identifiers of your users, such as their emails.
    ContentSourceConfiguration:
      description: Provides the configuration information for your content sources, such as data sources, FAQs, and content indexed directly via BatchPutDocument.
      type: object
      properties:
        DataSourceIds:
          $ref: "#/components/schemas/DataSourceIdList"
          description: The identifier of the data sources you want to use for your Amazon Kendra experience.
        FaqIds:
          $ref: "#/components/schemas/FaqIdsList"
          description: The identifier of the FAQs that you want to use for your Amazon Kendra experience.
        DirectPutContent:
          $ref: "#/components/schemas/Boolean"
          description: TRUE to use documents you indexed directly using the BatchPutDocument API.
    DataSourceIdList:
      type: array
      items:
        $ref: "#/components/schemas/DataSourceId"
    FaqIdsList:
      type: array
      items:
        $ref: "#/components/schemas/FaqId"
    FaqId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    UserIdentityConfiguration:
      description: Provides the configuration information for the identifiers of your users.
      type: object
      properties:
        IdentityAttributeName:
          $ref: "#/components/schemas/IdentityAttributeName"
          description: The IAM Identity Center field name that contains the identifiers of your users, such as their emails. This is used for user context filtering and for granting access to your Amazon Kendra experience. You must set up IAM Identity Center with Amazon Kendra. You must include your users and groups in your Access Control List when you ingest documents into your index. For more information, see Getting started with an IAM Identity Center identity source.
    IdentityAttributeName:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    CreateExperienceResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ExperienceId"
          description: The identifier of your Amazon Kendra experience.
      required:
        - Id
    FaqName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    FaqFileFormat:
      type: string
      enum:
        - CSV
        - CSV_WITH_HEADER
        - JSON
    CreateFaqResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/FaqId"
          description: The identifier of the FAQ.
    FeaturedResultsSetName:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[a-zA-Z0-9][ a-zA-Z0-9_-]*"
    FeaturedResultsSetDescription:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: ^\P{C}*$
    FeaturedResultsSetStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    QueryTextList:
      type: array
      items:
        $ref: "#/components/schemas/QueryText"
    QueryText:
      type: string
    FeaturedDocumentList:
      type: array
      items:
        $ref: "#/components/schemas/FeaturedDocument"
    FeaturedDocument:
      description: A featured document. This document is displayed at the top of the search results page, placed above all other results for certain queries. If there's an exact match of a query, then the document is featured in the search results.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document to feature in the search results. You can use the Query API to search for specific documents with their document IDs included in the result items, or you can use the console.
    CreateFeaturedResultsSetResponse:
      type: object
      properties:
        FeaturedResultsSet:
          $ref: "#/components/schemas/FeaturedResultsSet"
          description: Information on the set of featured results. This includes the identifier of the featured results set, whether the featured results set is active or inactive, when the featured results set was created, and more.
    FeaturedResultsSet:
      description: A set of featured results that are displayed at the top of your search results. Featured results are placed above all other results for certain queries. If there's an exact match of a query, then one or more specific documents are featured in the search results.
      type: object
      properties:
        FeaturedResultsSetId:
          $ref: "#/components/schemas/FeaturedResultsSetId"
          description: The identifier of the set of featured results.
        FeaturedResultsSetName:
          $ref: "#/components/schemas/FeaturedResultsSetName"
          description: The name for the set of featured results.
        Description:
          $ref: "#/components/schemas/FeaturedResultsSetDescription"
          description: The description for the set of featured results.
        Status:
          $ref: "#/components/schemas/FeaturedResultsSetStatus"
          description: The current status of the set of featured results. When the value is ACTIVE, featured results are ready for use. You can still configure your settings before setting the status to ACTIVE. You can set the status to ACTIVE or INACTIVE using the UpdateFeaturedResultsSet API. The queries you specify for featured results must be unique per featured results set for each index, whether the status is ACTIVE or INACTIVE.
        QueryTexts:
          $ref: "#/components/schemas/QueryTextList"
          description: The list of queries for featuring results. Specific queries are mapped to specific documents for featuring in the results. If a query contains an exact match, then one or more specific documents are featured in the results. The exact match applies to the full query. For example, if you only specify 'Kendra', queries such as 'How does kendra semantically rank results?' will not render the featured results. Featured results are designed for specific queries, rather than queries that are too broad in scope.
        FeaturedDocuments:
          $ref: "#/components/schemas/FeaturedDocumentList"
          description: The list of document IDs for the documents you want to feature at the top of the search results page. You can use the Query API to search for specific documents with their document IDs included in the result items, or you can use the console. You can add up to four featured documents. You can request to increase this limit by contacting Support. Specific queries are mapped to specific documents for featuring in the results. If a query contains an exact match, then one or more specific documents are featured in the results. The exact match applies to the full query. For example, if you only specify 'Kendra', queries such as 'How does kendra semantically rank results?' will not render the featured results. Featured results are designed for specific queries, rather than queries that are too broad in scope.
        LastUpdatedTimestamp:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp when the set of featured results was last updated.
        CreationTimestamp:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp when the set of featured results was created.
    IndexName:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    IndexEdition:
      type: string
      enum:
        - DEVELOPER_EDITION
        - ENTERPRISE_EDITION
        - GEN_AI_ENTERPRISE_EDITION
    ServerSideEncryptionConfiguration:
      description: Provides the identifier of the KMS key used to encrypt data indexed by Amazon Kendra. Amazon Kendra doesn't support asymmetric keys.
      type: object
      properties:
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The identifier of the KMS key. Amazon Kendra doesn't support asymmetric keys.
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 2048
    UserTokenConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/UserTokenConfiguration"
    UserTokenConfiguration:
      description: Provides the configuration information for a token. If you're using an Amazon Kendra Gen AI Enterprise Edition index and you try to use UserTokenConfigurations to configure user context policy, Amazon Kendra returns a ValidationException error.
      type: object
      properties:
        JwtTokenTypeConfiguration:
          $ref: "#/components/schemas/JwtTokenTypeConfiguration"
          description: Information about the JWT token type configuration.
        JsonTokenTypeConfiguration:
          $ref: "#/components/schemas/JsonTokenTypeConfiguration"
          description: Information about the JSON token type configuration.
    JwtTokenTypeConfiguration:
      description: Provides the configuration information for the JWT token type.
      type: object
      properties:
        KeyLocation:
          $ref: "#/components/schemas/KeyLocation"
          description: The location of the key.
        URL:
          $ref: "#/components/schemas/Url"
          description: The signing key URL.
        SecretManagerArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (arn) of the secret.
        UserNameAttributeField:
          $ref: "#/components/schemas/UserNameAttributeField"
          description: The user name attribute field.
        GroupAttributeField:
          $ref: "#/components/schemas/GroupAttributeField"
          description: The group attribute field.
        Issuer:
          $ref: "#/components/schemas/Issuer"
          description: The issuer of the token.
        ClaimRegex:
          $ref: "#/components/schemas/ClaimRegex"
          description: The regular expression that identifies the claim.
      required:
        - KeyLocation
    KeyLocation:
      type: string
      enum:
        - URL
        - SECRET_MANAGER
    UserNameAttributeField:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^\P{C}*$
    GroupAttributeField:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^\P{C}*$
    Issuer:
      type: string
      minLength: 1
      maxLength: 65
      pattern: ^\P{C}*$
    ClaimRegex:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^\P{C}*$
    JsonTokenTypeConfiguration:
      description: Provides the configuration information for the JSON token type.
      type: object
      properties:
        UserNameAttributeField:
          $ref: "#/components/schemas/String"
          description: The user name attribute field.
        GroupAttributeField:
          $ref: "#/components/schemas/String"
          description: The group attribute field.
      required:
        - UserNameAttributeField
        - GroupAttributeField
    UserContextPolicy:
      type: string
      enum:
        - ATTRIBUTE_FILTER
        - USER_TOKEN
    UserGroupResolutionConfiguration:
      description: Provides the configuration information to get users and groups from an IAM Identity Center identity source. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents. You can also use the PutPrincipalMapping API to map users to their groups so that you only need to provide the user ID when you issue the query. To set up an IAM Identity Center identity source in the console to use with Amazon Kendra, see Getting started with an IAM Identity Center identity source. You must also grant the required permissions to use IAM Identity Center with Amazon Kendra. For more information, see IAM roles for IAM Identity Center. Amazon Kendra currently does not support using UserGroupResolutionConfiguration with an Amazon Web Services organization member account for your IAM Identity Center identify source. You must create your index in the management account for the organization in order to use UserGroupResolutionConfiguration. If you're using an Amazon Kendra Gen AI Enterprise Edition index, UserGroupResolutionConfiguration isn't supported.
      type: object
      properties:
        UserGroupResolutionMode:
          $ref: "#/components/schemas/UserGroupResolutionMode"
          description: The identity store provider (mode) you want to use to get users and groups. IAM Identity Center is currently the only available mode. Your users and groups must exist in an IAM Identity Center identity source in order to use this mode.
      required:
        - UserGroupResolutionMode
    UserGroupResolutionMode:
      type: string
      enum:
        - AWS_SSO
        - NONE
    CreateIndexResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/IndexId"
          description: The identifier of the index. Use this identifier when you query an index, set up a data source, or index a document.
    QuerySuggestionsBlockListName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z0-9](-*[a-zA-Z0-9])*
    CreateQuerySuggestionsBlockListResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/QuerySuggestionsBlockListId"
          description: The identifier of the block list.
    QuerySuggestionsBlockListId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]*"
    ThesaurusName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    CreateThesaurusResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ThesaurusId"
          description: The identifier of the thesaurus.
    ThesaurusId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    DeleteAccessControlConfigurationResponse:
      type: object
    DeleteExperienceResponse:
      type: object
    GroupId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^\P{C}*$
    PrincipalOrderingId:
      type: integer
      format: int64
      minimum: 0
      maximum: 32535158400000
    DescribeAccessControlConfigurationResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/AccessControlConfigurationName"
          description: The name for the access control configuration.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description for the access control configuration.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message containing details if there are issues processing the access control configuration.
        AccessControlList:
          $ref: "#/components/schemas/PrincipalList"
          description: Information on principals (users and/or groups) and which documents they should have access to. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents.
        HierarchicalAccessControlList:
          $ref: "#/components/schemas/HierarchicalPrincipalList"
          description: The list of principal lists that define the hierarchy for which documents users should have access to.
      required:
        - Name
    DescribeDataSourceResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source connector.
        IndexId:
          $ref: "#/components/schemas/IndexId"
          description: The identifier of the index used with the data source connector.
        Name:
          $ref: "#/components/schemas/DataSourceName"
          description: The name for the data source connector.
        Type:
          $ref: "#/components/schemas/DataSourceType"
          description: The type of the data source. For example, SHAREPOINT.
        Configuration:
          $ref: "#/components/schemas/DataSourceConfiguration"
          description: Configuration details for the data source connector. This shows how the data source is configured. The configuration options for a data source depend on the data source provider.
        VpcConfiguration:
          $ref: "#/components/schemas/DataSourceVpcConfiguration"
          description: Configuration information for an Amazon Virtual Private Cloud to connect to your data source. For more information, see Configuring a VPC.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the data source connector was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the data source connector was last updated.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description for the data source connector.
        Status:
          $ref: "#/components/schemas/DataSourceStatus"
          description: The current status of the data source connector. When the status is ACTIVE the data source is ready to use. When the status is FAILED, the ErrorMessage field contains the reason that the data source failed.
        Schedule:
          $ref: "#/components/schemas/ScanSchedule"
          description: The schedule for Amazon Kendra to update the index.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role with permission to access the data source and required resources.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: When the Status field value is FAILED, the ErrorMessage field contains a description of the error that caused the data source to fail.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: The code for a language. This shows a supported language for all documents in the data source. English is supported by default. For more information on supported languages, including their codes, see Adding documents in languages other than English.
        CustomDocumentEnrichmentConfiguration:
          $ref: "#/components/schemas/CustomDocumentEnrichmentConfiguration"
          description: Configuration information for altering document metadata and content during the document ingestion process when you describe a data source. For more information on how to create, modify and delete document metadata, or make other content alterations when you ingest documents into Amazon Kendra, see Customizing document metadata during the ingestion process.
    DataSourceStatus:
      type: string
      enum:
        - CREATING
        - DELETING
        - FAILED
        - UPDATING
        - ACTIVE
    DescribeExperienceResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ExperienceId"
          description: Shows the identifier of your Amazon Kendra experience.
        IndexId:
          $ref: "#/components/schemas/IndexId"
          description: Shows the identifier of the index for your Amazon Kendra experience.
        Name:
          $ref: "#/components/schemas/ExperienceName"
          description: Shows the name of your Amazon Kendra experience.
        Endpoints:
          $ref: "#/components/schemas/ExperienceEndpoints"
          description: Shows the endpoint URLs for your Amazon Kendra experiences. The URLs are unique and fully hosted by Amazon Web Services.
        Configuration:
          $ref: "#/components/schemas/ExperienceConfiguration"
          description: Shows the configuration information for your Amazon Kendra experience. This includes ContentSourceConfiguration, which specifies the data source IDs and/or FAQ IDs, and UserIdentityConfiguration, which specifies the user or group information to grant access to your Amazon Kendra experience.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when your Amazon Kendra experience was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when your Amazon Kendra experience was last updated.
        Description:
          $ref: "#/components/schemas/Description"
          description: Shows the description for your Amazon Kendra experience.
        Status:
          $ref: "#/components/schemas/ExperienceStatus"
          description: The current processing status of your Amazon Kendra experience. When the status is ACTIVE, your Amazon Kendra experience is ready to use. When the status is FAILED, the ErrorMessage field contains the reason that this failed.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role with permission to access the Query API, QuerySuggestions API, SubmitFeedback API, and IAM Identity Center that stores your users and groups information.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The reason your Amazon Kendra experience could not properly process.
    ExperienceEndpoints:
      type: array
      items:
        $ref: "#/components/schemas/ExperienceEndpoint"
    ExperienceEndpoint:
      description: Provides the configuration information for the endpoint for your Amazon Kendra experience.
      type: object
      properties:
        EndpointType:
          $ref: "#/components/schemas/EndpointType"
          description: The type of endpoint for your Amazon Kendra experience. The type currently available is HOME, which is a unique and fully hosted URL to the home page of your Amazon Kendra experience.
        Endpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The endpoint of your Amazon Kendra experience.
    EndpointType:
      type: string
      enum:
        - HOME
    Endpoint:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^\P{C}*$
    ExperienceStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - FAILED
    DescribeFaqResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/FaqId"
          description: The identifier of the FAQ.
        IndexId:
          $ref: "#/components/schemas/IndexId"
          description: The identifier of the index for the FAQ.
        Name:
          $ref: "#/components/schemas/FaqName"
          description: The name that you gave the FAQ when it was created.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the FAQ that you provided when it was created.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the FAQ was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the FAQ was last updated.
        S3Path:
          $ref: "#/components/schemas/S3Path"
        Status:
          $ref: "#/components/schemas/FaqStatus"
          description: The status of the FAQ. It is ready to use when the status is ACTIVE.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that provides access to the S3 bucket containing the FAQ file.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: If the Status field is FAILED, the ErrorMessage field contains the reason why the FAQ failed.
        FileFormat:
          $ref: "#/components/schemas/FaqFileFormat"
          description: The file format used for the FAQ file.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: The code for a language. This shows a supported language for the FAQ document. English is supported by default. For more information on supported languages, including their codes, see Adding documents in languages other than English.
    FaqStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - ACTIVE
        - DELETING
        - FAILED
    DescribeFeaturedResultsSetResponse:
      type: object
      properties:
        FeaturedResultsSetId:
          $ref: "#/components/schemas/FeaturedResultsSetId"
          description: The identifier of the set of featured results.
        FeaturedResultsSetName:
          $ref: "#/components/schemas/FeaturedResultsSetName"
          description: The name for the set of featured results.
        Description:
          $ref: "#/components/schemas/FeaturedResultsSetDescription"
          description: The description for the set of featured results.
        Status:
          $ref: "#/components/schemas/FeaturedResultsSetStatus"
          description: The current status of the set of featured results. When the value is ACTIVE, featured results are ready for use. You can still configure your settings before setting the status to ACTIVE. You can set the status to ACTIVE or INACTIVE using the UpdateFeaturedResultsSet API. The queries you specify for featured results must be unique per featured results set for each index, whether the status is ACTIVE or INACTIVE.
        QueryTexts:
          $ref: "#/components/schemas/QueryTextList"
          description: The list of queries for featuring results. For more information on the list of queries, see FeaturedResultsSet.
        FeaturedDocumentsWithMetadata:
          $ref: "#/components/schemas/FeaturedDocumentWithMetadataList"
          description: The list of document IDs for the documents you want to feature with their metadata information. For more information on the list of featured documents, see FeaturedResultsSet.
        FeaturedDocumentsMissing:
          $ref: "#/components/schemas/FeaturedDocumentMissingList"
          description: The list of document IDs that don't exist but you have specified as featured documents. Amazon Kendra cannot feature these documents if they don't exist in the index. You can check the status of a document and its ID or check for documents with status errors using the BatchGetDocumentStatus API.
        LastUpdatedTimestamp:
          $ref: "#/components/schemas/Long"
          description: The timestamp when the set of featured results was last updated.
        CreationTimestamp:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp when the set of the featured results was created.
    FeaturedDocumentWithMetadataList:
      type: array
      items:
        $ref: "#/components/schemas/FeaturedDocumentWithMetadata"
    FeaturedDocumentWithMetadata:
      description: A featured document with its metadata information. This document is displayed at the top of the search results page, placed above all other results for certain queries. If there's an exact match of a query, then the document is featured in the search results.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the featured document with its metadata. You can use the Query API to search for specific documents with their document IDs included in the result items, or you can use the console.
        Title:
          $ref: "#/components/schemas/String"
          description: The main title of the featured document.
        URI:
          $ref: "#/components/schemas/Url"
          description: The source URI location of the featured document.
    FeaturedDocumentMissingList:
      type: array
      items:
        $ref: "#/components/schemas/FeaturedDocumentMissing"
    FeaturedDocumentMissing:
      description: A document ID doesn't exist but you have specified as a featured document. Amazon Kendra cannot feature the document if it doesn't exist in the index. You can check the status of a document and its ID or check for documents with status errors using the BatchGetDocumentStatus API.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document that doesn't exist but you have specified as a featured document.
    DescribeIndexResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/IndexName"
          description: The name of the index.
        Id:
          $ref: "#/components/schemas/IndexId"
          description: The identifier of the index.
        Edition:
          $ref: "#/components/schemas/IndexEdition"
          description: The Amazon Kendra edition used for the index. You decide the edition when you create the index.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that gives Amazon Kendra permission to write to your Amazon CloudWatch logs.
        ServerSideEncryptionConfiguration:
          $ref: "#/components/schemas/ServerSideEncryptionConfiguration"
          description: The identifier of the KMS customer master key (CMK) that is used to encrypt your data. Amazon Kendra doesn't support asymmetric CMKs.
        Status:
          $ref: "#/components/schemas/IndexStatus"
          description: The current status of the index. When the value is ACTIVE, the index is ready for use. If the Status field value is FAILED, the ErrorMessage field contains a message that explains why.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description for the index.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the index was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the index was last updated.
        DocumentMetadataConfigurations:
          $ref: "#/components/schemas/DocumentMetadataConfigurationList"
          description: Configuration information for document metadata or fields. Document metadata are fields or attributes associated with your documents. For example, the company department name associated with each document.
        IndexStatistics:
          $ref: "#/components/schemas/IndexStatistics"
          description: Provides information about the number of FAQ questions and answers and the number of text documents indexed.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: When the Status field value is FAILED, the ErrorMessage field contains a message that explains why.
        CapacityUnits:
          $ref: "#/components/schemas/CapacityUnitsConfiguration"
          description: For Enterprise Edition indexes, you can choose to use additional capacity to meet the needs of your application. This contains the capacity units used for the index. A query or document storage capacity of zero indicates that the index is using the default capacity. For more information on the default capacity for an index and adjusting this, see Adjusting capacity.
        UserTokenConfigurations:
          $ref: "#/components/schemas/UserTokenConfigurationList"
          description: The user token configuration for the Amazon Kendra index.
        UserContextPolicy:
          $ref: "#/components/schemas/UserContextPolicy"
          description: The user context policy for the Amazon Kendra index.
        UserGroupResolutionConfiguration:
          $ref: "#/components/schemas/UserGroupResolutionConfiguration"
          description: Whether you have enabled IAM Identity Center identity source for your users and groups. This is useful for user context filtering, where search results are filtered based on the user or their group access to documents.
    IndexStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - FAILED
        - UPDATING
        - SYSTEM_UPDATING
    DocumentMetadataConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentMetadataConfiguration"
    DocumentMetadataConfiguration:
      description: Specifies the properties, such as relevance tuning and searchability, of an index field.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DocumentMetadataConfigurationName"
          description: The name of the index field.
        Type:
          $ref: "#/components/schemas/DocumentAttributeValueType"
          description: The data type of the index field.
        Relevance:
          $ref: "#/components/schemas/Relevance"
          description: Provides tuning parameters to determine how the field affects the search results.
        Search:
          $ref: "#/components/schemas/Search"
          description: Provides information about how the field is used during a search.
      required:
        - Name
        - Type
    DocumentMetadataConfigurationName:
      type: string
      minLength: 1
      maxLength: 30
    DocumentAttributeValueType:
      type: string
      enum:
        - STRING_VALUE
        - STRING_LIST_VALUE
        - LONG_VALUE
        - DATE_VALUE
    Relevance:
      description: Provides information for tuning the relevance of a field in a search. When a query includes terms that match the field, the results are given a boost in the response based on these tuning parameters.
      type: object
      properties:
        Freshness:
          $ref: "#/components/schemas/DocumentMetadataBoolean"
          description: Indicates that this field determines how "fresh" a document is. For example, if document 1 was created on November 5, and document 2 was created on October 31, document 1 is "fresher" than document 2. Only applies to DATE fields.
        Importance:
          $ref: "#/components/schemas/Importance"
          description: The relative importance of the field in the search. Larger numbers provide more of a boost than smaller numbers.
        Duration:
          $ref: "#/components/schemas/Duration"
          description: Specifies the time period that the boost applies to. For example, to make the boost apply to documents with the field value within the last month, you would use "2628000s". Once the field value is beyond the specified range, the effect of the boost drops off. The higher the importance, the faster the effect drops off. If you don't specify a value, the default is 3 months. The value of the field is a numeric string followed by the character "s", for example "86400s" for one day, or "604800s" for one week. Only applies to DATE fields.
        RankOrder:
          $ref: "#/components/schemas/Order"
          description: Determines how values should be interpreted. When the RankOrder field is ASCENDING, higher numbers are better. For example, a document with a rating score of 10 is higher ranking than a document with a rating score of 1. When the RankOrder field is DESCENDING, lower numbers are better. For example, in a task tracking application, a priority 1 task is more important than a priority 5 task. Only applies to LONG fields.
        ValueImportanceMap:
          type: object
          properties: {}
          description: A list of values that should be given a different boost when they appear in the result list. For example, if you are boosting a field called "department", query terms that match the department field are boosted in the result. However, you can add entries from the department field to boost documents with those values higher. For example, you can add entries to the map with names of departments. If you add "HR",5 and "Legal",3 those departments are given special attention when they appear in the metadata of a document. When those terms appear they are given the specified importance instead of the regular importance for the boost.
    DocumentMetadataBoolean:
      type: boolean
    Importance:
      type: integer
      minimum: 1
      maximum: 10
    Duration:
      type: string
      minLength: 1
      maxLength: 10
      pattern: "[0-9]+[s]"
    Order:
      type: string
      enum:
        - ASCENDING
        - DESCENDING
    Search:
      description: Provides information about how a custom index field is used during a search.
      type: object
      properties:
        Facetable:
          $ref: "#/components/schemas/Boolean"
          description: Indicates that the field can be used to create search facets, a count of results for each value in the field. The default is false .
        Searchable:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether the field is used in the search. If the Searchable field is true, you can use relevance tuning to manually tune how Amazon Kendra weights the field in the search. The default is true for string fields and false for number and date fields.
        Displayable:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether the field is returned in the query response. The default is true.
        Sortable:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether the field can be used to sort the results of a query. If you specify sorting on a field that does not have Sortable set to true, Amazon Kendra returns an exception. The default is false.
    IndexStatistics:
      description: Provides information about the number of documents and the number of questions and answers in an index.
      type: object
      properties:
        FaqStatistics:
          $ref: "#/components/schemas/FaqStatistics"
          description: The number of question and answer topics in the index.
        TextDocumentStatistics:
          $ref: "#/components/schemas/TextDocumentStatistics"
          description: The number of text documents indexed.
      required:
        - FaqStatistics
        - TextDocumentStatistics
    FaqStatistics:
      description: Provides statistical information about the FAQ questions and answers for an index.
      type: object
      properties:
        IndexedQuestionAnswersCount:
          $ref: "#/components/schemas/IndexedQuestionAnswersCount"
          description: The total number of FAQ questions and answers for an index.
      required:
        - IndexedQuestionAnswersCount
    IndexedQuestionAnswersCount:
      type: integer
      minimum: 0
    TextDocumentStatistics:
      description: Provides information about text documents indexed in an index.
      type: object
      properties:
        IndexedTextDocumentsCount:
          $ref: "#/components/schemas/IndexedTextDocumentsCount"
          description: The number of text documents indexed.
        IndexedTextBytes:
          $ref: "#/components/schemas/IndexedTextBytes"
          description: The total size, in bytes, of the indexed documents.
      required:
        - IndexedTextDocumentsCount
        - IndexedTextBytes
    IndexedTextDocumentsCount:
      type: integer
      minimum: 0
    IndexedTextBytes:
      type: integer
      format: int64
      minimum: 0
    CapacityUnitsConfiguration:
      description: Specifies additional capacity units configured for your Enterprise Edition index. You can add and remove capacity units to fit your usage requirements.
      type: object
      properties:
        StorageCapacityUnits:
          $ref: "#/components/schemas/StorageCapacityUnit"
          description: The amount of extra storage capacity for an index. A single capacity unit provides 30 GB of storage space or 100,000 documents, whichever is reached first. You can add up to 100 extra capacity units.
        QueryCapacityUnits:
          $ref: "#/components/schemas/QueryCapacityUnit"
          description: The amount of extra query capacity for an index and GetQuerySuggestions capacity. A single extra capacity unit for an index provides 0.1 queries per second or approximately 8,000 queries per day. You can add up to 100 extra capacity units. GetQuerySuggestions capacity is five times the provisioned query capacity for an index, or the base capacity of 2.5 calls per second, whichever is higher. For example, the base capacity for an index is 0.1 queries per second, and GetQuerySuggestions capacity has a base of 2.5 calls per second. If you add another 0.1 queries per second to total 0.2 queries per second for an index, the GetQuerySuggestions capacity is 2.5 calls per second (higher than five times 0.2 queries per second).
      required:
        - StorageCapacityUnits
        - QueryCapacityUnits
    StorageCapacityUnit:
      type: integer
      minimum: 0
    QueryCapacityUnit:
      type: integer
      minimum: 0
    DescribePrincipalMappingResponse:
      type: object
      properties:
        IndexId:
          $ref: "#/components/schemas/IndexId"
          description: Shows the identifier of the index to see information on the processing of PUT and DELETE actions for mapping users to their groups.
        DataSourceId:
          $ref: "#/components/schemas/DataSourceId"
          description: Shows the identifier of the data source to see information on the processing of PUT and DELETE actions for mapping users to their groups.
        GroupId:
          $ref: "#/components/schemas/GroupId"
          description: Shows the identifier of the group to see information on the processing of PUT and DELETE actions for mapping users to their groups.
        GroupOrderingIdSummaries:
          $ref: "#/components/schemas/GroupOrderingIdSummaries"
          description: "Shows the following information on the processing of PUT and DELETE actions for mapping users to their groups: Status—the status can be either PROCESSING, SUCCEEDED, DELETING, DELETED, or FAILED. Last updated—the last date-time an action was updated. Received—the last date-time an action was received or submitted. Ordering ID—the latest action that should process and apply after other actions. Failure reason—the reason an action could not be processed."
    GroupOrderingIdSummaries:
      type: array
      items:
        $ref: "#/components/schemas/GroupOrderingIdSummary"
    GroupOrderingIdSummary:
      description: Summary information on the processing of PUT and DELETE actions for mapping users to their groups.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/PrincipalMappingStatus"
          description: The current processing status of actions for mapping users to their groups. The status can be either PROCESSING, SUCCEEDED, DELETING, DELETED, or FAILED.
        LastUpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when an action was last updated. An action can be a PUT or DELETE action for mapping users to their groups.
        ReceivedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when an action was received by Amazon Kendra. An action can be a PUT or DELETE action for mapping users to their groups.
        OrderingId:
          $ref: "#/components/schemas/PrincipalOrderingId"
          description: The order in which actions should complete processing. An action can be a PUT or DELETE action for mapping users to their groups.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: The reason an action could not be processed. An action can be a PUT or DELETE action for mapping users to their groups.
    PrincipalMappingStatus:
      type: string
      enum:
        - FAILED
        - SUCCEEDED
        - PROCESSING
        - DELETING
        - DELETED
    FailureReason:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^\P{C}*$
    DescribeQuerySuggestionsBlockListResponse:
      type: object
      properties:
        IndexId:
          $ref: "#/components/schemas/IndexId"
          description: The identifier of the index for the block list.
        Id:
          $ref: "#/components/schemas/QuerySuggestionsBlockListId"
          description: The identifier of the block list.
        Name:
          $ref: "#/components/schemas/QuerySuggestionsBlockListName"
          description: The name of the block list.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description for the block list.
        Status:
          $ref: "#/components/schemas/QuerySuggestionsBlockListStatus"
          description: The current status of the block list. When the value is ACTIVE, the block list is ready for use.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message containing details if there are issues processing the block list.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when a block list for query suggestions was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when a block list for query suggestions was last updated.
        SourceS3Path:
          $ref: "#/components/schemas/S3Path"
          description: Shows the current S3 path to your block list text file in your S3 bucket. Each block word or phrase should be on a separate line in a text file. For information on the current quota limits for block lists, see Quotas for Amazon Kendra.
        ItemCount:
          $ref: "#/components/schemas/Integer"
          description: The current number of valid, non-empty words or phrases in the block list text file.
        FileSizeBytes:
          $ref: "#/components/schemas/Long"
          description: The current size of the block list text file in S3.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The IAM (Identity and Access Management) role used by Amazon Kendra to access the block list text file in S3. The role needs S3 read permissions to your file in S3 and needs to give STS (Security Token Service) assume role permissions to Amazon Kendra.
    QuerySuggestionsBlockListStatus:
      type: string
      enum:
        - ACTIVE
        - CREATING
        - DELETING
        - UPDATING
        - ACTIVE_BUT_UPDATE_FAILED
        - FAILED
    Integer:
      type: integer
    DescribeQuerySuggestionsConfigResponse:
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/Mode"
          description: Whether query suggestions are currently in ENABLED mode or LEARN_ONLY mode. By default, Amazon Kendra enables query suggestions.LEARN_ONLY turns off query suggestions for your users. You can change the mode using the UpdateQuerySuggestionsConfig API.
        Status:
          $ref: "#/components/schemas/QuerySuggestionsStatus"
          description: Whether the status of query suggestions settings is currently ACTIVE or UPDATING. Active means the current settings apply and Updating means your changed settings are in the process of applying.
        QueryLogLookBackWindowInDays:
          $ref: "#/components/schemas/Integer"
          description: How recent your queries are in your query log time window (in days).
        IncludeQueriesWithoutUserInformation:
          $ref: "#/components/schemas/ObjectBoolean"
          description: TRUE to use all queries, otherwise use only queries that include user information to generate the query suggestions.
        MinimumNumberOfQueryingUsers:
          $ref: "#/components/schemas/MinimumNumberOfQueryingUsers"
          description: The minimum number of unique users who must search a query in order for the query to be eligible to suggest to your users.
        MinimumQueryCount:
          $ref: "#/components/schemas/MinimumQueryCount"
          description: The minimum number of times a query must be searched in order for the query to be eligible to suggest to your users.
        LastSuggestionsBuildTime:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when query suggestions for an index was last updated. Amazon Kendra automatically updates suggestions every 24 hours, after you change a setting or after you apply a block list.
        LastClearTime:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when query suggestions for an index was last cleared. After you clear suggestions, Amazon Kendra learns new suggestions based on new queries added to the query log from the time you cleared suggestions. Amazon Kendra only considers re-occurences of a query from the time you cleared suggestions.
        TotalSuggestionsCount:
          $ref: "#/components/schemas/Integer"
          description: The current total count of query suggestions for an index. This count can change when you update your query suggestions settings, if you filter out certain queries from suggestions using a block list, and as the query log accumulates more queries for Amazon Kendra to learn from. If the count is much lower than you expected, it could be because Amazon Kendra needs more queries in the query history to learn from or your current query suggestions settings are too strict.
        AttributeSuggestionsConfig:
          $ref: "#/components/schemas/AttributeSuggestionsDescribeConfig"
          description: Configuration information for the document fields/attributes that you want to base query suggestions on.
    Mode:
      type: string
      enum:
        - ENABLED
        - LEARN_ONLY
    QuerySuggestionsStatus:
      type: string
      enum:
        - ACTIVE
        - UPDATING
    ObjectBoolean:
      type: boolean
    MinimumNumberOfQueryingUsers:
      type: integer
      minimum: 1
      maximum: 10000
    MinimumQueryCount:
      type: integer
      minimum: 1
      maximum: 10000
    AttributeSuggestionsDescribeConfig:
      description: Gets information on the configuration of document fields/attributes that you want to base query suggestions on. To change your configuration, use AttributeSuggestionsUpdateConfig and then call UpdateQuerySuggestionsConfig.
      type: object
      properties:
        SuggestableConfigList:
          $ref: "#/components/schemas/SuggestableConfigList"
          description: The list of fields/attributes that you want to set as suggestible for query suggestions.
        AttributeSuggestionsMode:
          $ref: "#/components/schemas/AttributeSuggestionsMode"
          description: The mode is set to either ACTIVE or INACTIVE. If the Mode for query history is set to ENABLED when calling UpdateQuerySuggestionsConfig and AttributeSuggestionsMode to use fields/attributes is set to ACTIVE, and you haven't set your SuggestionTypes preference to DOCUMENT_ATTRIBUTES, then Amazon Kendra uses the query history.
    SuggestableConfigList:
      type: array
      items:
        $ref: "#/components/schemas/SuggestableConfig"
    SuggestableConfig:
      description: Provides the configuration information for a document field/attribute that you want to base query suggestions on.
      type: object
      properties:
        AttributeName:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The name of the document field/attribute.
        Suggestable:
          $ref: "#/components/schemas/ObjectBoolean"
          description: TRUE means the document field/attribute is suggestible, so the contents within the field can be used for query suggestions.
    AttributeSuggestionsMode:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    DescribeThesaurusResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ThesaurusId"
          description: The identifier of the thesaurus.
        IndexId:
          $ref: "#/components/schemas/IndexId"
          description: The identifier of the index for the thesaurus.
        Name:
          $ref: "#/components/schemas/ThesaurusName"
          description: The thesaurus name.
        Description:
          $ref: "#/components/schemas/Description"
          description: The thesaurus description.
        Status:
          $ref: "#/components/schemas/ThesaurusStatus"
          description: The current status of the thesaurus. When the value is ACTIVE, queries are able to use the thesaurus. If the Status field value is FAILED, the ErrorMessage field provides more information. If the status is ACTIVE_BUT_UPDATE_FAILED, it means that Amazon Kendra could not ingest the new thesaurus file. The old thesaurus file is still active.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: When the Status field value is FAILED, the ErrorMessage field provides more information.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the thesaurus was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the thesaurus was last updated.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: An IAM role that gives Amazon Kendra permissions to access thesaurus file specified in SourceS3Path.
        SourceS3Path:
          $ref: "#/components/schemas/S3Path"
        FileSizeBytes:
          $ref: "#/components/schemas/Long"
          description: The size of the thesaurus file in bytes.
        TermCount:
          $ref: "#/components/schemas/Long"
          description: The number of unique terms in the thesaurus file. For example, the synonyms a,b,c and a=>d, the term count would be 4.
        SynonymRuleCount:
          $ref: "#/components/schemas/Long"
          description: The number of synonym rules in the thesaurus file.
    ThesaurusStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - UPDATING
        - ACTIVE_BUT_UPDATE_FAILED
        - FAILED
    DisassociateEntityList:
      type: array
      items:
        $ref: "#/components/schemas/EntityConfiguration"
    DisassociateEntitiesFromExperienceResponse:
      type: object
      properties:
        FailedEntityList:
          $ref: "#/components/schemas/FailedEntityList"
          description: Lists the users or groups in your IAM Identity Center identity source that failed to properly remove access to your Amazon Kendra experience.
    EntityIdsList:
      type: array
      items:
        $ref: "#/components/schemas/EntityId"
    DisassociatePersonasFromEntitiesResponse:
      type: object
      properties:
        FailedEntityList:
          $ref: "#/components/schemas/FailedEntityList"
          description: Lists the users or groups in your IAM Identity Center identity source that failed to properly remove access to your Amazon Kendra experience.
    SuggestionQueryText:
      type: string
      pattern: ^\P{C}*$
    SuggestionTypes:
      type: array
      items:
        $ref: "#/components/schemas/SuggestionType"
    SuggestionType:
      type: string
      enum:
        - QUERY
        - DOCUMENT_ATTRIBUTES
    AttributeSuggestionsGetConfig:
      description: Provides the configuration information for the document fields/attributes that you want to base query suggestions on.
      type: object
      properties:
        SuggestionAttributes:
          $ref: "#/components/schemas/DocumentAttributeKeyList"
          description: The list of document field/attribute keys or field names to use for query suggestions. If the content within any of the fields match what your user starts typing as their query, then the field content is returned as a query suggestion.
        AdditionalResponseAttributes:
          $ref: "#/components/schemas/DocumentAttributeKeyList"
          description: The list of additional document field/attribute keys or field names to include in the response. You can use additional fields to provide extra information in the response. Additional fields are not used to based suggestions on.
        AttributeFilter:
          $ref: "#/components/schemas/AttributeFilter"
          description: Filters the search results based on document fields/attributes.
        UserContext:
          $ref: "#/components/schemas/UserContext"
          description: Applies user context filtering so that only users who are given access to certain documents see these document in their search results.
    DocumentAttributeKeyList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentAttributeKey"
    AttributeFilter:
      description: 'Filters the search results based on document attributes or fields. You can filter results using attributes for your particular documents. The attributes must exist in your index. For example, if your documents include the custom attribute "Department", you can filter documents that belong to the "HR" department. You would use the EqualsTo operation to filter results or documents with "Department" equals to "HR". You can use AndAllFilters and OrAllFilters in combination with each other or with other operations such as EqualsTo. For example: AndAllFilters EqualsTo: "Department", "HR" OrAllFilters ContainsAny: "Project Name", ["new hires", "new hiring"] This example filters results or documents that belong to the HR department AND belong to projects that contain "new hires" OR "new hiring" in the project name (must use ContainAny with StringListValue). This example is filtering with a depth of 2. You cannot filter more than a depth of 2, otherwise you receive a ValidationException exception with the message "AttributeFilter cannot have a depth of more than 2." Also, if you use more than 10 attribute filters in a given list for AndAllFilters or OrAllFilters, you receive a ValidationException with the message "AttributeFilter cannot have a length of more than 10". For examples of using AttributeFilter, see Using document attributes to filter search results.'
      type: object
      properties:
        AndAllFilters:
          $ref: "#/components/schemas/AttributeFilterList"
          description: Performs a logical AND operation on all filters that you specify.
        OrAllFilters:
          $ref: "#/components/schemas/AttributeFilterList"
          description: Performs a logical OR operation on all filters that you specify.
        NotFilter:
          $ref: "#/components/schemas/AttributeFilter"
          description: Performs a logical NOT operation on all filters that you specify.
        EqualsTo:
          $ref: "#/components/schemas/DocumentAttribute"
          description: Performs an equals operation on document attributes/fields and their values.
        ContainsAll:
          $ref: "#/components/schemas/DocumentAttribute"
          description: Returns true when a document contains all of the specified document attributes/fields. This filter is only applicable to StringListValue.
        ContainsAny:
          $ref: "#/components/schemas/DocumentAttribute"
          description: Returns true when a document contains any of the specified document attributes/fields. This filter is only applicable to StringListValue.
        GreaterThan:
          $ref: "#/components/schemas/DocumentAttribute"
          description: Performs a greater than operation on document attributes/fields and their values. Use with the document attribute type Date or Long.
        GreaterThanOrEquals:
          $ref: "#/components/schemas/DocumentAttribute"
          description: Performs a greater or equals than operation on document attributes/fields and their values. Use with the document attribute type Date or Long.
        LessThan:
          $ref: "#/components/schemas/DocumentAttribute"
          description: Performs a less than operation on document attributes/fields and their values. Use with the document attribute type Date or Long.
        LessThanOrEquals:
          $ref: "#/components/schemas/DocumentAttribute"
          description: Performs a less than or equals operation on document attributes/fields and their values. Use with the document attribute type Date or Long.
    AttributeFilterList:
      type: array
      items:
        $ref: "#/components/schemas/AttributeFilter"
    UserContext:
      description: "Provides information about the user context for an Amazon Kendra index. User context filtering is a kind of personalized search with the benefit of controlling access to documents. For example, not all teams that search the company portal for information should access top-secret company documents, nor are these documents relevant to all users. Only specific users or groups of teams given access to top-secret documents should see these documents in their search results. You provide one of the following: User token User ID, the groups the user belongs to, and any data sources the groups can access. If you provide both, an exception is thrown. If you're using an Amazon Kendra Gen AI Enterprise Edition index, you can use UserId, Groups, and DataSourceGroups to filter content. If you set the UserId to a particular user ID, it also includes all public documents. Amazon Kendra Gen AI Enterprise Edition indices don't support token based document filtering. If you're using an Amazon Kendra Gen AI Enterprise Edition index, Amazon Kendra returns a ValidationException error if the Token field has a non-null value."
      type: object
      properties:
        Token:
          $ref: "#/components/schemas/Token"
          description: The user context token for filtering search results for a user. It must be a JWT or a JSON token.
        UserId:
          $ref: "#/components/schemas/PrincipalName"
          description: The identifier of the user you want to filter search results based on their access to documents.
        Groups:
          $ref: "#/components/schemas/Groups"
          description: The list of groups you want to filter search results based on the groups' access to documents.
        DataSourceGroups:
          $ref: "#/components/schemas/DataSourceGroups"
          description: The list of data source groups you want to filter search results based on groups' access to documents in that data source.
    Token:
      type: string
      minLength: 1
      maxLength: 100000
      pattern: ^\P{C}*$
    Groups:
      type: array
      items:
        $ref: "#/components/schemas/PrincipalName"
    DataSourceGroups:
      type: array
      items:
