                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier to ensure idempotency of the request.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to apply to the bill scenario.
                groupSharingPreference:
                  $ref: "#/components/schemas/GroupSharingPreferenceEnum"
                  description: The setting for the reserved instance and savings plan group sharing used in this estimate.
                costCategoryGroupSharingPreferenceArn:
                  $ref: "#/components/schemas/CostCategoryArn"
                  description: The arn of the cost category used in the reserved and prioritized group sharing.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBillScenarioResponse"
