components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    BatchCreateBillScenarioCommitmentModificationEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateBillScenarioCommitmentModificationEntry"
    BatchCreateBillScenarioCommitmentModificationEntry:
      description: Represents an entry object in the batch operation to create bill scenario commitment modifications.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/Key"
          description: A unique identifier for this entry in the batch operation. This can be any valid string. This key is useful to identify errors associated with any commitment entry as any error is returned with this key.
        group:
          $ref: "#/components/schemas/UsageGroup"
          description: An optional group identifier for the commitment modification.
        usageAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID to which this commitment will be applied to.
        commitmentAction:
          $ref: "#/components/schemas/BillScenarioCommitmentModificationAction"
          description: The specific commitment action to be taken (e.g., adding a Reserved Instance or Savings Plan).
      required:
        - key
        - usageAccountId
        - commitmentAction
    Key:
      type: string
      minLength: 0
      maxLength: 10
      pattern: "[a-zA-Z0-9]*"
    UsageGroup:
      type: string
      minLength: 0
      maxLength: 30
      pattern: "[a-zA-Z0-9-]*"
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: \d{12}
    BillScenarioCommitmentModificationAction:
      description: Represents an action to modify commitments in a bill scenario.
      type: object
      properties:
        addReservedInstanceAction:
          $ref: "#/components/schemas/AddReservedInstanceAction"
          description: Action to add a Reserved Instance to the scenario.
        addSavingsPlanAction:
          $ref: "#/components/schemas/AddSavingsPlanAction"
          description: Action to add a Savings Plan to the scenario.
        negateReservedInstanceAction:
          $ref: "#/components/schemas/NegateReservedInstanceAction"
          description: Action to remove a Reserved Instance from the scenario.
        negateSavingsPlanAction:
          $ref: "#/components/schemas/NegateSavingsPlanAction"
          description: Action to remove a Savings Plan from the scenario.
    AddReservedInstanceAction:
      description: Represents an action to add a Reserved Instance to a bill scenario.
      type: object
      properties:
        reservedInstancesOfferingId:
          $ref: "#/components/schemas/Uuid"
          description: The ID of the Reserved Instance offering to add. For more information, see DescribeReservedInstancesOfferings.
        instanceCount:
          $ref: "#/components/schemas/ReservedInstanceInstanceCount"
          description: The number of instances to add for this Reserved Instance offering.
    Uuid:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    ReservedInstanceInstanceCount:
      type: integer
      minimum: 1
    AddSavingsPlanAction:
      description: Represents an action to add a Savings Plan to a bill scenario.
      type: object
      properties:
        savingsPlanOfferingId:
          $ref: "#/components/schemas/Uuid"
          description: The ID of the Savings Plan offering to add. For more information, see DescribeSavingsPlansOfferings.
        commitment:
          $ref: "#/components/schemas/SavingsPlanCommitment"
          description: The hourly commitment, in the same currency of the savingsPlanOfferingId. This is a value between 0.001 and 1 million. You cannot specify more than five digits after the decimal point.
    SavingsPlanCommitment:
      type: number
      format: double
      minimum: 0.001
      maximum: 1000000
    NegateReservedInstanceAction:
      description: Represents an action to remove a Reserved Instance from a bill scenario. This is the ID of an existing Reserved Instance in your account.
      type: object
      properties:
        reservedInstancesId:
          $ref: "#/components/schemas/Uuid"
          description: The ID of the Reserved Instance to remove.
    NegateSavingsPlanAction:
      description: Represents an action to remove a Savings Plan from a bill scenario. This is the ID of an existing Savings Plan in your account.
      type: object
      properties:
        savingsPlanId:
          $ref: "#/components/schemas/Uuid"
          description: The ID of the Savings Plan to remove.
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\u0021-\\u007E]+"
    BatchCreateBillScenarioCommitmentModificationResponse:
      type: object
      properties:
        items_:
          $ref: "#/components/schemas/BatchCreateBillScenarioCommitmentModificationItems"
          description: Returns the list of successful commitment line items that were created for the Bill Scenario.
        errors:
          $ref: "#/components/schemas/BatchCreateBillScenarioCommitmentModificationErrors"
          description: Returns the list of errors reason and the commitment item keys that cannot be created in the Bill Scenario.
    BatchCreateBillScenarioCommitmentModificationItems:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateBillScenarioCommitmentModificationItem"
    BatchCreateBillScenarioCommitmentModificationItem:
      description: Represents a successfully created item in a batch operation for bill scenario commitment modifications.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/Key"
          description: The key of the successfully created entry. This can be any valid string. This key is useful to identify errors associated with any commitment entry as any error is returned with this key.
        id:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier assigned to the created commitment modification.
        group:
          $ref: "#/components/schemas/UsageGroup"
          description: The group identifier for the created commitment modification.
        usageAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID associated with the created commitment modification.
        commitmentAction:
          $ref: "#/components/schemas/BillScenarioCommitmentModificationAction"
          description: The specific commitment action that was taken.
    BatchCreateBillScenarioCommitmentModificationErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateBillScenarioCommitmentModificationError"
    BatchCreateBillScenarioCommitmentModificationError:
