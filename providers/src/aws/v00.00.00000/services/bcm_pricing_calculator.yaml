openapi: 3.0.0
info:
  version: "2024-06-19"
  title: AWS Billing and Cost Management Pricing Calculator
  description: AWS Billing and Cost Management Pricing Calculator
  x-serviceName: bcm-pricing-calculator
  x-serviceAlias: bcm_pricing_calculator
  x-protocol: json
  x-apiVersion: "2024-06-19"
  x-endpointPrefix: bcm-pricing-calculator
  x-targetPrefix: AWSBCMPricingCalculator
  x-jsonVersion: "1.0"
servers:
  - url: https://bcm-pricing-calculator.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bcm-pricing-calculator
paths:
  /BatchCreateBillScenarioCommitmentModification:
    post:
      operationId: BatchCreateBillScenarioCommitmentModification
      description: Create Compute Savings Plans, EC2 Instance Savings Plans, or EC2 Reserved Instances commitments that you want to model in a Bill Scenario. The BatchCreateBillScenarioCommitmentModification operation doesn't have its own IAM permission. To authorize this operation for Amazon Web Services principals, include the permission bcm-pricing-calculator:CreateBillScenarioCommitmentModification in your policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMPricingCalculator.BatchCreateBillScenarioCommitmentModification
            default: AWSBCMPricingCalculator.BatchCreateBillScenarioCommitmentModification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                billScenarioId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Bill Scenario for which you want to create the modeled commitment.
                commitmentModifications:
                  $ref: "#/components/schemas/BatchCreateBillScenarioCommitmentModificationEntries"
                  description: List of commitments that you want to model in the Bill Scenario.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
              required:
                - billScenarioId
                - commitmentModifications
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateBillScenarioCommitmentModificationResponse"
  /BatchCreateBillScenarioUsageModification:
    post:
      operationId: BatchCreateBillScenarioUsageModification
      description: Create Amazon Web Services service usage that you want to model in a Bill Scenario. The BatchCreateBillScenarioUsageModification operation doesn't have its own IAM permission. To authorize this operation for Amazon Web Services principals, include the permission bcm-pricing-calculator:CreateBillScenarioUsageModification in your policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMPricingCalculator.BatchCreateBillScenarioUsageModification
            default: AWSBCMPricingCalculator.BatchCreateBillScenarioUsageModification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                billScenarioId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Bill Scenario for which you want to create the modeled usage.
                usageModifications:
                  $ref: "#/components/schemas/BatchCreateBillScenarioUsageModificationEntries"
                  description: List of usage that you want to model in the Bill Scenario.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
