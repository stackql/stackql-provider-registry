                  $ref: "#/components/schemas/BatchCreateWorkloadEstimateUsageEntries"
                  description: List of usage that you want to model in the Workload estimate.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
              required:
                - workloadEstimateId
                - usage
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateWorkloadEstimateUsageResponse"
  /BatchDeleteBillScenarioCommitmentModification:
    post:
      operationId: BatchDeleteBillScenarioCommitmentModification
      description: Delete commitment that you have created in a Bill Scenario. You can only delete a commitment that you had added and cannot model deletion (or removal) of a existing commitment. If you want model deletion of an existing commitment, see the negate BillScenarioCommitmentModificationAction of BatchCreateBillScenarioCommitmentModification operation. The BatchDeleteBillScenarioCommitmentModification operation doesn't have its own IAM permission. To authorize this operation for Amazon Web Services principals, include the permission bcm-pricing-calculator:DeleteBillScenarioCommitmentModification in your policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMPricingCalculator.BatchDeleteBillScenarioCommitmentModification
            default: AWSBCMPricingCalculator.BatchDeleteBillScenarioCommitmentModification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                billScenarioId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Bill Scenario for which you want to delete the modeled commitment.
                ids:
                  $ref: "#/components/schemas/BatchDeleteBillScenarioCommitmentModificationEntries"
                  description: List of commitments that you want to delete from the Bill Scenario.
              required:
                - billScenarioId
                - ids
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteBillScenarioCommitmentModificationResponse"
  /BatchDeleteBillScenarioUsageModification:
    post:
      operationId: BatchDeleteBillScenarioUsageModification
