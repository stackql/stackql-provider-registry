          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                billScenarioId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Bill Scenario for which you want to modify the usage lines.
                usageModifications:
                  $ref: "#/components/schemas/BatchUpdateBillScenarioUsageModificationEntries"
                  description: List of usage lines that you want to update in a Bill Scenario identified by the usage ID.
              required:
                - billScenarioId
                - usageModifications
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateBillScenarioUsageModificationResponse"
  /BatchUpdateWorkloadEstimateUsage:
    post:
      operationId: BatchUpdateWorkloadEstimateUsage
      description: Update a newly added or existing usage lines. You can update the usage amounts and usage group based on a usage ID and a Workload estimate ID. The BatchUpdateWorkloadEstimateUsage operation doesn't have its own IAM permission. To authorize this operation for Amazon Web Services principals, include the permission bcm-pricing-calculator:UpdateWorkloadEstimateUsage in your policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
