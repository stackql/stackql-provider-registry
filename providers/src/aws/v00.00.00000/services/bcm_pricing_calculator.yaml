              required:
                - billScenarioId
                - usageModifications
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateBillScenarioUsageModificationResponse"
  /BatchCreateWorkloadEstimateUsage:
    post:
      operationId: BatchCreateWorkloadEstimateUsage
      description: Create Amazon Web Services service usage that you want to model in a Workload Estimate. The BatchCreateWorkloadEstimateUsage operation doesn't have its own IAM permission. To authorize this operation for Amazon Web Services principals, include the permission bcm-pricing-calculator:CreateWorkloadEstimateUsage in your policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMPricingCalculator.BatchCreateWorkloadEstimateUsage
