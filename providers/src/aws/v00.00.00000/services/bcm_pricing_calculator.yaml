      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMPricingCalculator.BatchDeleteBillScenarioUsageModification
            default: AWSBCMPricingCalculator.BatchDeleteBillScenarioUsageModification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                billScenarioId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Bill Scenario for which you want to delete the modeled usage.
                ids:
                  $ref: "#/components/schemas/BatchDeleteBillScenarioUsageModificationEntries"
                  description: List of usage that you want to delete from the Bill Scenario.
