      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                billScenarioId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Bill Scenario for which you want to modify the commitment group of a modeled commitment.
                commitmentModifications:
                  $ref: "#/components/schemas/BatchUpdateBillScenarioCommitmentModificationEntries"
                  description: List of commitments that you want to update in a Bill Scenario.
              required:
                - billScenarioId
                - commitmentModifications
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateBillScenarioCommitmentModificationResponse"
  /BatchUpdateBillScenarioUsageModification:
    post:
      operationId: BatchUpdateBillScenarioUsageModification
      description: Update a newly added or existing usage lines. You can update the usage amounts, usage hour, and usage group based on a usage ID and a Bill scenario ID. The BatchUpdateBillScenarioUsageModification operation doesn't have its own IAM permission. To authorize this operation for Amazon Web Services principals, include the permission bcm-pricing-calculator:UpdateBillScenarioUsageModification in your policies.
