          description: Additional notes or comments to add to the delegation request.
      required:
        - DelegationRequestId
    UpdateGroupRequest:
      type: object
      properties:
        GroupName:
          $ref: "#/components/schemas/groupNameType"
          description: "Name of the IAM group to update. If you're changing the name of the group, this is the original name. This parameter allows (through its regex pattern) a string of characters consisting of upper and lowercase alphanumeric characters with no spaces. You can also include any of the following characters: _+=,.@-"
        NewPath:
          $ref: "#/components/schemas/pathType"
          description: New path for the IAM group. Only include this if changing the group's path. This parameter allows (through its regex pattern) a string of characters consisting of either a forward slash (/) by itself or a string that must begin and end with forward slashes. In addition, it can contain any ASCII character from the ! (\u0021) through the DEL character (\u007F), including most punctuation characters, digits, and upper and lowercased letters.
        NewGroupName:
          $ref: "#/components/schemas/groupNameType"
          description: New name for the IAM group. Only include this if changing the group's name. IAM user, group, role, and policy names must be unique within the account. Names are not distinguished by case. For example, you cannot create resources named both "MyResource" and "myresource".
      required:
        - GroupName
    UpdateLoginProfileRequest:
      type: object
      properties:
        UserName:
          $ref: "#/components/schemas/userNameType"
          description: "The name of the user whose password you want to update. This parameter allows (through its regex pattern) a string of characters consisting of upper and lowercase alphanumeric characters with no spaces. You can also include any of the following characters: _+=,.@-"
        Password:
