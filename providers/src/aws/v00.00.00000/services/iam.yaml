        ClientID:
          $ref: "#/components/schemas/clientIDType"
          description: The client ID (also known as audience) to add to the IAM OpenID Connect provider resource.
      required:
        - OpenIDConnectProviderArn
        - ClientID
    instanceProfileNameType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w+=,.@-]+"
    roleNameType:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\w+=,.@-]+"
