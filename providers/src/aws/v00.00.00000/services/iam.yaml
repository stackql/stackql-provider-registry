          in: query
          required: false
          description: "Specifies whether IAM user passwords must contain at least one of the following non-alphanumeric characters: ! @ # $ % ^ & * ( ) _ + - = [ ] { } | ' If you do not specify a value for this parameter, then the operation uses the default value of false. The result is that passwords do not require at least one symbol character."
          schema:
            $ref: "#/components/schemas/booleanType"
        - name: RequireNumbers
          in: query
          required: false
          description: Specifies whether IAM user passwords must contain at least one numeric character (0 to 9). If you do not specify a value for this parameter, then the operation uses the default value of false. The result is that passwords do not require at least one numeric character.
          schema:
            $ref: "#/components/schemas/booleanType"
        - name: RequireUppercaseCharacters
          in: query
          required: false
          description: Specifies whether IAM user passwords must contain at least one uppercase character from the ISO basic Latin alphabet (A to Z). If you do not specify a value for this parameter, then the operation uses the default value of false. The result is that passwords do not require at least one uppercase character.
          schema:
            $ref: "#/components/schemas/booleanType"
        - name: RequireLowercaseCharacters
          in: query
          required: false
          description: Specifies whether IAM user passwords must contain at least one lowercase character from the ISO basic Latin alphabet (a to z). If you do not specify a value for this parameter, then the operation uses the default value of false. The result is that passwords do not require at least one lowercase character.
          schema:
            $ref: "#/components/schemas/booleanType"
        - name: AllowUsersToChangePassword
          in: query
          required: false
          description: Allows all IAM users in your account to use the Amazon Web Services Management Console to change their own passwords. For more information, see Permitting IAM users to change their own passwords in the IAM User Guide. If you do not specify a value for this parameter, then the operation uses the default value of false. The result is that IAM users in the account do not automatically have permissions to change their own password.
          schema:
            $ref: "#/components/schemas/booleanType"
        - name: MaxPasswordAge
          in: query
          required: false
          description: The number of days that an IAM user password is valid. If you do not specify a value for this parameter, then the operation uses the default value of 0. The result is that IAM user passwords never expire.
          schema:
            $ref: "#/components/schemas/maxPasswordAgeType"
        - name: PasswordReusePrevention
          in: query
          required: false
          description: Specifies the number of previous passwords that IAM users are prevented from reusing. If you do not specify a value for this parameter, then the operation uses the default value of 0. The result is that IAM users are not prevented from reusing previous passwords.
          schema:
            $ref: "#/components/schemas/passwordReusePreventionType"
        - name: HardExpiry
          in: query
          required: false
          description: Prevents IAM users who are accessing the account via the Amazon Web Services Management Console from setting a new console password after their password has expired. The IAM user cannot access the console until an administrator resets the password. If you do not specify a value for this parameter, then the operation uses the default value of false. The result is that IAM users can change their passwords after they expire and continue to sign in as the user. In the Amazon Web Services Management Console, the custom password policy option Allow users to change their own password gives IAM users permissions to iam:ChangePassword for only their user and to the iam:GetAccountPasswordPolicy action. This option does not attach a permissions policy to each user, rather the permissions are applied at the account-level for all users by IAM. IAM users with iam:ChangePassword permission and active access keys can reset their own expired console password using the CLI or API.
          schema:
            $ref: "#/components/schemas/booleanObjectType"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_UpdateAccountPasswordPolicy
      description: Updates the password policy settings for the Amazon Web Services account. This operation does not support partial updates. No parameters are required, but if you do not specify a parameter, that parameter's value reverts to its default value. See the Request Parameters section for each parameter's default value. Also note that some parameters do not allow the default parameter to be explicitly set. Instead, to invoke the default value, do not include that parameter when you invoke the operation. For more information about using a password policy, see Managing an IAM password policy in the IAM User Guide.
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/UpdateAccountPasswordPolicyRequest"
