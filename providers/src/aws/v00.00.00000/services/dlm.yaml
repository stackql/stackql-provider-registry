openapi: 3.0.0
info:
  version: "2018-01-12"
  title: Amazon Data Lifecycle Manager
  description: Amazon Data Lifecycle Manager
  x-serviceName: dlm
  x-serviceAlias: dlm
  x-protocol: rest-json
  x-apiVersion: "2018-01-12"
  x-endpointPrefix: dlm
  x-jsonVersion: "1.1"
servers:
  - url: https://dlm.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for dlm
paths:
  /policies:
    post:
      operationId: CreateLifecyclePolicy
      description: "Creates an Amazon Data Lifecycle Manager lifecycle policy. Amazon Data Lifecycle Manager supports the following policy types: Custom EBS snapshot policy Custom EBS-backed AMI policy Cross-account copy event policy Default policy for EBS snapshots Default policy for EBS-backed AMIs For more information, see Default policies vs custom policies. If you create a default policy, you can specify the request parameters either in the request body, or in the PolicyDetails request structure, but not both."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ExecutionRoleArn:
                  $ref: "#/components/schemas/ExecutionRoleArn"
                Description:
                  $ref: "#/components/schemas/PolicyDescription"
                State:
                  $ref: "#/components/schemas/SettablePolicyStateValues"
                PolicyDetails:
                  $ref: "#/components/schemas/PolicyDetails"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                DefaultPolicy:
                  $ref: "#/components/schemas/DefaultPolicyTypeValues"
                CreateInterval:
                  $ref: "#/components/schemas/CreateInterval"
                RetainInterval:
                  $ref: "#/components/schemas/RetainInterval"
                CopyTags:
                  $ref: "#/components/schemas/CopyTagsNullable"
                ExtendDeletion:
                  $ref: "#/components/schemas/ExtendDeletion"
                CrossRegionCopyTargets:
                  $ref: "#/components/schemas/CrossRegionCopyTargetList"
                Exclusions:
                  $ref: "#/components/schemas/Exclusions"
              required:
                - ExecutionRoleArn
                - Description
                - State
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLifecyclePolicyResponse"
    get:
      operationId: GetLifecyclePolicies
      description: Gets summary information about all or the specified data lifecycle policies. To get complete information about a policy, use GetLifecyclePolicy.
      parameters:
        - name: policyIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PolicyIdList"
          description: The identifiers of the data lifecycle policies.
        - name: state
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GettablePolicyStateValues"
          description: The activation state.
        - name: resourceTypes
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceTypeValuesList"
          description: The resource type.
        - name: targetTags
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TargetTagsFilterList"
          description: The target tag for a policy. Tags are strings in the format key=value.
        - name: tagsToAdd
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TagsToAddFilterList"
          description: The tags to add to objects created by the policy. Tags are strings in the format key=value. These user-defined tags are added in addition to the Amazon Web Services-added lifecycle tags.
        - name: defaultPolicyType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DefaultPoliciesTypeValues"
          description: "[Default policies only] Specifies the type of default policy to get. Specify one of the following: VOLUME - To get only the default policy for EBS snapshots INSTANCE - To get only the default policy for EBS-backed AMIs ALL - To get all default policies"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLifecyclePoliciesResponse"
  /policies/{policy_id}:
    delete:
      operationId: DeleteLifecyclePolicy
      description: Deletes the specified lifecycle policy and halts the automated operations that the policy specified. For more information about deleting a policy, see Delete lifecycle policies.
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyId"
          description: The identifier of the lifecycle policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLifecyclePolicyResponse"
    get:
      operationId: GetLifecyclePolicy
      description: Gets detailed information about the specified lifecycle policy.
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyId"
          description: The identifier of the lifecycle policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLifecyclePolicyResponse"
    patch:
      operationId: UpdateLifecyclePolicy
      description: Updates the specified lifecycle policy. For more information about updating a policy, see Modify lifecycle policies.
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyId"
          description: The identifier of the lifecycle policy.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ExecutionRoleArn:
                  $ref: "#/components/schemas/ExecutionRoleArn"
                State:
                  $ref: "#/components/schemas/SettablePolicyStateValues"
                Description:
                  $ref: "#/components/schemas/PolicyDescription"
                PolicyDetails:
                  $ref: "#/components/schemas/PolicyDetails"
                CreateInterval:
                  $ref: "#/components/schemas/CreateInterval"
                RetainInterval:
                  $ref: "#/components/schemas/RetainInterval"
                CopyTags:
                  $ref: "#/components/schemas/CopyTagsNullable"
                ExtendDeletion:
                  $ref: "#/components/schemas/ExtendDeletion"
                CrossRegionCopyTargets:
                  $ref: "#/components/schemas/CrossRegionCopyTargetList"
                Exclusions:
                  $ref: "#/components/schemas/Exclusions"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLifecyclePolicyResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags for the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyArn"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds the specified tags to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyArn"
          description: The Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes the specified tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyArn"
          description: The Amazon Resource Name (ARN) of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ExecutionRoleArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws(-[a-z]{1,3}){0,2}:iam::\d+:role/.*
    PolicyDescription:
      type: string
      minLength: 0
      maxLength: 500
      pattern: "[0-9A-Za-z _-]+"
    SettablePolicyStateValues:
      type: string
      enum:
        - ENABLED
        - DISABLED
    PolicyDetails:
      description: Specifies the configuration of a lifecycle policy.
      type: object
      properties:
        PolicyType:
          $ref: "#/components/schemas/PolicyTypeValues"
          description: The type of policy. Specify EBS_SNAPSHOT_MANAGEMENT to create a lifecycle policy that manages the lifecycle of Amazon EBS snapshots. Specify IMAGE_MANAGEMENT to create a lifecycle policy that manages the lifecycle of EBS-backed AMIs. Specify EVENT_BASED_POLICY to create an event-based policy that performs specific actions when a defined event occurs in your Amazon Web Services account. The default is EBS_SNAPSHOT_MANAGEMENT.
        ResourceTypes:
          $ref: "#/components/schemas/ResourceTypeValuesList"
          description: "[Custom snapshot policies only] The target resource type for snapshot and AMI lifecycle policies. Use VOLUME to create snapshots of individual volumes or use INSTANCE to create multi-volume snapshots from the volumes for an instance."
        ResourceLocations:
          $ref: "#/components/schemas/ResourceLocationList"
          description: "[Custom snapshot and AMI policies only] The location of the resources to backup. If the source resources are located in a Region, specify CLOUD. In this case, the policy targets all resources of the specified type with matching target tags across all Availability Zones in the Region. [Custom snapshot policies only] If the source resources are located in a Local Zone, specify LOCAL_ZONE. In this case, the policy targets all resources of the specified type with matching target tags across all Local Zones in the Region. If the source resources are located on an Outpost in your account, specify OUTPOST. In this case, the policy targets all resources of the specified type with matching target tags across all of the Outposts in your account."
        TargetTags:
          $ref: "#/components/schemas/TargetTagList"
          description: "[Custom snapshot and AMI policies only] The single tag that identifies targeted resources for this policy."
        Schedules:
          $ref: "#/components/schemas/ScheduleList"
          description: "[Custom snapshot and AMI policies only] The schedules of policy-defined actions for snapshot and AMI lifecycle policies. A policy can have up to four schedules—one mandatory schedule and up to three optional schedules."
        Parameters:
          $ref: "#/components/schemas/Parameters"
          description: "[Custom snapshot and AMI policies only] A set of optional parameters for snapshot and AMI lifecycle policies. If you are modifying a policy that was created or previously modified using the Amazon Data Lifecycle Manager console, then you must include this parameter and specify either the default values or the new values that you require. You can't omit this parameter or set its values to null."
        EventSource:
          $ref: "#/components/schemas/EventSource"
          description: "[Event-based policies only] The event that activates the event-based policy."
        Actions:
          $ref: "#/components/schemas/ActionList"
          description: "[Event-based policies only] The actions to be performed when the event-based policy is activated. You can specify only one action per policy."
        PolicyLanguage:
          $ref: "#/components/schemas/PolicyLanguageValues"
          description: "The type of policy to create. Specify one of the following: SIMPLIFIED To create a default policy. STANDARD To create a custom policy."
        ResourceType:
          $ref: "#/components/schemas/ResourceTypeValues"
          description: "[Default policies only] Specify the type of default policy to create. To create a default policy for EBS snapshots, that creates snapshots of all volumes in the Region that do not have recent backups, specify VOLUME. To create a default policy for EBS-backed AMIs, that creates EBS-backed AMIs from all instances in the Region that do not have recent backups, specify INSTANCE."
        CreateInterval:
          $ref: "#/components/schemas/CreateInterval"
          description: "[Default policies only] Specifies how often the policy should run and create snapshots or AMIs. The creation frequency can range from 1 to 7 days. If you do not specify a value, the default is 1. Default: 1"
        RetainInterval:
          $ref: "#/components/schemas/RetainInterval"
          description: "[Default policies only] Specifies how long the policy should retain snapshots or AMIs before deleting them. The retention period can range from 2 to 14 days, but it must be greater than the creation frequency to ensure that the policy retains at least 1 snapshot or AMI at any given time. If you do not specify a value, the default is 7. Default: 7"
        CopyTags:
          $ref: "#/components/schemas/CopyTagsNullable"
          description: "[Default policies only] Indicates whether the policy should copy tags from the source resource to the snapshot or AMI. If you do not specify a value, the default is false. Default: false"
        CrossRegionCopyTargets:
          $ref: "#/components/schemas/CrossRegionCopyTargetList"
          description: "[Default policies only] Specifies destination Regions for snapshot or AMI copies. You can specify up to 3 destination Regions. If you do not want to create cross-Region copies, omit this parameter."
        ExtendDeletion:
          $ref: "#/components/schemas/ExtendDeletion"
          description: "[Default policies only] Defines the snapshot or AMI retention behavior for the policy if the source volume or instance is deleted, or if the policy enters the error, disabled, or deleted state. By default (ExtendDeletion=false): If a source resource is deleted, Amazon Data Lifecycle Manager will continue to delete previously created snapshots or AMIs, up to but not including the last one, based on the specified retention period. If you want Amazon Data Lifecycle Manager to delete all snapshots or AMIs, including the last one, specify true. If a policy enters the error, disabled, or deleted state, Amazon Data Lifecycle Manager stops deleting snapshots and AMIs. If you want Amazon Data Lifecycle Manager to continue deleting snapshots or AMIs, including the last one, if the policy enters one of these states, specify true. If you enable extended deletion (ExtendDeletion=true), you override both default behaviors simultaneously. If you do not specify a value, the default is false. Default: false"
        Exclusions:
          $ref: "#/components/schemas/Exclusions"
          description: "[Default policies only] Specifies exclusion parameters for volumes or instances for which you do not want to create snapshots or AMIs. The policy will not create snapshots or AMIs for target resources that match any of the specified exclusion parameters."
    PolicyTypeValues:
      type: string
      enum:
        - EBS_SNAPSHOT_MANAGEMENT
        - IMAGE_MANAGEMENT
        - EVENT_BASED_POLICY
    ResourceTypeValuesList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceTypeValues"
    ResourceTypeValues:
      type: string
      enum:
        - VOLUME
        - INSTANCE
    ResourceLocationList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceLocationValues"
    ResourceLocationValues:
      type: string
      enum:
        - CLOUD
        - OUTPOST
        - LOCAL_ZONE
    TargetTagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Specifies a tag for a resource.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: The tag key.
        Value:
          $ref: "#/components/schemas/String"
          description: The tag value.
      required:
        - Key
        - Value
    String:
      type: string
      minLength: 0
      maxLength: 500
      pattern: "[\\p{all}]*"
    ScheduleList:
      type: array
      items:
        $ref: "#/components/schemas/Schedule"
    Schedule:
      description: "[Custom snapshot and AMI policies only] Specifies a schedule for a snapshot or AMI lifecycle policy."
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ScheduleName"
          description: The name of the schedule.
        CopyTags:
          $ref: "#/components/schemas/CopyTags"
          description: Copy all user-defined tags on a source volume to snapshots of the volume created by this policy.
        TagsToAdd:
          $ref: "#/components/schemas/TagsToAddList"
          description: The tags to apply to policy-created resources. These user-defined tags are in addition to the Amazon Web Services-added lifecycle tags.
        VariableTags:
          $ref: "#/components/schemas/VariableTagsList"
          description: "[AMI policies and snapshot policies that target instances only] A collection of key/value pairs with values determined dynamically when the policy is executed. Keys may be any valid Amazon EC2 tag key. Values must be in one of the two following formats: $(instance-id) or $(timestamp). Variable tags are only valid for EBS Snapshot Management – Instance policies."
        CreateRule:
          $ref: "#/components/schemas/CreateRule"
          description: The creation rule.
        RetainRule:
          $ref: "#/components/schemas/RetainRule"
          description: The retention rule for snapshots or AMIs created by the policy.
        FastRestoreRule:
          $ref: "#/components/schemas/FastRestoreRule"
          description: "[Custom snapshot policies only] The rule for enabling fast snapshot restore."
        CrossRegionCopyRules:
          $ref: "#/components/schemas/CrossRegionCopyRules"
          description: Specifies a rule for copying snapshots or AMIs across Regions. You can't specify cross-Region copy rules for policies that create snapshots on an Outpost or in a Local Zone. If the policy creates snapshots in a Region, then snapshots can be copied to up to three Regions or Outposts.
        ShareRules:
          $ref: "#/components/schemas/ShareRules"
          description: "[Custom snapshot policies only] The rule for sharing snapshots with other Amazon Web Services accounts."
        DeprecateRule:
          $ref: "#/components/schemas/DeprecateRule"
          description: "[Custom AMI policies only] The AMI deprecation rule for the schedule."
        ArchiveRule:
          $ref: "#/components/schemas/ArchiveRule"
          description: "[Custom snapshot policies that target volumes only] The snapshot archiving rule for the schedule. When you specify an archiving rule, snapshots are automatically moved from the standard tier to the archive tier once the schedule's retention threshold is met. Snapshots are then retained in the archive tier for the archive retention period that you specify. For more information about using snapshot archiving, see Considerations for snapshot lifecycle policies."
    ScheduleName:
      type: string
      minLength: 0
      maxLength: 120
      pattern: "[0-9A-Za-z _-]+"
    CopyTags:
      type: boolean
    TagsToAddList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    VariableTagsList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    CreateRule:
      description: "[Custom snapshot and AMI policies only] Specifies when the policy should create snapshots or AMIs. You must specify either CronExpression, or Interval, IntervalUnit, and Times. If you need to specify an ArchiveRule for the schedule, then you must specify a creation frequency of at least 28 days."
      type: object
      properties:
        Location:
          $ref: "#/components/schemas/LocationValues"
          description: "[Custom snapshot policies only] Specifies the destination for snapshots created by the policy. The allowed destinations depend on the location of the targeted resources. If the policy targets resources in a Region, then you must create snapshots in the same Region as the source resource. If the policy targets resources in a Local Zone, you can create snapshots in the same Local Zone or in its parent Region. If the policy targets resources on an Outpost, then you can create snapshots on the same Outpost or in its parent Region. Specify one of the following values: To create snapshots in the same Region as the source resource, specify CLOUD. To create snapshots in the same Local Zone as the source resource, specify LOCAL_ZONE. To create snapshots on the same Outpost as the source resource, specify OUTPOST_LOCAL. Default: CLOUD"
        Interval:
          $ref: "#/components/schemas/Interval"
          description: The interval between snapshots. The supported values are 1, 2, 3, 4, 6, 8, 12, and 24.
        IntervalUnit:
          $ref: "#/components/schemas/IntervalUnitValues"
          description: The interval unit.
        Times:
          $ref: "#/components/schemas/TimesList"
          description: The time, in UTC, to start the operation. The supported format is hh:mm. The operation occurs within a one-hour window following the specified time. If you do not specify a time, Amazon Data Lifecycle Manager selects a time within the next 24 hours.
        CronExpression:
          $ref: "#/components/schemas/CronExpression"
          description: The schedule, as a Cron expression. The schedule interval must be between 1 hour and 1 year. For more information, see the Cron expressions reference in the Amazon EventBridge User Guide.
        Scripts:
          $ref: "#/components/schemas/ScriptsList"
          description: "[Custom snapshot policies that target instances only] Specifies pre and/or post scripts for a snapshot lifecycle policy that targets instances. This is useful for creating application-consistent snapshots, or for performing specific administrative tasks before or after Amazon Data Lifecycle Manager initiates snapshot creation. For more information, see Automating application-consistent snapshots with pre and post scripts."
    LocationValues:
      type: string
      enum:
        - CLOUD
        - OUTPOST_LOCAL
        - LOCAL_ZONE
    Interval:
      type: integer
      minimum: 1
    IntervalUnitValues:
      type: string
      enum:
        - HOURS
    TimesList:
      type: array
      items:
        $ref: "#/components/schemas/Time"
    Time:
      type: string
      minLength: 5
      maxLength: 5
      pattern: ^(0[0-9]|1[0-9]|2[0-3]):[0-5][0-9]$
    CronExpression:
      type: string
      minLength: 17
      maxLength: 106
      pattern: cron\([^\n]{11,100}\)
    ScriptsList:
      type: array
      items:
        $ref: "#/components/schemas/Script"
    Script:
      description: "[Custom snapshot policies that target instances only] Information about pre and/or post scripts for a snapshot lifecycle policy that targets instances. For more information, see Automating application-consistent snapshots with pre and post scripts."
      type: object
      properties:
        Stages:
          $ref: "#/components/schemas/StagesList"
          description: "Indicate which scripts Amazon Data Lifecycle Manager should run on target instances. Pre scripts run before Amazon Data Lifecycle Manager initiates snapshot creation. Post scripts run after Amazon Data Lifecycle Manager initiates snapshot creation. To run a pre script only, specify PRE. In this case, Amazon Data Lifecycle Manager calls the SSM document with the pre-script parameter before initiating snapshot creation. To run a post script only, specify POST. In this case, Amazon Data Lifecycle Manager calls the SSM document with the post-script parameter after initiating snapshot creation. To run both pre and post scripts, specify both PRE and POST. In this case, Amazon Data Lifecycle Manager calls the SSM document with the pre-script parameter before initiating snapshot creation, and then it calls the SSM document again with the post-script parameter after initiating snapshot creation. If you are automating VSS Backups, omit this parameter. Default: PRE and POST"
        ExecutionHandlerService:
          $ref: "#/components/schemas/ExecutionHandlerServiceValues"
          description: "Indicates the service used to execute the pre and/or post scripts. If you are using custom SSM documents or automating application-consistent snapshots of SAP HANA workloads, specify AWS_SYSTEMS_MANAGER. If you are automating VSS Backups, omit this parameter. Default: AWS_SYSTEMS_MANAGER"
        ExecutionHandler:
          $ref: "#/components/schemas/ExecutionHandler"
          description: The SSM document that includes the pre and/or post scripts to run. If you are automating VSS backups, specify AWS_VSS_BACKUP. In this case, Amazon Data Lifecycle Manager automatically uses the AWSEC2-CreateVssSnapshot SSM document. If you are automating application-consistent snapshots for SAP HANA workloads, specify AWSSystemsManagerSAP-CreateDLMSnapshotForSAPHANA. If you are using a custom SSM document that you own, specify either the name or ARN of the SSM document. If you are using a custom SSM document that is shared with you, specify the ARN of the SSM document.
        ExecuteOperationOnScriptFailure:
          $ref: "#/components/schemas/ExecuteOperationOnScriptFailure"
          description: "Indicates whether Amazon Data Lifecycle Manager should default to crash-consistent snapshots if the pre script fails. To default to crash consistent snapshot if the pre script fails, specify true. To skip the instance for snapshot creation if the pre script fails, specify false. This parameter is supported only if you run a pre script. If you run a post script only, omit this parameter. Default: true"
        ExecutionTimeout:
          $ref: "#/components/schemas/ScriptExecutionTimeout"
          description: "Specifies a timeout period, in seconds, after which Amazon Data Lifecycle Manager fails the script run attempt if it has not completed. If a script does not complete within its timeout period, Amazon Data Lifecycle Manager fails the attempt. The timeout period applies to the pre and post scripts individually. If you are automating VSS Backups, omit this parameter. Default: 10"
        MaximumRetryCount:
          $ref: "#/components/schemas/ScriptMaximumRetryCount"
          description: "Specifies the number of times Amazon Data Lifecycle Manager should retry scripts that fail. If the pre script fails, Amazon Data Lifecycle Manager retries the entire snapshot creation process, including running the pre and post scripts. If the post script fails, Amazon Data Lifecycle Manager retries the post script only; in this case, the pre script will have completed and the snapshot might have been created. If you do not want Amazon Data Lifecycle Manager to retry failed scripts, specify 0. Default: 0"
      required:
        - ExecutionHandler
    StagesList:
      type: array
      items:
        $ref: "#/components/schemas/StageValues"
    StageValues:
      type: string
      enum:
        - PRE
        - POST
    ExecutionHandlerServiceValues:
      type: string
      enum:
        - AWS_SYSTEMS_MANAGER
    ExecutionHandler:
      type: string
      minLength: 0
      maxLength: 200
      pattern: ^([a-zA-Z0-9_\-.]{3,128}|[a-zA-Z0-9_\-.:/]{3,200}|[A-Z0-9_]+)$
    ExecuteOperationOnScriptFailure:
      type: boolean
    ScriptExecutionTimeout:
      type: integer
      minimum: 10
      maximum: 120
    ScriptMaximumRetryCount:
      type: integer
      minimum: 0
      maximum: 3
    RetainRule:
      description: "[Custom snapshot and AMI policies only] Specifies a retention rule for snapshots created by snapshot policies, or for AMIs created by AMI policies. For snapshot policies that have an ArchiveRule, this retention rule applies to standard tier retention. When the retention threshold is met, snapshots are moved from the standard to the archive tier. For snapshot policies that do not have an ArchiveRule, snapshots are permanently deleted when this retention threshold is met. You can retain snapshots based on either a count or a time interval. Count-based retention You must specify Count. If you specify an ArchiveRule for the schedule, then you can specify a retention count of 0 to archive snapshots immediately after creation. If you specify a FastRestoreRule, ShareRule, or a CrossRegionCopyRule, then you must specify a retention count of 1 or more. Age-based retention You must specify Interval and IntervalUnit. If you specify an ArchiveRule for the schedule, then you can specify a retention interval of 0 days to archive snapshots immediately after creation. If you specify a FastRestoreRule, ShareRule, or a CrossRegionCopyRule, then you must specify a retention interval of 1 day or more."
      type: object
      properties:
        Count:
          $ref: "#/components/schemas/StandardTierRetainRuleCount"
          description: The number of snapshots to retain for each volume, up to a maximum of 1000. For example if you want to retain a maximum of three snapshots, specify 3. When the fourth snapshot is created, the oldest retained snapshot is deleted, or it is moved to the archive tier if you have specified an ArchiveRule.
        Interval:
          $ref: "#/components/schemas/StandardTierRetainRuleInterval"
          description: The amount of time to retain each snapshot. The maximum is 100 years. This is equivalent to 1200 months, 5200 weeks, or 36500 days.
        IntervalUnit:
          $ref: "#/components/schemas/RetentionIntervalUnitValues"
          description: The unit of time for time-based retention. For example, to retain snapshots for 3 months, specify Interval=3 and IntervalUnit=MONTHS. Once the snapshot has been retained for 3 months, it is deleted, or it is moved to the archive tier if you have specified an ArchiveRule.
    StandardTierRetainRuleCount:
      type: integer
      minimum: 0
      maximum: 1000
    StandardTierRetainRuleInterval:
      type: integer
      minimum: 0
    RetentionIntervalUnitValues:
      type: string
      enum:
        - DAYS
        - WEEKS
        - MONTHS
        - YEARS
    FastRestoreRule:
      description: "[Custom snapshot policies only] Specifies a rule for enabling fast snapshot restore for snapshots created by snapshot policies. You can enable fast snapshot restore based on either a count or a time interval."
      type: object
      properties:
        Count:
          $ref: "#/components/schemas/Count"
          description: The number of snapshots to be enabled with fast snapshot restore.
        Interval:
          $ref: "#/components/schemas/Interval"
          description: The amount of time to enable fast snapshot restore. The maximum is 100 years. This is equivalent to 1200 months, 5200 weeks, or 36500 days.
        IntervalUnit:
          $ref: "#/components/schemas/RetentionIntervalUnitValues"
          description: The unit of time for enabling fast snapshot restore.
        AvailabilityZones:
          $ref: "#/components/schemas/AvailabilityZoneList"
          description: The Availability Zones in which to enable fast snapshot restore.
        AvailabilityZoneIds:
          $ref: "#/components/schemas/AvailabilityZoneIdList"
          description: The Availability Zone Ids in which to enable fast snapshot restore.
    Count:
      type: integer
      minimum: 1
      maximum: 1000
    AvailabilityZoneList:
      type: array
      items:
        $ref: "#/components/schemas/AvailabilityZone"
    AvailabilityZone:
      type: string
      minLength: 0
      maxLength: 16
      pattern: ([a-z]+-){2,3}\d[a-z]
    AvailabilityZoneIdList:
      type: array
      items:
        $ref: "#/components/schemas/AvailabilityZoneId"
    AvailabilityZoneId:
      type: string
      minLength: 0
      maxLength: 16
      pattern: "[a-z]{3,4}\\d-az\\d+"
    CrossRegionCopyRules:
      type: array
      items:
        $ref: "#/components/schemas/CrossRegionCopyRule"
    CrossRegionCopyRule:
      description: "[Custom snapshot and AMI policies only] Specifies a cross-Region copy rule for a snapshot and AMI policies. To specify a cross-Region copy action for event-based polices, use CrossRegionCopyAction."
      type: object
      properties:
        TargetRegion:
          $ref: "#/components/schemas/TargetRegion"
          description: Use this parameter for AMI policies only. For snapshot policies, use Target instead. For snapshot policies created before the Target parameter was introduced, this parameter indicates the target Region for snapshot copies. [Custom AMI policies only] The target Region or the Amazon Resource Name (ARN) of the target Outpost for the snapshot copies.
        Target:
          $ref: "#/components/schemas/Target"
          description: Use this parameter for snapshot policies only. For AMI policies, use TargetRegion instead. [Custom snapshot policies only] The target Region or the Amazon Resource Name (ARN) of the target Outpost for the snapshot copies.
        Encrypted:
          $ref: "#/components/schemas/Encrypted"
          description: To encrypt a copy of an unencrypted snapshot if encryption by default is not enabled, enable encryption using this parameter. Copies of encrypted snapshots are encrypted, even if this parameter is false or if encryption by default is not enabled.
        CmkArn:
          $ref: "#/components/schemas/CmkArn"
          description: The Amazon Resource Name (ARN) of the KMS key to use for EBS encryption. If this parameter is not specified, the default KMS key for the account is used.
        CopyTags:
          $ref: "#/components/schemas/CopyTagsNullable"
          description: Indicates whether to copy all user-defined tags from the source snapshot or AMI to the cross-Region copy.
        RetainRule:
          $ref: "#/components/schemas/CrossRegionCopyRetainRule"
          description: The retention rule that indicates how long the cross-Region snapshot or AMI copies are to be retained in the destination Region.
        DeprecateRule:
          $ref: "#/components/schemas/CrossRegionCopyDeprecateRule"
          description: "[Custom AMI policies only] The AMI deprecation rule for cross-Region AMI copies created by the rule."
      required:
        - Encrypted
    TargetRegion:
      type: string
      minLength: 0
      maxLength: 16
      pattern: ([a-z]+-){2,3}\d
    Target:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^[\w:\-\/\*]+$
    Encrypted:
      type: boolean
    CmkArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws(-[a-z]{1,3}){0,2}:kms:([a-z]+-){2,3}\d:\d+:key/.*
    CopyTagsNullable:
      type: boolean
    CrossRegionCopyRetainRule:
      description: Specifies a retention rule for cross-Region snapshot copies created by snapshot or event-based policies, or cross-Region AMI copies created by AMI policies. After the retention period expires, the cross-Region copy is deleted.
      type: object
      properties:
        Interval:
          $ref: "#/components/schemas/Interval"
          description: The amount of time to retain a cross-Region snapshot or AMI copy. The maximum is 100 years. This is equivalent to 1200 months, 5200 weeks, or 36500 days.
        IntervalUnit:
          $ref: "#/components/schemas/RetentionIntervalUnitValues"
          description: The unit of time for time-based retention. For example, to retain a cross-Region copy for 3 months, specify Interval=3 and IntervalUnit=MONTHS.
    CrossRegionCopyDeprecateRule:
      description: "[Custom AMI policies only] Specifies an AMI deprecation rule for cross-Region AMI copies created by an AMI policy."
      type: object
      properties:
        Interval:
          $ref: "#/components/schemas/Interval"
          description: The period after which to deprecate the cross-Region AMI copies. The period must be less than or equal to the cross-Region AMI copy retention period, and it can't be greater than 10 years. This is equivalent to 120 months, 520 weeks, or 3650 days.
        IntervalUnit:
          $ref: "#/components/schemas/RetentionIntervalUnitValues"
          description: The unit of time in which to measure the Interval. For example, to deprecate a cross-Region AMI copy after 3 months, specify Interval=3 and IntervalUnit=MONTHS.
    ShareRules:
      type: array
      items:
        $ref: "#/components/schemas/ShareRule"
    ShareRule:
      description: "[Custom snapshot policies only] Specifies a rule for sharing snapshots across Amazon Web Services accounts."
      type: object
      properties:
        TargetAccounts:
          $ref: "#/components/schemas/ShareTargetAccountList"
          description: The IDs of the Amazon Web Services accounts with which to share the snapshots.
        UnshareInterval:
          $ref: "#/components/schemas/Interval"
          description: The period after which snapshots that are shared with other Amazon Web Services accounts are automatically unshared.
        UnshareIntervalUnit:
          $ref: "#/components/schemas/RetentionIntervalUnitValues"
          description: The unit of time for the automatic unsharing interval.
      required:
        - TargetAccounts
    ShareTargetAccountList:
      type: array
      items:
        $ref: "#/components/schemas/AwsAccountId"
    AwsAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^[0-9]{12}$
    DeprecateRule:
      description: "[Custom AMI policies only] Specifies an AMI deprecation rule for AMIs created by an AMI lifecycle policy. For age-based schedules, you must specify Interval and IntervalUnit. For count-based schedules, you must specify Count."
      type: object
      properties:
        Count:
          $ref: "#/components/schemas/Count"
          description: If the schedule has a count-based retention rule, this parameter specifies the number of oldest AMIs to deprecate. The count must be less than or equal to the schedule's retention count, and it can't be greater than 1000.
        Interval:
          $ref: "#/components/schemas/Interval"
          description: If the schedule has an age-based retention rule, this parameter specifies the period after which to deprecate AMIs created by the schedule. The period must be less than or equal to the schedule's retention period, and it can't be greater than 10 years. This is equivalent to 120 months, 520 weeks, or 3650 days.
        IntervalUnit:
          $ref: "#/components/schemas/RetentionIntervalUnitValues"
          description: The unit of time in which to measure the Interval.
    ArchiveRule:
      description: "[Custom snapshot policies only] Specifies a snapshot archiving rule for a schedule."
      type: object
      properties:
        RetainRule:
          $ref: "#/components/schemas/ArchiveRetainRule"
          description: Information about the retention period for the snapshot archiving rule.
      required:
        - RetainRule
    ArchiveRetainRule:
      description: "[Custom snapshot policies only] Specifies information about the archive storage tier retention period."
      type: object
      properties:
        RetentionArchiveTier:
          $ref: "#/components/schemas/RetentionArchiveTier"
          description: Information about retention period in the Amazon EBS Snapshots Archive. For more information, see Archive Amazon EBS snapshots.
      required:
        - RetentionArchiveTier
    RetentionArchiveTier:
      description: "[Custom snapshot policies only] Describes the retention rule for archived snapshots. Once the archive retention threshold is met, the snapshots are permanently deleted from the archive tier. The archive retention rule must retain snapshots in the archive tier for a minimum of 90 days. For count-based schedules, you must specify Count. For age-based schedules, you must specify Interval and IntervalUnit. For more information about using snapshot archiving, see Considerations for snapshot lifecycle policies."
      type: object
      properties:
        Count:
          $ref: "#/components/schemas/Count"
          description: The maximum number of snapshots to retain in the archive storage tier for each volume. The count must ensure that each snapshot remains in the archive tier for at least 90 days. For example, if the schedule creates snapshots every 30 days, you must specify a count of 3 or more to ensure that each snapshot is archived for at least 90 days.
        Interval:
          $ref: "#/components/schemas/Interval"
          description: Specifies the period of time to retain snapshots in the archive tier. After this period expires, the snapshot is permanently deleted.
        IntervalUnit:
          $ref: "#/components/schemas/RetentionIntervalUnitValues"
          description: The unit of time in which to measure the Interval. For example, to retain a snapshots in the archive tier for 6 months, specify Interval=6 and IntervalUnit=MONTHS.
    Parameters:
      description: "[Custom snapshot and AMI policies only] Specifies optional parameters for snapshot and AMI policies. The set of valid parameters depends on the combination of policy type and target resource type. If you choose to exclude boot volumes and you specify tags that consequently exclude all of the additional data volumes attached to an instance, then Amazon Data Lifecycle Manager will not create any snapshots for the affected instance, and it will emit a SnapshotsCreateFailed Amazon CloudWatch metric. For more information, see Monitor your policies using Amazon CloudWatch."
      type: object
      properties:
        ExcludeBootVolume:
          $ref: "#/components/schemas/ExcludeBootVolume"
          description: "[Custom snapshot policies that target instances only] Indicates whether to exclude the root volume from multi-volume snapshot sets. The default is false. If you specify true, then the root volumes attached to targeted instances will be excluded from the multi-volume snapshot sets created by the policy."
        NoReboot:
          $ref: "#/components/schemas/NoReboot"
          description: "[Custom AMI policies only] Indicates whether targeted instances are rebooted when the lifecycle policy runs. true indicates that targeted instances are not rebooted when the policy runs. false indicates that target instances are rebooted when the policy runs. The default is true (instances are not rebooted)."
        ExcludeDataVolumeTags:
          $ref: "#/components/schemas/ExcludeDataVolumeTagList"
          description: "[Custom snapshot policies that target instances only] The tags used to identify data (non-root) volumes to exclude from multi-volume snapshot sets. If you create a snapshot lifecycle policy that targets instances and you specify tags for this parameter, then data volumes with the specified tags that are attached to targeted instances will be excluded from the multi-volume snapshot sets created by the policy."
    ExcludeBootVolume:
      type: boolean
    NoReboot:
      type: boolean
    ExcludeDataVolumeTagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    EventSource:
      description: "[Event-based policies only] Specifies an event that activates an event-based policy."
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/EventSourceValues"
          description: The source of the event. Currently only managed CloudWatch Events rules are supported.
        Parameters:
          $ref: "#/components/schemas/EventParameters"
          description: Information about the event.
      required:
        - Type
    EventSourceValues:
      type: string
      enum:
        - MANAGED_CWE
    EventParameters:
      description: "[Event-based policies only] Specifies an event that activates an event-based policy."
      type: object
      properties:
        EventType:
          $ref: "#/components/schemas/EventTypeValues"
          description: The type of event. Currently, only snapshot sharing events are supported.
        SnapshotOwner:
          $ref: "#/components/schemas/SnapshotOwnerList"
          description: The IDs of the Amazon Web Services accounts that can trigger policy by sharing snapshots with your account. The policy only runs if one of the specified Amazon Web Services accounts shares a snapshot with your account.
        DescriptionRegex:
          $ref: "#/components/schemas/DescriptionRegex"
          description: "The snapshot description that can trigger the policy. The description pattern is specified using a regular expression. The policy runs only if a snapshot with a description that matches the specified pattern is shared with your account. For example, specifying ^.*Created for policy: policy-1234567890abcdef0.*$ configures the policy to run only if snapshots created by policy policy-1234567890abcdef0 are shared with your account."
      required:
        - EventType
        - SnapshotOwner
        - DescriptionRegex
    EventTypeValues:
      type: string
      enum:
        - shareSnapshot
    SnapshotOwnerList:
      type: array
      items:
        $ref: "#/components/schemas/AwsAccountId"
    DescriptionRegex:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: "[\\p{all}]*"
    ActionList:
      type: array
      items:
        $ref: "#/components/schemas/Action"
    Action:
      description: "[Event-based policies only] Specifies an action for an event-based policy."
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ActionName"
          description: A descriptive name for the action.
        CrossRegionCopy:
          $ref: "#/components/schemas/CrossRegionCopyActionList"
          description: The rule for copying shared snapshots across Regions.
      required:
        - Name
        - CrossRegionCopy
    ActionName:
      type: string
      minLength: 0
      maxLength: 120
      pattern: "[0-9A-Za-z _-]+"
    CrossRegionCopyActionList:
      type: array
      items:
        $ref: "#/components/schemas/CrossRegionCopyAction"
    CrossRegionCopyAction:
      description: "[Event-based policies only] Specifies a cross-Region copy action for event-based policies. To specify a cross-Region copy rule for snapshot and AMI policies, use CrossRegionCopyRule."
      type: object
      properties:
        Target:
          $ref: "#/components/schemas/Target"
          description: The target Region.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: The encryption settings for the copied snapshot.
        RetainRule:
          $ref: "#/components/schemas/CrossRegionCopyRetainRule"
      required:
        - Target
        - EncryptionConfiguration
    EncryptionConfiguration:
      description: "[Event-based policies only] Specifies the encryption settings for cross-Region snapshot copies created by event-based policies."
      type: object
      properties:
        Encrypted:
          $ref: "#/components/schemas/Encrypted"
          description: To encrypt a copy of an unencrypted snapshot when encryption by default is not enabled, enable encryption using this parameter. Copies of encrypted snapshots are encrypted, even if this parameter is false or when encryption by default is not enabled.
        CmkArn:
          $ref: "#/components/schemas/CmkArn"
          description: The Amazon Resource Name (ARN) of the KMS key to use for EBS encryption. If this parameter is not specified, the default KMS key for the account is used.
      required:
        - Encrypted
    PolicyLanguageValues:
      type: string
      enum:
        - SIMPLIFIED
        - STANDARD
    CreateInterval:
      type: integer
      minimum: 1
    RetainInterval:
      type: integer
      minimum: 1
    CrossRegionCopyTargetList:
      type: array
      items:
        $ref: "#/components/schemas/CrossRegionCopyTarget"
    CrossRegionCopyTarget:
      description: "[Default policies only] Specifies a destination Region for cross-Region copy actions."
      type: object
      properties:
        TargetRegion:
          $ref: "#/components/schemas/TargetRegion"
          description: The target Region, for example us-east-1.
    ExtendDeletion:
      type: boolean
    Exclusions:
      description: "[Default policies only] Specifies exclusion parameters for volumes or instances for which you do not want to create snapshots or AMIs. The policy will not create snapshots or AMIs for target resources that match any of the specified exclusion parameters."
      type: object
      properties:
        ExcludeBootVolumes:
          $ref: "#/components/schemas/ExcludeBootVolumes"
          description: "[Default policies for EBS snapshots only] Indicates whether to exclude volumes that are attached to instances as the boot volume. If you exclude boot volumes, only volumes attached as data (non-boot) volumes will be backed up by the policy. To exclude boot volumes, specify true."
        ExcludeVolumeTypes:
          $ref: "#/components/schemas/ExcludeVolumeTypesList"
          description: "[Default policies for EBS snapshots only] Specifies the volume types to exclude. Volumes of the specified types will not be targeted by the policy."
        ExcludeTags:
          $ref: "#/components/schemas/ExcludeTagsList"
          description: "[Default policies for EBS-backed AMIs only] Specifies whether to exclude volumes that have specific tags."
    ExcludeBootVolumes:
      type: boolean
    ExcludeVolumeTypesList:
      type: array
      items:
        $ref: "#/components/schemas/VolumeTypeValues"
    VolumeTypeValues:
      type: string
    ExcludeTagsList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    TagMap:
      type: object
      properties: {}
    DefaultPolicyTypeValues:
      type: string
      enum:
        - VOLUME
        - INSTANCE
    CreateLifecyclePolicyResponse:
      type: object
      properties:
        PolicyId:
          $ref: "#/components/schemas/PolicyId"
          description: The identifier of the lifecycle policy.
    PolicyId:
      type: string
      minLength: 0
      maxLength: 64
      pattern: policy-[a-f0-9]+
    DeleteLifecyclePolicyResponse:
      type: object
    PolicyIdList:
      type: array
      items:
        $ref: "#/components/schemas/PolicyId"
    GettablePolicyStateValues:
      type: string
      enum:
        - ENABLED
        - DISABLED
        - ERROR
    TargetTagsFilterList:
      type: array
      items:
        $ref: "#/components/schemas/TagFilter"
    TagFilter:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\p{all}]*"
    TagsToAddFilterList:
      type: array
      items:
        $ref: "#/components/schemas/TagFilter"
    DefaultPoliciesTypeValues:
      type: string
      enum:
        - VOLUME
        - INSTANCE
        - ALL
    GetLifecyclePoliciesResponse:
      type: object
      properties:
        Policies:
          $ref: "#/components/schemas/LifecyclePolicySummaryList"
          description: Summary information about the lifecycle policies.
    LifecyclePolicySummaryList:
      type: array
      items:
        $ref: "#/components/schemas/LifecyclePolicySummary"
    LifecyclePolicySummary:
      description: Summary information about a lifecycle policy.
      type: object
      properties:
        PolicyId:
          $ref: "#/components/schemas/PolicyId"
          description: The identifier of the lifecycle policy.
        Description:
          $ref: "#/components/schemas/PolicyDescription"
          description: The description of the lifecycle policy.
        State:
          $ref: "#/components/schemas/GettablePolicyStateValues"
          description: The activation state of the lifecycle policy.
        Tags:
          type: object
          properties: {}
          description: The tags.
        PolicyType:
          $ref: "#/components/schemas/PolicyTypeValues"
          description: The type of policy. EBS_SNAPSHOT_MANAGEMENT indicates that the policy manages the lifecycle of Amazon EBS snapshots. IMAGE_MANAGEMENT indicates that the policy manages the lifecycle of EBS-backed AMIs. EVENT_BASED_POLICY indicates that the policy automates cross-account snapshot copies for snapshots that are shared with your account.
        DefaultPolicy:
          $ref: "#/components/schemas/DefaultPolicy"
          description: "[Default policies only] The type of default policy. Values include: VOLUME - Default policy for EBS snapshots INSTANCE - Default policy for EBS-backed AMIs"
    DefaultPolicy:
      type: boolean
    GetLifecyclePolicyResponse:
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/LifecyclePolicy"
          description: Detailed information about the lifecycle policy.
    LifecyclePolicy:
      description: Information about a lifecycle policy.
      type: object
      properties:
        PolicyId:
          $ref: "#/components/schemas/PolicyId"
          description: The identifier of the lifecycle policy.
        Description:
          $ref: "#/components/schemas/PolicyDescription"
          description: The description of the lifecycle policy.
        State:
          $ref: "#/components/schemas/GettablePolicyStateValues"
          description: The activation state of the lifecycle policy.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: The description of the status.
        ExecutionRoleArn:
          $ref: "#/components/schemas/ExecutionRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role used to run the operations specified by the lifecycle policy.
        DateCreated:
          $ref: "#/components/schemas/Timestamp"
          description: The local date and time when the lifecycle policy was created.
        DateModified:
          $ref: "#/components/schemas/Timestamp"
          description: The local date and time when the lifecycle policy was last modified.
        PolicyDetails:
          $ref: "#/components/schemas/PolicyDetails"
          description: The configuration of the lifecycle policy
        Tags:
          type: object
          properties: {}
          description: The tags.
        PolicyArn:
          $ref: "#/components/schemas/PolicyArn"
          description: The Amazon Resource Name (ARN) of the policy.
        DefaultPolicy:
          $ref: "#/components/schemas/DefaultPolicy"
          description: Indicates whether the policy is a default lifecycle policy or a custom lifecycle policy. true - the policy is a default policy. false - the policy is a custom policy.
    StatusMessage:
      type: string
      minLength: 0
      maxLength: 500
      pattern: "[\\p{all}]*"
    Timestamp:
      type: string
      format: date-time
    PolicyArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^arn:aws(-[a-z]{1,3}){0,2}:dlm:[A-Za-z0-9_/.-]{0,63}:\d+:policy/[0-9A-Za-z_-]{1,128}$
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: Information about the tags.
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^(?!aws:)[a-zA-Z+-=._:/]+$
    UntagResourceResponse:
      type: object
    UpdateLifecyclePolicyResponse:
      type: object
