openapi: 3.0.0
info:
  version: "2026-02-05"
  title: AWS Marketplace Discovery
  description: AWS Marketplace Discovery
  x-serviceName: aws-marketplace
  x-serviceAlias: marketplace_discovery
  x-protocol: rest-json
  x-apiVersion: "2026-02-05"
  x-endpointPrefix: discovery-marketplace
servers:
  - url: https://discovery-marketplace.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for marketplace-discovery
paths:
  /2026-02-05/getListing:
    post:
      operationId: GetListing
      description: Provides details about a listing, such as descriptions, badges, categories, pricing model summaries, reviews, and associated products and offers.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                listingId:
                  $ref: "#/components/schemas/ListingId"
              required:
                - listingId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetListingOutput"
  /2026-02-05/getOffer:
    post:
      operationId: GetOffer
      description: Provides details about an offer, such as the pricing model, seller of record, availability dates, badges, and associated products.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                offerId:
                  $ref: "#/components/schemas/OfferId"
              required:
                - offerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOfferOutput"
  /2026-02-05/getOfferSet:
    post:
      operationId: GetOfferSet
      description: Provides details about an offer set, which is a bundle of offers across multiple products. Includes the seller, availability dates, buyer notes, and associated product-offer pairs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                offerSetId:
                  $ref: "#/components/schemas/OfferSetId"
              required:
                - offerSetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOfferSetOutput"
  /2026-02-05/getOfferTerms:
    post:
      operationId: GetOfferTerms
      description: Returns the terms attached to an offer, such as pricing terms (usage-based, contract, BYOL, free trial), legal terms, payment schedules, validity terms, support terms, and renewal terms.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                offerId:
                  $ref: "#/components/schemas/OfferId"
                maxResults:
                  $ref: "#/components/schemas/GetOfferTermsInputMaxResultsInteger"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - offerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOfferTermsOutput"
  /2026-02-05/getProduct:
    post:
      operationId: GetProduct
      description: Provides details about a product, such as descriptions, highlights, categories, fulfillment option summaries, promotional media, and seller engagement options.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  $ref: "#/components/schemas/ProductId"
              required:
                - productId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProductOutput"
  /2026-02-05/listFulfillmentOptions:
    post:
      operationId: ListFulfillmentOptions
      description: Returns the fulfillment options available for a product, including deployment details such as version information, operating systems, usage instructions, and release notes.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  $ref: "#/components/schemas/ProductId"
                maxResults:
                  $ref: "#/components/schemas/ListFulfillmentOptionsInputMaxResultsInteger"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - productId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFulfillmentOptionsOutput"
  /2026-02-05/listPurchaseOptions:
    post:
      operationId: ListPurchaseOptions
      description: "Returns the purchase options (offers and offer sets) available to the buyer. You can filter results by product, seller, purchase option type, visibility scope, and availability status. You must include at least one of the following filters in the request: a PRODUCT_ID filter to specify the product for which to retrieve purchase options, or a VISIBILITY_SCOPE filter to retrieve purchase options by visibility."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/PurchaseOptionFilterList"
                maxResults:
                  $ref: "#/components/schemas/ListPurchaseOptionsInputMaxResultsInteger"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPurchaseOptionsOutput"
  /2026-02-05/searchFacets:
    post:
      operationId: SearchFacets
      description: Returns available facet values for filtering listings, such as categories, pricing models, fulfillment option types, publishers, and customer ratings. Each facet value includes a count of matching listings.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                searchText:
                  $ref: "#/components/schemas/SearchText"
                filters:
                  $ref: "#/components/schemas/SearchFilterList"
                facetTypes:
                  $ref: "#/components/schemas/FacetTypeList"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchFacetsOutput"
  /2026-02-05/searchListings:
    post:
      operationId: SearchListings
      description: Returns a list of product listings based on search criteria and filters. You can search by keyword, filter by category, pricing model, fulfillment type, and other attributes, and sort results by relevance or customer rating.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                searchText:
                  $ref: "#/components/schemas/SearchText"
                filters:
                  $ref: "#/components/schemas/SearchFilterList"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                sortBy:
                  $ref: "#/components/schemas/SearchListingsSortBy"
                sortOrder:
                  $ref: "#/components/schemas/SearchListingsSortOrder"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchListingsOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ListingId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\w\\-]+"
    GetListingOutput:
      type: object
      properties:
        associatedEntities:
          $ref: "#/components/schemas/ListingAssociatedEntityList"
          description: The products and offers associated with this listing. Each entity contains product and offer information.
        badges:
          $ref: "#/components/schemas/ListingBadgeList"
          description: Badges indicating special attributes of the listing, such as free tier eligibility, free trial availability, or Quick Launch support.
        catalog:
          $ref: "#/components/schemas/Catalog"
          description: The name of the catalog that the listing belongs to.
        categories:
          $ref: "#/components/schemas/CategoryList"
          description: The categories used to classify this listing into logical groups.
        fulfillmentOptionSummaries:
          $ref: "#/components/schemas/FulfillmentOptionSummaryList"
          description: A summary of fulfillment options available for deploying or accessing the listing, such as AMI, SaaS, or Container.
        highlights:
          $ref: "#/components/schemas/HighlightList"
          description: A list of key features that the listing offers to customers.
        integrationGuide:
          $ref: "#/components/schemas/NullableString"
          description: Optional guidance explaining how to use data in this listing. Primarily defines how to integrate with a multi-product listing.
        listingId:
          $ref: "#/components/schemas/ListingId"
          description: The unique identifier of the listing.
        listingName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The human-readable display name of the listing.
        logoThumbnailUrl:
          $ref: "#/components/schemas/URL"
          description: The URL of the logo thumbnail image for the listing.
        longDescription:
          $ref: "#/components/schemas/GetListingOutputLongDescriptionString"
          description: A detailed description of what the listing offers, in paragraph format.
        pricingModels:
          $ref: "#/components/schemas/PricingModelList"
          description: The pricing models for offers associated with this listing, such as usage-based, contract, BYOL, or free.
        pricingUnits:
          $ref: "#/components/schemas/PricingUnitList"
          description: The pricing units that define the billing dimensions for offers associated with this listing, such as users, hosts, or data.
        promotionalMedia:
          $ref: "#/components/schemas/PromotionalMediaList"
          description: Embedded promotional media provided by the creator of the product, such as images and videos.
        publisher:
          $ref: "#/components/schemas/SellerInformation"
          description: The entity who created and published the listing.
        resources:
          $ref: "#/components/schemas/ResourceList"
          description: Resources that provide further information about using the product or requesting support, such as documentation links, support contacts, and usage instructions.
        reviewSummary:
          $ref: "#/components/schemas/ReviewSummary"
          description: A summary of customer reviews available for the listing, including average rating and total review count by source.
        sellerEngagements:
          $ref: "#/components/schemas/SellerEngagementList"
          description: Engagement options available to potential buyers, such as requesting a private offer or requesting a demo.
        shortDescription:
          $ref: "#/components/schemas/NonEmptyString"
          description: A 1–3 sentence summary describing the key aspects of the listing.
        useCases:
          $ref: "#/components/schemas/UseCaseList"
          description: Use cases associated with the listing, describing scenarios where the product can be applied.
      required:
        - associatedEntities
        - badges
        - catalog
        - categories
        - fulfillmentOptionSummaries
        - highlights
        - listingId
        - listingName
        - logoThumbnailUrl
        - longDescription
        - pricingModels
        - pricingUnits
        - promotionalMedia
        - publisher
        - resources
        - sellerEngagements
        - shortDescription
        - useCases
    ListingAssociatedEntityList:
      type: array
      items:
        $ref: "#/components/schemas/ListingAssociatedEntity"
    ListingAssociatedEntity:
      description: A product and offer associated with a listing.
      type: object
      properties:
        product:
          $ref: "#/components/schemas/ProductInformation"
          description: Information about the product associated with the listing.
        offer:
          $ref: "#/components/schemas/OfferInformation"
          description: Information about the default offer associated with the listing.
    ProductInformation:
      description: Summary information about a product, including the identifier, name, and manufacturer.
      type: object
      properties:
        productId:
          $ref: "#/components/schemas/ProductId"
          description: The unique identifier of the product.
        productName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The human-readable display name of the product.
        manufacturer:
          $ref: "#/components/schemas/SellerInformation"
          description: The entity who manufactured the product.
      required:
        - productId
        - productName
        - manufacturer
    ProductId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\w\\-]+"
    NonEmptyString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .*\S.*
    SellerInformation:
      description: Information about a seller, including the profile identifier and display name.
      type: object
      properties:
        sellerProfileId:
          $ref: "#/components/schemas/SellerProfileId"
          description: The unique identifier of the seller profile.
        displayName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The human-readable name of the seller.
      required:
        - sellerProfileId
        - displayName
    SellerProfileId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\w\\-]+"
    OfferInformation:
      description: Summary information about an offer, including the offer identifier, name, and seller of record.
      type: object
      properties:
        offerId:
          $ref: "#/components/schemas/OfferId"
          description: The unique identifier of the offer.
        offerName:
          $ref: "#/components/schemas/NullableString"
          description: The display name of the offer.
        sellerOfRecord:
          $ref: "#/components/schemas/SellerInformation"
          description: The entity responsible for selling the product under this offer.
      required:
        - offerId
        - sellerOfRecord
    OfferId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\w\\-]+"
    NullableString:
      type: string
      minLength: 0
      maxLength: 255
    ListingBadgeList:
      type: array
      items:
        $ref: "#/components/schemas/ListingBadge"
    ListingBadge:
      description: A badge indicating a special attribute of a listing, such as free tier eligibility or Quick Launch support.
      type: object
      properties:
        displayName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The human-readable name of the badge.
        badgeType:
          $ref: "#/components/schemas/ListingBadgeType"
          description: The machine-readable type of the badge.
      required:
        - displayName
        - badgeType
    ListingBadgeType:
      type: string
      enum:
        - AWS_FREE_TIER
        - FREE_TRIAL
        - DEPLOYED_ON_AWS
        - QUICK_LAUNCH
        - MULTI_PRODUCT
    Catalog:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\w\\-]+"
    CategoryList:
      type: array
      items:
        $ref: "#/components/schemas/Category"
    Category:
      description: A category used to classify a listing or product into a logical group.
      type: object
      properties:
        categoryId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The machine-readable identifier of the category.
        displayName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The human-readable name of the category.
      required:
        - categoryId
        - displayName
    FulfillmentOptionSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/FulfillmentOptionSummary"
    FulfillmentOptionSummary:
      description: A summary of a fulfillment option available for deploying or accessing a listing or product.
      type: object
      properties:
        fulfillmentOptionType:
          $ref: "#/components/schemas/FulfillmentOptionType"
          description: The machine-readable type of the fulfillment option, such as SAAS or AMAZON_MACHINE_IMAGE.
        displayName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The human-readable name of the fulfillment option type.
      required:
        - fulfillmentOptionType
        - displayName
    FulfillmentOptionType:
      type: string
      enum:
        - AMAZON_MACHINE_IMAGE
        - API
        - CLOUDFORMATION_TEMPLATE
        - CONTAINER
        - HELM
        - EKS_ADD_ON
        - EC2_IMAGE_BUILDER_COMPONENT
        - DATA_EXCHANGE
        - PROFESSIONAL_SERVICES
        - SAAS
        - SAGEMAKER_ALGORITHM
        - SAGEMAKER_MODEL
    HighlightList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    URL:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: https?://.*
    GetListingOutputLongDescriptionString:
      type: string
      minLength: 0
      maxLength: 32768
      pattern: .*\S.*
    PricingModelList:
      type: array
      items:
        $ref: "#/components/schemas/PricingModel"
    PricingModel:
      description: A pricing model that determines how buyers are charged for a listing, such as usage-based, contract, BYOL, or free.
      type: object
      properties:
        pricingModelType:
          $ref: "#/components/schemas/PricingModelType"
          description: The machine-readable type of the pricing model.
        displayName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The human-readable name of the pricing model.
      required:
        - pricingModelType
        - displayName
    PricingModelType:
      type: string
      enum:
        - USAGE
        - CONTRACT
        - BYOL
        - FREE
    PricingUnitList:
      type: array
      items:
        $ref: "#/components/schemas/PricingUnit"
    PricingUnit:
      description: A pricing unit that defines the billing dimension for a listing, such as users, hosts, bandwidth, or data.
      type: object
      properties:
        pricingUnitType:
          $ref: "#/components/schemas/PricingUnitType"
          description: The machine-readable type of the pricing unit.
        displayName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The human-readable name of the pricing unit.
      required:
        - pricingUnitType
        - displayName
    PricingUnitType:
      type: string
      enum:
        - USERS
        - HOSTS
        - BANDWIDTH
        - DATA
        - TIERS
        - REQUESTS
        - UNITS
    PromotionalMediaList:
      type: array
      items:
        $ref: "#/components/schemas/PromotionalMedia"
    PromotionalMedia:
      description: Embedded promotional media for a product, such as images or videos. Each element contains exactly one media type.
      type: object
      properties:
        embeddedImage:
          $ref: "#/components/schemas/PromotionalEmbeddedImage"
        embeddedVideo:
          $ref: "#/components/schemas/PromotionalEmbeddedVideo"
    PromotionalEmbeddedImage:
      description: An embedded promotional image for a product.
      type: object
      properties:
        title_:
          $ref: "#/components/schemas/NonEmptyString"
          description: The title displayed when hovering over the image.
        url:
          $ref: "#/components/schemas/URL"
          description: The URL of the image file.
        description:
          $ref: "#/components/schemas/NullableString"
          description: An optional description of the image.
      required:
        - title_
        - url
    PromotionalEmbeddedVideo:
      description: An embedded promotional video for a product.
      type: object
      properties:
        title_:
          $ref: "#/components/schemas/NonEmptyString"
          description: The title displayed when hovering over the video.
        url:
          $ref: "#/components/schemas/URL"
          description: The URL of the video file.
        preview:
          $ref: "#/components/schemas/URL"
          description: The URL of the high-resolution preview image for the video.
        thumbnail:
          $ref: "#/components/schemas/URL"
          description: The URL of the thumbnail image for the video.
        description:
          $ref: "#/components/schemas/NullableString"
          description: An optional description of the video.
      required:
        - title_
        - url
        - preview
        - thumbnail
    ResourceList:
      type: array
      items:
        $ref: "#/components/schemas/Resource"
    Resource:
      description: A resource that provides supplementary information about a product, such as documentation links, support contacts, or usage instructions.
      type: object
      properties:
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The category of the resource, such as manufacturer support or usage instructions.
        contentType:
          $ref: "#/components/schemas/ResourceContentType"
          description: The format of the resource content, such as a URL, email address, or text.
        value:
          $ref: "#/components/schemas/NonEmptyString"
          description: The resource content. Interpretation depends on the content type.
        displayName:
          $ref: "#/components/schemas/NullableString"
          description: An optional human-readable label for the resource.
      required:
        - resourceType
        - contentType
        - value
    ResourceType:
      type: string
      enum:
        - MANUFACTURER_SUPPORT
        - MANUFACTURER_INSTRUCTIONS
    ResourceContentType:
      type: string
      enum:
        - EMAIL
        - PHONE_NUMBER
        - LINK
        - OTHER
    ReviewSummary:
      description: A summary of customer reviews available for a listing, aggregated by review source.
      type: object
      properties:
        reviewSourceSummaries:
          $ref: "#/components/schemas/ReviewSourceSummaryList"
          description: Review summaries from different sources, such as AWS Marketplace.
      required:
        - reviewSourceSummaries
    ReviewSourceSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ReviewSourceSummary"
    ReviewSourceSummary:
      description: A review summary from a specific source, including the average rating and total review count.
      type: object
      properties:
        sourceName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the review source, such as AWS Marketplace.
        sourceId:
          $ref: "#/components/schemas/ReviewSourceId"
          description: The machine-readable identifier of the review source.
        sourceUrl:
          $ref: "#/components/schemas/URL"
          description: The URL where the reviews can be accessed at the source.
        averageRating:
          $ref: "#/components/schemas/NonEmptyString"
          description: The average rating across all reviews from this source.
        totalReviews:
          $ref: "#/components/schemas/NonNegativeCount"
          description: The total number of reviews available from this source.
      required:
        - sourceName
        - sourceId
        - averageRating
        - totalReviews
    ReviewSourceId:
      type: string
      enum:
        - AWS_MARKETPLACE
    NonNegativeCount:
      type: integer
      format: int64
      minimum: 0
    SellerEngagementList:
      type: array
      items:
        $ref: "#/components/schemas/SellerEngagement"
    SellerEngagement:
      description: An engagement option available to potential buyers of a product, such as requesting a private offer or a demo.
      type: object
      properties:
        engagementType:
          $ref: "#/components/schemas/SellerEngagementType"
          description: The type of engagement, such as REQUEST_FOR_PRIVATE_OFFER or REQUEST_FOR_DEMO.
        contentType:
          $ref: "#/components/schemas/SellerEngagementContentType"
          description: The format of the engagement value, such as a URL.
        value:
          $ref: "#/components/schemas/NonEmptyString"
          description: The engagement value, such as a URL to the engagement form.
      required:
        - engagementType
        - contentType
        - value
    SellerEngagementType:
      type: string
      enum:
        - REQUEST_FOR_PRIVATE_OFFER
        - REQUEST_FOR_DEMO
    SellerEngagementContentType:
      type: string
      enum:
        - LINK
    UseCaseList:
      type: array
      items:
        $ref: "#/components/schemas/UseCaseEntry"
    UseCaseEntry:
      description: An entry in the list of use cases for a listing.
      type: object
      properties:
        useCase:
          $ref: "#/components/schemas/UseCase"
          description: The use case details.
      required:
        - useCase
    UseCase:
      description: A use case describing a scenario where the product can be applied.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/NonEmptyString"
          description: A description of the use case.
        displayName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The human-readable name of the use case.
        value:
          $ref: "#/components/schemas/NonEmptyString"
          description: The machine-readable identifier of the use case.
      required:
        - description
        - displayName
        - value
    GetOfferOutput:
      type: object
      properties:
        offerId:
          $ref: "#/components/schemas/OfferId"
          description: The unique identifier of the offer.
        catalog:
          $ref: "#/components/schemas/Catalog"
          description: The name of the catalog that the offer belongs to.
        offerName:
          $ref: "#/components/schemas/NullableString"
          description: The display name of the offer. This is free-form text provided by the seller.
        agreementProposalId:
          $ref: "#/components/schemas/AgreementResourceId"
          description: An encoded string to be passed by the acceptor of the terms when creating an agreement.
        expirationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time until when the offer can be procured. This value is null for offers that never expire.
        availableFromTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the offer became available to the buyer.
        sellerOfRecord:
          $ref: "#/components/schemas/SellerInformation"
          description: The entity responsible for selling the product under this offer.
        replacementAgreementId:
          $ref: "#/components/schemas/AgreementResourceId"
          description: The identifier of the existing agreement that this offer would replace. Enables agreement-based offer functionality.
        pricingModel:
          $ref: "#/components/schemas/PricingModel"
          description: The pricing model that determines how buyers are charged, such as usage-based, contract, BYOL, or free.
        badges:
          $ref: "#/components/schemas/PurchaseOptionBadgeList"
