    LeadInvitationPayload:
      description: Represents the data payload of an engagement invitation for a lead opportunity. This contains detailed information about the customer and interaction history that partners use to evaluate whether to accept the lead engagement invitation.
      type: object
      properties:
        Customer:
          $ref: "#/components/schemas/LeadInvitationCustomer"
          description: Contains information about the customer associated with the lead invitation. This data helps partners understand the customer's profile, industry, and business context to assess the lead opportunity.
        Interaction:
          $ref: "#/components/schemas/LeadInvitationInteraction"
          description: Describes the interaction details associated with the lead, including the source of the lead generation and customer engagement information. This context helps partners evaluate the lead quality and engagement approach.
      required:
        - Customer
        - Interaction
    LeadInvitationCustomer:
      description: Contains customer information included in a lead invitation payload. This structure provides essential details about the customer to help partners evaluate the lead opportunity and determine their interest in engagement.
      type: object
      properties:
        Industry:
          $ref: "#/components/schemas/Industry"
          description: Specifies the industry sector of the customer company associated with the lead invitation. This categorization helps partners understand the customer's business context and assess solution fit.
        CompanyName:
          $ref: "#/components/schemas/CompanyName"
          description: The name of the customer company associated with the lead invitation. This field identifies the target organization for the lead engagement opportunity.
        WebsiteUrl:
          $ref: "#/components/schemas/CompanyWebsiteUrl"
          description: The website URL of the customer company. This provides additional context about the customer organization and helps partners verify company details and assess business size and legitimacy.
        CountryCode:
          $ref: "#/components/schemas/CountryCode"
          description: The country code indicating the geographic location of the customer company. This information helps partners understand regional requirements and assess their ability to serve the customer effectively.
        AwsMaturity:
          $ref: "#/components/schemas/AwsMaturity"
          description: Indicates the customer's level of experience and adoption with AWS services. This assessment helps partners understand the customer's cloud maturity and tailor their engagement approach accordingly.
        MarketSegment:
          $ref: "#/components/schemas/MarketSegment"
          description: Specifies the market segment classification of the customer, such as enterprise, mid-market, or small business. This segmentation helps partners determine the appropriate solution complexity and engagement strategy.
      required:
        - CompanyName
        - CountryCode
    LeadInvitationInteraction:
      description: Represents interaction details included in a lead invitation payload. This structure provides context about how the lead was generated and the customer's engagement history to help partners assess the opportunity quality.
      type: object
      properties:
        SourceType:
          $ref: "#/components/schemas/LeadSourceType"
          description: Specifies the type of source that generated the lead interaction, such as "Event", "Website", or "Campaign". This helps partners understand the lead generation channel and assess lead quality based on the source type.
        SourceId:
          $ref: "#/components/schemas/LeadSourceId"
          description: The unique identifier of the specific source that generated the lead interaction. This provides traceability to the original lead generation activity for reference and follow-up purposes.
        SourceName:
          $ref: "#/components/schemas/LeadSourceName"
          description: The descriptive name of the source that generated the lead interaction. This human-readable identifier helps partners understand the specific lead generation channel or campaign that created the opportunity.
        Usecase:
          $ref: "#/components/schemas/EngagementUseCase"
          description: Describes the specific use case or business scenario associated with the lead interaction. This information helps partners understand the customer's interests and potential solution requirements.
        ContactBusinessTitle:
          $ref: "#/components/schemas/JobTitle"
          description: The business title or job role of the customer contact involved in the lead interaction. This helps partners identify the decision-making level and engagement approach for the lead.
      required:
        - SourceType
        - SourceId
        - SourceName
        - ContactBusinessTitle
    CreateEngagementInvitationResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/EngagementInvitationIdentifier"
          description: Unique identifier assigned to the newly created engagement invitation.
        Arn:
          $ref: "#/components/schemas/EngagementInvitationArn"
          description: The Amazon Resource Name (ARN) that uniquely identifies the engagement invitation.
      required:
        - Id
        - Arn
    EngagementInvitationIdentifier:
      type: string
      pattern: engi-[0-9,a-z]{13}
    EngagementInvitationArn:
      type: string
      pattern: arn:aws:partnercentral::[0-9]{12}:[a-zA-Z]+/engagement-invitation/engi-[0-9,a-z]{13}
    PrimaryNeedsFromAws:
      type: array
      items:
        $ref: "#/components/schemas/PrimaryNeedFromAws"
    PrimaryNeedFromAws:
      type: string
      enum:
        - Co-Sell - Architectural Validation
        - Co-Sell - Business Presentation
        - Co-Sell - Competitive Information
        - Co-Sell - Pricing Assistance
        - Co-Sell - Technical Consultation
        - Co-Sell - Total Cost of Ownership Evaluation
        - Co-Sell - Deal Support
        - Co-Sell - Support for Public Tender / RFx
    NationalSecurity:
      type: string
      enum:
        - "Yes"
        - "No"
    CreateOpportunityRequestPartnerOpportunityIdentifierString:
      type: string
      pattern: (?s).{0,64}
    Customer:
      description: An object that contains the customer's Account and Contact.
      type: object
      properties:
        Account:
          $ref: "#/components/schemas/Account"
          description: An object that contains the customer's account details.
        Contacts:
          $ref: "#/components/schemas/CustomerContactsList"
          description: Represents the contact details for individuals associated with the customer of the Opportunity. This field captures relevant contacts, including decision-makers, influencers, and technical stakeholders within the customer organization. These contacts are key to progressing the opportunity.
    Account:
      description: Specifies the Customer's account details associated with the Opportunity.
      type: object
      properties:
        Industry:
          $ref: "#/components/schemas/Industry"
          description: Specifies the industry the end Customer belongs to that's associated with the Opportunity. It refers to the category or sector where the customer's business operates. This is a required field.
        OtherIndustry:
          $ref: "#/components/schemas/AccountOtherIndustryString"
          description: Specifies the end Customer's industry associated with the Opportunity, when the selected value in the Industry field is Other.
        CompanyName:
          $ref: "#/components/schemas/AccountCompanyNameString"
          description: Specifies the end Customer's company name associated with the Opportunity.
        WebsiteUrl:
          $ref: "#/components/schemas/WebsiteUrl"
          description: Specifies the end customer's company website URL associated with the Opportunity. This value is crucial to map the customer within the Amazon Web Services CRM system. This field is required in all cases except when the opportunity is related to national security.
        AwsAccountId:
          $ref: "#/components/schemas/AwsAccount"
          description: Specifies the Customer Amazon Web Services account ID associated with the Opportunity.
        Address:
          $ref: "#/components/schemas/Address"
          description: Specifies the end Customer's address details associated with the Opportunity.
        Duns:
          $ref: "#/components/schemas/DunsNumber"
          description: Indicates the Customer DUNS number, if available.
      required:
        - CompanyName
    AccountOtherIndustryString:
      type: string
      pattern: (?s).{0,255}
    AccountCompanyNameString:
      type: string
      pattern: (?s).{0,120}
    WebsiteUrl:
      type: string
      pattern: (?s).{4,255}
    Address:
      description: Specifies the end Customer's address details associated with the Opportunity.
      type: object
      properties:
        City:
          $ref: "#/components/schemas/AddressCityString"
          description: Specifies the end Customer's city associated with the Opportunity.
        PostalCode:
          $ref: "#/components/schemas/AddressPostalCodeString"
          description: Specifies the end Customer's postal code associated with the Opportunity.
        StateOrRegion:
          $ref: "#/components/schemas/AddressPart"
          description: "Specifies the end Customer's state or region associated with the Opportunity. Valid values: Alabama | Alaska | American Samoa | Arizona | Arkansas | California | Colorado | Connecticut | Delaware | Dist. of Columbia | Federated States of Micronesia | Florida | Georgia | Guam | Hawaii | Idaho | Illinois | Indiana | Iowa | Kansas | Kentucky | Louisiana | Maine | Marshall Islands | Maryland | Massachusetts | Michigan | Minnesota | Mississippi | Missouri | Montana | Nebraska | Nevada | New Hampshire | New Jersey | New Mexico | New York | North Carolina | North Dakota | Northern Mariana Islands | Ohio | Oklahoma | Oregon | Palau | Pennsylvania | Puerto Rico | Rhode Island | South Carolina | South Dakota | Tennessee | Texas | Utah | Vermont | Virginia | Virgin Islands | Washington | West Virginia | Wisconsin | Wyoming | APO/AE | AFO/FPO | FPO, AP"
        CountryCode:
          $ref: "#/components/schemas/CountryCode"
          description: Specifies the end Customer's country associated with the Opportunity.
        StreetAddress:
          $ref: "#/components/schemas/AddressStreetAddressString"
          description: Specifies the end Customer's street address associated with the Opportunity.
    AddressCityString:
      type: string
      pattern: (?s).{0,255}
    AddressPostalCodeString:
      type: string
      pattern: (?s).{0,20}
    AddressStreetAddressString:
      type: string
      pattern: (?s).{0,255}
    DunsNumber:
      type: string
      pattern: "[0-9]{9}"
    CustomerContactsList:
      type: array
      items:
        $ref: "#/components/schemas/Contact"
    Contact:
      description: An object that contains a Customer Partner's contact details.
      type: object
      properties:
        Email:
          $ref: "#/components/schemas/Email"
          description: The contact's email address associated with the Opportunity.
        FirstName:
          $ref: "#/components/schemas/ContactFirstNameString"
          description: The contact's first name associated with the Opportunity.
        LastName:
          $ref: "#/components/schemas/ContactLastNameString"
          description: The contact's last name associated with the Opportunity.
        BusinessTitle:
          $ref: "#/components/schemas/JobTitle"
          description: The partner contact's title (job title or role) associated with the Opportunity. BusinessTitle supports either PartnerAccountManager or OpportunityOwner.
        Phone:
          $ref: "#/components/schemas/PhoneNumber"
          description: The contact's phone number associated with the Opportunity.
    ContactFirstNameString:
      type: string
      pattern: (?s).{0,80}
    ContactLastNameString:
      type: string
      pattern: (?s).{0,80}
    Project:
      description: An object that contains the Opportunity's project details.
      type: object
      properties:
        DeliveryModels:
          $ref: "#/components/schemas/DeliveryModels"
          description: "Specifies the deployment or consumption model for your solution or service in the Opportunity's context. You can select multiple options. Options' descriptions from the Delivery Model field are: SaaS or PaaS: Your Amazon Web Services based solution deployed as SaaS or PaaS in your Amazon Web Services environment. BYOL or AMI: Your Amazon Web Services based solution deployed as BYOL or AMI in the end customer's Amazon Web Services environment. Managed Services: The end customer's Amazon Web Services business management (For example: Consulting, design, implementation, billing support, cost optimization, technical support). Professional Services: Offerings to help enterprise end customers achieve specific business outcomes for enterprise cloud adoption (For example: Advisory or transformation planning). Resell: Amazon Web Services accounts and billing management for your customers. Other: Delivery model not described above."
        ExpectedCustomerSpend:
          $ref: "#/components/schemas/ExpectedCustomerSpendList"
          description: Represents the estimated amount that the customer is expected to spend on AWS services related to the opportunity. This helps in evaluating the potential financial value of the opportunity for AWS.
        ExpectedContractDuration:
          $ref: "#/components/schemas/ExpectedContractDuration"
          description: Optional. The expected duration of the contract associated with this opportunity. Partners use this value alongside expected customer spend to convert Total Contract Value (TCV) into Monthly Recurring Revenue (MRR).
        Title:
          $ref: "#/components/schemas/ProjectTitleString"
          description: Specifies the Opportunity's title or name.
        ApnPrograms:
          $ref: "#/components/schemas/ApnPrograms"
          description: "Specifies the Amazon Partner Network (APN) program that influenced the Opportunity. APN programs refer to specific partner programs or initiatives that can impact the Opportunity. Valid values: APN Immersion Days | APN Solution Space | ATO (Authority to Operate) | AWS Marketplace Campaign | IS Immersion Day SFID Program | ISV Workload Migration | Migration Acceleration Program | P3 | Partner Launch Initiative | Partner Opportunity Acceleration Funded | The Next Smart | VMware Cloud on AWS | Well-Architected | Windows | Workspaces/AppStream Accelerator Program | WWPS NDPP"
        CustomerBusinessProblem:
          $ref: "#/components/schemas/ProjectCustomerBusinessProblemString"
          description: Describes the problem the end customer has, and how the partner is helping. Utilize this field to provide a concise narrative that outlines the customer's business challenge or issue. Elaborate on how the partner's solution or offerings align to resolve the customer's business problem. Include relevant information about the partner's value proposition, unique selling points, and expertise to tackle the issue. Offer insights on how the proposed solution meets the customer's needs and provides value. Use concise language and precise descriptions to convey the context and significance of the Opportunity. The content in this field helps Amazon Web Services understand the nature of the Opportunity and the strategic fit of the partner's solution.
        CustomerUseCase:
          $ref: "#/components/schemas/String"
          description: "Specifies the proposed solution focus or type of workload for the Opportunity. This field captures the primary use case or objective of the proposed solution, and provides context and clarity to the addressed workload. Valid values: AI Machine Learning and Analytics | Archiving | Big Data: Data Warehouse/Data Integration/ETL/Data Lake/BI | Blockchain | Business Applications: Mainframe Modernization | Business Applications & Contact Center | Business Applications & SAP Production | Centralized Operations Management | Cloud Management Tools | Cloud Management Tools & DevOps with Continuous Integration & Continuous Delivery (CICD) | Configuration, Compliance & Auditing | Connected Services | Containers & Serverless | Content Delivery & Edge Services | Database | Edge Computing/End User Computing | Energy | Enterprise Governance & Controls | Enterprise Resource Planning | Financial Services | Healthcare and Life Sciences | High Performance Computing | Hybrid Application Platform | Industrial Software | IOT | Manufacturing, Supply Chain and Operations | Media & High performance computing (HPC) | Migration/Database Migration | Monitoring, logging and performance | Monitoring & Observability | Networking | Outpost | SAP | Security & Compliance | Storage & Backup | Training | VMC | VMWare | Web development & DevOps"
        RelatedOpportunityIdentifier:
          $ref: "#/components/schemas/OpportunityIdentifier"
          description: Specifies the current opportunity's parent opportunity identifier.
        SalesActivities:
          $ref: "#/components/schemas/SalesActivities"
          description: "Specifies the Opportunity's sales activities conducted with the end customer. These activities help drive Amazon Web Services assignment priority. Valid values: Initialized discussions with customer: Initial conversations with the customer to understand their needs and introduce your solution. Customer has shown interest in solution: After initial discussions, the customer is interested in your solution. Conducted POC/demo: You conducted a proof of concept (POC) or demonstration of the solution for the customer. In evaluation/planning stage: The customer is evaluating the solution and planning potential implementation. Agreed on solution to Business Problem: Both parties agree on how the solution addresses the customer's business problem. Completed Action Plan: A detailed action plan is complete and outlines the steps for implementation. Finalized Deployment Need: Both parties agree with and finalized the deployment needs. SOW Signed: Both parties signed a statement of work (SOW), and formalize the agreement and detail the project scope and deliverables."
        CompetitorName:
          $ref: "#/components/schemas/CompetitorName"
          description: Name of the Opportunity's competitor (if any). Use Other to submit a value not in the picklist.
        OtherCompetitorNames:
          $ref: "#/components/schemas/ProjectOtherCompetitorNamesString"
          description: Only allowed when CompetitorNames has Other selected.
        OtherSolutionDescription:
          $ref: "#/components/schemas/ProjectOtherSolutionDescriptionString"
          description: Specifies the offered solution for the customer's business problem when the RelatedEntityIdentifiers.Solutions field value is Other.
        AdditionalComments:
          $ref: "#/components/schemas/ProjectAdditionalCommentsString"
          description: Captures additional comments or information for the Opportunity that weren't captured in other fields.
        AwsPartition:
          $ref: "#/components/schemas/AwsPartition"
          description: "AWS partition where the opportunity will be deployed. Possible values: aws-eusc for AWS European Sovereign Cloud, null for all other partitions."
    DeliveryModels:
      type: array
      items:
        $ref: "#/components/schemas/DeliveryModel"
    DeliveryModel:
      type: string
      enum:
        - SaaS or PaaS
        - BYOL or AMI
        - Managed Services
        - Professional Services
        - Resell
        - Other
    ExpectedContractDuration:
      description: The expected duration of a partner's contract with the customer. Used to convert Total Contract Value (TCV) to Monthly Recurring Revenue (MRR) for opportunity dealsizing calculations.
      type: object
      properties:
        Term:
          $ref: "#/components/schemas/ExpectedContractDurationTerm"
          description: The unit of measurement for the contract duration value. Currently accepts only Months.
        Value:
          $ref: "#/components/schemas/String"
          description: A String representation of the contract duration as an integer, expressed in the unit defined by Term. Valid values range from 1 to 144.
      required:
        - Term
        - Value
    ExpectedContractDurationTerm:
      description: The unit of measurement for the contract duration value. Currently accepts only Months.
      type: string
      enum:
        - Months
    String:
      type: string
    ProjectTitleString:
      type: string
      pattern: (?s).{0,255}
    ApnPrograms:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ProjectCustomerBusinessProblemString:
      type: string
      pattern: (?s).{20,2000}
    SalesActivities:
