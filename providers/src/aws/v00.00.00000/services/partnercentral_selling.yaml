    EngagementCustomerProjectDetails:
      description: Provides comprehensive details about a customer project associated with an Engagement. This may include information such as project goals, timelines, and specific customer requirements.
      type: object
      properties:
        Title:
          $ref: "#/components/schemas/EngagementCustomerProjectTitle"
          description: The title of the project.
        BusinessProblem:
          $ref: "#/components/schemas/EngagementCustomerBusinessProblem"
          description: A description of the business problem the project aims to solve.
        TargetCompletionDate:
          $ref: "#/components/schemas/EngagementCustomerProjectDetailsTargetCompletionDateString"
          description: The target completion date for the customer's project.
      required:
        - Title
        - BusinessProblem
        - TargetCompletionDate
    EngagementCustomerProjectTitle:
      type: string
      pattern: (?s).{1,255}
    EngagementCustomerBusinessProblem:
      type: string
      pattern: (?s).{20,2000}
    EngagementCustomerProjectDetailsTargetCompletionDateString:
      type: string
      pattern: "[1-9][0-9]{3}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])"
    LeadContext:
      description: Provides comprehensive details about a lead associated with an engagement. This structure contains information about lead qualification status, customer details, and interaction history to facilitate lead management and tracking within the engagement.
      type: object
      properties:
        QualificationStatus:
          $ref: "#/components/schemas/LeadQualificationStatus"
          description: Indicates the current qualification status of the lead, such as whether it has been qualified, disqualified, or is still under evaluation. This helps track the lead's progression through the qualification process.
        Customer:
          $ref: "#/components/schemas/LeadCustomer"
          description: Contains detailed information about the customer associated with the lead, including company information, contact details, and other relevant customer data.
        Interactions:
          $ref: "#/components/schemas/LeadInteractionList"
          description: An array of interactions that have occurred with the lead, providing a history of communications, meetings, and other engagement activities related to the lead.
      required:
        - Customer
        - Interactions
    LeadQualificationStatus:
      type: string
      pattern: (?s).{1,255}
    LeadCustomer:
      description: Contains detailed information about the customer associated with the lead, including company details, industry classification, and AWS maturity level. This information helps qualify and categorize the lead for appropriate engagement strategies.
      type: object
      properties:
        Industry:
          $ref: "#/components/schemas/Industry"
          description: Specifies the industry sector to which the lead customer's company belongs. This categorization helps in understanding the customer's business context and tailoring appropriate solutions.
        CompanyName:
          $ref: "#/components/schemas/CompanyName"
          description: The name of the lead customer's company. This field is essential for identifying and tracking the customer organization associated with the lead.
        WebsiteUrl:
          $ref: "#/components/schemas/CompanyWebsiteUrl"
          description: The website URL of the lead customer's company. This provides additional context about the customer organization and helps verify company legitimacy and size.
        Address:
          $ref: "#/components/schemas/AddressSummary"
        AwsMaturity:
          $ref: "#/components/schemas/AwsMaturity"
          description: Indicates the customer's level of experience and adoption with AWS services. This assessment helps determine the appropriate engagement approach and solution complexity.
        MarketSegment:
          $ref: "#/components/schemas/MarketSegment"
          description: Specifies the market segment classification of the lead customer, such as enterprise, mid-market, or small business. This segmentation helps in targeting appropriate solutions and engagement strategies.
      required:
        - CompanyName
        - Address
    AddressSummary:
      description: An object that contains an Address object's subset of fields.
      type: object
      properties:
        City:
          $ref: "#/components/schemas/AddressSummaryCityString"
          description: Specifies the end Customer's city associated with the Opportunity.
        PostalCode:
          $ref: "#/components/schemas/AddressSummaryPostalCodeString"
          description: Specifies the end Customer's postal code associated with the Opportunity.
        StateOrRegion:
          $ref: "#/components/schemas/AddressPart"
          description: "Specifies the end Customer's state or region associated with the Opportunity. Valid values: Alabama | Alaska | American Samoa | Arizona | Arkansas | California | Colorado | Connecticut | Delaware | Dist. of Columbia | Federated States of Micronesia | Florida | Georgia | Guam | Hawaii | Idaho | Illinois | Indiana | Iowa | Kansas | Kentucky | Louisiana | Maine | Marshall Islands | Maryland | Massachusetts | Michigan | Minnesota | Mississippi | Missouri | Montana | Nebraska | Nevada | New Hampshire | New Jersey | New Mexico | New York | North Carolina | North Dakota | Northern Mariana Islands | Ohio | Oklahoma | Oregon | Palau | Pennsylvania | Puerto Rico | Rhode Island | South Carolina | South Dakota | Tennessee | Texas | Utah | Vermont | Virginia | Virgin Islands | Washington | West Virginia | Wisconsin | Wyoming | APO/AE | AFO/FPO | FPO, AP"
        CountryCode:
          $ref: "#/components/schemas/CountryCode"
          description: Specifies the end Customer's country associated with the Opportunity.
    AddressSummaryCityString:
      type: string
      pattern: (?s).{0,255}
    AddressSummaryPostalCodeString:
      type: string
      pattern: (?s).{0,20}
    AddressPart:
      type: string
    AwsMaturity:
      type: string
      pattern: (?s).{1,20}
    MarketSegment:
      type: string
      enum:
        - Enterprise
        - Large
        - Medium
        - Small
        - Micro
    LeadInteractionList:
      type: array
      items:
        $ref: "#/components/schemas/LeadInteraction"
    LeadInteraction:
      description: Represents a specific interaction or touchpoint with a lead customer. This structure captures details about communications, meetings, or other engagement activities that help track the lead's progression and engagement history.
      type: object
      properties:
        SourceType:
          $ref: "#/components/schemas/LeadSourceType"
          description: Specifies the type of source that generated the lead interaction, such as "Event", "Website", "Referral", or "Campaign". This categorization helps track lead generation effectiveness across different channels.
        SourceId:
          $ref: "#/components/schemas/LeadSourceId"
          description: The unique identifier of the specific source that generated the lead interaction. This ID provides traceability back to the original lead generation activity.
        SourceName:
          $ref: "#/components/schemas/LeadSourceName"
          description: The descriptive name of the source that generated the lead interaction, providing a human-readable identifier for the lead generation channel or activity.
        Usecase:
          $ref: "#/components/schemas/EngagementUseCase"
          description: Describes the specific use case or business scenario discussed during the lead interaction. This helps categorize the customer's interests and potential solutions.
        InteractionDate:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the lead interaction occurred, in ISO 8601 format (UTC). This timestamp helps track the chronology of lead engagement activities.
        CustomerAction:
          $ref: "#/components/schemas/CustomerAction"
          description: Describes the action taken by the customer during or as a result of the interaction, such as requesting information, scheduling a meeting, or expressing interest in a solution.
        BusinessProblem:
          $ref: "#/components/schemas/EngagementCustomerBusinessProblem"
          description: Describes the business problem or challenge that the customer discussed during the interaction. This information helps qualify the lead and identify appropriate solutions.
        Contact:
          $ref: "#/components/schemas/LeadContact"
          description: Contains contact information for the customer representative involved in the lead interaction, including their name, title, and contact details.
      required:
        - SourceType
        - SourceId
        - SourceName
        - CustomerAction
        - Contact
    LeadSourceType:
      type: string
      pattern: (?s).{1,255}
    LeadSourceId:
      type: string
      pattern: (?s).{1,255}
    LeadSourceName:
      type: string
      pattern: (?s).{1,255}
    EngagementUseCase:
      type: string
      pattern: (?s).{1,255}
    DateTime:
      type: string
      format: date-time
    CustomerAction:
      type: string
      pattern: (?s).{1,255}
    LeadContact:
      description: An object that contains a lead contact's details associated with the engagement. This provides contact information for individuals involved in lead-related activities.
      type: object
      properties:
        BusinessTitle:
          $ref: "#/components/schemas/JobTitle"
          description: The lead contact's business title or job role associated with the engagement.
        Email:
          $ref: "#/components/schemas/Email"
          description: The lead contact's email address associated with the engagement.
        FirstName:
          $ref: "#/components/schemas/Name"
          description: The lead contact's first name associated with the engagement.
        LastName:
          $ref: "#/components/schemas/Name"
          description: The lead contact's last name associated with the engagement.
        Phone:
          $ref: "#/components/schemas/PhoneNumber"
          description: The lead contact's phone number associated with the engagement.
      required:
        - BusinessTitle
        - Email
        - FirstName
        - LastName
    Name:
      type: string
      pattern: (?s).{0,80}
    CreateEngagementResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/EngagementIdentifier"
          description: Unique identifier assigned to the newly created engagement.
        Arn:
          $ref: "#/components/schemas/EngagementArn"
          description: The Amazon Resource Name (ARN) that identifies the engagement.
        ModifiedAt:
          $ref: "#/components/schemas/DateTime"
          description: 'The timestamp indicating when the engagement was last modified, in ISO 8601 format (UTC). For newly created engagements, this value matches the creation timestamp. Example: "2023-05-01T20:37:46Z".'
    EngagementIdentifier:
      type: string
      pattern: eng-[0-9a-z]{14}
    EngagementArn:
      type: string
      pattern: arn:.*
    EngagementArnOrIdentifier:
      type: string
      pattern: (arn:.*|eng-[0-9a-z]{14})
    CreateEngagementContextResponse:
      type: object
      properties:
        EngagementId:
          $ref: "#/components/schemas/EngagementIdentifier"
          description: The unique identifier of the engagement to which the context was added. This ID confirms the successful association of the context with the specified engagement.
        EngagementArn:
          $ref: "#/components/schemas/EngagementArn"
          description: The Amazon Resource Name (ARN) of the engagement to which the context was added. This globally unique identifier can be used for cross-service references and IAM policies.
        EngagementLastModifiedAt:
          $ref: "#/components/schemas/DateTime"
          description: 'The timestamp indicating when the engagement was last modified as a result of adding the context, in ISO 8601 format (UTC). Example: "2023-05-01T20:37:46Z".'
        ContextId:
          $ref: "#/components/schemas/EngagementContextIdentifier"
          description: The unique identifier assigned to the newly created engagement context. This ID can be used to reference the specific context within the engagement for future operations.
    Invitation:
      description: The Invitation structure represents an invitation exchanged between partners and AWS. It includes a message, receiver information, and a payload providing context for the invitation.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/InvitationMessage"
          description: A message accompanying the invitation.
        Receiver:
          $ref: "#/components/schemas/Receiver"
        Payload:
          $ref: "#/components/schemas/Payload"
      required:
        - Message
        - Receiver
        - Payload
    InvitationMessage:
      type: string
      pattern: (?s).{1,255}
    Receiver:
      description: Represents the entity that received the Engagement Invitation, including account and company details. This field is essential for tracking the partner who is being invited to collaborate.
      type: object
      properties:
        Account:
          $ref: "#/components/schemas/AccountReceiver"
          description: Specifies the AWS account of the partner who received the Engagement Invitation. This field is used to track the invitation recipient within the AWS ecosystem.
    AccountReceiver:
      description: Contains the account details of the partner who received the Engagement Invitation, including the AWS account ID and company name.
      type: object
      properties:
        Alias:
          $ref: "#/components/schemas/Alias"
          description: Represents the alias of the partner account receiving the Engagement Invitation, making it easier to identify and track the recipient in reports or logs.
        AwsAccountId:
          $ref: "#/components/schemas/AwsAccount"
          description: Indicates the AWS account ID of the partner who received the Engagement Invitation. This is a unique identifier for managing engagements with specific AWS accounts.
      required:
        - AwsAccountId
    Alias:
      type: string
      pattern: (?s).{0,80}
    AwsAccount:
      type: string
      pattern: ([0-9]{12}|\w{1,12})
    Payload:
      description: Contains the data payload associated with the Engagement Invitation. This payload includes essential details related to the AWS opportunity and is used by partners to evaluate whether to accept or reject the engagement.
      type: object
      properties:
        OpportunityInvitation:
          $ref: "#/components/schemas/OpportunityInvitationPayload"
          description: Specifies the details of the opportunity invitation within the Engagement Invitation payload. This data helps partners understand the context, scope, and expected involvement for the opportunity from AWS.
        LeadInvitation:
          $ref: "#/components/schemas/LeadInvitationPayload"
          description: Specifies the details of the lead invitation within the Engagement Invitation payload. This data helps partners understand the lead context, customer information, and interaction history for the lead opportunity from AWS.
    OpportunityInvitationPayload:
      description: Represents the data payload of an Engagement Invitation for a specific opportunity. This contains detailed information that partners use to evaluate the engagement.
      type: object
      properties:
        SenderContacts:
          $ref: "#/components/schemas/SenderContactList"
          description: Represents the contact details of the AWS representatives involved in sending the Engagement Invitation. These contacts are opportunity stakeholders.
        ReceiverResponsibilities:
          $ref: "#/components/schemas/ReceiverResponsibilityList"
          description: Outlines the responsibilities or expectations of the receiver in the context of the invitation.
        Customer:
          $ref: "#/components/schemas/EngagementCustomer"
          description: Contains information about the customer related to the opportunity in the Engagement Invitation. This data helps partners understand the customer’s profile and requirements.
        Project:
          $ref: "#/components/schemas/ProjectDetails"
          description: Describes the project details associated with the opportunity, including the customer’s needs and the scope of work expected to be performed.
      required:
        - ReceiverResponsibilities
