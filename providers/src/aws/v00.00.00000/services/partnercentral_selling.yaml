    ProjectDetails:
      description: Contains details about the project associated with the Engagement Invitation, including the business problem and expected outcomes.
      type: object
      properties:
        BusinessProblem:
          $ref: "#/components/schemas/EngagementCustomerBusinessProblem"
          description: Describes the business problem that the project aims to solve. This information is crucial for understanding the project’s goals and objectives.
        Title:
          $ref: "#/components/schemas/ProjectDetailsTitleString"
          description: Specifies the title of the project. This title helps partners quickly identify and understand the focus of the project.
        TargetCompletionDate:
          $ref: "#/components/schemas/Date"
          description: Specifies the estimated date of project completion. This field helps track the project timeline and manage expectations.
        ExpectedCustomerSpend:
          $ref: "#/components/schemas/ExpectedCustomerSpendList"
          description: Contains revenue estimates for the partner related to the project. This field provides an idea of the financial potential of the opportunity for the partner.
      required:
        - BusinessProblem
        - Title
        - TargetCompletionDate
        - ExpectedCustomerSpend
    ProjectDetailsTitleString:
      type: string
      pattern: (?s).{1,255}
    Date:
      type: string
      pattern: "[1-9][0-9]{3}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])"
    ExpectedCustomerSpendList:
      type: array
      items:
        $ref: "#/components/schemas/ExpectedCustomerSpend"
    ExpectedCustomerSpend:
      description: Provides an estimate of the revenue that the partner is expected to generate from the opportunity. This information helps partners assess the financial value of the project.
      type: object
      properties:
        Amount:
          $ref: "#/components/schemas/Amount"
          description: Represents the estimated monthly revenue that the partner expects to earn from the opportunity. This helps in forecasting financial returns.
        CurrencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: Indicates the currency in which the revenue estimate is provided. This helps in understanding the financial impact across different markets. Accepted values are USD (US Dollars) and EUR (Euros). If the AWS Partition is aws-eusc (AWS European Sovereign Cloud), the currency code must be EUR.
        Frequency:
          $ref: "#/components/schemas/PaymentFrequency"
          description: Indicates how frequently the customer is expected to spend the projected amount. Only the value Monthly is allowed for the Frequency field, representing recurring monthly spend.
        TargetCompany:
          $ref: "#/components/schemas/ExpectedCustomerSpendTargetCompanyString"
          description: Specifies the name of the partner company that is expected to generate revenue from the opportunity. This field helps track the partner’s involvement in the opportunity. This field only accepts the value AWS. If any other value is provided, the system will automatically set it to AWS.
        EstimationUrl:
          $ref: "#/components/schemas/EstimationUrl"
          description: A URL providing additional information or context about the spend estimation.
      required:
        - CurrencyCode
        - Frequency
        - TargetCompany
