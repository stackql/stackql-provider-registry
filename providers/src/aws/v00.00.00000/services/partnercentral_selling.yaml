            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: Specifies the catalog in which the opportunity creation task is executed. Acceptable values include AWS for production and Sandbox for testing environments.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique token provided by the client to help ensure the idempotency of the request. It helps prevent the same task from being performed multiple times.
                Identifier:
                  $ref: "#/components/schemas/EngagementArnOrIdentifier"
                  description: The unique identifier of the engagement from which the opportunity creation task is to be initiated. This helps ensure that the task is applied to the correct engagement.
                ContextIdentifier:
                  $ref: "#/components/schemas/ContextIdentifier"
                  description: The unique identifier of the engagement context from which to create the opportunity. This specifies the specific contextual information within the engagement that will be used for opportunity creation.
