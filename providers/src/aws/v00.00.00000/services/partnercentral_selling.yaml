          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartEngagementByAcceptingInvitationTaskResponse"
  /StartEngagementFromOpportunityTask:
    post:
      operationId: StartEngagementFromOpportunityTask
      description: Similar to StartEngagementByAcceptingInvitationTask, this action is asynchronous and performs multiple steps before completion. This action orchestrates a comprehensive workflow that combines multiple API operations into a single task to create and initiate an engagement from an existing opportunity. It automatically executes a sequence of operations including GetOpportunity, CreateEngagement (if it doesn't exist), CreateResourceSnapshot, CreateResourceSnapshotJob, CreateEngagementInvitation (if not already invited/accepted), and SubmitOpportunity.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.StartEngagementFromOpportunityTask
            default: AWSPartnerCentralSelling.StartEngagementFromOpportunityTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: Specifies the catalog in which the engagement is tracked. Acceptable values include AWS for production and Sandbox for testing environments.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique token provided by the client to help ensure the idempotency of the request. It helps prevent the same task from being performed multiple times.
                Identifier:
                  $ref: "#/components/schemas/OpportunityIdentifier"
                  description: The unique identifier of the opportunity from which the engagement task is to be initiated. This helps ensure that the task is applied to the correct opportunity.
                AwsSubmission:
                  $ref: "#/components/schemas/AwsSubmission"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A map of the key-value pairs of the tag or tags to assign.
              required:
                - Catalog
                - ClientToken
                - Identifier
                - AwsSubmission
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartEngagementFromOpportunityTaskResponse"
  /StartOpportunityFromEngagementTask:
