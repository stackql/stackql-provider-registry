      properties:
        Email:
          $ref: "#/components/schemas/SenderContactEmail"
          description: The sender-provided contact's email address associated with the EngagementInvitation.
        FirstName:
          $ref: "#/components/schemas/Name"
          description: The sender-provided contact's last name associated with the EngagementInvitation.
        LastName:
          $ref: "#/components/schemas/Name"
          description: The sender-provided contact's first name associated with the EngagementInvitation.
        BusinessTitle:
