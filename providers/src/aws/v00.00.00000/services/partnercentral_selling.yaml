                - Catalog
                - Identifier
      responses:
        "200":
          description: Success
  /StartEngagementByAcceptingInvitationTask:
    post:
      operationId: StartEngagementByAcceptingInvitationTask
      description: "This action starts the engagement by accepting an EngagementInvitation. The task is asynchronous and involves the following steps: accepting the invitation, creating an opportunity in the partner’s account from the AWS opportunity, and copying details for tracking. When completed, an Opportunity Created event is generated, indicating that the opportunity has been successfully created in the partner's account."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.StartEngagementByAcceptingInvitationTask
            default: AWSPartnerCentralSelling.StartEngagementByAcceptingInvitationTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: Specifies the catalog related to the task. Use AWS for production engagements and Sandbox for testing scenarios.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier provided by the client that helps to ensure the idempotency of the request. This can be a random or meaningful string but must be unique for each request.
                Identifier:
                  $ref: "#/components/schemas/EngagementInvitationArnOrIdentifier"
                  description: Specifies the unique identifier of the EngagementInvitation to be accepted. Providing the correct identifier helps ensure that the correct engagement is processed.
