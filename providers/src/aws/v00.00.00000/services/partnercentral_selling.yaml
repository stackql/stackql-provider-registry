        Name:
          $ref: "#/components/schemas/String"
          description: Specifies the solution name.
        Status:
          $ref: "#/components/schemas/SolutionStatus"
          description: "Specifies the solution's current status, which indicates its state in the system. Valid values: Active | Inactive | Draft. The status helps partners and Amazon Web Services track the solution's lifecycle and availability. Filter for Active solutions for association to an opportunity."
        Category:
          $ref: "#/components/schemas/String"
          description: "Specifies the solution category, which helps to categorize and organize the solutions partners offer. Valid values: Software Product | Consulting Service | Hardware Product | Communications Product | Professional Service | Managed Service | Value-Added Resale Amazon Web Services Service | Distribution Service | Training Service | Merger and Acquisition Advising Service."
