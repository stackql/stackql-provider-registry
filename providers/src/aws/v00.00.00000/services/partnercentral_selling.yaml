  /UpdateEngagementContext:
    post:
      operationId: UpdateEngagementContext
      description: Updates the context information for an existing engagement with new or modified data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.UpdateEngagementContext
            default: AWSPartnerCentralSelling.UpdateEngagementContext
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: "Specifies the catalog associated with the engagement context update request. This field takes a string value from a predefined list: AWS or Sandbox. The catalog determines which environment the engagement context is updated in."
                EngagementIdentifier:
                  $ref: "#/components/schemas/EngagementArnOrIdentifier"
                  description: The unique identifier of the Engagement containing the context to be updated. This parameter ensures the context update is applied to the correct engagement.
                ContextIdentifier:
                  $ref: "#/components/schemas/EngagementContextIdentifier"
                  description: The unique identifier of the specific engagement context to be updated. This ensures that the correct context within the engagement is modified.
                EngagementLastModifiedAt:
                  $ref: "#/components/schemas/DateTime"
                  description: The timestamp when the engagement was last modified, used for optimistic concurrency control. This helps prevent conflicts when multiple users attempt to update the same engagement simultaneously.
                Type:
