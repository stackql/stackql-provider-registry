          description: The unique identifier of the snapshot job. This matches the ResourceSnapshotJobIdentifier provided in the request.
        Arn:
          $ref: "#/components/schemas/ResourceSnapshotJobArn"
          description: The Amazon Resource Name (ARN) of the snapshot job. This globally unique identifier can be used for resource-specific operations across AWS services.
        EngagementId:
          $ref: "#/components/schemas/EngagementIdentifier"
          description: The identifier of the engagement associated with this snapshot job. This links the job to a specific engagement context.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of resource being snapshotted. This would have "Opportunity" as a value as it is dependent on the supported resource type.
        ResourceId:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: The identifier of the specific resource being snapshotted. The format might vary depending on the ResourceType.
        ResourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource being snapshotted. This provides a globally unique identifier for the resource across AWS.
        ResourceSnapshotTemplateName:
          $ref: "#/components/schemas/ResourceTemplateName"
          description: The name of the template used for creating the snapshot. This is the same as the template name. It defines the structure and content of the snapshot.
        CreatedAt:
          $ref: "#/components/schemas/DateTime"
          description: 'The date and time when the snapshot job was created in ISO 8601 format (UTC). Example: "2023-05-01T20:37:46Z"'
        Status:
          $ref: "#/components/schemas/ResourceSnapshotJobStatus"
          description: "The current status of the snapshot job. Valid values: STOPPED: The job is not currently running. RUNNING: The job is actively executing."
        LastSuccessfulExecutionDate:
          $ref: "#/components/schemas/DateTime"
          description: 'The date and time of the last successful execution of the job, in ISO 8601 format (UTC). Example: "2023-05-01T20:37:46Z"'
        LastFailure:
