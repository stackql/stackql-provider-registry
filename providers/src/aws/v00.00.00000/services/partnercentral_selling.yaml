  /ListOpportunities:
    post:
      operationId: ListOpportunities
      description: "This request accepts a list of filters that retrieve opportunity subsets as well as sort options. This feature is available to partners from Partner Central using the ListOpportunities API action. To synchronize your system with Amazon Web Services, list only the opportunities that were newly created or updated. We recommend you rely on events emitted by the service into your Amazon Web Services account’s Amazon EventBridge default event bus. You can also use the ListOpportunities action. We recommend the following approach: Find the latest LastModifiedDate that you stored, and only use the values that came from Amazon Web Services. Don’t use values generated by your system. When you send a ListOpportunities request, submit the date in ISO 8601 format in the AfterLastModifiedDate filter. Amazon Web Services only returns opportunities created or updated on or after that date and time. Use NextToken to iterate over all pages."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.ListOpportunities
            default: AWSPartnerCentralSelling.ListOpportunities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: "Specifies the catalog associated with the request. This field takes a string value from a predefined list: AWS or Sandbox. The catalog determines which environment the opportunities are listed in. Use AWS for listing real opportunities in the Amazon Web Services catalog, and Sandbox for testing in secure, isolated environments."
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: "Specifies the maximum number of results to return in a single call. This limits the number of opportunities returned in the response to avoid providing too many results at once. Default: 20"
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A pagination token used to retrieve the next set of results in subsequent calls. This token is included in the response only if there are additional result pages available.
                Sort:
                  $ref: "#/components/schemas/OpportunitySort"
                  description: An object that specifies how the response is sorted. The default Sort.SortBy value is LastModifiedDate.
                LastModifiedDate:
                  $ref: "#/components/schemas/LastModifiedDate"
                  description: Filters the opportunities based on their last modified date. This filter helps retrieve opportunities that were updated after the specified date, allowing partners to track recent changes or updates.
                Identifier:
                  $ref: "#/components/schemas/ListOpportunitiesRequestIdentifierList"
                  description: Filters the opportunities based on the opportunity identifier. This allows partners to retrieve specific opportunities by providing their unique identifiers, ensuring precise results.
                LifeCycleStage:
                  $ref: "#/components/schemas/ListOpportunitiesRequestLifeCycleStageList"
                  description: Filters the opportunities based on their lifecycle stage. This filter allows partners to retrieve opportunities at various stages in the sales cycle, such as Qualified, Technical Validation, Business Validation, or Closed Won.
                LifeCycleReviewStatus:
                  $ref: "#/components/schemas/ListOpportunitiesRequestLifeCycleReviewStatusList"
                  description: Filters the opportunities based on their current lifecycle approval status. Use this filter to retrieve opportunities with statuses such as Pending Submission, In Review, Action Required, or Approved.
                CustomerCompanyName:
                  $ref: "#/components/schemas/ListOpportunitiesRequestCustomerCompanyNameList"
                  description: Filters the opportunities based on the customer's company name. This allows partners to search for opportunities associated with a specific customer by matching the provided company name string.
                CreatedDate:
                  $ref: "#/components/schemas/CreatedDateFilter"
                  description: Filter opportunities by creation date criteria.
                TargetCloseDate:
                  $ref: "#/components/schemas/TargetCloseDateFilter"
                  description: Filters opportunities based on their target close date. This filter helps retrieve opportunities with an expected close date before or after a specified date.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOpportunitiesResponse"
