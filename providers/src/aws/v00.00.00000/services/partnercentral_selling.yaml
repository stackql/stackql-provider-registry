        - Professional Services
        - Real Estate and Construction
        - Retail
        - Software and Internet
        - Telecommunications
        - Transportation and Logistics
        - Travel
        - Wholesale and Distribution
        - Other
    CompanyName:
      type: string
      pattern: (?s).{1,120}
    CompanyWebsiteUrl:
      type: string
      pattern: (?=.{4,255}$)((http|https)://)??(www[.])??([a-zA-Z0-9]|-)+?([.][a-zA-Z0-9(-|/|=|?)??]+?)+?
