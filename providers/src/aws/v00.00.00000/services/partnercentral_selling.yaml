openapi: 3.0.0
info:
  version: "2022-07-26"
  title: Partner Central Selling API
  description: Partner Central Selling API
  x-serviceName: partnercentral-selling
  x-serviceAlias: partnercentral_selling
  x-protocol: json
  x-apiVersion: "2022-07-26"
  x-endpointPrefix: partnercentral-selling
  x-targetPrefix: AWSPartnerCentralSelling
  x-jsonVersion: "1.0"
servers:
  - url: https://partnercentral-selling.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for partnercentral-selling
paths:
  /AcceptEngagementInvitation:
    post:
      operationId: AcceptEngagementInvitation
      description: Use the AcceptEngagementInvitation action to accept an engagement invitation shared by AWS. Accepting the invitation indicates your willingness to participate in the engagement, granting you access to all engagement-related data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.AcceptEngagementInvitation
            default: AWSPartnerCentralSelling.AcceptEngagementInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: The CatalogType parameter specifies the catalog associated with the engagement invitation. Accepted values are AWS and Sandbox, which determine the environment in which the engagement invitation is managed.
                Identifier:
                  $ref: "#/components/schemas/EngagementInvitationArnOrIdentifier"
                  description: The Identifier parameter in the AcceptEngagementInvitationRequest specifies the unique identifier of the EngagementInvitation to be accepted. Providing the correct identifier ensures that the intended invitation is accepted.
              required:
                - Catalog
                - Identifier
      responses:
        "200":
          description: Success
  /AssignOpportunity:
    post:
      operationId: AssignOpportunity
      description: Enables you to reassign an existing Opportunity to another user within your Partner Central account. The specified user receives the opportunity, and it appears on their Partner Central dashboard, allowing them to take necessary actions or proceed with the opportunity. This is useful for distributing opportunities to the appropriate team members or departments within your organization, ensuring that each opportunity is handled by the right person. By default, the opportunity owner is the one who creates it. Currently, there's no API to enumerate the list of available users.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.AssignOpportunity
            default: AWSPartnerCentralSelling.AssignOpportunity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: "Specifies the catalog associated with the request. This field takes a string value from a predefined list: AWS or Sandbox. The catalog determines which environment the opportunity is assigned in. Use AWS to assign real opportunities in the Amazon Web Services catalog, and Sandbox for testing in secure, isolated environments."
                Identifier:
                  $ref: "#/components/schemas/OpportunityIdentifier"
                  description: Requires the Opportunity's unique identifier when you want to assign it to another user. Provide the correct identifier so the intended opportunity is reassigned.
                Assignee:
                  $ref: "#/components/schemas/AssigneeContact"
                  description: Specifies the user or team member responsible for managing the assigned opportunity. This field identifies the Assignee based on the partner's internal team structure. Ensure that the email address is associated with a registered user in your Partner Central account.
              required:
                - Identifier
                - Assignee
      responses:
        "200":
          description: Success
  /AssociateOpportunity:
    post:
      operationId: AssociateOpportunity
      description: "Enables you to create a formal association between an Opportunity and various related entities, enriching the context and details of the opportunity for better collaboration and decision making. You can associate an opportunity with the following entity types: Partner Solution: A software product or consulting practice created and delivered by Partners. Partner Solutions help customers address business challenges using Amazon Web Services services. Amazon Web Services Products: Amazon Web Services offers many products and services that provide scalable, reliable, and cost-effective infrastructure solutions. For the latest list of Amazon Web Services products, see Amazon Web Services products. Amazon Web Services Marketplace private offer: Allows Amazon Web Services Marketplace sellers to extend custom pricing and terms to individual Amazon Web Services customers. Sellers can negotiate custom prices, payment schedules, and end user license terms through private offers, enabling Amazon Web Services customers to acquire software solutions tailored to their specific needs. For more information, see Private offers in Amazon Web Services Marketplace. To obtain identifiers for these entities, use the following methods: Solution: Use the ListSolutions operation. AWS Products: For the latest list of Amazon Web Services products, see Amazon Web Services products. Amazon Web Services Marketplace private offer: Use the Using the Amazon Web Services Marketplace Catalog API to list entities. Specifically, use the ListEntities operation to retrieve a list of private offers. The request returns the details of available private offers. For more information, see ListEntities."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.AssociateOpportunity
            default: AWSPartnerCentralSelling.AssociateOpportunity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: "Specifies the catalog associated with the request. This field takes a string value from a predefined list: AWS or Sandbox. The catalog determines which environment the opportunity association is made in. Use AWS to associate opportunities in the Amazon Web Services catalog, and Sandbox for testing in secure, isolated environments."
                OpportunityIdentifier:
                  $ref: "#/components/schemas/OpportunityIdentifier"
                  description: Requires the Opportunity's unique identifier when you want to associate it with a related entity. Provide the correct identifier so the intended opportunity is updated with the association.
                RelatedEntityType:
                  $ref: "#/components/schemas/RelatedEntityType"
                  description: Specifies the entity type that you're associating with the Opportunity. This helps to categorize and properly process the association.
                RelatedEntityIdentifier:
                  $ref: "#/components/schemas/AssociateOpportunityRequestRelatedEntityIdentifierString"
                  description: Requires the related entity's unique identifier when you want to associate it with the Opportunity. For Amazon Web Services Marketplace entities, provide the Amazon Resource Name (ARN). Use the Amazon Web Services Marketplace API to obtain the ARN.
              required:
                - OpportunityIdentifier
                - RelatedEntityType
                - RelatedEntityIdentifier
      responses:
        "200":
          description: Success
  /CreateEngagement:
    post:
      operationId: CreateEngagement
      description: The CreateEngagement action allows you to create an Engagement, which serves as a collaborative space between different parties such as AWS Partners and AWS Sellers. This action automatically adds the caller's AWS account as an active member of the newly created Engagement.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.CreateEngagement
            default: AWSPartnerCentralSelling.CreateEngagement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: The CreateEngagementRequest$Catalog parameter specifies the catalog related to the engagement. Accepted values are AWS and Sandbox, which determine the environment in which the engagement is managed.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: The CreateEngagementRequest$ClientToken parameter specifies a unique, case-sensitive identifier to ensure that the request is handled exactly once. The value must not exceed sixty-four alphanumeric characters.
                Title:
                  $ref: "#/components/schemas/EngagementTitle"
                  description: Specifies the title of the Engagement.
                Description:
                  $ref: "#/components/schemas/EngagementDescription"
                  description: Provides a description of the Engagement.
                Contexts:
                  $ref: "#/components/schemas/EngagementContexts"
                  description: "The Contexts field is a required array of objects, with a maximum of 5 contexts allowed, specifying detailed information about customer projects associated with the Engagement. Each context object contains a Type field indicating the context type, which must be CustomerProject in this version, and a Payload field containing the CustomerProject details. The CustomerProject object is composed of two main components: Customer and Project. The Customer object includes information such as CompanyName, WebsiteUrl, Industry, and CountryCode, providing essential details about the customer. The Project object contains Title, BusinessProblem, and TargetCompletionDate, offering insights into the specific project associated with the customer. This structure allows comprehensive context to be included within the Engagement, facilitating effective collaboration between parties by providing relevant customer and project information."
              required:
                - Catalog
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEngagementResponse"
  /CreateEngagementContext:
    post:
      operationId: CreateEngagementContext
      description: Creates a new context within an existing engagement. This action allows you to add contextual information such as customer projects or documents to an engagement, providing additional details that help facilitate collaboration between engagement members.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.CreateEngagementContext
            default: AWSPartnerCentralSelling.CreateEngagementContext
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: "Specifies the catalog associated with the engagement context request. This field takes a string value from a predefined list: AWS or Sandbox. The catalog determines which environment the engagement context is created in. Use AWS to create contexts in the production environment, and Sandbox for testing in secure, isolated environments."
                EngagementIdentifier:
                  $ref: "#/components/schemas/EngagementArnOrIdentifier"
                  description: The unique identifier of the Engagement for which the context is being created. This parameter ensures the context is associated with the correct engagement and provides the necessary linkage between the engagement and its contextual information.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier provided by the client to ensure that the request is handled exactly once. This token helps prevent duplicate context creations and must not exceed sixty-four alphanumeric characters. Use a UUID or other unique string to ensure idempotency.
                Type:
                  $ref: "#/components/schemas/EngagementContextType"
                  description: Specifies the type of context being created for the engagement. This field determines the structure and content of the context payload. Valid values include CustomerProject for customer project-related contexts. The type field ensures that the context is properly categorized and processed according to its intended purpose.
                Payload:
                  $ref: "#/components/schemas/EngagementContextPayload"
              required:
                - Catalog
                - EngagementIdentifier
                - ClientToken
                - Type
                - Payload
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEngagementContextResponse"
  /CreateEngagementInvitation:
    post:
      operationId: CreateEngagementInvitation
      description: This action creates an invitation from a sender to a single receiver to join an engagement.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.CreateEngagementInvitation
            default: AWSPartnerCentralSelling.CreateEngagementInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: Specifies the catalog related to the engagement. Accepted values are AWS and Sandbox, which determine the environment in which the engagement is managed.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Specifies a unique, client-generated UUID to ensure that the request is handled exactly once. This token helps prevent duplicate invitation creations.
                EngagementIdentifier:
                  $ref: "#/components/schemas/EngagementIdentifier"
                  description: The unique identifier of the Engagement associated with the invitation. This parameter ensures the invitation is created within the correct Engagement context.
                Invitation:
                  $ref: "#/components/schemas/Invitation"
                  description: The Invitation object all information necessary to initiate an engagement invitation to a partner. It contains a personalized message from the sender, the invitation's receiver, and a payload. The Payload can be the OpportunityInvitation, which includes detailed structures for sender contacts, partner responsibilities, customer information, and project details, or LeadInvitation, which includes structures for customer information and interaction details.
              required:
                - ClientToken
                - EngagementIdentifier
                - Invitation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEngagementInvitationResponse"
  /CreateOpportunity:
    post:
      operationId: CreateOpportunity
      description: "Creates an Opportunity record in Partner Central. Use this operation to create a potential business opportunity for submission to Amazon Web Services. Creating an opportunity sets Lifecycle.ReviewStatus to Pending Submission. To submit an opportunity, follow these steps: To create the opportunity, use CreateOpportunity. To associate a solution with the opportunity, use AssociateOpportunity. To start the engagement with AWS, use StartEngagementFromOpportunity. After submission, you can't edit the opportunity until the review is complete. But opportunities in the Pending Submission state must have complete details. You can update the opportunity while it's in the Pending Submission state. There's a set of mandatory fields to create opportunities, but consider providing optional fields to enrich the opportunity record."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.CreateOpportunity
            default: AWSPartnerCentralSelling.CreateOpportunity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: "Specifies the catalog associated with the request. This field takes a string value from a predefined list: AWS or Sandbox. The catalog determines which environment the opportunity is created in. Use AWS to create opportunities in the Amazon Web Services catalog, and Sandbox for testing in secure, isolated environments."
                PrimaryNeedsFromAws:
                  $ref: "#/components/schemas/PrimaryNeedsFromAws"
                  description: "Identifies the type of support the partner needs from Amazon Web Services. Valid values: Cosell—Architectural Validation: Confirmation from Amazon Web Services that the partner's proposed solution architecture is aligned with Amazon Web Services best practices and poses minimal architectural risks. Cosell—Business Presentation: Request Amazon Web Services seller's participation in a joint customer presentation. Cosell—Competitive Information: Access to Amazon Web Services competitive resources and support for the partner's proposed solution. Cosell—Pricing Assistance: Connect with an Amazon Web Services seller for support situations where a partner may be receiving an upfront discount on a service (for example: EDP deals). Cosell—Technical Consultation: Connect with an Amazon Web Services Solutions Architect to address the partner's questions about the proposed solution. Cosell—Total Cost of Ownership Evaluation: Assistance with quoting different cost savings of proposed solutions on Amazon Web Services versus on-premises or a traditional hosting environment. Cosell—Deal Support: Request Amazon Web Services seller's support to progress the opportunity (for example: joint customer call, strategic positioning). Cosell—Support for Public Tender/RFx: Opportunity related to the public sector where the partner needs Amazon Web Services RFx support."
                NationalSecurity:
                  $ref: "#/components/schemas/NationalSecurity"
                  description: Indicates whether the Opportunity pertains to a national security project. This field must be set to true only when the customer's industry is Government. Additional privacy and security measures apply during the review and management process for opportunities marked as NationalSecurity.
                PartnerOpportunityIdentifier:
                  $ref: "#/components/schemas/CreateOpportunityRequestPartnerOpportunityIdentifierString"
                  description: Specifies the opportunity's unique identifier in the partner's CRM system. This value is essential to track and reconcile because it's included in the outbound payload to the partner. This field allows partners to link an opportunity to their CRM, which helps to ensure seamless integration and accurate synchronization between the Partner Central API and the partner's internal systems.
                Customer:
                  $ref: "#/components/schemas/Customer"
                  description: Specifies customer details associated with the Opportunity.
                Project:
                  $ref: "#/components/schemas/Project"
                  description: An object that contains project details for the Opportunity.
                OpportunityType:
                  $ref: "#/components/schemas/OpportunityType"
                  description: "Specifies the opportunity type as a renewal, new, or expansion. Opportunity types: New opportunity: Represents a new business opportunity with a potential customer that's not previously engaged with your solutions or services. Renewal opportunity: Represents an opportunity to renew an existing contract or subscription with a current customer, ensuring continuity of service. Expansion opportunity: Represents an opportunity to expand the scope of an existing contract or subscription, either by adding new services or increasing the volume of existing services for a current customer."
                Marketing:
                  $ref: "#/components/schemas/Marketing"
                  description: This object contains marketing details and is optional for an opportunity.
                SoftwareRevenue:
                  $ref: "#/components/schemas/SoftwareRevenue"
                  description: Specifies details of a customer's procurement terms. This is required only for partners in eligible programs.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: 'Required to be unique, and should be unchanging, it can be randomly generated or a meaningful string. Default: None Best practice: To help ensure uniqueness and avoid conflicts, use a Universally Unique Identifier (UUID) as the ClientToken. You can use standard libraries from most programming languages to generate this. If you use the same client token, the API returns the following error: "Conflicting client token submitted for a new request body."'
                LifeCycle:
                  $ref: "#/components/schemas/LifeCycle"
                  description: An object that contains lifecycle details for the Opportunity.
                Origin:
                  $ref: "#/components/schemas/OpportunityOrigin"
                  description: "Specifies the origin of the opportunity, indicating if it was sourced from Amazon Web Services or the partner. For all opportunities created with Catalog: AWS, this field must only be Partner Referral. However, when using Catalog: Sandbox, you can set this field to AWS Referral to simulate Amazon Web Services referral creation. This allows Amazon Web Services-originated flows testing in the sandbox catalog."
                OpportunityTeam:
                  $ref: "#/components/schemas/PartnerOpportunityTeamMembersList"
                  description: Represents the internal team handling the opportunity. Specify collaborating members of this opportunity who are within the partner's organization.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A map of the key-value pairs of the tag or tags to assign.
              required:
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOpportunityResponse"
  /CreateResourceSnapshot:
    post:
      operationId: CreateResourceSnapshot
      description: This action allows you to create an immutable snapshot of a specific resource, such as an opportunity, within the context of an engagement. The snapshot captures a subset of the resource's data based on the schema defined by the provided template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.CreateResourceSnapshot
            default: AWSPartnerCentralSelling.CreateResourceSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: Specifies the catalog where the snapshot is created. Valid values are AWS and Sandbox.
                EngagementIdentifier:
                  $ref: "#/components/schemas/EngagementIdentifier"
                  description: The unique identifier of the engagement associated with this snapshot. This field links the snapshot to a specific engagement context.
                ResourceType:
                  $ref: "#/components/schemas/ResourceType"
                  description: "Specifies the type of resource for which the snapshot is being created. This field determines the structure and content of the snapshot. Must be one of the supported resource types, such as: Opportunity."
                ResourceIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                  description: "The unique identifier of the specific resource to be snapshotted. The format and constraints of this identifier depend on the ResourceType specified. For example: For Opportunity type, it will be an opportunity ID."
                ResourceSnapshotTemplateIdentifier:
                  $ref: "#/components/schemas/ResourceTemplateName"
                  description: The name of the template that defines the schema for the snapshot. This template determines which subset of the resource data will be included in the snapshot. Must correspond to an existing and valid template for the specified ResourceType.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Specifies a unique, client-generated UUID to ensure that the request is handled exactly once. This token helps prevent duplicate snapshot creations.
              required:
                - EngagementIdentifier
                - ResourceType
                - ResourceIdentifier
                - ResourceSnapshotTemplateIdentifier
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceSnapshotResponse"
  /CreateResourceSnapshotJob:
    post:
      operationId: CreateResourceSnapshotJob
      description: Use this action to create a job to generate a snapshot of the specified resource within an engagement. It initiates an asynchronous process to create a resource snapshot. The job creates a new snapshot only if the resource state has changed, adhering to the same access control and immutability rules as direct snapshot creation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.CreateResourceSnapshotJob
            default: AWSPartnerCentralSelling.CreateResourceSnapshotJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: Specifies the catalog in which to create the snapshot job. Valid values are AWS and Sandbox.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A client-generated UUID used for idempotency check. The token helps prevent duplicate job creations.
                EngagementIdentifier:
                  $ref: "#/components/schemas/EngagementIdentifier"
                  description: Specifies the identifier of the engagement associated with the resource to be snapshotted.
                ResourceType:
                  $ref: "#/components/schemas/ResourceType"
                  description: The type of resource for which the snapshot job is being created. Must be one of the supported resource types i.e. Opportunity
                ResourceIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                  description: Specifies the identifier of the specific resource to be snapshotted. The format depends on the ResourceType.
                ResourceSnapshotTemplateIdentifier:
                  $ref: "#/components/schemas/ResourceTemplateName"
                  description: Specifies the name of the template that defines the schema for the snapshot.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A map of the key-value pairs of the tag or tags to assign.
              required:
                - ClientToken
                - EngagementIdentifier
                - ResourceType
                - ResourceIdentifier
                - ResourceSnapshotTemplateIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceSnapshotJobResponse"
  /DeleteResourceSnapshotJob:
    post:
      operationId: DeleteResourceSnapshotJob
      description: Use this action to deletes a previously created resource snapshot job. The job must be in a stopped state before it can be deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.DeleteResourceSnapshotJob
            default: AWSPartnerCentralSelling.DeleteResourceSnapshotJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: Specifies the catalog from which to delete the snapshot job. Valid values are AWS and Sandbox.
                ResourceSnapshotJobIdentifier:
                  $ref: "#/components/schemas/ResourceSnapshotJobIdentifier"
                  description: The unique identifier of the resource snapshot job to be deleted.
              required:
                - ResourceSnapshotJobIdentifier
      responses:
        "200":
          description: Success
  /DisassociateOpportunity:
    post:
      operationId: DisassociateOpportunity
      description: Allows you to remove an existing association between an Opportunity and related entities, such as a Partner Solution, Amazon Web Services product, or an Amazon Web Services Marketplace offer. This operation is the counterpart to AssociateOpportunity, and it provides flexibility to manage associations as business needs change. Use this operation to update the associations of an Opportunity due to changes in the related entities, or if an association was made in error. Ensuring accurate associations helps maintain clarity and accuracy to track and manage business opportunities. When you replace an entity, first attach the new entity and then disassociate the one to be removed, especially if it's the last remaining entity that's required.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.DisassociateOpportunity
            default: AWSPartnerCentralSelling.DisassociateOpportunity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: "Specifies the catalog associated with the request. This field takes a string value from a predefined list: AWS or Sandbox. The catalog determines which environment the opportunity disassociation is made in. Use AWS to disassociate opportunities in the Amazon Web Services catalog, and Sandbox for testing in secure, isolated environments."
                OpportunityIdentifier:
                  $ref: "#/components/schemas/OpportunityIdentifier"
                  description: "The opportunity's unique identifier for when you want to disassociate it from related entities. This identifier helps to ensure that the correct opportunity is updated. Validation: Ensure that the provided identifier corresponds to an existing opportunity in the Amazon Web Services system because incorrect identifiers result in an error and no changes are made."
                RelatedEntityType:
                  $ref: "#/components/schemas/RelatedEntityType"
                  description: "The type of the entity that you're disassociating from the opportunity. When you specify the entity type, it helps the system correctly process the disassociation request to ensure that the right connections are removed. Examples of entity types include Partner Solution, Amazon Web Services product, and Amazon Web Services Marketplaceoffer. Ensure that the value matches one of the expected entity types. Validation: Provide a valid entity type to help ensure successful disassociation. An invalid or incorrect entity type results in an error."
                RelatedEntityIdentifier:
                  $ref: "#/components/schemas/DisassociateOpportunityRequestRelatedEntityIdentifierString"
                  description: "The related entity's identifier that you want to disassociate from the opportunity. Depending on the type of entity, this could be a simple identifier or an Amazon Resource Name (ARN) for entities managed through Amazon Web Services Marketplace. For Amazon Web Services Marketplace entities, use the Amazon Web Services Marketplace API to obtain the necessary ARNs. For guidance on retrieving these ARNs, see Amazon Web Services MarketplaceUsing the Amazon Web Services Marketplace Catalog API. Validation: Ensure the identifier or ARN is valid and corresponds to an existing entity. An incorrect or invalid identifier results in an error."
              required:
                - OpportunityIdentifier
                - RelatedEntityType
                - RelatedEntityIdentifier
      responses:
        "200":
          description: Success
  /GetAwsOpportunitySummary:
    post:
      operationId: GetAwsOpportunitySummary
      description: Retrieves a summary of an AWS Opportunity. This summary includes high-level details about the opportunity sourced from AWS, such as lifecycle information, customer details, and involvement type. It is useful for tracking updates on the AWS opportunity corresponding to an opportunity in the partner's account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.GetAwsOpportunitySummary
            default: AWSPartnerCentralSelling.GetAwsOpportunitySummary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: Specifies the catalog in which the AWS Opportunity is located. Accepted values include AWS for production opportunities or Sandbox for testing purposes. The catalog determines which environment the opportunity data is pulled from.
                RelatedOpportunityIdentifier:
                  $ref: "#/components/schemas/OpportunityIdentifier"
                  description: The unique identifier for the related partner opportunity. Use this field to correlate an AWS opportunity with its corresponding partner opportunity.
              required:
                - RelatedOpportunityIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAwsOpportunitySummaryResponse"
  /GetEngagement:
    post:
      operationId: GetEngagement
      description: Use this action to retrieve the engagement record for a given EngagementIdentifier.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
