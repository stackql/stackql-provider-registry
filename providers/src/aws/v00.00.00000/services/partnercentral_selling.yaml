        OpportunitySummary:
          $ref: "#/components/schemas/OpportunitySummaryView"
          description: An object that contains an opportunity's subset of fields.
        AwsOpportunitySummaryFullView:
          $ref: "#/components/schemas/AwsOpportunitySummaryFullView"
          description: Provides a comprehensive view of AwsOpportunitySummaryFullView template.
    OpportunitySummaryView:
      description: Provides a comprehensive view of an opportunity summary, including lifecycle information, team details, opportunity type, primary needs from AWS, and associated project information.
      type: object
      properties:
        OpportunityType:
          $ref: "#/components/schemas/OpportunityType"
          description: Specifies the opportunity type.
        Lifecycle:
          $ref: "#/components/schemas/LifeCycleForView"
          description: Contains information about the opportunity's lifecycle, including its current stage, status, and important dates such as creation and last modification times.
        OpportunityTeam:
          $ref: "#/components/schemas/PartnerOpportunityTeamMembersList"
          description: Represents the internal team handling the opportunity. Specify the members involved in collaborating on an opportunity within the partner's organization.
        PrimaryNeedsFromAws:
          $ref: "#/components/schemas/PrimaryNeedsFromAws"
          description: Identifies the type of support the partner needs from AWS.
        Customer:
          $ref: "#/components/schemas/Customer"
        Project:
          $ref: "#/components/schemas/ProjectView"
          description: Contains summary information about the project associated with the opportunity, including project name, description, timeline, and other relevant details.
        RelatedEntityIdentifiers:
          $ref: "#/components/schemas/RelatedEntityIdentifiers"
    LifeCycleForView:
      description: Provides the lifecycle view of an opportunity resource shared through a snapshot.
      type: object
      properties:
        TargetCloseDate:
          $ref: "#/components/schemas/Date"
          description: The projected launch date of the opportunity shared through a snapshot.
        ReviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
          description: Defines the approval status of the opportunity shared through a snapshot.
        Stage:
          $ref: "#/components/schemas/Stage"
          description: Defines the current stage of the opportunity shared through a snapshot.
        NextSteps:
          $ref: "#/components/schemas/LifeCycleForViewNextStepsString"
          description: Describes the next steps for the opportunity shared through a snapshot.
    LifeCycleForViewNextStepsString:
      type: string
      pattern: (?s).{0,255}
    ProjectView:
      description: Provides the project view of an opportunity resource shared through a snapshot.
      type: object
      properties:
        DeliveryModels:
          $ref: "#/components/schemas/DeliveryModels"
          description: Describes the deployment or consumption model for the partner solution or offering. This field indicates how the project's solution will be delivered or implemented for the customer.
        ExpectedCustomerSpend:
          $ref: "#/components/schemas/ExpectedCustomerSpendList"
          description: Provides information about the anticipated customer spend related to this project. This may include details such as amount, frequency, and currency of expected expenditure.
        ExpectedContractDuration:
          $ref: "#/components/schemas/ExpectedContractDuration"
          description: Optional. The expected contract duration for this opportunity, representing the anticipated length of the contract in the unit specified by Term.
        CustomerUseCase:
          $ref: "#/components/schemas/String"
          description: Specifies the proposed solution focus or type of workload for the project.
        SalesActivities:
          $ref: "#/components/schemas/SalesActivities"
          description: Lists the pre-sales activities that have occurred with the end-customer related to the opportunity. This field is conditionally mandatory when the project is qualified for Co-Sell and helps drive assignment priority on the AWS side. It provides insight into the engagement level with the customer.
        OtherSolutionDescription:
          $ref: "#/components/schemas/ProjectViewOtherSolutionDescriptionString"
          description: Offers a description of other solutions if the standard solutions do not adequately cover the project's scope.
    ProjectViewOtherSolutionDescriptionString:
      type: string
      pattern: (?s).{0,255}
    AwsOpportunitySummaryFullView:
      description: Provides a comprehensive view of AwsOpportunitySummaryFullView template.
