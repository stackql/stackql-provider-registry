        CreatedAt:
          $ref: "#/components/schemas/DateTime"
          description: 'The date and time when the Engagement was created, presented in ISO 8601 format (UTC). For example: "2023-05-01T20:37:46Z". This timestamp helps track the lifecycle of the Engagement.'
        CreatedBy:
          $ref: "#/components/schemas/AwsAccount"
          description: The AWS account ID of the user who originally created the engagement. This field helps in tracking the origin of the engagement.
        MemberCount:
          $ref: "#/components/schemas/Integer"
          description: Specifies the current count of members participating in the Engagement. This count includes all active members regardless of their roles or permissions within the Engagement.
        ModifiedAt:
          $ref: "#/components/schemas/DateTime"
          description: 'The timestamp indicating when the engagement was last modified, in ISO 8601 format (UTC). Example: "2023-05-01T20:37:46Z". This helps track the most recent changes to the engagement.'
        ModifiedBy:
          $ref: "#/components/schemas/AwsAccount"
          description: The AWS account ID of the user who last modified the engagement. This field helps track who made the most recent changes to the engagement.
        Contexts:
          $ref: "#/components/schemas/EngagementContexts"
          description: A list of context objects associated with the engagement. Each context provides additional information related to the Engagement, such as customer projects or documents.
    Integer:
      type: integer
    GetEngagementInvitationResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that identifies the engagement invitation.
        PayloadType:
          $ref: "#/components/schemas/EngagementInvitationPayloadType"
          description: The type of payload contained in the engagement invitation, indicating what data or context the payload covers.
        Id:
          $ref: "#/components/schemas/EngagementInvitationArnOrIdentifier"
          description: Unique identifier assigned to the engagement invitation being retrieved.
        EngagementId:
          $ref: "#/components/schemas/EngagementIdentifier"
          description: The identifier of the engagement associated with this invitation.This ID links the invitation to its corresponding engagement.
        EngagementTitle:
          $ref: "#/components/schemas/EngagementTitle"
          description: The title of the engagement invitation, summarizing the purpose or objectives of the opportunity shared by AWS.
        Status:
          $ref: "#/components/schemas/InvitationStatus"
          description: The current status of the engagement invitation.
        InvitationDate:
          $ref: "#/components/schemas/DateTime"
          description: The date when the engagement invitation was sent to the partner.
        ExpirationDate:
          $ref: "#/components/schemas/DateTime"
          description: Indicates the date on which the engagement invitation will expire if not accepted by the partner.
        SenderAwsAccountId:
          $ref: "#/components/schemas/AwsAccount"
          description: Specifies the AWS Account ID of the sender, which identifies the AWS team responsible for sharing the engagement invitation.
        SenderCompanyName:
          $ref: "#/components/schemas/GetEngagementInvitationResponseSenderCompanyNameString"
          description: The name of the AWS organization or team that sent the engagement invitation.
        Receiver:
          $ref: "#/components/schemas/Receiver"
          description: Information about the partner organization or team that received the engagement invitation, including contact details and identifiers.
        Catalog:
          $ref: "#/components/schemas/CatalogIdentifier"
          description: Indicates the catalog from which the engagement invitation details are retrieved. This field helps in identifying the appropriate catalog (e.g., AWS or Sandbox) used in the request.
        RejectionReason:
          $ref: "#/components/schemas/RejectionReasonString"
          description: If the engagement invitation was rejected, this field specifies the reason provided by the partner for the rejection.
        Payload:
          $ref: "#/components/schemas/Payload"
          description: Details of the engagement invitation payload, including specific data relevant to the invitation's contents, such as customer information and opportunity insights.
        InvitationMessage:
          $ref: "#/components/schemas/InvitationMessage"
          description: The message sent to the invited partner when the invitation was created.
        EngagementDescription:
          $ref: "#/components/schemas/EngagementDescription"
          description: The description of the engagement associated with this invitation.
        ExistingMembers:
          $ref: "#/components/schemas/EngagementMemberSummaries"
          description: "A list of active members currently part of the Engagement. This array contains a maximum of 10 members, each represented by an object with the following properties. CompanyName: The name of the member's company. WebsiteUrl: The website URL of the member's company."
      required:
        - Id
        - Catalog
    EngagementInvitationPayloadType:
      type: string
      enum:
        - OpportunityInvitation
        - LeadInvitation
    InvitationStatus:
      type: string
      enum:
        - ACCEPTED
        - PENDING
        - REJECTED
        - EXPIRED
    GetEngagementInvitationResponseSenderCompanyNameString:
      type: string
      pattern: (?s).{0,120}
    RejectionReasonString:
      type: string
      pattern: "[\\u0020-\\u007E\\u00A0-\\uD7FF\\uE000-\\uFFFD]{1,80}"
    EngagementMemberSummaries:
      type: array
      items:
        $ref: "#/components/schemas/EngagementMemberSummary"
    EngagementMemberSummary:
      description: The EngagementMemberSummary provides a snapshot of essential information about participants in an AWS Partner Central Engagement. This compact data structure encapsulates key details of each member, facilitating efficient collaboration and management within the Engagement.
      type: object
      properties:
        CompanyName:
          $ref: "#/components/schemas/MemberCompanyName"
          description: The official name of the member's company or organization.
        WebsiteUrl:
          $ref: "#/components/schemas/String"
          description: The URL of the member company's website. This offers a way to find more information about the member organization and serves as an additional identifier.
    MemberCompanyName:
      type: string
      pattern: (?s).{1,120}
    GetOpportunityResponse:
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/CatalogIdentifier"
          description: "Specifies the catalog associated with the request. This field takes a string value from a predefined list: AWS or Sandbox. The catalog determines which environment the opportunity information is retrieved from. Use AWS to retrieve opportunities in the Amazon Web Services catalog, and Sandbox to retrieve opportunities in a secure and isolated testing environment."
        PrimaryNeedsFromAws:
          $ref: "#/components/schemas/PrimaryNeedsFromAws"
          description: "Identifies the type of support the partner needs from Amazon Web Services. Valid values: Cosell—Architectural Validation: Confirmation from Amazon Web Services that the partner's proposed solution architecture is aligned with Amazon Web Services best practices and poses minimal architectural risks. Cosell—Business Presentation: Request Amazon Web Services seller's participation in a joint customer presentation. Cosell—Competitive Information: Access to Amazon Web Services competitive resources and support for the partner's proposed solution. Cosell—Pricing Assistance: Connect with an Amazon Web Services seller for support situations where a partner may be receiving an upfront discount on a service (for example: EDP deals). Cosell—Technical Consultation: Connect with an Amazon Web Services Solutions Architect to address the partner's questions about the proposed solution. Cosell—Total Cost of Ownership Evaluation: Assistance with quoting different cost savings of proposed solutions on Amazon Web Services versus on-premises or a traditional hosting environment. Cosell—Deal Support: Request Amazon Web Services seller's support to progress the opportunity (for example: joint customer call, strategic positioning). Cosell—Support for Public Tender/RFx: Opportunity related to the public sector where the partner needs Amazon Web Services RFx support."
        NationalSecurity:
          $ref: "#/components/schemas/NationalSecurity"
          description: Indicates whether the Opportunity pertains to a national security project. This field must be set to true only when the customer's industry is Government. Additional privacy and security measures apply during the review and management process for opportunities marked as NationalSecurity.
        PartnerOpportunityIdentifier:
          $ref: "#/components/schemas/GetOpportunityResponsePartnerOpportunityIdentifierString"
          description: Specifies the opportunity's unique identifier in the partner's CRM system. This value is essential to track and reconcile because it's included in the outbound payload sent back to the partner.
        Customer:
          $ref: "#/components/schemas/Customer"
          description: Specifies details of the customer associated with the Opportunity.
        Project:
          $ref: "#/components/schemas/Project"
          description: An object that contains project details summary for the Opportunity.
        OpportunityType:
          $ref: "#/components/schemas/OpportunityType"
          description: "Specifies the opportunity type as renewal, new, or expansion. Opportunity types: New opportunity: Represents a new business opportunity with a potential customer that's not previously engaged with your solutions or services. Renewal opportunity: Represents an opportunity to renew an existing contract or subscription with a current customer, which helps to ensure service continuity. Expansion opportunity: Represents an opportunity to expand the scope of a customer's contract or subscription, either by adding new services or increasing the volume of existing services."
        Marketing:
          $ref: "#/components/schemas/Marketing"
          description: An object that contains marketing details for the Opportunity.
        SoftwareRevenue:
          $ref: "#/components/schemas/SoftwareRevenue"
          description: Specifies details of a customer's procurement terms. Required only for partners in eligible programs.
        Id:
          $ref: "#/components/schemas/OpportunityIdentifier"
          description: Read-only, system generated Opportunity unique identifier.
        Arn:
          $ref: "#/components/schemas/OpportunityArn"
          description: The Amazon Resource Name (ARN) that uniquely identifies the opportunity.
        LastModifiedDate:
          $ref: "#/components/schemas/DateTime"
          description: DateTime when the opportunity was last modified.
        CreatedDate:
          $ref: "#/components/schemas/DateTime"
          description: DateTime when the Opportunity was last created.
        RelatedEntityIdentifiers:
          $ref: "#/components/schemas/RelatedEntityIdentifiers"
          description: Provides information about the associations of other entities with the opportunity. These entities include identifiers for AWSProducts, Partner Solutions, and AWSMarketplaceOffers.
        LifeCycle:
          $ref: "#/components/schemas/LifeCycle"
          description: An object that contains lifecycle details for the Opportunity.
        OpportunityTeam:
          $ref: "#/components/schemas/PartnerOpportunityTeamMembersList"
          description: Represents the internal team handling the opportunity. Specify the members involved in collaborating on this opportunity within the partner's organization.
      required:
        - Catalog
        - Id
        - LastModifiedDate
        - CreatedDate
        - RelatedEntityIdentifiers
    GetOpportunityResponsePartnerOpportunityIdentifierString:
      type: string
      pattern: (?s).{0,64}
    OpportunityArn:
      type: string
      pattern: arn:.*
    RelatedEntityIdentifiers:
      description: This field provides the associations' information for other entities with the opportunity. These entities include identifiers for AWSProducts, Partner Solutions, and AWSMarketplaceOffers.
      type: object
      properties:
        AwsMarketplaceOffers:
          $ref: "#/components/schemas/AwsMarketplaceOfferIdentifiers"
          description: 'Takes one value per opportunity. Each value is an Amazon Resource Name (ARN), in this format: "offers": ["arn:aws:aws-marketplace:us-east-1:999999999999:AWSMarketplace/Offer/offer-sampleOffer32"]. Use the ListEntities action in the Marketplace Catalog APIs for a list of offers in the associated Marketplace seller account.'
        AwsMarketplaceOfferSets:
          $ref: "#/components/schemas/AwsMarketplaceOfferSetIdentifiers"
          description: "Enables the association of AWS Marketplace offer sets with the Opportunity. Offer sets allow grouping multiple related marketplace offers together for comprehensive solution packaging. Each value is an Amazon Resource Name (ARN) in this format: arn:aws:aws-marketplace:us-east-1:999999999999:AWSMarketplace/OfferSet/offerset-sampleOfferSet32."
        Solutions:
          $ref: "#/components/schemas/SolutionIdentifiers"
          description: Enables partner solutions or offerings' association with an opportunity. To associate a solution, provide the solution's unique identifier, which you can obtain with the ListSolutions operation. If the specific solution identifier is not available, you can use the value Other and provide details about the solution in the otherSolutionOffered field. But when the opportunity reaches the Committed stage or beyond, the Other value cannot be used, and a valid solution identifier must be provided. By associating the relevant solutions with the opportunity, you can communicate the offerings that are being considered or implemented to address the customer's business problem.
        AwsProducts:
          $ref: "#/components/schemas/AwsProductIdentifiers"
          description: "Enables the association of specific Amazon Web Services products with the Opportunity. Partners can indicate the relevant Amazon Web Services products for the Opportunity's solution and align with the customer's needs. Returns multiple values separated by commas. For example, \"AWSProducts\" : [\"AmazonRedshift\", \"AWSAppFabric\", \"AWSCleanRooms\"]. Use the file with the list of Amazon Web Services products hosted on GitHub: Amazon Web Services products."
    AwsMarketplaceOfferIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/AwsMarketplaceOfferIdentifier"
    AwsMarketplaceOfferIdentifier:
      type: string
      pattern: arn:aws:aws-marketplace:[a-z]{1,2}-[a-z]*-\d+:\d{12}:AWSMarketplace/Offer/.*
    AwsMarketplaceOfferSetIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/AwsMarketplaceOfferSetIdentifier"
    AwsMarketplaceOfferSetIdentifier:
      type: string
      pattern: arn:aws:aws-marketplace:[a-z]{1,2}-[a-z]*-\d+:\d{12}:AWSMarketplace/OfferSet/offerset-.*
    GetResourceSnapshotResponse:
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/CatalogIdentifier"
          description: The catalog in which the snapshot was created. Matches the Catalog specified in the request.
        Arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) that uniquely identifies the resource snapshot.
        CreatedBy:
          $ref: "#/components/schemas/AwsAccount"
