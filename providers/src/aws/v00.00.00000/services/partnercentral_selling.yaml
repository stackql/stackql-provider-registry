        CreatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the snapshot was created, in ISO 8601 format (e.g., "2023-06-01T14:30:00Z"). This allows for precise tracking of when the snapshot was taken.
        EngagementId:
          $ref: "#/components/schemas/EngagementIdentifier"
          description: The identifier of the engagement associated with this snapshot. Matches the EngagementIdentifier specified in the request.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of the resource that was snapshotted. Matches the ResourceType specified in the request.
        ResourceId:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: The identifier of the specific resource that was snapshotted. Matches the ResourceIdentifier specified in the request.
        ResourceSnapshotTemplateName:
          $ref: "#/components/schemas/ResourceTemplateName"
          description: The name of the view used for this snapshot. This is the same as the template name.
        Revision:
          $ref: "#/components/schemas/ResourceSnapshotRevision"
          description: The revision number of this snapshot. This is a positive integer that is sequential and unique within the context of a resource view.
