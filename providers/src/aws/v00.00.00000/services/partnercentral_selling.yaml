                Identifier:
                  $ref: "#/components/schemas/EngagementInvitationArnOrIdentifier"
                  description: This is the unique identifier of the rejected EngagementInvitation. Providing the correct identifier helps to ensure that the intended invitation is rejected.
                RejectionReason:
                  $ref: "#/components/schemas/RejectionReasonString"
                  description: "This describes the reason for rejecting the engagement invitation, which helps AWS track usage patterns. Acceptable values include the following: Customer problem unclear: The customer's problem isn't understood. Next steps unclear: The next steps required to proceed aren't understood. Unable to support: The partner is unable to provide support due to resource or capability constraints. Duplicate of partner referral: The opportunity is a duplicate of an existing referral. Other: Any reason not covered by other values."
