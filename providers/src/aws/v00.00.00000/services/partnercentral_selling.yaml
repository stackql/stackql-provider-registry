  /UpdateOpportunity:
    post:
      operationId: UpdateOpportunity
      description: Updates the Opportunity record identified by a given Identifier. This operation allows you to modify the details of an existing opportunity to reflect the latest information and progress. Use this action to keep the opportunity record up-to-date and accurate. When you perform updates, include the entire payload with each request. If any field is omitted, the API assumes that the field is set to null. The best practice is to always perform a GetOpportunity to retrieve the latest values, then send the complete payload with the updated values to be changed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPartnerCentralSelling.UpdateOpportunity
            default: AWSPartnerCentralSelling.UpdateOpportunity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogIdentifier"
                  description: "Specifies the catalog associated with the request. This field takes a string value from a predefined list: AWS or Sandbox. The catalog determines which environment the opportunity is updated in. Use AWS to update real opportunities in the production environment, and Sandbox for testing in secure, isolated environments. When you use the Sandbox catalog, it allows you to simulate and validate your interactions with Amazon Web Services services without affecting live data or operations."
                PrimaryNeedsFromAws:
                  $ref: "#/components/schemas/PrimaryNeedsFromAws"
                  description: "Identifies the type of support the partner needs from Amazon Web Services. Valid values: Cosell—Architectural Validation: Confirmation from Amazon Web Services that the partner's proposed solution architecture is aligned with Amazon Web Services best practices and poses minimal architectural risks. Cosell—Business Presentation: Request Amazon Web Services seller's participation in a joint customer presentation. Cosell—Competitive Information: Access to Amazon Web Services competitive resources and support for the partner's proposed solution. Cosell—Pricing Assistance: Connect with an AWS seller for support situations where a partner may be receiving an upfront discount on a service (for example: EDP deals). Cosell—Technical Consultation: Connection with an Amazon Web Services Solutions Architect to address the partner's questions about the proposed solution. Cosell—Total Cost of Ownership Evaluation: Assistance with quoting different cost savings of proposed solutions on Amazon Web Services versus on-premises or a traditional hosting environment. Cosell—Deal Support: Request Amazon Web Services seller's support to progress the opportunity (for example: joint customer call, strategic positioning). Cosell—Support for Public Tender/RFx: Opportunity related to the public sector where the partner needs RFx support from Amazon Web Services."
                NationalSecurity:
                  $ref: "#/components/schemas/NationalSecurity"
                  description: Specifies if the opportunity is associated with national security concerns. This flag is only applicable when the industry is Government. For national-security-related opportunities, validation and compliance rules may apply, impacting the opportunity's visibility and processing.
                PartnerOpportunityIdentifier:
                  $ref: "#/components/schemas/UpdateOpportunityRequestPartnerOpportunityIdentifierString"
                  description: Specifies the opportunity's unique identifier in the partner's CRM system. This value is essential to track and reconcile because it's included in the outbound payload sent back to the partner.
                Customer:
                  $ref: "#/components/schemas/Customer"
                  description: Specifies details of the customer associated with the Opportunity.
                Project:
                  $ref: "#/components/schemas/Project"
                  description: An object that contains project details summary for the Opportunity.
                OpportunityType:
                  $ref: "#/components/schemas/OpportunityType"
                  description: "Specifies the opportunity type as a renewal, new, or expansion. Opportunity types: New opportunity: Represents a new business opportunity with a potential customer that's not previously engaged with your solutions or services. Renewal opportunity: Represents an opportunity to renew an existing contract or subscription with a current customer, ensuring continuity of service. Expansion opportunity: Represents an opportunity to expand the scope of an existing contract or subscription, either by adding new services or increasing the volume of existing services for a current customer."
                Marketing:
                  $ref: "#/components/schemas/Marketing"
                  description: An object that contains marketing details for the Opportunity.
                SoftwareRevenue:
                  $ref: "#/components/schemas/SoftwareRevenue"
                  description: Specifies details of a customer's procurement terms. Required only for partners in eligible programs.
                LastModifiedDate:
                  $ref: "#/components/schemas/DateTime"
                  description: DateTime when the opportunity was last modified.
                Identifier:
                  $ref: "#/components/schemas/OpportunityIdentifier"
                  description: Read-only, system generated Opportunity unique identifier.
                LifeCycle:
                  $ref: "#/components/schemas/LifeCycle"
                  description: An object that contains lifecycle details for the Opportunity.
              required:
                - LastModifiedDate
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOpportunityResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CatalogIdentifier:
      type: string
      pattern: "[a-zA-Z]+"
    EngagementInvitationArnOrIdentifier:
      type: string
      pattern: (?=.{1,255}$)(arn:.*|engi-[0-9a-z]{13})
    OpportunityIdentifier:
      type: string
      pattern: O[0-9]{1,19}
    AssigneeContact:
      description: Represents the contact details of the individual assigned to manage the opportunity within the partner organization. This helps to ensure that there is a point of contact for the opportunity's progress.
      type: object
      properties:
        Email:
          $ref: "#/components/schemas/Email"
          description: Provides the email address of the assignee. This email is used for communications and notifications related to the opportunity.
        FirstName:
          $ref: "#/components/schemas/AssigneeContactFirstNameString"
          description: Specifies the first name of the assignee managing the opportunity. The system automatically retrieves this value from the user profile by referencing the associated email address.
        LastName:
          $ref: "#/components/schemas/AssigneeContactLastNameString"
          description: Specifies the last name of the assignee managing the opportunity. The system automatically retrieves this value from the user profile by referencing the associated email address.
        Phone:
          $ref: "#/components/schemas/PhoneNumber"
          description: Specifies the contact phone number of the assignee responsible for the opportunity or engagement. This field enables direct communication for time-sensitive matters and facilitates coordination between AWS and partner teams.
        BusinessTitle:
          $ref: "#/components/schemas/JobTitle"
          description: Specifies the business title of the assignee managing the opportunity. This helps clarify the individual's role and responsibilities within the organization. Use the value PartnerAccountManager to update details of the opportunity owner.
      required:
        - Email
        - FirstName
        - LastName
        - BusinessTitle
    Email:
      type: string
      pattern: (?=.{0,80}$)[a-z0-9!#$%&'*+/=?^_`{|}~-]+(?:\.[a-z0-9!#$%&'*+/=?^_`{|}~-]+)*@(?:[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+[a-z0-9](?:[a-z0-9-]*[a-z0-9])?
    AssigneeContactFirstNameString:
      type: string
      pattern: (?s).{0,80}
    AssigneeContactLastNameString:
      type: string
      pattern: (?s).{0,80}
    PhoneNumber:
      type: string
      pattern: \+[1-9]\d{1,14}
    JobTitle:
      type: string
      pattern: (?s).{0,80}
    RelatedEntityType:
      type: string
      enum:
        - Solutions
        - AwsProducts
        - AwsMarketplaceOffers
        - AwsMarketplaceOfferSets
    AssociateOpportunityRequestRelatedEntityIdentifierString:
      type: string
      pattern: (?s).{1,255}
    ClientToken:
      type: string
      pattern: .{1,255}
    EngagementTitle:
      type: string
      pattern: (?s).{1,40}
    EngagementDescription:
      type: string
      pattern: (?s).{0,255}
    EngagementContexts:
      type: array
      items:
        $ref: "#/components/schemas/EngagementContextDetails"
    EngagementContextDetails:
      description: Provides detailed context information for an Engagement. This structure allows for specifying the type of context and its associated payload.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/EngagementContextIdentifier"
          description: The unique identifier of the engagement context. This ID is used to reference and manage the specific context within the engagement.
        Type:
          $ref: "#/components/schemas/EngagementContextType"
          description: Specifies the type of Engagement context. Valid values are "CustomerProject" or "Document", indicating whether the context relates to a customer project or a document respectively.
        Payload:
          $ref: "#/components/schemas/EngagementContextPayload"
          description: Contains the specific details of the Engagement context. The structure of this payload varies depending on the Type field.
      required:
        - Type
    EngagementContextIdentifier:
      type: string
      pattern: (?s).{1,3}
    EngagementContextType:
      type: string
      enum:
        - CustomerProject
        - Lead
    EngagementContextPayload:
      description: Represents the payload of an Engagement context. The structure of this payload varies based on the context type specified in the EngagementContextDetails.
      type: object
      properties:
        CustomerProject:
          $ref: "#/components/schemas/CustomerProjectsContext"
          description: Contains detailed information about a customer project when the context type is "CustomerProject". This field is present only when the Type in EngagementContextDetails is set to "CustomerProject".
        Lead:
          $ref: "#/components/schemas/LeadContext"
          description: Contains detailed information about a lead when the context type is "Lead". This field is present only when the Type in EngagementContextDetails is set to "Lead".
    CustomerProjectsContext:
      description: The CustomerProjects structure in Engagements offers a flexible framework for managing customer-project relationships. It supports multiple customers per Engagement and multiple projects per customer, while also allowing for customers without projects and projects without specific customers. All Engagement members have full visibility of customers and their associated projects, enabling the capture of relevant context even when project details are not fully defined. This structure also facilitates targeted invitations, allowing partners to focus on specific customers and their business problems when sending Engagement invitations.
      type: object
      properties:
        Customer:
          $ref: "#/components/schemas/EngagementCustomer"
        Project:
          $ref: "#/components/schemas/EngagementCustomerProjectDetails"
          description: Information about the customer project associated with the Engagement.
    EngagementCustomer:
      description: Contains details about the customer associated with the Engagement Invitation, including company information and industry.
      type: object
      properties:
        Industry:
          $ref: "#/components/schemas/Industry"
          description: Specifies the industry to which the customer’s company belongs. This field helps categorize the opportunity based on the customer’s business sector.
        CompanyName:
          $ref: "#/components/schemas/CompanyName"
          description: Represents the name of the customer’s company associated with the Engagement Invitation. This field is used to identify the customer.
        WebsiteUrl:
          $ref: "#/components/schemas/CompanyWebsiteUrl"
          description: Provides the website URL of the customer’s company. This field helps partners verify the legitimacy and size of the customer organization.
        CountryCode:
          $ref: "#/components/schemas/CountryCode"
          description: Indicates the country in which the customer’s company operates. This field is useful for understanding regional requirements or compliance needs.
      required:
        - Industry
        - CompanyName
        - WebsiteUrl
        - CountryCode
    Industry:
      type: string
      enum:
        - Aerospace
        - Agriculture
        - Automotive
        - Computers and Electronics
        - Consumer Goods
        - Education
        - Energy - Oil and Gas
        - Energy - Power and Utilities
        - Financial Services
        - Gaming
