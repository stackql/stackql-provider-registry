          description: The size of the root volume in GB. Valid range is 200-500 GB. The default is 200 GB, which is included in the hourly instance rate. Additional storage beyond 200 GB incurs extra charges and applies to instances regardless of their running state.
    CreateFleetResult:
      type: object
      properties:
        Fleet:
          $ref: "#/components/schemas/Fleet"
          description: Information about the fleet.
    Fleet:
      description: Describes a fleet.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for the fleet.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the fleet.
        DisplayName:
          $ref: "#/components/schemas/String"
          description: The fleet name to display.
        Description:
          $ref: "#/components/schemas/String"
          description: The description to display.
        ImageName:
          $ref: "#/components/schemas/String"
          description: The name of the image used to create the fleet.
        ImageArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN for the public, private, or shared image.
        InstanceType:
          $ref: "#/components/schemas/String"
          description: "The instance type to use when launching fleet instances. The following instance types are available: stream.standard.small stream.standard.medium stream.standard.large stream.compute.large stream.compute.xlarge stream.compute.2xlarge stream.compute.4xlarge stream.compute.8xlarge stream.memory.large stream.memory.xlarge stream.memory.2xlarge stream.memory.4xlarge stream.memory.8xlarge stream.memory.z1d.large stream.memory.z1d.xlarge stream.memory.z1d.2xlarge stream.memory.z1d.3xlarge stream.memory.z1d.6xlarge stream.memory.z1d.12xlarge stream.graphics.g4dn.xlarge stream.graphics.g4dn.2xlarge stream.graphics.g4dn.4xlarge stream.graphics.g4dn.8xlarge stream.graphics.g4dn.12xlarge stream.graphics.g4dn.16xlarge stream.graphics.g5.xlarge stream.graphics.g5.2xlarge stream.graphics.g5.4xlarge stream.graphics.g5.8xlarge stream.graphics.g5.16xlarge stream.graphics.g5.12xlarge stream.graphics.g5.24xlarge stream.graphics.g6.xlarge stream.graphics.g6.2xlarge stream.graphics.g6.4xlarge stream.graphics.g6.8xlarge stream.graphics.g6.16xlarge stream.graphics.g6.12xlarge stream.graphics.g6.24xlarge stream.graphics.gr6.4xlarge stream.graphics.gr6.8xlarge stream.graphics.g6f.large stream.graphics.g6f.xlarge stream.graphics.g6f.2xlarge stream.graphics.g6f.4xlarge stream.graphics.gr6f.4xlarge"
        FleetType:
          $ref: "#/components/schemas/FleetType"
          description: The fleet type. ALWAYS_ON Provides users with instant-on access to their apps. You are charged for all running instances in your fleet, even if no users are streaming apps. ON_DEMAND Provide users with access to applications after they connect, which takes one to two minutes. You are charged for instance streaming when users are connected and a small hourly fee for instances that are not streaming apps.
        ComputeCapacityStatus:
          $ref: "#/components/schemas/ComputeCapacityStatus"
          description: The capacity status for the fleet.
        MaxUserDurationInSeconds:
          $ref: "#/components/schemas/Integer"
          description: The maximum amount of time that a streaming session can remain active, in seconds. If users are still connected to a streaming instance five minutes before this limit is reached, they are prompted to save any open documents before being disconnected. After this time elapses, the instance is terminated and replaced by a new instance. Specify a value between 600 and 360000.
        DisconnectTimeoutInSeconds:
          $ref: "#/components/schemas/Integer"
          description: The amount of time that a streaming session remains active after users disconnect. If they try to reconnect to the streaming session after a disconnection or network interruption within this time interval, they are connected to their previous session. Otherwise, they are connected to a new session with a new streaming instance. Specify a value between 60 and 36000.
        State:
          $ref: "#/components/schemas/FleetState"
          description: The current state for the fleet.
        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The VPC configuration for the fleet.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the fleet was created.
        FleetErrors:
          $ref: "#/components/schemas/FleetErrors"
          description: The fleet errors.
        EnableDefaultInternetAccess:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether default internet access is enabled for the fleet.
        DomainJoinInfo:
          $ref: "#/components/schemas/DomainJoinInfo"
          description: The name of the directory and organizational unit (OU) to use to join the fleet to a Microsoft Active Directory domain.
        IdleDisconnectTimeoutInSeconds:
          $ref: "#/components/schemas/Integer"
          description: The amount of time that users can be idle (inactive) before they are disconnected from their streaming session and the DisconnectTimeoutInSeconds time interval begins. Users are notified before they are disconnected due to inactivity. If users try to reconnect to the streaming session before the time interval specified in DisconnectTimeoutInSeconds elapses, they are connected to their previous session. Users are considered idle when they stop providing keyboard or mouse input during their streaming session. File uploads and downloads, audio in, audio out, and pixels changing do not qualify as user activity. If users continue to be idle after the time interval in IdleDisconnectTimeoutInSeconds elapses, they are disconnected. To prevent users from being disconnected due to inactivity, specify a value of 0. Otherwise, specify a value between 60 and 36000. The default value is 0. If you enable this feature, we recommend that you specify a value that corresponds exactly to a whole number of minutes (for example, 60, 120, and 180). If you don't do this, the value is rounded to the nearest minute. For example, if you specify a value of 70, users are disconnected after 1 minute of inactivity. If you specify a value that is at the midpoint between two different minutes, the value is rounded up. For example, if you specify a value of 90, users are disconnected after 2 minutes of inactivity.
        IamRoleArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the IAM role that is applied to the fleet. To assume a role, the fleet instance calls the AWS Security Token Service (STS) AssumeRole API operation and passes the ARN of the role to use. The operation creates a new session with temporary credentials. WorkSpaces Applications retrieves the temporary credentials and creates the appstream_machine_role credential profile on the instance. For more information, see Using an IAM Role to Grant Permissions to Applications and Scripts Running on WorkSpaces Applications Streaming Instances in the Amazon WorkSpaces Applications Administration Guide.
        StreamView:
          $ref: "#/components/schemas/StreamView"
          description: The WorkSpaces Applications view that is displayed to your users when they stream from the fleet. When APP is specified, only the windows of applications opened by users display. When DESKTOP is specified, the standard desktop that is provided by the operating system displays. The default value is APP.
        Platform:
          $ref: "#/components/schemas/PlatformType"
          description: The platform of the fleet.
        MaxConcurrentSessions:
          $ref: "#/components/schemas/Integer"
          description: The maximum number of concurrent sessions for the fleet.
        UsbDeviceFilterStrings:
          $ref: "#/components/schemas/UsbDeviceFilterStrings"
          description: The USB device filter strings associated with the fleet.
        SessionScriptS3Location:
          $ref: "#/components/schemas/S3Location"
          description: The S3 location of the session scripts configuration zip file. This only applies to Elastic fleets.
        MaxSessionsPerInstance:
          $ref: "#/components/schemas/Integer"
          description: The maximum number of user sessions on an instance. This only applies to multi-session fleets.
        RootVolumeConfig:
          $ref: "#/components/schemas/VolumeConfig"
          description: The current configuration of the root volume for fleet instances, including the storage size in GB.
        DisableIMDSV1:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether Instance Metadata Service Version 1 (IMDSv1) is disabled for the fleet.
      required:
        - Arn
        - Name
        - InstanceType
        - ComputeCapacityStatus
        - State
    ComputeCapacityStatus:
      description: Describes the capacity status for a fleet.
      type: object
      properties:
        Desired:
          $ref: "#/components/schemas/Integer"
          description: The desired number of streaming instances.
        Running:
          $ref: "#/components/schemas/Integer"
          description: The total number of simultaneous streaming instances that are running.
        InUse:
          $ref: "#/components/schemas/Integer"
          description: The number of instances in use for streaming.
        Available:
          $ref: "#/components/schemas/Integer"
          description: The number of currently available instances that can be used to stream sessions.
        DesiredUserSessions:
          $ref: "#/components/schemas/Integer"
          description: The total number of sessions slots that are either running or pending. This represents the total number of concurrent streaming sessions your fleet can support in a steady state. DesiredUserSessionCapacity = ActualUserSessionCapacity + PendingUserSessionCapacity This only applies to multi-session fleets.
        AvailableUserSessions:
          $ref: "#/components/schemas/Integer"
          description: The number of idle session slots currently available for user sessions. AvailableUserSessionCapacity = ActualUserSessionCapacity - ActiveUserSessions This only applies to multi-session fleets.
        ActiveUserSessions:
          $ref: "#/components/schemas/Integer"
          description: The number of user sessions currently being used for streaming sessions. This only applies to multi-session fleets.
        ActualUserSessions:
          $ref: "#/components/schemas/Integer"
          description: The total number of session slots that are available for streaming or are currently streaming. ActualUserSessionCapacity = AvailableUserSessionCapacity + ActiveUserSessions This only applies to multi-session fleets.
        Draining:
          $ref: "#/components/schemas/Integer"
          description: The number of instances in drain mode. This only applies to multi-session fleets.
        DrainModeActiveUserSessions:
          $ref: "#/components/schemas/Integer"
          description: The number of active user sessions on instances in drain mode. This only applies to multi-session fleets.
        DrainModeUnusedUserSessions:
          $ref: "#/components/schemas/Integer"
          description: The number of unused session slots on instances in drain mode that cannot be used for user session provisioning. This only applies to multi-session fleets.
      required:
        - Desired
    FleetState:
      type: string
      enum:
        - STARTING
        - RUNNING
        - STOPPING
        - STOPPED
