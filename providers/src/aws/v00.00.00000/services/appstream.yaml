  /CreateImportedImage:
    post:
      operationId: CreateImportedImage
      description: Creates a custom WorkSpaces Applications image by importing an EC2 AMI. This allows you to use your own customized AMI to create WorkSpaces Applications images that support additional instance types beyond the standard stream.* instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CreateImportedImage
            default: PhotonAdminProxyService.CreateImportedImage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A unique name for the imported image. The name must be between 1 and 100 characters and can contain letters, numbers, underscores, periods, and hyphens.
                SourceAmiId:
                  $ref: "#/components/schemas/PhotonAmiId"
                  description: The ID of the EC2 AMI to import. The AMI must meet specific requirements including Windows Server 2022 Full Base, UEFI boot mode, TPM 2.0 support, and proper drivers.
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the IAM role that allows WorkSpaces Applications to access your AMI. The role must have permissions to modify image attributes and describe images, with a trust relationship allowing appstream.amazonaws.com to assume the role.
                Description:
                  $ref: "#/components/schemas/ImageImportDescription"
                  description: An optional description for the imported image. The description must match approved regex patterns and can be up to 256 characters.
                DisplayName:
                  $ref: "#/components/schemas/ImageImportDisplayName"
                  description: An optional display name for the imported image. The display name must match approved regex patterns and can be up to 100 characters.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to apply to the imported image. Tags help you organize and manage your WorkSpaces Applications resources.
                RuntimeValidationConfig:
                  $ref: "#/components/schemas/RuntimeValidationConfig"
                  description: Configuration for runtime validation of the imported image. When specified, WorkSpaces Applications provisions an instance to test streaming functionality, which helps ensure the image is suitable for use.
                AgentSoftwareVersion:
                  $ref: "#/components/schemas/AgentSoftwareVersion"
                  description: The version of the WorkSpaces Applications agent to use for the imported image. Choose CURRENT_LATEST to use the agent version available at the time of import, or ALWAYS_LATEST to automatically update to the latest agent version when new versions are released.
                AppCatalogConfig:
                  $ref: "#/components/schemas/AppCatalogConfig"
                  description: Configuration for the application catalog of the imported image. This allows you to specify applications available for streaming, including their paths, icons, and launch parameters. This field contains sensitive data.
                DryRun:
                  $ref: "#/components/schemas/Boolean"
                  description: When set to true, performs validation checks without actually creating the imported image. Use this to verify your configuration before executing the actual import operation.
              required:
                - SourceAmiId
                - IamRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateImportedImageResult"
