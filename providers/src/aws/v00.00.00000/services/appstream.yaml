openapi: 3.0.0
info:
  version: "2016-12-01"
  title: Amazon AppStream
  description: Amazon AppStream
  x-serviceName: appstream
  x-serviceAlias: appstream
  x-protocol: json
  x-apiVersion: "2016-12-01"
  x-endpointPrefix: appstream2
  x-targetPrefix: PhotonAdminProxyService
  x-jsonVersion: "1.1"
servers:
  - url: https://appstream2.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for appstream
paths:
  /AssociateAppBlockBuilderAppBlock:
    post:
      operationId: AssociateAppBlockBuilderAppBlock
      description: Associates the specified app block builder with the specified app block.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.AssociateAppBlockBuilderAppBlock
            default: PhotonAdminProxyService.AssociateAppBlockBuilderAppBlock
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AppBlockArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the app block.
                AppBlockBuilderName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the app block builder.
              required:
                - AppBlockArn
                - AppBlockBuilderName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAppBlockBuilderAppBlockResult"
  /AssociateApplicationFleet:
    post:
      operationId: AssociateApplicationFleet
      description: Associates the specified application with the specified fleet. This is only supported for Elastic fleets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.AssociateApplicationFleet
            default: PhotonAdminProxyService.AssociateApplicationFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the fleet.
                ApplicationArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the application.
              required:
                - FleetName
                - ApplicationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateApplicationFleetResult"
  /AssociateApplicationToEntitlement:
    post:
      operationId: AssociateApplicationToEntitlement
      description: Associates an application to entitle.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.AssociateApplicationToEntitlement
            default: PhotonAdminProxyService.AssociateApplicationToEntitlement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StackName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the stack.
                EntitlementName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the entitlement.
                ApplicationIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The identifier of the application.
              required:
                - StackName
                - EntitlementName
                - ApplicationIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateApplicationToEntitlementResult"
  /AssociateFleet:
    post:
      operationId: AssociateFleet
      description: Associates the specified fleet with the specified stack.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.AssociateFleet
            default: PhotonAdminProxyService.AssociateFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FleetName:
                  $ref: "#/components/schemas/String"
                  description: The name of the fleet.
                StackName:
                  $ref: "#/components/schemas/String"
                  description: The name of the stack.
              required:
                - FleetName
                - StackName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateFleetResult"
  /AssociateSoftwareToImageBuilder:
    post:
      operationId: AssociateSoftwareToImageBuilder
      description: Associates license included application(s) with an existing image builder instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.AssociateSoftwareToImageBuilder
            default: PhotonAdminProxyService.AssociateSoftwareToImageBuilder
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ImageBuilderName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the target image builder instance.
                SoftwareNames:
                  $ref: "#/components/schemas/StringList"
                  description: "The list of license included applications to associate with the image builder. Possible values include the following: Microsoft_Office_2021_LTSC_Professional_Plus_32Bit Microsoft_Office_2021_LTSC_Professional_Plus_64Bit Microsoft_Office_2024_LTSC_Professional_Plus_32Bit Microsoft_Office_2024_LTSC_Professional_Plus_64Bit Microsoft_Visio_2021_LTSC_Professional_32Bit Microsoft_Visio_2021_LTSC_Professional_64Bit Microsoft_Visio_2024_LTSC_Professional_32Bit Microsoft_Visio_2024_LTSC_Professional_64Bit Microsoft_Project_2021_Professional_32Bit Microsoft_Project_2021_Professional_64Bit Microsoft_Project_2024_Professional_32Bit Microsoft_Project_2024_Professional_64Bit Microsoft_Office_2021_LTSC_Standard_32Bit Microsoft_Office_2021_LTSC_Standard_64Bit Microsoft_Office_2024_LTSC_Standard_32Bit Microsoft_Office_2024_LTSC_Standard_64Bit Microsoft_Visio_2021_LTSC_Standard_32Bit Microsoft_Visio_2021_LTSC_Standard_64Bit Microsoft_Visio_2024_LTSC_Standard_32Bit Microsoft_Visio_2024_LTSC_Standard_64Bit Microsoft_Project_2021_Standard_32Bit Microsoft_Project_2021_Standard_64Bit Microsoft_Project_2024_Standard_32Bit Microsoft_Project_2024_Standard_64Bit"
              required:
                - ImageBuilderName
                - SoftwareNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateSoftwareToImageBuilderResult"
  /BatchAssociateUserStack:
    post:
      operationId: BatchAssociateUserStack
      description: Associates the specified users with the specified stacks. Users in a user pool cannot be assigned to stacks with fleets that are joined to an Active Directory domain.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.BatchAssociateUserStack
            default: PhotonAdminProxyService.BatchAssociateUserStack
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserStackAssociations:
                  $ref: "#/components/schemas/UserStackAssociationList"
                  description: The list of UserStackAssociation objects.
              required:
                - UserStackAssociations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateUserStackResult"
  /BatchDisassociateUserStack:
    post:
      operationId: BatchDisassociateUserStack
      description: Disassociates the specified users from the specified stacks.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.BatchDisassociateUserStack
            default: PhotonAdminProxyService.BatchDisassociateUserStack
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserStackAssociations:
                  $ref: "#/components/schemas/UserStackAssociationList"
                  description: The list of UserStackAssociation objects.
              required:
                - UserStackAssociations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateUserStackResult"
  /CopyImage:
    post:
      operationId: CopyImage
      description: Copies the image within the same region or to a new region within the same AWS account. Note that any tags you added to the image will not be copied.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CopyImage
            default: PhotonAdminProxyService.CopyImage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SourceImageName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the image to copy.
                DestinationImageName:
                  $ref: "#/components/schemas/Name"
                  description: The name that the image will have when it is copied to the destination.
                DestinationRegion:
                  $ref: "#/components/schemas/RegionName"
                  description: The destination region to which the image will be copied. This parameter is required, even if you are copying an image within the same region.
                DestinationImageDescription:
                  $ref: "#/components/schemas/Description"
                  description: The description that the image will have when it is copied to the destination.
              required:
                - SourceImageName
                - DestinationImageName
                - DestinationRegion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyImageResponse"
  /CreateAppBlock:
    post:
      operationId: CreateAppBlock
      description: Creates an app block. App blocks are a WorkSpaces Applications resource that stores the details about the virtual hard disk in an S3 bucket. It also stores the setup script with details about how to mount the virtual hard disk. The virtual hard disk includes the application binaries and other files necessary to launch your applications. Multiple applications can be assigned to a single app block. This is only supported for Elastic fleets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CreateAppBlock
            default: PhotonAdminProxyService.CreateAppBlock
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the app block.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: The description of the app block.
                DisplayName:
                  $ref: "#/components/schemas/DisplayName"
                  description: The display name of the app block. This is not displayed to the user.
                SourceS3Location:
                  $ref: "#/components/schemas/S3Location"
                  description: The source S3 location of the app block.
                SetupScriptDetails:
                  $ref: "#/components/schemas/ScriptDetails"
                  description: The setup script details of the app block. This must be provided for the CUSTOM PackagingType.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags assigned to the app block.
                PostSetupScriptDetails:
                  $ref: "#/components/schemas/ScriptDetails"
                  description: The post setup script details of the app block. This can only be provided for the APPSTREAM2 PackagingType.
                PackagingType:
                  $ref: "#/components/schemas/PackagingType"
                  description: The packaging type of the app block.
              required:
                - Name
                - SourceS3Location
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppBlockResult"
  /CreateAppBlockBuilder:
    post:
      operationId: CreateAppBlockBuilder
      description: Creates an app block builder.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CreateAppBlockBuilder
            default: PhotonAdminProxyService.CreateAppBlockBuilder
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The unique name for the app block builder.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: The description of the app block builder.
                DisplayName:
                  $ref: "#/components/schemas/DisplayName"
                  description: The display name of the app block builder.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "The tags to associate with the app block builder. A tag is a key-value pair, and the value is optional. For example, Environment=Test. If you do not specify a value, Environment=. If you do not specify a value, the value is set to an empty string. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following special characters: _ . : / = + \\ - @ For more information, see Tagging Your Resources in the Amazon WorkSpaces Applications Administration Guide."
                Platform:
                  $ref: "#/components/schemas/AppBlockBuilderPlatformType"
                  description: The platform of the app block builder. WINDOWS_SERVER_2019 is the only valid value.
                InstanceType:
                  $ref: "#/components/schemas/String"
                  description: "The instance type to use when launching the app block builder. The following instance types are available: stream.standard.small stream.standard.medium stream.standard.large stream.standard.xlarge stream.standard.2xlarge"
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: The VPC configuration for the app block builder. App block builders require that you specify at least two subnets in different availability zones.
                EnableDefaultInternetAccess:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Enables or disables default internet access for the app block builder.
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the IAM role to apply to the app block builder. To assume a role, the app block builder calls the AWS Security Token Service (STS) AssumeRole API operation and passes the ARN of the role to use. The operation creates a new session with temporary credentials. WorkSpaces Applications retrieves the temporary credentials and creates the appstream_machine_role credential profile on the instance. For more information, see Using an IAM Role to Grant Permissions to Applications and Scripts Running on WorkSpaces Applications Streaming Instances in the Amazon WorkSpaces Applications Administration Guide.
                AccessEndpoints:
                  $ref: "#/components/schemas/AccessEndpointList"
                  description: The list of interface VPC endpoint (interface endpoint) objects. Administrators can connect to the app block builder only through the specified endpoints.
                DisableIMDSV1:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Set to true to disable Instance Metadata Service Version 1 (IMDSv1) and enforce IMDSv2. Set to false to enable both IMDSv1 and IMDSv2.
              required:
                - Name
                - Platform
                - InstanceType
                - VpcConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppBlockBuilderResult"
  /CreateAppBlockBuilderStreamingURL:
    post:
      operationId: CreateAppBlockBuilderStreamingURL
      description: Creates a URL to start a create app block builder streaming session.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CreateAppBlockBuilderStreamingURL
            default: PhotonAdminProxyService.CreateAppBlockBuilderStreamingURL
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AppBlockBuilderName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the app block builder.
                Validity:
                  $ref: "#/components/schemas/Long"
                  description: The time that the streaming URL will be valid, in seconds. Specify a value between 1 and 604800 seconds. The default is 3600 seconds.
              required:
                - AppBlockBuilderName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppBlockBuilderStreamingURLResult"
  /CreateApplication:
    post:
      operationId: CreateApplication
      description: Creates an application. Applications are a WorkSpaces Applications resource that stores the details about how to launch applications on Elastic fleet streaming instances. An application consists of the launch details, icon, and display name. Applications are associated with an app block that contains the application binaries and other files. The applications assigned to an Elastic fleet are the applications users can launch. This is only supported for Elastic fleets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CreateApplication
            default: PhotonAdminProxyService.CreateApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the application. This name is visible to users when display name is not specified.
                DisplayName:
                  $ref: "#/components/schemas/DisplayName"
                  description: The display name of the application. This name is visible to users in the application catalog.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: The description of the application.
                IconS3Location:
                  $ref: "#/components/schemas/S3Location"
                  description: The location in S3 of the application icon.
                LaunchPath:
                  $ref: "#/components/schemas/String"
                  description: The launch path of the application.
                WorkingDirectory:
                  $ref: "#/components/schemas/String"
                  description: The working directory of the application.
                LaunchParameters:
                  $ref: "#/components/schemas/String"
                  description: The launch parameters of the application.
                Platforms:
                  $ref: "#/components/schemas/Platforms"
                  description: The platforms the application supports. WINDOWS_SERVER_2019, AMAZON_LINUX2 and UBUNTU_PRO_2404 are supported for Elastic fleets.
                InstanceFamilies:
                  $ref: "#/components/schemas/StringList"
                  description: The instance families the application supports. Valid values are GENERAL_PURPOSE and GRAPHICS_G4.
                AppBlockArn:
                  $ref: "#/components/schemas/Arn"
                  description: The app block ARN to which the application should be associated
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags assigned to the application.
              required:
                - Name
                - IconS3Location
                - LaunchPath
                - Platforms
                - InstanceFamilies
                - AppBlockArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResult"
  /CreateDirectoryConfig:
    post:
      operationId: CreateDirectoryConfig
      description: Creates a Directory Config object in WorkSpaces Applications. This object includes the configuration information required to join fleets and image builders to Microsoft Active Directory domains.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CreateDirectoryConfig
            default: PhotonAdminProxyService.CreateDirectoryConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryName:
                  $ref: "#/components/schemas/DirectoryName"
                  description: The fully qualified name of the directory (for example, corp.example.com).
                OrganizationalUnitDistinguishedNames:
                  $ref: "#/components/schemas/OrganizationalUnitDistinguishedNamesList"
                  description: The distinguished names of the organizational units for computer accounts.
                ServiceAccountCredentials:
                  $ref: "#/components/schemas/ServiceAccountCredentials"
                  description: The credentials for the service account used by the fleet or image builder to connect to the directory.
                CertificateBasedAuthProperties:
                  $ref: "#/components/schemas/CertificateBasedAuthProperties"
                  description: The certificate-based authentication properties used to authenticate SAML 2.0 Identity Provider (IdP) user identities to Active Directory domain-joined streaming instances. Fallback is turned on by default when certificate-based authentication is Enabled . Fallback allows users to log in using their AD domain password if certificate-based authentication is unsuccessful, or to unlock a desktop lock screen. Enabled_no_directory_login_fallback enables certificate-based authentication, but does not allow users to log in using their AD domain password. Users will be disconnected to re-authenticate using certificates.
              required:
                - DirectoryName
                - OrganizationalUnitDistinguishedNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDirectoryConfigResult"
  /CreateEntitlement:
    post:
      operationId: CreateEntitlement
      description: Creates a new entitlement. Entitlements control access to specific applications within a stack, based on user attributes. Entitlements apply to SAML 2.0 federated user identities. WorkSpaces Applications user pool and streaming URL users are entitled to all applications in a stack. Entitlements don't apply to the desktop stream view application, or to applications managed by a dynamic app provider using the Dynamic Application Framework.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CreateEntitlement
            default: PhotonAdminProxyService.CreateEntitlement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the entitlement.
                StackName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the stack with which the entitlement is associated.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: The description of the entitlement.
                AppVisibility:
                  $ref: "#/components/schemas/AppVisibility"
                  description: Specifies whether all or selected apps are entitled.
                Attributes:
                  $ref: "#/components/schemas/EntitlementAttributeList"
                  description: The attributes of the entitlement.
              required:
                - Name
                - StackName
                - AppVisibility
                - Attributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEntitlementResult"
  /CreateExportImageTask:
    post:
      operationId: CreateExportImageTask
      description: Creates a task to export a WorkSpaces Applications image to an EC2 AMI. This allows you to use your customized WorkSpaces Applications images with other AWS services or for backup purposes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CreateExportImageTask
            default: PhotonAdminProxyService.CreateExportImageTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ImageName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the WorkSpaces Applications image to export. The image must be in an available state and owned by your account.
                AmiName:
                  $ref: "#/components/schemas/AmiName"
                  description: The name for the exported EC2 AMI. This is a required field that must be unique within your account and region.
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the IAM role that allows WorkSpaces Applications to create the AMI. The role must have permissions to copy images, describe images, and create tags, with a trust relationship allowing appstream.amazonaws.com to assume the role.
                TagSpecifications:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to apply to the exported AMI. These tags help you organize and manage your EC2 AMIs.
                AmiDescription:
                  $ref: "#/components/schemas/Description"
                  description: An optional description for the exported AMI. This description will be applied to the resulting EC2 AMI.
              required:
                - ImageName
                - AmiName
                - IamRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateExportImageTaskResult"
  /CreateFleet:
    post:
      operationId: CreateFleet
      description: Creates a fleet. A fleet consists of streaming instances that your users access for their applications and desktops.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.CreateFleet
            default: PhotonAdminProxyService.CreateFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A unique name for the fleet.
                ImageName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the image used to create the fleet.
                ImageArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the public, private, or shared image to use.
                InstanceType:
                  $ref: "#/components/schemas/String"
                  description: "The instance type to use when launching fleet instances. The following instance types are available: stream.standard.small stream.standard.medium stream.standard.large stream.standard.xlarge stream.standard.2xlarge stream.compute.large stream.compute.xlarge stream.compute.2xlarge stream.compute.4xlarge stream.compute.8xlarge stream.memory.large stream.memory.xlarge stream.memory.2xlarge stream.memory.4xlarge stream.memory.8xlarge stream.memory.z1d.large stream.memory.z1d.xlarge stream.memory.z1d.2xlarge stream.memory.z1d.3xlarge stream.memory.z1d.6xlarge stream.memory.z1d.12xlarge stream.graphics.g4dn.xlarge stream.graphics.g4dn.2xlarge stream.graphics.g4dn.4xlarge stream.graphics.g4dn.8xlarge stream.graphics.g4dn.12xlarge stream.graphics.g4dn.16xlarge stream.graphics.g5.xlarge stream.graphics.g5.2xlarge stream.graphics.g5.4xlarge stream.graphics.g5.8xlarge stream.graphics.g5.12xlarge stream.graphics.g5.16xlarge stream.graphics.g5.24xlarge stream.graphics.g6.xlarge stream.graphics.g6.2xlarge stream.graphics.g6.4xlarge stream.graphics.g6.8xlarge stream.graphics.g6.16xlarge stream.graphics.g6.12xlarge stream.graphics.g6.24xlarge stream.graphics.gr6.4xlarge stream.graphics.gr6.8xlarge stream.graphics.g6f.large stream.graphics.g6f.xlarge stream.graphics.g6f.2xlarge stream.graphics.g6f.4xlarge stream.graphics.gr6f.4xlarge The following instance types are available for Elastic fleets: stream.standard.small stream.standard.medium stream.standard.large stream.standard.xlarge stream.standard.2xlarge"
                FleetType:
                  $ref: "#/components/schemas/FleetType"
                  description: The fleet type. ALWAYS_ON Provides users with instant-on access to their apps. You are charged for all running instances in your fleet, even if no users are streaming apps. ON_DEMAND Provide users with access to applications after they connect, which takes one to two minutes. You are charged for instance streaming when users are connected and a small hourly fee for instances that are not streaming apps.
                ComputeCapacity:
                  $ref: "#/components/schemas/ComputeCapacity"
                  description: The desired capacity for the fleet. This is not allowed for Elastic fleets. For Elastic fleets, specify MaxConcurrentSessions instead.
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: The VPC configuration for the fleet. This is required for Elastic fleets, but not required for other fleet types. Elastic fleets require that you specify at least two subnets in different availability zones.
                MaxUserDurationInSeconds:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum amount of time that a streaming session can remain active, in seconds. If users are still connected to a streaming instance five minutes before this limit is reached, they are prompted to save any open documents before being disconnected. After this time elapses, the instance is terminated and replaced by a new instance. Specify a value between 600 and 432000.
                DisconnectTimeoutInSeconds:
                  $ref: "#/components/schemas/Integer"
                  description: The amount of time that a streaming session remains active after users disconnect. If users try to reconnect to the streaming session after a disconnection or network interruption within this time interval, they are connected to their previous session. Otherwise, they are connected to a new session with a new streaming instance. Specify a value between 60 and 36000.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: The description to display.
                DisplayName:
                  $ref: "#/components/schemas/DisplayName"
                  description: The fleet name to display.
                EnableDefaultInternetAccess:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Enables or disables default internet access for the fleet.
                DomainJoinInfo:
                  $ref: "#/components/schemas/DomainJoinInfo"
                  description: The name of the directory and organizational unit (OU) to use to join the fleet to a Microsoft Active Directory domain. This is not allowed for Elastic fleets.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "The tags to associate with the fleet. A tag is a key-value pair, and the value is optional. For example, Environment=Test. If you do not specify a value, Environment=. If you do not specify a value, the value is set to an empty string. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following special characters: _ . : / = + \\ - @ For more information, see Tagging Your Resources in the Amazon WorkSpaces Applications Administration Guide."
                IdleDisconnectTimeoutInSeconds:
                  $ref: "#/components/schemas/Integer"
                  description: The amount of time that users can be idle (inactive) before they are disconnected from their streaming session and the DisconnectTimeoutInSeconds time interval begins. Users are notified before they are disconnected due to inactivity. If they try to reconnect to the streaming session before the time interval specified in DisconnectTimeoutInSeconds elapses, they are connected to their previous session. Users are considered idle when they stop providing keyboard or mouse input during their streaming session. File uploads and downloads, audio in, audio out, and pixels changing do not qualify as user activity. If users continue to be idle after the time interval in IdleDisconnectTimeoutInSeconds elapses, they are disconnected. To prevent users from being disconnected due to inactivity, specify a value of 0. Otherwise, specify a value between 60 and 36000. The default value is 0. If you enable this feature, we recommend that you specify a value that corresponds exactly to a whole number of minutes (for example, 60, 120, and 180). If you don't do this, the value is rounded to the nearest minute. For example, if you specify a value of 70, users are disconnected after 1 minute of inactivity. If you specify a value that is at the midpoint between two different minutes, the value is rounded up. For example, if you specify a value of 90, users are disconnected after 2 minutes of inactivity.
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the IAM role to apply to the fleet. To assume a role, a fleet instance calls the AWS Security Token Service (STS) AssumeRole API operation and passes the ARN of the role to use. The operation creates a new session with temporary credentials. WorkSpaces Applications retrieves the temporary credentials and creates the appstream_machine_role credential profile on the instance. For more information, see Using an IAM Role to Grant Permissions to Applications and Scripts Running on WorkSpaces Applications Streaming Instances in the Amazon WorkSpaces Applications Administration Guide.
                StreamView:
                  $ref: "#/components/schemas/StreamView"
                  description: The WorkSpaces Applications view that is displayed to your users when they stream from the fleet. When APP is specified, only the windows of applications opened by users display. When DESKTOP is specified, the standard desktop that is provided by the operating system displays. The default value is APP.
                Platform:
                  $ref: "#/components/schemas/PlatformType"
                  description: The fleet platform. WINDOWS_SERVER_2019, AMAZON_LINUX2 and UBUNTU_PRO_2404 are supported for Elastic fleets.
                MaxConcurrentSessions:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum concurrent sessions of the Elastic fleet. This is required for Elastic fleets, and not allowed for other fleet types.
                UsbDeviceFilterStrings:
                  $ref: "#/components/schemas/UsbDeviceFilterStrings"
                  description: The USB device filter strings that specify which USB devices a user can redirect to the fleet streaming session, when using the Windows native client. This is allowed but not required for Elastic fleets.
                SessionScriptS3Location:
                  $ref: "#/components/schemas/S3Location"
                  description: The S3 location of the session scripts configuration zip file. This only applies to Elastic fleets.
                MaxSessionsPerInstance:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum number of user sessions on an instance. This only applies to multi-session fleets.
                RootVolumeConfig:
                  $ref: "#/components/schemas/VolumeConfig"
                  description: The configuration for the root volume of fleet instances. Use this to customize storage capacity from 200 GB up to 500 GB based on your application requirements.
                DisableIMDSV1:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Set to true to disable Instance Metadata Service Version 1 (IMDSv1) and enforce IMDSv2. Set to false to enable both IMDSv1 and IMDSv2. Before disabling IMDSv1, ensure your WorkSpaces Applications images are running the agent version or managed image update released on or after January 16, 2024 to support IMDSv2 enforcement.
              required:
                - InstanceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFleetResult"
