          description: The state change reason message.
    ImageBuilderStateChangeReasonCode:
      type: string
      enum:
        - INTERNAL_ERROR
        - IMAGE_UNAVAILABLE
    NetworkAccessConfiguration:
      description: Describes the network details of the fleet or image builder instance.
      type: object
      properties:
        EniPrivateIpAddress:
          $ref: "#/components/schemas/String"
          description: The private IP address of the elastic network interface that is attached to instances in your VPC.
        EniIpv6Addresses:
          $ref: "#/components/schemas/StringList"
          description: The IPv6 addresses assigned to the elastic network interface. This field supports IPv6 connectivity for WorkSpaces Applications instances.
        EniId:
          $ref: "#/components/schemas/String"
          description: The resource identifier of the elastic network interface that is attached to instances in your VPC. All network interfaces have the eni-xxxxxxxx resource identifier.
    LatestAppstreamAgentVersion:
      type: string
      enum:
        - "TRUE"
        - "FALSE"
    CreateImageBuilderStreamingURLResult:
      type: object
      properties:
        StreamingURL:
          $ref: "#/components/schemas/String"
          description: The URL to start the WorkSpaces Applications streaming session.
        Expires:
          $ref: "#/components/schemas/Timestamp"
          description: The elapsed time, in seconds after the Unix epoch, when this URL expires.
    ImageImportDescription:
      type: string
      maxLength: 256
      pattern: ^[a-zA-Z0-9_.() -]+$
    ImageImportDisplayName:
      type: string
      maxLength: 100
      pattern: ^[a-zA-Z0-9_.() -]+$
    RuntimeValidationConfig:
      description: Configuration for runtime validation of imported images. This structure specifies the instance type to use for testing the imported image's streaming capabilities.
      type: object
      properties:
        IntendedInstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The instance type to use for runtime validation testing. It's recommended to use the same instance type you plan to use for your fleet to ensure accurate validation results.
    InstanceType:
      type: string
      pattern: ^[a-zA-Z0-9-]+(\.[a-z0-9-]+)+\.(small|medium|large|xlarge|\d+xlarge|metal)$
    AgentSoftwareVersion:
      description: The image type is the type of AppStream image resource.
      type: string
      enum:
        - CURRENT_LATEST
        - ALWAYS_LATEST
    AppCatalogConfig:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationConfig"
    ApplicationConfig:
      description: Configuration for an application in the imported image's application catalog. This structure defines how applications appear and launch for users.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/AppName"
          description: The name of the application. This is a required field that must be unique within the application catalog and between 1-100 characters, matching the pattern ^[a-zA-Z0-9][a-zA-Z0-9_.-]{0,99}$.
        DisplayName:
          $ref: "#/components/schemas/AppDisplayName"
          description: The display name shown to users for this application. This field is optional and can be 0-100 characters, matching the pattern ^[a-zA-Z0-9][a-zA-Z0-9_. -]{0,99}$.
        AbsoluteAppPath:
          $ref: "#/components/schemas/FilePath"
          description: The absolute path to the executable file that launches the application. This is a required field that can be 1-32767 characters to support Windows extended file paths. Use escaped file path strings like "C:\\\\Windows\\\\System32\\\\notepad.exe".
        AbsoluteIconPath:
          $ref: "#/components/schemas/FilePath"
          description: The absolute path to the icon file for the application. This field is optional and can be 1-32767 characters. If not provided, the icon is derived from the executable. Use PNG images with proper transparency for the best user experience.
        AbsoluteManifestPath:
          $ref: "#/components/schemas/FilePath"
          description: The absolute path to the prewarm manifest file for this application. This field is optional and only applicable when using application-specific manifests. The path can be 1-32767 characters and should point to a text file containing file paths to prewarm.
        WorkingDirectory:
          $ref: "#/components/schemas/FilePath"
          description: The working directory to use when launching the application. This field is optional and can be 0-32767 characters. Use escaped file path strings like "C:\\\\Path\\\\To\\\\Working\\\\Directory".
        LaunchParameters:
          $ref: "#/components/schemas/LaunchParameters"
          description: The launch parameters to pass to the application executable. This field is optional and can be 0-1024 characters. Use escaped strings with the full list of required parameters, such as PowerShell script paths or command-line arguments.
      required:
        - Name
        - AbsoluteAppPath
    AppName:
      type: string
      maxLength: 100
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9_.-]{0,99}$
    AppDisplayName:
      type: string
      maxLength: 100
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9_. -]{0,99}$
    FilePath:
      type: string
      maxLength: 32767
    LaunchParameters:
      type: string
      maxLength: 1024
      pattern: "[^\\x00]+"
    CreateImportedImageResult:
      type: object
      properties:
        Image:
          $ref: "#/components/schemas/Image"
    Image:
      description: Describes an image.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the image.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the image.
        BaseImageArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the image from which this image was created.
        DisplayName:
          $ref: "#/components/schemas/String"
          description: The image name to display.
        State:
          $ref: "#/components/schemas/ImageState"
          description: The image starts in the PENDING state. If image creation succeeds, the state is AVAILABLE. If image creation fails, the state is FAILED.
        Visibility:
          $ref: "#/components/schemas/VisibilityType"
          description: Indicates whether the image is public or private.
        ImageBuilderSupported:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether an image builder can be launched from this image.
        ImageBuilderName:
          $ref: "#/components/schemas/String"
          description: The name of the image builder that was used to create the private image. If the image is shared, copied, or updated by using Managed Image Updates, this value is null.
        Platform:
          $ref: "#/components/schemas/PlatformType"
          description: The operating system platform of the image.
        Description:
          $ref: "#/components/schemas/String"
          description: The description to display.
        StateChangeReason:
          $ref: "#/components/schemas/ImageStateChangeReason"
          description: The reason why the last state change occurred.
        Applications:
          $ref: "#/components/schemas/Applications"
          description: The applications associated with the image.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the image was created.
        PublicBaseImageReleasedDate:
          $ref: "#/components/schemas/Timestamp"
          description: The release date of the public base image. For private images, this date is the release date of the base image from which the image was created.
        AppstreamAgentVersion:
          $ref: "#/components/schemas/AppstreamAgentVersion"
          description: The version of the WorkSpaces Applications agent to use for instances that are launched from this image.
        ImagePermissions:
          $ref: "#/components/schemas/ImagePermissions"
          description: The permissions to provide to the destination AWS account for the specified image.
        ImageErrors:
          $ref: "#/components/schemas/ResourceErrors"
          description: Describes the errors that are returned when a new image can't be created.
        LatestAppstreamAgentVersion:
          $ref: "#/components/schemas/LatestAppstreamAgentVersion"
          description: Indicates whether the image is using the latest WorkSpaces Applications agent version or not.
        SupportedInstanceFamilies:
          $ref: "#/components/schemas/StringList"
          description: "The supported instances families that determine which image a customer can use when the customer launches a fleet or image builder. The following instances families are supported: General Purpose Compute Optimized Memory Optimized Graphics G4 Graphics G5 Graphics G6"
        DynamicAppProvidersEnabled:
          $ref: "#/components/schemas/DynamicAppProvidersEnabled"
          description: Indicates whether dynamic app providers are enabled within an WorkSpaces Applications image or not.
        ImageSharedWithOthers:
          $ref: "#/components/schemas/ImageSharedWithOthers"
          description: Indicates whether the image is shared with another account ID.
        ManagedSoftwareIncluded:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the image includes license-included applications.
        ImageType:
          $ref: "#/components/schemas/ImageType"
          description: The type of the image. Images created through AMI import have type "custom", while WorkSpaces Applications provided images have type "native". Custom images support additional instance types including GeneralPurpose, MemoryOptimized, ComputeOptimized, and Accelerated instance families.
      required:
        - Name
    ImageState:
      type: string
      enum:
        - PENDING
        - AVAILABLE
        - FAILED
        - COPYING
        - DELETING
        - CREATING
        - IMPORTING
        - VALIDATING
    VisibilityType:
      type: string
      enum:
        - PUBLIC
        - PRIVATE
        - SHARED
    ImageStateChangeReason:
      description: Describes the reason why the last image state change occurred.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/ImageStateChangeReasonCode"
          description: The state change reason code.
        Message:
          $ref: "#/components/schemas/String"
          description: The state change reason message.
    ImageStateChangeReasonCode:
      type: string
      enum:
        - INTERNAL_ERROR
        - IMAGE_BUILDER_NOT_AVAILABLE
        - IMAGE_COPY_FAILURE
        - IMAGE_UPDATE_FAILURE
        - IMAGE_IMPORT_FAILURE
    Applications:
      type: array
      items:
        $ref: "#/components/schemas/Application"
    ImagePermissions:
      description: Describes the permissions for an image.
      type: object
      properties:
        allowFleet:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether the image can be used for a fleet.
        allowImageBuilder:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether the image can be used for an image builder.
    DynamicAppProvidersEnabled:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ImageSharedWithOthers:
      type: string
      enum:
        - "TRUE"
        - "FALSE"
    ImageType:
      description: The image type is the type of AppStream image resource.
      type: string
      enum:
        - CUSTOM
        - NATIVE
    StorageConnectorList:
      description: The storage connectors.
      type: array
      items:
        $ref: "#/components/schemas/StorageConnector"
    StorageConnector:
      description: Describes a connector that enables persistent storage for users.
      type: object
      properties:
        ConnectorType:
          $ref: "#/components/schemas/StorageConnectorType"
          description: The type of storage connector.
        ResourceIdentifier:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: The ARN of the storage connector.
        Domains:
          $ref: "#/components/schemas/DomainList"
          description: The names of the domains for the account.
        DomainsRequireAdminConsent:
          $ref: "#/components/schemas/DomainList"
          description: The OneDrive for Business domains where you require admin consent when users try to link their OneDrive account to WorkSpaces Applications. The attribute can only be specified when ConnectorType=ONE_DRIVE.
      required:
        - ConnectorType
    StorageConnectorType:
      description: The type of storage connector.
      type: string
      enum:
        - HOMEFOLDERS
        - GOOGLE_DRIVE
        - ONE_DRIVE
    ResourceIdentifier:
      description: The ARN of the resource.
      type: string
      minLength: 1
      maxLength: 2048
    DomainList:
      type: array
      items:
        $ref: "#/components/schemas/Domain"
    Domain:
      description: GSuite domain for GDrive integration.
      type: string
      minLength: 1
      maxLength: 64
    RedirectURL:
      type: string
      maxLength: 1000
    FeedbackURL:
      type: string
      maxLength: 1000
    UserSettingList:
      type: array
      items:
        $ref: "#/components/schemas/UserSetting"
    UserSetting:
      description: Describes an action and whether the action is enabled or disabled for users during their streaming sessions.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: The action that is enabled or disabled.
        Permission:
          $ref: "#/components/schemas/Permission"
          description: Indicates whether the action is enabled or disabled.
        MaximumLength:
          $ref: "#/components/schemas/Integer"
          description: Specifies the number of characters that can be copied by end users from the local device to the remote session, and to the local device from the remote session. This can be specified only for the CLIPBOARD_COPY_FROM_LOCAL_DEVICE and CLIPBOARD_COPY_TO_LOCAL_DEVICE actions. This defaults to 20,971,520 (20 MB) when unspecified and the permission is ENABLED. This can't be specified when the permission is DISABLED. The value can be between 1 and 20,971,520 (20 MB).
      required:
        - Action
        - Permission
    Action:
      type: string
      enum:
        - CLIPBOARD_COPY_FROM_LOCAL_DEVICE
        - CLIPBOARD_COPY_TO_LOCAL_DEVICE
        - FILE_UPLOAD
        - FILE_DOWNLOAD
        - PRINTING_TO_LOCAL_DEVICE
        - DOMAIN_PASSWORD_SIGNIN
        - DOMAIN_SMART_CARD_SIGNIN
        - AUTO_TIME_ZONE_REDIRECTION
    Permission:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ApplicationSettings:
      description: The persistent application settings for users of a stack.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Enables or disables persistent application settings for users during their streaming sessions.
        SettingsGroup:
          $ref: "#/components/schemas/SettingsGroup"
          description: The path prefix for the S3 bucket where users’ persistent application settings are stored. You can allow the same persistent application settings to be used across multiple stacks by specifying the same settings group for each stack.
      required:
        - Enabled
    SettingsGroup:
      type: string
      maxLength: 100
    EmbedHostDomains:
      type: array
      items:
        $ref: "#/components/schemas/EmbedHostDomain"
    EmbedHostDomain:
      description: 'Specifies a valid domain that can embed AppStream. Valid examples include: ["testorigin.tt--com", "testingorigin.com.us", "test.com.us"] Invalid examples include: ["test,com", ".com", "h*llo.com". ""]'
      type: string
      maxLength: 128
      pattern: (?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z0-9][a-z0-9-]{0,61}[a-z0-9]
    StreamingExperienceSettings:
      description: The streaming protocol you want your stack to prefer. This can be UDP or TCP. Currently, UDP is only supported in the Windows native client.
      type: object
      properties:
        PreferredProtocol:
          $ref: "#/components/schemas/PreferredProtocol"
          description: The preferred protocol that you want to use while streaming your application.
    PreferredProtocol:
      type: string
      enum:
        - TCP
        - UDP
    ContentRedirection:
      description: Configuration for bidirectional URL redirection between the streaming session and the local client. Use HostToClient to redirect URLs from the remote desktop to the local browser.
      type: object
      properties:
        HostToClient:
          $ref: "#/components/schemas/UrlRedirectionConfig"
          description: Configuration for redirecting URLs from the remote desktop to the local client browser.
    UrlRedirectionConfig:
      description: Configuration for URL redirection in a specific direction (host-to-client or client-to-host). When enabled, URLs matching the allowed or denied patterns are redirected accordingly. The denied list takes precedence over the allowed list.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Whether URL redirection is enabled for this direction.
        AllowedUrls:
          $ref: "#/components/schemas/UrlPatternList"
          description: List of URL patterns that are allowed to be redirected. URLs matching these patterns will be redirected unless they also match a pattern in the denied list.
        DeniedUrls:
          $ref: "#/components/schemas/UrlPatternList"
          description: List of URL patterns that are denied from redirection. This list takes precedence over the allowed list.
      required:
        - Enabled
    UrlPatternList:
      type: array
      items:
        $ref: "#/components/schemas/UrlPattern"
    UrlPattern:
      description: "A glob pattern using wildcards (* for zero or more characters, ? for exactly one character) to match URLs for redirection rules. Patterns do not include a protocol prefix; HTTPS is enforced automatically. Valid examples: *, *.example.com, github.com/myorg/*, api?.example.com Invalid examples: https://example.com (no protocol), empty string"
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(\*|https?://[^\s,;]+)$
    AgentAccessConfig:
      description: The configuration for agent access on a stack. Agent access enables AI agents to interact with desktop applications during streaming sessions.
      type: object
      properties:
        Settings:
          $ref: "#/components/schemas/AgentAccessSettingList"
          description: The list of agent access settings that define permissions for each agent action. You must specify at least one setting.
        S3BucketArn:
          $ref: "#/components/schemas/S3BucketArn"
          description: The Amazon Resource Name (ARN) of the Amazon S3 bucket where agent screenshots are stored. Required when ScreenshotsUploadEnabled is true.
        ScreenshotsUploadEnabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether screenshot uploads to Amazon S3 are enabled for agent sessions.
        ScreenResolution:
          $ref: "#/components/schemas/ScreenResolution"
          description: The screen resolution for the agent streaming environment.
        ScreenImageFormat:
          $ref: "#/components/schemas/ScreenImageFormat"
          description: The image format for agent screen captures.
      required:
        - Settings
        - ScreenResolution
        - ScreenImageFormat
    AgentAccessSettingList:
      description: A list of AgentAccessSetting objects.
      type: array
      items:
        $ref: "#/components/schemas/AgentAccessSetting"
    AgentAccessSetting:
      description: A permission setting for an agent action. Each setting specifies an agent action and whether it is enabled or disabled.
      type: object
      properties:
        AgentAction:
          $ref: "#/components/schemas/AgentAction"
          description: The agent action to configure. Valid values are COMPUTER_VISION and COMPUTER_INPUT. If you enable COMPUTER_INPUT, you must also enable COMPUTER_VISION.
        Permission:
          $ref: "#/components/schemas/Permission"
          description: Whether the agent action is enabled or disabled.
      required:
        - AgentAction
        - Permission
    AgentAction:
      description: The type of agent action. COMPUTER_VISION - Allows agents to take screenshots of the desktop. COMPUTER_INPUT - Allows agents to click, type, and scroll on the desktop. Requires COMPUTER_VISION to also be enabled.
      type: string
      enum:
        - COMPUTER_VISION
        - COMPUTER_INPUT
    S3BucketArn:
      type: string
      pattern: ^arn:aws(?:\-cn|\-iso\-b|\-iso|\-us\-gov)?:s3:::[a-z0-9][a-z0-9.\-]{1,61}[a-z0-9]$
    ScreenResolution:
      description: The screen resolution for the agent streaming environment. W_1280xH_720 - 1280 x 720 pixels.
      type: string
      enum:
        - W_1280xH_720
    ScreenImageFormat:
      description: The image format for agent screen captures. PNG - PNG format. JPEG - JPEG format.
      type: string
      enum:
        - PNG
        - JPEG
