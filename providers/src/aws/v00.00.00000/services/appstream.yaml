        - REBOOTING
        - SNAPSHOTTING
        - DELETING
        - FAILED
        - UPDATING
        - PENDING_QUALIFICATION
        - PENDING_SYNCING_APPS
        - SYNCING_APPS
        - PENDING_IMAGE_IMPORT
    ImageBuilderStateChangeReason:
