    Entitlement:
      description: Specifies an entitlement. Entitlements control access to specific applications within a stack, based on user attributes. Entitlements apply to SAML 2.0 federated user identities. WorkSpaces Applications user pool and streaming URL users are entitled to all applications in a stack. Entitlements don't apply to the desktop stream view application, or to applications managed by a dynamic app provider using the Dynamic Application Framework.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the entitlement.
        StackName:
          $ref: "#/components/schemas/Name"
          description: The name of the stack with which the entitlement is associated.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the entitlement.
        AppVisibility:
          $ref: "#/components/schemas/AppVisibility"
          description: Specifies whether all or selected apps are entitled.
        Attributes:
          $ref: "#/components/schemas/EntitlementAttributeList"
          description: The attributes of the entitlement.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the entitlement was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the entitlement was last modified.
      required:
