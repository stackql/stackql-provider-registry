  /UpdateFleet:
    post:
      operationId: UpdateFleet
      description: "Updates the specified fleet. If the fleet is in the STOPPED state, you can update any attribute except the fleet name. If the fleet is in the RUNNING state, you can update the following based on the fleet type: Always-On and On-Demand fleet types You can update the DisplayName, ComputeCapacity, ImageARN, ImageName, IdleDisconnectTimeoutInSeconds, and DisconnectTimeoutInSeconds attributes. Elastic fleet type You can update the DisplayName, IdleDisconnectTimeoutInSeconds, DisconnectTimeoutInSeconds, MaxConcurrentSessions, SessionScriptS3Location and UsbDeviceFilterStrings attributes. If the fleet is in the STARTING or STOPPED state, you can't update it."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.UpdateFleet
            default: PhotonAdminProxyService.UpdateFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ImageName:
                  $ref: "#/components/schemas/String"
                  description: The name of the image used to create the fleet.
                ImageArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the public, private, or shared image to use.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A unique name for the fleet.
                InstanceType:
                  $ref: "#/components/schemas/String"
                  description: "The instance type to use when launching fleet instances. The following instance types are available: stream.standard.small stream.standard.medium stream.standard.large stream.standard.xlarge stream.standard.2xlarge stream.compute.large stream.compute.xlarge stream.compute.2xlarge stream.compute.4xlarge stream.compute.8xlarge stream.memory.large stream.memory.xlarge stream.memory.2xlarge stream.memory.4xlarge stream.memory.8xlarge stream.memory.z1d.large stream.memory.z1d.xlarge stream.memory.z1d.2xlarge stream.memory.z1d.3xlarge stream.memory.z1d.6xlarge stream.memory.z1d.12xlarge stream.graphics.g4dn.xlarge stream.graphics.g4dn.2xlarge stream.graphics.g4dn.4xlarge stream.graphics.g4dn.8xlarge stream.graphics.g4dn.12xlarge stream.graphics.g4dn.16xlarge stream.graphics.g5.xlarge stream.graphics.g5.2xlarge stream.graphics.g5.4xlarge stream.graphics.g5.8xlarge stream.graphics.g5.16xlarge stream.graphics.g5.12xlarge stream.graphics.g5.24xlarge stream.graphics.g6.xlarge stream.graphics.g6.2xlarge stream.graphics.g6.4xlarge stream.graphics.g6.8xlarge stream.graphics.g6.16xlarge stream.graphics.g6.12xlarge stream.graphics.g6.24xlarge stream.graphics.gr6.4xlarge stream.graphics.gr6.8xlarge stream.graphics.g6f.large stream.graphics.g6f.xlarge stream.graphics.g6f.2xlarge stream.graphics.g6f.4xlarge stream.graphics.gr6f.4xlarge The following instance types are available for Elastic fleets: stream.standard.small stream.standard.medium stream.standard.large stream.standard.xlarge stream.standard.2xlarge"
                ComputeCapacity:
                  $ref: "#/components/schemas/ComputeCapacity"
                  description: The desired capacity for the fleet. This is not allowed for Elastic fleets.
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: The VPC configuration for the fleet. This is required for Elastic fleets, but not required for other fleet types. Elastic fleets require that you specify at least two subnets in different availability zones.
                MaxUserDurationInSeconds:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum amount of time that a streaming session can remain active, in seconds. If users are still connected to a streaming instance five minutes before this limit is reached, they are prompted to save any open documents before being disconnected. After this time elapses, the instance is terminated and replaced by a new instance. Specify a value between 600 and 432000.
                DisconnectTimeoutInSeconds:
                  $ref: "#/components/schemas/Integer"
                  description: The amount of time that a streaming session remains active after users disconnect. If users try to reconnect to the streaming session after a disconnection or network interruption within this time interval, they are connected to their previous session. Otherwise, they are connected to a new session with a new streaming instance. Specify a value between 60 and 36000.
                DeleteVpcConfig:
                  $ref: "#/components/schemas/Boolean"
                  description: Deletes the VPC association for the specified fleet.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: The description to display.
                DisplayName:
                  $ref: "#/components/schemas/DisplayName"
                  description: The fleet name to display.
                EnableDefaultInternetAccess:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Enables or disables default internet access for the fleet.
                DomainJoinInfo:
                  $ref: "#/components/schemas/DomainJoinInfo"
                  description: The name of the directory and organizational unit (OU) to use to join the fleet to a Microsoft Active Directory domain.
                IdleDisconnectTimeoutInSeconds:
                  $ref: "#/components/schemas/Integer"
                  description: The amount of time that users can be idle (inactive) before they are disconnected from their streaming session and the DisconnectTimeoutInSeconds time interval begins. Users are notified before they are disconnected due to inactivity. If users try to reconnect to the streaming session before the time interval specified in DisconnectTimeoutInSeconds elapses, they are connected to their previous session. Users are considered idle when they stop providing keyboard or mouse input during their streaming session. File uploads and downloads, audio in, audio out, and pixels changing do not qualify as user activity. If users continue to be idle after the time interval in IdleDisconnectTimeoutInSeconds elapses, they are disconnected. To prevent users from being disconnected due to inactivity, specify a value of 0. Otherwise, specify a value between 60 and 36000. The default value is 0. If you enable this feature, we recommend that you specify a value that corresponds exactly to a whole number of minutes (for example, 60, 120, and 180). If you don't do this, the value is rounded to the nearest minute. For example, if you specify a value of 70, users are disconnected after 1 minute of inactivity. If you specify a value that is at the midpoint between two different minutes, the value is rounded up. For example, if you specify a value of 90, users are disconnected after 2 minutes of inactivity.
                AttributesToDelete:
                  $ref: "#/components/schemas/FleetAttributes"
                  description: The fleet attributes to delete.
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the IAM role to apply to the fleet. To assume a role, a fleet instance calls the AWS Security Token Service (STS) AssumeRole API operation and passes the ARN of the role to use. The operation creates a new session with temporary credentials. WorkSpaces Applications retrieves the temporary credentials and creates the appstream_machine_role credential profile on the instance. For more information, see Using an IAM Role to Grant Permissions to Applications and Scripts Running on WorkSpaces Applications Streaming Instances in the Amazon WorkSpaces Applications Administration Guide.
                StreamView:
                  $ref: "#/components/schemas/StreamView"
                  description: The WorkSpaces Applications view that is displayed to your users when they stream from the fleet. When APP is specified, only the windows of applications opened by users display. When DESKTOP is specified, the standard desktop that is provided by the operating system displays. The default value is APP.
                Platform:
                  $ref: "#/components/schemas/PlatformType"
                  description: The platform of the fleet. WINDOWS_SERVER_2019, AMAZON_LINUX2 and UBUNTU_PRO_2404 are supported for Elastic fleets.
                MaxConcurrentSessions:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum number of concurrent sessions for a fleet.
                UsbDeviceFilterStrings:
                  $ref: "#/components/schemas/UsbDeviceFilterStrings"
                  description: The USB device filter strings that specify which USB devices a user can redirect to the fleet streaming session, when using the Windows native client. This is allowed but not required for Elastic fleets.
                SessionScriptS3Location:
                  $ref: "#/components/schemas/S3Location"
                  description: The S3 location of the session scripts configuration zip file. This only applies to Elastic fleets.
                MaxSessionsPerInstance:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum number of user sessions on an instance. This only applies to multi-session fleets.
                RootVolumeConfig:
                  $ref: "#/components/schemas/VolumeConfig"
                  description: The updated configuration for the root volume of fleet instances. Note that volume size cannot be decreased below the image volume size.
                DisableIMDSV1:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Set to true to disable Instance Metadata Service Version 1 (IMDSv1) and enforce IMDSv2. Set to false to enable both IMDSv1 and IMDSv2. Before disabling IMDSv1, ensure your WorkSpaces Applications images are running the agent version or managed image update released on or after January 16, 2024 to support IMDSv2 enforcement.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFleetResult"
  /UpdateImagePermissions:
    post:
      operationId: UpdateImagePermissions
      description: Adds or updates permissions for the specified private image.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.UpdateImagePermissions
            default: PhotonAdminProxyService.UpdateImagePermissions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the private image.
                SharedAccountId:
                  $ref: "#/components/schemas/AwsAccountId"
                  description: The 12-digit identifier of the AWS account for which you want add or update image permissions.
                ImagePermissions:
                  $ref: "#/components/schemas/ImagePermissions"
                  description: The permissions for the image.
              required:
                - SharedAccountId
                - ImagePermissions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateImagePermissionsResult"
  /UpdateStack:
    post:
      operationId: UpdateStack
      description: Updates the specified fields for the specified stack.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.UpdateStack
            default: PhotonAdminProxyService.UpdateStack
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DisplayName:
                  $ref: "#/components/schemas/DisplayName"
                  description: The stack name to display.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: The description to display.
                Name:
                  $ref: "#/components/schemas/String"
                  description: The name of the stack.
                StorageConnectors:
                  $ref: "#/components/schemas/StorageConnectorList"
                  description: The storage connectors to enable.
                DeleteStorageConnectors:
                  $ref: "#/components/schemas/Boolean"
                  description: Deletes the storage connectors currently enabled for the stack.
                RedirectURL:
                  $ref: "#/components/schemas/RedirectURL"
                  description: The URL that users are redirected to after their streaming session ends.
                FeedbackURL:
                  $ref: "#/components/schemas/FeedbackURL"
                  description: The URL that users are redirected to after they choose the Send Feedback link. If no URL is specified, no Send Feedback link is displayed.
                AttributesToDelete:
                  $ref: "#/components/schemas/StackAttributes"
                  description: The stack attributes to delete.
                UserSettings:
                  $ref: "#/components/schemas/UserSettingList"
                  description: The actions that are enabled or disabled for users during their streaming sessions. By default, these actions are enabled.
                ApplicationSettings:
                  $ref: "#/components/schemas/ApplicationSettings"
                  description: The persistent application settings for users of a stack. When these settings are enabled, changes that users make to applications and Windows settings are automatically saved after each session and applied to the next session.
                AccessEndpoints:
                  $ref: "#/components/schemas/AccessEndpointList"
                  description: The list of interface VPC endpoint (interface endpoint) objects. Users of the stack can connect to WorkSpaces Applications only through the specified endpoints.
                EmbedHostDomains:
                  $ref: "#/components/schemas/EmbedHostDomains"
                  description: The domains where WorkSpaces Applications streaming sessions can be embedded in an iframe. You must approve the domains that you want to host embedded WorkSpaces Applications streaming sessions.
                StreamingExperienceSettings:
                  $ref: "#/components/schemas/StreamingExperienceSettings"
                  description: The streaming protocol you want your stack to prefer. This can be UDP or TCP. Currently, UDP is only supported in the Windows native client.
                ContentRedirection:
                  $ref: "#/components/schemas/ContentRedirection"
                AgentAccessConfig:
                  $ref: "#/components/schemas/AgentAccessConfigForUpdate"
                  description: The configuration for agent access on the stack. Specify this to update agent access settings. To remove agent access, use AttributesToDelete with the AGENT_ACCESS_CONFIG value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStackResult"
  /UpdateThemeForStack:
    post:
      operationId: UpdateThemeForStack
      description: Updates custom branding that customizes the appearance of the streaming application catalog page.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PhotonAdminProxyService.UpdateThemeForStack
            default: PhotonAdminProxyService.UpdateThemeForStack
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StackName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the stack for the theme.
                FooterLinks:
                  $ref: "#/components/schemas/ThemeFooterLinks"
                  description: The links that are displayed in the footer of the streaming application catalog page. These links are helpful resources for users, such as the organization's IT support and product marketing sites.
                TitleText:
                  $ref: "#/components/schemas/ThemeTitleText"
                  description: The title that is displayed at the top of the browser tab during users' application streaming sessions.
                ThemeStyling:
                  $ref: "#/components/schemas/ThemeStyling"
                  description: The color theme that is applied to website links, text, and buttons. These colors are also applied as accents in the background for the streaming application catalog page.
                OrganizationLogoS3Location:
                  $ref: "#/components/schemas/S3Location"
                  description: The organization logo that appears on the streaming application catalog page.
                FaviconS3Location:
                  $ref: "#/components/schemas/S3Location"
                  description: The S3 location of the favicon. The favicon enables users to recognize their application streaming site in a browser full of tabs or bookmarks. It is displayed at the top of the browser tab for the application streaming site during users' streaming sessions.
                State:
                  $ref: "#/components/schemas/ThemeState"
                  description: Specifies whether custom branding should be applied to catalog page or not.
                AttributesToDelete:
                  $ref: "#/components/schemas/ThemeAttributes"
                  description: The attributes to delete.
              required:
                - StackName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateThemeForStackResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Arn:
      type: string
      pattern: ^arn:aws(?:\-cn|\-iso\-b|\-iso|\-us\-gov)?:[A-Za-z0-9][A-Za-z0-9_/.-]{0,62}:[A-Za-z0-9_/.-]{0,63}:[A-Za-z0-9_/.-]{0,63}:[A-Za-z0-9][A-Za-z0-9:_/+=,@.\\-]{0,1023}$
    Name:
      type: string
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9_.-]{0,100}$
    AssociateAppBlockBuilderAppBlockResult:
      type: object
      properties:
        AppBlockBuilderAppBlockAssociation:
          $ref: "#/components/schemas/AppBlockBuilderAppBlockAssociation"
          description: The list of app block builders associated with app blocks.
    AppBlockBuilderAppBlockAssociation:
      description: Describes an association between an app block builder and app block.
      type: object
      properties:
        AppBlockArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the app block.
        AppBlockBuilderName:
          $ref: "#/components/schemas/Name"
          description: The name of the app block builder.
      required:
        - AppBlockArn
        - AppBlockBuilderName
    AssociateApplicationFleetResult:
      type: object
      properties:
        ApplicationFleetAssociation:
          $ref: "#/components/schemas/ApplicationFleetAssociation"
          description: If fleet name is specified, this returns the list of applications that are associated to it. If application ARN is specified, this returns the list of fleets to which it is associated.
    ApplicationFleetAssociation:
      description: Describes the application fleet association.
      type: object
      properties:
        FleetName:
          $ref: "#/components/schemas/String"
          description: The name of the fleet associated with the application.
        ApplicationArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the application associated with the fleet.
      required:
        - FleetName
        - ApplicationArn
    String:
      type: string
      minLength: 1
    AssociateApplicationToEntitlementResult:
      type: object
    AssociateFleetResult:
      type: object
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    AssociateSoftwareToImageBuilderResult:
      type: object
    UserStackAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/UserStackAssociation"
    UserStackAssociation:
      description: Describes a user in the user pool and the associated stack.
      type: object
      properties:
        StackName:
          $ref: "#/components/schemas/String"
          description: The name of the stack that is associated with the user.
        UserName:
          $ref: "#/components/schemas/Username"
          description: The email address of the user who is associated with the stack. Users' email addresses are case-sensitive.
        AuthenticationType:
          $ref: "#/components/schemas/AuthenticationType"
          description: The authentication type for the user.
        SendEmailNotification:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether a welcome email is sent to a user after the user is created in the user pool.
      required:
        - StackName
        - UserName
        - AuthenticationType
    Username:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
    AuthenticationType:
      type: string
      enum:
        - API
        - SAML
        - USERPOOL
        - AWS_AD
    Boolean:
      type: boolean
    BatchAssociateUserStackResult:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/UserStackAssociationErrorList"
          description: The list of UserStackAssociationError objects.
    UserStackAssociationErrorList:
      type: array
      items:
        $ref: "#/components/schemas/UserStackAssociationError"
    UserStackAssociationError:
      description: Describes the error that is returned when a user can’t be associated with or disassociated from a stack.
      type: object
      properties:
        UserStackAssociation:
          $ref: "#/components/schemas/UserStackAssociation"
          description: Information about the user and associated stack.
        ErrorCode:
          $ref: "#/components/schemas/UserStackAssociationErrorCode"
          description: The error code for the error that is returned when a user can’t be associated with or disassociated from a stack.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: The error message for the error that is returned when a user can’t be associated with or disassociated from a stack.
    UserStackAssociationErrorCode:
      type: string
      enum:
        - STACK_NOT_FOUND
        - USER_NAME_NOT_FOUND
        - DIRECTORY_NOT_FOUND
        - INTERNAL_ERROR
    BatchDisassociateUserStackResult:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/UserStackAssociationErrorList"
          description: The list of UserStackAssociationError objects.
    RegionName:
      type: string
      minLength: 1
      maxLength: 32
    Description:
      type: string
      maxLength: 256
    CopyImageResponse:
      type: object
      properties:
        DestinationImageName:
          $ref: "#/components/schemas/Name"
          description: The name of the destination image.
    DisplayName:
      type: string
      maxLength: 100
    S3Location:
      description: Describes the S3 location.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The S3 bucket of the S3 object.
        S3Key:
          $ref: "#/components/schemas/S3Key"
          description: "The S3 key of the S3 object. This is required when used for the following: IconS3Location (Actions: CreateApplication and UpdateApplication) SessionScriptS3Location (Actions: CreateFleet and UpdateFleet) ScriptDetails (Actions: CreateAppBlock) SourceS3Location when creating an app block with CUSTOM PackagingType (Actions: CreateAppBlock) SourceS3Location when creating an app block with APPSTREAM2 PackagingType, and using an existing application package (VHD file). In this case, S3Key refers to the VHD file. If a new application package is required, then S3Key is not required. (Actions: CreateAppBlock)"
      required:
        - S3Bucket
    S3Bucket:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[0-9a-z\.\-]*(?<!\.)$
    S3Key:
      type: string
      minLength: 1
      maxLength: 1024
    ScriptDetails:
      description: Describes the details of the script.
      type: object
      properties:
        ScriptS3Location:
          $ref: "#/components/schemas/S3Location"
          description: The S3 object location for the script.
        ExecutablePath:
          $ref: "#/components/schemas/String"
          description: The run path for the script.
        ExecutableParameters:
          $ref: "#/components/schemas/String"
          description: The runtime parameters passed to the run path for the script.
        TimeoutInSeconds:
          $ref: "#/components/schemas/Integer"
          description: The run timeout, in seconds, for the script.
      required:
        - ScriptS3Location
        - ExecutablePath
        - TimeoutInSeconds
    Integer:
      type: integer
    Tags:
      type: object
      properties: {}
    PackagingType:
      type: string
      enum:
        - CUSTOM
        - APPSTREAM2
    CreateAppBlockResult:
      type: object
      properties:
        AppBlock:
          $ref: "#/components/schemas/AppBlock"
          description: The app block.
    AppBlock:
      description: Describes an app block. App blocks are a WorkSpaces Applications resource that stores the details about the virtual hard disk in an S3 bucket. It also stores the setup script with details about how to mount the virtual hard disk. The virtual hard disk includes the application binaries and other files necessary to launch your applications. Multiple applications can be assigned to a single app block. This is only supported for Elastic fleets.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the app block.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the app block.
        Description:
          $ref: "#/components/schemas/String"
          description: The description of the app block.
        DisplayName:
          $ref: "#/components/schemas/String"
          description: The display name of the app block.
        SourceS3Location:
          $ref: "#/components/schemas/S3Location"
          description: The source S3 location of the app block.
        SetupScriptDetails:
          $ref: "#/components/schemas/ScriptDetails"
          description: The setup script details of the app block. This only applies to app blocks with PackagingType CUSTOM.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The created time of the app block.
        PostSetupScriptDetails:
          $ref: "#/components/schemas/ScriptDetails"
          description: The post setup script details of the app block. This only applies to app blocks with PackagingType APPSTREAM2.
        PackagingType:
          $ref: "#/components/schemas/PackagingType"
          description: The packaging type of the app block.
        State:
          $ref: "#/components/schemas/AppBlockState"
          description: The state of the app block. An app block with WorkSpaces Applications packaging will be in the INACTIVE state if no application package (VHD) is assigned to it. After an application package (VHD) is created by an app block builder for an app block, it becomes ACTIVE. Custom app blocks are always in the ACTIVE state and no action is required to use them.
        AppBlockErrors:
          $ref: "#/components/schemas/ErrorDetailsList"
          description: The errors of the app block.
      required:
        - Name
        - Arn
    Timestamp:
      type: string
      format: date-time
    AppBlockState:
      type: string
      enum:
        - INACTIVE
        - ACTIVE
    ErrorDetailsList:
      type: array
      items:
        $ref: "#/components/schemas/ErrorDetails"
    ErrorDetails:
      description: The error details.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/String"
          description: The error code.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: The error message.
    AppBlockBuilderPlatformType:
      type: string
      enum:
        - WINDOWS_SERVER_2019
    VpcConfig:
      description: Describes VPC configuration information for fleets and image builders.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/SubnetIdList"
          description: The identifiers of the subnets to which a network interface is attached from the fleet instance or image builder instance. Fleet instances use one or more subnets. Image builder instances use one subnet.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: The identifiers of the security groups for the fleet or image builder.
    SubnetIdList:
      description: The subnet identifiers.
      type: array
      items:
        $ref: "#/components/schemas/String"
    SecurityGroupIdList:
      description: The security group identifiers.
      type: array
      items:
        $ref: "#/components/schemas/String"
    BooleanObject:
      type: boolean
    AccessEndpointList:
      type: array
      items:
        $ref: "#/components/schemas/AccessEndpoint"
    AccessEndpoint:
      description: Describes an interface VPC endpoint (interface endpoint) that lets you create a private connection between the virtual private cloud (VPC) that you specify and WorkSpaces Applications. When you specify an interface endpoint for a stack, users of the stack can connect to WorkSpaces Applications only through that endpoint. When you specify an interface endpoint for an image builder, administrators can connect to the image builder only through that endpoint.
      type: object
      properties:
        EndpointType:
          $ref: "#/components/schemas/AccessEndpointType"
          description: The type of interface endpoint.
        VpceId:
          $ref: "#/components/schemas/String"
          description: The identifier (ID) of the VPC in which the interface endpoint is used.
      required:
        - EndpointType
    AccessEndpointType:
      type: string
      enum:
        - STREAMING
    CreateAppBlockBuilderResult:
      type: object
      properties:
        AppBlockBuilder:
          $ref: "#/components/schemas/AppBlockBuilder"
    AppBlockBuilder:
      description: Describes an app block builder.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the app block builder.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the app block builder.
        DisplayName:
          $ref: "#/components/schemas/String"
          description: The display name of the app block builder.
        Description:
          $ref: "#/components/schemas/String"
          description: The description of the app block builder.
        Platform:
          $ref: "#/components/schemas/AppBlockBuilderPlatformType"
          description: The platform of the app block builder. WINDOWS_SERVER_2019 is the only valid value.
        InstanceType:
          $ref: "#/components/schemas/String"
          description: The instance type of the app block builder.
        EnableDefaultInternetAccess:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether default internet access is enabled for the app block builder.
        IamRoleArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the IAM role that is applied to the app block builder.
        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The VPC configuration for the app block builder.
        State:
          $ref: "#/components/schemas/AppBlockBuilderState"
          description: The state of the app block builder.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation time of the app block builder.
        AppBlockBuilderErrors:
          $ref: "#/components/schemas/ResourceErrors"
          description: The app block builder errors.
        StateChangeReason:
          $ref: "#/components/schemas/AppBlockBuilderStateChangeReason"
          description: The state change reason.
        AccessEndpoints:
          $ref: "#/components/schemas/AccessEndpointList"
          description: The list of interface VPC endpoint (interface endpoint) objects. Administrators can connect to the app block builder only through the specified endpoints.
        DisableIMDSV1:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether Instance Metadata Service Version 1 (IMDSv1) is disabled for the app block builder.
      required:
        - Arn
        - Name
        - Platform
        - InstanceType
        - VpcConfig
        - State
    AppBlockBuilderState:
      type: string
      enum:
        - STARTING
        - RUNNING
        - STOPPING
        - STOPPED
    ResourceErrors:
      type: array
      items:
        $ref: "#/components/schemas/ResourceError"
    ResourceError:
      description: Describes a resource error.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/FleetErrorCode"
          description: The error code.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: The error message.
        ErrorTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time the error occurred.
    FleetErrorCode:
      type: string
      enum:
        - IAM_SERVICE_ROLE_MISSING_ENI_DESCRIBE_ACTION
        - IAM_SERVICE_ROLE_MISSING_ENI_CREATE_ACTION
        - IAM_SERVICE_ROLE_MISSING_ENI_DELETE_ACTION
        - NETWORK_INTERFACE_LIMIT_EXCEEDED
        - INTERNAL_SERVICE_ERROR
        - IAM_SERVICE_ROLE_IS_MISSING
        - MACHINE_ROLE_IS_MISSING
        - STS_DISABLED_IN_REGION
        - SUBNET_HAS_INSUFFICIENT_IP_ADDRESSES
        - IAM_SERVICE_ROLE_MISSING_DESCRIBE_SUBNET_ACTION
        - SUBNET_NOT_FOUND
        - IMAGE_NOT_FOUND
        - INVALID_SUBNET_CONFIGURATION
        - SECURITY_GROUPS_NOT_FOUND
        - IGW_NOT_ATTACHED
        - IAM_SERVICE_ROLE_MISSING_DESCRIBE_SECURITY_GROUPS_ACTION
        - FLEET_STOPPED
        - FLEET_INSTANCE_PROVISIONING_FAILURE
        - DOMAIN_JOIN_ERROR_FILE_NOT_FOUND
        - DOMAIN_JOIN_ERROR_ACCESS_DENIED
        - DOMAIN_JOIN_ERROR_LOGON_FAILURE
        - DOMAIN_JOIN_ERROR_INVALID_PARAMETER
        - DOMAIN_JOIN_ERROR_MORE_DATA
        - DOMAIN_JOIN_ERROR_NO_SUCH_DOMAIN
        - DOMAIN_JOIN_ERROR_NOT_SUPPORTED
        - DOMAIN_JOIN_NERR_INVALID_WORKGROUP_NAME
        - DOMAIN_JOIN_NERR_WORKSTATION_NOT_STARTED
