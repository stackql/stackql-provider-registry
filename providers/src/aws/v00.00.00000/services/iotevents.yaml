openapi: 3.0.0
info:
  version: "2018-07-27"
  title: AWS IoT Events
  description: AWS IoT Events
  x-serviceName: iotevents
  x-serviceAlias: iotevents
  x-protocol: rest-json
  x-apiVersion: "2018-07-27"
  x-endpointPrefix: iotevents
servers:
  - url: https://iotevents.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iotevents
paths:
  /alarm-models:
    post:
      operationId: CreateAlarmModel
      description: Creates an alarm model to monitor an AWS IoT Events input attribute. You can use the alarm to get notified when the value is outside a specified range. For more information, see Create an alarm model in the AWS IoT Events Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alarmModelName:
                  $ref: "#/components/schemas/AlarmModelName"
                alarmModelDescription:
                  $ref: "#/components/schemas/AlarmModelDescription"
                roleArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                tags:
                  $ref: "#/components/schemas/Tags"
                key:
                  $ref: "#/components/schemas/AttributeJsonPath"
                severity:
                  $ref: "#/components/schemas/Severity"
                alarmRule:
                  $ref: "#/components/schemas/AlarmRule"
                alarmNotification:
                  $ref: "#/components/schemas/AlarmNotification"
                alarmEventActions:
                  $ref: "#/components/schemas/AlarmEventActions"
                alarmCapabilities:
                  $ref: "#/components/schemas/AlarmCapabilities"
              required:
                - alarmModelName
                - roleArn
                - alarmRule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAlarmModelResponse"
    get:
      operationId: ListAlarmModels
      description: Lists the alarm models that you created. The operation returns only the metadata associated with each alarm model.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that you can use to return the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be returned per request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAlarmModelsResponse"
  /detector-models:
    post:
      operationId: CreateDetectorModel
      description: Creates a detector model.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                detectorModelName:
                  $ref: "#/components/schemas/DetectorModelName"
                detectorModelDefinition:
                  $ref: "#/components/schemas/DetectorModelDefinition"
                detectorModelDescription:
                  $ref: "#/components/schemas/DetectorModelDescription"
                key:
                  $ref: "#/components/schemas/AttributeJsonPath"
                roleArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                tags:
                  $ref: "#/components/schemas/Tags"
                evaluationMethod:
                  $ref: "#/components/schemas/EvaluationMethod"
              required:
                - detectorModelName
                - detectorModelDefinition
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDetectorModelResponse"
    get:
      operationId: ListDetectorModels
      description: Lists the detector models you have created. Only the metadata associated with each detector model is returned.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that you can use to return the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be returned per request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDetectorModelsResponse"
  /inputs:
    post:
      operationId: CreateInput
      description: Creates an input.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inputName:
                  $ref: "#/components/schemas/InputName"
                inputDescription:
                  $ref: "#/components/schemas/InputDescription"
                inputDefinition:
                  $ref: "#/components/schemas/InputDefinition"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - inputName
                - inputDefinition
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInputResponse"
    get:
      operationId: ListInputs
      description: Lists the inputs you have created.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that you can use to return the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be returned per request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInputsResponse"
  /alarm-models/{alarm_model_name}:
    delete:
      operationId: DeleteAlarmModel
      description: Deletes an alarm model. Any alarm instances that were created based on this alarm model are also deleted. This action can't be undone.
      parameters:
        - name: alarm_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAlarmModelResponse"
    get:
      operationId: DescribeAlarmModel
      description: Retrieves information about an alarm model. If you don't specify a value for the alarmModelVersion parameter, the latest version is returned.
      parameters:
        - name: alarm_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        - name: version
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AlarmModelVersion"
          description: The version of the alarm model.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAlarmModelResponse"
    post:
      operationId: UpdateAlarmModel
      description: Updates an alarm model. Any alarms that were created based on the previous version are deleted and then created again as new data arrives.
      parameters:
        - name: alarm_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alarmModelDescription:
                  $ref: "#/components/schemas/AlarmModelDescription"
                roleArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                severity:
                  $ref: "#/components/schemas/Severity"
                alarmRule:
                  $ref: "#/components/schemas/AlarmRule"
                alarmNotification:
                  $ref: "#/components/schemas/AlarmNotification"
                alarmEventActions:
                  $ref: "#/components/schemas/AlarmEventActions"
                alarmCapabilities:
                  $ref: "#/components/schemas/AlarmCapabilities"
              required:
                - roleArn
                - alarmRule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAlarmModelResponse"
  /detector-models/{detector_model_name}:
    delete:
      operationId: DeleteDetectorModel
      description: Deletes a detector model. Any active instances of the detector model are also deleted.
      parameters:
        - name: detector_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorModelName"
          description: The name of the detector model to be deleted.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDetectorModelResponse"
    get:
      operationId: DescribeDetectorModel
      description: Describes a detector model. If the version parameter is not specified, information about the latest version is returned.
      parameters:
        - name: detector_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorModelName"
          description: The name of the detector model.
        - name: version
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DetectorModelVersion"
          description: The version of the detector model.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDetectorModelResponse"
    post:
      operationId: UpdateDetectorModel
      description: Updates a detector model. Detectors (instances) spawned by the previous version are deleted and then re-created as new inputs arrive.
      parameters:
        - name: detector_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorModelName"
          description: The name of the detector model that is updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                detectorModelDefinition:
                  $ref: "#/components/schemas/DetectorModelDefinition"
                detectorModelDescription:
                  $ref: "#/components/schemas/DetectorModelDescription"
                roleArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                evaluationMethod:
                  $ref: "#/components/schemas/EvaluationMethod"
              required:
                - detectorModelDefinition
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDetectorModelResponse"
  /inputs/{input_name}:
    delete:
      operationId: DeleteInput
      description: Deletes an input.
      parameters:
        - name: input_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InputName"
          description: The name of the input to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInputResponse"
    get:
      operationId: DescribeInput
      description: Describes an input.
      parameters:
        - name: input_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InputName"
          description: The name of the input.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeInputResponse"
    put:
      operationId: UpdateInput
      description: Updates an input.
      parameters:
        - name: input_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InputName"
          description: The name of the input you want to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inputDescription:
                  $ref: "#/components/schemas/InputDescription"
                inputDefinition:
                  $ref: "#/components/schemas/InputDefinition"
              required:
                - inputDefinition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateInputResponse"
  /analysis/detector-models/{analysis_id}:
    get:
      operationId: DescribeDetectorModelAnalysis
      description: Retrieves runtime information about a detector model analysis. After AWS IoT Events starts analyzing your detector model, you have up to 24 hours to retrieve the analysis results.
      parameters:
        - name: analysis_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AnalysisId"
          description: The ID of the analysis result that you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDetectorModelAnalysisResponse"
  /logging:
    get:
      operationId: DescribeLoggingOptions
      description: Retrieves the current settings of the AWS IoT Events logging options.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeLoggingOptionsResponse"
    put:
      operationId: PutLoggingOptions
      description: Sets or updates the AWS IoT Events logging options. If you update the value of any loggingOptions field, it takes up to one minute for the change to take effect. If you change the policy attached to the role you specified in the roleArn field (for example, to correct an invalid policy), it takes up to five minutes for that change to take effect.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                loggingOptions:
                  $ref: "#/components/schemas/LoggingOptions"
              required:
                - loggingOptions
      responses:
        "200":
          description: Success
  /analysis/detector-models/{analysis_id}/results:
    get:
      operationId: GetDetectorModelAnalysisResults
      description: Retrieves one or more analysis results of the detector model. After AWS IoT Events starts analyzing your detector model, you have up to 24 hours to retrieve the analysis results.
      parameters:
        - name: analysis_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AnalysisId"
          description: The ID of the analysis result that you want to retrieve.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that you can use to return the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxAnalysisResults"
          description: The maximum number of results to be returned per request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDetectorModelAnalysisResultsResponse"
  /alarm-models/{alarm_model_name}/versions:
    get:
      operationId: ListAlarmModelVersions
      description: Lists all the versions of an alarm model. The operation returns only the metadata associated with each alarm model version.
      parameters:
        - name: alarm_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that you can use to return the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be returned per request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAlarmModelVersionsResponse"
  /detector-models/{detector_model_name}/versions:
    get:
      operationId: ListDetectorModelVersions
      description: Lists all the versions of a detector model. Only the metadata associated with each detector model version is returned.
      parameters:
        - name: detector_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorModelName"
          description: The name of the detector model whose versions are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that you can use to return the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be returned per request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDetectorModelVersionsResponse"
  /input-routings:
    post:
      operationId: ListInputRoutings
      description: Lists one or more input routings.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inputIdentifier:
                  $ref: "#/components/schemas/InputIdentifier"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - inputIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInputRoutingsResponse"
  /tags:
    get:
      operationId: ListTagsForResource
      description: Lists the tags (metadata) you have assigned to the resource.
      parameters:
        - name: resourceArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds to or modifies the tags of the given resource. Tags are metadata that can be used to manage a resource.
      parameters:
        - name: resourceArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes the given tags (metadata) from the resource.
      parameters:
        - name: resourceArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: A list of the keys of the tags to be removed from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /analysis/detector-models/:
    post:
      operationId: StartDetectorModelAnalysis
      description: Performs an analysis of your detector model. For more information, see Troubleshooting a detector model in the AWS IoT Events Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                detectorModelDefinition:
                  $ref: "#/components/schemas/DetectorModelDefinition"
              required:
                - detectorModelDefinition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDetectorModelAnalysisResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AlarmModelName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9_-]+$
    AlarmModelDescription:
      type: string
      maxLength: 1024
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 2048
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata that can be used to manage the resource.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The tag's key.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The tag's value.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    AttributeJsonPath:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^((`[\w\- ]+`)|([\w\-]+))(\.((`[\w- ]+`)|([\w\-]+)))*$
    Severity:
      type: integer
      minimum: 0
      maximum: 2147483647
    AlarmRule:
      description: Defines when your alarm is invoked.
      type: object
      properties:
        simpleRule:
          $ref: "#/components/schemas/SimpleRule"
          description: A rule that compares an input property value to a threshold value with a comparison operator.
    SimpleRule:
      description: A rule that compares an input property value to a threshold value with a comparison operator.
      type: object
      properties:
        inputProperty:
          $ref: "#/components/schemas/InputProperty"
          description: The value on the left side of the comparison operator. You can specify an AWS IoT Events input attribute as an input property.
        comparisonOperator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The comparison operator.
        threshold:
          $ref: "#/components/schemas/Threshold"
          description: The value on the right side of the comparison operator. You can enter a number or specify an AWS IoT Events input attribute.
      required:
        - inputProperty
        - comparisonOperator
        - threshold
    InputProperty:
      type: string
      minLength: 1
      maxLength: 512
    ComparisonOperator:
      type: string
      enum:
        - GREATER
        - GREATER_OR_EQUAL
        - LESS
        - LESS_OR_EQUAL
        - EQUAL
        - NOT_EQUAL
    Threshold:
      type: string
      minLength: 1
      maxLength: 512
    AlarmNotification:
      description: Contains information about one or more notification actions.
      type: object
      properties:
        notificationActions:
          $ref: "#/components/schemas/NotificationActions"
          description: Contains the notification settings of an alarm model. The settings apply to all alarms that were created based on this alarm model.
    NotificationActions:
      type: array
      items:
        $ref: "#/components/schemas/NotificationAction"
    NotificationAction:
      description: Contains the notification settings of an alarm model. The settings apply to all alarms that were created based on this alarm model.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/NotificationTargetActions"
          description: Specifies an AWS Lambda function to manage alarm notifications. You can create one or use the AWS Lambda function provided by AWS IoT Events.
        smsConfigurations:
          $ref: "#/components/schemas/SMSConfigurations"
          description: Contains the configuration information of SMS notifications.
        emailConfigurations:
          $ref: "#/components/schemas/EmailConfigurations"
          description: Contains the configuration information of email notifications.
      required:
        - action
    NotificationTargetActions:
      description: Specifies an AWS Lambda function to manage alarm notifications. You can create one or use the AWS Lambda function provided by AWS IoT Events.
      type: object
      properties:
        lambdaAction:
          $ref: "#/components/schemas/LambdaAction"
    LambdaAction:
      description: Calls a Lambda function, passing in information about the detector model instance and the event that triggered the action.
      type: object
      properties:
        functionArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the Lambda function that is executed.
        payload:
          $ref: "#/components/schemas/Payload"
          description: You can configure the action payload when you send a message to a Lambda function.
      required:
        - functionArn
    Payload:
      description: Information needed to configure the payload. By default, AWS IoT Events generates a standard payload in JSON for any action. This action payload contains all attribute-value pairs that have the information about the detector model instance and the event triggered the action. To configure the action payload, you can use contentExpression.
      type: object
      properties:
        contentExpression:
          $ref: "#/components/schemas/ContentExpression"
          description: The content of the payload. You can use a string expression that includes quoted strings ('`<string>`'), variables ($variable.`<variable-name>`), input values ($input.`<input-name>`.`<path-to-datum>`), string concatenations, and quoted strings that contain ${} as the content. The recommended maximum size of a content expression is 1 KB.
        type_:
          $ref: "#/components/schemas/PayloadType"
          description: The value of the payload type can be either STRING or JSON.
      required:
        - contentExpression
        - type_
    ContentExpression:
      type: string
      minLength: 1
    PayloadType:
      type: string
      enum:
        - STRING
        - JSON
    SMSConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/SMSConfiguration"
    SMSConfiguration:
      description: Contains the configuration information of SMS notifications.
      type: object
      properties:
        senderId:
          $ref: "#/components/schemas/SMSSenderId"
          description: The sender ID.
        additionalMessage:
          $ref: "#/components/schemas/NotificationAdditionalMessage"
          description: The message that you want to send. The message can be up to 200 characters.
        recipients:
          $ref: "#/components/schemas/RecipientDetails"
