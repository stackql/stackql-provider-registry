    AlarmActions:
      type: array
      items:
        $ref: "#/components/schemas/AlarmAction"
    AlarmAction:
      description: Specifies one of the following actions to receive notifications when the alarm state changes.
      type: object
      properties:
        sns:
          $ref: "#/components/schemas/SNSTopicPublishAction"
        iotTopicPublish:
          $ref: "#/components/schemas/IotTopicPublishAction"
        lambda:
          $ref: "#/components/schemas/LambdaAction"
        iotEvents:
          $ref: "#/components/schemas/IotEventsAction"
        sqs:
          $ref: "#/components/schemas/SqsAction"
        firehose:
          $ref: "#/components/schemas/FirehoseAction"
        dynamoDB:
          $ref: "#/components/schemas/DynamoDBAction"
        dynamoDBv2:
          $ref: "#/components/schemas/DynamoDBv2Action"
        iotSiteWise:
          $ref: "#/components/schemas/IotSiteWiseAction"
    SNSTopicPublishAction:
      description: Information required to publish the Amazon SNS message.
      type: object
      properties:
        targetArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the Amazon SNS target where the message is sent.
        payload:
          $ref: "#/components/schemas/Payload"
          description: You can configure the action payload when you send a message as an Amazon SNS push notification.
      required:
        - targetArn
    IotTopicPublishAction:
      description: Information required to publish the MQTT message through the AWS IoT message broker.
      type: object
      properties:
        mqttTopic:
          $ref: "#/components/schemas/MQTTTopic"
          description: The MQTT topic of the message. You can use a string expression that includes variables ($variable.`<variable-name>`) and input values ($input.`<input-name>`.`<path-to-datum>`) as the topic string.
        payload:
          $ref: "#/components/schemas/Payload"
          description: You can configure the action payload when you publish a message to an AWS IoT Core topic.
      required:
        - mqttTopic
    MQTTTopic:
      type: string
      minLength: 1
      maxLength: 128
    IotEventsAction:
      description: Sends an AWS IoT Events input, passing in information about the detector model instance and the event that triggered the action.
      type: object
      properties:
        inputName:
          $ref: "#/components/schemas/InputName"
          description: The name of the AWS IoT Events input where the data is sent.
        payload:
          $ref: "#/components/schemas/Payload"
          description: You can configure the action payload when you send a message to an AWS IoT Events input.
      required:
        - inputName
    InputName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
    SqsAction:
      description: Sends information about the detector model instance and the event that triggered the action to an Amazon SQS queue.
      type: object
      properties:
        queueUrl:
          $ref: "#/components/schemas/QueueUrl"
          description: The URL of the SQS queue where the data is written.
        useBase64:
          $ref: "#/components/schemas/UseBase64"
          description: Set this to TRUE if you want the data to be base-64 encoded before it is written to the queue. Otherwise, set this to FALSE.
        payload:
          $ref: "#/components/schemas/Payload"
          description: You can configure the action payload when you send a message to an Amazon SQS queue.
      required:
        - queueUrl
    QueueUrl:
      type: string
    UseBase64:
      type: boolean
    FirehoseAction:
      description: Sends information about the detector model instance and the event that triggered the action to an Amazon Kinesis Data Firehose delivery stream.
      type: object
      properties:
        deliveryStreamName:
          $ref: "#/components/schemas/DeliveryStreamName"
          description: The name of the Kinesis Data Firehose delivery stream where the data is written.
        separator:
          $ref: "#/components/schemas/FirehoseSeparator"
          description: "A character separator that is used to separate records written to the Kinesis Data Firehose delivery stream. Valid values are: '\\n' (newline), '\\t' (tab), '\\r\\n' (Windows newline), ',' (comma)."
        payload:
          $ref: "#/components/schemas/Payload"
          description: You can configure the action payload when you send a message to an Amazon Kinesis Data Firehose delivery stream.
      required:
        - deliveryStreamName
    DeliveryStreamName:
      type: string
    FirehoseSeparator:
      type: string
      pattern: ([\n\t])|(\r\n)|(,)
    DynamoDBAction:
      description: Defines an action to write to the Amazon DynamoDB table that you created. The standard action payload contains all the information about the detector model instance and the event that triggered the action. You can customize the payload. One column of the DynamoDB table receives all attribute-value pairs in the payload that you specify. You must use expressions for all parameters in DynamoDBAction. The expressions accept literals, operators, functions, references, and substitution templates. Examples For literal values, the expressions must contain single quotes. For example, the value for the hashKeyType parameter can be 'STRING'. For references, you must specify either variables or input values. For example, the value for the hashKeyField parameter can be $input.GreenhouseInput.name. For a substitution template, you must use ${}, and the template must be in single quotes. A substitution template can also contain a combination of literals, operators, functions, references, and substitution templates. In the following example, the value for the hashKeyValue parameter uses a substitution template. '${$input.GreenhouseInput.temperature * 6 / 5 + 32} in Fahrenheit' For a string concatenation, you must use +. A string concatenation can also contain a combination of literals, operators, functions, references, and substitution templates. In the following example, the value for the tableName parameter uses a string concatenation. 'GreenhouseTemperatureTable ' + $input.GreenhouseInput.date For more information, see Expressions in the AWS IoT Events Developer Guide. If the defined payload type is a string, DynamoDBAction writes non-JSON data to the DynamoDB table as binary data. The DynamoDB console displays the data as Base64-encoded text. The value for the payloadField parameter is `<payload-field>`_raw.
      type: object
      properties:
        hashKeyType:
          $ref: "#/components/schemas/DynamoKeyType"
          description: "The data type for the hash key (also called the partition key). You can specify the following values: 'STRING' - The hash key is a string. 'NUMBER' - The hash key is a number. If you don't specify hashKeyType, the default value is 'STRING'."
        hashKeyField:
          $ref: "#/components/schemas/DynamoKeyField"
          description: The name of the hash key (also called the partition key). The hashKeyField value must match the partition key of the target DynamoDB table.
        hashKeyValue:
          $ref: "#/components/schemas/DynamoKeyValue"
          description: The value of the hash key (also called the partition key).
        rangeKeyType:
          $ref: "#/components/schemas/DynamoKeyType"
          description: "The data type for the range key (also called the sort key), You can specify the following values: 'STRING' - The range key is a string. 'NUMBER' - The range key is number. If you don't specify rangeKeyField, the default value is 'STRING'."
        rangeKeyField:
          $ref: "#/components/schemas/DynamoKeyField"
          description: The name of the range key (also called the sort key). The rangeKeyField value must match the sort key of the target DynamoDB table.
        rangeKeyValue:
          $ref: "#/components/schemas/DynamoKeyValue"
          description: The value of the range key (also called the sort key).
        operation:
          $ref: "#/components/schemas/DynamoOperation"
          description: "The type of operation to perform. You can specify the following values: 'INSERT' - Insert data as a new item into the DynamoDB table. This item uses the specified hash key as a partition key. If you specified a range key, the item uses the range key as a sort key. 'UPDATE' - Update an existing item of the DynamoDB table with new data. This item's partition key must match the specified hash key. If you specified a range key, the range key must match the item's sort key. 'DELETE' - Delete an existing item of the DynamoDB table. This item's partition key must match the specified hash key. If you specified a range key, the range key must match the item's sort key. If you don't specify this parameter, AWS IoT Events triggers the 'INSERT' operation."
        payloadField:
          $ref: "#/components/schemas/DynamoKeyField"
          description: The name of the DynamoDB column that receives the action payload. If you don't specify this parameter, the name of the DynamoDB column is payload.
        tableName:
          $ref: "#/components/schemas/DynamoTableName"
          description: The name of the DynamoDB table. The tableName value must match the table name of the target DynamoDB table.
        payload:
          $ref: "#/components/schemas/Payload"
      required:
        - hashKeyField
        - hashKeyValue
        - tableName
    DynamoKeyType:
      type: string
    DynamoKeyField:
      type: string
    DynamoKeyValue:
      type: string
    DynamoOperation:
      type: string
    DynamoTableName:
      type: string
    DynamoDBv2Action:
      description: "Defines an action to write to the Amazon DynamoDB table that you created. The default action payload contains all the information about the detector model instance and the event that triggered the action. You can customize the payload. A separate column of the DynamoDB table receives one attribute-value pair in the payload that you specify. You must use expressions for all parameters in DynamoDBv2Action. The expressions accept literals, operators, functions, references, and substitution templates. Examples For literal values, the expressions must contain single quotes. For example, the value for the tableName parameter can be 'GreenhouseTemperatureTable'. For references, you must specify either variables or input values. For example, the value for the tableName parameter can be $variable.ddbtableName. For a substitution template, you must use ${}, and the template must be in single quotes. A substitution template can also contain a combination of literals, operators, functions, references, and substitution templates. In the following example, the value for the contentExpression parameter in Payload uses a substitution template. '{\\\"sensorID\\\": \\\"${$input.GreenhouseInput.sensor_id}\\\", \\\"temperature\\\": \\\"${$input.GreenhouseInput.temperature * 9 / 5 + 32}\\\"}' For a string concatenation, you must use +. A string concatenation can also contain a combination of literals, operators, functions, references, and substitution templates. In the following example, the value for the tableName parameter uses a string concatenation. 'GreenhouseTemperatureTable ' + $input.GreenhouseInput.date For more information, see Expressions in the AWS IoT Events Developer Guide. The value for the type parameter in Payload must be JSON."
      type: object
      properties:
        tableName:
          $ref: "#/components/schemas/DynamoTableName"
          description: The name of the DynamoDB table.
        payload:
          $ref: "#/components/schemas/Payload"
      required:
        - tableName
    IotSiteWiseAction:
      description: Sends information about the detector model instance and the event that triggered the action to a specified asset property in AWS IoT SiteWise. You must use expressions for all parameters in IotSiteWiseAction. The expressions accept literals, operators, functions, references, and substitutions templates. Examples For literal values, the expressions must contain single quotes. For example, the value for the propertyAlias parameter can be '/company/windfarm/3/turbine/7/temperature'. For references, you must specify either variables or input values. For example, the value for the assetId parameter can be $input.TurbineInput.assetId1. For a substitution template, you must use ${}, and the template must be in single quotes. A substitution template can also contain a combination of literals, operators, functions, references, and substitution templates. In the following example, the value for the propertyAlias parameter uses a substitution template. 'company/windfarm/${$input.TemperatureInput.sensorData.windfarmID}/turbine/ ${$input.TemperatureInput.sensorData.turbineID}/temperature' You must specify either propertyAlias or both assetId and propertyId to identify the target asset property in AWS IoT SiteWise. For more information, see Expressions in the AWS IoT Events Developer Guide.
      type: object
      properties:
        entryId:
          $ref: "#/components/schemas/AssetPropertyEntryId"
          description: A unique identifier for this entry. You can use the entry ID to track which data entry causes an error in case of failure. The default is a new unique identifier.
        assetId:
          $ref: "#/components/schemas/AssetId"
          description: The ID of the asset that has the specified property.
        propertyId:
          $ref: "#/components/schemas/AssetPropertyId"
          description: The ID of the asset property.
        propertyAlias:
          $ref: "#/components/schemas/AssetPropertyAlias"
          description: The alias of the asset property.
        propertyValue:
          $ref: "#/components/schemas/AssetPropertyValue"
          description: The value to send to the asset property. This value contains timestamp, quality, and value (TQV) information.
    AssetPropertyEntryId:
      type: string
    AssetId:
      type: string
    AssetPropertyId:
      type: string
    AssetPropertyAlias:
      type: string
    AssetPropertyValue:
      description: A structure that contains value information. For more information, see AssetPropertyValue in the AWS IoT SiteWise API Reference. You must use expressions for all parameters in AssetPropertyValue. The expressions accept literals, operators, functions, references, and substitution templates. Examples For literal values, the expressions must contain single quotes. For example, the value for the quality parameter can be 'GOOD'. For references, you must specify either variables or input values. For example, the value for the quality parameter can be $input.TemperatureInput.sensorData.quality. For more information, see Expressions in the AWS IoT Events Developer Guide.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/AssetPropertyVariant"
          description: The value to send to an asset property.
        timestamp:
          $ref: "#/components/schemas/AssetPropertyTimestamp"
          description: The timestamp associated with the asset property value. The default is the current event time.
        quality:
          $ref: "#/components/schemas/AssetPropertyQuality"
          description: The quality of the asset property value. The value must be 'GOOD', 'BAD', or 'UNCERTAIN'.
    AssetPropertyVariant:
      description: A structure that contains an asset property value. For more information, see Variant in the AWS IoT SiteWise API Reference. You must use expressions for all parameters in AssetPropertyVariant. The expressions accept literals, operators, functions, references, and substitution templates. Examples For literal values, the expressions must contain single quotes. For example, the value for the integerValue parameter can be '100'. For references, you must specify either variables or parameters. For example, the value for the booleanValue parameter can be $variable.offline. For a substitution template, you must use ${}, and the template must be in single quotes. A substitution template can also contain a combination of literals, operators, functions, references, and substitution templates. In the following example, the value for the doubleValue parameter uses a substitution template. '${$input.TemperatureInput.sensorData.temperature * 6 / 5 + 32}' For more information, see Expressions in the AWS IoT Events Developer Guide. You must specify one of the following value types, depending on the dataType of the specified asset property. For more information, see AssetProperty in the AWS IoT SiteWise API Reference.
      type: object
      properties:
        stringValue:
          $ref: "#/components/schemas/AssetPropertyStringValue"
          description: The asset property value is a string. You must use an expression, and the evaluated result should be a string.
        integerValue:
          $ref: "#/components/schemas/AssetPropertyIntegerValue"
          description: The asset property value is an integer. You must use an expression, and the evaluated result should be an integer.
        doubleValue:
          $ref: "#/components/schemas/AssetPropertyDoubleValue"
          description: The asset property value is a double. You must use an expression, and the evaluated result should be a double.
        booleanValue:
          $ref: "#/components/schemas/AssetPropertyBooleanValue"
          description: The asset property value is a Boolean value that must be 'TRUE' or 'FALSE'. You must use an expression, and the evaluated result should be a Boolean value.
    AssetPropertyStringValue:
      type: string
    AssetPropertyIntegerValue:
      type: string
    AssetPropertyDoubleValue:
      type: string
    AssetPropertyBooleanValue:
      type: string
    AssetPropertyTimestamp:
      description: A structure that contains timestamp information. For more information, see TimeInNanos in the AWS IoT SiteWise API Reference. You must use expressions for all parameters in AssetPropertyTimestamp. The expressions accept literals, operators, functions, references, and substitution templates. Examples For literal values, the expressions must contain single quotes. For example, the value for the timeInSeconds parameter can be '1586400675'. For references, you must specify either variables or input values. For example, the value for the offsetInNanos parameter can be $variable.time. For a substitution template, you must use ${}, and the template must be in single quotes. A substitution template can also contain a combination of literals, operators, functions, references, and substitution templates. In the following example, the value for the timeInSeconds parameter uses a substitution template. '${$input.TemperatureInput.sensorData.timestamp / 1000}' For more information, see Expressions in the AWS IoT Events Developer Guide.
      type: object
      properties:
        timeInSeconds:
          $ref: "#/components/schemas/AssetPropertyTimeInSeconds"
          description: The timestamp, in seconds, in the Unix epoch format. The valid range is between 1-31556889864403199.
        offsetInNanos:
          $ref: "#/components/schemas/AssetPropertyOffsetInNanos"
          description: The nanosecond offset converted from timeInSeconds. The valid range is between 0-999999999.
      required:
        - timeInSeconds
    AssetPropertyTimeInSeconds:
      type: string
    AssetPropertyOffsetInNanos:
      type: string
    AssetPropertyQuality:
      type: string
    AlarmCapabilities:
      description: Contains the configuration information of alarm state changes.
      type: object
      properties:
        initializationConfiguration:
          $ref: "#/components/schemas/InitializationConfiguration"
          description: Specifies the default alarm state. The configuration applies to all alarms that were created based on this alarm model.
        acknowledgeFlow:
          $ref: "#/components/schemas/AcknowledgeFlow"
          description: Specifies whether to get notified for alarm state changes.
    InitializationConfiguration:
      description: Specifies the default alarm state. The configuration applies to all alarms that were created based on this alarm model.
      type: object
      properties:
        disabledOnInitialization:
          $ref: "#/components/schemas/DisabledOnInitialization"
          description: The value must be TRUE or FALSE. If FALSE, all alarm instances created based on the alarm model are activated. The default value is TRUE.
      required:
        - disabledOnInitialization
    DisabledOnInitialization:
      type: boolean
    AcknowledgeFlow:
      description: Specifies whether to get notified for alarm state changes.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/AcknowledgeFlowEnabled"
          description: The value must be TRUE or FALSE. If TRUE, you receive a notification when the alarm state changes. You must choose to acknowledge the notification before the alarm state can return to NORMAL. If FALSE, you won't receive notifications. The alarm automatically changes to the NORMAL state when the input property value returns to the specified range.
      required:
        - enabled
    AcknowledgeFlowEnabled:
      type: boolean
    CreateAlarmModelResponse:
      type: object
      properties:
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the alarm model was created, in the Unix epoch format.
        alarmModelArn:
          $ref: "#/components/schemas/AlarmModelArn"
          description: The ARN of the alarm model. For more information, see Amazon Resource Names (ARNs) in the AWS General Reference.
        alarmModelVersion:
          $ref: "#/components/schemas/AlarmModelVersion"
          description: The version of the alarm model.
        lastUpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the alarm model was last updated, in the Unix epoch format.
        status:
          $ref: "#/components/schemas/AlarmModelVersionStatus"
          description: "The status of the alarm model. The status can be one of the following values: ACTIVE - The alarm model is active and it's ready to evaluate data. ACTIVATING - AWS IoT Events is activating your alarm model. Activating an alarm model can take up to a few minutes. INACTIVE - The alarm model is inactive, so it isn't ready to evaluate data. Check your alarm model information and update the alarm model. FAILED - You couldn't create or update the alarm model. Check your alarm model information and try again."
    Timestamp:
      type: string
      format: date-time
    AlarmModelArn:
      type: string
    AlarmModelVersion:
      type: string
      minLength: 1
      maxLength: 128
    AlarmModelVersionStatus:
      type: string
      enum:
        - ACTIVE
        - ACTIVATING
        - INACTIVE
        - FAILED
    DetectorModelName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9_-]+$
    DetectorModelDefinition:
      description: Information that defines how a detector operates.
      type: object
      properties:
        states:
          $ref: "#/components/schemas/States"
          description: Information about the states of the detector.
        initialStateName:
          $ref: "#/components/schemas/StateName"
          description: The state that is entered at the creation of each detector (instance).
      required:
        - states
        - initialStateName
    States:
      type: array
      items:
        $ref: "#/components/schemas/State"
    State:
      description: Information that defines a state of a detector.
      type: object
      properties:
        stateName:
          $ref: "#/components/schemas/StateName"
          description: The name of the state.
        onInput:
          $ref: "#/components/schemas/OnInputLifecycle"
          description: When an input is received and the condition is TRUE, perform the specified actions.
        onEnter:
          $ref: "#/components/schemas/OnEnterLifecycle"
          description: When entering this state, perform these actions if the condition is TRUE.
        onExit:
          $ref: "#/components/schemas/OnExitLifecycle"
          description: When exiting this state, perform these actions if the specified condition is TRUE.
      required:
        - stateName
    StateName:
      type: string
      minLength: 1
      maxLength: 128
    OnInputLifecycle:
      description: Specifies the actions performed when the condition evaluates to TRUE.
      type: object
      properties:
        events:
          $ref: "#/components/schemas/Events"
          description: Specifies the actions performed when the condition evaluates to TRUE.
        transitionEvents:
          $ref: "#/components/schemas/TransitionEvents"
          description: Specifies the actions performed, and the next state entered, when a condition evaluates to TRUE.
    Events:
      type: array
      items:
        $ref: "#/components/schemas/Event"
    Event:
      description: Specifies the actions to be performed when the condition evaluates to TRUE.
      type: object
      properties:
        eventName:
          $ref: "#/components/schemas/EventName"
          description: The name of the event.
        condition:
          $ref: "#/components/schemas/Condition"
          description: Optional. The Boolean expression that, when TRUE, causes the actions to be performed. If not present, the actions are performed (=TRUE). If the expression result is not a Boolean value, the actions are not performed (=FALSE).
        actions:
          $ref: "#/components/schemas/Actions"
          description: The actions to be performed.
      required:
        - eventName
    EventName:
      type: string
      maxLength: 128
    Condition:
      type: string
      maxLength: 512
    Actions:
      type: array
      items:
        $ref: "#/components/schemas/Action"
    Action:
      description: An action to be performed when the condition is TRUE.
      type: object
      properties:
        setVariable:
          $ref: "#/components/schemas/SetVariableAction"
          description: Sets a variable to a specified value.
        sns:
          $ref: "#/components/schemas/SNSTopicPublishAction"
          description: Sends an Amazon SNS message.
        iotTopicPublish:
          $ref: "#/components/schemas/IotTopicPublishAction"
          description: Publishes an MQTT message with the given topic to the AWS IoT message broker.
        setTimer:
          $ref: "#/components/schemas/SetTimerAction"
          description: Information needed to set the timer.
        clearTimer:
          $ref: "#/components/schemas/ClearTimerAction"
          description: Information needed to clear the timer.
        resetTimer:
          $ref: "#/components/schemas/ResetTimerAction"
          description: Information needed to reset the timer.
        lambda:
          $ref: "#/components/schemas/LambdaAction"
          description: Calls a Lambda function, passing in information about the detector model instance and the event that triggered the action.
        iotEvents:
          $ref: "#/components/schemas/IotEventsAction"
          description: Sends AWS IoT Events input, which passes information about the detector model instance and the event that triggered the action.
        sqs:
          $ref: "#/components/schemas/SqsAction"
          description: Sends information about the detector model instance and the event that triggered the action to an Amazon SQS queue.
        firehose:
          $ref: "#/components/schemas/FirehoseAction"
          description: Sends information about the detector model instance and the event that triggered the action to an Amazon Kinesis Data Firehose delivery stream.
        dynamoDB:
          $ref: "#/components/schemas/DynamoDBAction"
          description: Writes to the DynamoDB table that you created. The default action payload contains all attribute-value pairs that have the information about the detector model instance and the event that triggered the action. You can customize the payload. One column of the DynamoDB table receives all attribute-value pairs in the payload that you specify. For more information, see Actions in AWS IoT Events Developer Guide.
        dynamoDBv2:
          $ref: "#/components/schemas/DynamoDBv2Action"
          description: Writes to the DynamoDB table that you created. The default action payload contains all attribute-value pairs that have the information about the detector model instance and the event that triggered the action. You can customize the payload. A separate column of the DynamoDB table receives one attribute-value pair in the payload that you specify. For more information, see Actions in AWS IoT Events Developer Guide.
        iotSiteWise:
          $ref: "#/components/schemas/IotSiteWiseAction"
          description: Sends information about the detector model instance and the event that triggered the action to an asset property in AWS IoT SiteWise .
    SetVariableAction:
      description: Information about the variable and its new value.
      type: object
      properties:
