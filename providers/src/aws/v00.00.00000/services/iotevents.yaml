        additionalMessage:
          $ref: "#/components/schemas/NotificationAdditionalMessage"
          description: The message that you want to send. The message can be up to 200 characters.
    EmailSubject:
      type: string
    EmailRecipients:
      description: Contains the information of one or more recipients who receive the emails. You must add the users that receive emails to your AWS SSO store.
      type: object
      properties:
        to:
          $ref: "#/components/schemas/RecipientDetails"
          description: Specifies one or more recipients who receive the email.
    AlarmEventActions:
      description: Contains information about one or more alarm actions.
