  /ListQualificationTypes:
    post:
      operationId: ListQualificationTypes
      description: The ListQualificationTypes operation returns a list of Qualification types, filtered by an optional search term.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.ListQualificationTypes
            default: MTurkRequesterServiceV20170117.ListQualificationTypes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Query:
                  $ref: "#/components/schemas/String"
                  description: A text query against all of the searchable attributes of Qualification types.
                MustBeRequestable:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies that only Qualification types that a user can request through the Amazon Mechanical Turk web site, such as by taking a Qualification test, are returned as results of the search. Some Qualification types, such as those assigned automatically by the system, cannot be requested directly by users. If false, all Qualification types, including those managed by the system, are considered. Valid values are True | False.
                MustBeOwnedByCaller:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies that only Qualification types that the Requester created are returned. If false, the operation returns all Qualification types.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/ResultSize"
                  description: The maximum number of results to return in a single call.
              required:
                - MustBeRequestable
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQualificationTypesResponse"
  /ListReviewPolicyResultsForHIT:
    post:
      operationId: ListReviewPolicyResultsForHIT
      description: The ListReviewPolicyResultsForHIT operation retrieves the computed results and the actions taken in the course of executing your Review Policies for a given HIT. For information about how to specify Review Policies when you call CreateHIT, see Review Policies. The ListReviewPolicyResultsForHIT operation can return results for both Assignment-level and HIT-level review results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.ListReviewPolicyResultsForHIT
            default: MTurkRequesterServiceV20170117.ListReviewPolicyResultsForHIT
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HITId:
                  $ref: "#/components/schemas/EntityId"
                  description: The unique identifier of the HIT to retrieve review results for.
                PolicyLevels:
                  $ref: "#/components/schemas/ReviewPolicyLevelList"
                  description: The Policy Level(s) to retrieve review results for - HIT or Assignment. If omitted, the default behavior is to retrieve all data for both policy levels. For a list of all the described policies, see Review Policies.
                RetrieveActions:
                  $ref: "#/components/schemas/Boolean"
                  description: Specify if the operation should retrieve a list of the actions taken executing the Review Policies and their outcomes.
                RetrieveResults:
                  $ref: "#/components/schemas/Boolean"
                  description: Specify if the operation should retrieve a list of the results computed by the Review Policies.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: Pagination token
                MaxResults:
                  $ref: "#/components/schemas/ResultSize"
                  description: Limit the number of results returned.
              required:
                - HITId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReviewPolicyResultsForHITResponse"
  /ListReviewableHITs:
