            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountBalanceResponse"
  /GetAssignment:
    post:
      operationId: GetAssignment
      description: The GetAssignment operation retrieves the details of the specified Assignment.
      parameters:
        - name: X-Amz-Target
          in: header
