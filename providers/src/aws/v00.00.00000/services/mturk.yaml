  /NotifyWorkers:
    post:
      operationId: NotifyWorkers
      description: The NotifyWorkers operation sends an email to one or more Workers that you specify with the Worker ID. You can specify up to 100 Worker IDs to send the same message with a single call to the NotifyWorkers operation. The NotifyWorkers operation will send a notification email to a Worker only if you have previously approved or rejected work from the Worker.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.NotifyWorkers
            default: MTurkRequesterServiceV20170117.NotifyWorkers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Subject:
                  $ref: "#/components/schemas/String"
                  description: The subject line of the email message to send. Can include up to 200 characters.
                MessageText:
                  $ref: "#/components/schemas/String"
                  description: The text of the email message to send. Can include up to 4,096 characters
                WorkerIds:
                  $ref: "#/components/schemas/CustomerIdList"
                  description: A list of Worker IDs you wish to notify. You can notify upto 100 Workers at a time.
              required:
                - Subject
                - MessageText
                - WorkerIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyWorkersResponse"
  /RejectAssignment:
    post:
      operationId: RejectAssignment
      description: The RejectAssignment operation rejects the results of a completed assignment. You can include an optional feedback message with the rejection, which the Worker can see in the Status section of the web site. When you include a feedback message with the rejection, it helps the Worker understand why the assignment was rejected, and can improve the quality of the results the Worker submits in the future. Only the Requester who created the HIT can reject an assignment for the HIT.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.RejectAssignment
            default: MTurkRequesterServiceV20170117.RejectAssignment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AssignmentId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the assignment. The assignment must correspond to a HIT created by the Requester.
                RequesterFeedback:
                  $ref: "#/components/schemas/String"
                  description: A message for the Worker, which the Worker can see in the Status section of the web site.
              required:
                - AssignmentId
                - RequesterFeedback
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectAssignmentResponse"
  /RejectQualificationRequest:
    post:
      operationId: RejectQualificationRequest
      description: The RejectQualificationRequest operation rejects a user's request for a Qualification. You can provide a text message explaining why the request was rejected. The Worker who made the request can see this message.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.RejectQualificationRequest
            default: MTurkRequesterServiceV20170117.RejectQualificationRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                QualificationRequestId:
                  $ref: "#/components/schemas/String"
                  description: The ID of the Qualification request, as returned by the ListQualificationRequests operation.
                Reason:
                  $ref: "#/components/schemas/String"
                  description: A text message explaining why the request was rejected, to be shown to the Worker who made the request.
              required:
                - QualificationRequestId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectQualificationRequestResponse"
  /SendBonus:
    post:
      operationId: SendBonus
      description: The SendBonus operation issues a payment of money from your account to a Worker. This payment happens separately from the reward you pay to the Worker when you approve the Worker's assignment. The SendBonus operation requires the Worker's ID and the assignment ID as parameters to initiate payment of the bonus. You must include a message that explains the reason for the bonus payment, as the Worker may not be expecting the payment. Amazon Mechanical Turk collects a fee for bonus payments, similar to the HIT listing fee. This operation fails if your account does not have enough funds to pay for both the bonus and the fees.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.SendBonus
            default: MTurkRequesterServiceV20170117.SendBonus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkerId:
                  $ref: "#/components/schemas/CustomerId"
                  description: The ID of the Worker being paid the bonus.
                BonusAmount:
                  $ref: "#/components/schemas/CurrencyAmount"
                  description: The Bonus amount is a US Dollar amount specified using a string (for example, "5" represents $5.00 USD and "101.42" represents $101.42 USD). Do not include currency symbols or currency codes.
                AssignmentId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the assignment for which this bonus is paid.
                Reason:
                  $ref: "#/components/schemas/String"
                  description: A message that explains the reason for the bonus payment. The Worker receiving the bonus can see this message.
                UniqueRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique identifier for this request, which allows you to retry the call on error without granting multiple bonuses. This is useful in cases such as network timeouts where it is unclear whether or not the call succeeded on the server. If the bonus already exists in the system from a previous call using the same UniqueRequestToken, subsequent calls will return an error with a message containing the request ID.
              required:
                - WorkerId
                - BonusAmount
                - AssignmentId
                - Reason
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendBonusResponse"
  /SendTestEventNotification:
    post:
      operationId: SendTestEventNotification
      description: The SendTestEventNotification operation causes Amazon Mechanical Turk to send a notification message as if a HIT event occurred, according to the provided notification specification. This allows you to test notifications without setting up notifications for a real HIT type and trying to trigger them using the website. When you call this operation, the service attempts to send the test notification immediately.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.SendTestEventNotification
            default: MTurkRequesterServiceV20170117.SendTestEventNotification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Notification:
                  $ref: "#/components/schemas/NotificationSpecification"
                  description: The notification specification to test. This value is identical to the value you would provide to the UpdateNotificationSettings operation when you establish the notification specification for a HIT type.
                TestEventType:
                  $ref: "#/components/schemas/EventType"
                  description: The event to simulate to test the notification specification. This event is included in the test message even if the notification specification does not include the event type. The notification specification does not filter out the test event.
              required:
                - Notification
                - TestEventType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendTestEventNotificationResponse"
  /UpdateExpirationForHIT:
    post:
      operationId: UpdateExpirationForHIT
      description: The UpdateExpirationForHIT operation allows you update the expiration time of a HIT. If you update it to a time in the past, the HIT will be immediately expired.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.UpdateExpirationForHIT
            default: MTurkRequesterServiceV20170117.UpdateExpirationForHIT
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HITId:
                  $ref: "#/components/schemas/EntityId"
                  description: The HIT to update.
                ExpireAt:
                  $ref: "#/components/schemas/Timestamp"
                  description: The date and time at which you want the HIT to expire
              required:
                - HITId
                - ExpireAt
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateExpirationForHITResponse"
  /UpdateHITReviewStatus:
    post:
      operationId: UpdateHITReviewStatus
      description: The UpdateHITReviewStatus operation updates the status of a HIT. If the status is Reviewable, this operation can update the status to Reviewing, or it can revert a Reviewing HIT back to the Reviewable status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.UpdateHITReviewStatus
            default: MTurkRequesterServiceV20170117.UpdateHITReviewStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HITId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the HIT to update.
                Revert:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies how to update the HIT status. Default is False. Setting this to false will only transition a HIT from Reviewable to Reviewing Setting this to true will only transition a HIT from Reviewing to Reviewable
              required:
                - HITId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateHITReviewStatusResponse"
  /UpdateHITTypeOfHIT:
    post:
      operationId: UpdateHITTypeOfHIT
      description: The UpdateHITTypeOfHIT operation allows you to change the HITType properties of a HIT. This operation disassociates the HIT from its old HITType properties and associates it with the new HITType properties. The HIT takes on the properties of the new HITType in place of the old ones.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.UpdateHITTypeOfHIT
            default: MTurkRequesterServiceV20170117.UpdateHITTypeOfHIT
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HITId:
                  $ref: "#/components/schemas/EntityId"
                  description: The HIT to update.
                HITTypeId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the new HIT type.
              required:
                - HITId
                - HITTypeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateHITTypeOfHITResponse"
  /UpdateNotificationSettings:
    post:
      operationId: UpdateNotificationSettings
      description: The UpdateNotificationSettings operation creates, updates, disables or re-enables notifications for a HIT type. If you call the UpdateNotificationSettings operation for a HIT type that already has a notification specification, the operation replaces the old specification with a new one. You can call the UpdateNotificationSettings operation to enable or disable notifications for the HIT type, without having to modify the notification specification itself by providing updates to the Active status without specifying a new notification specification. To change the Active status of a HIT type's notifications, the HIT type must already have a notification specification, or one must be provided in the same call to UpdateNotificationSettings.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.UpdateNotificationSettings
            default: MTurkRequesterServiceV20170117.UpdateNotificationSettings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HITTypeId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the HIT type whose notification specification is being updated.
                Notification:
                  $ref: "#/components/schemas/NotificationSpecification"
                  description: The notification specification for the HIT type.
                Active:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether notifications are sent for HITs of this HIT type, according to the notification specification. You must specify either the Notification parameter or the Active parameter for the call to UpdateNotificationSettings to succeed.
              required:
                - HITTypeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNotificationSettingsResponse"
  /UpdateQualificationType:
    post:
      operationId: UpdateQualificationType
      description: The UpdateQualificationType operation modifies the attributes of an existing Qualification type, which is represented by a QualificationType data structure. Only the owner of a Qualification type can modify its attributes. Most attributes of a Qualification type can be changed after the type has been created. However, the Name and Keywords fields cannot be modified. The RetryDelayInSeconds parameter can be modified or added to change the delay or to enable retries, but RetryDelayInSeconds cannot be used to disable retries. You can use this operation to update the test for a Qualification type. The test is updated based on the values specified for the Test, TestDurationInSeconds and AnswerKey parameters. All three parameters specify the updated test. If you are updating the test for a type, you must specify the Test and TestDurationInSeconds parameters. The AnswerKey parameter is optional; omitting it specifies that the updated test does not have an answer key. If you omit the Test parameter, the test for the Qualification type is unchanged. There is no way to remove a test from a Qualification type that has one. If the type already has a test, you cannot update it to be AutoGranted. If the Qualification type does not have a test and one is provided by an update, the type will henceforth have a test. If you want to update the test duration or answer key for an existing test without changing the questions, you must specify a Test parameter with the original questions, along with the updated values. If you provide an updated Test but no AnswerKey, the new test will not have an answer key. Requests for such Qualifications must be granted manually. You can also update the AutoGranted and AutoGrantedValue attributes of the Qualification type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.UpdateQualificationType
            default: MTurkRequesterServiceV20170117.UpdateQualificationType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                QualificationTypeId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the Qualification type to update.
                Description:
                  $ref: "#/components/schemas/String"
                  description: The new description of the Qualification type.
                QualificationTypeStatus:
                  $ref: "#/components/schemas/QualificationTypeStatus"
                  description: The new status of the Qualification type - Active | Inactive
                Test:
                  $ref: "#/components/schemas/String"
                  description: "The questions for the Qualification test a Worker must answer correctly to obtain a Qualification of this type. If this parameter is specified, TestDurationInSeconds must also be specified. Constraints: Must not be longer than 65535 bytes. Must be a QuestionForm data structure. This parameter cannot be specified if AutoGranted is true. Constraints: None. If not specified, the Worker may request the Qualification without answering any questions."
                AnswerKey:
                  $ref: "#/components/schemas/String"
                  description: The answers to the Qualification test specified in the Test parameter, in the form of an AnswerKey data structure.
                TestDurationInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: The number of seconds the Worker has to complete the Qualification test, starting from the time the Worker requests the Qualification.
                RetryDelayInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: The amount of time, in seconds, that Workers must wait after requesting a Qualification of the specified Qualification type before they can retry the Qualification request. It is not possible to disable retries for a Qualification type after it has been created with retries enabled. If you want to disable retries, you must dispose of the existing retry-enabled Qualification type using DisposeQualificationType and then create a new Qualification type with retries disabled using CreateQualificationType.
                AutoGranted:
                  $ref: "#/components/schemas/Boolean"
                  description: "Specifies whether requests for the Qualification type are granted immediately, without prompting the Worker with a Qualification test. Constraints: If the Test parameter is specified, this parameter cannot be true."
                AutoGrantedValue:
                  $ref: "#/components/schemas/Integer"
                  description: The Qualification value to use for automatically granted Qualifications. This parameter is used only if the AutoGranted parameter is true.
              required:
                - QualificationTypeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateQualificationTypeResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    Integer:
      type: integer
    AcceptQualificationRequestResponse:
      type: object
    EntityId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[A-Z0-9]+$
    Boolean:
      type: boolean
    ApproveAssignmentResponse:
      type: object
    CustomerId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^A[A-Z0-9]+$
    AssociateQualificationWithWorkerResponse:
      type: object
    IdempotencyToken:
      type: string
      minLength: 1
      maxLength: 64
    CreateAdditionalAssignmentsForHITResponse:
      type: object
    Long:
      type: integer
      format: int64
    CurrencyAmount:
      description: A string representing a currency amount.
      type: string
      pattern: ^[0-9]+(\.)?[0-9]{0,2}$
    QualificationRequirementList:
      type: array
      items:
        $ref: "#/components/schemas/QualificationRequirement"
    QualificationRequirement:
      description: The QualificationRequirement data structure describes a Qualification that a Worker must have before the Worker is allowed to accept a HIT. A requirement may optionally state that a Worker must have the Qualification in order to preview the HIT, or see the HIT in search results.
      type: object
      properties:
        QualificationTypeId:
          $ref: "#/components/schemas/String"
          description: The ID of the Qualification type for the requirement.
        Comparator:
          $ref: "#/components/schemas/Comparator"
          description: The kind of comparison to make against a Qualification's value. You can compare a Qualification's value to an IntegerValue to see if it is LessThan, LessThanOrEqualTo, GreaterThan, GreaterThanOrEqualTo, EqualTo, or NotEqualTo the IntegerValue. You can compare it to a LocaleValue to see if it is EqualTo, or NotEqualTo the LocaleValue. You can check to see if the value is In or NotIn a set of IntegerValue or LocaleValue values. Lastly, a Qualification requirement can also test if a Qualification Exists or DoesNotExist in the user's profile, regardless of its value.
        IntegerValues:
          $ref: "#/components/schemas/IntegerList"
          description: The integer value to compare against the Qualification's value. IntegerValue must not be present if Comparator is Exists or DoesNotExist. IntegerValue can only be used if the Qualification type has an integer value; it cannot be used with the Worker_Locale QualificationType ID. When performing a set comparison by using the In or the NotIn comparator, you can use up to 15 IntegerValue elements in a QualificationRequirement data structure.
        LocaleValues:
          $ref: "#/components/schemas/LocaleList"
          description: The locale value to compare against the Qualification's value. The local value must be a valid ISO 3166 country code or supports ISO 3166-2 subdivisions. LocaleValue can only be used with a Worker_Locale QualificationType ID. LocaleValue can only be used with the EqualTo, NotEqualTo, In, and NotIn comparators. You must only use a single LocaleValue element when using the EqualTo or NotEqualTo comparators. When performing a set comparison by using the In or the NotIn comparator, you can use up to 30 LocaleValue elements in a QualificationRequirement data structure.
        RequiredToPreview:
          $ref: "#/components/schemas/Boolean"
          description: "DEPRECATED: Use the ActionsGuarded field instead. If RequiredToPreview is true, the question data for the HIT will not be shown when a Worker whose Qualifications do not meet this requirement tries to preview the HIT. That is, a Worker's Qualifications must meet all of the requirements for which RequiredToPreview is true in order to preview the HIT. If a Worker meets all of the requirements where RequiredToPreview is true (or if there are no such requirements), but does not meet all of the requirements for the HIT, the Worker will be allowed to preview the HIT's question data, but will not be allowed to accept and complete the HIT. The default is false. This should not be used in combination with the ActionsGuarded field."
        ActionsGuarded:
          $ref: "#/components/schemas/HITAccessActions"
          description: Setting this attribute prevents Workers whose Qualifications do not meet this QualificationRequirement from taking the specified action. Valid arguments include "Accept" (Worker cannot accept the HIT, but can preview the HIT and see it in their search results), "PreviewAndAccept" (Worker cannot accept or preview the HIT, but can see the HIT in their search results), and "DiscoverPreviewAndAccept" (Worker cannot accept, preview, or see the HIT in their search results). It's possible for you to create a HIT with multiple QualificationRequirements (which can have different values for the ActionGuarded attribute). In this case, the Worker is only permitted to perform an action when they have met all QualificationRequirements guarding the action. The actions in the order of least restrictive to most restrictive are Discover, Preview and Accept. For example, if a Worker meets all QualificationRequirements that are set to DiscoverPreviewAndAccept, but do not meet all requirements that are set with PreviewAndAccept, then the Worker will be able to Discover, i.e. see the HIT in their search result, but will not be able to Preview or Accept the HIT. ActionsGuarded should not be used in combination with the RequiredToPreview field.
      required:
        - QualificationTypeId
        - Comparator
    Comparator:
      type: string
      enum:
        - LessThan
        - LessThanOrEqualTo
        - GreaterThan
        - GreaterThanOrEqualTo
        - EqualTo
        - NotEqualTo
        - Exists
        - DoesNotExist
        - In
        - NotIn
    IntegerList:
      type: array
      items:
        $ref: "#/components/schemas/Integer"
    LocaleList:
      type: array
      items:
        $ref: "#/components/schemas/Locale"
    Locale:
      description: The Locale data structure represents a geographical region or location.
      type: object
      properties:
        Country:
          $ref: "#/components/schemas/CountryParameters"
          description: The country of the locale. Must be a valid ISO 3166 country code. For example, the code US refers to the United States of America.
        Subdivision:
          $ref: "#/components/schemas/CountryParameters"
          description: The state or subdivision of the locale. A valid ISO 3166-2 subdivision code. For example, the code WA refers to the state of Washington.
      required:
        - Country
    CountryParameters:
      type: string
      minLength: 2
      maxLength: 2
    HITAccessActions:
      type: string
      enum:
        - Accept
        - PreviewAndAccept
        - DiscoverPreviewAndAccept
    ReviewPolicy:
      description: HIT Review Policy data structures represent HIT review policies, which you specify when you create a HIT.
      type: object
      properties:
        PolicyName:
          $ref: "#/components/schemas/String"
          description: "Name of a Review Policy: SimplePlurality/2011-09-01 or ScoreMyKnownAnswers/2011-09-01"
        Parameters:
          $ref: "#/components/schemas/PolicyParameterList"
          description: Name of the parameter from the Review policy.
      required:
        - PolicyName
    PolicyParameterList:
      type: array
      items:
        $ref: "#/components/schemas/PolicyParameter"
    PolicyParameter:
      description: Name of the parameter from the Review policy.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: Name of the parameter from the list of Review Polices.
        Values:
          $ref: "#/components/schemas/StringList"
          description: The list of values of the Parameter
        MapEntries:
          $ref: "#/components/schemas/ParameterMapEntryList"
          description: List of ParameterMapEntry objects.
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ParameterMapEntryList:
      type: array
      items:
        $ref: "#/components/schemas/ParameterMapEntry"
    ParameterMapEntry:
      description: This data structure is the data type for the AnswerKey parameter of the ScoreMyKnownAnswers/2011-09-01 Review Policy.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: The QuestionID from the HIT that is used to identify which question requires Mechanical Turk to score as part of the ScoreMyKnownAnswers/2011-09-01 Review Policy.
        Values:
          $ref: "#/components/schemas/StringList"
          description: The list of answers to the question specified in the MapEntry Key element. The Worker must match all values in order for the answer to be scored correctly.
    HITLayoutParameterList:
      type: array
      items:
        $ref: "#/components/schemas/HITLayoutParameter"
    HITLayoutParameter:
      description: The HITLayoutParameter data structure defines parameter values used with a HITLayout. A HITLayout is a reusable Amazon Mechanical Turk project template used to provide Human Intelligence Task (HIT) question data for CreateHIT.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the parameter in the HITLayout.
        Value:
          $ref: "#/components/schemas/String"
          description: The value substituted for the parameter referenced in the HITLayout.
      required:
        - Name
        - Value
    CreateHITResponse:
      type: object
      properties:
        HIT:
          $ref: "#/components/schemas/HIT"
          description: Contains the newly created HIT data. For a description of the HIT data structure as it appears in responses, see the HIT Data Structure documentation.
    HIT:
      description: The HIT data structure represents a single HIT, including all the information necessary for a Worker to accept and complete the HIT.
      type: object
      properties:
        HITId:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the HIT.
        HITTypeId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the HIT type of this HIT
        HITGroupId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the HIT Group of this HIT.
        HITLayoutId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the HIT Layout of this HIT.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the HIT was created.
        Title:
          $ref: "#/components/schemas/String"
          description: The title of the HIT.
        Description:
          $ref: "#/components/schemas/String"
          description: A general description of the HIT.
        Question:
          $ref: "#/components/schemas/String"
          description: The data the Worker completing the HIT uses produce the results. This is either either a QuestionForm, HTMLQuestion or an ExternalQuestion data structure.
        Keywords:
          $ref: "#/components/schemas/String"
          description: One or more words or phrases that describe the HIT, separated by commas. Search terms similar to the keywords of a HIT are more likely to have the HIT in the search results.
        HITStatus:
          $ref: "#/components/schemas/HITStatus"
          description: The status of the HIT and its assignments. Valid Values are Assignable | Unassignable | Reviewable | Reviewing | Disposed.
        MaxAssignments:
          $ref: "#/components/schemas/Integer"
          description: The number of times the HIT can be accepted and completed before the HIT becomes unavailable.
        Reward:
          $ref: "#/components/schemas/CurrencyAmount"
        AutoApprovalDelayInSeconds:
          $ref: "#/components/schemas/Long"
          description: The amount of time, in seconds, after the Worker submits an assignment for the HIT that the results are automatically approved by Amazon Mechanical Turk. This is the amount of time the Requester has to reject an assignment submitted by a Worker before the assignment is auto-approved and the Worker is paid.
        Expiration:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the HIT expires.
        AssignmentDurationInSeconds:
          $ref: "#/components/schemas/Long"
          description: The length of time, in seconds, that a Worker has to complete the HIT after accepting it.
        RequesterAnnotation:
          $ref: "#/components/schemas/String"
          description: An arbitrary data field the Requester who created the HIT can use. This field is visible only to the creator of the HIT.
        QualificationRequirements:
          $ref: "#/components/schemas/QualificationRequirementList"
          description: Conditions that a Worker's Qualifications must meet in order to accept the HIT. A HIT can have between zero and ten Qualification requirements. All requirements must be met in order for a Worker to accept the HIT. Additionally, other actions can be restricted using the ActionsGuarded field on each QualificationRequirement structure.
        HITReviewStatus:
          $ref: "#/components/schemas/HITReviewStatus"
          description: Indicates the review status of the HIT. Valid Values are NotReviewed | MarkedForReview | ReviewedAppropriate | ReviewedInappropriate.
        NumberOfAssignmentsPending:
          $ref: "#/components/schemas/Integer"
          description: The number of assignments for this HIT that are being previewed or have been accepted by Workers, but have not yet been submitted, returned, or abandoned.
        NumberOfAssignmentsAvailable:
          $ref: "#/components/schemas/Integer"
          description: The number of assignments for this HIT that are available for Workers to accept.
        NumberOfAssignmentsCompleted:
          $ref: "#/components/schemas/Integer"
          description: The number of assignments for this HIT that have been approved or rejected.
    Timestamp:
      type: string
      format: date-time
    HITStatus:
      type: string
      enum:
        - Assignable
        - Unassignable
        - Reviewable
        - Reviewing
        - Disposed
    HITReviewStatus:
      type: string
      enum:
        - NotReviewed
        - MarkedForReview
        - ReviewedAppropriate
        - ReviewedInappropriate
    CreateHITTypeResponse:
      type: object
      properties:
        HITTypeId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the newly registered HIT type.
    CreateHITWithHITTypeResponse:
      type: object
      properties:
        HIT:
          $ref: "#/components/schemas/HIT"
          description: Contains the newly created HIT data. For a description of the HIT data structure as it appears in responses, see the HIT Data Structure documentation.
    QualificationTypeStatus:
      type: string
      enum:
        - Active
        - Inactive
    CreateQualificationTypeResponse:
      type: object
      properties:
        QualificationType:
          $ref: "#/components/schemas/QualificationType"
          description: The created Qualification type, returned as a QualificationType data structure.
    QualificationType:
      description: The QualificationType data structure represents a Qualification type, a description of a property of a Worker that must match the requirements of a HIT for the Worker to be able to accept the HIT. The type also describes how a Worker can obtain a Qualification of that type, such as through a Qualification test.
      type: object
      properties:
        QualificationTypeId:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the Qualification type. A Qualification type is given a Qualification type ID when you call the CreateQualificationType operation.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the Qualification type was created.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the Qualification type. The type name is used to identify the type, and to find the type using a Qualification type search.
        Description:
          $ref: "#/components/schemas/String"
          description: A long description for the Qualification type.
        Keywords:
          $ref: "#/components/schemas/String"
          description: One or more words or phrases that describe theQualification type, separated by commas. The Keywords make the type easier to find using a search.
        QualificationTypeStatus:
          $ref: "#/components/schemas/QualificationTypeStatus"
          description: The status of the Qualification type. A Qualification type's status determines if users can apply to receive a Qualification of this type, and if HITs can be created with requirements based on this type. Valid values are Active | Inactive.
        Test:
          $ref: "#/components/schemas/String"
          description: The questions for a Qualification test associated with this Qualification type that a user can take to obtain a Qualification of this type. This parameter must be specified if AnswerKey is present. A Qualification type cannot have both a specified Test parameter and an AutoGranted value of true.
        TestDurationInSeconds:
          $ref: "#/components/schemas/Long"
          description: The amount of time, in seconds, given to a Worker to complete the Qualification test, beginning from the time the Worker requests the Qualification.
        AnswerKey:
          $ref: "#/components/schemas/String"
          description: The answers to the Qualification test specified in the Test parameter.
        RetryDelayInSeconds:
          $ref: "#/components/schemas/Long"
          description: The amount of time, in seconds, Workers must wait after taking the Qualification test before they can take it again. Workers can take a Qualification test multiple times if they were not granted the Qualification from a previous attempt, or if the test offers a gradient score and they want a better score. If not specified, retries are disabled and Workers can request a Qualification only once.
        IsRequestable:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the Qualification type is one that a user can request through the Amazon Mechanical Turk web site, such as by taking a Qualification test. This value is False for Qualifications assigned automatically by the system. Valid values are True | False.
        AutoGranted:
          $ref: "#/components/schemas/Boolean"
          description: Specifies that requests for the Qualification type are granted immediately, without prompting the Worker with a Qualification test. Valid values are True | False.
        AutoGrantedValue:
          $ref: "#/components/schemas/Integer"
          description: The Qualification integer value to use for automatically granted Qualifications, if AutoGranted is true. This is 1 by default.
