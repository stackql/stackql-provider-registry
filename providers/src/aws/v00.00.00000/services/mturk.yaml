openapi: 3.0.0
info:
  version: "2017-01-17"
  title: Amazon Mechanical Turk
  description: Amazon Mechanical Turk
  x-serviceName: mturk-requester
  x-serviceAlias: mturk
  x-protocol: json
  x-apiVersion: "2017-01-17"
  x-endpointPrefix: mturk-requester
  x-targetPrefix: MTurkRequesterServiceV20170117
  x-jsonVersion: "1.1"
servers:
  - url: https://mturk-requester.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mturk
paths:
  /AcceptQualificationRequest:
    post:
      operationId: AcceptQualificationRequest
      description: The AcceptQualificationRequest operation approves a Worker's request for a Qualification. Only the owner of the Qualification type can grant a Qualification request for that type. A successful request for the AcceptQualificationRequest operation returns with no errors and an empty body.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.AcceptQualificationRequest
            default: MTurkRequesterServiceV20170117.AcceptQualificationRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                QualificationRequestId:
                  $ref: "#/components/schemas/String"
                  description: The ID of the Qualification request, as returned by the GetQualificationRequests operation.
                IntegerValue:
                  $ref: "#/components/schemas/Integer"
                  description: The value of the Qualification. You can omit this value if you are using the presence or absence of the Qualification as the basis for a HIT requirement.
              required:
                - QualificationRequestId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptQualificationRequestResponse"
  /ApproveAssignment:
    post:
      operationId: ApproveAssignment
      description: The ApproveAssignment operation approves the results of a completed assignment. Approving an assignment initiates two payments from the Requester's Amazon.com account The Worker who submitted the results is paid the reward specified in the HIT. Amazon Mechanical Turk fees are debited. If the Requester's account does not have adequate funds for these payments, the call to ApproveAssignment returns an exception, and the approval is not processed. You can include an optional feedback message with the approval, which the Worker can see in the Status section of the web site. You can also call this operation for assignments that were previous rejected and approve them by explicitly overriding the previous rejection. This only works on rejected assignments that were submitted within the previous 30 days and only if the assignment's related HIT has not been deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.ApproveAssignment
            default: MTurkRequesterServiceV20170117.ApproveAssignment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AssignmentId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the assignment. The assignment must correspond to a HIT created by the Requester.
                RequesterFeedback:
                  $ref: "#/components/schemas/String"
                  description: A message for the Worker, which the Worker can see in the Status section of the web site.
                OverrideRejection:
                  $ref: "#/components/schemas/Boolean"
                  description: A flag indicating that an assignment should be approved even if it was previously rejected. Defaults to False.
              required:
                - AssignmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveAssignmentResponse"
  /AssociateQualificationWithWorker:
    post:
      operationId: AssociateQualificationWithWorker
      description: "The AssociateQualificationWithWorker operation gives a Worker a Qualification. AssociateQualificationWithWorker does not require that the Worker submit a Qualification request. It gives the Qualification directly to the Worker. You can only assign a Qualification of a Qualification type that you created (using the CreateQualificationType operation). Note: AssociateQualificationWithWorker does not affect any pending Qualification requests for the Qualification by the Worker. If you assign a Qualification to a Worker, then later grant a Qualification request made by the Worker, the granting of the request may modify the Qualification score. To resolve a pending Qualification request without affecting the Qualification the Worker already has, reject the request with the RejectQualificationRequest operation."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.AssociateQualificationWithWorker
            default: MTurkRequesterServiceV20170117.AssociateQualificationWithWorker
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                QualificationTypeId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the Qualification type to use for the assigned Qualification.
                WorkerId:
                  $ref: "#/components/schemas/CustomerId"
                  description: The ID of the Worker to whom the Qualification is being assigned. Worker IDs are included with submitted HIT assignments and Qualification requests.
                IntegerValue:
                  $ref: "#/components/schemas/Integer"
                  description: The value of the Qualification to assign.
                SendNotification:
                  $ref: "#/components/schemas/Boolean"
                  description: "Specifies whether to send a notification email message to the Worker saying that the qualification was assigned to the Worker. Note: this is true by default."
              required:
                - QualificationTypeId
                - WorkerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateQualificationWithWorkerResponse"
  /CreateAdditionalAssignmentsForHIT:
    post:
      operationId: CreateAdditionalAssignmentsForHIT
      description: The CreateAdditionalAssignmentsForHIT operation increases the maximum number of assignments of an existing HIT. To extend the maximum number of assignments, specify the number of additional assignments. HITs created with fewer than 10 assignments cannot be extended to have 10 or more assignments. Attempting to add assignments in a way that brings the total number of assignments for a HIT from fewer than 10 assignments to 10 or more assignments will result in an AWS.MechanicalTurk.InvalidMaximumAssignmentsIncrease exception. HITs that were created before July 22, 2015 cannot be extended. Attempting to extend HITs that were created before July 22, 2015 will result in an AWS.MechanicalTurk.HITTooOldForExtension exception.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.CreateAdditionalAssignmentsForHIT
            default: MTurkRequesterServiceV20170117.CreateAdditionalAssignmentsForHIT
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HITId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the HIT to extend.
                NumberOfAdditionalAssignments:
                  $ref: "#/components/schemas/Integer"
                  description: The number of additional assignments to request for this HIT.
                UniqueRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique identifier for this request, which allows you to retry the call on error without extending the HIT multiple times. This is useful in cases such as network timeouts where it is unclear whether or not the call succeeded on the server. If the extend HIT already exists in the system from a previous call using the same UniqueRequestToken, subsequent calls will return an error with a message containing the request ID.
              required:
                - HITId
                - NumberOfAdditionalAssignments
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAdditionalAssignmentsForHITResponse"
  /CreateHIT:
    post:
      operationId: CreateHIT
      description: "The CreateHIT operation creates a new Human Intelligence Task (HIT). The new HIT is made available for Workers to find and accept on the Amazon Mechanical Turk website. This operation allows you to specify a new HIT by passing in values for the properties of the HIT, such as its title, reward amount and number of assignments. When you pass these values to CreateHIT, a new HIT is created for you, with a new HITTypeID. The HITTypeID can be used to create additional HITs in the future without needing to specify common parameters such as the title, description and reward amount each time. An alternative way to create HITs is to first generate a HITTypeID using the CreateHITType operation and then call the CreateHITWithHITType operation. This is the recommended best practice for Requesters who are creating large numbers of HITs. CreateHIT also supports several ways to provide question data: by providing a value for the Question parameter that fully specifies the contents of the HIT, or by providing a HitLayoutId and associated HitLayoutParameters. If a HIT is created with 10 or more maximum assignments, there is an additional fee. For more information, see Amazon Mechanical Turk Pricing."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.CreateHIT
            default: MTurkRequesterServiceV20170117.CreateHIT
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxAssignments:
                  $ref: "#/components/schemas/Integer"
                  description: The number of times the HIT can be accepted and completed before the HIT becomes unavailable.
                AutoApprovalDelayInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: The number of seconds after an assignment for the HIT has been submitted, after which the assignment is considered Approved automatically unless the Requester explicitly rejects it.
                LifetimeInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: An amount of time, in seconds, after which the HIT is no longer available for users to accept. After the lifetime of the HIT elapses, the HIT no longer appears in HIT searches, even if not all of the assignments for the HIT have been accepted.
                AssignmentDurationInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: The amount of time, in seconds, that a Worker has to complete the HIT after accepting it. If a Worker does not complete the assignment within the specified duration, the assignment is considered abandoned. If the HIT is still active (that is, its lifetime has not elapsed), the assignment becomes available for other users to find and accept.
                Reward:
                  $ref: "#/components/schemas/CurrencyAmount"
                  description: The amount of money the Requester will pay a Worker for successfully completing the HIT.
                Title:
                  $ref: "#/components/schemas/String"
                  description: The title of the HIT. A title should be short and descriptive about the kind of task the HIT contains. On the Amazon Mechanical Turk web site, the HIT title appears in search results, and everywhere the HIT is mentioned.
                Keywords:
                  $ref: "#/components/schemas/String"
                  description: One or more words or phrases that describe the HIT, separated by commas. These words are used in searches to find HITs.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A general description of the HIT. A description includes detailed information about the kind of task the HIT contains. On the Amazon Mechanical Turk web site, the HIT description appears in the expanded view of search results, and in the HIT and assignment screens. A good description gives the user enough information to evaluate the HIT before accepting it.
                Question:
                  $ref: "#/components/schemas/String"
                  description: "The data the person completing the HIT uses to produce the results. Constraints: Must be a QuestionForm data structure, an ExternalQuestion data structure, or an HTMLQuestion data structure. The XML question data must not be larger than 64 kilobytes (65,535 bytes) in size, including whitespace. Either a Question parameter or a HITLayoutId parameter must be provided."
                RequesterAnnotation:
                  $ref: "#/components/schemas/String"
                  description: An arbitrary data field. The RequesterAnnotation parameter lets your application attach arbitrary data to the HIT for tracking purposes. For example, this parameter could be an identifier internal to the Requester's application that corresponds with the HIT. The RequesterAnnotation parameter for a HIT is only visible to the Requester who created the HIT. It is not shown to the Worker, or any other Requester. The RequesterAnnotation parameter may be different for each HIT you submit. It does not affect how your HITs are grouped.
                QualificationRequirements:
                  $ref: "#/components/schemas/QualificationRequirementList"
                  description: Conditions that a Worker's Qualifications must meet in order to accept the HIT. A HIT can have between zero and ten Qualification requirements. All requirements must be met in order for a Worker to accept the HIT. Additionally, other actions can be restricted using the ActionsGuarded field on each QualificationRequirement structure.
                UniqueRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: "A unique identifier for this request which allows you to retry the call on error without creating duplicate HITs. This is useful in cases such as network timeouts where it is unclear whether or not the call succeeded on the server. If the HIT already exists in the system from a previous call using the same UniqueRequestToken, subsequent calls will return a AWS.MechanicalTurk.HitAlreadyExists error with a message containing the HITId. Note: It is your responsibility to ensure uniqueness of the token. The unique token expires after 24 hours. Subsequent calls using the same UniqueRequestToken made after the 24 hour limit could create duplicate HITs."
                AssignmentReviewPolicy:
                  $ref: "#/components/schemas/ReviewPolicy"
                  description: The Assignment-level Review Policy applies to the assignments under the HIT. You can specify for Mechanical Turk to take various actions based on the policy.
                HITReviewPolicy:
                  $ref: "#/components/schemas/ReviewPolicy"
                  description: The HIT-level Review Policy applies to the HIT. You can specify for Mechanical Turk to take various actions based on the policy.
                HITLayoutId:
                  $ref: "#/components/schemas/EntityId"
                  description: "The HITLayoutId allows you to use a pre-existing HIT design with placeholder values and create an additional HIT by providing those values as HITLayoutParameters. Constraints: Either a Question parameter or a HITLayoutId parameter must be provided."
                HITLayoutParameters:
                  $ref: "#/components/schemas/HITLayoutParameterList"
                  description: If the HITLayoutId is provided, any placeholder values must be filled in with values using the HITLayoutParameter structure. For more information, see HITLayout.
              required:
                - LifetimeInSeconds
                - AssignmentDurationInSeconds
                - Reward
                - Title
                - Description
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHITResponse"
  /CreateHITType:
    post:
      operationId: CreateHITType
      description: The CreateHITType operation creates a new HIT type. This operation allows you to define a standard set of HIT properties to use when creating HITs. If you register a HIT type with values that match an existing HIT type, the HIT type ID of the existing type will be returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.CreateHITType
            default: MTurkRequesterServiceV20170117.CreateHITType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AutoApprovalDelayInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: The number of seconds after an assignment for the HIT has been submitted, after which the assignment is considered Approved automatically unless the Requester explicitly rejects it.
                AssignmentDurationInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: The amount of time, in seconds, that a Worker has to complete the HIT after accepting it. If a Worker does not complete the assignment within the specified duration, the assignment is considered abandoned. If the HIT is still active (that is, its lifetime has not elapsed), the assignment becomes available for other users to find and accept.
                Reward:
                  $ref: "#/components/schemas/CurrencyAmount"
                  description: The amount of money the Requester will pay a Worker for successfully completing the HIT.
                Title:
                  $ref: "#/components/schemas/String"
                  description: The title of the HIT. A title should be short and descriptive about the kind of task the HIT contains. On the Amazon Mechanical Turk web site, the HIT title appears in search results, and everywhere the HIT is mentioned.
                Keywords:
                  $ref: "#/components/schemas/String"
                  description: One or more words or phrases that describe the HIT, separated by commas. These words are used in searches to find HITs.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A general description of the HIT. A description includes detailed information about the kind of task the HIT contains. On the Amazon Mechanical Turk web site, the HIT description appears in the expanded view of search results, and in the HIT and assignment screens. A good description gives the user enough information to evaluate the HIT before accepting it.
                QualificationRequirements:
                  $ref: "#/components/schemas/QualificationRequirementList"
                  description: Conditions that a Worker's Qualifications must meet in order to accept the HIT. A HIT can have between zero and ten Qualification requirements. All requirements must be met in order for a Worker to accept the HIT. Additionally, other actions can be restricted using the ActionsGuarded field on each QualificationRequirement structure.
              required:
                - AssignmentDurationInSeconds
                - Reward
                - Title
                - Description
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHITTypeResponse"
  /CreateHITWithHITType:
    post:
      operationId: CreateHITWithHITType
      description: "The CreateHITWithHITType operation creates a new Human Intelligence Task (HIT) using an existing HITTypeID generated by the CreateHITType operation. This is an alternative way to create HITs from the CreateHIT operation. This is the recommended best practice for Requesters who are creating large numbers of HITs. CreateHITWithHITType also supports several ways to provide question data: by providing a value for the Question parameter that fully specifies the contents of the HIT, or by providing a HitLayoutId and associated HitLayoutParameters. If a HIT is created with 10 or more maximum assignments, there is an additional fee. For more information, see Amazon Mechanical Turk Pricing."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.CreateHITWithHITType
            default: MTurkRequesterServiceV20170117.CreateHITWithHITType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HITTypeId:
                  $ref: "#/components/schemas/EntityId"
                  description: The HIT type ID you want to create this HIT with.
                MaxAssignments:
                  $ref: "#/components/schemas/Integer"
                  description: The number of times the HIT can be accepted and completed before the HIT becomes unavailable.
                LifetimeInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: An amount of time, in seconds, after which the HIT is no longer available for users to accept. After the lifetime of the HIT elapses, the HIT no longer appears in HIT searches, even if not all of the assignments for the HIT have been accepted.
                Question:
                  $ref: "#/components/schemas/String"
                  description: "The data the person completing the HIT uses to produce the results. Constraints: Must be a QuestionForm data structure, an ExternalQuestion data structure, or an HTMLQuestion data structure. The XML question data must not be larger than 64 kilobytes (65,535 bytes) in size, including whitespace. Either a Question parameter or a HITLayoutId parameter must be provided."
                RequesterAnnotation:
                  $ref: "#/components/schemas/String"
                  description: An arbitrary data field. The RequesterAnnotation parameter lets your application attach arbitrary data to the HIT for tracking purposes. For example, this parameter could be an identifier internal to the Requester's application that corresponds with the HIT. The RequesterAnnotation parameter for a HIT is only visible to the Requester who created the HIT. It is not shown to the Worker, or any other Requester. The RequesterAnnotation parameter may be different for each HIT you submit. It does not affect how your HITs are grouped.
                UniqueRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: "A unique identifier for this request which allows you to retry the call on error without creating duplicate HITs. This is useful in cases such as network timeouts where it is unclear whether or not the call succeeded on the server. If the HIT already exists in the system from a previous call using the same UniqueRequestToken, subsequent calls will return a AWS.MechanicalTurk.HitAlreadyExists error with a message containing the HITId. Note: It is your responsibility to ensure uniqueness of the token. The unique token expires after 24 hours. Subsequent calls using the same UniqueRequestToken made after the 24 hour limit could create duplicate HITs."
                AssignmentReviewPolicy:
                  $ref: "#/components/schemas/ReviewPolicy"
                  description: The Assignment-level Review Policy applies to the assignments under the HIT. You can specify for Mechanical Turk to take various actions based on the policy.
                HITReviewPolicy:
                  $ref: "#/components/schemas/ReviewPolicy"
                  description: The HIT-level Review Policy applies to the HIT. You can specify for Mechanical Turk to take various actions based on the policy.
                HITLayoutId:
                  $ref: "#/components/schemas/EntityId"
                  description: "The HITLayoutId allows you to use a pre-existing HIT design with placeholder values and create an additional HIT by providing those values as HITLayoutParameters. Constraints: Either a Question parameter or a HITLayoutId parameter must be provided."
                HITLayoutParameters:
                  $ref: "#/components/schemas/HITLayoutParameterList"
                  description: If the HITLayoutId is provided, any placeholder values must be filled in with values using the HITLayoutParameter structure. For more information, see HITLayout.
              required:
                - HITTypeId
                - LifetimeInSeconds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHITWithHITTypeResponse"
  /CreateQualificationType:
    post:
      operationId: CreateQualificationType
      description: The CreateQualificationType operation creates a new Qualification type, which is represented by a QualificationType data structure.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.CreateQualificationType
            default: MTurkRequesterServiceV20170117.CreateQualificationType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/String"
                  description: The name you give to the Qualification type. The type name is used to represent the Qualification to Workers, and to find the type using a Qualification type search. It must be unique across all of your Qualification types.
                Keywords:
                  $ref: "#/components/schemas/String"
                  description: One or more words or phrases that describe the Qualification type, separated by commas. The keywords of a type make the type easier to find during a search.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A long description for the Qualification type. On the Amazon Mechanical Turk website, the long description is displayed when a Worker examines a Qualification type.
                QualificationTypeStatus:
                  $ref: "#/components/schemas/QualificationTypeStatus"
                  description: "The initial status of the Qualification type. Constraints: Valid values are: Active | Inactive"
                RetryDelayInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: "The number of seconds that a Worker must wait after requesting a Qualification of the Qualification type before the worker can retry the Qualification request. Constraints: None. If not specified, retries are disabled and Workers can request a Qualification of this type only once, even if the Worker has not been granted the Qualification. It is not possible to disable retries for a Qualification type after it has been created with retries enabled. If you want to disable retries, you must delete existing retry-enabled Qualification type and then create a new Qualification type with retries disabled."
                Test:
                  $ref: "#/components/schemas/String"
                  description: "The questions for the Qualification test a Worker must answer correctly to obtain a Qualification of this type. If this parameter is specified, TestDurationInSeconds must also be specified. Constraints: Must not be longer than 65535 bytes. Must be a QuestionForm data structure. This parameter cannot be specified if AutoGranted is true. Constraints: None. If not specified, the Worker may request the Qualification without answering any questions."
                AnswerKey:
                  $ref: "#/components/schemas/String"
                  description: "The answers to the Qualification test specified in the Test parameter, in the form of an AnswerKey data structure. Constraints: Must not be longer than 65535 bytes. Constraints: None. If not specified, you must process Qualification requests manually."
                TestDurationInSeconds:
                  $ref: "#/components/schemas/Long"
                  description: The number of seconds the Worker has to complete the Qualification test, starting from the time the Worker requests the Qualification.
                AutoGranted:
                  $ref: "#/components/schemas/Boolean"
                  description: "Specifies whether requests for the Qualification type are granted immediately, without prompting the Worker with a Qualification test. Constraints: If the Test parameter is specified, this parameter cannot be true."
                AutoGrantedValue:
                  $ref: "#/components/schemas/Integer"
                  description: The Qualification value to use for automatically granted Qualifications. This parameter is used only if the AutoGranted parameter is true.
              required:
                - QualificationTypeStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQualificationTypeResponse"
  /CreateWorkerBlock:
    post:
      operationId: CreateWorkerBlock
      description: The CreateWorkerBlock operation allows you to prevent a Worker from working on your HITs. For example, you can block a Worker who is producing poor quality work. You can block up to 100,000 Workers.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.CreateWorkerBlock
            default: MTurkRequesterServiceV20170117.CreateWorkerBlock
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkerId:
                  $ref: "#/components/schemas/CustomerId"
                  description: The ID of the Worker to block.
                Reason:
                  $ref: "#/components/schemas/String"
                  description: A message explaining the reason for blocking the Worker. This parameter enables you to keep track of your Workers. The Worker does not see this message.
              required:
                - WorkerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkerBlockResponse"
  /DeleteHIT:
    post:
      operationId: DeleteHIT
      description: The DeleteHIT operation is used to delete HIT that is no longer needed. Only the Requester who created the HIT can delete it. You can only dispose of HITs that are in the Reviewable state, with all of their submitted assignments already either approved or rejected. If you call the DeleteHIT operation on a HIT that is not in the Reviewable state (for example, that has not expired, or still has active assignments), or on a HIT that is Reviewable but without all of its submitted assignments already approved or rejected, the service will return an error. HITs are automatically disposed of after 120 days. After you dispose of a HIT, you can no longer approve the HIT's rejected assignments. Disposed HITs are not returned in results for the ListHITs operation. Disposing HITs can improve the performance of operations such as ListReviewableHITs and ListHITs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.DeleteHIT
            default: MTurkRequesterServiceV20170117.DeleteHIT
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HITId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the HIT to be deleted.
              required:
                - HITId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteHITResponse"
  /DeleteQualificationType:
    post:
      operationId: DeleteQualificationType
      description: The DeleteQualificationType deletes a Qualification type and deletes any HIT types that are associated with the Qualification type. This operation does not revoke Qualifications already assigned to Workers because the Qualifications might be needed for active HITs. If there are any pending requests for the Qualification type, Amazon Mechanical Turk rejects those requests. After you delete a Qualification type, you can no longer use it to create HITs or HIT types. DeleteQualificationType must wait for all the HITs that use the deleted Qualification type to be deleted before completing. It may take up to 48 hours before DeleteQualificationType completes and the unique name of the Qualification type is available for reuse with CreateQualificationType.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.DeleteQualificationType
            default: MTurkRequesterServiceV20170117.DeleteQualificationType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                QualificationTypeId:
                  $ref: "#/components/schemas/EntityId"
                  description: The ID of the QualificationType to dispose.
              required:
                - QualificationTypeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteQualificationTypeResponse"
  /DeleteWorkerBlock:
    post:
      operationId: DeleteWorkerBlock
      description: The DeleteWorkerBlock operation allows you to reinstate a blocked Worker to work on your HITs. This operation reverses the effects of the CreateWorkerBlock operation. You need the Worker ID to use this operation. If the Worker ID is missing or invalid, this operation fails and returns the message “WorkerId is invalid.” If the specified Worker is not blocked, this operation returns successfully.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MTurkRequesterServiceV20170117.DeleteWorkerBlock
            default: MTurkRequesterServiceV20170117.DeleteWorkerBlock
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkerId:
                  $ref: "#/components/schemas/CustomerId"
                  description: The ID of the Worker to unblock.
                Reason:
                  $ref: "#/components/schemas/String"
                  description: A message that explains the reason for unblocking the Worker. The Worker does not see this message.
              required:
                - WorkerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkerBlockResponse"
  /DisassociateQualificationFromWorker:
    post:
      operationId: DisassociateQualificationFromWorker
      description: The DisassociateQualificationFromWorker revokes a previously granted Qualification from a user. You can provide a text message explaining why the Qualification was revoked. The user who had the Qualification can see this message.
      parameters:
        - name: X-Amz-Target
