openapi: 3.0.0
info:
  version: "2015-05-28"
  title: AWS IoT Data Plane
  description: AWS IoT Data Plane
  x-serviceName: iotdata
  x-serviceAlias: iot_data
  x-protocol: rest-json
  x-apiVersion: "2015-05-28"
  x-endpointPrefix: data-ats.iot
servers:
  - url: https://data-ats.iot.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iot-data
paths:
  /connections/{client_id}:
    delete:
      operationId: DeleteConnection
      description: Disconnects a connected MQTT client from Amazon Web Services IoT Core. When you disconnect a client, Amazon Web Services IoT Core closes the client's network connection and optionally cleans the session state.
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClientId"
          description: The unique identifier of the MQTT client to disconnect. The client ID can't start with a dollar sign ($).
        - name: cleanSession
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CleanSession"
          description: Specifies whether to remove the client's session state when disconnecting. Set to TRUE to delete all session information, including subscriptions and queued messages. Set to FALSE to preserve the session state. By default, this is set to FALSE (preserves the session state).
        - name: preventWillMessage
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PreventWillMessage"
          description: Controls if Amazon Web Services IoT Core publishes the client's Last Will and Testament (LWT) message upon disconnection. Set to TRUE to prevent publishing the LWT message. Set to FALSE to allow publishing. By default, this is set to FALSE (allows publishing the LWT message).
      responses:
        "200":
          description: Success
  /things/{thing_name}/shadow:
    delete:
      operationId: DeleteThingShadow
      description: Deletes the shadow for the specified thing. Requires permission to access the DeleteThingShadow action. For more information, see DeleteThingShadow in the IoT Developer Guide.
      parameters:
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ThingName"
          description: The name of the thing.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ShadowName"
          description: The name of the shadow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteThingShadowResponse"
    get:
      operationId: GetThingShadow
      description: Gets the shadow for the specified thing. Requires permission to access the GetThingShadow action. For more information, see GetThingShadow in the IoT Developer Guide.
      parameters:
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ThingName"
          description: The name of the thing.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ShadowName"
          description: The name of the shadow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetThingShadowResponse"
    post:
      operationId: UpdateThingShadow
      description: Updates the shadow for the specified thing. Requires permission to access the UpdateThingShadow action. For more information, see UpdateThingShadow in the IoT Developer Guide.
      parameters:
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ThingName"
          description: The name of the thing.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ShadowName"
          description: The name of the shadow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  $ref: "#/components/schemas/JsonDocument"
              required:
                - payload
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateThingShadowResponse"
  /retainedMessage/{topic}:
    get:
      operationId: GetRetainedMessage
      description: Gets the details of a single retained message for the specified topic. This action returns the message payload of the retained message, which can incur messaging costs. To list only the topic names of the retained messages, call ListRetainedMessages. Requires permission to access the GetRetainedMessage action. For more information about messaging costs, see Amazon Web Services IoT Core pricing - Messaging.
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Topic"
          description: The topic name of the retained message to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRetainedMessageResponse"
  /api/things/shadow/ListNamedShadowsForThing/{thing_name}:
    get:
      operationId: ListNamedShadowsForThing
      description: Lists the shadows for the specified thing. Requires permission to access the ListNamedShadowsForThing action.
      parameters:
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ThingName"
          description: The name of the thing.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to retrieve the next set of results.
        - name: pageSize
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageSize"
          description: The result page size.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNamedShadowsForThingResponse"
  /retainedMessage:
    get:
      operationId: ListRetainedMessages
      description: Lists summary information about the retained messages stored for the account. This action returns only the topic names of the retained messages. It doesn't return any message payloads. Although this action doesn't return a message payload, it can still incur messaging costs. To get the message payload of a retained message, call GetRetainedMessage with the topic name of the retained message. Requires permission to access the ListRetainedMessages action. For more information about messaging costs, see Amazon Web Services IoT Core pricing - Messaging.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRetainedMessagesResponse"
  /topics/{topic}:
    post:
      operationId: Publish
      description: Publishes an MQTT message. Requires permission to access the Publish action. For more information about MQTT messages, see MQTT Protocol in the IoT Developer Guide. For more information about messaging costs, see Amazon Web Services IoT Core pricing - Messaging.
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Topic"
          description: The name of the MQTT topic.
        - name: qos
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Qos"
          description: The Quality of Service (QoS) level. The default QoS level is 0.
        - name: retain
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Retain"
          description: "A Boolean value that determines whether to set the RETAIN flag when the message is published. Setting the RETAIN flag causes the message to be retained and sent to new subscribers to the topic. Valid values: true | false Default value: false"
        - name: x-amz-mqtt5-user-properties
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/UserProperties"
          description: 'A JSON string that contains an array of JSON objects. If you don’t use Amazon Web Services SDK or CLI, you must encode the JSON string to base64 format before adding it to the HTTP header. userProperties is an HTTP header value in the API. The following example userProperties parameter is a JSON string which represents two User Properties. Note that it needs to be base64-encoded: [{"deviceName": "alpha"}, {"deviceCnt": "45"}]'
        - name: x-amz-mqtt5-payload-format-indicator
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/PayloadFormatIndicator"
          description: An Enum string value that indicates whether the payload is formatted as UTF-8. payloadFormatIndicator is an HTTP header value in the API.
        - name: contentType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ContentType"
          description: A UTF-8 encoded string that describes the content of the publishing message.
        - name: responseTopic
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResponseTopic"
          description: A UTF-8 encoded string that's used as the topic name for a response message. The response topic is used to describe the topic which the receiver should publish to as part of the request-response flow. The topic must not contain wildcard characters.
        - name: x-amz-mqtt5-correlation-data
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/CorrelationData"
          description: The base64-encoded binary data used by the sender of the request message to identify which request the response message is for when it's received. correlationData is an HTTP header value in the API.
        - name: messageExpiry
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MessageExpiry"
          description: A user-defined integer value that represents the message expiry interval in seconds. If absent, the message doesn't expire. For more information about the limits of messageExpiry, see Amazon Web Services IoT Core message broker and protocol limits and quotas from the Amazon Web Services Reference Guide.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  $ref: "#/components/schemas/Payload"
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClientId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[^$].*
    CleanSession:
      type: boolean
    PreventWillMessage:
      type: boolean
    ThingName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9:_-]+"
    ShadowName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[$a-zA-Z0-9:_-]+"
    DeleteThingShadowResponse:
      description: The output from the DeleteThingShadow operation.
      type: object
      properties:
        payload:
          $ref: "#/components/schemas/JsonDocument"
          description: The state information, in JSON format.
      required:
        - payload
    JsonDocument:
      type: string
      format: byte
    Topic:
      type: string
    GetRetainedMessageResponse:
      description: The output from the GetRetainedMessage operation.
      type: object
      properties:
        topic:
          $ref: "#/components/schemas/Topic"
          description: The topic name to which the retained message was published.
        payload:
          $ref: "#/components/schemas/Payload"
          description: The Base64-encoded message payload of the retained message body.
        qos:
          $ref: "#/components/schemas/Qos"
          description: The quality of service (QoS) level used to publish the retained message.
        lastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The Epoch date and time, in milliseconds, when the retained message was stored by IoT.
        userProperties:
          $ref: "#/components/schemas/UserPropertiesBlob"
          description: "A base64-encoded JSON string that includes an array of JSON objects, or null if the retained message doesn't include any user properties. The following example userProperties parameter is a JSON string that represents two user properties. Note that it will be base64-encoded: [{\"deviceName\": \"alpha\"}, {\"deviceCnt\": \"45\"}]"
    Payload:
      type: string
      format: byte
    Qos:
      type: integer
      minimum: 0
      maximum: 1
    Timestamp:
      type: integer
      format: int64
    UserPropertiesBlob:
      type: string
      format: byte
    GetThingShadowResponse:
      description: The output from the GetThingShadow operation.
      type: object
      properties:
        payload:
          $ref: "#/components/schemas/JsonDocument"
          description: The state information, in JSON format.
    NextToken:
      type: string
    PageSize:
      type: integer
      minimum: 1
      maximum: 100
    ListNamedShadowsForThingResponse:
      type: object
      properties:
        results:
          $ref: "#/components/schemas/NamedShadowList"
          description: The list of shadows for the specified thing.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to get the next set of results, or null if there are no additional results.
        timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The Epoch date and time the response was generated by IoT.
    NamedShadowList:
      type: array
      items:
        $ref: "#/components/schemas/ShadowName"
    MaxResults:
      type: integer
      minimum: 1
      maximum: 200
    ListRetainedMessagesResponse:
      type: object
      properties:
        retainedTopics:
          $ref: "#/components/schemas/RetainedMessageList"
          description: A summary list the account's retained messages. The information returned doesn't include the message payloads of the retained messages.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results, or null if there are no additional results.
    RetainedMessageList:
      type: array
      items:
        $ref: "#/components/schemas/RetainedMessageSummary"
    RetainedMessageSummary:
      description: Information about a single retained message.
      type: object
      properties:
        topic:
          $ref: "#/components/schemas/Topic"
          description: The topic name to which the retained message was published.
        payloadSize:
          $ref: "#/components/schemas/PayloadSize"
          description: The size of the retained message's payload in bytes.
        qos:
          $ref: "#/components/schemas/Qos"
          description: The quality of service (QoS) level used to publish the retained message.
        lastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The Epoch date and time, in milliseconds, when the retained message was stored by IoT.
    PayloadSize:
      type: integer
      format: int64
    Retain:
      type: boolean
    UserProperties:
      type: string
    PayloadFormatIndicator:
      type: string
      enum:
        - UNSPECIFIED_BYTES
        - UTF8_DATA
    ContentType:
      type: string
    ResponseTopic:
      type: string
    CorrelationData:
      type: string
    MessageExpiry:
      type: integer
      format: int64
    UpdateThingShadowResponse:
      description: The output from the UpdateThingShadow operation.
      type: object
      properties:
        payload:
          $ref: "#/components/schemas/JsonDocument"
          description: The state information, in JSON format.
  x-stackQL-resources:
    connections:
      id: aws.iot_data.connections
      name: connections
      title: connections
      methods:
        delete_connection:
          operation:
            $ref: "#/paths/~1connections~1{client_id}/delete"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
      sqlVerbs:
        select: []
        insert: []
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/connections/methods/delete_connection"
    thing_shadows:
      id: aws.iot_data.thing_shadows
      name: thing_shadows
      title: thing_shadows
      methods:
        delete_thing_shadow:
          operation:
            $ref: "#/paths/~1things~1{thing_name}~1shadow/delete"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
        get_thing_shadow:
          operation:
            $ref: "#/paths/~1things~1{thing_name}~1shadow/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
        update_thing_shadow:
          operation:
            $ref: "#/paths/~1things~1{thing_name}~1shadow/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/thing_shadows/methods/get_thing_shadow"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/thing_shadows/methods/update_thing_shadow"
        delete:
          - $ref: "#/components/x-stackQL-resources/thing_shadows/methods/delete_thing_shadow"
    retained_messages:
      id: aws.iot_data.retained_messages
      name: retained_messages
      title: retained_messages
      methods:
        get_retained_message:
          operation:
            $ref: "#/paths/~1retainedMessage~1{topic}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        list_retained_messages:
          operation:
            $ref: "#/paths/~1retainedMessage/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.retainedTopics
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: nextToken
                location: query
              responseToken:
                key: $.nextToken
                location: body
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/retained_messages/methods/get_retained_message"
          - $ref: "#/components/x-stackQL-resources/retained_messages/methods/list_retained_messages"
        insert: []
        update: []
        delete: []
    named_shadows_for_things:
      id: aws.iot_data.named_shadows_for_things
      name: named_shadows_for_things
      title: named_shadows_for_things
      methods:
        list_named_shadows_for_thing:
          operation:
            $ref: "#/paths/~1api~1things~1shadow~1ListNamedShadowsForThing~1{thing_name}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/named_shadows_for_things/methods/list_named_shadows_for_thing"
        insert: []
        update: []
        delete: []
