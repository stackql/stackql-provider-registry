openapi: 3.0.0
info:
  version: "2019-07-24"
  title: AWS Panorama
  description: AWS Panorama
  x-serviceName: panorama
  x-serviceAlias: panorama
  x-protocol: rest-json
  x-apiVersion: "2019-07-24"
  x-endpointPrefix: panorama
  x-jsonVersion: "1.1"
servers:
  - url: https://panorama.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for panorama
paths:
  /application-instances:
    post:
      operationId: CreateApplicationInstance
      description: Creates an application instance and deploys it to a device.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationInstanceIdToReplace:
                  $ref: "#/components/schemas/ApplicationInstanceId"
                DefaultRuntimeContextDevice:
                  $ref: "#/components/schemas/DefaultRuntimeContextDevice"
                Description:
                  $ref: "#/components/schemas/Description"
                ManifestOverridesPayload:
                  $ref: "#/components/schemas/ManifestOverridesPayload"
                ManifestPayload:
                  $ref: "#/components/schemas/ManifestPayload"
                Name:
                  $ref: "#/components/schemas/ApplicationInstanceName"
                RuntimeRoleArn:
                  $ref: "#/components/schemas/RuntimeRoleArn"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - DefaultRuntimeContextDevice
                - ManifestPayload
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationInstanceResponse"
    get:
      operationId: ListApplicationInstances
      description: Returns a list of application instances.
      parameters:
        - name: deviceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The application instances' device ID.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxSize25"
          description: The maximum number of application instances to return in one page of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
        - name: statusFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StatusFilter"
          description: Only include instances with a specific status.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationInstancesResponse"
  /jobs:
    post:
      operationId: CreateJobForDevices
      description: Creates a job to run on a device. A job can update a device's software or reboot it.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeviceIds:
                  $ref: "#/components/schemas/DeviceIdList"
                DeviceJobConfig:
                  $ref: "#/components/schemas/DeviceJobConfig"
                JobType:
                  $ref: "#/components/schemas/JobType"
              required:
                - DeviceIds
                - JobType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobForDevicesResponse"
    get:
      operationId: ListDevicesJobs
      description: Returns a list of jobs.
      parameters:
        - name: DeviceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: Filter results by the job's target device ID.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxSize25"
          description: The maximum number of device jobs to return in one page of results.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDevicesJobsResponse"
  /packages/template-job:
    post:
      operationId: CreateNodeFromTemplateJob
      description: Creates a camera stream node.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                JobTags:
                  $ref: "#/components/schemas/JobTagsList"
                NodeDescription:
                  $ref: "#/components/schemas/Description"
                NodeName:
                  $ref: "#/components/schemas/NodeName"
                OutputPackageName:
                  $ref: "#/components/schemas/NodePackageName"
                OutputPackageVersion:
                  $ref: "#/components/schemas/NodePackageVersion"
                TemplateParameters:
                  $ref: "#/components/schemas/TemplateParametersMap"
                TemplateType:
                  $ref: "#/components/schemas/TemplateType"
              required:
                - NodeName
                - OutputPackageName
                - OutputPackageVersion
                - TemplateParameters
                - TemplateType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNodeFromTemplateJobResponse"
    get:
      operationId: ListNodeFromTemplateJobs
      description: Returns a list of camera stream node jobs.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxSize25"
          description: The maximum number of node from template jobs to return in one page of results.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNodeFromTemplateJobsResponse"
  /packages:
    post:
      operationId: CreatePackage
      description: Creates a package and storage location in an Amazon S3 access point.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PackageName:
                  $ref: "#/components/schemas/NodePackageName"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - PackageName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePackageResponse"
    get:
      operationId: ListPackages
      description: Returns a list of packages.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxSize25"
          description: The maximum number of packages to return in one page of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPackagesResponse"
  /packages/import-jobs:
    post:
      operationId: CreatePackageImportJob
      description: Imports a node package.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                InputConfig:
                  $ref: "#/components/schemas/PackageImportJobInputConfig"
                JobTags:
                  $ref: "#/components/schemas/JobTagsList"
                JobType:
                  $ref: "#/components/schemas/PackageImportJobType"
                OutputConfig:
                  $ref: "#/components/schemas/PackageImportJobOutputConfig"
              required:
                - ClientToken
                - InputConfig
                - JobType
                - OutputConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePackageImportJobResponse"
    get:
      operationId: ListPackageImportJobs
      description: Returns a list of package import jobs.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxSize25"
          description: The maximum number of package import jobs to return in one page of results.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPackageImportJobsResponse"
  /devices/{device_id}:
    delete:
      operationId: DeleteDevice
      description: Deletes a device.
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The device's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDeviceResponse"
    get:
      operationId: DescribeDevice
      description: Returns information about a device.
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The device's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDeviceResponse"
    put:
      operationId: UpdateDeviceMetadata
      description: Updates a device's metadata.
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The device's ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/Description"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDeviceMetadataResponse"
  /packages/{package_id}:
    delete:
      operationId: DeletePackage
      description: Deletes a package. To delete a package, you need permission to call s3:DeleteObject in addition to permissions for the AWS Panorama API.
      parameters:
        - name: ForceDelete
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: Delete the package even if it has artifacts stored in its access point. Deletes the package's artifacts from Amazon S3.
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackageId"
          description: The package's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePackageResponse"
  /packages/{package_id}/versions/{package_version}/patch/{patch_version}:
    delete:
      operationId: DeregisterPackageVersion
      description: Deregisters a package version.
      parameters:
        - name: OwnerAccount
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageOwnerAccount"
          description: An owner account.
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackageId"
          description: A package ID.
        - name: package_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackageVersion"
          description: A package version.
        - name: patch_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackagePatchVersion"
          description: A patch version.
        - name: UpdatedLatestPatchVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NodePackagePatchVersion"
          description: If the version was marked latest, the new version to maker as latest.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterPackageVersionResponse"
    put:
      operationId: RegisterPackageVersion
      description: Registers a package version.
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackageId"
          description: A package ID.
        - name: package_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackageVersion"
          description: A package version.
        - name: patch_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackagePatchVersion"
          description: A patch version.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MarkLatest:
                  $ref: "#/components/schemas/MarkLatestPatch"
                OwnerAccount:
                  $ref: "#/components/schemas/PackageOwnerAccount"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPackageVersionResponse"
  /application-instances/{application_instance_id}:
    get:
      operationId: DescribeApplicationInstance
      description: Returns information about an application instance on a device.
      parameters:
        - name: application_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationInstanceId"
          description: The application instance's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeApplicationInstanceResponse"
    delete:
      operationId: RemoveApplicationInstance
      description: Removes an application instance.
      parameters:
        - name: application_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationInstanceId"
          description: An application instance ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveApplicationInstanceResponse"
  /application-instances/{application_instance_id}/details:
    get:
      operationId: DescribeApplicationInstanceDetails
      description: Returns information about an application instance's configuration manifest.
      parameters:
        - name: application_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationInstanceId"
          description: The application instance's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeApplicationInstanceDetailsResponse"
  /jobs/{job_id}:
    get:
      operationId: DescribeDeviceJob
      description: Returns information about a device job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The job's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDeviceJobResponse"
  /nodes/{node_id}:
    get:
      operationId: DescribeNode
      description: Returns information about a node.
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodeId"
          description: The node's ID.
        - name: OwnerAccount
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageOwnerAccount"
          description: The account ID of the node's owner.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeNodeResponse"
  /packages/template-job/{job_id}:
    get:
      operationId: DescribeNodeFromTemplateJob
      description: Returns information about a job to create a camera stream node.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The job's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeNodeFromTemplateJobResponse"
  /packages/metadata/{package_id}:
    get:
      operationId: DescribePackage
      description: Returns information about a package.
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackageId"
          description: The package's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePackageResponse"
  /packages/import-jobs/{job_id}:
    get:
      operationId: DescribePackageImportJob
      description: Returns information about a package import job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The job's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePackageImportJobResponse"
  /packages/metadata/{package_id}/versions/{package_version}:
    get:
      operationId: DescribePackageVersion
      description: Returns information about a package version.
      parameters:
        - name: OwnerAccount
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageOwnerAccount"
          description: The version's owner account.
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackageId"
          description: The version's ID.
        - name: package_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodePackageVersion"
          description: The version's version.
        - name: PatchVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NodePackagePatchVersion"
          description: The version's patch version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePackageVersionResponse"
  /application-instances/{application_instance_id}/package-dependencies:
    get:
      operationId: ListApplicationInstanceDependencies
      description: Returns a list of application instance dependencies.
      parameters:
        - name: application_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationInstanceId"
          description: The application instance's ID.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxSize25"
          description: The maximum number of application instance dependencies to return in one page of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationInstanceDependenciesResponse"
  /application-instances/{application_instance_id}/node-instances:
    get:
      operationId: ListApplicationInstanceNodeInstances
      description: Returns a list of application node instances.
      parameters:
        - name: application_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationInstanceId"
          description: The node instances' application instance ID.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxSize25"
          description: The maximum number of node instances to return in one page of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationInstanceNodeInstancesResponse"
  /devices:
    get:
      operationId: ListDevices
      description: Returns a list of devices.
      parameters:
        - name: DeviceAggregatedStatusFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeviceAggregatedStatus"
          description: Filter based on a device's status.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxSize25"
          description: The maximum number of devices to return in one page of results.
        - name: NameFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NameFilter"
          description: Filter based on device's name. Prefixes supported.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
        - name: SortBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListDevicesSortBy"
          description: The target column to be sorted on. Default column sort is CREATED_TIME.
        - name: SortOrder
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
          description: The sorting order for the returned list. SortOrder is DESCENDING by default based on CREATED_TIME. Otherwise, SortOrder is ASCENDING.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDevicesResponse"
    post:
      operationId: ProvisionDevice
      description: Creates a device and returns a configuration archive. The configuration archive is a ZIP file that contains a provisioning certificate that is valid for 5 minutes. Name the configuration archive certificates-omni_device-name.zip and transfer it to the device within 5 minutes. Use the included USB storage device and connect it to the USB 3.0 port next to the HDMI output.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/Description"
                Name:
                  $ref: "#/components/schemas/DeviceName"
                NetworkingConfiguration:
                  $ref: "#/components/schemas/NetworkPayload"
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionDeviceResponse"
  /nodes:
    get:
      operationId: ListNodes
      description: Returns a list of nodes.
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NodeCategory"
          description: Search for nodes by category.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxSize25"
          description: The maximum number of nodes to return in one page of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
        - name: ownerAccount
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PackageOwnerAccount"
          description: Search for nodes by the account ID of the nodes' owner.
        - name: packageName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NodePackageName"
          description: Search for nodes by name.
        - name: packageVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NodePackageVersion"
          description: Search for nodes by version.
        - name: patchVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NodePackagePatchVersion"
          description: Search for nodes by patch version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNodesResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The resource's ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Tags a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The resource's ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The resource's ARN.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Tag keys to remove.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /application-instances/{application_instance_id}/node-signals:
    put:
      operationId: SignalApplicationInstanceNodeInstances
      description: Signal camera nodes to stop or resume.
      parameters:
        - name: application_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationInstanceId"
          description: An application instance ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
