openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Private CA Connector for SCEP
  description: Private CA Connector for SCEP
  x-serviceName: pca-connector-scep
  x-serviceAlias: pca_connector_scep
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: pca-connector-scep
servers:
  - url: https://pca-connector-scep.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for pca-connector-scep
paths:
  /challenges:
    post:
      operationId: CreateChallenge
      description: For general-purpose connectors. Creates a challenge password for the specified connector. The SCEP protocol uses a challenge password to authenticate a request before issuing a certificate from a certificate authority (CA). Your SCEP clients include the challenge password as part of their certificate request to Connector for SCEP. To retrieve the connector Amazon Resource Names (ARNs) for the connectors in your account, call ListConnectors. To create additional challenge passwords for the connector, call CreateChallenge again. We recommend frequently rotating your challenge passwords.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ConnectorArn:
                  $ref: "#/components/schemas/ConnectorArn"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - ConnectorArn
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChallengeResponse"
  /connectors:
    post:
      operationId: CreateConnector
      description: Creates a SCEP connector. A SCEP connector links Amazon Web Services Private Certificate Authority to your SCEP-compatible devices and mobile device management (MDM) systems. Before you create a connector, you must complete a set of prerequisites, including creation of a private certificate authority (CA) to use with this connector. For more information, see Connector for SCEP prerequisites.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/CertificateAuthorityArn"
                MobileDeviceManagement:
                  $ref: "#/components/schemas/MobileDeviceManagement"
                VpcEndpointId:
                  $ref: "#/components/schemas/VpcEndpointId"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - CertificateAuthorityArn
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectorResponse"
    get:
      operationId: ListConnectors
      description: Lists the connectors belonging to your Amazon Web Services account.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of objects that you want Connector for SCEP to return for this request. If more objects are available, in the response, Connector for SCEP provides a NextToken value that you can use in a subsequent call to get the next batch of objects.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: When you request a list of objects with a MaxResults setting, if the number of objects that are still available for retrieval exceeds the maximum you requested, Connector for SCEP returns a NextToken value in the response. To retrieve the next batch of objects, use the token returned from the prior request in your next request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorsResponse"
  /challenges/{challenge_arn}:
    delete:
      operationId: DeleteChallenge
      description: Deletes the specified Challenge.
      parameters:
        - name: challenge_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChallengeArn"
          description: The Amazon Resource Name (ARN) of the challenge password to delete.
      responses:
        "202":
          description: Success
  /connectors/{connector_arn}:
    delete:
      operationId: DeleteConnector
      description: Deletes the specified Connector. This operation also deletes any challenges associated with the connector.
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) of the connector to delete.
      responses:
        "202":
          description: Success
    get:
      operationId: GetConnector
      description: Retrieves details about the specified Connector. Calling this action returns important details about the connector, such as the public SCEP URL where your clients can request certificates.
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) of the connector.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectorResponse"
  /challengeMetadata/{challenge_arn}:
    get:
      operationId: GetChallengeMetadata
      description: Retrieves the metadata for the specified Challenge.
      parameters:
        - name: challenge_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChallengeArn"
          description: The Amazon Resource Name (ARN) of the challenge.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChallengeMetadataResponse"
  /challengePasswords/{challenge_arn}:
    get:
      operationId: GetChallengePassword
      description: Retrieves the challenge password for the specified Challenge.
      parameters:
        - name: challenge_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChallengeArn"
          description: The Amazon Resource Name (ARN) of the challenge.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChallengePasswordResponse"
  /challengeMetadata:
    get:
      operationId: ListChallengeMetadata
      description: Retrieves the challenge metadata for the specified ARN.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of objects that you want Connector for SCEP to return for this request. If more objects are available, in the response, Connector for SCEP provides a NextToken value that you can use in a subsequent call to get the next batch of objects.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: When you request a list of objects with a MaxResults setting, if the number of objects that are still available for retrieval exceeds the maximum you requested, Connector for SCEP returns a NextToken value in the response. To retrieve the next batch of objects, use the token returned from the prior request in your next request.
        - name: ConnectorArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) of the connector.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChallengeMetadataResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Retrieves the tags associated with the specified resource. Tags are key-value pairs that you can use to categorize and manage your resources, for purposes like billing. For example, you might set the tag key to "customer" and the value to the customer name or ID. You can specify one or more tags to add to each Amazon Web Services resource, up to 50 tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds one or more tags to your resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "204":
          description: Success
    delete:
      operationId: UntagResource
      description: Removes one or more tags from your resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Specifies a list of tag keys that you want to remove from the specified resources.
      responses:
        "204":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ConnectorArn:
      type: string
      minLength: 5
      maxLength: 200
      pattern: arn:aws(-[a-z]+)*:pca-connector-scep:[a-z]+(-[a-z]+)+-[1-9]\d*:\d{12}:connector\/[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[!-~]+"
    Tags:
      type: object
      properties: {}
    CreateChallengeResponse:
      type: object
      properties:
        Challenge:
          $ref: "#/components/schemas/Challenge"
          description: Returns the challenge details for the specified connector.
    Challenge:
      description: For Connector for SCEP for general-purpose. An object containing information about the specified connector's SCEP challenge passwords.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ChallengeArn"
          description: The Amazon Resource Name (ARN) of the challenge.
        ConnectorArn:
          $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) of the connector.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the challenge was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the challenge was updated.
        Password:
          $ref: "#/components/schemas/SensitiveString"
          description: The SCEP challenge password, in UUID format.
    ChallengeArn:
      type: string
      minLength: 5
      maxLength: 200
      pattern: arn:aws(-[a-z]+)*:pca-connector-scep:[a-z]+(-[a-z]+)+-[1-9]\d*:\d{12}:connector\/[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}\/challenge\/[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}
    Timestamp:
      type: string
      format: date-time
    SensitiveString:
      type: string
    CertificateAuthorityArn:
      type: string
      minLength: 5
      maxLength: 200
      pattern: arn:aws(-[a-z]+)*:acm-pca:[a-z]+(-[a-z]+)+-[1-9]\d*:\d{12}:certificate-authority\/[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}
    MobileDeviceManagement:
      description: If you don't supply a value, by default Connector for SCEP creates a connector for general-purpose use. A general-purpose connector is designed to work with clients or endpoints that support the SCEP protocol, except Connector for SCEP for Microsoft Intune. For information about considerations and limitations with using Connector for SCEP, see Considerations and Limitations. If you provide an IntuneConfiguration, Connector for SCEP creates a connector for use with Microsoft Intune, and you manage the challenge passwords using Microsoft Intune. For more information, see Using Connector for SCEP for Microsoft Intune.
      type: object
      properties:
        Intune:
          $ref: "#/components/schemas/IntuneConfiguration"
          description: Configuration settings for use with Microsoft Intune. For information about using Connector for SCEP for Microsoft Intune, see Using Connector for SCEP for Microsoft Intune.
    IntuneConfiguration:
      description: Contains configuration details for use with Microsoft Intune. For information about using Connector for SCEP for Microsoft Intune, see Using Connector for SCEP for Microsoft Intune. When you use Connector for SCEP for Microsoft Intune, certain functionalities are enabled by accessing Microsoft Intune through the Microsoft API. Your use of the Connector for SCEP and accompanying Amazon Web Services services doesn't remove your need to have a valid license for your use of the Microsoft Intune service. You should also review the Microsoft Intune® App Protection Policies.
      type: object
      properties:
        AzureApplicationId:
          $ref: "#/components/schemas/AzureApplicationId"
          description: The directory (tenant) ID from your Microsoft Entra ID app registration.
        Domain:
          $ref: "#/components/schemas/AzureDomain"
          description: The primary domain from your Microsoft Entra ID app registration.
      required:
        - AzureApplicationId
        - Domain
    AzureApplicationId:
      type: string
      minLength: 15
      maxLength: 100
      pattern: "[a-zA-Z0-9]{2,15}-[a-zA-Z0-9]{2,15}-[a-zA-Z0-9]{2,15}-[a-zA-Z0-9]{2,15}-[a-zA-Z0-9]{2,15}"
    AzureDomain:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9._-]+"
    VpcEndpointId:
      type: string
      minLength: 13
      maxLength: 22
      pattern: vpce-[0-9a-f]{8}([0-9a-f]{9})?
    CreateConnectorResponse:
      type: object
      properties:
        ConnectorArn:
          $ref: "#/components/schemas/ConnectorArn"
          description: Returns the Amazon Resource Name (ARN) of the connector.
    GetChallengeMetadataResponse:
      type: object
      properties:
        ChallengeMetadata:
          $ref: "#/components/schemas/ChallengeMetadata"
          description: The metadata for the challenge.
    ChallengeMetadata:
      description: Contains details about the connector's challenge.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ChallengeArn"
          description: The Amazon Resource Name (ARN) of the challenge.
        ConnectorArn:
          $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) of the connector.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the connector was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the connector was updated.
    GetChallengePasswordResponse:
      type: object
      properties:
        Password:
          $ref: "#/components/schemas/SensitiveString"
          description: The SCEP challenge password.
    GetConnectorResponse:
      type: object
      properties:
        Connector:
          $ref: "#/components/schemas/Connector"
          description: The properties of the connector.
    Connector:
      description: Connector for SCEP is a service that links Amazon Web Services Private Certificate Authority to your SCEP-enabled devices. The connector brokers the exchange of certificates from Amazon Web Services Private CA to your SCEP-enabled devices and mobile device management systems. The connector is a complex type that contains the connector's configuration settings.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) of the connector.
        CertificateAuthorityArn:
          $ref: "#/components/schemas/CertificateAuthorityArn"
          description: The Amazon Resource Name (ARN) of the certificate authority associated with the connector.
        Type:
          $ref: "#/components/schemas/ConnectorType"
          description: The connector type.
        MobileDeviceManagement:
          $ref: "#/components/schemas/MobileDeviceManagement"
          description: Contains settings relevant to the mobile device management system that you chose for the connector. If you didn't configure MobileDeviceManagement, then the connector is for general-purpose use and this object is empty.
        OpenIdConfiguration:
          $ref: "#/components/schemas/OpenIdConfiguration"
          description: Contains OpenID Connect (OIDC) parameters for use with Connector for SCEP for Microsoft Intune. For more information about using Connector for SCEP for Microsoft Intune, see Using Connector for SCEP for Microsoft Intune.
        Status:
          $ref: "#/components/schemas/ConnectorStatus"
          description: The connector's status.
        StatusReason:
          $ref: "#/components/schemas/ConnectorStatusReason"
          description: Information about why connector creation failed, if status is FAILED.
        Endpoint:
          $ref: "#/components/schemas/String"
          description: The connector's HTTPS public SCEP URL.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the connector was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the connector was updated.
    ConnectorType:
      type: string
      enum:
        - GENERAL_PURPOSE
        - INTUNE
    OpenIdConfiguration:
      description: Contains OpenID Connect (OIDC) parameters for use with Microsoft Intune. For more information about using Connector for SCEP for Microsoft Intune, see Using Connector for SCEP for Microsoft Intune.
      type: object
      properties:
        Issuer:
          $ref: "#/components/schemas/String"
          description: The issuer value to copy into your Microsoft Entra app registration's OIDC.
        Subject:
          $ref: "#/components/schemas/String"
          description: The subject value to copy into your Microsoft Entra app registration's OIDC.
        Audience:
          $ref: "#/components/schemas/String"
          description: The audience value to copy into your Microsoft Entra app registration's OIDC.
    String:
      type: string
    ConnectorStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - FAILED
    ConnectorStatusReason:
      type: string
      enum:
        - INTERNAL_FAILURE
        - PRIVATECA_ACCESS_DENIED
        - PRIVATECA_INVALID_STATE
        - PRIVATECA_RESOURCE_NOT_FOUND
        - VPC_ENDPOINT_RESOURCE_NOT_FOUND
        - VPC_ENDPOINT_DNS_ENTRIES_NOT_FOUND
    MaxResults:
      type: integer
      minimum: 1
      maximum: 1000
    NextToken:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: (?:[A-Za-z0-9_-]{4})*(?:[A-Za-z0-9_-]{2}==|[A-Za-z0-9_-]{3}=)?
    ListChallengeMetadataResponse:
      type: object
      properties:
        Challenges:
          $ref: "#/components/schemas/ChallengeMetadataList"
          description: The challenge metadata for the challenges belonging to your Amazon Web Services account.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When you request a list of objects with a MaxResults setting, if the number of objects that are still available for retrieval exceeds the maximum you requested, Connector for SCEP returns a NextToken value in the response. To retrieve the next batch of objects, use the token returned from the prior request in your next request.
    ChallengeMetadataList:
      type: array
      items:
        $ref: "#/components/schemas/ChallengeMetadataSummary"
    ChallengeMetadataSummary:
      description: Details about the specified challenge, returned by the GetChallengeMetadata action.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ChallengeArn"
          description: The Amazon Resource Name (ARN) of the challenge.
        ConnectorArn:
          $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) of the connector.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the challenge was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the challenge was updated.
    ListConnectorsResponse:
      type: object
      properties:
        Connectors:
          $ref: "#/components/schemas/ConnectorList"
          description: The connectors belonging to your Amazon Web Services account.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When you request a list of objects with a MaxResults setting, if the number of objects that are still available for retrieval exceeds the maximum you requested, Connector for SCEP returns a NextToken value in the response. To retrieve the next batch of objects, use the token returned from the prior request in your next request.
    ConnectorList:
      type: array
      items:
        $ref: "#/components/schemas/ConnectorSummary"
    ConnectorSummary:
      description: Lists the Amazon Web Services Private CA SCEP connectors belonging to your Amazon Web Services account.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) of the connector.
        CertificateAuthorityArn:
          $ref: "#/components/schemas/CertificateAuthorityArn"
          description: The Amazon Resource Name (ARN) of the connector's associated certificate authority.
        Type:
          $ref: "#/components/schemas/ConnectorType"
          description: The connector type.
        MobileDeviceManagement:
          $ref: "#/components/schemas/MobileDeviceManagement"
          description: Contains settings relevant to the mobile device management system that you chose for the connector. If you didn't configure MobileDeviceManagement, then the connector is for general-purpose use and this object is empty.
        OpenIdConfiguration:
          $ref: "#/components/schemas/OpenIdConfiguration"
          description: Contains OpenID Connect (OIDC) parameters for use with Microsoft Intune.
        Status:
          $ref: "#/components/schemas/ConnectorStatus"
          description: The connector's status. Status can be creating, active, deleting, or failed.
        StatusReason:
          $ref: "#/components/schemas/ConnectorStatusReason"
          description: Information about why connector creation failed, if status is FAILED.
        Endpoint:
          $ref: "#/components/schemas/String"
          description: The connector's HTTPS public SCEP URL.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the challenge was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the challenge was updated.
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: The key-value pairs to associate with the resource.
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/String"
  x-stackQL-resources:
    challenges:
      id: aws.pca_connector_scep.challenges
      name: challenges
      title: challenges
      methods:
        create_challenge:
          operation:
            $ref: "#/paths/~1challenges/post"
          response:
            openAPIDocKey: "202"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_challenge:
          operation:
            $ref: "#/paths/~1challenges~1{challenge_arn}/delete"
          response:
            openAPIDocKey: "202"
      sqlVerbs:
        select: []
        insert:
          - $ref: "#/components/x-stackQL-resources/challenges/methods/create_challenge"
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/challenges/methods/delete_challenge"
    connectors:
      id: aws.pca_connector_scep.connectors
      name: connectors
      title: connectors
      methods:
        create_connector:
          operation:
            $ref: "#/paths/~1connectors/post"
          response:
            openAPIDocKey: "202"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_connectors:
          operation:
            $ref: "#/paths/~1connectors/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Connectors
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: NextToken
                location: query
              responseToken:
                key: $.NextToken
                location: body
        delete_connector:
          operation:
            $ref: "#/paths/~1connectors~1{connector_arn}/delete"
          response:
            openAPIDocKey: "202"
        get_connector:
          operation:
            $ref: "#/paths/~1connectors~1{connector_arn}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Connector
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/connectors/methods/get_connector"
          - $ref: "#/components/x-stackQL-resources/connectors/methods/list_connectors"
        insert:
          - $ref: "#/components/x-stackQL-resources/connectors/methods/create_connector"
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/connectors/methods/delete_connector"
    challenge_metadatas:
      id: aws.pca_connector_scep.challenge_metadatas
      name: challenge_metadatas
      title: challenge_metadatas
      methods:
        get_challenge_metadata:
          operation:
            $ref: "#/paths/~1challengeMetadata~1{challenge_arn}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.ChallengeMetadata
        list_challenge_metadata:
          operation:
            $ref: "#/paths/~1challengeMetadata/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Challenges
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: NextToken
                location: query
              responseToken:
                key: $.NextToken
                location: body
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/challenge_metadatas/methods/get_challenge_metadata"
