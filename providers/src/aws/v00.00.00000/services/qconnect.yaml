      required:
        - name
        - operator
    MessageTemplateFilterValueList:
      type: array
      items:
        $ref: "#/components/schemas/MessageTemplateFilterValue"
    MessageTemplateFilterValue:
      type: string
      minLength: 1
      maxLength: 2048
    MessageTemplateFilterOperator:
      type: string
      enum:
        - EQUALS
        - PREFIX
    MessageTemplateOrderField:
